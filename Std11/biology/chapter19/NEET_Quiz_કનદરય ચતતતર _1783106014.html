    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}

        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}

        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}

        .question-card:nth-child(2){animation-delay:.1s}

        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}

        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}

        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}

        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}

        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>

    <script>
        const questionsData = [{"question": "મગજના કયા ભાગમાં રક્ત-મગજ અવરોધ (Blood-Brain Barrier) ની ગેરહાજરી જોવા મળે છે, જ્યાં હોર્મોન અને પોષક તત્વોનો સીધો પ્રવેશ થાય છે?", "options": ["A) સેરેબ્રલ હેમિસ્ફિયર (Cerebral Hemispheres)", "B) હાઇપોથેલામસ (Hypothalamus)", "C) સેરેબેલમ (Cerebellum)", "D) મેડ્યુલા ઓબ્લોંગેટા (Medulla Oblongata)"], "correct": 1, "explanation": "હાઇપોથેલામસ (Hypothalamus) એ મગજનો એવો ભાગ છે જ્યાં રક્ત-મગજ અવરોધ (BBB) અપૂર્ણ રીતે વિકસિત હોય છે. આ કારણે હોર્મોન અને પોષક તત્વો સીધા જ તેના કોષોમાં પ્રવેશ કરી શકે છે. સેરેબ્રલ હેમિસ્ફિયર, સેરેબેલમ અને મેડ્યુલા ઓબ્લોંગેટામાં BBB પૂર્ણ રીતે વિકસિત હોય છે, જેથી આ ભાગોમાં સીધો પ્રવેશ શક્ય નથી.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 1}, {"question": "સ્પાઇનલ કોર્ડના કયા ભાગમાં ગ્રે મેટર (Grey Matter) અને વ્હાઇટ મેટર (White Matter) ની ગોઠવણી મગજની જેમ હોય છે?", "options": ["A) સર્વાઇકલ વિસ્તાર (Cervical Region)", "B) થોરેસિક વિસ્તાર (Thoracic Region)", "C) લમ્બર વિસ્તાર (Lumbar Region)", "D) સેક્રલ વિસ્તાર (Sacral Region)"], "correct": 0, "explanation": "સર્વાઇકલ વિસ્તાર (Cervical Region) અને લમ્બર વિસ્તાર (Lumbar Region) માં સ્પાઇનલ કોર્ડની ગોઠવણી મગજની જેમ હોય છે, પરંતુ સર્વાઇકલ વિસ્તારમાં ગ્રે મેટર અને વ્હાઇટ મેટરની ગોઠવણી વધુ સ્પષ્ટ હોય છે. થોરેસિક અને સેક્રલ વિસ્તારમાં ગોઠવણી અલગ હોય છે.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 2}, {"question": "મગજના કયા ભાગમાં કોર્પોરા ક્વાડ્રિજેમિના (Corpora Quadrigemina) આવેલા છે, જે દૃષ્ટિ અને શ્રવણ સંબંધી પ્રતિક્રિયાઓમાં મહત્વની ભૂમિકા ભજવે છે?", "options": ["A) ફોરબ્રેઇન (Forebrain)", "B) મિડબ્રેઇન (Midbrain)", "C) હિન્ડબ્રેઇન (Hindbrain)", "D) ડાયનસેફેલોન (Diencephalon)"], "correct": 1, "explanation": "કોર્પોરા ક્વાડ્રિજેમિના (Corpora Quadrigemina) મિડબ્રેઇન (Midbrain) ના ડોર્સલ ભાગમાં આવેલા છે. આ ભાગ દૃષ્ટિ (સુપિરિયર કોલિક્યુલી) અને શ્રવણ (ઇન્ફિરિયર કોલિક્યુલી) સંબંધી પ્રતિક્રિયાઓમાં મહત્વની ભૂમિકા ભજવે છે. ફોરબ્રેઇન, હિન્ડબ્રેઇન અને ડાયનસેફેલોનમાં આ રચના આવેલી નથી.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 3}, {"question": "સ્પાઇનલ કોર્ડના કયા ભાગમાં લેટરલ હોર્ન (Lateral Horn) જોવા મળે છે, જે સ્વાયત્ત ચેતાતંત્ર (Autonomic Nervous System) સાથે સંબંધિત છે?", "options": ["A) સર્વાઇકલ અને લમ્બર વિસ્તાર", "B) થોરેસિક વિસ્તાર", "C) સેક્રલ વિસ્તાર", "D) કોક્સિજિયલ વિસ્તાર"], "correct": 1, "explanation": "લેટરલ હોર્ન (Lateral Horn) સ્પાઇનલ કોર્ડના થોરેસિક વિસ્તાર (Thoracic Region) માં જોવા મળે છે. આ ભાગ સ્વાયત્ત ચેતાતંત્ર (Autonomic Nervous System) સાથે સંબંધિત છે, ખાસ કરીને સિમ્પેથેટિક નર્વ્સ સાથે. સર્વાઇકલ, લમ્બર, સેક્રલ અને કોક્સિજિયલ વિસ્તારમાં લેટરલ હોર્ન જોવા મળતું નથી.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 4}, {"question": "મગજના કયા ભાગમાં પિનિયલ ગ્લેન્ડ (Pineal Gland) આવેલું છે, જે મેલેટોનિન હોર્મોનનું સ્રાવ કરે છે?", "options": ["A) સેરેબ્રમ (Cerebrum)", "B) ડાયનસેફેલોન (Diencephalon)", "C) સેરેબેલમ (Cerebellum)", "D) મેડ્યુલા ઓબ્લોંગેટા (Medulla Oblongata)"], "correct": 1, "explanation": "પિનિયલ ગ્લેન્ડ (Pineal Gland) ડાયનસેફેલોન (Diencephalon) ના ભાગ રૂપે આવેલું છે. આ ગ્લેન્ડ મેલેટોનિન હોર્મોનનું સ્રાવ કરે છે, જે નિદ્રા-જાગૃતિ ચક્રને નિયંત્રિત કરે છે. સેરેબ્રમ, સેરેબેલમ અને મેડ્યુલા ઓબ્લોંગેટામાં પિનિયલ ગ્લેન્ડ આવેલું નથી.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 5}, {"question": "મગજના કયા ભાગમાં ડેકસ્ટ્રમ (Decussation) ની ઘટના બને છે, જ્યાં ચેતા તંતુઓ એક બાજુથી બીજી બાજુમાં ક્રોસ થાય છે?", "options": ["A) મેડ્યુલા ઓબ્લોંગેટા", "B) પોન્સ વેરોલી", "C) મિડબ્રેઇન", "D) સેરેબ્રલ હેમિસ્ફિયર"], "correct": 0, "explanation": "ડેકસ્ટ્રમ (Decussation) ની ઘટના મેડ્યુલા ઓબ્લોંગેટામાં બને છે, જ્યાં પિરામિડલ ટ્રેક્ટના ચેતા તંતુઓ એક બાજુથી બીજી બાજુમાં ક્રોસ થાય છે. પોન્સ વેરોલી, મિડબ્રેઇન અને સેરેબ્રલ હેમિસ્ફિયરમાં આવી ઘટના બનતી નથી.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 6}, {"question": "સ્પાઇનલ કોર્ડના કયા ભાગમાં સેન્ટ્રલ કેનાલ (Central Canal) આવેલો છે, જે સેરેબ્રોસ્પાઇનલ દ્રવ (CSF) નું પરિવહન કરે છે?", "options": ["A) ગ્રે મેટર", "B) વ્હાઇટ મેટર", "C) ડોર્સલ હોર્ન", "D) વેન્ટ્રલ હોર્ન"], "correct": 0, "explanation": "સેન્ટ્રલ કેનાલ (Central Canal) સ્પાઇનલ કોર્ડના ગ્રે મેટરના મધ્ય ભાગમાં આવેલો છે, જે સેરેબ્રોસ્પાઇનલ દ્રવ (CSF) નું પરિવહન કરે છે. વ્હાઇટ મેટર, ડોર્સલ હોર્ન અને વેન્ટ્રલ હોર્નમાં આવો કેનાલ આવેલો નથી.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 7}, {"question": "મગજના કયા ભાગમાં કોલિક્યુલી (Colliculi) આવેલા છે, જે દૃષ્ટિ અને શ્રવણ સાથે સંબંધિત છે?", "options": ["A) સેરેબ્રમ", "B) ડાયનસેફેલોન", "C) મિડબ્રેઇન", "D) હાઇપોથેલેમસ"], "correct": 2, "explanation": "કોલિક્યુલી (Colliculi) મિડબ્રેઇનમાં આવેલા છે, જે દૃષ્ટિ (સુપિરિયર કોલિક્યુલી) અને શ્રવણ (ઇન્ફિરિયર કોલિક્યુલી) સાથે સંબંધિત છે. સેરેબ્રમ, ડાયનસેફેલોન અને હાઇપોથેલેમસમાં આવા ભાગો આવેલા નથી.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 8}, {"question": "સ્પાઇનલ કોર્ડના કયા ભાગમાં ડોર્સલ રૂટ ગેંગ્લિયા (Dorsal Root Ganglia) આવેલા છે, જે સંવેદનાત્મક ચેતાકોષોના કોષકેન્દ્ર ધરાવે છે?", "options": ["A) વેન્ટ્રલ રૂટ", "B) ડોર્સલ રૂટ", "C) લેટરલ હોર્ન", "D) સેન્ટ્રલ કેનાલ"], "correct": 1, "explanation": "ડોર્સલ રૂટ ગેંગ્લિયા (Dorsal Root Ganglia) સ્પાઇનલ કોર્ડના ડોર્સલ રૂટમાં આવેલા છે, જે સંવેદનાત્મક ચેતાકોષોના કોષકેન્દ્ર ધરાવે છે. વેન્ટ્રલ રૂટ, લેટરલ હોર્ન અને સેન્ટ્રલ કેનાલમાં આવા ગેંગ્લિયા આવેલા નથી.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 9}, {"question": "મગજના કયા ભાગમાં હાયપોથેલેમસ આવેલું છે, જે હોર્મોનલ નિયંત્રણ અને હોમિયોસ્ટેસિસમાં મહત્વની ભૂમિકા ભજવે છે?", "options": ["A) ફોરબ્રેઇન", "B) મિડબ્રેઇન", "C) હિન્દબ્રેઇન", "D) સ્પાઇનલ કોર્ડ"], "correct": 0, "explanation": "હાયપોથેલેમસ ફોરબ્રેઇનના ડાયનસેફેલોન ભાગમાં આવેલું છે, જે હોર્મોનલ નિયંત્રણ અને હોમિયોસ્ટેસિસમાં મહત્વની ભૂમિકા ભજવે છે. મિડબ્રેઇન, હિન્દબ્રેઇન અને સ્પાઇનલ કોર્ડમાં હાયપોથેલેમસ આવેલું નથી.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 10}, {"question": "મગજના કયા ભાગમાં સબસ્ટાનશિયા નાઇગ્રા (Substantia Nigra) આવેલું છે, જે ડોપામિન હોર્મોનનું ઉત્પાદન કરે છે અને પાર્કિન્સન રોગ સાથે સંકળાયેલું છે?", "options": ["A) સેરેબ્રલ હેમિસ્ફિયર (Cerebral Hemisphere)", "B) મિડબ્રેઇન (Midbrain)", "C) સેરેબેલમ (Cerebellum)", "D) ડાયનસેફેલોન (Diencephalon)"], "correct": 1, "explanation": "સબસ્ટાનશિયા નાઇગ્રા મિડબ્રેઇનમાં આવેલું છે અને ડોપામિન હોર્મોનનું ઉત્પાદન કરે છે, જે પાર્કિન્સન રોગમાં અછત થાય છે. સેરેબ્રલ હેમિસ્ફિયર (A) મગજના ઉચ્ચ કાર્યો માટે જવાબદાર છે, સેરેબેલમ (C) સંતુલન અને સ્નાયુ ગતિવિધિઓનું નિયંત્રણ કરે છે, જ્યારે ડાયનસેફેલોન (D) થેલેમસ અને હાયપોથેલેમસ ધરાવે છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને ગતિવિધિ", "difficulty": "Hard", "num": 11}, {"question": "સ્પાઇનલ કોર્ડમાં કયા ટ્રેક્ટ દ્વારા પ્રોપ્રિયોસેપ્ટિવ માહિતી (Proprioceptive Information) મગજ તરફ વહન પામે છે?", "options": ["A) કોર્ટિકોસ્પાઇનલ ટ્રેક્ટ (Corticospinal Tract)", "B) સ્પિનોથેલેમિક ટ્રેક્ટ (Spinothalamic Tract)", "C) ડોર્સલ કોલમ-મેડિયલ લેમનિસ્કસ પથ (Dorsal Column-Medial Lemniscus Pathway)", "D) સ્પાઇનોસેરેબેલર ટ્રેક્ટ (Spinocerebellar Tract)"], "correct": 2, "explanation": "ડોર્સલ કોલમ-મેડિયલ લેમનિસ્કસ પથ દ્વારા પ્રોપ્રિયોસેપ્ટિવ માહિતી (સ્નાયુઓ અને જોડોની સ્થિતિ વિશેની માહિતી) મગજ તરફ વહન પામે છે. કોર્ટિકોસ્પાઇનલ ટ્રેક્ટ (A) મગજથી સ્પાઇનલ કોર્ડ તરફ મોટર આદેશો વહન કરે છે, સ્પિનોથેલેમિક ટ્રેક્ટ (B) દુખ અને તાપમાનની માહિતી વહન કરે છે, જ્યારે સ્પાઇનોસેરેબેલર ટ્રેક્ટ (D) સેરેબેલમને પ્રોપ્રિયોસેપ્ટિવ માહિતી પૂરી પાડે છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને ગતિવિધિ", "difficulty": "Hard", "num": 12}, {"question": "મગજના કયા ભાગમાં કોઈપણ સંવેદનાત્મક (Sensory) માહિતી પ્રક્રિયા થતી નથી?", "options": ["A) થેલેમસ (Thalamus)", "B) હાયપોથેલેમસ (Hypothalamus)", "C) સેરેબેલમ (Cerebellum)", "D) મેડ્યુલા ઓબ્લોંગેટા (Medulla Oblongata)"], "correct": 2, "explanation": "સેરેબેલમ (Cerebellum) મુખ્યત્વે સ્નાયુ ગતિવિધિઓના સંકલન અને સંતુલન માટે જવાબદાર છે, પરંતુ તે સંવેદનાત્મક માહિતીની પ્રક્રિયા કરતું નથી. થેલેમસ (A) સંવેદનાત્મક માહિતીનું રિલે સેન્ટર છે, હાયપોથેલેમસ (B) હોર્મ tion": "'બ્રોકા ક્ષેત્ર' મગજના ડાબા ગોળાર્ધના ફ્રન્ટલ લોબમાં આવેલું છે અને ભાષા ઉત્પાદન (વાક્ય રચના) સાથે સંબંધિત છે. ભાષા સમજણ માટે 'વર્નિક ક્ષેત્ર' જવાબદાર છે, જે ટેમ્પોરલ લોબમાં આવેલું છે. પેરાઇટલ અને ઓક્સિપિટલ લોબમાં આ ક્ષેત્ર આવેલું નથી.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને ગતિવિધિ", "difficulty": "Hard", "num": 33}, {"question": "સ્પાઇનલ કોર્ડના 'વેન્ટ્રલ હોર્ન' (Ventral Horn) માં કયા પ્રકારના ન્યુરોન્સ આવેલા છે?", "options": ["A) સંવેદનાત્મક ન્યુરોન્સ (Sensory Neurons)", "B) મોટર ન્યુરોન્સ (Motor Neurons)", "C) ઇન્ટરન્યુરોન્સ (Interneurons)", "D) સહાનુભૂતિ ન્યુરોન્સ (Sympathetic Neurons)"], "correct": 1, "explanation": "સ્પાઇનલ કોર્ડના 'વેન્ટ્રલ હોર્ન'માં મોટર ન્યુરોન્સ આવેલા છે, જે સ્નાયુઓને આદેશો મોકલે છે. સંવેદનાત્મક ન્યુરોન્સ ડોર્સલ હોર્નમાં, ઇન્ટરન્યુરોન્સ ગ્રે મેટરમાં અને સહાનુભૂતિ ન્યુરોન્સ લેટરલ હોર્નમાં આવેલા છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને ગતિવિધિ", "difficulty": "Hard", "num": 34}, {"question": "મગજના કયા ભાગમાં 'સુપરિયર ઓલિવરી કોમ્પ્લેક્સ' (Superior Olivary Complex) આવેલો છે, જે શ્રવણ સાથે સંબંધિત છે?", "options": ["A) મિડબ્રેઇન (Midbrain)", "B) પોન્સ (Pons)", "C) મેડ્યુલા ઓબ્લોંગેટા (Medulla Oblongata)", "D) સેરેબેલમ (Cerebellum)"], "correct": 1, "explanation": "'સુપરિયર ઓલિવરી કોમ્પ્લેક્સ' પોન્સમાં આવેલો છે, જે શ્રવણ (સાંભળવાની ક્રિયા) સાથે સંબંધિત છે. મિડબ્રેઇન, મેડ્યુલા ઓબ્લોંગેટા અને સેરેબેલમમાં આ રચના આવેલી નથી.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને ગતિવિધિ", "difficulty": "Hard", "num": 35}, {"question": "મગજના કયા ભાગમાં 'રેડ ન્યુક્લિયસ' (Red Nucleus) આવેલું છે અને તેનું મુખ્ય કાર્ય શું છે?", "options": ["A) મિડબ્રેઇન, મોટર કન્ટ્રોલ અને પોસ્ચરલ ટોનનું નિયંત્રણ", "B) હાયપોથેલેમસ, હોર્મોનલ સ્રાવનું નિયંત્રણ", "C) સેરેબ્રલ કોર્ટેક્સ, સંવેદનાત્મક માહિતીની પ્રક્રિયા", "D) પોન્સ, શ્વસન અને હૃદયના ધબકારાનું નિયંત્રણ"], "correct": 0, "explanation": "રેડ ન્યુક્લિયસ મિડબ્રેઇનમાં આવેલું છે અને તે મોટર કન્ટ્રોલ અને પોસ્ચરલ ટોનનું નિયંત્રણ કરે છે. બાકીના વિકલ્પો અયોગ્ય છે કારણ કે: B) હાયપોથેલેમસ હોર્મોનલ સ્રાવનું નિયંત્રણ કરે છે, C) સેરેબ્રલ કોર્ટેક્સ સંવેદનાત્મક માહિતીની પ્રક્રિયા કરે છે, અને D) પોન્સ શ્વસન અને હૃદયના ધબકારાનું નિયંત્રણ કરે છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને ગુરુત્વાકર્ષણ", "difficulty": "Hard", "num": 36}, {"question": "મગજના કયા ભાગમાં 'ડેકસ્ટ્રમ ઓફ પિરામિડ્સ' (Decussation of Pyramids) થાય છે, જ્યાં મોટર ચેતા તંતુઓનો ક્રોસિંગ થાય છે?", "options": ["A) મેડ્યુલા ઓબ્લોંગેટા", "B) પોન્સ વેરોલી", "C) મિડબ્રેઇન", "D) સ્પાઇનલ કોર્ડ"], "correct": 0, "explanation": "ડેકસ્ટ્રમ ઓફ પિરામિડ્સ મેડ્યુલા ઓબ્લોંગેટામાં થાય છે, જ્યાં કોર્ટિકોસ્પાઇનલ ટ્રેક્ટના તંતુઓ ક્રોસ થાય છે. પોન્સ વેરોલી, મિડબ્રેઇન અને સ્પાઇનલ કોર્ડમાં આ ઘટના થતી નથી. પોન્સમાં અન્ય પ્રકારના ડેકસ્ટ્રમ થાય છે, પરંતુ પિરામિડ્સનો ડેકસ્ટ્રમ ખાસ મેડ્યુલામાં જ થાય છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 37}, {"question": "સ્પાઇનલ કોર્ડના કયા ભાગમાં 'ગેલેનોવું જોડાણ' (Galeno’s Anastomosis) દ્વારા રક્ત પુરવઠો થાય છે?", "options": ["A) સર્વાઇકલ ભાગ", "B) થોરેસિક ભાગ", "C) લંબર ભાગ", "D) સેક્રલ ભાગ"], "correct": 1, "explanation": "ગેલેનોવું જોડાણ (Great Cerebral Vein of Galen) મુખ્યત્વે થોરેસિક ભાગના સ્પાઇનલ કોર્ડને રક્ત પુરવઠો પૂરો પાડે છે. સર્વાઇકલ, લંબર અને સેક્રલ ભાગો માટે અન્ય રક્તવાહિનીઓ જવાબદાર હોય છે. આ જોડાણ મગજ અને સ્પાઇનલ કોર્ડ વચ્ચેના રક્ત પરિભ્રમણમાં મહત્વની ભૂમિકા ભજવે છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 38}, {"question": "નીચેના પૈકી કયું વિધાન 'સબસ્ટાનશિયા જેલેટિનોસા' (Substantia Gelatinosa) માટે સાચું છે?", "options": ["A) તે સ્પાઇનલ કોર્ડના વ્હાઇટ મેટરમાં આવેલું છે અને પીડા સંવેદનામાં ભૂમિકા ભજવે છે.", "B) તે સ્પાઇનલ કોર્ડના ગ્રે મેટરના ડોર્સલ હોર્નમાં આવેલું છે અને પીડા સંવેદનાનું મોડ્યુલેશન કરે છે.", "C) તે મિડબ્રેઇનમાં આવેલું છે અને દૃષ્ટિ સાથે સંબંધિત છે.", "D) તે સેરેબ્રલ કોર્ટેક્સમાં આવેલું છે અને સ્મૃતિ સાથે સંબંધિત છે."], "correct": 1, "explanation": "સબસ્ટાનશિયા જેલેટિનોસા સ્પાઇનલ કોર્ડના ગ્રે મેટરના ડોર્સલ હોર્નમાં આવેલું છે અને પીડા સંવેદનાનું મોડ્યુલેશન કરે છે. તે વ્હાઇટ મેટરમાં આવેલું નથી, ના મિડબ્રેઇન અથવા સેરેબ્રલ કોર્ટેક્સમાં. આ રચના પીડા સંવેદનાને નિયંત્રિત કરવામાં મહત્વની ભૂમિકા ભજવે છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 39}, {"question": "મગજના કયા ભાગમાં 'પ્રી-સેન્ટ્રલ ગાયરસ' (Precentral Gyrus) આવેલું છે, જે સ્વેચ્છિક ચળવળોનું નિયંત્રણ કરે છે?", "options": ["A) ફ્રન્ટલ લોબ", "B) પેરાઇટલ લોબ", "C) ટેમ્પોરલ લોબ", "D) ઓક્સિપિટલ લોબ"], "correct": 0, "explanation": "પ્રી-સેન્ટ્રલ ગાયરસ ફ્રન્ટલ લોબમાં આવેલું છે અને તે સ્વેચ્છિક ચળવળોનું નિયંત્રણ કરે છે. પેરાઇટલ લોબ સંવેદનાત્મક માહિતી સાથે, ટેમ્પોરલ લોબ શ્રવણ સાથે અને ઓક્સિપિટલ લોબ દૃષ્ટિ સાથે સંબંધિત છે. પ્રી-સેન્ટ્રલ ગાયરસ મોટર કોર્ટેક્સનો ભાગ છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 40}, {"question": "સ્પાઇનલ કોર્ડના કયા ભાગમાં 'કોમિસ્યુરલ ફાઇબર્સ' (Commissural Fibers) દ્વારા ડેકસ્ટ્રમ થતું નથી, પરંતુ તેના બદલે સમાન બાજુએ જ રહે છે?", "options": ["A) સર્વિકલ ભાગના વ્હાઇટ મેટરમાં", "B) થોરેસિક ભાગના ગ્રે મેટરના લેટરલ હોર્નમાં", "C) લંબર ભાગના વેન્ટ્રલ કોલમમાં", "D) સેક્રલ ભાગના ડોર્સલ કોલમમાં"], "correct": 1, "explanation": "થોરેસિક ભાગના ગ્રે મેટરના લેટરલ હોર્નમાં કોમિસ્યુરલ ફાઇબર્સ ડેકસ્ટ્રમ થતું નથી, કારણ કે આ ભાગમાં સિમ્પેથેટિક ન્યુરોન્સના કોષકેદ્રો આવેલા છે, જે સમાન બાજુએ જ રહે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: A) સર્વિકલ ભાગના વ્હાઇટ મેટરમાં ડેકસ્ટ્રમ થાય છે, C) લંબર ભાગના વેન્ટ્રલ કોલમમાં ડેકસ્ટ્રમ થાય છે, અને D) સેક્રલ ભાગના ડોર્સલ કોલમમાં પણ ડેકસ્ટ્રમ થાય છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને ગુરુત્વાકર્ષણ", "difficulty": "Hard", "num": 41}, {"question": "મગજના કયા ભાગમાં 'બેઝલ ગેંગ્લિયા' (Basal Ganglia) ની રચના જોવા મળે છે, જે ચળવળના નિયંત્રણમાં મહત્વની ભૂમિકા ભજવે છે?", "options": ["A) સેરેબ્રલ હેમિસ્ફિયરના કોર્ટેક્સમાં", "B) ડાયનસેફેલોનના થેલેમસમાં", "C) મિડબ્રેઇનના ટેક્ટમમાં", "D) સબકોર્ટિકલ વ્હાઇટ મેટરમાં"], "correct": 3, "explanation": "બેઝલ ગેંગ્લિયા સબકોર્ટિકલ વ્હાઇટ મેટરમાં આવેલા છે, જે ચળવળના નિયંત્રણ, પોસ્ચર અને મસ્ક્યુલર ટોનમાં મહત્વની         let userAnswers = {};

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];

                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });

                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);

            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;

            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }

            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
