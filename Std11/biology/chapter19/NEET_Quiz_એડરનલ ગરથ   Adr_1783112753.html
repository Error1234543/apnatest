    <script>
        const questionsData = [{"question": "એડ્રિનલ કોર્ટેક્સના કોષોમાંથી કયા હોર્મોનનું સ્રાવ થાય છે જે રક્તમાં સોડિયમના સ્તરને નિયંત્રિત કરે છે અને પોટેશિયમના ઉત્સર્જનને પ્રોત્સાહન આપે છે?", "options": ["A) કોર્ટિસોલ", "B) એલ્ડોસ્ટેરોન", "C) એન્ડ્રોજન", "D) એપીનેફ્રિન"], "correct": 1, "explanation": "એલ્ડોસ્ટેરોન એડ્રિનલ કોર્ટેક્સના ગ્લોમેરુલોસા ઝોનમાંથી સ્રાવ થાય છે અને તે રક્તમાં સોડિયમના સ્તરને નિયંત્રિત કરે છે તથા પોટેશિયમના ઉત્સર્જનને પ્રોત્સાહન આપે છે. કોર્ટિસોલ ગ્લુકોકોર્ટિકોઈડ છે જે ચયાપચયને નિયંત્રિત કરે છે. એન્ડ્રોજન લૈંગિક હોર્મોન છે, જ્યારે એપીનેફ્રિન એડ્રિનલ મેડ્યુલામાંથી સ્રાવ થાય છે અને તે કેટેકોલામાઇન છે.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક નિયમન અને નિયંત્રણ", "difficulty": "Hard", "num": 1}, {"question": "એડ્રિનલ મેડ્યુલામાંથી સ્રાવ થતાં હોર્મોન વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) એપીનેફ્રિન અને નોરેપીનેફ્રિન બંને સ્ટેરોઈડ હોર્મોન છે.", "B) એપીનેફ્રિન હૃદયના ધબકારાને ધીમો પાડે છે.", "C) નોરેપીનેફ્રિન રક્તવાહિનીઓને સંકોચિત કરે છે અને રક્તચાપ વધારે છે.", "D) એડ્રિનલ મેડ્યુલાના હોર્મોન પીટ્યુટરી ગ્રંથિ દ્વારા નિયંત્રિત થાય છે."], "correct": 2, "explanation": "નોરેપીનેફ્રિન રક્તવાહિનીઓને સંકોચિત કરે છે અને રક્તચાપ વધારે છે. એપીનેફ્રિન અને નોરેપીનેફ્રિન કેટેકોલામાઇન છે, સ્ટેરોઈડ નહીં. એપીનેફ્રિન હૃદયના ધબકારાને વેગવાન બનાવે છે. એડ્રિનલ મેડ્યુલાના હોર્મોન સંવેદી તંત્રિકા પ્રણાલી દ્વારા નિયંત્રિત થાય છે, પીટ્યુટરી ગ્રંથિ દ્વારા નહીં.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક નિયમન અને નિયંત્રણ", "difficulty": "Hard", "num": 2}, {"question": "એડ્રિનલ કોર્ટેક્સના કયા ઝોનમાંથી ગ્લુકોકોર્ટિકોઈડ હોર્મોન સ્રાવ થાય છે?", "options": ["A) ગ્લોમેરુલોસા ઝોન", "B) ફેસિક્યુલેટા ઝોન", "C) રેટિક્યુલેરિસ ઝોન", "D) મેડ્યુલા"], "correct": 1, "explanation": "ગ્લુકોકોર્ટિકોઈડ હોર્મોન (જેમ કે કોર્ટિસોલ) એડ્રિનલ કોર્ટેક્સના ફેસિક્યુલેટા ઝોનમાંથી સ્રાવ થાય છે. ગ્લોમેરુલોસા ઝોનમાં મિનરલોકોર્ટિકોઈડ (એલ્ડોસ્ટેરોન) સ્રાવ થાય છે, રેટિક્યુલેરિસ ઝોનમાં એન્ડ્રોજન સ્રાવ થાય છે, અને મેડ્યુલામાં કેટેકોલામાઇન (એપીનેફ્રિન અને નોરેપીનેફ્રિન) સ્રાવ થાય છે.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક નિયમન અને નિયંત્રણ", "difficulty": "Hard", "num": 3}, {"question": "નીચેનામાંથી કયું હોર્મોન એડ્રિનલ કોર્ટેક્સ દ્વારા સ્રાવ થતું નથી?", "options": ["A) કોર્ટિસોલ", "B) એલ્ડોસ્ટેરોન", "C) એપીનેફ્રિન", "D) એન્ડ્રોજન"], "correct": 2, "explanation": "એપીનેફ્રિન એડ્રિનલ મેડ્યુલામાંથી સ્રાવ થાય છે, એડ્રિનલ કોર્ટેક્સમાંથી નહીં. કોર્ટિસોલ, એલ્ડોસ્ટેરોન, અને એન્ડ્રોજન એડ્રિનલ કોર્ટેક્સના વિવિધ ઝોનમાંથી સ્રાવ થાય છે.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક નિયમન અને નિયંત્રણ", "difficulty": "Hard", "num": 4}, {"question": "એડ્રિનલ ગ્રંથિ વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) એડ્રિનલ કોર્ટેક્સ અને મેડ્યુલા બંને ભિન્ન ઉત્પત્તિ ધરાવે છે.", "B) એડ્રિનલ કોર્ટેક્સ મેસોડર્મથી વિકસે છે જ્યારે મેડ્યુલા એક્ટોડર્મથી વિકસે છે.", "C) એડ્રિનલ મેડ્યુલામાંથી સ્રાવ થતાં હોર્મોન પીટ્યુટરી ગ્રંથિ દ્વારા નિયંત્રિત થાય છે.", "D) એડ્રિનલ કોર્ટેક્સના હોર્મોન લિપિડ-આધારિત છે."], "correct": 2, "explanation": "એડ્રિનલ મેડ્યુલામાંથી સ્રાવ થતાં હોર્મોન (એપીનેફ્રિન અને નોરેપીનેફ્રિન) સંવેદી તંત્રિકા પ્રણાલી દ્વારા નિયંત્રિત થાય છે, પીટ્યુટરી ગ્રંથિ દ્વારા નહીં. એડ્રિનલ કોર્ટેક્સ અને મેડ્યુલા ભિન્ન ઉત્પત્તિ ધરાવે છે (કોર્ટેક્સ મેસોડર્મથી અને મેડ્યુલા એક્ટોડર્મથી). એડ્રિનલ કોર્ટેક્સના હોર્મોન લિપિડ-આધારિત (સ્ટેરોઈડ) છે.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક નિયમન અને નિયંત્રણ", "difficulty": "Hard", "num": 5}, {"question": "એડ્રિનલ કોર્ટેક્સના ગ્લોમેરુલોસા ઝોન દ્વારા સ્રાવ થતાં એલ્ડોસ્ટેરોન હોર્મોનની ક્રિયા વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) તે રક્તમાં સોડિયમના પુન:શોષણને પ્રોત્સાહન આપે છે", "B) તે રક્તમાં પોટેશિયમના સ્તરને ઘટાડે છે", "C) તે રક્તચાપને ઘટાડવા માટે મુખ્યત્વે જવાબદાર છે", "D) તે રેનિન-એન્જિયોટેન્સિન સિસ્ટમ દ્વારા નિયંત્રિત થાય છે"], "correct": 2, "explanation": "એલ્ડોસ્ટેરોન રક્તમાં સોડિયમના પુન:શોષણને પ્રોત્સાહન આપે છે (A સાચું) અને પોટેશિયમના સ્તરને ઘટાડે છે (B સાચું). તે રેનિન-એન્જિયોટેન્સિન સિસ્ટમ દ્વારા નિયંત્રિત થાય છે (D સાચું). પરંતુ તે રક્તચાપને વધારવા માટે જવાબદાર છે, નહીં ્કરાને વધારે છે, નહીં કે ઘટાડે (C ખોટું).", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક નિયંત્રણ અને એકીકરણ", "difficulty": "Hard", "num": 9}, {"question": "એડ્રિનલ ગ્રંથિના હોર્મોન અને તેમની ક્રિયા વિશે નીચેનામાંથી કયું જોડકું ખોટું છે?", "options": ["A) એલ્ડોસ્ટેરોન - રક્તમાં સોડિયમના સ્તરને નિયંત્રિત કરે છે", "B) કોર્ટિસોલ - ગ્લુકોનિયોજેનેસિસને પ્રોત્સાહન આપે છે", "C) એપીનેફ્રિન - રક્ત વાહિનીઓને વિસ્તારે છે", "D) એન્ડ્રોજન - પુરુષ લિંગ હોર્મોન તરીકે ક્રિયા કરે છે"], "correct": 2, "explanation": "એલ્ડોસ્ટેરોન રક્તમાં સોડિયમના સ્તરને નિયંત્રિત કરે છે (A સાચું), કોર્ટિસોલ ગ્લુકોનિયોજેનેસિસને પ્રોત્સાહન આપે છે (B સાચું), અને એન્ડ્રોજન પુરુષ લિંગ હોર્મોન તરીકે ક્રિયા કરે છે (D સાચું). પરંતુ એપીનેફ્રિન રક્ત વાહિનીઓને સંકોચિત કરે છે, નહીં કે વિસ્તારે (C ખોટું).", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક નિયંત્રણ અને એકીકરણ", "difficulty": "Hard", "num": 10}, {"question": "એડ્રિનલ કોર્ટેક્સના રેટિક્યુલરિસ ઝોન દ્વારા સ્રાવ થતાં હોર્મોનની ક્રિયા વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) તે પુરુષોમાં દાઢી અને મૂછના વિકાસને પ્રોત્સાહન આપે છે.", "B) તે રક્તમાં કેલ્શિયમના સ્તરને નિયંત્રિત કરે છે.", "C) તે ગ્લુકોઝના ચયાપચયને ઘટાડે છે.", "D) તે પ્રોટીનના સંશ્લેષણને ઘટાડે છે."], "correct": 0, "explanation": "રેટિક્યુલરિસ ઝોન દ્વારા સ્રાવ થતાં એન્ડ્રોજન હોર્મોન (જેમ કે DHEA) પુરુષોમાં દાઢી, મૂછ અને અન્ય લૈંગિક લક્ષણોના વિકાસને પ્રોત્સાહન આપે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) કેલ્શિયમના સ્તરને પેરાથોર્મોન અને કેલ્સીટોનિન નિયંત્રિત કરે છે; C) ગ્લુકોકોર્ટિકોઈડ્સ (જેમ કે કોર્ટિસોલ) ગ્લુકોઝના ચયાપચયને વધારે છે; D) એન્ડ્રોજન પ્રોટીનના સંશ્લેષણને પ્રોત્સાહન આપે છે, ઘટાડે નહીં.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સંકેતન અને નિયંત્રણ", "difficulty": "Hard", "num": 11}, {"question": "એડ્રિનલ મેડ્યુલામાંથી સ્રાવ થતાં એપીનેફ્રિન (એડ્રિનલિન)ની ક્રિયા વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) તે હૃદયના ધબકારા દરને વધારે છે.", "B) તે રક્તવાહિનીઓને સંકોચિત કરે છે, જેથી રક્તચાપ વધે છે.", "C) તે આંતરડાના સ્નાયુઓને શિથિલ કરે છે, જેથી પાચન મંદ પડે છે.", "D) તે રક્તમાં ગ્લુકોઝના સ્તરને ઘટાડે છે."], "correct": 3, "explanation": "એપીનેફ્રિન (એડ્રિનલિન) રક્તમાં ગ્લુકોઝના સ્તરને વધારે છે (ગ્લાઇકોજનોલિસિસ અને ગ્લુકોનિયોજેનેસિસ દ્વારા). બાકીના વિકલ્પો સાચા છે: A) હૃદયના ધબકારા દર વધારે છે; B) રક્તવાહિનીઓને સંકોચિત કરે છે, જેથી રક્તચાપ વધે છે; C) આંતરડાના સ્નાયુઓને શિથિલ કરે છે, જેથી પાચન મંદ પડે છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સંકેતન અને નિયંત્રણ", "difficulty": "Hard", "num": 12}, {"question": "એડ્રિનલ કોર્ટેક્સના હોર્મોન અને તેમની ક્રિયા વિશે નીચેનામાંથી કયું જોડકું ખોટું છે?", "options": ["A) એલ્ડોસ્ટેરોન – રક્તમાં સોડિયમ અને પોટેશિયમના સ્તરને નિયંત્રિત કરે છે.", "B) કોર્ટિસોલ – ગ્લુકોઝના ચયાપચયને નિયંત્રિત કરે છે અને પ્રતિરક્ષા પ્રતિભાવને દબાવે છે.", "C) એન્ડ્રોજન – સ્ત્રીઓમાં લૈંગિક લક્ષણોના વિકાસને પ્રોત્સાહન આપે છે.", "D) એપીનેફ્રિન – રક્તમાં કેલ્શિયમના સ્તરને નિયંત્રિત કરે છે."], "correct": 3, "explanation": "એપીનેફ્રિન એડ્રિનલ મેડ્યુલામાંથી સ્રાવ થાય છે અને રક્તચાપ, હૃદયના ધબકારા દર, અને ગ્લુકોઝના ચયાપચયને નિયંત્રિત કરે છે, પરંતુ કેલ્શિયમના સ્તરને નિયંત્રિત કરતું નથી. બાકીના જોડકાં સાચા છે: A) એલ્ડોસ્ટેરોન રક્તમાં સોડિયમ અને પોટેશિયમના સ્તરને નિયંત્રિત કરે છે; B) કોર્ટિસોલ ગ્લુકોઝના ચયાપચયને નિયંત્રિત કરે છે અને પ્રતિરક્ષા પ્રતિભાવને દબાવે છે; C) એન્ડ્રોજન સ્ત્રીઓમાં લૈંગિક લક્ષણોના વિકાસને પ્રોત્સાહન આપે છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સંકેતન અને નિયંત્રણ", "difficulty": "Hard", "num": 13}, {"question": "એડ્રિનલ ગ્રંથિની ક્રિયા વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) એડ્રિનલ કોર્ટેક્સ અને મેડ્યુલા બંને સંવેદનાતંત્ર દ્વારા નિયંત્રિત થાય છે.", "B) એડ્રિનલ કોર્ટેક્સ હાઇપોથેલામસ દ્વારા સ્રાવ થતાં ACTH દ્વારા નિયંત્રિત થાય છે.", "C) એડ્રિનલ મેડ્યુલા હાઇપોથેલામસ દ્વારા સ્રાવ થતાં CRH દ્વારા નિયંત્રિત થાય છે.", "D) એડ્રિનલ કોર્ટેક્સ અને મેડ્યુલા બંને પિટ્યુટરી ગ્રંથિ દ્વારા નિયંત્રિત થાય છે."], "correct": 1, "explanation": "એડ્રિનલ કોર્ટેક્સ હાઇપોથેલામસ દ્વારા સ્રાવ થતાં CRH (કોર્ટિકોટ્રોપિન-રિલીઝિંગ હોર્મોન) દ્વારા પ્રેરિત થાય છે, જે પિટ્યુટરી ગ્રંથિને ACTH (એડ્રિનોકોર્ટિકોટ્રોપિક હોર્મોન) સ્રાવવા માટે પ્રેરે છે, અને ACTH એડ્રિનલ કોર્ટેક્સને પ્રેરે છે. બાકીના વિકલ્પો ખોટા છે: A) એડ્રિનલ મેડ્યુલા સંવેદનાતંત્ર દ્વારા નિયંત્રિત થાય છે, કોર્ટેક્સ નહીં; C) એડ્રિનલ મેડ્યુલા સંવેદનાતંત્ર દ્વારા નિયંત્રિત થાય છે, CRH દ્વારા નહીં; D) એડ્રિનલ મેડ્યુલા પિટ્યુટરી ગ્રંથિ દ્વારા નિયંત્રિત થતું નથી.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સંકેતન અને નિયંત્રણ", "difficulty": "Hard", "num": 14}, {"question": "એડ્રિનલ ગ્રંથિના કોર્ટેક્સ અને મેડ્યુલા વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) એલ્ડોસ્ટેરોન હોર્મોન ગ્લોમેરુલોસા ઝોનમાંથી સ્રાવ થાય છે અને તે રક્તમાં સોડિયમના સ્તરને ઘટાડે છે.", "B) કોર્ટિસોલ હોર્મોન ફેસિક્યુલેટા ઝોનમાંથી સ્રાવ થાય છે અને તે પ્રોટીનના વિઘટનને ઉત્તેજે છે.", "C) એડ્રિનલ મેડ્યુલામાંથી સ્રાવ થતાં એપીનેફ્રિન અને નોરેપીનેફ્રિન હોર્મોન પીટ્યુટરી ગ્રંથિના નિયંત્રણ હેઠળ સ્રાવ થાય છે.", "D) એડ્રિનલ કોર્ટેક્સના રેટિક્યુલરિસ ઝોનમાંથી સ્રાવ થતાં હોર્મોન મુખ્યત્વે કાર્બોદિતના ચયાપચયને નિયંત્રિત કરે છે."], "correct": 1, "explanation": "વિકલ્પ B સાચો છે કારણ કે કોર્ટિસોલ હોર્મોન એડ્રિનલ કોર્ટેક્સના ફેસિક્યુલેટા ઝોનમાંથી સ્રાવ થાય છે અને તે પ્રોટીનના વિઘટનને ઉત્તેજે છે, જેથી ગ્લુકોઝનું સ્તર જાળવી રાખવામાં મદદ મળે છે. વિકલ્પ A ખોટો છે કારણ કે એલ્ડોસ્ટેરોન રક્તમાં સોડિયમના સ્તરને વધારે છે, ઘટાડે નહીં. વિકલ્પ C ખોટો છે કારણ કે એડ્રિનલ મેડ્યુલાના હોર્મોન પીટ્યુટરી ગ્રંથિના નિયંત્રણ હેઠળ સ્રાવ થતાં નથી, પરંતુ સંવેદનશીલ તંત્રિકા મારફતે નિયંત્રિત થાય છે. વિકલ્પ D ખોટો છે કારણ કે એડ્રિનલ કોર્ટેક્સના રેટિક્યુલરિસ ઝોનમાંથી સ્રાવ થતાં હોર્મોન (જેમ કે એન્ડ્રોજન) મુખ્યત્વે લૈંગિક હોર્મોનની જેમ કામ કરે છે, કાર્બોદિતના ચયાપચયને નહીં.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 15}, {"question": "એડ્રિનલ ગ્રંથિની ક્રિયા વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) એડ્રિનલ કોર્ટેક્સના હોર્મોન લિપિડ અને પ્રોટીનના ચયાપચયને અસર કરે છે.", "B) એડ્રિનલ મેડ્યુલાના હોર્મોન તણાવના પ્રતિભાવમાં ભૂમિકા ભજવે છે.", "C) એડ્રિનલ કોર્ટેક્સના હોર્મોન રક્તચાપને નિયંત્રિત કરતાં નથ વાહિનીઓને સંકોચે છે અને રક્તચાપ વધારે છે.", "C) તે શ્વસન દરને ઘટાડે છે.", "D) તે પેશીઓમાં ગ્લાયકોજનના સંશ્લેષણને પ્રોત્સાહન આપે છે."], "correct": 1, "explanation": "નોરેપીનેફ્રિન રક્તવાહિનીઓને સંકોચે છે અને રક્તચાપ વધારે છે. વિકલ્પ A ખોટો છે કારણ કે નોરેપીનેફ્રિન રક્તવાહિનીઓને પ્રભાવિત કરે છે. વિકલ્પ C ખોટો છે કારણ કે તે શ્વસન દરને ઘટાડતું નથી. વિકલ્પ D ખોટો છે કારણ કે તે ગ્લાયકોજનના સંશ્લેષણને પ્રોત્સાહન આપતું નથી.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક નિયંત્રણ અને સંકલન", "difficulty": "Hard", "num": 27}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
