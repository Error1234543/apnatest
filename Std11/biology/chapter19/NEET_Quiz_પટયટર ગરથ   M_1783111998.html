    <script>

યાશય"], "correct": 0, "explanation": "FSH અને LH ની ક્રિયા સીધી રીતે અંડાશય અને વૃષણ (A) પર થાય છે, જ્યાં તેઓ પ્રજનન કોષોના વિકાસ અને હોર્મોન સ્રાવને ઉત્તેજિત કરે છે. અધિવૃક્ક ગ્રંથિ (B), થાયરોઇડ ગ્રંથિ (C), અને અગ્ન્યાશય (D) આ હોર્મોનની સીધી અસર હેઠળ નથી.", "ncert_ref": "Class XI - પ્રકરણ 22: રસાયણિક સમન્વય અને એકીકરણ", "difficulty": "Hard", "num": 14}, {"question": "પિટ્યુટરી ગ્રંથીના અગ્ર ભાગ દ્વારા સ્રાવાતા પ્રોલેક્ટિન હોર્મોનનું સ્રાવ નીચેનામાંથી કયા હોર્મોન દ્વારા અવરોધાય છે?", "options": ["A) ડોપામિન", "B) સેરોટોનિન", "C) એસિટાઇલકોલિન", "D) હિસ્ટામિન"], "correct": 0, "explanation": "પ્રોલેક્ટિનનું સ્રાવ મુખ્યત્વે ડોપામિન (A) દ્વારા અવરોધાય છે, જે હાઇપોથેલેમસ દ્વારા સ્રાવાતો ન્યુરોહોર્મોન છે. સેરોટોનિન (B), એસિટાઇલકોલિન (C), અને હિસ્ટામિન (D) પ્રોલેક્ટિનના સ્રાવને અવરોધતા નથી.", "ncert_ref": "Class XI - પ્રકરણ 22: રસાયણિક સમન્વય અને એકીકરણ", "difficulty": "Hard", "num": 15}, {"question": "પિટ્યુટરી ગ્રંથીના અગ્ર ભાગ દ્વારા સ્રાવાતા થાયરોઇડ-ઉત્તેજક હોર્મોન (TSH) નું સ્રાવ નિયંત્રિત કરતાં નીચેનામાંથી કયા પદાર્થનો સૌથી મજબૂત અવરોધક પ્રભાવ હોય છે?", "options": ["A) થાયરોક્સિન (T4) અને ટ્રાયઆયોડોથાયરોનિન (T3)", "B) કોર્ટિઝોલ", "C) ઇન્સ્યુલિન", "D) એડ્રિનેલિન"], "correct": 0, "explanation": "થાયરોઇડ-ઉત્તેજક હોર્મોન (TSH) નું સ્રાવ થાયરોઇડ હોર્મોન (T3 અને T4) દ્વારા નેગેટિવ ફીડબેક મેકેનિઝમ દ્વારા નિયંત્રિત થાય છે. જ્યારે રક્તમાં T3 અને T4નું સ્તર વધે છે, ત્યારે હાઇપોથેલેમસ અને પિટ્યુટરી ગ્રંથી પર અવરોધક પ્રભાવ પડે છે, જેના કારણે TSHનું સ્રાવ ઘટે છે. કોર્ટિઝોલ, ઇન્સ્યુલિન અને એડ્રિનેલિનનો TSH પર કોઈ સીધો અવરોધક પ્રભાવ નથી. આમ, A વિકલ્પ યોગ્ય છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સમન્વય અને નિયંત્રણ", "difficulty": "Hard", "num": 16}, {"question": "એક વ્યક્તિમાં પિટ્યુટરી ગ્રંથીના અગ્ર ભાગ દ્વારા સ્રાવાતા વૃદ્ધિ હોર્મોન (GH) નું સ્તર અચાનક વધી જાય છે, પરંતુ તેના કારણે વ્યક્તિની લંબાઈમાં કોઈ વધારો થતો નથી. આ પરિસ્થિતિ માટે નીચેનામાંથી કયું કારણ સૌથી યોગ્ય છે?", "options": ["A) વ્યક્તિ વયસ્ક છે અને એપિફાઇસિયલ પ્લેટ્સ બંધ થઈ ગયા છે", "B) વ્યક્તિને થાયરોઇડ ગ્ર ્ટેરોન ઉત્પાદન માટે ઉત્તેજિત કરે છે, જે પરોક્ષ રીતે સ્પર્મેટોજેનેસિસને ટેકો આપે છે, પરંતુ તે સીધી રીતે સ્પર્મેટોજેનેસિસને ઉત્તેજિત કરતું નથી. વિકલ્પ A, B અને C LH ની સાચી ક્રિયાઓ દર્શાવે છે. વિકલ્પ D ખોટો છે કારણ કે LH સીધી રીતે સ્પર્મેટોજેનેસિસને ઉત્તેજિત કરતું નથી.", "ncert_ref": "કક્ષા 12 - પ્રકરણ 3: માનવ પ્રજનન", "difficulty": "Hard", "num": 28}, {"question": "એક દર્દીમાં પિટ્યુટરી ગ્રંથીના અગ્ર ભાગમાંથી સ્રાવાતા થાઇરોઇડ-ઉત્તેજક હોર્મોન (TSH)નું સ્તર સામાન્ય છે, પરંતુ થાઇરોઇડ હોર્મોનનું સ્તર ઓછું છે. આ પરિસ્થિતિ માટે નીચેનામાંથી કયું કારણ સંભવિત નથી?", "options": ["A) થાઇરોઇડ ગ્રંથિમાં TSH સ્વીકારકોની ખામી", "B) હાઇપોથેલેમસમાંથી થાઇરોટ્રોપિન-રિલીઝિંગ હોર્મોન (TRH)નું અતિશય ઉત્પાદન", "C) થાઇરોઇડ ગ્રંથિમાં આયોડિનની ઉણપ", "D) થાઇરોઇડ હોર્મોનના સ્વીકારકોની ખામી"], "correct": 1, "explanation": "જો હાઇપોથેલેમસમાંથી TRH નું અતિશય ઉત્પાદન થાય, તો તે TSH ના સ્તરમાં વધારો કરશે, જે આ કિસ્સામાં સામાન્ય છે. તેથી, વિકલ્પ B સંભવિત કારણ નથી. વિકલ્પ A, C અને D થાઇરોઇડ હોર્મોનના ઓછા સ્તર માટે સંભવિત કારણો છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 22: રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 29}, {"question": "એક દર્દીમાં પિટ્યુટરી ગ્રંથીના અગ્ર ભાગ દ્વારા સ્રાવાતા હોર્મોન પૈકી એક હોર્મોનનું સ્તર અતિશય વધી જાય છે, જેના પરિણામે નીચેનામાંથી કયું લક્ષણ જોવા મળે તેવી શક્યતા સૌથી ઓછી છે?", "options": ["A) અતિશય વૃદ્ધિ (Gigantism) અથવા અક્રોમેગાલી જો વૃદ્ધિ પ્લેટ બંધ થઈ ગઈ હોય", "B) ગર્ભાશયના સંકોચનમાં વધારો અને દૂધ સ્ત્રાવમાં વધારો", "C) થાઇરોઇડ ગ્રંથિના કાર્યમાં વધારો અને ચયાપચય દરમાં વધારો", "D) એડ્રિનલ કોર્ટેક્સમાંથી કોર્ટિસોલનું અતિશય ઉત્પાદન અને કુશિંગ સિન્ડ્રોમ"], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે. પિટ્યુટરી ગ્રંથીના અગ્ર ભાગ દ્વારા સ્રાવાતા હોર્મોનમાં વૃદ્ધિ હોર્મોન (GH), થાઇરોઇડ-ઉત્તેજક હોર્મોન (TSH), એડ્રિનોકોર્ટિકોટ્રોપિક હોર્મોન (ACTH) અને પ્રોલેક્ટિનનો સમાવેશ થાય છે. પ્રોલેક્ટિન હોર્મોન દૂધ સ્ત્રાવને ઉત્તેજિત કરે છે, પરંતુ ગર્ભાશયના સંકોચનમાં વધારો કરતું નથી. ગર્ભાશયના સંકોચન માટે ઓક્સિટોસિન હોર્મોન જવાબદાર છે, જે પિટ્યુટરી ગ્રંથીના પશ્ચ ભાગ દ્વારા સ્રાવાતું હોય છે. તેથી, પ્રોલેક્ટિનનું સ્તર વધવાથી ગર્ભાશયના સંકોચનમાં વધારો થવાની શક્યતા સૌથી ઓછી છે.\n\nવિકલ્પ A: વૃદ્ધિ હોર્મોન (GH)નું સ્તર વધવાથી અતિશય વૃદ્ધિ અથવા અક્રોમેગાલી થઈ શકે છે.\nવિકલ્પ C: થાઇરોઇડ-ઉત્તેજક હોર્મોન (TSH)નું સ્તર વધવાથી થાઇરોઇડ ગ્રંથિના કાર્યમાં વધારો અને ચયાપચય દરમાં વધારો થઈ શકે છે.\nવિકલ્પ D: એડ્રિનોકોર્ટિકોટ્રોપિક હોર્મોન (ACTH)નું સ્તર વધવાથી એડ્રિનલ કોર્ટેક્સમાંથી કોર્ટિસોલનું અતિશય ઉત્પાદન અને કુશિંગ સિન્ડ્રોમ થઈ શકે છે.", "ncert_ref": "કક્ષા 11 - અધ્યાય 22: રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 30}, {"question": "એક દર્દીમાં પિટ્યુટરી ગ્રંથીના અગ્ર ભાગ દ્વારા સ્રાવાતા વૃદ્ધિ હોર્મોન (GH)નું સ્તર સામાન્ય કરતાં ઓછું હોય છે, તો નીચેનામાંથી કયું લક્ષણ સૌથી યોગ્ય રીતે જોવા મળશે?", "options": ["A) અતિશય વૃદ્ધિ (ગિગેન્ટિઝમ)", "B) બાળકોમાં વામનતા (ડ્વાર્ફિઝમ)", "C) અતિશય તરસ અને મૂત્રવિસર્જન", "D) ત્વચાનું કાળું પડવું (હાઇપરપિગમેન્ટેશન)"], "correct": 1, "explanation": "વૃદ્ધિ હોર્મોન (GH)ની ઉણપ બાળકોમાં વામનતા (ડ્વાર્ફિઝમ) તરફ દોરી જાય છે. અતિશય વૃદ્ધિ GHના અતિશય સ્તરને કારણે થાય છે, અતિશય તરસ અને મૂત્રવિસર્જન ADHની ઉણપ સાથે સંબંધિત છે, અને ત્વચાનું કાળું પડવું ACTH અથવા MSHના અતિશય સ્તર સાથે સંબંધિત છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સમન્વય અને નિયંત્રણ", "difficulty": "Hard", "num": 31}, {"question": "નીચેનામાંથી કયું જોડકું પિટ્યુટરી ગ્રંથીના હોર્મોન અને તેના લક્ષ્ય અંગ વચ્ચે યોગ્ય રીતે જોડાયેલું નથી?", "options": ["A) વૃદ્ધિ હોર્મોન (GH) – યકૃત અને હાડકાં", "B) થાયરોઇડ-ઉત્તેજક હોર્મોન (TSH) – થાયરોઇડ ગ્રંથી", "C) એડ્રિનોકોર્ટિકોટ્રોપિક હોર્મોન (ACTH) – એડ્રિનલ મેડ્યુલા", "D) ફોલિકલ-ઉત્તેજક હોર્મોન (FSH) – અંડાશય અને વૃષણ"], "correct": 2, "explanation": "ACTH એ એડ્રિનલ કોર્ટેક્સ (બાહ્ય પડ) ને લક્ષ્ય કરે છે, ન કે એડ્રિનલ મેડ્યુલા (અંતર્ગત પડ). એડ્રિનલ મેડ્યુલા એપિનેફ્રિન અને નોરેપિનેફ્રિન સ્રાવે છે, જે પિટ્યુટરી ગ્રંથીના હોર્મોન દ્વારા નિયંત્રિત થતું નથી. A, B, અને D જોડકાં યોગ્ય છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સમન્વય અને એકીકરણ", "difficulty": "Hard", "num": 32}, {"question": "એક દર્દીમાં હાઇપોથેલેમસ દ્વારા ઉત્પન્ન થતા ગોનેડોટ્રોપિન-રિલીઝિંગ હોર્મોન (GnRH)નું સ્તર સામાન્ય છે, પરંતુ પિટ્યુટરી ગ્રંથીના અગ્ર ભાગમાંથી ફોલિકલ-ઉત્તેજક હોર્મોન (FSH) અને લ્યુટિનાઇઝિંગ હોર્મોન (LH)નું સ્તર અસામાન્ય રીતે નીચું જોવા મળે છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું કારણ સૌથી વધુ સંભવિત છે?", "options": ["A) પિટ્યુટરી ગ્રંથીના અગ્ર ભાગમાં ગોનેડોટ્રોપિન ઉત્પન્ન કરતા કોષોની સંખ્યામાં ઘટાડો", "B) હાઇપોથેલેમસમાંથી કોર્ટિકોટ્રોપિન-રિલીઝિંગ હોર્મોન (CRH)નું અતિશય ઉત્પાદન", "C) પિટ્યુટરી ગ્રંથીના અગ્ર ભાગમાંથી પ્રોલેક્ટિન હોર્મોનનું અતિશય ઉત્પાદન", "D) થાઇરોઇડ ગ્રંથિમાંથી થાઇરોક્સિન હોર્મોનનું અતિશય ઉત્પાદન"], "correct": 0, "explanation": "ગોનેડોટ્રોપિન-રિલીઝિંગ હોર્મોન (GnRH) હાઇપોથેલેમસ દ્વારા ઉત્પન્ન થાય છે અને પિટ્યુટરી ગ્રંથીના અગ્ર ભાગમાં ગોનેડોટ્રોપિન ઉત્પન્ન કરતા કોષોને ઉત્તેજિત કરે છે, જે FSH અને LHનું સ્રાવ કરે છે. જો GnRHનું સ્તર સામાન્ય છે પરંતુ FSH અને LHનું સ્તર નીચું છે, તો તે સૂચવે છે કે પિટ્યુટરી ગ્રંથીના અગ્ર ભાગમાં ગોનેડોટ્રોપિન ઉત્પન્ન કરતા કોષોની સંખ્યામાં ઘટાડો થયો છે અથવા તેમનું કાર્ય બગડ્યું છે. વિકલ્પ B, C અને Dમાં દર્શાવેલ હોર્મોન GnRH, FSH અને LHના નિયમન સાથે સીધો સંબંધ ધરાવતા નથી.", "ncert_ref": "કક્ષા 11 - અધ્યાય 22: રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 33}, {"question": "એક દર્દીને ડાયાબિટીસ ઇન્સિપિડસનું નિદાન થયું છે, જે વેસોપ્રેસિન (ADH) હોર્મોનની ઉણપને કારણે થાય છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) દર્દીના મૂત્રનું પ્રમાણ વધી જશે અને તે પાતળું (હાઇપોટોનિક) હશે.", "B) દર્દીને તરસ વધુ લાગશે અને તે વધુ પાણી પીશે.", "C) દર્દીના રક્તમાં સોડિયમનું સ્તર વધી જશે કારણ કે કિડની દ્વારા પાણીનું પુનઃશોષણ ઘટશે.", "D) દર્દીના શરીરમાં પાણીનું પ્રમાણ વધી જશે કારણ કે કિડની દ્વારા પાણીનું ઉત્સર્જન ઘટશે."], "correct": 3, "explanation": "ડાયાબિટીસ ઇન્સિપિડસમાં વેસોપ્રેસિન (ADH)ની ઉણપને કારણે કિડની દ્વારા પાણીનું પુનઃશોષણ ઘટે છે, જેના પરિણામે મૂત્રનું પ્રમાણ વધે છે અને તે પાતળું (હાઇપોટોનિક) બને છે. આથી દર્દીને તરસ વધુ લાગે છે અને તે વધુ પાણી પીએ છે. રક્તમાં સોડિયમનું સ્તર વધે છે કારણ કે પાણીનું પુનઃશોષણ ઘટે છે. વિકલ્પ D ખોટું છે કારણ કે દર્દીના શરીરમાં પાણીનું પ્રમાણ ઘટે છે, વધતું નથી.", "ncert_ref": "કક્ષા 11 - અધ્યાય 22: રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 34}, {"question": "એક વ્યક્તિમાં પિટ્યુટરી ગ્રંથીના અગ્ર ભાગ દ્વારા સ્રાવાતા પ્રોલેક્ટિન હોર્મોનનું સ્તર અતિશય વધી જાય છે. આ સ્થિતિમાં નીચેનામાંથી કયું પરિણામ સૌથી યોગ્ય રીતે અપેક્ષિત નથી?", "options": ["A) સ્તનગ્રંથિમાં દૂધ ઉત્પાદન વધશે", "B) પુરુષોમાં લૈંગિક ઇચ્છામાં ઘટાડો થશે", "C) મહિલાઓમાં ઓવ્યુલેશન વધશે", "D) પુરુષ અને મહિલાઓમાં બાંધ્યપણું થઈ શકે છે"], "correct": 2, "explanation": "પ્રોલેક્ટિન હોર્મોન સ્તનગ્રંથિમાં દૂધ ઉત્પાદનને ઉત્તેજિત કરે છે, પુરુષોમાં લૈંગિક ઇચ્છા અને ટેસ્ટોસ્ટેરોનના સ્તરને ઘટાડે છે, અને મહિલાઓમાં ઓવ્યુલેશનને દબાવે છે. અતિશય પ્રોલેક્ટિન સ્તરને લીધે બાંધ્યપણું થઈ શકે છે. પરંતુ પ્રોલેક્ટિન ઓવ્યુલેશનને દબાવે છે, નહીં કે વધારે. તેથી, વિકલ્પ C યોગ્ય નથી.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક નિયંત્રણ અને સંકલન", "difficulty": "Hard", "num": 35}, {"question": "પિટ્યુટરી ગ્રંથીના હોર્મોન અને તેમના લક્ષ્ય અંગો વિશે નીચેનામાંથી કયું જોડકું અયોગ્ય છે?", "options": ["A) વૃદ્ધિ હોર્મોન (GH) - યકૃત", "B) થાયરોઇડ-ઉત્તેજક હોર્મોન (TSH) - થાયરોઇડ ગ્રંથી", "C) એડ્રિનોકોર્ટિકોટ્રોપિક હોર્મોન (ACTH) - અડ્રિનલ કોર્ટેક્સ", "D) ફોલિકલ-ઉત્તેજક હોર્મોન (FSH) - અંડાશય અને વૃષણ"], "correct": 0, "explanation": "વૃદ્ધિ હોર્મોન (GH) સીધો જ લક્ષ્ય અંગો પર ક્રિયા કરે છે, પરંતુ તે યકૃતને ઉત્તેજિત કરે છે જેથી યકૃત દ્વારા ઇન્સ્યુલિન-જેવા વૃદ્ધિ ફેક્ટર (IGF-1)નું સ્રાવ થાય, જે વૃદ્ધિને પ્રોત્સાહન આપે છે. તેથી, GHનું લક્ષ્ય અંગ યકૃત નથી, પરંતુ તે સીધો જ કોષો પર ક્રિયા કરે છે. બાકીના જોડકાં યોગ્ય છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક નિયંત્રણ અને સંકલન", "difficulty": "Hard", "num": 36}, {"question": "એક દર્દીમાં પિટ્યુટરી ગ્રંથીના પશ્ચ ભાગ દ્વારા સ્રાવાતા વેસોપ્રેસિન (ADH) હોર્મોનની ઉણપ છે. આ સ્થિતિમાં નીચેનામાંથી કયું લક્ષણ સૌથી યોગ્ય રીતે જોવા મળશે?", "options": ["A) રક્તમાં કેલ્શિયમનું સ્તર વધશે", "B) મૂત્રનું પ્રમાણ ઘટશે અને મૂત્રનું સાંદ્રણ વધશે", "C) મૂત્રનું પ્રમાણ વધશે અને મૂત્રનું સાંદ્રણ ઘટશે", "D) રક્તમાં સોડિયમનું સ્તર ઘટશે"], "correct": 2, "explanation": "વેસોપ્રેસિન (ADH) હોર્મોન મૂત્રપિંડની કલેક્ટિંગ ડક્ટ્સ પર ક્રિયા કરે છે અને પાણીના પુનઃશોષણને વધારે છે, જેથી મૂત્રનું પ્રમાણ ઘટે છે અને મૂત્રનું સાંદ્રણ વધે છે. ADHની ઉણપને લીધે મૂત્રનું પ્રમાણ વધશે અને મૂત્રનું સાંદ્રણ ઘટશે. રક્તમાં કેલ્શિયમ અને સોડિયમના સ્તર પર ADHની સીધી અસર થતી નથી. તેથી, વિકલ્પ C સૌથી યોગ્ય છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક નિયંત્રણ અને સંકલન", "difficulty": "Hard", "num": 37}, {"question": "એક વ્યક્તિમાં પિટ્યુટરી ગ્રંથીના અગ્ર ભાગમાં ટ્યુમર હોવાને લીધે અતિશય પ્રોલેક્ટિન હોર્મોનનું સ્રાવ થાય છે. આ સ્થિતિમાં નીચેનામાંથી કયું લક્ષણ જોવા મળશે નહીં?", "options": ["A) સ્તનોમાં દૂધ ઉત્પાદન (ગેલેક્ટોરિયા)", "B) પુરુષોમાં લૈંગિક ઇચ્છામાં ઘટાડો", "C) સ્ત્રીઓમાં માસિક ચક્ર બંધ થવું (એમેનોરિયા)", "D) રક્તમાં ગ્લુકોઝનું સ્તર વધવું (હાઇપરગ્લાઇસીમિયા)"], "correct": 3, "explanation": "પ્રોલેક્ટિન હોર્મોનનું અતિશય સ્રાવ સ્તનોમાં દૂધ ઉત્પાદન (ગેલેક્ટોરિયા), પુરુષોમાં લૈંગિક ઇચ્છામાં ઘટાડો અને સ્ત્રીઓમાં માસિક ચક્ર બંધ થવું (એમેનોરિયા) જેવા લક્ષણો તરફ દોરી જાય છે. પરંતુ રક્તમાં ગ્લુકોઝનું સ્તર વધવું (હાઇપરગ્લાઇસીમિયા) એ વૃદ્ધિ હોર્મોન (GH) અથવા કોર્ટિસોલ જેવા હોર્મોનની અસર છે, પ્રોલેક્ટિનની નહીં. તેથી, D વિકલ્પ યોગ્ય જવાબ છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક નિયંત્રણ અને સમન્વય", "difficulty": "Hard", "num": 38}, {"question": "એક દર્દીમાં હાઇપોથેલેમસ દ્વારા ઉત્પન્ન થતા થાઇરોટ્રોપિન-રિલીઝિંગ હોર્મોન (TRH)નું સ્તર સામાન્ય છે, પરંતુ પિટ્યુટરી ગ્રંથીના અગ્ર ભાગમાંથી થાઇરોઇડ-ઉત્તેજક હોર્મોન (TSH)નું સ્તર અસામાન્ય રીતે નીચું જોવા મળે છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું વિધાન સૌથી વધુ યોગ્ય છે?", "options": ["A) દર્દીને પ્રાથમિક હાઇપોથાઇરોડિઝમ છે, કારણ કે થાઇરોઇડ ગ્રંથિ પૂરતા પ્રમાણમાં થાઇરોક્સિન (T₄) ઉત્પન્ન કરી શકતી નથી.", "B) દર્દીને દ્વિતીયક હાઇપોથાઇરોડિઝમ છે, કારણ કે પિટ્યુટરી ગ્રંથિ TSH ઉત્પન્ન કરવામાં નિષ્ફળ જાય છે.", "C) દર્દીને તૃતીયક હાઇપોથાઇરોડિઝમ છે, કારણ કે હાઇપોથેલેમસ TRH ઉત્પન્ન કરવામાં નિષ્ફળ જાય છે.", "D) દર્દીને હાઇપરથાઇરોડિઝમ છે, કારણ કે થાઇરોઇડ ગ્રંથિ અતિશય સક્રિય છે અને TSH નું સ્તર નીચું છે."], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે. હાઇપોથેલેમસમાંથી TRH નું સ્તર સામાન્ય છે, જે દર્શાવે છે કે સમસ્યા હાઇપોથેલેમસમાં નથી. પરંતુ પિટ્યુટરી ગ્રંથિમાંથી TSH નું સ્તર નીચું છે, જે દર્શાવે છે કે પિટ્યુટરી ગ્રંથિ TSH ઉત્પન્ન કરવામાં નિષ્ફળ જાય છે. આ પરિસ્થિતિને દ્વિતીયક હાઇપોથાઇરોડિઝમ કહેવાય છે. \n\nવિકલ્પ A ખોટો છે કારણ કે પ્રાથમિક હાઇપોથાઇરોડિઝમમાં થાઇરોઇડ ગ્રંથિની ખામીને કારણે TSH નું સ્તર વધારે હોય છે. \n\nવિકલ્પ C ખોટો છે કારણ કે તૃતીયક હાઇપોથાઇરોડિઝમમાં હાઇપોથેલેમસમાંથી TRH નું સ્તર નીચું હોય છે, જે અહીં નથી. \n\nવિકલ્પ D ખોટો છે કારણ કે હાઇપરથાઇરોડિઝમમાં TSH નું સ્તર સામાન્ય રીતે નીચું હોય છે, પરંતુ થાઇરોક્સિનનું સ્તર વધારે હોય છે, જે અહીં સૂચવવામાં આવ્યું નથી.", "ncert_ref": "Class XII - પ્રકરણ 11: રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 39}, {"question": "નીચેનામાંથી કયું વિધાન પિટ્યુટરી ગ્રંથીના અગ્ર ભાગ અને પશ્ચ ભાગ વચ્ચેના તફાવત વિશે સત્ય છે?", "options": ["A) અગ્ર ભાગ હોર્મોનનું ઉત્પાદન કરે છે, જ્યારે પશ્ચ ભાગ હોર્મોનનું સંગ્રહ અને સ્રાવ કરે છે", "B) અગ્ર ભાગ અને પશ્ચ ભાગ બંને હોર્મોનનું ઉત્પાદન કરે છે", "C) પશ્ચ ભાગ હોર્મોનનું ઉત્પાદન કરે છે, જ્યારે અગ્ર ભાગ હોર્મોનનું સંગ્રહ કરે છે", "D) અગ્ર ભાગ અને પશ્ચ ભાગ બંને હાયપોથેલેમસ દ્વારા નિયંત્રિત થતા નથી"], "correct": 0, "explanation": "પિટ્યુટરી ગ્રંથીનો અગ્ર ભાગ (એડિનોહાઇપોફાઇસિસ) હોર્મોનનું ઉત્પાદન કરે છે, જ્યારે પશ્ચ ભાગ (ન્યુરોહાઇપોફાઇસિસ) હાયપોથેલેમસ દ્વારા ઉત્પન્ન થતા હોર્મોન (ઓક્સિટોસિન અને વેસોપ્રેસિન)નું સંગ્રહ અને સ્રાવ કરે છે. બાકીના વિકલ્પો અયોગ્ય છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 40}, {"question": "પિટ્યુટરી ગ્રંથીના પશ્ચ ભાગ દ્વારા સ્રાવાતા હોર્મોન વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) ઓક્સિટોસિન ગર્ભાવસ્થા દરમિયાન ગર્ભાશયના સંકોચનને ઉત્તેજિત કરે છે.", "B) વેસોપ્રેસિન (ADH) મૂત્રના જથ્થામાં ઘટાડો કરે છે.", "C) ઓક્સિટોસિન સ્તન ગ્રંથિઓમાંથી દૂધના સ્રાવને ઉત્તેજિત કરે છે.", "D) વેસોપ્રેસિન (ADH) રક્તચાપને ઘટાડવા માટે જવાબદાર છે."], "correct": 3, "explanation": "વેસોપ્રેસિન (ADH) મૂત્રના જથ્થામાં ઘટાડો કરે છે અને રક્તચાપને વધારવા માટે જવાબદાર છે, રક્તચાપ ઘટાડવા માટે નહીં. ઓક્સિટોસિન ગર્ભાશયના સંકોચન અને દૂધના સ્રાવને ઉત્તેજિત કરે છે, જે સત્ય છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સંકેતન અને નિયંત્રણ", "difficulty": "Hard", "num": 41}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
