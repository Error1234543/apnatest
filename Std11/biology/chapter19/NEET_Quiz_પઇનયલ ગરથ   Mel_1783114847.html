    <script>
        const questionsData = [{"question": "પાઇનિયલ ગ્રંથિ દ્વારા સ્રાવવામાં આવતા મેલેટોનિન હોર્મોનનો સ્રાવ કયા પરિબળ દ્વારા સૌથી વધુ પ્રભાવિત થાય છે?", "options": ["A) રક્તમાં ગ્લુકોઝનું સ્તર", "B) પ્રકાશની તીવ્રતા અને દિવસ-રાતના ચક્ર", "C) તાપમાનમાં થતા ફેરફાર", "D) રક્તમાં ઓક્સિજનનું સ્તર"], "correct": 1, "explanation": "મેલેટોનિન હોર્મોનનો સ્રાવ મુખ્યત્વે પ્રકાશની તીવ્રતા અને દિવસ-રાતના ચક્ર (સર્કેડિયન રિધમ) દ્વારા નિયંત્રિત થાય છે. પાઇનિયલ ગ્રંથિ અંધારામાં વધુ મેલેટોનિન સ્રાવે છે, જ્યારે પ્રકાશમાં તેનો સ્રાવ ઘટે છે. રક્તમાં ગ્લુકોઝ, તાપમાન અથવા ઓક્સિજનનું સ્તર મેલેટોનિનના સ્રાવ પર સીધો પ્રભાવ પાડતું નથી.", "ncert_ref": "Class XI - Chapter 22: ચેતાતંત્ર અને નિયંત્રણ અને સમન્વય", "difficulty": "Hard", "num": 1}, {"question": "જો કોઈ વ્યક્તિના પાઇનિયલ ગ્રંથિને નષ્ટ કરવામાં આવે, તો તેના પર કયો પ્રભાવ પડશે?", "options": ["A) તેને નિદ્રા-જાગૃતિ ચક્રમાં વિક્ષેપ પડશે", "B) તેના શરીરમાં કેલ્શિયમનું સ્તર ઘટશે", "C) તેના હૃદયના ધબકારા અનિયમિત બનશે", "D) તેના શરીરમાં ઇન્સ્યુલિનનું સ્રાવ બંધ થશે"], "correct": 0, "explanation": "પાઇનિયલ ગ્રંથિ મેલેટોનિન હોર્મોન સ્રાવે છે, જે નિદ્રા-જાગૃતિ ચક્ર (સર્કેડિયન રિધમ)ને નિયંત્રિત કરવામાં મહત્વની ભૂમિકા ભજવે છે. પાઇનિયલ ગ્રંથિના નાશથી નિદ્રા-જાગૃતિ ચક્રમાં વિક્ષેપ પડશે. કેલ્શિયમનું સ્તર, હૃદયના ધબકારા અથવા ઇન્સ્યુલિનનું સ્રાવ પાઇનિયલ ગ્રંથિ સાથે સીધા સંબંધ ધરાવતું નથી.", "ncert_ref": "Class XI - Chapter 22: ચેતાતંત્ર અને નિયંત્રણ અને સમન્વય", "difficulty": "Hard", "num": 2}, {"question": "મેલેટોનિન હોર્મોનનો સ્રાવ કયા અંગ દ્વારા નિયંત્રિત થાય છે?", "options": ["A) હાઇપોથેલામસ", "B) પિટ્યુટરી ગ્રંથિ", "C) સુપ્રકિયાસ્મેટિક ન્યુક્લિયસ (SCN)", "D) એડ્રિનલ ગ્રંથિ"], "correct": 2, "explanation": "મેલેટોનિનના સ્રાવનું નિયંત્રણ સુપ્રકિયાસ્મેટિક ન્યુક્લિયસ (SCN) દ્વારા થાય છે, જે હાઇપોથેલામસમાં સ્થિત છે અને જૈવિક ઘડિયાળ (biological clock) તરીકે કામ કરે છે. હાઇપોથેલામસ અને પિટ્યુટરી ગ્રંથિ મેલેટોનિનના સ્રાવમાં અપ્રત્યક્ષ રીતે ભાગ લે છે, પરંતુ SCN સીધું નિયંત્રણ કરે છે. એડ્રિનલ ગ્રંથિ મેલેટોનિન સાથે સંબંધિત નથી.", "ncert_ref": "Class XI - Chapter 22: ચેતાતંત્ર અને નિયંત્રણ અને સમન્વય", "difficulty": "Hard", "num": 3}, {"question": "નીચેનામાંથી કયું વિધાન મેલેટોનિન હોર્મોન વિશે સાચું નથી?", "options": ["A) તે પાઇનિયલ ગ્રંથિ દ્વારા સ્રાવવામાં આવે છે", "B) તે ટ્રિપ્ટોફેન એમિનો એસિડમાંથી સંશ્લેષિત થાય છે", "C) તે રક્તમાં ગ્લુકોઝનું સ્તર વધારે છે", "D) તે એન્ટીઓક્સીડન્ટ તરીકે કામ કરે છે"], "correct": 2, "explanation": "મેલેટોનિન પાઇનિયલ ગ્રંથિ દ્વારા સ્રાવવામાં આવે છે અને ટ્રિપ્ટોફેન એમિનો એસિડમાંથી સંશ્લેષિત થાય છે. તે એન્ટીઓક્સીડન્ટ તરીકે પણ કામ કરે છે. પરંતુ તે રક્તમાં ગ્લુકોઝનું સ્તર વધારતું નથી, તે મુખ્યત્વે નિદ્રા-જાગૃતિ ચક્રને નિયંત્રિત કરે છે.", "ncert_ref": "Class XI - Chapter 22: ચેતાતંત્ર અને નિયંત્રણ અને સમન્વય", "difficulty": "Hard", "num": 4}, {"question": "જૈવિક ઘડિયાળ (biological clock) ની કાર્યપદ્ધતિમાં કયા હોર્મોનનો સૌથી મહત્વનો ફાળો છે?", "options": ["A) કોર્ટિસોલ", "B) મેલેટોનિન", "C) થાઇરોક્સિન", "D) ઇન્સ્યુલિન"], "correct": 1, "explanation": "જૈવિક ઘડિયાળ (biological clock) ની કાર્યપદ્ધતિમાં મેલેટોનિન હોર્મોનનો સૌથી મહત્વનો ફાળો છે, કારણ કે તે નિદ્રા-જાગૃતિ ચક્રને નિયંત્રિત કરે છે. કોર્ટિસોલ, થાઇરોક્સિન અને ઇન્સ્યુલિન અન્ય શારીરિક પ્રક્રિયાઓમાં ભૂમિકા ભજવે છે, પરંતુ જૈવિક ઘડિયાળ સાથે સીધો સંબંધ ધરાવતા નથી.", "ncert_ref": "Class XI - Chapter 22: ચેતાતંત્ર અને નિયંત્રણ અને સમન્વય", "difficulty": "Hard", "num": 5}, {"question": "પાઇનિયલ ગ્રંથિ દ્વારા મેલેટોનિનના સ્રાવમાં કયા ન્યુરોટ્રાન્સમીટરનો સીધો સંબંધ છે, જે સર્કેડિયન લયને નિયંત્રિત કરવામાં મહત્વની ભૂમિકા ભજવે છે?", "options": ["A) ડોપામિન", "B) સેરોટોનિન", "C) એસિટાઇલકોલિન", "D) ગાબા (GABA)"], "correct": 1, "explanation": "મેલેટોનિનનું સ્રાવ સેરોટોનિન પરથી થાય છે, જે પાઇનિયલ ગ્રંથિમાં સેરોટોનિનને મેલેટોનિનમાં રૂપાંતરિત કરવા માટે ઉત્સેચકો દ્વારા પરિવર્તિત થાય છે. સેરોટોનિન સર્કેડિયન લયને નિયંત્રિત કરવામાં મહત્વની ભૂમિકા ભજવે છે. ડોપામિન, એસિટાઇલકોલિન અને ગાબા આ પ્રક્રિયામાં સીધો સંબંધ ધરાવતા નથી.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક નિયંત્રણ અને સમન્વય", "difficulty": "Hard", "num": 6}, {"question": "જો કોઈ વ્યક્તિ રાત્રે પ્રક  છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક નિયંત્રણ અને સમન્વય", "difficulty": "Hard", "num": 9}, {"question": "પાઇનિયલ ગ્રંથિ દ્વારા મેલેટોનિનના સ્રાવમાં નીચેનામાંથી કયો પરિબળ સૌથી મહત્વનો ભૂમિકા ભજવે છે, જ્યારે વ્યક્તિ ઉચ્ચ અક્ષાંશ (high latitude) વિસ્તારમાં રહે છે, જ્યાં દિવસ અને રાતની અવધિમાં મોટા ફેરફાર થાય છે?", "options": ["A) તાપમાનમાં થતો દૈનિક ફેરફાર", "B) પ્રકાશની તીવ્રતા અને અવધિ", "C) આહારમાં મેલેટોનિન-સમૃદ્ધ ખોરાકનો સમાવેશ", "D) ચુંબકીય ક્ષેત્રમાં થતા ફેરફાર"], "correct": 1, "explanation": "પાઇનિયલ ગ્રંથિ દ્વારા મેલેટોનિનના સ્રાવનું નિયમન મુખ્યત્વે પ્રકાશની તીવ્રતા અને અવધિ દ્વારા થાય છે. ઉચ્ચ અક્ષાંશ વિસ્તારોમાં, દિવસ અને રાતની અવધિમાં મોટા ફેરફાર થવાથી જૈવિક ઘડિયાળ (સર્કેડિયન રિધમ) પર અસર પડે છે, જે મેલેટોનિનના સ્રાવને નિયંત્રિત કરે છે. તાપમાન (A), આહાર (C), અને ચુંબકીય ક્ષેત્ર (D) મેલેટોનિનના સ્રાવ પર સીધી અસર કરતા નથી, પરંતુ પ્રકાશ જ એ મુખ્ય પરિબળ છે જે પાઇનિયલ ગ્રંથિને પ્રભાવિત કરે છે.", "ncert_ref": "Class XI - Chapter 22: ચેતાતંત્ર અને નિયંત્રણ અને સમન્વય", "difficulty": "Hard", "num": 10}, {"question": "નીચેનામાંથી કયું વિધાન પાઇનિયલ ગ્રંથિ અને મેલેટોનિન વિશે સાચું છે?", "options": ["A) પાઇનિયલ ગ્રંથિ મસ્તિષ્કના પિટ્યુટરી ગ્રંથિની પાછળ સ્થિત છે અને તે મેલેટોનિન સિવાય અન્ય હોર્મોન પણ સ્રાવે છે.", "B) મેલેટોનિન હોર્મોન ટ્રિપ્ટોફેન એમિનો એસિડમાંથી સંશ્લેષિત થાય છે અને તે ફક્ત રાત્રે જ સ્રાવાય છે.", "C) પાઇનિયલ ગ્રંથિની ક્રિયા સંપૂર્ણપણે પ્રકાશ પર આધારિત છે અને અંધારામાં તેની ક્રિયા બંધ થઈ જાય છે.", "D) મેલેટોનિન હોર્મોનનો સ્રાવ સર્કેડિયન લયને અનુકૂળ રીતે બદલી શકાય છે, પરંતુ તે જૈવિક ઘડિયાળને પ્રભાવિત કરતું નથી."], "correct": 1, "explanation": "મેલેટોનિન ટ્રિપ્ટોફેન એમિનો એસિડમાંથી સંશ્લેષિત થાય છે અને તે મુખ્યત્વે રાત્રે સ્રાવાય છે (B સાચું). A ખોટું છે કારણ કે પાઇનિયલ ગ્રંથિ ફક્ત મેલેટોનિન જ સ્રાવે છે અને તે પિટ્યુટરી ગ્રંથિની ઉપર સ્થિત છે. C ખોટું છે કારણ કે પાઇનિયલ ગ્રંથિની ક્રિયા અંધારામાં વધે છે, પ્રકાશમાં ઘટે છે. D ખોટું છે કારણ કે મેલેટોનિન જૈવિક ઘડિયાળને પ્રભાવિત કરે છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સમન્વય અને નિ  દરમિયાન. SCN કોષકેન્દ્રમાં સીધો સંકેત મોકલતું નથી.", "ncert_ref": "Class XI - Chapter 22: ચેતાતંત્ર અને નિયંત્રણ અને સમન્વય", "difficulty": "Hard", "num": 27}, {"question": "પાઇનિયલ ગ્રંથિ દ્વારા મેલેટોનિનના સ્રાવને અવરોધતા હોર્મોન વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) કોર્ટિસોલ મેલેટોનિનના સ્રાવને અવરોધે છે અને તેનો સ્રાવ દિવસ દરમિયાન સૌથી વધુ હોય છે.", "B) થાયરોક્સિન મેલેટોનિનના સ્રાવને અવરોધે છે અને તેનો સ્રાવ રાત્રે સૌથી વધુ હોય છે.", "C) ઇન્સ્યુલિન મેલેટોનિનના સ્રાવને અવરોધે છે અને તેનો સ્રાવ ભોજન પછી વધે છે.", "D) એડ્રિનેલિન મેલેટોનિનના સ્રાવને અવરોધે છે અને તેનો સ્રાવ તણાવ દરમિયાન વધે છે."], "correct": 0, "explanation": "કોર્ટિસોલ હોર્મોન મેલેટોનિનના સ્રાવને અવરોધે છે અને તેનો સ્રાવ દિવસ દરમિયાન સૌથી વધુ હોય છે. થાયરોક્સિન, ઇન્સ્યુલિન, અને એડ્રિનેલિન મેલેટોનિનના સ્રાવને અવરોધતા નથી. થાયરોક્સિનનો સ્રાવ રાત્રે વધતો નથી, ઇન્સ્યુલિનનો સ્રાવ ભોજન પછી વધે છે, અને એડ્રિનેલિનનો સ્રાવ તણાવ દરમિયાન વધે છે, પરંતુ આમાંથી કોઈ પણ મેલેટોનિનના સ્રાવને અવરોધતું નથી.", "ncert_ref": "Class XI - Chapter 22: ચેતાતંત્ર અને નિયંત્રણ અને સમન્વય", "difficulty": "Hard", "num": 28}, {"question": "જૈવિક ઘડિયાળ (બાયોલોજિકલ ક્લોક) અને મેલેટોનિન વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) જૈવિક ઘડિયાળ 24 કલાકના ચક્રને અનુસરે છે અને તેને સર્કેડિયન લય કહેવાય છે.", "B) મેલેટોનિન જૈવિક ઘડિયાળને નિયમિત કરવામાં મદદ કરે છે અને તેનો સ્રાવ રાત્રે વધે છે.", "C) જૈવિક ઘડિયાળ મગજના હાઇપોથેલામસમાં સ્થિત SCN દ્વારા નિયંત્રિત થાય છે.", "D) મેલેટોનિનનો સ્રાવ દિવસ દરમિયાન સૌથી વધુ હોય છે અને તે જૈવિક ઘડિયાળને અવરોધે છે."], "correct": 3, "explanation": "મેલેટોનિનનો સ્રાવ રાત્રે સૌથી વધુ હોય છે અને તે જૈવિક ઘડિયાળને નિયમિત કરવામાં મદદ કરે છે, ન કે અવરોધે છે. જૈવિક ઘડિયાળ 24 કલાકના ચક્રને અનુસરે છે અને તેને સર્કેડિયન લય કહેવાય છે. જૈવિક ઘડિયાળ મગજના હાઇપોથેલામસમાં સ્થિત SCN દ્વારા નિયંત્રિત થાય છે. મેલેટોનિન જૈવિક ઘડિયાળને નિયમિત કરવામાં મદદ કરે છે અને તેનો સ્રાવ રાત્રે વધે છે.", "ncert_ref": "Class XI - Chapter 22: ચેતાતંત્ર અને નિયંત્રણ અને સમન્વય", "difficulty": "Hard", "num": 29}, {"question": "પાઇનિયલ ગ્રંથિ દ્વારા મેલેટોનિનના સ્રાવને નિયંત્રિત કરતા સુપ્રાકાયાસ્મેટિક ન્યુક્લિયસ (SCN) અને રેટિનાના ફોટોરિસેપ્ટર કોષો વચ્ચેના સંદેશાવ્યવહારમાં નીચેનામાંથી કયો માર્ગ સૌથી મહત્વનો ભૂમિકા ભજવે છે?", "options": ["A) SCN → પારાવેન્ટ્રિક્યુલર ન્યુક્લિયસ → સિમ્પેથેટિક તંત્રિકા → પાઇનિયલ ગ્રંથિ", "B) રેટિના → ઓપ્ટિક તંત્રિકા → હાયપોથેલામસ → પિટ્યુટરી ગ્રંથિ → પાઇનિયલ ગ્રંથિ", "C) રેટિના → SCN → સિમ્પેથેટિક તંત્રિકા → પાઇનિયલ ગ્રંથિ", "D) SCN → હાયપોથેલામસ → પેરાવેન્ટ્રિક્યુલર ન્યુક્લિયસ → પાઇનિયલ ગ્રંથિ"], "correct": 2, "explanation": "સુપ્રાકાયાસ્મેટિક ન્યુક્લિયસ (SCN) જૈવિક ઘડિયાળ તરીકે કાર્ય કરે છે અને રેટિનાથી પ્રકાશના સંકેતો મેળવે છે. આ સંકેતો SCN દ્વારા સિમ્પેથેટિક તંત્રિકા મારફતે પાઇનિયલ ગ્રંથિ સુધી પહોંચાડવામાં આવે છે, જ્યાં મેલેટોનિનના સ્રાવને નિયંત્રિત કરવામાં આવે છે. આમ, વિકલ્પ C સાચો છે. વિકલ્પ A અને Dમાં પારાવેન્ટ્રિક્યુલર ન્યુક્લિયસનો ઉલ્લેખ છે, જે મેલેટોનિનના સ્રાવમાં સીધો ભાગ ભજવતો નથી. વિકલ્પ Bમાં પિટ્યુટરી ગ્રંથિનો ઉલ્લેખ છે, જે મેલેટોનિનના સ્રાવ સાથે સીધો સંબંધ ધરાવતી નથી.", "ncert_ref": "Class XI - Chapter 22: ચેતાતંત્ર અને રસાયણિક સંકેતન", "difficulty": "Hard", "num": 30}, {"question": "પાઇનિયલ ગ્રંથિ દ્વારા મેલેટોનિનના સ્રાવને અવરોધતા ન્યુરોટ્રાન્સમીટર વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) ગાબા (GABA) મેલેટોનિનના સ્રાવને વર્ધાવે છે, કારણ કે તે પાઇનલોસાયટ્સને ઉત્તેજિત કરે છે.", "B) નોરેપીનેફ્રિન (Norepinephrine) રાત્રે મેલેટોનિનના સ્રાવને વર્ધાવે છે, પરંતુ તે સીધો ન્યુરોટ્રાન્સમીટર નથી.", "C) ગ્લુટામેટ મેલેટોનિનના સ્રાવને અવરોધે છે, કારણ કે તે પાઇનલોસાયટ્સ પર અવરોધક પ્રભાવ ધરાવે છે.", "D) સેરોટોનિન મેલેટોનિનના સ્રાવને અવરોધે છે, કારણ કે તે મેલેટોનિનના પૂર્વગામી તરીકે કાર્ય કરે છે."], "correct": 2, "explanation": "ગ્લુટામેટ પાઇનલોસાયટ્સ પર અવરોધક પ્રભાવ ધરાવે છે, જેથી મેલેટોનિનના સ્રાવને અવરોધે છે. ગાબા (GABA) મેલેટોનિનના સ્રાવને વર્ધાવે છે, પરંતુ તે પાઇનલોસાયટ્સને ઉત્તેજિત કરતું નથી. નોરેપીનેફ્રિન રાત્રે મેલેટોનિનના સ્રાવને વર્ધાવે છે, પરંતુ તે ન્યુરોટ્રાન્સમીટર છે અને અવરોધક નથી. સેરોટોનિન મેલેટોનિનના પૂર્વગામી તરીકે કાર્ય કરે છે, પરંતુ તે સ્રાવને અવરોધતું નથી.", "ncert_ref": "Class XI - Chapter 22: ચેતાતંત્ર અને નિયંત્રણ અને સમન્વય", "difficulty": "Hard", "num": 31}, {"question": "નીચેનામાંથી કયું વિધાન પાઇનિયલ ગ્રંથિ દ્વારા મેલેટોનિનના સ્રાવની નિયંત્રણ પ્રક્રિયા વિશે **ખોટું** છે?", "options": ["A) સુપ્રાકાયાસ્મેટિક ન્યુક્લિયસ (SCN) રેટિનાથી પ્રકાશના સંકેતો મેળવીને પાઇનિયલ ગ્રંથિને સંકેતો મોકલે છે.", "B) મેલેટોનિનનો સ્રાવ રાત્રે વધે છે અને દિવસે ઘટે છે, જે સર્કેડિયન લય સાથે સંકળાયેલ છે.", "C) નોરેપિનેફ્રિન નામનો ન્યુરોટ્રાન્સમીટર પાઇનિયલ ગ્રંથિના કોષો પર અવરોધક (inhibitory) અસર કરે છે.", "D) લાંબા સમય સુધી નીલા પ્રકાશના સંપર્કમાં રહેવાથી મેલેટોનિનનો સ્રાવ ઘટે છે."], "correct": 2, "explanation": "સાચો જવાબ વિકલ્પ C છે. નોરેપિનેફ્રિન પાઇનિયલ ગ્રંથિના કોષો પર ઉત્તેજક (excitatory) અસર કરે છે, જે મેલેટોનિનના સ્રાવને પ્રોત્સાહિત કરે છે, અવરોધતું નથી. વિકલ્પ A, B અને D એ NCERT મુજબ સાચાં વિધાનો છે: SCN રેટિનાથી પ્રકાશના સંકેતો મેળવીને પાઇનિયલ ગ્રંથિને નિયંત્રિત કરે છે, મેલેટોનિનનો સ્રાવ રાત્રે વધે છે અને નીલા પ્રકાશના સંપર્કથી તે ઘટે છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 22: રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 32}, {"question": "એક વ્યક્તિને લાંબા સમયથી ઊંઘની સમસ્યા છે અને તે રાત્રે સતત મોબાઇલનો ઉપયોગ કરે છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું પરિણામ **સૌથી વધુ સંભવિત** છે?", "options": ["A) પાઇનિયલ ગ્રંથિ દ્વારા મેલેટોનિનનો સ્રાવ વધશે, જે ઊંઘને પ્રોત્સાહિત કરશે.", "B) સુપ્રાકાયાસ્મેટિક ન્યુક્લિયસ (SCN) ની પ્રવૃત્તિ ઘટશે, જે સર્કેડિયન લયને સ્થિર કરશે.", "C) મેલેટોનિનનો સ્રાવ ઘટશે, જે ઊંઘની ગુણવત્તા અને સમય પર નકારાત્મક અસર કરશે.", "D) પાઇનિયલ ગ્રંથિના કોષોમાં નોરેપિનેફ્રિનનો સ્રાવ વધશે, જે મેલેટોનિનના ઉત્પાદનને ઉત્તેજિત કરશે."], "correct": 2, "explanation": "સાચો જવાબ વિકલ્પ C છે. મોબાઇલના નીલા પ્રકાશના સંપર્કથી રેટિનામાંથી SCN સુધીના સંકેતો મજબૂત બને છે, જે પાઇનિયલ ગ્રંથિ દ્વારા મેલેટોનિનના સ્રાવને અવરોધે છે. આથી ઊંઘની ગુણવત્તા અને સમય પર નકારાત્મક અસર પડે છે. વિકલ્પ A ખોટો છે કારણ કે મેલેટોનિનનો સ્રાવ ઘટે છે. વિકલ્પ B ખોટો છે કારણ કે SCN ની પ્રવૃત્તિ વધે છે, ઘટતી નથી. વિકલ્પ D ખોટો છે કારણ કે નોરેપિનેફ્રિનનો સ્રાવ ઘટે છે, જે મેલેટોનિનના ઉત્પાદનને અવરોધે છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 22: રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 33}, {"question": "એક પ્રયોગમાં, વૈજ્ઞાનિકોએ ઉંદરના સુપ્રાકાયાસ્મેટિક ન્યુક્લિયસ (SCN) ને નષ્ટ કરી દીધો. આ પરિસ્થિતિમાં નીચેનામાંથી કયું પરિણામ **સૌથી વધુ સંભવિત** છે?", "options": ["A) ઉંદરમાં મેલેટોનિનનો સ્રાવ સંપૂર્ણપણે બંધ થઈ જશે.", "B) ઉંદરનો સર્કેડિયન લય અસ્તવ્યસ્ત થઈ જશે, પરંતુ મેલેટોનિનનો સ્રાવ ચાલુ રહેશે.", "C) ઉંદરમાં મેલેટોનિનનો સ્રાવ દિવસે અને રાત્રે સમાન રહેશે, જે સર્કેડિયન લયને નષ્ટ કરશે.", "D) પાઇનિયલ ગ્રંથિ સ્વતંત્ર રીતે મેલેટોનિનનો સ્રાવ કરવાનું ચાલુ રાખશે, જે સર્કેડિયન લયને જાળવી રાખશે."], "correct": 2, "explanation": "સાચો જવાબ વિકલ્પ C છે. SCN એ સર્કેડિયન લયનો મુખ્ય નિયંત્રક છે. જો તેને નષ્ટ કરવામાં આવે, તો મેલેટોનિનનો સ્રાવ દિવસે અને રાત્રે સમાન રહેશે, જે સર્કેડિયન લયને નષ્ટ કરશે. વિકલ્પ A ખોટો છે કારણ કે મેલેટોનિનનો સ્રાવ સંપૂર્ણપણે બંધ થતો નથી, પરંતુ તેનો લય ખોરવાઈ જાય છે. વિકલ્પ B ખોટો છે કારણ કે મેલેટોનિનનો સ્રાવ ચાલુ રહે છે, પરંતુ તેનો લય ખોરવાઈ જાય છે. વિકલ્પ D ખોટો છે કારણ કે પાઇનિયલ ગ્રંથિ સ્વતંત્ર રીતે સર્કેડિયન લય જાળવી શકતી નથી.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 22: રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 34}, {"question": "પાઇનિયલ ગ્રંથિ દ્વારા મેલેટોનિનના સ્રાવને નિયંત્રિત કરતી સર્કેડિયન લય પ્રણાલીમાં, સુપ્રાકાયાસ્મેટિક ન્યુક્લિયસ (SCN) દ્વારા મોકલવામાં આવતા સંકેતો કયા માર્ગ દ્વારા પાઇનિયલ ગ્રંથિ સુધી પહોંચે છે?", "options": ["A) સીધા રીતે હાઇપોથેલામસથી પાઇનિયલ ગ્રંથિ સુધી રક્તવાહિનીઓ દ્વારા", "B) હાઇપોથેલામસ → સ્પાઇનલ કોર્ડ → સિમ્પેથેટિક તંત્રિકા → પાઇનિયલ ગ્રંથિ", "C) હાઇપોથેલામસ → પિટ્યુટરી ગ્રંથિ → રક્તપરિભ્રમણ → પાઇનિયલ ગ્રંથિ", "D) હાઇપોથેલામસ → ઓપ્ટિક કાયાસ્મા → રેટિના → પાઇનિયલ ગ્રંથિ"], "correct": 1, "explanation": "સુપ્રાકાયાસ્મેટિક ન્યુક્લિયસ (SCN) દ્વારા મોકલવામાં આવતા સંકેતો હાઇપોથેલામસથી સ્પાઇનલ કોર્ડ મારફતે સિમ્પેથેટિક તંત્રિકા દ્વારા પાઇનિયલ ગ્રંથિ સુધી પહોંચે છે. આ માર્ગમાં, SCN સિમ્પેથેટિક તંત્રિકા કો  "Hard", "num": 39}, {"question": "એક વ્યક્તિ લાંબા સમય સુધી નીલા પ્રકાશ (blue light, ~460-480 nm) ના સંપર્કમાં રહે છે. આ સ્થિતિમાં નીચેનામાંથી કયું પરિણામ **નહીં** જોવા મળે?", "options": ["A) મેલેટોનિનના સ્રાવમાં ઘટાડો થશે.", "B) સર્કેડિયન લયમાં વિઘટન થશે.", "C) પાઇનિયલ ગ્રંથિની કોષિકાઓમાં ટ્રિપ્ટોફેનના રૂપાંતરણમાં વધારો થશે.", "D) ઊંઘના ચક્રમાં ખલેલ પડશે."], "correct": 2, "explanation": "વિકલ્પ C ખોટો છે કારણ કે નીલા પ્રકાશના સંપર્કમાં રહેવાથી મેલેટોનિનના સ્રાવમાં ઘટાડો થાય છે (A સાચું), સર્કેડિયન લયમાં વિઘટન થાય છે (B સાચું), અને ઊંઘના ચક્રમાં ખલેલ પડે છે (D સાચું). પરંતુ ટ્રિપ્ટોફેનના રૂપાંતરણમાં **ઘટાડો** થાય છે, નહીં કે વધારો, કારણ કે મેલેટોનિનના સ્રાવમાં ઘટાડો થાય છે.", "ncert_ref": "Class XI - Chapter 22: ચેતાતંત્ર અને નિયંત્રણ તથા સમન્વય", "difficulty": "Hard", "num": 40}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
