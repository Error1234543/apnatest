    <script>
        const questionsData = [{"question": "હાઇપોથેલેમસના પારાવેન્ટ્રિક્યુલર ન્યુક્લિયસ (PVN) દ્વારા સ્રાવાતા હોર્મોનનું નામ જણાવો, જે પિટ્યુટરી ગ્લેન્ડના પશ્ચ ભાગને પ્રભાવિત કરે છે અને ઓક્સીટોસીનના સ્રાવને ઉત્તેજિત કરે છે.", "options": ["A) વેઝોપ્રેસિન (ADH)", "B) ઓક્સીટોસીન", "C) કોર્ટિકોટ્રોપિન-રિલીઝીંગ હોર્મોન (CRH)", "D) થાયરોઇડ-સ્ટિમ્યુલેટીંગ હોર્મોન (TSH)"], "correct": 0, "explanation": "વેઝોપ્રેસિન (ADH) હાઇપોથેલેમસના પારાવેન્ટ્રિક્યુલર ન્યુક્લિયસ (PVN) દ્વારા સ્રાવાય છે અને પિટ્યુટરી ગ્લેન્ડના પશ્ચ ભાગમાં સંગ્રહ પામે છે. ઓક્સીટોસીન પણ PVN દ્વારા સ્રાવાય છે, પરંતુ પ્રશ્નમાં પિટ્યુટરીના પશ્ચ ભાગને પ્રભાવિત કરતું હોર્મોન પૂછવામાં આવ્યું છે, જે ADH છે. CRH અને TSH અગ્ર પિટ્યુટરીને પ્રભાવિત કરે છે, PVN નહીં.", "ncert_ref": "Class XI - Chapter 22: ચેતાતંત્ર અને રસાયણિક સંકલન", "difficulty": "Hard", "num": 1}, {"question": "હાઇપોથેલેમસ દ્વારા નિયંત્રિત થતું કયું હોર્મોન રાત્રિ દરમિયાન સ્રાવાય છે અને સ્લીપ-વેક સાયકલને નિયંત્રિત કરવામાં મહત્વની ભૂમિકા ભજવે છે?", "options": ["A) મેલેટોનિન", "B) કોર્ટિસોલ", "C) ગ્રોથ હોર્મોન (GH)", "D) પ્રોલેક્ટિન"], "correct": 0, "explanation": "મેલેટોનિન હોર્મોન પાઇનિયલ ગ્લેન્ડ દ્વારા સ્રાવાય છે, પરંતુ તેનું નિયંત્રણ હાઇપોથેલેમસ દ્વારા થાય છે. તે રાત્રિ દરમિયાન સ્રાવાય છે અને સ્લીપ-વેક સાયકલને નિયંત્રિત કરે છે. કોર્ટિસોલ, GH, અને પ્રોલેક્ટિન અગ્ર પિટ્યુટરી દ્વારા સ્રાવાય છે અને હાઇપોથેલેમસ દ્વારા નિયંત્રિત થાય છે, પરંતુ તે સ્લીપ-વેક સાયકલ સાથે સીધું સંબંધ ધરાવતું નથી.", "ncert_ref": "Class XI - Chapter 22: ચેતાતંત્ર અને રસાયણિક સંકલન", "difficulty": "Hard", "num": 2}, {"question": "હાઇપોથેલેમસના કયા ભાગ દ્વારા થર્મોરેગ્યુલેશન (તાપમાન નિયંત્રણ) નું નિયંત્રણ થાય છે?", "options": ["A) પ્રી-ઓપ્ટિક એરિયા", "B) સુપ્રા કાયાસ્મેટિક ન્યુક્લિયસ", "C) મેમિલરી બોડીઝ", "D) પોસ્ટીરિયર હાઇપોથેલેમસ"], "correct": 0, "explanation": "પ્રી-ઓપ્ટિક એરિયા હાઇપોથેલેમસનો ભાગ છે જે થર્મોરેગ્યુલેશન માટે જવાબદાર છે. સુપ્રા કાયાસ્મેટિક ન્યુક્લિયસ સર્કેડિયન રિધમને નિયંત્રિત કરે છે, મેમિલરી બોડીઝ સ્મૃતિ સાથે સંબંધિત છે, અને પોસ્ટીરિયર હાઇપોથેલેમસ હોર્મોન સ્રાવણ  "હાઇપોથેલેમસના સુપ્રાકાયાસ્મેટિક ન્યુક્લિયસ (SCN) નું મુખ્ય કાર્ય શું છે, જે નીચેનામાંથી એક વિકલ્પમાં યોગ્ય રીતે વર્ણવેલ નથી?", "options": ["A) સર્કેડિયન રિધમનું નિયંત્રણ કરવું", "B) મેલાટોનિન હોર્મોનના સ્રાવનું પરોક્ષ નિયંત્રણ કરવું", "C) શરીરના તાપમાનનું સીધું નિયંત્રણ કરવું", "D) ઊંઘ-જાગૃતિ ચક્રનું નિયંત્રણ કરવું"], "correct": 2, "explanation": "સુપ્રાકાયાસ્મેટિક ન્યુક્લિયસ (SCN) સર્કેડિયન રિધમનું નિયંત્રણ કરે છે (વિકલ્પ A સાચો), મેલાટોનિન હોર્મોનના સ્રાવનું પરોક્ષ નિયંત્રણ કરે છે (વિકલ્પ B સાચો), અને ઊંઘ-જાગૃતિ ચક્રનું નિયંત્રણ કરે છે (વિકલ્પ D સાચો). જોકે, શરીરના તાપમાનનું સીધું નિયંત્રણ SCN નું મુખ્ય કાર્ય નથી, તે થર્મોરેગ્યુલેટરી ન્યુક્લિયસ દ્વારા થાય છે (વિકલ્પ C ખોટો).", "ncert_ref": "કક્ષા 11 - પ્રકરણ 22: રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 33}, {"question": "એક પ્રયોગમાં, હાઇપોથેલેમસના લેટરલ એરિયાને નુકસાન પહોંચાડવામાં આવ્યું છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું લક્ષણ જોવા મળે તેવી શક્યતા સૌથી વધુ છે?", "options": ["A) અતિશય ભૂખ અને વજનમાં વધારો", "B) ભૂખમાં ઘટાડો અને વજનમાં ઘટાડો", "C) થર્મોરેગ્યુલેશનમાં ખલેલ", "D) ગ્રોથ હોર્મોન સ્રાવમાં વધારો"], "correct": 1, "explanation": "હાઇપોથેલેમસનો લેટરલ એરિયા ભૂખ અને તૃષાને ઉત્તેજિત કરે છે. તેને નુકસાન થવાથી ભૂખમાં ઘટાડો અને વજનમાં ઘટાડો થાય છે (વિકલ્પ B સાચો). અતિશય ભૂખ અને વજનમાં વધારો વેન્ટ્રોમીડિયલ ન્યુક્લિયસને નુકસાન થવા પર જોવા મળે છે (વિકલ્પ A ખોટો). થર્મોરેગ્યુલેશન અને ગ્રોથ હોર્મોન સ્રાવ પર લેટરલ એરિયાની સીધી અસર ઓછી છે (વિકલ્પ C અને D ખોટા).", "ncert_ref": "કક્ષા 11 - પ્રકરણ 22: રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 34}, {"question": "એક દર્દીને હાઇપોથેલેમસના **અરકુએટ ન્યુક્લિયસ (Arcuate Nucleus)** ને નુકસાન થયું છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું પરિણામ **સૌથી ઓછું સંભવિત** છે?", "options": ["A) વૃદ્ધિ હોર્મોન (Growth Hormone) નું સ્તર ઘટી જશે", "B) પ્રોલેક્ટિન (Prolactin) નું સ્તર વધી જશે", "C) ગોનેડોટ્રોપિન-રિલીઝિંગ હોર્મોન (GnRH) નું સ્તર ઘટી જશે", "D) થાઇરોટ્રોપિન-રિલીઝિંગ હોર્મોન (TRH) નું સ્તર અસરગ્રસ્ત થશે નહીં"], "correct": 3, "explanation": "અરકુએટ ન્યુક્લિયસ (Arcuate Nucleus) **GHRH (Growth Hormone-Releasing Hormone)**, **GnRH (Gonadotropin-Releasing Hormone)**, અને **ડોપામાઇન (જે પ્રોલેક્ટિનના સ્રાવને અવરોધે છે)** નું સ્રાવ કરે છે. તેથી આ ન્યુક્લિયસને નુકસાન થતાં GHRH અને GnRH નું સ્તર ઘટશે (વિકલ્પ A અને C ખોટા), જ્યારે ડોપામાઇનના અભાવે પ્રોલેક્ટિનનું સ્તર વધશે (વિકલ્પ B ખોટો). **TRH (Thyrotropin-Releasing Hormone) નું સ્રાવ મુખ્યત્વે પારાવેન્ટ્રિક્યુલર ન્યુક્લિયસ (PVN) દ્વારા થાય છે**, તેથી અરકુએટ ન્યુક્લિયસને નુકસાન થતાં TRH પર ઓછી અસર થશે (વિકલ્પ D સાચો).", "ncert_ref": "ક્લાસ XII - પ્રકરણ 7: પ્રાણીઓમાં પ્રજનન અને વિકાસ, વિભાગ 7.2: અંતઃસ્ત્રાવી ગ્રંથિઓ અને હોર્મોન્સ", "difficulty": "Hard", "num": 35}, {"question": "હાઇપોથેલેમસના **સુપ્રાકાયાસ્મેટિક ન્યુક્લિયસ (SCN)** નું મુખ્ય કાર્ય **સર્કેડિયન રિધમ** નું નિયંત્રણ છે. નીચેનામાંથી કયું હોર્મોન **સીધું SCN દ્વારા નિયંત્રિત થતું નથી**, પરંતુ તેના સ્રાવ પર પરોક્ષ અસર પડે છે?", "options": ["A) મેલાટોનિન (Melatonin)", "B) કોર્ટિસોલ (Cortisol)", "C) વેસોપ્રેસિન (Vasopressin)", "D) થાઇરોક્સિન (Thyroxine)"], "correct": 3, "explanation": "**સુપ્રાકાયાસ્મેટિક ન્યુક્લિયસ (SCN)** સર્કેડિયન રિધમનું નિયંત્રણ કરે છે અને **મેલાટોનિન** (પિનિયલ ગ્રંથિ દ્વારા સ્રાવિત) ના સ્રાવને પ્રેરિત કરે છે (વિકલ્પ A ખોટો). SCN **કોર્ટિસોલ** ના સ્રાવને પરોક્ષ રીતે અસર કરે છે (વિકલ્પ B ખોટો), કારણ કે તે હાઇપોથેલેમસ-પિટ્યુટરી-એડ્રિનલ (HPA) અક્ષને પ્રભાવિત કરે છે. **વેસોપ્રેસિન** નું સ્રાવ સુપ્રા ઓપ્ટિક ન્યુક્લિયસ (SON) અને પારાવેન્ટ્રિક્યુલર ન્યુક્લિયસ (PVN) દ્વારા થાય છે, પરંતુ SCN તેના પર પરોક્ષ અસર કરે છે (વિકલ્પ C ખોટો). **થાઇરોક્સિન** નું સ્રાવ થાઇરોઇડ ગ્રંથિ દ્વારા થાય છે, જેને TSH (પિટ્યુટરી) અને TRH (હાઇપોથેલેમસ) દ્વારા નિયંત્રિત કરવામાં આવે છે, પરંતુ SCN તેના પર સીધી અસર કરતું નથી (વિકલ્પ D સાચો).", "ncert_ref": "ક્લાસ XI - પ્રકરણ 22: રાસાયણિક સંકલન અને એકીકરણ, વિભાગ 22.3: હાઇપોથેલેમસ અને પિટ્યુટરી ગ્રંથિ", "difficulty": "Hard", "num": 36}, {"question": "એક પ્રયોગમાં, હાઇપોથેલેમસના **લેટરલ હાઇપોથેલેમિક એરિયા (LHA)** ને નુકસાન પહોંચાડવામાં આવ્યું છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું પરિ         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');

            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
