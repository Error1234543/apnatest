    <script>
        const questionsData = [{"question": "ઇન્સ્યુલિનની ક્રિયા વિશે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "options": ["A) તે ગ્લાયકોજન સંગ્રહને પ્રોત્સાહન આપે છે", "B) તે ગ્લુકોઝના કોષીય ગ્રહણને વધારે છે", "C) તે ગ્લુકેગોનના સ્રાવને પ્રેરે છે", "D) તે લિપોજેનેસિસને ઉત્તેજિત કરે છે"], "correct": 2, "explanation": "ઇન્સ્યુલિન ગ્લુકોઝના સંગ્રહ (ગ્લાયકોજન રૂપે) અને કોષીય ગ્રહણને પ્રોત્સાહન આપે છે, તથા લિપોજેનેસિસ (ચરબીના સંગ્રહ)ને ઉત્તેજિત કરે છે. પરંતુ તે ગ્લુકેગોનના સ્રાવને અવરોધે છે, નહીં કે પ્રેરે છે. ગ્લુકેગોન અને ઇન્સ્યુલિન વિરોધી ક્રિયા ધરાવતા હોર્મોન છે.", "ncert_ref": "Class XI - પ્રકરણ 22: રાસાયણિક નિયમન અને એકીકરણ", "difficulty": "Hard", "num": 1}, {"question": "ટાઇપ-1 ડાયાબિટીસમાં નીચેનામાંથી કયું પરિવર્તન જોવા મળે છે?", "options": ["A) ઇન્સ્યુલિન પ્રતિકાર", "B) પેનક્રિયાટિક બીટા-કોષોનું વિનાશ", "C) ગ્લુકોઝ ટોલરન્સમાં ઘટાડો", "D) ઇન્સ્યુલિન રિસેપ્ટરની ખામી"], "correct": 1, "explanation": "ટાઇપ-1 ડાયાબિટીસમાં પેનક્રિયાસના બીટા-કોષોનું ઓટોઇમ્યુન વિનાશ થાય છે, જેથી ઇન્સ્યુલિનનું ઉત્પાદન બંધ થાય છે. ઇન્સ્યુલિન પ્રતિકાર (A) અને રિસેપ્ટરની ખામી (D) ટાઇપ-2 ડાયાબિટીસ સાથે સંબંધિત છે. ગ્લુકોઝ ટોલરન્સમાં ઘટાડો (C) બંને પ્રકારમાં જોવા મળે છે, પરંતુ તે મુખ્ય લક્ષણ નથી.", "ncert_ref": "Class XI - પ્રકરણ 22: રાસાયણિક નિયમન અને એકીકરણ", "difficulty": "Hard", "num": 2}, {"question": "ઇન્સ્યુલિન સ્રાવના નિયમન વિશે નીચેનામાંથી કયું વિધાન યોગ્ય છે?", "options": ["A) રક્તમાં ગ્લુકોઝનું સ્તર ઘટતાં ઇન્સ્યુલિન સ્રાવ વધે છે", "B) સોમેટોસ્ટેટિન ઇન્સ્યુલિન સ્રાવને ઉત્તેજિત કરે છે", "C) એસિટાઇલકોલિન (ACh) ઇન્સ્યુલિન સ્રાવને પ્રેરે છે", "D) એપીનેફ્રિન ઇન્સ્યુલિન સ્રાવને વધારે છે"], "correct": 2, "explanation": "એસિટાઇલકોલિન (ACh) પેરાસિમ્પેથેટિક તંત્ર દ્વારા સ્રાવાય છે અને ઇન્સ્યુલિન સ્રાવને ઉત્તેજિત કરે છે. રક્તમાં ગ્લુકોઝનું સ્તર વધતાં (A) ઇન્સ્યુલિન સ્રાવ વધે છે, નહીં કે ઘટતાં. સોમેટોસ્ટેટિન (B) અને એપીનેફ્રિન (D) ઇન્સ્યુલિન સ્રાવને અવરોધે છે.", "ncert_ref": "Class XI - પ્રકરણ 22: રાસાયણિક નિયમન અને એકીકરણ", "difficulty": "Hard", "num": 3}, {"question": "નીચેનામાંથી કયો હોર્મોન ઇન્સ્યુલિનની ક્રિયાને વિરોધ કરે છે?", "options": ["A) કોર્ટિસોલ", "B) થાયરોક્સિન", "C) ગ્લુકેગોન", "D) એલ્ડોસ્ટેરોન"], "correct": 2, "explanation": "ગ્લુકેગોન ઇન્સ્યુલિનની ક્રિયાને સીધો વિરોધ કરે છે, કારણ કે તે રક્તમાં ગ્લુકોઝનું સ્તર વધારે છે (ગ્લાયકોજનોલિસિસ અને ગ્લુકોનિયોજેનેસિસ દ્વારા). કોર્ટિસોલ (A) અને થાયરોક્સિન (B) પણ ગ્લુકોઝ સ્તર વધારે છે, પરંતુ તે ઇન્સ્યુલિનની ક્રિયાને સીધો વિરોધ કરતા નથી. એલ્ડોસ્ટેરોન (D) મુખ્યત્વે સોડિયમ અને પોટેશિયમના સંતુલનને નિયંત્રિત કરે છે.", "ncert_ref": "Class XI - પ્રકરણ 22: રાસાયણિક નિયમન અને એકીકરણ", "difficulty": "Hard", "num": 4}, {"question": "ઇન્સ્યુલિન રિસેપ્ટરની ક્રિયા વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) તે ટાયરોસિન કિનેઝ ઉત્સેચકની ક્રિયા પ્રેરે છે", "B) તે ગ્લુકોઝ ટ્રાન્સપોર્ટર (GLUT4) ને કોષપટલ પર લાવે છે", "C) તે cAMP સિગ્નલિંગ પાથવે દ્વારા ક્રિયા કરે છે", "D) તે ગ્લાયકોલિસિસને પ્રોત્સાહન આપે છે"], "correct": 2, "explanation": "ઇન્સ્યુલિન રિસેપ્ટર ટાયરોસિન કિનેઝ ઉત્સેચકની ક્રિયા પ્રેરે છે (A) અને GLUT4 ને કોષપટલ પર લાવે છે (B), જેથી ગ્લુકોઝનું કોષીય ગ્રહણ થાય. તે ગ્લાયકોલિસિસને પણ પ્રોત્સાહન આપે છે (D). પરંતુ ઇન્સ્યુલિન રિસેપ્ટર cAMP સિગ્નલિંગ પાથવે દ્વારા ક્રિયા કરતું નથી; તે ટાયરોસિન કિનેઝ-સંબંધિત પાથવે દ્વારા ક્રિયા કરે છે.", "ncert_ref": "Class XI - પ્રકરણ 22: રાસાયણિક નિયમન અને એકીકરણ", "difficulty": "Hard", "num": 5}, {"question": "જ્યારે રક્તમાં ગ્લુકોઝનું સ્તર અચાનક ઘટે છે, ત્યારે નીચેનામાંથી કયો હોર્મોન ઇન્સ્યુલિનના સ્રાવને અવરોધે છે અને ગ્લુકેગોનના સ્રાવને પ્રેરે છે?", "options": ["A) એડ્રિનેલિન", "B) સોમેટોસ્ટેટિન", "C) કોર્ટિસોલ", "D) થાયરોક્સિન"], "correct": 1, "explanation": "સોમેટોસ્ટેટિન (B) પેંક્રિયાટિક ડેલ્ટા-કોષો દ્વારા સ્રાવાય છે અને ઇન્સ્યુલિન અને ગ્લુકેગોન બંનેમાં અવરોધ કરે છે, પરંતુ રક્તમાં ગ્લુકોઝનું સ્તર ઘટતાં તે ઇન્સ્યુલિનને અવરોધે છે અને ગ્લુકેગોનના સ્રાવને પ્રેરે છે. એડ્રિનેલિન (A) ગ્લુકોઝના સ્તરને વધારવા ગ્લાયકોજનોલિસિસને પ્રેરે છે, પરંતુ તે ઇન્સ્યુલિનના સ્રાવને સીધા અવરોધતું નથી. કોર્ટિસોલ (C) અને થાયરોક્સિન (D) લાંબા ગાળાના ગ્લુકોઝ નિયમનમાં ભૂમિકા ભજવે છે, પરંતુ તાત્કાલિક ર ": "ઇન્સ્યુલિન યકૃતમાં ગ્લુકોનિયોજેનેસિસને સૌથી પહેલા અટકાવે છે, કારણ કે તે રક્તમાં ગ્લુકોઝના સ્તરને ઘટાડવા માટે ગ્લુકોઝના નવીન નિર્માણને રોકે છે. ગ્લાયકોજન સંગ્રહણ (A) અને ગ્લાયકોજન વિઘટન (B) ઇન્સ્યુલિન દ્વારા નિયંત્રિત થાય છે, પરંતુ ગ્લુકોનિયોજેનેસિસ (C) સૌથી પ્રાથમિક લક્ષ્ય છે. ગ્લુકોઝ ઓક્સિડેશન (D) ઇન્સ્યુલિન દ્વારા પ્રભાવિત થતું નથી, પરંતુ તે કોષીય શ્વસનનો ભાગ છે.", "ncert_ref": "Class XII - Chapter 22: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 25}, {"question": "ઇન્સ્યુલિન રિસેપ્ટર પર પગલે રહેલી મ્યુટેશન ધરાવતી વ્યક્તિમાં, નીચેનામાંથી કયો પ્રતિભાવ અપેક્ષિત નથી?", "options": ["A) રક્તમાં ગ્લુકોઝનું સ્તર વધવું", "B) યકૃતમાં ગ્લાયકોજન સંગ્રહણ ઘટવું", "C) સ્નાયુ કોષોમાં ગ્લુકોઝનું ગ્રહણ વધવું", "D) ચરબી કોષોમાં લિપોલિસિસ વધવું"], "correct": 2, "explanation": "ઇન્સ્યુલિન રિસેપ્ટર પર મ્યુટેશનના કારણે ઇન્સ્યુલિનની ક્રિયા અસરકારક રીતે થતી નથી, જેના કારણે રક્તમાં ગ્લુકોઝનું સ્તર વધે (A), યકૃતમાં ગ્લાયકોજન સંગ્રહણ ઘટે (B), અને ચરબી કોષોમાં લિપોલિસિસ વધે (D). પરંતુ સ્નાયુ કોષોમાં ગ્લુકોઝનું ગ્રહણ ઇન્સ્યુલિન પર આધારિત હોવાથી, તે ઘટે છે, વધતું નથી (C).", "ncert_ref": "Class XII - Chapter 22: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 26}, {"question": "જ્યારે યકૃત કોષોમાં ઇન્સ્યુલિનની ક્રિયા દ્વારા ગ્લાયકોજન સંગ્રહણ વધે છે, ત્યારે નીચેનામાંથી કયો ઉત્સેચક પ્રેરિત થતો નથી?", "options": ["A) ગ્લાયકોજન સિંથેઝ", "B) ગ્લુકોકાયનેઝ", "C) હેક્સોકાયનેઝ", "D) ફોસ્ફોફ્રક્ટોકાયનેઝ-1"], "correct": 1, "explanation": "ઇન્સ્યુલિન યકૃતમાં ગ્લાયકોજન સંગ્રહણને પ્રેરે છે, જેમાં ગ્લાયકોજન સિંથેઝ (A) પ્રેરિત થાય છે. હેક્સોકાયનેઝ (C) અને ફોસ્ફોફ્રક્ટોકાયનેઝ-1 (D) ગ્લાયકોલિસિસના ઉત્સેચકો છે, જે ઇન્સ્યુલિન દ્વારા પ્રેરિત થાય છે. ગ્લુકોકાયનેઝ (B) ગ્લુકોનિયોજેનેસિસનો ઉત્સેચક છે, જે ઇન્સ્યુલિન દ્વારા અવરોધાય છે, નહીં કે પ્રેરિત થાય.", "ncert_ref": "Class XII - Chapter 22: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 27}, {"question": "નીચેનામાંથી કયો હોર્મોન ઇન્સ્યુલિનની ક્રિયાને પૂરક કરતો નથી, પરંતુ તેના સ્રાવને ઉત્તેજિત કરે છે?", "options": ["A) ગ્લુકેગોન", "B) એમાઇલિન", "C) સોમેટોસ્ટેટિન", "D) કોર્ટિસોલ"], "correct": 1, "explanation": "એમાઇલિન એ પેંક્રિયાસના β-કોષો દ્વારા સ્રાવાતો હોર્મોન છે, જે ઇન્સ્યુલિનના સ્રાવને ઉત્તેજિત કરે છે અને ગ્લુકોઝના મેટાબોલિઝમને નિયંત્રિત કરવામાં મદદ કરે છે. ગ્લુકેગોન ઇન્સ્યુલિનની ક્રિયાને વિરોધ કરે છે, સોમેટોસ્ટેટિન ઇન્સ્યુલિન અને ગ્લુકેગોન બંનેધે છે, જ્યારે કોર્ટિસોલ ઇન્સ્યુલિનની ક્રિયાને વિરોધ કરે છે અને રક્તમાં ગ્લુકોઝનું સ્તર વધારે છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક નિયમન અને નિયંત્રણ", "difficulty": "Hard", "num": 28}, {"question": "એક દર્દીને ઇન્સ્યુલિન પ્રતિરોધ (insulin resistance) છે અને તેની યકૃત કોષોમાં ગ્લુકોઝ-6-ફોસ્ફેટેઝ ઉત્સેચકની પ્રવૃત્તિ અસાધારણ રીતે વધી ગઈ છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું પરિવર્તન સૌથી વધુ સંભવિત છે?", "options": ["A) યકૃતમાં ગ્લાયકોજનનું સંગ્રહણ વધશે અને રક્તમાં ગ્લુકોઝનું સ્તર ઘટશે", "B) યકૃતમાં ગ્લુકોનિયોજેનેસિસ વધશે અને રક્તમાં ગ્લુકોઝનું સ્તર વધશે", "C) સ્નાયુ કોષોમાં ગ્લુકોઝનું અપટેક વધશે અને રક્તમાં ગ્લુકોઝનું સ્તર ઘટશે", "D) યકૃતમાં ગ્લાયકોજનોલિસિસ ઘટશે અને રક્તમાં ગ્લુકોઝનું સ્તર વધશે"], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે. ઇન્સ્યુલિન પ્રતિરોધ ધરાવતી વ્યક્તિમાં ઇન્સ્યુલિનની ક્રિયા યોગ્ય રીતે થતી નથી, જેના કારણે યકૃત કોષોમાં ગ્લુકોઝનું અપટેક ઘટે છે અને ગ્લુકોનિયોજેનેસિસ (નવા ગ્લુકોઝનું નિર્માણ) વધે છે. ગ્લુકોઝ-6-ફોસ્ફેટેઝ ઉત્સેચકની પ્રવૃત્તિ વધવાથી ગ્લુકોઝ-6-ફોસ્ફેટનું ગ્લુકોઝમાં રૂપાંતરણ વધે છે, જે રક્તમાં ગ્લુકોઝના સ્તરમાં વધારો કરે છે.\n\nવિકલ્પ A ખોટો છે કારણ કે ઇન્સ્યુલિન પ્રતિરોધમાં ગ્લાયકોજન સંગ્રહણ ઘટે છે, વધતું નથી.\n\nવિકલ્પ C ખોટો છે કારણ કે ઇન્સ્યુલિન પ્રતિરોધમાં સ્નાયુ કોષોમાં ગ્લુકોઝનું અપટેક ઘટે છે, વધતું નથી.\n\nવિકલ્પ D ખોટો છે કારણ કે ગ્લાયકોજનોલિસિસ ઘટવાને બદલે વધે છે, જે રક્તમાં ગ્લુકોઝના સ્તરમાં વધારો કરે છે.", "ncert_ref": "Class XII - પ્રકરણ 16: પાચન અને શોષણ (Digestion and Absorption) અને Class XI - પ્રકરણ 14: શ્વસન અને ગેસ વિનિમય (Respiration and Exchange of Gases)માં હોર્મોન અને ચયાપચય સંબંધિત વિષયો આવરી લેવાયા છે.", "difficulty": "Hard", "num": 29}, {"question": "એક દર્દીને ઇન્સ્યુલિન પ્રતિરોધ         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);

            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;

            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');

                document.getElementById(`exp_${index}`).classList.add('hidden');

            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
