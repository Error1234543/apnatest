    <script>
        const questionsData = [{"question": "થાયરોઇડ ગ્રંથિમાં કોલોઇડ પદાર્થમાં સંગ્રહ પામતું હોર્મોન કયું છે અને તેની રચના માટે કયા તત્ત્વની આવશ્યકતા રહે છે?", "options": ["A) થાયરોક્સિન (T4), આયોડિન", "B) કેલ્સીટોનિન, કેલ્શિયમ", "C) થાયરોક્સિન (T3), મેગ્નેશિયમ", "D) ટ્રાયઆયોડોથાયરોનિન (T3), પોટેશિયમ"], "correct": 0, "explanation": "થાયરોઇડ ગ્રંથિમાં કોલોઇડ પદાર્થમાં થાયરોક્સિન (T4) સંગ્રહ પામે છે, અને તેની રચના માટે આયોડિન તત્ત્વની આવશ્યકતા રહે છે. કેલ્સીટોનિન થાયરોઇડ ગ્રંથિના પેરાફોલિક્યુલર કોષો દ્વારા સ્રાવાય છે, પરંતુ તે કોલોઇડમાં સંગ્રહ પામતું નથી. T3 (ટ્રાયઆયોડોથાયરોનિન) પણ થાયરોઇડ હોર્મોન છે, પરંતુ તે કોલોઇડમાં મુખ્યત્વે T4 રૂપે સંગ્રહ પામે છે. મેગ્નેશિયમ અને પોટેશિયમ આ હોર્મોનની રચનામાં મુખ્ય ભૂમિકા ભજતા નથી.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકલન અને પ્લાન્ટ ગ્રોથ", "difficulty": "Hard", "num": 1}, {"question": "જો કોઈ વ્યક્તિમાં થાયરોઇડ ગ્રંથિની ક્રિયા અતિશય વધી જાય તો શરીરમાં કયા લક્ષણો જોવા મળે છે?", "options": ["A) વજનમાં વધારો, અળસીપણું, શીતળતા સહિષ્ણુતા", "B) વજનમાં ઘટાડો, હૃદયના ધબકારા વધવા, ગરમીની સહિષ્ણુતા ઘટવા", "C) હાડકાંની નબળાઈ, મસલ્સમાં દુખાવો, થાક", "D) ત્વચા સૂકાઈ જવા, વાળ ખરવા, કબજિયાત"], "correct": 1, "explanation": "થાયરોઇડ ગ્રંથિની અતિશય ક્રિયા (હાયપરથાયરોઇડિઝમ)માં થાયરોક્સિન હોર્મોનનું સ્તર વધી જાય છે, જેના કારણે ચયાપચયનો દર વધે છે. આથી વજનમાં ઘટાડો, હૃદયના ધબકારા વધવા, અને ગરમીની સહિષ્ણુતા ઘટવા જેવા લક્ષણો જોવા મળે છે. વજનમાં વધારો અને શીતળતા સહિષ્ણુતા હાયપોથાયરોઇડિઝમના લક્ષણો છે. હાડકાંની નબળાઈ અને મસલ્સમાં દુખાવો કેલ્શિયમના અભાવ અથવા અન્ય કારણોસર થઈ શકે છે. ત્વચા સૂકાઈ જવા અને વાળ ખરવા પણ હાયપોથાયરોઇડિઝમના લક્ષણો છે.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકલન અને પ્લાન્ટ ગ્રોથ", "difficulty": "Hard", "num": 2}, {"question": "કેલ્સીટોનિન હોર્મોનનું મુખ્ય કાર્ય શું છે અને તે કયા કોષો દ્વારા સ્રાવાય છે?", "options": ["A) રક્તમાં કેલ્શિયમનું સ્તર ઘટાડવું, પેરાફોલિક્યુલર કોષો", "B) રક્તમાં કેલ્શિયમનું સ્તર વધારવું, ફોલિક્યુલર કોષો", "C) રક્તમાં આયોડિનનું સ્તર નિયંત્રિત કરવું, કોલોઇડ કોષો", "D) થાયરોક્સિનની ક્રિયા વધારવી, ફોલિક્યુલર કોષો"], "correct": 0, "explanation": "કેલ્સીટોનિન હોર્મોનનું મુખ્ય કાર્ય રક્તમાં કેલ્શિયમનું સ્તર ઘટાડવું છે, અને તે થાયરોઇડ ગ્રંથિના પેરાફોલિક્યુલર કોષો (C કોષો) દ્વારા સ્રાવાય છે. ફોલિક્યુલર કોષો થાયરોક્સિન અને T3 હોર્મોન સ્રાવે છે. કોલોઇડ કોષો કોઈ હોર્મોન સ્રાવતા નથી, પરંતુ થાયરોક્સિનનું સંગ્રહ સ્થાન છે. થાયરોક્સિનની ક્રિયા વધારવી એ કેલ્સીટોનિનનું કાર્ય નથી.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકલન અને પ્લાન્ટ ગ્રોથ", "difficulty": "Hard", "num": 3}, {"question": "થાયરોઇડ ગ્રંથિની ક્રિયા નિયંત્રિત કરવા માટે હાયપોથેલેમસ અને પિટ્યુટરી ગ્રંથિ કેવી રીતે કામ કરે છે?", "options": ["A) હાયપોથેલેમસ TRH સ્રાવે છે, જે પિટ્યુટરીને TSH સ્રાવવા પ્રેરે છે, જે થાયરોઇડને થાયરોક્સિન સ્રાવવા પ્રેરે છે", "B) હાયપોથેલેમસ TSH સ્રાવે છે, જે થાયરોઇડને થાયરોક્સિન સ્રાવવા પ્રેરે છે", "C) પિટ્યુટરી TRH સ્રાવે છે, જે હાયપોથેલેમસને TSH સ્રાવવા પ્રેરે છે", "D) હાયપોથેલેમસ અને પિટ્યુટરી બંને થાયરોક્સિન સ્રાવે છે"], "correct": 0, "explanation": "હાયપોથેલેમસ થાયરોઇડ-રિલીઝિંગ હોર્મોન (TRH) સ્રાવે છે, જે પિટ્યુટરી ગ્રંથિને થાયરોઇડ-સ્ટિમ્યુલેટિંગ હોર્મોન (TSH) સ્રાવવા પ્રેરે છે. TSH થાયરોઇડ ગ્રંથિને થાયરોક્સિન (T4) અને T3 સ્રાવવા પ્રેરે છે. હાયપોથેલેમસ TSH સ્રાવતું નથી, અને પિટ્યુટરી TRH સ્રાવતી નથી. હાયપોથેલેમસ અને પિટ્યુટરી થાયરોક્સિન સ્રાવતા નથી.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકલન અને પ્લાન્ટ ગ્રોથ", "difficulty": "Hard", "num": 4}, {"question": "થાયરોઇડ ગ્રંથિની ક્રિયા અવરોધાય છે ત્યારે શરીરમાં કયા હોર્મોનનું સ્તર વધે છે અને તેના કારણે કયા લક્ષણો જોવા મળે છે?", "options": ["A) TSH, ગોઇટર, હાયપોથાયરોઇડિઝમ", "B) TRH, વજનમાં વધારો, અળસીપણું", "C) કેલ્સીટોનિન, હાડકાંની નબળાઈ, મસલ્સમાં દુખાવો", "D) થાયરોક્સિન, હૃદયના ધબકારા વધવા, ગરમીની સહિષ્ણુતા ઘટવા"], "correct": 0, "explanation": "જ્યારે થાયરોઇડ ગ્રંથિની ક્રિયા અવરોધાય છે (હાયપોથાયરોઇડિઝમ), ત્યારે પિટ્યુટરી ગ્રંથિ દ્વારા TSHનું સ્તર વધે છે, જે ગોઇટર (થાયરોઇડ ગ્રંથિનું સૂજન) તરફ દોરી શકે છે. TRHનું સ્તર પણ વધી શકે છે, પરંતુ તે હાયપોથાયરોઇડિઝમનું મુખ્ય લક્ષણ નથી. કેલ્સીટોનિન અને થાયરોક્સિનના સ્ત ત થાય છે, જે કેલ્સીટોનિનની ક્રિયાથી સ્વતંત્ર છે.", "ncert_ref": "કક્ષા 11 - અધ્યાય 22: રાસાયણિક સહનિયમન અને એકીકરણ", "difficulty": "Hard", "num": 33}, {"question": "એક પ્રયોગમાં, એક પ્રાણીને થાયરોઇડેક્ટોમી (થાયરોઇડ ગ્રંથિ દૂર કરવી) કરવામાં આવી. આ સ્થિતિમાં નીચેનામાંથી કયું પરિણામ થાયરોક્સિન અને કેલ્સીટોનિન બંનેની ગેરહાજરીને કારણે જોવા મળશે?", "options": ["A) રક્તમાં કોલેસ્ટ્રોલનું સ્તર વધશે", "B) હાડકામાં કેલ્શિયમનું નિક્ષેપણ ઘટશે", "C) બેસલ મેટાબોલિક રેટ (BMR) ઘટશે", "D) ઉપરોક્ત તમામ પરિણામો જોવા મળશે"], "correct": 3, "explanation": "થાયરોઇડેક્ટોમી બાદ થાયરોક્સિનની ગેરહાજરીમાં બેસલ મેટાબોલિક રેટ (BMR) ઘટશે અને રક્તમાં કોલેસ્ટ્રોલનું સ્તર વધશે. કેલ્સીટોનિનની ગેરહાજરીમાં હાડકામાં કેલ્શિયમનું નિક્ષેપણ ઘટશે કારણ કે કેલ્સીટોનિન હાડકામાં કેલ્શિયમના નિક્ષેપણને પ્રોત્સાહન આપે છે. આમ, તમામ પરિણામો થાયરોક્સિન અને કેલ્સીટોનિન બંનેની ગેરહાજરીને કારણે જોવા મળશે.", "ncert_ref": "કક્ષા 11 - અધ્યાય 22: રાસાયણિક સહનિયમન અને એકીકરણ", "difficulty": "Hard", "num": 34}, {"question": "થાયરોઇડ ગ્રંથિમાંથી સ્રાવાતા થાયરોક્સિન (T4) અને કેલ્સીટોનિન હોર્મોન વચ્ચેનો નીચેનામાંથી કયો તફાવત સચોટ છે, પરંતુ સામાન્ય રીતે લોકો તેને ખોટી રીતે સમજે છે?", "options": ["A) થાયરોક્સિન આયોડિન યુક્ત હોર્મોન છે, જ્યારે કેલ્સીટોનિન પેપ્ટાઇડ પ્રકારનું હોર્મોન છે.", "B) થાયરોક્સિન હાડકાના ચયાપચયને નિયંત્રિત કરે છે, જ્યારે કેલ્સીટોનિન ચયાપચયની ક્રિયામાં કોઈ ભૂમિકા ભજવતું નથી.", "C) થાયરોક્સિન રક્તમાં કેલ્શિયમના સ્તરને નિયંત્રિત કરે છે, જ્યારે કેલ્સીટોનિન શરીરના તાપમાનને નિયંત્રિત કરે છે.", "D) થાયરોક્સિન પિટ્યુટરી ગ્રંથિ દ્વારા નિયંત્રિત થાય છે, જ્યારે કેલ્સીટોનિન હાયપોથેલેમસ દ્વારા નિયંત્રિત થાય છે."], "correct": 1, "explanation": "થાયરોક્સિન અને કેલ્સીટોનિન વચ્ચેનો મુખ્ય તફાવત એ છે કે થાયરોક્સિન હાડકાના ચયાપચયને નિયંત્રિત કરે છે, જ્યારે કેલ્સીટોનિન રક્તમાં કેલ્શિયમના સ્તરને ઘટાડવા માટે જવાબદાર છે. ઓપશન A સચોટ છે, પરંતુ તે સામાન્ય રીતે લોકો દ્વારા ખોટી રીતે સમજાય છે કે કેલ્સીટોનિન ચયાપચયમાં કોઈ ભૂમિકા ભજવતું નથી, જ્યારે હકીકતમાં તે હાડકાના ચયાપચયને અસર કરે છે. ઓપશન C અને D ખોટા છે કારણ કે થાયરોક્સિન શરીરના તાપમ             if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
