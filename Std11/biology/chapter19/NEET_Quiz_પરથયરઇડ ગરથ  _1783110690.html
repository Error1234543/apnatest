ં આવે છે) કેલ્શિયમનું સ્તર ઘટાડે છે. આમ, PTH અને કેલ્સિટોનિન વચ્ચેનો સહસંબંધ વિરોધી છે.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક નિયંત્રણ અને એકીકરણ", "difficulty": "Hard", "num": 9}, {"question": "એક દર્દીના રક્તમાં કેલ્શિયમનું પ્રમાણ અસામાન્ય રીતે નીચું જોવા મળે છે, પરંતુ તેના પેરાથાયરોઇડ ગ્રંથિમાંથી પેરાથોર્મોન (PTH) નું સ્તર સામાન્ય કરતાં વધારે છે. આ પરિસ્થિતિ માટે નીચેનામાંથી કયું કારણ સૌથી વધુ સંભવિત છે?", "options": ["A) દર્દીને વિટામિન D ની ઉણપ છે, જેના કારણે આંતરડામાં કેલ્શિયમનું શોષણ ઘટે છે", "B) દર્દીની કિડનીમાં PTH પ્રત્યે પ્રતિકારકતા વિકસી છે, જેના કારણે કેલ્શિયમનું પુનઃશોષણ અવરોધાય છે", "C) દર્દીના અસ્થિઓમાં ઓસ્ટિઓક્લાસ્ટ્સની અતિશય સક્રિયતા છે, જે વધારે કેલ્શિયમ મુક્ત કરે છે", "D) દર્દીના શરીરમાં કેલ્સિટોનિનનું સ્તર અસામાન્ય રીતે ઊંચું છે, જે PTH ની ક્રિયાને અવરોધે છે"], "correct": 1, "explanation": "આ પરિસ્થિતિને 'સ્યુડોહાઇપોપેરાથાયરોઇડિઝમ' કહેવાય છે, જેમાં PTH નું સ્તર સામાન્ય અથવા વધારે હોવા છતાં કિડનીમાં PTH પ્રત્યે પ્રતિકારકતા હોવાને કારણે કેલ્શિયમનું પુનઃશોષણ ઘટે છે અને રક્તમાં કેલ્શિયમનું પ્રમાણ નીચું રહે છે. વિકલ્પ A ખોટો છે કારણ કે વિટામિન D ની ઉણપમાં PTH નું સ્તર વધે છે, પરંતુ અહીં PTH નું સ્તર પહેલેથી જ વધારે છે. વિકલ્પ C ખોટો છે કારણ કે ઓસ્ટિઓક્લાસ્ટ્સની અતિશય સક્રિયતા રક્તમાં કેલ્શિયમનું પ્રમાણ વધારે છે, નહીં કે ઘટાડે. વિકલ્પ D ખોટો છે કારણ કે કેલ્સિટોનિનનું ઊંચું સ્તર રક્તમાં કેલ્શિયમનું પ્રમાણ ઘટાડે છે, પરંતુ તે PTH ની ક્રિયાને સીધું અવરોધતું નથી અને PTH નું સ્તર વધારે નહીં રહે.", "ncert_ref": "Class XII - પ્રકરણ 11: રાસાયણિક સંકલન અને એકીકરણ (Chemical Coordination and Integration)", "difficulty": "Hard", "num": 10}, {"question": "જો કોઈ વ્યક્તિમાં પેરાથાયરોઇડ ગ્રંથીનું કામકાજ અચાનક બંધ થાય, તો રક્તમાં કેલ્શિયમનું પ્રમાણ ઘટે છે અને તેના પરિણામે કયો લક્ષણ જોવા મળે છે?", "options": ["A) ટેટની (Tetany) - સ્નાયુઓમાં અસાધારણ સંકોચન", "B) હાયપરકેલ્શિયમિયા - હાડકામાં કેલ્શિયમનું જમા થવું", "C) ઓસ્ટિયોપોરોસિસ - હાડકાંની કમજોરી", "D) ગોઇટર - ગળામાં સોજો"], "correct": 0, "explanation": "પેરાથાયરોઇડ ગ્રંથીના કામકાજ બંધ થવાથી PTHનું સ્રાવ ઘટે  ઘટી જવું", "D) રક્તમાં કેલ્શિયમનું સ્તર ઘટી જવું અને તંત્રિકા તંત્રની ઉત્તેજના વધી જવી"], "correct": 3, "explanation": "પેરાથાયરોઇડ ગ્રંથીની અતિશય સક્રિયતા (હાયપરપેરાથાયરોઇડિઝમ)માં, PTH નું સ્તર વધી જવાને કારણે હાડકોમાંથી કેલ્શિયમનું સ્રાવણ વધે છે, જેથી હાડકો નબળા અને ભંગુર બને છે (A સરખું છે). રક્તમાં કેલ્શિયમનું સ્તર વધી જાય છે (B સરખું છે), અને મૂત્રમાં ફોસ્ફેટનું સ્તર ઘટી જાય છે (C સરખું છે). પરંતુ રક્તમાં કેલ્શિયમનું સ્તર ઘટી જવું અને તંત્રિકા તંત્રની ઉત્તેજના વધી જવી (D) એ હાયપોપેરાથાયરોઇડિઝમનું લક્ષણ છે, ન કે હાયપરપેરાથાયરોઇડિઝમનું.", "ncert_ref": "Class XI - પ્રકરણ 22: રાસાયણિક નિયંત્રણ અને સમન્વય", "difficulty": "Hard", "num": 14}, {"question": "પેરાથાયરોઇડ ગ્રંથિમાંથી સ્રાવવામાં આવતા પેરાથોર્મોન (PTH) ની ક્રિયા દરમિયાન, કેલ્શિયમનું સ્તર વધારવા માટે નીચેનામાંથી કયું પગલું સૌપ્રથમ ઘટે છે?", "options": ["A) હાડકાંમાંથી કેલ્શિયમનું વિસરણ (Resorption) વધે છે", "B) આંતરડામાં કેલ્શિયમનું શોષણ વધે છે", "C) મૂત્રપિંડમાં કેલ્શિયમનું પુનઃશોષણ વધે છે", "D) રક્તમાં કેલ્શિયમનું સ્તર ઘટે છે, જેથી PTH સ્રાવણ ઉત્તેજિત થાય"], "correct": 0, "explanation": "પેરાથોર્મોન (PTH) ની ક્રિયા દરમિયાન, સૌપ્રથમ હાડકાંમાંથી કેલ્શિયમનું વિસરણ (Resorption) વધે છે, જેથી રક્તમાં કેલ્શિયમનું સ્તર ઝડપથી વધી શકે. આ પગલું PTH ની તાત્કાલિક ક્રિયા છે. આંતરડામાં કેલ્શિયમનું શોષણ વધારવા માટે PTH એ કિડની દ્વારા વિટામિન D ને સક્રિય કરવું પડે છે, જે થોડો સમય લે છે. મૂત્રપિંડમાં કેલ્શિયમનું પુનઃશોષણ પણ PTH દ્વારા ઉત્તેજિત થાય છે, પરંતુ તે હાડકાંના વિસરણ કરતાં ધીમું પગલું છે. રક્તમાં કેલ્શિયમનું સ્તર ઘટવું એ PTH સ્રાવણનું કારણ છે, પરંતુ તે ક્રિયાનું પરિણામ નથી.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સમન્વય અને એકીકરણ", "difficulty": "Hard", "num": 15}, {"question": "એક વ્યક્તિમાં પેરાથાયરોઇડ ગ્રંથીની ક્રિયા લાંબા સમય સુધી અતિશય સક્રિય રહે, તો નીચેનામાંથી કયું પરિણામ જોવા મળશે નહીં?", "options": ["A) હાડકા નબળા પડશે", "B) રક્તમાં કેલ્શિયમનું સ્તર વધશે", "C) રક્તમાં ફોસ્ફેટનું સ્તર વધશે", "D) કિડનીમાં પથરી બનશે"], "correct": 2, "explanation": "પેરાથાયરોઇડ ગ્રંથીની અતિશય સક્રિયતાથી હાડકા નબળા પડશે (A), રક્તમાં કેલ્શિયમનું સ્તર વધશે (B), અને કિડનીમાં પથરી બનશે (D) કારણ કે PTH કેલ્શિયમનું સ્તર વધારે છે. પરંતુ PTH ફોસ્ફેટનું સ્તર ઘટાડે છે, તેથી રક્તમાં ફોસ્ફેટનું સ્તર વધશે નહીં (C).", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સમન્વય અને એકીકરણ", "difficulty": "Hard", "num": 16}, {"question": "નીચેનામાંથી કયો હોર્મોન પેરાથાયરોઇડ ગ્રંથીની ક્રિયા પર પ્રત્યક્ષ અસર કરતો નથી?", "options": ["A) કેલ્સિટોનિન", "B) થાયરોક્સિન", "C) વિટામિન D", "D) ગ્લુકાગોન"], "correct": 3, "explanation": "ગ્લુકાગોન (D) પેરાથાયરોઇડ ગ્રંથીની ક્રિયા પર પ્રત્યક્ષ અસર કરતો નથી. કેલ્સિટોનિન (A) અને થાયરોક્સિન (B) કેલ્શિયમના ચયાપચય પર અસર કરે છે, જ્યારે વિટામિન D (C) આંતરડામાં કેલ્શિયમના શોષણને પ્રોત્સાહન આપે છે, જે PTH ની ક્રિયા સાથે સહયોગી છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સમન્વય અને એકીકરણ", "difficulty": "Hard", "num": 17}, {"question": "એક દર્દીના રક્તમાં કેલ્શિયમનું પ્રમાણ સામાન્ય કરતાં વધારે જોવા મળે છે, પરંતુ તેના પેરાથાયરોઇડ હોર્મોન (PTH)નું સ્તર સામાન્ય છે. આ પરિસ્થિતિ માટે નીચેનામાંથી કયું કારણ સૌથી વધુ સંભવિત છે?", "options": ["A) પેરાથાયરોઇડ ગ્રંથિનો કૅન્સર (પેરાથાયરોઇડ એડિનોમા)", "B) વિટામિન D ની અતિશય માત્રા (હાઇપરવિટામિનોસિસ D)", "C) કિડનીની ક્રોનિક નિષ્ફળતા (ક્રોનિક રેનલ ફેલ્યોર)", "D) હાઇપોથાઇરોઇડિઝમ (થાઇરોઇડ હોર્મોનની ઉણપ)"], "correct": 1, "explanation": "વિટામિન D ની અતિશય માત્રા (હાઇપરવિટામિનોસિસ D) રક્તમાં કેલ્શિયમનું પ્રમાણ વધારે છે કારણ કે વિટામિન D આંતરડામાંથી કેલ્શિયમનું શોષણ વધારે છે. આ સ્થિતિમાં PTH નું સ્તર સામાન્ય રહે છે કારણ કે PTH નું સ્તર મુખ્યત્વે રક્તમાં કેલ્શિયમના સ્તર દ્વારા નિયંત્રિત થાય છે. પેરાથાયરોઇડ એડિનોમા PTH નું સ્તર વધારે છે, કિડનીની નિષ્ફળતા PTH નું સ્તર વધારે છે અને હાઇપોથાઇરોઇડિઝમ કેલ્શિયમના સ્તર પર પ્રત્યક્ષ અસર કરતું નથી.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 11: રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 18}, {"question": "પેરાથોર્મોન (PTH) ની ક્રિયા દરમિયાન, નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) PTH હાડકાંમાંથી કેલ્શિયમનું મુક્તિ કરાવે છે.", "B) PTH કિડનીમાં કેલ્શિયમનું પુનઃશોષણ વધારે છે.", "C) PTH આંતરડામાં કેલ્શિયમનું શોષણ સીધું વધારે છે.", "D) PTH કિડનીમાં ફોસ્ફેટનું પુનઃશોષણ ઘટાડે છે."], "correct": 2, "explanation": "PTH આંતરડામાં કેલ્શિયમનું શોષણ સીધું વધારે નથી. તે વિટામિન D ને સક્રિય સ્વરૂપમાં રૂપાંતરિત કરે છે, જે આંતરડામાં કેલ્શિયમનું શોષણ વધારે છે. બાકીના વિકલ્પો સાચા છે: PTH હાડકાંમાંથી કેલ્શિયમ મુક્ત કરે છે, કિડનીમાં કેલ્શિયમનું પુનઃશોષણ વધારે છે અને ફોસ્ફેટનું પુનઃશોષણ ઘટાડે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 22: રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 19}, {"question": "એક દર્દીને લાંબા સમયથી હાડકાંમાં દુખાવો અને નબળાઈની ફરિયાદ છે. તેના રક્ત પરીક્ષણમાં કેલ્શિયમનું પ્રમાણ સામાન્ય કરતાં ઓછું અને ફોસ્ફેટનું પ્રમાણ સામાન્ય કરતાં વધારે જોવા મળે છે. આ પરિસ્થિતિ માટે નીચેનામાંથી કયું કારણ સૌથી વધુ સંભવિત છે?", "options": ["A) પેરાથાયરોઇડ ગ્રંથિની અતિશય સક્રિયતા (પ્રાથમિક હાઇપરપેરાથાયરોઇડિઝમ)", "B) વિટામિન D ની ઉણપ (હાઇપોવિટામિનોસિસ D)", "C) કિડનીની ક્રોનિક નિષ્ફળતા (ક્રોનિક રેનલ ફેલ્યોર)", "D) પેરાથાયરોઇડ ગ્રંથિની અપૂરતી સક્રિયતા (હાઇપોપેરાથાયરોઇડિઝમ)"], "correct": 2, "explanation": "કિડનીની ક્રોનિક નિષ્ફળતામાં, કિડની વિટામિન D ને તેના સક્રિય સ્વરૂપમાં રૂપાંતરિત કરી શકતી નથી, જેના કારણે આંતરડામાં કેલ્શિયમનું શોષણ ઘટે છે અને PTH નું સ્તર વધે છે. આ સ્થિતિમાં રક્તમાં કેલ્શિયમનું પ્રમાણ ઓછું અને ફોસ્ફેટનું પ્રમાણ વધારે જોવા મળે છે. પ્રાથમિક હાઇપરપેરાથાયરોઇડિઝમમાં કેલ્શિયમ વધારે અને ફોસ્ફેટ ઓછું હોય છે. વિટામિન D ની ઉણપમાં કેલ્શિયમ અને ફોસ્ફેટ બંને ઓછા હોય છે. હાઇપોપેરાથાયરોઇડિઝમમાં કેલ્શિયમ ઓછું અને ફોસ્ફેટ વધારે હોય છે, પરંતુ હાડકાંની સમસ્યાઓ સામાન્ય રીતે જોવા મળતી નથી.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 11: રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 20}, {"question": "એક દર્દીના રક્તમાં કેલ્શિયમનું પ્રમાણ અસામાન્ય રીતે નીચું (હાઇપોકેલ્સેમિયા) જોવા મળે છે, પરંતુ તેના પેરાથાયરોઇડ ગ્રંથિમાંથી PTHનું સ્તર સામાન્ય છે. આ પરિસ્થિતિ માટે નીચેનામાંથી કયું કારણ સૌથી વધુ સંભવિત છે?", "options": ["A) વિટામિન Dની ઉણપ", "B) કેલ્સિટોનિનનું અતિશય સ્રાવણ", "C) કિડની દ્વારા કેલ્શિયમનું અતિશય ઉત્સર્જન", "D) પેરાથાયરોઇડ ગ્રંથિની સ્વયંપ્રતિરક્ષા રોગ"], "correct": 0, "explanation": "વિટામિન Dની ઉણપને કારણે આંતરડામાં કેલ્શિયમનું શોષણ ઘટે છે, જે રક્તમાં કેલ્શિયમનું નીચું સ્તર તરફ દોરી જાય છે. PTHનું સ્તર સામાન્ય હોવા છતાં, વિટામિન Dની ઉણપને કારણે કેલ્શિયમનું શોષણ યોગ્ય રીતે થતું નથી. કેલ્સિટોનિનનું અતિશય સ્રાવણ રક્તમાં કેલ્શિયમનું સ્તર ઘટાડી શકે છે, પરંતુ તે સામાન્ય રીતે PTHના સ્તરને અસર કરે છે. કિડની દ્વારા કેલ્શિયમનું અતિશય ઉત્સર્જન પણ થઈ શકે છે, પરંતુ તે સામાન્ય રીતે PTHના નિયંત્રણ હેઠળ હોય છે. પેરાથાયરોઇડ ગ્રંથિની સ્વયંપ્રતિરક્ષા રોગ સામાન્ય રીતે PTHના સ્તરને અસર કરે છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 11: રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 21}, {"question": "પેરાથોર્મોન (PTH)ની ક્રિયા દરમિયાન, હાડકાંમાંથી કેલ્શિયમ મુક્ત કરવા માટે નીચેનામાંથી કયા કોષો સક્રિય થાય છે?", "options": ["A) ઓસ્ટિઓબ્લાસ્ટ્સ", "B) ઓસ્ટિઓક્લાસ્ટ્સ", "C) ઓસ્ટિઓસાઇટ્સ", "D) કોન્ડ્રોસાઇટ્સ"], "correct": 1, "explanation": "PTH હાડકાંમાં ઓસ્ટિઓક્લાસ્ટ્સને સક્રિય કરે છે, જે હાડકાંના ખનિજીકરણને તોડીને કેલ્શિયમ મુક્ત કરે છે. ઓસ્ટિઓબ્લાસ્ટ્સ હાડકાંના નિર્માણમાં મદદ કરે છે, ઓસ્ટિઓસાઇટ્સ પરિપક્વ હાડકાંના કોષો છે, અને કોન્ડ્રોસાઇટ્સ કાસ્થિના કોષો છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 21: રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 22}, {"question": "પેરાથોર્મોન (PTH)ની ક્રિયા દરમિયાન, નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) PTH આંતરડામાં કેલ્શિયમનું શોષણ વધારે છે.", "B) PTH કિડનીમાં કેલ્શિયમનું પુનઃશોષણ વધારે છે.", "C) PTH હાડકાંમાંથી કેલ્શિયમ મુક્ત કરે છે.", "D) PTH કિડનીમાં ફોસ્ફેટનું પુનઃશોષણ વધારે છે."], "correct": 3, "explanation": "PTH કિડનીમાં ફોસ્ફેટનું પુનઃશોષણ ઘટાડે છે, નહીં કે વધારે. PTH આંતરડામાં કેલ્શિયમનું શોષણ વધારે છે (વિટામિન Dના સહયોગથી), કિડનીમાં કેલ્શિયમનું પુનઃશોષણ વધારે છે, અને હાડકાંમાંથી કેલ્શિયમ મુક્ત કરે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 21: રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 23}, {"question": "નીચેનામાંથી કયું વિધાન પેરાથાયરોઇડ ગ્રંથીના પેરાથોર્મોન (PTH) અને કેલ્શિયમ નિયંત્રણ સાથે સંકળાયેલી અસાધારણ પરિસ્થિતિ વિશે સત્ય છે?", "options": ["A) હાયપરપેરાથાયરોઇડિઝમમાં, PTHનું અતિશય સ્રાવણ હાડકાંમાંથી કેલ્શિયમનું મુક્ત થવું વધારે કરે છે, પરંતુ મૂત્રમાં કેલ્શિયમનું ઉત્સર્જન ઘટાડે છે.", "B) હાયપોપેરાથાયરોઇડિઝમમાં, PTHની ઉણપને કારણે રક્તમાં કેલ્શિયમનું સ્તર ઘટે છે, જેથી નસો અને સ્નાયુઓની ઉત્તેજના વધે છે.", "C) પેરાથાયરોઇડ ગ્રંથીના કર્કરોગમાં, PTHનું સ્તર સામાન્ય રહે છે, પરંતુ કેલ્શિયમનું સ્તર અસાધારણ રીતે વધી જાય છે.", "D) કેલ્શિયમની ઉણપ વખતે, PTH સ્રાવણ ઘટે છે, જેથી હાડકાંમાંથી કેલ્શિયમ મુક્ત થવાનું બંધ થાય છે."], "correct": 1, "explanation": "વિકલ્પ B સત્ય છે કારણ કે હાયપોપેરાથાયરોઇડિઝમમાં PTHની ઉણપને કારણે રક્તમાં કેલ્શિયમનું સ્તર ઘટે છે, જેથી નસો અને સ્નાયુઓની ઉત્તેજના (neuronal excitability) વધે છે, જે ટેટની (tetany) જેવી સમસ્યાઓ તરફ દોરી જાય છે. વિકલ્પ A ખોટો છે કારણ કે PTH મૂત્રમાં કેલ્શિયમનું ઉત્સર્જન ઘટાડતું નથી, ઉલટાનું તેને વધારે છે. વિકલ્પ C ખોટો છે કારણ કે પેરાથાયરોઇડ કર્કરોગમાં PTHનું સ્તર સામાન્યથી વધારે હોય છે, જે કેલ્શિયમનું સ્તર વધારે છે. વિકલ્પ D ખોટો છે કારણ કે કેલ્શિયમની ઉણપ વખતે PTH સ્રાવણ વધે છે, હાડકાંમાંથી કેલ્શિયમ મુક્ત કરવા માટે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સંકેતન અને નિયંત્રણ", "difficulty": "Hard", "num": 24}, {"question": "એક વ્યક્તિમાં લાંબા સમયથી કેલ્શિયમની ઉણપ જોવા મળે છે. નીચેનામાંથી કયું પરિણામ આ સ્થિતિ સાથે સંકળાયેલું નથી?", "options": ["A) હાડકાંની નબળાઈ અને ઓસ્ટિયોમેલેસિયા (Osteomalacia)", "B) રક્તમાં ફોસ્ફેટનું સ્તર વધવું", "C) PTH સ્રાવણમાં ઘટાડો થવો", "D) સ્નાયુઓમાં ખેંચાણ અને ટેટની (Tetany)ની શક્યતા વધવી"], "correct": 2, "explanation": "વિકલ્પ C સঠિક નથી કારણ કે કેલ્શિયમની ઉણપ વખતે PTH સ્રાવણ વધે છે, હાડકાંમાંથી કેલ્શિયમ મુક્ત કરવા અને કિડની દ્વારા કેલ્શિયમનું પુનઃશોષણ વધારવા માટે. વિકલ્પ A સત્ય છે કારણ કે કેલ્શિયમની ઉણપને કારણે હાડકાં નબળા પડે છે અને ઓસ્ટિયોમેલેસિયા થાય છે. વિકલ્પ B સત્ય છે કારણ કે PTH ફોસ્ફેટનું ઉત્સર્જન વધારે છે, પરંતુ કેલ્શિયમની ઉણપ વખતે ફોસ્ફેટનું સ્તર વધી શકે છે. વિકલ્પ D સત્ય છે કારણ કે કેલ્શિયમની ઉણપને કારણે નસો અને સ્નાયુઓની ઉત્તેજના વધે છે, જે ટેટની તરફ દોરી જાય છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સંકેતન અને નિયંત્રણ", "difficulty": "Hard", "num": 25}, {"question": "એક વ્યક્તિમાં લાંબા સમયથી હાયપોપેરાથાયરોઇડિઝમ (PTHની ઉણપ) જોવા મળે છે. નીચેનામાંથી કયું પરિણામ અપેક્ષિત નથી?", "options": ["A) રક્તમાં કેલ્શિયમનું સ્તર ઘટે છે", "B) રક્તમાં ફોસ્ફેટનું સ્તર વધે છે", "C) હાડકાંમાં કેલ્શિયમનું જમા વધે છે", "D) મસલ્સમાં તણાવ અને ખેંચાણ વધે છે"], "correct": 2, "explanation": "PTHની ઉણપથી રક્તમાં કેલ્શિયમ ઘટે (A), ફોસ્ફેટ વધે (B), અને મસલ્સમાં તણાવ/ખેંચાણ (ટેટની) થાય (D). પરંતુ હાડકાંમાં કેલ્શિયમનું જમા વધવું (C) PTHની ઉણપમાં થતું નથી, ઉલટે હાડકાંમાંથી કેલ્શિયમ મુક્ત થવું ઘટે છે. આથી C ખોટો વિકલ્પ છે.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સમન્વય અને નિયંત્રણ", "difficulty": "Hard", "num": 26}, {"question": "પેરાથોર્મોન (PTH) અને કેલ્સિટોનિન હોર્મોન વચ્ચેનો નીચેનામાંથી કયો સંબંધ સાચો નથી?", "options": ["A) PTH કેલ્શિયમનું સ્તર વધારે છે, જ્યારે કેલ્સિટોનિન ઘટાડે છે", "B) PTH હાડકાંમાંથી કેલ્શિયમ મુક્ત કરે છે, જ્યારે કેલ્સિટોનિન હાડકાંમાં કેલ્શિયમ જમા કરાવે છે", "C) PTH અને કેલ્સિટોનિન બંને મૂત્રપિંડ પર અસર કરે છે", "D) PTH અને કેલ્સિટોનિન બંને થાયરોઇડ ગ્રંથિમાંથી સ્રાવવામાં આવે છે"], "correct": 3, "explanation": "PTH પેરાથાયરોઇડ ગ્રંથિમાંથી સ્રાવવામાં આવે છે, જ્યારે કેલ્સિટોનિન થાયરોઇડ ગ્રંથિના 'C' કોષોમાંથી સ્રાવવામાં આવે છે. આથી D ખોટો વિકલ્પ છે. બાકીના વિકલ્પો (A, B, C) સાચા છે.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સમન્વય અને નિયંત્રણ", "difficulty": "Hard", "num": 27}, {"question": "એક દર્દીના રક્તમાં કેલ્શિયમનું પ્રમાણ અસામાન્ય રીતે ઓછું (હાઇપોકેલ્સેમિયા) જોવા મળે છે, પરંતુ તેના PTHનું સ્તર સામાન્ય છે. નીચેનામાંથી કયું કારણ સૌથી વધુ સંભવિત છે?", "options": ["A) પેરાથાયરોઇડ ગ્રંથિનું કઢાવું", "B) વિટામિન Dની ઉણપ", "C) થાયરોઇડ ગ્રંથિની અતિશય સક્રિયતા", "D) મૂત્રપિંડની નિષ્ફળતા"], "correct": 1, "explanation": "PTH સામાન્ય હોવા છતાં હાઇપોકેલ્સેમિયા વિટામિન Dની ઉણપ (B)ને કારણે થઈ શકે, કારણ કે વિટામિન D આંતરડામાં કેલ્શિયમના શોષણ માટે જરૂરી છે. પેરાથાયરોઇડ કઢાવું (A) PTH ઘટાડે, થાયરોઇડ અતિશય સક્રિયતા (C) કેલ્સિટોનિન વધારે (કેલ્શિયમ ઘટાડે), અને મૂત્રપિંડ નિષ્ફળતા (D ty": "Hard", "num": 33}, {"question": "પેરાથાયરોઇડ ગ્રંથિથી સ્રાવવામાં આવતા પેરાથોર્મોન (PTH)ની ક્રિયા દરમિયાન, નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) PTH હાડકાંમાં ઓસ્ટિયોક્લાસ્ટની ક્રિયા વધારીને કેલ્શિયમ મુક્ત કરે છે", "B) PTH કિડનીમાં કેલ્શિયમનું પુનઃશોષણ વધારે છે, પરંતુ ફોસ્ફેટનું પુનઃશોષણ ઘટાડે છે", "C) PTH કિડનીમાં 25-હાઇડ્રોક્સીકોલેકલ્સિફેરોલને 1,25-ડાઇહાઇડ્રોક્સીકોલેકલ્સિફેરોલમાં રૂપાંતરિત કરવા માટે ઉત્સેચકની ક્રિયા અવરોધે છે", "D) PTH આંતરડામાં કેલ્શિયમના શોષણને પ્રોત્સાહન આપે છે, પરંતુ તે વિટામિન Dની હાજરીપૂર્વક જ થાય છે"], "correct": 2, "explanation": "PTH હાડકાંમાં ઓસ્ટિયોક્લાસ્ટની ક્રિયા વધારીને કેલ્શિયમ મુક્ત કરે છે (A સાચું). PTH કિડનીમાં કેલ્શિયમનું પુનઃશોષણ વધારે છે અને ફોસ્ફેટનું પુનઃશોષણ ઘટાડે છે (B સાચું). PTH કિડનીમાં 25-હાઇડ્રોક્સીકોલેકલ્સિફેરોલને 1,25-ડાઇહાઇડ્રોક્સીકોલેકલ્સિફેરોલ (કેલ્સિટ્રિયોલ)માં રૂપાંતરિત કરવા માટે 1-α-હાઇડ્રોક્સિલેઝ ઉત્સેચકની ક્રિયા ઉત્તેજિત કરે છે, નહીં કે અવરોધે (C ખોટું). PTH આંતરડામાં કેલ્શિયમના શોષણને વિટામિન Dની હાજરીપૂર્વક પ્રોત્સાહન આપે છે (D સાચું).", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સમન્વય અને એકીકરણ", "difficulty": "Hard", "num": 34}, {"question": "એક દર્દીને લાંબા સમયથી હાડકાંમાં દુખાવો, સ્નાયુઓની નબળાઈ અને વારંવાર પથરીની ફરિયાદ રહે છે. તેના રક્ત પરીક્ષણમાં કેલ્શિયમનું પ્રમાણ સામાન્ય કરતાં વધારે અને ફોસ્ફેટનું પ્રમાણ સામાન્ય કરતાં ઓછું જોવા મળે છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) આ પરિસ્થિતિ પેરાથાયરોઇડ ગ્રંથિની અતિશય સક્રિયતા (પ્રાથમિક હાયપરપેરાથાયરોઇડિઝમ) સૂચવે છે", "B) પેરાથોર્મોન (PTH) ની વધેલી સાંદ્રતાને કારણે આંતરડામાંથી કેલ્શિયમનું શોષણ વધે છે", "C) પેરાથોર્મોન (PTH) ની વધેલી સાંદ્રતાને કારણે મૂત્રપિંડમાં ફોસ્ફેટનું પુનઃશોષણ વધે છે", "D) આ પરિસ્થિતિમાં હાડકાંમાંથી કેલ્શિયમનું વિસર્જન વધવાથી હાડકાં નબળાં પડે છે"], "correct": 2, "explanation": "સાચો જવાબ વિકલ્પ C છે. પેરાથોર્મોન (PTH) ની ક્રિયા દરમિયાન મૂત્રપિંડમાં ફોસ્ફેટનું પુનઃશોષણ ઘટે છે, નહીં કે વધે છે. PTH ની વધેલી સાંદ્રતાને કારણે મૂત્રપિંડમાંથી ફોસ્ફેટનું ઉત્સર્જન વધે છે, જેના કારણે રક્તમાં ફોસ્ફેટનું પ્રમાણ ઘટે છે. વિકલ્પ A સાચો છે કારણ કે આ લક્ષણો પ્રાથમિક હાયપરપેરાથાયરોઇડિઝમ સૂચવે છે. વિકલ્પ B સાચો છે કારણ કે PTH આંતરડામાંથી કેલ્શિયમનું શોષણ વધારે છે. વિકલ્પ D પણ સાચો છે કારણ કે PTH હાડકાંમાંથી કેલ્શિયમનું વિસર્જન વધારે છે, જે હાડકાંને નબળાં બનાવે છે.", "ncert_ref": "Class XII - પ્રકરણ 22: રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 35}, {"question": "એક વ્યક્તિમાં લાંબા સમયથી પેરાથાયરોઇડ ગ્રંથિની ક્રિયા અતિશય સક્રિય રહે છે. આ સ્થિતિમાં, રક્તમાં કેલ્શિયમનું સ્તર વધારવા માટે પેરાથોર્મોન (PTH) દ્વારા નીચેનામાંથી કયા અંગમાં કેલ્શિયમનું પુનઃશોષણ વધુ પ્રમાણમાં થાય છે?", "options": ["A) મૂત્રપિંડના પ્રોક્સિમલ કોન્વોલ્યુટેડ ટ્યુબ્યુલ", "B) મૂત્રપિંડના ડિસ્ટલ કોન્વોલ્યુટેડ ટ્યુબ્યુલ", "C) મૂત્રપિંડના લૂપ ઓફ હેનલે", "D) મૂત્રપિંડના કલેક્ટિંગ ડક્ટ"], "correct": 1, "explanation": "પેરાથોર્મોન (PTH) મુખ્યત્વે મૂત્રપિંડના ડિસ્ટલ કોન્વોલ્યુટેડ ટ્યુબ્યુલમાં કેલ્શિયમનું પુનઃશોષણ વધારે છે. પ્રોક્સિમલ કોન્વોલ્યુટેડ ટ્યુબ્યુલ (A)માં પુનઃશોષણ થાય છે, પરંતુ PTHની અસર ડિસ્ટલ ટ્યુબ્યુલ (B) પર વધુ પ્રભાવી હોય છે. લૂપ ઓફ હેનલે (C) અને કલેક્ટિંગ ડક્ટ (D)માં કેલ્શિયમનું પુનઃશોષણ PTH દ્વારા નગણ્ય પ્રમાણમાં થાય છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સંકેતન અને નિયંત્રણ", "difficulty": "Hard", "num": 36}, {"question": "એક વ્યક્તિમાં પેરાથાયરોઇડ ગ્રંથિની ક્રિયા લાંબા સમય સુધી અતિશય સક્રિય રહે છે. આ સ્થિતિમાં, રક્તમાં કેલ્શિયમનું સ્તર વધારે રહે છે, પરંતુ ફોસ્ફેટનું સ્તર ઓછું જોવા મળે છે. આ માટે નીચેનામાંથી કયો મુખ્ય કારણભૂત પથ ક્રિયાશીલ હશે?", "options": ["A) PTH દ્વારા હાડકાંમાંથી કેલ્શિયમનું મુક્તીકરણ વધે છે અને મૂત્રપિંડમાં ફોસ્ફેટનું ઉત્સર્જન વધે છે", "B) PTH દ્વારા આંતરડામાં કેલ્શિયમનું શોષણ ઘટે છે અને હાડકાંમાં ફોસ્ફેટનું જમા થાય છે", "C) PTH દ્વારા કિડનીના પ્રોક્સિમલ કન્વોલ્યુટેડ ટ્યુબ્યુલમાં કેલ્શિયમનું પુનઃશોષણ ઘટે છે અને ફોસ્ફેટનું ઉત્સર્જન ઘટે છે", "D) PTH દ્વારા પેરાથાયરોઇડ ગ્રંથિમાં કેલ્શિયમ-સંવેદનશીલ રિસેપ્ટરની સક્રિયતા ઘટે છે અને ફોસ્ફેટનું પુનઃશોષણ વધે છે"], "correct": 0, "explanation": "PTH (પેરાથોર્મોન) હાડકાંમાંથી કેલ્શિયમનું મુક્તીકરણ વધારીને રક્તમાં કેલ્શિયમનું સ્તર વધારે છે. એ જ રીતે, PTH મૂત્રપિંડમાં ફોસ્ફેટનું ઉત્સર્જન વધારીને રક્તમાં ફોસ્ફેટનું સ્તર ઘટાડે છે. આમ, વિકલ્પ A સાચો છે. વિકલ્પ B ખોટો છે કારણ કે PTH આંતરડામાં કેલ્શિયમનું શોષણ વધારે છે, ઘટાડતો નથી. વિકલ્પ C ખોટો છે કારણ કે PTH કિડનીના પ્રોક્સિમલ કન્વોલ્યુટેડ ટ્યુબ્યુલમાં કેલ્શિયમનું પુનઃશોષણ વધારે છે, ઘટાડતો નથી. વિકલ્પ D ખોટો છે કારણ કે PTH પેરાથાયરોઇડ ગ્રંથિમાં કેલ્શિયમ-સંવેદનશીલ રિસેપ્ટરની સક્રિયતા પર પ્રત્યક્ષ અસર કરતો નથી.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકેતન અને નિયંત્રણ", "difficulty": "Hard", "num": 37}, {"question": "એક દર્દીને લાંબા સમયથી હાડકાંમાં દુખાવો, સ્નાયુઓમાં ખેંચાણ અને ત્વચામાં ખંજવાળ આવે છે. તેના રક્ત પરીક્ષણમાં કેલ્શિયમનું પ્રમાણ 6.5 mg/dL જોવા મળે છે (સામાન્ય: 8.5–10.5 mg/dL). આ સ્થિતિમાં, નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) દર્દીને હાયપોકેલ્સેમિયા હોવાનું કહી શકાય", "B) દર્દીની પેરાથાયરોઇડ ગ્રંથિની ક્રિયા ઓછી હોવાનું કહી શકાય", "C) દર્દીના રક્તમાં PTHનું સ્તર સામાન્ય હશે", "D) દર્દીને વારંવાર સ્નાયુના ખેંચાણ (ટેટની) થવાનું જોખમ રહેલું છે"], "correct": 2, "explanation": "દર્દીને હાયપોકેલ્સેમિયા (કેલ્શિયમની ઉણપ) છે, જે પેરાથાયરોઇડ ગ્રંથિની અપૂરતી ક્રિયા (હાયપોપેરાથાયરોઇડિઝમ)ને કારણે થઈ શકે છે. આ સ્થિતિમાં, PTHનું સ્તર સામાન્ય કરતાં ઓછું હશે, નહીં કે સામાન્ય. આમ, વિકલ્પ C ખોટો છે. વિકલ્પ A સાચો છે કારણ કે કેલ્શિયમનું પ્રમાણ 6.5 mg/dL હાયપોકેલ્સેમિયાનું લક્ષણ છે. વિકલ્પ B સાચો છે કારણ કે PTHની ઉણપને કારણે કેલ્શિયમનું સ્તર ઘટે છે. વિકલ્પ D સાચો છે કારણ કે હાયપોકેલ્સેમિયામાં સ્નાયુના ખેંચાણ (ટેટની) થવાનું જોખમ રહેલું છે.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકેતન અને નિયંત્રણ", "difficulty": "Hard", "num": 38}, {"question": "એક વ્યક્તિમાં લાંબા સમયથી પેરાથાયરોઇડ ગ્રંથિની અતિશય ક્રિયાશીલતા (હાયપરપેરાથાયરોઇડિઝમ) જોવા મળે છે. નીચેનામાંથી કયું પરિણામ અપેક્ષિત નથી?", "options": ["A) હાડકાંમાંથી કેલ્શિયમનું સતત મુક્ત થવું અને ઓસ્ટિયોપોરોસિસનો વિકાસ", "B) રક્તમાં કેલ્શિયમનું સ્તર સામાન્ય કરતાં ઓછું રહેવું (હાઇપોકેલ્સેમિયા)", "C) મૂત્રમાં કેલ્શિયમનું ઉત્સર્જન વધવું અને કિડની સ્ ફ્રોન કોષો", "D) યકૃતના હેપેટોસાઇટ કોષો"], "correct": 3, "explanation": "PTH હાડકાંના ઓસ્ટિઓક્લાસ્ટ કોષો (A) દ્વારા હાડકાંમાંથી કેલ્શિયમ મુક્ત કરે છે, આંતરડાના ઉપકળા કોષો (B) દ્વારા કેલ્શિયમનું શોષણ વધારે છે, અને કિડનીના નેફ્રોન કોષો (C) દ્વારા કેલ્શિયમનું પુનઃશોષણ વધારે છે. યકૃતના હેપેટોસાઇટ કોષો (D) કેલ્શિયમના હોમિયોસ્ટેસિસમાં સીધો ભાગ લેતા નથી.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક નિયંત્રણ અને સમન્વય", "difficulty": "Hard", "num": 44}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
