    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}

        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}

        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}

        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}

        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}

        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>

    <script>
        const questionsData = [{"question": "થાઇમસ ગ્રંથિના કયા ભાગમાં થાઇમોસિન હોર્મોનનું ઉત્પાદન થાય છે અને તે કયા કોષો પર અસર કરે છે?", "options": ["A) થાઇમસના કોર્ટેક્સમાં, T-લસિકાકોષો પર", "B) થાઇમસના મેડ્યુલામાં, B-લસિકાકોષો પર", "C) થાઇમસના કોર્ટેક્સમાં, B-લસિકાકોષો પર", "D) થાઇમસના મેડ્યુલામાં, NK-કોષો પર"], "correct": 0, "explanation": "થાઇમોસિન હોર્મોનનું ઉત્પાદન થાઇમસના કોર્ટેક્સ (બાહ્ય ભાગ)માં થાય છે અને તે મુખ્યત્વે T-લસિકાકોષો (T-લિમ્ફોસાઇટ્સ)ના પરિપક્વન અને વિભેદન પર અસર કરે છે. B-લસિકાકોષો અને NK-કોષો થાઇમસ સાથે સીધા સંબંધ ધરાવતા નથી. મેડ્યુલા (આંતરિક ભાગ) થાઇમોસિનનું ઉત્પાદન કરતું નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 1}, {"question": "થાઇમોસિન હોર્મોનની કયી ક્રિયા પ્રતિરક્ષાતંત્રના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે?", "options": ["A) B-લસિકાકોષોનું પ્રસરણ વધારવું", "B) T-લસિકાકોષોનું વિભેદન અને પરિપક્વન", "C) એન્ટીબોડીનું ઉત્પાદન વધારવું", "D) મોનોસાઇટ્સને મેક્રોફેજમાં રૂપાંતરિત કરવું"], "correct": 1, "explanation": "થાઇમોસિન હોર્મોન T-લસિકાકોષો (T-લિમ્ફોસાઇટ્સ)ના વિભેદન અને પરિપક્વનમાં મહત્વની ભૂમિકા ભજવે છે, જે પ્રતિરક્ષાતંત્રના સેલ-મધ્યસ્થી પ્રતિક્રિયા (cell-mediated immunity) માટે આવશ્યક છે. B-લસિકાકોષો, એન્ટીબોડી ઉત્પાદન, અને મોનોસાઇટ્સનું રૂપાંતરણ થાઇમોસિનની પ્રાથમિક ક્રિયા નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 2}, {"question": "જો એક વ્યક્તિમાં થાઇમસ ગ્રંથિ જન્મજાત રીતે અનુપસ્થિત હોય, તો તેના પ્રતિરક્ષાતંત્ર પર કયો પ્રભાવ પડશે?", "options": ["A) B-લસિકાકોષોની સંખ્યા ઘટશે", "B) T-લસિકાકોષોની સંખ્યા અને ક્રિયાશીલતા ઘટશે", "C) એન્ટીબોડીનું ઉત્પાદન બંધ થશે", "D) મેક્રોફેજની ક્રિયાશીલતા વધશે"], "correct": 1, "explanation": "થાઇમસ ગ્રંથિ T-લસિકાકોષોના પરિપક્વન અને વિભેદન માટે જરૂરી છે. જો થાઇમસ અનુપસ્થિત હોય, તો T-લસિકાકોષોની સંખ્યા અને ક્રિયાશીલતા ઘટશે, જે સેલ-મધ્યસ્થી પ્રતિક્રિયાને અસર કરશે. B-લસિકાકોષો, એન્ટીબોડી ઉત્પાદન, અને મેક્રોફેજની ક્રિયાશીલતા થાઇમસ પર આધારિત નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 3}, {"question": "થાઇમોસિન હોર્મોન અને ઇન્ટરલ્યુકિન-2 (IL-2) વચ્ચેનો સંબંધ કયો છે?", "options": ["A) થાઇમોસિન IL-2નું ઉત્પાદન રોકે છે", "B) થાઇમોસિન IL-2ના ઉત્પાદનને પ્રોત્સાહન આપે છે", "C) IL-2 થાઇમોસિનનું ઉત્પાદન રોકે છે", "D) થાઇમોસિન અને IL-2 વચ્ચે કોઈ સંબંધ નથી"], "correct": 1, "explanation": "થાઇમોસિન હોર્મોન T-લસિકાકોષોના વિભેદન અને પરિપક્વનને પ્રોત્સાહન આપે છે, જેના પરિણામે ઇન્ટરલ્યુકિન-2 (IL-2) જેવા સાયટોકાઇન્સનું ઉત્પાદન વધે છે. IL-2 T-લસિકાકોષોની વૃદ્ધિ અને પ્રસરણ માટે મહત્વપૂર્ણ છે. થાઇમોસિન IL-2નું ઉત્પાદન રોકતું નથી, અને IL-2 થાઇમોસિનના ઉત્પાદનને અસર કરતું નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 4}, {"question": "થાઇમસ ગ્રંથિની ક્રિયા વય સાથે ઘટતી જાય છે. આ ઘટાડાને કયા શબ્દ વડે ઓળખવામાં આવે છે?", "options": ["A) થાઇમિક હાઇપરપ્લેશિયા", "B) થાઇમિક ઇનવોલ્યુશન", "C) થાઇમિક એપ્લેશિયા", "D) થાઇમિક મેટાપ્લેશિયા"], "correct": 1, "explanation": "વય સાથે થાઇમસ ગ્રંથિની ક્રિયા અને કદમાં ઘટાડો થવાને 'થાઇમિક ઇનવોલ્યુશન' (Thymic involution) કહેવાય છે. હાઇપરપ્લેશિયા (વૃદ્ધિ), એપ્લેશિયા (અલ્પવિકાસ), અને મેટાપ્લેશિયા (પેશીના રૂપાંતરણ) આ ઘટનાને વર્ણવતી નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 5}, {"question": "થાઇમોસિન હોર્મોનના સંદર્ભમાં નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) તે T-લસિકાકોષોના પરિપક્વતામાં મદદ કરે છે અને B-લસિકાકોષો પર કોઈ અસર કરતું નથી.", "B) તે B-લસિકાકોષોની વૃદ્ધિ અને પરિપક્વતામાં સીધી ભૂમિકા ભજવે છે.", "C) તે મેડ્યુલરી થાઇમિક એપિથેલિયલ કોષો દ્વારા સ્રાવાય છે અને મુખ્યત્વે મોનોસાઇટ્સને પ્રભાવિત કરે છે.", "D) તે થાઇમસમાંથી સ્રાવાતા એકમાત્ર હોર્મોન છે અને તેની ઉણપથી ઓટોઇમ્યુન રોગો થાય છે."], "correct": 0, "explanation": "થાઇમોસિન હોર્મોન T-લસિકાકોષોના પરિપક્વતામાં મહત્વની ભૂમિકા ભજવે છે, પરંતુ B-લસિકાકોષો પર તેની કોઈ સીધી અસર થતી નથી. વિકલ્પ B ખોટો છે કારણ કે થાઇમોસિન B-લસિકાકોષો પર કોઈ સીધી અસર કરતું નથી. વિકલ્પ C ખોટો છે કારણ કે થાઇમોસિન કોર્ટિકલ એપિથેલિયલ કોષો દ્વારા સ્રાવાય છે, મેડ્યુલર , "B) સિકલ સેલ એનિમિયા (Sickle cell anemia)", "C) ડાયજોર્જ સિન્ડ્રોમ (DiGeorge syndrome)", "D) હેમોફિલિયા (Hemophilia)"], "correct": 2, "explanation": "**ડાયજોર્જ સિન્ડ્રોમ (DiGeorge syndrome)** એ એક જન્મજાત વિકાર છે જેમાં થાઇમસ ગ્રંથિ અને પેરાથાઇરોઇડ ગ્રંથિનો અભાવ અથવા અપૂર્ણ વિકાસ જોવા મળે છે. આના કારણે **T-કોષોનો અભાવ** અને ગંભીર ઇમ્યુનોડેફિશિયન્સી થાય છે. ડાયાબિટીસ મેલિટસ (A) ઇન્સ્યુલિનના અભાવને કારણે થાય છે, સિકલ સેલ એનિમિયા (B) હિમોગ્લોબિનના વિકારને કારણે થાય છે, અને હેમોફિલિયા (D) રક્ત ગંઠાવાનાં પરિબળોના અભાવને કારણે થાય છે.", "ncert_ref": "Class XII - પ્રકરણ 10: માનવ તંત્ર - પ્રતિરક્ષાતંત્ર", "difficulty": "Hard", "num": 25}, {"question": "થાઇમોસિન હોર્મોનના સંદર્ભમાં નીચેનામાંથી કયું વિધાન સૌથી યોગ્ય રીતે દર્શાવે છે કે તે T-લિમ્ફોસાઇટ્સના પરિપક્વતામાં કેવી રીતે ભાગ ભજવે છે?", "options": ["A) તે સીધા જ B-કોષો પર અસર કરે છે અને ઇમ્યુનોગ્લોબ્યુલિનના ઉત્પાદનને પ્રેરે છે.", "B) તે થાઇમસ ગ્રંથિમાં T-કોષોના વિકાસ દરમિયાન વર્ગીકરણ અને સેલ્ફ-રિએક્ટિવ કોષોના નાશમાં મદદ કરે છે.", "C) તે મેડ્યુલરી એપિથેલિયલ કોષો દ્વારા સ્રાવાય છે અને સીધા જ એન્ટીજેનને નિશાન બનાવે છે.", "D) તે પ્રતિરક્ષાતંત્રમાં મેમરી કોષોના નિર્માણને રોકે છે."], "correct": 1, "explanation": "થાઇમોસિન હોર્મોન થાઇમસ ગ્રંથિમાંથી સ્રાવાય છે અને T-લિમ્ફોસાઇટ્સના પરિપક્વતામાં મહત્વની ભૂમિકા ભજવે છે. તે થાઇમસ ગ્રંથિમાં T-કોષોના વિકાસ દરમિયાન વર્ગીકરણ (પોઝિટિવ અને નેગેટિવ સેલેક્શન) અને સેલ્ફ-રિએક્ટિવ કોષોના નાશમાં મદદ કરે છે. વિકલ્પ A ખોટો છે કારણ કે થાઇમોસિન B-કોષો પર સીધી અસર કરતું નથી. વિકલ્પ C ખોટો છે કારણ કે થાઇમોસિન મેડ્યુલરી એપિથેલિયલ કોષો દ્વારા સ્રાવાય છે, પરંતુ તે સીધા જ એન્ટીજેનને નિશાન બનાવતું નથી. વિકલ્પ D ખોટો છે કારણ કે થાઇમોસિન મેમરી કોષોના નિર્માણને પ્રોત્સાહન આપે છે, રોકતું નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 26}, {"question": "નીચેનામાંથી કયું વિધાન થાઇમોસિન હોર્મોન અને પ્રતિરક્ષાતંત્રના વિકાસ વિશે ખોટું છે?", "options": ["A) થાઇમોસિન હોર્મોન થાઇમસ ગ્રંથિમાંથી સ્રાવાય છે અને T-કોષોના પરિપક્વતામાં મદદ કરે છે.", "B) થાઇમોસિન હોર્મો ity) લગભગ સંપૂર્ણપણે નાશ પામશે", "D) ઉંદરમાં પ્રાથમિક લસિકા અંગો (Primary lymphoid organs)ની ક્રિયાશીલતામાં કોઈ ફેર પડશે નહીં"], "correct": 3, "explanation": "સાચો જવાબ D છે કારણ કે થાઇમસ ગ્રંથિ પોતે એક પ્રાથમિક લસિકા અંગ છે અને તેની ગેરહાજરીમાં T-કોષોના પરિપક્વતામાં ગંભીર અવરોધ આવે છે, જે પ્રાથમિક લસિકા અંગોની ક્રિયાશીલતાને સીધી અસર કરે છે. વિકલ્પ A, B અને C થાઇમસ ગ્રંથિની ગેરહાજરી સાથે સુસંગત છે: T-કોષોની સંખ્યામાં ઘટાડો થશે (A), B-કોષોની ક્રિયા પર પ્રત્યક્ષ અસર નહીં થાય પરંતુ T-સહાયક કોષોની ગેરહાજરીને કારણે એન્ટિબોડી ઉત્પાદન પર અસર થઈ શકે (B ખોટું નથી પરંતુ સંપૂર્ણ સાચું પણ નથી), અને કોષીય પ્રતિરક્ષા લગભગ નાશ પામશે (C). જ્યારે વિકલ્પ D સંપૂર્ણપણે ખોટો છે કારણ કે થાઇમસ ગ્રંથિ પ્રાથમિક લસિકા અંગ છે અને તેની ગેરહાજરી પ્રાથમિક લસિકા અંગોની ક્રિયાશીલતાને અસર કરે છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો (પ્રતિરક્ષાતંત્ર અને લસિકા અંગો)", "difficulty": "Hard", "num": 29}, {"question": "થાઇમોસિન હોર્મોનના સંદર્ભમાં નીચેનામાંથી કયું વિધાન **અપવાદરૂપ** છે? (એટલે કે, જે સામાન્ય રીતે થાઇમોસિન માટે લાગુ પડતું નથી)", "options": ["A) થાઇમોસિન હોર્મોન થાઇમસ ગ્રંથિના એપિથેલિયલ કોષો દ્વારા સ્રાવિત થાય છે", "B) થાઇમોસિન હોર્મોન T-લિમ્ફોસાઇટ્સના પરિપક્વતામાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે", "C) થાઇમોસિન હોર્મોનની ક્રિયા મુખ્યત્વે અંતઃસ્ત્રાવી (Endocrine) પદ્ધતિ દ્વારા થાય છે", "D) થાઇમોસિન હોર્મોનની ક્રિયા વય સાથે ઘટતી જાય છે, જેને 'થાઇમિક ઇન્વોલ્યુશન' કહે છે"], "correct": 2, "explanation": "સાચો જવાબ C છે કારણ કે થાઇમોસિન હોર્મોન મુખ્યત્વે પેરાક્રાઇન (Paracrine) અથવા ઓટોક્રાઇન (Autocrine) પદ્ધતિ દ્વારા કામ કરે છે, નહીં કે અંતઃસ્ત્રાવી પદ્ધતિ દ્વારા. વિકલ્પ A સાચું છે કારણ કે થાઇમોસિન થાઇમસના એપિથેલિયલ કોષોમાંથી સ્રાવિત થાય છે. વિકલ્પ B પણ સાચું છે કારણ કે થાઇમોસિન T-કોષોના પરિપક્વતામાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે. વિકલ્પ D પણ સાચું છે કારણ કે થાઇમસ ગ્રંથિની ક્રિયા વય સાથે ઘટે છે, જેને થાઇમિક ઇન્વોલ્યુશન કહે છે. માત્ર વિકલ્પ C અપવાદરૂપ છે કારણ કે થાઇમોસિન અંતઃસ્ત્રાવી હોર્મોન નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 22: રાસાયણિક સંકલન અને એકીકરણ (હોર્મોન્સ અને તેમની ક્રિયા પદ્ધતિ)", "difficulty": "Hard", "num": 30}, {"question": "થાઇમોસિન હોર્મોનના સંશ્લેષણ અને સ્રાવણ સાથે સંકળાયેલા એપિથેલિયલ કોષોના પ્રકાર વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) થાઇમસ ગ્રંથિમાં રહેલા હાસ્ય કોષો (Hassall’s corpuscles) થાઇમોસિનનું સંશ્લેષણ કરે છે.", "B) થાઇમસ ગ્રંથિમાં રહેલા રેટિક્યુલર એપિથેલિયલ કોષો થાઇમોસિનનું સંશ્લેષણ અને સ્રાવણ કરે છે.", "C) થાઇમસ ગ્રંથિમાં રહેલા લસિકા કોષો (Lymphocytes) થાઇમોસિનનું સ્રાવણ કરે છે.", "D) થાઇમસ ગ્રંથિમાં રહેલા મેડ્યુલરી કોષો (Medullary cells) થાઇમોસિનનું સંશ્લેષણ કરે છે."], "correct": 1, "explanation": "થાઇમસ ગ્રંથિમાં રહેલા રેટિક્યુલર એપિથેલિયલ કોષો થાઇમોસિન હોર્મોનનું સંશ્લેષણ અને સ્રાવણ કરે છે. હાસ્ય કોષો (Hassall’s corpuscles) થાઇમસ ગ્રંથિના મધ્ય ભાગમાં જોવા મળે છે અને તેમની ભૂમિકા થાઇમોસિન સંશ્લેષણ સાથે સંકળાયેલી નથી. લસિકા કોષો (Lymphocytes) થાઇમોસિનનું સ્રાવણ કરતા નથી, પરંતુ તેઓ થાઇમોસિનના પ્રભાવ હેઠળ પરિપક્વ થાય છે. મેડ્યુલરી કોષો (Medullary cells) થાઇમોસિનનું સંશ્લેષણ કરતા નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 31}, {"question": "થાઇમોસિન હોર્મોનના અભાવમાં, નીચેનામાંથી કયો પરિણામ T-કોષોના વિકાસ પર થશે?", "options": ["A) T-કોષોની સંખ્યા વધશે પરંતુ તેમની ક્રિયાશીલતા ઘટશે.", "B) T-કોષોનું પરિપક્વીકરણ (Maturation) અટકી જશે, જેથી પ્રતિરક્ષા પ્રતિક્રિયા નબળ પડશે.", "C) T-કોષો B-કોષોમાં રૂપાંતરિત થશે.", "D) T-કોષો સીધા જ કોષીય પ્રતિરક્ષા પ્રતિક્રિયામાં ભાગ લેશે."], "correct": 1, "explanation": "થાઇમોસિન હોર્મોન T-કોષોના પરિપક્વીકરણ (Maturation) માટે આવશ્યક છે. તેના અભાવમાં, T-કોષોનું પરિપક્વીકરણ અટકી જાય છે, જેથી પ્રતિરક્ષા પ્રતિક્રિયા નબળ પડે છે. T-કોષોની સંખ્યા વધવી અથવા તેમની ક્રિયાશીલતા ઘટવી એ થાઇમોસિનના અભાવનો સીધો પરિણામ નથી. T-કોષો B-કોષોમાં રૂપાંતરિત થતા નથી, અને તેઓ કોષીય પ્રતિરક્ષા પ્રતિક્રિયામાં સીધા ભાગ લેતા નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 32}, {"question": "થાઇમોસિન હોર્મોન અને ઇન્ટરલ્યુકિન-2 (IL-2) વચ્ચેનો સંબંધ નીચેનામાંથી કયો સૌથી યોગ્ય રીતે વર્ણવે છે?", "options": ["A) થાઇમોસિન હોર્મોન IL-2 નું ઉત્પાદન વધારે છે, જ્યારે IL-2 T-કોષોના પ્રસરણને ઉત્તેજિત કરે છે.", "B) થાઇમોસિન હોર્મોન અને IL-2 બંને T-કોષોના પરિપક્વીકરણ માટે જરૂરી છે, પરંતુ તેઓ પરસ્પર સ્વતંત્ર રીતે કામ કરે છે.", "C) IL-2 થાઇમોસિન હોર્મોનનું ઉત્પાદન ઉત્તેજિત કરે છે, જ્યારે થાઇમોસિન IL-2 ને અવરોધે છે.", "D) થાઇમોસિન હોર્મોન અને IL-2 બંને B-કોષોના વિકાસ માટે જરૂરી છે."], "correct": 0, "explanation": "થાઇમોસિન હોર્મોન IL-2 નું ઉત્પાદન વધારે છે, જ્યારે IL-2 T-કોષોના પ્રસરણને ઉત્તેજિત કરે છે. થાઇમોસિન અને IL-2 પરસ્પર સહકાર્ય કરે છે, પરંતુ IL-2 થાઇમોસિનનું ઉત્પાદન ઉત્તેજિત કરતું નથી અથવા થાઇમોસિન IL-2 ને અવરોધતું નથી. થાઇમોસિન અને IL-2 બંને B-કોષોના વિકાસ માટે જરૂરી નથી, પરંતુ T-કોષોના વિકાસ માટે મહત્વપૂર્ણ છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 33}, {"question": "થાઇમોસિન હોર્મોનના સંદર્ભમાં નીચેનામાંથી કયું વિધાન અપવાદરૂપ (Exception) છે?", "options": ["A) થાઇમોસિન હોર્મોન T-કોષોના પરિપક્વીકરણમાં મહત્વની ભૂમિકા ભજવે છે.", "B) થાઇમોસિન હોર્મોનનું સ્રાવ વય સાથે ઘટતું જાય છે.", "C) થાઇમોસિન હોર્મોન B-કોષોના વિકાસને સીધી રીતે ઉત્તેજિત કરે છે.", "D) થાઇમોસિન હોર્મોન પ્રતિરક્ષાતંત્રની કોષીય અને હ્યુમોરલ બંને શાખાઓને પ્રભાવિત કરે છે."], "correct": 2, "explanation": "થાઇમોસિન હોર્મોન B-કોષોના વિકાસને સીધી રીતે ઉત્તેજિત કરતું નથી. તે મુખ્યત્વે T-કોષોના પરિપક્વીકરણમાં મહત્વની ભૂમિકા ભજવે છે. થાઇમોસિન હોર્મોનનું સ્રાવ વય સાથે ઘટતું જાય છે, અને તે પ્રતિરક્ષાતંત્રની કોષીય અને હ્યુમોરલ બંને શાખાઓને પ્રભાવિત કરે છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 34}, {"question": "થાઇમોસિન હોર્મોનના સંશ્લેષણમાં નીચેનામાંથી કયા કોષો સીધી ભૂમિકા ભજવતા નથી, પરંતુ પરોક્ષ રીતે તેના નિયમનમાં મદદ કરે છે?", "options": ["A) થાઇમસના એપિથેલિયલ કોષો", "B) થાઇમસના રેટિક્યુલર કોષો", "C) મેગાકેરિયોસાઇટ્સ", "D) માયોઇડ કોષો"], "correct": 2, "explanation": "થાઇમોસિન હોર્મોનનું સંશ્લેષણ મુખ્યત્વે થાઇમસના એપિથેલિયલ કોષો (A) અને રેટિક્યુલર કોષો (B) દ્વારા થાય છે. માયોઇડ કોષો (D) થાઇમસમાં હ                     optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
