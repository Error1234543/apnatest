    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>

    <script>
        const questionsData = [{"question": "નીચેનામાંથી કયો હોર્મોન પિટ્યુટરી ગ્રંથિથી સ્રાવાય છે અને તેનું મુખ્ય કાર્ય અંતઃસ્રાવી ગ્રંથિઓને ઉત્તેજિત કરવાનું છે?", "options": ["A) થાયરોક્સિન", "B) ઇન્સ્યુલિન", "C) એડ્રિનેલિન", "D) થાયરોઇડ-ઉત્તેજક હોર્મોન (TSH)"], "correct": 3, "explanation": "થાયરોઇડ-ઉત્તેજક હોર્મોન (TSH) પિટ્યુટરી ગ્રંથિથી સ્રાવાય છે અને તે થાયરોઇડ ગ્રંથિને ઉત્તેજિત કરે છે. થાયરોક્સિન થાયરોઇડ ગ્રંથિથી સ્રાવાય છે, ઇન્સ્યુલિન અગ્ન્યાશયથી સ્રાવાય છે, અને એડ્રિનેલિન એડ્રિનલ ગ્રંથિથી સ્રાવાય છે. આમ, TSH જ એવો હોર્મોન છે જે પિટ્યુટરી ગ્રંથિથી સ્રાવાય છે અને અંતઃસ્રાવી ગ્રંથિઓને ઉત્તેજિત કરે છે.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક નિયંત્રણ અને સમન્વય", "difficulty": "Hard", "num": 1}, {"question": "જ્યારે રક્તમાં ગ્લુકોઝનું સ્તર ઊંચું હોય ત્યારે કયો હોર્મોન સ્રાવાય છે અને તે કેવી રીતે ક્રિયા કરે છે?", "options": ["A) ગ્લુકેગોન – યકૃતમાં ગ્લાયકોજનને ગ્લુકોઝમાં રૂપાંતરિત કરે છે", "B) ઇન્સ્યુલિન – કોષોને ગ્લુકોઝ ગ્રહણ કરવા ઉત્તેજિત કરે છે", "C) એડ્રિનેલિન – હૃદયના ધબકારા વધારે છે", "D) કોર્ટિઝોલ – પ્રોટીનના ચયાપચયને નિયંત્રિત કરે છે"], "correct": 1, "explanation": "રક્તમાં ગ્લુકોઝનું સ્તર ઊંચું હોય ત્યારે ઇન્સ્યુલિન સ્રાવાય છે, જે કોષોને ગ્લુકોઝ ગ્રહણ કરવા ઉત્તેજિત કરે છે. ગ્લુકેગોન રક્તમાં ગ્લુકોઝનું સ્તર નીચું હોય ત્યારે સ્રાવાય છે, એડ્રિનેલિન હૃદયના ધબકારા વધારે છે, અને કોર્ટિઝોલ પ્રોટીનના ચયાપચયને નિયંત્રિત કરે છે. આમ, ઇન્સ્યુલિન જ રક્તમાં ગ્લુકોઝનું સ્તર ઘટાડવા માટે ક્રિયા કરે છે.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક નિયંત્રણ અને સમન્વય", "difficulty": "Hard", "num": 2}, {"question": "નીચેનામાંથી કયો હોર્મોન પેશી વિકાસ અને પ્રોટીન સંશ્લેષણમાં મહત્વની ભૂમિકા ભજવે છે?", "options": ["A) ઓક્સિટોસિન", "B) વૃદ્ધિ હોર્મોન (GH)", "C) પ્રોલેક્ટિન", "D) વાસોપ્રેસિન"], "correct": 1, "explanation": "વૃદ્ધિ હોર્મોન (GH) પેશી વિકાસ અને પ્રોટીન સંશ્લેષણમાં મહત્વની ભૂમિકા ભજવે છે. ઓક્સિટોસિન પ્રસૂતિ અને સ્તનપાન દરમિયાન ગર્ભાશયના સંકોચનને ઉત્તેજિત કરે છે, પ્રોલેક્ટિન સ્તનપાન દરમિયાન દૂધ ઉત્પાદનને ઉત્તેજિત કરે છે, અને વાસોપ્રેસિન મૂત્રના સાંદ્રતાન ion": "ઇન્સ્યુલિન પેંક્રિયાસની બીટા-કોષો દ્વારા સ્રાવાય છે અને તે રક્તમાં ગ્લુકોઝનું સ્તર ઘટાડવા માટે યકૃતમાં ગ્લાયકોજનના સંશ્લેષણને પ્રોત્સાહન આપે છે. ગ્લુકેગોન (અલ્ફા-કોષો દ્વારા સ્રાવાય છે) તેની વિરુદ્ધ અસર કરે છે. એપીનેફ્રિન રક્તમાં ગ્લુકોઝનું સ્તર વધારે છે, કોર્ટિસોલ ચયાપચયને પ્રભાવિત કરે છે પરંતુ ગ્લુકોઝના સ્તરને નિયંત્રિત કરતું નથી, અને થાયરોક્સિન ચયાપચય દરને નિયંત્રિત કરે છે પરંતુ ગ્લુકોઝના સ્તરને સીધી અસર કરતું નથી.", "ncert_ref": "Class XI - પ્રકરણ 22: રસાયણિક નિયંત્રણ અને સમન્વય", "difficulty": "Hard", "num": 6}, {"question": "નીચેનામાંથી કયો હોર્મોન મહિલાઓમાં ગર્ભાશયની દીવાલને મજબૂત કરે છે અને ગર્ભાવસ્થા દરમિયાન ગર્ભના વિકાસ માટે જરૂરી પોષક તત્વોના વહનને સુનિશ્ચિત કરે છે?", "options": ["A) એસ્ટ્રોજન", "B) પ્રોજેસ્ટેરોન", "C) પ્રોલેક્ટિન", "D) ઓક્સીટોસિન"], "correct": 1, "explanation": "પ્રોજેસ્ટેરોન મહિલાઓમાં ગર્ભાશયની દીવાલને મજબૂત કરે છે અને ગર્ભાવસ્થા દરમિયાન ગર્ભના વિકાસ માટે જરૂરી પોષક તત્વોના વહનને સુનિશ્ચિત કરે છે. એસ્ટ્રોજન ગર્ભાશયની દીવાલના વિકાસને પ્રોત્સાહન આપે છે પરંતુ મજબૂતાઈ માટે નહીં, પ્રોલેક્ટિન દૂધ ઉત્પાદનને પ્રોત્સાહન આપે છે, અને ઓક્સીટોસિન પ્રસવ અને દૂધ સ્રાવણને પ્રોત્સાહન આપે છે.", "ncert_ref": "Class XII - પ્રકરણ 3: માનવ પ્રજનન", "difficulty": "Hard", "num": 7}, {"question": "નીચેનામાંથી કયો હોર્મોન પુરુષોમાં વૃષણની વિકાસ અને ટેસ્ટોસ્ટેરોનના સ્રાવને નિયંત્રિત કરે છે?", "options": ["A) ફોલિકલ-સ્ટિમ્યુલેટિંગ હોર્મોન (FSH)", "B) લ્યુટિનાઇઝિંગ હોર્મોન (LH)", "C) પ્રોલેક્ટિન", "D) થાયરોક્સિન"], "correct": 1, "explanation": "લ્યુટિનાઇઝિંગ હોર્મોન (LH) પિટ્યુટરી ગ્રંથિ દ્વારા સ્રાવાય છે અને તે પુરુષોમાં વૃષણની વિકાસ અને ટેસ્ટોસ્ટેરોનના સ્રાવને નિયંત્રિત કરે છે. FSH શુક્રાણુઓના ઉત્પાદનને પ્રોત્સાહન આપે છે, પ્રોલેક્ટિન દૂધ ઉત્પાદનને પ્રોત્સાહન આપે છે, અને થાયરોક્સિન ચયાપચયને નિયંત્રિત કરે છે.", "ncert_ref": "Class XII - પ્રકરણ 3: માનવ પ્રજનન", "difficulty": "Hard", "num": 8}, {"question": "કયો હોર્મોન એડ્રિનલ મેડ્યુલા દ્વારા સ્રાવાય છે અને તે શરીરને તણાવ અથવા ખતરાના સમયે 'લડવું અથવા ભાગવું' પ્રતિક્રિયા માટે તૈયાર કરે છે?", "options": ["A) કોર  જે પણ પિટ્યુટરી ગ્રંથિથી સ્રાવાય છે. પ્રોજેસ્ટેરોન (C) અગ્ન્યાશય અને અંડાશય દ્વારા સ્રાવાય છે અને ગર્ભાવસ્થા દરમિયાન દૂધના વિકાસને ટેકો આપે છે, પરંતુ તે દૂધના સ્રાવને પ્રેરતો નથી. કોલોસ્ટ્રમ-ઉત્તેજક હોર્મોન (D) એ અસ્તિત્વમાં નથી, તેથી તે અયોગ્ય વિકલ્પ છે. પરંતુ પ્રશ્નમાં 'પરંતુ તેનું સ્રાવ પિટ્યુટરી ગ્રંથિથી થતું નથી' એ શરત છે, તેથી પ્રોજેસ્ટેરોન (C) એ યોગ્ય જવાબ છે કારણ કે તે દૂધના સ્રાવને અપ્રત્યક્ષ રીતે ટેકો આપે છે અને પિટ્યુટરી ગ્રંથિથી સ્રાવાય નહીં.", "ncert_ref": "Class XII - Chapter 7: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 20}, {"question": "અગ્ન્યાશયમાં સ્રાવાતા હોર્મોન પૈકી કયો હોર્મોન રક્તમાં ગ્લુકોઝના સ્તરને ઘટાડવા ઉપરાંત, કોષોની વૃદ્ધિ અને વિભાજનને પણ પ્રોત્સાહન આપે છે?", "options": ["A) ઇન્સ્યુલિન", "B) ગ્લુકેગોન", "C) સોમેટોસ્ટેટિન", "D) પેપ્ટાઇડ YY"], "correct": 0, "explanation": "ઇન્સ્યુલિન (A) રક્તમાં ગ્લુકોઝના સ્તરને ઘટાડવા ઉપરાંત, કોષોની વૃદ્ધિ અને વિભાજનને પ્રોત્સાહન આપે છે. ગ્લુકેગોન (B) રક્તમાં ગ્લુકોઝનું સ્તર વધારે છે. સોમેટોસ્ટેટિન (C) વૃદ્ધિ હોર્મોન અને ઇન્સ્યુલિનના સ્રાવને અવરોધે છે. પેપ્ટાઇડ YY (D) આંતરડાના હલનચલનને ધીમું પાડે છે. NCERT મુજબ, ઇન્સ્યુલિનના બહુવિધ કાર્યો છે, જેમાં ગ્લુકોઝના ચયાપચય ઉપરાંત કોષવિભાજનને પ્રોત્સાહન આપવું પણ સામેલ છે.", "ncert_ref": "Class XI - પ્રકરણ 22: રસાયણિક નિયંત્રણ અને સંકલન", "difficulty": "Hard", "num": 21}, {"question": "થાયરોઇડ ગ્રંથિ દ્વારા સ્રાવાતા હોર્મોન પૈકી કયો હોર્મોન કેલ્શિયમના ચયાપચયને નિયંત્રિત કરતો નથી, પરંતુ શરીરની વૃદ્ધિ અને વિકાસમાં મહત્વની ભૂમિકા ભજવે છે?", "options": ["A) થાયરોક્સિન (T4)", "B) ટ્રાયઆયોડોથાયરોનિન (T3)", "C) કેલ્સિટોનિન", "D) થાયરોઇડ પ્રેરક હોર્મોન (TSH)"], "correct": 0, "explanation": "થાયરોક્સિન (T4) (A) અને ટ્રાયઆયોડોથાયરોનિન (T3) (B) શરીરની વૃદ્ધિ અને વિકાસમાં મહત્વની ભૂમિકા ભજવે છે, પરંતુ કેલ્શિયમના ચયાપચયને નિયંત્રિત કરતા નથી. કેલ્સિટોનિન (C) કેલ્શિયમના ચયાપચયને નિયંત્રિત કરે છે. TSH (D) થાયરોઇડ ગ્રંથિને ઉત્તેજિત કરે છે, પરંતુ તે થાયરોઇડ દ્વારા સ્રાવાતો નથી. NCERT મુજબ, T3 અને T4 વૃદ્ધિ અને વિકાસમાં મહત્વપૂર્ણ છે.", "ncert_ref": "Class XI - પ્રકરણ 2 T મુજબ, hCG ગર્ભાવસ્થા દરમિયાન કોર્પસ લ્યુટિયમને જાળવી રાખે છે.", "ncert_ref": "Class XII - પ્રકરણ 3: માનવ પ્રજનન", "difficulty": "Hard", "num": 25}, {"question": "જ્યારે અંતઃસ્રાવી ગ્રંથિઓ દ્વારા સ્રાવાતા હોર્મોનની અસરને લક્ષ્ય અંગ પર થાય છે, ત્યારે નીચેનામાંથી કયો હોર્મોન તેની અસર માટે સાયક્લિક એમપી (cAMP) ને દૂત તરીકે વાપરતો નથી?", "options": ["A) એડ્રિનેલિન", "B) ગ્લુકેગોન", "C) ઇન્સ્યુલિન", "D) એફએસએચ (FSH)"], "correct": 2, "explanation": "ઇન્સ્યુલિન તેની અસર માટે સાયક્લિક એમપી (cAMP) ને દૂત તરીકે વાપરતો નથી, પરંતુ તે ટાયરોઝિન કિનેઝ રિસેપ્ટર દ્વારા ક્રિયા કરે છે. એડ્રિનેલિન, ગ્લુકેગોન અને એફએસએચ (FSH) એ cAMP ને દૂત તરીકે વાપરે છે. ઇન્સ્યુલિન રક્તમાં ગ્લુકોઝના સ્તરને ઘટાડવા માટે કોષોની સક્રિયતા વધારે છે, પરંતુ તે cAMP પર આધારિત નથી.", "ncert_ref": "Class XI - પ્રકરણ 22: રસાયણિક નિયંત્રણ અને સંકલન", "difficulty": "Hard", "num": 26}, {"question": "નીચેનામાંથી કયો હોર્મોન મહિલાઓમાં ગર્ભાવસ્થા દરમિયાન કોર્પસ લ્યુટિયમને જાળવી રાખવા અને પ્રોજેસ્ટેરોનના સ્રાવને ઉત્તેજિત કરે છે, પરંતુ તે પિટ્યુટરી ગ્રંથિથી સ્રાવાતો નથી?", "options": ["A) પ્રોલેક્ટિન", "B) હ્યુમન કોરિયોનિક ગોનેડોટ્રોપિન (hCG)", "C) લ્યુટિનાઇઝિંગ હોર્મોન (LH)", "D) ફોલિકલ સ્ટિમ્યુલેટિંગ હોર્મોન (FSH)"], "correct": 1, "explanation": "હ્યુમન કોરિયોનિક ગોનેડોટ્રોપિન (hCG) ગર્ભાવસ્થા દરમિયાન કોર્પસ લ્યુટિયમને જાળવી રાખવા અને પ્રોજેસ્ટેરોનના સ્રાવને ઉત્તેજિત કરે છે. તે પ્લેસેન્ટા દ્વારા સ્રાવાય છે, પિટ્યુટરી ગ્રંથિથી નહીં. પ્રોલેક્ટિન, LH, અને FSH પિટ્યુટરી ગ્રંથિથી સ્રાવાય છે અને અન્ય કાર્યો ધરાવે છે.", "ncert_ref": "Class XII - પ્રકરણ 3: માનવ પ્રજનન", "difficulty": "Hard", "num": 27}, {"question": "નીચેના પૈકી કયો હોર્મોન એવો છે જેનું સંશ્લેષણ હાયપોથેલામસમાં થાય છે, પરંતુ તેનો સંગ્રહ અને સ્રાવ પશ્ચ પિટ્યુટરી ગ્રંથિમાંથી થાય છે, અને તેનું મુખ્ય કાર્ય મૂત્રપિંડમાં પાણીના પુનઃશોષણને નિયંત્રિત કરવાનું છે, પરંતુ તેની અતિમાત્રા સિન્ડ્રોમ ઓફ ઇનએપ્રોપ્રિયેટ એન્ટીડાયયુરેટિક હોર્મોન સ્રાવ (SIADH) તરફ દોરી જાય છે?", "options": ["A) ઓક્સિટોસિન", "B) વેસોપ્રેસિન", "C) સોમેટોસ્ટેટિન", "D) ગોનેડોટ્રોપિન-રિલીઝિંગ હોર્મોન (GnRH)"], "correct": 1, "explanation": "વેસોપ્રેસિન (એન્ટીડાયયુરેટિક હોર્મોન - ADH) હાયપોથેલામસમાં સંશ્લેષિત થાય છે અને પશ્ચ પિટ્યુટરી ગ્રંથિમાંથી સ્રાવાય છે. તે મૂત્રપિંડમાં પાણીના પુનઃશોષણને વધારે છે. તેની અતિમાત્રા SIADH તરફ દોરી જાય છે, જેમાં શરીરમાં પાણીનો વધુ પડતો રીટેન્શન થાય છે. ઓક્સિટોસિન પણ પશ્ચ પિટ્યુટરીમાંથી સ્રાવાય છે, પરંતુ તેનું મુખ્ય કાર્ય ગર્ભાશયના સંકોચન અને દૂધના સ્રાવને ઉત્તેજિત કરવાનું છે. સોમેટોસ્ટેટિન અને GnRH હાયપોથેલામસમાંથી સીધા સ્રાવાય છે અને તેમનું કાર્ય અનુક્રમે વૃદ્ધિ હોર્મોન અને ગોનેડોટ્રોપિનના સ્રાવને નિયંત્રિત કરવાનું છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 22: રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 28}, {"question": "એક દર્દીને હાયપરથાઇરોઇડિઝમ (ઉચ્ચ થાઇરોક્સિન સ્તર) નું નિદાન થયું છે. નીચેના પૈકી કયો હોર્મોન આ સ્થિતિમાં સીધો વધે છે, જે થાઇરોઇડ ગ્રંથિના કદમાં વધારો (ગોઇટર) તરફ દોરી જાય છે, પરંતુ તેનું સ્તર થાઇરોક્સિનના ઉચ્ચ સ્તરને કારણે નકારાત્મક પ્રતિભાવ દ્વારા ઘટાડવામાં આવે છે?", "options": ["A) થાઇરોઇડ-સ્ટિમ્યુલેટિંગ હોર્મોન (TSH)", "B) થાઇરોટ્રોપિન-રિલીઝિંગ હોર્મોન (TRH)", "C) થાઇરોક્સિન (T4)", "D) ટ્રાયઆયોડોથાઇરોનિન (T3)"], "correct": 1, "explanation": "થાઇરોટ્રોપિન-રિલીઝિંગ હોર્મોન (TRH) હાયપોથેલામસ દ્વારા સ્રાવાય છે અને તે પૂર્વ પિટ્યુટરી ગ્રંથિને થાઇરોઇડ-સ્ટિમ્યુલેટિંગ હોર્મોન (TSH) સ્રાવવા ઉત્તેજિત કરે છે. હાયપરથાઇરોઇડિઝમમાં, ઉચ્ચ થાઇરોક્સિન (T4) અને ટ્રાયઆયોડોથાઇરોનિન (T3) સ્તરો નકારાત્મક પ્રતિભાવ દ્વારા TRH અને TSH ના સ્તરને દબાવે છે. જો કે, જો હાયપરથાઇરોઇડિઝમ થાઇરોઇડ ગ્રંથિના સ્વયંપ્રતિરક્ષા રોગ (જેમ કે ગ્રેવ્સ રોગ)ને કારણે હોય, તો TSH રીસેપ્ટર્સને ઉત્તેજિત કરતા એન્ટિબોડીઝ ગ્રંથિના કદમાં વધારો (ગોઇટર) તરફ દોરી જાય છે. આ કિસ્સામાં, TRH સ્તર સીધું વધતું નથી, પરંતુ TSH ના ઘટાડાને કારણે તેનો સ્રાવ વધે છે, જે થાઇરોઇડ હોર્મોનના નકારાત્મક પ્રતિભાવને કારણે થાય છે. આ પ્રશ્નનો મુખ્ય ઉદ્દેશ્ય હોર્મોનલ નિયંત્રણના નકારાત્મક પ્રતિભાવ અને અપવાદરૂપ પરિસ્થિતિઓને સમજવાનો છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 22: રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 29}, {"question": "એક સંશોધનમાં જાણવા મળ્યું કે અમુક હોર્મોનનું સ્તર રાત્રે ઉચ્ચતમ હોય છે અને દિવસ દરમિયાન ઘટે છે. આ હોર્મોનનું મુખ્ય કાર્ય શરીરની જૈવિક ઘડિયાળને નિયંત્રિત કરવાનું છે અને તેનું સ્રાવ પ્રકાશના સંપર્કથી પ્રભાવિત થાય છે. નીચેના પૈકી કયો હોર્મોન આ લક્ષણો સાથે સંપૂર્ણ રીતે મેળ ખાય છે, પરંતુ તે પિનીયલ ગ્રંથિ દ્વારા સ્રાવાતો નથી?", "options": ["A) મેલાટોનિન", "B) કોર્ટિસોલ", "C) ગ્રોથ હોર્મોન", "D) પ્રોલેક્ટિન"], "correct": 1, "explanation": "કોર્ટિસોલ એ એડ્રિનલ કોર્ટેક્સ દ્વારા સ્રાવાતો હોર્મોન છે જેનો સ્ત્રાવ સર્કેડિયન રિધમને અનુસરે છે - રાત્રે ઉચ્ચતમ અને દિવસ દરમિયાન ઘટતો જાય છે. તે શરીરની જૈવિક ઘડિયાળને નિયંત્રિત કરવામાં મદદ કરે છે અને તણાવ પ્રતિભાવમાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે. મેલાટોનિન પિનીયલ ગ્રંથિ દ્વારા સ્રાવાય છે અને તે પણ સર્કેડિયન રિધમને અનુસરે છે, પરંતુ તે રાત્રે ઉચ્ચતમ હોય છે અને પ્રકાશના સંપર્કથી તેનું સ્તર ઘટે છે. ગ્રોથ હોર્મોન અને પ્રોલેક્ટિન પણ રાત્રે વધુ સ્રાવાય છે, પરંતુ તેમનું મુખ્ય કાર્ય અનુક્રમે વૃદ્ધિ અને દૂધના ઉત્પાદનને ઉત્તેજિત કરવાનું છે, અને તેમનું સ્તર પ્રકાશના સંપર્કથી સીધું પ્રભાવિત થતું નથી. આ પ્રશ્નનો હેતુ હોર્મોનના સર્કેડિયન રિધમ અને તેમના સ્રાવના સ્થાનને લગતા અપવાદોને ઓળખવાનો છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 22: રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 30}, {"question": "નીચેનામાંથી કયો હોર્મોન એવો છે જે સીધો જ લોહીમાં મુક્ત થતો નથી, પરંતુ તેને વાહક પ્રોટીનની જરૂર પડે છે અને તેનું મુખ્ય કાર્ય કોષીય ચયાપચયને નિયંત્રિત કરવાનું છે?", "options": ["A) ઇન્સ્યુલિન", "B) થાયરોક્સિન", "C) એડ્રિનેલિન", "D) ગ્લુકેગોન"], "correct": 1, "explanation": "થાયરોક્સિન (B) થાયરોઇડ ગ્રંથિ દ્વારા સ્રાવાય છે અને તે લિપિડ-દ્રાવ્ય હોર્મોન હોવાથી લોહીમાં મુક્ત થવા માટે થાયરોક્સિન-બાઇન્ડિંગ ગ્લોબ્યુલિન (TBG) જેવા વાહક પ્રોટીનની જરૂર પડે છે. તે કોષીય ચયાપચયને નિયંત્રિત કરે છે, ખાસ કરીને BMR (બેઝલ મેટાબોલિક રેટ) વધારે છે. ઇન્સ્યુલિન (A), એડ્રિનેલિન (C), અને ગ્લુકેગોન (D) પાણી-દ્રાવ્ય હોર્મોન છે અને સીધા જ લોહીમાં મુક્ત થાય છે.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકેતન અને નિયંત્રણ", "difficulty": "Hard", "num": 31}, {"question": "એક વ્યક્તિમાં હાયપોકેલ્શિયમિયા (રક્તમાં કેલ્ ્ષ્ય કોષોમાં થાઇરોઇડ હોર્મોન રીસેપ્ટર્સની સંખ્યા અથવા કાર્યક્ષમતામાં ઘટાડો", "D) થાઇરોઇડ ગ્રંથિમાં આયોડિનની ઉણપને કારણે હોર્મોન સંશ્લેષણમાં ખામી"], "correct": 2, "explanation": "સાચો જવાબ વિકલ્પ C છે કારણ કે જો થાઇરોઇડ હોર્મોન્સનું સ્રાવ સામાન્ય છે પરંતુ લક્ષ્ય કોષોમાં તેમની અસરકારકતા ઘટી છે, તો તે લક્ષ્ય કોષોમાં રીસેપ્ટર્સની સંખ્યા અથવા કાર્યક્ષમતામાં ઘટાડાને કારણે હોઇ શકે છે. આ સ્થિતિને 'થાઇરોઇડ હોર્મોન રેઝિસ્ટન્સ' કહેવાય છે.\n\nવિકલ્પ A અને B ખોટા છે કારણ કે TRH અને TSHનું સ્રાવ અપૂરતું હોત તો થાઇરોઇડ હોર્મોન્સનું સ્રાવ ઘટી જાત, જે આ કિસ્સામાં સામાન્ય છે.\n\nવિકલ્પ D ખોટો છે કારણ કે આયોડિનની ઉણપ થાઇરોઇડ હોર્મોન સંશ્લેષણમાં ખામી ઉત્પન્ન કરે છે, જેનાથી તેમનું સ્રાવ ઘટે છે, જે આ કિસ્સામાં જોવા મળતું નથી.", "ncert_ref": "Class XII - પ્રકરણ 11: રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 40}, {"question": "થાયરોઇડ ગ્રંથિમાંથી સ્રાવાતા હોર્મોન પૈકી કયો હોર્મોન કેલ્શિયમના ચયાપચયને નિયંત્રિત કરતો નથી, પરંતુ શરીરના ચયાપચય દરને વેગ આપે છે?", "options": ["A) થાયરોક્સિન (T4)", "B) ટ્રાયઆયોડોથાયરોનિન (T3)", "C) કેલ્સિટોનિન", "D) થાયરોગ્લોબ્યુલિન"], "correct": 0, "explanation": "થાયરોક્સિન (T4) અને ટ્રાયઆયોડોથાયરોનિન (T3) બંને શરીરના ચયાપચય દરને વેગ આપે છે, પરંતુ કેલ્શિયમના ચયાપચયને નિયંત્રિત કરતા નથી. કેલ્સિટોનિન કેલ્શિયમના ચયાપચયને નિયંત્રિત કરે છે, જ્યારે થાયરોગ્લોબ્યુલિન હોર્મોન નહીં પરંતુ થાયરોઇડ ગ્રંથિમાં સંગ્રહિત પ્રોટીન છે. આમ, સૌથી યોગ્ય જવાબ થાયરોક્સિન (T4) છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સંકલન અને અંતઃસ્રાવી તંત્ર", "difficulty": "Hard", "num": 41}, {"question": "એક વ્યક્તિમાં એડ્રિનલ કોર્ટેક્સ દ્વારા સ્રાવાતા હોર્મોનની ઉણપને કારણે રક્તમાં સોડિયમનું સ્તર ઘટી જાય છે. આ સ્થિતિમાં કયો હોર્મોન ઉણપમાં હશે?", "options": ["A) કોર્ટિઝોલ", "B) એલ્ડોસ્ટેરોન", "C) એડ્રિનલિન", "D) એન્ડ્રોજન"], "correct": 1, "explanation": "એલ્ડોસ્ટેરોન એડ્રિનલ કોર્ટેક્સ દ્વારા સ્રાવાતો હોર્મોન છે જે રક્તમાં સોડિયમ અને પોટેશિયમના સ્તરને નિયંત્રિત કરે છે. કોર્ટિઝોલ ચયાપચયને નિયંત્રિત કરે છે, એડ્રિનલિન એડ્રિનલ મેડ્યુલા દ્વારા સ્રાવાય છે, અને એન્ડ્રોજન લૈંગિક હોર્મોન છે. આમ, એલ્ડોસ્ટેરોનની ઉણપને કારણે રક્તમાં સોડિયમનું સ્તર ઘટે છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સંકલન અને અંતઃસ્રાવી તંત્ર", "difficulty": "Hard", "num": 42}, {"question": "ગર્ભાવસ્થા દરમિયાન, કોર્પસ લ્યુટિયમનું જાળવણી માટે કયો હોર્મોન જરૂરી છે, જેનું સ્રાવ ગર્ભાશય દ્વારા થાય છે?", "options": ["A) પ્રોલેક્ટિન", "B) હ્યુમન કોરિયોનિક ગોનેડોટ્રોપિન (hCG)", "C) પ્રોજેસ્ટેરોન", "D) એસ્ટ્રોજન"], "correct": 1, "explanation": "હ્યુમન કોરિયોનિક ગોનેડોટ્રોપિન (hCG) ગર્ભાવસ્થા દરમિયાન ગર્ભાશય દ્વારા સ્રાવાય છે અને કોર્પસ લ્યુટિયમને જાળવી રાખે છે. પ્રોલેક્ટિન દૂધના સ્રાવને પ્રેરે છે, પ્રોજેસ્ટેરોન અને એસ્ટ્રોજન કોર્પસ લ્યુટિયમ દ્વારા સ્રાવાય છે, પરંતુ hCG જ કોર્પસ લ્યુટિયમને જાળવી રાખવા માટે જરૂરી છે.", "ncert_ref": "Class XII - Chapter 3: માનવ પ્રજનન", "difficulty": "Hard", "num": 43}, {"question": "એક વ્યક્તિમાં હાયપરપેરાથાયરોઇડિઝમ (ઉચ્ચ પેરાથાયરોઇડ હોર્મોન સ્તર) જોવા મળે છે. નીચેનામાંથી કયી સ્થિતિ આ હોર્મોનની અસરને કારણે થશે?", "options": ["A) હાયપોકેલ્શિયમિયા (રક્તમાં કેલ્શિયમનું નીચું સ્તર)", "B) હાયપરકેલ્શિયમિયા (રક્તમાં કેલ્શિયમનું ઉચ્ચ સ્તર)", "C) હાયપોફોસ્ફેટેમિયા (રક્તમાં ફોસ્ફેટનું નીચું સ્તર)", "D) હાયપરફોસ્ફેટેમિયા (રક્તમાં ફોસ્ફેટનું ઉચ્ચ સ્તર)"], "correct": 1, "explanation": "પેરાથાયરોઇડ હોર્મોન (PTH) રક્તમાં કેલ્શિયમનું સ્તર વધારે છે અને ફોસ્ફેટનું સ્તર ઘટાડે છે. હાયપરપેરાથાયરોઇડિઝમમાં, PTHનું ઉચ્ચ સ્તર હાયપરકેલ્શિયમિયા (રક્તમાં કેલ્શિયમનું ઉચ્ચ સ્તર) અને હાયપોફોસ્ફેટેમિયા (રક્તમાં ફોસ્ફેટનું નીચું સ્તર) તરફ દોરી જાય છે. આમ, સૌથી યોગ્ય જવાબ હાયપરકેલ્શિયમિયા છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સંકલન અને અંતઃસ્રાવી તંત્ર", "difficulty": "Hard", "num": 44}, {"question": "નીચેનામાંથી કયો હોર્મોન એવો છે જેનું સ્રાવ પિટ્યુટરી ગ્રંથિથી થાય છે, પરંતુ તેનું મુખ્ય કાર્ય અંતઃસ્રાવી ગ્રંથિઓને નિયંત્રિત કરવાનું નથી, બલકે તે સીધો જ લક્ષ્ય અંગ પર અસર કરે છે?", "options": ["A) વૃદ્ધિકર હોર્મોન (GH)", "B) થાયરોઇડ ઉત્તેજક હોર્મોન (TSH)", "C) ઓક્સિટોસિન", "D) એડ્રિનોકોર્ટિકોટ્રોપિક હોર્મોન (ACTH)"], "correct": 2, "explanation": "સી) ઓક્સિટોસિન એ પિટ્યુટરી ગ્રંથિના પશ્ચ ભાગ (પોસ્ટીરિયર પિટ્યુટરી) દ્વારા સ્રાવાતો હોર્મોન છે, જે સીધો જ લક્ષ્ય અંગો જેવા કે ગર્ભાશય અને સ્તન ગ્રંથિઓ પર અસર કરે છે. તે ગર્ભાશયના સંકોચન અને દૂધના સ્રાવમાં મહત્વની ભૂમિકા ભજવે છે. અહીં, ઓક્સિટોસિન અંતઃસ્રાવી ગ્રંથિઓને નિયંત્રિત કરતો નથી, પરંતુ સીધો જ ક્રિયા કરે છે. A) વૃદ્ધિકર હોર્મોન (GH) અને D) ACTH એ અંતઃસ્રાવી ગ્રંથિઓને ઉત્તેજિત કરે છે, જ્યારે B) TSH થાયરોઇડ ગ્રંથિને નિયંત્રિત કરે છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સંકેતન અને નિયંત્રણ (Chemical Coordination and Integration)", "difficulty": "Hard", "num": 45}, {"question": "જ્યારે એક વ્યક્તિમાં હાયપોકેલ્શિયમિયા (રક્તમાં કેલ્શિયમનું નીચું સ્તર) જોવા મળે છે, ત્યારે નીચેનામાંથી કયો હોર્મોનનું સ્તર વધારી શકે છે, પરંતુ તે સીધો જ કેલ્શિયમના શોષણને ઉત્તેજિત કરતો નથી?", "options": ["A) પેરાથાયરોઇડ હોર્મોન (PTH)", "B) કેલ્સિટોનિન", "C) કેલ્સિટ્રાયોલ (વિટામિન D3)", "D) થાઇરોક્સિન"], "correct": 0, "explanation": "પેરાથાયરોઇડ હોર્મોન (PTH) હાયપોકેલ્શિયમિયામાં સ્રાવાય છે અને તે કિડની દ્વારા કેલ્શિયમના પુનઃશોષણને વધારે છે, કોસ્ટલ કોષોને ઉત્તેજિત કરે છે અને કેલ્સિટ્રાયોલના સક્રિય રૂપમાં રૂપાંતરણને પ્રોત્સાહન આપે છે. કેલ્સિટોનિન (B) કેલ્શિયમના સ્તરને ઘટાડે છે, કેલ્સિટ્રાયોલ (C) આંતરડામાં કેલ્શિયમના શોષણને ઉત્તેજિત કરે છે, અને થાઇરોક્સિન (D) ચયાપચયને નિયંત્રિત કરે છે પરંતુ કેલ્શિયમના ચયાપચય સાથે સીધો સંબંધ ધરાવતો નથી.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક નિયમન અને એકીકરણ", "difficulty": "Hard", "num": 46}, {"question": "નીચેનામાંથી કયો હોર્મોન એવો છે જેનું સ્રાવ એડ્રિનલ કોર્ટેક્સ દ્વારા થાય છે અને તે રક્તમાં ગ્લુકોઝના સ્તરને વધારવા ઉપરાંત, પ્રોટીનના વિઘટનને પણ ઉત્તેજિત કરે છે?", "options": ["A) એલ્ડોસ્ટેરોન", "B) કોર્ટિઝોલ", "C) એપીનેફ્રિન", "D) એન્ડ્રોજન"], "correct": 1, "explanation": "કોર્ટિઝોલ એડ્રિનલ કોર્ટેક્સ દ્વારા સ્રાવાય છે અને તે ગ્લુકોઝના સ્તરને વધારવા ઉપરાંત પ્રોટીનના વિઘટનને (ગ્લુકોનિયોજેનેસિસ) ઉત્તેજિત કરે છે. એલ્ડોસ્ટેરોન (A) મુખ્યત્વે સોડિયમ અને પોટેશિયમના સંતુલનને નિયંત્રિત કરે છે, એપીનેફ્રિન (C) એડ્રિનલ મેડ્યુલા દ્વારા સ્રાવાય છે અને તણાવ પ્રતિક્રિયામાં ભાગ લે છે, જ્યારે એન્ડ્રોજન (D) લૈંગિક હોર્મોન છે.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક નિયમન અને એકીકરણ", "difficulty": "Hard", "num": 47}, {"question": "નીચેનામાંથી કયો હોર્મોન એવો છે જેનું સંશ્લેષણ હાયપોથેલામસમાં થાય છે, પરંતુ તેનું સ્રાવ પિટ્યુટરી ગ્રંથિ દ્વારા થાય છે અને તે શરીરના વૃદ્ધિ અને વિકાસમાં મહત્વની ભૂમિકા ભજવે છે?", "options": ["A) ઓક્સિટોસિન", "B) વૃદ્ધિ હોર્મોન (GH)", "C) એન્ટીડાયુરેટિક હોર્મોન (ADH)", "D) પ્રોલેક્ટિન"], "correct": 1, "explanation": "વૃદ્ધિ હોર્મોન (GH) હાયપોથેલામસમાં GHRH દ્વારા નિયંત્રિત થાય છે અને પિટ્યુટરી ગ્રંથિ દ્વારા સ્રાવાય છે, જે શરીરના વૃદ્ધિ અને વિકાસમાં મહત્વની ભૂમિકા ભજવે છે. ઓક્સિટોસિન (A) અને ADH (C) હાયપોથેલામસમાં સંશ્લેષિત થાય છે પરંતુ પિટ્યુટરી ગ્રંથિ દ્વારા સ્રાવાય છે, પરંતુ તેઓ વૃદ્ધિ સાથે સંબંધિત નથી. પ્રોલેક્ટિન (D) દૂધના સ્રાવને નિયંત્રિત કરે છે.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક નિયમન અને એકીકરણ", "difficulty": "Hard", "num": 48}, {"question": "નીચેના પૈકી કયો હોર્મોન એવો છે જે સીધો જ લોહીમાં મુક્ત થતો નથી, પરંતુ વાહક પ્રોટીન સાથે જોડાઈને પરિવહન પામે છે, અને તેનું મુખ્ય કાર્ય કોષીય ચયાપચયને નિયંત્રિત કરવું છે?", "options": ["A) ઇન્સ્યુલિન", "B) થાયરોક્સિન", "C) એડ્રિનેલિન", "D) ગ્લુકેગોન"], "correct": 1, "explanation": "બ) થાયરોક્સિન એ થાયરોઇડ ગ્રંથિ દ્વારા સ્રાવાતો હોર્મોન છે જે લોહીમાં મુક્ત થતો નથી, પરંતુ થાયરોક્સિન-બાઇન્ડિંગ ગ્લોબ્યુલિન (TBG) નામના વાહક પ્રોટીન સાથે જોડાઈને પરિવહન પામે છે. તે કોષીય ચયાપચયને નિયંત્રિત કરે છે, ખાસ કરીને બેઝલ મેટાબોલિક રેટ (BMR) ને વેગ આપે છે. અ) ઇન્સ્યુલિન અને ડ) ગ્લુકેગોન સીધા જ લોહીમાં મુક્ત થાય છે અને ગ્લુકોઝના ચયાપચયને નિયંત્રિત કરે છે. સ) એડ્રિનેલિન પણ સીધો જ લોહીમાં મુક્ત થાય છે અને તણાવ પ્રતિભાવમાં ભૂમિકા ભજવે છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સંકેતન અને નિયંત્રણ", "difficulty": "Hard", "num": 49}, {"question": "એક દર્દીમાં એવી સ્થિતિ જોવા મળે છે કે જેમાં થાઇરોઇડ ગ્રંથિ દ્વારા થાઇરોક્સિન (T₄) અને ટ્રાયઆયોડોથાઇરોનિન (T₃)નું સ્રાવ સામાન્ય છે, પરંતુ રક્તમાં આ હોર્મોન્સનું સ્તર અપેક્ષિત કરતાં નોંધપાત્ર રીતે ઓછું છે. આ સ્થિતિ માટે નીચેનામાંથી કયું કારણ સૌથી વધુ સંભવિત છે?", "options": ["A) યકૃતમાં થાઇરોક્સિન-બાઇન્ડિંગ ગ્લોબ્યુલિન (TBG)નું ઉત્પાદન ઘટ્યું છે", "B) હાયપોથેલામસમાંથી થાઇરોટ્રોપિન-રિલીઝિંગ હોર્મોન (TRH)નું સ્રાવ વધ્યું છે", "C) પિટ્યુટરી ગ્રંથિમાંથી થાઇરોઇડ-સ્ટિમ્યુલેટિંગ હોર્મોન (TSH)નું સ્રાવ ઘટ્યું છે", "D) થાઇરોઇડ ગ્રંથિમાં આયોડિનનું અપર્યાપ્ત સેવન"], "correct": 0, "explanation": "સાચો જવાબ વિકલ્પ A છે. થાઇરોક્સિન (T₄) અને ટ્રાયઆયોડોથાઇરોનિન (T₃) મોટાભાગે લોહીમાં પ્રોટીન સાથે બંધાયેલા હોય છે, ખાસ કરીને થાઇરોક્સિન-બાઇન્ડિંગ ગ્લોબ્યુલિન (TBG) સાથે. જો યકૃતમાં TBGનું ઉત્પાદન ઘટે છે, તો મુક્ત (ફ્રી) હોર્મોન્સનું સ્તર સામાન્ય રહે છે, પરંતુ કુલ હોર્મોન સ્તર (બંધાયેલ + મુક્ત) ઘટે છે. આથી, રક્તમાં કુલ T₄ અને T₃નું સ્તર ઓછું દેખાય છે, જ્યારે હોર્મોનનું સ્રાવ સામાન્ય હોય છે.\n\nવિકલ્પ B ખોટો છે કારણ કે TRHનું સ્રાવ વધવાથી TSH અને ત્યારબાદ થાઇરોઇડ હોર્મોન્સનું સ્રાવ વધે છે, જે આ સ્થિતિ સાથે સુસંગત નથી.\n\nવિકલ્પ C ખોટો છે કારણ કે TSHનું સ્રાવ ઘટવાથી થાઇરોઇડ હોર્મોન્સનું સ્રાવ ઘટે છે, જે પ્રશ્નમાં આપેલી માહિતી સાથે વિરોધાભાસી છે.\n\nવિકલ્પ D ખોટો છે કારણ કે આયોડિનની ઉણપથી થાઇરોઇડ હોર્મોન્સનું સંશ્લેષણ ઘટે છે, જે પ્રશ્નમાં આપેલી માહિતી સાથે મેળ ખાતો નથી.", "ncert_ref": "Class XII - Chapter 11: રાસાયણિક સંકલન અને એકીકરણ (Chemical Coordination and Integration)", "difficulty": "Hard", "num": 50}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
