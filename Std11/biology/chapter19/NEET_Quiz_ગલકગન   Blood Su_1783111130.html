સિસ પ્રક્રિયાને સૌથી પહેલા સક્રિય કરે છે, કારણ કે આ પ્રક્રિયા સંગ્રહિત ગ્લાઇકોજનને ઝડપથી ગ્લુકોઝમાં રૂપાંતરિત કરે છે, જે રક્તમાં ગ્લુકોઝનું સ્તર તાત્કાલિક વધારે છે. ગ્લુકોનિયોજેનેસિસ પ્રક્રિયા ધીમી હોય છે અને લાંબા સમયના ઉપવાસ દરમિયાન વધુ સક્રિય થાય છે. લિપોલિસિસ પ્રક્રિયા ગ્લુકોઝના સ્તરને સીધો વધારતી નથી, અને કોર્ટિસોલ હોર્મોનની ભૂમિકા ગ્લુકાગોનની સરખામણીએ ગૌણ છે.\n\nNCERT સંદર્ભ: Class XII - અધ્યાય 13: પ્રાણીઓમાં રાસાયણિક સંકલન અને એકીકરણ, પૃષ્ઠ 220-221.", "ncert_ref": "Class XII - અધ્યાય 13: પ્રાણીઓમાં રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 18}, {"question": "નીચેનામાંથી કયું વિધાન ગ્લુકાગોન હોર્મોનની ક્રિયાવિધિ અને તેના પરિણામો વિશે ખોટું છે?\n\n(1) ગ્લુકાગોન યકૃતના કોષોમાં એડેનાઇલ સાયક્લેઝ ઉત્સેચકને સક્રિય કરે છે.\n(2) ગ્લુકાગોનના કારણે કોષમાં cAMPનું સ્તર વધે છે, જે પ્રોટીન કાઇનેઝ-Aને સક્રિય કરે છે.\n(3) ગ્લુકાગોન સ્નાયુ કોષોમાં ગ્લાઇકોજનોલિસિસ પ્રક્રિયાને પ્રેરિત કરે છે, જેના કારણે રક્તમાં ગ્લુકોઝનું સ્તર વધે છે.\n(4) ગ્લુકાગોન યકૃતમાં ગ્લુકોનિયોજેનેસિસ પ્રક્રિયાને ઉત્તેજિત કરે છે, જે લેક્ટિક એસિડ અને એમિનો એસિડમાંથી ગ્લુકોઝનું નિર્માણ કરે છે.", "options": ["A) માત્ર વિધાન (1) અને (2) ખોટા છે", "B) માત્ર વિધાન (3) ખોટું છે", "C) માત્ર વિધાન (4) ખોટું છે", "D) વિધાન (1), (2) અને (4) સાચા છે, માત્ર (3) ખોટું છે"], "correct": 1, "explanation": "ગ્લુકાગોન હોર્મોન યકૃતના કોષોમાં ગ્લાઇકોજનોલિસિસ અને ગ્લુકોનિયોજેનેસિસ પ્રક્રિયાને ઉત્તેજિત કરે છે, પરંતુ સ્નાયુ કોષોમાં ગ્લાઇકોજનોલિસિસ પ્રક્રિયા દ્વારા ઉત્પન્ન થતો ગ્લુકોઝ સ્નાયુ કોષોમાં જ વપરાય છે અને રક્તમાં મુક્ત થતો નથી. તેથી વિધાન (3) ખોટું છે. વિધાન (1), (2) અને (4) ગ્લુકાગોનની સાચી ક્રિયાવિધિ અને પરિણામો દર્શાવે છે.\n\nNCERT સંદર્ભ: Class XII - અધ્યાય 13: પ્રાણીઓમાં રાસાયણિક સંકલન અને એકીકરણ, પૃષ્ઠ 220-222.", "ncert_ref": "Class XII - અધ્યાય 13: પ્રાણીઓમાં રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 19}, {"question": "એક પ્રયોગમાં, એક વ્યક્તિને ઇન્સ્યુલિનનો ઇન્જેક્શન આપવામાં આવ્યો છે, જેના કારણે તેના રક્તમાં ગ્લુકોઝનું સ્તર અચાનક ઘટી ગયું છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું પરિણામ સાચું નથી?", "options": ["A) ગ્લુકાગોન હોર્મોનનો સ્રાવ વધશે, જે યકૃતમાં ગ્લાઇકોજનોલિસિસ પ્રક્રિયાને ઉત્તેજિત કરશે", "B) એડ્રેનાલિન હોર્મોનનો સ્રાવ વધશે, જે યકૃત અને સ્નાયુમાં ગ્લાઇકોજનોલિસિસ પ્રક્રિયાને ઉત્તેજિત કરશે", "C) કોર્ટિસોલ હોર્મોનનો સ્રાવ વધશે, જે યકૃતમાં ગ્લુકોનિયોજેનેસિસ પ્રક્રિયાને ઉત્તેજિત કરશે", "D) ગ્લુકાગોન હોર્મોન યકૃત અને સ્નાયુ બંને કોષોમાં ગ્લુકોનિયોજેનેસિસ પ્રક્રિયાને સમાન રીતે ઉત્તેજિત કરશે"], "correct": 3, "explanation": "ગ્લુકાગોન હોર્મોન મુખ્યત્વે યકૃતના કોષોમાં ગ્લુકોનિયોજેનેસિસ પ્રક્રિયાને ઉત્તેજિત કરે છે, પરંતુ સ્નાયુ કોષોમાં આ પ્રક્રિયા નોંધપાત્ર રીતે થતી નથી. ઇન્સ્યુલિનના ઇન્જેક્શન બાદ રક્તમાં ગ્લુકોઝનું સ્તર ઘટતા ગ્લુકાગોન, એડ્રેનાલિન અને કોર્ટિસોલ હોર્મોનનો સ્રાવ વધે છે, જે યકૃતમાં ગ્લાઇકોજનોલિસિસ અને ગ્લુકોનિયોજેનેસિસ પ્રક્રિયાને ઉત્તેજિત કરે છે. સ્નાયુ કોષોમાં ગ્લુકોનિયોજેનેસિસ પ્રક્રિયા ગ્લુકાગોન દ્વારા પ્રેરિત થતી નથી.\n\nNCERT સંદર્ભ: Class XII - અધ્યાય 13: પ્રાણીઓમાં રાસાયણિક સંકલન અને એકીકરણ, પૃષ્ઠ 220-222.", "ncert_ref": "Class XII - અધ્યાય 13: પ્રાણીઓમાં રાસાયણિક સંકલન અને એકીકરણ", "difficulty": "Hard", "num": 20}, {"question": "ગ્લુકાગોન હોર્મોન દ્વારા પ્રેરિત ગ્લાઇકોજનોલિસિસ પ્રક્રિયામાં નીચેનામાંથી કયો ઉત્સેચક સક્રિય થતો નથી, પરંતુ તેના બદલે અન્ય ઉત્સેચક સક્રિય થાય છે?", "options": ["A) ગ્લાઇકોજન ફોસ્ફોરિલેઝ (Glycogen Phosphorylase)", "B) ગ્લાઇકોજન સિનથેઝ (Glycogen Synthase)", "C) ફોસ્ફોગ્લુકોમ્યુટેઝ (Phosphoglucomutase)", "D) ગ્લુકોઝ-6-ફોસ્ફેટેઝ (Glucose-6-Phosphatase)"], "correct": 1, "explanation": "ગ્લુકાગોન હોર્મોન દ્વારા ગ્લાઇકોજનોલિસિસ પ્રક્રિયા ઉત્તેજિત થાય છે, જેમાં ગ્લાઇકોજન ફોસ્ફોરિલેઝ ઉત્સેચક સક્રિય થાય છે અને ગ્લાઇકોજનનો વિઘટન થાય છે. ગ્લાઇકોજન સિનથેઝ ઉત્સેચક ગ્લાઇકોજનના સંશ્લેષણ માટે જવાબદાર છે અને ગ્લુકાગોન દ્વારા તેની ક્રિયા અવરોધાય છે. ફોસ્ફોગ્લુકોમ્યુટેઝ અને ગ્લુકોઝ-6-ફોસ્ફેટેઝ ગ્લુકોઝના મેટાબોલિઝમમાં ભાગ લે છે, પરંતુ તે ગ્લાઇકોજનોલિસિસમાં સક્રિય થતાં નથી.", "ncert_ref": "Class XII - Chapter 14: જૈવ અણુઓ અને ઉર્જા ઉત્પાદન (Biomolecules and Energy Production) - કાર્બોદિત ચયાપચય", "difficulty": "Hard", "num": 21}, {"question": "એક વ્યક્તિને લાંબા સમયથી ભૂખ્યા રહેવાને કારણે હાઈપોગ્લાયસીમિયા થયો છે. આ પરિસ્થિતિમાં, ગ્લુકાગોન હોર્મોન દ્વારા નીચેનામાંથી કયા હોર્મોનનો સ્રાવ ઉત્તેજિત થશે, જે આગળ જઈને રક્તમાં ગ્લુકોઝનું સ્તર વધારવામાં મદદ કરશે?", "options": ["A) ઇન્સ્યુલિન (Insulin)", "B) એપિનેફ્રિન (Epinephrine)", "C) થાયરોક્સિન (Thyroxine)", "D) એલ્ડોસ્ટેરોન (Aldosterone)"], "correct": 1, "explanation": "હાઈપોગ્લાયસીમિયાની પરિસ્થિતિમાં, ગ્લુકાગોન હોર્મોનનો સ્રાવ વધે છે, જે આગળ જઈને એપિનેફ્રિન (અડ્રિનલિન) હોર્મોનનો સ્રાવ ઉત્તેજિત કરે છે. એપિનેફ્રિન ગ્લાઇકોજનોલિસિસ અને ગ્લુકોનિયોજેનેસિસ પ્રક્રિયાને ઉત્તેજિત કરે છે, જેના કારણે રક્તમાં ગ્લુકોઝનું સ્તર વધે છે. ઇન્સ્યુલિન રક્તમાં ગ્લુકોઝનું સ્તર ઘટાડે છે, થાયરોક્સિન ચયાપચયને ધીમો પાડે છે, અને એલ્ડોસ્ટેરોન સોડિયમ અને પોટેશિયમના સંતુલનને નિયંત્રિત કરે છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક નિયંત્રણ અને સંકલન (Chemical Coordination and Integration) - હોર્મોનલ સંકલન", "difficulty": "Hard", "num": 22}, {"question": "ગ્લુકાગોન હોર્મોનના સ્રાવ દરમ્યાન, નીચેનામાંથી કયા કોષોમાં ગ્લુકોઝ-6-ફોસ્ફેટેઝ ઉત્સેચકની ક્રિયા સૌથી વધુ મહત્ત્વની બને છે અને કેમ?", "options": ["A) યકૃત કોષો, કારણ કે ત્યાં ગ્લુકોઝ-6-ફોસ્ફેટને ગ્લુકોઝમાં રૂપાંતરિત કરવા માટે આ ઉત્સેચક જરૂરી છે", "B) સ્નાયુ કોષો, કારણ કે ત્યાં ગ્લુકોઝ-6-ફોસ્ફેટને ગ્લાઇકોલિસિસ માટે વાપરવામાં આવે છે", "C) મેદપેશી કોષો, કારણ કે ત્યાં ગ્લુકોઝ-6-ફોસ્ફેટને ચરબીમાં રૂપાંતરિત કરવામાં આવે છે", "D) મગજ કોષો, કારણ કે ત્યાં ગ્લુકોઝ-6-ફોસ્ફેટને ઊર્જા ઉત્પાદન માટે વાપરવામાં આવે છે"], "correct": 0, "explanation": "ગ્લુકાગોન હોર્મોન યકૃત કોષોમાં ગ્લાઇકોજનોલિસિસ અને ગ્લુકોનિયોજેનેસિસ પ્રક્રિયાઓ દ્વારા રક્તમાં ગ્લુકોઝનું સ્તર વધારે છે. ગ્લુકોઝ-6-ફોસ્ફેટેઝ ઉત્સેચક યકૃત કોષોમાં ગ્લુકોઝ-6-ફોસ્ફેટને ગ્લુકોઝમાં રૂપાંતરિત કરે છે, જે રક્તમાં મુક્ત થઈ શકે છે. સ્નાયુ કોષો, મેદપેશી કોષો, અને મગજ કોષોમાં આ ઉત્સેચકની ક્રિયા મહત્ત્વની નથી, કારણ કે ત્યાં ગ્લુકોઝ-6-ફોસ્ફેટને અન્ય પ્રક્રિયાઓ માટે વાપરવામાં આવે છે.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સમન્વય અને એકીકરણ", "difficulty": "Hard", "num": 2 tion": "ગ્લુકોનિયોજેનેસિસ દરમ્યાન, લેક્ટેટ (A), એલેનિન (C), અને પાયરુવેટ (D) સીધા ગ્લુકોઝમાં રૂપાંતરિત થઈ શકે છે. ગ્લિસરોલ (B) ફેટી એસિડમાં રૂપાંતરિત થાય છે અને ત્યારબાદ ગ્લુકોનિયોજેનેસિસમાં ભાગ લે છે, પરંતુ સીધો ગ્લુકોઝમાં રૂપાંતરિત થતો નથી. આથી B ખોટો વિકલ્પ છે.", "ncert_ref": "Class XII - Chapter 22: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 26}, {"question": "ગ્લુકાગોન હોર્મોનના સ્રાવ દરમ્યાન, યકૃત કોષોમાં ગ્લુકોનિયોજેનેસિસની પ્રક્રિયા ચાલુ હોય છે. આ પ્રક્રિયામાં નીચેનામાંથી કયો પદાર્થ પ્રાથમિક સ્ત્રોત તરીકે વાપરાતો નથી?", "options": ["A) લેક્ટેટ", "B) ગ્લિસરોલ", "C) એસિટાઇલ-CoA", "D) એલાનિન"], "correct": 2, "explanation": "ગ્લુકોનિયોજેનેસિસ પ્રક્રિયામાં, યકૃત કોષો લેક્ટેટ, ગ્લિસરોલ અને એલાનિન જેવા ગ્લુકોજેનિક પદાર્થોનો ઉપયોગ ગ્લુકોઝના સંશ્લેષણ માટે કરે છે. એસિટાઇલ-CoA કેટોજેનિક છે અને ગ્લુકોનિયોજેનેસિસમાં વાપરાતો નથી, કારણ કે તે પાયરૂવેટમાં રૂપાંતરિત થઈ શકતો નથી. આથી, એસિટાઇલ-CoA પ્રાથમિક સ્ત્રોત તરીકે વાપરાતો નથી. લેક્ટેટ, ગ્લિસરોલ અને એલાનિન ગ્લુકોઝના સંશ્લેષણમાં યોગદાન આપે છે.", "ncert_ref": "Class XII - Chapter 22: માનવમાં પોષણ અને શ્વસન", "difficulty": "Hard", "num": 27}, {"question": "ગ્લુકાગોન હોર્મોનના સ્રાવ દરમ્યાન, યકૃત કોષોમાં ગ્લાઇકોજનોલિસિસની પ્રક્રિયા ચાલુ હોય છે. આ પ્રક્રિયામાં નીચેનામાંથી કયો ઉત્સેચક સક્રિય થતો નથી?", "options": ["A) ગ્લાઇકોજન ફોસ્ફોરિલેઝ", "B) ગ્લુકોઝ-6-ફોસ્ફેટેઝ", "C) ફોસ્ફોગ્લુકોમ્યુટેઝ", "D) હેક્સોકિનેઝ"], "correct": 3, "explanation": "ગ્લાઇકોજનોલિસિસ પ્રક્રિયામાં, ગ્લાઇકોજન ફોસ્ફોરિલેઝ, ગ્લુકોઝ-6-ફોસ્ફેટેઝ અને ફોસ્ફોગ્લુકોમ્યુટેઝ જેવા ઉત્સેચકો સક્રિય થાય છે. હેક્સોકિનેઝ ગ્લુકોઝને ગ્લુકોઝ-6-ફોસ્ફેટમાં રૂપાંતરિત કરે છે, જે ગ્લાઇકોજનોલિસિસની પ્રક્રિયામાં ભાગ લેતો નથી. આથી, હેક્સોકિનેઝ આ પ્રક્રિયામાં સક્રિય થતો નથી.", "ncert_ref": "Class XII - Chapter 9: ચયાપચય", "difficulty": "Hard", "num": 28}, {"question": "એક વ્યક્તિમાં લાંબા સમયથી ભૂખ્યા રહેવાને કારણે હાઈપોગ્લાયસીમિયા થયો છે. આ પરિસ્થિતિમાં ગ્લુકાગોન હોર્મોન દ્વારા નીચેનામાંથી કયા પ્રક્રિયા દ્વારા રક્તમાં ગ્લુકોઝનું સ્તર વધારવામાં આવશે, પરંતુ તે માટે યકૃત કોષો question": "જ્યારે ગ્લુકાગોન હોર્મોન યકૃત કોષોમાં ક્રિયાશીલ થાય છે, ત્યારે નીચેનામાંથી કયા જૈવરાસાયણિક માર્ગ દ્વારા રક્તમાં ગ્લુકોઝનું સ્તર વધારવામાં સૌથી ઓછો ફાળો આપે છે?", "options": ["A) ગ્લાઇકોજનોલિસિસ", "B) ગ્લુકોનિયોજેનેસિસ", "C) કેટોજેનેસિસ", "D) લિપોલિસિસ"], "correct": 3, "explanation": "ગ્લુકાગોન હોર્મોન યકૃત કોષોમાં ગ્લાઇકોજનોલિસિસ (ગ્લાઇકોજનનું ગ્લુકોઝમાં વિઘટન) અને ગ્લુકોનિયોજેનેસિસ (ગ્લુકોઝનું નિર્માણ) દ્વારા રક્તમાં ગ્લુકોઝનું સ્તર વધારે છે. કેટોજેનેસિસ (કીટોન બોડીઝનું નિર્માણ) અને લિપોલિસિસ (ચરબીનું વિઘટન) પણ ગ્લુકાગોન દ્વારા પ્રેરિત થાય છે, પરંતુ આ પ્રક્રિયાઓ સીધી રીતે રક્તમાં ગ્લુકોઝનું સ્તર વધારતી નથી. લિપોલિસિસ દ્વારા મુક્ત થતા ફેટી એસિડ્સ ગ્લુકોનિયોજેનેસિસ માટે પૂરક પદાર્થ તરીકે ઉપયોગી થાય છે, પરંતુ તે સીધો ગ્લુકોઝ નથી. આથી, લિપોલિસિસ દ્વારા રક્તમાં ગ્લુકોઝનું સ્તર વધારવામાં સૌથી ઓછો ફાળો મળે છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સમન્વય અને એકીકરણ", "difficulty": "Hard", "num": 34}, {"question": "ગ્લુકાગોન હોર્મોનના સ્રાવ દરમ્યાન, યકૃત કોષોમાં cAMPનું સ્તર વધે છે. આ પરિવર્તનને કારણે નીચેનામાંથી કયા ઉત્સેચકની ક્રિયા સીધી રીતે વધે છે?", "options": ["A) પ્રોટીન કાઇનેઝ A", "B) પ્રોટીન ફોસ્ફેટેઝ", "C) એડિનાઇલેટ સાયક્લેઝ", "D) ફોસ્ફોડાયેસ્ટરેઝ"], "correct": 0, "explanation": "ગ્લુકાગોન હોર્મોનના સ્રાવ દરમ્યાન, cAMPનું સ્તર વધવાને કારણે પ્રોટીન કાઇનેઝ A (A) સક્રિય થાય છે, જે ગ્લાઇકોજન ફોસ્ફોરિલેઝને સક્રિય કરે છે. પ્રોટીન ફોસ્ફેટેઝ (B) cAMPને વિઘટિત કરે છે, એડિનાઇલેટ સાયક્લેઝ (C) cAMPનું ઉત્પાદન કરે છે, અને ફોસ્ફોડાયેસ્ટરેઝ (D) cAMPને વિઘટિત કરે છે.", "ncert_ref": "Class XII - Chapter 16: ખોરાકમાંથી પોષણ અને શક્તિ મેળવવી", "difficulty": "Hard", "num": 35}, {"question": "ગ્લુકાગોન હોર્મોનના સ્રાવ દરમ્યાન, યકૃત કોષોમાં નીચેનામાંથી કયા ઉત્સેચકની ક્રિયા સીધી રીતે અવરોધાય છે?", "options": ["A) ગ્લાઇકોજન સિનથેઝ", "B) ગ્લુકોઝ-6-ફોસ્ફેટેઝ", "C) ફોસ્ફોફ્રક્ટોકિનેઝ-1", "D) ગ્લુકોનિયોજેનેસિસમાં ભાગ લેતા તમામ ઉત્સેચકો"], "correct": 2, "explanation": "ગ્લુકાગોન હોર્મોન cAMP માધ્યમથી ફોસ્ફોફ્રક્ટોકિનેઝ-1 ઉત્સેચકની ક્રિયા અવરોધે છે, જેથી ગ્લાઇકોલિસિસ પ્રક્ ાઇરોક્સિન (C) અને એલ્ડોસ્ટેરોન (D) રક્તમાં ગ્લુકોઝના સ્તરને સીધી અસર કરતા નથી.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સમન્વય અને એકીકરણ", "difficulty": "Hard", "num": 40}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
