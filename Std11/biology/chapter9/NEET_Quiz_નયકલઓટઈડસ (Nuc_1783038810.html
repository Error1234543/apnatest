    <script>
        const questionsData = [{"question": "ન્યુક્લિઓટાઈડની રચનામાં કયા ઘટકોનો સમાવેશ થાય છે, પરંતુ તેની રચના દરમિયાન પુરીન ક્ષારકની જગ્યાએ પિરિમિડીન ક્ષારકનો ઉપયોગ થતો નથી?", "options": ["A) રાઇબોઝ શર્કરા, ફોસ્ફેટ જૂથ અને એડેનિન", "B) ડિઓક્સીરાઇબોઝ શર્કરા, ફોસ્ફેટ જૂથ અને ગ્વાનિન", "C) રાઇબોઝ શર્કરા, ફોસ્ફેટ જૂથ અને યુરેસિલ", "D) ડિઓક્સીરાઇબોઝ શર્કરા, ફોસ્ફેટ જૂથ અને થાયમિન"], "correct": 2, "explanation": "ન્યુક્લિઓટાઈડની રચનામાં શર્કરા (રાઇબોઝ અથવા ડિઓક્સીરાઇબોઝ), ફોસ્ફેટ જૂથ અને નાઇટ્રોજનયુક્ત ક્ષારકનો સમાવેશ થાય છે. પુરીન ક્ષારકોમાં એડેનિન અને ગ્વાનિન આવે છે, જ્યારે પિરિમિડીન ક્ષારકોમાં સાયટોસિન, થાયમિન અને યુરેસિલ આવે છે. યુરેસિલ ફક્ત RNAમાં જોવા મળે છે, જ્યારે થાયમિન ફક્ત DNAમાં જોવા મળે છે. વિકલ્પ Cમાં યુરેસિલ છે, જે પિરિમિડીન ક્ષારક છે અને તે RNA ન્યુક્લિઓટાઈડમાં જોવા મળે છે, પરંતુ પુરીન ક્ષારકની જગ્યાએ નથી વાપરાતો. વિકલ્પ A અને B પુરીન ક્ષારક ધરાવે છે, જ્યારે વિકલ્પ D થાયમિન ધરાવે છે, જે DNAમાં જોવા મળે છે. આથી, વિકલ્પ C યોગ્ય છે કારણ કે તે પિરિમિડીન ક્ષારક ધરાવે છે અને પુરીન ક્ષારકની જગ્યાએ નથી વાપરાતો.", "ncert_ref": "Class XII - Chapter 6: જૈવ અણુઓ અને તેમના કાર્યો", "difficulty": "Hard", "num": 1}, {"question": "DNA અને RNA ન્યુક્લિઓટાઈડ વચ્ચેનો મુખ્ય તફાવત કયો છે?", "options": ["A) DNAમાં થાયમિન અને RNAમાં યુરેસિલ હોય છે", "B) DNAમાં રાઇબોઝ શર્કરા અને RNAમાં ડિઓક્સીરાઇબોઝ શર્કરા હોય છે", "C) DNAમાં ફોસ્ફેટ જૂથ નથી હોતું, જ્યારે RNAમાં હોય છે", "D) DNAમાં એડેનિન નથી હોતું, જ્યારે RNAમાં હોય છે"], "correct": 0, "explanation": "DNA અને RNA ન્યુક્લિઓટાઈડ વચ્ચેનો મુખ્ય તફાવત એ છે કે DNAમાં થાયમિન નાઇટ્રોજનયુક્ત ક્ષારક હોય છે, જ્યારે RNAમાં યુરેસિલ હોય છે. વિકલ્પ B અયોગ્ય છે કારણ કે DNAમાં ડિઓક્સીરાઇબોઝ શર્કરા અને RNAમાં રાઇબોઝ શર્કરા હોય છે. વિકલ્પ C અયોગ્ય છે કારણ કે DNA અને RNA બંનેમાં ફોસ્ફેટ જૂથ હોય છે. વિકલ્પ D અયોગ્ય છે કારણ કે DNA અને RNA બંનેમાં એડેનિન હોય છે.", "ncert_ref": "Class XII - Chapter 6: જૈવ અણુઓ અને તેમના કાર્યો", "difficulty": "Hard", "num": 2}, {"question": "ન્યુક્લિઓટાઈડની રચના દરમિયાન, કયા નાઇટ્રોજનયુક્ત ક્ષારકની રચના પુરીન વલયમાં થ , "B) ડિઓક્સીએડિનોસિન મોનોફોસ્ફેટ (dAMP)", "C) રિબોઝ 5-ફોસ્ફેટ", "D) યુરિડિન ડાયફોસ્ફેટ (UDP)"], "correct": 1, "explanation": "ડિઓક્સીએડિનોસિન મોનોફોસ્ફેટ (dAMP)માં 5-કાર્બન શર્કરા તરીકે ડિઓક્સીરિબોઝ હોય છે અને તે DNA ની રચનામાં મુખ્ય ભૂમિકા ભજવે છે. ADP અને UDPમાં રિબોઝ શર્કરા હોય છે, જ્યારે રિબોઝ 5-ફોસ્ફેટ એક પૂર્વગામી પદાર્થ છે.", "ncert_ref": "Class XII - Chapter 6: અનુવંશિકતા અને વિકાસ", "difficulty": "Hard", "num": 19}, {"question": "નીચેનામાંથી કયું વિધાન ન્યુક્લિઓટાઈડના સંરચનાત્મક અને કાર્યાત્મક ગુણધર્મો વિશે સાચું નથી?", "options": ["A) ન્યુક્લિઓટાઈડમાં ફોસ્ફોડાયેસ્ટર બંધ દ્વારા જોડાયેલા ફોસ્ફેટ જૂથોની સંખ્યા તેની ઉર્જા વહન ક્ષમતાને નક્કી કરે છે.", "B) ATP અને GTP જેવા ન્યુક્લિઓટાઈડમાં બે ફોસ્ફેટ જૂથ વચ્ચેનો બંધ ઉચ્ચ-ઊર્જા વાળો હોય છે, જે હાઇડ્રોલિસિસ દરમિયાન ઉર્જા મુક્ત કરે છે.", "C) cAMP (સાયક્લિક એડિનોસિન મોનોફોસ્ફેટ) ન્યુક્લિઓટાઈડ છે જે કોષીય સંકેતવહનમાં ભાગ લે છે અને તેની રચનામાં એક જ ફોસ્ફેટ જૂથ હોય છે.", "D) ન્યુક્લિઓટાઈડમાં રિબોઝ અથવા ડિઓક્સીરિબોઝ શર્કરાની 5’ સ્થાને ફોસ્ફેટ જૂથ જોડાયેલું હોય છે, જ્યારે 3’ સ્થાને હાઇડ્રોક્સિલ જૂથ હોય છે."], "correct": 0, "explanation": "વિકલ્પ A ખોટો છે કારણ કે ન્યુક્લિઓટાઈડમાં ફોસ્ફોડાયેસ્ટર બંધ દ્વારા જોડાયેલા ફોસ્ફેટ જૂથોની સંખ્યા ઉર્જા વહન ક્ષમતાને નક્કી કરતી નથી, પરંતુ ઉર્જા વહન ક્ષમતા ફોસ્ફેટ જૂથો વચ્ચેના ઉચ્ચ-ઊર્જા વાળા બંધો (જેમ કે ATPમાં β અને γ ફોસ્ફેટ જૂથ વચ્ચેના બંધ) પર આધારિત હોય છે. વિકલ્પ B સાચો છે કારણ કે ATP અને GTPમાં બે ફોસ્ફેટ જૂથ વચ્ચેનો બંધ ઉચ્ચ-ઊર્જા વાળો હોય છે, જે હાઇડ્રોલિસિસ દરમિયાન ઉર્જા મુક્ત કરે છે. વિકલ્પ C સાચો છે કારણ કે cAMP એક ન્યુક્લિઓટાઈડ છે જે કોષીય સંકેતવહનમાં ભાગ લે છે અને તેની રચનામાં એક જ ફોસ્ફેટ જૂથ હોય છે. વિકલ્પ D સાચો છે કારણ કે ન્યુક્લિઓટાઈડમાં શર્કરાની 5’ સ્થાને ફોસ્ફેટ જૂથ અને 3’ સ્થાને હાઇડ્રોક્સિલ જૂથ હોય છે.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક આનુવંશિકતા (Molecular Basis of Inheritance)", "difficulty": "Hard", "num": 20}, {"question": "નીચેનામાંથી કયો ન્યુક્લિઓટાઈડ કોષીય ચયાપચય દરમિયાન ઉર્જા વહન કરતો નથી, પરંતુ અનુવંશિક માહિતીના સંગ્રહ અને વહનમાં મુખ્ય ભૂમ ેટ) એક સેકન્ડ મેસેન્જર તરીકે કાર્ય કરે છે અને તેની રચનામાં રિબોઝ શર્કરા અને એક ફોસ્ફેટ જૂથ હોય છે, પરંતુ તે સાયક્લિક રચના ધરાવે છે. GTPમાં ત્રણ ફોસ્ફેટ જૂથો હોય છે અને તે ઉર્જા વહન માટે વપરાય છે. NAD+ અને FAD કોએન્ઝાઇમ તરીકે કાર્ય કરે છે, પરંતુ તેઓ સેકન્ડ મેસેન્જર નથી.", "ncert_ref": "Class XII - Chapter 9: જૈવ-અણુઓ અને જીવન પ્રક્રિયાઓ", "difficulty": "Hard", "num": 35}, {"question": "નીચેનામાંથી કયા ન્યુક્લિઓટાઈડના વિઘટનથી યુરિક એસિડનું નિર્માણ થાય છે, જે પુરીન ચયાપચયનો અંતિમ ઉત્પાદન છે?", "options": ["A) એડિનોસિન મોનોફોસ્ફેટ (AMP)", "B) ગ્વાનોસિન મોનોફોસ્ફેટ (GMP)", "C) સાયટિડિન મોનોફોસ્ફેટ (CMP)", "D) થાયમિડિન મોનોફોસ્ફેટ (TMP)"], "correct": 1, "explanation": "ગ્વાનોસિન મોનોફોસ્ફેટ (GMP) ના વિઘટનથી યુરિક એસિડનું નિર્માણ થાય છે. પુરીન ન્યુક્લિઓટાઈડ્સ (જેમ કે AMP અને GMP) ના વિઘટનથી યુરિક એસિડ બને છે, જ્યારે પાયરિમિડિન ન્યુક્લિઓટાઈડ્સ (જેમ કે CMP અને TMP) ના વિઘટનથી યુરિક એસિડ બનતું નથી. AMP ના વિઘટનથી પણ યુરિક એસિડ બને છે, પરંતુ GMP એ પુરીન ચયાપચયનો અંતિમ ઉત્પાદન તરીકે વધુ સીધો સંબંધ ધરાવે છે.", "ncert_ref": "Class XII - Chapter 9: જૈવ અણુઓ અને તેના કાર્ય", "difficulty": "Hard", "num": 36}, {"question": "નીચેનામાંથી કયું વિધાન ન્યુક્લિઓટાઈડના કાર્ય વિશે ખોટું છે, જેને લીધે કોષીય પ્રક્રિયાઓમાં ખલેલ પડી શકે છે?", "options": ["A) ન્યુક્લિઓટાઈડ્સ અનુવંશિક માહિતીના વાહક તરીકે કાર્ય કરે છે, પરંતુ તે ઉર્જા વહન માટે ઉપયોગી નથી.", "B) કેટલાક ન્યુક્લિઓટાઈડ્સ કોષીય સંકેત પ્રસારણમાં સેકન્ડ મેસેન્જર તરીકે કાર્ય કરે છે.", "C) ન્યુક્લિઓટાઈડ્સ ઉત્સેચકોના સહકારક (cofactor) તરીકે કાર્ય કરી શકે છે.", "D) ન્યુક્લિઓટાઈડ્સ પ્રોટીન સંશ્લેષણમાં સક્રિય ભૂમિકા ભજવે છે."], "correct": 0, "explanation": "વિધાન A ખોટું છે કારણ કે ન્યુક્લિઓટાઈડ્સ (જેમ કે ATP) ઉર્જા વહન માટે મુખ્ય ભૂમિકા ભજવે છે. અન્ય વિધાનો સાચાં છે: ન્યુક્લિઓટાઈડ્સ સેકન્ડ મેસેન્જર તરીકે (જેમ કે cAMP), ઉત્સેચકોના સહકારક તરીકે (જેમ કે NAD⁺, FAD), અને પ્રોટીન સંશ્લેષણમાં (tRNA, rRNA) ભૂમિકા ભજવે છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 9: બાયોમોલેક્યુલ્સ (Biomolecules)", "difficulty": "Hard", "num": 37}, {"question": "જો એક ન્યુક્લ         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');

                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
