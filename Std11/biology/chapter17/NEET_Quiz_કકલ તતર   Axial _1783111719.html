<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">

    <title>નીટ ક્વિઝ - કંકાલ તંત્ર – Axial અને Appendicular Skeleton.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>

            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>

    <script>
        const questionsData = [{"question": "અગ્રવર્તી કશેરુક (Atlas) નીચેનામાંથી કયું લક્ષણ ધરાવે છે?", "options": ["A) તેને શરીર (Body) નથી હોતું અને તે કપાલની નીચે સીધું જોડાય છે.", "B) તે પાછળના ભાગે ડોર્સલ સ્પાઇન ધરાવે છે જે ગરદનની હલનચલનમાં મદદ કરે છે.", "C) તેના ટ્રાન્સવર્સ પ્રોસેસ પર ફોરામેન ટ્રાન્સવર્સેરિયા હાજર નથી.", "D) તે સર્વાઇકલ વર્ટિબ્રેની જેમ જ સ્પાઇનસ પ્રોસેસ ધરાવે છે."], "correct": 0, "explanation": "અગ્રવર્તી કશેરુક (Atlas) ને શરીર (Body) નથી હોતું અને તે કપાલની નીચે સીધું જોડાય છે, જે ગરદનની હલનચલનમાં મહત્વની ભૂમિકા ભજવે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) ડોર્સલ સ્પાઇન અગ્રવર્તી કશેરુકમાં હાજર નથી, C) ફોરામેન ટ્રાન્સવર્સેરિયા હાજર હોય છે જ્યાં વર્ટિબ્રલ આર્ટરી પસાર થાય છે, D) સર્વાઇકલ વર્ટિબ્રેની જેમ સ્પાઇનસ પ્રોસેસ અગ્રવર્તી કશેરુકમાં હાજર નથી.", "ncert_ref": "Class XI - પ્રકરણ ૨૦: કંકાલ તંત્ર", "difficulty": "Hard", "num": 1}, {"question": "નીચેનામાંથી કયો હાડકો એપેન્ડિક્યુલર સ્કેલેટનનો ભાગ નથી?", "options": ["A) ક્લેવિકલ", "B) સ્કેપ્યુલા", "C) સ્ટર્નમ", "D) હ્યુમેરસ"], "correct": 2, "explanation": "સ્ટર્નમ (Sternum) એ એક્સિયલ સ્કેલેટનનો ભાગ છે, જ્યારે ક્લેવિકલ, સ્કેપ્યુલા અને હ્યુમેરસ એપેન્ડિક્યુલર સ્કેલેટનના ભાગ છે. સ્ટર્નમ છાતીના મધ્ય ભાગમાં આવેલું છે અને રિબ્સ સાથે જોડાયેલું છે.", "ncert_ref": "Class XI - પ્રકરણ ૨૦: કંકાલ તંત્ર", "difficulty": "Hard", "num": 2}, {"question": "ગરદનના કશેરુકોમાં કયા કશેરુકમાં ઓડોન્ટોઇડ પ્રોસેસ હાજર હોય છે?", "options": ["A) એટલસ", "B) એક્સિસ", "C) સર્વાઇકલ વર્ટિબ્રે ૩", "D) સર્વાઇકલ વર્ટિબ્રે ૭"], "correct": 1, "explanation": "ઓડોન્ટોઇડ પ્રોસેસ એક્સિસ (C2) કશેરુકમાં હાજર હોય છે, જે એટલસ (C1) સાથે જોડાઈને ગરદનની હલનચલનમાં મદદ કરે છે. એટલસમાં ઓડોન્ટોઇડ પ્રોસેસ હાજર નથી, અને સર્વાઇકલ વર્ટિબ્રે ૩ અને ૭માં પણ આ પ્રોસેસ હાજર નથી.", "ncert_ref": "Class XI - પ્રકરણ ૨૦: કંકાલ તંત્ર", "difficulty": "Hard", "num": 3}, {"question": "નીચેનામાંથી કયો હાડકો ક્રેનિયલ હાડકાઓનો ભાગ નથી?", "options": ["A) ફ્રન્ટલ", "B) પેરાયટલ", "C) હાયોઇડ", "D) ટેમ્પોરલ"], "correct": 2, "explanation": "હાયોઇડ હાડકો ક્રેનિયલ હાડકાઓનો ભાગ ન ], "correct": 1, "explanation": "પેટેલા (Patella) એપેન્ડિક્યુલર સ્કેલેટનનો ભાગ છે અને તેના પર કોઈ સ્નાયુ જોડાયેલો નથી. ક્લેવિકલ (A), હ્યુમેરસ (C), અને રેડિયસ (D) પર સ્નાયુઓ જોડાયેલા હોય છે.", "ncert_ref": "Class XI - પ્રકરણ 20: કંકાલ તંત્ર", "difficulty": "Hard", "num": 12}, {"question": "નીચેનામાંથી કયું વિધાન સ્કેપ્યુલા વિશે સત્ય છે?", "options": ["A) તે એક લાંબો હાડકો છે", "B) તેના પર કોરેકોઇડ કવિટી હાજર નથી", "C) તે ક્લેવિકલ સાથે જોડાયેલો નથી", "D) તેના પર સ્પાઇન હાજર છે"], "correct": 3, "explanation": "સ્કેપ્યુલા પર સ્પાઇન હાજર છે (D યોગ્ય). તે એક ત્રિકોણાકાર હાડકો છે (A ખોટું), તેના પર કોરેકોઇડ કવિટી હાજર છે (B ખોટું), અને તે ક્લેવિકલ સાથે જોડાયેલો છે (C ખોટું).", "ncert_ref": "Class XI - પ્રકરણ 20: કંકાલ તંત્ર", "difficulty": "Hard", "num": 13}, {"question": "નીચેના વિધાનો ધ્યાનમાં લો અને સાચો વિકલ્પ પસંદ કરો:\n\n(1) હાયોઇડ હાડકું એક્સિયલ કંકાલતંત્રનો ભાગ છે, પરંતુ તે કશેરુકદંડ સાથે સીધું જોડાયેલ નથી.\n(2) સ્ટર્નમ એક લાંબું હાડકું છે જે પાંસળીઓ સાથે જોડાઈને છાતીનો પિંજર બનાવે છે.\n(3) એપેન્ડિક્યુલર સ્કેલેટનમાં કુલ 126 હાડકાં હોય છે, જેમાં હાથ અને પગના હાડકાંનો સમાવેશ થાય છે.\n(4) કપાલના હાડકાંમાં ફક્ત 8 હાડકાં હોય છે, જેમાંથી બધા જ અપ્રત્યક્ષ રીતે એકબીજા સાથે જોડાયેલા હોય છે.", "options": ["A) વિધાન 1 અને 3 સાચાં છે, જ્યારે 2 અને 4 ખોટાં છે", "B) વિધાન 1, 2 અને 3 સાચાં છે, જ્યારે 4 ખોટું છે", "C) વિધાન 1 અને 4 સાચાં છે, જ્યારે 2 અને 3 ખોટાં છે", "D) વિધાન 2 અને 4 સાચાં છે, જ્યારે 1 અને 3 ખોટાં છે"], "correct": 0, "explanation": "વિધાન 1 સાચું છે કારણ કે હાયોઇડ હાડકું એક્સિયલ કંકાલતંત્રનો ભાગ છે પરંતુ તે કશેરુકદંડ સાથે સીધું જોડાયેલ નથી (NCERT Class XI, Chapter 7: પ્રાણીઓમાં રચનાત્મક સંગઠન). વિધાન 3 સાચું છે કારણ કે એપેન્ડિક્યુલર સ્કેલેટનમાં કુલ 126 હાડકાં હોય છે (NCERT Class XI, Chapter 20: કંકાલતંત્ર અને સ્નાયુતંત્ર). વિધાન 2 ખોટું છે કારણ કે સ્ટર્નમ એક લાંબું હાડકું નથી, તે એક ચપટું હાડકું છે. વિધાન 4 ખોટું છે કારણ કે કપાલમાં 8 હાડકાં હોય છે, પરંતુ તે સીધા સાંધા દ્વારા એકબીજા સાથે જોડાયેલા હોય છે, અપ્રત્યક્ષ રીતે નહીં.", "ncert_ref": "Class XI - પ્રકરણ 7: પ્રાણીઓમાં રચનાત્મક સંગઠન અને પ્રકરણ 20: કંકાલતંત્ર અને સ્નાયુતંત્ર", "difficulty": "Hard", "num": 14}, {"question": "એક દર્દીને ગરદનના વિસ્તારમાં દુખાવો થાય છે અને એક્સ-રે પરીક્ષણમાં જાણવા મળ્યું કે તેના અક્ષીય કશેરુક (Axis) ના ઓડોન્ટોઇડ પ્રોસેસને નુકસાન થયું છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું કાર્ય સૌથી વધુ પ્રભાવિત થશે?", "options": ["A) માથાનું ઉપર-નીચે હલનચલન (Flexion અને Extension)", "B) માથાનું ડાબી-જમણી બાજુ ફેરવવું (Rotation)", "C) ખભાના સ્નાયુઓનું હલનચલન", "D) શ્વાસોચ્છવાસની ક્રિયા"], "correct": 1, "explanation": "ઓડોન્ટોઇડ પ્રોસેસ (ડેન્સ) એ અક્ષીય કશેરુક (Axis) નો ભાગ છે, જે અગ્રવર્તી કશેરુક (Atlas) સાથે જોડાઈને માથાનું ડાબી-જમણી બાજુ ફેરવવાનું (Rotation) કાર્ય કરે છે (NCERT Class XI, Chapter 20: કંકાલતંત્ર અને સ્નાયુતંત્ર). તેથી, તેને નુકસાન થવાથી આ હલનચલન સૌથી વધુ પ્રભાવિત થશે. વિકલ્પ A ખોટો છે કારણ કે ઉપર-નીચે હલનચલન અગ્રવર્તી કશેરુક દ્વારા થાય છે. વિકલ્પ C અને D અસંબંધિત છે કારણ કે ખભાના સ્નાયુઓ અને શ્વાસોચ્છવાસની ક્રિયા અક્ષીય કશેરુક સાથે સીધી રીતે જોડાયેલા નથી.", "ncert_ref": "Class XI - પ્રકરણ 20: કંકાલતંત્ર અને સ્નાયુતંત્ર", "difficulty": "Hard", "num": 15}, {"question": "નીચેનામાંથી કયું વિધાન કશેરુકદંડના થોરેસિક વિભાગ વિશે ખોટું છે?", "options": ["A) થોરેસિક કશેરુકો પાસે લાંબા અને મજબૂત ટ્રાન્સવર્સ પ્રોસેસ હોય છે જેમાં રિબ્સ જોડાયેલા હોય છે.", "B) થોરેસિક કશેરુકોની સ્પાઇનસ પ્રોસેસ ઓછી ઊંચી અને ઓછી તીક્ષ્ણ હોય છે.", "C) થોરેસિક કશેરુકોની વર્ટિબ્રલ ફોરામેના ગોળાકાર હોય છે.", "D) થોરેસિક કશેરુકોની બોડી હૃદયના આકારની હોય છે."], "correct": 2, "explanation": "થોરેસિક કશેરુકોની વર્ટિબ્રલ ફોરામેના ગોળાકાર નહીં પરંતુ અંડાકાર અથવા હૃદયના આકારની હોય છે. વિકલ્પ A, B, અને D સાચા છે કારણ કે થોરેસિક કશેરુકો પાસે લાંબા ટ્રાન્સવર્સ પ્રોસેસ હોય છે જેમાં રિબ્સ જોડાયેલા હોય છે, સ્પાઇનસ પ્રોસેસ ઓછી ઊંચી હોય છે, અને બોડી હૃદયના આકારની હોય છે.", "ncert_ref": "Class XI - પ્રકરણ 20: કંકાલ તંત્ર", "difficulty": "Hard", "num": 16}, {"question": "નીચેનામાંથી કયું વિધાન સ્કેપ્યુલા અને ક્લેવિકલ વિશે સાચું નથી?", "options": ["A) સ્કેપ્યુલા અને ક્લેવિકલ મળીને શોલ્ડર ગર્ડલ બનાવે છે.", "B) સ્કેપ્યુલા એ એક ત્રિકોણાકાર હાડકો છે જ્યારે ક્લેવિકલ એ એક લાંબો હાડકો છે.", "C) સ્કેપ્યુલા અને ક્લેવિકલ બંને એક્સિયલ સ્કેલેટનનો ભાગ છે.", "D) સ્કેપ્યુલા પર કોરાકોઇડ પ્રોસેસ હોય છે."], "correct": 2, "explanation": "સ્કેપ્યુલા અને ક્લેવિકલ એપેન્ડિક્યુલર સ્કેલેટનનો ભાગ છે, એક્સિયલ સ્કેલેટનનો નહીં. વિકલ્પ A, B, અને D સાચા છે કારણ કે સ્કેપ્યુલા અને ક્લેવિકલ મળીને શોલ્ડર ગર્ડલ બનાવે છે, સ્કેપ્યુલા ત્રિકોણાકાર અને ક્લેવિકલ લાંબો હાડકો છે, અને સ્કેપ્યુલા પર કોરાકોઇડ પ્રોસેસ હોય છે.", "ncert_ref": "Class XI - પ્રકરણ 20: કંકાલ તંત્ર", "difficulty": "Hard", "num": 17}, {"question": "નીચેનામાંથી કયું વિધાન કશેરુક (Vertebrae) ની રચના વિશે સાચું છે?", "options": ["A) સર્વાઇકલ કશેરુકોની બોડી મોટી અને હૃદયના આકારની હોય છે.", "B) લંબર કશેરુકોની ટ્રાન્સવર્સ પ્રોસેસ લાંબી અને પાતળી હોય છે.", "C) થોરેસિક કશેરુકોની સ્પાઇનસ પ્રોસેસ લાંબી અને તીક્ષ્ણ હોય છે.", "D) સેક્રલ કશેરુકો એકબીજા સાથે જોડાયેલા હોય છે અને એક સેક્રમ બનાવે છે."], "correct": 3, "explanation": "સેક્રલ કશેરુકો એકબીજા સાથે જોડાયેલા હોય છે અને એક સેક્રમ બનાવે છે. વિકલ્પ A, B, અને C ખોટા છે કારણ કે સર્વાઇકલ કશેરુકોની બોડી નાની અને ચોરસ હોય છે, લંબર કશેરુકોની ટ્રાન્સવર્સ પ્રોસેસ મજબૂત અને મોટી હોય છે, અને થોરેસિક કશેરુકોની સ્પાઇનસ પ્રોસેસ ઓછી ઊંચી અને ઓછી તીક્ષ્ણ હોય છે.", "ncert_ref": "Class XI - પ્રકરણ 20: કંકાલ તંત્ર", "difficulty": "Hard", "num": 18}, {"question": "એક દર્દીને ગરદનના નીચેના ભાગમાં અને ખભાના ઉપરના વિસ્તારમાં સતત દુખાવો થાય છે. એક્સ-રે પરીક્ષણમાં જાણવા મળ્યું કે તેના સર્વાઇકલ કશેરુકાઓમાં સામાન્ય કરતાં વધુ અંતર છે અને ક્લેવિકલના મધ્ય ભાગમાં અસ્થિભંગ છે. નીચેનામાંથી કયું વિધાન આ પરિસ્થિતિ સાથે સૌથી વધુ સુસંગત છે?", "options": ["A) સર્વાઇકલ કશેરુકાઓમાં વધેલું અંતર એટલસ અને એક્સિસ વચ્ચેના સંયુક્તની અસ્થિરતા સૂચવે છે, જે ક્લેવિકલના અસ્થિભંગ સાથે સંબંધિત નથી.", "B) ક્લેવિકલનો અસ્થિભંગ સ્ટર્નોક્લેઇડોમાસ્ટૉઇડ સ્નાયુના વધુ પડતા ખેંચાણને કારણે થયો હોઈ શકે છે, જે સર્વાઇકલ કશેરુકાઓ પર પણ દબાણ લાવે છે અને તેમની વચ્ચેનું અંતર વધારે છે.", "C) સર્વાઇકલ કશેરુકાઓ વચ્ચેનું વધેલું અંતર ઇન્ટરવર્ટિબ્રલ ડિસ્કના અધોગતિને કારણે છે, જે ક્લેવિકલના અસ્થિભંગ સાથે સીધો સંબંધ ધરાવતું નથી.", "D) ક્લેવિકલનો અસ્થિભંગ ટ્રેપેઝિયસ સ્નાયુના અચાનક સંકોચનને કારણે થયો હોઈ શકે છે, જે સર્વાઇકલ કશેરુકાઓ પર કોઈ અસર કરતું નથી."], "correct": 1, "explanation": "સ્ટર્નોક્લેઇડોમાસ્ટૉઇડ સ્નાયુ ગરદનના પાછળના ભાગ અને ક્લેવિકલ સાથે જોડાયેલો હોય છે. તેનું વધુ પડતું ખેંચાણ ક્લેવિકલ પર તણાવ લાવી શકે છે અને તેના અસ્થિભંગનું કારણ બની શકે છે. આ સ્નાયુનું ખેંચાણ સર્વાઇકલ કશેરુકાઓ પર પણ દબાણ લાવે છે, જે તેમની વચ્ચેનું અંતર વધારી શકે છે. વિકલ્પ A અને C ક્લેવિકલના અસ્થિભંગ સાથે સીધો સંબંધ દર્શાવતા નથી, જ્યારે વિકલ્પ D ટ્રેપેઝિયસ સ્નાયુને સંડોવે છે, જે મુખ્યત્વે ખભાના ઉપરના ભાગ સાથે જોડાયેલો છે અને આ પરિસ્થિતિ સાથે સુસંગત નથી.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 20: કંકાલ તંત્ર અને સ્નાયુ તંત્ર", "difficulty": "Hard", "num": 19}, {"question": "નીચેનામાંથી કયું વિધાન એક્સિયલ અને એપેન્ડિક્યુલર સ્કેલેટનના કાર્યાત્મક એકીકરણ વિશે ખોટું છે?", "options": ["A) પાંસળીઓનું પિંજર (રિબ કેજ) એ એક્સિયલ સ્કેલેટનનો ભાગ છે, જે શ્વસન દરમિયાન ફેફસાંના વિસ્તરણ માટે જરૂરી જગ્યા પૂરી પાડે છે, જ્યારે સ્કેપ્યુલા અને ક્લેવિકલ એપેન્ડિક્યુલર સ્કેલેટનના ભાગ તરીકે આ હલનચલનને સહાય કરે છે.", "B) કટિ કશેરુકાઓ (લમ્બર વર્ટિબ્રે) એક્સિયલ સ્કેલેટનનો ભાગ છે, જે શરીરના ઉપરના ભાગનું વજન ઉપરના અંગો સુધી પહોંચાડવામાં મદદ કરે છે, જે એપેન્ડિક્યુલર સ્કેલેટનનો ભાગ છે.", "C) સ્ટર્નમ (ઉરોસ્થિ) એક્સિયલ સ્કેલેટનનો ભાગ છે, જે પાંસળીઓ સાથે જોડાઈને હૃદય અને ફેફસાંનું રક્ષણ કરે છે, જ્યારે હ્યુમરસ એપેન્ડિક્યુલર સ્કેલેટનનો ભાગ છે, જે સ્ટર્નમ સાથે સીધો સંબંધ ધરાવતો નથી.", "D) પેલ્વિક ગર્ડલ એપેન્ડિક્યુલર સ્કેલેટનનો ભાગ છે, જે શરીરના ઉપરના ભાગનું વજન નીચલા અંગો સુધી પહોંચાડવામાં મદદ કરે છે, જ્યારે કટિ કશેરુકાઓ એક્સિયલ સ્કેલેટનનો ભાગ છે, જે આ વજનને સીધું સહન કરે છે."], "correct": 2, "explanation": "સ્ટર્નમ (ઉરોસ્થિ) એક્સિયલ સ્કેલેટનનો ભાગ છે અને તે પાંસળીઓ સાથે જોડાઈને હૃદય અને ફેફસાંનું રક્ષણ કરે છે. જો કે, હ્યુમરસ એપેન્ડિક્યુલર સ્કેલેટનનો ભાગ છે અને તે સ્ટર્નમ સાથે સીધો સંબંધ ધરાવતો નથી. આ વિધાન સાચું છે, પરંતુ વિકલ્પમાં તેને ખોટું દર્શાવવામાં આવ્યું છે. વિકલ્પ A, B અને D એક્સિયલ અને એપેન્ડિક્યુલર સ્કેલેટનના કાર્યાત્મક એકીકરણને યોગ્ય રીતે દર્શાવે છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 20: કંકાલ તંત્ર અને સ્નાયુ તંત્ર", "difficulty": "Hard", "num": 20}, {"question": "નીચેનામાંથી કયું વિધાન કોસ્ટલ કાર્ટિલેજ (Costal cartilage) વિશે ખોટું છે?", "options": ["A) તે હાયલાઇન કાર્ટિલેજનું બનેલું હોય છે અને સ્થિતિસ્થાપકતા ધરાવે છે.", "B) તે સ્ટર્નમ સાથે જોડાઈને થોરેક્સની રચના કરે છે.", "C) પ્રથમ સાત કોસ્ટલ કાર્ટિલેજ સ્ટર્નમ સાથે સીધું જોડાણ ધરાવે છે, જ્યારે 8મું, 9મું અને 10મું કોસ્ટલ કાર્ટિલેજ એકબીજા સાથે જોડાઈને સ્ટર્નમ સાથે અપ્રત્યક્ષ જોડાણ ધરાવે છે.", "D) 11મું અને 12મું કોસ્ટલ કાર્ટિલેજ સ્ટર્નમ સાથે જોડાયેલા નથી અને તેમને 'ફ્લોટિંગ રિબ્સ' કહેવાય છે."], "correct": 3, "explanation": "વિકલ્પ D ખોટો છે કારણ કે 11મું અને 12મું પસલી (રિબ્સ) સ્ટર્નમ સાથે જોડાયેલા નથી, પરંતુ તેમના કોસ્ટલ કાર્ટિલેજ પણ અન્ય પસલીઓ સાથે જોડાયેલા નથી. તેઓને 'ફ્લોટિંગ રિબ્સ' કહેવાય છે કારણ કે તેમનો અગ્રભાગ મુક્ત હોય છે. વિકલ્પ A, B, અને C સચોટ છે કારણ કે કોસ્ટલ કાર્ટિલેજ હાયલાઇન કાર્ટિલેજનું બનેલું હોય છે, સ્ટર્નમ સાથે જોડાઈને થોરેક્સની રચના કરે છે, અને પ્રથમ 10 કોસ્ટલ કાર્ટિલેજ સ્ટર્નમ સાથે પ્રત્યક્ષ અથવા અપ્રત્યક્ષ રીતે જોડાયેલા હોય છે.", "ncert_ref": "Class XI - પ્રકરણ 20: કંકાલ તંત્ર", "difficulty": "Hard", "num": 21}, {"question": "એક વ્યક્તિને ખભાના સાંધામાં ચેપ લાગ્યો છે અને ડોક્ટરે કહ્યું છે કે તે ગ્લેનોઇડ કેવિટીના વિસ્તારમાં છે. નીચેનામાંથી કયો હાડકો આ સ્થાન સાથે સંકળાયેલ છે?", "options": ["A) ક્લેવિકલ", "B) સ્કેપ્યુલા", "C) હ્યુમેરસ", "D) સ્ટર્નમ"], "correct": 1, "explanation": "ગ્લેનોઇડ કેવિટી સ્કેપ્યુલા (શોલ્ડર બ્લેડ) પર સ્થિત હોય છે, જ્યાં હ્યુમેરસનું માથું જોડાય છે અને ખભાના સાંધાની રચના કરે છે. ક્લેવિકલ (A) ખભાના સાંધાનો ભાગ છે પરંતુ ગ્લેનોઇડ કેવિટી સાથે સીધું સંકળાયેલ નથી. હ્યુમેરસ (C) ગ્લેનોઇડ કેવિટીમાં ફિટ થાય છે પરંતુ તે હાડકો નથી જ્યાં કેવિટી સ્થિત છે. સ્ટર્નમ (D) છાતીના મધ્ય ભાગમાં સ્થિત છે અને ખભાના સાંધા સાથે સંકળાયેલ નથી.", "ncert_ref": "Class XI - પ્રકરણ 20: કંકાલ તંત્ર", "difficulty": "Hard", "num": 22}, {"question": "નીચેનામાંથી કયું વિધાન સેક્રમ વિશે ખોટું છે?", "options": ["A) તે પાંચ જોડાયેલા કશેરુકોથી બનેલું હોય છે.", "B) તે પેલ્વિક ગર્ડલ સાથે જોડાયેલું હોય છે.", "C) તે કશેરુકદંડનો ભાગ છે અને લંબવત્ સ્થિતિમાં હોય છે.", "D) તેના ઉપરના ભાગને પ્રોમોન્ટરી કહેવાય છે."], "correct": 2, "explanation": "વિકલ્પ C ખોટો છે કારણ કે સેક્રમ કશેરુકદંડનો ભાગ છે પરંતુ તે લંબવત્ સ્થિતિમાં નથી, પરંતુ તે વક્ર સ્થિતિમાં હોય છે. સેક્રમ પાંચ જોડાયેલા કશેરુકોથી બનેલું હોય છે (A), પેલ્વિક ગર્ડલ સાથે જોડાયેલું હોય છે (B), અને તેના ઉપરના ભાગને પ્રોમોન્ટરી કહેવાય છે (D).", "ncert_ref": "Class XI - પ્રકરણ 20: કંકાલ તંત્ર", "difficulty": "Hard", "num": 23}, {"question": "એક વ્યક્તિને પગના ટખણાના વિસ્તારમાં ઇજા થઈ છે અને ડોક્ટરે કહ્યું છે કે તે ટિબિયા અને ફિબ્યુલા વચ્ચેના સાંધાને અસર કરે છે. નીચેનામાંથી કયો સાંધા આ ઇજા સાથે સંકળાયેલ છે?", "options": ["A) ટિબિયો-ફિબ્યુલર સાંધો (Proximal tibiofibular joint)", "B) ટિબિયો-ફિબ્યુલર સાંધો (Distal tibiofibular joint)", "C) એન્કલ સાંધો (Ankle joint)", "D) કની સાંધો (Knee joint)"], "correct": 1, "explanation": "ટખણાના વિસ્તારમાં ઇજા થઈ હોવાનું કહેવાય છે, જે ડિસ્ટલ ટિબિયો-ફિબ્યુલર સાંધો (B) સાથે સંકળાયેલ છે. પ્રોક્સિમલ ટિબિયો-ફિબ્યુલર સાંધો (A) ઘૂટણ નજીક સ્થિત છે, એન્કલ સાંધો (C) પગના ટખણાને હાડકાં સાથે જોડે છે, અને કની સાંધો (D) ઘૂટણ સાથે સંકળાયેલ છે.", "ncert_ref": "Class XI - પ્રકરણ 20: કંકાલ તંત્ર", "difficulty": "Hard", "num": 24}, {"question": "નીચેનામાંથી કયું વિધાન કશેરુકદંડના લુંબર (Lumbar) વિભાગ અને એપેન્ડિક્યુલર સ્કેલેટનના સંકળાયેલ કાર્ય વિશે સત્ય છે?", "options": ["A) લુંબર કશેરુકોના ટ્રાન્સવર્સ પ્રોસેસ પર કોઈ સ્નાયુ જોડાયેલા નથી, પરંતુ એપેન્ડિક્યુલર સ્કેલેટનના ઇલિયક હાડકા સાથે જોડાણ ધરાવે છે", "B) લુંબર કશેરુકોના સ્પાયનસ પ્રોસેસ પર લેટિસિમસ ડોર્સી સ્નાયુ જોડાયેલો હોય છે, જે એપેન્ડિક્યુલર સ્કેલેટનના હ્યુમેરસને હલનચલન કરે છે", "C) લુંબર કશેરુકોના બોડી પર ડાયાફ્રામ સ્નાયુ જોડાયેલો હોય છે, જે એપેન્ડિક્યુલર સ્કેલેટનના ક્લેવિકલને સ્થિર રાખે છે", "D) લુંબર કશેરુકોના આર્ટિક્યુલર ફેસેટ્સ એપેન્ડિક્યુલર સ્કેલેટનના ફેમર સાથે સીધું જોડાણ ધરાવે છે"], "correct": 1, "explanation": "વિકલ્પ B સત્ય છે કારણ કે લુંબર કશેરુકોના સ્પાયનસ પ્રોસેસ પર લેટિસિમસ ડોર્સી સ્નાયુ જોડાયેલો હોય છે, જે હ્યુમેરસ (એપેન્ડિક્યુલર સ્કેલેટનનો ભાગ) ને હલનચલન કરે છે. વિકલ્પ A ખોટો છે કારણ કે લુંબર કશેરુકોના ટ્રાન્સવર્સ પ્રોસેસ પર સ્નાયુઓ જોડાયેલા હોય છે અને ઇલિયક હાડકા સાથે સીધું જોડાણ નથી. વિકલ્પ C ખોટો છે કારણ કે ડાયાફ્રામ સ્નાયુ લુંબર કશેરુકોના બોડી પર જોડાયેલો નથી, પરંતુ તે થોરેસિક કશેરુકો સાથે સંકળાયેલો છે. વિકલ્પ D ખોટો છે કારણ કે લુંબર કશેરુકોના આર્ટિક્યુલર ફેસેટ્સ ફેમર સાથે સીધું જોડાણ ધરાવતા નથી, પરંતુ તે સેક્રમ અને પેલ્વિક ગર્ડલ સાથે જોડાયેલા હોય છે.", "ncert_ref": "Class XI - Chapter 20: કંકાલ તંત્ર", "difficulty": "Hard", "num": 25}, {"question": "નીચેનામાંથી કયું વિધાન સેક્રમ (Sacrum) અને કોક્સિક્સ (Coccyx) વિશે સાચું છે?", "options": ["A) સેક્રમ 5 જોડાયેલા કશેરુકોથી બનેલો હોય છે અને કોક્સિક્સ 3-4 જોડાયેલા કશેરુકોથી બનેલો હોય છે.", "B) સેક્રમ અને કોક્સિક્સ બંને એપેન્ડિક્યુલર સ્કેલેટનનો ભાગ છે.", "C) સેક્રમમાં સેક્રલ કેનાલ હાજર હોય છે પરંતુ કોક્સિક્સમાં નહીં.", "D) સેક્રમ અને કોક્સિક્સ બંનેમાં ટ્રાન્સવર્સ પ્રોસેસ હાજર હોય છે."], "correct": 0, "explanation": "સેક્રમ 5 જોડાયેલા કશેરુકોથી બનેલો હોય છે અને કોક્સિક્સ 3-4 જોડાયેલા કશેરુકોથી બનેલો હોય છે. સેક્રમ અને કોક્સિક્સ બંને એક્સિયલ સ્કેલેટનનો ભાગ છે, એપેન્ડિક્યુલર નહીં. સેક્રમમાં સેક્રલ કેનાલ હાજર હોય છે, પરંતુ કોક્સિક્સમાં ટ્રાન્સવર્સ પ્રોસેસ હાજર નથી. વિકલ્પ B ખોટો છે કારણ કે બંને એક્સિયલ સ્કેલેટનનો ભાગ છે. વિકલ્પ C અધૂરો છે કારણ કે કોક્સિક્સમાં પણ કેનાલ હાજર હોઈ શકે છે. વિકલ્પ D ખોટો છે કારણ કે કોક્સિક્સમાં ટ્રાન્સવર્સ પ્રોસેસ હાજર નથી.", "ncert_ref": "Class XI - Chapter 20: કંકાલ તંત્ર", "difficulty": "Hard", "num": 26}, {"question": "એક વ્યક્તિને ખભાના સાંધામાં ઇજા થઈ છે અને ડોક્ટરે કહ્યું છે કે ઇજા ગ્લેનોઇડ કેવિટી સાથે સંકળાયેલ છે. આ ઇજા નીચેનામાંથી કયા હાડકા સાથે સંકળાયેલ હશે?", "options": ["A) હ્યુમેરસ", "B) ક્લેવિકલ", "C) સ્કેપ્યુલા", "D) સ્ટર્નમ"], "correct": 2, "explanation": "ગ્લેનોઇડ કેવિટી સ્કેપ્યુલા (Scapula) ના ગ્લેનોઇડ ફોસા નામના ભાગમાં હોય છે, જ્યાં હ્યુમેરસનો હેડ જોડાય છે. હ્યુમેરસ (A) ગ્લેનોઇડ કેવિટી સાથે જોડાય છે પરંતુ ઇજા સ્કેપ્યુલા સાથે સંકળાયેલ છે. ક્લેવિકલ (B) અને સ્ટર્નમ (D) ગ્લેનોઇડ કેવિટી સાથે સીધો સંબંધ ધરાવતા નથી.", "ncert_ref": "Class XI - Chapter 20: કંકાલ તંત્ર", "difficulty": "Hard", "num": 27}, {"question": "નીચેનામાંથી કયું વિધાન કશેરુકદંડના થોરેસિક (Thoracic) વિભાગ વિશે સાચું નથી?", "options": ["A) થોરેસિક કશેરુકોમાં લંબાઈમાં વૃદ્ધિ થતી જાય છે.", "B) થોરેસિક કશેરુકોમાં રિબ્સ સાથે જોડાણ માટે ફેસેટ્સ હાજર હોય છે.", "C) થોરેસિક કશેરુકોમાં સ્પાઇનસ પ્રોસેસ લંબાઈમાં ઓછો હોય છે.", "D) થોરેસિક કશેરુકોમાં વર્ટિબ્રલ ફોરામેન ગોળાકાર હોય છે."], "correct": 3, "explanation": "થોરેસિક કશેરુકોમાં વર્ટિબ્રલ ફોરામેન ગોળાકાર નહીં પરંતુ ત્રિકોણાકાર હોય છે. થોરેસિક કશેરુકોમાં લંબાઈમાં વૃદ્ધિ થતી જાય છે (A સાચું), રિબ્સ સાથે જોડાણ માટે ફેસેટ્સ હાજર હોય છે (B સાચું), અને સ્પાઇનસ પ્રોસેસ લંબાઈમાં ઓછો હોય છે (C સાચું).", "ncert_ref": "Class XI - Chapter 20: કંકાલ તંત્ર", "difficulty": "Hard", "num": 28}, {"question": "નીચેનામાંથી કયું વિધાન કશેરુકદંડના સર્વાઇકલ (Cervical) વિભાગ અને એપેન્ડિક્યુલર સ્કેલેટન વચ્ચેના સંબંધ વિશે સત્ય છે?", "options": ["A) અગ્રવર્તી કશેરુક (Atlas) ની ટ્રાન્સવર્સ પ્રોસેસ પર ક્લેવિકલનું જોડાણ થાય છે", "B) એક્સિસ (Axis) ની ઓડોન્ટોઇડ પ્રોસેસ સ્કેપ્યુલા સાથે સાંધા રચે છે", "C) સર્વાઇકલ કશેરુકોની ટ્રાન્સવર્સ ફોરામિનાથી વર્ટિબ્રલ આર્ટરી પસાર થાય છે, જે ખભાના અંગોને રક્ત પૂરું પાડે છે", "D) સર્વાઇકલ કશેરુકોની સ્પાઇનસ પ્રોસેસ પર ટ્રેપેઝિયસ સ્નાયુ જોડાય છે, જે એપેન્ડિક્યુલર સ્કેલેટનને હલનચલનમાં મદદ કરે છે"], "correct": 3, "explanation": "વિકલ્પ D સાચો છે કારણ કે ટ્રેપેઝિયસ સ્નાયુ સર્વાઇકલ કશેરુકોની સ્પાઇનસ પ્રોસેસ સાથે જોડાય છે અને એપેન્ડિક્યુલર સ્કેલેટન (ખભા) ને હલનચલનમાં મદદ કરે છે. વિકલ્પ A ખોટો છે કારણ કે ક્લેવિકલ અગ્રવર્તી કશેરુકની ટ્રાન્સવર્સ પ્રોસેસ સાથે જોડાય છે, પરંતુ આ જોડાણ સાંધા રચતું નથી. વિકલ્પ B ખોટો છે કારણ કે એક્સિસની ઓડોન્ટોઇડ પ્રોસેસ અગ્રવર્તી કશેરુક સાથે સાંધા રચે છે, સ્કેપ્યુલા સાથે નહીં. વિકલ્પ C ખોટો છે કારણ કે વર્ટિબ્રલ આર્ટરી સર્વાઇકલ કશેરુકોની ટ્રાન્સવર્સ ફોરામિનાથી પસાર થાય છે, પરંતુ તે મગજને રક્ત પૂરું પાડે છે, ખભાના અંગોને નહીં.", "ncert_ref": "Class XI - Chapter 20: કંકાલ તંત્ર", "difficulty": "Hard", "num": 29}, {"question": "નીચેનામાંથી કયું વિધાન કશેરુકદંડના સર્વાઇકલ (Cervical) કશેરુકો અને એપેન્ડિક્યુલર સ્કેલેટનના હાડકાઓ વચ્ચેના સંબંધ વિશે સત્ય છે?", "options": ["A) અગ્રવર્તી કશેરુક (Atlas) ની ટ્રાન્સવર્સ પ્રોસેસ પર ક્લેવિકલનું જોડાણ થાય છે", "B) એક્સિસ (Axis) ના ઓડોન્ટોઇડ પ્રોસેસ સાથે સ્કેપ્યુલાની સ્પાઇન જોડાયેલી હોય છે", "C) સર્વાઇકલ કશેરુકોની ટ્રાન્સવર્સ ફોરામિનામાં વર્ટિબ્રલ આર્ટરી પસાર થાય છે અને તે હાથના સ્નાયુઓને રક્ત પુરવઠો પૂરો પાડે છે", "D) ૭મા સર્વાઇકલ કશેરુક (Vertebra prominens) ની સ્પાઇન સાથે ક્લેવિકલનું લેટેરલ છેડો જોડાયેલો હોય છે"], "correct": 0, "explanation": "વિકલ્પ A સત્ય છે કારણ કે અગ્રવર્તી કશેરુક (Atlas) ની ટ્રાન્સવર્સ પ્રોસેસ પર ક્લેવિકલનું જોડાણ થાય છે, જે એપેન્ડિક્યુલર સ્કેલેટનનો ભાગ છે. વિકલ્પ B ખોટો છે કારણ કે એક્સિસ (Axis) ના ઓડોન્ટોઇડ પ્રોસેસ સાથે સ્કેપ્યુલાની સ્પાઇન જોડાયેલી નથી, પરંતુ તે અગ્રવર્તી કશેરુક સાથે જોડાયેલી હોય છે. વિકલ્પ C ખોટો છે કારણ કે વર્ટિબ્રલ આર્ટરી સર્વાઇકલ કશેરુકોની ટ્રાન્સવર્સ ફોરામિનામાં પસાર થાય છે, પરંતુ તે મગજને રક્ત પુરવઠો પૂરો પાડે છે, હાથના સ્નાયુઓને નહીં. વિકલ્પ D ખોટો છે કારણ કે ૭મા સર્વાઇકલ કશેરુક (Vertebra prominens) ની સ્પાઇન સાથે ક્લેવિકલનું લેટેરલ છેડો જોડાયેલો નથી, પરંતુ તે ક્લેવિકલના મીડિયલ છેડા સાથે જોડાયેલો હોય છે.", "ncert_ref": "Class XI - Chapter 20: કંકાલ તંત્ર", "difficulty": "Hard", "num": 30}, {"question": "નીચેનામાંથી કયું વિધાન કશેરુકદંડના લુંબર (Lumbar) વિભાગ વિશે સાચું છે?", "options": ["A) લુંબર કશેરુકોની સંખ્યા 7 હોય છે અને તેઓ ગરદનના વિસ્તારમાં આવેલા હોય છે.", "B) લુંબર કશેરુકો મજબૂત અને મોટા હોય છે કારણ કે તેઓ શરીરના વજનને સહન કરે છે.", "C) લુંબર કશેરુકોમાં રિબ્સનું જોડાણ થાય છે.", "D) લુંબર કશેરુકો એ એપેન્ડિક્યુલર કંકાલતંત્રનો ભાગ છે."], "correct": 1, "explanation": "લુંબર કશેરુકો મજબૂત અને મોટા હોય છે કારણ કે તેઓ શરીરના વજનને સહન કરે છે. લુંબર કશેરુકોની સંખ્યા 5 હોય છે અને તેઓ કમરના વિસ્તારમાં આવેલા હોય છે. લુંબર કશેરુકોમાં રિબ્સનું જોડાણ થતું નથી, અને તેઓ એક્સિયલ કંકાલતંત્રનો ભાગ છે. વિકલ્પ A, C, અને on": "વિકલ્પ C ખોટું છે કારણ કે લુંબર કશેરુકો એક્સિયલ સ્કેલેટનનો ભાગ છે, એપેન્ડિક્યુલરનો નહીં. તેઓ પગના હાડકાઓ સાથે સીધા સાંધા બનાવતા નથી. બાકીના વિકલ્પો સાચાં છે: લુંબર કશેરુકો શરીરનું વજન ઉઠાવે છે, તેમની સ્પાઇનસ પ્રોસેસ ટૂંકી અને ચોરસ હોય છે, અને તેમનું વર્ટિબ્રલ ફોરામેન મોટું હોય છે.", "ncert_ref": "કક્ષા XI - પ્રકરણ 20: કંકાલ તંત્ર", "difficulty": "Hard", "num": 33}, {"question": "એક વ્યક્તિને ખભાના સાંધામાં ઇજા થઈ છે અને ડોક્ટરે જણાવ્યું કે તેના એક્રોમિયોક્લેવિક્યુલર સાંધામાં સમસ્યા છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) એક્રોમિયોક્લેવિક્યુલર સાંધો એ સ્કેપ્યુલા અને ક્લેવિકલ વચ્ચેનો સાંધો છે", "B) એક્રોમિયોક્લેવિક્યુલર સાંધો એ એપેન્ડિક્યુલર સ્કેલેટનનો ભાગ છે અને તે ખભાના હલનચલનમાં મદદ કરે છે", "C) એક્રોમિયોક્લેવિક્યુલર સાંધો એ એક્સિયલ સ્કેલેટનનો ભાગ છે અને તે ગરદનના હલનચલનમાં મદદ કરે છે", "D) એક્રોમિયોક્લેવિક્યુલર સાંધામાં ઇજા થવાથી ખભામાં દુખાવો અને હલનચલનમાં મર્યાદા આવી શકે છે"], "correct": 2, "explanation": "વિકલ્પ C ખોટું છે કારણ કે એક્રોમિયોક્લેવિક્યુલર સાંધો એ એપેન્ડિક્યુલર સ્કેલેટનનો ભાગ છે, એક્સિયલનો નહીં. તે સ્કેપ્યુલા અને ક્લેવિકલ વચ્ચેનો સાંધો છે અને ખભાના હલનચલનમાં મદદ કરે છે. બાકીના વિકલ્પો સાચાં છે: એક્રોમિયોક્લેવિક્યુલર સાંધો ખભાના હલનચલનમાં મદદ કરે છે અને તેમાં ઇજા થવાથી દુખાવો અને હલનચલનમાં મર્યાદા આવી શકે છે.", "ncert_ref": "કક્ષા XI - પ્રકરણ 20: કંકાલ તંત્ર", "difficulty": "Hard", "num": 34}, {"question": "નીચેનામાંથી કયું વિધાન કશેરુકદંડના થોરેસિક વિભાગ અને એપેન્ડિક્યુલર સ્કેલેટનના સંકળાયેલ કાર્ય વિશે સંપૂર્ણ સત્ય છે?", "options": ["A) થોરેસિક કશેરુકો સાથે જોડાયેલી પસલીઓ એપેન્ડિક્યુલર સ્કેલેટનના સ્ટર્નમ સાથે કોસ્ટલ કાર્ટિલેજ દ્વારા જોડાય છે અને ખભાના સાંધાને સ્થિરતા પ્રદાન કરે છે.", "B) થોરેસિક કશેરુકોની ટ્રાન્સવર્સ પ્રોસેસ પર પસલીઓનું જોડાણ થાય છે, જ્યારે એપેન્ડિક્યુલર સ્કેલેટનના ક્લેવિકલ હાડકા સ્ટર્નમ સાથે જોડાય છે.", "C) થોરેસિક કશેરુકોની સ્પાઇનસ પ્રોસેસ પર સ્કેપ્યુલા આરામ કરે છે, જ્યારે પસલીઓ સ્ટર્નમ સાથે સીધા જોડાય છે.", "D) થોરેસિક કશેરુકોની બોડી પર પસલીઓનું જોડાણ થાય છે, જ્યારે એપેન્ડિક્યુલર સ્કેલેટનના ક્લેવિકલ હાડકા સ્કેપ્યુલા સાથે જોડાય છે અને ખભાના સાંધાને હલનચલન પ્રદાન કરે છે."], "correct": 3, "explanation": "વિકલ્પ D સંપૂર્ણ સત્ય છે. થોરેસિક કશેરુકોની બોડી પર પસલીઓનું જોડાણ થાય છે, જ્યારે ક્લેવિકલ હાડકા સ્કેપ્યુલા સાથે જોડાય છે અને ખભાના સાંધાને હલનચલન પ્રદાન કરે છે. વિકલ્પ A ખોટો છે કારણ કે પસલીઓ સ્ટર્નમ સાથે કોસ્ટલ કાર્ટિલેજ દ્વારા જોડાય છે, પરંતુ ખભાના સાંધાને સ્થિરતા પ્રદાન કરવું એ એપેન્ડિક્યુલર સ્કેલેટનના ક્લેવિકલ અને સ્કેપ્યુલાના સંયોજનનો ભાગ છે. વિકલ્પ B ખોટો છે કારણ કે પસલીઓ ટ્રાન્સવર્સ પ્રોસેસ પર નહીં પણ બોડી અને ટ્રાન્સવર્સ પ્રોસેસની નજીકના ભાગ પર જોડાય છે. વિકલ્પ C ખોટો છે કારણ કે સ્કેપ્યુલા સ્પાઇનસ પ્રોસેસ પર આરામ કરતું નથી, પરંતુ ક્લેવિકલ સાથે જોડાય છે અને પસલીઓ સ્ટર્નમ સાથે સીધા જોડાતી નથી.", "ncert_ref": "Class XI - Chapter 20: કંકાલ તંત્ર", "difficulty": "Hard", "num": 35}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
