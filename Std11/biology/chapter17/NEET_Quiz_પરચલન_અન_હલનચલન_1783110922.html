<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 📖 પ્રચલન અને હલનચલન (Locomotion and Movement)
સ્નાયુઓના પ્રકાર – Skeletal</span>
                <span>🎯 Hard</span>
                <span>📝 48 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">

        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>

    <script>
        const questionsData = [{"question": "સ્નાયુ પેશીના સંદર્ભમાં નીચેના પૈકી કયું વિધાન સત્ય છે?", "options": ["A) હૃદય સ્નાયુ કોષો એકકેન્દ્રીય, શાખાયુક્ત અને સંકોચન પટ્ટિયા ધરાવે છે.", "B) કંકાલ સ્નાયુ કોષો બહુકેન્દ્રીય, સિલિન્ડ્રિકલ અને સ્વૈચ્છિક હોય છે, પરંતુ તેઓ માયોજેનિક ઉત્તેજનાને પ્રતિક્રિયા આપતા નથી.", "C) ચિકણા સ્નાયુ કોષો સ્પિન્ડલ આકારના, એકકેન્દ્રીય અને અસ્વૈચ્છિક હોય છે, પરંતુ તેઓમાં સાર્કોમિયર નહીં હોય.", "D) હૃદય સ્નાયુ કોષોના સંકોચન માટે કેલ્શિયમ આયનની જરૂર પડતી નથી."], "correct": 0, "explanation": "હૃદય સ્નાયુ કોષો એકકેન્દ્રીય, શાખાયુક્ત અને સંકોચન પટ્ટિયા (ઇન્ટરકેલેટેડ ડિસ્ક) ધરાવે છે, જે તેમને તાલમેલ સાથે સંકોચન કરવા સક્ષમ બનાવે છે. બાકીના વિકલ્પો ખોટા છે: B) કંકાલ સ્નાયુ કોષો માયોજેનિક ઉત્તેજનાને પ્રતિક્રિયા આપે છે; C) ચિકણા સ્નાયુ કોષોમાં સાર્કોમિયર નહીં હોય એ સત્ય છે, પરંતુ તેઓ સ્પિન્ડલ આકારના અને અસ્વૈચ્છિક હોય છે; D) હૃદય સ્નાયુ કોષોના સંકોચન માટે કેલ્શિયમ આયન જરૂરી છે.", "ncert_ref": "Class XI - પ્રકરણ ૨૦: પ્રચલન અને હલનચલન", "difficulty": "Hard", "num": 1}, {"question": "નીચેના પૈકી કયું સ્નાયુ પ્રકારનું લક્ષણ નથી?", "options": ["A) કંકાલ સ્નાયુઓમાં માયોફાઇબ્રિલ્સ હાજર હોય છે, જે સાર્કોપ્લાઝમમાં આવેલા હોય છે.", "B) ચિકણા સ્નાયુઓમાં સાર્કોલેમા નામનું પ્લાઝ્મા પડ દેખાય છે.", "C) હૃદય સ્નાયુઓમાં સાર્કોપ્લાઝમિક રેટિક્યુલમ વિકસિત હોય છે અને તે કેલ્શિયમ આયનનો સંગ્રહ કરે છે.", "D) ચિકણા સ્નાયુઓમાં સાર્કોમિયર નામની રચના જોવા મળે છે."], "correct": 3, "explanation": "ચિકણા સ્નાયુઓમાં સાર્કોમિયર નામની રચના જોવા મળતી નથી. સાર્કોમિયર ફક્ત કંકાલ અને હૃદય સ્નાયુઓમાં જોવા મળે છે. બાકીના વિકલ્પો સત્ય છે: A) કંકાલ સ્નાયુઓમાં માયોફાઇબ્રિલ્સ સાર્કોપ્લાઝમમાં આવેલા હોય છે; B) ચિકણા સ્નાયુઓમાં સાર્કોલેમા પ્લાઝ્મા પડ હોય છે; C) હૃદય સ્નાયુઓમાં સાર્કોપ્લાઝમિક રેટિક્યુલમ વિકસિત હોય છે અને કેલ્શિયમ આયનનો સંગ્રહ કરે છે.", "ncert_ref": "Class XI - પ્રકરણ ૨૦: પ્રચલન અને હલનચલન", "difficulty": "Hard", "num": 2}, {"question": "નીચેના પૈકી કયું વિધાન સ્નાયુ સંકોચનના સ્લાઇડિંગ ફિલામેન્ટ મોડેલ વિશે ખોટું છે?", "options": ["A) સંકોચન દરમિયાન, માયોસિન ફિલામેન્ટ્સ એક્ટિન ફિલામેન્ટ્સ પર સરકે છે.", "B) ATP ની હાઇડ્રોલિસિસથી મળતી ઉર્જા સંકોચન માટે વપરાય છે.", "C) ટ્રોપોમાયોસિન અને ટ્રોપોનિન એક્ટિન ફિલામેન્ટ્સ પર આવેલા હોય છે અને તે માયોસિન બાઇન્ડિંગ સાઇટ્સને ઢાંકી રાખે છે.", "D) સંકોચન દરમિયાન, એક્ટિન ફિલામેન્ટ્સનું લંબાઈમાં વિકાસ થાય છે."], "correct": 3, "explanation": "સંકોચન દરમિયાન, એક્ટિન ફિલામેન્ટ્સની લંબાઈમાં કોઈ વિકાસ થતો નથી. સ્લાઇડિંગ ફિલામેન્ટ મોડેલ અનુસાર, માયોસિન ફિલામેન્ટ્સ એક્ટિન ફિલામેન્ટ્સ પર સરકે છે, જેના કારણે સાર્કોમિયરની લંબાઈ ઘટે છે. બાકીના વિકલ્પો સત્ય છે: A) માયોસિન ફિલામેન્ટ્સ એક્ટિન પર સરકે છે; B) ATP ની હાઇડ્રોલિસિસથી ઉર્જા મળે છે; C) ટ્રોપોમાયોસિન અને ટ્રોપોનિન માયોસિન બાઇન્ડિંગ સાઇટ્સને ઢાંકી રાખે છે.", "ncert_ref": "Class XI - પ્રકરણ ૨૦: પ્રચલન અને હલનચલન", "difficulty": "Hard", "num": 3}, {"question": "નીચેના પૈકી કયું સ્નાયુ પ્રકાર અને તેની ક્રિયા વચ્ચેનું યોગ્ય જોડાણ નથી?", "options": ["A) કંકાલ સ્નાયુ – સ્વૈચ્છિક, ત્વરિત સંકોચન અને થાક જલ્દી આવે છે.", "B) ચિકણા સ્નાયુ – અસ્વૈચ્છિક, ધીમું અને ટકાઉ સંકોચન.", "C) હૃદય સ્નાયુ – સ્વૈચ્છિક, તાલમેલ સાથે સંકોચન અને થાક આવતો નથી.", "D) ચિકણા સ્નાયુ – એકકેન્દ્રીય, સ્પિન્ડલ આકારના કોષો."], "correct": 2, "explanation": "હૃદય સ્નાયુ અસ્વૈચ્છિક હોય છે, સ્વૈચ્છિક નહીં. હૃદય સ્નાયુ તાલમેલ સાથે સંકોચન કરે છે અને થાક આવતો નથી. બાકીના વિકલ્પો સત્ય છે: A) કંકાલ સ્નાયુ સ્વૈચ્છિક, ત્વરિત સંકોચન અને થાક જલ્દી આવે છે; B) ચિકણા સ્નાયુ અસ્વૈચ્છિક, ધીમું અને ટકાઉ સંકોચન; D) ચિકણા સ્નાયુ એકકેન્દ્રીય, સ્પિન્ડલ આકારના કોષો ધરાવે છે.", "ncert_ref": "Class XI - પ્રકરણ ૨૦: પ્રચલન અને હલનચલન", "difficulty": "Hard", "num": 4}, {"question": "નીચેના પૈકી કયું વિધાન સ્નાયુ પેશીના બંધારણ વિશે ખોટું છે?", "options": ["A) કંકાલ સ્નાયુ કોષોને સ્નાયુ તંતુઓ કહેવાય છે અને તેઓ સંકોચનશીલ પ્રોટીન એક્ટિન અને માયોસિન ધરાવે છે.", "B) ચિકણા સ્નાયુ કોષોના કોષરસમાં માયોફિલામેન્ટ્સ હાજર હોય છે, પરંતુ તેઓ સાર્કોમિયર રચના ધરાવતા નથી.", "C) હૃદય સ્નાયુ કોષોમાં સાર્કોપ્લાઝમિક રેટિક્યુલમ વિકસિત હોય છે અને તે કેલ્શિયમ આયનનો સંગ્રહ કરે છે.", "D) કંકાલ સ્નાયુ કોષોમાં સાર્કોલેમા નામનું પ્લાઝ્મા પડ હાજર નહીં હોય."], "correct": 3, "explanation": "કંકાલ સ્નાયુ કોષોમાં સાર્કોલેમા નામનું પ્લાઝ્મા પડ હાજર હોય છે. બાકીના વિકલ્પો સત્ય છે: A) કંકાલ સ્નાયુ કોષો સંકોચનશીલ પ્રોટીન એક્ટિન અને માયોસિન ધરાવે છે; B) ચિકણા સ્નાયુ કોષોના કોષરસમાં માયોફિલામેન્ટ્સ હાજર હોય છે, પરંતુ સાર્કોમિયર રચના ધરાવતા નથી; C) હૃદય સ્નાયુ કોષોમાં સાર્કોપ્લાઝમિક રેટિક્યુલમ વિકસિત હોય છે અને કેલ્શિયમ આયનનો સંગ્રહ કરે છે.", "ncert_ref": "Class XI - પ્રકરણ ૨૦: પ્રચલન અને હલનચલન", "difficulty": "Hard", "num": 5}, {"question": "સ્નાયુ કોષોના સરકોમિયરમાં કેલ્શિયમ આયનનો સંગ્રહ કયા અંગિકામાં થાય છે?", "options": ["A) ટ્રાન્સવર્સ ટ્યુબ્યુલ", "B) સરકોપ્લાઝ્મિક રેટિક્યુલમ", "C) માયોફાઇબ્રિલ", "D) મિટોકોન્ડ્રિયા"], "correct": 1, "explanation": "સરકોપ્લાઝ્મિક રેટિક્યુલમ (SR) સ્નાયુ કોષોમાં કેલ્શિયમ આયનનો મુખ્ય સંગ્રહસ્થાન છે, જે સ્નાયુ સંકોચન માટે જરૂરી કેલ્શિયમ મુક્ત કરે છે. ટ્રાન્સવર્સ ટ્યુબ્યુલ (T-ટ્યુબ) એક્શન પોટેન્શિયલનો વહન કરે છે, માયોફાઇબ્રિલ સંકોચન માટે જવાબદાર છે, અને મિટોકોન્ડ્રિયા ઊર્જા ઉત્પાદન કરે છે.", "ncert_ref": "Class XI - પ્રકરણ 20: પ્રચલન અને હલનચલન", "difficulty": "Hard", "num": 6}, {"question": "નીચેના પૈકી કયું વિધાન હૃદય સ્નાયુ (કાર્ડિયક મસલ) વિશે ખોટું છે?", "options": ["A) તે એકપેશીય અને બહુકોષીય છે.", "B) તેના કોષો વચ્ચે ઇન્ટરકેલેટેડ ડિસ્ક હોય છે.", "C) તે સ્વયંપ્રેરિત (myogenic) હોય છે.", "D) તે સ્મૂધ મસલ જેવી ધીમી અને લાંબી સંકોચન ક્રિયા ધરાવે છે."], "correct": 3, "explanation": "હૃદય સ્નાયુ (કાર્ડિયક મસલ) સ્મૂધ મસલ કરતાં ઝડપી અને લંબાયેલી સંકોચન ક્રિયા ધરાવે છે. તે એકપેશીય, બહુકોષીય, ઇન્ટરકેલેટેડ ડિસ્ક ધરાવે છે અને સ્વયંપ્રેરિત (myogenic) હોય છે. સ્મૂધ મસલ ધીમી અને લાંબી સંકોચન ક્રિયા ધરાવે છે, પરંતુ હૃદય સ્નાયુ એવું નથી.", "ncert_ref": "Class XI - પ્રકરણ 20: પ્રચલન અને હલનચલન", "difficulty": "Hard", "num": 7}, {"question": "સ્નાયુ સંકોચન દરમિયાન, કયા પ્રોટીનની સરકોમિયરની લંબાઈમાં ફેરફાર થતો નથી?", "options": ["A) એક્ટિન", "B) માયોસિન", "C) ટ્રોપોનિન", "D) ટ્રોપોમાયોસિન"], "correct": 0, "explanation": "સ્નાયુ સંકોચન દરમિયાન, એક્ટિન ફિલામેન્ટની લંબાઈમાં કોઈ ફેરફાર થતો નથી. માયોસિન ફિલામેન્ટ એક્ટિન  20: પ્રચલન અને હલનચલન", "difficulty": "Hard", "num": 20}, {"question": "કોષરસપટલ પર કેલ્શિયમ આયનની સાંદ્રતા વધારવા માટે કયા અંગિક દ્વારા કેલ્શિયમ આયન મુક્ત થાય છે, જે સ્નાયુ સંકોચન પ્રક્રિયાને પ્રારંભ કરે છે?", "options": ["A) સરકોપ્લાઝ્મિક રેટિક્યુલમ", "B) માયોટોબ", "C) મિટોકોન્ડ્રિયા", "D) ગોલ્ગી ઉપકરણ"], "correct": 0, "explanation": "સરકોપ્લાઝ્મિક રેટિક્યુલમ (SR) સ્નાયુ કોષોમાં કેલ્શિયમ આયનનો મુખ્ય સંગ્રહસ્થાન છે. જ્યારે સ્નાયુ કોષને ઉત્તેજન મળે છે, ત્યારે SR દ્વારા કેલ્શિયમ આયન મુક્ત થાય છે, જે ટ્રોપોનિન સાથે બંધાય છે અને ટ્રોપોમાયોસિનને હટાવી, એક્ટિન અને માયોસિન વચ્ચેની પરસ્પર ક્રિયાને શક્ય બનાવે છે. માયોટોબ, મિટોકોન્ડ્રિયા અને ગોલ્ગી ઉપકરણ કેલ્શિયમ આયનના સંગ્રહ અથવા મુક્ત કરવામાં ભાગ લેતા નથી.", "ncert_ref": "Class XI - પ્રકરણ 20: પ્રચલન અને હલનચલન", "difficulty": "Hard", "num": 21}, {"question": "હૃદય સ્નાયુ (કાર્ડિયક મસલ) અને કંકાળ સ્નાયુ (સ્કેલેટલ મસલ) વચ્ચેનો સાચો તફાવત કયો છે?", "options": ["A) હૃદય સ્નાયુ એકકોષીય છે જ્યારે કંકાળ સ્નાયુ બહુકોષીય છે", "B) હૃદય સ્નાયુમાં ઇન્ટરકેલેટેડ ડિસ્ક હાજર હોય છે જ્યારે કંકાળ સ્નાયુમાં નહીં", "C) હૃદય સ્નાયુ સ્વયંસંચાલિત હોય છે જ્યારે કંકાળ સ્નાયુ સ્વયંસંચાલિત નથી", "D) હૃદય સ્નાયુમાં સરકોમિયર હાજર નથી જ્યારે કંકાળ સ્નાયુમાં હાજર છે"], "correct": 2, "explanation": "હૃદય સ્નાયુ સ્વયંસંચાલિત (myogenic) હોય છે, એટલે કે તે પોતાની જાતે ઉત્તેજન ઉત્પન્ન કરી શકે છે, જ્યારે કંકાળ સ્નાયુ ન્યુરોજેનિક (neurogenic) હોય છે, એટલે કે તેને ચેતાતંત્ર દ્વારા ઉત્તેજન મળવું જરૂરી છે. હૃદય સ્નાયુ એકકોષીય નથી, તે સિંકાઇટિયમ (syncytium) રચે છે. ઇન્ટરકેલેટેડ ડિસ્ક હૃદય સ્નાયુમાં હાજર હોય છે, પરંતુ કંકાળ સ્નાયુમાં નહીં. સરકોમિયર હૃદય સ્નાયુ અને કંકાળ સ્નાયુ બંનેમાં હાજર હોય છે.", "ncert_ref": "Class XI - પ્રકરણ 20: પ્રચલન અને હલનચલન", "difficulty": "Hard", "num": 22}, {"question": "સરળ સ્નાયુ (સ્મૂધ મસલ) વિશે નીચેના પૈકી કયું વિધાન ખોટું છે?", "options": ["A) તે અસંખ્ય કોષકેન્દ્ર ધરાવે છે", "B) તે અસંકોચી પેશી છે", "C) તે આંતરડા, રક્તવાહિનીઓ અને શ્વાસનળી જેવા અંગોમાં જોવા મળે છે", "D) તેના કોષો સ્પિન્ડલ આકારના હોય છે"], "correct": 0, "explanation": "સરળ સ્નાયુ કોષો એકકોષકેન્દ્રીય (uninucleate) હોય છે, નહીં કે અસંખ્ય કોષકેન્દ્ર ધરાવે. સરળ સ્નાયુ અસંકોચી (involuntary) પેશી છે, આંતરડા, રક્તવાહિનીઓ અને શ્વાસનળી જેવા અંગોમાં જોવા મળે છે, અને તેના કોષો સ્પિન્ડલ આકારના હોય છે.", "ncert_ref": "Class XI - પ્રકરણ 20: પ્રચલન અને હલનચલન", "difficulty": "Hard", "num": 23}, {"question": "સ્નાયુ સંકોચન દરમિયાન, નીચેના પૈકી કયા પ્રોટીનની ભૂમિકા એટીપેઝને એક્ટિન ફિલામેન્ટ સાથે જોડાવા દેવા માટેની છે?", "options": ["A) ટ્રોપોનિન", "B) ટ્રોપોમાયોસિન", "C) માયોસિન", "D) એલાસ્ટિન"], "correct": 1, "explanation": "ટ્રોપોમાયોસિન એક્ટિન ફિલામેન્ટ પર આવરણ રચે છે અને એટીપેઝને એક્ટિન સાથે જોડાવા દેતું નથી. જ્યારે કેલ્શિયમ આયન ટ્રોપોનિન સાથે બંધાય છે, ત્યારે ટ્રોપોમાયોસિન હટાવાય છે અને એટીપેઝ એક્ટિન સાથે જોડાઈ શકે છે. ટ્રોપોનિન કેલ્શિયમ આયન સાથે બંધાય છે, માયોસિન એટીપેઝ ધરાવે છે, અને એલાસ્ટિન સ્નાયુ પેશી સાથે સંબંધિત નથી.", "ncert_ref": "Class XI - પ્રકરણ 20: પ્રચલન અને હલનચલન", "difficulty": "Hard", "num": 24}, {"question": "નીચેના પૈકી કયું વિધાન સ્નાયુ પેશીના પ્રકારો અને તેમના આણ્વિક મેકેનિઝમ વિશે સાચું નથી?", "options": ["A) કંકાળ સ્નાયુમાં ટ્રોપોનિન-ટ્રોપોમાયોસિન કોમ્પ્લેક્સ એટીપેઝની ક્રિયાને નિયંત્રિત કરે છે, જ્યારે સરળ સ્નાયુમાં કેલ્ડેસ્મોન અને કેલ્પોનિન એટીપેઝને નિષ્ક્રિય કરે છે.", "B) હૃદય સ્નાયુમાં ડેસ્મોઝોમ્સ અને ઇન્ટરકેલેટેડ ડિસ્કની હાજરી દ્વારા કોષો વચ્ચેના યાંત્રિક અને વિદ્યુત જોડાણને સુનિશ્ચિત કરે છે.", "C) સરળ સ્નાયુમાં માયોસિન ફિલામેન્ટ્સ પર માયોસિન હેડ્સની વિન્યાસિતા એટીપેઝની સક્રિયતા પર આધારિત નથી, પરંતુ કેલ્શિયમ-કેલ્મોડ્યુલિન કોમ્પ્લેક્સ પર આધારિત છે.", "D) કંકાળ સ્નાયુમાં સરકોમિયરની લંબાઈ સંકોચન દરમિયાન બદલાતી નથી, પરંતુ હૃદય સ્નાયુમાં સરકોમિયરની લંબાઈ સંકોચન દરમિયાન ઘટે છે."], "correct": 3, "explanation": "વિકલ્પ D ખોટો છે કારણ કે કંકાળ સ્નાયુ અને હૃદય સ્નાયુ બંનેમાં સરકોમિયરની લંબાઈ સંકોચન દરમિયાન ઘટે છે. સ્લાઇડિંગ ફિલામેન્ટ થિયરી મુજબ, સંકોચન દરમિયાન એક્ટિન અને માયોસિન ફિલામેન્ટ્સ એકબીજા પર સરકીને સરકોમિયરની લંબાઈ ઘટાડે છે. વિકલ્પ A સાચો છે કારણ કે કંકાળ સ્નાયુમાં ટ્રોપોનિન-ટ્રોપોમાયોસિન કોમ્પ્લેક્સ એટીપેઝને નિયંત્રિત કરે છે, જ્યારે સરળ સ્નાયુમાં કેલ્ડેસ્મોન અને કેલ્પોનિન એટીપેઝને નિષ્ક્રિય કરે છે. વિકલ્પ B સાચો છે કારણ કે હૃદય સ્નાયુમાં ડેસ્મોઝોમ્સ અને ઇન્ટરકેલેટેડ ડિસ્ક કોષો વચ્ચેના યાંત્રિક અને વિદ્યુત જોડાણને સુનિશ્ચિત કરે છે. વિકલ્પ C સાચો છે કારણ કે સરળ સ્નાયુમાં માયોસિન ફિલામેન્ટ્સની ક્રિયા કેલ્શિયમ-કેલ્મોડ્યુલિન કોમ્પ્લેક્સ પર આધારિત છે.", "ncert_ref": "Class XI - પ્રકરણ 20: પ્રચલન અને હલનચલન", "difficulty": "Hard", "num": 25}, {"question": "કયા સ્નાયુ પ્રકારમાં સરકોમિયરનો અભાવ હોય છે અને તેનું સંકોચન માયોસિન ફિલામેન્ટના ફોસ્ફોરિલેશન દ્વારા નિયંત્રિત થાય છે?", "options": ["A) કંકાળ સ્નાયુ (સ્કેલેટલ મસલ)", "B) હૃદય સ્નાયુ (કાર્ડિયક મસલ)", "C) સરળ સ્નાયુ (સ્મૂધ મસલ)", "D) કંકાળ અને હૃદય સ્નાયુ બંને"], "correct": 2, "explanation": "સરળ સ્નાયુ (સ્મૂધ મસલ)માં સરકોમિયરનો અભાવ હોય છે અને તેનું સંકોચન માયોસિન ફિલામેન્ટના ફોસ્ફોરિલેશન દ્વારા નિયંત્રિત થાય છે. કંકાળ અને હૃદય સ્નાયુઓમાં સરકોમિયર હાજર હોય છે, અને તેમનું સંકોચન સ્લાઇડિંગ ફિલામેન્ટ મોડેલ દ્વારા થાય છે. હૃદય સ્નાયુમાં સરકોમિયર હાજર હોય છે અને તેનું સંકોચન સ્વયં-ઉત્તેજિત હોય છે. કંકાળ સ્નાયુમાં સરકોમિયર હાજર હોય છે અને તેનું સંકોચન ચેતાતંત્ર દ્વારા નિયંત્રિત થાય છે.", "ncert_ref": "Class XI - Chapter 20: પ્રચલન અને હલનચલન", "difficulty": "Hard", "num": 26}, {"question": "નીચેના પૈકી કયું વિધાન કંકાળ સ્નાયુ (સ્કેલેટલ મસલ) અને સરળ સ્નાયુ (સ્મૂધ મસલ) વચ્ચેના તફાવત વિશે ખોટું છે?", "options": ["A) કંકાળ સ્નાયુ બહુકોષીય હોય છે જ્યારે સરળ સ્નાયુ એકકોષીય હોય છે.", "B) કંકાળ સ્નાયુમાં સરકોમિયર હાજર હોય છે જ્યારે સરળ સ્નાયુમાં નહીં.", "C) કંકાળ સ્નાયુનું સંકોચન ચેતાતંત્ર દ્વારા નિયંત્રિત થાય છે જ્યારે સરળ સ્નાયુનું સંકોચન હોર્મોન અને સ્થાનિક રાસાયણિક પદાર્થો દ્વારા નિયંત્રિત થાય છે.", "D) કંકાળ સ્નાયુમાં માયોગ્લોબિનની માત્રા ઓછી હોય છે જ્યારે સરળ સ્નાયુમાં વધુ હોય છે."], "correct": 3, "explanation": "કંકાળ સ્નાયુમાં માયોગ્લોબિનની માત્રા વધુ હોય છે કારણ કે તેને ઓક્સિજનના સંગ્રહ માટે વધુ જરૂર હોય છે. સરળ સ્નાયુમાં માયોગ્લોબિનની માત્રા ઓછી હોય છે. બાકીના તમામ વિધાનો સાચા છે: કંકાળ સ્નાયુ બહુકોષીય અને સરકોમિયર ધરાવે છે, જ્યારે સરળ સ્નાયુ એકકોષીય અને સરકોમિયર વગરનો હોય છે. કંકાળ સ્નાયુનું નિયંત્રણ ચેતાતંત્ર દ્વારા થાય છે, જ્યારે સરળ સ્નાયુનું નિયંત્રણ હોર્મોન અને સ્થાનિક રાસાયણિક પદાર્થો દ્વારા થાય છે.", "ncert_ref": "Class XI - Chapter 20: પ્રચલન અને હલનચલન", "difficulty": "Hard", "num": 27}, {"question": "હૃદય સ્નાયુ (કાર્ડિયક મસલ) વિશે નીચેના પૈકી કયું વિધાન સાચું નથી?", "options": ["A) તે સ્વયં-ઉત્તેજિત હોય છે અને તેનું સંકોચન સાયનોએટ્રિયલ નોડ દ્વારા શરૂ થાય છે.", "B) તે એકકોષીય અને શાખાયુક્ત હોય છે.", "C) તેના સંકોચન દરમિયાન કેલ્શિયમ આયનનો મુખ્ય સ્ત્રોત સરકોપ્લાઝ્મિક રેટિક્યુલમ હોય છે.", "D) તેના કોષો વચ્ચે ઇન્ટરકેલેટેડ ડિસ્ક હોય છે, જે સંકોચનના સંકલનમાં મદદ કરે છે."], "correct": 1, "explanation": "હૃદય સ્નાયુ (કાર્ડિયક મસલ) બહુકોષીય હોય છે, નહીં કે એકકોષીય. તે શાખાયુક્ત હોય છે અને સ્વયં-ઉત્તેજિત હોય છે, સાયનોએટ્રિયલ નોડ દ્વારા સંકોચન શરૂ થાય છે. કેલ્શિયમ આયનનો મુખ્ય સ્ત્રોત સરકોપ્લાઝ્મિક રેટિક્યુલમ હોય છે, અને ઇન્ટરકેલેટેડ ડિસ્ક કોષો વચ્ચેના સંકલનમાં મદદ કરે છે.", "ncert_ref": "Class XI - Chapter 20: પ્રચલન અને હલનચલન", "difficulty": "Hard", "num": 28}, {"question": "સ્નાયુ સંકોચન દરમિયાન, કયા સ્નાયુ પ્રકારમાં એટીપેઝની સક્રિયતા કેલ્શિયમ આયનની સાંદ્રતાને આધીન નથી?", "options": ["A) કંકાળ સ્નાયુ (સ્કેલેટલ મસલ)", "B) હૃદય સ્નાયુ (કાર્ડિયક મસલ)", "C) સરળ સ્નાયુ (સ્મૂધ મસલ)", "D) ઉપરોક્ત પૈકી એક પણ નહીં"], "correct": 2, "explanation": "સરળ સ્નાયુ (સ્મૂધ મસલ)માં એટીપેઝની સક્રિયતા માયોસિન ફિલામેન્ટના ફોસ્ફોરિલેશન દ્વારા નિયંત્રિત થાય છે, કેલ્શિયમ આયનની સાંદ્રતાને આધીન નથી. કંકાળ અને હૃદય સ્નાયુઓમાં એટીપેઝની સક્રિયતા કેલ્શિયમ આયનની સાંદ્રતાને આધીન હોય છે.", "ncert_ref": "Class XI - Chapter 20: પ્રચલન અને હલનચલન", "difficulty": "Hard", "num": 29}, {"question": "નીચેના પૈકી કયું વિધાન સરળ સ્નાયુ (સ્મૂધ મસલ), કંકાળ સ્નાયુ (સ્કેલેટલ મસલ) અને હૃદય સ્નાયુ (કાર્ડિયક મસલ)ના સંકોચન મેકેનિઝમ વિશે સાચું છે?", "options": ["A) સરળ સ્નાયુમાં સરકોમિયરનો અભાવ હોય છે, પરંતુ તેનું સંકોચન માયોસિન અને એક્ટિન ફિલામેન્ટના સ્લાઇડિંગ દ્વારા થાય છે.", "B) કંકાળ સ્નાયુમાં સંકોચન માટે ટ્રોપોનિન-ટ્રોપોમાયોસિન કોમ્પ્લ uestion": "એક સંશોધકે ત્રણ અલગ-અલગ સ્નાયુ પેશીઓના નમૂનાઓનું વિશ્લેષણ કર્યું અને નીચેના પરિણામો મેળવ્યા:\n\nનમૂનો 1: કોષો લાંબા, બહુકોષકેન્દ્રીય, સ્ટ્રાઇટેડ અને ઇચ્છાશક્તિથી નિયંત્રિત થાય છે.\nનમૂનો 2: કોષો ટૂંકા, એકકોષકેન્દ્રીય, સ્ટ્રાઇટેડ અને ઇન્ટરકેલેટેડ ડિસ્ક ધરાવે છે.\nનમૂનો 3: કોષો ત્રાકાકાર, એકકોષકેન્દ્રીય, નોન-સ્ટ્રાઇટેડ અને અનૈચ્છિક નિયંત્રણ હેઠળ છે.\n\nનીચેના પૈકી કયું વિધાન આ નમૂનાઓના સંદર્ભમાં ખોટું છે?", "options": ["A) નમૂનો 1 માં સરકોપ્લાઝ્મિક રેટિક્યુલમ ખૂબ જ વિકસિત હોય છે અને તે કેલ્શિયમ આયનનો મુખ્ય સંગ્રાહક છે.", "B) નમૂનો 2 માં કેલ્શિયમ આયનનો સંગ્રહ મુખ્યત્વે મિટોકોન્ડ્રિયા અને સરકોપ્લાઝ્મિક રેટિક્યુલમ બંનેમાં થાય છે.", "C) નમૂનો 3 માં કેલ્શિયમ આયનનો સંગ્રહ સરકોપ્લાઝ્મિક રેટિક્યુલમમાં થાય છે, પરંતુ તેની સંરચના ઓછી વિકસિત હોય છે.", "D) નમૂનો 2 માં કેલ્શિયમ આયનની સાંદ્રતા વધારવા માટે સરકોપ્લાઝ્મિક રેટિક્યુલમ સાથે સંકળાયેલા રાયનોોડાઇન રીસેપ્ટર્સ જવાબદાર છે."], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે કારણ કે હૃદય સ્નાયુ (કાર્ડિયક મસલ)માં કેલ્શિયમ આયનનો સંગ્રહ મુખ્યત્વે સરકોપ્લાઝ્મિક રેટિક્યુલમમાં થાય છે, મિટોકોન્ડ્રિયામાં નહીં. મિટોકોન્ડ્રિયા મુખ્યત્વે ઊર્જા ઉત્પાદનમાં ભાગ લે છે. વિકલ્પ A સાચો છે કારણ કે કંકાળ સ્નાયુમાં સરકોપ્લાઝ્મિક રેટિક્યુલમ ખૂબ જ વિકસિત હોય છે. વિકલ્પ C સાચો છે કારણ કે સરળ સ્નાયુમાં સરકોપ્લાઝ્મિક રેટિક્યુલમ ઓછું વિકસિત હોય છે. વિકલ્પ D સાચો છે કારણ કે હૃદય સ્નાયુમાં રાયનોોડાઇન રીસેપ્ટર્સ કેલ્શિયમ આયનની સાંદ્રતા વધારવામાં મહત્ત્વપૂર્ણ ભૂમિકા ભજવે છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 20: પ્રચલન અને હલનચલન", "difficulty": "Hard", "num": 35}, {"question": "નીચેના પૈકી કયા સ્નાયુ પ્રકારમાં સરકોમિયરનો અભાવ હોય છે અને તેનું સંકોચન 'લેચિંગ ફિલામેન્ટ મેકેનિઝમ' દ્વારા થતું નથી?", "options": ["A) કંકાળ સ્નાયુ (સ્કેલેટલ મસલ)", "B) હૃદય સ્નાયુ (કાર્ડિયક મસલ)", "C) સરળ સ્નાયુ (સ્મૂધ મસલ)", "D) કંકાળ અને હૃદય સ્નાયુ બંને"], "correct": 2, "explanation": "સરળ સ્નાયુ (સ્મૂધ મસલ)માં સરકોમિયરનો અભાવ હોય છે અને તેનું સંકોચન 'લેચિંગ ફિલામેન્ટ મેકેનિઝમ' દ્વારા થતું નથી. કંકાળ અને હૃદય સ્નાયુઓમાં સરકોમિયર હાજર હોય છે અને તેમનું સંકોચન સ્લાઇડિ         let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
