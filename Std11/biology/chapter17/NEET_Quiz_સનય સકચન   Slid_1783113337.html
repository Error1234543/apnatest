    <script>
        const questionsData = [{"question": "સ્નાયુતંતુમાં સરકતા તંતુ સિદ્ધાંત અનુસાર, એક સંકોચન ચક્ર દરમિયાન નીચેનામાંથી કયું પરિવર્તન થતું નથી?", "options": ["A) એક્ટિન તંતુઓની લંબાઈ", "B) માયોસિન તંતુઓની લંબાઈ", "C) સાર્કોમિયરની લંબાઈ", "D) H-વિસ્તારની પહોળાઈ"], "correct": 1, "explanation": "સરકતા તંતુ સિદ્ધાંત મુજબ, સંકોચન દરમિયાન એક્ટિન અને માયોસિન તંતુઓની લંબાઈ બદલાતી નથી, પરંતુ તેઓ એકબીજા પર સરકે છે. સાર્કોમિયરની લંબાઈ ઘટે છે અને H-વિસ્તારની પહોળાઈ પણ ઘટે છે. માત્ર માયોસિન તંતુઓની લંબાઈ અચળ રહે છે, કારણ કે તે સંકોચન દરમિયાન સંકોચાતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 20: પ્રાણીઓમાં ગતિ અને હલનચલન", "difficulty": "Hard", "num": 1}, {"question": "સ્નાયુ સંકોચન દરમિયાન Ca²⁺ આયનોની ભૂમિકા સંબંધિત નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) Ca²⁺ ટ્રોપોનિન સાથે જોડાઈને ટ્રોપોમાયોસિનને એક્ટિન પરથી ખસેડે છે", "B) Ca²⁺ સીધું માયોસિન હેડ સાથે જોડાઈને ATPase પ્રવૃત્તિને સક્રિય કરે છે", "C) Ca²⁺ સાર્કોપ્લાઝમિક રેટિક્યુલમમાંથી મુક્ત થાય છે", "D) Ca²⁺ ની સાંદ્રતા વધવાથી સંકોચન શરૂ થાય છે"], "correct": 1, "explanation": "Ca²⁺ આયનો ટ્રોપોનિન સાથે જોડાઈને ટ્રોપોમાયોસિનને ખસેડે છે, જેનાથી માયોસિન બાઈન્ડિંગ સાઈટ્સ ખુલ્લી થાય છે. પરંતુ Ca²⁺ સીધું માયોસિન હેડ સાથે જોડાતું નથી કે તેની ATPase પ્રવૃત્તિને સક્રિય કરતું નથી. ATPase પ્રવૃત્તિ માટે માયોસિન હેડમાં જ ATP હાજર હોય છે, જે Ca²⁺ ની હાજરીમાં સક્રિય થાય છે પરંતુ સીધો સંપર્ક નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 20: પ્રાણીઓમાં ગતિ અને હલનચલન", "difficulty": "Hard", "num": 2}, {"question": "સ્નાયુ સંકોચનના સરકતા તંતુ સિદ્ધાંતમાં, 'પાવર સ્ટ્રોક' દરમિયાન નીચેનામાંથી કયું પરિવર્તન થાય છે?", "options": ["A) માયોસિન હેડ ATP સાથે જોડાય છે", "B) માયોસિન હેડ ADP અને Pi મુક્ત કરે છે", "C) એક્ટિન તંતુ માયોસિન તરફ ખેંચાય છે", "D) ટ્રોપોનિન Ca²⁺ સાથે જોડાય છે"], "correct": 2, "explanation": "'પાવર સ્ટ્રોક' દરમિયાન માયોસિન હેડ ADP અને અકાર્બનિક ફોસ્ફેટ (Pi) મુક્ત કરે છે, જેના કારણે માયોસિન હેડ એક્ટિન તંતુ તરફ ખેંચાય છે અને સંકોચન થાય છે. માયોસિન હેડ ATP સાથે જોડાવાથી સંકોચન ચક્ર પૂર્ણ થાય છે, પરંતુ પાવર સ્ટ્રોક દરમિયાન નહીં. એક્ટિ ptions": ["A) ટ્રોપોમાયોસિન અણુ એક્ટિન બાઇન્ડિંગ સાઇટ્સને ઉઘાડી દેશે", "B) માયોસિન હેડ એક્ટિન સાથે સીધું જ જોડાઈ જશે અને પાવર સ્ટ્રોક શરૂ થશે", "C) ATP નું હાઇડ્રોલિસિસ શરૂ થશે અને માયોસિન હેડ એડી-પી અને ફોસ્ફેટમાં વિભાજિત થશે", "D) Z-રેખાઓ વચ્ચેનું અંતર તરત જ ઘટશે અને સાર્કોમિયર સંકોચાશે"], "correct": 0, "explanation": "સરકતા તંતુ સિદ્ધાંત અનુસાર, કેલ્શિયમ આયનો ટ્રોપોનિન-C સાથે બંધાય પછી ટ્રોપોનિન-T ની સ્થિતિ બદલાય છે, જેના કારણે ટ્રોપોમાયોસિન અણુ એક્ટિન બાઇન્ડિંગ સાઇટ્સને ઉઘાડી દે છે. આ પગલું સૌપ્રથમ થાય છે, જેથી માયોસિન હેડ એક્ટિન સાથે જોડાઈ શકે. વિકલ્પ B ખોટો છે કારણ કે માયોસિન હેડ એક્ટિન સાથે જોડાવા માટે પહેલા બાઇન્ડિંગ સાઇટ્સ ઉઘાડી પડવી જરૂરી છે. વિકલ્પ C ખોટો છે કારણ કે ATP નું હાઇડ્રોલિસિસ માયોસિન હેડની એક્ટિન સાથે જોડાણ પહેલાં થતું નથી, પરંતુ પાવર સ્ટ્રોક દરમિયાન થાય છે. વિકલ્પ D ખોટો છે કારણ કે Z-રેખાઓ વચ્ચેનું અંતર ઘટવું એ સંકોચનનું અંતિમ પરિણામ છે, પહેલા પગલું નથી.", "ncert_ref": "Class XI - પ્રકરણ 20: ગતિ અને સ્નાયુઓ", "difficulty": "Hard", "num": 25}, {"question": "સ્નાયુના સંકોચન દરમિયાન, જો ટ્રોપોમાયોસિન અણુને આનુવંશિક રીતે બદલવામાં આવે કે તે ઉચ્ચ Ca2+ સાંદ્રતામાં પણ તેની જગ્યા બદલી ન શકે, તો નીચેનામાંથી કયું સૌથી વધુ શક્ય છે?", "options": ["A) માયોસિનના મસ્તકો હજુ પણ એક્ટિન સાથે જોડાઈ શકશે, પરંતુ પાવર સ્ટ્રોક નબળો પડશે.", "B) ક્રોસ-બ્રિજ ચક્ર એક્ટિન બાઇન્ડિંગ સાઇટ્સ અવરોધિત હોવાથી શરૂ થઈ શકશે નહીં.", "C) સાર્કોપ્લાઝમિક રેટિક્યુલમ દોષની ભરપાઈ માટે વધારાનું Ca2+ મુક્ત કરશે.", "D) Z-રેખાઓ નજીક આવશે, પરંતુ કોઈ તણાવ ઉત્પન્ન થશે નહીં."], "correct": 1, "explanation": "સરળ જવાબ B છે. સામાન્ય રીતે, જ્યારે Ca2+ ટ્રોપોનિન સાથે જોડાય છે, ત્યારે ટ્રોપોમાયોસિન એક્ટિન બાઇન્ડિંગ સાઇટ્સને ઉઘાડી દે છે. જો ટ્રોપોમાયોસિન તેની જગ્યા બદલી ન શકે, તો માયોસિનના મસ્તકો એક્ટિન સાથે જોડાઈ ન શકે અને ક્રોસ-બ્રિજ ચક્ર શરૂ થઈ ન શકે. A ખોટું છે કારણ કે જો બાઇન્ડિંગ સાઇટ્સ અવરોધિત હોય, તો માયોસિન એક્ટિન સાથે જોડાઈ જ ન શકે. C ખોટું છે કારણ કે સાર્કોપ્લાઝમિક રેટિક્યુલમનું Ca2+ મુક્ત કરવું ટ્રોપોમાયોસિનના દોષની ભરપાઈ કરવાનો મેકેનિઝમ નથી. D ખોટું છે કારણ કે જો ક્રોસ-બ્રિજ બનતા નથી, તો Z         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
