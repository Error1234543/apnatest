<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">

    <title>નીટ ક્વિઝ - સામાન્ય વિકારો – Arthritis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>

        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 સામાન્ય વિકારો – Arthritis</span>

        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "ગાઉટ રોગમાં યુરિક એસિડના સ્તરમાં વધારો થવાનું મુખ્ય કારણ કયું છે?", "options": ["A) પ્યુરિન ચયાપચયમાં ઉત્સેચક એડિનોસિન ડીએમિનેઝની કમી", "B) પ્યુરિન ચયાપચયમાં ઉત્સેચક ઝાન્થિન ઓક્સિડેઝની કમી", "C) પિરિમિડિન ચયાપચયમાં ઉત્સેચક યુરિકેઝની અછત", "D) કિડની દ્વારા યુરિક એસિડના ઉત્સર્જનમાં ઘટાડો"], "correct": 1, "explanation": "ગાઉટ રોગમાં યુરિક એસિડના સ્તરમાં વધારો થવાનું મુખ્ય કારણ પ્યુરિન ચયાપચયમાં ઉત્સેચક ઝાન્થિન ઓક્સિડેઝની કમી છે, જેથી હાઇપોક્સાન્થિન, ઝાન્થિન વગેરે પ્યુરિન બેઇઝનો યુરિક એસિડમાં રૂપાંતર થતો નથી. ઓપશન A ખોટું છે કારણ કે એડિનોસિન ડીએમિનેઝની કમી સીધી રીતે યુરિક એસિડના સ્તરને અસર કરતી નથી. ઓપશન C ખોટું છે કારણ કે પિરિમિડિન ચયાપચય યુરિક એસિડ સાથે સીધો સંબંધ ધરાવતો નથી. ઓપશન D આંશિક સત્ય હોઈ શકે પરંતુ મુખ્ય કારણ ઝાન્થિન ઓક્સિડેઝની કમી છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 1}, {"question": "ઓસ્ટિયોપોરોસિસમાં હાડકાંની કમજોરીનું મુખ્ય કારણ કયું છે?", "options": ["A) કેલ્શિયમ અને વિટામિન Dની અછત", "B) કોલેજનના ઉત્પાદનમાં ઘટાડો", "C) ઓસ્ટિયોબ્લાસ્ટની ક્રિયાશીલતામાં ઘટાડો અને ઓસ્ટિયોક્લાસ્ટની ક્રિયાશીલતામાં વધારો", "D) હાડકાંમાં રક્ત પરિભ્રમણમાં ઘટાડો"], "correct": 2, "explanation": "ઓસ્ટિયોપોરોસિસમાં હાડકાંની કમજોરીનું મુખ્ય કારણ ઓસ્ટિયોબ્લાસ્ટ (હાડકાં બનાવનારા કોષો)ની ક્રિયાશીલતામાં ઘટાડો અને ઓસ્ટિયોક્લાસ્ટ (હાડકાં તોડનારા કોષો)ની ક્રિયાશીલતામાં વધારો છે, જેથી હાડકાંનું નવીકરણ સંતુલિત રહેતું નથી. ઓપશન A અને B આંશિક કારણો હોઈ શકે પરંતુ મુખ્ય કારણ ઓસ્ટિયોબ્લાસ્ટ અને ઓસ્ટિયોક્લાસ્ટની અસંતુલન છે. ઓપશન D સીધો સંબંધ ધરાવતું નથી.", "ncert_ref": "Class XI - Chapter 7: કંકાલ તંત્ર", "difficulty": "Hard", "num": 2}, {"question": "માયસ્થેનિયા ગ્રેવિસમાં સ્નાયુઓની નબળાઈનું કારણ કયું છે?", "options": ["A) મોટર ન્યુરોનમાં કેલ્શિયમ આયનની કમી", "B) ન્યુરોમસ્ક્યુલર જંકશન પર એસિટાઇલકોલિન રિસેપ્ટર વિરુદ્ધ એન્ટિબોડીનું ઉત્પાદન", "C) સ્નાયુ કોષોમાં માઇટોકોન્ડ્રિયાની કમી", "D) સ્નાયુ કોષોમાં એટીપીની અછત"], "correct": 1, "explanation": "માયસ્થેનિયા ગ્રેવિસ એક ઓટોઇમ્યુન રોગ છે જેમાં પ્ર nation": "સાચો જવાબ D છે કારણ કે રૂમેટોઇડ આર્થરાઇટિસમાં યુરિક એસિડના ક્રિસ્ટલ્સ જમા થતા નથી. યુરિક એસિડના ક્રિસ્ટલ્સ ગાઉટ રોગમાં જોવા મળે છે. વિકલ્પ A, B અને C રૂમેટોઇડ આર્થરાઇટિસના લક્ષણો અને પેથોફિઝિયોલોજી સાથે સુસંગત છે. રૂમેટોઇડ આર્થરાઇટિસમાં સાયનોવિયલ પેશીની હાઇપરપ્લાસિયા (પેન્નસ) થાય છે, TNF-α અને IL-1 સાયટોકાઇન્સ જોડના નુકસાન માટે જવાબદાર છે, અને આ રોગમાં હાડકાંની ઘનતા ઘટી શકે છે (ઓસ્ટિયોપોરોસિસ).", "ncert_ref": "ક્લાસ XII - અધ્યાય 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 34}, {"question": "માયસ્થેનિયા ગ્રેવિસ અને લેમ્બર્ટ-ઇટન માયસ્થેનિક સિન્ડ્રોમ (LEMS) બંને ઓટોઇમ્યુન રોગો છે જે સ્નાયુઓની નબળાઈ સાથે સંબંધિત છે. નીચેનામાંથી કયું વિધાન આ બંને રોગો વચ્ચેનો મુખ્ય તફાવત દર્શાવે છે?", "options": ["A) માયસ્થેનિયા ગ્રેવિસમાં એસિટાઇલકોલિન રિસેપ્ટર્સ વિરુદ્ધ એન્ટિબોડીઝ ઉત્પન્ન થાય છે, જ્યારે LEMSમાં પ્રીસિનેપ્ટિક કેલ્શિયમ ચેનલ્સ વિરુદ્ધ એન્ટિબોડીઝ ઉત્પન્ન થાય છે.", "B) માયસ્થેનિયા ગ્રેવિસમાં પ્રીસિનેપ્ટિક કેલ્શિયમ ચેનલ્સ વિરુદ્ધ એન્ટિબોડીઝ ઉત્પન્ન થાય છે, જ્યારે LEMSમાં એસિટાઇલકોલિન રિસેપ્ટર્સ વિરુદ્ધ એન્ટિબોડીઝ ઉત્પન્ન થાય છે.", "C) માયસ્થેનિયા ગ્રેવિસમાં સ્નાયુઓની નબળાઈ સતત રહે છે, જ્યારે LEMSમાં સ્નાયુઓની નબળાઈ શારીરિક પ્રવૃત્તિ સાથે સુધરે છે.", "D) માયસ્થેનિયા ગ્રેવિસ અને LEMS બંનેમાં એસિટાઇલકોલિન રિસેપ્ટર્સ વિરુદ્ધ એન્ટિબોડીઝ ઉત્પન્ન થાય છે, પરંતુ LEMSમાં યુરિક એસિડના ક્રિસ્ટલ્સ પણ જોડમાં જમા થાય છે."], "correct": 0, "explanation": "સાચો જવાબ A છે કારણ કે માયસ્થેનિયા ગ્રેવિસમાં એસિટાઇલકોલિન રિસેપ્ટર્સ વિરુદ્ધ એન્ટિબોડીઝ ઉત્પન્ન થાય છે, જે પોસ્ટસિનેપ્ટિક ન્યુરોમસ્ક્યુલર જંક્શનને અસર કરે છે. LEMSમાં પ્રીસિનેપ્ટિક કેલ્શિયમ ચેનલ્સ વિરુદ્ધ એન્ટિબોડીઝ ઉત્પન્ન થાય છે, જે એસિટાઇલકોલિનના પ્રકાશનને અવરોધે છે. વિકલ્પ C પણ સાચો છે પરંતુ પ્રશ્નનો મુખ્ય તફાવત પૂછે છે, જે વિકલ્પ A દ્વારા વધુ સ્પષ્ટ રીતે દર્શાવવામાં આવ્યો છે. વિકલ્પ B અને D ખોટા છે કારણ કે તેઓ બંને રોગોના પેથોફિઝિયોલોજીને ખોટી રીતે દર્શાવે છે.", "ncert_ref": "ક્લાસ XII - અધ્યાય 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 35}, {"question": "રૂમેટોઇડ આર્થરાઇટિસના દર્દીમાં, જોડના નુકસાનને રોકવા માટે નીચેનામાંથી કયો પદાર્થ સૌથી અસરકારક રીતે કામ કરે છે?", "options": ["A) ટીએનએફ-અલ્ફા (TNF-α)", "B) ઇન્ટરલ્યુકિન-1 (IL-1)", "C) મેથોટ્રેક્સેટ", "D) કોર્ટિકોસ્ટેરોઇડ્સ"], "correct": 2, "explanation": "રૂમેટોઇડ આર્થરાઇટિસમાં, મેથોટ્રેક્સેટ એક ડીએમએઆરડી (DMARD) દવા છે જે જોડના નુકસાનને રોકવામાં અને રોગની પ્રગતિને ધીમી પાડવામાં સૌથી અસરકારક છે. ટીએનએફ-અલ્ફા અને ઇન્ટરલ્યુકિન-1 સાયટોકાઇન્સ છે જે સોજો અને નુકસાનનું કારણ બને છે, જ્યારે કોર્ટિકોસ્ટેરોઇડ્સ સોજો ઘટાડવામાં મદદ કરે છે પરંતુ જોડના નુકસાનને રોકવામાં લાંબા ગાળે અસરકારક નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 36}, {"question": "ગાઉટ રોગના દર્દીમાં, યુરિક એસિડના ક્રિસ્ટલ્સ સિવાય, જોડમાં કયા પદાર્થનો સાંદ્રતા વધવાને કારણે પીડા અને સોજો વધી શકે છે, જે પ્યુરિન ચયાપચય સાથે સીધો સંબંધ ધરાવે છે?", "options": ["A) કેલ્શિયમ પાયરોફોસ્ફેટ", "B) સોડિયમ મોનોયુરેટ", "C) કોલેસ્ટરોલ", "D) ગ્લુકોઝ"], "correct": 1, "explanation": "ગાઉટ રોગમાં યુરિક એસિડના ક્રિસ્ટલ્સ (સોડિયમ મોનોયુરેટ) જોડમાં જમા થાય છે, જે પ્યુરિન ચયાપચયની ખામીને કારણે થાય છે. સોડિયમ મોનોયુરેટ એ યુરિક એસિડનું સ્વરૂપ છે, જે પીડા અને સોજાનું મુખ્ય કારણ છે. કેલ્શિયમ પાયરોફોસ્ફેટ (A) સ્યુડોગાઉટ સાથે સંબંધિત છે, કોલેસ્ટરોલ (C) અને ગ્લુકોઝ (D) પ્યુરિન ચયાપચય સાથે સંબંધિત નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 37}, {"question": "એક ૬૫ વર્ષીય સ્ત્રી દર્દીને છેલ્લા એક વર્ષથી હાથ અને પગની નાની જોડમાં સવારના સમયે કડકપણ, સોજો અને પીડા રહે છે. લેબોરેટરી તપાસમાં, રૂમેટોઇડ ફેક્ટર (RF) પોઝિટિવ અને એન્ટી-સીસીપી એન્ટિબોડીઝ ઉચ્ચ સ્તરે જોવા મળે છે. આ દર્દીમાં નીચેનામાંથી કયો સાયટોકાઇન જોડના કોષોની સક્રિયતા અને હાડકાંના નુકસાનમાં મુખ્ય ભૂમિકા ભજવે છે?", "options": ["A) ઇન્ટરલ્યુકિન-1 (IL-1)", "B) ઇન્ટરલ્યુકિન-6 (IL-6)", "C) ટ્યુમર નેક્રોસિસ ફેક્ટર-આલ્ફા (TNF-α)", "D) ઇન્ટરફેરોન-ગામા (IFN-γ)"], "correct": 2, "explanation": "રૂમેટોઇડ આર્થરાઇટિસમાં, ટ્યુમર નેક્રોસિસ ફેક્ટર-આલ્ફા (TNF-α) જોડના કોષોની સક્રિયતા અને હાડકાંના નુકસાનમાં મુખ્ય ભૂમિકા ભજવે છે. TNF-α સોજો, જોડના કોષોની વૃદ્ધિ અને હાડકાંના નુકસાનને પ્રેરે છે. IL-1 અને IL-6 પણ સોજામાં ભાગ લે છે, પરંતુ TNF-α સૌથી મહત્વપૂર્ણ છે. IFN-γ મુખ્યત્વે વાયરલ ઇન્ફેક્શન વિરુદ્ધ પ્રતિક્રિયામાં સામેલ હોય છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 38}, {"question": "એક ૬૫ વર્ષીય પુરુષ દર્દીમાં અચાનક પગના અંગૂઠાના જોડમાં તીવ્ર પીડા, લાલાશ અને સોજો જોવા મળે છે. દર્દીના રક્ત પરીક્ષણમાં યુરિક એસિડનું સ્તર ૧૨ mg/dL જોવા મળે છે. આ દર્દીને નીચેનામાંથી કયો રોગ સૌથી વધુ સંભવિત છે, જ્યારે તેના રક્તમાં કેલ્શિયમ અને ફોસ્ફેટનું સ્તર સામાન્ય જોવા મળે છે?", "options": ["A) રૂમેટોઇડ આર્થરાઇટિસ, કારણ કે તે ઓટોઇમ્યુન રોગ છે અને જોડમાં સોજો થાય છે.", "B) ઓસ્ટિયોપોરોસિસ, કારણ કે હાડકાંની કમજોરીને કારણે જોડમાં પીડા થાય છે.", "C) ગાઉટ, કારણ કે યુરિક એસિડના ઉચ્ચ સ્તરને કારણે જોડમાં ક્રિસ્ટલ્સ જમા થાય છે.", "D) માયસ્થેનિયા ગ્રેવિસ, કારણ કે સ્નાયુઓની નબળાઈને કારણે જોડમાં પીડા થાય છે."], "correct": 2, "explanation": "ગાઉટ રોગમાં યુરિક એસિડના ઉચ્ચ સ્તરને કારણે જોડમાં ક્રિસ્ટલ્સ જમા થાય છે, જે તીવ્ર પીડા, લાલાશ અને સોજો તરફ દોરી જાય છે. રક્તમાં યુરિક એસિડનું સ્તર ૧૨ mg/dL (સામાન્ય સ્તર ૩.૪-૭.૦ mg/dL) ગાઉટના લક્ષણો સાથે સંકળાયેલું છે. રૂમેટોઇડ આર્થરાઇટિસ ઓટોઇમ્યુન રોગ છે, પરંતુ તે યુરિક એસિડના સ્તર સાથે સંબંધિત નથી. ઓસ્ટિયોપોરોસિસ હાડકાંની કમજોરી સાથે સંબંધિત છે, પરંતુ તે જોડમાં તીવ્ર પીડા તરફ દોરી જતું નથી. માયસ્થેનિયા ગ્રેવિસ સ્નાયુઓની નબળાઈ સાથે સંબંધિત છે, જોડમાં પીડા નહીં.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 39}, {"question": "એક ૫૮ વર્ષીય પુરુષ દર્દીને છેલ્લા બે વર્ષથી હાથ અને પગની નાની જોડોમાં સોજો અને દુખાવો રહે છે. રક્ત પરીક્ષણમાં રૂમેટોઇડ ફેક્ટર (RF) પોઝિટિવ અને એન્ટિ-સાયટ્રુલિનેટેડ પ્રોટીન એન્ટિબોડી (anti-CCP) પણ પોઝિટિવ જોવા મળે છે. આ દર્દીમાં નીચેનામાંથી કયું પરિવર્તન જોડના કોષોમાં સૌથી વધુ સંભવિત છે, જે રોગની પ્રગતિ માટે જવાબદાર છે?", "options": ["A) સાયનોવિયલ પેશીમાં CD4+ T-કોષોની સક્રિયતા અને TNF-α, IL-1, IL-6 જેવા પ્રો-ઇન્ફ્લેમેટરી સાયટોકાઇન્સનું વધુ ઉત્પાદન", "B) સાયનોવિયલ પેશીમા             const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
