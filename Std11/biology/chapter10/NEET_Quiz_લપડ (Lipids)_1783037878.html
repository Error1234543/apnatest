<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - લિપિડ (Lipids)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 લિપિડ (Lipids)</span>
                <span>🎯 Hard</span>
                <span>📝 79 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "લિપિડના સંરચનાથી સંબંધિત નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) ફોસ્ફોલિપિડમાં ગ્લિસરોલ, બે ફેટી એસિડ અને એક ફોસ્ફેટ જૂથ હોય છે, જેમાં ફોસ્ફેટ જૂથ હાઇડ્રોફિલિક હોય છે.", "B) સ્ફિંગોમાયલિન એક ગ્લાયકોલિપિડ છે જે સ્ફિંગોસિન, ફેટી એસિડ અને ગ્લુકોઝ ધરાવે છે.", "C) ટ્રાયગ્લિસરાઇડમાં ત્રણ ફેટી એસિડ અને એક ગ્લિસરોલ હોય છે, જેમાં બધા ફેટી એસિડ સંપૃક્ત હોય છે.", "D) કોલેસ્ટરોલ એક એસેન્શિયલ ફેટી એસિડ છે જે માનવ શરીરમાં સિંથેસ થતું નથી."], "correct": 0, "explanation": "ફોસ્ફોલિપિડની રચના ગ્લિસરોલ, બે ફેટી એસિડ અને એક ફોસ્ફેટ જૂથની હોય છે, જેમાં ફોસ્ફેટ જૂથ હાઇડ્રોફિલિક (પાણી પ્રેમી) અને ફેટી એસિડના શૃંખ હાઇડ્રોફોબિક (પાણી દ્વેષી) હોય છે. સ્ફિંગોમાયલિન એક સ્ફિંગોલિપિડ છે, ગ્લાયકોલિપિડ નહીં. ટ્રાયગ્લિસરાઇડમાં ફેટી એસિડ સંપૃક્ત અથવા અસંપૃક્ત હોઈ શકે. કોલેસ્ટરોલ એક સ્ટીરોઇડ છે, એસેન્શિયલ ફેટી એસિડ નહીં.", "ncert_ref": "Class XI - પ્રકરણ 9: જૈવ અણુઓ અને જીવન", "difficulty": "Hard", "num": 1}, {"question": "લિપિડના કાર્ય વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) લિપિડ ઉર્જાના સંગ્રહ અને પૂરવઠા માટે મહત્વપૂર્ણ છે.", "B) ફોસ્ફોલિપિડ કોષપટલની રચનામાં મુખ્ય ભૂમિકા ભજવે છે.", "C) કોલેસ્ટરોલ હોર્મોનના સિંથેસિસમાં ઉપયોગી નથી.", "D) લિપિડ તાપમાનના નિયમનમાં અને અંગોની સુરક્ષામાં મદદ કરે છે."], "correct": 2, "explanation": "કોલેસ્ટરોલ સ્ટીરોઇડ હોર્મોન (જેમ કે ટેસ્ટોસ્ટેરોન, એસ્ટ્રોજન)ના સિંથેસિસમાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે. લિપિડ ઉર્જાના સંગ્રહ, કોષપટલની રચના, તાપમાન નિયમન અને અંગોની સુરક્ષામાં મહત્વપૂર્ણ છે.", "ncert_ref": "Class XI - પ્રકરણ 9: જૈવ અણુઓ અને જીવન", "difficulty": "Hard", "num": 2}, {"question": "નીચેનામાંથી કયું લિપિડનું ઉદાહરણ નથી?", "options": ["A) ટ્રાયગ્લિસરાઇડ", "B) ફોસ્ફોલિપિડ", "C) ગ્લાયકોજન", "D) સ્ફિંગોલિપિડ"], "correct": 2, "explanation": "ગ્લાયકોજન એક પોલીસેકેરાઇડ (કાર્બોદિત) છે, લિપિડ નહીં. ટ્રાયગ્લિસરાઇડ, ફોસ્ફોલિપિડ અને સ્ફિંગોલિપિડ બધા લિપિડના પ્રકાર છે.", "ncert_ref": "Class XI - પ્રકરણ 9: જૈવ અણુઓ અને જીવન", "difficulty": "Hard", "num": 3}, {"question": "લિપિડના વર્ગીકરણ વિશે નીચેનામાંથી કયુ n": "નીચેનામાંથી કયું લિપિડ, કોષના પટલમાં સ્થિતિ અને તાપમાનના ફેરફારને અનુકૂળ બનાવવા માટે સૌથી અસરકારક છે?", "options": ["A) ફોસ્ફોલિપિડ", "B) કોલેસ્ટરોલ", "C) ટ્રાયગ્લિસરાઇડ", "D) સ્ફિંગોલિપિડ"], "correct": 1, "explanation": "કોલેસ્ટરોલ કોષપટલમાં સ્થિતિ અને તાપમાનના ફેરફારને અનુકૂળ બનાવે છે કારણ કે તે પટલની દ્રવ્યતા (fluidity) નિયંત્રિત કરે છે. ફોસ્ફોલિપિડ પટલનો મુખ્ય ઘટક છે પરંતુ તાપમાનના ફેરફારને અનુકૂળ બનાવવામાં કોલેસ્ટરોલ જેટલું અસરકારક નથી. ટ્રાયગ્લિસરાઇડ ઉર્જા સંગ્રહ માટે વપરાય છે અને પટલમાં હાજર નથી. સ્ફિંગોલિપિડ પટલમાં હાજર છે પરંતુ તેનો મુખ્ય કાર્ય સેલ સિગ્નલિંગ છે, તાપમાન નિયંત્રણ નહીં.", "ncert_ref": "Class XI - પ્રકરણ ૯: જૈવ અણુઓ અને કોષીય રચના", "difficulty": "Hard", "num": 11}, {"question": "જો એક લિપિડમાં ફોસ્ફેટ સમૂહ અને ગ્લિસરોલ હોય, પરંતુ કોઈ ફેટી એસિડ ન હોય, તો તે કયા પ્રકારનું લિપિડ હશે?", "options": ["A) ફોસ્ફોલિપિડ", "B) ગ્લાઇકોલિપિડ", "C) સ્ફિંગોસાઇન", "D) ફોસ્ફેટિડિક એસિડ"], "correct": 3, "explanation": "ફોસ્ફેટિડિક એસિડ એ એકમાત્ર લિપિડ છે જે ફોસ્ફેટ સમૂહ અને ગ્લિસરોલ ધરાવે છે પરંતુ ફેટી એસિડ ધરાવતું નથી. ફોસ્ફોલિપિડમાં ફોસ્ફેટ સમૂહ, ગ્લિસરોલ, અને ફેટી એસિડ હોય છે. ગ્લાઇકોલિપિડમાં કાર્બોદિત સમૂહ હોય છે, અને સ્ફિંગોસાઇન એ સ્ફિંગોલિપિડનો એક પ્રકાર છે જે સ્ફિંગોસાઇન બેઝ ધરાવે છે.", "ncert_ref": "Class XI - પ્રકરણ ૯: જૈવ અણુઓ અને કોષીય રચના", "difficulty": "Hard", "num": 12}, {"question": "નીચેનામાંથી કયું લિપિડ, મનુષ્યમાં હોર્મોન તરીકે કામ કરતું નથી?", "options": ["A) કોર્ટિઝોલ", "B) એલ્ડોસ્ટેરોન", "C) લેપ્ટિન", "D) ટેસ્ટોસ્ટેરોન"], "correct": 2, "explanation": "લેપ્ટિન એક પ્રોટીન હોર્મોન છે, લિપિડ નહીં. કોર્ટિઝોલ, એલ્ડોસ્ટેરોન, અને ટેસ્ટોસ્ટેરોન સ્ટીરોઇડ હોર્મોન છે જે લિપિડથી બનેલા છે.", "ncert_ref": "Class XI - પ્રકરણ ૨૨: રસાયણિક નિયંત્રણ અને એકીકરણ", "difficulty": "Hard", "num": 13}, {"question": "નીચેનામાંથી કયું વિધાન લિપિડના પાચન વિશે ખોટું છે?", "options": ["A) લિપેઝ ઉત્સેચક ફેટી એસિડ અને ગ્લિસરોલમાં વિઘટન કરે છે", "B) પિત્ત રસ લિપિડને એમલ્સિફાય કરે છે", "C) લિપિડનું પાચન મુખ્યત્વે જઠરમાં થાય છે", "D) લિપિડનું પાચન અંતિમ રૂપે લઘુ આંતરડામાં પૂર્ણ થાય છે"], "correct": 2, "explanation": "લિપિડનું પાચન મુખ્યત્વે લઘુ આંતરડામાં થાય છે, જઠરમાં નહીં. લિપેઝ ઉત્સેચક લિપિડને ફેટી એસિડ અને ગ્લિસરોલમાં વિઘટન કરે છે, પિત્ત રસ એમલ્સિફિકેશન માટે જવાબદાર છે, અને અંતિમ પાચન લઘુ આંતરડામાં થાય છે.", "ncert_ref": "Class XI - પ્રકરણ ૧૬: પાચન અને શોષણ", "difficulty": "Hard", "num": 14}, {"question": "નીચેનામાંથી કયું લિપિડ, કોષની પ્લાઝ્મા પટલમાં સૌથી ઓછી માત્રામાં જોવા મળે છે?", "options": ["A) ફોસ્ફોલિપિડ", "B) કોલેસ્ટરોલ", "C) ટ્રાયગ્લિસરાઇડ", "D) સ્ફિંગોલિપિડ"], "correct": 2, "explanation": "ટ્રાયગ્લિસરાઇડ કોષની પ્લાઝ્મા પટલમાં સૌથી ઓછી માત્રામાં જોવા મળે છે કારણ કે તે મુખ્યત્વે ઉર્જા સંગ્રહ માટે વપરાય છે. ફોસ્ફોલિપિડ, કોલેસ્ટરોલ, અને સ્ફિંગોલિપિડ પટલના મુખ્ય ઘટકો છે.", "ncert_ref": "Class XI - પ્રકરણ ૯: જૈવ અણુઓ અને કોષીય રચના", "difficulty": "Hard", "num": 15}, {"question": "નીચેનામાંથી કયું લિપિડ, મનુષ્યમાં સ્ટીરોઇડ હોર્મોનના સંશ્લેષણ માટે આધારભૂત કાચો પદાર્થ તરીકે કામ કરે છે?", "options": ["A) કોલેસ્ટરોલ", "B) ફોસ્ફોલિપિડ", "C) ટ્રાયગ્લિસરાઇડ", "D) સ્ફિંગોલિપિડ"], "correct": 0, "explanation": "કોલેસ્ટરોલ (A) સ્ટીરોઇડ હોર્મોનના સંશ્લેષણ માટે આધારભૂત કાચો પદાર્થ છે, કારણ કે સ્ટીરોઇડ હોર્મોન (જેમ કે કોર્ટિઝોલ, ટેસ્ટોસ્ટેરોન) કોલેસ્ટરોલથી બનાવવામાં આવે છે. ફોસ્ફોલિપિડ (B) પટલના ઘટક તરીકે કામ કરે છે, ટ્રાયગ્લિસરાઇડ (C) ઉર્જા સંગ્રહ માટે વપરાય છે, અને સ્ફિંગોલિપિડ (D) ન્યુરોનના પટલમાં જોવા મળે છે.", "ncert_ref": "Class XII - Chapter 10: જૈવ અણુઓ અને બાયોપોલિમર", "difficulty": "Hard", "num": 16}, {"question": "જો એક લિપિડમાં ગ્લિસરોલ, ફેટી એસિડ, અને ફોસ્ફેટ સમૂહ હોય, પરંતુ કોઈ નાઇટ્રોજન ન હોય, તો તે કયા પ્રકારનું લિપિડ હશે?", "options": ["A) ફોસ્ફટિડિક એસિડ", "B) ફોસ્ફેટિડાઇલકોલિન", "C) સ્ફિંગોમાયેલિન", "D) કાર્ડિયોલિપિન"], "correct": 0, "explanation": "ફોસ્ફટિડિક એસિડ (A)માં ગ્લિસરોલ, ફેટી એસિડ, અને ફોસ્ફેટ સમૂહ હોય છે, પરંતુ નાઇટ્રોજન નથી. ફોસ્ફેટિડાઇલકોલિન (B)માં કોલિન (નાઇટ્રોજન યુક્ત) હોય છે, સ્ફિંગોમાયેલિન (C) સ્ફિંગોસિન પર આધારિત છે અને નાઇટ્રોજન ધરાવે છે, અને કાર્ડિયોલિપિન (D)માં પણ નાઇટ્રોજન હોય છે.", "ncert_ref  "explanation": "સાચો જવાબ વિકલ્પ D છે. આ લિપિડ સ્ફિંગોમાયેલિન છે, જે સ્ફિંગોસિન આધાર ધરાવે છે અને ફોસ્ફોકોલાઇન સમૂહ સાથે જોડાયેલ હોય છે. NCERT (Class XI - Chapter 9: Biomolecules) મુજબ, સ્ફિંગોમાયેલિન લિપિડ રાફ્ટ્સના નિર્માણમાં મુખ્ય ભૂમિકા ભજવે છે, જે કોષપટલના વિશિષ્ટ વિસ્તારો છે જ્યાં સિગ્નલિંગ પ્રોટીન અને રીસેપ્ટર્સ એકત્રિત થાય છે. આ રાફ્ટ્સ સિગ્નલ ટ્રાન્સડક્શન અને પ્રોટીન સોર્ટિંગ માટે મહત્વપૂર્ણ પ્લેટફોર્મ પૂરું પાડે છે. વિકલ્પ A ખોટો છે કારણ કે સ્ફિંગોમાયેલિન કોષપટલને યાંત્રિક સ્થિરતા આપવા માટે જાણીતું નથી. વિકલ્પ B ખોટો છે કારણ કે સ્ફિંગોમાયેલિન કોષપટલની પ્રવાહિતા ઘટાડતું નથી, પરંતુ લિપિડ રાફ્ટ્સના નિર્માણમાં મદદ કરે છે. વિકલ્પ C ખોટો છે કારણ કે સ્ફિંગોમાયેલિન સીધું સિગ્નલ ટ્રાન્સડક્શન માટે રીસેપ્ટર પ્રોટીન સાથે જોડાતું નથી, પરંતુ લિપિડ રાફ્ટ્સના માધ્યમથી આ પ્રક્રિયામાં મદદ કરે છે.", "ncert_ref": "Class XI - અધ્યાય 9: જૈવ અણુઓ", "difficulty": "Hard", "num": 50}, {"question": "નીચેનામાંથી કયું લિપિડ મનુષ્યમાં વિટામિન-Eના પરિવહન અને સંગ્રહમાં મુખ્ય ભૂમિકા ભજવે છે, પરંતુ તે પોતે વિટામિન નથી?", "options": ["A) કોલેસ્ટરોલ", "B) લેસિથિન", "C) ટોકોફેરોલ-બાઇન્ડિંગ પ્રોટીન", "D) લિપોપ્રોટીન"], "correct": 3, "explanation": "વિટામિન-E (ટોકોફેરોલ)નું પરિવહન અને સંગ્રહ ટોકોફેરોલ-બાઇન્ડિંગ પ્રોટીન દ્વારા થાય છે, જે એક લિપિડ-બાઇન્ડિંગ પ્રોટીન છે. કોલેસ્ટરોલ અને લેસિથિન લિપિડ છે પરંતુ વિટામિન-Eના પરિવહનમાં સીધી ભૂમિકા ભજવતા નથી. લિપોપ્રોટીન વિવિધ લિપિડનું પરિવહન કરે છે, પરંતુ વિટામિન-E માટે વિશિષ્ટ નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 9: બાયોમોલેક્યુલ્સ", "difficulty": "Hard", "num": 51}, {"question": "નીચેનામાંથી કયું લિપિડ મનુષ્યમાં કોષપટલની પ્રવાહિતા જાળવવામાં મદદ કરવા ઉપરાંત, વિટામિન-Kના સંશ્લેષણ માટે જરૂરી છે, પરંતુ તે પોતે વિટામિન નથી?", "options": ["A) ફોસ્ફેટિડિલકોલાઇન", "B) કોલેસ્ટરોલ", "C) મેનાક્વિનોન", "D) સ્ફિંગોમાયેલિન"], "correct": 1, "explanation": "કોલેસ્ટરોલ કોષપટલની પ્રવાહિતા જાળવવામાં મદદ કરે છે અને વિટામિન-Kના સંશ્લેષણ માટે જરૂરી છે. ફોસ્ફેટિડિલકોલાઇન અને સ્ફિંગોમાયેલિન કોષપટલના ઘટકો છે, પરંતુ વિટામિન-Kના સંશ્લેષણમાં ભૂમિકા ભજવતા નથી. મેનાક્વિનોન વિટામિન-Kનું એક સ્વરૂપ છે, તેથી તે પોતે વિટામિન છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 9: બાયોમોલેક્યુલ્સ", "difficulty": "Hard", "num": 52}, {"question": "એક સંશોધકે એક લિપિડનું વિશ્લેષણ કર્યું જેમાં સ્ફિંગોસિન, એક ફેટી એસિડ, ફોસ્ફેટ સમૂહ અને કોલીન હોય. આ લિપિડની ઓળખ અને તેનું મુખ્ય કાર્ય કયું હશે?", "options": ["A) સ્ફિંગોમાયેલિન – ન્યુરોનના આક્સોનમાં માયેલિન શીથનું નિર્માણ કરે છે", "B) ફોસ્ફેટિડિલકોલીન – કોષપટલની સંરચના અને પ્રવેશ્યતા જાળવે છે", "C) સ્ફિંગોફોસ્ફોલિપિડ – સિગ્નલ ટ્રાન્સડક્શનમાં ભાગ લે છે", "D) ગ્લાયકોલિપિડ – કોષ ઓળખ અને કોષીય સંકેતો માટે જવાબદાર છે"], "correct": 0, "explanation": "સ્ફિંગોસિન, ફેટી એસિડ, ફોસ્ફેટ સમૂહ અને કોલીન ધરાવતું લિપિડ સ્ફિંગોફોસ્ફોલિપિડ છે, પરંતુ વિકલ્પ Cમાં ઉલ્લેખિત સ્ફિંગોફોસ્ફોલિપિડ સામાન્ય રીતે સિગ્નલ ટ્રાન્સડક્શનમાં ભાગ લે છે. જોકે, સ્ફિંગોમાયેલિન (વિકલ્પ A) સ્ફિંગોસિન અને ફેટી એસિડ ધરાવે છે, પરંતુ કોલીન નહીં. તો પણ, સ્ફિંગોમાયેલિન ન્યુરોનના આક્સોનમાં માયેલિન શીથનું નિર્માણ કરે છે, જે આ પ્રશ્નના સંદર્ભમાં સૌથી યોગ્ય જવાબ છે. વિકલ્પ B (ફોસ્ફેટિડિલકોલીન) ગ્લિસરોલ આધારિત છે, નહીં સ્ફિંગોસિન. વિકલ્પ D (ગ્લાયકોલિપિડ)માં ફોસ્ફેટ સમૂહ નથી હોતો.", "ncert_ref": "Class XII - Chapter 9: જૈવ અણુઓ અને કોષીય ચયાપચય", "difficulty": "Hard", "num": 53}, {"question": "મનુષ્યમાં, કોલેસ્ટરોલના સંશ્લેષણ માટે આધારભૂત કાચો પદાર્થ કયો છે, અને આ પ્રક્રિયા ક્યાં થાય છે?", "options": ["A) એસિટિલ-CoA – સાયટોપ્લાઝમ", "B) ગ્લિસરોલ – એન્ડોપ્લાઝ્મિક રેટિક્યુલમ", "C) પાલ્મિટિક એસિડ – માઇટોકોન્ડ્રિયા", "D) સ્ટીઅરિક એસિડ – ગોલ્ગી કોમ્પ્લેક્સ"], "correct": 0, "explanation": "કોલેસ્ટરોલના સંશ્લેષણ માટે આધારભૂત કાચો પદાર્થ એસિટિલ-CoA છે, અને આ પ્રક્રિયા સાયટોપ્લાઝમમાં થાય છે. વિકલ્પ B ખોટો છે કારણ કે ગ્લિસરોલ કોલેસ્ટરોલના સંશ્લેષણમાં વપરાતો નથી. વિકલ્પ C ખોટો છે કારણ કે પાલ્મિટિક એસિડ ફેટી એસિડ છે, પરંતુ કોલેસ્ટરોલના સંશ્લેષણ માટે એસિટિલ-CoA જરૂરી છે. વિકલ્પ D ખોટો છે કારણ કે સ્ટીઅરિક એસિડ પણ ફેટી એસિડ છે અને ગોલ્ગી કોમ્પ્લેક્સમાં કોલેસ્ટરોલનું સંશ્લેષણ થતું નથી.", "ncert_ref": "Class XII - Chapter 9: જૈવ અણુઓ અને કોષીય ચયાપચય", "difficulty": "Hard", "num": 54}, {"question": "એક લિપિડમાં ગ્લિસરોલ, બે ફેટી એસિડ, એક ફોસ્ફેટ સમૂહ અને એક કોલાઇન અણુ હોય, તો આ લિપિડની જૈવિક ભૂમિકા અને તેની રચના વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) આ લિપિડ ફોસ્ફોલિપિડ છે અને કોષપટલની બહારની સ્તરમાં જોવા મળે છે, જ્યાં તે પાણી-પ્રત્યે આકર્ષણ ધરાવે છે.", "B) આ લિપિડ સ્ફિંગોલિપિડ છે અને મુખ્યત્વે ન્યુરોનના માયેલિન શીથમાં જોવા મળે છે, જ્યાં તે વિદ્યુત સંકેતના વહનને વેગ આપે છે.", "C) આ લિપિડ ગ્લાયકોલિપિડ છે અને કોષપટલની અંદરની સ્તરમાં જોવા મળે છે, જ્યાં તે કોષ ઓળખમાં મદદ કરે છે.", "D) આ લિપિડ પ્લાઝ્માલોજન છે અને મુખ્યત્વે હૃદયના સ્નાયુઓમાં જોવા મળે છે, જ્યાં તે ઉર્જા સંગ્રહમાં મદદ કરે છે."], "correct": 0, "explanation": "આ લિપિડ ફોસ્ફોલિપિડ છે, કારણ કે તે ગ્લિસરોલ, બે ફેટી એસિડ, એક ફોસ્ફેટ સમૂહ અને કોલાઇન ધરાવે છે. ફોસ્ફોલિપિડ કોષપટલની બહારની સ્તરમાં જોવા મળે છે, જ્યાં તેનું હાઇડ્રોફિલિક (પાણી-પ્રત્યે આકર્ષણ ધરાવતું) શિરોબિંદુ પાણી તરફ અને હાઇડ્રોફોબિક (પાણી-પ્રત્યે અપાકર્ષણ ધરાવતું) પૂંછડી અંદર તરફ ગોઠવાયેલું હોય છે. વિકલ્પ B ખોટો છે કારણ કે સ્ફિંગોલિપિડમાં સ્ફિંગોસિન આધાર હોય છે, ગ્લિસરોલ નહીં. વિકલ્પ C ખોટો છે કારણ કે ગ્લાયકોલિપિડમાં કાર્બોદિત સમૂહ હોય છે, ફોસ્ફેટ નહીં. વિકલ્પ D ખોટો છે કારણ કે પ્લાઝ્માલોજન એક વિશિષ્ટ પ્રકારનું ફોસ્ફોલિપિડ છે જે મુખ્યત્વે હૃદય અને સ્નાયુઓમાં જોવા મળે છે, પરંતુ તેની રચના અને કાર્ય આ પ્રશ્નમાં વર્ણવેલ લિપિડ સાથે મેળ ખાતું નથી.", "ncert_ref": "Class XI - Chapter 9: જૈવ અણુઓ અને જીવરાસાયણિક પ્રક્રિયાઓ", "difficulty": "Hard", "num": 55}, {"question": "એક લિપિડમાં ગ્લિસરોલ, એક ફેટી એસિડ, ફોસ્ફેટ સમૂહ અને સેરિન હોય છે. આ લિપિડની ઓળખ કયા પ્રકારના લિપિડ તરીકે થાય?", "options": ["A) ફોસ્ફોટાઇડિલકોલાઇન", "B) ફોસ્ફોટાઇડિલસેરિન", "C) ફોસ્ફોટાઇડિલઇનોસિટોલ", "D) કાર્ડિયોલિપિન"], "correct": 1, "explanation": "ગ્લિસરોલ, ફેટી એસિડ, ફોસ્ફેટ સમૂહ અને સેરિન ધરાવતું લિપિડ ફોસ્ફોટાઇડિલસેરિન કહેવાય છે. ફોસ્ફોટાઇડિલકોલાઇનમાં કોલાઇન હોય છે, ફોસ્ફોટાઇડિલઇનોસિટોલમાં ઇનોસિટોલ હોય છે, અને કાર્ડિયોલિપિનમાં બે ફોસ્ફેટ સમૂહ અને ચાર ફેટી એસિડ હોય છે.", "ncert_ref": "Class XII - Chapter 2: જૈવ અણુઓ અને તેના કાર્યો", "difficulty": "Har         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
