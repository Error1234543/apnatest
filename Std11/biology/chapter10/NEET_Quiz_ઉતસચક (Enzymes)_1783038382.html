<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - ઉત્સેચકો (Enzymes)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 ઉત્સેચકો (Enzymes)</span>
                <span>🎯 Hard</span>
                <span>📝 90 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "ઉત્સેચકની ક્રિયાશીલતા પર તાપમાનનું પ્રભાવ ધ્યાનમાં લેતા, નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) ઉત્સેચકની ક્રિયાશીલતા 0°C પર શૂન્ય હોય છે અને તાપમાન વધારતાં તે રેખીય રીતે વધે છે.", "B) ઉત્સેચકની ક્રિયાશીલતા એક ચોક્કસ તાપમાન (ઑપ્ટિમમ તાપમાન) પર મહત્તમ હોય છે અને ત્યારબાદ ઘટે છે.", "C) ઉત્સેચકની ક્રિયાશીલતા તાપમાન સાથે સદૈવ વધતી જાય છે.", "D) ઉત્સેચકની ક્રિયાશીલતા તાપમાન પર આધારિત નથી."], "correct": 1, "explanation": "ઉત્સેચકની ક્રિયાશીલતા એક ચોક્કસ તાપમાન (ઑપ્ટિમમ તાપમાન) પર મહત્તમ હોય છે, જ્યાં ઉત્સેચકની રચના અને કાર્ય સૌથી અસરકારક રીતે થાય છે. આ તાપમાનથી ઉપર અથવા નીચે ક્રિયાશીલતા ઘટે છે. વિકલ્પ A ખોટો છે કારણ કે 0°C પર ઉત્સેચકની ક્રિયાશીલતા શૂન્ય નથી, પરંતુ ખૂબ જ ઓછી હોય છે. વિકલ્પ C અને D ખોટા છે કારણ કે ઉત્સેચકની ક્રિયાશીલતા તાપમાન પર આધારિત હોય છે અને તે સદૈવ વધતી નથી.", "ncert_ref": "Class XII - Chapter 9: જૈવ-અણુઓ અને ઉત્સેચકો", "difficulty": "Hard", "num": 1}, {"question": "નીચેનામાંથી કયું ઉત્સેચક પ્રકાશસંશ્લેષણ દરમિયાન CO2 ને ફિક્સ કરવામાં મદદ કરે છે?", "options": ["A) રુબિસ્કો (RuBisCO)", "B) એટીપેઝ (ATPase)", "C) કેટલેઝ (Catalase)", "D) એમાઇલેઝ (Amylase)"], "correct": 0, "explanation": "રુબિસ્કો (RuBisCO) પ્રકાશસંશ્લેષણ દરમિયાન CO2 ને ફિક્સ કરવા માટે જવાબદાર ઉત્સેચક છે. એટીપેઝ ATP ના જળવિભાજનમાં મદદ કરે છે, કેટલેઝ હાઇડ્રોજન પેરોક્સાઇડને પાણી અને ઓક્સિજનમાં તોડે છે, અને એમાઇલેઝ કાર્બોદિતોના પાચનમાં મદદ કરે છે.", "ncert_ref": "Class XI - Chapter 13: વનસ્પતિમાં પ્રકાશસંશ્લેષણ", "difficulty": "Hard", "num": 2}, {"question": "ઉત્સેચકની ક્રિયાવિધિ વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) ઉત્સેચક તેની ક્રિયા માટે સહકારક (cofactor) ની જરૂરિયાત હોઈ શકે છે.", "B) ઉત્સેચક તેની ક્રિયા પછી અપરિવર્તિત રહે છે.", "C) ઉત્સેચક ક્રિયા માટે ઉર્જાની જરૂરિયાત હોય છે.", "D) ઉત્સેચક ક્રિયા માટે પાણીની હાજરી અનિવાર્ય છે."], "correct": 3, "explanation": "ઉત્સેચક ક્રિયા માટે પાણીની હાજરી અનિવાર્ય નથી. ઉત્સેચક તેની ક્રિયા માટે સહકારક (cofactor) ની જરૂરિયાત હોઈ શકે છે (A સત્ય), તેની ક્રિયા પછી અપરિવર્તિત રહે છે (B સત્ય), અને ક્રિયા માટે ઉર્જાની જરૂરિયાત હોઈ શકે છે (C સત્ય).", "ncert_ref": "Class XII - Chapter 9: જૈવ-અણુઓ અને ઉત્સેચકો", "difficulty": "Hard", "num": 3}, {"question": "નીચેનામાંથી કયું ઉત્સેચક હાઇડ્રોજન પેરોક્સાઇડને પાણી અને ઓક્સિજનમાં તોડે છે?", "options": ["A) લાઇપેઝ (Lipase)", "B) કેટલેઝ (Catalase)", "C) પ્રોટિયેઝ (Protease)", "D) એમાઇલેઝ (Amylase)"], "correct": 1, "explanation": "કેટલેઝ (Catalase) હાઇડ્રોજન પેરોક્સાઇડને પાણી અને ઓક્સિજનમાં તોડે છે. લાઇપેઝ ચરબીના પાચનમાં, પ્રોટિયેઝ પ્રોટીનના પાચનમાં, અને એમાઇલેઝ કાર્બોદિતોના પાચનમાં મદદ કરે છે.", "ncert_ref": "Class XII - Chapter 9: જૈવ-અણુઓ અને ઉત્સેચકો", "difficulty": "Hard", "num": 4}, {"question": "ઉત્સેચકની ક્રિયાશીલતા પર pH નું પ્રભાવ ધ્યાનમાં લેતા, નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) બધા ઉત્સેચકો એક જ pH પર મહત્તમ ક્રિયાશીલતા ધરાવે છે.", "B) પેપ્સિન અમ્લીય pH પર મહત્તમ ક્રિયાશીલતા ધરાવે છે.", "C) ટ્રિપ્સિન અમ્લીય pH પર મહત્તમ ક્રિયાશીલતા ધરાવે છે.", "D) ઉત્સેચકની ક્રિયાશીલતા pH પર આધારિત નથી."], "correct": 1, "explanation": "પેપ્સિન અમ્લીય pH (લગભગ 1.5-2) પર મહત્તમ ક્રિયાશીલતા ધરાવે છે, જ્યારે ટ્રિપ્સિન ક્ષારીય pH (લગભગ 8) પર મહત્તમ ક્રિયાશીલતા ધરાવે છે. વિકલ્પ A ખોટો છે કારણ કે બધા ઉત્સેચકો એક જ pH પર મહત્તમ ક્રિયાશીલતા ધરાવતા નથી. વિકલ્પ D ખોટો છે કારણ કે ઉત્સેચકની ક્રિયાશીલતા pH પર આધારિત હોય છે.", "ncert_ref": "Class XII - Chapter 9: જૈવ-અણુઓ અને ઉત્સેચકો", "difficulty": "Hard", "num": 5}, {"question": "નીચેનામાંથી કયું ઉત્સેચક તેની ક્રિયા માટે કોફેક્ટર તરીકે મેગ્નેશિયમ આયન (Mg²⁺) ની જરૂર રાખે છે અને કેલ્વિન ચક્રમાં કાર્બન ડાયોક્સાઇડની સ્થિરીકરણ પ્રક્રિયામાં મહત્વની ભૂમિકા ભજવે છે?", "options": ["A) રુબિસ્કો (RuBisCO)", "B) કેટલેઝ", "C) એમાઇલેઝ", "D) લેક્ટેઝ"], "correct": 0, "explanation": "રુબિસ્કો (RuBisCO) ઉત્સેચક કેલ્વિન ચક્રમાં CO₂ ને સ્થિર કરવા માટે મેગ્નેશિયમ આયન (Mg²⁺) ની જરૂર રાખે છે, જે પ્રકાશસંશ્લેષણની મુખ્ય પ્રક્રિયા છે. કેટલેઝ H₂O₂ ને તોડવા માટે જવાબદાર છે અને તેને લોહ આયન (Fe) ની જરૂર પડે છે. એમાઇલેઝ અને લેક્ટેઝ ક્રમશઃ કાર્બોદિત અને લેક્ટોઝના જળવિભાજન માટે જવાબદાર છે, પર ં ઉત્સેચક યકૃતમાં ગ્લાયકોલાઇસિસ દરમિયાન 2-ફોસ્ફોગ્લિસરેટને ફોસ્ફોઇનોલપાયરૂવેટમાં રૂપાંતરિત કરે છે અને તેની ક્રિયા માટે Mg2+ ની જરૂરિયાત હોય છે?", "options": ["A) ફોસ્ફોગ્લિસરેટ કિનેઝ", "B) ઇનોલેઝ", "C) પાયરૂવેટ કિનેઝ", "D) ફોસ્ફોફ્રક્ટોકિનેઝ"], "correct": 1, "explanation": "ઇનોલેઝ ઉત્સેચક 2-ફોસ્ફોગ્લિસરેટને ફોસ્ફોઇનોલપાયરૂવેટમાં રૂપાંતરિત કરે છે અને તેની ક્રિયા માટે Mg2+ ની જરૂરિયાત હોય છે. ફોસ્ફોગ્લિસરેટ કિનેઝ 1,3-બાઇસફોસ્ફોગ્લિસરેટને 3-ફોસ્ફોગ્લિસરેટમાં રૂપાંતરિત કરે છે, પાયરૂવેટ કિનેઝ પાયરૂવેટને પાયરૂવેટથી એસિટાઇલ-CoAમાં રૂપાંતરિત કરે છે, અને ફોસ્ફોફ્રક્ટોકિનેઝ ફ્રક્ટોઝ-6-ફોસ્ફેટને ફ્રક્ટોઝ-1,6-બાઇસફોસ્ફેટમાં રૂપાંતરિત કરે છે.", "ncert_ref": "Class XII - Chapter 9: ચયાપચય (Metabolism)", "difficulty": "Hard", "num": 23}, {"question": "નીચેનામાંથી કયું ઉત્સેચક તેની ક્રિયા માટે કોફેક્ટર તરીકે કોપર (Cu2+) ની જરૂરિયાત ધરાવે છે અને તે શ્વસન શૃંખલામાં ભાગ લે છે?", "options": ["A) સાયટોક્રોમ ઓક્સિડેઝ", "B) કેટલેઝ", "C) કાર્બોનિક એનહાઇડ્રેઝ", "D) સુપરઓક્સાઇડ ડિસ્મ્યુટેઝ"], "correct": 0, "explanation": "સાયટોક્રોમ ઓક્સિડેઝ ઉત્સેચક કોપર (Cu2+) ને કોફેક્ટર તરીકે વાપરે છે અને શ્વસન શૃંખલામાં સાયનાઇડ-સંવેદનશીલ પગલામાં ભાગ લે છે. કેટલેઝ માટે હીમ (Fe) જરૂરી છે, કાર્બોનિક એનહાઇડ્રેઝ માટે Zn2+ જરૂરી છે, અને સુપરઓક્સાઇડ ડિસ્મ્યુટેઝ માટે Mn2+ અથવા Cu2+ જરૂરી હોઈ શકે છે, પરંતુ શ્વસન શૃંખલામાં ભાગ લેતું નથી.", "ncert_ref": "Class XII - Chapter 9: ચયાપચય (Metabolism)", "difficulty": "Hard", "num": 24}, {"question": "નીચેનામાંથી કયું વિધાન ઉત્સેચકની ક્રિયાશીલતા પર pH ના પ્રભાવ વિશે સાચું નથી જ્યારે ઉત્સેચક તેના ઓપ્ટિમમ pH થી દૂર હોય?", "options": ["A) ઉત્સેચકની ક્રિયાશીલતા ઘટે છે કારણ કે તેની ત્રિપરિમાણીય રચના બદલાય છે", "B) ઉત્સેચકની ક્રિયાશીલતા ઘટે છે કારણ કે સબસ્ટ્રેટ બંધન સ્થાન પર પ્રભાવ પડે છે", "C) ઉત્સેચકની ક્રિયાશીલતા ઘટે છે કારણ કે ઉત્સેચકનો વિઘટન થાય છે", "D) ઉત્સેચકની ક્રિયાશીલતા ઘટે છે કારણ કે કોફેક્ટરની ઉપલબ્ધતા ઘટે છે"], "correct": 2, "explanation": "ઉત્સેચકની ક્રિયાશીલતા ઓપ્ટિમમ pH થી દૂર હોવાથી ઘટે છે કારણ કે તેની ત્રિપરિમાણીય રચના બદલાય છે અથવા સબસ્ટ્રેટ બંધન સ્થાન પર પ ને કોફેક્ટર તરીકે ઉપયોગમાં લે છે અને પેપ્ટાઇડ બંધના જળવિભાજન દ્વારા પ્રોટીનનું પાચન કરે છે. આ ઉત્સેચકોની ક્રિયાશીલતા આંતરડામાં આલ્કલાઇન pH (8-10) પર મહત્તમ હોય છે (NCERT Class XII, Chapter 9: ઉત્સેચકો).\n\nવિકલ્પ A ખોટો છે કારણ કે કાર્બોક્સિલેશન પ્રક્રિયાઓ સામાન્ય રીતે બાયોટિન (વિટામિન H) નો ઉપયોગ કરે છે, Zn²⁺ નો નહીં.\n\nવિકલ્પ C ખોટો છે કારણ કે ડિહાઇડ્રોજનેશન પ્રક્રિયાઓમાં સામાન્ય રીતે NAD⁺, FAD અથવા FMN જેવા કોફેક્ટરનો ઉપયોગ થાય છે, Zn²⁺ નો નહીં.\n\nવિકલ્પ D ખોટો છે કારણ કે ફોસ્ફોરિલેશન પ્રક્રિયાઓમાં સામાન્ય રીતે મેગ્નેશિયમ (Mg²⁺) જેવા કોફેક્ટરનો ઉપયોગ થાય છે, Zn²⁺ નો નહીં.", "ncert_ref": "Class XII - પ્રકરણ 9: ઉત્સેચકો", "difficulty": "Hard", "num": 69}, {"question": "એક ઉત્સેચક જે તેની ક્રિયા માટે કોફેક્ટર તરીકે Zn²⁺ નો ઉપયોગ કરે છે, તે નીચેનામાંથી કયા પ્રકારની પ્રક્રિયામાં મુખ્ય ભૂમિકા ભજવે છે?", "options": ["A) કાર્બોક્સિલેશન પ્રક્રિયાઓ", "B) ડિહાઇડ્રોજનેશન પ્રક્રિયાઓ", "C) પેપ્ટાઇડ બંધના જળવિભાજન", "D) ફોસ્ફોરિલેશન પ્રક્રિયાઓ"], "correct": 2, "explanation": "Zn²⁺ કોફેક્ટર તરીકે કાર્બોક્સિપેપ્ટિડેઝ અને કાર્બોનિક એનહાઇડ્રેઝ જેવા ઉત્સેચકોમાં જોવા મળે છે, જે પેપ્ટાઇડ બંધના જળવિભાજનમાં મુખ્ય ભૂમિકા ભજવે છે. કાર્બોક્સિલેશન માટે બાયોટિન, ડિહાઇડ્રોજનેશન માટે NAD⁺/FAD અને ફોસ્ફોરિલેશન માટે ATP જરૂરી છે, Zn²⁺ નહીં. NCERT Class XII, Chapter 9: બાયોમોલેક્યુલ્સમાં ઉત્સેચકોના કોફેક્ટર વિશે વર્ણન છે.", "ncert_ref": "Class XII - પ્રકરણ 9: બાયોમોલેક્યુલ્સ", "difficulty": "Hard", "num": 70}, {"question": "એક ઉત્સેચક જે તેની ક્રિયા માટે કોફેક્ટર તરીકે મોલિબ્ડેનમ (Mo) નો ઉપયોગ કરે છે, તે નીચેનામાંથી કયા ચયાપચયિક માર્ગમાં સૌથી વધુ સક્રિય હોય છે?", "options": ["A) નાઇટ્રોજન ચક્રમાં નાઇટ્રેટ રિડક્શન", "B) યુરિયા ચક્રમાં આર્જિનિનનું વિઘટન", "C) ગ્લાયકોલાઇસિસમાં ગ્લુકોઝનું ફોસ્ફોરિલેશન", "D) ક્રેબ્સ ચક્રમાં સક્સિનેટનું ઓક્સિડેશન"], "correct": 0, "explanation": "મોલિબ્ડેનમ ધરાવતા ઉત્સેચકો (જેમ કે નાઇટ્રેટ રિડક્ટેઝ) નાઇટ્રોજન ચક્રમાં નાઇટ્રેટના રિડક્શનમાં મુખ્ય ભૂમિકા ભજવે છે. યુરિયા ચક્રમાં આર્જિનેઝ (Mn²⁺), ગ્લાયકોલાઇસિસમાં હેક્સોકિનેઝ (Mg²⁺) અને ક્રેબ્સ ચક્રમાં સક્સિનેટ ડિહાઇડ્રોજનેઝ (FAD) અન્ય કોફેક્ટરનો ઉપયોગ કરે છે. NCERT Class XII, Chapter 14: પર્યાવરણીય રસાયણશાસ્ત્રમાં નાઇટ્રોજન ચક્રનું વર્ણન છે.", "ncert_ref": "Class XII - પ્રકરણ 14: પર્યાવરણીય રસાયણશાસ્ત્ર", "difficulty": "Hard", "num": 71}, {"question": "નીચેનામાંથી કયું ઉત્સેચક યકૃતમાં ગ્લુકોનિયોજેનેસિસ દરમિયાન ફ્રુક્ટોઝ-1,6-બાઇસફોસ્ફેટને ફ્રુક્ટોઝ-6-ફોસ્ફેટમાં રૂપાંતરિત કરે છે, પરંતુ તેને કોફેક્ટર તરીકે Mg²⁺ ની જરૂર નથી?", "options": ["A) ફોસ્ફોફ્રુક્ટોકિનેઝ-1", "B) ફ્રુક્ટોઝ-1,6-બાઇસ્ફોસ્ફેટેઝ", "C) ગ્લુકોઝ-6-ફોસ્ફેટેઝ", "D) ફોસ્ફોગ્લુકોમ્યુટેઝ"], "correct": 1, "explanation": "ફ્રુક્ટોઝ-1,6-બાઇસ્ફોફેટેઝ ગ્લુકોનિયોજેનેસિસમાં ફ્રુક્ટોઝ-1,6-બાઇસફોસ્ફેટને ફ્રુક્ટોઝ-6-ફોસ્ફેટમાં રૂપાંતરિત કરે છે અને તેને Mg²⁺ ની જરૂર નથી. ફોસ્ફોફ્રુક્ટોકિનેઝ-1 ગ્લાયકોલાઇસિસમાં કામ કરે છે અને Mg²⁺ નો ઉપયોગ કરે છે. NCERT Class XI, Chapter 14: શ્વસન અને ઊર્જા વિનિમયમાં ગ્લુકોનિયોજેનેસિસનું વર્ણન છે.", "ncert_ref": "Class XI - પ્રકરણ 14: શ્વસન અને ઊર્જા વિનિમય", "difficulty": "Hard", "num": 72}, {"question": "એક ઉત્સેચક જે તેની ક્રિયા દરમિયાન સબસ્ટ્રેટના હાઇડ્રોક્સિલ જૂથને ફોસ્ફેટ જૂથમાં રૂપાંતરિત કરે છે, પરંતુ તેને કોફેક્ટર તરીકે ATP ની જરૂર નથી. આ ઉત્સેચક નીચેનામાંથી કયા વર્ગનો છે?", "options": ["A) કાઇનેઝ", "B) ફોસ્ફેટેઝ", "C) મ્યુટેઝ", "D) ફોસ્ફોરાયલેઝ"], "correct": 3, "explanation": "ફોસ્ફોરાયલેઝ ઉત્સેચકો હાઇડ્રોક્સિલ જૂથને ફોસ્ફેટ જૂથમાં રૂપાંતરિત કરે છે અને તેને ATP ની જરૂર નથી (અકાર્બનિક ફોસ્ફેટનો ઉપયોગ કરે છે). કાઇનેઝ ATP નો ઉપયોગ કરે છે, ફોસ્ફેટેઝ ફોસ્ફેટ જૂથને દૂર કરે છે, અને મ્યુટેઝ ફોસ્ફેટ જૂથનું સ્થાનાંતરણ કરે છે. NCERT Class XII, Chapter 9: બાયોમોલેક્યુલ્સમાં ઉત્સેચક વર્ગીકરણનું વર્ણન છે.", "ncert_ref": "Class XII - પ્રકરણ 9: બાયોમોલેક્યુલ્સ", "difficulty": "Hard", "num": 73}, {"question": "એક પ્રયોગમાં, એક ઉત્સેચકની ક્રિયાશીલતા પર વિવિધ પરિસ્થિતિઓની અસરનો અભ્યાસ કરવામાં આવ્યો. નીચેના પૈકી કયું પરિણામ ઉત્સેચકની લાક્ષણિકતા સાથે સુસંગત નથી?", "options": ["A) ઉત્સેચકની સાંદ્રતા બમણી કરતાં પ્રતિક્રિયાનો વેગ પણ બમણો થયો, પરંતુ સબસ્ટ્રેટની સાંદ્રતા ખૂબ જ વધારે હતી.", "B) સબસ્ટ્રેટની સાંદ્રતા વધારતાં પ્રતિક્રિયાનો વેગ વધ્યો, પરંતુ એક ચોક્કસ મર્યાદા પછી વેગમાં વધારો અટકી ગયો.", "C) ઉત્સેચકની ક્રિયાશીલતા માટેનું આદર્શ તાપમાન 37°C હતું, પરંતુ 60°C તાપમાને ઉત્સેચક સંપૂર્ણપણે નિષ્ક્રિય થઈ ગયું.", "D) ઉત્સેચકની ક્રિયાશીલતા માટેનું આદર્શ pH 7.4 હતું, પરંતુ pH 2.0 પર ઉત્સેચકની ક્રિયાશીલતા સંપૂર્ણપણે જળવાઈ રહી અને પ્રતિક્રિયાનો વેગ યથાવત રહ્યો."], "correct": 3, "explanation": "સાચો જવાબ વિકલ્પ D છે. ઉત્સેચકો સામાન્ય રીતે ચોક્કસ pH શ્રેણીમાં જ ક્રિયાશીલ હોય છે. મોટાભાગના ઉત્સેચકો pH 2.0 જેવા અત્યંત એસિડિક વાતાવરણમાં નિષ્ક્રિય થઈ જાય છે કારણ કે તેમની પ્રોટીન સંરચના બદલાઈ જાય છે (NCERT Class XII, Chapter 9: ઉત્સેચકો). વિકલ્પ A: ઉત્સેચકની સાંદ્રતા વધારતાં પ્રતિક્રિયાનો વેગ વધે છે જ્યારે સબસ્ટ્રેટ પૂરતા પ્રમાણમાં હોય (પ્રથમ ક્રમની પ્રતિક્રિયા). વિકલ્પ B: સબસ્ટ્રેટની સાંદ્રતા વધારતાં પ્રતિક્રિયાનો વેગ વધે છે, પરંતુ Vmax પછી વધારો અટકી જાય છે (માઇકલિસ-મેન્ટન ગતિશાસ્ત્ર). વિકલ્પ C: ઉત્સેચકોનું આદર્શ તાપમાન સામાન્ય રીતે 37°C હોય છે અને ઉચ્ચ તાપમાને તેઓ વિકૃત થઈ જાય છે.", "ncert_ref": "Class XII - પ્રકરણ 9: ઉત્સેચકો", "difficulty": "Hard", "num": 74}, {"question": "એક ઉત્સેચક તેની ક્રિયા દરમિયાન સબસ્ટ્રેટના થાયોલ જૂથ (-SH) ને ડિસલ્ફાઇડ બંધમાં રૂપાંતરિત કરે છે. આ ઉત્સેચક વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) તે પ્રોસ્થેટિક સમૂહ તરીકે FAD ધરાવે છે અને પેરોક્સિસોમમાં સક્રિય હોય છે.", "B) તે કોફેક્ટર તરીકે લિપોઇક એસિડ ધરાવે છે અને માઇટોકોન્ડ્રિયામાં સક્રિય હોય છે.", "C) તે કોફેક્ટર તરીકે હીમ ધરાવે છે અને એન્ડોપ્લાઝમિક રેટિક્યુલમમાં સક્રિય હોય છે.", "D) તે કોફેક્ટર તરીકે બાયોટિન ધરાવે છે અને સાયટોપ્લાઝમમાં સક્રિય હોય છે."], "correct": 1, "explanation": "થાયોલ જૂથ (-SH) ને ડિસલ્ફાઇડ બંધમાં રૂપાંતરિત કરતું ઉત્સેચક પાયરૂવેટ ડિહાઇડ્રોજિનેઝ છે, જે કોફેક્ટર તરીકે લિપોઇક એસિડ ધરાવે છે અને માઇટોકોન્ડ્રિયામાં સક્રિય હોય છે. FAD (A) પેરોક્સિસોમમાં સક્રિય હોય છે, પરંતુ તે થાયોલ જૂથના ઓક્સિડેશન સાથે સીધો સંબંધ ધરાવતું નથી. હીમ (C) અને બાયોટિન (D) આ પ્રક્રિયામાં સીધો ભાગ લેતા નથી.", "ncert_ref": "Class XII - Chapter 9: જૈવ-અણુઓ અને ઉત્સેચકો", "difficulty": "Hard", "num": 75}, {"question": "નીચેનામાંથી કયું ઉત્સેચક યકૃતમાં યુરિયા ચક્ર દરમિયાન આર્જિનિનને યુરિયા અને ઓર્નિથિનમાં વિઘટન કરે છે અને તે માટે કોફેક્ટર તરીકે Mn²⁺ ની જરૂર પડે છે?", "options": ["A) આર્જિનેઝ", "B) યુરિયેઝ", "C) આર્જિનિનોસક્સિનેટ સિનથેટેઝ", "D) કાર્બામોઇલ ફોસ્ફેટ સિનથેટેઝ"], "correct": 0, "explanation": "આર્જિનેઝ ઉત્સેચક યુરિયા ચક્રના અંતિમ પગલામાં આર્જિનિનને યુરિયા અને ઓર્નિથિનમાં વિઘટન કરે છે. આ ઉત્સેચક માટે કોફેક્ટર તરીકે Mn²⁺ ની જરૂર પડે છે. યુરિયેઝ (B) યુરિયાને એમોનિયા અને CO₂ માં વિઘટન કરે છે. આર્જિનિનોસક્સિનેટ સિનથેટેઝ (C) અને કાર્બામોઇલ ફોસ્ફેટ સિનથેટેઝ (D) યુરિયા ચક્રના અન્ય પગલામાં ભાગ લે છે, પરંતુ તે આર્જિનિનના વિઘટન સાથે સીધો સંબંધ ધરાવતું નથી.", "ncert_ref": "Class XII - Chapter 9: જૈવ-અણુઓ અને ઉત્સેચકો", "difficulty": "Hard", "num": 76}, {"question": "એક ઉત્સેચક તેની ક્રિયા દરમિયાન સબસ્ટ્રેટના હાઇડ્રોક્સિલ જૂથને ફોસ્ફેટ જૂથમાં રૂપાંતરિત કરે છે. આ ઉત્સેચક વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) તે ગ્લાયકોલાઇસિસ દરમિયાન ગ્લુકોઝ-6-ફોસ્ફેટને ફ્રુક્ટોઝ-6-ફોસ્ફેટમાં રૂપાંતરિત કરે છે.", "B) તે કોફેક્ટર તરીકે Mg²⁺ ની જરૂર પડે છે.", "C) તે ATP નો ઉપયોગ કરે છે.", "D) તે હેક્સોકિનેઝ છે."], "correct": 0, "explanation": "ગ્લુકોઝ-6-ફોસ્ફેટને ફ્રુક્ટોઝ-6-ફોસ્ફેટમાં રૂપાંતરિત કરતું ઉત્સેચક ફોસ્ફોહેક્સોઝ આઇસોમરેઝ છે, હેક્સોકિનેઝ નહીં. હેક્સોકિનેઝ (D) ગ્લુકોઝને ગ્લુકોઝ-6-ફોસ્ફેટમાં રૂપાંતરિત કરે છે. આ ઉત્સેચક માટે Mg²⁺ (B) અને ATP (C) ની જરૂર પડે છે.", "ncert_ref": "Class XII - Chapter 9: જૈવ-અણુઓ અને ઉત્સેચકો", "difficulty": "Hard", "num": 77}, {"question": "નીચેનામાંથી કયું ઉત્સેચક યકૃતમાં ગ્લુકોનિયોજેનેસિસ દરમિયાન પાયરૂવેટને ગ્લુકોઝમાં રૂપાંતરિત કરવામાં ભાગ લેતું નથી?", "options": ["A) પાયરૂવેટ કાર્બોક્સિલેઝ", "B) ફોસ્ફોઇનોલપાયરૂવેટ કાર્બોક્સિકિનેઝ", "C) ગ્લુકોઝ-6-ફોસ્ફેટેઝ", "D) હેક્સોકિનેઝ"], "correct": 3, "explanation": "વિકલ્પ D (હેક્સોકિનેઝ) સાચો જવાબ છે કારણ કે હેક્સોકિનેઝ ગ્લુકોઝને ગ્લુકોઝ-6-ફોસ્ફેટમાં રૂપાંતરિત કરે છે, જે ગ્લુકોનિયોજેનેસિસનો ભાગ નથી, પરંતુ ગ્લાયકોલાઇસિસનો ભાગ છે. પાયરૂવેટ કાર્બોક્સિલેઝ (A) પાયરૂવેટને ઓક્સાલોએસિટેટમાં રૂપાંતરિત કરે છે, ફોસ્ફોઇનોલપાયરૂવેટ કાર્બોક્સિકિનેઝ (B) ઓક્સાલોએસિટેટને ફોસ્ફોઇનોલપાયરૂવેટમાં રૂપાંતરિત કરે છે, અને ગ્લુકોઝ-6-ફોસ્ફેટેઝ (C) ગ્લુકોઝ-6-ફોસ્ફેટને ગ્લુકોઝમાં રૂપાંતરિત કરે છે, જે બધા ગ્લુકોનિયોજેનેસિસના ભાગ છે.", "ncert_ref": "Class XII - Chapter 9: જૈવ-અણુઓ અને ઉત્સેચકો", "difficulty": "Hard", "num": 78}, {"question": "નીચેનામાંથી કયું ઉત્સેચક તેની ક્રિયા દરમિયાન સબસ્ટ્રેટના હાઇડ્રોક્સિલ જૂથને ફોસ્ફેટ જૂથમાં રૂપાંતરિત કરે છે અને તેની ક્રિયા માટે કોફેક્ટર તરીકે Mg2+ ની જરૂરિયાત ધરાવે છે?", "options": ["A) હેક્સોકિનેઝ", "B) ગ્લુકોઝ-6-ફોસ્ફેટેઝ", "C) ફોસ્ફોગ્લુકોઇઝોમેરેઝ", "D) ગ્લુકોઝ-6-ફોસ્ફેટ ડિહાઇડ્રોજીનેઝ"], "correct": 0, "explanation": "હેક્સોકિનેઝ ઉત્સેચક ગ્લુકોઝના 6th કાર્બન પર હાઇડ્રોક્સિલ જૂથને ફોસ્ફેટ જૂથમાં રૂપાંતરિત કરે છે અને તેની ક્રિયા માટે Mg2+ કોફેક્ટર તરીકે વાપરાય છે. ગ્લુકોઝ-6-ફોસ્ફેટેઝ (B) ગ્લુકોઝ-6-ફોસ્ફેટને ગ્લુકોઝમાં રૂપાંતરિત કરે છે, ફોસ્ફોગ્લુકોઇઝોમેરેઝ (C) ગ્લુકોઝ-6-ફોસ્ફેટને ફ્રુક્ટોઝ-6-ફોસ્ફેટમાં રૂપાંતરિત કરે છે, અને ગ્લુકોઝ-6-ફોસ્ફેટ ડિહાઇડ્રોજીનેઝ (D) ગ્લુકોઝ-6-ફોસ્ફેટને 6-ફોસ્ફોગ્લુકોનોલેક્ટોનમાં રૂપાંતરિત કરે છે.", "ncert_ref": "Class XII - Chapter 9: જૈવ-અણુઓ અને ચયાપચય", "difficulty": "Hard", "num": 79}, {"question": "નીચેનામાંથી કયું ઉત્સેચક યકૃતમાં યુરિયા ચક્ર દરમિયાન કાર્બામોઇલ ફોસ્ફેટના સિંથેસિસમાં ભાગ લેતું નથી?", "options": ["A) કાર્બામોઇલ ફોસ્ફેટ સિંથેટેઝ I", "B) ઓર્નિથિન ટ્રાન્સકાર્બામોઇલેઝ", "C) આર્જિનેઝ", "D) આર્જિનિનોસક્સિનેટ સિંથેટેઝ"], "correct": 2, "explanation": "C) આર્જિનેઝ સાચું છે કારણ કે તે યુરિયા ચક્રના અંતિમ પગલામાં આર્જિનિનને યુરિયા અને ઓર્નિથિનમાં વિઘટન કરે છે, પરંતુ કાર્બામોઇલ ફોસ્ફેટના સિંથેસિસમાં ભાગ લેતું નથી. A) કાર્બામોઇલ ફોસ્ફેટ સિંથેટેઝ I કાર્બામોઇલ ફોસ્ફેટના સિંથેસિસમાં ભાગ લે છે. B) ઓર્નિથિન ટ્રાન્સકાર્બામોઇલેઝ કાર્બામોઇલ ફોસ્ફેટને ઓર્નિથિન સાથે પ્રક્રિયા કરાવે છે. D) આર્જિનિનોસક્સિનેટ સિંથેટેઝ આર્જિનિનોસક્સિનેટના સિંથેસિસમાં ભાગ લે છે, જે કાર્બામોઇલ ફોસ્ફેટના ઉપયોગને આધીન છે.", "ncert_ref": "Class XII - Chapter 9: જૈવ-અણુઓ અને ઉત્સેચકો", "difficulty": "Hard", "num": 80}, {"question": "એક ઉત્સેચક જે તેની ક્રિયા માટે કોફેક્ટર તરીકે કોબાલ્ટ (Co) ધરાવે છે, તે નીચેનામાંથી કયા પ્રકારના પ્રક્રિયામાં ભાગ લે છે?", "options": ["A) મિથાઇલ સમૂહનું સ્થાનાંતરણ (Methyl group transfer)", "B) કાર્બોક્સિલેશન પ્રક્રિયા (Carboxylation reactions)", "C) ડિએમિનેશન પ્રક્રિયા (Deamination reactions)", "D) રિડક્શન પ્રક્રિયા (Reduction reactions)"], "correct": 0, "explanation": "કોબાલ્ટ (Co) કોફેક્ટર તરીકે મિથાઇલકોબાલામિન (Vitamin B12) માં જોવા મળે છે, જે મિથાઇલ સમૂહના સ્થાનાંતરણમાં ભાગ લે છે. કાર્બોક્સિલેશન પ્રક્રિયામાં બાયોટિન (Biotin), ડિએમિનેશનમાં પાયરિડોક્સલ ફોસ્ફેટ (PLP), અને રિડક્શનમાં NAD+/NADP+ જેવા કોફેક્ટરનો ઉપયોગ થાય છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 9: ઉત્સેચકો (Enzymes)", "difficulty": "Hard", "num": 81}, {"question": "એક ઉત્સેચક જે તેની ક્રિયા દરમિયાન સબસ્ટ્રેટના એમિનો જૂથને હાઇડ્રોક્સિલ જૂથમાં રૂપાંતરિત કરે છે, તે નીચેનામાંથી કયા પ્રકારનું ઉત્સેચક છે અને તેની ક્રિયા માટે કયું કોફેક્ટર જરૂરી છે?", "options": ["A) ઓક્સિડોરિડક્ટેઝ, NAD+", "B) લાયેઝ, પાયરિડોક્સલ ફોસ્ફેટ (PLP)", "C) હાઇડ્રોલેઝ, Zn2+", "D) ટ્રાન્સફરેઝ, થાયમિન પાયરોફોસ્ફેટ (TPP)"], "correct": 1, "explanation": "એમિનો જૂથને હાઇડ્રોક્સિલ જૂથમાં રૂપાંતરિત કરવાની પ્રક્રિયા ડિએમિનેશન છે, જે લાયેઝ પ્રકારના ઉત્સેચકો દ્વારા થાય છે. આ પ્રક્રિયામાં પાયરિડોક્સલ ફોસ્ફેટ (PLP) કોફેક્ટર તરીકે જરૂરી છે. ઓક્સિડોરિડક્ટેઝ ઓક્સિડેશન-રિડક્શન પ્રક્રિયામાં ભાગ લે છે, હાઇડ્રોલેઝ હાઇડ્રોલિસિસ પ્રક્રિયામાં, અને ટ્રાન્સફરેઝ સમૂહ સ્થાનાંતરણમાં ભાગ લે છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 9: ઉત્સેચકો (Enzymes)", "difficulty": "Hard", "num": 82}, {"question": "એક ઉત્સેચક જે તેની ક્રિયા દરમિયાન સબસ્ટ્રેટના થાયોલ જૂથ (-SH) ને ડિસલ્ફાઇડ બંધમાં રૂપાંતરિત કરે છે, તે નીચેનામાંથી કયા પ્રકારનું ઉત્સેચક છે અને તેની ક્રિયા માટે કયું કોફેક્ટર જરૂરી છે?", "options": ["A) ઓક્સિડોરિડક્ટેઝ, FAD", "B) લાયેઝ, NAD+", "C) આઇસોમરેઝ, Zn2+", "D) લિગેઝ, ATP"], "correct": 0, "explanation": "થાયોલ જૂથ (-SH) ને ડિસલ્ફાઇડ બંધમાં રૂપાંતરિત કરવાની પ્રક્રિયા ઓક્સિડેશન છે, જે ઓક્સિડોરિડક્ટેઝ પ્રકારના ઉત્સેચકો દ્વારા થાય છે. આ પ્રક્રિયામાં FAD કોફેક્ટર તરીકે જરૂરી છે                 card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
