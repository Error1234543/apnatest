<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - પ્રકાશસંશ્લેષણને અસર કરતા પરિબળો</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 પ્રકાશસંશ્લેષણને અસર કરતા પરિબળો</span>
                <span>🎯 Hard</span>
                <span>📝 40 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>

                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>

                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "પ્રકાશસંશ્લેષણની પ્રક્રિયા દરમિયાન, જો CO₂ની સાંદ્રતા અચાનક વધારી દેવામાં આવે તો ક્યાં ઉત્સેચકની ક્રિયાશીલતા સૌથી પહેલા મર્યાદિત થશે?", "options": ["A) રૂબિસ્કો (RuBisCO)", "B) PEP કાર્બોક્સિલેઝ", "C) ગ્લાયકોલેટ ઓક્સિડેઝ", "D) ફોસ્ફોઇનોલપાયરુવેટ (PEP) કાર્બોક્સિકિનેઝ"], "correct": 0, "explanation": "રૂબિસ્કો (RuBisCO) CO₂ની ફિક્સેશન માટે જવાબદાર મુખ્ય ઉત્સેચક છે. જ્યારે CO₂ની સાંદ્રતા વધારે છે, ત્યારે રૂબિસ્કોની ક્રિયાશીલતા મર્યાદિત થાય છે કારણ કે તે O₂ સાથે પણ પ્રતિક્રિયા આપી શકે છે (ફોટોરેસ્પિરેશન). PEP કાર્બોક્સિલેઝ C4 પ્લાન્ટ્સમાં કામ કરે છે અને CO₂ની ઉચ્ચ સાંદ્રતામાં વધારે સક્રિય થાય છે. ગ્લાયકોલેટ ઓક્સિડેઝ ફોટોરેસ્પિરેશન સાથે સંકળાયેલ છે, પરંતુ તે રૂબિસ્કો પછી કામ કરે છે. PEP કાર્બોક્સિકિનેઝ C4 ચક્રમાં ભાગ લે છે, પરંતુ તે રૂબિસ્કો જેટલી તરત જ મર્યાદિત થતું નથી.", "ncert_ref": "Class XI - પ્રકરણ 13: પ્રકાશસંશ્લેષણ", "difficulty": "Hard", "num": 1}, {"question": "નીચેનામાંથી કયું પરિબળ પ્રકાશસંશ્લેષણની દર પર સૌથી ઓછું પ્રભાવ પાડે છે જ્યારે પાનના તાપમાન 0°C થી 35°C સુધી વધારવામાં આવે?", "options": ["A) ઉત્સેચકની ક્રિયાશીલતા", "B) સ્ટોમેટલ ખુલ્લા રહેવા", "C) ક્લોરોફિલની સાંદ્રતા", "D) CO₂ની ઉપલબ્ધતા"], "correct": 2, "explanation": "ક્લોરોફિલની સાંદ્રતા તાપમાનના ફેરફારથી સીધા જ અસર પામતી નથી. ઉત્સેચકની ક્રિયાશીલતા, સ્ટોમેટલ ખુલ્લા રહેવા અને CO₂ની ઉપલબ્ધતા તાપમાનના ફેરફારથી પ્રભાવિત થાય છે. ઉદાહરણ તરીકે, ઉચ્ચ તાપમાને સ્ટોમેટા બંધ થઈ શકે છે, જેથી CO₂ની ઉપલબ્ધતા ઘટે છે, અને ઉત્સેચકોની ક્રિયાશીલતા પણ બદલાઈ શકે છે.", "ncert_ref": "Class XI - પ્રકરણ 13: પ્રકાશસંશ્લેષણ", "difficulty": "Hard", "num": 2}, {"question": "C4 પ્લાન્ટ્સમાં પ્રકાશસંશ્લેષણની દર C3 પ્લાન્ટ્સ કરતાં ઉચ્ચ તાપમાને વધુ રહે છે. આનું મુખ્ય કારણ કયું છે?", "options": ["A) C4 પ્લાન્ટ્સમાં રૂબિસ્કો ઉત્સેચકની ક્રિયાશીલતા ઉચ્ચ તાપમાને વધુ રહે છે", "B) C4 પ્લાન્ટ્સમાં PEP કાર્બોક્સિલેઝ ઉત્સેચક O₂ સાથે પ્રતિક્રિયા આપતું નથી", "C) C4 પ્લાન્ટ્સમાં ક્લોરોપ્લાસ્ટ્સ મીજોફિલ કોષો અને બંધની કોષોમાં અલગ પડેલા હોય છે", "D) C4 પ્લાન્ટ્સમાં ફોટોરેસ્પિરેશન થતું નથી"], "correct": s": ["A) પાણીની ઉપલબ્ધતા", "B) ખનીજ તત્વોની ઉપલબ્ધતા", "C) હવાનું તાપમાન", "D) પર્ણની સપાટીનું ક્ષેત્રફળ"], "correct": 2, "explanation": "પૂરતી પ્રકાશ તીવ્રતા અને CO2 સાંદ્રતામાં, હવાનું તાપમાન પ્રકાશસંશ્લેષણની દર પર સૌથી ઓછી અસર કરશે, કારણ કે છોડ પહેલેથી જ ઇષ્ટ પરિસ્થિતિઓમાં છે. પાણી, ખનીજ તત્વો, અને પર્ણની સપાટીનું ક્ષેત્રફળ પ્રકાશસંશ્લેષણની દર પર સીધી અસર કરે છે.", "ncert_ref": "Class XI - પ્રકરણ 13: પ્રકાશસંશ્લેષણ", "difficulty": "Hard", "num": 25}, {"question": "એક C3 છોડને 30°C તાપમાને રાખવામાં આવે છે અને પ્રકાશસંશ્લેષણની દર મહત્તમ છે. જો તાપમાન અચાનક 40°C સુધી વધારી દેવામાં આવે, તો નીચેનામાંથી કયું પરિબળ પ્રકાશસંશ્લેષણની દરમાં ઘટાડો કરવા માટે સૌથી જવાબદાર હશે?", "options": ["A) રૂબિસ્કો ઉત્સેચકની કાર્યક્ષમતામાં ઘટાડો અને ફોટોરેસ્પિરેશનમાં વધારો", "B) ક્લોરોફિલની માત્રામાં ઘટાડો", "C) પાણીની ઉપલબ્ધતામાં ઘટાડો", "D) પ્રકાશની તીવ્રતામાં ઘટાડો"], "correct": 0, "explanation": "C3 છોડમાં, 40°C જેવા ઉચ્ચ તાપમાને રૂબિસ્કો ઉત્સેચક (RuBisCO)ની કાર્યક્ષમતા ઘટે છે અને તે O2 સાથે પ્રતિક્રિયા કરવા લાગે છે, જે ફોટોરેસ્પિરેશનને વધારે છે. આ પ્રકાશસંશ્લેષણની દર ઘટાડે છે. ક્લોરોફિલની માત્રા, પાણીની ઉપલબ્ધતા, અથવા પ્રકાશની તીવ્રતા પર તાપમાનની સીધી અસર નથી, પરંતુ રૂબિસ્કોની કાર્યક્ષમતા અને ફોટોરેસ્પિરેશન એ મુખ્ય કારણ છે.", "ncert_ref": "Class XII - Chapter 13: છોડમાં ખોરાક ઉત્પાદન", "difficulty": "Hard", "num": 26}, {"question": "એક છોડને લાલ પ્રકાશ (660 nm) અને નીલા પ્રકાશ (450 nm)ના મિશ્રણમાં રાખવામાં આવે છે. જો અચાનક લાલ પ્રકાશને દૂર કરી દેવામાં આવે, તો પ્રકાશસંશ્લેષણની દર પર કયા પરિબળની અસર સૌથી વધુ થશે?", "options": ["A) PSIIની ક્રિયાશીલતામાં ઘટાડો", "B) PSIની ક્રિયાશીલતામાં ઘટાડો", "C) ATP સિંથેઝની ક્રિયાશીલતામાં ઘટાડો", "D) ક્લોરોફિલ aની ઉત્તેજનામાં ઘટાડો"], "correct": 1, "explanation": "લાલ પ્રકાશ PSII (Photosystem II) દ્વારા શોષાય છે, જ્યારે નીલો પ્રકાશ PSI (Photosystem I) દ્વારા શોષાય છે. જ્યારે લાલ પ્રકાશ દૂર કરવામાં આવે, ત્યારે PSIIની ક્રિયાશીલતા ઘટે છે, પરંતુ PSI અવિરત રીતે કામ કરતું રહે છે. આથી, PSIની ક્રિયાશીલતા પર સૌથી વધુ અસર થશે નહીં, પરંતુ PSIIની ક્રિયાશીલતા ઘટશે. ATP સિંથેઝ અને ક્લોરોફિલ aની ઉત્તેજના પર સીધી અસર થતી નથી.", "ncert_ref": "Class XI - Chapter 13: પ્રકાશસંશ્લેષણ", "difficulty": "Hard", "num": 27}, {"question": "એક C4 છોડને 35°C તાપમાને રાખવામાં આવે છે અને પ્રકાશસંશ્લેષણની દર મહત્તમ છે. જો તાપમાન અચાનક 45°C સુધી વધારી દેવામાં આવે, તો નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) પ્રકાશસંશ્લેષણની દર ઘટશે કારણ કે PEP કાર્બોક્સિલેઝ ઉત્સેચકની કાર્યક્ષમતા ઘટશે", "B) પ્રકાશસંશ્લેષણની દર વધશે કારણ કે ઉચ્ચ તાપમાને C4 છોડ વધુ કાર્યક્ષમ બને છે", "C) પ્રકાશસંશ્લેષણની દર પર કોઈ અસર થશે નહીં કારણ કે C4 છોડ ઉચ્ચ તાપમાન સામે પ્રતિરોધક છે", "D) પ્રકાશસંશ્લેષણની દર ઘટશે કારણ કે ક્લોરોફિલની માત્રા ઘટશે"], "correct": 0, "explanation": "C4 છોડમાં, PEP કાર્બોક્સિલેઝ ઉત્સેચક CO2ને ફિક્સ કરવા માટે જવાબદાર છે. 45°C જેવા ઉચ્ચ તાપમાને, આ ઉત્સેચકની કાર્યક્ષમતા ઘટે છે, જે પ્રકાશસંશ્લેષણની દર ઘટાડે છે. C4 છોડ ઉચ્ચ તાપમાન સામે પ્રતિરોધક હોવા છતાં, અતિશય ઉચ્ચ તાપમાને ઉત્સેચકની કાર્યક્ષમતા ઘટે છે. ક્લોરોફિલની માત્રા પર તાપમાનની સીધી અસર નથી.", "ncert_ref": "Class XII - Chapter 13: છોડમાં ખોરાક ઉત્પાદન", "difficulty": "Hard", "num": 28}, {"question": "એક C3 છોડને ઉચ્ચ તાપમાન (40°C) અને ઉચ્ચ CO2 સાંદ્રતામાં (0.1%) રાખવામાં આવે છે. નીચેનામાંથી કયું વિધાન પ્રકાશસંશ્લેષણની દર વિશે સત્ય છે?", "options": ["A) પ્રકાશસંશ્લેષણની દર ઘટશે કારણ કે રૂબિસ્કો (RuBisCO) ઉત્સેચકની ક્રિયાશીલતા ઘટી જશે.", "B) પ્રકાશસંશ્લેષણની દર વધશે કારણ કે ઉચ્ચ CO2 સાંદ્રતા ફોટોશ્વસન (photorespiration)ને દબાવી દેશે.", "C) પ્રકાશસંશ્લેષણની દર સ્થિર રહેશે કારણ કે ઉચ્ચ તાપમાન અને CO2 સાંદ્રતા એકબીજાને સંતુલિત કરશે.", "D) પ્રકાશસંશ્લેષણની દર ઘટશે કારણ કે ઉચ્ચ તાપમાને ક્લોરોફિલનો વિઘટન થશે."], "correct": 1, "explanation": "સાચો જવાબ B છે. ઉચ્ચ CO2 સાંદ્રતામાં, રૂબિસ્કો (RuBisCO) ઉત્સેચક CO2 સાથે બંધન કરવા માટે વધુ પ્રાધાન્ય આપે છે, જેથી ફોટોશ્વસન (photorespiration) ઘટે છે અને પ્રકાશસંશ્લેષણની દર વધે છે. A ખોટું છે કારણ કે ઉચ્ચ CO2 સાંદ્રતા રૂબિસ્કોની ક્રિયાશીલતા ઘટાડતી નથી, પરંતુ ફોટોશ્વસન ઘટાડે છે. C ખોટું છે કારણ કે ઉચ્ચ તાપમાન અને CO2 સાંદ્રતા એકબીજાને સંતુલિત કરતી નથી, પરંતુ CO2 સાંદ્રતા ફોટોશ્વસન ઘટાડે છે. D ખોટું છે કારણ કે ઉચ્ચ તાપમાને ક્લોરોફિલનો વિઘટન થતો નથી, પરંતુ રૂબિસ્કોની ક્રિયાશીલતા ઘટી શકે છે, પરંતુ CO2 સાંદ્રતા તેને સંતુલિત કરે છે.", "ncert_ref": "Class XI - Chapter 13: પ્રકાશસંશ્લેષણ સજીવોમાં", "difficulty": "Hard", "num": 29}, {"question": "એક છોડને લાલ પ્રકાશ (680 nm) અને નીલા પ્રકાશ (420 nm)ના મિશ્રણમાં રાખવામાં આવે છે. જો અચાનક લાલ પ્રકાશને દૂર કરવામાં આવે, તો પ્રકાશસંશ્લેષણની દર પર કયા પરિબળની અસર સૌથી વધુ હશે?", "options": ["A) PSI (પ્રકાશસંશ્લેષણ સિસ્ટમ I)ની ક્રિયાશીલતા ઘટશે, કારણ કે તે નીલા પ્રકાશ દ્વારા સક્રિય થતી નથી.", "B) PSII (પ્રકાશસંશ્લેષણ સિસ્ટમ II)ની ક્રિયાશીલતા ઘટશે, કારણ કે લાલ પ્રકાશ PSII માટે અગત્યનો છે.", "C) ATP અને NADPHનું ઉત્પાદન ઘટશે, કારણ કે લાલ પ્રકાશ સાયક્લિક ઇલેક્ટ્રોન વહન માટે જરૂરી છે.", "D) ક્લોરોફિલ aની સક્રિયતા ઘટશે, કારણ કે તે લાલ પ્રકાશને શોષી શકતી નથી."], "correct": 1, "explanation": "સાચો જવાબ B છે. લાલ પ્રકાશ PSII (પ્રકાશસંશ્લેષણ સિસ્ટમ II) માટે અગત્યનો છે, કારણ કે તે ક્લોરોફિલ a દ્વારા શોષાય છે અને PSIIની ક્રિયાશીલતા માટે જરૂરી છે. જ્યારે લાલ પ્રકાશ દૂર કરવામાં આવે, ત્યારે PSIIની ક્રિયાશીલતા ઘટશે, જેથી પ્રકાશસંશ્લેષણની દર પર અસર થશે. A ખોટું છે કારણ કે PSI નીલા પ્રકાશ દ્વારા પણ સક્રિય થઈ શકે છે. C ખોટું છે કારણ કે સાયક્લિક ઇલેક્ટ્રોન વહન માટે લાલ પ્રકાશ જરૂરી નથી. D ખોટું છે કારણ કે ક્લોરોફિલ a લાલ પ્રકાશને શોષી શકે છે, પરંતુ તેની સક્રિયતા ઘટશે નહીં.", "ncert_ref": "Class XI - Chapter 13: પ્રકાશસંશ્લેષણ સજીવોમાં", "difficulty": "Hard", "num": 30}, {"question": "એક C3 છોડને 35°C તાપમાને રાખવામાં આવે છે અને પ્રકાશસંશ્લેષણની દર અચાનક ઘટી જાય છે. આ ઘટના માટે નીચેનામાંથી કયું કારણ સૌથી યોગ્ય છે?", "options": ["A) રૂબિસ્કો ઉત્સેચકની કાર્યક્ષમતા ઘટી જાય છે અને ફોટોરેસ્પિરેશન વધી જાય છે", "B) પ્રકાશની તીવ્રતા ઘટી જાય છે, જેના કારણે પ્રકાશ-અવશોષણ ઘટે છે", "C) ક્લોરોફિલ અણુઓની સંખ્યા ઘટી જાય છે, જેના કારણે પ્રકાશ-સંશ્લેષણની પ્રક્રિયા મંદ પડે છે", "D) CO2ની સાંદ્રતા ઘટી જાય છે, જેના કારણે કેલ્વિન ચક્રની ગતિ મંદ પડે છે"], "correct": 0, "explanation": "C3 છોડમાં 35°C જેવા ઉચ્ચ તાપમાને રૂબિસ્         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
