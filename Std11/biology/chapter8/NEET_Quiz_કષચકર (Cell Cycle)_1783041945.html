<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - કોષચક્ર (Cell Cycle)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 કોષચક્ર (Cell Cycle)</span>
                <span>🎯 Hard</span>
                <span>📝 93 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "કોષચક્ર દરમિયાન, G2 તબક્કામાં કયું પગલું ઘટે છે જેથી કોષ M તબક્કામાં પ્રવેશે નહીં?", "options": ["A) DNA ની નકલ તપાસણી અને દુરુસ્તી", "B) હિસ્ટોન પ્રોટીનનું સંશ્લેષણ", "C) સેન્ટ્રોઝોમનું દ્વિગુણીકરણ", "D) ATP નું ઉત્પાદન વધારો"], "correct": 0, "explanation": "G2 તબક્કામાં DNA ની નકલની તપાસણી અને દુરુસ્તી થાય છે. જો DNA માં ખામી હોય તો કોષ M તબક્કામાં પ્રવેશતો નથી. હિસ્ટોન પ્રોટીનનું સંશ્લેષણ S તબક્કામાં થાય છે. સેન્ટ્રોઝોમનું દ્વિગુણીકરણ G2 માં પૂર્ણ થાય છે પરંતુ તે M તબક્કા અટકાવતું નથી. ATP નું ઉત્પાદન કોષચક્રના તમામ તબક્કામાં થતું રહે છે.", "ncert_ref": "Class XI - પ્રકરણ 10: કોષચક્ર અને કોષવિભાજન", "difficulty": "Hard", "num": 1}, {"question": "કોષચક્રના કયા તબક્કામાં કોષમાં રસાયણિક દ્રવ્યો અને અંગિકાઓની સંખ્યામાં વધારો થાય છે, પરંતુ DNA ની માત્રામાં કોઈ ફેરફાર થતો નથી?", "options": ["A) G1 તબક્કો", "B) S તબક્કો", "C) G2 તબક્કો", "D) M તબક્કો"], "correct": 0, "explanation": "G1 તબક્કો (પ્રથમ ગેપ તબક્કો) દરમિયાન કોષમાં રસાયણિક દ્રવ્યો અને અંગિકાઓની સંખ્યામાં વધારો થાય છે, પરંતુ DNA ની માત્રામાં કોઈ ફેરફાર થતો નથી. S તબક્કામાં DNA નું દ્વિગુણીકરણ થાય છે. G2 તબક્કામાં કોષ M તબક્કા માટે તૈયારી કરે છે. M તબક્કામાં કોષવિભાજન થાય છે.", "ncert_ref": "Class XI - પ્રકરણ 10: કોષચક્ર અને કોષવિભાજન", "difficulty": "Hard", "num": 2}, {"question": "કોષચક્રના નિયંત્રણમાં ભાગ લેતા કયા પ્રોટીનને 'કોષચક્રના રક્ષક' તરીકે ઓળખવામાં આવે છે?", "options": ["A) સાયક્લિન", "B) p53", "C) CDK", "D) કાઇનેટોકોર"], "correct": 1, "explanation": "p53 પ્રોટીન કોષચક્રના નિયંત્રણમાં મહત્વની ભૂમિકા ભજવે છે અને તેને 'કોષચક્રના રક્ષક' તરીકે ઓળખવામાં આવે છે. તે DNA ની ખામી શોધી કોષને M તબક્કામાં પ્રવેશતો અટકાવે છે. સાયક્લિન અને CDK કોષચક્રના નિયમનમાં ભાગ લે છે પરંતુ રક્ષક તરીકે ઓળખાતા નથી. કાઇનેટોકોર વર્ણસૂત્રના વિભાજનમાં ભાગ લે છે.", "ncert_ref": "Class XI - પ્રકરણ 10: કોષચક્ર અને કોષવિભાજન", "difficulty": "Hard", "num": 3}, {"question": "કોષચક્ર દરમિયાન, કયા તબક્કામાં કોષમાં સેન્ટ્રોઝોમનું દ્વિગુણીકરણ થાય છે?", "options": ["A) G1 તબક્કો", "B) S તબક્કો", "C) G2 તબક્કો", "D) પ્રોફેઝ"], "correct": 1, "explanation": "સેન્ટ્રોઝોમનું દ્વિગુણીકરણ S તબક્કામાં થાય છે. G1 તબક્કામાં કોષ વૃદ્ધિ પામે છે, G2 તબક્કામાં કોષ M તબક્કા માટે તૈયારી કરે છે, અને પ્રોફેઝ M તબક્કાનો પ્રથમ તબક્કો છે જ્યાં વર્ણસૂત્રો દેખાવા લાગે છે.", "ncert_ref": "Class XI - પ્રકરણ 10: કોષચક્ર અને કોષવિભાજન", "difficulty": "Hard", "num": 4}, {"question": "કોષચક્રના કયા તબક્કામાં કોષમાં RNA અને પ્રોટીનનું સંશ્લેષણ સૌથી વધુ થાય છે?", "options": ["A) G1 તબક્કો", "B) S તબક્કો", "C) G2 તબક્કો", "D) M તબક્કો"], "correct": 0, "explanation": "G1 તબક્કામાં કોષમાં RNA અને પ્રોટીનનું સંશ્લેષણ સૌથી વધુ થાય છે કારણ કે કોષ વૃદ્ધિ પામે છે અને અંગિકાઓનું નિર્માણ થાય છે. S તબક્કામાં DNA નું દ્વિગુણીકરણ થાય છે. G2 તબક્કામાં કોષ M તબક્કા માટે તૈયારી કરે છે. M તબક્કામાં કોષવિભાજન થાય છે.", "ncert_ref": "Class XI - પ્રકરણ 10: કોષચક્ર અને કોષવિભાજન", "difficulty": "Hard", "num": 5}, {"question": "કોષચક્ર દરમિયાન, કયા તબક્કામાં વર્ણસૂત્રોની નકલ (રેપ્લિકેશન) શરૂ થાય છે, પરંતુ તે પૂર્ણ થતાં પહેલાં જ કોષ M તબક્કામાં પ્રવેશે છે?", "options": ["A) G1 તબક્કો", "B) S તબક્કો", "C) G2 તબક્કો", "D) M તબક્કો"], "correct": 1, "explanation": "S તબક્કો એ કોષચક્રનો એવો તબક્કો છે જ્યાં DNAની નકલ (રેપ્લિકેશન) થાય છે. જોકે, કેટલાક અસાધારણ પરિસ્થિતિઓમાં (જેમ કે કોઈ મ્યુટેશન અથવા કૃત્રિમ રીતે પ્રેરિત પરિસ્થિતિઓમાં), કોષ S તબક્કામાં જ M તબક્કામાં પ્રવેશી શકે છે, પરંતુ સામાન્ય રીતે S તબક્કો પૂર્ણ થયા પછી જ M તબક્કો શરૂ થાય છે. G1 તબક્કો DNA નકલ પહેલાંનો તબક્કો છે, G2 તબક્કો DNA નકલ પછીનો તબક્કો છે, અને M તબક્કો કોષવિભાજનનો તબક્કો છે. આ પ્રશ્નમાં, S તબક્કો એ જવાબ છે કારણ કે તે એવો તબક્કો છે જ્યાં DNA નકલ શરૂ થાય છે.", "ncert_ref": "Class XI - પ્રકરણ 10: કોષ ચક્ર અને કોષ વિભાજન", "difficulty": "Hard", "num": 6}, {"question": "કોષચક્રના નિયંત્રણમાં ભાગ લેતા સાયક્લિન-CDK કોમ્પ્લેક્સની સક્રિયતા કયા તબક્કામાં સૌથી ઓછી હોય છે?", "options": ["A) G1 તબક્કો", "B) S તબક્કો", "C) G2 તબક્કો", "D) M તબક્કો"], "correct": 0, "explanation": "સાયક્લિન-CDK કોમ્પ્લેક્સની સક્રિયતા G1 તબક્કામાં સૌથી ઓછી હોય છે કારણ કે G1 તબ "A) G1 તબક્કાના અંતે", "B) S તબક્કાના અંતે", "C) G2 તબક્કાના અંતે", "D) M તબક્કાના પ્રોફેઝ દરમિયાન"], "correct": 2, "explanation": "G2/M ચેકપોઈન્ટ G2 તબક્કાના અંતે સક્રિય થાય છે, જેનાથી કોષ M તબક્કામાં પ્રવેશે તે પહેલાં DNA ની તપાસ થાય છે અને કોષને DNA નુકસાન અથવા અપૂર્ણ રેપ્લિકેશનની સ્થિતિમાં M તબક્કામાં પ્રવેશવા દેતું નથી. વિકલ્પ A (G1 અંતે) અને B (S અંતે) ખોટા છે કારણ કે આ ચેકપોઈન્ટ્સ અનુક્રમે G1 અને S તબક્કામાં હોય છે. વિકલ્પ D ખોટો છે કારણ કે M તબક્કામાં પ્રવેશ્યા પછી ચેકપોઈન્ટ સક્રિય થતું નથી.", "ncert_ref": "Class XI - પ્રકરણ 10: કોષચક્ર અને કોષવિભાજન", "difficulty": "Hard", "num": 32}, {"question": "કોષચક્ર દરમિયાન, જો કોષમાં DNA નુકસાન થાય અને તેની મરામત ન થઈ શકે, તો નીચેનામાંથી કયું પગલું સૌથી વધુ સંભાવિત છે?", "options": ["A) કોષ G0 તબક્કામાં પ્રવેશે અને સ્થાયી રીતે વિભાજન બંધ કરશે", "B) કોષ G1 તબક્કામાં જ અટકી જશે અને p53 દ્વારા એપોપ્ટોસિસ શરૂ કરશે", "C) કોષ S તબક્કામાં પ્રવેશશે પરંતુ DNA રેપ્લિકેશન અધૂરું રહેશે", "D) કોષ M તબક્કામાં પ્રવેશશે પરંતુ મિટોસિસ દરમિયાન અટકી જશે"], "correct": 1, "explanation": "p53 પ્રોટીન DNA નુકસાનને ઓળખે છે અને જો મરામત શક્ય ન હોય, તો તે એપોપ્ટોસિસ (કોષની પ્રોગ્રામ્ડ મૃત્યુ) શરૂ કરે છે. G1 તબક્કામાં p53ની સક્રિયતા સૌથી વધુ હોય છે, જ્યાં તે કોષચક્રને અટકાવે છે અને એપોપ્ટોસિસને પ્રેરે છે. A ખોટું છે કારણ કે G0 તબક્કામાં પ્રવેશ મુખ્યત્વે પોષણ અથવા સંકેતના અભાવે થાય છે, ન કે DNA નુકસાનને લીધે. C અને D ખોટાં છે કારણ કે DNA નુકસાન હોવા છતાં S અથવા M તબક્કામાં પ્રવેશવું કોષ માટે હાનિકારક હશે અને p53 એને અટકાવશે.", "ncert_ref": "Class XI - પ્રકરણ 10: કોષ ચક્ર અને કોષ વિભાજન", "difficulty": "Hard", "num": 33}, {"question": "કોષચક્ર દરમિયાન, 'સેક્યુરિન' પ્રોટીનનું વિઘટન કયા ઉત્સેચક દ્વારા થાય છે અને તેનો સીધો પરિણામ કયો હોય છે?", "options": ["A) એપીસી/સી કોમ્પ્લેક્સ; સિસ્ટર ક્રોમેટિડ્સનું અલગ થવું", "B) સાયક્લિન B-CDK1; મિટોટિક સ્પિંડલનું નિર્માણ", "C) કેસ્પેઝ-3; કોષના પલાવીકરણ", "D) DNA પોલિમરેઝ; DNA રેપ્લિકેશનની શરૂઆત"], "correct": 0, "explanation": "સેક્યુરિન પ્રોટીન એપીસી/સી (Anaphase Promoting Complex/Cyclosome) કોમ્પ્લેક્સ દ્વા , {"question": "કોષચક્ર દરમિયાન, 'કોહેસિન' પ્રોટીનની ભૂમિકા કયા તબક્કામાં સૌથી મહત્વપૂર્ણ બને છે અને તેનું વિઘટન કયા તબક્કામાં થાય છે?", "options": ["A) પ્રોફેઝ દરમિયાન; એનાફેઝ દરમિયાન", "B) મેટાફેઝ દરમિયાન; ટેલોફેઝ દરમિયાન", "C) S તબક્કામાં; G2 તબક્કામાં", "D) G1 તબક્કામાં; M તબક્કાના અંતે"], "correct": 0, "explanation": "કોહેસિન પ્રોટીન સિસ્ટર ક્રોમેટિડ્સને પ્રોફેઝ દરમિયાન જોડી રાખે છે, જ્યારે તેનું વિઘટન એનાફેઝ દરમિયાન થાય છે જેથી સિસ્ટર ક્રોમેટિડ્સ અલગ થઈ શકે. બાકીના વિકલ્પો અશુદ્ધ છે કારણ કે કોહેસિનની ભૂમિકા પ્રોફેઝ અને એનાફેઝ સાથે જોડાયેલી છે.", "ncert_ref": "Class XI - પ્રકરણ 10: કોષ ચક્ર અને કોષ વિભાજન", "difficulty": "Hard", "num": 37}, {"question": "નીચેનામાંથી કયું વિધાન 'સાયક્લિન D-CDK4/6' કોમ્પ્લેક્સ વિશે ખોટું છે?", "options": ["A) તે G1 તબક્કામાં સક્રિય થાય છે", "B) તે Rb પ્રોટીનને ફોસ્ફોરાઇલેટ કરે છે", "C) તે DNA રેપ્લિકેશનને પ્રારંભ કરે છે", "D) તે E2F ટ્રાન્સક્રિપ્શન ફેક્ટરને મુક્ત કરે છે"], "correct": 2, "explanation": "સાયક્લિન D-CDK4/6 કોમ્પ્લેક્સ G1 તબક્કામાં સક્રિય થાય છે અને Rb પ્રોટીનને ફોસ્ફોરાઇલેટ કરે છે, જે E2F ટ્રાન્સક્રિપ્શન ફેક્ટરને મુક્ત કરે છે. પરંતુ DNA રેપ્લિકેશનનો પ્રારંભ સાયક્લિન E-CDK2 કોમ્પ્લેક્સ દ્વારા થાય છે, ન કે સાયક્લિન D-CDK4/6 દ્વારા.", "ncert_ref": "Class XI - પ્રકરણ 10: કોષ ચક્ર અને કોષ વિભાજન", "difficulty": "Hard", "num": 38}, {"question": "કોષચક્ર દરમિયાન, જો p53 પ્રોટીન સક્રિય થાય તો નીચેનામાંથી કયું પગલું ઘટશે?", "options": ["A) કોષચક્રનો અટકાવ", "B) DNA મરામતની પ્રક્રિયાનો પ્રારંભ", "C) એપોપ્ટોસિસ (કોષ મૃત્યુ)", "D) ઉપરોક્ત તમામ"], "correct": 3, "explanation": "p53 પ્રોટીન DNA નુકસાનની સ્થિતિમાં સક્રિય થાય છે અને કોષચક્રને અટકાવે છે, DNA મરામતની પ્રક્રિયાનો પ્રારંભ કરે છે, અને જો નુકસાન ગંભીર હોય તો એપોપ્ટોસિસને પ્રેરે છે. આથી તમામ વિકલ્પો સત્ય છે.", "ncert_ref": "Class XI - પ્રકરણ 10: કોષ ચક્ર અને કોષ વિભાજન", "difficulty": "Hard", "num": 39}, {"question": "એક સંશોધક કોષચક્રના વિવિધ તબક્કાઓમાં રહેલા કોષોનું અવલોકન કરી રહ્યો છે. તેણે નોંધ્યું કે અમુક કોષોમાં વર્ણસૂત્રોની સંખ્યા દ્વિગુણિત થઈ ગઈ છે, પરંતુ વર્ણસૂત્રો હજુ પણ એકબીજા સાથે જોડાયેલા છે અને કોષકેન્દ્રીય પટલ પણ હાજર છે. આ કોષો કોષચક્રના કયા તબક્કામાં હોવાની શક્યતા સૌથી વધુ છે? આ તબક્કામાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) આ તબક્કો G2 તબક્કો છે, જેમાં સાયક્લિન B-CDK1 કોમ્પ્લેક્સની સક્રિયતા વધે છે", "B) આ તબક્કો S તબક્કો છે, જેમાં DNA રેપ્લિકેશન પૂર્ણ થયા બાદ કોષકેન્દ્રીય પટલ તૂટવા લાગે છે", "C) આ તબક્કો G2 તબક્કો છે, જેમાં કોષમાં ટ્યુબ્યુલિન પ્રોટીનનું સંશ્લેષણ વધે છે જે મિટોટિક સ્પિંડલના નિર્માણમાં મદદ કરે છે", "D) આ તબક્કો G2 તબક્કો છે, જેમાં 'G2/M ચેકપોઈન્ટ' સક્રિય થાય છે જે DNA નુકસાનની તપાસ કરે છે"], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે. પ્રશ્નમાં વર્ણવેલ પરિસ્થિતિ G2 તબક્કાની છે, જ્યાં DNA રેપ્લિકેશન પૂર્ણ થઈ ગયું હોય છે અને વર્ણસૂત્રો દ્વિગુણિત થઈ ગયા હોય છે, પરંતુ વર્ણસૂત્રો હજુ પણ કોહેસિન પ્રોટીન દ્વારા જોડાયેલા હોય છે અને કોષકેન્દ્રીય પટલ હાજર હોય છે. વિકલ્પ B ખોટો છે કારણ કે S તબક્કામાં DNA રેપ્લિકેશન થાય છે, પરંતુ કોષકેન્દ્રીય પટલ તૂટતું નથી - તે M તબક્કાના પ્રોફેઝમાં તૂટે છે. વિકલ્પ A, C અને D G2 તબક્કા વિશે સાચી માહિતી આપે છે: સાયક્લિન B-CDK1 કોમ્પ્લેક્સની સક્રિયતા વધે છે, ટ્યુબ્યુલિન પ્રોટીનનું સંશ્લેષણ થાય છે, અને G2/M ચેકપોઈન્ટ DNA નુકસાનની તપાસ કરે છે (NCERT Class XI, Chapter 10: કોષચક્ર અને કોષવિભાજન).", "ncert_ref": "Class XI - પ્રકરણ 10: કોષચક્ર અને કોષવિભાજન", "difficulty": "Hard", "num": 40}, {"question": "કોષચક્ર દરમિયાન, જો કોષમાં 'સાયક્લિન B-CDK1' કોમ્પ્લેક્સની સક્રિયતા અવરોધાય તો નીચેનામાંથી કયું પરિણામ સૌથી યોગ્ય રીતે થશે?", "options": ["A) કોષ G1 તબક્કામાં અટકી જશે અને G0 તબક્કામાં પ્રવેશ કરશે.", "B) કોષ G2 તબક્કામાં અટકી જશે અને M તબક્કામાં પ્રવેશ કરશે નહીં.", "C) કોષ M તબક્કામાં પ્રવેશ કરશે પરંતુ મેટાફેઝ તબક્કામાં અટકી જશે.", "D) કોષ S તબક્કામાં અટકી જશે અને DNA રેપ્લિકેશન પૂર્ણ કરશે નહીં."], "correct": 1, "explanation": "સાયક્લિન B-CDK1 કોમ્પ્લેક્સ (M-CDK) M તબક્કાના પ્રારંભ માટે જરૂરી છે. જો આ કોમ્પ્લેક્સની સક્રિયતા અવરોધાય, તો કોષ G2 તબક્કામાં અટકી જશે અને M તબક્કામાં પ્રવેશ કરશે નહીં. A ખોટું છે કારણ કે G1 તબક્કામાં અટકવું અને G0માં પ્રવેશ કરવો તે p53 ર અને કોષ વિભાજન", "difficulty": "Hard", "num": 43}, {"question": "કોષચક્ર દરમિયાન, 'G2/M ચેકપોઈન્ટ' વિશે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "options": ["A) તે કોષને M તબક્કામાં પ્રવેશ કરવા દેતો નથી જ્યાં સુધી DNA રેપ્લિકેશન પૂર્ણ ન થાય.", "B) તે કોષને M તબક્કામાં પ્રવેશ કરવા દેતો નથી જ્યાં સુધી કોષનું કદ પૂરતું ન હોય.", "C) તે કોષને M તબક્કામાં પ્રવેશ કરવા દેતો નથી જ્યાં સુધી મિટોકોન્ડ્રિયલ ફંક્શન યોગ્ય ન હોય.", "D) તે કોષને M તબક્કામાં પ્રવેશ કરવા દેતો નથી જ્યાં સુધી સાયક્લિન B-CDK1 કોમ્પ્લેક્સ સક્રિય ન થાય."], "correct": 1, "explanation": "G2/M ચેકપોઈન્ટ કોષને M તબક્કામાં પ્રવેશ કરવા દેતો નથી જ્યાં સુધી DNA રેપ્લિકેશન પૂર્ણ ન થાય (A સત્ય), મિટોકોન્ડ્રિયલ ફંક્શન યોગ્ય ન હોય (C સત્ય), અને સાયક્લિન B-CDK1 કોમ્પ્લેક્સ સક્રિય ન થાય (D સત્ય). પરંતુ કોષનું કદ પૂરતું હોવું તે G1 ચેકપોઈન્ટ (રેસ્ટ્રિક્શન પોઈન્ટ) સાથે સંબંધિત છે, G2/M ચેકપોઈન્ટ સાથે નહીં (B ખોટું).", "ncert_ref": "Class XI - Chapter 10: કોષ ચક્ર અને કોષ વિભાજન", "difficulty": "Hard", "num": 44}, {"question": "કોષચક્ર દરમિયાન, જો કોષમાં 'સેક્યુરિન' પ્રોટીનનું વિઘટન ન થાય તો નીચેનામાંથી કયું પરિણામ થશે?", "options": ["A) સિસ્ટર ક્રોમેટિડ્સ એનાફેઝ દરમિયાન અલગ પડશે નહીં.", "B) કોષ M તબક્કામાં પ્રવેશ કરશે નહીં.", "C) કોષ G1 તબક્કામાં અટકી જશે.", "D) DNA રેપ્લિકેશન અટકી જશે."], "correct": 0, "explanation": "સેક્યુરિન પ્રોટીન સેપરેઝ ઉત્સેચકને અવરોધે છે, જે સિસ્ટર ક્રોમેટિડ્સને અલગ પાડવા માટે જરૂરી છે. જો સેક્યુરિનનું વિઘટન ન થાય, તો સેપરેઝ સક્રિય થશે નહીં અને સિસ્ટર ક્રોમેટિડ્સ એનાફેઝ દરમિયાન અલગ પડશે નહીં (A સત્ય). B, C, અને D ખોટા છે કારણ કે તે સેક્યુરિનના વિઘટન સાથે સીધો સંબંધ ધરાવતા નથી.", "ncert_ref": "Class XI - Chapter 10: કોષ ચક્ર અને કોષ વિભાજન", "difficulty": "Hard", "num": 45}, {"question": "કોષચક્ર દરમિયાન, 'એનાફેઝ પ્રમોટિંગ કોમ્પ્લેક્સ/સાયક્લોઝોમ (APC/C)' ની સક્રિયતા માટે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) APC/C ની સક્રિયતા માટે 'સીડીસી20' પ્રોટીનની જરૂર પડે છે", "B) APC/C ની સક્રિયતા 'સાયક્લિન B' ના વિઘટન માટે જવાબદાર છે", "C) APC/C ની સક્રિયતા 'સેક્યુરિન' પ્રોટીનના વિઘટનને અટકાવે છે", "D) APC/C ની સક્રિયતા મેટાફેઝથી એનાફેઝ સંક્રમણ માટે જરૂરી છે"], "correct": 2, "explanation": "APC/C એ એનાફેઝ પ્રમોટિંગ કોમ્પ્લેક્સ છે જે 'સેક્યુરિન' પ્રોટીનનું વિઘટન કરીને 'સેપરેઝ' ઉત્સેચકને સક્રિય કરે છે, જેનાથી સિસ્ટર ક્રોમેટિડ્સનું અલગીકરણ થાય છે. વિકલ્પ C ખોટું છે કારણ કે APC/C સેક્યુરિનનું વિઘટન કરે છે, તેને અટકાવતું નથી. બાકીના વિકલ્પો APC/C ની ભૂમિકા વિશે સાચા છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 10: કોષચક્ર અને કોષવિભાજન", "difficulty": "Hard", "num": 46}, {"question": "એક સંશોધકે કોષચક્રના વિવિધ તબક્કાઓમાં રહેલા કોષોનું અવલોકન કર્યું અને નોંધ્યું કે કેટલાક કોષોમાં DNA ની માત્રા 4C હતી, પરંતુ વર્ણસૂત્રો દ્વિધ્રુવીય (બાયવેલેન્ટ) સ્વરૂપમાં ન હતા. આ કોષો કોષચક્રના કયા તબક્કામાં હશે?", "options": ["A) G1 તબક્કો", "B) S તબક્કો", "C) G2 તબક્કો", "D) પ્રોફેઝ-I (મિયોસિસ-I)"], "correct": 2, "explanation": "DNA ની માત્રા 4C હોવાનો અર્થ છે કે DNA નું દ્વિગુણીકરણ થઈ ચૂક્યું છે, પરંતુ વર્ણસૂત્રો દ્વિધ્રુવીય સ્વરૂપમાં ન હોવાથી તે મિયોસિસ નથી. આ સ્થિતિ G2 તબક્કામાં જોવા મળે છે, જ્યાં DNA ની માત્રા 4C હોય છે પરંતુ વર્ણસૂત્રો સંકોચાયેલા હોતા નથી. G1 તબક્કામાં DNA માત્રા 2C હોય છે, S તબક્કામાં તે 2C થી 4C વચ્ચે હોય છે, અને પ્રોફેઝ-I માં વર્ણસૂત્રો દ્વિધ્રુવીય સ્વરૂપમાં હોય છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 10: કોષચક્ર અને કોષવિભાજન, ક્લાસ XII - પ્રકરણ 10: કોષચક્ર અને કોષવિભાજન", "difficulty": "Hard", "num": 47}, {"question": "કોષચક્ર દરમિયાન, જો 'સાયક્લિન E-CDK2' કોમ્પ્લેક્સની સક્રિયતા અવરોધાય તો નીચેનામાંથી કયું પરિણામ સંભવિત નથી?", "options": ["A) કોષ G1 તબક્કામાંથી S તબક્કામાં પ્રવેશ કરી શકશે નહીં", "B) DNA રેપ્લિકેશન શરૂ થશે નહીં", "C) કોષ G0 તબક્કામાં પ્રવેશ કરશે", "D) કોષ મેટાફેઝમાં અટકી જશે"], "correct": 3, "explanation": "'સાયક્લિન E-CDK2' કોમ્પ્લેક્સ G1 તબક્કાના અંતમાં અને S તબક્કાના શરૂઆતમાં સક્રિય હોય છે, જે DNA રેપ્લિકેશનની શરૂઆત માટે જરૂરી છે. જો તેની સક્રિયતા અવરોધાય તો કોષ G1 તબક્કામાં અટકી જશે અથવા G0 તબક્કામાં પ્રવેશ કરશે, પરંતુ મેટાફેઝમાં અટકવું સંભવિત નથી કારણ કે મેટાફેઝ M તબક્કામાં આવે છે, જે સાયક્લિન B-CDK1 કોમ્પ્લેક્સ દ્વારા નિયંત્રિત થાય છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 10: કોષચક્ર અને કોષવિભાજન", "difficulty": "Hard", "num": 48}, {"question": "નીચેનામાંથી કયું વિધાન 'સ્પિન્ડલ એસેમ્બલી ચેકપોઈન્ટ (SAC)' વિશે ખોટું છે?", "options": ["A) SAC મેટાફેઝ દરમિયાન સક્રિય થાય છે અને એનાફેઝની શરૂઆતને અટકાવે છે", "B) SAC ની સક્રિયતા માટે 'મેડ2' પ્રોટીન જરૂરી છે", "C) SAC ની નિષ્ક્રિયતા 'એનાફેઝ પ્રમોટિંગ કોમ્પ્લેક્સ (APC/C)' ની સક્રિયતા તરફ દોરી જાય છે", "D) SAC ની સક્રિયતા 'સાયક્લિન B' ના સંશ્લેષણને પ્રોત્સાહન આપે છે"], "correct": 3, "explanation": "સ્પિન્ડલ એસેમ્બલી ચેકપોઈન્ટ (SAC) મેટાફેઝ દરમિયાન સક્રિય થાય છે અને એનાફેઝની શરૂઆતને ત્યાં સુધી અટકાવે છે જ્યાં સુધી બધા વર્ણસૂત્રો સ્પિન્ડલ ફાઇબર્સ સાથે યોગ્ય રીતે જોડાયેલા ન હોય. SAC ની સક્રિયતા APC/C ને અવરોધે છે, જેના કારણે સેક્યુરિનનું વિઘટન થતું નથી. SAC ની સક્રિયતા સાયક્લિન B ના સંશ્લેષણને પ્રોત્સાહન આપતી નથી, તેના બદલે તેની નિષ્ક્રિયતા APC/C ની સક્રિયતા તરફ દોરી જાય છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 10: કોષચક્ર અને કોષવિભાજન", "difficulty": "Hard", "num": 49}, {"question": "એક કોષમાં DNA નુકસાન થયું છે અને p53 પ્રોટીન સક્રિય થયું છે. આ સ્થિતિમાં નીચેનામાંથી કયું પરિણામ સંભવિત નથી?", "options": ["A) કોષચક્ર G1 તબક્કામાં અટકી જશે", "B) p21 પ્રોટીનનું સંશ્લેષણ વધશે", "C) DNA રેપ્લિકેશન શરૂ થશે", "D) કોષ એપોપ્ટોસિસ તરફ વળી શકે છે"], "correct": 2, "explanation": "p53 પ્રોટીન DNA નુકસાનના પ્રતિભાવમાં સક્રિય થાય છે અને કોષચક્રને G1 તબક્કામાં અટકાવે છે, p21 પ્રોટીનનું સંશ્લેષણ વધારે છે (જે CDK ને અવરોધે છે), અને જો નુકસાન ગંભીર હોય તો એપોપ્ટોસિસને પ્રેરિત કરી શકે છે. DNA રેપ્લિકેશન શરૂ થવું સંભવિત નથી કારણ કે p53 ની સક્રિયતા કોષચક્રને અટકાવે છે અને DNA નુકસાનની મરામત થાય ત્યાં સુધી રેપ્લિકેશનને રોકે છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 10: કોષચક્ર અને કોષવિભાજન", "difficulty": "Hard", "num": 50}, {"question": "કોષ ચક્ર દરમિયાન, G1 તબક્કાના નિયંત્રણ બિંદુને પાર કર્યા પછી, નીચેનામાંથી કયા ઘટના માટે કોષ પાછું વળી શકતું નથી?", "options": ["A) DNA ની નકલ શરૂ થવી", "B) સાયક્લિન D-CDK4/6 કોમ્પ્લેક્સનું સક્રિય થવું", "C) Rb પ્રોટીનનું ફોસ્ફોરાઇલેશન થવું જેથી E2F મુક્ત થાય", "D) સાયક્લિન E નું સંશ્લેષણ"], "correct": 2, "explanation": "G1 તબક્કાનું નિયંત્રણ બિંદુ કોષ ચક્રનું એવું બિંદુ છે જ્યાંથી કોષ પાછું વળી શકતું નથી. એકવાર કોષ આ બિંદુ પાર કરે છે, ત્યારે તે DNA નકલ અને વિભાજન માટે પ્રતિબદ્ધ થઈ જાય છે. આ બિંદુએ મુખ્ય આણ્વિક ઘટના એ છે કે સાયક્લિન D-CDK4/6 દ્વારા રેટિનોબ્લાસ્ટોમા (Rb) પ્રોટીનનું ફોસ્ફોરાઇલેશન થાય છે, જેથી E2F ટ્રાન્સક્રિપ્શન ફેક્ટર મુક્ત થાય છે અને કોષ S તબક્કામાં આગળ વધી શકે. વિકલ્પ A ખોટો છે કારણ કે DNA નકલની શરૂઆત S તબક્કામાં થાય છે, નિયંત્રણ બિંદુ પછી. વિકલ્પ B ખોટો છે કારણ કે સાયક્લિન D-CDK4/6 નું સક્રિય થવું નિયંત્રણ બિંદુ પહેલાં થાય છે. વિકલ્પ D ખોટો છે કારણ કે સાયક્લિન E નું સંશ્લેષણ નિયંત્રણ બિંદુ પછી થાય છે અને S તબક્કામાં સંક્રમણમાં ભાગ લે છે, પરંતુ અપરિવર્તનીય પ્રતિબદ્ધતા ખાસ કરીને Rb નું ફોસ્ફોરાઇલેશન સાથે જોડાયેલી છે.", "ncert_ref": "ધોરણ ૧૧ - પ્રકરણ ૧૦: કોષ ચક્ર અને કોષ વિભાજન", "difficulty": "કઠિન", "num": 51}, {"question": "G2 તબક્કામાં રહેલા એક કોષને સાયક્લિન B-CDK1 કોમ્પ્લેક્સની ક્રિયા અટકાવતી દવા આપવામાં આવે છે. નીચેનામાંથી કયું પરિણામ સૌથી વધુ સંભવિત છે?", "options": ["A) કોષ તરત જ કોષવિભાજનમાં પ્રવેશશે", "B) G2/M ચેકપોઈન્ટના સક્રિય થવાને કારણે કોષ G2 તબક્કામાં અટકી જશે", "C) DNA નુકસાનને કારણે કોષ અપોપ્ટોસિસ થશે", "D) કોષ કોષવિભાજન ચૂકવીને પુનઃ G1 તબક્કામાં પ્રવેશશે"], "correct": 1, "explanation": "સાયક્લિન B-CDK1 કોમ્પ્લેક્સ (જેને MPF - Maturation Promoting Factor પણ કહેવાય છે) G2 તબક્કાથી M તબક્કામાં સંક્રમણ માટે આવશ્યક છે. આ કોમ્પ્લેક્સની અટકાવણી કોષને કોષવિભાજનમાં પ્રવેશવા દેતી નથી. G2/M ચેકપોઈન્ટ કોષની કોષવિભાજન માટેની તૈયારીની નિગરાણી કરે છે, જેમાં સાયક્લિન B-CDK1ની ક્રિયા પણ સમાવેશ થાય છે. જો આ કોમ્પ્લેક્સ અટકાવવામાં આવે, તો ચેકપોઈન્ટ કોષને G2 તબક્કામાં અટકાવી દેશે. વિકલ્પ A ખોટો છે કારણ કે સાયક્લિન B-CDK1 કોષવિભાજન માટે જરૂરી છે. વિકલ્પ C ખોટો છે કારણ કે પરિસ્થિતિમાં DNA નુકસાનનો ઉલ્લેખ નથી. વિકલ્પ D ખોટો છે કારણ કે આ પરિસ્થિતિઓ હેઠળ કોષ કોષવિભાજન ચૂકવીને પુનઃ G1 તબક્કામાં પ્રવેશતું નથી.", "ncert_ref": "ધોરણ ૧૧ - પ્રકરણ ૧૦: કોષ ચક્ર અને કોષ વિભાજન", "difficulty": "કઠિન", "num": 52}, {"question": "કોહેસિન પ્રોટીન વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) કોહેસિન પ્રોટીન મેટાફેઝ દરમિયાન બહેન ક્રોમેટિડ્સને એકસાથે બાંધી રાખે છે", "B) કોહેસિન પ્રોટીન એનાફેઝ દરમિયાન સેપરેઝ દ્વારા કાપવામાં આવે છે", "C) કોહેસિન પ્રોટીન G1 તબક્કા દરમિયાન વર્ણસૂત્ર પર લાદવામાં આવે છે", "D) કોષવિભાજનના પ્રોફેઝ દરમિયાન કોહેસિન પ્રોટીન વર્ણસૂત્રની બાહ્ય શાખાઓ પરથી દૂર કરવામાં આવે છે, પરંતુ સેન્ટ્રોમિયર પર રહે છે"], "correct": 2, "explanation": "કોહેસિન પ્રોટીન બહેન ક્રોમેટિડ્સને એકસાથે બાંધી રાખવા માટે જવાબદાર છે. તે વર્ણસૂત્ર પર S તબક્કા દરમિયાન લાદવામાં આવે છે, G1 તબક્કા દરમિયાન નહીં, જેથી નવી નકલ થયેલી બહેન ક્રોમેટિડ્સ જોડાયેલી રહે. વિકલ્પ A સાચો છે કારણ કે કોહેસિન એનાફેઝ સુધી બહેન ક્રોમેટિડ્સને એકસાથે બાંધી રાખે છે. વિકલ્પ B સાચો છે કારણ કે સેપરેઝ એનાફેઝ દરમિયાન કોહેસિનને કાપે છે, જેથી બહેન ક્રોમેટિડ્સ અલગ થઈ શકે. વિકલ્પ D સાચો છે કારણ કે કોહેસિન પ્રોફેઝ દરમિયાન વર્ણસૂત્રની બાહ્ય શાખાઓ પરથી દૂર કરવામાં આવે છે, પરંતુ સેન્ટ્રોમિયર પર એનાફેઝ સુધી રહે છે. આમ, વિકલ્પ C ખોટું વિધાન છે.", "ncert_ref": "ધોરણ ૧૧ - પ્રકરણ ૧૦: કોષ ચક્ર અને કોષ વિભાજન", "difficulty": "કઠિન", "num": 53}, {"question": "કોષ ચક્રના એક પ્રયોગમાં, એક સંશોધક જોઈ રહ્યા છે કે મેટાફેઝ પ્લેટ પર સરખી રીતે ગોઠવાયેલા વર્ણસૂત્રો હોવા છતાં કોષ એનાફેઝમાં પ્રવેશી શકતું નથી. નીચેનામાંથી કયું સૌથી સંભવિત કારણ છે?", "options": ["A) સ્પિન્ડલ અસેમ્બલી ચેકપોઈન્ટ (SAC) નું નિષ્ક્રિય થવું", "B) સેક્યુરિનના વિઘટનમાં અસફળતા", "C) સાયક્લિન A-CDK2 ક્રિયાશીલતાનો અભાવ", "D) APC/C કોમ્પ્લેક્સનું અતિ સક્રિય થવું"], "correct": 1, "explanation": "મેટાફેઝથી એનાફેઝમાં સંક્રમણ માટે સેક્યુરિનના વિઘટનની જરૂર પડે છે, જે સેપરેઝને અટકાવે છે. એકવાર સેપરેઝ સક્રિય થાય છે, ત્યારે તે કોહેસિન પ્રોટીનને કાપે છે, જેથી બહેન ક્રોમેટિડ્સ અલગ થઈ શકે. જો સેક્યુરિન વિઘટિત ન થાય, તો સેપરેઝ નિષ્ક્રિય રહે છે અને કોષ એનાફેઝમાં પ્રવેશી શકતું નથી. વિકલ્પ A ખોટો છે કારણ કે SAC નું નિષ્ક્રિય થવું કોષને એનાફેઝમાં પ્રવેશવા દેશે, ભલે વર્ણસૂત્રો ગોઠવાયેલા ન હોય, પરંતુ આ કિસ્સામાં વર્ણસૂત્રો ગોઠવાયેલા છે. વિકલ્પ C ખોટો છે કારણ કે સાયક્લિન A-CDK2 આ સંક્રમણમ t_ref": "Class XI - Chapter 10: કોષ ચક્ર અને કોષ વિભાજન", "difficulty": "Hard", "num": 56}, {"question": "કોષચક્ર દરમિયાન, જો કોષમાં 'કોહેસિન' પ્રોટીનનું વિઘટન ન થાય તો નીચેનામાંથી કયું પરિણામ થશે?", "options": ["A) સિસ્ટર ક્રોમેટિડ્સ અલગ થશે નહીં અને એનાફેઝમાં કોષવિભાજન અટકી જશે", "B) મેટાફેઝ દરમિયાન ક્રોમોસોમ્સ મેટાફેઝ પ્લેટ પર ગોઠવાશે નહીં", "C) પ્રોફેઝ દરમિયાન કોષકેન્દ્રીય પડદો પુનઃરચના પામશે નહીં", "D) ટેલોફેઝ દરમિયાન કોષકેન્દ્રીય પડદો પુનઃરચના પામશે"], "correct": 0, "explanation": "કોહેસિન પ્રોટીન સિસ્ટર ક્રોમેટિડ્સને એકસાથે જકડી રાખે છે. જો તેનું વિઘટન ન થાય તો સિસ્ટર ક્રોમેટિડ્સ અલગ થશે નહીં, જેનાથી એનાફેઝમાં કોષવિભાજન અટકી જશે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) મેટાફેઝ પ્લેટ પર ક્રોમોસોમ્સની ગોઠવણ કોહેસિન પર આધારિત નથી, C) પ્રોફેઝ દરમિયાન કોષકેન્દ્રીય પડદાનું વિઘટન થાય છે, D) ટેલોફેઝ દરમિયાન કોષકેન્દ્રીય પડદો પુનઃરચના પામે છે, પરંતુ કોહેસિનનું વિઘટન એનાફેઝમાં જરૂરી છે.", "ncert_ref": "Class XI - Chapter 10: કોષ ચક્ર અને કોષ વિભાજન", "difficulty": "Hard", "num": 57}, {"question": "કોષચક્ર દરમિયાન, જો એક કોષમાં 'સાયક્લિન D-CDK4/6' કોમ્પ્લેક્સની સક્રિયતા અચાનક વધી જાય, તો નીચેનામાંથી કયું પરિણામ સૌથી યોગ્ય રીતે થશે?", "options": ["A) કોષ G1 તબક્કામાંથી તરત જ S તબક્કામાં પ્રવેશ કરશે, કારણ કે RB પ્રોટીનનું ફોસ્ફોરિલેશન થશે.", "B) કોષ G0 તબક્કામાં પ્રવેશ કરશે, કારણ કે p21 પ્રોટીનની સાંદ્રતા વધશે.", "C) કોષમાં DNA રેપ્લિકેશન અટકી જશે, કારણ કે p53 પ્રોટીન સક્રિય થશે.", "D) કોષમાં મિટોકોન્ડ્રિયલ વિભાજન થશે, કારણ કે સાયક્લિન D એટીપી સિંથેઝને ઉત્તેજિત કરશે."], "correct": 0, "explanation": "સાયક્લિન D-CDK4/6 કોમ્પ્લેક્સ RB પ્રોટીનને ફોસ્ફોરિલેટ કરે છે, જેનાથી RB એ2F ટ્રાન્સક્રિપ્શન ફેક્ટરને મુક્ત કરે છે. એ2F ટ્રાન્સક્રિપ્શન ફેક્ટર S તબક્કાના જીનને સક્રિય કરે છે, જેથી કોષ G1 તબક્કામાંથી S તબક્કામાં પ્રવેશ કરે. વિકલ્પ B ખોટો છે કારણ કે p21 પ્રોટીન સાયક્લિન-CDK કોમ્પ્લેક્સને અવરોધે છે, પરંતુ સાયક્લિન D-CDK4/6ની સક્રિયતા વધવાથી p21ની સાંદ્રતા ઘટે છે. વિકલ્પ C ખોટો છે કારણ કે p53 પ્રોટીન DNA નુકસાનના પ્રતિભાવમાં સક્રિય થાય છે, સાયક્લિન D-CDK4/6ની સક્રિયતાથી નહીં. વિકલ્પ D ax અને Puma ને સક્રિય કરે છે, જે એપોપ્ટોસિસને પ્રેરે છે. કારણ (R) એ દાવો (A)ની સરળ સમાજીવી સ્પષ્ટીકરણ છે, કારણ કે તે દાવો (A)ના મેકેનિઝમને સ્પષ્ટ કરે છે. વિકલ્પ B, C, અને D ખોટા છે કારણ કે તેઓ દાવો અને કારણના સંબંધને યોગ્ય રીતે વર્ણવતા નથી.", "ncert_ref": "Class XI - Chapter 10: કોષ ચક્ર અને કોષ વિભાજન", "difficulty": "Hard", "num": 60}, {"question": "એક સંશોધકે માનવ કોષોના સમૂહમાં કોષચક્રનું અવલોકન કર્યું અને નોંધ્યું કે કેટલાક કોષોમાં DNA રેપ્લિકેશન પૂર્ણ થયા પછી પણ કોષવિભાજન થતું નથી. આ પરિસ્થિતિમાં, નીચેનામાંથી કયું પ્રોટીન સક્રિય થઈને કોષને M તબક્કામાં પ્રવેશતા અટકાવે છે?", "options": ["A) p53 પ્રોટીન", "B) p21 પ્રોટીન", "C) વેઇ (Wee1) કાઇનેઝ", "D) સાયક્લિન B-CDK1 કોમ્પ્લેક્સ"], "correct": 2, "explanation": "સાચો જવાબ વિકલ્પ C છે. વેઇ (Wee1) કાઇનેઝ એ એક ઉત્સેચક છે જે CDK1 ને ફોસ્ફોરાયલેટ કરીને નિષ્ક્રિય કરે છે, જેનાથી કોષ M તબક્કામાં પ્રવેશતા અટકાવાય છે. DNA રેપ્લિકેશન પૂર્ણ થયા પછી પણ જો કોષવિભાજન ન થતું હોય, તો આ પ્રોટીનની સક્રિયતા મહત્વપૂર્ણ બને છે. p53 અને p21 પ્રોટીન DNA નુકસાનના પ્રતિભાવમાં સક્રિય થાય છે, જ્યારે સાયક્લિન B-CDK1 કોમ્પ્લેક્સ M તબક્કામાં પ્રવેશ માટે જરૂરી છે, તે અહીં અવરોધાય છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 10: કોષચક્ર અને કોષવિભાજન", "difficulty": "Hard", "num": 61}, {"question": "કોષચક્ર દરમિયાન, જો એક કોષમાં 'સાયક્લિન B-CDK1' કોમ્પ્લેક્સની સક્રિયતા G2 તબક્કામાં અચાનક વધી જાય, તો નીચેનામાંથી કયું પરિણામ સૌથી યોગ્ય રીતે ઘટશે?", "options": ["A) કોષ તરત જ M તબક્કામાં પ્રવેશ કરશે, પરંતુ વર્ણસૂત્રોનું સંપૂર્ણ પૃથક્કરણ થશે નહીં", "B) કોષ G2 તબક્કામાં જ અટકી જશે અને પાછળથી અપોપ્ટોસિસમાં જશે", "C) કોષમાં DNA રેપ્લિકેશન પુનરાવર્તિત થશે, પરંતુ M તબક્કામાં પ્રવેશ થશે નહીં", "D) કોષ M તબક્કામાં પ્રવેશ કરશે, પરંતુ મેટાફેઝ દરમિયાન સ્પિન્ડલ ફાઇબર્સનું નિર્માણ અટકી જશે"], "correct": 0, "explanation": "સાયક્લિન B-CDK1 કોમ્પ્લેક્સ (MPF) G2/M ચેકપોઈન્ટને પાર કરવા માટે જરૂરી છે. જો તેની સક્રિયતા G2માં અચાનક વધી જાય, તો કોષ M તબક્કામાં પ્રવેશ કરશે, પરંતુ વર્ણસૂત્રોનું પૃથક્કરણ (કોન્ડેન્સેશન) અને સ્પિન્ડલ ફાઇબર્સનું નિર્માણ પૂર્ણ થયા વિના જ M તબક્કામાં પ્ર         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
