<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - પ્રોટીન (Proteins)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 પ્રોટીન (Proteins)</span>
                <span>🎯 Hard</span>
                <span>📝 63 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "નીચેનામાંથી કયું વિધાન પ્રોટીનની ચતુર્થક (quaternary) રચના વિશે સાચું નથી?", "options": ["A) હીમોગ્લોબિનમાં ચતુર્થક રચના જોવા મળે છે, જેમાં બે α-સબયુનિટ અને બે β-સબયુનિટ હોય છે.", "B) ચતુર્થક રચનામાં પ્રોટીનના બહુવિધ પોલિપેપ્ટાઇડ શૃંખો એકબીજા સાથે હાઇડ્રોજન બંધો દ્વારા જોડાયેલા હોય છે.", "C) કોલેજનમાં ચતુર્થક રચના જોવા મળે છે, જેમાં ત્રણ પોલિપેપ્ટાઇડ શૃંખો ત્રિપલ હેલિક્સ બનાવે છે.", "D) ઇન્સ્યુલિનમાં ચતુર્થક રચના જોવા મળે છે, જેમાં A અને B શૃંખો ડાયસલ્ફાઇડ બંધો દ્વારા જોડાયેલા હોય છે."], "correct": 1, "explanation": "ચતુર્થક રચનામાં પ્રોટીનના બહુવિધ પોલિપેપ્ટાઇડ શૃંખો એકબીજા સાથે હાઇડ્રોજન બંધો, આયનિક બંધો, હાઇડ્રોફોબિક ઇન્ટરેક્શન અથવા ડાયસલ્ફાઇડ બંધો દ્વારા જોડાયેલા હોય છે. હીમોગ્લોબિન (A), કોલેજન (C) અને ઇન્સ્યુલિન (D)માં ચતુર્થક રચના જોવા મળે છે, પરંતુ હાઇડ્રોજન બંધો એ એકમાત્ર બંધ નથી. વિકલ્પ B ખોટો છે કારણ કે તે હાઇડ્રોજન બંધોને એકમાત્ર બંધ તરીકે દર્શાવે છે.", "ncert_ref": "Class XII - પ્રકરણ 9: જૈવ અણુઓ અને પોલિમર", "difficulty": "Hard", "num": 1}, {"question": "એક પ્રોટીનની પ્રાથમિક રચનામાં અમીનો એસિડની ક્રમબદ્ધતા ઉત્પન્ન કરવા માટે કયા અણુ જવાબદાર છે?", "options": ["A) rRNA", "B) tRNA", "C) mRNA", "D) snRNA"], "correct": 2, "explanation": "mRNA (મેસેઞ્જર RNA) એ DNA પરથી અનુવંશિક માહિતી લાવે છે અને રાઇબોઝોમ પર અમીનો એસિડની ક્રમબદ્ધતા નક્કી કરે છે. rRNA (A) રાઇબોઝોમની રચના કરે છે, tRNA (B) અમીનો એસિડને રાઇબોઝોમ સુધી લાવે છે, અને snRNA (D) RNA સ્પ્લાઇસિંગમાં ભાગ લે છે. મુખ્ય જવાબદાર mRNA છે.", "ncert_ref": "Class XII - પ્રકરણ 6: અણુ વંશાવળી અને વંશાવળીના અભ્યાસ", "difficulty": "Hard", "num": 2}, {"question": "નીચેનામાંથી કયું પ્રોટીન ઉત્સેચક નથી?", "options": ["A) એમિલેઝ", "B) પેપ્સિન", "C) હીમોગ્લોબિન", "D) ટ્રિપ્સિન"], "correct": 2, "explanation": "એમિલેઝ (A), પેપ્સિન (B) અને ટ્રિપ્સિન (D) એ ઉત્સેચકો છે જે અનુક્રમે કાર્બોદિત, પ્રોટીન અને પ્રોટીનના પાચનમાં ભાગ લે છે. હીમોગ્લોબિન (C) એ રક્તમાં ઓક્સિજન વહન કરનાર પ્રોટીન છે, ઉત્સેચક નથી.", "ncert_ref": "Class XI - પ્રકરણ 9: પાચન અને શોષણ", "difficulty": "Hard", "num": 3}, {"question": "પ્રોટીનની દ્વિતીયક રચનામાં આલ્ફા-હેલિક્સ અને બીટા-પ્લીટેડ શીટની રચના કયા બંધો દ્વારા થાય છે?", "options": ["A) પેપ્ટાઇડ બંધો", "B) હાઇડ્રોજન બંધો", "C) ડાયસલ્ફાઇડ બંધો", "D) આયનિક બંધો"], "correct": 1, "explanation": "પ્રોટીનની દ્વિતીયક રચનામાં આલ્ફા-હેલિક્સ અને બીટા-પ્લીટેડ શીટની રચના હાઇડ્રોજન બંધો દ્વારા થાય છે. પેપ્ટાઇડ બંધો (A) પ્રાથમિક રચનામાં જોવા મળે છે, ડાયસલ્ફાઇડ બંધો (C) તૃતીયક રચનામાં જોવા મળે છે, અને આયનિક બંધો (D) ચતુર્થક રચનામાં જોવા મળી શકે છે.", "ncert_ref": "Class XII - પ્રકરણ 9: જૈવ અણુઓ અને પોલિમર", "difficulty": "Hard", "num": 4}, {"question": "નીચેનામાંથી કયું વિધાન પ્રોટીનના વર્ગીકરણ વિશે સાચું છે?", "options": ["A) સરળ પ્રોટીનમાં ફક્ત અમીનો એસિડ જ હોય છે, જ્યારે સંયુગ્મ પ્રોટીનમાં અમીનો એસિડ સિવાય અન્ય જૂથો પણ હોય છે.", "B) ફાઇબ્રસ પ્રોટીન પાણીમાં દ્રાવ્ય હોય છે, જ્યારે ગ્લોબ્યુલર પ્રોટીન પાણીમાં અદ્રાવ્ય હોય છે.", "C) એલ્બ્યુમિન અને ગ્લોબ્યુલિન એ ફાઇબ્રસ પ્રોટીનના ઉદાહરણો છે.", "D) હીમોગ્લોબિન એ સરળ પ્રોટીન છે."], "correct": 0, "explanation": "સરળ પ્રોટીન (simple protein)માં ફક્ત અમીનો એસિડ જ હોય છે, જ્યારે સંયુગ્મ પ્રોટીન (conjugated protein)માં અમીનો એસિડ સિવાય અન્ય જૂથો (જેમ કે હીમ, લિપિડ, કાર્બોદિત) પણ હોય છે. વિકલ્પ A સાચો છે. વિકલ્પ B ખોટો છે કારણ કે ફાઇબ્રસ પ્રોટીન પાણીમાં અદ્રાવ્ય હોય છે, જ્યારે ગ્લોબ્યુલર પ્રોટીન પાણીમાં દ્રાવ્ય હોય છે. વિકલ્પ C ખોટો છે કારણ કે એલ્બ્યુમિન અને ગ્લોબ્યુલિન ગ્લોબ્યુલર પ્રોટીનના ઉદાહરણો છે. વિકલ્પ D ખોટો છે કારણ કે હીમોગ્લોબિન સંયુગ્મ પ્રોટીન છે (હીમ જૂથ ધરાવે છે).", "ncert_ref": "Class XII - પ્રકરણ 9: જૈવ અણુઓ અને પોલિમર", "difficulty": "Hard", "num": 5}, {"question": "નીચેનામાંથી કયું પ્રોટીન તેની કામગીરી દરમિયાન આત્મ-વિભાજન (self-cleavage) પામે છે?", "options": ["A) હીમોગ્લોબિન", "B) કોલેજન", "C) ઇન્સ્યુલિન", "D) કેથેપ્સિન"], "correct": 3, "explanation": "કેથેપ્સિન એક પ્રોટીયોલિટિક ઉત્સેચક છે જે તેની કામગીરી દરમિયાન આત્મ-વિભાજન પામે છે, જેથી તે સક્રિય રૂપમાં આવે. હીમોગ્લોબિન, કોલેજન અને ઇન્સ્યુલિન એવા પ્રોટીન છે જે આત્મ-વિભાજન પામતા નથી. હીમોગ્લોબિન ઓક્સિજન વહન કરે છે, કોલેજન સંયોજક પ , {"question": "નીચેનામાંથી કયું પ્રોટીન તેની રચનામાં ડિસલ્ફાઇડ બંધો ધરાવે છે અને તે પાચનતંત્રમાં કામ કરે છે?", "options": ["A) એમિલેઝ", "B) લાઇપેઝ", "C) પેપ્સિન", "D) કાયમોટ્રિપ્સિન"], "correct": 2, "explanation": "પેપ્સિન એક પ્રોટીયોલિટિક ઉત્સેચક છે જે પાચનતંત્રમાં કામ કરે છે અને તેની રચનામાં ડિસલ્ફાઇડ બંધો ધરાવે છે. એમિલેઝ કાર્બોદિતના પાચનમાં, લાઇપેઝ ચરબીના પાચનમાં, અને કાયમોટ્રિપ્સિન પ્રોટીનના પાચનમાં ભાગ લે છે, પરંતુ તે ડિસલ્ફાઇડ બંધો ધરાવતા નથી.", "ncert_ref": "Class XII - Chapter 9: જૈવ-અણુઓ અને વર્ગીકરણ", "difficulty": "Hard", "num": 10}, {"question": "નીચેનામાંથી કયું પ્રોટીન તેની ક્રિયાશીલ સ્થિતિમાં હાઇડ્રોફોબિક આંતરક્રિયાઓ દ્વારા સ્થિર થાય છે અને પાણીના અણુઓ સાથે સીધી આંતરક્રિયા કરતું નથી?", "options": ["A) હીમોગ્લોબિન", "B) માયોગ્લોબિન", "C) ઇન્સ્યુલિન", "D) કેરેટિન"], "correct": 3, "explanation": "કેરેટિન (D) એક રચનાત્મક પ્રોટીન છે જે વાળ અને નખમાં જોવા મળે છે. તે હાઇડ્રોફોબિક આંતરક્રિયાઓ દ્વારા સ્થિર થાય છે અને પાણી સાથે સીધી આંતરક્રિયા કરતું નથી, કારણ કે તેની રચના મુખ્યત્વે બીટા-શીટ્સ ધરાવે છે જે હાઇડ્રોફોબિક અમીનો એસિડની શૃંખલાઓ દ્વારા સ્થિર થાય છે. હીમોગ્લોબિન (A) અને માયોગ્લોબિન (B) પાણીમાં દ્રાવ્ય છે અને હાઇડ્રોફિલિક આંતરક્રિયાઓ દ્વારા સ્થિર થાય છે. ઇન્સ્યુલિન (C) પણ પાણીમાં દ્રાવ્ય છે અને તેની ક્રિયાશીલતા માટે હાઇડ્રોફિલિક વાતાવરણની જરૂર પડે છે.", "ncert_ref": "Class XII - Chapter 9: જૈવ અણુઓ અને પ્રક્રિયાઓ", "difficulty": "Hard", "num": 11}, {"question": "એક પ્રોટીનની તૃતીયક રચનામાં, નીચેનામાંથી કયું પરિબળ સૌથી વધુ મહત્વનું છે જ્યારે પ્રોટીન તેની ક્રિયાશીલ સ્થિતિમાં ફોલ્ડ થાય છે?", "options": ["A) હાઇડ્રોજન બંધોની સંખ્યા", "B) આંતરિક હાઇડ્રોફોબિક આંતરક્રિયાઓ", "C) ડિસલ્ફાઇડ બંધોની હાજરી", "D) આયનિક બંધોની હાજરી"], "correct": 1, "explanation": "તૃતીયક રચનામાં, આંતરિક હાઇડ્રોફોબિક આંતરક્રિયાઓ (B) સૌથી મહત્વનું પરિબળ છે, કારણ કે તે પ્રોટીનની શૃંખલાને ફોલ્ડ થવા અને તેની ક્રિયાશીલ સ્થિતિમાં સ્થિર થવા માટે પ્રેરે છે. હાઇડ્રોજન બંધો (A) દ્વિતીયક રચનામાં મહત્વના છે, પરંતુ તૃતીયક રચનામાં તે આંતરિક હાઇડ્રોફોબિક આંતરક્રિયાઓ જેટલા મહત્વના નથી. ડિસલ્ફાઇડ બંધો (C) અને આયનિક બંધો (D) પણ મહત્વના છે, પરંતુ તે તૃતીયક રચનાને સ્થિર કરવામાં આંતરિક હાઇડ્રોફોબિક આંતરક્રિયાઓ જેટલા મહત્વના નથી.", "ncert_ref": "Class XII - Chapter 9: જૈવ અણુઓ અને પ્રક્રિયાઓ", "difficulty": "Hard", "num": 12}, {"question": "નીચેનામાંથી કયું પ્રોટીન તેની કામગીરી દરમિયાન કોઈ પણ પ્રકારના કોફેક્ટર અથવા કોએન્ઝાઇમની જરૂરિયાત ધરાવતું નથી?", "options": ["A) હેક્સોકિનેઝ", "B) લેક્ટેઝ", "C) રાઇબોન્યુક્લિએઝ", "D) કેટલેઝ"], "correct": 2, "explanation": "રાઇબોન્યુક્લિએઝ (C) એક ઉત્સેચક છે જે RNA ને તોડવા માટે કોઈ કોફેક્ટર અથવા કોએન્ઝાઇમની જરૂરિયાત ધરાવતું નથી. હેક્સોકિનેઝ (A) Mg²⁺ આયનને કોફેક્ટર તરીકે વાપરે છે, લેક્ટેઝ (B) કોઈ કોફેક્ટર વાપરતું નથી પરંતુ તે એક ગ્લાઇકોપ્રોટીન છે, અને કેટલેઝ (D) હીમ ગ્રુપને કોફેક્ટર તરીકે વાપરે છે.", "ncert_ref": "Class XI - Chapter 9: કોષ અને તેના કામગીરી", "difficulty": "Hard", "num": 13}, {"question": "નીચેનામાંથી કયું વિધાન પ્રોટીનની ડીનેચરેશન પ્રક્રિયા વિશે સાચું નથી?", "options": ["A) ડીનેચરેશન પ્રક્રિયા ઉચ્ચ તાપમાને થાય છે", "B) ડીનેચરેશન પ્રક્રિયા પીએચમાં અચાનક ફેરફાર થવા પર થાય છે", "C) ડીનેચરેશન પ્રક્રિયા પ્રોટીનની પ્રાથમિક રચનાને બદલે છે", "D) ડીનેચરેશન પ્રક્રિયા પ્રોટીનની ક્રિયાશીલતાને નષ્ટ કરે છે"], "correct": 2, "explanation": "ડીનેચરેશન પ્રક્રિયા પ્રોટીનની પ્રાથમિક રચનાને બદલતી નથી (C), પરંતુ તે દ્વિતીયક, તૃતીયક, અને ચતુર્થક રચનાને નષ્ટ કરે છે. ડીનેચરેશન ઉચ્ચ તાપમાન (A), પીએચમાં અચાનક ફેરફાર (B), અને પ્રોટીનની ક્રિયાશીલતાને નષ્ટ કરે છે (D).", "ncert_ref": "Class XII - Chapter 9: જૈવ અણુઓ અને પ્રક્રિયાઓ", "difficulty": "Hard", "num": 14}, {"question": "એક સંશોધકને એક નવું પ્રોટીન મળ્યું છે જેનું આણ્વિક વજન લગભગ 66 kDa છે અને તેની રચનામાં ચાર સમાન પોલિપેપ્ટાઇડ શૃંખલાઓ ધરાવે છે. આ પ્રોટીનની ચતુર્થક રચના વિશે નીચેનામાંથી કયું વિધાન અયોગ્ય છે?", "options": ["A) આ પ્રોટીનની દરેક પોલિપેપ્ટાઇડ શૃંખલા તેની પોતાની તૃતીયક રચના ધરાવે છે અને તેને 'પ્રોટોમર' કહેવાય છે.", "B) આ પ્રોટીનની ચતુર્થક રચનામાં હાઇડ્રોજન બંધો, આયનિક બંધો અને હાઇડ્રોફોબિક આંતરક્રિયાઓ મુખ્ય ભૂમિકા ભજવે છે, પરંતુ ડિસલ્ફાઇડ બંધો હંમેશા હાજર હોતા નથી.", "C) આ પ્ ાઓ (Biomolecules and Processes)", "difficulty": "Hard", "num": 33}, {"question": "એક પ્રોટીનની ડીનેચરેશન પ્રક્રિયા દરમિયાન, જ્યારે pH ને અતિ આમ્લીય અથવા અતિ ક્ષારીય બનાવવામાં આવે છે, ત્યારે નીચેનામાંથી કયું પરિબળ સૌથી પહેલા અસર કરે છે?", "options": ["A) હાઇડ્રોજન બંધો", "B) આયનિક આંતરક્રિયાઓ", "C) હાઇડ્રોફોબિક આંતરક્રિયાઓ", "D) પેપ્ટાઇડ બંધો"], "correct": 1, "explanation": "ડીનેચરેશન દરમિયાન, pH ને અતિ આમ્લીય અથવા અતિ ક્ષારીય બનાવવાથી સૌપ્રથમ આયનિક આંતરક્રિયાઓ (B) અસર પામે છે, કારણ કે આ આંતરક્રિયાઓ અમીનો એસિડના આયનિક ગ્રુપો (જેમ કે -COO⁻ અને -NH₃⁺) પર આધાર રાખે છે, જે pH ના ફેરફારથી પ્રભાવિત થાય છે. હાઇડ્રોજન બંધો (A) અને હાઇડ્રોફોબિક આંતરક્રિયાઓ (C) વધુ સ્થિર હોય છે અને પાછળથી અસર પામે છે. પેપ્ટાઇડ બંધો (D) ડીનેચરેશન દરમિયાન તૂટતા નથી, કારણ કે તેઓ સહસંયોજક બંધો હોય છે અને મજબૂત હોય છે.", "ncert_ref": "Class XII - Chapter 9: જૈવ અણુઓ અને પ્રક્રિયાઓ", "difficulty": "Hard", "num": 34}, {"question": "એક સંશોધકે એક નવું પ્રોટીન અલગ કર્યું છે જેનું આણ્વિક વજન લગભગ 150 kDa છે અને તેની ક્રિયાશીલતા માટે કોઈપણ પ્રકારના ધાતુ આયન અથવા કોફેક્ટરની જરૂરિયાત નથી. આ પ્રોટીનની ચતુર્થક રચનામાં ચાર સમાન પોલિપેપ્ટાઇડ શૃંખલાઓ છે. જ્યારે આ પ્રોટીનને 8M યુરિયા સાથે સારવાર આપવામાં આવે છે, ત્યારે તેની ક્રિયાશીલતા સંપૂર્ણપણે નષ્ટ થઈ જાય છે, પરંતુ જ્યારે યુરિયાને દૂર કરવામાં આવે છે, ત્યારે તેની મૂળ ક્રિયાશીલતા પુનઃસ્થાપિત થાય છે. નીચેનામાંથી કયું વિધાન આ પ્રોટીનની લાક્ષણિકતાઓ સાથે સુસંગત નથી?", "options": ["A) આ પ્રોટીનની ચતુર્થક રચના હાઇડ્રોજન બંધો અને આયનિક આંતરક્રિયાઓ દ્વારા સ્થિર થાય છે, જે યુરિયા દ્વારા વિક્ષેપિત થાય છે પરંતુ યુરિયા દૂર કર્યા પછી પુનઃસ્થાપિત થાય છે.", "B) આ પ્રોટીનની દરેક પોલિપેપ્ટાઇડ શૃંખલા સ્વતંત્ર રીતે ક્રિયાશીલ હોઈ શકે છે, પરંતુ ચતુર્થક રચનામાં તેની ક્રિયાશીલતા વધુ કાર્યક્ષમ બને છે.", "C) આ પ્રોટીનની ડીનેચરેશન પ્રક્રિયા દરમિયાન તેની પ્રાથમિક રચના અકબંધ રહે છે, જેનાથી રેનેચરેશન શક્ય બને છે.", "D) આ પ્રોટીનની ચતુર્થક રચનામાં ડિસલ્ફાઇડ બંધોની હાજરી જરૂરી છે, જે યુરિયા દ્વારા તૂટી જાય છે પરંતુ યુરિયા દૂર કર્યા પછી પુનઃસ્થાપિત થાય છે."], "correct": 3, "explanation": "સાચો ી, તે હાઇડ્રોજન બંધો અને કોવેલન્ટ બંધો પર આધાર રાખે છે.", "ncert_ref": "Class XI - Chapter 9: જૈવ અણુઓ અને બાયોપોલિમર્સ", "difficulty": "Hard", "num": 62}, {"question": "એક પ્રોટીન જે તેની ક્રિયાશીલ સ્થિતિમાં કોલેજન જેવી રચના ધરાવે છે અને તેની રચનામાં ગ્લાઇસિન અને પ્રોલાઇન અમીનો એસિડની વિશેષ હાજરી જોવા મળે છે, તે નીચેનામાંથી કયું હોવું જોઈએ?", "options": ["A) હિમોગ્લોબિન", "B) કેરેટિન", "C) કોલેજન", "D) માયોસિન"], "correct": 2, "explanation": "કોલેજન એ એકમાત્ર પ્રોટીન છે જે કોલેજન જેવી રચના ધરાવે છે અને ગ્લાઇસિન અને પ્રોલાઇનની વિશેષ હાજરી ધરાવે છે. હિમોગ્લોબિન (A) ગ્લોબ્યુલર પ્રોટીન છે, કેરેટિન (B) ક્રસ્ટેસિયસ પ્રોટીન છે, અને માયોસિન (D) મસલ પ્રોટીન છે, જે કોલેજન જેવી રચના ધરાવતું નથી.", "ncert_ref": "Class XII - Chapter 9: જૈવ-અણુઓ અને પોલિમર", "difficulty": "Hard", "num": 63}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
