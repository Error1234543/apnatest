    <style>

        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}

        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}

        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}

        .btn-secondary{background:#6b7280}

        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}

        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}

    <script>
        const questionsData = [{"question": "કોષના સિદ્ધાંત અનુસાર, 'સજીવના શરીરના બધા કોષો એક જ પ્રકારના પૂર્વજ કોષમાંથી ઉત્પન્ન થાય છે' આ વિધાન કયા વૈજ્ઞાનિક સાથે સંકળાયેલ છે?", "options": ["A) રોબર્ટ હૂક", "B) રુડોલ્ફ વિર્ચો", "C) થિયોડોર શ્વાન", "D) લુઈ પાશ્ચર"], "correct": 1, "explanation": "રુડોલ્ફ વિર્ચો (Rudolf Virchow) એ 'Omnis cellula e cellula' (બધા કોષો કોષમાંથી ઉત્પન્ન થાય છે) આ સિદ્ધાંત આપ્યો હતો. રોબર્ટ હૂકે કોષની શોધ કરી હતી, થિયોડોર શ્વાને કોષસિદ્ધાંતનું પ્રથમ વિધાન આપ્યું હતું, જ્યારે લુઈ પાશ્ચર કિટાણુશાસ્ત્ર સાથે સંકળાયેલ છે.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનની મૂળભૂત એકમ", "difficulty": "Hard", "num": 1}, {"question": "એક કોષીય સજીવમાં કયું લક્ષણ જોવા મળતું નથી?", "options": ["A) પ્રજનન માટે કોષવિભાજન", "B) વર્ણસૂત્રોની હાજરી", "C) અંગો અને પેશીઓની રચના", "D) ચયાપચય ક્રિયાઓનું નિયમન"], "correct": 2, "explanation": "એક કોષીય સજીવો (જેવા કે અમીબા, પેરામીશિયમ)માં અંગો અને પેશીઓની રચના થતી નથી. તેઓ કોષવિભાજન દ્વારા પ્રજનન કરે છે, વર્ણસૂત્રો ધરાવે છે, અને ચયાપચય ક્રિયાઓનું નિયમન કરે છે.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનની મૂળભૂત એકમ", "difficulty": "Hard", "num": 2}, {"question": "કોષકેન્દ્ર રહિત કોષોની ઉદાહરણમાં કયું સજીવ સામેલ નથી?", "options": ["A) લાલ રક્તકણ", "B) રાઇબોઝોમ", "C) પ્લેટલેટ્સ", "D) બેક્ટેરિયા"], "correct": 1, "explanation": "રાઇબોઝોમ કોષઅંગિકા છે, કોષ નથી. લાલ રક્તકણ, પ્લેટલેટ્સ, અને બેક્ટેરિયા (પ્રોકેરિયોટિક) કોષકેન્દ્ર રહિત કોષો છે.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનની મૂળભૂત એકમ", "difficulty": "Hard", "num": 3}, {"question": "કોષના કયા ઘટકમાં DNA-આરએનએ નહીં પણ પ્રોટીન અને કાર્બોદિત જોવા મળે છે?", "options": ["A) કોષકેન્દ્ર", "B) માઇટોકોન્ડ્રિયા", "C) રાઇબોઝોમ", "D) ગોલ્ગી ઉપકરણ"], "correct": 2, "explanation": "રાઇબોઝોમમાં DNA-આરએનએ નહીં પણ પ્રોટીન (અમિનોએસિડ) અને rRNA (રાઇબોઝોમલ RNA) જોવા મળે છે. કોષકેન્દ્ર, માઇટોકોન્ડ્રિયા, અને ગોલ્ગી ઉપકરણમાં DNA અથવા RNA હાજર હોય છે.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનની મૂળભૂત એકમ", "difficulty": "Hard", "num": 4}, {"question": "કોષના સિદ્ધાંત અનુસાર, 'કોષ એ સજીવનો રચનાત્મક અને ક્રિયાત્મક એકમ છે' આ વિધાન કયા વૈજ્ઞાનિકે આપ્યું હતું?", "options": ["A) રોબર્ટ બ્રાઉન", "B) થિયોડોર શ્વાન", "C) રોબર્ટ હૂક", "D) એન્ટોન વેન લ્યુવેનહોક"], "correct": 1, "explanation": "થિયોડોર શ્વાન (Theodor Schwann) એ 1839માં કોષસિદ્ધાંતનું પ્રથમ વિધાન આપ્યું હતું કે 'કોષ એ સજીવનો રચનાત્મક અને ક્રિયાત્મક એકમ છે'. રોબર્ટ હૂકે કોષની શોધ કરી હતી, રોબર્ટ બ્રાઉનએ કોષકેન્દ્રની શોધ કરી હતી, અને એન્ટોન વેન લ્યુવેનહોક માઇક્રોસ્કોપના પિતા તરીકે ઓળખાય છે.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનની મૂળભૂત એકમ", "difficulty": "Hard", "num": 5}, {"question": "નીચેનામાંથી કયો કોષીય ઘટક સજીવના મૂળભૂત જીવન ચક્રમાં સીધો ભાગ ભજવતો નથી, પરંતુ અન્ય કોષીય ક્રિયાઓને નિયંત્રિત કરવામાં મદદ કરે છે?", "options": ["A) વર્ણસૂત્ર", "B) કોષકેન્દ્ર", "C) રાઇબોઝોમ", "D) ગોલ્ગી ઉપકરણ"], "correct": 3, "explanation": "ગોલ્ગી ઉપકરણ સીધો જીવન ચક્રમાં ભાગ ભજવતું નથી, પરંતુ તે પ્રોટીન અને લિપિડના સંશ્લેષણ, પેકેજિંગ અને પરિવહનમાં મહત્વની ભૂમિકા ભજવે છે. વર્ણસૂત્ર (A) અનુવંશિકતામાં, કોષકેન્દ્ર (B) કોષના નિયંત્રણ અને વંશવેલામાં, રાઇબોઝોમ (C) પ્રોટીન સંશ્લેષણમાં સીધો ભાગ ભજવે છે.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનનો મૂળભૂત એકમ", "difficulty": "Hard", "num": 6}, {"question": "જો એક કોષમાં કોષકેન્દ્ર હાજર ન હોય, તો નીચેનામાંથી કયું લક્ષણ અવશ્ય ગેરહાજર રહેશે?", "options": ["A) પ્રકાશસંશ્લેષણ", "B) શ્વસન", "C) પ્રજનન", "D) ઉત્સર્જન"], "correct": 2, "explanation": "કોષકેન્દ્ર રહિત કોષો (જેમ કે રક્તકણ) પ્રજનન કરી શકતા નથી, કારણ કે વંશવેલા માટે વર્ણસૂત્રની જરૂર પડે છે, જે કોષકેન્દ્રમાં જોવા મળે છે. પ્રકાશસંશ્લેષણ (A) હરિતકણમાં, શ્વસન (B) માઇટોકોન્ડ્રિયામાં, ઉત્સર્જન (D) કોષરસમાં થઈ શકે છે.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનનો મૂળભૂત એકમ", "difficulty": "Hard", "num": 7}, {"question": "નીચેનામાંથી કયો કોષીય ઘટક સજીવના ઉત્ક્રાંતિ અને અનુવંશિકતામાં સીધો ભાગ ભજવતો નથી?", "options": ["A) DNA", "B) જનીન", "C) રાઇબોઝોમ", "D) વર્ણસૂત્ર"], "correct": 2, "explanation": "રાઇબોઝોમ (C) પ્રોટીન સંશ્લેષણમાં ભાગ ભજવે છે, પરંતુ ઉત્ક્રાંતિ અને અનુવંશિકતામાં સીધો ભાગ ભજ નન દ્વારા વંશપરંપરા કોષકેન્દ્ર રહિત કોષોમાં પણ થઈ શકે છે, પરંતુ તે વંશપરંપરાગત અનુવંશિકતા નથી. વિકલ્પ C ખોટો છે કારણ કે વર્ણસૂત્રો કોષકેન્દ્રમાં જોવા મળે છે. વિકલ્પ D ખોટો છે કારણ કે કોષવિભાજન દ્વારા વૃદ્ધિ કોષકેન્દ્ર રહિત કોષોમાં પણ થઈ શકે છે, પરંતુ તે સરળતાથી ચાલુ રહેતી નથી.", "ncert_ref": "Class XI - Chapter 8: કોષ: જીવનનો મૂળભૂત એકમ", "difficulty": "Hard", "num": 19}, {"question": "નીચેના વિધાનો ધ્યાનમાં લો:\n1. કોષ એ સજીવનો મૂળભૂત રચનાત્મક અને ક્રિયાત્મક એકમ છે.\n2. બધા કોષોનું નિર્માણ પૂર્વ અસ્તિત્વ ધરાવતા કોષોમાંથી થાય છે.\n3. વાઇરસને કોષ ગણી શકાય કારણ કે તેમાં આનુવંશિક દ્રવ્ય (DNA અથવા RNA) હોય છે.\n4. કોષની ઉત્પત્તિ અજૈવિક પદાર્થોમાંથી થઈ શકે છે, જેને સ્વયંજનન કહે છે.\n\nઉપરોક્ત વિધાનોમાંથી કયું/કયાં વિધાન કોષના સિદ્ધાંત અને તેની વ્યાખ્યા સાથે સુસંગત નથી?", "options": ["A) માત્ર 3 અને 4", "B) માત્ર 1 અને 2", "C) માત્ર 3", "D) માત્ર 2 અને 4"], "correct": 0, "explanation": "સાચો જવાબ વિકલ્પ A (માત્ર 3 અને 4) છે.\n\nકારણ:\n- વિધાન 1 અને 2 કોષના સિદ્ધાંત સાથે સુસંગત છે. NCERT (કક્ષા XI - પ્રકરણ 8: કોષ: જીવનનો એકમ) મુજબ, કોષ સજીવનો મૂળભૂત રચનાત્મક અને ક્રિયાત્મક એકમ છે, અને બધા કોષોનું નિર્માણ પૂર્વ અસ્તિત્વ ધરાવતા કોષોમાંથી થાય છે.\n\n- વિધાન 3 ખોટું છે કારણ કે વાઇરસને કોષ ગણી શકાય નહીં. વાઇરસમાં કોષીય સંરચના (જેમ કે કોષરસપટલ, રાઇબોઝોમ્સ, ચયાપચયિક ક્રિયાઓ) હોતી નથી અને તે સ્વતંત્ર રીતે પ્રજનન કરી શકતા નથી. તેઓ યજમાન કોષ પર આધારિત હોય છે, તેથી તેમને સજીવ તરીકે પણ સંપૂર્ણ રીતે સ્વીકારી શકાતા નથી (NCERT કક્ષા XI - પ્રકરણ 2: જૈવિક વર્ગીકરણ).\n\n- વિધાન 4 ખોટું છે કારણ કે કોષની ઉત્પત્તિ અજૈવિક પદાર્થોમાંથી થઈ શકે છે તેવું સ્વયંજનન (Abiogenesis) આધુનિક કોષીય સિદ્ધાંતમાં સ્વીકાર્ય નથી. આધુનિક વિજ્ઞાન મુજબ, જીવનની ઉત્પત્તિ રાસાયણિક ઉત્ક્રાંતિ દ્વારા થઈ હતી, પરંતુ કોષનું નિર્માણ હંમેશા પૂર્વ અસ્તિત્વ ધરાવતા કોષોમાંથી થાય છે (NCERT કક્ષા XII - પ્રકરણ 7: ઉત્ક્રાંતિ).", "ncert_ref": "કક્ષા XI - પ્રકરણ 8: કોષ: જીવનનો એકમ; કક્ષા XI - પ્રકરણ 2: જૈવિક વર્ગીકરણ; કક્ષા XII - પ્રકરણ 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 20}, {"question": "નીચેનામાંથી કયો કોષીય ઘટક, કોષના આ nation": "વિકલ્પ B સૌથી યોગ્ય છે કારણ કે તે કોષની વ્યાખ્યા સ્પષ્ટ કરે છે અને પ્રોકેરિયોટ્સ (જેમ કે જીવાણુઓ) જેવા અપવાદોને પણ ધ્યાનમાં લે છે, જ્યાં કોષકેન્દ્ર હાજર ન હોવા છતાં જીવન ચાલુ રહે છે. વિકલ્પ A ખોટો છે કારણ કે વાઇરસને સજીવ ગણવામાં આવતા નથી. વિકલ્પ C ખોટો છે કારણ કે પ્રોકેરિયોટ્સ કોષકેન્દ્ર વિના જીવિત રહી શકે છે. વિકલ્પ D અપૂર્ણ છે કારણ કે કોષકેન્દ્રની ભૂમિકાને અવગણવામાં આવી છે, જે યુકેરિયોટ્સમાં મહત્વપૂર્ણ છે.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનનો મૂળભૂત એકમ", "difficulty": "Hard", "num": 23}, {"question": "એક કોષીય સજીવમાં, નીચેનામાંથી કયું લક્ષણ કોષકેન્દ્રની ગેરહાજરીમાં પણ સરળતાથી ચાલુ રહી શકે છે, પરંતુ તેના માટે કોષરસમાં હાજર એનઝાઇમ્સ અને રચનાઓની જરૂર પડે છે?", "options": ["A) પ્રજનન અને વંશવેલા", "B) પ્રકાશસંશ્લેષણ અને શ્વસન", "C) ઉત્ક્રાંતિ અને અનુવંશિકતા", "D) હોર્મોન ઉત્પાદન અને સંગ્રહ"], "correct": 1, "explanation": "વિકલ્પ B સૌથી યોગ્ય છે કારણ કે પ્રકાશસંશ્લેષણ (જેમ કે સાયનોબેક્ટીરિયામાં) અને શ્વસન (જેમ કે જીવાણુઓમાં) કોષકેન્દ્ર વિના પણ થઈ શકે છે, પરંતુ તેના માટે કોષરસમાં હાજર એનઝાઇમ્સ અને રચનાઓ (જેમ કે રાઇબોઝોમ્સ અને થાઇલેકોઇડ્સ)ની જરૂર પડે છે. વિકલ્પ A ખોટો છે કારણ કે પ્રજનન અને વંશવેલા માટે કોષકેન્દ્રની જરૂર પડે છે. વિકલ્પ C ખોટો છે કારણ કે ઉત્ક્રાંતિ અને અનુવંશિકતા માટે DNAની યોગ્ય વહેંચણી અને નિયંત્રણની જરૂર પડે છે, જે કોષકેન્દ્ર વિના અશક્ય છે. વિકલ્પ D ખોટો છે કારણ કે હોર્મોન ઉત્પાદન અને સંગ્રહ માટે કોષકેન્દ્રની ભૂમિકા મહત્વપૂર્ણ છે.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનનો મૂળભૂત એકમ", "difficulty": "Hard", "num": 24}, {"question": "નીચેના વિધાનો ધ્યાનમાં લો અને યોગ્ય વિકલ્પ પસંદ કરો:\n1. વાઇરસને કોષ ગણી શકાય નહીં, કારણ કે તે સ્વતંત્ર ચયાપચય ધરાવતા નથી.\n2. વાઇરસમાં ન્યુક્લિક એસિડ (DNA અથવા RNA) હાજર હોય છે, જે કોષની વ્યાખ્યામાં સમાવિષ્ટ છે.\n3. વાઇરસ સજીવ કોષની બહાર સ્ફટિક સ્વરૂપે અસ્તિત્વ ધરાવી શકે છે, જે કોષના લક્ષણોથી વિપરીત છે.\n4. વાઇરસ પ્રજનન માટે યજમાન કોષ પર આધારિત હોય છે, જે કોષની સ્વતંત્ર પ્રજનન ક્ષમતાને નકારે છે.", "options": ["A) વિધાન 1, 2 અને 3 સાચાં છે, પરંતુ 4 ખોટું છે", "B) વિધાન 1, 3 અને 4 સાચાં છે, પરંતુ rt_ref": "Class XI - Chapter 8: કોષ: જીવનનો મૂળભૂત એકમ", "difficulty": "Hard", "num": 27}, {"question": "નીચેના વિધાનો ધ્યાનમાં લો અને યોગ્ય વિકલ્પ પસંદ કરો:\n1. કોષ એ સજીવનો મૂળભૂત એકમ છે, પરંતુ કેટલાક સજીવો કોષીય સંરચના ધરાવતા નથી.\n2. વાઇરસમાં કોષીય સંરચના હોતી નથી, પરંતુ તેઓ જીવંત સ્વરૂપ તરીકે ગણવામાં આવે છે.\n3. પ્રોકેરિયોટિક કોષોમાં કોષકેન્દ્ર હોતું નથી, પરંતુ તેઓ અનુવંશિક દ્રવ્ય ધરાવે છે.\n4. યુકેરિયોટિક કોષોમાં કોષકેન્દ્ર હાજર હોય છે, પરંતુ કેટલાક અપવાદરૂપ કોષોમાં તે ગેરહાજર હોઈ શકે છે.", "options": ["A) વિધાન 1, 2 અને 3 સાચાં છે, પરંતુ 4 ખોટું છે", "B) વિધાન 1, 3 અને 4 સાચાં છે, પરંતુ 2 ખોટું છે", "C) વિધાન 2 અને 3 સાચાં છે, પરંતુ 1 અને 4 ખોટાં છે", "D) વિધાન 1, 2, 3 અને 4 બધાં જ સાચાં છે"], "correct": 0, "explanation": "વિધાન 1 સાચું છે કારણ કે કોષ એ સજીવનો મૂળભૂત એકમ છે, પરંતુ વાઇરસ જેવા સ્વરૂપો કોષીય સંરચના ધરાવતા નથી. વિધાન 2 સાચું છે કારણ કે વાઇરસ કોષીય સંરચના ધરાવતા નથી, તેમ છતાં તેઓ જીવંત સ્વરૂપ તરીકે ગણવામાં આવે છે (કારણ કે તેઓ યજમાન કોષમાં પ્રજનન કરી શકે છે). વિધાન 3 સાચું છે કારણ કે પ્રોકેરિયોટિક કોષોમાં કોષકેન્દ્ર હોતું નથી, પરંતુ તેઓ DNA ધરાવે છે. વિધાન 4 ખોટું છે કારણ કે યુકેરિયોટિક કોષોમાં કોષકેન્દ્ર હંમેશા હાજર હોય છે, કોઈ અપવાદ નથી (ઉદાહરણ: લાલ રક્તકણોમાં કોષકેન્દ્ર ગેરહાજર હોય છે, પરંતુ તે યુકેરિયોટિક કોષ નથી, તે વિશિષ્ટ કોષ છે જે પૂર્ણ વિકસિત યુકેરિયોટિક કોષ નથી).", "ncert_ref": "કક્ષા XI - પ્રકરણ 8: કોષ - જીવનનો એકમ", "difficulty": "Hard", "num": 28}, {"question": "એક સંશોધકને એક અજ્ઞાત સૂક્ષ્મજીવ મળે છે જે પ્રકાશસંશ્લેષણ કરી શકે છે, પરંતુ તેમાં કોષકેન્દ્ર અને વર્ણસૂત્રોની સંરચના ગેરહાજર છે. આ સૂક્ષ્મજીવમાં નીચેનામાંથી કયું લક્ષણ અવશ્ય હાજર હોવું જોઈએ?", "options": ["A) રાઇબોઝોમ્સ અને ક્લોરોફિલ", "B) કોષદીવાલ અને મિટોકોન્ડ્રિયા", "C) ગોલ્ગી ઉપકરણ અને લાયસોઝોમ્સ", "D) કોષકેન્દ્રપટલ અને એન્ડોપ્લાઝમિક રેટિક્યુલમ"], "correct": 0, "explanation": "આ સૂક્ષ્મજીવ પ્રોકેરિયોટિક હોવો જોઈએ કારણ કે તેમાં કોષકેન્દ્ર અને વર્ણસૂત્રોની સંરચના ગેરહાજર છે. પ્રોકેરિયોટિક કોષોમાં રાઇબોઝોમ્સ હાજર હોય છે જે પ્રોટીન સંશ્લેષણ માટે જરૂરી છે. વધુમાં, પ્રકાશસંશ્લેષણ n": "કોષકેન્દ્ર (B) અનુવંશિક સૂચનાઓના સંગ્રહ અને હસ્તાંતરણ માટે જવાબદાર છે, જ્યારે કોષરસકણિકા (A) ઉર્જા ઉત્પાદનમાં, અંતર્ગોળગી જાળ (C) પ્રોટીન અને લિપિડના સંશ્લેષણમાં, અને રાઇબોઝોમ (D) પ્રોટીન સંશ્લેષણમાં મહત્વની ભૂમિકા ભજવે છે. આમ, કોષકેન્દ્ર જ આ વિકલ્પ છે જે આંતરિક વાતાવરણને સ્થિર રાખવા અને પરિવહનમાં સીધો ભાગ ભજવતો નથી.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનનો મૂળભૂત એકમ", "difficulty": "Hard", "num": 31}, {"question": "એક કોષીય સજીવમાં, જો કોષકેન્દ્ર હાજર ન હોય, તો નીચેનામાંથી કયું લક્ષણ અવશ્ય જોવા મળશે નહીં?", "options": ["A) પ્રકાશસંશ્લેષણ", "B) શ્વસન", "C) પ્રજનન", "D) ઉત્સર્જન"], "correct": 2, "explanation": "કોષકેન્દ્ર રહિત કોષો (જેમ કે બેક્ટેરિયા) પ્રકાશસંશ્લેષણ (A), શ્વસન (B), અને ઉત્સર્જન (D) જેવી ક્રિયાઓ કરી શકે છે, પરંતુ પ્રજનન (C) માટે કોષકેન્દ્રની હાજરી જરૂરી છે કારણ કે વર્ણસૂત્રોની યોગ્ય વહેંચણી અને જનીનની હસ્તાંતરણ પ્રક્રિયા કોષકેન્દ્ર પર આધારિત છે.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનનો મૂળભૂત એકમ", "difficulty": "Hard", "num": 32}, {"question": "નીચેના વિધાનો ધ્યાનમાં લો અને યોગ્ય વિકલ્પ પસંદ કરો: 1. કોષ એ સજીવનો મૂળભૂત રચનાત્મક અને ક્રિયાત્મક એકમ છે. 2. કોષમાં કોષકેન્દ્ર હાજર ન હોય તો તે સજીવ કહેવાય નહીં. 3. કોષીય ઘટકો પૈકી રાઇબોઝોમ પ્રોટીન સંશ્લેષણ માટે જવાબદાર છે.", "options": ["A) ફક્ત 1 અને 2 સાચા છે", "B) ફક્ત 1 અને 3 સાચા છે", "C) ફક્ત 2 અને 3 સાચા છે", "D) 1, 2, અને 3 સાચા છે"], "correct": 1, "explanation": "વિધાન 1 સાચું છે કારણ કે કોષ એ સજીવનો મૂળભૂત રચનાત્મક અને ક્રિયાત્મક એકમ છે. વિધાન 2 ખોટું છે કારણ કે કોષકેન્દ્ર રહિત કોષો (જેમ કે બેક્ટેરિયા) પણ સજીવ કહેવાય છે. વિધાન 3 સાચું છે કારણ કે રાઇબોઝોમ પ્રોટીન સંશ્લેષણ માટે જવાબદાર છે. આમ, ફક્ત 1 અને 3 સાચા છે.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનનો મૂળભૂત એકમ", "difficulty": "Hard", "num": 33}, {"question": "નીચેનામાંથી કયું વિધાન કોષની વ્યાખ્યા અને તેની ક્રિયાત્મક બહુપ્રકારિતા વિશે સૌથી અયોગ્ય છે?", "options": ["A) કોષ એ સજીવનો મૂળભૂત રચનાત્મક અને ક્રિયાત્મક એકમ છે, જેમાં જીવનના બધા જરૂરી પ્રક્રિયાઓ થાય છે.", "B) કોષમાં ઉત્સેચકો, DNA-આરએનએ અને પ્રોટીન જેવા અણુઓ         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
