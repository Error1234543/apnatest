<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - કોષવાદ (Cell Theory)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 કોષવાદ (Cell Theory)</span>
                <span>🎯 Hard</span>
                <span>📝 83 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>

            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "કોષવાદના સિદ્ધાંત મુજબ, 'સરળતમ જીવનનું એકમ કોષ છે' એ વાક્ય કયા વૈજ્ઞાનિકે પ્રસ્તાવિત કર્યું હતું?", "options": ["A) રોબર્ટ હૂક", "B) થિયોડોર શ્વાન", "C) રુડોલ્ફ વિર્ચો", "D) લુઈ પાશ્ચર"], "correct": 1, "explanation": "થિયોડોર શ્વાને 1839માં કોષવાદના સિદ્ધાંતને વ્યાખ્યાયિત કરતાં કહ્યું હતું કે 'સરળતમ જીવનનું એકમ કોષ છે'. રોબર્ટ હૂકે પ્રથમ વખત કોષ શબ્દનો ઉપયોગ કર્યો હતો, પરંતુ કોષવાદના સિદ્ધાંતનો શ્રેય શ્વાનને જાય છે. રુડોલ્ફ વિર્ચોએ 'કોષ કોષમાંથી જ ઉત્પન્ન થાય છે' એ સિદ્ધાંત આપ્યો હતો, જ્યારે લુઈ પાશ્ચર કિટાણુશાસ્ત્ર સાથે સંકળાયેલા હતા.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનનું મૂળભૂત એકમ", "difficulty": "Hard", "num": 1}, {"question": "નીચેનામાંથી કયો જીવ કોષવાદના સિદ્ધાંતનું અપવાદ છે?", "options": ["A) અમીબા", "B) વાયરસ", "C) બેક્ટેરિયા", "D) યીસ્ટ"], "correct": 1, "explanation": "વાયરસ કોષવાદના સિદ્ધાંતનું અપવાદ છે કારણ કે તે કોષી રચના ધરાવતો નથી અને તે જીવંત કોષની બહાર પ્રજનન કરી શકતો નથી. અમીબા, બેક્ટેરિયા અને યીસ્ટ એ બધા કોષી રચના ધરાવે છે અને કોષવાદના સિદ્ધાંતને અનુસરે છે.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનનું મૂળભૂત એકમ", "difficulty": "Hard", "num": 2}, {"question": "કોષવાદના આધારે, નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) બધા જીવિત પ્રાણીઓ કોષોના બનેલા છે.", "B) કોષ જીવનનું રચનાત્મક અને ક્રિયાત્મક એકમ છે.", "C) કોષો સ્વતંત્ર રીતે ઉત્પન્ન થઈ શકે છે.", "D) નવા કોષો પહેલાથી અસ્તિત્વમાં રહેલા કોષોમાંથી ઉત્પન્ન થાય છે."], "correct": 2, "explanation": "કોષો સ્વતંત્ર રીતે ઉત્પન્ન થઈ શકતા નથી. રુડોલ્ફ વિર્ચોએ 'કોષ કોષમાંથી જ ઉત્પન્ન થાય છે' એ સિદ્ધાંત આપ્યો હતો, જે કોષવાદનો મહત્વપૂર્ણ ભાગ છે. બાકીના તમામ વિધાનો કોષવાદના સિદ્ધાંતને અનુસરે છે.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનનું મૂળભૂત એકમ", "difficulty": "Hard", "num": 3}, {"question": "કોષવાદના સિદ્ધાંતને આધારે, નીચેનામાંથી કયો જીવ કોષી રચના ધરાવતો નથી પરંતુ જીવંત ગણવામાં આવે છે?", "options": ["A) બેક્ટેરિયોફેજ", "B) અમીબા", "C) પરામીશિયમ", "D) ક્લેમાઇડોમોનાસ"], "correct": 0, "explanation": "બેક્ટેરિયોફેજ એ વાયરસ છે જે કોષી રચ ર્મોન અનુવંશિકતાને નિયંત્રિત કરતા નથી.", "ncert_ref": "Class XI - Chapter 8: કોષ: જીવનનું એકમ", "difficulty": "Hard", "num": 14}, {"question": "કોષવાદના સિદ્ધાંતને લગતા, નીચેનામાંથી કયું વિધાન 'કોષ એ ચયાપચયનું એકમ છે' એ સિદ્ધાંતને સૌથી યોગ્ય રીતે સમજાવે છે?", "options": ["A) કોષમાં શ્વસન અને પ્રકાશસંશ્લેષણ જેવી ચયાપચય પ્રક્રિયાઓ થાય છે.", "B) કોષમાં ઉત્સેચક હોય છે જે ચયાપચય પ્રક્રિયાઓને વેગ આપે છે.", "C) કોષમાં કાર્બોદિત, પ્રોટીન અને ચરબી જેવા પોષક તત્ત્વો હોય છે.", "D) કોષમાં પાણી અને ખનીજો હોય છે જે ચયાપચય માટે જરૂરી છે."], "correct": 0, "explanation": "વિધાન A સાચું છે કારણ કે કોષમાં શ્વસન અને પ્રકાશસંશ્લેષણ જેવી ચયાપચય પ્રક્રિયાઓ થાય છે, જે કોષને ચયાપચયનું એકમ બનાવે છે. વિધાન B, C, અને D અપૂર્ણ છે કારણ કે ઉત્સેચક, પોષક તત્ત્વો, અને પાણી-ખનીજો ચયાપચય પ્રક્રિયાઓ માટે જરૂરી છે પરંતુ કોષને ચયાપચયનું એકમ બનાવતું નથી.", "ncert_ref": "Class XI - Chapter 8: કોષ: જીવનનું એકમ", "difficulty": "Hard", "num": 15}, {"question": "વર્તમાન કોષવાદ અનુસાર, નીચેનામાંથી કયું વિધાન 'કોષ એ જીવનનું મૂળભૂત એકમ છે' એ સિદ્ધાંતને સૌથી અચૂક રીતે વ્યાખ્યાયિત કરે છે?", "options": ["A) કોષ એ જીવનનું રચનાત્મક, ક્રિયાત્મક અને અનુવંશિક એકમ છે, પરંતુ તે સ્વતંત્ર રીતે જીવિત રહી શકતો નથી.", "B) કોષ એ જીવનનું રચનાત્મક, ક્રિયાત્મક અને અનુવંશિક એકમ છે, અને તે સ્વતંત્ર રીતે જીવિત રહી શકે છે.", "C) કોષ એ જીવનનું રચનાત્મક અને ક્રિયાત્મક એકમ છે, પરંતુ અનુવંશિકતા માટે તેને બહુકોષીય રચનાની જરૂર પડે છે.", "D) કોષ એ જીવનનું ક્રિયાત્મક અને અનુવંશિક એકમ છે, પરંતુ તેની રચના માટે અન્ય કોષોની જરૂર પડે છે."], "correct": 1, "explanation": "વર્તમાન કોષવાદ અનુસાર, કોષ એ જીવનનું રચનાત્મક, ક્રિયાત્મક અને અનુવંશિક એકમ છે, અને તે સ્વતંત્ર રીતે જીવિત રહી શકે છે (ઉદા. એકકોષી સજીવો જેવા કે અમીબા). વિકલ્પ A અસત્ય છે કારણ કે કોષ સ્વતંત્ર રીતે જીવિત રહી શકે છે. વિકલ્પ C અને D અસત્ય છે કારણ કે કોષ અનુવંશિકતા અને રચનાત્મક દ્રષ્ટિએ સ્વતંત્ર છે.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનનું મૂળભૂત એકમ", "difficulty": "Hard", "num": 16}, {"question": "નીચેનામાંથી કયો જીવ કોષવાદના સિદ્ધાંતને અપવાદરૂપ ગણવામાં આવે છે, કારણ કે તેના કોષોમાં કોષકેન્દ્ર અનુપસ્થિત હોય છે?", "options": ["A) અમીબા", "B) બેક્ટેરિયા", "C) યીસ્ટ", "D) પ્લાઝમોડિયમ"], "correct": 1, "explanation": "બેક્ટેરિયા પ્રોકેરિયોટિક કોષ ધરાવે છે, જેમાં કોષકેન્દ્ર અનુપસ્થિત હોય છે. અમીબા, યીસ્ટ અને પ્લાઝમોડિયમ યુકેરિયોટિક કોષ ધરાવે છે, જેમાં કોષકેન્દ્ર ઉપસ્થિત હોય છે. આથી, બેક્ટેરિયા કોષવાદના સિદ્ધાંતને અપવાદરૂપ ગણવામાં આવે છે.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનનું મૂળભૂત એકમ", "difficulty": "Hard", "num": 17}, {"question": "કોષવાદના સિદ્ધાંત અનુસાર, નીચેનામાંથી કયું વિધાન 'કોષો કોષોમાંથી ઉત્પન્ન થાય છે' એ સિદ્ધાંતને સૌથી યથાર્થ રીતે વર્ણવે છે?", "options": ["A) કોષો સ્વયં-ઉત્પન્ન થઈ શકે છે.", "B) કોષો ફક્ત પૂર્વ-અસ્તિત્વમાં રહેલા કોષોમાંથી જ ઉત્પન્ન થાય છે.", "C) કોષો રાસાયણિક પ્રક્રિયાઓ દ્વારા ઉત્પન્ન થાય છે.", "D) કોષો ફક્ત બહુકોષીય સજીવોમાંથી જ ઉત્પન્ન થાય છે."], "correct": 1, "explanation": "રુડોલ્ફ વિર્ચોના સિદ્ધાંત અનુસાર, 'કોષો કોષોમાંથી ઉત્પન્ન થાય છે' (Omnis cellula e cellula). વિકલ્પ A અસત્ય છે કારણ કે કોષો સ્વયં-ઉત્પન્ન થઈ શકતા નથી. વિકલ્પ C અસત્ય છે કારણ કે કોષો રાસાયણિક પ્રક્રિયાઓ દ્વારા ઉત્પન્ન થતા નથી. વિકલ્પ D અસત્ય છે કારણ કે કોષો એકકોષી સજીવોમાંથી પણ ઉત્પન્ન થાય છે.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનનું મૂળભૂત એકમ", "difficulty": "Hard", "num": 18}, {"question": "નીચેનામાંથી કયું વિધાન કોષવાદના સિદ્ધાંતને લગતા 'કોષ એ ચયાપચયનું એકમ છે' એ સિદ્ધાંતને સૌથી યથાર્થ રીતે વર્ણવે છે?", "options": ["A) કોષમાં ફક્ત શ્વસન જેવી ચયાપચય ક્રિયાઓ થાય છે.", "B) કોષમાં શ્વસન, પ્રકાશસંશ્લેષણ જેવી ચયાપચય ક્રિયાઓ થાય છે, પરંતુ તે માટે બહુકોષીય રચનાની જરૂર પડે છે.", "C) કોષમાં શ્વસન, પ્રકાશસંશ્લેષણ, ઉત્સર્જન જેવી તમામ ચયાપચય ક્રિયાઓ સ્વતંત્ર રીતે થાય છે.", "D) કોષમાં ફક્ત ઉત્સર્જન જેવી ચયાપચય ક્રિયાઓ થાય છે."], "correct": 2, "explanation": "કોષ એ ચયાપચયનું એકમ છે, કારણ કે તે શ્વસન, પ્રકાશસંશ્લેષણ, ઉત્સર્જન જેવી તમામ ચયાપચય ક્રિયાઓ સ્વતંત્ર રીતે કરી શકે છે. વિકલ્પ A અને D અસત્ય છે કારણ કે કોષમાં ફક્ત એક જ પ્રકારની ચયાપચય ક્રિયા થતી નથી. વિકલ્પ B અસત્ય છે કારણ કે કોષ સ્વતંત્ર રીતે ચયાપચય ક્રિયાઓ કરી શકે છે.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનનું મૂળભૂત એકમ", "difficulty": "Hard", "num": 19}, {"question": "નીચેનામાંથી કયું વિધાન કોષવાદના આધુનિક સ્વરૂપ સાથે સંપૂર્ણ સુસંગત નથી, જ્યારે બાકીના ત્રણ વિધાનો આધુનિક કોષવાદના મૂળભૂત સિદ્ધાંતોને સ્વીકારે છે?", "options": ["A) કોષ એ જીવનનું રચનાત્મક અને ક્રિયાત્મક એકમ છે.", "B) કોષો કોષોમાંથી ઉત્પન્ન થાય છે.", "C) કોષ એ અનુવંશિકતાનું એકમ છે, કારણ કે તે DNA ધરાવે છે.", "D) બધા જીવો એક કોષી અથવા બહુકોષી હોય છે, પરંતુ વાઇરસ જેવા સજીવો કોષી રચના વિના જીવી શકે છે."], "correct": 3, "explanation": "વિકલ્પ D અસત્ય છે, કારણ કે આધુનિક કોષવાદ અનુસાર, વાઇરસને જીવંત ગણવામાં આવતા નથી, કારણ કે તેઓ કોષી રચના ધરાવતા નથી અને સ્વતંત્ર રીતે પ્રજનન કરી શકતા નથી. વાઇરસને 'જીવન અને અજીવન'ની સીમાએ ગણવામાં આવે છે. વિકલ્પ A, B, અને C આધુનિક કોષવાદના મૂળભૂત સિદ્ધાંતો છે: કોષ જીવનનું મૂળભૂત એકમ છે, કોષો કોષોમાંથી ઉત્પન્ન થાય છે, અને કોષ અનુવંશિકતાનું વાહક છે.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનનું મૂળભૂત એકમ", "difficulty": "Hard", "num": 20}, {"question": "વર્તમાન કોષવાદ અનુસાર, 'કોષ એ જીવનનું મૂળભૂત એકમ છે' એ વિધાનને આધારે, નીચેનામાંથી કયો જીવ તેના કોષી સ્વરૂપને લીધે અપવાદરૂપ ગણાય છે, પરંતુ તેના અસ્તિત્વ માટે કોષ પર આધારિત છે?", "options": ["A) અમીબા (Amoeba)", "B) વાઇરસ (Virus)", "C) બેક્ટેરિયા (Bacteria)", "D) યીસ્ટ (Yeast)"], "correct": 1, "explanation": "વાઇરસ (B) એ કોષવાદના સિદ્ધાંતનું અપવાદ છે, કારણ કે તે કોષી રચના ધરાવતો નથી, પરંતુ જીવંત કોષમાં જ પ્રજનન કરે છે. અમીબા, બેક્ટેરિયા અને યીસ્ટ એ સૌ કોષી રચના ધરાવે છે અને કોષવાદના સિદ્ધાંતને પૂરેપૂર સ્વીકારે છે.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનનું મૂળભૂત એકમ", "difficulty": "Hard", "num": 21}, {"question": "કોષવાદના આધુનિક સ્વરૂપ અનુસાર, 'કોષો કોષોમાંથી ઉત્પન્ન થાય છે' એ સિદ્ધાંતને ધ્યાનમાં રાખીને, નીચેનામાંથી કયા પ્રક્રિયા દ્વારા કોષોની ઉત્પત્તિ થતી નથી?", "options": ["A) મাইটોસિસ (Mitosis)", "B) મિયોસિસ (Meiosis)", "C) એન્ડોસાઇટોસિસ (Endocytosis)", "D) એમિટોસિસ (Amitosis)"], "correct": 2, "explanation": "એન્ડોસાઇટોસિસ (C) એ કોષમાં પદાર્થોના અંતર્ગ્રહણની પ્રક્રિયા છે, કોષોની ઉ : 3, "explanation": "કોષ એ અનુવંશિકતાનું એકમ છે એ વિધાન DNA, વર્ણસૂત્ર અને જનીન સાથે સંકળાયેલું છે, કારણ કે આ ઘટકો અનુવંશિક માહિતીના વહન અને વારસામાં મહત્વની ભૂમિકા ભજવે છે. ઉત્સેચક ચયાપચય પ્રક્રિયાઓમાં ભાગ લે છે, પરંતુ તે અનુવંશિકતાના વહન સાથે સીધો સંકળાયેલો નથી.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનનું મૂળભૂત એકમ", "difficulty": "Hard", "num": 28}, {"question": "કોષવાદના સિદ્ધાંત અનુસાર, 'કોષ એ જીવનનું મૂળભૂત એકમ છે' એ વિધાનને આધારે, નીચેનામાંથી કયો જીવ કોષી રચના ધરાવે છે, પરંતુ તેના કોષો વૈજ્ઞાનિક દૃષ્ટિએ 'સજીવ' ગણવામાં આવતા નથી?", "options": ["A) વાયરસ", "B) બેક્ટેરિયા", "C) અમીબા", "D) પરામીશિયમ"], "correct": 0, "explanation": "વાયરસ કોષી રચના ધરાવે છે, પરંતુ તેને સજીવ ગણવામાં આવતા નથી કારણ કે તે કોષવિભાજન દ્વારા પ્રજનન કરતા નથી અને તેના માટે યજમાન કોષની જરૂર પડે છે. બેક્ટેરિયા, અમીબા અને પરામીશિયમ સજીવ કોષી રચના ધરાવે છે અને સ્વતંત્ર રીતે જીવિત રહી શકે છે.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનનું મૂળભૂત એકમ", "difficulty": "Hard", "num": 29}, {"question": "એક સંશોધકને એક નવો સૂક્ષ્મજીવ મળ્યો છે જે બહુકોષીય છે, પરંતુ તેના કોષોમાં કોષકેન્દ્રનો અભાવ છે અને તેના DNA પ્રોટીન સાથે જોડાયેલું નથી. આ સૂક્ષ્મજીવના સંદર્ભમાં નીચેનામાંથી કયું વિધાન કોષવાદના સિદ્ધાંત સાથે સુસંગત નથી?", "options": ["A) આ સૂક્ષ્મજીવના કોષો કોષવાદના સિદ્ધાંત મુજબ જીવનનું મૂળભૂત એકમ છે", "B) આ સૂક્ષ્મજીવના કોષો અન્ય કોષોમાંથી ઉત્પન્ન થયા હોવા જોઈએ, જે કોષવાદના સિદ્ધાંત સાથે સુસંગત છે", "C) આ સૂક્ષ્મજીવના કોષોમાં કોષકેન્દ્રનો અભાવ હોવાથી તે કોષવાદના સિદ્ધાંતનું ખંડન કરે છે", "D) આ સૂક્ષ્મજીવ બહુકોષીય હોવાથી તે કોષવાદના સિદ્ધાંતને અનુસરે છે, કારણ કે બહુકોષીયતા કોષવાદ સાથે સુસંગત છે"], "correct": 2, "explanation": "સાચો જવાબ વિકલ્પ C છે. કોષવાદના સિદ્ધાંત મુજબ, કોષ એ જીવનનું મૂળભૂત એકમ છે, પરંતુ તેમાં કોષકેન્દ્રની હાજરી ફરજિયાત નથી. પ્રોકેરિયોટિક કોષોમાં (જેમ કે બેક્ટેરિયા) કોષકેન્દ્રનો અભાવ હોય છે, તેમ છતાં તેઓ કોષવાદના સિદ્ધાંતને અનુસરે છે. તેથી, કોષકેન્દ્રના અભાવને કારણે કોષવાદનું ખંડન થતું નથી. વિકલ્પ A અને B કોષવાદ સાથે સુસંગત છે. વિકલ્પ D પણ સાચો છે કારણ કે બહુકોષીયતા કોષવ ીબા", "B) યીસ્ટ", "C) બેક્ટેરિયા", "D) પ્લાઝમોડિયમ"], "correct": 2, "explanation": "બેક્ટેરિયા પ્રોકેરિયોટિક કોષ ધરાવે છે, જેમાં કોષકેન્દ્ર અભાવે છે, પરંતુ તે કોષી રચના ધરાવે છે. અમીબા (A), યીસ્ટ (B), અને પ્લાઝમોડિયમ (D) યુકેરિયોટિક કોષ ધરાવે છે, જેમાં કોષકેન્દ્ર હાજર હોય છે.", "ncert_ref": "Class XI - Chapter 8: કોષ: જીવનનું મૂળભૂત એકમ", "difficulty": "Hard", "num": 33}, {"question": "એક સંશોધકે નવો સૂક્ષ્મજીવ શોધ્યો છે જે બહુકોષીય છે, પરંતુ તેના કોષોમાં કોષકેન્દ્રનો અભાવ છે અને તેના DNA પ્રોટીન સાથે જોડાયેલું નથી. આ સૂક્ષ્મજીવ કોષવાદના કયા પાસાને પડકારે છે, પરંતુ તેના કયા પાસાને સમર્થન આપે છે?", "options": ["A) તે 'કોષ એ જીવનનું મૂળભૂત એકમ છે' એ વિધાનને પડકારે છે, પરંતુ 'કોષો કોષોમાંથી ઉત્પન્ન થાય છે' એ વિધાનને સમર્થન આપે છે.", "B) તે 'કોષ એ ચયાપચયનું એકમ છે' એ વિધાનને પડકારે છે, પરંતુ 'કોષ એ અનુવંશિકતાનું એકમ છે' એ વિધાનને સમર્થન આપે છે.", "C) તે 'કોષ એ અનુવંશિકતાનું એકમ છે' એ વિધાનને પડકારે છે, પરંતુ 'કોષ એ જીવનનું રચનાત્મક એકમ છે' એ વિધાનને સમર્થન આપે છે.", "D) તે 'કોષો કોષોમાંથી ઉત્પન્ન થાય છે' એ વિધાનને પડકારે છે, પરંતુ 'કોષ એ ચયાપચયનું એકમ છે' એ વિધાનને સમર્થન આપે છે."], "correct": 2, "explanation": "આ સૂક્ષ્મજીવ બહુકોષીય હોવાથી 'કોષ એ જીવનનું રચનાત્મક એકમ છે' એ વિધાનને સમર્થન આપે છે. જોકે, તેના DNA પ્રોટીન સાથે જોડાયેલું ન હોવાથી (જેમ કે પ્રોકેરિયોટ્સમાં), તે 'કોષ એ અનુવંશિકતાનું એકમ છે' એ વિધાનને આંશિક રીતે પડકારે છે, કારણ કે અનુવંશિકતા માટે DNA જરૂરી છે, પરંતુ તેનું સંગઠન અલગ હોઈ શકે છે. બાકીના વિકલ્પોમાં આપેલા કારણો યોગ્ય રીતે મેળ ખાતા નથી: કોષકેન્દ્રનો અભાવ ચયાપચયને અસર કરતો નથી, અને કોષોનું ઉત્પન્ન થવું આ સૂક્ષ્મજીવમાં પણ શક્ય છે.", "ncert_ref": "કક્ષા ૧૧ - પ્રકરણ ૮: કોષ - જીવનનો એકમ", "difficulty": "Hard", "num": 34}, {"question": "નીચેનામાંથી કયું ઉદાહરણ કોષવાદના આધુનિક સ્વરૂપને આંશિક રીતે પડકારે છે, પરંતુ તેના મૂળભૂત સિદ્ધાંતોને સંપૂર્ણ રીતે નકારતું નથી?", "options": ["A) વાઇરસ, કારણ કે તે કોષરહિત છે પરંતુ જીવંત કોષોમાં પ્રજનન કરે છે.", "B) બહુકોષીય ફૂગ, કારણ કે તેના કોષોમાં કોષકેન્દ્ર હાજર છે પરંતુ તે પ્રકાશસંશ્લેષણ કરતી નથી.", "C) સાયનો બેક્ટેરિયા, કારણ કે તે પ્રકાશસંશ્લેષણ કરે છે પરંતુ કોષકેન્દ્ર ધરાવતું નથી.", "D) પ્રજીવો, કારણ કે તે એકકોષીય છે પરંતુ જટિલ ચયાપચય પ્રક્રિયાઓ ધરાવે છે."], "correct": 0, "explanation": "વાઇરસ કોષરહિત હોવાથી કોષવાદના 'કોષ એ જીવનનું મૂળભૂત એકમ છે' એ વિધાનને પડકારે છે, પરંતુ તે જીવંત કોષોમાં પ્રવેશીને પ્રજનન કરે છે, જે દર્શાવે છે કે તે કોષો પર આધારિત છે. આથી તે કોષવાદને સંપૂર્ણ રીતે નકારતું નથી. બાકીના વિકલ્પો કોષવાદને પડકારતા નથી: ફૂગ અને સાયનો બેક્ટેરિયા કોષીય રચના ધરાવે છે, અને પ્રજીવો એકકોષીય હોવા છતાં કોષવાદને સમર્થન આપે છે.", "ncert_ref": "કક્ષા ૧૧ - પ્રકરણ ૮: કોષ - જીવનનો એકમ, પ્રકરણ ૨: જૈવિક વર્ગીકરણ", "difficulty": "Hard", "num": 35}, {"question": "નીચેનામાંથી કયું વિધાન કોષવાદના આધુનિક સ્વરૂપને પડકારે છે, જ્યારે વાયરસની કોષરહિત અવસ્થા ધ્યાનમાં લેવામાં આવે?", "options": ["A) વાયરસ કોષી રચના ધરાવતા નથી, પરંતુ જીવંત ગણવામાં આવે છે.", "B) વાયરસ કોષોમાંથી ઉત્પન્ન થાય છે અને કોષોને જ સંક્રમિત કરે છે.", "C) વાયરસમાં જનીન સામગ્રી હાજર હોય છે, જે અનુવંશિકતાનું વહન કરે છે.", "D) વાયરસ પ્રોટીન અને કાર્બોદિતથી બનેલા હોય છે, જે ચયાપચય માટે જરૂરી છે."], "correct": 0, "explanation": "વાયરસ કોષરહિત અવસ્થામાં જીવંત ગણવામાં આવે છે, જે કોષવાદના મૂળભૂત સિદ્ધાંત 'કોષ એ જીવનનું એકમ છે'ને પડકારે છે. વિકલ્પ B ખોટો છે કારણ કે વાયરસ કોષોમાંથી ઉત્પન્ન થતાં નથી, પરંતુ યજમાન કોષમાં પ્રવેશીને ગુણિત થાય છે. વિકલ્પ C ખોટો છે કારણ કે વાયરસમાં જનીન સામગ્રી (DNA અથવા RNA) હાજર હોય છે, પરંતુ તે કોષી રચના વગર જીવંત રહી શકે છે. વિકલ્પ D ખોટો છે કારણ કે વાયરસમાં પ્રોટીન અને કાર્બોદિત હોય છે, પરંતુ તે ચયાપચય કરતું નથી.", "ncert_ref": "Class XI - Chapter 8: કોષ: જીવનનું મૂળભૂત એકમ", "difficulty": "Hard", "num": 36}, {"question": "કોષવાદના આધુનિક સ્વરૂપ અનુસાર, નીચેનામાંથી કયું વિધાન મિથ્યા છે, જ્યારે બહુકોષીય જીવોની રચના ધ્યાનમાં લેવામાં આવે?", "options": ["A) બહુકોષીય જીવોના કોષો એકબીજા સાથે સંકળાયેલા હોય છે અને વિશિષ્ટ કામગીરી બજાવે છે.", "B) બહુકોષીય જીવોના કોષો સ્વતંત્ર રીતે જીવી શકે છે, જેમ કે એમીબા.", "C) બહુકોષીય જીવોના કોષો પેશીઓ અને અંગોની રચના કરે છે.", "D) બહુકોષીય જીવોના કોષો એક જ જનીન સેટ ધરાવે છે, જે અનુવંશિકતાનું વહન કરે છે."], "correct": 1, "explanation": "બહુકોષીય જીવોના કોષો સ્વતંત્ર રીતે જીવી શકતા નથી (વિકલ્પ B ખોટો છે). તેઓ પેશીઓ અને અંગોની રચના કરે છે (વિકલ્પ C સાચો છે), એકબીજા સાથે સંકળાયેલા હોય છે (વિકલ્પ A સાચો છે), અને એક જ જનીન સેટ ધરાવે છે (વિકલ્પ D સાચો છે).", "ncert_ref": "Class XI - Chapter 8: કોષ: જીવનનું મૂળભૂત એકમ", "difficulty": "Hard", "num": 37}, {"question": "એક સંશોધકે નવો સજીવ શોધ્યો છે જે બહુકોષીય છે, પરંતુ તેના કોષોમાં કોષકેન્દ્ર (nucleus)નો અભાવ છે અને તેના DNA પ્રોટીન સાથે જોડાયેલું નથી. આ સજીવ કોષવાદના આધુનિક સ્વરૂપને કેવી રીતે પડકારે છે?", "options": ["A) આ સજીવ કોષવાદના 'કોષ એ જીવનનું મૂળભૂત એકમ છે' એ સિદ્ધાંતને પડકારે છે, કારણ કે તેના કોષો અપૂર્ણ છે.", "B) આ સજીવ કોષવાદના 'કોષો કોષોમાંથી ઉત્પન્ન થાય છે' એ સિદ્ધાંતને પડકારે છે, કારણ કે તેના કોષો વિભાજન પામી શકતા નથી.", "C) આ સજીવ કોષવાદના 'કોષ એ અનુવંશિકતાનું એકમ છે' એ સિદ્ધાંતને આંશિક રીતે પડકારે છે, કારણ કે તેના DNA પ્રોટીન સાથે જોડાયેલું ન હોવાથી જનીન અભિવ્યક્તિ અલગ રીતે થાય છે.", "D) આ સજીવ કોષવાદના 'કોષ એ ચયાપચયનું એકમ છે' એ સિદ્ધાંતને પડકારે છે, કારણ કે તેના કોષોમાં ઉત્સેચકોની ગેરહાજરી છે."], "correct": 2, "explanation": "સાચો જવાબ વિકલ્પ C છે. કોષવાદ અનુસાર, 'કોષ એ અનુવંશિકતાનું એકમ છે' કારણ કે DNA જનીન અભિવ્યક્તિનું નિયંત્રણ કરે છે. આ સજીવમાં DNA પ્રોટીન સાથે જોડાયેલું ન હોવાથી (જેમ કે પ્રોકેરિયોટ્સમાં), જનીન અભિવ્યક્તિનો પ્રક્રિયા અલગ હોઈ શકે છે, જે કોષવાદના આ સિદ્ધાંતને આંશિક રીતે પડકારે છે. વિકલ્પ A ખોટો છે કારણ કે કોષકેન્દ્રનો અભાવ કોષને અપૂર્ણ બનાવતો નથી (દા.ત. બેક્ટેરિયા). વિકલ્પ B ખોટો છે કારણ કે પ્રોકેરિયોટ્સ પણ વિભાજન પામે છે. વિકલ્પ D ખોટો છે કારણ કે ઉત્સેચકોની ગેરહાજરી એ કોષવાદના સિદ્ધાંતને પડકારતી નથી, કારણ કે પ્રોકેરિયોટ્સમાં પણ ચયાપચય થાય છે.", "ncert_ref": "કક્ષા ૧૧ - પ્રકરણ ૨: જૈવિક વર્ગીકરણ, પ્રકરણ ૮: કોષ - જીવનનો એકમ", "difficulty": "Hard", "num": 38}, {"question": "એક સંશોધકે એક નવો સૂક્ષ્મજીવ શોધ્યો છે જે એકકોષીય છે, પરંતુ તેના જીવનચક્ર દરમિયાન કોષરહિત અવસ્થામાંથી પસાર થાય છે. આ સૂક્ષ્મજીવ કોષવાદના કયા સિદ્ધાંતને સૌથી વધુ પડકારે છે?", "options": ["A) 'કોષ એ જીવનનું મૂળભૂત એકમ છે' - કારણ કે કોષરહિત અવસ્થા જીવંત ગણાય છે.", "B) 'કોષો કોષોમાંથી ઉત્પન્ન થાય છે' - કારણ કે કોષરહિત અવસ્થામાંથી કોષનું નિર્માણ થાય છે.", "C) 'કોષ એ ચયાપચયનું એકમ છે' - કારણ કે કોષરહિત અવસ્થામાં ચયાપચય થતો નથી.", "D) 'કોષ એ અનુવંશિકતાનું એકમ છે' - કારણ કે કોષરહિત અવસ્થામાં DNAનું પ્રસારણ થતું નથી."], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે. કોષવાદનો મુખ્ય સિદ્ધાંત 'કોષો કોષોમાંથી ઉત્પન્ન થાય છે' (Omnis cellula e cellula) છે. આ સૂક્ષ્મજીવ કોષરહિત અવસ્થામાંથી કોષનું નિર્માણ કરે છે, જે આ સિદ્ધાંતને સીધો પડકારે છે. વિકલ્પ A ખોટો છે કારણ કે કોષરહિત અવસ્થા જીવંત ગણાતી નથી. વિકલ્પ C અને D ખોટા છે કારણ કે ચયાપચય અને DNA પ્રસારણ કોષરહિત અવસ્થામાં થતું નથી, પરંતુ આ સિદ્ધાંતોને સીધો પડકારતા નથી.", "ncert_ref": "કક્ષા ૧૧ - પ્રકરણ ૮: કોષ - જીવનનો એકમ", "difficulty": "Hard", "num": 39}, {"question": "એક સંશોધકે નવો સૂક્ષ્મજીવ શોધ્યો છે જે એકકોષીય છે, પરંતુ તેના કોષકેન્દ્રમાં DNA સાથે RNA પણ મુક્ત રીતે તરતું જોવા મળે છે. આ સૂક્ષ્મજીવના સંદર્ભમાં કોષવાદના આધુનિક સ્વરૂપને લગતા નીચેનામાંથી કયું વિધાન સૌથી વધુ યોગ્ય છે?", "options": ["A) આ સૂક્ષ્મજીવ કોષવાદના સિદ્ધાંતનું સંપૂર્ણ પાલન કરે છે, કારણ કે તે એકકોષીય છે અને તેના કોષકેન્દ્રમાં આનુવંશિક દ્રવ્ય હાજર છે", "B) આ સૂક્ષ્મજીવ કોષવાદના સિદ્ધાંતને આંશિક રીતે પડકારે છે, કારણ કે સામાન્ય રીતે પ્રોકેરિયોટિક કોષોમાં DNA મુક્ત રીતે તરતું હોવા છતાં RNA કોષકેન્દ્રમાં હોતું નથી", "C) આ સૂક્ષ્મજીવ કોષવાદના સિદ્ધાંતને સંપૂર્ણપણે પડકારે છે, કારણ કે કોષકેન્દ્રમાં DNA સાથે RNAનું મુક્ત તરણ યુકેરિયોટિક કોષોના લક્ષણને અનુરૂપ નથી", "D) આ સૂક્ષ્મજીવ કોષવાદના સિદ્ધાંતને આંશિક રીતે સમર્થન આપે છે, પરંતુ તેના કોષકેન્દ્રમાં RNAની હાજરી પ્રોટીન સંશ્લેષણની પ્રક્રિયાને અસર કરે છે, જે કોષવાદના 'કોષ એ ચયાપચયનું એકમ છે' એ વિધાનને પડકારે છે"], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે. પ્રોકેરિયોટિક કોષોમાં DNA ન્યુક્લિયોઇડ પ્રદેશમાં મુક્ત રીતે તરતું હોય છે, પરંતુ RNA સામાન્ય રીતે કોષકેન્દ્રમાં હોતું નથી - તે કોષરસમાં હોય છે. આ સૂક્ષ્મજીવમાં RNA કોષકેન્દ્રમાં હોવાને કારણે તે કોષવાદના સિદ્ધાંતને આંશિક રીતે પડકારે છે, પરંતુ તે સંપૂર્ણપણે નકારતો નથી કારણ કે તે એકકોષીય છે અને તેના કોષમાં આનુવંશિક દ્રવ્ય હાજર છે. વિકલ્પ A ખોટો છે કારણ કે RNAની અસામાન્ય સ્થિતિને અવગણવામાં આવી છે. વિકલ્પ C ખોટો છે કારણ કે આ સૂક્ષ્મજીવ યુકેરિયોટિક નથી અને તે કોષવાદને સંપૂર્ણપણે પડકારતો નથી. વિકલ્પ D ખોટો છે કારણ કે RNAની હાજરી પ્રોટીન સંશ્લેષણને અટકાવતી નથી, માત્ર તેની સ્થિતિ અસામાન્ય છે.", "ncert_ref": "કક્ષા XI - પ્રકરણ 8: કોષ: જીવનનો એકમ", "difficulty": "Hard", "num": 40}, {"question": "કોષવાદના સિદ્ધાંત અનુસાર, નીચેનામાંથી કયું વિધાન 'કોષ એ અનુવંશિકતાનું એકમ છે' એ સિદ્ધાંતને પડકારે છે?", "options": ["A) કોષમાં વર્ણસૂત્રો દ્વારા અનુવંશિકતા નિયંત્રિત થાય છે.", "B) કોષમાં DNA-RNA દ્વારા જનીન માહિતીનો સંકેત થાય છે.", "C) વાયરસમાં અનુવંશિક માહિતી DNA અથવા RNA દ્વારા વહન પામે છે, પરંતુ તે કોષરહિત અવસ્થા ધરાવે છે.", "D) કોષમાં જનીન દ્વારા પ્રોટીન સંશ્લેષણ નિયંત્રિત થાય છે."], "correct": 2, "explanation": "વાયરસમાં અનુવંશિક માહિતી DNA અથવા RNA દ્વારા વહન પામે છે, પરંતુ તે કોષરહિત અવસ્થા ધરાવે છે, જે કોષવાદના સિદ્ધાંતને પડકારે છે કે 'કોષ એ અનુવંશિકતાનું એકમ છે'. બાકીના વિધાનો કોષમાં અનુવંશિકતાને સાચી રીતે વર્ણવે છે.", "ncert_ref": "Class XI - Chapter 8: કોષ: જીવનનું મૂળભૂત એકમ", "difficulty": "Hard", "num": 41}, {"question": "વાયરસને કોષવાદના સિદ્ધાંતનું અપવાદ ગણવામાં આવે છે, કારણ કે તે:", "options": ["A) કોષી રચના ધરાવે છે પરંતુ કોષકેન્દ્ર રહિત હોય છે", "B) કોષરહિત અવસ્થામાં જીવંત રહી શકે છે અને કોષમાં પ્રવેશ્યા પછી જ પ્રજનન કરે છે", "C) અનુવંશિક પદાર્થ તરીકે DNA અથવા RNA ધરાવે છે પરંતુ ચયાપચય ક્રિયાઓ કરતું નથી", "D) પ્રોટીન અને કાર્બોદિતથી બનેલું હોય છે પરંતુ જનીન રહિત હોય છે"], "correct": 1, "explanation": "વાયરસ કોષરહિત અવસ્થામાં જીવંત રહી શકે છે અને કોષમાં પ્રવેશ્યા પછી જ પ્રજનન કરે છે, જે કોષવાદના મૂળભૂત સિદ્ધાંત 'કોષ એ જીવનનું મૂળભૂત એકમ છે'ને પડકારે છે. A) ખોટું છે કારણ કે વાયરસ કોષી રચના ધરાવતું નથી. C) ખોટું છે કારણ કે વાયરસ ચયાપચય ક્રિયાઓ કરતું નથી, પરંતુ આ વાયરસને અપવાદ બનાવતું મુખ્ય કારણ કોષરહિત અવસ્થા અને કોષ પર આધારિત પ્રજનન છે. D) ખોટું છે કારણ કે વાયરસમાં જનીન (DNA/RNA) હાજર હોય છે.", "nce ીવનચક્ર દરમિયાન કોષરહિત અવસ્થા (વાયરિયન કણ) અને કોષીય અવસ્થા (યજમાન કોષમાં પ્રવેશ્યા પછી) બંને જોવા મળે છે. વાયરસમાં કોષકેન્દ્ર અથવા કોષીય અંગિકાઓનો અભાવ હોય છે, જેથી તે કોષવાદના મૂળભૂત સિદ્ધાંત 'કોષ એ જીવનનું રચનાત્મક અને ક્રિયાત્મક એકમ છે'ને પડકારે છે. બેક્ટરિયા, માઇકોપ્લાઝમા અને યીસ્ટ એ બધા કોષીય રચના ધરાવે છે, જેથી તેઓ કોષવાદના સિદ્ધાંતને સ્વીકારે છે.", "ncert_ref": "Class XI - Chapter 8: કોષ: જીવનનું મૂળભૂત એકમ", "difficulty": "Hard", "num": 48}, {"question": "એક સંશોધકે એક નવો સજીવ શોધ્યો છે જે બહુકોષીય છે, પરંતુ તેના કોષોમાં કોષકેન્દ્ર અનુપસ્થિત છે અને તે સ્વતંત્ર રીતે ચયાપચય કરે છે. આ સજીવ કોષવાદના કયા સિદ્ધાંતને પડકારે છે?", "options": ["A) કોષ એ જીવનનું રચનાત્મક એકમ છે.", "B) કોષ એ જીવનનું ક્રિયાત્મક એકમ છે.", "C) કોષ એ અનુવંશિકતાનું એકમ છે.", "D) કોષો કોષોમાંથી ઉત્પન્ન થાય છે."], "correct": 2, "explanation": "કોષકેન્દ્ર અનુપસ્થિત હોવા છતાં સજીવ સ્વતંત્ર રીતે ચયાપચય કરે છે, જે કોષ એ અનુવંશિકતાનું એકમ છે એ સિદ્ધાંતને પડકારે છે, કારણ કે અનુવંશિકતા માટે કોષકેન્દ્ર જરૂરી ગણવામાં આવે છે. બાકીના વિકલ્પો અસત્ય છે: A) કોષ એ જીવનનું રચનાત્મક એકમ છે એ સિદ્ધાંતને પડકારતો નથી, કારણ કે સજીવ કોષી રચના ધરાવે છે. B) કોષ એ જીવનનું ક્રિયાત્મક એકમ છે એ સિદ્ધાંતને પડકારતો નથી, કારણ કે સજીવ કોષી ક્રિયાઓ કરે છે. D) કોષો કોષોમાંથી ઉત્પન્ન થાય છે એ સિદ્ધાંતને પડકારતો નથી, કારણ કે સજીવ કોષોમાંથી જ ઉત્પન્ન થાય છે.", "ncert_ref": "Class XI - Chapter 8: કોષ: જીવનનું મૂળભૂત એકમ", "difficulty": "Hard", "num": 49}, {"question": "નીચેનામાંથી કયો જીવ કોષવાદના સિદ્ધાંતને આંશિક રીતે પડકારે છે, કારણ કે તેના જીવનચક્ર દરમિયાન કોષકેન્દ્રરહિત અને કોષકેન્દ્રયુક્ત બંને અવસ્થાઓ જોવા મળે છે?", "options": ["A) પેરામીશિયમ (Paramecium)", "B) પ્લાઝમોડિયમ (Plasmodium)", "C) અમીબા (Amoeba)", "D) યુગ્લીના (Euglena)"], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે કારણ કે પ્લાઝમોડિયમ (મેલેરિયાના પરોપજીવી) તેના જીવનચક્ર દરમિયાન સ્પોરોઝોઈટ અવસ્થામાં કોષકેન્દ્રરહિત હોય છે, જ્યારે અન્ય અવસ્થાઓમાં કોષકેન્દ્રયુક્ત હોય છે. આ કોષવાદના 'કોષ એ જીવનનું મૂળભૂત એકમ છે' એ સિદ્ધાંતને આંશિક રીતે પડકારે છે. અન્ય વિકલ્પો એકકોષીય સજીવો છે જે સતત કોષકેન્દ્રયુક્ત હોય છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ", "difficulty": "Hard", "num": 50}, {"question": "એક સંશોધકે એક નવો બહુકોષીય સજીવ શોધ્યો છે જેના કોષોમાં વર્ણસૂત્રો તો હોય છે, પરંતુ તેના કોષકેન્દ્રમાં કોઈપણ પ્રકારનું કોષકેન્દ્રપટલ (nuclear membrane) જોવા મળતું નથી. આ સજીવ કોષવાદના કયા વિસ્તૃત સિદ્ધાંતને પડકારે છે?", "options": ["A) કોષ એ ચયાપચયનું એકમ છે", "B) કોષો કોષોમાંથી ઉત્પન્ન થાય છે", "C) કોષકેન્દ્ર એ કોષનું નિયંત્રણ કેન્દ્ર છે", "D) સુકોષકેન્દ્રી કોષોમાં કોષકેન્દ્રપટલ હાજર હોય છે"], "correct": 3, "explanation": "સાચો જવાબ વિકલ્પ D છે કારણ કે કોષવાદના આધુનિક સ્વરૂપ અનુસાર, સુકોષકેન્દ્રી (eukaryotic) કોષોમાં કોષકેન્દ્રપટલ હાજર હોય છે જે કોષકેન્દ્રને કોષરસથી અલગ કરે છે. આ સજીવમાં કોષકેન્દ્રપટલની ગેરહાજરી સુકોષકેન્દ્રી કોષોના મૂળભૂત લક્ષણને પડકારે છે. વિકલ્પ A, B અને C આ સજીવ માટે લાગુ પડે છે પરંતુ તેને પડકારતા નથી.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 8: કોષ - જીવનનો એકમ", "difficulty": "Hard", "num": 51}, {"question": "નીચેનામાંથી કયું ઉદાહરણ કોષવાદના 'કોષ એ અનુવંશિકતાનું એકમ છે' એ સિદ્ધાંતને આંશિક રીતે પડકારે છે, કારણ કે તેમાં અનુવંશિક દ્રવ્ય કોષની બહાર પણ કાર્યશીલ હોઈ શકે છે?", "options": ["A) બેક્ટેરિયોફેજ વાયરસ (Bacteriophage virus)", "B) મિટોકોન્ડ્રિયામાં DNA ની હાજરી", "C) ક્લોરોપ્લાસ્ટમાં DNA ની હાજરી", "D) પ્રાયોન (Prion) પ્રોટીન"], "correct": 3, "explanation": "સાચો જવાબ વિકલ્પ D છે કારણ કે પ્રાયોન પ્રોટીન કોષરહિત અનુવંશિક દ્રવ્ય છે જે અન્ય પ્રોટીનને ખોટી રીતે વાળીને રોગ ઉત્પન્ન કરે છે. આ કોષવાદના 'કોષ એ અનુવંશિકતાનું એકમ છે' એ સિદ્ધાંતને પડકારે છે કારણ કે પ્રાયોન કોષની બહાર પણ અનુવંશિક માહિતીનું વહન કરી શકે છે. વિકલ્પ A વાયરસ છે જે કોષરહિત છે પરંતુ તેને જીવંત ગણવામાં આવતા નથી. વિકલ્પ B અને C કોષીય અંગોમાં DNA ની હાજરી દર્શાવે છે જે કોષવાદને સમર્થન આપે છે.", "ncert_ref": "કક્ષા 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 52}, {"question": "એક સંશોધકે એક નવો બહુકોષીય સજીવ શોધ્યો છે જેના કોષોમાં કોષકેન્દ્ર તો હાજર છે, પરંતુ તેના કોષકેન્દ્રમાં વર્ણસૂત્રોની સંખ્યા અલગ-અલગ કોષોમાં અસમાન જોવા મળે છે. આ અવલોકન કોષવાદના કયા મૂળભૂત સિદ્ધાંતને સૌથી વધુ પડકારે છે?", "options": ["A) બધા કોષો પૂર્વ અસ્તિત્વ ધરાવતા કોષોમાંથી ઉત્પન્ન થાય છે", "B) કોષ એ જીવનનું રચનાત્મક અને ક્રિયાત્મક એકમ છે", "C) કોષ એ અનુવંશિકતાનું એકમ છે", "D) બધા જીવંત સજીવો એક અથવા વધુ કોષોના બનેલા હોય છે"], "correct": 2, "explanation": "સાચો જવાબ વિકલ્પ C છે. કોષવાદનો મૂળભૂત સિદ્ધાંત 'કોષ એ અનુવંશિકતાનું એકમ છે' એ સૂચવે છે કે બધા કોષોમાં અનુવંશિક દ્રવ્ય (વર્ણસૂત્રો) સમાન અને સ્થિર હોવું જોઈએ. અહીં વર્ણસૂત્રોની સંખ્યામાં અસમાનતા આ સિદ્ધાંતને સીધો પડકારે છે, કારણ કે તે અનુવંશિક સ્થિરતા અને એકરૂપતાને નકારે છે.\n\nવિકલ્પ A ખોટો છે કારણ કે આ અવલોકન કોષોની ઉત્પત્તિ વિશે નથી, પરંતુ અનુવંશિક દ્રવ્યની સ્થિરતા વિશે છે.\n\nવિકલ્પ B ખોટો છે કારણ કે આ અવલોકન કોષની રચનાત્મક કે ક્રિયાત્મક ભૂમિકાને પડકારતું નથી.\n\nવિકલ્પ D ખોટો છે કારણ કે આ અવલોકન બહુકોષીય સજીવની કોષીય રચનાને નકારતું નથી.", "ncert_ref": "કક્ષા XI - પ્રકરણ 8: કોષ - જીવનનું એકમ, વિભાગ 8.1: કોષવાદ", "difficulty": "Hard", "num": 53}, {"question": "નીચેનામાંથી કયું ઉદાહરણ કોષવાદના 'કોષ એ ચયાપચયનું એકમ છે' એ સિદ્ધાંતને આંશિક રીતે પડકારે છે, પરંતુ તેના કોષી રચના ધરાવતા જીવ તરીકે સ્વીકારાય છે?", "options": ["A) માઇટોકોન્ડ્રિયા (Mitochondria)", "B) રાઇબોઝોમ (Ribosome)", "C) લીશમાણિયા (Leishmania)", "D) વાયરસ (Virus)"], "correct": 0, "explanation": "માઇટોકોન્ડ્રિયા એ કોષનું અંગિક છે જે ચયાપચયની ક્રિયાઓ (શ્વસન) માટે જવાબદાર છે, પરંતુ તે સ્વતંત્ર રીતે ચયાપચયની ક્રિયાઓ કરી શકતું નથી. આમ, તે 'કોષ એ ચયાપચયનું એકમ છે' એ સિદ્ધાંતને આંશિક રીતે પડકારે છે. રાઇબોઝોમ પ્રોટીન સંશ્લેષણ માટે જવાબદાર છે, લીશમાણિયા સ્વતંત્ર કોષી જીવ છે, અને વાયરસ કોષરહિત અવસ્થા ધરાવે છે.", "ncert_ref": "Class XI - Chapter 8: કોષ: જીવનનું મૂળભૂત એકમ", "difficulty": "Hard", "num": 54}, {"question": "નીચેનામાંથી કયો જીવ કોષવાદના સિદ્ધાંતને પૂરેપૂરો પડકાર કરે છે, કારણ કે તે કોઈપણ અવસ્થામાં કોષી રચના ધરાવતો નથી?", "options": ["A) બેક્ટેરિયા", "B) વાયરસ", "C) અમીબા", "D) યીસ્ટ"], "correct": 1, "explanation": "વાયરસ કોષવાદના સિદ્ધાંતને પૂરેપૂરો પડકાર કરે છે, કારણ કે તે કોઈપણ ્પ A ખોટો છે કારણ કે જો કે ચયાપચયિક એકમ તરીકે કોષની ભૂમિકા પર પ્રશ્ન છે, પરંતુ તે જીવનનું મૂળભૂત એકમ હોવાની બાબતને સંપૂર્ણ નકારતો નથી. વિકલ્પ C અને D ખોટા છે કારણ કે આ સજીવમાં કોષોનું નિર્માણ અને અનુવંશિકતા સંબંધિત પ્રક્રિયાઓ હજુ પણ કોષીય સ્તરે થઈ શકે છે.", "ncert_ref": "કક્ષા XI - પ્રકરણ 8: કોષ - જીવનનો એકમ", "difficulty": "Hard", "num": 83}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
