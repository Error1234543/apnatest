    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>

                <span>📚 . સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants) પ્રકાંડ (The Stem)</span>
                <span>🎯 Hard</span>

    <script>
        const questionsData = [{"question": "નીચેના પૈકી કયા પ્રકારના પ્રકાંડમાં અક્ષીય કલિકાઓ (axillary buds) વિકસિત થઈ શાખાઓ બનાવતી નથી?", "options": ["A) રમણીય પ્રકાંડ (Caulescent stem)", "B) અપ્રકાંડી (Acaulescent stem)", "C) દબાયેલ પ્રકાંડ (Dwarf stem)", "D) પર્ણકાંડ (Phylloclade)"], "correct": 1, "explanation": "અપ્રકાંડી (Acaulescent stem) પ્રકાંડમાં અક્ષીય કલિકાઓ વિકસિત થતી નથી કારણ કે આ પ્રકારના છોડમાં પ્રકાંડ લગભગ અદૃશ્ય હોય છે (ઉદા. બનાવટી). રમણીય પ્રકાંડમાં અક્ષીય કલિકાઓ શાખાઓ બનાવે છે, દબાયેલ પ્રકાંડમાં કલિકાઓ હાજર હોય છે પરંતુ પ્રકાંડ ટૂંકો હોય છે, અને પર્ણકાંડમાં અક્ષીય કલિકાઓ પર્ણના રૂપમાં વિકસે છે.", "ncert_ref": "Class XI - પ્રકરણ 5: વનસ્પતિશાસ્ત્રની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 1}, {"question": "જો એક છોડના પ્રકાંડમાં કોષવિભાજન કલિકા (apical meristem) નાશ પામે, તો નીચેના પૈકી કયું પરિણામ થશે?", "options": ["A) પ્રકાંડની લંબાઈમાં વૃદ્ધિ થશે", "B) પ્રકાંડની જાડાઈમાં વૃદ્ધિ થશે", "C) પ્રકાંડની લંબાઈ અને જાડાઈ બંનેમાં વૃદ્ધિ થશે", "D) પ્રકાંડની વૃદ્ધિ પૂર્ણપણે અટકી જશે"], "correct": 3, "explanation": "કોષવિભાજન કલિકા (apical meristem) પ્રકાંડની લંબાઈની વૃદ્ધિ માટે જવાબદાર હોય છે. જો આ કલિકા નાશ પામે, તો પ્રકાંડની લંબાઈમાં વૃદ્ધિ અટકી જશે. જાડાઈની વૃદ્ધિ માટે પાર્શ્વ કલિકા (lateral meristem) જવાબદાર હોય છે, પરંતુ લંબાઈની વૃદ્ધિ અટકી જશે. તેથી, પ્રકાંડની વૃદ્ધિ પૂર્ણપણે અટકી જશે.", "ncert_ref": "Class XI - પ્રકરણ 5: વનસ્પતિશાસ્ત્રની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 2}, {"question": "નીચેના પૈકી કયા પ્રકાંડમાં પર્ણોના અભાવે પર્ણના કાર્ય (પ્રકાશસંશ્લેષણ) પ્રકાંડ દ્વારા કરવામાં આવે છે?", "options": ["A) કંડ (Runner)", "B) પર્ણકાંડ (Phylloclade)", "C) કંદ (Rhizome)", "D) શલ્કકંડ (Bulb)"], "correct": 1, "explanation": "પર્ણકાંડ (Phylloclade) એ પ્રકાંડનો એક રૂપ છે જેમાં પ્રકાંડ પર્ણ જેવો દેખાય છે અને પર્ણના કાર્ય (પ્રકાશસંશ્લેષણ) કરે છે. કંડ, કંદ, અને શલ્કકંડમાં પર્ણો હાજર હોય છે અથવા તેમના કાર્ય પ્રકાંડ દ્વારા કરાતા નથી.", "ncert_ref": "Class XI - પ્રકરણ 5: વનસ્પતિશાસ્ત્રની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 3}, {"question": "નીચેના વિધાનો પૈકી કયું સત્ય નથી? 1. કંદ (Rhizome) એ એક પ્રકારનો ભૂમિગત પ્રકાંડ છે. 2. કંડ (Runner) એ એક પ્રકારનો ભૂમિગત પ્રકાંડ છે. 3. શલ્કકંડ (Bulb) એ એક પ્રકારનો ભૂમિગત પ્રકાંડ છે. 4. પર્ણકાંડ (Phylloclade) એ એક પ્રકારનો ભૂમિગત પ્રકાંડ છે.", "options": ["A) 1 અને 2", "B) 2 અને 3", "C) 3 અને 4", "D) 4"], "correct": 3, "explanation": "કંદ (Rhizome), કંડ (Runner), અને શલ્કકંડ (Bulb) એ બધા ભૂમિગત પ્રકાંડના પ્રકાર છે. પરંતુ પર્ણકાંડ (Phylloclade) એ ભૂમિગત પ્રકાંડ નથી, તે એક પ્રકારનો હવાઈ પ્રકાંડ છે જે પર્ણના કાર્ય કરે છે. તેથી, વિધાન 4 સત્ય નથી.", "ncert_ref": "Class XI - પ્રકરણ 5: વનસ્પતિશાસ્ત્રની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 4}, {"question": "એક છોડના પ્રકાંડમાં નીચેના પૈકી કયા લક્ષણો દ્વારા તેની ઉંમર નક્કી કરી શકાય છે?", "options": ["A) પ્રકાંડની લંબાઈ", "B) પ્રકાંડની જાડાઈ", "C) વાર્ષિક વલયો (Annual rings)", "D) પર્ણોની સંખ્યા"], "correct": 2, "explanation": "વાર્ષિક વલયો (Annual rings) એ પ્રકાંડમાં દર વર્ષે બનતા વલયો છે જે દ્વિદળી છોડના પ્રકાંડમાં જોવા મળે છે. આ વલયો દ્વારા પ્રકાંડની ઉંમર નક્કી કરી શકાય છે. પ્રકાંડની લંબાઈ, જાડાઈ, અને પર્ણોની સંખ્યા ઉંમર નક્કી કરવા માટે વિશ્વસનીય પદ્ધતિ નથી.", "ncert_ref": "Class XI - પ્રકરણ 5: વનસ્પતિશાસ્ત્રની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 5}, {"question": "નીચેના પૈકી કયા પ્રકાંડમાં કલિકા (bud) ની વૃદ્ધિ દરમિયાન અગ્રસ્થ (apical) કલિકા પોતાને જાતે જ મૃત્યુ પામે છે અને પછી તેની જગ્યાએ પાછળની કલિકા વિકસે છે?", "options": ["A) સીધા પ્રકાંડ (Erect stem)", "B) ચપટા પ્રકાંડ (Prostrate stem)", "C) સંકોચિત પ્રકાંડ (Condensed stem)", "D) સાયમોઝીયમ પ્રકારના પ્રકાંડ (Sympodial stem)"], "correct": 3, "explanation": "સાયમોઝીયમ પ્રકારના પ્રકાંડમાં અગ્રસ્થ કલિકા મૃત્યુ પામે છે અને તેની જગ્યાએ પાછળની કલિકા વિકસે છે, જેને 'સાયમોઝીયલ શાખાઉત્પત્તિ' કહેવાય છે. આ પ્રકારના પ્રકાંડમાં શાખાઓની વૃદ્ધિ અસમમિત રીતે થાય છે. સીધા, ચપટા અને સંકો uds) ના રૂપાંતરણ છે", "C) સક્સલેન્ટ પ્રકાંડ (succulent stem) - કારણ કે પ્રકાંડમાં પાણીનો સંગ્રહ થાય છે અને કાંટા પાણીના બાષ્પીભવનને ઘટાડવા માટે છે", "D) રાઇઝોફોર (rhizophore) - કારણ કે આ પ્રકાંડ ભૂમિગત છે અને તેની ધાર પરની રચનાઓ મૂળના રૂપાંતરણ છે"], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે. ક્લેડોડ (cladode) એ એક જ આંતરગાંઠ (internode) સુધી મર્યાદિત પ્રકાંડ છે જે પર્ણનું કાર્ય કરે છે. તેની ધાર પર જોવા મળતી કાંટા જેવી રચનાઓ અગ્રકલિકાઓના રૂપાંતરણ છે, જે પર્ણો નથી. વિકલ્પ A ખોટો છે કારણ કે ફાઇલોક્લેડ (phylloclade) એક કરતાં વધુ આંતરગાંઠ ધરાવે છે અને તેની ધાર પરની રચનાઓ પર્ણો હોઈ શકે છે. વિકલ્પ C ખોટો છે કારણ કે સક્સલેન્ટ પ્રકાંડમાં પાણીનો સંગ્રહ થાય છે, પરંતુ તે ચપટું હોતું નથી અને તેની ધાર પર કાંટા પાણીના બાષ્પીભવનને ઘટાડવા માટે નથી. વિકલ્પ D ખોટો છે કારણ કે રાઇઝોફોર ભૂમિગત પ્રકાંડ છે અને તેની ધાર પરની રચનાઓ મૂળના રૂપાંતરણ નથી.", "ncert_ref": "કક્ષા 11 - અધ્યાય 5: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 29}, {"question": "નીચેના વિધાનો ધ્યાનમાં લો અને સાચો વિકલ્પ પસંદ કરો:\n\nવિધાન 1: 'સ્ટોલન' (stolon) અને 'રનર' (runner) બંને ભૂમિની સપાટી પર આડી રીતે વૃદ્ધિ પામતા પ્રકાંડ છે, જે નવા છોડના નિર્માણમાં મદદ કરે છે.\nવિધાન 2: 'સ્ટોલન'માં આંતરગાંઠો (internodes) ટૂંકી હોય છે અને તેની અક્ષીય કલિકાઓ (axillary buds) માંથી નવા છોડ વિકસે છે, જ્યારે 'રનર'માં આંતરગાંઠો લાંબી હોય છે અને તેની અગ્રકલિકાઓ (apical buds) માંથી નવા છોડ વિકસે છે.\nવિધાન 3: 'ઓફસેટ' (offset) એ 'સ્ટોલન'નો એક પ્રકાર છે જે જલીય વનસ્પતિઓમાં જોવા મળે છે.", "options": ["A) વિધાન 1 અને 2 સાચાં છે, વિધાન 3 ખોટું છે", "B) વિધાન 1 અને 3 સાચાં છે, વિધાન 2 ખોટું છે", "C) વિધાન 1 સાચું છે, વિધાન 2 અને 3 ખોટાં છે", "D) ત્રણેય વિધાનો સાચાં છે"], "correct": 2, "explanation": "સાચો જવાબ વિકલ્પ C છે. વિધાન 1 સાચું છે કારણ કે 'સ્ટોલન' અને 'રનર' બંને ભૂમિની સપાટી પર આડી રીતે વૃદ્ધિ પામતા પ્રકાંડ છે જે વાનસ્પતિક પ્રજનનમાં મદદ કરે છે. વિધાન 2 ખોટું છે કારણ કે 'સ્ટોલન'માં આંતરગાંઠો લાંબી હોય છે અને તેની અગ્રકલિકાઓમાંથી નવા છોડ વિકસે છે, જ્યારે 'રનર'માં આંતરગાંઠો num": 44}, {"question": "નીચેના પૈકી કયા છોડના પ્રકાંડમાં 'રનર' (runner) જોવા મળે છે, જે ભૂમિગત પ્રકાંડ હોય છે અને નવી વનસ્પતિઓ ઉત્પન્ન કરે છે?", "options": ["A) આલુ (Solanum tuberosum)", "B) પુદીના (Mentha)", "C) હળદર (Curcuma longa)", "D) દૂધી (Euphorbia)"], "correct": 1, "explanation": "સાચો વિકલ્પ B) પુદીના (Mentha) છે. પુદીનામાં 'રનર' ભૂમિગત પ્રકાંડ હોય છે જે નવી વનસ્પતિઓ ઉત્પન્ન કરે છે. આલુ (A)માં કંદ (tuber) જોવા મળે છે, હળદર (C)માં પ્રકાંડ ભૂમિગત કંદ સ્વરૂપે હોય છે, અને દૂધી (D)માં પ્રકાંડ સ્થૂળ અને રસાળ હોય છે, જે 'રનર' નથી.", "ncert_ref": "Class XI - Chapter 5: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 45}, {"question": "નીચેના વિધાનો ધ્યાનમાં લો અને સાચો વિકલ્પ પસંદ કરો:\nવિધાન 1: 'સ્ટોલન' (stolon) અને 'રનર' (runner) બંને ભૂમિગત પ્રકાંડ છે જે વાનસ્પતિક પ્રજનનમાં મદદ કરે છે.\nવિધાન 2: 'સ્ટોલન' એ હવાઈ પ્રકાંડ છે જે મુખ્ય છોડથી અલગ થઈ નવા છોડનું નિર્માણ કરે છે, જ્યારે 'રનર' ભૂમિગત પ્રકાંડ છે.\nવિધાન 3: 'સ્ટોલન' અને 'રનર' બંને હવાઈ પ્રકાંડ છે, પરંતુ 'સ્ટોલન' મુખ્ય છોડથી ઉપરની તરફ વૃદ્ધિ પામે છે જ્યારે 'રનર' જમીનની સપાટી પર ફેલાય છે.", "options": ["A) માત્ર વિધાન 1 સાચું છે", "B) માત્ર વિધાન 2 સાચું છે", "C) માત્ર વિધાન 3 સાચું છે", "D) તમામ વિધાનો ખોટાં છે"], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે. વિધાન 2 સાચું છે કારણ કે 'સ્ટોલન' એ હવાઈ પ્રકાંડ છે જે મુખ્ય છોડથી અલગ થઈ નવા છોડનું નિર્માણ કરે છે (દા.ત. પીપરમિન્ટ), જ્યારે 'રનર' ભૂમિગત પ્રકાંડ છે જે જમીનની સપાટી પર ફેલાય છે (દા.ત. ઘાસ). વિધાન 1 ખોટું છે કારણ કે 'સ્ટોલન' ભૂમિગત પ્રકાંડ નથી. વિધાન 3 ખોટું છે કારણ કે 'સ્ટોલન' અને 'રનર' બંને હવાઈ પ્રકાંડ નથી - 'રનર' જમીનની સપાટી પર ફેલાય છે.", "ncert_ref": "ક્લાસ XI - અધ્યાય 5: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 46}, {"question": "નીચેના પૈકી કયા છોડના પ્રકાંડમાં 'ક્લેડોડ' અને 'ફાઇલોક્લેડ' બંનેની લાક્ષણિકતાઓ જોવા મળે છે, જ્યાં પ્રકાંડ પર્ણના કાર્યને અદા કરે છે અને તે ચપટો પણ હોય છે?", "options": ["A) અસ્પરેગસ (Asparagus)", "B) યુફ                 let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
