    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}

        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>

    <script>

n": "વિકલ્પ C ખોટો છે કારણ કે 'પેરિયન્થ' (Perianth) એ પુષ્પપત્રો અને દળપત્રોની સંયુક્ત રચના છે, જે એકલિંગી પુષ્પોની લાક્ષણિકતા નથી. કેળાના પુષ્પ દ્વિલિંગી (Bisexual) હોય છે, જેમાં પુમકેસર અને સ્ત્રીકેસર બંને હાજર હોય છે. NCERT Class XI, Chapter 5: 'સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા'માં જણાવ્યા પ્રમાણે, પેરિયન્થ સામાન્ય રીતે દ્વિલિંગી પુષ્પોમાં જોવા મળે છે. વિકલ્પ A, B અને D સાચા છે કારણ કે કેળું મુસા કુળનું છે, સ્ટેમિનોડ પરાગણમાં મદદ કરે છે, અને અધોઅણી અંડાશય ધરાવતા પુષ્પોમાં પરિપક્વ ફળ નિર્માણ થાય છે.", "ncert_ref": "Class XI - પ્રકરણ 5: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા", "difficulty": "Hard", "num": 41}, {"question": "નીચેનામાંથી કયા પુષ્પમાં 'અંડાશય' (Ovary) 'ઉપરઅણી' (Superior ovary) હોય છે, પરંતુ પુષ્પાસન (Thalamus) અતિવિકસિત અને શંકુ આકારનું હોય છે, જેમાં પુષ્પપત્રો, દળપત્રો, પુમકેસર અને સ્ત્રીકેસર સ્પષ્ટપણે અલગ જોવા મળે છે?", "options": ["A) ગુલાબ (Rosa)", "B) કેળું (Musa)", "C) સૂર્યફૂલ (Helianthus)", "D) ડોળી (Hibiscus)"], "correct": 1, "explanation": "કેળાના પુષ્પમાં અંડાશય 'ઉપરઅણી' હોય છે, પરંતુ પુષ્પાસન અતિવિકસિત અને શંકુ આકારનું હોય છે, જેમાં પુષ્પના સભ્યો સ્પષ્ટપણે અલગ જોવા મળે છે. ગુલાબમાં અંડાશય ઉપરઅણી હોય છે, પરંતુ પુષ્પાસન શંકુ આકારનું નથી. સૂર્યફૂલમાં અંડાશય અધોઅણી હોય છે. ડોળીમાં અંડાશય ઉપરઅણી હોય છે, પરંતુ પુષ્પાસન શંકુ આકારનું નથી.", "ncert_ref": "Class XI - પ્રકરણ 5: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 42}, {"question": "નીચેનામાંથી કયું પુષ્પ 'ગાયનોએન્ડ્રસ' (Gynandrous) પુષ્પ નથી, જ્યાં પુમકેસર (Androecium) ના તંતુઓ (Filaments) સ્ત્રીકેસર (Gynoecium) સાથે જોડાયેલા હોય છે?", "options": ["A) કેળું (Banana)", "B) કોબીજ (Cabbage)", "C) કમળ (Lotus)", "D) આલુ (Potato)"], "correct": 3, "explanation": "ગાયનોએન્ડ્રસ પુષ્પમાં પુમકેસરના તંતુઓ સ્ત્રીકેસર સાથે જોડાયેલા હોય છે. કેળું, કોબીજ અને કમળમાં આ સ્થિતિ જોવા મળે છે, પરંતુ આલુમાં આ સ્થિતિ જોવા મળતી નથી.", "ncert_ref": "Class XI - પ્રકરણ ૫: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 43}, {"question": "નીચેનામાંથી કયા પુષ્પમાં 'પરિપક્વ ફળ' (False fruit) નિર્માણ થાય છે, જ્યારે અંડાશય (Ovary) 'અધોઅણી' (Inferior) હોય છે અને પુષ્પાસન (Thalamus) તેના ભાગમાં ફળમાં પરિવર્તિત થાય છે?", "options": ["A) કેળું (Musa)", "B) સફરજન (Malus)", "C) ડાંગર (Oryza)", "D) મરચું (Capsicum)"], "correct": 1, "explanation": "સફરજન (Malus) માં અંડાશય અધોઅણી હોય છે અને પુષ્પાસન ફળમાં પરિવર્તિત થાય છે, જેને પરિપક્વ ફળ કહેવાય છે. કેળુંમાં અંડાશય અધોઅણી હોય છે પરંતુ તે સત્ય ફળ છે. ડાંગર અને મરચુંમાં અંડાશય ઉપરઅણી હોય છે, તેથી પરિપક્વ ફળ નથી બનતું.", "ncert_ref": "Class XI - પ્રકરણ ૫: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 44}, {"question": "નીચેનામાંથી કયું વિધાન 'ગાયનોએન્ડ્રસ પુષ્પ' (Gynandrous flower) વિશે સત્ય છે?", "options": ["A) પુમકેસર (Androecium) ના તંતુઓ (Filaments) સ્ત્રીકેસર (Gynoecium) સાથે જોડાયેલા હોય છે.", "B) પુમકેસર અને સ્ત્રીકેસર એકબીજાથી સંપૂર્ણપણે અલગ હોય છે.", "C) પુષ્પમાં ફક્ત પુમકેસર જ હાજર હોય છે.", "D) પુષ્પમાં ફક્ત સ્ત્રીકેસર જ હાજર હોય છે."], "correct": 0, "explanation": "ગાયનોએન્ડ્રસ પુષ્પમાં પુમકેસરના તંતુઓ સ્ત્રીકેસર સાથે જોડાયેલા હોય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે ગાયનોએન્ડ્રસ પુષ્પમાં પુમકેસર અને સ્ત્રીકેસર બંને હાજર હોય છે અને તેઓ એકબીજા સાથે જોડાયેલા હોય છે.", "ncert_ref": "Class XI - પ્રકરણ ૫: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 45}, {"question": "એક પુષ્પમાં નીચેના લક્ષણો જોવા મળે છે: (1) પુષ્પાસન અતિવિકસિત અને પ્યાલા આકારનું છે, (2) અંડાશય અધોઅણી (Inferior ovary) છે, (3) પુષ્પના સભ્યો પંચાવયવી (Pentamerous) છે, (4) પુષ્પ અભિસરણી (Zygomorphic) નથી. આ પુષ્પ માટે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) આ પુષ્પ ગુલાબ કુળ (Rosaceae) નું હોઈ શકે છે, જેમાં પુષ્પાસન અતિવિકસિત હોય છે અને ફળ નિર્માણમાં ભાગ લે છે.", "B) આ પુષ્પમાં પરિપક્વ ફળ (False fruit) નિર્માણ થઈ શકે છે, કારણ કે પુષ્પાસન ફળના નિર્માણમાં ભાગ લે છે.", "C) આ પુષ્પમાં પુમકેસર (Androecium) ના તંતુઓ (Filaments) પુષ્પાસન સાથે જોડાયેલા હોઈ શકે છે, જે ગુલાબ કુળની લાક્ષણિકતા છે.", "D) આ પુષ્પ સૂર્યમુખી કુળ (Asteraceae) નું હોઈ શકે છે, કારણ કે તેમાં પુષ્પાસન અતિવિકસિત અને પંચાવયવી પુષ્પો જોવા મળે છે."], "correct": 3, "explanation": "સૂર્યમુખી કુળ (Asteraceae) ના પુષ્પોમાં પુષ્પાસન સામાન્ય રીતે અતિવિકસિત હોતું નથી અને તે 'સંકલિત પુષ્પ' (Composite flower) તરીકે ઓળખાય છે, જેમાં અસંખ્ય નાના પુષ્પો એક જ પુષ્પાસન પર ગોઠવાયેલા હોય છે. આ ઉપરાંત, સૂર્યમુખી કુળના પુષ્પો સામાન્ય રીતે અભિસરણી (Zygomorphic) હોય છે, જે આ પ્રશ્નમાં આપેલ લક્ષણો સાથે મેળ ખાતું નથી. વિકલ્પ A, B અને C ગુલાબ કુળ (Rosaceae) ની લાક્ષણિકતાઓ સાથે સુસંગત છે, જેમાં પુષ્પાસન અતિવિકસિત હોય છે અને પરિપક્વ ફળ (જેમ કે સફરજન) નિર્માણમાં ભાગ લે છે. ગુલાબ કુળના પુષ્પોમાં પંચાવયવી પુષ્પો અને અધોઅણી અંડાશય પણ જોવા મળે છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 5: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants) - પુષ્પની રચના અને ફળનું નિર્માણ", "difficulty": "Hard", "num": 46}, {"question": "નીચેના પૈકી કયા પુષ્પમાં 'પરિપક્વ ફળ' (False fruit) નિર્માણમાં 'પુષ્પાસન' (Thalamus) નો મુખ્ય ફાળો હોય છે, પરંતુ તેનું 'અંડાશય' (Ovary) 'ઉપરઅણી' (Superior ovary) પ્રકારનું હોય છે?", "options": ["A) સફરજન (Apple)", "B) સ્ટ્રોબેરી (Strawberry)", "C) કાજુ (Cashew)", "D) નાસપતી (Pear)"], "correct": 2, "explanation": "સફરજન, નાસપતી અને સ્ટ્રોબેરીમાં પરિપક્વ ફળ નિર્માણમાં પુષ્પાસનનો ફાળો હોય છે, પરંતુ તેમનું અંડાશય 'અધોઅણી' (Inferior ovary) પ્રકારનું હોય છે. કાજુમાં પુષ્પાસન અતિવિકસિત અને ખાદ્ય ભાગ બનાવે છે, પરંતુ તેનું અંડાશય 'ઉપરઅણી' (Superior ovary) પ્રકારનું હોય છે. તેથી કાજુ સાચો વિકલ્પ છે. NCERT Class XI - Chapter 5: પુષ્પીય વનસ્પતિઓની બાહ્યાકાર વિદ્યા.", "ncert_ref": "કક્ષા XI - પ્રકરણ 5: પુષ્પીય વનસ્પતિઓની બાહ્યાકાર વિદ્યા", "difficulty": "Hard", "num": 47}, {"question": "એક પુષ્પમાં નીચેના લક્ષણો જોવા મળે છે:\n(1) પુષ્પાસન અતિવિકસિત અને પ્યાલા આકારનું છે.\n(2) અંડાશય 'અધોઅણી' (Inferior ovary) પ્રકારનું છે.\n(3) પુષ્પ 'દ્વિલિંગી' (Bisexual) છે.\n(4) પુષ્પ 'અભિસરણી' (Zygomorphic) છે.\nઆ પુષ્પ કયા કુળનું હોઈ શકે?", "options": ["A) રોઝેસી (Rosaceae)", "B) ફ ે પુષ્પાસનનો એક ભાગ છે જે અંડાશયને ઉંચકે છે.", "C) તે સ્ત્રીકેસર (Gynoecium) નો એક ભાગ છે.", "D) તે પુમકેસર (Androecium) ના તંતુઓ સાથે જોડાયેલું હોય છે."], "correct": 3, "explanation": "સાચો જવાબ D) છે. 'ગાયનોફોર' (Gynophore) એ અંડાશયને પુષ્પાસનથી અલગ રાખે છે (A), પુષ્પાસનનો એક ભાગ છે જે અંડાશયને ઉંચકે છે (B), અને સ્ત્રીકેસર (Gynoecium) નો એક ભાગ છે (C). પરંતુ તે પુમકેસર (Androecium) ના તંતુઓ સાથે જોડાયેલું હોતું નથી (D), જે ખોટું વિધાન છે.", "ncert_ref": "Class XI - Chapter 5: પુષ્પી વનસ્પતિની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 63}, {"question": "નીચેનામાંથી કયું પુષ્પ 'પરિપક્વ ફળ' (False fruit) નિર્માણમાં 'પુષ્પાસન' (Thalamus) ઉપરાંત અન્ય ભાગોનો પણ ફાળો હોય છે, પરંતુ તેના પુષ્પમાં 'અંડાશય' (Ovary) 'અધોઅણી' (Inferior ovary) નથી?", "options": ["A) સફરજન (Apple)", "B) સ્ટ્રોબેરી (Strawberry)", "C) કાજુ (Cashew)", "D) અંજીર (Fig)"], "correct": 2, "explanation": "કાજુ (Cashew) એ 'પરિપક્વ ફળ' (False fruit) છે, જેમાં 'પુષ્પાસન' (Thalamus) ઉપરાંત 'ફળદંડ' (Pedicel) નો પણ ફાળો હોય છે, પરંતુ તેના પુષ્પમાં 'અંડાશય' (Ovary) 'ઉપરઅણી' (Superior ovary) હોય છે. સફરજનમાં 'પુષ્પાસન' અતિવિકસિત થઈને ફળ બને છે અને અંડાશય અધોઅણી હોય છે. સ્ટ્રોબેરીમાં 'પુષ્પાસન' અતિવિકસિત થઈને ફળ બને છે અને અંડાશય ઉપરઅણી હોય છે, પરંતુ તેમાં 'અંડકો' (Achenes) ફળ નથી ગણાતા. અંજીરમાં 'પુષ્પાસન' અતિવિકસિત થઈને ફળ બને છે અને અંડાશય અધોઅણી હોય છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 5: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants) - ફળોના પ્રકારો અને પરિપક્વ ફળ", "difficulty": "Hard", "num": 64}, {"question": "નીચેનામાંથી કયું વિધાન 'સંકલિત પુષ્પ' (Composite flower) વિશે ખોટું છે?", "options": ["A) સંકલિત પુષ્પમાં અસખ્ય પુષ્પો એકસાથે ગોઠવાયેલા હોય છે.", "B) સૂર્યમુખી (Helianthus) સંકલિત પુષ્પનું ઉદાહરણ છે.", "C) સંકલિત પુષ્પમાં દરેક પુષ્પ સ્વતંત્ર રીતે ફૂલે છે.", "D) સંકલિત પુષ્પમાં પુષ્પવિન્યાસ (Inflorescence) 'કેપિટ્યુલમ' (Capitulum) પ્રકારનો હોય છે."], "correct": 2, "explanation": "સાચો જવાબ C) છે. સંકલિત પુષ્પમાં દરેક પુષ્પ સ્વતંત્ર રીતે ફૂલતું નથી, પરંતુ તે એકસાથે ગોઠવાયેલા હોય છે અને સામાન્ય રીતે એક જ પુષ્પ જેવું દેખાય છે. સૂર્યમુખી સંકલિત પુષ્પનું ઉદાહરણ છે અને તેનો પુષ્પવિન્યાસ 'કેપિટ્યુલમ' પ્રકારનો હોય છે.", "ncert_ref": "Class XI - Chapter 5: પુષ્પી વનસ્પતિની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 65}, {"question": "નીચેનામાંથી કયા પુષ્પમાં 'હેટરોસ્ટાઈલી' (Heterostyly) જોવા મળે છે, જેમાં પુષ્પના કેસર (Style) ની લંબાઈ ભિન્ન ભિન્ન હોય છે અને તે સ્વ-અસંગતતા (Self-incompatibility) દર્શાવે છે?", "options": ["A) જાસ્વંદ (Hibiscus)", "B) પ્રાઇમરોઝ (Primrose)", "C) ગુલાબ (Rosa)", "D) સૂર્યમુખી (Helianthus)"], "correct": 1, "explanation": "સાચો જવાબ B) પ્રાઇમરોઝ (Primrose) છે. પ્રાઇમરોઝ પુષ્પોમાં 'હેટરોસ્ટાઈલી' જોવા મળે છે, જેમાં પુષ્પના કેસર (Style) ની લંબાઈ ભિન્ન ભિન્ન હોય છે અને તે સ્વ-અસંગતતા દર્શાવે છે. જાસ્વંદ, ગુલાબ અને સૂર્યમુખીમાં આ લક્ષણ જોવા મળતું નથી.", "ncert_ref": "Class XI - Chapter 5: પુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 66}, {"question": "નીચેનામાંથી કયું પુષ્પ 'પરાગણ કોષ' (Pollinium) ધરાવે છે, પરંતુ તેના પુષ્પમાં 'ગાયનોસ્ટીમિયમ' (Gynostemium) રચના હોતી નથી?", "options": ["A) ઓર્કિડ (Orchidaceae કુળ)", "B) એસ્કલિપિયાસ (Asclepiadaceae કુળ)", "C) હિબિસ્કસ (Malvaceae કુળ)", "D) સૂર્યમુખી (Asteraceae કુળ)"], "correct": 1, "explanation": "એસ્કલિપિયાસ (Asclepiadaceae કુળ) પુષ્પમાં પરાગણ કોષ (Pollinium) જોવા મળે છે, પરંતુ તેમાં ગાયનોસ્ટીમિયમ રચના હોતી નથી. ઓર્કિડમાં પરાગણ કોષ સાથે ગાયનોસ્ટીમિયમ રચના પણ જોવા મળે છે. હિબિસ્કસ અને સૂર્યમુખીમાં પરાગણ કોષ જોવા મળતા નથી. એસ્કલિપિયાસમાં પરાગરજના સમૂહ એકબીજા સાથે જોડાઈને પરાગણ કોષ બનાવે છે, જે કીટકો દ્વારા પરાગણ માટે અનુકૂળ હોય છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 5: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants) - પુષ્પ", "difficulty": "Hard", "num": 67}, {"question": "નીચેના વિધાનો ધ્યાનમાં લઈને સાચો વિકલ્પ પસંદ કરો:\n(1) 'હેટરોસ્ટાઈલી' (Heterostyly) એ સ્વ-અસંગતતા (Self-incompatibility) નો એક પ્રકાર છે, જેમાં એક જ પ્રજાતિના પુષ્પોમાં કેસર (Style) અને પુંકેસર (Stamen) ની લંબાઈ અલગ-અલગ હોય છે.\n(2) પ્રાયમરોઝ (Primrose) પુષ્પમાં હેટરોસ્ટાઈલી જોવા મળે છે, જેમાં 'પિન' અને 'થ્રમ' એમ બે પ્રકારના પુષ્પો હોય છે.\n(3) હેટરોસ્ટાઈલી ધરાવતા પુષ્પોમાં સ્વ-પરાગણ (Self-pollination) થવાની શક્યતા વધારે હોય છે કારણ કે પરાગરજ અને સ્ત્રીકેસર એકબીજાની નજીક હોય છે.", "options": ["A) માત્ર વિધાન (1) અને (2) સાચાં છે", "B) માત્ર વિધાન (2) અને (3) સાચાં છે", "C) માત્ર વિધાન (1) અને (3) સાચાં છે", "D) ત્રણેય વિધાનો સાચાં છે"], "correct": 0, "explanation": "વિધાન (1) અને (2) સાચાં છે. હેટરોસ્ટાઈલી એ સ્વ-અસંગતતાનો એક પ્રકાર છે જેમાં એક જ પ્રજાતિના પુષ્પોમાં કેસર અને પુંકેસરની લંબાઈ અલગ-અલગ હોય છે, જે સ્વ-પરાગણને અટકાવે છે. પ્રાયમરોઝમાં 'પિન' અને 'થ્રમ' પ્રકારના પુષ્પો જોવા મળે છે. વિધાન (3) ખોટું છે કારણ કે હેટરોસ્ટાઈલી ધરાવતા પુષ્પોમાં સ્વ-પરાગણની શક્યતા ઘટે છે, કારણ કે પરાગરજ અને સ્ત્રીકેસરની સ્થિતિ અલગ-અલગ હોય છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન (Sexual Reproduction in Flowering Plants) - પરાગણ", "difficulty": "Hard", "num": 68}, {"question": "એક પુષ્પમાં નીચેના લક્ષણો જોવા મળે છે: (1) પુષ્પાસન (થેલેમસ) અતિવિકસિત અને શંકુ આકારનું હોય છે, (2) પુષ્પપત્રો (Sepals) અને દળપત્રો (Petals) અલગ હોય છે, (3) પુમકેસર (Androecium) ના તંતુઓ (Filaments) પુષ્પાસન સાથે જોડાયેલા હોય છે, (4) અંડાશય (Ovary) અધોઅણી (Inferior) હોય છે. આ પુષ્પ કયા કુળનું હોઈ શકે?", "options": ["A) મળવકુળ (Malvaceae)", "B) કુકુરબિટેસી (Cucurbitaceae)", "C) રોઝેસી (Rosaceae)", "D) સોલેનેસી (Solanaceae)"], "correct": 1, "explanation": "સાચો જવાબ B) કુકુરબિટેસી (Cucurbitaceae) છે. કુકુરબિટેસી કુળના પુષ્પોમાં પુષ્પાસન અતિવિકસિત અને શંકુ આકારનું હોય છે, પુષ્પપત્રો અને દળપત્રો અલગ હોય છે, પુમકેસરના તંતુઓ પુષ્પાસન સાથે જોડાયેલા હોય છે, અને અંડાશય અધોઅણી હોય છે. ઉદાહરણ: કોળું (Cucumis sativus). A) મળવકુળમાં પુષ્પાસન શંકુ આકારનું નથી, C) રોઝેસી કુળમાં પુષ્પાસન પ્યાલા આકારનું હોય છે, અને D) સોલેનેસી કુળમાં અંડાશય સામાન્ય રીતે ઉપરઅણી હોય છે.", "ncert_ref": "Class XI - પ્રકરણ 5: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 69}, {"question": "નીચેનામાંથી કયું વિધાન 'હેટરોસ્ટાઈલી' (Heterostyly) વિશે ખોટું છે?", "options": ["A) હેટરોસ્ટાઈલીમાં પુષ્પના કેસર (Style) ની લંબાઈ ભિન્ન હોય છે.", "B) હેટરોસ્ટાઈલીમાં પરાગણ સ્વ-અસંગતતા (Self-incompatibility) ની સ્થિતિ સાથે સંકળાયેલું હોય છે.", "C) હેટરોસ્ટાઈલીમાં પુષ્પના પરાગકોષો (Pollen grains) ની આકાર ભિન્ન હોય છે.", "D) હેટરોસ્ટાઈલીમાં પુષ્પના કેસર (Style) ની સ્થિતિ ભિન્ન હોય છે."], "correct": 2, "explanation": "હેટરોસ્ટાઈલીમાં પુષ્પના કેસર (Style) ની લંબાઈ ભિન્ન હોય છે (A સાચું), પરાગણ સ્વ-અસંગતતા સાથે સંકળાયેલું હોય છે (B સાચું), અને કેસરની સ્થિતિ ભિન્ન હોય છે (D સાચું). પરંતુ પરાગકોષોની આકાર ભિન્ન હોવાનું વિધાન ખોટું છે, કારણ કે પરાગકોષોની આકાર સમાન હોય છે.", "ncert_ref": "Class XI - Chapter 5: પુષ્પી વનસ્પતિની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 70}, {"question": "નીચેનામાંથી કયા પુષ્પમાં 'પરિપક્વ ફળ' (False fruit) નિર્માણમાં 'પુષ્પાસન' (Thalamus) ઉપરાંત અન્ય ભાગો પણ સહભાગી હોય છે?", "options": ["A) સફરજન (Malus)", "B) કેળું (Musa)", "C) ડાંગર (Oryza)", "D) ગાજર (Daucus)"], "correct": 0, "explanation": "સફરજન (Malus) ના પુષ્પમાં 'પરિપક્વ ફળ' (False fruit) નિર્માણમાં 'પુષ્પાસન' (Thalamus) ઉપરાંત પુષ્પપત્રો (Sepals) અને પુષ્પના અન્ય ભાગો પણ સહભાગી હોય છે. કેળું (Musa) માં ફળ નિર્માણમાં પુષ્પાસન જ સહભાગી હોય છે. ડાંગર (Oryza) અને ગાજર (Daucus) માં પરિપક્વ ફળ નિર્માણ થતું નથી.", "ncert_ref": "Class XI - Chapter 5: પુષ્પી વનસ્પતિની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 71}, {"question": "નીચેનામાંથી કયું પુષ્પ 'હેટરોસ્ટાઈલી' (Heterostyly) દર્શાવે છે, પરંતુ તેના પુષ્પમાં 'સ્વ-અસંગતતા' (Self-incompatibility) હાજર નથી?", "options": ["A) પ્રિમરોઝ (Primrose)", "B) લિનમ (Linum)", "C) ઓક્ઝાલિસ (Oxalis)", "D) બાર્લેરિયા (Barleria)"], "correct": 2, "explanation": "સાચો જવાબ વિકલ્પ C (ઓક્ઝાલિસ) છે. ઓક્ઝાલિસમાં હેટરોસ્ટાઈલી (વિવિધ લંબાઈના કેસર) જોવા મળે છે, પરંતુ સ્વ-અસંગતતા હાજર નથી. પ્રિમરોઝ અને લિનમમાં હેટરોસ્ટાઈલી ium) ની રચના જોવા મળે છે, જેમાં પરાગરજના દાણા એકબીજા સાથે જોડાયેલા હોય છે અને તે 'સંકલિત પરાગણ' (Mass pollination) માટે અનુકૂળ હોય છે?", "options": ["A) ગુલાબ (Rosa)", "B) કેળું (Musa)", "C) આંકડો (Calotropis)", "D) સૂર્યમુખી (Helianthus)"], "correct": 2, "explanation": "સાચો જવાબ C) આંકડો (Calotropis) છે. આંકડોના પુષ્પમાં 'પરાગકોષ સંકલન' (Pollinium) જોવા મળે છે, જેમાં પરાગરજના દાણા એકબીજા સાથે જોડાયેલા હોય છે અને તે 'સંકલિત પરાગણ' માટે અનુકૂળ હોય છે. ગુલાબ, કેળું અને સૂર્યમુખીના પુષ્પમાં આવી રચના જોવા મળતી નથી.", "ncert_ref": "Class XI - Chapter 5: પુષ્પી વનસ્પતિની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 75}, {"question": "એક પુષ્પમાં નીચેના લક્ષણો જોવા મળે છે: (1) પુષ્પ અધોઅણી (Inferior ovary) ધરાવે છે, (2) પુષ્પાસન (Thalamus) અતિવિકસિત અને ખાદ્ય છે, (3) પુષ્પમાં 'સ્વ-અસંગતતા' (Self-incompatibility) જોવા મળે છે. આ લક્ષણો ધરાવતું પુષ્પ નીચેનામાંથી કયા કુળનું હોઈ શકે?", "options": ["A) રોઝેસી (Rosaceae) - સફરજન (Apple)", "B) મિર્ટેસી (Myrtaceae) - જામફળ (Guava)", "C) રુટેસી (Rutaceae) - નારંગી (Orange)", "D) એનાકાર્ડિયેસી (Anacardiaceae) - આંબો (Mango)"], "correct": 3, "explanation": "સાચો જવાબ D) એનાકાર્ડિયેસી (Anacardiaceae) - આંબો (Mango) છે. આંબામાં અધોઅણી (Inferior ovary) હોતું નથી, પરંતુ પુષ્પાસન અતિવિકસિત અને ખાદ્ય હોય છે જે ફળના નિર્માણમાં મદદ કરે છે. આ ઉપરાંત આંબામાં સ્વ-અસંગતતા પણ જોવા મળે છે. રોઝેસી કુળના સફરજનમાં અધોઅણી હોય છે અને પુષ્પાસન ખાદ્ય હોય છે, પરંતુ સ્વ-અસંગતતા હોતી નથી. મિર્ટેસી કુળના જામફળમાં અધોઅણી હોતી નથી અને રુટેસી કુળની નારંગીમાં પણ અધોઅણી હોતી નથી તેમજ સ્વ-અસંગતતા હોતી નથી.", "ncert_ref": "Class XI - અધ્યાય 5: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા", "difficulty": "Hard", "num": 76}, {"question": "નીચેનામાંથી કયું પુષ્પ 'ગાયનોફોર' (Gynophore) રચના ધરાવે છે, જ્યાં અંડાશય (Ovary) પુષ્પાસન (Thalamus) થી અલગ થયેલો હોય છે અને તેની નીચે એક પાતળી ડંઠળ જેવી રચના હાજર હોય છે?", "options": ["A) કપાસ (Gossypium)", "B) મરચું (Capsicum)", "C) સરસવ (Brassica)", "D) ટમેટો (Solanum)"], "correct": 0, "explanation":  Plants)", "difficulty": "Hard", "num": 81}, {"question": "નીચેનામાંથી કયા પુષ્પમાં 'ગાયનોફોર' (Gynophore) અને 'ગાયનોએન્ડ્રોફોર' (Gynandrophore) બંને રચનાઓ અસ્તિત્વમાં છે?", "options": ["A) કપાસ (Cotton)", "B) સરસવ (Mustard)", "C) કેળું (Musa)", "D) ટામેટું (Tomato)"], "correct": 0, "explanation": "કપાસના પુષ્પમાં 'ગાયનોફોર' (Gynophore) અને 'ગાયનોએન્ડ્રોફોર' (Gynandrophore) બંને રચનાઓ અસ્તિત્વમાં હોય છે. સરસવ, કેળું અને ટામેટાંમાં આ રચનાઓ હાજર નથી.", "ncert_ref": "Class XI - પ્રકરણ ૫: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 82}, {"question": "એક પુષ્પમાં નીચેના લક્ષણો જોવા મળે છે: (1) પુષ્પ 'અભિસરણી' (Zygomorphic) છે, (2) પુમકેસર (Androecium) ના તંતુઓ (Filaments) અંડાશય (Ovary) સાથે જોડાયેલા છે, (3) પુષ્પમાં 'ગાયનોએન્ડ્રસ' (Gynandrous) રચના હાજર છે. આ પુષ્પ કયા કુટુંબનું હોઈ શકે?", "options": ["A) ફેબેસી (Fabaceae)", "B) સોલેનેસી (Solanaceae)", "C) લિલિયેસી (Liliaceae)", "D) ઓરકિડેસી (Orchidaceae)"], "correct": 3, "explanation": "ઓરકિડેસી કુટુંબના પુષ્પોમાં 'ગાયનોએન્ડ્રસ' રચના જોવા મળે છે, જ્યાં પુમકેસરના તંતુઓ અંડાશય સાથે જોડાયેલા હોય છે. આ પુષ્પો અભિસરણી (Zygomorphic) પણ હોય છે. ફેબેસી કુટુંબના પુષ્પો અભિસરણી હોય છે, પરંતુ ગાયનોએન્ડ્રસ રચના હાજર નથી. સોલેનેસી કુટુંબના પુષ્પો સામાન્ય રીતે અરીસરણી (Actinomorphic) હોય છે. લિલિયેસી કુટુંબના પુષ્પો અરીસરણી હોય છે અને ગાયનોએન્ડ્રસ રચના હાજર નથી.", "ncert_ref": "Class XI - Chapter 5: પુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 83}, {"question": "નીચેના પૈકી કયા પુષ્પમાં 'અંડાશય' (Ovary) 'અધોઅણી' (Inferior) હોય છે, પરંતુ 'પુષ્પાસન' (Thalamus) અતિવિકસિત નથી અને પુષ્પ 'સમમિત' (Actinomorphic) છે?", "options": ["A) ગુલાબ (Rose)", "B) સૂર્યમુખી (Sunflower)", "C) કેળું (Banana)", "D) દાડમ (Pomegranate)"], "correct": 3, "explanation": "સાચો જવાબ D) દાડમ છે. દાડમના પુષ્પમાં અંડાશય અધોઅણી હોય છે, પરંતુ પુષ્પાસન અતિવિકસિત નથી અને પુષ્પ સમમિત (Actinomorphic) છે. ગુલાબ (A)માં અંડાશય ઉપરઅણી હોય છે. સૂર્યમુખી (B) એ સંકલિત         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
