        *{margin:0;padding:0;box-sizing:border-box}

        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}

        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}

        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>

    <script>
        const questionsData = [{"question": "જ્યારે પર્ણની શિરાવિન્યાસ (venation) રેટિક્યુલેટ (reticulate) પ્રકારની હોય ત્યારે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "options": ["A) આ પ્રકારની શિરાવિન્યાસ દ્વિબીજપત્રી (dicot) વનસ્પતિઓમાં સામાન્ય રીતે જોવા મળે છે.", "B) મુખ્ય શિરા (midrib) પર્ણદળના મધ્ય ભાગમાંથી પસાર થાય છે અને તેના પરથી શાખાઓ નીકળે છે.", "C) આ પ્રકારની શિરાવિન્યાસમાં શિરાઓ એકબીજા સાથે જાળી જેવી રચના બનાવે છે.", "D) આ પ્રકારની શિરાવિન્યાસ એકબીજપત્રી (monocot) વનસ્પતિઓમાં સૌથી વધુ જોવા મળે છે."], "correct": 3, "explanation": "રેટિક્યુલેટ શિરાવિન્યાસ દ્વિબીજપત્રી વનસ્પતિઓમાં સામાન્ય રીતે જોવા મળે છે, જ્યાં મુખ્ય શિરા મધ્યમાંથી પસાર થાય છે અને શાખાઓ જાળી જેવી રચના બનાવે છે. એકબીજપત્રી વનસ્પતિઓમાં સામાન્ય રીતે સમાંતર શિરાવિન્યાસ (parallel venation) જોવા મળે છે, તેથી વિધાન D ખોટું છે.", "ncert_ref": "Class XI - પ્રકરણ ૫: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 1}, {"question": "નીચેનામાંથી કયું પર્ણનું રૂપાંતર (modification) પાણીના સંગ્રહ માટે નથી?", "options": ["A) કટોક (Spines)", "B) ફેલોડ (Phyllode)", "C) પર્ણકંદ (Leaf tendril)", "D) પર્ણકલિકા (Leaf scale)"], "correct": 2, "explanation": "કટોક (spines) પાણીના બાષ્પોત્સર્જનને ઘટાડવા માટે, ફેલોડ (phyllode) પર્ણદળના કાર્યને બદલે પર્ણદંડ દ્વારા પ્રકાશસંશ્લેષણ કરે છે, અને પર્ણકલિકા (leaf scale) રક્ષણ માટે હોય છે. પર્ણકંદ (leaf tendril) આરોહણ માટે હોય છે, પાણીના સંગ્રહ માટે નહીં.", "ncert_ref": "Class XI - પ્રકરણ ૫: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 2}, {"question": "જ્યારે પર્ણની બાહ્ય રચના (external morphology)ની વાત આવે ત્યારે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) પર્ણદળ (lamina) પર્ણનો સૌથી પહોળો અને ચપટો ભાગ છે, જ્યાં પ્રકાશસંશ્લેષણ થાય છે.", "B) પર્ણવૃંત (petiole) પર્ણને પ્રકાંડ સાથે જોડે છે અને પાણી અને ખનીજોનો વહન કરે છે.", "C) પર્ણકલિકા (stipule) હંમેશા પર્ણના આધાર પર જોવા મળે છે અને તે પર્ણની જેમ જ પ્રકાશસંશ્લેષણમાં મદદ કરે છે.", "D) પર્ણદંડ (leaf base) પર્ણને પ્રકા ns": ["A) સરળ પર્ણ (Simple leaf) જેમાં પર્ણાવરણ (leaf sheath) હાજર હોય", "B) અસીમ પર્ણ (Exstipulate leaf) જેમાં પર્ણશિરા અભાવે હોય", "C) સીધું જોડાયેલું પર્ણ (Sessile leaf) જેમાં પર્ણફલક સીધું કાંડ સાથે જોડાયેલું હોય", "D) અપૂર્ણ પર્ણ (Incomplete leaf) જેમાં પર્ણફલક અને પર્ણદંડ બંને અભાવે હોય"], "correct": 2, "explanation": "સીધું જોડાયેલું પર્ણ (Sessile leaf) એવા પર્ણને કહે છે જેમાં પર્ણદંડ (petiole) અભાવે પર્ણફલક સીધું કાંડ સાથે જોડાયેલું હોય. અહીં પર્ણશિરા (midrib) ની ગેરહાજરી હોવા છતાં, પર્ણફલક કાંડ સાથે સીધું જ જોડાયેલું હોય, તેથી તે સીધું જોડાયેલું પર્ણ ગણાય. A) ખોટું છે કારણ કે પર્ણાવરણ (leaf sheath) ની હાજરી અહીં ઉલ્લેખિત નથી. B) ખોટું છે કારણ કે અસીમ પર્ણ (Exstipulate leaf) એ પર્ણશિરા અભાવે નહીં પણ સ્ટિપ્યુલ્સ (stipules) ની ગેરહાજરી સૂચવે છે. D) ખોટું છે કારણ કે અપૂર્ણ પર્ણ એવું પર્ણ નથી જે પર્ણફલક અને પર્ણદંડ બંને અભાવે હોય, પરંતુ પર્ણના વિકાસમાં અપૂર્ણતા હોય.", "ncert_ref": "Class XI - Chapter 5: પર્ણ (The Leaf)", "difficulty": "Hard", "num": 42}, {"question": "નીચેનામાંથી કયા પર્ણમાં 'પલ્વિનસ' (pulvinus) નામની રચના પર્ણદંડ (petiole) અને પર્ણફલક (lamina) વચ્ચે હાજર હોય છે, પરંતુ તેનું કાર્ય 'સંરક્ષણ' (protection) નહીં, પરંતુ 'હલનચલન' (movement) સાથે સંબંધિત છે?", "options": ["A) બોગનવેલ (Bougainvillea) - કંટક (spine)માં રૂપાંતરિત પર્ણ", "B) કેસિયા (Cassia) - પર્ણસમૂહ (compound leaf)માં પલ્વિનસ", "C) એકેસિયા (Acacia) - પર્ણાભાસ (phyllode)માં પલ્વિનસ", "D) મિમોસા (Mimosa) - સંવેદનશીલ પર્ણમાં પલ્વિનસ"], "correct": 3, "explanation": "મિમોસા (Mimosa pudica)માં પલ્વિનસની હાજરીને કારણે પર્ણની સંવેદનશીલ હલનચલન (nyctinastic movement) થાય છે, જે સંરક્ષણ માટે નહીં, પરંતુ સ્પર્શ પ્રત્યે પ્રતિક્રિયા માટે જવાબદાર છે. બોગનવેલમાં કંટક સંરક્ષણ માટે છે, કેસિયામાં પલ્વિનસ હલનચલન સાથે સંબંધિત નથી, અને એકેસિયામાં પર્ણાભાસમાં પલ્વિનસ હાજર નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 5: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા", "difficulty": "Hard", "num": 43}, {"question": "એક સપુષ્પી વનસ્પતિમાં પર્ણફલકની રચનામાં પર્ણશિરા (midrib) અભાવે વિકસિત થયેલું હોય અને પર્ણદંડ (petiole) પણ અભાવે હોય, તો નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) આ પ્રકારના પર્ણને 'સીડીસ' (sessile) પર્ણ કહેવાય અને તે મકાઈ (Zea mays)માં જોવા મળે છે.", "B) આ પ્રકારના પર્ણને 'પર્ણાવરણી' (sheathing) પર્ણ કહેવાય અને તે ઘાસ કુળ (Poaceae)માં જોવા મળે છે.", "C) આ પ્રકારના પર્ણને 'અમૃતપર્ણ' (cotyledonary) પર્ણ કહેવાય અને તે શરદી (Mustard)માં જોવા મળે છે.", "D) આ પ્રકારના પર્ણને 'અખંડ પર્ણ' (simple leaf) કહેવાય અને તે સરળ શિરાવિન્યાસ ધરાવે છે."], "correct": 0, "explanation": "પર્ણશિરા અને પર્ણદંડ બંનેના અભાવે વિકસિત પર્ણને 'સીડીસ' (sessile) પર્ણ કહેવાય છે, જેમાં પર્ણફલક સીધું જ કાંડ સાથે જોડાયેલું હોય છે. મકાઈ (Zea mays)માં આ પ્રકારના પર્ણ જોવા મળે છે. બાકીના વિકલ્પો ખોટા છે: B) પર્ણાવરણી પર્ણમાં પર્ણદંડ હાજર હોય છે, C) અમૃતપર્ણ બીજાંકુરણ દરમિયાન જોવા મળે છે, D) અખંડ પર્ણમાં પર્ણશિરા હાજર હોય છે.", "ncert_ref": "Class XI - Chapter 5: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 44}, {"question": "એક સપુષ્પી વનસ્પતિમાં પર્ણની શિરાવિન્યાસ 'જાલીદાર' (reticulate) હોવા છતાં, પર્ણફલક 'સરળ' (simple) હોય અને પર્ણદંડ (petiole) ની ટોચ પર 'પલ્વિનસ' (pulvinus) નામની રચના જોવા મળે છે, તો આ વનસ્પતિ કઈ હોઈ શકે?", "options": ["A) મગફળી (Arachis hypogaea)", "B) ટામેટો (Solanum lycopersicum)", "C) ચણા (Cicer arietinum)", "D) મરુડો (Calotropis procera)"], "correct": 0, "explanation": "મગફળી (Arachis hypogaea) ના પર્ણમાં શિરાવિન્યાસ જાલીદાર હોવા છતાં પર્ણફલક સરળ હોય છે અને પર્ણદંડની ટોચ પર પલ્વિનસ હાજર હોય છે, જે પર્ણની હલનચલન (nyctinastic movement) માટે જવાબદાર હોય છે. ટામેટો, ચણા અને મરુડોમાં પલ્વિનસની હાજરી જોવા મળતી નથી, તેથી વિકલ્પ B, C, અને D ખોટા છે.", "ncert_ref": "Class XI - Chapter 5: પર્ણ (The Leaf)", "difficulty": "Hard", "num": 45}, {"question": "નીચેનામાંથી કયું પર્ણ 'પર્ણાભાસ' (phyllode) નું ઉદાહરણ નથી, પરંતુ પર્ણદંડ (petiole) નું રૂપાંતર અન્ય કાર્ય માટે થયેલું છે?", "options": ["A) ઓસ્ટ્રેલિયન એકેશિયા (Acacia) ના પર્ણ", "B) કાંટાળા વનસ્પતિ (e.g., બોબર (Ziziphus) ના કંટક)", "C) કસ્તૂરી (Jasminum) ના પર્ણ", "D) મરુડો (Calotropis) ના પર્ણ"], "correct": 1, "explanation": "કાંટાળા વનસ્પતિઓમાં, જેમ કે બોબર (Ziziphus) માં, પર્ણદંડનું રૂપાંતર કંટક (spine) માં થાય છે, જે સંરક્ષણાત્મક કાર્ય કરે છે. ઓસ્ટ્રેલિયન એકેશિયા (Acacia) ના પર્ણમાં પર્ણદંડ પર્ણાભાસ (phyllode) માં રૂપાંતરિત થાય છે, જે પ્રકાશસંશ્લેષણ કરે છે. કસ્તૂરી અને મરુડોના પર્ણમાં આ પ્રકારના રૂપાંતર જોવા મળતાં નથી, તેથી વિકલ્પ A, C, અને D ખોટા છે.", "ncert_ref": "Class XI - Chapter 5: પર્ણ (The Leaf)", "difficulty": "Hard", "num": 46}, {"question": "એક સપુષ્પી વનસ્પતિમાં પર્ણફલક (lamina) સંપૂર્ણપણે અભાવે હોય અને પર્ણદંડ (petiole) પર્ણફલકના કામગીરી કરતું હોય, ત્યારે આ પ્રકારના પર્ણને શું કહેવામાં આવે છે?", "options": ["A) પર્ણાભાસ (Phyllode)", "B) કંટકપર્ણ (Spine leaf)", "C) પર્ણસમૂહ (Compound leaf)", "D) સરળ પર્ણ (Simple leaf)"], "correct": 0, "explanation": "પર્ણાભાસ (Phyllode) એ પર્ણદંડનું રૂપાંતર છે જ્યાં પર્ણફલક અભાવે પર્ણદંડ પર્ણફલકની જેમ કામ કરે છે, જેમ કે અકેશિયામાં જોવા મળે છે. કંટકપર્ણ (B) પર્ણનું રૂપાંતર છે જ્યાં પર્ણ કંટકમાં ફેરવાય છે, જેમ કે બેરમાં. પર્ણસમૂહ (C) એ ઘણા પર્ણકો ધરાવતું પર્ણ છે, જેમ કે નીમમાં. સરળ પર્ણ (D) એ એક જ પર્ણફલક ધરાવતું પર્ણ છે, જેમ કે મંગોમાં.", "ncert_ref": "Class XI - Chapter 5: પર્ણ (The Leaf) - રૂપાંતરણ (Modifications)", "difficulty": "Hard", "num": 47}, {"question": "નીચેનામાંથી કયું વિધાન 'પલ્વિનસ' (pulvinus) વિશે ખોટું છે?", "options": ["A) પલ્વિનસ પર્ણદંડ (petiole) અને પર્ણફલક (lamina) વચ્ચે જોવા મળે છે.", "B) પલ્વિનસ ન્યક્ટિનેસ્ટિક હલનચલન (nyctinastic movement) માટે જવાબદાર છે.", "C) પલ્વિનસ એક પ્રકારનું કોષીય પેશી છે જે પર્ણની ગતિ નિયંત્રિત કરે છે.", "D) પલ્વિનસ ફક્ત દ્વિદળી વનસ્પતિઓમાં જ જોવા મળે છે."], "correct": 3, "explanation": "પલ્વિનસ દ્વિદળી અને એકદળી બંને વનસ્પતિઓમાં જોવા મળે છે. ઉદાહરણ તરીકે, મીમોસા (દ્વિદળી) અને કેટલાક એકદળી વનસ્પતિઓમાં પલ્વિનસ જોવા મળે છે. બાકીના વિધાનો સત્ય છે.", "ncert_ref": "Class XI - Chapter 5: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 48}, {"question": "એક સપુષ્પી વનસ્પતિમાં પર્ણફલક (lamina) સંપૂર્ણપણે અલ         let userAnswers = {};

        function renderQuestions() {

                container.appendChild(card);

            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;

        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
