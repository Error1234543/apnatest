    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}

        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}

        .option.wrong .letter{background:#ef4444}

        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}

        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}

        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>

    <script>

ષ્પવિન્યાસ એવો જોવા મળે છે કે જેમાં મુખ્ય ધરા પરનું અંતિમ પુષ્પ સૌથી પહેલાં ખીલે છે અને ત્યારબાદ નીચે તરફના પુષ્પો ક્રમશઃ ખીલે છે. આ પુષ્પવિન્યાસને 'સ્કોર્પિઓઈડ સાયમ' તરીકે ઓળખવામાં આવે છે. નીચેનામાંથી કયું વિધાન આ પ્રકારના પુષ્પવિન્યાસ માટે ખોટું છે?", "options": ["A) આ પુષ્પવિન્યાસમાં પુષ્પોનો વિકાસ એકાંતરે ડાબી અને જમણી બાજુએ થાય છે", "B) આ પ્રકારના પુષ્પવિન્યાસમાં મુખ્ય ધરા પરના પુષ્પોનો વિકાસ અસમાન હોય છે", "C) આ પુષ્પવિન્યાસમાં પુષ્પોની ધરા વાંકીચૂકી અને સર્પિલ આકારની હોય છે", "D) આ પ્રકારનો પુષ્પવિન્યાસ 'હેલિકોઈડ સાયમ' તરીકે પણ ઓળખાય છે અને તેમાં પુષ્પો એક જ સમતલમાં ગોઠવાય છે"], "correct": 3, "explanation": "સ્કોર્પિઓઈડ સાયમ (Scorpioid cyme) અને હેલિકોઈડ સાયમ (Helicoid cyme) બંને સાયમોઝ પુષ્પવિન્યાસના પ્રકારો છે, પરંતુ તેમાં મુખ્ય તફાવત એ છે કે સ્કોર્પિઓઈડ સાયમમાં પુષ્પો એકાંતરે ડાબી અને જમણી બાજુએ વિકસે છે અને ધરા વાંકીચૂકી હોય છે, જ્યારે હેલિકોઈડ સાયમમાં પુષ્પો એક જ સમતલમાં ગોઠવાય છે. વિકલ્પ D ખોટો છે કારણ કે તેમાં બંને પ્રકારોને એકસમાન ગણાવ્યા છે, જે વાસ્તવમાં અલગ છે. NCERT Class XI, Chapter 5: પુષ્પીય વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)માં આ પ્રકારોનો ઉલ્લેખ છે.", "ncert_ref": "Class XI - પ્રકરણ 5: પુષ્પીય વનસ્પતિઓની બાહ્યાકાર વિદ્યા", "difficulty": "Hard", "num": 30}, {"question": "નીચેનામાંથી કયા વનસ્પતિમાં પુષ્પવિન્યાસ 'વર્ટિસિલેસ્ટર' પ્રકારનો જોવા મળે છે, જેમાં પુષ્પો ચક્રીય રીતે ગોઠવાયેલા હોય છે અને દરેક ગાંઠ પર એક કરતાં વધુ પુષ્પો ઉદ્ભવે છે?", "options": ["A) સૂર્યમુખી (Helianthus annuus)", "B) લીમડો (Azadirachta indica)", "C) સલેડો (Salvia officinalis)", "D) ગુલાબ (Rosa indica)"], "correct": 2, "explanation": "વર્ટિસિલેસ્ટર (Verticillaster) પ્રકારનો પુષ્પવિન્યાસ લેમિયેસી (Lamiaceae) કુળની વનસ્પતિઓમાં જોવા મળે છે, જેમાં સલેડો (Salvia officinalis)નો સમાવેશ થાય છે. આ પ્રકારમાં પુષ્પો ચક્રીય રીતે ગોઠવાયેલા હોય છે અને દરેક ગાંઠ પર એક કરતાં વધુ પુષ્પો ઉદ્ભવે છે. સૂર્યમુખીમાં કેપિટ્યુલમ, લીમડામાં પેનિકલ અને ગુલાબમાં સાયમોઝ પુષ્પવિન્યાસ જોવા મળે છે. NCERT Class XI, Chapter 5માં આ પ્રકારનો ઉલ્લેખ છે.", "ncert_ref": "Class XI - પ્રકરણ 5: પુષ્પીય વનસ્પતિઓની બાહ્યાકાર વિદ્યા", "difficulty": "Hard", "num": 31}, {"question": "એક વિદ્યાર્થીએ એક વનસ્પતિનું અવલોકન કર્યું જેમાં પુષ્પવિન્યાસમાં પુષ્પોની ધરા પરના પુષ્પોનો વિકાસ અંતિમ પુષ્પથી શરૂ થઈને નીચે તરફ થાય છે, પરંતુ ધરા સીધી અને અવિભાજિત છે. આ પુષ્પવિન્યાસને નીચેનામાંથી કયા પ્રકારમાં વર્ગીકૃત કરી શકાય?", "options": ["A) રેસીમ (Raceme)", "B) કેટકિન (Catkin)", "C) સ્પાઇક (Spike)", "D) કોરિમ્બ (Corymb)"], "correct": 1, "explanation": "આપેલ વર્ણન મુજબ, પુષ્પવિન્યાસમાં પુષ્પોનો વિકાસ અંતિમ પુષ્પથી શરૂ થઈને નીચે તરફ થાય છે, જે સાયમોઝ પુષ્પવિન્યાસની લાક્ષણિકતા છે. પરંતુ ધરા સીધી અને અવિભાજિત છે, જે રેસીમોઝ પુષ્પવિન્યાસની લાક્ષણિકતા છે. આ સંયોજન કેટકિન (Catkin) પ્રકારના પુષ્પવિન્યાસમાં જોવા મળે છે, જે રેસીમનો એક વિશિષ્ટ પ્રકાર છે અને તેમાં પુષ્પો નમ્ર કે લટકતા હોય છે. NCERT Class XI, Chapter 5માં આ પ્રકારનો ઉલ્લેખ છે.", "ncert_ref": "Class XI - પ્રકરણ 5: પુષ્પીય વનસ્પતિઓની બાહ્યાકાર વિદ્યા", "difficulty": "Hard", "num": 32}, {"question": "નીચેનામાંથી કયું વિધાન 'હાઇપોથાયરોડિયમ' પ્રકારના પુષ્પવિન્યાસ માટે સાચું નથી?", "options": ["A) આ પ્રકારનો પુષ્પવિન્યાસ ફિકસ (Ficus) પ્રજાતિમાં જોવા મળે છે", "B) આ પુષ્પવિન્યાસમાં પુષ્પો એક પોલા પુષ્પાશયની અંદર ગોઠવાયેલા હોય છે", "C) આ પુષ્પવિન્યાસમાં પુષ્પોનો વિકાસ રેસીમોઝ પ્રકારનો હોય છે", "D) આ પુષ્પવિન્યાસને 'સાયકોનસ' તરીકે પણ ઓળખવામાં આવે છે"], "correct": 2, "explanation": "હાઇપોથાયરોડિયમ (Hypanthodium) પ્રકારનો પુષ્પવિન્યાસ ફિકસ (Ficus) પ્રજાતિમાં જોવા મળે છે, જેમાં પુષ્પો એક પોલા પુષ્પાશયની અંદર ગોઠવાયેલા હોય છે અને તેને 'સાયકોનસ' તરીકે પણ ઓળખવામાં આવે છે. આ પુષ્પવિન્યાસમાં પુષ્પોનો વિકાસ સાયમોઝ પ્રકારનો હોય છે, રેસીમોઝ નહીં. વિકલ્પ C ખોટો છે. NCERT Class XI, Chapter 5માં આ પ્રકારનો ઉલ્લેખ છે.", "ncert_ref": "Class XI - પ્રકરણ 5: પુષ્પીય વનસ્પતિઓની બાહ્યાકાર વિદ્યા", "difficulty": "Hard", "num": 33}, {"question": "એક વનસ્પતિમાં પુષ્પવિન્યાસ એવો જોવા મળે છે કે જેમાં પુષ્પકલિકાની મુખ્ય ધરા પરના પુષ્પોનો વિકાસ ક્રમ અસમાન હોય છે અને શાખાઓ પરના પુષ્પોનો વિકાસ ક્રમ સમાન હોય છે. આ પુષ્પવિન્યાસ કયો પ્રકારનો હશે?", "options": ["A) રેચિમોઝ રેસીમ", "B) સાયમોઝ યુમ્બેલ", "C) રેચિમોઝ સ્પાઇક", "D) સાયમોઝ કેપિટ્યુલમ"], "correct": 1, "explanation": "સાયમોઝ યુમ્બેલમાં પુષ્પકલિકાની મુખ્ય ધરા પરના પુષ્પોનો વિકાસ ક્રમ અસમાન હોય છે અને શાખાઓ પરના પુષ્પોનો વિકાસ ક્રમ સમાન હોય છે. રેચિમોઝ રેસીમમાં પુષ્પોનો વિકાસ નીચેથી ઉપર તરફ થાય છે. રેચિમોઝ સ્પાઇકમાં પુષ્પો સીધી ધરા પર હોય છે. સાયમોઝ કેપિટ્યુલમમાં પુષ્પો ગોળાકાર ગુચ્છમાં હોય છે.", "ncert_ref": "Class XI - Chapter 5: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા", "difficulty": "Hard", "num": 34}, {"question": "એક વનસ્પતિમાં પુષ્પવિન્યાસ એવો જોવા મળે છે કે જેમાં પુષ્પોની ધરા પરના પુષ્પોનો વિકાસ ક્રમ એવો હોય છે કે અંતિમ પુષ્પ સૌથી પહેલા ખીલે છે અને પછી નીચે તરફના પુષ્પો ખીલવા લાગે છે, પરંતુ શાખાઓ પરના પુષ્પોનો વિકાસ એકસરખો હોય છે. આ પુષ્પવિન્યાસ કયા પ્રકારનો હશે?", "options": ["A) રેચિમોઝ સ્પાઇક", "B) રેચિમોઝ રેસીમ", "C) સાયમોઝ પેનિકલ", "D) રેચિમોઝ કોરિમ્બ"], "correct": 1, "explanation": "રેચિમોઝ રેસીમમાં પુષ્પોની ધરા પરના પુષ્પોનો વિકાસ ક્રમ એવો હોય છે કે અંતિમ પુષ્પ સૌથી પહેલા ખીલે છે અને પછી નીચે તરફના પુષ્પો ખીલવા લાગે છે, અને શાખાઓ પરના પુષ્પોનો વિકાસ એકસરખો હોય છે. રેચિમોઝ સ્પાઇકમાં શાખાઓ હોતી નથી. સાયમોઝ પેનિકલ અને રેચિમોઝ કોરિમ્બમાં પુષ્પોનો વિકાસ ક્રમ આ પ્રશ્નના સંદર્ભમાં યોગ્ય નથી.", "ncert_ref": "Class XI - Chapter 5: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 35}, {"question": "નીચેનામાંથી કયા વનસ્પતિમાં 'સાયમોઝ હેલિકોઈડ' પુષ્પવિન્યાસ જોવા મળે છે, જેમાં પુષ્પોનો વિકાસ એકબાજુથી થતો હોય અને મુખ્ય ધરા પરના પુષ્પોનો ક્રમ અસમાન હોય છે?", "options": ["A) સૂર્યમુખી (Helianthus annuus)", "B) મરીગોલ્ડ (Tagetes erecta)", "C) કસુંબ (Carthamus tinctorius)", "D) ગુલાબ (Rosa indica)"], "correct": 0, "explanation": "સૂર્યમુખી (Helianthus annuus)માં 'સાયમોઝ હેલિકોઈડ' પુષ્પવિન્યાસ જોવા મળે છે, જેમાં પુષ્પોનો વિકાસ એકબાજુથી થાય છે અને મુખ્ય ધરા પરના પુષ્પોનો ક્રમ અસમાન હોય છે. મરીગોલ્ડ અને કસુંબમાં પણ સાયમોઝ પ્રકારના પુષ્પવિન્યાસ જોવા મળે છે, પરંતુ તેઓ હેલિકોઈડ પ્રકારના નથી. ગુલાબમાં રેચિમોઝ પ્રકારનો પુષ્પવિન્યાસ જોવા મળે છે, જેમાં પુષ્પોનો વિકાસ અંતિમ પુષ્પથી શરૂ થાય છે.", "ncert_ref": "Class XI - Chapter 5: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 36}, {"question": "જો એક વનસ્પતિમાં પુષ્પવિન્યાસ 'રેચિમોઝ કોરિમ્બ' પ્રકારનો હોય, તો નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) પુષ્પોનો વિકાસ અંતિમ પુષ્પથી શરૂ થાય છે.", "B) મુખ્ય ધરા પરના પુષ્પોનો વિકાસ ક્રમ અસમાન હોય છે.", "C) પુષ્પકલિકાની મુખ્ય ધરા સીધી હોય છે.", "D) પુષ્પોની ધરા પરના પુષ્પોનો વિકાસ ક્રમ બહારથી અંદર તરફ થાય છે."], "correct": 3, "explanation": "રેચિમોઝ કોરિમ્બ પુષ્પવિન્યાસમાં પુષ્પોનો વિકાસ અંતિમ પુષ્પથી શરૂ થાય છે (A સાચું), મુખ્ય ધરા પરના પુષ્પોનો વિકાસ ક્રમ અસમાન હોય છે (B સાચું), અને મુખ્ય ધરા સીધી હોય છે (C સાચું). પરંતુ પુષ્પોની ધરા પરના પુષ્પોનો વિકાસ ક્રમ અંદરથી બહાર તરફ થાય છે, બહારથી અંદર તરફ નહીં (D ખોટું).", "ncert_ref": "Class XI - Chapter 5: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 37}, {"question": "નીચેનામાંથી કયા વનસ્પતિમાં 'વર્ટિસિલેસ્ટર' પ્રકારનો પુષ્પવિન્યાસ જોવા મળે છે, જેમાં પુષ્પો ચક્રીય રીતે ગોઠવાયેલા હોય છે અને મુખ્ય ધરા પરના પુષ્પોનો વિકાસ ક્રમ અસમાન હોય છે?", "options": ["A) લીલી (Lilium)", "B) જાસ્મિન (Jasminum)", "C) ટ્યુલિપ (Tulipa)", "D) અળસી (Linum usitatissimum)"], "correct": 3, "explanation": "અળસી (Linum usitatissimum)માં 'વર્ટિસિલેસ્ટર' પ્રકારનો પુષ્પવિન્યાસ જોવા મળે છે, જેમાં પુષ્પો ચક્રીય રીતે ગોઠવાયેલા હોય છે અને મુખ્ય ધરા પરના પુષ્પોનો વિકાસ ક્રમ અસમાન હોય છે. લીલી, જાસ્મિન અને ટ્યુલિપમાં રેચિમોઝ અથવા સાયમોઝ પ્રકારના પુષ્પવિન્યાસ જોવા મળે છે, પરંતુ વર્ટિસિલેસ્ટર પ્રકારનો નથી.", "ncert_ref": "Class XI - Chapter 5: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 38}, {"question": "એક વનસ્પતિમાં પુષ્પવિન્યાસ 'સ્કોર્પિઓઇડ સાયમ' પ્રકારનો જોવા મળે છે. આ પુષ્પવિન્યાસમાં નીચેનામાંથી કયું લક્ષણ જોવા મળતું નથી?", "options": ["A) પુષ્પોનો વિકાસ એકાંતરે ડાબી અને જમણી બાજુએ થાય છે", "B) મુખ્ય ધરા પરનું અંતિમ પુષ્પ સૌથી પહેલાં ખીલે છે", "C) પુષ્પોની ધરા સર્પિલ આકારમાં વળેલી હોય છે", "D) પુષ્પોનો વિકાસ એક જ સમતલમાં એકાંતરે થાય છે"], "correct": 3, "explanation": "'સ્કોર્પિઓઇડ સાયમ' પુષ્પવિન્યાસમાં પુષ્પોનો વિકાસ એકાંતરે ડાબી અને જમણી બાજુએ ત્રિપરિમાણીય રીતે થાય છે, નહીં કે એક જ સમતલમાં. આ પ્રકારમાં મુખ્ય ધરા પરનું અંતિમ પુષ્પ સૌથી પહેલાં ખીલે છે અને ધરા સર્પિલ આકારમાં વળેલી હોય છે. વિકલ્પ D ખોટો છે કારણ કે વિકાસ એક જ સમતલમાં થતો નથી, પરંતુ ત્રિપરિમાણીય હોય છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 5: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા", "difficulty": "Hard", "num": 39}, {"question": "નીચેનામાંથી કયું વિધાન 'વર્ટિસિલેસ્ટર' પ્રકારના પુષ્પવિન્યાસ માટે ખોટું છે?", "options": ["A) આ પુષ્પવિન્યાસમાં પુષ્પો ચક્રીય રીતે ગોઠવાયેલા હોય છે", "B) દરેક ચક્રમાં બે પુષ્પો એકબીજાની વિરુદ્ધ દિશામાં ગોઠવાયેલા હોય છે", "C) આ પુષ્પવિન્યાસ રેચિમોઝ પ્રકારનો છે", "D) આ પુષ્પવિન્યાસમાં મુખ્ય ધરા પરનું અંતિમ પુષ્પ સૌથી પહેલાં ખીલે છે"], "correct": 2, "explanation": "'વર્ટિસિલેસ્ટર' પુષ્પવિન્યાસ સાયમોઝ પ્રકારનો છે, રેચિમોઝ નહીં. આ પુષ્પવિન્યાસમાં પુષ્પો ચક્રીય રીતે ગોઠવાયેલા હોય છે અને દરેક ચક્રમાં બે પુષ્પો એકબીજાની વિરુદ્ધ દિશામાં ગોઠવાયેલા હોય છે. વિકલ્પ C ખોટું છે કારણ કે આ પુષ્પવિન્યાસ સાયમોઝ પ્રકારનો છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 5: સપુષ્પી વનસ્પતિઓની બાહ્યાકાર વિદ્યા", "difficulty": "Hard", "num": 40}, {"question": "એક વનસ્પતિમાં પુષ્પવિન્યાસ 'હાઇપોથાયરોડિયમ' પ્રકારનો જોવા મળે છે. આ પુષ્પવિન્યાસ માટે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) આ પુષ્પવિન્યાસમાં પુષ્પોની ધરા સીધી અને નિશ્ચિત લંબાઈની હોય છે", "B) આ પુષ્પવિન્યાસમાં પુષ્પોનો વિકાસ અંતિમ પુષ્પથી શરૂ થઈને નીચે તરફ થાય છે", "C) આ પુષ્પવિન્યાસમાં પુષ્પો એક જ બિંદુ પરથી ઉદ્ભવતા હોય છે", "D) આ પુષ્પવિન્યાસમાં મુખ્ય ધરા પરના પુષ્પોનો વિકાસ એકસાથે થાય છે"], "correct": 1, "explanation": "'હાઇપોથાયરોડિયમ' પુષ્પવિન્યાસ સાયમોઝ પ્રકારનો છે જેમાં પુષ્પોનો વિકાસ અંતિમ પુષ્પથી શરૂ થઈને નીચે તરફ થાય છે. વિકલ્પ A ખોટો છે કારણ કે ધરા સીધી હોવી જરૂરી નથી. વિકલ્પ C ખોટો છે કારણ કે પુષ્પો એક જ બિંદુ પરથી ઉદ્ભવતા નથી. વિકલ્પ D ખોટો છે         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
