    <script>
        const questionsData = [{"question": "લસિકા વાહિનીઓમાં લસિકાનું વહન ક્યાં તરફ થાય છે?", "options": ["A) હૃદય તરફ", "B) ધમની તરફ", "C) શિરા તરફ", "D) કોષ તરફ"], "correct": 2, "explanation": "લસિકા વાહિનીઓમાં લસિકાનું વહન હંમેશા શિરા તરફ થાય છે. લસિકા પ્રણાલી એકદિશાત્મક હોય છે, જેમાં લસિકા કેપિલરીથી શરૂ થઈને લસિકા વાહિનીઓ દ્વારા શિરામાં મિશ્રિત થાય છે. હૃદય તરફ (A) અથવા ધમની તરફ (B) વહન થતું નથી, કારણ કે લસિકા પ્રણાલી સીધી રીતે શિરા સાથે જોડાયેલી હોય છે. કોષ તરફ (D) વહન થતું નથી, કારણ કે લસિકા કોષોમાંથી બહાર નીકળે છે, કોષ તરફ જતી નથી.", "ncert_ref": "Class XI - Chapter 15: શરીર અને તેના વહન તંત્ર", "difficulty": "Hard", "num": 1}, {"question": "લસિકા ગાંઠોનું મુખ્ય કાર્ય શું છે?", "options": ["A) લોહીનું શુદ્ધીકરણ કરવું", "B) લસિકા ફિલ્ટર કરવી અને પ્રતિરક્ષા પ્રતિક્રિયામાં ભાગ લેવો", "C) હોર્મોનનું સ્રાવ કરવું", "D) પેશીઓને પોષણ પૂરું પાડવું"], "correct": 1, "explanation": "લસિકા ગાંઠોનું મુખ્ય કાર્ય લસિકાને ફિલ્ટર કરવી અને પ્રતિરક્ષા પ્રતિક્રિયામાં ભાગ લેવો છે. લસિકા ગાંઠોમાં લસિકા કોષો (લિમ્ફોસાઇટ્સ) હોય છે, જે વિદેશી કણોને પકડીને નાશ કરે છે. લોહીનું શુદ્ધીકરણ (A) યકૃત અને કિડની દ્વારા થાય છે. હોર્મોનનું સ્રાવ (C) એન્ડોક્રાઇન ગ્રંથિઓ દ્વારા થાય છે. પેશીઓને પોષણ પૂરું પાડવું (D) રક્તવાહિનીઓનું કાર્ય છે.", "ncert_ref": "Class XI - Chapter 15: શરીર અને તેના વહન તંત્ર", "difficulty": "Hard", "num": 2}, {"question": "લસિકા પ્રણાલીમાં કયા પ્રકારના કોષો પ્રતિરક્ષા માટે જવાબદાર હોય છે?", "options": ["A) લોહીના લાલ કોષો", "B) લસિકા કોષો (લિમ્ફોસાઇટ્સ)", "C) બસોફિલ્સ", "D) પ્લેટલેટ્સ"], "correct": 1, "explanation": "લસિકા પ્રણાલીમાં લસિકા કોષો (લિમ્ફોસાઇટ્સ) પ્રતિરક્ષા માટે જવાબદાર હોય છે. લિમ્ફોસાઇટ્સ બી-કોષો અને ટી-કોષોના રૂપમાં હોય છે, જે એન્ટીબોડીનું ઉત્પાદન અને વિદેશી કણોને નાશ કરવામાં મદદ કરે છે. લોહીના લાલ કોષો (A) ઓક્સિજન વહન માટે જવાબદાર હોય છે. બસોફિલ્સ (C) એલર્જી પ્રતિક્રિયામાં ભાગ લે છે. પ્લેટલેટ્સ (D) રક્ત ગંઠાવવામાં મદદ કરે છે.", "ncert_ref": "Class XI - Chapter 15: શરીર અને તેના વહન તંત્ર", "difficulty": "Hard", "num": 3}, {"question": "લસિકા પ્રણાલી અને રક્ત પરિવહન પ્રણાલી વચ્ચેનો મુખ્ય તફાવત કયો છે?", "options": ["A) લસિકા પ્રણાલી બંધ સર્કિટ છે, જ્યારે રક્ત પરિવહન પ્રણાલી ખુલ્લી સર્કિટ છે", "B) લસિકા પ્રણાલી એકદિશાત્મક છે, જ્યારે રક્ત પરિવહન પ્રણાલી દ્વિદિશાત્મક છે", "C) લસિકા પ્રણાલી પમ્પ વગર કામ કરે છે, જ્યારે રક્ત પરિવહન પ્રણાલી હૃદય દ્વારા પમ્પ થાય છે", "D) લસિકા પ્રણાલી ઓક્સિજન વહન કરે છે, જ્યારે રક્ત પરિવહન પ્રણાલી કાર્બન ડાયોક્સાઇડ વહન કરે છે"], "correct": 2, "explanation": "લસિકા પ્રણાલી એકદિશાત્મક છે, એટલે કે લસિકા ફક્ત એક દિશામાં વહે છે (કોષોથી શિરા તરફ), જ્યારે રક્ત પરિવહન પ્રણાલી દ્વિદિશાત્મક છે, એટલે કે રક્ત ધમની અને શિરા દ્વારા વહે છે. લસિકા પ્રણાલી બંધ સર્કિટ નથી (A), કારણ કે તે કોષોમાંથી શરૂ થાય છે અને શિરામાં મિશ્રિત થાય છે. લસિકા પ્રણાલી પમ્પ વગર કામ કરે છે (C), પરંતુ આ તફાવત નથી, કારણ કે રક્ત પરિવહન પ્રણાલી પણ કેટલીક હદે પમ્પ વગર કામ કરે છે (ઉદા. શિરા). લસિકા પ્રણાલી ઓક્સિજન વહન કરતી નથી (D), તે ફક્ત પોષક તત્વો અને કચરાનું વહન કરે છે.", "ncert_ref": "Class XI - Chapter 15: શરીર અને તેના વહન તંત્ર", "difficulty": "Hard", "num": 4}, {"question": "લસિકા પ્રણાલીમાં કયા અંગનું અભાવ હોવા છતાં લસિકા વહન થાય છે?", "options": ["A) હૃદય", "B) ફેફસાં", "C) યકૃત", "D) કિડની"], "correct": 0, "explanation": "લસિકા પ્રણાલીમાં હૃદયનો અભાવ હોવા છતાં લસિકા વહન થાય છે. લસિકા વહન લસિકા વાહિનીઓની દિવાલમાં હાજર સ્નાયુઓના સંકોચન અને વાલ્વ્સની મદદથી થાય છે. ફેફસાં (B), યકૃત (C), અને કિડની (D) લસિકા પ્રણાલીના વહન સાથે સીધા સંબંધ ધરાવતા નથી.", "ncert_ref": "Class XI - Chapter 15: શરીર અને તેના વહન તંત્ર", "difficulty": "Hard", "num": 5}, {"question": "લસિકા પ્રણાલીમાં 'લેક્ટીલ' (Lacteal) નામની રચના ક્યાં જોવા મળે છે અને તેનું મુખ્ય કાર્ય શું છે?", "options": ["A) આંતરડાના કોથળી જેવી રચનાઓમાં જોવા મળે છે અને તે ચરબીના શોષણમાં મદદ કરે છે.", "B) યકૃતમાં જોવા મળે છે અને તે પિત્ત રસના ઉત્પાદનમાં મદદ કરે છે.", "C) પ્લીહામાં જોવા મળે છે અને તે જૂની રક્તકણિકાઓના નાશમાં મદદ કરે છે.", "D) મજ્જામાં જોવા મળે છે અને તે રક્તકણિકાઓના ઉત્પાદનમાં મદદ કરે છે."], "correct": 0, "explanation": "લેક્ટીલ આંતરડાના કોથળી જેવી રચનાઓ (વિલી)માં જો ્રતિક્રિયા આપવામાં મદદ કરે છે."], "correct": 2, "explanation": "લસિકા ગાંઠો લસિકા પ્રણાલીમાં ફિલ્ટર તરીકે કાર્ય કરે છે, લસિકા કોષો અને મેક્રોફેજના ઉત્પાદનનું સ્થાન છે અને પ્રતિજન સામે પ્રતિક્રિયા આપવામાં મદદ કરે છે. પરંતુ તે હૃદયના સંકોચનને નિયંત્રિત કરતી નથી, એટલે વિકલ્પ C ખોટો છે.", "ncert_ref": "Class XI - પ્રકરણ ૧૫: શરીરમાં પરિવહન", "difficulty": "Hard", "num": 9}, {"question": "લસિકા પ્રણાલીમાં 'એડિનોઇડ પેશી' (Adenoid Tissue) ની ભૂમિકા શું છે?", "options": ["A) તે ગળામાં આવેલી છે અને શ્વસન માર્ગમાં ઇન્ફેક્શન સામે રક્ષણ આપે છે.", "B) તે પેટમાં આવેલી છે અને પાચન ક્રિયામાં મદદ કરે છે.", "C) તે મગજમાં આવેલી છે અને સ્મરણ શક્તિને નિયંત્રિત કરે છે.", "D) તે હાડકામાં આવેલી છે અને કેલ્શિયમના સંગ્રહમાં મદદ કરે છે."], "correct": 0, "explanation": "એડિનોઇડ પેશી ગળામાં આવેલી છે અને શ્વસન માર્ગમાં ઇન્ફેક્શન સામે રક્ષણ આપે છે. તે લસિકા પ્રણાલીનો ભાગ છે અને પ્રતિરક્ષા પ્રણાલીમાં મહત્વની ભૂમિકા ભજવે છે. બાકીના વિકલ્પો પેટ, મગજ અને હાડકા સાથે સંબંધિત છે, જે એડિનોઇડ પેશીની ભૂમિકા નથી.", "ncert_ref": "Class XI - પ્રકરણ ૧૫: શરીરમાં પરિવહન", "difficulty": "Hard", "num": 10}, {"question": "લસિકા પ્રણાલીમાં 'પેયરના પેચ' (Peyer’s patches) ની સ્થિતિ અને કાર્ય વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) તે જઠરની દીવાલમાં આવેલા હોય છે અને પાચન ઉત્સેચકોનું સ્રાવણ કરે છે.", "B) તે નાનાં આંતરડાની દીવાલમાં આવેલા હોય છે અને આંતરડામાં રહેલા સૂક્ષ્મજીવો વિરુદ્ધ પ્રતિરક્ષા પૂરી પાડે છે.", "C) તે યકૃતમાં આવેલા હોય છે અને પિત્ત રસનું સ્રાવણ કરે છે.", "D) તે ફેફસાંની દીવાલમાં આવેલા હોય છે અને ગેસીય વિનિમયમાં મદદ કરે છે."], "correct": 1, "explanation": "પેયરના પેચ નાનાં આંતરડાની સબમ્યુકોઝલ સ્તરમાં આવેલા લસિકા પેશીના સમૂહ હોય છે, જે આંતરડામાં રહેલા સૂક્ષ્મજીવો વિરુદ્ધ પ્રતિરક્ષા પ્રતિભાવ પૂરો પાડે છે. વિકલ્પ A ખોટો છે કારણ કે પેયરના પેચ જઠરમાં નથી હોતા અને પાચન ઉત્સેચકોનું સ્રાવણ કરતા નથી. વિકલ્પ C ખોટો છે કારણ કે તે યકૃતમાં નથી હોતા અને પિત્ત રસ સાથે સંબંધિત નથી. વિકલ્પ D ખોટો છે કારણ કે તે ફેફસાંમાં નથી હોતા અને ગેસીય વિનિમય સાથે સંબંધિત નથી.", "ncert_ref": "Class XI - Chapter 15: શરીરમાં પરિવહન", "difficulty": "Hard", "num": 11}, {"question": "લસિકા પ્રણાલીમાં 'કાયલ' (Chyle) ની રચના અને વહન વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) કાયલ લસિકામાં ચરબીના ટીપાં અને પ્રોટીનનો સમાવેશ થાય છે.", "B) કાયલનું વહન લેક્ટીલ દ્વારા થાય છે, જે આંતરડાની વિલીમાં આવેલા હોય છે.", "C) કાયલ સીધું જ હૃદયમાં ખાલી થાય છે.", "D) કાયલનું રંગ દૂધિયું સફેદ હોય છે."], "correct": 2, "explanation": "કાયલ લસિકામાં ચરબીના ટીપાં અને પ્રોટીનનો સમાવેશ થાય છે અને તેનું વહન લેક્ટીલ દ્વારા થાય છે, જે આંતરડાની વિલીમાં આવેલા હોય છે. કાયલનું રંગ દૂધિયું સફેદ હોય છે. પરંતુ કાયલ સીધું જ હૃદયમાં ખાલી થતું નથી, તે પહેલા થોરેસિક ડક્ટ દ્વારા રક્ત પરિવહન પ્રણાલીમાં મિશ્ર થાય છે. તેથી વિકલ્પ C ખોટો છે.", "ncert_ref": "Class XI - Chapter 15: શરીરમાં પરિવહન", "difficulty": "Hard", "num": 12}, {"question": "લસિકા પ્રણાલીમાં 'થાયમસ' (Thymus) ની ભૂમિકા વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) તે વયસ્કોમાં લસિકા કોષોનું ઉત્પાદન કરે છે.", "B) તે બાળકોમાં T-લસિકા કોષોનું પરિપક્વન કરે છે અને પ્રતિરક્ષા પ્રણાલીને મજબૂત બનાવે છે.", "C) તે હોર્મોનનું સ્રાવણ કરે છે જે રક્તમાં શર્કરાનું સ્તર નિયંત્રિત કરે છે.", "D) તે લસિકા ગાંઠોના ઉત્પાદન માટે જવાબદાર હોય છે."], "correct": 1, "explanation": "થાયમસ બાળકોમાં T-લસિકા કોષોનું પરિપક્વન કરે છે અને પ્રતિરક્ષા પ્રણાલીને મજબૂત બનાવે છે. વિકલ્પ A ખોટો છે કારણ કે થાયમસ વયસ્કોમાં લસિકા કોષોનું ઉત્પાદન કરતું નથી. વિકલ્પ C ખોટો છે કારણ કે તે હોર્મોનનું સ્રાવણ કરતું નથી જે રક્તમાં શર્કરાનું સ્તર નિયંત્રિત કરે છે. વિકલ્પ D ખોટો છે કારણ કે તે લસિકા ગાંઠોના ઉત્પાદન માટે જવાબદાર નથી.", "ncert_ref": "Class XI - Chapter 15: શરીરમાં પરિવહન", "difficulty": "Hard", "num": 13}, {"question": "લસિકા પ્રણાલીમાં 'લસિકા વાહિનીઓ' અને 'રક્ત વાહિનીઓ' વચ્ચેનો તફાવત વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) લસિકા વાહિનીઓમાં વાલ્વ્સ હોતા નથી, જ્યારે રક્ત વાહિનીઓમાં વાલ્વ્સ હોય છે.", "B) લસિકા વાહિનીઓ એકદિશાત્મક વહન ધરાવે છે, જ્યારે રક્ત વાહિનીઓ દ્વિદિશાત્મક વહન ધરાવે છે.", "C) લસિકા વાહિનીઓમાં રક્ત દબાણ જેવું દબાણ હોતું નથી, જ્યારે રક્ત વાહિનીઓમાં રક્ત દબાણ હોય છે.", "D) લસિકા વાહિનીઓમાં ઓક્સિજન યુક્ત રક્ત વહન થાય છે, જ્યારે રક્ત વાહિનીઓમાં ઓક્સિજન રહિત રક્ત વહન થાય છે."], "correct": 2, "explanation": "લસિકા વાહિનીઓમાં રક્ત દબાણ જેવું દબાણ હોતું નથી, જ્યારે રક્ત વાહિનીઓમાં રક્ત દબાણ હોય છે. વિકલ્પ A ખોટો છે કારણ કે લસિકા વાહિનીઓમાં વાલ્વ્સ હોય છે. વિકલ્પ B ખોટો છે કારણ કે રક્ત વાહિનીઓ એકદિશાત્મક વહન ધરાવે છે. વિકલ્પ D ખોટો છે કારણ કે લસિકા વાહિનીઓમાં ઓક્સિજન યુક્ત રક્ત વહન થતું નથી.", "ncert_ref": "Class XI - Chapter 15: શરીરમાં પરિવહન", "difficulty": "Hard", "num": 14}, {"question": "લસિકા પ્રણાલીમાં 'લસિકા ગાંઠો' અને 'પ્લીહા' (Spleen) વચ્ચેનો તફાવત વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) લસિકા ગાંઠો લસિકા પ્રણાલીનો ભાગ છે, જ્યારે પ્લીહા રક્ત પરિવહન પ્રણાલીનો ભાગ છે.", "B) લસિકા ગાંઠો રક્તને ફિલ્ટર કરે છે, જ્યારે પ્લીહા લસિકાને ફિલ્ટર કરે છે.", "C) લસિકા ગાંઠોમાં લાલ રક્ત કણિકાઓનું નિર્માણ થાય છે, જ્યારે પ્લીહામાં લસિકા કોષોનું નિર્માણ થાય છે.", "D) લસિકા ગાંઠો અને પ્લીહા બંને લસિકા પ્રણાલીના અંગો છે અને લસિકાને ફિલ્ટર કરે છે."], "correct": 0, "explanation": "લસિકા ગાંઠો લસિકા પ્રણાલીનો ભાગ છે, જ્યારે પ્લીહા રક્ત પરિવહન પ્રણાલીનો ભાગ છે. વિકલ્પ B ખોટો છે કારણ કે લસિકા ગાંઠો લસિકાને ફિલ્ટર કરે છે, જ્યારે પ્લીહા રક્તને ફિલ્ટર કરે છે. વિકલ્પ C ખોટો છે કારણ કે લસિકા ગાંઠોમાં લાલ રક્ત કણિકાઓનું નિર્માણ થતું નથી, જ્યારે પ્લીહામાં લસિકા કોષોનું નિર્માણ થતું નથી. વિકલ્પ D ખોટો છે કારણ કે પ્લીહા લસિકા પ્રણાલીનો ભાગ નથી.", "ncert_ref": "Class XI - Chapter 15: શરીરમાં પરિવહન", "difficulty": "Hard", "num": 15}, {"question": "લસિકા પ્રણાલીમાં 'કાયલ' (Chyle) ની રચના ક્યાં થાય છે અને તેનું વહન ક્યાં દ્વારા થાય છે?", "options": ["A) આંતરડાના કોષભિત્તિમાં રચાય છે અને લેક્ટીલ દ્વારા વહન થાય છે", "B) યકૃતમાં રચાય છે અને હેપેટિક વાહિનીદ્વારા વહન થાય છે", "C) પ્લીહામાં રચાય છે અને સ્પ્લેનિક વાહિનીદ્વારા વહન થાય છે", "D) થાયરોઇડ ગ્રંથિમાં રચાય છે અને લસિકા વાહિનીદ્વારા વહન થાય છે"], "correct": 0, "explanation": "કાયલ આંતરડાના કોષભિત્તિમાં (ઇન્ટેસ્ટાઇનલ વિલી) રચાય છે, જ્યાં ચરબીના શોષણ પછી લેક્ટીલ (લસિકા વાહિનીઓ) દ્વારા વ t_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 36}, {"question": "લસિકા પ્રણાલીમાં, 'થોરેસિક ડક્ટ' (Thoracic Duct) વિશે નીચેનામાંથી કયું વિધાન સત્ય છે, જ્યારે તે રક્ત પરિવહન પ્રણાલી સાથે જોડાય છે?", "options": ["A) તે ડાબી સબક્લેવિયન શિરામાં ખાલી થાય છે.", "B) તે જમણી સબક્લેવિયન શિરામાં ખાલી થાય છે.", "C) તે ડાબી અને જમણી સબક્લેવિયન શિરામાં ખાલી થાય છે.", "D) તે સુપિરિયર વેના કેવામાં ખાલી થાય છે."], "correct": 0, "explanation": "થોરેસિક ડક્ટ (Thoracic Duct) એ લસિકા પ્રણાલીની સૌથી મોટી વાહિની છે, જે શરીરના મોટાભાગના ભાગોમાંથી લસિકા એકત્રિત કરે છે અને તે ડાબી સબક્લેવિયન શિરામાં ખાલી થાય છે. જમણી સબક્લેવિયન શિરામાં લસિકા ડાબી લસિકા ડક્ટ (Right Lymphatic Duct) ખાલી થાય છે. સુપિરિયર વેના કેવામાં થોરેસિક ડક્ટ ખાલી થતું નથી.", "ncert_ref": "Class XI - Chapter 15: શરીરમાં પરિવહન (Body Fluids and Circulation)", "difficulty": "Hard", "num": 37}, {"question": "લસિકા ગાંઠોમાં 'જર્મિનલ સેન્ટર' (Germinal Center) વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) જર્મિનલ સેન્ટરમાં B-લસિકાકોષોનું પ્રસારણ અને વિભેદન થાય છે", "B) જર્મિનલ સેન્ટરમાં પ્રતિજન-પ્રસ્તુત કરતા કોષો (APCs) ની હાજરી જરૂરી છે", "C) જર્મિનલ સેન્ટરમાં T-લસિકાકોષોનું પ્રસારણ થાય છે, પરંતુ B-લસિકાકોષોનું નહીં", "D) જર્મિનલ સેન્ટરમાં ઉચ્ચ પ્રતિજન-વિશિષ્ટ પ્રતિદ્રવ્યોનું ઉત્પાદન થાય છે"], "correct": 2, "explanation": "જર્મિનલ સેન્ટર (Germinal Center) લસિકા ગાંઠોમાં આવેલું હોય છે જ્યાં B-લસિકાકોષોનું પ્રસારણ અને વિભેદન થાય છે, જે ઉચ્ચ પ્રતિજન-વિશિષ્ટ પ્રતિદ્રવ્યોનું ઉત્પાદન કરે છે. પ્રતિજન-પ્રસ્તુત કરતા કોષો (APCs) પણ અહીં મહત્ત્વપૂર્ણ ભૂમિકા ભજવે છે. વિકલ્પ C ખોટું છે કારણ કે જર્મિનલ સેન્ટરમાં મુખ્યત્વે B-લસિકાકોષોનું પ્રસારણ થાય છે, T-લસિકાકોષોનું નહીં.", "ncert_ref": "કક્ષા 12 - અધ્યાય 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 38}, {"question": "નીચેનામાંથી કયું અંગ લસિકા પ્રણાલીનો ભાગ નથી, પરંતુ લસિકા ગાંઠો સાથે કાર્યાત્મક સંબંધ ધરાવે છે?", "options": ["A) થાયમસ (Thymus)", "B) પ્લીહા (Spleen)", "C) યકૃત (Liver)", "D) પેયરના પેચ (Peyer’s Patches)"], "correct": 2, "explanation": "થાયમસ, પ્લીહા અને પેયરના પેચ લસિકા પ્રણાલીના મુખ્ય અંગો છે. યકૃત (Liver) લસિકા પ્રણાલીનો ભાગ નથી, પરંતુ તે લસિકા ગાંઠો સાથે કાર્યાત્મક સંબંધ ધરાવે છે કારણ કે તે રક્ત શુદ્ધિકરણમાં મહત્ત્વપૂર્ણ ભૂમિકા ભજવે છે અને પ્રતિરક્ષા પ્રતિક્રિયાઓને અસર કરે છે. વિકલ્પ C સાચો છે કારણ કે યકૃત લસિકા પ્રણાલીનો ભાગ નથી.", "ncert_ref": "કક્ષા 11 - અધ્યાય 18: શરીર પ્રવાહીઓ અને પરિવહન; કક્ષા 12 - અધ્યાય 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 39}, {"question": "લસિકા પ્રણાલીમાં, જ્યારે કોઈ વ્યક્તિને 'એલિફન્ટિયાસિસ' (Elephantiasis) નામનો રોગ થાય છે, ત્યારે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) આ રોગ લસિકા વાહિનીઓમાં બેક્ટેરિયલ ચેપને કારણે થાય છે", "B) આ રોગ લસિકા વાહિનીઓમાં ફાઇલેરિયલ કૃમિના ચેપને કારણે થાય છે, જે લસિકા પ્રવાહને અવરોધે છે", "C) આ રોગ લસિકા ગાંઠોમાં કેન્સરને કારણે થાય છે", "D) આ રોગ લસિકા પ્રણાલીમાં ઓછા પ્રોટીનના કારણે થાય છે"], "correct": 1, "explanation": "'એલિફન્ટિયાસિસ' (Elephantiasis) ફાઇલેરિયલ કૃમિ (Wuchereria bancrofti) ના ચેપને કારણે થાય છે, જે લસિકા વાહિનીઓમાં પ્રવેશી લસિકા પ્રવાહને અવરોધે છે. આને કારણે અસરગ્રસ્ત અંગોમાં સોજો આવે છે. વિકલ્પ B સત્ય છે, જ્યારે અન્ય વિકલ્પો ખોટાં છે કારણ કે આ રોગ બેક્ટેરિયા, કેન્સર કે પ્રોટીનની ઉણપને કારણે થતો નથી.", "ncert_ref": "કક્ષા 12 - અધ્યાય 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 40}, {"question": "એક વ્યક્તિને આંતરડામાંથી ચરબીનું શોષણ થવામાં તકલીફ થઈ રહી છે. તબીબી તપાસમાં જાણવા મળ્યું કે તેના આંતરડાના રસાંકુરોમાં આવેલી લેક્ટીલ્સ (Lacteals) નુકસાન પામી છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) આ વ્યક્તિના શરીરમાં ચરબી-દ્રાવ્ય વિટામિનો (A, D, E, K) નું શોષણ ઘટી જશે", "B) આ વ્યક્તિના લોહીમાં કાયલોમાઈક્રોન્સ (Chylomicrons) નું પ્રમાણ વધી જશે કારણ કે લેક્ટીલ્સ દ્વારા શોષણ ન થતાં તે લોહીમાં ભળી જશે", "C) આ વ્યક્તિના થોરેસિક ડક્ટ (Thoracic Duct) માં કાયલ (Chyle) નું પ્રમાણ ઘટી જશે", "D) આ વ્યક્તિના શરીરમાં લસિકા પ્રણાલી દ્વારા ચરબીનું પરિવહન પ્રભાવિત થશે, પરંતુ કાર્બોદિત અને પ્રોટીનનું શોષણ સામાન્ય રીતે થતું રહેશે"], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે. લેક્ટીલ્સ (Lacteals) એ આંતરડાના રસાંકુરોમાં આવેલી લસિકા વાહિનીઓ છે, જે ચરબી અને ચરબી-દ્રાવ્ય વિટામિનોનું શોષણ કરીને કાયલ (Chyle) નામના દ્રવ્યનું નિર્માણ કરે છે. કાયલોમાઈક્રોન્સ (Chylomicrons) લેક્ટીલ્સ દ્વારા શોષાયા બાદ લસિકા પ્રણાલીમાં પ્રવેશે છે, નહીં કે સીધા લોહીમાં. તેથી લેક્ટીલ્સ નુકસાન પામે તો કાયલોમાઈક્રોન્સ લોહીમાં નહીં, પરંતુ આંતરડામાં જ રહી જાય છે અને તેમનું પ્રમાણ લોહીમાં વધતું નથી. વિકલ્પ A, C અને D સાચાં છે કારણ કે ચરબી-દ્રાવ્ય વિટામિનોનું શોષણ ઘટશે, થોરેસિક ડક્ટમાં કાયલનું પ્રમાણ ઘટશે, અને કાર્બોદિત તથા પ્રોટીનનું શોષણ લોહી દ્વારા થતું હોવાથી તે પ્રભાવિત થશે નહીં.", "ncert_ref": "Class XI - અધ્યાય 16: પાચન અને શોષણ, Class XII - અધ્યાય 7: શરીરના પ્રવાહીઓ અને પરિવહન", "difficulty": "Hard", "num": 41}, {"question": "લસિકા પ્રણાલીમાં, નીચેનામાંથી કયું અંગ લસિકા પ્રણાલીનો ભાગ નથી, પરંતુ લસિકા ગાંઠો સાથે કાર્યાત્મક સંકળાયેલું છે?", "options": ["A) પ્લીહા", "B) થાયમસ", "C) યકૃત", "D) ટોન્સિલ"], "correct": 2, "explanation": "યકૃત લસિકા પ્રણાલીનો ભાગ નથી, પરંતુ તે લસિકા ગાંઠો સાથે કાર્યાત્મક સંકળાયેલું છે કારણ કે તે રક્ત શુદ્ધિકરણ અને ચયાપચયમાં મહત્વની ભૂમિકા ભજવે છે. પ્લીહા, થાયમસ અને ટોન્સિલ લસિકા પ્રણાલીના અંગો છે.", "ncert_ref": "Class XI - Chapter 15: શરીરમાં પરિવહન (Body Fluids and Circulation)", "difficulty": "Hard", "num": 42}, {"question": "લસિકા પ્રણાલીમાં, જ્યારે 'કાયલ' (Chyle) ની રચના થાય છે, ત્યારે નીચેનામાંથી કયા પદાર્થનું શોષણ સૌથી વધુ પ્રમાણમાં થાય છે, જે લસિકા વાહિનીઓ દ્વારા વહન પામે છે?", "options": ["A) ગ્લુકોઝ અને એમિનો એસિડ", "B) વસા (ચરબી) અને ફેટી એસિડ", "C) પ્રોટીન અને પેપ્ટાઇડ", "D) વિટામિન B12 અને લોહતત્વ"], "correct": 1, "explanation": "કાયલની રચના આંતરડાના લેક્ટીલમાં થાય છે, જ્યાં ચરબી (વસા) અને ફેટી એસિડનું શોષણ સૌથી વધુ પ્રમાણમાં થાય છે. લસિકા વાહિનીઓ દ્વારા આ શોષિત ચરબીનું વહન થાય છે. ગ્લુકોઝ અને એમિનો એસિડ મુખ્યત્વે રક્ત વાહિનીઓ દ્વારા શોષાય છે, જ્યારે પ્રોટીન અને પેપ્ટાઇડનું શોષણ આંતરડામાં થાય છે પરંતુ કાયલમાં નહીં. વિટામિન B12 અને લોહતત્વનું શોષણ પણ આંતરડામાં થાય છે, પરંતુ તે કાયલ સાથે સંકળાયેલું નથી.", "ncert_ref": "Class XI - Chapter 15: પાચન અને શોષણ", "difficulty": "Hard", "num": 43}, {"question": "લસિકા પ્રણાલીમાં, 'કાયલ' (Chyle) ની રચના અને વહન વિશે નીચેનામાંથી કયું વિધાન ખરું છે?", "options": ["A) કાયલની રચના આંતરડાની લસિકા વાહિનીઓમાં થાય છે અને તે રક્તમાં મિશ્ર થાય છે.", "B) કાયલની રચના લસિકા ગાંઠોમાં થાય છે અને તે લસિકા વાહિનીઓ દ્વારા વહન પામે છે.", "C) કાયલની રચના લેક્ટીલમાં થાય છે અને તે થોરેસિક ડક્ટ દ્વારા વહન પામે છે.", "D) કાયલની રચના યકૃતમાં થાય છે અને તે રક્ત વાહિનીઓ દ્વારા વહન પામે છે."], "correct": 2, "explanation": "કાયલ (Chyle) એ ચરબીયુક્ત લસિકા છે જેની રચના આંતરડાની લેક્ટીલ (Lacteal) નામની લસિકા વાહિનીઓમાં થાય છે. આ લેક્ટીલ આંતરડાની વિલી (Villi) માં જોવા મળે છે, જ્યાં ચરબીનું શોષણ થાય છે. કાયલ પછી થોરેસિક ડક્ટ દ્વારા વહન પામે છે અને અંતે રક્ત પરિવહન પ્રણાલીમાં મિશ્ર થાય છે. A) કાયલની રચના લસિકા વાહિનીઓમાં થતી નથી, પરંતુ લેક્ટીલમાં થાય છે. B) કાયલની રચના લસિકા ગાંઠોમાં થતી નથી. D) કાયલની રચના યકૃતમાં થતી નથી.", "ncert_ref": "Class XI - Chapter 15: શરીરમાં પરિવહન (Body Fluids and Circulation)", "difficulty": "Hard", "num": 44}, {"question": "લસિકા પ્રણાલીમાં, નીચેનામાંથી કયું વિધાન લસિકા ગાંઠો (lymph nodes) અને પ્લીહા (spleen) વચ્ચેના તફાવત વિશે સત્ય છે?", "options": ["A) લસિકા ગાંઠો અને પ્લીહા બંનેમાં લસિકા ફિલ્ટરેશન થાય છે, પરંતુ પ્લીહામાં રક્ત ફિલ્ટરેશન થતું નથી.", "B) લસિકા ગાંઠોમાં જર્મિનલ સેન્ટર (germinal center) હોય છે, જ્યારે પ્લીહામાં હોતું નથી.", "C) પ્લીહા લસિકા પ્રણાલીનો ભાગ છે, જ્યારે લસિકા ગાંઠો રક્ત પરિવહન પ્રણાલીનો ભાગ છે.", "D) લસિકા ગાંઠો અને પ્લીહા બંનેમાં હીમોગ્લોબિનનું વિઘટન થાય છે."], "correct": 1, "explanation": "લસિકા ગાંઠોમાં જર્મિનલ સેન્ટર (germinal center) હોય છે, જ્યાં B-કોષોનું પ્રસરણ થાય છે, જ્યારે પ્લીહામાં જર્મિનલ સેન્ટર હોતું નથી. A ખોટું છે કારણ કે પ્લીહામાં રક્ત ફિલ્ટરેશન થાય છે. C ખોટું છે કારણ કે પ્લીહા લસિકા પ્રણાલીનો ભાગ નથી, પરંતુ તે રક્ત પરિવહન પ્રણાલી સાથે જોડાયેલ છે. D ખોટું છે કારણ કે હીમોગ્લોબિનનું વિઘટન ફક્ત પ્લીહામાં થાય છે, લસિકા ગાંઠોમાં નહીં.", "ncert_ref": "Class XI - Chapter 16: પરિવહન", "difficulty": "Hard", "num": 45}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
