    <script>
        const questionsData = [{"question": "રક્તમાં હિમોગ્લોબિનની સાંદ્રતા ઘટે ત્યારે શરીરમાં કયો હોર્મોન સ્રાવ પામે છે જે હાડકાંના મજ્જામાં રક્તકણોના નિર્માણને ઉત્તેજે છે?", "options": ["A) એરિથ્રોપોઇટિન", "B) થ્રોમ્બોપોઇટિન", "C) લ્યુકોપોઇટિન", "D) ઇન્ટરલ્યુકિન"], "correct": 0, "explanation": "એરિથ્રોપોઇટિન (EPO) હોર્મોન કિડની દ્વારા સ્રાવ પામે છે જ્યારે રક્તમાં ઓક્સિજનની ઉણપ અથવા હિમોગ્લોબિનની સાંદ્રતા ઘટે છે. આ હોર્મોન હાડકાંના મજ્જામાં રેડ બ્લડ સેલ્સ (RBCs)ના નિર્માણને ઉત્તેજે છે. થ્રોમ્બોપોઇટિન પ્લેટલેટ્સના નિર્માણને ઉત્તેજે છે, લ્યુકોપોઇટિન શ્વેત રક્તકણોના નિર્માણ સાથે સંબંધિત નથી, અને ઇન્ટરલ્યુકિન પ્રતિરક્ષાતંત્ર સાથે સંબંધિત છે.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીર અને તેનું પરિવહન", "difficulty": "Hard", "num": 1}, {"question": "રક્ત ગઠ્ઠાય તે માટે જરૂરી વિટામિન કયું છે અને તે કયા અંગમાં સંશ્લેષિત થાય છે?", "options": ["A) વિટામિન K, યકૃત", "B) વિટામિન D, ત્વચા", "C) વિટામિન C, અન્નનળી", "D) વિટામિન E, મસ્તિષ્ક"], "correct": 0, "explanation": "રક્ત ગઠ્ઠાય તે માટે વિટામિન K જરૂરી છે, જે યકૃતમાં સંશ્લેષિત થાય છે. વિટામિન K રક્ત ગઠ્ઠા માટે જરૂરી પ્રોટીન જેવા કે પ્રોથ્રોમ્બિન અને ફિબ્રિનોજેનના નિર્માણમાં મદદ કરે છે. વિટામિન D ત્વચામાં સૂર્યપ્રકાશની હાજરીમાં સંશ્લેષિત થાય છે, વિટામિન C અન્નનળીમાં શોષાય છે, અને વિટામિન E મસ્તિષ્ક સાથે સંબંધિત નથી.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીર અને તેનું પરિવહન", "difficulty": "Hard", "num": 2}, {"question": "નીચેનામાંથી કયો રક્ત કણ કોષકેન્દ્ર રહિત હોય છે અને તેનું મુખ્ય કાર્ય ઓક્સિજનનું પરિવહન છે?", "options": ["A) લોહીના લાલ કણ (RBCs)", "B) શ્વેત રક્તકણ (WBCs)", "C) પ્લેટલેટ્સ", "D) લસિકાકણ"], "correct": 0, "explanation": "લોહીના લાલ કણ (RBCs) કોષકેન્દ્ર રહિત હોય છે અને તેનું મુખ્ય કાર્ય ઓક્સિજનનું પરિવહન છે. શ્વેત રક્તકણ (WBCs) કોષકેન્દ્ર ધરાવે છે અને પ્રતિરક્ષા સાથે સંબંધિત છે, પ્લેટલેટ્સ રક્ત ગઠ્ઠાય તે માટે જરૂરી છે, અને લસિકાકણ લસિકા પ્રણાલી સાથે સંબંધિત છે.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીર અને તેનું પરિવહન", "difficulty": "Hard", "num": 3}, {"question": "રક્તમાં કયા પ્રકારના શ્વેત રક્તકણો (WBC ion": "નીચેનામાંથી કયો રક્તકણ રક્તવાહિનીઓની દીવાલને આડકતરો પસાર કરી શકે છે?", "options": ["A) લાલ રક્તકણ (RBC)", "B) બેસોફિલ", "C) મોનોસાઇટ", "D) પ્લેટલેટ"], "correct": 2, "explanation": "મોનોસાઇટ એ શ્વેત રક્તકણ છે જે રક્તવાહિનીઓની દીવાલને આડકતરો પસાર કરી શકે છે અને પેશીઓમાં જઈને મેક્રોફેજમાં રૂપાંતરિત થાય છે. લાલ રક્તકણ (RBC) અને પ્લેટલેટ રક્તવાહિનીઓમાં જ રહે છે, જ્યારે બેસોફિલ પણ રક્તવાહિનીઓમાં જ રહે છે અને એલર્જી પ્રતિક્રિયામાં ભાગ લે છે.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીર અને સ્વાસ્થ્ય", "difficulty": "Hard", "num": 22}, {"question": "રક્તમાં નીચેનામાંથી કયા શ્વેત રક્તકણ (WBC)નું પ્રમાણ સૌથી ઓછું હોય છે?", "options": ["A) ન્યૂટ્રોફિલ", "B) લિમ્ફોસાઇટ", "C) બેસોફિલ", "D) ઇઓસિનોફિલ"], "correct": 2, "explanation": "બેસોફિલ એ શ્વેત રક્તકણ છે જેનું પ્રમાણ રક્તમાં સૌથી ઓછું હોય છે (લગભગ 0.5-1%). ન્યૂટ્રોફિલ (60-65%), લિમ્ફોસાઇટ (20-25%), અને ઇઓસિનોફિલ (2-4%)નું પ્રમાણ બેસોફિલ કરતાં વધુ હોય છે.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીર અને સ્વાસ્થ્ય", "difficulty": "Hard", "num": 23}, {"question": "રક્ત ગઠ્ઠાય તે પ્રક્રિયામાં, નીચેનામાંથી કયો ઘટક 'પ્રોથ્રોમ્બિન'ને 'થ્રોમ્બિન'માં રૂપાંતરિત કરે છે?", "options": ["A) ફાઇબ્રિનોજન", "B) થ્રોમ્બોપ્લાસ્ટિન", "C) કેલ્શિયમ આયન", "D) વિટામિન K"], "correct": 2, "explanation": "રક્ત ગઠ્ઠાય તે પ્રક્રિયામાં, કેલ્શિયમ આયન (Ca²⁺) પ્રોથ્રોમ્બિનને થ્રોમ્બિનમાં રૂપાંતરિત કરવામાં મદદ કરે છે. ફાઇબ્રિનોજન થ્રોમ્બિન દ્વારા ફાઇબ્રિનમાં રૂપાંતરિત થાય છે, થ્રોમ્બોપ્લાસ્ટિન રક્ત ગઠ્ઠાય તે પ્રક્રિયાને ઉત્તેજે છે, અને વિટામિન K રક્ત ગઠ્ઠાય તે માટે જરૂરી પ્રોટીનની રચનામાં મદદ કરે છે.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીર અને સ્વાસ્થ્ય", "difficulty": "Hard", "num": 24}, {"question": "રક્તમાં નીચેનામાંથી કયો રક્તકણ રક્તવાહિનીઓની દીવાલને આડકતરો પસાર કરી શકે છે અને તેનું મુખ્ય કાર્ય શું છે?", "options": ["A) ન્યૂટ્રોફિલ – બેક્ટેરિયા અને ફંગી વિરુદ્ધ લડવું", "B) મોનોસાઇટ – મૃત કોષો અને વિદેશી પદાર્થોનો નાશ કરવો", "C) બેસોફિલ – એલર્જી પ્રતિક્રિયામાં ભાગ લેવો", "D) લિમ્ફોસાઇટ – એન્ટિબોડી ઉત્પન્ન કરવી"], "correct": 1, "explanation": "મોનોસાઇ ટિન, પ્લીહા", "C) ટ્રાન્સફેરિન, અસ્થિમજ્જા", "D) એરિથ્રોપોઇટિન, કિડની"], "correct": 1, "explanation": "વિકલ્પ B સાચો છે કારણ કે ફેરિટિન કોષકેન્દ્રના નાશ દરમ્યાન લોહતત્વને સંગ્રહિત કરવામાં મદદ કરે છે અને પ્લીહામાં ઉત્પન્ન થાય છે. વિકલ્પ A ખોટો છે કારણ કે હિમોગ્લોબિન RBCsમાં ઓક્સિજન વહન માટે જવાબદાર છે અને યકૃતમાં ઉત્પન્ન થતું નથી. વિકલ્પ C ખોટો છે કારણ કે ટ્રાન્સફેરિન લોહતત્વનું વહન કરે છે પરંતુ કોષકેન્દ્રના નાશમાં સીધો ભાગ લેતું નથી. વિકલ્પ D ખોટો છે કારણ કે એરિથ્રોપોઇટિન RBCsની ઉત્પત્તિને ઉત્તેજિત કરે છે પરંતુ કોષકેન્દ્રના નાશમાં ભૂમિકા ભજવતું નથી.", "ncert_ref": "Class XI - Chapter 18: શરીર પ્રવાહી અને પરિવહન", "difficulty": "Hard", "num": 28}, {"question": "રક્તમાં નીચેનામાંથી કયો શ્વેત રક્તકણ (WBC) સૌપ્રથમ સંક્રમણ સ્થળે પહોંચે છે અને તેનું મુખ્ય કાર્ય શું છે?", "options": ["A) ન્યૂટ્રોફિલ્સ – બેક્ટેરિયાને ફેગોસાઇટોસિસ દ્વારા નષ્ટ કરવું", "B) લિમ્ફોસાઇટ્સ – એન્ટિબોડીનું ઉત્પાદન કરવું", "C) મોનોસાઇટ્સ – કોષીય અપશિષ્ટોને સાફ કરવું", "D) બેસોફિલ્સ – હિસ્ટામીનનું સ્રાવ કરવું"], "correct": 0, "explanation": "ન્યૂટ્રોફિલ્સ સંક્રમણ સ્થળે સૌપ્રથમ પહોંચતા શ્વેત રક્તકણો છે અને તે બેક્ટેરિયાને ફેગોસાઇટોસિસ દ્વારા નષ્ટ કરે છે. લિમ્ફોસાઇટ્સ એન્ટિબોડીનું ઉત્પાદન કરે છે, પરંતુ તે સંક્રમણ સ્થળે તરત જ પહોંચતા નથી. મોનોસાઇટ્સ કોષીય અપશિષ્ટોને સાફ કરે છે, પરંતુ તે ન્યૂટ્રોફિલ્સ જેટલા ઝડપથી પહોંચતા નથી. બેસોફિલ્સ હિસ્ટામીનનું સ્રાવ કરે છે, પરંતુ તે સંક્રમણ વિરુદ્ધ પ્રતિક્રિયામાં મુખ્ય ભૂમિકા ભજવતા નથી.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીર અને સ્વાસ્થ્ય", "difficulty": "Hard", "num": 29}, {"question": "રક્ત ગઠ્ઠાય તે પ્રક્રિયામાં, નીચેનામાંથી કયો ઘટક 'થ્રોમ્બોપ્લાસ્ટિન'નું સ્રાવ કરે છે, જે પ્રોથ્રોમ્બિનને થ્રોમ્બિનમાં રૂપાંતરિત કરવામાં મદદ કરે છે?", "options": ["A) પ્લેટલેટ્સ", "B) લાલ રક્તકણો", "C) શ્વેત રક્તકણો", "D) એન્ડોથેલિયલ કોષો"], "correct": 0, "explanation": "પ્લેટલેટ્સ (રક્તકણિકાઓ) રક્ત ગઠ્ઠાય તે પ્રક્રિયામાં 'થ્રોમ્બોપ્લાસ્ટિન'નું સ્રાવ કરે છે, જે પ્રોથ્રોમ્બિનને થ્રોમ્બિનમાં રૂપાંતરિત કરવામાં મદદ કરે છે. લાલ રક્તકણો, શ્વેત રક્તકણો અને એન્ડોથેલિયલ કોષો આ પ્રક્રિયામાં                 const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
