<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - પ્લાઝ્મા – પ્લાઝ્માની રચના અને કાર્ય.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 પ્લાઝ્મા – પ્લાઝ્માની રચના અને કાર્ય.</span>
                <span>🎯 Hard</span>
                <span>📝 43 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "પ્લાઝ્મામાં રહેલા પ્રોટીન પૈકી કયું પ્રોટીન રક્તના ગંઠાવાનું મુખ્ય કારણ છે, પરંતુ તે સક્રિય રૂપે રક્તમાં મુક્ત નથી હોતું?", "options": ["A) ફાઇબ્રિનોજન", "B) પ્રોથ્રોમ્બિન", "C) ગ્લોબ્યુલિન", "D) એલ્બ્યુમિન"], "correct": 0, "explanation": "ફાઇબ્રિનોજન (A) રક્તના ગંઠાવામાં મુખ્ય ભૂમિકા ભજવે છે, પરંતુ તે સક્રિય રૂપે રક્તમાં મુક્ત નથી હોતું. તે લિવર દ્વારા સ્રાવાય છે અને જ્યારે રક્ત ગંઠાય છે ત્યારે તે ફાઇબ્રિનમાં રૂપાંતરિત થાય છે. પ્રોથ્રોમ્બિન (B) ગંઠાવાની પ્રક્રિયામાં ભાગ લે છે, પરંતુ તે એન્ઝાઇમ છે અને સક્રિય રૂપે મુક્ત હોતું નથી. ગ્લોબ્યુલિન (C) અને એલ્બ્યુમિન (D) રક્તના અન્ય પ્રોટીન છે, પરંતુ તે ગંઠાવાનું મુખ્ય કારણ નથી.", "ncert_ref": "Class XI - પ્રકરણ 17: શરીર દ્રવ્યો અને પરિવહન", "difficulty": "Hard", "num": 1}, {"question": "પ્લાઝ્મામાં રહેલા કયા અજૈવિક ઘટકની ઉણપથી રક્તનું pH સંતુલન ખોરવાય છે અને એસિડોસિસની સ્થિતિ ઉદ્ભવે છે?", "options": ["A) કેલ્શિયમ આયન", "B) બાઇકાર્બોનેટ આયન", "C) સોડિયમ આયન", "D) પોટેશિયમ આયન"], "correct": 1, "explanation": "બાઇકાર્બોનેટ આયન (B) રક્તના pH સંતુલનમાં મુખ્ય ભૂમિકા ભજવે છે. તે રક્તને એસિડિક થતું અટકાવે છે. જો બાઇકાર્બોનેટ આયનની ઉણપ થાય તો રક્ત એસિડિક બને છે, જેને એસિડોસિસ કહે છે. કેલ્શિયમ આયન (A) હાડકાં અને સ્નાયુઓના કાર્યમાં મહત્વનું છે, સોડિયમ આયન (C) અને પોટેશિયમ આયન (D) તંત્રિકા અને સ્નાયુ કાર્યમાં મહત્વના છે, પરંતુ તે pH સંતુલનમાં મુખ્ય ભૂમિકા ભજવતા નથી.", "ncert_ref": "Class XI - પ્રકરણ 17: શરીર દ્રવ્યો અને પરિવહન", "difficulty": "Hard", "num": 2}, {"question": "પ્લાઝ્મામાં રહેલા કયા પ્રોટીન દ્વારા લોહીના ઓસ્મોટિક દબાણનું નિયમન થાય છે અને તે લિવર દ્વારા સ્રાવાય છે?", "options": ["A) એલ્બ્યુમિન", "B) ફાઇબ્રિનોજન", "C) ગ્લોબ્યુલિન", "D) હિમોગ્લોબિન"], "correct": 0, "explanation": "એલ્બ્યુમિન (A) પ્લાઝ્મામાં રહેલું પ્રોટીન છે જે લોહીના ઓસ્મોટિક દબાણનું નિયમન કરે છે અને લિવર દ્વારા સ્રાવાય છે. ફાઇબ્રિનોજન (B) રક્ત ગંઠાવામાં ભૂમિકા ભજવે છે, ગ્લોબ્યુલિન (C) પ્રતિરક્ષા તંત્રમાં ભૂમિકા ભજવે છે, અને હિમોગ્લોબિન (D) લાલ રક્ત કણિકાઓમાં રહેલું પ્રોટીન છે જે ઓક્સિજન વહન કરે છે.", "ncert_ref": "Class XI - પ્રકરણ 17: શરીર દ્રવ્યો અને પરિવહન", "difficulty": "Hard", "num": 3}, {"question": "પ્લાઝ્મામાં રહેલા કયા ઘટકની ઉણપથી રક્તમાં ઓક્સિજન વહનની ક્ષમતા ઘટે છે?", "options": ["A) હિમોગ્લોબિન", "B) એલ્બ્યુમિન", "C) ફાઇબ્રિનોજન", "D) ગ્લોબ્યુલિન"], "correct": 0, "explanation": "હિમોગ્લોબિન (A) લાલ રક્ત કણિકાઓમાં રહેલું પ્રોટીન છે જે ઓક્સિજન વહન કરે છે. જો હિમોગ્લોબિનની ઉણપ થાય તો રક્તમાં ઓક્સિજન વહનની ક્ષમતા ઘટે છે. એલ્બ્યુમિન (B) ઓસ્મોટિક દબાણનું નિયમન કરે છે, ફાઇબ્રિનોજન (C) રક્ત ગંઠાવામાં ભૂમિકા ભજવે છે, અને ગ્લોબ્યુલિન (D) પ્રતિરક્ષા તંત્રમાં ભૂમિકા ભજવે છે.", "ncert_ref": "Class XI - પ્રકરણ 17: શરીર દ્રવ્યો અને પરિવહન", "difficulty": "Hard", "num": 4}, {"question": "પ્લાઝ્મામાં રહેલા કયા આયનની ઉણપથી સ્નાયુઓમાં ખેંચાણ અને હૃદયના અસાધારણ ધબકારા થાય છે?", "options": ["A) કેલ્શિયમ આયન", "B) સોડિયમ આયન", "C) પોટેશિયમ આયન", "D) મેગ્નેશિયમ આયન"], "correct": 0, "explanation": "કેલ્શિયમ આયન (A) સ્નાયુઓના સંકોચન અને હૃદયના ધબકારા માટે આવશ્યક છે. તેની ઉણપથી સ્નાયુઓમાં ખેંચાણ અને હૃદયના અસાધારણ ધબકારા થાય છે. સોડિયમ આયન (B) અને પોટેશિયમ આયન (C) તંત્રિકા અને સ્નાયુ કાર્યમાં મહત્વના છે, પરંતુ તેની ઉણપથી આવા લક્ષણો દેખાતા નથી. મેગ્નેશિયમ આયન (D) એન્ઝાઇમના કાર્યમાં મહત્વનું છે, પરંતુ તેની ઉણપથી સ્નાયુઓમાં ખેંચાણ થતું નથી.", "ncert_ref": "Class XI - પ્રકરણ 17: શરીર દ્રવ્યો અને પરિવહન", "difficulty": "Hard", "num": 5}, {"question": "પ્લાઝ્મામાં રહેલા નીચેના પૈકી કયા ઘટકની સાંદ્રતા વ્યક્તિના આહાર અને જળવિભાજન સ્થિતિ પર આધારિત રહે છે, પરંતુ તેનું મુખ્ય કાર્ય રક્તના pH ને સ્થિર રાખવાનું છે?", "options": ["A) એલ્બ્યુમિન", "B) ગ્લોબ્યુલિન", "C) બાયકાર્બોનેટ આયન (HCO₃⁻)", "D) ફાઇબ્રિનોજેન"], "correct": 2, "explanation": "બાયકાર્બોનેટ આયન (HCO₃⁻) રક્તના pH ને સ્થિર રાખવામાં મુખ્ય ભૂમિકા ભજવે છે, કારણ કે તે રક્તમાં બફર તરીકે કાર્ય કરે છે. એલ્બ્યુમિન અને ગ્લોબ્યુલિન પ્રોટીન છે જે ઓસ્મોટિક દબાણ અને પ્રતિરક્ષા સાથે સંબંધિત છે, જ્યારે ફાઇબ્રિનોજેન રક્તના ગંઠાવામાં મદદ કરે છે. બાયકાર્બોનેટની સાંદ્રતા આહાર અને જળવિભાજન સ્થિતિ પર આધારિત હોય છે, પરંતુ તેનું મુખ્ય કાર્ય pH સંતુલન છે.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીર અને તેના વાતાવરણ (Body Fluids and Circulation)", "difficulty": "Hard", "num": 6}, {"question": "જ્યારે રક્ત પ્લાઝ્મામાં કેલ્શિયમ આયન (Ca²⁺) ની સાંદ્રતા અચાનક ઘટે છે, ત્યારે શરીરમાં કયો હોર્મોન સ્રાવ પામે છે જે પ્લાઝ્મામાં કેલ્શિયમની સાંદ્રતા વધારવા માટે ક્રિયાશીલ થાય છે?", "options": ["A) ઇન્સ્યુલિન", "B) પેરાથોર્મોન (PTH)", "C) એડ્રિનેલિન", "D) થાયરોક્સિન"], "correct": 1, "explanation": "પેરાથોર્મોન (PTH) કેલ્શિયમની ઉણપ વખતે સ્રાવ પામે છે અને હાડકામાંથી કેલ્શિયમ મુક્ત કરવા તેમજ કિડની દ્વારા કેલ્શિયમના પુન:શોષણને પ્રોત્સાહન આપીને પ્લાઝ્મામાં કેલ્શિયમની સાંદ્રતા વધારે છે. ઇન્સ્યુલિન ગ્લુકોઝના ચયાપચય સાથે, એડ્રિનેલિન તણાવ અને શારીરિક પ્રતિક્રિયા સાથે, જ્યારે થાયરોક્સિન ચયાપચય દર સાથે સંબંધિત છે.", "ncert_ref": "Class XI - પ્રકરણ 22: રસાયણિક નિયમન અને સંકલન (Chemical Coordination and Integration)", "difficulty": "Hard", "num": 7}, {"question": "પ્લાઝ્મામાં રહેલા નીચેના પૈકી કયા પ્રોટીનનો સ્રાવ યકૃત દ્વારા થતો નથી, પરંતુ તે પ્રતિરક્ષા તંત્ર સાથે સીધો સંબંધ ધરાવે છે?", "options": ["A) એલ્બ્યુમિન", "B) ફાઇબ્રિનોજેન", "C) ઇમ્યુનોગ્લોબ્યુલિન", "D) પ્રોથ્રોમ્બિન"], "correct": 2, "explanation": "ઇમ્યુનોગ્લોબ્યુલિન (પ્રતિદેહ) પ્રતિરક્ષા તંત્ર દ્વારા ઉત્પન્ન થાય છે અને તે યકૃત દ્વારા સ્રાવિત થતું નથી. એલ્બ્યુમિન, ફાઇબ્રિનોજેન અને પ્રોથ્રોમ્બિન યકૃત દ્વારા સ્રાવિત થાય છે અને રક્તના ગંઠાવા અને ઓસ્મોટિક દબાણ સાથે સંબંધિત છે.", "ncert_ref": "Class XII - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો (Human Health and Diseases)", "difficulty": "Hard", "num": 8}, {"question": "રક્ત પ્લાઝ્મામાં રહેલા નીચેના પૈકી કયા ઘટકની ઉણપથી રક્તમાં ઓક્સિજન વહનની ક્ષમતા ઘટતી નથી, પરંતુ તે રક્તના ગંઠાવામાં મહત્વની ભૂમિકા ભજવે છે?", "options": ["A) હિમોગ્લોબિન", "B) ફાઇબ્રિનોજેન", "C) એલ્બ્યુમિન", "D) ગ્લોબ્યુલિન"], "correct": 1, "explanation": "ફાઇબ્રિનોજેન રક્તના ગંઠાવામાં મહત્વની ભૂમિકા ભજવે છે, પરંતુ તે ઓક્સિજન વહન સાથે સંબંધિત નથી. હિમોગ્લોબિન ઓક્સિજન વહન માટે જવાબદાર છે, જ્યારે એલ્બ્યુમિન અને ગ્લોબ્યુલિન ઓસ્મોટિક દબાણ અને પ્રતિરક્ષા સાથે સંબંધિત છે.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીર અને તેના વાતાવરણ (Body Fluids and Circulation)", "difficulty": "Hard", "num": 9}, {"question": "પ્લાઝ્મામાં રહેલા નીચેના પૈકી કયા આયનની ઉણપથી સ્નાયુઓમાં ખેંચાણ થાય છે, પરંતુ તે હૃદયના ધબકારા પર અસર કરતું નથી?", "options": ["A) સોડિયમ (Na⁺)", "B) પોટેશિયમ (K⁺)", "C) કેલ્શિયમ (Ca²⁺)", "D) મેગ્નેશિયમ (Mg²⁺)"], "correct": 3, "explanation": "મેગ્નેશિયમ (Mg²⁺) ની ઉણપથી સ્નાયુઓમાં ખેંચાણ થાય છે, પરંતુ તે હૃદયના ધબકારા પર અસર કરતું નથી. સોડિયમ (Na⁺) અને પોટેશિયમ (K⁺) હૃદયના ધબકારા અને સ્નાયુઓની ક્રિયા પર અસર કરે છે, જ્યારે કેલ્શિયમ (Ca²⁺) હૃદય અને સ્નાયુઓ બંનેમાં મહત્વની ભૂમિકા ભજવે છે.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીર અને તેના વાતાવરણ (Body Fluids and Circulation)", "difficulty": "Hard", "num": 10}, {"question": "રક્ત પ્લાઝ્મામાં રહેલા નીચેના પૈકી કયા ઘટકની સાંદ્રતા હૃદયના સંકોચન અને શિથિલતાને સીધી અસર કરે છે, પરંતુ તેની ઉણપથી ટેટની (Tetany) લક્ષણો દેખાય છે?", "options": ["A) સોડિયમ આયન (Na⁺)", "B) પોટેશિયમ આયન (K⁺)", "C) કેલ્શિયમ આયન (Ca²⁺)", "D) મેગ્નેશિયમ આયન (Mg²⁺)"], "correct": 2, "explanation": "કેલ્શિયમ આયન (Ca²⁺) હૃદયના સંકોચન અને શિથિલતાને નિયંત્રિત કરે છે. તેની ઉણપથી સ્નાયુઓમાં અસાધારણ ખેંચાણ (ટેટની) થાય છે. સોડિયમ (Na⁺) અને પોટેશિયમ (K⁺) આયનો સ્નાયુ અને નાડી કોષોના વિધુત સંકેતો માટે જવાબદાર છે, પરંતુ ટેટની સાથે સીધો સંબંધ ધરાવતા નથી. મેગ્નેશિયમ (Mg²⁺) ઉત્સેચક ક્રિયાઓ અને ATP ની રચનામાં મહત્વની ભૂમિકા ભજવે છે, પરંતુ ટેટનીના લક્ષણો સાથે સીધો સંબંધ ધરાવતું નથી.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીર અને તેના કાર્ય - રક્ત", "difficulty": "Hard", "num": 11}, {"question": "રક્ત પ્લાઝ્મામાં રહેલા નીચેના પૈકી કયા ઘટકની સાંદ્રતા વ્યક્તિના જળવિભાજન સ્થિતિ અને રક્તદબાણને નિયંત્રિત કરવામાં મદદ કરે છે?", "options": ["A) ગ્લુકોઝ", "B) યુરિયા", "C) ક્લોરાઇડ આયન (Cl⁻)", "D) બાયકાર્બોનેટ આયન (HCO₃⁻)"], "correct": 2, "explanation": "ક્લોરાઇડ આયન (Cl⁻) જળવિભાજન સ્થિતિ અને રક્તદબાણને નિયંત્રિત કરવામાં મહત્વની ભૂમિકા ભજવે છે. ગ્લુકોઝ ઉર્જાનો સ્રોત છે, યુરિયા નાઇટ્રોજનયુક્ત કચરો છે, અને બાયકાર્બોનેટ આયન (HCO₃⁻) pH સંતુલનમાં મદદ કરે છે.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીર અને તેના કાર્ય - રક્ત", "difficulty": "Hard", "num": 12}, {"question": "પ્લાઝ્મામાં રહેલા નીચેના પૈકી કયા ઘટકની ઉણપથી રક્તમાં ઓક્સિજન વહનની ક્ષમતા ઘટે છે, પરંતુ તે હીમોગ્લોબિનના સંરચનાનો ભાગ નથી?", "options": ["A) લોહતત્વ (Fe)", "B) કોપર (Cu)", "C) જસત (Zn)", "D) મેગ્નેશિયમ (Mg)"], "correct": 0, "explanation": "લોહતત્વ (Fe) હીમોગ્લોબિનના સંરચનાનો મહત્વનો ભાગ છે અને તેની ઉણપથી રક્તમાં ઓક્સિજન વહનની ક્ષમતા ઘટે છે. કોપર (Cu), જસત (Zn), અને મેગ્નેશિયમ (Mg) હીમોગ્લોબિનના સંરચનાનો ભાગ નથી, પરંતુ તે અન્ય જૈવિક ક્રિયાઓમાં મહત્વની ભૂમિકા ભજવે છે.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીર અને તેના કાર્ય - રક્ત", "difficulty": "Hard", "num": 13}, {"question": "રક્ત પ્લાઝ્મામાં રહેલા નીચેના પૈકી કયા ઘટકની સાંદ્રતા અચાનક વધવાને કારણે રક્તવાહિનીઓની દિવાલો પર દબાણ વધે છે અને તેના કારણે રક્તચાપમાં વૃદ્ધિ થાય છે, પરંતુ આ ઘટકનું પ્રાથમિક કાર્ય રક્તના pH ને સ્થિર રાખવાનું છે?", "options": ["A) સોડિયમ ક્લોરાઇડ (NaCl)", "B) સોડિયમ બાયકાર્બોનેટ (NaHCO₃)", "C) પોટેશિયમ ક્લોરાઇડ (KCl)", "D) કેલ્શિયમ ક્લોરાઇડ (CaCl₂)"], "correct": 1, "explanation": "સોડિયમ બાયકાર્બોનેટ (NaHCO₃) રક્તના pH ને સ્થિર રાખવામાં મહત્વની ભૂમિકા ભજવે છે, પરંતુ જ્યારે તેની સાંદ્રતા અચાનક વધે છે, ત્યારે રક્તવાહિનીઓની દિવાલો પર ઓસ્મોટિક દબાણ વધે છે, જે રક્તચાપમાં વૃદ્ધિ તરફ દોરી જાય છે. સોડિયમ ક્લોરાઇડ (A) રક્તચાપને અસર કરે છે, પરંતુ તે pH નિયમનમાં મુખ્ય ભૂમિકા ભજવતું નથી. પોટેશિયમ ક્લોરાઇડ (C) અને કેલ્શિયમ ક્લોરાઇડ (D) રક્તચાપ પર અસર કરે છે, પરંતુ તેના પ્રાથમિક કાર્ય pH નિયમન નથી.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીરમાં વહન (Body Fluids and Circulation)", "difficulty": "Hard", "num": 14}, {"question": "રક્ત પ્લાઝ્મામાં રહેલા નીચેના પૈકી કયા પ્રોટીનનો સ્રાવ યકૃત દ્વારા થતો નથી, પરંતુ તે રક્ત ગંઠાવણ (Blood Clotting) પ્રક્રિયામાં મહત્વની ભૂમિકા ભજવે છે અને તેનો સ્રાવ પ્લાઝ્મામાં રહેલા અન્ય કોષો દ્વારા થાય છે?", "options": ["A) ફાઇબ્રિનોજન", "B) પ્રોથ્રોમ્બિન", "C) થ્રોમ્બોપ્લાસ્ટિન", "D) એલ્બ્યુમિન"], "correct": 2, "explanation": "થ્રોમ્બોપ્લાસ્ટિન (C) રક્ત ગંઠાવણ પ્રક્રિયામાં મહત ect": 0, "explanation": "આલ્બ્યુમિન પ્લાઝ્મામાં સૌથી વધુ પ્રમાણમાં રહેલું પ્રોટીન છે, જે રક્તના કોલોઇડલ ઓસ્મોટિક દબાણને જાળવવામાં મુખ્ય ભૂમિકા ભજવે છે. તેની સાંદ્રતા વધવાથી ઓસ્મોટિક દબાણ વધે છે, પરંતુ પ્રશ્નમાં સાંદ્રતા ઘટવાની સ્થિતિનું વર્ણન છે. આલ્બ્યુમિનની ઉણપથી રક્તવાહિનીઓમાંથી પ્રવાહીનું બહાર નીકળવું (એડીમા) વધે છે. ગ્લોબ્યુલિન પ્રતિરક્ષા માટે, ફાઇબ્રિનોજેન રક્ત ગંઠાવા માટે અને ગ્લુકોઝ ઉર્જા માટે જવાબદાર છે, પરંતુ ઓસ્મોટિક દબાણ પર તેમની અસર નહિવત્ છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 18: શરીર પ્રવાહીઓ અને પરિવહન", "difficulty": "Hard", "num": 18}, {"question": "એક દર્દીના રક્ત પ્લાઝ્મામાં કેલ્શિયમ આયન (Ca²⁺) ની સાંદ્રતા સામાન્ય કરતાં ઘણી ઓછી જોવા મળે છે. આ સ્થિતિમાં નીચેના પૈકી કયું કાર્ય સૌથી પહેલાં પ્રભાવિત થશે?", "options": ["A) રક્ત ગંઠાવાની પ્રક્રિયા", "B) ઓક્સિજનનું વહન", "C) કાર્બન ડાયોક્સાઇડનું વહન", "D) રક્તવાહિનીઓનું સંકોચન"], "correct": 0, "explanation": "કેલ્શિયમ આયન (Ca²⁺) રક્ત ગંઠાવાની પ્રક્રિયામાં મહત્ત્વપૂર્ણ ભૂમિકા ભજવે છે. તે પ્રોથ્રોમ્બિનને થ્રોમ્બિનમાં રૂપાંતરિત કરવામાં અને ફાઇબ્રિનોજેનને ફાઇબ્રિનમાં રૂપાંતરિત કરવામાં સહાયક છે. Ca²⁺ ની ઉણપથી રક્ત ગંઠાવાની પ્રક્રિયા સૌથી પહેલાં પ્રભાવિત થશે. ઓક્સિજન અને કાર્બન ડાયોક્સાઇડનું વહન મુખ્યત્વે હિમોગ્લોબિન દ્વારા થાય છે, જ્યારે રક્તવાહિનીઓનું સંકોચન મુખ્યત્વે સોડિયમ અને પોટેશિયમ આયન પર આધારિત છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 7: પ્રાણીઓમાં રચનાત્મક સંસ્થા, ક્લાસ XII - પ્રકરણ 18: શરીર પ્રવાહીઓ અને પરિવહન", "difficulty": "Hard", "num": 19}, {"question": "રક્ત પ્લાઝ્મામાં રહેલા નીચેના પૈકી કયા આયનની ઉણપથી સ્નાયુઓમાં ખેંચાણ થાય છે, પરંતુ તે હૃદયના ધબકારાને પ્રભાવિત કરતું નથી?", "options": ["A) કેલ્શિયમ આયન (Ca²⁺)", "B) પોટેશિયમ આયન (K⁺)", "C) મેગ્નેશિયમ આયન (Mg²⁺)", "D) ક્લોરાઇડ આયન (Cl⁻)"], "correct": 2, "explanation": "મેગ્નેશિયમ આયન (Mg²⁺)ની ઉણપથી સ્નાયુઓમાં ખેંચાણ થાય છે, પરંતુ તે હૃદયના ધબકારાને પ્રભાવિત કરતું નથી. કેલ્શિયમ આયન (Ca²⁺) હૃદય અને સ્નાયુઓના સંકોચનને પ્રભાવિત કરે છે, પોટેશિયમ આયન (K⁺) હૃદયના વિદ્યુત સંકેતોને નિયંત્રિત કરે છે, જ્યારે ક્લોરાઇડ આયન (Cl⁻) રક્તના pH સંતુલન અને ઓસ્મોટિક મેગ્નેશિયમ (Mg²⁺)"], "correct": 2, "explanation": "સી) કેલ્શિયમ (Ca²⁺) આયનની ઉણપથી સ્નાયુઓમાં ખેંચાણ (ટેટની) થાય છે, અને તે જ આયનની ઉણપથી હૃદયના ધબકારા અસાધારણ રીતે ધીમા પડી શકે છે. કેલ્શિયમ સ્નાયુ સંકોચન અને હૃદયના વિદ્યુત ચાલકતામાં મહત્વની ભૂમિકા ભજવે છે. અ) સોડિયમ (Na⁺)ની ઉણપથી સ્નાયુઓમાં ખેંચાણ થતું નથી, પરંતુ તે નસો અને સ્નાયુઓના વિદ્યુત સંકેતો માટે મહત્વનું છે. બ) પોટેશિયમ (K⁺)ની ઉણપથી સ્નાયુઓમાં નબળાઈ થાય છે, પરંતુ ખેંચાણ નહીં. ડ) મેગ્નેશિયમ (Mg²⁺)ની ઉણપથી સ્નાયુઓમાં ખેંચાણ થતું નથી, પરંતુ તે એટીપીના ઉત્પાદન અને સ્નાયુ શિથિલતામાં મહત્વનું છે.", "ncert_ref": "Class XI - Chapter 18: શરીર દ્રવ્યો અને પરિવહન", "difficulty": "Hard", "num": 28}, {"question": "એક દર્દીના રક્ત પ્લાઝ્મામાં બાયકાર્બોનેટ આયન (HCO₃⁻) ની સાંદ્રતા અચાનક ઘટી જાય છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું પરિણામ સૌથી વધુ સંભવિત છે, પરંતુ તેની સાથે સંકળાયેલી બીજી એક શારીરિક પ્રક્રિયા દ્વારા આંશિક રીતે સંતુલિત થઈ શકે છે?", "options": ["A) રક્તનું pH મૂલ્ય વધી જશે, જેને ફેફસાં દ્વારા CO₂ ના ઉત્સર્જનમાં વધારો કરીને સંતુલિત કરી શકાય છે", "B) રક્તનું pH મૂલ્ય ઘટી જશે, જેને મૂત્રપિંડ દ્વારા H⁺ આયનના ઉત્સર્જનમાં વધારો કરીને સંતુલિત કરી શકાય છે", "C) રક્તનું pH મૂલ્ય ઘટી જશે, જેને ફેફસાં દ્વારા CO₂ ના ઉત્સર્જનમાં ઘટાડો કરીને સંતુલિત કરી શકાય છે", "D) રક્તનું pH મૂલ્ય વધી જશે, જેને મૂત્રપિંડ દ્વારા HCO₃⁻ ના પુનઃશોષણમાં વધારો કરીને સંતુલિત કરી શકાય છે"], "correct": 2, "explanation": "બાયકાર્બોનેટ આયન (HCO₃⁻) એ રક્તમાં મુખ્ય બફર તંત્રનો ભાગ છે, જે રક્તના pH ને સંતુલિત રાખવામાં મદદ કરે છે. જ્યારે HCO₃⁻ ની સાંદ્રતા ઘટે છે, ત્યારે રક્તનું pH ઘટે છે (એસિડોસિસ). આ પરિસ્થિતિમાં, શરીર ફેફસાં દ્વારા CO₂ ના ઉત્સર્જનમાં ઘટાડો કરીને (શ્વાસ ધીમો કરીને) આંશિક રીતે સંતુલન લાવવાનો પ્રયાસ કરે છે, કારણ કે CO₂ નું પ્રમાણ વધવાથી કાર્બોનિક એસિડ (H₂CO₃) નું પ્રમાણ વધે છે, જે pH ઘટાડવામાં મદદ કરે છે. વિકલ્પ A અને D ખોટા છે કારણ કે pH વધતું નથી. વિકલ્પ B ખોટો છે કારણ કે મૂત્રપિંડ દ્વારા H⁺ આયનના ઉત્સર્જનમાં વધારો એસિડોસિસની સ્થિતિમાં મદદરૂપ નથી, કારણ કે તે વધુ એસિડ ઉત્પન્ન કરશે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 18: શરીર દ્રવ્યો અને પરિવહન", "difficulty": "Hard", "num": 29}, {"question": "રક્ત પ્લાઝ્મામાં રહેલા નીચેના પૈકી કયા ઘટકનું પ્રમાણ યકૃતના કાર્ય સાથે સીધું સંકળાયેલું નથી, પરંતુ તેનું પ્રમાણ રોગપ્રતિકારક તંત્રની પ્રતિક્રિયા દરમિયાન નોંધપાત્ર રીતે બદલાઈ શકે છે?", "options": ["A) આલ્બ્યુમિન - જે રક્તના કોલોઇડલ ઓસ્મોટિક દબાણને જાળવવામાં મદદ કરે છે", "B) ફાઇબ્રિનોજેન - જે રક્ત ગંઠાઈ જવાની પ્રક્રિયામાં મહત્ત્વનો ભાગ ભજવે છે", "C) ઇમ્યુનોગ્લોબ્યુલિન - જે રોગપ્રતિકારક તંત્ર દ્વારા ઉત્પન્ન થાય છે અને પ્રતિજનને નિષ્ક્રિય કરે છે", "D) પ્રોથ્રોમ્બિન - જે રક્ત ગંઠાઈ જવાની પ્રક્રિયામાં ઉત્સેચક તરીકે કાર્ય કરે છે"], "correct": 2, "explanation": "ઇમ્યુનોગ્લોબ્યુલિન (એન્ટિબોડીઝ) એ પ્લાઝ્માનું એક મહત્ત્વપૂર્ણ પ્રોટીન છે, જેનું ઉત્પાદન પ્લાઝ્મા કોષો (B-લિમ્ફોસાઇટ્સ) દ્વારા થાય છે, નહીં કે યકૃત દ્વારા. તે રોગપ્રતિકારક તંત્રની પ્રતિક્રિયા દરમિયાન પ્રતિજનને નિષ્ક્રિય કરવામાં મદદ કરે છે. વિકલ્પ A, B અને D ખોટા છે કારણ કે આલ્બ્યુમિન, ફાઇબ્રિનોજેન અને પ્રોથ્રોમ્બિન યકૃત દ્વારા સંશ્લેષિત થાય છે અને તેમનું પ્રમાણ યકૃતના કાર્ય સાથે સીધું સંકળાયેલું છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 18: શરીર દ્રવ્યો અને પરિવહન, કક્ષા 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 30}, {"question": "એક દર્દીના રક્ત પ્લાઝ્મામાં ક્લોરાઇડ આયન (Cl⁻) ની સાંદ્રતા અચાનક ઘટી જાય છે. આ પરિસ્થિતિમાં નીચેના પૈકી કયું પરિણામ સંભવિત નથી?", "options": ["A) રક્તનું pH સંતુલન ખોરવાય છે", "B) હૃદયના ધબકારા અનિયમિત થાય છે", "C) સ્નાયુઓમાં ખેંચાણ થાય છે", "D) રક્તનું કોલોઇડલ ઓસ્મોટિક દબાણ ઘટે છે"], "correct": 3, "explanation": "ક્લોરાઇડ આયન (Cl⁻) ની ઉણપથી રક્તનું pH સંતુલન ખોરવાય છે (કારણ કે તે બાયકાર્બોનેટ સાથે સંતુલન જાળવે છે), હૃદયના ધબકારા અનિયમિત થઈ શકે છે અને સ્નાયુઓમાં ખેંચાણ થઈ શકે છે. પરંતુ કોલોઇડલ ઓસ્મોટિક દબાણ મુખ્યત્વે આલ્બ્યુમિન જેવા પ્રોટીન દ્વારા નિયંત્રિત થાય છે, ક્લોરાઇડ આયનથી નહીં.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 18: શરીર દ્રવ્યો અને પરિવહન", "difficulty": "Hard", "num": 31}, {"question": "રક્ત પ્લાઝ્મામાં રહેલા નીચેના પૈકી કયા ઘટકનું પ્રમાણ રક્તમાં કાર્બન ડાયોક્સાઇડના વહન સાથે સીધું સંબંધિત નથી, પરંતુ તેનું પ્રમાણ રક્તના pH ના નિયમનમાં મહત્ત્વપૂર્ણ ભૂમિકા ભજવે છે?", "options": ["A) બાયકાર્બોનેટ આયન (HCO₃⁻)", "B) હિમોગ્લોબિન", "C) ફોસ્ફેટ બફર", "D) કાર્બોનિક એનહાઇડ્રેઝ ઉત્સેચક"], "correct": 2, "explanation": "ફોસ્ફેટ બફર રક્તના pH ના નિયમનમાં મદદ કરે છે, પરંતુ તે કાર્બન ડાયોક્સાઇડના વહન સાથે સીધું સંબંધિત નથી. બાયકાર્બોનેટ આયન, હિમોગ્લોબિન અને કાર્બોનિક એનહાઇડ્રેઝ ઉત્સેચક કાર્બન ડાયોક્સાઇડના વહનમાં સીધી ભૂમિકા ભજવે છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 14: શ્વસન અને વાયુઓનું વિનિમય", "difficulty": "Hard", "num": 32}, {"question": "નીચેના પૈકી કયું વિધાન રક્ત પ્લાઝ્મામાં રહેલા ફાઇબ્રિનોજેન પ્રોટીન માટે ખોટું છે?", "options": ["A) તે યકૃત દ્વારા સંશ્લેષિત થાય છે", "B) તે રક્ત ગંઠાઈ જવાની પ્રક્રિયામાં મુખ્ય ભૂમિકા ભજવે છે", "C) તે રક્તના કોલોઇડલ ઓસ્મોટિક દબાણના નિયમનમાં મદદ કરે છે", "D) તેની ઉણપથી રક્તસ્ત્રાવની સમસ્યા થઈ શકે છે"], "correct": 2, "explanation": "ફાઇબ્રિનોજેન યકૃત દ્વારા સંશ્લેષિત થાય છે અને રક્ત ગંઠાઈ જવાની પ્રક્રિયામાં મુખ્ય ભૂમિકા ભજવે છે. તેની ઉણપથી રક્તસ્ત્રાવની સમસ્યા થઈ શકે છે. પરંતુ રક્તના કોલોઇડલ ઓસ્મોટિક દબાણના નિયમનમાં મુખ્યત્વે આલ્બ્યુમિન પ્રોટીન ભૂમિકા ભજવે છે, ફાઇબ્રિનોજેન નહીં.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 18: શરીર દ્રવ્યો અને પરિવહન", "difficulty": "Hard", "num": 33}, {"question": "એક દર્દીના રક્ત પ્લાઝ્મામાં સોડિયમ આયન (Na⁺) ની સાંદ્રતા અચાનક વધી જાય છે. આ પરિસ્થિતિમાં નીચેના પૈકી કયું પરિણામ સંભવિત નથી?", "options": ["A) રક્તનું ઓસ્મોટિક દબાણ વધે છે", "B) રક્તવાહિનીઓની દીવાલો પર દબાણ વધે છે", "C) કોષોમાંથી પાણી બહાર નીકળે છે", "D) રક્તમાં કાર્બન ડાયોક્સાઇડનું વહન ઘટે છે"], "correct": 3, "explanation": "સોડિયમ આયનની સાંદ્રતા વધવાથી રક્તનું ઓસ્મોટિક દબાણ વધે છે, રક્તવાહિનીઓની દીવાલો પર દબાણ વધે છે અને કોષોમાંથી પાણી બહાર નીકળે છે. પરંતુ કાર્બન ડાયોક્સાઇડનું વહન મુખ્યત્વે બાયકાર્બોનેટ આયન અને હિમોગ્લોબિન દ્વારા થાય છે, જે સોડિયમ આયનની સાંદ્રતાથી સીધું પ્રભાવિત થતું નથી.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 18: શરીર દ્રવ્યો અને પરિવહન", "difficulty": "Hard", "num": 34}, {"question": "નીચેના પૈકી કયું વિધાન પ્લાઝ્માની રચના અને કાર્ય વિશે સ         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];

                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
