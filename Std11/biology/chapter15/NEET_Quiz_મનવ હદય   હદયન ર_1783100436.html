<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - માનવ હૃદય – હૃદયની રચના અને ભાગો.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 માનવ હૃદય – હૃદયની રચના અને ભાગો.</span>
                <span>🎯 Hard</span>
                <span>📝 50 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "માનવ હૃદયના કયા ભાગમાં ઓક્સિજનયુક્ત રક્ત અને ઓક્સિજનવિહીન રક્તનું મિશ્રણ થાય છે?", "options": ["A) ડાબા આલિંદ અને ડાબા કર્ણિકા", "B) જમણા આલિંદ અને જમણા કર્ણિકા", "C) ડાબા કર્ણિકા અને જમણા કર્ણિકા", "D) હૃદયના કોઈપણ ભાગમાં મિશ્રણ થતું નથી"], "correct": 3, "explanation": "માનવ હૃદયમાં ઓક્સિજનયુક્ત અને ઓક્સિજનવિહીન રક્તનું મિશ્રણ થતું નથી. ડાબા ભાગમાં માત્ર ઓક્સિજનયુક્ત રક્ત અને જમણા ભાગમાં માત્ર ઓક્સિજનવિહીન રક્ત વહે છે. આમ, હૃદયના કોઈપણ ભાગમાં રક્તનું મિશ્રણ થતું નથી. A, B, અને C પર્યાયો ખોટા છે કારણ કે તેઓ મિશ્રણની શક્યતા સૂચવે છે, જે વાસ્તવિકતાને અનુરૂપ નથી.", "ncert_ref": "Class XI - પ્રકરણ ૧૮: શરીર અને તેના તંત્રો (Body Fluids and Circulation)", "difficulty": "Hard", "num": 1}, {"question": "હૃદયના કયા ભાગમાં સાયનોસાઇડલ નોડ (SA Node) આવેલો છે?", "options": ["A) ડાબા આલિંદ", "B) જમણા આલિંદ", "C) ડાબા કર્ણિકા", "D) જમણા કર્ણિકા"], "correct": 1, "explanation": "સાયનોસાઇડલ નોડ (SA Node) હૃદયના જમણા આલિંદમાં આવેલો છે. આ નોડ હૃદયના સ્પંદનનો પ્રારંભ બિંદુ છે અને તે હૃદયના સંકોચનને નિયંત્રિત કરે છે. A, C, અને D પર્યાયો ખોટા છે કારણ કે SA Node આ ભાગોમાં આવેલો નથી.", "ncert_ref": "Class XI - પ્રકરણ ૧૮: શરીર અને તેના તંત્રો (Body Fluids and Circulation)", "difficulty": "Hard", "num": 2}, {"question": "માનવ હૃદયના કયા વાલ્વમાં ત્રણ પર્ણક (cusps) હોય છે?", "options": ["A) મિત્રલ વાલ્વ", "B) ટ્રાયકસ્પિડ વાલ્વ", "C) એઓર્ટિક વાલ્વ", "D) પલ્મોનરી વાલ્વ"], "correct": 2, "explanation": "એઓર્ટિક વાલ્વ અને પલ્મોનરી વાલ્વમાં ત્રણ પર્ણક (cusps) હોય છે. મિત્રલ વાલ્વ અને ટ્રાયકસ્પિડ વાલ્વમાં બે પર્ણક હોય છે. આમ, A અને B ખોટા છે કારણ કે તેઓ બે પર્ણક ધરાવે છે, જ્યારે D પણ ત્રણ પર્ણક ધરાવે છે પરંતુ પ્રશ્નમાં એઓર્ટિક વાલ્વ જ સૌથી યોગ્ય ઉત્તર છે.", "ncert_ref": "Class XI - પ્રકરણ ૧૮: શરીર અને તેના તંત્રો (Body Fluids and Circulation)", "difficulty": "Hard", "num": 3}, {"question": "હૃદયના કયા ભાગમાં રક્તનું દબાણ સૌથી ઓછું હોય છે?", "options": ["A) એઓર્ટા", "B) પલ્મોનરી ધમની", "C) ડાબા કર્ણિકા", "D) જમણા કર્ણિકા"], "correct": 3, "explanation": "હૃદયના જમણા કર્ણિકામાં રક્તનું દબાણ સૌથી ઓછું હોય છે કારણ કે તે ઓક્સિજનવિહીન રક્તને ફેફસાં તરફ વહન કરે છે. એઓર્ટા (A) અને પલ્મોનરી ધમની (B)માં દબાણ વધુ હોય છે, જ્યારે ડાબા કર્ણિકા (C)માં દબાણ જમણા કર્ણિકા કરતાં વધુ હોય છે.", "ncert_ref": "Class XI - પ્રકરણ ૧૮: શરીર અને તેના તંત્રો (Body Fluids and Circulation)", "difficulty": "Hard", "num": 4}, {"question": "માનવ હૃદયમાં કયા ભાગ દ્વારા રક્ત ફેફસાંમાં પહોંચે છે?", "options": ["A) એઓર્ટા", "B) પલ્મોનરી ધમની", "C) પલ્મોનરી શિરા", "D) કોરોનરી ધમની"], "correct": 1, "explanation": "પલ્મોનરી ધમની દ્વારા રક્ત હૃદયમાંથી ફેફસાંમાં પહોંચે છે. એઓર્ટા (A) દ્વારા રક્ત શરીરના અન્ય ભાગોમાં પહોંચે છે, પલ્મોનરી શિરા (C) દ્વારા રક્ત ફેફસાંમાંથી હૃદયમાં પરત ફરે છે, અને કોરોનરી ધમની (D) હૃદયને રક્ત પૂરું પાડે છે.", "ncert_ref": "Class XI - પ્રકરણ ૧૮: શરીર અને તેના તંત્રો (Body Fluids and Circulation)", "difficulty": "Hard", "num": 5}, {"question": "માનવ હૃદયમાં 'માયોકાર્ડિયમ' પેશી વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) તે એકપેશીય સ્નાયુ પેશી છે જે હૃદયના આંતરિક સ્તરને આવરી લે છે.", "B) તે અનૈચ્છિક, રેખિત સ્નાયુ પેશી છે જે હૃદયના મધ્ય સ્તરને બનાવે છે.", "C) તે સ્વયં-ઉત્તેજિત થવાની ક્ષમતા ધરાવતી અરેખિત સ્નાયુ પેશી છે.", "D) તે હૃદયના બાહ્ય સ્તરને બનાવે છે અને સંકોચન માટે આધાર પૂરો પાડે છે."], "correct": 2, "explanation": "માયોકાર્ડિયમ હૃદયનું મધ્ય સ્તર છે અને તે અરેખિત, અનૈચ્છિક સ્નાયુ પેશી છે જે સ્વયં-ઉત્તેજિત થવાની ક્ષમતા ધરાવે છે. A) ખોટું છે કારણ કે માયોકાર્ડિયમ આંતરિક સ્તર (એન્ડોકાર્ડિયમ) નહીં પરંતુ મધ્ય સ્તર છે. B) ખોટું છે કારણ કે માયોકાર્ડિયમ રેખિત નથી. D) ખોટું છે કારણ કે બાહ્ય સ્તર એપીકાર્ડિયમ છે.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીરમાં પરિવહન", "difficulty": "Hard", "num": 6}, {"question": "હૃદયના કયા ભાગમાં 'ટ્રેબિક્યુલી કાર્ની' જોવા મળે છે અને તેનો મુખ્ય કાર્ય શો છે?", "options": ["A) ડાબા એટ્રિયમમાં, રક્તને વહન કરવામાં મદદ કરવા માટે.", "B) જમણા એટ્રિયમમાં, એટ્રિયલ સંકોચન દરમિયાન રક્તને વેગ આપવા માટે.", "C) ડાબા વેન્ટ્રિકલમાં, વાલ્વને સ્થિર રાખવા માટે.", "D) જમણા વેન્ટ્રિકલમાં, રક્તને પલ્મોનરી ધમની તરફ દિશા on": "ઇસોવોલ્યુમેટ્રિક કંપન વેન્ટ્રિક્યુલર સિસ્ટોલના પ્રારંભમાં થાય છે, જ્યારે વેન્ટ્રિકલના દબાણમાં વૃદ્ધિ થાય છે પરંતુ વાલ્વ ખુલતા નથી, જેથી રક્તનો પ્રવાહ થતો નથી. આ દરમિયાન વેન્ટ્રિકલનો કદ સ્થિર રહે છે. બાકીના વિકલ્પો અસત્ય છે કારણ કે: A) એટ્રિયલ સિસ્ટોલ દરમિયાન ઇસોવોલ્યુમેટ્રિક કંપન થતું નથી, B) વેન્ટ્રિક્યુલર ડાયસ્ટોલના પ્રારંભમાં ઇસોવોલ્યુમેટ્રિક કંપન થતું નથી, અને D) એટ્રિયલ ડાયસ્ટોલ દરમિયાન ઇસોવોલ્યુમેટ્રિક કંપન થતું નથી.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીરમાં પરિવહન", "difficulty": "Hard", "num": 13}, {"question": "હૃદયના કયા ભાગમાં 'સાયનોસાઇડલ નોડ' (SA Node) દ્વારા ઉત્પન્ન થતી તરંગો સૌપ્રથમ પહોંચે છે?", "options": ["A) એવી નોડ (AV Node)", "B) બંડલ ઓફ હિસ", "C) પર્કિન્જી તંતુઓ", "D) બચ્ચમેનના બંડલ"], "correct": 0, "explanation": "SA Node દ્વારા ઉત્પન્ન થતી વિદ્યુત તરંગો સૌપ્રથમ એવી નોડ (AV Node)માં પહોંચે છે, જ્યાંથી તે આગળ બંડલ ઓફ હિસ અને પર્કિન્જી તંતુઓ દ્વારા હૃદયના અન્ય ભાગોમાં પહોંચે છે. બાકીના વિકલ્પો અસત્ય છે કારણ કે: B) બંડલ ઓફ હિસ પછી આવે છે, C) પર્કિન્જી તંતુઓ એવી નોડ પછી આવે છે, અને D) બચ્ચમેનના બંડલ હૃદયના વાલ્વ સાથે સંબંધિત છે, વિદ્યુત તરંગોના પ્રસારણ સાથે નહીં.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીરમાં પરિવહન", "difficulty": "Hard", "num": 14}, {"question": "માનવ હૃદયમાં, 'ટેથરડ કોર્ડી' નો મુખ્ય કાર્ય શો છે?", "options": ["A) એટ્રિયમ અને વેન્ટ્રિકલ વચ્ચેના વાલ્વને ખુલ્લા રાખવા", "B) વાલ્વના પર્ણકોને વેન્ટ્રિકલની દીવાલ સાથે જોડવા અને રક્તના પ્રવાહને એકદિશાત્મક રાખવા", "C) હૃદયના સંકોચન દરમિયાન વાલ્વને બંધ રાખવા", "D) હૃદયના વાલ્વના કદને નિયંત્રિત કરવા"], "correct": 1, "explanation": "ટેથરડ કોર્ડી (Chordae tendineae) વાલ્વના પર્ણકોને વેન્ટ્રિકલની દીવાલ સાથે જોડે છે અને રક્તના પ્રવાહને એકદિશાત્મક રાખવામાં મદદ કરે છે, જેથી રક્ત એટ્રિયમમાં પરત ન જાય. બાકીના વિકલ્પો અસત્ય છે કારણ કે: A) તે વાલ્વને ખુલ્લા રાખવા માટે નથી, C) તે વાલ્વને બંધ રાખવા માટે નથી, અને D) તે વાલ્વના કદને નિયંત્રિત કરવા માટે નથી.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીરમાં પરિવહન", "difficulty": "Hard", "num": 15}, {"question": "માનવ હૃદયના જમણા આલિંદમાં રહેલા રક્ત વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) તે ઓક્સિજનયુક્ત હોય છે અને ફેફસાં તરફ વહન પામે છે", "B) તે ઓક્સિજનવિહીન હોય છે અને ફેફસાં તરફ વહન પામે છે", "C) તે ઓક્સિજનયુક્ત હોય છે અને શરીરના અન્ય ભાગો તરફ વહન પામે છે", "D) તે ઓક્સિજનવિહીન હોય છે અને શરીરના અન્ય ભાગો તરફ વહન પામે છે"], "correct": 1, "explanation": "જમણા આલિંદમાં રહેલું રક્ત ઓક્સિજનવિહીન (ડી-ઓક્સિજનેટેડ) હોય છે અને તે પલ્મોનરી ધમની દ્વારા ફેફસાં તરફ વહન પામે છે. A) ખોટું છે કારણ કે રક્ત ઓક્સિજનયુક્ત નથી. C) ખોટું છે કારણ કે ઓક્સિજનયુક્ત રક્ત ડાબા આલિંદમાં હોય છે. D) ખોટું છે કારણ કે ઓક્સિજનવિહીન રક્ત શરીરના અન્ય ભાગો તરફ વહન પામતું નથી.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીરમાં પરિવહન", "difficulty": "Hard", "num": 16}, {"question": "માનવ હૃદયના 'ઇન્ટરવેન્ટ્રિક્યુલર સેપ્ટમ' વિશે નીચેનામાંથી કયું વિધાન અસત્ય છે?", "options": ["A) તે જમણા અને ડાબા વેન્ટ્રિકલને અલગ પાડે છે", "B) તે હૃદયના સૌથી જાડા ભાગમાંનો એક છે", "C) તે હૃદયના ઉચ્ચ દબાણવાળા ભાગોને અલગ પાડે છે", "D) તે હૃદયના આલિંદોને અલગ પાડે છે"], "correct": 3, "explanation": "ઇન્ટરવેન્ટ્રિક્યુલર સેપ્ટમ જમણા અને ડાબા વેન્ટ્રિકલને અલગ પાડે છે, હૃદયના સૌથી જાડા ભાગમાંનો એક છે અને ઉચ્ચ દબાણવાળા ભાગોને અલગ પાડે છે. D) ખોટું છે કારણ કે આલિંદોને અલગ પાડતું સેપ્ટમ 'ઇન્ટરએટ્રિયલ સેપ્ટમ' કહેવાય છે.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીરમાં પરિવહન", "difficulty": "Hard", "num": 17}, {"question": "માનવ હૃદયમાં 'પલ્મોનરી વાલ્વ' અને 'એઓર્ટિક વાલ્વ' વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) બંને ત્રણ પર્ણક ધરાવે છે અને રક્તને હૃદયમાંથી બહાર જવા દે છે", "B) પલ્મોનરી વાલ્વ બે પર્ણક ધરાવે છે જ્યારે એઓર્ટિક વાલ્વ ત્રણ પર્ણક ધરાવે છે", "C) પલ્મોનરી વાલ્વ રક્તને હૃદયમાં પ્રવેશવા દે છે જ્યારે એઓર્ટિક વાલ્વ રક્તને બહાર જવા દે છે", "D) બંને વાલ્વ હૃદયના આલિંદ અને વેન્ટ્રિકલ વચ્ચે આવેલા છે"], "correct": 0, "explanation": "પલ્મોનરી વાલ્વ અને એઓર્ટિક વાલ્વ બંને ત્રણ પર્ણક ધરાવે છે અને રક્તને હૃદયમાંથી બહાર (પલ્મોનરી ધમની અને એઓર્ટા તરફ) જવા દે છે. B) ખોટું છે કારણ કે બંને ત્રણ પર્ણક ધરાવે છે. C) ખોટું છે કારણ કે બંને વાલ્વ રક્તને હૃદયમાંથી બહાર જવા દે છે. D) ખોટું છે કારણ કે આ વાલ્વ વેન્ટ્રિકલ અને ધમનીઓ વચ્ચે આવેલા છે.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીરમાં પરિવહન", "difficulty": "Hard", "num": 18}, {"question": "માનવ હૃદયના 'કોરોનરી ધમનીઓ' વિશે નીચેનામાંથી કયું વિધાન અસત્ય છે?", "options": ["A) તે હૃદયની પેશીઓને ઓક્સિજનયુક્ત રક્ત પૂરું પાડે છે", "B) તે એઓર્ટાના આરંભથી નીકળે છે", "C) તે હૃદયના ડાબા આલિંદમાંથી નીકળે છે", "D) તે હૃદયના માયોકાર્ડિયમને પોષણ પૂરું પાડે છે"], "correct": 2, "explanation": "કોરોનરી ધમનીઓ હૃદયની પેશીઓને ઓક્સિજનયુક્ત રક્ત પૂરું પાડે છે, એઓર્ટાના આરંભથી નીકળે છે અને માયોકાર્ડિયમને પોષણ પૂરું પાડે છે. C) ખોટું છે કારણ કે કોરોનરી ધમનીઓ એઓર્ટાના આરંભથી નીકળે છે, ન કે ડાબા આલિંદમાંથી.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીરમાં પરિવહન", "difficulty": "Hard", "num": 19}, {"question": "માનવ હૃદયના 'ફંક્શનલ સિસ્ટોલ' દરમિયાન નીચેનામાંથી કયું પગલું થતું નથી?", "options": ["A) આલિંદોનો સંકોચન", "B) વેન્ટ્રિકલનો સંકોચન", "C) વાલ્વનું બંધ થવું", "D) રક્તનું હૃદયમાં પ્રવેશવું"], "correct": 3, "explanation": "ફંક્શનલ સિસ્ટોલ દરમિયાન આલિંદો અને વેન્ટ્રિકલનો સંકોચન થાય છે અને વાલ્વ બંધ થાય છે. D) ખોટું છે કારણ કે રક્તનું હૃદયમાં પ્રવેશવું 'ડાયસ્ટોલ' દરમિયાન થાય છે, ન કે સિસ્ટોલ દરમિયાન.", "ncert_ref": "Class XI - પ્રકરણ 18: શરીરમાં પરિવહન", "difficulty": "Hard", "num": 20}, {"question": "માનવ હૃદયમાં 'ક્રિસ્ટા ટર્મિનાલિસ' નીચેનામાંથી ક્યાં આવેલી છે અને તેનો મુખ્ય કાર્ય શો છે?", "options": ["A) જમણા આલિંદમાં, SA નોડને AV નોડ સાથે જોડવો", "B) ડાબા આલિંદમાં, રક્તના પ્રવાહને નિયંત્રિત કરવો", "C) જમણા કર્ણકમાં, આલિંદના સંકોચન દરમિયાન રક્તને દિશા આપવી", "D) ડાબા કર્ણકમાં, વાલ્વની ક્રિયાને સહાય કરવી"], "correct": 0, "explanation": "ક્રિસ્ટા ટર્મિનાલિસ જમણા આલિંદમાં આવેલી છે અને તે SA નોડ (સાયનોએટ્રિયલ નોડ) ને AV નોડ (એટ્રિયોવેન્ટ્રિક્યુલર નોડ) સાથે જોડે છે, જે હૃદયના વિદ્યુત ચાલકતામાં મહત્વની ભૂમિકા ભજવે છે. બાકીના વિકલ્પો અસત્ય છે કારણ કે ક્રિસ્ટા ટર્મિનાલિસ ડાબા આલિંદ, જમણા કર્ણક અથવા ડાબા કર્ણકમાં આવેલી નથી, અને તેનો સીધો સંબંધ વાલ્વ અથવા રક્તપ્રવાહ નિયંત્રણ સાથે નથી.", "ncert_ref": "Class XI - Chapter 18: શરીરમાં પરિવહન", "difficulty": "Hard", "num": 21}, {"question": "માનવ હૃદયમાં 'સેમિલ્યુનાર વાલ્વ' વિશે નીચેનામાંથી કયું વિધાન અસત્ય છે?", "options": ["A) તે પલ્મોનરી ધમની અને એઓર્ટામાં જોવા મળે છે", "B) તે ત્રણ પર્ણક (કસ્પ્સ) ધરાવે છે", "C) તે આલિંદ અને કર્ણક વચ્ચે આવેલો છે", "D) તે રક્તના પાછા પ્રવાહને અટકાવે છે"], "correct": 2, "explanation": "સેમિલ્યુનાર વાલ્વ પલ્મોનરી ધમની અને એઓર્ટામાં આવેલો છે, ત્રણ પર્ણક ધરાવે છે, અને રક્તના પાછા પ્રવાહને અટકાવે છે. પરંતુ તે આલિંદ અને કર્ણક વચ્ચે આવેલો નથી, પરંતુ કર્ણક અને ધમની વચ્ચે આવેલો છે. આથી વિકલ્પ C અસત્ય છે.", "ncert_ref": "Class XI - Chapter 18: શરીરમાં પરિવહન", "difficulty": "Hard", "num": 22}, {"question": "માનવ હૃદયના 'પર્કિનજી ફાયબર' વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) તે હૃદયના આલિંદોમાં આવેલા છે અને SA નોડ દ્વારા ઉત્પન્ન થતી વિદ્યુત લહેરોને વહન કરે છે", "B) તે હૃદયના કર્ણકોમાં આવેલા છે અને AV નોડ દ્વારા ઉત્પન્ન થતી વિદ્યુત લહેરોને વહન કરે છે", "C) તે હૃદયના આલિંદ અને કર્ણક વચ્ચે આવેલા છે અને વિદ્યુત લહેરોને ધીમી પાડે છે", "D) તે હૃદયના બહાર આવેલા છે અને હૃદયના સંકોચનને નિયંત્રિત કરે છે"], "correct": 1, "explanation": "પર્કિનજી ફાયબર હૃદયના કર્ણકોમાં આવેલા છે અને AV નોડ દ્વારા ઉત્પન્ન થતી વિદ્યુત લહેરોને કર્ણકની પેશીઓ સુધી વહન કરે છે. SA નોડ આલિંદોમાં આવેલો છે, અને પર્કિનજી ફાયબર આલિંદોમાં આવેલા નથી. વિકલ્પ C અને D પણ અસત્ય છે કારણ કે પર્કિનજી ફાયબર આલિંદ અને કર્ણક વચ્ચે આવેલા નથી અને હૃદયના બહાર પણ આવેલા નથી.", "ncert_ref": "Class XI - Chapter 18: શરીરમાં પરિવહન", "difficulty": "Hard", "num": 23}, {"question": "માનવ હૃદયમાં 'ઇન્ટરકેલેટેડ ડિસ્ક' વિશે નીચેનામાંથી કયું વિધાન અસત્ય છે?", "options": ["A) તે હૃદયની પેશીઓને એકબીજા સાથે જોડે છે", "B) તે હૃદયની પેશીઓમાં વિદ્યુત સંકેતોના વહનને સરળ બનાવે છે", "C) તે હૃદયના આલિંદ અને કર્ણક વચ્ચે આવેલા છે", "D) તે હૃદયના કોષો વચ્ચેના જોડાણને મજબૂત બનાવે છે"], "correct": 2, "explanation": "ઇન્ટરકેલેટેડ ડિસ્ક હૃદયની પેશીઓને એકબીજા સાથે જોડે છે, વિદ્યુત સંકેતોના વહનને સરળ બનાવે છે, અને હૃદયના કોષો વચ્ચેના જોડાણને મજબૂત બનાવે છે. પરંતુ તે હૃદયના આલ ીના મૂળને ઘેરે છે. તે પલ્મોનરી વાલ્વના સ્થાનને ચિહ્નિત કરે છે. બાકીના વિકલ્પો અસત્ય છે: B) કોનસ એર્ટેરિયોસસ ડાબા કક્ષમાં નથી, C) તે જમણા આલિંદમાં નથી, અને D) તે ઇન્ટરવેન્ટ્રિક્યુલર સેપ્ટમ પર નથી.", "ncert_ref": "Class XI - Chapter 18: શરીરમાં પરિવહન (Body Fluids and Circulation)", "difficulty": "Hard", "num": 36}, {"question": "માનવ હૃદયમાં 'સિનુસ ટાયમ્પેની' વિશે નીચેનામાંથી કયું વિધાન અસત્ય છે?", "options": ["A) તે જમણા આલિંદના ભિત્તર પાસે આવેલો છે.", "B) તે ગર્ભાવસ્થામાં રક્ત પરિભ્રમણ માટે મહત્વનો ભાગ ભજવે છે.", "C) તે જન્મ પછી બંધ થઈ જાય છે અને 'ફોસા ઓવેલિસ' તરીકે ઓળખાય છે.", "D) તે ડાબા આલિંદ અને જમણા આલિંદ વચ્ચેના ભાગમાં આવેલો છે."], "correct": 3, "explanation": "સિનુસ ટાયમ્પેની જમણા આલિંદના ભિત્તર પાસે આવેલો છે અને ગર્ભાવસ્થામાં રક્ત પરિભ્રમણ માટે મહત્વનો ભાગ ભજવે છે. જન્મ પછી તે બંધ થઈ જાય છે અને 'ફોસા ઓવેલિસ' તરીકે ઓળખાય છે. પરંતુ તે ડાબા આલિંદ અને જમણા આલિંદ વચ્ચેના ભાગમાં નથી આવેલો, એટલે કે વિકલ્પ D અસત્ય છે.", "ncert_ref": "Class XI - Chapter 18: શરીરમાં પરિવહન (Body Fluids and Circulation)", "difficulty": "Hard", "num": 37}, {"question": "માનવ હૃદયમાં 'ટેથરડ કોર્ડી' અને 'પેપિલરી મસલ્સ' વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) ટેથરડ કોર્ડી એવી રચના છે જે આલિંદ અને કક્ષ વચ્ચે રક્તના પ્રવાહને રોકે છે.", "B) પેપિલરી મસલ્સ જમણા આલિંદમાં આવેલા છે અને ટ્રાયકસ્પિડ વાલ્વને ટેકો આપે છે.", "C) ટેથરડ કોર્ડી અને પેપિલરી મસલ્સ બંને કક્ષમાં આવેલા છે અને એટ્રિયોવેન્ટ્રિક્યુલર વાલ્વને ટેકો આપે છે.", "D) પેપિલરી મસલ્સ ડાબા કક્ષમાં આવેલા છે અને એઓર્ટિક વાલ્વને ટેકો આપે છે."], "correct": 2, "explanation": "ટેથરડ કોર્ડી અને પેપિલરી મસલ્સ બંને કક્ષમાં આવેલા છે અને એટ્રિયોવેન્ટ્રિક્યુલર વાલ્વ (ટ્રાયકસ્પિડ અને બાયકસ્પિડ)ને ટેકો આપે છે. A) ટેથરડ કોર્ડી આલિંદ અને કક્ષ વચ્ચે રક્તના પ્રવાહને રોકતી નથી, B) પેપિલરી મસલ્સ જમણા આલિંદમાં નથી, અને D) પેપિલરી મસલ્સ એઓર્ટિક વાલ્વને ટેકો નથી આપતી.", "ncert_ref": "Class XI - Chapter 18: શરીરમાં પરિવહન (Body Fluids and Circulation)", "difficulty": "Hard", "num": 38}, {"question": "માનવ હૃદયના 'ઇન્ટરકેલેટેડ ડિસ્ક' વિશે નીચેનામાંથી કયું વિધાન અસત્ય છે?", "options": ["A) તે હૃદયની પેશીઓને એકબીજા સાથે જોડે છે અને યાંત્રિક બળ પ્રદાન કરે છે.", "B) તે હૃદયના કોષો વચ્ચે વિદ્યુત સંકેતોના વહનમાં મદદ કરે છે.", "C) તે હૃદયના આલિંદ અને કક્ષ વચ્ચે આવેલો છે.", "D) તે હૃદયની પેશીઓને એકસમાન દિશામાં સંકોચન કરવામાં મદદ કરે છે."], "correct": 2, "explanation": "ઇન્ટરકેલેટેડ ડિસ્ક હૃદયની પેશીઓને એકબીજા સાથે જોડે છે, યાંત્રિક બળ પ્રદાન કરે છે, અને વિદ્યુત સંકેતોના વહનમાં મદદ કરે છે. તે હૃદયના કોષોને એકસમાન દિશામાં સંકોચન કરવામાં પણ મદદ કરે છે. પરંતુ તે હૃદયના આલિંદ અને કક્ષ વચ્ચે આવેલો નથી, એટલે કે વિકલ્પ C અસત્ય છે.", "ncert_ref": "Class XI - Chapter 18: શરીરમાં પરિવહન (Body Fluids and Circulation)", "difficulty": "Hard", "num": 39}, {"question": "માનવ હૃદયમાં 'ફંક્શનલ મર્મર' ક્યારે સાંભળી શકાય છે અને તેનો મુખ્ય કારણ શો છે?", "options": ["A) હૃદયના સિસ્ટોલ દરમિયાન, જ્યારે એટ્રિયોવેન્ટ્રિક્યુલર વાલ્વ બંધ થાય છે.", "B) હૃદયના ડાયસ્ટોલ દરમિયાન, જ્યારે સેમિલ્યુનાર વાલ્વ ખુલે છે.", "C) હૃદયના સિસ્ટોલ દરમિયાન, જ્યારે સેમિલ્યુનાર વાલ્વ ખુલે છે અને રક્તના પ્રવાહમાં અડચણ ઉત્પન્ન થાય છે.", "D) હૃદયના ડાયસ્ટોલ દરમિયાન, જ્યારે એટ્રિયોવેન્ટ્રિક્યુલર વાલ્વ ખુલે છે."], "correct": 2, "explanation": "ફંક્શનલ મર્મર હૃદયના સિસ્ટોલ દરમિયાન સાંભળી શકાય છે, જ્યારે સેમિલ્યુનાર વાલ્વ (પલ્મોનરી અને એઓર્ટિક) ખુલે છે અને રક્તના પ્રવાહમાં અડચણ ઉત્પન્ન થાય છે. બાકીના વિકલ્પો અસત્ય છે: A) એટ્રિયોવેન્ટ્રિક્યુલર વાલ્વ બંધ થતી વખતે મર્મર સાંભળી શકાતું નથી, B) ડાયસ્ટોલ દરમિયાન સેમિલ્યુનાર વાલ્વ બંધ હોય છે, અને D) ડાયસ્ટોલ દરમિયાન એટ્રિયોવેન્ટ્રિક્યુલર વાલ્વ ખુલે છે પરંતુ મર્મર સાંભળી શકાતું નથી.", "ncert_ref": "Class XI - Chapter 18: શરીરમાં પરિવહન (Body Fluids and Circulation)", "difficulty": "Hard", "num": 40}, {"question": "માનવ હૃદયના જમણા આલિંદમાં આવેલી 'પેક્ટિનેટ મસલ્સ' વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) તે હૃદયના ડાબા આલિંદમાં પણ જોવા મળે છે અને તેના કારણે આલિંદની દીવાલ ખૂબ જ જાડી હોય છે.", "B) તે જમણા આલિંદની અંદરની દીવાલ પર આવેલી હોય છે અને રક્તને આલિંદમાંથી કક્ષ તરફ ધકેલવા મદદ કરે છે.", "C) તે હૃદયના કક્ષોમાં જોવા             document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
