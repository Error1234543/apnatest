    <style>

    <script>

રે માતાના શરીરમાં Rh એન્ટિબોડીઝ વિકસે છે. આ એન્ટિબોડીઝ પ્રથમ ગર્ભધારણ દરમિયાન વિકસતી નથી, પરંતુ જ્યારે Rh-પોઝિટિવ સંતાનનો જન્મ થાય ત્યારે માતાના રક્તમાં Rh એન્ટિજેનના સંપર્કમાં આવે છે. આથી, દ્વિતીય ગર્ભધારણ દરમિયાન જ્યારે પ્રથમ સંતાન Rh-પોઝિટિવ હોય ત્યારે HDN થવાની શક્યતા સૌથી વધુ હોય છે. વિકલ્પ A ખોટો છે કારણ કે પ્રથમ ગર્ભધારણ દરમિયાન એન્ટિબોડીઝ વિકસતી નથી. વિકલ્પ C ખોટો છે કારણ કે પહેલાંના સંતાનો Rh-નેગેટિવ હોય તો એન્ટિબોડીઝ વિકસતી નથી. વિકલ્પ D ખોટો છે કારણ કે HDN થવાની શક્યતા હોય છે.", "ncert_ref": "Class XII - Chapter 5: વંશવાહકતા અને વિકાસ", "difficulty": "Hard", "num": 12}, {"question": "ABO રક્ત જૂથ પ્રણાલીમાં, કયા રક્ત જૂથ ધરાવતા વ્યક્તિના પ્લાઝ્મામાં એન્ટિ-A અને એન્ટિ-B એન્ટિબોડીઝ બંને હાજર હોય છે?", "options": ["A) A", "B) B", "C) AB", "D) O"], "correct": 3, "explanation": "ABO રક્ત જૂથ પ્રણાલીમાં, O રક્ત જૂથ ધરાવતા વ્યક્તિના પ્લાઝ્મામાં એન્ટિ-A અને એન્ટિ-B એન્ટિબોડીઝ બંને હાજર હોય છે. આ કારણ છે કે O રક્ત જૂથ ધરાવતા વ્યક્તિના લાલ રક્તકણોમાં A અથવા B એન્ટિજેન હાજર નથી, પરંતુ પ્લાઝ્મામાં એન્ટિ-A અને એન્ટિ-B એન્ટિબોડીઝ હાજર હોય છે. વિકલ્પ A ખોટો છે કારણ કે A રક્ત જૂથ ધરાવતા વ્યક્તિના પ્લાઝ્મામાં ફક્ત એન્ટિ-B એન્ટિબોડી હાજર હોય છે. વિકલ્પ B ખોટો છે કારણ કે B રક્ત જૂથ ધરાવતા વ્યક્તિના પ્લાઝ્મામાં ફક્ત એન્ટિ-A એન્ટિબોડી હાજર હોય છે. વિકલ્પ C ખોટો છે કારણ કે AB રક્ત જૂથ ધરાવતા વ્યક્તિના પ્લાઝ્મામાં કોઈપણ એન્ટિબોડી હાજર નથી.", "ncert_ref": "Class XII - Chapter 5: વંશવાહકતા અને વિકાસ", "difficulty": "Hard", "num": 13}, {"question": "Rh-રક્ત જૂથ પ્રણાલીમાં, Rh-પોઝિટિવ વ્યક્તિના લાલ રક્તકણોમાં કયા પ્રકારના એન્ટિજેન હાજર હોય છે?", "options": ["A) D એન્ટિજેન", "B) C એન્ટિજેન", "C) E એન્ટિજેન", "D) A એન્ટિજેન"], "correct": 0, "explanation": "Rh-રક્ત જૂથ પ્રણાલીમાં, Rh-પોઝિટિવ વ્યક્તિના લાલ રક્તકણોમાં D એન્ટિજેન હાજર હોય છે. D એન્ટિજેન Rh પ્રણાલીનું સૌથી મહત્વપૂર્ણ એન્ટિજેન છે, અને તેની હાજરી અથવા ગેરહાજરી નક્કી કરે છે કે વ્યક્તિ Rh-પોઝિટિવ છે કે Rh-નેગેટિવ. વિકલ્પ B અને C ખોટા છે કારણ કે C અને E એન્ટિજેન Rh પ્રણાલીના અન્ય એન્ટિજેન છે, પરંતુ D એન્ટિજેન સૌથી મહત્વપૂર્ણ છે. વિકલ્પ D ખોટો છે કારણ કે A એન્ટિજેન ABO પ્રણાલી સાથે સંબંધિત છે.", "ncert_ref": "Class XII - Chapter 5: વંશવાહકતા અને વિકાસ", "difficulty": "Hard", "num": 14}, {"question": "એક વ્યક્તિને રક્તાધાન કરવામાં આવે છે અને તેના શરીરમાં હીમોલાઇસિસની પ્રતિક્રિયા જોવા મળે છે. જો દાતાનું રક્ત જૂથ A છે અને સ્વીકારનારનું રક્ત જૂથ B છે, તો નીચેનામાંથી કયું વિધાન સૌથી યોગ્ય રીતે સમજાવે છે કે શા માટે આ પ્રતિક્રિયા થઈ?", "options": ["A) સ્વીકારનારના પ્લાઝ્મામાં એન્ટિ-A એન્ટિબોડી હાજર હોય છે, જે દાતાના A એન્ટિજેન સાથે પ્રતિક્રિયા કરે છે.", "B) દાતાના પ્લાઝ્મામાં એન્ટિ-B એન્ટિબોડી હાજર હોય છે, જે સ્વીકારનારના B એન્ટિજેન સાથે પ્રતિક્રિયા કરે છે.", "C) સ્વીકારનારના લાલ રક્તકણોમાં B એન્ટિજેન હાજર હોય છે, જે દાતાના A એન્ટિજેન સાથે સીધી પ્રતિક્રિયા કરે છે.", "D) દાતાના લાલ રક્તકણોમાં A એન્ટિજેન હાજર હોય છે, જે સ્વીકારનારના પ્લાઝ્મામાં એન્ટિ-A એન્ટિબોડી સાથે પ્રતિક્રિયા કરે છે."], "correct": 3, "explanation": "સ્વીકારનારનું રક્ત જૂથ B હોવાથી તેના પ્લાઝ્મામાં એન્ટિ-A એન્ટિબોડી હાજર હોય છે. દાતાનું રક્ત જૂથ A હોવાથી તેના લાલ રક્તકણોમાં A એન્ટિજેન હાજર હોય છે. જ્યારે A એન્ટિજેન ધરાવતા દાતાના લાલ રક્તકણો સ્વીકારનારના રક્તમાં પ્રવેશે છે, ત્યારે સ્વીકારનારના એન્ટિ-A એન્ટિબોડી A એન્ટિજેન સાથે બંધન કરે છે, જેના પરિણામે હીમોલાઇસિસ થાય છે. આમ, વિકલ્પ D યોગ્ય છે. વિકલ્પ A ખોટો છે કારણ કે એન્ટિ-A એન્ટિબોડી દાતાના રક્તમાં નહીં પણ સ્વીકારનારના રક્તમાં હોય છે. વિકલ્પ B ખોટો છે કારણ કે દાતાના પ્લાઝ્મામાં એન્ટિ-B એન્ટિબોડી હાજર નથી. વિકલ્પ C ખોટો છે કારણ કે એન્ટિજેન અને એન્ટિબોડી વચ્ચેની પ્રતિક્રિયા થાય છે, ન કે એન્ટિજેન અને એન્ટિજેન વચ્ચે.", "ncert_ref": "Class XII - Chapter 5: વંશસંચાર અને જૈવ વૈવિધ્યતા", "difficulty": "Hard", "num": 15}, {"question": "એક દંપતીના બંને સભ્યોનું રક્ત જૂથ AB છે. તેમના સંતાનમાં નીચેનામાંથી કયું રક્ત જૂથ શક્ય નથી?", "options": ["A) A રક્ત જૂથ", "B) B રક્ત જૂથ", "C) AB રક્ત જૂથ", "D) O રક્ત જૂથ"], "correct": 3, "explanation": "AB રક્ત જૂથ ધરાવતા વ્યક્તિઓના જનીનો IA અને IB હોય છે. આથી તેમના સંતાનમાં IAIA (A), IAIB (AB), અથવા IBIB (B) રક્ત જૂથ હોઈ શકે, પરંતુ ii (O) રક્ત જૂથ શક્ ns": ["A) બોમ્બે રક્ત જૂથ (Oh)", "B) Rh-નેગેટિવ રક્ત જૂથ", "C) A રક્ત જૂથ (સબગ્રુપ A2)", "D) AB રક્ત જૂથ (સબગ્રુપ A2B)"], "correct": 0, "explanation": "બોમ્બે રક્ત જૂથ (Oh)માં, વ્યક્તિ ABO પ્રણાલી અનુસાર 'O' રક્ત જૂથ ધરાવે છે, પરંતુ તેના લાલ રક્તકણો પર H-એન્ટિજેનની હાજરી નથી, જે A અને B એન્ટિજેનના પૂર્વગામી છે. આ કારણે, A અને B એન્ટિજેન બનવા માટે H-એન્ટિજેનની અછતને લીધે, એન્ટિ-A, એન્ટિ-B, અને એન્ટિ-H એન્ટિબોડીઝ પ્લાઝ્મામાં હાજર હોય છે. બાકીના વિકલ્પો (B, C, D) આ સ્થિતિ સાથે સંકળાયેલા નથી.", "ncert_ref": "Class XII - Chapter 5: વંશવિજ્ઞાન અને વિકાસ (Genetics and Evolution)", "difficulty": "Hard", "num": 33}, {"question": "Rh-રક્ત જૂથ પ્રણાલીમાં, એક Rh-નેગેટિવ માતા અને Rh-પોઝિટિવ પિતાના સંતાનમાં હીમોલાઇટિક ડિઝીઝ ઓફ ન્યૂબોર્ન (HDN) થવાની શક્યતા ક્યારે સૌથી વધુ હોય છે?", "options": ["A) પ્રથમ ગર્ભાવસ્થા દરમિયાન", "B) બીજી ગર્ભાવસ્થા દરમિયાન જ્યારે પ્રથમ સંતાન Rh-પોઝિટિવ હતું", "C) ત્રીજી ગર્ભાવસ્થા દરમિયાન જ્યારે પ્રથમ અને બીજું સંતાન Rh-નેગેટિવ હતા", "D) ચોથી ગર્ભાવસ્થા દરમિયાન જ્યારે તમામ પૂર્વ સંતાનો Rh-નેગેટિવ હતા"], "correct": 1, "explanation": "Rh-નેગેટિવ માતા અને Rh-પોઝિટિવ પિતાના સંતાનમાં HDN થવાની શક્યતા બીજી ગર્ભાવસ્થા દરમિયાન સૌથી વધુ હોય છે, જ્યારે પ્રથમ સંતાન Rh-પોઝિટિવ હતું. પ્રથમ ગર્ભાવસ્થા દરમિયાન, માતાનું શરીર Rh-એન્ટિજેન સાથે સંપર્કમાં આવે છે અને એન્ટિબોડીઝ બનાવવાનું શરૂ કરે છે. બીજી ગર્ભાવસ્થા દરમિયાન, આ એન્ટિબોડીઝ પ્લેસેન્ટા દ્વારા ભ્રૂણમાં પસાર થઈ શકે છે અને HDNનું કારણ બની શકે છે. ત્રીજી અને ચોથી ગર્ભાવસ્થા દરમિયાન, જો પૂર્વ સંતાનો Rh-નેગેટિવ હતા, તો માતાનું શરીર Rh-એન્ટિજેન સાથે સંપર્કમાં આવ્યું નથી, આથી HDN થવાની શક્યતા ઓછી હોય છે.", "ncert_ref": "Class XII - Chapter 5: વંશવિજ્ઞાન અને વિકાસ (Genetics and Evolution)", "difficulty": "Hard", "num": 34}, {"question": "ABO રક્ત જૂથ પ્રણાલીમાં, કયા રક્ત જૂથ ધરાવતા વ્યક્તિના લાલ રક્તકણો પર A અને B બંને એન્ટિજેન હાજર હોય છે, પરંતુ પ્લાઝ્મામાં કોઈ એન્ટિબોડી હાજર નથી?", "options": ["A) A રક્ત જૂથ", "B) B રક્ત જૂથ", "C) AB રક્ત જૂથ", "D) O રક્ત જૂથ"], "correct": 2, "explanation": "AB રક્ત જૂથ ધરાવતા વ્યક્તિના લાલ રક્તકણો પર A અને B બંને એન્ટિજેન હાજર હોય છે, પરંતુ પ્લાઝ્મામાં કોઈ એન્ટિબોડી (એન્ટિ-A અથવા એન્ટિ-B) હાજર નથી. A રક્ત જૂથમાં ફક્ત A એન્ટિજેન અને એન્ટિ-B એન્ટિબોડી હોય છે, B રક્ત જૂથમાં ફક્ત B એન્ટિજેન અને એન્ટિ-A એન્ટિબોડી હોય છે, જ્યારે O રક્ત જૂથમાં કોઈ એન્ટિજેન નથી પરંતુ એન્ટિ-A અને એન્ટિ-B એન્ટિબોડીઝ હોય છે.", "ncert_ref": "Class XII - Chapter 5: વંશવિજ્ઞાન અને વિકાસ (Genetics and Evolution)", "difficulty": "Hard", "num": 35}, {"question": "એક વ્યક્તિને ABO રક્ત જૂથ પ્રણાલી અનુસાર 'A' રક્ત જૂથ છે, પરંતુ તેના લાલ રક્તકણો પર A-એન્ટિજેનની હાજરી ખૂબ જ ઓછી છે. આ સ્થિતિ કયા સબગ્રુપ સાથે સંકળાયેલ છે?", "options": ["A) A1", "B) A2", "C) A3", "D) A4"], "correct": 1, "explanation": "A2 સબગ્રુપમાં, વ્યક્તિ ABO પ્રણાલી અનુસાર 'A' રક્ત જૂથ ધરાવે છે, પરંતુ તેના લાલ રક્તકણો પર A-એન્ટિજેનની હાજરી ખૂબ જ ઓછી હોય છે. આ સબગ્રુપમાં, A-એન્ટિજેનની હાજરી A1 સબગ્રુપ કરતાં ઓછી હોય છે. A1 સબગ્રુપમાં A-એન્ટિજેનની હાજરી વધુ હોય છે, જ્યારે A3 અને A4 સબગ્રુપો ABO પ્રણાલીમાં માન્ય નથી.", "ncert_ref": "Class XII - Chapter 5: વંશવિજ્ઞાન અને વિકાસ (Genetics and Evolution)", "difficulty": "Hard", "num": 36}, {"question": "Rh-રક્ત જૂથ પ્રણાલીમાં, એક Rh-નેગેટિવ માતાને પ્રથમ સંતાન Rh-પોઝિટિવ છે અને બીજી ગર્ભાવસ્થા દરમિયાન તેને Rh-ઇમ્યુનોગ્લોબ્યુલિન (Rhogam) ઇન્જેક્શન આપવામાં આવે છે. આ ઇન્જેક્શનનો મુખ્ય હેતુ શું છે?", "options": ["A) માતાનું Rh-એન્ટિજેન નિષ્ક્રિય કરવા", "B) ભ્રૂણના Rh-એન્ટિજેનને નિષ્ક્રિય કરવા", "C) માતાના શરીરમાં Rh-એન્ટિબોડીઝ બનવા અટકાવવા", "D) ભ્રૂણના શરીરમાં Rh-એન્ટિબોડીઝ બનવા અટકાવવા"], "correct": 2, "explanation": "Rh-ઇમ્યુનોગ્લોબ્યુલિન (Rhogam) ઇન્જેક્શનનો મુખ્ય હેતુ માતાના શરીરમાં Rh-એન્ટિબોડીઝ બનવા અટકાવવાનો છે. જ્યારે Rh-નેગેટિવ માતાને Rh-પોઝિટિવ ભ્રૂણ હોય છે, ત્યારે ગર્ભાવસ્થા દરમિયાન અથવા પ્રસૂતિ દરમિયાન માતાનું શરીર Rh-એન્ટિજેન સાથે સંપર્કમાં આવી શકે છે, જેના કારણે માતાનું શરીર Rh-એન્ટિબોડીઝ બનાવવાનું શરૂ કરે છે. આ એન્ટિબોડીઝ ભવિષ્યની ગર્ભાવસ્થામાં ભ્રૂણને નુકસાન પહોંચાડી શકે છે. Rhogam ઇન્જેક્શન માતાના શરીરમાં Rh-એન્ટિજેનને નિષ્ક્રિય કરે છે, જેથી એન્ટિબોડીઝ બનવા અટકાવી શકાય. બાકીના વિકલ્પો (A, B, D) આ ઇન્જેક્શનના હેતુ સાથે સંકળાયેલા નથી.", "ncert_ref": "Class XII - Chapter 5: વંશવિજ્ઞાન અને વિકાસ (Genetics and Evolution)", "difficulty": "Hard", "num": 37}, {"question": "નીચેનામાંથી કયું વિધાન ABO રક્ત જૂથ પ્રણાલી માટે ખોટું છે?", "options": ["A) 'O' રક્ત જૂથ ધરાવતા વ્યક્તિના લાલ રક્તકણોમાં A અને B એન્ટિજેન હાજર નથી", "B) 'AB' રક્ત જૂથ ધરાવતા વ્યક્તિના પ્લાઝ્મામાં એન્ટિ-A અને એન્ટિ-B એન્ટિબોડી હાજર નથી", "C) 'A' રક્ત જૂથ ધરાવતા વ્યક્તિના પ્લાઝ્મામાં એન્ટિ-B એન્ટિબોડી હાજર હોય છે", "D) 'B' રક્ત જૂથ ધરાવતા વ્યક્તિના લાલ રક્તકણોમાં A એન્ટિજેન હાજર હોય છે"], "correct": 3, "explanation": "ABO રક્ત જૂથ પ્રણાલીમાં, 'B' રક્ત જૂથ ધરાવતા વ્યક્તિના લાલ રક્તકણોમાં B-એન્ટિજેન હાજર હોય છે, નહીં કે A-એન્ટિજેન. તેથી વિકલ્પ D ખોટું છે. અન્ય વિકલ્પો ABO રક્ત જૂથ પ્રણાલીના સાચા સિદ્ધાંતો દર્શાવે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 18: શરીર પ્રવાહી અને પરિવહન", "difficulty": "Hard", "num": 38}, {"question": "એક વ્યક્તિને ABO રક્ત જૂથ પ્રણાલી અનુસાર 'O' રક્ત જૂથ છે, પરંતુ તેના પ્લાઝ્મામાં એન્ટિ-A, એન્ટિ-B અને એન્ટિ-H એન્ટિબોડીઝ હાજર નથી. આ સ્થિતિ કયા અસાધારણ રક્ત જૂથ સાથે સંકળાયેલી હોઈ શકે?", "options": ["A) બોમ્બે રક્ત જૂથ (Oh)", "B) Rh-નેગેટિવ રક્ત જૂથ", "C) A રક્ત જૂથ સાથે H-એન્ટિજેનની ઉણપ", "D) AB રક્ત જૂથ સાથે એન્ટિજેનિક મ્યુટેશન"], "correct": 0, "explanation": "બોમ્બે રક્ત જૂથ (Oh)માં, લાલ રક્તકણો પર A, B અથવા H એન્ટિજેન હાજર નથી, પરંતુ પ્લાઝ્મામાં એન્ટિ-A, એન્ટિ-B અને એન્ટિ-H એન્ટિબોડીઝ હાજર હોય છે. જ્યારે કોઈ વ્યક્તિને 'O' રક્ત જૂથ હોય પરંતુ પ્લાઝ્મામાં એન્ટિ-H એન્ટિબોડીઝ ન હોય, ત્યારે તે બોમ્બે રક્ત જૂથ (Oh) હોવાની શક્યતા રહે છે. બાકીના વિકલ્પો આ સ્થિતિને સમજાવી શકતા નથી: Rh-નેગેટિવ રક્ત જૂથ ABO એન્ટિજેન સાથે સંકળાયેલ નથી, A રક્ત જૂથ સાથે H-એન્ટિજેનની ઉણપ અથવા AB રક્ત જૂથ સાથે એન્ટિજેનિક મ્યુટેશન આ સ્થિતિને સમજાવી શકતા નથી.", "ncert_ref": "Class XII - Chapter 5: વંશવિજ્ઞાન અને વિકાસ (Genetics and Evolution) - ABO રક્ત જૂથ વ્યવસ્થા", "difficulty": "Hard", "num": 39}, {"question": "એક વ્યક્તિનું રક્ત જૂથ A છે અને તેના લાલ રક્તકણો પર A-એન્ટિજેનની હાજરી નથી, પરંતુ તેના પ્લાઝ્મામાં એન્ટિ-B એન્ટિબોડી હાજર છે. આ સ્થિતિ કયા જનીનની હાજરીને કારણે થઈ શકે છે?", "options": ["A) I^A જનીનની હેટરોઝાઇગસ સ્થિતિ (I^A i)", "B) I^A જનીનની હોમોઝાઇગસ સ્થિતિ (I^A I^A)", "C) h જનીનની હોમોઝાઇગસ સ્થિતિ (hh)", "D) I^B જનીનની હેટરોઝાઇગસ સ્થિતિ (I^B i)"], "correct": 2, "explanation": "બોમ્બે રક્ત જૂથ (Oh) ધરાવતા વ્યક્તિઓમાં h જનીનની હોમોઝાઇગસ સ્થિતિ (hh) હોય છે, જે A અને B એન્ટિજેનના સિંથેસિસને અટકાવે છે. આ કારણે, લાલ રક્તકણો પર A અથવા B એન્ટિજેન હાજર નથી હોતાં, પરંતુ પ્લાઝ્મામાં એન્ટિ-A, એન્ટિ-B, અને એન્ટિ-H એન્ટિબોડી હાજર હોય છે. વિકલ્પ A અને Bમાં I^A જનીનની હાજરી A-એન્ટિજેનના સિંથેસિસ તરફ દોરી જાય છે, જે પ્રશ્નની સ્થિતિ સાથે મેળ ખાતી નથી. વિકલ્પ D I^B જનીનની હાજરી દર્શાવે છે, જે B-એન્ટિજેનના સિંથેસિસ તરફ દોરી જાય છે, જે પણ પ્રશ્નની સ્થિતિ સાથે મેળ ખાતી નથી.", "ncert_ref": "Class XII - Chapter 5: વંશસંચાર અને જૈવિક વૈવિધ્યતા", "difficulty": "Hard", "num": 40}, {"question": "એક વ્યક્તિને ABO રક્ત જૂથ પ્રણાલીમાં 'AB' રક્ત જૂથ છે, પરંતુ તેના પ્લાઝ્મામાં એન્ટિ-A અને એન્ટિ-B એન્ટિબોડીઝ હાજર નથી. આ સ્થિતિ કયા કારણસર શક્ય બની શકે?", "options": ["A) વ્યક્તિને બોમ્બે રક્ત જૂથ (Oh) છે, જેમાં H-એન્ટિજેનની ઉણપ હોય છે", "B) વ્યક્તિને લ્યુકેમિયા જેવી બીમારી છે, જેમાં એન્ટિબોડી ઉત્પાદન અવરોધાય છે", "C) વ્યક્તિને Rh-નેગેટિવ રક્ત જૂથ છે, જેમાં એન્ટિબોડી બનતા નથી", "D) વ્યક્તિને ABO જનીનમાં મ્યુટેશન છે, જેમાં I^A અને I^B એલિલ્સ અસરકારક નથી"], "correct": 0, "explanation": "બોમ્બે રક્ત જૂથ (Oh) ધરાવતા વ્યક્તિઓમાં H-એન્ટિજેનની ઉણપ હોય છે, જેથી A અને B એન્ટિજેન બનતા નથી. પરિણામે, તેમના પ્લાઝ્મામાં એન્ટિ-A અને એન્ટિ-B એન્ટિબોડીઝ હાજર નથી હોતાં. બાકીના વિકલ્પો અસંગત છે: લ્યુકેમિયામાં એન્ટિબોડી ઉત્પાદન અવરોધાય શકે, પરંતુ તે ABO પ્રણાલીના મૂળભૂત સિદ્ધાંતને બદલતું નથી. Rh-નેગેટિવ રક્ત જૂથ એન્ટિબોડી ઉત્પાદન સાથે સીધો સંબંધ ધરાવતું નથી. ABO જનીનમાં મ્યુટેશન અસાધારણ છે અને બોમ્બે રક્ત જૂથની સ્થિતિ વર્ણવતું નથી.", "ncert_ref": "Class XII - Chapter 5: વંશસંચાર અને જૈવિક ઉત્ક્રાંતિ (વંશસંચારના સિદ્ધાંતો)", "difficulty": "Hard", "num": 41}, {"question": "Rh-રક્ત જૂથ પ્રણાલીમાં, એક Rh-નેગેટિવ માતાના પ્રથમ સંતાન Rh-પોઝિટિવ છે. બીજી ગર્ભાવસ્થા દરમિયાન, જો સંતાન Rh-પોઝિટિવ હોય તો નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) માતાના શરીરમાં એન્ટિ-Rh એન્ટિબોડીઝ બનશે", "B) સંતાનને હીમોલાઇટિક ડિઝીઝ થવાની શક્યતા રહેશે", "C) માતાના રક્તમાં Rh-એન્ટિજેન હાજર થશે", "D) માતાને Rh-ઇમ્યુનોગ્લોબ્યુલિન ઇન્જેક્શન આપવું જોઈએ"], "correct": 2, "explanation": "Rh-નેગેટિવ માતાના શરીરમાં Rh-એન્ટિજેન હાજર થતું નથી. પ્રથમ સંતાન Rh-પોઝિટિવ હોવાથી માતાના શરીરમાં એન્ટિ-Rh એન્ટિબોડીઝ બનશે, જેથી બીજી ગર્ભાવસ્થા દરમિયાન સંતાનને હીમોલાઇટિક ડિઝીઝ થવાની શક્યતા રહેશે. માતાને Rh-ઇમ્યુનોગ્લોબ્યુલિન ઇન્જેક્શન આપવાથી એન્ટિબોડી ઉત્પાદન અટકાવી શકાય છે. Rh-એન્ટિજેન માતાના રક્તમાં હાજર થતું નથી, કારણ કે તે માતાના શરીરમાં ઉત્પન્ન થતું નથી.", "ncert_ref": "Class XII - Chapter 5: વંશસંચાર અને જૈવિક ઉત્ક્રાંતિ (વંશસંચારના સિદ્ધાંતો)", "difficulty": "Hard", "num": 42}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
