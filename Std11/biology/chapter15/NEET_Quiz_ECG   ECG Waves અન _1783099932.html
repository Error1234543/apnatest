    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}

        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}

        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}

        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}

        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}

        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}

        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}

        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}

        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>

    <script>
        const questionsData = [{"question": "ECG મા P-લહેરની ઉંચાઈ વધી જાય છે, તો તે કયા પરિસ્થિતિનું સૂચન કરે છે?", "options": ["A) દાઢના કોથળાનું વિસ્તરણ (Right atrial enlargement)", "B) ડાબા કોથળાનું વિસ્તરણ (Left atrial enlargement)", "C) વેન્ટ્રિક્યુલર હાયપરટ્રોફી (Ventricular hypertrophy)", "D) એટ્રિયલ ફિબ્રિલેશન (Atrial fibrillation)"], "correct": 1, "explanation": "P-લહેર દાબા કોથળાના ડિપોલરાઇઝેશનને દર્શાવે છે. જો P-લહેરની ઉંચાઈ વધે (P-pulmonale અથવા P-mitrale), તો તે ડાબા કોથળાનું વિસ્તરણ સૂચવે છે. ડાબા કોથળાનું વિસ્તરણ મિત્રલ વાલ્વ રોગ અથવા હાયપરટેન્શનમાં જોવા મળે છે. A) દાઢના કોથળાનું વિસ્તરણ P-લહેરની રૂંધાઈ (width) વધારે છે, પરંતુ ઉંચાઈ નહીં. C) વેન્ટ્રિક્યુલર હાયપરટ્રોફી R-લહેર અથવા S-લહેરને અસર કરે છે. D) એટ્રિયલ ફિબ્રિલેશનમાં P-લહેર અનિયમિત અથવા ગાયબ હોય છે.", "ncert_ref": "Class XII - Chapter 18: શરીર અને સ્વાસ્થ્ય (Body and Health) - હૃદયના ચક્ર અને ECG", "difficulty": "Hard", "num": 1}, {"question": "ECG મા QRS કોમ્પ્લેક્સની રૂંધાઈ વધી જાય છે, તો તે કયા અંગના વિકારનું સૂચન કરે છે?", "options": ["A) એટ્રિયમ (Atrium)", "B) વેન્ટ્રિકલ (Ventricle)", "C) SA નોડ (Sinoatrial node)", "D) AV નોડ (Atrioventricular node)"], "correct": 1, "explanation": "QRS કોમ્પ્લેક્સ વેન્ટ્રિકલના ડિપોલરાઇઝેશનને દર્શાવે છે. જો QRS કોમ્પ્લેક્સની રૂંધાઈ (વ્યાપ) 0.12 સેકન્ડથી વધુ હોય, તો તે વેન્ટ્રિકલમાં વાહકતાના વિકાર (બંધારણીય અથવા કાર્યાત્મક)નું સૂચન કરે છે, જેમ કે બંધારણીય હૃદય રોગ અથવા બ્લોક. A) એટ્રિયમ P-લહેર સાથે સંબંધિત છે. C) SA નોડ P-લહેરની ઉત્પત્તિ સાથે સંબંધિત છે. D) AV નોડ PR ઇન્ટરવલ સાથે સંબંધિત છે.", "ncert_ref": "Class XII - Chapter 18: શરીર અને સ્વાસ્થ્ય (Body and Health) - હૃદયના ચક્ર અને ECG", "difficulty": "Hard", "num": 2}, {"question": "ECG મા ST સેગમેન્ટ ડિપ્રેશન જોવા મળે છે, તો તે કયા પરિસ્થિતિનું સૂચન કરે છે?", "options": ["A) હૃદયના સ્નાયુમાં ઇસ્કેમિયા (Myocardial ischemia)", "B) હાયપરકેલેમિયા (Hyperkalemia)", "C) હાયપોકેલેમિયા (Hypokalemia)", "D) પેરિકાર્ડાઇટિસ (Pericarditis)"], "correct": 0, "explanation": "ST સેગમેન્ટ ડિપ્રેશન હૃદયના સ્નાયુમાં ઇસ્કેમિયા (રક્ત પુરવઠાનો અભાવ)નું સૂચન કરે છે, જે કોરોનરી આર્ટરી રોગ અથવા એન્જાઇના પેક્ટોરિસમાં જોવા મળે છે. B) હાયપરકેલેમિયામાં T-લહેર ઉંચી અને તીક્ષ્ણ હોય છે. C) હાયપોકેલેમિયામાં ST સેગમેન્ટ ડિપ્રેશન સાથે U-લહેર જોવા મળે છે. D) પેરિકાર્ડાઇટિસમાં ST સેગમેન્ટ એલિવેશન જોવા મળે છે.", "ncert_ref": "Class XII - Chapter 18: શરીર અને સ્વાસ્થ્ય (Body and Health) - હૃદયના ચક્ર અને ECG", "difficulty": "Hard", "num": 3}, {"question": "ECG મા T-લહેરની ઉંચાઈ ઘટી જાય છે અથવા ઉલટી પડે છે, તો તે કયા પરિસ્થિતિનું સૂચન કરે છે?", "options": ["A) હાયપરકેલેમિયા (Hyperkalemia)", "B) હાયપોકેલેમિયા (Hypokalemia)", "C) હૃદયના સ્નાયુમાં ઇસ્કેમિયા (Myocardial ischemia)", "D) વેન્ટ્રિક્યુલર હાયપરટ્રોફી (Ventricular hypertrophy)"], "correct": 2, "explanation": "T-લહેર વેન્ટ્રિકલના રિપોલરાઇઝેશનને દર્શાવે છે. જો T-લહેરની ઉંચાઈ ઘટે અથવા ઉલટી પડે, તો તે હૃદયના સ્નાયુમાં ઇસ્કેમિયા અથવા ઇન્ફાર્કશનનું સૂચન કરે છે. A) હાયપરકેલેમિયામાં T-લહેર ઉંચી અને તીક્ષ્ણ હોય છે. B) હાયપોકેલેમિયામાં T-લહેરની ઉંચાઈ ઘટે છે, પરંતુ ઉલટી પડતી નથી. D) વેન્ટ્રિક્યુલર હાયપરટ્રોફીમાં QRS કોમ્પ્લેક્સ અને R-લહેરમાં ફેરફાર જોવા મળે છે.", "ncert_ref": "Class XII - Chapter 18: શરીર અને સ્વાસ્થ્ય (Body and Health) - હૃદયના ચક્ર અને ECG", "difficulty": "Hard", "num": 4}, {"question": "ECG મા PR ઇન્ટરવલ 0.20 સેકન્ડથી વધુ હોય, તો તે કયા વિકારનું સૂચન કરે છે?", "options": ["A) પ્રથમ ડિગ્રી AV બ્લોક (First-degree AV block)", "B) દ્વિતીય ડિગ્રી AV બ્લોક (Second-degree AV block)", "C) તૃતીય ડિગ્રી AV બ્લોક (Third-degree AV block)", "D) SA નોડ ડિસફંક્શન (SA node dysfunction)"], "correct": 0, "explanation": "PR ઇન્ટરવલ એટ્રિયલ ડિપોલરાઇઝેશનથી વેન્ટ્રિકલ ડિપોલરાઇઝેશન વચ્ચેનો સમયગાળો દર્શાવે છે. જો PR ઇન્ટરવલ 0.20 સેકન્ડથી વધુ હોય, તો તે પ્રથમ ડિગ્રી AV બ્લોકનું સૂચન કરે છે, જ્યાં AV નોડમાં વાહકતા ધીમી પડે છે. B) દ્વિતીય ડિગ્રી AV બ્લોકમાં કેટલાક P-લહેરો વેન્ટ્રિકલ સુધી પહોંચતા નથી. C) તૃતીય ડિગ્રી AV બ્લોકમાં P-લહેરો અને QRS કોમ્પ્લેક્સ વચ્ચે કોઈ સંબંધ હોતો નથી. D) SA નોડ ડિસફંક્શનમાં P-લહેરની ઉત્પત્તિ અસરગ્રસ્ત થાય છે.", "ncert_ref": "Class XII - Chapter 18: શરીર અને સ્વાસ્થ્ય (Body and Health) - હૃદયના ચક્ર અને ECG", "difficulty": "Hard", "num": 5}, {"question": "એક દર્દીના ECGમાં દરેક QRS કોમ્પ્લેક્સ પહેલાં P-લહેર જોવા મળે છે, પરંતુ કેટલાક QRS કોમ્પ્લેક્સ પછી T-લહેર ગેરહાજર છે. આ પરિસ્થિતિ કયા પ્રકારના હૃદય બ્લોકનું સૂચન કરે છે?", "options": ["A) પ્રથમ-ડિગ્રી AV બ્લોક", "B) મોબિટ્ઝ પ્રકાર 1 (વેન્કેબાચ)", "C) મોબિટ્ઝ પ્રકાર 2", "D) તૃતીય-ડિગ્રી AV બ્લોક"], "correct": 2, "explanation": "આ પરિસ્થિતિમાં P-લહેર હાજર છે પરંતુ કેટલાક QRS કોમ્પ્લેક્સ પછી T-લહેર ગેરહાજર છે, જે મોબિટ્ઝ પ્રકાર 2 AV બ્લોકનું સૂચન કરે છે. આ બ્લોકમાં AV નોડમાં અવરોધને કારણે કેટલાક P-લહેર QRS કોમ્પ્લેક્સમાં પરિવર્તિત થતા નથી, પરંતુ જે QRS બને છે તે સામાન્ય હોય છે. પ્રથમ-ડિગ્રી AV બ્લોકમાં PR ઇન્ટરવલ લંબાય છે પરંતુ બધા P-લહેર QRSમાં પરિવર્તિત થાય છે. મોબિટ્ઝ પ્રકાર 1માં PR ઇન્ટરવલ ક્રમશ: વધે છે અને પછી એક QRS ડ્રોપ થાય છે. તૃતીય-ડિગ્રી બ્લોકમાં P-લહેર અને QRS સંપૂર્ણપણે અસંબંધિત હોય છે.", "ncert_ref": "Class XII - અધ્યાય 18: શરીરમાં પ્રવાહી અને પરિવહન", "difficulty": "Hard", "num": 6}, {"question": "એક ECGમાં ST સેગમેન્ટનું ઊંચું થવું (ST elevation) અને પછી T-લહેરનું ઉલટાવું (T-wave inversion) જોવા મળે છે. આ પરિવર્તન કયા પ્રકારના મ્યોકાર્ડિયલ ઇન્ફાર્ક્શન સાથે સંકળાયેલું છે?", "options": ["A) સબએન્ડોકાર્ડિયલ ઇન્ફાર્ક્શન", "B) ટ્રાન્સમ્યુરલ ઇન્ફાર્ક્શન", "C) નોન-ST એલિવેશન મ્યોકાર્ડિયલ ઇન્ફાર્ક્શન (NSTEMI)", "D) પ્રિન્ઝમેટલ એન્જાઇના"], "correct": 1, "explanation": "ST સેગમેન્ટનું ઊંચું થવું અને T-લહેરનું ઉલટાવું ટ્રાન્સમ્યુરલ મ્યોકાર્ડિયલ ઇન્ફાર્ક્શનનું લક્ષણ છે, જેમાં હૃદયના સમગ્ર દીવાલની જાડાઈને અસર થાય છે. સબએન્ડોકાર્ડિયલ ઇન્ફાર્ક્શનમાં ST ડિપ્રેશન જોવા મળે છે. NSTEMIમાં ST એલિવેશન હોતું નથી. પ્રિન્ઝમેટલ એન્જાઇનામાં પણ ST એલિવેશન થઈ શકે છે, પરંતુ તે કાયમી હોતું નથી અને T-લહેરનું ઉલટાવું સામાન્ય રીતે જોવા મળતું નથી.", "ncert_ref": "Class XII - અધ્યાય 18: શરીરમાં પ્રવાહી અને પરિવહન", "difficulty": "Hard", "num": 7}, {"question": "એક દર્દીના ECGમાં દરેક QRS કોમ્પ્લેક્સ પહેલાં P-લહેર હાજર છે, પરંતુ PR ઇન્ટરવલ 0.12 સેકન્ડથી ઓછું છે. આ પરિસ્થિતિ કયા વિકારનું સૂચન કરે છે?", "options": ["A) વુલ્ફ-પાર્કિન્સન-વ્હાઇટ સિન્ડ્રોમ", "B) લેફ્ટ બંડલ બ્રાન્ચ બ્લોક", "C) રાઇટ બંડલ બ્રાન્ચ બ્લોક", "D) પ્રથમ-ડિગ્રી AV બ્લોક"], "correct": 0, "explanation": "PR ઇન્ટરવલ 0.12 સેકન્ડથી ઓછું હોવું વુલ્ફ-પાર્કિન્સન-વ્હાઇટ (WPW) સિન્ડ્રોમનું લક્ષણ છે, જેમાં એક્સેસરી પાથવે દ્વારા એટ્રિયમથી વેન્ટ્રિકલમાં અતિ ઝડપી વહન થાય છે. લેફ્ટ અથવા રાઇટ બંડલ બ્રાન્ચ બ્લોકમાં QRS કોમ્પ્લેક્સનો સમયગાળો વધે છે, PR ઇન્ટરવલ નહીં. પ્રથમ-ડિગ્રી AV બ્લોકમાં PR ઇન્ટરવલ 0.20 સેકન્ડથી વધુ હોય છે.", "ncert_ref": "Class XII - અધ્યાય 18: શરીરમાં પ્રવાહી અને પરિવહન", "difficulty": "Hard", "num": 8}, {"question": "એક ECGમાં QRS કોમ્પ્લેક્સની પહોળાઈ 0.12 સેકન્ડથી વધુ છે અને V1 લીડમાં rSR' પેટર્ન જોવા મળે છે. આ પરિવર્તન કયા પ્રકારના બંડલ બ્રાન્ચ બ્લોકનું સૂચન કરે છે?", "options": ["A) લેફ્ટ બંડલ બ્રાન્ચ બ્લોક (LBBB)", "B) રાઇટ બંડલ બ્રાન્ચ બ્લોક (RBBB)", "C) બાઇફેસિક્યુલર બ્લોક", "D) ટ્રાઇફેસિક્યુલર બ્લોક"], "correct": 1, "explanation": "QRS કોમ્પ્લેક્સની પહોળાઈ 0.12 સેકન્ડથી વધુ અને V1 લીડમાં rSR' પેટર્ન રાઇટ બંડલ બ્રાન્ચ બ્લોક (RBBB)નું લક્ષણ છે. LBBBમાં V1 લીડમાં વ્યાપક નકારાત્મક QRS જોવા મળે છે. બાઇફેસિક્યુલર અને ટ્રાઇફેસિક્યુલર બ્લોકમાં અન્ય લીડ્સમાં પણ અસામાન્યતાઓ જોવા મળે છે.", "ncert_ref": "Class XII - અધ્યાય 18: શરીરમાં પ્રવાહી અને પરિવહન", "difficulty": "Hard", "num": 9}, {"question": "એક દર્દીના ECGમાં દરેક P-લહેર પછી QRS કોમ્પ્લેક્સ જોવા મળે છે, પરંતુ P-P ઇન્ટરવલ અનિયમિત છે અને હૃદય દર 100-160 બીટ્સ પ્રતિ મિનિટ છે. આ પરિસ્થિતિ કયા પ્રકારના એરિથમિયાનું સૂચન કરે છે?", "options": ["A) સિનુસ ટાકીકાર્ડિયા", "B) એટ્રિયલ ફાઇબ્રિલેશન", "C) એટ્રિયલ ફ્લટર", "D) મલ્ટિફોકલ એટ્રિયલ ટાકીકાર્ડિયા"], "correct": 3, "explanation": "P-P ઇન્ટરવલ અનિયમિત હોવું અને હૃદય દર 100-160 બીટ્સ પ્રતિ મિનિટ હોવું મલ્ટિફોકલ એટ્રિયલ ટાકીકાર્ડિયા (MAT)નું લક્ષણ છે, જેમાં એટ્રિયામાં એક કરતાં વધુ ફોકસથી આવેગ ઉત્પન્ન થાય છે. સિનુસ ટાકીકાર્ડિયામાં P-P ઇન્ટરવલ નિયમિત હોય છે. એટ્રિયલ ફાઇબ્રિલેશનમાં P-લહેર ગેરહાજર હોય છે અને હૃદય દર અનિયમિત હોય છે. એટ્રિયલ ફ્લટરમાં 'સૉટૂથ' પેટર્ન જોવા મળે છે.", "ncert_ref": "Class XII - અધ્યાય 18: શરીરમાં પ્રવાહી અને પરિવહન", "difficulty": "Hard", "num": 10}, {"question": "ECGમાં U-લહેર જોવા મળે છે, તો તે કયા પરિસ્થિતિ સાથે સંકળાયેલ છે?", "options": ["A) હાયપોકેલેમિયા (પોટેશિયમનું નીચું સ્તર)", "B) હાયપરકેલેમિયા (પોટેશિયમનું ઊંચું સ્તર)", "C) હાયપોકેલ્સેમિયા (કેલ્શિયમનું નીચું સ્તર)", "D) હાયપરકેલ્સેમિયા (કેલ્શિયમનું ઊંચું સ્તર)"], "correct": 0, "explanation": "U-લહેર ECGમાં હાયપોકેલેમિયા (પોટેશિયમનું નીચું સ્તર) સાથે સંકળાયેલ છે. હાયપરકેલેમિયામાં T-લહેર ઊંચી અને તીક્ષ્ણ થાય છે, જ્યારે હાયપોકેલ્સેમિયા અને હાયપરકેલ્સેમિયામાં ST સેગમેન્ટ અને T-લહેરમાં ફેરફાર થાય છે, પરંતુ U-લહેર સ્પષ્ટપણે હાયપોકેલેમિયાનું લક્ષણ છે.", "ncert_ref": "Class XII - Chapter 18: શરીર અને સ્વાસ્થ્ય", "difficulty": "Hard", "num": 11}, {"question": "ECGમાં 'Osborne wave' (J-લહેર) જોવા મળે છે, તો તે કયા પરિસ્થિતિનું સૂચન કરે છે?", "options": ["A) હાયપોથર્મિયા (શરીરનું તાપમાન ઓછું)", "B) હાયપરથર્મિયા (શરીરનું તાપમાન વધુ)", "C) માયોકાર્ડિયલ ઇન્ફાર્કશન (હૃદયનો હુમલો)", "D) પલ્મોનરી એમ્બોલિઝમ (ફેફસામાં રક્ત ગંઠ)"], "correct": 0, "explanation": "'Osborne wave' (J-લહેર) ECGમાં હાયપોથર્મિયા (શરીરનું તાપમાન ઓછું) સાથે સંકળાયેલ છે. હાયપરથર્મિયામાં ECGમાં કોઈ વિશિષ્ટ લહેર જોવા મળતી નથી, જ્યારે માયોકાર્ડિયલ ઇન્ફાર્કશન અને પલ્મોનરી એમ્બોલિઝમમાં અન્ય ફેરફાર જોવા મળે છે, પરંતુ Osborne wave સ્પષ્ટપણે હાયપોથર્મિયાનું લક્ષણ છે.", "ncert_ref": "Class XII - Chapter 18: શરીર અને સ્વાસ્થ્ય", "difficulty": "Hard", "num": 12}, {"question": "ECGમાં 'Delta wave' જોવા મળે છે, તો તે કયા સિન્ડ્રોમનું સૂચન કરે છે?", "options": ["A) Wolff-Parkinson-White સિન્ડ્રોમ", "B) Long QT સિન્ડ્રોમ", "C) Brugada સિન્ડ્રોમ", "D) Sick Sinus સિન્ડ્રોમ"], "correct": 0, "explanation": "'Delta wave' ECGમાં Wolff-Parkinson-White સિન્ડ્રોમ સાથે સંકળાયેલ છે, જ્યાં અતિરિક્ત એવી પાથવે (Bundle of Kent) હૃદયના આલિંદ અને કક્ષામાં વિદ્યુત સંકેતોનું વહન કરે છે. Long QT સિન્ડ્રોમમાં QT ઇન્ટરવલ લાંબું થાય છે, Brugada સિન્ડ્રોમમાં V1-V3 લીડમાં ST એલિવેશન અને T-લહેર ઇનવર્ઝન જોવા મળે છે, જ્યારે Sick Sin -લહેર (Osborne wave) અને ST સેગમેન્ટનું ઊંચું થવું હાયપોથર્મિયા (શરીરનું તાપમાન ઘટવું) સાથે સંકળાયેલ છે, જે થાયરોક્સિન હોર્મોનની અછત (હાયપોથાયરોઇડિઝમ) અથવા અતિશય (હાયપરથાયરોઇડિઝમ) દરમિયાન જોવા મળે છે. એડ્રિનાલિન (A) હૃદયના ધબકારા વધારે છે પરંતુ J-લહેર સાથે સીધો સંબંધ ધરાવતું નથી. ઇન્સ્યુલિન (C) અને એલ્ડોસ્ટેરોન (D) આ પરિસ્થિતિ સાથે સંકળાયેલા નથી. થાયરોક્સિન (B) શરીરના ચયાપચય અને તાપમાનને નિયંત્રિત કરે છે, તેથી તે યોગ્ય જવાબ છે.", "ncert_ref": "Class XII - Chapter 18: શરીરમાં રસાયણિક સંકેતન અને નિયંત્રણ (Chemical Coordination and Integration)", "difficulty": "Hard", "num": 21}, {"question": "ECGમાં 'Delta wave' અને PR ઇન્ટરવલ ટૂંકું હોવું (short PR interval) જોવા મળે છે. આ કયા સિન્ડ્રોમનું સૂચન કરે છે, જેમાં અસામાન્ય અતિરિક્ત વાહક પથ (accessory pathway) હાજર હોય છે?", "options": ["A) લાંબા QT સિન્ડ્રોમ", "B) વોલ્ફ-પાર્કિન્સન-વ્હાઇટ સિન્ડ્રોમ", "C) બ્રગાડા સિન્ડ્રોમ", "D) એડમ્સ-સ્ટોક્સ સિન્ડ્રોમ"], "correct": 1, "explanation": "Delta wave અને ટૂંકું PR ઇન્ટરવલ વોલ્ફ-પાર્કિન્સન-વ્હાઇટ (WPW) સિન્ડ્રોમનું સૂચન કરે છે, જેમાં અતિરિક્ત વાહક પથ (Bundle of Kent) હાજર હોય છે. લાંબા QT સિન્ડ્રોમ (A)માં QT ઇન્ટરવલ લાંબું થાય છે. બ્રગાડા સિન્ડ્રોમ (C)માં V1 અને V2 લીડમાં RBBB પેટર્ન અને ST સેગમેન્ટ એલિવેશન જોવા મળે છે. એડમ્સ-સ્ટોક્સ સિન્ડ્રોમ (D) હૃદયના બ્લોક સાથે સંકળાયેલ છે.", "ncert_ref": "Class XI - Chapter 18: શરીરમાં પરિવહન (Body Fluids and Circulation)", "difficulty": "Hard", "num": 22}, {"question": "એક દર્દીના ECGમાં P-લહેરની આકારમાં 'બાયફિડ' (દ્વિભાજિત) જોવા મળે છે અને P-લહેરની પહોળાઈ 0.12 સેકન્ડથી વધુ છે. આ કયા અંગના વિસ્તરણનું સૂચન કરે છે?", "options": ["A) ડાબું એટ્રિયમ", "B) જમણું એટ્રિયમ", "C) ડાબું વેન્ટ્રિકલ", "D) જમણું વેન્ટ્રિકલ"], "correct": 0, "explanation": "P-લહેરની દ્વિભાજિત આકાર અને પહોળાઈ વધવી ડાબા એટ્રિયમના વિસ્તરણ (Left Atrial Enlargement)નું સૂચન કરે છે. જમણા એટ્રિયમના વિસ્તરણ (B)માં P-લહેરની ઉંચાઈ વધે છે (P pulmonale). ડાબા વેન્ટ્રિકલ (C) અને જમણા વેન્ટ્રિકલ (D)ના વિસ્તરણમાં QRS કોમ્પ્લેક્સમાં ફેરફાર જોવા મળે છે.", "ncert_ref": "Class XI - Chapter 18: શરીરમાં પરિવહન (Body Fluids and Circulation)", "difficulty": "Hard", "num": 23}, {"question": "ECGમાં 'Electrical alternans' જોવા મળે છે, જેમાં QRS કોમ્પ્લેક્સની ઉંચાઈ અને આકારમાં બદલાવ થાય છે. આ કયા પરિસ્થિતિમાં જોવા મળે છે, જેમાં હૃદયના ચેમ્બરમાં પ્રવેશતી રક્તની માત્રામાં ફેરફાર થાય છે?", "options": ["A) પેરિકાર્ડિયલ એફ્યુઝન", "B) માયોકાર્ડિયલ ઇન્ફાર્કશન", "C) હાયપરટેન્શન", "D) કોરોનરી આર્ટરી ડિસીઝ"], "correct": 0, "explanation": "Electrical alternans પેરિકાર્ડિયલ એફ્યુઝન (હૃદયના આવરણમાં પાણી ભરાવા)માં જોવા મળે છે, જેમાં હૃદયના ચેમ્બરમાં પ્રવેશતી રક્તની માત્રામાં ફેરફાર થાય છે અને QRS કોમ્પ્લેક્સની ઉંચાઈ અને આકારમાં બદલાવ થાય છે. માયોકાર્ડિયલ ઇન્ફાર્કશન (B)માં ST સેગમેન્ટ એલિવેશન અથવા ડિપ્રેશન જોવા મળે છે. હાયપરટેન્શન (C) અને કોરોનરી આર્ટરી ડિસીઝ (D)માં Electrical alternans જોવા મળતું નથી.", "ncert_ref": "Class XI - Chapter 18: શરીરમાં પરિવહન (Body Fluids and Circulation)", "difficulty": "Hard", "num": 24}, {"question": "એક દર્દીના ECGમાં QRS કોમ્પ્લેક્સ પહેલાં P-લહેર હાજર નથી, પરંતુ QRS કોમ્પ્લેક્સની પહોળાઈ સામાન્ય છે અને હૃદયની ગતિ નિયમિત છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું વિધાન સૌથી યોગ્ય રીતે લાગુ પડે છે?", "options": ["A) સાયનસ નોડમાંથી ઉદ્ભવતા અતાલ હૃદયસ્પંદન (Sinus tachycardia)", "B) એટ્રિયલ ફિબ્રિલેશન સાથે જલદી વેન્ટ્રિક્યુલર રિસ્પોન્સ", "C) જંક્શનલ રિધમ (Junctional rhythm) જેમાં રિટ્રોગ્રેડ P-લહેર QRS કોમ્પ્લેક્સ પછી જોવા મળે છે", "D) વેન્ટ્રિક્યુલર ટેકિકાર્ડિયા જેમાં AV ડિસોસિયેશન જોવા મળે છે"], "correct": 2, "explanation": "યોગ્ય જવાબ C) જંક્શનલ રિધમ છે. જંક્શનલ રિધમમાં, હૃદયસ્પંદન AV જંક્શનમાંથી ઉદ્ભવે છે, જેથી P-લહેર QRS કોમ્પ્લેક્સ પહેલાં જોવા મળતી નથી. બદલે, રિટ્રોગ્રેડ P-લહેર (ઊલટી દિશામાં) QRS કોમ્પ્લેક્સ પછી જોવા મળે છે. QRS કોમ્પ્લેક્સ સામાન્ય પહોળાઈનો હોય છે કારણ કે વેન્ટ્રિકલ્સ સામાન્ય રીતે ઉત્તેજિત થાય છે. A) સાયનસ ટેકિકાર્ડિયામાં P-લહેર હંમેશા QRS પહેલાં જોવા મળે છે. B) એટ્રિયલ ફિબ્રિલેશનમાં P-લહેર હાજર નથી, પરંતુ QRS કોમ્પ્લેક્સ અનિયમિત હોય છે. D) વેન્ટ્રિક્યુલર ટેકિકાર્ડિયામાં QRS કોમ્પ્લેક્સ પહોળો હોય છે અને AV ડિસોસિયેશન જોવા મળે છે.", "ncert_ref": "Class XII - Chapter 18: શરીરમાં વહન (Body Fluids and Circulation)", "difficulty": "Hard", "num": 25}, {"question": "એક દર્દીના ECGમાં QRS કોમ્પ્લેક્સની પહોળાઈ 0.12 સેકન્ડથી વધુ છે અને V1 લીડમાં QRS કોમ્પ્લેક્સમાં 'RSR' પેટર્ન જોવા મળે છે. આ કયા વિકારનું સૂચન કરે છે?", "options": ["A) બંધ અંતરાલ (Bundle Branch Block) - જમણો", "B) બંધ અંતરાલ (Bundle Branch Block) - ડાબો", "C) હાયપરકેલેમિયા", "D) વેન્ટ્રિક્યુલર હાયપરટ્રોફી"], "correct": 0, "explanation": "જમણા બંધ અંતરાલ બ્લોક (RBBB)માં QRS કોમ્પ્લેક્સની પહોળાઈ વધી જાય છે અને V1 લીડમાં 'RSR' પેટર્ન (M-આકાર) જોવા મળે છે. ડાબા બંધ અંતરાલ બ્લોક (LBBB) (B)માં V1 લીડમાં ગહન S-લહેર જોવા મળે છે. હાયપરકેલેમિયા (C)માં QRS કોમ્પ્લેક્સ પહોળો થાય છે, પરંતુ 'RSR' પેટર્ન જોવા મળતું નથી. વેન્ટ્રિક્યુલર હાયપરટ્રોફી (D)માં QRS કોમ્પ્લેક્સની ઉંચાઈ વધી જાય છે, પરંતુ પહોળાઈ સામાન્ય રહે છે.", "ncert_ref": "Class XII - Chapter 18: શરીરમાં પરિવહન (Body Fluids and Circulation)", "difficulty": "Hard", "num": 26}, {"question": "એક દર્દીના ECGમાં V1 લીડમાં QRS કોમ્પ્લેક્સની પહોળાઈ 0.14 સેકન્ડ છે અને તેનો આકાર 'rSR' પેટર્ન દર્શાવે છે, જ્યારે અન્ય લીડ્સમાં QRS કોમ્પ્લેક્સનો આકાર સામાન્ય છે. આ ECG પેટર્ન કયા પ્રકારના વહન વિકારનું સૂચન કરે છે?", "options": ["A) ડાબા બંડલ બ્રાન્ચ બ્લોક (LBBB)", "B) જમણા બંડલ બ્રાન્ચ બ્લોક (RBBB)", "C) વોલ્ફ-પાર્કિન્સન-વ્હાઇટ (WPW) સિન્ડ્રોમ", "D) હાયપરકેલેમિયા"], "correct": 1, "explanation": "આ ECG પેટર્ન જમણા બંડલ બ્રાન્ચ બ્લોક (RBBB)નું સૂચન કરે છે, જેમાં V1 લીડમાં QRS કોમ્પ્લેક્સની પહોળાઈ 0.12 સેકન્ડથી વધુ હોય છે અને 'rSR' પેટર્ન દર્શાવે છે. LBBBમાં V1 લીડમાં QS અથવા rS પેટર્ન જોવા મળે છે. WPW સિન્ડ્રોમમાં 'Delta wave' અને ટૂંકું PR ઇન્ટરવલ જોવા મળે છે. હાયપરકેલેમિયામાં QRS પહોળું થાય છે, પરંતુ તેનો આકાર વિશિષ્ટ હોતો નથી.", "ncert_ref": "Class XII - અધ્યાય 18: શરીરમાં સંકલન અને નિયંત્રણ (હૃદયના વહન તંત્ર અને ECG પેટર્ન્સ)", "difficulty": "Hard", "num": 27}, {"question": "એક દર્દીના ECGમાં દરેક QRS કોમ્પ્લેક્સ પહેલાં P-લહેર હાજર નથી, પરંતુ QRS કોમ્પ્લેક્સની પહોળાઈ 0.10 સેકન્ડ છે અને તેનો દર 150 પ્રત ", "D) દ્વિતીય ડિગ્રી હૃદય બ્લોક (Type I - Wenckebach block)"], "correct": 3, "explanation": "PR ઇન્ટરવલ અસ્થિર હોવું અને દરેક P-લહેર પછી QRS કોમ્પ્લેક્સ હાજર હોવું તે દ્વિતીય ડિગ્રી હૃદય બ્લોક (Type I - Wenckebach block)નું લક્ષણ છે. આમાં AV નોડમાં પ્રસારણમાં વિલંબ થાય છે, જેથી PR ઇન્ટરવલ ધીમે ધીમે લાંબો થતો જાય છે અને અંતે એક P-લહેર બાદ QRS કોમ્પ્લેક્સ છૂટી જાય છે. A) SA નોડનું દબાણમાં P-લહેરની ગતિ ઘટે છે, પરંતુ PR ઇન્ટરવલ સામાન્ય રહે છે. B) એટ્રિયલ ફિબ્રિલેશનમાં P-લહેર જોવા મળતી નથી અને QRS કોમ્પ્લેક્સ અનિયમિત હોય છે. C) WPW સિન્ડ્રોમમાં PR ઇન્ટરવલ ટૂંકો હોય છે અને Delta wave જોવા મળે છે.", "ncert_ref": "Class XII - Chapter 18: શરીરમાં વહન (Body Fluids and Circulation)", "difficulty": "Hard", "num": 36}, {"question": "એક દર્દીના ECGમાં P-લહેરની આકારમાં 'નોટ્ચ્ડ' (ખાડોવાળી) જોવા મળે છે અને P-લહેરની પહોળાઈ 0.12 સેકન્ડ છે. આ કયા પરિસ્થિતિનું સૂચન કરે છે?", "options": ["A) લેફ્ટ એટ્રિયલ એનલાર્જમેન્ટ (Left atrial enlargement)", "B) રાઇટ એટ્રિયલ એનલાર્જમેન્ટ (Right atrial enlargement)", "C) એટ્રિયલ સેપ્ટલ ડિફેક્ટ (ASD)", "D) મિટ્રલ સ્ટેનોસિસ (Mitral stenosis)"], "correct": 0, "explanation": "P-લહેરની પહોળાઈ 0.12 સેકન્ડથી વધુ હોવી અને તેની આકાર 'નોટ્ચ્ડ' (ખાડોવાળી) હોવી તે લેફ્ટ એટ્રિયલ એનલાર્જમેન્ટનું લક્ષણ છે. B) રાઇટ એટ્રિયલ એનલાર્જમેન્ટમાં P-લહેરની ઉંચાઈ વધે છે અને તેની આકાર 'પીક્ડ' (નોકદાર) હોય છે. C) ASDમાં P-લહેરની પહોળાઈ સામાન્ય રહે છે અને તેની આકાર 'નોટ્ચ્ડ' જોવા મળતી નથી. D) મિટ્રલ સ્ટેનોસિસમાં P-લહેરની પહોળાઈ અને ઉંચાઈ બંને વધે છે, પરંતુ તેની આકાર 'નોટ્ચ્ડ' જોવા મળતી નથી.", "ncert_ref": "Class XII - Chapter 18: શરીરમાં વહન (Body Fluids and Circulation)", "difficulty": "Hard", "num": 37}, {"question": "એક દર્દીના ECGમાં V1 લીડમાં QRS કોમ્પ્લેક્સની પહોળાઈ 0.12 સેકન્ડથી વધુ છે અને R-લહેર પ્રગતિશીલ રીતે વધતી જોવા મળે છે (R-લહેર પ્રોગ્રેસિવલી ઇન્ક્રીઝ). આ પરિસ્થિતિ કયા વિકારનું સૂચન કરે છે?", "options": ["A) ડાબા બંધારણના બ્લોક (Left Bundle Branch Block - LBBB)", "B) જમણા બંધારણના બ્લોક (Right Bundle Branch Block - RBBB)", "C) હૃદયના કોથળના હાયપરટ્રોફી (Ventricula , "correct": 1, "explanation": "જમણા બંધારણી બ્લોક (RBBB)માં QRS કોમ્પ્લેક્સની પહોળાઈ 0.12 સેકન્ડથી વધુ હોય છે અને V1 લીડમાં 'rsR’' પેટર્ન જોવા મળે છે. ડાબા બંધારણી બ્લોક (LBBB)માં V1 લીડમાં QRS કોમ્પ્લેક્સ 'QS' અથવા 'rS' પેટર્ન દર્શાવે છે. વોલ્ફ-પાર્કિનસન-વ્હાઇટ સિન્ડ્રોમમાં PR ઇન્ટરવલ ટૂંકું હોય છે અને ડેલ્ટા લહેર જોવા મળે છે. હાયપરકેલેમિયામાં QRS કોમ્પ્લેક્સ પહોળો થાય છે અને T-લહેર નોકદાર થાય છે.", "ncert_ref": "Class XII - Chapter 18: શરીરમાં પરિવહન (Body Fluids and Circulation)", "difficulty": "Hard", "num": 40}, {"question": "એક દર્દીના ECGમાં PR ઇન્ટરવલ 0.10 સેકન્ડ છે અને દરેક QRS કોમ્પ્લેક્સની શરૂઆતમાં એક નાની, તીક્ષ્ણ લહેર જોવા મળે છે. આ લહેરનું નામ શું છે અને તે કયા સિન્ડ્રોમ સાથે સંકળાયેલ છે?", "options": ["A) U-લહેર, હાઇપોકેલેમિયા", "B) Delta wave, વુલ્ફ-પાર્કિન્સન-વ્હાઇટ સિન્ડ્રોમ", "C) J-લહેર, હાઇપોથર્મિયા", "D) Osborn wave, હાઇપરકેલેમિયા"], "correct": 1, "explanation": "આ લહેર Delta wave તરીકે ઓળખાય છે, જે વુલ્ફ-પાર્કિન્સન-વ્હાઇટ (WPW) સિન્ડ્રોમનું લક્ષણ છે. WPW સિન્ડ્રોમમાં, એક વધારાનો વહન માર્ગ (accessory pathway) હાજર હોય છે, જે એટ્રિયા અને વેન્ટ્રિકલ્સ વચ્ચે વિદ્યુતીય સંકેતોનું અસામાન્ય વહન કરે છે, જેના કારણે PR ઇન્ટરવલ ટૂંકું થાય છે અને QRS કોમ્પ્લેક્સની શરૂઆતમાં Delta wave જોવા મળે છે. U-લહેર હાઇપોકેલેમિયા સાથે, J-લહેર હાઇપોથર્મિયા સાથે અને Osborn wave પણ હાઇપોથર્મિયા સાથે સંકળાયેલ છે.", "ncert_ref": "Class XII - પ્રકરણ 18: શરીરમાં પ્રવાહીઓનું પરિવહન", "difficulty": "Hard", "num": 41}, {"question": "એક દર્દીના ECGમાં QRS કોમ્પ્લેક્સની ઉંચાઈ અને આકારમાં વૈકલ્પિક ફેરફારો (alternating changes) જોવા મળે છે, જ્યારે દર્દી ઊંડા શ્વાસ લે છે. આ ECG પેટર્નનું નામ શું છે અને તે કયા પરિસ્થિતિ સાથે સંકળાયેલ છે?", "options": ["A) Electrical alternans, પેરિકાર્ડિયલ ઇફ્યુઝન", "B) Wandering baseline, શ્વસનની ગતિ", "C) Atrial flutter, એટ્રિયલ એરિથમિયા", "D) Ventricular fibrillation, વેન્ટ્રિક્યુલર એરિથમિયા"], "correct": 0, "explanation": "આ ECG પેટર્નને Electrical alternans કહેવાય છે, જે સામાન્ય રીતે પેરિકાર્ડિયલ ઇફ્યુઝન (હૃદયની આસપાસ પ્રવાહી એકત્ર થવું) સાથે સંકળાયેલ છે. આ પરિસ્થિતિમાં, હૃદય શ્વાસોચ્છવાસ દરમિયાન પેરિકાર્ડિયલ સેકમાં આગળ-પાછળ હલે છે, જેના કારણે QRS કોમ્પ્લેક્સની ઉંચાઈ અને આકારમાં વૈકલ્પિક ફેરફારો જોવા મળે છે. Wandering baseline શ્વસનની ગતિ સાથે સંકળાયેલ છે, પરંતુ તેમાં QRS કોમ્પ્લેક્સની ઉંચાઈમાં વૈકલ્પિક ફેરફારો જોવા મળતા નથી. Atrial flutter અને Ventricular fibrillationમાં આ પ્રકારની પેટર્ન જોવા મળતી નથી.", "ncert_ref": "Class XII - પ્રકરણ 18: શરીરમાં પ્રવાહીઓનું પરિવહન", "difficulty": "Hard", "num": 42}, {"question": "એક દર્દીના ECGમાં દરેક QRS કૉમ્પ્લેક્સ પહેલાં P-લહેર હાજર છે, પરંતુ V1 લીડમાં QRS કૉમ્પ્લેક્સનો પ્રારંભિક ભાગ ઋણ (negative) છે અને તેની પહોળાઈ 0.10 સેકન્ડ છે. આ ECG પેટર્ન કયા વિકારનું સૂચન કરે છે જે સામાન્ય રીતે કયા વાલ્વના રોગ સાથે સંકળાયેલ છે?", "options": ["A) ડાબા બંડલ બ્રાન્ચ બ્લૉક (LBBB) - મિટ્રલ વાલ્વ સ્ટેનોસિસ", "B) જમણા બંડલ બ્રાન્ચ બ્લૉક (RBBB) - પલ્મોનરી વાલ્વ સ્ટેનોસિસ", "C) ડાબા બંડલ બ્રાન્ચ બ્લૉક (LBBB) - એઓર્ટિક વાલ્વ રિગર્ગિટેશન", "D) જમણા બંડલ બ્રાન્ચ બ્લૉક (RBBB) - ટ્રાઇકસ્પિડ વાલ્વ સ્ટેનોસિસ"], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે. V1 લીડમાં QRS કૉમ્પ્લેક્સનો પ્રારંભિક ભાગ ઋણ હોવો અને પહોળાઈ 0.10 સેકન્ડ હોવી એ જમણા બંડલ બ્રાન્ચ બ્લૉક (RBBB) નું લક્ષણ છે. RBBB સામાન્ય રીતે પલ્મોનરી વાલ્વ સ્ટેનોસિસ અથવા જમણા ક્ષેપકના વધેલા ભાર સાથે સંકળાયેલ છે. વિકલ્પ A ખોટો છે કારણ કે LBBBમાં V1 લીડમાં QRS કૉમ્પ્લેક્સનો પ્રારંભિક ભાગ ઋણ હોતો નથી અને તેની પહોળાઈ 0.12 સેકન્ડથી વધુ હોય છે. વિકલ્પ C ખોટો છે કારણ કે LBBB એઓર્ટિક વાલ્વ રિગર્ગિટેશન સાથે સંકળાયેલ નથી. વિકલ્પ D ખોટો છે કારણ કે RBBB ટ્રાઇકસ્પિડ વાલ્વ સ્ટેનોસિસ સાથે સીધો સંબંધિત નથી.", "ncert_ref": "Class XII - અધ્યાય 18: શરીર પ્રવાહીઓ અને પરિવહન", "difficulty": "Hard", "num": 43}, {"question": "એક દર્દીના ECGમાં V1 લીડમાં QRS કૉમ્પ્લેક્સનો પ્રારંભિક ભાગ નકારાત્મક (initial negative deflection) છે, ત્યારબાદ ઉંચો R-તરંગ અને પછી ઊંડો S-તરંગ જોવા મળે છે. આ ECG પેટર્ન કયા પ્રકારના હૃદય બ્લૉક અથવા વિકારનું સૂચન કરે છે?", "options": ["A) ડાબા બંડલ બ્રાન્ચ બ્લૉક (Left Bundle Branch Block - LBBB)", "B) જમણા બંડલ બ્રાન્ચ બ્લૉક (Right Bundle Branch Block - RBBB)", "C) વોલ્ફ-પાર્કિન્સન-વ્હાઇટ સિન્ડ્રોમ (WPW Syndrome)", "D) હાયપરકેલેમિયા (Hyperkalemia)"], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B) જમણા બંડલ બ્રાન્ચ બ્લૉક (RBBB) છે. \n\nકારણ: \n- V1 લીડમાં QRS કૉમ્પ્લેક્સનો પ્રારંભિક ભાગ નકારાત્મક (initial negative deflection) હોય, ત્યારબાદ ઉંચો R-તરંગ અને પછી ઊંડો S-તરંગ (rSR' પેટર્ન) જોવા મળે છે, જે RBBBની વિશિષ્ટ પેટર્ન છે. \n- RBBBમાં જમણા વેન્ટ્રિકલનું વિલંબિત ડિપોલરાઇઝેશન થાય છે, જેના કારણે V1 લીડમાં આ પ્રકારની પેટર્ન જોવા મળે છે.\n\nઅન્ય વિકલ્પો ખોટા છે કારણ કે: \n- A) LBBBમાં V1 લીડમાં QS અથવા rS પેટર્ન જોવા મળે છે, જેમાં પ્રારંભિક ભાગ નકારાત્મક હોય પરંતુ ઉંચો R-તરંગ હોતો નથી.\n- C) WPW સિન્ડ્રોમમાં 'Delta wave' અને ટૂંકું PR ઇન્ટરવલ જોવા મળે છે, પરંતુ V1 લીડમાં rSR' પેટર્ન હોતી નથી.\n- D) હાયપરકેલેમિયામાં QRS કૉમ્પ્લેક્સ પહોળો થાય છે અને T-લહેર ઉંચી થાય છે, પરંતુ V1 લીડમાં rSR' પેટર્ન હોતી નથી.", "ncert_ref": "Class XII - Chapter 18: શરીરમાં પ્રવાહીઓનું પરિવહન (Body Fluids and Circulation)", "difficulty": "Hard", "num": 44}, {"question": "એક દર્દીના ECGમાં V1 લીડમાં QRS કોમ્પ્લેક્સનો પ્રારંભિક ભાગ નકારાત્મક (initial negative deflection) છે અને V6 લીડમાં પ્રારંભિક ભાગ ધનાત્મક (initial positive deflection) છે. આ કયા પરિસ્થિતિનું સૂચન કરે છે?", "options": ["A) રાઇટ વેન્ટ્રિક્યુલર હાયપરટ્રોફી", "B) લેફ્ટ વેન્ટ્રિક્યુલર હાયપરટ્રોફી", "C) ડેક્સ્ટ્રોકાર્ડિયા", "D) પલ્મોનરી હાયપરટેન્શન"], "correct": 1, "explanation": "લેફ્ટ વેન્ટ્રિક્યુલર હાયપરટ્રોફીમાં, V1 લીડમાં QRS કોમ્પ્લેક્સનો પ્રારંભિક ભાગ નકારાત્મક હોય છે અને V6 લીડમાં ધનાત્મક હોય છે, કારણ કે લેફ્ટ વેન્ટ્રિકલના વીજળીના પ્રભાવમાં વધારો થાય છે. રાઇટ વેન્ટ્રિક્યુલર હાયપરટ્રોફીમાં V1 લીડમાં પ્રારંભિક ભાગ ધનાત્મક હોય છે. ડેક્સ્ટ્રોકાર્ડિયામાં સંપૂર્ણ ECG લીડ્સમાં ઉલટા ચિહ્નો જોવા મળે છે. પલ્મોનરી હાયપરટેન્શનમાં રાઇટ વેન્ટ્રિક્યુલર હાયપરટ્રોફી જોવા મળે છે.", "ncert_ref": "Class XII - Chapter 18: Body Fluids and Circulation", "difficulty": "Hard", "num": 45}, {"question": "એક દર્દીના ECGમાં P-લહેરની આકારમાં 'બાયફિડ' (દ્વિભાજિત) દેખાય છે         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};

        function selectOption(qIndex,optIndex){

            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);

                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
