    <script>
        const questionsData = [{"question": "શ્વસન પ્રક્રિયા દરમિયાન, ગ્લૂકોઝના પૂર્ણ ઓક્સીડેશનથી ઉત્પન્ન થતી ATPની કુલ સંખ્યા કેટલી હોય છે? (આરોગ્યપ્રદ સ્થિતિમાં, એક મોલ ગ્લૂકોઝ પર ધ્યાન કેન્દ્રિત કરો)", "options": ["A) 2 ATP", "B) 8 ATP", "C) 30-32 ATP", "D) 36-38 ATP"], "correct": 3, "explanation": "પૂર્ણ ઓક્સીડેટિવ શ્વસનમાં, એક મોલ ગ્લૂકોઝના પૂર્ણ જ્વલનથી 36-38 ATP ઉત્પન્ન થાય છે. ગ્લાયકોલાઇસીસ (2 ATP), ક્રેબ્સ ચક્ર (2 ATP), અને ઇલેક્ટ્રોન ટ્રાન્સપોર્ટ ચેઇન (32-34 ATP) મળીને આ કુલ મળે છે. વિકલ્પ A અને B અપૂર્ણ શ્વસન અથવા ગ્લાયકોલાઇસીસ સુધી મર્યાદિત પ્રક્રિયાને દર્શાવે છે. વિકલ્પ C ક્રેબ્સ ચક્ર અને ETC ના અંશતઃ સરવૈકલ્પિક ગણતરીને દર્શાવે છે, પરંતુ પૂર્ણ પ્રક્રિયા માટે D યોગ્ય છે.", "ncert_ref": "Class XI - પ્રકરણ 14: શ્વસન અને ઉર્જા", "difficulty": "Hard", "num": 1}, {"question": "શ્વસન દરમિયાન, સાયટોક્રોમ c ની ભૂમિકા શું છે?", "options": ["A) ગ્લૂકોઝને પાયરૂવિક એસિડમાં ફેરવવું", "B) ઇલેક્ટ્રોન ટ્રાન્સપોર્ટ ચેઇનમાં ઇલેક્ટ્રોન વહન કરવું", "C) ક્રેબ્સ ચક્રમાં સક્રિય થવું", "D) ઓક્સિજનને પાણીમાં રૂપાંતરિત કરવું"], "correct": 1, "explanation": "સાયટોક્રોમ c ઇલેક્ટ્રોન ટ્રાન્સપોર્ટ ચેઇન (ETC) માં ઇલેક્ટ્રોન વહન કરે છે, જે ATP સિંથેઝ માટે જરૂરી પ્રોટોન ગ્રેડિયન્ટ બનાવવામાં મદદ કરે છે. વિકલ્પ A ગ્લાયકોલાઇસીસની પ્રક્રિયા છે, વિકલ્પ C ક્રેબ્સ ચક્ર સાથે સંબંધિત છે, અને વિકલ્પ D સાયટોક્રોમ c ઓક્સિડેઝની ભૂમિકા છે, ન કે સાયટોક્રોમ c ની.", "ncert_ref": "Class XI - પ્રકરણ 14: શ્વસન અને ઉર્જા", "difficulty": "Hard", "num": 2}, {"question": "જો કોઈ વ્યક્તિની શ્વાસોચ્છવાસ પ્રણાલીમાં સર્ફેક્ટન્ટની ઉણપ હોય, તો કયો પરિણામ થશે?", "options": ["A) ફેફસાંની લચકતામાં વધારો થશે", "B) ફેફસાંના એલ્વિઓલી સંકોચાઈ જશે", "C) ઓક્સિજન અને કાર્બન ડાયોક્સાઇડના વિનિમયમાં ઘટાડો થશે", "D) રક્તમાં હીમોગ્લોબિનની માત્રામાં વધારો થશે"], "correct": 2, "explanation": "સર્ફેક્ટન્ટ એલ્વિઓલીની સપાટી પર તણાવ ઘટાડે છે અને એલ્વિઓલીને ફૂલવાનું ટાળે છે. તેની ઉણપથી એલ્વિઓલી સંકોચાઈ જાય છે, જે ઓક્સિજન અને કાર્બન ડાયોક્સાઇડના વિનિમયને અસર કરે છે. વિકલ્પ A સર્ફેક્ટન્ટની ભૂમિકાને ઉલટાવે છે, વિકલ્પ B એલ્વિઓલી સંકોચાઈ જવાન         let userAnswers = {};

                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;

            if(quizSubmitted) return;

            });

            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
