<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - ઓક્સિજનનું પરિવહન</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 ઓક્સિજનનું પરિવહન</span>
                <span>🎯 Hard</span>
                <span>📝 71 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "મનુષ્યમાં ઓક્સિજનનું પરિવહન કરતી હીમોગ્લોબિનની રચનામાં કયો ધાતુ આયન સહભાગી હોય છે?", "options": ["A) લોખંડ (Fe²⁺)", "B) કોપર (Cu²⁺)", "C) ઝિંક (Zn²⁺)", "D) મેગ્નેશિયમ (Mg²⁺)"], "correct": 0, "explanation": "હીમોગ્લોબિનમાં હીમ સમૂહમાં લોખંડ (Fe²⁺) આયન હોય છે, જે ઓક્સિજન સાથે રાસાયણિક બંધન બનાવીને ઓક્સિહીમોગ્લોબિન બનાવે છે. કોપર, ઝિંક અને મેગ્નેશિયમ હીમોગ્લોબિનની રચનામાં સહભાગી નથી. કોપર સાયટોક્રોમ ઓક્સિડેઝમાં, ઝિંક કાર્બનિક એન્ઝાઇમમાં અને મેગ્નેશિયમ ક્લોરોફિલમાં સહભાગી હોય છે.", "ncert_ref": "Class XII - પ્રકરણ 16: શ્વસન અને ગેસીય વિનિમય", "difficulty": "Hard", "num": 1}, {"question": "ઓક્સિજન-હીમોગ્લોબિન વક્ર (Oxygen-Haemoglobin Dissociation Curve) ની આકાર કેવી હોય છે?", "options": ["A) રેખીય (Linear)", "B) હાઇપરબોલિક (Hyperbolic)", "C) સિગ્મોઇડ (Sigmoid)", "D) વર્તુળાકાર (Circular)"], "correct": 2, "explanation": "ઓક્સિજન-હીમોગ્લોબિન વક્ર સિગ્મોઇડ (S-આકાર) હોય છે, કારણ કે હીમોગ્લોબિનમાં ઓક્સિજન સાથે બંધન કોઓપરેટિવ (Cooperative binding) પ્રકારનું હોય છે. રેખીય વક્ર એકલા પ્રોટીન માટે, હાઇપરબોલિક વક્ર એન્ઝાઇમ-સબસ્ટ્રેટ બંધન માટે અને વર્તુળાકાર વક્ર કોઈ જૈવિક પ્રણાલીમાં જોવા મળતું નથી.", "ncert_ref": "Class XII - પ્રકરણ 16: શ્વસન અને ગેસીય વિનિમય", "difficulty": "Hard", "num": 2}, {"question": "જ્યારે રુધિરમાં CO₂ નું પ્રમાણ વધે છે, ત્યારે ઓક્સિજન-હીમોગ્લોબિન બંધન પર શું અસર થાય છે?", "options": ["A) ઓક્સિજન સાથે બંધન વધે છે", "B) ઓક્સિજન સાથે બંધન ઘટે છે", "C) કોઈ ફેરફાર થતો નથી", "D) હીમોગ્લોબિન નિષ્ક્રિય બને છે"], "correct": 1, "explanation": "CO₂ નું પ્રમાણ વધવાથી રુધિરનું pH ઘટે છે (એસિડિક બને છે), જે બોહર અસર (Bohr Effect) દ્વારા ઓક્સિજન-હીમોગ્લોબિન બંધનને ઘટાડે છે. આથી ઓક્સિજન હીમોગ્લોબિનથી અલગ પડે છે અને પેશીઓમાં મુક્ત થાય છે. ઓક્સિજન બંધન વધવું, કોઈ ફેરફાર ન થવો અથવા હીમોગ્લોબિન નિષ્ક્રિય થવું એ બધા અશક્ય છે.", "ncert_ref": "Class XII - પ્રકરણ 16: શ્વસન અને ગેસીય વિનિમય", "difficulty": "Hard", "num": 3}, {"question": "ફુફ્ફુસમાં ઓક્સિજનનું પરિવહન કયા પ્રકારના પરિવહન દ્વારા થાય છે?", "options": ["A) સક્રિય પરિવહન (Active Transport)", "B) નિષ્ક્રિય પરિવહન (Passive Transport)", "C) એન્ડોસાયટોસિસ (Endocytosis)", "D) એક્સોસાયટોસિસ (Exocytosis)"], "correct": 1, "explanation": "ફુફ્ફુસમાં ઓક્સિજનનું પરિવહન નિષ્ક્રિય પરિવહન (ડિફ્યુઝન) દ્વારા થાય છે, કારણ કે ઓક્સિજન ઉચ્ચ સાંદ્રતાવાળા વિસ્તાર (આલ્વિઓલી) થી નીચી સાંદ્રતાવાળા વિસ્તાર (રુધિર કેપિલરી) તરફ વહન પામે છે. સક્રિય પરિવહન, એન્ડોસાયટોસિસ અને એક્સોસાયટોસિસ એ ઓક્સિજન પરિવહન માટે લાગુ પડતું નથી.", "ncert_ref": "Class XII - પ્રકરણ 16: શ્વસન અને ગેસીય વિનિમય", "difficulty": "Hard", "num": 4}, {"question": "હીમોગ્લોબિનની ઓક્સિજન બંધન ક્ષમતા પર તાપમાનની અસર કેવી હોય છે?", "options": ["A) તાપમાન વધવાથી ઓક્સિજન બંધન ક્ષમતા વધે છે", "B) તાપમાન ઘટવાથી ઓક્સિજન બંધન ક્ષમતા ઘટે છે", "C) તાપમાન વધવાથી ઓક્સિજન બંધન ક્ષમતા ઘટે છે", "D) તાપમાનનો કોઈ પ્રભાવ પડતો નથી"], "correct": 2, "explanation": "તાપમાન વધવાથી હીમોગ્લોબિનની ઓક્સિજન બંધન ક્ષમતા ઘટે છે, કારણ કે ઉચ્ચ તાપમાને હીમોગ્લોબિનની રચના અસ્થિર બને છે અને ઓક્સિજન સાથે બંધન તોડી નાખે છે. આથી ઉચ્ચ તાપમાને ઓક્સિજન હીમોગ્લોબિનથી અલગ પડે છે. તાપમાન ઘટવાથી બંધન ક્ષમતા વધે છે, પરંતુ તાપમાન વધવાથી ઘટે છે. તાપમાનનો કોઈ પ્રભાવ ન પડવો એ ખોટું છે.", "ncert_ref": "Class XII - પ્રકરણ 16: શ્વસન અને ગેસીય વિનિમય", "difficulty": "Hard", "num": 5}, {"question": "ફુફ્ફુસીય ધમનીમાં રહેલા રુધિરમાં ઓક્સિજનનું પ્રમાણ અને ફુફ્ફુસીય શિરામાં રહેલા રુધિરમાં ઓક્સિજનનું પ્રમાણ વચ્ચેનો તફાવત કયા કારણસર થાય છે?", "options": ["A) ફુફ્ફુસીય ધમનીમાં રુધિર ઓક્સિજનયુક્ત હોય છે જ્યારે ફુફ્ફુસીય શિરામાં રુધિર ઓક્સિજનવિહીન હોય છે", "B) ફુફ્ફુસીય ધમનીમાં રુધિર કાર્બન ડાયોક્સાઇડયુક્ત હોય છે જ્યારે ફુફ્ફુસીય શિરામાં રુધિર ઓક્સિજનયુક્ત હોય છે", "C) ફુફ્ફુસીય ધમનીમાં રુધિર ઓક્સિજનવિહીન હોય છે જ્યારે ફુફ્ફુસીય શિરામાં રુધિર ઓક્સિજનયુક્ત હોય છે", "D) ફુફ્ફુસીય ધમનીમાં રુધિર ઓક્સિજનયુક્ત હોય છે જ્યારે ફુફ્ફુસીય શિરામાં રુધિર ઓક્સિજનયુક્ત અને કાર્બન ડાયોક્સાઇડયુક્ત હોય છે"], "correct": 2, "explanation": "ફુફ્ફુસીય ધમની દ્વારા હૃદયથી ફુફ્ફુસ તરફ ઓક્સિજનવિહીન રુધિર વહન પામે છે, જ્યારે ફુફ્ફુસીય શિરા દ્વારા ફુફ્ફુસથી હૃદય તરફ ઓક્સિજનયુક્ત રુધિર ર પણ થાય છે, પરંતુ તે HbA કરતાં ઓછી હોય છે.", "ncert_ref": "Class XII - Chapter 27: મનુષ્યમાં શ્વસન અને ગેસનું વિનિમય", "difficulty": "Hard", "num": 30}, {"question": "ભ્રૂણીય હીમોગ્લોબિન (HbF) ની ઓક્સિજન સાથેની સહસંયોજકતા પ્રૌઢ હીમોગ્લોબિન (HbA) કરતાં વધુ હોય છે. આનું મુખ્ય કારણ કયું છે?", "options": ["A) HbF માં 2,3-બાઇસફોસ્ફોગ્લિસરેટ (2,3-BPG) સાથેની બંધન ક્ષમતા ઓછી હોય છે", "B) HbF માં હીમ ગ્રુપની સંખ્યા વધુ હોય છે", "C) HbF ની પ્રાથમિક રચનામાં અલ્ફા-સબયુનિટની જગ્યાએ બીટા-સબયુનિટ હોય છે", "D) HbF ની તૃતીયક રચના વધુ સ્થિર હોય છે"], "correct": 0, "explanation": "HbF ની ઓક્સિજન સાથેની સહસંયોજકતા વધુ હોવાનું મુખ્ય કારણ એ છે કે HbF માં 2,3-BPG સાથેની બંધન ક્ષમતા ઓછી હોય છે, જેથી 2,3-BPG ઓક્સિજન બંધનને અવરોધે નહીં. બાકીના વિકલ્પો ખોટા છે: HbF અને HbA બંનેમાં હીમ ગ્રુપની સંખ્યા સરખી હોય છે (A ખોટું), HbF માં અલ્ફા-સબયુનિટ સાથે ગામા-સબયુનિટ હોય છે, બીટા નહીં (B ખોટું), અને તૃતીયક રચનાની સ્થિરતા ઓક્સિજન બંધન ક્ષમતાને અસર કરતી નથી (D ખોટું).", "ncert_ref": "Class XII - પ્રકરણ 27: મનુષ્યમાં શ્વસન અને ગેસનું વિનિમય", "difficulty": "Hard", "num": 31}, {"question": "જ્યારે રુધિરમાં કાર્બન ડાયોક્સાઇડ (CO₂) નું પ્રમાણ અચાનક વધે છે, ત્યારે ઓક્સિજન-હીમોગ્લોબિન વક્ર પર શું અસર થાય છે?", "options": ["A) વક્ર ડાબી બાજુ ખસે છે, જેથી ઓક્સિજન બંધન ક્ષમતા વધે છે", "B) વક્ર જમણી બાજુ ખસે છે, જેથી ઓક્સિજન બંધન ક્ષમતા ઘટે છે", "C) વક્રનો આકાર સીધો થાય છે, પરંતુ સ્થાન બદલાતું નથી", "D) વક્ર પર કોઈ અસર થતી નથી, કારણ કે CO₂ અને O₂ વચ્ચે કોઈ પ્રતિક્રિયા થતી નથી"], "correct": 1, "explanation": "CO₂ નું પ્રમાણ વધવાથી રુધિરનું pH ઘટે છે (એસિડિક બને છે), જેથી બોહર અસર (Bohr Effect) લાગુ પડે છે. આથી ઓક્સિજન-હીમોગ્લોબિન વક્ર જમણી બાજુ ખસે છે, જેથી ઓક્સિજન બંધન ક્ષમતા ઘટે છે અને ઓક્સિજનનું વહન પેશીઓ તરફ સરળ બને છે. A ખોટું છે કારણ કે વક્ર ડાબી બાજુ ખસે તો બંધન ક્ષમતા વધે, જે CO₂ વધવાથી થતું નથી. C અને D ખોટા છે કારણ કે CO₂ અને O₂ વચ્ચે અપ્રત્યક્ષ પ્રતિક્રિયા (pH દ્વારા) થાય છે અને વક્રનો આકાર બદલાતો નથી, સ્થાન બદલાય છે.", "ncert_ref": "Class XII - પ્રકરણ 27: મનુષ્યમાં શ્વસન અને ગેસનું વિનિમય", "diffi ે."], "correct": 3, "explanation": "ભ્રૂણીય હીમોગ્લોબિન (HbF) ની ઓક્સિજન સાથેની સહસંયોજકતા માતાના હીમોગ્લોબિન (HbA) કરતાં વધુ હોય છે, જેથી ઓક્સિજન ભ્રૂણ તરફ વહન પામે છે. A ખોટું છે કારણ કે માતાના રુધિરમાં ઓક્સિજનનું આંશિક દબાણ ભ્રૂણ કરતાં વધુ હોય છે. B ખોટું છે કારણ કે HbF ની સહસંયોજકતા વધુ હોય છે. C ખોટું છે કારણ કે ઓક્સિજનનું વહન વરસાદી પરિવહન (ડિફ્યુઝન) દ્વારા થાય છે, સક્રિય પરિવહન દ્વારા નહીં.", "ncert_ref": "Class XII - Chapter 16: મનુષ્યમાં પરિવહન", "difficulty": "Hard", "num": 53}, {"question": "એક વ્યક્તિને તીવ્ર કાર્બન મોનોક્સાઇડ (CO) ઝેર થયું છે. આ સ્થિતિમાં નીચેનામાંથી કયું પરિણામ **સૌથી ઓછું સંભવિત** છે?", "options": ["A) ઓક્સિજન-હીમોગ્લોબિન વક્ર ડાબી તરફ ખસશે", "B) કાર્બોક્સીહીમોગ્લોબિનનું નિર્માણ થશે", "C) હીમોગ્લોબિનની ઓક્સિજન બંધન ક્ષમતા ઘટશે", "D) પેશીઓમાં ઓક્સિજનનું પ્રમાણ વધશે"], "correct": 3, "explanation": "કાર્બન મોનોક્સાઇડ (CO) હીમોગ્લોબિન સાથે કાર્બોક્સીહીમોગ્લોબિન બનાવે છે, જે ઓક્સિજન સાથેની સ્પર્ધામાં જીતે છે અને હીમોગ્લોબિનની ઓક્સિજન બંધન ક્ષમતા ઘટાડે છે. આને કારણે ઓક્સિજન-હીમોગ્લોબિન વક્ર ડાબી તરફ ખસે છે (વિકલ્પ A અને B સાચા છે). પરંતુ પેશીઓમાં ઓક્સિજનનું પ્રમાણ ઘટશે, કારણ કે ઓક્સિજનનું પરિવહન અવરોધાય છે. તેથી વિકલ્પ D સૌથી ઓછું સંભવિત છે.", "ncert_ref": "Class XI - અધ્યાય 17: શ્વાસોચ્છવાસ અને વાયુઓનું વિનિમય", "difficulty": "Hard", "num": 54}, {"question": "નીચેનામાંથી કયું વિધાન **2,3-બાઇસફોસ્ફોગ્લિસરેટ (2,3-BPG)** ની હીમોગ્લોબિન પરની અસર વિશે **ખોટું** છે?", "options": ["A) 2,3-BPG નું પ્રમાણ વધતા ઓક્સિજન-હીમોગ્લોબિન વક્ર જમણી તરફ ખસે છે", "B) 2,3-BPG હીમોગ્લોબિનની ઓક્સિજન બંધન ક્ષમતા ઘટાડે છે", "C) 2,3-BPG ની હાજરીમાં હીમોગ્લોબિન ઓક્સિજનને વધુ સરળતાથી મુક્ત કરે છે", "D) 2,3-BPG નું પ્રમાણ વધતા ઓક્સિજન-હીમોગ્લોબિન વક્ર ડાબી તરફ ખસે છે"], "correct": 3, "explanation": "2,3-BPG હીમોગ્લોબિન સાથે જોડાઈને તેની ઓક્સિજન બંધન ક્ષમતા ઘટાડે છે, જેના કારણે ઓક્સિજન-હીમોગ્લોબિન વક્ર જમણી તરફ ખસે છે (વિકલ્પ A, B અને C સાચા છે). વિકલ્પ D ખોટું છે કારણ કે 2,3-BPG નું પ્રમાણ વધતા વક્ર ડાબી તરફ નહીં, પરંતુ જમણી તરફ ખસે છે.", "ncert_ref": "Class XI - અધ્ય tion": "ભ્રૂણીય હીમોગ્લોબિન (HbF) માં, ઓક્સિજન સાથેની સહસંયોજકતા વધુ હોવા પાછળનું મુખ્ય કારણ કયું છે?", "options": ["A) HbF માં આલ્ફા-કેટોન ગ્રુપની હાજરી", "B) HbF માં ગામા સબયુનિટની હાજરી અને 2,3-BPG સાથેની ઓછી બંધન ક્ષમતા", "C) HbF માં હીમ ગ્રુપની સંખ્યા વધુ હોવી", "D) HbF માં આયર્ન (Fe) ની ઓક્સિડેશન સ્થિતિ +3 હોવી"], "correct": 1, "explanation": "HbF માં ગામા સબયુનિટની હાજરી અને 2,3-BPG સાથે ઓછી બંધન ક્ષમતા હોવાને કારણે ઓક્સિજન સાથેની સહસંયોજકતા વધુ હોય છે. આલ્ફા-કેટોન ગ્રુપ HbF માં હાજર નથી. HbF અને HbA બંનેમાં હીમ ગ્રુપની સંખ્યા સરખી હોય છે. HbF માં આયર્ન (Fe) ની ઓક્સિડેશન સ્થિતિ +2 હોય છે, +3 નહીં.", "ncert_ref": "Class XII - Chapter 16: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 58}, {"question": "નીચેનામાંથી કયું કથન 2,3-બાઇસફોસ્ફોગ્લિસરેટ (2,3-BPG) વિશે ખોટું છે?", "options": ["A) 2,3-BPG હીમોગ્લોબિનની ઓક્સિજન સહસંયોજકતા ઘટાડે છે", "B) 2,3-BPG એરિથ્રોસાઇટ્સમાં ગ્લાયકોલિસિસ દરમિયાન ઉત્પન્ન થાય છે", "C) 2,3-BPG હીમોગ્લોબિનના બીટા સબયુનિટ સાથે બંધન કરે છે", "D) 2,3-BPG નું પ્રમાણ ઉંચાઈવાળા પ્રદેશમાં ઘટે છે"], "correct": 3, "explanation": "2,3-BPG હીમોગ્લોબિનની ઓક્સિજન સહસંયોજકતા ઘટાડે છે, એરિથ્રોસાઇટ્સમાં ગ્લાયકોલિસિસ દરમિયાન ઉત્પન્ન થાય છે, અને હીમોગ્લોબિનના બીટા સબયુનિટ સાથે બંધન કરે છે. પરંતુ ઉંચાઈવાળા પ્રદેશમાં 2,3-BPG નું પ્રમાણ વધે છે, નહીં કે ઘટે.", "ncert_ref": "Class XI - Chapter 17: શ્વસન અને ગેસનું વિનિમય", "difficulty": "Hard", "num": 59}, {"question": "નીચેનામાંથી કયું કથન **કાર્બોક્સીહીમોગ્લોબિન (Carboxyhaemoglobin)** ની રચના અને અસર વિશે **સાચું નથી**?", "options": ["A) કાર્બન મોનોક્સાઇડ (CO) હીમોગ્લોબિન સાથે સહસંયોજન બંધન બનાવે છે, જે ઓક્સિજન બંધન માટેની જગ્યા અવરોધે છે.", "B) કાર્બોક્સીહીમોગ્લોબિન (COHb) ની રચના થવાથી હીમોગ્લોબિનની ઓક્સિજન પરિવહન ક્ષમતા ઘટે છે.", "C) CO અને હીમોગ્લોબિન વચ્ચેનું બંધન અસ્થિર હોય છે, જે ઝડપથી તૂટી જાય છે.", "D) CO ની હાજરીમાં, ઓક્સિજન-હીમોગ્લોબિન વક્ર ડાબી તરફ ખસે છે, જે ઓક્સિજન બંધન ક્ષમતા ઘટાડે છે."], "correct": 2, "explanation": "વિકલ્પ C ખોટો છે કારણ કે CO અને હીમોગ્લોબિન વચ્ચેનું બંધન **અત્યંત સ્થિર** હોય છે, જે ઓક્સિજન બંધનને અવરોધે છે. CO હીમોગ્લોબિન સાથે સહસંયોજન બંધન બનાવે છે (A સાચું), COHb રચના થવાથી ઓક્સિજન પરિવહન ક્ષમતા ઘટે છે (B સાચું), અને ઓક્સિજન-હીમોગ્લોબિન વક્ર ડાબી તરફ ખસે છે (D સાચું).", "ncert_ref": "Class XI - Chapter 17: શ્વસન અને ગેસનું વિનિમય", "difficulty": "Hard", "num": 60}, {"question": "જ્યારે એક વ્યક્તિ ઉંચાઈવાળા પ્રદેશ (હાઇ એલ્ટિટ્યુડ) પર જાય છે, ત્યારે શરીરમાં ઓક્સિજનના પરિવહનને અનુકૂલિત કરવા માટે નીચેનામાંથી કયું પરિવર્તન થતું નથી?", "options": ["A) રુધિરમાં 2,3-BPG નું પ્રમાણ વધે છે, જેથી ઓક્સિજન-હીમોગ્લોબિન વક્ર જમણી તરફ ખસે છે અને પેશીઓમાં ઓક્સિજન મુક્ત થવાની ક્ષમતા વધે છે.", "B) એરિથ્રોપોઈટિન (EPO) નું સ્રાવ વધે છે, જેથી રક્તકણિકાઓની સંખ્યા વધે છે અને રુધિરની ઓક્સિજન વહન ક્ષમતા વધે છે.", "C) હીમોગ્લોબિનની સંરચનામાં બદલાવ થાય છે, જેથી તે ઓક્સિજન સાથે વધુ મજબૂત સહસંયોજક બંધ રચે છે.", "D) રુધિરના pH માં ઘટાડો થાય છે, જેથી બોહર અસર દ્વારા ઓક્સિજન-હીમોગ્લોબિન વક્ર જમણી તરફ ખસે છે."], "correct": 2, "explanation": "ઉંચાઈવાળા પ્રદેશ પર જતાં, શરીરમાં ઓક્સિજનના પરિવહનને અનુકૂલિત કરવા માટે રુધિરમાં 2,3-BPG નું પ્રમાણ વધે છે (A), EPO નું સ્રાવ વધે છે (B), અને રુધિરના pH માં ઘટાડો થાય છે (D). પરંતુ હીમોગ્લોબિનની સંરચનામાં કોઈ બદલાવ થતો નથી (C). હીમોગ્લોબિનની સંરચના જન્મજાત હોય છે અને તે બદલાતી નથી. વિકલ્પ C ખોટો છે કારણ કે હીમોગ્લોબિનની સંરચના સ્થિર હોય છે અને તે ઓક્સિજન સાથેના બંધનને મજબૂત બનાવવા માટે બદલાતી નથી.", "ncert_ref": "Class XII - Chapter 18: શરીરમાં વહન (Body Fluids and Circulation)", "difficulty": "Hard", "num": 61}, {"question": "માનવ શરીરમાં, જ્યારે રુધિરમાં કાર્બન મોનોક્સાઇડ (CO) ની સાંદ્રતા વધે છે, ત્યારે ઓક્સિજન-હીમોગ્લોબિન વક્ર પર કયો પ્રભાવ જોવા મળે છે, જ્યારે 2,3-BPG નું પ્રમાણ પણ સમાન સમયે વધી રહ્યું હોય?", "options": ["A) વક્ર ડાબી તરફ ખસે છે અને ઓક્સિજનની સહસંયોજકતા વધે છે", "B) વક્ર જમણી તરફ ખસે છે અને ઓક્સિજનની સહસંયોજકતા ઘટે છે", "C) વક્ર પર કોઈ ફેરફાર થતો નથી કારણ કે CO અને 2,3-BPG એકબીજાની અસરને સંતુલિત કરે છે", "D) વક્ર ડાબી તરફ ખસે છે પરંતુ ઓક્સિજનની સહસંયોજકતા ઘટે છે"], "correct": 1, "explanation": "કારણ કે કાર્બન મોનોક્સાઇડ (CO) હીમોગ્લોબિન સાથે સહસંયોજન બનાવે છે અને તેની ઓક્સિજન સાથેની સહસંયોજકતા કરતાં 200-250 ગણી વધુ સહસંયોજકતા ધરાવે છે, જેથી હીમોગ્લોબિનની ઓક્સિજન વહન ક્ષમતા ઘટે છે. 2,3-BPG નું પ્રમાણ વધવાથી પણ હીમોગ્લોબિનની ઓક્સિજન સાથેની સહસંયોજકતા ઘટે છે, જેથી વક્ર જમણી તરફ ખસે છે. વિકલ્પ A અને D ખોટા છે કારણ કે વક્ર ડાબી તરફ ખસતો નથી. વિકલ્પ C ખોટો છે કારણ કે CO અને 2,3-BPG બંને હીમોગ્લોબિનની ઓક્સિજન સહસંયોજકતા ઘટાડે છે, સંતુલિત કરતાં નથી.", "ncert_ref": "Class XII - Chapter 16: શરીરમાં પરિવહન", "difficulty": "Hard", "num": 62}, {"question": "માનવ શરીરમાં, જ્યારે રુધિરમાં કાર્બન ડાયોક્સાઇડ (CO2) નું પ્રમાણ અચાનક વધે છે, ત્યારે ઓક્સિજન-હીમોગ્લોબિન વક્ર પર કયો પ્રભાવ જોવા મળે છે, જ્યારે તાપમાન પણ સમાન સમયે ઘટે છે?", "options": ["A) વક્ર ડાબી તરફ ખસે છે અને ઓક્સિજનની સહસંયોજકતા વધે છે", "B) વક્ર જમણી તરફ ખસે છે અને ઓક્સિજનની સહસંયોજકતા ઘટે છે", "C) વક્ર પર કોઈ ફેરફાર થતો નથી કારણ કે CO2 અને તાપમાન એકબીજાની અસરને સંતુલિત કરે છે", "D) વક્ર ડાબી તરફ ખસે છે પરંતુ ઓક્સિજનની સહસંયોજકતા ઘટે છે"], "correct": 0, "explanation": "કાર્બન ડાયોક્સાઇડ (CO2) નું પ્રમાણ વધવાથી બોહર અસર થાય છે, જેથી હીમોગ્લોબિનની ઓક્સિજન સહસંયોજકતા ઘટે છે અને વક્ર જમણી તરફ ખસે છે. પરંતુ તાપમાન ઘટવાથી હીમોગ્લોબિનની ઓક્સિજન સહસંયોજકતા વધે છે અને વક્ર ડાબી તરફ ખસે છે. આ સ્થિતિમાં, તાપમાનની અસર CO2 ની અસર કરતાં વધુ પ્રબળ હોય છે, જેથી વક્ર ડાબી તરફ ખસે છે અને ઓક્સિજનની સહસંયોજકતા વધે છે. વિકલ્પ B, C, અને D ખોટા છે કારણ કે તેઓ વક્રની દિશા અથવા ઓક્સિજન સહસંયોજકતાને ખોટી રીતે વર્ણવે છે.", "ncert_ref": "Class XII - Chapter 16: શરીરમાં પરિવહન", "difficulty": "Hard", "num": 63}, {"question": "એક વ્યક્તિ ઉંચાઈવાળા પ્રદેશ (હાઇ એલ્ટિટ્યુડ) પર જાય છે, ત્યારે શરીરમાં ઓક્સિજનના પરિવહનને અનુકૂલિત કરવા માટે નીચેનામાંથી કયું પરિવર્તન થતું નથી?", "options": ["A) 2,3-BPG નું પ્રમાણ ઘટે છે, જેથી હીમોગ્લોબિનની ઓક્સિજન સહસંયોજકતા વધે છે", "B) રુધિર કોષોની સંખ્યા વધે છે, જેથી ઓક્સિજન વહન ક્ષમતા વધે છે", "C) હીમોગ્લોબિનની સાંદ્રતા વધે છે, જેથી ઓક્સિજન વહન ક્ષમતા વધે છે", "D) શ્વસન દર વધે છે, જેથી ફુફ્ફુસમાં ઓક્સિજનનું પ્રમા                 if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
