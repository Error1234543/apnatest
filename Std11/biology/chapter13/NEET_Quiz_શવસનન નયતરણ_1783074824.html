<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - શ્વસનનું નિયંત્રણ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 શ્વસનનું નિયંત્રણ</span>
                <span>🎯 Hard</span>
                <span>📝 56 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "શ્વસન કેન્દ્ર (respiratory centre) નું સ્થાન ક્યાં હોય છે અને તેના કયા ભાગ દ્વારા શ્વસનની ગતિ નિયંત્રિત થાય છે?", "options": ["A) મેદુલા ઓબ્લોંગેટા (Medulla oblongata) ના પશ્ચ ભાગમાં, પેશી જાળકા (reticular formation) દ્વારા", "B) સેરેબ્રલ હેમિસ્ફિયર (cerebral hemisphere) ના અગ્ર ભાગમાં, થેલામસ (thalamus) દ્વારા", "C) મેદુલા ઓબ્લોંગેટા (Medulla oblongata) ના પૂર્વ ભાગમાં, પોન્સ (pons) દ્વારા", "D) સ્પાઇનલ કોર્ડ (spinal cord) ના ઉત્તર ભાગમાં, ગ્રે મેટર (grey matter) દ્વારા"], "correct": 0, "explanation": "શ્વસન કેન્દ્ર મેદુલા ઓબ્લોંગેટાના પશ્ચ ભાગમાં આવેલું છે અને પેશી જાળકા (reticular formation) દ્વારા શ્વસનની ગતિ નિયંત્રિત થાય છે. સેરેબ્રલ હેમિસ્ફિયર, થેલામસ, પોન્સ અને સ્પાઇનલ કોર્ડ શ્વસન નિયંત્રણમાં મુખ્ય ભૂમિકા ભજવતાં નથી. મેદુલા ઓબ્લોંગેટા શ્વસન, હૃદય સ્પંદન અને રક્તવાહિનીઓના સંકોચન-પ્રસરણ જેવી અચેતન ક્રિયાઓનું નિયંત્રણ કરે છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને ગમન", "difficulty": "Hard", "num": 1}, {"question": "શ્વસન દરમ્યાન CO₂ ની સાંદ્રતા વધવાના કારણે શ્વસન કેન્દ્ર કેવી રીતે પ્રતિક્રિયા આપે છે?", "options": ["A) CO₂ રક્તમાં ભળીને કાર્બોનિક એસિડ બનાવે છે, જે pH ઘટાડે છે અને કેમોરેપ્ટર્સ (chemoreceptors) ઉત્તેજિત થાય છે, જેથી શ્વસન દર વધે છે.", "B) CO₂ સીધું જ શ્વસન કેન્દ્રને ઉત્તેજિત કરે છે, જેથી શ્વસન દર ઘટે છે.", "C) CO₂ હિમોગ્લોબિન સાથે જોડાઈને ઓક્સિજન વહનને અવરોધે છે, જેથી શ્વસન દર ઘટે છે.", "D) CO₂ ફેફસાંમાં સીધું જ ઉત્તેજન પેદા કરે છે, જેથી શ્વસન દર વધે છે."], "correct": 0, "explanation": "CO₂ રક્તમાં ભળીને કાર્બોનિક એસિડ (H₂CO₃) બનાવે છે, જે રક્તના pH ને ઘટાડે છે. આ પરિવર્તન કેમોરેપ્ટર્સ (રસાયણગ્રાહી) ને ઉત્તેજિત કરે છે, જે મેદુલા ઓબ્લોંગેટામાં આવેલા શ્વસન કેન્દ્રને સંકેત મોકલે છે, જેથી શ્વસન દર વધે છે. બાકીના વિકલ્પો અશુદ્ધ વૈજ્ઞાનિક તથ્યો પર આધારિત છે.", "ncert_ref": "Class XI - Chapter 17: શ્વસન અને ગેસ વિનિમય", "difficulty": "Hard", "num": 2}, {"question": "નીચેનામાંથી કયું વિધાન શ્વસનના નિયંત્રણ વિશે સાચું નથી?", "options": ["A) શ્વસન કેન્દ્ર મેદુલા ઓબ્લોંગેટામાં આવેલું છે અને તે અચેતન રીતે કામ કરે છે.", "B) પોન્સ (pons) શ્વસન દરને નિયંત્રિત કરવામાં મદદ કરે છે, પરંતુ તે મુખ્ય શ્વસન કેન્દ્ર નથી.", "C) ઓક્સિજનની ઉણપ શ્વસન કેન્દ્રને સીધું જ ઉત્તેજિત કરે છે.", "D) CO₂ ની સાંદ્રતા શ્વસન દરને નિયંત્રિત કરવામાં મહત્વની ભૂમિકા ભજવે છે."], "correct": 2, "explanation": "ઓક્સિજનની ઉણપ શ્વસન કેન્દ્રને સીધું જ ઉત્તેજિત કરતી નથી. બદલામાં, CO₂ ની સાંદ્રતા અને pH ના પરિવર્તન દ્વારા કેમોરેપ્ટર્સ ઉત્તેજિત થાય છે, જે શ્વસન કેન્દ્રને પ્રભાવિત કરે છે. બાકીના વિધાનો સાચાં છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને ગમન", "difficulty": "Hard", "num": 3}, {"question": "શ્વસન દરમ્યાન નીચેનામાંથી કયા હોર્મોનનું સ્તર વધવાના કારણે શ્વસન દર પર અસર પડે છે?", "options": ["A) એડ્રિનલિન (Adrenaline), જે હૃદય સ્પંદન અને શ્વસન દર વધારે છે.", "B) ઇન્સ્યુલિન (Insulin), જે શ્વસન દર ઘટાડે છે.", "C) થાયરોક્સિન (Thyroxine), જે શ્વસન દર પર કોઈ અસર કરતું નથી.", "D) એસ્ટ્રોજન (Estrogen), જે શ્વસન દર વધારે છે."], "correct": 0, "explanation": "એડ્રિનલિન હોર્મોન હૃદય સ્પંદન અને શ્વસન દર વધારે છે, જ્યારે ઇન્સ્યુલિન, થાયરોક્સિન અને એસ્ટ્રોજન શ્વસન દર પર સીધી અસર કરતાં નથી. એડ્રિનલિન તણાવ અથવા શારીરિક પ્રવૃત્તિ દરમ્યાન શરીરની જરૂરિયાત અનુસાર શ્વસન દરને વધારવામાં મદદ કરે છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સમન્વય અને નિયંત્રણ", "difficulty": "Hard", "num": 4}, {"question": "શ્વસન નિયંત્રણમાં કેમોરેપ્ટર્સ (chemoreceptors) ની ભૂમિકા શું છે?", "options": ["A) તેઓ CO₂, H⁺ અને O₂ ની સાંદ્રતા પર નજર રાખે છે અને મેદુલા ઓબ્લોંગેટાને સંકેત મોકલે છે.", "B) તેઓ ફક્ત O₂ ની સાંદ્રતા પર નજર રાખે છે અને સ્પાઇનલ કોર્ડને સંકેત મોકલે છે.", "C) તેઓ ફક્ત CO₂ ની સાંદ્રતા પર નજર રાખે છે અને સેરેબ્રલ કોર્ટેક્સને સંકેત મોકલે છે.", "D) તેઓ રક્તના દબાણ પર નજર રાખે છે અને હૃદયને સંકેત મોકલે છે."], "correct": 0, "explanation": "કેમોરેપ્ટર્સ CO₂, H⁺ (pH) અને O₂ ની સાંદ્રતા પર નજર રાખે છે અને મેદુલા ઓબ્લોંગેટાને સંકેત મોકલે છે, જેથી શ્વસન દરને નિયંત્રિત કરવામાં મદદ મળે છે. બાકીના વિકલ્પો અશુદ્ધ છે કારણ કે કેમોરેપ્ટર્સ ફક્ત O₂ અથવા CO₂ પર જ નજર રાખતા નથી અને ન તો તેઓ સ્પાઇનલ કોર્ડ અથવા સેરેબ્રલ કોર્ટેક્સને સંકેત મોકલે છે.", "ncert_ref": "Class XI - Chapter 17: શ્વસન અને ગેસ વિનિમય", "difficulty": "Hard", "num": 5}, {"question": "શ્વસન નિયંત્રણ દરમ્યાન, જ્યારે રક્તમાં O₂ ની સાંદ્રતા અચાનક ઘટે છે, ત્યારે નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) કેમોરેપ્ટર્સ (રસાયણગ્રાહકો) ઉત્તેજિત થાય છે અને શ્વસન કેન્દ્રને સંકેત મોકલે છે.", "B) શ્વસન કેન્દ્ર દ્વારા ફુપ્ફુસીય ધમનીઓમાં રક્તપરિભ્રમણ વધારવા માટે હૃદયના ધબકારા વધે છે.", "B) મેદુલા ઓબ્લોંગેટામાં સ્થિત શ્વસન કેન્દ્ર દ્વારા શ્વાસોચ્છવાસની ગતિ વધે છે.", "D) રક્તમાં CO₂ ની સાંદ્રતા ઘટે છે અને pH વધે છે."], "correct": 3, "explanation": "સાચો જવાબ D છે. જ્યારે O₂ ની સાંદ્રતા ઘટે છે, ત્યારે CO₂ ની સાંદ્રતા વધે છે અને pH ઘટે છે, જે કેમોરેપ્ટર્સને ઉત્તેજિત કરે છે. શ્વસન કેન્દ્ર શ્વાસોચ્છવાસની ગતિ વધારીને પ્રતિક્રિયા આપે છે. હૃદયના ધબકારા વધવાનું કામ શ્વસન કેન્દ્ર નહીં પણ હૃદય નિયંત્રણ કેન્દ્ર દ્વારા થાય છે, પરંતુ શ્વસન કેન્દ્ર શ્વાસોચ્છવાસની ગતિ નિયંત્રિત કરે છે. વિકલ્પ D ખોટો છે કારણ કે CO₂ ની સાંદ્રતા ઘટતી નથી, ઉલટી વધે છે.", "ncert_ref": "Class XI - Chapter 21: શ્વસન અને ગેસનો વિનિમય", "difficulty": "Hard", "num": 6}, {"question": "શ્વસન નિયંત્રણમાં, નીચેનામાંથી કયા હોર્મોનનું સ્તર વધવાના કારણે શ્વસન દર પર સીધી અસર થતી નથી?", "options": ["A) એડ્રિનાલિન", "B) થાયરોક્સિન", "C) ઇન્સ્યુલિન", "D) પ્રોજેસ્ટેરોન"], "correct": 2, "explanation": "સાચો જવાબ C છે. ઇન્સ્યુલિન શર્કરાના ચયાપચયને નિયંત્રિત કરે છે, પરંતુ તે શ્વસન દર પર સીધી અસર કરતું નથી. એડ્રિનાલિન અને થાયરોક્સિન શ્વસન દર વધારે છે, જ્યારે પ્રોજેસ્ટેરોન ગર્ભાવસ્થા દરમ્યાન શ્વસન દર પર અસર કરે છે.", "ncert_ref": "Class XI - Chapter 22: ઉત્સર્જન અને ઓસ્મોરેગ્યુલેશન", "difficulty": "Hard", "num": 7}, {"question": "શ્વસન નિયંત્રણમાં, નીચેનામાંથી કયા પેશી અથવા અંગમાં કેમોરેપ્ટર્સ સ્થિત હોય છે?", "options": ["A) મેદુલા ઓબ્લોંગેટા અને પોન્સ", "B) કેરોટિડ ધમની અને એઓર્ટા", "C) ફુપ્ફુસ અને શ્વાસનળી", "D) હૃદય અને રક્તવાહિનીઓ"], "correct": 1, "explanation": "સાચો જવાબ B છે. કેમોરેપ્ટર્સ (રસાયણગ્રાહકો) મુખ્યત્વે કેરોટિડ ધમની અને એઓર્ટામાં સ્થિત હોય છે, જ્યાં તેઓ રક્તમાં O₂  "difficulty": "Hard", "num": 21}, {"question": "શ્વસન નિયંત્રણ દરમ્યાન, જ્યારે રક્તમાં pH ની કિંમત ૭.૨ થી ૭.૦ સુધી ઘટે છે, ત્યારે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) કેમોરેપ્ટર્સ દ્વારા શ્વસન કેન્દ્રને ઉત્તેજના મળે છે અને શ્વસન દર વધે છે.", "B) શ્વસન કેન્દ્ર દ્વારા ફેફસાંને સંકેત મોકલવામાં આવે છે અને શ્વસન દર ઘટે છે.", "C) હૃદયના ધબકારા વધે છે પરંતુ શ્વસન દર પર કોઈ અસર થતી નથી.", "D) મગજમાં ઓક્સિજનની અછતને કારણે શ્વસન કેન્દ્ર નિષ્ક્રિય થાય છે."], "correct": 0, "explanation": "રક્તમાં pH ની કિંમત ઘટવાનું કારણ CO₂ ના વધારા દરમ્યાન બનતી કાર્બોનિક એસિડના અયનીકરણથી H⁺ આયનની સાંદ્રતા વધવાનું હોય છે. આ પરિસ્થિતિમાં કેમોરેપ્ટર્સ ઉત્તેજિત થાય છે અને શ્વસન કેન્દ્રને સંકેત મોકલે છે, જેના કારણે શ્વસન દર વધે છે. બાકીના વિકલ્પો સંપૂર્ણપણે ભ્રામક છે.", "ncert_ref": "Class XI - Chapter 17: શ્વસન અને ગેસનો વિનિમય", "difficulty": "Hard", "num": 22}, {"question": "શ્વસન નિયંત્રણમાં, નીચેનામાંથી કયું સંયોજન રક્ત-મગજ અવરોધ (BBB) ને સરળતાથી પાર કરી શકે છે અને સીધી રીતે મેદુલા ઓબ્લોંગેટામાં સ્થિત શ્વસન કેન્દ્રને પ્રભાવિત કરે છે?", "options": ["A) O₂", "B) CO₂", "C) H⁺ આયન", "D) Na⁺ આયન"], "correct": 1, "explanation": "CO₂ રક્ત-મગજ અવરોધ (BBB) ને સરળતાથી પાર કરી શકે છે અને સીધી રીતે મેદુલા ઓબ્લોંગેટામાં સ્થિત શ્વસન કેન્દ્રને પ્રભાવિત કરે છે. O₂, H⁺ આયન, અને Na⁺ આયન BBB ને સરળતાથી પાર કરી શકતા નથી.", "ncert_ref": "Class XI - Chapter 17: શ્વસન અને ગેસનો વિનિમય", "difficulty": "Hard", "num": 23}, {"question": "શ્વસન નિયંત્રણ દરમ્યાન, હેરિંગ-બ્ર્યુઅર રિફ્લેક્સ અને કેમોરેપ્ટર્સની ભૂમિકા વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) હેરિંગ-બ્ર્યુઅર રિફ્લેક્સ ફેફસાંમાં હવાના દબાણમાં વધારાને કારણે ઉત્તેજિત થાય છે અને શ્વસન દર ઘટાડે છે.", "B) કેમોરેપ્ટર્સ રક્તમાં O₂ ની સાંદ્રતાને મોનિટર કરે છે અને શ્વસન કેન્દ્રને સંકેત મોકલે છે.", "C) કેમોરેપ્ટર્સ મુખ્યત્વે કેરોટિડ ધમનીમાં અને એઓર્ટિક આર્ચમાં સ્થિત હોય છે.", "D) હેરિંગ-બ્ર્યુઅર રિફ્લેક્સ દરમ્યાન, વેગસ ચેતા દ્વારા શ્વસન કેન્દ્રને ઉત્તેજન મોકલવામાં આવે છે, જેથી શ્વસન દર વધે છે."], "correct": 3, "explanation": "સાચું વિધાન D apter 17: શ્વસન અને ગેસનું વહન", "difficulty": "Hard", "num": 55}, {"question": "શ્વસન નિયંત્રણ દરમ્યાન, જ્યારે રક્તમાં H+ આયનની સાંદ્રતા અચાનક વધે છે, ત્યારે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) શ્વસન કેન્દ્ર પર કેમોરેપ્ટર્સનો પ્રભાવ ઘટે છે.", "B) શ્વસન કેન્દ્ર દ્વારા શ્વસન દર ઘટાડવા માટે સંકેત મોકલવામાં આવે છે.", "C) શ્વસન કેન્દ્ર દ્વારા શ્વસન દર વધારવા માટે સંકેત મોકલવામાં આવે છે.", "D) શ્વસન કેન્દ્ર પર કોઈ પ્રભાવ થતો નથી."], "correct": 2, "explanation": "H+ આયનની સાંદ્રતા વધવાનું દર્શાવે છે કે રક્ત અમ્લીય બની રહ્યું છે, જે CO2 ની વધુ સાંદ્રતાનું સૂચન છે. કેમોરેપ્ટર્સ આ પરિવર્તનને જણાવે છે અને શ્વસન કેન્દ્રને ઉત્તેજિત કરે છે, જેના કારણે શ્વસન દર વધે છે. વિકલ્પ A ખોટો છે કારણ કે કેમોરેપ્ટર્સનો પ્રભાવ ઘટતો નથી, પરંતુ વધે છે. વિકલ્પ B ખોટો છે કારણ કે શ્વસન દર ઘટાડવા માટે સંકેત મોકલવામાં આવતો નથી. વિકલ્પ D ખોટો છે કારણ કે શ્વસન કેન્દ્ર પર પ્રભાવ પડે છે.", "ncert_ref": "Class XI - Chapter 17: શ્વસન અને ગેસનું વહન", "difficulty": "Hard", "num": 56}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
