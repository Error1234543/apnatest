<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - કાર્બન ડાયોક્સાઇડનું પરિવહન</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 કાર્બન ડાયોક્સાઇડનું પરિવહન</span>
                <span>🎯 Hard</span>
                <span>📝 56 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "માનવ રુધિરમાં કાર્બન ડાયોક્સાઇડનું પરિવહન મુખ્યત્વે કયા સ્વરૂપમાં થાય છે?", "options": ["A) કાર્બન ડાયોક્સાઇડ ગૅસ સ્વરૂપે", "B) બાયકાર્બોનેટ આયન (HCO₃⁻) સ્વરૂપે", "C) કાર્બોનિક એસિડ (H₂CO₃) સ્વરૂપે", "D) કાર્બોનેટ આયન (CO₃²⁻) સ્વરૂપે"], "correct": 1, "explanation": "કાર્બન ડાયોક્સાઇડનું પરિવહન મુખ્યત્વે બાયકાર્બોનેટ આયન (HCO₃⁻) સ્વરૂપે થાય છે, જે રુધિર પ્લાઝ્મા અને લાલ રક્તકણિકાઓમાં રહેલા કાર્બોનિક એનહાઇડ્રેઝ ઉત્સેચક દ્વારા રૂપાંતરિત થાય છે. A) ખોટું છે કારણ કે માત્ર 5-7% CO₂ ગૅસ સ્વરૂપે પરિવહન પામે છે. C) ખોટું છે કારણ કે કાર્બોનિક એસિડ અસ્થિર હોય છે અને તરત જ બાયકાર્બોનેટમાં વિભાજિત થાય છે. D) ખોટું છે કારણ કે CO₃²⁻ રુધિરમાં નગણ્ય પ્રમાણમાં હોય છે.", "ncert_ref": "Class XI - Chapter 17: શ્વસન અને ગૅસનું વિનિમય", "difficulty": "Hard", "num": 1}, {"question": "લાલ રક્તકણિકાઓમાં કાર્બન ડાયોક્સાઇડનું પરિવહન કયા પ્રોટીન સાથે જોડાયેલું હોય છે?", "options": ["A) હિમોગ્લોબિન", "B) માયોગ્લોબિન", "C) એલ્બ્યુમિન", "D) ફાઇબ્રિનોજન"], "correct": 0, "explanation": "લાલ રક્તકણિકાઓમાં CO₂નું પરિવહન હિમોગ્લોબિન સાથે જોડાયેલું હોય છે, જે કાર્બામિનો હિમોગ્લોબિન (Hb-CO₂-NH₂) બનાવે છે. આ રીતે લગભગ 20-25% CO₂ પરિવહન પામે છે. B) ખોટું છે કારણ કે માયોગ્લોબિન પેશી કોષોમાં ઓક્સિજનનું પરિવહન કરે છે. C) ખોટું છે કારણ કે એલ્બ્યુમિન મુખ્યત્વે પ્લાઝ્મા પ્રોટીન છે અને CO₂ સાથે જોડાય નહીં. D) ખોટું છે કારણ કે ફાઇબ્રિનોજન રક્ત ગંઠાવા માટે જવાબદાર છે.", "ncert_ref": "Class XI - Chapter 17: શ્વસન અને ગૅસનું વિનિમય", "difficulty": "Hard", "num": 2}, {"question": "કાર્બન ડાયોક્સાઇડનું પરિવહન દરમિયાન, કયા અંગમાં તેનું નિર્માણ સૌથી વધુ થાય છે?", "options": ["A) ફેફસા", "B) યકૃત", "C) સ્નાયુ પેશી", "D) મગજ"], "correct": 2, "explanation": "સ્નાયુ પેશીમાં શ્વસન ક્રિયા દરમિયાન સૌથી વધુ CO₂ નિર્માણ થાય છે, કારણ કે સ્નાયુઓમાં ઉર્જા ઉત્પાદન માટે ઓક્સિજનનો ઉપયોગ થાય છે અને CO₂ ઉપજ તરીકે મુક્ત થાય છે. A) ખોટું છે કારણ કે ફેફસા CO₂ નિકાલ માટે જવાબદાર છે, નહીં કે નિર્માણ માટે. B) ખોટું છે કારણ કે યકૃતમાં CO₂ નિર્માણ થાય છે, પરંતુ સ્નાયુ પેશી કરતાં ઓછું. D) ખોટું છે કારણ , "explanation": "ક્લોરાઇડ શિફ્ટ પેશીઓમાં સૌથી વધુ પ્રભાવી બને છે, જ્યાં કાર્બન ડાયોક્સાઇડ પેશી કોષોમાંથી રુધિરમાં પ્રવેશે છે અને બાયકાર્બોનેટ આયનમાં રૂપાંતરિત થાય છે. આ દરમિયાન, ક્લોરાઇડ આયન (Cl⁻) લાલ રક્તકણિકાઓમાં પ્રવેશે છે અને બાયકાર્બોનેટ આયનની જગ્યા લે છે, જે રુધિરના pHને સંતુલિત રાખવામાં મદદ કરે છે. મગજ, યકૃત અને ફુફ્ફુસમાં આ પ્રક્રિયા એટલી પ્રભાવી નથી.", "ncert_ref": "Class XI - Chapter 17: શ્વસન અને ગેસનું વિનિમય", "difficulty": "Hard", "num": 17}, {"question": "કાર્બન ડાયોક્સાઇડના પરિવહન દરમિયાન, રુધિરમાં તેનું સૌથી ઓછું પ્રમાણ કયા સ્વરૂપમાં જોવા મળે છે?", "options": ["A) કાર્બન ડાયોક્સાઇડ ઓગળેલા સ્વરૂપમાં", "B) કાર્બામિનોહીમોગ્લોબિન", "C) બાયકાર્બોનેટ આયન", "D) કાર્બોનિક એસિડ"], "correct": 3, "explanation": "કાર્બન ડાયોક્સાઇડનું પરિવહન મુખ્યત્વે ત્રણ સ્વરૂપોમાં થાય છે: ઓગળેલા CO₂ (5-7%), બાયકાર્બોનેટ આયન (70-75%), અને કાર્બામિનોહીમોગ્લોબિન (20-25%). કાર્બોનિક એસિડ (H₂CO₃) એક અસ્થિર મધ્યવર્તી પદાર્થ છે, જે તરત જ બાયકાર્બોનેટ આયન અને H⁺ આયનમાં વિઘટિત થાય છે, તેથી તેનું પ્રમાણ સૌથી ઓછું હોય છે.", "ncert_ref": "Class XI - Chapter 17: શ્વસન અને ગેસનું વિનિમય", "difficulty": "Hard", "num": 18}, {"question": "કાર્બન ડાયોક્સાઇડના પરિવહન દરમિયાન, જ્યારે રુધિર ફુફ્ફુસમાં પહોંચે છે, ત્યારે કયા પરિબળ દ્વારા બાયકાર્બોનેટ આયનનું કાર્બન ડાયોક્સાઇડમાં રૂપાંતરણ સૌથી વધુ પ્રભાવિત થાય છે?", "options": ["A) ઓક્સિજનનું ઉચ્ચ સાંદ્રણ", "B) હાઇડ્રોજન આયનનું નીચું સાંદ્રણ", "C) કાર્બન ડાયોક્સાઇડનું નીચું સાંદ્રણ", "D) તાપમાનમાં ઘટાડો"], "correct": 1, "explanation": "ફુફ્ફુસમાં, ઓક્સિજનનું ઉચ્ચ સાંદ્રણ હોવા છતાં, બાયકાર્બોનેટ આયનનું કાર્બન ડાયોક્સાઇડમાં રૂપાંતરણ મુખ્યત્વે હાઇડ્રોજન આયન (H⁺)ના નીચા સાંદ્રણ દ્વારા પ્રભાવિત થાય છે. ફુફ્ફુસમાં, CO₂નું નિકાલ થવાથી H⁺ આયનનું સાંદ્રણ ઘટે છે, જે બાયકાર્બોનેટ આયનને CO₂ અને H₂Oમાં વિઘટિત થવા પ્રેરે છે. ઓક્સિજનનું ઉચ્ચ સાંદ્રણ અને CO₂નું નીચું સાંદ્રણ પણ મદદરૂપ થાય છે, પરંતુ મુખ્ય પરિબળ H⁺ આયનનું નીચું સાંદ્રણ છે.", "ncert_ref": "Class XI - Chapter 17: શ્વસન અને ગેસનું વિનિમય", "difficulty": "Hard", "num": 19}, {"question": "કાર્બન ડાયોક્સાઇ ion": "એક વ્યક્તિ ઉચ્ચ કક્ષાનું કસરત કરે છે. આ દરમિયાન, રુધિરમાં કાર્બન ડાયોક્સાઇડના પરિવહન દરમિયાન નીચેનામાંથી કયું પરિવર્તન થશે?", "options": ["A) બાયકાર્બોનેટ આયન (HCO3−) નું સાંદ્રણ ઘટશે.", "B) કાર્બામિનોહીમોગ્લોબિનનું પ્રમાણ વધશે.", "C) રુધિરનું pH વધશે.", "D) ઓગળેલી CO2 ની માત્રા સ્થિર રહેશે."], "correct": 1, "explanation": "કસરત દરમિયાન, CO2 નું ઉત્પાદન વધે છે, જેના કારણે બાયકાર્બોનેટ આયન અને કાર્બામિનોહીમોગ્લોબિન બંનેમાં વધારો થાય છે. પરંતુ કાર્બામિનોહીમોગ્લોબિનનું પ્રમાણ વધુ તીવ્રતાથી વધે છે કારણ કે હીમોગ્લોબિન CO2 સાથે જોડાઈ શકે છે. વિકલ્પ A ખોટો છે કારણ કે બાયકાર્બોનેટ આયનનું સાંદ્રણ વધશે. વિકલ્પ C ખોટો છે કારણ કે CO2 ના વધારા સાથે રુધિરનું pH ઘટશે (એસિડિક થશે). વિકલ્પ D ખોટો છે કારણ કે ઓગળેલી CO2 ની માત્રા પણ વધશે.", "ncert_ref": "Class XI - Chapter 17: શ્વસન અને ગેસનું વિનિમય", "difficulty": "Hard", "num": 40}, {"question": "કાર્બન ડાયોક્સાઇડના પરિવહન દરમિયાન, નીચેનામાંથી કયું પરિબળ 'ક્લોરાઇડ શિફ્ટ' (Chloride Shift) ને સૌથી વધુ પ્રભાવિત કરે છે?", "options": ["A) રુધિર પ્લાઝ્મામાં ઓક્સિજનનું આંશિક દબાણ (pO₂)", "B) લાલ રક્તકણિકાઓમાં કાર્બોનિક એનહાઇડ્રેઝ ઉત્સેચકની પ્રવૃત્તિ", "C) રુધિર પ્લાઝ્મામાં બાયકાર્બોનેટ આયન (HCO₃⁻) નું સાંદ્રણ", "D) લાલ રક્તકણિકાઓમાં હાઇડ્રોજન આયન (H⁺) નું સાંદ્રણ"], "correct": 2, "explanation": "'ક્લોરાઇડ શિફ્ટ' એ લાલ રક્તકણિકાઓમાંથી બાયકાર્બોનેટ આયન (HCO₃⁻) ના બહાર નીકળવા અને ક્લોરાઇડ આયન (Cl⁻) ના પ્રવેશ સાથે સંકળાયેલી પ્રક્રિયા છે. આ પ્રક્રિયા રુધિર પ્લાઝ્મામાં બાયકાર્બોનેટ આયનના સાંદ્રણ દ્વારા સૌથી વધુ પ્રભાવિત થાય છે, કારણ કે બાયકાર્બોનેટ આયનનું સાંદ્રણ વધતા તે લાલ રક્તકણિકાઓમાંથી બહાર નીકળે છે અને ક્લોરાઇડ આયન અંદર પ્રવેશે છે. ઓક્સિજનનું આંશિક દબાણ (pO₂) આ પ્રક્રિયાને સીધી રીતે પ્રભાવિત કરતું નથી. કાર્બોનિક એનહાઇડ્રેઝ ઉત્સેચક બાયકાર્બોનેટ આયનના નિર્માણમાં મદદ કરે છે, પરંતુ તે 'ક્લોરાઇડ શિફ્ટ' ને સીધી રીતે પ્રભાવિત કરતું નથી. હાઇડ્રોજન આયનનું સાંદ્રણ પણ આ પ્રક્રિયાને પ્રભાવિત કરતું નથી.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 17: શ્વાસોચ્છવાસ અને વાયુઓનું વિનિમય", "difficulty": "Hard", "num": 41}, {"question": "એક દર્દીને શ્વસનીય એલ્કલોસિસ (Respiratory Alkalosis) નું નિદાન થયું છે. આ સ્થિતિમાં કાર્બન ડાયોક્સાઇડના પરિવહન પર નીચેનામાંથી કયો પ્રભાવ જોવા મળે છે?", "options": ["A) લાલ રક્તકણિકાઓમાં કાર્બામિનોહીમોગ્લોબિનનું નિર્માણ વધે છે", "B) રુધિર પ્લાઝ્મામાં બાયકાર્બોનેટ આયન (HCO₃⁻) નું સાંદ્રણ ઘટે છે", "C) લાલ રક્તકણિકાઓમાં કાર્બોનિક એનહાઇડ્રેઝ ઉત્સેચકની પ્રવૃત્તિ વધે છે", "D) રુધિરમાં કાર્બન ડાયોક્સાઇડનું આંશિક દબાણ (pCO₂) વધે છે"], "correct": 1, "explanation": "શ્વસનીય એલ્કલોસિસમાં, રુધિરમાં કાર્બન ડાયોક્સાઇડનું આંશિક દબાણ (pCO₂) ઘટે છે, જેના કારણે રુધિર પ્લાઝ્મામાં બાયકાર્બોનેટ આયન (HCO₃⁻) નું સાંદ્રણ પણ ઘટે છે. આ સ્થિતિમાં, કાર્બોનિક એનહાઇડ્રેઝ ઉત્સેચકની પ્રવૃત્તિ ઘટે છે કારણ કે ઓછું CO₂ ઉપલબ્ધ હોય છે. કાર્બામિનોહીમોગ્લોબિનનું નિર્માણ પણ ઘટે છે કારણ કે ઓછું CO₂ હીમોગ્લોબિન સાથે જોડાય છે. રુધિરમાં pCO₂ વધતું નથી, તે ઘટે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 14: શ્વાસોચ્છવાસ અને વાયુઓનું વિનિમય", "difficulty": "Hard", "num": 42}, {"question": "કાર્બન ડાયોક્સાઇડના પરિવહન દરમિયાન, નીચેનામાંથી કયું કથન 'હેમ્બર્ગર ઘટના' (Hamburger Phenomenon) નું સૌથી યોગ્ય વર્ણન કરે છે?", "options": ["A) લાલ રક્તકણિકાઓમાંથી બાયકાર્બોનેટ આયન (HCO₃⁻) નું બહાર નીકળવું અને ક્લોરાઇડ આયન (Cl⁻) નો પ્રવેશ", "B) લાલ રક્તકણિકાઓમાં કાર્બન ડાયોક્સાઇડનું કાર્બામિનોહીમોગ્લોબિન તરીકે પરિવહન", "C) રુધિર પ્લાઝ્મામાં કાર્બન ડાયોક્સાઇડનું સીધું ઓગળવું", "D) ફુફ્ફુસની અલ્વિઓલાઇમાં કાર્બન ડાયોક્સાઇડનું નિકાલ થવું"], "correct": 0, "explanation": "'હેમ્બર્ગર ઘટના' (Hamburger Phenomenon) એ લાલ રક્તકણિકાઓમાંથી બાયકાર્બોનેટ આયન (HCO₃⁻) નું બહાર નીકળવું અને તેના બદલામાં ક્લોરાઇડ આયન (Cl⁻) નો પ્રવેશ દર્શાવે છે. આ પ્રક્રિયા રુધિરમાં વિદ્યુત સંતુલન જાળવવા માટે જરૂરી છે. કાર્બામિનોહીમોગ્લોબિનનું નિર્માણ અને કાર્બન ડાયોક્સાઇડનું સીધું ઓગળવું આ ઘટનાનો ભાગ નથી. ફુફ્ફુસમાં કાર્બન ડાયોક્સાઇડનું નિકાલ પણ આ ઘટનાથી અલગ પ્રક્રિયા છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 17: શ્વાસોચ્છવાસ અને વાયુઓનું વિનિમય", "difficulty": "Hard", "num": 43}, {"question": "કાર્બન ડાયોક્સાઇડના પરિવહન દરમિયાન, જ્યારે રુધિર ફુફ્ફુસની અલ્વિઓલાઇ તરફ વહે છે, ત્યારે નીચેનામાંથી કયું પરિવર્તન સૌથી પહેલાં થાય છે?", "options": ["A) લાલ રક્તકણિકાઓમાંથી ક્લોરાઇડ આયન (Cl⁻) નું બહાર નીકળવું", "B) બાયકાર્બોનેટ આયન (HCO₃⁻) નું કાર્બન ડાયોક્સાઇડમાં રૂપાંતરણ", "C) કાર્બામિનોહીમોગ્લોબિનનું વિઘટન થઈ કાર્બન ડાયોક્સાઇડ મુક્ત થવું", "D) રુધિર પ્લાઝ્મામાં ઓગળેલું કાર્બન ડાયોક્સાઇડ અલ્વિઓલાઇમાં પ્રસરણ પામવું"], "correct": 3, "explanation": "જ્યારે રુધિર ફુફ્ફુસની અલ્વિઓલાઇ તરફ વહે છે, ત્યારે સૌથી પહેલાં રુધિર પ્લાઝ્મામાં ઓગળેલું કાર્બન ડાયોક્સાઇડ અલ્વિઓલાઇમાં પ્રસરણ પામે છે. આ પ્રક્રિયા સૌથી ઝડપી છે કારણ કે ઓગળેલું CO₂ સીધું પ્રસરણ દ્વારા નિકાલ પામે છે. બાયકાર્બોનેટ આયનનું કાર્બન ડાયોક્સાઇડમાં રૂપાંતરણ અને કાર્બામિનોહીમોગ્લોબિનનું વિઘટન પછીથી થાય છે. ક્લોરાઇડ આયનનું બહાર નીકળવું પણ પછીની પ્રક્રિયા છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 14: શ્વાસોચ્છવાસ અને વાયુઓનું વિનિમય", "difficulty": "Hard", "num": 44}, {"question": "માનવ રુધિરમાં કાર્બન ડાયોક્સાઇડના પરિવહન દરમિયાન, 'ક્લોરાઇડ શિફ્ટ' ઘટનામાં નીચેનામાંથી કયું પરિબળ મુખ્ય ભૂમિકા ભજવે છે?", "options": ["A) બાયકાર્બોનેટ આયન (HCO3−) નું સાંદ્રણ વૃદ્ધિ", "B) હીમોગ્લોબિન સાથે કાર્બન ડાયોક્સાઇડનું પ્રત્યક્ષ જોડાણ", "C) રુધિર પ્લાઝ્મામાં ઓક્સિજનનું સાંદ્રણ ઘટાડો", "D) લાલ રક્તકણિકાઓમાં કાર્બનિક એસિડનું નિર્માણ"], "correct": 0, "explanation": "ક્લોરાઇડ શિફ્ટમાં, બાયકાર્બોનેટ આયન (HCO3−) નું સાંદ્રણ વૃદ્ધિ થવાથી લાલ રક્તકણિકાઓમાંથી ક્લોરાઇડ આયન (Cl−) બહાર નીકળે છે, જેથી આયનિક સંતુલન જાળવાય છે. હીમોગ્લોબિન સાથે CO2નું પ્રત્યક્ષ જોડાણ (કાર્બામિનોહીમોગ્લોબિન) ક્લોરાઇડ શિફ્ટને પ્રભાવિત કરતું નથી. ઓક્સિજનનું સાંદ્રણ ઘટાડો હેમોગ્લોબિનની ઓક્સિજન વાહક ક્ષમતાને પ્રભાવિત કરે છે, પરંતુ ક્લોરાઇડ શિફ્ટ સાથે સીધો સંબંધ ધરાવતું નથી. કાર્બનિક એસિડનું નિર્માણ ક્લોરાઇડ શિફ્ટમાં ભૂમિકા ભજવતું નથી.", "ncert_ref": "Class XI - Chapter 17: શ્વસન અને ગેસીય વિનિમય", "difficulty": "Hard", "num": 45}, {"question": "માનવ શરીરમાં, શ્વસનીય એસિડોસિસ (Respiratory Acidosis) ની સ્થિતિમાં, નીચેનામાંથી કયું કથન સત્ય છે?", "options": ["A) રુધિરમાં કાર્બન ડાયોક્સાઇડનું સાંદ્રણ ઘટે છે અને pH વધે છે", "B) રુધિરમાં બાયકાર્બોનેટ આયનનું સાંદ્રણ ઘટે છે અને p             if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
