    <script>
        const questionsData = [{"question": "ચેતાકોષમાં સંવેદનશીલતાનો કાળ (રિફ્રેક્ટરી પીરિયડ) દરમિયાન કયું પગલું બંધ થાય છે, જેથી નવો ચેતાપ્રવાહ ઉત્પન્ન થઈ શકતો નથી?", "options": ["A) સોડિયમ-પોટેશિયમ પંપની ક્રિયા", "B) સોડિયમ ચેનલનું પુનઃસક્રિયીકરણ (રીએક્ટિવેશન)", "C) કેલ્શિયમ આયનનો પ્રવેશ", "D) ક્લોરાઇડ આયનનો બહિષ્કરણ"], "correct": 1, "explanation": "સંવેદનશીલતાનો કાળ દરમિયાન સોડિયમ ચેનલો અસક્રિય (inactivated) થાય છે, જેથી નવો ચેતાપ્રવાહ ઉત્પન્ન થઈ શકતો નથી. સોડિયમ-પોટેશિયમ પંપ તો સતત કામ કરે છે (A ખોટું). કેલ્શિયમ આયનનો પ્રવેશ સિનેપ્સમાં થાય છે, ચેતાપ્રવાહના સંચારમાં નહીં (C ખોટું). ક્લોરાઇડ આયનનો બહિષ્કરણ હાઇપરપોલરાઇઝેશનમાં ભૂમિકા ભજવે છે, પરંતુ સંવેદનશીલતાનો કાળ સાથે સીધો સંબંધ નથી (D ખોટું).", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાતંત્ર અને રસાયણિક સંકેતન", "difficulty": "Hard", "num": 1}, {"question": "જો એક ચેતાકોષમાં માયેલિન શીથની કમી હોય, તો ચેતાપ્રવાહના સંચારની ગતિ પર કેવી અસર થશે અને કયા પ્રકારના સંચારને અસર થશે?", "options": ["A) ગતિ વધશે અને સલ્ટેટરી સંચાર થશે", "B) ગતિ ઘટશે અને સલ્ટેટરી સંચાર બંધ થશે", "C) ગતિ ઘટશે અને સતત સંચાર થશે", "D) ગતિ પર કોઈ અસર થશે નહીં, પરંતુ સલ્ટેટરી સંચાર મંદ પડશે"], "correct": 2, "explanation": "માયેલિન શીથ ચેતાપ્રવાહના સલ્ટેટરી સંચાર માટે જરૂરી છે. જો માયેલિન શીથની કમી હોય, તો ચેતાપ્રવાહની ગતિ ઘટશે અને સંચાર સતત (કન્ટિન્યુઅસ) બનશે, કારણ કે સલ્ટેટરી સંચાર માટે માયેલિન શીથની હાજરી જરૂરી છે. A ખોટું છે કારણ કે ગતિ ઘટે છે. B ખોટું છે કારણ કે સલ્ટેટરી સંચાર પૂરો બંધ થતો નથી, પરંતુ મંદ પડે છે. D ખોટું છે કારણ કે ગતિ પર અસર થાય છે.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાતંત્ર અને રસાયણિક સંકેતન", "difficulty": "Hard", "num": 2}, {"question": "ચેતાપ્રવાહના સંચાર દરમિયાન, કયા આયનનો પ્રવેશ ચેતાકોષના ઝિલ્લાના ધ્રુવીકરણ (ડીપોલરાઇઝેશન) માટે જવાબદાર છે?", "options": ["A) કેલ્શિયમ (Ca²⁺)", "B) પોટેશિયમ (K⁺)", "C) સોડિયમ (Na⁺)", "D) ક્લોરાઇડ (Cl⁻)"], "correct": 2, "explanation": "ચેતાકોષના ઝિલ્લાના ધ્રુવીકરણ (ડીપોલરાઇઝેશન) માટે સોડિયમ (Na⁺) આયનનો પ્રવેશ જવાબદાર છે. કેલ્શિયમ (Ca²⁺) સિનેપ્સમાં ન્યૂરોટ્રાન્સમીટરના મુક્ત થવામાં ભૂમિકા  2, "explanation": "ક્રિયા વિદ્યુતસ્થિતિ (એક્શન પોટેન્શિયલ)ની તીવ્રતા ચેતાકોષની લંબાઈ સાથે અચળ રહે છે, કારણ કે તે 'ઑલ ઓર નન' સિદ્ધાંત પર કામ કરે છે. આથી વિકલ્પ C સાચો છે. વિકલ્પ A અને B ખોટા છે કારણ કે તીવ્રતા લંબાઈ સાથે બદલાતી નથી. વિકલ્પ D પણ ખોટો છે કારણ કે તીવ્રતા જાડાઈ સાથે બદલાતી નથી.", "ncert_ref": "Class XI - Chapter 21: ચેતાપ્રવાહનું સંચાર", "difficulty": "Hard", "num": 8}, {"question": "ચેતાપ્રવાહના સંચાર દરમિયાન, જો એક ચેતાકોષમાં માયેલિન શીથના નોડ ઓફ રેનવિયર પર ક્લોરાઇડ આયનોનો પ્રવેશ અચાનક વધી જાય, તો નીચેના પૈકી કયું પરિણામ થશે?", "options": ["A) ક્રિયા વિદ્યુતસ્થિતિની ગતિ વધશે, કારણ કે ક્લોરાઇડ આયનો ધ્રુવીકરણને ટેકો આપશે.", "B) ક્રિયા વિદ્યુતસ્થિતિની ગતિ ઘટશે, કારણ કે ક્લોરાઇડ આયનો હાઇપરપોલરાઇઝેશન તરફ દોરી જશે.", "C) ક્રિયા વિદ્યુતસ્થિતિની ગતિ પર કોઈ અસર થશે નહીં, કારણ કે ક્લોરાઇડ આયનો ચેતાપ્રવાહના સંચારમાં ભાગ લેતા નથી.", "D) ક્રિયા વિદ્યુતસ્થિતિની ગતિ વધશે, કારણ કે ક્લોરાઇડ આયનો સોડિયમ આયનોના પ્રવેશને ટેકો આપશે."], "correct": 1, "explanation": "ક્લોરાઇડ આયનોનો પ્રવેશ હાઇપરપોલરાઇઝેશન તરફ દોરી જાય છે, જેથી ક્રિયા વિદ્યુતસ્થિતિની ગતિ ઘટશે. A) ખોટું છે કારણ કે ક્લોરાઇડ આયનો ધ્રુવીકરણને ટેકો આપતાં નથી. C) ખોટું છે કારણ કે ક્લોરાઇડ આયનો ચેતાપ્રવાહના સંચારમાં ભાગ લે છે. D) ખોટું છે કારણ કે ક્લોરાઇડ આયનો સોડિયમ આયનોના પ્રવેશને ટેકો આપતાં નથી.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાતંત્ર અને સંવેદન", "difficulty": "Hard", "num": 9}, {"question": "ચેતાકોષમાં ક્રિયા વિદ્યુતસ્થિતિ (એક્શન પોટેન્શિયલ)ના સંચાર દરમિયાન, જો સોડિયમ-પોટેશિયમ પંપ (Na+/K+ ATPase) અચાનક બંધ થઈ જાય, તો નીચેના પૈકી કયું પરિણામ થશે?", "options": ["A) ચેતાકોષનું વિરામ વિદ્યુતસ્થિતિ (રેસ્ટિંગ પોટેન્શિયલ) વધુ નકારાત્મક (-90 mV થી -100 mV) થશે", "B) ચેતાકોષનું વિરામ વિદ્યુતસ્થિતિ ઓછું નકારાત્મક (-70 mV થી -60 mV) થશે અને ક્રિયા વિદ્યુતસ્થિતિની તીવ્રતા ઘટશે", "C) ચેતાકોષમાં ક્રિયા વિદ્યુતસ્થિતિની ઉત્પત્તિ થશે નહીં, કારણ કે સોડિયમ ચેનલો ખુલશે નહીં", "D) ચેતાકોષમાં પોટેશિયમ આયનોનો બહાર નીકળવાનો દર વધશે, જેથી હાઇપરપોલરાઇઝેશન થશે"], "correct": 1, "explanation": "સોડિયમ-પોટેશિયમ પંપ (Na+/K+ ATPase) : "સોડિયમ-પોટેશિયમ પંપ અવરોધાયેલો હોવાથી, રેસ્ટિંગ પોટેન્શિયલ સ્થાપિત થશે નહીં, કારણ કે આ પંપ રેસ્ટિંગ પોટેન્શિયલ જાળવવા માટે જરૂરી છે. બાકીના વિકલ્પો ખોટા છે: B) સંચાર ચાલુ રહેતો નથી, C) વેગ વધશે નહીં, D) હાઇપરપોલરાઇઝેશન પછી સંચાર થશે નહીં.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને અંતઃસ્રાવી તંત્ર", "difficulty": "Hard", "num": 19}, {"question": "ચેતાકોષમાં ક્રિયા વિદ્યુતસ્થિતિના સંચાર દરમિયાન, જો સોડિયમ-પોટેશિયમ પંપ (Na+/K+ ATPase) અવરોધાયેલો હોય, તો નીચેના પૈકી કયું વિધાન સત્ય છે?", "options": ["A) કોષના બહાર સોડિયમ આયનોનું સાંદ્રણ ઘટશે", "B) કોષના અંદર પોટેશિયમ આયનોનું સાંદ્રણ વધશે", "C) કોષના ઝિલ્લાના રેસ્ટિંગ પોટેન્શિયલમાં કોઈ ફેરફાર થશે નહીં", "D) કોષના ઝિલ્લાના રેસ્ટિંગ પોટેન્શિયલ વધે છે"], "correct": 1, "explanation": "સોડિયમ-પોટેશિયમ પંપ અવરોધાયેલો હોવાથી, પોટેશિયમ આયનો કોષના અંદર જમા થશે, જેથી કોષના અંદર પોટેશિયમ આયનોનું સાંદ્રણ વધશે. A) ખોટું છે કારણ કે સોડિયમ આયનોનું સાંદ્રણ ઘટશે નહીં. C) ખોટું છે કારણ કે રેસ્ટિંગ પોટેન્શિયલમાં ફેરફાર થશે. D) ખોટું છે કારણ કે રેસ્ટિંગ પોટેન્શિયલ વધશે નહીં.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાપ્રવાહનું સંચાર", "difficulty": "Hard", "num": 20}, {"question": "ચેતાકોષમાં ક્રિયા વિદ્યુતસ્થિતિના ઉદ્ભવ દરમિયાન, જો સોડિયમ-પોટેશિયમ પંપ (Na+/K+ ATPase) અચાનક અવરોધાય, તો નીચેના પૈકી કયું વિધાન સત્ય છે?", "options": ["A) રેસ્ટિંગ મેમ્બ્રેન વિદ્યુતસ્થિતિ (+30 mV) થી (+70 mV) સુધી વધશે.", "B) રેસ્ટિંગ મેમ્બ્રેન વિદ્યુતસ્થિતિ (-70 mV) થી (-90 mV) સુધી ઘટશે.", "C) ક્રિયા વિદ્યુતસ્થિતિની આંકડાકીય કિંમત ઓછી થશે, પરંતુ રેસ્ટિંગ વિદ્યુતસ્થિતિ અચળ રહેશે.", "D) ચેતાકોષમાં કાયમી ડીપોલરાઇઝેશન થશે, અને કોઈ ક્રિયા વિદ્યુતસ્થિતિ ઉત્પન્ન થશે નહીં."], "correct": 3, "explanation": "Na+/K+ ATPase અવરોધાય તો સોડિયમ આયનો કોષમાં જમા થશે અને પોટેશિયમ આયનો બહાર નીકળશે નહીં, જેથી કોષનું ઝિલ્લું કાયમી ડીપોલરાઇઝ થશે અને ક્રિયા વિદ્યુતસ્થિતિ ઉત્પન્ન થશે નહીં. A) ખોટું છે કારણ કે રેસ્ટિંગ વિદ્યુતસ્થિતિ વધશે નહીં. B) ખોટું છે કારણ કે રેસ્ટિંગ વિદ્યુતસ્થિતિ ઘટશે નહીં, પરંતુ ડીપોલરાઇઝેશન થશે. C) ખોટું છે કારણ કે ક્રિયા વિદ્યુતસ્થિતિ જ ઉત્પન્ન થશ ef": "ક્લાસ XI - પ્રકરણ 21: ચેતાકોષીય ભૌતિકશાસ્ત્ર અને રસાયણશાસ્ત્ર", "difficulty": "Hard", "num": 25}, {"question": "એક પ્રયોગમાં, ચેતાકોષના એક્સોન પર વિદ્યુત ઉત્તેજના આપવામાં આવે છે અને નીચેના અવલોકનો નોંધવામાં આવે છે: 1. ઉત્તેજના આપ્યા બાદ તરત જ સોડિયમ આયનોનો પ્રવેશ થાય છે. 2. થોડા સમય બાદ પોટેશિયમ આયનોનો બહાર નિકાલ થાય છે. 3. ક્રિયા વિદ્યુતસ્થિતિના સંચાર દરમિયાન, સોડિયમ-પોટેશિયમ પંપ સક્રિય થાય છે. 4. જો ઉત્તેજનાની તીવ્રતા વધારવામાં આવે, તો ક્રિયા વિદ્યુતસ્થિતિની તીવ્રતા પણ વધે છે. ઉપરોક્ત અવલોકનોમાંથી કયું અવલોકન અયોગ્ય છે?", "options": ["A) માત્ર 3", "B) માત્ર 4", "C) માત્ર 1 અને 2", "D) માત્ર 2 અને 3"], "correct": 1, "explanation": "અવલોકન 4 અયોગ્ય છે કારણ કે ક્રિયા વિદ્યુતસ્થિતિ 'ઓલ-ઓર-નન' સિદ્ધાંત પર આધારિત છે. ઉત્તેજનાની તીવ્રતા વધારવાથી ક્રિયા વિદ્યુતસ્થિતિની આવૃત્તિ વધે છે, પરંતુ તેની તીવ્રતા સમાન રહે છે. બાકીના અવલોકનો યોગ્ય છે: 1) સોડિયમ આયનોનો પ્રવેશ ડીપોલરાઇઝેશન માટે જવાબદાર છે, 2) પોટેશિયમ આયનોનો બહાર નિકાલ પુનઃધ્રુવીકરણ માટે જરૂરી છે, 3) સોડિયમ-પોટેશિયમ પંપ ક્રિયા વિદ્યુતસ્થિતિ બાદ વિદ્યુતસ્થિતિને પુનઃસ્થાપિત કરવામાં મદદ કરે છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 21: ચેતાકોષીય નિયંત્રણ અને સંકલન", "difficulty": "Hard", "num": 26}, {"question": "ચેતાપ્રવાહના સંચાર દરમિયાન, જો એક ચેતાકોષમાં કૅલ્શિયમ આયનોના પ્રવેશને અવરોધવામાં આવે, તો નીચેના પૈકી કયું પરિણામ થશે?", "options": ["A) સિનેપ્ટિક ક્લેફ્ટમાં ન્યૂરોટ્રાન્સમીટરનું મુક્તિ થશે નહીં.", "B) ક્રિયા વિદ્યુતસ્થિતિની ગતિ વધશે, કારણ કે કૅલ્શિયમ આયનો ધ્રુવીકરણ માટે જવાબદાર છે.", "C) સોડિયમ-પોટેશિયમ પંપની ક્રિયા અટકશે, કારણ કે કૅલ્શિયમ આયનો તેની ક્રિયા માટે જરૂરી છે.", "D) ચેતાકોષમાં રિફ્રેક્ટરી પીરિયડ લંબાયશે, કારણ કે કૅલ્શિયમ આયનો તેને ટૂંકો કરે છે."], "correct": 0, "explanation": "કૅલ્શિયમ આયનો સિનેપ્ટિક ક્લેફ્ટમાં ન્યૂરોટ્રાન્સમીટરના મુક્તિ માટે જરૂરી છે. જો કૅલ્શિયમ આયનોનો પ્રવેશ અવરોધાય, તો ન્યૂરોટ્રાન્સમીટરનું મુક્તિ થશે નહીં. વિકલ્પ B ખોટો છે કારણ કે કૅલ્શિયમ આયનો ધ્રુવીકરણ માટે જવાબદાર નથી. વિકલ્પ C ખોટો છે કારણ કે સોડિયમ-પોટેશિયમ પંપની ક્રિયા કૅલ્શિયમ આયનો પર આધારિત નથી. વિકલ્પ D ખોટો છે કારણ કે કૅલ્શિયમ આયનો રિફ્રેક્ટરી પીરિયડને ટૂંકો કરતું નથી.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને અંતઃસ્રાવી તંત્ર", "difficulty": "Hard", "num": 27}, {"question": "ચેતાકોષમાં ક્રિયા વિદ્યુતસ્થિતિના ઉદ્ભવ દરમિયાન, જો કૅલ્શિયમ આયનોના પ્રવેશને અવરોધવામાં આવે, તો નીચેના પૈકી કયું પરિણામ થશે?", "options": ["A) સિનેપ્ટિક વેઝિકલ્સનું વિમોચન થશે નહીં, પરિણામે ન્યુરોટ્રાન્સમિટરનું સ્રાવ થશે નહીં.", "B) ક્રિયા વિદ્યુતસ્થિતિનો ઉદ્ભવ થશે નહીં, કારણ કે સોડિયમ ચેનલો સક્રિય થશે નહીં.", "C) ક્રિયા વિદ્યુતસ્થિતિની ગતિ વધશે, કારણ કે પોટેશિયમ ચેનલો સક્રિય થશે.", "D) ક્રિયા વિદ્યુતસ્થિતિનો સંચાર ધીમો પડશે, પરંતુ ચાલુ રહેશે."], "correct": 0, "explanation": "કૅલ્શિયમ આયનોના પ્રવેશને અવરોધવાથી સિનેપ્ટિક વેઝિકલ્સનું વિમોચન થશે નહીં, પરિણામે ન્યુરોટ્રાન્સમિટરનું સ્રાવ થશે નહીં. કૅલ્શિયમ આયનો સિનેપ્ટિક વેઝિકલ્સના વિમોચન માટે જરૂરી છે. B ગળતર છે કારણ કે ક્રિયા વિદ્યુતસ્થિતિનો ઉદ્ભવ સોડિયમ ચેનલોની સક્રિયતાથી થાય છે, જે કૅલ્શિયમ આયનો પર આધારિત નથી. C અને D ગળતર છે કારણ કે કૅલ્શિયમ આયનો ક્રિયા વિદ્યુતસ્થિતિની ગતિ પર સીધી અસર કરતાં નથી.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને તેના કાર્યો", "difficulty": "Hard", "num": 28}, {"question": "29. ચેતાકોષમાં ક્રિયા વિદ્યુતસ્થિતિના સંચાર દરમિયાન, જો રનવિયરના ગાંઠ (નોડ ઓફ રેનવિયર) પર સોડિયમ ચેનલો અચાનક બંધ થઈ જાય, તો નીચેના પૈકી કયું પરિણામ થશે?", "options": ["A) ક્રિયા વિદ્યુતસ્થિતિની ગતિ વધુ ઝડપી થશે કારણ કે માયેલિન શીથ દ્વારા સીધો સંચાર થશે.", "B) ક્રિયા વિદ્યુતસ્થિતિનો સંચાર થોભી જશે કારણ કે સોડિયમ આયનોનો પ્રવેશ અટકી જશે.", "C) ક્રિયા વિદ્યુતસ્થિતિની ગતિ ધીમી પડશે પરંતુ સંચાર ચાલુ રહેશે કારણ કે પોટેશિયમ આયનોનો બહાર નિકાલ ચાલુ રહેશે.", "D) ક્રિયા વિદ્યુતસ્થિતિની ગતિ પર કોઈ અસર થશે નહીં કારણ કે માયેલિન શીથ દ્વારા સંચાર થશે."], "correct": 1, "explanation": "ક્રિયા વિદ્યુતસ્થિતિના સંચાર માટે રનવિયરના ગાંઠ પર સોડિયમ ચેનલો દ્વારા સોડિયમ આયનોનો પ્રવેશ જરૂરી છે. જો સોડિયમ ચેનલો બંધ થઈ જાય, તો સોડિયમ આયનોનો પ્રવેશ અટકી જશે, જેથી ક્રિયા વિદ્યુતસ્થિતિનો સંચાર થોભી જશે. માયેલિન શીથ દ્વારા સીધો સંચાર થતો નથી, અને પોટેશિયમ આયનોનો બહાર નિકાલ ક્         let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
