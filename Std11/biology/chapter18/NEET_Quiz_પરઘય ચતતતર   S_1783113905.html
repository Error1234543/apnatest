    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}

        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}

        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>

    <script>
        const questionsData = [{"question": "પરિઘીય ચેતાતંત્રના સોમેટિક ભાગમાં કયા પ્રકારના તંતુઓનો સમાવેશ થાય છે, જેમાં મોટાભાગના તંતુઓ માયેલિનયુક્ત હોય છે અને તે સ્નાયુઓને નિયંત્રિત કરે છે?", "options": ["A) પ્રેરક (Afferent) તંતુઓ, જેઓ સંવેદનાત્મક માહિતી મગજ તરફ લઈ જાય છે", "B) વાહક (Efferent) તંતુઓ, જેઓ મગજથી સ્નાયુઓ તરફ આદેશો લઈ જાય છે", "C) મિશ્ર તંતુઓ, જેઓ સંવેદનાત્મક અને પ્રેરક બંને કાર્ય કરે છે", "D) સ્વાયત્ત તંતુઓ, જેઓ અંતઃસ્રાવી ગ્રંથિઓને નિયંત્રિત કરે છે"], "correct": 1, "explanation": "સોમેટિક ચેતાતંત્રના વાહક (Efferent) તંતુઓ મગજ અને મજ્જાસ્થાનથી સ્કેલેટલ સ્નાયુઓ તરફ આદેશો લઈ જાય છે અને મોટાભાગના માયેલિનયુક્ત હોય છે. A) પ્રેરક તંતુઓ સંવેદનાત્મક હોય છે અને મગજ તરફ માહિતી લઈ જાય છે, પરંતુ સોમેટિક ભાગમાં વાહક તંતુઓ પ્રધાન હોય છે. C) મિશ્ર તંતુઓ ક્રેનિયલ અને સ્પાઇનલ તંતુઓમાં જોવા મળે છે, પરંતુ સોમેટિક ભાગ ખાસ કરીને વાહક તંતુઓ પર ધ્યાન કેન્દ્રિત કરે છે. D) સ્વાયત્ત તંતુઓ પરિઘીય ચેતાતંત્રના સ્વાયત્ત ભાગમાં સમાવિષ્ટ હોય છે, સોમેટિક ભાગમાં નહીં.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 1}, {"question": "જો કોઈ વ્યક્તિને રિફ્લેક્સ ક્રિયા દરમિયાન સ્નાયુ સંકોચન થતું નથી, તો કયા ભાગમાં ખામી હોવાની શક્યતા છે?", "options": ["A) સંવેદનાત્મક તંત્રિકા (Sensory neuron)", "B) મજ્જાસ્થાન (Spinal cord)", "C) પ્રેરક તંત્રિકા (Motor neuron)", "D) સ્નાયુ (Muscle)"], "correct": 2, "explanation": "રિફ્લેક્સ ક્રિયામાં, સંવેદનાત્મક તંત્રિકા ઉત્તેજના ગ્રહણ કરે છે, મજ્જાસ્થાન તેને પ્રક્રિયા કરે છે, અને પ્રેરક તંત્રિકા સ્નાયુને આદેશ આપે છે. જો સ્નાયુ સંકોચન ન થાય, તો પ્રેરક તંત્રિકામાં ખામી હોવાની શક્યતા છે. A) સંવેદનાત્મક તંત્રિકામાં ખામી હોત, તો ઉત્તેજના ગ્રહણ ન થાય. B) મજ્જાસ્થાનમાં ખામી હોત, તો પ્રક્રિયા થતી નહીં. D) સ્નાયુમાં ખામી હોત, તો તે સંકોચન માટે અસમર્થ હોત.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 2}, {"question": "કયો સ્વાયત્ત ચેતાતંત્રનો ભાગ હૃદયના ધબકારા અને પાચનને નિયંત્રિત કરે છે, પરંતુ સોમેટિક ચેતાતંત્રનો ભાગ નથી?", "options": ["A) સિમ્પેથેટિક ચેતાતંત્ર", "B) પેરાસિમ્પેથેટિક ચેતાતંત્ર", "C) એન્ટરિક ચેતાતંત્ર", "D) A અને B બંને"], "correct": 3, "explanation": "સ્વાયત્ત ચેતાતંત્રના સિમ્પેથેટિક અને પેરાસિમ્પેથેટિક ભાગો હૃદયના ધબકારા અને પાચનને નિયંત્રિત કરે છે. સોમેટિક ચેતાતંત્ર સ્કેલેટલ સ્નાયુઓને નિયંત્રિત કરે છે, પરંતુ અંતઃસ્રાવી ગ્રંથિઓ અથવા સ્મૂધ મસલ્સને નહીં. A) અને B) એ સ્વાયત્ત ચેતાતંત્રના ભાગો છે, પરંતુ પ્રશ્નમાં બંનેનો સમાવેશ જરૂરી છે. C) એન્ટરિક ચેતાતંત્ર પાચનતંત્રને નિયંત્રિત કરે છે, પરંતુ તે સ્વાયત્ત ચેતાતંત્રનો જ ભાગ છે.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 3}, {"question": "કયા તંત્રિકા કોષોના અક્ષતંતુઓ (Axons) માયેલિન શીથથી આવરિત નથી હોતા અને તેની ગતિ ધીમી હોય છે?", "options": ["A) પ્રેરક તંત્રિકા (Sensory neuron)", "B) વાહક તંત્રિકા (Motor neuron)", "C) ઇન્ટરન્યુરોન (Interneuron)", "D) સ્વાયત્ત તંત્રિકા (Autonomic neuron)"], "correct": 3, "explanation": "સ્વાયત્ત ચેતાતંત્રના તંત્રિકા કોષોના અક્ષતંતુઓ માયેલિન શીથથી આવરિત નથી હોતા, જેના કારણે તેની ગતિ ધીમી હોય છે. A) અને B) મોટાભાગના માયેલિનયુક્ત હોય છે. C) ઇન્ટરન્યુરોન મજ્જાસ્થાનમાં હોય છે અને માયેલિનયુક્ત હોઈ શકે છે. D) સ્વાયત્ત તંત્રિકા (પોસ્ટગેંગ્લિયોનિક તંતુઓ) માયેલિન શીથ વગરના હોય છે.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 4}, {"question": "જો કોઈ વ્યક્તિને સ્નાયુમાં અચાનક ખેંચાણ થાય છે અને તેને તરત જ પ્રતિક્રિયા સ્વરૂપે સ્નાયુ સંકોચન થાય છે, તો આ કયા પ્રકારની રિફ્લેક્સ ક્રિયા છે?", "options": ["A) બહિર્ગત રિફ્લેક્સ (Exteroreceptor reflex)", "B) અંતર્ગત રિફ્લેક્સ (Interoreceptor reflex)", "C) મોનોસિનેપ્ટિક રિફ્લેક્સ (Monosynaptic reflex)", "D) પોલીસિનેપ્ટિક રિફ્લેક્સ (Polysynaptic reflex)"], "correct": 2, "explanation": "સ્નાયુમાં અચાનક ખેંચાણ થવાની પ્રતિક્રિયા (ઉદા. પેટેલા રિફ્લેક્સ) મોનોસિનેપ્ટિક રિફ્લેક્સ છે, જેમાં સંવેદનાત્મક અને પ્રેરક તંત્રિકા વચ્ચે એક જ સિનેપ્સ હોય છે. A) બહિર્ગત રિફ્લેક્સ બાહ્ય ઉત્તેજના (ઉદા. ત્વચા) સાથે સંબંધિત હોય છે. B) અંતર્ગત રિફ્લેક્સ અંતર્ગત અંગો (ઉદા. હૃદય) સાથે સંબંધિત હોય છે. D) પોલીસિનેપ્ટિક રિફ્લેક્સમાં એકથી વધુ સિનેપ્સ હોય છે (ઉદા. વેદના રિફ્લેક્સ).", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 5}, {"question": "પરિઘીય ચેતાતંત્રના સોમેટિક ભાગમાં, કયા તંત્રિકા કોષોના ડેન્ડ્રાઇટ્સ સીધા જ મજ્જાતંતુ (CNS) સાથે જોડાયેલા નથી, પરંતુ અન્ય ન્યુરોન દ્વારા જોડાયેલા હોય છે?", "options": ["A) સંવેદનાત્મક ન્યુરોન (Afferent neuron)", "B) મોટર ન્યુરોન (Efferent neuron)", "C) ઇન્ટરન્યુરોન (Interneuron)", "D) યુનિપોલર ન્યુરોન (Unipolar neuron)"], "correct": 0, "explanation": "સંવેદનાત્મક ન્યુરોન (Afferent neuron) ના ડેન્ડ્રાઇટ્સ સીધા જ પરિબળો (સ્ટિમ્યુલસ) માંથી સંવેદના મેળવે છે અને તેનું અક્ષતંતુ (axon) મજ્જાતંતુ (CNS) સાથે જોડાયેલું હોય છે. મોટર ન્યુરોન (B) મજ્જાતંતુમાંથી સ્નાયુઓ તરફ સંકેત મોકલે છે, ઇન્ટરન્યુરોન (C) મજ્જાતંતુમાં જ હોય છે, અને યુનિપોલર ન્યુરોન (D) સંવેદનાત્મક હોય છે પરંતુ તેનું ડેન્ડ્રાઇટ અને અક્ષતંતુ એક જ હોય છે. આથી, સંવેદનાત્મક ન્યુરોનના ડેન્ડ્રાઇટ્સ સીધા જ મજ્જાતંતુ સાથે જોડાયેલા નથી.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને સંવેદનાત્મક અંગો", "difficulty": "Hard", "num": 6}, {"question": "જો કોઈ વ્યક્તિને કટોકટીની સ્થિતિમાં હૃદયનો ધબકારો વધારે છે, તો કયા પરિઘીય ચેતાતંત્રના ભાગ દ્વારા આ નિયંત્રિત થાય છે?", "options": ["A) સોમેટિક ચેતાતંત્ર", "B) સિમ્પેથેટિક ચેતાતંત્ર", "C) પેરાસિમ્પેથેટિક ચેતાતંત્ર", "D) એન્ટરિક ચેતાતંત્ર"], "correct": 1, "explanation": "સિમ્પેથેટિક ચેતાતંત્ર (B) કટોકટીની સ્થિતિમાં શરીરને 'લડો અથવા પળાય' (fight or flight) પ્રતિક્રિયા માટે તૈયાર કરે છે, જેમાં હૃદયનો ધબકારો વધારે છે. સોમેટિક ચેતાતંત્ર (A) ઇચ્છિત સ્નાયુઓને નિયંત્રિત કરે છે, પેરાસિમ્પેથેટિક ચેતાતંત્ર (C) શરીરને શાંત સ્થિતિમાં લાવે છે, અને એન્ટરિક ચેતાતંત્ર (D) પાચનતંત્રને નિયંત્રિત કરે છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને સંવેદનાત્મક અંગો", "difficulty": "Hard", "num": 7}, {"question": "કયા પ્રકારના તંત્રિકા કોષોના અક્ષતંતુઓ (axons) માયેલિન શીથથી આવરિત હોવા છતાં, તેની ગતિ સૌથી ધીમી હોય છે?", "options": ["A) A-અલ્ફા તંતુઓ", "B) A-બીટા તંતુઓ", "C) A-ડેલ્ટા તંતુઓ", "D) C તંતુઓ"], "correct": 3, "explanation": "C તંતુઓ (D) માયેલિન શીથથી આવરિત નથી હોતા, પરંતુ પ્રશ્નમાં ઉલ્લેખ કર્યા મુજબ માયેલિન શીથથી આવરિત હોવા છતાં ધીમી ગતિ ધરાવતા તંતુઓમાં A-ડેલ્ટા તંતુઓ (C) સૌથી ધીમી ગતિ ધરાવે છે. A-અલ્ફા (A) અને A-બીટા (B) તંતુઓની ગતિ વધુ હોય છે. પરંતુ C તંતુઓ માયેલિન શીથ વગરના હોવા છતાં, પ્રશ્નની શરત મુજબ, A-ડેલ્ટા તંતુઓ માયેલિન શીથથી આવરિત હોવા છતાં ધીમી ગતિ ધરાવે છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને સંવેદનાત્મક અંગો", "difficulty": "Hard", "num": 8}, {"question": "પરિઘીય ચેતાતંત્રમાં, કયા તંત્રિકા કોષોના કોષકેદ્ર (cell body) ગેંગ્લિયામાં સ્થિત હોય છે અને તે સ્નાયુઓને નિયંત્રિત કરે છે?", "options": ["A) સંવેદનાત્મક ન્યુરોન", "B) મોટર ન્યુરોન", "C) ઇન્ટરન્યુરોન", "D) સહાનુભૂતિ ન્યુરોન"], "correct": 1, "explanation": "મોટર ન્યુરોન (B) ના કોષકેદ્ર (cell body) ગેંગ્લિયામાં સ્થિત હોય છે અને તે સ્નાયુઓને નિયંત્રિત કરે છે. સંવેદનાત્મક ન્યુરોન (A) ના કોષકેદ્ર ડોર્સલ રૂટ ગેંગ્લિયામાં હોય છે, ઇન્ટરન્યુરોન (C) મજ્જાતંતુમાં જ હોય છે, અને સહાનુભૂતિ ન્યુરોન (D) સિમ્પેથેટિક ચેતાતંત્રના ભાગ રૂપે હોય છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને સંવેદનાત્મક અંગો", "difficulty": "Hard", "num": 9}, {"question": "એક દર્દીને ડાબા હાથમાં સંવેદના ગુમાવવાની ફરિયાદ છે, પરંતુ તે હાથના સ્નાયુઓનું હલનચલન સામાન્ય રીતે કરી શકે છે. નીચેના પૈકી કયું પરિઘીય ચેતાતંત્રનું ઘટક આ સ્થિતિ માટે જવાબદાર હોઈ શકે છે?", "options": ["A) ડોર્સલ રૂટ ગેંગ્લિયામાં આવેલા એકસોનિક ન્યુરોન્સના કોષકાય", "B) વેન્ટ્રલ રૂટમાંથી નીકળતા સોમેટિક મોટર ન્યુરોન્સના અક્ષતંતુઓ", "C) સ્પાઇનલ ચેતાના ડોર્સલ રેમસમાં આવેલા સંવેદી તંતુઓ", "D) સ્વાયત્ત ચેતાતંત્રના પેરાસિમ્પેથેટિક ગેંગ્લિયામાં આવેલા પોસ્ટગેંગ્લિયોનિક ન્યુરોન્સ"], "correct": 2, "explanation": "સાચો જવાબ વિકલ્પ C છે. ડોર્સલ રેમસમાં આવેલા સંવેદી તંતુઓ શરીરના ચોક્કસ ભાગોમાંથી સંવેદના મેળવે છે. જો આ તંતુઓને નુકસાન થાય તો સંવેદના ગુમાવી શકાય છે, પરંતુ મોટર કાર્ય સામાન્ય રહે છે કારણ કે મોટર તંતુઓ વેન્ટ્રલ રૂટ દ્વારા અલગ રીતે મુસાફરી કરે છે.\n\nA) ડોર્સલ રૂટ ગેંગ્લિયામાં આવેલા એકસોનિક ન્યુરોન્સના કોષકાય સંવેદના માટે જવાબદાર છે, પરંતુ તે સંવેદના ગુમાવવાનું કારણ બની શકે છે, પરંતુ આ પ્રશ્નમાં હાથના ચોક્કસ વિસ્તારમાં સંવેદના ગુમાવવાની વાત છે, જે ડોર્સલ રેમસ સાથે વધુ સંબંધિત છે.\nB) વેન્ટ્રલ રૂટમાંથી નીકળતા સોમેટિક મોટર ન્યુરોન્સના અક્ષતંતુઓ મોટર કાર્ય માટે જવાબદાર છે, જે આ દર્દીમાં સામાન્ય છે, તેથી આ વિકલ્પ ખોટો છે.\nD) સ્વાયત્ત ચેતાતંત્રના પેરાસિમ્પેથેટિક ગેંગ્લિયામાં આવેલા પોસ્ટગેંગ્લિયોનિક ન્યુરોન્સ સ્વાયત્ત કાર્યોને નિયંત્રિત કરે છે, જે સ્નાયુઓના હલનચલન કે સંવેદના સાથે સીધો સંબંધ ધરાવતા નથી.", "ncert_ref": "કક્ષા XII - પ્રકરણ 21: ચેતાતંત્ર અને સહાનુભૂતિ તંત્ર", "difficulty": "Hard", "num": 10}, {"question": "પરિઘીય ચેતાતંત્રના સોમેટિક ભાગમાં, કયા તંત્રિકા કોષોના અક્ષતંતુઓ (axons) સૌથી લાંબા હોય છે અને તે સીધા જ સ્નાયુ કોષોને જોડાયેલા હોય છે?", "options": ["A) સંવેદનાત્મક તંત્રિકા કોષો (Sensory neurons)", "B) મધ્યવર્તી તંત્રિકા કોષો (Interneurons)", "C) ચાલક તંત્રિકા કોષો (Motor neurons)", "D) સહાનુભૂતિ તંત્રિકા કોષો (Sympathetic neurons)"], "correct": 2, "explanation": "સોમેટિક ચેતાતંત્રમાં, ચાલક તંત્રિકા કોષો (Motor neurons)ના અક્ષતંતુઓ સૌથી લાંબા હોય છે અને તે સીધા જ સ્નાયુ કોષોને જોડાયેલા હોય છે. સંવેદનાત્મક તંત્રિકા કોષો (A) સંવેદનાને મજ્જાતંત્ર તરફ વહન કરે છે, પરંતુ તેમના અક્ષતંતુઓ લાંબા નથી હોતા. મધ્યવર્તી તંત્રિકા કોષો (B) મજ્જાતંત્રમાં જ સ્થિત હોય છે અને પરિઘીય ચેતાતંત્રના ભાગ નથી. સહાનુભૂતિ તંત્રિકા કોષો (D) સ્વાયત્ત ચેતાતંત્રના ભાગ છે, સોમેટિક નહીં.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને અંતઃસ્રાવી તંત્ર", "difficulty": "Hard", "num": 11}, {"question": "જો કોઈ વ્યક્તિને કટોકટીની સ્થિતિમાં પુતળી (pupil)નો વ્યાસ વધારે છે, તો કયા પરિઘીય ચેતાતંત્રના ભાગ દ્વારા તે નિયંત્રિત થાય છે?", "options": ["A) સોમેટિક ચેતાતંત્ર", "B) પરાસંવેદનાત્મક (Parasympathetic) ચેતાતંત્ર", "C) સહાનુભૂતિ (Sympathetic) ચેતાતંત્ર", "D) મજ્જાતંત્ર (CNS)"], "correct": 2, "explanation": "કટોકટીની સ્થિતિમાં, સહાનુભૂતિ (Sympathetic) ચેતાતંત્ર સક્રિય થાય છે, જે પુતળીના વ્યાસને વધારવા માટે જવાબદાર છે. સોમેટિક ચેતાતંત્ર (A) ઇચ્છિત સ્નાયુઓને નિયંત્રિત કરે છે, પરંતુ પુતળીના આકારને નહીં. પરાસંવેદનાત્મક ચેતાતંત્ર (B) શાંત સ્થિતિમાં પુતળીને સંકોચે છે. મજ્જાતંત્ર (D) પરિઘીય ચેતાતંત્રનો ભાગ નથી, પરંતુ તેનું નિયંત્રણ કરે છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને અંતઃસ્રાવી તંત્ર", "difficulty": "Hard", "num": 12}, {"question": "જો કોઈ વ્યક્તિને હાથમાં ચોટ લાગે છે અને તેને તરત જ હાથ પાછો ખેંચી લે છે, તો આ રિફ્લેક્સ ક્રિયામાં કયા તંત્રિકા કોષો સક્રિય થાય છે?", "options": ["A) સંવેદનાત્મક તંત્રિકા કોષો અને ચાલક તંત્રિકા કોષો", "B) સંવેદનાત્મક તંત્રિકા કોષો અને મધ્યવર્તી તંત્રિકા કોષો", "C) ચાલક તંત્રિકા કોષો અને સહાનુભૂતિ તંત્રિકા કોષો", "D) મધ્યવર્તી તંત્રિકા કોષો અને સહાનુભૂતિ તંત્રિકા કોષો"], "correct": 0, "explanation": "રિફ્લેક્સ ક્રિયામાં, સંવેદનાત્મક તંત્રિકા કોષો (sensory neurons) સંવેદનાને મજ્જાતંત્ર તરફ વહન કરે છે અને ચાલક તંત્રિકા કોષો (motor neurons) સ્નાયુઓને પ્રતિક્રિયા આપવા માટે સંકેત મોકલે છે. મધ્યવર્તી તંત્રિકા કોષો (B, D) મજ્જાતંત્રમાં સ્થિત હોય છે અને પરિઘીય ચેતાતંત્રના ભાગ નથી. સહાનુભૂતિ તંત્રિકા કોષો (C, D) સ્વાયત્ત ચેતાતંત્રના ભાગ છે અને રિફ્લેક્સ ક્રિયામાં સક્રિય થતા નથી.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને અંતઃસ્રાવી તંત્ર", "difficulty": "Hard", "num": 13}, {"question": "પરિઘીય ચેતાતંત્રમાં, કયા તંત્રિકા કોષોના અક્ષતંતુઓ (axons) માયેલિન શીથથી આવરિત હોવા છતાં, તેની ગતિ સૌથી ધીમી હોય છે?", "options": ["A) A-α તંતુઓ", "B) A-β તંતુઓ", "C) A-δ તંતુઓ", "D) C તંતુઓ"], "correct": 2, "explanation": "A-δ તંતુઓ (C) માયેલિન શીથથી આવરિત હોય છે, પરંતુ તેની ગતિ A-α (A) અને A-β (B) કરતાં ધીમી હોય છે. C તંતુઓ (D) માયેલિન શીથથી આવરિત નથી હોતા અને તેની ગતિ સૌથી ધીમી હોય છે. A-α તંતુઓ (A) સૌથી જલદી ગતિ ધરાવે છે, જ્યારે A-β તંતુઓ (B) મધ્યમ ગતિ ધરાવે છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને અંતઃસ્રાવી તંત્ર", "difficulty": "Hard", "num": 14}, {"question": "એક દર્દીને કરોડરજ્જુના થોરાસિક વિસ્તારમાં ઈજા થઈ છે, જેના કારણે તેના પેટના સ્નાયુઓમાં લકવો થઈ ગયો છે, પરંતુ તેના હાથ અને પગના સ્નાયુઓનું નિયંત્રણ સામાન્ય છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) પરિઘીય ચેતાતંત્રના સોમેટિક ભાગના અંતર્ગત આવતા કરોડરજ્જુના ચેતાતંતુઓને નુકસાન થયું છે, જે પેટના સ્નાયુઓને નિયંત્રિત કરે છે.", "B) આ ઈજા કરોડરજ્જુના ગ્રે મેટરના પશ્ચ (dorsal) હોર્નને અસર કરે છે, જેના કારણે સંવેદનાત્મક ચેતાતંતુઓને નુકસાન થયું છે.", "C) આ પરિસ્થિતિમાં પરિઘીય ચેતાતંત્રના સ્વાયત્ત ભાગના સિમ્પેથેટિક તંતુઓને નુકસાન થયું છે, જે પેટના સ્નાયુઓને નિયંત્રિત કરે છે.", "D) કરોડરજ્જુના થોરાસિક વિસ્તારમાંથી નીકળતા વેન્ટ્રલ રૂટના ચેતાકોષોને નુકસાન થયું છે, જે પેટના સ્નાયુઓને મોટર સંકેતો પહોંચાડે છે."], "correct": 3, "explanation": "સોમેટિક ચેતાતંત્રના મોટર ચેતાકોષોના અક્ષતંતુઓ કરોડરજ્જુના વેન્ટ્રલ રૂટમાંથી બહાર નીકળે છે અને કંકાલ સ્નાયુઓને નિયંત્રિત કરે છે. થોરાસિક વિસ્તારમાં ઈજાના કારણે પેટના સ્નાયુઓને નિયંત્રિત કરતા વેન્ટ્રલ રૂટના ચેતાકોષોને નુકસાન થયું છે, જેના કારણે લકવો થયો છે. વિકલ્પ A ખોટો છે કારણ કે સોમેટિક ચેતાતંત્રના તમામ મોટર ચેતાતંતુઓ કરોડરજ્જુમાંથી નીકળે છે, પરંતુ આ ઈજા ચોક્કસ વિસ્તારના ચેતાતંતુઓને અસર કરે છે. વિકલ્પ B ખોટો છે કારણ કે પશ્ચ હોર્ન સંવેદનાત્મક ચેતાતંતુઓ સાથે સંબંધિત છે, મોટર નિયંત્રણ સાથે નહીં. વિકલ્પ C ખોટો છે કારણ કે સ્વાયત્ત ચેતાતંત્રના સિમ્પેથેટિક તંતુઓ પેટના સ્નાયુઓને સીધું નિયંત્રિત કરતા નથી, તેઓ અવયવો અને ગ્રંથીઓને નિયંત્રિત કરે છે.", "ncert_ref": "કક્ષા XII - પ્રકરણ 21: ચેતાતંત્રના સંકલન અને એકીકરણ, પૃષ્ઠ 325-327", "difficulty": "Hard", "num": 15}, {"question": "કોઈ વ્યક્તિને પગમાં તીવ્ર દુખાવો અનુભવાય છે, પરંતુ તે પગને હલાવી શકે છે. આ સ્થિતિમાં કયા તંત્રિકા માર્ગ (pathway)માં ખલેલ પડી હોવાની શક્યતા સૌથી વધુ છે?", "options": ["A) ડોર્સલ રૂટ ગેંગ્લિયનથી કરોડરજ્જુ સુધીનો સંવેદનાત્મક માર્ગ", "B) કરોડરજ્જુથી સ્નાયુઓ સુધીનો ચાલક (મોટર) માર્ગ", "C) કરોડરજ્જુની ગ્રે મેટરમાં સ્થિત ઇન્ટરન્યુરોનનો માર્ગ", "D) સિમ્પેથેટિક તંત્રિકા તંતુઓનો માર્ગ"], "correct": 0, "explanation": "સંવેદનાત્મક માર્ગ (A) ખલેલ પડી હોવાનું કારણ છે કે દુખાવો અનુભવવાની ક્ષમતા ગુમાવવી એ સંવેદનાત્મક તંત્રિકા માર્ગની ખામી સૂચવે છે. ચાલક માર્ગ (B) સામાન્ય રહ્યો હોવાનું પગ હલાવી શકવાનું સૂચવે છે. ઇન્ટરન્યુરોન (C) અને સિમ્પેથેટિક તંતુઓ (D) આ કિસ્સામાં પ્રભાવિત થયા ન હોવાનું મનાય છે, કારણ કે સ્નાયુની હલનચલન ક્ષમતા બરકરાર છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને અંતઃસ્રાવી તંત્ર", "difficulty": "Hard", "num": 16}, {"question": "કોઈ વ્યક્તિને ડાબા હાથમાં સંવેદના ગુમાવવાની સાથે જમણા હાથમાં સ્નાયુ નિબળાઈ જાય છે. આ લક્ષણો કયા સ્તરે કરોડરજ્જુની ઈજાનું સૂચન કરે છે?", "options": ["A) ગ્રીવા (Cervical) વિસ્તાર", "B) વક્ષ (Thoracic) વિસ્તાર", "C) કટિ (Lumbar) વિસ્તાર", "D) પુચ્છ (Sacral) વિસ્તાર"], "correct": 0, "explanation": "ગ્રીવા વિસ્તાર (A)ની ઈજા ડાબા હાથની સંવેદના અને જમણા હાથની ચાલક ક્રિયા બંનેને પ્રભાવિત કરે છે, કારણ કે ગ્રીવા વિસ્તાર હાથની સંવેદના અને ચાલક ક્રિયાઓ માટે જવાબદાર છે. વક્ષ (B), કટિ (C), અને પુચ્છ (D) વિસ્તારો હાથની ક્રિયાઓને નિયંત્રિત કરતા નથી.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને અંતઃસ્રાવી તંત્ર", "difficulty": "Hard", "num": 17}, {"question": "કોઈ વ્યક્તિને અચાનક તાપમાનમાં વધારો થતાં પસીનો આવવાનું બંધ થઈ જાય છે. આ સ્થિતિમાં કયા સ્વાયત્ત ચેતાતંત્રના ભાગમાં ખલેલ પડી હોવાની શક્યતા છે?", "options": ["A) સિમ્પેથેટિક તંત્રિકા તંતુઓ", "B) પેરાસિમ્પેથેટિક તંત્રિકા તંતુઓ", "C) સોમેટિક તંત્રિકા તંતુઓ", "D) અફરન્ટ તંત્રિકા તંતુઓ"], "correct": 0, "explanation": "સિમ્પેથેટિક તંત્રિકા તંતુઓ (A) પસીનો ઉત્પાદન અને સ્રાવને નિયંત્રિત કરે છે. જો આ તંતુઓમાં ખલેલ પડે, તો તાપમાનમાં વધારો થતાં પસીનો આવવાનું બંધ થઈ શકે. પેરાસિમ્પેથેટિક (B) તંતુઓ પાચન અને વિસર્જન જેવી ક્રિયાઓને નિયંત્રિત કરે છે. સોમેટિક (C) અને અફરન્ટ (D) તંતુઓ પસીનો ઉત્પાદન સાથે સીધા સંબંધિત નથી.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને અંતઃસ્રાવી તંત્ર", "difficulty": "Hard", "num": 18}, {"question": "કયા તંત્રિકા કોષોના કોષકેદ્ર (cell body) ગેંગ્લિયામાં સ્થિત હોય છે અને તેના અક્ષતંતુઓ (axons) સ્નાયુઓ સુધી પહોંચે છે?", "options": ["A) સંવેદનાત્મક તંત્રિકા કોષો", "B) ચાલક (મોટર) તંત્રિકા કોષો", "C) ઇન્ટરન્યુરોન", "D) સિમ્પેથેટિક પ્રી-ગેંગ્લિયોનિક તંત્રિકા કોષો"], "correct": 1, "explanation": "ચાલક (મોટર) તંત્રિકા કોષો (B)ના કોષકેદ્ર ગેંગ્લિયામાં સ્થિત હોય છે અને તેના અક્ષતંતુઓ સ્નાયુઓ સુધી પહોંચે છે. સંવેદનાત્મક તંત્રિકા કોષો (A)ના કોષકેદ્ર ડોર્સલ રૂટ ગેંગ્લિયામાં હોય છે, પરંતુ તેના અક્ષતંતુઓ કરોડરજ્જુ સુધી પહોંચે છે. ઇન્ટરન્યુરોન (C) કરોડરજ્જુ અથવા મગજમાં સ્થિત હોય છે. સિમ્પેથેટિક પ્રી-ગેંગ્લિયોનિક તંત્રિકા કોષો (D)ના કોષકેદ્ર કરોડરજ્જુમાં હોય છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને અંતઃસ્રાવી તંત્ર", "difficulty": "Hard", "num": 19}, {"question": "એક વ્યક્તિને ડાબા પગમાં સંવેદના ગુમાવવાની સાથે જમણા પગમાં સ્નાયુ નિબળાઈ અનુભવાય છે. આ લક્ષણો કયા પરિઘીય ચેતાતંત્રના નુકસાનને સૂચવે છે, જ્યારે કરોડરજ્જુના કટિભાગ (Lumbar region)માં ઈજા થાય છે?", "options": ["A) ડોર્સલ રૂટ ગેંગ્લિયન (Dorsal root ganglion)ના સંવેદનાત્મક તંત્રિકા કોષો", "B) વેન્ટ્રલ રૂટ (Ventral root)ના ચાલક તંત્રિકા કોષો", "C) સોમેટિક ચેતાતંત્રના મિશ્ર તંત્રિકા (Mixed nerve)ના અક્ષતંતુઓ", "D) સ્વાયત્ત ચેતાતંત્રના પ્રી-ગેંગ્લિયોનિક તંત્રિકા કોષો"], "correct": 2, "explanation": "સોમેટિક ચેતાતંત્રના મિશ્ર તંત્રિકા (Mixed nerve)માં સંવેદનાત્મક અને ચાલક તંતુઓ બંને હોય છે. કરોડરજ્જુના કટિભાગમાં ઈજા થવાથી ડાબા પગની સંવેદના ગુમાવવાની સાથે જમણા પગમાં સ્નાયુ નિબળાઈ થાય છે, કારણ કે મિશ્ર તંત્રિકા બંને પ્રકારના સંકેતો વહન કરે છે. A) ફક્ત સંવેદનાત્મક તંત્રિકા કોષો હોય છે, પરંતુ ચાલક તંત્રિકા કોષો નહીં. B) ફક્ત ચાલક તંત્રિકા કોષો હોય છે, પરંતુ સંવેદનાત્મક તંત્રિકા કોષો નહીં. D) સ્વાયત્ત ચેતાતંત્રના પ્રી-ગેંગ્લિયોનિક તંત્રિકા કોષો હૃદય, પાચન તંત્ર જેવા અંતઃસ્રાવી અંગોને નિયંત્રિત કરે છે, પગના સ્નાયુઓને નહીં.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 20}, {"question": "કોઈ વ્યક્તિને કરોડરજ્જુના લંબર વિસ્તારમાં ઈજા થવાથી તેના ડાબા પગમાં સંવેદના ગુમાવવાની સાથે જમણા પગમાં સ્નાયુ નિબળાઈ અનુભવાય છે. આ સ્થિતિ કયા તંત્રિકા માર્ગના વિક્ષેપને કારણે થઈ શકે છે?", "options": ["A) કોર્ટિકોસ્પાઇનલ ટ્રેક્ટ (પિરામિડલ માર્ગ)", "B) સ્પાઇનોથેલેમિક ટ્રેક્ટ (ગેર-પિરામિડલ માર્ગ)", "C) ડોર્સલ કોલમ-મેડિયલ લેમનિસ્કસ પથ", "D) વેન્ટ્રલ સ્પાઇનોસેરેબેલર ટ્રેક્ટ"], "correct": 0, "explanation": "કોર્ટિકોસ્પાઇનલ ટ્રેક્ટ (પિરામિડલ માર્ગ) મોટર કમાન્ડને મગજથી સ્નાયુઓ સુધી વહન કરે છે. લંબર વિસ્તારમાં ઈજા થવાથી આ માર્ગ વિક્ષેપ પામે છે, જેના કારણે સ્નાયુ નિબળાઈ થાય છે. ડાબા પગમાં સંવેદના ગુમાવવું ડોર્સલ કોલમ-મેડિયલ લેમનિસ્કસ પથના વિક્ષેપને કારણે થાય છે, પરંતુ સ્નાયુ નિબળાઈ માટે કોર્ટિકોસ્પાઇનલ ટ્રેક્ટ જવાબદાર છે. સ્પાઇનોથેલેમિક ટ્રેક્ટ દુખાવા અને તાપમાનની સંવેદનાને વહન કરે છે, જ્યારે વેન્ટ્રલ સ્પાઇનોસેરેબેલર ટ્રેક્ટ પ્રોપ્રિયોસેપ્શન માટે જવાબદાર છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 21}, {"question": "કયા તંત્રિકા કોષોના અક્ષતંતુઓ (axons) માયેલિન શીથથી આવરિત હોવા છતાં, તેની વહન ગતિ સૌથી ધીમી હોય છે?", "options": ["A) A-α રેખીય તંતુઓ", "B) A-β રેખીય તંતુઓ", "C) A-γ રેખીય તંતુઓ", "D) C રેખીય તંતુઓ"], "correct": 3, "explanation": "C રેખીય તંતુઓ માયેલિન શીથથી આવરિત નથી હોતા અને તેની વહન ગતિ સૌથી ધીમી હોય છે (0.5–2 m/s). A-α, A-β, અને A-γ તંતુઓ માયેલિન શીથથી આવરિત હોય છે અને તેની વહન ગતિ ઝડપી હોય છે (12–120 m/s). આ પ્રશ્નમાં 'માયેલિન શીથથી આવરિત હોવા છતાં' એ ટ્રેપ છે, કારણ કે C તંતુઓ માયેલિન શીથથી આવરિત નથી, પરંતુ તેની વહન ગતિ સૌથી ધીમી છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 22}, {"question": "એક દર્દીને કરોડરજ્જુના સર્વિકલ વિસ્તારમાં ઈજા થવાથી તેના હાથમાં સંવેદના ગુમાવવાની સાથે સ્નાયુ નિબળાઈ અનુભવાય છે. આ સ્થિતિ કયા તંત્રિકા માર્ગના વિક્ષેપને કારણે થઈ શકે છે?", "options": ["A) લેટરલ કોર્ટિકોસ્પાઇનલ ટ્રેક્ટ", "B) એન્ટીરિયર કોર્ટિકોસ્પાઇનલ ટ્રેક્ટ", "C) ડોર્સલ સ્પાઇનોસેરેબેલર ટ્રેક્ટ", "D) વેન્ટ્રલ સ્પાઇનોથેલેમિક ટ્રેક્ટ"], "correct": 0, "explanation": "લેટરલ કોર્ટિકોસ્પાઇનલ ટ્રેક્ટ સર્વિકલ અને થોરાસિક વિસ્તારમાં સ્નાયુ હલનચલન માટે જવાબદાર છે. સર્વિકલ વિસ્તારમાં ઈજા થવાથી આ માર્ગ વિક્ષેપ પામે છે, જેના કારણે હાથમાં સ્નાયુ નિબળાઈ થાય છે. ડોર્સલ સ્પાઇનોસેરેબેલર ટ્રેક્ટ પ્રોપ્રિયોસેપ્શન માટે જવાબદાર છે, જ્યારે વેન્ટ્રલ સ્પાઇનોથેલેમિક ટ્રેક્ટ દુખાવા અને તાપમાનની સંવેદનાને વહન કરે છે. એન્ટીરિયર કોર્ટિકોસ્પાઇનલ ટ્રેક્ટ અક્ષીય સ્નાયુઓને નિયંત્રિત કરે છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 23}, {"question": "કોઈ વ્યક્તિને પગના તળિયામાં કાટમાળ (thorn) વાગે છે, પરંતુ તેને દુખાવો અનુભવાતો નથી, પરંતુ તે પગને તરત જ ઉઠાવી લે છે. આ કિસ્સામાં કયું વિધાન સત્ય છે?", "options": ["A) સંવેદનાત્મક (sensory) તંત્રિકા કોષોનો અવરોધ થયો છે, પરંતુ મોટર તંત્રિકા કોષો સક્રિય છે.", "B) મોટર તંત્રિકા કોષોનો અવરોધ થયો છે, પરંતુ સંવેદનાત્મક તંત્રિકા કોષો સક્રિય છે.", "C) સોમેટિક ચેતાતંત્રના તમામ તંત્રિકા કોષોનો અવરોધ થયો છે.", "D) સ્વાયત્ત ચેતાતંત્રના તંત્રિકા કોષો સક્રિય થયા છે."], "correct": 0, "explanation": "સરળ રિફ્લેક્સ ક્રિયા (જેવી કે પગ ઉઠાવવો) માટે સંવેદનાત્મક તંત્રિકા કોષો દ્વારા ઉત્તેજના મજ્જાતંત્ર સુધી પહોંચે છે અને મોટર તંત્રિકા કોષો દ્વારા પ્રતિક્રિયા થાય છે. દુખાવો અનુભવાતો ન હોવો એ સૂચવે છે કે સંવેદનાત્મક તંત્રિકા કોષોનો અવરોધ થયો છે, પરંતુ મોટર તંત્રિકા કોષો સક્રિય હોવાથી રિફ્લેક્સ ક્રિયા થાય છે. વિકલ્પ B, C, અને D અસત્ય છે કારણ કે મોટર તંત્રિકા કોષો સક્રિય છે, સોમેટિક ચેતાતંત્રના તમામ કોષો અવરોધિત નથી, અને સ્વાયત્ત ચેતાતંત્ર આ ક્રિયામાં સંલગ્ન નથી.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાતંત્ર અને અંતઃસ્રાવી તંત્ર", "difficulty": "Hard", "num": 24}, {"question": "કરોડરજ્જુના વક્ષ (thoracic) અને કટિ (lumbar) ભાગમાંથી નીકળતા કયા તંત્રિકા જૂથમાં સંવેદનાત્મક અને મોટર તંતુઓ બંને હાજર હોય છે, પરંતુ તે સોમેટિક ચેતાતંત્રનો ભાગ નથી?", "options": ["A) ફ્રેનિક તંત્રિકા (Phrenic nerve)", "B) વેગસ તંત્રિકા (Vagus nerve)", "C) સાયટિક તંત્રિકા (Sciatic nerve)", "D) સ્પ્લાન્ચનિક તંત્રિકા (Splanchnic nerve)"], "correct": 3, "explanation": "સ્પ્લાન્ચનિક તંત્રિકાઓ (Splanchnic nerves) કરોડરજ્જુના વક્ષ અને કટિ ભાગમાંથી નીકળે છે અને તે સ્વાયત્ત ચેતાતંત્રનો ભાગ છે, જેમાં સંવેદનાત્મક અને મોટર તંતુઓ બંને હાજર હોય છે, પરંતુ તે સોમેટિક ચેતાતંત્રનો ભાગ નથી. ફ્રેનિક તંત્રિકા સોમેટિક છે અને ડાયાફ્રામને નિયંત્રિત કરે છે. વેગસ તંત્રિકા સ્વાયત્ત છે પરંતુ મેડ્યુલા ઓબ્લોંગેટાથી નીકળે છે. સાયટિક તંત્રિકા સોમેટિક છે અને પગના સ્નાયુઓને નિયંત્રિત કરે છે.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાતંત્ર અને અંતઃસ્રાવી તંત્ર", "difficulty": "Hard", "num": 25}, {"question": "કરોડરજ્જુના વક્ષીય (thoracic) ભાગમાંથી નીકળતા સોમેટિક તંત્રિકા તંતુઓમાં કયો લક્ષણસમૂહ જોવા મળે છે?", "options": ["A) તે મોટાભાગે સંવેદનાત્મક (sensory) હોય છે અને તેના અક્ષતંતુઓ માયેલિનયુક્ત હોય છે", "B) તે મોટાભાગે ચાલક (motor) હોય છે અને તેના કોષકેદ્ર ગેંગ્લિયામાં સ્થિત હોય છે", "C) તે મિશ્ર પ્રકારના હોય છે અને તેના અક્ષતંતુઓ માયેલિનરહિત હોય છે", "D) તે સ્વાયત્ત ચેતાતંત્રના ભાગરૂપ હોય છે અને હૃદયના ધબકારા નિયંત્રિત કરે છે"], "correct": 0, "explanation": "કરોડરજ્જુના વક્ષીય ભાગમાંથી નીકળતા સોમેટિક તંત્રિકા તંતુઓ મુખ્યત્વે સંવેદનાત્મક હોય છે અને તેના અક્ષતંતુઓ માયેલિન શીથથી આવરિત હોય છે. વિકલ્પ B ખોટો છે કારણ કે સોમેટિક તંત્રિકા કોષોના કોષકેદ્ર મજ્જાતંત્ર (CNS)માં સ્થિત હોય છે, ગેંગ્લિયામાં નહીં. વિકલ્પ C ખોટો છે કારણ કે સોમેટિક તંતુઓ માયેલિનયુક્ત હોય છે. વિકલ્પ D ખોટો છે કારણ કે સ્વાયત્ત ચેતાતંત્ર હૃદયના ધબકારા નિયંત્રિત કરે છે, પરંતુ વક્ષીય ભાગમાંથી નીકળતા તંતુઓ સોમેટિક હોય છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 26}, {"question": "જો કોઈ વ્યક્તિને પગમાં અચાનક તીવ્ર દુખાવો થાય છે, પરંતુ તે પગને હલાવી શકે છે, તો કયા તંત્રિકા માર્ગને લગતી સમસ્યા હોવાની શક્યતા છે?", "options": ["A) સંવેદનાત્મક તંત્રિકા તંતુમાં ખામી", "B) ચાલક તંત્રિકા તંતુમાં ખામી", "C) મજ્જાતંત્ર (CNS)માં ખામી", "D) સ્નાયુમાં ખામી"], "correct": 0, "explanation": "સંવેદનાત્મક તંત્રિકા તંતુઓ દુખાવાની માહિતી મજ્જાતંત્ર સુધી લઈ જાય છે. જો દુખાવો અનુભવાતો હોય પરંતુ સ્નાયુ હલાવી શકાય છે, તો સંવેદનાત્મક તંતુમાં ખામી હોવાની શક્યતા છે. વિકલ્પ B ખોટો છે કારણ કે ચાલક તંતુઓ સ્નાયુ હલનચલન માટે જવાબદાર હોય છે, અને જો તેમાં ખામી હોય તો સ્નાયુ હલાવી શકાત નહીં. વિકલ્પ C ખોટો છે કારણ કે મજ્જાતંત્રમાં ખામી હોત તો સંવેદના અને હલનચલન બંને પ્રભાવિત થાય. વિકલ્પ D ખોટો છે કારણ કે સ્નાયુમાં ખામી હોત તો હલનચલન પ્રભાવિત થાય.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 27}, {"question": "કરોડરજ્જુના લંબર (lumbar) ભાગમાંથી નીકળતા કયા તંત્રિકા જૂથમાં ચાલક અને સંવેદનાત્મક બંને તંતુઓનો સમાવેશ થાય છે?", "options": ["A) સર્વિકલ તંત્રિકા જૂથ", "B) થોરાસિક તંત્રિકા જૂથ", "C) લંબર તંત્રિકા જૂથ", "D) સેક્રલ તંત્રિકા જૂથ"], "correct": 2, "explanation": "લંબર તંત્રિકા જૂથમાં ચાલક અને સંવેદનાત્મક બંને તંતુઓનો સમાવેશ થાય છે. વિકલ્પ A ખોટો છે કારણ કે સર્વિકલ તંત્રિકા જૂથ ગરદનના વિસ્તારમાંથી નીકળે છે. વિકલ્પ B ખોટો છે કારણ કે થોરાસિક તંત્રિકા જૂથ છાતીના વિસ્તારમાંથી નીકળે છે. વિકલ્પ D ખોટો છે કારણ કે સેક્રલ તંત્રિકા જૂથ કટિના નીચેના ભાગમાંથી નીકળે છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 28}, {"question": "જો કોઈ વ્યક્તિને ડાબા હાથમાં સંવેદના ગુમાવવાની સાથે જમણા હાથમાં સ્નાયુ નિબળાઈ અનુભવાય છે, તો કયા ભાગમાં ઈજા થઈ હોવાની શક્યતા છે?", "options": ["A) ડાબા હાથના સોમેટિક તંત્રિકા તંતુમાં", "B) જમણા હાથના ચાલક તંત્રિકા તંતુમાં", "C) કરોડરજ્જુના સર્વિકલ વિસ્તારમાં", "D) મસ્તિષ્કના સેરીબ્રલ કોર્ટેક્સમાં"], "correct": 2, "explanation": "કરોડરજ્જુના સર્વિકલ વિસ્તારમાં ઈજા થવાથી ડાબા હાથમાં સંવેદના ગુમાવવાની સાથે જમણા હાથમાં સ્નાયુ નિબળાઈ અનુભવાય શકે છે, કારણ કે સર્વિકલ વિસ્તાર હાથના સંવેદનાત્મક અને ચાલક તંતુઓને નિયંત્રિત કરે છે. વિકલ્પ A અને B ખોટા છે કારણ કે તે ફક્ત એક જ હાથને પ્રભાવિત કરે. વિકલ્પ D ખોટો છે કારણ કે મસ્તિષ્કના સેરીબ્રલ કોર્ટેક્સમાં ઈજા થવાથી બંને હાથ પ્રભાવિત થઈ શકે, પરંતુ તે સંવેદના અને ચાલક બંનેને પ્રભાવિત કરે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 29}, {"question": "કરોડરજ્જુના વક્ષીય (thoracic) અને કટિ (lumbar) ભાગમાંથી નીકળતા સોમેટિક મોટર તંત્રિકા તંતુઓની સરખામણીમાં, કયું વિધાન સત્ય છે?", "options": ["A) તેના અક્ષતંતુઓ (axons) માયેલિન શીથથી આવરિત હોવા છતાં, તેની વહન ગતિ સંવેદનાત્મક તંતુઓ કરતાં ધીમી હોય છે", "B) તેના કોષકેદ્ર (cell body) ગેંગ્લિયામાં સ્થિત હોય છે અને તે સ્નાયુઓને સંકેત પહોંચાડે છે", "C) તે સીધા જ મજ્જાતંતુ (CNS)માંથી ઉદ્ભવે છે અને સ્નાયુ તંતુઓને જોડે છે, પરંતુ તેના અંતે કોઈ સિનેપ્સ નથી હોતો", "D) તે સંવેદનાત્મક તંતુઓ સાથે મિશ્રિત હોય છે અને કરોડરજ્જુના ડોરસલ મૂળમાંથી નીકળે છે"], "correct": 0, "explanation": "સોમેટિક મોટર તંત્રિકા તંતુઓના અક્ષતંતુઓ માયેલિન શીથથી આવરિત હોય છે, પરંતુ તેની વહન ગતિ સંવેદનાત્મક તંતુઓ કરતાં ધીમી હોય છે કારણ કે મોટર તંતુઓમાં A-ગામા તંતુઓ હોય છે, જે A-બીટા (સંવેદનાત્મક) કરતાં પાતળા હોય છે. વિકલ્પ B ખોટો છે કારણ કે સોમેટિક મોટર તંત્રિકા કોષોના કોષકેદ્ર કરોડરજ્જુના અગ્ર ભાગ (ventral horn)માં હોય છે, ગેંગ્લિયામાં નહીં. વિકલ્પ C ખોટો છે કારણ કે સોમેટિક મોટર તંતુઓ સ્નાયુ તંતુઓ સાથે સિનેપ્સ બનાવે છે. વિકલ્પ D ખોટો છે કારણ કે સોમેટિક મોટર તંતુઓ કરોડરજ્જુના વેન્ટ્રલ મૂળમાંથી નીકળે છે, ડોરસલ મૂળમાંથી નહીં.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર", "difficulty": "Hard", "num": 30}, {"question": "એક વ્યક્તિને પગના તળિયામાં કાટમાળ (thorn) વાગે છે, પરંતુ તેને દુખાવો અનુભવાતો નથી. આ સ્થિતિમાં કયા તંત્રિકા માર્ગમાં ખલેલ થઈ શકે છે?", "options": ["A) સંવેદનાત્મક તંત્રિકા કોષના ડેન્ડ્રાઇટ્સથી કોષકેદ્ર સુધીનો માર્ગ", "B) સંવેદનાત્મક તંત્રિકા કોષના કોષકેદ્રથી મજ્જાતંતુ સુધીનો માર્ગ", "C) મોટર તંત્રિકા કોષના કોષકેદ્રથી અક્ષતંતુ સુધીનો માર્ગ", "D) મોટર તંત્રિકા કોષના અક્ષતંતુથી સ્નાયુ સુધીનો માર્ગ"], "correct": 1, "explanation": "સંવેદનાત્મક તંત્રિકા કોષના કોષકેદ્રથી મજ્જાતંતુ સુધીનો માર્ગ ખલેલી હોવાથી દુખાવો અનુભવાતો નથી. વિકલ્પ A ખોટો છે કારણ કે ડેન્ડ્રાઇટ્સથી કોષકેદ્ર સુધીનો માર્ગ સ્થાનિક હોય છે અને કાટમાળ વાગવાથી તે સીધો પ્રભાવિત થતો નથી. વિકલ્પ C અને D ખોટા છે કારણ કે તે મોટર તંત્રિકા માર્ગ સાથે સંબંધિત છે, જે સ્નાયુ સંકોચન માટે જવાબદાર છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને ગ્રાહકો", "difficulty": "Hard", "num": 31}, {"question": "એક વ્યક્તિને પગના તળિયામાં કાટમાળ વાગે છે, પરંતુ તેને દુખાવો અનુભવાતો નથી. આ સ્થિતિમાં કયા તંત્રિકા માર્ગમાં ખલેલ પડી શકે છે?", "options": ["A) ડોર્સલ રૂટ ગેંગ્લિયાનું નુકસાન", "B) વેન્ટ્રલ રૂટનું નુકસાન", "C) સ્પાઇનલ કોર્ડનું સંપૂર્ણ કાપ", "D) સિમ્પેથેટિક તંત્રિકા તંતુઓનું નુકસાન"], "correct": 0, "explanation": "દુખાવો અનુભવવાની ક્ષમતા સંવેદનાત્મક તંતુઓ પર આધારિત હોય છે, જેના કોષકેદ્ર ડોર્સલ રૂટ ગેંગ્લિયામાં સ્થિત હોય છે. જો ડોર્સલ રૂટ ગેંગ્લિયાનું નુકસાન થાય, તો સંવેદના સંકેતો મજ્જાતંત્ર સુધી પહોંચી શકતા નથી, પરિણામે દુખાવો અનુભવાતો નથી. વિકલ્પ B ખોટો છે કારણ કે વેન્ટ્રલ રૂટ ચાલક તંતુઓ ધરાવે છે, જે સ્નાયુ સંકોચન માટે જવાબદાર હોય છે. વિકલ્પ C ખોટો છે કારણ કે સંપૂર્ણ કાપથી ચાલક અને સંવેદનાત્મક બંને ક્રિયાઓ અટકી જાય છે. વિકલ્પ D ખોટો છે કારણ કે સિમ્પેથેટિક તંત્રિકા તંતુઓ સ્વાયત્ત ચેતાતંત્રના ભાગ છે, જે દુખાવો સાથે સીધા સંબંધિત નથી.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને નિયંત્રણ અને સંકલન", "difficulty": "Hard", "num": 32}, {"question": "એક દર્દીને કરોડરજ્જુના થોરાસિક (T5) વિસ્તારમાં ઈજા થઈ છે. આ ઈજાના પરિણામે નીચેનામાંથી કયું લક્ષણ જોવા મળે તેવી શક્યતા સૌથી ઓછી છે?", "options": ["A) પેટના ઉપરના ભાગમાં સંવેદના ગુમાવવી", "B) પેટના નીચેના ભાગમાં સ્વાયત્ત કાર્યોનું નિયંત્રણ ગુમાવવું", "C) હાથના સ્નાયુઓની નિબળાઈ અનુભવવી", "D) પગમાં સ્વેદન (sweating) નું નિયંત્રણ ગુમાવવું"], "correct": 2, "explanation": "થોરાસિક વિસ્તારની ઈજા પેટ અને ધડના ભાગને અસર કરે છે, પરંતુ હાથના સ્નાયુઓનું નિયંત્રણ સર્વિકલ વિસ્તાર (C1-C8) દ્વારા થાય છે. તેથી હાથની નિબળાઈ થવાની શક્યતા સૌથી ઓછી છે. પેટના ઉપરના ભાગમાં સંવેદના ગુમાવવી (T5 ની ઉપર), પેટના નીચેના ભાગમાં સ્વાયત્ત કાર્યોનું નિયંત્રણ ગુમાવવું (T5 ની નીચે), અને પગમાં સ્વેદનનું નિયંત્રણ ગુમાવવું (સિમ્પેથેટિક ચેતાતંત્ર T1-L2 દ્વારા) થઈ શકે છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 21: ચેતાતંત્રના ભાગો અને કાર્યો", "difficulty": "Hard", "num": 33}, {"question": "પરિઘીય ચેતાતંત્રના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) સોમેટિક ચેતાતંત્રના મોટર તંતુઓ હંમેશા એક્સોનલ હોય છે અને તે માયેલિન શીથથી આવરિત હોય છે", "B) સ્વાયત્ત ચેતાતંત્રના પ્રેગેન્ગ્લિઓનિક તંતુઓ માયેલિન શીથથી આવરિત હોય છે, પરંતુ પોસ્ટગેન્ગ્લિઓનિક તંતુઓ માયેલિનરહિત હોય છે", "C) સંવેદનાત્મક ચેતાતંત્રના તંતુઓમાં માયેલિન શીથ હોતી નથી, જેના કારણે તેની વહન ગતિ ધીમી હોય છે", "D) સ્વાયત્ત ચેતાતંત્રના પેરાસિમ્પેથેટિક ભાગના પોસ્ટગેન્ગ્લિઓનિક તંતુઓ સામાન્ય રીતે ટૂંકા હોય છે"], "correct": 2, "explanation": "સંવેદનાત્મક ચેતાતંત્રના તંતુઓમાં પણ માયેલિન શીથ હોઈ શકે છે, ખાસ કરીને જે ઝડપી વહન માટે જવાબદાર હોય છે (જેમ કે પ્રોપ્રાયોસેપ્શન અને તીવ્ર દુખાવો). સોમેટિક મોટર તંતુઓ હંમેશા માયેલિનયુક્ત હોય છે (A સાચું), સ્વાયત્ત પ્રેગેન્ગ્લિઓનિક તંતુઓ માયેલિનયુક્ત અને પોસ્ટગેન્ગ્લિઓનિક તંતુઓ માયેલિનરહિત હોય છે (B સાચું), અને પેરાસિમ્પેથેટિક પોસ્ટગેન્ગ્લિઓનિક તંતુઓ સામાન્ય રીતે ટૂંકા હોય છે (D સાચું).", "ncert_ref": "કક્ષા 11 - પ્રકરણ 21: ચેતાતંત્રના પ્રકારો અને માયેલિનેશન", "difficulty": "Hard", "num": 34}, {"question": "એક દર્દીને ડાબા પગમાં સંવેદના ગુમાવવાની સાથે જમણા પગમાં સ્નાયુ નિબળાઈ અનુભવાય છે. આ લક્ષણો કયા પ્રકારની ચેતાતંત્રની ઈજા સૂચવે છે?", "options": ["A) કરોડરજ્જુના ડાબી બાજુની હેમિસેક્શન (Brown-Séquard syndrome)", "B) કરોડરજ્જુનું સંપૂર્ણ કાપણ (Complete transection)", "C) કરોડરજ્જુના અગ્ર ભાગની ઈજા (Anterior cord syndrome)", "D) કરોડરજ્જુના મધ્ય ભાગની ઈજા (Central cord syndrome)"], "correct": 0, "explanation": "Brown-Séquard syndromeમાં કરોડરજ્જુની એક બાજુની ઈજા થાય છે, જેના કારણે ઈજાવાળી બાજુમાં મોટર કાર્ય ગુમાવાય છે (કારણ કે કોર્ટિકોસ્પાઇનલ ટ્રેક્ટ ક્રોસ થતો નથી) અને વિરુદ્ધ બાજુમાં સંવેદના ગુમાવાય છે (કારણ કે સ્પાઇનોથેલેમિક ટ્રેક્ટ ક્રોસ થાય છે). સંપૂર્ણ કાપણમાં બંને બાજુ મોટર અને સંવેદના ગુમાવાય છે (B ખોટું), અગ્ર ભાગની ઈજામાં મુખ્યત્વે મોટર કાર્ય અને દુખાવાની સંવેદના ગુમાવાય છે (C ખોટું), અને મધ્ય ભાગની ઈજામાં હાથમાં વધુ નબળાઈ જોવા મળે છે (D ખોટું).", "ncert_ref": "કક્ષા 11 - પ્રકરણ 21: કરોડરજ્જુના માર્ગો અને ઈજાના પ્રકારો", "difficulty": "Hard", "num": 35}, {"question": "કરોડરજ્જુના લંબર (L4-L5) વિસ્તારમાં ઈજા થવાથી દર્દીને ડાબા પગમાં સંવેદના ગુમાવવાની સાથે જમણા પગમાં સ્નાયુ નિબળાઈ અનુભવાય છે. આ લક્ષણો કયા સિડ્રોમ (Syndrome) તરફ નિર્દેશ કરે છે?", "options": ["A) બ્રાઉન-સીક્વાર્ડ સિડ્રોમ", "B) સેન્ટ્રલ કોર્ડ સિડ્રોમ", "C) કૌડા ઇક્વાઇના સિડ્રોમ", "D) એન્ટીરિયર કોર્ડ સિડ્રોમ"], "correct": 0, "explanation": "બ્રાઉન-સીક્વાર્ડ સિડ્રોમમાં કરોડરજ્જુના અર્ધભાગને ઈજા થવાથી ઈજાવાળા બાજુની મોટર ક્ષતિ (સ્નાયુ નિબળાઈ) અને વિરુદ્ધ બાજુની સંવેદનાત્મક ક્ષતિ (સંવેદના ગુમાવવો) જોવા મળે છે. સેન્ટ્રલ કોર્ડ સિડ્રોમમાં મધ્ય ભાગને ઈજા થાય છે, કૌડા ઇક્વાઇના સિડ્રોમમાં કટિ ભાગના મૂળોને નુકસાન થાય છે, જ્યારે એન્ટીરિયર કોર્ડ સિડ્રોમમાં અગ્ર ભાગને ઈજા થાય છે, જે સંવેદના ગુમાવવાનું કારણ બને છે પરંતુ મોટર ક્ષતિ નહીં.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને ગતિવિધિ", "difficulty": "Hard", "num": 36}, {"question": "કરોડરજ્જુના વક્ષીય (T1-T12) ભાગમાંથી નીકળતા સોમેટિક મોટર તંત્રિકા તંતુઓની નીચેનામાંથી કઈ વિશેષતા સાચી નથી?", "options": ["A) તે મજ્જાતંતુના અગ્ર શિંગ (ventral horn)માંથી ઉદ્ભવે છે", "B) તે સીધા જ સ્નાયુઓને પહોંચે છે", "C) તે ગેંગ્લિયામાં સ્થિત કોષકેદ્ર ધરાવે છે", "D) તે માયેલિન શીથથી આવરિત હોય છે"], "correct": 2, "explanation": "સોમેટિક મોટર તંત્રિકા તંતુઓ મજ્જાતંતુના અગ્ર શિંગમાંથી ઉદ્ભવે છે અને સીધા જ સ્નાયુઓને પહોંચે છે. તે માયેલિન શીથથી આવરિત હોય છે. ગેંગ્લિયામાં કોષકેદ્ર ધરાવતા તંત્રિકા કોષો સંવેદનાત્મક તંતુઓ (ડોર્સલ રૂટ ગેંગ્લિયા) અથવા સ્વાયત્ત તંત્રિકા તંતુઓ હોય છે, સોમેટિક મોટર તંતુઓના કોષકેદ્ર મજ્જાતંતુમાં જ સ્થિત હોય છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને ગતિવિધિ", "difficulty": "Hard", "num": 37}, {"question": "નીચેનામાંથી કયું વિધાન પરિઘીય ચેતાતંત્રના સોમેટિક ભાગ વિશે ખોટું છે?", "options": ["A) તે સ્વેચ્છિક નિયંત્રણ હેઠળ કામ કરે છે", "B) તેના તંતુઓ મજ્જાતંતુના ડોર્સલ રૂટમાંથી નીકળે છે", "C) તેના તંતુઓ માયેલિન શીથથી આવરિત હોય છે", "D) તે સ્નાયુઓના સંકોચન માટે જવાબદાર હોય છે"], "correct": 1, "explanation": "પરિઘીય ચેતાતંત્રના સોમેટિક ભાગના તંતુઓ મજ્જાતંતુના અગ્ર શિંગ (ventral root)માંથી નીકળે છે, ડોર્સલ રૂટમાંથી સંવેદનાત્મક તંતુઓ નીકળે છે. સોમેટિક ભાગ સ્વેચ્છિક નિયંત્રણ હેઠળ કામ કરે છે, તેના તંતુઓ માયેલિન શીથથી આવરિત હોય છે, અને તે સ્નાયુઓના સંકોચન માટે જવાબદાર હોય છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને ગતિવિધિ", "difficulty": "Hard", "num": 38}, {"question": "કરોડરજ્જુના વક્ષીય (T1-T12) ભાગમાંથી નીકળતા સોમેટિક તંત્રિકા તંતુઓ વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) આ તંતુઓમાં માત્ર સંવેદનાત્મક તંતુઓનો સમાવેશ થાય છે, કારણ કે વક્ષીય ભાગમાં મોટર તંતુઓ નીકળતા નથી.", "B) આ તંતુઓમાં ચાલક (મોટર) અને સંવેદનાત્મક બંને પ્રકારના તંતુઓનો સમાવેશ થાય છે, પરંતુ તે સ્વાયત્ત ચેતાતંત્રના ભાગરૂપે કામ કરે છે.", "C) આ તંતુઓમાં ચાલક (મોટર) અને સંવેદનાત્મક બંને પ્રકારના તંતુઓનો સમાવેશ થાય છે, અને તે સોમેટિક ચેતાતંત્રના ભાગરૂપે કામ કરે છે.", "D) આ તંતુઓ માત્ર સ્વાયત્ત ચેતાતંત્રના સિમ્પેથેટિક ભાગ સાથે જોડાયેલા હોય છે."], "correct": 2, "explanation": "સોમેટિક ચેતાતંત્રના તંતુઓ વક્ષીય (T1-T12) ભાગમાંથી પણ નીકળે છે, અને તે ચાલક (મોટર) અને સંવેદનાત્મક બંને પ્રકારના તંતુઓ ધરાવે છે. વિકલ્પ A ખોટો છે કારણ કે વક્ષીય ભાગમાં મોટર તંતુઓ પણ નીકળે છે. વિકલ્પ B ખોટો છે કારણ કે આ તંતુઓ સ્વાયત્ત ચેતાતંત્રના ભાગરૂપે નહીં, પરંતુ સોમેટિક ચેતાતંત્રના ભાગરૂપે કામ કરે છે. વિકલ્પ D ખોટો છે કારણ કે આ તંતુઓ સ્વાયત્ત ચેતાતંત્રના સિમ્પેથેટિક ભાગ સાથે જોડાયેલા નથી, પરંતુ સોમેટિક ચેતાતંત્રના ભાગરૂપે કામ કરે છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને નિયંત્રણ અને સમન્વય", "difficulty": "Hard", "num": 39}, {"question": "એક દર્દીને કરોડરજ્જુના લંબર (L4-L5) વિસ્તારમાં ઈજા થવાથી તેના ડાબા પગમાં સંવેદના ગુમાવવાની સાથે જમણા પગમાં સ્નાયુ નિબળાઈ અનુભવાય છે. આ સ્થિતિ માટે નીચેનામાંથી કયો કારણભૂત અવયવ જવાબદાર હોઈ શકે?", "options": ["A) ડોર્સલ રૂટ ગેંગ્લિયાનું નુકસાન", "B) વેન્ટ્રલ રૂટનું નુકસાન", "C) સ્પાઇનલ કોર્ડનું ક્રોસ-સેક્શનલ નુકસાન", "D) સિમ્પેથેટિક ગેંગ્લિયાનું નુકસાન"], "correct": 2, "explanation": "કરોડરજ્જુનું ક્રોસ-સેક્શનલ નુકસાન (જેમ કે L4-L5 વિસ્તારમાં) ડાબા પગમાં સંવેદના ગુમાવવા (ડોર્સલ રૂટના નુકસાનને કારણે) અને જમણા પગમાં સ્નાયુ નિબળાઈ (વેન્ટ્રલ રૂટના નુકસાનને કારણે) તરફ દોરી શકે છે. વિકલ્પ A અને B અંશતઃ સત્ય છે, પરંતુ તે ક્રોસ-સેક્શનલ નુકસાનની સંપૂર્ણ તસવીર આપતું નથી. વિકલ્પ D સ્વાયત્ત ચેતાતંત્ર સાથે સંબંધિત છે, જે આ કેસમાં પ્રસ્તુત નથી.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને નિયંત્રણ તથા સમન્વય", "difficulty": "Hard", "num": 40}, {"question": "કરોડરજ્જુના વક્ષીય (T1-T12) અને કટિ (L1-L5) ભાગમાંથી નીકળતા સોમેટિક તંત્રિકા તંતુઓ વિશે નીચેનામાંથી કયો લક્ષણસમૂહ સત્ય છે?", "options": ["A) આ તંતુઓ માત્ર સંવેદનાત્મક હોય છે અને તેના અક્ષતંતુઓ માયેલિનયુક્ત નથી.", "B) આ તંતુઓ મોટર અને સંવેદનાત્મક બંને હોઈ શકે છે અને તેના અક્ષતંતુઓ માયેલિનયુક્ત હોય છે.", "C) આ તંતુઓ સ્વાયત્ત ચેતાતંત્રના ભાગરૂપે કામ કરે છે અને હૃદયના ધબકારા નિયંત્રિત કરે છે.", "D) આ તંતુઓના કોષકેદ્ર ગેંગ્લિયામાં સ્થિત હોય છે અને તે માત્ર ચાલક ક્રિયા માટે જવાબદાર હોય છે."], "correct": 1, "explanation": "કરોડરજ્જુના વક્ષીય અને કટિ ભાગમાંથી નીકળતા સોમેટિક તંત્રિકા તંતુઓ મોટર અને સંવેદનાત્મક બંને હોઈ શકે છે, અને તેના અક્ષતંતુઓ માયેલિનયુક્ત હોય છે. વિકલ્પ A ખોટો છે કારણ કે આ તંતુઓ માત્ર સંવેદનાત્મક નથી અને તેના અક્ષતંતુઓ માયેલિનયુક્ત હોય છે. વિકલ્પ C ખોટો છે કારણ કે સ્વાયત્ત ચેતાતંત્ર હૃદયના ધબકારા નિયંત્રિત કરે છે. વિકલ્પ D ખોટો છે કારણ કે સોમેટિક મોટર તંતુઓના કોષકેદ્ર મજ્જાતંત્રમાં સ્થિત હોય છે, ગેંગ્લિયામાં નહીં.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને નિયંત્રણ તથા સમન્વય", "difficulty": "Hard", "num": 41}, {"question": "એક દર્દીને કરોડરજ્જુના લંબર (L4-L5) વિસ્તારમાં ઈજા થવાથી ડાબા પગમાં સંવેદના ગુમાવવાની સાથે જમણા પગમાં સ્નાયુ નિબળાઈ અનુભવાય છે. આ લક્ષણો માટે નીચેનામાંથી કયું કારણ સૌથી વધુ યોગ્ય છે?", "options": ["A) કરોડરજ્જુના ડાબા બાજુના સંવેદનાત્મક તંતુઓ અને જમણા બાજુના મોટર તંતુઓને નુકસાન", "B) કરોડરજ્જુના ડાબા બાજુના મોટર અને સંવેદનાત્મક બંને તંતુઓને નુકસાન", "C) કરોડરજ્જુના જમણા બાજુના સંવેદનાત્મક તંતુઓ અને ડાબા બાજુના મોટર તંતુઓને નુકસાન", "D) કરોડરજ્જુના બંને બાજુના મોટર તંતુઓને નુકસાન, પરંતુ સંવેદનાત્મક તંતુઓને નહીં"], "correct": 0, "explanation": "કરોડરજ્જુમાં સંવેદનાત્મક તંતુઓ ડોર્સલ હોર્ન દ્વારા પ્રવેશે છે અને તે જ બાજુના સંવેદનાત્મક માર્ગો દ્વારા ઉપર જાય છે, જ્યારે મોટર તંતુઓ વેન્ટ્રલ હોર્નમાંથી નીકળીને વિરુદ્ધ બાજુના સ્નાયુઓને નિયંત્રિત કરે છે. આથી, ડાબા પગમાં સંવેદના ગુમાવવી એ ડાબા બાજુના સંવેદનાત્મક તંતુઓને નુકસાન સૂચવે છે, જ્યારે જમણા પગમાં સ્નાયુ નિબળાઈ જમણા બાજુના મોટર તંતુઓને નુકસાન સૂચવે છે (જે વાસ્તવમાં ડાબા બાજુના મોટર ન્યુરોન્સમાંથી નીકળે છે). આથી વિકલ્પ A સાચો છે. અન્ય વિકલ્પો આ લક્ષણોને યોગ્ય રીતે સમજાવતા નથી.", "ncert_ref": "કક્ષા 11 - અધ્યાય 21: કરોડરજ્જુની રચના અને કાર્ય", "difficulty": "Hard", "num": 42}, {"question": "એક વ્યક્તિને ડાબા પગના તળિયામાં કાટમાળ વાગે છે, પરંતુ તેને દુખાવો અનુભવાતો નથી, પરંતુ તે પગને સચેતન રીતે હલાવી શકે છે. આ સ્થિતિ માટે નીચેનામાંથી કયું કારણ સૌથી યોગ્ય છે?", "options": ["A) ડોરસલ રૂટ ગેંગ્લિયન (DRG) ના સંવેદનાત્મક ન્યુરોનને નુકસાન થયું છે, પરંતુ વેન્ટ્રલ રૂટના મોટર ન્યુરોન સ્વસ્થ છે.", "B) સ્પાઇનલ કોર્ડના ડોરસલ હોર્નમાં નુકસાન થયું છે, જેના કારણે સંવેદના અવરોધિત થાય છે, પરંતુ વેન્ટ્રલ હોર્ન સ્વસ્થ છે.", "C) પરિફેરલ નર્વ (જેમ કે સાયટિક નર્વ) ને પૂર્ણપણે કાપી નાખવામાં આવી છે, જેના કારણે સંવેદના અને ચાલક બંને ક્રિયાઓ અવરોધિત થાય છે.", "D) મજ્જાતંતુ (CNS) ના સેન્સરી એરિયામાં (જેમ કે સોમેટોસેન્સરી કોર્ટેક્સ) નુકસાન થયું છે, પરંતુ મોટર કોર્ટેક્સ સ્વસ્થ છે."], "correct": 0, "explanation": "સાચો જવાબ A છે. ડોરસલ રૂટ ગેંગ્લિયન (DRG) ના સંવેદનાત્મક ન્યુરોન સંવેદના સંકેતોને મજ્જાતંતુ તરફ વહન કરે છે. જો આ ન્યુરોનને નુકસાન થાય, તો સંવેદના ગુમાવવાની સ્થિતિ ઉદ્ભવે છે, પરંતુ મોટર ન્યુરોન (વેન્ટ્રલ રૂટ) સ્વસ્થ હોવાથી સ્નાયુ હલનચલન શક્ય રહે છે. B ખોટું છે કારણ કે ડોરસલ હોર્નમાં નુકસાન થવાથી સંવેદના અવરોધિત થાય, પરંતુ આ સ્થિતિમાં વેન્ટ્રલ હોર્ન પણ અસરગ્રસ્ત થઈ શકે, જે ચાલક ક્રિયાને અસર કરે. C ખોટું છે કારણ કે પરિફેરલ નર્વને કાપવાથી સંવેદના અને ચાલક બંને ક્રિયાઓ અવરોધિત થાય, જે આ કેસમાં નથી. D ખોટું છે કારણ કે સેન્સરી કોર્ટેક્સમાં નુકસાન થવાથી સંવેદના ગુમાવવાની સ્થિતિ ઉદ્ભવે, પરંતુ મોટર કોર્ટેક્સ સ્વસ્થ હોવા છતાં, સંવેદના સંકેતોની ઉણપને લીધે દુખાવો અનુભવાતો નથી, પરંતુ આ સ્થિતિ DRG ના નુકસાનથી વધુ સીધી રીતે સંબંધિત છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને ગુપ્ત રસ", "difficulty": "Hard", "num": 43}, {"question": "પરિઘીય ચેતાતંત્રના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન સોમેટિક ચેતાતંત્ર વિશે સત્ય નથી?", "options": ["A) સોમેટિક ચેતાતંત્રમાં, મોટર ન્યુરોનના કોષકેદ્ર (cell body) મજ્જાતંતુ (CNS) માં સ્થિત હોય છે.", "B) સોમેટિક ચેતાતંત્રના તંતુઓમાં માયેલિન શીથ હાજર હોય છે, જે વહનની ગતિ વધારે છે.", "C) સોમેટિક ચેતાતંત્રના મોટર ન્યુરોનના અક્ષતંતુઓ (axons) સીધા જ સ્નાયુ તંતુઓને જોડાયેલા હોય છે.", "D) સોમેટિક ચેતાતંત્રમાં, સંવેદનાત્મક અને મોટર તંતુઓ એકસાથે એક જ તંત્રિકામાં મળીને મિશ્ર તંત્રિકા બનાવે છે."], "correct": 3, "explanation": "સાચો જવાબ D છે. સોમેટિક ચેતાતંત્રમાં, સંવેદનાત્મક અને મોટર તંતુઓ અલગ અલગ તંત્રિકાઓમાં હોય છે. સંવેદનાત્મક તંતુઓ ડોરસલ રૂટ દ્વારા અને મોટર તંતુઓ વેન્ટ્રલ રૂટ દ્વારા મજ્જાતંતુ સાથે જોડાયેલા હોય છે. A સત્ય છે કારણ કે સોમેટિક મોટર ન્યુરોનના કોષકેદ્ર મજ્જાતંતુમાં (વેન્ટ્રલ હોર્ન) સ્થિત હોય છે. B સત્ય છે કારણ કે સોમેટિક તંતુઓમાં માયેલિન શીથ હાજર હોય છે, જે વહનની ગતિ વધારે છે. C સત્ય છે કારણ કે સોમેટિક મોટર ન્યુરોનના અક્ષતંતુઓ સીધા જ સ્નાયુ તંતુઓને જોડાયેલા હોય છે, જે સ્નાયુ સંકોચનને                 document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
