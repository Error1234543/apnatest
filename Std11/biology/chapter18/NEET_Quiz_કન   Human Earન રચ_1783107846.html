    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}

        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}

        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}

        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}

        .btn-secondary{background:#6b7280}

        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}

        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>

    <script>
        const questionsData = [{"question": "કાનના અંતઃકર્ણમાં આવેલા કોક્લિયામાં, બાહ્ય કોષિકા (outer hair cells) અને અંતઃ કોષિકા (inner hair cells) વચ્ચેનો મુખ્ય તફાવત કયો છે?", "options": ["A) બાહ્ય કોષિકાઓ ધ્વનિ તરંગોને વિદ્યુત સંકેતમાં રૂપાંતરિત કરે છે, જ્યારે અંતઃ કોષિકાઓ ધ્વનિની તીવ્રતાને નિયંત્રિત કરે છે.", "B) અંતઃ કોષિકાઓ ધ્વનિની આવર્તનને ઓળખે છે, જ્યારે બાહ્ય કોષિકાઓ કોક્લિયર એમ્પ્લિફિકેશનમાં ભાગ લે છે.", "C) બાહ્ય કોષિકાઓ સંવેદનશીલતા વધારવા માટે કોક્લિયર દ્રવમાં રસાયણો મુક્ત કરે છે, જ્યારે અંતઃ કોષિકાઓ સંતુલન જાળવે છે.", "D) અંતઃ કોષિકાઓ ધ્વનિ તરંગોને મગજ સુધી વહન કરે છે, જ્યારે બાહ્ય કોષિકાઓ કોક્લિયાની ગતિશીલતાને નિયંત્રિત કરે છે."], "correct": 1, "explanation": "અંતઃ કોષિકાઓ (inner hair cells) ધ્વનિની આવર્તન (frequency)ને ઓળખીને તેને વિદ્યુત સંકેતમાં રૂપાંતરિત કરે છે, જ્યારે બાહ્ય કોષિકાઓ (outer hair cells) કોક્લિયર એમ્પ્લિફિકેશન (cochlear amplification)માં ભાગ લે છે, જે ધ્વનિની સંવેદનશીલતાને વધારે છે. A) ગળતર છે કારણ કે બાહ્ય કોષિકાઓ ધ્વનિ તરંગોને વિદ્યુત સંકેતમાં રૂપાંતરિત કરતી નથી. C) ગળતર છે કારણ કે બાહ્ય કોષિકાઓ સંતુલન જાળવતી નથી, અને રસાયણો મુક્ત કરવાનું કામ પણ તેઓ કરતી નથી. D) ગળતર છે કારણ કે અંતઃ કોષિકાઓ ધ્વનિ તરંગોને મગજ સુધી વહન કરતી નથી, અને બાહ્ય કોષિકાઓ કોક્લિયાની ગતિશીલતાને નિયંત્રિત કરતી નથી.", "ncert_ref": "Class XI - Chapter 21: સંવેદનાતંત્ર અને ચેતાતંત્ર", "difficulty": "Hard", "num": 1}, {"question": "વેસ્ટિબ્યુલર તંત્ર (vestibular system)માં, કયા અંગો સંતુલન જાળવવામાં મુખ્ય ભૂમિકા ભજવે છે?", "options": ["A) કોક્લિયા અને ટિમ્પેનિક પોચ", "B) યુટ્રિક્યુલસ, સેક્યુલમ અને અર્ધવર્તુળાકાર નળીઓ", "C) ટિમ્પેનિક પોચ અને ઓવલ વિન્ડો", "D) યુટ્રિક્યુલસ અને કોક્લિયા"], "correct": 1, "explanation": "વેસ્ટિબ્યુલર તંત્રમાં યુટ્રિક્યુલસ, સેક્યુલમ અને અર્ધવર્તુળાકાર નળીઓ સંતુલન જાળવવામાં મુખ્ય ભૂમિકા ભજવે છે. યુટ્રિક્યુલસ અને સેક્યુલમ રેખીય ગતિ (linear motion)ને ઓળખે છે, જ્યારે અર્ધવર્તુળાકાર નળીઓ ઘૂમરણ ગતિ (rotational motion)ને ઓળખે છે. A) ગળતર છે કારણ કે કોક્લિયા અને ટિમ્પેનિક પોચ સંતુલન સાથે સંબંધિત નથી. C) ગળતર છે કારણ કે ટિમ્પેનિક પોચ અને ઓવલ વિન્ડો ધ્વનિ સંબંધી રચનાઓ છે. D) ગળતર છે કારણ કે કોક્લિયા સંતુલન સાથે સંબંધિત નથી.", "ncert_ref": "Class XI - Chapter 21: સંવેદનાતંત્ર અને ચેતાતંત્ર", "difficulty": "Hard", "num": 2}, {"question": "કાનમાં ધ્વનિ તરંગોનો પ્રસારણ ક્રમ કયો છે?", "options": ["A) પિનના → ટિમ્પેનિક પોચ → મલિયસ → ઇન્કસ → સ્ટેપીસ → ઓવલ વિન્ડો → કોક્લિયા", "B) પિનના → ટિમ્પેનિક પોચ → ઇન્કસ → મલિયસ → સ્ટેપીસ → ઓવલ વિન્ડો → કોક્લિયા", "C) પિનના → ટિમ્પેનિક પોચ → સ્ટેપીસ → મલિયસ → ઇન્કસ → ઓવલ વિન્ડો → કોક્લિયા", "D) પિનના → ટિમ્પેનિક પોચ → મલિયસ → સ્ટેપીસ → ઇન્કસ → ઓવલ વિન્ડો → કોક્લિયા"], "correct": 0, "explanation": "ધ્વનિ તરંગોનો પ્રસારણ ક્રમ પિનના (pinna) થી શરૂ થાય છે, ત્યારબાદ ટિમ્પેનિક પોચ (tympanic membrane), મલિયસ (malleus), ઇન્કસ (incus), સ્ટેપીસ (stapes), ઓવલ વિન્ડો (oval window) અને અંતે કોક્લિયા (cochlea) સુધી પહોંચે છે. B), C), અને D) ગળતર છે કારણ કે તેઓ મલિયસ, ઇન્કસ અને સ્ટેપીસના ક્રમને યોગ્ય રીતે દર્શાવતી નથી.", "ncert_ref": "Class XI - Chapter 21: સંવેદનાતંત્ર અને ચેતાતંત્ર", "difficulty": "Hard", "num": 3}, {"question": "કોક્લિયામાં, બેઝિલર પટલ (basilar membrane)ની ગતિ કયા કોષો દ્વારા ધ્વનિ સંકેતમાં રૂપાંતરિત થાય છે?", "options": ["A) સપોર્ટિંગ કોષો", "B) હેર કોષો (કોષિકાઓ)", "C) ન્યુરોનલ કોષો", "D) એપિથેલિયલ કોષો"], "correct": 1, "explanation": "બેઝિલર પટલની ગતિ હેર કોષો (કોષિકાઓ) દ્વારા ધ્વનિ સંકેતમાં રૂપાંતરિત થાય છે. હેર કોષો કોક્લિયામાં ધ્વનિ તરંગોને વિદ્યુત સંકેતમાં રૂપાંતરિત કરવા માટે જવાબદાર છે. A) ગળતર છે કારણ કે સપોર્ટિંગ કોષો ધ્વનિ સંકેતમાં રૂપાંતરણ કરતી નથી. C) ગળતર છે કારણ કે ન્યુરોનલ કોષો ધ્વનિ સંકેતમાં રૂપાંતરણ કરતી નથી, પરંતુ તેઓ સંકેતને મગજ સુધી વહન કરે છે. D) ગળતર છે કારણ કે એપિથેલિયલ કોષો ધ્વનિ સંકેતમાં રૂપાંતરણ કરતી નથી.", "ncert_ref": "Class XI - Chapter 21: સંવેદનાતંત્ર અને ચેતાતંત્ર", "difficulty": "Hard", "num": 4}, {"question": "વેસ્ટિબ્યુલર તંત્રમાં, અર્ધવર્તુળાકાર નળીઓ કયા પ્રકારની ગતિને ઓળખે છે?", "options": ["A) રેખીય ગતિ (linear motion)", "B) ઘૂમરણ ગતિ (rotational motion)", "C) વર્ટિકલ ગતિ (vertical motion)", "D) સરળ રેખીય ગતિ (straight-line motion)"], ્શિયમ કાર્બોનેટના કણો (Otoconia)", "B) લોહીના કણો (Erythrocytes)", "C) પ્રોટીનના કણો (Protein granules)", "D) લિપિડના કણો (Lipid droplets)"], "correct": 0, "explanation": "ઓટોલિથ અંગોમાં કેલ્શિયમ કાર્બોનેટના કણો (Otoconia) હાજર હોય છે, જે ગુરુત્વાકર્ષણ અને રેખીય ત્વરણને ઓળખવામાં મદદ કરે છે. લોહીના કણો, પ્રોટીનના કણો, અને લિપિડના કણો એવી કોઈ ભૂમિકા ભજવતા નથી.", "ncert_ref": "Class XI - Chapter 21: તંત્રિકા તંત્ર (Nervous System)", "difficulty": "Hard", "num": 24}, {"question": "જો કોઈ વ્યક્તિને 'મેનિયર રોગ' (Meniere’s disease) હોય, તો તેને કયા લક્ષણો અનુભવાય છે?", "options": ["A) ધ્વનિ સંવેદનશીલતા વધવી, ચક્કર આવવા, અને કાનમાં ભાર અનુભવવો", "B) ધ્વનિ સંવેદનશીલતા ઘટવી, દ્રષ્ટિ ખરાબ થવી, અને મસ્તિષ્કમાં દુખાવો", "C) કાનમાં દુખાવો, તાવ, અને સાંભળવાની શક્તિ ગુમાવવી", "D) ગળામાં દુખાવો, કાનમાં ખંજવાળ આવવી, અને ચહેરા પર સોજો આવવો"], "correct": 0, "explanation": "મેનિયર રોગમાં ધ્વનિ સંવેદનશીલતા વધવી (Hyperacusis), ચક્કર આવવા (Vertigo), અને કાનમાં ભાર અનુભવવો (Aural fullness) એ મુખ્ય લક્ષણો છે. બાકીના વિકલ્પો એવા લક્ષણો નથી જે મેનિયર રોગ સાથે સંકળાયેલા હોય.", "ncert_ref": "Class XI - Chapter 21: તંત્રિકા તંત્ર (Nervous System)", "difficulty": "Hard", "num": 25}, {"question": "કાનના અંતઃકર્ણમાં, કોક્લિયાની સંરચનામાં 'સ્કેલા મીડિયા'માં કયા પ્રવાહીની હાજરી રહેલી છે, જે ધ્વનિ તરંગોના પ્રસારણમાં મહત્વની ભૂમિકા ભજવે છે?", "options": ["A) પેરિલિમ્ફ", "B) એન્ડોલિમ્ફ", "C) સેરિબ્રોસ્પાઇનલ પ્રવાહી", "D) સિનોવિયલ પ્રવાહી"], "correct": 1, "explanation": "સ્કેલા મીડિયા (Scala media)માં એન્ડોલિમ્ફ (Endolymph) પ્રવાહી હાજર હોય છે, જે કોક્લિયામાં ધ્વનિ તરંગોના પ્રસારણ અને સંવેદનશીલ કોષોની ક્રિયામાં મહત્વની ભૂમિકા ભજવે છે. પેરિલિમ્ફ (Perilymph) સ્કેલા વેસ્ટિબ્યુલી અને સ્કેલા ટાઇમ્પેનીમાં હાજર હોય છે. સેરિબ્રોસ્પાઇનલ પ્રવાહી મગજ અને મેરુદંડમાં હાજર હોય છે, જ્યારે સિનોવિયલ પ્રવાહી સાંધાઓમાં હાજર હોય છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને જ્ઞાનેન્દ્રિયો", "difficulty": "Hard", "num": 26}, {"question": "વેસ્ટિબ્યુલર તંત્રમાં, 'ક્રિસ્ટા એમ્પુલારિસ' ક્યાં આવેલી છે અને તે કયા કામ મ ter 21: ચેતાતંત્ર અને ગુરુત્વાકર્ષણ જ્ઞાન", "difficulty": "Hard", "num": 36}, {"question": "માનવ કાનના અંતઃકર્ણમાં આવેલા કોક્લિયામાં, 'સ્ટ્રિયા વાસ્ક્યુલરિસ' (Stria vascularis)નું મુખ્ય કાર્ય શું છે?", "options": ["A) બાહ્ય કોષિકાઓને પોષણ પૂરું પાડવું અને એન્ડોલિમ્ફનું સ્ત્રાવણ કરવું", "B) બેઝિલર પટલની ગતિને નિયંત્રિત કરીને ધ્વનિ તરંગોનું વિસ્તરણ કરવું", "C) ટેક્ટોરિયલ પટલ સાથે સંપર્ક કરીને ધ્વનિ સંકેતોનું રૂપાંતરણ કરવું", "D) સ્કેલા મીડિયામાં પેરિલિમ્ફનું ઉત્પાદન કરીને દબાણનું નિયમન કરવું"], "correct": 0, "explanation": "'સ્ટ્રિયા વાસ્ક્યુલરિસ' એ કોક્લિયાના બાહ્ય દિવાલમાં આવેલી રુધિરકેશિકાઓથી સમૃદ્ધ પેશી છે, જે એન્ડોલિમ્ફનું સ્ત્રાવણ કરે છે અને બાહ્ય કોષિકાઓને પોષણ પૂરું પાડે છે. વિકલ્પ B ખોટો છે કારણ કે બેઝિલર પટલની ગતિ ધ્વનિ તરંગો દ્વારા નિયંત્રિત થાય છે, સ્ટ્રિયા વાસ્ક્યુલરિસ દ્વારા નહીં. વિકલ્પ C ખોટો છે કારણ કે ટેક્ટોરિયલ પટલ સાથે સંપર્ક કરવાનું કાર્ય બાહ્ય કોષિકાઓનું છે. વિકલ્પ D ખોટો છે કારણ કે સ્કેલા મીડિયામાં એન્ડોલિમ્ફ હોય છે, પેરિલિમ્ફ નહીં, અને તેનું ઉત્પાદન સ્ટ્રિયા વાસ્ક્યુલરિસ દ્વારા થાય છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 21: ન્યુરલ કંટ્રોલ અને સહનિયમન (Neural Control and Coordination)", "difficulty": "Hard", "num": 37}, {"question": "માનવ કાનના વેસ્ટિબ્યુલર તંત્રમાં, 'ક્રિસ્ટા એમ્પુલારિસ' (Crista ampullaris) વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) તે અર્ધવર્તુળાકાર નળીઓના એમ્પુલામાં આવેલી છે અને કોણીય પ્રવેગને ઓળખે છે", "B) તેમાં હાજર ક્યુપુલા (Cupula) એન્ડોલિમ્ફના પ્રવાહને અનુસરીને વળે છે", "C) તે ગુરુત્વાકર્ષણ અને રેખીય પ્રવેગને ઓળખવામાં મદદ કરે છે", "D) તેમાં હાજર વાળ કોષો (Hair cells) યાંત્રિક ઉત્તેજનાને વિદ્યુત સંકેતમાં રૂપાંતરિત કરે છે"], "correct": 2, "explanation": "'ક્રિસ્ટા એમ્પુલારિસ' અર્ધવર્તુળાકાર નળીઓના એમ્પુલામાં આવેલી છે અને તે કોણીય પ્રવેગને ઓળખે છે, ગુરુત્વાકર્ષણ કે રેખીય પ્રવેગને નહીં. વિકલ્પ A, B અને D સાચાં છે કારણ કે ક્રિસ્ટા એમ્પુલારિસમાં ક્યુપુલા હોય છે જે એન્ડોલિમ્ફના પ્રવાહને અનુસરીને વળે છે, અને તેમાં હાજર વાળ કોષો યાંત્રિક ઉત્તેજનાને વિદ્યુત સંકેતમાં રૂપાંતરિત કરે છે. ગુરુત્વાકર્ષણ અને રેખીય પ્રવેગને ઓળ  "correct": 1, "explanation": "સ્કેલા વેસ્ટિબ્યુલી અને સ્કેલા ટાઇમ્પેની વચ્ચે રેસનર પટલ (Reissner’s membrane) આવેલું છે, જે અંતઃલસિકા (endolymph) અને બાહ્યલસિકા (perilymph) વચ્ચે વહેંચણ કરે છે. બેઝિલર પટલ સ્કેલા મીડિયા અને સ્કેલા ટાઇમ્પેની વચ્ચે આવેલું છે (A ખોટું). ટેક્ટોરિયલ પટલ કોક્લિયાના અંદર હેર કોષો સાથે સંપર્કમાં રહે છે (C ખોટું). ટાઇમ્પેનિક પટલ કાનના મધ્યકર્ણમાં આવેલું છે (D ખોટું).", "ncert_ref": "Class XI - Chapter 21: તંત્રિકા તંત્ર (Nervous System)", "difficulty": "Hard", "num": 48}, {"question": "માનવ કાનના અંતઃકર્ણમાં આવેલા કોક્લિયાની સંરચનામાં, 'સ્ટ્રિયા વાસ્ક્યુલરિસ' (Stria vascularis) વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) તે સ્કેલા મીડિયાની બાહ્ય દીવાલ પર આવેલી છે અને અંતઃલસિકા (endolymph)ના ઉત્પાદન માટે જવાબદાર છે.", "B) તે રુધિરકેશિકાઓથી સમૃદ્ધ છે અને અંતઃલસિકામાં K⁺ આયનોનું સાંદ્રણ જાળવવામાં મદદ કરે છે.", "C) તે કોક્લિયાના બેઝિલર પટલ સાથે સીધો સંપર્ક ધરાવે છે અને ધ્વનિ તરંગોના યાંત્રિક સંકેતોને વિદ્યુત સંકેતોમાં રૂપાંતરિત કરે છે.", "D) તેની કામગીરી ખોરવાઈ જાય તો સેન્સોરિન્યુરલ બહેરાશ (sensorineural deafness) થઈ શકે છે."], "correct": 2, "explanation": "સ્ટ્રિયા વાસ્ક્યુલરિસ એ સ્કેલા મીડિયાની બાહ્ય દીવાલ પર આવેલી રુધિરકેશિકાઓથી સમૃદ્ધ પેશી છે, જે અંતઃલસિકામાં K⁺ આયનોનું ઊંચું સાંદ્રણ જાળવે છે અને તેનું ઉત્પાદન કરે છે (વિકલ્પ A અને B સાચાં છે). તેની કામગીરી ખોરવાઈ જવાથી સેન્સોરિન્યુરલ બહેરાશ થઈ શકે છે (વિકલ્પ D સાચું છે). જોકે, સ્ટ્રિયા વાસ્ક્યુલરિસ બેઝિલર પટલ સાથે સીધો સંપર્ક ધરાવતી નથી કે ધ્વનિ તરંગોના યાંત્રિક સંકેતોને વિદ્યુત સંકેતોમાં રૂપાંતરિત કરતી નથી - આ કાર્ય હેર કોષો (hair cells) દ્વારા થાય છે. આથી વિકલ્પ C ખોટું છે.", "ncert_ref": "Class XI - અધ્યાય 21: ન્યુરલ કંટ્રોલ અને સહનિયમન (Neural Control and Coordination), Class XII - અધ્યાય 20: સંવેદી અંગો (Sensory Organs) - કાનની રચના અને કાર્ય", "difficulty": "Hard", "num": 49}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;

            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
