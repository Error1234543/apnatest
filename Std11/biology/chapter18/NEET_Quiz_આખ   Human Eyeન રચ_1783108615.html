<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - આંખ – Human Eyeની રચના અને Vision.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 આંખ – Human Eyeની રચના અને Vision.</span>
                <span>🎯 Hard</span>
                <span>📝 50 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "આંખના કયા ભાગમાં રહેલા પેશીઓમાં રક્તવાહિનીઓનો અભાવ હોવાથી તે પારદર્શક રહે છે અને પ્રકાશને સરળતાથી પસાર કરે છે?", "options": ["A) કોર્નિયા", "B) રેટિના", "C) સ્ક્લેરા", "D) કોરોઇડ"], "correct": 0, "explanation": "કોર્નિયા (A) એ આંખના અગ્રભાગનો પારદર્શક અવસ્થિત ભાગ છે, જેમાં રક્તવાહિનીઓનો અભાવ હોવાથી તે પ્રકાશને સરળતાથી પસાર કરે છે. રેટિના (B) પ્રકાશસંવેદી કોષો ધરાવે છે અને રક્તવાહિનીઓ ધરાવે છે. સ્ક્લેરા (C) આંખનો સફેદ અને કઠણ બાહ્ય આવરણ છે, જેમાં રક્તવાહિનીઓ હાજર છે. કોરોઇડ (D) રેટિનાને પોષણ પૂરું પાડે છે અને રક્તવાહિનીઓ ધરાવે છે.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાતંત્ર અને ગુરુત્વાકર્ષણ", "difficulty": "Hard", "num": 1}, {"question": "જ્યારે આંખ લાંબા સમય સુધી નજીકના પદાર્થ પર ધ્યાન કેન્દ્રિત કરે છે, ત્યારે કયા સ્નાયુની સંકોચનથી લેન્સની વક્રતા વધે છે?", "options": ["A) સિલિયરી સ્નાયુ", "B) આઇરિસના રેડિયલ સ્નાયુ", "C) આઇરિસના સર્ક્યુલર સ્નાયુ", "D) સુપિરિયર ઓબ્લિક સ્નાયુ"], "correct": 0, "explanation": "સિલિયરી સ્નાયુ (A)ની સંકોચનથી લેન્સની વક્રતા વધે છે, જેથી નજીકના પદાર્થ પર ફોકસ કરવા માટે લેન્સ પાતળું બને છે. આઇરિસના રેડિયલ સ્નાયુ (B) અને સર્ક્યુલર સ્નાયુ (C) પ્યુપિલના આકારને નિયંત્રિત કરે છે. સુપિરિયર ઓબ્લિક સ્નાયુ (D) આંખની હલનચલન માટે જવાબદાર છે.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાતંત્ર અને ગુરુત્વાકર્ષણ", "difficulty": "Hard", "num": 2}, {"question": "રેટિનામાં રહેલા કયા કોષો રાત્રિ દ્રષ્ટિ માટે જવાબદાર છે અને વિટામિન Aની ઉણપથી તેમની કાર્યક્ષમતા ઘટે છે?", "options": ["A) શંકુ કોષો", "B) છડી કોષો", "C) બાઇપોલર કોષો", "D) ગેંગ્લિયન કોષો"], "correct": 1, "explanation": "છડી કોષો (B) રાત્રિ દ્રષ્ટિ માટે જવાબદાર છે અને વિટામિન Aની ઉણપથી તેમની કાર્યક્ષમતા ઘટે છે, જેથી રાત્રિ અંધત્વ (નાઇક્ટલોપિયા) થાય છે. શંકુ કોષો (A) રંગદ્રષ્ટિ માટે જવાબદાર છે. બાઇપોલર કોષો (C) અને ગેંગ્લિયન કોષો (D) પ્રકાશસંવેદી કોષો નથી, પરંતુ ચેતા કોષો છે.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાતંત્ર અને ગુરુત્વાકર્ષણ", "difficulty": "Hard", "num": 3}, {"question": "આંખના કયા ભાગમાં પ્રકાશનું પરાવર્તન થાય છે, જેથી રેટિના પર પ્રતિબિંબ ટે રોડ કોષો જવાબદાર હોય છે, જે રોડોપ્સિન નામના પ્રકાશસંવેદી રંજકદ્રવ્ય ધરાવે છે. રોડોપ્સિનના સંશ્લેષણમાં અવરોધને કારણે રાત્રિ દ્રષ્ટિ નબળી પડે છે, જેને 'ન્યુક્ટલોપિયા' (રાત્રિ અંધત્વ) કહે છે. વિકલ્પ (1) ખોટો છે કારણ કે કોન કોષો રંગ દ્રષ્ટિ અને તેજ પ્રકાશમાં દ્રષ્ટિ માટે જવાબદાર હોય છે. વિકલ્પ (2) ખોટો છે કારણ કે આઇરિસના સ્નાયુઓ પુપિલના કદને નિયંત્રિત કરે છે, જે પ્રકાશની તીવ્રતાને અસર કરે છે, પરંતુ રાત્રિ દ્રષ્ટિ માટે સીધો સંબંધ નથી. વિકલ્પ (4) ખોટો છે કારણ કે લેન્સના વક્રીકરણાંકમાં ફેરફાર દૂરદ્રષ્ટિ કે નજીકદ્રષ્ટિ સાથે સંબંધિત છે, રાત્રિ દ્રષ્ટિ સાથે નહીં.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 16: પાચન અને શોષણ (વિટામિન Aની ઉણપ અને રાત્રિ અંધત્વ), ક્લાસ XI - પ્રકરણ 21: ન્યુરલ કંટ્રોલ અને કોઓર્ડિનેશન (આંખની રચના અને કાર્ય)", "difficulty": "Hard", "num": 28}, {"question": "આંખના નીચેના ભાગોને તેમના કાર્ય સાથે યોગ્ય રીતે જોડો:\n(1) કોરોઇડ\n(2) સિલિયરી બોડી\n(3) ફોવિયા સેન્ટ્રાલિસ\n(4) બ્લાઇન્ડ સ્પોટ\n\n(a) પ્રકાશનું શોષણ કરી રેટિનાને પોષણ આપે છે\n(b) લેન્સના આકારમાં ફેરફાર કરી એકોમોડેશનમાં મદદ કરે છે\n(c) સૌથી તીક્ષ્ણ દ્રષ્ટિ માટે જવાબદાર\n(d) પ્રકાશસંવેદી કોષોનો અભાવ હોવાથી પ્રતિબિંબ રચાતું નથી", "options": ["A) 1-a, 2-b, 3-c, 4-d", "B) 1-b, 2-a, 3-d, 4-c", "C) 1-a, 2-c, 3-b, 4-d", "D) 1-d, 2-b, 3-c, 4-a"], "correct": 0, "explanation": "કોરોઇડ (1) આંખના પશ્ચ ભાગમાં રહેલી પેશી છે જે પ્રકાશનું શોષણ કરી રેટિનાને પોષણ આપે છે (a). સિલિયરી બોડી (2) લેન્સને જોડતી રચના છે જે લેન્સના આકારમાં ફેરફાર કરી એકોમોડેશનમાં મદદ કરે છે (b). ફોવિયા સેન્ટ્રાલિસ (3) રેટિનાનો ભાગ છે જ્યાં કોન કોષોની ઘનતા સૌથી વધુ હોય છે, જે સૌથી તીક્ષ્ણ દ્રષ્ટિ માટે જવાબદાર છે (c). બ્લાઇન્ડ સ્પોટ (4) ઓપ્ટિક નર્વનું ઉદ્ગમ સ્થાન છે જ્યાં પ્રકાશસંવેદી કોષોનો અભાવ હોય છે, તેથી ત્યાં પ્રતિબિંબ રચાતું નથી (d).", "ncert_ref": "ક્લાસ XI - પ્રકરણ 21: ન્યુરલ કંટ્રોલ અને કોઓર્ડિનેશન (આંખની રચના અને કાર્ય)", "difficulty": "Hard", "num": 29}, {"question": "એક વ્યક્તિને એવી સ્થિતિ છે જેમાં તેને લાલ અને લીલા રંગ વચ્ચેનો તફાવત ઓળખવામાં મુશ્કેલી પડે છે. આ સ્થિતિ માટે નીચેનામાંથી કયું વિધાન સાચું છે?\n\nવિધાન I: આ સ્થિતિને 'પ્ર ે સંવેદનશીલ), અને S-કોન (નીલો રંગ માટે સંવેદનશીલ). પ્રોટેનોપિયામાં (લાલ-લીલા રંગ અંધત્વ) L-કોન કોષોની કમી અથવા અભાવ હોય છે, જેથી વ્યક્તિ લાલ અને લીલા રંગ વચ્ચેનો ફરક ઓળખી શકતી નથી. બાકીના વિકલ્પો અશુદ્ધ છે: Bમાં રંગો અને કોન કોષો યોગ્ય રીતે જોડાયેલા નથી, Cમાં S-કોન કોષો લાલ-લીલા અંધત્વ સાથે સંબંધિત નથી, અને Dમાં M-કોન કોષોની કમી લીલા રંગ અંધત્વ (Deuteranopia) સાથે સંબંધિત છે.", "ncert_ref": "Class XI - Chapter 21: ઇન્દ્રિય તંત્ર (Sensory System)", "difficulty": "Hard", "num": 35}, {"question": "આંખના કયા ભાગમાં રહેલા 'કોન કોષો'ની સંવેદનશીલતા લાલ, લીલા અને નીલા રંગો માટે વહેંચાયેલી હોય છે, પરંતુ તેની સક્રિયતા નબળા પ્રકાશમાં ખૂબ જ ઓછી હોય છે?", "options": ["A) ફોવિયા સેન્ટ્રાલિસ", "B) ઓપ્ટિક ડિસ્ક", "C) પેરિફેરલ રેટિના", "D) આઇરિસ"], "correct": 0, "explanation": "ફોવિયા સેન્ટ્રાલિસમાં કોન કોષોની સાંદ્રતા સૌથી વધુ હોય છે, જેમાં લાલ, લીલા અને નીલા રંગો માટે સંવેદનશીલતા વહેંચાયેલી હોય છે. ઓપ્ટિક ડિસ્ક (બ્લાઇન્ડ સ્પોટ)માં કોઈ પણ પ્રકારના ફોટોરેસેપ્ટર કોષો હોતા નથી. પેરિફેરલ રેટિનામાં મુખ્યત્વે રોડ કોષો હોય છે, જ્યારે આઇરિસ પ્રકાશની તીવ્રતા નિયંત્રિત કરે છે. કોન કોષો નબળા પ્રકાશમાં ઓછી સક્રિય હોય છે, જેથી રાત્રિ દ્રષ્ટિ માટે રોડ કોષો જવાબદાર હોય છે.", "ncert_ref": "Class XI - Chapter 21: જૈવિક પ્રણાલી અને તેના કાર્યો (આંખની રચના અને કાર્ય)", "difficulty": "Hard", "num": 36}, {"question": "આંખના રેટિનામાં રહેલા 'કોન કોષો'ની ત્રણ પ્રકારની સંવેદનશીલતા કયા રંગો માટે હોય છે, અને આ કોષોની સક્રિયતા માટે કયું પિગમેન્ટ જવાબદાર છે?", "options": ["A) લાલ, લીલા, નીલા; રોડોપ્સિન", "B) લાલ, પીળા, નીલા; આયોડોપ્સિન", "C) લાલ, લીલા, નીલા; આયોડોપ્સિન", "D) પીળા, લીલા, જાંબલી; રોડોપ્સિન"], "correct": 2, "explanation": "કોન કોષો લાલ, લીલા અને નીલા રંગો માટે સંવેદનશીલ હોય છે, અને તેમની સક્રિયતા માટે 'આયોડોપ્સિન' પિગમેન્ટ જવાબદાર છે. રોડોપ્સિન રોડ કોષો સાથે સંકળાયેલ છે, જ્યારે પીળા અને જાંબલી રંગો કોન કોષોની પ્રાથમિક સંવેદનશીલતા નથી. આમ, વિકલ્પ A, B, અને D ખોટા છે.", "ncert_ref": "Class XI - Chapter 21: ઇન્દ્રિય જ્ઞાન અને તંત્રિકીય નિયંત્રણ", "difficulty": "Hard", "num": 37}, {"question": "જ્યારે આંખમાં 'એક્વસ હ્યુમર'નું દબાણ અચાનક વધી જાય છે, ત્યારે નીચેના પૈકી કયું પરિણામ થાય છે?", "options": ["A) રેટિનાનું વિઘટન થાય છે", "B) ઓપ્ટિક નર્વને નુકસાન થાય છે", "C) કોર્નિયા પારદર્શકતા ગુમાવે છે", "D) લેન્સનું વક્રતા વધે છે"], "correct": 1, "explanation": "'એક્વસ હ્યુમર'ના દબાણમાં વધારો થવાથી ગ્લોકોમા થાય છે, જેમાં ઓપ્ટિક નર્વને નુકસાન થાય છે. રેટિનાનું વિઘટન (A), કોર્નિયાની પારદર્શકતા ગુમાવવી (C), અને લેન્સનું વક્રતા વધવું (D) આ સ્થિતિના પ્રાથમિક પરિણામો નથી.", "ncert_ref": "Class XI - Chapter 21: ઇન્દ્રિય જ્ઞાન અને તંત્રિકીય નિયંત્રણ", "difficulty": "Hard", "num": 38}, {"question": "નીચેના વિધાનો પૈકી કયું 'બ્લાઇન્ડ સ્પોટ' (અંધ બિંદુ) વિશે સાચું છે?", "options": ["A) તે રેટિનાના તે ભાગ છે જ્યાં ઓપ્ટિક નર્વ અને રક્તવાહિનીઓ પ્રવેશે છે, અને ત્યાં રોડ અને કોન કોષોનો અભાવ હોય છે", "B) તે કોર્નિયામાં હોય છે અને પ્રકાશના પરાવર્તન માટે જવાબદાર છે", "C) તે લેન્સમાં હોય છે અને પ્રતિબિંબને ફોકસ કરવામાં મદદ કરે છે", "D) તે આઇરિસમાં હોય છે અને પુપિલના કદને નિયંત્રિત કરે છે"], "correct": 0, "explanation": "બ્લાઇન્ડ સ્પોટ રેટિનાના તે ભાગ છે જ્યાં ઓપ્ટિક નર્વ અને રક્તવાહિનીઓ પ્રવેશે છે, અને ત્યાં રોડ અને કોન કોષોનો અભાવ હોય છે, જેના કારણે ત્યાં પ્રકાશની સંવેદના થતી નથી. વિકલ્પ B, C, અને D બ્લાઇન્ડ સ્પોટની રચના અથવા કાર્ય સાથે સંકળાયેલા નથી.", "ncert_ref": "Class XI - Chapter 21: ઇન્દ્રિય જ્ઞાન અને તંત્રિકીય નિયંત્રણ", "difficulty": "Hard", "num": 39}, {"question": "એક વ્યક્તિને એવી સ્થિતિ છે જેમાં તે લાલ અને લીલા રંગ વચ્ચેનો તફાવત ઓળખી શકતો નથી. આ સ્થિતિ માટે નીચેના પૈકી કયું કારણ હોઈ શકે?", "options": ["A) રોડ કોષોની કમી", "B) લાલ અને લીલા રંગ માટેના કોન કોષોની કમી અથવા ખામી", "C) વિટામિન Aની ઉણપ", "D) ઓપ્ટિક નર્વની ખામી"], "correct": 1, "explanation": "લાલ અને લીલા રંગ વચ્ચેનો તફાવત ઓળખવામાં અસમર્થતા 'રંગ અંધત્વ' (કલર બ્લાઇન્ડનેસ) છે, જે લાલ અને લીલા રંગ માટેના કોન કોષોની કમી અથવા ખામીને કારણે થાય છે. રોડ કોષો (A) રાત્રિ દ્રષ્ટિ માટે જવાબદાર છે, વિટામિન Aની ઉણપ (C) રાત્રિ અંધત્વ તરફ દોરી શકે છે, અને ઓપ્ટિક નર્વની ખામી (D) દ્રષ્ટિના અન્ય મુદ્દાઓ તરફ દોરી શકે છે.", "ncert_ref": "Class XI - Chapter 21: ઇન્દ્રિય જ્ઞાન અને તંત્રિકીય નિયંત્રણ", "difficulty": "Hard", "num": 40}, {"question": "નીચેના પૈકી કયો ભાગ આંખના 'બ્લાઇન્ડ સ્પોટ' માટે જવાબદાર છે, અને તે કયા કારણે ઉત્પન્ન થાય છે?", "options": ["A) ઓપ્ટિક નર્વના આંખમાં પ્રવેશતાં સ્થાને રેટિનામાં કોષોનો અભાવ હોવાથી", "B) કોર્નિયામાં પ્રકાશનું અતિશય પરાવર્તન થવાથી", "C) લેન્સમાં ધૂંધળાપણું થવાથી", "D) આઇરિસમાં પુપિલનું કદ અસમાન હોવાથી"], "correct": 0, "explanation": "બ્લાઇન્ડ સ્પોટ (અંધ બિંદુ) ઓપ્ટિક નર્વના આંખમાં પ્રવેશતાં સ્થાને રેટિનામાં કોષોનો અભાવ હોવાથી ઉત્પન્ન થાય છે. આ સ્થાને રોડ અથવા કોન કોષો હોતા નથી, જેથી પ્રકાશની સંવેદના થતી નથી. બાકીના વિકલ્પો અયથાર્થ કારણો સૂચવે છે.", "ncert_ref": "Class XI - Chapter 21: તંત્રિકા તંત્ર અને અંગો", "difficulty": "Hard", "num": 41}, {"question": "આંખના કયા ભાગમાં રહેલા 'રોડ કોષો' અને 'કોન કોષો' વચ્ચેના સંચાર માટે જવાબદાર મધ્યવર્તી કોષો હોય છે, અને જો આ કોષો નિષ્ક્રિય થાય તો શું પરિણામ થાય?", "options": ["A) બાયપોલર કોષો; રેટિનામાં પ્રકાશની સંવેદનશીલતા ઘટે છે", "B) ગેંગ્લિયન કોષો; ઓપ્ટિક નર્વ દ્વારા સંકેતોનું સંચારણ બંધ થાય છે", "C) હોરાઇઝોન્ટલ કોષો; રેટિનામાં રંગોની ઓળખ ખોરવાઈ જાય છે", "D) અમેક્રિન કોષો; રોડ અને કોન કોષો વચ્ચેનો સંકેત વહન અવરોધાય છે"], "correct": 0, "explanation": "રોડ અને કોન કોષો વચ્ચેના સંચાર માટે બાયપોલર કોષો જવાબદાર હોય છે. જો આ કોષો નિષ્ક્રિય થાય તો રેટિનામાં પ્રકાશની સંવેદનશીલતા ઘટે છે. ગેંગ્લિયન કોષો ઓપ્ટિક નર્વ સાથે જોડાયેલા હોય છે, પરંતુ તેઓ રોડ અને કોન કોષો વચ્ચેના સંચાર માટે જવાબદાર નથી. હોરાઇઝોન્ટલ કોષો અને અમેક્રિન કોષો પણ મહત્વના છે, પરંતુ તેઓ મુખ્યત્વે રોડ અને કોન કોષો વચ્ચેના સંકેતોને નિયંત્રિત કરવા માટે હોય છે, ન કે સંપૂર્ણ વહન માટે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને ઇન્દ્રિયો", "difficulty": "Hard", "num": 42}, {"question": "આંખના 'એકોમોડેશન' (સમંજન) પ્રક્રિયામાં નીચેના પૈકી કયો ભાગ સૌથી મહત્વનો નથી, અને શા માટે?", "options": ["A) સિલિયરી સ્નાયુઓ; તેઓ લેન્સના આકારમાં ફેરફાર કરવા માટે જવાબદાર નથી", "B) લેન્સ; તેનો આકાર ફેરફાર થતો નથી", "C) આઇરિસ; તે પુપિલના કદને નિયંત્રિત કરે છે, પરંતુ લેન્સના આકારને નહીં", "D) કોરોઇડ; તે રેટિનાને પોષણ પૂરું પાડે છે, પરંતુ એકોમોડેશનમાં ભાગ લેતું નથી"], "correct": 3, "explanation": "એકોમોડેશન પ્રક્રિયામાં લેન્સનો આકાર ફેરફાર થાય છે, જેમાં સિલિયરી સ્નાયુઓ મહત્વની ભૂમિકા ભજવે છે. આઇરિસ પુપિલના કદને નિયંત્રિત કરે છે, પરંતુ એકોમોડેશનમાં સીધો ભાગ લેતું નથી. કોરોઇડ રેટિનાને પોષણ પૂરું પાડે છે, પરંતુ એકોમોડેશન પ્રક્રિયામાં તેનો કોઈ ભાગ નથી. સિલિયરી સ્નાયુઓ અને લેન્સ એકોમોડેશન માટે જરૂરી છે, તેથી વિકલ્પ A અને B ખોટા છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને ઇન્દ્રિયો", "difficulty": "Hard", "num": 43}, {"question": "જ્યારે આંખમાં 'ડાયાબેટિક રેટિનોપેથી' થાય છે, ત્યારે નીચેના પૈકી કયું પરિણામ સૌથી યોગ્ય રીતે વર્ણવે છે?", "options": ["A) રેટિનામાં રક્તવાહિનીઓના ફાટવાને લીધે રક્તસ્રાવ થાય છે, જેથી દ્રષ્ટિ ખોરવાઈ જાય છે", "B) રેટિનામાં રક્તવાહિનીઓના સંકોચનને લીધે રક્તના પ્રવાહમાં ઘટાડો થાય છે, જેથી રેટિનાને પોષણ મળતું બંધ થાય છે", "C) રેટિનામાં નવી રક્તવાહિનીઓનું નિર્માણ થાય છે, પરંતુ તેઓ અસાધારણ રીતે પાતળી અને કમજોર હોય છે, જેથી રક્તસ્રાવ થાય છે", "D) રેટિનામાં રક્તવાહિનીઓમાં થ્રોમ્બોસિસ થાય છે, જેથી રક્તનો પ્રવાહ અવરોધાય છે"], "correct": 2, "explanation": "ડાયાબેટિક રેટિનોપેથીમાં, ઉચ્ચ રક્તશર્કરાના સ્તરને લીધે રેટિનામાં નવી રક્તવાહિનીઓનું નિર્માણ થાય છે (નવજાત રક્તવાહિનીઓ). આ નવી રક્તવાહિનીઓ અસાધારણ રીતે પાતળી અને કમજોર હોય છે, જેથી તેઓ સરળતાથી ફાટી જાય છે અને રક્તસ્રાવ થાય છે, જેથી દ્રષ્ટિ ખોરવાઈ જાય છે. બાકીના વિકલ્પો અંશતઃ સાચા હોઈ શકે, પરંતુ સૌથી યોગ્ય વર્ણન વિકલ્પ C છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાતંત્ર અને ઇન્દ્રિયો", "difficulty": "Hard", "num": 44}, {"question": "એક વ્યક્તિને દિવસ દરમિયાન તીવ્ર પ્રકાશમાં સ્પષ્ટ દ્રષ્ટિ હોય છે, પરંતુ નબળા પ્રકાશમાં તેને વસ્તુઓ ઓળખવામાં મુશ્કેલી પડે છે. આ સ્થિતિ સાથે સંકળાયેલા નીચેના વિધાનોમાંથી કયું વિધાન **સાચું નથી**?", "options": ["A) આ સ્થિતિને 'ન્યુક્ટલોપિયા' (રાત્રિ અંધત્વ) કહે છે, જે રેટિનામાં રહેલા 'રોડ કોષો'ની કામગીરીમાં ખલેલને કારણે થાય છે.", "B) આ સ્થિતિમાં 'રોડોપ્સિન' નામના પ્રોટીનનું સંશ્લેષણ યોગ્ય રીતે થતું નથી, જે વિટામિન Aની ઉણપને કારણે થાય છે.", "C) આ સ્થિતિમાં 'કોન કોષો'ની કાર્યક્ષમતા ઘટી જાય છે, જેના કારણે રંગોની ઓળખમાં મુશ્કેલી થાય છે, પરંતુ નબળા પ્રકાશમાં દ્રષ્ટિ પર કોઈ અસર થતી નથી.", "D) આ સ્થિતિનું એક કારણ 'રેટિનાઇટિસ પિગમેન્ટોસા' નામનો આનુવંશિક રોગ પણ હોઈ શકે છે, જેમાં રેટિનાના કોષો ક્રમશઃ નાશ પામે છે."], "correct": 2, "explanation": "સાચો જવાબ વિકલ્પ C છે. 'ન્યુક્ટલોપિયા' (રાત્રિ અંધત્વ) મુખ્યત્વે 'રોડ કોષો'ની કામગીરીમાં ખલેલને કારણે થાય છે, જે નબળા પ્રકાશમાં દ્રષ્ટિ માટે જવાબદાર હોય છે. 'રોડોપ્સિન' પ્રોટીનનું સંશ્લેષણ વિટામિન Aની ઉણપને કારણે અવરોધાય છે, જે આ સ્થિતિનું મુખ્ય કારણ છે (વિકલ્પ A અને B સાચાં છે). 'રેટિનાઇટિસ પિગમેન્ટોસા' પણ આ સ્થિતિનું એક કારણ છે (વિકલ્પ D સાચું છે). વિકલ્પ C ખોટો છે કારણ કે 'કોન કોષો' રંગોની ઓળખ માટે જવાબદાર હોય છે અને નબળા પ્રકાશમાં દ્રષ્ટિ પર તેમની અસર નહિવત્ હોય છે. 'ન્યુક્ટલોપિયા'માં 'રોડ કોષો'ની કામગીરી ખલેલ પામે છે, 'કોન કોષો'ની નહીં.", "ncert_ref": "Class XII - પ્રકરણ 21: માનવ આંખ અને રંગબેરંગી દુનિયા (NCERT ગુજરાતી આવૃત્તિ)", "difficulty": "Hard", "num": 45}, {"question": "નીચેના પૈકી કયું વિધાન 'બ્લાઇન્ડ સ્પોટ' (અંધ બિંદુ) વિશે સાચું છે, અને તે આંખના કયા ભાગમાં આવેલું છે?", "options": ["A) તે રેટિનાના તે ભાગમાં આવેલું છે જ્યાં ઓપ્ટિક નર્વ રેટિનામાંથી નીકળે છે, અને ત્યાં રોડ અથવા કોન કોષોનો અભાવ હોય છે", "B) તે કોરોઇડમાં આવેલું છે જ્યાં રક્તવાહિનીઓનો અભાવ હોય છે", "C) તે આઇરિસમાં આવેલું છે જ્યાં પુપિલનું કદ નિયંત્રિત થાય છે", "D) તે લેન્સમાં આવેલું છે જ્યાં પ્રકાશનું પરાવર્તન થાય છે"], "correct": 0, "explanation": "બ્લાઇન્ડ સ્પોટ રેટિનાના તે ભાગમાં આવેલું છે જ્યાં ઓપ્ટિક નર્વ રેટિનામાંથી નીકળે છે. ત્યાં રોડ અથવા કોન કોષોનો અભાવ હોય છે, જેથી પ્રકાશની સંવેદના થતી નથી. બાકીના વિકલ્પો અશુદ્ધ સ્થાનો દર્શાવે છે.", "ncert_ref": "Class XI - Chapter 21: ઇન્દ્રિય તંત્ર", "difficulty": "Hard", "num": 46}, {"question": "આંખના રેટિનામાં રહેલા 'બાઇપોલર કોષો' અને 'ગેંગ્લિયન કોષો' વચ્ચેના સંચારમાં નીચેના પૈકી કયો પદાર્થ મુખ્ય ભૂમિકા ભજવે છે?", "options": ["A) ડોપામીન", "B) ગ્લુટામેટ", "C) એસિટાઇલકોલિન", "D) સેરોટોનિન"], "correct": 1, "explanation": "રેટિનામાં, 'બાઇપોલર કોષો' અને 'ગેંગ્લિયન કોષો' વચ્ચેનો સંચાર મુખ્યત્વે 'ગ્લુટામેટ' નામના ન્યુરોટ્રાન્સમિટર દ્વારા થાય છે. ડોપામીન, એસિટાઇલકોલિન અને સેરોટોનિન પણ ન્યુરોટ્રાન્સમિટર છે, પરંતુ રેટિનામાં આ સંચાર માટે ગ્લુટામેટ મુખ્ય છે. ડોપામીન રેટિનામાં અન્ય કાર્યો માટે, એસિટાઇલકોલિન મસ્તિષ્ક અને સ્નાયુઓમાં, અને સેરોટોનિન મૂડ નિયંત્રણમાં મહત્વની ભૂમિકા ભજવે છે.", "ncert_ref": "Class XI - Chapter 21: તંત્રિકા તંત્ર અને અંગો", "difficulty": "Hard", "num": 47}, {"question": "જ્યારે આંખમાં 'પ્રેસબાયોપિયા' થાય છે, ત્યારે નીચેના પૈકી કયું વિધાન સાચું નથી?", "options": ["A) લેન્સની લચકતામાં ઘટાડો થાય છે", "B) નજીકના પદાર્થો પર ધ્યાન કેન્દ્રિત કરવા માટે લેન્સની વક્રતા વધારવી પડે છે", "C) આ સ્થિતિ મુખ્યત્વે વય વધવાને કારણે થાય છે", "D) આ સ્થિતિમાં રેટિનાના કોન કોષોની સંખ્યામાં ઘટાડો થાય છે"], "correct": 3, "explanation": "પ્રેસબાયોપિયા (વય-સંબંધિત દૂરદ્રષ્ટિ)માં લેન્સની લચકતામાં ઘટાડો થાય છે (A સાચું), નજીકના પદાર્થો પર ધ્યાન કેન્દ્રિત કરવા લેન્સની વક્રતા વધારવી પડે છે (B સાચું), અને તે વય વધવાને કારણે થાય છે (C સાચું). પરંતુ રેટિનાના કોન કોષોની સંખ્યામાં ઘટાડો થવો એ પ્રેસબાયોપિયાનું કારણ નથી (D ખોટું). કોન કોષોની સંખ્યામાં ઘટાડો રંગ અંધત્વ અથવા અન્ય રેટિનલ રોગો સાથે સંબંધિત હોઈ શકે છે.", "ncert_ref": "Class XI - Chapter 21: તંત્રિકા તંત્ર અને અંગો", "difficulty": "Hard", "num": 48}, {"question": "નીચેના પૈકી કયો ભાગ આંખના 'એકોમોડેશન' (સમંજન) પ્રક્રિયામાં સીધી રીતે સામેલ નથી?", "options": ["A) સિલિયરી સ્નાયુઓ", "B) લેન્સ", "C) આઇરિસ", "D) સસ્પેન્સરી લિગામેન્ટ"], "correct": 2, "explanation": "એકોમોડેશન પ્રક્રિયામાં, સિલિયરી સ્નાયુઓ (A) સંકોચાઈને સસ્પેન્સરી લિગામેન્ટ (D)ને ઢીલું પાડે છે, જેથી લેન્સ (B)ની વક્રતા વધે છે અને નજીકના પદાર્થો પર ધ્યાન કેન્દ્રિત થઈ શકે. આઇરિસ (C) પુપિલના કદને નિયંત્રિત કરે છે, પરંતુ એકોમોડેશન પ્રક્રિયામાં સીધી રીતે સામેલ નથી.", "ncert_ref": "Class XI - Chapter 21: તંત્રિકા તંત્ર અને અંગો", "difficulty": "Hard", "num": 49}, {"question": "આંખના રેટિનામાં રહેલા કોષોની ક્રિયાશીલતા અને તેમના વિતરણ વિશે નીચેના પૈકી કયું વિધાન સાચું છે?", "options": ["A) રોડ કોષો ફક્ત ફોવિયા સેન્ટ્રાલિસમાં સાંદ્રિત હોય છે અને રાત્રિ દ્રષ્ટિ માટે જવાબદાર હોય છે", "B) કોન કોષો રેટિનાના સંપૂર્ણ ક્ષેત્રમાં સમાન રીતે વિતરિત હોય છે અને રંગ દ્રષ્ટિ માટે જવાબદાર હોય છે", "C) ફોવિયા સેન્ટ્રાલિસમાં ફક્ત કોન કોષો હોય છે અને તે સૌથી તીવ્ર દ્રષ્ટિ પ્રદાન કરે છે", "D) ઓપ્ટિક ડિસ્ક પર રોડ અને કોન કોષોની સાંદ્રતા સૌથી વધુ હોય છે"], "correct": 2, "explanation": "સાચો જવાબ C છે. ફોવિયા સેન્ટ્રાલિસ (Fovea Centralis) રેટિનાનો મધ્ય ભાગ છે જ્યાં ફક્ત કોન કોષો હોય છે અને તે સૌથી તીવ્ર દ્રષ્ટિ (શાર્પ વિઝન) પ્રદાન કરે છે. A ખોટું છે કારણ કે રોડ કોષો ફોવિયા સેન્ટ્રાલિસમાં નહીં પણ રેટિનાના પરિધિય ભાગોમાં સાંદ્રિત હોય છે. B ખોટું છે કારણ કે કોન કોષો રેટિનામાં સમાન રીતે વિતરિત નથી હોતા, પરંતુ ફોવિયા સેન્ટ્રાલિસમાં સાંદ્રિત હોય છે. D ખોટું છે કારણ કે ઓપ્ટિક ડિસ્ક (બ્લાઇન્ડ સ્પોટ) પર કોઈ પણ ફોટોરેસેપ્ટર કોષો (રોડ અથવા કોન) હાજર નથી હોતા.", "ncert_ref": "Class XI - Chapter 21: જૈવિક પ્રણાલી અને તેના કાર્યો (સંવેદન અને ચેતાતંત્ર)", "difficulty": "Hard", "num": 50}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
