<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - 📖 રાસાયણિક સંકલન અને નિયંત્રણ (Chemical Coordination and Integration)
અંતઃસ્રાવી તંત્ર – Endocrine Systemનું પરિચય.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 📖 રાસાયણિક સંકલન અને નિયંત્રણ (Chemical Coordination and Integration)
અંતઃસ્રાવી તંત્ર – Endocrine Systemનું પરિચય.</span>
                <span>🎯 Hard</span>
                <span>📝 50 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "જ્યારે એડ્રિનલ કોર્ટેક્સમાંથી કોર્ટિસોલનું સ્રાવ થાય છે, ત્યારે તેના પરિણામે કયો હોર્મોન નિયંત્રિત થાય છે, જેથી રક્તમાં ગ્લુકોઝનું સ્તર સંતુલિત રહે?", "options": ["A) ઇન્સ્યુલિન", "B) ગ્લુકેગોન", "C) એડ્રિનલિન", "D) થાયરોક્સિન"], "correct": 1, "explanation": "કોર્ટિસોલ એ ગ્લુકોકોર્ટિકોઇડ હોર્મોન છે જે ગ્લુકોનિયોજેનેસિસને ઉત્તેજિત કરે છે, જેથી રક્તમાં ગ્લુકોઝનું સ્તર વધે. આ સ્થિતિમાં, ગ્લુકેગોનનું સ્રાવ ઘટે છે કારણ કે કોર્ટિસોલ અને ગ્લુકેગોન બંને રક્તમાં ગ્લુકોઝનું સ્તર વધારવા માટે કામ કરે છે. ઇન્સ્યુલિન ગ્લુકોઝને ઘટાડે છે, એડ્રિનલિન એક્યુટ સ્ટ્રેસ હોર્મોન છે, અને થાયરોક્સિન ચયાપચયને નિયંત્રિત કરે છે પરંતુ ગ્લુકોઝના સ્તર સાથે સીધો સંબંધ ધરાવતું નથી.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 1}, {"question": "હાયપોથેલામસ દ્વારા સ્રાવ થતો હોર્મોન જે પિટ્યુટરી ગ્લેન્ડને ઉત્તેજિત કરે છે તે કયો છે, જેથી તે વૃદ્ધિ હોર્મોન (GH)નું સ્રાવ કરે?", "options": ["A) ઓક્સિટોસિન", "B) વેઝોપ્રેસિન", "C) વૃદ્ધિ હોર્મોન-રિલીઝિંગ હોર્મોન (GHRH)", "D) પ્રોલેક્ટિન ઇનહિબિટિંગ હોર્મોન (PIH)"], "correct": 2, "explanation": "હાયપોથેલામસ દ્વારા સ્રાવ થતો GHRH (વૃદ્ધિ હોર્મોન-રિલીઝિંગ હોર્મોન) પિટ્યુટરી ગ્લેન્ડને ઉત્તેજિત કરે છે જેથી તે વૃદ્ધિ હોર્મોન (GH)નું સ્રાવ કરે. ઓક્સિટોસિન અને વેઝોપ્રેસિન પિટ્યુટરી દ્વારા સ્રાવ થતા હોર્મોન છે, જ્યારે PIH પ્રોલેક્ટિનના સ્રાવને અટકાવે છે.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 2}, {"question": "થાયરોઇડ ગ્લેન્ડ દ્વારા સ્રાવ થતો હોર્મોન જે કેલ્શિયમના ચયાપચયને નિયંત્રિત કરે છે તે કયો છે?", "options": ["A) થાયરોક્સિન", "B) ટ્રાયઆયોડોથાયરોનિન", "C) કેલ્સિટોનિન", "D) પેરાથોર્મોન"], "correct": 2, "explanation": "થાયરોઇડ ગ્લેન્ડ દ્વારા સ્રાવ થતો કેલ્સિટોનિન હોર્મોન કેલ્શિયમના ચયાપચયને નિયંત્રિત કરે છે, ખાસ કરીને હાડકામાંથી કેલ્શિયમના શોષણને ઘટાડીને રક્તમાં કેલ્શિયમનું સ્તર ઘટાડે છે. થાયરોક્સિન અને ટ્રાયઆયોડોથાયરોનિન ચયાપચયને નિયંત્રિત કરે છે, જ્યારે પેરાથોર્મોન પેરાથાયરોઇડ ગ્લેન્ડ દ્વારા સ્રાવ થાય છે.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 3}, {"question": "એક વ્યક્તિને હાયપોથાયરોઇડિઝમ છે. તેને કયા હોર્મોનની ઉણપ હશે, અને તેના લક્ષણોમાં કયા લક્ષણો જોવા મળશે?", "options": ["A) થાયરોક્સિન; વજન વધવું, થાક, શીત લાગવું", "B) ઇન્સ્યુલિન; હાયપરગ્લાયકેમિયા, પોલિડિપ્સિયા", "C) એડ્રિનલિન; નીચું રક્તચાપ, ચક્કર આવવું", "D) કોર્ટિસોલ; કોષ્ટબદ્ધતા, હાયપોગ્લાયકેમિયા"], "correct": 0, "explanation": "હાયપોથાયરોઇડિઝમમાં થાયરોક્સિન હોર્મોનની ઉણપ હોય છે, જેના લક્ષણોમાં વજન વધવું, થાક, અને શીત લાગવું જેવા લક્ષણો જોવા મળે છે. ઇન્સ્યુલિન, એડ્રિનલિન, અને કોર્ટિસોલની ઉણપના લક્ષણો આ પ્રશ્નમાં વર્ણવેલ લક્ષણો સાથે મેળ ખાતા નથી.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 4}, {"question": "પિટ્યુટરી ગ્લેન્ડના પોસ્ટીરિયર ભાગ દ્વારા સ્રાવ થતા હોર્મોન કયા છે?", "options": ["A) વૃદ્ધિ હોર્મોન અને પ્રોલેક્ટિન", "B) ઓક્સિટોસિન અને વેઝોપ્રેસિન", "C) એડ્રિનોકોર્ટિકોટ્રોપિક હોર્મોન (ACTH) અને થાયરોઇડ-સ્ટિમ્યુલેટિંગ હોર્મોન (TSH)", "D) ફોલિકલ-સ્ટિમ્યુલેટિંગ હોર્મોન (FSH) અને લ્યુટિનાઇઝિંગ હોર્મોન (LH)"], "correct": 1, "explanation": "પિટ્યુટરી ગ્લેન્ડના પોસ્ટીરિયર ભાગ (ન્યુરોહાયપોફિઝિસ) દ્વારા ઓક્સિટોસિન અને વેઝોપ્રેસિન (એન્ટીડાયુરેટિક હોર્મોન, ADH) હોર્મોન સ્રાવ થાય છે. વૃદ્ધિ હોર્મોન, પ્રોલેક્ટિન, ACTH, TSH, FSH, અને LH એ પિટ્યુટરી ગ્લેન્ડના એન્ટીરિયર ભાગ (એડિનોહાયપોફિઝિસ) દ્વારા સ્રાવ થતા હોર્મોન છે.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 5}, {"question": "એક વ્યક્તિમાં ગ્લુકોઝનું સ્તર અચાનક ઘટે છે, ત્યારે કયો હોર્મોન સ્રાવ પામે છે જે ગ્લાયકોજનના ટૂટવાને ઉત્તેજિત કરે છે અને તેનું સ્રાવ ક્યાંથી થાય છે?", "options": ["A) ઇન્સ્યુલિન – પેન્ક્રિયાસના બીટા-કોષો", "B) ગ્લુકેગોન – પેન્ક્રિયાસના અલ્ફા-કોષો", "C) એપિનેફ્રિન – એડ્રિનલ મેડ્યુલા", "D) કોર્ટિસોલ – એડ્રિનલ કોર્ટેક્સ"], "correct": 1, "explanation": "ગ્લુકોઝનું સ્તર ઘટતાં, પેન્ક્રિયાસના અલ્ફા-કોષો દ્વારા ગ્લુકેગોન સ્રાવ પામે છે, જે યકૃતમાં ગ્લાયકોજનલિસિસને ઉત્તેજિત કરે છે. ઇન્સ્યુલિન (A) ગ્લુકોઝનું સ્તર ઘટાડે છે, એપિનેફ્રિન (C) અને કોર્ટિસોલ (D) ગ્લુકોઝનું સ્તર વધારે છે પરંતુ પ્રાથમિક રીતે ગ્લાયકોજનલિસિસ માટે ગ્લુકેગોન જવાબદાર છે.", "ncert_ref": "Class XI - પ્રકરણ 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 6}, {"question": "હાયપોથેલામસ દ્વારા સ્રાવ થતો હોર્મોન જે પિટ્યુટરી ગ્લેન્ડના સ્રાવને અવરોધે છે તે કયો છે?", "options": ["A) GHRH", "B) TRH", "C) PIH (પ્રોલેક્ટિન ઇનહિબિટિંગ હોર્મોન)", "D) CRH"], "correct": 2, "explanation": "PIH (પ્રોલેક્ટિન ઇનહિબિટિંગ હોર્મોન) હાયપોથેલામસ દ્વારા સ્રાવ થાય છે અને તે પિટ્યુટરી ગ્લેન્ડ દ્વારા પ્રોલેક્ટિનના સ્રાવને અવરોધે છે. GHRH (A), TRH (B), અને CRH (D) ઉત્તેજક હોર્મોન છે, ન કે અવરોધક.", "ncert_ref": "Class XI - પ્રકરણ 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 7}, {"question": "થાયરોઇડ ગ્લેન્ડ દ્વારા સ્રાવ થતા હોર્મોનમાં આયોડિનની ઉણપ હોવાને કારણે કયો રોગ થાય છે?", "options": ["A) હાયપરથાયરોઇડિઝમ", "B) ગોઇટર", "C) ક્રેટિનિઝમ", "D) એક્રોમેગેલી"], "correct": 1, "explanation": "આયોડિનની ઉણપને કારણે થાયરોઇડ ગ્લેન્ડનું સ્વાભાવિક વિકાસ થાય છે, જેને ગોઇટર કહેવાય છે. હાયપરથાયરોઇડિઝમ (A) થાયરોઇડ હોર્મોનના અતિ સ્રાવને કારણે થાય છે, ક્રેટિનિઝમ (C) બાળકોમાં થાયરોઇડ હોર્મોનની ઉણપને કારણે થાય છે, અને એક્રોમેગેલી (D) વૃદ્ધાવસ્થામાં ગ્રોથ હોર્મોનના અતિ સ્રાવને કારણે થાય છે.", "ncert_ref": "Class XI - પ્રકરણ 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 8}, {"question": "પરિપક્વતા દરમિયાન, કયો હોર્મોન સ્ત્રીઓમાં સેકન્ડરી સેક્સુઅલ લક્ષણોના વિકાસ માટે જવાબદાર છે?", "options": ["A) ટેસ્ટોસ્ટેરોન", "B) પ્રોજેસ્ટેરોન", "C) ઇસ્ટ્રોજન", "D) FSH"], "correct": 2, "explanation": "ઇસ્ટ્રોજન સ્ત્રીઓમાં સેકન્ડરી સેક્સુઅલ લક્ષણોના વિકાસ માટે જવાબદાર છે. ટેસ્ટોસ્ટેરોન (A) પુરુષોમાં સેકન્ડરી સેક્સુઅલ લક્ષણોના વિકાસ માટે જવાબદાર છે, પ્રોજેસ્ટેરોન (B) ગર્ભાવસ્થાના નિયંત્રણમાં મહત્વની ભૂમિકા ભજવે છે, અને FSH (D) ફોલિકલના વિકાસ અને સ્પર્મજનનમાં મહત્વની ભૂમિકા ભજવે છે.", "ncert_ref": "Class XI - પ્રકરણ 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 9}, {"question": "એક વ્યક્ 2: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 30}, {"question": "જ્યારે પેરાથાયરોઇડ ગ્લેન્ડ દ્વારા PTH સ્રાવ થાય છે, ત્યારે કેલ્શિયમના સ્તરને નિયંત્રિત કરવા માટે કયા અંગ પર તેનો સીધો પ્રભાવ પડતો નથી?", "options": ["A) હાડકા", "B) મૂત્રપિંડ", "C) આંતરડા", "D) થાયરોઇડ ગ્લેન્ડ"], "correct": 2, "explanation": "PTH (પેરાથાયરોઇડ હોર્મોન) હાડકા (A), મૂત્રપિંડ (B), અને થાયરોઇડ ગ્લેન્ડ (D) પર સીધો પ્રભાવ પાડે છે. હાડકામાંથી કેલ્શિયમનું શોષણ, મૂત્રપિંડમાં કેલ્શિયમનું પુનઃશોષણ, અને થાયરોઇડ ગ્લેન્ડમાં કેલ્શિટોનિનના સ્રાવને ઉત્તેજિત કરવા માટે PTH જવાબદાર છે. આંતરડા (C) પર PTHનો સીધો પ્રભાવ પડતો નથી, કેમ કે કેલ્શિયમનું શોષણ મુખ્યત્વે કેલ્શિટ્રિયોલ (વિટામિન D3) દ્વારા નિયંત્રિત થાય છે.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 31}, {"question": "નીચેનામાંથી કયો હોર્મોન એડ્રિનલ કોર્ટેક્સ દ્વારા સ્રાવ થતો નથી?", "options": ["A) કોર્ટિસોલ", "B) એલ્ડોસ્ટેરોન", "C) એડ્રિનલિન", "D) એન્ડ્રોજન"], "correct": 2, "explanation": "એડ્રિનલ કોર્ટેક્સ દ્વારા કોર્ટિસોલ (A), એલ્ડોસ્ટેરોન (B), અને એન્ડ્રોજન (D) સ્રાવ થાય છે. એડ્રિનલિન (C) એડ્રિનલ મેડ્યુલા દ્વારા સ્રાવ થાય છે, એડ્રિનલ કોર્ટેક્સ દ્વારા નહીં.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 32}, {"question": "નીચેનામાંથી કયો હોર્મોન સ્રાવ પામે છે જ્યારે રક્તમાં ગ્લુકોઝનું સ્તર અતિશય ઘટે છે, પરંતુ તે પિટ્યુટરી ગ્લેન્ડ દ્વારા સ્રાવ થતો નથી?", "options": ["A) ગ્લુકેગોન", "B) એડ્રિનલિન", "C) કોર્ટિસોલ", "D) ઇન્સ્યુલિન"], "correct": 0, "explanation": "જ્યારે રક્તમાં ગ્લુકોઝનું સ્તર અતિશય ઘટે છે, ત્યારે ગ્લુકેગોન (A) એ પેન્ક્રિયાસના આલ્ફા કોષો દ્વારા સ્રાવ પામે છે અને યકૃતમાં ગ્લાયકોજનના વિઘટનને ઉત્તેજિત કરે છે. એડ્રિનલિન (B) એડ્રિનલ મેડ્યુલા દ્વારા સ્રાવ થાય છે, કોર્ટિસોલ (C) એડ્રિનલ કોર્ટેક્સ દ્વારા સ્રાવ થાય છે, અને ઇન્સ્યુલિન (D) પેન્ક્રિયાસના બીટા કોષો દ્વારા સ્રાવ થાય છે, પરંતુ ઇન્સ્યુલિન ગ્લુકોઝના સ્તરને ઘટાડે છે, વધારે નહીં.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 33}, {"question": "એક વ્યક્તિમાં એડ્રિનલ કોર્ટેક્સના ઝોના ગ્લોમેર્યુલોસા ભાગમાંથી સ્રાવિત થતો હોર્મોન અચાનક વધી જાય છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું પરિવર્તન જોવા મળે તેવી શક્યતા સૌથી વધુ છે?", "options": ["A) રક્તમાં સોડિયમ આયનનું પ્રમાણ ઘટશે અને પોટેશિયમ આયનનું પ્રમાણ વધશે", "B) રક્તમાં સોડિયમ આયનનું પ્રમાણ વધશે અને પોટેશિયમ આયનનું પ્રમાણ ઘટશે", "C) રક્તમાં કેલ્શિયમનું પ્રમાણ વધશે અને ફોસ્ફેટનું પ્રમાણ ઘટશે", "D) રક્તમાં ગ્લુકોઝનું પ્રમાણ વધશે અને પ્રોટીન સંશ્લેષણ ઘટશે"], "correct": 1, "explanation": "ઝોના ગ્લોમેર્યુલોસા એડ્રિનલ કોર્ટેક્સનો બાહ્ય સ્તર છે, જે મિનરલોકોર્ટિકોઇડ્સ (મુખ્યત્વે એલ્ડોસ્ટેરોન) સ્રાવિત કરે છે. એલ્ડોસ્ટેરોન રેનિન-એન્જિયોટેન્સિન તંત્ર દ્વારા નિયંત્રિત થાય છે અને તેનું મુખ્ય કાર્ય રેનલ ટ્યુબ્યુલ્સમાં સોડિયમ આયનના પુનઃશોષણ અને પોટેશિયમ આયનના ઉત્સર્જનને વધારવાનું છે. તેથી, એલ્ડોસ્ટેરોનના વધેલા સ્રાવને કારણે રક્તમાં સોડિયમનું પ્રમાણ વધશે અને પોટેશિયમનું પ્રમાણ ઘટશે. વિકલ્પ A ખોટો છે કારણ કે તે એલ્ડોસ્ટેરોનની ક્રિયાનું વિરુદ્ધ દર્શાવે છે. વિકલ્પ C ખોટો છે કારણ કે કેલ્શિયમ અને ફોસ્ફેટના ચયાપચય પર એલ્ડોસ્ટેરોનની કોઈ સીધી અસર નથી. વિકલ્પ D ખોટો છે કારણ કે ગ્લુકોઝ અને પ્રોટીન સંશ્લેષણ પર ગ્લુકોકોર્ટિકોઇડ્સ (જેમ કે કોર્ટિસોલ)ની અસર થાય છે, એલ્ડોસ્ટેરોનની નહીં.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 34}, {"question": "નીચેનામાંથી કયું વિધાન અંતઃસ્રાવી ગ્રંથિઓ અને તેમના હોર્મોન માટે ખોટું છે? (અપવાદ આધારિત પ્રશ્ન)", "options": ["A) થાયરોઇડ ગ્રંથિ થાઇરોક્સિન (T4) અને ટ્રાયઆયોડોથાઇરોનિન (T3) સ્રાવિત કરે છે, જે આયોડિન ધરાવતા હોર્મોન્સ છે", "B) પેરાથાયરોઇડ ગ્રંથિ પેરાથોર્મોન (PTH) સ્રાવિત કરે છે, જે રક્તમાં કેલ્શિયમનું સ્તર વધારે છે અને ફોસ્ફેટનું સ્તર ઘટાડે છે", "C) એડ્રિનલ મેડ્યુલા એડ્રિનાલિન અને નોરએડ્રિનાલિન સ્રાવિત કરે છે, જે એમિનોએસિડ ડેરિવેટિવ્ઝ છે અને 'ફાઇટ-ઓર-ફ્લાઇટ' પ્રતિભાવ માટે જવાબદાર છે", "D) પિટ્યુટરી ગ્લેન્ડનો પોસ્ટીરિયર ભાગ ઓક્સિટોસિન અને વેસોપ્રેસિન (ADH) સ્રાવિત કરે છે, જે હાયપોથેલામસમાં સંશ્લેષિત થાય છે અને અહીંથી સીધા રક્તમાં મુક્ત થાય છે"], "correct": 3, "explanation": "વિકલ્પ D ખોટું છે કારણ કે પિટ્યુટરી ગ્લેન્ડનો પોસ્ટીરિયર ભાગ (ન્યુરોહાયપોફિઝિસ) હોર્મોન્સ સ્રાવિત કરતો નથી, પરંતુ હાયપોથેલામસમાં સંશ્લેષિત થતા હોર્મોન્સ (ઓક્સિટોસિન અને વેસોપ્રેસિન)ને સંગ્રહિત કરીને રક્તમાં મુક્ત કરે છે. વિકલ્પ A સાચું છે કારણ કે થાયરોઇડ ગ્રંથિ T3 અને T4 સ્રાવિત કરે છે, જે આયોડિન ધરાવે છે. વિકલ્પ B સાચું છે કારણ કે PTH રક્તમાં કેલ્શિયમનું સ્તર વધારે છે અને ફોસ્ફેટનું સ્તર ઘટાડે છે. વિકલ્પ C સાચું છે કારણ કે એડ્રિનલ મેડ્યુલા એડ્રિનાલિન અને નોરએડ્રિનાલિન સ્રાવિત કરે છે, જે એમિનોએસિડ ડેરિવેટિવ્ઝ છે અને 'ફાઇટ-ઓર-ફ્લાઇટ' પ્રતિભાવ માટે જવાબદાર છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 22: રાસાયણિક સંકલન અને નિયંત્રણ; ક્લાસ XII - પ્રકરણ 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 35}, {"question": "નીચેનામાંથી કયો હોર્મોન સીધો જ અંતઃસ્રાવી ગ્રંથિઓ દ્વારા સ્રાવ થતો નથી, પરંતુ તેના સ્રાવ માટે ચેતાતંત્રની ઉત્તેજના જરૂરી છે?", "options": ["A) એડ્રિનલિન", "B) ઇન્સ્યુલિન", "C) થાયરોક્સિન", "D) એલ્ડોસ્ટેરોન"], "correct": 0, "explanation": "એડ્રિનલિન એ એડ્રિનલ મેડ્યુલા દ્વારા સ્રાવ થતો હોર્મોન છે, જે ચેતાતંત્ર (સંવેદી તંત્ર) દ્વારા ઉત્તેજિત થાય છે. ઇન્સ્યુલિન, થાયરોક્સિન અને એલ્ડોસ્ટેરોન એ અંતઃસ્રાવી ગ્રંથિઓ દ્વારા સ્વયં નિયંત્રિત થતા હોર્મોન છે, જેમાં ચેતાતંત્રની સીધી ભૂમિકા હોતી નથી.", "ncert_ref": "Class XI - પ્રકરણ 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 36}, {"question": "જો એક વ્યક્તિમાં પેરાથાયરોઇડ હોર્મોન (PTH) અને કેલ્સિટોનિન બંનેનું સ્રાવ સંતુલિત હોય, તો રક્તમાં કેલ્શિયમનું સ્તર કેવું રહેશે?", "options": ["A) અતિશય વધશે", "B) અતિશય ઘટશે", "C) સ્થિર રહેશે", "D) અસ્થિર રહેશે"], "correct": 2, "explanation": "PTH કેલ્શિયમનું સ્તર વધારવા માટે કામ કરે છે, જ્યારે કેલ્સિટોનિન કેલ્શિયમનું સ્તર ઘટાડવા માટે કામ કરે છે. જ્યારે બંને હોર્મોન સંતુલિત હોય, ત્યારે રક્તમાં કેલ્શિયમનું સ્તર સ્થિર રહે છે. અતિશય વધવું અથવા ઘટવું એ અસંતુલનની નિશાની છે, જ્યારે અસ્થિરતા એ હોર્મોનલ અસંતુલનને કારણે થતી નથી.", "ncert_ref": "Class XI - પ્રકરણ 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 37}, {"question": "જ્યારે એક વ્યક્તિમાં પેરાથાયરોઇડ ગ્લેન્ડ અને થાયરોઇડ ગ્લેન્ડ બંનેની કામગીરી સંપૂર્ણપણે બંધ થઈ જાય, ત્યારે રક્તમાં કેલ્શિયમના સ્તર પર કયો અસર થશે અને તેના પરિણામે કયો લક્ષણ જોવા મળશે?", "options": ["A) કેલ્શિયમનું સ્તર અતિશય વધશે અને હાયપરકેલ્શિયમિયા જેવા લક્ષણો જોવા મળશે", "B) કેલ્શિયમનું સ્તર અતિશય ઘટશે અને ટેટની જેવા લક્ષણો જોવા મળશે", "C) કેલ્શિયમનું સ્તર સ્થિર રહેશે કારણ કે પેરાથાયરોઇડ અને થાયરોઇડ ગ્લેન્ડ એકબીજાના કામને પૂરક કરે છે", "D) કેલ્શિયમનું સ્તર અતિશય વધશે અને ઓસ્ટિયોપોરોસિસ જેવા લક્ષણો જોવા મળશે"], "correct": 1, "explanation": "પેરાથાયરોઇડ ગ્લેન્ડ દ્વારા સ્રાવ થતો PTH (પેરાથાયરોઇડ હોર્મોન) રક્તમાં કેલ્શિયમનું સ્તર વધારવા માટે જવાબદાર છે, જ્યારે થાયરોઇડ ગ્લેન્ડ દ્વારા સ્રાવ થતો કેલ્સિટોનિન રક્તમાં કેલ્શિયમનું સ્તર ઘટાડવા માટે જવાબદાર છે. જો બંને ગ્લેન્ડની કામગીરી બંધ થઈ જાય, તો PTHનું સ્રાવ બંધ થવાને કારણે કેલ્શિયમનું સ્તર ઘટશે, જ્યારે કેલ્સિટોનિનનું સ્રાવ પણ બંધ થવાને કારણે કેલ્શિયમનું સ્તર વધવાની પ્રક્રિયા અટકશે. પરિણામે, કેલ્શિયમનું સ્તર અતિશય ઘટશે અને ટેટની (મસલ સ્પઝમ) જેવા લક્ષણો જોવા મળશે. વિકલ્પ A, C, અને D ખોટા છે કારણ કે તેઓ કેલ્શિયમના સ્તરમાં વધારો અથવા સ્થિરતા દર્શાવે છે, જે આ સ્થિતિમાં શક્ય નથી.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 38}, {"question": "નીચેનામાંથી કયો હોર્મોન એડ્રિનલ કોર્ટેક્સના ઝોના ફાસિક્યુલેટા ભાગમાંથી સ્રાવ થાય છે અને તેનું મુખ્ય કાર્ય કયું છે?", "options": ["A) એલ્ડોસ્ટેરોન – સોડિયમ અને પોટેશિયમના ચયાપચયને નિયંત્રિત કરવું", "B) કોર્ટિસોલ – કાર્બોદિત, પ્રોટીન અને ચરબીના ચયાપચયને નિયંત્રિત કરવું", "C) એન્ડ્રોજન – સેકન્ડરી સેક્સુઅલ લક્ષણોના વિકાસને ઉત્તેજિત કરવું", "D) એપીનેફ્રિન – હૃદયના ધબકારા અને રક્તચાપને વધારવું"], "correct": 1, "explanation": "એડ્રિનલ કોર્ટેક્સના ઝોના ફાસિક્યુલેટા ભાગમાંથી કોર્ટિસોલ હોર્મોન સ્રાવ થાય છે, જે કાર્બોદિત, પ્રોટીન અને ચરબીના ચયાપચયને નિયંત્રિત કરે છે. એલ્ડોસ્ટેરોન ઝોના ગ્લોમેર્યુલોસા ભાગમાંથી સ્રાવ થાય છે (A ખોટું), એન્ડ્રોજન ઝોના રેટિક્યુલેરિસ ભાગમાંથી સ્રાવ થાય છે (C ખોટું), અને એપીનેફ્રિન એડ્રિનલ મેડ્યુલામાંથી સ્રાવ થાય છે (D ખોટું).", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 39}, {"question": "એક વ્યક્તિમાં હાયપોથેલામસ દ્વારા સ્રાવ થતો GHRH (Growth Hormone-Releasing Hormone)નું સ્રાવ અચાનક ઘટી જાય, તો નીચેનામાંથી કયો પરિણામ જોવા મળશે?", "options": ["A) પિટ્યુટરી ગ્લેન્ડ દ્વારા GH (Growth Hormone)નું સ્રાવ વધશે", "B) પિટ્યુટરી ગ્લેન્ડ દ્વારા GHનું સ્રાવ ઘટશે, પરિણામે વૃદ્ધિ અટકશે", "C) એડ્રિનલ ગ્લેન્ડ દ્વારા એડ્રિનલિનનું સ્રાવ વધશે", "D) થાયરોઇડ ગ્લેન્ડ દ્વારા થાયરોક્સિનનું સ્રાવ ઘટશે"], "correct": 1, "explanation": "GHRH હાયપોથેલામસ દ્વારા સ્રાવ થતો હોર્મોન છે જે પિટ્યુટરી ગ્લેન્ડને GH (Growth Hormone) સ્રાવવા માટે ઉત્તેજિત કરે છે. જો GHRHનું સ્રાવ ઘટી જાય, તો પિટ્યુટરી ગ્લેન્ડ દ્વારા GHનું સ્રાવ પણ ઘટશે, પરિણામે વૃદ્ધિ અટકશે. વિકલ્પ A ખોટું છે કારણ કે GHનું સ્રાવ ઘટશે, નહીં કે વધશે. વિકલ્પ C અને D ખોટા છે કારણ કે તેઓ એડ્રિનલ અને થાયરોઇડ ગ્લેન્ડના હોર્મોન સાથે સંબંધિત નથી.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 40}, {"question": "નીચેનામાંથી કયો હોર્મોન એડ્રિનલ કોર્ટેક્સના ઝોના રેટિક્યુલેરિસ ભાગમાંથી સ્રાવ થાય છે અને તેના સ્રાવ માટે ACTHની જરૂર રહેતી નથી?", "options": ["A) કોર્ટિસોલ", "B) એલ્ડોસ્ટેરોન", "C) એન્ડ્રોજન", "D) એપીનેફ્રિન"], "correct": 2, "explanation": "એડ્રિનલ કોર્ટેક્સના ઝોના રેટિક્યુલેરિસ ભાગમાંથી એન્ડ્રોજન (અનુવંશિક પુરુષ હોર્મોન) સ્રાવ થાય છે. કોર્ટિસોલ (A) અને એલ્ડોસ્ટેરોન (B) એ ઝોના ફાસિક્યુલેટા અને ઝોના ગ્લોમેર્યુલોસામાંથી સ્રાવ થાય છે અને તેમના સ્રાવ માટે ACTHની જરૂર રહેતી છે. એપીનેફ્રિન (D) એ એડ્રિનલ મેડ્યુલામાંથી સ્રાવ થતો હોર્મોન છે, એડ્રિનલ કોર્ટેક્સનો નહીં.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 41}, {"question": "જો એક વ્યક્તિમાં પિટ્યુટરી ગ્લેન્ડનો પાર્સ ડિસ્ટેલિસ ભાગ નિષ્ક્રિય થઈ જાય, તો નીચેનામાંથી કયા હોર્મોનના સ્તરમાં સૌથી વધુ અસર થશે?", "options": ["A) વૃદ્ધિ હોર્મોન (GH)", "B) પ્રોલેક્ટિન", "C) એડ્રિનોકોર્ટિકોટ્રોપિક હોર્મોન (ACTH)", "D) ઓક્સિટોસિન"], "correct": 0, "explanation": "પાર્સ ડિસ્ટેલિસ (એડિનોહાયપોફિઝિસ) પિટ્યુટરી ગ્લેન્ડનો અગ્ર ભાગ છે, જે વૃદ્ધિ હોર્મોન (GH), પ્રોલેક્ટિન અને ACTH જેવા હોર્મોનનું સ્રાવ કરે છે. જો આ ભાગ નિષ્ક્રિય થાય, તો GH (A)નું સ્તર સૌથી વધુ અસરગ્રસ્ત થશે, કારણ કે તે સીધો જ આ ભાગ દ્વારા સ્રાવ થાય છે. પ્રોલેક્ટિન (B) અને ACTH (C) પણ આ ભાગ દ્વારા સ્રાવ થાય છે, પરંતુ GHની ઉણપના પરિણામે વ્યક્તિની વૃદ્ધિ અને ચયાપચય પર સૌથી તીવ્ર અસર થાય છે. ઓક્સિટોસિન (D) પોસ્ટીરિયર પિટ્યુટરી (પાર્સ નર્વોસા) દ્વારા સ્રાવ થાય છે, જે પાર્સ ડિસ્ટેલિસનો ભાગ નથી.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 42}, {"question": "નીચેનામાંથી કયું વિધાન પેરાથાયરોઇડ હોર્મોન (PTH) અને કેલ્સિટોનિન વચ્ચેના સ્રાવ અને કાર્ય વિશે સાચું છે?", "options": ["A) PTH અને કેલ્સિટોનિન બંને હાયપોકેલ્સિમિયા સ્થિતિમાં સ્રાવ પામે છે.", "B) PTH કેલ્શિયમના રક્ત સ્તરને ઘટાડે છે, જ્યારે કેલ્સિટોનિન તેને વધારે છે.", "C) PTH હાડકામાંથી કેલ્શિયમનું શોષણ વધારે છે, જ્યારે કેલ્સિટોનિન હાડકામાં કેલ્શિયમનું જમા થવાને ઉત્તેજિત કરે છે.", "D) PTH અને કેલ્સિટોનિન બંને થાયરોઇડ ગ્લેન્ડ દ્વારા સ્રાવ થાય છે."], "correct": 2, "explanation": "PTH હાડકામાંથી કેલ્શિયમનું શોષણ વધારે છે (હાડકામાંથી રક્તમાં કેલ્શિયમ મુક્ત કરે છે), જ્યારે કેલ્સિટોનિન હાડકામાં કેલ્શિયમનું જમા થવાને ઉત્તેજિત કરે છે (રક્તમાંથી હાડકામાં કેલ્શિયમ લઈ જાય છે). A ખોટું છે કારણ કે PTH હાયપોકેલ્સિમિયા સ્થિતિમાં સ્રાવ પામે છે, જ્યારે કેલ્સિટોનિન હાયપરકેલ્સિમિયા સ્થિતિમાં સ્રાવ પામે છે. B ખોટું છે કારણ કે PTH કેલ્શિયમનું સ્તર વધારે છે, જ્યારે કેલ્સિટોનિન તેને ઘટાડે છે. D ખોટું છે કારણ કે PTH પેરાથાયરોઇડ ગ્લેન્ડ દ્વારા અને કેલ્સિટોનિન થાયરોઇડ ગ્લેન્ડના પેરાફોલિક્યુલર કોષો દ્વારા સ્રાવ થાય છે.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકલન અને નિયંત્રણ", "difficulty": "Hard", "num": 43}, {"question": "એક વ્યક્તિમાં હાયપોથેલામસ દ્વારા સ્રાવ થતો હોર્મોન જે પિટ્યુટરી ગ્લેન્ડના સ્રાવને અવરોધે છે તે કયો હોર્મોન હોઈ શકે? (વિશેષ નોંધ: આ હોર્મોન પિટ્યુટરી ગ્લેન્ડના સ્રાવને નકારાત્મક રીતે નિયંત્રિત કરે છે)", "options": ["A) ટાયરોટ્રોપિન-રિલીઝિંગ હોર્મોન (TRH)", "B) સોમેટોસ્ટેટિન (GHIH)", "C)         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};

                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){

            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
