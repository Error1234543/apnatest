    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}

        .question-card:nth-child(4){animation-delay:.3s}

        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}

        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}

        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}

        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>

    <script>
        const questionsData = [{"question": "ન્યુરોનની રચનામાં, એક્સોન પર આવેલા શ્વાન કોષોના બહુવિધ પડોને શું કહેવાય છે, જે વિદ્યુત અવરોધની રચના કરે છે અને તંત્રિકા આવેગની ગતિ વધારે છે?", "options": ["A) નોડ ઓફ રેનવિયર", "B) માયેલિન શીથ", "C) સાયનેપ્સ", "D) ડેન્ડ્રાઇટ્સ"], "correct": 1, "explanation": "શ્વાન કોષો દ્વારા રચાયેલા બહુવિધ પડોને માયેલિન શીથ કહેવાય છે, જે વિદ્યુત અવરોધની રચના કરે છે અને તંત્રિકા આવેગની ગતિ વધારે છે. નોડ ઓફ રેનવિયર માયેલિન શીથ વચ્ચેના ખાલી જગ્યાઓ છે, સાયનેપ્સ ન્યુરોન વચ્ચેના જંકશન છે, અને ડેન્ડ્રાઇટ્સ ન્યુરોનના ડેન્ડ્રાઇટિક ટ્રી છે.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાકીય નિયંત્રણ અને સંકલન", "difficulty": "Hard", "num": 1}, {"question": "જો એક ન્યુરોનમાં એક્સોન હાજર ન હોય, તો તે કયા પ્રકારનો ન્યુરોન હશે?", "options": ["A) બાઇપોલર ન્યુરોન", "B) યુનિપોલર ન્યુરોન", "C) મલ્ટિપોલર ન્યુરોન", "D) એનેક્સોનિક ન્યુરોન"], "correct": 3, "explanation": "એનેક્સોનિક ન્યુરોનમાં એક્સોન હાજર નથી. બાઇપોલર ન્યુરોનમાં એક ડેન્ડ્રાઇટ અને એક એક્સોન હોય છે, યુનિપોલર ન્યુરોનમાં એક જ પ્રકાશન હોય છે જે ડેન્ડ્રાઇટ અને એક્સોન બંનેની ભૂમિકા ભજવે છે, અને મલ્ટિપોલર ન્યુરોનમાં એક એક્સોન અને બહુવિધ ડેન્ડ્રાઇટ્સ હોય છે.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાકીય નિયંત્રણ અને સંકલન", "difficulty": "Hard", "num": 2}, {"question": "ન્યુરોનના કયા ભાગમાં કોષકેન્દ્ર હાજર હોય છે?", "options": ["A) એક્સોન હિલોક", "B) સાયનેપ્ટિક બટન", "C) સોમા (કોષકાય)", "D) માયેલિન શીથ"], "correct": 2, "explanation": "ન્યુરોનના સોમા (કોષકાય) ભાગમાં કોષકેન્દ્ર હાજર હોય છે. એક્સોન હિલોક એ એક્સોનનો પ્રારંભિક ભાગ છે, સાયનેપ્ટિક બટન એ એક્સોનનો અંતિમ ભાગ છે, અને માયેલિન શીથ એ એક્સોન પરનો આવરણ છે.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાકીય નિયંત્રણ અને સંકલન", "difficulty": "Hard", "num": 3}, {"question": "ન્યુરોનમાં, કયા ભાગ દ્વારા રસાયણિક સંકેતોનું વિદ્યુત સંકેતોમાં રૂપાંતર થાય છે?", "options": ["A) ડેન્ડ્રાઇટ્સ", "B) સાયનેપ્સ", "C) એક્સોન", "D) કોષકેન્દ્ર"], "correct": 1, "explanation": "સાયનેપ્સ દ્વારા રસાયણિક સંકેતોનું વિદ્યુત સંકેતોમાં રૂપાંતર થાય છે. ડેન્ડ્રાઇટ્સ વિદ્યુત સંકેતોને ગ્રહણ question": "નીચેના પૈકી કયું વિધાન ન્યુરોનના પ્રકારો અને તેમની કાર્યપદ્ધતિ વિશે સંપૂર્ણ સાચું છે?", "options": ["A) બાયપોલર ન્યુરોનમાં એક ડેન્ડ્રાઇટ અને એક એક્સોન હોય છે, અને તે મુખ્યત્વે રેટિનામાં જોવા મળે છે.", "B) મલ્ટીપોલર ન્યુરોનમાં એક કોષકેન્દ્ર, બહુવિધ ડેન્ડ્રાઇટ્સ અને એક એક્સોન હોય છે, અને તે મુખ્યત્વે મગજ અને મજ્જારજ્જુમાં જોવા મળે છે.", "C) યુનીપોલર ન્યુરોનમાં એક જ શાખા હોય છે જે ડેન્ડ્રાઇટ અને એક્સોન બંનેની ભૂમિકા ભજવે છે, અને તે મુખ્યત્વે અંતઃસ્રાવી ગ્રંથિઓમાં જોવા મળે છે.", "D) સૂડોયુનીપોલર ન્યુરોનમાં કોષકેન્દ્ર કોષકાયમાં મધ્યમાં હોય છે, અને તેની શાખાઓ ડેન્ડ્રાઇટ અને એક્સોનમાં વહેંચાયેલી હોય છે, અને તે મુખ્યત્વે સંવેદનાત્મક ન્યુરોન તરીકે કામ કરે છે."], "correct": 3, "explanation": "સૂડોયુનીપોલર ન્યુરોન (D) સંપૂર્ણ સાચું વિધાન છે. આ ન્યુરોનમાં કોષકેન્દ્ર કોષકાયના મધ્ય ભાગમાં હોય છે, અને તેની શાખાઓ ડેન્ડ્રાઇટ અને એક્સોનમાં વહેંચાયેલી હોય છે. આ પ્રકારના ન્યુરોન મુખ્યત્વે સંવેદનાત્મક ન્યુરોન તરીકે કામ કરે છે, જેમ કે ડોર્સલ રૂટ ગેંગ્લિયામાં જોવા મળે છે. અ) બાયપોલર ન્યુરોનમાં એક ડેન્ડ્રાઇટ અને એક એક્સોન હોય છે, પરંતુ તે મુખ્યત્વે રેટિનામાં જોવા મળે છે એ સાચું છે, પરંતુ તે સંપૂર્ણ સાચું વિધાન નથી કારણ કે બાયપોલર ન્યુરોન ઓલફેક્ટરી એપિથેલિયમ અને કોખલિયામાં પણ જોવા મળે છે. બ) મલ્ટીપોલર ન્યુરોનમાં એક કોષકેન્દ્ર, બહુવિધ ડેન્ડ્રાઇટ્સ અને એક એક્સોન હોય છે, પરંતુ તે મુખ્યત્વે મગજ અને મજ્જારજ્જુમાં જોવા મળે છે એ સાચું છે, પરંતુ તે સંપૂર્ણ સાચું વિધાન નથી કારણ કે મલ્ટીપોલર ન્યુરોન મોટાભાગના મોટર ન્યુરોન છે. ક) યુનીપોલર ન્યુરોનમાં એક જ શાખા હોય છે જે ડેન્ડ્રાઇટ અને એક્સોન બંનેની ભૂમિકા ભજવે છે, પરંતુ તે મુખ્યત્વે અંતઃસ્રાવી ગ્રંથિઓમાં જોવા મળે છે એ ખોટું છે, કારણ કે યુનીપોલર ન્યુરોન મુખ્યત્વે અકશેરૂકી પ્રાણીઓમાં જોવા મળે છે.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાકીય નિયંત્રણ અને સંકલન", "difficulty": "Hard", "num": 20}, {"question": "નીચેના પૈકી કયું વિધાન ન્યુરોનની રચના અને કાર્ય વિશે સંપૂર્ણ સાચું છે?", "options": ["A) મોટર ન્યુરોનમાં ડેન્ડ્રાઇટ્સ કોષકાયમાંથી નીકળે છે અને એક્સોન લાંબો હોય છે, જે સ્નાયુ તંતુઓને જોડે છે.", "B) સંવેદી ન્યુરોનમાં એક્સોન હંમેશા કોષકાયથી  "D) માયલિન શીથ – ક્લોરાઇડ અયન"], "correct": 0, "explanation": "સાયનેપ્ટિક બટનમાં ન્યુરોટ્રાન્સમીટરનું સંગ્રહ થાય છે અને તેના મુક્ત થવાનું નિયંત્રણ કેલ્શિયમ અયનની પ્રવેશતા પર આધાર રાખે છે. B) એક્સોન હિલોકમાં એક્શન પોટેન્શિયલની ઉત્પત્તિ થાય છે, પરંતુ ન્યુરોટ્રાન્સમીટરનું સંગ્રહ થતું નથી. C) ડેન્ડ્રાઇટ્સમાં સંકેતોનું ગ્રહણ થાય છે, પરંતુ ન્યુરોટ્રાન્સમીટરનું સંગ્રહ થતું નથી. D) માયલિન શીથ એક્સોનને ઇન્સ્યુલેટ કરે છે, પરંતુ ન્યુરોટ્રાન્સમીટર સાથે તેનો સીધો સંબંધ નથી.", "ncert_ref": "Class XI - પ્રકરણ 21: ચેતાકીય નિયંત્રણ અને સંકલન", "difficulty": "Hard", "num": 23}, {"question": "ન્યુરોનની રચનામાં, જો એક મલ્ટીપોલર ન્યુરોનમાં ડેન્ડ્રાઇટ્સની સંખ્યા અચાનક ઘટી જાય, તો નીચેના પૈકી કયું પરિણામ સૌથી યોગ્ય રીતે થશે?", "options": ["A) ન્યુરોનની સંવેદનશીલતા ઘટશે અને એક્શન પોટેન્શિયલ ઉત્પન્ન થવાની શક્યતા ઓછી થશે", "B) ન્યુરોનની સંવેદનશીલતા વધશે અને એક્શન પોટેન્શિયલ ઉત્પન્ન થવાની શક્યતા વધશે", "C) ન્યુરોનની સંવેદનશીલતા પર કોઈ અસર થશે નહીં, પરંતુ એક્શન પોટેન્શિયલની ગતિ ધીમી પડશે", "D) ન્યુરોન મૃત્યુ પામશે કારણ કે ડેન્ડ્રાઇટ્સ તેના માટે જરૂરી ઉર્જા પુરવઠો પૂરો પાડે છે"], "correct": 0, "explanation": "ડેન્ડ્રાઇટ્સ ન્યુરોનની સંવેદનશીલતા માટે જવાબદાર હોય છે, કારણ કે તેઓ સંવેદનાત્મક ઇનપુટ્સ ગ્રહણ કરે છે. જો ડેન્ડ્રાઇટ્સની સંખ્યા ઘટે, તો ન્યુરોન ઓછા ઇનપુટ્સ ગ્રહણ કરશે, જેના કારણે એક્શન પોટેન્શિયલ ઉત્પન્ન થવાની શક્યતા ઘટશે. વિકલ્પ B ખોટો છે કારણ કે ડેન્ડ્રાઇટ્સની સંખ્યા ઘટવાથી સંવેદનશીલતા ઘટે છે, નહીં કે વધે. વિકલ્પ C ખોટો છે કારણ કે ડેન્ડ્રાઇટ્સની સંખ્યા ઘટવાથી એક્શન પોટેન્શિયલની ગતિ પર સીધી અસર થતી નથી. વિકલ્પ D ખોટો છે કારણ કે ડેન્ડ્રાઇટ્સ ઉર્જા પુરવઠો પૂરો પાડતા નથી, પરંતુ સંવેદનાત્મક ઇનપુટ્સ ગ્રહણ કરે છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાકીય નિયંત્રણ અને સંકલન", "difficulty": "Hard", "num": 24}, {"question": "નીચેના પૈકી કયું વિધાન અપૂર્ણ ન્યુરોન (anaxonic neuron) વિશે સંપૂર્ણ સાચું છે?", "options": ["A) અપૂર્ણ ન્યુરોનમાં એક્સોન અને ડેન્ડ્રાઇટ્સ વચ્ચેનો તફાવત સ્પષ્ટ હોય છે, અને તે મુખ્યત્વે મનુષ્યના મગજમાં જોવા મળે છે", "B) અપૂર્ણ ન્યુરોનમાં એક્સોન હાજર નથી, અને તેના કોષકાયમા છે."], "correct": 0, "explanation": "અપૂર્ણ ન્યુરોન (anaxonic neuron)માં એક્સોન હાજર હોતું નથી અને ડેન્ડ્રાઇટ્સ તથા એક્સોન વચ્ચેનો તફાવત સ્પષ્ટ નથી હોતો, જ્યારે બાયપોલર ન્યુરોનમાં એક એક્સોન અને એક ડેન્ડ્રાઇટ હોય છે, જે સ્પષ્ટ રીતે અલગ પડે છે. તેથી વિકલ્પ A ખોટું છે કારણ કે બાયપોલર ન્યુરોનમાં માત્ર બે શાખાઓ હોય છે (એક એક્સોન અને એક ડેન્ડ્રાઇટ). વિકલ્પ B માત્ર અપૂર્ણ ન્યુરોન માટે સાચું છે, બાયપોલર ન્યુરોન માટે નહીં. વિકલ્પ C ખોટું છે કારણ કે અપૂર્ણ ન્યુરોન મુખ્યત્વે મગજના વિશિષ્ટ વિસ્તારોમાં જોવા મળે છે, જ્યારે બાયપોલર ન્યુરોન સંવેદનાત્મક માર્ગોમાં જોવા મળે છે. વિકલ્પ D ખોટું છે કારણ કે અપૂર્ણ ન્યુરોનમાં વિદ્યુત સંકેતોનું વહન કોષકાયથી દૂરની દિશામાં થતું નથી, કારણ કે તેમાં એક્સોન હોતું નથી.", "ncert_ref": "ક્લાસ XI - અધ્યાય 21: ચેતાકીય નિયંત્રણ અને સંકલન", "difficulty": "Hard", "num": 33}, {"question": "એક પ્રયોગમાં, એક **મલ્ટીપોલર ન્યુરોન**ના કોષકાય (સોમા)માંથી નીકળતા ડેન્ડ્રાઇટ્સની સંખ્યા અચાનક ઘટાડી દેવામાં આવે છે. આ પરિવર્તનના પરિણામે નીચેના પૈકી કયું સૌથી વધુ સંભવિત પરિણામ હશે?", "options": ["A) ન્યુરોન દ્વારા પ્રાપ્ત થતા સંકેતોની સંખ્યામાં ઘટાડો થશે, પરંતુ એક્સોન દ્વારા પ્રસારિત થતા સંકેતોની તીવ્રતા અપરિવર્તિત રહેશે.", "B) ન્યુરોનની સંકેત પ્રસારણ ક્ષમતા સંપૂર્ણપણે બંધ થઈ જશે, કારણ કે ડેન્ડ્રાઇટ્સ વિના સોમા સંકેતો પ્રાપ્ત કરી શકશે નહીં.", "C) એક્સોન પર માયલિન શીથનું નિર્માણ અટકી જશે, કારણ કે ડેન્ડ્રાઇટ્સની સંખ્યા એક્સોનના કાર્યને પ્રભાવિત કરે છે.", "D) ન્યુરોનની સંકેત પ્રસારણ ગતિ વધી જશે, કારણ કે ઓછા ડેન્ડ્રાઇટ્સને કારણે સોમા પર ઓછું ભારણ હશે."], "correct": 0, "explanation": "ડેન્ડ્રાઇટ્સ ન્યુરોનના એ ભાગ છે જે અન્ય ન્યુરોનોમાંથી સંકેતો પ્રાપ્ત કરે છે. જો ડેન્ડ્રાઇટ્સની સંખ્યા ઘટાડવામાં આવે, તો ન્યુરોન દ્વારા પ્રાપ્ત થતા સંકેતોની સંખ્યામાં ઘટાડો થશે, પરંતુ એક્સોન દ્વારા પ્રસારિત થતા સંકેતોની તીવ્રતા અથવા ગુણવત્તા પર કોઈ સીધી અસર થશે નહીં (વિકલ્પ A સાચું). વિકલ્પ B ખોટું છે કારણ કે સોમા સીધા પણ સંકેતો પ્રાપ્ત કરી શકે છે, ભલે તે કાર્યક્ષમતા ઓછી હોય. વિકલ્પ C ખોટું છે કારણ કે માયલિન શીથનું નિર્માણ શ્વાન કોષો દ્વારા થાય છે, જે ડેન્ડ્રાઇટ્સની સંખ્યાથી સ્વતંત્ર છે. વિકલ્ "નોડ ઓફ રેનવિયર (Ranvier's nodes) માયલિન શીથ વચ્ચેના ખુલ્લા ભાગો છે જ્યાં સલ્ટેટરી કન્ડક્શન થાય છે. જો નોડ ઓફ રેનવિયરની સંખ્યા ઘટે, તો સલ્ટેટરી કન્ડક્શનની ક્ષમતા ઘટશે, જેના કારણે વિદ્યુત સંકેતોની ગતિ ઘટશે. વિકલ્પ B સાચો છે કારણ કે તે આ પરિણામનું સચોટ વર્ણન કરે છે. વિકલ્પ A ખોટો છે કારણ કે માયલિન શીથની સતતતા વધવાથી સંકેતોની ગતિ વધે, પરંતુ નોડ ઓફ રેનવિયરની સંખ્યા ઘટવાથી સલ્ટેટરી કન્ડક્શન ઘટે. વિકલ્પ C ખોટો છે કારણ કે નોડ ઓફ રેનવિયરની સંખ્યા સંકેતોની ગતિ પર અસર કરે છે. વિકલ્પ D ખોટો છે કારણ કે નોડ ઓફ રેનવિયરની સંખ્યા ઘટવાથી સંકેતોને વધુ અવરોધોનો સામનો કરવો પડશે, જે ગતિ ઘટાડશે.", "ncert_ref": "Class XI - Chapter 21: ચેતાકીય નિયંત્રણ અને સંકલન", "difficulty": "Hard", "num": 39}, {"question": "બહુધ્રુવીય ન્યુરોનમાં, જો અક્ષ કક્ષ (axon hillock)ને કૃત્રિમ રીતે ક્રિયા વિદ્યુત ક્ષમતા (action potential) ઉત્પન્ન કરવાનું અવરોધવામાં આવે, તો નીચેનામાંથી કયી પ્રક્રિયા સૌથી સીધી રીતે અસરગ્રસ્ત થશે?", "options": ["A) સિનેપ્ટિક ગાંઠોમાં ન્યુરોટ્રાન્સમિટરનું સંશ્લેષણ", "B) અક્ષતંતુ (axon) પર નાડી પ્રચોદનનું પ્રસારણ", "C) ડેન્ડ્રાઇટ્સ પર આવતા સંકેતોનું સંકલન", "D) સોમા (કોષકાય)માં વિશ્રામ કોષપટલ વિદ્યુત ક્ષમતાનું જાળવણી"], "correct": 1, "explanation": "અક્ષ કક્ષ એ ન્યુરોનનું સ્થાન છે જ્યાં આવતા સંકેતોનું સંકલન થાય છે અને ક્રિયા વિદ્યુત ક્ષમતા ઉત્પન્ન થાય છે. તેને અવરોધવાથી અક્ષતંતુ પર નાડી પ્રચોદનનું પ્રસારણ (B) સીધું જ અટકી જશે. ન્યુરોટ્રાન્સમિટરનું સંશ્લેષણ (A) કોષકાય અને સિનેપ્ટિક ગાંઠોમાં થાય છે, અક્ષ કક્ષ પર નહીં. સંકેતોનું સંકલન (C) ડેન્ડ્રાઇટ્સ અને સોમા પર થાય છે, પરંતુ ક્રિયા વિદ્યુત ક્ષમતાની શરૂઆત એ અહીં અવરોધિત પગલું છે. વિશ્રામ કોષપટલ વિદ્યુત ક્ષમતા (D) સોડિયમ-પોટેશિયમ પંપ દ્વારા જાળવવામાં આવે છે અને તે અક્ષ કક્ષના કાર્ય પર સીધી રીતે આધારિત નથી.", "ncert_ref": "ધોરણ ૧૧ - પ્રકરણ ૨૧: નાડી નિયંત્રણ અને સમન્વય", "difficulty": "કઠિન", "num": 40}, {"question": "નીચેનામાંથી કયું લક્ષણ છદ્મ એકધ્રુવીય ન્યુરોનને ખરા એકધ્રુવીય ન્યુરોનથી અલગ પાડે છે?", "options": ["A) કોષકાયમાંથી એક જ પ્રક્રિયા નીકળે છે જે બે શાખાઓમાં વિભાજિત થાય છે", "B) તેઓ ફક્ત કેંદ્રીય નાડી તંત્રમાં જોવા મળે છે", "C) ાજિત થાય છે, જેમાં એક શાખા ડેન્ડ્રાઇટ તરીકે અને બીજી એક્સોન તરીકે કાર્ય કરે છે. ખરા એકધ્રુવીય ન્યુરોન (યુનિપોલર ન્યુરોન)માં, કોષકાય પરથી એક જ શાખા નીકળે છે, જે પછી બે શાખાઓમાં વિભાજિત થતી નથી. A ખોટું છે કારણ કે છદ્મ એકધ્રુવીય ન્યુરોનમાં કોષકાય પરથી એક જ શાખા હોતી છે. C ખોટું છે કારણ કે નાડી પ્રચોદનની ગતિ માયલિન શીથ પર આધાર રાખે છે. D ખોટું છે કારણ કે માયલિન શીથ હાજર હોઈ શકે છે.", "ncert_ref": "Class XI - Chapter 21: ચેતાકીય નિયંત્રણ અને સંકલન", "difficulty": "Hard", "num": 49}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
