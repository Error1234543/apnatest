<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - જૈવિક વર્ગીકરણ (Biological Classification) વાયરસ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
        .mt-10{margin-top:10px}
        .mb-10{margin-bottom:10px}
        .text-center{text-align:center}
        .text-sm{font-size:.9rem}
        .text-muted{color:#666}
        .badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:.75rem;font-weight:600}
        .badge-easy{background:#d1fae5;color:#065f46}
        .badge-medium{background:#fef3c7;color:#92400e}
        .badge-hard{background:#fee2e2;color:#991b1b}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 જૈવિક વર્ગીકરણ (Biological Classification) વાયરસ</span>
                <span>🎯 Hard</span>
                <span>📝 98 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "વાયરસની રચનામાં કયો ઘટક હાજર નથી, પરંતુ તેની જીવનચક્ર દરમિયાન યજમાન કોષમાં બનાવવામાં આવે છે?", "options": ["A) પ્રોટીન કવચ", "B) DNA અથવા RNA", "C) ઉત્સેચક", "D) લિપિડ આવરણ"], "correct": 2, "explanation": "વાયરસમાં ઉત્સેચક હાજર નથી, પરંતુ યજમાન કોષમાં તેના જીવનચક્ર દરમિયાન ઉત્સેચકો બનાવવામાં આવે છે. પ્રોટીન કવચ (A) અને DNA/RNA (B) વાયરસની મૂળભૂત રચના છે, જ્યારે લિપિડ આવરણ (D) કેટલાક વાયરસમાં હાજર હોય છે.", "ncert_ref": "ધોરણ 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ - વાયરસ", "difficulty": "Hard", "num": 1}, {"question": "નીચેના પૈકી કયો વાયરસ ડબલ-સ્ટ્રેન્ડેડ RNA ધરાવે છે?", "options": ["A) ટોબેકો મોઝેઇક વાયરસ", "B) બેક્ટરિયોફેજ T4", "C) ઇન્ફ્લુએંઝા વાયરસ", "D) રોટાવાયરસ"], "correct": 3, "explanation": "રોટાવાયરસ ડબલ-સ્ટ્રેન્ડેડ RNA ધરાવે છે. ટોબેકો મોઝેઇક વાયરસ (A) સિંગલ-સ્ટ્રેન્ડેડ RNA ધરાવે છે, બેક્ટરિયોફેજ T4 (B) ડબલ-સ્ટ્રેન્ડેડ DNA ધરાવે છે, અને ઇન્ફ્લુએંઝા વાયરસ (C) સિંગલ-સ્ટ્રેન્ડેડ RNA ધરાવે છે.", "ncert_ref": "ધોરણ 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ - વાયરસ", "difficulty": "Hard", "num": 2}, {"question": "વાયરોઇડ્સ અને વાયરસ વચ્ચેનો મુખ્ય તફાવત કયો છે?", "options": ["A) વાયરોઇડ્સમાં પ્રોટીન કવચ હાજર નથી", "B) વાયરોઇડ્સ ફક્ત પશુ કોષોને સંક્રમિત કરે છે", "C) વાયરોઇડ્સમાં DNA હાજર છે", "D) વાયરોઇડ્સ યજમાન કોષના ચેતાતંત્રને અસર કરે છે"], "correct": 0, "explanation": "વાયરોઇડ્સમાં પ્રોટીન કવચ હાજર નથી, તે ફક્ત RNA ધરાવે છે. વાયરોઇડ્સ ફક્ત છોડને સંક્રમિત કરે છે (B ખોટું), તે DNA ધરાવતા નથી (C ખોટું), અને તે ચેતાતંત્રને અસર કરતા નથી (D ખોટું).", "ncert_ref": "ધોરણ 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ - વાયરોઇડ્સ", "difficulty": "Hard", "num": 3}, {"question": "પ્રાયોન્સ કયા પ્રકારના રોગોનું કારણ બને છે?", "options": ["A) કર્કરોગ (કૅન્સર)", "B) મસ્તિષ્કના ડિજનરેટિવ રોગો", "C) શ્વસનતંત્રના સંક્રમણ", "D) પાચનતંત્રના રોગો"], "correct": 1, "explanation": "પ્રાયોન્સ મસ્તિષ્કના ડિજનરેટિવ રોગો જેવા કે મેડ કાઉ ડિઝીઝ અને ક્રુટ્ઝફેલ્ડ-જેકોબ ડિઝીઝનું કારણ બને છે. કર્કરોગ (A), શ્વસનતંત્રના સંક્રમણ (C), અને પાચનતંત્રના રોગો (D) પ્રાયોન્સ સાથે સંકળાયેલા નથી.", "ncert_ref": "ધોરણ 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ - પ્રાયોન્સ", "difficulty": "Hard", "num": 4}, {"question": "લાઈકેન્સમાં, કયો જીવ સહજીવી સંબંધમાં ફોટોસિંથેટિક ભાગ તરીકે કામ કરે છે?", "options": ["A) શેવાળ (Algae)", "B) ફંગી (Fungi)", "C) બેક્ટેરિયા", "D) પ્રોટોઝોઆ"], "correct": 0, "explanation": "લાઈકેન્સમાં શેવાળ (Algae) ફોટોસિંથેટિક ભાગ તરીકે કામ કરે છે, જ્યારે ફંગી (B) પોષક તત્વો અને પાણી શોષી લે છે. બેક્ટેરિયા (C) અને પ્રોટોઝોઆ (D) લાઈકેન્સના ઘટકો નથી.", "ncert_ref": "ધોરણ 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ - લાઈકેન્સ", "difficulty": "Hard", "num": 5}, {"question": "અભિકથન (A): વાયરસ જીવિત અને નિર્જીવ વચ્ચેની સીમાએ ઉભા રહે છે. કારણ (R): વાયરસમાં કોષીય રચના હાજર નથી, પરંતુ તે યજમાન કોષમાં પ્રજનન કરે છે.", "options": ["A) A અને R બંને સત્ય છે, અને R એ Aની સરળ સમજૂતી છે", "B) A અને R બંને સત્ય છે, પરંતુ R એ Aની સરળ સમજૂતી નથી", "C) A સત્ય છે, પરંતુ R ખોટું છે", "D) A ખોટું છે, પરંતુ R સત્ય છે"], "correct": 1, "explanation": "અભિકથન (A) અને કારણ (R) બંને સત્ય છે, પરંતુ R એ Aની સરળ સમજૂતી નથી. વાયરસ જીવિત અને નિર્જીવ વચ્ચેની સીમાએ ઉભા રહે છે કારણ કે તેમાં કોષીય રચના નથી, પરંતુ તે યજમાન કોષમાં પ્રજનન કરે છે, પરંતુ આ બંને તથ્યો એકબીજા સાથે સીધા સંબંધમાં નથી.", "ncert_ref": "ધોરણ 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ - વાયરસ", "difficulty": "Hard", "num": 6}, {"question": "નીચેના પૈકી કયા વાયરસમાં RNA ડિપેન્ડન્ટ RNA પોલિમરેઝ ઉત્સેચક હાજર છે?", "options": ["A) HIV", "B) ટોબેકો મોઝેઇક વાયરસ", "C) બેક્ટરિયોફેજ λ", "D) એડેનોવાયરસ"], "correct": 0, "explanation": "HIV એક રેટ્રોવાયરસ છે અને તે RNA ડિપેન્ડન્ટ RNA પોલિમરેઝ (રિવર્સ ટ્રાન્સક્રિપ્ટેઝ) ધરાવે છે. ટોબેકો મોઝેઇક વાયરસ (B) RNA ધરાવે છે પરંતુ રિવર્સ ટ્રાન્સક્રિપ્ટેઝ નથી, બેક્ટરિયોફેજ λ (C) અને એડેનોવાયરસ (D) DNA વાયરસ છે.", "ncert_ref": "ધોરણ 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ - વાયરસ", "difficulty": "Hard", "num": 7}, {"question": "લાઈકેન્સના સંદર્ભમાં, નીચેના પૈકી કયું વિધાન ખોટું છે?", "options": ["A) લાઈકેન્સ દૂષિત વાતાવરણમાં જીવિત રહી શકે છે", "B) લાઈકેન્સમાં ફંગી અને શેવાળ વચ્ચે સહજીવી સંબંધ હોય છે", "C) લાઈકેન્સમાં ફંગી ફોટોસિં  કારકમાં ન્યુક્લિક એસિડ એકદમ નથી હોતું અને તે ફક્ત ખોટી રીતે વળેલા પ્રોટીનથી બનેલું છે. આ કારક નીચેનામાંથી કયા રોગ માટે જવાબદાર હોવાની શક્યતા સૌથી વધુ છે?", "options": ["A) તમાકુનું મોઝેઇક રોગ", "B) બટાટાનું સ્પિન્ડલ કંદ રોગ", "C) ગાયનું સ્પોન્જીફોર્મ એન્સેફેલોપેથી", "D) ઇન્ફ્લુએન્ઝા"], "correct": 2, "explanation": "વર્ણવેલ કારક પ્રાયોન છે, જે ફક્ત ખોટી રીતે વળેલા પ્રોટીન (PrP^Sc) થી બનેલું છે અને તેમાં કોઈ ન્યુક્લિક એસિડ નથી હોતું. પ્રાયોન ન્યુરોડિજનરેટિવ રોગો જેવા કે ગાયનું સ્પોન્જીફોર્મ એન્સેફેલોપેથી (BSE) નું કારણ બને છે. તમાકુનું મોઝેઇક રોગ વાયરસને કારણે, બટાટાનું સ્પિન્ડલ કંદ રોગ વાયરોઇડને કારણે, અને ઇન્ફ્લુએન્ઝા વાયરસને કારણે થાય છે, જેમાં બધામાં ન્યુક્લિક એસિડ હોય છે.", "ncert_ref": "ધોરણ ૧૧ - પ્રકરણ ૨: જૈવિક વર્ગીકરણ - વિષય: પ્રાયોન", "difficulty": "Hard", "num": 11}, {"question": "કથન (A): વાયરોઇડ વાયરસ કરતાં નાના હોય છે અને તેમાં ફક્ત વર્તુળાકાર RNA નું ટૂકું સૂત્ર હોય છે, પરંતુ પ્રોટીન આવરણ નથી હોતું.\nકારણ (R): વાયરોઇડ યજમાન કોષમાં પ્રવેશતાં જ તેના પોતાના RNA પોલિમરેઝનો ઉપયોગ કરીને સ્વયં પ્રતિકૃતિ કરે છે.", "options": ["A) કથન (A) અને કારણ (R) બંને સत्य છે, અને કારણ (R) એ કથન (A) ની યોગ્ય સમજૂતી આપે છે.", "B) કથન (A) અને કારણ (R) બંને સત્ય છે, પરંતુ કારણ (R) એ કથન (A) ની યોગ્ય સમજૂતી નથી.", "C) કથન (A) સત્ય છે, પરંતુ કારણ (R) અસત્ય છે.", "D) કથન (A) અસત્ય છે, પરંતુ કારણ (R) સત્ય છે."], "correct": 0, "explanation": "કથન (A) અને કારણ (R) બંને સત્ય છે. વાયરોઇડ વાયરસ કરતાં નાના હોય છે અને તેમાં ફક્ત વર્તુળાકાર RNA હોય છે, પ્રોટીન આવરણ નથી હોતું. તેઓ યજમાનના RNA પોલિમરેઝનો ઉપયોગ કરીને સ્વયં પ્રતિકૃતિ કરે છે, જે તેમની રચના અને કાર્ય સાથે સીધી રીતે જોડાયેલું છે. આથી, કારણ (R) એ કથન (A) ની યોગ્ય સમજૂતી આપે છે.", "ncert_ref": "ધોરણ ૧૧ - પ્રકરણ ૨: જૈવિક વર્ગીકરણ - વિષય: વાયરોઇડ", "difficulty": "Hard", "num": 12}, {"question": "લાઇકેન વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) લાઇકેન એ ફૂગ અને પ્રકાશસંશ્લેષણ કરતાં ભાગીદાર (શેવાળ અથવા સાયનોબેક્ટેરિયા) વચ્ચેનું સહજીવી સંકલન છે.", "B) લાઇકનમાં ફૂગનો ભાગીદાર સામાન્ય રીતે એસ્કોમાયસીટ હોય છે.", "C) લાઇકન લૈ rrect": 0, "explanation": "ટોબેકો મોઝેઇક વાયરસમાં સિંગલ-સ્ટ્રેન્ડેડ RNA જીનોમ હોય છે, જ્યારે બેક્ટરિયોફેજમાં ડબલ-સ્ટ્રેન્ડેડ DNA હોય છે. HIV એ રેટ્રોવાયરસ છે અને સિંગલ-સ્ટ્રેન્ડેડ RNA ધરાવે છે, નહીં કે ડબલ-સ્ટ્રેન્ડેડ RNA. પોટેટો સ્પિંડલ ટ્યુબર વાયરોઇડમાં ફક્ત સિંગલ-સ્ટ્રેન્ડેડ RNA હોય છે, ડબલ-સ્ટ્રેન્ડેડ DNA નહીં.", "ncert_ref": "મહાવિદ્યાલય શ્રેણી - જીવવિજ્ઞાન: એકમ 2 - જૈવિક વર્ગીકરણ - વાયરસ અને વાયરોઇડ્સ", "difficulty": "Hard", "num": 60}, {"question": "નીચેનામાંથી કયો જોડકો ચેપી કારક અને તેના જીનોમ પ્રકારને સાચી રીતે દર્શાવે છે?", "options": ["A) ટોબેકો મોઝેઇક વાયરસ - ડબલ-સ્ટ્રેન્ડેડ DNA", "B) પોટેટો સ્પિન્ડલ ટ્યુબર વાયરોઇડ - સિંગલ-સ્ટ્રેન્ડેડ RNA", "C) હ્યુમન ઇમ્યુનોડેફિશિયન્સી વાયરસ (HIV) - ડબલ-સ્ટ્રેન્ડેડ RNA", "D) મેડ કાઉ ડિસીઝ પ્રાયોન - સિંગલ-સ્ટ્રેન્ડેડ DNA"], "correct": 1, "explanation": "પોટેટો સ્પિન્ડલ ટ્યુબર વાયરોઇડમાં ફક્ત સિંગલ-સ્ટ્રેન્ડેડ RNA જીનોમ હાજર હોય છે. ટોબેકો મોઝેઇક વાયરસમાં સિંગલ-સ્ટ્રેન્ડેડ RNA, HIVમાં સિંગલ-સ્ટ્રેન્ડેડ RNA, અને મેડ કાઉ ડિસીઝ પ્રાયોનમાં કોઈપણ ન્યુક્લિક એસિડ હાજર નથી.", "ncert_ref": "કક્ષ 11 - જૈવિક વર્ગીકરણ - વાયરસ, વાયરોઇડ્સ અને પ્રાયોન્સ", "difficulty": "Hard", "num": 61}, {"question": "નીચેનાં વિધાનોને ધ્યાનમાં લો: 1. પ્રાયોન્સ એ પ્રોટીનયુક્ત ચેપી કારકો છે જે મગજની પેશીઓને અસર કરે છે. 2. પ્રાયોન્સમાં ન્યુક્લિક એસિડ હાજર હોય છે. 3. પ્રાયોન્સ દ્વારા ઉત્પન્ન થતા રોગોનો ઉપચાર સરળતાથી શક્ય છે. 4. પ્રાયોન્સમાં અસાધારણ પ્રોટીન ફોલ્ડિંગ જોવા મળે છે. સાચાં વિધાનોની સંખ્યા જણાવો.", "options": ["A) 1", "B) 2", "C) 3", "D) 4"], "correct": 2, "explanation": "વિધાન 1 અને 4 સાચા છે. પ્રાયોન્સ એ પ્રોટીનયુક્ત ચેપી કારકો છે જે મગજની પેશીઓને અસર કરે છે અને તેમાં અસાધારણ પ્રોટીન ફોલ્ડિંગ જોવા મળે છે. વિધાન 2 ખોટું છે કારણ કે પ્રાયોન્સમાં ન્યુક્લિક એસિડ હાજર નથી, અને વિધાન 3 ખોટું છે કારણ કે પ્રાયોન્સ દ્વારા ઉત્પન્ન થતા રોગોનો ઉપચાર સરળતાથી શક્ય નથી.", "ncert_ref": "કક્ષ 11 - જૈવિક વર્ગીકરણ - પ્રાયોન્સ", "difficulty": "Hard", "num": 62}, {"question": "નીચેનામાંથી કયો વાયરસ તેના જીવનચક્ર દરમિયાન યજમાન કોષના કોષકેન્દ્રમાં પ્રવેશ કરે છે અને ત ો", "difficulty": "Hard", "num": 65}, {"question": "એક વૈજ્ઞાનિકે એક ચેપી કારકનો અભ્યાસ કર્યો અને જણાવ્યું કે તે ફક્ત પ્રોટીન ધરાવે છે અને તે મગજની પેશીઓને અસર કરે છે. આ ચેપી કારક કયા પ્રકારનો હશે?", "options": ["A) વાયરસ", "B) વાયરોઇડ", "C) પ્રાયોન્સ", "D) બેક્ટેરિયોફેજ"], "correct": 2, "explanation": "પ્રાયોન્સ ફક્ત પ્રોટીન ધરાવે છે અને મગજની પેશીઓને અસર કરે છે (જેમ કે કુરુ, ક્રુટ્ઝફેલ્ડ-જેકબ ડિઝીઝ). વાયરસ (A) અને બેક્ટેરિયોફેજ (D)માં ન્યુક્લિક એસિડ હાજર હોય છે, જ્યારે વાયરોઇડ (B)માં RNA હાજર હોય છે અને ફક્ત છોડમાં જોવા મળે છે.", "ncert_ref": "કક્ષ 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ - પ્રાયોન્સ", "difficulty": "Hard", "num": 66}, {"question": "અભિકથન (A): વાયરસમાં કોષરચના નહીં હોવાને કારણે તેને નિર્જીવ ગણવામાં આવે છે. કારણ (R): વાયરસમાં કોષકેન્દ્ર, કોષરસ અને કોષપટલ જેવી કોષીય રચનાઓ હાજર નથી.", "options": ["A) A અને R બંને સાચા છે અને R એ Aની સાચી સમજૂતી છે", "B) A અને R બંને સાચા છે પરંતુ R એ Aની સાચી સમજૂતી નથી", "C) A સાચું છે પરંતુ R ખોટું છે", "D) A ખોટું છે પરંતુ R સાચું છે"], "correct": 0, "explanation": "વાયરસમાં કોષરચના હાજર નથી, જે તેને નિર્જીવ ગણાવવા માટેનું એક કારણ છે. કારણ (R) એ અભિકથન (A)ની સાચી સમજૂતી આપે છે કારણ કે વાયરસમાં કોષીય રચનાઓનો અભાવ જ તેને નિર્જીવ બનાવે છે.", "ncert_ref": "કક્ષ 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ - વાયરસ", "difficulty": "Hard", "num": 67}, {"question": "અભિકથન (A): વાયરોઇડ્સમાં ફક્ત વર્તુળાકાર સિંગલ-સ્ટ્રેન્ડેડ RNA હોય છે અને તેઓ છોડમાં રોગો ઉત્પન્ન કરે છે.\nકારણ (R): વાયરોઇડ્સમાં પ્રોટીન કોટનો અભાવ હોય છે અને તેઓ યજમાન કોષના RNA પોલિમરેઝનો ઉપયોગ કરીને પોતાનું પ્રતિકૃતિ કરે છે.", "options": ["A) અભિકથન (A) અને કારણ (R) બંને સાચાં છે અને કારણ (R) એ અભિકથન (A)ની સાચી સમજૂતી છે.", "B) અભિકથન (A) અને કારણ (R) બંને સાચાં છે, પરંતુ કારણ (R) એ અભિકથન (A)ની સાચી સમજૂતી નથી.", "C) અભિકથન (A) સાચું છે, પરંતુ કારણ (R) ખોટું છે.", "D) અભિકથન (A) ખોટું છે, પરંતુ કારણ (R) સાચું છે."], "correct": 0, "explanation": "અભિકથન (A) અને કારણ (R) બંને સાચાં છે અને કારણ (R) એ અભિકથન (A)ની સાચી સમજૂતી છે. વાયરોઇડ્સમાં ફક્ત વર્તુળાકાર સિંગલ-સ્ટ્રેન્ડેડ RNA હોય છે અને તેઓ છોડમાં રોગો ઉત્પન્ન કરે છે. તેઓ પ્રોટીન કોટ ધરાવતા નથી અને યજમાન કોષના RNA પોલિમરેઝનો ઉપયોગ કરીને પોતાનું પ્રતિકૃતિ કરે છે (NCERT Class 11, Chapter 2). આથી, કારણ (R) અભિકથન (A)ની સાચી સમજૂતી આપે છે.", "ncert_ref": "Class XI - અધ્યાય 2: જૈવિક વર્ગીકરણ - વાયરોઇડ્સ", "difficulty": "Hard", "num": 68}, {"question": "નીચેના પૈકી કયું જોડકું ખોટું છે?", "options": ["A) વાયરસ - કેપ્સિડ પ્રોટીન કોટ ધરાવે છે", "B) વાયરોઇડ્સ - પ્રોટીન કોટ ધરાવતા નથી અને માત્ર RNA જીનોમ ધરાવે છે", "C) પ્રાયોન્સ - ન્યુક્લિક એસિડ ધરાવતા નથી અને પ્રોટીનયુક્ત ચેપી કારકો છે", "D) લાઈકેન્સ - ફંગી અને બેક્ટેરિયા વચ્ચેનો સહજીવી સંબંધ"], "correct": 3, "explanation": "વિકલ્પ D ખોટો છે કારણ કે લાઈકેન્સમાં ફંગી અને શૈવાળ (એલ્ગા) વચ્ચેનો સહજીવી સંબંધ હોય છે, બેક્ટેરિયા સાથે નહીં. વાયરસ કેપ્સિડ પ્રોટીન કોટ ધરાવે છે (A સાચું), વાયરોઇડ્સ પ્રોટીન કોટ ધરાવતા નથી અને માત્ર RNA જીનોમ ધરાવે છે (B સાચું), અને પ્રાયોન્સ ન્યુક્લિક એસિડ ધરાવતા નથી અને પ્રોટીનયુક્ત ચેપી કારકો છે (C સાચું) (NCERT Class 11, Chapter 2).", "ncert_ref": "Class XI - અધ્યાય 2: જૈવિક વર્ગીકરણ - વાયરસ, વાયરોઇડ્સ, પ્રાયોન્સ અને લાઈકેન્સ", "difficulty": "Hard", "num": 69}, {"question": "એક સંશોધકે અવલોકન કર્યું કે એક ચેપી કારક માત્ર પ્રોટીન ધરાવે છે અને તે યજમાન કોષના પ્રોટીનને તેના જેવું જ બનાવવા માટે પ્રેરિત કરે છે, પરંતુ આ પ્રક્રિયામાં કોઈ ન્યુક્લિક એસિડનો સંપર્ક થતો નથી. આ ચેપી કારક માટે નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) આ ચેપી કારક પ્રાયોન છે અને તે મગજની પેશીઓમાં સ્ક્રેપી રોગનું કારણ બને છે", "B) આ ચેપી કારક યજમાન કોષના પ્રોટીનનું ખોટું ફોલ્ડિંગ પ્રેરિત કરે છે, જેના કારણે તે ચેપી બને છે", "C) આ ચેપી કારકમાં ન્યુક્લિક એસિડનો અભાવ હોવાથી તેને સજીવ ગણી શકાય નહીં", "D) આ ચેપી કારક યજમાન કોષના DNA અથવા RNA સાથે સીધો સંપર્ક કરીને તેનું પ્રોટીન બનાવે છે"], "correct": 3, "explanation": "સાચો જવાબ D છે કારણ કે પ્રાયોન્સ યજમાન કોષના પ્રોટીનનું ખોટું ફોલ્ડિંગ પ્રેરિત કરે છે, પરંતુ તેઓ યજમાનના DNA અથવા RNA સાથે સીધો સંપર્ક કરતા નથી. વિકલ્પ A, B અને C પ્રાયોન્સના લક્ષણોને સાચી રીતે વર્ણવે છે: પ્રાયોન્સ પ્રોટીનયુક્ત ચેપી કાર : "Hard", "num": 80}, {"question": "અભિકથન (A): ટેમ્પરેટ બેક્ટીરિયોફેજ તેના યજમાન બેક્ટેરિયામાં પ્રોફેજ અવસ્થામાં રહી શકે છે. કારણ (R): પ્રોફેજ અવસ્થામાં વાયરલ DNA યજમાનના વર્ણસૂત્રમાં એકીકૃત થાય છે અને યજમાન કોષ સાથે વિભાજન પામે છે.", "options": ["A) A અને R બંને સાચા છે અને R એ Aની સાચી સમજૂતી છે.", "B) A અને R બંને સાચા છે પરંતુ R એ Aની સાચી સમજૂતી નથી.", "C) A સાચું છે પરંતુ R ખોટું છે.", "D) A ખોટું છે પરંતુ R સાચું છે."], "correct": 0, "explanation": "ટેમ્પરેટ બેક્ટીરિયોફેજ (જેવા કે λ-ફેજ) તેના યજમાન બેક્ટેરિયામાં પ્રોફેજ અવસ્થામાં રહી શકે છે, જ્યાં વાયરલ DNA યજમાનના વર્ણસૂત્રમાં એકીકૃત થાય છે અને યજમાન કોષ સાથે વિભાજન પામે છે. આમ, A અને R બંને સાચા છે અને R એ Aની સાચી સમજૂતી આપે છે. અન્ય વિકલ્પો ખોટા છે કારણ કે R એ Aની સીધી સમજૂતી છે.", "ncert_ref": "Class 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ - વાયરસ", "difficulty": "Hard", "num": 81}, {"question": "નીચેનામાંથી કયો ચેપી કારક તેના જીનોમ તરીકે સિંગલ-સ્ટ્રેન્ડેડ DNA ધરાવે છે અને તેના જીવનચક્ર દરમિયાન યજમાન કોષના DNA પોલિમરેઝ ઉત્સેચકનો ઉપયોગ કરે છે?", "options": ["A) એડિનોવાયરસ", "B) પાર્વોવાયરસ", "C) હર્પિસ વાયરસ", "D) ઇન્ફ્લુએન્ઝા વાયરસ"], "correct": 1, "explanation": "પાર્વોવાયરસ તેના જીનોમ તરીકે સિંગલ-સ્ટ્રેન્ડેડ DNA ધરાવે છે અને તેના જીવનચક્ર દરમિયાન યજમાન કોષના DNA પોલિમરેઝ ઉત્સેચકનો ઉપયોગ કરે છે. એડિનોવાયરસ અને હર્પિસ વાયરસ ડબલ-સ્ટ્રેન્ડેડ DNA ધરાવે છે, જ્યારે ઇન્ફ્લુએન્ઝા વાયરસ સિંગલ-સ્ટ્રેન્ડેડ RNA ધરાવે છે.", "ncert_ref": "Class 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ - વાયરસ", "difficulty": "Hard", "num": 82}, {"question": "અભિકથન (A): લાઈકેન્સમાં, ફંગી ભાગ શૈવાળને પાણી અને ખનીજો પૂરા પાડે છે, જ્યારે શૈવાળ ફંગીને કાર્બોદિત પૂરું પાડે છે. કારણ (R): લાઈકેન્સમાં શૈવાળ અને ફંગી વચ્ચેનો સંબંધ પરસ્પર લાભદાયી સહજીવન છે.", "options": ["A) A અને R બંને સાચા છે અને R એ Aની સાચી સમજૂતી છે", "B) A અને R બંને સાચા છે, પરંતુ R એ Aની સાચી સમજૂતી નથી", "C) A સાચું છે, પરંતુ R ખોટું છે", "D) A ખોટું છે, પરંતુ R સાચું છે"], "correct": 1, "explanation": "અભિકથન (A) અને કારણ (R) બંને સાચા છે, પરંતુ R એ Aની સમજૂતી નથી કારણ કે A એ લાઈકેન્સમ રીકે ગણવામાં આવે છે.\nકારણ (R): વાયરસ યજમાન કોષની બહાર નિષ્ક્રિય કણ તરીકે રહે છે, પરંતુ યજમાન કોષમાં પ્રવેશ્યા બાદ તે પ્રજનન કરી શકે છે.", "options": ["A) (A) અને (R) બંને સાચાં છે અને (R) એ (A) ની સાચી સમજૂતી છે.", "B) (A) અને (R) બંને સાચાં છે, પરંતુ (R) એ (A) ની સાચી સમજૂતી નથી.", "C) (A) સાચું છે, પરંતુ (R) ખોટું છે.", "D) (A) ખોટું છે, પરંતુ (R) સાચું છે."], "correct": 0, "explanation": "(A) અને (R) બંને સાચાં છે અને (R) એ (A) ની સાચી સમજૂતી છે. વાયરસ યજમાન કોષની બહાર નિષ્ક્રિય હોય છે, પરંતુ યજમાન કોષમાં પ્રવેશ્યા બાદ તે પ્રજનન કરી શકે છે, જે તેમને સજીવ અને નિર્જીવ વચ્ચેની સીમારેખા બનાવે છે (NCERT).", "ncert_ref": "ક્લાસ 11 - અધ્યાય 2: જૈવિક વર્ગીકરણ - વાયરસ", "difficulty": "Hard", "num": 87}, {"question": "નીચેનાં જોડકાંને ધ્યાનમાં લઈને સાચો વિકલ્પ પસંદ કરો:\n\nકૉલમ I (ચેપી કારક)\nP. વાયરસ\nQ. વાયરોઇડ\nR. પ્રાયોન્સ\nS. લાઈકેન્સ\n\nકૉલમ II (લક્ષણ)\n1. ફક્ત પ્રોટીનયુક્ત ચેપી કારક\n2. ફક્ત વર્તુળાકાર RNA ધરાવે છે\n3. ફંગી અને શૈવાળનું સહજીવન\n4. DNA અથવા RNA જીનોમ ધરાવે છે", "options": ["A) P-4, Q-2, R-1, S-3", "B) P-3, Q-1, R-2, S-4", "C) P-4, Q-1, R-3, S-2", "D) P-2, Q-4, R-1, S-3"], "correct": 0, "explanation": "સાચું જોડાણ: P (વાયરસ) - 4 (DNA અથવા RNA જીનોમ), Q (વાયરોઇડ) - 2 (ફક્ત વર્તુળાકાર RNA), R (પ્રાયોન્સ) - 1 (ફક્ત પ્રોટીનયુક્ત ચેપી કારક), S (લાઈકેન્સ) - 3 (ફંગી અને શૈવાળનું સહજીવન). અન્ય વિકલ્પો ખોટાં જોડાણો ધરાવે છે.", "ncert_ref": "ક્લાસ 11 - અધ્યાય 2: જૈવિક વર્ગીકરણ - વાયરસ, વાયરોઇડ્સ, પ્રાયોન્સ અને લાઈકેન્સ", "difficulty": "Hard", "num": 88}, {"question": "નીચેનામાંથી કયું વિધાન લાઈકેન્સના 'પાયોનિયર સમુદાય' તરીકેના મહત્વ વિશે ખોટું છે?", "options": ["A) લાઈકેન્સ ખડકો પર વસાહત બનાવીને માટી નિર્માણમાં મદદ કરે છે, જે અન્ય વનસ્પતિઓ માટે અનુકૂળ વાતાવરણ તૈયાર કરે છે.", "B) લાઈકેન્સ વાતાવરણમાંથી નાઇટ્રોજનનું સ્થિરીકરણ કરીને જમીનને ફળદ્રુપ બનાવે છે, જે અન્ય વનસ્પતિઓ માટે પોષક તત્ત્વો પૂરા પાડે છે.", "C) લાઈકેન્સ પ્રદૂષણ પ્રત્યે સંવેદનશીલ હોવાથી તેઓ પર્યાવરણીય સૂચકો તરીકે કાર્ય કરે છે.", "D) લાઈકેન્સ ખડકોના રાસાયણિક વિઘટનમાં મદદ કરે છે, જે માટી નિર્માણની પ્ ncert_ref": "કક્ષ 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ - વાયરસ", "difficulty": "Hard", "num": 97}, {"question": "અભિકથન (A): લાઈકેન્સને 'પાયોનિયર સમુદાય' તરીકે ગણવામાં આવે છે કારણ કે તેઓ ખડકો પર પ્રથમ વસાહત સ્થાપિત કરે છે.\nકારણ (R): લાઈકેન્સમાં ફંગી ભાગ ખડકોને ભૌતિક અને રાસાયણિક રીતે તોડીને માટી બનાવવામાં મદદ કરે છે, જે અન્ય વનસ્પતિઓ માટે અનુકૂળ વાતાવરણ તૈયાર કરે છે.", "options": ["A) અભિકથન (A) અને કારણ (R) બંને સાચાં છે, અને કારણ (R) એ અભિકથન (A)ની સાચી સમજૂતી છે.", "B) અભિકથન (A) અને કારણ (R) બંને સાચાં છે, પરંતુ કારણ (R) એ અભિકથન (A)ની સાચી સમજૂતી નથી.", "C) અભિકથન (A) સાચું છે, પરંતુ કારણ (R) ખોટું છે.", "D) અભિકથન (A) ખોટું છે, પરંતુ કારણ (R) સાચું છે."], "correct": 0, "explanation": "અભિકથન (A) અને કારણ (R) બંને સાચાં છે, અને કારણ (R) એ અભિકથન (A)ની સાચી સમજૂતી છે. લાઈકેન્સ ખડકો પર પ્રથમ વસાહત સ્થાપિત કરે છે અને ફંગી ભાગ ખડકોને તોડીને માટી બનાવવામાં મદદ કરે છે, જે અન્ય વનસ્પતિઓ માટે અનુકૂળ વાતાવરણ તૈયાર કરે છે (NCERT Class 11, Chapter 2: Biological Classification). આથી, કારણ (R) અભિકથન (A)ની યોગ્ય સમજૂતી છે.", "ncert_ref": "Class XI - અધ્યાય 2: જૈવિક વર્ગીકરણ - લાઈકેન્સ અને તેમનું પર્યાવરણીય મહત્વ", "difficulty": "Hard", "num": 98}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), maxScore=total*4, pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
