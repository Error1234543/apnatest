<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - સૃષ્ટિ ફૂગ (Kingdom Fungi)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
        .mt-10{margin-top:10px}
        .mb-10{margin-bottom:10px}
        .text-center{text-align:center}
        .text-sm{font-size:.9rem}
        .text-muted{color:#666}
        .badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:.75rem;font-weight:600}
        .badge-easy{background:#d1fae5;color:#065f46}
        .badge-medium{background:#fef3c7;color:#92400e}
        .badge-hard{background:#fee2e2;color:#991b1b}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 સૃષ્ટિ ફૂગ (Kingdom Fungi)</span>
                <span>🎯 Hard</span>
                <span>📝 92 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>

            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>

                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "જ્યારે ફૂગની કોષભિત્તિના ઘટકોની વાત આવે ત્યારે કયો પદાર્થ સેલ્યુલોઝની જગ્યાએ મુખ્ય ઘટક તરીકે જોવા મળે છે?", "options": ["A) કાઇટિન", "B) પેક્ટિન", "C) લિગ્નિન", "D) સુબેરિન"], "correct": 0, "explanation": "ફૂગની કોષભિત્તિ મુખ્યત્વે કાઇટિનના બનેલી હોય છે, જે પોલિસેકેરાઇડ પ્રકારનો પદાર્થ છે. સેલ્યુલોઝ વનસ્પતિ કોષભિત્તિનો મુખ્ય ઘટક છે, પેક્ટિન વનસ્પતિ કોષભિત્તિમાં મધ્યપટલમાં જોવા મળે છે, લિગ્નિન લાકડામાં જોવા મળે છે, અને સુબેરિન કોર્ક કોષની ભિત્તિમાં જોવા મળે છે.", "ncert_ref": "કક્ષા 11 - જીવવિજ્ઞાન - અધ્યાય 2: સજીવોની વિવિધતા અને વર્ગીકરણ - ફૂગ સૃષ્ટિ", "difficulty": "Hard", "num": 1}, {"question": "નીચેનામાંથી કયો ફૂગ એ સંપૂર્ણપણે પરોપજીવી નથી અને સપુષ્પી વનસ્પતિ સાથે સહજીવન સંબંધ ધરાવે છે?", "options": ["A) મ્યુકોર", "B) એગારિકસ", "C) ટ્રાયકોડર્મા", "D) પ્યુસીનિયા"], "correct": 2, "explanation": "ટ્રાયકોડર્મા ફૂગ સપુષ્પી વનસ્પતિની મૂળ સાથે સહજીવન સંબંધ ધરાવે છે અને માયકોરાઇઝા બનાવે છે, જે વનસ્પતિને પોષક તત્ત્વો શોષવામાં મદદ કરે છે. મ્યુકોર, એગારિકસ અને પ્યુસીનિયા પરોપજીવી અથવા મૃતોપજીવી ફૂગ છે.", "ncert_ref": "કક્ષા 11 - જીવવિજ્ઞાન - અધ્યાય 2: સજીવોની વિવિધતા અને વર્ગીકરણ - ફૂગ અને વનસ્પતિ વચ્ચેનો સંબંધ", "difficulty": "Hard", "num": 2}, {"question": "અભિકથન (A): ફૂગમાં શ્વસન ક્રિયા મુખ્યત્વે કોષકેન્દ્રીય શ્વસન દ્વારા થાય છે. કારણ (R): ફૂગમાં મિટોકોન્ડ્રિયા અનુપસ્થિત હોય છે.", "options": ["A) A અને R બંને સાચા છે અને R એ Aની સાચી સમજૂતી છે", "B) A અને R બંને સાચા છે પરંતુ R એ Aની સાચી સમજૂતી નથી", "C) A સાચું છે પરંતુ R ખોટું છે", "D) A ખોટું છે અને R સાચું છે"], "correct": 2, "explanation": "ફૂગમાં શ્વસન ક્રિયા મુખ્યત્વે કોષકેન્દ્રીય શ્વસન દ્વારા થાય છે (A સાચું છે), પરંતુ ફૂગમાં મિટોકોન્ડ્રિયા હાજર હોય છે (R ખોટું છે). મિટોકોન્ડ્રિયા શ્વસન માટે જરૂરી અંગિકા છે, પરંતુ ફૂગમાં કોષકેન્દ્રીય શ્વસન મુખ્ય હોવાનું કારણ એ છે કે તેમની ચયાપચય ક્રિયાઓ કોષકેન્દ્ર પર આધારિત હોય છે.", "ncert_ref": "કક્ષા 11 - જીવવિજ્ઞાન - અધ્યાય 2: સજીવોની વિવિધતા અને વર્ગીકરણ - ફૂગની શારીરિક રચના અને ક્રિયા", "difficulty": "Hard", "num": 3}, {"question": "નીચેનામાંથી કયા ફૂગમાં જનનાંગની રચના થતી નથી અને તે મુખ્યત્વે અલૈંગિક પ્રજનન દ્વારા પ્રજનન કરે છે?", "options": ["A) એસ્પર્જિલસ", "B) પેનિસિલિયમ", "C) રાઇઝોપસ", "D) યીસ્ટ"], "correct": 3, "explanation": "યીસ્ટ મુખ્યત્વે અલૈંગિક પ્રજનન (મુગ્ધીકરણ) દ્વારા પ્રજનન કરે છે અને તેનામાં જનનાંગની રચના થતી નથી. એસ્પર્જિલસ, પેનિસિલિયમ અને રાઇઝોપસમાં જનનાંગની રચના થાય છે અને તેઓ લૈંગિક પ્રજનન પણ કરે છે.", "ncert_ref": "કક્ષા 11 - જીવવિજ્ઞાન - અધ્યાય 2: સજીવોની વિવિધતા અને વર્ગીકરણ - ફૂગનું પ્રજનન", "difficulty": "Hard", "num": 4}, {"question": "ફૂગ અને વનસ્પતિ વચ્ચેના સહજીવન સંબંધને શું કહેવાય છે જ્યારે ફૂગ વનસ્પતિની મૂળ સાથે જોડાયેલો હોય છે અને પોષક તત્ત્વોનો આદાન-પ્રદાન કરે છે?", "options": ["A) પરોપજીવીતા", "B) મૃતોપજીવીતા", "C) માયકોરાઇઝા", "D) લાઇકેન"], "correct": 2, "explanation": "ફૂગ અને વનસ્પતિની મૂળ વચ્ચેનો સહજીવન સંબંધ માયકોરાઇઝા તરીકે ઓળખાય છે. પરોપજીવીતામાં ફૂગ પોષક તત્ત્વો લે છે પરંતુ વનસ્પતિને કોઈ લાભ થતો નથી, મૃતોપજીવીતામાં ફૂગ મૃત કચરો પર વૃદ્ધિ પામે છે, અને લાઇકેન ફૂગ અને શૈવાળ વચ્ચેનો સહજીવન સંબંધ છે.", "ncert_ref": "કક્ષા 11 - જીવવિજ્ઞાન - અધ્યાય 2: સજીવોની વિવિધતા અને વર્ગીકરણ - ફૂગ અને વનસ્પતિનો સહજીવન સંબંધ", "difficulty": "Hard", "num": 5}, {"question": "નીચેનામાંથી કયો ફૂગ એ લાઇકેન બનાવવામાં ભાગ લેતો નથી?", "options": ["A) એસ્કોમાયસીટ્સ", "B) બેસીડીઓમાયસીટ્સ", "C) ડ્યુટેરોમાયસીટ્સ", "D) ઝાયગોમાયસીટ્સ"], "correct": 3, "explanation": "લાઇકેન મુખ્યત્વે એસ્કોમાયસીટ્સ અથવા બેસીડીઓમાયસીટ્સ ફૂગ અને શૈવાળ અથવા સાયનોબેક્ટેરિયા વચ્ચેનો સહજીવન સંબંધ છે. ઝાયગોમાયસીટ્સ અને ડ્યુટેરોમાયસીટ્સ લાઇકેન બનાવતા નથી.", "ncert_ref": "કક્ષા 11 - જીવવિજ્ઞાન - અધ્યાય 2: સજીવોની વિવિધતા અને વર્ગીકરણ - લાઇકેન", "difficulty": "Hard", "num": 6}, {"question": "ફૂગની કોષરસમાં કયા પદાર્થનો સંગ્રહ થતો હોય છે જે કાર્બોદિતના સ્વરૂપમાં હોય છે?", "options": ["A) સ્ટાર્ચ", "B) ગ્લાયકોજન", "C) સેલ્યુલોઝ", "D) કાઇટિન"], "correct": 1, "explanation": "ફૂગની કોષરસમાં ગ્લાયકોજન નામનો કાર્બોદિત સંગ્રહ થતો હોય છે. સ્ટાર્ચ વનસ્પતિઓમાં, સેલ્યુલોઝ વનસ્પતિ કોષભિત્તિમાં, અને કાઇટિન ફૂગની કોષભિત્તિ ty": "Hard", "num": 49}, {"question": "નીચેના પૈકી કયો ફૂગ તેના જીવનચક્ર દરમિયાન ડિકેરિયોટિક તબક્કો ધરાવે છે પરંતુ લૈંગિક પ્રજનન દરમિયાન ગેમીટેંજિયાની રચના કરતો નથી?", "options": ["A) પેનિસિલિયમ (Penicillium)", "B) એગેરિકસ (Agaricus)", "C) રાઇઝોપસ (Rhizopus)", "D) યીસ્ટ (Saccharomyces)"], "correct": 1, "explanation": "સાચો જવાબ B) એગેરિકસ (Agaricus) છે. એગેરિકસ બસીડીઓમાયકોટા વર્ગનો ફૂગ છે, જેમાં ડિકેરિયોટિક તબક્કો (દ્વિકોષકેન્દ્રીય તબક્કો) જોવા મળે છે, પરંતુ લૈંગિક પ્રજનન દરમિયાન ગેમીટેંજિયાની રચના થતી નથી. તેના બદલે બસીડિયા દ્વારા બસીડિયોસ્પોર ઉત્પન્ન થાય છે. પેનિસિલિયમ (A) એસ્કોમાયકોટા વર્ગનો ફૂગ છે, જેમાં ગેમીટેંજિયાની રચના થાય છે. રાઇઝોપસ (C) ઝાયગોમાયકોટા વર્ગનો ફૂગ છે, જેમાં ગેમીટેંજિયાની રચના થાય છે અને ડિકેરિયોટિક તબક્કો હોતો નથી. યીસ્ટ (D) એસ્કોમાયકોટા વર્ગનો ફૂગ છે, જેમાં ગેમીટેંજિયાની રચના થતી નથી, પરંતુ તે ડિકેરિયોટિક તબક્કો પણ ધરાવતો નથી.", "ncert_ref": "Class XI - Chapter 2: જૈવિક વર્ગીકરણ - ફૂગનો વર્ગીકરણ અને લક્ષણો", "difficulty": "Hard", "num": 50}, {"question": "નીચેનામાંથી કયો ફૂગ એ તેના લૈંગિક પ્રજનન દરમિયાન ગેમીટેંજિયા રચના કરતો નથી?", "options": ["A) રાઈઝોપસ", "B) અસ્પરજિલસ", "C) પ્યુસિનિયા", "D) એગારિકસ"], "correct": 1, "explanation": "અસ્પરજિલસ ડ્યુટેરોમાયસીટી વર્ગનો ફૂગ છે અને તે લૈંગિક પ્રજનન દરમિયાન ગેમીટેંજિયા રચના કરતો નથી. રાઈઝોપસ, પ્યુસિનિયા અને એગારિકસ લૈંગિક પ્રજનન દરમિયાન ગેમીટેંજિયા રચના કરે છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 2: સજીવોની વિવિધતા અને વર્ગીકરણ - ફૂગ (Fungi)", "difficulty": "Hard", "num": 51}, {"question": "જ્યારે અલૈંગિક પ્રજનન દરમિયાન મ્યુકોરમાં સ્પોરેંજિયમની રચના થાય છે, ત્યારે નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) સ્પોરેંજિયમમાં હજારો સ્પોરો ઉત્પન્ન થાય છે જે મ્યુકોરના પ્રસરણમાં મદદ કરે છે.", "B) સ્પોરેંજિયમની રચના પહેલાં કોષકેન્દ્રીય વિભાજન દ્વારા બહુકોષીય રચના બને છે.", "C) સ્પોરેંજિયમમાં સ્પોરો એ ડિપ્લોઈડ હોય છે અને તે લૈંગિક પ્રજનનનું પરિણામ છે.", "D) સ્પોરેંજિયમની રચના અંતર્ગત વાતાવરણમાં થાય છે અને તે હવા દ્વારા ફેલાય છે."], "correct": 2, "explanation": "મ્યુકોરમાં સ્પોરેંજિયમ દ્વારા અલૈંગિક પ્ િસ થાય છે અને એસ્કોસ્પોર બને છે. વિકલ્પ B ખોટો છે કારણ કે એસ્કસ કોષમાં કેરિયોગેમી પહેલા કોષકેન્દ્ર હેપ્લોઈડ હોય છે, પરંતુ કેરિયોગેમી પછી તે ડિપ્લોઈડ બને છે. વિકલ્પ A, C, અને D સાચા છે કારણ કે તેઓ એસ્કસ કોષના જીવનચક્રને યોગ્ય રીતે વર્ણવે છે.", "ncert_ref": "કક્ષ 11 - પ્રકરણ 2: સજીવ જગતની વૈવિધ્યતા - ફૂગ (Fungi) અને તેમના વર્ગીકરણ", "difficulty": "Hard", "num": 79}, {"question": "નીચેના પૈકી કયો ફૂગ એ ડ્યુટેરોમાયસીટી વર્ગનો છે અને તેનો ઉપયોગ ટોફૂ ઉત્પાદનમાં થાય છે?", "options": ["A) મ્યુકોર", "B) એસ્પરજિલસ", "C) પેનિસિલિયમ", "D) રાઇઝોપસ"], "correct": 1, "explanation": "એસ્પરજિલસ ડ્યુટેરોમાયસીટી વર્ગનો ફૂગ છે અને તેનો ઉપયોગ ટોફૂ ઉત્પાદનમાં થાય છે. મ્યુકોર, પેનિસિલિયમ, અને રાઇઝોપસ અન્ય વર્ગના ફૂગ છે અને તેમનો ઉપયોગ ટોફૂ ઉત્પાદનમાં થતો નથી.", "ncert_ref": "કક્ષ 11 - પ્રકરણ 2: સજીવ જગતની વૈવિધ્યતા - ફૂગ (Fungi) અને તેમના વર્ગીકરણ", "difficulty": "Hard", "num": 80}, {"question": "નીચેના વિધાનો પૈકી કયું વિધાન ફૂગના વર્ગ ઝાયગોમાયસીટી (Zygomycetes) માટે ખોટું છે?", "options": ["A) આ વર્ગના ફૂગમાં હાયફી સામાન્ય રીતે અસપ્ટેટ અને બહુકોષકેન્દ્રીય હોય છે.", "B) લૈંગિક પ્રજનન દરમિયાન ઝાયગોસ્પોરની રચના થાય છે, જે ડિપ્લોઈડ હોય છે.", "C) અલૈંગિક પ્રજનન સ્પોરેંજિયોસ્પોર દ્વારા થાય છે, જે હેપ્લોઈડ હોય છે.", "D) આ વર્ગના ફૂગમાં લૈંગિક પ્રજનન દરમિયાન ગેમીટેંજિયાની રચના થાય છે, જે એકબીજા સાથે જોડાઈને ઝાયગોસ્પોરેંજિયમ બનાવે છે."], "correct": 3, "explanation": "વિકલ્પ D ખોટો છે કારણ કે ઝાયગોમાયસીટી વર્ગના ફૂગમાં લૈંગિક પ્રજનન દરમિયાન ગેમીટેંજિયાની રચના થતી નથી, પરંતુ બે હાયફીના પ્રોટોપ્લાઝમના જોડાણથી ઝાયગોસ્પોરેંજિયમ બને છે. વિકલ્પ A, B અને C સાચાં છે કારણ કે ઝાયગોમાયસીટીમાં હાયફી અસપ્ટેટ હોય છે, ઝાયગોસ્પોર ડિપ્લોઈડ હોય છે અને અલૈંગિક પ્રજનન સ્પોરેંજિયોસ્પોર દ્વારા થાય છે (NCERT Class 11, Chapter 2: Biological Classification).", "ncert_ref": "કક્ષા 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ - ફૂગનો વર્ગ ઝાયગોમાયસીટી", "difficulty": "Hard", "num": 81}, {"question": "નીચેના વિધાનો પૈકી કયું વિધાન ફૂગના વર્ગ ફાયકોમાયસીટી (Phycomycetes) માટે ખોટું છે?", "options": ["A) આ વર્ગના ફૂગમાં કોષભિત્તિ કાઇટિન ધરાવત ons": ["A) ડિકેરિયોટિક કોષમાં બે કોષકેન્દ્ર હોય છે", "B) ડિકેરિયોટિક તબક્કો એસ્કોમાયકોટા અને બસીડીઓમાયકોટા વર્ગના ફૂગમાં જોવા મળે છે", "C) ડિકેરિયોટિક કોષમાં એક જ કોષકેન્દ્ર હોય છે", "D) ડિકેરિયોટિક તબક્કો પ્લાઝ્મોગેમી પછી બનાવવામાં આવે છે"], "correct": 2, "explanation": "ડિકેરિયોટિક કોષમાં બે કોષકેન્દ્ર હોય છે, અને આ તબક્કો એસ્કોમાયકોટા અને બસીડીઓમાયકોટા વર્ગના ફૂગમાં જોવા મળે છે. ડિકેરિયોટિક તબક્કો પ્લાઝ્મોગેમી પછી બનાવવામાં આવે છે. ડિકેરિયોટિક કોષમાં એક જ કોષકેન્દ્ર હોવાનું વિધાન ખોટું છે.", "ncert_ref": "કક્ષ 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ - ફૂગના જીવનચક્રના તબક્કા", "difficulty": "Hard", "num": 85}, {"question": "નીચેનામાંથી કયો ફૂગ એ તેના જીવનચક્ર દરમિયાન ક્લેમ્પ કનેક્શન ધરાવે છે?", "options": ["A) રાઇઝોપસ", "B) પેનિસિલિયમ", "C) અગારિકસ", "D) એસ્પરજિલસ"], "correct": 2, "explanation": "અગારિકસ (બસીડીઓમાયકોટા)માં ક્લેમ્પ કનેક્શન જોવા મળે છે, જે ડિકેરિયોટિક હાયફીની કોષવિભાજન દરમિયાન રચાય છે. રાઇઝોપસ (ઝાયગોમાયસીટી)માં કોઈ ક્લેમ્પ કનેક્શન નથી, પેનિસિલિયમ અને એસ્પરજિલસ (બંને એસ્કોમાયકોટા)માં પણ ક્લેમ્પ કનેક્શન રચાતું નથી.", "ncert_ref": "કક્ષ 11 - અધ્યાય 2: જૈવિક વર્ગીકરણ - સૃષ્ટિ ફૂગ (Kingdom Fungi)", "difficulty": "Hard", "num": 86}, {"question": "અભિકથન (A): ઝાયગોમાયસીટી વર્ગના ફૂગમાં લૈંગિક પ્રજનન દરમિયાન ઝાયગોસ્પોર રચાય છે. કારણ (R): ઝાયગોસ્પોર એ ડિપ્લોઈડ અને સ્થૂળ ભિત્તિવાળો બીજાણુ છે.", "options": ["A) A અને R બંને સાચાં છે અને R એ Aની સાચી સમજૂતી છે.", "B) A અને R બંને સાચાં છે પરંતુ R એ Aની સાચી સમજૂતી નથી.", "C) A સાચું છે પરંતુ R ખોટું છે.", "D) A ખોટું છે પરંતુ R સાચું છે."], "correct": 1, "explanation": "અભિકથન (A) સાચું છે કારણ કે ઝાયગોમાયસીટીમાં લૈંગિક પ્રજનન દરમિયાન ઝાયગોસ્પોર રચાય છે. કારણ (R) પણ સાચું છે પરંતુ તે Aની સમજૂતી નથી, કારણ કે ઝાયગોસ્પોરની રચના એ લૈંગિક પ્રજનનનો પરિણામ છે, પરંતુ R એ તેની રચનાનું કારણ નથી.", "ncert_ref": "કક્ષ 11 - અધ્યાય 2: જૈવિક વર્ગીકરણ - સૃષ્ટિ ફૂગ (Kingdom Fungi)", "difficulty": "Hard", "num": 87}, {"question": "નીચેના વિધાનો પૈકી કેટલાં સાચાં છે? (i) એસ્કોમાયકોટા વર્ગના ફૂગમાં એસ્કોસ્પોર હેપ્લોઈડ હોય છે. (ii) બસીડીઓમા ્યુલોઝ અને કાઇટિનની બનેલી હોય છે."], "correct": 0, "explanation": "ફાયકોમાયસીટી વર્ગના ફૂગ સદા જલજ નથી હોતા, તેઓ સ્થળજ પણ હોઈ શકે છે. બાકીના વિધાનો સાચાં છે: તેમની હાયફી અસપ્ટેટ હોય છે, લૈંગિક પ્રજનન દરમિયાન ગેમીટેંજિયા રચાય છે, અને કોષભિત્તિ સેલ્યુલોઝ અને કાઇટિનની બનેલી હોય છે.", "ncert_ref": "કક્ષ 11 - અધ્યાય 2: જૈવિક વર્ગીકરણ - સૃષ્ટિ ફૂગ (Kingdom Fungi)", "difficulty": "Hard", "num": 91}, {"question": "નીચેના વિધાનો પૈકી કયું વિધાન ફૂગના વર્ગ બેસિડિયોમાયસીટીસ (Basidiomycetes) માટે સાચું નથી?", "options": ["A) આ વર્ગના ફૂગમાં બેસિડિયોસ્પોર લૈંગિક પ્રજનન દ્વારા ઉત્પન્ન થાય છે અને તે હેપ્લોઈડ હોય છે.", "B) બેસિડિયોમાયસીટીસ વર્ગના ફૂગમાં ડિકેરિયોટિક તબક્કો લાંબો હોય છે અને તે દરમિયાન કોષકેન્દ્રીય વિભાજન થાય છે.", "C) આ વર્ગના ફૂગમાં લૈંગિક પ્રજનન દરમિયાન ગેમીટેંજિયાની રચના થાય છે અને તેના દ્વારા બેસિડિયોસ્પોર ઉત્પન્ન થાય છે.", "D) બેસિડિયોમાયસીટીસ વર્ગના ફૂગમાં ક્લેમ્પ કનેક્શન જોવા મળે છે જે ડિકેરિયોટિક તબક્કાને જાળવવામાં મદદ કરે છે."], "correct": 2, "explanation": "વિકલ્પ C ખોટો છે કારણ કે બેસિડિયોમાયસીટીસ વર્ગના ફૂગમાં લૈંગિક પ્રજનન દરમિયાન ગેમીટેંજિયાની રચના થતી નથી. બેસિડિયોસ્પોર બેસિડિયમમાં કેરિયોગેમી અને મિયોસિસ દ્વારા ઉત્પન્ન થાય છે. વિકલ્પ A, B અને D સાચાં છે કારણ કે બેસિડિયોસ્પોર હેપ્લોઈડ હોય છે, ડિકેરિયોટિક તબક્કો લાંબો હોય છે અને ક્લેમ્પ કનેક્શન ડિકેરિયોટિક તબક્કાને જાળવવામાં મદદ કરે છે (NCERT Class 11, Chapter 2 - Biological Classification).", "ncert_ref": "Class XI - પ્રકરણ 2: જૈવિક વર્ગીકરણ - ફૂગનું વર્ગીકરણ અને લક્ષણો", "difficulty": "Hard", "num": 92}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), maxScore=total*4, pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
