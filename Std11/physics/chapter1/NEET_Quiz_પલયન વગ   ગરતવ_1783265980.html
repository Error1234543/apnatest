<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - પલાયન વેગ – ગુરુત્વાકર્ષણમાંથી બહાર નીકળવા માટે જરૂરી લઘુત્તમ વેગ.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 પલાયન વેગ – ગુરુત્વાકર્ષણમાંથી બહાર નીકળવા માટે જરૂરી લઘુત્તમ વેગ.</span>
                <span>🎯 Mixed</span>
                <span>📝 39 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "પૃથ્વીની સપાટી પરથી એક કણને અંતરિક્ષમાં મોકલવા માટે જરૂરી લઘુત્તમ વેગ કયો છે?", "options": ["A) પલાયન વેગ, જે પૃથ્વીના ગુરુત્વાકર્ષણ ક્ષેત્રમાંથી બહાર નીકળવા માટે પૂરતો હોય છે", "B) કક્ષીય વેગ, જે કણને પૃથ્વીની કક્ષામાં સ્થિર રાખે છે", "C) ટર્મિનલ વેગ, જે હવાના અવરોધને સંતુલિત કરે છે", "D) પ્રકાશનો વેગ, જે અંતરિક્ષમાં પ્રકાશની ગતિ જેટલો હોય છે"], "correct": 0, "explanation": "પલાયન વેગ એ પૃથ્વીના ગુરુત્વાકર્ષણ ક્ષેત્રમાંથી બહાર નીકળવા માટે જરૂરી લઘુત્તમ વેગ છે. કક્ષીય વેગ કણને કક્ષામાં રાખે છે પરંતુ બહાર નીકળવા માટે પૂરતો નથી. ટર્મિનલ વેગ હવાના અવરોધ સાથે સંબંધિત છે, જ્યારે પ્રકાશનો વેગ અંતરિક્ષમાં પ્રકાશની ગતિ છે, જે પલાયન વેગથી અલગ છે.", "ncert_ref": "Class XI - પ્રકરણ 8: ગતિના નિયમો", "difficulty": "Easy", "num": 1}, {"question": "પલાયન વેગનો સૂત્ર કયો છે, જ્યાં g = ગુરુત્વપ્રવેગ, R = પૃથ્વીની ત્રિજ્યા, અને M = પૃથ્વીનું દળ?", "options": ["A) √(2gR)", "B) √(gR)", "C) √(GM/R)", "D) √(2GM/R)"], "correct": 3, "explanation": "પલાયન વેગનો સૂત્ર √(2GM/R) છે, જ્યાં G ગુરુત્વાકર્ષણ અચળાંક, M પૃથ્વીનું દળ, અને R પૃથ્વીની ત્રિજ્યા છે. √(2gR) પણ યોગ્ય છે કારણ કે g = GM/R², પરંતુ પ્રશ્નમાં G, M, અને R આપેલ હોવાથી √(2GM/R) સીધો સૂત્ર છે. બાકીના વિકલ્પો અપૂર્ણ અથવા અશુદ્ધ છે.", "ncert_ref": "Class XI - પ્રકરણ 8: ગતિના નિયમો", "difficulty": "Medium", "num": 2}, {"question": "ચંદ્ર પર પલાયન વેગ પૃથ્વી કરતાં ઓછો છે. આનું કારણ શું છે?", "options": ["A) ચંદ્રનું દળ પૃથ્વી કરતાં ઓછું છે અને તેની ત્રિજ્યા પણ ઓછી છે", "B) ચંદ્ર પર ગુરુત્વપ્રવેગ પૃથ્વી કરતાં ઓછો છે", "C) ચંદ્ર પર હવા નથી, જેથી અવરોધ ઓછો છે", "D) ચંદ્ર પૃથ્વી કરતાં વધુ દૂર છે"], "correct": 1, "explanation": "પલાયન વેગ √(2GM/R) પર આધારિત છે. ચંદ્રનું દળ પૃથ્વી કરતાં ઓછું છે અને તેની ત્રિજ્યા પણ ઓછી છે, પરંતુ ગુરુત્વપ્રવેગ (g = GM/R²) ચંદ્ર પર પૃથ્વી કરતાં ઓછો છે, જે પલાયન વેગને ઓછો કરે છે. હવાનો અવરોધ પલાયન વેગ સાથે સંબંધિત નથી, અને ચંદ્રનું અંતર પૃથ્વીથી તેના પલાયન વેગને અસર કરતું નથી.", "ncert_ref": "Class XI - પ્રકરણ 8: ગતિના નિયમો", "difficulty": "Medium", "num": 3}, {"question": "એક રોકેટને પૃથ્વીની સપાટી પરથી લૉન્ચ કરવામાં આવે છે. જો રોકેટનો પ્રારંભિક વેગ પલાયન વેગ કરતાં ઓછો હોય, તો શું થશે?", "options": ["A) રોકેટ પૃથ્વીની કક્ષામાં પ્રવેશશે અને ત્યાં સ્થિર રહેશે", "B) રોકેટ પૃથ્વી પર પાછું પડશે", "C) રોકેટ અંતરિક્ષમાં જશે પરંતુ પૃથ્વીના ગુરુત્વાકર્ષણમાંથી બહાર નીકળશે નહીં", "D) રોકેટનો વેગ ધીમે ધીમે શૂન્ય થશે અને તે સ્થિર થઈ જશે"], "correct": 2, "explanation": "જો રોકેટનો પ્રારંભિક વેગ પલાયન વેગ કરતાં ઓછો હોય, તો તે પૃથ્વીના ગુરુત્વાકર્ષણ ક્ષેત્રમાંથી બહાર નીકળશે નહીં, પરંતુ તે અંતરિક્ષમાં જશે અને પૃથ્વીની કક્ષામાં પ્રવેશશે. તે પૃથ્વી પર પાછું પડશે નહીં અથવા સ્થિર થશે નહીં. કક્ષીય વેગ (√(GM/R)) અને પલાયન વેગ (√(2GM/R)) વચ્ચેનો વેગ કક્ષામાં રહેવા માટે પૂરતો છે.", "ncert_ref": "Class XI - પ્રકરણ 8: ગતિના નિયમો", "difficulty": "Hard", "num": 4}, {"question": "નીચેનામાંથી કયું વિધાન પલાયન વેગ વિશે સાચું નથી?", "options": ["A) પલાયન વેગ પદાર્થના દળ પર આધારિત નથી", "B) પલાયન વેગ ગ્રહના દળ અને ત્રિજ્યા પર આધારિત છે", "C) પલાયન વેગ ગ્રહની સપાટી પરથી લૉન્ચ થતાં પદાર્થના આકાર પર આધારિત છે", "D) પલાયન વેગ ગુરુત્વાકર્ષણ અચળાંક પર આધારિત છે"], "correct": 2, "explanation": "પલાયન વેગ પદાર્થના દળ અથવા આકાર પર આધારિત નથી. તે ફક્ત ગ્રહના દળ (M), ત્રિજ્યા (R), અને ગુરુત્વાકર્ષણ અચળાંક (G) પર આધારિત છે. સૂત્ર √(2GM/R) દર્શાવે છે કે પલાયન વેગ પદાર્થના દળ અથવા આકારથી સ્વતંત્ર છે.", "ncert_ref": "Class XI - પ્રકરણ 8: ગતિના નિયમો", "difficulty": "Medium", "num": 5}, {"question": "પલાયન વેગની કિંમત નીચેનામાંથી કયા પરિબળ પર આધાર રાખતી નથી?", "options": ["A) ગ્રહનો દળ", "B) ગ્રહની ત્રિજ્યા", "C) ગ્રહનો ઘનતા", "D) ગ્રહની સપાટી પર ગુરુત્વપ્રવેગ"], "correct": 2, "explanation": "પલાયન વેગનો સૂત્ર v_e = √(2gR) છે, જ્યાં g ગુરુત્વપ્રવેગ અને R ત્રિજ્યા છે. g અને R બંને ગ્રહના દળ (M) પર આધાર રાખે છે (g = GM/R²). પરંતુ ઘનતા (ρ = M/V) સીધો પરિબળ નથી, કારણ કે વોલ્યુમ (V) અને ત્રિજ્યા (R) વચ્ચેનો સંબંધ (V = 4/3πR³) સૂત્રમાં સમાવિષ્ટ નથી. આથી ઘનતા પર આધાર રાખતો નથી. A, B, D સીધા સૂત્રમાં સમાવિષ્ટ છે.", "ncert_ref": "Class XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Medium", "num": 6}, {"question": "જો પૃથ્વીનો દળ અચળ રાખીને તેની ત્રિજ્યા અડધી કરવામાં આવે, તો પલાયન વેગ પર શું અસર થશે?", "options": ["A) પલાયન વેગ અડધો થશે", "B) પલાયન વેગ બમણો થશે", "C) પલાયન વેગ √2 ગણો વધશે", "D) પલાયન વેગ અચળ રહેશે"], "correct": 2, "explanation": "પલાયન વેગ v_e = √(2GM/R) છે. જો R અડધો થાય (R' = R/2), તો નવો પલાયન વેગ v_e' = √(2GM/(R/2)) = √(4GM/R) = √2 * √(2GM/R) = √2 * v_e થશે. આથી પલાયન વેગ √2 ગણો વધશે. A, B, D ગણિતી રીતે ખોટા છે.", "ncert_ref": "Class XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Hard", "num": 7}, {"question": "નીચેનામાંથી કયો ગ્રહ પૃથ્વી કરતાં ઓછો પલાયન વેગ ધરાવે છે? (પૃથ્વીનો પલાયન વેગ ≈ 11.2 km/s)", "options": ["A) શુક્ર", "B) મંગળ", "C) બૃહસ્પતિ", "D) શનિ"], "correct": 1, "explanation": "પલાયન વેગ ગ્રહના દળ અને ત્રિજ્યા પર આધાર રાખે છે. શુક્ર અને પૃથ્વીના દળ/ત્રિજ્યા અનુક્રમે સમાન છે, પરંતુ શુક્રનો પલાયન વેગ પૃથ્વી કરતાં થોડો ઓછો છે (~10.4 km/s). મંગળનો દળ અને ત્રિજ્યા પૃથ્વી કરતાં ઓછા હોવાથી તેનો પલાયન વેગ પણ ઓછો છે (~5.0 km/s). બૃહસ્પતિ અને શનિનો દળ ખૂબ જ વધારે હોવાથી તેમનો પલાયન વેગ પૃથ્વી કરતાં વધારે છે (બૃહસ્પતિ: ~59.5 km/s, શનિ: ~35.5 km/s). આથી સાચો જવાબ મંગળ છે.", "ncert_ref": "Class XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Medium", "num": 8}, {"question": "નીચેનામાંથી કયું વિધાન પલાયન વેગ અને કક્ષીય વેગ વચ્ચેના સંબંધ વિશે સાચું છે?", "options": ["A) કક્ષીય વેગ પલાયન વેગ કરતાં બમણો હોય છે", "B) પલાયન વેગ કક્ષીય વેગ કરતાં √2 ગણો હોય છે", "C) કક્ષીય વેગ અને પલાયન વેગ સમાન હોય છે", "D) પલાયન વેગ કક્ષીય વેગ કરતાં અડધો હોય છે"], "correct": 1, "explanation": "કક્ષીય વેગ (v_o) માટેનો સૂત્ર v_o = √(gR) છે, જ્યારે પલાયન વેગ (v_e) માટેનો સૂત્ર v_e = √(2gR) છે. આથી v_e = √2 * v_o. આમ, પલાયન વેગ કક્ષીય વેગ કરતાં √2 ગણો હોય છે. A, C, D ગણિતી રીતે ખોટા છે.", "ncert_ref": "Class XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Medium", "num": 9}, {"question": "એક ગ્રહની સપાટી પરથી એક કણને અંતરિક્ષમાં મોકલવા માટે જરૂરી લઘુત્તમ વેગ (પલાયન વેગ) તેના દળ અને ત્રિજ્યાના આધારે નક્કી થાય છે. જો બે ગ્રહોની ત્રિજ્યા સરખી હોય પરંતુ ગ્રહ Aનો દળ ગ્રહ B કરતાં ચાર ગણો હોય, તો ગ્રહ Aનો પલાયન વેગ ગ્રહ Bના પલાયન વેગ કરતાં કેટલો ગણો હશે?", "options": ["A) 1 ગણો", "B) 2 ગણો", "C) 4 ગણો", "D) √2 ગણો"], "correct": 1, "explanation": "પલાયન વેગનો સૂત્ર છે v = √(2GM/R), જ્યાં G = ગુરુત્વાકર્ષણ અચળાંક, M = ગ્રહનો દળ, R = ગ્રહની ત્રિજ્યા. અહીં, ગ્રહ Aનો દળ (M_A) ગ્રહ Bના દળ (M_B) કરતાં ચાર ગણો છે, જ્યારે ત્રિજ્યા (R) સરખી છે. આથી, v_A / v_B = √(M_A / M_B) = √(4/1) = 2. આમ, ગ્રહ Aનો પલાયન વેગ ગ્રહ B કરતાં 2 ગણો હશે. વિકલ્પ A (1 ગણો) ખોટો છે કારણ કે દળ ચાર ગણો હોવા છતાં પલાયન વેગ ચાર ગણો નથી. વિકલ્પ C (4 ગણો) ખોટો છે કારણ કે પલાયન વેગ દળના વર્ગમૂળ પર આધાર રાખે છે, ન કે દળ પર. વિકલ્પ D (√2 ગણો) ખોટો છે કારણ કે દળનો ગુણોત્તર 4 છે, ન કે 2.", "ncert_ref": "Class XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Medium", "num": 10}, {"question": "એક ગ્રહની સપાટી પરથી પલાયન વેગનું મૂલ્ય 11.2 km/s છે. જો આ ગ્રહનું દળ તેના વર્તમાન દળ કરતાં ચાર ગણું કરવામાં આવે અને ત્રિજ્યા અડધી કરવામાં આવે, તો નવો પલાયન વેગ કેટલો થશે?", "options": ["A) 22.4 km/s", "B) 11.2 km/s", "C) 44.8 km/s", "D) 5.6 km/s"], "correct": 0, "explanation": "પલાયન વેગનું સૂત્ર v = √(2GM/R) છે, જ્યાં M ગ્રહનું દળ અને R તેની ત્રિજ્યા છે. જો દળ ચાર ગણું (4M) અને ત્રિજ્યા અડધી (R/2) થાય, તો નવો પલાયન વેગ v' = √(2G(4M)/(R/2)) = √(16GM/R) = 4√(2GM/R) = 4v થશે. મૂળ પલાયન વેગ 11.2 km/s હોવાથી નવો વેગ 4 × 11.2 = 44.8 km/s થશે. અન્ય વિકલ્પો ગાણિતિક ગણતરીને અનુરૂપ નથી.", "ncert_ref": "ક્લાસ 11 - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Hard", "num": 11}, {"question": "એક અવકાશયાનને પૃથ્વીની સપાટીથી અમુક ઊંચાઈએથી લૉન્ચ કરવામાં આવે છે. જો આ ઊંચાઈ પૃથ્વીની ત્રિજ્યા જેટલી હોય, તો પલાયન વેગનું મૂલ્ય પૃથ્વીની સપાટી પરના પલાયન વેગ કરતાં કેટલું હશે?", "options": ["A) √2 ગણો", "B) અડધો", "C) 1/√2 ગણો", "D) બમણો"], "correct": 2, "explanation": "પલાયન વેગનું સૂત્ર v = √(2GM/R) છે. જો અવકાશયાન પૃથ્વીની સપાટીથી R ઊંચાઈએ હોય, તો તેનું અંતર પૃથ્વીના કેન્દ્રથી 2R થશે. આથી નવો પલાયન વેગ v' = √(2GM/2R) = √(GM/R) = v/√2 થશે. આથી પલાયન વેગ મૂળ મૂલ્ય કરતાં 1/√2 ગણો થશે. અન્ય વિકલ્પો ગાણિતિક સ ુત્વીય સ્થિતિમાન ઊર્જાના વ્યસ્ત પ્રમાણમાં હોય છે", "C) પલાયન વેગ ગુરુત્વીય સ્થિતિમાન ઊર્જાના સમપ્રમાણમાં હોય છે", "D) પલાયન વેગ ગુરુત્વીય સ્થિતિમાન ઊર્જાના વર્ગના સમપ્રમાણમાં હોય છે"], "correct": 0, "explanation": "પલાયન વેગનું સૂત્ર v = √(2GM/R) છે, જ્યારે ગુરુત્વીય સ્થિતિમાન ઊર્જા U = -GMm/R છે. આથી, પલાયન વેગ ગુરુત્વીય સ્થિતિમાન ઊર્જાના વર્ગમૂળના સમપ્રમાણમાં હોય છે (v ∝ √|U|). વિકલ્પ B, C અને D ખોટા છે કારણ કે તેઓ પલાયન વેગ અને ગુરુત્વીય સ્થિતિમાન ઊર્જા વચ્ચેના સંબંધને યોગ્ય રીતે દર્શાવતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Hard", "num": 21}, {"question": "એક અવકાશયાનને પૃથ્વીની સપાટીથી h ઊંચાઈએથી લૉન્ચ કરવામાં આવે છે. જો પૃથ્વીની ત્રિજ્યા R હોય, તો આ અવકાશયાન માટે પલાયન વેગનું સૂત્ર કયું હશે?", "options": ["A) v = √(2GM/R)", "B) v = √(2GM/(R+h))", "C) v = √(2GMh/R²)", "D) v = √(2GM/(R+h)) × (R/(R+h))"], "correct": 1, "explanation": "પલાયન વેગનું સૂત્ર v = √(2GM/r) છે, જ્યાં r એ ગ્રહના કેન્દ્રથી અવકાશયાનનું અંતર છે. જો અવકાશયાન પૃથ્વીની સપાટીથી h ઊંચાઈએ હોય, તો r = R + h થશે. આથી, પલાયન વેગ v = √(2GM/(R+h)) થશે. વિકલ્પ A ખોટો છે કારણ કે તે ફક્ત સપાટી પરના પલાયન વેગનું સૂત્ર દર્શાવે છે. વિકલ્પ C અને D ખોટા છે કારણ કે તેઓ સૂત્રમાં અયોગ્ય ફેરફારો દર્શાવે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Medium", "num": 22}, {"question": "પૃથ્વીની સપાટી પરથી એક પદાર્થને પલાયન વેગથી ફેંકવામાં આવે છે. જો પૃથ્વીનો દળ M અને ત્રિજ્યા R હોય, તો પલાયન વેગનો સૂત્ર કયો હશે?", "options": ["A) √(GM/R)", "B) √(2GM/R)", "C) √(GM/2R)", "D) √(4GM/R)"], "correct": 1, "explanation": "પલાયન વેગનો સૂત્ર √(2GM/R) છે, જ્યાં G ગુરુત્વાકર્ષણનો અચળાંક, M પૃથ્વીનો દળ અને R પૃથ્વીની ત્રિજ્યા છે. આ સૂત્ર પદાર્થને ગુરુત્વાકર્ષણના ક્ષેત્રમાંથી બહાર કાઢવા માટે જરૂરી લઘુત્તમ વેગ દર્શાવે છે. વિકલ્પ A, C, અને D અપૂર્ણ અથવા અશુદ્ધ સૂત્રો છે.", "ncert_ref": "Class XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Easy", "num": 23}, {"question": "ચંદ્ર પર પલાયન વેગ પૃથ્વી કરતાં ઓછો છે. આનું મુખ્ય કારણ કયું છે?", "options": ["A) ચંદ્રનો દળ પૃથ્વી કરતાં ઓછો છે અને ત્રિજ્યા પણ ઓછી છે.", "B) ચંદ્રનો દળ પૃથ્વી કરતાં ઓછો છે પરંતુ ત્રિજ્યા વધુ છે.", "C) ચંદ્રનો દળ અને ત્રિજ્યા બંને પૃથ્વી કરતાં ઓછા છે, પરંતુ દળનો પ્રભાવ વધુ છે.", "D) ચંદ્ર પર ગુરુત્વપ્રવેગ પૃથ્વી કરતાં ઓછો છે, પરંતુ ત્રિજ્યા સમાન છે."], "correct": 0, "explanation": "પલાયન વેગ √(2GM/R) પર આધાર રાખે છે. ચંદ્રનો દળ (M) પૃથ્વી કરતાં ઓછો છે અને ત્રિજ્યા (R) પણ ઓછી છે, પરંતુ દળનો પ્રભાવ ત્રિજ્યા કરતાં વધુ મહત્વનો છે, જેથી પલાયન વેગ ઓછો થાય છે. વિકલ્પ B, C, અને D અશુદ્ધ અથવા અપૂર્ણ કારણો છે.", "ncert_ref": "Class XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Medium", "num": 24}, {"question": "એક અવકાશયાનને પૃથ્વીની સપાટીથી 1600 km ઊંચાઈએથી લૉન્ચ કરવામાં આવે છે. જો પૃથ્વીની ત્રિજ્યા R અને પલાયન વેગ v_e હોય, તો આ ઊંચાઈએથી પલાયન વેગ કેટલો હશે? (ધારો કે પૃથ્વીનો દળ M અને ગુરુત્વાકર્ષણ અચળ G છે)", "options": ["A) v_e * sqrt(R / (R + 1600))", "B) v_e * sqrt((R + 1600) / R)", "C) v_e * (R / (R + 1600))", "D) v_e * ((R + 1600) / R)"], "correct": 0, "explanation": "પલાયન વેગનો સૂત્ર v_e = sqrt(2GM/R) છે. જ્યારે અવકાશયાનને h ઊંચાઈએથી લૉન્ચ કરવામાં આવે છે, ત્યારે નવો પલાયન વેગ v_e' = sqrt(2GM/(R + h)) થાય છે. આને v_eના પદમાં લખીએ તો v_e' = v_e * sqrt(R / (R + h)). અહીં h = 1600 km, તેથી v_e' = v_e * sqrt(R / (R + 1600)). વિકલ્પ A સાચો છે. વિકલ્પ B, C, અને D ગણિતીય રીતે અયોગ્ય છે કારણ કે તેઓ સૂત્રના ગલત વ્યુત્પન્નને દર્શાવે છે.", "ncert_ref": "Class XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Hard", "num": 25}, {"question": "એક ગ્રહની સપાટી પરથી પલાયન વેગનું મૂલ્ય vₑ છે. જો આ ગ્રહનું દળ અચળ રાખીને તેની ત્રિજ્યા બમણી કરવામાં આવે, તો નવો પલાયન વેગ કેટલો થશે?", "options": ["A) vₑ/√2", "B) vₑ/2", "C) √2 vₑ", "D) 2vₑ"], "correct": 0, "explanation": "પલાયન વેગનું સૂત્ર vₑ = √(2GM/R) છે, જ્યાં G = ગુરુત્વાકર્ષણનો સાર્વત્રિક અચળાંક, M = ગ્રહનું દળ, R = ગ્રહની ત્રિજ્યા. જો ત્રિજ્યા બમણી કરવામાં આવે (R' = 2R), તો નવો પલાયન વેગ vₑ' = √(2GM/2R) = √(GM/R) = vₑ/√2 થશે. બાકીના વિકલ્પો સૂત્રના ખોટા અમલીકરણ પર આધારિત છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Medium", "num": 26}, {"question": "નીચેનામાંથી કયું વિધાન પલાયન વેગ અને ગતિ ઊર્જા વચ્ચેના સંબંધ વિશે સાચું છે?", "options": ["A) પલાયન વેગથી ફેંકાયેલા પદાર્થની ગતિ ઊર્જા તેની ગુરુત્વીય સ્થિતિમાન ઊર્જા કરતાં અડધી હોય છે.", "B) પલાયન વેગથી ફેંકાયેલા પદાર્થની કુલ યાંત્રિક ઊર્જા શૂન્ય હોય છે.", "C) પલાયન વેગથી ફેંકાયેલા પદાર્થની ગતિ ઊર્જા તેની ગુરુત્વીય સ્થિતિમાન ઊર્જા કરતાં બમણી હોય છે.", "D) પલાયન વેગથી ફેંકાયેલા પદાર્થની ગતિ ઊર્જા અને ગુરુત્વીય સ્થિતિમાન ઊર્જા સમાન હોય છે."], "correct": 1, "explanation": "પલાયન વેગની વ્યાખ્યા મુજબ, પદાર્થની કુલ યાંત્રિક ઊર્જા (ગતિ ઊર્જા + ગુરુત્વીય સ્થિતિમાન ઊર્જા) શૂન્ય હોવી જોઈએ. ગતિ ઊર્જા (½mvₑ²) અને ગુરુત્વીય સ્થિતિમાન ઊર્જા (-GMm/R) સમાન મૂલ્ય ધરાવે છે પરંતુ વિરુદ્ધ ચિહ્ન ધરાવે છે, તેથી તેમનો સરવાળો શૂન્ય થાય છે. બાકીના વિકલ્પો ઊર્જાના ખોટા સંબંધો દર્શાવે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Medium", "num": 27}, {"question": "નીચેનામાંથી કયું વિધાન પલાયન વેગના સંદર્ભમાં ખોટું છે?", "options": ["A) પલાયન વેગ ગ્રહના દળ પર આધાર રાખે છે.", "B) પલાયન વેગ ગ્રહની ત્રિજ્યા પર આધાર રાખે છે.", "C) પલાયન વેગ ફેંકવામાં આવતા પદાર્થના દળ પર આધાર રાખે છે.", "D) પલાયન વેગ ગ્રહના ગુરુત્વપ્રવેગ પર આધાર રાખે છે."], "correct": 2, "explanation": "પલાયન વેગનું સૂત્ર vₑ = √(2GM/R) છે, જે દર્શાવે છે કે તે ગ્રહના દળ (M), ત્રિજ્યા (R) અને ગુરુત્વાકર્ષણના સાર્વત્રિક અચળાંક (G) પર આધાર રાખે છે, પરંતુ ફેંકવામાં આવતા પદાર્થના દળ (m) પર આધાર રાખતો નથી. વિકલ્પ C ખોટું છે કારણ કે પલાયન વેગ પદાર્થના દળથી સ્વતંત્ર છે. બાકીના વિકલ્પો સાચા છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Easy", "num": 28}, {"question": "એક અવકાશયાનને પૃથ્વીની સપાટીથી 3200 km ઊંચાઈએથી લૉન્ચ કરવામાં આવે છે. જો પૃથ્વીની ત્રિજ્યા R અને પલાયન વેગ v_e હોય, તો આ ઊંચાઈએથી જરૂરી પલાયન વેગ કેટલો હશે?", "options": ["A) v_e / √2", "B) v_e * √(2/3)", "C) v_e * √(R / (R + 3200))", "D) v_e * √(R / (R + 6400))"], "correct": 2, "explanation": "પલાયન વેગનો સૂત્ર v_e = √(2gR) છે, જ્યાં g = GM/R². ઊંચાઈ h પર પલાયન વેગ v_e' = √(2g'(R + h)) = √(2GM/(R + h)) = √(2gR²/(R + h)) = v_e * √(R / (R + h)). અહીં h = 3200 km અને R ≈ 6400 km, તેથી v_e' = v_e * √(6400 / (6400 + 3200)) = v_e * √(2/3). પરંતુ વિકલ્પ Bમાં √(2/3) આપેલ છે, જે ચોક્કસ ગણતરી નથી. વિકલ્પ C સીધો સૂત્રનો ઉપયોગ કરે છે અને સાચો છે. વિકલ્પ A, B, અને D ગણતરીની દ્રષ્ટિએ અયોગ્ય છે.", "ncert_ref": "Class XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Hard", "num": 29}, {"question": "એક ગ્રહની સપાટી પરથી એક પદાર્થને પલાયન વેગ કરતાં ઓછા વેગથી ફેંકવામાં આવે છે. જો પદાર્થની કુલ યાંત્રિક ઊર્જા શૂન્ય કરતાં વધુ હોય, તો પદાર્થનું શું થશે?", "options": ["A) પદાર્થ ગ્રહની આસપાસ કક્ષામાં પરિભ્રમણ કરશે", "B) પદાર્થ ગ્રહની સપાટી પર પાછો પડશે", "C) પદાર્થ ગ્રહના ગુરુત્વાકર્ષણ ક્ષેત્રમાંથી સંપૂર્ણપણે બહાર નીકળી જશે", "D) પદાર્થ ગ્રહની આસપાસ અંડાકાર કક્ષામાં પરિભ્રમણ કરશે"], "correct": 3, "explanation": "પલાયન વેગ એ લઘુત્તમ વેગ છે જેના દ્વારા પદાર્થની કુલ યાંત્રિક ઊર્જા (ગતિ ઊર્જા + ગુરુત્વીય સ્થિતિમાન ઊર્જા) શૂન્ય થાય છે. જો પદાર્થને પલાયન વેગ કરતાં ઓછા વેગથી ફેંકવામાં આવે, તો તેની કુલ યાંત્રિક ઊર્જા ઋણ થશે અને પદાર્થ ગ્રહના ગુરુત્વાકર્ષણ ક્ષેત્રમાં જ રહેશે. પરંતુ જો કુલ યાંત્રિક ઊર્જા શૂન્ય કરતાં વધુ હોય (જે પલાયન વેગ કરતાં વધુ વેગ માટે જ શક્ય છે), તો પદાર્થ ગ્રહના ગુરુત્વાકર્ષણમાંથી સંપૂર્ણપણે બહાર નીકળી જશે. અહીં પ્રશ્નમાં પલાયન વેગ કરતાં ઓછા વેગની વાત છે, પરંતુ કુલ યાંત્રિક ઊર્જા શૂન્ય કરતાં વધુ હોવાનું કહ્યું છે, જે વિરોધાભાસી છે. તેથી આ પરિસ્થિતિ શક્ય નથી, પરંતુ જો કોઈ કારણસર કુલ યાંત્રિક ઊર્જા શૂન્ય કરતાં વધુ હોય, તો પદાર્થ બહાર નીકળી જશે. આથી વિકલ્પ D સાચો છે કારણ કે પદાર્થ અંડાકાર કક્ષામાં પરિભ્રમણ કરશે નહીં, પરંતુ જો ઊર્જા શૂન્ય કરતાં વધુ હોય તો બહાર નીકળી જશે. બાકીના વિકલ્પો ખોટા છે કારણ કે: A) કક્ષામાં પરિભ્રમણ માટે ચોક્કસ વેગ જરૂરી છે, જે પલાયન વેગ કરતાં ઓછો હોય તો શક્ય નથી. B) પદાર્થ પાછો પડે તે માટે કુલ ઊર્જા ઋણ હોવી જોઈએ. C) પલાયન વેગ કરતાં ઓછા વેગ માટે પદાર્થ બહાર નીકળી શકે નહીં.", "ncert_ref": "Class XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Hard", "num": 30}, {"question": "એક ગ્રહની સપાટી પરથી એક પદાર્થને પલાયન વેગ કરતાં અડધા વેગથી ઉપર તરફ ફેંકવામાં આવે છે. જો ગ્રહનું ગુરુત્વક્ષેત્ર અવકાશમાં અનંત અંતર સુધી વિસ્તરેલું હોય, તો પદાર્થની મહત્તમ ઊંચાઈ કેટલી હશે? (ગ્રહની ત્રિજ્યા = R)", "options": ["A) R/3", "B) R/2", "C) R", "D) અનંત અંતર સુધી જશે નહીં"], "correct": 0, "explanation": "પલાયન વેગ vₑ = √(2gR). અહીં આપેલ વેગ v = vₑ/2 = √(2gR)/2. પદાર્થની કુલ યાંત્રિક ઊર્જા = ગતિ ઊર્જા + સ્થિતિ ઊર્જા = ½mv² - GMm/R. પલાયન વેગ માટે કુલ ઊર્જા શૂન્ય થાય છે, પરંતુ અહીં વેગ અડધો હોવાથી કુલ ઊર્જા ઋણ થશે. મહત્તમ ઊંચાઈએ ગતિ ઊર્જા શૂન્ય થશે, તેથી -GMm/(R+h) = ½m(vₑ/2)² - GMm/R. આ સમીકરણ ઉકેલતાં h = R/3 મળે છે. અન્ય વિકલ્પો: R/2 અને R માટે ઊર્જા સંતુલન સાચું નથી, અને અનંત અંતર માટે વેગ પૂરતો નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Hard", "num": 31}, {"question": "નીચેનામાંથી કયું વિધાન પલાયન વેગ અને ગ્રહના વાતાવરણીય સ્તરની જાળવણી વચ્ચેના સંબંધ વિશે સાચું છે?", "options": ["A) પલાયન વેગ જેટલો વધારે, તેટલું ગ્રહનું વાતાવરણ ગાઢ રહે છે", "B) પલાયન વેગ જેટલો ઓછો, તેટલું ગ્રહનું વાતાવરણ ગાઢ રહે છે", "C) પલાયન વેગ અને વાતાવરણની ઘનતા વચ્ચે કોઈ સંબંધ નથી", "D) માત્ર ગ્રહનું તાપમાન જ વાતાવરણની ઘનતા નક્કી કરે છે"], "correct": 0, "explanation": "પલાયન વેગ વધારે હોવાથી ગ્રહના ગુરુત્વાકર્ષણ બળ વધારે હોય છે, જે વાતાવરણના વાયુઓને પકડી રાખવામાં મદદ કરે છે. તેથી વધારે પલાયન વેગ ધરાવતા ગ્રહોનું વાતાવરણ ગાઢ રહે છે. અન્ય વિકલ્પો: ઓછો પલાયન વેગ ધરાવતા ગ્રહોનું વાતાવરણ પાતળું હોય છે, માત્ર તાપમાન જ નહીં પરંતુ ગુરુત્વાકર્ષણ પણ વાતાવરણની ઘનતા નક્કી કરે છે, અને પલાયન વેગ અને વાતાવરણ વચ્ચે સંબંધ છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Medium", "num": 32}, {"question": "એક ગ્રહની સપાટી પરથી એક પદાર્થને પલાયન વેગ કરતાં ઓછા વેગથી ઉપર તરફ ફેંકવામાં આવે છે. આ પદાર્થ માટે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) પદાર્થ અનંત અંતર સુધી પહોંચશે, પરંતુ તેની ગતિ ઊર્જા શૂન્ય થશે નહીં.", "B) પદાર્થ મહત્તમ ઊંચાઈએ પહોંચીને પાછો ગ્રહની સપાટી પર પડશે.", "C) પદાર્થ ગ્રહના ગુરુત્વાકર્ષણ ક્ષેત્રમાંથી કાયમ માટે બહાર નીકળી જશે.", "D) પદાર્થ ગ્રહની આસપાસ કક્ષામાં પરિભ્રમણ કરવાનું શરૂ કરશે."], "cor         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
