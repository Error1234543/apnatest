<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - સદિશ અને અદિશ રાશિઓ – દિશાવાળી અને દિશા વગરની રાશિઓ.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 સદિશ અને અદિશ રાશિઓ – દિશાવાળી અને દિશા વગરની રાશિઓ.</span>
                <span>🎯 Mixed</span>
                <span>📝 50 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "એક વિદ્યાર્થી 5 કિમી પૂર્વ દિશામાં અને પછી 5 કિમી ઉત્તર દિશામાં ચાલે છે. તેનું સ્થાનાંતર કેટલું હશે?", "options": ["A) 10 કિમી", "B) 5√2 કિમી", "C) 0 કિમી", "D) 5 કિમી"], "correct": 1, "explanation": "સ્થાનાંતર એ અંતિમ સ્થાન અને પ્રારંભિક સ્થાન વચ્ચેનું સીધું અંતર છે. અહીં વિદ્યાર્થી પૂર્વ અને ઉત્તર દિશામાં સમાન અંતર ચાલે છે, જે કાટકોણ ત્રિકોણ બનાવે છે. પાયથાગોરસ પ્રમેય અનુસાર સ્થાનાંતર = √(5² + 5²) = √50 = 5√2 કિમી. વિકલ્પ A ખોટો છે કારણ કે તે માત્ર અંતરનો સરવાળો છે, સ્થાનાંતર નહીં. વિકલ્પ C ખોટો છે કારણ કે સ્થાનાંતર શૂન્ય નથી. વિકલ્પ D ખોટો છે કારણ કે તે માત્ર એક દિશામાંનું અંતર છે.", "ncert_ref": "કક્ષા XI - પ્રકરણ 4: ગતિના નિયમો", "difficulty": "Easy", "num": 1}, {"question": "નીચેનામાંથી કયું વિધાન અદિશ રાશિ માટે ખોટું છે?", "options": ["A) અદિશ રાશિને માત્ર મૂલ્ય હોય છે, દિશા નહીં", "B) અદિશ રાશિઓનું સરવાળો સામાન્ય બીજગણિતના નિયમો અનુસાર થાય છે", "C) અદિશ રાશિઓને દર્શાવવા માટે દિશા જરૂરી છે", "D) તાપમાન અને સમય અદિશ રાશિઓ છે"], "correct": 2, "explanation": "અદિશ રાશિઓને દિશાની જરૂર હોતી નથી, માત્ર મૂલ્ય જ પૂરતું છે. તેથી વિકલ્પ C ખોટું છે. વિકલ્પ A, B અને D સાચાં છે કારણ કે અદિશ રાશિઓ માત્ર મૂલ્ય ધરાવે છે, તેમનું સરવાળો સામાન્ય બીજગણિત પ્રમાણે થાય છે, અને તાપમાન તથા સમય અદિશ રાશિઓ છે.", "ncert_ref": "કક્ષા XI - પ્રકરણ 4: ગતિના નિયમો", "difficulty": "Medium", "num": 2}, {"question": "એક પદાર્થ પર બે બળો 3 N અને 4 N લાગે છે. જો આ બંને બળો એકબીજા સાથે 60° નો ખૂણો બનાવતા હોય, તો પરિણામી બળનું મૂલ્ય કેટલું હશે?", "options": ["A) 5 N", "B) 7 N", "C) √37 N", "D) 6 N"], "correct": 2, "explanation": "બે સદિશો વચ્ચેનું પરિણામી બળ R = √(P² + Q² + 2PQ cosθ) સૂત્રથી મળે છે. અહીં P = 3 N, Q = 4 N, θ = 60°. તેથી R = √(9 + 16 + 24×0.5) = √(25 + 12) = √37 N. વિકલ્પ A ખોટો છે કારણ કે તે માત્ર 90° ખૂણા માટે સાચું છે. વિકલ્પ B અને D ખોટાં છે કારણ કે તે ગણતરીના પરિણામ સાથે મેળ ખાતાં નથી.", "ncert_ref": "કક્ષા XI - પ્રકરણ 4: ગતિના નિયમો", "difficulty": "Hard", "num": 3}, {"question": "નીચેનામાંથી કઈ રાશિ સદિશ નથી?", "options": ["A) વેગ", "B) પ્રવેગ", "C) કાર્ય", "D) બળ"], "correct": 2, "explanation": "કાર્ય એ અદિશ રાશિ છે કારણ કે તે બળ અને સ્થાનાંતરના બિંદુ ગુણાકારનું પરિણામ છે, જે દિશા પર આધારિત નથી. વિકલ્પ A, B અને D સદિશ રાશિઓ છે કારણ કે તેમને દિશાની જરૂર હોય છે.", "ncert_ref": "કક્ષા XI - પ્રકરણ 5: કાર્ય, ઊર્જા અને પાવર", "difficulty": "Medium", "num": 4}, {"question": "એક સદિશનું મૂલ્ય 10 એકમ છે અને તે x-અક્ષ સાથે 30° નો ખૂણો બનાવે છે. આ સદિશનો y-ઘટક કેટલો હશે?", "options": ["A) 5 એકમ", "B) 5√3 એકમ", "C) 10 એકમ", "D) 10√3 એકમ"], "correct": 0, "explanation": "સદિશનો y-ઘટક = મૂલ્ય × sinθ. અહીં θ = 30°, તેથી y-ઘટક = 10 × sin30° = 10 × 0.5 = 5 એકમ. વિકલ્પ B ખોટો છે કારણ કે તે x-ઘટક માટે સાચું છે (10 × cos30° = 5√3). વિકલ્પ C અને D ખોટાં છે કારણ કે તે મૂલ્ય સાથે સીધો સંબંધ ધરાવતા નથી.", "ncert_ref": "કક્ષા XI - પ્રકરણ 4: ગતિના નિયમો", "difficulty": "Hard", "num": 5}, {"question": "એક કાર 20 મીટર ઉત્તર તરફ ગતિ કરે છે અને ત્યારબાદ 15 મીટર પશ્ચિમ તરફ ગતિ કરે છે. કારનો સ્થાનાંતર સદિશ કયો હશે?", "options": ["A) 25 મીટર, ઉત્તર-પશ્ચિમ દિશામાં", "B) 25 મીટર, ઉત્તર-પૂર્વ દિશામાં", "C) 5√5 મીટર, ઉત્તર-પશ્ચિમ દિશામાં", "D) 5√5 મીટર, પશ્ચિમ-ઉત્તર દિશામાં"], "correct": 2, "explanation": "સ્થાનાંતર સદિશનું મૂલ્ય પાયથાગોરસના પ્રમેયથી મળે છે: √(20² + 15²) = √(400 + 225) = √625 = 25 મીટર નહીં, કારણ કે 20 અને 15 નો ગુણોત્તર 4:3 છે, તેથી કાટકોણ ત્રિકોણ બને છે જેનું કર્ણ 5√5 મીટર થાય છે. દિશા ઉત્તર અને પશ્ચિમના સદિશના સરવાળાથી ઉત્તર-પશ્ચિમ દિશામાં મળે છે. વિકલ્પ A ખોટો છે કારણ કે મૂલ્ય ખોટું છે, B ખોટો છે કારણ કે દિશા ખોટી છે, D ખોટો છે કારણ કે દિશાનો ક્રમ ખોટો છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 4: ગતિના નિયમો", "difficulty": "Medium", "num": 6}, {"question": "નીચેનામાંથી કયું વિધાન સદિશ રાશિ માટે સાચું નથી?", "options": ["A) સદિશ રાશિને સરવાળા માટે સમાંતરબાજુ ચતુષ્કોણના નિયમનો ઉપયોગ થાય છે", "B) સદિશ રાશિનું મૂલ્ય અને દિશા બંને હોય છે", "C) સદિશ રાશિને માત્ર એક સંખ્યા અને એકમથી દર્શાવી શકાય છે", "D) બળ, વેગ અને પ્રવેગ સદિશ રાશિઓ છે"], "correct": 2, "explanation": "સદિશ રાશિને માત્ર સંખ્યા અને એકમથી દર્શાવી શકાતી ન ્રારંભિક અને અંતિમ સ્થાન વચ્ચેની સીધી રેખાનું અંતર અને દિશા દર્શાવે છે. અહીં, 6 મીટર પૂર્વ અને 8 મીટર પશ્ચિમનું પરિણામી વિસ્થાપન 2 મીટર પશ્ચિમ દિશામાં થશે. અંતર એ અદિશ રાશિ છે જે કુલ માર્ગની લંબાઈ દર્શાવે છે, જે 6 + 8 = 14 મીટર થશે. તેથી વિકલ્પ A સાચો છે. અન્ય વિકલ્પોમાં વિસ્થાપન અને અંતરની દિશા અથવા મૂલ્ય ખોટાં છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 4: ગતિના નિયમો", "difficulty": "Medium", "num": 36}, {"question": "એક વિદ્યાર્થી એક પદાર્થ પર બે સદિશ બળો લગાડે છે: 5 N ઉત્તર દિશામાં અને 12 N પૂર્વ દિશામાં. આ બંને બળોનું પરિણામી બળ કેટલું હશે અને તે કઈ દિશામાં હશે?", "options": ["A) 13 N, ઉત્તર-પૂર્વ દિશામાં tan⁻¹(5/12) ના ખૂણે", "B) 17 N, ઉત્તર-પૂર્વ દિશામાં tan⁻¹(12/5) ના ખૂણે", "C) 13 N, ઉત્તર-પૂર્વ દિશામાં tan⁻¹(12/5) ના ખૂણે", "D) 17 N, ઉત્તર-પૂર્વ દિશામાં tan⁻¹(5/12) ના ખૂણે"], "correct": 2, "explanation": "બે લંબ સદિશોનું પરિણામી બળ પાયથાગોરસના પ્રમેય દ્વારા મળે છે: √(5² + 12²) = √(25 + 144) = √169 = 13 N. પરિણામી બળની દિશા ઉત્તર-પૂર્વ દિશામાં હશે, અને તેનો ખૂણો tan⁻¹(12/5) હશે કારણ કે પૂર્વ દિશાનું બળ (12 N) ઉત્તર દિશાના બળ (5 N) કરતાં વધારે છે. તેથી વિકલ્પ C સાચો છે. અન્ય વિકલ્પોમાં પરિણામી બળનું મૂલ્ય અથવા ખૂણો ખોટો છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 4: ગતિના નિયમો", "difficulty": "Hard", "num": 37}, {"question": "એક વિદ્યાર્થી એક સદિશ A̅ ને બે ઘટકોમાં વિભાજિત કરે છે: એક ઘટક x-અક્ષની દિશામાં અને બીજો y-અક્ષની દિશામાં. જો સદિશ A̅ નું મૂલ્ય 10 એકમ હોય અને તે x-અક્ષ સાથે 60° નો ખૂણો બનાવતો હોય, તો તેના x-ઘટક અને y-ઘટક અનુક્રમે કેટલા હશે?", "options": ["A) x-ઘટક = 5 એકમ, y-ઘટક = 5√3 એકમ", "B) x-ઘટક = 5√3 એકમ, y-ઘટક = 5 એકમ", "C) x-ઘટક = 10 એકમ, y-ઘટક = 0 એકમ", "D) x-ઘટક = 5 એકમ, y-ઘટક = 5 એકમ"], "correct": 0, "explanation": "સદિશના ઘટકો ત્રિકોણમિતીય વિધેયો દ્વારા મળે છે: x-ઘટક = A cosθ = 10 × cos60° = 10 × 0.5 = 5 એકમ, અને y-ઘટક = A sinθ = 10 × sin60° = 10 × (√3/2) = 5√3 એકમ. તેથી વિકલ્પ A સાચો છે. અન્ય વિકલ્પોમાં ઘટકોના મૂલ્યો ખોટાં છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 4: ગતિના નિયમો", "difficulty": "Hard", "num": 38}, {"question": "એક વિદ્યાર્થી એક પદાર્થને 20 મીટર ઉત્તર દિશામાં ખસેડે છે અને ત્યારબાદ તેને 15 મીટર પશ્ચિમ દિશામાં ખસેડે છે. જો આ સમગ્ર પ્રક્રિયા દરમિયાન પદાર્થ પર લાગતું બળ અચળ રહે, તો પદાર્થ પર થતું કાર્ય કઈ રાશિ દર્શાવે છે?", "options": ["A) અદિશ રાશિ, કારણ કે કાર્યનું મૂલ્ય માત્ર બળ અને વિસ્થાપનના મૂલ્ય પર આધારિત છે", "B) સદિશ રાશિ, કારણ કે કાર્યની દિશા બળ અને વિસ્થાપનની દિશા પર આધારિત છે", "C) અદિશ રાશિ, કારણ કે કાર્યનું મૂલ્ય ઋણ કે ધન હોઈ શકે છે પરંતુ દિશા નથી હોતી", "D) સદિશ રાશિ, કારણ કે કાર્યની ગણતરીમાં બળ અને વિસ્થાપન બંને સદિશ રાશિઓ છે"], "correct": 0, "explanation": "કાર્ય એ અદિશ રાશિ છે કારણ કે તે બળ અને વિસ્થાપનના અદિશ ગુણાકાર (dot product) દ્વારા મળે છે. અદિશ ગુણાકારમાં માત્ર મૂલ્ય અને બંને સદિશો વચ્ચેનો ખૂણો ધ્યાનમાં લેવાય છે, દિશા નહીં. વિકલ્પ A સાચો છે કારણ કે કાર્યનું મૂલ્ય માત્ર બળ અને વિસ્થાપનના મૂલ્ય પર આધારિત છે. વિકલ્પ B ખોટો છે કારણ કે કાર્યની દિશા હોતી નથી. વિકલ્પ C ખોટો છે કારણ કે કાર્યનું મૂલ્ય ઋણ કે ધન હોઈ શકે છે, પરંતુ તે અદિશ રાશિ હોવાનું મુખ્ય કારણ નથી. વિકલ્પ D ખોટો છે કારણ કે કાર્ય સદિશ રાશિ નથી.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 4: ગતિના નિયમો", "difficulty": "Medium", "num": 39}, {"question": "નીચેના પૈકી કયું વિધાન સદિશ રાશિ માટે ખોટું છે, પરંતુ અદિશ રાશિ માટે સાચું છે?", "options": ["A) તેનું મૂલ્ય ઋણ હોઈ શકે છે", "B) તેનું પરિમાણ અને દિશા બંને હોય છે", "C) તેનું સરવાળો કમ્યુટેટિવ નિયમને અનુસરે છે", "D) તેનું મૂલ્ય બે બિંદુઓ વચ્ચેના અંતર પર આધારિત હોઈ શકે છે"], "correct": 1, "explanation": "સદિશ રાશિ માટે દિશા હોવી જરૂરી છે, જ્યારે અદિશ રાશિ માટે દિશા હોતી નથી. વિકલ્પ B ખોટું છે કારણ કે સદિશ રાશિ માટે દિશા હોવી જરૂરી છે, પરંતુ અદિશ રાશિ માટે દિશા હોતી નથી. વિકલ્પ A ખોટો છે કારણ કે અદિશ અને સદિશ બંને રાશિઓનું મૂલ્ય ઋણ હોઈ શકે છે (દા.ત. તાપમાન અદિશ છે અને ઋણ હોઈ શકે છે, બળ સદિશ છે અને ઋણ દિશામાં હોઈ શકે છે). વિકલ્પ C ખોટો છે કારણ કે સદિશ રાશિઓનું સરવાળો કમ્યુટેટિવ નિયમને અનુસરે છે. વિકલ્પ D ખોટો છે કારણ કે અંતર અદિશ રાશિ છે અને તે બે બિંદુઓ વચ્ચેના અંતર પર આધારિત હોય છે, પરંતુ આ વિધાન સદિશ રાશિ માટે પણ લાગુ પડી શકે છે (દા.ત. વિસ્થાપન).", "ncert_ref": "કક્ષા 11 - પ્રકરણ 4:             const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
