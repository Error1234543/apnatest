<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">

    <title>નીટ ક્વિઝ - ગતિજ સિદ્ધાંત – વાયુના અણુઓ સતત અનિયમિત ગતિ કરે છે.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 ગતિજ સિદ્ધાંત – વાયુના અણુઓ સતત અનિયમિત ગતિ કરે છે.</span>
                <span>🎯 Mixed</span>
                <span>📝 38 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>

            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">

            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>

    <script>

િકલ્પો ગણતરી મુજબ ખોટા છે.", "ncert_ref": "Class XI - પ્રકરણ 13: અણુઓ અને પરમાણુઓ", "difficulty": "Hard", "num": 13}, {"question": "વાયુના અણુઓની અનિયમિત ગતિને કારણે થતી ઘટનાઓ પૈકી કઈ ઘટના દબાણ સાથે સીધી રીતે સંબંધિત નથી?", "options": ["A) વાયુનું વિસરણ", "B) વાયુનું દબાણ", "C) વાયુનું પ્રસરણ", "D) વાયુનું દ્રવીભવન"], "correct": 3, "explanation": "વાયુના અણુઓની અનિયમિત ગતિને કારણે થતી ઘટનાઓમાં વિસરણ, દબાણ, અને પ્રસરણનો સમાવેશ થાય છે. દ્રવીભવન (લિક્વિફેક્શન) એ તાપમાન અને દબાણના સંયુક્ત પરિબળ પર આધાર રાખે છે, પરંતુ તે સીધી રીતે અણુઓની અનિયમિત ગતિ સાથે સંબંધિત નથી. આમ, વિકલ્પ D સીધી રીતે દબાણ સાથે સંબંધિત નથી.", "ncert_ref": "Class XI - પ્રકરણ 13: અણુઓ અને પરમાણુઓ", "difficulty": "Medium", "num": 14}, {"question": "નીચેનામાંથી કયું વિધાન વાયુના અણુઓની ગતિજ સિદ્ધાંત વિશે ખોટું છે?", "options": ["A) વાયુના અણુઓ વચ્ચેના ટકરાવ પૂર્ણપણે લચકદાર હોય છે.", "B) વાયુના અણુઓનું કદ પાત્રના કદની તુલનામાં નગણ્ય હોય છે.", "C) વાયુના અણુઓ વચ્ચે આકર્ષણ બળ હાજર હોય છે.", "D) વાયુના અણુઓ સતત અનિયમિત ગતિ કરે છે."], "correct": 2, "explanation": "ગતિજ સિદ્ધાંત મુજબ, આદર્શ વાયુના અણુઓ વચ્ચે કોઈ આકર્ષણ અથવા અપાકર્ષણ બળ હાજર નથી. વિકલ્પ A અને B સત્ય છે કારણ કે આદર્શ વાયુના અણુઓ વચ્ચેના ટકરાવ લચકદાર હોય છે અને તેમનું કદ પાત્રના કદની તુલનામાં નગણ્ય હોય છે. વિકલ્પ D પણ સત્ય છે કારણ કે અણુઓ સતત અનિયમિત ગતિ કરે છે. વિકલ્પ C ખોટો છે કારણ કે આદર્શ વાયુમાં અણુઓ વચ્ચે કોઈ બળ હાજર નથી.", "ncert_ref": "Class XI - પ્રકરણ 13: અણુઓ અને પરમાણુઓ", "difficulty": "Hard", "num": 15}, {"question": "એક બંધ પાત્રમાં રહેલા વાયુના અણુઓની અનિયમિત ગતિ વિશે નીચેનામાંથી કયું વિધાન યોગ્ય નથી?", "options": ["A) અણુઓની ગતિ સતત અને અનિયમિત હોય છે.", "B) અણુઓની ગતિનું કારણ તેમની ગતિ ઊર્જા છે.", "C) અણુઓની ગતિનું તાપમાન સાથે કોઈ સંબંધ નથી.", "D) અણુઓની ગતિને કારણે પાત્રની દીવાલ પર દબાણ ઉત્પન્ન થાય છે."], "correct": 2, "explanation": "વાયુના અણુઓની અનિયમિત ગતિનું કારણ તેમની ગતિ ઊર્જા છે, જે તાપમાન સાથે સીધો સંબંધ ધરાવે છે (NCERT Class 11, અધ્યાય 13: ગતિજ સિદ્ધાંત). અણુઓની સરેરાશ ગતિ ઊર્જા તાપમાનના સમપ્રમાણમાં હોય છે. તેથી વિકલ્પ C ખોટું છે. બાકીના વિકલ્પો વાયુના ગતિજ સિદ્ધાંત મુજબ યોગ્ય છે.", "ncert_ref": "Class XI - અધ્યાય 13: ગતિજ સિદ્ધાંત અને વાયુના નિયમો", "difficulty": "Medium", "num": 16}, {"question": "નીચેના વિધાનો ધ્યાનમાં લો: (1) વાયુના અણુઓની અનિયમિત ગતિને કારણે તેમની વચ્ચે અથડામણ થાય છે. (2) આ અથડામણો સંપૂર્ણપણે સ્થિતિસ્થાપક હોય છે. (3) અણુઓની ગતિનું વિતરણ મેક્સવેલ-બોલ્ટ્ઝમેનના નિયમ મુજબ થાય છે. ઉપરોક્ત વિધાનોમાંથી કયું/કયા વિધાન/વિધાનો વાયુના ગતિજ સિદ્ધાંત મુજબ યોગ્ય છે?", "options": ["A) માત્ર 1 અને 2", "B) માત્ર 2 અને 3", "C) માત્ર 1 અને 3", "D) 1, 2 અને 3"], "correct": 3, "explanation": "વાયુના ગતિજ સિદ્ધાંત મુજબ, અણુઓની અનિયમિત ગતિને કારણે તેમની વચ્ચે અથડામણ થાય છે (વિધાન 1 યોગ્ય). આ અથડામણો સંપૂર્ણપણે સ્થિતિસ્થાપક હોય છે (વિધાન 2 યોગ્ય). વધુમાં, અણુઓની ગતિનું વિતરણ મેક્સવેલ-બોલ્ટ્ઝમેનના નિયમ મુજબ થાય છે (વિધાન 3 યોગ્ય). તેથી તમામ વિધાનો યોગ્ય છે (NCERT Class 11, અધ્યાય 13).", "ncert_ref": "Class XI - અધ્યાય 13: ગતિજ સિદ્ધાંત અને વાયુના નિયમો", "difficulty": "Hard", "num": 17}, {"question": "એક વાયુના અણુઓની અનિયમિત ગતિને કારણે નીચેનામાંથી કઈ ઘટના થતી નથી?", "options": ["A) વાયુનું પ્રસરણ (Diffusion)", "B) વાયુનું દબાણ", "C) વાયુનું સ્ફટિકીકરણ (Crystallization)", "D) બ્રાઉનિયન ગતિ"], "correct": 2, "explanation": "વાયુના અણુઓની અનિયમિત ગતિને કારણે પ્રસરણ (Diffusion), દબાણ અને બ્રાઉનિયન ગતિ જેવી ઘટનાઓ થાય છે (NCERT Class 11, અધ્યાય 13). જ્યારે સ્ફટિકીકરણ એ ઘન અવસ્થામાં થતી ઘટના છે, જે વાયુના અણુઓની અનિયમિત ગતિ સાથે સંબંધિત નથી. તેથી વિકલ્પ C યોગ્ય છે.", "ncert_ref": "Class XI - અધ્યાય 13: ગતિજ સિદ્ધાંત અને વાયુના નિયમો", "difficulty": "Easy", "num": 18}, {"question": "નીચેના આકૃતિનું વર્ણન કરો: એક બંધ પાત્રમાં વાયુના અણુઓ અનિયમિત ગતિ કરી રહ્યા છે. પાત્રની દીવાલ પર અણુઓ અથડાઈ રહ્યા છે. આ ઘટના વિશે નીચેનામાંથી કયું વિધાન યોગ્ય નથી?", "options": ["A) અણુઓની અથડામણને કારણે દીવાલ પર દબાણ ઉત્પન્ન થાય છે.", "B) અણુઓની ગતિનું કારણ તેમની ગતિ ઊર્જા છે.", "C) અણુઓની અથડામણ સંપૂર્ણપણે અસ્થિતિસ્થાપક હોય છે.", "D) અણુઓની ગતિનું વિતરણ તાપમાન પર આધારિત છે."], "correct": 2, "explanation": "વાયુના ગતિજ સિદ્ધાંત મુજબ, અણુઓની અથડામણ સંપૂર્ણપણે સ્થિતિસ્થાપક હોય છે, અસ્થિતિસ્થાપક નહીં. તેથી વિકલ્પ C ખોટું છે. બાકીના વિકલ્પો વાયુના ગતિજ સિદ્ધાંત મુજબ યોગ્ય છે (NCERT Class 11, અધ્યાય 13).", "ncert_ref": "Class XI - અધ્યાય 13: ગતિજ સિદ્ધાંત અને વાયુના નિયમો", "difficulty": "Hard", "num": 19}, {"question": "એક બંધ પાત્રમાં રહેલા વાયુના અણુઓની અનિયમિત ગતિને કારણે નીચેનામાંથી કઈ ઘટના સીધી રીતે સમજાવી શકાય છે?", "options": ["A) પાત્રની અંદરના વાયુનું તાપમાન અચળ રહે છે", "B) પાત્રની દીવાલ પર વાયુ દ્વારા ઉત્પન્ન થતું દબાણ", "C) વાયુના અણુઓ વચ્ચે થતી રાસાયણિક પ્રક્રિયાઓ", "D) પાત્રમાં રહેલા વાયુની ઘનતા સમય સાથે બદલાતી રહે છે"], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે. વાયુના અણુઓની અનિયમિત ગતિને કારણે તેઓ પાત્રની દીવાલ સાથે અથડામણ કરે છે, જેના પરિણામે દબાણ ઉત્પન્ન થાય છે. આ ગતિજ સિદ્ધાંતનો મૂળભૂત સિદ્ધાંત છે (NCERT Class XI, Chapter 13: ગતિજ સિદ્ધાંત). \n\nવિકલ્પ A ખોટો છે કારણ કે તાપમાન અચળ રહેવું એ ઉષ્મીય સંતુલનની સ્થિતિ છે, જે ગતિજ સિદ્ધાંત દ્વારા સમજાવી શકાય છે, પરંતુ તે સીધી રીતે અનિયમિત ગતિનું પરિણામ નથી. \n\nવિકલ્પ C ખોટો છે કારણ કે રાસાયણિક પ્રક્રિયાઓ વાયુના અણુઓની ગતિ સાથે સીધી રીતે સંબંધિત નથી, તે રાસાયણિક બંધન અને ઊર્જા પર આધારિત છે. \n\nવિકલ્પ D ખોટો છે કારણ કે બંધ પાત્રમાં વાયુની ઘનતા સમય સાથે બદલાતી નથી, કારણ કે અણુઓની સંખ્યા અને પાત્રનું કદ અચળ રહે છે.", "ncert_ref": "Class XI - પ્રકરણ 13: ગતિજ સિદ્ધાંત", "difficulty": "Medium", "num": 20}, {"question": "એક બંધ પાત્રમાં રહેલા વાયુના અણુઓની અનિયમિત ગતિને કારણે પાત્રની દીવાલ પર અથડામણ થાય છે. આ અથડામણને કારણે નીચેનામાંથી કયો ગુણધર્મ સીધો પ્રભાવિત થતો નથી?", "options": ["A) વાયુનું દબાણ", "B) વાયુનું તાપમાન", "C) વાયુનું કદ", "D) વાયુના અણુઓની સરેરાશ ગતિ ઊર્જા"], "correct": 2, "explanation": "વાયુના અણુઓની અનિયમિત ગતિને કારણે પાત્રની દીવાલ પર અથડામણ થાય છે, જે દબાણ ઉત્પન્ન કરે છે (વિકલ્પ A ખોટો). આ અથડામણને કારણે અણુઓની ગતિ ઊર્જા બદલાય છે, જે તાપમાન સાથે સંબંધિત છે (વિકલ્પ B ખોટો). અણુઓની સરેરાશ ગતિ ઊર્જા પણ આ અથડામણને કારણે પ્રભાવિત થાય છે (વિકલ્પ D ખોટો). પરંતુ પાત્રનું કદ બંધ હોવાથી અચળ રહ  "પાત્રની દીવાલ પર અણુઓની અથડામણ (વિકલ્પ B), વાયુનું સંકોચન (વિકલ્પ C) અને અણુઓની સરેરાશ ગતિ ઊર્જા (વિકલ્પ D) વાયુના દબાણ સાથે સીધો સંબંધ ધરાવે છે. પરંતુ વાયુનું પ્રસરણ એ અણુઓની અનિયમિત ગતિને કારણે થતી ઘટના છે, જે દબાણ સાથે સીધો સંબંધ ધરાવતી નથી (વિકલ્પ A સાચો).", "ncert_ref": "Class XI - પ્રકરણ 13: ગતિજ સિદ્ધાંત અને વાયુના નિયમો", "difficulty": "Hard", "num": 24}, {"question": "એક બંધ પાત્રમાં રહેલા વાયુના અણુઓ સતત અનિયમિત ગતિ કરે છે. આ ગતિને કારણે નીચેનામાંથી કઈ ઘટના સીધી રીતે સમજાવી શકાય નહીં?", "options": ["A) પાત્રની દીવાલ પર વાયુ દ્વારા ઉત્પન્ન થતું દબાણ", "B) વાયુનું તાપમાન વધતા તેના અણુઓની સરેરાશ ગતિ ઊર્જામાં વધારો", "C) વાયુના અણુઓ વચ્ચે થતી રાસાયણિક પ્રક્રિયાઓની ગતિ", "D) પાત્રમાં રહેલા વાયુનું કદ અચળ રહેવા છતાં તેનું દબાણ બદલાઈ શકે છે"], "correct": 2, "explanation": "સાચો જવાબ વિકલ્પ C છે. વાયુના અણુઓની અનિયમિત ગતિને કારણે પાત્રની દીવાલ પર અથડામણ થાય છે, જે દબાણ ઉત્પન્ન કરે છે (વિકલ્પ A). તાપમાન વધતા અણુઓની ગતિ ઊર્જા વધે છે (વિકલ્પ B), જે ગતિજ સિદ્ધાંતનો મૂળભૂત સિદ્ધાંત છે. વાયુનું કદ અચળ રહેવા છતાં દબાણ બદલાઈ શકે છે, કારણ કે અણુઓની ગતિ ઝડપ બદલાય છે (વિકલ્પ D). પરંતુ રાસાયણિક પ્રક્રિયાઓની ગતિ અણુઓની અનિયમિત ગતિ પર આધારિત નથી, તે રાસાયણિક બંધન અને ઉર્જા પર આધારિત છે, જે ગતિજ સિદ્ધાંતથી સીધી રીતે સમજાવી શકાય નહીં.", "ncert_ref": "Class XI - પ્રકરણ 13: ગતિજ સિદ્ધાંત", "difficulty": "Medium", "num": 25}, {"question": "નીચેનાં વિધાનો ધ્યાનમાં લો: (1) વાયુના અણુઓની અનિયમિત ગતિને કારણે તેમની વચ્ચે અથડામણ થાય છે. (2) આ અથડામણો સંપૂર્ણપણે સ્થિતિસ્થાપક હોય છે. (3) અણુઓની ગતિ સીધી રેખામાં થાય છે અને માત્ર અથડામણ સમયે જ દિશા બદલાય છે. ગતિજ સિદ્ધાંત મુજબ ઉપરોક્ત વિધાનોમાંથી કયું/કયાં વિધાન ખોટું/ખોટાં છે?", "options": ["A) માત્ર (1)", "B) માત્ર (2)", "C) માત્ર (3)", "D) (2) અને (3) બંને"], "correct": 1, "explanation": "ગતિજ સિદ્ધાંત મુજબ, વાયુના અણુઓની વચ્ચે થતી અથડામણો સંપૂર્ણપણે સ્થિતિસ્થાપક હોતી નથી (વિધાન 2 ખોટું છે). જ્યારે વિધાન (1) અને (3) સાચાં છે - અણુઓ વચ્ચે અથડામણ થાય છે અને તેમની ગતિ સીધી રેખામાં થાય છે, માત્ર અથડામણ સમયે દિશા બદલાય છે.", "ncert_ref": "ક્લાસ 11 - પ્રકરણ 13: ગતિજ સિદ્ધાંત", "difficulty": "Hard", "num": 26}, {"question": "એક વાયુના અણુઓની અનિયમિત ગતિને કારણે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) અણુઓની ગતિ સંપૂર્ણપણે અનિયમિત અને અવ્યવસ્થિત હોય છે.", "B) અણુઓની ગતિનું વર્ણન ન્યૂટનના ગતિના નિયમો દ્વારા થઈ શકે છે.", "C) અણુઓની ગતિનું તાપમાન સાથે કોઈ સંબંધ નથી.", "D) અણુઓની ગતિને કારણે પાત્રની દીવાલ પર દબાણ ઉત્પન્ન થાય છે."], "correct": 2, "explanation": "વાયુના અણુઓની અનિયમિત ગતિનું તાપમાન સાથે સીધો સંબંધ છે, કારણ કે તાપમાન એ અણુઓની સરેરાશ ગતિ ઊર્જાનું માપ છે. તેથી વિકલ્પ C ખોટું છે. અન્ય વિકલ્પો વાયુના ગતિજ સિદ્ધાંત અનુસાર સાચાં છે: અણુઓની ગતિ અનિયમિત હોય છે, ન્યૂટનના નિયમો લાગુ પડે છે, અને દબાણ ઉત્પન્ન થાય છે.", "ncert_ref": "Class XI - પ્રકરણ 13: ગતિજ સિદ્ધાંત અને વાયુના નિયમો", "difficulty": "Hard", "num": 27}, {"question": "નીચેના વિધાનો ધ્યાનમાં લો:\n(1) વાયુના અણુઓની અનિયમિત ગતિને કારણે તેમની વચ્ચે અથડામણ થાય છે.\n(2) આ અથડામણો સંપૂર્ણપણે સ્થિતિસ્થાપક હોય છે.\n(3) અણુઓની ગતિનું વર્ણન માત્ર સંભાવનાના નિયમો દ્વારા જ થઈ શકે છે.\nઉપરોક્ત વિધાનોમાંથી કયું/કયાં વિધાન/વિધાનો સાચું/સાચાં છે?", "options": ["A) માત્ર 1 અને 2", "B) માત્ર 2 અને 3", "C) માત્ર 1 અને 3", "D) 1, 2 અને 3"], "correct": 0, "explanation": "વિધાન 1 અને 2 સાચાં છે: વાયુના અણુઓની અનિયમિત ગતિને કારણે તેમની વચ્ચે અથડામણ થાય છે, અને આ અથડામણો સંપૂર્ણપણે સ્થિતિસ્થાપક હોય છે (ઊર્જાનું સંરક્ષણ થાય છે). વિધાન 3 ખોટું છે કારણ કે અણુઓની ગતિનું વર્ણન ન્યૂટનના ગતિના નિયમો દ્વારા થઈ શકે છે, સંભાવનાના નિયમો માત્ર સરેરાશ વર્તણૂક માટે ઉપયોગી છે.", "ncert_ref": "Class XI - પ્રકરણ 13: ગતિજ સિદ્ધાંત અને વાયુના નિયમો", "difficulty": "Medium", "num": 28}, {"question": "વાયુના અણુઓની અનિયમિત ગતિ વિશે નીચેનાં વિધાનો ધ્યાનમાં લો: (1) અણુઓની ગતિ તાપમાન પર આધાર રાખે છે. (2) અણુઓની ગતિ દિશા સતત બદલાતી રહે છે. (3) અણુઓની ગતિ ઊર્જા સમાન હોતી નથી. (4) અણુઓ વચ્ચેના અંતરે આંતરઅણુ બળો પ્રબળ હોતાં નથી. નીચેનામાંથી કયા વિધાનો સત્ય છે?", "options": ["A) ફક્ત (1) અને (2)", "B) ફક્ત (1), (2) અને (3)", "C) ફક્ત (2), (3) અને (4)", "D) (1), (2), (3) અને (4)"], "correct": 3, "explanation": "વાયુના અણુઓની અનિયમિત ગતિ વિશે તમામ વિધાનો સત્ય છે. (1) અણુઓની ગતિ તાપમાન પર આધાર રાખે છે કારણ કે તાપમાન વધારવાથી ગતિ ઊર્જા વધે છે. (2) અણુઓની ગતિ દિશા સતત બદલાતી રહે છે કારણ કે તેઓ અથડામણો કરે છે. (3) અણુઓની ગતિ ઊર્જા સમાન હોતી નથી કારણ કે તેઓ વિવિધ વેગથી ગતિ કરે છે. (4) આદર્શ વાયુમાં અણુઓ વચ્ચેના અંતરે આંતરઅણુ બળો પ્રબળ હોતાં નથી. આથી તમામ વિધાનો સત્ય છે.", "ncert_ref": "Class XI - પ્રકરણ 13: ગતિજ સિદ્ધાંત", "difficulty": "Hard", "num": 29}, {"question": "એક બંધ પાત્રમાં રહેલા વાયુના અણુઓની સતત અનિયમિત ગતિને કારણે નીચેનામાંથી કઈ ઘટના સીધી રીતે સમજાવી શકાય નહીં?", "options": ["A) પાત્રની દીવાલ પર વાયુનું દબાણ ઉત્પન્ન થવું", "B) વાયુનું તાપમાન વધતા તેનું કદ વધવું (ચાર્લ્સનો નિયમ)", "C) વાયુના અણુઓ વચ્ચે સ્થિતિસ્થાપક અથડામણ થવી", "D) વાયુનું પ્રસરણ (Diffusion) થવું"], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે. વાયુના અણુઓની અનિયમિત ગતિને કારણે પાત્રની દીવાલ પર દબાણ ઉત્પન્ન થાય છે (વિકલ્પ A), અણુઓ વચ્ચે સ્થિતિસ્થાપક અથડામણ થાય છે (વિકલ્પ C) અને પ્રસરણ થાય છે (વિકલ્પ D). પરંતુ ચાર્લ્સનો નિયમ (તાપમાન વધતા કદ વધવું) એ વાયુના અણુઓની ગતિ સાથે સીધો સંબંધ ધરાવે છે, પરંતુ તેને માત્ર અનિયમિત ગતિના સિદ્ધાંતથી સીધો સમજાવી શકાતો નથી. ચાર્લ્સનો નિયમ એ વાયુના દબાણ અને કદ વચ્ચેના સંબંધને સમજાવે છે, જે ગતિજ સિદ્ધાંત સાથે જોડાયેલો છે પરંતુ તેને સીધી રીતે અનિયમિત ગતિના કારણે સમજાવી શકાતો નથી.", "ncert_ref": "Class XI - પ્રકરણ 13: ગતિજ સિદ્ધાંત અને વાયુના નિયમો", "difficulty": "Medium", "num": 30}, {"question": "વાયુના અણુઓની અનિયમિત ગતિને કારણે પાત્રની દીવાલ પર દબાણ ઉત્પન્ન થાય છે. આ દબાણ નીચેનામાંથી કયા પરિબળ પર આધાર રાખતું નથી?", "options": ["A) વાયુના અણુઓની સંખ્યા ઘનતા", "B) અણુઓની સરેરાશ ગતિ ઊર્જા", "C) પાત્રનું કદ", "D) અણુઓનો દળ"], "correct": 2, "explanation": "વાયુના અણુઓની અનિયમિત ગતિને કારણે પાત્રની દીવાલ પર દબાણ ઉત્પન્ન થાય છે, જે અણુઓની સંખ્યા ઘનતા, સરેરાશ ગતિ ઊર્જા અને અણુઓના દળ પર આધાર રાખે છે. પાત્રનું કદ દબાણ પર સીધો પ્રભાવ પાડતું નથી, પરંતુ વાયુના દબાણ અને કદ વચ્ચેનો સંબંધ બોયલના નિયમ દ્વારા વ્યાખ્યાયિત થાય છે. અહીં પ્રશ્ન દબાણ પર ક         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
