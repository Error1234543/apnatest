<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - હૂકનો નિયમ – મર્યાદા સુધી તાણ અને વિકૃતિ સમપ્રમાણમાં રહે છે.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 હૂકનો નિયમ – મર્યાદા સુધી તાણ અને વિકૃતિ સમપ્રમાણમાં રહે છે.</span>
                <span>🎯 Mixed</span>
                <span>📝 49 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "હૂકના નિયમ અનુસાર, કયા બે પરિમાણો વચ્ચે સમપ્રમાણતાનો સંબંધ હોય છે?", "options": ["A) બળ અને વેગ", "B) તાણ અને વિકૃતિ", "C) દબાણ અને કદ", "D) ઉર્જા અને સમય"], "correct": 1, "explanation": "હૂકના નિયમ મુજબ, પદાર્થ પર લાગતું તાણ (stress) અને તેના કારણે થતી વિકૃતિ (strain) સીધા સમપ્રમાણમાં રહે છે, જ્યાં સુધી પ્રસ્તિક મર્યાદા (elastic limit) ન વટાવે. બળ અને વેગ, દબાણ અને કદ, ઉર્જા અને સમય વચ્ચે આવો સંબંધ હૂકના નિયમમાં વર્ણવેલ નથી.", "ncert_ref": "Class XI - પ્રકરણ 9: પદાર્થના યાંત્રિક ગુણધર્મો", "difficulty": "Easy", "num": 1}, {"question": "જ્યારે કોઈ દોરડાને ખેંચવામાં આવે છે ત્યારે તેની લંબાઈમાં થતો ફેરફાર તેની મૂળ લંબાઈના 0.1% જેટલો હોય છે. જો દોરડાનો યંગ મોડ્યુલસ 2 × 10^11 N/m² હોય, તો લાગતું તણાવ કેટલું હશે?", "options": ["A) 2 × 10^8 N/m²", "B) 2 × 10^9 N/m²", "C) 2 × 10^7 N/m²", "D) 2 × 10^10 N/m²"], "correct": 0, "explanation": "હૂકના નિયમ અનુસાર, તણાવ (σ) = યંગ મોડ્યુલસ (Y) × વિકૃતિ (ε). અહીં, વિકૃતિ ε = ΔL/L = 0.1% = 0.001. યંગ મોડ્યુલસ Y = 2 × 10^11 N/m². આથી, σ = 2 × 10^11 × 0.001 = 2 × 10^8 N/m². બાકીના વિકલ્પો યોગ્ય ગણતરી સાથે મેળ ખાતા નથી.", "ncert_ref": "Class XI - પ્રકરણ 9: પદાર્થના યાંત્રિક ગુણધર્મો", "difficulty": "Medium", "num": 2}, {"question": "હૂકના નિયમની મર્યાદા વિશે કયું વિધાન સત્ય છે?", "options": ["A) તે કોઈપણ પદાર્થ માટે લાગુ પડે છે, ચાહે તે કેટલો પણ તણાવ સહન કરે.", "B) તે ફક્ત પ્રસ્તિક મર્યાદા સુધી જ લાગુ પડે છે.", "C) તે ફક્ત પ્લાસ્ટિક વિકૃતિ માટે લાગુ પડે છે.", "D) તે ફક્ત દ્રવ્ય માટે લાગુ પડે છે, ઘન પદાર્થો માટે નહીં."], "correct": 1, "explanation": "હૂકના નિયમ મુજબ, તાણ અને વિકૃતિ વચ્ચેનો સમપ્રમાણતાનો સંબંધ ફક્ત પ્રસ્તિક મર્યાદા (elastic limit) સુધી જ લાગુ પડે છે. આ મર્યાદા પછી પદાર્થમાં કાયમી વિકૃતિ થાય છે. બાકીના વિકલ્પો હૂકના નિયમની મર્યાદા વિશે ખોટા છે.", "ncert_ref": "Class XI - પ્રકરણ 9: પદાર્થના યાંત્રિક ગુણધર્મો", "difficulty": "Medium", "num": 3}, {"question": "એક સ્પ્રિંગને 10 N બળ લાગુ કરતા તેની લંબાઈમાં 2 cmનો વધારો થાય છે. જો બળ 20 N કરવામાં આવે, તો લંબાઈમાં થતો વધારો કેટલો હશે? (ધારો કે સ્પ્રિંગ હૂકના નિયમનું પાલન કરે છે)", "options": ["A) 2 cm", "B) 4 cm", "C) 6 cm", "D) 8 cm"], "correct": 1, "explanation": "હૂકના નિયમ અનુસાર, F = kx, જ્યાં F બળ, k સ્પ્રિંગનો સ્થિરાંક, અને x વિકૃતિ છે. અહીં, 10 N બળ માટે x = 2 cm. જો બળ 20 N (દ્વિગુણ) કરવામાં આવે, તો વિકૃતિ પણ દ્વિગુણ થશે, એટલે કે 4 cm. બાકીના વિકલ્પો યોગ્ય ગણતરી સાથે મેળ ખાતા નથી.", "ncert_ref": "Class XI - પ્રકરણ 9: પદાર્થના યાંત્રિક ગુણધર્મો", "difficulty": "Easy", "num": 4}, {"question": "હૂકના નિયમના સંદર્ભમાં, કયો ગુણધર્મ પદાર્થની પ્રસ્તિકતા (elasticity) નક્કી કરે છે?", "options": ["A) દળ", "B) ઘનતા", "C) યંગ મોડ્યુલસ", "D) તાપમાન"], "correct": 2, "explanation": "યંગ મોડ્યુલસ (Young's modulus) એ પદાર્થની પ્રસ્તિકતા (elasticity) નો મુખ્ય ગુણધર્મ છે, જે હૂકના નિયમમાં તણાવ અને વિકૃતિ વચ્ચેનો સંબંધ નક્કી કરે છે. દળ, ઘનતા, અને તાપમાન પ્રસ્તિકતાને સીધો અસર કરતા નથી.", "ncert_ref": "Class XI - પ્રકરણ 9: પદાર્થના યાંત્રિક ગુણધર્મો", "difficulty": "Hard", "num": 5}, {"question": "એક સમાન આડછેદ ક્ષેત્રફળ ધરાવતા તારને ખેંચવામાં આવે છે. જો તારની મૂળ લંબાઈ કરતાં તેની લંબાઈમાં 0.1% નો વધારો થાય, તો તારમાં ઉત્પન્ન થતું તાણ (strain) કેટલું હશે?", "options": ["A) 0.001", "B) 0.01", "C) 0.1", "D) 1.0"], "correct": 0, "explanation": "તાણ (strain) એ લંબાઈમાં થતા ફેરફાર અને મૂળ લંબાઈના ગુણોત્તર તરીકે વ્યાખ્યાયિત થાય છે. અહીં લંબાઈમાં 0.1% નો વધારો થાય છે, એટલે કે ΔL/L = 0.1/100 = 0.001. તેથી તાણ 0.001 થશે. અન્ય વિકલ્પો ખોટા છે કારણ કે તેઓ ખોટા ગુણોત્તર દર્શાવે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 9: ઘન પદાર્થોના યાંત્રિક ગુણધર્મો", "difficulty": "Easy", "num": 6}, {"question": "એક સ્પ્રિંગનું સ્પ્રિંગ અચળાંક (spring constant) 200 N/m છે. જો તેને 5 cm ખેંચવામાં આવે, તો સ્પ્રિંગમાં સંગ્રહિત સ્થિતિ-ઊર્જા (potential energy) કેટલી હશે? (હૂકના નિયમ અનુસાર ગણતરી કરો)", "options": ["A) 0.25 J", "B) 0.5 J", "C) 1.0 J", "D) 2.0 J"], "correct": 0, "explanation": "સ્પ્રિંગમાં સંગ્રહિત સ્થિતિ-ઊર્જા (U) = ½ × k × x², જ્યાં k = 200 N/m અને x = 0.05 m. ગણતરી કરતાં U = ½ × 200 × (0.05)² = 0.25 J. અન્ય વિકલ્પો ખોટી ગણતરી દર્શાવે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 6: કાર્ય, ઊર્જા અને પાવર", "difficulty": "Medium", "num": 7}, {"question": "એક પદાર્થ પર બાહ્ય બળ લગાડતાં તેની લંબાઈમાં વધારો થાય છે. જો બળને દૂર કરતાં પદાર્થ તેની મૂળ લંબાઈમાં પાછો આવે, તો આ ઘટના કયા પ્રકારની વિકૃતિ (deformation) દર્શાવે છે?", "options": ["A) પ્લાસ્ટિક વિકૃતિ (Plastic deformation)", "B) સ્થિતિસ્થાપક વિકૃતિ (Elastic deformation)", "C) ભંગાણ વિકૃતિ (Fracture deformation)", "D) શ્યાન વિકૃતિ (Viscous deformation)"], "correct": 1, "explanation": "સ્થિતિસ્થાપક વિકૃતિમાં બાહ્ય બળ દૂર કરતાં પદાર્થ તેની મૂળ સ્થિતિમાં પાછો આવે છે. પ્લાસ્ટિક વિકૃતિમાં પદાર્થ મૂળ સ્થિતિમાં પાછો આવતો નથી, ભંગાણ વિકૃતિમાં પદાર્થ તૂટી જાય છે, અને શ્યાન વિકૃતિ પ્રવાહી પદાર્થોમાં જોવા મળે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 9: ઘન પદાર્થોના યાંત્રિક ગુણધર્મો", "difficulty": "Easy", "num": 8}, {"question": "એક તારને ખેંચતાં તેની લંબાઈમાં વધારો થાય છે. જો તાર પર લાગુ કરેલ બળ બમણું કરવામાં આવે, તો નીચેનામાંથી કયું વિધાન હૂકના નિયમની મર્યાદામાં સત્ય છે?", "options": ["A) તારમાં ઉત્પન્ન થતું પ્રતિબળ (stress) બમણું થશે, પરંતુ તાણ (strain) અડધું થશે.", "B) તારમાં ઉત્પન્ન થતું પ્રતિબળ અને તાણ બંને બમણા થશે.", "C) તારમાં ઉત્પન્ન થતું પ્રતિબળ બમણું થશે, પરંતુ તાણ અચળ રહેશે.", "D) તારમાં ઉત્પન્ન થતું પ્રતિબળ અને તાણ બંને અચળ રહેશે."], "correct": 1, "explanation": "હૂકના નિયમ અનુસાર, પ્રતિબળ (stress) ∝ તાણ (strain). તેથી જો બળ બમણું થાય, તો પ્રતિબળ બમણું થશે અને પરિણામે તાણ પણ બમણું થશે. અન્ય વિકલ્પો હૂકના નિયમ સાથે સુસંગત નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 9: ઘન પદાર્થોના યાંત્રિક ગુણધર્મો", "difficulty": "Medium", "num": 9}, {"question": "એક સ્પ્રિંગને 10 N બળ લગાડતાં તેની લંબાઈમાં 4 cm નો વધારો થાય છે. જો આ સ્પ્રિંગને બે સમાન ભાગમાં કાપીને એક ભાગને 10 N બળ લગાડવામાં આવે, તો તેની લંબાઈમાં કેટલો વધારો થશે? (ધારો કે સ્પ્રિંગનું સ્પ્રિંગ અચળાંક સમાન રીતે વહેંચાય છે)", "options": ["A) 1 cm", "B) 2 cm", "C) 4 cm", "D) 8 cm"], "correct": 1, "explanation": "સ્પ્રિંગ અચળાંક (k) = F/x = 10 N / 0.04 m = 250 N/m. જ્યારે સ્પ્રિંગને બે સમાન ભાગમાં કાપવ  k = F/x = 20 / 0.04 = 500 N/m. બાકીના વિકલ્પો (A, C, D) યોગ્ય એકમ અથવા ગણતરીમાં ખોટા છે.", "ncert_ref": "Class XI - પ્રકરણ 9: ઘન અવસ્થાના યાંત્રિક ગુણધર્મો", "difficulty": "Easy", "num": 20}, {"question": "એક પદાર્થ પર બળ લગાડતાં તેની લંબાઈમાં 0.2% વધારો થાય છે. જો હૂકના નિયમની મર્યાદા સુધી તાણ અને વિકૃતિ સમપ્રમાણમાં રહે છે, તો નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) પદાર્થની પ્રસ્તિકતા મર્યાદા (elastic limit) ઓળંગાઈ ગઈ છે.", "B) પદાર્થ પર લાગુ પડતું તાણ તેની પ્રસ્તિકતા મર્યાદા કરતાં ઓછું છે.", "C) પદાર્થ સંપૂર્ણપણે પ્લાસ્ટિક વર્તન દર્શાવે છે.", "D) પદાર્થ પર લાગુ પડતું બળ શૂન્ય છે."], "correct": 1, "explanation": "હૂકના નિયમ અનુસાર, તાણ અને વિકૃતિ પ્રસ્તિકતા મર્યાદા સુધી સમપ્રમાણમાં રહે છે. 0.2% વિકૃતિ એ પ્રસ્તિકતા મર્યાદા કરતાં ઓછી હોવાને લીધે, પદાર્થ હજુ પ્રસ્તિક વર્તન દર્શાવે છે. અ) ખોટું છે કારણ કે મર્યાદા ઓળંગાઈ નથી. બ) સાચું છે કારણ કે તાણ મર્યાદા કરતાં ઓછું છે. ક) ખોટું છે કારણ કે પ્લાસ્ટિક વર્તન મર્યાદા ઓળંગાઈ ગયા પછી જ દેખાય. ડ) ખોટું છે કારણ કે બળ શૂન્ય ન હોવા છતાં વિકૃતિ થઈ શકે.", "ncert_ref": "Class XI - પ્રકરણ 9: યાંત્રિક ગુણધર્મો (Mechanical Properties of Solids)", "difficulty": "Easy", "num": 21}, {"question": "એક સ્પ્રિંગને 15 N બળ લગાડતાં તેની લંબાઈમાં 3 cmનો વધારો થાય છે. જો હૂકના નિયમની મર્યાદા સુધી તાણ અને વિકૃતિ સમપ્રમાણમાં રહે છે, તો સ્પ્રિંગ અચળાંક (k) કેટલો હશે?", "options": ["A) 5 N/cm", "B) 500 N/m", "C) 5 N/m", "D) 0.2 N/cm"], "correct": 1, "explanation": "હૂકના નિયમ અનુસાર, F = kx. અહીં F = 15 N અને x = 3 cm = 0.03 m. તો k = F/x = 15/0.03 = 500 N/m. અ) 5 N/cm = 500 N/m જેવું લાગે પરંતુ એકમ ખોટું છે. બ) સાચું છે. ક) 5 N/m ખૂબ ઓછું છે. ડ) 0.2 N/cm = 20 N/m, જે ખોટું છે.", "ncert_ref": "Class XI - પ્રકરણ 9: યાંત્રિક ગુણધર્મો (Mechanical Properties of Solids)", "difficulty": "Medium", "num": 22}, {"question": "નીચેનામાંથી કયું વિધાન હૂકના નિયમની મર્યાદા વિશે ખોટું છે?", "options": ["A) હૂકનો નિયમ ફક્ત પ્રસ્તિકતા મર્યાદા સુધી જ લાગુ પડે છે.", "B) તાણ અને વિકૃતિ વચ્ચેનો આલેખ રેખીય હોય છે જ્યાં સુધી પ્રસ્તિકતા મર્યાદા ન ઓળંગાઈ જાય.", "C) હૂકનો નિયમ તમામ પદાર્થો માટે સરખી રીતે લાગુ પડે છે.", "D) પ્રસ્તિકતા મર્યાદા ઓળંગાઈ જાય પછી, પદાર્થ પ્લાસ્ટિક વર્તન દર્શાવે છે."], "correct": 2, "explanation": "હૂકનો નિયમ ફક્ત પ્રસ્તિકતા મર્યાદા સુધી લાગુ પડે છે અને તાણ-વિકૃતિ આલેખ રેખીય હોય છે (અ, બ સાચા). પ્રસ્તિકતા મર્યાદા ઓળંગાઈ જાય પછી પ્લાસ્ટિક વર્તન થાય (ડ સાચું). પરંતુ હૂકનો નિયમ તમામ પદાર્થો માટે સરખી રીતે લાગુ પડતો નથી (ક ખોટું).", "ncert_ref": "Class XI - પ્રકરણ 9: યાંત્રિક ગુણધર્મો (Mechanical Properties of Solids)", "difficulty": "Medium", "num": 23}, {"question": "એક તારને ખેંચતાં તેની લંબાઈમાં 1% વધારો થાય છે. જો હૂકના નિયમની મર્યાદા સુધી તાણ અને વિકૃતિ સમપ્રમાણમાં રહે છે, તો નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) તાર પર લાગુ પડતું તાણ તેની પ્રસ્તિકતા મર્યાદા કરતાં ઓછું છે.", "B) તારની લંબાઈમાં થતો ફેરફાર તેની મૂળ લંબાઈના 1% છે.", "C) તાર પર લાગુ પડતું બળ શૂન્ય છે.", "D) તાર પ્રસ્તિક વર્તન દર્શાવે છે."], "correct": 2, "explanation": "1% વિકૃતિ પ્રસ્તિકતા મર્યાદા કરતાં ઓછી હોવાને લીધે, તાર પ્રસ્તિક વર્તન દર્શાવે છે (ડ સાચું). તાણ અને વિકૃતિ સમપ્રમાણમાં છે (બ સાચું). તાણ મર્યાદા કરતાં ઓછું છે (અ સાચું). પરંતુ બળ શૂન્ય ન હોવા છતાં વિકૃતિ થઈ શકે (ક ખોટું).", "ncert_ref": "Class XI - પ્રકરણ 9: યાંત્રિક ગુણધર્મો (Mechanical Properties of Solids)", "difficulty": "Hard", "num": 24}, {"question": "એક પદાર્થ પર બળ લગાડતાં તેની લંબાઈમાં 0.5 mmનો વધારો થાય છે. જો પદાર્થની મૂળ લંબાઈ 1 m અને આડછેદ ક્ષેત્રફળ 1 mm² હોય, તો હૂકના નિયમ અનુસાર, યંગ મોડ્યુલસ (Y) કેટલો હશે? (ધારો કે બળ 100 N છે)", "options": ["A) 2 × 10¹¹ N/m²", "B) 2 × 10⁵ N/m²", "C) 2 × 10⁹ N/m²", "D) 2 × 10⁷ N/m²"], "correct": 0, "explanation": "હૂકના નિયમ અનુસાર, Y = (F/A) / (ΔL/L). અહીં F = 100 N, A = 1 mm² = 10⁻⁶ m², ΔL = 0.5 mm = 0.5 × 10⁻³ m, L = 1 m. તો Y = (100 / 10⁻⁶) / (0.5 × 10⁻³ / 1) = 10⁸ / 0.5 × 10⁻³ = 2 × 10¹¹ N/m². અ) સાચું છે. બ, ક, ડ ખોટા છે કારણ કે તેમના મૂલ્યો ખૂબ ઓછા છે.", "ncert_ref": "Class XI - પ્રકરણ 9: યાંત્રિક ગુણધર્મો (Mechanical Properties of Solids)", "difficulty": "Hard", "num": 25}, {"question": "એક સમાન આડછેદ ક્ષેત્રફળ ધરાવતા તારને સમાન બળથી ખેંચવામાં આવે છે. જો તારની મૂળ લંબાઈ બમણી કરવામાં આવે, તો હૂકના નિયમ અનુસાર લંબાઈમાં થતો વધારો કેવી રીતે બદલાશે?", "options": ["A) બમણો થશે", "B) અડધો થશે", "C) ચોથા ભાગનો થશે", "D) બદલાશે નહીં"], "correct": 0, "explanation": "હૂકના નિયમ મુજબ, તાણ (stress) અને વિકૃતિ (strain) વચ્ચેનો સંબંધ સમપ્રમાણમાં હોય છે. તાણ = બળ/ક્ષેત્રફળ અને વિકૃતિ = લંબાઈમાં વધારો/મૂળ લંબાઈ. જો મૂળ લંબાઈ બમણી કરવામાં આવે, તો સમાન બળ માટે વિકૃતિ અડધી થશે, પરંતુ લંબાઈમાં વધારો બમણો થશે કારણ કે વિકૃતિ = ΔL/L. તેથી, જો L બમણું થાય, તો ΔL પણ બમણું થશે જેથી વિકૃતિ અડધી રહે. આથી સાચો જવાબ A છે. અન્ય વિકલ્પો ભૌતિકશાસ્ત્રના નિયમો સાથે સુસંગત નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 9: ઘન પદાર્થોના યાંત્રિક ગુણધર્મો", "difficulty": "Medium", "num": 26}, {"question": "એક સ્પ્રિંગને 8 N બળ લગાડતાં તેની લંબાઈમાં 2 cmનો વધારો થાય છે. જો આ સ્પ્રિંગને બે સમાન ભાગમાં કાપીને એક ભાગને 8 N બળ લગાડવામાં આવે, તો લંબાઈમાં કેટલો વધારો થશે?", "options": ["A) 1 cm", "B) 2 cm", "C) 4 cm", "D) 0.5 cm"], "correct": 0, "explanation": "સ્પ્રિંગ અચળાંક (k) = બળ/લંબાઈમાં વધારો = 8 N / 2 cm = 4 N/cm. જ્યારે સ્પ્રિંગને બે સમાન ભાગમાં કાપવામાં આવે છે, ત્યારે દરેક ભાગનો સ્પ્રિંગ અચળાંક બમણો થાય છે (કારણ કે સ્પ્રિંગ અચળાંક લંબાઈના વ્યસ્ત પ્રમાણમાં હોય છે). તેથી નવો સ્પ્રિંગ અચળાંક = 8 N/cm. હવે, 8 N બળ લગાડતાં લંબાઈમાં વધારો = બળ/સ્પ્રિંગ અચળાંક = 8 N / 8 N/cm = 1 cm. આથી સાચો જવાબ A છે. અન્ય વિકલ્પો ગણતરીની ભૂલ દર્શાવે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 9: ઘન પદાર્થોના યાંત્રિક ગુણધર્મો", "difficulty": "Hard", "num": 27}, {"question": "એક તાર પર બાહ્ય બળ લગાડતાં તેની લંબાઈમાં 0.2% વધારો થાય છે. જો તારનો યંગ મોડ્યુલસ 2 × 10¹¹ N/m² હોય, તો તાર પર લાગુ થતું તાણ (stress) કેટલું હશે?", "options": ["A) 2 × 10⁸ N/m²", "B) 4 × 10⁸ N/m²", "C) 2 × 10⁷ N/m²", "D) 4 × 10⁷ N/m²"], "correct": 1, "explanation": "યંગ મોડ્યુલસ (Y) = તાણ/વિકૃતિ. અહીં વિકૃતિ = 0.2% = 0.002. તેથી તાણ = Y × વિકૃતિ = 2 × 10¹¹ N/m² × 0.002 = 4 × 10⁸ N/m². આથી સાચો જવાબ B છે. અન્ય વિકલ્પો ગણતરીની ભૂલ દર્શાવે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 9: ઘન પદાર્થોના યાંત્રિક ગુણધર્મો", "difficulty": "Medium", "num": 28}, {"question": "નીચેનામાંથી કયું વિધાન હૂકના નિયમની મર્યાદા સાથે સંબંધિત નથી?", "options": ["A) પદાર્થ પર લાગુ બળ તેની સ્થિતિસ્થાપક મર્યાદા કરતાં વધી જાય ત્યારે હૂકનો નિયમ લાગુ પડતો નથી", "B) હૂકનો નિયમ માત્ર સ્થિતિસ્થાપક પદાર્થો માટે જ લાગુ પડે છે", "C) હૂકનો નિયમ અનુસાર, તાણ અને વિકૃતિ હંમેશાં સમપ્રમાણમાં રહે છે, પછી ભલે બળ ગમે તેટલું વધે", "D) જ્યારે પદાર્થ પર લાગુ બળ દૂર કરવામાં આવે ત્યારે તે તેની મૂળ સ્થિતિમાં પાછો આવે તો જ હૂકનો નિયમ લાગુ પડે છે"], "correct": 2, "explanation": "હૂકનો નિયમ માત્ર સ્થિતિસ્થાપક મર્યાદા સુધી જ લાગુ પડે છે. જ્યારે બળ સ્થિતિસ્થાપક મર્યાદા કરતાં વધી જાય, ત્યારે તાણ અને વિકૃતિ સમપ્રમાણમાં રહેતાં નથી. વિકલ્પ C ખોટું છે કારણ કે તે હૂકના નિયમની મર્યાદાને અવગણે છે. અન્ય વિકલ્પો હૂકના નિયમની મર્યાદા સાથે સુસંગત છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 9: ઘન પદાર્થોના યાંત્રિક ગુણધર્મો", "difficulty": "Easy", "num": 29}, {"question": "એક સ્પ્રિંગનું સ્પ્રિંગ અચળાંક 150 N/m છે. જો આ સ્પ્રિંગને 6 N બળ લગાડવામાં આવે, તો સ્પ્રિંગમાં સંગ્રહિત સ્થિતિ-ઊર્જા કેટલી હશે?", "options": ["A) 0.12 J", "B) 0.24 J", "C) 0.36 J", "D) 0.48 J"], "correct": 0, "explanation": "સ્પ્રિંગમાં સંગ્રહિત સ્થિતિ-ઊર્જા (U) = ½ × k × x², જ્યાં x = બળ/સ્પ્રિંગ અચળાંક = 6 N / 150 N/m = 0.04 m. તેથી U = ½ × 150 × (0.04)² = ½ × 150 × 0.0016 = 0.12 J. આથી સાચો જવાબ A છે. અન્ય વિકલ્પો ગણતરીની ભૂલ દર્શાવે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 6: કાર્ય, ઊર્જા અને પાવર", "difficulty": "Hard", "num": 30}, {"question": "એક સમાન આડછેદ ક્ષેત્રફળ ધરાવતા બે તાર A અને B ને સમાન બળથી ખેંચવામાં આવે છે. જો તાર A ની લંબાઈમાં થતો વધારો તાર B કરતાં બમણો હોય, તો નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) તાર A નું યંગ મૉડ્યુલસ તાર B કરતાં બમણું છે", "B) તાર A નું યંગ મૉડ્યુલસ તાર B કરતાં અડધું છે", "C) તાર A અને B ના યંગ મૉડ્યુલસ સમાન છે", "D) તાર A નું યંગ મૉડ્યુલસ તાર B કરતાં ચાર ગણું છે"], "correct": 1, "explanation": "હૂકના નિયમ મુજબ, તાણ (strain) એ પ્રતિબળ (stress) ના સમપ્રમાણમાં હોય છે અને આ સમપ             document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
