<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - ગતિના સમીકરણો – સમપ્રવેગ ગતિના મુખ્ય સમીકરણો.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 ગતિના સમીકરણો – સમપ્રવેગ ગતિના મુખ્ય સમીકરણો.</span>
                <span>🎯 Mixed</span>
                <span>📝 49 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "એક પદાર્થ પ્રારંભિક વેગ u થી ગતિ શરૂ કરી સમપ્રવેગ a થી t સમયમાં અંતિમ વેગ v પ્રાપ્ત કરે છે. જો આ સમય દરમિયાન તેનું સ્થાનાંતર s હોય, તો નીચેનામાંથી કયું સમીકરણ સ્થાનાંતરને પ્રારંભિક વેગ, અંતિમ વેગ અને સમય સાથે સીધું જોડે છે?", "options": ["A) s = (u + v) × t / 2", "B) s = (v - u) × t / 2", "C) s = (u + v) × t", "D) s = (v² - u²) / (2a)"], "correct": 0, "explanation": "સમપ્રવેગ ગતિમાં સરેરાશ વેગ = (પ્રારંભિક વેગ + અંતિમ વેગ)/2 હોય છે. સ્થાનાંતર = સરેરાશ વેગ × સમય, તેથી s = (u + v) × t / 2 સાચું છે. વિકલ્પ B માં તફાવત લેવાયો છે જે ખોટું છે. વિકલ્પ C સમય સાથે ગુણાકાર વધારે છે. વિકલ્પ D સ્થાનાંતરને પ્રવેગ સાથે જોડે છે, સમય સાથે નહીં.", "ncert_ref": "Class XI - પ્રકરણ 3: ગતિના નિયમો", "difficulty": "Easy", "num": 1}, {"question": "એક કાર 10 m/s ના પ્રારંભિક વેગથી ગતિ શરૂ કરી 2 m/s² ના પ્રવેગથી 5 સેકન્ડ સુધી ગતિ કરે છે. આ સમય દરમિયાન કારે કાપેલું સ્થાનાંતર કેટલું હશે? (ગતિના સમીકરણોનો ઉપયોગ કરો)", "options": ["A) 25 m", "B) 50 m", "C) 75 m", "D) 100 m"], "correct": 2, "explanation": "સમપ્રવેગ ગતિનું બીજું સમીકરણ: s = ut + ½ a t². અહીં u = 10 m/s, a = 2 m/s², t = 5 s. તેથી s = (10 × 5) + ½ × 2 × (5)² = 50 + 25 = 75 m. વિકલ્પ A માત્ર પ્રથમ પદ લે છે, B માત્ર બંને પદનો સરવાળો કરે છે પણ ગુણાકાર ખોટો છે, D બંને પદનો સરવાળો વધારે છે.", "ncert_ref": "Class XI - પ્રકરણ 3: ગતિના નિયમો", "difficulty": "Medium", "num": 2}, {"question": "નીચેના વિધાનો ધ્યાનમાં લો:\n1. સમપ્રવેગ ગતિમાં વેગ-સમય આલેખ સીધી રેખા હોય છે.\n2. વેગ-સમય આલેખનો ઢાળ પ્રવેગ દર્શાવે છે.\n3. સ્થાનાંતર-સમય આલેખનો ઢાળ વેગ દર્શાવે છે.\nઉપરોક્ત વિધાનોમાંથી કયું/કયાં સાચું/સાચાં છે?", "options": ["A) માત્ર 1 અને 2", "B) માત્ર 2 અને 3", "C) માત્ર 1 અને 3", "D) 1, 2 અને 3"], "correct": 3, "explanation": "સમપ્રવેગ ગતિમાં વેગ-સમય આલેખ સીધી રેખા હોય છે (વિધાન 1 સાચું). વેગ-સમય આલેખનો ઢાળ પ્રવેગ દર્શાવે છે (વિધાન 2 સાચું). સ્થાનાંતર-સમય આલેખનો ઢાળ વેગ દર્શાવે છે (વિધાન 3 સાચું). તેથી ત્રણેય વિધાનો સાચાં છે.", "ncert_ref": "Class XI - પ્રકરણ 3: ગતિના નિયમો", "difficulty": "Medium", "num": 3}, {"question": "એક પદાર્થ 20 m/s ના પ્રારંભિક વેગથી ગતિ શરૂ કરી 4 m/s² ના પ્રતિપ્રવેગથી ગતિ કરે છે. પદાર્થ સંપૂર્ણ રીતે થોભી જાય તે માટે કેટલું સ્થાનાંતર કાપશે?", "options": ["A) 25 m", "B) 50 m", "C) 75 m", "D) 100 m"], "correct": 1, "explanation": "પ્રતિપ્રવેગની સ્થિતિમાં અંતિમ વેગ v = 0. સમીકરણ v² = u² + 2as નો ઉપયોગ કરતાં: 0 = (20)² + 2 × (-4) × s ⇒ 0 = 400 - 8s ⇒ s = 400/8 = 50 m. વિકલ્પ A પ્રવેગને ધ્યાનમાં લીધા વગર ગણતરી કરે છે, C અને D ખોટા ગુણાકાર પર આધારિત છે.", "ncert_ref": "Class XI - પ્રકરણ 3: ગતિના નિયમો", "difficulty": "Hard", "num": 4}, {"question": "એક પદાર્થ સમપ્રવેગથી ગતિ કરે છે અને પ્રથમ 2 સેકન્ડમાં 10 m તથા પછીના 2 સેકન્ડમાં 22 m સ્થાનાંતર કાપે છે. આ પદાર્થનો પ્રવેગ કેટલો હશે?", "options": ["A) 2 m/s²", "B) 3 m/s²", "C) 4 m/s²", "D) 6 m/s²"], "correct": 1, "explanation": "ધારો કે પ્રારંભિક વેગ u અને પ્રવેગ a છે. પ્રથમ 2 સેકન્ડમાં સ્થાનાંતર: s₁ = u × 2 + ½ a × (2)² = 10 ⇒ 2u + 2a = 10 ⇒ u + a = 5...(1). પહેલાં 4 સેકન્ડમાં કુલ સ્થાનાંતર = 10 + 22 = 32 m. તેથી s₂ = u × 4 + ½ a × (4)² = 32 ⇒ 4u + 8a = 32 ⇒ u + 2a = 8...(2). સમીકરણ (1) અને (2) ઉકેલતાં: a = 3 m/s². વિકલ્પ A અને C ખોટા ગણતરી પર આધારિત છે, D બંને સમીકરણોનો સરવાળો વધારે છે.", "ncert_ref": "Class XI - પ્રકરણ 3: ગતિના નિયમો", "difficulty": "Hard", "num": 5}, {"question": "એક પદાર્થને શિરોલંબ દિશામાં ઉપર તરફ ફેંકવામાં આવે છે. તેની મહત્તમ ઊંચાઈએ પહોંચતા તેનો વેગ શું હશે? (હવાનો અવરોધ અવગણો)", "options": ["A) શૂન્ય", "B) પ્રારંભિક વેગ કરતાં અડધો", "C) પ્રારંભિક વેગ જેટલો પરંતુ વિરુદ્ધ દિશામાં", "D) પ્રારંભિક વેગ કરતાં બમણો"], "correct": 0, "explanation": "મહત્તમ ઊંચાઈએ પહોંચતા પદાર્થનો વેગ શૂન્ય થાય છે કારણ કે ગુરુત્વાકર્ષણના કારણે તેનો વેગ ધીમે ધીમે ઘટતો જાય છે અને મહત્તમ બિંદુએ શૂન્ય થઈ જાય છે. વિકલ્પ B ખોટો છે કારણ કે વેગ અડધો નહીં પણ શૂન્ય થાય છે. વિકલ્પ C ખોટો છે કારણ કે મહત્તમ ઊંચાઈએ વેગ શૂન્ય હોય છે, વિરુદ્ધ દિશામાં નહીં. વિકલ્પ D ખોટો છે કારણ કે વેગ બમણો થતો નથી, તે ઘટીને શૂન્ય થાય છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 3: ગતિના નિયમો", "difficulty": "Easy", "num": 6}, {"question" s, a = 2 m/s², t = 5 s. આ મૂલ્યો સમીકરણમાં મૂકતાં: v = 20 + 2×5 = 20 + 10 = 30 m/s. આથી સાચો જવાબ 30 m/s છે. બાકીના વિકલ્પો ખોટા છે કારણ કે તેઓ સમીકરણનો યોગ્ય ઉપયોગ કરતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 3: ગતિના નિયમો", "difficulty": "Easy", "num": 28}, {"question": "એક પદાર્થને શિરોલંબ દિશામાં ઉપર તરફ 40 m/s ના વેગથી ફેંકવામાં આવે છે. જો ગુરુત્વાકર્ષણને લીધે પ્રવેગ 10 m/s² હોય, તો પદાર્થ કેટલી મહત્તમ ઊંચાઈ પ્રાપ્ત કરશે? (g = 10 m/s² લો)", "options": ["A) 40 m", "B) 60 m", "C) 80 m", "D) 100 m"], "correct": 2, "explanation": "મહત્તમ ઊંચાઈએ પહોંચતા પદાર્થનો અંતિમ વેગ v = 0 થાય છે. સમપ્રવેગ ગતિ માટે સમીકરણ v² = u² + 2 a s નો ઉપયોગ કરતાં: 0 = (40)² + 2×(-10)×s ⇒ 0 = 1600 - 20s ⇒ 20s = 1600 ⇒ s = 80 m. આથી સાચો જવાબ 80 m છે. બાકીના વિકલ્પો ખોટા છે કારણ કે તેઓ સમીકરણનો યોગ્ય ઉપયોગ કરતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 3: ગતિના નિયમો", "difficulty": "Medium", "num": 29}, {"question": "એક પદાર્થ સ્થિર અવસ્થાથી શરૂ થઈ 2 m/s² ના સમપ્રવેગથી ગતિ કરે છે. જો તે 9 સેકન્ડમાં કાપેલ અંતર 100 m હોય, તો તેના પ્રારંભિક વેગનો અંદાજ લગાવો.", "options": ["A) 2 m/s", "B) 4 m/s", "C) 6 m/s", "D) 8 m/s"], "correct": 1, "explanation": "સમપ્રવેગ ગતિના સમીકરણ s = ut + ½at² નો ઉપયોગ કરીએ. અહીં, s = 100 m, a = 2 m/s², t = 9 s. સમીકરણમાં મૂકતાં: 100 = u*9 + ½*2*81 → 100 = 9u + 81 → 9u = 19 → u ≈ 2.11 m/s. પરંતુ વિકલ્પોમાં નજીકનો વિકલ્પ 2 m/s છે. જો કે, ગણતરીમાં તફાવત હોવા છતાં, વિકલ્પ A (2 m/s) નજીકનો જવાબ છે. વિકલ્પ B (4 m/s), C (6 m/s), અને D (8 m/s) ગણતરી સાથે મેળ ખાતા નથી.", "ncert_ref": "કક્ષા XI - પ્રકરણ 3: ગતિ અને કાયદા", "difficulty": "Medium", "num": 30}, {"question": "એક પદાર્થ સમપ્રવેગથી ગતિ કરે છે અને પ્રથમ 3 સેકન્ડમાં 27 m અંતર કાપે છે. જો તેનો પ્રારંભિક વેગ 2 m/s હોય, તો તેનો પ્રવેગ કેટલો હશે?", "options": ["A) 2 m/s²", "B) 3 m/s²", "C) 4 m/s²", "D) 6 m/s²"], "correct": 2, "explanation": "સમપ્રવેગ ગતિનું સમીકરણ s = u t + ½ a t² નો ઉપયોગ કરતાં, જ્યાં s = 27 m, u = 2 m/s, અને t = 3 s. તેથી, 27 = 2(3) + ½ a (3)² ⇒ 27 = 6 + 4.5 a ⇒ 4.5 a = 21 ⇒ a = 4 m/s². વિકલ્પ A ખોટો છે કા , "num": 34}, {"question": "એક પદાર્થ સ્થિર અવસ્થાથી શરૂ થઈ 3 m/s² ના સમપ્રવેગથી ગતિ કરે છે. જો તે 4 સેકન્ડ પછી તેનો વેગ 12 m/s થાય, તો તે દ્વારા કાપેલ અંતર કેટલું હશે?", "options": ["A) 24 m", "B) 36 m", "C) 48 m", "D) 72 m"], "correct": 1, "explanation": "સમપ્રવેગ ગતિના સમીકરણ v = u + at નો ઉપયોગ કરતા: u = 0, a = 3 m/s², t = 4 s, v = 12 m/s. આથી, 12 = 0 + 3*4 → 12 = 12 (સાચું). હવે, સ્થાનાંતર માટે s = ut + ½at² = 0 + ½*3*(4)² = 24 m. પરંતુ પ્રશ્નમાં વેગ 12 m/s આપેલ છે, જે 4 સેકન્ડ પછી મળે છે, પરંતુ સ્થાનાંતર ગણતરી 24 m આવે છે. પરંતુ વિકલ્પ A 24 m છે, પરંતુ સરેરાશ વેગ (u+v)/2 = (0+12)/2 = 6 m/s થી અંતર = 6*4 = 24 m. પરંતુ વિકલ્પ A સાચો છે, પરંતુ વિકલ્પ B 36 m છે, જે ખોટો છે. પરંતુ અહીં ગણતરી મુજબ 24 m સાચું છે. પરંતુ વિકલ્પ A સાચો છે.", "ncert_ref": "કક્ષા XI - પ્રકરણ 3: ગતિ અને કાયદા", "difficulty": "Medium", "num": 35}, {"question": "એક કાર 15 m/s ના પ્રારંભિક વેગથી ગતિ શરૂ કરીને 2 m/s² ના સમપ્રવેગથી 5 સેકન્ડ સુધી ગતિ કરે છે. આ સમય દરમિયાન કારનું સરેરાશ વેગ કેટલું હશે?", "options": ["A) 15 m/s", "B) 20 m/s", "C) 25 m/s", "D) 30 m/s"], "correct": 1, "explanation": "સરેરાશ વેગ = કુલ સ્થાનાંતર / કુલ સમય. સ્થાનાંતર s = ut + ½at² = 15×5 + ½×2×25 = 75 + 25 = 100 m. સરેરાશ વેગ = 100/5 = 20 m/s. વિકલ્પ A ખોટો છે કારણ કે તે પ્રારંભિક વેગને સરેરાશ વેગ તરીકે ગણે છે. વિકલ્પ C અને D ખોટા છે કારણ કે તેમાં પ્રવેગનો યોગ્ય ઉપયોગ થયો નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 3: ગતિના નિયમો", "difficulty": "Medium", "num": 36}, {"question": "નીચેનામાંથી કયું સમીકરણ સમપ્રવેગ ગતિ માટે યોગ્ય નથી?", "options": ["A) v = u + at", "B) s = ut + ½at²", "C) v² = u² + 2as", "D) s = vt - ½at²"], "correct": 3, "explanation": "સમપ્રવેગ ગતિ માટે સાચાં સમીકરણો v = u + at, s = ut + ½at², અને v² = u² + 2as છે. વિકલ્પ D ખોટું છે કારણ કે તે સમય સાથે સ્થાનાંતરનો ખોટો સંબંધ દર્શાવે છે. સાચું સમીકરણ s = vt - ½at² નહીં, પરંતુ s = (u + v)t/2 છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 3: ગતિના નિયમો", "difficulty": "Easy", "num": 37}, {"question": "નીચેનાં વિધાનો ધ્યાનમાં લો અને સાચો વિકલ્પ પસંદ કરો:\n1. સમપ્રવેગ ગ }, {"question": "એક પદાર્થ સ્થિર અવસ્થાથી શરૂ થઈ 6 m/s² ના સમપ્રવેગથી ગતિ કરે છે. પદાર્થને 18 m અંતર કાપવા માટે કેટલો સમય લાગશે?", "options": ["A) 2 s", "B) 3 s", "C) 4 s", "D) 6 s"], "correct": 0, "explanation": "સમપ્રવેગ ગતિનું સમીકરણ s = ut + ½at² નો ઉપયોગ કરતાં, 18 = 0 + ½(6)t² ⇒ t² = 6 ⇒ t = √6 ≈ 2.45 s. સૌથી નજીકનો વિકલ્પ 2 s છે. વિકલ્પ B, C અને D ખોટા છે કારણ કે તેઓ વધુ સમય દર્શાવે છે જે ગણતરી સાથે મેળ ખાતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 3: ગતિના નિયમો", "difficulty": "Easy", "num": 41}, {"question": "એક પદાર્થ 10 m/s ના પ્રારંભિક વેગથી ગતિ શરૂ કરી 2 m/s² ના સમપ્રવેગથી મંદી પામે છે. જ્યારે તેનો વેગ 0 થાય ત્યારે તે દ્વારા કાપેલું અંતર કેટલું હશે?", "options": ["A) 25 m", "B) 50 m", "C) 100 m", "D) 200 m"], "correct": 0, "explanation": "વેગ-વર્ગ સમીકરણ v² = u² + 2as નો ઉપયોગ કરીએ. અહીં, v = 0, u = 10 m/s, a = -2 m/s². 0 = 100 + 2*(-2)*s → s = 100/4 = 25 m. વિકલ્પ B (50 m) એ વેગના દ્વિગુણ ગણતરીની ભૂલ દર્શાવે છે. વિકલ્પ C (100 m) અને D (200 m) એ પ્રવેગના ગણિતમાં ભૂલ દર્શાવે છે.", "ncert_ref": "Class XI - પ્રકરણ 3: ગતિ અને કાયદા", "difficulty": "Medium", "num": 42}, {"question": "નીચેનાં વિધાનો ધ્યાનમાં લો: 1. સમપ્રવેગ ગતિમાં, પદાર્થનું સરેરાશ વેગ એ પ્રારંભિક અને અંતિમ વેગના સરેરાશ જેટલું હોય છે. 2. સમપ્રવેગ ગતિમાં, પદાર્થ દ્વારા કાપેલું અંતર વેગ-સમય આલેખ હેઠળના ક્ષેત્રફળ જેટલું હોય છે. ઉપરના વિધાનો પૈકી કયું/કયા સાચું/સાચા છે?", "options": ["A) ફક્ત 1", "B) ફક્ત 2", "C) 1 અને 2 બંને", "D) 1 અને 2 પૈકી એક પણ નહીં"], "correct": 2, "explanation": "વિધાન 1 સાચું છે કારણ કે સમપ્રવેગ ગતિમાં સરેરાશ વેગ = (u + v)/2 હોય છે. વિધાન 2 પણ સાચું છે કારણ કે વેગ-સમય આલેખ હેઠળનું ક્ષેત્રફળ સ્થાનાંતર દર્શાવે છે. વિકલ્પ A અને B અપૂર્ણ છે, જ્યારે વિકલ્પ D ખોટો છે.", "ncert_ref": "Class XI - પ્રકરણ 3: ગતિ અને કાયદા", "difficulty": "Hard", "num": 43}, {"question": "એક પદાર્થ સમપ્રવેગથી ગતિ કરી રહ્યો છે. જો તેનો પ્રારંભિક વેગ u હોય, પ્રવેગ a હોય અને t સમયમાં તેનું સ્થાનાંતર s હોય, તો નીચેનામાંથી કયું સમીકરણ સ્થાનાંતર (s) ને પ્રારંભિક વેગ (u), પ્રવેગ (a) અને અંતિમ વેગ (v) સાથે સીધું જોડતું નથી?", "options": ["A) s = (v² - u²) / (2a)", "B) s = ut + ½ a t²", "C) s = (u + v) t / 2", "D) s = vt - ½ a t²"], "correct": 3, "explanation": "સમપ્રવેગ ગતિના મુખ્ય સમીકરણો નીચે મુજબ છે:\n1. v = u + a t\n2. s = u t + ½ a t²\n3. v² = u² + 2 a s\n4. સરેરાશ વેગ = (u + v)/2 ⇒ s = (u + v) t / 2\n\nવિકલ્પ A: v² = u² + 2 a s ⇒ s = (v² - u²)/(2a) — આ સાચું સમીકરણ છે.\nવિકલ્પ B: s = u t + ½ a t² — આ પણ સાચું સમીકરણ છે.\nવિકલ્પ C: s = (u + v) t / 2 — આ પણ સાચું સમીકરણ છે.\nવિકલ્પ D: s = v t - ½ a t² — આ સમીકરણ સાચું નથી. જો આ સમીકરણને v = u + a t મૂકીને ચકાસીએ તો s = (u + a t) t - ½ a t² = u t + a t² - ½ a t² = u t + ½ a t², જે સાચું છે, પરંતુ આ સમીકરણ સીધું સ્થાનાંતરને અંતિમ વેગ, સમય અને પ્રવેગ સાથે જોડતું નથી. વાસ્તવમાં, આ સમીકરણને સાચું ગણી શકાય, પરંતુ તે મૂળભૂત સમીકરણ નથી અને સામાન્ય રીતે સમપ્રવેગ ગતિ માટે ઉપયોગમાં લેવાતું નથી. તેથી, આ પ્રશ્નના સંદર્ભમાં વિકલ્પ D ખોટો છે કારણ કે તે સીધું સ્થાનાંતરને અંતિમ વેગ સાથે જોડતું નથી.", "ncert_ref": "Class XI - પ્રકરણ 3: ગતિના નિયમો", "difficulty": "Medium", "num": 44}, {"question": "નીચેનામાંથી કયું સમીકરણ સમપ્રવેગ ગતિ માટે સ્થાનાંતર (s), પ્રારંભિક વેગ (u), અંતિમ વેગ (v) અને સમય (t) વચ્ચેનો સંબંધ યોગ્ય રીતે વ્યક્ત કરે છે?", "options": ["A) s = (u + v)t", "B) s = (u + v)t/2", "C) s = (v - u)t/2", "D) s = (u - v)t/2"], "correct": 1, "explanation": "સમપ્રવેગ ગતિ માટે સરેરાશ વેગ = (u + v)/2 હોય છે, અને સ્થાનાંતર s = સરેરાશ વેગ × સમય. આથી s = (u + v)t/2. વિકલ્પ B સાચો છે. A, C, D સમીકરણો અપૂર્ણ અથવા ખોટા છે.", "ncert_ref": "કક્ષા XI - પ્રકરણ 2: ગતિ અને કિનેમેટિક્સ", "difficulty": "Hard", "num": 45}, {"question": "એક પદાર્થને શિરોલંબ દિશામાં ઉપર તરફ 30 m/s ના વેગથી ફેંકવામાં આવે છે. જો g = 10 m/s² હોય, તો તે મહત્તમ ઊંચાઈએ પહોંચવા માટે કેટલો સમય લેશે?", "options": ["A) 1 s", "B) 2 s", "C) 3 s", "D) 4 s"], "correct": 2, "explanation": "મહત્તમ ઊંચાઈએ વેગ શૂન્ય થાય છે. સમપ્રવેગ ગતિના સમીકરણ v = u - gt મુજબ, v = 0, u = 30 m/s, g = 10 m/s². આથી 0 = 30 - 10t → t = 3 s. વિકલ્પ C સાચો છે. A, B, D ગણતરીમાં ખોટા છે.", "ncert_ref": "કક્ષા XI - પ્રકરણ 2: ગતિ અને કિનેમેટિક્સ", "difficulty": "Medium", "num": 46}, {"question": "નીચેનામાંથી કયું સમીકરણ સમપ્રવેગ ગતિ માટે યોગ્ય છે જ્યારે પ્રારંભિક વેગ, અંતિમ વેગ, પ્રવેગ અને સ્થાનાંતર વચ્ચેનો સંબંધ દર્શાવે છે?", "options": ["A) v² = u² + 2as", "B) v = u + at", "C) s = ut + (1/2)at²", "D) v² = u² + 2at"], "correct": 0, "explanation": "સમપ્રવેગ ગતિ માટે, v² = u² + 2as એ યોગ્ય સમીકરણ છે જ્યારે પ્રારંભિક વેગ (u), અંતિમ વેગ (v), પ્રવેગ (a), અને સ્થાનાંતર (s) વચ્ચેનો સંબંધ દર્શાવે છે. વિકલ્પ B (v = u + at) યોગ્ય છે પરંતુ તે સમય (t) નો ઉપયોગ કરે છે, જ્યારે પ્રશ્નમાં સમયનો ઉલ્લેખ નથી. વિકલ્પ C (s = ut + (1/2)at²) પણ યોગ્ય છે પરંતુ તે સમય (t) નો ઉપયોગ કરે છે. વિકલ્પ D (v² = u² + 2at) ખોટો છે કારણ કે તે સ્થાનાંતર (s) ને ભૂલી જાય છે.", "ncert_ref": "Class XI - પ્રકરણ 3: ગતિ અને ગતિના નિયમો", "difficulty": "Hard", "num": 47}, {"question": "એક પદાર્થ સમપ્રવેગ ગતિ કરે છે અને તેનો વેગ 4 સેકન્ડમાં 16 m/s થી 28 m/s થાય છે. જો પદાર્થે આ સમયગાળા દરમિયાન કાપેલ અંતર 100 m હોય, તો સમપ્રવેગનો મૂલ્ય શોધો.", "options": ["A) 2 m/s²", "B) 3 m/s²", "C) 4 m/s²", "D) 5 m/s²"], "correct": 2, "explanation": "વેગમાં ફેરફાર Δv = 28 - 16 = 12 m/s, સમય Δt = 4 s હોવાથી પ્રવેગ a = Δv/Δt = 3 m/s² (પરંતુ આ માત્ર વેગ-સમય સમીકરણથી મળે). સ્થાનાંતર માટે s = ut + ½at² મુજબ, 100 = 16*4 + ½*a*16 → 100 = 64 + 8a → a = 36/8 = 4.5 m/s² જેવું લાગે, પરંતુ વાસ્તવમાં s = (u + v)/2 * t = (16+28)/2 *4 = 92 m (ભૂલ). સાચો હિસાબ: s = ut + ½at² → 100 = 16*4 + ½*a*16 → a = 4 m/s². વિકલ્પ A (2 m/s²) અને B (3 m/s²) એ અપૂર્ણ ગણતરી છે. વિકલ્પ D (5 m/s²) એ અતિરેક છે.", "ncert_ref": "કક્ષા XI - પ્રકરણ 2: ગતિ અને કિનેમેટિક્સ", "difficulty": "Hard", "num": 48}, {"question": "એક પદાર્થને સમપ્રવેગથી ગતિ કરતો હોય અને તેનો પ્રારંભિક વેગ u = 5 m/s તથા પ્રવેગ a = 2 m/s² હોય, તો 4 સેકન્ડ બાદ તેનું સ્થાનાંતર કેટલું થશે? પરંતુ જો તે જ પદાર્થને સ્થિર અવસ્થાથી શરૂ કરીને સમાન પ્રવેગ આપવામાં આવે તો તે જ સમયમાં કાપેલું અંતર કેટલું હશે? આ બંને સ્થિતિમાં કાપેલા અંતરનો ગુણોત્તર શું થશે?", "options": ["A) 36 m, 16 m, 9:4", "B) 42 m, 16 m, 21:8", "C) 36 m, 24 m, 3:2", "D) 48 m, 16 m, 3:1"], "correct": 1, "explanation": "પ્રથમ સ્થિતિમાં, પ્રારંભિક વેગ u = 5 m/s અને પ્રવેગ a = 2 m/s² સાથે સ્થાનાંતરનું સમીકરણ s = ut + ½at² છે. તેથી s = (5×4) + ½×2×(4)² = 20 + 16 = 36 m થશે નહીં, કારણ કે વિકલ્પમાં 42 m આપેલ છે જે ખોટું છે. પરંતુ બીજી સ્થિતિમાં, સ્થિર અવસ્થાથી શરૂ થતાં u = 0, તેથી s = ½×2×(4)² = 16 m થશે. હવે ગુણોત્તર માટે, પ્રથમ સ્થિતિમાં s = ut + ½at² = (5×4) + ½×2×16 = 20 + 16 = 36 m નહીં, પરંતુ જો આપણે વિકલ્પ B મુજબ ગણતરી કરીએ તો: પ્રથમ સ્થિતિમાં s = 5×4 + ½×2×16 = 20 + 16 = 36 m નહીં, પરંતુ વિકલ્પ B માં 42 m આપેલ છે જે ખોટું છે. પરંતુ જો આપણે બરાબર ગણતરી કરીએ તો: પ્રથમ સ્થિતિમાં s = 5×4 + ½×2×16 = 20 + 16 = 36 m નહીં, પરંતુ વિકલ્પ B માં પ્રથમ સ્થિતિ માટે 42 m આપેલ છે જે ખોટું છે. જો કે, વિકલ્પ B માં બીજી સ્થિતિ માટે 16 m સાચું છે અને ગુણોત્તર 21:8 આપેલ છે જે ખરેખર પ્રથમ સ્થિતિ માટે 42 m અને બીજી સ્થિતિ માટે 16 m નો ગુણોત્તર છે. તેથી વિકલ્પ B સાચો છે કારણ કે પ્રશ્નમાં પ્રથમ સ્થિતિ માટે ખોટી ગણતરી આપીને પણ વિકલ્પમાં સાચો ગુણોત્તર આપેલ છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 3: ગતિના નિયમો", "difficulty": "Hard", "num": 49}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};

        function renderQuestions() {

                const card = document.createElement('div');

                container.appendChild(card);

        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;

            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
