    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>

        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 જડત્વ આઘૂર્ણ – પરિભ્રમણમાં ફેરફારનો વિરોધ કરતો ગુણ.</span>

        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>

    <script>
        const questionsData = [{"question": "જડત્વ આઘૂર્ણ એટલે શું?", "options": ["A) પદાર્થની તેની સ્થિર અવસ્થા જાળવી રાખવાની પ્રવૃત્તિ", "B) પદાર્થની પરિભ્રમણની ગતિને બદલવાનો વિરોધ કરવો", "C) પદાર્થની રેખીય ગતિને વેગ આપવો", "D) પદાર્થની ઉર્જાને સંગ્રહિત કરવી"], "correct": 1, "explanation": "જડત્વ આઘૂર્ણ એ પદાર્થની પરિભ્રમણ ગતિને ફેરફારનો વિરોધ કરવાની પ્રવૃત્તિ છે. વિકલ્પ A સ્થિર અવસ્થા જાળવી રાખવાનો વર્ણવે છે, જે જડત્વના પહેલા નિયમ સાથે સંબંધિત છે. વિકલ્પ C રેખીય ગતિ સાથે સંબંધિત છે, જ્યારે વિકલ્પ D ઉર્જા સંગ્રહ સાથે સંબંધિત છે, જે જડત્વ આઘૂર્ણના મૂળ ભાવનાને વર્ણવતો નથી.", "ncert_ref": "Class XI - પ્રકરણ ૫: ગતિના નિયમો", "difficulty": "Easy", "num": 1}, {"question": "એક સમાન દળવાળા અને સમાન આકારના બે પદાર્થો A અને B છે. પદાર્થ A ની ત્રિજ્યા પદાર્થ B કરતાં દોઢ ગણી છે. જો બંને પદાર્થો એકસરખી કોણીય ઝડપે પરિભ્રમણ કરે છે, તો પદાર્થ A નો જડત્વ આઘૂર્ણ પદાર્થ B કરતાં કેટલો હશે?", "options": ["A) ૧.૫ ગણો", "B) ૨.૨૫ ગણો", "C) ૩.૩૭૫ ગણો", "D) ૪ ગણો"], "correct": 2, "explanation": "જડત્વ આઘૂર્ણ (I) નું સૂત્ર વર્તુળાકાર પદાર્થ માટે I = ½MR² છે. પદાર્થ A ની ત્રિજ્યા R_A = 1.5R_B છે. આથી, I_A = ½M(1.5R_B)² = ½M(2.25R_B²) = 2.25(½MR_B²) = 2.25I_B. પરંતુ વિકલ્પ B 2.25 ગણો છે, જે ખોટો છે કારણ કે સૂત્રમાં ½ ગુણાકાર છે. ખરેખર, I_A = (1.5)² I_B = 2.25 I_B. પરંતુ વર્તુળાકાર ડિસ્ક માટે I = ½MR², જ્યારે રિંગ માટે I = MR². અહીં સવાલમાં આકાર સ્પષ્ટ નથી, પરંતુ સામાન્ય રીતે જડત્વ આઘૂર્ણ માટે ત્રિજ્યાનો વર્ગ લેવામાં આવે છે. આથી, (1.5)² = 2.25, પરંતુ વિકલ્પ C 3.375 છે, જે (1.5)³ છે. ઉકેલ માટે, જો પદાર્થ વર્તુળાકાર ડિસ્ક હોય તો I ∝ R², આથી I_A = (1.5)² I_B = 2.25 I_B. પરંતુ વિકલ્પ B 2.25 છે, જે યોગ્ય જવાબ નથી કારણ કે સવાલમાં આકાર સ્પષ્ટ નથી. પરંતુ સામાન્ય રીતે, જડત્વ આઘૂર્ણ માટે R² નો ગુણોત્તર લેવામાં આવે છે. આથી, સૌથી નજીકનો વિકલ્પ C છે, પરંતુ તે ખોટો છે. ઉકેલ માટે, જો પદાર્થ રિંગ હોય તો I = MR², આથી I_A = (1.5)² I_B = 2.25 I_B. પરંતુ વિકલ્પ B 2.25 છે, જે યોગ્ય છે. પરંતુ સવાલમાં આકાર સ્પષ્ટ નથી, આથી સૌથી યોગ્ય જવાબ વિકલ્પ B છે.", "ncert_ref": "Class XI - પ્રકરણ ૫: ગતિના નિયમો", "difficulty": "Medium", "num": 2}, {"question": "જડત્વ આઘૂર્ણના સૂત્રમાં કયા પારિમાણિક પદનો સમાવેશ થાય છે?", "options": ["A) દળ અને વેગ", "B) દળ અને ત્રિજ્યા", "C) વેગ અને ત્રિજ્યા", "D) દળ, ત્રિજ્યા અને કોણીય વેગ"], "correct": 1, "explanation": "જડત્વ આઘૂર્ણનું સૂત્ર I = MR² છે, જેમાં M દળ અને R ત્રિજ્યા છે. વિકલ્પ A વેગનો સમાવેશ કરે છે, જે જડત્વ આઘૂર્ણના સૂત્રમાં નથી. વિકલ્પ C વેગ અને ત્રિજ્યાનો સમાવેશ કરે છે, પરંતુ દળનો નથી. વિકલ્પ D કોણીય વેગનો સમાવેશ કરે છે, જે જડત્વ આઘૂર્ણના સૂત્રમાં નથી.", "ncert_ref": "Class XI - પ્રકરણ ૫: ગતિના નિયમો", "difficulty": "Easy", "num": 3}, {"question": "એક પદાર્થની જડત્વ આઘૂર્ણ ૨ kg·m² છે. જો તેની ત્રિજ્યા અડધી કરવામાં આવે, તો નવી જડત્વ આઘૂર્ણ કેટલી હશે? (ધારો કે દળ અચળ છે)", "options": ["A) ૦.૫ kg·m²", "B) ૧ kg·m²", "C) ૨ kg·m²", "D) ૪ kg·m²"], "correct": 0, "explanation": "જડત્વ આઘૂર્ણ I = MR² છે. જો ત્રિજ્યા અડધી કરવામાં આવે, તો નવી ત્રિજ્યા R' = R/2 હશે. આથી, નવી જડત્વ આઘૂર્ણ I' = M(R/2)² = MR²/4 = I/4 = 2/4 = 0.5 kg·m². વિકલ્પ B, C, અને D ક્રમશઃ 1, 2, અને 4 kg·m² છે, જે ખોટા છે.", "ncert_ref": "Class XI - પ્રકરણ ૫: ગતિના નિયમો", "difficulty": "Medium", "num": 4}, {"question": "નીચેના પૈકી કયો પદાર્થ સૌથી ઓછો જડત્વ આઘૂર્ણ ધરાવે છે, જો તમામ પદાર્થોનું દળ અને ત્રિજ્યા સમાન હોય?", "options": ["A) ખાલી વર્તુળાકાર રિંગ", "B) ભરેલો વર્તુળાકાર ડિસ્ક", "C) ખાલી વર્તુળાકાર સિલિન્ડર", "D) ભરેલો વર્તુળાકાર સિલિન્ડર"], "correct": 1, "explanation": "જડત્વ આઘૂર્ણ પદાર્થના દળના વિતરણ પર આધાર રાખે છે. ખાલી વર્તુળાકાર રિંગ અને સિલિન્ડરમાં દળ ત્રિજ્યાથી દૂર વિતરિત થાય છે, જ્યારે ભરેલા વર્તુળાકાર ડિસ્ક અને સિલિન્ડરમાં દળ કેંદ્ર તરફ વિતરિત થાય છે. આથી, ભરેલો વર્તુળાકાર ડિસ્ક સૌથી ઓછો જડત્વ આઘૂર્ણ ધરાવે છે. વિકલ્પ A, C, અને D ખાલી અથવા ભરેલા સિલિન્ડર છે, જેનો જડત્વ આઘૂર્ણ ભરેલા ડિસ્ક કરતાં વધારે છે.", "ncert_ref": "Class XI - પ્રકરણ ૫: ગતિના નિયમો", "difficulty": "Hard", "num": 5}, {"question": "એક સમાન દળવાળી અને સમાન ત્રિજ્યાવાળી બે વર્તુળાકાર ડિસ્ક A અને B છે. ડિસ્ક A ની ત્રિજ્યા r છે અને તેની જડત્વ આઘૂર્ણ I_A = (1/2)Mr² છે. ડિસ્ક B ની જડત્વ આઘૂર્ણ I_B = Mr² છે. જો બંને ડિસ્કને સમાન ટોર્ક લાગુ પડે, તો કયા ડિસ્કનો કોણીય પ્રવેગ વધુ હશે?", "options": ["A) ડિસ્ક A, કારણ કે તેની જડત્વ આઘૂર્ણ ઓછી છે", "B) ડિસ્ક B, કારણ કે તેની જડત્વ આઘૂર્ણ વધુ છે", "C) બંને ડિસ્કનો કોણીય પ્રવેગ સમાન હશે", "D) કોણીય પ્રવેગ ટોર્ક પર નિર્ભર કરતો નથી"], "correct": 0, "explanation": "ટોર્ક (τ) અને જડત્વ આઘૂર્ણ (I) વચ્ચેનો સંબંધ τ = Iα છે, જ્યાં α કોણીય પ્રવેગ છે. જડત્વ આઘૂર્ણ ઓછી હોય, કોણીય પ્રવેગ વધુ હોય છે. ડિસ્ક A ની જડત્વ આઘૂર્ણ (1/2)Mr² છે, જ્યારે ડિસ્ક B ની જડત્વ આઘૂર્ણ Mr² છે. અહીં, I_A < I_B, તેથી ડિસ્ક A નો કોણીય પ્રવેગ વધુ હશે. વિકલ્પ B ખોટો છે કારણ કે વધુ જડત્વ આઘૂર્ણ વાળી ડિસ્કનો કોણીય પ્રવેગ ઓછો હશે. વિકલ્પ C ખોટો છે કારણ કે જડત્વ આઘૂર્ણ ભિન્ન હોવાથી કોણીય પ્રવેગ પણ ભિન્ન હશે. વિકલ્પ D ખોટો છે કારણ કે કોણીય પ્રવેગ ટોર્ક અને જડત્વ આઘૂર્ણ બંને પર નિર્ભર કરે છે.", "ncert_ref": "Class XI - પ્રકરણ ૭: કણોના નિયમ અને ઘર્ષણ", "difficulty": "Medium", "num": 6}, {"question": "એક લંબગોળ (સિલિન્ડર) અને એક ગોળાનું દળ સમાન છે. જો બંનેની ત્રિજ્યા સમાન હોય, તો કયાની જડત્વ આઘૂર્ણ ઓછી હશે?", "options": ["A) લંબગોળ, કારણ કે તેનો દળ વિતરણ ગોળા કરતાં અલગ છે", "B) ગોળો, કારણ કે તેનો દળ વિતરણ સમાનત્રિજ્યાથી થયેલો છે", "C) બંનેમાં જડત્વ આઘૂર્ણ સમાન હશે", "D) જડત્વ આઘૂર્ણ ત્રિજ્યા પર નિર્ભર કરતી નથી"], "correct": 1, "explanation": "લંબગોળની જડત્વ આઘૂર્ણ I = (1/2)Mr² હોય છે, જ્યારે ગોળાની જડત્વ આઘૂર્ણ I = (2/5)Mr² હોય છે. અહીં, (2/5)Mr² < (1/2)Mr², તેથી ગોળાની જડત્વ આઘૂર્ણ ઓછી હશે. વિકલ્પ A ખોટો છે કારણ કે લંબગોળની જડત્વ આઘૂર્ણ ગોળા કરતાં વધુ છે. વિકલ્પ C ખોટો છે કારણ કે જડત્વ આઘૂર્ણ આકાર પર નિર્ભર કરે છે. વિકલ્પ D ખોટો છે કારણ કે જડત્વ આઘૂર્ણ ત્રિજ્યા પર નિર્ભર કરે છે.", "ncert_ref": "Class XI - પ્રકરણ ૭: કણોના નિયમ અને ઘર્ષણ", "difficulty": "Medium", "num": 7}, {"question": "એક પદાર્થની જડત્વ આઘૂર્ણ ૫ kg·m² છે. જો તેના પર ૧૦ N·m નો ટોર્ક લાગુ પડે, તો તેનો કોણીય પ્રવેગ કેટલો હશે?", "options": ["A) ૨ rad/s²", "B) ૦.૫ rad/s²", "C) ૫ rad/s²", "D) ૧૦ rad/s²"], "correct": 0, "explanation": "ટોર્ક (τ) અને જડત્વ આઘૂર્ણ (I) વચ્ચેનો સંબંધ τ = Iα છે. અહીં, τ = 10 N·m અને I = 5 kg·m² છે. તેથી, α = τ / I = 10 / 5 = 2 rad/s². વિકલ્પ B, C, અને D ખોટા છે કારણ કે તેઓ ગણતરી સાથે મેળ ખાતા નથી.", "ncert_ref": "Class XI - પ્રકરણ ૭: કણોના નિયમ અને ઘર્ષણ", "difficulty": "Easy", "num": 8}, {"question": "નીચેના પૈકી કયો પદાર્થ સૌથી વધુ જડત્વ આઘૂર્ણ ધરાવે છે, જો તમામ પદાર્થોનું દળ અને ત્રિજ્યા સમાન હોય?", "options": ["A) વર્તુળાકાર રિંગ", "B) સોલિડ સિલિન્ડર", "C) સોલિડ ગોળો", "D) પાતળી વર્તુળાકાર ડિસ્ક"], "correct": 0, "explanation": "જડત્વ આઘૂર્ણ દળના વિતરણ પર નિર્ભર કરે છે. વર્તુળાકાર રિંગમાં દળ સંપૂર્ણપણે ત્રિજ્યાથી દૂર વિતરિત થયેલું હોય છે, જ્યારે સોલિડ સિલિન્ડર, સોલિડ ગોળો, અને પાતળી વર્તુળાકાર ડિસ્કમાં દળ ત્રિજ્યાથી નજીક વિતરિત થયેલું હોય છે. તેથી, વર્તુળાકાર રિંગની જડત્વ આઘૂર્ણ સૌથી વધુ હશે (I = Mr²). વિકલ્પ B (I = (1/2)Mr²), C (I = (2/5)Mr²), અને D (I = (1/2)Mr²) ખોટા છે કારણ કે તેઓ રિંગ કરતાં ઓછી જડત્વ આઘૂર્ણ ધરાવે છે.", "ncert_ref": "Class XI - પ્રકરણ ૭: કણોના નિયમ અને ઘર્ષણ", "difficulty": "Hard", "num": 9}, {"question": "એક પદાર્થની જડત્વ આઘૂર્ણ તેના દળ અને ત્રિજ્યાના વર્ગના ગુણોત્તર પર નિર્ભર કરે છે. જો એક પદાર્થનું દળ અડધું કરવામાં આવે અને તેની ત્રિજ્યા દુબળી કરવામાં આવે, તો તેની નવી જડત્વ આઘૂર્ણ મૂળ જડત્વ આઘૂર્ણની કેટલી ટકા હશે?", "options": ["A) ૫૦%", "B) ૧૨.૫%", "C) ૨૫%", "D) ૨૦૦%"], "correct": 1, "explanation": "જડત્વ આઘૂર્ણનું સૂત્ર I = kMr² છે, જ્યાં k એક અચળાંક છે. મૂળ જડત્વ આઘૂર્ણ I₁ = kMr² છે. નવું દળ M' = M/2 અને નવી ત્રિજ્યા r' = 2r છે. નવી જડત્વ આઘૂર્ણ I₂ = k(M/2)(2r)² = k(M/2)(4r²) = 2kMr² = 2I₁. પરંતુ પ્રશ્નમાં ત્રિજ્યા અડધી કરવાની વાત છે, તેથી r' = r/2. તો I₂ = k(M/2)(r/2)² = k(M/2)(r²/4) = (kMr²)/8 = I₁/8. પરંતુ પ્રશ્નમાં ત્રિજ્યા દુબળી કરવાની વાત છે, તેથી r' = 2r. તો I₂ = k(M/2)(2r)² = 2kMr² = 2I₁. પરંતુ પ્રશ્નમાં ત્રિજ્યા અડધી કરવાની વાત છે, તેથી સુધારેલ ગણતરી: I₂ = (1/2)M * (r/2)² = (1/2)M * r²/4 = (Mr²)/8 = I₁/8 = 12.5% of I₁. વિકલ્પ A, C, અને D ખોટા છે કારણ કે તેઓ ગણતરી સાથે મેળ ખાતા નથી.", "ncert_ref": "Class XI - પ્રકરણ ૭: કણોના નિયમ અને ઘર્ષણ", "difficulty": "Hard", "num": 10}, {"question": "એક સમાન દળ ધર ર્ણ સળી X કરતાં ચાર ગણું છે"], "correct": 1, "explanation": "સળી માટે જડત્વ આઘૂર્ણનું સૂત્ર I = (1/12)ML² છે જ્યારે તે કેન્દ્રમાંથી પસાર થતી અક્ષને અનુલક્ષીને પરિભ્રમણ કરે છે (સળી X). જ્યારે સળી એક છેડામાંથી પસાર થતી અક્ષને અનુલક્ષીને પરિભ્રમણ કરે છે (સળી Y), ત્યારે જડત્વ આઘૂર્ણનું સૂત્ર I = (1/3)ML² છે. આથી સળી Y નું જડત્વ આઘૂર્ણ સળી X કરતાં ચાર ગણું નહીં, પરંતુ ત્રણ ગણું વધુ છે. તેથી વિકલ્પ B સાચો છે, કારણ કે સળી Y નું જડત્વ આઘૂર્ણ વધુ છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 7: કણોની ગતિનું નિયમન", "difficulty": "Medium", "num": 31}, {"question": "નીચેનામાંથી કયા કિસ્સામાં પદાર્થનું જડત્વ આઘૂર્ણ સૌથી વધુ હશે? (બધા પદાર્થોનું દળ અને ત્રિજ્યા સમાન છે)", "options": ["A) પાતળી વલય (રિંગ) તેના સમતલને લંબ અક્ષને અનુલક્ષીને પરિભ્રમણ કરે છે", "B) ઘન ગોળો તેના વ્યાસને અનુલક્ષીને પરિભ્રમણ કરે છે", "C) પાતળી સળી તેના કેન્દ્રમાંથી પસાર થતી અને તેની લંબાઈને લંબ અક્ષને અનુલક્ષીને પરિભ્રમણ કરે છે", "D) પોલો નળાકાર (હોલો સિલિન્ડર) તેના કેન્દ્રીય અક્ષને અનુલક્ષીને પરિભ્રમણ કરે છે"], "correct": 0, "explanation": "પાતળી વલય (રિંગ) માટે જડત્વ આઘૂર્ણ I = MR² છે, જે અન્ય પદાર્થોના જડત્વ આઘૂર્ણ કરતાં વધુ છે. ઘન ગોળા માટે I = (2/5)MR², પાતળી સળી માટે I = (1/12)ML² (જ્યાં L = 2R), અને પોલા નળાકાર માટે I = MR² છે, પરંતુ વલયનું જડત્વ આઘૂર્ણ સૌથી વધુ છે. તેથી વિકલ્પ A સાચો છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 7: કણોની ગતિનું નિયમન", "difficulty": "Medium", "num": 32}, {"question": "એક પદાર્થ પરિભ્રમણ કરી રહ્યો છે અને તેના પર બાહ્ય બળઆઘૂર્ણ લાગુ પડે છે. નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) જડત્વ આઘૂર્ણમાં ફેરફાર થશે, પરંતુ કોણીય વેગમાન અચળ રહેશે", "B) કોણીય વેગમાનમાં ફેરફાર થશે, પરંતુ જડત્વ આઘૂર્ણ અચળ રહેશે", "C) જડત્વ આઘૂર્ણ અને કોણીય વેગમાન બંનેમાં ફેરફાર થશે", "D) જડત્વ આઘૂર્ણ અને કોણીય વેગમાન બંને અચળ રહેશે"], "correct": 1, "explanation": "બાહ્ય બળઆઘૂર્ણ લાગુ પડવાથી કોણીય વેગમાનમાં ફેરફાર થાય છે (τ = dL/dt), પરંતુ જડત્વ આઘૂર્ણ (I) પદાર્થના દળના વિતરણ અને અક્ષ પર નિર્ભર કરે છે, જે અચળ રહે છે જ્યાં સુધી પદાર્થની રચના બદલાતી નથી. વિકલ્પ A ખોટો છે કારણ કે જડત્વ આઘૂર્ણ અચળ રહે છે.             const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
