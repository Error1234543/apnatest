<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">

    <title>નીટ ક્વિઝ - ગતિના ગ્રાફ – Position-Time અને Velocity-Time ગ્રાફ દ્વારા ગતિ સમજવી</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 ગતિના ગ્રાફ – Position-Time અને Velocity-Time ગ્રાફ દ્વારા ગતિ સમજવી</span>
                <span>🎯 Mixed</span>
                <span>📝 49 પ્રશ્નો</span>

        <div class="button-group" id="buttonGroup">

            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>

    <script>
        const questionsData = [{"question": "એક વસ્તુનો સ્થાન-સમય ગ્રાફ (Position-Time Graph) સીધી રેખા છે જે X-અક્ષ સાથે 30°નો ખૂણો બનાવે છે. આ વસ્તુની ગતિ વિશે કયું વિધાન સાચું છે?", "options": ["A) વસ્તુ સ્થિર છે અને તેનું વેગમાન શૂન્ય છે.", "B) વસ્તુ સરળ રેખામાં એકસરખી ઝડપથી ગતિ કરે છે.", "C) વસ્તુ ત્વરિત ગતિમાં છે અને તેનો ત્વરણ સતત બદલાય છે.", "D) વસ્તુની ગતિ પરાવર્તનશીલ છે."], "correct": 1, "explanation": "સ્થાન-સમય ગ્રાફ સીધી રેખા હોવાનું સૂચવે છે કે સ્થાનમાં ફેરફાર સમય સાથે સરળ રીતે થાય છે, જે એકસરખી ઝડપ દર્શાવે છે. ખૂણો 30° હોવા છતાં, ગ્રાફની ઢાળ (સ્લોપ) સતત રહે છે, જે સૂચવે છે કે વેગમાન સતત છે. A) ખોટું છે કારણ કે વસ્તુ ગતિમાં છે. C) ખોટું છે કારણ કે ત્વરણ શૂન્ય છે (સરળ રેખા = સતત વેગમાન). D) ખોટું છે કારણ કે પરાવર્તનશીલ ગતિ માટે ગ્રાફ વક્ર હોવો જોઈએ.", "ncert_ref": "Class XI - પ્રકરણ ૨: ગતિ અને કિનેમેટિક્સ", "difficulty": "Easy", "num": 1}, {"question": "વેગમાન-સમય ગ્રાફ (Velocity-Time Graph)માં, ગ્રાફની ઢાળ શું દર્શાવે છે?", "options": ["A) સ્થાનમાં ફેરફાર", "B) વેગમાનમાં ફેરફાર", "C) ત્વરણ", "D) સમયમાં ફેરફાર"], "correct": 2, "explanation": "વેગમાન-સમય ગ્રાફની ઢાળ ત્વરણ દર્શાવે છે. ત્વરણ = Δv/Δt, જે ગ્રાફની ઢાળના સૂત્ર સાથે મેળ ખાય છે. A) સ્થાનમાં ફેરફાર સ્થાન-સમય ગ્રાફની ઢાળ દર્શાવે છે. B) વેગમાનમાં ફેરફાર ગ્રાફની ઊંચાઈમાં ફેરફાર દર્શાવે છે. D) સમયમાં ફેરફાર X-અક્ષ પર દર્શાવાય છે, ઢાળ નહીં.", "ncert_ref": "Class XI - પ્રકરણ ૨: ગતિ અને કિનેમેટિક્સ", "difficulty": "Easy", "num": 2}, {"question": "એક વસ્તુનો વેગમાન-સમય ગ્રાફ નીચે પ્રમાણે છે: પ્રથમ 2 સેકન્ડ સુધી વેગમાન 0થી 10 m/s સુધી વધે છે, પછી 2 સેકન્ડ સુધી સતત 10 m/s રહે છે, અને પછી 2 સેકન્ડમાં 0 થાય છે. આ ગ્રાફ હેઠળનો ક્ષેત્રફળ શું દર્શાવે છે?", "options": ["A) વસ્તુ દ્વારા કાપેલું કુલ અંતર", "B) વસ્તુનો સરેરાશ વેગમાન", "C) વસ્તુનું ત્વરણ", "D) વસ્તુની ગતિ દિશા"], "correct": 0, "explanation": "વેગમાન-સમય ગ્રાફ હેઠળનો ક્ષેત્રફળ વસ્તુ દ્વારા કાપેલું કુલ અંતર દર્શાવે છે. આ ક્ષેત્રફળનો અર્થ Δx = ∫v dt છે. B) સરેરાશ વેગમાન કુલ અંતર અને કુલ સમયના ગુણોત્તરથી મેળવી શકાય, પરંતુ ક્ષેત્રફળ નહીં. C) ત્વરણ ગ્રાફની ઢાળ દર્શાવે છે. D) ગતિ દિશા વેગમાનના ચિહ્નથી નક્કી થાય છે, ક્ષેત્રફળ નહીં.", "ncert_ref": "Class XI - પ્રકરણ ૨: ગતિ અને કિનેમેટિક્સ", "difficulty": "Medium", "num": 3}, {"question": "એક વસ્તુનો સ્થાન-સમય ગ્રાફ વક્ર રેખા છે જે ઉપરની તરફ વક્રિત છે (Concave Up). આ વિશે કયું વિધાન સાચું છે?", "options": ["A) વસ્તુનું ત્વરણ ઋણ છે.", "B) વસ્તુનું ત્વરણ ધન છે.", "C) વસ્તુ સ્થિર છે.", "D) વસ્તુની ગતિ સરળ હાર્મોનિક છે."], "correct": 1, "explanation": "સ્થાન-સમય ગ્રાફ વક્ર રેખા ઉપરની તરફ વક્રિત હોવાનું સૂચવે છે કે ગ્રાફની ઢાળ (વેગમાન) સમય સાથે વધી રહી છે, જે ધન ત્વરણ દર્શાવે છે. A) ઋણ ત્વરણ માટે ગ્રાફ નીચેની તરફ વક્રિત હોવો જોઈએ. C) સ્થિર વસ્તુ માટે ગ્રાફ સીધી રેખા હોવી જોઈએ જે X-અક્ષને સમાંતર હોય. D) સરળ હાર્મોનિક ગતિ માટે ગ્રાફ સાઇન અથવા કોસાઇન વક્ર હોવો જોઈએ.", "ncert_ref": "Class XI - પ્રકરણ ૨: ગતિ અને કિનેમેટિક્સ", "difficulty": "Hard", "num": 4}, {"question": "નીચેના પૈકી કયા કિસ્સામાં વેગમાન-સમય ગ્રાફની ઢાળ શૂન્ય હશે?", "options": ["A) વસ્તુ સરળ રેખામાં એકસરખી ઝડપથી ગતિ કરે છે.", "B) વસ્તુ સ્થિર છે.", "C) વસ્તુ ત્વરિત ગતિમાં છે અને તેનો વેગમાન સતત બદલાય છે.", "D) વસ્તુની ગતિ પરાવર્તનશીલ છે."], "correct": 0, "explanation": "વેગમાન-સમય ગ્રાફની ઢાળ શૂન્ય હોવાનું સૂચવે છે કે ત્વરણ શૂન્ય છે, જે એકસરખી ઝડપથી ગતિ કરતી વસ્તુ માટે સાચું છે. A) સાચું છે કારણ કે એકસરખી ઝડપથી ગતિ કરતી વસ્તુનું ત્વરણ શૂન્ય હોય છે. B) સ્થિર વસ્તુ માટે વેગમાન શૂન્ય હોય છે, પરંતુ ગ્રાફની ઢાળ અસ્તિત્વમાં નહીં હોય. C) ત્વરિત ગતિમાં ઢાળ શૂન્ય નહીં હોય. D) પરાવર્તનશીલ ગતિ માટે ઢાળ બદલાતી રહે છે.", "ncert_ref": "Class XI - પ્રકરણ ૨: ગતિ અને કિનેમેટિક્સ", "difficulty": "Medium", "num": 5}, {"question": "એક વાહનનો સ્થાન-સમય ગ્રાફ આકૃતિમાં દર્શાવેલ છે. ગ્રાફના કયા વિભાગમાં વાહનનું પ્રવેગ ઋણ છે? (આકૃતિ: સમય અક્ષ પર 0 થી 2 સેકન્ડ સુધી સીધી રેખા ઉપર તરફ, 2 થી 4 સેકન્ડ સુધી સમક્ષિતિજ રેખા, 4 થી 6 સેકન્ડ સુધી સીધી રેખા નીચે તરફ)", "options": ["A) 0 થી 2 સેકન્ડ", "B) 2 થી 4 સેકન્ડ", "C) 4 થી 6 સેકન્ડ", "D) 0 થી 4 સેકન્ડ"], "correct": 2, "explanation": "સ્થાન-સમય ગ્રાફમાં વક્રની વક્રતા પ્રવેગ દર્શાવે છે. જ્યારે ગ્ Hard", "num": 22}, {"question": "એક કણનો વેગ-સમય ગ્રાફ નીચે પ્રમાણે છે: 0 થી 4 સેકન્ડ સુધી વેગ 0 થી 20 m/s સુધી સરળ રેખીય રીતે વધે છે, 4 થી 6 સેકન્ડ સુધી વેગ સતત 20 m/s રહે છે, અને 6 થી 8 સેકન્ડ સુધી વેગ 20 m/s થી 0 સુધી સરળ રેખીય રીતે ઘટે છે. આ ગ્રાફ હેઠળનો કુલ ક્ષેત્રફળ શું દર્શાવે છે?", "options": ["A) કુલ સ્થાનાંતર", "B) કુલ અંતર", "C) કુલ પ્રવેગ", "D) કુલ સમય"], "correct": 1, "explanation": "વેગ-સમય ગ્રાફ હેઠળનો ક્ષેત્રફળ કુલ અંતર દર્શાવે છે, ભલે ગતિની દિશા કોઈપણ હોય. સ્થાનાંતર વેક્ટર રાશિ છે અને તે ગ્રાફના ક્ષેત્રફળના ચિહ્ન (ધન/ઋણ) પર આધારિત છે, પરંતુ અંતર સ્કેલર રાશિ છે અને તે હંમેશા ધન ક્ષેત્રફળ દર્શાવે છે. C) પ્રવેગ ગ્રાફની ઢાળ દર્શાવે છે, D) સમય X-અક્ષ પર છે.", "ncert_ref": "Class XI - પ્રકરણ 3: ગતિ અને કિનેમેટિક્સ", "difficulty": "Medium", "num": 23}, {"question": "એક વસ્તુનો સ્થાન-સમય ગ્રાફ (x-t ગ્રાફ) નીચે પ્રમાણે છે: 0 થી 2 સેકન્ડ સુધી સ્થાન 0 થી 10 m સુધી સરળ રેખીય રીતે વધે છે, 2 થી 4 સેકન્ડ સુધી સ્થાન સતત 10 m રહે છે, અને 4 થી 6 સેકન્ડ સુધી સ્થાન 10 m થી 0 સુધી સરળ રેખીય રીતે ઘટે છે. આ ગતિ દરમિયાન વસ્તુનો મહત્તમ વેગ કેટલો હશે?", "options": ["A) 5 m/s", "B) 10 m/s", "C) 0 m/s", "D) 20 m/s"], "correct": 0, "explanation": "સ્થાન-સમય ગ્રાફની ઢાળ વેગ દર્શાવે છે. 0 થી 2 સેકન્ડ સુધી ઢાળ = (10-0)/(2-0) = 5 m/s, 2 થી 4 સેકન્ડ સુધી ઢાળ = 0 (સ્થાન સતત), 4 થી 6 સેકન્ડ સુધી ઢાળ = (0-10)/(6-4) = -5 m/s. મહત્તમ વેગનો મૂલ્ય 5 m/s છે (ચિહ્ન ધ્યાનમાં લેતા નહીં). B) 10 m/s ખોટો ગણિતીય નિકાલ, C) 0 m/s ફક્ત મધ્ય ભાગ માટે સાચું, D) 20 m/s અતિરેખિત મૂલ્ય.", "ncert_ref": "Class XI - પ્રકરણ 3: ગતિ અને કિનેમેટિક્સ", "difficulty": "Easy", "num": 24}, {"question": "નીચેના વિધાનો પૈકી કયું સ્થાન-સમય ગ્રાફ (x-t ગ્રાફ) અને વેગ-સમય ગ્રાફ (v-t ગ્રાફ) બંને માટે સાચું છે?", "options": ["A) બંને ગ્રાફની ઢાળનો એકમ m/s² છે", "B) x-t ગ્રાફની ઢાળ વેગ દર્શાવે છે અને v-t ગ્રાફની ઢાળ પ્રવેગ દર્શાવે છે", "C) x-t ગ્રાફનો X-અંતરછેદ સ્થાન દર્શાવે છે અને v-t ગ્રાફનો X-અંતરછેદ વેગ દર્શાવે છે", "D) બંને ગ્રાફ હેઠળનો ક્ષેત્રફળ સ્થાનાંતર દર્શાવે છે"], "correct": 1, "explanation": "A) x-t ગ્રાફની ઢાળનો એકમ m/s (વેગ) છે, v-t ગ્રાફની ઢાળનો એકમ m/s² (પ્રવેગ) છે. B) સાચું: x-t ગ્રાફની ઢાળ = વેગ, v-t ગ્રાફની ઢાળ = પ્રવેગ. C) X-અંતરછેદ હંમેશા સમય t=0 પરનું મૂલ્ય દર્શાવે છે, પરંતુ x-t ગ્રાફ માટે તે પ્રારંભિક સ્થાન છે, જ્યારે v-t ગ્રાફ માટે તે પ્રારંભિક વેગ છે (સ્થાન નહીં). D) x-t ગ્રાફ હેઠળનો ક્ષેત્રફળ કોઈ ભૌતિક અર્થ ધરાવતો નથી, જ્યારે v-t ગ્રાફ હેઠળનો ક્ષેત્રફળ અંતર દર્શાવે છે.", "ncert_ref": "Class XI - પ્રકરણ 3: ગતિ અને કિનેમેટિક્સ", "difficulty": "Hard", "num": 25}, {"question": "એક કણનો સ્થાન-સમય (x-t) ગ્રાફ આકૃતિમાં દર્શાવ્યા પ્રમાણે છે: 0 થી t₁ સમય સુધી ગ્રાફ ઉપરની તરફ વક્રિત છે, ત્યારબાદ t₁ થી t₂ સમય સુધી ગ્રાફ નીચેની તરફ વક્રિત છે. આ ગ્રાફના આધારે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) કણનો પ્રવેગ 0 થી t₁ સમય દરમિયાન ધન અને t₁ થી t₂ સમય દરમિયાન ઋણ છે", "B) કણનો પ્રવેગ 0 થી t₁ સમય દરમિયાન વધતો જાય છે અને t₁ થી t₂ સમય દરમિયાન ઘટતો જાય છે", "C) કણનો વેગ 0 થી t₁ સમય દરમિયાન વધતો જાય છે અને t₁ થી t₂ સમય દરમિયાન ઘટતો જાય છે", "D) કણનો પ્રવેગ 0 થી t₁ સમય દરમિયાન વધતો જાય છે અને t₁ થી t₂ સમય દરમિયાન વધતો જ રહે છે"], "correct": 2, "explanation": "સ્થાન-સમય ગ્રાફ ઉપરની તરફ વક્રિત હોય ત્યારે પ્રવેગ ધન હોય છે અને વેગ વધતો જાય છે. જ્યારે ગ્રાફ નીચેની તરફ વક્રિત હોય ત્યારે પ્રવેગ ઋણ હોય છે અને વેગ ઘટતો જાય છે. વિકલ્પ A ખોટો છે કારણ કે પ્રવેગનું ચિહ્ન બદલાય છે, માત્ર મૂલ્ય નહીં. વિકલ્પ B ખોટો છે કારણ કે પ્રવેગનું મૂલ્ય બદલાતું નથી, માત્ર ચિહ્ન બદલાય છે. વિકલ્પ D ખોટો છે કારણ કે t₁ થી t₂ દરમિયાન પ્રવેગ ઋણ હોય છે અને ઘટતો જાય છે. વિકલ્પ C સાચો છે કારણ કે વેગ 0 થી t₁ દરમિયાન વધે છે અને t₁ થી t₂ દરમિયાન ઘટે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 3: ગતિના નિયમો", "difficulty": "Hard", "num": 26}, {"question": "એક કણનો સ્થાન-સમય (x-t) ગ્રાફ સમય અક્ષ સાથે 60° નો ખૂણો બનાવતી સીધી રેખા છે. જો સમય અક્ષ પર એક એકમ = 1 સેકન્ડ અને સ્થાન અક્ષ પર એક એકમ = 2 મીટર હોય, તો કણનો વેગ કેટલો હશે?", "options": ["A) 1 m/s", "B) 2 m/s", "C) √3 m/s", "D) 2√3 m/s"], "correct": 2, "explanation": "સ્થાન-સમય ગ્રાફની ઢાળ વેગ દર્શાવે છે. ઢાળ = tan(60°) = √3. સ્થાન અક્ષ પર એક એકમ = 2 મીટર હોવાથી, વેગ = ઢાળ × (સ્થાન એકમ/સમય એકમ) = √3 × (2/1) = 2√3 m/s. વિકલ્પ A, B અને C ખોટા છે કારણ કે તેઓ એકમોને યોગ્ય રીતે ધ્યાનમાં લેતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 3: ગતિના નિયમો", "difficulty": "Medium", "num": 27}, {"question": "નીચેનામાંથી કયા કિસ્સામાં વેગ-સમય (v-t) ગ્રાફ સમય અક્ષને સ્પર્શે છે પરંતુ તેને છેદતો નથી?", "options": ["A) જ્યારે વસ્તુ અચળ પ્રવેગથી ગતિ કરે છે", "B) જ્યારે વસ્તુનો પ્રારંભિક વેગ શૂન્ય હોય અને પ્રવેગ ધન હોય", "C) જ્યારે વસ્તુનો વેગ એક ક્ષણ માટે શૂન્ય થાય પરંતુ પ્રવેગ શૂન્ય ન હોય", "D) જ્યારે વસ્તુનો પ્રવેગ શૂન્ય હોય અને વેગ અચળ હોય"], "correct": 2, "explanation": "વેગ-સમય ગ્રાફ સમય અક્ષને સ્પર્શે છે પરંતુ છેદતો નથી તેનો અર્થ છે કે વેગ એક ક્ષણ માટે શૂન્ય થાય છે પરંતુ પ્રવેગ શૂન્ય નથી. આ પરિસ્થિતિ વિકલ્પ C માં વર્ણવેલ છે. વિકલ્પ A ખોટો છે કારણ કે અચળ પ્રવેગથી ગતિ કરતી વસ્તુનો v-t ગ્રાફ સીધી રેખા હોય છે જે સમય અક્ષને છેદે છે. વિકલ્પ B ખોટો છે કારણ કે પ્રારંભિક વેગ શૂન્ય હોય તો ગ્રાફ ઉદ્ગમ બિંદુમાંથી પસાર થાય છે. વિકલ્પ D ખોટો છે કારણ કે અચળ વેગ માટે ગ્રાફ સમય અક્ષને સમાંતર હોય છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 3: ગતિના નિયમો", "difficulty": "Hard", "num": 28}, {"question": "એક કણનો વેગ-સમય (v-t) ગ્રાફ નીચે પ્રમાણે છે: 0 થી 3 સેકન્ડ સુધી વેગ રેખીય રીતે 0 થી 12 m/s વધે છે, ત્યારબાદ 3 થી 5 સેકન્ડ સુધી વેગ અચળ રહે છે. આ ગ્રાફના આધારે કણનો સરેરાશ પ્રવેગ કેટલો હશે?", "options": ["A) 2.4 m/s²", "B) 3 m/s²", "C) 4 m/s²", "D) 6 m/s²"], "correct": 0, "explanation": "સરેરાશ પ્રવેગ = કુલ વેગમાં ફેરફાર / કુલ સમય. કુલ વેગમાં ફેરફાર = 12 - 0 = 12 m/s. કુલ સમય = 5 સેકન્ડ. સરેરાશ પ્રવેગ = 12 / 5 = 2.4 m/s². વિકલ્પ B, C અને D ખોટા છે કારણ કે તેઓ યોગ્ય ગણતરી ધ્યાનમાં લેતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 3: ગતિના નિયમો", "difficulty": "Easy", "num": 29}, {"question": "એક કણનો સ્થાન-સમય (x-t) ગ્રાફ નીચે પ્રમાણે છે: પ્રથમ 2 સેકન્ડ સુધી ગ્રાફ સમય-અક્ષ સાથે 30° નો ખૂણો બનાવે છે અને પછીના 2 સેકન્ડ સુધી ગ્રાફ સમય-અક્ષ સાથે સમાંતર રહે છે. આ ગ્રાફના આધારે, કણના પ્રવેગ વિશે કયું વિધાન સાચું છે?", "options": ["A) પ્રથમ 2 સેકન્ડ સુધી પ્રવેગ શૂન્ય છે અને પછીના 2 ંતર દર્શાવે છે"], "correct": 3, "explanation": "સાચો જવાબ D છે. સ્થાન-સમય ગ્રાફમાં ગ્રાફ અને સમય અક્ષ વચ્ચેનું ક્ષેત્રફળ કોઈ ભૌતિક રાશિ દર્શાવતું નથી, તે માત્ર ગાણિતિક ક્ષેત્રફળ છે. વિકલ્પ A સાચો છે કારણ કે સમક્ષિતિજ રેખા સ્થિર અવસ્થા દર્શાવે છે. વિકલ્પ B અને C સાચા છે કારણ કે 45° નો ખૂણો અચળ વેગ દર્શાવે છે, જેનો અર્થ પ્રવેગ શૂન્ય છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 3: ગતિના નિયમો", "difficulty": "Medium", "num": 34}, {"question": "એક કણનો સ્થાન-સમય (x-t) ગ્રાફ સમય અક્ષ સાથે 30° નો ખૂણો બનાવતી સીધી રેખા છે. જો કણનું પ્રારંભિક સ્થાન 5 m હોય અને 4 સેકન્ડ પછી તેનું સ્થાન 15 m હોય, તો કણનો વેગ કેટલો હશે?", "options": ["A) 2.5 m/s", "B) 5 m/s", "C) 7.5 m/s", "D) 10 m/s"], "correct": 1, "explanation": "સ્થાન-સમય ગ્રાફની ઢાળ વેગ દર્શાવે છે. પ્રારંભિક સ્થાન (x₁) = 5 m, અંતિમ સ્થાન (x₂) = 15 m, સમય (t) = 4 s. વેગ (v) = (x₂ - x₁)/t = (15 - 5)/4 = 10/4 = 2.5 m/s. પરંતુ ગ્રાફની ઢાળ tan(30°) = 1/√3 ≈ 0.577 છે, જે 2.5 m/s ને અનુરૂપ નથી. ઉલ્લેખનીય છે કે ગ્રાફની ઢાળ વેગ છે, અને અહીં (15-5)/4 = 2.5 m/s મળે છે. પરંતુ tan(30°) = વેગ/1 (સ્કેલ ફેક્ટર) હોવાથી, વેગ = tan(30°) * સ્કેલ ફેક્ટર. અહીં સ્કેલ ફેક્ટર 4.33 (≈5/√3) હોવાથી, વેગ = 2.5 m/s જ સાચો ઉત્તર છે. બાકીના વિકલ્પો (5, 7.5, 10) ગણતરી સાથે મેળ ખાતા નથી.", "ncert_ref": "Class XI - પ્રકરણ 3: ગતિ અને કાયદા", "difficulty": "Medium", "num": 35}, {"question": "વેગ-સમય (v-t) ગ્રાફમાં, ગ્રાફ અને સમય અક્ષ વચ્ચેનો ક્ષેત્રફળ શું દર્શાવે છે?", "options": ["A) સ્થાનાંતર", "B) વેગમાન", "C) પ્રવેગ", "D) બળ"], "correct": 0, "explanation": "વેગ-સમય ગ્રાફ અને સમય અક્ષ વચ્ચેનો ક્ષેત્રફળ સ્થાનાંતર દર્શાવે છે. વેગમાન (B) ગ્રાફની ઊંચાઈ દર્શાવે છે, પ્રવેગ (C) ગ્રાફની ઢાળ દર્શાવે છે, અને બળ (D) ન્યૂટનના બીજા નિયમ મુજબ m*a છે, જે અહીં લાગુ પડતું નથી.", "ncert_ref": "Class XI - પ્રકરણ 3: ગતિ અને કાયદા", "difficulty": "Easy", "num": 36}, {"question": "એક કણનો સ્થાન-સમય ગ્રાફ (x-t) નીચે પ્રમાણે છે: પ્રથમ 2 સેકન્ડ સુધી ગ્રાફ સીધી રેખા છે જે X-અક્ષ સાથે 45° નો ખૂણો બનાવે છે, અને પછી 2 થી 4 સેકન્ડ સુધી ગ્રાફ સમક્ષિતિજ રેખા છે. આ કિસ્સામાં, કણનો વેગ કયા સમયગા         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
