<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - બીજો નિયમ – ઉષ્માનો પ્રવાહ હંમેશા ઊંચા તાપમાનથી નીચા તાપમાન તરફ થાય છે.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 બીજો નિયમ – ઉષ્માનો પ્રવાહ હંમેશા ઊંચા તાપમાનથી નીચા તાપમાન તરફ થાય છે.</span>
                <span>🎯 Mixed</span>
                <span>📝 49 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "ઉષ્માનો પ્રવાહ ક્યાંથી ક્યાં સુધી થાય છે?", "options": ["A) નીચા તાપમાનથી ઊંચા તાપમાન તરફ", "B) ઊંચા તાપમાનથી નીચા તાપમાન તરફ", "C) સમાન તાપમાન વાળા બે પદાર્થો વચ્ચે", "D) કોઈપણ દિશામાં, તાપમાનની પરવા કર્યા વગર"], "correct": 1, "explanation": "બીજો નિયમ કહે છે કે ઉષ્મા હંમેશા ઊંચા તાપમાનથી નીચા તાપમાન તરફ પ્રવાહિત થાય છે. ઓપ્શન A એ નિયમની વિરુદ્ધ છે, ઓપ્શન C અને D એ નિયમના મૂળ સિદ્ધાંતને અવગણે છે.", "ncert_ref": "Class XI - પ્રકરણ 12: ઉષ્માગતિ (Thermodynamics)", "difficulty": "Easy", "num": 1}, {"question": "જો બે પદાર્થો વચ્ચે તાપમાનનો તફાવત ન હોય, તો ઉષ્માનો પ્રવાહ કેવી રીતે થશે?", "options": ["A) ઊંચા તાપમાનથી નીચા તાપમાન તરફ", "B) નીચા તાપમાનથી ઊંચા તાપમાન તરફ", "C) કોઈ પ્રવાહ થશે નહીં", "D) બંને દિશામાં સરખા પ્રમાણમાં થશે"], "correct": 2, "explanation": "બીજો નિયમ અનુસાર, ઉષ્મા પ્રવાહ માટે તાપમાનનો તફાવત જરૂરી છે. જો તાપમાન સરખું હોય, તો ઉષ્માનો પ્રવાહ થતો નથી. ઓપ્શન A, B, અને D એ નિયમની ખોટી સમજૂતી આપે છે.", "ncert_ref": "Class XI - પ્રકરણ 12: ઉષ્માગતિ (Thermodynamics)", "difficulty": "Medium", "num": 2}, {"question": "નીચેના પૈકી કયું ઉદાહરણ ઉષ્માના પ્રવાહના બીજા નિયમને સાચવે છે?", "options": ["A) ફ્રિજમાંથી બહાર નીકળતી ગરમ હવા", "B) ગરમ ચહા કપમાંથી ઠંડા હવામાં ઉષ્માનો પ્રવાહ", "C) સૂર્યપ્રકાશથી પૃથ્વી પર ઉષ્માનો પ્રવાહ", "D) બરફ પર ગરમ પાણી રેડવાથી બરફનું પીગળવું"], "correct": 2, "explanation": "સૂર્યપ્રકાશથી પૃથ્વી પર ઉષ્માનો પ્રવાહ ઊંચા તાપમાન (સૂર્ય) થી નીચા તાપમાન (પૃથ્વી) તરફ થાય છે, જે બીજા નિયમને અનુરૂપ છે. ઓપ્શન A, B, અને D એ પ્રક્રિયાઓ છે જેમાં ઉષ્માનો પ્રવાહ વિરુદ્ધ દિશામાં અથવા અન્ય પરિબળો દ્વારા થાય છે.", "ncert_ref": "Class XI - પ્રકરણ 12: ઉષ્માગતિ (Thermodynamics)", "difficulty": "Medium", "num": 3}, {"question": "અવકાશમાં ઉષ્માનો પ્રવાહ કેવી રીતે થાય છે?", "options": ["A) કંઈક પણ થતો નથી, કારણ કે અવકાશમાં વાયુ નથી", "B) ઊંચા તાપમાનથી નીચા તાપમાન તરફ, વિકિરણ દ્વારા", "C) નીચા તાપમાનથી ઊંચા તાપમાન તરફ, વહન દ્વારા", "D) ફક્ત ગુરુત્વાકર્ષણના પ્રભાવ હેઠળ થાય છે"], "correct": 1, "explanation": "અવકાશમાં ઉ  પ્રકરણ 11: ઉષ્મીય ગુણધર્મો અને ઉષ્મા", "difficulty": "Medium", "num": 24}, {"question": "એક વિજ્ઞાનિક એક એવું ઉપકરણ બનાવવાનો દાવો કરે છે જે ઉષ્માને નીચા તાપમાનવાળા પદાર્થમાંથી ઉચ્ચ તાપમાનવાળા પદાર્થ તરફ સતત વહન કરી શકે છે, બાહ્ય કાર્ય કર્યા વિના. આ ઉપકરણનું અસ્તિત્વ ઉષ્માના કયા નિયમનું ઉલ્લંઘન કરે છે?", "options": ["A) ઉષ્માનો પ્રથમ નિયમ (ઉર્જા સંરક્ષણનો નિયમ)", "B) ઉષ્માનો બીજો નિયમ (એન્ટ્રોપીનો નિયમ)", "C) ઉષ્માનો શૂન્યમો નિયમ (ઉષ્મીય સંતુલનનો નિયમ)", "D) ઉષ્માનો ત્રીજો નિયમ (શૂન્ય તાપમાનનો નિયમ)"], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે કારણ કે ઉષ્માનો બીજો નિયમ જણાવે છે કે ઉષ્મા હંમેશા ઉચ્ચ તાપમાનથી નીચા તાપમાન તરફ વહે છે, અને બાહ્ય કાર્ય કર્યા વિના ઉષ્માને નીચા તાપમાનથી ઉચ્ચ તાપમાન તરફ વહન કરવું અશક્ય છે. આ ઉપકરણ બીજા નિયમનું ઉલ્લંઘન કરે છે. વિકલ્પ A ખોટો છે કારણ કે પ્રથમ નિયમ ઉર્જા સંરક્ષણ સાથે સંબંધિત છે, જે અહીં લાગુ પડતું નથી. વિકલ્પ C ખોટો છે કારણ કે શૂન્યમો નિયમ ઉષ્મીય સંતુલન સાથે સંબંધિત છે. વિકલ્પ D ખોટો છે કારણ કે ત્રીજો નિયમ શૂન્ય તાપમાન સાથે સંબંધિત છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 12: ઉષ્માગતિશાસ્ત્ર", "difficulty": "Hard", "num": 25}, {"question": "એક ઉષ્મીય રીતે અલગ પડેલ સિસ્ટમમાં, બે પદાર્થો A અને B વચ્ચે ઉષ્માનો પ્રવાહ થાય છે. જો પદાર્થ Aનું તાપમાન 80°C અને પદાર્થ Bનું તાપમાન 30°C હોય, તો ઉષ્માનો પ્રવાહ ક્યાંથી ક્યાં તરફ થશે?", "options": ["A) પદાર્થ A થી પદાર્થ B તરફ", "B) પદાર્થ B થી પદાર્થ A તરફ", "C) બંને પદાર્થો વચ્ચે કોઈ ઉષ્મા પ્રવાહ થશે નહીં", "D) ઉષ્માનો પ્રવાહ બંને દિશામાં સરખા પ્રમાણમાં થશે"], "correct": 0, "explanation": "બીજા નિયમ અનુસાર, ઉષ્માનો પ્રવાહ હંમેશા ઉચ્ચ તાપમાનથી નીચા તાપમાન તરફ થાય છે. અહીં, પદાર્થ Aનું તાપમાન (80°C) પદાર્થ B કરતાં ઉચ્ચ છે, તેથી ઉષ્માનો પ્રવાહ A થી B તરફ થશે. વિકલ્પ B, C, અને D બીજા નિયમના સિદ્ધાંતનો ભંગ કરે છે.", "ncert_ref": "Class XI - પ્રકરણ 12: ઉષ્માગતિ (Thermodynamics)", "difficulty": "Easy", "num": 26}, {"question": "નીચેના કથનોમાંથી કયું ઉષ્માના બીજા નિયમના સિદ્ધાંતને સૌથી યોગ્ય રીતે વ્યાખ્યાયિત કરે છે?", "options": ["A) ઉષ્મા એ એક પ્રકારની ઊર્જા છે જે કામમાં રૂપાંતરિત થઈ શકે છે.", "B) ઉષ્માનો પ્રવાહ હંમેશા ઉચ્ચ તાપમાનથી નીચા તાપમાન તરફ થાય છે.", "C) ઉષ્મીય સંતુલનમાં રહેલી સિસ્ટમની એન્ટ્રોપી સતત ઘટતી જાય છે.", "D) ઉષ્મીય યંત્રની કાર્યક્ષમતા 100% હોવી શક્ય છે."], "correct": 1, "explanation": "બીજા નિયમ અનુસાર, ઉષ્માનો પ્રવાહ હંમેશા ઉચ્ચ તાપમાનથી નીચા તાપમાન તરફ થાય છે. વિકલ્પ A પ્રથમ નિયમને વ્યાખ્યાયિત કરે છે, વિકલ્પ C એન્ટ્રોપીના નિયમને ખોટી રીતે રજૂ કરે છે (એન્ટ્રોપી વધે છે, ઘટતી નથી), અને વિકલ્પ D બીજા નિયમના ઉલ્લંઘન તરફ દોરે છે (100% કાર્યક્ષમતા અશક્ય છે).", "ncert_ref": "Class XI - પ્રકરણ 12: ઉષ્માગતિ (Thermodynamics)", "difficulty": "Easy", "num": 27}, {"question": "એક વિદ્યાર્થી એક બીકરમાં 50°C તાપમાનવાળું પાણી લે છે અને તેમાં 0°C તાપમાનવાળો બરફનો ટુકડો નાખે છે. થોડી વાર પછી, બરફ પીગળી જાય છે અને પાણીનું તાપમાન ઘટે છે. આ પ્રક્રિયામાં ઉષ્માનો પ્રવાહ કેવી રીતે થાય છે?", "options": ["A) પાણીથી બરફ તરફ, કારણ કે બરફનું તાપમાન પાણી કરતાં નીચું છે.", "B) બરફથી પાણી તરફ, કારણ કે બરફ પીગળવા માટે ઉષ્મા શોષે છે.", "C) પાણી અને બરફ વચ્ચે કોઈ ઉષ્મા પ્રવાહ થતો નથી.", "D) પાણી અને બરફ વચ્ચે ઉષ્મા પ્રવાહ બંને દિશામાં સરખા પ્રમાણમાં થાય છે."], "correct": 0, "explanation": "બીજા નિયમ અનુસાર, ઉષ્માનો પ્રવાહ હંમેશા ઉચ્ચ તાપમાનથી નીચા તાપમાન તરફ થાય છે. અહીં, પાણીનું તાપમાન (50°C) બરફ કરતાં ઉચ્ચ છે, તેથી ઉષ્માનો પ્રવાહ પાણીથી બરફ તરફ થશે. વિકલ્પ B ખોટો છે કારણ કે બરફ પીગળવા માટે ઉષ્મા શોષે છે, પરંતુ ઉષ્માનો પ્રવાહ પાણીથી બરફ તરફ જ થાય છે. વિકલ્પ C અને D બીજા નિયમના સિદ્ધાંતનો ભંગ કરે છે.", "ncert_ref": "Class XI - પ્રકરણ 12: ઉષ્માગતિ (Thermodynamics)", "difficulty": "Medium", "num": 28}, {"question": "એક ઉષ્મીય રીતે અલગ પડેલ સિસ્ટમમાં, બે ધાતુના બ્લોક A અને B છે. બ્લોક Aનું તાપમાન 100°C અને બ્લોક Bનું તાપમાન 20°C છે. જો બ્લોક A અને Bને સંપર્કમાં મૂકવામાં આવે, તો ઉષ્માનો પ્રવાહ કેવી રીતે થશે અને સિસ્ટમનું અંતિમ તાપમાન કયું હશે?", "options": ["A) ઉષ્માનો પ્રવાહ A થી B તરફ થશે અને અંતિમ તાપમાન 100°C હશે.", "B) ઉષ્માનો પ્રવાહ B થી A તરફ થશે અને અંતિમ તાપમાન 20°C હશે.", "C) ઉષ્માનો પ્રવાહ A થી B તરફ થશે અને અંતિમ તાપમાન 60°C હશે.", "D) ઉષ્માનો પ્રવાહ બંને દિશામાં થશે અને અંતિમ તાપમાન 50°C હશે."], "correct": 2, "explanation": "બીજા નિયમ અનુસાર, ઉષ્માનો પ્રવાહ હંમેશા ઉચ્ચ તાપમાનથી નીચા તાપમાન તરફ થાય છે. અહીં, બ્લોક Aનું તાપમાન (100°C) બ્લોક B કરતાં ઉચ્ચ છે, તેથી ઉષ્માનો પ્રવાહ A થી B તરફ થશે. અંતિમ તાપમાન બંને બ્લોકનું સરેરાશ તાપમાન (60°C) હશે. વિકલ્પ A અને B ખોટા છે કારણ કે અંતિમ તાપમાન સરેરાશ હશે, અને વિકલ્પ D ખોટો છે કારણ કે ઉષ્માનો પ્રવાહ એક દિશામાં જ થશે.", "ncert_ref": "Class XI - પ્રકરણ 12: ઉષ્માગતિ (Thermodynamics)", "difficulty": "Hard", "num": 29}, {"question": "એક ઉષ્મીય રીતે અલગ પડેલ સિસ્ટમમાં બે પદાર્થો X અને Y છે, જ્યાં પદાર્થ X નું તાપમાન 100 °C અને પદાર્થ Y નું તાપમાન 20 °C છે. સમય જતાં સિસ્ટમ ઉષ્મીય સંતુલન પ્રાપ્ત કરે છે. આ પ્રક્રિયા દરમિયાન નીચેનામાંથી કયું કથન ઉષ્માના બીજા નિયમ સાથે સુસંગત નથી?", "options": ["A) પદાર્થ X માંથી પદાર્થ Y તરફ ઉષ્માનો પ્રવાહ થશે.", "B) પદાર્થ Y ની એન્ટ્રોપી વધશે, જ્યારે પદાર્થ X ની એન્ટ્રોપી ઘટશે.", "C) સિસ્ટમની કુલ એન્ટ્રોપી વધશે.", "D) પદાર્થ Y માંથી પદાર્થ X તરફ ઉષ્માનો પ્રવાહ થશે, જો બાહ્ય કાર્ય કરવામાં આવે."], "correct": 3, "explanation": "સાચો જવાબ D છે. ઉષ્માનો બીજો નિયમ જણાવે છે કે ઉષ્માનો પ્રવાહ હંમેશા ઉચ્ચ તાપમાનથી નીચા તાપમાન તરફ સ્વયંભૂ રીતે થાય છે. પદાર્થ Y (20 °C) માંથી પદાર્થ X (100 °C) તરફ ઉષ્માનો પ્રવાહ સ્વયંભૂ રીતે શક્ય નથી, સિવાય કે બાહ્ય કાર્ય કરવામાં આવે. જો કે, પ્રશ્નમાં સિસ્ટમ ઉષ્મીય રીતે અલગ પડેલ છે અને બાહ્ય કાર્યનો ઉલ્લેખ નથી, તેથી આ કથન ઉષ્માના બીજા નિયમ સાથે સુસંગત નથી.\n\nA વિકલ્પ સાચો છે કારણ કે ઉષ્માનો પ્રવાહ ઉચ્ચ તાપમાનથી નીચા તાપમાન તરફ થાય છે.\nB વિકલ્પ સાચો છે કારણ કે ઉષ્માનો પ્રવાહ થતાં પદાર્થ Y ની એન્ટ્રોપી વધશે અને પદાર્થ X ની એન્ટ્રોપી ઘટશે.\nC વિકલ્પ સાચો છે કારણ કે ઉષ્માના બીજા નિયમ મુજબ અલગ પડેલ સિસ્ટમની કુલ એન્ટ્રોપી હંમેશા વધે છે.", "ncert_ref": "Class XI - પ્રકરણ 12: ઉષ્માગતિશાસ્ત્ર", "difficulty": "Hard", "num": 30}, {"question": "એક ઉષ્મીય રીતે અલગ પડેલ સિસ્ટમમાં, પદાર્થ A નું તાપમાન 100°C અને પદાર્થ B નું તાપમાન 20°C છે. જો આ બંને પદાર્થોને સંપર્કમાં મૂકવામાં આવે, તો ઉષ્માનો પ્રવાહ કેવી દિશામાં થશે?", "options": ["A) પદાર્થ A ા અને ઉષ્માગતિકી", "difficulty": "Medium", "num": 38}, {"question": "નીચેના કથનોમાંથી કયું ઉષ્માના બીજા નિયમના ઉલ્લંઘન તરફ દોરે છે?", "options": ["A) એક ગરમ કપમાં ચા ઠંડી પડે છે જ્યારે તેને ઓરડાના તાપમાને મૂકવામાં આવે છે", "B) એક રેફ્રિજરેટરમાં, ઉષ્મા ઠંડા ભાગથી ગરમ ભાગ તરફ વહે છે", "C) એક ધાતુની છડમાં, ઉષ્મા ગરમ છેડથી ઠંડા છેડ તરફ વહે છે", "D) એક બીકરમાં ગરમ પાણી અને બરફના ટુકડા મૂકવામાં આવે છે, ત્યારે બરફ પીગળે છે"], "correct": 1, "explanation": "બીજા નિયમ મુજબ, ઉષ્માનો પ્રવાહ હંમેશા ઊંચા તાપમાનથી નીચા તાપમાન તરફ થાય છે. રેફ્રિજરેટરમાં, ઉષ્મા ઠંડા ભાગથી ગરમ ભાગ તરફ વહેતી નથી, પરંતુ રેફ્રિજરેટર એ ઉષ્માના બીજા નિયમનું ઉલ્લંઘન નથી કરતું કારણ કે તે બાહ્ય કામ દ્વારા ઉષ્માનો પ્રવાહ નીચા તાપમાનથી ઊંચા તાપમાન તરફ કરે છે. પરંતુ પ્રશ્નમાં, વિકલ્પ B એવું કથન છે જે બીજા નિયમના ઉલ્લંઘન તરફ દોરે છે કારણ કે તે સૂચવે છે કે ઉષ્મા સ્વતઃ જ નીચા તાપમાનથી ઊંચા તાપમાન તરફ વહે છે. વિકલ્પ A, C, અને D બીજા નિયમને અનુરૂપ છે.", "ncert_ref": "Class XI - પ્રકરણ 11: ઉષ્મા અને ઉષ્માગતિકી", "difficulty": "Hard", "num": 39}, {"question": "એક ઉષ્મીય રીતે અલગ પડેલ સિસ્ટમમાં બે પદાર્થો M અને N છે. પદાર્થ M નું પ્રારંભિક તાપમાન 90 °C અને પદાર્થ N નું પ્રારંભિક તાપમાન 30 °C છે. સમય સાથે સિસ્ટમ ઉષ્મીય સંતુલન તરફ આગળ વધે છે. આ પ્રક્રિયા દરમિયાન નીચેના પૈકી કયું કથન સાચું નથી?", "options": ["A) પદાર્થ M ની આંતરિક ઊર્જામાં ઘટાડો થશે અને પદાર્થ N ની આંતરિક ઊર્જામાં વધારો થશે.", "B) સિસ્ટમની કુલ એન્ટ્રોપી સતત વધતી જશે.", "C) ઉષ્માનો પ્રવાહ પદાર્થ M થી પદાર્થ N તરફ થશે, પરંતુ અંતિમ તાપમાન 60 °C થી વધુ હશે.", "D) જો પદાર્થ M ની વિશિષ્ટ ઉષ્મા ક્ષમતા પદાર્થ N કરતાં વધુ હોય, તો અંતિમ તાપમાન 60 °C થી ઓછું હશે."], "correct": 2, "explanation": "સાચો જવાબ વિકલ્પ C છે. ઉષ્માના બીજા નિયમ મુજબ, ઉષ્માનો પ્રવાહ હંમેશા ઉચ્ચ તાપમાનથી નીચા તાપમાન તરફ થાય છે, તેથી પદાર્થ M થી પદાર્થ N તરફ ઉષ્મા પ્રવાહિત થશે. જો બંને પદાર્થોની વિશિષ્ટ ઉષ્મા ક્ષમતા સમાન હોય, તો અંતિમ તાપમાન બંનેના સરેરાશ તાપમાન (60 °C) જેટલું થશે. પરંતુ વિકલ્પ C માં દર્શાવ્યા મુજબ અંતિમ તાપમાન 60 °C થી વધુ હોવું શક્ય નથી, કારણ કે ઉષ્માનો પ્રવાહ હંમેશા ઉચ્ચ તાપ         let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);

            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}

            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;

            document.getElementById('submitBtn').disabled=false;
