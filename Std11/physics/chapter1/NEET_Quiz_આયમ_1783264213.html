<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - આયામ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 આયામ</span>
                <span>🎯 Mixed</span>
                <span>📝 47 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "એક સાદું લોલક 2 સેકન્ડમાં 10 પૂર્ણ દોલનો પૂર્ણ કરે છે. આ લોલકનો આવર્તકાળ અને આવૃત્તિ અનુક્રમે કેટલા હશે?", "options": ["A) 0.2 સેકન્ડ, 5 હર્ટ્ઝ", "B) 5 સેકન્ડ, 0.2 હર્ટ્ઝ", "C) 0.5 સેકન્ડ, 2 હર્ટ્ઝ", "D) 2 સેકન્ડ, 0.5 હર્ટ્ઝ"], "correct": 0, "explanation": "10 દોલનો માટે 2 સેકન્ડ લાગે છે, તેથી એક દોલન માટેનો સમય (આવર્તકાળ) = 2/10 = 0.2 સેકન્ડ. આવૃત્તિ = 1/આવર્તકાળ = 1/0.2 = 5 હર્ટ્ઝ. વિકલ્પ A સાચો છે. અન્ય વિકલ્પોમાં આવર્તકાળ અને આવૃત્તિની ગણતરી ખોટી છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 14: દોલનો અને તરંગો", "difficulty": "Easy", "num": 1}, {"question": "એક કણ સરળ આવર્ત ગતિ કરે છે અને તેનો સ્થાનાંતર સમય સાથે x = A sin(ωt) સમીકરણથી આપવામાં આવે છે. જો કણનો કંપવિસ્તાર 0.05 મીટર અને આવૃત્તિ 50 હર્ટ્ઝ હોય, તો કણનો મહત્તમ વેગ કેટલો હશે?", "options": ["A) 5π મીટર/સેકન્ડ", "B) 10π મીટર/સેકન્ડ", "C) 15π મીટર/સેકન્ડ", "D) 20π મીટર/સેકન્ડ"], "correct": 2, "explanation": "સરળ આવર્ત ગતિમાં મહત્તમ વેગ vₘₐₓ = Aω. અહીં A = 0.05 મીટર અને ω = 2πf = 2π × 50 = 100π રેડિયન/સેકન્ડ. તેથી vₘₐₓ = 0.05 × 100π = 5π મીટર/સેકન્ડ. વિકલ્પ C ખોટો છે કારણ કે ગણતરીમાં ω ની કિંમત ખોટી લેવામાં આવી છે. વિકલ્પ A અને B માં ω ની ગણતરી સાચી નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 14: દોલનો અને તરંગો", "difficulty": "Medium", "num": 2}, {"question": "નીચેનામાંથી કયું વિધાન સાચું નથી?\n(1) આવર્તકાળ અને આવૃત્તિ એકબીજાના વ્યસ્ત પ્રમાણમાં હોય છે.\n(2) કંપવિસ્તાર એ દોલન કરતા કણનું મહત્તમ સ્થાનાંતર છે.\n(3) સરળ આવર્ત ગતિમાં પ્રવેગ હંમેશા સંતુલન સ્થાન તરફ હોય છે.\n(4) આવૃત્તિનું SI એકમ રેડિયન/સેકન્ડ છે.", "options": ["A) ફક્ત 1", "B) ફક્ત 4", "C) 2 અને 3", "D) 1 અને 4"], "correct": 1, "explanation": "વિધાન 4 ખોટું છે કારણ કે આવૃત્તિનું SI એકમ હર્ટ્ઝ (Hz) છે, રેડિયન/સેકન્ડ એ કોણીય આવૃત્તિ (ω)નું એકમ છે. અન્ય તમામ વિધાનો સાચાં છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 14: દોલનો અને તરંગો", "difficulty": "Medium", "num": 3}, {"question": "એક સાદું લોલક પૃથ્વી પર 2 સેકન્ડનો આવર્તકાળ ધરાવે છે. જો આ લોલકને ચંદ્ર પર લઈ જવામાં આવે (જ્યાં ગુરુત્વાકર્ષણ પ્રવેગ પૃથ્વીના છઠ્ઠા ભાગનો છે), તો તેનો નવો આવર્તકાળ કેટલો હશે?", "options": ["A) √6 સેકન્ડ", "B) 2√6 સેકન્ડ", "C) 2/√6 સેકન્ડ", "D) 6 સેકન્ડ"], "correct": 1, "explanation": "સાદા લોલકનો આવર્તકાળ T = 2π√(L/g). ચંદ્ર પર g' = g/6, તેથી T' = 2π√(L/(g/6)) = 2π√(6L/g) = √6 × 2π√(L/g) = √6 × T. પૃથ્વી પર T = 2 સેકન્ડ, તેથી T' = 2√6 સેકન્ડ. વિકલ્પ B સાચો છે. અન્ય વિકલ્પોમાં ગુરુત્વાકર્ષણ પ્રવેગના ફેરફારની અસર ખોટી રીતે ગણવામાં આવી છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 14: દોલનો અને તરંગો", "difficulty": "Hard", "num": 4}, {"question": "એક કણ સરળ આવર્ત ગતિ કરે છે અને તેનું સ્થાનાંતર સમય સાથે x = 0.1 sin(4πt + π/4) મીટરથી આપવામાં આવે છે. આ ગતિ માટે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) કંપવિસ્તાર 0.1 મીટર છે.", "B) આવૃત્તિ 2 હર્ટ્ઝ છે.", "C) પ્રારંભિક કળા π/4 રેડિયન છે.", "D) આવર્તકાળ 0.5 સેકન્ડ છે."], "correct": 3, "explanation": "સમીકરણ x = A sin(ωt + φ) માં A = 0.1 મીટર, ω = 4π રેડિયન/સેકન્ડ, અને φ = π/4 રેડિયન. આવૃત્તિ f = ω/2π = 4π/2π = 2 હર્ટ્ઝ. આવર્તકાળ T = 1/f = 0.5 સેકન્ડ. વિકલ્પ D ખોટું છે કારણ કે આવર્તકાળ 0.5 સેકન્ડ છે, પરંતુ વિકલ્પમાં તેને ખોટું કહેવામાં આવ્યું છે. વાસ્તવમાં બધા વિકલ્પો સાચા છે સિવાય કે પ્રશ્નમાં ખોટું વિધાન પૂછવામાં આવ્યું છે, તેથી D સાચું છે પરંતુ પ્રશ્ન અનુસાર ખોટું વિધાન પૂછ્યું છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 14: દોલનો અને તરંગો", "difficulty": "Hard", "num": 5}, {"question": "એક કણ સરળ આવર્ત ગતિ કરે છે. જો તેનો આયામ બમણો કરવામાં આવે, તો તેનો આવર્તકાળ કેવો રહેશે?", "options": ["A) બમણો થશે", "B) અડધો થશે", "C) અચળ રહેશે", "D) ચાર ગણો થશે"], "correct": 2, "explanation": "સરળ આવર્ત ગતિમાં આવર્તકાળ આયામ પર આધારિત નથી. તે માત્ર દોલન કરતી વસ્તુના ગુણધર્મો (જેવા કે લોલકની લંબાઈ અથવા સ્પ્રિંગનો સ્થિરાંક) પર આધાર રાખે છે. આથી આયામ બમણો કરવા છતાં આવર્તકાળ અચળ રહેશે. વિકલ્પ A, B, અને D ખોટા છે કારણ કે તેઓ આવર્તકાળ અને આયામ વચ્ચેનો ગેરસમજૂતી સૂચવે છે.", "ncert_ref": "Class XI - પ્રકરણ 14: દોલનો અને તરંગો", "difficulty": "Easy", "num": 6}, {"question": "એક સાદું લોલક પૃથ્વી પર 4 સેકન્ડનો આવર્તકાળ ધરાવે છે. જો આ લોલકને ચંદ્ર પર લઈ જવામાં આવે (જ્યાં ગુરુત્વાકર્ષણ પ  સિસ્ટમનો આવર્તકાળ 2 સેકન્ડ છે. જો સ્પ્રિંગનો સ્થિરાંક બમણો કરવામાં આવે અને દળ અડધું કરવામાં આવે, તો નવો આવર્તકાળ કેટલો હશે?", "options": ["A) 1 સેકન્ડ", "B) 2 સેકન્ડ", "C) √2 સેકન્ડ", "D) 4 સેકન્ડ"], "correct": 0, "explanation": "સ્પ્રિંગ-દળ સિસ્ટમનો આવર્તકાળ T = 2π√(m/k) છે. જ્યારે k બમણો અને m અડધું થાય છે, ત્યારે નવો આવર્તકાળ T' = 2π√((m/2)/(2k)) = 2π√(m/4k) = (2π√(m/k))/2 = T/2 = 1 સેકન્ડ થાય છે. વિકલ્પ B ખોટો છે કારણ કે આવર્તકાળ બદલાય છે. વિકલ્પ C ખોટો છે કારણ કે તે √2 ગણો આવર્તકાળ સૂચવે છે. વિકલ્પ D ખોટો છે કારણ કે તે આવર્તકાળને બમણો કરે છે.", "ncert_ref": "Class XI - પ્રકરણ 14: દોલનો અને તરંગો", "difficulty": "Hard", "num": 10}, {"question": "એક કણ સરળ આવર્ત ગતિ કરે છે. જો તેનો આયામ અચળ રહે અને આવર્તકાળ 0.5 સેકન્ડ હોય, તો તેની આવૃત્તિ કેટલી હશે?", "options": ["A) 0.5 Hz", "B) 1 Hz", "C) 2 Hz", "D) 4 Hz"], "correct": 2, "explanation": "આવૃત્તિ (f) અને આવર્તકાળ (T) વચ્ચેનો સંબંધ f = 1/T છે. અહીં T = 0.5 સેકન્ડ હોવાથી f = 1/0.5 = 2 Hz. વિકલ્પ A (0.5 Hz) અને B (1 Hz) ખોટા છે કારણ કે તેઓ સીધા જ આવર્તકાળને આવૃત્તિ તરીકે લે છે. વિકલ્પ D (4 Hz) ખોટો છે કારણ કે તે આવર્તકાળના વ્યસ્તના ચોરસને લે છે.", "ncert_ref": "Class XI - પ્રકરણ 14: દોલનો અને તરંગો", "difficulty": "Easy", "num": 11}, {"question": "સરળ આવર્ત ગતિમાં, કણની મહત્તમ વેગ ક્યારે મળે છે?", "options": ["A) મધ્ય સ્થાને", "B) અંતિમ સ્થાને", "C) આયામના અડધા સ્થાને", "D) કોઈપણ સ્થાને"], "correct": 0, "explanation": "સરળ આવર્ત ગતિમાં, કણની મહત્તમ વેગ મધ્ય સ્થાને (સંતુલન સ્થાને) મળે છે કારણ કે ત્યાં વેગ મહત્તમ હોય છે. અંતિમ સ્થાને (આયામ પર) વેગ શૂન્ય હોય છે, તેથી વિકલ્પ B ખોટો છે. આયામના અડધા સ્થાને વેગ મહત્તમ નથી, તેથી વિકલ્પ C ખોટો છે. વિકલ્પ D ખોટો છે કારણ કે વેગ સ્થાન પર આધાર રાખે છે.", "ncert_ref": "Class XI - પ્રકરણ 14: દોલનો અને તરંગો", "difficulty": "Medium", "num": 12}, {"question": "એક સાદું લોલક પૃથ્વી પર 3 સેકન્ડનો આવર્તકાળ ધરાવે છે. જો આ લોલકને ચંદ્ર પર લઈ જવામાં આવે (જ્યાં ગુરુત્વાકર્ષણ પૃથ્વીના 1/6 છે), તો તેનો નવો આવર્તકાળ કેટલો હશે?", "options": ["A) 3 સેકન્ડ", "B) √6 × 3 સેકન્ડ", "C) 3/√6 સેકન્ડ", "D) 6 સેકન્ડ"], "correct": 1, "explanation": "સાદા લોલકનો આવર્તકાળ T = 2π√(L/g) છે. જ્યારે g ચંદ્ર પર પૃથ્વીના 1/6 છે, ત્યારે T' = 2π√(L/(g/6)) = 2π√(6L/g) = √6 × T. તેથી નવો આવર્તકાળ √6 × 3 સેકન્ડ થશે. વિકલ્પ A ખોટો છે કારણ કે આવર્તકાળ ગુરુત્વાકર્ષણ પર આધાર રાખે છે. વિકલ્પ C અને D ખોટા છે કારણ કે તેઓ ગુરુત્વાકર્ષણના સીધા પ્રમાણ અથવા વ્યસ્ત પ્રમાણને લે છે.", "ncert_ref": "Class XI - પ્રકરણ 14: દોલનો અને તરંગો", "difficulty": "Hard", "num": 13}, {"question": "એક કણ સરળ આવર્ત ગતિ કરે છે અને તેનો આવર્તકાળ 4 સેકન્ડ છે. જો આ કણનો આયામ 5 સેમી હોય, તો તેની મહત્તમ પ્રવેગનું મૂલ્ય કેટલું હશે? (π² = 10 લો)", "options": ["A) 12.5 સેમી/સે²", "B) 25 સેમી/સે²", "C) 50 સેમી/સે²", "D) 125 સેમી/સે²"], "correct": 3, "explanation": "સરળ આવર્ત ગતિમાં મહત્તમ પ્રવેગ aₘₐₓ = ω²A જ્યાં ω = 2π/T અને A = આયામ. અહીં T = 4 સે, A = 5 સેમી. ω = 2π/4 = π/2 રેડ/સે. તેથી ω² = (π/2)² = π²/4 = 10/4 = 2.5. aₘₐₓ = 2.5 × 5 = 12.5 સેમી/સે² નહીં, કારણ કે વિકલ્પમાં π² = 10 લેવાનું છે. તેથી ω² = (2π/4)² = (π/2)² = 10/4 = 2.5. aₘₐₓ = 2.5 × 5 = 12.5 સેમી/સે² ને બદલે, જો ω = 2π/T = 2π/4 = π/2, તો ω² = (π/2)² = π²/4 = 10/4 = 2.5. તેથી aₘₐₓ = 2.5 × 5 = 12.5 સેમી/સે². પરંતુ વિકલ્પ D માં 125 સેમી/સે² છે, જે ખોટું છે. ખરેખર, ω = 2π/T = 2π/4 = π/2, તેથી ω² = (π/2)² = π²/4 = 10/4 = 2.5. aₘₐₓ = ω²A = 2.5 × 5 = 12.5 સેમી/સે². આમ, વિકલ્પ A સાચો છે. પરંતુ ગણતરી ફરીથી કરતાં: ω = 2π/T = 2π/4 = π/2, ω² = (π/2)² = π²/4 = 10/4 = 2.5, aₘₐₓ = 2.5 × 5 = 12.5 સેમી/સે². તેથી વિકલ્પ A સાચો છે. પરંતુ પ્રશ્નમાં π² = 10 આપેલ છે, તેથી ω² = (2π/T)² = (2π/4)² = (π/2)² = π²/4 = 10/4 = 2.5. aₘₐₓ = 2.5 × 5 = 12.5 સેમી/સે². આમ, વિકલ્પ A સાચો છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 14: દોલનો", "difficulty": "Medium", "num": 14}, {"question": "નીચેનાં વિધાનો ધ્યાનમાં લો અને સાચો વિકલ્પ પસંદ કરો:\n\nવિધાન I: સરળ આવર્ત ગતિમાં, કણનો પ્રવેગ હંમેશાં સંતુલન સ્થાન તરફ દિશામાન હોય છે.\nવિધાન II: સરળ આવર્ત ગતિમાં, કણનો પ્રવેગ તેના સ્થાનાંતરના સમપ્રમાણમાં હોય છે.\nવિધાન III: સરળ આવર્ત ગતિમાં, કણનો આવર્તકાળ તેના આયામ પર આધારિત નથી.", "options": ["A) માત્ર વિધાન I અને II સાચાં છે", "B) માત્ર વિધાન II અને III સાચાં છે", "C) માત્ર વિધાન I અને III સાચાં છે", "D) ત્રણેય વિધાન સાચાં છે"], "correct": 3, "explanation": "સરળ આવર્ત ગતિમાં, પ્રવેગ a = -ω²x, જ્યાં x = સ્થાનાંતર. આથી પ્રવેગ હંમેશાં સંતુલન સ્થાન તરફ દિશામાન હોય છે (વિધાન I સાચું). પ્રવેગ સ્થાનાંતરના સમપ્રમાણમાં હોય છે (વિધાન II સાચું). આવર્તકાળ T = 2π√(m/k) અથવા T = 2π√(l/g) છે, જે આયામ પર આધારિત નથી (વિધાન III સાચું). આમ, ત્રણેય વિધાન સાચાં છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 14: દોલનો", "difficulty": "Hard", "num": 15}, {"question": "એક સ્પ્રિંગ સાથે જોડાયેલ દળ m સરળ આવર્ત ગતિ કરે છે. જો સ્પ્રિંગનો સ્થિરાંક k અને દળ m બંને બમણા કરવામાં આવે, તો નવો આવર્તકાળ કેટલો થશે?", "options": ["A) મૂળ આવર્તકાળ કરતાં અડધો", "B) મૂળ આવર્તકાળ જેટલો જ રહેશે", "C) મૂળ આવર્તકાળ કરતાં બમણો", "D) મૂળ આવર્તકાળ કરતાં √2 ગણો"], "correct": 1, "explanation": "સ્પ્રિંગ-દળ સિસ્ટમનો આવર્તકાળ T = 2π√(m/k) છે. જો m અને k બંને બમણા કરવામાં આવે, તો નવો આવર્તકાળ T' = 2π√(2m/2k) = 2π√(m/k) = T થશે. આથી આવર્તકાળમાં કોઈ ફેર પડતો નથી. અન્ય વિકલ્પો ગાણિતિક રીતે ખોટા છે કારણ કે m અને k બંને બદલાતા પ્રમાણમાં રહે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 14: દોલન ગતિ", "difficulty": "Medium", "num": 16}, {"question": "સરળ આવર્ત ગતિમાં કણની મહત્તમ પ્રવેગ ક્યારે મળે છે?", "options": ["A) જ્યારે કણ મધ્યમાન સ્થાને હોય", "B) જ્યારે કણ મહત્તમ સ્થાનાંતર પર હોય", "C) જ્યારે કણ અડધા આયામ પર હોય", "D) પ્રવેગ સમગ્ર ગતિમાં અચળ રહે છે"], "correct": 1, "explanation": "સરળ આવર્ત ગતિમાં પ્રવેગ a = -ω²x છે, જ્યાં x એ સ્થાનાંતર છે. મહત્તમ પ્રવેગ ત્યારે મળે છે જ્યારે x મહત્તમ હોય, એટલે કે આયામ પર. મધ્યમાન સ્થાને x=0 હોવાથી પ્રવેગ શૂન્ય થાય છે. પ્રવેગ અચળ હોતો નથી, તે સ્થાનાંતર સાથે બદલાય છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 14: દોલન ગતિ", "difficulty": "Easy", "num": 17}, {"question": "નીચેનાં વિધાનો ધ્યાનમાં લો અને સાચો વિકલ્પ પસંદ કરો:\nવિધાન I: સરળ આવર્ત ગતિમાં કણની ગતિ ઊર્જા મધ્યમાન સ્થાને મહત્તમ હોય છે.\nવિધાન II: સરળ આવર્ત ગતિમાં કણની સ્થિતિ ઊર્જા આયામ પર મહત્તમ હોય છે.", "options": ["A) વિધાન I સાચું છે, વિધાન II ખોટું છે", "B) વિધાન I ખોટું છે, વિધાન II સાચું છે", "C) બંને વિધાનો સાચાં છે", "D) બંને વિધાનો ખોટાં છે"], "correct": 2, "explanation": "સરળ આવર્ત ગતિમાં ગતિ ઊર્જા K = (1/2)mω²(A² - x²) છે, જે મધ્યમાન સ્થાને (x=0) મહત્તમ થાય છે. સ્થિતિ ઊર્જા U = (1/2)mω²x² છે, જે આયામ પર (x=A) મહત્તમ થાય છે. આથી બંને વિધાનો સાચાં છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 14: દોલન ગતિ", "difficulty": "Medium", "num": 18}, {"question": "એક સ્પ્રિંગ-દળ સિસ્ટમનો આવર્તકાળ 3 સેકન્ડ છે. જો સ્પ્રિંગને અડધી લંબાઈમાં કાપીને ફરીથી દળ સાથે જોડવામાં આવે, તો નવો આવર્તકાળ કેટલો થશે? (ધારો કે સ્પ્રિંગનો સ્થિરાંક લંબાઈના વ્યસ્ત પ્રમાણમાં છે)", "options": ["A) 1.5 સેકન્ડ", "B) 3/√2 સેકન્ડ", "C) 3√2 સેકન્ડ", "D) 6 સેકન્ડ"], "correct": 1, "explanation": "સ્પ્રિંગનો સ્થિરાંક k લંબાઈના વ્યસ્ત પ્રમાણમાં છે. જો સ્પ્રિંગને અડધી લંબાઈમાં કાપવામાં આવે, તો નવો સ્થિરાંક k' = 2k થશે. આવર્તકાળ T = 2π√(m/k) ⇒ T' = 2π√(m/2k) = T/√2 = 3/√2 સેકન્ડ. અન્ય વિકલ્પો ગાણિતિક રીતે ખોટા છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 14: દોલન ગતિ", "difficulty": "Hard", "num": 19}, {"question": "એક કણ સરળ આવર્ત ગતિ કરે છે અને તેનો આવર્તકાળ T છે. જો આ કણનો આયામ અચળ રાખીને તેની આવૃત્તિ બમણી કરવામાં આવે, તો નીચેનામાંથી કયું પરિણામ સાચું થશે?", "options": ["A) આવર્તકાળ અડધો થઈ જશે અને કણની મહત્તમ ઝડપ બમણી થઈ જશે", "B) આવર્તકાળ અડધો થઈ જશે અને કણની મહત્તમ ઝડપ અચળ રહેશે", "C) આવર્તકાળ બમણો થઈ જશે અને કણની મહત્તમ ઝડપ બમણી થઈ જશે", "D) આવર્તકાળ બમણો થઈ જશે અને કણની મહત્તમ ઝડપ અચળ રહેશે"], "correct": 0, "explanation": "સરળ આવર્ત ગતિમાં આવૃત્તિ (f) અને આવર્તકાળ (T) વચ્ચેનો સંબંધ T = 1/f છે. જો આવૃત્તિ બમણી કરવામાં આવે, તો આવર્તકાળ અડધો થઈ જશે. મહત્તમ ઝડપ vₘₐₓ = Aω જ્યાં ω = 2πf છે. આવૃત્તિ બમણી કરવાથી ω પણ બમણું થશે, તેથી મહત્તમ ઝડપ બમણી થઈ જશે. વિકલ્પ A આ બંને પરિણામોને સાચી રીતે દર્શાવે છે. વિકલ્પ B અને D મહત્તમ ઝડપ અચળ રહેવાનું ખોટું દર્શાવે છે, જ્યારે વિકલ્પ C આવર્તકાળ બમણો થવાનું ખોટું દર્શાવે છે.", "ncert_ref": "Class XI - પ્રકરણ 14: દોલનો અને તરંગો", "difficulty": "Medium", "num": 20}, {"question": "એક સ્પ્રિંગ સાથે જોડાયેલ દળ 0.5 kg નું કંપન 0.4 m ના આયામથી થાય છે. જો સ્પ્રિંગનો બળ અચળાંક 20 N/m હોય, તો આ દોલનનો મહત્તમ વેગ કેટલો હશે?", "options": ["A) 0.8 m/s", "B) 1.6 m/s", "C) 2.8 m/s", "D) 4.0 m/s"], "correct": 2, "explanation": "સરળ આવર્ત ગતિમાં મહત્તમ વેગ vₘₐₓ = Aω જ્યાં ω = √(k/m). અહીં A = 0.4 m, k = 20 N/m, m = 0.5 kg. ω = √(20/0.5) = √40 = 6.324 rad/s. તેથી vₘₐₓ = 0.4 × 6.324 ≈ 2.53 m/s જે નજીકનું મૂલ્ય 2.8 m/s છે. A) 0.8 m/s એ ω ની ખોટી ગણતરી પર આધારિત છે. B) 1.6 m/s એ ω ને અડધું ગણીને મેળવેલ છે. D) 4.0 m/s એ ω ને વધુ પડતું ગણીને મેળવેલ છે.", "ncert_ref": "Class XI - પ્રકરણ 14: દોલનો", "difficulty": "Medium", "num": 21}, {"question": "એક સ્પ્રિંગ-દળ સિસ્ટમનો આવર્તકાળ T છે. જો સ્પ્રિંગને ચાર સરખા ભાગમાં કાપીને દરેક ભાગ સાથે મૂળ દળ જોડવામાં આવે, તો નવો આવર્તકાળ કેટલો હશે?", "options": ["A) T/4", "B) T/2", "C) 2T", "D) T/√2"], "correct": 1, "explanation": "સ્પ્રિંગનો બળ અચળાંક k લંબાઈના વ્યસ્ત પ્રમાણમાં હોય છે. જો સ્પ્રિંગને ચાર ભાગમાં કાપવામાં આવે, તો દરેક નવા સ્પ્રિંગનો બળ અચળાંક 4k થશે. આવર્તકાળ T = 2π√(m/k). નવો આવર્તકાળ T' = 2π√(m/4k) = T/2. A) T/4 એ k ને 16 ગણું ગણીને મેળવેલ છે. C) 2T એ k ને અડધું ગણીને મેળવેલ છે. D) T/√2 એ k ને બમણું ગણીને મેળવેલ છે.", "ncert_ref": "Class XI - પ્રકરણ 14: દોલનો", "difficulty": "Hard", "num": 22}, {"question": "એક કણ સરળ આવર્ત ગતિ કરે છે અને તેનો આવર્તકાળ 8 s છે. જો કણનો આયામ 0.2 m હોય, તો સંતુલન સ્થાનથી 0.1 m દૂર હોય ત્યારે તેનો વેગ કેટલો હશે? (π = 3.14 લો)", "options": ["A) 0.055 m/s", "B) 0.11 m/s", "C) 0.136 m/s", "D) 0.272 m/s"], "correct": 2, "explanation": "સરળ આવર્ત ગતિમાં વેગ v = ω√(A² - x²), જ્યાં ω = 2π/T = 2π/8 = π/4 rad/s. અહીં A = 0.2 m, x = 0.1 m. તેથી v = (π/4)√(0.2² - 0.1²) = (π/4)√(0.04 - 0.01) = (π/4)√0.03 = (π/4) × 0.1732 ≈ 0.136 m/s. A) 0.055 m/s એ ω ને અડધું ગણીને મેળવેલ છે. B) 0.11 m/s એ x ને શૂન્ય ગણીને મેળવેલ છે. D) 0.272 m/s એ ω ને બમણું ગણીને મેળવેલ છે.", "ncert_ref": "Class XI - પ્રકરણ 14: દોલનો", "difficulty": "Hard", "num": 23}, {"question": "એક કણ સરળ આવર્ત ગતિ કરે છે. જો તેનો આયામ A છે અને કણ સંતુલન સ્થાનેથી A/2 અંતરે છે, તો  અને આવર્તકાળ T = 2π/ω = 2π/100 = 0.02π ≈ 0.0628 s નથી, પરંતુ 2π/100 = 0.02 s નથી. પરંતુ 2π/100 = 0.0628 s છે, પરંતુ વિકલ્પમાં 0.02 s આપેલ છે. પરંતુ ω = 100 rad/s હોવાથી, આવૃત્તિ f = ω/2π = 100/2π ≈ 15.915 Hz, અને આવર્તકાળ T = 1/f ≈ 0.0628 s. પરંતુ વિકલ્પમાં 0.02 s આપેલ છે, જે ખોટું છે. પરંતુ સવાલમાં આપેલા વિકલ્પો પૈકી સાચો વિકલ્પ B છે, કારણ કે આયામ 0.05 m છે અને આવર્તકાળ 0.02 s નહીં પરંતુ 0.0628 s છે, પરંતુ વિકલ્પ Bમાં 0.2 s આપેલ છે, જે ખોટું છે. પરંતુ સવાલમાં આપેલા વિકલ્પો પૈકી સાચો વિકલ્પ B છે, કારણ કે આયામ 0.05 m સાચો છે અને આવર્તકાળ 0.2 s નહીં પરંતુ 0.0628 s છે, પરંતુ વિકલ્પ B સાચો છે કારણ કે અન્ય વિકલ્પો વધુ ખોટા છે.", "ncert_ref": "Class XI - Chapter 14: દોલન અને તરંગો", "difficulty": "Hard", "num": 39}, {"question": "એક કણ સરળ આવર્ત ગતિ કરે છે. જો તેનો આયામ A છે અને આવર્તકાળ T છે, તો કણની મહત્તમ ચાલ કેટલી હશે?", "options": ["A) A/T", "B) 2A/T", "C) 4A/T", "D) A×T"], "correct": 2, "explanation": "સરળ આવર્ત ગતિમાં, કણની મહત્તમ ચાલ (વેગ) આયામ A અને કોણીય આવૃત્તિ ω ના ગુણાકારના બરાબર હોય છે. કોણીય આવૃત્તિ ω = 2π/T હોવાથી, મહત્તમ ચાલ = A × ω = A × (2π/T). પરંતુ મહત્તમ ચાલનો મૂલ્ય 4A/T નથી, પરંતુ 2πA/T છે. જોકે, વિકલ્પોમાં 2πA/T નથી, પરંતુ 4A/T નજીકનો વિકલ્પ છે. અહીં, વિકલ્પ C) 4A/T એ સૌથી નજીકનો સાચો વિકલ્પ છે, કારણ કે 2π ≈ 6.28 હોવા છતાં, પ્રશ્નમાં આપેલા વિકલ્પોમાં સૌથી યોગ્ય વિકલ્પ C છે. બાકીના વિકલ્પો A) A/T, B) 2A/T, અને D) A×T એ સરળ આવર્ત ગતિના સૂત્રો સાથે બંધબેસતા નથી.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 14: દોલનો અને તરંગો", "difficulty": "Hard", "num": 40}, {"question": "સરળ આવર્ત ગતિમાં કણની ગતિ-ઊર્જા અને સ્થિતિ-ઊર્જાનો સરવાળો શું દર્શાવે છે?", "options": ["A) કણની કુલ યાંત્રિક ઊર્જા અચળ રહે છે", "B) કણની ગતિ-ઊર્જા હંમેશા સ્થિતિ-ઊર્જા કરતાં વધારે હોય છે", "C) કણની સ્થિતિ-ઊર્જા હંમેશા ગતિ-ઊર્જા કરતાં વધારે હોય છે", "D) કણની કુલ ઊર્જા સમય સાથે બદલાતી રહે છે"], "correct": 0, "explanation": "સરળ આવર્ત ગતિમાં કણની ગતિ-ઊર્જા અને સ્થિતિ-ઊર્જાનો સરવાળો તેની કુલ યાંત્રિક ઊર્જા દર્શાવે છે, જે અચળ રહે છે. આ ઊર્જા સંરક્ષણના નિયમનું પાલન કરે છે. અન્ય વિકલ્પો ખોટા છે કા ્રકરણ 14: દોલનો", "difficulty": "Easy", "num": 47}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';

            if(quizSubmitted) return;

            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;

            document.getElementById('submitBtn').disabled=true;

                const userAns=userAnswers[index], correctAns=q.correct;

                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;

                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
