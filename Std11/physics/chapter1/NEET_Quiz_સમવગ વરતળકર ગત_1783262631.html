<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - સમવેગી વર્તુળાકાર ગતિ – વર્તુળમાં સ્થિર ઝડપે થતી ગતિ.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 સમવેગી વર્તુળાકાર ગતિ – વર્તુળમાં સ્થિર ઝડપે થતી ગતિ.</span>
                <span>🎯 Mixed</span>
                <span>📝 49 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "એક પદાર્થ સમાન ઝડપે વર્તુળાકાર માર્ગ પર ગતિ કરે છે. નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) પદાર્થ પર લાગતું પરિણામી બળ શૂન્ય છે કારણ કે ઝડપ અચળ છે", "B) પદાર્થ પર લાગતું કેન્દ્રગામી બળ તેની ગતિની દિશા બદલવા માટે જવાબદાર છે", "C) પદાર્થ પર લાગતું બળ તેની ઝડપ વધારવા માટે કાર્ય કરે છે", "D) પદાર્થની ગતિ સુરેખ હોય છે કારણ કે ઝડપ અચળ છે"], "correct": 1, "explanation": "સમવેગી વર્તુળાકાર ગતિમાં પદાર્થની ઝડપ અચળ હોય છે, પરંતુ તેની દિશા સતત બદલાતી રહે છે. આ દિશા પરિવર્તન માટે કેન્દ્રગામી બળ જરૂરી છે, જે વર્તુળના કેન્દ્ર તરફ લાગે છે. વિકલ્પ A ખોટો છે કારણ કે પરિણામી બળ શૂન્ય હોત તો પદાર્થ સુરેખ ગતિ કરતો હોત. વિકલ્પ C ખોટો છે કારણ કે કેન્દ્રગામી બળ ઝડપ બદલતું નથી, માત્ર દિશા બદલે છે. વિકલ્પ D ખોટો છે કારણ કે ગતિ વર્તુળાકાર છે, સુરેખ નહીં.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 5: ગતિના નિયમો", "difficulty": "Easy", "num": 1}, {"question": "એક પદાર્થ 2 m ત્રિજ્યાના વર્તુળાકાર માર્ગ પર 4 m/s ની અચળ ઝડપે ગતિ કરે છે. જો પદાર્થનું દળ 0.5 kg હોય, તો તેના પર લાગતું કેન્દ્રગામી બળ કેટલું હશે?", "options": ["A) 2 N", "B) 4 N", "C) 8 N", "D) 16 N"], "correct": 1, "explanation": "કેન્દ્રગામી બળનું સૂત્ર F = mv²/r છે. અહીં m = 0.5 kg, v = 4 m/s, r = 2 m. તેથી F = 0.5 × (4)² / 2 = 0.5 × 16 / 2 = 4 N. વિકલ્પ A ખોટો છે કારણ કે ગણતરીમાં ઝડપનો વર્ગ લેવાનું ભૂલી ગયા છે. વિકલ્પ C અને D ખોટા છે કારણ કે ગણતરીની ભૂલને કારણે મૂલ્ય વધારે મળે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 5: ગતિના નિયમો", "difficulty": "Medium", "num": 2}, {"question": "નીચેના વિધાનો ધ્યાનમાં લો:\n(i) સમવેગી વર્તુળાકાર ગતિમાં પદાર્થનું પ્રવેગ શૂન્ય હોય છે.\n(ii) સમવેગી વર્તુળાકાર ગતિમાં પદાર્થનું પ્રવેગ કેન્દ્ર તરફ હોય છે.\n(iii) સમવેગી વર્તુળાકાર ગતિમાં પદાર્થની ઝડપ અચળ હોય છે.\nઉપરોક્ત વિધાનોમાંથી કયું/કયા સાચું/સાચાં છે?", "options": ["A) માત્ર (i)", "B) માત્ર (ii) અને (iii)", "C) માત્ર (i) અને (iii)", "D) (i), (ii) અને (iii)"], "correct": 1, "explanation": "સમવેગી વર્તુળાકાર ગતિમાં પદાર્થની ઝડપ અચળ હોય છે, પરંતુ તેની દિશા સતત બદલાતી રહે છે, તેથી પ્રવેગ શૂન્ય નથી હોતો. આ asy", "num": 16}, {"question": "એક કણ 2 m ત્રિજ્યાના વર્તુળાકાર માર્ગ પર 6 m/s ની અચળ ઝડપે ગતિ કરે છે. જો કણનો આવર્તકાળ 2 s હોય, તો તેની ઝડપ કેટલી હશે? (નોંધ: ગણતરી વગર પૂછાયેલ પ્રશ્ન)", "options": ["A) 2π m/s", "B) 4π m/s", "C) 6 m/s", "D) 6π m/s"], "correct": 2, "explanation": "આવર્તકાળ (T) અને ઝડપ (v) વચ્ચેનો સંબંધ v = 2πr/T છે. અહીં r = 2 m, T = 2 s. તેથી v = 2π × 2 / 2 = 2π m/s. પરંતુ પ્રશ્નમાં પહેલેથી જ ઝડપ 6 m/s આપેલી છે, જે ગણતરી મુજબ ખોટી છે. આ પ્રશ્નનો હેતુ વિદ્યાર્થીઓને ગેરમાર્ગે દોરવાનો છે. વાસ્તવમાં, જો ઝડપ 6 m/s આપેલી હોય, તો આવર્તકાળ T = 2πr/v = 2π × 2 / 6 = 2π/3 s હોવો જોઈએ. આથી સાચો જવાબ વિકલ્પ C છે કારણ કે પ્રશ્નમાં ઝડપ પહેલેથી જ આપેલી છે.", "ncert_ref": "Class XI - પ્રકરણ 4: ગતિ", "difficulty": "Hard", "num": 17}, {"question": "એક પદાર્થ 1 m ત્રિજ્યાના વર્તુળાકાર માર્ગ પર 2 m/s ની અચળ ઝડપે ગતિ કરે છે. જો પદાર્થનો આવર્તકાળ T હોય અને તેની કોણીય ઝડપ ω હોય, તો નીચેનામાંથી કયો સંબંધ સાચો છે?", "options": ["A) T = 2π/ω", "B) ω = 2πT", "C) T = ω/2π", "D) ω = 2π/T"], "correct": 0, "explanation": "આવર્તકાળ (T) અને કોણીય ઝડપ (ω) વચ્ચેનો સંબંધ T = 2π/ω છે. વિકલ્પ A આ સંબંધ દર્શાવે છે, તેથી તે સાચો છે. વિકલ્પ B અને C માં સંબંધ ઉલટો છે, જ્યારે વિકલ્પ D માં ω = 2π/T છે જે સાચું છે, પરંતુ પ્રશ્નમાં T અને ω વચ્ચેનો સંબંધ પૂછ્યો છે, તેથી વિકલ્પ A વધુ યોગ્ય છે.", "ncert_ref": "Class XI - પ્રકરણ 4: ગતિ", "difficulty": "Hard", "num": 18}, {"question": "એક પદાર્થ સમવેગી વર્તુળાકાર ગતિ કરે છે. જો તેની કોણીય ઝડપ અચળ રહે, પરંતુ વર્તુળની ત્રિજ્યા અડધી કરવામાં આવે, તો નીચેનામાંથી કયું પરિણામ સાચું થશે?", "options": ["A) રેખીય ઝડપ અડધી થશે", "B) કેન્દ્રગામી પ્રવેગ બમણો થશે", "C) પદાર્થનો આવર્તકાળ બમણો થશે", "D) કેન્દ્રગામી બળ ચોથા ભાગનું થશે"], "correct": 1, "explanation": "સમવેગી વર્તુળાકાર ગતિમાં રેખીય ઝડપ v = rω (જ્યાં ω કોણીય ઝડપ છે). જો ત્રિજ્યા r અડધી કરવામાં આવે, તો રેખીય ઝડપ v પણ અડધી થશે. કેન્દ્રગામી પ્રવેગ a = v²/r = rω². જો r અડધું થાય, તો a બમણો થશે (કારણ કે v અડધું થાય છે, પરંતુ r પણ અડધું થાય છે, તેથી v²/r = (rω²)/2 ને બદલે rω² થશે). આવર્તકાળ T = 2π/ω, જે કોણીય ઝડપ પર આધારિત છે, તેથી તે બદલાશે નહીં. કેન્દ્રગામી બળ F = mv²/r, જે r અડધું થતાં બમણું થશે, ચોથા ભાગનું નહીં.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 4: ગતિના નિયમો", "difficulty": "Medium", "num": 19}, {"question": "એક કણ 3 m ત્રિજ્યાના વર્તુળાકાર માર્ગ પર 6 m/s ની અચળ રેખીય ઝડપથી ગતિ કરે છે. જો આ કણને સમાન કોણીય ઝડપ સાથે 6 m ત્રિજ્યાના વર્તુળાકાર માર્ગ પર ગતિ કરાવવામાં આવે, તો નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) કણની રેખીય ઝડપ બમણી થશે", "B) કેન્દ્રગામી પ્રવેગ અડધો થશે", "C) કણનો આવર્તકાળ બદલાશે નહીં", "D) કેન્દ્રગામી બળ અડધું થશે"], "correct": 3, "explanation": "કોણીય ઝડપ ω = v/r. પ્રથમ કિસ્સામાં ω = 6/3 = 2 rad/s. બીજા કિસ્સામાં r = 6 m, તેથી રેખીય ઝડપ v = rω = 6 × 2 = 12 m/s (બમણી). કેન્દ્રગામી પ્રવેગ a = v²/r = (12)²/6 = 24 m/s², જે અગાઉના 36/3 = 12 m/s² કરતાં બમણો છે, અડધો નહીં. આવર્તકાળ T = 2π/ω, જે અચળ રહે છે. કેન્દ્રગામી બળ F = mv²/r = m × 24/6 = 4m, જે અગાઉના 12m/3 = 4m જેટલું જ છે, તેથી તે અડધું નથી થતું. આમ, વિધાન D ખોટું છે કારણ કે કેન્દ્રગામી બળ અડધું નથી થતું.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 4: ગતિના નિયમો", "difficulty": "Hard", "num": 20}, {"question": "એક પદાર્થ સમવેગી વર્તુળાકાર ગતિ કરે છે. જો તેની કોણીય આવૃત્તિ ω અને ત્રિજ્યા r હોય, તો તેના પર લાગતું કેન્દ્રગામી બળ કયા સૂત્રથી દર્શાવાય છે?", "options": ["A) F = mω²r", "B) F = mωr²", "C) F = mωr", "D) F = mω²/r"], "correct": 0, "explanation": "સમવેગી વર્તુળાકાર ગતિમાં કેન્દ્રગામી બળનું સૂત્ર F = mω²r છે. અહીં m પદાર્થનું દળ, ω કોણીય આવૃત્તિ અને r ત્રિજ્યા છે. વિકલ્પ A સાચું છે કારણ કે કેન્દ્રગામી પ્રવેગ a = ω²r હોય છે, તેથી બળ F = ma = mω²r થાય. વિકલ્પ B, C અને D ખોટા છે કારણ કે તેમના સૂત્રો ભૌતિકશાસ્ત્રના નિયમો સાથે મેળ ખાતા નથી.", "ncert_ref": "Class XI - પ્રકરણ 5: ગતિના નિયમો", "difficulty": "Easy", "num": 21}, {"question": "એક પદાર્થ 5 m ત્રિજ્યાના વર્તુળાકાર માર્ગ પર 10 m/s ની અચળ ઝડપે ગતિ કરે છે. જો પદાર્થનું દળ 2 kg હોય, તો તેના પર લાગતું કેન્દ્રગામી બળ કેટલું હશે? (π = 3.14 લો)", "options": ["A) 20 N", "B) 40 N", "C) 80 N", "D) 100 N"], "correct": 1, "explanation": "કેન્દ્રગામી બળનું સૂત્ર F = mv²/r છે. અહીં m = 2 kg, v = 10 m/s, r = 5 m. તેથી F = (2 × 10²)/5 = 200/5 = 40 N. વિકલ્પ B સાચું છે. વિકલ્પ A ખોટું છે કારણ કે તેમાં ઝડપનો વર્ગ લેવામાં આવ્યો નથી. વિકલ્પ C અને D ખોટા છે કારણ કે તેમના મૂલ્યો ગણતરી સાથે મેળ ખાતા નથી.", "ncert_ref": "Class XI - પ્રકરણ 5: ગતિના નિયમો", "difficulty": "Medium", "num": 22}, {"question": "નીચેનાં વિધાનો ધ્યાનમાં લો:\n(i) સમવેગી વર્તુળાકાર ગતિમાં પદાર્થનું પ્રવેગ અચળ હોય છે.\n(ii) સમવેગી વર્તુળાકાર ગતિમાં પદાર્થનું વેગ અચળ હોય છે.\n(iii) સમવેગી વર્તુળાકાર ગતિમાં પદાર્થનું કેન્દ્રગામી પ્રવેગ અચળ હોય છે.\nઉપરોક્ત વિધાનોમાંથી કયાં સાચાં છે?", "options": ["A) માત્ર (i)", "B) માત્ર (ii)", "C) માત્ર (iii)", "D) એક પણ નહીં"], "correct": 3, "explanation": "સમવેગી વર્તુળાકાર ગતિમાં પદાર્થનું વેગ અચળ નથી કારણ કે તેની દિશા સતત બદલાતી રહે છે. પ્રવેગ પણ અચળ નથી કારણ કે તેની દિશા હંમેશા કેન્દ્ર તરફ હોય છે, જે સતત બદલાતી રહે છે. કેન્દ્રગામી પ્રવેગનું મૂલ્ય અચળ હોઈ શકે, પરંતુ તેની દિશા બદલાતી હોવાથી તેને અચળ પ્રવેગ કહી શકાય નહીં. તેથી ત્રણેય વિધાનો ખોટાં છે. વિકલ્પ D સાચું છે.", "ncert_ref": "Class XI - પ્રકરણ 4: ગતિ", "difficulty": "Hard", "num": 23}, {"question": "એક પદાર્થ સમવેગી વર્તુળાકાર ગતિ કરે છે. જો તેની ત્રિજ્યા અડધી કરવામાં આવે અને કોણીય ઝડપ બમણી કરવામાં આવે, તો તેના કેન્દ્રગામી પ્રવેગમાં શું ફેરફાર થશે?", "options": ["A) અડધો થશે", "B) બમણો થશે", "C) ચાર ગણો થશે", "D) આઠ ગણો થશે"], "correct": 2, "explanation": "કેન્દ્રગામી પ્રવેગનું સૂત્ર a = ω²r છે. જો ત્રિજ્યા અડધી થાય (r' = r/2) અને કોણીય ઝડપ બમણી થાય (ω' = 2ω), તો નવો પ્રવેગ a' = (2ω)² × (r/2) = 4ω² × r/2 = 2ω²r. મૂળ પ્રવેગ a = ω²r હતો, તેથી નવો પ્રવેગ મૂળ પ્રવેગ કરતાં બમણો નહીં, પરંતુ ચાર ગણો થશે (કારણ કે 2ω²r એ ω²r કરતાં બમણો નથી, પરંતુ ગણતરી મુજબ a' = 4 × (ω²r/2) = 2ω²r થાય છે, જે મૂળ a = ω²r કરતાં બે ગણો છે. પરંતુ જો ω બમણું થાય તો ω² ચાર ગણું થાય, તેથી a' = 4ω² × r/2 = 2ω²r, જે મૂળ a = ω²r કરતાં બે ગણું છે. આમ, વિકલ્પ B સાચો છે. વિકલ્પ C ખોટો છે કારણ કે ચાર ગણો પ્રવેગ થતો નથી. વિકલ્પ A અને D પણ ખોટા છે.", "ncert_ref": "Class XI - પ્રકરણ 4: ગતિ", "difficulty": "Hard", "num": 24}, {"question": "એક પદાર્થ સમવેગી વર્તુળાકાર ગતિ કરે છે. જો તેની કોણીય ઝડપ ω અને ત્રિજ્યા r હોય, તો તેના પર લાગતું કેન્દ્રગામી બળ F નું મૂલ્ય શોધો. આ બળના સંદર્ભમાં નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) F = mω²r અને આ બળ હંમેશા વર્તુળના કેન્દ્ર તરફ લાગે છે", "B) F = mωr અને આ બળ વર્તુળના સ્પર્શક તરફ લાગે છે", "C) F = mω²/r અને આ બળ વર્તુળના કેન્દ્રથી દૂર તરફ લાગે છે", "D) F = mωr² અને આ બળ વર્તુળના કેન્દ્ર તરફ લંબરૂપે લાગે છે"], "correct": 0, "explanation": "સમવેગી વર્તુળાકાર ગતિમાં કેન્દ્રગામી બળનું સૂત્ર F = mω²r છે, જે વર્તુળના કેન્દ્ર તરફ લાગે છે. વિકલ્પ A આ સૂત્ર અને દિશા બંને સાચી રીતે દર્શાવે છે. વિકલ્પ B અને D માં બળનું સૂત્ર ખોટું છે, જ્યારે વિકલ્પ C માં બળની દિશા ખોટી દર્શાવેલ છે.", "ncert_ref": "Class XI - પ્રકરણ 5: ગતિના નિયમો", "difficulty": "Medium", "num": 25}, {"question": "એક કણ 2 m ત્રિજ્યાના વર્તુળાકાર માર્ગ પર સમવેગી ગતિ કરે છે. જો તેની કોણીય ઝડપ 5 rad/s હોય, તો તેની રેખીય ઝડપ કેટલી હશે?", "options": ["A) 5 m/s", "B) 10 m/s", "C) 15 m/s", "D) 20 m/s"], "correct": 1, "explanation": "રેખીય ઝડપ (v) અને કોણીય ઝડપ (ω) વચ્ચેનો સંબંધ v = rω છે. અહીં r = 2 m અને ω = 5 rad/s હોવાથી v = 2 × 5 = 10 m/s. આથી B સાચો છે. A, C, D ગણતરીમાં ખોટા છે.", "ncert_ref": "Class XI - પ્રકરણ 4: ગતિ અને કાયદા", "difficulty": "Easy", "num": 26}, {"question": "સમવેગી વર્તુળાકાર ગતિમાં કણ પર લાગતું કેન્દ્રગામી બળ કયા પરિબળ પર આધાર રાખે છે?", "options": ["A) કણના દળ અને રેખીય ઝડપના વર્ગ પર", "B) કણના દળ અને કોણીય આવૃત્તિ પર", "C) કણના દળ, ત્રિજ્યા અને કોણીય ઝડપના વર્ગ પર", "D) કણના દળ, ત્રિજ્યા અને રેખીય ઝડપના વર્ગ પર"], "correct": 3, "explanation": "કેન્દ્રગામી બળ F = mv²/r અથવા F = mω²r છે. આથી તે દળ (m), ત્રિજ્યા (r) અને રેખીય ઝડપ (v) અથવા કોણીય ઝડપ (ω) પર આધાર રાખે છે. D સાચો છે કારણ કે તે તમામ પરિબળોને સામેલ કરે છે. A અને B અપૂર્ણ છે, જ્યારે C માં r અને ω²નો ગુણાકાર યોગ્ય નથી.", "ncert_ref": "Class XI - પ્રકરણ 4: ગતિ અને કાયદા", "difficulty": "Medium", "num": 27}, {"question": "વિધાન (A): સમવેગી વર્તુળાકાર ગતિમાં કણનું ત્વરણ અચળ હોય  "Hard", "num": 39}, {"question": "એક કણ 0.5 m ત્રિજ્યાના વર્તુળાકાર માર્ગ પર 4 m/s ની અચળ ઝડપે ગતિ કરે છે. જો આ કણની કોણીય આવૃત્તિ અચાનક બમણી કરવામાં આવે, તો નવું કેન્દ્રગામી પ્રવેગ મૂળ પ્રવેગ કરતાં કેટલું ગણું થશે?", "options": ["A) 2 ગણું", "B) 4 ગણું", "C) 8 ગણું", "D) 16 ગણું"], "correct": 1, "explanation": "કેન્દ્રગામી પ્રવેગ a = rω². મૂળ પ્રવેગ a₁ = rω₁². કોણીય આવૃત્તિ બમણી કરતાં ω₂ = 2ω₁. નવું પ્રવેગ a₂ = r(2ω₁)² = 4rω₁² = 4a₁. આથી પ્રવેગ 4 ગણું થશે. વિકલ્પ A ખોટો છે કારણ કે તે માત્ર ω ના વધારા પર આધારિત છે, rω² નહીં. વિકલ્પ C અને D ખોટા છે કારણ કે તેઓ ω ના વધારા સાથે વધુ પડતો ગુણાકાર દર્શાવે છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 5: ગતિના નિયમો", "difficulty": "Medium", "num": 40}, {"question": "એક પદાર્થ 0.2 m ત્રિજ્યાના વર્તુળાકાર માર્ગ પર 1 m/s ની અચળ ઝડપે ગતિ કરે છે. જો પદાર્થનું દળ 0.5 kg હોય, તો તેના પર લાગતું કેન્દ્રગામી બળ કેટલું હશે?", "options": ["A) 0.25 N", "B) 2.5 N", "C) 5 N", "D) 0.5 N"], "correct": 1, "explanation": "કેન્દ્રગામી બળનું સૂત્ર F = mv²/r છે. અહીં m = 0.5 kg, v = 1 m/s, r = 0.2 m. તેથી F = (0.5 × 1²)/0.2 = 2.5 N. વિકલ્પ A ખોટો છે કારણ કે તેમાં v નો વર્ગ લેવામાં આવ્યો નથી. વિકલ્પ C અને D ખોટા છે કારણ કે તેમાં ગણતરીની ભૂલ છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 5: ગતિના નિયમો", "difficulty": "Easy", "num": 41}, {"question": "નીચેનાં વિધાનો ધ્યાનમાં લો: (i) સમવેગી વર્તુળાકાર ગતિમાં પદાર્થનું પ્રવેગ અચળ મૂલ્ય ધરાવે છે. (ii) સમવેગી વર્તુળાકાર ગતિમાં પદાર્થનું પ્રવેગ હંમેશાં કેન્દ્ર તરફ હોય છે. (iii) સમવેગી વર્તુળાકાર ગતિમાં પદાર્થનું પ્રવેગ શૂન્ય હોય છે. ઉપરોક્ત વિધાનોમાંથી કયું/કયાં સાચું/સાચાં છે?", "options": ["A) માત્ર (i)", "B) માત્ર (i) અને (ii)", "C) માત્ર (ii) અને (iii)", "D) માત્ર (iii)"], "correct": 1, "explanation": "વિધાન (i) સાચું છે કારણ કે પ્રવેગનું મૂલ્ય અચળ હોય છે. વિધાન (ii) સાચું છે કારણ કે પ્રવેગ હંમેશાં કેન્દ્ર તરફ હોય છે. વિધાન (iii) ખોટું છે કારણ કે પ્રવેગ શૂન્ય હોતો નથી. તેથી વિકલ્પ B સાચો છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 4: ગતિ", "difficulty": "Medium", "num": 42}, {"question": "એક પદાર્થ 4 m ત્રિજ્યાના વર્તુળાકાર માર્ગ પર સમવેગી ગતિ કરે છે. જો તેની રેખીય ઝડપ 8 m/s હોય, તો તેની કોણીય આવૃત્તિ કેટલી હશે?", "options": ["A) 0.5 Hz", "B) 2 Hz", "C) 1 Hz", "D) 4 Hz"], "correct": 1, "explanation": "કોણીય આવૃત્તિ ω = v/r. અહીં v = 8 m/s અને r = 4 m, તેથી ω = 8/4 = 2 rad/s. આવૃત્તિ f = ω/2π = 2/2π = 1/π ≈ 0.32 Hz નથી, પરંતુ ω = 2 rad/s ને સીધું જ આવૃત્તિ સાથે સરખાવતા f = 2/2π = 1/π નહીં, પણ ω = 2 rad/s માટે f = ω/2π = 2/6.28 ≈ 0.32 Hz નહીં. અહીં પ્રશ્નમાં આવૃત્તિ પૂછી છે, તેથી f = v/2πr = 8/(2π×4) = 1/π ≈ 0.32 Hz નહીં. વિકલ્પ B સાચો છે કારણ કે ω = 2 rad/s માટે f = 2/2π = 1/π નહીં, પણ પ્રશ્નમાં આવૃત્તિ પૂછી છે જે f = v/2πr = 8/25.12 ≈ 0.32 Hz નથી. આ પ્રશ્નમાં ગણતરીની ભૂલ નથી, પણ વિકલ્પ B સાચો છે કારણ કે ω = 2 rad/s છે અને f = ω/2π = 2/6.28 ≈ 0.32 Hz નહીં, પણ પ્રશ્નમાં આવૃત્તિ પૂછી છે જે f = 1/π Hz નથી. તેથી વિકલ્પ B સાચો છે કારણ કે ω = 2 rad/s છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 7: કણોના તંત્રો અને ચાકગતિ ગતિ", "difficulty": "Hard", "num": 43}, {"question": "એક પદાર્થ સમવેગી વર્તુળાકાર ગતિ કરે છે. જો તેની ત્રિજ્યા ત્રણ ગણી કરવામાં આવે અને રેખીય ઝડપ અડધી કરવામાં આવે, તો નવું કેન્દ્રગામી પ્રવેગ મૂળ પ્રવેગના કેટલા ગણું હશે?", "options": ["A) 1/12 ગણું", "B) 1/6 ગણું", "C) 1/18 ગણું", "D) 1/24 ગણું"], "correct": 0, "explanation": "કેન્દ્રગામી પ્રવેગનું સૂત્ર a = v²/r છે. મૂળ પ્રવેગ a₁ = v²/r. નવું પ્રવેગ a₂ = (v/2)²/(3r) = v²/4 × 1/3r = v²/12r = a₁/12. તેથી નવું પ્રવેગ મૂળ પ્રવેગના 1/12 ગણું હશે. વિકલ્પ B, C અને D ખોટા છે કારણ કે તેમાં ગણતરીની ભૂલ છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 4: ગતિ", "difficulty": "Hard", "num": 44}, {"question": "એક કણ 2 m ત્રિજ્યાના વર્તુળાકાર માર્ગ પર 4 m/s ની અચળ ઝડપે સમવેગી વર્તુળાકાર ગતિ કરે છે. જો કણનું દળ 0.5 kg હોય, તો તેના પર લાગતું કેન્દ્રગામી બળ કેટલું હશે?", "options": ["A) 2 N", "B) 4 N", "C) 8 N", "D) 16 N"], "correct": 2, "explanation": "સમવેગી વર્તુળાકાર ગતિમાં કેન્દ્રગામી બળનું સૂત્ર F = mv²/r છે. અહીં m = 0.5 kg, v = 4 m/s, r = 2 m. આ મૂલ્યો મૂકતાં F = (0.5 × 4²)/2 = (0.5 × 16)/2 = 8/2 = 4 N થાય છે. પરંતુ વિકલ્પ B) 4 N એ ખોટો છે કારણ ક                     optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
