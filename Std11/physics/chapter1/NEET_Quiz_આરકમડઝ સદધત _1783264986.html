<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - આર્કિમિડીઝ સિદ્ધાંત – પ્રવાહીમાં ડૂબેલા પદાર્થ પર ઉત્પ્લાવક બળ લાગે છે.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 આર્કિમિડીઝ સિદ્ધાંત – પ્રવાહીમાં ડૂબેલા પદાર્થ પર ઉત્પ્લાવક બળ લાગે છે.</span>
                <span>🎯 Mixed</span>
                <span>📝 47 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "એક પદાર્થને પાણીમાં ડુબાડતાં તેના વજનમાં ઘટાડો થાય છે. આ ઘટાડાનું કારણ કયું છે?", "options": ["A) પદાર્થ પર લાગતું ગુરુત્વાકર્ષણ બળ ઘટે છે", "B) પાણી દ્વારા પદાર્થ પર ઉત્પ્લાવક બળ લાગે છે", "C) પદાર્થનું ઘનત્વ પાણી કરતાં ઓછું હોય છે", "D) પાણીનું પૃષ્ઠતણાવ પદાર્થને ઉપર તરતું કરે છે"], "correct": 1, "explanation": "પદાર્થને પાણીમાં ડુબાડતાં તેના વજનમાં ઘટાડો થવાનું કારણ એ છે કે પાણી દ્વારા પદાર્થ પર આર્કિમિડીઝ સિદ્ધાંત મુજબ ઉત્પ્લાવક બળ લાગે છે, જે પદાર્થના વજનના એક ભાગને સંતુલિત કરે છે. ગુરુત્વાકર્ષણ બળમાં કોઈ ફેરફાર થતો નથી (A ખોટું). પદાર્થનું ઘનત્વ ઓછું હોવું એ ઉત્પ્લાવક બળનું કારણ નથી, પરંતુ તે પદાર્થ તરશે કે નહીં તે નક્કી કરે (C ખોટું). પૃષ્ઠતણાવનો ઉત્પ્લાવક બળ સાથે સીધો સંબંધ નથી (D ખોટું).", "ncert_ref": "Class XI - પ્રકરણ 10: પ્રવાહીના યાંત્રિક ગુણધર્મો", "difficulty": "Easy", "num": 1}, {"question": "આર્કિમિડીઝ સિદ્ધાંત અનુસાર, પ્રવાહીમાં ડૂબેલા પદાર્થ પર લાગતું ઉત્પ્લાવક બળ કયા પરિબળ પર આધારિત છે?", "options": ["A) પદાર્થના પદાર્થના ઘનત્વ અને કદ પર", "B) પ્રવાહીના ઘનત્વ, પદાર્થના ડૂબેલા ભાગના કદ અને ગુરુત્વાકર્ષણના મૂલ્ય પર", "C) પદાર્થના આકાર અને પ્રવાહીના તાપમાન પર", "D) પદાર્થના વજન અને પ્રવાહીની શ્યાનતા પર"], "correct": 1, "explanation": "આર્કિમિડીઝ સિદ્ધાંત મુજબ, ઉત્પ્લાવક બળ = પ્રવાહીનું ઘનત્વ × ડૂબેલા ભાગનું કદ × ગુરુત્વાકર્ષણનું મૂલ્ય. આમ, તે પ્રવાહીના ઘનત્વ, પદાર્થના ડૂબેલા ભાગના કદ અને ગુરુત્વાકર્ષણના મૂલ્ય પર આધારિત છે (B સાચું). પદાર્થના ઘનત્વ અને કદ પર ઉત્પ્લાવક બળ આધારિત નથી (A ખોટું). પદાર્થના આકાર અને પ્રવાહીના તાપમાનનો સીધો સંબંધ નથી (C ખોટું). પદાર્થના વજન અને શ્યાનતાનો ઉત્પ્લાવક બળ સાથે સીધો સંબંધ નથી (D ખોટું).", "ncert_ref": "Class XI - પ્રકરણ 10: પ્રવાહીના યાંત્રિક ગુણધર્મો", "difficulty": "Medium", "num": 2}, {"question": "એક લોખંડનો ટુકડો પાણીમાં ડૂબી જાય છે, જ્યારે એ જ ટુકડાને કાટમાળમાં રૂપાંતરિત કરતાં તે પાણી પર તરે છે. આ ઘટનાનું કારણ કયું છે?", "options": ["A) કાટમાળનું ઘનત્વ લોખંડ કરતાં ઓછું હોય છે", "B) કાટમાળમાં હવા ભરેલી હોય છે, જે તેના સરેરાશ ઘનત્વને ઘટાડે છે", "C) કાટમાળનું વજન લોખંડ કરતાં ઓછું હોય છે", "D) પાણી અને કાટમાળ વચ્ચે રાસાયણિક પ્રક્રિયા થાય છે"], "correct": 1, "explanation": "લોખંડનો ટુકડો પાણીમાં ડૂબી જાય છે કારણ કે તેનું ઘનત્વ પાણી કરતાં વધારે હોય છે. જ્યારે લોખંડને કાટમાળમાં રૂપાંતરિત કરવામાં આવે છે, ત્યારે કાટમાળમાં હવા ભરેલી હોય છે, જે તેના સરેરાશ ઘનત્વને ઘટાડે છે અને તે પાણી પર તરે છે (B સાચું). કાટમાળનું ઘનત્વ લોખંડ કરતાં ઓછું હોવું એ સીધું કારણ નથી (A ખોટું). કાટમાળનું વજન લોખંડ કરતાં ઓછું હોવું એ સીધું કારણ નથી (C ખોટું). પાણી અને કાટમાળ વચ્ચે રાસાયણિક પ્રક્રિયા થવી એ ઉત્પ્લાવકતાનું કારણ નથી (D ખોટું).", "ncert_ref": "Class XI - પ્રકરણ 10: પ્રવાહીના યાંત્રિક ગુણધર્મો", "difficulty": "Medium", "num": 3}, {"question": "એક પદાર્થ પાણીમાં તરે છે. જો પાણીને મીઠાના દ્રાવણ વડે બદલવામાં આવે, તો પદાર્થના તરવાની સ્થિતિમાં શું ફેરફાર થશે?", "options": ["A) પદાર્થ વધુ ડૂબશે", "B) પદાર્થ ઓછું ડૂબશે", "C) પદાર્થનું તરવાનું સ્તર અચળ રહેશે", "D) પદાર્થ ડૂબી જશે"], "correct": 1, "explanation": "મીઠાના દ્રાવણનું ઘનત્વ શુદ્ધ પાણી કરતાં વધારે હોય છે. આર્કિમિડીઝ સિદ્ધાંત મુજબ, ઉત્પ્લાવક બળ પ્રવાહીના ઘનત્વ પર આધારિત છે. મીઠાના દ્રાવણમાં પદાર્થ પર વધારે ઉત્પ્લાવક બળ લાગશે, જેથી પદાર્થ ઓછું ડૂબશે (B સાચું). પદાર્થ વધુ ડૂબવાનું કારણ નથી (A ખોટું). તરવાનું સ્તર અચળ રહેવાનું કારણ નથી (C ખોટું). પદાર્થ ડૂબી જવાનું કારણ નથી (D ખોટું).", "ncert_ref": "Class XI - પ્રકરણ 10: પ્રવાહીના યાંત્રિક ગુણધર્મો", "difficulty": "Hard", "num": 4}, {"question": "નીચેના પૈકી કયો વિકલ્પ આર્કિમિડીઝ સિદ્ધાંતનો સીધો અર્થ નથી?", "options": ["A) પ્રવાહીમાં ડૂબેલા પદાર્થ પર લાગતું ઉત્પ્લાવક બળ પદાર્થ દ્વારા હટાવેલા પ્રવાહીના વજન જેટલું હોય છે", "B) ઉત્પ્લાવક બળ પદાર્થના વજન પર આધારિત છે", "C) ઉત્પ્લાવક બળ પ્રવાહીના ઘનત્વ પર આધારિત છે", "D) ઉત્પ્લાવક બળ પદાર્થના ડૂબેલા ભાગના કદ પર આધારિત છે"], "correct": 1, "explanation": "આર્કિમિડીઝ સિદ્ધાંત મુજબ, પ્રવાહીમાં ડૂબેલા પદાર્થ પર લાગતું ઉત્પ્લાવક બળ પદાર્થ દ્વારા હટાવેલા પ્રવાહીના વજન જેટલું હોય છે (A સાચું). ઉત્પ્લાવક બળ પ્રવાહીના ઘનત્વ (C સાચું) અને પદાર્થના ડૂબેલા ભાગના કદ પર આધારિત છે (D સાચું). ઉત્પ્લાવક બળ પદાર્થના વજન પર આધારિત નથી (B ખોટું).", "ncert_ref": "Class XI - પ્રકરણ 10: પ્રવાહીના યાંત્રિક ગુણધર્મો", "difficulty": "Medium", "num": 5}, {"question": "એક લાકડાનો ટુકડો પાણીમાં તરતો હોય છે. જો તેને ગ્લિસરિન (ઘનતા = 1.26 g/cm³)માં મૂકવામાં આવે, તો તેનું શું થશે?", "options": ["A) તે પાણીની સપાટી પર તરશે", "B) તે ગ્લિસરિનમાં અરધો ડૂબીને તરશે", "C) તે ગ્લિસરિનમાં પૂરેપૂરો ડૂબી જશે", "D) તે ગ્લિસરિનની સપાટી પર તરશે પરંતુ પાણી કરતાં ઓછો ભાગ બહાર રહેશે"], "correct": 3, "explanation": "લાકડાનો ટુકડો પાણીમાં તરે છે કારણ કે તેની ઘનતા પાણી કરતાં ઓછી હોય છે. ગ્લિસરિનની ઘનતા પાણી કરતાં વધુ (1.26 g/cm³) હોય છે, પરંતુ લાકડાની ઘનતા ગ્લિસરિન કરતાં પણ ઓછી હોય છે, તેથી તે ગ્લિસરિનમાં પણ તરશે. જો કે, ગ્લિસરિનની ઘનતા વધુ હોવાથી, લાકડાનો ટુકડો પાણી કરતાં ઓછો ભાગ બહાર રાખીને તરશે. આર્કિમિડીઝ સિદ્ધાંત અનુસાર, ઉત્પ્લાવક બળ પદાર્થ દ્વારા વિસ્થાપિત પ્રવાહીના વજન જેટલું હોય છે. તેથી, ગ્લિસરિનમાં વિસ્થાપિત પ્રવાહીનું વજન વધુ હોવાથી, લાકડાનો ટુકડો ઓછો ભાગ બહાર રાખશે. વિકલ્પ A, B, અને C ખોટા છે કારણ કે તે લાકડાની ઘનતા અને ગ્લિસરિનની ઘનતાનો યોગ્ય અભ્યાસ કરતાં નથી.", "ncert_ref": "Class XI - પ્રકરણ 10: પ્રવાહી યાંત્રિકી", "difficulty": "Medium", "num": 6}, {"question": "એક પદાર્થ પાણીમાં તરતો હોય છે. જો તે પદાર્થને ચંદ્ર પર લઈ જવામાં આવે (જ્યાં ગુરુત્વાકર્ષણ પૃથ્વી કરતાં 1/6 ગણું હોય છે), તો તેનું શું થશે?", "options": ["A) તે પાણીમાં ડૂબી જશે", "B) તે પાણીમાં તરશે પરંતુ પૃથ્વી કરતાં ઓછો ભાગ બહાર રહેશે", "C) તે પાણીમાં તરશે પરંતુ પૃથ્વી કરતાં વધુ ભાગ બહાર રહેશે", "D) તે પાણીની સપાટી પર તરશે પરંતુ પાણીની અંદર ડૂબશે નહીં"], "correct": 2, "explanation": "આર્કિમિડીઝ સિદ્ધાંત અનુસાર, ઉત્પ્લાવક બળ પદાર્થ દ્વારા વિસ્થાપિત પ્રવાહીના વજન પર આધારિત હોય છે. ચંદ્ર પર ગુરુત્વાકર્ષણ પૃથ્વી કરતાં 1/6 ગણું હોય છે, પરંતુ પદાર્થ અને પાણી બંનેમાં ગુરુત્વાકર્ષણનો પ્રભાવ સરખો રહેશે. તેથી, પદાર્થનું વજન અને વિસ્થાપિત પાણીનું વજન બંનેમાં 1/6 ગણો ઘટાડો થશે. પરિણામે, પદાર્થ પાણીમાં તરશે પરંતુ પૃથ્વી કરતાં વધુ ભાગ બહાર રહેશે કારણ કે ઉત્પ્લાવક બળ અને પદાર્થનું વજન બંનેમાં સમાન પ્રમાણમાં ઘટાડો થાય છે. વિકલ્પ A, B, અને D ખોટા છે કારણ કે  13.6 g/cm³) વાપરવામાં આવે, તો પદાર્થ પર લાગતું ઉત્પ્લાવક બળ કેવી રીતે બદલાશે?", "options": ["A) ઉત્પ્લાવક બળ 13.6 ગણું વધશે", "B) ઉત્પ્લાવક બળ અચળ રહેશે", "C) ઉત્પ્લાવક બળ પદાર્થના કદ પર આધાર રાખશે", "D) ઉત્પ્લાવક બળ પદાર્થની ઘનતા પર આધાર રાખશે"], "correct": 0, "explanation": "આર્કિમિડીઝ સિદ્ધાંત અનુસાર, ઉત્પ્લાવક બળ = વિસ્થાપિત પ્રવાહીનું વજન = V × ρ_પ્રવાહી × g. મરકરીની ઘનતા પાણી કરતાં 13.6 ગણી વધારે હોવાથી, ઉત્પ્લાવક બળ પણ 13.6 ગણું વધશે. વિકલ્પ B ખોટો છે કારણ કે ઉત્પ્લાવક બળ પ્રવાહીની ઘનતા પર આધાર રાખે છે. વિકલ્પ C અને D ખોટા છે કારણ કે ઉત્પ્લાવક બળ પદાર્થના કદ અથવા ઘનતા પર નહીં, પરંતુ વિસ્થાપિત પ્રવાહીની ઘનતા પર આધાર રાખે છે.", "ncert_ref": "Class XI - પ્રકરણ 10: પ્રવાહી યાંત્રિકી", "difficulty": "Easy", "num": 26}, {"question": "નીચેનામાંથી કયું વિધાન આર્કિમિડીઝ સિદ્ધાંતની સીધી પરિણામ નથી?", "options": ["A) પદાર્થ પર લાગતું ઉત્પ્લાવક બળ વિસ્થાપિત પ્રવાહીના વજન જેટલું હોય છે", "B) પદાર્થની ઘનતા પ્રવાહી કરતાં ઓછી હોય તો પદાર્થ તરે છે", "C) પદાર્થ પર લાગતું ઉત્પ્લાવક બળ પદાર્થના કદ પર આધાર રાખે છે", "D) પદાર્થ પર લાગતું ઉત્પ્લાવક બળ પ્રવાહીની સપાટીના ક્ષેત્રફળ પર આધાર રાખે છે"], "correct": 3, "explanation": "આર્કિમિડીઝ સિદ્ધાંત અનુસાર, ઉત્પ્લાવક બળ વિસ્થાપિત પ્રવાહીના વજન પર આધાર રાખે છે, જે પદાર્થના ડૂબેલા ભાગના કદ અને પ્રવાહીની ઘનતા પર આધાર રાખે છે. વિકલ્પ D ખોટો છે કારણ કે ઉત્પ્લાવક બળ પ્રવાહીની સપાટીના ક્ષેત્રફળ પર આધાર રાખતું નથી.", "ncert_ref": "Class XI - પ્રકરણ 10: પ્રવાહી યાંત્રિકી", "difficulty": "Medium", "num": 27}, {"question": "એક પદાર્થ પાણીમાં તરતો હોય છે અને તેના કદનો 20% ભાગ પાણીની બહાર રહે છે. જો પાણીની જગ્યાએ તેલ (ઘનતા = 0.8 g/cm³) વાપરવામાં આવે, તો પદાર્થના કદનો કેટલો ભાગ તેલની બહાર રહેશે?", "options": ["A) 10%", "B) 20%", "C) 30%", "D) 40%"], "correct": 3, "explanation": "પાણીમાં, પદાર્થના 80% ભાગ ડૂબેલો હોય છે, જેથી તેની ઘનતા 0.8 g/cm³ હોય છે (કારણ કે 0.8 × 1 = 0.8). તેલની ઘનતા પણ 0.8 g/cm³ હોવાથી, પદાર્થ તેલમાં સંપૂર્ણપણે ડૂબી જશે નહીં, પરંતુ તેના કદનો 100% - 80% = 20% ભાગ તેલમાં ડૂબશે અને 80% ભાગ બહાર રહેશે. પરંતુ પ્રશ્નમાં પૂછવામાં આવ્ય ણપણે તરશે, અડધો ડૂબશે નહીં.", "ncert_ref": "Class XI - Chapter 10: પ્રવાહીના યાંત્રિક ગુણધર્મો", "difficulty": "Easy", "num": 37}, {"question": "નીચેનામાંથી કયું વિધાન આર્કિમિડીઝ સિદ્ધાંતની સીધી અરજ નથી?", "options": ["A) હવાઈ જહાજ હવામાં ઉડાન ભરે છે.", "B) લોખંડનું જહાજ પાણીમાં તરે છે.", "C) પાણીની અંદર સ્વિમિંગ પૂલમાં વ્યક્તિને હલકું લાગે છે.", "D) બરફનું ટુકડું પાણીમાં તરે છે."], "correct": 0, "explanation": "હવાઈ જહાજ હવામાં ઉડાન ભરે છે તે આર્કિમિડીઝ સિદ્ધાંત પર આધારિત નથી, પરંતુ બર્નૌલીના સિદ્ધાંત પર આધારિત છે. આર્કિમિડીઝ સિદ્ધાંત પ્રવાહીમાં ડૂબેલા પદાર્થ પર લાગતું ઉત્પ્લાવક બળ સમજાવે છે. વિકલ્પ B, C, અને D આર્કિમિડીઝ સિદ્ધાંતની સીધી અરજ છે.", "ncert_ref": "Class XI - Chapter 10: પ્રવાહીના યાંત્રિક ગુણધર્મો", "difficulty": "Hard", "num": 38}, {"question": "એક પદાર્થ પાણીમાં તરતો હોય છે અને તેના કદનો 25% ભાગ પાણીની બહાર રહે છે. જો પાણીની જગ્યાએ મરકરી (ઘનતા = 13.6 g/cm³) વાપરવામાં આવે, તો પદાર્થ કેવી રીતે વર્તશે?", "options": ["A) પદાર્થ મરકરીમાં તરશે અને તેના કદનો 25% ભાગ બહાર રહેશે.", "B) પદાર્થ મરકરીમાં સંપૂર્ણપણે ડૂબી જશે.", "C) પદાર્થ મરકરીમાં તરશે પરંતુ તેના કદનો 100% ભાગ બહાર રહેશે.", "D) પદાર્થ મરકરીમાં તળિયે બેસી જશે."], "correct": 2, "explanation": "પદાર્થ પાણીમાં તરતો હોવાથી તેની ઘનતા પાણી કરતાં ઓછી છે (0.75 g/cm³). મરકરીની ઘનતા (13.6 g/cm³) પાણી કરતાં ઘણી વધુ હોવાથી, પદાર્થ મરકરીમાં તરશે પરંતુ તેના સંપૂર્ણ કદનો ભાગ બહાર રહેશે કારણ કે મરકરીની ઘનતા ખૂબ જ વધુ છે. વિકલ્પ A ખોટો છે કારણ કે મરકરીની ઘનતા વધુ હોવાથી પદાર્થનો બહાર રહેતો ભાગ વધશે. વિકલ્પ B અને D ખોટા છે કારણ કે પદાર્થની ઘનતા મરકરી કરતાં ઓછી હોવાથી તે ડૂબશે નહીં.", "ncert_ref": "Class XI - Chapter 10: પ્રવાહીના યાંત્રિક ગુણધર્મો", "difficulty": "Hard", "num": 39}, {"question": "એક પદાર્થને પાણીમાં ડૂબાડતાં તેના વજનમાં 3 Nનો ઘટાડો થાય છે. જો આ જ પદાર્થને એક અન્ય પ્રવાહીમાં ડૂબાડવામાં આવે જેમાં પાણી કરતાં 1.5 ગણી ઘનતા હોય, તો તેના વજનમાં કેટલો ઘટાડો થશે?", "options": ["A) 2 N", "B) 3 N", "C) 4.5 N", "D) 6 N"], "correct": 2, "explanation": "આર્કિમિડીઝ સિદ્ધાંત અનુસાર, ઉત્પ્લાવક બળ પ્રવાહીની ઘનતા અને વિસ્થાપિત પ્રવાહીના કદ પર આધારિત છે. પાણીમાં વજનમાં ઘટાડો 3 N છે, જે ઉત્પ્લાવક બળ દર્શાવે છે. નવા પ્રવાહીની ઘનતા પાણી કરતાં 1.5 ગણી હોવાથી, ઉત્પ્લાવક બળ પણ 1.5 ગણું થશે, એટલે કે 3 N × 1.5 = 4.5 N. બાકીના વિકલ્પો ગણતરીની ભૂલ દર્શાવે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 10: યાંત્રિક ગુણધર્મો", "difficulty": "Medium", "num": 40}, {"question": "એક પદાર્થ પાણીમાં તરતો હોય છે અને તેના કદનો 40% ભાગ પાણીની બહાર રહે છે. જો આ પદાર્થને એક અન્ય પ્રવાહીમાં મૂકવામાં આવે જેમાં પાણી કરતાં 0.8 ગણી ઘનતા હોય, તો પદાર્થના કેટલા ટકા કદનો ભાગ પ્રવાહીની બહાર રહેશે? (ધારો કે પદાર્થની ઘનતા અચળ રહે છે)", "options": ["A) 20%", "B) 30%", "C) 50%", "D) 60%"], "correct": 2, "explanation": "પાણીમાં પદાર્થના કદનો 40% ભાગ બહાર રહે છે, એટલે કે 60% ભાગ ડૂબેલો છે. આર્કિમિડીઝ સિદ્ધાંત અનુસાર, પદાર્થની ઘનતા = 0.6 × પાણીની ઘનતા. નવા પ્રવાહીની ઘનતા 0.8 × પાણીની ઘનતા હોવાથી, પદાર્થની ઘનતા અને પ્રવાહીની ઘનતાનો ગુણોત્તર = 0.6 / 0.8 = 0.75. આથી, પદાર્થના કદનો 75% ભાગ ડૂબેલો રહેશે, અને 25% ભાગ બહાર રહેશે નહીં. સાચો જવાબ 50% છે કારણ કે ગણતરી મુજબ, પદાર્થના કદનો 50% ભાગ બહાર રહેશે (100% - 50% = 50%).", "ncert_ref": "ક્લાસ XI - પ્રકરણ 10: યાંત્રિક ગુણધર્મો", "difficulty": "Hard", "num": 41}, {"question": "એક પદાર્થને પાણીમાં ડૂબાડતાં તેના વજનમાં 4 Nનો ઘટાડો થાય છે. જો આ જ પદાર્થને એક અન્ય પ્રવાહીમાં ડૂબાડતાં તેના વજનમાં 5 Nનો ઘટાડો થાય, તો નીચેનામાંથી કયું વિધાન સાચું હશે? (પાણીની ઘનતા = 1000 kg/m³)", "options": ["A) બીજા પ્રવાહીની ઘનતા પાણી કરતાં ઓછી છે", "B) બીજા પ્રવાહીની ઘનતા પાણી કરતાં વધારે છે", "C) બંને પ્રવાહીઓની ઘનતા સમાન છે", "D) બીજા પ્રવાહીની ઘનતા પાણી કરતાં બમણી છે"], "correct": 1, "explanation": "આર્કિમિડીઝ સિદ્ધાંત અનુસાર, વજનમાં થતો ઘટાડો ઉત્પ્લાવક બળને સમાન હોય છે, જે પ્રવાહીની ઘનતા અને પદાર્થના ડૂબેલા કદ પર આધારિત છે. અહીં બીજા પ્રવાહીમાં વજનમાં વધુ ઘટાડો થાય છે, જે દર્શાવે છે કે તે પ્રવાહીની ઘનતા પાણી કરતાં વધારે છે. વિકલ્પ A ખોટો છે કારણ કે ઓછી ઘનતાવાળા પ્રવાહીમાં ઉત્પ્લાવક બળ ઓછું હોત. વિકલ્પ C ખોટો છે કારણ કે બંને પ્રવાહીઓની ઘનતા સમાન હોત તો વજનમાં ઘટાડો સમાન હોત. વિકલ્પ D ખોટો છે કારણ કે ઘનતા બમણી હોવાનો કોઈ પુરાવો નથી.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 10: યાંત્રિક ગુણધર્મો", "difficulty": "Easy", "num": 42}, {"question": "એક પદાર્થને પાણીમાં સંપૂર્ણપણે ડૂબાડતાં તેના પર લાગતું ઉત્પ્લાવક બળ 5 N છે. જો આ જ પદાર્થને ગ્લિસરિન (ઘનતા = 1.26 g/cm³)માં સંપૂર્ણપણે ડૂબાડવામાં આવે, તો તેના પર લાગતું ઉત્પ્લાવક બળ કેટલું હશે? (પાણીની ઘનતા = 1 g/cm³, g = 10 m/s²)", "options": ["A) 5 N", "B) 6.3 N", "C) 4 N", "D) 7.5 N"], "correct": 1, "explanation": "આર્કિમિડીઝ સિદ્ધાંત અનુસાર, ઉત્પ્લાવક બળ = વિસ્થાપિત પ્રવાહીનું વજન = V * ρ * g. પાણીમાં ઉત્પ્લાવક બળ 5 N છે, એટલે V * 1 * 10 = 5 → V = 0.5 m³. ગ્લિસરિનમાં ઉત્પ્લાવક બળ = 0.5 * 1.26 * 10 = 6.3 N. A) ખોટું કારણ કે ઘનતા બદલાય છે, B) બરાબર છે, C) ખોટું કારણ કે ગ્લિસરિનની ઘનતા પાણી કરતાં વધુ છે, D) ખોટું કારણ કે ગણતરી મુજબ 6.3 N જ આવે.", "ncert_ref": "Class XI - Chapter 10: પ્રવાહી યાંત્રિકી (Mechanical Properties of Fluids)", "difficulty": "Medium", "num": 43}, {"question": "નીચેનામાંથી કયું વિધાન આર્કિમિડીઝ સિદ્ધાંતની સીધી પરિણામ છે? A) પદાર્થની ઘનતા પ્રવાહીની ઘનતા કરતાં ઓછી હોય તો તે તરે છે. B) પદાર્થની ઘનતા પ્રવાહીની ઘનતા કરતાં વધુ હોય તો તે ડૂબી જાય છે. C) પદાર્થ પર લાગતું ઉત્પ્લાવક બળ પદાર્થના વજન કરતાં વધુ હોય તો તે તરે છે. D) ઉપરના બધા જ વિધાનો સત્ય છે.", "options": ["A) ફક્ત A અને B", "B) ફક્ત A અને C", "C) ફક્ત B અને C", "D) A, B અને C"], "correct": 3, "explanation": "આર્કિમિડીઝ સિદ્ધાંત અનુસાર, ઉત્પ્લાવક બળ = વિસ્થાપિત પ્રવાહીનું વજન. જો પદાર્થની ઘનતા પ્રવાહી કરતાં ઓછી હોય (A), તો ઉત્પ્લાવક બળ પદાર્થના વજન કરતાં વધુ હશે, જેથી તે તરે. જો ઘનતા વધુ હોય (B), તો ઉત્પ્લાવક બળ ઓછું હશે, જેથી તે ડૂબે. C પણ સત્ય છે કારણ કે ઉત્પ્લાવક બળ > વજન હોય તો પદાર્થ તરે. D બરાબર છે કારણ કે બધા જ વિધાનો સત્ય છે.", "ncert_ref": "Class XI - Chapter 10: પ્રવાહી યાંત્રિકી (Mechanical Properties of Fluids)", "difficulty": "Hard", "num": 44}, {"question": "એક પદાર્થને પાણીમાં ડૂબાડતાં તેના પર લાગતું ઉત્પ્લાવક બળ તેના વજન કરતાં ઓછું હોય છે. આ સ્થિતિમાં પદાર્થ કેવું વર્તન ધરાવશે?", "options": ["A) પદાર્થ પાણીની સપાટી પર તરશે", "B) પદાર્         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};

                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;

                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
