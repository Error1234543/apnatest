<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - કોણીય સંવેગનું સંરક્ષણ – બાહ્ય ટોર્ક ન હોય તો કોણીય સંવેગ અચળ રહે છે.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 કોણીય સંવેગનું સંરક્ષણ – બાહ્ય ટોર્ક ન હોય તો કોણીય સંવેગ અચળ રહે છે.</span>
                <span>🎯 Mixed</span>
                <span>📝 50 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "એક સમાન ચક્રી ગતિ કરતી વસ્તુ પર બાહ્ય ટોર્ક લાગતું નથી, તો નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) કોણીય વેગ અચળ રહે છે", "B) કોણીય પ્રવેગ અચળ રહે છે", "C) કોણીય સ્થાનાંતર અચળ રહે છે", "D) કોણીય ઉર્જા અચળ રહે છે"], "correct": 0, "explanation": "બાહ્ય ટોર્ક ન લાગતું હોય ત્યારે કોણીય સંવેગનું સંરક્ષણ થાય છે, જેથી કોણીય વેગ (ω) અચળ રહે છે. કોણીય પ્રવેગ (α) શૂન્ય હોય છે, કોણીય સ્થાનાંતર (θ) સમય સાથે બદલાય છે, અને કોણીય ઉર્જા અચળ રહેતી નથી જ્યાં સુધી કોણીય વેગ અચળ ન હોય.", "ncert_ref": "Class XI - પ્રકરણ ૭: કણની ગતિ અને કઠોર પદાર્થની ગતિ", "difficulty": "Easy", "num": 1}, {"question": "એક સ્કેટર જેના હાથમાં ભારવાહક ડંડો પકડેલો છે, તે પોતાના આસપાસ ફરે છે. જો તે ડંડો છોડી દે, તો તેની કોણીય ગતિ પર શું અસર થશે?", "options": ["A) કોણીય વેગ ઘટશે", "B) કોણીય વેગ વધશે", "C) કોણીય વેગ અચળ રહેશે", "D) કોણીય વેગ શૂન્ય થશે"], "correct": 1, "explanation": "જ્યારે સ્કેટર ડંડો છોડી દે છે, ત્યારે તેની જડત્વના મોમેન્ટ (I) ઘટે છે. કોણીય સંવેગ (L = Iω) અચળ રહે છે, જેથી કોણીય વેગ (ω) વધે છે. આથી, કોણીય વેગ વધશે. અન્ય વિકલ્પો યોગ્ય નથી કારણ કે કોણીય સંવેગ સંરક્ષિત રહે છે.", "ncert_ref": "Class XI - પ્રકરણ ૭: કણની ગતિ અને કઠોર પદાર્થની ગતિ", "difficulty": "Medium", "num": 2}, {"question": "નીચેનામાંથી કયું ઉદાહરણ કોણીય સંવેગના સંરક્ષણને દર્શાવે છે?", "options": ["A) પૃથ્વીની પરિભ્રમણ ગતિ", "B) એક સરળ લોલકની ગતિ", "C) એક ગતિમાં રહેલી કારની ગતિ", "D) એક ઉડતી ગોળીની ગતિ"], "correct": 0, "explanation": "પૃથ્વીની પરિભ્રમણ ગતિ કોણીય સંવેગના સંરક્ષણનું ઉદાહરણ છે કારણ કે પૃથ્વી પર કોઈ બાહ્ય ટોર્ક લાગતું નથી, જેથી તેનો કોણીય વેગ અચળ રહે છે. સરળ લોલક, કાર, અને ગોળીની ગતિ કોણીય સંવેગના સંરક્ષણ સાથે સંકળાયેલી નથી.", "ncert_ref": "Class XI - પ્રકરણ ૭: કણની ગતિ અને કઠોર પદાર્થની ગતિ", "difficulty": "Medium", "num": 3}, {"question": "એક ચક્રી ડિસ્ક જેમની જડત્વના મોમેન્ટ I છે તે કોણીય વેગ ω સાથે ફરે છે. જો ડિસ્ક પર કોઈ બાહ્ય ટોર્ક લાગતું નથી, તો નીચેનામાંથી કયું સત્ય છે?", "options": ["A) Iω અચળ રહેશે", "B) I²ω અચળ રહેશે", "C) Iω² અચળ રહેશે", "D) ω/I અચળ ્ય બળ શૂન્ય હોય તો કોણીય વેગ અચળ રહે છે"], "correct": 1, "explanation": "કોણીય સંવેગના સંરક્ષણના નિયમ મુજબ, જો બાહ્ય ટોર્ક શૂન્ય હોય તો કોણીય સંવેગ અચળ રહે છે. વિકલ્પ A ખોટો છે કારણ કે કોણીય વેગ અચળ રહેતો નથી, પરંતુ કોણીય સંવેગ અચળ રહે છે. વિકલ્પ C અને D ખોટા છે કારણ કે બાહ્ય બળ શૂન્ય હોવું કોણીય સંવેગના સંરક્ષણ માટે પૂરતું નથી, ટોર્ક શૂન્ય હોવું જરૂરી છે.", "ncert_ref": "Class XI - પ્રકરણ 7: ગતિના નિયમો", "difficulty": "Easy", "num": 10}, {"question": "એક ખગોળીય પદાર્થ તેની કક્ષામાં ગતિ કરતી વખતે તેના પર કોઈ બાહ્ય ટોર્ક લાગતું નથી. તો નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) તેનો કોણીય સંવેગ સતત બદલાતો રહે છે.", "B) તેનો કોણીય સંવેગ અચળ રહે છે.", "C) તેનો રેખીય વેગ સતત બદલાતો રહે છે, પરંતુ કોણીય સંવેગ અચળ રહે છે.", "D) તેનો કોણીય સંવેગ અને રેખીય વેગ બંને અચળ રહે છે."], "correct": 1, "explanation": "બાહ્ય ટોર્ક ન લાગતું હોય ત્યારે કોણીય સંવેગનું સંરક્ષણ થાય છે, એટલે કે કોણીય સંવેગ અચળ રહે છે. વિકલ્પ A ખોટો છે કારણ કે કોણીય સંવેગ બદલાતો નથી. વિકલ્પ C ખોટો છે કારણ કે રેખીય વેગ બદલાઈ શકે (ઉદા. દિશા બદલાશે), પરંતુ કોણીય સંવેગ અચળ રહે છે. વિકલ્પ D ખોટો છે કારણ કે રેખીય વેગ અચળ રહેતો નથી.", "ncert_ref": "Class XI - પ્રકરણ 7: ગતિના નિયમો (કોણીય સંવેગનું સંરક્ષણ)", "difficulty": "Easy", "num": 11}, {"question": "એક સ્કેટર તેના હાથમાં ભારવાહક ડંડો પકડીને ફરે છે. જો તે ડંડોને પોતાની નજીક ખેંચે તો તેની કોણીય ગતિ વિશે કયું વિધાન સાચું છે?", "options": ["A) તેની કોણીય ગતિ ધીમી પડે છે કારણ કે જડત્વના મોમેન્ટ વધે છે.", "B) તેની કોણીય ગતિ ઝડપી થાય છે કારણ કે જડત્વના મોમેન્ટ ઘટે છે.", "C) તેની કોણીય ગતિ અચળ રહે છે કારણ કે કોણીય સંવેગ બદલાતો નથી.", "D) તેની કોણીય ગતિ બદલાતી નથી કારણ કે બાહ્ય ટોર્ક લાગે છે."], "correct": 1, "explanation": "બાહ્ય ટોર્ક ન લાગતું હોય ત્યારે કોણીય સંવેગ (L = Iω) અચળ રહે છે. જડત્વના મોમેન્ટ (I) ઘટતાં કોણીય વેગ (ω) વધે છે, જેથી L અચળ રહે. વિકલ્પ A ખોટો છે કારણ કે જડત્વના મોમેન્ટ ઘટે છે, નહીં કે વધે. વિકલ્પ C ખોટો છે કારણ કે કોણીય વેગ બદલાય છે. વિકલ્પ D ખોટો છે કારણ કે બાહ્ય ટોર્ક લાગતું નથી.", "ncert_ref": "Class XI - પ્રકરણ 7: ગતિના નિયમો (કોણીય સંવેગનું સંરક્ષણ)", "difficulty": "Medium", "num": 12}, {"question": "એક ચક્રી ડિસ્ક જે કોણીય વેગ ω સાથે ફરે છે, તેના પર કોઈ બાહ્ય ટોર્ક લાગતું નથી. જો ડિસ્કના દળના વિતરણમાં ફેરફાર થાય અને તેનું જડત્વના મોમેન્ટ I' થાય, તો નવો કોણીય વેગ કયો હશે?", "options": ["A) ω' = (I/I') ω", "B) ω' = (I'/I) ω", "C) ω' = ω", "D) ω' = (I + I') ω"], "correct": 0, "explanation": "કોણીય સંવેગનું સંરક્ષણ (L = Iω = અચળ) અનુસાર, Iω = I'ω' ⇒ ω' = (I/I') ω. વિકલ્પ B ખોટો છે કારણ કે તે વ્યસ્ત ગુણોત્તર છે. વિકલ્પ C ખોટો છે કારણ કે જડત્વના મોમેન્ટ બદલાતાં કોણીય વેગ બદલાય છે. વિકલ્પ D ખોટો છે કારણ કે તે સરવાળો કરે છે, જે ભૌતિકશાસ્ત્રના સિદ્ધાંત અનુસાર યોગ્ય નથી.", "ncert_ref": "Class XI - પ્રકરણ 7: ગતિના નિયમો (કોણીય સંવેગનું સંરક્ષણ)", "difficulty": "Hard", "num": 13}, {"question": "એક આઈસ સ્કેટર તેના હાથને પોતાની આસપાસ ફેરવીને તેની ગતિને ઝડપી બનાવે છે. આ ઘટનાનું કારણ કયું સિદ્ધાંત છે?", "options": ["A) ઊર્જાનું સંરક્ષણ", "B) રેખીય સંવેગનું સંરક્ષણ", "C) કોણીય સંવેગનું સંરક્ષણ", "D) વેગમાનનું સંરક્ષણ"], "correct": 2, "explanation": "જ્યારે આઈસ સ્કેટર તેના હાથને પોતાની આસપાસ ફેરવે છે, ત્યારે તેનો જડત્વનો મોમેન્ટ (I) ઘટે છે. કોણીય સંવેગ (L = Iω) અચળ રહે છે, તેથી કોણીય વેગ (ω) વધે છે. A ગળત છે કારણ કે ઊર્જાનું સંરક્ષણ અહીં લાગુ પડતું નથી. B ગળત છે કારણ કે રેખીય સંવેગ અહીં પ્રસ્તુત નથી. D ગળત છે કારણ કે વેગમાનનું સંરક્ષણ રેખીય ગતિ સાથે સંબંધિત છે.", "ncert_ref": "Class XI - પ્રકરણ 7: ગતિના નિયમો", "difficulty": "Easy", "num": 14}, {"question": "એક બાળક એક સ્થિર સ્વિંગ પર બેસીને તેના પગને જમીન પરથી ઉપાડી લે છે અને પછી તેના હાથ અને પગને અંદરની તરફ ખેંચે છે. આ ક્રિયા દરમિયાન નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) બાળકનું કોણીય સંવેગ વધે છે કારણ કે તેના શરીરના ભાગો અક્ષની નજીક આવે છે.", "B) બાળકનું કોણીય સંવેગ અચળ રહે છે કારણ કે તેના પર કોઈ બાહ્ય ટોર્ક લાગતું નથી.", "C) બાળકનો કોણીય વેગ ઘટે છે કારણ કે તેના શરીરનું જડત્વનું મોમેન્ટ વધે છે.", "D) બાળકનું કોણીય સંવેગ ઘટે છે કારણ કે તેના શરીરના ભાગો અક્ષથી દૂર જાય છે."], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે. બાહ્ય ટોર્કની ગેરહાજરીમાં કોણીય સંવેગનું સંરક્ષણ થાય છે (NCERT Class XI, પ્રકરણ 7: કણોની તંત્ર અને ચક્રીય ગતિ). બાળક જ્યારે તેના હાથ અને પગ અંદર ખેંચે છે, ત્યારે તેનું જડત્વનું મોમેન્ટ ઘટે છે, પરંતુ કોણીય સંવેગ (L = Iω) અચળ રહે છે. તેથી કોણીય વેગ વધે છે, પરંતુ કોણીય સંવેગ બદલાતો નથી. વિકલ્પ A ખોટો છે કારણ કે કોણીય સંવેગ બદલાતો નથી. વિકલ્પ C ખોટો છે કારણ કે જડત્વનું મોમેન્ટ ઘટે છે, નહીં કે વધે. વિકલ્પ D ખોટો છે કારણ કે શરીરના ભાગો અક્ષની નજીક આવે છે, દૂર નહીં.", "ncert_ref": "Class XI - પ્રકરણ 7: કણોની તંત્ર અને ચક્રીય ગતિ", "difficulty": "Medium", "num": 15}, {"question": "એક બંધ પ્રણાલીમાં બાહ્ય ટૉર્ક શૂન્ય હોય ત્યારે નીચેનામાંથી કયું ભૌતિક રાશિ અચળ રહે છે?", "options": ["A) રેખીય વેગમાન", "B) કોણીય વેગમાન", "C) ગતિ ઊર્જા", "D) રેખીય પ્રવેગ"], "correct": 1, "explanation": "બાહ્ય ટૉર્ક શૂન્ય હોય ત્યારે કોણીય સંવેગનું સંરક્ષણ થાય છે, એટલે કે કોણીય વેગમાન અચળ રહે છે. રેખીય વેગમાન ત્યારે જ અચળ રહે જ્યારે બાહ્ય બળ શૂન્ય હોય. ગતિ ઊર્જા અને રેખીય પ્રવેગ બાહ્ય ટૉર્કની ગેરહાજરીમાં અચળ રહેતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 7: કણોની ગતિનું નિયમન", "difficulty": "Easy", "num": 16}, {"question": "એક વ્યક્તિ એક સ્થિર પ્લેટફોર્મ પર ઊભી છે જે ઘર્ષણરહિત છે. તે પોતાના હાથમાં એક ભારે ગોળો પકડીને ફરે છે. જો તે ગોળાને પોતાની તરફ ખેંચે તો શું થશે?", "options": ["A) તેની કોણીય ઝડપ ઘટશે", "B) તેની કોણીય ઝડપ વધશે", "C) તેની કોણીય ઝડપ અચળ રહેશે", "D) તેનું જડત્વનું મોમેન્ટ વધશે"], "correct": 1, "explanation": "જ્યારે વ્યક્તિ ગોળાને પોતાની તરફ ખેંચે છે, ત્યારે તેનું જડત્વનું મોમેન્ટ ઘટે છે. કોણીય સંવેગના સંરક્ષણના નિયમ અનુસાર, જો જડત્વનું મોમેન્ટ ઘટે તો કોણીય ઝડપ વધે છે. આથી વ્યક્તિની કોણીય ઝડપ વધશે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 7: કણોની ગતિનું નિયમન", "difficulty": "Medium", "num": 17}, {"question": "નીચેનામાંથી કયું વિધાન કોણીય સંવેગના સંરક્ષણના નિયમ માટે ખોટું છે?", "options": ["A) બાહ્ય ટૉર્કની ગેરહાજરીમાં કોણીય સંવેગ અચળ રહે છે", "B) કોણીય સંવેગનું સંરક્ષણ માત્ર અક્ષીય ગતિ માટે જ લાગુ પડે છે", "C) કોણીય સંવેગનું સંરક્ષણ બંધ પ્રણાલી માટે લાગુ પડે છે", "D) કોણીય સંવેગનું મૂલ્ય જડત્વના મોમેન્ટ અને કોણીય વેગના ગુણાકાર જેટલું હોય છે"], "correct": 1, "explanation": "કોણીય સંવેગનું સંરક્ષણ માત્ર અક્ષીય ગતિ માટે જ નહીં, પરંતુ ત્રિ-પરિમાણીય ગતિ માટે પણ લાગુ પડે છે. બાકીના વિધાનો સાચાં છે: બાહ્ય ટૉર્કની ગેરહાજરીમાં કોણીય સંવેગ અચળ રહે છે, તે બંધ પ્રણાલી માટે લાગુ પડે છે, અને તેનું મૂલ્ય જડત્વના મોમેન્ટ અને કોણીય વેગના ગુણાકાર જેટલું હોય છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 7: કણોની ગતિનું નિયમન", "difficulty": "Hard", "num": 18}, {"question": "એક નાના ગ્રહની આસપાસ એક ઉપગ્રહ વર્તુળાકાર કક્ષામાં ગતિ કરે છે. જો ઉપગ્રહની કક્ષીય ત્રિજ્યા અચાનક ઘટાડવામાં આવે, તો નીચેનામાંથી શું થશે? (ધારો કે બાહ્ય ટૉર્ક શૂન્ય છે)", "options": ["A) ઉપગ્રહની કોણીય ઝડપ ઘટશે", "B) ઉપગ્રહની કોણીય ઝડપ વધશે", "C) ઉપગ્રહની કોણીય ઝડપ અચળ રહેશે", "D) ઉપગ્રહની રેખીય ઝડપ ઘટશે"], "correct": 1, "explanation": "કોણીય સંવેગના સંરક્ષણ અનુસાર, જો કક્ષીય ત્રિજ્યા ઘટે તો ઉપગ્રહનું જડત્વનું મોમેન્ટ ઘટે છે. આથી કોણીય ઝડપ વધે છે. રેખીય ઝડપ પણ વધે છે કારણ કે તે કોણીય ઝડપ અને ત્રિજ્યાના ગુણાકાર પર આધારિત છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Medium", "num": 19}, {"question": "એક સ્કેટર પોતાના હાથ ફેલાવીને ફરે છે. જો તે પોતાના હાથને શરીરની નજીક લાવે તો તેની કોણીય ઝડપ વધે છે. આ ઘટનાનું કારણ શું છે?", "options": ["A) તેનું જડત્વનું મોમેન્ટ વધે છે", "B) તેનું જડત્વનું મોમેન્ટ ઘટે છે", "C) તેના પર બાહ્ય ટૉર્ક લાગે છે", "D) તેની રેખીય ઝડપ વધે છે"], "correct": 1, "explanation": "જ્યારે સ્કેટર પોતાના હાથને શરીરની નજીક લાવે છે, ત્યારે તેનું જડત્વનું મોમેન્ટ ઘટે છે. કોણીય સંવેગના સંરક્ષણ અનુસાર, જો જડત્વનું મોમેન્ટ ઘટે તો કોણીય ઝડપ વધે છે. આ પ્રક્રિયામાં બાહ્ય ટૉર્ક લાગતું નથી અને રેખીય ઝડપમાં ફેરફાર થતો નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 7: કણોની ગતિનું નિયમન", "difficulty": "Easy", "num": 20}, {"question": "એક લંબગોળ ચક્રી ડિસ્ક જેમાં જડત્વનો આઘાત (I) અચળ છે, તે કોણીય વેગ ω સાથે ફરે છે. જો ડિસ્ક પર કોઈ બાહ્ય ટોર્ક લાગતું ન હોય, તો નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) ડિસ્કનો કોણીય વેગ ઘટશે કારણ કે ઉર્જા નષ્ટ થાય છે.", "B) ડિસ્કનો કોણીય વેગ અચળ રહેશે કારણ કે કોણીય સંવે ેગ સંરક્ષિત રહે છે.", "ncert_ref": "Class XI - પ્રકરણ 7: કણની ગતિ અને કડી ગતિ", "difficulty": "Medium", "num": 28}, {"question": "એક પદાર્થની જડત્વના મોમેન્ટ I અને કોણીય વેગ ω છે. જો બાહ્ય ટોર્ક શૂન્ય હોય, તો નીચેનામાંથી કયું સૂત્ર કોણીય સંવેગના સંરક્ષણને યોગ્ય રીતે વ્યક્ત કરે છે?", "options": ["A) L = I + ω", "B) L = I × ω", "C) L = I / ω", "D) L = ω / I"], "correct": 1, "explanation": "કોણીય સંવેગ (L)નું સૂત્ર L = I × ω છે, જ્યાં I જડત્વના મોમેન્ટ અને ω કોણીય વેગ છે. બાહ્ય ટોર્ક શૂન્ય હોય ત્યારે L અચળ રહે છે. બાકીના વિકલ્પો કોણીય સંવેગના સૂત્રને યોગ્ય રીતે વ્યક્ત કરતા નથી.", "ncert_ref": "Class XI - પ્રકરણ 7: કણની ગતિ અને કડી ગતિ", "difficulty": "Easy", "num": 29}, {"question": "એક બાળક એક ઘર્ષણરહિત સ્વિંગ પર બેસીને તેના પગને જમીનથી ઉપાડી લે છે અને પછી તેના હાથ અને પગને શરીરની નજીક લાવે છે. આ પ્રક્રિયા દરમિયાન નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) બાળકનું કોણીય સંવેગ વધે છે કારણ કે તેના શરીરના ભાગો શરીરની નજીક આવે છે.", "B) બાળકનું કોણીય સંવેગ અચળ રહે છે કારણ કે બાહ્ય ટૉર્ક શૂન્ય છે.", "C) બાળકનો કોણીય વેગ ઘટે છે કારણ કે જડત્વનો આઘાત વધે છે.", "D) બાળકનો કોણીય વેગ અચળ રહે છે કારણ કે બાહ્ય બળ લાગતું નથી."], "correct": 1, "explanation": "સ્વિંગ અને બાળકની પ્રણાલી પર કોઈ બાહ્ય ટૉર્ક લાગતું નથી, તેથી કોણીય સંવેગનું સંરક્ષણ થાય છે (વિકલ્પ B સાચું). જ્યારે બાળક તેના હાથ અને પગ શરીરની નજીક લાવે છે, ત્યારે તેનો જડત્વનો આઘાત (I) ઘટે છે, તેથી કોણીય વેગ (ω) વધે છે (L = Iω અચળ રહે). વિકલ્પ A ખોટો છે કારણ કે કોણીય સંવેગ અચળ રહે છે, વધતો નથી. વિકલ્પ C ખોટો છે કારણ કે જડત્વનો આઘાત ઘટે છે, વધતો નથી, અને કોણીય વેગ વધે છે. વિકલ્પ D ખોટો છે કારણ કે કોણીય વેગ અચળ રહેતો નથી, તે બદલાય છે.", "ncert_ref": "Class XI - પ્રકરણ 7: કણોની તંત્ર અને ચાકગતિ", "difficulty": "Medium", "num": 30}, {"question": "એક ઘર્ષણરહિત આડી સપાટી પર એક વ્યક્તિ એક હલકા દોરડા વડે એક નાના પથ્થરને વર્તુળાકાર માર્ગે ફેરવે છે. જો દોરડાની લંબાઈ અચાનક અડધી કરી દેવામાં આવે, તો નીચેનામાંથી કયું વિધાન સાચું છે? (ધારો કે બાહ્ય ટૉર્ક શૂન્ય છે)", "options": ["A) પથ્થરનો કોણીય વેગ બમણો થશે", "B) પથ્થરનો રેખીય વેગ અડધો થશે", "C) પથ્થરની જડત્વનો આઘાત (I) બમણો થશે", "D) પથ્થરનો કોણીય વેગ અડધો થશે"], "correct": 0, "explanation": "કોણીય સંવેગનું સંરક્ષણ થાય છે કારણ કે બાહ્ય ટૉર્ક શૂન્ય છે. પ્રારંભિક કોણીય સંવેગ L = Iω = mr²ω. જ્યારે દોરડાની લંબાઈ અડધી થાય ત્યારે નવો જડત્વનો આઘાત I' = m(r/2)² = mr²/4. કોણીય સંવેગ અચળ રહેતો હોવાથી, mr²ω = (mr²/4)ω' ⇒ ω' = 4ω. આથી કોણીય વેગ ચાર ગણો થાય, બમણો નહીં. રેખીય વેગ v = rω ⇒ જ્યારે r અડધું થાય ત્યારે v = (r/2)(4ω) = 2rω, જે અડધો નથી. જડત્વનો આઘાત બદલાય છે, પરંતુ બમણો નહીં.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 7: કણોની તંત્ર અને ચાકગતિ", "difficulty": "Medium", "num": 31}, {"question": "એક સ્થિર પ્લેટફોર્મ પર એક વ્યક્તિ એક હાથમાં 2 kg નો દડો પકડીને ઊભી છે. પ્લેટફોર્મ અને વ્યક્તિનું કુલ જડત્વનો આઘાત 5 kg·m² છે. જો વ્યક્તિ દડાને 3 m/s ના રેખીય વેગથી આડી દિશામાં ફેંકે, તો વ્યક્તિનો કોણીય વેગ કેટલો હશે? (દડાનું દળકેન્દ્રથી અંતર 0.5 m ધારો)", "options": ["A) 0.2 rad/s", "B) 0.6 rad/s", "C) 1.2 rad/s", "D) 0 rad/s"], "correct": 1, "explanation": "પ્રારંભિક કોણીય સંવેગ શૂન્ય છે કારણ કે પ્રણાલી સ્થિર છે. દડાને ફેંકતી વખતે કોણીય સંવેગનું સંરક્ષણ થાય છે. દડાનો કોણીય સંવેગ L_d = mvr = 2 × 3 × 0.5 = 3 kg·m²/s. વ્યક્તિ અને પ્લેટફોર્મનો કોણીય સંવેગ L_p = Iω = 5ω. સંરક્ષણ અનુસાર, 0 = L_d + L_p ⇒ 5ω = -3 ⇒ ω = -0.6 rad/s (ઋણ નિશાની દિશા દર્શાવે છે). મૂલ્ય 0.6 rad/s છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 7: કણોની તંત્ર અને ચાકગતિ", "difficulty": "Hard", "num": 32}, {"question": "એક સ્કેટર પોતાના હાથ ફેલાવીને 2 rad/s ના કોણીય વેગથી ફરે છે. તેનું જડત્વનો આઘાત 6 kg·m² છે. જો તે પોતાના હાથને શરીરની નજીક લાવીને જડત્વનો આઘાત 2 kg·m² કરી દે, તો તેનો નવો કોણીય વેગ કેટલો હશે?", "options": ["A) 2 rad/s", "B) 4 rad/s", "C) 6 rad/s", "D) 8 rad/s"], "correct": 2, "explanation": "કોણીય સંવેગનું સંરક્ષણ થાય છે કારણ કે બાહ્ય ટૉર્ક શૂન્ય છે. પ્રારંભિક કોણીય સંવેગ L = Iω = 6 × 2 = 12 kg·m²/s. નવો જડત્વનો આઘાત I' = 2 kg·m². સંરક્ષણ અનુસાર, Iω = I'ω' ⇒ 12 = 2ω' ⇒ ω' = 6 rad/s. આથી નવો કોણીય વેગ 6 rad/s થશે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 7: કણોની તંત્ર અને ચાકગતિ", "difficulty": "Medium", "num": 33}, {"question": "એક બંધ પ્રણાલીમાં બાહ્ય ટૉર્ક શૂન્ય હોય ત્યારે, નીચેનામાંથી કયું વિધાન કોણીય સંવેગના સંરક્ષણ માટે સાચું નથી?", "options": ["A) પ્રણાલીનો કુલ કોણીય સંવેગ સમય સાથે અચળ રહે છે", "B) પ્રણાલીના જડત્વના આઘાતમાં ફેરફાર થઈ શકે છે", "C) પ્રણાલીનો કોણીય વેગ હંમેશા અચળ રહે છે", "D) પ્રણાલીના કણો વચ્ચે આંતરિક બળો કોણીય સંવેગને અસર કરતા નથી"], "correct": 2, "explanation": "કોણીય સંવેગનું સંરક્ષણ એટલે કે પ્રણાલીનો કુલ કોણીય સંવેગ અચળ રહે છે, પરંતુ કોણીય વેગ અચળ રહે તે જરૂરી નથી. જો જડત્વનો આઘાત બદલાય, તો કોણીય વેગ પણ બદલાઈ શકે છે. પ્રણાલીના જડત્વના આઘાતમાં ફેરફાર થઈ શકે છે અને આંતરિક બળો કોણીય સંવેગને અસર કરતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 7: કણોની તંત્ર અને ચાકગતિ", "difficulty": "Hard", "num": 34}, {"question": "એક ઘર્ષણરહિત આડી સપાટી પર એક વ્યક્તિ એક હાથમાં 5 kg નો દડો પકડીને 3 rad/s ના કોણીય વેગથી પોતાની ધરી પર ફરે છે. જો તે દડાને અચાનક પોતાના શરીરની નજીક લાવે અને તેનું જડત્વનો મોમેન્ટ 40% ઘટાડે, તો નવો કોણીય વેગ કેટલો થશે? (ધારો કે વ્યક્તિ અને દડાનું પ્રારંભિક જડત્વનો મોમેન્ટ 2 kg·m² છે.)", "options": ["A) 4.2 rad/s", "B) 5.0 rad/s", "C) 6.0 rad/s", "D) 7.5 rad/s"], "correct": 1, "explanation": "કોણીય સંવેગનું સંરક્ષણ નિયમ અનુસાર, જ્યારે બાહ્ય ટૉર્ક શૂન્ય હોય ત્યારે કોણીય સંવેગ (L = Iω) અચળ રહે છે. પ્રારંભિક કોણીય સંવેગ L₁ = I₁ω₁ = 2 kg·m² × 3 rad/s = 6 kg·m²/s. જ્યારે જડત્વનો મોમેન્ટ 40% ઘટે છે, ત્યારે નવું જડત્વનો મોમેન્ટ I₂ = 2 kg·m² × 0.6 = 1.2 kg·m². કોણીય સંવેગ અચળ હોવાથી, L₂ = L₁ ⇒ I₂ω₂ = 6 ⇒ ω₂ = 6 / 1.2 = 5 rad/s. તેથી વિકલ્પ B સાચો છે.\n\nવિકલ્પ A ખોટો છે કારણ કે તે 40% ઘટાડાને બદલે અલગ ગણતરી દર્શાવે છે.\nવિકલ્પ C ખોટો છે કારણ કે તે જડત્વના મોમેન્ટમાં વધારો ધારીને ગણતરી કરે છે.\nવિકલ્પ D ખોટો છે કારણ કે તે અયોગ્ય રીતે કોણીય વેગમાં વધારો દર્શાવે છે.", "ncert_ref": "Class XI - પ્રકરણ 7: કણોની તંત્ર અને ચક્રી ગતિ", "difficulty": "Medium", "num": 35}, {"question": "એક ઘર્ષણરહિત કક્ષામાં ફરતો ઉપગ્રહ તેના કોણીય સંવેગને અચળ રાખવા માટે શું કરે છે?", "options": ["A) તે પોતાનું જડત્વનું મોમેન્ટ ઘટાડે છે અને કોણીય વેગ વધારે છે", "                 card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
