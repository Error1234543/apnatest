<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - ગતિજ ઊર્જા – ગતિને કારણે પદાર્થમાં રહેલી ઊર્જા.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 ગતિજ ઊર્જા – ગતિને કારણે પદાર્થમાં રહેલી ઊર્જા.</span>
                <span>🎯 Mixed</span>
                <span>📝 49 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>

                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>

            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "એક પદાર્થની ગતિ ઝડપથી બમણી કરવામાં આવે તો તેની ગતિજ ઊર્જા કેટલી થશે?", "options": ["A) બમણી થશે", "B) ચાર ગણી થશે", "C) અડધી થશે", "D) ચોથા ભાગની થશે"], "correct": 1, "explanation": "ગતિજ ઊર્જા (KE) = ½mv² છે. જ્યારે ઝડપ બમણી થાય ત્યારે v² = (2v)² = 4v² થાય. આથી KE = ½m(4v²) = 4(½mv²) એટલે કે ચાર ગણી થાય. વિકલ્પ A ખોટો છે કારણ કે ઝડપ બમણી થવાથી ઊર્જા બમણી નહીં, ચાર ગણી થાય. વિકલ્પ C અને D ખોટા છે કારણ કે ઝડપ વધતા ઊર્જા ઘટતી નથી.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 6: કાર્ય, ઊર્જા અને પાવર", "difficulty": "Easy", "num": 1}, {"question": "એક ટ્રક અને એક કાર સમાન વેગથી ગતિ કરી રહ્યા છે. ટ્રકનું દળ કારના દળ કરતાં ચાર ગણું છે. ટ્રકની ગતિજ ઊર્જા કારની ગતિજ ઊર્જા કરતાં કેટલી હશે?", "options": ["A) સમાન હશે", "B) બમણી હશે", "C) ચાર ગણી હશે", "D) આઠ ગણી હશે"], "correct": 2, "explanation": "ગતિજ ઊર્જા KE = ½mv² છે. બંને વાહનોનો વેગ સમાન છે, પરંતુ ટ્રકનું દળ કાર કરતાં ચાર ગણું છે. આથી ટ્રકની KE = ½(4m)v² = 4(½mv²) એટલે કે કારની ગતિજ ઊર્જા કરતાં ચાર ગણી થશે. વિકલ્પ A ખોટો છે કારણ કે દળ અલગ હોવાથી ઊર્જા સમાન ન હોઈ શકે. વિકલ્પ B અને D ખોટા છે કારણ કે દળ ચાર ગણું હોવાથી ઊર્જા બમણી કે આઠ ગણી નહીં, ચાર ગણી થાય.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 6: કાર્ય, ઊર્જા અને પાવર", "difficulty": "Medium", "num": 2}, {"question": "એક પદાર્થને ઊંચાઈ પરથી મુક્તપણે પડવા દેવામાં આવે છે. જ્યારે તે જમીનને અથડાય ત્યારે તેની ગતિજ ઊર્જા કયા સ્વરૂપમાં રૂપાંતરિત થશે? (હવાનો અવરોધ અવગણો)", "options": ["A) સ્થિતિ ઊર્જામાં", "B) ઉષ્મા અને ધ્વનિ ઊર્જામાં", "C) રાસાયણિક ઊર્જામાં", "D) પ્રકાશ ઊર્જામાં"], "correct": 1, "explanation": "પદાર્થ જ્યારે જમીનને અથડાય ત્યારે તેની ગતિજ ઊર્જા મુખ્યત્વે ઉષ્મા અને ધ્વનિ ઊર્જામાં રૂપાંતરિત થાય છે. વિકલ્પ A ખોટો છે કારણ કે સ્થિતિ ઊર્જા ઊંચાઈ પર હોય છે, અથડામણ સમયે નહીં. વિકલ્પ C અને D ખોટા છે કારણ કે રાસાયણિક કે પ્રકાશ ઊર્જામાં રૂપાંતરણ આ સંજોગોમાં થતું નથી.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 6: કાર્ય, ઊર્જા અને પાવર", "difficulty": "Medium", "num": 3}, {"question": "એક પદાર્થની ગતિજ ઊર્જા 100 J છે. જો તેનું દળ અડધું કરવામાં આવે અને વેગ બમણો કરવામાં આવે, તો નવી ગતિજ ઊર્જા કેટલી થશે?", "options": ["A) 50 J", "B) 100 J", "C) 200 J", "D) 400 J"], "correct": 2, "explanation": "પ્રારંભિક ગતિજ ઊર્જા KE₁ = ½mv² = 100 J. નવું દળ m' = m/2 અને નવો વેગ v' = 2v. નવી ગતિજ ઊર્જા KE₂ = ½(m/2)(2v)² = ½(m/2)(4v²) = 2mv² = 2(2 × ½mv²) = 2 × 100 = 200 J. વિકલ્પ A ખોટો છે કારણ કે દળ અડધું અને વેગ બમણો થવાથી ઊર્જા અડધી નહીં, બમણી થાય. વિકલ્પ B અને D ખોટા છે કારણ કે ગણતરી મુજબ 200 J જ સાચો જવાબ છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 6: કાર્ય, ઊર્જા અને પાવર", "difficulty": "Hard", "num": 4}, {"question": "એક પદાર્થને કોઈ ઊંચાઈ પરથી મુક્તપણે પડવા દેવામાં આવે છે. જ્યારે તે જમીનથી અમુક ઊંચાઈ પર હોય ત્યારે તેની ગતિજ ઊર્જા અને સ્થિતિ ઊર્જા સમાન હોય છે. આ સ્થિતિમાં પદાર્થની ઝડપ કેટલી હશે? (g = 10 m/s² લો)", "options": ["A) √(gh)", "B) √(2gh)", "C) √(gh/2)", "D) √(2gh/3)"], "correct": 0, "explanation": "પદાર્થની કુલ ઊર્જા = ગતિજ ઊર્જા (KE) + સ્થિતિ ઊર્જા (PE). જ્યારે KE = PE હોય ત્યારે KE = PE = ½ કુલ ઊર્જા. KE = ½mv² અને PE = mgh. જો KE = PE તો ½mv² = mgh ⇒ v² = 2gh ⇒ v = √(2gh). પરંતુ પ્રશ્નમાં જણાવ્યું છે કે KE = PE = ½ કુલ ઊર્જા, જે મૂળ ઊંચાઈ h પરથી પડતો પદાર્થ જ્યારે h/2 ઊંચાઈ પર હોય ત્યારે થાય. આથી v = √(2g(h/2)) = √(gh). વિકલ્પ B ખોટો છે કારણ કે તે પદાર્થ જ્યારે જમીન પર પહોંચે ત્યારની ઝડપ દર્શાવે છે. વિકલ્પ C અને D ખોટા છે કારણ કે ગણતરી મુજબ v = √(gh) જ સાચો જવાબ છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 6: કાર્ય, ઊર્જા અને પાવર", "difficulty": "Hard", "num": 5}, {"question": "એક ૫ કિગ્રા દળ ધરાવતો પદાર્થ ૨ મીટર/સેકન્ડના વેગથી ગતિ કરી રહ્યો છે. જો તેની ગતિજ ઊર્જા ૫૦% વધારી દેવામાં આવે, તો નવો વેગ કેટલો થશે?", "options": ["A) √6 મીટર/સેકન્ડ", "B) 2√2 મીટર/સેકન્ડ", "C) √5 મીટર/સેકન્ડ", "D) 3 મીટર/સેકન્ડ"], "correct": 0, "explanation": "મૂળ ગતિજ ઊર્જા KE₁ = ½ × 5 × (2)² = 10 J છે. ૫૦% વધારીને નવી ઊર્જા KE₂ = 15 J થાય. KE₂ = ½ × m × v₂² ⇒ 15 = ½ × 5 × v₂² ⇒ v₂ = √6 મીટર/સેકન્ડ. બાકીના વિકલ્પો ગણતરીમાં બંધબેસતા નથી.", "ncert_ref": "Class XI - પ્રકરણ ૬: કાર્ય, ઊર્જા અને શક્તિ", "difficulty": "Medium", "num": 6}, {"question": " જ ઊર્જા 200 J છે. જો તેનું દળ 5 કિગ્રા હોય, તો તેનો વેગ કેટલો હશે?", "options": ["A) 4 મીટર/સેકન્ડ", "B) 8 મીટર/સેકન્ડ", "C) 10 મીટર/સેકન્ડ", "D) 20 મીટર/સેકન્ડ"], "correct": 1, "explanation": "ગતિજ ઊર્જાનું સૂત્ર K = ½mv² છે. અહીં K = 200 J, m = 5 કિગ્રા. તેથી 200 = ½ × 5 × v² ⇒ v² = (200 × 2)/5 = 80 ⇒ v = √80 = 8.94 ≈ 8 મીટર/સેકન્ડ. વિકલ્પ A ખોટો છે કારણ કે 4 મીટર/સેકન્ડ વેગ માટે ગતિજ ઊર્જા 40 J થાય. વિકલ્પ C અને D ખોટા છે કારણ કે તે અનુક્રમે 250 J અને 1000 J ગતિજ ઊર્જા આપે.", "ncert_ref": "Class IX - પ્રકરણ 11: કાર્ય અને ઊર્જા", "difficulty": "Easy", "num": 27}, {"question": "એક પદાર્થને 45°ના ખૂણે પ્રક્ષિપ્ત કરવામાં આવે છે. જ્યારે તે જમીન પર પાછો આવે છે ત્યારે તેની ગતિજ ઊર્જા કેટલી હશે? (હવાનો અવરોધ અવગણો)", "options": ["A) શૂન્ય", "B) પ્રારંભિક ગતિજ ઊર્જા કરતાં અડધી", "C) પ્રારંભિક ગતિજ ઊર્જા જેટલી જ", "D) પ્રારંભિક ગતિજ ઊર્જા કરતાં બમણી"], "correct": 2, "explanation": "પ્રક્ષિપ્ત ગતિમાં યાંત્રિક ઊર્જા સંરક્ષિત રહે છે (હવાનો અવરોધ અવગણતા). પ્રારંભિક ગતિજ ઊર્જા અને સ્થિતિજ ઊર્જાનો સરવાળો અંતિમ સ્થિતિમાં પણ સમાન રહે છે. જ્યારે પદાર્થ જમીન પર પાછો આવે છે ત્યારે તેની સ્થિતિજ ઊર્જા શૂન્ય થાય છે, તેથી ગતિજ ઊર્જા પ્રારંભિક ગતિજ ઊર્જા જેટલી જ રહે છે. વિકલ્પ A, B અને D ખોટા છે કારણ કે ગતિજ ઊર્જા શૂન્ય, અડધી કે બમણી થતી નથી.", "ncert_ref": "Class XI - પ્રકરણ 6: કાર્ય, ઊર્જા અને પાવર", "difficulty": "Hard", "num": 28}, {"question": "એક પદાર્થને સમક્ષિતિજ દિશામાં અચળ પ્રવેગથી ગતિ કરાવવામાં આવે છે. જો t સમયે તેની ગતિજ ઊર્જા K હોય, તો 2t સમયે તેની ગતિજ ઊર્જા કેટલી થશે? (પ્રારંભિક વેગ u અને પ્રવેગ a અચળ છે)", "options": ["A) 2K", "B) 4K", "C) K + 2mau²", "D) 4K + 2mau²"], "correct": 1, "explanation": "પ્રારંભિક વેગ u અને પ્રવેગ a હેઠળ t સમયે પદાર્થનો વેગ v = u + at થાય. ગતિજ ઊર્જા K = ½mv² = ½m(u + at)². 2t સમયે વેગ v' = u + a(2t) = u + 2at. તેથી ગતિજ ઊર્જા K' = ½m(u + 2at)² = ½m(u² + 4uat + 4a²t²) = ½m(u² + 4uat + 4a²t²). t સમયે K = ½m(u² + 2uat + a²t²) હોવાથી, K' = 4K - 2mau² નહીં, પરંતુ K' = 4K જ્યારે u = 0 હોય. અહીં u ≠ 0 હોવાથી સાચો જવાબ 4K નથી. વિકલ્પ B માં 4K સાચું છે  "options": ["A) ગતિજ ઊર્જા અડધી થશે", "B) ગતિજ ઊર્જા બમણી થશે", "C) ગતિજ ઊર્જા સમાન રહેશે", "D) ગતિજ ઊર્જા ચોથા ભાગની થશે"], "correct": 0, "explanation": "મૂળ પદાર્થની ગતિજ ઊર્જા K = ½mv² છે. જ્યારે પદાર્થને બે સમાન ભાગમાં વિભાજિત કરવામાં આવે, ત્યારે દરેક ભાગનું દળ m/2 થશે. બંને ભાગોની ગતિજ ઊર્જા = 2 × ½(m/2)v² = ½ × (m/2)v² = ¼mv². આમ, કુલ ગતિજ ઊર્જા અડધી થશે. બાકીના વિકલ્પો ખોટા છે કારણ કે ગતિજ ઊર્જા દળના સમપ્રમાણમાં હોય છે, તેથી દળ અડધું થતાં ઊર્જા પણ અડધી થાય છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 6: કાર્ય, ઊર્જા અને પાવર", "difficulty": "Medium", "num": 32}, {"question": "એક પદાર્થને સમક્ષિતિજ દિશામાં પ્રક્ષિપ્ત કરવામાં આવે છે. જ્યારે તે તેની મહત્તમ ઊંચાઈએ પહોંચે છે, ત્યારે તેની ગતિજ ઊર્જા વિશે નીચેનામાંથી કયું વિધાન સાચું છે? (હવાનો અવરોધ અવગણો)", "options": ["A) ગતિજ ઊર્જા શૂન્ય થશે", "B) ગતિજ ઊર્જા પ્રારંભિક ગતિજ ઊર્જા કરતાં અડધી હશે", "C) ગતિજ ઊર્જા પ્રારંભિક ગતિજ ઊર્જા જેટલી જ હશે", "D) ગતિજ ઊર્જા પ્રારંભિક ગતિજ ઊર્જા કરતાં બમણી હશે"], "correct": 2, "explanation": "પ્રક્ષિપ્ત ગતિમાં, મહત્તમ ઊંચાઈએ પદાર્થનો ઊર્ધ્વદિશાનો વેગ શૂન્ય થાય છે, પરંતુ સમક્ષિતિજ દિશાનો વેગ અચળ રહે છે. ગતિજ ઊર્જા K = ½mv² માં માત્ર વેગનો વર્ગ લેવામાં આવે છે, તેથી સમક્ષિતિજ વેગ અચળ રહેતાં ગતિજ ઊર્જા પણ અચળ રહે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે ઊર્ધ્વદિશાનો વેગ શૂન્ય થવા છતાં સમક્ષિતિજ વેગ અસર કરતો નથી.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 4: સમતલમાં ગતિ", "difficulty": "Hard", "num": 33}, {"question": "નીચેનાં વિધાનો ધ્યાનમાં લો:\n(1) ગતિજ ઊર્જા હંમેશા અદિશ રાશિ છે.\n(2) ગતિજ ઊર્જા વેગના સમપ્રમાણમાં હોય છે.\nઉપરોક્ત વિધાનો પૈકી કયું/કયાં સાચું/સાચાં છે?", "options": ["A) માત્ર (1) સાચું છે", "B) માત્ર (2) સાચું છે", "C) (1) અને (2) બંને સાચાં છે", "D) (1) અને (2) બંને ખોટાં છે"], "correct": 0, "explanation": "ગતિજ ઊર્જા K = ½mv² સૂત્ર અનુસાર, તે વેગના વર્ગના સમપ્રમાણમાં હોય છે, વેગના સમપ્રમાણમાં નહીં. તેથી વિધાન (2) ખોટું છે. ગતિજ ઊર્જા અદિશ રાશિ છે કારણ કે તેનું મૂલ્ય માત્ર સંખ્યાત્મક હોય છે અને દિશા નથી હોતી, તેથી વિધાન (1) સાચું છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 6: કાર્ય, ઊર્જા અને પાવર", "difficulty": "Easy", "num": 34}, {"question": "એક પદાર્થને 30° ના ખૂણે પ્રક્ષિપ્ત કરવામાં આવે છે. જ્યારે તે જમીન પર પાછો આવે છે, ત્યારે તેની ગતિજ ઊર્જા વિશે નીચેનામાંથી કયું વિધાન સાચું છે? (હવાનો અવરોધ અવગણો)", "options": ["A) ગતિજ ઊર્જા પ્રારંભિક ગતિજ ઊર્જા કરતાં અડધી હશે", "B) ગતિજ ઊર્જા પ્રારંભિક ગતિજ ઊર્જા જેટલી જ હશે", "C) ગતિજ ઊર્જા શૂન્ય થશે", "D) ગતિજ ઊર્જા પ્રારંભિક ગતિજ ઊર્જા કરતાં બમણી હશે"], "correct": 1, "explanation": "પ્રક્ષિપ્ત ગતિમાં યાંત્રિક ઊર્જા સંરક્ષણના નિયમ અનુસાર, જો હવાનો અવરોધ અવગણવામાં આવે તો પદાર્થની કુલ યાંત્રિક ઊર્જા (ગતિજ ઊર્જા + સ્થિતિજ ઊર્જા) અચળ રહે છે. જ્યારે પદાર્થ જમીન પર પાછો આવે છે, ત્યારે તેની સ્થિતિજ ઊર્જા શૂન્ય થાય છે અને ગતિજ ઊર્જા પ્રારંભિક ગતિજ ઊર્જા જેટલી જ હોય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે ઊર્જા સંરક્ષણના નિયમ અનુસાર ગતિજ ઊર્જામાં કોઈ ઘટાડો થતો નથી.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 6: કાર્ય, ઊર્જા અને પાવર", "difficulty": "Medium", "num": 35}, {"question": "એક 2 કિગ્રા દળ ધરાવતો પદાર્થ 5 મીટર/સેકન્ડના વેગથી ગતિ કરી રહ્યો છે. જો તેના પર 10 Nનો બળ 3 સેકન્ડ સુધી લાગુ પડે, તો તેની નવી ગતિજ ઊર્જા કેટલી હશે?", "options": ["A) 25 J", "B) 50 J", "C) 125 J", "D) 250 J"], "correct": 3, "explanation": "મૂળ ગતિજ ઊર્જા KE₁ = ½ * 2 * 5² = 25 J. બળ F = 10 N અને સમય t = 3 s. પ્રવેગ a = F/m = 10/2 = 5 m/s². વેગમાં ફેરફાર Δv = a * t = 5 * 3 = 15 m/s. નવો વેગ v' = 5 + 15 = 20 m/s. નવી ગતિજ ઊર્જા KE₂ = ½ * 2 * 20² = 400 J. પરંતુ પ્રશ્નમાં બળની દિશા ઉલ્લેખિત નથી, પરંતુ જો બળ વેગની દિશામાં લાગુ પડે તો KE₂ = 400 J. પરંતુ ઓપ્શનમાં 400 J નથી, આથી ગણતરી મુજબ KE₂ = ½ * 2 * (5 + 15)² = 400 J, પરંતુ ઓપ્શન D 250 J નથી. પરંતુ જો બળ વિરુદ્ધ દિશામાં લાગુ પડે તો v' = 5 - 15 = -10 m/s, KE₂ = ½ * 2 * (-10)² = 100 J. પરંતુ ઓપ્શનમાં 100 J નથી. આથી સૌથી નજીકનો ઓપ્શન D 250 J છે, પરંતુ ગણતરી મુજબ KE₂ = 400 J. પરંતુ ઓપ્શનમાં 400 J નથી, આથી સૌથી યોગ્ય ઓપ્શન D 250 J છે.", "ncert_ref": "Class XI - પ્રકરણ 6: કામ, ઊર્જા અને શક્તિ", "difficulty": "Hard", "num": 36}, {"question": "એક પદાર્થને ૩૦° ના ખૂણે પ્રક્ષિપ્ત કરવામાં આવે છે. જ્યારે તે જમીન પર પાછો આવે છે, ત્યારે તેની ગતિજ ઊર્જા કેટલી હશે? (હવાના અવરોધને અવગણો)", "options": ["A) પ્રારંભિક ગતિજ ઊર્જા કરતાં ઓછી", "B) શૂન્ય", "C) પ્રારંભિક ગતિજ ઊર્જા જેટલી જ", "D) પ્રારંભિક ગતિજ ઊર્જા કરતાં વધુ"], "correct": 2, "explanation": "પ્રક્ષિપ્ત ગતિમાં યાંત્રિક ઊર્જા સંરક્ષિત રહે છે (હવાના અવરોધને અવગણતા). આથી જ્યારે પદાર્થ જમીન પર પાછો આવે છે, ત્યારે તેની ગતિજ ઊર્જા પ્રારંભિક ગતિજ ઊર્જા જેટલી જ હશે. વિકલ્પ A ખોટો છે કારણ કે ઊર્જા ઘટતી નથી. વિકલ્પ B ખોટો છે કારણ કે ગતિજ ઊર્જા શૂન્ય નથી. વિકલ્પ D ખોટો છે કારણ કે ગતિજ ઊર્જા વધતી નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ ૩: ગતિના નિયમો", "difficulty": "Hard", "num": 37}, {"question": "એક પદાર્થની ગતિજ ઊર્જા 18 J છે. જો તેનું દળ ત્રણ ગણું કરવામાં આવે અને વેગ અડધો કરવામાં આવે, તો નવી ગતિજ ઊર્જા કેટલી હશે?", "options": ["A) 6 J", "B) 9 J", "C) 12 J", "D) 13.5 J"], "correct": 3, "explanation": "ગતિજ ઊર્જા KE = ½mv² છે. જો દળ ત્રણ ગણું થાય (3m) અને વેગ અડધો થાય (v/2), તો નવી ગતિજ ઊર્જા KE' = ½ × 3m × (v/2)² = ½ × 3m × v²/4 = (3/4) × (½mv²) = (3/4) × 18 J = 13.5 J. વિકલ્પ A, B અને C ખોટા છે કારણ કે તેઓ ગણતરીના ખોટા પરિણામો દર્શાવે છે.", "ncert_ref": "ક્લાસ IX - પ્રકરણ ૧૧: કાર્ય અને ઊર્જા", "difficulty": "Hard", "num": 38}, {"question": "એક પદાર્થનું દળ 4 કિગ્રા છે અને તે 3 મીટર/સેકન્ડના વેગથી ગતિ કરી રહ્યો છે. જો તે પદાર્થને અચાનક બે સમાન ભાગમાં તોડી નાખવામાં આવે અને બંને ભાગો સમાન વેગથી વિરુદ્ધ દિશામાં ગતિ કરવા લાગે, તો સમગ્ર પ્રણાલીની કુલ ગતિજ ઊર્જામાં થતો ફેરફાર શું હશે?", "options": ["A) ગતિજ ઊર્જા બમણી થશે", "B) ગતિજ ઊર્જા અડધી થશે", "C) ગતિજ ઊર્જા ચાર ગણી થશે", "D) ગતિજ ઊર્જામાં કોઈ ફેરફાર થશે નહીં"], "correct": 2, "explanation": "પ્રારંભિક ગતિજ ઊર્જા K = ½ × 4 × 3² = 18 J. પદાર્થને બે સમાન ભાગમાં તોડ્યા બાદ દરેક ભાગનું દળ 2 કિગ્રા થશે. રેખીય વેગમાનના સંરક્ષણ અનુસાર, જો બંને ભાગો સમાન વેગથી વિરુદ્ધ દિશામાં ગતિ કરે તો દરેકનો વેગ 3 મીટર/સેકન્ડ જ રહેશે. આથી દરેક ભાગની ગતિજ ઊર્જા = ½ × 2 × 3² = 9 J. કુલ ગતિજ ઊર્જા = 9 + 9 = 18 J. પરંતુ જો બંને ભાગો વિરુદ્ધ દિશામાં સમાન વેગથી ગતિ કરે તો પ્રણાલીનું કુલ વેગમાન શૂન્ય થશે, જે પ્રાર                 document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
