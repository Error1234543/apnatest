<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - કેન્દ્રાભિમુખ બળ – વર્તુળાકાર ગતિ માટે જરૂરી બળ.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 કેન્દ્રાભિમુખ બળ – વર્તુળાકાર ગતિ માટે જરૂરી બળ.</span>
                <span>🎯 Mixed</span>
                <span>📝 50 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "એક પદાર્થ 5 m ત્રિજ્યાવાળા વર્તુળાકાર માર્ગ પર 10 m/sની અચળ ઝડપથી ગતિ કરે છે. જો તેનું દળ 2 kg હોય, તો તેના પર લાગતું કેન્દ્રાભિમુખ બળ કેટલું હશે?", "options": ["A) 20 N", "B) 40 N", "C) 100 N", "D) 200 N"], "correct": 1, "explanation": "કેન્દ્રાભિમુખ બળનું સૂત્ર F = mv²/r છે. અહીં m = 2 kg, v = 10 m/s, r = 5 m. તેથી F = 2 × (10)² / 5 = 2 × 100 / 5 = 40 N. વિકલ્પ A ખોટો છે કારણ કે તેમાં v² ને બદલે v લેવામાં આવ્યું છે. વિકલ્પ C અને D ખોટા છે કારણ કે તેમાં ગણતરીની ભૂલ છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 5: ગતિના નિયમો", "difficulty": "Easy", "num": 1}, {"question": "એક કાર 20 m ત્રિજ્યાવાળા વળાંક પર 10 m/sની ઝડપે ગતિ કરે છે. જો કારનું દળ 1000 kg હોય, તો તેના ટાયર અને રસ્તા વચ્ચેનું ઘર્ષણબળ ઓછામાં ઓછું કેટલું હોવું જોઈએ જેથી કાર સરકી ન જાય?", "options": ["A) 2000 N", "B) 5000 N", "C) 10000 N", "D) 20000 N"], "correct": 1, "explanation": "કેન્દ્રાભિમુખ બળ ઘર્ષણબળ દ્વારા પૂરું પાડવામાં આવે છે. F = mv²/r = 1000 × (10)² / 20 = 5000 N. વિકલ્પ A ખોટો છે કારણ કે તેમાં ઝડપનો વર્ગ લેવામાં આવ્યો નથી. વિકલ્પ C અને D ખોટા છે કારણ કે તેમાં ગણતરીની ભૂલ છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 5: ગતિના નિયમો", "difficulty": "Medium", "num": 2}, {"question": "નીચેનામાંથી કયું વિધાન ખોટું છે?\n(1) કેન્દ્રાભિમુખ બળ હંમેશા વર્તુળના કેન્દ્ર તરફ લાગે છે.\n(2) કેન્દ્રાભિમુખ પ્રવેગ ઝડપના વર્ગના સમપ્રમાણમાં હોય છે.\n(3) જો કેન્દ્રાભિમુખ બળ અચાનક દૂર થાય, તો પદાર્થ વર્તુળના સ્પર્શકની દિશામાં ગતિ કરશે.\n(4) કેન્દ્રાભિમુખ બળ પદાર્થની ઝડપમાં ફેરફાર કરે છે.", "options": ["A) ફક્ત 1", "B) ફક્ત 2", "C) ફક્ત 4", "D) 2 અને 4 બંને"], "correct": 2, "explanation": "વિધાન 4 ખોટું છે કારણ કે કેન્દ્રાભિમુખ બળ ઝડપમાં ફેરફાર કરતું નથી, માત્ર દિશામાં ફેરફાર કરે છે. વિધાન 1, 2 અને 3 સાચાં છે. વિકલ્પ A, B અને D ખોટા છે કારણ કે તેમાં ખોટાં વિધાનોને સાચાં ગણવામાં આવ્યાં છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 5: ગતિના નિયમો", "difficulty": "Medium", "num": 3}, {"question": "એક પદાર્થ 0.5 m ત્રિજ્યાવાળા વર્તુળાકાર માર્ગ પર 2 rad/sની કોણીય ઝડપથી ગતિ કરે છે. જો તેનું દળ 0.2 kg હોય, તો તેના પર લાગતું કેન્દ્રાભિમુખ બળ કેટલું હશે?", "options": ["A) 0.1 N", "B) 0.2 N", "C) 0.4 N", "D) 0.8 N"], "correct": 2, "explanation": "કેન્દ્રાભિમુખ બળ F = mrω². અહીં m = 0.2 kg, r = 0.5 m, ω = 2 rad/s. તેથી F = 0.2 × 0.5 × (2)² = 0.4 N. વિકલ્પ A અને B ખોટા છે કારણ કે તેમાં ω² ને બદલે ω લેવામાં આવ્યું છે. વિકલ્પ D ખોટો છે કારણ કે તેમાં ગણતરીની ભૂલ છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 7: કણોના તંત્રો અને ચાકગતિ ગતિ", "difficulty": "Hard", "num": 4}, {"question": "એક લોલકનો ગોળો 1 m લંબાઈની દોરી સાથે 5 m/sની મહત્તમ ઝડપથી વર્તુળાકાર ગતિ કરે છે. જો ગોળાનું દળ 0.1 kg હોય, તો દોરી પર લાગતું મહત્તમ તણાવબળ કેટલું હશે? (g = 10 m/s² લો)", "options": ["A) 1.5 N", "B) 2.5 N", "C) 3.5 N", "D) 4.5 N"], "correct": 2, "explanation": "મહત્તમ તણાવબળ T = mv²/r + mg. અહીં m = 0.1 kg, v = 5 m/s, r = 1 m, g = 10 m/s². તેથી T = (0.1 × 25)/1 + 0.1 × 10 = 2.5 + 1 = 3.5 N. વિકલ્પ A અને B ખોટા છે કારણ કે તેમાં ગુરુત્વાકર્ષણ બળનો સમાવેશ કર્યો નથી. વિકલ્પ D ખોટો છે કારણ કે તેમાં ગણતરીની ભૂલ છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 5: ગતિના નિયમો", "difficulty": "Hard", "num": 5}, {"question": "એક 2 kg દળ ધરાવતો પદાર્થ 1 m ત્રિજ્યાવાળા વર્તુળાકાર માર્ગ પર 4 m/sની અચળ ઝડપથી ગતિ કરે છે. તો પદાર્થ પર લાગતું કેન્દ્રાભિમુખ બળ કેટલું હશે?", "options": ["A) 8 N", "B) 16 N", "C) 32 N", "D) 64 N"], "correct": 2, "explanation": "કેન્દ્રાભિમુખ બળનું સૂત્ર F = mv²/r છે. અહીં m = 2 kg, v = 4 m/s, r = 1 m. આમ, F = (2)(4)²/1 = 32 N. વિકલ્પ A (8 N) અને B (16 N) ખોટા છે કારણ કે તેઓ વર્ગની ગણતરી ચૂકી જાય છે. વિકલ્પ D (64 N) ખોટો છે કારણ કે તેમાં ત્રિજ્યાને 0.5 m લેવામાં આવ્યો છે.", "ncert_ref": "Class XI - પ્રકરણ 5: ગતિના નિયમો", "difficulty": "Easy", "num": 6}, {"question": "વર્તુળાકાર ગતિ દરમિયાન કેન્દ્રાભિમુખ બળની દિશા કઈ હોય છે?", "options": ["A) વર્તુળના સ્પર્શક દિશામાં", "B) વર્તુળના કેન્દ્ર તરફ", "C) વર્તુળના કેન્દ્રથી બહારની તરફ", "D) ગતિની દિશામાં"], "correct": 1, "explanation": "કેન્દ્રાભિમુખ બળ હંમેશા વર્તુળના કેન્દ્ર તરફ લાગે છે. વિકલ્પ A ખોટો છે કારણ કે સ્પર્શક દિશા ગતિની દિશા હોય છે. વિકલ્ ી ગતિ કરે છે. જો પદાર્થનું દળ 0.2 kg હોય, તો તેના પર લાગતું કેન્દ્રાભિમુખ બળ કેટલું હશે?", "options": ["A) 1.5 N", "B) 4.5 N", "C) 3.0 N", "D) 6.0 N"], "correct": 1, "explanation": "કેન્દ્રાભિમુખ બળનું સૂત્ર F = mv²/r છે. અહીં m = 0.2 kg, v = 3 m/s, r = 0.4 m. તેથી F = 0.2 × (3)² / 0.4 = 0.2 × 9 / 0.4 = 4.5 N. વિકલ્પ A ખોટો છે કારણ કે તેમાં ઝડપનો વર્ગ લેવામાં ભૂલ થઈ છે. વિકલ્પ C માત્ર mv/r ગણતરી દર્શાવે છે. વિકલ્પ D બમણું મૂલ્ય દર્શાવે છે.", "ncert_ref": "Class XI - પ્રકરણ 5: ગતિના નિયમો", "difficulty": "Easy", "num": 36}, {"question": "એક વાહન 60 m ત્રિજ્યાવાળા વળાંક પર 25 m/sની ઝડપે ગતિ કરે છે. જો વાહનનું દળ 1200 kg હોય, તો વળાંક પર વાહનને વળાંક લેવા માટે જરૂરી ઘર્ષણબળ કેટલું હોવું જોઈએ?", "options": ["A) 10000 N", "B) 12500 N", "C) 15000 N", "D) 18000 N"], "correct": 1, "explanation": "કેન્દ્રાભિમુખ બળ ઘર્ષણબળ દ્વારા પૂરું પાડવામાં આવે છે. F = mv²/r = 1200 × (25)² / 60 = 1200 × 625 / 60 = 12500 N. વિકલ્પ A ખોટો છે કારણ કે તેમાં ઝડપનો વર્ગ લેવામાં ભૂલ થઈ છે. વિકલ્પ C અને D અનુક્રમે 20% અને 44% વધારે મૂલ્ય દર્શાવે છે.", "ncert_ref": "Class XI - પ્રકરણ 5: ગતિના નિયમો", "difficulty": "Medium", "num": 37}, {"question": "એક પદાર્થ 1.5 m ત્રિજ્યાવાળા વર્તુળાકાર માર્ગ પર 4 m/sની અચળ ઝડપથી ગતિ કરે છે. જો પદાર્થનું દળ 0.5 kg હોય, તો એક પરિભ્રમણ દરમિયાન કેન્દ્રાભિમુખ બળ દ્વારા થતું કાર્ય કેટલું હશે?", "options": ["A) 0 J", "B) 12 J", "C) 24 J", "D) 36 J"], "correct": 0, "explanation": "કેન્દ્રાભિમુખ બળ હંમેશા વેગને લંબરૂપે લાગે છે, તેથી બળ અને સ્થાનાંતરણ વચ્ચેનો ખૂણો 90° હોય છે. કાર્ય W = F·s·cosθ = F·s·cos90° = 0. વિકલ્પ B, C અને D ખોટાં છે કારણ કે તેમાં કાર્યની ગણતરી ખોટી રીતે કરવામાં આવી છે, જ્યારે કેન્દ્રાભિમુખ બળ કાર્ય કરતું નથી.", "ncert_ref": "Class XI - પ્રકરણ 6: કાર્ય, ઊર્જા અને પાવર", "difficulty": "Hard", "num": 38}, {"question": "એક પદાર્થ 0.2 m ત્રિજ્યાવાળા વર્તુળાકાર માર્ગ પર 3 m/sની અચળ ઝડપથી ગતિ કરે છે. જો પદાર્થનું દળ 0.5 kg હોય, તો તેના પર લાગતું કેન્દ્રાભિમુખ બળ કેટલું હશે અને આ બળનું સ્ત્રોત શું હોઈ શકે?", "options": ["A) 22.5 N, ઘર્ષણબળ", "B) 11.25 N, ગુરુત્વાકર્ષણ બળ", "C) 22.5 N, તણાવ બળ", "D) 11.25 N, અભિકેન્દ્ર બળ"], "correct": 0, "explanation": "કેન્દ્રાભિમુખ બળનું સૂત્ર F = mv²/r છે. અહીં m = 0.5 kg, v = 3 m/s, r = 0.2 m. તેથી F = 0.5 × (3)² / 0.2 = 22.5 N. આ બળ વર્તુળાકાર ગતિ માટે જરૂરી છે, જે ઘર્ષણબળ (જેમ કે વાહનના ટાયર અને રસ્તા વચ્ચે) અથવા તણાવ બળ (દોરીના કિસ્સામાં) દ્વારા પૂરું પાડી શકાય. અહીં ઘર્ષણબળ વધુ યોગ્ય ઉદાહરણ છે કારણ કે પદાર્થ રસ્તા પર ગતિ કરતો હોઈ શકે. ગુરુત્વાકર્ષણ બળ કેન્દ્રાભિમુખ બળ તરીકે કામ કરી શકે નહીં કારણ કે તે વર્તુળના સમતલમાં લાગતું નથી. અભિકેન્દ્ર બળ એ માત્ર કાલ્પનિક બળ છે, વાસ્તવિક બળ નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 5: ગતિના નિયમો", "difficulty": "Medium", "num": 39}, {"question": "એક વિદ્યાર્થી એક દોરીના છેડે બાંધેલા પથ્થરને ઊર્ધ્વ સમતલમાં વર્તુળાકાર ગતિ કરાવે છે. જ્યારે પથ્થર સૌથી નીચેના બિંદુએ હોય ત્યારે દોરીમાં તણાવ બળ T₁ અને જ્યારે સૌથી ઉપરના બિંદુએ હોય ત્યારે તણાવ બળ T₂ હોય, તો નીચેનામાંથી કયું વિધાન સાચું છે? (g = 10 m/s² લો)", "options": ["A) T₁ = T₂, કારણ કે ઝડપ અચળ રહે છે", "B) T₁ > T₂, કારણ કે કેન્દ્રાભિમુખ બળ ઉપરાંત ગુરુત્વાકર્ષણ બળ પણ લાગે છે", "C) T₂ > T₁, કારણ કે ઉપરના બિંદુએ ગુરુત્વાકર્ષણ બળ કેન્દ્રાભિમુખ બળમાં ઉમેરાય છે", "D) T₁ = T₂ + 2mg, કારણ કે નીચેના બિંદુએ ગુરુત્વાકર્ષણ બળ વિરુદ્ધ દિશામાં લાગે છે"], "correct": 1, "explanation": "ઊર્ધ્વ સમતલમાં વર્તુળાકાર ગતિ દરમિયાન, સૌથી નીચેના બિંદુએ તણાવ બળ T₁ = mv²/r + mg (કેન્દ્રાભિમુખ બળ + ગુરુત્વાકર્ષણ બળ) અને સૌથી ઉપરના બિંદુએ તણાવ બળ T₂ = mv²/r - mg (કેન્દ્રાભિમુખ બળ - ગુરુત્વાકર્ષણ બળ) હોય છે. તેથી T₁ હંમેશા T₂ કરતાં વધારે હોય છે. વિકલ્પ A ખોટો છે કારણ કે ઝડપ અચળ હોવા છતાં બળો બદલાય છે. વિકલ્પ C ખોટો છે કારણ કે ઉપરના બિંદુએ ગુરુત્વાકર્ષણ બળ કેન્દ્રાભિમુખ બળની વિરુદ્ધ દિશામાં લાગે છે. વિકલ્પ D ખોટો છે કારણ કે T₁ = T₂ + 2mg નહીં, પરંતુ T₁ = T₂ + 2mg માત્ર ત્યારે જ સાચું હોય જો બંને બિંદુએ ઝડપ સમાન હોય, જે સામાન્ય રીતે હોતી નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 5: ગતિના નિયમો", "difficulty": "Hard", "num": 40}, {"question": "નીચેનાં વિધાનો ધ્યાનમાં લો: (i) કેન્દ્રાભિમુખ બળ વગર વર્તુળાકાર ગતિ શક્ય નથી. (ii) કેન્             const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
