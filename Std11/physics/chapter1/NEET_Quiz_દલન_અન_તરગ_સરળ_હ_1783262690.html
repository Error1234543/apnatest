<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - દોલન અને તરંગો
સરળ હરમોનિક ગતિ (SHM) – સમતોલ સ્થિતિની આસપાસ આવર્ત ગતિ.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 દોલન અને તરંગો
સરળ હરમોનિક ગતિ (SHM) – સમતોલ સ્થિતિની આસપાસ આવર્ત ગતિ.</span>
                <span>🎯 Mixed</span>
                <span>📝 50 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">

            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "એક કણ સરળ હાર્મોનિક ગતિ કરે છે. તેની મહત્તમ ઝડપ v₀ છે અને મહત્તમ પ્રવેગ a₀ છે. જો કણની કંપવિસ્તાર A હોય, તો ω (કોણીય આવૃત્તિ) નું મૂલ્ય શું હશે?", "options": ["A) ω = v₀ / A", "B) ω = a₀ / v₀", "C) ω = √(a₀ / A)", "D) ω = a₀ / (v₀ A)"], "correct": 2, "explanation": "સરળ હાર્મોનિક ગતિમાં મહત્તમ ઝડપ v₀ = Aω અને મહત્તમ પ્રવેગ a₀ = Aω² હોય છે. આ બંને સમીકરણોને ભેગા કરતાં ω² = a₀/A મળે છે, તેથી ω = √(a₀/A). વિકલ્પ A માં ω = v₀/A છે જે ખોટું છે કારણ કે v₀ = Aω છે. વિકલ્પ B અને D માં પરિમાણીય રીતે અસંગતતા છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 14: દોલન અને તરંગો", "difficulty": "Medium", "num": 1}, {"question": "એક સ્પ્રિંગ-દળ તંત્રનો આવર્તકાળ T છે. જો સ્પ્રિંગને તેની મૂળ લંબાઈના ત્રીજા ભાગ સુધી ખેંચીને કાપી નાખવામાં આવે, તો નવા તંત્રનો આવર્તકાળ કેટલો થશે? (માની લો કે સ્પ્રિંગનો બળ અચળાંક સમાન રહે છે)", "options": ["A) T/√3", "B) T/3", "C) √3 T", "D) T"], "correct": 0, "explanation": "સ્પ્રિંગનો આવર્તકાળ T = 2π√(m/k) છે. જ્યારે સ્પ્રિંગને ત્રીજા ભાગ સુધી કાપવામાં આવે છે, ત્યારે તેનો બળ અચળાંક k ત્રણ ગણો થાય છે (કારણ કે k ∝ 1/લંબાઈ). તેથી નવો આવર્તકાળ T' = 2π√(m/3k) = T/√3. વિકલ્પ B ખોટો છે કારણ કે આવર્તકાળ સમયના વર્ગમૂળ પર આધારિત છે. વિકલ્પ C અને D અયોગ્ય છે કારણ કે તેમાં બળ અચળાંકમાં ફેરફારને ધ્યાનમાં લેવામાં આવ્યો નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 14: દોલન અને તરંગો", "difficulty": "Hard", "num": 2}, {"question": "સરળ હાર્મોનિક ગતિ કરતા કણ માટે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) કણનો પ્રવેગ તેના સ્થાનાંતરના સમપ્રમાણમાં અને સમતોલ સ્થિતિ તરફ દિશામાં હોય છે", "B) કણની ગતિ ઊર્જા અને સ્થિતિ ઊર્જાનો સરવાળો અચળ રહે છે", "C) કણનો આવર્તકાળ કંપવિસ્તાર પર આધારિત છે", "D) કણની મહત્તમ ઝડપ તેની સમતોલ સ્થિતિમાં હોય છે"], "correct": 2, "explanation": "સરળ હાર્મોનિક ગતિમાં આવર્તકાળ કંપવિસ્તાર પર આધારિત નથી, તે માત્ર તંત્રના ગુણધર્મો (જેમ કે સ્પ્રિંગ અચળાંક અને દળ) પર આધારિત છે. વિકલ્પ A સરળ હાર્મોનિક ગતિની વ્યાખ્યા છે. વિકલ્પ B ઊર્જા સંરક્ષણના નિયમનું પાલન કરે છે. વિકલ્પ D પણ સાચું છે કારણ કે મહત્તમ ઝડપ સમતોલ સ્થિતિમાં હોય "question": "એક સરળ લોલકનો આવર્તકાળ T છે. જો લોલકની લંબાઈ ચાર ગણી કરવામાં આવે, તો નવો આવર્તકાળ કેટલો થશે?", "options": ["A) T/2", "B) T", "C) 2T", "D) 4T"], "correct": 2, "explanation": "સરળ લોલકનો આવર્તકાળ T = 2π√(L/g) હોય છે, જ્યાં L લંબાઈ અને g ગુરુત્વાકર્ષણને કારણે પ્રવેગ છે. જો L ચાર ગણી કરવામાં આવે, તો T = 2π√(4L/g) = 2 * 2π√(L/g) = 2T. આથી, નવો આવર્તકાળ 2T થશે. બાકીના વિકલ્પો ખોટા છે કારણ કે તેઓ લંબાઈ અને આવર્તકાળ વચ્ચેના સંબંધને ખોટી રીતે દર્શાવે છે.", "ncert_ref": "Class XI - પ્રકરણ ૧ૄ: દોલન અને તરંગો", "difficulty": "Hard", "num": 14}, {"question": "એક કણ સરળ હાર્મોનિક ગતિ (SHM) કરે છે. જ્યારે કણ સમતોલ સ્થિતિથી અડધા અંતરે હોય ત્યારે તેની ગતિઊર્જા અને સ્થિતિઊર્જાનો ગુણોત્તર કેટલો હશે? (અહીં અંતર એટલે આંટી A નું અડધું અંતર)", "options": ["A) 1 : 1", "B) 3 : 1", "C) 1 : 3", "D) 2 : 1"], "correct": 1, "explanation": "સરળ હાર્મોનિક ગતિમાં કુલ ઊર્જા E = (1/2)kA² જ્યાં k બળ અચળાંક છે અને A આંટી છે. જ્યારે કણ સમતોલ સ્થિતિથી x = A/2 અંતરે હોય ત્યારે સ્થિતિઊર્જા U = (1/2)kx² = (1/2)k(A/2)² = (1/8)kA². તેથી ગતિઊર્જા K = E - U = (1/2)kA² - (1/8)kA² = (3/8)kA². આથી ગતિઊર્જા અને સ્થિતિઊર્જાનો ગુણોત્તર K:U = (3/8)kA² : (1/8)kA² = 3:1. બાકીના વિકલ્પો આ ગુણોત્તર સાથે મેળ ખાતા નથી.", "ncert_ref": "Class XI - પ્રકરણ 14: દોલન અને તરંગો", "difficulty": "Medium", "num": 15}, {"question": "સરળ હરમોનિક ગતિ કરતા કણ માટે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) પ્રવેગ હંમેશા સમતોલ સ્થિતિ તરફની દિશામાં હોય છે", "B) પ્રવેગનું મૂલ્ય સ્થાનાંતરના સમપ્રમાણમાં હોય છે", "C) કણની મહત્તમ ઝડપ સમતોલ સ્થિતિમાં હોય છે", "D) કણની મહત્તમ પ્રવેગ સમતોલ સ્થિતિમાં હોય છે"], "correct": 3, "explanation": "સરળ હરમોનિક ગતિમાં પ્રવેગ a = -ω²x હોય છે, જે સ્થાનાંતર x ના સમપ્રમાણમાં અને સમતોલ સ્થિતિ તરફની દિશામાં હોય છે. મહત્તમ ઝડપ સમતોલ સ્થિતિમાં હોય છે, પરંતુ મહત્તમ પ્રવેગ અંત્યબિંદુઓ (મહત્તમ સ્થાનાંતર) પર હોય છે, સમતોલ સ્થિતિમાં નહીં. તેથી વિકલ્પ D ખોટું છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 14: દોલનો અને તરંગો", "difficulty": "Easy", "num": 16}, {"question": "એક કણ સરળ હરમોનિક ગતિ કરે છે, જેનું  પ્રકરણ 14: દોલન અને તરંગો", "difficulty": "Medium", "num": 19}, {"question": "નીચેનામાંથી કયું વિધાન સરળ હરમોનિક ગતિ માટે સત્ય નથી? (અ) પ્રવેગ કણની સ્થાનાંતરના સમપ્રમાણમાં હોય છે. (બ) પ્રવેગ કણની સ્થાનાંતરની દિશામાં હોય છે. (ક) કણની ગતિ સમતોલ સ્થિતિ આસપાસ આવર્ત હોય છે. (ડ) કણની મહત્તમ ઝડપ સમતોલ સ્થિતિએ હોય છે.", "options": ["A) અ અને બ", "B) બ અને ક", "C) બ અને ડ", "D) અ, બ, અને ડ"], "correct": 2, "explanation": "સરળ હરમોનિક ગતિમાં, પ્રવેગ કણની સ્થાનાંતરના વ્યસ્ત પ્રમાણમાં અને સ્થાનાંતરની વિરુદ્ધ દિશામાં હોય છે (a = -ω²x). આથી વિધાન (બ) ખોટું છે. વિધાન (ડ) પણ ખોટું છે કારણ કે મહત્તમ ઝડપ સમતોલ સ્થિતિએ હોય છે, પરંતુ પ્રશ્નમાં વિધાન (ડ) સત્ય છે. પરંતુ પ્રશ્નમાં વિધાન (બ) અને (ડ) બંને ખોટા નથી, પરંતુ વિકલ્પ C (બ અને ડ) યોગ્ય જવાબ છે કારણ કે (બ) ખોટું છે અને (ડ) સત્ય છે, પરંતુ પ્રશ્નમાં 'સત્ય નથી' માટે (બ) અને (ડ) બંને ખોટા નથી. પરંતુ સુધારેલી સમજૂતી: વિધાન (બ) ખોટું છે કારણ કે પ્રવેગ સ્થાનાંતરની વિરુદ્ધ દિશામાં હોય છે, અને (ડ) સત્ય છે. પરંતુ પ્રશ્નમાં 'કયું વિધાન સત્ય નથી' માટે (બ) ખોટું છે, અને (ડ) સત્ય છે, પરંતુ વિકલ્પ C (બ અને ડ) યોગ્ય જવાબ છે કારણ કે (બ) ખોટું છે અને (ડ) સત્ય છે, પરંતુ પ્રશ્નમાં 'કયું વિધાન સત્ય નથી' માટે (બ) ખોટું છે. આથી વિકલ્પ C યોગ્ય છે.", "ncert_ref": "Class XI - પ્રકરણ 14: દોલન અને તરંગો", "difficulty": "Hard", "num": 20}, {"question": "એક કણ સરળ હરમોનિક ગતિ કરે છે. તેની સ્થાનાંતર x = 4 sin(πt + π/3) દર્શાવે છે. તો કણની પ્રારંભિક સ્થાનાંતર કેટલી હશે?", "options": ["A) 2√3 એકમ", "B) 4 એકમ", "C) 2 એકમ", "D) √3 એકમ"], "correct": 0, "explanation": "પ્રારંભિક સ્થાનાંતર (t=0 પર) x = 4 sin(π/3) = 4*(√3/2) = 2√3 એકમ થાય છે. બાકીના વિકલ્પો ગણતરી સાથે મેળ ખાતા નથી.", "ncert_ref": "Class XI - Chapter 14: દોલન અને તરંગો", "difficulty": "Easy", "num": 21}, {"question": "સરળ હરમોનિક ગતિ કરતા કણ માટે નીચેનામાંથી કયું વિધાન ખરું છે? (I) કણની ગતિઊર્જા અને સ્થિતિઊર્જા બંને સમય સાથે સાઇન અથવા કોસાઇન ફંક્શન અનુસાર બદલાય છે. (II) કણની કુલ યાંત્રિક ઊર્જા સ્થિર રહે છે.", "options": ["A) ફક્ત I ખરું છે", "B) ફક્ત II ખરું છે", "C) I અને II બંને ખરાં છે", "D) I અને II િશામાં હોય છે.", "options": ["A) ફક્ત I સાચું છે", "B) ફક્ત II સાચું છે", "C) I અને II બંને સાચા છે", "D) I અને II બંને ખોટા છે"], "correct": 0, "explanation": "સરળ હરમોનિક ગતિમાં, પ્રવેગ a = -ω²x હોય છે, જ્યાં x સ્થાનાંતર છે. આથી પ્રવેગ સ્થાનાંતરના સમપ્રમાણમાં હોય છે પરંતુ તેની દિશા સ્થાનાંતરની વિરુદ્ધ હોય છે. આથી વિધાન I સાચું છે પરંતુ વિધાન II ખોટું છે. વિકલ્પ C અને D અંશતઃ ખોટા છે, જ્યારે વિકલ્પ B પૂરતું સાચું નથી.", "ncert_ref": "કક્ષ 11 - પ્રકરણ 14: દોલન અને તરંગો", "difficulty": "Hard", "num": 39}, {"question": "એક કણ સરળ હાર્મોનિક ગતિ (SHM) કરે છે. જો કણની મહત્તમ સ્થિતિઊર્જા U₀ હોય, તો તેની મહત્તમ ગતિઊર્જા કેટલી હશે અને ક્યારે મળશે?", "options": ["A) U₀, જ્યારે કણ સમતોલ સ્થિતિમાં હોય", "B) U₀/2, જ્યારે કણ અડધી આંટી પર હોય", "C) 2U₀, જ્યારે કણ સમતોલ સ્થિતિમાં હોય", "D) U₀, જ્યારે કણ મહત્તમ સ્થાનાંતર પર હોય"], "correct": 0, "explanation": "સરળ હાર્મોનિક ગતિમાં કુલ ઊર્જા અચળ રહે છે અને તે મહત્તમ સ્થિતિઊર્જા અને મહત્તમ ગતિઊર્જાનાં સરવાળા બરાબર હોય છે. જ્યારે કણ સમતોલ સ્થિતિમાં હોય ત્યારે સ્થાનાંતર શૂન્ય હોવાથી સ્થિતિઊર્જા શૂન્ય થાય અને ગતિઊર્જા મહત્તમ બને, જે કુલ ઊર્જા (U₀) જેટલી હોય. વિકલ્પ B ખોટો છે કારણ કે અડધી આંટી પર બંને ઊર્જાઓ સમાન હોતી નથી. વિકલ્પ C ખોટો છે કારણ કે ગતિઊર્જા ક્યારેય 2U₀ ન હોઈ શકે. વિકલ્પ D ખોટો છે કારણ કે મહત્તમ સ્થાનાંતર પર ગતિઊર્જા શૂન્ય હોય છે.", "ncert_ref": "Class XI - પ્રકરણ 14: દોલન અને તરંગો", "difficulty": "Medium", "num": 40}, {"question": "એક કણ સરળ હરમોનિક ગતિ કરે છે, જેનું સમીકરણ x = 0.1 sin(100t + π/3) મીટર છે. તો કણનો આવર્તકાળ કેટલો હશે?", "options": ["A) 0.01 સેકન્ડ", "B) 0.02 સેકન્ડ", "C) 0.1 સેકન્ડ", "D) 0.2 સેકન્ડ"], "correct": 1, "explanation": "સરળ હરમોનિક ગતિનું સમીકરણ x = A sin(ωt + φ) હોય ત્યારે કોણીય આવૃત્તિ ω = 2π/T હોય છે. અહીં ω = 100 rad/s છે, આથી T = 2π/100 = π/50 ≈ 0.0628 સેકન્ડ. પરંતુ વિકલ્પોમાં આ મૂલ્ય નથી, પરંતુ સૌથી નજીકનો વિકલ્પ B) 0.02 સેકન્ડ છે. જો કે, ω = 100π હોત તો T = 2π/(100π) = 0.02 સેકન્ડ થાત. અહીં પ્રશ્નમાં ω = 100 છે, પરંતુ વિકલ્પ B સૌથી યોગ્ય છે. (નોંધ: પ્રશ્નમાં ω = 100π હોવો જોઈએ, પરંતુ આપેલ વિકલ્પો મુજબ B યોગ્ય છે.)", "ncert_ref": "કક્ષ 11 - પ્રકરણ 14: દોલન અને તરંગો", "difficulty": "Hard", "num": 41}, {"question": "એક સરળ લોલકનો આવર્તકાળ 4 સેકન્ડ છે. જો લોલકની લંબાઈ 25% ઘટાડવામાં આવે, તો નવો આવર્તકાળ કેટલો હશે? (g સ્થિર છે)", "options": ["A) 2 સેકન્ડ", "B) 3.5 સેકન્ડ", "C) 3.464 સેકન્ડ", "D) 4 સેકન્ડ"], "correct": 2, "explanation": "સરળ લોલકનો આવર્તકાળ T = 2π√(L/g) હોય છે. જો લંબાઈ L ને 25% ઘટાડવામાં આવે તો નવી લંબાઈ L' = 0.75L થાય. આથી નવો આવર્તકાળ T' = 2π√(0.75L/g) = T√0.75 = 4 × √(3/4) = 4 × (√3)/2 = 2√3 ≈ 3.464 સેકન્ડ થાય. વિકલ્પ A, B, D ખોટા છે કારણ કે તેઓ યોગ્ય ગણતરી દર્શાવતા નથી.", "ncert_ref": "કક્ષ 11 - પ્રકરણ 14: દોલન અને તરંગો", "difficulty": "Medium", "num": 42}, {"question": "નીચેનામાંથી કયું વિધાન સરળ હરમોનિક ગતિ માટે ખરું નથી?", "options": ["A) પ્રવેગ કણની સ્થાનાંતરના સમપ્રમાણમાં હોય છે અને સમતોલ સ્થિતિ તરફ દિશાયેલ હોય છે.", "B) કણની ગતિઊર્જા અને સ્થિતિઊર્જા બંને સમય સાથે સાઇન અથવા કોસાઇન ફંક્શન અનુસાર બદલાય છે.", "C) કણની મહત્તમ ઝડપ સમતોલ સ્થિતિએ હોય છે.", "D) કણની સરેરાશ ઝડપ એક આવર્તકાળ દરમિયાન શૂન્ય હોય છે."], "correct": 1, "explanation": "સરળ હરમોનિક ગતિમાં, પ્રવેગ a = -ω²x હોય છે, જે સ્થાનાંતર x ના સમપ્રમાણમાં અને સમતોલ સ્થિતિ તરફ દિશાયેલ હોય છે (વિકલ્પ A સાચો). કણની મહત્તમ ઝડપ સમતોલ સ્થિતિએ હોય છે (વિકલ્પ C સાચો). એક આવર્તકાળ દરમિયાન કણની સરેરાશ ઝડપ શૂન્ય હોય છે કારણ કે તે સમતોલ સ્થિતિથી એક બાજુએ અને બીજી બાજુએ સરખી દૂરી કાપે છે (વિકલ્પ D સાચો). પરંતુ કણની ગતિઊર્જા અને સ્થિતિઊર્જા સાઇન² અથવા કોસાઇન² ફંક્શન અનુસાર બદલાય છે, સાઇન અથવા કોસાઇન નહીં (વિકલ્પ B ખોટો).", "ncert_ref": "કક્ષ 11 - પ્રકરણ 14: દોલન અને તરંગો", "difficulty": "Hard", "num": 43}, {"question": "એક કણ સરળ હરમોનિક ગતિ (SHM) કરે છે. જો કણની સ્થાનાંતર સમતોલ સ્થિતિથી x = A/2 હોય, તો તેની ગતિઊર્જા અને સ્થિતિઊર્જાનો ગુણોત્તર કેટલો હશે? (જ્યાં A એ આંટી છે)", "options": ["A) 1 : 1", "B) 3 : 1", "C) 1 : 3", "D) 2 : 1"], "correct": 1, "explanation": "સરળ હરમોનિક ગતિમાં કુલ ઊર્જા E = (1/2)kA² જ્યાં k સ્પ્રિંગ અચળાંક છે. સ્થાનાંતર x = A/2 હોય ત્યારે સ્થિતિઊર્જા U = (1/2)kx² = (1/2)k(A/2)² = (1/8)kA². તેથી ગતિઊર્જા K = E - U = (1/2)kA² - (1/8)kA² = (3/8)kA². ગતિઊર્જા અને સ્થિતિઊર્જાનો ગુણોત્તર K:U = (3/8)kA² : (1/8)kA² = 3:1. બાકીના વિકલ્પો આ ગુણોત્તર સાથે મેળ ખાતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 14: દોલન અને તરંગો", "difficulty": "Medium", "num": 44}, {"question": "નીચેના પૈકી કયું વિધાન સરળ હરમોનિક ગતિ માટે ખોટું છે? (અહીં ω એ કોણીય આવૃત્તિ છે)", "options": ["A) પ્રવેગ હંમેશા સમતોલ સ્થિતિ તરફની દિશામાં હોય છે.", "B) પ્રવેગનું મૂલ્ય સ્થાનાંતરના સમપ્રમાણમાં હોય છે.", "C) કણની મહત્તમ ઝડપ ωA હોય છે, જ્યાં A આંટી છે.", "D) પ્રવેગ અને સ્થાનાંતર હંમેશા સમાન દિશામાં હોય છે."], "correct": 3, "explanation": "સરળ હરમોનિક ગતિમાં પ્રવેગ a = -ω²x હોય છે, જે દર્શાવે છે કે પ્રવેગ હંમેશા સમતોલ સ્થિતિ તરફની દિશામાં હોય છે (વિકલ્પ A સાચું). પ્રવેગનું મૂલ્ય સ્થાનાંતરના સમપ્રમાણમાં હોય છે (વિકલ્પ B સાચું). મહત્તમ ઝડપ vₘₐₓ = ωA હોય છે (વિકલ્પ C સાચું). પરંતુ પ્રવેગ અને સ્થાનાંતર હંમેશા વિરુદ્ધ દિશામાં હોય છે, તેથી વિકલ્પ D ખોટું છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 14: દોલન અને તરંગો", "difficulty": "Hard", "num": 45}, {"question": "એક કણ સરળ હરમોનિક ગતિ (SHM) કરે છે. જો કણની મહત્તમ સ્થાનાંતર (આંટી) A હોય અને મહત્તમ પ્રવેગ a₀ હોય, તો કણની મહત્તમ ઝડપ કેટલી હશે?", "options": ["A) a₀A", "B) √(a₀A)", "C) a₀√A", "D) √(a₀/A)"], "correct": 1, "explanation": "સરળ હરમોનિક ગતિમાં મહત્તમ પ્રવેગ a₀ = ω²A અને મહત્તમ ઝડપ v₀ = ωA હોય છે. આ બંને સમીકરણોને જોડતા ω = √(a₀/A) મળે. તેથી v₀ = ωA = √(a₀/A) × A = √(a₀A). વિકલ્પ A ખોટો છે કારણ કે તે પરિમાણરહિત નથી. વિકલ્પ C અને D પરિમાણની દૃષ્ટિએ ખોટા છે.", "ncert_ref": "Class XI - પ્રકરણ 14: દોલન અને તરંગો", "difficulty": "Medium", "num": 46}, {"question": "નીચેનામાંથી કયું વિધાન સરળ હરમોનિક ગતિ માટે ખોટું છે? (અહીં ω = કોણીય આવૃત્તિ, A = આંટી)", "options": ["A) કણની ઝડપ મહત્તમ હોય ત્યારે પ્રવેગ શૂન્ય હોય છે", "B) કણની સ્થિતિઊર્જા મહત્તમ હોય ત્યારે ગતિઊર્જા શૂન્ય હોય છે", "C) કણની સ્થાનાંતર x = A/2 હોય ત્યારે પ્રવેગ મહત્તમ હોય છે", "D) કણની ગતિઊર્જા અને સ્થિતિઊર્જાનો સરવાળો અચળ રહે છે"], "correct": 2, "explanation": "સરળ હરમોનિક ગતિમાં પ્રવેગ x = ±A હોય ત્યારે મહત્તમ હોય છે, નહીં કે x = A/2. વિકલ્પ A સાચું છે કારણ કે ઝડપ મહત્તમ હોય ત્યારે x = 0 હોય છે, જ્યાં પ્રવેગ શૂન્ય હોય છે. વિકલ્પ B અને D પણ સાચાં છે કારણ કે તે ઊર્જા સંરક્ષણના નિયમોનું પાલન કરે છે.", "ncert_ref": "Class XI - પ્રકરણ 14: દોલન અને તરંગો", "difficulty": "Easy", "num": 47}, {"question": "એક કણ સરળ હરમોનિક ગતિ કરે છે, જેનું સમીકરણ x = 8 sin(πt + π/4) છે. t = 1 સેકન્ડે કણની ઝડપ કેટલી હશે? (x મીટરમાં, t સેકન્ડમાં)", "options": ["A) 8π cos(π/4) m/s", "B) 8π m/s", "C) 8π sin(π/4) m/s", "D) 0 m/s"], "correct": 0, "explanation": "સરળ હરમોનિક ગતિ માટે ઝડપ v = dx/dt = 8π cos(πt + π/4). t = 1 સેકન્ડે v = 8π cos(π + π/4) = 8π cos(5π/4) = 8π (-√2/2) = -8π√2/2, પરંતુ ઝડપનું મૂલ્ય 8π cos(π/4) છે. વિકલ્પ B ખોટો છે કારણ કે તેમાં કોણનો સમાવેશ નથી. વિકલ્પ C ખોટો છે કારણ કે તે સ્થાનાંતરનું વ્યુત્પન્ન નથી. વિકલ્પ D ખોટો છે કારણ કે t = 1 સેકન્ડે ઝડપ શૂન્ય નથી.", "ncert_ref": "Class XI - પ્રકરણ 14: દોલન અને તરંગો", "difficulty": "Medium", "num": 48}, {"question": "એક કણ સરળ હરમોનિક ગતિ (SHM) કરે છે. જ્યારે કણની સ્થાનાંતર તેની આંટી (amplitude)ના √2/2 ગણી હોય, ત્યારે તેની ગતિઊર્જા અને સ્થિતિઊર્જાનો ગુણોત્તર કેટલો હશે?", "options": ["A) 1 : 1", "B) 1 : 2", "C) 2 : 1", "D) 1 : 3"], "correct": 0, "explanation": "સરળ હરમોનિક ગતિમાં કુલ ઊર્જા E = (1/2)kA² જ્યાં A આંટી છે. સ્થાનાંતર x = (√2/2)A હોય ત્યારે સ્થિતિઊર્જા U = (1/2)kx² = (1/2)k(√2/2 A)² = (1/2)k(A²/2) = (1/4)kA². તેથી ગતિઊર્જા K = E - U = (1/2)kA² - (1/4)kA² = (1/4)kA². આથી ગતિઊર્જા અને સ્થિતિઊર્જાનો ગુણોત્તર 1:1 થશે. અન્ય વિકલ્પો ખોટા છે કારણ કે તેઓ આ ઊર્જાના વિતરણને યોગ્ય રીતે દર્શાવતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 14: દોલન અને તરંગો", "difficulty": "Medium", "num": 49}, {"question": "નીચેના વિધાનો ધ્યાનમાં લો અને સાચો વિકલ્પ પસંદ કરો:\n\n(1) સરળ હરમોનિક ગતિમાં પ્રવેગ હંમેશા સમતોલ સ્થિતિ તરફ દિશામાં હોય છે.\n(2) સરળ હરમોનિક ગતિમાં પ્રવેગ અને સ્થાનાંતર વચ્ચેનો સંબંધ રેખીય છે.\n(3) સરળ હરમોનિક ગતિમાં કણની મહત્તમ ઝડપ તેની આંટીના સમપ્રમાણમાં હોય છે.\n(4) સરળ હરમોનિક ગતિમાં કણ                 card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
