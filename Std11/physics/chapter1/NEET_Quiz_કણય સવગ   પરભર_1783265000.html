<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - કોણીય સંવેગ – પરિભ્રમણ ગતિનો સંવેગ.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 કોણીય સંવેગ – પરિભ્રમણ ગતિનો સંવેગ.</span>
                <span>🎯 Mixed</span>
                <span>📝 43 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "જ્યારે કણ વર્તુળ ગતિ કરે છે ત્યારે તેના પર લાગતું કેન્દ્રગામી બળ F = mrω² છે. તો કોણીય સંવેગ (τ) નું મૂલ્ય કયું હશે?", "options": ["A) τ = 0", "B) τ = mr²ω²", "C) τ = mω²", "D) τ = rF sinθ"], "correct": 0, "explanation": "કોણીય સંવેગ (τ) = r × F છે. વર્તુળ ગતિમાં બળ F કેન્દ્ર તરફ લાગે છે, જ્યારે r અને F વચ્ચેનો ખૂણો θ = 0° હોય છે. sin(0°) = 0 હોવાથી τ = rF sin(0°) = 0. અહીં, B, C, અને D વિકલ્પો ખોટા છે કારણ કે તેઓ કેન્દ્રગામી બળના સૂત્રને સીધું કોણીય સંવેગ તરીકે લેખે છે અથવા ખૂણાને ધ્યાનમાં લેતા નથી.", "ncert_ref": "Class XI - પ્રકરણ 7: ગતિના નિયમો", "difficulty": "Easy", "num": 1}, {"question": "એક સમાન ગોળા (uniform sphere) ને તેના કેન્દ્રથી પસાર થતી અક્ષ પરથી ઘૂમવાની છૂટ આપવામાં આવે છે. જો તેની કોણીય ઝડપ ω હોય, તો તેના પર લાગતો કોણીય સંવેગ કયો હશે?", "options": ["A) Iω", "B) Iω²", "C) 0", "D) Iα (જ્યાં α કોણીય પ્રવેગ છે)"], "correct": 3, "explanation": "કોણીય સંવેગ (τ) = Iα છે, જ્યાં I જડત્વના ચક્રીક ક્ષણ (moment of inertia) અને α કોણીય પ્રવેગ છે. સમાન ગતિમાં કોણીય ઝડપ ω સ્થિર હોય તો α = 0, પરંતુ પ્રશ્નમાં કોણીય સંવેગની વ્યાખ્યા પૂછવામાં આવી છે, જે Iα છે. A, B, અને C વિકલ્પો ખોટા છે કારણ કે તેઓ કોણીય સંવેગના સૂત્રને ખોટી રીતે વ્યાખ્યાયિત કરે છે.", "ncert_ref": "Class XI - પ્રકરણ 7: ગતિના નિયમો", "difficulty": "Medium", "num": 2}, {"question": "એક દડો દોરી સાથે બાંધીને વર્તુળ ગતિ કરાવવામાં આવે છે. જો દોરી ટૂટી જાય તો દડો કઈ દિશામાં ગતિ કરશે?", "options": ["A) વર્તુળના કેન્દ્ર તરફ", "B) વર્તુળના સ્પર્શક દિશામાં", "C) વર્તુળના વ્યાસ દિશામાં", "D) વર્તુળના કેન્દ્રથી દૂર"], "correct": 1, "explanation": "જ્યારે દોરી ટૂટી જાય છે, ત્યારે દડા પર લાગતું કેન્દ્રગામી બળ બંધ થઈ જાય છે. ન્યૂટનના પ્રથમ નિયમ મુજબ, દડો તેની તાત્કાલિક દિશામાં (સ્પર્શક દિશામાં) ગતિ કરશે. A, C, અને D વિકલ્પો ખોટા છે કારણ કે તેઓ કેન્દ્રગામી બળના અભાવમાં દડાની ગતિની દિશાને ખોટી રીતે વર્ણવે છે.", "ncert_ref": "Class XI - પ્રકરણ 7: ગતિના નિયમો", "difficulty": "Easy", "num": 3}, {"question": "એક ચક્રીક પદાર્થ પર લાગતો કોણીય સંવેગ τ = 5 Nm છે. જો તેનું જડત્વના  "ncert_ref": "ક્લાસ XI - પ્રકરણ 7: કણોની તંત્ર અને ઘૂમતી ગતિ", "difficulty": "Easy", "num": 22}, {"question": "એક સમાન ડિસ્કને તેના કેન્દ્રથી પસાર થતી અને ડિસ્કને લંબ અક્ષ પરથી ω કોણીય વેગથી ઘુમાવવામાં આવે છે. જો ડિસ્કનું દળ M અને ત્રિજ્યા R હોય, તો તેનો કોણીય સંવેગ કેટલો હશે?", "options": ["A) MR²ω/2", "B) MR²ω/4", "C) 2MR²ω/5", "D) MR²ω"], "correct": 0, "explanation": "સમાન ડિસ્કનું જડત્વની ચાકમાત્રા (I) તેના કેન્દ્રથી પસાર થતી અને ડિસ્કને લંબ અક્ષ માટે I = MR²/2 છે. કોણીય સંવેગ (L) = Iω = (MR²/2)ω = MR²ω/2. અન્ય વિકલ્પો ખોટા છે કારણ કે તેઓ જડત્વની ચાકમાત્રાના ખોટા મૂલ્યોનો ઉપયોગ કરે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 7: કણોની તંત્ર અને ઘૂમતી ગતિ", "difficulty": "Medium", "num": 23}, {"question": "એક કઠણ પદાર્થ પર કોણીય સંવેગ (τ) લાગે છે, ત્યારે નીચેનામાંથી કયો પરિબળ તેના કોણીય પ્રવેગ (α) ને નક્કી કરશે?", "options": ["A) કોણીય સંવેગ (τ) અને જડત્વનો કોણીય ઘટક (I)", "B) કોણીય સંવેગ (τ) અને પદાર્થનો દળ (m)", "C) જડત્વનો કોણીય ઘટક (I) અને પદાર્થનો આકાર", "D) કોણીય સંવેગ (τ) અને પદાર્થનો વેગ (v)"], "correct": 0, "explanation": "કોણીય પ્રવેગ (α) ને કોણીય સંવેગ (τ) અને જડત્વનો કોણીય ઘટક (I) દ્વારા નક્કી કરવામાં આવે છે, જ્યાં α = τ / I. આ સૂત્ર કોણીય સંવેગ અને જડત્વના કોણીય ઘટક વચ્ચેનો સંબંધ દર્શાવે છે. બાકીના વિકલ્પો (B, C, D) અસંબદ્ધ અથવા અપૂર્ણ પરિબળો છે. દળ (m) અથવા આકાર એકલા કોણીય પ્રવેગ નક્કી કરતાં નથી, અને વેગ (v) રેખીય ગતિ સાથે સંબંધિત છે, કોણીય ગતિ સાથે નહીં.", "ncert_ref": "Class XI - પ્રકરણ 7: કઠણ પદાર્થની ગતિ અને કોણીય સંવેગ", "difficulty": "Medium", "num": 24}, {"question": "એક કણ સમાન કોણીય વેગથી વર્તુળ ગતિ કરે છે. જો કણ પર લાગતો કોણીય સંવેગ શૂન્ય હોય, તો નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) કણનો રેખીય વેગ સતત બદલાતો રહે છે.", "B) કણનો કોણીય વેગ સતત બદલાતો રહે છે.", "C) કણનો કોણીય સંવેગ સતત બદલાતો રહે છે.", "D) કણનો કોણીય પ્રવેગ શૂન્ય હોય છે."], "correct": 3, "explanation": "કોણીય સંવેગ (τ) = I × α, જ્યાં I જડત્વનો કોણીય ઘટક અને α કોણીય પ્રવેગ છે. જો τ = 0 હોય, તો α = 0 (I શૂન્ય નથી હોતું). અર્થાત કોણીય પ્રવેગ શૂન્ય હોય છે. રેખીય વેગની દિશા બદલાતી રહે છે, પરંતુ મૂલ્ય સમાન રહે છે. કોણીય વેગ સમાન રહે છે, કોણીય સંવેગ શૂન્ય છે, અને કોણીય પ્રવેગ શૂન્ય છે. આથી D સાચું છે.", "ncert_ref": "Class XI - પ્રકરણ 7: ગતિના નિયમો", "difficulty": "Easy", "num": 25}, {"question": "નીચેનામાંથી કયું વિધાન કોણીય સંવેગ અને રેખીય સંવેગ વચ્ચેના સંબંધ વિશે સાચું છે?", "options": ["A) કોણીય સંવેગ = રેખીય સંવેગ × અંતર", "B) કોણીય સંવેગ = રેખીય સંવેગ × લંબ અંતર", "C) કોણીય સંવેગ = રેખીય સંવેગ / લંબ અંતર", "D) કોણીય સંવેગ = રેખીય સંવેગ + લંબ અંતર"], "correct": 1, "explanation": "કોણીય સંવેગ (τ) = r × F, જ્યાં r લંબ અંતર (પરિભ્રમણ અક્ષથી લાગુ બળના બિંદુ સુધીનું લંબ અંતર) અને F રેખીય બળ છે. આથી τ = F × r (જ્યારે r અને F લંબ હોય). બાકીના વિકલ્પો ભૌતિક રીતે અયોગ્ય છે.", "ncert_ref": "Class XI - પ્રકરણ 7: ગતિના નિયમો", "difficulty": "Medium", "num": 26}, {"question": "એક કણ વર્તુળાકાર માર્ગ પર ગતિ કરે છે અને તેનો રેખીય વેગ v છે. જો વર્તુળની ત્રિજ્યા r હોય, તો કણનો કોણીય સંવેગ કયા સૂત્રથી દર્શાવી શકાય? (કણનું દળ m છે)", "options": ["A) L = mvr", "B) L = mv/r", "C) L = mr²ω", "D) A અને C બંને સાચાં છે"], "correct": 3, "explanation": "કોણીય સંવેગ (L) = રેખીય સંવેગ (p) × ત્રિજ્યા (r) = mvr. તે જ રીતે, કોણીય વેગ ω = v/r હોવાથી, L = mr²ω પણ સાચું છે. તેથી વિકલ્પ A અને C બંને સાચાં છે. વિકલ્પ B ખોટો છે કારણ કે તે કોણીય વેગનું સૂત્ર છે, કોણીય સંવેગનું નહીં.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 7: કણોની તંત્ર અને ઘૂમતી ગતિ", "difficulty": "Hard", "num": 27}, {"question": "એક કણ સમાન કોણીય પ્રવેગથી પરિભ્રમણ ગતિ કરે છે. જો કણ પર લાગતો કોણીય સંવેગ 4 Nm અને તેનું જડત્વનું કોણીય ઘટક 2 kg·m² હોય, તો કણનો કોણીય પ્રવેગ કેટલો હશે?", "options": ["A) 2 rad/s²", "B) 0.5 rad/s²", "C) 8 rad/s²", "D) 1 rad/s²"], "correct": 0, "explanation": "કોણીય સંવેગ (τ) = જડત્વનું કોણીય ઘટક (I) × કોણીય પ્રવેગ (α). અહીં τ = 4 Nm અને I = 2 kg·m² આપેલ છે. સૂત્ર મુજબ, α = τ / I = 4 / 2 = 2 rad/s². આથી, A વિકલ્પ સાચો છે. B વિકલ્પ ખોટો છે કારણ કે તે τ અને I ના ગુણોત્તરનો વ્યસ્ત છે. C વિકલ્પ ખોટો છે કારણ કે તે τ અને I ના ગુણનફળ છે. D વિકલ્પ ખોટો છે કારણ કે તે τ અને I ના તફાવતને દર્શાવે છે.", "ncert_ref": "Class XI - પ્રકરણ 7: કણોની વર્તુળ ગતિ", "difficulty": "Easy", "num": 28}, {"question": "નીચેનામાંથી કયું વિધાન કોણીય સંવેગ અને પરિભ્રમણ ગતિ વિશે સાચું છે?", "options": ["A) કોણીય સંવેગ એ સદિશ રાશિ છે અને તે પરિભ્રમણ અક્ષની દિશામાં લંબરૂપ હોય છે.", "B) કોણીય સંવેગ એ અદિશ રાશિ છે અને તે કોણીય વેગના સમપ્રમાણમાં હોય છે.", "C) કોણીય સંવેગ એ સદિશ રાશિ છે અને તે કોણીય વેગની દિશામાં હોય છે.", "D) કોણીય સંવેગ એ અદિશ રાશિ છે અને તે જડત્વના કોણીય ઘટકના વ્યસ્ત પ્રમાણમાં હોય છે."], "correct": 0, "explanation": "કોણીય સંવેગ (τ) એ સદિશ રાશિ છે અને તે પરિભ્રમણ અક્ષની દિશામાં લંબરૂપ હોય છે (જમણા હાથના નિયમ મુજબ). આથી, A વિકલ્પ સાચો છે. B વિકલ્પ ખોટો છે કારણ કે કોણીય સંવેગ સદિશ રાશિ છે, અદિશ નહીં. C વિકલ્પ ખોટો છે કારણ કે કોણીય સંવેગ કોણીય વેગની દિશામાં નહીં, પરંતુ લંબરૂપ હોય છે. D વિકલ્પ ખોટો છે કારણ કે કોણીય સંવેગ સદિશ રાશિ છે અને જડત્વના કોણીય ઘટકના સમપ્રમાણમાં હોય છે, વ્યસ્ત પ્રમાણમાં નહીં.", "ncert_ref": "Class XI - પ્રકરણ 7: કણોની વર્તુળ ગતિ", "difficulty": "Medium", "num": 29}, {"question": "એક બરફ પર સ્કેટિંગ કરતી વ્યક્તિ પોતાના હાથ અંદર ખેંચે છે ત્યારે તેની પરિભ્રમણ ગતિની ઝડપ વધે છે. આ ઘટના કયા સિદ્ધાંત પર આધારિત છે?", "options": ["A) રેખીય સંવેગના સંરક્ષણનો સિદ્ધાંત", "B) કોણીય સંવેગના સંરક્ષણનો સિદ્ધાંત", "C) ઊર્જાના સંરક્ષણનો સિદ્ધાંત", "D) ન્યૂટનનો ગતિનો બીજો નિયમ"], "correct": 1, "explanation": "જ્યારે વ્યક્તિ પોતાના હાથ અંદર ખેંચે છે, ત્યારે તેનું જડત્વની ચાકમાત્રા (I) ઘટે છે. કોણીય સંવેગ (L = Iω) સંરક્ષિત રહે છે, તેથી ω (કોણીય વેગ) વધે છે. આ કોણીય સંવેગના સંરક્ષણના સિદ્ધાંત પર આધારિત છે. બાકીના વિકલ્પો આ ઘટનાનું યોગ્ય સમજૂતી આપતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 7: કણોની તંત્ર અને પરિભ્રમણ ગતિ", "difficulty": "Easy", "num": 30}, {"question": "એક કણ વર્તુળાકાર માર્ગ પર ગતિ કરે છે અને તેનો કોણીય સંવેગ L છે. જો કણનો રેખીય વેગ v અને વર્તુળની ત્રિજ્યા r હોય, તો L નું મૂલ્ય કયા સૂત્રથી દર્શાવી શકાય?", "options": ["A) L = mvr", "B) L = mv/r", "C) L = mr²v", "D) L = mv²/r"], "correct": 0, "explanation": "કોણીય સંવેગ L = r × p, જ્યાં p = mv (રેખીય સંવેગ) છે. વર્તુળાકાર ગતિમાં, r અને p લંબ હોય છે, તેથી L = mvr થાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે તેમાં સૂત્રનો ઉપયોગ ખોટો છે અથવા એકમો મેળ ખાતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 7: કણોની તંત્ર અને પરિભ્રમણ ગતિ", "difficulty": "Medium", "num": 31}, {"question": "એક કઠણ પદાર્થ પર લાગતો કોણીય સંવેગ (τ) અને કોણીય પ્રવેગ (α) વચ્ચેનો સંબંધ કયો છે?", "options": ["A) τ = Iα", "B) τ = I/α", "C) τ = α/I", "D) τ = I + α"], "correct": 0, "explanation": "કઠણ પદાર્થ માટે, કોણીય સંવેગ (τ) અને કોણીય પ્રવેગ (α) વચ્ચેનો સંબંધ τ = Iα છે, જ્યાં I જડત્વની ચાકમાત્રા છે. આ ન્યૂટનના ગતિના બીજા નિયમનો પરિભ્રમણ ગતિ માટેનો સ્વરૂપ છે. બાકીના વિકલ્પો ખોટા છે કારણ કે તેમાં સંબંધ ખોટો દર્શાવવામાં આવ્યો છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 7: કણોની તંત્ર અને પરિભ્રમણ ગતિ", "difficulty": "Easy", "num": 32}, {"question": "એક બરફ પર સ્કેટિંગ કરતી વ્યક્તિ પોતાના હાથ ફેલાવીને ω₁ કોણીય વેગથી પરિભ્રમણ કરી રહી છે. જો તે પોતાના હાથ અંદર ખેંચે તો તેનો કોણીય વેગ ω₂ થાય છે. નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) ω₂ > ω₁ કારણ કે કોણીય સંવેગ સંરક્ષિત રહે છે અને જડત્વની ચાકમાત્રા ઘટે છે.", "B) ω₂ < ω₁ કારણ કે કોણીય સંવેગ સંરક્ષિત રહે છે અને જડત્વની ચાકમાત્રા વધે છે.", "C) ω₂ = ω₁ કારણ કે કોણીય સંવેગ અને જડત્વની ચાકમાત્રા બંને અચળ રહે છે.", "D) ω₂ > ω₁ કારણ કે બાહ્ય બળ આઘાત લાગે છે અને કોણીય સંવેગ વધે છે."], "correct": 0, "explanation": "કોણીય સંવેગ સંરક્ષણના નિયમ અનુસાર, જો બાહ્ય ટૉર્ક ન હોય તો કોણીય સંવેગ અચળ રહે છે. જ્યારે વ્યક્તિ હાથ અંદર ખેંચે છે, ત્યારે તેની જડત્વની ચાકમાત્રા ઘટે છે, જેના કારણે કોણીય વેગ વધે છે (L = Iω). તેથી ω₂ > ω₁ થાય છે. વિકલ્પ A સાચો છે. અન્ય વિકલ્પો ખોટા છે કારણ કે તેઓ કોણીય સંવેગ સંરક્ષણના સિદ્ધાંતનું ખોટું અર્થઘટન કરે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 7: કણોની તંત્ર અને પરિભ્રમણ ગતિ", "difficulty": "Hard", "num": 33}, {"question": "એક કણ વર્તુળાકાર માર્ગ પર ગતિ કરે છે અને તેનો કોણીય વેગ ω છે. જો કણ પર લાગતો કોણીય સંવેગ શૂન્ય હોય, તો નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) કણનો કોણીય વેગ સતત રહેશે", "B) કણનો કોણીય વેગ ઘટશે", "C) કણનો કોણીય વેગ             const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
