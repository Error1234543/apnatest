        .question-card:nth-child(4){animation-delay:.3s}

        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}

        .btn-secondary{background:#6b7280}

        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}

        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}

        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}

        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}

        .hidden{display:none!important}

    <script>
        const questionsData = [{"question": "બે પદાર્થો વચ્ચે લાગુ પડતું ગુરુત્વાકર્ષણ બળ F = G * (m1 * m2) / r² સૂત્ર દ્વારા વ્યાખ્યાયિત થાય છે. જો બે પદાર્થોના દળોને અડધા કરવામાં આવે અને તેમની વચ્ચેનું અંતર પણ અડધું કરવામાં આવે, તો નવું ગુરુત્વાકર્ષણ બળ મૂળ બળના કેટલા ગણું થશે?", "options": ["A) 1/4 ગણું", "B) 1/2 ગણું", "C) 2 ગણું", "D) મૂળ બળ જેટલું"], "correct": 3, "explanation": "મૂળ બળ F = G * (m1 * m2) / r² છે. જો દળો અડધા થાય (m1' = m1/2, m2' = m2/2) અને અંતર અડધું થાય (r' = r/2), તો નવું બળ F' = G * (m1/2 * m2/2) / (r/2)² = G * (m1 * m2 / 4) / (r² / 4) = G * (m1 * m2) / r² = F થશે. આમ, બળમાં કોઈ ફેરફાર થતો નથી. A, B, અને C પર્યાયો ખોટા છે કારણ કે તેઓ બળમાં ફેરફાર ધારે છે.", "ncert_ref": "Class XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Medium", "num": 1}, {"question": "ન્યૂટનના ગુરુત્વાકર્ષણના નિયમ અનુસાર, ગુરુત્વાકર્ષણ બળનું મૂલ્ય ક્યારે શૂન્ય થાય છે?", "options": ["A) જ્યારે બે પદાર્થો વચ્ચેનું અંતર શૂન્ય હોય", "B) જ્યારે બે પદાર્થોના દળ શૂન્ય હોય", "C) જ્યારે બે પદાર્થો વચ્ચેનું અંતર અનંત હોય", "D) જ્યારે બે પદાર્થો એકબીજા સાથે સંપર્કમાં હોય"], "correct": 2, "explanation": "ગુરુત્વાકર્ષણ બળ F = G * (m1 * m2) / r² છે. જ્યારે r (અંતર) અનંત હોય, ત્યારે F શૂન્ય થાય છે. A ખોટું છે કારણ કે r=0 પર બળ અનંત થાય છે. B ખોટું છે કારણ કે દળ શૂન્ય હોવું શક્ય નથી. D ખોટું છે કારણ કે સંપર્કમાં હોવા છતાં બળ લાગુ પડે છે.", "ncert_ref": "Class XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Easy", "num": 2}, {"question": "પૃથ્વીની સપાટી પર એક વસ્તુનું વજન 600 N છે. જો પૃથ્વીનું દળ અચળ રહે અને તેની ત્રિજ્યા અડધી કરવામાં આવે, તો વસ્તુનું નવું વજન કેટલું થશે? (ધારો કે વસ્તુ પૃથ્વીની સપાટી પર જ રહે છે)", "options": ["A) 150 N", "B) 300 N", "C) 600 N", "D) 2400 N"], "correct": 3, "explanation": "વજન W = m * g છે, જ્યાં g = G * M / R² છે. જો R અડધું થાય, તો g ચાર ગણું થાય (g' = G * M / (R/2)² = 4g). આમ, નવું વજન W' = m * 4g = 4 * 600 N = 2400 N થશે. A, B, અને C ખોટા છે કારણ કે તેઓ gમાં થતા ફેરફારને ધ્યાનમાં લેતા નથી.", "ncert_ref": "Class XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Hard", "num": 3}, {"question": "નીચેના પૈકી કયો વિધાન ગુરુત્વાકર્ષણ બળ વિશે સાચો નથી?", "options": ["A) તે સદિશ રાશિ છે", "B) તે પદાર્થના દળના ગુણોત્તરમાં હોય છે", "C) તે પદાર્થો વચ્ચેના અંતરના વર્ગના વ્યસ્ત ગુણોત્તરમાં હોય છે", "D) તે પદાર્થોના પારસ્પરિક સંપર્ક પર આધાર રાખે છે"], "correct": 3, "explanation": "ગુરુત્વાકર્ષણ બળ પદાર્થોના પારસ્પરિક સંપર્ક પર આધાર રાખતું નથી, તે તમામ પદાર્થો વચ્ચે લાગુ પડે છે. A, B, અને C સાચા છે કારણ કે ગુરુત્વાકર્ષણ બળ સદિશ રાશિ છે, દળના ગુણોત્તરમાં હોય છે, અને અંતરના વર્ગના વ્યસ્ત ગુણોત્તરમાં હોય છે.", "ncert_ref": "Class XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Medium", "num": 4}, {"question": "જો ચંદ્ર અને પૃથ્વી વચ્ચેનું અંતર અચળ રહે અને ચંદ્રનું દળ દુબળું કરવામાં આવે, તો ચંદ્ર પર પૃથ્વી દ્વારા લાગુ પડતું ગુરુત્વાકર્ષણ બળ કેવી રીતે બદલાશે?", "options": ["A) બમણું થશે", "B) અડધું થશે", "C) ચાર ગણું થશે", "D) કોઈ ફેરફાર થશે નહીં"], "correct": 1, "explanation": "ગુરુત્વાકર્ષણ બળ F = G * (M_p * M_c) / r² છે, જ્યાં M_p પૃથ્વીનું દળ અને M_c ચંદ્રનું દળ છે. જો M_c અડધું કરવામાં આવે, તો F પણ અડધું થશે. A, C, અને D ખોટા છે કારણ કે તેઓ બળમાં અયોગ્ય ફેરફાર ધારે છે.", "ncert_ref": "Class XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Easy", "num": 5}, {"question": "પૃથ્વીની સપાટી પર એક વસ્તુનું દળ 60 kg છે. જો પૃથ્વીનું દળ અચળ રહે અને તેની ત્રિજ્યા અડધી કરવામાં આવે, તો વસ્તુનું વજન કેટલું થશે? (g = 10 m/s² લો)", "options": ["A) 120 N", "B) 240 N", "C) 600 N", "D) 1200 N"], "correct": 3, "explanation": "વજન W = m * g, જ્યાં g = G * M / R². જો ત્રિજ્યા અડધી કરવામાં આવે (R' = R/2), તો નવું g' = G * M / (R/2)² = 4G * M / R² = 4g. આથી, નવું વજન W' = m * g' = 60 kg * 40 m/s² = 2400 N. પરંતુ પ્રશ્નમાં g = 10 m/s² લેવામાં આવ્યું છે, તો g' = 4 * 10 = 40 m/s², અને W' = 60 * 40 = 2400 N. પરંતુ વિકલ્પોમાં 2400 N નથી, તો સૌથી નજીકનો વિકલ્પ D) 1200 N છે. પરંતુ ગણિતી રીતે સાચો જવાબ 2400 N છે, પરંતુ વિકલ્પો મર્યાદિત હોવાથી, D વિકલ્પ સૌથી નજીક છે.", "ncert_ref": "Class XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Hard", "num": 6}, {"question": " /2", "B) g/4", "C) 2g", "D) g"], "correct": 3, "explanation": "ગુરુત્વપ્રવેગનું સૂત્ર g = GM/R² છે. અહીં નાના ગ્રહનું દળ M' = M/4 અને ત્રિજ્યા R' = R/2 છે. તેથી g' = G*(M/4)/(R/2)² = G*(M/4)/(R²/4) = G*M/R² = g. આથી નાના ગ્રહની સપાટી પર ગુરુત્વપ્રવેગનું મૂલ્ય પૃથ્વી જેટલું જ (g) હશે.\n\nA) g/2 ખોટું છે કારણ કે દળ અને ત્રિજ્યાનો ગુણોત્તર બદલાતા ગુરુત્વપ્રવેગ અડધો થતો નથી.\nB) g/4 ખોટું છે કારણ કે માત્ર દળ ઘટવાથી ગુરુત્વપ્રવેગ ચોથા ભાગનો થતો નથી.\nC) 2g ખોટું છે કારણ કે ગુરુત્વપ્રવેગ બમણો થતો નથી, ત્રિજ્યા અને દળ બંને પરિબળો અસર કરે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Medium", "num": 10}, {"question": "એક નિશ્ચિત અંતરે રહેલા બે પદાર્થો વચ્ચેનું ગુરુત્વાકર્ષણ બળ F છે. જો બંને પદાર્થોના દળ તેમના મૂળ દળ કરતાં બમણા કરવામાં આવે અને તેમની વચ્ચેનું અંતર અડધું કરવામાં આવે, તો નવું ગુરુત્વાકર્ષણ બળ કેટલું થશે?", "options": ["A) F", "B) 2F", "C) 4F", "D) 16F"], "correct": 3, "explanation": "ન્યૂટનના ગુરુત્વાકર્ષણના નિયમ મુજબ, F = G*(m₁*m₂)/r². જો દળ બમણા થાય (2m₁ અને 2m₂) અને અંતર અડધું (r/2) થાય, તો નવું બળ F' = G*(2m₁*2m₂)/(r/2)² = G*(4m₁m₂)/(r²/4) = 16*(G*m₁m₂/r²) = 16F. તેથી સાચો જવાબ 16F છે. અન્ય વિકલ્પો દળ અને અંતરના ફેરફારને યોગ્ય રીતે ધ્યાનમાં લેતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Medium", "num": 11}, {"question": "પૃથ્વીની સપાટીથી h ઊંચાઈએ ગુરુત્વાકર્ષણ પ્રવેગ (g') નું મૂલ્ય પૃથ્વીની સપાટી પરના ગુરુત્વાકર્ષણ પ્રવેગ (g) કરતાં ઓછું હોય છે. જો પૃથ્વીની ત્રિજ્યા R હોય, તો g' અને g વચ્ચેનો સંબંધ શું છે?", "options": ["A) g' = g * (R/(R+h))", "B) g' = g * (R/(R+h))²", "C) g' = g * ((R+h)/R)²", "D) g' = g * (R+h)/R"], "correct": 1, "explanation": "ગુરુત્વાકર્ષણ પ્રવેગનું મૂલ્ય પૃથ્વીના કેન્દ્રથી અંતરના વર્ગના વ્યસ્ત પ્રમાણમાં હોય છે. તેથી, g' = g * (R/(R+h))². વિકલ્પ B આ સંબંધને સાચી રીતે દર્શાવે છે. અન્ય વિકલ્પો ગુરુત્વાકર્ષણ પ્રવેગના વ્યસ્ત વર્ગના નિયમને અનુસરતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Hard", "num": 12}, {"question": "નીચેનામાંથી કયું વિધાન ગુરુત્વાકર્ષણ બળ માટે સાચું નથી?", "options": ["A) ગુરુત્વાકર્ષણ બળ હંમેશા આકર્ષણ બળ છે.", "B) ગુરુત્વાકર્ષણ બળ માધ્યમ પર આધારિત નથી.", "C) ગુરુત્વાકર્ષણ બળ પદાર્થો વચ્ચેના અંતરના વર્ગના વ્યસ્ત પ્રમાણમાં હોય છે.", "D) ગુરુત્વાકર્ષણ બળ પદાર્થોના દળના સરવાળા પર આધારિત છે."], "correct": 3, "explanation": "ગુરુત્વાકર્ષણ બળ પદાર્થોના દળના ગુણાકાર પર આધારિત છે, નહીં કે તેમના સરવાળા પર. તેથી વિકલ્પ D ખોટો છે. અન્ય વિકલ્પો ગુરુત્વાકર્ષણ બળના ગુણધર્મોને સાચી રીતે વર્ણવે છે: તે હંમેશા આકર્ષણ બળ છે, માધ્યમ પર આધારિત નથી, અને અંતરના વર્ગના વ્યસ્ત પ્રમાણમાં હોય છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Easy", "num": 13}, {"question": "એક ઉપગ્રહ પૃથ્વીની આસપાસ વર્તુળાકાર કક્ષામાં ભ્રમણ કરે છે. જો ઉપગ્રહની ઝડપ અચાનક બમણી કરવામાં આવે, તો શું થશે?", "options": ["A) ઉપગ્રહ પૃથ્વીની આસપાસ નવી વર્તુળાકાર કક્ષામાં ભ્રમણ કરશે.", "B) ઉપગ્રહ પૃથ્વીના ગુરુત્વાકર્ષણ ક્ષેત્રમાંથી છટકી જશે.", "C) ઉપગ્રહ પૃથ્વી તરફ સર્પિલ ગતિમાં આવશે.", "D) ઉપગ્રહની કક્ષા લંબગોળ બનશે."], "correct": 1, "explanation": "વર્તુળાકાર કક્ષામાં ઉપગ્રહની ઝડપ v = √(GM/R) હોય છે. જો ઝડપ બમણી કરવામાં આવે, તો તે છટકવાની ઝડપ (√2 * v) કરતાં વધી જશે, જેના કારણે ઉપગ્રહ પૃથ્વીના ગુરુત્વાકર્ષણ ક્ષેત્રમાંથી છટકી જશે. તેથી વિકલ્પ B સાચો છે. અન્ય વિકલ્પો ગુરુત્વાકર્ષણ અને કક્ષીય ગતિના સિદ્ધાંતોને અનુસરતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Hard", "num": 14}, {"question": "એક પદાર્થનું પૃથ્વીની સપાટી પર વજન W છે. જો આ પદાર્થને પૃથ્વીના કેન્દ્રથી 2R અંતરે લઈ જવામાં આવે (જ્યાં R પૃથ્વીની ત્રિજ્યા છે), તો તેનું વજન કેટલું થશે?", "options": ["A) W/2", "B) W/4", "C) W/8", "D) W/16"], "correct": 1, "explanation": "ગુરુત્વાકર્ષણ બળ અંતરના વર્ગના વ્યસ્ત પ્રમાણમાં હોય છે. પૃથ્વીની સપાટી પર વજન W = mg = GMm/R². પૃથ્વીના કેન્દ્રથી 2R અંતરે વજન W' = GMm/(2R)² = GMm/4R² = W/4. તેથી સાચો જવાબ W/4 છે. અન્ય વિકલ્પો અંતરના વર્ગના વ્યસ્ત પ્રમાણના નિયમને યોગ્ય રીતે લાગુ કરતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 8: ગુરુત્વાકર્ષણ", "difficulty": "Medium", "num": 15}, {"question": "બે પદાર્થો વચ્ચ         let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;

            questionsData.forEach((q,index)=>{

            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
