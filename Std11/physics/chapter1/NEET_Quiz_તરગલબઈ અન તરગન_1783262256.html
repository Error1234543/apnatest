<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - તરંગલંબાઈ અને તરંગની ઝડપ – તરંગના મૂળભૂત ગુણધર્મો.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 તરંગલંબાઈ અને તરંગની ઝડપ – તરંગના મૂળભૂત ગુણધર્મો.</span>
                <span>🎯 Mixed</span>
                <span>📝 50 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "એક સ્થિત-તરંગમાં બે ક્રમિક પ્રસ્પંદો વચ્ચેનું અંતર ૨૦ સેમી છે. જો તરંગની આવૃત્તિ ૪૦૦ હર્ટ્ઝ હોય, તો તરંગની ઝડપ કેટલી હશે?", "options": ["A) ૮૦ મી/સે", "B) ૧૬૦ મી/સે", "C) ૩૨૦ મી/સે", "D) ૪૦૦ મી/સે"], "correct": 1, "explanation": "સ્થિત-તરંગમાં બે ક્રમિક પ્રસ્પંદો વચ્ચેનું અંતર λ/૨ હોય છે. અહીં λ/૨ = ૨૦ સેમી ⇒ λ = ૪૦ સેમી = ૦.૪ મી. તરંગની ઝડપ v = f × λ = ૪૦૦ × ૦.૪ = ૧૬૦ મી/સે. વિકલ્પ A ખોટો છે કારણ કે λ ને અડધું ગણ્યું છે. વિકલ્પ C અને D માં λ ની ખોટી ગણતરી કરેલ છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ ૧૫: તરંગો", "difficulty": "Medium", "num": 1}, {"question": "એક તરંગની તરંગલંબાઈ ૦.૫ મીટર અને આવૃત્તિ ૬૦૦ હર્ટ્ઝ છે. જો માધ્યમ બદલાતાં તરંગની ઝડપ બમણી થાય, તો નવી તરંગલંબાઈ કેટલી થશે? (આવૃત્તિ અચળ રહે છે)", "options": ["A) ૦.૨૫ મીટર", "B) ૦.૫ મીટર", "C) ૧.૦ મીટર", "D) ૨.૦ મીટર"], "correct": 2, "explanation": "પ્રારંભિક ઝડપ v = f × λ = ૬૦૦ × ૦.૫ = ૩૦૦ મી/સે. નવી ઝડપ v' = ૨v = ૬૦૦ મી/સે. આવૃત્તિ અચળ હોવાથી λ' = v'/f = ૬૦૦/૬૦૦ = ૧.૦ મીટર. વિકલ્પ A માં ઝડપ અડધી ગણી છે. વિકલ્પ B માં કોઈ ફેરફાર નથી દર્શાવ્યો. વિકલ્પ D માં ઝડપ ચાર ગણી ગણી છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ ૧૫: તરંગો", "difficulty": "Medium", "num": 2}, {"question": "નીચેનાં વિધાનો ધ્યાનમાં લો:\n(૧) તરંગની ઝડપ માધ્યમના ગુણધર્મો પર આધારિત છે.\n(૨) તરંગની આવૃત્તિ માધ્યમ બદલાતાં બદલાય છે.\n(૩) તરંગલંબાઈ માધ્યમ બદલાતાં બદલાય છે.\nઉપરોક્ત વિધાનોમાંથી કયાં સાચાં છે?", "options": ["A) ફક્ત ૧ અને ૨", "B) ફક્ત ૧ અને ૩", "C) ફક્ત ૨ અને ૩", "D) ૧, ૨ અને ૩"], "correct": 1, "explanation": "વિધાન ૧ સાચું છે કારણ કે તરંગની ઝડપ માધ્યમના ગુણધર્મો પર આધાર રાખે છે. વિધાન ૨ ખોટું છે કારણ કે આવૃત્તિ સ્રોત પર આધારિત છે અને માધ્યમ બદલાતાં બદલાતી નથી. વિધાન ૩ સાચું છે કારણ કે તરંગલંબાઈ ઝડપ અને આવૃત્તિ પર આધારિત છે, તેથી માધ્યમ બદલાતાં બદલાય છે. આથી સાચો જવાબ ફક્ત ૧ અને ૩ છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ ૧૫: તરંગો", "difficulty": "Hard", "num": 3}, {"question": "એક તરંગની તરંગલંબાઈ λ અને આવૃત્તિ f છે. જો તરંગની ઝડપ અચળ રહે અને આવૃત્તિ બમણી કરવામાં આવે, તો નવી તરંગલંબાઈ કેટલી થશે?", "options": ["A) λ/૨", "B) λ", "C) ૨λ", "D) ૪λ"], "correct": 0, "explanation": "તરંગની ઝડપ v = f × λ. જો આવૃત્તિ બમણી થાય (f' = ૨f) અને ઝડપ અચળ રહે, તો નવી તરંગલંબાઈ λ' = v/f' = (f × λ)/(૨f) = λ/૨. વિકલ્પ B માં કોઈ ફેરફાર નથી દર્શાવ્યો. વિકલ્પ C અને D માં ખોટી ગણતરી કરેલ છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ ૧૫: તરંગો", "difficulty": "Easy", "num": 4}, {"question": "એક તરંગની ઝડપ ૩૪૦ મી/સે છે. જો તેની તરંગલંબાઈ ૧.૭ મીટર હોય, તો તેની આવૃત્તિ કેટલી હશે? આ તરંગ કયા પ્રકારનું હોઈ શકે?", "options": ["A) ૨૦ હર્ટ્ઝ, ધ્વનિ તરંગ", "B) ૨૦૦ હર્ટ્ઝ, ધ્વનિ તરંગ", "C) ૨૦૦ હર્ટ્ઝ, પ્રકાશ તરંગ", "D) ૨૦ હર્ટ્ઝ, પ્રકાશ તરંગ"], "correct": 1, "explanation": "આવૃત્તિ f = v/λ = ૩૪૦/૧.૭ = ૨૦૦ હર્ટ્ઝ. ધ્વનિ તરંગોની ઝડપ હવામાં લગભગ ૩૪૦ મી/સે હોય છે, તેથી આ તરંગ ધ્વનિ તરંગ હોઈ શકે. વિકલ્પ A માં આવૃત્તિ ખોટી ગણી છે. વિકલ્પ C અને D માં પ્રકાશ તરંગની ઝડપ ખૂબ જ વધારે હોય છે, તેથી ખોટા છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ ૧૫: તરંગો", "difficulty": "Medium", "num": 5}, {"question": "એક અવકાશી તરંગ (વિદ્યુતચુંબકીય તરંગ) ની તરંગલંબાઈ ૫૦૦ નેનોમીટર છે. આ તરંગની આવૃત્તિ કેટલી હશે? (પ્રકાશની ઝડપ = ૩ × ૧૦⁸ મી/સે)", "options": ["A) ૬ × ૧૦¹⁴ હર્ટ્ઝ", "B) ૬ × ૧૦¹² હર્ટ્ઝ", "C) ૬ × ૧૦¹૦ હર્ટ્ઝ", "D) ૬ × ૧૦⁸ હર્ટ્ઝ"], "correct": 0, "explanation": "તરંગની ઝડપ (v) = તરંગલંબાઈ (λ) × આવૃત્તિ (f). અહીં, v = 3 × 10⁸ મી/સે અને λ = 500 nm = 500 × 10⁻⁹ મી = 5 × 10⁻⁷ મી. આથી, f = v/λ = (3 × 10⁸)/(5 × 10⁻⁷) = 6 × 10¹⁴ હર્ટ્ઝ. વિકલ્પ A સાચો છે. વિકલ્પ B, C, અને D ગણતરીમાં ચૂકવણીને કારણે ખોટા છે.", "ncert_ref": "Class XII - Chapter 10: તરંગ પ્રકાશશાસ્ત્ર", "difficulty": "Easy", "num": 6}, {"question": "નીચેનામાંથી કયો તરંગ માધ્યમમાં પ્રસરણ માટે માધ્યમની યાંત્રિક ગુણધર્મો પર આધાર રાખતો નથી?", "options": ["A) ધ્વનિ તરંગ", "B) પ્રકાશ તરંગ", "C) પાણીના લહેર", "D) સ્પ્રિંગમાં ઉત્પન્ન થતો તરંગ"], "correct": 1, "explanation": "પ્રકાશ તરંગ (વિદ્યુતચુંબકીય તરંગ) એ વિકિરણ તરંગ છે જે માધ્યમની યાંત્રિક ગુણધર્મો પર આધાર રાખતો નથી. તે નિર્વાતમાં પણ પ્રસરણ પામે છે. ધ્વનિ તરંગ, પાણીના લહેર, અને સ્પ્રિંગમાં ઉત્પન્ન થતો તરંગ એ યાંત્રિક તરંગ છ  "explanation": "યાંત્રિક તરંગો (જેમ કે ધ્વનિ તરંગો) માટે માધ્યમની જરૂર પડે છે, કારણ કે તેઓ માધ્યમના કણોના કંપન દ્વારા પ્રસરે છે. વિદ્યુતચુંબકીય તરંગો (જેમ કે પ્રકાશ) માટે માધ્યમની જરૂર પડતી નથી, કારણ કે તેઓ ખાલી જગ્યામાં પણ પ્રસરી શકે છે. તેથી બંને વિધાનો સાચા છે.", "ncert_ref": "Class XI - Chapter 15: તરંગો", "difficulty": "Medium", "num": 38}, {"question": "એક તરંગની તરંગલંબાઈ 400 nm છે અને તેની ઝડપ 3 × 10⁸ m/s છે. જો આ તરંગની આવૃત્તિ કેટલી હશે?", "options": ["A) 7.5 × 10¹⁴ Hz", "B) 6.5 × 10¹⁴ Hz", "C) 8.5 × 10¹⁴ Hz", "D) 5.5 × 10¹⁴ Hz"], "correct": 0, "explanation": "તરંગની આવૃત્તિ (f) = ઝડપ (v) / તરંગલંબાઈ (λ). અહીં, v = 3 × 10⁸ m/s અને λ = 400 nm = 400 × 10⁻⁹ m. તેથી, f = (3 × 10⁸) / (400 × 10⁻⁹) = 7.5 × 10¹⁴ Hz. બાકીના વિકલ્પો (B, C, D) ગણિતી રીતે અયોગ્ય છે.", "ncert_ref": "Class XI - Chapter 15: તરંગો", "difficulty": "Easy", "num": 39}, {"question": "એક તરંગ એક માધ્યમમાંથી બીજા માધ્યમમાં પ્રવેશે છે, જ્યાં તેની ઝડપ બદલાય છે પરંતુ આવૃત્તિ અચળ રહે છે. નીચેનામાંથી કયું વિધાન આ પરિસ્થિતિ માટે સાચું છે?", "options": ["A) તરંગલંબાઈ અચળ રહે છે કારણ કે આવૃત્તિ અચળ છે.", "B) તરંગલંબાઈ બદલાય છે કારણ કે ઝડપ બદલાય છે, પરંતુ આવૃત્તિ અચળ રહે છે.", "C) તરંગલંબાઈ અને ઝડપ બંને બદલાય છે કારણ કે માધ્યમ બદલાય છે.", "D) તરંગલંબાઈ અને આવૃત્તિ બંને બદલાય છે કારણ કે ઝડપ બદલાય છે."], "correct": 1, "explanation": "તરંગની ઝડપ (v) અને તરંગલંબાઈ (λ) વચ્ચેનો સંબંધ v = fλ દ્વારા આપવામાં આવે છે, જ્યાં f આવૃત્તિ છે. જ્યારે તરંગ એક માધ્યમમાંથી બીજા માધ્યમમાં પ્રવેશે છે, ત્યારે તેની આવૃત્તિ અચળ રહે છે કારણ કે તે તરંગના સ્રોત પર આધારિત છે. જો કે, ઝડપ માધ્યમના ગુણધર્મો પર આધારિત છે, તેથી ઝડપ બદલાતાં તરંગલંબાઈ પણ બદલાય છે. આથી વિકલ્પ B સાચો છે. વિકલ્પ A ખોટો છે કારણ કે તરંગલંબાઈ અચળ રહેતી નથી. વિકલ્પ C ખોટો છે કારણ કે આવૃત્તિ અચળ રહે છે. વિકલ્પ D ખોટો છે કારણ કે આવૃત્તિ બદલાતી નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 15: તરંગો", "difficulty": "Medium", "num": 40}, {"question": "એક સ્થિત-તરંગ એક તાર પર રચાય છે જેમાં તારની લંબાઈ ૯૦ સેમી છે અને તેમાં ૩ પૂર્ણ સ્પંદો ઉત્પન્ન થાય છે. આ તરંગની તરંગલંબાઈ ક : 43}, {"question": "એક તરંગની તરંગલંબાઈ ૦.૪ મીટર અને આવૃત્તિ ૫૦૦ હર્ટ્ઝ છે. જો આ તરંગ હવામાં પ્રસરે છે, તો તેની ઝડપ કેટલી હશે? (હવાનો અપવર્તનાંક ≈ ૧.૦૦૦૩ લો)", "options": ["A) ૨૦૦ મી/સે", "B) ૨૦૦,૦૦૦ મી/સે", "C) ૨૦,૦૦૦ મી/સે", "D) ૨,૦૦૦ મી/સે"], "correct": 1, "explanation": "તરંગની ઝડપ (v) = તરંગલંબાઈ (λ) × આવૃત્તિ (f). અહીં, λ = ૦.૪ મી, f = ૫૦૦ હર્ટ્ઝ. આથી, v = ૦.૪ × ૫૦૦ = ૨૦૦ મી/સે. પરંતુ હવામાં પ્રકાશની ઝડપ ≈ ૩ × ૧૦⁸ મી/સે હોવાથી, આ તરંગ વિદ્યુતચુંબકીય તરંગ (પ્રકાશ) નથી, પરંતુ યાંત્રિક તરંગ (ધ્વનિ) હોવાનું ધ્યાનમાં લેતા, ધ્વનિની ઝડપ હવામાં ≈ ૩૪૦ મી/સે થાય. પરંતુ પ્રશ્નમાં તરંગલંબાઈ અને આવૃત્તિ આપેલ હોવાથી, સીધો ગણિતી ઉકેલ v = λ × f = ૨૦૦ મી/સે યોગ્ય નથી. અહીં, વિકલ્પ B (૨૦૦,૦૦૦ મી/સે) એ વિદ્યુતચુંબકીય તરંગની ઝડપને અનુરૂપ છે, પરંતુ પ્રશ્નમાં માધ્યમ હવા હોવાથી અને તરંગલંબાઈ/આવૃત્તિ મુજબ, યાંત્રિક તરંગની ઝડપ ૨૦૦ મી/સે થાય. પરંતુ NEET સ્તરે, આ પ્રશ્નમાં તરંગની ઝડપ = λ × f = ૨૦૦ મી/સે યોગ્ય છે. પરંતુ વિકલ્પ A (૨૦૦ મી/સે) યોગ્ય જવાબ છે. (નોંધ: અહીં પ્રશ્નમાં તરંગની પ્રકૃતિ સ્પષ્ટ ન હોવાથી, સીધો ગણિતી ઉકેલ લેવામાં આવ્યો છે.)", "ncert_ref": "Class XI - Chapter 15: તરંગો", "difficulty": "Easy", "num": 44}, {"question": "નીચેનાં વિધાનો ધ્યાનમાં લો: (૧) તરંગલંબાઈ અને તરંગની ઝડપ વચ્ચેનો સંબંધ v = λ × f છે. (૨) યાંત્રિક તરંગો માટે માધ્યમની જરૂર પડે છે. (૩) વિદ્યુતચુંબકીય તરંગો માટે માધ્યમની જરૂર પડતી નથી. (૪) તરંગલંબાઈ માધ્યમના ગુણધર્મો પર આધાર રાખતી નથી. કયા વિધાનો સાચાં છે?", "options": ["A) ફક્ત (૧) અને (૨)", "B) ફક્ત (૧), (૨) અને (૩)", "C) ફક્ત (૨) અને (૩)", "D) (૧), (૨), (૩) અને (૪)"], "correct": 1, "explanation": "વિધાન (૧) સાચું છે કારણ કે તરંગની ઝડપ (v) = તરંગલંબાઈ (λ) × આવૃત્તિ (f). વિધાન (૨) સાચું છે કારણ કે યાંત્રિક તરંગો (જેમકે ધ્વનિ તરંગો) માટે માધ્યમની જરૂર પડે છે. વિધાન (૩) સાચું છે કારણ કે વિદ્યુતચુંબકીય તરંગો (જેમકે પ્રકાશ) નિર્વાતમાં પ્રસરી શકે છે. વિધાન (૪) ખોટું છે કારણ કે તરંગલંબાઈ માધ્યમના ગુણધર્મો પર આધાર રાખે છે (ઉદા., પ્રકાશની તરંગલંબાઈ હવામાં અને કાચમાં અલગ અલગ હોય છે). આથી, સાચા વિધાનો (૧), (૨) અને (૩) છે.", "ncert_ref": "Class XI - Chapter 15: તરં ટર છે અને તે હવામાંથી પાણીમાં પ્રવેશે છે. જો પાણીમાં પ્રકાશની ઝડપ હવામાંની ઝડપ કરતાં 3/4 ગણી હોય, તો પાણીમાં તરંગની તરંગલંબાઈ કેટલી હશે?", "options": ["A) 300 નેનોમીટર", "B) 450 નેનોમીટર", "C) 600 નેનોમીટર", "D) 800 નેનોમીટર"], "correct": 1, "explanation": "તરંગની આવૃત્તિ f અચળ રહે છે. હવામાં ઝડપ v₁ = c, પાણીમાં ઝડપ v₂ = (3/4)c. તરંગલંબાઈ λ = v/f. તેથી, λ₂ = v₂/f = (3/4)v₁/f = (3/4)λ₁. λ₁ = 600 nm ⇒ λ₂ = (3/4) × 600 = 450 nm. આથી સાચો જવાબ B છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 10: તરંગ પ્રકાશશાસ્ત્ર", "difficulty": "Hard", "num": 49}, {"question": "એક તરંગની ઝડપ 3 × 10⁸ મી/સે છે અને તેની આવૃત્તિ 5 × 10¹⁴ હર્ટ્ઝ છે. આ તરંગ કયા પ્રકારનું હોઈ શકે?", "options": ["A) ધ્વનિ તરંગ", "B) દૃશ્ય પ્રકાશ તરંગ", "C) રેડિયો તરંગ", "D) અલ્ટ્રાસાઉન્ડ તરંગ"], "correct": 1, "explanation": "આવૃત્તિ 5 × 10¹⁴ હર્ટ્ઝ દૃશ્ય પ્રકાશની આવૃત્તિ શ્રેણીમાં આવે છે (4 × 10¹⁴ થી 8 × 10¹⁴ હર્ટ્ઝ). ઝડપ 3 × 10⁸ મી/સે પ્રકાશની ઝડપ છે, જે વિદ્યુતચુંબકીય તરંગો માટે છે. ધ્વનિ અને અલ્ટ્રાસાઉન્ડ તરંગો યાંત્રિક તરંગો છે અને તેમની ઝડપ ઘણી ઓછી હોય છે. રેડિયો તરંગોની આવૃત્તિ ઘણી ઓછી હોય છે. આથી સાચો જવાબ B છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 8: વિદ્યુતચુંબકીય તરંગો", "difficulty": "Medium", "num": 50}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
