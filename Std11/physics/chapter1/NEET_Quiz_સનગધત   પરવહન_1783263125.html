<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - સ્નિગ્ધતા – પ્રવાહીના વહેવાનો વિરોધ.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 સ્નિગ્ધતા – પ્રવાહીના વહેવાનો વિરોધ.</span>
                <span>🎯 Mixed</span>
                <span>📝 50 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "એક પ્રવાહીમાં નળાકાર પાઇપમાંથી સ્થિર વહન થઇ રહ્યું છે. જો પાઇપનો વ્યાસ અડધો કરવામાં આવે તો વહનનો દર (flow rate) કેટલા ગણો થશે? (બાકીની બધી પરિસ્થિતિઓ સમાન રાખીને)", "options": ["A) ૧/૨ ગણો", "B) ૧/૪ ગણો", "C) ૧/૮ ગણો", "D) ૧/૧૬ ગણો"], "correct": 3, "explanation": "પોઇઝ્યુલીના નિયમ મુજબ, સ્થિર વહનનો દર (Q) પાઇપના વ્યાસ (d)ના ચોથા ઘાતના સમપ્રમાણમાં હોય છે: Q ∝ d⁴. જો વ્યાસ અડધો કરવામાં આવે (d → d/2), તો વહનનો દર (d/2)⁴ = d⁴/16 થાય, એટલે કે મૂળ દરનો ૧/૧૬ ગણો થશે. બાકીના વિકલ્પો પોઇઝ્યુલીના નિયમનું ખોટું અર્થઘટન કરે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ ૧૦: યાંત્રિક ગુણધર્મો", "difficulty": "Hard", "num": 1}, {"question": "નીચેનામાંથી કયું વિધાન પ્રવાહીની સ્નિગ્ધતા માટે ખોટું છે?", "options": ["A) સ્નિગ્ધતા તાપમાન વધતા ઘટે છે", "B) સ્નિગ્ધતા દબાણ વધતા વધે છે", "C) સ્નિગ્ધતા પ્રવાહીના આંતરિક ઘર્ષણનું માપ છે", "D) સ્નિગ્ધતા પ્રવાહીના ઘનત્વ પર આધારિત નથી"], "correct": 1, "explanation": "સ્નિગ્ધતા એ પ્રવાહીના આંતરિક ઘર્ષણનું માપ છે અને સામાન્ય રીતે તાપમાન વધતા ઘટે છે (વિકલ્પ A સાચું). જોકે, પ્રવાહીની સ્નિગ્ધતા પર દબાણનો પ્રભાવ ખૂબ જ ઓછો હોય છે અને મોટાભાગના કિસ્સામાં અવગણી શકાય તેટલો હોય છે (વિકલ્પ B ખોટું). સ્નિગ્ધતા પ્રવાહીના ઘનત્વથી સ્વતંત્ર હોય છે (વિકલ્પ D સાચું).", "ncert_ref": "ક્લાસ XI - પ્રકરણ ૧૦: યાંત્રિક ગુણધર્મો", "difficulty": "Medium", "num": 2}, {"question": "એક પ્રવાહીમાં નાના ગોળાની અંતિમ વેગ (terminal velocity) v છે. જો ગોળાનો વ્યાસ બમણો કરવામાં આવે તો નવો અંતિમ વેગ કેટલો થશે? (બાકીની પરિસ્થિતિઓ સમાન રાખીને)", "options": ["A) v/૨", "B) v", "C) ૨v", "D) ૪v"], "correct": 3, "explanation": "સ્ટોક્સના નિયમ મુજબ, અંતિમ વેગ (v) ગોળાના વ્યાસ (d)ના વર્ગના સમપ્રમાણમાં હોય છે: v ∝ d². જો વ્યાસ બમણો કરવામાં આવે (d → 2d), તો અંતિમ વેગ (2d)² = 4d² થાય, એટલે કે મૂળ વેગનો ૪ ગણો થશે. પરંતુ સ્ટોક્સના નિયમમાં ગોળાના વજન અને ઉત્થાન બળ પણ ધ્યાનમાં લેવાય છે, જેના કારણે વ્યાસ બમણો થતા વેગ બમણો (૨v) થાય છે. આ પ્રશ્નમાં વિકલ્પ C સાચો છે કારણ કે વ્યાસ બમણો થતા વેગ બમણો થાય છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ ૧૦: યાંત્રિક ગુણધર્મો", "difficulty": "Hard", "num": 3}, {"question": "નીચેનામાંથી કયું પ્રવાહી સૌથી વધુ સ્નિગ્ધતા ધરાવે છે?", "options": ["A) પાણી", "B) ગ્લિસરીન", "C) આલ્કોહોલ", "D) કેરોસીન"], "correct": 0, "explanation": "ગ્લિસરીનની સ્નિગ્ધતા બાકીના પ્રવાહીઓ કરતાં ઘણી વધારે હોય છે. પાણી, આલ્કોહોલ અને કેરોસીનની સરખામણીમાં ગ્લિસરીનનું આંતરિક ઘર્ષણ વધારે હોવાથી તેની સ્નિગ્ધતા સૌથી વધુ હોય છે. બાકીના વિકલ્પો ઓછી સ્નિગ્ધતા ધરાવતા પ્રવાહીઓ છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ ૧૦: યાંત્રિક ગુણધર્મો", "difficulty": "Easy", "num": 4}, {"question": "સ્ટોક્સના નિયમ મુજબ, નાના ગોળા પર લાગતું સ્નિગ્ધતા બળ (viscous drag force) કયા પરિબળો પર આધારિત છે?", "options": ["A) ગોળાના વ્યાસ, પ્રવાહીની સ્નિગ્ધતા અને ગોળાના વેગ પર", "B) ગોળાના વ્યાસ, પ્રવાહીની ઘનતા અને ગોળાના વેગ પર", "C) ગોળાના વ્યાસ, પ્રવાહીની સ્નિગ્ધતા અને પ્રવાહીની ઘનતા પર", "D) ગોળાના વ્યાસ, પ્રવાહીની સ્નિગ્ધતા અને ગુરુત્વપ્રવેગ પર"], "correct": 0, "explanation": "સ્ટોક્સના નિયમ મુજબ, સ્નિગ્ધતા બળ (F) = 6πηrv, જ્યાં η પ્રવાહીની સ્નિગ્ધતા, r ગોળાનો ત્રિજ્યા (વ્યાસનો અડધો) અને v ગોળાનો વેગ છે. આથી સ્નિગ્ધતા બળ ગોળાના વ્યાસ (r), પ્રવાહીની સ્નિગ્ધતા (η) અને ગોળાના વેગ (v) પર આધારિત છે. બાકીના વિકલ્પોમાં પ્રવાહીની ઘનતા અથવા ગુરુત્વપ્રવેગનો સમાવેશ થતો નથી, જે સ્ટોક્સના નિયમમાં આવતું નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ ૧૦: યાંત્રિક ગુણધર્મો", "difficulty": "Medium", "num": 5}, {"question": "જ્યારે પ્રવાહીના તાપમાનમાં વધારો થાય છે ત્યારે તેની સ્નિગ્ધતામાં શું ફેરફાર થાય છે?", "options": ["A) સ્નિગ્ધતા વધે છે કારણ કે અણુઓની ગતિશીલતા વધે છે", "B) સ્નિગ્ધતા ઘટે છે કારણ કે અણુઓ વચ્ચેનું આંતરઆણ્વીય બળ ઘટે છે", "C) સ્નિગ્ધતા અચળ રહે છે કારણ કે તાપમાનનો સ્નિગ્ધતા પર કોઈ પ્રભાવ પડતો નથી", "D) સ્નિગ્ધતા વધે છે કારણ કે અણુઓ વચ્ચેનું આંતરઆણ્વીય બળ વધે છે"], "correct": 1, "explanation": "તાપમાન વધવાથી પ્રવાહીના અણુઓની ગતિશીલતા વધે છે, જેથી અણુઓ વચ્ચેનું આંતરઆણ્વીય બળ ઘટે છે અને સ્નિગ્ધતા ઘટે છે. વિકલ્પ A ખોટો છે કારણ કે સ્નિગ્ધતા ઘટે છે, નહીં કે વધે. વિકલ્પ C ખોટો છે કારણ કે તાપમાનનો સ્નિગ્ધતા પર પ્રભાવ પડે છે. વિકલ્પ D ખોટો છે કારણ કે આંતરઆણ્વીય બળ ઘટે છે, s XI - પ્રકરણ 10: પ્રવાહીની યાંત્રિક ગુણધર્મો", "difficulty": "Hard", "num": 9}, {"question": "નીચેનામાંથી કયું પ્રવાહી ન્યૂટનીય પ્રવાહી (Newtonian fluid) નથી?", "options": ["A) પાણી", "B) હવા", "C) રક્ત", "D) મધ"], "correct": 2, "explanation": "ન્યૂટનીય પ્રવાહી એવા પ્રવાહી છે જેમાં સ્નિગ્ધતા ગુણાંક અચળ રહે છે. રક્ત એ નોન-ન્યૂટનીય પ્રવાહી છે કારણ કે તેની સ્નિગ્ધતા વેગ પ્રસર સાથે બદલાય છે. પાણી, હવા અને મધ ન્યૂટનીય પ્રવાહી છે. વિકલ્પ A, B, અને D ખોટા છે કારણ કે તે ન્યૂટનીય પ્રવાહી છે.", "ncert_ref": "Class XI - પ્રકરણ 10: પ્રવાહીની યાંત્રિક ગુણધર્મો", "difficulty": "Hard", "num": 10}, {"question": "એક પ્રવાહીમાં નાના ગોળાને મુક્તપણે પડવા દેવામાં આવે છે. જો ગોળાનો વ્યાસ અડધો કરવામાં આવે, તો તેની અંતિમ વેગ (terminal velocity) પર શું અસર થશે? (ગુરુત્વપ્રવેગ અને પ્રવાહીની સ્નિગ્ધતા અચળ રાખવામાં આવે છે)", "options": ["A) અંતિમ વેગ ચાર ગણો થશે", "B) અંતિમ વેગ અડધો થશે", "C) અંતિમ વેગ બમણો થશે", "D) અંતિમ વેગ ચોથા ભાગનો થશે"], "correct": 3, "explanation": "સ્ટોક્સના નિયમ મુજબ, અંતિમ વેગ v ∝ r² (જ્યાં r ગોળાનો ત્રિજ્યા છે). જો વ્યાસ અડધો કરવામાં આવે, તો ત્રિજ્યા પણ અડધી થાય. તેથી v ∝ (r/2)² = r²/4. આથી અંતિમ વેગ ચોથા ભાગનો થશે. અન્ય વિકલ્પો ગાણિતિક સંબંધને યોગ્ય રીતે પ્રતિબિંબિત કરતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 10: યાંત્રિક ગુણધર્મો", "difficulty": "Medium", "num": 11}, {"question": "નીચેનામાંથી કયું વિધાન સ્નિગ્ધતા માટે સાચું નથી?", "options": ["A) સ્નિગ્ધતા પ્રવાહીના સ્તરો વચ્ચેના આંતરિક ઘર્ષણને કારણે ઉદ્ભવે છે", "B) પ્રવાહીની સ્નિગ્ધતા તાપમાન વધતા ઘટે છે", "C) વાયુઓની સ્નિગ્ધતા પ્રવાહી કરતાં વધુ હોય છે", "D) સ્નિગ્ધતા ગુણાંકનો SI એકમ પાસ્કલ-સેકન્ડ (Pa s) છે"], "correct": 2, "explanation": "વાયુઓની સ્નિગ્ધતા પ્રવાહી કરતાં ઘણી ઓછી હોય છે, કારણ કે વાયુઓના અણુઓ વચ્ચેનું આંતરઆણ્વીય આકર્ષણ બળ નબળું હોય છે. અન્ય વિકલ્પો સ્નિગ્ધતાના મૂળભૂત ગુણધર્મો અને વ્યાખ્યાને સાચી રીતે વર્ણવે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 10: યાંત્રિક ગુણધર્મો", "difficulty": "Easy", "num": 12}, {"question": "એક પ્રવાહીની સ્નિગ્ધતા η છે અને તે નળાકાર પાઇપમાંથી સ્થિર વહન કરી રહ્યું છે. જો પાઇપની લંબાઈ બમણી કરવામાં આવે અને ત્રિજ્યા અડધી કરવામાં આવે, તો વહનનો દર (flow rate) કેટલો થશે? (દબાણનો તફાવત અચળ રાખવામાં આવે છે)", "options": ["A) મૂળ દરના 1/4 ગણો", "B) મૂળ દરના 1/8 ગણો", "C) મૂળ દરના 1/16 ગણો", "D) મૂળ દરના 1/32 ગણો"], "correct": 3, "explanation": "પોઇઝિયલના સૂત્ર મુજબ, વહનનો દર Q ∝ r⁴/L (જ્યાં r ત્રિજ્યા અને L લંબાઈ છે). જો L બમણી થાય અને r અડધી થાય, તો Q ∝ (r/2)⁴/(2L) = r⁴/32L. આથી વહનનો દર મૂળ દરના 1/32 ગણો થશે. અન્ય વિકલ્પો ગાણિતિક સંબંધને યોગ્ય રીતે પ્રતિબિંબિત કરતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 10: યાંત્રિક ગુણધર્મો", "difficulty": "Hard", "num": 13}, {"question": "નીચેના પૈકી કયું ઉદાહરણ સ્નિગ્ધતાના પ્રત્યક્ષ ઉપયોગનું નથી?", "options": ["A) રક્તનું રુધિરવાહિનીઓમાં વહન", "B) તેલનું પાઇપલાઇન દ્વારા પરિવહન", "C) હવાનો પ્રવાહ વિમાનના પાંખ પર", "D) પાણીનું નદીમાં વહન"], "correct": 2, "explanation": "તેલનું પાઇપલાઇન દ્વારા પરિવહન એ સ્નિગ્ધતાના કારણે થતું નથી, પરંતુ દબાણના તફાવતને કારણે થાય છે. જ્યારે અન્ય ઉદાહરણોમાં સ્નિગ્ધતા પ્રવાહીના વહનને પ્રભાવિત કરે છે: રક્તની સ્નિગ્ધતા રુધિરવાહિનીઓમાં વહનને અસર કરે છે, હવાની સ્નિગ્ધતા વિમાનના પાંખ પર લિફ્ટ ઉત્પન્ન કરવામાં મદદ કરે છે, અને પાણીની સ્નિગ્ધતા નદીના વહનને પ્રભાવિત કરે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 10: યાંત્રિક ગુણધર્મો", "difficulty": "Medium", "num": 14}, {"question": "એક પ્રવાહીમાં નાના ગોળાને અંતિમ વેગ (terminal velocity) v સાથે પડવા દેવામાં આવે છે. જો પ્રવાહીની ઘનતા બમણી કરવામાં આવે અને ગોળાની ઘનતા અડધી કરવામાં આવે, તો નવો અંતિમ વેગ કેટલો થશે? (ગુરુત્વપ્રવેગ અને સ્નિગ્ધતા અચળ રાખવામાં આવે છે)", "options": ["A) મૂળ વેગના 1/4 ગણો", "B) મૂળ વેગના 1/2 ગણો", "C) મૂળ વેગ જેટલો જ રહેશે", "D) મૂળ વેગના 2 ગણો"], "correct": 1, "explanation": "સ્ટોક્સના નિયમ મુજબ, અંતિમ વેગ v ∝ (ρ_g - ρ_l) (જ્યાં ρ_g ગોળાની ઘનતા અને ρ_l પ્રવાહીની ઘનતા છે). જો ρ_l બમણી થાય અને ρ_g અડધી થાય, તો v ∝ (ρ_g/2 - 2ρ_l) = (ρ_g - 4ρ_l)/2. મૂળ વેગ v ∝ (ρ_g - ρ_l) હતો. તેથી નવો વેગ મૂળ વેગના 1/4 ગણો થશે. અન્ય વિકલ્પો ગાણિતિક સંબંધને યોગ્ય રીતે પ્રતિબિંબિત કરતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 10: યાંત્રિક ગુણધર્મો", "difficulty": "Hard", "num": 15}, {"question": "એક પ્રવાહીમાં બે સમાંતર સપાટીઓ વચ્ચેનું અંતર 2 mm છે. જો ઉપરની સપાટીને 4 m/sના વેગથી ખસેડવામાં આવે અને નીચેની સપાટી સ્થિર હોય, તો પ્રવાહીના સ્તરો વચ્ચેનો વેગ પ્રસર (velocity gradient) કેટલો હશે?", "options": ["A) 200 s⁻¹", "B) 2000 s⁻¹", "C) 800 s⁻¹", "D) 8000 s⁻¹"], "correct": 1, "explanation": "વેગ પ્રસર (velocity gradient) = વેગનો તફાવત / અંતર = (4 m/s - 0 m/s) / (2 × 10⁻³ m) = 2000 s⁻¹. વિકલ્પ A ખોટો છે કારણ કે તેમાં એકમનો યોગ્ય રીતે ઉપયોગ થયો નથી. વિકલ્પ C અને D ખોટા છે કારણ કે ગણતરીની ભૂલ છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 10: યાંત્રિક ગુણધર્મો", "difficulty": "Medium", "num": 16}, {"question": "નીચેનામાંથી કયું વિધાન સ્નિગ્ધતા બળ (viscous force) માટે ખોટું છે?", "options": ["A) સ્નિગ્ધતા બળ પ્રવાહીના સ્તરો વચ્ચેના સાપેક્ષ વેગ પર આધારિત છે.", "B) સ્નિગ્ધતા બળ પ્રવાહીના સંપર્ક ક્ષેત્રફળ પર આધારિત નથી.", "C) સ્નિગ્ધતા બળ પ્રવાહીની સ્નિગ્ધતા ગુણાંક (η) પર આધારિત છે.", "D) સ્નિગ્ધતા બળ હંમેશા પ્રવાહીના વહનની વિરુદ્ધ દિશામાં લાગે છે."], "correct": 1, "explanation": "સ્નિગ્ધતા બળ પ્રવાહીના સંપર્ક ક્ષેત્રફળ પર આધારિત છે (F = ηA(dv/dx)). વિકલ્પ A, C અને D સાચા વિધાનો છે કારણ કે તે સ્નિગ્ધતા બળની લાક્ષણિકતાઓ દર્શાવે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 10: યાંત્રિક ગુણધર્મો", "difficulty": "Hard", "num": 17}, {"question": "એક પ્રવાહીની સ્નિગ્ધતા ગુણાંક η = 0.8 Pa s છે. જો બે સમાંતર સપાટીઓ વચ્ચેનું અંતર 1 mm હોય અને ઉપરની સપાટીને 2 m/sના વેગથી ખસેડવામાં આવે, તો પ્રવાહીના એકમ ક્ષેત્રફળ દીઠ સ્નિગ્ધતા બળ કેટલું હશે?", "options": ["A) 160 N/m²", "B) 1600 N/m²", "C) 800 N/m²", "D) 80 N/m²"], "correct": 1, "explanation": "સ્નિગ્ધતા બળ પ્રતિ એકમ ક્ષેત્રફળ (shear stress) = η × વેગ પ્રસર = 0.8 Pa s × (2 m/s / 1 × 10⁻³ m) = 1600 N/m². વિકલ્પ A, C અને D ખોટા છે કારણ કે ગણતરીમાં ભૂલ છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 10: યાંત્રિક ગુણધર્મો", "difficulty": "Medium", "num": 18}, {"question": "નીચેનામાંથી કયું ઉદાહરણ સ્નિગ્ધતાના પરોક્ષ અસરનું નથી?", "options": ["A) રક્તવાહિનીઓમાં રક્તનું વહન", "B) વરસાદના ટીપાંનું અંતિમ વેગ f": "Class XI - પ્રકરણ 10: યાંત્રિક ગુણધર્મો", "difficulty": "Hard", "num": 33}, {"question": "નીચેનામાંથી કયું ઉદાહરણ સ્નિગ્ધતાના કારણે થતી ઘટનાનું નથી?", "options": ["A) વરસાદના ટીપાંનો અંતિમ વેગ", "B) પાઇપમાંથી પ્રવાહીનું સ્થિર વહન", "C) હવામાં ધ્વનિ તરંગોનું પ્રસરણ", "D) તેલમાં ડૂબેલા બેરિંગનું સરળ પરિભ્રમણ"], "correct": 2, "explanation": "ધ્વનિ તરંગોનું પ્રસરણ સ્નિગ્ધતાના કારણે નહીં, પરંતુ દબાણના ફેરફારોને કારણે થાય છે. વિકલ્પ A, B અને D સ્નિગ્ધતાના પ્રત્યક્ષ ઉદાહરણો છે.", "ncert_ref": "Class XI - પ્રકરણ 10: યાંત્રિક ગુણધર્મો", "difficulty": "Medium", "num": 34}, {"question": "એક પ્રવાહીમાં બે સમાંતર પ્લેટો વચ્ચેનું અંતર 0.2 cm છે. જો ઉપરની પ્લેટને 2 cm/sના વેગથી ખસેડવામાં આવે અને નીચેની પ્લેટ સ્થિર હોય, તો પ્રવાહીના સ્તરો વચ્ચેનો વેગ પ્રસર (velocity gradient) કેટલો હશે? જો પ્રવાહીની સ્નિગ્ધતા ગુણાંક 0.5 Pa s હોય, તો બંને પ્લેટો વચ્ચે પ્રતિ એકમ ક્ષેત્રફળે લાગતું સ્નિગ્ધતા બળ કેટલું હશે?", "options": ["A) વેગ પ્રસર = 10 s⁻¹, બળ = 5 N/m²", "B) વેગ પ્રસર = 100 s⁻¹, બળ = 50 N/m²", "C) વેગ પ્રસર = 10 s⁻¹, બળ = 0.5 N/m²", "D) વેગ પ્રસર = 100 s⁻¹, બળ = 5 N/m²"], "correct": 0, "explanation": "વેગ પ્રસર (velocity gradient) = વેગનો તફાવત / અંતર = (2 cm/s - 0 cm/s) / 0.2 cm = 10 s⁻¹. સ્નિગ્ધતા બળ (F/A) = η × વેગ પ્રસર = 0.5 Pa s × 10 s⁻¹ = 5 N/m². તેથી વિકલ્પ A સાચો છે. અન્ય વિકલ્પોમાં વેગ પ્રસર અથવા બળની ગણતરી ખોટી છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 10: યાંત્રિક ગુણધર્મો", "difficulty": "Medium", "num": 35}, {"question": "નીચેનામાંથી કયું વિધાન સ્નિગ્ધતા અને તાપમાનના સંબંધ માટે ખોટું છે?", "options": ["A) પ્રવાહીની સ્નિગ્ધતા તાપમાન વધતાં ઘટે છે", "B) વાયુઓની સ્નિગ્ધતા તાપમાન વધતાં વધે છે", "C) પ્રવાહીની સ્નિગ્ધતા તાપમાન વધતાં વધે છે", "D) સ્નિગ્ધતા ગુણાંકનો તાપમાન સાથેનો સંબંધ પ્રવાહી અને વાયુ માટે ભિન્ન હોય છે"], "correct": 2, "explanation": "પ્રવાહીની સ્નિગ્ધતા તાપમાન વધતાં ઘટે છે કારણ કે અણુઓ વચ્ચેનું આકર્ષણ બળ નબળું પડે છે. વાયુઓની સ્નિગ્ધતા તાપમાન વધતાં વધે છે કારણ કે અણુઓની ગતિ ઝડપી બને છે. આથી વિકલ્પ C ખોટું છે. અન્ય વિકલ્પો સાચી માહિતી આપે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 10: યાંત્રિક ગુણધર્મો", "difficulty": "Medium", "num": 36}, {"question": "એક પ્રવાહીની સ્નિગ્ધતા ગુણાંક η = 0.4 Pa s છે. જો બે સમાંતર પ્લેટો વચ્ચેનું અંતર 1 mm હોય અને ઉપરની પ્લેટને 0.5 m/sના વેગથી ખસેડવામાં આવે, તો પ્રવાહીના સ્તર પર લાગતું સ્નિગ્ધતા બળ (viscous force) કેટલું હશે? (પ્લેટનું ક્ષેત્રફળ 0.1 m² લો)", "options": ["A) 20 N", "B) 2 N", "C) 0.2 N", "D) 200 N"], "correct": 0, "explanation": "સ્નિગ્ધતા બળ F = η × A × (Δv/Δx). અહીં η = 0.4 Pa s, A = 0.1 m², Δv = 0.5 m/s, Δx = 1 mm = 0.001 m. તેથી F = 0.4 × 0.1 × (0.5/0.001) = 0.4 × 0.1 × 500 = 20 N. આથી વિકલ્પ A સાચો છે. અન્ય વિકલ્પો ખોટી ગણતરી પર આધારિત છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 10: યાંત્રિક ગુણધર્મો", "difficulty": "Hard", "num": 37}, {"question": "એક પ્રવાહીમાં બે સમાંતર પ્લેટો વચ્ચેનું અંતર 1 mm છે. જો ઉપરની પ્લેટને 2 m/sના વેગથી ખસેડવામાં આવે અને નીચેની પ્લેટ સ્થિર રહે, તો પ્રવાહીના સ્તરો વચ્ચેનો વેગ પ્રસર (velocity gradient) કેટલો હશે?", "options": ["A) 200 s⁻¹", "B) 2000 s⁻¹", "C) 20 s⁻¹", "D) 2 s⁻¹"], "correct": 1, "explanation": "વેગ પ્રસર (velocity gradient) = વેગનો તફાવત / અંતર = (2 m/s - 0 m/s) / 1 × 10⁻³ m = 2000 s⁻¹. વિકલ્પ Aમાં એકમનો ગુણાકાર ભૂલથી ઓછો છે, જ્યારે વિકલ્પ C અને Dમાં ગણતરી ખોટી છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 10: યાંત્રિક ગુણધર્મો", "difficulty": "Easy", "num": 38}, {"question": "નીચેનામાંથી કયું વિધાન સ્નિગ્ધતા અને પ્રવાહીના આણ્વિક બંધારણ વચ્ચેના સંબંધ માટે સાચું નથી?", "options": ["A) પ્રવાહીના અણુઓ વચ્ચે આંતરઆણ્વિક બળો જેટલા મજબૂત હોય, તેટલી સ્નિગ્ધતા વધારે હોય છે.", "B) લાંબી શૃંખલાવાળા અણુઓ ધરાવતા પ્રવાહીઓની સ્નિગ્ધતા સામાન્ય રીતે વધારે હોય છે.", "C) પ્રવાહીની સ્નિગ્ધતા માત્ર તેના ઘનત્વ પર આધારિત હોય છે, અણુઓના કદ કે આકાર પર નહીં.", "D) હાઇડ્રોજન બંધ ધરાવતા પ્રવાહીઓ (જેમ કે પાણી) સામાન્ય રીતે વધુ સ્નિગ્ધતા દર્શાવે છે."], "correct": 2, "explanation": "સ્નિગ્ધતા પ્રવાહીના આંતરઆણ્વિક બળો, અણુઓના કદ, આકાર અને બંધારણ પર આધારિત હોય છે, માત્ર ઘનત્વ પર નહીં. વિકલ્પ A, B અને D આણ્વિક બંધારણ સાથે સ્નિગ્ધતાના સંબંધને સાચી રીતે વર્ણવે છે, જ્યારે વિકલ્પ C ખોટું છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 5: દ્રવ્યોની અવસ્થાઓ", "difficulty": "Medium", "num": 39}, {"question": "એક પ્રયોગમાં, એક નાના ગોળાને ત્રણ જુદા-જુદા પ્રવાહીઓ A, B અને Cમાં મુક્તપણે પડવા દેવામાં આવે છે. ગોળાના અંતિમ વેગ (terminal velocity) અનુક્રમે v_A, v_B અને v_C માપવામાં આવે છે. જો v_A > v_B > v_C હોય, તો નીચેનામાંથી કયું તારણ સાચું હશે? (ધારો કે ગોળાનો વ્યાસ, ઘનતા અને પ્રવાહીની ઘનતા સમાન છે.)", "options": ["A) પ્રવાહી Aની સ્નિગ્ધતા સૌથી વધારે છે.", "B) પ્રવાહી Cની સ્નિગ્ધતા સૌથી ઓછી છે.", "C) પ્રવાહી Bની સ્નિગ્ધતા પ્રવાહી A કરતાં વધારે છે, પરંતુ પ્રવાહી C કરતાં ઓછી છે.", "D) પ્રવાહી A, B અને Cની સ્નિગ્ધતા સમાન છે, પરંતુ તેમની ઘનતા જુદી-જુદી છે."], "correct": 1, "explanation": "સ્ટોક્સના નિયમ મુજબ, અંતિમ વેગ (v) ∝ 1/η (જ્યાં η = સ્નિગ્ધતા ગુણાંક). તેથી, જો v_A > v_B > v_C હોય, તો η_C > η_B > η_A થાય. આથી, પ્રવાહી Cની સ્નિગ્ધતા સૌથી વધારે અને પ્રવાહી Aની સૌથી ઓછી હશે. વિકલ્પ A અને C ખોટા છે, જ્યારે વિકલ્પ D પ્રવાહીની ઘનતા અલગ હોવાની શરતને અવગણે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 10: યાંત્રિક ગુણધર્મો", "difficulty": "Hard", "num": 40}, {"question": "નીચેનામાંથી કયું વિધાન સ્નિગ્ધતા અને પ્રવાહીના પ્રકાર વિશે સાચું છે?", "options": ["A) રુધિર એક ન્યૂટનીય પ્રવાહી છે.", "B) પાણી એક ન્યૂટનીય પ્રવાહી છે.", "C) હવા એક બિન-ન્યૂટનીય પ્રવાહી છે.", "D) તેલ એક બિન-ન્યૂટનીય પ્રવાહી છે."], "correct": 1, "explanation": "પાણી એક ન્યૂટનીય પ્રવાહી છે કારણ કે તેની સ્નિગ્ધતા વેગ પ્રસર (velocity gradient) સાથે બદલાતી નથી. રુધિર, હવા, અને તેલ બિન-ન્યૂટનીય પ્રવાહી છે કારણ કે તેમની સ્નિગ્ધતા વેગ પ્રસર સાથે બદલાય છે. આથી, વિકલ્પ B સાચો છે.", "ncert_ref": "Class XI - પ્રકરણ 10: પ્રવાહીની યાંત્રિક ગુણધર્મો", "difficulty": "Easy", "num": 41}, {"question": "નીચેનામાંથી કયું ઉદાહરણ સ્નિગ્ધતાના કારણે થતી ઘટનાનું છે?", "options": ["A) પાણીની સપાટી પર ટપકાંનું બનવું", "B) પ્રવાહીમાં ગોળાનો અંતિમ વેગ", "C) પારાનું વરાળમાં રૂપાંતર", "D) ધાતુની તારમાં તણાવ"], "correct": 1, "explanation": "પ્રવાહીમાં ગોળાનો અંતિમ વેગ સ્નિગ્ધતાના કારણે થતી ઘટના છે, કારણ કે સ્નિગ્ધતા બળ ગોળા પર લાગે છે અ             const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
