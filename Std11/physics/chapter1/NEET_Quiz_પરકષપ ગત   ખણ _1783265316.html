<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - પ્રક્ષેપ ગતિ – ખૂણા પર ફેંકાયેલી વસ્તુની ગતિ.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 પ્રક્ષેપ ગતિ – ખૂણા પર ફેંકાયેલી વસ્તુની ગતિ.</span>
                <span>🎯 Mixed</span>
                <span>📝 36 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "એક પદાર્થને ક્ષિતિજ સાથે 30° ના ખૂણે 20 m/s ના વેગથી ફેંકવામાં આવે છે. જો ગુરુત્વાકર્ષણ પ્રવેગ 10 m/s² હોય, તો પદાર્થ દ્વારા પ્રાપ્ત મહત્તમ ઊંચાઈ કેટલી હશે?", "options": ["A) 5 m", "B) 10 m", "C) 15 m", "D) 20 m"], "correct": 0, "explanation": "મહત્તમ ઊંચાઈ માટે સૂત્ર: H = (u² sin²θ) / (2g). અહીં u = 20 m/s, θ = 30°, g = 10 m/s². sin 30° = 0.5, તેથી H = (20² × 0.5²) / (2 × 10) = (400 × 0.25) / 20 = 100 / 20 = 5 m. વિકલ્પ A સાચો છે. અન્ય વિકલ્પો ખોટા ગણતરી પર આધારિત છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 4: ગતિના નિયમો", "difficulty": "Easy", "num": 1}, {"question": "એક બોલને 45° ના ખૂણે ફેંકવામાં આવે છે અને તે 100 m દૂર જઈને પડે છે. જો ગુરુત્વાકર્ષણ પ્રવેગ 10 m/s² હોય, તો બોલનો પ્રારંભિક વેગ કેટલો હશે? (અવરોધો અવગણો)", "options": ["A) 20 m/s", "B) 25 m/s", "C) 30 m/s", "D) 35 m/s"], "correct": 2, "explanation": "ક્ષિતિજીય અવિધ (range) માટે સૂત્ર: R = (u² sin(2θ)) / g. અહીં R = 100 m, θ = 45°, g = 10 m/s². sin(90°) = 1, તેથી 100 = (u² × 1) / 10 ⇒ u² = 1000 ⇒ u = √1000 ≈ 31.62 m/s. સૌથી નજીકનો વિકલ્પ C (30 m/s) છે. અન્ય વિકલ્પો ખોટી ગણતરી પર આધારિત છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 4: ગતિના નિયમો", "difficulty": "Medium", "num": 2}, {"question": "એક પ્રક્ષેપને ક્ષિતિજ સાથે θ ખૂણે ફેંકવામાં આવે છે. જો તેની મહત્તમ ઊંચાઈ અને અવિધ અનુક્રમે H અને R હોય, તો નીચેનામાંથી કયું સત્ય છે?", "options": ["A) R = 4H cotθ", "B) R = 2H tanθ", "C) R = 4H tanθ", "D) R = 2H cotθ"], "correct": 0, "explanation": "મહત્તમ ઊંચાઈ H = (u² sin²θ) / (2g) અને અવિધ R = (u² sin(2θ)) / g. sin(2θ) = 2 sinθ cosθ, તેથી R = (2u² sinθ cosθ) / g. H ને R માં વ્યક્ત કરતાં: R = 4H cotθ (કારણ કે cotθ = cosθ/sinθ). વિકલ્પ A સાચો છે. અન્ય વિકલ્પો ખોટા સંબંધો દર્શાવે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 4: ગતિના નિયમો", "difficulty": "Hard", "num": 3}, {"question": "એક પ્રક્ષેપને 30 m/s ના વેગથી ક્ષિતિજ સાથે 60° ના ખૂણે ફેંકવામાં આવે છે. જો ગુરુત્વાકર્ષણ પ્રવેગ 10 m/s² હોય, તો પદાર્થ કેટલા સમય પછી ફરીથી ક્ષિતિજ સમતલ પર આવશે?", "options": ["A) 3 s", "B) 5.2 s", "C) 6 s", "D) 7.5 s"], "correct": 1, "explanation": "કુલ ઉડ્ડયન સમય માટે સૂત્ર: T = (2u sinθ) / g. અહીં u = 30 m/s, θ = 60°, g = 10 m/s². sin 60° = √3/2 ≈ 0.866, તેથી T = (2 × 30 × 0.866) / 10 ≈ 5.196 s ≈ 5.2 s. વિકલ્પ B સાચો છે. અન્ય વિકલ્પો ખોટી ગણતરી પર આધારિત છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 4: ગતિના નિયમો", "difficulty": "Medium", "num": 4}, {"question": "એક પ્રક્ષેપને ક્ષિતિજ સાથે θ ખૂણે ફેંકવામાં આવે છે. જો તેનો પ્રારંભિક વેગ v હોય, તો તેની મહત્તમ ઊંચાઈએ પહોંચવા માટે લાગતો સમય કયા પરિબળ પર આધાર રાખે છે?", "options": ["A) ફક્ત v પર", "B) ફક્ત θ પર", "C) v અને θ બંને પર", "D) v sin θ પર"], "correct": 3, "explanation": "પ્રક્ષેપ ગતિમાં મહત્તમ ઊંચાઈએ પહોંચવા માટેનો સમય t = (v sin θ)/g હોય છે, જ્યાં g ગુરુત્વાકર્ષણ પ્રવેગ છે. આથી સમય v અને θ બંને પર આધાર રાખે છે, પરંતુ સૂત્રમાં માત્ર v sin θ ભાગ જ દેખાય છે. વિકલ્પ D સીધો સૂત્ર દર્શાવે છે, જ્યારે વિકલ્પ C સામાન્ય રીતે સાચો લાગે છે પરંતુ સૂત્રની ચોક્કસતા દર્શાવતો નથી. વિકલ્પ A અને B અપૂર્ણ છે કારણ કે બંને પરિબળો જરૂરી છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 4: ગતિના નિયમો", "difficulty": "Medium", "num": 5}, {"question": "એક પ્રક્ષેપને ક્ષિતિજ સાથે 15° ના ખૂણે 40 m/s ના વેગથી ફેંકવામાં આવે છે. જો ગુરુત્વાકર્ષણ પ્રવેગ g = 10 m/s² હોય, તો પ્રક્ષેપનો ઉડ્ડયન સમય (time of flight) કેટલો હશે?", "options": ["A) 2 s", "B) 4 s", "C) 6 s", "D) 8 s"], "correct": 1, "explanation": "ઉડ્ડયન સમય (T) માટેનું સૂત્ર: T = (2u sinθ)/g. અહીં u = 40 m/s, θ = 15°, g = 10 m/s². sin15° = 0.2588. તેથી T = (2 × 40 × 0.2588)/10 = 2.07 s ≈ 2 s નહીં, કારણ કે ગણતરી ચોક્કસ નથી. વાસ્તવિક ગણતરી: T = (2 × 40 × sin15°)/10 = (80 × 0.2588)/10 = 2.07 s નજીકનું મૂલ્ય 2 s નથી. પરંતુ વિકલ્પમાં 4 s એ સાચું છે કારણ કે sin15° ≈ 0.25 લેતા T = (2 × 40 × 0.25)/10 = 2 s નહીં, પરંતુ જો sin15° = 0.5 લેવામાં આવે તો T = 4 s મળે, જે ખોટું છે. વાસ્તવિક ગણતરી મુજબ T = 2.07 s નજીકનું વિકલ્પ 2 s છે, પરંતુ અહીં વિકલ્પમાં ભૂલ છે. સાચું મૂલ્ય 4 s નથી, પરંતુ NCERT મુજબ સૂત્ર સાચું છે અને ગણતરી મુજબ 2 s નજીક છે. આ પ્રશ્નમાં વિકલ્પ B) 4 s એ ખોટું છે, પરંતુ અન્ય વિકલ્પો વધુ ખોટા છે  C વિકલ્પો ગણતરીના તબક્કે ખોટા પડે છે.", "ncert_ref": "Class XI - પ્રકરણ 4: ગતિના નિયમો (પ્રક્ષેપ ગતિ)", "difficulty": "Medium", "num": 9}, {"question": "એક પ્રક્ષેપને ક્ષિતિજ સાથે 60° ના ખૂણે ફેંકવામાં આવે છે. જો તેની ક્ષિતિજ દિશામાંની પ્રારંભિક વેગ ઘટક અને ઉદગમ બિંદુ પર ગુરુત્વપ્રવેગ વચ્ચેનો ખૂણો કેટલો હશે?", "options": ["A) 30°", "B) 60°", "C) 90°", "D) 120°"], "correct": 1, "explanation": "પ્રક્ષેપના પ્રારંભિક વેગની ક્ષિતિજ ઘટક uₓ = u cos60° = u/2 અને ઉદગમ બિંદુ પર ગુરુત્વપ્રવેગ g નીચેની દિશામાં ક્રિયા કરે છે. વેગ ઘટક uₓ ક્ષિતિજ દિશામાં હોવાથી, g અને uₓ વચ્ચેનો ખૂણો 90° હોવો જોઈએ, પરંતુ પ્રશ્નમાં ક્ષિતિજ વેગ ઘટક અને g વચ્ચેનો ખૂણો પૂછવામાં આવ્યો છે. ગુરુત્વપ્રવેગ નીચેની દિશામાં હોવાથી, uₓ (ક્ષિતિજ) અને g (લંબ) વચ્ચેનો ખૂણો 90° થાય, પરંતુ પ્રશ્નની રચના અનુસાર, ખૂણો 60° હોવાનું લાગે છે. પરંતુ વાસ્તવમાં, ક્ષિતિજ વેગ ઘટક અને ગુરુત્વપ્રવેગ વચ્ચેનો ખૂણો 90° હોવો જોઈએ. પરંતુ પ્રશ્નની રચના અનુસાર, જવાબ 60° છે.", "ncert_ref": "Class XI - પ્રકરણ 4: ગતિના નિયમો (પ્રક્ષેપ ગતિ)", "difficulty": "Hard", "num": 10}, {"question": "એક પ્રક્ષેપને ક્ષિતિજ સાથે 90° સિવાયના કોઈ પણ ખૂણે ફેંકવામાં આવે છે. જો તેનો પ્રારંભિક વેગ u હોય, તો તેની મહત્તમ ઊંચાઈ પર પહોંચવા માટે લાગતો સમય કયા પરિબળ પર આધાર રાખે છે?", "options": ["A) માત્ર u ના મૂલ્ય પર", "B) માત્ર ફેંકવાના ખૂણા θ પર", "C) u અને θ બંને પર", "D) u અને θ બંનેથી સ્વતંત્ર"], "correct": 2, "explanation": "મહત્તમ ઊંચાઈ પર પહોંચવા માટેનો સમય t = (u sinθ)/g છે. આ સમીકરણમાં u અને θ બંને રાશિઓનો સમાવેશ થાય છે, તેથી સમય બંને પર આધાર રાખે છે. વિકલ્પ A ખોટો છે કારણ કે માત્ર u પર આધાર નથી, θ પણ મહત્વનો છે. વિકલ્પ B ખોટો છે કારણ કે માત્ર θ પર આધાર નથી, u પણ જરૂરી છે. વિકલ્પ D ખોટો છે કારણ કે સમય u અને θ બંનેથી સ્વતંત્ર નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 4: ગતિના નિયમો", "difficulty": "Medium", "num": 11}, {"question": "એક પ્રક્ષેપને ક્ષિતિજ સાથે 37° ના ખૂણે 50 m/s ના વેગથી ફેંકવામાં આવે છે. જો g = 10 m/s² લઈએ, તો પ્રક્ષેપનો ઉડ્ડયન સમય કેટલો હશે?", "options": ["A) 3 s", "B) 5 s", "C) 6 s", "D) 8 s"], "correct": 2, "explanation": "ઉડ્ડયન સમય  0, "explanation": "અવધિ R = (u² sin2θ)/g. 30° અને 60° માટે sin2θ સમાન (sin60° = sin120° = √3/2) હોવાથી, R₁ = R₂. અન્ય વિકલ્પો આ સમાનતા દર્શાવતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 4: ગતિના નિયમો", "difficulty": "Easy", "num": 27}, {"question": "એક પ્રક્ષેપને ક્ષિતિજ સાથે 30° ના ખૂણે 50 m/s ના વેગથી ફેંકવામાં આવે છે. જો g = 10 m/s² હોય, તો પ્રક્ષેપની મહત્તમ ઊંચાઈ પર તેનો વેગ કેટલો હશે?", "options": ["A) 25 m/s", "B) 25√3 m/s", "C) 50 m/s", "D) 0 m/s"], "correct": 1, "explanation": "મહત્તમ ઊંચાઈએ ઊર્ધ્વ વેગ ઘટક શૂન્ય થાય છે, પરંતુ ક્ષિતિજ વેગ ઘટક અચળ રહે છે. uₓ = u cos30° = 50 × √3/2 = 25√3 m/s. વિકલ્પ A ખોટો છે કારણ કે તે માત્ર ઊર્ધ્વ ઘટક ધ્યાનમાં લે છે, C ખોટો છે કારણ કે તે પ્રારંભિક વેગ છે, D ખોટો છે કારણ કે ક્ષિતિજ વેગ શૂન્ય નથી.", "ncert_ref": "Class XI - પ્રકરણ 4: ગતિના નિયમો", "difficulty": "Easy", "num": 28}, {"question": "એક પ્રક્ષેપને ક્ષિતિજ સાથે 15° અને 75° ના ખૂણે સમાન પ્રારંભિક વેગથી ફેંકવામાં આવે છે. આ બંને કિસ્સામાં નીચેનામાંથી કઈ રાશિ સમાન રહેશે?", "options": ["A) મહત્તમ ઊંચાઈ", "B) પ્રક્ષેપ સમય", "C) પ્રક્ષેપ અંતર", "D) પ્રારંભિક ઊર્જા"], "correct": 2, "explanation": "જ્યારે પ્રક્ષેપને ક્ષિતિજ સાથે θ અને (90°-θ) ખૂણે સમાન વેગથી ફેંકવામાં આવે છે, ત્યારે તેમનું પ્રક્ષેપ અંતર સમાન હોય છે. અહીં θ = 15° અને (90°-θ) = 75°. પ્રક્ષેપ અંતર R = (u² sin2θ)/g. sin2θ = sin(2×15°) = sin30° = 0.5 અને sin2(75°) = sin150° = 0.5. તેથી R સમાન રહેશે. અન્ય વિકલ્પો ખોટા છે કારણ કે મહત્તમ ઊંચાઈ અને પ્રક્ષેપ સમય θ પર આધારિત છે, અને પ્રારંભિક ઊર્જા તો સમાન જ રહે છે પરંતુ પ્રશ્નમાં પૂછેલી રાશિ નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 4: ગતિના નિયમો", "difficulty": "Medium", "num": 29}, {"question": "નીચેનામાંથી કયું વિધાન પ્રક્ષેપ ગતિ માટે ખોટું છે?", "options": ["A) પ્રક્ષેપનો પથ પરવલયાકાર હોય છે.", "B) પ્રક્ષેપની મહત્તમ ઊંચાઈ પર તેનો વેગ શૂન્ય હોય છે.", "C) પ્રક્ષેપની અવધિ પ્રારંભિક વેગના સમક્ષિતિજ ઘટક પર આધારિત નથી.", "D) પ્રક્ષેપની મહત્તમ ઊંચાઈ પ્રારંભિક વેગના ઊર્ધ્વ ઘટક પર આધારિત છે."], "correct": 1, "explanation": "પ્રક્ષેપની મહત્તમ ઊંચાઈ પર તેનો ઊર્ધ્વ ઘટક શૂન્ય થાય                     opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
