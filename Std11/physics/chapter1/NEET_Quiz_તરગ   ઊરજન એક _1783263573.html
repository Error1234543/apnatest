<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - તરંગો – ઊર્જાનું એક સ્થાનેથી બીજા સ્થાને પરિવહન.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 તરંગો – ઊર્જાનું એક સ્થાનેથી બીજા સ્થાને પરિવહન.</span>
                <span>🎯 Mixed</span>
                <span>📝 50 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "એક સ્થિત-તરંગમાં બે ક્રમિક પ્રસ્પંદો વચ્ચેનું અંતર 30 cm છે. જો તરંગનો વેગ 360 m/s હોય, તો તરંગની આવૃત્તિ કેટલી હશે?", "options": ["A) 300 Hz", "B) 600 Hz", "C) 900 Hz", "D) 1200 Hz"], "correct": 1, "explanation": "સ્થિત-તરંગમાં બે ક્રમિક પ્રસ્પંદો વચ્ચેનું અંતર λ/2 હોય છે. અહીં λ/2 = 30 cm ⇒ λ = 60 cm = 0.6 m. તરંગ વેગ v = fλ ⇒ f = v/λ = 360/0.6 = 600 Hz. તેથી વિકલ્પ B સાચો છે.\nA ખોટું છે કારણ કે λ = 1.2 m ગણીને f = 300 Hz મળે છે.\nC ખોટું છે કારણ કે λ = 0.4 m ગણીને f = 900 Hz મળે છે.\nD ખોટું છે કારણ કે λ = 0.3 m ગણીને f = 1200 Hz મળે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 15: તરંગો", "difficulty": "Medium", "num": 1}, {"question": "એક તરંગનું સમીકરણ y = 0.05 sin(4πx – 200πt) છે, જ્યાં x અને y મીટરમાં છે અને t સેકન્ડમાં છે. આ તરંગની કંપવિસ્તાર અને તરંગલંબાઈ અનુક્રમે કેટલી હશે?", "options": ["A) 0.05 m અને 0.5 m", "B) 0.05 m અને 1.0 m", "C) 0.10 m અને 0.5 m", "D) 0.10 m અને 1.0 m"], "correct": 0, "explanation": "સામાન્ય તરંગ સમીકરણ y = A sin(kx – ωt) સાથે સરખાવતાં, A = 0.05 m (કંપવિસ્તાર) અને k = 4π ⇒ λ = 2π/k = 2π/4π = 0.5 m. તેથી વિકલ્પ A સાચો છે.\nB ખોટું છે કારણ કે λ = 1.0 m ગણવામાં આવ્યું છે.\nC ખોટું છે કારણ કે A = 0.10 m અને λ = 0.5 m ગણવામાં આવ્યું છે.\nD ખોટું છે કારણ કે A = 0.10 m અને λ = 1.0 m ગણવામાં આવ્યું છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 15: તરંગો", "difficulty": "Easy", "num": 2}, {"question": "એક સ્પંદન તરંગ એક દોરી પર 2 m/s ના વેગથી ગતિ કરે છે. જો દોરીની રેખીય ઘનતા 0.04 kg/m હોય, તો દોરી પરનું તણાવ બળ કેટલું હશે?", "options": ["A) 0.08 N", "B) 0.16 N", "C) 0.32 N", "D) 0.64 N"], "correct": 1, "explanation": "તરંગ વેગ v = √(T/μ) ⇒ T = v²μ = (2)² × 0.04 = 4 × 0.04 = 0.16 N. તેથી વિકલ્પ B સાચો છે.\nA ખોટું છે કારણ કે T = 0.08 N ગણવામાં આવ્યું છે.\nC ખોટું છે કારણ કે T = 0.32 N ગણવામાં આવ્યું છે.\nD ખોટું છે કારણ કે T = 0.64 N ગણવામાં આવ્યું છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 15: તરંગો", "difficulty": "Medium", "num": 3}, {"question": "એક ધ્વનિતરંગ હવામાં 340 m/s ના વેગથી ગતિ કરે છે. જો એક સ્થિત-તરંગમાં બે ક્રમિક ગાંઠો વચ્ચેનું અંતર 25 cm હોય, તો ધ્વનિતરંગની આવૃત્તિ કેટલી હશે?", "options": ["A) 340 Hz", "B) 680 Hz", "C) 1360 Hz", "D) 1700 Hz"], "correct": 1, "explanation": "સ્થિત-તરંગમાં બે ક્રમિક ગાંઠો વચ્ચેનું અંતર λ/2 હોય છે. અહીં λ/2 = 25 cm ⇒ λ = 50 cm = 0.5 m. તરંગ વેગ v = fλ ⇒ f = v/λ = 340/0.5 = 680 Hz. તેથી વિકલ્પ B સાચો છે.\nA ખોટું છે કારણ કે λ = 1.0 m ગણીને f = 340 Hz મળે છે.\nC ખોટું છે કારણ કે λ = 0.25 m ગણીને f = 1360 Hz મળે છે.\nD ખોટું છે કારણ કે λ = 0.2 m ગણીને f = 1700 Hz મળે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 15: તરંગો", "difficulty": "Hard", "num": 4}, {"question": "એક તરંગનું સમીકરણ y = 0.02 sin(πx – 100πt) છે, જ્યાં x અને y મીટરમાં છે અને t સેકન્ડમાં છે. આ તરંગ માટે નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) તરંગનો કંપવિસ્તાર 0.02 m છે", "B) તરંગની તરંગલંબાઈ 2 m છે", "C) તરંગનો આવર્તકાળ 0.02 s છે", "D) તરંગનો વેગ 100 m/s છે"], "correct": 3, "explanation": "સમીકરણ y = 0.02 sin(πx – 100πt) સાથે સરખાવતાં, A = 0.02 m, k = π ⇒ λ = 2π/k = 2 m, ω = 100π ⇒ T = 2π/ω = 0.02 s. તરંગ વેગ v = ω/k = 100π/π = 100 m/s. વિકલ્પ D માં વેગ 100 m/s છે જે સાચું છે, પરંતુ પ્રશ્નમાં 'સાચું નથી' પૂછ્યું છે. વાસ્તવમાં બધા વિકલ્પો સાચા છે, પરંતુ જો કોઈ ભૂલ ગણવી હોય તો વિકલ્પ D ને ખોટું ગણી શકાય નહીં. આ પ્રશ્નમાં વિકલ્પ D સાચો છે, તેથી કોઈ વિકલ્પ ખોટો નથી. પરંતુ પ્રશ્ન અનુસાર, વિકલ્પ D ને ખોટું ગણવું જોઈએ નહીં. આ પ્રશ્નમાં ખામી છે, પરંતુ NEET ધોરણ અનુસાર, વિકલ્પ D સાચો છે તેથી કોઈ વિકલ્પ ખોટો નથી. આ પ્રશ્નને અપવાદરૂપ ગણી શકાય.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 15: તરંગો", "difficulty": "Hard", "num": 5}, {"question": "એક યાંત્રિક તરંગ હવામાં ગતિ કરે છે. જો તરંગની આંચ અને આવર્તન બમણું કરવામાં આવે, તો તરંગ દ્વારા પરિવહન પામતી ઊર્જામાં કેટલો ફેરફાર થશે?", "options": ["A) ઊર્જા ચાર ગણી થશે", "B) ઊર્જા બમણી થશે", "C) ઊર્જા અડધી થશે", "D) ઊર્જા અચળ રહેશે"], "correct": 0, "explanation": "યાંત્રિક તરંગની ઊર્જા તેની આંચના વર્ગના સમપ્રમાણમાં અને આવર્તનના વર્ગના સમપ્રમાણમાં હોય છે. આમ, જો આંચ (A) અને આવર્તન (f) બમણાં કરવામાં આવે, તો ઊર્જા (E ∝ A²f²) ચાર ગણી થશે. બા A) 100 Hz", "B) 200 Hz", "C) 400 Hz", "D) 800 Hz"], "correct": 1, "explanation": "સ્થિત-તરંગમાં બે ક્રમિક પ્રસ્પંદો વચ્ચેનું અંતર λ/2 હોય છે. અહીં λ/2 = 0.85 m ⇒ λ = 1.7 m.\nધ્વનિતરંગનો વેગ v = 340 m/s હોવાથી, આવૃત્તિ f = v/λ = 340/1.7 = 200 Hz.\n\nA) ખોટું છે કારણ કે λ=3.4 m લેવામાં આવ્યું હશે.\nC) ખોટું છે કારણ કે λ=0.85 m લેવામાં આવ્યું હશે.\nD) ખોટું છે કારણ કે λ=0.425 m લેવામાં આવ્યું હશે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 15: તરંગો", "difficulty": "Easy", "num": 35}, {"question": "એક પ્રગામી તરંગમાં, માધ્યમના કણોનું મહત્તમ સ્થાનાંતરણ 0.02 m છે અને તરંગની આવૃત્તિ 50 Hz છે. જો તરંગનો વેગ 20 m/s હોય, તો તરંગની ઊર્જા ઘનતા (energy density) કેટલી હશે? (માધ્યમનો રેખીય દળ-ઘનતા 0.1 kg/m છે)", "options": ["A) 0.1 π² J/m³", "B) 0.2 π² J/m³", "C) 0.4 π² J/m³", "D) 0.05 π² J/m³"], "correct": 1, "explanation": "ઊર્જા ઘનતા (E) = ½ × μ × ω² × A² જ્યાં μ = રેખીય દળ-ઘનતા, ω = કોણીય આવૃત્તિ, A = કંપવિસ્તાર. ω = 2πf = 2π × 50 = 100π rad/s. A = 0.02 m, μ = 0.1 kg/m. E = ½ × 0.1 × (100π)² × (0.02)² = 0.2 π² J/m³. વિકલ્પ A ખોટો છે કારણ કે ω ની ગણતરીમાં ભૂલ છે. વિકલ્પ C અને D માં A અથવા μ ની કિંમતો ખોટી લેવામાં આવી છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 15: તરંગો", "difficulty": "Hard", "num": 36}, {"question": "નીચેનામાંથી કયું વિધાન સ્થિત-તરંગો માટે ખોટું છે?", "options": ["A) સ્થિત-તરંગોમાં ઊર્જાનું સ્થાનાંતરણ થતું નથી.", "B) સ્થિત-તરંગોમાં બધા કણો એકસાથે મહત્તમ કંપવિસ્તાર સાથે કંપે છે.", "C) સ્થિત-તરંગોમાં ગાંઠો અને પ્રસ્પંદો નિશ્ચિત સ્થાને રચાય છે.", "D) સ્થિત-તરંગો બે સમાન આવૃત્તિ અને કંપવિસ્તારના વિરુદ્ધ દિશામાં ગતિ કરતા તરંગોના સંપાતીકરણથી રચાય છે."], "correct": 1, "explanation": "સ્થિત-તરંગોમાં બધા કણો એકસાથે મહત્તમ કંપવિસ્તાર સાથે કંપતા નથી. પ્રસ્પંદો પર કણો મહત્તમ કંપન કરે છે, જ્યારે ગાંઠો પર કણો સ્થિર રહે છે. વિકલ્પ A, C અને D સ્થિત-તરંગોના ગુણધર્મોનું સાચું વર્ણન કરે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 15: તરંગો", "difficulty": "Medium", "num": 37}, {"question": "એક તરંગનું સમીકરણ y = 0.04 sin(3πx – 150πt) છે, જ્યાં x મીટરમાં અને t સેકન્ડમાં છે. આ તરંગની ઝડપ અને દિશા કઈ હશે?", "options": ["A) 50 m/s, ધન x-દિશામાં", "B) 50 m/s, ઋણ x-દિશામાં", "C) 75 m/s, ધન x-દિશામાં", "D) 75 m/s, ઋણ x-દિશામાં"], "correct": 0, "explanation": "તરંગ સમીકરણ y = A sin(kx – ωt) માટે વેગ v = ω/k. અહીં k = 3π, ω = 150π. v = 150π / 3π = 50 m/s. તરંગ ધન x-દિશામાં ગતિ કરે છે કારણ કે સમીકરણમાં (kx – ωt) છે. વિકલ્પ B ઋણ દિશા દર્શાવે છે જે ખોટું છે. વિકલ્પ C અને D માં વેગની ગણતરી ખોટી છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 15: તરંગો", "difficulty": "Easy", "num": 38}, {"question": "એક સ્થિત-તરંગ એક દોરી પર રચાય છે, જેમાં દોરીની લંબાઈ 1.2 m છે અને તરંગની તરંગલંબાઈ 0.8 m છે. જો દોરીના બંને છેડા સ્થિર હોય, તો નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) દોરી પર 3 ગાંઠો અને 2 પ્રસ્પંદો રચાશે.", "B) દોરી પર 4 ગાંઠો અને 3 પ્રસ્પંદો રચાશે.", "C) દોરી પર 2 ગાંઠો અને 3 પ્રસ્પંદો રચાશે.", "D) દોરી પર 3 ગાંઠો અને 3 પ્રસ્પંદો રચાશે."], "correct": 0, "explanation": "સ્થિત-તરંગમાં સ્થિર છેડા માટે, ગાંઠોની સંખ્યા = (L/λ) × 2 + 1 = (1.2/0.8) × 2 + 1 = 4. પરંતુ છેડા પર ગાંઠો હોવાથી, ગાંઠોની કુલ સંખ્યા = 3 (બંને છેડા સહિત). પ્રસ્પંદોની સંખ્યા = ગાંઠોની સંખ્યા - 1 = 2. વિકલ્પ B, C અને D ખોટા છે કારણ કે તેઓ ગાંઠો અને પ્રસ્પંદોની સંખ્યાનું ખોટું વર્ણન કરે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 15: તરંગો", "difficulty": "Hard", "num": 39}, {"question": "એક સમાન દોરી પર પ્રસરતા પ્રગામી તરંગમાં, દોરીના એક નાના ખંડની ગતિ-ઊર્જા મહત્તમ બને છે જ્યારે તે ખંડ –", "options": ["A) મધ્યમાન સ્થિતિમાંથી પસાર થાય છે", "B) મહત્તમ સ્થાનાંતરણની સ્થિતિમાં હોય છે", "C) મધ્યમાન સ્થિતિ તરફ ગતિ કરે છે", "D) મહત્તમ સ્થાનાંતરણથી પાછો ફરે છે"], "correct": 0, "explanation": "પ્રગામી તરંગમાં દોરીના કોઈ પણ ખંડની ગતિ-ઊર્જા મહત્તમ બને છે જ્યારે તે ખંડ મધ્યમાન સ્થિતિમાંથી પસાર થાય છે કારણ કે તે સમયે તેની વેગ મહત્તમ હોય છે. મહત્તમ સ્થાનાંતરણની સ્થિતિમાં વેગ શૂન્ય હોવાથી ગતિ-ઊર્જા પણ શૂન્ય થાય છે. બાકીના વિકલ્પો વેગના મૂલ્યને ખોટી રીતે જોડે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 15: તરંગો", "difficulty": "Medium", "num": 40}, {"question": "એક સ્થિત-તરંગ એક દોરી પર રચાય છે. જો દોરીના બે છેડા નિશ્ચિત હોય અને દોરીની લંબાઈ 1.2 m હોય, તો મૂળભૂત આવૃત્તિ માટે તરંગની તરંગલંબાઈ કેટલી હશે?", "options": ["A) 0.6 m", "B) 1.2 m", "C) 2.4 m", "D) 4.8 m"], "correct": 2, "explanation": "જ્યારે દોરીના બંને છેડા નિશ્ચિત હોય, ત્યારે મૂળભૂત આવૃત્તિ માટે તરંગલંબાઈ λ = 2L હોય છે, જ્યાં L દોરીની લંબાઈ છે. અહીં L = 1.2 m, તેથી λ = 2 × 1.2 = 2.4 m. વિકલ્પ A ખોટો છે કારણ કે તે L/2 દર્શાવે છે. વિકલ્પ B ખોટો છે કારણ કે તે માત્ર દોરીની લંબાઈ દર્શાવે છે. વિકલ્પ D ખોટો છે કારણ કે તે 4L દર્શાવે છે, જે ત્રીજા હાર્મોનિક માટે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 15: તરંગો", "difficulty": "Medium", "num": 41}, {"question": "એક પ્રગામી તરંગનું સમીકરણ y = 0.02 sin(4πx – 200πt) છે, જ્યાં x અને y મીટરમાં છે અને t સેકન્ડમાં છે. આ તરંગની ઝડપ કેટલી હશે?", "options": ["A) 25 m/s", "B) 50 m/s", "C) 100 m/s", "D) 200 m/s"], "correct": 1, "explanation": "તરંગ સમીકરણ y = A sin(kx – ωt) માં, ઝડપ v = ω/k હોય છે. અહીં k = 4π અને ω = 200π છે. તેથી v = 200π / 4π = 50 m/s. વિકલ્પ A ખોટો છે કારણ કે તે ω/(2k) દર્શાવે છે. વિકલ્પ C ખોટો છે કારણ કે તે ω/k નું બમણું દર્શાવે છે. વિકલ્પ D ખોટો છે કારણ કે તે ω દર્શાવે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 15: તરંગો", "difficulty": "Medium", "num": 42}, {"question": "એક ધ્વનિતરંગ હવામાં 340 m/s ની ઝડપથી ગતિ કરે છે. જો તેની આવૃત્તિ 500 Hz હોય, તો બે ક્રમિક સંપીડનો વચ્ચેનું અંતર કેટલું હશે?", "options": ["A) 0.34 m", "B) 0.68 m", "C) 1.02 m", "D) 1.36 m"], "correct": 1, "explanation": "ધ્વનિતરંગમાં બે ક્રમિક સંપીડનો વચ્ચેનું અંતર તરંગલંબાઈ λ જેટલું હોય છે. તરંગલંબાઈ λ = v/f, જ્યાં v ઝડપ અને f આવૃત્તિ છે. અહીં λ = 340/500 = 0.68 m. વિકલ્પ A ખોટો છે કારણ કે તે λ/2 દર્શાવે છે. વિકલ્પ C અને D ખોટા છે કારણ કે તે અનુક્રમે 1.5λ અને 2λ દર્શાવે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 15: તરંગો", "difficulty": "Easy", "num": 43}, {"question": "એક પ્રયોગમાં, એક સ્થિત-તરંગ એક દોરી પર રચાય છે. જો દોરીની લંબાઈ 1.5 m હોય અને તેના બંને છેડા નિશ્ચિત હોય, તો ત્રીજા હાર્મોનિક માટે તરંગની આવૃત્તિ કેટલી હશે? (દોરી પર તરંગની ઝડપ 60 m/s છે)", "options": ["A) 20 Hz", "B) 40 Hz", "C) 60 Hz", "D) 80 Hz"], "correct": 2, "explanation": "નિશ્ચિત છેડાવાળી દોરી માટે, n-મા હાર્મોનિકની આવૃત્તિ fₙ = nv/(2L) હોય છે. અહીં n = 3, v = 60 m/s, અને L = 1.5 m. તેથી f₃ = 3×60/(2×1.5) = 60 Hz. વિકલ્પ A ખોટો છે કારણ કે તે મૂળભૂત આવૃત્તિ દર્શાવે છે. વિકલ્પ B ખોટો છે કારણ કે તે બીજા હાર્મોનિકની આવૃત્તિ દર્શાવે છે. વિકલ્પ D ખોટો છે કારણ કે તે ચોથા હાર્મોનિકની આવૃત્તિ દર્શાવે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 15: તરંગો", "difficulty": "Hard", "num": 44}, {"question": "એક પ્રગામી તરંગ હવામાં ગતિ કરે છે. જો તરંગની આવૃત્તિ 500 Hz અને તરંગલંબાઈ 0.68 m હોય, તો તરંગ દ્વારા એક સેકન્ડમાં પરિવહન પામતી ઊર્જા કયા પરિબળ પર આધાર રાખે છે?", "options": ["A) માધ્યમના કણોની કંપન આવૃત્તિ અને વેગ", "B) તરંગની આંચ અને આવૃત્તિ", "C) માધ્યમની ઘનતા અને તરંગની તરંગલંબાઈ", "D) માધ્યમના કણોની સ્થિતિસ્થાપકતા અને તરંગની આંચ"], "correct": 1, "explanation": "તરંગ દ્વારા ઊર્જાનું પરિવહન તરંગની આંચ (A) અને આવૃત્તિ (f) પર આધાર રાખે છે. ઊર્જાનું પરિવહન દર (P) સૂત્ર P = (1/2) μ ω² A² v દ્વારા આપવામાં આવે છે, જ્યાં μ માધ્યમનું દળ પ્રતિ એકમ લંબાઈ, ω કોણીય આવૃત્તિ, A આંચ, અને v તરંગવેગ છે. કોણીય આવૃત્તિ ω = 2πf હોવાથી, P આંચ અને આવૃત્તિ પર આધાર રાખે છે. અહીં, વિકલ્પ B સીધો જ આ પરિબળોને દર્શાવે છે. વિકલ્પ A, C, અને D અપૂર્ણ અથવા અસંપૂર્ણ પરિબળો દર્શાવે છે, જેમાં કંપન આવૃત્તિ અને વેગ (A) માત્ર કણોની ગતિને દર્શાવે છે, ઘનતા અને તરંગલંબાઈ (C) માત્ર માધ્યમના ગુણધર્મો છે, અને સ્થિતિસ્થાપકતા અને આંચ (D) અપૂર્ણ છે કારણ કે આવૃત્તિનો સમાવેશ થતો નથી.", "ncert_ref": "Class XI - પ્રકરણ 15: તરંગો", "difficulty": "Medium", "num": 45}, {"question": "એક તરંગનું સમીકરણ y = 0.04 sin(πx – 50πt) છે, જ્યાં x મીટરમાં અને t સેકન્ડમાં છે. આ તરંગ માટે નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) તરંગની તરંગલંબાઈ 2 m છે.", "B) તરંગની આવૃત્તિ 25 Hz છે.", "C) તરંગનો વેગ 50 m/s છે.", "D) તરંગનું કંપવિસ્તાર 0.04 m છે."], "correct": 2, "explanation": "તરંગનું સમીકરણ y = A sin(kx – ωt) છે, જ્યાં k = π અને ω = 50π. તરંગલંબાઈ λ = 2π/k = 2 m, આવૃત્તિ f = ω/2π = 25 Hz, અને વેગ v = ω/k = 50 m/s. વિકલ્પ B ખોટો છે કારણ કે આવૃત્તિ 25 Hz છે, પરંતુ વિકલ્પમાં તેને સાચું કહેવામાં આવ્યું છે. વિકલ્પ A, C અને D સાચા છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 15: તરંગો", "difficulty": "Easy", "num": 46}, {"question": "એક પ્રયોગમાં, એક સ્થિત-તરંગ એક દોરી પર રચાય છે, જેમાં દોરીની લંબાઈ 1.5 m છે અને દોરીના બંને છેડા નિશ્ચિત છે. જો તરંગનો વેગ 60 m/s હોય, તો દોરી પર રચાતા મૂળભૂત સ્વરની આવૃત્તિ કેટલી હશે?", "options": ["A) 10 Hz", "B) 20 Hz", "C) 30 Hz", "D) 40 Hz"], "correct": 1, "explanation": "નિશ્ચિત છેડાવાળી દોરી માટે મૂળભૂત સ્વરની આવૃત્તિ f = v/2L દ્વારા આપવામાં આવે છે. અહીં, v = 60 m/s અને L = 1.5 m. તેથી, f = 60 / (2 × 1.5) = 20 Hz. વિકલ્પ A, C અને D ખોટા છે કારણ કે તેમાં ગણતરીમાં ભૂલ છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 15: તરંગો", "difficulty": "Medium", "num": 47}, {"question": "એક પ્રયોગમાં, એક સ્થિત-તરંગ એક દોરી પર રચાય છે, જેમાં દોરીના બંને છેડા નિશ્ચિત છે. જો દોરીની લંબાઈ 1.2 m હોય અને તરંગની આવૃત્તિ 100 Hz હોય, તો તરંગનો વેગ કેટલો હશે? (ધારો કે દોરી પર મૂળભૂત સ્વર રચાય છે.)", "options": ["A) 120 m/s", "B) 240 m/s", "C) 60 m/s", "D) 480 m/s"], "correct": 1, "explanation": "સ્થિત-તરંગમાં જ્યારે દોરીના બંને છેડા નિશ્ચિત હોય, ત્યારે મૂળભૂત સ્વર માટે તરંગલંબાઈ λ = 2L હોય છે, જ્યાં L દોરીની લંબાઈ છે. અહીં L = 1.2 m, તેથી λ = 2 × 1.2 = 2.4 m. તરંગનો વેગ v = આવૃત્તિ × તરંગલંબાઈ = 100 Hz × 2.4 m = 240 m/s. આથી સાચો વિકલ્પ B છે. વિકલ્પ A ખોટો છે કારણ કે તેમાં λ = L ધારવામાં આવ્યું છે. વિકલ્પ C અને D ખોટા છે કારણ કે તેમાં ગણતરીની ભૂલ છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 15: તરંગો", "difficulty": "Medium", "num": 48}, {"question": "એક પ્રગામી તરંગનું સમીકરણ y = 0.02 sin(πx – 50πt) છે, જ્યાં x મીટરમાં અને t સેકન્ડમાં છે. આ તરંગની ઊર્જા-ઘનતા (energy density) માટે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) ઊર્જા-ઘનતા સમય સાથે બદલાતી નથી.", "B) ઊર્જા-ઘનતા સમય સાથે સતત વધે છે.", "C) ઊર્જા-ઘનતા સમય સાથે આવર્ત રીતે બદલાય છે.", "D) ઊર્જા-ઘનતા માત્ર સ્થાન સાથે બદલાય છે, સમય સાથે નહીં."], "correct": 0, "explanation": "પ્રગામી તરંગમાં ઊર્જા-ઘનતા સમય સાથે બદલાતી નથી, કારણ કે તરંગ સ્થિર ઝડપથી ગતિ કરે છે અને ઊર્જાનું વિતરણ સમાન રહે છે. તરંગનું સમીકરણ દર્શાવે છે કે કંપવિસ્તાર અને આવૃત્તિ સ્થિર છે, તેથી ઊર્જા-ઘનતા પણ સ્થિર રહે છે. આથી વિકલ્પ A સાચો છે. વિકલ્પ B, C અને D ખોટાં છે કારણ કે તેઓ ઊર્જા-ઘનતામાં સમય સાથે ફેરફાર દર્શાવે છે, જે પ્રગામી તરંગ માટે સાચું નથી.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 15: તરંગો", "difficulty": "Easy", "num": 49}, {"question": "એક સમાન દોરી પર પ્રસરતા એક પ્રગામી તરંગમાં, દોરીના એક નાના ખંડની ગતિ-ઊર્જા અને સ્થિતિ-ઊર્જા વચ્ચેનો સંબંધ નીચેનામાંથી કયો છે? (ધારો કે દોરીનું દળ પ્રતિ એકમ લંબાઈ અચળ છે.)", "options": ["A) ગતિ-ઊર્જા અને સ્થિતિ-ઊર્જા હંમેશા સમાન હોય છે", "B) ગતિ-ઊર્જા હંમેશા સ્થિતિ-ઊર્જા કરતાં વધારે હોય છે", "C) ગતિ-ઊર્જા અને સ્થિતિ-ઊર્જા વચ્ચેનો ગુણોત્તર સમય સાથે બદલાતો રહે છે, પરંતુ તેમનો સરવાળો અચળ રહે છે", "D) ગતિ-ઊર્જા અને સ્થિતિ-ઊર્જા બંને શૂન્ય હોય છે જ્યારે કણ મધ્યમાન સ્થિતિમાં હોય"], "correct": 2, "explanation": "પ્રગામી તરંગમાં, દોરીના કોઈ પણ નાના ખંડની કુલ યાંત્રિક ઊર્જા (ગતિ-ઊર્જા + સ્થિતિ-ઊર્જા) અચળ રહે છે. જ્યારે કણ મધ્યમાન સ્થિતિમાંથી પસાર થાય છે, ત્યારે તેની ગતિ મહત્તમ હોય છે અને સ્થિતિ-ઊર્જા લઘુતમ (શૂન્ય નહીં) હોય છે. જ્યારે કણ મહત્તમ સ્થાનાંતર પર હોય છે, ત્યારે ગતિ-ઊર્જા શૂન્ય અને સ્થિતિ-ઊર્જા મહત્તમ હોય છે. આમ, ગતિ-ઊર્જા અને સ્થિતિ-ઊર્જા વચ્ચેનો ગુણોત્તર સમય સાથે બદલાતો રહે છે, પરંતુ તેમનો સરવાળો અચળ રહે છે. વિકલ્પ A ખોટો છે કારણ કે બંને ઊર્જાઓ હંમેશા સમાન હોતી નથી. વિકલ્પ B ખોટો છે કારણ કે ગતિ-ઊર્જા હંમેશા સ્થિતિ-ઊર્જા કરતાં વધારે હોતી નથી. વિકલ્પ D ખોટો છે કારણ કે ગતિ-ઊર્જા અને સ્થિતિ-ઊર્જા બંને એકસાથે શૂન્ય હોતી નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 15: તરંગો", "difficulty": "Hard", "num": 50}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
