<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - આધુનિક આવર્ત નિયમ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 આધુનિક આવર્ત નિયમ</span>
                <span>🎯 Hard</span>
                <span>📝 25 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "મેન્ડલના અનુવંશિકતાના નિયમો પૈકી કયો નિયમ આધુનિક આવર્ત નિયમ તરીકે ઓળખાય છે અને તે કયા સિદ્ધાંત પર આધારિત છે?", "options": ["A) પ્રભાવિતાનો નિયમ - એલિલની પ્રભાવિતા અને અપ્રભાવિતા પર", "B) પૃથક્કરણનો નિયમ - ગેમેટ બનતી વખતે એલિલનું પૃથક્કરણ થવું", "C) સ્વતંત્ર વિતરણનો નિયમ - બહુવિધ જનીનોનું સ્વતંત્ર રીતે વિતરણ થવું", "D) આવર્તનો નિયમ - પ્રજનન દરમ્યાન પિતૃજન્ય લક્ષણોનો પુનરાવર્તન"], "correct": 1, "explanation": "આધુનિક આવર્ત નિયમ એ મેન્ડલના પૃથક્કરણના નિયમનો આધુનિક સ્વરૂપ છે, જે ગેમેટ બનતી વખતે એલિલનું પૃથક્કરણ થાય છે તે સિદ્ધાંત પર આધારિત છે. A) પ્રભાવિતાનો નિયમ એલિલની પ્રભાવિતા અને અપ્રભાવિતા સાથે સંબંધિત છે, પરંતુ તે આધુનિક આવર્ત નિયમ નથી. C) સ્વતંત્ર વિતરણનો નિયમ બહુવિધ જનીનોના વિતરણ સાથે સંબંધિત છે. D) આવર્તનો નિયમ એ મેન્ડલના મૂળ નિયમોમાંનો એક છે, પરંતુ તે આધુનિક સ્વરૂપ નથી.", "ncert_ref": "Class XII - Chapter 5: અનુવંશિકતા અને વૈવિધ્યતાના સિદ્ધાંતો", "difficulty": "Hard", "num": 1}, {"question": "જો એક ડાયહાઇબ્રિડ ક્રોસમાં F1 પેઢીના સંતાનોમાં 9:3:3:1 પ્રમાણ મળે છે, તો કયો નિયમ લાગુ પડે છે અને શા માટે?", "options": ["A) પૃથક્કરણનો નિયમ - ગેમેટમાં એલિલનું પૃથક્કરણ થાય છે", "B) સ્વતંત્ર વિતરણનો નિયમ - બે જનીનો વચ્ચે સ્વતંત્ર વિતરણ થાય છે", "C) પ્રભાવિતાનો નિયમ - પ્રભાવી એલિલ અપ્રભાવી એલિલ પર હાવી થાય છે", "D) આવર્તનો નિયમ - પિતૃજન્ય લક્ષણોનો પુનરાવર્તન થાય છે"], "correct": 1, "explanation": "ડાયહાઇબ્રિડ ક્રોસમાં 9:3:3:1 પ્રમાણ સ્વતંત્ર વિતરણના નિયમને દર્શાવે છે, જ્યાં બે જનીનો વચ્ચે સ્વતંત્ર રીતે વિતરણ થાય છે. A) પૃથક્કરણનો નિયમ એક જ જનીન માટે લાગુ પડે છે. C) પ્રભાવિતાનો નિયમ એલિલની પ્રભાવિતા સાથે સંબંધિત છે. D) આવર્તનો નિયમ પિતૃજન્ય લક્ષણોના પુનરાવર્તન સાથે સંબંધિત છે, પરંતુ તે ડાયહાઇબ્રિડ ક્રોસમાં લાગુ પડતો નથી.", "ncert_ref": "Class XII - Chapter 5: અનુવંશિકતા અને વૈવિધ્યતાના સિદ્ધાંતો", "difficulty": "Hard", "num": 2}, {"question": "મેન્ડલના નિયમોના આધુનિક સ્વરૂપ અનુસાર, કયા પરિબળને લીધે પૃથક્કરણનો નિયમ અપવાદરૂપ બને છે?", "options": ["A) જનીનની સંયુક્તતા (Linkage)", "B) એલિલની પ્રભાવિતા", "C) સંપૂરક જનીન (Complementary tion": "જનીન A અને B વચ્ચે પૂર્ણ લિંકેજ હોવાને લીધે, તેઓ એકબીજા સાથે સંપૂર્ણ રીતે જોડાયેલા રહેશે અને F2 પેઢીમાં ફક્ત પેરેન્ટલ પ્રકાર જ મળશે. સહલક્ષણી (co-dominant) સ્વરૂપ માટે, ફક્ત બે પ્રકારના ગેમીટ્સ (AB અને ab) બનશે, જે 1:1 પ્રમાણમાં ફીનોટાઇપિક પ્રમાણ આપશે. 9:3:3:1 ડાયહાઇબ્રિડ ક્રોસનું પ્રમાણ છે જ્યારે જનીનો સ્વતંત્ર વિતરણ પામે છે. 3:1 અને 1:2:1 એ મોનોહાઇબ્રિડ ક્રોસના પ્રમાણ છે, જે અહીં લાગુ પડતું નથી.", "ncert_ref": "Class XII - પ્રકરણ 5: અનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "difficulty": "Hard", "num": 11}, {"question": "મેન્ડલના આધુનિક આવર્ત નિયમ અનુસાર, જો એક જીવમાં જનીન A અને જનીન B વચ્ચે રિકોમ્બિનેશન ફ્રિક્વન્સી 50% હોય, તો આ જનીનો વિશે કયું વિધાન સાચું છે?", "options": ["A) તેઓ એક જ વર્ણસૂત્ર પર સ્થિત છે અને એકબીજાથી દૂર છે", "B) તેઓ વિવિધ વર્ણસૂત્રો પર સ્થિત છે", "C) તેઓ એક જ વર્ણસૂત્ર પર સ્થિત છે અને એકબીજાથી નજીક છે", "D) તેઓ એક જ લોકસ પર સ્થિત છે"], "correct": 1, "explanation": "50% રિકોમ્બિનેશન ફ્રિક્વન્સી એ સ્વતંત્ર વિતરણનું સૂચક છે, જે મેન્ડલના સ્વતંત્ર વિતરણના નિયમ અનુસાર થાય છે. આનો અર્થ એ કે જનીન A અને જનીન B વિવિધ વર્ણસૂત્રો પર સ્થિત છે. જો તેઓ એક જ વર્ણસૂત્ર પર સ્થિત હોત, તો રિકોમ્બિનેશન ફ્રિક્વન્સી 50% કરતાં ઓછી હોત. એક જ લોકસ પર સ્થિત જનીનોની રિકોમ્બિનેશન ફ્રિક્વન્સી શૂન્ય હોવી જોઈએ.", "ncert_ref": "Class XII - પ્રકરણ 5: અનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "difficulty": "Hard", "num": 12}, {"question": "મેન્ડલના આધુનિક આવર્ત નિયમ અનુસાર, જો એક જીવમાં જનીન A, B, અને C ત્રણેય જનીનો એક જ વર્ણસૂત્ર પર સ્થિત હોય અને A-B વચ્ચે 10 cM અંતર હોય તથા B-C વચ્ચે 20 cM અંતર હોય, તો A અને C વચ્ચેનું અંતર કેટલું હશે?", "options": ["A) 10 cM", "B) 20 cM", "C) 30 cM", "D) 50 cM"], "correct": 2, "explanation": "વર્ણસૂત્ર પરના જનીનો વચ્ચેનું અંતર એ રેખીય ક્રમ અનુસાર ગણતરી થાય છે. A-B વચ્ચે 10 cM અને B-C વચ્ચે 20 cM હોવાને લીધે, A અને C વચ્ચેનું કુલ અંતર 10 + 20 = 30 cM થશે. 10 cM, 20 cM, અને 50 cM એ અંશત: અથવા અતિરેકી ગણતરીઓ છે, જે અહીં લાગુ પડતી નથી.", "ncert_ref": "Class XII - પ્રકરણ 5: અનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "difficulty": "Hard", "num": 13}, {"question": "એક જીવમાં જનીન P અને Q વચ્ચે રિકોમ્બિનેશન ફ્રિક્વન્સી 25% છે. જો આ જીવનો ક્રોસ કરવામાં આવે તો F2 પેઢીમાં P અને Q જનીનોના હેટરોઝાઇગસ સ્વરૂપ માટે કયું પ્રમાણ અપેક્ષિત હશે?", "options": ["A) 25%", "B) 50%", "C) 75%", "D) 100%"], "correct": 1, "explanation": "રિકોમ્બિનેશન ફ્રિક્વન્સી 25% હોવાને લીધે, 25% રિકોમ્બિનન્ટ ગેમીટ્સ અને 75% પેરેન્ટલ ગેમીટ્સ બનશે. હેટરોઝાઇગસ સ્વરૂપ માટે, F2 પેઢીમાં હેટરોઝાઇગસ સંતાનોનું પ્રમાણ 2 × (રિકોમ્બિનેશન ફ્રિક્વન્સી) × (1 - રિકોમ્બિનેશન ફ્રિક્વન્સી) = 2 × 0.25 × 0.75 = 0.375 અથવા 37.5% હોવું જોઈએ. પરંતુ પ્રશ્નમાં હેટરોઝાઇગસ સ્વરૂપ માટે પૂછવામાં આવ્યું છે, જે ડાયહાઇબ્રિડ ક્રોસમાં 50% હેટરોઝાઇગસ સંતાનો અપેક્ષિત છે (જ્યારે રિકોમ્બિનેશન ફ્રિક્વન્સી 25% હોય ત્યારે પણ). બાકીના વિકલ્પો ગણતરી સાથે મેળ ખાતા નથી.", "ncert_ref": "Class XII - પ્રકરણ 5: અનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "difficulty": "Hard", "num": 14}, {"question": "એક જીવમાં જનીન A અને જનીન B વચ્ચે 12 મેગા બેઝ (cM) અંતર છે. જો આ જીવમાં જનીન A અને જનીન C વચ્ચે 5 cM અંતર હોય અને જનીન B અને જનીન C વચ્ચે 17 cM અંતર હોય, તો આ ત્રણ જનીનોની સ્થિતિ વિશે કયું વિધાન સાચું છે?", "options": ["A) જનીન A અને જનીન B વચ્ચે જનીન C સ્થિત છે, પરંતુ જનીન A અને C વચ્ચે રિકોમ્બિનેશન ફ્રિક્વન્સી 5% હશે", "B) જનીન B અને જનીન C વચ્ચે જનીન A સ્થિત છે, પરંતુ જનીન B અને A વચ્ચે રિકોમ્બિનેશન ફ્રિક્વન્સી 12% હશે", "C) જનીન A અને જનીન C વચ્ચે જનીન B સ્થિત છે, પરંતુ જનીન A અને B વચ્ચે રિકોમ્બિનેશન ફ્રિક્વન્સી 5% હશે", "D) જનીન A, B, અને C એક જ લોકસ પર સ્થિત છે, પરંતુ તેમની વચ્ચેનું કુલ અંતર 34 cM હશે"], "correct": 0, "explanation": "જનીન A અને B વચ્ચે 12 cM અંતર છે, જ્યારે A અને C વચ્ચે 5 cM અને B અને C વચ્ચે 17 cM અંતર છે. આ અંતરોની સરખામણીથી જણાય છે કે જનીન C, જનીન A અને B વચ્ચે સ્થિત છે. કારણ કે A-C (5 cM) + C-B (12 cM) = 17 cM (A-B) થાય છે, જે બરાબર B-C અંતર (17 cM) જેટલું છે. આથી, જનીન C, A અને B વચ્ચે સ્થિત છે. રિકોમ્બિનેશન ફ્રિક્વન્સી A અને C વચ્ચે 5% હશે, જે અંતરના સીધા પ્રમાણમાં છે. બાકીના વિકલ્પો ખોટા છે કારણ કે તેઓ જનીનોની સ્થિતિ અથવા રિકોમ્બિનેશન ફ્રિક્વન્સીના ગણિતને ચુકાદે છે.", "ncert_ref": "Class XII - પ્રકરણ 5: અનુવંશિકતા અને ભિન્નતા", "difficulty": "Hard", "num": 15}, {"question": "એક જીવમાં જનીન A અને જનીન B વચ્ચે 50% રિકોમ્બિનેશન ફ્રિક્વન્સી જોવા મળે છે. આની શી સૌથી યોગ્ય વ્યાખ્યા છે?", "options": ["A) A અને B જનીનો એકબીજાથી 50 cM અંતરે સ્થિત છે.", "B) A અને B જનીનો સંપૂર્ણપણે સહલિંકેજમાં છે.", "C) A અને B જનીનો વિવિધ વર્ણસૂત્રો પર સ્થિત છે.", "D) A અને B જનીનો એક જ લોકસ પર સ્થિત છે અને તેમની વચ્ચે ક્રોસિંગ ઓવર થતું નથી."], "correct": 2, "explanation": "50% રિકોમ્બિનેશન ફ્રિક્વન્સી એ સૂચવે છે કે A અને B જનીનો સ્વતંત્ર રીતે વિતરિત થાય છે, જે મેન્ડલના સ્વતંત્ર વિતરણના નિયમ અનુસાર વિવિધ વર્ણસૂત્રો પર સ્થિત હોવા જોઈએ. A વિકલ્પ ખોટો છે કારણ કે 50 cM અંતર એ સંપૂર્ણ લિંકેજ નહીં પણ સ્વતંત્ર વિતરણ સૂચવે છે. B વિકલ્પ ખોટો છે કારણ કે સંપૂર્ણ સહલિંકેજમાં રિકોમ્બિનેશન ફ્રિક્વન્સી 0% હોવી જોઈએ. D વિકલ્પ ખોટો છે કારણ કે એક જ લોકસ પર સ્થિત જનીનો વચ્ચે ક્રોસિંગ ઓવર થવું જરૂરી છે, પરંતુ 50% ફ્રિક્વન્સી સ્વતંત્ર વિતરણ સૂચવે છે.", "ncert_ref": "Class XII - પ્રકરણ 5: વંશવિજ્ઞાનના સિદ્ધાંતો", "difficulty": "Hard", "num": 16}, {"question": "એક ડાયહાઇબ્રિડ ક્રોસમાં, F2 પેઢીમાં ફિનોટાઇપિક ગુણોત્તર 9:3:3:1 ન મળે તો કયો પરિબળ જવાબદાર હોવાનું સૌથી વધુ સંભવિત છે?", "options": ["A) જનીનો વચ્ચે સંપૂર્ણ પ્રભાવિતા", "B) જનીનો વચ્ચે અપૂર્ણ પ્રભાવિતા", "C) જનીનો એક જ વર્ણસૂત્ર પર સ્થિત છે", "D) જનીનો વચ્ચે એપિસ્ટેસિસ"], "correct": 2, "explanation": "9:3:3:1 ગુણોત્તર મેળવવા માટે જનીનો સ્વતંત્ર રીતે વિતરિત થવા જોઈએ. જો જનીનો એક જ વર્ણસૂત્ર પર સ્થિત હોય, તો લિંકેજને લીધે ગુણોત્તર બદલાઈ શકે છે. A વિકલ્પ ખોટો છે કારણ કે સંપૂર્ણ પ્રભાવિતા 9:3:3:1 ગુણોત્તર માટે જરૂરી છે. B વિકલ્પ ખોટો છે કારણ કે અપૂર્ણ પ્રભાવિતા 1:2:1 ગુણોત્તર તરફ દોરી શકે. D વિકલ્પ ખોટો છે કારણ કે એપિસ્ટેસિસ 9:3:4 અથવા અન્ય ગુણોત્તર તરફ દોરી શકે.", "ncert_ref": "Class XII - પ્રકરણ 5: વંશવિજ્ઞાનના સિદ્ધાંતો", "difficulty": "Hard", "num": 17}, {"question": "જો એક જીવમાં જનીન P અને Q વચ્ચે રિકોમ્બિનેશન ફ્રિક્વન્સી 0% હોય, તો આની શી સૌથી યોગ્ય વ્યાખ્યા છે?", "options": ["A) P અને Q જનીનો એકબીજાથી 0 cM અંતરે સ્થિત છે.", "B) P અને Q જનીનો સંપૂર્ણપણે સહલિંકેજમાં છે.", "C) P અને Q જનીનો વિવિધ વર્ણસૂત્રો પર સ્થિત છે.", "D) P અને Q જનીનો એક જ લોકસ પર સ્થિત છે અને તેમની વચ્ચે ક્રોસિંગ ઓવર થતું નથી."], "correct": 1, "explanation": "0% રિકોમ્બિનેશન ફ્રિક્વન્સી એ સૂચવે છે કે P અને Q જનીનો સંપૂર્ણપણે સહલિંકેજમાં છે, એટલે કે તેઓ એકબીજાની ખૂબ નજીક સ્થિત છે અને ક્રોસિંગ ઓવર થતું નથી. A વિકલ્પ અંશતઃ સાચો છે, પરંતુ 0 cM અંતર એ સંપૂર્ણ સહલિંકેજ સૂચવે છે. C વિકલ્પ ખોટો છે કારણ કે વિવિધ વર્ણસૂત્રો પર સ્થિત જનીનો વચ્ચે રિકોમ્બિનેશન ફ્રિક્વન્સી 50% હોવી જોઈએ. D વિકલ્પ ખોટો છે કારણ કે એક જ લોકસ પર સ્થિત જનીનો વચ્ચે ક્રોસિંગ ઓવર થવું શક્ય છે, પરંતુ 0% ફ્રિક્વન્સી સંપૂર્ણ સહલિંકેજ સૂચવે છે.", "ncert_ref": "Class XII - પ્રકરણ 5: વંશવિજ્ઞાનના સિદ્ધાંતો", "difficulty": "Hard", "num": 18}, {"question": "એક જીવમાં ત્રણ જનીનો X, Y અને Z એક જ વર્ણસૂત્ર પર સ્થિત છે. જનીન X અને Y વચ્ચે રિકોમ્બિનેશન આવૃત્તિ 15% છે, જ્યારે જનીન Y અને Z વચ્ચે રિકોમ્બિનેશન આવૃત્તિ 10% છે. જો જનીન X અને Z વચ્ચે રિકોમ્બિનેશન આવૃત્તિ 25% હોય, તો આ પરિસ્થિતિ માટે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) જનીન X, Y અને Z વર્ણસૂત્ર પર સીધી રેખામાં ગોઠવાયેલા છે.", "B) જનીન Y એ જનીન X અને Z ની વચ્ચે સ્થિત છે, પરંતુ તેનું સ્થાન વર્ણસૂત્ર પર અલગ છે.", "C) જનીન X અને Z વચ્ચે ડબલ ક્રોસિંગ-ઓવર થાય છે, જેના કારણે રિકોમ્બિનેશન આવૃત્તિ વધારે છે.", "D) આ પરિસ્થિતિ મેન્ડલના આધુનિક આવર્ત નિયમનું ઉલ્લંઘન કરે છે."], "correct": 2, "explanation": "સાચો જવાબ વિકલ્પ C છે. જનીન X અને Y વચ્ચે 15% રિકોમ્બિનેશન અને Y અને Z વચ્ચે 10% રિકોમ્બિનેશન હોય તો, જો જનીનો સીધી રેખામાં ગોઠવાયેલા હોત તો X અને Z વચ્ચે રિકોમ્બિનેશન આવૃત્તિ 25% નહીં, પરંતુ 5% (15% - 10%) અથવા 25% (15% + 10%) હોઈ શકે. પરંતુ અહીં 25% આવૃત્તિ દર્શાવે છે કે ડબલ ક્રોસિંગ-ઓવર થયું છે, જેના કારણે રિકોમ્બિનેશન આવૃત્તિ વધારે છે. વિકલ્પ A ખોટો છે કારણ કે સીધી રેખામાં ગોઠવણી હોય તો રિકોમ્બિનેશન આવૃત્તિનો સરવાળો અથવા તફાવત થાય. વિકલ્પ B ખોટો છે કારણ કે જનીન Y નું સ્થાન અલગ હોવાને કારણે આવી પરિસ્થિતિ ઉદ્ભવતી નથી. વિકલ્પ D ખોટો છે કારણ કે આ પરિસ્થિતિ મેન્ડલના આધુનિક આવર્ત નિયમનું ઉલ્લંઘન નથી, પરંતુ nance)ના કિસ્સામાં જોવા મળે છે. અહીં, સહપ્રભાવિતાનો નિયમ એ આધુનિક આવર્ત નિયમનો અપવાદ છે, જ્યાં બે એલિલ્સ પોતપોતાની અસર દર્શાવે છે. પૃથક્કરણનો નિયમ (A) અને સ્વતંત્ર વિતરણનો નિયમ (B) આ કિસ્સામાં લાગુ પડતા નથી. પ્રબળતાનો નિયમ (C) 3:1 ગુણોત્તર દર્શાવે છે, જે અહીં નથી.", "ncert_ref": "Class XII - Chapter 5: અનુવંશિકતા અને વિવિધતા", "difficulty": "Hard", "num": 24}, {"question": "એક જીવમાં જનીન A, B, અને C એક જ વર્ણસૂત્ર પર સ્થિત છે. જો A અને B વચ્ચે 10 cM, B અને C વચ્ચે 15 cM, અને A અને C વચ્ચે 5 cM અંતર હોય, તો આ જનીનોની ક્રમશઃ ગોઠવણ કઈ હશે?", "options": ["A) A - C - B", "B) A - B - C", "C) C - A - B", "D) B - A - C"], "correct": 0, "explanation": "જનીનોની ક્રમશઃ ગોઠવણ નક્કી કરવા માટે રિકોમ્બિનેશન ફ્રિક્વન્સી (cM) ના મૂલ્યોનો ઉપયોગ કરવામાં આવે છે. અહીં, A અને C વચ્ચે 5 cM (સૌથી ઓછું અંતર) અને B અને C વચ્ચે 15 cM (સૌથી વધુ અંતર) છે. આથી, A અને C નજીકમાં હોવા જોઈએ, જ્યારે B તેનાથી દૂર હોવું જોઈએ. આથી, ક્રમ A - C - B હશે. બાકીના વિકલ્પો (B, C, D) આ અંતરો સાથે સુસંગત નથી.", "ncert_ref": "Class XII - પ્રકરણ 5: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "difficulty": "Hard", "num": 25}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
