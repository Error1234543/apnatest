<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>

        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>

    <script>
        const questionsData = [{"question": "જ્યારે ક્લોરિન પરમાણુ ઇલેક્ટ્રોન મેળવીને Cl⁻ આયન બને છે, ત્યારે તેની આયનીય ત્રિજ્યા પરમાણ્વીય ત્રિજ્યાથી કેવી રીતે બદલાય છે?", "options": ["A) આયનીય ત્રિજ્યા વધે છે કારણ કે ઇલેક્ટ્રોન-ઇલેક્ટ્રોન વિકર્ષણ વધે છે અને સક્રિય ન્યુક્લિયર આકર્ષણ ઘટે છે.", "B) આયનીય ત્રિજ્યા ઘટે છે કારણ કે ન્યુક્લિયસ પરનો વીજભાર વધે છે.", "C) આયનીય ત્રિજ્યા અચળ રહે છે કારણ કે ઇલેક્ટ્રોનનો એક કક્ષા ઉમેરાય છે.", "D) આયનીય ત્રિજ્યા ઘટે છે કારણ કે ઇલેક્ટ્રોનનો એક કક્ષા ઉમેરાય છે અને ન્યુક્લિયર આકર્ષણ વધે છે."], "correct": 0, "explanation": "ક્લોરિન પરમાણુ ઇલેક્ટ્રોન મેળવીને Cl⁻ આયન બને છે, ત્યારે ઇલેક્ટ્રોન-ઇલેક્ટ્રોન વિકર્ષણ વધે છે અને સક્રિય ન્યુક્લિયર આકર્ષણ (effective nuclear charge) ઘટે છે, જેના કારણે ઇલેક્ટ્રોન મેઘ ફેલાય છે અને આયનીય ત્રિજ્યા વધે છે. વિકલ્પ B, C, અને D ખોટા છે કારણ કે તે ન્યુક્લિયર આકર્ષણ અથવા કક્ષાની ખોટી સમજૂતી આપે છે.", "ncert_ref": "Class XI - અધ્યાય 3: રાસાયણિક બંધન અને આણ્વીય રચના", "difficulty": "Hard", "num": 1}, {"question": "નીચેનામાંથી કયા જોડીમાં કેટાયનની ત્રિજ્યા એનાયન કરતાં મોટી હોય છે?", "options": ["A) Na⁺ અને F⁻", "B) Mg²⁺ અને O²⁻", "C) Al³⁺ અને N³⁻", "D) K⁺ અને Cl⁻"], "correct": 3, "explanation": "K⁺ અને Cl⁻ બંને આયનોમાં ઇલેક્ટ્રોનની સંખ્યા સરખી હોય છે (18 ઇલેક્ટ્રોન), પરંતુ K⁺માં ન્યુક્લિયર વીજભાર +19 હોય છે જ્યારે Cl⁻માં +17 હોય છે. ન્યુક્લિયર વીજભાર ઓછો હોવાથી Cl⁻માં ઇલેક્ટ્રોન મેઘ વધુ ફેલાયેલો હોય છે, પરંતુ K⁺ની ત્રિજ્યા Cl⁻ કરતાં ઓછી હોય છે. જોકે, વિકલ્પ Dમાં K⁺ અને Cl⁻ની ત્રિજ્યા લગભગ સરખી હોય છે, પરંતુ K⁺ની ત્રિજ્યા થોડી ઓછી હોય છે. જ્યારે અન્ય વિકલ્પોમાં કેટાયનની ત્રિજ્યા એનાયન કરતાં નોંધપાત્ર રીતે ઓછી હોય છે. આ પ્રશ્નમાં વિકલ્પ D સૌથી યોગ્ય છે કારણ કે K⁺ અને Cl⁻ની ત્રિજ્યા લગભગ સરખી હોય છે, પરંતુ K⁺ની ત્રિજ્યા થોડી ઓછી હોવાથી આ વિકલ્પ સૌથી નજીક છે.", "ncert_ref": "Class XI - અધ્યાય 3: રાસાયણિક બંધન અને આણ્વીય રચના", "difficulty": "Hard", "num": 2}, {"question": "નીચેનામાંથી કયા પરમાણુની પરમાણ્વીય ત્રિજ્યા સૌથી ઓછી હોય છે?", "options": ["A) Li", "B) Be", "C) B", "D) C"], "correct": 1, "explanation": "બેરિલિયમ (Be)ની પરમાણ્વીય ત્રિજ્યા સૌથી ઓછી હોય છે કારણ કે તે બીજા પીરિયડમાં હોય છે અને તેનો સક્રિય ન્યુક્લિયર વીજભાર (effective nuclear charge) લિથિયમ (Li) કરતાં વધુ હોય છે. લિથિયમમાં 2s¹ ઇલેક્ટ્રોન કક્ષા હોય છે, જ્યારે Beમાં 2s² હોય છે, જેના કારણે Beની ત્રિજ્યા ઓછી હોય છે. બોરોન (B) અને કાર્બન (C)ની ત્રિજ્યા Be કરતાં વધુ હોય છે કારણ કે તેમના ઇલેક્ટ્રોન મેઘમાં વધુ ઇલેક્ટ્રોન-ઇલેક્ટ્રોન વિકર્ષણ હોય છે.", "ncert_ref": "Class XI - અધ્યાય 3: રાસાયણિક બંધન અને આણ્વીય રચના", "difficulty": "Hard", "num": 3}, {"question": "જ્યારે એક પરમાણુ ઇલેક્ટ્રોન ગુમાવે છે, ત્યારે તેની આયનીય ત્રિજ્યા પરમાણ્વીય ત્રિજ્યાથી કેવી રીતે બદલાય છે?", "options": ["A) આયનીય ત્રિજ્યા વધે છે કારણ કે ઇલેક્ટ્રોનની સંખ્યા ઘટે છે.", "B) આયનીય ત્રિજ્યા ઘટે છે કારણ કે સક્રિય ન્યુક્લિયર આકર્ષણ વધે છે.", "C) આયનીય ત્રિજ્યા અચળ રહે છે કારણ કે ઇલેક્ટ્રોનની સંખ્યા ઘટે છે પરંતુ ન્યુક્લિયર વીજભાર સમાન રહે છે.", "D) આયનીય ત્રિજ્યા ઘટે છે કારણ કે ઇલેક્ટ્રોનની સંખ્યા ઘટે છે અને ન્યુક્લિયર વીજભાર ઘટે છે."], "correct": 1, "explanation": "જ્યારે એક પરમાણુ ઇલેક્ટ્રોન ગુમાવે છે, ત્યારે સક્રિય ન્યુક્લિયર આકર્ષણ (effective nuclear charge) વધે છે, જેના કારણે ઇલેક્ટ્રોન મેઘ વધુ નજીક આવે છે અને આયનીય ત્રિજ્યા ઘટે છે. વિકલ્પ A, C, અને D ખોટા છે કારણ કે તે ન્યુક્લિયર આકર્ષણ અથવા વીજભારની ખોટી સમજૂતી આપે છે.", "ncert_ref": "Class XI - અધ્યાય 3: રાસાયણિક બંધન અને આણ્વીય રચના", "difficulty": "Hard", "num": 4}, {"question": "નીચેનામાંથી કયા આયનની ત્રિજ્યા સૌથી મોટી હોય છે?", "options": ["A) O²⁻", "B) F⁻", "C) Na⁺", "D) Mg²⁺"], "correct": 0, "explanation": "O²⁻ આયનની ત્રિજ્યા સૌથી મોટી હોય છે કારણ કે તેમાં સૌથી ઓછો સક્રિય ન્યુક્લિયર વીજભાર હોય છે અને ઇલેક્ટ્રોન-ઇલેક્ટ્રોન વિકર્ષણ સૌથી વધુ હોય છે, જેના કારણે ઇલેક્ટ્રોન મેઘ વધુ ફેલાયેલો હોય છે. F⁻, Na⁺, અને Mg²⁺ની ત્રિજ્યા O²⁻ કરતાં ઓછી હોય છે કારણ કે તેમના સક્રિય ન્યુક્લિયર વીજભાર વધુ હોય છે.", "ncert_ref": "Class XI - અધ્યાય 3: રાસાયણિક બંધન અને આણ્વીય રચના", "difficulty": "Hard", "num": 5}, {"question": "નીચેનામાંથી કયા જોડીમાં કેટાયન અને એનાયનની ત્રિજ્યાઓની તુલના સાચી છે?", "options": ["A) Na⁺ < F⁻ < O²⁻ < Mg²⁺", "B) Mg²⁺ < Na⁺ < F⁻ < O²⁻", "C) O²⁻ < F⁻ < Na⁺ < Mg²⁺", "D) F⁻ < Na⁺ < Mg²⁺ < O²⁻"], "correct": 1, "explanation": "સાચો ક્રમ Mg²⁺ < Na⁺ < F⁻ < O²⁻ છે. Mg²⁺ અને Na⁺ કેટાયન છે, જેઓ પરમાણુ કરતાં નાના હોય છે. F⁻ અને O²⁻ એનાયન છે, જેઓ પરમાણુ કરતાં મોટા હોય છે. એનાયનમાં ઇલેક્ટ્રોનની સંખ્યા વધુ હોવાથી ત્રિજ્યા વધે છે, પરંતુ O²⁻માં F⁻ કરતાં વધુ ઇલેક્ટ્રોન હોવાથી તેની ત્રિજ્યા મોટી હોય છે. A, C, અને Dમાં ક્રમ ચૂકી ગયો છે.", "ncert_ref": "Class XI - Chapter 3: રાસાયણિક બંધન અને આણ્વીય રચના", "difficulty": "Hard", "num": 6}, {"question": "જ્યારે એક પરમાણુ ઇલેક્ટ્રોન ગુમાવીને કેટાયન બને છે, ત્યારે તેની આયનીય ત્રિજ્યા પરમાણ્વીય ત્રિજ્યાથી ઓછી થાય છે. આ પૈકી કયું કારણ સૌથી યોગ્ય છે?", "options": ["A) ઇલેક્ટ્રોનની સંખ્યા ઘટવાથી કોરની અસર વધે છે", "B) પરમાણુ કદમાં વૃદ્ધિ થાય છે", "C) ઇલેક્ટ્રોનની સંખ્યા વધવાથી કોરની અસર ઘટે છે", "D) પરમાણુ કદમાં ઘટાડો થાય છે, પરંતુ કોરની અસર બદલાતી નથી"], "correct": 0, "explanation": "કેટાયન બનતાં ઇલેક્ટ્રોનની સંખ્યા ઘટે છે, જેથી કોર (ન્યુક્લિયસ) દ્વારા ઇલેક્ટ્રોન પર લાગતું આકર્ષણ બળ (ઇફેક્ટિવ ન્યુક્લિયર ચાર્જ) વધે છે, જેથી ત્રિજ્યા ઘટે છે. B, C, અને Dમાં આપેલા કારણો તથ્યાત્મક રીતે ચૂક છે.", "ncert_ref": "Class XI - Chapter 3: રાસાયણિક બંધન અને આણ્વીય રચના", "difficulty": "Hard", "num": 7}, {"question": "નીચેનામાંથી કયા પરમાણુની પરમાણ્વીય ત્રિજ્યા સૌથી મોટી હશે?", "options": ["A) Li", "B) Be", "C) B", "D) C"], "correct": 0, "explanation": "આવર્ત કોષ્ટકના એક જ આવર્તનમાં ડાબેથી જમણે જતાં પરમાણ્વીય ત્રિજ્યા ઘટે છે. Li, Be, B, અને C એક જ આવર્તન (દ્વિતીય)માં છે. Li સૌથી ડાબે હોવાથી તેની પરમાણ્વીય ત્રિજ્યા સૌથી મોટી હોય છે. B અને Cની ત્રિજ્યા ક્રમશઃ ઘટે છે.", "ncert_ref": "Class XI - Chapter 3: રાસાયણિક બંધન અને આણ્વીય રચના", "difficulty": "Hard", "num": 8}, {"question": "નીચેનામાંથી કયા આયનની ત્રિજ્યા સૌથી ઓછી હશે?", "options": ["A) Al³⁺", "B) Mg²⁺", "C) Na⁺", "D) F⁻"], "correct": 0, "explanation": "Al³⁺માં સૌથી વધુ ધન વીજભાર હોવાથી ઇલેક્ટ્રોન પર કોરની અસર સૌથી વધુ હોય છે, જેથી તેની ત્રિજ્યા સૌથી ઓછી હોય છે. Mg²⁺ અને  Chapter 3: તત્વોનો વર્ગીકરણ અને ગુણધર્મોની આવર્તિતા", "difficulty": "Hard", "num": 17}, {"question": "નીચેનામાંથી કયા જોડીમાં આયનીય ત્રિજ્યાનો ક્રમ (મોટીથી ઓછી) સાચો છે, જ્યારે તત્વો એક જ જૂથમાં હોય છે?", "options": ["A) F⁻ > O²⁻ > N³⁻", "B) N³⁻ > O²⁻ > F⁻", "C) O²⁻ > F⁻ > N³⁻", "D) F⁻ > N³⁻ > O²⁻"], "correct": 1, "explanation": "એક જ જૂથમાં, ઉપરથી નીચે જતાં પરમાણ્વીય કદ વધે છે. જ્યારે એનાયન બને છે, ત્યારે ઇલેક્ટ્રોન મેળવવાથી ત્રિજ્યા વધે છે. આમ, N³⁻ (સૌથી ઉપર)ની ત્રિજ્યા સૌથી મોટી હશે, ત્યારબાદ O²⁻, અને અંતે F⁻ (સૌથી નીચે)ની ત્રિજ્યા સૌથી ઓછી હશે. વિકલ્પ B સાચો ક્રમ દર્શાવે છે. વિકલ્પ A, C, અને D ખોટા ક્રમ દર્શાવે છે.", "ncert_ref": "Class XI - Chapter 3: તત્વોનો વર્ગીકરણ અને ગુણધર્મોની આવર્તિતા", "difficulty": "Hard", "num": 18}, {"question": "નીચેનામાંથી કયું વિધાન પરમાણ્વીય અને આયનીય ત્રિજ્યાના સંબંધ વિશે સંપૂર્ણ સાચું છે?", "options": ["A) કેટાયનની ત્રિજ્યા તેના મૂળ પરમાણુ કરતાં મોટી હોય છે.", "B) એનાયનની ત્રિજ્યા તેના મૂળ પરમાણુ કરતાં ઓછી હોય છે.", "C) એક જ આવર્તમાં, કેટાયનની ત્રિજ્યા ડાબી બાજુથી જમણી બાજુ જતાં ઘટે છે.", "D) એક જ જૂથમાં, એનાયનની ત્રિજ્યા ઉપરથી નીચે જતાં ઘટે છે."], "correct": 2, "explanation": "વિકલ્પ C સાચો છે, કારણ કે એક જ આવર્તમાં, કેટાયનની ત્રિજ્યા ડાબી બાજુથી જમણી બાજુ જતાં ઘટે છે, કારણ કે પરમાણ્વીય ક્રમાંક વધે છે અને પરમાણ્વીય કદ ઘટે છે. વિકલ્પ A ખોટો છે કારણ કે કેટાયનની ત્રિજ્યા તેના મૂળ પરમાણુ કરતાં ઓછી હોય છે. વિકલ્પ B ખોટો છે કારણ કે એનાયનની ત્રિજ્યા તેના મૂળ પરમાણુ કરતાં મોટી હોય છે. વિકલ્પ D ખોટો છે કારણ કે એક જ જૂથમાં, એનાયનની ત્રિજ્યા ઉપરથી નીચે જતાં વધે છે.", "ncert_ref": "Class XI - Chapter 3: તત્વોનો વર્ગીકરણ અને ગુણધર્મોની આવર્તિતા", "difficulty": "Hard", "num": 19}, {"question": "નીચેનામાંથી કયું વિધાન O²⁻, F⁻, Na⁺, Mg²⁺, અને Al³⁺ આયનોની ત્રિજ્યાના ક્રમ વિશે સાચું છે?", "options": ["A) O²⁻ > F⁻ > Na⁺ > Mg²⁺ > Al³⁺", "B) Al³⁺ > Mg²⁺ > Na⁺ > F⁻ > O²⁻", "C) F⁻ > O²⁻ > Na⁺ > Al³⁺ > Mg²⁺", "D) O²⁻ > Na⁺ > Mg²⁺ > F⁻ > Al³⁺"], "correct": 0, "explanation": "સાચો ક્રમ O²⁻ > F⁻ > Na⁺ > Mg²⁺ > Al³⁺ છે. O²⁻ અને F⁻ એ એનાયન છે, જેમની ત્રિ                     if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
