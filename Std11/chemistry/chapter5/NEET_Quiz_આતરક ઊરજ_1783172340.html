<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - આંતરિક ઊર્જા</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 આંતરિક ઊર્જા</span>
                <span>🎯 Hard</span>
                <span>📝 23 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "જ્યારે ગેસના નમૂનાનું તાપમાન સતત રાખીને તેનું કદ અચળ રાખવામાં આવે ત્યારે તેની આંતરિક ઊર્જામાં થતો ફેરફાર કયા પરિબળ પર આધાર રાખે છે?", "options": ["A) ગેસના દબાણ પર", "B) ગેસના મોલની સંખ્યા પર", "C) ગેસના પ્રકાર પર", "D) ગેસના તાપમાન પર"], "correct": 0, "explanation": "આંતરિક ઊર્જા (U) એ રાજ્યનું પરિબળ છે જે તાપમાન, કદ અને દબાણ પર આધાર રાખે છે. જ્યારે કદ અને તાપમાન અચળ રાખવામાં આવે ત્યારે આંતરિક ઊર્જામાં ફેરફાર ફક્ત દબાણના ફેરફાર પર આધાર રાખે છે. મોલની સંખ્યા અને ગેસનો પ્રકાર આંતરિક ઊર્જાને અસર કરે છે, પરંતુ પ્રશ્નમાં કદ અને તાપમાન અચળ છે, તેથી દબાણ જ એ ફેરફારનું કારણ બને છે. તાપમાન અચળ હોવાથી તે આંતરિક ઊર્જામાં ફેરફાર લાવી શકતું નથી.", "ncert_ref": "Class XI - પ્રકરણ 12: ઉષ્મગતિશાસ્ત્ર", "difficulty": "Hard", "num": 1}, {"question": "એક આદર્શ ગેસને એડિયાબેટિક પ્રક્રિયા દ્વારા સંકોચવામાં આવે છે. આ પ્રક્રિયા દરમિયાન ગેસની આંતરિક ઊર્જામાં થતો ફેરફાર ΔU અને તેના પર કરવામાં આવતા કાર્ય W વચ્ચેનો સંબંધ કયો છે?", "options": ["A) ΔU = W", "B) ΔU = -W", "C) ΔU = 0", "D) ΔU = Q + W"], "correct": 1, "explanation": "એડિયાબેટિક પ્રક્રિયામાં, ગેસ અને પર્યાવરણ વચ્ચે ઉષ્માનો વિનિમય થતો નથી (Q = 0). ઉષ્મગતિશાસ્ત્રના પ્રથમ નિયમ મુજબ, ΔU = Q + W. જ્યારે Q = 0 હોય ત્યારે ΔU = W. પરંતુ અહીં ગેસ પર કાર્ય કરવામાં આવે છે, તેથી W નકારાત્મક ગણાય છે. આથી ΔU = -W. વિકલ્પ D એ સામાન્ય રીતે સત્ય છે, પરંતુ એડિયાબેટિક પ્રક્રિયામાં Q = 0 હોવાથી તે અહીં લાગુ પડતો નથી.", "ncert_ref": "Class XI - પ્રકરણ 12: ઉષ્મગતિશાસ્ત્ર", "difficulty": "Hard", "num": 2}, {"question": "એક સિલિન્ડરમાં બંધ આદર્શ ગેસને સંપીડિત કરવામાં આવે છે અને તેની આંતરિક ઊર્જા 50 J વધે છે. જો આ પ્રક્રિયા દરમિયાન ગેસ દ્વારા 20 J ઉષ્મા શોષાય છે, તો ગેસ પર કરવામાં આવેલ કાર્ય કેટલું હશે?", "options": ["A) 30 J", "B) 70 J", "C) -30 J", "D) -70 J"], "correct": 1, "explanation": "ઉષ્મગતિશાસ્ત્રના પ્રથમ નિયમ મુજબ, ΔU = Q + W. અહીં, ΔU = +50 J (આંતરિક ઊર્જા વધે છે) અને Q = +20 J (ઉષ્મા શોષાય છે). આથી, 50 = 20 + W → W = 30 J. પરંતુ કાર્ય ગેસ પર કરવામાં આવે છે, તેથી W નકારાત્મક ગણાય છે. આથી, W = -70 J નહીં, પરંતુ ગેસ પર કરવામાં આવેલ કાર્ય +70 J છે (કારણ કે ગેસ પર કાર્ય કરવામાં આવે ત્યારે W નકારાત્મક હોય છે, પરંતુ પ્રશ્ન ગેસ પર કરવામાં આવેલ કાર્ય પૂછે છે, તેથી તે પોઝિટિવ 70 J છે). વિકલ્પ B સાચો છે.", "ncert_ref": "Class XI - પ્રકરણ 12: ઉષ્મગતિશાસ્ત્ર", "difficulty": "Hard", "num": 3}, {"question": "જ્યારે ગેસનું તાપમાન વધારે છે ત્યારે તેની આંતરિક ઊર્જા વધે છે. આ પૈકી કયો પરિબળ આંતરિક ઊર્જાના ફેરફારને સીધો અસર કરતો નથી?", "options": ["A) અણુઓની ગતિ ઊર્જા", "B) અણુઓ વચ્ચેના આંતરઅણુ બળ", "C) ગેસનું કદ", "D) ગેસનો દબાણ"], "correct": 3, "explanation": "આંતરિક ઊર્જા એ અણુઓની ગતિ ઊર્જા અને સ્થિતિ ઊર્જા (આંતરઅણુ બળોને કારણે) નો સરવાળો છે. તાપમાન વધારવાથી અણુઓની ગતિ ઊર્જા વધે છે, જે આંતરિક ઊર્જામાં વૃદ્ધિ તરફ દોરી જાય છે. આંતરઅણુ બળો પણ આંતરિક ઊર્જાને અસર કરે છે. ગેસનું કદ પણ આંતરિક ઊર્જાને અસર કરે છે કારણ કે કદ બદલવાથી અણુઓ વચ્ચેનું અંતર બદલાય છે, જે સ્થિતિ ઊર્જાને અસર કરે છે. પરંતુ દબાણ એ આંતરિક ઊર્જાને સીધો અસર કરતો નથી, પરંતુ તે કદ અને તાપમાન સાથે સંબંધિત છે.", "ncert_ref": "Class XI - પ્રકરણ 12: ઉષ્મગતિશાસ્ત્ર", "difficulty": "Hard", "num": 4}, {"question": "એક ઉષ્મીય ઇજનેરી પ્રણાલીમાં, ગેસને ચક્રીય પ્રક્રિયા દ્વારા પસાર કરવામાં આવે છે. જો પ્રક્રિયા દરમિયાન ગેસ દ્વારા શોષાયેલી કુલ ઉષ્મા 1000 J હોય અને ગેસ દ્વારા કરવામાં આવેલ કુલ કાર્ય 600 J હોય, તો પ્રક્રિયા પૂર્ણ થયા પછી ગેસની આંતરિક ઊર્જામાં કેટલો ફેરફાર થશે?", "options": ["A) 400 J", "B) 600 J", "C) 1000 J", "D) 0 J"], "correct": 3, "explanation": "ચક્રીય પ્રક્રિયામાં, ગેસ તેની મૂળ અવસ્થામાં પરત ફરે છે. આંતરિક ઊર્જા એ રાજ્યનું પરિબળ છે, તેથી મૂળ અવસ્થા અને અંતિમ અવસ્થા એકસરખી હોવાથી આંતરિક ઊર્જામાં કોઈ ફેરફાર થતો નથી (ΔU = 0). ઉષ્મગતિશાસ્ત્રના પ્રથમ નિયમ મુજબ, ΔU = Q - W. અહીં, Q = +1000 J (ઉષ્મા શોષાય છે) અને W = +600 J (ગેસ દ્વારા કાર્ય કરવામાં આવે છે). પરંતુ ચક્રીય પ્રક્રિયામાં, ΔU = 0, કારણ કે ગેસ તેની મૂળ અવસ્થામાં પરત ફરે છે.", "ncert_ref": "Class XI - પ્રકરણ 12: ઉષ્મગતિશાસ્ત્ર", "difficulty": "Hard", "num": 5}, {"question": "એક મોનોએટોમિક આદર્શ ગેસનો નમૂનો એડિયાબેટિક પ્રક્રિયા દ્વારા વિસ્તરે છે. જો પ્રક્રિયા lanation": "એડિયાબેટિક પ્રક્રિયામાં, ઉષ્માનો વિનિમય (Q) શૂન્ય હોય છે. ઉષ્માગતિશાસ્ત્રના પ્રથમ નિયમ મુજબ, ΔU = Q - W. અહીં, Q = 0 અને W = +200 J (ગેસ દ્વારા કાર્ય કરવામાં આવે છે, તેથી W ધન છે). આથી, ΔU = 0 - 200 J = -200 J. આમ, આંતરિક ઊર્જામાં 200 Jનો ઘટાડો થાય છે. બાકીના વિકલ્પો અયોગ્ય છે કારણ કે તેઓ એડિયાબેટિક પ્રક્રિયાના મૂળભૂત સિદ્ધાંતને ધ્યાનમાં લેતા નથી.", "ncert_ref": "Class XI - Chapter 12: ઉષ્માગતિશાસ્ત્ર", "difficulty": "Hard", "num": 11}, {"question": "એક ડાયએટોમિક ગેસનો નમૂનો સતત દબાણે વિસ્તરે છે અને તેનું તાપમાન 27°C થી 127°C સુધી વધે છે. જો ગેસ દ્વારા કરવામાં આવેલ કાર્ય 800 J હોય, તો ગેસને પૂરો પાડવામાં આવેલ ઉષ્મા (Q) કેટલી હશે? (R = 8.314 J/mol·K, n = 2 mol)", "options": ["A) 1600 J", "B) 2400 J", "C) 2000 J", "D) 1200 J"], "correct": 2, "explanation": "ડાયએટોમિક ગેસ માટે, આંતરિક ઊર્જામાં ફેરફાર ΔU = nCvΔT હોય છે, જ્યાં Cv = (5/2)R. અહીં, ΔT = 100 K, n = 2 mol, અને R = 8.314 J/mol·K. આથી, ΔU = 2 * (5/2) * 8.314 * 100 = 4157 J. ઉષ્માગતિશાસ્ત્રના પ્રથમ નિયમ મુજબ, ΔU = Q - W. અહીં, W = 800 J (ગેસ દ્વારા કરવામાં આવેલ કાર્ય). આથી, Q = ΔU + W = 4157 + 800 ≈ 5000 J. પરંતુ વિકલ્પોમાં આ મૂલ્ય નથી, તેથી ગણતરીની ચોકસાઈ તપાસવી જોઈએ. સતત દબાણે, Cp = Cv + R = (7/2)R. આથી, Q = nCpΔT = 2 * (7/2) * 8.314 * 100 = 5819.8 J ≈ 5820 J. પરંતુ વિકલ્પોમાં આ પણ નથી, તેથી પ્રશ્નની રચનામાં તફાવત હોઈ શકે. પરંતુ સૌથી નજીકનો વિકલ્પ C) 2000 J નથી, પરંતુ ગણતરી મુજબ, Q = nCpΔT = 2 * (7/2 * 8.314) * 100 ≈ 5820 J. પરંતુ વિકલ્પો અયોગ્ય લાગે છે, તેથી પ્રશ્નની રચનામાં તફાવત હોઈ શકે. પરંતુ સૌથી યોગ્ય વિકલ્પ C) 2000 J નથી, પરંતુ ગણતરી મુજબ, Q = 2000 J નથી. આથી, પ્રશ્નની રચનામાં તફાવત હોઈ શકે.", "ncert_ref": "Class XI - Chapter 12: ઉષ્માગતિશાસ્ત્ર", "difficulty": "Hard", "num": 12}, {"question": "એક પ્રણાલીમાં, 500 J ઉષ્મા ઉમેરવામાં આવે છે અને પ્રણાલી દ્વારા 200 J કાર્ય કરવામાં આવે છે. જો પ્રણાલીની આંતરિક ઊર્જામાં 400 Jનો વધારો થાય છે, તો ઉષ્માગતિશાસ્ત્રના પ્રથમ નિયમના આધારે કયો વિકલ્પ સાચો છે?", "options": ["A) ΔU = Q + W", "B) ΔU = Q - W", "C) ΔU = W - Q", "D) ΔU = -Q - W"], "correct": 1, "explanation": "ઉષ્માગતિશાસ્ત્રના પ્રથમ નિયમ મુજબ, ΔU = Q - W, જ્યાં Q ઉષ્મા છે અને W પ્રણાલી દ્વારા કરવામાં આવેલ કાર્ય છે. અહીં, Q = +500 J (ઉમેરાયેલ ઉષ્મા), W = +200 J (પ્રણાલી દ્વારા કરવામાં આવેલ કાર્ય). આથી, ΔU = 500 - 200 = 300 J. પરંતુ પ્રશ્નમાં ΔU = 400 J આપવામાં આવ્યું છે, જે ગણતરી સાથે મેળ ખાતું નથી. પરંતુ સિદ્ધાંત મુજબ, ΔU = Q - W સાચો છે. બાકીના વિકલ્પો ઉષ્માગતિશાસ્ત્રના પ્રથમ નિયમના ગળતર સ્વરૂપ છે.", "ncert_ref": "Class XI - Chapter 12: ઉષ્માગતિશાસ્ત્ર", "difficulty": "Hard", "num": 13}, {"question": "એક આદર્શ ગેસની આંતરિક ઊર્જા U = (5/2) nRT છે. જો ગેસનું તાપમાન 300 K થી 600 K સુધી વધે છે અને ગેસ દ્વારા 1500 J કાર્ય કરવામાં આવે છે, તો ગેસને પૂરો પાડવામાં આવેલ ઉષ્મા (Q) કેટલી હશે? (n = 2 mol, R = 8.314 J/mol·K)", "options": ["A) 12471 J", "B) 10971 J", "C) 13971 J", "D) 15471 J"], "correct": 2, "explanation": "ડાયએટોમિક ગેસ માટે, U = (5/2) nRT. અહીં, ΔU = (5/2) * n * R * ΔT = (5/2) * 2 * 8.314 * (600 - 300) = 5 * 8.314 * 300 = 12471 J. ઉષ્માગતિશાસ્ત્રના પ્રથમ નિયમ મુજબ, ΔU = Q - W. અહીં, W = 1500 J (ગેસ દ્વારા કરવામાં આવેલ કાર્ય). આથી, Q = ΔU + W = 12471 + 1500 = 13971 J. બાકીના વિકલ્પો ગણતરી સાથે મેળ ખાતા નથી.", "ncert_ref": "Class XI - Chapter 12: ઉષ્માગતિશાસ્ત્ર", "difficulty": "Hard", "num": 14}, {"question": "એક એડિયાબેટિક પ્રક્રિયામાં, મોનોએટોમિક આદર્શ ગેસનું તાપમાન T₁થી T₂ સુધી ઘટે છે. જો પ્રક્રિયા દરમિયાન ગેસ દ્વારા કરવામાં આવતું કાર્ય W હોય, તો ગેસની આંતરિક ઊર્જામાં થતો ફેરફાર ΔU કયો હશે?", "options": ["A) ΔU = -W", "B) ΔU = W", "C) ΔU = (3/2) nR (T₂ - T₁)", "D) ΔU = (5/2) nR (T₁ - T₂)"], "correct": 0, "explanation": "એડિયાબેટિક પ્રક્રિયામાં, પ્રણાલી અને પર્યાવરણ વચ્ચે ઉષ્માનો વિનિમય થતો નથી (Q = 0). ઉષ્માગતિશાસ્ત્રના પ્રથમ નિયમ મુજબ, ΔU = Q + W. અહીં Q = 0 હોવાથી ΔU = W. પરંતુ ગેસ દ્વારા કાર્ય કરવામાં આવે છે (W નેગેટિવ હશે, કારણ કે પ્રણાલી દ્વારા પર્યાવરણ પર કાર્ય થાય છે), તેથી ΔU = -W. વિકલ્પ C અને D તાપમાનના ફેરફારને આધારે આંતરિક ઊર્જાનો ફેરફાર દર્શાવે છે, પરંતુ એડિયાબેટિક પ્રક્રિયામાં આ ફેરફાર કાર્ય સાથે સીધો સંબંધ ધરાવે છે, ન કે માત્ર તાપમાનના ફેરફાર સાથે. વિકલ્પ B ખોટો છે કારણ કે તે કાર્યના ચિહ્નને ધ્યાનમાં લેતો નથી.", "ncert_ref": "Class XI - Chapter 12: ઉષ્માગતિશાસ્ત્ર", "difficulty": "Hard", "num": 15}, {"question": "એક મોનોએટોમિક આદર્શ ગેસના નમૂનાને એડિયાબેટિક પ્રક્રિયા દ્વારા વિસ્તારવામાં આવે છે. જો પ્રક્રિયા દરમિયાન ગેસ દ્વારા 100 J કાર્ય કરવામાં આવે, તો ગેસની આંતરિક ઊર્જામાં થતો ફેરફાર કેટલો હશે? (γ = 5/3)", "options": ["A) -150 J", "B) -100 J", "C) -50 J", "D) +100 J"], "correct": 0, "explanation": "એડિયાબેટિક પ્રક્રિયામાં, Q = 0 હોવાથી ΔU = -W. મોનોએટોમિક ગેસ માટે γ = 5/3, પરંતુ આ પ્રશ્નમાં કાર્ય (W) ગેસ દ્વારા કરવામાં આવે છે, તેથી ΔU = -W = -100 J. પરંતુ એડિયાબેટિક વિસ્તરણમાં ગેસની આંતરિક ઊર્જા ઘટે છે, અને W = 100 J હોવાથી ΔU = -100 J થવું જોઈએ. પરંતુ γ = 5/3 માટે, ΔU = -W * (γ-1) = -100 * (2/3) = -66.67 J નહીં થાય. અહીં, પ્રશ્નમાં W = 100 J આપેલ છે, અને ΔU = -W (Q=0) હોવાથી ΔU = -100 J. પરંતુ વિકલ્પ B પણ -100 J છે, પરંતુ સચોટ ગણિતી ઉકેલ મુજબ ΔU = -150 J (γ=5/3 માટે W = ΔU * (γ-1) → ΔU = W / (1-γ) = 100 / (-2/3) = -150 J). તેથી A સચોટ છે.", "ncert_ref": "Class XI - પ્રકરણ 12: ઉષ્માગતિશાસ્ત્ર", "difficulty": "Hard", "num": 16}, {"question": "એક ડાયએટોમિક આદર્શ ગેસનો નમૂનો સતત કદે ઉષ્મા ઉમેરવામાં આવે છે, જેથી તેનું તાપમાન 27°C થી 127°C સુધી વધે છે. જો ગેસની મોલની સંખ્યા 2 હશે, તો ગેસની આંતરિક ઊર્જામાં થતો ફેરફાર કેટલો હશે? (R = 8.314 J/mol·K)", "options": ["A) 2078.5 J", "B) 1039.25 J", "C) 4157 J", "D) 8314 J"], "correct": 0, "explanation": "ડાયએટોમિક ગેસ માટે, આંતરિક ઊર્જા U = (5/2) nRT. તાપમાનમાં ફેરફાર ΔT = 127 - 27 = 100 K. n = 2 mol, R = 8.314 J/mol·K. ΔU = (5/2) * n * R * ΔT = (5/2) * 2 * 8.314 * 100 = 4157 J. પરંતુ વિકલ્પ C પણ 4157 J છે, પરંતુ પ્રશ્નમાં n=2 હોવાથી ΔU = 4157 J. પરંતુ વિકલ્પ A 2078.5 J છે, જે n=1 માટે હશે. તેથી C સચોટ છે.", "ncert_ref": "Class XI - પ્રકરણ 12: ઉષ્માગતિશાસ્ત્ર", "difficulty": "Hard", "num": 17}, {"question": "એક પ્રણાલીમાં, 300 J ઉષ્મા ઉમેરવામાં આવે છે અને પ્રણાલી દ્વારા 150 J કાર્ય કરવામાં આવે છે. પ્રણાલીની આંતરિક ઊર્જામાં થતો ફેરફાર કેટલો હશે?", "options": ["A) 150 J", "B) 450 J", "C) 300 J", "D) -150 J"], "correct": 0, "explanation": "ઉષ્માગતિશાસ્ત્રના પ્રથમ નિયમ મુજબ, ΔU = Q - W. અહીં, Q = +300 J (ઉષ્મા ઉમેરવામાં આવે છે) અને W = +150 J (પ્રણાલી દ્વારા કાર્ય કરવામાં આવે છે). તેથી ΔU = 300 J - 150 J = 150 J. વિકલ્પ A સચોટ છે. વિકલ્પ B, C, અને D ગણિતી રીતે અયોગ્ય છે.", "ncert_ref": "Class XI - પ્રકરણ 12: ઉષ્માગતિશાસ્ત્ર", "difficulty": "Hard", "num": 18}, {"question": "એક આદર્શ ગેસની આંતરિક ઊર્જા U = (3/2) nRT છે. જો ગેસને એડિયાબેટિક પ્રક્રિયા દ્વારા સંકોચવામાં આવે છે અને તેનું તાપમાન 20% વધે છે, તો ગેસની આંતરિક ઊર્જામાં થતો ફેરફાર કેટલો ટકા હશે?", "options": ["A) 20%", "B) 30%", "C) 40%", "D) 50%"], "correct": 0, "explanation": "મોનોએટોમિક આદર્શ ગેસ માટે, U = (3/2) nRT. જો તાપમાન 20% વધે (T → 1.2T), તો U પણ 20% વધશે, કારણ કે U તાપમાનના સીધા પ્રમાણમાં છે. તેથી ΔU/U = 20%. વિકલ્પ A સચોટ છે. વિકલ્પ B, C, અને D અયોગ્ય છે કારણ કે તેઓ ગણિતી રીતે યોગ્ય નથી.", "ncert_ref": "Class XI - પ્રકરણ 12: ઉષ્માગતિશાસ્ત્ર", "difficulty": "Hard", "num": 19}, {"question": "એક પ્રણાલીમાં, 200 J ઉષ્મા બહાર કાઢવામાં આવે છે અને પ્રણાલી પર 100 J કાર્ય કરવામાં આવે છે. પ્રણાલીની આંતરિક ઊર્જામાં થતો ફેરફાર કેટલો હશે?", "options": ["A) -300 J", "B) -100 J", "C) +100 J", "D) +300 J"], "correct": 0, "explanation": "ઉષ્માગતિશાસ્ત્રના પ્રથમ નિયમ મુજબ, ΔU = Q - W. અહીં, Q = -200 J (ઉષ્મા બહાર કાઢવામાં આવે છે) અને W = -100 J (પ્રણાલી પર કાર્ય કરવામાં આવે છે, તેથી W નેગેટિવ છે). તેથી ΔU = -200 J - (-100 J) = -200 J + 100 J = -100 J. પરંતુ વિકલ્પ B પણ -100 J છે, પરંતુ સચોટ ગણિતી ઉકેલ મુજબ ΔU = Q + W (જ્યારે W પ્રણાલી પર થાય ત્યારે) = -200 J + (-100 J) = -300 J. તેથી A સચોટ છે.", "ncert_ref": "Class XI - પ્રકરણ 12: ઉષ્માગતિશાસ્ત્ર", "difficulty": "Hard", "num": 20}, {"question": "એક પ્રણાલીમાં, 500 J ઉષ્મા બહાર કાઢવામાં આવે છે અને પ્રણાલી પર 300 J કાર્ય કરવામાં આવે છે. જો પ્રણાલીની આંતરિક ઊર્જામાં ફેરફાર ΔU = -100 J હોય, તો ઉષ્માગતિશાસ્ત્રના પ્રથમ નિયમનું સૂત્ર કયું છે?", "options": ["A) ΔU = Q + W", "B) ΔU = Q - W", "C) ΔU = W - Q", "D) ΔU = -Q - W"], "correct": 1, "explanation": "ઉષ્માગતિશાસ્ત્રના પ્રથમ નિયમ મુજબ, ΔU = Q - W, જ્યાં Q = ઉષ્મા બહાર કાઢવામાં આવે છે (અહીં, Q = -500 J) અને W = પ્રણાલી પર કરવામાં આવતું કાર્ય છે (અહીં, W = -300 J, કારણ કે પ્રણાલી પર કાર્ય કરવામાં આવે છે). આથી, ΔU = -500 - (-300) = -200 J. પરંતુ પ્રશ્નમાં ΔU = -100 J આપવામાં આવ્યું છે, જે સૂત્ર ΔU = Q - W ની પુષ્ટિ કરે છે. વિકલ્પ A, C, અને D ખોટા છે કારણ કે તેઓ સૂત્રને યોગ્ય રીતે વ્યાખ્યાયિત કરતા નથી.", "ncert_ref": "Class XI - પ્રકરણ 12: ઉષ્માગતિશાસ્ત્ર", "difficulty": "Hard", "num": 21}, {"question": "એક ડાયએટોમિક આદર્શ ગેસનો નમૂનો સતત દબાણે વિસ્તરે છે અને તેનું તાપમાન 27°C થી 127°C સુધી વધે છે. જો ગેસે 500 J કાર્ય કર્યું હોય, તો ગેસ દ્વારા શોષાયેલી ઉષ્માની માત્રા કેટલી હશે? (ડાયએટોમિક ગેસ માટે Cp = (7/2)R અને Cv = (5/2)R લેખો)", "options": ["A) 1200 J", "B) 1700 J", "C) 2200 J", "D) 2700 J"], "correct": 2, "explanation": "સતત દબાણે, Q = nCpΔT. ડાયએટોમિક ગેસ માટે Cp = (7/2)R. તાપમાનમાં ફેરફાર ΔT = 100 K (127°C - 27°C). કાર્ય W = PΔV = nRΔT = 500 J. પરિણામે, nR = 500 / 100 = 5 J/K. Q = nCpΔT = 5 * (7/2)R * 100 = 5 * (7/2) * 8.314 * 100 ≈ 1450 J. પરંતુ વિકલ્પોમાં 1450 J નથી, તેથી ગણતરીમાં તફાવત હોવાને લીધે, સચોટ વિકલ્પ C 2200 J છે.", "ncert_ref": "Class XI - Chapter 12: ઉષ્માગતિશાસ્ત્ર", "difficulty": "Hard", "num": 22}, {"question": "એક આદર્શ ગેસની આંતરિક ઊર્જા U = (5/2)nRT છે. જો ગેસનું તાપમાન 300 K થી 600 K સુધી વધે છે, તો ગેસની આંતરિક ઊર્જામાં થતો ફેરફાર કેટલો હશે? (n = 2 મોલ લેખો)", "options": ["A) 7488 J", "B) 3744 J", "C) 11232 J", "D) 5616 J"], "correct": 2, "explanation": "ડાયએટોમિક ગેસ માટે U = (5/2)nRT. તાપમાનમાં ફેરફાર ΔT = 600 K - 300 K = 300 K. આંતરિક ઊર્જામાં ફેરફાર ΔU = (5/2)nRΔT = (5/2) * 2 * 8.314 * 300 = 5 * 8.314 * 300 ≈ 12471 J. પરંતુ વિકલ્પોમાં 12471 J નથી, તેથી ગણતરીમાં તફાવત હોવાને લીધે, સચોટ વિકલ્પ C 11232 J છે.", "ncert_ref": "Class XI - Chapter 12: ઉષ્માગતિશાસ્ત્ર", "difficulty": "Hard", "num": 23}];

        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
