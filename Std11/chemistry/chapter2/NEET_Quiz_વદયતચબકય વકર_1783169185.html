<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - વિદ્યુતચુંબકીય વિકિરણનો સ્વભાવ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 વિદ્યુતચુંબકીય વિકિરણનો સ્વભાવ</span>
                <span>🎯 Hard</span>
                <span>📝 25 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "વિદ્યુતચુંબકીય વિકિરણની તરંગલંબાઈ અને કંપવિસ્તાર વચ્ચેનો સંબંધ કયો છે જ્યારે તે નિર્વાતમાં પ્રસરે છે?", "options": ["A) તરંગલંબાઈ વધે ત્યારે કંપવિસ્તાર પણ વધે છે", "B) તરંગલંબાઈ અને કંપવિસ્તાર વચ્ચે કોઈ સંબંધ નથી", "C) તરંગલંબાઈ ઘટે ત્યારે કંપવિસ્તાર વધે છે", "D) તરંગલંબાઈ અને કંપવિસ્તાર વ્યસ્ત પ્રમાણમાં હોય છે"], "correct": 1, "explanation": "વિદ્યુતચુંબકીય વિકિરણ નિર્વાતમાં પ્રસરતી વખતે તેની તરંગલંબાઈ અને કંપવિસ્તાર વચ્ચે કોઈ સંબંધ હોતો નથી. કંપવિસ્તાર તરંગની ઊર્જાને નક્કી કરે છે, જ્યારે તરંગલંબાઈ તેની આવૃત્તિ અને પ્રકાશની ગતિ પર આધાર રાખે છે. તરંગલંબાઈ અને કંપવિસ્તાર સ્વતંત્ર ચલ છે. A, C, અને D વિકલ્પો ખોટા છે કારણ કે તેઓ અસ્તિત્વમાં ન હોવાનો સંબંધ દર્શાવે છે.", "ncert_ref": "Class XII - પ્રકરણ 8: વિદ્યુતચુંબકીય તરંગો", "difficulty": "Hard", "num": 1}, {"question": "જ્યારે સફેદ પ્રકાશને પ્રિઝમમાંથી પસાર કરવામાં આવે છે, ત્યારે કયો રંગ સૌથી ઓછો વક્રીભવન પામે છે?", "options": ["A) જાંબલી", "B) લાલ", "C) નીલો", "D) પીળો"], "correct": 1, "explanation": "સફેદ પ્રકાશમાં રહેલા વિવિધ રંગોના પ્રકાશની તરંગલંબાઈ અલગ અલગ હોય છે. લાલ પ્રકાશની તરંગલંબાઈ સૌથી લાંબી હોય છે, અને વક્રીભવનાંક (n) તરંગલંબાઈ સાથે વ્યસ્ત પ્રમાણમાં હોય છે. તેથી, લાલ પ્રકાશ સૌથી ઓછો વક્રીભવન પામે છે. જાંબલી, નીલો, અને પીળો રંગની તરંગલંબાઈ લાલ કરતાં ઓછી હોય છે, તેથી તેઓ વધુ વક્રીભવન પામે છે.", "ncert_ref": "Class XII - પ્રકરણ 9: કિરણ પ્રકાશશાસ્ત્ર અને પ્રકાશીય સાધનો", "difficulty": "Hard", "num": 2}, {"question": "વિદ્યુતચુંબકીય સ્પેક્ટ્રમમાં કયો વિભાગ સૌથી ઉચ્ચ આવૃત્તિ ધરાવે છે?", "options": ["A) રેડિયો તરંગો", "B) અવરક્ત કિરણો", "C) ગામા કિરણો", "D) પરાબેગની કિરણો"], "correct": 2, "explanation": "વિદ્યુતચુંબકીય સ્પેક્ટ્રમમાં, ગામા કિરણોની આવૃત્તિ સૌથી ઉચ્ચ હોય છે. રેડિયો તરંગોની આવૃત્તિ સૌથી ઓછી હોય છે, જ્યારે અવરક્ત કિરણો અને પરાબેગની કિરણોની આવૃત્તિ ગામા કિરણો કરતાં ઓછી હોય છે. તેથી, ગામા કિરણો સૌથી ઉચ્ચ આવૃત્તિ ધરાવે છે.", "ncert_ref": "Class XII - પ્રકરણ 8: વિદ્યુતચુંબકીય તરંગો", "difficulty": "Hard", "num": 3}, {"question": "જ્યારે વિદ્યુતચુંબકીય વિકિરણ ્યારે વિવર્તનમાં આપાત કોણ અને વિવર્તન કોણનો ગુણોત્તર અચળ હોય છે."], "correct": 0, "explanation": "સ્નેલના નિયમ મુજબ, વિવર્તન દરમિયાન આપાત કોણ (i) અને વિવર્તન કોણ (r) વચ્ચેનો સંબંધ n₁sin(i) = n₂sin(r) હોય છે, જ્યાં n₁ અને n₂ એ માધ્યમોના વક્રીભવનાંક છે. પરાવર્તનના નિયમ મુજબ, આપાત કોણ અને પરાવર્તન કોણ સમાન હોય છે. આમ, વિધાન A સત્ય છે. વિધાન B ખોટું છે કારણ કે વિવર્તન કોણ આપાત કોણ જેટલો નથી હોતો. વિધાન C ખોટું છે કારણ કે વિવર્તન કોણ આપાત કોણ કરતાં મોટો અથવા નાનો હોઈ શકે છે, તે માધ્યમના વક્રીભવનાંક પર આધાર રાખે છે. વિધાન D ખોટું છે કારણ કે પરાવર્તનમાં આપાત કોણ અને પરાવર્તન કોણ સરખા હોય છે, ન કે તેમનો સરવસુમ ૧૮૦° હોય છે, અને વિવર્તનમાં કોણોનો ગુણોત્તર અચળ નથી હોતો.", "ncert_ref": "Class XII - Chapter 9: કિરણ પ્રકાશશાસ્ત્ર અને પ્રકાશીય સાધનો", "difficulty": "Hard", "num": 10}, {"question": "વિદ્યુતચુંબકીય વિકિરણની તરંગલંબાઈ λ અને કણ સ્વરૂપે તેની ઊર્જા E વચ્ચેનો સંબંધ કયો છે, જ્યારે તેને ડ્યુ બ્રોગ્લીના સિદ્ધાંત અનુસાર વિચારવામાં આવે?", "options": ["A) E = hc/λ", "B) E = p²/2m, જ્યાં p = h/λ", "C) E = mc²", "D) E = hν, જ્યાં ν = c/λ"], "correct": 1, "explanation": "ડ્યુ બ્રોગ્લીના સિદ્ધાંત અનુસાર, કણ તરંગ દ્વૈતતાને કારણે વિદ્યુતચુંબકીય વિકિરણને કણ સ્વરૂપે ગણતરી કરવામાં આવે ત્યારે, તેનું વેગમ (p) = h/λ હોય છે. કણની ગતિઊર્જા E = p²/2m હોય છે, જ્યાં m કણનું દળ છે. આથી, E = (h/λ)²/2m. વિકલ્પ A, C, અને D ક્રમશઃ ફોટોન ઊર્જા, આઇન્સ્ટાઈનનો દળ-ઊર્જા સંબંધ, અને ફોટોનની ઊર્જા માટેના સૂત્ર છે, પરંતુ ડ્યુ બ્રોગ્લીના સંદર્ભમાં કણ સ્વરૂપે ઊર્જાનો સંબંધ વિકલ્પ B દર્શાવે છે.", "ncert_ref": "Class XII - Chapter 11: વિકિરણ અને દ્રવ્યના દ્વૈત સ્વભાવ", "difficulty": "Hard", "num": 11}, {"question": "જ્યારે એક વિદ્યુતચુંબકીય તરંગ વાયુમાંથી કાચમાં પ્રવેશે છે, ત્યારે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) તરંગલંબાઈ ઘટે છે, આવૃત્તિ સ્થિર રહે છે, અને વેગ ઘટે છે", "B) તરંગલંબાઈ અને આવૃત્તિ બંને ઘટે છે, પરંતુ વેગ સ્થિર રહે છે", "C) તરંગલંબાઈ વધે છે, આવૃત્તિ સ્થિર રહે છે, અને વેગ ઘટે છે", "D) તરંગલંબાઈ અને વેગ બંને ઘટે છે, પરંતુ આવૃત્તિ વધે છે"], "correct": 0, "explanation": "વિદ્યુતચુંબકીય ્ત્ર", "difficulty": "Hard", "num": 19}, {"question": "નીચેનામાંથી કયું વિધાન વિદ્યુતચુંબકીય વિકિરણના ક્વોન્ટમ સ્વરૂપ વિશે સત્ય છે?", "options": ["A) ફોટોનની ઊર્જા તેની તરંગલંબાઈના સીધા પ્રમાણમાં હોય છે", "B) ફોટોનની ઊર્જા તેની આવૃત્તિના વ્યસ્ત પ્રમાણમાં હોય છે", "C) ફોટોનની ઊર્જા તેની આવૃત્તિના સીધા પ્રમાણમાં હોય છે", "D) ફોટોનની ઊર્જા તેની તરંગલંબાઈના વર્ગના સીધા પ્રમાણમાં હોય છે"], "correct": 2, "explanation": "ફોટોનની ઊર્જા (E) તેની આવૃત્તિ (ν)ના સીધા પ્રમાણમાં હોય છે, જેમ કે E = hν, જ્યાં h પ્લાંકનો અચળાંક છે. આમ, વિકલ્પ C સત્ય છે. વિકલ્પ A, B, અને D ખોટા છે કારણ કે તેઓ ફોટોનની ઊર્જા અને તરંગલંબાઈ અથવા આવૃત્તિ વચ્ચેના સંબંધને ખોટી રીતે વર્ણવે છે.", "ncert_ref": "Class XII - Chapter 11: વિકિરણ અને દ્રવ્યનો દ્વૈત સ્વભાવ", "difficulty": "Hard", "num": 20}, {"question": "વિદ્યુતચુંબકીય વિકિરણના કણ સ્વરૂપ અનુસાર, જ્યારે પ્રકાશની તરંગલંબાઈ ઘટાડવામાં આવે છે, ત્યારે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) ફોટોનની ઊર્જા ઘટે છે અને સંવેગ વધે છે", "B) ફોટોનની ઊર્જા અને સંવેગ બંને વધે છે", "C) ફોટોનની ઊર્જા વધે છે પરંતુ સંવેગ અચળ રહે છે", "D) ફોટોનની ઊર્જા અને સંવેગ બંને ઘટે છે"], "correct": 1, "explanation": "ફોટોનની ઊર્જા E = hν = hc/λ અહીં, λ ઘટે ત્યારે E વધે છે. સંવેગ p = E/c = h/λ, જેથી λ ઘટે ત્યારે p પણ વધે છે. તેથી, ઊર્જા અને સંવેગ બંને વધે છે. A, C, અને D વિધાનો ખોટા છે કારણ કે તેઓ સંવેગ અથવા ઊર્જાના સંબંધને ચૂકી જાય છે.", "ncert_ref": "Class XII - Chapter 11: વિકિરણ અને દ્રવ્યની દ્વૈત પ્રકૃતિ", "difficulty": "Hard", "num": 21}, {"question": "વિદ્યુતચુંબકીય વિકિરણના ક્વોન્ટમ સ્વરૂપ અનુસાર, જ્યારે પ્રકાશની તીવ્રતા વધારવામાં આવે છે, ત્યારે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) ફોટોનની ઊર્જા વધે છે", "B) ફોટોનની સંખ્યા વધે છે", "C) ફોટોનનો વેગ વધે છે", "D) ફોટોનની તરંગલંબાઈ ઘટે છે"], "correct": 1, "explanation": "પ્રકાશની તીવ્રતા એ ફોટોનની સંખ્યાના સીધા પ્રમાણમાં હોય છે. ફોટોનની ઊર્જા (E = hν), વેગ (c), અને તરંગલંબાઈ (λ) તીવ્રતાથી સ્વતંત્ર હોય છે. તેથી, ફક્ત ફોટોનની સંખ્યા વધે છે.", "ncert_ref": "Class XII - Chapter 11: વિકિરણ અને દ્રવ્યની દ્વૈત પ્રકૃતિ", "difficulty": "Hard", "num": 22}, {"question": "વિદ્યુતચુંબકીય વિકિરણના કણ સ્વરૂપ અને તરંગ સ્વરૂપ વચ્ચેના દ્વંદ્વને ઉકેલવા માટે આઇન્સ્ટાઇન દ્વારા પ્રસ્તાવિત સિદ્ધાંત કયો હતો, જે પ્રકાશ-વિદ્યુત પ્રભાવની સમજૂતી આપે છે?", "options": ["A) મેક્સવેલનો વિદ્યુતચુંબકીય સિદ્ધાંત", "B) પ્લાંકનો ક્વોન્ટમ સિદ્ધાંત", "C) ફોટોન સિદ્ધાંત", "D) હ્યુજન્સનો તરંગ સિદ્ધાંત"], "correct": 2, "explanation": "આઇન્સ્ટાઇને પ્રકાશ-વિદ્યુત પ્રભાવની સમજૂતી આપવા માટે ફોટોન સિદ્ધાંત પ્રસ્તાવિત કર્યો હતો, જેમાં પ્રકાશને ફોટોન નામના ઊર્જા કણોના રૂપમાં ગણવામાં આવે છે. મેક્સવેલનો સિદ્ધાંત તરંગ સ્વરૂપને સમજાવે છે, પ્લાંકનો સિદ્ધાંત ક્વોન્ટમ ઊર્જાના સ્તરો વિશે છે, અને હ્યુજન્સનો સિદ્ધાંત પ્રકાશના તરંગ સ્વરૂપને સમજાવે છે.", "ncert_ref": "Class XII - Chapter 8: વિદ્યુતચુંબકીય તરંગો", "difficulty": "Hard", "num": 23}, {"question": "જ્યારે એક વિદ્યુતચુંબકીય તરંગ ધ્રુવિત હોય છે, ત્યારે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "options": ["A) ધ્રુવણની દિશા વિદ્યુત ક્ષેત્રના દોલનની દિશા દર્શાવે છે", "B) ધ્રુવિત તરંગમાં ચુંબકીય ક્ષેત્ર અને વિદ્યુત ક્ષેત્ર પરસ્પર લંબરૂપે હોય છે", "C) ધ્રુવિત તરંગની તીવ્રતા દરેક દિશામાં સમાન હોય છે", "D) ધ્રુવણને કૃત્રિમ રીતે પ્રિઝમ અથવા પોલેરોઇડની મદદથી મેળવી શકાય છે"], "correct": 2, "explanation": "ધ્રુવિત તરંગની તીવ્રતા દરેક દિશામાં સમાન નથી હોતી, પરંતુ તે ધ્રુવણની દિશા અનુસાર બદલાય છે. ધ્રુવણની દિશા વિદ્યુત ક્ષેત્રના દોલનની દિશા દર્શાવે છે, અને ચુંબકીય ક્ષેત્ર અને વિદ્યુત ક્ષેત્ર પરસ્પર લંબરૂપે હોય છે. ધ્રુવણને કૃત્રિમ રીતે પ્રિઝમ અથવા પોલેરોઇડની મદદથી મેળવી શકાય છે.", "ncert_ref": "Class XII - Chapter 8: વિદ્યુતચુંબકીય તરંગો", "difficulty": "Hard", "num": 24}, {"question": "નીચેનામાંથી કયું વિધાન વિદ્યુતચુંબકીય વિકિરણના તરંગ-કણ દ્વંદ્વ (wave-particle duality) અને તેના ધ્રુવણ (પોલેરાઇઝેશન) ગુણધર્મને સૌથી યોગ્ય રીતે સમજાવે છે?", "options": ["A) વિદ્યુતચુંબકીય વિકિરણ ધ્રુવિત થઈ શકે છે, પરંતુ ફોટોન તરીકે તે કણ સ્વરૂપે ધ્રુવણ ધરાવતું નથી, કારણ કે ફોટોનની ઊર્જા તેની આવૃત્તિ પર આધાર રાખે છે.", "B) ધ્રુવણ એ તરંગ સ્વરૂપનો ગુણધર્મ છે, જ્યારે ફોટોન (કણ સ્વરૂપ) ધ્રુવણ ધરાવતું નથી, પરંતુ વિદ્યુતચુંબકીય વિકિરણના તરંગ સ્વરૂપમાં ધ્રુવણ જોવા મળે છે.", "C) ફોટોન ધ્રુવિત થઈ શકે છે, અને તેનું ધ્રુવણ તેની સ્પિન ક્વોન્ટમ સંખ્યા (±1) દ્વારા નક્કી થાય છે, જે તરંગ સ્વરૂપના ધ્રુવણ સાથે સુસંગત છે.", "D) વિદ્યુતચુંબકીય વિકિરણનું ધ્રુવણ ફક્ત તરંગ સ્વરૂપમાં જ જોવા મળે છે, જ્યારે કણ સ્વરૂપમાં તે અસ્તિત્વમાં જ નથી."], "correct": 2, "explanation": "વિજ્ઞાન અનુસાર, ફોટોન (વિદ્યુતચુંબકીય વિકિરણના કણ સ્વરૂપ) ધ્રુવણ ધરાવે છે, જે તેની સ્પિન ક્વોન્ટમ સંખ્યા (±1) દ્વારા વ્યાખ્યાયિત થાય છે. આ સ્પિન ધ્રુવણ તરંગ સ્વરૂપના ધ્રુવણ સાથે સુસંગત છે, કારણ કે ફોટોનના સ્પિનની દિશા તેના વિદ્યુત ક્ષેત્રના દોલનની દિશા સાથે સંબંધિત છે. અહીં, વિકલ્પ C સૌથી યોગ્ય છે કારણ કે તે તરંગ-કણ દ્વંદ્વને સ્વીકારે છે અને ફોટોનના ધ્રુવણને સ્પિન ક્વોન્ટમ સંખ્યાથી જોડે છે. વિકલ્પ A અને D ખોટા છે કારણ કે ફોટોન ધ્રુવણ ધરાવે છે. વિકલ્પ B અપૂર્ણ છે કારણ કે ફોટોન ધ્રુવણ ધરાવે છે, પરંતુ તે તરંગ સ્વરૂપ સાથે સુસંગત છે.", "ncert_ref": "Class XII - પ્રકરણ 8: વિદ્યુતચુંબકીય તરંગો", "difficulty": "Hard", "num": 25}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
