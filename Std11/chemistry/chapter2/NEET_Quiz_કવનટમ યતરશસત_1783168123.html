<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - ક્વોન્ટમ યંત્રશાસ્ત્ર અને ક્વોન્ટમ આંક</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 ક્વોન્ટમ યંત્રશાસ્ત્ર અને ક્વોન્ટમ આંક</span>
                <span>🎯 Hard</span>
                <span>📝 25 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "ક્વોન્ટમ યંત્રશાસ્ત્રમાં, હાઇઝનબર્ગના અનિશ્ચિતતા સિદ્ધાંત અનુસાર, કયા જોડીના માપનની સચોટતા પર સીધી અસર પડે છે?", "options": ["A) સ્થાન અને વેગ", "B) ઉર્જા અને સમય", "C) કોણીય વેગમાત્રા અને કોણીય સ્થાન", "D) ઉપરના તમામ"], "correct": 3, "explanation": "હાઇઝનબર્ગના અનિશ્ચિતતા સિદ્ધાંત અનુસાર, કોઈ પણ કણના સંપૂર્ણ વર્તનને સચોટપણે માપી શકાતું નથી. આ સિદ્ધાંત સ્થાન અને વેગ, ઉર્જા અને સમય, તથા કોણીય વેગમાત્રા અને કોણીય સ્થાન જેવી જોડીઓના માપન પર લાગુ પડે છે. આથી, ઉપરના તમામ વિકલ્પો સચોટ છે.", "ncert_ref": "Class XII - Chapter 11: ક્વોન્ટમ યંત્રશાસ્ત્ર", "difficulty": "Hard", "num": 1}, {"question": "ક્વોન્ટમ આંકડાકીય પદ્ધતિમાં, ક્વોન્ટમ બિટ (ક્યુબિટ) કયા સિદ્ધાંત પર આધારિત છે?", "options": ["A) સુપરપોઝિશન", "B) એન્ટેંગલમેન્ટ", "C) ટનલિંગ", "D) પૌલીના અપવર્જન સિદ્ધાંત"], "correct": 0, "explanation": "ક્વોન્ટમ બિટ (ક્યુબિટ) સુપરપોઝિશનના સિદ્ધાંત પર આધારિત છે, જ્યાં એક ક્યુબિટ એક જ સમયે 0 અને 1 બંને અવસ્થામાં હોઈ શકે છે. એન્ટેંગલમેન્ટ, ટનલિંગ, અને પૌલીના અપવર્જન સિદ્ધાંત ક્વોન્ટમ યંત્રશાસ્ત્રના અન્ય મહત્વપૂર્ણ સિદ્ધાંતો છે, પરંતુ ક્યુબિટની મૂળભૂત અવધારણા સુપરપોઝિશન પર આધારિત છે.", "ncert_ref": "Class XII - Chapter 11: ક્વોન્ટમ યંત્રશાસ્ત્ર", "difficulty": "Hard", "num": 2}, {"question": "ક્વોન્ટમ યંત્રશાસ્ત્રમાં, શ્રોડિંગરના બિલાડીના પ્રયોગમાં, બિલાડીની અવસ્થા કયા સિદ્ધાંત દ્વારા વર્ણવવામાં આવે છે?", "options": ["A) સુપરપોઝિશન", "B) અનિશ્ચિતતા સિદ્ધાંત", "C) ક્વોન્ટમ ટનલિંગ", "D) પૌલીના અપવર્જન સિદ્ધાંત"], "correct": 0, "explanation": "શ્રોડિંગરના બિલાડીના પ્રયોગમાં, બિલાડીની અવસ્થા સુપરપોઝિશનના સિદ્ધાંત દ્વારા વર્ણવવામાં આવે છે, જ્યાં બિલાડી એક જ સમયે જીવિત અને મૃત બંને અવસ્થામાં હોઈ શકે છે. અનિશ્ચિતતા સિદ્ધાંત, ક્વોન્ટમ ટનલિંગ, અને પૌલીના અપવર્જન સિદ્ધાંત આ પ્રયોગ સાથે સીધા સંબંધિત નથી.", "ncert_ref": "Class XII - Chapter 11: ક્વોન્ટમ યંત્રશાસ્ત્ર", "difficulty": "Hard", "num": 3}, {"question": "ક્વોન્ટમ કોમ્પ્યુટિંગમાં, કયા અલ્ગોરિધમનો ઉપયોગ મોટી સંખ્યાઓના અવયવીકરણ માટે થાય છે?", "options": ["A) ગ્રોવરનો અલ્ગોરિધમ", "B) શોરનો અલ્ ": 1, "explanation": "ક્યુબિટની એન્ટેંગલમેન્ટ અવસ્થા બેલના અસમતા સિદ્ધાંત દ્વારા વર્ણવવામાં આવે છે, જે ક્વોન્ટમ યંત્રશાસ્ત્રમાં ગૂંચવણ (entanglement) ની ઘટનાને સમજાવે છે. હાઇઝનબર્ગનું અનિશ્ચિતતા સિદ્ધાંત (A) માપનની મર્યાદાઓને વર્ણવે છે, પ્લાંકનું ક્વોન્ટમ સિદ્ધાંત (C) ઊર્જાના ક્વોન્ટાઇઝેશનને વર્ણવે છે, અને ડી બ્રોગ્લીનું કણ-તરંગ દ્વૈતતા સિદ્ધાંત (D) કણોની તરંગ-કણ દ્વૈતતાને વર્ણવે છે.", "ncert_ref": "Class XII - Chapter 2: ક્વોન્ટમ યંત્રશાસ્ત્રના મૂળભૂત સિદ્ધાંતો", "difficulty": "Hard", "num": 15}, {"question": "ક્વોન્ટમ યંત્રશાસ્ત્રમાં, ઇલેક્ટ્રોનના કોણીય વેગમાન ક્વોન્ટમ આંક (l) માટે નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) l ની કિંમત 0 થી (n-1) સુધીની પૂર્ણાંક કિંમતો લઈ શકે છે.", "B) l = 0 ને s-કક્ષક, l = 1 ને p-કક્ષક, l = 2 ને d-કક્ષક અને l = 3 ને f-કક્ષક કહેવાય છે.", "C) l ની કિંમત n કરતાં વધુ હોઈ શકે છે જો ઇલેક્ટ્રોન ઉત્તેજિત અવસ્થામાં હોય.", "D) l ની કિંમત ઇલેક્ટ્રોનના કક્ષકના આકારને નિર્ધારિત કરે છે."], "correct": 2, "explanation": "વિધાન C સાચું નથી કારણ કે કોણીય વેગમાન ક્વોન્ટમ આંક (l) હંમેશા મુખ્ય ક્વોન્ટમ આંક (n) કરતાં ઓછો હોય છે, એટલે કે l = 0, 1, 2, ..., (n-1). ઇલેક્ટ્રોન ઉત્તેજિત અવસ્થામાં હોય કે ન હોય, આ નિયમ લાગુ પડે છે. વિધાન A, B, અને D સાચાં છે કારણ કે l ની કિંમતો n પર આધારિત હોય છે, l ના આધારે કક્ષકના પ્રકાર (s, p, d, f) નક્કી થાય છે, અને l કક્ષકના આકારને નિર્ધારિત કરે છે.", "ncert_ref": "Class XII - Chapter 2: પરમાણુનો બંધારણ", "difficulty": "Hard", "num": 16}, {"question": "ક્વોન્ટમ યંત્રશાસ્ત્રમાં, ચુંબકીય ક્વોન્ટમ આંક (m_l) અને સ્પિન ક્વોન્ટમ આંક (m_s) સંબંધી નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) m_l ની કિંમત -l થી +l સુધીની પૂર્ણાંક કિંમતો લઈ શકે છે, જ્યારે m_s ની કિંમત ફક્ત +1/2 અથવા -1/2 હોઈ શકે છે.", "B) m_l અને m_s બંનેની કિંમતો ઇલેક્ટ્રોનના કક્ષકની ઊર્જાને સીધી રીતે અસર કરે છે.", "C) m_s ની કિંમત ઇલેક્ટ્રોનના સ્પિનને નિર્ધારિત કરે છે, પરંતુ m_l ની કિંમત ઇલેક્ટ્રોનના કક્ષકના ઓરિએન્ટેશનને નિર્ધારિત કરતી નથી.", "D) m_l ની કિંમતોની સંખ્યા 2l + 1 હોય છે, જ્યારે m_s ની કિંમતોની સંખ્યા 2 હોય છે."], "correct": 3, "explanation": "વિધાન D સાચું છે કારણ કે ચુંબકીય ક્વોન્ટમ આંક (m_l) ની કિંમતો -l થી +l સુધીની હોય છે, જેમાં કુલ 2l + 1 કિંમતો હોય છે. સ્પિન ક્વોન્ટમ આંક (m_s) ની કિંમતો ફક્ત +1/2 અથવા -1/2 હોઈ શકે છે, એટલે કે કુલ 2 કિંમતો. વિધાન A અર્ધસત્ય છે કારણ કે m_s ની કિંમતો ફક્ત +1/2 અથવા -1/2 હોઈ શકે છે, પરંતુ m_l ની કિંમતો -l થી +l સુધીની હોય છે. વિધાન B અને C ખોટાં છે કારણ કે m_l કક્ષકના ઓરિએન્ટેશનને નિર્ધારિત કરે છે, અને m_s અને m_l બંને ઇલેક્ટ્રોનની ઊર્જાને અસર કરતાં નથી (સામાન્ય રીતે).", "ncert_ref": "Class XII - Chapter 2: પરમાણુનો બંધારણ", "difficulty": "Hard", "num": 17}, {"question": "ક્વોન્ટમ કોમ્પ્યુટિંગમાં, ક્યુબિટની એન્ટેંગલમેન્ટ અવસ્થા સંબંધી નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) એન્ટેંગલમેન્ટ અવસ્થામાં, એક ક્યુબિટની અવસ્થા બીજા ક્યુબિટની અવસ્થા સાથે જોડાયેલી હોય છે.", "B) એન્ટેંગલમેન્ટ અવસ્થા માપન પહેલાં જ જાણી શકાય છે.", "C) એન્ટેંગલમેન્ટ અવસ્થા બેલ અસમાનતાનો ભંગ કરે છે.", "D) એન્ટેંગલમેન્ટ અવસ્થા ક્વોન્ટમ ટેલિપોર્ટેશનમાં ઉપયોગી છે."], "correct": 1, "explanation": "વિધાન B ખોટું છે કારણ કે એન્ટેંગલમેન્ટ અવસ્થા માપન પહેલાં જાણી શકાતી નથી. એન્ટેંગલમેન્ટ અવસ્થા માપન બાદ જ જાણી શકાય છે, અને તે ક્યુબિટ્સ વચ્ચેના કોરેલેશનને દર્શાવે છે. વિધાન A, C, અને D સાચાં છે કારણ કે એન્ટેંગલમેન્ટ અવસ્થામાં ક્યુબિટ્સની અવસ્થાઓ જોડાયેલી હોય છે, તે બેલ અસમાનતાનો ભંગ કરે છે, અને ક્વોન્ટમ ટેલિપોર્ટેશનમાં ઉપયોગી છે.", "ncert_ref": "Class XII - Chapter 9: ઇલેક્ટ્રોનિક્સ અને કોમ્પ્યુટર", "difficulty": "Hard", "num": 18}, {"question": "ક્વોન્ટમ યંત્રશાસ્ત્રમાં, ઇલેક્ટ્રોનના ક્વોન્ટમ આંકો સંબંધી નીચેનામાંથી કયું વિધાન સાચું છે જ્યારે n = 4 અને l = 2 હોય?", "options": ["A) m_l ની કિંમતો -2, -1, 0, +1, +2 હોઈ શકે છે.", "B) m_s ની કિંમતો -2, -1, 0, +1, +2 હોઈ શકે છે.", "C) ઇલેક્ટ્રોન d-કક્ષકમાં હોઈ શકે છે.", "D) ઇલેક્ટ્રોન f-કક્ષકમાં હોઈ શકે છે."], "correct": 0, "explanation": "વિધાન A સાચું છે કારણ કે જ્યારે l = 2 હોય છે, ત્યારે m_l ની કિંમતો -2, -1, 0, +1, +2 હોઈ શકે છે. વિધાન B ખોટું છે કારણ કે m_s ની કિંમતો ફક્ત +1/2 અથવા -1/2 હોઈ શકે છે. વિધાન C સાચું છે કારણ કે l = 2 d-કક્ષકને દર્શાવે છે, પરંતુ વિધાન D ખોટું છે કારણ કે l = 2 f-કક્ષકને દર્શાવતું નથી (f-કક્ષક માટે l = 3 હોય છે).", "ncert_ref": "Class XII - Chapter 2: પરમાણુનો બંધારણ", "difficulty": "Hard", "num": 19}, {"question": "ક્વોન્ટમ કોમ્પ્યુટિંગમાં, શોરના અલ્ગોરિધમ સંબંધી નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) શોરનો અલ્ગોરિધમ મોટી સંખ્યાઓના અવયવીકરણ માટે ઉપયોગી છે.", "B) શોરનો અલ્ગોરિધમ ક્વોન્ટમ ફૂરિયર ટ્રાન્સફોર્મ પર આધારિત છે.", "C) શોરનો અલ્ગોરિધમ ક્લાસિકલ કોમ્પ્યુટર પર પણ કાર્યક્ષમ રીતે ચલાવી શકાય છે.", "D) શોરનો અલ્ગોરિધમ ક્વોન્ટમ સુપરપોઝિશન અને એન્ટેંગલમેન્ટનો ઉપયોગ કરે છે."], "correct": 2, "explanation": "વિધાન C ખોટું છે કારણ કે શોરનો અલ્ગોરિધમ ક્લાસિકલ કોમ્પ્યુટર પર કાર્યક્ષમ રીતે ચલાવી શકાતો નથી. તે ક્વોન્ટમ કોમ્પ્યુટર પર જ કાર્યક્ષમ રીતે ચલાવી શકાય છે. વિધાન A, B, અને D સાચાં છે કારણ કે શોરનો અલ્ગોરિધમ મોટી સંખ્યાઓના અવયવીકરણ માટે ઉપયોગી છે, ક્વોન્ટમ ફૂરિયર ટ્રાન્સફોર્મ પર આધારિત છે, અને ક્વોન્ટમ સુપરપોઝિશન અને એન્ટેંગલમેન્ટનો ઉપયોગ કરે છે.", "ncert_ref": "Class XII - Chapter 9: ઇલેક્ટ્રોનિક્સ અને કોમ્પ્યુટર", "difficulty": "Hard", "num": 20}, {"question": "એક પરમાણુમાં ઇલેક્ટ્રોનની અવસ્થા માટે મુખ્ય ક્વોન્ટમ આંક n=4 અને કોણીય વેગમાન ક્વોન્ટમ આંક l=2 છે. આ ઇલેક્ટ્રોન માટે ચુંબકીય ક્વોન્ટમ આંક (m_l) ની સંભવિત કિંમતોની સંખ્યા અને સ્પિન ક્વોન્ટમ આંક (m_s) ની સંભવિત કિંમતોની સંખ્યાનો ગુણાકાર કેટલો થશે?", "options": ["A) 10", "B) 14", "C) 20", "D) 28"], "correct": 0, "explanation": "જ્યારે l=2 હોય ત્યારે ચુંબકીય ક્વોન્ટમ આંક (m_l) ની સંભવિત કિંમતો -2, -1, 0, +1, +2 એમ કુલ 5 હોય છે. સ્પિન ક્વોન્ટમ આંક (m_s) ની સંભવિત કિંમતો +1/2 અને -1/2 એમ 2 હોય છે. આથી ગુણાકાર = 5 × 2 = 10 થાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે તેઓ સંભવિત કિંમતોની સંખ્યાનો ખોટો ગુણાકાર દર્શાવે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 2: પરમાણુની રચના", "difficulty": "Hard", "num": 21}, {"question": "ક્વોન્ટમ યંત્રશાસ્ત્રમાં, પાઉલીનો બાકાત સિદ્ધાંત (Pauli Exclusion Principle) કયા ક્વોન્ટમ આંકોના સંયોજન પર આધારિત છે, જે એક જ પરમાણુમાં બે ઇલેક્ટ્રોનની સમાન અવસ્થા ધરાવવા પર પ્રતિબંધ મૂકે છે?", "options": ["A) ફક્ત મુખ્ય ક્વોન્ટમ આંક (n) અને કોણીય વેગમાન ક્વોન્ટમ આંક (l)", "B) ફક્ત કોણીય વેગમાન ક્વોન્ટમ આંક (l) અને ચુંબકીય ક્વોન્ટમ આંક (m_l)", "C) ચારેય ક્વોન્ટમ આંકો (n, l, m_l, m_s) નું સંયોજન", "D) ફક્ત સ્પિન ક્વોન્ટમ આંક (m_s)"], "correct": 2, "explanation": "પાઉલીનો બાકાત સિદ્ધાંત જણાવે છે કે એક જ પરમાણુમાં બે ઇલેક્ટ્રોન એકસમાન ચારેય ક્વોન્ટમ આંકો (n, l, m_l, m_s) ધરાવી શકતા નથી. આથી વિકલ્પ C સાચો છે. અન્ય વિકલ્પો ખોટા છે કારણ કે તેઓ પૂરતા ક્વોન્ટમ આંકોનો સમાવેશ કરતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 2: પરમાણુની રચના", "difficulty": "Hard", "num": 22}, {"question": "એક ઇલેક્ટ્રોન માટે મુખ્ય ક્વોન્ટમ આંક n=3 અને કોણીય વેગમાન ક્વોન્ટમ આંક l=1 છે. આ ઇલેક્ટ્રોન માટે કયું વિધાન ખોટું છે?", "options": ["A) આ ઇલેક્ટ્રોન 3p કક્ષકમાં છે.", "B) આ ઇલેક્ટ્રોન માટે ચુંબકીય ક્વોન્ટમ આંક (m_l) ની સંભવિત કિંમતો -1, 0, +1 છે.", "C) આ ઇલેક્ટ્રોન માટે સ્પિન ક્વોન્ટમ આંક (m_s) ની કિંમત માત્ર +1/2 હોઈ શકે છે.", "D) આ ઇલેક્ટ્રોન માટે કુલ કક્ષકોની સંખ્યા 3 છે."], "correct": 2, "explanation": "જ્યારે l=1 હોય ત્યારે ચુંબકીય ક્વોન્ટમ આંક (m_l) ની સંભવિત કિંમતો -1, 0, +1 હોય છે અને સ્પિન ક્વોન્ટમ આંક (m_s) ની કિંમતો +1/2 અને -1/2 બંને હોઈ શકે છે. આથી વિકલ્પ C ખોટું છે કારણ કે તેમાં માત્ર +1/2 નો ઉલ્લેખ છે. અન્ય વિકલ્પો સાચા છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 2: પરમાણુની રચના", "difficulty": "Hard", "num": 23}, {"question": "ક્વોન્ટમ યંત્રશાસ્ત્રમાં, ઝીમેન અસર (Zeeman Effect) કયા ક્વોન્ટમ આંક સાથે સંકળાયેલી છે અને તે કયા પ્રકારના ક્ષેત્રની હાજરીમાં જોવા મળે છે?", "options": ["A) કોણીય વેગમાન ક્વોન્ટમ આંક (l) અને વિદ્યુત ક્ષેત્ર", "B) ચુંબકીય ક્વોન્ટમ આંક (m_l) અને ચુંબકીય ક્ષેત્ર", "C) સ્પિન ક્વોન્ટમ આંક (m_s) અને વિદ્યુત ક્ષેત્ર", "D) મુખ્ય ક્વોન્ટમ આંક (n) અને ગુરુત્વાકર્ષણ ક્ષેત્ર"], "correct": 1, "explanation": "ઝીમેન અસર ચુંબકીય ક્વોન્ટમ આંક (m_l) સાથે સંકળાયેલી છે અને તે ચુંબકીય ક્ષેત્રની હાજરીમાં જોવા મળે છે. આથી વિકલ્પ B સાચો છે. અન્ય વિકલ્પો ખોટા છે કારણ કે તેઓ ખોટા ક્વોન્ટમ આંક અથવા ખોટા ક્ષેત્રનો ઉલ્લેખ કરે છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 12: પરમાણુઓ", "difficulty": "Hard", "num": 24}, {"question": "એક પરમાણુમાં ઇલેક્ટ્રોનની અવસ્થા માટે મુખ્ય ક્વોન્ટમ આંક n=2 અને કોણીય વેગમાન ક્વોન્ટમ આંક l=0 છે. આ ઇલેક્ટ્રોન માટે નીચેનામાંથી કયું વિધાન ખોટું છે, જો તે પરમાણુ હાઇડ્રોજન હોય?", "options": ["A) આ ઇલેક્ટ્રોન 2s કક્ષકમાં છે.", "B) આ ઇલેક્ટ્રોન માટે ચુંબકીય ક્વોન્ટમ આંક (m_l) ની કિંમત માત્ર 0 છે.", "C) આ ઇલેક્ટ્રોન માટે સ્પિન ક્વોન્ટમ આંક (m_s) ની કિંમતો +1/2 અને -1/2 બંને હોઈ શકે છે.", "D) આ ઇલેક્ટ્રોન માટે કુલ કક્ષકોની સંખ્યા 4 છે."], "correct": 3, "explanation": "જ્યારે n=2 અને l=0 હોય ત્યારે ઇલેક્ટ્રોન 2s કક્ષકમાં હોય છે, જેમાં ચુંબકીય ક્વોન્ટમ આંક (m_l) ની કિંમત માત્ર 0 હોય છે અને સ્પિન ક્વોન્ટમ આંક (m_s) ની કિંમતો +1/2 અને -1/2 બંને હોઈ શકે છે. આથી વિકલ્પ D ખોટું છે કારણ કે 2s કક્ષક માટે કુલ કક્ષકોની સંખ્યા 1 હોય છે, 4 નહીં.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 2: પરમાણુની રચના", "difficulty": "Hard", "num": 25}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
