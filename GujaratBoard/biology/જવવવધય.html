<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>જૈવવૈવિધ્ય</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>જૈવવૈવિધ્ય</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">જૈવવૈવિધ્ય</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "જૈવવૈવિધ્યના સંદર્ભમાં, 'હોટસ્પોટ' એટલે શું? નીચેનામાંથી કયો વિધાન સૌથી યોગ્ય રીતે વ્યાખ્યાયિત કરે છે?", "opts": ["જ્યાં જૈવવૈવિધ્ય અત્યંત ઓછું હોય અને માનવી પ્રવૃત્તિઓને કારણે નાશ પામતું હોય તે વિસ્તાર", "જ્યાં જૈવવૈવિધ્ય અત્યંત ઉચ્ચ હોય અને એન્ટેમિક (સ્થાનિક) પ્રજાતિઓની સંખ્યા મોટી હોય તેમજ ધમકી હેઠળ હોય તે વિસ્તાર", "જ્યાં ફક્ત વનસ્પતિ પ્રજાતિઓ જોવા મળે અને પ્રાણી પ્રજાતિઓનો અભાવ હોય તે વિસ્તાર", "જ્યાં માત્ર જલચર પ્રજાતિઓ જોવા મળે અને સ્થળચર પ્રજાતિઓનો અભાવ હોય તે વિસ્તાર"], "ans": 1, "exp": "હોટસ્પોટ એ જૈવવૈવિધ્યના દૃષ્ટિકોણથી અત્યંત મહત્વપૂર્ણ વિસ્તાર છે જ્યાં જૈવવૈવિધ્ય ઉચ્ચ હોય, એન્ટેમિક પ્રજાતિઓની સંખ્યા મોટી હોય અને તે ધમકી હેઠળ હોય. વિકલ્પ A ગળતર છે કારણ કે હોટસ્પોટમાં જૈવવૈવિધ્ય ઓછું નથી હોતું. વિકલ્પ C અને D અપૂર્ણ છે કારણ કે હોટસ્પોટમાં ફક્ત વનસ્પતિ અથવા જલચર પ્રજાતિઓ જ નહીં, પરંતુ વિવિધ પ્રકારની પ્રજાતિઓ હોય છે.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને તેનું સંરક્ષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો વિકલ્પ 'ઇન-સિટ્યુ સંરક્ષણ' અને 'એક્સ-સિટ્યુ સંરક્ષણ' વચ્ચેનો સૌથી યોગ્ય તફાવત દર્શાવે છે?", "opts": ["ઇન-સિટ્યુ સંરક્ષણમાં પ્રજાતિઓને તેમના નૈસર્ગિક આવાસમાં સંરક્ષિત કરવામાં આવે છે, જ્યારે એક્સ-સિટ્યુ સંરક્ષણમાં પ્રજાતિઓને તેમના નૈસર્ગિક આવાસથી દૂર સંરક્ષિત કરવામાં આવે છે.", "ઇન-સિટ્યુ સંરક્ષણમાં પ્રજાતિઓને તેમના નૈસર્ગિક આવાસથી દૂર સંરક્ષિત કરવામાં આવે છે, જ્યારે એક્સ-સિટ્યુ સંરક્ષણમાં પ્રજાતિઓને તેમના નૈસર્ગિક આવાસમાં સંરક્ષિત કરવામાં આવે છે.", "ઇન-સિટ્યુ સંરક્ષણમાં ફક્ત પ્રાણી પ્રજાતિઓને સંરક્ષિત કરવામાં આવે છે, જ્યારે એક્સ-સિટ્યુ સંરક્ષણમાં ફક્ત વનસ્પતિ પ્રજાતિઓને સંરક્ષિત કરવામાં આવે છે.", "ઇન-સિટ્યુ સંરક્ષણમાં પ્રજાતિઓને કૃત્રિમ રીતે ઉગાડવામાં આવે છે, જ્યારે એક્સ-સિટ્યુ સંરક્ષણમાં પ્રજાતિઓને નૈસર્ગિક રીતે ઉગાડવામાં આવે છે."], "ans": 0, "exp": "ઇન-સિટ્યુ સંરક્ષણમાં પ્રજાતિઓને તેમના નૈસર્ગિક આવાસમાં જ સંરક્ષિત કરવામાં આવે છે, જ્યારે એક્સ-સિટ્યુ સંરક્ષણમાં પ્રજાતિઓને તેમના નૈસર્ગિક આવાસથી દૂર, જેમ કે ચિડિયાઘર અથવા વનસ્પતિ ઉદ્યાનમાં સંરક્ષિત કરવામાં આવે છે. વિકલ્પ B, C, અને D ગળતર છે કારણ કે તેઓ વાસ્તવિક વ્યાખ્યાને ઉલટાવે છે અથવા અપૂર્ણ માહિતી આપે છે.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને તેનું સંરક્ષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો વિકલ્પ 'જીન પૂલ' ની સૌથી યોગ્ય વ્યાખ્યા આપે છે?", "opts": ["એક જ પ્રજાતિમાં જોવા મળતા તમામ જનીનોનો સંગ્રહ", "એક જ વસતિમાં જોવા મળતા તમામ જનીનોનો સંગ્રહ", "એક જ વિસ્તારમાં જોવા મળતા તમામ પ્રજાતિઓના જનીનોનો સંગ્રહ", "એક જ કોષમાં જોવા મળતા તમામ જનીનોનો સંગ્રહ"], "ans": 1, "exp": "જીન પૂલ એ એક જ વસતિમાં જોવા મળતા તમામ જનીનોનો સંગ્રહ છે. વિકલ્પ A ગળતર છે કારણ કે જીન પૂલ એક પ્રજાતિમાં નહીં, પરંતુ એક વસતિમાં જોવા મળે છે. વિકલ્પ C અને D પણ ગળતર છે કારણ કે જીન પૂલ એક વિસ્તાર અથવા કોષ સુધી મર્યાદિત નથી.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને તેનું સંરક્ષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો વિકલ્પ 'રેડ ડેટા બુક' ની સૌથી યોગ્ય વ્યાખ્યા આપે છે?", "opts": ["એવી પ્રજાતિઓની યાદી જે લુપ્ત થવાના ધોખામાં છે", "એવી પ્રજાતિઓની યાદી જે લુપ્ત થઈ ચૂકી છે", "એવી પ્રજાતિઓની યાદી જે નવી શોધાયેલ છે", "એવી પ્રજાતિઓની યાદી જે માનવી માટે હાનિકારક છે"], "ans": 0, "exp": "રેડ ડેટા બુક એ એવી પ્રજાતિઓની યાદી છે જે લુપ્ત થવાના ધોખામાં છે. વિકલ્પ B ગળતર છે કારણ કે રેડ ડેટા બુકમાં લુપ્ત થઈ ચૂકેલ પ્રજાતિઓનો સમાવેશ થતો નથી. વિકલ્પ C અને D પણ ગળતર છે કારણ કે તેઓ રેડ ડેટા બુકના હેતુને યોગ્ય રીતે વર્ણવતા નથી.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને તેનું સંરક્ષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો વિકલ્પ 'બાયોસ્ફિયર રિઝર્વ' ની સૌથી યોગ્ય વ્યાખ્યા આપે છે?", "opts": ["એવો વિસ્તાર જ્યાં માત્ર પ્રાણી સંરક્ષણ પર ધ્યાન કેન્દ્રિત કરવામાં આવે છે", "એવો વિસ્તાર જ્યાં માત્ર વનસ્પતિ સંરક્ષણ પર ધ્યાન કેન્દ્રિત કરવામાં આવે છે", "એવો વિસ્તાર જ્યાં જૈવવૈવિધ્યના સંરક્ષણ સાથે સાથે સ્થાનિક લોકોના હિતોનો પણ વિચાર કરવામાં આવે છે", "એવો વિસ્તાર જ્યાં માત્ર વૈજ્ઞાનિક સંશોધન પર ધ્યાન કેન્દ્રિત કરવામાં આવે છે"], "ans": 2, "exp": "બાયોસ્ફિયર રિઝર્વ એ એવો વિસ્તાર છે જ્યાં જૈવવૈવિધ્યના સંરક્ષણ સાથે સાથે સ્થાનિક લોકોના હિતોનો પણ વિચાર કરવામાં આવે છે. વિકલ્પ A અને B અપૂર્ણ છે કારણ કે તેઓ ફક્ત પ્રાણી અથવા વનસ્પતિ સંરક્ષણ પર ધ્યાન કેન્દ્રિત કરે છે. વિકલ્પ D પણ અપૂર્ણ છે કારણ કે બાયોસ્ફિયર રિઝર્વમાં માત્ર વૈજ્ઞાનિક સંશોધન જ નહીં, પરંતુ સંરક્ષણ અને સ્થાનિક લોકોના હિતો પણ મહત્વપૂર્ણ છે.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને તેનું સંરક્ષણ", "ch": ""}, {"q": "ગુજરાતના કચ્છના અરણ્ય વિસ્તારમાં જોવા મળતા 'કાળિયાર' (Blackbuck) ની જૈવવૈવિધ્યના સંરક્ષણ માટે નીચેનામાંથી કયો પગલો સૌથી અસરકારક ગણાય છે, જ્યારે તેના નિવાસસ્થાનમાં મનુષ્યની હસ્તક્ષેપ વૃદ્ધિ પામી રહી છે?", "opts": ["કાળિયારને કેદમાં રાખીને પ્રજનન કરાવવું અને પછી જંગલમાં છોડવું", "સ્થાનિક સમુદાયને જાગૃત કરવા અને તેમની સહભાગિતાથી નિવાસસ્થાનનું સંરક્ષણ કરવું", "કાળિયારના જીન પૂલને લેબોરેટરીમાં સંગ્રહિત કરવો", "કાળિયારને અન્ય રાષ્ટ્રીય ઉદ્યાનોમાં સ્થળાંતરિત કરવું"], "ans": 1, "exp": "કાળિયારના સંરક્ષણ માટે સ્થાનિક સમુદાયની સહભાગિતા મહત્વપૂર્ણ છે, કારણ કે તે નિવાસસ્થાનના વાસ્તવિક રક્ષણમાં મદદ કરે છે. કેદમાં પ્રજનન (A) અને જીન પૂલ સંગ્રહ (C) એ એક્સ-સિટ્યુ પદ્ધતિઓ છે, જે ઇન-સિટ્યુ સંરક્ષણ જેટલી અસરકારક નથી. સ્થળાંતર (D) નિવાસસ્થાનના વિનાશને રોકતું નથી, પરંતુ તે એક અંતિમ ઉપાય છે. સ્થાનિક સમુદાયની સહભાગિતા (B) નિવાસસ્થાનના સંરક્ષણમાં સૌથી ટકાઉ ઉકેલ છે.", "ref": "Std 12 - અધ્યાય 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો વિકલ્પ 'જૈવવૈવિધ્યના નુકસાન' ના સૌથી મહત્વપૂર્ણ કારણ તરીકે ઓળખાય છે, જે વૈશ્વિક સ્તરે ચિંતાનો વિષય બન્યો છે?", "opts": ["પ્રાકૃતિક આફતો જેવી કે ચક્રવાત અને ભૂકંપ", "મનુષ્યની ક્રિયાઓ જેવી કે જંગલોનો નાશ અને પ્રદૂષણ", "જૈવિક ઉત્ક્રાંતિના કુદરતી પ્રક્રિયાઓ", "અંતરરાષ્ટ્રીય વેપાર અને પર્યટન"], "ans": 1, "exp": "મનુષ્યની ક્રિયાઓ જેવી કે જંગલોનો નાશ, પ્રદૂષણ, અને અતિશય શોષણ એ જૈવવૈવિધ્યના નુકસાનના મુખ્ય કારણો છે. પ્રાકૃતિક આફતો (A) અને કુદરતી ઉત્ક્રાંતિ (C) તો કુદરતી પ્રક્રિયાઓ છે, જે લાંબા ગાળામાં થાય છે, પરંતુ મનુષ્યની ક્રિયાઓ એ ટૂંકા ગાળામાં જૈવવૈવિધ્યને નુકસાન પહોંચાડે છે. અંતરરાષ્ટ્રીય વેપાર અને પર્યટન (D) પણ એક કારણ છે, પરંતુ તે મુખ્ય કારણ નથી.", "ref": "Std 12 - અધ્યાય 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો વિકલ્પ 'જૈવવૈવિધ્યના સંરક્ષણ' માટેના 'સંરક્ષિત વિસ્તારો' ની વ્યાખ્યા સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["એવા વિસ્તારો જ્યાં માત્ર વનસ્પતિઓ અને પ્રાણીઓને જ રાખવામાં આવે છે", "એવા વિસ્તારો જ્યાં કાયદેસર રીતે જૈવવૈવિધ્યનું રક્ષણ કરવામાં આવે છે અને મનુષ્યની હસ્તક્ષેપ પર પ્રતિબંધ લગાવવામાં આવે છે", "એવા વિસ્તારો જ્યાં માત્ર વૈજ્ઞાનિક સંશોધન માટે જ પ્રવેશ મળે છે", "એવા વિસ્તારો જ્યાં માત્ર સ્થાનિક લોકોને જ પ્રવેશ મળે છે"], "ans": 1, "exp": "સંરક્ષિત વિસ્તારો એવા વિસ્તારો છે જ્યાં કાયદેસર રીતે જૈવવૈવિધ્યનું રક્ષણ કરવામાં આવે છે અને મનુષ્યની હસ્તક્ષેપ પર પ્રતિબંધ અથવા મર્યાદા લગાવવામાં આવે છે. વિકલ્પ (A) અપૂર્ણ છે કારણ કે તે માત્ર વનસ્પતિઓ અને પ્રાણીઓ પર જ કેન્દ્રિત છે. વિકલ્પ (C) અને (D) અતિશય મર્યાદિત છે અને સંરક્ષિત વિસ્તારોની વ્યાખ્યાને પૂરી રીતે વર્ણવતાં નથી.", "ref": "Std 12 - અધ્યાય 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો વિકલ્પ 'જૈવવૈવિધ્યના આર્થિક મૂલ્ય' ની સૌથી યોગ્ય ઉદાહરણ આપે છે?", "opts": ["જંગલોમાં રહેતા પ્રાણીઓનું સૌંદર્ય", "વનસ્પતિઓમાંથી મેળવવામાં આવતા ઔષધીય પદાર્થો", "પ્રાણીઓના અવશેષોમાંથી મેળવવામાં આવતી જૈવિક ઊર્જા", "જંગલોમાં રહેતા પ્રાણીઓનું સાંસ્કૃતિક મહત્વ"], "ans": 1, "exp": "વનસ્પતિઓમાંથી મેળવવામાં આવતા ઔષધીય પદાર્થો (B) એ જૈવવૈવિધ્યના આર્થિક મૂલ્યની સૌથી સ્પષ્ટ ઉદાહરણ છે, કારણ કે તે વ્યાવસાયિક રીતે મૂલ્યવાન છે અને આર્થિક લાભ પ્રદાન કરે છે. સૌંદર્ય (A) અને સાંસ્કૃતિક મહત્વ (D) એ બિન-આર્થિક મૂલ્યો છે, જ્યારે જૈવિક ઊર્જા (C) એ એક અપ્રત્યક્ષ લાભ છે.", "ref": "Std 12 - અધ્યાય 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો વિકલ્પ 'જૈવવૈવિધ્યના સંરક્ષણ' માટેના 'જૈવિક ઉદ્યાન' (Botanical Garden) ની ભૂમિકા સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["તે માત્ર સુંદર ફૂલો અને વૃક્ષોને ઉગાડવા માટેનો વિસ્તાર છે", "તે એક એવો વિસ્તાર છે જ્યાં વનસ્પતિઓના નમૂનાઓને સંગ્રહિત અને સંરક્ષિત કરવામાં આવે છે, જેમાં લુપ્ત પ્રજાતિઓ પણ સમાવિષ્ટ હોય છે", "તે એક એવો વિસ્તાર છે જ્યાં માત્ર વૈજ્ઞાનિકો જ પ્રવેશ કરી શકે છે", "તે એક એવો વિસ્તાર છે જ્યાં માત્ર સ્થાનિક વનસ્પતિઓ જ ઉગાડવામાં આવે છે"], "ans": 1, "exp": "જૈવિક ઉદ્યાન (B) એ એક એવો વિસ્તાર છે જ્યાં વનસ્પતિઓના નમૂનાઓને સંગ્રહિત અને સંરક્ષિત કરવામાં આવે છે, જેમાં લુપ્ત પ્રજાતિઓ પણ સમાવિષ્ટ હોય છે. વિકલ્પ (A) અપૂર્ણ છે કારણ કે તે માત્ર સુંદરતાને જ ધ્યાનમાં લે છે. વિકલ્પ (C) અને (D) અતિશય મર્યાદિત છે અને જૈવિક ઉદ્યાનની ભૂમિકાને પૂરી રીતે વર્ણવતાં નથી.", "ref": "Std 12 - અધ્યાય 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "ગુજરાતના કચ્છના રણમાં જોવા મળતા 'કાળિયાર' (Blackbuck) ની જાતિનું સંરક્ષણ કરવા માટે નીચેનામાંથી કયો પગલો સૌથી અસરકારક ગણાય છે, જ્યારે તેની આસપાસની વન્યજીવન આવાસસ્થાનો નાશ પામી રહી છે?", "opts": ["કાળિયારને કેદમાં રાખીને પ્રજનન કરાવવું અને પછી જંગલમાં છોડવું", "કાળિયારના નિવાસસ્થાનને સંરક્ષિત વિસ્તાર જાહેર કરવું અને સ્થાનિક સમુદાયને સંરક્ષણમાં સામેલ કરવું", "કાળિયારની જનીનિક વિવિધતાને જાળવવા માટે તેના DNA ના નમૂના એકત્રિત કરવા", "કાળિયારને અન્ય રાજ્યોમાં સ્થળાંતરિત કરવા"], "ans": 1, "exp": "વિકલ્પ B સૌથી અસરકારક છે કારણ કે સંરક્ષિત વિસ્તાર જાહેર કરવાથી કાળિયારના નિવાસસ્થાનને કાયદેસર સંરક્ષણ મળે છે અને સ્થાનિક સમુદાયને સામેલ કરવાથી લાંબાગાળાનું સંરક્ષણ શક્ય બને છે. વિકલ્પ A કેદમાં પ્રજનન કરવું એ ટૂંકાગાળાનું ઉકેલ છે અને જંગલમાં છોડ્યા પછી તેની અડચણો રહે છે. વિકલ્પ C DNA નમૂના એકત્રિત કરવું એ જનીનિક સંરક્ષણ માટે ઉપયોગી છે પરંતુ તે નિવાસસ્થાનના નાશને રોકતું નથી. વિકલ્પ D સ્થળાંતરિત કરવું એ નિવાસસ્થાનના નાશને ઉકેલતું નથી અને નવી જગ્યાએ અનુકૂલનની સમસ્યાઓ ઉભી કરે છે.", "ref": "Std 12 - અધ્યાય 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "જૈવવૈવિધ્યના સંદર્ભમાં, 'કીસ્ટોન જાતિ' (Keystone Species) એટલે શું? નીચેનામાંથી કયો વિકલ્પ સૌથી યોગ્ય રીતે વ્યાખ્યાયિત કરે છે?", "opts": ["એવી જાતિ જે તેના નિવાસસ્થાનમાં સૌથી વધુ સંખ્યામાં જોવા મળે છે", "એવી જાતિ જે પારિસ્થિતિક તંત્રની રચનાને મહત્વપૂર્ણ રીતે પ્રભાવિત કરે છે અને તેના અભાવે પારિસ્થિતિક તંત્ર ખોરવાઈ જાય છે", "એવી જાતિ જે સૌથી વધુ પ્રાણીઓ દ્વારા શિકાર કરવામાં આવે છે", "એવી જાતિ જે સૌથી વધુ પ્રમાણમાં પ્રકાશસંશ્લેષણ કરે છે"], "ans": 1, "exp": "વિકલ્પ B સૌથી યોગ્ય છે કારણ કે 'કીસ્ટોન જાતિ' એ પારિસ્થિતિક તંત્રની રચનાને મહત્વપૂર્ણ રીતે પ્રભાવિત કરે છે અને તેના અભાવે પારિસ્થિતિક તંત્ર ખોરવાઈ જાય છે. વિકલ્પ A એવી જાતિ જે સૌથી વધુ સંખ્યામાં જોવા મળે છે તે 'ડોમિનન્ટ જાતિ' કહેવાય છે. વિકલ્પ C એવી જાતિ જે સૌથી વધુ શિકાર કરવામાં આવે છે તે 'પ્રી જાતિ' કહેવાય છે. વિકલ્પ D એવી જાતિ જે સૌથી વધુ પ્રકાશસંશ્લેષણ કરે છે તે 'પ્રોડ્યુસર' કહેવાય છે.", "ref": "Std 12 - અધ્યાય 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "ગુજરાતમાં જોવા મળતા 'અસિતા' (Asita) પક્ષીની જાતિનું સંરક્ષણ કરવા માટે નીચેનામાંથી કયો પગલો સૌથી યોગ્ય ગણાય છે, જ્યારે તેની સંખ્યા ખૂબ જ ઓછી છે?", "opts": ["અસિતા પક્ષીને કેદમાં રાખીને પ્રજનન કરાવવું", "અસિતા પક્ષીના નિવાસસ્થાનને સંરક્ષિત વિસ્તાર જાહેર કરવું અને તેના શિકારને રોકવા માટે કડક કાયદા લાગૂ કરવા", "અસિતા પક્ષીના DNA ના નમૂના એકત્રિત કરવા અને તેને જનીનિક બેંકમાં સંગ્રહિત કરવા", "અસિતા પક્ષીને અન્ય દેશોમાં સ્થળાંતરિત કરવા"], "ans": 1, "exp": "વિકલ્પ B સૌથી યોગ્ય છે કારણ કે અસિતા પક્ષીના નિવાસસ્થાનને સંરક્ષિત વિસ્તાર જાહેર કરવાથી અને શિકારને રોકવા માટે કડક કાયદા લાગૂ કરવાથી તેની સંખ્યા વધારવા માટે સુરક્ષિત વાતાવરણ પૂરું પાડે છે. વિકલ્પ A કેદમાં પ્રજનન કરવું એ ટૂંકાગાળાનું ઉકેલ છે અને જંગલમાં છોડ્યા પછી તેની અડચણો રહે છે. વિકલ્પ C DNA નમૂના એકત્રિત કરવું એ જનીનિક સંરક્ષણ માટે ઉપયોગી છે પરંતુ તે નિવાસસ્થાનના નાશને રોકતું નથી. વિકલ્પ D સ્થળાંતરિત કરવું એ નિવાસસ્થાનના નાશને ઉકેલતું નથી અને નવી જગ્યાએ અનુકૂલનની સમસ્યાઓ ઉભી કરે છે.", "ref": "Std 12 - અધ્યાય 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો વિકલ્પ 'જૈવવૈવિધ્યના સંરક્ષણ' માટેના 'રામસર કન્વેનશન' ની સૌથી યોગ્ય વ્યાખ્યા આપે છે?", "opts": ["આંતરરાષ્ટ્રીય સ્તરે વન્યજીવનના સંરક્ષણ માટેની સંમેલન", "આંતરરાષ્ટ્રીય સ્તરે ઓળખાયેલી ભીની જમીન (Wetlands) ના સંરક્ષણ અને ટકાઉ ઉપયોગ માટેની સંમેલન", "આંતરરાષ્ટ્રીય સ્તરે જંગલોના સંરક્ષણ માટેની સંમેલન", "આંતરરાષ્ટ્રીય સ્તરે સમુદ્રી જૈવવૈવિધ્યના સંરક્ષણ માટેની સંમેલન"], "ans": 1, "exp": "વિકલ્પ B સૌથી યોગ્ય છે કારણ કે 'રામસર કન્વેનશન' એ આંતરરાષ્ટ્રીય સ્તરે ઓળખાયેલી ભીની જમીન (Wetlands) ના સંરક્ષણ અને ટકાઉ ઉપયોગ માટેની સંમેલન છે. વિકલ્પ A વન્યજીવનના સંરક્ષણ માટેની સંમેલન એ 'CITES' કન્વેનશન છે. વિકલ્પ C જંગલોના સંરક્ષણ માટેની સંમેલન એ 'UNFF' છે. વિકલ્પ D સમુદ્રી જૈવવૈવિધ્યના સંરક્ષણ માટેની સંમેલન એ 'UNCLOS' છે.", "ref": "Std 12 - અધ્યાય 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "ગુજરાતના કચ્છના રણ વિસ્તારમાં 'કાળિયાર' (Blackbuck) ની જાતિના સંરક્ષણ માટે 'કમ્યુનિટી રિઝર્વ' ની સ્થાપના કરવામાં આવી છે. આ સંદર્ભમાં, નીચેનામાંથી કયો વિકલ્પ 'કમ્યુનિટી રિઝર્વ' ની સૌથી યોગ્ય લાક્ષણિકતા દર્શાવે છે?", "opts": ["તે એક એવો સંરક્ષિત વિસ્તાર છે જ્યાં સ્થાનિક સમુદાયોને જૈવવૈવિધ્યના સંરક્ષણ અને વ્યવસ્થાપનમાં સક્રિય ભૂમિકા આપવામાં આવે છે.", "તે એક એવો વિસ્તાર છે જ્યાં ફક્ત સરકારી અધિકારીઓ દ્વારા જ જૈવવૈવિધ્યનું સંરક્ષણ કરવામાં આવે છે અને સ્થાનિક લોકોને પ્રવેશ નિષેધ છે.", "તે એક એવો વિસ્તાર છે જ્યાં ફક્ત વિદેશી પ્રજાતિઓનું સંરક્ષણ કરવામાં આવે છે અને સ્થાનિક જાતિઓને અનદેખા કરવામાં આવે છે.", "તે એક એવો વિસ્તાર છે જ્યાં ફક્ત વનસ્પતિ જાતિઓનું સંરક્ષણ કરવામાં આવે છે અને પ્રાણી જાતિઓને સમાવવામાં આવતી નથી."], "ans": 0, "exp": "કમ્યુનિટી રિઝર્વમાં સ્થાનિક સમુદાયોને જૈવવૈવિધ્યના સંરક્ષણ અને વ્યવસ્થાપનમાં સક્રિય ભૂમિકા આપવામાં આવે છે, જેથી તેઓ તેમના પરંપરાગત જ્ઞાન અને અનુભવનો ઉપયોગ કરી શકે. વિકલ્પ A સૌથી યોગ્ય છે કારણ કે તે કમ્યુનિટી રિઝર્વની મૂળ ભૂમિકાને દર્શાવે છે. વિકલ્પ B ખોટો છે કારણ કે કમ્યુનિટી રિઝર્વમાં સ્થાનિક લોકોની ભૂમિકા મહત્વપૂર્ણ હોય છે. વિકલ્પ C ખોટો છે કારણ કે કમ્યુનિટી રિઝર્વમાં સ્થાનિક જાતિઓનું સંરક્ષણ કરવામાં આવે છે, વિદેશી પ્રજાતિઓનું નહીં. વિકલ્પ D ખોટો છે કારણ કે કમ્યુનિટી રિઝર્વમાં પ્રાણી અને વનસ્પતિ બંને જાતિઓનું સંરક્ષણ કરવામાં આવે છે.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને તેનું સંરક્ષણ", "ch": ""}, {"q": "જૈવવૈવિધ્યના સંદર્ભમાં, 'એન્ડેમિક જાતિ' (Endemic Species) ની વ્યાખ્યા કયા વિકલ્પમાં સૌથી યોગ્ય રીતે આપી છે?", "opts": ["જે જાતિ એક જ ભૌગોલિક વિસ્તારમાં જોવા મળે છે અને બીજે ક્યાંય નહીં", "જે જાતિ વિશ્વના બધા જ વિસ્તારોમાં જોવા મળે છે", "જે જાતિ માત્ર જળમાં જોવા મળે છે", "જે જાતિ માત્ર જંગલમાં જોવા મળે છે"], "ans": 0, "exp": "એન્ડેમિક જાતિ (A) એવી જાતિ હોય છે જે એક જ ભૌગોલિક વિસ્તારમાં મર્યાદિત હોય છે, જેમકે ગુજરાતના ગીર અભયારણ્યમાં જોવા મળતા સિંહ. બાકીના વિકલ્પો (B, C, D) એન્ડેમિક જાતિની વ્યાખ્યાને અનુરૂપ નથી.", "ref": "Std 12 - અધ્યાય ૧૫: જૈવવૈવિધ્ય અને તેનું સંરક્ષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો વિકલ્પ 'જૈવવૈવિધ્યના સંરક્ષણ' માટેના 'જીન બેંક' (Gene Ba function renderQ(){

  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';

  }).join('');

}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
