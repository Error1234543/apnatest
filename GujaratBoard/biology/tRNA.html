<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tRNA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>tRNA</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">tRNA</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક વિશિષ્ટ tRNA અણુના એન્ટીકોડોન લૂપમાં 5′-IAC-3′ ક્રમ જોવા મળે છે. આ tRNA દ્વારા કયા એમિનો એસિડનું વહન થવાની સંભાવના છે?", "opts": ["મિથિયોનિન", "વેલિન", "ટાયરોસિન", "આઇસોલ્યુસિન"], "ans": 1, "exp": "tRNAના એન્ટીકોડોન 5′-IAC-3′નો કોડોન 5′-GUA-3′ થશે (પૂરક અને વિરુદ્ધ દિશા). આ કોડોન વેલિન માટેનો છે. મિથિયોનિન માટે AUG, ટાયરોસિન માટે UAC/UAU અને આઇસોલ્યુસિન માટે AUU/AUC/AUA કોડોન હોય છે. I (ઇનોસિન) એ ગુજબસ (wobble) સ્થાને હોઈ શકે છે, જે વેલિનના કોડોન સાથે જોડાઈ શકે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન tRNAની રચના અને કાર્ય માટે ખોટું છે?", "opts": ["tRNAના 3′ છેડે CCA ક્રમ હોય છે, જે એમિનો એસિડ સાથે જોડાય છે", "tRNAના એન્ટીકોડોન લૂપમાં હંમેશા ત્રણ બેઝ હોય છે, જે mRNAના કોડોન સાથે પૂરક હોય છે", "tRNAમાં ડાઇહાઇડ્રો યુરિડિન (D) લૂપ એ રાઇબોઝોમ સાથેની ઓળખ માટે જવાબદાર છે", "tRNAની રચનામાં હંમેશા ચાર લૂપ હોય છે, જેમાં એક એન્ટીકોડોન લૂપ અને ત્રણ વધારાના લૂપ હોય છે"], "ans": 3, "exp": "tRNAમાં સામાન્ય રીતે ત્રણ લૂપ હોય છે: એન્ટીકોડોન લૂપ, D લૂપ અને TΨC લૂપ. ચોથો લૂપ હંમેશા હાજર હોતો નથી. CCA ક્રમ 3′ છેડે હોય છે અને એમિનો એસિડ સાથે જોડાય છે. એન્ટીકોડોન લૂપમાં ત્રણ બેઝ હોય છે જે mRNA સાથે પૂરક હોય છે. D લૂપ રાઇબોઝોમ સાથેની ઓળખમાં મદદ કરે છે, પરંતુ તે એકમાત્ર કારણ નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક પ્રયોગમાં જોવા મળ્યું કે tRNA અણુમાં એન્ટીકોડોન લૂપમાં ગુજબસ (wobble) સ્થાને ઇનોસિન (I) હાજર છે. આ tRNA કેટલા જુદા-જુદા કોડોનને ઓળખી શકે છે?", "opts": ["1", "2", "3", "4"], "ans": 2, "exp": "ગુજબસ સિદ્ધાંત મુજબ, ઇનોસિન (I) એન્ટીકોડોનના ત્રીજા સ્થાને હોઈ શકે છે અને તે U, C અથવા A સાથે જોડાઈ શકે છે. આમ, એક tRNA અણુ ત્રણ જુદા-જુદા કોડોનને ઓળખી શકે છે. ઉદાહરણ તરીકે, 5′-IAU-3′ એન્ટીકોડોન AUU, AUC અને AUA કોડોન સાથે જોડાઈ શકે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન tRNAના પ્રોસેસિંગ માટે સાચું નથી?", "opts": ["tRNAનું પ્રોસેસિંગ કોષકેન્દ્રમાં થાય છે અને પછી તે કોષરસમાં નિકાસ થાય છે", "tRNAના 5′ છેડાનું પ્રોસેસિંગ RNase P ઉત્સેચક દ્વારા થાય છે", "tRNAના 3′ છેડે CCA ક્રમ ઉમેરવા માટે વિશિષ્ટ ઉત્સેચક જવાબદાર છે", "tRNAના ઇન્ટ્રોન કાપવા માટે સ્પ્લિસઓસોમ જટિલ જવાબદાર છે"], "ans": 3, "exp": "tRNAમાં ઇન્ટ્રોન કાપવા માટે સ્પ્લિસઓસોમ જટિલ જવાબદાર નથી. સ્પ્લિસઓસોમ mRNAના પ્રોસેસિંગ માટે જવાબદાર છે. tRNAમાં ઇન્ટ્રોન કાપવા માટે વિશિષ્ટ ઉત્સેચકો જવાબદાર હોય છે. બાકીના વિધાનો સાચાં છે: tRNAનું પ્રોસેસિંગ કોષકેન્દ્રમાં થાય છે, RNase P 5′ છેડાનું પ્રોસેસિંગ કરે છે, અને CCA ક્રમ ઉમેરવા માટે વિશિષ્ટ ઉત્સેચક હોય છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક વિશિષ્ટ tRNA અણુમાં એન્ટીકોડોન 5′-GΨA-3′ છે, જ્યાં Ψ સ્યુડો યુરિડિન છે. આ tRNA દ્વારા કયા એમિનો એસિડનું વહન થશે? (નોંધ: ગુજબસ સિદ્ધાંત ધ્યાનમાં લો)", "opts": ["સિસ્ટીન", "સેરિન", "થ્રીઓનિન", "ટ્રિપ્ટોફેન"], "ans": 1, "exp": "એન્ટીકોડોન 5′-GΨA-3′નો કોડોન 5′-UGC-3′ થશે (પૂરક અને વિરુદ્ધ દિશા). આ કોડોન સિસ્ટીન માટેનો છે. સ્યુડો યુરિડિન (Ψ) એ યુરિડિનનો એક રૂપાંતરિત સ્વરૂપ છે, જે યુરેસિલની જેમ જ વર્તે છે. સેરિન માટે UCU/UCC/UCA/UCG, થ્રીઓનિન માટે ACU/ACC/ACA/ACG અને ટ્રિપ્ટોફેન માટે UGG કોડોન હોય છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "tRNA અણુમાં કયા ભાગમાં થાય છે તેની સૌથી વધુ રાસાયણિક સુધારણા (chemical modification) જોવા મળે છે?", "opts": ["D લૂપ (D loop)", "એન્ટીકોડોન લૂપ (Anticodon loop)", "TΨC લૂપ (TΨC loop)", "એમિનો એસીલ સ્ટેમ (Aminoacyl stem)"], "ans": 2, "exp": "TΨC લૂપમાં સૌથી વધુ રાસાયણિક સુધારણા જોવા મળે છે, જેમાં સ્યુડોયુરિડિન (Ψ) અને રાઇબોથાયમિડિન જેવી સુધારણા થાય છે. D લૂપમાં ડાયહાઇડ્રોયુરિડિન જોવા મળે છે, પરંતુ તેની સુધારણા ઓછી હોય છે. એન્ટીકોડોન લૂપમાં ગુજબસ સ્થાને સુધારણા થાય છે, પરંતુ તે TΨC લૂપ જેટલી નહીં હોય. એમિનો એસીલ સ્ટેમમાં સુધારણા અત્યંત ઓછી હોય છે.", "ref": "Std 12 - Chapter 6: જૈવ અણુઓ અને પ્રોટીન સંશ્લેષણ", "ch": ""}, {"q": "tRNA અણુમાં એમિનો એસીડ બાંધવાની પ્રક્રિયામાં કયો ઉત્સેચક સક્રિય રોલ ભજવે છે?", "opts": ["RNA પોલિમરેઝ (RNA polymerase)", "એમિનોએસિલ-tRNA સિનથેટેઝ (Aminoacyl-tRNA synthetase)", "પેપ્ટિડાઇલ ટ્રાન્સફરેઝ (Peptidyl transferase)", "હેલિકેઝ (Helicase)"], "ans": 1, "exp": "એમિનોએસિલ-tRNA સિનથેટેઝ ઉત્સેચક tRNA અણુના 3' સિરા પર એમિનો એસીડને બાંધે છે. RNA પોલિમરેઝ tRNAની પ્રતિલિપિ બનાવે છે, પરંતુ એમિનો એસીડ બાંધતું નથી. પેપ્ટિડાઇલ ટ્રાન્સફરેઝ રાઇબોઝોમમાં પેપ્ટાઇડ બંધન બનાવે છે. હેલિકેઝ DNA અણુને અનવાઇન્ડ કરે છે.", "ref": "Std 12 - Chapter 6: જૈવ અણુઓ અને પ્રોટીન સંશ્લેષણ", "ch": ""}, {"q": "tRNA અણુમાં એન્ટીકોડોન લૂપની રચનામાં કયો ન્યુક્લિયોટાઇડ સૌથી વધુ મહત્વનો છે?", "opts": ["એડિનિન (Adenine)", "ગુઆનિન (Guanine)", "સાયટોસિન (Cytosine)", "યુરેસિલ (Uracil)"], "ans": 3, "exp": "એન્ટીકોડોન લૂપમાં યુરેસિલ (U) સૌથી વધુ મહત્વનો છે, કારણ કે તે ગુજબસ (wobble) સ્થાને સુધારણા પામી શકે છે અને mRNA સાથે જોડાણ બનાવવામાં મહત્વનો રોલ ભજવે છે. એડિનિન, ગુઆનિન, અને સાયટોસિન પણ એન્ટીકોડોન લૂપમાં જોવા મળે છે, પરંતુ યુરેસિલની સુધારણા અને લવચીકતા તેને અલગ પાડે છે.", "ref": "Std 12 - Chapter 6: જૈવ અણુઓ અને પ્રોટીન સંશ્લેષણ", "ch": ""}, {"q": "tRNA અણુમાં કયા ભાગમાં 3' સિરા પર CCA ક્રમ જોવા મળે છે?", "opts": ["D લૂપ (D loop)", "એન્ટીકોડોન લૂપ (Anticodon loop)", "એમિનો એસીલ સ્ટેમ (Aminoacyl stem)", "TΨC લૂપ (TΨC loop)"], "ans": 2, "exp": "tRNA અણુના એમિનો એસીલ સ્ટેમના 3' સિરા પર CCA ક્રમ જોવા મળે છે, જ્યાં એમિનો એસીડ બાંધવામાં આવે છે. D લૂપ, એન્ટીકોડોન લૂપ, અને TΨC લૂપમાં આ ક્રમ જોવા મળતો નથી.", "ref": "Std 12 - Chapter 6: જૈવ અણુઓ અને પ્રોટીન સંશ્લેષણ", "ch": ""}, {"q": "tRNA અણુમાં કયા ન્યુક્લિયોટાઇડની સુધારણા એન્ટીકોડોન લૂપની ગુજબસ (wobble) સ્થાને થાય છે?", "opts": ["એડિનિન (Adenine)", "ઇનોસિન (Inosine)", "સાયટોસિન (Cytosine)", "થાયમિન (Thymine)"], "ans": 1, "exp": "એન્ટીકોડોન લૂપની ગુજબસ (wobble) સ્થાને ઇનોસિન (I) ની સુધારણા થાય છે, જે mRNA સાથે જોડાણ બનાવવામાં લવચીકતા પૂરી પાડે છે. એડિનિન, સાયટોસિન, અને થાયમિન આ સ્થાને સુધારણા પામતા નથી.", "ref": "Std 12 - Chapter 6: જૈવ અણુઓ અને પ્રોટીન સંશ્લેષણ", "ch": ""}, {"q": "tRNA અણુની ત્રિપર્ણી (cloverleaf) રચનામાં, નીચેના પૈકી કયું કથન એન્ટીકોડોન લૂપ અને D-લૂપ વચ્ચેના સંબંધ વિશે સાચું છે?", "opts": ["D-લૂપમાં ડાયહાઇડ્રોયુરિડિન ન્યુક્લિયોટાઇડ્સ હોય છે અને એન્ટીકોડોન લૂપમાં એન્ટીકોડોન ત્રણ ન્યુક્લિયોટાઇડ્સ હોય છે, પરંતુ બંને લૂપ્સની રચના પ્રોટીન સંશ્લેષણમાં કોઈ ભૂમિકા ભજવતી નથી.", "D-લૂપ tRNAની સ્થિરતા માટે જવાબદાર છે અને એન્ટીકોડોન લૂપ mRNA સાથે જોડાણ કરે છે, પરંતુ D-લૂપ એમિનો એસીડને ઓળખવામાં મદદ કરે છે.", "D-લૂપમાં ડાયહાઇડ્રોયુરિડિન ન્યુક્લિયોટાઇડ્સ હોય છે જ્યારે એન્ટીકોડોન લૂપમાં એન્ટીકોડોન ત્રણ ન્યુક્લિયોટાઇડ્સ હોય છે, અને D-લૂપ tRNAની સ્થિરતા માટે મહત્વપૂર્ણ છે.", "એન્ટીકોડોન લૂપ અને D-લૂપ બંને mRNA સાથે જોડાણ કરે છે, પરંતુ D-લૂપ એમિનો એસીડને બાંધવામાં મદદ કરે છે."], "ans": 2, "exp": "સાચો જવાબ C છે. D-લૂપમાં ડાયહાઇડ્રોયુરિડિન ન્યુક્લિયોટાઇડ્સ હોય છે અને એન્ટીકોડોન લૂપમાં એન્ટીકોડોન ત્રણ ન્યુક્લિયોટાઇડ્સ હોય છે. D-લૂપ tRNAની સ્થિરતા માટે મહત્વપૂર્ણ છે. A ખોટું છે કારણ કે બંને લૂપ્સ પ્રોટીન સંશ્લેષણમાં ભૂમિકા ભજવે છે. B ખોટું છે કારણ કે D-લૂપ એમિનો એસીડને ઓળખવામાં મદદ કરતું નથી. D ખોટું છે કારણ કે D-લૂપ mRNA સાથે જોડાણ કરતું નથી અને એમિનો એસીડને બાંધવામાં મદદ કરતું નથી.", "ref": "Std 12 - અધ્યાય 6: જૈવ અણુઓ અને પ્રક્રિયાઓ (બાયોમોલેક્યુલ્સ એન્ડ પ્રોસેસીસ)", "ch": ""}, {"q": "tRNA અણુમાં, નીચેના પૈકી કયા ન્યુક્લિયોટાઇડ સુધારણા (modification) એ એન્ટીકોડોન લૂપની ગુજબસ (wobble) સ્થાને થતી નથી?", "opts": ["ઇનોસિન (I)", "સ્યુડોયુરિડિન (Ψ)", "1-મિથાઇલગ્વાનોસિન (m1G)", "7-મિથાઇલગ્વાનોસિન (m7G)"], "ans": 3, "exp": "સાચો જવાબ D છે. 7-મિથાઇલગ્વાનોસિન (m7G) સુધારણા એન્ટીકોડોન લૂપની ગુજબસ સ્થાને થતી નથી, પરંતુ તે tRNAના અન્ય ભાગોમાં જોવા મળે છે. ઇનોસિન (I), સ્યુડોયુરિડિન (Ψ), અને 1-મિથાઇલગ્વાનોસિન (m1G) ગુજબસ સ્થાને થતી સુધારણાઓ છે.", "ref": "Std 12 - અધ્યાય 6: જૈવ અણુઓ અને પ્રક્રિયાઓ (બાયોમોલેક્યુલ્સ એન્ડ પ્રોસેસીસ)", "ch": ""}, {"q": "tRNA અણુની પ્રક્રિયામાં, નીચેના પૈકી કયું કથન એમિનોએસિલ-tRNA સિંથેટેઝ ઉત્સેચક વિશે સાચું નથી?", "opts": ["તે એમિનો એસીડ અને tRNA વચ્ચે એસ્ટર બંધ રચે છે.", "તે એમિનો એસીડને tRNAના 3' સિરા પરના હાઇડ્રોક્સિલ જૂથ સાથે જોડે છે.", "તે તમામ એમિનો એસીડ માટે એકસરખું હોય છે અને કોઈ વિશિષ્ટતા ધરાવતું નથી.", "તે એમિનો એસીડને સક્રિય કરવા માટે ATPનો ઉપયોગ કરે છે."], "ans": 2, "exp": "સાચો જવાબ C છે. એમિનોએસિલ-tRNA સિંથેટેઝ ઉત્સેચક દરેક એમિનો એસીડ માટે વિશિષ્ટ હોય છે અને તે એમિનો એસીડ અને tRNA વચ્ચે વિશિષ્ટ જોડાણ કરે છે. A, B, અને D સાચા છે કારણ કે ઉત્સેચક એમિનો એસીડ અને tRNA વચ્ચે એસ્ટર બંધ રચે છે, એમિનો એસીડને tRNAના 3' સિરા પર જોડે છે, અને ATPનો ઉપયોગ કરે છે.", "ref": "Std 12 - અધ્યાય 6: જૈવ અણુઓ અને પ્રક્રિયાઓ (બાયોમોલેક્યુલ્સ એન્ડ પ્રોસેસીસ)", "ch": ""}, {"q": "tRNA અણુની રચનામાં, નીચેના પૈકી કયું કથન TΨC લૂપ વિશે સાચું છે?", "opts": ["TΨC લૂપમાં સ્યુડોયુરિડિન (Ψ) અને રાઇબોથાઇમિડિન (T) ન્યુક્લિયોટાઇડ્સ હોય છે, અને તે tRNAની સ્થિરતા માટે મહત્વપૂર્ણ છે.", "TΨC લૂપમાં સ્યુડોયુરિડિન (Ψ) અને સાયટોસિન (C) ન્યુક્લિયોટાઇડ્સ હોય છે, અને તે એમિનો એસીડને ઓળખવામાં મદદ કરે છે.", "TΨC લૂપમાં થાઇમિન (T) અને સાયટોસિન (C) ન્યુક્લિયોટાઇડ્સ હોય છે, અને તે mRNA સાથે જોડાણ કરે છે.", "TΨC લૂપમાં રાઇબોથાઇમિડિન (T), સ્યુડોયુરિડિન (Ψ), અને સાયટોસિન (C) ન્યુક્લિયોટાઇડ્સ હોય છે, અને તે tRNAની ત્રિપર્ણી રચનામાં મહત્વપૂર્ણ છે."], "ans": 3, "exp": "સાચો જવાબ D છે. TΨC લૂપમાં રાઇબોથાઇમિડિન (T), સ્યુડોયુરિડિન (Ψ), અને સાયટોસિન (C) ન્યુક્લિયોટાઇડ્સ હોય છે, અને તે tRNAની ત્રિપર્ણી રચનામાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે. A, B, અને C અપૂર્ણ અથવા ખોટી માહિતી ધરાવે છે.", "ref": "Std 12 - અધ્યાય 6: જૈવ અણુઓ અને પ્રક્રિયાઓ (બાયોમોલેક્યુલ્સ એન્ડ પ્રોસેસીસ)", "ch": ""}, {"q": "tRNA અણુમાં, નીચેના પૈકી કયા કિસ્સામાં એમિનો એસીડને tRNA સાથે જોડવા માટે એમિનોએસિલ-tRNA સિંથેટેઝ ઉત્સેચકને સૌથી વધુ ઉર્જાની જરૂર પડે છે?", "opts": ["જ્યારે એમિનો એસીડ અને tRNA વચ્ચેનો બંધ અસ્થિર હોય છે.", "જ્યારે એમિનો એસીડ અને tRNA વચ્ચેનો બંધ સ્થિર હોય છે.", "જ્યારે એમિનો એસીડ અને tRNA વચ્ચેનો બંધ એસ્ટર બંધ હોય છે.", "જ્યારે એમિનો એસીડ અને tRNA વચ્ચેનો બંધ પેપ્ટાઇડ બંધ હોય છે."], "ans": 0, "exp": "સાચો જવાબ A છે. જ્યારે એમિનો એસીડ અને tRNA વચ્ચેનો બંધ અસ્થિર હોય છે, ત્યારે એમિનોએસિલ-tRNA સિંથેટેઝ ઉત્સેચકને સૌથી વધુ ઉર્જાની જરૂર પડે છે કારણ કે અસ્થિર બંધને સ્થિર કરવા માટે વધુ ઉર્જા લાગે છે. B, C, અને D ખોટા છે કારણ કે સ્થિર બંધ, એસ્ટર બંધ, અને પેપ્ટાઇડ બંધ માટે ઓછી ઉર્જાની જરૂર પડે છે.", "ref": "Std 12 - અધ્યાય 6: જૈવ અણુઓ અને પ્રક્રિયાઓ (બાયોમોલેક્યુલ્સ એન્ડ પ્રોસેસીસ)", "ch": ""}, {"q": "એક પ્રયોગમાં જોવા મળ્યું કે, એક વિશિષ્ટ tRNA અણુમાં એન્ટીકોડોન લૂપના પ્રથમ સ્થાને ઇનોસિન (I) ન્યુક્લિયોટાઇડ હાજર છે. આ ઇનોસિન નીચેના પૈકી કયા ન્યુક્લિયોટાઇડના ડિએમિનેશન દ્વારા બને છે?", "opts": ["એડેનોસિન (A)", "ગ્વાનોસિન (G)", "સાયટિડિન (C)", "યુરિડિન (U)"], "ans": 0, "exp": "ઇનોસિન (I) એ એડેનોસિન (A) ના ડિએમિનેશન દ્વારા બને છે, જેમાં એડેનોસિનના એમિનો સમૂહનું હાઇડ્રોક્સિલ સમૂહમાં રૂપાંતર થાય છે. આ પ્રક્રિયા tRNA અણુમાં ગુજબસ (wobble) સ્થાને થાય છે, જે વિવિધ કોડોન સાથે જોડાણ માટે મદદરૂપ બને છે. ગ્વાનોસિન, સાયટિડિન કે યુરિડિનના ડિએમિનેશનથી ઇનોસિન બનતું નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "tRNA અણુની રચનામાં, ડીહાઇડ્રો યુરિડિન લૂપ (D-loop) નું મુખ્ય કાર્ય શું છે?", "opts": ["એમિનો એસીડને tRNA સાથે જોડવાની પ્રક્રિયામાં ઉત્સેચકીય સક્રિયતા દર્શાવવી", "રિબોઝોમ સાથે જોડાણ માટે જરૂરી માળખાકીય સ્થિરતા પ્રદાન કરવી", "એન્ટીકોડોન લૂપની ગુજબસ સ્થિતિને નિયંત્રિત કરવી", "tRNA અણુની પ્રક્રિયા દરમિયાન ન્યુક્લિયોટાઇડ સુધારણા માટે જરૂરી સ્થાન પૂરું પાડવું"], "ans": 1, "exp": "ડીહાઇડ્રો યુરિડિન લૂપ (D-loop) tRNA અણુમાં રિબોઝોમ સાથે જોડાણ માટે જરૂરી માળખાકીય સ્થિરતા પ્રદાન કરે છે. આ લૂપ tRNAની ત્રિપર્ણી રચનામાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે, પરંતુ તે એમિનો એસીડ જોડાણ, ગુજબસ સ્થિતિ કે ન્યુક્લિયોટાઇડ સુધારણા માટે સીધી રીતે જવાબદાર નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન tRNA અણુમાં થતી સેલેનોસિસ્ટીન (Sec) ની જોડાણ પ્રક્રિયા માટે ખોટું છે?", "opts": ["સેલેનોસિસ્ટીનને tRNA સાથે જોડવા માટે વિશિષ્ટ એમિનોએસિલ-tRNA સિંથેટેઝ ઉત્સેચક જરૂરી છે", "સેલેનોસિસ્ટીન માટેનો કોડોન સામાન્ય રીતે UGA છે, જે સામાન્ય રીતે સ્ટોપ કોડોન તરીકે ઓળખાય છે", "સેલેનોસિસ્ટીનની જોડાણ પ્રક્રિયામાં SECIS તત્વ (Selenocysteine Insertion Sequence) ની હાજરી જરૂરી છે", "સેલેનોસિસ્ટીનને tRNA સાથે જોડવા માટે GTP ઉર્જા સ્વરૂપે ઉપયોગમાં લેવાય છે"], "ans": 0, "exp": "સેલેનોસિસ્ટીનને tRNA સાથે જોડવા માટે વિશિષ્ટ એમિનોએસિલ-tRNA સિંથેટેઝ ઉત્સેચકની જરૂર નથી. તેના બદલે, સેરિનને પ function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
