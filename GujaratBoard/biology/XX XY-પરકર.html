<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XX–XY પ્રકાર</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>XX–XY પ્રકાર</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">XX–XY પ્રકાર</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 19 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 19 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "માનવમાં XX-XY પ્રકારના લિંગ નિશ્ચયન તંત્રમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["પુરુષમાં એક X અને એક Y વર્ણસૂત્ર હોય છે, જેને વિષમયુગ્મી કહે છે", "સ્ત્રીમાં બંને X વર્ણસૂત્ર હોય છે, જેને સમયુગ્મી કહે છે", "Y વર્ણસૂત્ર પર SRY જનીન હાજર હોય છે, જે પુરુષ લક્ષણો માટે જવાબદાર છે", "X વર્ણસૂત્ર પરના જનીનોની અભિવ્યક્તિ હંમેશા સંપૂર્ણ પ્રભાવી હોય છે"], "ans": 3, "exp": "સાચો જવાબ D છે. X વર્ણસૂત્ર પરના જનીનોની અભિવ્યક્તિ હંમેશા સંપૂર્ણ પ્રભાવી હોતી નથી. ઉદાહરણ તરીકે, X-સંલગ્ન પ્રભાવી અને પ્રચ્છન્ન વિકારો જોવા મળે છે. A, B અને C વિધાનો સાચાં છે કારણ કે પુરુષમાં XY અને સ્ત્રીમાં XX વર્ણસૂત્રો હોય છે, અને SRY જનીન Y વર્ણસૂત્ર પર હાજર હોય છે જે પુરુષ લક્ષણો માટે જવાબદાર છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "નીચેનામાંથી કયા સજીવમાં XX-XY પ્રકારનું લિંગ નિશ્ચયન તંત્ર જોવા મળતું નથી?", "opts": ["ડ્રોસોફિલા (ફળમાખી)", "મનુષ્ય", "પક્ષીઓ", "મોટાભાગના સસ્તન પ્રાણીઓ"], "ans": 2, "exp": "સાચો જવાબ C છે. પક્ષીઓમાં ZW પ્રકારનું લિંગ નિશ્ચયન તંત્ર જોવા મળે છે, જ્યાં માદામાં ZW અને નરમાં ZZ વર્ણસૂત્રો હોય છે. ડ્રોસોફિલા, મનુષ્ય અને મોટાભાગના સસ્તન પ્રાણીઓમાં XX-XY પ્રકારનું લિંગ નિશ્ચયન તંત્ર જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "માનવમાં XX-XY પ્રકારના લિંગ નિશ્ચયન સંદર્ભમાં, નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["માતા હંમેશા X વર્ણસૂત્ર પુત્રને આપે છે અને પિતા Y વર્ણસૂત્ર આપે છે", "પિતા હંમેશા X અથવા Y વર્ણસૂત્ર પુત્રીને આપે છે", "માતા X વર્ણસૂત્ર પુત્રીને આપે છે અને પિતા X અથવા Y વર્ણસૂત્ર આપી શકે છે", "પિતા હંમેશા Y વર્ણસૂત્ર પુત્રને આપે છે અને માતા X વર્ણસૂત્ર આપે છે"], "ans": 0, "exp": "સાચો જવાબ A છે. માનવમાં, માતા હંમેશા X વર્ણસૂત્ર આપે છે કારણ કે તેના બંને વર્ણસૂત્રો X હોય છે. પિતા X અથવા Y વર્ણસૂત્ર આપી શકે છે, જેનાથી બાળકનું લિંગ નક્કી થાય છે. પુત્ર માટે પિતા Y વર્ણસૂત્ર આપે છે અને પુત્રી માટે X વર્ણસૂત્ર આપે છે. B, C અને D વિધાનો ખોટાં છે કારણ કે પિતા પુત્રીને માત્ર X વર્ણસૂત્ર આપી શકે છે, અને પુત્રને માત્ર Y વર્ણસૂત્ર આપે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "XX-XY પ્રકારના લિંગ નિશ્ચયનમાં, જો એક સ્ત્રીને ટર્નર સિન્ડ્રોમ હોય, તો તેના વર્ણસૂત્રોની સંખ્યા કેટલી હશે?", "opts": ["46 (44 + XX)", "45 (44 + XO)", "47 (44 + XXX)", "47 (44 + XXY)"], "ans": 1, "exp": "સાચો જવાબ B છે. ટર્નર સિન્ડ્રોમમાં સ્ત્રીમાં એક X વર્ણસૂત્રની ખોટ હોય છે, જેના કારણે વર્ણસૂત્રોની સંખ્યા 45 (44 + XO) થાય છે. A વિકલ્પ સામાન્ય સ્ત્રી માટે છે, C વિકલ્પ ટ્રિપલ X સિન્ડ્રોમ માટે છે, અને D વિકલ્પ ક્લાઈનફેલ્ટર સિન્ડ્રોમ માટે છે જે પુરુષોમાં જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન XX-XY પ્રકારના લિંગ નિશ્ચયન માટે યોગ્ય નથી?", "opts": ["Y વર્ણસૂત્ર પરના જનીનો પુરુષ પ્રજનન અંગોના વિકાસ માટે જવાબદાર છે", "X વર્ણસૂત્ર પરના જનીનો માત્ર સ્ત્રી લક્ષણો માટે જવાબદાર છે", "પુરુષમાં એક X અને એક Y વર્ણસૂત્ર હોવાથી તે વિષમયુગ્મી કહેવાય છે", "સ્ત્રીમાં બંને X વર્ણસૂત્રો સક્રિય હોય તેવું જરૂરી નથી"], "ans": 1, "exp": "સાચો જવાબ B છે. X વર્ણસૂત્ર પરના જનીનો માત્ર સ્ત્રી લક્ષણો માટે જ નહીં, પરંતુ અન્ય અનેક શારીરિક કાર્યો માટે પણ જવાબદાર હોય છે. ઉદાહરણ તરીકે, રંગઅંધત્વ અને હીમોફિલિયા જેવા રોગો X-સંલગ્ન છે. A, C અને D વિધાનો સાચાં છે કારણ કે Y વર્ણસૂત્ર પુરુષ લક્ષણો માટે જવાબદાર છે, પુરુષ વિષમયુગ્મી હોય છે, અને સ્ત્રીમાં એક X વર્ણસૂત્ર નિષ્ક્રિય થાય છે (બાર બોડી).", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "માનવમાં XX-XY પ્રકારના લિંગ નિશ્ચયન તંત્રમાં, SRY જીન નીચેનામાંથી ક્યાં સ્થિત હોય છે?", "opts": ["X વર્ણસૂત્રના લાંબા ભાગ પર", "Y વર્ણસૂત્રના લઘુ ભાગ પર", "X અને Y વર્ણસૂત્રના સમાન પ્રદેશમાં", "Y વર્ણસૂત્રના સેન્ટ્રોમિયર નજીક"], "ans": 1, "exp": "SRY (Sex-determining Region Y) જીન Y વર્ણસૂત્રના લઘુ ભાગ (short arm) પર સ્થિત હોય છે, જે પુરુષ લિંગ નિશ્ચયન માટે જવાબદાર હોય છે. A ખોટું છે કારણ કે SRY X વર્ણસૂત્ર પર નથી. C ખોટું છે કારણ કે SRY X અને Y ના સમાન પ્રદેશમાં નથી. D ખોટું છે કારણ કે SRY સેન્ટ્રોમિયર નજીક નથી.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "XX-XY પ્રકારના લિંગ નિશ્ચયન ધરાવતા સજીવમાં, નીચેનામાંથી કયા રોગમાં વ્યક્તિ પાસે 47 વર્ણસૂત્રો હોય છે અને તેના લક્ષણો તરીકે લાંબા અંગો, લાંબા હાથ-પગ અને મંદ બૌદ્ધિક ક્ષમતા જોવા મળે છે?", "opts": ["ટર્નર સિન્ડ્રોમ", "ક્લાઇનફેલ્ટર સિન્ડ્રોમ", "ડાઉન સિન્ડ્રોમ", "એડવર્ડ્સ સિન્ડ્રોમ"], "ans": 1, "exp": "ક્લાઇનફેલ્ટર સિન્ડ્રોમ (XXY) માં વ્યક્તિ પાસે 47 વર્ણસૂત્રો હોય છે (44 + XXY), જેમાં લાંબા અંગો, લાંબા હાથ-પગ અને મંદ બૌદ્ધિક ક્ષમતા જેવા લક્ષણો જોવા મળે છે. ટર્નર સિન્ડ્રોમ (XO) માં 45 વર્ણસૂત્રો હોય છે. ડાઉન સિન્ડ્રોમ (ટ્રાઇસોમી 21) અને એડવર્ડ્સ સિન્ડ્રોમ (ટ્રાઇસોમી 18) એ લિંગ વર્ણસૂત્રો સાથે સંબંધિત નથી.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "XX-XY પ્રકારના લિંગ નિશ્ચયનમાં, નીચેનામાંથી કયા જીનના અભાવે પુરુષમાં શુક્રાણુઓનું ઉત્પાદન થતું નથી?", "opts": ["TDF જીન", "AZF જીન", "AR જીન", "DAX1 જીન"], "ans": 1, "exp": "AZF (Azoospermia Factor) જીન Y વર્ણસૂત્ર પર સ્થિત હોય છે અને શુક્રાણુઓના ઉત્પાદન માટે જવાબદાર હોય છે. તેના અભાવે અઝૂસ્પર્મિયા (શુક્રાણુઓનો અભાવ) થાય છે. TDF (ટેસ્ટિસ ડિટર્મિનિંગ ફેક્ટર) જીન SRY જીનને ઓળખાવે છે, પરંતુ શુક્રાણુઓના ઉત્પાદન માટે જવાબદાર નથી. AR (એન્ડ્રોજન રિસેપ્ટર) અને DAX1 જીન લિંગ વિકાસમાં ભૂમિકા ભજવે છે, પરંતુ શુક્રાણુઓના ઉત્પાદન માટે સીધી જવાબદારી નથી.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "XX–XY પ્રકારના લિંગ નિશ્ચયન ધરાવતા માનવમાં, નીચેનામાંથી કયા સ્થિતિમાં વ્યક્તિ ફિનોટાઇપિક રીતે સ્ત્રી જેવી દેખાય છે, પરંતુ તેના કોષોમાં Y-વર્ણસૂત્ર હાજર હોય છે?", "opts": ["ટર્નર સિન્ડ્રોમ (45,X)", "ક્લાઇનફેલ્ટર સિન્ડ્રોમ (47,XXY)", "એન્ડ્રોજન ઇન્સેન્સિટિવિટી સિન્ડ્રોમ (AIS)", "ડાઉન સિન્ડ્રોમ (47,XX+21)"], "ans": 2, "exp": "એન્ડ્રોજન ઇન્સેન્સિટિવિટી સિન્ડ્રોમ (AIS)માં વ્યક્તિ પાસે XY વર્ણસૂત્રો હોય છે, પરંતુ ટેસ્ટોસ્ટેરોન પ્રત્યેના રિસેપ્ટરના અભાવે શરીર ટેસ્ટોસ્ટેરોન પ્રત્યે પ્રતિક્રિયા આપતું નથી, જેથી વ્યક્તિ ફિનોટાઇપિક રીતે સ્ત્રી જેવી દેખાય છે. ટર્નર સિન્ડ્રોમમાં Y-વર્ણસૂત્ર હાજર નથી (45,X), ક્લાઇનફેલ્ટર સિન્ડ્રોમમાં એક અતિરિક્ત X-વર્ણસૂત્ર હોય છે (47,XXY), અને ડાઉન સિન્ડ્રોમ 21મા વર્ણસૂત્રના ટ્રાઇસોમી સાથે સંબંધિત છે, જેમાં લિંગ નિશ્ચયન સાથે કોઈ સીધો સંબંધ નથી.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતા", "ch": ""}, {"q": "XX–XY પ્રકારના લિંગ નિશ્ચયન ધરાવતા માનવમાં, SRY જીનના અભાવે કયું પરિણામ થાય છે?", "opts": ["પુરુષમાં શુક્રાણુઓનું ઉત્પાદન થતું નથી", "સ્ત્રીમાં અંડકોષનું ઉત્પાદન થતું નથી", "વ્યક્તિ ફિનોટાઇપિક રીતે પુરુષ જેવી દેખાય છે પરંતુ અંડાશય વિકસે છે", "વ્યક્તિ ફિનોટાઇપિક રીતે સ્ત્રી જેવી દેખાય છે પરંતુ વૃષણ વિકસે છે"], "ans": 0, "exp": "SRY જીન Y-વર્ણસૂત્ર પર સ્થિત હોય છે અને તે પુરુષ લિંગ વિકાસ માટે જવાબદાર હોય છે. જો SRY જીનનો અભાવ હોય, તો પુરુષમાં શુક્રાણુઓનું ઉત્પાદન થતું નથી, કારણ કે વૃષણનું વિકાસ થતું નથી. બાકીના વિકલ્પો અસંગત છે: સ્ત્રીમાં SRY જીન હાજર જ નથી, અને SRY જીનના અભાવે વ્યક્તિ ફિનોટાઇપિક રીતે સ્ત્રી જેવી દેખાય છે (જો XY હોય તો AIS જેવી સ્થિતિ બનશે, પરંતુ શુક્રાણુઓનું ઉત્પાદન થતું નથી).", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતા", "ch": ""}, {"q": "XX–XY પ્રકારના લિંગ નિશ્ચયન ધરાવતા માનવમાં, ક્લાઇનફેલ્ટર સિન્ડ્રોમ વાળા વ્યક્તિના કોષરસમાં બરાબર કેટલા બાર્ડી બોડીઝ (Barr bodies) જોવા મળે છે?", "opts": ["0", "1", "2", "3"], "ans": 1, "exp": "ક્લાઇનફેલ્ટર સિન્ડ્રોમ (47, XXY) વાળા વ્યક્તિ પાસે બે X વર્ણસૂત્રો હોવાથી, તેના કોષરસમાં એક બાર્ડી બોડી જોવા મળે છે. એક X વર્ણસૂત્ર સક્રિય રહે છે અને બીજું નિષ્ક્રિય થઈ બાર્ડી બોડી બને છે. 0, 2, અથવા 3 બાર્ડી બોડીઝ હોવાનું આ સ્થિતિમાં શક્ય નથી.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિકાસ", "ch": ""}, {"q": "XX–XY પ્રકારના લિંગ નિશ્ચયન ધરાવતા માનવમાં, નીચેનામાંથી કયું વિધાન ટર્નર સિન્ડ્રોમ (45, X) વિશે ખોટું છે?", "opts": ["આ સ્થિતિમાં વ્યક્તિ ફિનોટાઇપિક રીતે સ્ત્રી હોય છે.", "આ સ્થિતિમાં વ્યક્તિ બંજર હોય છે.", "આ સ્થિતિમાં વ્યક્તિના કોષોમાં એક પણ બાર્ડી બોડી જોવા મળતી નથી.", "આ સ્થિતિમાં વ્યક્તિના કોષોમાં Y વર્ણસૂત્ર હાજર હોય છે."], "ans": 3, "exp": "ટર્નર સિન્ડ્રોમ (45, X) વાળા વ્યક્તિના કોષોમાં Y વર્ણસૂત્ર હાજર નથી. આ સ્થિતિમાં વ્યક્તિ ફિનોટાઇપિક રીતે સ્ત્રી હોય છે, બંજર હોય છે, અને કોષોમાં બાર્ડી બોડી જોવા મળતી નથી કારણ કે એક પણ X વર્ણસૂત્ર નિષ્ક્રિય થતું નથી.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિકાસ", "ch": ""}, {"q": "XX–XY પ્રકારના લિંગ નિશ્ચયન ધરાવતા માનવમાં, જો એક પુરુષમાં Y-વર્ણસૂત્ર પર સ્થિત SRY જીન ખોરવાઈ જાય તો તેના પુત્રમાં કયો લક્ષણ જોવા મળશે?", "opts": ["પુત્ર ફિનોટાઇપિક રીતે સ્ત્રી જેવો દેખાશે પરંતુ અનુવંશિક રીતે પુરુષ રહેશે", "પુત્રમાં ટર્નર સિન્ડ્રોમ વિકસિત થશે (45, X)", "પુત્રમાં ક્લાઇનફેલ્ટર સિન્ડ્રોમ વિકસિત થશે (47, XXY)", "પુત્રમાં સ્વાભાવિક પુરુષ લક્ષણો વિકસિત થશે પરંતુ બાંઝપણું રહેશે"], "ans": 0, "exp": "SRY જીન Y-વર્ણસૂત્ર પર સ્થિત છે અને પુરુષ લિંગ વિકાસ માટે જવાબદાર છે. જો આ જીન ખોરવાઈ જાય તો, ભ્રૂણમાં પુરુષ લક્ષણો વિકસિત થતાં નથી, પરંતુ અનુવંશિક રીતે તે પુરુષ (XY) રહેશે. આથી તે ફિનોટાઇપિક રીતે સ્ત્રી જેવો દેખાશે. ટર્નર સિન્ડ્રોમ (45, X) અને ક્લાઇનફેલ્ટર સિન્ડ્રોમ (47, XXY) એ વર્ણસૂત્રીય અસામાન્યતાઓ છે, જે આ કિસ્સામાં લાગુ પડતી નથી. સ્વાભાવિક પુરુષ લક્ષણો વિકસિત થવાનું કારણ SRY જીનના અભાવે શક્ય નથી.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "માનવમાં XX–XY પ્રકારના લિંગ નિશ્ચયન તંત્ર સંદર્ભે, નીચેનામાંથી કયું વિધાન અપવાદરૂપ છે?\n(1) SRY જનીન Y-વર્ણસૂત્ર પર સ્થિત છે અને તે પુરુષ જાતીય લક્ષણોના વિકાસ માટે જવાબદાર છે.\n(2) ટર્નર સિન્ડ્રોમ (45, X) ધરાવતી વ્યક્તિ ફિનોટાઇપિક રીતે સ્ત્રી હોય છે, પરંતુ તે વંધ્ય હોય છે.\n(3) ક્લાઇનફેલ્ટર સિન્ડ્રોમ (47, XXY) ધરાવતી વ્યક્તિ ફિનોટાઇપિક રીતે પુરુષ હોય છે, પરંતુ તેમાં અંડકોષોનું ઉત્પાદન થતું નથી.\n(4) જો એક વ્યક્તિમાં 46, XX karyotype હોય પરંતુ તેમાં SRY જનીનનું સ્થાનાંતરણ થયું હોય, તો તે વ્યક્તિ ફિનોટાઇપિક રીતે સ્ત્રી હોય છે.", "opts": ["વિધાન (1)", "વિધાન (2)", "વિધાન (3)", "વિધાન (4)"], "ans": 3, "exp": "વિધાન (4) અપવાદરૂપ છે કારણ કે જો 46, XX karyotype ધરાવતી વ્યક્તિમાં SRY જનીનનું સ્થાનાંતરણ થયું હોય, તો તે વ્યક્તિ ફિનોટાઇપિક રીતે પુરુષ હોય છે, સ્ત્રી નહીં. SRY જનીન પુરુષ જાતીય લક્ષણોના વિકાસ માટે જવાબદાર છે. બાકીના વિધાનો સાચાં છે: (1) SRY જનીન Y-વર્ણસૂત્ર પર સ્થિત છે, (2) ટર્નર સિન્ડ્રોમ ધરાવતી વ્યક્તિ સ્ત્રી અને વંધ્ય હોય છે, (3) ક્લાઇનફેલ્ટર સિન્ડ્રોમ ધરાવતી વ્યક્તિ પુરુષ હોય છે પરંતુ અંડકોષોનું ઉત્પાદન થતું નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક સંશોધનમાં જાણવા મળ્યું કે એક સસ્તન પ્રાણીમાં XX–XY પ્રકારનું લિંગ નિશ્ચયન તંત્ર હોવા છતાં, કેટલાક નર પ્રાણીઓમાં Y-વર્ણસૂત્રની ગેરહાજરી હોવા છતાં પુરુષ જાતીય લક્ષણો વિકસિત થાય છે. આ ઘટનાનું સૌથી સંભવિત કારણ શું હોઈ શકે?\n(નોંધ: આ પ્રાણીમાં SRY જનીનની ભૂમિકા માનવની જેમ જ છે.)", "opts": ["આ પ્રાણીઓમાં X-વર્ણસૂત્ર પર SRY જનીનનું સ્થાનાંતરણ થયું હોવું જોઈએ.", "આ પ્રાણીઓમાં ઓટોસોમલ જનીન દ્વારા પુરુષ જાતીય લક્ષણોનું નિયંત્રણ થતું હોવું જોઈએ.", "આ પ્રાણીઓમાં Y-વર્ણસૂત્રના અભાવે પણ ટેસ્ટોસ્ટેરોનનું ઉત્પાદન થતું હોવું જોઈએ.", "આ પ્રાણીઓમાં XX–XY પ્રકારનું લિંગ નિશ્ચયન તંત્ર નથી, પરંતુ ZZ–ZW પ્રકારનું છે."], "ans": 0, "exp": "સૌથી સંભવિત કારણ એ છે કે આ પ્રાણીઓમાં X-વર્ણસૂત્ર પર SRY જનીનનું સ્થાનાંતરણ થયું હોય. SRY જનીન પુરુષ જાતીય લક્ષણોના વિકાસ માટે જવાબદાર છે, અને જો તે Y-વર્ણસૂત્ર પર ન હોય પરંતુ X-વર્ણસૂત્ર પર સ્થાનાંતરિત થયું હોય, તો XX karyotype ધરાવતી વ્યક્તિ પણ પુરુષ લક્ષણો દર્શાવી શકે છે. બાકીના વિકલ્પો ઓછા સંભવિત છે: (B) ઓટોસોમલ જનીન દ્વારા પુરુષ લક્ષણોનું નિયંત્રણ ખૂબ જ દુર્લભ છે, (C) ટેસ્ટોસ્ટેરોનનું ઉત્પાદન SRY જનીન વગર શક્ય નથી, (D) આ પ્રાણીઓમાં XX–XY પ્રકારનું લિંગ નિશ્ચયન તંત્ર હોવાનું સંશોધનમાં જણાવ્યું છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "XX–XY પ્રકારના લિંગ નિશ્ચયન ધરાવતા માનવમાં, જો એક વ્યક્તિ ફિનોટાઇપિક રીતે પુરુષ હોય પરંતુ તેના કોષોમાં SRY જીન અનુપસ્થિત હોય, તો નીચેનામાંથી કયું કારણ સૌથી યોગ્ય લાગે?", "opts": ["Y-વર્ણસૂત્ર પર સ્થિત અન્ય જીન દ્વારા પુરુષ લક્ષણોનો વિકાસ થયો હોઈ શકે", "X-વર્ણસૂત્ર પર સ્થિત SOX9 જીનનું મ્યુટેશન થયું હોઈ શકે", "વ્યક્તિ પાસે XXY કોષરચના હોઈ શકે, પરંતુ SRY જીન ડિલીશન થયું હોઈ શકે", "વ્યક્તિ પાસે XO કોષરચના હોઈ શકે અને SRY જીનનો અભાવ હોવા છતાં પુરુષ લક્ષણો વિકસિત થયા હોઈ શકે"], "ans": 0, "exp": "SRY જીનનો અભાવ હોવા છતાં પુરુષ લક્ષણો વિકસિત થવા પાછળ Y-વર્ણસૂત્ર પર સ્થિત અન્ય જીન જેવા કે TDF (Testis-Determining Factor) અથવા અન્ય ટેસ્ટોસ્ટેરોન-સંબંધિત જીનની ભૂમિકા હોઈ શકે. બાકીના વિકલ્પો અયોગ્ય છે: B) SOX9 જીન X-વર્ણસૂત્ર પર નથી, પરંતુ 17q24.3 પર સ્થિત છે. C) XXY કોષરચના (ક્લાઇનફે let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
