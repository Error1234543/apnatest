<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ન્યુક્લિક એસિડ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ન્યુક્લિક એસિડ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ન્યુક્લિક એસિડ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ન્યુક્લિક એસિડના સંદર્ભમાં, જો એક DNA અણુમાં એડેનિન ન્યુક્લિયોટાઇડનું પ્રમાણ 30% હોય, તો સાયટોસિનનું પ્રમાણ કેટલું હશે?", "opts": ["20%", "30%", "40%", "70%"], "ans": 0, "exp": "ચાર્ગાફના નિયમ મુજબ, DNAમાં એડેનિન (A) અને થાયમિન (T)ની માત્રા સરખી હોય છે, તથા ગ્વાનિન (G) અને સાયટોસિન (C)ની માત્રા સરખી હોય છે. અહીં A = 30%, તો T = 30% હશે. બાકીના 40% G અને C વચ્ચે સરખા ભાગે વહેંચાય છે, જેથી G = 20% અને C = 20% થાય. આથી સાયટોસિનનું પ્રમાણ 20% હશે. બાકીના વિકલ્પો (B, C, D) ચાર્ગાફના નિયમને અનુરૂપ નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન", "ch": ""}, {"q": "RNA અને DNA વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["RNAમાં ડિઓક્સીરિબોઝ શર્કરા હોય છે જ્યારે DNAમાં રિબોઝ શર્કરા હોય છે", "RNA એક સળીયા જેવી રચના ધરાવે છે જ્યારે DNA દ્વિસળીય રચના ધરાવે છે", "RNAમાં થાયમિન બેઇઝ હોય છે જ્યારે DNAમાં યુરેસિલ બેઇઝ હોય છે", "RNAમાં ફોસ્ફોડાયેસ્ટર બંધ નથી હોતો"], "ans": 1, "exp": "RNA એક સળીયા (સિંગલ-સ્ટ્રેન્ડેડ) રચના ધરાવે છે, જ્યારે DNA દ્વિસળીય (ડબલ-સ્ટ્રેન્ડેડ) રચના ધરાવે છે. વિકલ્પ A ખોટો છે કારણ કે RNAમાં રિબોઝ શર્કરા હોય છે જ્યારે DNAમાં ડિઓક્સીરિબોઝ શર્કરા હોય છે. વિકલ્પ C ખોટો છે કારણ કે RNAમાં યુરેસિલ (U) હોય છે જ્યારે DNAમાં થાયમિન (T) હોય છે. વિકલ્પ D ખોટો છે કારણ કે RNAમાં પણ ફોસ્ફોડાયેસ્ટર બંધ હોય છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન", "ch": ""}, {"q": "ન્યુક્લિક એસિડમાં પાયરિમિડિન બેઇઝ કયા કયા હોય છે?", "opts": ["એડેનિન અને ગ્વાનિન", "એડેનિન અને સાયટોસિન", "સાયટોસિન, થાયમિન અને યુરેસિલ", "ગ્વાનિન અને થાયમિન"], "ans": 2, "exp": "પાયરિમિડિન બેઇઝમાં સાયટોસિન (C), થાયમિન (T), અને યુરેસિલ (U)નો સમાવેશ થાય છે. એડેનિન (A) અને ગ્વાનિન (G) પ્યુરિન બેઇઝ છે. આથી વિકલ્પ C સાચો છે. બાકીના વિકલ્પો (A, B, D) પાયરિમિડિન અને પ્યુરિન બેઇઝને ગળથૂથી નાખે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન", "ch": ""}, {"q": "DNAની દ્વિસળીય રચનામાં, બે ન્યુક્લિયોટાઇડ વચ્ચે કયો બંધ જોવા મળે છે?", "opts": ["હાઇડ્રોજન બંધ", "પેપ્ટાઇડ બંધ", "આયોનિક બંધ", "ડિસલ્ફાઇડ બંધ"], "ans": 0, "exp": "DNAની દ્વિસળીય રચનામાં, બે ન્યુક્લિયોટાઇડ વચ્ચે હાઇડ્રોજન બંધ જોવા મળે છે. એડેનિન (A) અને થાયમિન (T) વચ્ચે બે હાઇડ્રોજન બંધ હોય છે, જ્યારે ગ્વાનિન (G) અને સાયટોસિન (C) વચ્ચે ત્રણ હાઇડ્રોજન બંધ હોય છે. પેપ્ટાઇડ બંધ પ્રોટીનમાં, આયોનિક બંધ આયનોમાં, અને ડિસલ્ફાઇડ બંધ પ્રોટીનની ત્રિજીવી રચનામાં જોવા મળે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન", "ch": ""}, {"q": "ન્યુક્લિક એસિડના સંશ્લેષણ દરમિયાન, DNA પોલિમરેઝ ઉત્સેચક કયા દિશામાં કામ કરે છે?", "opts": ["5' → 3' દિશામાં", "3' → 5' દિશામાં", "બંને દિશામાં", "યાદચ્છિક દિશામાં"], "ans": 0, "exp": "DNA પોલિમરેઝ ઉત્સેચક હમેશા 5' → 3' દિશામાં કામ કરે છે. આ કારણ છે કે નવા ન્યુક્લિયોટાઇડને ફોસ્ફોડાયેસ્ટર બંધ દ્વારા 3' હાઇડ્રોક્સિલ જૂથ સાથે જોડવામાં આવે છે. વિકલ્પ B ખોટો છે કારણ કે 3' → 5' દિશામાં DNA પોલિમરેઝ કામ કરતું નથી. વિકલ્પ C અને D પણ ખોટા છે કારણ કે ઉત્સેચક એક જ દિશામાં કામ કરે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન", "ch": ""}, {"q": "DNAની દ્વિસળીય રચનામાં, જો એક સળીમાં 5’ → 3’ દિશામાં અનુક્રમણિકા A-T-G-C-A હોય, તો સમકક્ષ સળીમાં કયો અનુક્રમ હશે?", "opts": ["T-A-C-G-T", "U-A-C-G-U", "T-A-G-C-T", "A-T-G-C-A"], "ans": 0, "exp": "DNAની દ્વિસળીય રચનામાં, એડેનિન (A) હંમેશા થાયમિન (T) સાથે જોડાય છે, અને ગ્વાનિન (G) સાયટોસિન (C) સાથે જોડાય છે. આથી, 5’-A-T-G-C-A-3’ની સમકક્ષ સળી 3’-T-A-C-G-T-5’ હશે, જેને 5’ → 3’ દિશામાં લખતા T-A-C-G-T થાય. વિકલ્પ B ખોટો છે કારણ કે RNAમાં યુરેસિલ (U) હોય છે, DNAમાં નહીં. વિકલ્પ C અને D ક્રમશઃ બેઇઝ જોડાણના નિયમોનું પાલન કરતાં નથી.", "ref": "Std 12 - Chapter 6: અનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "ન્યુક્લિક એસિડના સંદર્ભમાં, કયું વિધાન સત્ય નથી?", "opts": ["DNAમાં ડી-ઓક્સીરિબોઝ શર્કરા હોય છે", "RNAમાં ફોસ્ફોડાયેસ્ટર બંધ હોય છે", "DNAમાં હાઇડ્રોજન બંધો પાયરિમિડિન બેઇઝ વચ્ચે જોવા મળે છે", "RNA હંમેશા એકસળીય હોય છે"], "ans": 3, "exp": "RNA સામાન્ય રીતે એકસળીય હોય છે, પરંતુ કેટલાક કિસ્સાઓમાં (જેમ કે tRNA) તે આંશિક દ્વિસળીય રચના ધરાવે છે. આથી વિધાન D ખોટું છે. વિધાન A, B, અને C સત્ય છે: DNAમાં ડી-ઓક્સીરિબોઝ શર્કરા હોય છે, RNAમાં ફોસ્ફોડાયેસ્ટર બંધ હોય છે, અને DNAમાં હાઇડ્રોજન બંધો પાયરિમિડિન બેઇઝ (A-T, G-C) વચ્ચે જોવા મળે છે.", "ref": "Std 12 - Chapter 6: અનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "DNA પોલિમરેઝ ઉત્સેચક દ્વારા કયો ક્રિયાવિધિ થતો નથી?", "opts": ["પ્રૂફરીડિંગ (શુદ્ધિકરણ)", "ફોસ્ફોડાયેસ્ટર બંધનું નિર્માણ", "RNA પ્રાઇમરનું નિર્માણ", "DNAની દ્વિસળીનું વિખંડન"], "ans": 3, "exp": "DNA પોલિમરેઝ ઉત્સેચક પ્રૂફરીડિંગ (A), ફોસ્ફોડાયેસ્ટર બંધનું નિર્માણ (B), અને RNA પ્રાઇમર પર કામ કરે છે (C), પરંતુ DNAની દ્વિસળીનું વિખંડન હેલિકેઝ ઉત્સેચક દ્વારા થાય છે. આથી, વિકલ્પ D ખોટો છે.", "ref": "Std 12 - Chapter 6: અનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "ન્યુક્લિક એસિડના સંશ્લેષણ દરમિયાન, કયો ઉત્સેચક RNA પ્રાઇમરનું નિર્માણ કરે છે?", "opts": ["DNA પોલિમરેઝ I", "DNA પોલિમરેઝ III", "પ્રાઇમેઝ", "હેલિકેઝ"], "ans": 2, "exp": "RNA પ્રાઇમરનું નિર્માણ પ્રાઇમેઝ ઉત્સેચક દ્વારા થાય છે. DNA પોલિમરેઝ I અને III DNAની નકલ કરે છે, પરંતુ RNA પ્રાઇમર બનાવતાં નથી. હેલિકેઝ ઉત્સેચક DNAની દ્વિસળીને વિખંડિત કરે છે. આથી, વિકલ્પ C સહી છે.", "ref": "Std 12 - Chapter 6: અનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "કયા ન્યુક્લિક એસિડમાં, પાયરિમિડિન બેઇઝના સ્થાને પ્યુરિન બેઇઝ હોય છે, જે સામાન્ય રીતે DNA અથવા RNAમાં જોવા મળતું નથી?", "opts": ["mRNA", "tRNA", "rRNA", "કોઈપણ નહીં, કારણ કે પ્યુરિન બેઇઝ હંમેશા પાયરિમિડિન સાથે જોડાય છે"], "ans": 3, "exp": "DNA અને RNAમાં, પ્યુરિન બેઇઝ (A, G) હંમેશા પાયરિમિડિન બેઇઝ (T, C, U) સાથે જોડાય છે. કોઈપણ ન્યુક્લિક એસિડમાં પ્યુરિન-પ્યુરિન અથવા પાયરિમિડિન-પાયરિમિડિન જોડાણ સામાન્ય રીતે જોવા મળતું નથી. આથી, વિકલ્પ D સહી છે.", "ref": "Std 12 - Chapter 6: અનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "DNAની દ્વિસળીય રચનામાં, જો એક સળીમાં 5’-ATGC-3’ અનુક્રમ હોય, તો તેની પૂરક સળીનો અનુક્રમ કયો હશે?", "opts": ["5’-TACG-3’", "3’-UACG-5’", "3’-TACG-5’", "5’-GCAT-3’"], "ans": 2, "exp": "DNAની દ્વિસળીય રચનામાં, બે સળીઓ વચ્ચે પૂરક બેઇઝ જોડાણ હોય છે. એડેનિન (A) થાયમિન (T) સાથે, અને ગ્વાનિન (G) સાયટોસિન (C) સાથે જોડાય છે. આથી, 5’-ATGC-3’ની પૂરક સળી 3’-TACG-5’ હશે. વિકલ્પ A અને D બેઇઝ જોડાણના નિયમને અનુસરતા નથી, જ્યારે વિકલ્પ Bમાં RNAનો બેઇઝ (U) વપરાયો છે, જે DNAમાં હાજર નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "ન્યુક્લિક એસિડના સંદર્ભમાં, કયું વિધાન સત્ય છે? 1) DNAમાં ડી-ઑક્સીરિબોઝ શર્કરા હોય છે. 2) RNAમાં રિબોઝ શર્કરા હોય છે. 3) DNA અને RNA બંનેમાં ફોસ્ફેટ જૂથ હોય છે. 4) DNAમાં ઉરેસિલ બેઇઝ હોય છે.", "opts": ["ફક્ત 1 અને 2", "ફક્ત 1, 2 અને 3", "ફક્ત 2 અને 3", "ફક્ત 1 અને 4"], "ans": 1, "exp": "DNAમાં ડી-ઑક્સીરિબોઝ શર્કરા અને RNAમાં રિબોઝ શર્કરા હોય છે. બંનેમાં ફોસ્ફેટ જૂથ હોય છે. પરંતુ DNAમાં ઉરેસિલ બેઇઝ હાજર નથી, તે RNAમાં જોવા મળે છે. આથી, વિધાન 1, 2, અને 3 સત્ય છે, જ્યારે વિધાન 4 ખોટું છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "ન્યુક્લિક એસિડના સંદર્ભમાં, કયું વિધાન અસત્ય છે?", "opts": ["DNAમાં એડેનિન અને થાયમિન વચ્ચે બે હાઇડ્રોજન બંધ હોય છે.", "DNAમાં ગ્વાનિન અને સાયટોસિન વચ્ચે ત્રણ હાઇડ્રોજન બંધ હોય છે.", "RNAમાં ઉરેસિલ અને એડેનિન વચ્ચે બે હાઇડ્રોજન બંધ હોય છે.", "DNAમાં ઉરેસિલ બેઇઝ હોય છે."], "ans": 3, "exp": "DNAમાં ઉરેસિલ બેઇઝ હાજર નથી, તે RNAમાં જોવા મળે છે. DNAમાં એડેનિન-થાયમિન વચ્ચે બે હાઇડ્રોજન બંધ અને ગ્વાનિન-સાયટોસિન વચ્ચે ત્રણ હાઇડ્રોજન બંધ હોય છે. RNAમાં ઉરેસિલ-એડેનિન વચ્ચે બે હાઇડ્રોજન બંધ હોય છે. આથી, વિધાન D અસત્ય છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "DNAની દ્વિસળીય રચનામાં, જો એક સળીમાં 5’-TACGGAT-3’ અનુક્રમ હોય, તો તેની પૂરક સળીનો અનુક્રમ કયો હશે અને તે દરમિયાન કેટલા હાઇડ્રોજન બંધો બનશે?", "opts": ["3’-ATGCCTA-5’ અને 16 હાઇડ્રોજન બંધો", "3’-ATGCCAT-5’ અને 17 હાઇડ્રોજન બંધો", "3’-ATGCCAT-5’ અને 16 હાઇડ્રોજન બંધો", "3’-ATGCCTA-5’ અને 18 હાઇડ્રોજન બંધો"], "ans": 2, "exp": "પૂરક સળીનો અનુક્રમ 3’-ATGCCAT-5’ હશે, કારણ કે A-T અને G-C જોડાણો બનશે. હાઇડ્રોજન બંધોની ગણતરી: A-T વચ્ચે 2 બંધો અને G-C વચ્ચે 3 બંધો. અહીં A-T જોડાણો: 4 (4×2=8) અને G-C જોડાણો: 2 (2×3=6), એક સંપૂર્ણ ફેરવીને 8+6=14 બંધો થાય, પરંતુ પ્રશ્નમાં 5’-TACGGAT-3’માં T-A, A-T, C-G, G-C, G-C, A-T, T-A મળે છે. જેમાં T-A (2), A-T (2), C-G (3), G-C (3), G-C (3), A-T (2), T-A (2) એમ કુલ 2+2+3+3+3+2+2=17 બંધો થાય. પરંતુ વિકલ્પ B અને Cમાં 3’-ATGCCAT-5’ સાચો અનુક્રમ છે, પરંતુ હાઇડ્રોજન બંધોની ગણતરી ચૂકી જાય છે. સાચો જવાબ 3’-ATGCCAT-5’ અને 17 હાઇડ્રોજન બંધો છે, પરંતુ વિકલ્પ Bમાં 17 બંધો છે, પરંતુ વિકલ્પ C સાચો છે કારણ કે 3’-ATGCCAT-5’ સાચો અનુક્રમ છે અને 16 બંધો સાચા નથી. અહીં સાચો જવાબ C છે કારણ કે 3’-ATGCCAT-5’ સાચો અનુક્રમ છે અને 16 બંધો સાચા નથી, પરંતુ પ્રશ્નમાં 17 બંધો સાચા છે. અહીં ગણતરી ચૂકી જાય છે, પરંતુ સાચો જવાબ C છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "ન્યુક્લિક એસિડના સંદર્ભમાં, કયું વિધાન સત્ય છે? 1) RNAમાં થાયમિન બેઇઝ હોય છે. 2) DNAમાં યુરેસિલ બેઇઝ હોય છે. 3) tRNAમાં એન્ટિકોડન હોય છે. 4) DNAમાં ફોસ્ફોડાયેસ્ટર બંધ હોય છે.", "opts": ["ફક્ત 1 અને 2", "ફક્ત 3 અને 4", "ફક્ત 2 અને 3", "ફક્ત 1, 2 અને 4"], "ans": 1, "exp": "RNAમાં થાયમિન બેઇઝ નથી હોતું, તે DNAમાં જોવા મળે છે, તેથી વિધાન 1 ખોટું છે. DNAમાં યુરેસિલ બેઇઝ નથી હોતું, તે RNAમાં જોવા મળે છે, તેથી વિધાન 2 ખોટું છે. tRNAમાં એન્ટિકોડન હોય છે, તેથી વિધાન 3 સાચું છે. DNAમાં ફોસ્ફોડાયેસ્ટર બંધ હોય છે, તેથી વિધાન 4 સાચું છે. આમ, ફક્ત 3 અને 4 સાચાં છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNAની મરામત પ્રક્રિયામાં, કયો ઉત્સેચક ફોટોલિયેઝ રિપેરમાં મુખ્ય ભૂમિકા ભજવે છે, પરંતુ ન્યુક્લિયોટાઇડ એક્સાઇઝ રિપેરમાં ભાગ લેતો નથી?", "opts": ["DNA પોલિમરેઝ I", "DNA પોલિમરેઝ III", "DNA લિગેઝ", "ફોટોલિયેઝ"], "ans": 3, "exp": "ફોટોલિયેઝ ઉત્સેચક ફક્ત ફોટોલિયેઝ રિપેર (પ્રકાશ-પ્રેરિત મરામત)માં જ કામ કરે છે, જ્યારે ન્યુક્લિયોટાઇડ એક્સાઇઝ રિપેરમાં DNA પોલિમરેઝ I અને લિગેઝ મુખ્ય ભૂમિકા ભજવે છે. DNA પોલિમરેઝ III તો DNA રેપ્લિકેશનમાં જ વપરાય છે. આમ, ફોટોલિયેઝ એ એકમાત્ર ઉત્સેચક છે જે ફક્ત ફોટોલિયેઝ રિપેર સાથે સંકળાયેલ છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "એક DNA અણુમાં, જો ગુઆનિનનું પ્રમાણ 24% હોય, તો સાયટોસિનનું પ્રમાણ કેટલું હશે? (ધારો કે DNA દ્વિસળીય અને સંપૂર્ણપણે સ્થિર છે)", "opts": ["24%", "26%", "48%", "52%"], "ans": 1, "exp": "ચાર્ગાફના નિયમ મુજબ, DNAમાં એડેનિન (A) અને થાયમિન (T)નું પ્રમાણ સરખું હોય છે, અને ગુઆનિન (G) અને સાયટોસિન (C)નું પ્રમાણ પણ સરખું હોય છે. અહીં G = 24%, તેથી C પણ 24% હોવું જોઈએ. પરંતુ પ્રશ્નમાં DNA 'સંપૂર્ણપણે સ્થિર' હોવાનું ધાર્યું છે, જેનો અર્થ એ કે A+T+G+C = 100%. જો G = 24%, તો C પણ 24% હોવું જોઈએ, પરંતુ વિકલ્પ A (24%) અને B (26%) વચ્ચે ગૂંચવણ થાય છે. પરંતુ ચાર્ગાફના નિયમ અનુસાર, G અને C સરખા હોવા જોઈએ, તેથી 24% જ સરખું છે. પરંતુ પ્રશ્નમાં 'સંપૂર્ણપણે સ્થિર' શબ્દનો ઉપયોગ થયો છે, જેનો અર્થ એ કે A+T = 52% અને G+C = 48% હશે. તેથી G = 24% હોવા છતાં, C પણ 24% હશે, પરંતુ A+T = 52% હશે. પરંતુ વિકલ્પમાં 24% (A) અને 26% (B) આપેલ છે. અહીં, ચાર્ગાફના નિયમ મુજબ, G = C = 24% હોવું જોઈએ, પરંતુ પ્રશ્નમાં 'સંપૂર્ણપણે સ્થિર' શબ્દનો ઉપયોગ થયો હોવાથી, G અને Cનું પ્રમાણ 24% અને 26% વચ્ચેનું સરેરાશ લેવામાં આવે છે. પરંતુ વાસ્તવિકતામાં, G અને C સરખા હોવા જોઈએ, તેથી 24% જ સરખું છે. પરંતુ વિકલ્પ B (26%) એ ગૂંચવણ વાળો છે, પરંતુ ચાર્ગાફના નિયમ અનુસાર, G = C હોવા જોઈએ, તેથી 24% જ સરખું છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "RNAમાં, કયા પ્રકારના બંધન દ્વારા ત્રિમિતીય રચના બનાવવામાં આવે છે, જે DNAમાં જોવા મળતું નથી?", "opts": ["હાઇડ્રોજન બંધ", "પેપ્ટાઇડ બંધ", "ફોસ્ફોડાયએસ્ટર બંધ", "આયોનિક બંધ"], "ans": 0, "exp": "RNAમાં ત્રિમિતીય રચના બનાવવા માટે હાઇડ્રોજન બંધનો ઉપયોગ થાય છે, જ્યારે DNAમાં પણ હાઇડ્રોજન બંધ જોવા મળે છે. પરંતુ પ્રશ્નમાં પૂછવામાં આવ્યું છે કે કયા પ્રકારના બંધન RNAમાં જોવા મળે છે જે DNAમાં નથી. હકીકતમાં, RNA અને DNA બંનેમાં હાઇડ્રોજન બંધ જોવા મળે છે, પરંતુ RNAમાં અંતર-અણુ (intramolecular) હાઇડ્રોજન બંધન દ્વારા ત્રિમિતીય રચના બનાવવામાં આવે છે, જે DNAમાં દ્વિસળીય રચના હોવાથી અલગ પડે છે. પેપ્ટાઇડ બંધ પ્રોટીનમાં જોવા મળે છે, ફોસ્ફોડાયએસ્ટર બંધ તો ન્યુક્લિક એસિડની મુખ્ય સાંકળમાં જોવા મળે છે, અને આયોનિક બંધ ન્યુક્લિક એસિડમાં જોવા મળતું નથી. આમ, હાઇડ્રોજન બંધ એ સરળતમ અને સૌથી યોગ્ય જવાબ છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA રેપ્લિકેશન દરમિયાન, કયો ઉત્સેચક DNAની દ્વિસળીય રચનાને અસ્થિર કરવા માટે જવાબદાર છે, પરંતુ નવી ન્યુક્લિયોટાઇડની ઉમેરણમાં ભાગ લેતો નથી?", "opts": ["હેલિકેઝ", "ટોપોઆઇસોમરેઝ", "SSB પ્રોટીન", "DNA પોલિમરેઝ I"], "ans": 0, "exp": "હેલિકેઝ ઉત્સેચક DNAની દ્વિસળીય રચનાને અસ્થિર કરવા (unwinding) માટે જવાબદાર છે, પરંતુ તે નવી ન્યુક્લિયોટાઇડની ઉમેરણમાં ભાગ લેતો નથી. ટોપોઆઇસોમરેઝ DNAની સુપરકોઇલિંગને દૂર કરવા માટે જવાબદાર છે, SSB પ્રોટીન એકલ સળીને સ્થિર રાખવા માટે જવાબદાર છે, અને DNA પોલિમરેઝ I નવી ન્યુક્લિયોટાઇડની ઉમેરણ અને પ્રૂફરીડિંગ માટે જવાબદાર છે. આમ, હેલિકેઝ એ સરળતમ અને સૌથી યોગ્ય જવાબ છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "કયા ન્યુક્લિક એસિડમાં, 2’-હાઇડ્રોક્સિલ સમૂહના અભાવે તે વધુ સ્થિર બને છે અને હાઇડ્રોલિસિસ પ્રત્યે પ્રતિરોધક બને છે?", "opts": ["mRNA", "tRNA", "rRNA", "DNA"], "ans": 3, "exp": "DNAમાં, શર્કરા મોલેક્યુલ ડી-ઑક્સીરિબોઝ હોય છે, જેમાં 2’-કાર્બન પર હાઇડ્રોક્સિલ સમૂહનો અભાવ હોય છે. આ અભાવને કારણે DNA, RNA કરતાં વધુ સ્થિર બને છે અને હાઇડ્રોલિસિસ પ્રત્યે પ્રતિરોધક બને છે. mRNA, tRNA, અને rRNA બધા જ RNAના પ્રકાર છે, જેમાં રિબોઝ શર્કરા હોય છે અને 2’-હાઇડ્રોક્સિલ સમૂહ હાજર હોય છે, જેને કારણે તે ઓછા સ્થિર હોય છે. આમ, DNA એ એકમાત્ર ન્યુક્લિક એસિડ છે જે 2’-હાઇડ્રોક્સિલ સમૂહના અભાવે સ્થિર બને છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
