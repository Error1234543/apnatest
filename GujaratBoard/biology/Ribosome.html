<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ribosome</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Ribosome</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Ribosome</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "રાઇબોઝોમના ૬૦S અને ૪૦S ઉપ-એકમોનો સંયોજનથી બનતો કયો એકમ કોષમાં પ્રોટીન સંશ્લેષણ માટે જવાબદાર છે?", "opts": ["૭૦S રાઇબોઝોમ", "૮૦S રાઇબોઝોમ", "૯૦S રાઇબોઝોમ", "૫૦S રાઇબોઝોમ"], "ans": 1, "exp": "રાઇબોઝોમના ૬૦S (લાર્જ સબયુનિટ) અને ૪૦S (સ્મોલ સબયુનિટ)નો સંયોજનથી ૮૦S રાઇબોઝોમ બને છે, જે યુકેરિયોટિક કોષોમાં પ્રોટીન સંશ્લેષણ માટે જવાબદાર છે. ૭૦S રાઇબોઝોમ પ્રોકેરિયોટ્સમાં જોવા મળે છે. ૯ીS અને ૫ીS એ અસ્તિત્વમાં નથી.", "ref": "Std 11 - પ્રકરણ ૮: કોષ અને તેના ઘટકો", "ch": ""}, {"q": "રાઇબોઝોમલ RNA (rRNA) ની ભૂમિકા કઈ છે?", "opts": ["તે પ્રોટીન સંશ્લેષણ દરમિયાન એમિનોએસિડને વહન કરે છે", "તે રાઇબોઝોમની રચના અને કેટાલિટિક ક્રિયા માટે જવાબદાર છે", "તે mRNA ને કોષકેન્દ્રમાંથી કોષરસમાં વહન કરે છે", "તે DNA ની નકલ કરવામાં મદદ કરે છે"], "ans": 1, "exp": "rRNA રાઇબોઝોમની રચનામાં મુખ્ય ભૂમિકા ભજવે છે અને પ્રોટીન સંશ્લેષણ દરમિયાન પેપ્ટિડ બંધન બનાવવામાં કેટાલિટિક ક્રિયા કરે છે. એમિનોએસિડ વહન tRNA કરે છે. mRNA ને કોષકેન્દ્રમાંથી કોષરસમાં વહન કરવું એ rRNA ની ભૂમિકા નથી. DNA ની નકલ કરવામાં RNA પોલિમરેઝ મદદ કરે છે.", "ref": "Std 11 - પ્રકરણ ૮: કોષ અને તેના ઘટકો", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન રાઇબોઝોમ વિશે ખોટું છે?", "opts": ["રાઇબોઝોમમાં rRNA અને પ્રોટીન હોય છે", "રાઇબોઝોમ કોષરસમાં મુક્ત અવસ્થામાં અથવા એન્ડોપ્લાઝમિક રેટિક્યુલમ સાથે જોડાયેલા હોય છે", "રાઇબોઝોમ પ્રોટીન સંશ્લેષણ માટે એટીપીનો ઉપયોગ કરે છે", "રાઇબોઝોમ DNA ની નકલ કરવામાં મદદ કરે છે"], "ans": 3, "exp": "રાઇબોઝોમ પ્રોટીન સંશ્લેષણ માટે જવાબદાર છે, DNA ની નકલ કરવામાં તેની કોઈ ભૂમિકા નથી. રાઇબોઝોમમાં rRNA અને પ્રોટીન હોય છે, તે કોષરસમાં મુક્ત અથવા ER સાથે જોડાયેલા હોય છે, અને પ્રોટીન સંશ્લેષણ માટે એટીપીનો ઉપયોગ કરે છે.", "ref": "Std 11 - પ્રકરણ ૮: કોષ અને તેના ઘટકો", "ch": ""}, {"q": "રાઇબોઝોમ પર mRNA ની ગતિ કયા દિશામાં થાય છે?", "opts": ["૫’ થી ૩’ દિશામાં", "૩’ થી ૫’ દિશામાં", "બંને દિશામાં", "કોઈ નિશ્ચિત દિશામાં નહીં"], "ans": 0, "exp": "રાઇબોઝોમ પર mRNA ની ગતિ ૫’ થી ૩’ દિશામાં થાય છે, કારણ કે પ્રોટીન સંશ્લેષણ દરમિયાન રાઇબોઝોમ mRNA ને આ દિશામાં વાંચે છે. બીજી દિશાઓ અયોગ્ય છે.", "ref": "Std 11 - પ્રકરણ ૮: કોષ અને તેના ઘટકો", "ch": ""}, {"q": "રાઇબોઝોમ દ્વારા પ્રોટીન સંશ્લેષણ દરમિયાન, પેપ્ટિડ બંધનની રચના કયા તબક્કામાં થાય છે?", "opts": ["પ્રારંભ (Initiation)", "લંબાણ (Elongation)", "સમાપ્તિ (Termination)", "પ્રારંભ અને લંબાણ બંનેમાં"], "ans": 1, "exp": "પેપ્ટિડ બંધનની રચના પ્રોટીન સંશ્લેષણના લંબાણ (Elongation) તબક્કામાં થાય છે, જ્યારે એમિનોએસિડ ચેઈન લંબાય છે. પ્રારંભ તબક્કામાં mRNA અને રાઇબોઝોમનો સંયોજન થાય છે, સમાપ્તિ તબક્કામાં પ્રોટીન સંશ્લેષણ પૂર્ણ થાય છે.", "ref": "Std 11 - પ્રકરણ ૮: કોષ અને તેના ઘટકો", "ch": ""}, {"q": "રાઇબોઝોમમાં ૫S rRNA ની ભૂમિકા વિશે નીચેનામાંથી કયું વિધાન સૌથી યોગ્ય છે?", "opts": ["તે મુખ્યત્વે પેપ્ટિડ ટ્રાન્સફરેઝ ઉત્સેચક તરીકે કાર્ય કરે છે", "તે ૬૦S ઉપ-એકમમાં rRNA ના સંરચનાત્મક સ્થિરતા પ્રદાન કરે છે", "તે mRNA ની શરૂઆત કોડોનને ઓળખવામાં મદદ કરે છે", "તે tRNA ને રાઇબોઝોમ સાથે જોડવામાં મુખ્ય ભૂમિકા ભજવે છે"], "ans": 1, "exp": "૫S rRNA ૬૦S ઉપ-એકમમાં સંરચનાત્મક સ્થિરતા પ્રદાન કરે છે અને પ્રોટીન સંશ્લેષણ દરમિયાન તેની ભૂમિકા મહત્વપૂર્ણ છે. A) પેપ્ટિડ ટ્રાન્સફરેઝ ઉત્સેચક તરીકે ૨૩S rRNA કાર્ય કરે છે, નહીં કે ૫S. C) શરૂઆત કોડોનને ઓળખવામાં મુખ્યત્વે ૧૬S rRNA ભૂમિકા ભજવે છે. D) tRNA ને જોડવામાં મુખ્યત્વે ૧૬S અને ૨૩S rRNA ભૂમિકા ભજવે છે.", "ref": "Std 11 - પ્રકરણ ૯: કોષ અને તેના ઘટકો", "ch": ""}, {"q": "યુકેરિયોટિક કોષમાં રાઇબોઝોમની રચના ક્યાં થાય છે?", "opts": ["કોષરસમાં", "કોષકેન્દ્રીય રંજકદ્રવ્ય (Nucleolus) માં", "એન્ડોપ્લાઝમિક જાળકામાં", "માઈટોકોન્ડ્રિયામાં"], "ans": 1, "exp": "યુકેરિયોટિક કોષમાં રાઇબોઝોમની રચના કોષકેન્દ્રીય રંજકદ્રવ્ય (Nucleolus) માં થાય છે, જ્યાં rRNA નું સંશ્લેષણ અને રાઇબોઝોમલ ઉપ-એકમોનું નિર્માણ થાય છે. A) કોષરસમાં રાઇબોઝોમની રચના થતી નથી. C) એન્ડોપ્લાઝમિક જાળકામાં પ્રોટીન સંશ્લેષણ થાય છે, પરંતુ રાઇબોઝોમની રચના નહીં. D) માઈટોકોન્ડ્રિયામાં તેના પોતાના રાઇબોઝોમ હોય છે, પરંતુ યુકેરિયોટિક કોષના રાઇબોઝોમની રચના કોષકેન્દ્રીય રંજકદ્રવ્યમાં થાય છે.", "ref": "Std 11 - પ્રકરણ ૯: કોષ અને તેના ઘટકો", "ch": ""}, {"q": "રાઇબોઝોમ દ્વારા પ્રોટીન સંશ્લેષણ દરમિયાન, નીચેનામાંથી કયું તબક્કો એટીપી (ATP) નો ઉપયોગ કરતું નથી?", "opts": ["અમીનો એસીડનું સક્રિયીકરણ", "tRNA નું ચાર્જ થવું", "પેપ્ટિડ બંધનની રચના", "ટ્રાન્સલોકેશન (Translocation)"], "ans": 2, "exp": "પેપ્ટિડ બંધનની રચના દરમિયાન ATP નો ઉપયોગ થતો નથી, કારણ કે તે એક ઉર્જા-મુક્ત પ્રક્રિયા છે. A) અમીનો એસીડનું સક્રિયીકરણ ATP નો ઉપયોગ કરે છે. B) tRNA નું ચાર્જ થવું ATP નો ઉપયોગ કરે છે. D) ટ્રાન્સલોકેશન દરમિયાન GTP નો ઉપયોગ થાય છે, પરંતુ ATP પણ આ પ્રક્રિયામાં આડકતરી રીતે ઉપયોગી થાય છે.", "ref": "Std 12 - પ્રકરણ ૬: જૈવ-અણુઓ અને પ્રોટીન સંશ્લેષણ", "ch": ""}, {"q": "રાઇબોઝોમલ ઉપ-એકમોના સંયોજન માટે નીચેનામાંથી કયો આયન આવશ્યક છે?", "opts": ["Mg²⁺", "Ca²⁺", "Fe²⁺", "Zn²⁺"], "ans": 0, "exp": "રાઇબોઝોમલ ઉપ-એકમોના સંયોજન માટે Mg²⁺ આયન આવશ્યક છે, કારણ કે તે rRNA અને પ્રોટીન વચ્ચેની આંતરક્રિયાઓને સ્થિર કરે છે. B) Ca²⁺, C) Fe²⁺, અને D) Zn²⁺ આ પ્રક્રિયામાં મહત્વપૂર્ણ ભૂમિકા ભજવતા નથી.", "ref": "Std 11 - પ્રકરણ ૯: કોષ અને તેના ઘટકો", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન રાઇબોઝોમ વિશે સત્ય નથી?", "opts": ["રાઇબોઝોમમાં rRNA અને પ્રોટીનનો સમાવેશ થાય છે", "રાઇબોઝોમ કોષરસમાં મુક્ત રીતે અસ્તિત્વમાં હોઈ શકે છે", "રાઇબોઝોમમાં DNA હાજર હોય છે", "રાઇબોઝોમ પ્રોટીન સંશ્લેષણમાં મદદ કરે છે"], "ans": 2, "exp": "રાઇબોઝોમમાં DNA હાજર નથી, તે ફક્ત rRNA અને પ્રોટીનનો બનેલો હોય છે. A) રાઇબોઝોમ rRNA અને પ્રોટીનનો બનેલો હોય છે. B) રાઇબોઝોમ કોષરસમાં મુક્ત રીતે અસ્તિત્વમાં હોઈ શકે છે. D) રાઇબોઝોમ પ્રોટીન સંશ્લેષણમાં મદદ કરે છે.", "ref": "Std 11 - પ્રકરણ ૯: કોષ અને તેના ઘટકો", "ch": ""}, {"q": "યુકેરિયોટિક કોષમાં રાઇબોઝોમના ૬૦S ઉપ-એકમમાં કયા rRNA અણુઓ હાજર હોય છે?", "opts": ["5S, 5.8S, 28S", "5S, 16S, 23S", "5.8S, 18S, 28S", "16S, 23S, 5S"], "ans": 0, "exp": "યુકેરિયોટિક રાઇબોઝોમના ૬૦S ઉપ-એકમમાં 5S, 5.8S, અને 28S rRNA અણુઓ હાજર હોય છે. પ્રોકેરિયોટ્સમાં 23S અને 5S rRNA હાજર હોય છે, જ્યારે 16S અને 18S અનુક્રમે પ્રોકેરિયોટિક 30S અને યુકેરિયોટિક 40S ઉપ-એકમમાં હાજર હોય છે. વિકલ્પ B અને D પ્રોકેરિયોટિક રાઇબોઝોમ સાથે સંબંધિત છે, જ્યારે વિકલ્પ Cમાં 18S rRNA 40S ઉપ-એકમમાં હાજર હોય છે.", "ref": "Std 11 - પ્રકરણ ૮: કોષ અને તેની રચના", "ch": ""}, {"q": "રાઇબોઝોમ પર પ્રોટીન સંશ્લેષણ દરમિયાન, નીચેનામાંથી કયું તબક્કો એમિનોએસિલ-tRNA સંશ્લેષણ સાથે સીધો સંબંધ ધરાવે છે?", "opts": ["પ્રારંભ (Initiation)", "લંબાયમાન (Elongation)", "અમીનોએસિલેશન (Aminoacylation)", "સમાપ્તિ (Termination)"], "ans": 2, "exp": "અમીનોએસિલેશન (Aminoacylation) એ તબક્કો છે જ્યાં એમિનો એસિડને tRNA સાથે જોડવામાં આવે છે, જે એમિનોએસિલ-tRNA સંશ્લેષણ તરફ દોરી જાય છે. પ્રારંભ, લંબાયમાન, અને સમાપ્તિ એ પ્રોટીન સંશ્લેષણના તબક્કાઓ છે પરંતુ એમિનોએસિલ-tRNA સંશ્લેષણ સાથે સીધો સંબંધ ધરાવતા નથી.", "ref": "Std 12 - પ્રકરણ ૬: જનીન અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "રાઇબોઝોમ દ્વારા પ્રોટીન સંશ્લેષણ દરમિયાન, નીચેનામાંથી કયો ફેક્ટર પ્રારંભ તબક્કામાં ભાગ લેતો નથી?", "opts": ["eIF-2", "eIF-4", "EF-Tu", "eIF-3"], "ans": 2, "exp": "EF-Tu (Elongation Factor Tu) લંબાયમાન (Elongation) તબક્કામાં ભાગ લે છે, જ્યારે eIF-2, eIF-3, અને eIF-4 પ્રારંભ (Initiation) તબક્કામાં ભાગ લે છે.", "ref": "Std 12 - પ્રકરણ ૬: જનીન અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન રાઇબોઝોમ વિશે સત્ય છે જ્યારે તે પ્રોટીન સંશ્લેષણ કરતું નથી?", "opts": ["તે ૮૦S અવસ્થામાં હોય છે.", "તેના ૬૦S અને ૪૦S ઉપ-એકમો અલગ હોય છે.", "તે mRNA સાથે જોડાયેલું હોય છે.", "તે એન્ડોપ્લાઝમિક રેટિક્યુલમ સાથે જોડાયેલું હોય છે."], "ans": 1, "exp": "જ્યારે રાઇબોઝોમ પ્રોટીન સંશ્લેષણ કરતું નથી, ત્યારે તેના ૬૦S અને ૪૦S ઉપ-એકમો અલગ હોય છે. ૮૦S અવસ્થા પ્રોટીન સંશ્લેષણ દરમિયાન બને છે, જ્યારે mRNA અને એન્ડોપ્લાઝમિક રેટિક્યુલમ સાથે જોડાણ પણ પ્રોટીન સંશ્લેષણ દરમિયાન જ થાય છે.", "ref": "Std 11 - પ્રકરણ ૮: કોષ અને તેની રચના", "ch": ""}, {"q": "યુકેરિયોટિક કોષમાં, રાઇબોઝોમ દ્વારા પ્રોટીન સંશ્લેષણ દરમિયાન, નીચેનામાંથી કયા પરિસ્થિતિમાં ૮૦S રાઇબોઝોમ ૭૦S રાઇબોઝોમમાં રૂપાંતરિત થાય છે?", "opts": ["જ્યારે કોષમાં મિટોકોન્ડ્રિયા અથવા હરિતલવકમાં પ્રોટીન સંશ્લેષણ થાય છે", "જ્યારે કોષમાં એન્ડોપ્લાઝ્મિક જાળકામાં પ્રોટીન સંશ્લેષણ થાય છે", "જ્યારે કોષમાં સાયટોપ્લાઝ્મમાં પ્રોટીન સંશ્લેષણ થાય છે", "જ્યારે કોષમાં કોષકેન્દ્રમાં પ્રોટીન સંશ્લેષણ થાય છે"], "ans": 0, "exp": "યુકેરિયોટિક કોષમાં, મિટોકોન્ડ્રિયા અને હરિતલવક (ક્લોરોપ્લાસ્ટ) પોતાના સ્વતંત્ર જનીનોમ ધરાવે છે અને તેઓમાં પ્રોટીન સંશ્લેષણ માટે ૭૦S રાઇબોઝોમ વપરાય છે. આ રાઇબોઝોમ ૫૦S અને ૩૦S ઉપ-એકમો ધરાવે છે, જે ૮૦S રાઇબોઝોમ (૬૦S + ૪૦S) થી અલગ છે. આથી, જ્યારે કોષમાં મિટોકોન્ડ્રિયા અથવા હરિતલવકમાં પ્રોટીન સંશ્લેષણ થાય છે, ત્યારે ૮૦S રાઇબોઝોમ ૭૦S રાઇબોઝોમમાં રૂપાંતરિત થાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે એન્ડોપ્લાઝ્મિક જાળકા, સાયટોપ્લાઝ્મ, અને કોષકેન્દ્રમાં ૮૦S રાઇબોઝોમ જ વપરાય છે.", "ref": "Std 11 - પ્રકરણ ૮: કોષ અને તેના અંગિકો", "ch": ""}, {"q": "યુકેરિયોટિક કોષમાં, રાઇબોઝોમ પર પ્રોટીન સંશ્લેષણ દરમિયાન, નીચેનામાંથી કયા પરિસ્થિતિમાં ૮૦S રાઇબોઝોમ એમિનોએસિલ-tRNA ને બાંધી શકતું નથી?", "opts": ["જ્યારે mRNA ના ૫’ અંતે કોડોન હાજર ન હોય", "જ્યારે એમિનોએસિલ-tRNA સંકેત (સિગ્નલ) પેપ્ટાઇડ હાજર ન હોય", "જ્યારે GTP ની ઉણપ હોય", "જ્યારે રાઇબોઝોમ ૬૦S અને ૪૦S ઉપ-એકમો વચ્ચેનો સંયોજન અપૂર્ણ હોય"], "ans": 2, "exp": "રાઇબોઝોમ દ્વારા પ્રોટીન સંશ્લેષણ માટે GTP આવશ્યક છે, ખાસ કરીને એમિનોએસિલ-tRNA ને બાંધવા અને ટ્રાન્સલોકેશન દરમિયાન. A) ખોટું છે કારણ કે mRNA ના ૫’ અંતે કોડોન હાજર ન હોવા છતાં રાઇબોઝોમ એમિનોએસિલ-tRNA ને બાંધી શકે છે. B) ખોટું છે કારણ કે સંકેત પેપ્ટાઇડની હાજરી અથવા અભાવ રાઇબોઝોમની બાંધણી ક્ષમતા પર અસર કરતું નથી. D) ખોટું છે કારણ કે અપૂર્ણ સંયોજન હોવા છતાં રાઇબોઝોમ એમિનોએસિલ-tRNA ને બાંધી શકે છે, પરંતુ પ્રક્રિયા અસરગ્રસ્ત થશે.", "ref": "Std 12 - પ્રકરણ ૬: જીવનની વંશપરંપરાગતતા અને વિકાસ (પ્રોટીન સંશ્લેષણ તબક્કાઓ)", "ch": ""}, {"q": "રાઇબોઝોમ પર પ્રોટીન સંશ્લેષણ દરમિયાન, નીચેનામાંથી કયું વિધાન એન્ટિબાયોટિક્સ વિશે સત્ય છે જ્યારે તે રાઇબોઝોમની ક્રિયા અવરોધે છે?", "opts": ["સ્ટ્રેપ્ટોમાઈસિન ૫૦S ઉપ-એકમ સાથે બંધાય છે અને પેપ્ટિડ ટ્રાન્સફરેઝ ક્રિયા અવરોધે છે", "ટેટ્રાસાયક્લિન ૩૦S ઉપ-એકમ સાથે બંધાય છે અને એમિનોએસિલ-tRNA ની બાંધણી અવરોધે છે", "ક્લોરેમફેનિકોલ ૪૦S ઉપ-એકમ સાથે બંધાય છે અને પેપ્ટિડ બંધન રચના અવરોધે છે", "એરિથ્રોમાઈસિન ૬૦S ઉપ-એકમ સાથે બંધાય છે અને mRNA ની ગતિ અવરોધે છે"], "ans": 1, "exp": "ટેટ્રાસાયક્લિન ૩૦S ઉપ-એકમ સાથે બંધાય છે અને એમિનોએસિલ-tRNA ની બાંધણી અવરોધે છે, જે પ્રોટીન સંશ્લેષણને અટકાવે છે. A) ખોટું છે કારણ કે સ્ટ્રેપ્ટોમાઈસિન ૩૦S ઉપ-એકમ સાથે બંધાય છે અને પ્રારંભ તબક્કાને અવરોધે છે. C) ખોટું છે કારણ કે ક્લોરેમફેનિકોલ ૫૦S ઉપ-એકમ સાથે બંધાય છે અને પેપ્ટિડ બંધન રચના અવરોધે છે. D) ખોટું છે કારણ કે એરિથ્રોમાઈસિન ૫૦S ઉપ-એકમ સાથે બંધાય છે અને પેપ્ટિડ ટ્રાન્સલોકેશન અવરોધે છે.", "ref": "Std 12 - પ્રકરણ ૮: માનવ સ્વાસ્થ્ય અને રોગો (એન્ટિબાયોટિક્સ અને રાઇબોઝોમ)", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન રાઇબોઝોમની રચના અને ક્રિયા વિશે સત્ય નથી?", "opts": ["રાઇબોઝોમલ ઉપ-એકમો કોષકેન્દ્રમાં બનતા નથી, પરંતુ કોષદ્રવ્યમાં જોડાય છે", "રાઇબોઝોમલ RNA (rRNA) પ્રોટીન સંશ્લેષણમાં ઉત્સેચક તરીકે કામ કરે છે", "રાઇબોઝોમ પર mRNA ની ગતિ ૫’ થી ૩’ દિશામાં થાય છે", "રાઇબોઝોમ દ્વારા પ્રોટીન સંશ્લેષણ દરમિયાન, પેપ્ટિડ બંધનની રચના એલોંગેશન તબક્કામાં થાય છે"], "ans": 0, "exp": "રાઇબોઝોમલ ઉપ-એકમો કોષકેન્દ્રમાં બનતા હોય છે અને કોષદ્રવ્યમાં જોડાય છે, પરંતુ પ્રારંભિક રચના કોષકેન્દ્રમાં થાય છે. B) સત્ય છે કારણ કે rRNA પ્રોટીન સંશ્લેષણમાં ઉત્સેચક તરીકે કામ કરે છે. C) સત્ય છે કારણ કે mRNA ની ગતિ ૫’ થી ૩’ દિશામાં થાય છે. D) સત્ય છે કારણ કે પેપ્ટિડ બંધનની રચના એલોંગેશન તબક્કામાં થાય છે.", "ref": "Std 12 - પ્રકરણ ૫: કોષ અને કોષીય પ્રક્રિયાઓ (રાઇબોઝોમની રચના અને ક્રિયા)", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન રાઇબોઝોમની ક્રિયા અને તેની ભૂમિકા વિશે સત્ય છે?", "opts": ["રાઇબોઝોમ ફક્ત પ્રોટીન સંશ્લેષણમાં જ ભાગ લે છે, અન્ય કોઈ ક્રિયામાં નહીં", "રાઇબોઝોમલ ઉપ-એકમો કોષકેન્દ્રમાં બનતા નથી, પરંતુ કોષદ્રવ્યમાં જોડાય છે", "રાઇબોઝોમ દ્વારા પ્રોટીન સંશ્લેષણ દરમિયાન, પેપ્ટિડ બંધનની રચના પ્રારંભ તબક્કામાં થાય છે", "રાઇબોઝોમ પર mRNA ની ગતિ ૩’ થી ૫’ દિશામાં થાય છે"], "ans": 1, "exp": "રાઇબોઝોમલ ઉપ-એકમો કોષકેન્દ્રમાં બનતા હોય છે અને કોષદ્રવ્યમાં જોડાય છે, પરંતુ પ્રારંભિક રચના કોષકેન્દ્રમાં થાય છે. A) ખોટું છે કારણ કે રાઇબોઝોમ પ્રોટીન સંશ્લેષણ ઉપરાંત અન્ય ક્રિયાઓમાં પણ ભાગ લે છે, જેમ કે કોષીય ચયાપચય. C) ખોટું છે કારણ કે પેપ્ટિડ બંધનની રચના એલોંગેશન તબક્કામાં થાય છે. D) ખોટું છે કારણ કે mRNA ની ગતિ ૫’ થી ૩’ દિશામાં થાય છે.", "ref": "Std 12 - પ્રકરણ ૫: કોષ અને કોષીય પ્રક્રિયાઓ (રાઇબોઝોમની ભૂમિકા)", "ch": ""}, {"q": "એક સંશોધક યુકેરિયોટિક કોષમાં રહેલા રાઇબોઝોમનો અભ્યાસ કરી રહ્યો છે. તેણે નોંધ્યું કે કેટલાક રાઇબોઝોમ કોષરસમ   }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
