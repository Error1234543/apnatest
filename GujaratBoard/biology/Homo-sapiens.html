<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homo sapiens</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Homo sapiens</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Homo sapiens</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "માનવમાં X-વર્ણસૂત્ર સાથે સંકળાયેલી આનુવંશિક રોગો પૈકી કયો રોગ પુરુષોમાં જોવા મળતો નથી, પરંતુ સ્ત્રીઓમાં જોવા મળે છે અને તે હેમોફિલિયા કરતાં વધુ ગંભીર છે?", "opts": ["હેમોફિલિયા A", "ડ્યુચેન મસ્ક્યુલર ડિસ્ટ્રોફી", "રંગ અંધત્વ (Color blindness)", "લેશ-નાયહેન સિન્ડ્રોમ"], "ans": 1, "exp": "ડ્યુચેન મસ્ક્યુલર ડિસ્ટ્રોફી (DMD) એક X-સંકળિત પ્રભાવી રોગ છે જે સ્ત્રીઓમાં જોવા મળે છે, પરંતુ પુરુષોમાં ગંભીર રૂપે પ્રગટ થાય છે. હેમોફિલિયા A અને રંગ અંધત્વ X-સંકળિત અપ્રભાવી રોગો છે, જ્યારે લેશ-નાયહેન સિન્ડ્રોમ પણ X-સંકળિત અપ્રભાવી છે, પરંતુ DMD કરતાં ઓછો ગંભીર છે. DMDમાં સ્નાયુઓનું ક્ષય થવું એ ગંભીર લક્ષણ છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતા", "ch": ""}, {"q": "માનવમાં કયા હોર્મોનનું સ્રાવ પિટ્યુટરી ગ્રંથિથી થતું નથી, પરંતુ તેના અભાવે વૃદ્ધિ પ્રક્રિયા અટકી જાય છે?", "opts": ["વૃદ્ધિ હોર્મોન (GH)", "થાયરોક્સિન (T4)", "ઇન્સ્યુલિન", "એડ્રિનેલિન"], "ans": 1, "exp": "થાયરોક્સિન (T4) થાયરોઇડ ગ્રંથિથી સ્રાવવામાં આવે છે, ન કે પિટ્યુટરી ગ્રંથિથી. વૃદ્ધિ હોર્મોન (GH) પિટ્યુટરી ગ્રંથિથી સ્રાવવામાં આવે છે અને વૃદ્ધિ માટે જરૂરી છે. ઇન્સ્યુલિન અગ્ન્યાશયથી અને એડ્રિનેલિન એડ્રિનલ ગ્રંથિથી સ્રાવવામાં આવે છે. થાયરોક્સિનના અભાવે વૃદ્ધિ અટકી જાય છે, પરંતુ તે પિટ્યુટરી ગ્રંથિ સાથે સીધું સંકળાયેલું નથી.", "ref": "Std 12 - અધ્યાય 7: શરીરમાં સંકલન અને નિયંત્રણ", "ch": ""}, {"q": "માનવમાં કયા અંગમાં લસિકા (લિમ્ફ)નું નિર્માણ થતું નથી?", "opts": ["પ્લીહા (સ્પ્લીન)", "થાયમસ", "અસ્થિમજ્જા (Bone marrow)", "લસિકા ગાંઠો (Lymph nodes)"], "ans": 0, "exp": "પ્લીહા (સ્પ્લીન) લસિકા પ્રણાલીનો ભાગ છે, પરંતુ તે લસિકાનું નિર્માણ કરતું નથી. તે લોહીને શુદ્ધ કરે છે અને જૂના રક્તકણોને નાશ કરે છે. થાયમસ, અસ્થિમજ્જા અને લસિકા ગાંઠો લસિકા કોષોનું નિર્માણ કરે છે.", "ref": "Std 12 - અધ્યાય 8: શરીરમાં પ્રતિરક્ષા વ્યવસ્થા", "ch": ""}, {"q": "માનવમાં કયા જનીનનો મ્યુટેશન સિકલ સેલ એનિમિયા માટે જવાબદાર છે?", "opts": ["HBB (β-ગ્લોબિન જનીન)", "HBA (α-ગ્લોબિન જનીન)", "CFTR (સિસ્ટિક ફાઇબ્રોસિસ જનીન)", "BRCA1 (કૅન્સર સંબંધિત જનીન)"], "ans": 0, "exp": "સિકલ સેલ એનિમિયા HBB જનીનમાં મ્યુટેશનને કારણે થાય છે, જે β-ગ્લોબિન ચેઇનનું ઉત્પાદન કરે છે. HBA જનીન α-ગ્લોબિન ચેઇન માટે જવાબદાર છે, CFTR સિસ્ટિક ફાઇબ્રોસિસ માટે, અને BRCA1 કૅન્સર સાથે સંકળાયેલું છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક આનુવંશિકતા", "ch": ""}, {"q": "માનવમાં કયા ચેતાતંત્રના ભાગમાં કોષકેન્દ્ર નહીં હોય અને તે તંતુઓના રૂપમાં હોય છે?", "opts": ["મજ્જાતંતુ (Medulla oblongata)", "મસ્તિષ્ક (Cerebrum)", "અક્ષતંતુ (Axons)", "ચેતાકોષ (Neuron)"], "ans": 2, "exp": "અક્ષતંતુ (Axons) ચેતાકોષનો ભાગ છે જે તંતુઓના રૂપમાં હોય છે અને તેના કોષકેન્દ્ર મજ્જાતંતુ (Cell body)માં હોય છે, પરંતુ અક્ષતંતુમાં કોષકેન્દ્ર નહીં હોય. મજ્જાતંતુ, મસ્તિષ્ક અને ચેતાકોષમાં કોષકેન્દ્ર હોય છે.", "ref": "Std 11 - અધ્યાય 10: ચેતાતંત્ર", "ch": ""}, {"q": "માનવમાં કયા વર્ણસૂત્રમાં સૌથી વધુ જનીનો હાજર છે, પરંતુ તેનું કદ (આકાર) સૌથી નાનું છે?", "opts": ["વર્ણસૂત્ર ૧", "વર્ણસૂત્ર ૧૯", "વર્ણસૂત્ર ૨૧", "વર્ણસૂત્ર Y"], "ans": 1, "exp": "વર્ણસૂત્ર ૧૯માં સૌથી વધુ જનીન ગીચતા (gene density) હાજર છે, પરંતુ તેનું કદ સૌથી નાનું છે. વર્ણસૂત્ર ૧ મોટું છે અને વધુ જનીન ધરાવે છે, પરંતુ ગીચતા ઓછી છે. વર્ણસૂત્ર ૨૧ નાનું છે, પરંતુ જનીન ગીચતા ઓછી છે. વર્ણસૂત્ર Y પણ નાનું છે, પરંતુ તેમાં જનીન ગીચતા ઓછી છે અને મુખ્યત્વે પુરુષ લિંગ નિર્ધારણ સાથે સંકળાયેલા જનીનો ધરાવે છે.", "ref": "Std 12 - Chapter 5: વંશવિજ્ઞાન અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "માનવમાં કયા હોર્મોનનું સ્રાવ અંતઃસ્રાવી ગ્રંથિઓ દ્વારા થતું નથી, પરંતુ તેનો સીધો સંબંધ ચેતાતંત્ર સાથે છે?", "opts": ["એડ્રિનેલિન", "ઇન્સ્યુલિન", "થાયરોક્સિન", "એસિટાઇલકોલિન"], "ans": 3, "exp": "એસિટાઇલકોલિન એક ન્યુરોટ્રાન્સમિટર છે, જે ચેતાતંત્ર દ્વારા સ્રાવાય છે અને ચેતા કોષો વચ્ચે સંકેતોના વહનમાં ભૂમિકા ભજવે છે. એડ્રિનેલિન, ઇન્સ્યુલિન અને થાયરોક્સિન અંતઃસ્રાવી ગ્રંથિઓ (અધિવૃક્ક, અગ્ન્યાશય અને થાયરોઇડ) દ્વારા સ્રાવાય છે.", "ref": "Std 11 - Chapter 22: ચેતાતંત્ર અને અંતઃસ્રાવી તંત્ર", "ch": ""}, {"q": "માનવમાં કયા અંગમાં રક્ત પરિવહન માટે કોઈ ધમની (આર્ટરી) વહન કરતી નથી?", "opts": ["મગજ", "ફેફસાં", "યકૃત", "હૃદય"], "ans": 1, "exp": "ફેફસાંમાં રક્ત પરિવહન ફેફસાંની ધમની (પલ્મોનરી આર્ટરી) દ્વારા થાય છે, જે ઓક્સિજનયુક્ત રક્ત વહન કરતી નથી, પરંતુ કાર્બન ડાયોક્સાઇડયુક્ત રક્ત વહન કરે છે. મગજ, યકૃત અને હૃદયમાં ધમનીઓ દ્વારા ઓક્સિજનયુક્ત રક્ત વહન થાય છે.", "ref": "Std 11 - Chapter 18: પરિવહન તંત્ર", "ch": ""}, {"q": "માનવમાં કયા પ્રકારના પ્રતિરક્ષા કોષો સ્મૃતિ કોષો (memory cells) તરીકે કામ કરે છે અને દ્વિતીયક પ્રતિરક્ષા પ્રતિક્રિયામાં ભૂમિકા ભજવે છે?", "opts": ["B-લસિકાણુ", "T-લસિકાણુ", "મૅક્રોફેજ", "ન્યુટ્રોફિલ"], "ans": 0, "exp": "B-લસિકાણુઓ સ્મૃતિ કોષો તરીકે કામ કરે છે અને દ્વિતીયક પ્રતિરક્ષા પ્રતિક્રિયામાં ભૂમિકા ભજવે છે. T-લસિકાણુઓ પણ પ્રતિરક્ષા તંત્રમાં ભૂમિકા ભજવે છે, પરંતુ સ્મૃતિ કોષો તરીકે B-લસિકાણુઓ વધુ પ્રભાવી છે. મૅક્રોફેજ અને ન્યુટ્રોફિલ પ્રથમિક પ્રતિક્રિયામાં ભૂમિકા ભજવે છે.", "ref": "Std 12 - Chapter 10: માનવ તંત્રો - પ્રતિરક્ષાતંત્ર", "ch": ""}, {"q": "માનવમાં કયા જનીનનો મ્યુટેશન હિમોફિલિયા (Royal Disease) માટે જવાબદાર છે અને તે X-વર્ણસૂત્ર સાથે સંકળાયેલો છે?", "opts": ["F8 (Factor VIII)", "F9 (Factor IX)", "HBG (Hemoglobin Gamma)", "CFTR (Cystic Fibrosis Transmembrane Conductance Regulator)"], "ans": 0, "exp": "હિમોફિલિયા A માટે F8 (Factor VIII) જનીન જવાબદાર છે, જે X-વર્ણસૂત્ર સાથે સંકળાયેલો છે. F9 (Factor IX) હિમોફિલિયા B માટે જવાબદાર છે, પરંતુ પ્રશ્નમાં હિમોફિલિયા (Royal Disease) એટલે હિમોફિલિયા A છે. HBG હિમોગ્લોબિન સાથે અને CFTR સિસ્ટિક ફાઇબ્રોસિસ સાથે સંકળાયેલા છે.", "ref": "Std 12 - Chapter 5: વંશવિજ્ઞાન અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "માનવમાં હૃદયના કયા ભાગમાં ઓક્સિજનયુક્ત રક્ત અને ઓક્સિજનવિહીન રક્ત એકસાથે મળી શકે છે?", "opts": ["ડાબા એટ્રિયમ", "જમણા વેન્ટ્રિકલ", "ફોસા ઓવેલિસ (Fossa ovalis)", "પલ્મોનરી ધમની"], "ans": 2, "exp": "ફોસા ઓવેલિસ (Fossa ovalis) એ હૃદયના ડાબા અને જમણા એટ્રિયમ વચ્ચેનો ભાગ છે, જ્યાં જન્મ પહેલા ઓક્સિજનયુક્ત અને ઓક્સિજનવિહીન રક્ત મિશ્રિત થાય છે. ડાબા એટ્રિયમ (A) અને જમણા વેન્ટ્રિકલ (B)માં કોઈ મિશ્રણ થતું નથી. પલ્મોનરી ધમની (D) ફક્ત ઓક્સિજનવિહીન રક્ત વહન કરે છે.", "ref": "Std 12 - Chapter 18: માનવ પરિવહન તંત્ર", "ch": ""}, {"q": "માનવમાં કયા હોર્મોનનું સ્રાવ થાય છે જે સીધું જ કોષના કોષકેન્દ્રમાં જઈને જનીન અભિવ્યક્તિને નિયંત્રિત કરે છે?", "opts": ["ઇન્સ્યુલિન", "થાયરોક્સિન", "એડ્રિનેલિન", "ગ્લુકાગોન"], "ans": 1, "exp": "થાયરોક્સિન હોર્મોન કોષના કોષકેન્દ્રમાં પ્રવેશીને જનીન અભિવ્યક્તિને નિયંત્રિત કરે છે. ઇન્સ્યુલિન (A) અને ગ્લુકાગોન (D) રક્તમાં ગ્લુકોઝના સ્તરને નિયંત્રિત કરે છે, જ્યારે એડ્રિનેલિન (C) તણાવ અને ચયાપચયને પ્રભાવિત કરે છે.", "ref": "Std 12 - Chapter 22: રસાયણિક સમન્વય અને નિયંત્રણ", "ch": ""}, {"q": "માનવમાં કયા વર્ણસૂત્રમાં સેક્સ-લિંક્ડ જનીનો હાજર હોવા છતાં તેની અભાવે કોઈ આનુવંશિક રોગ થતો નથી?", "opts": ["X-વર્ણસૂત્ર", "Y-વર્ણસૂત્ર", "21મું વર્ણસૂત્ર", "22મું વર્ણસૂત્ર"], "ans": 1, "exp": "Y-વર્ણસૂત્રમાં સેક્સ-લિંક્ડ જનીનો હાજર હોય છે, પરંતુ તેની અભાવે કોઈ આનુવંશિક રોગ થતો નથી કારણ કે Y-વર્ણસૂત્ર ફક્ત પુરુષોમાં જ હાજર હોય છે અને તેના જનીનો મહિલાઓમાં હાજર નથી. X-વર્ણસૂત્ર (A) પરના જનીનોના મ્યુટેશનથી હિમોફિલિયા જેવા રોગો થાય છે. 21મું (C) અને 22મું (D) વર્ણસૂત્ર ઓટોસોમલ છે અને તેના મ્યુટેશનથી ડાઉન સિન્ડ્રોમ જેવા રોગો થાય છે.", "ref": "Std 12 - Chapter 5: વંશવેલા અને જનીનિકતા", "ch": ""}, {"q": "માનવમાં કયા અંગમાં રક્ત પરિવહન માટે ધમની અને શિરા બંને હાજર હોય છે, પરંતુ તે અંગમાં રક્તનું શુદ્ધીકરણ થતું નથી?", "opts": ["યકૃત", "મગજ", "ફેફસાં", "વૃક્ક"], "ans": 1, "exp": "મગજમાં ધમની અને શિરા બંને હાજર હોય છે, પરંતુ તે અંગમાં રક્તનું શુદ્ધીકરણ થતું નથી. યકૃત (A)માં રક્તનું શુદ્ધીકરણ થાય છે, ફેફસાં (C)માં રક્તમાં ઓક્સિજનનો સમાવેશ થાય છે, અને વૃક્ક (D)માં રક્તનું ફિલ્ટરેશન થાય છે.", "ref": "Std 12 - Chapter 18: માનવ પરિવહન તંત્ર", "ch": ""}, {"q": "માનવમાં કયા પ્રકારના પ્રતિરક્ષા કોષો એન્ટિજનની ઓળખ કર્યા પછી સૌપ્રથમ સક્રિય થાય છે અને અન્ય પ્રતિરક્ષા કોષોને સક્રિય કરે છે?", "opts": ["B-લસિકા કોષો", "T-હેલ્પર કોષો", "પ્લાઝ્મા કોષો", "મેક્રોફેજ"], "ans": 1, "exp": "T-હેલ્પર કોષો એન્ટિજનની ઓળખ કર્યા પછી સૌપ્રથમ સક્રિય થાય છે અને B-લસિકા કોષો (A), પ્લાઝ્મા કોષો (C), અને મેક્રોફેજ (D) જેવા અન્ય પ્રતિરક્ષા કોષોને સક્રિય કરે છે. આ કોષો પ્રતિરક્ષા પ્રતિભાવમાં કેન્દ્રીય ભૂમિકા ભજવે છે.", "ref": "Std 12 - Chapter 20: માનવ રોગપ્રતિકારક ક્ષમતા", "ch": ""}, {"q": "માનવમાં હૃદયના કયા ચેમ્બરમાં રક્તનું દબાણ સૌથી ઓછું હોય છે અને તે કયા કારણસર થાય છે?", "opts": ["જમણું એટ્રિયમ, કારણ કે તેમાં ડી-ઓક્સિજનેટેડ રક્ત ભરાય છે અને પલ્મોનરી ધમની તરફ વહન થાય છે", "ડાબું એટ્રિયમ, કારણ કે તેમાં ઓક્સિજનયુક્ત રક્ત ભરાય છે અને એઓર્ટા તરફ વહન થાય છે", "જમણું વેન્ટ્રિકલ, કારણ કે તે પલ્મોનરી ધમની દ્વારા રક્તને ફેફસામાં ધકેલે છે", "ડાબું વેન્ટ્રિકલ, કારણ કે તે એઓર્ટા દ્વારા રક્તને શરીરમાં ધકેલે છે"], "ans": 0, "exp": "જમણું એટ્રિયમમાં રક્તનું દબાણ સૌથી ઓછું હોય છે, કારણ કે તે ડી-ઓક્સિજનેટેડ રક્તને પલ્મોનરી ધમની તરફ વહન કરે છે. જમણું એટ્રિયમમાં રક્તનું દબાણ ઓછું હોય છે કારણ કે તે ફેફસામાંથી પરત ફરતું રક્ત સ્વીકારે છે અને પલ્મોનરી ધમની તરફ વહન કરે છે, જે નજીકના અંતરે હોય છે. ડાબું એટ્રિયમ, જમણું વેન્ટ્રિકલ અને ડાબું વેન્ટ્રિકલમાં દબાણ વધુ હોય છે કારણ કે તેઓ રક્તને લાંબા અંતરે ધકેલે છે.", "ref": "Std 12 - Chapter 18: શરીરમાં પરિવહન (Body Fluids and Circulation)", "ch": ""}, {"q": "માનવમાં કયા જનીનનો મ્યુટેશન થલેસિમિયા (Thalassemia) માટે જવાબદાર છે અને તે કયા પ્રકારના હિમોગ્લોબિનની ઉત્પત્તિમાં ખામી પેદા કરે છે?", "opts": ["HBB જનીન, જે β-ગ્લોબિન શૃંખલાની ઉત્પત્તિમાં ખામી પેદા કરે છે", "HBA1 જનીન, જે α-ગ્લોબિન શૃંખલાની ઉત્પત્તિમાં ખામી પેદા કરે છે", "G6PD જનીન, જે ગ્લુકોઝ-6-ફોસ્ફેટ ડિહાઇડ્રોજિનેઝ ઉત્સેચકની ઉત્પત્તિમાં ખામી પેદા કરે છે", "CFTR જનીન, જે ક્લોરાઇડ આયન ચેનલની ઉત્પત્તિમાં ખામી પેદા કરે છે"], "ans": 0, "exp": "થલેસિમિયા માટે HBB જનીન જવાબદાર છે, જે β-ગ્લોબિન શૃંખલાની ઉત્પત્તિમાં ખામી પેદા કરે છે. HBA1 જનીન α-થલેસિમિયા માટે જવાબદાર છે, જ્યારે G6PD જનીન ગ્લુકોઝ-6-ફોસ્ફેટ ડિહાઇડ્રોજિનેઝની ખામી માટે જવાબદાર છે, જે G6PD ડિફિશિયન્સી એનિમિયા પેદા કરે છે. CFTR જનીન સિસ્ટિક ફાઇબ્રોસિસ માટે જવાબદાર છે.", "ref": "Std 12 - Chapter 5: આનુવંશિકતા અને વૈવિધ્યતા (Heredity and Variation)", "ch": ""}, {"q": "માનવમાં કયા અંગમાં લસિકા (લિમ્ફ)નું નિર્માણ થતું નથી, પરંતુ તે લસિકા કોષોનું સંગ્રહ સ્થાન છે?", "opts": ["પ્લીહા (Spleen)", "થાયમસ (Thymus)", "લસિકા ગાંઠો (Lymph Nodes)", "ટોન્સિલ (Tonsils)"], "ans": 0, "exp": "પ્લીહા (Spleen) લસિકા કોષોનું સંગ્રહ સ્થાન છે, પરંતુ તે લસિકાનું નિર્માણ કરતું નથી. થાયમસ, લસિકા ગાંઠો અને ટોન્સિલ લસિકા કોષોનું નિર્માણ અને સંગ્રહ બંને કરે છે. પ્લીહા લોહીના ફિલ્ટરેશન અને જૂના રક્ત કોષોના વિઘટનમાં પણ મહત્વની ભૂમિકા ભજવે છે.", "ref": "Std 12 - Chapter 15: માનવ તંત્ર: પ્રતિરક્ષા વ્યવસ્થા (Human System: Immune System)", "ch": ""}, {"q": "માનવમાં કયા ચેતાતંત્રના ભાગમાં કોષકેન્દ્ર એકથી વધુ હોઈ શકે છે અને તે કયા કામ માટે જવાબદાર છે?", "opts": ["સુષુમ્ના મજ્જા (Spinal Cord) - પ્રતિવર્તી ક્રિયાઓ માટે", "મસ્તિષ્કનો સેરેબ્રલ કોર્ટેક્સ (Cerebral Cortex) - ચિંતન અને સ્મરણશક્તિ માટે", "પુરુષ બીજાણુ કોષ (Sperm Cell) - ગતિશીલતા માટે", "શ્વાન કોષ (Schwann Cell) - માયેલિન શીથનું નિર્માણ માટે"], "ans": 2, "exp": "પુરુષ બીજાણુ કોષ (Sperm Cell)માં કોષકેન્દ્ર એકથી વધુ હોઈ શકે છે, જે ગતિશીલતા અને ફલન ક્ષમતા માટે જવાબદાર છે. સુષુમ્ના મજ્જા, સેરેબ્રલ કોર્ટેક્સ અને શ્વાન કોષમાં કોષકેન્દ્ર એક જ હોય છે. શ્વાન કોષ માયેલિન શીથનું નિર્માણ કરે છે, પરંતુ તેના કોષકેન્દ્રની સંખ્યા એક જ હોય છે.", "ref": "Std 12 - Chapter 21: ચેતાતંત્ર (Nervous System)", "ch": ""}, {"q": "માનવ (Homo sapiens)માં નીચેનામાંથી કયું વિધાન સત્ય છે જ્યારે તેના મગજના વિકાસ અને કૌશલ્ય સાથે સંકળાયેલું હોય?", "opts": ["માનવ મગજમાં સૌથી મોટો ભાગ મેદુલા ઓબ્લોંગેટા હોય છે, જે સ્મૃતિ અને ચિંતન માટે જવાબદાર હોય છે.", "પ્રિફ્રન્ટલ કોર્ટેક્સ માનવમાં નિર્ણય લેવા અને સમાજિક વર્તન માટે મહત્વપૂર્ણ ભૂમિકા ભજવે છે, પરંતુ તેના કદમાં અન્ય પ્રાઇમેટ્સ કરતાં ખૂબ જ ઓછું હોય છે.", "માનવ મગજમાં સેરેબ્રલ કોર્ટેક્સનો વિકાસ અન્ય પ્રાણીઓ કરતાં વધુ ગુંચવણભર્યો હોય છે, જે ભાષા, તર્ક અને સર્જનાત્મકતાને સમર્થન આપે છે.", "હાઇપોથેલામસ માનવમાં સ્મૃતિ અને શીખવાની પ્રક્રિયામાં સીધો ભાગ ભજવતું નથી, પરંતુ તે ફક્ત શારીરિક તાપમાન અને ભૂખને નિયંત્રિત કરે છે."], "ans": 2, "exp": "સી) સેરેબ્રલ કોર્ટેક્સ માનવ મગજનો સૌથી વિકસિત ભાગ છે, જે ભાષા, તર્ક, સર્જનાત્મકતા અને જટિલ ચિંતન માટે જવાબદાર હોય છે. તે અન્ય પ્રાણીઓ કરતાં વધુ ગુંચવણભર્યો અને વિકસિત હોય છે. A) મેદુલા ઓબ્લોંગેટા મગજનો નાનો ભાગ છે અને તે શ્વસન અને હૃદયના દર જેવી અનૈચ્છિક ક્રિયાઓ માટે જવાબદાર હોય છે, સ્મૃતિ અને ચિંતન માટે નહીં. B) પ્રિફ્રન્ટલ કોર્ટેક્સ નિર્ણય લેવા અને સમાજિક વર્તન માટે મહત્વપૂર્ણ છે, પરંતુ તેનું કદ અન્ય પ્રાઇમેટ્સ કરતાં મોટું હોય છે, ઓછું નહીં. D) હાઇપોથેલામસ સ્મૃતિ અને શીખવાની પ્રક્રિયામાં ભાગ ભજવે છે, તેમજ શારીરિક તાપમાન અને ભૂખને નિયંત્રિત કરે છે.", "ref": "Std 12 - Chapter 8: માનવ શરીર અને તેના અંગતંત્રો (Human Body and its Organ Systems)", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
