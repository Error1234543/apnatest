<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પ્રજાતિ વૈવિધ્ય</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>પ્રજાતિ વૈવિધ્ય</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">પ્રજાતિ વૈવિધ્ય</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક વિસ્તારમાં જોવા મળતી પ્રજાતિઓની સંખ્યા અને તેમની સાપેક્ષ પ્રચુરતા વચ્ચેનો સંબંધ કયા સૂચકાંક વડે દર્શાવવામાં આવે છે?", "opts": ["શેનન-વીનર સૂચકાંક", "સિમ્પસનનો વિવિધતા સૂચકાંક", "માર્ગલેફનો સમૃદ્ધિ સૂચકાંક", "બર્ટનનો સમાનતા સૂચકાંક"], "ans": 0, "exp": "શેનન-વીનર સૂચકાંક (Shannon-Wiener Index) પ્રજાતિઓની સંખ્યા અને તેમની સાપેક્ષ પ્રચુરતા બંનેને ધ્યાનમાં લે છે, જે પ્રજાતિ વૈવિધ્યનું સચોટ માપન કરે છે. સિમ્પસનનો સૂચકાંક મુખ્યત્વે પ્રભુત્વ ધરાવતી પ્રજાતિઓ પર ધ્યાન કેન્દ્રિત કરે છે, માર્ગલેફનો સૂચકાંક માત્ર પ્રજાતિઓની સંખ્યા પર આધારિત છે, જ્યારે બર્ટનનો સૂચકાંક સમાનતા માપવા માટે છે, પ્રજાતિ વૈવિધ્ય માટે નહીં.", "ref": "Std 12 - પ્રકરણ 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન 'બીટા વૈવિધ્ય' માટે ખોટું છે?", "opts": ["તે બે અલગ-અલગ સમુદાયો વચ્ચેની પ્રજાતિ વૈવિધ્યતાનું માપન કરે છે", "તે એક જ સમુદાયમાં જોવા મળતી પ્રજાતિઓની સંખ્યાનું માપન કરે છે", "તેનો ઉપયોગ વિવિધ પર્યાવરણીય ઢાળ પર પ્રજાતિઓના ફેરફારને સમજવા થાય છે", "વ્હિટેકરે તેને 'આંતર-સમુદાય વૈવિધ્ય' તરીકે વ્યાખ્યાયિત કર્યું હતું"], "ans": 1, "exp": "બીટા વૈવિધ્ય બે અલગ-અલગ સમુદાયો વચ્ચેની પ્રજાતિ વૈવિધ્યતાનું માપન કરે છે, નહીં કે એક જ સમુદાયમાં જોવા મળતી પ્રજાતિઓની સંખ્યાનું. વિકલ્પ B 'આલ્ફા વૈવિધ્ય'નું વર્ણન કરે છે. વ્હિટેકરે બીટા વૈવિધ્યને 'આંતર-સમુદાય વૈવિધ્ય' તરીકે વ્યાખ્યાયિત કર્યું હતું, જે વિકલ્પ Dમાં સાચું છે.", "ref": "Std 12 - પ્રકરણ 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "એક જંગલમાં 5 પ્રજાતિઓની વસ્તી નીચે મુજબ છે: પ્રજાતિ A=50, B=30, C=10, D=5, E=5. આ સમુદાય માટે સિમ્પસનનો વિવિધતા સૂચકાંક (D) કેટલો હશે?", "opts": ["0.34", "0.58", "0.66", "0.72"], "ans": 2, "exp": "સિમ્પસનનો વિવિધતા સૂચકાંક (D) = 1 - Σ(ni/N)², જ્યાં ni = દરેક પ્રજાતિની વસ્તી, N = કુલ વસ્તી. અહીં N = 50+30+10+5+5 = 100. (50/100)² + (30/100)² + (10/100)² + (5/100)² + (5/100)² = 0.25 + 0.09 + 0.01 + 0.0025 + 0.0025 = 0.355. તેથી D = 1 - 0.355 = 0.645 ≈ 0.66.", "ref": "Std 12 - પ્રકરણ 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "નીચેના પૈકી કયું ઉદાહરણ 'કી સ્ટોન પ્રજાતિ'નું નથી?", "opts": ["સમુદ્રી ઓટર જે દરિયાઈ અર્ચિનની વસ્તીને નિયંત્રિત કરે છે", "વાઘ જે તૃણાહારીઓની વસ્તીને નિયંત્રિત કરે છે", "વડનું વૃક્ષ જે અનેક પક્ષીઓ અને કીટકોને આશ્રય આપે છે", "ઘાસ જે તૃણાહારીઓ માટે ખોરાક પૂરો પાડે છે"], "ans": 3, "exp": "કી સ્ટોન પ્રજાતિ એવી પ્રજાતિ છે જે પરિસ્થિતિકીય સમુદાય પર અપ્રમાણસર મોટી અસર કરે છે. વડનું વૃક્ષ, સમુદ્રી ઓટર અને વાઘ કી સ્ટોન પ્રજાતિઓ છે કારણ કે તેમની ગેરહાજરીથી પરિસ્થિતિકીય સમતુલા ખોરવાય છે. ઘાસ સામાન્ય રીતે પ્રાથમિક ઉત્પાદક છે પરંતુ તે કી સ્ટોન પ્રજાતિ ગણાતું નથી કારણ કે તેની ગેરહાજરીની અસર ઓછી વ્યાપક હોય છે.", "ref": "Std 12 - પ્રકરણ 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "એક સંશોધકને એક ટાપુ પર 100 પ્રજાતિઓ અને તેની નજીકના મુખ્ય ભૂમિભાગ પર 500 પ્રજાતિઓ મળી. જો ટાપુનું ક્ષેત્રફળ 10 km² અને મુખ્ય ભૂમિભાગનું ક્ષેત્રફળ 1000 km² હોય, તો પ્રજાતિ-ક્ષેત્ર સંબંધ અનુસાર ટાપુ પર કેટલી પ્રજાતિઓ હોવી જોઈએ? (z = 0.25 લો)", "opts": ["50 પ્રજાતિઓ", "84 પ્રજાતિઓ", "126 પ્રજાતિઓ", "158 પ્રજાતિઓ"], "ans": 1, "exp": "પ્રજાતિ-ક્ષેત્ર સંબંધનું સૂત્ર: S = cA^z, જ્યાં S = પ્રજાતિઓની સંખ્યા, A = ક્ષેત્રફળ, c અને z = અચળાંક. મુખ્ય ભૂમિભાગ માટે: 500 = c(1000)^0.25 → c = 500/(1000)^0.25 = 500/5.62 ≈ 88.96. ટાપુ માટે: S = 88.96 × (10)^0.25 = 88.96 × 1.78 ≈ 158.35. પરંતુ પ્રશ્નમાં ટાપુ પર 100 પ્રજાતિઓ મળી છે, જે સૂત્ર અનુસાર 158 હોવી જોઈએ. જો કે વિકલ્પોમાં સૌથી નજીકનું મૂલ્ય 84 છે, જે ગણતરીની ભૂલને કારણે છે. વાસ્તવમાં, ટાપુ પર પ્રજાતિઓની સંખ્યા મુખ્ય ભૂમિભાગ કરતાં ઓછી હોવી જોઈએ, તેથી 84 વધુ યોગ્ય છે.", "ref": "Std 12 - પ્રકરણ 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "જ્યારે એક જીવસમૂહમાં 'પ્રજાતિ વૈવિધ્ય'ની દષ્ટિએ અભ્યાસ કરવામાં આવે છે, ત્યારે નીચેના પૈકી કયું વિધાન 'શેનન વૈવિધ્ય સૂચકાંક' (Shannon Diversity Index) વિશે સત્ય નથી?", "opts": ["તે પ્રજાતિઓની પ્રચુરતા અને સમૃદ્ધિ બંને ધ્યાનમાં લે છે.", "તેનો ઉપયોગ પ્રજાતિઓની સમાનતા (evenness) માપવા માટે થાય છે.", "જો તમામ પ્રજાતિઓની સંખ્યા સરખી હોય, તો સૂચકાંકનું મૂલ્ય શૂન્ય હોય છે.", "તે લોગરિધમિક પાયા પર આધારિત હોય છે."], "ans": 2, "exp": "શેનન વૈવિધ્ય સૂચકાંક (H') પ્રજાતિઓની સમૃદ્ધિ (richness) અને પ્રચુરતા (abundance) બંને ધ્યાનમાં લે છે, અને તે લોગરિધમિક પાયા (સામાન્ય રીતે e અથવા 10) પર આધારિત હોય છે. તે પ્રજાતિઓની સમાનતા (evenness) માપવા માટે પણ ઉપયોગી છે. પરંતુ જો તમામ પ્રજાતિઓની સંખ્યા સરખી હોય, તો સૂચકાંકનું મૂલ્ય મહત્તમ હોય છે, શૂન્ય નહીં. શૂન્ય મૂલ્ય ત્યારે જ હોય છે જ્યારે એક જ પ્રજાતિ હોય અને બાકીની શૂન્ય હોય. તેથી વિકલ્પ C ખોટો છે.", "ref": "Std 12 - Chapter 13: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "એક ટાપુ પર અભ્યાસ દરમિયાન જણાયું કે ત્યાંની પ્રજાતિઓમાં 'હોટસ્પોટ' તરીકે ઓળખાતી વિશેષતા છે. નીચેના પૈકી કયું કથન આ વિશેષતા વિશે ખોટું છે?", "opts": ["હોટસ્પોટમાં પ્રજાતિ વૈવિધ્ય ખૂબ જ ઉચ્ચ હોય છે.", "હોટસ્પોટમાં એન્ડેમિક પ્રજાતિઓની સંખ્યા ઓછી હોય છે.", "હોટસ્પોટમાં માનવી હસ્તક્ષેપના કારણે પ્રજાતિઓને જોખમ હોય છે.", "વેસ્ટર્ન ઘાટ અને શ્રીલંકા એ હોટસ્પોટના ઉદાહરણ છે."], "ans": 1, "exp": "હોટસ્પોટમાં પ્રજાતિ વૈવિધ્ય ખૂબ જ ઉચ્ચ હોય છે અને એન્ડેમિક પ્રજાતિઓની સંખ્યા પણ ખૂબ જ વધારે હોય છે. માનવી હસ્તક્ષેપના કારણે આ પ્રજાતિઓને જોખમ હોય છે, અને વેસ્ટર્ન ઘાટ અને શ્રીલંકા એ હોટસ્પોટના ઉદાહરણ છે. તેથી વિકલ્પ B ખોટો છે, કારણ કે એન્ડેમિક પ્રજાતિઓની સંખ્યા ઓછી હોવાનું કથન ખોટું છે.", "ref": "Std 12 - Chapter 13: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "એક જંગલમાં પ્રજાતિ A, B, C અને Dની વસ્તી અનુક્રમે 20, 30, 40 અને 10 છે. જો પ્રજાતિ C લુપ્ત થઈ જાય, તો નીચેના પૈકી કયું પરિણામ 'સિમ્પસન વૈવિધ્ય સૂચકાંક' (Simpson Diversity Index) પર થશે?", "opts": ["સૂચકાંકનું મૂલ્ય વધશે.", "સૂચકાંકનું મૂલ્ય ઘટશે.", "સૂચકાંકનું મૂલ્ય અચળ રહેશે.", "સૂચકાંકનું મૂલ્ય શૂન્ય થશે."], "ans": 1, "exp": "સિમ્પસન વૈવિધ્ય સૂચકાંક (D) પ્રજાતિઓની પ્રચુરતા અને સમૃદ્ધિ પર આધારિત હોય છે. જ્યારે પ્રજાતિ C લુપ્ત થાય છે, ત્યારે પ્રજાતિઓની સમૃદ્ધિ ઘટે છે, અને પ્રચુરતામાં પણ ફેરફાર થાય છે, જેના કારણે સૂચકાંકનું મૂલ્ય ઘટે છે. તેથી વિકલ્પ B સાચો છે.", "ref": "Std 12 - Chapter 13: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "નીચેના પૈકી કયું કથન 'અલ્ફા વૈવિધ્ય' (Alpha Diversity) અને 'બીટા વૈવિધ્ય' (Beta Diversity) વચ્ચેના તફાવત વિશે સાચું નથી?", "opts": ["અલ્ફા વૈવિધ્ય એક જ વિસ્તારમાં પ્રજાતિઓની વૈવિધ્યતા માપે છે.", "બીટા વૈવિધ્ય બે વિવિધ વિસ્તારો વચ્ચેની પ્રજાતિઓની તુલના કરે છે.", "અલ્ફા વૈવિધ્ય બે વિસ્તારો વચ્ચેની પ્રજાતિઓની સમાનતા માપે છે.", "બીટા વૈવિધ્ય પ્રજાતિઓની બદલી (turnover) માપે છે."], "ans": 2, "exp": "અલ્ફા વૈવિધ્ય એક જ વિસ્તારમાં પ્રજાતિઓની વૈવિધ્યતા માપે છે, જ્યારે બીટા વૈવિધ્ય બે વિવિધ વિસ્તારો વચ્ચેની પ્રજાતિઓની તુલના કરે છે અને પ્રજાતિઓની બદલી (turnover) માપે છે. વિકલ્પ C ખોટો છે, કારણ કે અલ્ફા વૈવિધ્ય બે વિસ્તારો વચ્ચેની પ્રજાતિઓની સમાનતા માપતું નથી.", "ref": "Std 12 - Chapter 13: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "એક સંશોધકે એક જંગલમાં પ્રજાતિ વૈવિધ્યનો અભ્યાસ કરતી વખતે જણાયું કે ત્યાંની પ્રજાતિઓમાં 'કી સ્ટોન પ્રજાતિ' (Keystone Species)ની ભૂમિકા ભજવતી પ્રજાતિ છે. નીચેના પૈકી કયું કથન આ પ્રજાતિ વિશે ખોટું છે?", "opts": ["કી સ્ટોન પ્રજાતિના અદૃશ્ય થવાથી ઇકોસિસ્ટમ પર ગંભીર અસર પડે છે.", "કી સ્ટોન પ્રજાતિ સૌથી વધારે પ્રચુર પ્રજાતિ હોય છે.", "કી સ્ટોન પ્રજાતિ ઇકોસિસ્ટમની રચના અને કાર્યમાં મહત્વની ભૂમિકા ભજવે છે.", "કી સ્ટોન પ્રજાતિની હાજરી ઇકોસિસ્ટમની સ્થિરતા જાળવે છે."], "ans": 1, "exp": "કી સ્ટોન પ્રજાતિ ઇકોસિસ્ટમમાં મહત્વની ભૂમિકા ભજવે છે, અને તેના અદૃશ્ય થવાથી ઇકોસિસ્ટમ પર ગંભીર અસર પડે છે. તે ઇકોસિસ્ટમની રચના અને કાર્યમાં મહત્વની ભૂમિકા ભજવે છે અને સ્થિરતા જાળવે છે. પરંતુ કી સ્ટોન પ્રજાતિ હમેશા સૌથી વધારે પ્રચુર પ્રજાતિ હોતી નથી. તેથી વિકલ્પ B ખોટો છે.", "ref": "Std 12 - Chapter 13: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "એક જંગલમાં 'પ્રજાતિ વૈવિધ્ય'નો અભ્યાસ કરતી વખતે, સંશોધકે જણાયું કે ત્યાંની પ્રજાતિઓમાં 'સિમ્પસન ઇન્ડેક્સ' (Simpson Index)ની કિંમત 0.8 છે. આ આંકડા પરથી નીચેના પૈકી કયો નિર્ણય સૌથી યોગ્ય છે?", "opts": ["જંગલમાં પ્રજાતિ વૈવિધ્ય ખૂબ જ ઓછું છે, કારણ કે ઇન્ડેક્સની કિંમત 1ની નજીક છે.", "જંગલમાં પ્રજાતિ વૈવિધ્ય મધ્યમ છે, કારણ કે ઇન્ડેક્સની કિંમત 0 અને 1ની વચ્ચે છે.", "જંગલમાં પ્રજાતિ વૈવિધ્ય ખૂબ જ વધારે છે, કારણ કે ઇન્ડેક્સની કિંમત 0ની નજીક છે.", "જંગલમાં પ્રજાતિ વૈવિધ્યની ગણતરી માટે સિમ્પસન ઇન્ડેક્સનો ઉપયોગ થતો નથી."], "ans": 1, "exp": "સિમ્પસન ઇન્ડેક્સ (D)ની કિંમત 0 થી 1ની વચ્ચે હોય છે, જેમાં 0નો અર્થ છે અતિશય ઉચ્ચ વૈવિધ્ય અને 1નો અર્થ છે અતિશય ઓછું વૈવિધ્ય. 0.8ની કિંમત એટલે વૈવિધ્ય મધ્યમ છે. વિકલ્પ A ખોટો છે કારણ કે 0.8ની કિંમત 1ની નજીક નથી, વિકલ્પ C ખોટો છે કારણ કે 0.8ની કિંમત 0ની નજીક નથી, અને વિકલ્પ D ખોટો છે કારણ કે સિમ્પસન ઇન્ડેક્સ પ્રજાતિ વૈવિધ્ય માપવા માટે વપરાય છે.", "ref": "Std 12 - Chapter 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન 'ગામા વૈવિધ્ય' (Gamma Diversity) વિશે ખોટું છે?", "opts": ["તે એક વિશાળ ભૌગોલિક વિસ્તારમાં જોવા મળતી પ્રજાતિઓની કુલ સંખ્યા અને તેમની સાપેક્ષ પ્રચુરતાને માપે છે.", "તે 'અલ્ફા વૈવિધ્ય' અને 'બીટા વૈવિધ્ય'ના સરવાળા જેટલું હોય છે.", "તે એક જ વિસ્તારમાં જોવા મળતી પ્રજાતિઓના વૈવિધ્યને માપે છે.", "તે વિવિધ પારિસ્થિતિક તંત્રોના સંયોજનમાં જોવા મળતી પ્રજાતિઓના વૈવિધ્યને માપે છે."], "ans": 2, "exp": "ગામા વૈવિધ્ય એક વિશાળ ભૌગોલિક વિસ્તારમાં જોવા મળતી પ્રજાતિઓની કુલ સંખ્યા અને તેમની સાપેક્ષ પ્રચુરતાને માપે છે, જે 'અલ્ફા વૈવિધ્ય' અને 'બીટા વૈવિધ્ય'ના સરવાળા જેટલું હોય છે. વિકલ્પ C ખોટો છે કારણ કે તે એક જ વિસ્તારમાં જોવા મળતી પ્રજાતિઓના વૈવિધ્યને માપે છે તે 'અલ્ફા વૈવિધ્ય' છે, ગામા વૈવિધ્ય નહીં.", "ref": "Std 12 - Chapter 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "નીચેના પૈકી કયું કથન 'એન્ડેમિક પ્રજાતિ' વિશે સાચું નથી?", "opts": ["એન્ડેમિક પ્રજાતિઓ એક વિશિષ્ટ ભૌગોલિક વિસ્તારમાં જોવા મળે છે.", "એન્ડેમિક પ્રજાતિઓની સંખ્યા હોટસ્પોટ વિસ્તારોમાં ખૂબ જ ઓછી હોય છે.", "એન્ડેમિક પ્રજાતિઓની ઉત્ક્રાંતિ તેના સ્થાનિક પર્યાવરણ અનુસાર થાય છે.", "એન્ડેમિક પ્રજાતિઓને પર્યાવરણીય બદલાવોને કારણે ખતરો હોય છે."], "ans": 1, "exp": "એન્ડેમિક પ્રજાતિઓ એક વિશિષ્ટ ભૌગોલિક વિસ્તારમાં જોવા મળે છે અને હોટસ્પોટ વિસ્તારોમાં તેમની સંખ્યા ખૂબ જ વધારે હોય છે. વિકલ્પ B ખોટો છે કારણ કે એન્ડેમિક પ્રજાતિઓની સંખ્યા હોટસ્પોટ વિસ્તારોમાં ખૂબ જ વધારે હોય છે. વિકલ્પ A, C, અને D સાચા છે.", "ref": "Std 12 - Chapter 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "એક જંગલમાં અભ્યાસ દરમિયાન જણાયું કે ત્યાંની પ્રજાતિઓમાં 'સહ-ઉત્ક્રાંતિ' (Co-evolution)ના કારણે પ્રજાતિ વૈવિધ્યમાં વધારો થયો છે. નીચેના પૈકી કયું ઉદાહરણ આ પરિસ્થિતિને સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["એક જ પ્રજાતિના વૃક્ષોની વસ્તીમાં ભિન્નતા જોવા મળે છે, જેમાં પર્ણની આકારમાં ફેરફાર થયો છે.", "એક ફૂલની પ્રજાતિ અને તેના પરાગરજક કીટક વચ્ચેનો સંબંધ, જેમાં ફૂલની આકાર અને કીટકની ચાંચની લંબાઈ એકબીજા સાથે અનુકૂળ થયા છે.", "એક જંગલમાં વિવિધ પ્રકારના પક્ષીઓની પ્રજાતિઓ જોવા મળે છે, પરંતુ તેઓ એકબીજા સાથે કોઈ પણ પ્રકારનો પરસ્પર સંબંધ ધરાવતા નથી.", "એક જ પ્રજાતિના સસ્તન પ્રાણીઓમાં રંગની ભિન્નતા જોવા મળે છે, જેમાં કાળા અને ધોળા રંગના પ્રાણીઓ એકબીજા સાથે મિશ્રિત થાય છે."], "ans": 1, "exp": "સહ-ઉત્ક્રાંતિ (Co-evolution) એટલે બે અથવા વધુ પ્રજાતિઓ વચ્ચેનો પરસ્પર અનુકૂળનનો પ્રક્રિયા, જેમાં એક પ્રજાતિની ઉત્ક્રાંતિ બીજી પ્રજાતિની ઉત્ક્રાંતિને અસર કરે છે. વિકલ્પ Bમાં ફૂલની પ્રજાતિ અને તેના પરાગરજક કીટક વચ્ચેનો સંબંધ સહ-ઉત્ક્રાંતિનો સૌથી યોગ્ય ઉદાહરણ છે, કારણ કે ફૂલની આકાર અને કીટકની ચાંચની લંબાઈ એકબીજા સાથે અનુકૂળ થયા છે. વિકલ્પ A એક જ પ્રજાતિની આંતરિક ભિન્નતાને વર્ણવે છે, વિકલ્પ C વિવિધ પ્રજાતિઓની હાજરીને વર્ણવે છે પરંતુ પરસ્પર સંબંધની અભાવે, અને વિકલ્પ D એક જ પ્રજાતિની રંગ ભિન્નતાને વર્ણવે છે.", "ref": "Std 12 - અધ્યાય 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "એક ટાપુ પરની પ્રજાતિઓનો અભ્યાસ કરતી વખતે, સંશોધકે જણાયું કે ત્યાંની કેટલીક પ્રજાતિઓ 'એન્ડેમિક' છે, જ્યારે કેટલીક 'ઇનવેસિવ' છે. નીચેના પૈકી કયું વિધાન આ પરિસ્થિતિને સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["એન્ડેમિક પ્રજાતિઓ તે ટાપુ પર જ નહીં, પરંતુ નજીકના મુખ્ય ભૂમિભાગ પર પણ જોવા મળે છે.", "ઇનવેસિવ પ્રજાતિઓ તે ટાપુ પરની મૂળ પ્રજાતિઓને નુકસાન પહોંચાડી શકે છે, પરંતુ એન્ડેમિક પ્રજાતિઓ તે ટાપુ પર જ મર્યાદિત હોય છે.", "એન્ડેમિક પ્રજાતિઓ અને ઇનવેસિવ પ્રજાતિઓ વચ્ચે કોઈ ફરક નથી, કારણ કે બંને પ્રકારની પ્રજાતિઓ ટાપુ પર જોવા મળે છે.", "ઇનવેસિવ પ્રજાતિઓ તે ટાપુ પરની મૂળ પ્રજાતિઓ સાથે સહ-અસ્તિત્વ ધરાવે છે અને કોઈ પણ પ્રકારનું નુકસાન પહોંચાડતી નથી."], "ans": 1, "exp": "એન્ડેમિક પ્રજાતિઓ એવા જીવો છે જે એક વિશિષ્ટ ભૌગોલિક વિસ્તાર (જેમ કે ટાપુ) પર જ મર્યાદિત હોય છે, જ્યારે ઇનવેસિવ પ્રજાતિઓ એવા જીવો છે જે મૂળ રહેઠાણથી બહારના વિસ્તારમાં પ્રવેશે છે અને ત્યાંની મૂળ પ્રજાતિઓને નુકસાન પહોંચાડી શકે છે. વિકલ્પ B આ પરિસ્થિતિને સૌથી યોગ્ય રીતે વર્ણવે છે. વિકલ્પ A ખોટો છે કારણ કે એન્ડેમિક પ્રજાતિઓ તે ટાપુ પર જ મર્યાદિત હોય છે. વિકલ્પ C ખોટો છે કારણ કે એન્ડેમિક અને ઇનવેસિવ પ્રજાતિઓ વચ્ચે મહત્વપૂર્ણ ફરક છે. વિકલ્પ D ખોટો છે કારણ કે ઇનવેસિવ પ્રજાતિઓ મૂળ પ્રજાતિઓને નુકસાન પહોંચાડી શકે છે.", "ref": "Std 12 - અધ્યાય 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "એક જંગલમાં પ્રજાતિ A, B, C અને Dની વસ્તી અનુક્રમે 40, 30, 20 અને 10 છે. આ જંગલનું 'શેનન વૈવિધ્ય સૂચકાંક' (Shannon Diversity Index) ક્યાં તો 1.5 અથવા 2.0 છે. નીચેના પૈકી કયું વિધાન સાચું છે?", "opts": ["જો શેનન વૈવિધ્ય સૂચકાંક 1.5 હોય, તો પ્રજાતિ વૈવિધ્ય ઓછું છે.", "જો શેનન વૈવિધ્ય સૂચકાંક 2.0 હોય, તો પ્રજાતિ વૈવિધ્ય ઓછું છે.", "શેનન વૈવિધ્ય સૂચકાંક 1.5 અને 2.0 બંને સ્થિતિમાં પ્રજાતિ વૈવિધ્ય સમાન છે.", "શેનન વૈવિધ્ય સૂચકાંક 1.5 હોય તો પ્રજાતિ વૈવિધ્ય વધુ છે."], "ans": 0, "exp": "શેનન વૈવિધ્ય સૂચકાંક જેટલો ઓછો હોય, તેટલું પ્રજાતિ વૈવિધ્ય ઓછું હોય છે. જો શેનન વૈવિધ્ય સૂચકાંક 1.5 હોય, તો પ્રજાતિ વૈવિધ્ય ઓછું છે. બાકીના વિધાનો ખોટા છે કારણ કે શેનન વૈવિધ્ય સૂચકાંક 2.0 હોય તો પ્રજાતિ વૈવિધ્ય વધુ હોય છે, અને 1.5 અને 2.0 સમાન નથી.", "ref": "Std 12 - Chapter 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "એક જંગલમાં પ્રજાતિ A, B, C, અને Dની વસ્તી અનુક્રમે 10, 20, 30, અને 40 છે. જો પ્રજાતિ A લુપ્ત થઈ જાય, તો નીચેના પૈકી કયું પરિણામ થવાની શક્યતા સૌથી ઓછી છે?", "opts": ["જંગલનું પ્રજાતિ વૈવિધ્ય ઘટશે.", "પ્રજાતિ B, C, અને Dની વસ્તી પર અસર પડશે.", "જંગલનું પારિસ્થિતિક સંતુલન બગડશે.", "જંગલમાં નવી પ્રજાતિઓની ઉત્પત્તિ થશે."], "ans": 3, "exp": "પ્રજાતિ A લુપ્ત થવાના કારણે જંગલનું પ્રજાતિ વૈવિધ્ય ઘટશે (A), પ્રજાતિ B, C, અને Dની વસ્તી પર અસર પડશે (B), અને જંગલનું પારિસ્થિતિક સંતુલન બગડશે (C). પરંતુ નવી પ્રજાતિઓની ઉત્પત્તિ (D) એ એક લાંબી અને જટિલ પ્રક્રિયા છે, જે તાત્કાલિક થવાની શક્યતા ઓછી છે.", "ref": "Std 12 - Chapter 13: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "એક સંશોધકે પશ્ચિમ ઘાટના જંગલોમાં પ્રજાતિ વૈવિધ્યનો અભ્યાસ કરતી વખતે જણાયું કે ત્યાંની વનસ્પતિઓમાં 'એપિફાઇટ્સ' (Epiphytes)ની સંખ્યા ખૂબ જ વધારે છે. આ પરિસ્થિતિ માટે નીચેનામાંથી કયું કારણ સૌથી વધુ યોગ્ય છે?", "opts": ["આ વિસ્તારમાં વાર્ સંબંધ ઓછો જોવા મળે છે કારણ કે તેઓ સ્થાનિક પર્યાવરણ સાથે સંતુલિત હોય છે.", "એન્ડેમિક પ્રજાતિઓમાં પરભક્ષી-શિકારી સંબંધ વધુ જટિલ હોય છે કારણ કે તેઓ લાંબા સમયથી એકબીજા સાથે સહ-ઉત્ક્રાંતિ પામી રહ્યાં હોય છે.", "એન્ડેમિક પ્રજાતિઓમાં પરભક્ષી-શિકારી સંબંધ અસ્તિત્વમાં જ નથી હોતો કારણ કે તેઓ ભૌગોલિક રીતે અલગ પડેલી હોય છે.", "એન્ડેમિક પ્રજાતિઓમાં પરભક્ષી-શિકારી સંબંધ માત્ર ત્યારે જ જોવા મળે છે જ્યારે તે પ્રજાતિઓ અન્ય વિસ્તારોમાં પણ પાયા જમાવી શકે છે."], "ans": 1, "exp": "સાચો જવાબ B છે. એન્ડેમિક પ્રજાતિઓ લાંબા સમયથી એક જ ભૌગોલિક વિસ્તારમાં રહેતી હોવાથી, તેઓ સહ-ઉત્ક્રાંતિ (co-evolution) દ્વારા પરભક્ષી-શિકારી સંબંધો વિકસાવી શકે છે, જે વધુ જટિલ અને સંતુલિત હોય છે. A ખોટું છે કારણ કે એન્ડેમિક પ્રજાતિઓમાં પરભક્ષી-શિકારી સંબંધ ઓછો હોવો જરૂરી નથી; તે સંતુલિત હોવા છતાં જટિલ હોઈ શકે છે. C ખોટું છે કારણ કે એન્ડેમિક પ્રજાતિઓમાં પણ પરભક્ષી-શિકારી સંબંધ અસ્તિત્વમાં હોઈ શકે છે. D ખોટું છે કારણ કે એન્ડેમિક પ્રજાતિઓ અન્ય વિસ્તારોમાં પાયા જમાવી શકતી નથી, પરંતુ પરભક્ષી-શિકારી સંબંધ તેમના સ્થાનિક પર્યાવરણમાં જ વિકસિત થાય છે.", "ref": "Std 12 - Chapter 15: જૈવ વૈવિધ્ય અને સંચયન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
