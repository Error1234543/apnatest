<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genetic Code</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Genetic Code</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Genetic Code</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "જનીન કોડના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["કોડનોન-ઓવરલેપિંગ હોવા છતાં, કેટલાક જનીનોમાં ઓવરલેપિંગ વાંચન ફ્રેમ જોવા મળે છે.", "કોડ સાર્વત્રિક છે, પરંતુ માઇટોકોન્ડ્રિયલ DNAમાં અપવાદરૂપે ભિન્ન કોડ વપરાય છે.", "કોડમાં સ્ટોપ કોડોન UAA, UAG, અને UGA એ પ્રોટીન સંશ્લેષણમાં સક્રિય ભૂમિકા ભજવે છે.", "કોડ ડિજનરેટ નથી, કારણ કે પ્રત્યેક એમિનો એસિડ માટે ફક્ત એક જ કોડોન અસ્તિત્વ ધરાવે છે."], "ans": 1, "exp": "કોડ સાર્વત્રિક છે, પરંતુ માઇટોકોન્ડ્રિયલ DNAમાં અપવાદરૂપે ભિન્ન કોડ વપરાય છે. આ વિધાન સત્ય છે કારણ કે માઇટોકોન્ડ્રિયામાં UGA કોડોન ટ્રિપ્ટોફેન માટે કોડ કરે છે, જ્યારે સાયટોપ્લાઝમિક રાઇબોઝોમમાં તે સ્ટોપ કોડોન છે. A) ખોટું છે કારણ કે કોડનોન-ઓવરલેપિંગ છે અને ઓવરલેપિંગ વાંચન ફ્રેમ જનીનોમાં જોવા મળતું નથી. C) ખોટું છે કારણ કે સ્ટોપ કોડોન પ્રોટીન સંશ્લેષણને અટકાવે છે, સક્રિય ભૂમિકા ભજવતું નથી. D) ખોટું છે કારણ કે કોડ ડિજનરેટ છે, એટલે કે એક એમિનો એસિડ માટે બહુવિધ કોડોન હોવાનું સૂચવે છે.", "ref": "Std 12 - અધ્યાય 6: જનીન અને જનીન કોડ", "ch": ""}, {"q": "જનીન કોડના ગુણધર્મો પૈકી કયું એક અપવાદરૂપ છે?", "opts": ["કોડનોન-ઓવરલેપિંગ છે.", "કોડ સાર્વત્રિક છે.", "કોડ કોમા-લેસ છે.", "કોડમાં UGA કોડોન હંમેશા સ્ટોપ કોડોન તરીકે વર્તે છે."], "ans": 3, "exp": "UGA કોડોન માઇટોકોન્ડ્રિયામાં ટ્રિપ્ટોફેન માટે કોડ કરે છે, જ્યારે સાયટોપ્લાઝમિક રાઇબોઝોમમાં તે સ્ટોપ કોડોન છે. આમ, D) ખોટું છે અને અપવાદરૂપ છે. A), B), અને C) કોડના સાર્વત્રિક ગુણધર્મો છે.", "ref": "Std 12 - અધ્યાય 6: જનીન અને જનીન કોડ", "ch": ""}, {"q": "નીચેનામાંથી કયું કોડોન એમિનો એસિડ માટે કોડ કરતું નથી?", "opts": ["UUU", "UGA", "AUG", "GGU"], "ans": 1, "exp": "UGA એક સ્ટોપ કોડોન છે, જે પ્રોટીન સંશ્લેષણને અટકાવે છે. UUU ફિનાઇલએલેનિન, AUG મિથાયોનિન (પ્રારંભ કોડોન), અને GGU ગ્લાઇસિન માટે કોડ કરે છે.", "ref": "Std 12 - અધ્યાય 6: જનીન અને જનીન કોડ", "ch": ""}, {"q": "જનીન કોડના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["કોડ ડિજનરેટ છે, એટલે કે એક એમિનો એસિડ માટે બહુવિધ કોડોન હોવાનું સૂચવે છે.", "કોડનોન-ઓવરલેપિંગ છે, એટલે કે એક જ ન્યુક્લિયોટાઇડ બે ભિન્ન એમિનો એસિડ માટે કોડ કરતું નથી.", "કોડ કોમા-લેસ છે, એટલે કે કોડમાં કોઈ પાછળની અથવા આગળની નિશાનીઓ નથી.", "કોડ સાર્વત્રિક છે, એટલે કે તમામ જીવોમાં એકસરખો છે."], "ans": 3, "exp": "કોડ સાર્વત્રિક છે, પરંતુ માઇટોકોન્ડ્રિયલ DNAમાં અપવાદરૂપે ભિન્ન કોડ વપરાય છે. આમ, D) ખોટું છે. A), B), અને C) કોડના સાર્વત્રિક ગુણધર્મો છે.", "ref": "Std 12 - અધ્યાય 6: જનીન અને જનીન કોડ", "ch": ""}, {"q": "નીચેનામાંથી કયું કોડોન મિથાયોનિન માટે કોડ કરે છે અને પ્રારંભ કોડોન તરીકે પણ કામ કરે છે?", "opts": ["UAA", "UAG", "AUG", "UGA"], "ans": 2, "exp": "AUG કોડોન મિથાયોનિન માટે કોડ કરે છે અને પ્રારંભ કોડોન તરીકે પણ કામ કરે છે. UAA અને UAG સ્ટોપ કોડોન છે, જ્યારે UGA પણ સ્ટોપ કોડોન છે, પરંતુ માઇટોકોન્ડ્રિયામાં તે ટ્રિપ્ટોફેન માટે કોડ કરે છે.", "ref": "Std 12 - અધ્યાય 6: જનીન અને જનીન કોડ", "ch": ""}, {"q": "જનીન કોડની વ્યાખ્યા અંગે નીચેનામાંથી કયું વિધાન સંપૂર્ણ સચોટ છે?", "opts": ["તે DNA પરના ન્યુક્લિયોટાઇડના ક્રમ છે જે RNAમાં ઉત્પન્ન થાય છે.", "તે mRNA પરના ત્રણ ન્યુક્લિયોટાઇડના ક્રમ છે જે એક એમિનો એસિડ માટે કોડ કરે છે.", "તે tRNA પરના એન્ટિકોડોન છે જે mRNA સાથે જોડાય છે.", "તે rRNA પરના ન્યુક્લિયોટાઇડનો ક્રમ છે જે પ્રોટીન સંશ્લેષણમાં મદદ કરે છે."], "ans": 1, "exp": "જનીન કોડ mRNA પરના ત્રણ ન્યુક્લિયોટાઇડના ક્રમ (કોડોન) દ્વારા વ્યાખ્યાયિત થાય છે જે એક એમિનો એસિડ માટે કોડ કરે છે. A) ખોટું છે કારણ કે જનીન કોડ DNA પર નહીં પણ mRNA પર આધારિત છે. C) ખોટું છે કારણ કે એન્ટિકોડોન tRNA પર હોય છે, જનીન કોડ નહીં. D) ખોટું છે કારણ કે rRNA પ્રોટીન સંશ્લેષણમાં ભૂમિકા ભજવે છે પરંતુ જનીન કોડ નહીં.", "ref": "Std 12 - અધ્યાય 6: જૈવ-અણુઓ અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "જનીન કોડના સંદર્ભમાં, નીચેનામાંથી કયું કોડોન 'નિર્ધારિત કોડોન' (Non-sense codon) તરીકે ઓળખાય છે?", "opts": ["UAA", "AUG", "UGG", "GUG"], "ans": 0, "exp": "UAA એ નિર્ધારિત કોડોન (Non-sense codon) છે જે પ્રોટીન સંશ્લેષણના અંતને સૂચવે છે. AUG પ્રારંભ કોડોન છે, UGG ટ્રિપ્ટોફેન માટે કોડ કરે છે, અને GUG વેલિન માટે કોડ કરે છે.", "ref": "Std 12 - અધ્યાય 6: જૈવ-અણુઓ અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "જનીન કોડની 'વિશિષ્ટતા' (Specificity) ના ગુણધર્મ અંગે નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["એક જ કોડોન વિવિધ એમિનો એસિડ માટે કોડ કરે છે.", "એક એમિનો એસિડ માટે એક જ કોડોન હોય છે.", "એક કોડોન ફક્ત એક જ એમિનો એસિડ માટે કોડ કરે છે.", "વિવિધ કોડોન એક જ એમિનો એસિડ માટે કોડ કરે છે."], "ans": 2, "exp": "જનીન કોડની વિશિષ્ટતા એટલે કે એક કોડોન ફક્ત એક જ એમિનો એસિડ માટે કોડ કરે છે. A) ખોટું છે કારણ કે એક કોડોન ફક્ત એક જ એમિનો એસિડ માટે કોડ કરે છે. B) ખોટું છે કારણ કે એક એમિનો એસિડ માટે એકથી વધુ કોડોન હોઈ શકે છે (ડિજનરસી). D) ખોટું છે કારણ કે તે ડિજનરસીનો ગુણધર્મ છે, વિશિષ્ટતા નહીં.", "ref": "Std 12 - અધ્યાય 6: જૈવ-અણુઓ અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "જનીન કોડના 'યુનિવર્સલિટી' (Universality) ગુણધર્મ અંગે નીચેનામાંથી કયું વિધાન અપવાદરૂપ છે?", "opts": ["મોટાભાગના જીવોમાં એક જ કોડોન એક જ એમિનો એસિડ માટે કોડ કરે છે.", "માઇટોકોન્ડ્રિયામાં જનીન કોડ ભિન્ન હોઈ શકે છે.", "બેક્ટેરિયા અને યુકેરિયોટ્સમાં જનીન કોડ સમાન હોય છે.", "વાઇરસમાં જનીન કોડ સંપૂર્ણપણે ભિન્ન હોય છે."], "ans": 1, "exp": "જનીન કોડની યુનિવર્સલિટીનો અપવાદ માઇટોકોન્ડ્રિયામાં જોવા મળે છે, જ્યાં જનીન કોડ ભિન્ન હોઈ શકે છે. A) સત્ય છે કારણ કે મોટાભાગના જીવોમાં જનીન કોડ યુનિવર્સલ છે. C) સત્ય છે કારણ કે બેક્ટેરિયા અને યુકેરિયોટ્સમાં જનીન કોડ સમાન હોય છે. D) ખોટું છે કારણ કે વાઇરસમાં જનીન કોડ સંપૂર્ણપણે ભિન્ન નથી હોતું.", "ref": "Std 12 - અધ્યાય 6: જૈવ-અણુઓ અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "જનીન કોડના 'ડિજનરસી' (Degeneracy) ગુણધર્મ અંગે નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["એક એમિનો એસિડ માટે ફક્ત એક જ કોડોન હોય છે.", "એક કોડોન વિવિધ એમિનો એસિડ માટે કોડ કરે છે.", "એક એમિનો એસિડ માટે એકથી વધુ કોડોન હોઈ શકે છે.", "કોડોન અને એમિનો એસિડ વચ્ચે એક-એક સંબંધ હોય છે."], "ans": 2, "exp": "ડિજનરસીનો અર્થ એ છે કે એક એમિનો એસિડ માટે એકથી વધુ કોડોન હોઈ શકે છે. A) ખોટું છે કારણ કે ડિજનરસીના કારણે એક એમિનો એસિડ માટે એકથી વધુ કોડોન હોઈ શકે છે. B) ખોટું છે કારણ કે એક કોડોન ફક્ત એક જ એમિનો એસિડ માટે કોડ કરે છે. D) ખોટું છે કારણ કે ડિજનરસીના કારણે એક-એક સંબંધ નથી હોતો.", "ref": "Std 12 - અધ્યાય 6: જૈવ-અણુઓ અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "મિટોકોન્ડ્રિયલ DNAમાં જનીન કોડના સંદર્ભમાં નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["મિટોકોન્ડ્રિયલ જનીન કોડ યુનિવર્સલ છે અને સાયટોપ્લાઝમિક કોડોનની જેમ જ કામ કરે છે.", "મિટોકોન્ડ્રિયલ જનીન કોડમાં UGA કોડોન ટ્રિપ્ટોફેન માટે કોડ કરે છે, જ્યારે સાયટોપ્લાઝમિક કોડમાં તે નિર્ધારિત કોડોન છે.", "મિટોકોન્ડ્રિયલ જનીન કોડમાં AUG કોડોન મિથાયોનિન માટે કોડ કરતું નથી.", "મિટોકોન્ડ્રિયલ જનીન કોડમાં સરખી રીતે 64 કોડોન હોય છે અને તમામ એમિનો એસિડ માટે કોડ કરે છે."], "ans": 1, "exp": "મિટોકોન્ડ્રિયલ જનીન કોડમાં UGA કોડોન ટ્રિપ્ટોફેન માટે કોડ કરે છે, જે સાયટોપ્લાઝમિક કોડમાં નિર્ધારિત કોડોન (સ્ટોપ કોડોન) તરીકે કામ કરે છે. આમ, વિધાન B સત્ય છે. વિધાન A ખોટું છે કારણ કે મિટોકોન્ડ્રિયલ કોડ યુનિવર્સલ નથી. વિધાન C ખોટું છે કારણ કે AUG મિટોકોન્ડ્રિયલ કોડમાં પણ મિથાયોનિન માટે કોડ કરે છે. વિધાન D ખોટું છે કારણ કે મિટોકોન્ડ્રિયલ કોડમાં કેટલાક કોડોનનો અર્થ બદલાયેલો છે અને તમામ 64 કોડોન એમિનો એસિડ માટે કોડ કરતાં નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "જનીન કોડના 'વાચક ફ્રેમ' (Reading Frame) ના સંદર્ભમાં નીચેનામાંથી કયું વિધાન અપવાદરૂપ છે?", "opts": ["વાચક ફ્રેમ એ mRNA પર કોડોનને વાંચવાની દિશા અને પ્રારંભ બિંદુ નક્કી કરે છે.", "જો વાચક ફ્રેમમાં એક ન્યુક્લિયોટાઇડ ઉમેરાય અથવા કાઢી નાખાય, તો તરત જ ડાઉનસ્ટ્રીમ કોડોનનો અર્થ બદલાઈ જાય છે.", "વાચક ફ્રેમમાં ફેરફાર થવા છતાં, કેટલાક કોડોનનો અર્થ અચાનક બદલાતો નથી, કારણ કે કોડ ડિજનરેટ છે.", "વાચક ફ્રેમમાં ફેરફાર થવાને કારણે પ્રોટીન સંશ્લેષણ પૂર્ણપણે બંધ થઈ જાય છે."], "ans": 2, "exp": "વિધાન C સત્ય છે કારણ કે કોડ ડિજનરેટ (બહુવિધ કોડોન એક જ એમિનો એસિડ માટે કોડ કરે છે) હોવાને કારણે વાચક ફ્રેમમાં ફેરફાર થવા છતાં કેટલાક કોડોનનો અર્થ બદલાતો નથી. વિધાન A અને B સામાન્ય રીતે સત્ય છે, પરંતુ અપવાદરૂપ નથી. વિધાન D ખોટું છે કારણ કે વાચક ફ્રેમમાં ફેરફાર થવાને કારણે પ્રોટીન સંશ્લેષણ પૂર્ણપણે બંધ થતું નથી, પરંતુ પ્રોટીનનો અર્થ બદલાઈ શકે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું કોડોન 'વોબલ હાયપોથેસિસ' (Wobble Hypothesis) નું ઉદાહરણ છે?", "opts": ["UUA અને UUG બંને લ્યુસિન માટે કોડ કરે છે.", "GUU, GUC, GUA, અને GUG બધા વેલિન માટે કોડ કરે છે.", "UAC અને UAU બંને ટાયરોસિન માટે કોડ કરે છે, પરંતુ tRNAના એન્ટીકોડોનમાં I (Inosine) હોય છે.", "AUG મિથાયોનિન અને ફોર્મિલમિથાયોનિન બંને માટે કોડ કરે છે."], "ans": 2, "exp": "વોબલ હાયપોથેસિસ અનુસાર, tRNAના એન્ટીકોડોનમાં Inosine (I) હાજર હોય છે, જે U, C, અથવા A સાથે જોડાઈ શકે છે. UAC અને UAU બંને ટાયરોસિન માટે કોડ કરે છે, અને tRNAના એન્ટીકોડોનમાં I હોવાને કારણે આ શક્ય બને છે. વિધાન A અને B ડિજનરસીનું ઉદાહરણ છે, પરંતુ વોબલ હાયપોથેસિસનું નહીં. વિધાન D AUG કોડોનના બહુવિધ અર્થનું ઉદાહરણ છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "જનીન કોડના 'ઓવરલેપિંગ કોડ' (Overlapping Code) ના સંદર્ભમાં નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["જનીન કોડ ઓવરલેપિંગ હોય છે, જ્યારે એક જ ન્યુક્લિયોટાઇડ બે અલગ કોડોનમાં સમાવિષ્ટ હોય છે.", "જનીન કોડ ઓવરલેપિંગ નથી, કારણ કે કોડોન 3 ન્યુક્લિયોટાઇડના ગ્રુપમાં વાંચવામાં આવે છે અને એકબીજા સાથે ઓવરલેપ થતાં નથી.", "ઓવરલેપિંગ કોડ ફક્ત પ્રોકેરિયોટ્સમાં જોવા મળે છે.", "ઓવરલેપિંગ કોડ ફક્ત યુકેરિયોટ્સમાં જોવા મળે છે."], "ans": 1, "exp": "જનીન કોડ ઓવરલેપિંગ નથી, કારણ કે કોડોન 3 ન્યુક્લિયોટાઇડના ગ્રુપમાં વાંચવામાં આવે છે અને એકબીજા સાથે ઓવરલેપ થતાં નથી. આમ, વિધાન B સત્ય છે. વિધાન A, C, અને D ખોટાં છે કારણ કે જનીન કોડ ઓવરલેપિંગ નથી અને તે પ્રોકેરિયોટ્સ અને યુકેરિયોટ્સ બંનેમાં સરખો છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું કોડોન 'સ્ટોપ કોડોન' તરીકે ઓળખાય છે અને તેના સંદર્ભમાં નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["UAA, UAG, અને UGA સ્ટોપ કોડોન છે, અને તે પ્રોટીન સંશ્લેષણને રોકી દે છે.", "UAA, UAG, અને UGA સ્ટોપ કોડોન છે, પરંતુ તે મિટોકોન્ડ્રિયલ DNAમાં એમિનો એસિડ માટે કોડ કરે છે.", "UAA અને UAG સ્ટોપ કોડોન છે, પરંતુ UGA મિથાયોનિન માટે કોડ કરે છે.", "UAA, UAG, અને UGA સ્ટોપ કોડોન છે, પરંતુ તે ફક્ત પ્રોકેરિયોટ્સમાં જ પ્રોટીન સંશ્લેષણને રોકે છે."], "ans": 0, "exp": "UAA, UAG, અને UGA સ્ટોપ કોડોન છે, અને તે પ્રોટીન સંશ્લેષણને રોકી દે છે. આમ, વિધાન A સત્ય છે. વિધાન B ખોટું છે કારણ કે મિટોકોન્ડ્રિયલ DNAમાં UGA ટ્રિપ્ટોફેન માટે કોડ કરે છે, પરંતુ UAA અને UAG સ્ટોપ કોડોન તરીકે કામ કરે છે. વિધાન C ખોટું છે કારણ કે UGA સ્ટોપ કોડોન છે. વિધાન D ખોટું છે કારણ કે સ્ટોપ કોડોન પ્રોકેરિયોટ્સ અને યુકેરિયોટ્સ બંનેમાં પ્રોટીન સંશ્લેષણને રોકે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "મિટોકોન્ડ્રિયલ જનીન કોડમાં, નીચેનામાંથી કયું કોડોન લ્યુસીન (Leucine) માટે કોડ કરે છે, જે સાયટોપ્લાઝમિક જનીન કોડમાં વાંચન ફ્રેમમાં ફેરફાર કરે છે?", "opts": ["UUA", "UGA", "AGA", "AUA"], "ans": 3, "exp": "મિટોકોન્ડ્રિયલ જનીન કોડમાં, AUA કોડોન લ્યુસીન (Leucine) માટે કોડ કરે છે, જ્યારે સાયટોપ્લાઝમિક જનીન કોડમાં AUA કોડોન આઇસોલ્યુસીન (Isoleucine) માટે કોડ કરે છે. UUA સાયટોપ્લાઝમિક અને મિટોકોન્ડ્રિયલ બંનેમાં લ્યુસીન માટે કોડ કરે છે. UGA મિટોકોન્ડ્રિયલ કોડમાં ટ્રિપ્ટોફેન (Tryptophan) માટે કોડ કરે છે, જ્યારે સાયટોપ્લાઝમિક કોડમાં તે સ્ટોપ કોડોન છે. AGA મિટોકોન્ડ્રિયલ કોડમાં સ્ટોપ કોડોન છે, જ્યારે સાયટોપ્લાઝમિક કોડમાં તે આર્જિનિન (Arginine) માટે કોડ કરે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "જનીન કોડની 'વોબલ હાયપોથેસિસ' અંગે નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["tRNA ના એન્ટીકોડોન લૂપમાં પહેલું ન્યુક્લિયોટાઇડ હંમેશા વોબલ સ્થાને રહે છે.", "વોબલ સ્થાને, I (Inosine) ન્યુક્લિયોટાઇડ A, C, U ત્રણેય સાથે જોડાઈ શકે છે.", "વોબલ હાયપોથેસિસ મુજબ, કોડોન અને એન્ટીકોડોન વચ્ચે હાઇડ્રોજન બંધોની સંખ્યા હંમેશા 3 હોવી જરૂરી છે.", "વોબલ હાયપોથેસિસ ફક્ત પ્રોકેરિયોટ્સમાં જ લાગુ પડે છે."], "ans": 1, "exp": "વોબલ હાયપોથેસિસ મુજબ, tRNA ના એન્ટીકોડોન લૂપમાં ત્રીજું ન્યુક્લિયોટાઇડ (5' છેડે) વોબલ સ્થાને રહે છે. I (Inosine) ન્યુક્લિયોટાઇડ A, C, U ત્રણેય સાથે જોડાઈ શકે છે, જે વોબલ હાયપોથેસિસનું મુખ્ય લક્ષણ છે. વોબલ સ્થાને હાઇડ્રોજન બંધોની સંખ્યા 2 અથવા 3 હોવી જરૂરી નથી. વોબલ હાયપોથેસિસ યુકેરિયોટ્સ અને પ્રોકેરિયોટ્સ બંનેમાં લાગુ પડે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું કોડોન 'ડિજનરસી' (Degeneracy) નું સૌથી સ્પષ્ટ ઉદાહરણ છે, જ્યાં એક જ એમિનો એસિડ માટે સૌથી વધુ કોડોન ઉપલબ્ધ છે?", "opts": ["સેરિન (Serine)", "લ્યુસીન (Leucine)", "આર્જિનિન (Arginine)", "મિથાયોનિન (Methionine)"], "ans": 2, "exp": "આર્જિનિન (Arginine) માટે 6 ે. આ મિટોકોન્ડ્રિયલ જનીન કોડનો અપવાદરૂપ ગુણધર્મ છે.\n\nવિકલ્પ A ખોટો છે કારણ કે મિટોકોન્ડ્રિયલ DNAમાં પણ AUG કોડોન મિથાયોનિન માટે કોડ કરે છે અને પ્રારંભ કોડોન તરીકે કાર્ય કરે છે.\n\nવિકલ્પ C ખોટો છે કારણ કે મિટોકોન્ડ્રિયલ DNAમાં AGA અને AGG કોડોન સ્ટોપ કોડોન તરીકે કાર્ય કરે છે, જ્યારે સામાન્ય જનીન કોડમાં તે આર્જિનિન માટે કોડ કરે છે.\n\nવિકલ્પ D ખોટો છે કારણ કે મિટોકોન્ડ્રિયલ DNAમાં CUU, CUC, CUA અને CUG કોડોન લ્યુસીન માટે જ કોડ કરે છે, થ્રીઓનિન માટે નહીં.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
