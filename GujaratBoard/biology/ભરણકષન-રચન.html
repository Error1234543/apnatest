<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ભ્રૂણકોષની રચના</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ભ્રૂણકોષની રચના</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ભ્રૂણકોષની રચના</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "માનવ ભ્રૂણમાં પ્રાથમિક જર્મસ્તરોની રચના દરમિયાન નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["એક્ટોડર્મમાંથી મધ્યકર્ણ અને મૂત્રાશયની અંદરની પેશી વિકસે છે", "મેસોડર્મમાંથી હૃદય, રુધિરવાહિનીઓ અને કંકાલ સ્નાયુઓ વિકસે છે", "એન્ડોડર્મમાંથી ફેફસાંની અંદરની અસ્તર પેશી અને યકૃત વિકસે છે", "એક્ટોડર્મમાંથી મગજ અને કરોડરજ્જુનું ચેતાતંત્ર વિકસે છે"], "ans": 0, "exp": "સાચો જવાબ A છે કારણ કે એક્ટોડર્મમાંથી મધ્યકર્ણ અને મૂત્રાશયની અંદરની પેશી વિકસતી નથી. મધ્યકર્ણ એક્ટોડર્મમાંથી વિકસે છે, પરંતુ મૂત્રાશયની અંદરની પેશી એન્ડોડર્મમાંથી વિકસે છે. B, C અને D વિધાનો સાચાં છે કારણ કે મેસોડર્મમાંથી હૃદય, રુધિરવાહિનીઓ અને કંકાલ સ્નાયુઓ, એન્ડોડર્મમાંથી ફેફસાંની અંદરની અસ્તર પેશી અને યકૃત, અને એક્ટોડર્મમાંથી મગજ અને કરોડરજ્જુનું ચેતાતંત્ર વિકસે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "ભ્રૂણીય વિકાસ દરમિયાન ગેસ્ટ્રુલેશનની પ્રક્રિયા માટે નીચેના પૈકી કયું વિધાન યોગ્ય નથી?", "opts": ["ગેસ્ટ્રુલેશન દરમિયાન બ્લાસ્ટોસીલ નાશ પામે છે અને આર્કેન્ટેરોન રચાય છે", "ગેસ્ટ્રુલેશન પછી ત્રણ પ્રાથમિક જર્મસ્તરોની રચના થાય છે", "ગેસ્ટ્રુલેશન દરમિયાન કોષોનું સ્થળાંતર એપિબ્લાસ્ટમાંથી હાઇપોબ્લાસ્ટ તરફ થાય છે", "ગેસ્ટ્રુલેશનની પ્રક્રિયા દરમિયાન પ્રિમિટિવ સ્ટ્રીક રચાય છે"], "ans": 2, "exp": "સાચો જવાબ C છે કારણ કે ગેસ્ટ્રુલેશન દરમિયાન કોષોનું સ્થળાંતર એપિબ્લાસ્ટમાંથી હાઇપોબ્લાસ્ટ તરફ થતું નથી, પરંતુ એપિબ્લાસ્ટના કોષો પ્રિમિટિવ સ્ટ્રીક દ્વારા અંદરની તરફ સ્થળાંતરિત થાય છે. A, B અને D વિધાનો સાચાં છે કારણ કે ગેસ્ટ્રુલેશન દરમિયાન બ્લાસ્ટોસીલ નાશ પામે છે, ત્રણ પ્રાથમિક જર્મસ્તરો રચાય છે અને પ્રિમિટિવ સ્ટ્રીક રચાય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયું અંગ એન્ડોડર્મમાંથી વિકસતું નથી?", "opts": ["થાઇરોઇડ ગ્રંથિ", "સ્વાદુપિંડ", "મૂત્રપિંડ", "થાઇમસ ગ્રંથિ"], "ans": 2, "exp": "સાચો જવાબ C છે કારણ કે મૂત્રપિંડ મેસોડર્મમાંથી વિકસે છે, એન્ડોડર્મમાંથી નહીં. A, B અને D વિકલ્પો એન્ડોડર્મમાંથી વિકસે છે: થાઇરોઇડ ગ્રંથિ, સ્વાદુપિંડ અને થાઇમસ ગ્રંથિ.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "ભ્રૂણીય વિકાસ દરમિયાન ન્યુર્યુલેશનની પ્રક્રિયા માટે નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["ન્યુરલ પ્લેટ એક્ટોડર્મના કોષોમાંથી રચાય છે", "ન્યુરલ ક્રેસ્ટ કોષો ચેતાગ્રંથિઓ અને મેલેનોસાઇટ્સમાં વિકસે છે", "ન્યુરલ ટ્યુબ મેસોડર્મમાંથી રચાય છે", "ન્યુર્યુલેશન દરમિયાન ન્યુરલ ગ્રૂવ બંધ થઈને ન્યુરલ ટ્યુબ બને છે"], "ans": 2, "exp": "સાચો જવાબ C છે કારણ કે ન્યુરલ ટ્યુબ મેસોડર્મમાંથી રચાતી નથી, પરંતુ એક્ટોડર્મમાંથી રચાય છે. A, B અને D વિધાનો સાચાં છે કારણ કે ન્યુરલ પ્લેટ એક્ટોડર્મમાંથી રચાય છે, ન્યુરલ ક્રેસ્ટ કોષો ચેતાગ્રંથિઓ અને મેલેનોસાઇટ્સમાં વિકસે છે, અને ન્યુરલ ગ્રૂવ બંધ થઈને ન્યુરલ ટ્યુબ બને છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માનવ ભ્રૂણમાં નોટોકોર્ડની રચના અને કાર્ય માટે નીચેના પૈકી કયું વિધાન યોગ્ય નથી?", "opts": ["નોટોકોર્ડ મેસોડર્મના કોષોમાંથી વિકસે છે", "નોટોકોર્ડ કરોડરજ્જુના વિકાસ માટે માળખાકીય આધાર પૂરો પાડે છે", "નોટોકોર્ડ પુખ્ત માનવમાં કાયમી રીતે જળવાઈ રહે છે", "નોટોકોર્ડ ન્યુરલ ટ્યુબના વિકાસને પ્રેરિત કરે છે"], "ans": 2, "exp": "સાચો જવાબ C છે કારણ કે નોટોકોર્ડ પુખ્ત માનવમાં કાયમી રીતે જળવાઈ રહેતું નથી, તે કરોડરજ્જુના વિકાસ દરમિયાન અદૃશ્ય થઈ જાય છે. A, B અને D વિધાનો સાચાં છે કારણ કે નોટોકોર્ડ મેસોડર્મમાંથી વિકસે છે, કરોડરજ્જુના વિકાસ માટે માળખાકીય આધાર પૂરો પાડે છે અને ન્યુરલ ટ્યુબના વિકાસને પ્રેરિત કરે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માનવ ભ્રૂણમાં બ્લાસ્ટોસિસ્ટના ઇમ્પ્લાન્ટેશન બાદ, ટ્રોફોબ્લાસ્ટ કોષો દ્વારા ઉત્પન્ન થતા હોર્મોનનું નામ શું છે, જે ગર્ભાશયની દીવાલને જાળવવામાં મદદ કરે છે?", "opts": ["પ્રોજેસ્ટેરોન", "હ્યુમન કોરિઓનિક ગોનાડોટ્રોપિન (hCG)", "ઇસ્ટ્રોજન", "લ્યુટિનાઇઝિંગ હોર્મોન (LH)"], "ans": 1, "exp": "સાચો જવાબ B) હ્યુમન કોરિઓનિક ગોનાડોટ્રોપિન (hCG) છે. ટ્રોફોબ્લાસ્ટ કોષો hCG હોર્મોન ઉત્પન્ન કરે છે, જે કોર્પસ લ્યુટિયમને પ્રોજેસ્ટેરોન ઉત્પન્ન કરવા પ્રેરિત કરે છે અને ગર્ભાશયની દીવાલને જાળવવામાં મદદ કરે છે. પ્રોજેસ્ટેરોન અને ઇસ્ટ્રોજન અંડાશય દ્વારા ઉત્પન્ન થાય છે, જ્યારે LH પિટ્યુટરી ગ્રંથિમાંથી ઉત્પન્ન થાય છે, તેથી આ વિકલ્પો ખોટા છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન ભ્રૂણીય વિકાસ દરમિયાન મોર્ફોજેનેસિસની પ્રક્રિયા માટે ખોટું છે?", "opts": ["મોર્ફોજેનેસિસ દરમિયાન કોષોની ગોઠવણી અને આકારમાં ફેરફાર થાય છે.", "આ પ્રક્રિયા દરમિયાન કોષોનું વિભેદન થતું નથી.", "મોર્ફોજેનેસિસમાં કોષોની હિલચાલ અને સંકોચનનો સમાવેશ થાય છે.", "આ પ્રક્રિયા દ્વારા અંગો અને પેશીઓનો આકાર નક્કી થાય છે."], "ans": 1, "exp": "સાચો જવાબ B) 'આ પ્રક્રિયા દરમિયાન કોષોનું વિભેદન થતું નથી' ખોટું છે. મોર્ફોજેનેસિસ દરમિયાન કોષોનું વિભેદન થાય છે અને તેમની ગોઠવણી તથા આકારમાં ફેરફાર થાય છે. અન્ય વિકલ્પો મોર્ફોજેનેસિસની સાચી લાક્ષણિકતાઓ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "ભ્રૂણીય વિકાસ દરમિયાન નીચેના પૈકી કયું અંગ મેસોડર્મમાંથી વિકસતું નથી?", "opts": ["હૃદય", "કિડની", "યકૃત", "હાડકાં"], "ans": 2, "exp": "સાચો જવાબ C) યકૃત છે. યકૃત એન્ડોડર્મમાંથી વિકસે છે, જ્યારે હૃદય, કિડની અને હાડકાં મેસોડર્મમાંથી વિકસે છે. આ પ્રશ્નમાં મેસોડર્મ અને એન્ડોડર્મ વચ્ચેનો તફાવત ચકાસવામાં આવ્યો છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માનવ ભ્રૂણમાં બ્લાસ્ટોસિસ્ટના આંતરિક કોષ સમૂહ (Inner Cell Mass - ICM)માંથી નીચેના પૈકી કયું સ્વરૂપ વિકસતું નથી?", "opts": ["એમ્નિયોટિક પટલ", "ભ્રૂણીય ડિસ્ક", "ટ્રોફોબ્લાસ્ટ", "જર્મ કોષો"], "ans": 2, "exp": "સાચો જવાબ C) ટ્રોફોબ્લાસ્ટ છે. ટ્રોફોબ્લાસ્ટ બ્લાસ્ટોસિસ્ટના બાહ્ય કોષ સ્તરમાંથી વિકસે છે, જ્યારે આંતરિક કોષ સમૂહ (ICM)માંથી એમ્નિયોટિક પટલ, ભ્રૂણીય ડિસ્ક અને જર્મ કોષો વિકસે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "ભ્રૂણીય વિકાસ દરમિયાન નીચેના પૈકી કયું વિધાન એપિજેનેસિસના સિદ્ધાંત માટે યોગ્ય નથી?", "opts": ["એપિજેનેસિસ મુજબ ભ્રૂણ ધીમે ધીમે જટિલ સ્વરૂપમાં વિકસે છે.", "આ સિદ્ધાંત પ્રાચીન 'પૂર્વનિર્માણવાદ' (Preformationism)નો વિરોધ કરે છે.", "એપિજેનેસિસ મુજબ ભ્રૂણમાં પહેલેથી જ નાના પૂર્ણ સ્વરૂપમાં હોય છે.", "આ સિદ્ધાંત કોષોના વિભેદન અને આકારના ફેરફારને સમજાવે છે."], "ans": 2, "exp": "સાચો જવાબ C) 'એપિજેનેસિસ મુજબ ભ્રૂણમાં પહેલેથી જ નાના પૂર્ણ સ્વરૂપમાં હોય છે' ખોટું છે. એપિજેનેસિસ મુજબ ભ્રૂણ ધીમે ધીમે જટિલ સ્વરૂપમાં વિકસે છે અને તે પ્રાચીન 'પૂર્વનિર્માણવાદ'નો વિરોધ કરે છે. વિકલ્પ C પૂર્વનિર્માણવાદની વિચારધારાને દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માનવ ભ્રૂણમાં બ્લાસ્ટોમિયર્સના વિભાજન દરમિયાન નીચેના પૈકી કયું વિશિષ્ટ લક્ષણ જોવા મળતું નથી?", "opts": ["વિભાજન દરમિયાન કોષોનું કદ ઘટતું જાય છે", "વિભાજન પૂર્ણ થયા બાદ કોષોની સંખ્યા વધે છે પરંતુ કુલ કદ અચળ રહે છે", "દરેક વિભાજન બાદ DNAનું પ્રમાણ બમણું થાય છે અને પ્રોટીન સંશ્લેષણ વધે છે", "વિભાજન દરમિયાન કોષકેન્દ્ર અને કોષરસનું પ્રમાણ સમાન રહે છે"], "ans": 3, "exp": "સાચો જવાબ D છે કારણ કે બ્લાસ્ટોમિયર્સના વિભાજન દરમિયાન કોષકેન્દ્રનું પ્રમાણ વધે છે અને કોષરસનું પ્રમાણ ઘટે છે. વિકલ્પ A, B અને C સાચાં છે કારણ કે વિભાજન દરમિયાન કોષોનું કદ ઘટે છે, કુલ કદ અચળ રહે છે અને DNAનું પ્રમાણ બમણું થાય છે. વિકલ્પ D ખોટો છે કારણ કે કોષકેન્દ્ર અને કોષરસનું પ્રમાણ સમાન રહેતું નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન ભ્રૂણીય વિકાસ દરમિયાન 'કોમ્પેક્શન' (Compaction) પ્રક્રિયા માટે ખોટું છે?", "opts": ["કોમ્પેક્શન પ્રક્રિયા 8-કોષીય તબક્કે શરૂ થાય છે", "આ પ્રક્રિયા દરમિયાન બ્લાસ્ટોમિયર્સ એકબીજા સાથે ચુસ્ત રીતે જોડાય છે", "કોમ્પેક્શન બાદ કોષોની ધ્રુવીયતા (Polarity) નાશ પામે છે", "આ પ્રક્રિયા માટે E-કેડહરીન (E-Cadherin) પ્રોટીન જવાબદાર છે"], "ans": 2, "exp": "સાચો જવાબ C છે કારણ કે કોમ્પેક્શન બાદ કોષોની ધ્રુવીયતા વિકસે છે, નાશ પામતી નથી. વિકલ્પ A, B અને D સાચાં છે કારણ કે કોમ્પેક્શન 8-કોષીય તબક્કે શરૂ થાય છે, બ્લાસ્ટોમિયર્સ એકબીજા સાથે ચુસ્ત રીતે જોડાય છે અને E-કેડહરીન પ્રોટીન આ પ્રક્રિયામાં મહત્ત્વનો ભાગ ભજવે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માનવ ભ્રૂણમાં બ્લાસ્ટોસિસ્ટના નિર્માણ દરમિયાન નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["બ્લાસ્ટોસિસ્ટમાં ટ્રોફોબ્લાસ્ટ અને આંતરિક કોષ સમૂહ (ICM) હોય છે", "બ્લાસ્ટોસિસ્ટની રચના મોરુલા તબક્કા બાદ થાય છે", "બ્લાસ્ટોસિસ્ટમાં પ્રવાહી ભરેલી પોલાણ (Blastocoel) રચાય છે", "બ્લાસ્ટોસિસ્ટના નિર્માણ દરમિયાન કોષોનું કુલ કદ વધે છે"], "ans": 3, "exp": "સાચો જવાબ D છે કારણ કે બ્લાસ્ટોસિસ્ટના નિર્માણ દરમિયાન કોષોનું કુલ કદ વધતું નથી, પરંતુ કોષોની સંખ્યા વધે છે અને પ્રવાહી ભરેલી પોલાણ રચાય છે. વિકલ્પ A, B અને C સાચાં છે કારણ કે બ્લાસ્ટોસિસ્ટમાં ટ્રોફોબ્લાસ્ટ અને ICM હોય છે, તે મોરુલા તબક્કા બાદ રચાય છે અને તેમાં પ્રવાહી ભરેલી પોલાણ હોય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયું અંગ ભ્રૂણીય વિકાસ દરમિયાન 'ન્યુરલ ક્રેસ્ટ કોષો'માંથી વિકસતું નથી?", "opts": ["મેલેનોસાઇટ્સ (Melanocytes)", "એડ્રિનલ મેડ્યુલા (Adrenal Medulla)", "કરોડરજ્જુ (Spinal Cord)", "ચહેરાના હાડકાં અને સ્નાયુઓ"], "ans": 2, "exp": "સાચો જવાબ C છે કારણ કે કરોડરજ્જુ ન્યુરલ ટ્યુબમાંથી વિકસે છે, ન્યુરલ ક્રેસ્ટ કોષોમાંથી નહીં. વિકલ્પ A, B અને D સાચાં છે કારણ કે મેલેનોસાઇટ્સ, એડ્રિનલ મેડ્યુલા અને ચહેરાના હાડકાં તથા સ્નાયુઓ ન્યુરલ ક્રેસ્ટ કોષોમાંથી વિકસે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માનવ ભ્રૂણમાં ગેસ્ટ્રુલેશન દરમિયાન નીચેના પૈકી કયું વિધાન 'એપિબ્લાસ્ટ કોષો' માટે ખોટું છે?", "opts": ["એપિબ્લાસ્ટ કોષો પ્રિમિટિવ સ્ટ્રીક દ્વારા સ્થળાંતર કરે છે", "એપિબ્લાસ્ટ કોષો માત્ર એન્ડોડર્મમાં રૂપાંતરિત થાય છે", "એપિબ્લાસ્ટ કોષો મેસોડર્મ અને એક્ટોડર્મના નિર્માણમાં ભાગ લે છે", "એપિબ્લાસ્ટ કોષોની સ્થળાંતર પ્રક્રિયા ઇનગ્રેશન (Ingression) તરીકે ઓળખાય છે"], "ans": 1, "exp": "સાચો જવાબ B છે કારણ કે એપિબ્લાસ્ટ કોષો માત્ર એન્ડોડર્મમાં જ નહીં, પરંતુ મેસોડર્મ અને એક્ટોડર્મમાં પણ રૂપાંતરિત થાય છે. વિકલ્પ A, C અને D સાચાં છે કારણ કે એપિબ્લાસ્ટ કોષો પ્રિમિટિવ સ્ટ્રીક દ્વારા સ્થળાંતર કરે છે, મેસોડર્મ અને એક્ટોડર્મના નિર્માણમાં ભાગ લે છે અને તેમની સ્થળાંતર પ્રક્રિયા ઇનગ્રેશન તરીકે ઓળખાય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માનવ ભ્રૂણકોષની રચના દરમિયાન, નીચેના પૈકી કયા હોર્મોનની અસર હેઠળ ટ્રોફોબ્લાસ્ટ કોષો દ્વારા hCG (હ્યુમન કોરિયોનિક ગોનેડોટ્રોપિન)નું સ્રાવ થાય છે?", "opts": ["પ્રોજેસ્ટેરોન", "ઇસ્ટ્રોજન", "લ્યુટિનાઇઝિંગ હોર્મોન (LH)", "હ્યુમન પ્લેસેન્ટલ લેક્ટોજન (hPL)"], "ans": 2, "exp": "hCGનું સ્રાવ ટ્રોફોબ્લાસ્ટ કોષો દ્વારા થાય છે, અને તે લ્યુટિનાઇઝિંગ હોર્મોન (LH)ની જેમ કામ કરે છે, જે કોર્પસ લ્યુટિયમને ટકાવી રાખવા માટે જરૂરી છે. પ્રોજેસ્ટેરોન અને ઇસ્ટ્રોજન તો ગર્ભાશયની દિવાલને તૈયાર કરવા માટે જરૂરી છે, પરંતુ hCGનું સ્રાવ તેની અસર હેઠળ થતું નથી. hPL ગર્ભાવસ્થા દરમિયાન પ્લેસેન્ટા દ્વારા સ્રાવવામાં આવે છે, પરંતુ તે hCGના સ્રાવ માટે જવાબદાર નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "ભ્રૂણકોષની રચના દરમિયાન, બ્લાસ્ટોમિયરના વિભાજન પછી, નીચેના પૈકી કયા તબક્કે કોષોની સંખ્યા 16 થી 32 સુધી વધે છે અને તેને 'મોર્યુલા' કહેવામાં આવે છે?", "opts": ["2-કોષીય તબક્કો", "4-કોષીય તબક્કો", "8-કોષીય તબક્કો", "16-32 કોષીય તબક્કો"], "ans": 3, "exp": "મોર્યુલા તબક્કો એટલે જ્યારે બ્લાસ્ટોમિયરના વિભાજન પછી કોષોની સંખ્યા 16 થી 32 સુધી પહોંચે છે. 2-કોષીય, 4-કોષીય, અને 8-કોષીય તબક્કાઓ મોર્યુલા પહેલાના તબક્કાઓ છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "ભ્રૂણકોષની રચના દરમિયાન, નીચેના પૈકી કયા કોષ સમૂહમાંથી એમ્નિયોન, કોરિયોન, અને એલાન્ટોઇસ જેવી ભ્રૂણીય ઉપાંગોની રચના થાય છે?", "opts": ["ઇનર સેલ માસ (ICM)", "ટ્રોફોબ્લાસ્ટ", "એપિબ્લાસ્ટ", "હાઇપોબ્લાસ્ટ"], "ans": 1, "exp": "ટ્રોફોબ્લાસ્ટ કોષોમાંથી એમ્નિયોન, કોરિયોન, અને એલાન્ટોઇસ જેવી ભ્રૂણીય ઉપાંગોની રચના થાય છે. ICMમાંથી ભ્રૂણીય ડિસ્ક વિકસે છે, જ્યારે એપિબ્લાસ્ટ અને હાઇપોબ્લાસ્ટ ICMના ભાગો છે જે ભ્રૂણીય ડિસ્કના વિકાસમાં ભાગ લે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માનવ ભ્રૂણકોષની રચના દરમિયાન, નીચેના પૈકી કયું વિધાન 'કોમ્પેક્શન' પ્રક્રિયા માટે ખોટું છે?", "opts": ["કોષો વચ્ચેના અંતરમાં ઘટાડો થાય છે.", "કોષોની સપાટી પર મિક્રોવિલીની સંખ્યામાં વધારો થાય છે.", "કોષોની સપાટી પર ગ્લાયકોપ્રોટીનની સંખ્યામાં ઘટાડો થાય છે.", "કોષો વચ્ચેના જંકશનલ કોમ્પ્લેક્સનું નિર્માણ થાય છે."], "ans": 2, "exp": "કોમ્પેક્શન દરમિયાન કોષોની સપાટી પર ગ્લાયકોપ્રોટીનની સંખ્યામાં ઘટાડો નથી થતો, ઉલટાનું તેની સંખ્યામાં વધારો થાય છે, જે કોષો વચ્ચેના જોડાણને મજબૂત બનાવે છે. કોષો વચ્ચેના અંતરમાં ઘટાડો, મિક્રોવિલીની સંખ્યામાં વધારો, અને જંકશનલ કોમ્પ્લેક્સનું નિર્માણ થાય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "ભ્રૂણકોષની રચના દરમિયાન, નીચેના પૈકી કયા હોર્મોનનું સ્રાવ ટ્રોફોબ્લાસ્ટ કોષો દ્વારા થતું નથી?", "opts": ["hCG (હ્યુમન કોરિયોનિક ગોનેડોટ્રોપિન)", "hPL (હ્યુમન પ્લેસેન્ટલ લેક્ટોજન)", "પ્રોજેસ્ટેરોન", "ઇસ્ટ્રોજન"], "ans": 2, "exp": "ટ્રોફોબ્લાસ્ટ કોષો દ્વારા hCG અને hPLનું સ્રાવ થાય છે. પ્રોજેસ્ટેરોન અને ઇસ્ટ્રોજનનું સ્રાવ મુખ્યત્વે કોર્પસ લ્યુટિયમ અને પ્લેસેન્ટા દ્વારા થાય છે, પરંતુ ટ્રોફોબ્લાસ્ટ કોષો દ્વારા નહીં.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
