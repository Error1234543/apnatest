<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પ્લિયોટ્રોપી (Pleiotropy)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>પ્લિયોટ્રોપી (Pleiotropy)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">પ્લિયોટ્રોપી (Pleiotropy)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "પ્લિયોટ્રોપીના કિસ્સામાં એક જ જનીનના બદલાવથી શરીરમાં વિવિધ લક્ષણો પ્રભાવિત થાય છે. નીચેનામાંથી કયું ઉદાહરણ પ્લિયોટ્રોપીનું સૌથી યોગ્ય ઉદાહરણ છે?", "opts": ["સિકલ સેલ એનિમિયામાં, હિમોગ્લોબિન જનીનનો મ્યુટેશન લોહીમાં રક્તકણોના આકાર અને કદ બંને બદલે છે, જે ઓક્સિજન વહન અને રક્તવાહિનીઓમાં અવરોધ ઉભો કરે છે.", "ફિનાઇલકીટોન્યુરિયામાં, ફિનાઇલએલેનિન હાઇડ્રોક્સિલેઝ ઉત્સેચકની ઉણપથી ફક્ત મગજના વિકાસ પર અસર થાય છે.", "કલર બ્લાઇન્ડનેસમાં, એક જનીનનો મ્યુટેશન ફક્ત રંગોની ઓળખ ખોરવે છે, પરંતુ અન્ય કોઈ શારીરિક લક્ષણો પર અસર કરતો નથી.", "હિમોફિલિયામાં, રક્ત ગંઠાવાનું કોફેક્ટર તૈયાર કરતું જનીન ખોરવાઈ જાય છે, પરંતુ તે ફક્ત રક્તસ્રાવ પર જ અસર કરે છે."], "ans": 0, "exp": "પ્લિયોટ્રોપીમાં એક જ જનીનના મ્યુટેશનથી શરીરના બહુવિધ લક્ષણો પ્રભાવિત થાય છે. સિકલ સેલ એનિમિયામાં, હિમોગ્લોબિન જનીનનો મ્યુટેશન લોહીમાં રક્તકણોના આકાર અને કદ બદલે છે, જે ઓક્સિજન વહન અને રક્તવાહિનીઓમાં અવરોધ ઉભો કરે છે, એટલે કે બહુવિધ લક્ષણો પ્રભાવિત થાય છે. ફિનાઇલકીટોન્યુરિયામાં મગજના વિકાસ ઉપરાંત અન્ય લક્ષણો જેમ કે ત્વચા અને વાળના રંગ પર પણ અસર થાય છે, પરંતુ પ્રશ્નમાં ફક્ત મગજના વિકાસની વાત કરવામાં આવી છે, જે અપૂર્ણ છે. કલર બ્લાઇન્ડનેસ અને હિમોફિલિયા એક જ લક્ષણ પર અસર કરે છે, એટલે તે પ્લિયોટ્રોપીના ઉદાહરણો નથી.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતા", "ch": ""}, {"q": "પ્લિયોટ્રોપી અને પોલિજીની વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["પ્લિયોટ્રોપીમાં એક જનીન બહુવિધ લક્ષણોને નિયંત્રિત કરે છે, જ્યારે પોલિજીનીમાં એક લક્ષણ બહુવિધ જનીન દ્વારા નિયંત્રિત થાય છે.", "પ્લિયોટ્રોપીમાં બહુવિધ જનીન એક લક્ષણને નિયંત્રિત કરે છે, જ્યારે પોલિજીનીમાં એક જનીન બહુવિધ લક્ષણોને નિયંત્રિત કરે છે.", "પ્લિયોટ્રોપી અને પોલિજીની એ બંને સમાન ઘટના છે, ફરક ફક્ત નામમાં છે.", "પ્લિયોટ્રોપીમાં જનીનનો મ્યુટેશન ફક્ત એક જ પેશીને પ્રભાવિત કરે છે, જ્યારે પોલિજીનીમાં બહુવિધ પેશીઓ પ્રભાવિત થાય છે."], "ans": 0, "exp": "પ્લિયોટ્રોપીમાં એક જ જનીન બહુવિધ લક્ષણોને નિયંત્રિત કરે છે, જ્યારે પોલિજીનીમાં એક લક્ષણ બહુવિધ જનીન દ્વારા નિયંત્રિત થાય છે. બાકીના વિકલ્પો ગેરમાર્ગે દોરતા છે અથવા ખોટી વ્યાખ્યા આપે છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતા", "ch": ""}, {"q": "નીચેનામાંથી કયું પ્લિયોટ્રોપીનું ઉદાહરણ નથી?", "opts": ["મરફન સિન્ડ્રોમ, જ્યાં ફાઇબ્રિલિન જનીનનો મ્યુટેશન હૃદય, આંખો અને અસ્થિઓને પ્રભાવિત કરે છે.", "ટે-સેક્સ સિન્ડ્રોમ, જ્યાં X વર્ણસૂત્ર પરના જનીનનો મ્યુટેશન ફક્ત મગજના વિકાસને પ્રભાવિત કરે છે.", "સિસ્ટિક ફાઇબ્રોસિસ, જ્યાં CFTR જનીનનો મ્યુટેશન ફેફસાં, પાચનતંત્ર અને સ્વેદ ગ્રંથિઓને પ્રભાવિત કરે છે.", "પ્રોડેર-વિલી સિન્ડ્રોમ, જ્યાં ક્રોમોસોમ 15 પરના જનીનનો મ્યુટેશન ભૂખ, મસલ્સ અને વર્તણૂકને પ્રભાવિત કરે છે."], "ans": 1, "exp": "ટે-સેક્સ સિન્ડ્રોમમાં X વર્ણસૂત્ર પરના જનીનનો મ્યુટેશન ફક્ત મગજના વિકાસને પ્રભાવિત કરતો નથી, પરંતુ અન્ય લક્ષણો જેમ કે હાથ અને પગના અંગૂઠાના વિકાસ પર પણ અસર કરે છે. પરંતુ પ્રશ્નમાં ફક્ત મગજના વિકાસની વાત કરવામાં આવી છે, જે અપૂર્ણ છે. બાકીના તમામ ઉદાહરણો પ્લિયોટ્રોપીના સ્પષ્ટ ઉદાહરણો છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતા", "ch": ""}, {"q": "પ્લિયોટ્રોપીના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["પ્લિયોટ્રોપી હંમેશા પ્રભાવી (ડોમિનન્ટ) જનીન દ્વારા જ દર્શાવવામાં આવે છે.", "પ્લિયોટ્રોપીમાં એક જનીનના મ્યુટેશનથી શરીરના વિવિધ અંગો અને તંત્રો પર અસર થાય છે.", "પ્લિયોટ્રોપી ફક્ત મનુષ્યમાં જ જોવા મળે છે, અન્ય પ્રાણીઓમાં નહીં.", "પ્લિયોટ્રોપીના કિસ્સામાં, મ્યુટેશન હંમેશા જીવલેણ (લેથલ) હોય છે."], "ans": 1, "exp": "પ્લિયોટ્રોપીમાં એક જ જનીનના મ્યુટેશનથી શરીરના વિવિધ અંગો અને તંત્રો પર અસર થાય છે. પ્લિયોટ્રોપી પ્રભાવી અથવા અપ્રભાવી (રિસેસિવ) જનીન દ્વારા દર્શાવી શકાય છે, અને તે મનુષ્ય સિવાય અન્ય પ્રાણીઓમાં પણ જોવા મળે છે. મ્યુટેશન હંમેશા જીવલેણ હોતું નથી.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતા", "ch": ""}, {"q": "પ્લિયોટ્રોપીના અભ્યાસમાં, નીચેનામાંથી કયું કથન ખોટું છે?", "opts": ["પ્લિયોટ્રોપીના કિસ્સામાં, એક જનીનના ઉત્પાદન (પ્રોટીન) વિવિધ જૈવ રાસાયણિક માર્ગોને પ્રભાવિત કરે છે.", "પ્લિયોટ્રોપીના કારણે એક જ જનીનનો મ્યુટેશન વિવિધ ફિનોટાઇપિક લક્ષણો ઉત્પન્ન કરે છે.", "પ્લિયોટ્રોપી અને એપિસ્ટેસિસ એ સમાન ઘટના છે, જેમાં જનીનો પરસ્પર પ્રભાવ પાડે છે.", "પ્લિયોટ્રોપીના કારણે, એક જ જનીનનો મ્યુટેશન વિવિધ પેશીઓ અને અંગોના વિકાસને અસર કરે છે."], "ans": 2, "exp": "પ્લિયોટ્રોપી અને એપિસ્ટેસિસ એ બે ભિન્ન ઘટનાઓ છે. પ્લિયોટ્રોપીમાં એક જ જનીન બહુવિધ લક્ષણોને પ્રભાવિત કરે છે, જ્યારે એપિસ્ટેસિસમાં એક જનીન અન્ય જનીનની અભિવ્યક્તિને પ્રભાવિત કરે છે. બાકીના વિકલ્પો પ્લિયોટ્રોપી વિશે સત્ય છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતા", "ch": ""}, {"q": "મનુષ્યમાં ફિનાઇલકેટોન્યુરિયા (PKU) રોગમાં, ફિનાઇલઅલેનિન હાઇડ્રોક્સિલેઝ ઉત્સેચકની ઉણપના કારણે કયા લક્ષણો જોવા મળે છે, જે પ્લિયોટ્રોપીનું સ્પષ્ટ ઉદાહરણ છે?", "opts": ["માનસિક મંદતા, હળવા વાળ અને ચામડી, તથા મૂત્રમાં ફિનાઇલપાયરુવિક એસિડની વધુ માત્રા", "રક્તમાં ગ્લુકોઝનું સ્તર વધવું, અંધત્વ અને કિડની ખરાબ થવી", "હાડકાંની વિકૃતિ, રક્તઅલ્પતા અને શ્વસન તંત્રની નબળાઈ", "પાચનતંત્રમાં ખરાબી, યકૃતની સોજો અને ચેતાતંત્રની ખામી"], "ans": 0, "exp": "ફિનાઇલકેટોન્યુરિયા (PKU)માં ફિનાઇલઅલેનિન હાઇડ્રોક્સિલેઝ ઉત્સેચકની ઉણપના કારણે ફિનાઇલઅલેનિનનું ચયાપચય થતું નથી, જેના કારણે માનસિક મંદતા, હળવા વાળ અને ચામડી, તથા મૂત્રમાં ફિનાઇલપાયરુવિક એસિડની વધુ માત્રા જેવા લક્ષણો જોવા મળે છે. આ એક જ જનીનના બદલાવથી વિવિધ લક્ષણો પ્રભાવિત થવાનું ઉદાહરણ છે, જે પ્લિયોટ્રોપીનું સ્પષ્ટ લક્ષણ છે. બાકીના વિકલ્પો અન્ય રોગો અથવા પરિસ્થિતિઓ સાથે સંબંધિત છે.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને જનીનિક રોગો", "ch": ""}, {"q": "પ્લિયોટ્રોપીના સંદર્ભમાં, નીચેનામાંથી કયું જનીન એવું છે કે જેના મ્યુટેશનથી મનુષ્યમાં હૃદય, આંખો અને કાનના વિકાસ પર અસર થાય છે?", "opts": ["CFTR જનીન", "PAX6 જનીન", "TBX5 જનીન", "BRCA1 જનીન"], "ans": 2, "exp": "TBX5 જનીનના મ્યુટેશનથી હોલ્ટ-ઓરમ સિન્ડ્રોમ થાય છે, જેમાં હૃદય, આંખો અને કાનના વિકાસ પર અસર થાય છે. આ પ્લિયોટ્રોપીનું ઉદાહરણ છે, જ્યાં એક જ જનીનના બદલાવથી શરીરના વિવિધ અંગો પ્રભાવિત થાય છે. CFTR જનીન સિસ્ટિક ફાઇબ્રોસિસ સાથે, PAX6 જનીન આંખોના વિકાસ સાથે, અને BRCA1 જનીન કૅન્સર સાથે સંબંધિત છે.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને જનીનિક રોગો", "ch": ""}, {"q": "પ્લિયોટ્રોપીના કિસ્સામાં, એક જ જનીનના મ્યુટેશનથી વિવિધ લક્ષણો પ્રભાવિત થાય છે. નીચેનામાંથી કયું કથન આ ઘટનાને સૌથી સારી રીતે સમજાવે છે?", "opts": ["જનીનના મ્યુટેશનથી એક જ પ્રોટીનનું ઉત્પાદન થાય છે, જે વિવિધ અંગો પર અસર કરે છે.", "જનીનના મ્યુટેશનથી વિવિધ પ્રોટીનનું ઉત્પાદન થાય છે, જે વિવિધ અંગો પર અસર કરે છે.", "જનીનના મ્યુટેશનથી ઉત્સેચકની ક્રિયા બદલાય છે, જે ચયાપચયના વિવિધ માર્ગોને પ્રભાવિત કરે છે.", "જનીનના મ્યુટેશનથી DNAની સંરચના બદલાય છે, જે વિવિધ જનીનોને પ્રભાવિત કરે છે."], "ans": 2, "exp": "પ્લિયોટ્રોપીમાં, એક જ જનીનના મ્યુટેશનથી ઉત્સેચક અથવા પ્રોટીનની ક્રિયા બદલાય છે, જે ચયાપચયના વિવિધ માર્ગોને પ્રભાવિત કરે છે, પરિણામે વિવિધ લક્ષણો જોવા મળે છે. વિકલ્પ A અને B અંશતઃ સાચા છે, પરંતુ વિકલ્પ C સૌથી સંપૂર્ણ સમજૂતી આપે છે. વિકલ્પ D પ્લિયોટ્રોપીના સંદર્ભમાં સાચો નથી, કારણ કે DNAની સંરચના બદલાવા સાથે વિવિધ જનીનો પ્રભાવિત થવાનું પ્લિયોટ્રોપી નથી, પરંતુ તે મ્યુટેશનના અન્ય પ્રકારો સાથે સંબંધિત હોઈ શકે.", "ref": "Std 12 - અધ્યાય 4: જનીનિકતા અને વિકાસ", "ch": ""}, {"q": "નીચેનામાંથી કયું પ્લિયોટ્રોપીનું ઉદાહરણ છે, જ્યાં એક જ જનીનના મ્યુટેશનથી પ્રાણીઓમાં રંગ, આકાર અને વર્તણૂક પર અસર થાય છે?", "opts": ["ડ્રોસોફિલામાં વ્હાઇટ આઇ જનીન", "મનુષ્યમાં હિમોફિલિયા જનીન", "મકાઈમાં કલરલેસ એલ્યુરોન જનીન", "મનુષ્યમાં સિકલ સેલ એનિમિયા જનીન"], "ans": 0, "exp": "ડ્રોસોફિલામાં વ્હાઇટ આઇ જનીનના મ્યુટેશનથી આંખોનો રંગ સફેદ થાય છે, પરંતુ તેના સાથે સાથે ડ્રોસોફિલાની વર્તણૂક અને જીવનચક્ર પર પણ અસર થાય છે, જે પ્લિયોટ્રોપીનું ઉદાહરણ છે. હિમોફિલિયા જનીન ફક્ત રક્ત ગંઠાવવાની પ્રક્રિયાને પ્રભાવિત કરે છે, કલરલેસ એલ્યુરોન જનીન ફક્ત મકાઈના બીજના રંગને પ્રભાવિત કરે છે, અને સિકલ સેલ એનિમિયા જનીન મુખ્યત્વે લોહીના કોષોના આકારને પ્રભાવિત કરે છે.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને જનીનિક રોગો", "ch": ""}, {"q": "મનુષ્યમાં સિકલ સેલ એનિમિયામાં, હિમોગ્લોબિન જનીનના મ્યુટેશનના કારણે નીચેનામાંથી કયું લક્ષણ પ્લિયોટ્રોપીના કારણે થતું નથી?", "opts": ["લોહીમાં હિમોગ્લોબિનની માત્રામાં ઘટાડો થવો", "લાલ રક્તકણોનો આકાર સિકલ જેવો થવો", "પ્લીહા અને યકૃતનું વિસ્તરણ થવો", "રક્તમાં ગ્લુકોઝનું પ્રમાણ વધવું"], "ans": 3, "exp": "સિકલ સેલ એનિમિયા હિમોગ્લોબિન જનીનના મ્યુટેશનના કારણે થતો રોગ છે, જેમાં પ્લિયોટ્રોપી જોવા મળે છે. આ મ્યુટેશનના કારણે લોહીમાં હિમોગ્લોબિનની માત્રામાં ઘટાડો (A), લાલ રક્તકણોનો આકાર સિકલ જેવો થવો (B), અને પ્લીહા અને યકૃતનું વિસ્તરણ (C) થાય છે. પરંતુ રક્તમાં ગ્લુકોઝનું પ્રમાણ વધવું (D) આ રોગ સાથે સીધો સંબંધ ધરાવતું નથી, એટલે કે તે પ્લિયોટ્રોપીના કારણે થતું નથી.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "ફિનાઇલકેટોન્યુરિયા (PKU) રોગમાં, ફિનાઇલઅલેનિન હાઇડ્રોક્સિલેઝ ઉત્સેચકની ઉણપના કારણે કયા લક્ષણો પ્લિયોટ્રોપીના પરિણામ સ્વરૂપે જોવા મળે છે?", "opts": ["મગજના વિકાસમાં ખામી, ત્વચાનો હળવો રંગ, અને યકૃતની ખરાબી", "હૃદયની નબળાઈ, કિડનીની ખામી, અને રક્તમાં શર્કરાનો વધારો", "હાડકાંની નબળાઈ, વાળનો ખરાબ વિકાસ, અને ચેતાતંત્રની ખામી", "આંખોની રોશની ઘટી જવી, કાનની સુનાવણી ઘટી જવી, અને પાચનતંત્રની ખામી"], "ans": 0, "exp": "ફિનાઇલકેટોન્યુરિયા (PKU)માં ફિનાઇલઅલેનિન હાઇડ્રોક્સિલેઝ ઉત્સેચકની ઉણપના કારણે ફિનાઇલઅલેનિનનું રૂપાંતર ટાયરોઝીનમાં થતું નથી, જેના કારણે મગજના વિકાસમાં ખામી, ત્વચાનો હળવો રંગ, અને યકૃતની ખરાબી જેવા લક્ષણો જોવા મળે છે. બાકીના વિકલ્પો PKU સાથે સંબંધિત નથી.", "ref": "Std 12 - Chapter 5: અનુવંશિકતા અને વિકાસ", "ch": ""}, {"q": "સિકલ સેલ એનિમિયામાં, હિમોગ્લોબિન જનીનના મ્યુટેશનના કારણે કયા લક્ષણો પ્લિયોટ્રોપીના પરિણામ સ્વરૂપે જોવા મળે છે?", "opts": ["રક્તકણોનો આકાર સિકલ જેવો થવો, રક્તના પ્રવાહમાં અડચણ, અને પીડા", "રક્તમાં હિમોગ્લોબિનની માત્રા વધી જવી, ત્વચાનો રંગ કાળો પડવો, અને હૃદયની ગતિ વધી જવી", "રક્તકણોનો નાશ થવો, યકૃતનું સૂજવું, અને શ્વસનમાં તકલીફ", "રક્તમાં ઓક્સિજનની માત્રા ઘટી જવી, હાડકાંની નબળાઈ, અને ચેતાતંત્રની ખામી"], "ans": 0, "exp": "સિકલ સેલ એનિમિયામાં, હિમોગ્લોબિન જનીનના મ્યુટેશનના કારણે રક્તકણોનો આકાર સિકલ જેવો થાય છે, જેના કારણે રક્તના પ્રવાહમાં અડચણ અને પીડા જેવા લક્ષણો જોવા મળે છે. બાકીના વિકલ્પો સિકલ સેલ એનિમિયા સાથે સંબંધિત નથી.", "ref": "Std 12 - Chapter 5: અનુવંશિકતા અને વિકાસ", "ch": ""}, {"q": "મનુષ્યમાં 'મારફેન સિન્ડ્રોમ' (Marfan syndrome) નામના રોગમાં, ફાઇબ્રિલિન-1 (FBN1) જનીનના મ્યુટેશનના કારણે નીચેનામાંથી ક્યાં લક્ષણો પ્લિયોટ્રોપીના પરિણામ સ્વરૂપે જોવા મળે છે?", "opts": ["હૃદયના વાલ્વમાં ખામી, આંખના લેન્સનું વિક્ષેપણ અને હાડકાંની લંબાઈમાં અસાધારણ વધારો", "રક્તમાં હિમોગ્લોબિનની ઉણપ, ત્વચા પર પીગમેન્ટેશન અને કિડનીની ખામી", "મગજની વૃદ્ધિમાં અવરોધ, સ્નાયુઓની નબળાઈ અને શ્વસનતંત્રની ખામી", "યકૃતની ખામી, પાચનતંત્રમાં અવરોધ અને ચેતાતંત્રની ખામી"], "ans": 0, "exp": "મારફેન સિન્ડ્રોમમાં ફાઇબ્રિલિન-1 (FBN1) જનીનના મ્યુટેશનના કારણે પ્લિયોટ્રોપી જોવા મળે છે, જેમાં હૃદયના વાલ્વમાં ખામી (ઉદા. મિત્રલ વાલ્વ પ્રોલેપ્સ), આંખના લેન્સનું વિક્ષેપણ (ઉદા. એક્ટોપિયા લેન્ટિસ) અને હાડકાંની લંબાઈમાં અસાધારણ વધારો (ઉદા. લાંબા અંગો અને ઉંચાઈ) જેવા લક્ષણો પ્રભાવિત થાય છે. બાકીના વિકલ્પો અન્ય રોગો અથવા જનીનની ખામી સાથે સંબંધિત છે, જેમ કે B) સિકલ સેલ એનિમિયા અથવા થેલેસેમિયા, C) મસ્ક્યુલર ડિસ્ટ્રોફી અથવા ડાઉન સિન્ડ્રોમ, D) સિસ્ટિક ફાઇબ્રોસિસ અથવા મેટાબોલિક ડિસઓર્ડર.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતા", "ch": ""}, {"q": "પ્લિયોટ્રોપીના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન સત્ય છે જ્યારે એક જ જનીનના મ્યુટેશનથી વિવિધ અંગતંત્રો પ્રભાવિત થાય છે?", "opts": ["મ્યુટેશન ધરાવતા જનીનનું પ્રોટીન ઉત્પાદન બંધ થાય છે, પરિણામે તમામ લક્ષણો એકસરખા પ્રભાવિત થાય છે.", "મ્યુટેશન ધરાવતા જનીનનું પ્રોટીન વિવિધ પેશીઓમાં ભિન્ન ભૂમિકા ભજવે છે, પરિણામે વિવિધ લક્ષણો પ્રભાવિત થાય છે.", "મ્યુટેશન ધરાવતા જનીનનું પ્રોટીન ફક્ત એક જ પેશીમાં અસર કરે છે, પરંતુ તે પેશીના વિવિધ કોષોમાં વિવિધ લક્ષણો દર્શાવે છે.", "મ્યુટેશન ધરાવતા જનીનનું પ્રોટીન ફક્ત હોર્મોનના સ્તરને પ્રભાવિત કરે છે, પરિણામે ફક્ત ચયાપચય પ્રક્રિયાઓ પ્રભાવિત થાય છે."], "ans": 1, "exp": "પ્લિયોટ્રોપીમાં, એક જ જનીનના મ્યુટેશનથી ઉત્પન્ન થતું પ્રોટીન વિવિધ પેશીઓ અથવા અંગતંત્રોમાં ભિન્ન ભૂમિકા ભજવી શકે છે, પરિણામે વિવિધ લક્ષણો પ્રભાવિત થાય છે. ઉદાહરણ તરીકે, ફાઇબ્રિલિન-1 પ્રોટીન હૃદય, આંખ અને હાડકાંમાં ભિન્ન કાર્યો કરે છે. A) ખોટું છે કારણ કે મ્યુટેશનથી પ્રોટીન ઉત્પાદન બંધ થતું નથી, પરંતુ તેની કાર્યક્ષમતા બદલાય છે. C) ખોટું છે કારણ કે પ્લિયોટ્રોપીમાં એક જનીન વિવિધ પેશીઓને પ્રભાવિત કરે છે, ફક્ત એક પેશીને નહીં. D) ખોટું છે કારણ કે પ્લિયોટ્રોપી ફક્ત હોર્મોન અથવા ચયાપચય પ્રક્રિયાઓ સુધી મર્યાદિત નથી, પરંતુ વિવિધ શારીરિક લક્ષણોને પ્રભાવિત કરે છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતા", "ch": ""}, {"q": "નીચેનામાંથી કયું પ્લિયોટ્રોપીનું ઉદાહરણ છે જ્યાં એક જ જનીનના મ્યુટેશનથી પ્ર let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
