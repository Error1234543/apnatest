<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>સટન અને બોવેરી</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>સટન અને બોવેરી</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">સટન અને બોવેરી</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 19 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 19 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "સટન અને બોવેરીના પ્રયોગો દરમિયાન, કયા જીવમાં વર્ણસૂત્રોની ગતિનો અભ્યાસ કરવામાં આવ્યો હતો, જેના પરિણામે કોષવિભાજન દરમિયાન વર્ણસૂત્રોની ભૂમિકા સ્પષ્ટ થઈ?", "opts": ["ડ્રોસોફિલા મેલાનોગેસ્ટર", "એસ્કેરિસ લુંબ્રિકોઈડ્સ", "હાઇડ્રા વલ્ગેરિસ", "પેરામીશિયમ કોડેટમ"], "ans": 1, "exp": "સટન અને બોવેરી એ એસ્કેરિસ લુંબ્રિકોઈડ્સ (ગોલ કૃમિ) પર પ્રયોગો કર્યા હતા. તેમના અભ્યાસમાં કોષવિભાજન દરમિયાન વર્ણસૂત્રોની ગતિ અને વર્તણૂકનો અભ્યાસ કર્યો, જેના પરિણામે વર્ણસૂત્રોની અનુવંશિકતામાં ભૂમિકા સ્પષ્ટ થઈ. ડ્રોસોફિલા (A) મોરગનના પ્રયોગો સાથે સંકળાયેલ છે, હાઇડ્રા (C) અને પેરામીશિયમ (D) આ પ્રયોગો સાથે સીધા સંકળાયેલા નથી.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "સટન અને બોવેરીના કામના આધારે, કયું વિધાન સૌથી યોગ્ય રીતે વર્ણસૂત્રીય સિદ્ધાંતનું સારાંશ આપે છે?", "opts": ["જનીનો DNAના બનેલા હોય છે અને તે વર્ણસૂત્રો પર સ્થિત હોય છે", "વર્ણસૂત્રો કોષવિભાજન દરમિયાન સમાન રીતે વહેંચાય છે અને અનુવંશિક લક્ષણોના વહન માટે જવાબદાર છે", "પ્રોટીન સંશ્લેષણ માટે વર્ણસૂત્રો જવાબદાર છે", "વર્ણસૂત્રો કેવળ કોષકેન્દ્રમાં જ સ્થિત હોય છે અને કોષવિભાજન દરમિયાન નાશ પામે છે"], "ans": 1, "exp": "સટન અને બોવેરીના પ્રયોગોએ સિદ્ધ કર્યું કે વર્ણસૂત્રો કોષવિભાજન દરમિયાન સમાન રીતે વહેંચાય છે અને અનુવંશિક લક્ષણોના વહન માટે જવાબદાર છે. જનીનો DNAના બનેલા હોય છે (A) તે એવરીના પ્રયોગો પછી સ્પષ્ટ થયું, પ્રોટીન સંશ્લેષણ (C) વર્ણસૂત્રોની ભૂમિકા નહીં પરંતુ જનીનની ભૂમિકા છે, અને વર્ણસૂત્રો કોષવિભાજન દરમિયાન નાશ પામતાં નથી (D).", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "સટન અને બોવેરીના પ્રયોગો પહેલાં, કયા વૈજ્ઞાનિકના મત અનુસાર અનુવંશિકતા માટે જવાબદાર પદાર્થ 'પેંગ્મા' હતો?", "opts": ["ચાર્લ્સ ડાર્વિન", "ગ્રેગર મેન્ડલ", "કાર્લ નેગેલી", "હ્યુગો ડી વ્રીસ"], "ans": 2, "exp": "કાર્લ નેગેલી એવું માનતા હતા કે અનુવંશિકતાના વાહક તરીકે 'પેંગ્મા' નામનો પદાર્થ કોષરસમાં સ્થિત હોય છે. સટન અને બોવેરીના પ્રયોગો પછી જ વર્ણસૂત્રોની ભૂમિકા સ્પષ્ટ થઈ. ડાર્વિન (A) ઉત્ક્રાંતિના સિદ્ધાંત સાથે, મેન્ડલ (B) અનુવંશિકતાના નિયમો સાથે, અને ડી વ્રીસ (D) મ્યુટેશન સિદ્ધાંત સાથે સંકળાયેલ છે.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "સટન અને બોવેરીના કામને આધારે, કયું વિધાન વર્ણસૂત્રીય સિદ્ધાંતના અપવાદ તરીકે ગણી શકાય?", "opts": ["વર્ણસૂત્રો કોષકેન્દ્રમાં સ્થિત હોય છે", "વર્ણસૂત્રો કોષવિભાજન દરમિયાન દેખાય છે", "માદા અને પિતા બંને પાસેથી સમાન સંખ્યામાં વર્ણસૂત્રો સંતાનમાં પહોંચે છે", "વર્ણસૂત્રોની સંખ્યા પ્રજાતિ અનુસાર નિશ્ચિત હોય છે"], "ans": 2, "exp": "સટન અને બોવેરીના પ્રયોગો પછી સ્પષ્ટ થયું કે વર્ણસૂત્રો કોષકેન્દ્રમાં સ્થિત હોય છે (A), કોષવિભાજન દરમિયાન દેખાય છે (B), અને પ્રજાતિ અનુસાર નિશ્ચિત સંખ્યામાં હોય છે (D). પરંતુ માદા અને પિતા પાસેથી સમાન સંખ્યામાં વર્ણસૂત્રો પહોંચે છે તે સંપૂર્ણ સત્ય નથી, કારણ કે લિંગી વર્ણસૂત્રો (X અને Y)ના કિસ્સામાં અપવાદ જોવા મળે છે.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "સટન અને બોવેરીના પ્રયોગોના આધારે, કયું વિધાન વર્ણસૂત્રો અને જનીનો વચ્ચેના સંબંધને સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["વર્ણસૂત્રો જનીનોના વાહક છે અને કોષવિભાજન દરમિયાન સમાન રીતે વહેંચાય છે", "જનીનો વર્ણસૂત્રો પર સ્થિત હોય છે અને કેવળ પ્રોટીન સંશ્લેષણ માટે જવાબદાર હોય છે", "વર્ણસૂત્રો અને જનીનો એ બે સ્વતંત્ર એન્ટિટી છે જે કોઈ સંબંધ ધરાવતી નથી", "વર્ણસૂત્રો કોષકેન્દ્રમાં સ્થિત હોય છે અને જનીનો કોષરસમાં સ્થિત હોય છે"], "ans": 0, "exp": "સટન અને બોવેરીના પ્રયોગોએ સિદ્ધ કર્યું કે વર્ણસૂત્રો જનીનોના વાહક છે અને કોષવિભાજન દરમિયાન સમાન રીતે વહેંચાય છે. જનીનો વર્ણસૂત્રો પર સ્થિત હોય છે (B) ખરું છે, પરંતુ તે કેવળ પ્રોટીન સંશ્લેષણ માટે જવાબદાર નથી. વર્ણસૂત્રો અને જનીનો સ્વતંત્ર નથી (C), અને જનીનો કોષરસમાં સ્થિત નથી (D).", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "સટન અને બોવેરીના સંશોધન અનુસાર, જો કોષમાં વર્ણસૂત્રોની સંખ્યા અચાનક દોઢગણી થઈ જાય તો શું પરિણામ થશે?", "opts": ["કોષમાં જનીનની સંખ્યા સમાન રહેશે પરંતુ પ્રોટીન સંશ્લેષણની ગતિ ઘટશે", "કોષમાં જનીનની નકલો વધારીને પ્રોટીન સંશ્લેષણની ગતિ વધશે", "કોષમાં વર્ણસૂત્રોની અસંતુલનને કારણે કોષવિભાજન અટકી જશે", "કોષમાં ઉત્સેચકની ક્રિયાશીલતા પર કોઈ અસર થશે નહીં"], "ans": 2, "exp": "સટન અને બોવેરીના સંશોધન અનુસાર, વર્ણસૂત્રોની સંખ્યામાં અચાનક વધારો અથવા ઘટાડો કોષવિભાજનને અસર કરે છે. વર્ણસૂત્રોની અસંતુલનને કારણે કોષવિભાજન અટકી જાય છે અથવા અસાધારણ રીતે થાય છે. આથી, વિકલ્પ C સાચો છે. વિકલ્પ A અને B ખોટા છે કારણ કે જનીનની સંખ્યા વધારીને પ્રોટીન સંશ્લેષણની ગતિ પર સીધી અસર થતી નથી, અને વિકલ્પ D ખોટો છે કારણ કે ઉત્સેચકની ક્રિયાશીલતા પર અસર થાય જ છે.", "ref": "Std 12 - અધ્યાય 5: વર્ણસૂત્ર અને DNA", "ch": ""}, {"q": "સટન અને બોવેરીના કામના આધારે, કયું વિધાન વર્ણસૂત્રીય સિદ્ધાંતના અપવાદ તરીકે ગણી શકાય?", "opts": ["વર્ણસૂત્રો કોષકેન્દ્રમાં સ્થિત હોય છે", "વર્ણસૂત્રોની સંખ્યા પ્રજાતિ અનુસાર નિશ્ચિત હોય છે", "વર્ણસૂત્રોની ગતિ કોષવિભાજન દરમિયાન સરખી રીતે થતી નથી", "વર્ણસૂત્રો જનીનના વાહક તરીકે કામ કરે છે"], "ans": 2, "exp": "સટન અને બોવેરીના સંશોધન અનુસાર, વર્ણસૂત્રોની ગતિ કોષવિભાજન દરમિયાન સરખી રીતે થતી નથી, જે વર્ણસૂત્રીય સિદ્ધાંતના અપવાદ તરીકે ગણી શકાય. આથી, વિકલ્પ C સાચો છે. વિકલ્પ A, B, અને D સામાન્ય રીતે સ્વીકાર્ય સિદ્ધાંતો છે અને અપવાદ નથી.", "ref": "Std 12 - અધ્યાય 5: વર્ણસૂત્ર અને DNA", "ch": ""}, {"q": "સટન અને બોવેરીના સંશોધન અનુસાર, જો કોષમાં એક વર્ણસૂત્ર ગુમાવી દેવામાં આવે તો શું થશે?", "opts": ["કોષમાં જનીનની સંખ્યા ઘટશે પરંતુ કોષ જીવિત રહેશે", "કોષમાં જનીનની સંખ્યા ઘટશે અને કોષ મૃત્યુ પામશે", "કોષમાં જનીનની સંખ્યા સમાન રહેશે પરંતુ કોષવિભાજન અટકી જશે", "કોષમાં જનીનની સંખ્યા વધશે"], "ans": 1, "exp": "સટન અને બોવેરીના સંશોધન અનુસાર, જો કોષમાં એક વર્ણસૂત્ર ગુમાવી દેવામાં આવે તો કોષમાં જનીનની સંખ્યા ઘટશે અને કોષ મૃત્યુ પામશે. આથી, વિકલ્પ B સાચો છે. વિકલ્પ A ખોટો છે કારણ કે કોષ જીવિત રહેશે નહીં. વિકલ્પ C ખોટો છે કારણ કે જનીનની સંખ્યા ઘટશે. વિકલ્પ D ખોટો છે કારણ કે જનીનની સંખ્યા ઘટશે, વધશે નહીં.", "ref": "Std 12 - અધ્યાય 5: વર્ણસૂત્ર અને DNA", "ch": ""}, {"q": "સટન અને બોવેરીના સંશોધન અનુસાર, જો કોષવિભાજન દરમિયાન વર્ણસૂત્રોની ગતિ અવરોધાય તો કયો પરિણામ સૌથી યોગ્ય રીતે થશે?", "opts": ["કોષમાં DNAની પ્રતિકૃતિ બંધ થઈ જશે અને કોષ મૃત્યુ પામશે", "કોષમાં વર્ણસૂત્રોની સંખ્યા અચાનક બમણી થશે અને કોષ કૅન્સરગ્રસ્ત બનશે", "કોષમાં વર્ણસૂત્રોની અસમાન વિતરણ થશે અને અનિયમિત કોષવિભાજન થશે", "કોષમાં જનીનની અભિવ્યક્તિ બંધ થશે અને કોષ સ્થિર અવસ્થામાં રહેશે"], "ans": 2, "exp": "સટન અને બોવેરીના પ્રયોગો એ સિદ્ધ કર્યું કે વર્ણસૂત્રો કોષવિભાજન દરમિયાન સમાન રીતે વહેંચાય છે. જો વર્ણસૂત્રોની ગતિ અવરોધાય તો અસમાન વિતરણ થશે, જે અનિયમિત કોષવિભાજન તરફ દોરી જશે. A) ખોટું છે કારણ કે DNA પ્રતિકૃતિ વર્ણસૂત્ર ગતિ પર આધારિત નથી. B) ખોટું છે કારણ કે વર્ણસૂત્રોની સંખ્યા બમણી થવી એ કૅન્સરનું કારણ નથી, પરંતુ અસમાન વિતરણ છે. D) ખોટું છે કારણ કે જનીન અભિવ્યક્તિ વર્ણસૂત્ર ગતિ પર આધાર રાખતી નથી.", "ref": "Std 12 - પ્રકરણ 4: કોષવિભાજન", "ch": ""}, {"q": "સટન અને બોવેરીના કામ અનુસાર, કયું વિધાન વર્ણસૂત્રીય સિદ્ધાંતના અપવાદ તરીકે ગણી શકાય નહીં?", "opts": ["વર્ણસૂત્રો કોષવિભાજન દરમિયાન સમાન રીતે વહેંચાય છે", "વર્ણસૂત્રોની સંખ્યા પ્રજાતિ અનુસાર નિશ્ચિત હોય છે", "વર્ણસૂત્રો કોષકેન્દ્રમાં સ્થિત હોય છે અને તે જનીનના વાહક હોય છે", "વર્ણસૂત્રોની ગતિ કોષવિભાજન દરમિયાન યાદચ્છિક હોય છે"], "ans": 3, "exp": "સટન અને બોવેરીના સંશોધન અનુસાર, વર્ણસૂત્રોની ગતિ કોષવિભાજન દરમિયાન યાદચ્છિક નથી, પરંતુ નિયમિત અને સુવ્યવસ્થિત હોય છે. A, B, અને C વિધાનો વર્ણસૂત્રીય સિદ્ધાંતના મૂળભૂત તત્વો છે, જ્યારે D વિધાન સિદ્ધાંતના અપવાદ તરીકે ગણી શકાય નહીં કારણ કે તે સિદ્ધાંતની મૂળ ભાવના વિરુદ્ધ છે.", "ref": "Std 12 - પ્રકરણ 4: કોષવિભાજન", "ch": ""}, {"q": "સટન અને બોવેરીના પ્રયોગોના આધારે, નીચેનામાંથી કયું વિધાન વર્ણસૂત્રીય સિદ્ધાંતના અપવાદ તરીકે ગણી શકાય નહીં?", "opts": ["કોષમાં વર્ણસૂત્રોની સંખ્યા અચાનક દોઢગણી થવી", "કોષમાં એક વર્ણસૂત્ર ગુમાવી દેવામાં આવવું", "કોષવિભાજન દરમિયાન વર્ણસૂત્રોની ગતિ અવરોધાવી", "કોષમાં વર્ણસૂત્રોની સંખ્યા અચાનક અડધી થવી"], "ans": 3, "exp": "સટન અને બોવેરીના સંશોધન અનુસાર, વર્ણસૂત્રોની સંખ્યા અચાનક અડધી થવી એ વર્ણસૂત્રીય સિદ્ધાંતના અપવાદ તરીકે ગણી શકાય નહીં, કારણ કે વર્ણસૂત્રોની સંખ્યા અડધી થવી એ કોષની જીવનક્રિયાઓ માટે ઘાતક સાબિત થાય છે. વિકલ્પ A, B, અને C અપવાદ તરીકે ગણી શકાય છે કારણ કે તે વર્ણસૂત્રીય સિદ્ધાંતના અપવાદો છે.", "ref": "Std 12 - અધ્યાય 3: વર્ણસૂત્ર અને વર્ણસૂત્રીય સિદ્ધાંત", "ch": ""}, {"q": "સટન અને બોવેરીના કામના આધારે, નીચેનામાંથી કયું વિધાન વર્ણસૂત્રો અને જનીનો વચ્ચેના સંબંધને સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["વર્ણસૂત્રો જનીનોના વાહક છે અને કોષવિભાજન દરમિયાન તેની સમાન વિતરણ થાય છે", "જનીનો વર્ણસૂત્રો પર આવેલા છે અને કોષવિભાજન દરમિયાન તેની અસમાન વિતરણ થાય છે", "વર્ણસૂત્રો અને જનીનો વચ્ચે કોઈ સંબંધ નથી", "વર્ણસૂત્રો જનીનોના વાહક નથી, પરંતુ કોષમાં તેની ઉપસ્થિતિ જનીનોની ક્રિયાઓને અસર કરે છે"], "ans": 0, "exp": "સટન અને બોવેરીના સંશોધન અનુસાર, વર્ણસૂત્રો જનીનોના વાહક છે અને કોષવિભાજન દરમિયાન તેની સમાન વિતરણ થાય છે, જેના કારણે અનુવંશિક લક્ષણો પેઢી દર પેઢી પસાર થાય છે. વિકલ્પ B, C, અને D અયોગ્ય છે કારણ કે તે વર્ણસૂત્રો અને જનીનો વચ્ચેના સંબંધને યોગ્ય રીતે વર્ણવતા નથી.", "ref": "Std 12 - અધ્યાય 3: વર્ણસૂત્ર અને વર્ણસૂત્રીય સિદ્ધાંત", "ch": ""}, {"q": "સટન અને બોવેરીના સંશોધન અનુસાર, જો એક કોષમાં બે વર્ણસૂત્રો એટલા નજીક આવી જાય કે તેઓ એકબીજા સાથે જોડાઈ જાય, તો નીચેનામાંથી કયું પરિણામ સૌથી યોગ્ય રીતે અપેક્ષિત ગણી શકાય?", "opts": ["કોષમાં જનીનની સંખ્યા દોઢગણી થશે, પરંતુ કોષવિભાજન સામાન્ય રીતે ચાલુ રહેશે", "કોષવિભાજન દરમિયાન વર્ણસૂત્રોની ગતિ અસંતુલિત થશે, જેથી કોષ મૃત્યુ તરફ દોરી જશે", "વર્ણસૂત્રોનું સંયોજન થવાને કારણે નવા જનીનની રચના થશે, જેથી કોષમાં ઉત્ક્રાંતિની શક્યતા વધશે", "કોષમાં વર્ણસૂત્રોની સંખ્યા અચાનક ઘટશે, પરંતુ કોષ જીવિત રહેશે"], "ans": 1, "exp": "સટન અને બોવેરીના સંશોધન અનુસાર, વર્ણસૂત્રોની ગતિ કોષવિભાજન દરમિયાન નિયંત્રિત અને સંતુલિત હોવી જોઈએ. જો બે વર્ણસૂત્રો એકબીજા સાથે જોડાઈ જાય, તો કોષવિભાજન દરમિયાન તેમની ગતિ અસંતુલિત થશે, જેથી કોષ મૃત્યુ તરફ દોરી જશે. આમ, વિકલ્પ B યોગ્ય છે. વિકલ્પ A, C, અને D અયોગ્ય છે કારણ કે તેઓ કોષવિભાજનની પ્રક્રિયા અને વર્ણસૂત્રોની ભૂમિકાને સરળતાથી સમજાવતાં નથી.", "ref": "Std 12 - અધ્યાય 3: વર્ણસૂત્ર અને DNA", "ch": ""}, {"q": "સટન અને બોવેરીએ તેમના વર્ણસૂત્રીય સિદ્ધાંતમાં દર્શાવ્યું કે જનીનો વર્ણસૂત્રો પર સ્થિત હોય છે. આ સિદ્ધાંતને આધારે, નીચેનામાંથી કયું વિધાન **સાચું નથી**? (નોંધ: અહીં વર્ણસૂત્રીય વર્તણૂક અને જનીનિક વર્તણૂક વચ્ચેનો સંબંધ ધ્યાનમાં લો.)", "opts": ["વર્ણસૂત્રોનું અલગીકરણ મેન્ડલના વિશ્લેષણના નિયમને સમર્થન આપે છે.", "વર્ણસૂત્રો પર જનીનોની રેખીય ગોઠવણી હોય છે, જે જનીનિક નકશા બનાવવામાં મદદરૂપ થાય છે.", "વર્ણસૂત્ર   document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';

  }).join('');

  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
