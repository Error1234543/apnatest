<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>જૈવ નિયંત્રણ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>જૈવ નિયંત્રણ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">જૈવ નિયંત્રણ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "જૈવ નિયંત્રણમાં, કયો હોર્મોન પાદપમાં કોષવિભાજનને ઉત્તેજિત કરે છે અને તેનું સ્રાવ મુખ્યત્વે કોષકેન્દ્રીય DNA દ્વારા નિયંત્રિત થાય છે?", "opts": ["ઓક્સિન", "જિબરેલિન", "સાયટોકાઈનિન", "એબ્સિસિક એસિડ"], "ans": 2, "exp": "સાયટોકાઈનિન હોર્મોન પાદપમાં કોષવિભાજનને ઉત્તેજિત કરે છે અને તેનું સ્રાવ કોષકેન્દ્રીય DNA દ્વારા નિયંત્રિત થાય છે. ઓક્સિન (A) વૃદ્ધિ અને વિકાસમાં મહત્વની ભૂમિકા ભજવે છે, જિબરેલિન (B) બીજના અંકુરણ અને લાંબી વૃદ્ધિને ઉત્તેજિત કરે છે, એબ્સિસિક એસિડ (D) વૃદ્ધિને અવરોધે છે અને પાણીના તણાવ પ્રત્યે પ્રતિક્રિયા આપે છે.", "ref": "Std 12 - અધ્યાય 15: પાદપ વૃદ્ધિ અને વિકાસ", "ch": ""}, {"q": "જૈવ નિયંત્રણમાં, કયો ઉત્સેચક પ્રોટીન સંશ્લેષણને નિયંત્રિત કરે છે અને તેનું નિયમન મુખ્યત્વે જનીન દ્વારા થાય છે?", "opts": ["એમાઇલેઝ", "RNA પોલિમરેઝ", "કેટલેઝ", "લાઇપેઝ"], "ans": 1, "exp": "RNA પોલિમરેઝ ઉત્સેચક પ્રોટીન સંશ્લેષણને નિયંત્રિત કરે છે અને તેનું નિયમન મુખ્યત્વે જનીન દ્વારા થાય છે. એમાઇલેઝ (A) કાર્બોદિતના પાચનમાં મદદ કરે છે, કેટલેઝ (C) હાઇડ્રોજન પેરોક્સાઇડને પાણી અને ઓક્સિજનમાં તોડે છે, લાઇપેઝ (D) ચરબીના પાચનમાં મદદ કરે છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વંશપરંપરા", "ch": ""}, {"q": "પાદપમાં જૈવ નિયંત્રણ માટે કયો હોર્મોન પર્ણના પતનને ઉત્તેજિત કરે છે અને તેનું સ્રાવ પર્યાવરણીય પરિબળો દ્વારા પ્રભાવિત થાય છે?", "opts": ["ઇથિલીન", "ઓક્સિન", "જિબરેલિન", "સાયટોકાઈનિન"], "ans": 0, "exp": "ઇથિલીન હોર્મોન પર્ણના પતનને ઉત્તેજિત કરે છે અને તેનું સ્રાવ પર્યાવરણીય પરિબળો જેવા કે તણાવ, રોગ અથવા વૃદ્ધત્વ દ્વારા પ્રભાવિત થાય છે. ઓક્સિન (B) વૃદ્ધિ અને વિકાસમાં મહત્વની ભૂમિકા ભજવે છે, જિબરેલિન (C) બીજના અંકુરણ અને લાંબી વૃદ્ધિને ઉત્તેજિત કરે છે, સાયટોકાઈનિન (D) કોષવિભાજનને ઉત્તેજિત કરે છે.", "ref": "Std 12 - અધ્યાય 15: પાદપ વૃદ્ધિ અને વિકાસ", "ch": ""}, {"q": "જૈવ નિયંત્રણમાં, કયો હોર્મોન પ્રાણીમાં ચયાપચય ક્રિયાઓને નિયંત્રિત કરે છે અને તેનું સ્રાવ હાઇપોથેલેમસ દ્વારા નિયંત્રિત થાય છે?", "opts": ["ઇન્સ્યુલિન", "થાઇરોક્સિન", "એડ્રિનેલિન", "વૃદ્ધિ હોર્મોન"], "ans": 1, "exp": "થાઇરોક્સિન હોર્મોન પ્રાણીમાં ચયાપચય ક્રિયાઓને નિયંત્રિત કરે છે અને તેનું સ્રાવ હાઇપોથેલેમસ દ્વારા નિયંત્રિત થાય છે. ઇન્સ્યુલિન (A) રક્તમાં ગ્લુકોઝના સ્તરને નિયંત્રિત કરે છે, એડ્રિનેલિન (C) તણાવ અને આઘાત પ્રત્યે પ્રતિક્રિયા આપે છે, વૃદ્ધિ હોર્મોન (D) વૃદ્ધિ અને વિકાસને ઉત્તેજિત કરે છે.", "ref": "Std 12 - અધ્યાય 22: પ્રાણીમાં નિયમન અને સંકલન", "ch": ""}, {"q": "જૈવ નિયંત્રણમાં, કયો ઉત્સેચક DNAના રિપ્લિકેશનને નિયંત્રિત કરે છે અને તેનું નિયમન કોષચક્ર દ્વારા થાય છે?", "opts": ["DNA પોલિમરેઝ", "RNA પોલિમરેઝ", "હેલિકેઝ", "લાઇગેઝ"], "ans": 0, "exp": "DNA પોલિમરેઝ ઉત્સેચક DNAના રિપ્લિકેશનને નિયંત્રિત કરે છે અને તેનું નિયમન કોષચક્ર દ્વારા થાય છે. RNA પોલિમરેઝ (B) RNA સંશ્લેષણમાં મદદ કરે છે, હેલિકેઝ (C) DNAના ડબલ હેલિક્સને ખોલે છે, લાઇગેઝ (D) DNAના ટુકડાઓને જોડે છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વંશપરંપરા", "ch": ""}, {"q": "પાદપમાં જૈવ નિયંત્રણ દરમિયાન, ઓક્સિન અને જિબરેલિન વચ્ચેનો સહસંબંધ કયા પ્રક્રિયામાં સૌથી વધુ જોવા મળે છે?", "opts": ["પર્ણના પતનમાં", "મૂળના વિકાસમાં", "ફળના પરિપક્વતામાં", "પ્રકાશસંશ્લેષણની દરમાં"], "ans": 2, "exp": "જિબરેલિન અને ઓક્સિન બંને ફળના પરિપક્વતામાં મહત્વની ભૂમિકા ભજવે છે. ઓક્સિન ફળના વિકાસને ઉત્તેજિત કરે છે, જ્યારે જિબરેલિન ફળના કદ અને આકારને નિયંત્રિત કરે છે. પર્ણના પતનમાં એબ્સિસિક એસિડ મુખ્ય ભૂમિકા ભજવે છે, મૂળના વિકાસમાં ઓક્સિન મુખ્ય હોર્મોન છે, અને પ્રકાશસંશ્લેષણની દર પર હોર્મોનનો સીધો પ્રભાવ નહીંવત હોય છે.", "ref": "Std 12 - અધ્યાય 15: પાદપ વિકાસ અને ચળવળ", "ch": ""}, {"q": "પ્રાણીમાં, કયો હોર્મોન જૈવ નિયંત્રણ દ્વારા કોષીય ચયાપચયને નિયંત્રિત કરતી વખતે, ગ્લુકોઝના સંગ્રહણને ઉત્તેજિત કરે છે?", "opts": ["ઇન્સ્યુલિન", "ગ્લુકેગોન", "એડ્રિનેલિન", "થાયરોક્સિન"], "ans": 0, "exp": "ઇન્સ્યુલિન હોર્મોન કોષીય ચયાપચયને નિયંત્રિત કરે છે અને ગ્લુકોઝના સંગ્રહણને ઉત્તેજિત કરે છે, જે રક્તમાં ગ્લુકોઝનું સ્તર ઘટાડે છે. ગ્લુકેગોન ગ્લુકોઝના ઉત્પાદનને ઉત્તેજિત કરે છે, એડ્રિનેલિન તણાવ પ્રતિભાવમાં ગ્લુકોઝનું સ્તર વધારે છે, અને થાયરોક્સિન ચયાપચયની દરને નિયંત્રિત કરે છે પરંતુ ગ્લુકોઝના સંગ્રહણને સીધો પ્રભાવ નથી.", "ref": "Std 12 - અધ્યાય 22: પ્રાણી સંકેત અને નિયંત્રણ", "ch": ""}, {"q": "જૈવ નિયંત્રણમાં, કયો ઉત્સેચક DNAના પ્રતિકૃતિ (રિપ્લિકેશન) દરમિયાન, DNA પોલિમરેઝની ક્રિયામાં અવરોધ ઉભો કરે છે?", "opts": ["હેલિકેઝ", "ટોપોઇઝોમરેઝ", "લાઇગેઝ", "પ્રાઇમેઝ"], "ans": 1, "exp": "ટોપોઇઝોમરેઝ ઉત્સેચક DNAના રિપ્લિકેશન દરમિયાન DNA પોલિમરેઝની ક્રિયામાં અવરોધ ઉભો કરે છે કારણ કે તે DNAના સુપરકોઇલિંગને દૂર કરે છે. હેલિકેઝ DNAને અનવાઇન્ડ કરે છે, લાઇગેઝ DNAના ટુકડાઓને જોડે છે, અને પ્રાઇમેઝ RNA પ્રાઇમરનું સંશ્લેષણ કરે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક આનુવંશિકતા", "ch": ""}, {"q": "પાદપમાં, કયો હોર્મોન જૈવ નિયંત્રણ દ્વારા કોષવિભાજનને અટકાવે છે અને વૃદ્ધિને મર્યાદિત કરે છે?", "opts": ["ઓક્સિન", "જિબરેલિન", "એબ્સિસિક એસિડ", "સાયટોકાઇનિન"], "ans": 2, "exp": "એબ્સિસિક એસિડ હોર્મોન કોષવિભાજનને અટકાવે છે અને વૃદ્ધિને મર્યાદિત કરે છે. ઓક્સિન અને જિબરેલિન વૃદ્ધિને ઉત્તેજિત કરે છે, જ્યારે સાયટોકાઇનિન કોષવિભાજનને ઉત્તેજિત કરે છે.", "ref": "Std 12 - અધ્યાય 15: પાદપ વિકાસ અને ચળવળ", "ch": ""}, {"q": "જૈવ નિયંત્રણમાં, કયો હોર્મોન પ્રાણીમાં કોષીય વૃદ્ધિ અને વિકાસને નિયંત્રિત કરતી વખતે, પ્રોટીન સંશ્લેષણને સીધો પ્રભાવિત કરે છે?", "opts": ["વૃદ્ધિ હોર્મોન (GH)", "થાયરોક્સિન", "ઇન્સ્યુલિન", "ટેસ્ટોસ્ટેરોન"], "ans": 0, "exp": "વૃદ્ધિ હોર્મોન (GH) કોષીય વૃદ્ધિ અને વિકાસને નિયંત્રિત કરે છે અને પ્રોટીન સંશ્લેષણને સીધો પ્રભાવિત કરે છે. થાયરોક્સિન ચયાપચયને નિયંત્રિત કરે છે, ઇન્સ્યુલિન ગ્લુકોઝના સંગ્રહણને નિયંત્રિત કરે છે, અને ટેસ્ટોસ્ટેરોન લૈંગિક લક્ષણોના વિકાસને પ્રભાવિત કરે છે.", "ref": "Std 12 - અધ્યાય 22: પ્રાણી સંકેત અને નિયંત્રણ", "ch": ""}, {"q": "પાદપમાં જૈવ નિયંત્રણ દરમિયાન, એબ્સિસિક એસિડ (ABA) ની ભૂમિકા વિશે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["તે પાણીના તણાવ દરમિયાન સ્ટોમેટાને બંધ કરવામાં મદદ કરે છે", "તે બીજના સુપ્તાવસ્થામાં મદદ કરે છે", "તે પર્ણના પતનને અટકાવે છે", "તે કોષીય વૃદ્ધિને અવરોધે છે"], "ans": 2, "exp": "એબ્સિસિક એસિડ (ABA) પાણીના તણાવ દરમિયાન સ્ટોમેટાને બંધ કરવામાં મદદ કરે છે (A સત્ય), બીજના સુપ્તાવસ્થામાં મદદ કરે છે (B સત્ય), અને કોષીય વૃદ્ધિને અવરોધે છે (D સત્ય). પરંતુ તે પર્ણના પતનને ઉત્તેજિત કરે છે, અટકાવતું નથી (C ખોટું).", "ref": "Std 12 - અધ્યાય 15: પાદપ વૃદ્ધિ અને વિકાસ", "ch": ""}, {"q": "પ્રાણીમાં જૈવ નિયંત્રણ દરમિયાન, થાયરોક્સિન હોર્મોનનું સ્રાવ નિયંત્રિત કરતું હાઇપોથેલામિક હોર્મોન કયું છે?", "opts": ["ગ્રોથ હોર્મોન રિલીઝિંગ હોર્મોન (GHRH)", "થાયરોટ્રોપિન રિલીઝિંગ હોર્મોન (TRH)", "એડ્રિનોકોર્ટિકોટ્રોપિક હોર્મોન (ACTH)", "ફોલિકલ સ્ટિમ્યુલેટિંગ હોર્મોન (FSH)"], "ans": 1, "exp": "થાયરોક્સિન હોર્મોનનું સ્રાવ થાયરોઇડ ગ્રંથિ દ્વારા થાય છે, જેનું નિયંત્રણ પિટ્યુટરી ગ્રંથિ દ્વારા થાયરોઇડ સ્ટિમ્યુલેટિંગ હોર્મોન (TSH) દ્વારા થાય છે. TSHનું સ્રાવ હાઇપોથેલામસ દ્વારા થાયરોટ્રોપિન રિલીઝિંગ હોર્મોન (TRH) દ્વારા નિયંત્રિત થાય છે. GHRH, ACTH, અને FSH અન્ય હોર્મોનના સ્રાવને નિયંત્રિત કરે છે.", "ref": "Std 12 - અધ્યાય 22: સંવેદન અને નિયંત્રણ", "ch": ""}, {"q": "પાદપમાં જૈવ નિયંત્રણ દરમિયાન, નીચેનામાંથી કયો હોર્મોન કોષીય વિભાજનને ઉત્તેજિત કરતો નથી પરંતુ કોષીય લંબાઈને ઉત્તેજિત કરે છે?", "opts": ["ઓક્સિન", "જિબરેલિન", "સાયટોકાઇનિન", "એથિલીન"], "ans": 0, "exp": "ઓક્સિન કોષીય લંબાઈને ઉત્તેજિત કરે છે પરંતુ કોષીય વિભાજનને ઉત્તેજિત કરતું નથી. જિબરેલિન કોષીય વિભાજન અને લંબાઈ બંનેને ઉત્તેજિત કરે છે. સાયટોકાઇનિન મુખ્યત્વે કોષીય વિભાજનને ઉત્તેજિત કરે છે. એથિલીન પર્ણના પતન અને ફળના પાકવાને ઉત્તેજિત કરે છે.", "ref": "Std 12 - અધ્યાય 15: પાદપ વૃદ્ધિ અને વિકાસ", "ch": ""}, {"q": "પ્રાણીમાં જૈવ નિયંત્રણ દરમિયાન, નીચેનામાંથી કયો હોર્મોન રક્તમાં ગ્લુકોઝના સ્તરને ઘટાડે છે?", "opts": ["ગ્લુકેગોન", "ઇન્સ્યુલિન", "એપિનેફ્રિન", "કોર્ટિસોલ"], "ans": 1, "exp": "ઇન્સ્યુલિન રક્તમાં ગ્લુકોઝના સ્તરને ઘટાડે છે કારણ કે તે કોષોને ગ્લુકોઝ શોષવા માટે ઉત્તેજિત કરે છે. ગ્લુકેગોન, એપિનેફ્રિન, અને કોર્ટિસોલ રક્તમાં ગ્લુકોઝના સ્તરને વધારે છે.", "ref": "Std 12 - અધ્યાય 22: સંવેદન અને નિયંત્રણ", "ch": ""}, {"q": "પાદપમાં જૈવ નિયંત્રણ દરમિયાન, નીચેનામાંથી કયો હોર્મોન ફળના પાકવાને ઉત્તેજિત કરે છે?", "opts": ["ઓક્સિન", "જિબરેલિન", "એથિલીન", "એબ્સિસિક એસિડ"], "ans": 2, "exp": "એથિલીન ફળના પાકવાને ઉત્તેજિત કરે છે. ઓક્સિન અને જિબરેલિન વૃદ્ધિ અને વિકાસમાં ભૂમિકા ભજવે છે, જ્યારે એબ્સિસિક એસિડ સ્ટ્રેસ પ્રતિભાવ અને સુપ્તાવસ્થામાં ભૂમિકા ભજવે છે.", "ref": "Std 12 - અધ્યાય 15: પાદપ વૃદ્ધિ અને વિકાસ", "ch": ""}, {"q": "પાદપમાં જૈવ નિયંત્રણ દરમિયાન, ઇથિલીન અને એબ્સિસિક એસિડ (ABA) વચ્ચેનો સહસંબંધ કયા પ્રક્રિયામાં સૌથી વધુ સ્પષ્ટ જોવા મળે છે?", "opts": ["પર્ણના પતન અને બીજના સુપ્તાવસ્થામાં", "મૂળની વૃદ્ધિ અને પાણીના શોષણમાં", "ફળના પાકવાના સમયગાળા દરમિયાન", "પ્રકાશસંશ્લેષણની ક્રિયામાં ઉર્જા ઉત્પાદનમાં"], "ans": 0, "exp": "ઇથિલીન ફળના પાકવાને ઉત્તેજિત કરે છે, જ્યારે ABA બીજની સુપ્તાવસ્થા અને પર્ણના પતનને ઉત્તેજિત કરે છે. બંને હોર્મોન પર્ણના પતન અને બીજના સુપ્તાવસ્થામાં સહભાગી હોય છે, જેથી સહસંબંધ સૌથી સ્પષ્ટ જોવા મળે છે. બાકીના વિકલ્પો (B, C, D)માં આ હોર્મોનનો સીધો સહસંબંધ નથી.", "ref": "Std 12 - અધ્યાય 15: પાદપ વૃદ્ધિ અને વિકાસ", "ch": ""}, {"q": "પ્રાણીમાં જૈવ નિયંત્રણ દરમિયાન, કયો હોર્મોન કોષીય ચયાપચયને નિયંત્રિત કરતી વખતે, લિપિડના વિઘટનને ઉત્તેજિત કરે છે?", "opts": ["ઇન્સ્યુલિન", "ગ્લુકેગોન", "થાયરોક્સિન", "એડ્રિનેલિન"], "ans": 1, "exp": "ગ્લુકેગોન લિપિડના વિઘટનને ઉત્તેજિત કરે છે અને રક્તમાં ગ્લુકોઝનું સ્તર વધારે છે. ઇન્સ્યુલિન ગ્લુકોઝનું સ્તર ઘટાડે છે, થાયરોક્સિન ચયાપચયને વેગવાન કરે છે પરંતુ લિપિડ વિઘટનમાં સીધી ભૂમિકા નથી, અને એડ્રિનેલિન તણાવ પ્રતિભાવમાં કામ કરે છે.", "ref": "Std 12 - અધ્યાય 22: પ્રાણીમાં રાસાયણિક સંકેતન અને નિયંત્રણ", "ch": ""}, {"q": "પાદપમાં જૈવ નિયંત્રણ દરમિયાન, કયો હોર્મોન કોષીય વિભાજનને અટકાવીને વૃદ્ધિને મર્યાદિત કરે છે, પરંતુ ફૂલની રચનાને ઉત્તેજિત કરે છે?", "opts": ["ઓક્સિન", "જિબરેલિન", "એબ્સિસિક એસિડ (ABA)", "ફ્લોરિજન"], "ans": 3, "exp": "ફ્લોરિજન હોર્મોન ફૂલની રચનાને ઉત્તેજિત કરે છે અને કોષીય વિભાજનને મર્યાદિત કરે છે. ઓક્સિન અને જિબરેલિન વૃદ્ધિને ઉત્તેજિત કરે છે, જ્યારે ABA વૃદ્ધિને અટકાવે છે પરંતુ ફૂલની રચનામાં સીધી ભૂમિકા નથી.", "ref": "Std 12 - અધ્યાય 15: પાદપ વૃદ્ધિ અને વિકાસ", "ch": ""}, {"q": "પ્રાણીમાં જૈવ નિયંત્રણ દરમિયાન, કયો હોર્મોન કોષીય વૃદ્ધિ અને વિકાસને નિયંત્રિત કરતી વખતે, પ્રોટીન સંશ્લેષણને સીધો રીતે ઉત્તેજિત કરે છે?", "opts": ["વૃદ્ધિ હોર્મોન (GH)", "ઇન્સ્યુલિન-જેવો વૃદ્ધિ કરક 1 (IGF-1)", "ટેસ્ટોસ્ટેરોન", "કોર્ટિઝોલ"], "ans": 1, "exp": "IGF-1 પ્રોટીન સંશ્લેષણને સીધો રીતે ઉત્તેજિત કરે છે અને કોષીય વૃદ્ધિને પ્રોત્સાહન આપે છે. વૃદ્ધિ હોર્મોન (GH) IGF-1ના સ્રાવને ઉત્તેજિત કરે છે પરંતુ સીધો પ્રભાવ નથી, ટેસ્ટોસ્ટેરોન લૈંગિક વિકાસમાં મહત્વનો છે, અને કોર્ટિઝોલ ચયાપચયને નિયંત્રિત કરે છે.", "ref": "Std 12 - અધ્યાય 22: પ્રાણીમાં રાસાયણિક સંકેતન અને નિયંત્રણ", "ch": ""}, {"q": "પાદપમાં જૈવ નિયંત્રણ દરમિયાન, કયો હોર્મોન મૂળની વૃદ્ધિને અટકાવીને શાખાની વૃદ્ધિને ઉત્તેજિત કરે છે, પરંતુ ઉચ્ચ સાંદ્રતામાં વૃદ્ધિને અટકાવે છે?", "opts": ["ઓક્સિન", "સાયટોકાઇનિન", "જિબરેલિન", "એબ્સિસિક એસિડ (ABA)"], "ans": 0, "exp": "ઓક્સિન નીચી સાંદ્રતામાં મૂળની વૃદ્ધિને અટકાવે છે અને શાખાની વૃદ્ધિને ઉત્તેજિત કરે છે, પરંતુ ઉચ્ચ સાંદ્રતામાં વૃદ્ધિને અટકાવે છે. સાયટોકાઇનિન કોષીય વિભાજનને ઉત્તેજિત કરે છે, જિબરેલિન વૃદ્ધિને ઉત્તેજિત કરે છે, અને ABA વૃદ્ધિને અટકાવે છે.", "ref": "Std 12 - અધ્યાય 15: પાદપ વૃદ્ધિ અને વિકાસ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
