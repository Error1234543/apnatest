<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>વૃષણ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>વૃષણ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">વૃષણ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "વૃષણમાં સ્પર્મની નિર્માણ પ્રક્રિયા દરમિયાન કયા કોષમાં મિયોસિસ-Iનું વિભાજન થાય છે?", "opts": ["પ્રાથમિક શુક્રકોષ (Primary spermatocyte)", "દ્વિતીયક શુક્રકોષ (Secondary spermatocyte)", "શુક્રાણુજનક કોષ (Spermatogonium)", "શુક્રાણુ (Spermatozoon)"], "ans": 0, "exp": "પ્રાથમિક શુક્રકોષ (Primary spermatocyte)માં મિયોસિસ-Iનું વિભાજન થાય છે, જેમાંથી દ્વિતીયક શુક્રકોષ (Secondary spermatocyte) બને છે. શુક્રાણુજનક કોષ (Spermatogonium) મિયોટિક વિભાજન પહેલાના તબક્કે હોય છે, જ્યારે શુક્રાણુ (Spermatozoon) પૂર્ણ વિકસિત અવસ્થા છે. દ્વિતીયક શુક્રકોષમાં મિયોસિસ-II થાય છે.", "ref": "Std 12 - પ્રકરણ ૩: માનવ પ્રજનન", "ch": ""}, {"q": "વૃષણમાં લેડિગ કોષો (Leydig cells) દ્વારા સ્રાવવામાં આવતો હોર્મોન કયો છે અને તેનું મુખ્ય કાર્ય શું છે?", "opts": ["ટેસ્ટોસ્ટેરોન – શુક્રાણુના ઉત્પાદનને ઉત્તેજિત કરે છે", "FSH – શુક્રાણુના પરિપક્વતાને પ્રોત્સાહન આપે છે", "LH – લેડિગ કોષોને ઉત્તેજિત કરે છે", "પ્રોલેક્ટિન – શુક્રાણુના સંગ્રહને નિયંત્રિત કરે છે"], "ans": 0, "exp": "લેડિગ કોષો ટેસ્ટોસ્ટેરોન હોર્મોન સ્રાવે છે, જે શુક્રાણુના ઉત્પાદન અને વિકાસને ઉત્તેજિત કરે છે. FSH શુક્રાણુના પરિપક્વતાને પ્રોત્સાહન આપે છે પરંતુ તે પિટ્યુટરી ગ્રંથિથી સ્રાવાય છે. LH લેડિગ કોષોને ઉત્તેજિત કરે છે પરંતુ તે હોર્મોન નથી. પ્રોલેક્ટિન શુક્રાણુના સંગ્રહ સાથે સંબંધિત નથી.", "ref": "Std 12 - પ્રકરણ ૩: માનવ પ્રજનન", "ch": ""}, {"q": "વૃષણમાં સેમિનિફેરસ નલિકાઓ (Seminiferous tubules)ની ભિત્તિમાં કયા કોષો શુક્રાણુઓને પોષણ પૂરું પાડે છે?", "opts": ["સર્ટોલી કોષો (Sertoli cells)", "લેડિગ કોષો (Leydig cells)", "જર્મિનલ એપિથેલિયલ કોષો (Germinal epithelial cells)", "માયોઈડ કોષો (Myoid cells)"], "ans": 0, "exp": "સર્ટોલી કોષો સેમિનિફેરસ નલિકાઓની ભિત્તિમાં હોય છે અને શુક્રાણુઓને પોષણ પૂરું પાડે છે. લેડિગ કોષો હોર્મોન સ્રાવે છે, જર્મિનલ એપિથેલિયલ કોષો શુક્રાણુના વિકાસમાં ભાગ લે છે, અને માયોઈડ કોષો નલિકાઓની ગતિશીલતામાં મદદ કરે છે.", "ref": "Std 12 - પ્રકરણ ૩: માનવ પ્રજનન", "ch": ""}, {"q": "વૃષણમાં શુક્રાણુના વિકાસ દરમિયાન કયા તબક્કે હેપ્લોઈડ (haploid) અવસ્થા પ્રાપ્ત થાય છે?", "opts": ["પ્રાથમિક શુક્રકોષ (Primary spermatocyte)", "દ્વિતીયક શુક્રકોષ (Secondary spermatocyte)", "શુક્રાણુજનક કોષ (Spermatogonium)", "શુક્રાણુ (Spermatozoon)"], "ans": 1, "exp": "દ્વિતીયક શુક્રકોષ (Secondary spermatocyte) મિયોસિસ-I પછી બને છે અને તે હેપ્લોઈડ (n) અવસ્થામાં હોય છે. પ્રાથમિક શુક્રકોષ (2n) મિયોસિસ-I પહેલા હોય છે, શુક્રાણુજનક કોષ (2n) મિયોટિક વિભાજન પહેલા હોય છે, અને શુક્રાણુ (n) પૂર્ણ વિકસિત હેપ્લોઈડ અવસ્થા છે.", "ref": "Std 12 - પ્રકરણ ૩: માનવ પ્રજનન", "ch": ""}, {"q": "વૃષણમાં શુક્રાણુના ઉત્પાદનને નિયંત્રિત કરતા હોર્મોનની યોગ્ય ક્રમિકતા કઈ છે?", "opts": ["GnRH → LH → ટેસ્ટોસ્ટેરોન → શુક્રાણુ ઉત્પાદન", "FSH → ટેસ્ટોસ્ટેરોન → LH → શુક્રાણુ ઉત્પાદન", "ટેસ્ટોસ્ટેરોન → GnRH → FSH → શુક્રાણુ ઉત્પાદન", "LH → FSH → ટેસ્ટોસ્ટેરોન → શુક્રાણુ ઉત્પાદન"], "ans": 0, "exp": "GnRH (Gonadotropin-releasing hormone) હાઇપોથેલેમસથી સ્રાવાય છે, જે પિટ્યુટરી ગ્રંથિને LH (Luteinizing hormone) સ્રાવવા ઉત્તેજિત કરે છે. LH લેડિગ કોષોને ટેસ્ટોસ્ટેરોન સ્રાવવા ઉત્તેજિત કરે છે, જે શુક્રાણુના ઉત્પાદનને પ્રોત્સાહન આપે છે. FSH પણ શુક્રાણુના વિકાસમાં ભાગ લે છે, પરંતુ તેનો ક્રમ GnRH → LH → ટેસ્ટોસ્ટેરોન છે.", "ref": "Std 12 - પ્રકરણ ૩: માનવ પ્રજનન", "ch": ""}, {"q": "વૃષણમાં સર્ટોલી કોષો (Sertoli cells) નીચેનામાંથી કયું કામ કરતાં નથી?", "opts": ["શુક્રાણુઓને પોષણ પૂરું પાડવું", "રક્ત-વૃષણ અવરોધ (Blood-Testis Barrier) ની રચના કરવી", "ટેસ્ટોસ્ટેરોન હોર્મોનનું સ્રાવણ કરવું", "શુક્રાણુઓના પરિપક્વતામાં મદદ કરવી"], "ans": 2, "exp": "સર્ટોલી કોષો શુક્રાણુઓને પોષણ પૂરું પાડે છે (A), રક્ત-વૃષણ અવરોધની રચના કરે છે (B), અને શુક્રાણુઓના પરિપક્વતામાં મદદ કરે છે (D). પરંતુ ટેસ્ટોસ્ટેરોન હોર્મોનનું સ્રાવણ લેડિગ કોષો (Leydig cells) દ્વારા થાય છે, સર્ટોલી કોષો દ્વારા નહીં. એટલે C વિકલ્પ ખોટો છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન તંત્ર", "ch": ""}, {"q": "વૃષણમાં શુક્રાણુના વિકાસ દરમિયાન કયા તબક્કે કોષોની સંખ્યા વધારો પામે છે પરંતુ DNAની માત્રા બમણી થતી નથી?", "opts": ["સ્પર્મેટોગોનિયા (Spermatogonia)", "પ્રાથમિક સ્પર્મેટોસાઇટ (Primary Spermatocyte)", "દ્વિતીયક સ્પર્મેટોસાઇટ (Secondary Spermatocyte)", "સ્પર્મેટિડ (Spermatid)"], "ans": 0, "exp": "સ્પર્મેટોગોનિયા તબક્કે કોષોની સંખ્યા વધારો પામે છે પરંતુ DNAની માત્રા બમણી થતી નથી, કારણ કે તે મિટોસિસ દ્વારા વિભાજન પામે છે. પ્રાથમિક સ્પર્મેટોસાઇટ (B)માં DNA બમણી થાય છે (S કળા), દ્વિતીયક સ્પર્મેટોસાઇટ (C) અને સ્પર્મેટિડ (D)માં DNAની માત્રા પહેલેથી જ બમણી હોય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન તંત્ર", "ch": ""}, {"q": "વૃષણમાં શુક્રાણુના ઉત્પાદનને અસર કરતા નીચેનામાંથી કયો હોર્મોન સીધો જ વૃષણ પર અસર કરતો નથી?", "opts": ["FSH (ફોલિકલ સ્ટિમ્યુલેટિંગ હોર્મોન)", "LH (લ્યુટિનાઇઝિંગ હોર્મોન)", "GnRH (ગોનેડોટ્રોપિન-રિલીઝિંગ હોર્મોન)", "ટેસ્ટોસ્ટેરોન"], "ans": 2, "exp": "GnRH (C) હાયપોથેલામસ દ્વારા સ્રાવવામાં આવે છે અને તે પિટ્યુટરી ગ્રંથિને પ્રેરે છે કે FSH અને LH સ્રાવે. સીધી અસર વૃષણ પર થતી નથી. FSH (A) સર્ટોલી કોષોને પ્રેરે છે, LH (B) લેડિગ કોષોને પ્રેરે છે, અને ટેસ્ટોસ્ટેરોન (D) વૃષણમાં શુક્રાણુના વિકાસને પ્રભાવિત કરે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન તંત્ર", "ch": ""}, {"q": "વૃષણમાં શુક્રાણુના વિકાસ દરમિયાન કયા તબક્કે કોષો હેપ્લોઈડ (n) હોય છે પરંતુ અજેંડ્ર (non-motile) હોય છે?", "opts": ["પ્રાથમિક સ્પર્મેટોસાઇટ", "દ્વિતીયક સ્પર્મેટોસાઇટ", "સ્પર્મેટિડ", "સ્પર્મેટોઝોઆ"], "ans": 2, "exp": "સ્પર્મેટિડ (C) હેપ્લોઈડ (n) હોય છે પરંતુ અજેંડ્ર (non-motile) હોય છે. પ્રાથમિક સ્પર્મેટોસાઇટ (A) ડિપ્લોઈડ (2n) હોય છે, દ્વિતીયક સ્પર્મેટોસાઇટ (B) હેપ્લોઈડ (n) હોય છે પરંતુ તે પણ અજેંડ્ર હોય છે, પરંતુ સ્પર્મેટિડ એ સૌથી યોગ્ય જવાબ છે કારણ કે તે શુક્રાણુના વિકાસનો અંતિમ તબક્કો છે જ્યાં કોષ હેપ્લોઈડ અને અજેંડ્ર હોય છે. સ્પર્મેટોઝોઆ (D) ગતિશીલ હોય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન તંત્ર", "ch": ""}, {"q": "વૃષણમાં શુક્રાણુના ઉત્પાદન દરમિયાન કયા હોર્મોનની ઉણપથી સર્ટોલી કોષોનું કામકાજ અવરોધાય છે?", "opts": ["ટેસ્ટોસ્ટેરોન", "FSH", "LH", "પ્રોલેક્ટિન"], "ans": 1, "exp": "FSH (B) સર્ટોલી કોષોને પ્રેરે છે અને તેના કામકાજને નિયંત્રિત કરે છે. ટેસ્ટોસ્ટેરોન (A) લેડિગ કોષો દ્વારા સ્રાવવામાં આવે છે અને શુક્રાણુના વિકાસને પ્રભાવિત કરે છે, પરંતુ સર્ટોલી કોષોના કામકાજને સીધી અસર કરતું નથી. LH (C) લેડિગ કોષોને પ્રેરે છે, અને પ્રોલેક્ટિન (D) સ્તનપાન દરમિયાન મહત્વનો ભાગ ભજવે છે, પરંતુ વૃષણમાં સર્ટોલી કોષોના કામકાજને અસર કરતું નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન તંત્ર", "ch": ""}, {"q": "વૃષણમાં સેમિનિફેરસ નલિકાઓની બાહ્ય બાજુએ આવેલા કોષો દ્વારા સ્રાવવામાં આવતા હોર્મોનની ક્રિયા કઈ નથી?", "opts": ["શુક્રાણુઓના પરિપક્વતામાં મદદ કરવી", "ગૌણ લૈંગિક લક્ષણોના વિકાસને ઉત્તેજિત કરવું", "પ્રોસ્ટેટ ગ્રંથિના વિકાસને પ્રેરિત કરવું", "ફોલિકલ સ્ટિમ્યુલેટિંગ હોર્મોન (FSH) ના સ્રાવને અવરોધવું"], "ans": 0, "exp": "લેડિગ કોષો દ્વારા સ્રાવવામાં આવતો ટેસ્ટોસ્ટેરોન હોર્મોન ગૌણ લૈંગિક લક્ષણો (B), પ્રોસ્ટેટ ગ્રંથિના વિકાસ (C) અને FSH સ્રાવને અવરોધે છે (D). પરંતુ શુક્રાણુઓના પરિપક્વતામાં મદદ કરવી એ સર્ટોલી કોષોનું કામ છે, લેડિગ કોષોનું નહીં.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "વૃષણમાં શુક્રાણુના વિકાસ દરમિયાન કયા તબક્કે કોષોની ક્રોમોસોમલ સંખ્યા ડિપ્લોઈડ (2n) રહે છે પરંતુ DNAની માત્રા 4n થાય છે?", "opts": ["પ્રાથમિક શુક્રાણુ કોષ (Primary spermatocyte)", "દ્વિતીય શુક્રાણુ કોષ (Secondary spermatocyte)", "સ્પર્મેટિડ (Spermatid)", "સ્પર્મેટોગોનિયા (Spermatogonia)"], "ans": 0, "exp": "પ્રાથમિક શુક્રાણુ કોષ (A)માં S ફેઝ દરમિયાન DNAની નકલ થાય છે, જેથી DNA માત્રા 4n થાય છે પરંતુ ક્રોમોસોમલ સંખ્યા 2n રહે છે. દ્વિતીય શુક્રાણુ કોષ (B) અને સ્પર્મેટિડ (C) હેપ્લોઈડ (n) હોય છે, જ્યારે સ્પર્મેટોગોનિયા (D) ડિપ્લોઈડ (2n) હોય છે પરંતુ DNA માત્રા 2n જ રહે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "વૃષણમાં સર્ટોલી કોષો દ્વારા સ્રાવવામાં આવતા પદાર્થની કઈ ક્રિયા નથી?", "opts": ["શુક્રાણુઓને પોષણ પૂરું પાડવું", "રક્ત-વૃષણ અવરોધ (Blood-Testis Barrier) બનાવવો", "ટેસ્ટોસ્ટેરોન હોર્મોનનું સ્રાવ કરવું", "શુક્રાણુઓના પરિવહનમાં મદદ કરવી"], "ans": 2, "exp": "સર્ટોલી કોષો શુક્રાણુઓને પોષણ પૂરું પાડે છે (A), રક્ત-વૃષણ અવરોધ બનાવે છે (B) અને શુક્રાણુઓના પરિવહનમાં મદદ કરે છે (D). પરંતુ ટેસ્ટોસ્ટેરોન હોર્મોનનું સ્રાવ લેડિગ કોષો દ્વારા થાય છે, સર્ટોલી કોષો દ્વારા નહીં (C).", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "વૃષણમાં શુક્રાણુના ઉત્પાદનને નિયંત્રિત કરતા હોર્મોનની કઈ જોડી સીધી રીતે વૃષણ પર અસર કરતી નથી?", "opts": ["FSH અને LH", "ટેસ્ટોસ્ટેરોન અને ઇન્હિબિન", "ગોનેડોટ્રોપિન-રિલીઝિંગ હોર્મોન (GnRH) અને પ્રોલેક્ટિન", "એન્ડ્રોજન બાઈન્ડિંગ પ્રોટીન (ABP) અને ટેસ્ટોસ્ટેરોન"], "ans": 2, "exp": "GnRH અને પ્રોલેક્ટિન (C) સીધી રીતે વૃષણ પર અસર કરતા નથી. GnRH પિટ્યુટરી ગ્રંથિને ઉત્તેજિત કરે છે, જ્યારે પ્રોલેક્ટિનનું વૃષણ સાથે સીધું સંબંધ નથી. FSH અને LH (A), ટેસ્ટોસ્ટેરોન અને ઇન્હિબિન (B), તેમજ ABP અને ટેસ્ટોસ્ટેરોન (D) સીધી રીતે વૃષણ પર અસર કરે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "વૃષણમાં સેમિનિફેરસ નલિકાઓની ભિત્તિમાં આવેલા પ્રાથમિક શુક્રાણુ મધ્યસ્થ કોષ (Primary spermatocyte) દરમિયાન નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["આ કોષમાં મિયોસિસ-I પૂર્ણ થયા પછી બે હેપ્લોઈડ કોષો ઉત્પન્ન થાય છે", "આ કોષમાં ક્રોમોસોમની સંખ્યા 2n હોય છે અને તે ડિપ્લોટીન તબક્કામાં હોય છે", "આ કોષમાં DNAની પ્રતિકૃતિ (replication) થતી નથી", "આ કોષ મિયોસિસ-II પૂર્ણ કર્યા પછી સેકન્ડરી સ્પર્મેટોસાઇટ બને છે"], "ans": 1, "exp": "પ્રાથમિક શુક્રાણુ મધ્યસ્થ કોષ (Primary spermatocyte) ડિપ્લોઈડ (2n) હોય છે અને મિયોસિસ-I દરમિયાન ડિપ્લોટીન તબક્કામાં હોય છે. મિયોસિસ-I પૂર્ણ થયા પછી બે હેપ્લોઈડ સેકન્ડરી સ્પર્મેટોસાઇટ ઉત્પન્ન થાય છે, નહીં કે પ્રાથમિક કોષ પોતે હેપ્લોઈડ બને. DNAની પ્રતિકૃતિ મિયોસિસ-I પહેલા થાય છે, અને મિયોસિસ-II પૂર્ણ કર્યા પછી સેકન્ડરી સ્પર્મેટોસાઇટમાંથી સ્પર્મેટિડ બને છે, નહીં કે પ્રાથમિક કોષમાંથી. તેથી, વિકલ્પ B સત્ય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "વૃષણમાં શુક્રાણુના વિકાસ દરમિયાન, કયા તબક્કે કોષોની ક્રોમોસોમલ સંખ્યા ડિપ્લોઈડ (2n) રહે છે, પરંતુ DNAની માત્રા 4n હોય છે?", "opts": ["પ્રાથમિક શુક્રાણુ કોષ (Primary spermatocyte)", "દ્વિતીય શુક્રાણુ કોષ (Secondary spermatocyte)", "શુક્રાણુ મધ્યસ્થ કોષ (Spermatid)", "શુક્રાણુ (Spermatozoon)"], "ans": 0, "exp": "પ્રાથમિક શુક્રાણુ કોષ (Primary spermatocyte)માં ક્રોમોસોમલ સંખ્યા ડિપ્લોઈડ (2n) રહે છે, પરંતુ DNA રેપ્લિકેશન પછી DNAની માત્રા 4n થઈ જાય છે. બાકીના વિકલ્પો અયોગ્ય છે: B) દ્વિતીય શુક્રાણુ કોષ (Secondary spermatocyte)માં ક્રોમોસોમલ સંખ્યા હેપ્લોઈડ (n) હોય છે, પરંતુ DNAની માત્રા 2n હોય છે. C) શુક્રાણુ મધ્યસ્થ કોષ (Spermatid)માં ક્રોમોસોમલ સંખ્યા હેપ્લોઈડ (n) હોય છે, પરંતુ DNAની માત્રા n હોય છે. D) શુક્રાણુ (Spermatozoon)માં ક્રોમોસોમલ સંખ્યા હેપ્લોઈડ (n) હોય છે, પરંતુ DNAની માત્રા n હોય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "વૃષણમાં લેડિગ કોષો (Leydig cells) દ્વારા સ્રાવવામાં આવતા ટેસ્ટોસ્ટેરોન હોર્મોનની કઈ ક્રિયા નથી?", "opts": ["શુક્રાણુના ઉત્પાદનને ઉત્તેજિત કરવું", "દ્વિતીય લૈંગિક લક્ષણોના વિકાસને પ્રોત્સાહન આપવું", "પ્રોસ્ટેટ ગ્રંથિના સ્રાવને નિયંત્રિત કરવું", "ફોલિકલ-ઉત્તેજક હોર્મોન (FSH) નું સ્રાવ વધારવું"], "ans": 3, "exp": "ટેસ્ટોસ્ટેરોન હોર્મોન શુક્રાણુના ઉત્પાદનને ઉત્તેજિત કરે છે (A), દ્વિતીય લૈંગિક લક્ષણોના વિકાસને પ્રોત્સાહન આપે છે (B), અને પ્રોસ્ટેટ ગ્રંથિના સ્રાવને નિયંત્રિત કરે છે (C). પરંતુ તે FSH નું સ્રાવ વધારતું નથી; ઉલટાનું, FSH નું સ્રાવ પિટ્યુટરી ગ્રંથિ દ્વારા નિયંત્રિત થાય છે અને ટેસ્ટોસ્ટેરોન તેને નિયંત્રિત કરે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "વૃષણમાં સર્ટોલી કોષો (Sertoli cells) દ્વારા સ્રાવવામાં આવતા પદાર્થમાંથી કયો પદાર્થ શુક્રાણુના પરિપક્વતામાં મદદ કરતો નથી?", "opts": ["એન્ડ્રોજન-બાઇન્ડિંગ પ્રોટીન (Androgen-binding protein)", "લેક્ટેટ (Lactate)", "ઇન્હિબિન (Inhibin)", "ટેસ્ટોસ્ટેરોન (Testosterone)"], "ans": 3, "exp": "સર્ટોલી કોષો એન્ડ્રોજન-બાઇન્ડિંગ પ્રોટીન (A), લેક્ટેટ (B), અને ઇન્હિબિન (C) સ્રાવે છે, જે શુક્રાણુના પરિપક્વતામાં મદદ કરે છે. પરંતુ ટેસ્ટોસ્ટેરોન (D) લેડિગ કોષો દ્વારા સ્રાવવામાં આવે છે, સર્ટોલી કોષો દ્વારા નહીં.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "વૃષણમાં શુક્રાણુના વિકાસ દરમિયાન, કયા તબક્કે કોષોની સંખ્યા વધારો પામે છે પરંતુ કોષનું કદ ઘટે છે?", "opts": ["શુક્રાણુ જનક કોષ (Spermatogonium) થી પ્રાથમિક શુક્રાણુ કોષ (Primary spermatocyte)", "પ્રાથમિક શુક્રાણુ કોષ (Primary spermatocyte) થી દ્વિતીય શુક્રાણુ કોષ (Secondary spermatocyte)", "દ્વિતીય શુક્રાણુ કોષ (Secondary spermatocyte) થી શુક્રાણુ મધ્યસ્થ કોષ (Spermatid)", "શુક્રાણુ મધ્યસ્થ કોષ (Spermatid) થી શુક્રાણુ (Spermatozoon)"], "ans": 0, "exp": "શુક્રાણુ જનક કોષ (Spermatogonium) થી પ્રાથમિક શુક્રાણુ કોષ (Primary spermatocyte) દરમિયાન કોષવિભાજન (મિટોસિસ) થવાથી કોષોની સંખ્યા વધે છે, પરંતુ કોષનું કદ ઘટે છે. બાકીના વિકલ્પો અયોગ્ય છે: B) પ્રાથમિક શુક્રાણુ કોષ થી દ્વિતીય શુક્રાણુ કોષ દરમિયાન મિયોસિસ-I થવાથી કોષોની સંખ્યા બમણી થાય છે, પરંતુ કોષનું કદ ઘટતું નથી. C) દ્વિતીય શુક્રાણુ કોષ થી શુક્રાણુ મધ્યસ્થ કોષ દરમિયાન મિયોસિસ-II થવાથી કોષોની સંખ્યા બમણી થાય છે, પરંતુ કોષનું કદ ઘટતું નથી. D) શુક્રાણુ મધ્યસ્થ કોષ થી શુક્રાણુ દરમિયાન કોષનું રૂપાંતર થાય છે, પરંતુ કોષોની સંખ્યા વધતી નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "વૃષણમાં સેમિનિફેરસ નલિકાઓની ભિત્તિમાં આવેલા કોષો પૈકી કયો કોષ સીધો જ ટેસ્ટોસ્ટેરોન હોર્મોનના સંપર્કમાં આવતો નથી, પરંતુ તેની અસર હેઠળ કામ કરે છે?", "opts": ["પ્રાથમિક શુક્રાણુ કોષ (Primary spermatocyte)", "સર્ટોલી કોષ (Sertoli cell)", "સેકન્ડરી શુક્રાણુ કોષ (Secondary spermatocyte)", "સ્પર્મેટિડ (Spermatid)"], "ans": 1, "exp": "સર્ટોલી કોષ (Sertoli cell) સીધો જ ટેસ્ટોસ્ટેરોન હોર્મોનના સંપર્કમાં આવતો નથી, પરંતુ તે ટેસ્ટોસ્ટેરોનની અસર હેઠળ કામ કરે છે. ટેસ્ટોસ્ટેરોન લેડિગ કોષો દ્વારા સ્રાવવામાં આવે છે અને તે સર્ટોલી કોષો પર અસર કરે છે, જે પછી શુક્રાણુના વિકાસને સહાય કરે છે. પ્રાથમિક શુક્રાણુ કોષ, સેકન્ડરી શુક્રાણુ કોષ અને સ્પર્મેટિડ સીધા જ ટેસ્ટોસ્ટેરોનના સંપર્કમાં આવી શકે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
