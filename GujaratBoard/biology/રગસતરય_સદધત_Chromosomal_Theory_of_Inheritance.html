<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>રંગસૂત્રીય સિદ્ધાંત (Chromosomal Theory of Inheritance)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>રંગસૂત્રીય સિદ્ધાંત (Chromosomal Theory of Inheritance)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">રંગસૂત્રીય સિદ્ધાંત (Chromosomal Theory of Inheritance)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "સ્ટ્રેનબર્ગરના પ્રયોગમાં, ડ્રોસોફિલાના સ્ત્રી જીવમાં X-વર્ણસૂત્ર પર આવેલા વર્ણાધીન લક્ષણ માટે હેટરોઝાયગસ જનુક્રમ રચના ધરાવતી સ્ત્રીને સંકરણ કરવામાં આવે છે. જો F1 પેઢીમાં સ્ત્રી અને પુરુષ બંનેમાં લક્ષણ વ્યક્ત થાય તો કયો નિષ્કર્ષ કાઢી શકાય?", "opts": ["જનીન X-વર્ણસૂત્ર પર આવેલું છે અને તે પ્રભાવી છે.", "જનીન X-વર્ણસૂત્ર પર આવેલું છે અને તે અપ્રભાવી છે.", "જનીન Y-વર્ણસૂત્ર પર આવેલું છે અને તે પ્રભાવી છે.", "જનીન ઓટોસોમલ છે અને તે પ્રભાવી છે."], "ans": 0, "exp": "સ્ટ્રેનબર્ગરના પ્રયોગમાં, જો X-વર્ણસૂત્ર પર આવેલું જનીન પ્રભાવી હોય તો હેટરોઝાયગસ સ્ત્રી (X^A X^a) તે લક્ષણ વ્યક્ત કરશે. સંકરણ બાદ F1 પેઢીમાં સ્ત્રી (X^A X^a) અને પુરુષ (X^A Y) બંને લક્ષણ વ્યક્ત કરશે, કારણ કે પ્રભાવી જનીન X-વર્ણસૂત્ર પર હોય છે. વિકલ્પ B ખોટો છે કારણ કે અપ્રભાવી જનીન હેટરોઝાયગસ સ્ત્રીમાં લક્ષણ વ્યક્ત ન થાય. વિકલ્પ C ખોટો છે કારણ કે Y-વર્ણસૂત્ર પરનું જનીન ફક્ત પુરુષમાં જ વ્યક્ત થાય. વિકલ્પ D ખોટો છે કારણ કે ઓટોસોમલ જનીનના કિસ્સામાં લિંગ-સંલગ્નતા જોવા મળત નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાનુગતિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "મેન્ડલના નિયમોના અપવાદ તરીકે કયું લક્ષણ રંગસૂત્રીય સિદ્ધાંત દ્વારા સમજાવી શકાય છે?", "opts": ["સહપ્રભાવિતા (Co-dominance)", "અપૂર્ણ પ્રભાવિતા (Incomplete dominance)", "લિંગ-સંલગ્ન વારસો (Sex-linked inheritance)", "એપિસ્ટેસિસ (Epistasis)"], "ans": 2, "exp": "લિંગ-સંલગ્ન વારસો રંગસૂત્રીય સિદ્ધાંત દ્વારા સમજાવી શકાય છે, કારણ કે તે X અથવા Y વર્ણસૂત્ર પર આવેલા જનીન દ્વારા નિયંત્રિત થાય છે. સહપ્રભાવિતા, અપૂર્ણ પ્રભાવિતા, અને એપિસ્ટેસિસ એ મેન્ડલના નિયમોના અપવાદ છે, પરંતુ તે રંગસૂત્રીય સિદ્ધાંત સાથે સીધો સંબંધ ધરાવતા નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાનુગતિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "ડ્રોસોફિલામાં વર્ણાધીન લક્ષણ માટે ક્રોસ કરવામાં આવે છે. જો F1 પેઢીમાં સ્ત્રી અને પુરુષમાં લક્ષણ વ્યક્ત થાય, પરંતુ F2 પેઢીમાં ફક્ત પુરુષમાં જ લક્ષણ વ્યક્ત થાય, તો કયો નિષ્કર્ષ કાઢી શકાય?", "opts": ["જનીન X-વર્ણસૂત્ર પર આવેલું છે અને તે પ્રભાવી છે.", "જનીન X-વર્ણસૂત્ર પર આવેલું છે અને તે અપ્રભાવી છે.", "જનીન Y-વર્ણસૂત્ર પર આવેલું છે.", "જનીન ઓટોસોમલ છે અને તે અપ્રભાવી છે."], "ans": 2, "exp": "જો F1 પેઢીમાં સ્ત્રી અને પુરુષ બંને લક્ષણ વ્યક્ત કરે, પરંતુ F2 પેઢીમાં ફક્ત પુરુષમાં જ લક્ષણ વ્યક્ત થાય, તો જનીન Y-વર્ણસૂત્ર પર આવેલું હોવું જોઈએ. X-વર્ણસૂત્ર પરનું જનીન (પ્રભાવી અથવા અપ્રભાવી) સ્ત્રી અને પુરુષ બંનેમાં વ્યક્ત થઈ શકે, પરંતુ Y-વર્ણસૂત્ર પરનું જનીન ફક્ત પુરુષમાં જ વ્યક્ત થાય. ઓટોસોમલ જનીનના કિસ્સામાં લિંગ-સંલગ્નતા જોવા મળત નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાનુગતિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "સ્ટર્નના પ્રયોગમાં, ડ્રોસોફિલાના પુરુષ જીવમાં વર્ણસૂત્રીય વિનિમય (ક્રોસિંગ ઓવર) ન થવાને કારણે કયું પરિણામ જોવા મળે?", "opts": ["જનીનનો સ્વતંત્ર વિતરણ", "જનીનનો સહસંયોજન (Linkage)", "નવી જનીનિક સંયોજનોની રચના", "વર્ણસૂત્રીય મ્યુટેશન"], "ans": 1, "exp": "સ્ટર્નના પ્રયોગમાં, જો વર્ણસૂત્રીય વિનિમય (ક્રોસિંગ ઓવર) ન થાય, તો જનીનનો સહસંયોજન (Linkage) જોવા મળે છે, કારણ કે બે જનીન એકબીજા સાથે જોડાયેલા રહે છે. સ્વતંત્ર વિતરણ (વિકલ્પ A) ક્રોસિંગ ઓવર થવાને કારણે જોવા મળે છે. નવી જનીનિક સંયોજનો (વિકલ્પ C) ક્રોસિંગ ઓવર થવાને કારણે રચાય છે. વર્ણસૂત્રીય મ્યુટેશન (વિકલ્પ D) એ અલગ ઘટના છે.", "ref": "Std 12 - અધ્યાય 5: વંશાનુગતિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "મનુષ્યમાં રંગ અંધત્વ (Colour blindness) માટે જવાબદાર જનીન ક્યાં આવેલું છે અને તેની વારસા પદ્ધતિ કઈ છે?", "opts": ["X-વર્ણસૂત્ર પર, અપ્રભાવી", "X-વર્ણસૂત્ર પર, પ્રભાવી", "Y-વર્ણસૂત્ર પર, પ્રભાવી", "ઓટોસોમલ વર્ણસૂત્ર પર, અપ્રભાવી"], "ans": 0, "exp": "મનુષ્યમાં રંગ અંધત્વ માટે જવાબદાર જનીન X-વર્ણસૂત્ર પર આવેલું છે અને તે અપ્રભાવી છે. આ કારણે, પુરુષમાં (XY) એક જ X-વર્ણસૂત્ર હોય છે, જેથી અપ્રભાવી જનીન વ્યક્ત થાય છે. સ્ત્રીમાં (XX) બે X-વર્ણસૂત્ર હોય છે, જેથી હેટરોઝાયગસ કિસ્સામાં લક્ષણ વ્યક્ત થતું નથી. વિકલ્પ B ખોટો છે કારણ કે જનીન અપ્રભાવી છે. વિકલ્પ C ખોટો છે કારણ કે જનીન X-વર્ણસૂત્ર પર છે. વિકલ્પ D ખોટો છે કારણ કે જનીન ઓટોસોમલ નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાનુગતિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "ડ્રોસોફિલામાં સંકરણ પ્રયોગ દરમિયાન, જો સ્ત્રી હેટરોઝાયગસ (X^W X^w) અને પુરુષ હોમોઝાયગસ રીસેસિવ (X^w Y) વચ્ચે સંકરણ કરવામાં આવે, તો F1 પેઢીમાં પુરુષ સંતાનો કયા ફીનોટાઇપ દર્શાવશે?", "opts": ["સફેદ આંખવાળા (White-eyed)", "લાલ આંખવાળા (Red-eyed)", "ગુલાબી આંખવાળા (Pink-eyed)", "પીળી આંખવાળા (Yellow-eyed)"], "ans": 0, "exp": "સ્ત્રી હેટરોઝાયગસ (X^W X^w) અને પુરુષ હોમોઝાયગસ રીસેસિવ (X^w Y) વચ્ચે સંકરણ થતાં F1 પેઢીમાં પુરુષ સંતાનોને માતાથી X^w અને પિતાથી Y વર્ણસૂત્ર મળે છે. આથી તેઓ X^w Y જનીનપ્રકાર ધરાવે છે, જે સફેદ આંખવાળા (White-eyed) ફીનોટાઇપ દર્શાવે છે. લાલ આંખવાળા (B) ફીનોટાઇપ માટે X^W Y જનીનપ્રકાર જરૂરી છે, જે અહીં નથી. ગુલાબી (C) અને પીળી (D) આંખવાળા ફીનોટાઇપ ડ્રોસોફિલામાં આ જનીન માટે જોવા મળતા નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાનુગતિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "રંગસૂત્રીય સિદ્ધાંત અનુસાર, જો એક જીવમાં બે જનીનો વચ્ચેનો અંતર 25 સેન્ટીમોર્ગન (cM) હોય, તો તેમની વચ્ચે ક્રોસિંગ ઓવર થવાની શક્યતા કેટલી હશે?", "opts": ["25%", "50%", "75%", "100%"], "ans": 0, "exp": "1 સેન્ટીમોર્ગન (cM) એ 1% ક્રોસિંગ ઓવર થવાની શક્યતાને દર્શાવે છે. આથી 25 cM અંતર એટલે 25% ક્રોસિંગ ઓવર થવાની શક્યતા. 50% (B), 75% (C), અને 100% (D) અંતરના આધારે નક્કી થતું નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાનુગતિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "મનુષ્યમાં, જો એક સ્ત્રી રંગ અંધત્વ વાહક (Carrier) હોય અને પુરુષ સામાન્ય હોય, તો તેમના સંતાનોમાં રંગ અંધત્વ ધરાવતા પુરુષ સંતાનની શક્યતા કેટલી હશે?", "opts": ["0%", "25%", "50%", "100%"], "ans": 1, "exp": "સ્ત્રી વાહક (X^R X^r) અને પુરુષ સામાન્ય (X^R Y) વચ્ચે સંકરણ થતાં સંતાનોમાં રંગ અંધત્વ ધરાવતા પુરુષ સંતાનની શક્યતા 25% હોય છે. કારણ કે પુરુષ સંતાનને માતાથી X^r અને પિતાથી Y વર્ણસૂત્ર મળવાની શક્યતા 25% હોય છે. 0% (A), 50% (C), અને 100% (D) શક્યતાઓ અયોગ્ય છે.", "ref": "Std 12 - અધ્યાય 5: વંશાનુગતિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "ડ્રોસોફિલામાં, જો બે જનીનો વચ્ચેનો અંતર 50 સેન્ટીમોર્ગનથી વધુ હોય, તો તે કયા સિદ્ધાંતને આધાર આપે છે?", "opts": ["મેન્ડલનો સ્વતંત્ર વિતરણનો નિયમ", "મેન્ડલનો પ્રભુત્વનો નિયમ", "રંગસૂત્રીય સિદ્ધાંત", "સહ-પ્રભુત્વનો નિયમ"], "ans": 0, "exp": "જો બે જનીનો વચ્ચેનો અંતર 50 સેન્ટીમોર્ગનથી વધુ હોય, તો તે જનીનો સ્વતંત્ર રીતે વિતરિત થાય છે, જે મેન્ડલના સ્વતંત્ર વિતરણના નિયમને આધાર આપે છે. મેન્ડલનો પ્રભુત્વનો નિયમ (B) અને સહ-પ્રભુત્વનો નિયમ (D) આ પરિસ્થિતિ સાથે સંબંધિત નથી. રંગસૂત્રીય સિદ્ધાંત (C) જનીનોના વર્ણસૂત્ર પરના સ્થાનને સમજાવે છે, પરંતુ સ્વતંત્ર વિતરણને નહીં.", "ref": "Std 12 - અધ્યાય 5: વંશાનુગતિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "રંગસૂત્રીય સિદ્ધાંત અનુસાર, જો એક જીવમાં બે જનીનો એક જ વર્ણસૂત્ર પર આવેલા હોય અને તેમની વચ્ચે ક્રોસિંગ ઓવર ન થતું હોય, તો તે કયા નિયમને અપવાદ રૂપે ગણી શકાય?", "opts": ["મેન્ડલનો પ્રભુત્વનો નિયમ", "મેન્ડલનો સ્વતંત્ર વિતરણનો નિયમ", "મેન્ડલનો પૃથક્કરણનો નિયમ", "હાર્ડી-વાઇનબર્ગનો નિયમ"], "ans": 1, "exp": "જો બે જનીનો એક જ વર્ણસૂત્ર પર આવેલા હોય અને તેમની વચ્ચે ક્રોસિંગ ઓવર ન થતું હોય, તો તે જનીનો સ્વતંત્ર રીતે વિતરિત થતાં નથી, જે મેન્ડલના સ્વતંત્ર વિતરણના નિયમને અપવાદ રૂપે ગણી શકાય. મેન્ડલનો પ્રભુત્વનો નિયમ (A), પૃથક્કરણનો નિયમ (C), અને હાર્ડી-વાઇનબર્ગનો નિયમ (D) આ પરિસ્થિતિ સાથે સંબંધિત નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાનુગતિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "ડ્રોસોફિલામાં, જો બે વર્ણાધીન લક્ષણો માટેના જનીનો એક જ વર્ણસૂત્ર પર આવેલા હોય અને તેમનો સંકરણ પ્રયોગ કરવામાં આવે, તો F2 પેઢીમાં ફિનોટાઇપિક ગુણોત્તર કયો મળશે જ્યારે કોઈ ક્રોસિંગ ઓવર થતું નથી?", "opts": ["9:3:3:1", "1:1:1:1", "3:1", "1:2:1"], "ans": 2, "exp": "જ્યારે બે જનીનો એક જ વર્ણસૂત્ર પર આવેલા હોય અને ક્રોસિંગ ઓવર થતું નથી, ત્યારે તેઓ એકબીજા સાથે સંપૂર્ણપણે સહવર્તી (completely linked) હોય છે. આ સ્થિતિમાં, F2 પેઢીમાં ફિનોટાઇપિક ગુણોત્તર 3:1 મળે છે, કારણ કે બે જનીનો એક જ ટુકડા તરીકે વર્તે છે. વિકલ્પ A (9:3:3:1) મેન્ડલના સ્વતંત્ર વિતરણના નિયમ માટે છે, વિકલ્પ B (1:1:1:1) ટેસ્ટ ક્રોસ માટે છે, અને વિકલ્પ D (1:2:1) જનીનોપરિણામી ગુણોત્તર માટે છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "ડ્રોસોફિલામાં, જો એક સ્ત્રી હેટરોઝાયગસ (X^W X^w) અને પુરુષ હોમોઝાયગસ (X^W Y) હોય, તો તેમના સંતાનોમાં રંગ અંધત્વ (w) માટેની શક્યતા કેટલી હશે? (ધારો કે X^w એ રંગ અંધત્વ માટેનો રિસેસિવ એલિલ છે)", "opts": ["0%", "25%", "50%", "100%"], "ans": 1, "exp": "સ્ત્રી હેટરોઝાયગસ (X^W X^w) અને પુરુષ હોમોઝાયગસ (X^W Y) હોય ત્યારે, સંતાનોમાં રંગ અંધત્વ (w) માટેની શક્યતા 25% હશે. સ્ત્રી ગેમેટ્સમાં X^W અને X^w હોય છે, જ્યારે પુરુષ ગેમેટ્સમાં X^W અને Y હોય છે. સંતાનોમાં X^w Y (રંગ અંધત્વ ધરાવતો પુરુષ) અને X^W X^w (વાહક સ્ત્રી) મળી શકે છે. વિકલ્પ A ખોટો છે કારણ કે શક્યતા 0% નથી. વિકલ્પ C ખોટો છે કારણ કે 50% શક્યતા નથી. વિકલ્પ D ખોટો છે કારણ કે 100% શક્યતા નથી.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "ડ્રોસોફિલામાં, જો એક સ્ત્રી હોમોઝાયગસ ડોમિનન્ટ (X^W X^W) અને પુરુષ રંગ અંધત્વ ધરાવતો (X^w Y) હોય, તો તેમના સંતાનોમાં રંગ અંધત્વ માટેની શક્યતા કેટલી હશે?", "opts": ["0%", "25%", "50%", "100%"], "ans": 0, "exp": "સ્ત્રી હોમોઝાયગસ ડોમિનન્ટ (X^W X^W) અને પુરુષ રંગ અંધત્વ ધરાવતો (X^w Y) હોય ત્યારે, સંતાનોમાં રંગ અંધત્વ માટેની શક્યતા 0% હશે. સ્ત્રી ગેમેટ્સમાં ફક્ત X^W હોય છે, જ્યારે પુરુષ ગેમેટ્સમાં X^w અને Y હોય છે. સંતાનોમાં X^W X^w (વાહક સ્ત્રી) અને X^W Y (સામાન્ય પુરુષ) મળી શકે છે, પરંતુ રંગ અંધત્વ ધરાવતો કોઈ સંતાન મળશે નહીં. વિકલ્પ B, C, અને D ખોટા છે કારણ કે શક્યતા 0% છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લો: \n(1) રંગસૂત્રીય સિદ્ધાંત અનુસાર, જનીનો વર્ણસૂત્રો પર રેખીય ક્રમમાં ગોઠવાયેલા હોય છે. \n(2) ડ્રોસોફિલામાં, જો બે જનીનો વચ્ચેનું અંતર 50 સેન્ટીમોર્ગન હોય, તો તે બંને જનીનો સ્વતંત્ર રીતે વારસામાં મળે છે. \n(3) મનુષ્યમાં, રંગ અંધત્વ માટે જવાબદાર જનીન X-વર્ણસૂત્ર પર આવેલું હોવાથી, તેને લિંગ-સંકળાયેલ પ્રભાવી લક્ષણ કહે છે. \nઉપરોક્ત વિધાનોમાંથી કયું/કયા વિધાન ખોટું/ખોટાં છે?", "opts": ["ફક્ત (1) અને (2)", "ફક્ત (2) અને (3)", "ફક્ત (3)", "ફક્ત (1) અને (3)"], "ans": 2, "exp": "(1) સાચું છે કારણ કે રંગસૂત્રીય સિદ્ધાંત અનુસાર જનીનો વર્ણસૂત્રો પર રેખીય ક્રમમાં ગોઠવાયેલા હોય છે. (2) સાચું છે કારણ કે 50 સેન્ટીમોર્ગન અંતર ધરાવતા જનીનો સ્વતંત્ર રીતે વારસામાં મળે છે, કારણ કે આ અંતર સ્વતંત્ર વહેંચણીની મર્યાદા દર્શાવે છે. (3) ખોટું છે કારણ કે રંગ અંધત્વ એક લિંગ-સંકળાયેલ પ્રચ્છન્ન (recessive) લક્ષણ છે, પ્રભાવી (dominant) નહીં. તેથી ફક્ત વિધાન (3) ખોટું છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક પ્રયોગમાં, ડ્રોસોફિલાના એક સંકરણમાં બે જનીનો (A અને B) વચ્ચેનો વિનિમય (ક્રોસિંગ ઓવર) 15% જોવા મળ્યો. જો આ બંને જનીનો વચ્ચેનું અંતર 15 સેન્ટીમોર્ગન હોય, તો નીચેનામાંથી કયું વિધાન સાચું છે? \n(નોંધ: ડ્રોસોફિલામાં પુરુષોમાં વિનિમય થતો નથી.)", "opts": ["આ બંને જનીનો એક જ વર્ણસૂત્ર પર આવેલા છે અને સ્ત્રી ડ્રોસોફિલામાં વિનિમય દર 15% છે.", "આ બંને જનીનો અલગ અલગ વર્ણસૂત્રો પર આવેલા છે અને સ્વતંત્ર રીતે વારસામાં મળે છે.", "આ બંને જનીનો એક જ વર્ણસૂત્ર પર આવેલા છે, પરંતુ પુરુષ ડ્રોસોફિલામાં વિનિમય દર 0% છે.", "આ બંને જનીનો વચ્ચેનું અંતર 15 સેન્ટીમોર્ગન હોવાથી, તે સ્વતંત્ર રીતે વારસામાં મળતા નથી."], "ans": 2, "exp": "સેન્ટીમોર્ગન (cM) એ વિનિમયની આવૃત્તિ દર્શાવે છે. 15% વિનિમય એટલે 15 સેન્ટીમોર્ગન અંતર, જે સૂચવે છે કે બંને જનીનો એક જ વર્ણસૂત્ર પર આવેલા છે. ડ્રોસોફિલામાં પુરુષોમાં વિનિમય થતો નથી, તેથી વિકલ્પ (C) સાચો છે. વિકલ્પ (A) અંશતઃ સાચો છે, પરંતુ તેમાં પુરુષોમાં વિનિમય ન થવાની માહિતીનો અભાવ છે. વિકલ્પ (B) અને (D) ખોટા છે કારણ કે 15 સેન્ટીમોર્ગન અંતર સૂચવે છે કે જનીનો એક જ વર્ણસૂત્ર પર છે અને સ્વતંત્ર રીતે વારસામાં મળતા નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "ડ્રોસોફિલામાં, જો બે વર્ણાધીન લક્ષણો (જેમ કે ગ્રે શરીર અને લાલ આંખ) માટેના જનીનો એકબીજાથી 10 સેન્ટીમોર્ગન અંતરે આવેલા હોય, તો સંકરણ પ્રયોગમાં F1 પેઢીમાં પેરેન્ટલ ટાઈપ અને રિકોમ્બિનન્ટ ટાઈપનું પ્રમાણ કેટલું હશે?", "opts": ["90% પેરેન્ટલ, 10% રિકોમ્બિનન્ટ", "85% પેરેન્ટલ, 15% રિકોમ્બિનન્ટ", "95% પેરેન્ટલ, 5% રિકોમ્બિનન્ટ", "80% પેરેન્ટલ, 20% રિકોમ્બિનન્ટ"], "ans": 0, "exp": "રંગસૂત્રીય સિદ્ધાંત અનુસાર, બે જનીનો વચ્ચેનો અંતર સેન્ટીમોર્ગનમાં વ્યક્ત થાય છે, જે ક્રોસિંગ ઓવરની ટકાવારી દર્શાવે છે. 10 સેન્ટીમોર્ગન અંતર એટલે 10% રિકોમ્બિનન્ટ (ક્રોસ ઓવર થયેલ) અને 90% પેરેન્ટલ (ક્રોસ ઓવર ન થયેલ) ટાઈપ હશે. બાકીના વિકલ્પો (B, C, D) અંતરના ગણિતીય સંબંધને અનુરૂપ નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વિકાસ (રંગસૂત્રીય સિદ્ધાંત)", "ch": ""}, {"q": "મનુષ્યમાં, જો એક સ્ત્રી હેટરોઝાયગસ (X^R  અંધત્વથી પીડિત (X^w Y) હોય, તો તેમની સંતાનોમાં રંગ અંધત્વ માટે કયું વિધાન સત્ય છે?", "opts": ["બધી સ્ત્રી સંતાનો વાહક હશે, પુરુષ સંતાનો સામાન્ય હશે.", "બધા પુરુષ સંતાનો રંગ અંધત્વથી પીડિત હશે, સ્ત્રી સંતાનો સામાન્ય હશે.", "બધી સંતાનો (સ્ત્રી અને પુરુષ) સામાન્ય હશે.", "બધી સંતાનો રંગ અંધત્વથી પીડિત હશે."], "ans": 1, "exp": "સ્ત્રી હોમોઝાયગસ ડોમિનન્ટ (X^W X^W) હોવાથી તે તેના બધા સંતાનોને X^W વર્ણસૂત્ર પસાર કરશે. પુરુષ રંગ અંધત્વથી પીડિત (X^w Y) હોવાથી તે તેના પુત્રને Y અને પુત્રીને X^w વર્ણસૂત્ર પસાર કરશે. આમ, પુત્રો X^W Y (સામાન્ય) અને પુત્રીઓ X^W X^w (વાહક) હશે. વિકલ્પ A, C, અને D તર્કસંગત નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વિકાસ (લિંગ-સંલગ્ન વંશાવળી)", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
