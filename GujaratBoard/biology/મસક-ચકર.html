<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>માસિક ચક્ર</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>માસિક ચક્ર</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">માસિક ચક્ર</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "સ્ત્રીઓમાં માસિક ચક્ર દરમિયાન ગ્રાફિયન પુટિકા (Graafian follicle) ફાટ્યા બાદ તરત જ કયું પરિવર્તન થાય છે જે પ્રોજેસ્ટેરોનના સ્ત્રાવ માટે જવાબદાર છે?", "opts": ["કોર્પસ લ્યુટિયમ (Corpus luteum) નું નિર્માણ", "પ્રાથમિક પુટિકા (Primary follicle) નું વિકાસ", "એન્ડોમેટ્રિયમનું વિઘટન", "એસ્ટ્રોજનનું સ્ત્રાવ વધવું"], "ans": 0, "exp": "ગ્રાફિયન પુટિકા ફાટ્યા બાદ તેના અવશેષોમાંથી કોર્પસ લ્યુટિયમ બને છે, જે પ્રોજેસ્ટેરોનનો સ્ત્રાવ કરે છે. પ્રાથમિક પુટિકાનો વિકાસ માસિક ચક્રની શરૂઆતમાં થાય છે. એન્ડોમેટ્રિયમનું વિઘટન માસિક સ્રાવ દરમિયાન થાય છે, અને એસ્ટ્રોજનનું સ્ત્રાવ પુટિકાના વિકાસ દરમિયાન વધે છે, ફાટ્યા બાદ નહીં.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માસિક ચક્રના કયા તબક્કામાં એન્ડોમેટ્રિયમની જાડાઈ સૌથી વધુ હોય છે અને તેનું કારણ શું છે?", "opts": ["પ્રોલિફરેટિવ તબક્કો - એસ્ટ્રોજનના વધતા સ્ત્રાવને કારણે", "સ્ત્રાવી તબક્કો - પ્રોજેસ્ટેરોનના વધતા સ્ત્રાવને કારણે", "માસિક તબક્કો - હોર્મોનના ઘટતા સ્ત્રાવને કારણે", "ઓવ્યુલેશન તબક્કો - LHના વધતા સ્ત્રાવને કારણે"], "ans": 1, "exp": "સ્ત્રાવી તબક્કામાં એન્ડોમેટ્રિયમની જાડાઈ સૌથી વધુ હોય છે કારણ કે કોર્પસ લ્યુટિયમ દ્વારા પ્રોજેસ્ટેરોનનો સ્ત્રાવ થાય છે, જે એન્ડોમેટ્રિયમને જાડું અને ગ્રંથિલ બનાવે છે. પ્રોલિફરેટિવ તબક્કામાં એસ્ટ્રોજનને કારણે એન્ડોમેટ્રિયમ વધે છે, પરંતુ તે સ્ત્રાવી તબક્કા જેટલું જાડું નથી હોતું. માસિક તબક્કામાં હોર્મોનનું સ્તર ઘટે છે અને ઓવ્યુલેશન તબક્કો માત્ર 24 કલાકનો હોય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "જો કોર્પસ લ્યુટિયમનું કાર્ય અચાનક બંધ થઈ જાય તો માસિક ચક્ર પર શું અસર થશે?", "opts": ["માસિક સ્રાવ તરત જ શરૂ થઈ જશે", "એન્ડોમેટ્રિયમનું સતત વૃદ્ધિ થતી રહેશે", "ઓવ્યુલેશન વારંવાર થશે", "એસ્ટ્રોજનનું સ્તર વધી જશે"], "ans": 0, "exp": "કોર્પસ લ્યુટિયમ પ્રોજેસ્ટેરોનનો સ્ત્રાવ કરે છે, જે એન્ડોમેટ્રિયમને જાળવી રાખે છે. જો તેનું કાર્ય બંધ થાય તો પ્રોજેસ્ટેરોનનું સ્તર ઘટી જાય છે, જેના કારણે એન્ડોમેટ્રિયમનું વિઘટન થાય છે અને માસિક સ્રાવ શરૂ થાય છે. એન્ડોમેટ્રિયમનું સતત વૃદ્ધિ પ્રોજેસ્ટેરોનના અભાવમાં શક્ય નથી. ઓવ્યુલેશન કોર્પસ લ્યુટિયમના નિર્માણ પહેલાં થાય છે, અને એસ્ટ્રોજનનું સ્તર કોર્પસ લ્યુટિયમના કાર્ય સાથે સીધું સંબંધિત નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માસિક ચક્ર દરમિયાન LH (Luteinizing Hormone) નો સ્ત્રાવ કયા તબક્કામાં સૌથી વધુ હોય છે અને તેનું મુખ્ય કાર્ય શું છે?", "opts": ["પ્રોલિફરેટિવ તબક્કો - ગ્રાફિયન પુટિકાનું નિર્માણ", "ઓવ્યુલેશન તબક્કો - ગ્રાફિયન પુટિકાનું ફાટવું", "સ્ત્રાવી તબક્કો - કોર્પસ લ્યુટિયમનું નિર્માણ", "માસિક તબક્કો - એન્ડોમેટ્રિયમનું વિઘટન"], "ans": 1, "exp": "LHનો સ્ત્રાવ ઓવ્યુલેશન તબક્કામાં સૌથી વધુ હોય છે અને તે ગ્રાફિયન પુટિકાને ફાટવા માટે ઉત્તેજિત કરે છે. પ્રોલિફરેટિવ તબક્કામાં એસ્ટ્રોજનનું સ્તર વધે છે, પરંતુ LHનું નહીં. સ્ત્રાવી તબક્કામાં પ્રોજેસ્ટેરોનનું સ્તર વધે છે, અને માસિક તબક્કામાં હોર્મોનનું સ્તર ઘટે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "એક સ્ત્રીમાં માસિક ચક્ર 35 દિવસનું છે. તેના માસિક સ્રાવના પહેલા દિવસથી ગણતરી કરતાં ઓવ્યુલેશન કયા દિવસે થવાની સંભાવના સૌથી વધુ છે?", "opts": ["14મા દિવસે", "17મા દિવસે", "21મા દિવસે", "28મા દિવસે"], "ans": 2, "exp": "સામાન્ય રીતે માસિક ચક્ર 28 દિવસનું હોય તો ઓવ્યુલેશન 14મા દિવસે થાય છે, પરંતુ લાંબા ચક્રમાં (35 દિવસ) ઓવ્યુલેશન માસિક સ્રાવના પહેલા દિવસથી લગભગ 14 દિવસ પહેલાં થાય છે (એટલે કે 35-14=21મા દિવસે). આથી 21મા દિવસે ઓવ્યુલેશન થવાની સંભાવના સૌથી વધુ છે. 14મો દિવસ માત્ર 28 દિવસના ચક્ર માટે સાચો છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "એક સ્ત્રીમાં માસિક ચક્ર દરમિયાન પ્રોજેસ્ટેરોન હોર્મોનનો સ્ત્રાવ કોર્પસ લ્યુટિયમ દ્વારા થાય છે, પરંતુ જો ગર્ભધારણ ન થાય તો આ હોર્મોનનું સ્તર અચાનક ઘટી જાય છે. આ ઘટાડાનું મુખ્ય કારણ શું છે?", "opts": ["કોર્પસ લ્યુટિયમનું કોર્પસ એલ્બિકન્સમાં રૂપાંતર થવું", "એસ્ટ્રોજન હોર્મોનનું વધતું પ્રમાણ કોર્પસ લ્યુટિયમને અવરોધે છે", "LH હોર્મોનનું સ્તર અચાનક ઘટી જવું", "ગર્ભાશયના એન્ડોમેટ્રિયમમાંથી પ્રોજેસ્ટેરોનનું શોષણ થવું"], "ans": 0, "exp": "સાચો જવાબ વિકલ્પ A છે. જ્યારે ગર્ભધારણ ન થાય ત્યારે કોર્પસ લ્યુટિયમનું કાર્યક્ષમતા ઘટી જાય છે અને તે કોર્પસ એલ્બિકન્સમાં રૂપાંતરિત થાય છે, જે પ્રોજેસ્ટેરોનનું ઉત્પાદન બંધ કરે છે. વિકલ્પ B ખોટો છે કારણ કે એસ્ટ્રોજન કોર્પસ લ્યુટિયમને અવરોધતું નથી. વિકલ્પ C ખોટો છે કારણ કે LH નું સ્તર અચાનક ઘટતું નથી, પરંતુ તેનું પ્રમાણ પ્રોજેસ્ટેરોનના ઘટાડા પહેલાં જ ઘટી જાય છે. વિકલ્પ D ખોટો છે કારણ કે એન્ડોમેટ્રિયમ પ્રોજેસ્ટેરોનનું શોષણ કરતું નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માસિક ચક્રના લ્યુટિયલ તબક્કા દરમિયાન, જો ગર્ભધારણ થાય તો કોર્પસ લ્યુટિયમનું કાર્ય ચાલુ રહે છે. આ માટે જવાબદાર હોર્મોન કયું છે?", "opts": ["LH (Luteinizing Hormone)", "hCG (Human Chorionic Gonadotropin)", "FSH (Follicle Stimulating Hormone)", "પ્રોલેક્ટિન"], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B છે. ગર્ભધારણ થયા બાદ ગર્ભાશયમાંથી hCG હોર્મોનનો સ્ત્રાવ થાય છે, જે કોર્પસ લ્યુટિયમને પ્રોજેસ્ટેરોન ઉત્પન્ન કરતા રાખે છે. વિકલ્પ A ખોટો છે કારણ કે LH માત્ર ઓવ્યુલેશન પહેલાં કોર્પસ લ્યુટિયમના નિર્માણમાં મદદ કરે છે. વિકલ્પ C ખોટો છે કારણ કે FSH પુટિકાના વિકાસમાં મદદ કરે છે, કોર્પસ લ્યુટિયમને નહીં. વિકલ્પ D ખોટો છે કારણ કે પ્રોલેક્ટિન દૂધ ઉત્પાદન સાથે સંબંધિત છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માસિક ચક્રના પ્રોલિફરેટિવ તબક્કા દરમિયાન એન્ડોમેટ્રિયમની જાડાઈ વધે છે. આ પ્રક્રિયા માટે જવાબદાર હોર્મોનનું મુખ્ય કાર્ય શું છે?", "opts": ["પ્રોજેસ્ટેરોન એન્ડોમેટ્રિયમમાં ગ્રંથિઓનું નિર્માણ કરે છે", "એસ્ટ્રોજન એન્ડોમેટ્રિયમના કોષોના વિભાજનને ઉત્તેજિત કરે છે", "LH એન્ડોમેટ્રિયમના રુધિરવાહિનીઓનું નિર્માણ કરે છે", "FSH એન્ડોમેટ્રિયમની જાડાઈ વધારવામાં સીધી ભૂમિકા ભજવે છે"], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B છે. પ્રોલિફરેટિવ તબક્કા દરમિયાન એસ્ટ્રોજન હોર્મોન એન્ડોમેટ્રિયમના કોષોના વિભાજનને ઉત્તેજિત કરી તેની જાડાઈ વધારે છે. વિકલ્પ A ખોટો છે કારણ કે પ્રોજેસ્ટેરોન સ્રાવી તબક્કામાં ગ્રંથિઓનું નિર્માણ કરે છે. વિકલ્પ C ખોટો છે કારણ કે LH એન્ડોમેટ્રિયમના રુધિરવાહિનીઓના નિર્માણમાં સીધી ભૂમિકા ભજવતું નથી. વિકલ્પ D ખોટો છે કારણ કે FSH એન્ડોમેટ્રિયમની જાડાઈ વધારવામાં સીધી ભૂમિકા ભજવતું નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "એક સ્ત્રીમાં માસિક ચક્ર દરમિયાન ઓવ્યુલેશન પછી તરત જ શરીરનું તાપમાન થોડું વધે છે. આ ફેરફાર માટે જવાબદાર હોર્મોન કયું છે?", "opts": ["એસ્ટ્રોજન", "પ્રોજેસ્ટેરોન", "LH", "FSH"], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B છે. ઓવ્યુલેશન પછી પ્રોજેસ્ટેરોન હોર્મોનનું સ્તર વધે છે, જે શરીરના તાપમાનમાં થોડો વધારો કરે છે. વિકલ્પ A ખોટો છે કારણ કે એસ્ટ્રોજન શરીરના તાપમાનમાં વધારો કરતું નથી. વિકલ્પ C અને D ખોટા છે કારણ કે LH અને FSH હોર્મોન શરીરના તાપમાનને અસર કરતા નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માસિક ચક્ર દરમિયાન, જો કોઈ સ્ત્રીને ગર્ભનિરોધક ગોળીઓ લેવાથી ઓવ્યુલેશન અટકાવવામાં આવે, તો આ ગોળીઓમાં સામાન્ય રીતે કયા હોર્મોનનું સંયોજન હોય છે?", "opts": ["માત્ર એસ્ટ્રોજન", "માત્ર પ્રોજેસ્ટેરોન", "એસ્ટ્રોજન અને પ્રોજેસ્ટેરોનનું સંયોજન", "LH અને FSH નું સંયોજન"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. ગર્ભનિરોધક ગોળીઓમાં સામાન્ય રીતે એસ્ટ્રોજન અને પ્રોજેસ્ટેરોનનું સંયોજન હોય છે, જે FSH અને LH ના સ્ત્રાવને અવરોધી ઓવ્યુલેશન અટકાવે છે. વિકલ્પ A અને B ખોટા છે કારણ કે માત્ર એક હોર્મોનથી અસરકારકતા ઓછી હોય છે. વિકલ્પ D ખોટો છે કારણ કે LH અને FSH નો ઉપયોગ ગર્ભનિરોધક ગોળીઓમાં થતો નથી.", "ref": "Std 12 - પ્રકરણ 4: પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "માસિક ચક્ર દરમિયાન, ફોલિક્યુલર તબક્કામાં FSH ના સ્ત્રાવમાં અચાનક વધારો થવાનું મુખ્ય કારણ કયું છે?", "opts": ["એસ્ટ્રોજન અને પ્રોજેસ્ટેરોનના સ્તરમાં ઘટાડો થવો", "ગોનેડોટ્રોપિન-રિલીઝિંગ હોર્મોન (GnRH) ના સ્ત્રાવમાં વધારો થવો", "કોર્પસ લ્યુટિયમનું વિઘટન થવું", "એન્ડોમેટ્રિયમની જાડાઈમાં ઘટાડો થવો"], "ans": 1, "exp": "FSH ના સ્ત્રાવમાં વધારો મુખ્યત્વે હાયપોથેલામસ દ્વારા સ્ત્રાવ થતાં GnRH ના સ્તરમાં વધારાને કારણે થાય છે. GnRH પિટ્યુટરી ગ્રંથિને ઉત્તેજિત કરે છે, જેથી FSH નો સ્ત્રાવ વધે છે. A) એસ્ટ્રોજન અને પ્રોજેસ્ટેરોનના સ્તરમાં ઘટાડો ફોલિક્યુલર તબક્કાના અંતમાં થાય છે, પરંતુ તે FSH ના સ્ત્રાવનું પ્રાથમિક કારણ નથી. C) કોર્પસ લ્યુટિયમનું વિઘટન લ્યુટિયલ તબક્કાના અંતમાં થાય છે, જે FSH ના સ્ત્રાવ સાથે સીધો સંબંધ ધરાવતું નથી. D) એન્ડોમેટ્રિયમની જાડાઈમાં ઘટાડો માસિક સ્રાવ દરમિયાન થાય છે, જે FSH ના સ્ત્રાવને અસર કરતું નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માસિક ચક્ર દરમિયાન, જો કોઈ સ્ત્રીમાં પ્રોજેસ્ટેરોનના સ્તરમાં અચાનક ઘટાડો થાય, તો કયું પરિણામ સૌથી વધુ સંભવિત છે?", "opts": ["એન્ડોમેટ્રિયમનું વિઘટન અને માસિક સ્રાવ શરૂ થવું", "ઓવ્યુલેશન તરત જ થવું", "FSH અને LH ના સ્ત્રાવમાં ઘટાડો થવો", "કોર્પસ લ્યુટિયમનું પુનર્જીવન થવું"], "ans": 0, "exp": "પ્રોજેસ્ટેરોનના સ્તરમાં ઘટાડો એન્ડોમેટ્રિયમને ટકાવી રાખવા માટે જરૂરી પોષણ પૂરું પાડતું નથી, જેથી એન્ડોમેટ્રિયમ વિઘટિત થાય છે અને માસિક સ્રાવ શરૂ થાય છે. B) ઓવ્યુલેશન પ્રોજેસ્ટેરોનના ઘટાડાથી સીધું સંબંધિત નથી, તે LH ના સ્ત્રાવ પર આધાર રાખે છે. C) પ્રોજેસ્ટેરોનના ઘટાડાથી FSH અને LH ના સ્ત્રાવમાં વધારો થાય છે, ઘટાડો નહીં. D) કોર્પસ લ્યુટિયમનું પુનર્જીવન પ્રોજેસ્ટેરોનના ઘટાડાથી થતું નથી, તે તો વિઘટિત થાય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માસિક ચક્ર દરમિયાન, કયા હોર્મોનના સ્તરમાં વધારો એન્ડોમેટ્રિયમની જાડાઈને ટકાવી રાખવા માટે જરૂરી છે?", "opts": ["એસ્ટ્રોજન", "પ્રોલેક્ટિન", "પ્રોજેસ્ટેરોન", "ટેસ્ટોસ્ટેરોન"], "ans": 2, "exp": "પ્રોજેસ્ટેરોન એન્ડોમેટ્રિયમની જાડાઈને ટકાવી રાખવા અને ગર્ભધારણ માટે તૈયાર કરવા માટે જરૂરી છે. A) એસ્ટ્રોજન એન્ડોમેટ્રિયમની વૃદ્ધિ માટે જરૂરી છે, પરંતુ તેને ટકાવી રાખવા માટે નહીં. B) પ્રોલેક્ટિન સ્તન્ય ઉત્પાદન સાથે સંબંધિત છે. D) ટેસ્ટોસ્ટેરોન પુરુષ હોર્મોન છે અને માસિક ચક્ર સાથે સીધો સંબંધ ધરાવતું નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માસિક ચક્ર દરમિયાન, કયા તબક્કામાં એસ્ટ્રોજનના સ્તરમાં સૌથી વધુ વધારો થાય છે?", "opts": ["માસિક સ્રાવ તબક્કો", "પ્રોલિફરેટિવ તબક્કો", "સેક્રેટરી તબક્કો", "ઓવ્યુલેશન તબક્કો"], "ans": 1, "exp": "એસ્ટ્રોજનના સ્તરમાં સૌથી વધુ વધારો પ્રોલિફરેટિવ તબક્કામાં થાય છે, જ્યારે ફોલિકલ વિકાસ થાય છે અને એસ્ટ્રોજનનો સ્ત્રાવ વધે છે. A) માસિક સ્રાવ તબક્કામાં એસ્ટ્રોજનના સ્તર નીચા હોય છે. C) સેક્રેટરી તબક્કામાં પ્રોજેસ્ટેરોનનું પ્રભુત્વ હોય છે. D) ઓવ્યુલેશન તબક્કો એસ્ટ્રોજનના સ્તરમાં અચાનક વધારો નથી, પરંતુ LH ના સ્ત્રાવમાં વધારો થાય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માસિક ચક્ર દરમિયાન, જો કોઈ સ્ત્રીમાં LH ના સ્ત્રાવમાં અચાનક વધારો ન થાય, તો કયું પરિણામ સૌથી વધુ સંભવિત છે?", "opts": ["ઓવ્યુલેશન થશે નહીં", "એન્ડોમેટ્રિયમની જાડાઈ સતત વધતી રહેશે", "પ્રોજેસ્ટેર માં ઘટાડો થવાથી એન્ડોમેટ્રિયમનું નિર્માણ ઘટે છે અને માસિક સ્રાવ શરૂ થાય છે?", "opts": ["FSH અને એસ્ટ્રોજન", "LH અને પ્રોજેસ્ટેરોન", "એસ્ટ્રોજન અને પ્રોજેસ્ટેરોન", "પ્રોલેક્ટિન અને ઓક્સિટોસિન"], "ans": 2, "exp": "એસ્ટ્રોજન અને પ્રોજેસ્ટેરોનના સ્તરમાં ઘટાડો થવાથી એન્ડોમેટ્રિયમનું નિર્માણ ઘટે છે અને માસિક સ્રાવ શરૂ થાય છે. આ હોર્મોન એન્ડોમેટ્રિયમના વિકાસ અને જાળવણી માટે જરૂરી છે. તેમના ઘટાડાથી એન્ડોમેટ્રિયમનું નિર્માણ ઘટે છે અને રક્તવાહિનીઓ સંકોચાઈ જાય છે, જેના કારણે માસિક સ્રાવ શરૂ થાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: A) FSH એન્ડોમેટ્રિયમના વિકાસ માટે સીધો જવાબદાર નથી. B) LH એન્ડોમેટ્રિયમના વિકાસ માટે સીધો જવાબદાર નથી. D) પ્રોલેક્ટિન અને ઓક્સિટોસિન માસિક ચક્ર સાથે સીધો સંબંધ ધરાવતા નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
