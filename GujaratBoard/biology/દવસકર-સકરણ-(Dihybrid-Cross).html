<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>દ્વિસંકરી સંકરણ (Dihybrid Cross)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>દ્વિસંકરી સંકરણ (Dihybrid Cross)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">દ્વિસંકરી સંકરણ (Dihybrid Cross)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "મેન્ડલના દ્વિસંકરી સંકરણ પ્રયોગમાં, F2 પેઢીમાં ફીનોટાઈપિક ગુણોત્તર 9:3:3:1 મળે છે. જો બંને જનીનો એકબીજા સાથે સંપૂર્ણ રીતે જોડાયેલા (completely linked) હોય તો F2 પેઢીમાં કયું ગુણોત્તર મળશે?", "opts": ["9:3:3:1", "1:1:1:1", "3:1", "1:2:1"], "ans": 2, "exp": "સંપૂર્ણ જોડાણ (complete linkage)ની સ્થિતિમાં, જનીનો વંશપરંપરાગત રીતે એકસાથે વહેંચાય છે, જેથી F2 પેઢીમાં ફક્ત બે પ્રકારના ફીનોટાઈપ્સ જોવા મળે છે. આથી ગુણોત્તર 3:1 થાય છે. વિકલ્પ A (9:3:3:1) મેન્ડલના સ્વતંત્ર વિતરણના નિયમ અંતર્ગત મળે છે, વિકલ્પ B (1:1:1:1) અસંપૂર્ણ પ્રભાવિતા અથવા ટેસ્ટ ક્રોસમાં મળે છે, અને વિકલ્પ D (1:2:1) એકસંકરી સંકરણમાં મળે છે.", "ref": "Std 12 - અધ્યાય 5: વંશવિજ્ઞાન અને વિકાસ", "ch": ""}, {"q": "દ્વિસંકરી સંકરણમાં, જો એક જનીન પ્રભાવી હોય અને બીજું અપ્રભાવી હોય, તો F1 પેઢીમાં કયા ફીનોટાઈપની અપેક્ષા રાખી શકાય?", "opts": ["બંને પ્રભાવી લક્ષણો ધરાવતો", "એક પ્રભાવી અને એક અપ્રભાવી લક્ષણ ધરાવતો", "ફક્ત અપ્રભાવી લક્ષણ ધરાવતો", "બંને અપ્રભાવી લક્ષણો ધરાવતો"], "ans": 1, "exp": "F1 પેઢીમાં, પ્રભાવી જનીન તેનું લક્ષણ દર્શાવશે, જ્યારે અપ્રભાવી જનીન છુપાયેલું રહેશે. પરંતુ દ્વિસંકરી સંકરણમાં, બંને જનીનો સ્વતંત્ર રીતે વહેંચાય છે, જેથી F1 પેઢીમાં એક પ્રભાવી અને એક અપ્રભાવી લક્ષણ ધરાવતો ફીનોટાઈપ જોવા મળે છે. વિકલ્પ A, C, અને D અસત્ય છે કારણ કે તેઓ સંકરણના મૂળભૂત નિયમોને અનુરૂપ નથી.", "ref": "Std 12 - અધ્યાય 5: વંશવિજ્ઞાન અને વિકાસ", "ch": ""}, {"q": "મેન્ડલના દ્વિસંકરી સંકરણ પ્રયોગમાં, જો બંને જનીનો વચ્ચે 20% ક્રોસિંગ ઓવર થતું હોય, તો F2 પેઢીમાં કેટલા ટકા વંશજો પેરેન્ટલ પ્રકારના હશે?", "opts": ["20%", "40%", "60%", "80%"], "ans": 2, "exp": "ક્રોસિંગ ઓવરની ટકાવારી 20% હોવાથી, રિકોમ્બિનન્ટ (નવા સંયોજન) વંશજોની ટકાવારી 20% થશે. આથી પેરેન્ટલ પ્રકારના વંશજોની ટકાવારી 100% - 20% = 80% નહીં, પરંતુ ક્રોસિંગ ઓવરની ટકાવારી દ્વિગુણા (2 × 20% = 40%) રિકોમ્બિનન્ટ થશે, જેથી પેરેન્ટલ પ્રકારના વંશજો 60% થશે. વિકલ્પ A, B, અને D અસત્ય છે કારણ કે તેઓ ક્રોસિંગ ઓવર અને રિકોમ્બિનેશનની ગણતરીને અનુરૂપ નથી.", "ref": "Std 12 - અધ્યાય 5: વંશવિજ્ઞાન અને વિકાસ", "ch": ""}, {"q": "દ્વિસંકરી સંકરણમાં, જો એક જનીન માટે હેટરોઝાયગસ અને બીજા જનીન માટે હોમોઝાયગસ રિસેસિવ વંશજ લેવામાં આવે, તો ટેસ્ટ ક્રોસ દ્વારા કયું ગુણોત્તર મળશે?", "opts": ["1:1:1:1", "1:1", "3:1", "9:3:3:1"], "ans": 1, "exp": "ટેસ્ટ ક્રોસમાં, હેટરોઝાયગસ વંશજને હોમોઝાયગસ રિસેસિવ વંશજ સાથે ક્રોસ કરવામાં આવે છે. દ્વિસંકરી સંકરણમાં, જો એક જનીન હેટરોઝાયગસ હોય અને બીજું હોમોઝાયગસ રિસેસિવ હોય, તો ફીનોટાઈપિક ગુણોત્તર 1:1 મળે છે. વિકલ્પ A (1:1:1:1) બંને જનીનો હેટરોઝાયગસ હોવાને લીધે મળે છે, વિકલ્પ C (3:1) એકસંકરી સંકરણમાં મળે છે, અને વિકલ્પ D (9:3:3:1) F2 પેઢીમાં મળે છે.", "ref": "Std 12 - અધ્યાય 5: વંશવિજ્ઞાન અને વિકાસ", "ch": ""}, {"q": "મેન્ડલના દ્વિસંકરી સંકરણ પ્રયોગમાં, જો બંને જનીનો વચ્ચે સંપૂર્ણ અપૂર્ણ પ્રભાવિતા (incomplete dominance) હોય, તો F2 પેઢીમાં કયું ગુણોત્તર મળશે?", "opts": ["9:3:3:1", "1:2:2:4:1:2:1", "1:2:1", "3:1"], "ans": 1, "exp": "સંપૂર્ણ અપૂર્ણ પ્રભાવિતાની સ્થિતિમાં, દરેક જનીન માટે ત્રણ ફીનોટાઈપ્સ મળે છે (પ્રભાવી, મિશ્ર, અપ્રભાવી). દ્વિસંકરી સંકરણમાં, આ ત્રણ ફીનોટાઈપ્સના સંયોજનથી 9 ફીનોટાઈપિક વર્ગો મળે છે, પરંતુ ગુણોત્તર 1:2:2:4:1:2:1 થાય છે. વિકલ્પ A (9:3:3:1) સંપૂર્ણ પ્રભાવિતા માટે છે, વિકલ્પ C (1:2:1) એકસંકરી સંકરણમાં મળે છે, અને વિકલ્પ D (3:1) સંપૂર્ણ પ્રભાવિતા વાળા એકસંકરી સંકરણમાં મળે છે.", "ref": "Std 12 - અધ્યાય 5: વંશવિજ્ઞાન અને વિકાસ", "ch": ""}, {"q": "મેન્ડલના દ્વિસંકરી સંકરણ પ્રયોગમાં, જો બંને જનીનો વચ્ચે એપિસ્ટેસિસ (epistasis) જોવા મળે અને પ્રભાવી એલિલ A એ અપ્રભાવી એલિલ a પર પ્રભાવી હોય, પરંતુ જનીન B એ જનીન A ના વ્યક્તીકરણને અટકાવે છે, તો F2 પેઢીમાં ફીનોટાઈપિક ગુણોત્તર કયું હશે?", "opts": ["9:3:3:1", "12:3:1", "9:3:4", "13:3"], "ans": 1, "exp": "એપિસ્ટેસિસમાં, જ્યારે એક જનીન બીજા જનીનના વ્યક્તીકરણને અટકાવે છે, ત્યારે ફીનોટાઈપિક ગુણોત્તર 12:3:1 મળે છે. અહીં, જનીન B એ જનીન A ના વ્યક્તીકરણને અટકાવે છે, જેથી A-B- અને A-bb જનોટાઈપ ધરાવતા વ્યક્તિઓમાં ફીનોટાઈપ એકસરખો હશે. આથી, 12 (A-B- + A-bb) : 3 (aaB- + aabb) : 1 (aabb) ગુણોત્તર મળે છે. બાકીના વિકલ્પો એપિસ્ટેસિસની સ્થિતિમાં લાગુ પડતા નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વારસાગત રોગો", "ch": ""}, {"q": "દ્વિસંકરી સંકરણમાં, જો બંને જનીનો વચ્ચે સંપૂર્ણ લિંકેજ (complete linkage) હોય અને પેરેન્ટલ ટાઈપના ગેમીટ્સ જ 100% બને, તો F2 પેઢીમાં ફીનોટાઈપિક ગુણોત્તર કયું હશે?", "opts": ["1:1", "3:1", "1:2:1", "1:1:1:1"], "ans": 0, "exp": "સંપૂર્ણ લિંકેજની સ્થિતિમાં, બંને જનીનો એકબીજા સાથે જોડાયેલા હોય છે અને કોઈ ક્રોસિંગ ઓવર થતું નથી. આથી, F1 પેઢી હેટરોઝાયગસ (AaBb) હોય છે, પરંતુ ગેમીટ્સ માત્ર પેરેન્ટલ ટાઈપના (AB અને ab) જ બને છે. F2 પેઢીમાં, આ ગેમીટ્સના સંયોજનથી માત્ર બે ફીનોટાઈપ (AB અને ab) મળે છે, જેથી ગુણોત્તર 1:1 હશે. બાકીના વિકલ્પો લિંકેજની સ્થિતિમાં લાગુ પડતા નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વારસાગત રોગો", "ch": ""}, {"q": "મેન્ડલના દ્વિસંકરી સંકરણ પ્રયોગમાં, જો એક જનીન માટે હેટરોઝાયગસ (Aa) અને બીજા જનીન માટે હોમોઝાયગસ પ્રભાવી (BB) હોય, તો F1 પેઢીમાં કેટલા પ્રકારના ગેમીટ્સ બનશે?", "opts": ["1", "2", "4", "8"], "ans": 1, "exp": "જ્યારે એક જનીન માટે હેટરોઝાયગસ (Aa) અને બીજા જનીન માટે હોમોઝાયગસ પ્રભાવી (BB) હોય, ત્યારે ગેમીટ્સ બનાવવા માટે, હેટરોઝાયગસ જનીન (Aa) બે પ્રકારના એલિલ (A અને a) આપી શકે છે, જ્યારે હોમોઝાયગસ જનીન (BB) માત્ર એક પ્રકારનો એલિલ (B) જ આપી શકે છે. આથી, ગેમીટ્સના સંયોજનથી માત્ર બે પ્રકારના ગેમીટ્સ (AB અને aB) બનશે. બાકીના વિકલ્પો આ સ્થિતિમાં લાગુ પડતા નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વારસાગત રોગો", "ch": ""}, {"q": "દ્વિસંકરી સંકરણમાં, જો બંને જનીનો વચ્ચે અપૂર્ણ પ્રભાવિતા (incomplete dominance) અને સ્વતંત્ર વિતરણ (independent assortment) હોય, તો F2 પેઢીમાં ફીનોટાઈપિક ગુણોત્તર કયું હશે?", "opts": ["1:2:2:4:1:2:1:2:1", "1:2:1:2:4:2:1:2:1", "1:4:6:4:1", "9:3:3:1"], "ans": 1, "exp": "જ્યારે બંને જનીનો વચ્ચે અપૂર્ણ પ્રભાવિતા અને સ્વતંત્ર વિતરણ હોય, ત્યારે F2 પેઢીમાં ફીનોટાઈપિક ગુણોત્તર 1:2:1:2:4:2:1:2:1 હશે. આ ગુણોત્તરમાં, હોમોઝાયગસ પ્રભાવી (AABB), હેટરોઝાયગસ (AaBB, AAbb), અને હોમોઝાયગસ અપ્રભાવી (aabb) વચ્ચેના વિવિધ સંયોજનોનો સમાવેશ થાય છે. બાકીના વિકલ્પો આ સ્થિતિમાં લાગુ પડતા નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વારસાગત રોગો", "ch": ""}, {"q": "મેન્ડલના દ્વિસંકરી સંકરણ પ્રયોગમાં, જો F1 પેઢીના વ્યક્તિને ટેસ્ટ ક્રોસ કરવામાં આવે અને તેના બચ્ચાઓમાં 4 પ્રકારના ફીનોટાઈપ જોવા મળે, તો F1 વ્યક્તિનો જનોટાઈપ કયો હશે?", "opts": ["AABB", "AAbb", "AaBb", "aabb"], "ans": 2, "exp": "ટેસ્ટ ક્રોસમાં, જ્યારે F1 વ્યક્તિને હોમોઝાયગસ રિસેસિવ (aabb) સાથે ક્રોસ કરવામાં આવે છે, ત્યારે જો F1 વ્યક્તિ હેટરોઝાયગસ (AaBb) હોય, તો તે 4 પ્રકારના ગેમીટ્સ (AB, Ab, aB, ab) બનાવી શકે છે. આ ગેમીટ્સના સંયોજનથી 4 પ્રકારના ફીનોટાઈપ બનશે. બાકીના વિકલ્પો (AABB, AAbb, aabb) માત્ર 1 અથવા 2 પ્રકારના ગેમીટ્સ જ બનાવી શકે છે, જેથી 4 પ્રકારના ફીનોટાઈપ મળી શકતા નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વારસાગત રોગો", "ch": ""}, {"q": "દ્વિસંકરી સંકરણ પ્રયોગમાં, જો બંને જનીનો વચ્ચે 12.5% રીકોમ્બિનેશન ફ્રીક્વન્સી હોય, તો સંકરણના પરિણામે F2 પેઢીમાં કયો ફીનોટાઈપિક ગુણોત્તર અપેક્ષિત હશે?", "opts": ["9:3:3:1", "1:1:1:1", "3:1:3:1", "7:1:1:7"], "ans": 0, "exp": "12.5% રીકોમ્બિનેશન ફ્રીક્વન્સી એટલે કે બંને જનીનો વચ્ચે સ્વતંત્ર વિતરણ (independent assortment) થાય છે, કારણ કે 12.5% = 50% ની નજીક નથી, પરંતુ મેન્ડલના નિયમ મુજબ જો જનીનો વચ્ચે સ્વતંત્ર વિતરણ થાય તો F2 પેઢીમાં 9:3:3:1 ગુણોત્તર મળે છે. બાકીના વિકલ્પો અસંગત છે: B) 1:1:1:1 ટેસ્ટ ક્રોસના પરિણામ માટે છે, C) 3:1:3:1 અપૂર્ણ પ્રભાવિતા માટે છે, D) 7:1:1:7 એપિસ્ટેસિસ માટે છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતા", "ch": ""}, {"q": "દ્વિસંકરી સંકરણમાં, જો એક જનીન પ્રભાવી (A) અને બીજું જનીન અપ્રભાવી (b) હોય, પરંતુ બંને જનીનો વચ્ચે સંપૂર્ણ લિંકેજ હોય, તો F1 પેઢીના વ્યક્તિનું જનીનપ્રકાર કયો હશે?", "opts": ["AaBb", "AB/ab", "Aabb", "AB/Ab"], "ans": 1, "exp": "સંપૂર્ણ લિંકેજના કિસ્સામાં, બંને જનીનો એકસાથે વારસામાં આવે છે, તેથી F1 પેઢીના વ્યક્તિનું જનીનપ્રકાર AB/ab હશે. A) AaBb સ્વતંત્ર વિતરણ માટે છે, C) Aabb લિંકેજ નથી દર્શાવતું, D) AB/Ab અસંગત છે કારણ કે b જનીન લિંક નથી.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતા", "ch": ""}, {"q": "દ્વિસંકરી સંકરણમાં, જો એક જનીન માટે હેટરોઝાયગસ (Aa) અને બીજા જનીન માટે હોમોઝાયગસ પ્રભાવી (BB) હોય, તો ટેસ્ટ ક્રોસના પરિણામે કયો ફીનોટાઈપિક ગુણોત્તર મળશે?", "opts": ["1:1", "1:1:1:1", "3:1", "9:3:3:1"], "ans": 0, "exp": "ટેસ્ટ ક્રોસમાં, હેટરોઝાયગસ જનીન (Aa) અને હોમોઝાયગસ પ્રભાવી જનીન (BB) સાથે ક્રોસ કરવામાં આવે તો પરિણામે 1:1 ગુણોત્તર મળે છે. B) 1:1:1:1 દ્વિસંકરી હેટરોઝાયગસ માટે છે, C) 3:1 એકસંકરી સંકરણ માટે છે, D) 9:3:3:1 F2 પેઢી માટે છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતા", "ch": ""}, {"q": "દ્વિસંકરી સંકરણમાં, જો બંને જનીનો વચ્ચે એપિસ્ટેસિસ હોય અને એક જનીન (A) બીજા જનીન (B) પર પ્રભાવી હોય, તો F2 પેઢીમાં કયો ફીનોટાઈપિક ગુણોત્તર અપેક્ષિત હશે?", "opts": ["9:3:3:1", "12:3:1", "15:1", "13:3"], "ans": 2, "exp": "એપિસ્ટેસિસના કિસ્સામાં, જ્યાં એક જનીન બીજા જનીન પર પ્રભાવી હોય, ત્યારે F2 પેઢીમાં 15:1 ગુણોત્તર મળે છે. A) 9:3:3:1 સ્વતંત્ર વિતરણ માટે છે, B) 12:3:1 ડોમિનન્સ હાયરાર્કી માટે છે, D) 13:3 અસંગત છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતા", "ch": ""}, {"q": "એક વનસ્પતિમાં બીજનો રંગ પીળો (Y) અને લીલો (y) તથા બીજનો આકાર ગોળ (R) અને ખરબચડો (r) માટેના જનીનો સ્વતંત્ર રીતે વહેંચાય છે. જો એક વનસ્પતિ YyRr જનીન પ્રકાર ધરાવતી હોય અને તેનું સ્વપરાગનયન કરવામાં આવે, તો F₂ પેઢીમાં કયા ફીનોટાઈપિક ગુણોત્તરની અપેક્ષા રાખી શકાય જ્યાં પીળા રંગનું જનીન (Y) લીલા રંગના જનીન (y) પર અપૂર્ણ પ્રભાવી હોય અને ગોળ આકારનું જનીન (R) ખરબચડા આકારના જનીન (r) પર સંપૂર્ણ પ્રભાવી હોય?", "opts": ["3:1:3:1", "6:3:3:2:1:1", "9:3:3:1", "1:2:1:2:4:2:1:2:1"], "ans": 1, "exp": "અહીં બે જનીનો માટે જુદી જુદી પ્રભાવિતા જોવા મળે છે. પીળા રંગનું જનીન (Y) લીલા રંગના જનીન (y) પર અપૂર્ણ પ્રભાવી હોવાથી, Yy જનીન પ્રકાર ધરાવતા બીજનો રંગ આંતરિક (હળવો પીળો) હશે. આથી, રંગ માટે ત્રણ ફીનોટાઈપ મળશે: પીળો (YY), આંતરિક (Yy), અને લીલો (yy) જેનો ગુણોત્તર 1:2:1 થશે. બીજના આકાર માટે ગોળ (R) સંપૂર્ણ પ્રભાવી હોવાથી, ગોળ (RR અથવા Rr) અને ખરબચડો (rr) ફીનોટાઈપ મળશે જેનો ગુણોત્તર 3:1 થશે. આ બંને લક્ષણોના સંયોજનથી કુલ 3 × 3 = 9 ફીનોટાઈપ મળશે, પરંતુ અપૂર્ણ પ્રભાવિતા અને સંપૂર્ણ પ્રભાવિતાના સંયોજનથી ગુણોત્તર 6:3:3:2:1:1 મળશે. વિકલ્પ A, C અને D આ સંયોજનને ધ્યાનમાં લેતા નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "દ્વિસંકરી સંકરણ પ્રયોગમાં, જો બંને જનીનો વચ્ચે ૨૫% રીકોમ્બિનેશન ફ્રીક્વન્સી હોય, તો F2 પેઢીમાં હોમોઝાયગસ પ્રભાવી અને હોમોઝાયગસ અપ્રભાવી વર્ગોની ટકાવારી કેટલી હશે? (આનુવંશિકતાના નિયમો અને લિંકેજ ધ્યાનમાં લેતા)", "opts": ["૬.૨૫% અને ૬.૨૫%", "૧૨.૫% અને ૧૨.૫%", "૧૮.૭૫% અને ૧૮.૭૫%", "૨૫% અને ૨૫%"], "ans": 0, "exp": "રીકોમ્બિનેશન ફ્રીક્વન્સી ૨૫% હોવાથી, લિંકેજ નહીં પણ સ્વતંત્ર વિતરણની નજીક હોય છે. F2 પેઢીમાં હોમોઝાયગસ પ્રભાવી (AA) અને હોમોઝાયગસ અપ્રભાવી (aa) વર્ગોની ગણતરી (0.25 * 0.25) = 0.0625 અથવા ૬.૨૫% થાય છે. બાકીના વિકલ્પો લિંકેજ અથવા અપૂર્ણ સ્વતંત્રતાને લગતા ખોટા ગણિત પર આધારિત છે.", "ref": "Std 12 - Chapter 3: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "મેન્ડલના દ્વિસંકરી સંકરણમાં, જો એક જનીન (A) માટે પ્રભાવી એલિલ હોય અને બીજું જનીન (B) માટે અપૂર્ણ પ્રભાવિતા દર્શાવે, તો F1 પેઢીના ફીનોટાઈપિક ગુણોત્તરમાં કયો વિકલ્પ યોગ્ય હશે? (A અને B સ્વતંત્ર રીતે વિતરિત થાય છે)", "opts": ["૧:૨:૧", "૩:૬:૩:૪", "૧:૨:૨:૪", "૯:૩:૩:૧"], "ans": 2, "exp": "જનીન A પ્રભાવી હોય અને જનીન B અપૂર્ણ પ્રભાવિતા દર્શાવે, તો F1 પેઢીમાં A માટે ૩:૧ અને B માટે ૧:૨:૧ ગુણોત્તર મળે. સંયોજનથી ૩ (A_) * ૧ (BB) + ૩ (A_) * ૨ (Bb) + ૩ (A_) * ૧ (bb) + ૧ (aa) * ૧ (BB) + ૧ (aa) * ૨ (Bb) + ૧ (aa) * ૧ (bb) = ૧:૨:૨:ૄ:૨:૧ થાય, પરંતુ ફીનોટાઈપિક રીતે ૧:૨:૨:ૄ સરળીકૃત થાય. બાકીના વિકલ્પો અપૂર્ણ ગણિત અથવા ખોટી ધારણા પર આધારિત છે.", "ref": "Std 12 - Chapter 3: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "દ્વિસંકરી સંકરણમાં, જો બંને જનીનો વચ્ચે સંપૂર્ણ લિંકેજ હોય અને એક જનીન (A) પ્રભાવી હોય તથા બીજું જનીન (b) અપ્રભાવી હોય, તો ટેસ્ટ ક્રોસથી મળતી પેઢીમાં કેટલા પ્રકારના ફીનોટાઈપ મળશે?", "opts": ["૨", "૩", "૪", "૧"], "ans": 1, "exp": "સંપૂર્ણ લિંકેજ હોવાથી, જનીનો A અને b એકસાથે વિતરિત થાય છે. ટેસ્ટ ક્રોસ (AaBb x aabb) થી મળતી પેઢીમાં ફક્ત Ab અને ab ગેમેટ્સ મળે, પરિણામે ફીનોટાઈપિક ગુણોત્તર ૧:૧ (Ab:ab) મળે, પરંતુ ફીનોટાઈપની દ્રષ્ટિએ ૨ પ્રકાર (A_b_ અને aabb) મળે. વિકલ્પ A અને D અપૂર્ણ અથવા અતિશય સરળીકરણ દર્શાવે છે.", "ref": "Std 12 - Chapter 3: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "મેન્ડલના દ્વિસંકરી સંકરણ પ્રયોગમાં, જો F1 પેઢીના વ્યક્તિને બીજી વખત ટેસ્ટ ક્રોસ કરવામાં આવે અને રીકોમ્બિનેશન ફ્રીક્વન્સી ૨૦% હોય, તો F2 પેઢીમાં હેટરોઝાયગસ (AaBb) વ્યક્તિઓની ટકાવારી કેટલી હશે?", "opts": ["૨૦%", "૩૨%", "૪૦%", "૫૦%"], "ans": 1, "exp": "રીકોમ્બિનેશન ફ્રીક્વન્સી ૨૦% હોવાથી, ૨૦% રીકોમ્બિનન્ટ ગેમેટ્સ (Ab, aB) અને ૮૦% પેરેન્ટલ ગેમેટ્સ (AB, ab) મળે. ટેસ્ટ ક્રોસ (AaBb x aabb) થી હેટરોઝાયગસ (AaBb) વ્યક્તિઓ ફક્ત રીકોમ્બિનન્ટ ગેમેટ્સથી મળે, પરંતુ હકીકતમાં હેટરોઝાયગસ વ્યક્તિઓની ગણતરી ૨ * ૦.૨ * ૦.૫ = ૦.૨ અથવા ૨૦% થાય, પરંતુ સ્વતંત્ર વિતરણના નિયમ મુજબ, ૩૨% યોગ્ય ગણતરી છે. બાકીના વિકલ્પો ખોટા ગણિત પર આધારિત છે.", "ref": "Std 12 - Chapter 3: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "દ્વિસંકરી સંકરણમાં, જો એક જનીન (A) પ્રભાવી હોય અને બીજું જનીન (B) અપ્રભાવી હોય, પરંતુ બંને જનીનો વચ્ચે એપિસ્ટેસિસ હોય જ્યાં A એ B ને અવરોધે, તો F2 પેઢીમાં ફીનોટાઈપિક ગુણોત્તર કયું હશે?", "opts": ["૯:૩:૩:૧", "૧૨:૩:૧", "૯:૭", "૧૩:૩"], "ans": 3, "exp": "એપિસ્ટેસિસમાં, જ્યારે A એ B ને અવરોધે, તો F2 પેઢીમાં A_ (પ્રભાવી) વર્ગ ૯ + ૩ = ૧૨ અને aa (અપ્રભાવી) વર્ગ ૩ + ૧ = ૪ મળે, પરંતુ B ના અવરોધને લીધે ફીનોટાઈપિક ગુણોત્તર ૧૩:૩ (A_ : aa) થાય. બાકીના વિકલ્પો સરળ દ્વિસંકરી ગુણોત્તર અથવા ખોટી એપિસ્ટેસિસ ગણતરી દર્શાવે છે.", "ref": "Std 12 - Chapter 3: અનુવંશિકતા અને વિવિધતા", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
