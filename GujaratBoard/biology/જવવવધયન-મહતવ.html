<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>જૈવવૈવિધ્યનું મહત્વ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>જૈવવૈવિધ્યનું મહત્વ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">જૈવવૈવિધ્યનું મહત્વ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "જૈવવૈવિધ્યના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["જૈવવૈવિધ્ય એ પારિસ્થિતિક સંતુલન જાળવવામાં મદદરૂપ થાય છે.", "જૈવવૈવિધ્યના કારણે કેટલાક રોગોના પ્રસારમાં વધારો થાય છે.", "જૈવવૈવિધ્ય એ અનુવંશિક વૈવિધ્યને પ્રોત્સાહન આપે છે.", "જૈવવૈવિધ્ય એ કુદરતી સંસાધનોના સદુપયોગમાં મદદ કરે છે."], "ans": 1, "exp": "જૈવવૈવિધ્ય એ પારિસ્થિતિક સંતુલન જાળવવામાં, અનુવંશિક વૈવિધ્યને પ્રોત્સાહન આપવામાં અને કુદરતી સંસાધનોના સદુપયોગમાં મદદરૂપ થાય છે. પરંતુ જૈવવૈવિધ્યના કારણે રોગોના પ્રસારમાં વધારો થતો નથી, ઉલટાનું, તે પારિસ્થિતિક સ્થિરતા દ્વારા રોગોના પ્રસારને નિયંત્રિત કરવામાં મદદ કરે છે. એટલે વિધાન B ખોટું છે.", "ref": "Std 12 - પ્રકરણ 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "નીચેનામાંથી કયું જૈવવૈવિધ્યના આર્થિક મહત્વ સાથે સંકળાયેલું નથી?", "opts": ["ઔષધીય વનસ્પતિઓનો ઉપયોગ", "કૃષિ પાકોની ઉત્પાદકતા વધારવી", "જંગલોનું વિનાશ કરવું", "નવી જાતિઓનું સંવર્ધન"], "ans": 2, "exp": "જૈવવૈવિધ્યના આર્થિક મહત્વમાં ઔષધીય વનસ્પતિઓનો ઉપયોગ, કૃષિ પાકોની ઉત્પાદકતા વધારવી અને નવી જાતિઓનું સંવર્ધન સમાવિષ્ટ છે. જંગલોનું વિનાશ કરવું એ જૈવવૈવિધ્યના નાશ સાથે સંકળાયેલું છે, આર્થિક મહત્વ સાથે નહીં. એટલે વિધાન C યોગ્ય નથી.", "ref": "Std 12 - પ્રકરણ 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "જૈવવૈવિધ્યના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન યોગ્ય રીતે સંકળાયેલું નથી?", "opts": ["જૈવવૈવિધ્ય એ પારિસ્થિતિક તંત્રની સ્થિરતા માટે જરૂરી છે.", "જૈવવૈવિધ્ય એ કુદરતી પસંદગીના માધ્યમથી ઉત્ક્રાંતિને પ્રોત્સાહન આપે છે.", "જૈવવૈવિધ્ય એ માત્ર વનસ્પતિઓ અને પ્રાણીઓ સુધી મર્યાદિત છે.", "જૈવવૈવિધ્ય એ જીવનની વિવિધતા અને તેના વિતરણને સૂચવે છે."], "ans": 2, "exp": "જૈવવૈવિધ્ય એ પારિસ્થિતિક તંત્રની સ્થિરતા માટે જરૂરી છે, કુદરતી પસંદગી દ્વારા ઉત્ક્રાંતિને પ્રોત્સાહન આપે છે અને જીવનની વિવિધતા અને તેના વિતરણને સૂચવે છે. પરંતુ જૈવવૈવિધ્ય માત્ર વનસ્પતિઓ અને પ્રાણીઓ સુધી મર્યાદિત નથી, પરંતુ તે સૂક્ષ્મજીવો, ફંગી, અને અન્ય સજીવોને પણ સમાવે છે. એટલે વિધાન C ખોટું છે.", "ref": "Std 12 - પ્રકરણ 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "નીચેનામાંથી કયું જૈવવૈવિધ્યના સાંસ્કૃતિક મહત્વ સાથે સંકળાયેલું છે?", "opts": ["કૃષિ ઉત્પાદનમાં વધારો", "પવિત્ર વનસ્પતિઓ અને પ્રાણીઓનો ઉપયોગ ધાર્મિક વિધિઓમાં", "નવી દવાઓનો વિકાસ", "ઉર્જાના નવીન સ્ત્રોતોની શોધ"], "ans": 1, "exp": "જૈવવૈવિધ્યના સાંસ્કૃતિક મહત્વમાં પવિત્ર વનસ્પતિઓ અને પ્રાણીઓનો ઉપયોગ ધાર્મિક વિધિઓમાં થાય છે. કૃષિ ઉત્પાદનમાં વધારો, નવી દવાઓનો વિકાસ, અને ઉર્જાના નવીન સ્ત્રોતોની શોધ એ આર્થિક અને વૈજ્ઞાનિક મહત્વ સાથે સંકળાયેલા છે. એટલે વિધાન B યોગ્ય છે.", "ref": "Std 12 - પ્રકરણ 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "જૈવવૈવિધ્યના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["જૈવવૈવિધ્ય એ માત્ર જંગલોમાં જ જોવા મળે છે.", "જૈવવૈવિધ્ય એ માનવીના જીવનની ગુણવત્તા પર કોઈ અસર કરતું નથી.", "જૈવવૈવિધ્ય એ પારિસ્થિતિક સેવાઓ જેવી કે જળ શુદ્ધિકરણ અને હવાના શુદ્ધિકરણમાં મદદ કરે છે.", "જૈવવૈવિધ્ય એ માત્ર ઉષ્ણકટિબંધીય પ્રદેશોમાં જ જોવા મળે છે."], "ans": 2, "exp": "જૈવવૈવિધ્ય એ પારિસ્થિતિક સેવાઓ જેવી કે જળ શુદ્ધિકરણ અને હવાના શુદ્ધિકરણમાં મદદ કરે છે. જૈવવૈવિધ્ય માત્ર જંગલોમાં જ નહીં, પરંતુ તમામ પારિસ્થિતિક તંત્રોમાં જોવા મળે છે. તે માનવીના જીવનની ગુણવત્તા પર અસર કરે છે અને તમામ પ્રદેશોમાં જોવા મળે છે, માત્ર ઉષ્ણકટિબંધીય પ્રદેશોમાં જ નહીં. એટલે વિધાન C સત્ય છે.", "ref": "Std 12 - પ્રકરણ 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "જૈવવૈવિધ્યના સંદર્ભમાં, નીચેનામાંથી કયો જીવ અત્યંત સંવેદનશીલ પારિસ્થિતિક તંત્રનો સૂચક ગણવામાં આવે છે, જે પારિસ્થિતિક અસંતુલનની ચેતવણી આપે છે?", "opts": ["ગાય", "મધમાખી", "કેળ", "લાયકન (Lichen)"], "ans": 3, "exp": "લાયકન (Lichen) અત્યંત સંવેદનશીલ પારિસ્થિતિક સૂચક છે, કારણ કે તે હવાના પ્રદૂષણ, ખાસ કરીને સલ્ફર ડાયોક્સાઇડની હાજરી પ્રત્યે ખૂબ જ સંવેદનશીલ હોય છે. ગાય, મધમાખી અને કેળ એવા જીવ છે જે પારિસ્થિતિક અસંતુલનની ચેતવણી આપતા નથી. લાયકનનો ઉપયોગ પારિસ્થિતિક નિગરાણી માટે થાય છે, કારણ કે તે પ્રદૂષણના સ્તરને આધારે તેના વિકાસમાં ફેરફાર દર્શાવે છે.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને તેનું સંરક્ષણ", "ch": ""}, {"q": "જૈવવૈવિધ્યના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન 'કીસ્ટોન પ્રજાતિ' (Keystone Species) વિશે સત્ય નથી?", "opts": ["તે પારિસ્થિતિક તંત્રની રચનામાં મહત્વની ભૂમિકા ભજવે છે.", "તેના અદૃશ્ય થવાથી પારિસ્થિતિક તંત્રમાં મોટા પાયે ફેરફાર થાય છે.", "તે સંપૂર્ણપણે શાકાહારી હોય છે.", "ઉદાહરણ તરીકે, સિંહ એ આફ્રિકન સવાનામાં કીસ્ટોન પ્રજાતિ ગણવામાં આવે છે."], "ans": 2, "exp": "કીસ્ટોન પ્રજાતિ એ પારિસ્થિતિક તંત્રની રચનામાં મહત્વની ભૂમિકા ભજવે છે અને તેના અદૃશ્ય થવાથી પારિસ્થિતિક તંત્રમાં મોટા પાયે ફેરફાર થાય છે. સિંહ એ આફ્રિકન સવાનામાં કીસ્ટોન પ્રજાતિનું ઉદાહરણ છે. પરંતુ કીસ્ટોન પ્રજાતિ સંપૂર્ણપણે શાકાહારી હોવી જરૂરી નથી. ઉદાહરણ તરીકે, સિંહ માંસાહારી છે.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને તેનું સંરક્ષણ", "ch": ""}, {"q": "જૈવવૈવિધ્યના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન 'જીન પૂલ' (Gene Pool) વિશે સત્ય છે?", "opts": ["તે એક જ પ્રજાતિના સભ્યો દ્વારા ધરાવવામાં આવતા તમામ જનીનનો સંગ્રહ છે.", "તે ફક્ત એક જ પેઢી દ્વારા ધરાવવામાં આવતા જનીનનો સંગ્રહ છે.", "તે વિવિધ પ્રજાતિઓના જનીનનો સંગ્રહ છે.", "તે ફક્ત મનુષ્યમાં જોવા મળે છે."], "ans": 0, "exp": "જીન પૂલ એ એક જ પ્રજાતિના સભ્યો દ્વારા ધરાવવામાં આવતા તમામ જનીનનો સંગ્રહ છે. તે ફક્ત એક જ પેઢી દ્વારા ધરાવવામાં આવતા જનીનનો સંગ્રહ નથી, પરંતુ તે સમગ્ર પ્રજાતિના જનીનનો સંગ્રહ છે. તે વિવિધ પ્રજાતિઓના જનીનનો સંગ્રહ નથી, અને તે ફક્ત મનુષ્યમાં જોવા મળતું નથી.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને તેનું સંરક્ષણ", "ch": ""}, {"q": "જૈવવૈવિધ્યના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન 'એન્ડેમિક પ્રજાતિ' (Endemic Species) વિશે સત્ય નથી?", "opts": ["તે ફક્ત એક વિશિષ્ટ ભૌગોલિક વિસ્તારમાં જોવા મળે છે.", "તેના અસ્તિત્વને ખતરો હોય છે કારણ કે તેનો વિતરણ વિસ્તાર મર્યાદિત હોય છે.", "તે વિશ્વના તમામ ભાગોમાં જોવા મળે છે.", "ઉદાહરણ તરીકે, એશિયાટિક સિંહ ભારતમાં એન્ડેમિક છે."], "ans": 2, "exp": "એન્ડેમિક પ્રજાતિ ફક્ત એક વિશિષ્ટ ભૌગોલિક વિસ્તારમાં જોવા મળે છે અને તેના અસ્તિત્વને ખતરો હોય છે કારણ કે તેનો વિતરણ વિસ્તાર મર્યાદિત હોય છે. એશિયાટિક સિંહ ભારતમાં એન્ડેમિક છે. પરંતુ એન્ડેમિક પ્રજાતિ વિશ્વના તમામ ભાગોમાં જોવા મળતી નથી.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને તેનું સંરક્ષણ", "ch": ""}, {"q": "જૈવવૈવિધ્યના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન 'બાયોપાયરેસી' (Biopiracy) વિશે સત્ય છે?", "opts": ["તે જૈવિક સંસાધનોના કાયદેસર ઉપયોગને પ્રોત્સાહન આપે છે.", "તે સ્થાનિક સમુદાયોના જૈવિક જ્ઞાન અથવા સંસાધનોનો બિનપરવાનગી ઉપયોગ છે.", "તે ફક્ત વનસ્પતિઓ સાથે સંકળાયેલું છે.", "તે સરકાર દ્વારા સંપૂર્ણપણે નિયંત્રિત છે."], "ans": 1, "exp": "બાયોપાયરેસી એ સ્થાનિક સમુદાયોના જૈવિક જ્ઞાન અથવા સંસાધનોનો બિનપરવાનગી ઉપયોગ છે. તે જૈવિક સંસાધનોના કાયદેસર ઉપયોગને પ્રોત્સાહન આપતું નથી, અને તે ફક્ત વનસ્પતિઓ સાથે સંકળાયેલું નથી. તે સરકાર દ્વારા સંપૂર્ણપણે નિયંત્રિત પણ નથી.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને તેનું સંરક્ષણ", "ch": ""}, {"q": "જૈવવૈવિધ્યના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન 'પારિસ્થિતિક સેવાઓ' (Ecosystem Services) ના સંદર્ભમાં અયોગ્ય ગણાય?", "opts": ["મધમાખીઓ દ્વારા પરાગરજના પરિણામે ખેતીની ઉત્પાદકતા વધે છે, જે પરાગીકરણ સેવા તરીકે ઓળખાય છે.", "મેંગ્રોવ વનસ્પતિ દરિયાકિનારાને કટોકટી દરમિયાન રક્ષણ આપે છે, જે નિયંત્રણ સેવા તરીકે ગણાય છે.", "વનસ્પતિઓ દ્વારા ઓક્સિજન ઉત્પાદન એ વાયુમય ચક્રની સેવા છે, જે માનવજાત માટે જીવનરક્ષક છે.", "કેટલાક સૂક્ષ્મજીવો દ્વારા મૃત જૈવિક પદાર્થોનું વિઘટન થવું એ ઉર્જા ઉત્પાદનની સેવા ગણાય છે."], "ans": 3, "exp": "પારિસ્થિતિક સેવાઓ ચાર પ્રકારની હોય છે: ૧) પુરવઠો સેવાઓ (જેમકે ખોરાક, પાણી), ૨) નિયંત્રણ સેવાઓ (જેમકે કટોકટી રક્ષણ, રોગ નિયંત્રણ), ૩) સાંસ્કૃતિક સેવાઓ (જેમકે મનોરંજન, આધ્યાત્મિક મૂલ્ય), અને ૪) ટેકો સેવાઓ (જેમકે વાયુમય ચક્ર, મૃતદેહ વિઘટન). મૃત જૈવિક પદાર્થોનું વિઘટન એ ટેકો સેવા છે, ઉર્જા ઉત્પાદનની સેવા નહીં. આમ, વિકલ્પ D અયોગ્ય છે.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન 'જૈવવૈવિધ્ય અને કૃષિ' ના સંબંધને યોગ્ય રીતે વર્ણવે છે?", "opts": ["એકજાતીય ખેતી (Monoculture) દ્વારા જૈવવૈવિધ્યમાં વધારો થાય છે અને પાકની ઉત્પાદકતા સુધરે છે.", "સ્થાનિક જાતો (Indigenous Varieties) નો ઉપયોગ કરવાથી રોગપ્રતિકારક શક્તિ વધે છે અને જૈવવૈવિધ્ય સંરક્ષિત રહે છે.", "જનીનિક રીતે સુધારેલા પાકો (GM Crops) દ્વારા જૈવવૈવિધ્ય પર કોઈ અસર થતી નથી.", "કૃત્રિમ ખાતરોના ઉપયોગથી મૃદામાં સૂક્ષ્મજીવોની વૈવિધ્યતા વધે છે."], "ans": 1, "exp": "સ્થાનિક જાતો (Indigenous Varieties) નો ઉપયોગ કરવાથી રોગપ્રતિકારક શક્તિ વધે છે અને જૈવવૈવિધ્ય સંરક્ષિત રહે છે, કારણ કે આ જાતો સ્થાનિક પરિસ્થિતિઓ સાથે અનુકૂળ થયેલી હોય છે. એકજાતીય ખેતી (A) જૈવવૈવિધ્ય ઘટાડે છે, જનીનિક રીતે સુધારેલા પાકો (C) જૈવવૈવિધ્ય પર નકારાત્મક અસર કરી શકે છે, અને કૃત્રિમ ખાતરો (D) મૃદામાં સૂક્ષ્મજીવોની વૈવિધ્યતા ઘટાડી શકે છે.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "જૈવવૈવિધ્યના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન 'રેડ ડેટા બુક' (Red Data Book) વિશે સત્ય નથી?", "opts": ["રેડ ડેટા બુકમાં લુપ્ત થવાના ધોરણ મુજબ પ્રજાતિઓને વર્ગીકૃત કરવામાં આવે છે.", "IUCN દ્વારા પ્રકાશિત થતી રેડ ડેટા બુકમાં ફક્ત સસ્તન પ્રાણીઓ અને પક્ષીઓનો સમાવેશ થાય છે.", "'સંકટગ્રસ્ત' (Endangered) પ્રજાતિઓ એવી પ્રજાતિઓ છે જે લુપ્ત થવાના ઉચ્ચ જોખમમાં છે.", "'સંવેદનશીલ' (Vulnerable) પ્રજાતિઓ એવી પ્રજાતિઓ છે જે ભવિષ્યમાં લુપ્ત થવાના જોખમમાં હોઈ શકે છે."], "ans": 1, "exp": "રેડ ડેટા બુકમાં ફક્ત સસ્તન પ્રાણીઓ અને પક્ષીઓનો સમાવેશ થતો નથી, પરંતુ તમામ પ્રકારની પ્રજાતિઓ (વનસ્પતિઓ, સૂક્ષ્મજીવો, મત્સ્ય, ઉભયચર, સરીસૃપ વગેરે)નો સમાવેશ થાય છે. IUCN દ્વારા પ્રકાશિત થતી રેડ ડેટા બુકમાં લુપ્ત થવાના ધોરણ મુજબ પ્રજાતિઓને વર્ગીકૃત કરવામાં આવે છે, જેમાં 'સંકટગ્રસ્ત' અને 'સંવેદનશીલ' પ્રજાતિઓનો પણ સમાવેશ થાય છે.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન 'જૈવવૈવિધ્ય અને ઓષધિય મહત્વ' ના સંદર્ભમાં અયોગ્ય છે?", "opts": ["ક્વિનાઇન, જે મેલેરિયાના ઉપચારમાં વપરાય છે, તે સિન્કોના વૃક્ષની છાલમાંથી મેળવવામાં આવે છે.", "ડિજિટાલિસ, જે હૃદય રોગના ઉપચારમાં વપરાય છે, તે ફોક્સગ્લોવ વનસ્પતિમાંથી મેળવવામાં આવે છે.", "પેનિસિલિન, જે એન્ટિબાયોટિક તરીકે વપરાય છે, તે પેનિસિલિયમ નામના બેક્ટેરિયામાંથી મેળવવામાં આવે છે.", "મોર્ફિન, જે દર્દનિવારક તરીકે વપરાય છે, તે અફીણ વનસ્પતિમાંથી મેળવવામાં આવે છે."], "ans": 2, "exp": "પેનિસિલિન એન્ટિબાયોટિક છે જે પેનિસિલિયમ નામના ફૂગ (Fungus) માંથી મેળવવામાં આવે છે, બેક્ટેરિયામાંથી નહીં. ક્વિનાઇન (A), ડિજિટાલિસ (B), અને મોર્ફિન (D) ના સ્રોતો યોગ્ય રીતે વર્ણવ્યા છે.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "જૈવવૈવિધ્યના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન 'જૈવિક આક્રમક પ્રજાતિઓ' (Invasive Species) વિશે સત્ય છે?", "opts": ["જૈવિક આક્રમક પ્રજાતિઓ સ્થાનિક પારિસ્થિતિક તંત્રમાં સંતુલન જાળવી રાખે છે.", "જૈવિક આક્રમક પ્રજાતિઓ સ્થાનિક પ્રજાતિઓ સાથે સ્પર્ધા કરે છે અને જૈવવૈવિધ્ય ઘટાડે છે.", "જૈવિક આક્રમક પ્રજાતિઓ ફક્ત જલીય પારિસ્થિતિક તંત્રોમાં જોવા મળે છે.", "જૈવિક આક્રમક પ્રજાતિઓ માનવી દ્વારા પરિચય કરાયેલી હોય છે અને તે હંમેશા લાભદાયી હોય છે."], "ans": 1, "exp": "જૈવિક આક્રમક પ્રજાતિઓ સ્થાનિક પ્રજાતિઓ સાથે સ્પર્ધા કરે છે અને જૈવવૈવિધ્ય ઘટાડે છે, કારણ કે તે સ્થાનિક પારિસ્થિતિક તંત્રમાં અસંતુલન ઉભું કરે છે. વિકલ્પ A અયોગ્ય છે કારણ કે તે સંતુલન જાળવી રાખતી નથી. વિકલ્પ C અયોગ્ય છે કારણ કે આ પ્રજાતિઓ જમીન અને જલીય બંને પારિસ્થિતિક તંત્રોમાં જોવા મળી શકે છે. વિકલ્પ D અયોગ્ય છે કારણ કે આ પ્રજાતિઓ હંમેશા લાભદાયી હોતી નથી, પરંતુ ઘણી વખત હાનિકારક પણ હોય છે.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "ગુજરાતના કચ્છના રણમાં જોવા મળતી 'કાળી મીઠી ઘાસ' (Haloxylon salicornicum) ની જૈવિક મહત્વની દૃષ્ટિએ કયું વિધાન અયોગ્ય છે?", "opts": ["તે રણની મૃત્તિકા સ્થિરતા જાળવવામાં મદદરૂપ થાય છે.", "તેના મૂળ પ્રદેશની જળવાયુ પરિસ્થિતિને અનુકૂળ બનાવે છે.", "તે પ્રાણી જગત માટે ખોરાકનો મુખ્ય સ્રોત છે.", "તેના પર્ણસમૂહ દ્વારા વરસાદી પાણીનું સંગ્રહણ થાય છે."], "ans": 2, "exp": "કાળી મીઠી ઘાસ મુખ્યત્વે મૃત્તિકા સ્થિરતા (A) અને જળવાયુ અનુકૂલન (B) માટે જાણીતી છે. તેના પર્ણસમૂહ દ્વારા વરસાદી પાણીનું સંગ્રહણ (D) પણ થાય છે, પરંતુ તે પ્રાણી જગત માટે ખોરાકનો મુખ્ય સ્રોત નથી (C). પ્રાણીઓ માટે તેનો ઉપયોગ મર્યાદિત છે, જ્યારે અન્ય વિકલ્પો વૈજ્ઞાનિક રીતે સાચા છે.", "ref": "Std 12 - અધ્યાય 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "જૈવવૈવિધ્યના સંદર્ભમાં, 'એલીલોપેથી' (Allelopathy) ની ભૂમિકા સમજાવતું કયું વિધાન સત્ય છે?", "opts": ["તે એક જ પ્રજાતિના વનસ્પતિ સભ્યો વચ્ચે સહકારને પ્રોત્સાહન આપે છે.", "તે વનસ્પતિ દ્વારા ઉત્પન્ન થતાં રસાયણો દ્વારા અન્ય પ્રજાતિઓના વૃદ્ધિને અટકાવે છે.", "તે માત્ર પ્રાણી પ્રજાતિઓમાં જોવા મળતી ઘટના છે.", "તે મૃત્તિકામાં નાઇટ્રોજન સ્થિરીકરણમાં મદદરૂપ થાય છે."], "ans": 1, "exp": "એલીલોપેથી એ વનસ્પતિ દ્વારા ઉત્પન્ન થતાં રસાયણો (જેવા કે ફિનોલિક યોગિકો) છે, જે અન્ય પ્ પ્રજાતિઓના જીન પૂલમાં સુધારો કરવા માટે.", "કૃષિ પાકોની ઉત્પાદકતા વધારવા માટે.", "મનુષ્યમાં અનુવંશિક રોગોના નિવારણ માટે."], "ans": 0, "exp": "'જીન ડ્રાઇવ' તકનીકનો ઉપયોગ મુખ્યત્વે જૈવિક આક્રમક પ્રજાતિઓના નિયંત્રણ માટે (A) થાય છે, કારણ કે તે ચોક્કસ જીનના પ્રસરણને વેગ આપી શકે છે. B, C, અને D ગળતર છે કારણ કે જીન ડ્રાઇવનો ઉપયોગ લુપ્ત પ્રજાતિઓ (B), કૃષિ પાકો (C), અથવા મનુષ્યમાં અનુવંશિક રોગો (D) માટે સીધો ઉપયોગમાં લેવાતો નથી.", "ref": "Std 12 - અધ્યાય 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
