<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>સહાયક કોષો (Synergids)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>સહાયક કોષો (Synergids)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">સહાયક કોષો (Synergids)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 19 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 19 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક પુષ્પી વનસ્પતિના અંડાશયમાં સહાયક કોષોની સંખ્યા કેટલી હોય છે ?", "opts": ["૧", "૨", "૩", "૪"], "ans": 1, "exp": "સહાયક કોષો (Synergids) એ અંડકોષ (Egg cell)ની બાજુમાં આવેલા બે કોષો હોય છે, જે અંડાશયના અંડક (Embryo sac)માં આવેલા અંતઃસ્તર (Antipodal cells) અને અંડકોષ સાથે મળીને ૭-કોષીય, ૮-કોષકેન્દ્રીય રચના બનાવે છે. સહાયક કોષોની સંખ્યા હંમેશા ૨ જ હોય છે. વિકલ્પ A, C, અને D ખોટા છે કારણ કે તેઓ સહાયક કોષોની યોગ્ય સંખ્યા દર્શાવતા નથી.", "ref": "Std 12 - પ્રકરણ ૨: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "સહાયક કોષોનું મુખ્ય કાર્ય કયું છે ?", "opts": ["અંડકોષને પોષણ પૂરું પાડવું", "પરાગનલિકાને આકર્ષિત કરવી અને તેના વિકાસમાં મદદ કરવી", "અંતઃસ્તર કોષોને નિષ્ક્રિય કરવા", "ભ્રૂણપોષણના વિકાસમાં મદદ કરવી"], "ans": 1, "exp": "સહાયક કોષોનું મુખ્ય કાર્ય પરાગનલિકાને આકર્ષિત કરવી અને તેના વિકાસમાં મદદ કરવી છે. તેઓ પરાગનલિકાને અંડકોષ તરફ દોરી જવા માટે રસાયણિક સંકેતો ઉત્પન્ન કરે છે. વિકલ્પ A ખોટો છે કારણ કે પોષણ પૂરું પાડવું એ ભ્રૂણપોષણ (Endosperm)નું કાર્ય છે. વિકલ્પ C ખોટો છે કારણ કે અંતઃસ્તર કોષોનું કોઈ પણ નિષ્ક્રિયીકરણ સહાયક કોષો દ્વારા થતું નથી. વિકલ્પ D ખોટો છે કારણ કે ભ્રૂણપોષણના વિકાસમાં મદદ કરવી એ અંતઃસ્તર કોષો અથવા અન્ય કોષોનું કાર્ય હોઈ શકે, પરંતુ સહાયક કોષોનું મુખ્ય કાર્ય એ નથી.", "ref": "Std 12 - પ્રકરણ ૨: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "સહાયક કોષો અને અંડકોષ વચ્ચે કયો કોષ આવેલો હોય છે ?", "opts": ["અંતઃસ્તર કોષ", "કેળવણી કોષ (Polar nucleus)", "પરાગનલિકા કોષ", "કોઈ કોષ આવેલો નથી"], "ans": 3, "exp": "સહાયક કોષો અને અંડકોષ વચ્ચે કોઈ કોષ આવેલો નથી. અંડકોષ સહાયક કોષોની વચ્ચે આવેલો હોય છે, અને તેઓ ત્રણેય મળીને અંડક (Embryo sac)ની અગ્ર ભાગની રચના કરે છે. વિકલ્પ A, B, અને C ખોટા છે કારણ કે અંતઃસ્તર કોષ, કેળવણી કોષ, અને પરાગનલિકા કોષ અંડકના અન્ય ભાગોમાં આવેલા હોય છે.", "ref": "Std 12 - પ્રકરણ ૨: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "સહાયક કોષોની કોષરસમાં કયા પદાર્થોની હાજરી જોવા મળે છે ?", "opts": ["સ્ટાર્ચ અને પ્રોટીન", "ફાઇબર અને સેલ્યુલોઝ", "લિપિડ અને વસા", "ગ્લાયકોપ્રોટીન અને પેક્ટિન"], "ans": 0, "exp": "સહાયક કોષોની કોષરસમાં સ્ટાર્ચ અને પ્રોટીન જેવા પોષક તત્વોની હાજરી જોવા મળે છે, જે પરાગનલિકાને આકર્ષિત કરવા અને તેના વિકાસમાં મદદ કરે છે. વિકલ્પ B ખોટો છે કારણ કે ફાઇબર અને સેલ્યુલોઝ કોષભિત્તિના ઘટકો છે, કોષરસમાં નહીં. વિકલ્પ C ખોટો છે કારણ કે લિપિડ અને વસા સહાયક કોષોની કોષરસમાં મુખ્યત્વે જોવા મળતા નથી. વિકલ્પ D ખોટો છે કારણ કે ગ્લાયકોપ્રોટીન અને પેક્ટિન કોષભિત્તિ અથવા કોષરસમાં મર્યાદિત પ્રમાણમાં જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ ૨: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "સહાયક કોષોની કોષકેન્દ્રીય રચનામાં કયું લક્ષણ જોવા મળે છે ?", "opts": ["એક જ કોષકેન્દ્ર", "બે કોષકેન્દ્ર, પરંતુ એક જ કોષકેન્દ્રીય પટલ", "બે કોષકેન્દ્ર, જેમાં ફિલીફોર્મ એપરેટસ (Filiform apparatus) હોય છે", "કોષકેન્દ્રનું અભાવ"], "ans": 2, "exp": "સહાયક કોષોની કોષકેન્દ્રીય રચનામાં બે કોષકેન્દ્ર હોય છે, અને તેમાં ફિલીફોર્મ એપરેટસ (Filiform apparatus) નામની રચના જોવા મળે છે, જે પરાગનલિકાને આકર્ષિત કરવા અને તેના વિકાસમાં મદદ કરે છે. વિકલ્પ A ખોટો છે કારણ કે સહાયક કોષોમાં એક જ કોષકેન્દ્ર નહીં પણ બે કોષકેન્દ્ર હોય છે. વિકલ્પ B ખોટો છે કારણ કે બે કોષકેન્દ્ર હોવા છતાં, ફિલીફોર્મ એપરેટસની હાજરી એ મહત્વનું લક્ષણ છે. વિકલ્પ D ખોટો છે કારણ કે કોષકેન્દ્રનું અભાવ સહાયક કોષોમાં જોવા મળતું નથી.", "ref": "Std 12 - પ્રકરણ ૨: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "સહાયક કોષોની કોષરચનામાં નીચેનામાંથી કયું લક્ષણ અંડકોષ કરતાં વિરુદ્ધ હોય છે ?", "opts": ["તેઓ બહુકોષકેન્દ્રીય હોય છે", "તેઓના કોષકેન્દ્રમાં ગાઢ વર્ણસૂત્રી દ્રવ્ય હોય છે", "તેઓના કોષરસમાં રાઇબોસોમ્સની સંખ્યા ઓછી હોય છે", "તેઓના કોષપટલ પર વાળ જેવી રચનાઓ હોય છે"], "ans": 3, "exp": "સહાયક કોષોના કોષપટલ પર વાળ જેવી રચનાઓ (ફિંગર-લાઇક પ્રોજેક્શન્સ) હોય છે, જે અંડકોષમાં જોવા મળતી નથી. અંડકોષ એકકોષકેન્દ્રીય હોય છે (A ખોટું), સહાયક કોષોના કોષકેન્દ્રમાં ગાઢ વર્ણસૂત્રી દ્રવ્ય હોય છે (B સાચું પરંતુ અંડકોષમાં પણ હોય છે), અને રાઇબોસોમ્સની સંખ્યા સહાયક કોષોમાં વધુ હોય છે (C ખોટું).", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "સહાયક કોષો અને અંતઃસ્તરીય કોષ (central cell) વચ્ચેની કોષીય સંરચનામાં કયો તફાવત સૌથી નોંધપાત્ર છે ?", "opts": ["સહાયક કોષોના કોષકેન્દ્રમાં બે કોષકેન્દ્રસમૂહ હોય છે", "અંતઃસ્તરીય કોષ બહુકોષકેન્દ્રીય હોય છે", "સહાયક કોષોના કોષરસમાં સ્ટાર્ચના દાણા હોય છે", "અંતઃસ્તરીય કોષમાં કોષકેન્દ્રની ગેરહાજરી હોય છે"], "ans": 1, "exp": "અંતઃસ્તરીય કોષ બહુકોષકેન્દ્રીય હોય છે (સાચું), જ્યારે સહાયક કોષો એકકોષકેન્દ્રીય હોય છે. સહાયક કોષોના કોષકેન્દ્રમાં એક જ કોષકેન્દ્રસમૂહ હોય છે (A ખોટું), સહાયક કોષોના કોષરસમાં સ્ટાર્ચના દાણા નહીં પણ પ્રોટીન અને RNA હોય છે (C ખોટું), અને અંતઃસ્તરીય કોષમાં કોષકેન્દ્ર હાજર હોય છે (D ખોટું).", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "સહાયક કોષોની ક્રિયાશીલતામાં નીચેનામાંથી કયો હોર્મોન સીધો ભાગ ભજવતો નથી ?", "opts": ["ઓક્સિન", "જિબ્બેરેલિન", "સાયટોકાઇનિન", "એબ્સિસિક એસિડ"], "ans": 3, "exp": "સહાયક કોષોની ક્રિયાશીલતામાં ઓક્સિન, જિબ્બેરેલિન અને સાયટોકાઇનિન હોર્મોનનો સીધો સંબંધ હોય છે, પરંતુ એબ્સિસિક એસિડનો સીધો સંબંધ સહાયક કોષોની ક્રિયાશીલતામાં જોવા મળતો નથી. એબ્સિસિક એસિડ મુખ્યત્વે પાણીના તણાવ અને બીજના સુપ્તાવસ્થામાં ભૂમિકા ભજવે છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન અને પ્રકરણ 15: વનસ્પતિ હોર્મોન", "ch": ""}, {"q": "સહાયક કોષોની કોષરચનામાં નીચેનામાંથી કયું લક્ષણ તેમની પ્રોટીન સંશ્લેષણ ક્ષમતાને સૂચવે છે ?", "opts": ["કોષકેન્દ્રમાં હેટરોક્રોમેટિનની હાજરી", "કોષરસમાં રાઇબોસોમ્સની ઉચ્ચ સંખ્યા", "કોષપટલ પર સેલ્યુલોઝની જાડી પરત", "મોટી કોષરસધાની હાજરી"], "ans": 1, "exp": "સહાયક કોષોની કોષરસમાં રાઇબોસોમ્સની ઉચ્ચ સંખ્યા પ્રોટીન સંશ્લેષણ ક્ષમતાને સૂચવે છે. હેટરોક્રોમેટિન કોષકેન્દ્રમાં જન્યુક્રમની નિષ્ક્રિય અવસ્થાને સૂચવે છે (A ખોટું), કોષપટલ પર સેલ્યુલોઝની જાડી પરત કોષની રક્ષા સાથે સંબંધિત છે (C ખોટું), અને મોટી કોષરસધાની કોષરસના સંગ્રહ સાથે સંબંધિત છે (D ખોટું).", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "સહાયક કોષો અને અંડકોષ વચ્ચેના સંચારમાં નીચેનામાંથી કયો પદાર્થ મુખ્ય ભૂમિકા ભજવે છે ?", "opts": ["ગ્લુકોઝ", "RNA અણુઓ", "લિપિડ", "કેલ્શિયમ આયન"], "ans": 1, "exp": "સહાયક કોષો અને અંડકોષ વચ્ચેના સંચારમાં RNA અણુઓ મુખ્ય ભૂમિકા ભજવે છે, જે અંડકોષના વિકાસ અને પોષણમાં મદદ કરે છે. ગ્લુકોઝ ઉર્જાના સ્ત્રોત તરીકે કામ કરે છે (A ખોટું), લિપિડ ઉર્જા સંગ્રહ માટે હોય છે (C ખોટું), અને કેલ્શિયમ આયન સંકેતાવહનમાં ભાગ ભજવે છે પરંતુ મુખ્ય ભૂમિકા નથી (D ખોટું).", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "અંડપીંડના વિકાસ દરમિયાન સહાયક કોષોનું કયું લક્ષણ તેમને અંડકોષથી અલગ પાડે છે, પરંતુ પોલર કોષો સાથે સમાન બનાવે છે?", "opts": ["તેમની પાસે બે કોષકેન્દ્ર હોય છે", "તેઓમાં રાઇબોઝોમની સંખ્યા ઓછી હોય છે", "તેઓમાં કોષરસીય કણિકાઓ (plasmids) જોવા મળે છે", "તેઓમાં સ્ટાર્ચના દાણા સંગ્રહિત થતાં નથી"], "ans": 0, "exp": "સહાયક કોષો અને પોલર કોષો બંનેમાં અંડપીંડના વિકાસ દરમિયાન બે કોષકેન્દ્ર હોય છે, જ્યારે અંડકોષમાં એક જ કોષકેન્દ્ર હોય છે. બાકીના વિકલ્પો અયોગ્ય છે: રાઇબોઝોમની સંખ્યા સહાયક કોષોમાં વધુ હોય છે (B ગળતર), કોષરસીય કણિકાઓ વનસ્પતિ કોષોમાં જોવા મળતી નથી (C ગળતર), અને સ્ટાર્ચના દાણા સહાયક કોષોમાં સંગ્રહિત થાય છે (D ગળતર).", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "સહાયક કોષોની કોષભિત્તિમાં કયો પદાર્થ અંડકોષની કોષભિત્તિ કરતાં વધુ પ્રમાણમાં જોવા મળે છે, જે તેમની કોષીય સ્થિતિસ્થાપકતામાં યોગદાન આપે છે?", "opts": ["સેલ્યુલોઝ", "પેક્ટિન", "લિગ્નિન", "હેમિસેલ્યુલોઝ"], "ans": 1, "exp": "સહાયક કોષોની કોષભિત્તિમાં પેક્ટિનનું પ્રમાણ અંડકોષ કરતાં વધુ હોય છે, જે તેમની લવચીકતા અને સ્થિતિસ્થાપકતામાં મદદ કરે છે. સેલ્યુલોઝ (A) તો બંનેમાં સમાન પ્રમાણમાં હોય છે, લિગ્નિન (C) કાઠી કોષભિત્તિમાં જોવા મળે છે, અને હેમિસેલ્યુલોઝ (D)નું પ્રમાણ ઓછું હોય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન સહાયક કોષો અને અંતઃસ્તરીય કોષ વચ્ચેના સંવર્ધન (nourishment) સંબંધને સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["સહાયક કોષો અંતઃસ્તરીય કોષને પ્રોટીન પૂરા પાડે છે, પરંતુ કાર્બોદિત નહીં", "અંતઃસ્તરીય કોષ સહાયક કોષોને હોર્મોન ઉત્પન્ન કરવા માટે ઉત્સેચે છે", "સહાયક કોષો અંતઃસ્તરીય કોષમાંથી પોષક તત્વો શોષી લે છે અને અંડકોષ તરફ વહન કરે છે", "અંતઃસ્તરીય કોષ સહાયક કોષોની કોષરસમાં રહેલા ઉત્સેચકોને નિષ્ક્રિય કરે છે"], "ans": 2, "exp": "સહાયક કોષો અંતઃસ્તરીય કોષમાંથી પોષક તત્વો (જેમ કે કાર્બોદિત અને પ્રોટીન) શોષી લે છે અને અંડકોષ તરફ વહન કરવા માટે ચેનલ તરીકે કામ કરે છે. A ગળતર છે કારણ કે સહાયક કોષો કાર્બોદિત પણ પૂરા પાડે છે. B ગળતર છે કારણ કે હોર્મોન ઉત્પાદન સહાયક કોષોનું મુખ્ય કાર્ય નથી. D ગળતર છે કારણ કે અંતઃસ્તરીય કોષ ઉત્સેચકોને નિષ્ક્રિય કરતો નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "જો સહાયક કોષોની કોષકેન્દ્રીય ઝિલ્લી (nuclear envelope)ને નુકસાન થાય, તો નીચેનામાંથી કયી પ્રક્રિયા સૌથી વધુ અસરગ્રસ્ત થશે?", "opts": ["શ્વસન", "પ્રોટીન સંશ્લેષણ", "DNA પ્રતિકૃતિ", "RNA પ્રક્રિયા (processing)"], "ans": 3, "exp": "કોષકેન્દ્રીય ઝિલ્લી RNA પ્રક્રિયા (processing) અને mRNAના કોષરસ તરફ વહન માટે જરૂરી છે. શ્વસન (A) માઇટોકોન્ડ્રિયામાં થાય છે, પ્રોટીન સંશ્લેષણ (B) રાઇબોઝોમ પર થાય છે, અને DNA પ્રતિકૃતિ (C) કોષકેન્દ્રમાં થાય છે પરંતુ ઝિલ્લીના નુકસાનથી સીધી અસર થતી નથી. RNA પ્રક્રિયા (D) સૌથી વધુ અસરગ્રસ્ત થશે કારણ કે તે કોષકેન્દ્રીય ઝિલ્લી સાથે સંકળાયેલી છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "સહાયક કોષો અને અંડકોષ વચ્ચેના કોષીય સંચારમાં નીચેનામાંથી કયો પદાર્થ સૌથી ઓછો ભાગ ભજવે છે?", "opts": ["કેલ્શિયમ આયન", "ઇનોઝિટોલ", "ઓક્સિન", "ગ્લુકોઝ"], "ans": 2, "exp": "સહાયક કોષો અને અંડકોષ વચ્ચેના સંચારમાં કેલ્શિયમ આયન (A) સિગ્નલિંગ માટે, ઇનોઝિટોલ (B) ઓસ્મોટિક સંતુલન માટે, અને ગ્લુકોઝ (D) ઉર્જા સ્રોત તરીકે મહત્વની ભૂમિકા ભજવે છે. ઓક્સિન (C) વનસ્પતિ વૃદ્ધિ હોર્મોન છે અને આ સંચારમાં સીધો ભાગ ભજવતો નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "અંડપ્રસાધન (embryo sac)ના વિકાસ દરમિયાન, સહાયક કોષો (synergids)ની કોષકેન્દ્રીય રચનામાં નીચેનામાંથી કયું અસામાન્ય લક્ષણ જોવા મળે છે જે તેમને અન્ય કોષોથી અલગ પાડે છે?", "opts": ["કોષકેન્દ્રમાં બહુવિધ ન્યુક્લિઓલસ (nucleoli)ની હાજરી", "કોષકેન્દ્રીય ઝિલ્લીનું અપૂર્ણ નિર્માણ", "કોષકેન્દ્રમાં હેટરોક્રોમેટિન (heterochromatin)નું અભાવ", "કોષકેન્દ્રમાં ડિજનરેટિવ ફિલિફોર્મ એપરેટસ (degenerative filiform apparatus)ની હાજરી"], "ans": 3, "exp": "સહાયક કોષોમાં ફિલિફોર્મ એપરેટસ (filiform apparatus) એક વિશિષ્ટ રચના છે જે કોષકેન્દ્રની નજીક જોવા મળે છે અને તેનું અપહ્રાસ (degeneration) થતું હોય છે. આ લક્ષણ તેમને અન્ય કોષોથી અલગ પાડે છે. વિકલ્પ A, B અને Cમાં વર્ણવેલ લક્ષણો સામાન્ય રીતે સહાયક કોષોમાં જોવા મળતા નથી અથવા તે અસામાન્ય નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "સહાયક કોષોની કોષરસીય રચનામાં નીચેનામાંથી કયો પદાર્થ તેમની વિશિષ્ટ ક્રિયાશીલતા માટે જવાબદાર છે, જે અંડકોષના ફલીકરણમાં મદદરૂપ થાય છે?", "opts": ["કેલ્શિયમ આયન (Ca²⁺)નું ઉચ્ચ સાંદ્રણ", "મેગ્નેશિયમ આયન (Mg²⁺)નું નિમ્ન સાંદ્રણ", "પોટેશિયમ આયન (K⁺)નું અસમાન વિતરણ", "સોડિયમ આયન (Na⁺)નું ઉચ્ચ સાંદ્રણ"], "ans": 0, "exp": "સહાયક કોષોમાં કેલ્શિયમ આયન (Ca²⁺)નું ઉચ્ચ સાંદ્રણ જોવા મળે છે, જે પરાગનલિકાના માર્ગદર્શન અને ફલીકરણ પ્રક્રિયામાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે. અન્ય વિકલ્પો (B, C, D)માં વર્ણવેલ આયનોની ભૂમિકા સહાયક કોષોની વિશિષ્ટ ક્રિયાશીલતા માટે મુખ્ય નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન સહાયક કોષોની ઉત્ક્રાંતિ સંબંધિત અપવાદરૂપ છે, જે તેમને અન્ય સહાયક પેશીઓથી અલગ પાડે છે?", "opts": ["સહાયક કોષોની ઉત્પત્તિ મેગાસ્પોરોજેનેસિસ (megasporogenesis) દરમિયાન થાય છે", "સહાયક કોષોની ઉત્ક્રાંતિ પરાગનલિકાના માર્ગદર્શન માટે અનુકૂલિત છે", "સહાયક કોષોની ઉત્પત્તિ સોમેટિક કોષોમાંથી થાય છે, જેમ કે અન્ય પુષ્પીય ભાગો", "સહાયક કોષોની ઉત્ક્રાંતિ અંડપ્રસાધનના વિકાસ સાથે સંકળાયેલ છે"], "ans": 2, "exp": "સહાયક કોષોની ઉત્પત્તિ મેગાસ્પોરોજેનેસિસ દરમિયાન થતી હોય છે, જે જનનકોષો (germ cells)માંથી થાય છે, નહીં કે સોમેટિક કોષોમાંથી. આ તેમને અન્ય પુષ્પીય ભાગોથી અલગ પાડે છે. વિકલ્પ A, B અને D સાચા છે, પરંતુ વિકલ્પ C અપવાદરૂપ છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "સહાયક કોષોની કોષીય ક્રિયાશીલતામાં નીચેનામાંથી કયો ઉત્સેચક (enzyme) સૌથી ઓછી ભૂમિકા ભજવે છે, જે તેમની વિશિષ્ટ કાર્યપ્રણાલી માટે જરૂરી નથી?", "opts": ["એસિડ ફોસ્ફેટેઝ (Acid phosphatase)", "પેરોક્સિડેઝ (Peroxidase)", "રુબિસ્કો (RuBisCO)", "એસ્ટરેઝ (Esterase)"], "ans": 2, "exp": "રુબિસ્કો (RuBisCO) એ પ્રકાશસંશ્લેષણમાં મુખ્ય ભૂમિકા ભજવતો ઉત્સેચક છે, જે સહાયક કોષોમાં જરૂરી નથી કારણ કે તેમનું કાર્ય ફલીકરણમાં મદદરૂપ થવાનું છે. અન્ય વિકલ્પો (A, B, D) સહાયક કોષોની કોષીય ક્રિયાશીલતામાં ભાગ ભજવે છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
