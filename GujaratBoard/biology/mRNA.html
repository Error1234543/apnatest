<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mRNA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>mRNA</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">mRNA</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>

    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>

    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>

    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "mRNA ની રચના દરમિયાન, કયા ઉત્સેચક દ્વારા DNA ની અસરકર્તા (template) શૃંખલા પરથી RNA ની સંશ્લેષણ પ્રક્રિયા થાય છે?", "opts": ["DNA પોલિમરેઝ", "RNA પોલિમરેઝ", "હેલિકેઝ", "લાયગેઝ"], "ans": 1, "exp": "mRNA ની રચના (Transcription) દરમિયાન RNA પોલિમરેઝ ઉત્સેચક DNA ની અસરકર્તા શૃંખલા પરથી RNA નું સંશ્લેષણ કરે છે. DNA પોલિમરેઝ DNA ની નકલ કરે છે, હેલિકેઝ DNA ને અનવિંટી કરે છે, અને લાયગેઝ DNA ના ટુકડાઓને જોડે છે. આથી, RNA પોલિમરેઝ જ સરળ જવાબ છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "યુકેરિયોટિક કોષમાં, mRNA ની પ્રક્રિયા (processing) દરમિયાન કયા ભાગને કાપી નાખવામાં આવે છે?", "opts": ["એક્સોન (Exon)", "ઇન્ટ્રોન (Intron)", "5' કેપ", "પોલિ-એ ડેનાઇલેટેડ ટેલ"], "ans": 1, "exp": "mRNA ની પ્રક્રિયા દરમિયાન ઇન્ટ્રોન (Intron) ભાગને કાપી નાખવામાં આવે છે, જ્યારે એક્સોન (Exon) ભાગને જાળવી રાખવામાં આવે છે. 5' કેપ અને પોલિ-એ ડેનાઇલેટેડ ટેલ mRNA ની સ્થિરતા અને પરિવહન માટે જરૂરી છે, પરંતુ તેને કાપી નાખવામાં આવતા નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "mRNA ની રચના પછી, કયા અણુ દ્વારા તે કોષકેન્દ્રમાંથી કોષરસમાં પરિવહન પામે છે?", "opts": ["રાઇબોઝોમ", "ટીઆરએનએ (tRNA)", "કોષકેન્દ્રીય છિદ્ર (Nuclear pore)", "એન્ડોપ્લાઝમિક જાળકું (Endoplasmic reticulum)"], "ans": 2, "exp": "mRNA કોષકેન્દ્રમાંથી કોષરસમાં કોષકેન્દ્રીય છિદ્ર (Nuclear pore) દ્વારા પરિવહન પામે છે. રાઇબોઝોમ mRNA નું અનુવાદ (Translation) કરે છે, ટીઆરએનએ અમીનો એસિડ લાવે છે, અને એન્ડોપ્લાઝમિક જાળકું પ્રોટીન નું સંશ્લેષણ અને પરિવહન કરે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "mRNA ના અનુવાદ (Translation) દરમિયાન, કયા કોડોન દ્વારા પ્રોટીન સંશ્લેષણની શરૂઆત થાય છે?", "opts": ["UAA", "UAG", "AUG", "UGA"], "ans": 2, "exp": "AUG કોડોન દ્વારા પ્રોટીન સંશ્લેષણની શરૂઆત થાય છે, જે મિથાયોનિન (Methionine) અમીનો એસિડ માટે કોડ કરે છે. UAA, UAG, અને UGA સ્ટોપ કોડોન છે, જે પ્રોટીન સંશ્લેષણને સમાપ્ત કરે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "કયા પ્રકારના RNA મોલેક્યુલ દ્વારા mRNA પરના કોડોનને અમીનો એસિડ સાથે જોડવામાં આવે છે?", "opts": ["rRNA", "tRNA", "snRNA", "miRNA"], "ans": 1, "exp": "tRNA (ટ્રાન્સફર RNA) મોલેક્યુલ દ્વારા mRNA પરના કોડોનને અમીનો એસિડ સાથે જોડવામાં આવે છે. rRNA રાઇબોઝોમ નું ઘટક છે, snRNA mRNA ની પ્રક્રિયામાં ભાગ લે છે, અને miRNA જીન નિયંત્રણમાં ભાગ લે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "mRNA ના અનુવાદ દરમિયાન, રાઇબોઝોમ પર કયા કોડોન દ્વારા પ્રોટીન સંશ્લેષણની સમાપ્તિ થાય છે?", "opts": ["AUG", "UAA", "GUA", "CGU"], "ans": 1, "exp": "UAA એ સ્ટોપ કોડોન છે જે પ્રોટીન સંશ્લેષણની સમાપ્તિ સૂચવે છે. AUG એ સ્ટાર્ટ કોડોન છે, GUA એ વાલિન માટેનો કોડોન છે, અને CGU એ આર્જિનિન માટેનો કોડોન છે. આમ, UAA જ સમાપ્તિ માટે યોગ્ય કોડોન છે.", "ref": "Std 12 - Chapter 6: જનીન અભિવ્યક્તિ અને નિયમન", "ch": ""}, {"q": "mRNA ના અનુવાદ દરમિયાન, કયા RNA મોલેક્યુલ દ્વારા અમીનો એસિડને રાઇબોઝોમ પર લાવવામાં આવે છે?", "opts": ["rRNA", "tRNA", "snRNA", "miRNA"], "ans": 1, "exp": "tRNA (ટ્રાન્સફર RNA) એ અમીનો એસિડને રાઇબોઝોમ પર લાવે છે અને mRNA પરના કોડોન સાથે જોડાય છે. rRNA રાઇબોઝોમની રચનામાં ભાગ લે છે, snRNA mRNA પ્રક્રિયામાં ભાગ લે છે, અને miRNA જનીન નિયમનમાં ભાગ લે છે.", "ref": "Std 12 - Chapter 6: જનીન અભિવ્યક્તિ અને નિયમન", "ch": ""}, {"q": "mRNA ની રચના દરમિયાન, કયા દિશામાં RNA પોલિમરેઝ એ DNA ની અસરકર્તા શૃંખલા પર ચાલે છે?", "opts": ["5' → 3'", "3' → 5'", "5' → 5'", "3' → 3'"], "ans": 1, "exp": "RNA પોલિમરેઝ એ DNA ની અસરકર્તા શૃંખલા પર 3' → 5' દિશામાં ચાલે છે, જ્યારે mRNA ની રચના 5' → 3' દિશામાં થાય છે. આમ, RNA પોલિમરેઝ એ DNA ની શૃંખલાને વાંચીને mRNA ની રચના કરે છે.", "ref": "Std 12 - Chapter 6: જનીન અભિવ્યક્તિ અને નિયમન", "ch": ""}, {"q": "mRNA ના અનુવાદ દરમિયાન, કયા રાઇબોઝોમલ સબયુનિટ દ્વારા mRNA ને બાંધવામાં આવે છે?", "opts": ["60S", "40S", "30S", "50S"], "ans": 1, "exp": "યુકેરિયોટિક કોષમાં, 40S રાઇબોઝોમલ સબયુનિટ દ્વારા mRNA ને બાંધવામાં આવે છે. 60S એ યુકેરિયોટિક રાઇબોઝોમનું મોટું સબયુનિટ છે, જ્યારે 30S અને 50S એ પ્રોકેરિયોટિક રાઇબોઝોમના સબયુનિટ છે.", "ref": "Std 12 - Chapter 6: જનીન અભિવ્યક્તિ અને નિયમન", "ch": ""}, {"q": "એક પ્રયોગમાં, વૈજ્ઞાનિકોએ યુકેરિયોટિક કોષમાંથી અલગ કરેલા mRNA નું વિશ્લેષણ કર્યું. તેમને જાણવા મળ્યું કે આ mRNA ની લંબાઈ તેના પ્રાથમિક ટ્રાન્સક્રિપ્ટ (primary transcript) કરતાં નોંધપાત્ર રીતે ટૂંકી હતી, પરંતુ તેના 5' છેડા પર એક વિશિષ્ટ રાસાયણિક સંરચના જોવા મળી. આ સંરચના અને mRNA ની લંબાઈમાં ઘટાડો અનુક્રમે કઈ પ્રક્રિયાઓનું પરિણામ છે?", "opts": ["5' કેપિંગ અને પોલિએડિનાઇલેશન", "સ્પ્લાઇસિંગ અને 5' કેપિંગ", "5' કેપિંગ અને સ્પ્લાઇસિંગ", "પોલિએડિનાઇલેશન અને સ્પ્લાઇસિંગ"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. યુકેરિયોટિક mRNA ની પ્રક્રિયા દરમિયાન, પ્રાથમિક ટ્રાન્સક્રિપ્ટમાંથી ઇન્ટ્રોનને દૂર કરવા માટે સ્પ્લાઇસિંગ થાય છે, જેના કારણે mRNA ની લંબાઈ ઘટે છે. આ ઉપરાંત, 5' છેડા પર 7-મિથાઇલગુઆનોસિનનો કેપ ઉમેરવામાં આવે છે, જેને 5' કેપિંગ કહે છે. આ કેપ mRNA ને સ્થિરતા આપે છે અને અનુવાદની શરૂઆતમાં મદદ કરે છે.\n\nવિકલ્પ A ખોટો છે કારણ કે પોલિએડિનાઇલેશન 3' છેડા પર થાય છે, જે mRNA ની લંબાઈમાં ઘટાડો કરતું નથી.\nવિકલ્પ B ખોટો છે કારણ કે સ્પ્લાઇસિંગ mRNA ની લંબાઈ ઘટાડે છે, પરંતુ 5' કેપિંગ લંબાઈમાં ફેરફાર કરતું નથી.\nવિકલ્પ D ખોટો છે કારણ કે પોલિએડિનાઇલેશન 3' છેડા પર થાય છે અને સ્પ્લાઇસિંગ લંબાઈ ઘટાડે છે, પરંતુ 5' છેડા પરની સંરચના માટે જવાબદાર નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ભિન્નતાના આણ્વિક આધાર", "ch": ""}, {"q": "યુકેરિયોટિક કોષમાં, mRNA ની પ્રક્રિયા (processing) પછી, કયા રાસાયણિક પરિવર્તન દ્વારા તેની સ્થિરતા વધે છે અને ન્યુક્લિયેઝથી રક્ષણ મળે છે?", "opts": ["5' કેપિંગ (7-મિથાઇલગુઆનોસિન કેપ)", "3' પોલી-એડેનાઇલેશન (Poly-A tail)", "સ્પ્લાઇસિંગ દ્વારા ઇન્ટ્રોનનું કાપી નાખવું", "mRNA ની ડબલ-સ્ટ્રેન્ડેડ રચના"], "ans": 1, "exp": "3' પોલી-એડેનાઇલેશન (Poly-A tail) દ્વારા mRNA ની સ્થિરતા વધે છે અને ન્યુક્લિયેઝ એન્ઝાઇમથી રક્ષણ મળે છે. 5' કેપિંગ પણ સ્થિરતા આપે છે, પરંતુ પ્રશ્નમાં સ્થિરતા અને ન્યુક્લિયેઝ રક્ષણ માટે 3' પોલી-એડેનાઇલેશન વધુ મહત્વનું છે. સ્પ્લાઇસિંગ ઇન્ટ્રોન કાપીને mRNA ને પરિપક્વ બનાવે છે, પરંતુ સ્થિરતા માટે નહીં. mRNA એકલ-સ્ટ્રેન્ડેડ હોય છે, ડબલ-સ્ટ્રેન્ડેડ નહીં.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને જૈવ-તકનીકી", "ch": ""}, {"q": "એક mRNA અણુ પર AUG કોડોન હાજર છે, પરંતુ પ્રોટીન સંશ્લેષણ શરૂ થતું નથી. આનું શક્ય કારણ કયું હોઈ શકે?", "opts": ["AUG કોડોન પહેલાં કોઈ કોઝાક સિક્વેન્સ (Kozak sequence) નથી", "mRNA પર 5' કેપ નથી", "રાઇબોઝોમલ સબયુનિટ્સ અપૂર્ણ છે", "tRNA મોલેક્યુલ્સ ઉપલબ્ધ નથી"], "ans": 0, "exp": "AUG કોડોન પ્રોટીન સંશ્લેષણની શરૂઆત માટે કોઝાક સિક્વેન્સ (GCCGCCAUGG) ની જરૂર પડે છે. જો આ સિક્વેન્સ ન હોય, તો AUG કોડોન ઓળખાય નહીં. 5' કેપ ન હોવું અથવા રાઇબોઝોમલ સબયુનિટ્સ અપૂર્ણ હોવું પણ અસર કરે, પરંતુ પ્રશ્નમાં AUG કોડોન હાજર હોવા છતાં શરૂઆત ન થવાનું કારણ કોઝાક સિક્વેન્સનું અભાવ છે. tRNA ના અભાવથી અનુવાદ થવાનું બંધ થાય, પરંતુ AUG ઓળખાય એ પહેલાંનું મુદ્દો નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને જૈવ-તકનીકી", "ch": ""}, {"q": "પ્રોકેરિયોટ્સ અને યુકેરિયોટ્સમાં mRNA ના અનુવાદમાં કયો તફાવત સાચો છે?", "opts": ["પ્રોકેરિયોટ્સમાં mRNA નો અનુવાદ કોષકેન્દ્રમાં થાય છે", "યુકેરિયોટ્સમાં mRNA નો અનુવાદ કોષરસમાં થાય છે અને તે પહેલાં પ્રક્રિયા (processing) થાય છે", "પ્રોકેરિયોટ્સમાં mRNA ની ઉમર લાંબી હોય છે", "યુકેરિયોટ્સમાં mRNA નો અનુવાદ કોષકેન્દ્રમાં થાય છે અને પ્રોકેરિયોટ્સમાં કોષરસમાં થાય છે"], "ans": 1, "exp": "યુકેરિયોટ્સમાં mRNA નો અનુવાદ કોષરસમાં થાય છે અને તે પહેલાં કોષકેન્દ્રમાં પ્રક્રિયા (processing) થાય છે. પ્રોકેરિયોટ્સમાં કોષકેન્દ્ર ન હોવાથી અનુવાદ કોષરસમાં જ થાય છે અને પ્રક્રિયા થતી નથી. પ્રોકેરિયોટ્સમાં mRNA ની ઉમર ટૂંકી હોય છે, કારણ કે તે ન્યુક્લિયેઝ દ્વારા ઝડપથી તોડી નાખવામાં આવે છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને જૈવ-તકનીકી", "ch": ""}, {"q": "mRNA ના અનુવાદ દરમિયાન, રાઇબોઝોમ પર કયા તબક્કામાં પેપ્ટાઇડ બંધ રચાય છે?", "opts": ["ઇનિશિયેશન (Initiation)", "એલોંગેશન (Elongation)", "ટર્મિનેશન (Termination)", "ટ્રાન્સલોકેશન (Translocation)"], "ans": 1, "exp": "પેપ્ટાઇડ બંધ એલોંગેશન તબક્કામાં રચાય છે, જ્યારે અમીનો એસિડ્સ એકબીજા સાથે જોડાય છે. ઇનિશિયેશનમાં રાઇબોઝોમ mRNA સાથે જોડાય છે, ટર્મિનેશનમાં પ્રોટીન સંશ્લેષણ સમાપ્ત થાય છે, અને ટ્રાન્સલોકેશનમાં રાઇબોઝોમ mRNA પર આગળ સરે છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને જૈવ-તકનીકી", "ch": ""}, {"q": "એક mRNA અણુ પર UAA, UAG, અને UGA કોડોન હાજર છે. આ mRNA નો અનુવાદ કયા પરિસ્થિતિમાં સમાપ્ત થશે નહીં?", "opts": ["જો રાઇબોઝોમલ સબયુનિટ્સ અપૂર્ણ હોય", "જો mRNA પર કોઈ સ્ટોપ કોડોન ન હોય", "જો રિલીઝ ફેક્ટર (Release factor) ઉપલબ્ધ ન હોય", "જો tRNA મોલેક્યુલ્સ ઉપલબ્ધ ન હોય"], "ans": 1, "exp": "UAA, UAG, અને UGA સ્ટોપ કોડોન છે, જે પ્રોટીન સંશ્લેષણની સમાપ્તિ કરે છે. જો mRNA પર કોઈ સ્ટોપ કોડોન ન હોય, તો અનુવાદ સમાપ્ત થશે નહીં. રાઇબોઝોમલ સબયુનિટ્સ અપૂર્ણ હોવા, રિલીઝ ફેક્ટર ન હોવા, અથવા tRNA ના અભાવથી અનુવાદ અટકી શકે, પરંતુ સ્ટોપ કોડોનના અભાવે અનુવાદ ચાલુ રહેશે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને જૈવ-તકનીકી", "ch": ""}, {"q": "યુકેરિયોટિક કોષમાં, mRNA ની પ્રક્રિયા (processing) દરમિયાન, 5' કેપ અને પોલિ-એ ડીનાઇલેટેડ ટેલ ઉમેરવામાં આવે છે. આ પરિવર્તનોનો મુખ્ય હેતુ શો છે?", "opts": ["mRNA ને ન્યુક્લિયેઝથી બચાવવા અને અનુવાદની કાર્યક્ષમતા વધારવા", "mRNA ને કોષકેન્દ્રમાંથી કોષરસમાં પરિવહન કરવા", "mRNA ની સ્થિરતા ઘટાડવા અને તેના વિઘટનને વેગ આપવા", "mRNA ને DNA સાથે પુનર્જોડવા"], "ans": 0, "exp": "5' કેપ અને પોલિ-એ ડીનાઇલેટેડ ટેલ mRNA ને ન્યુક્લિયેઝથી બચાવે છે અને અનુવાદની કાર્યક્ષમતા વધારે છે. આ પરિવર્તનો mRNA ની સ્થિરતા વધારે છે અને તેને કોષરસમાં લાંબો સમય ટકી રહેવામાં મદદ કરે છે. વિકલ્પ B મૂળભૂત રીતે ખોટો છે કારણ કે પરિવહન માટે અન્ય અણુઓ જવાબદાર હોય છે. વિકલ્પ C અને D mRNA ની બાયોલોજીકલ ભૂમિકા સાથે સુસંગત નથી.", "ref": "Std 12 - Chapter 6: જીન અભિવ્યક્તિ અને જનીનિક નિયંત્રણ", "ch": ""}, {"q": "એક mRNA અણુ પર UAA, UAG, અને UGA કોડોન હાજર છે. આ કોડોનની ભૂમિકા શી છે?", "opts": ["પ્રોટીન સંશ્લેષણની શરૂઆત કરવા", "અમીનો એસિડની શૃંખલામાં વિશિષ્ટ અમીનો એસિડ ઉમેરવા", "પ્રોટીન સંશ્લેષણને સમાપ્ત કરવા", "mRNA ને કોષકેન્દ્રમાંથી કોષરસમાં પરિવહન કરવા"], "ans": 2, "exp": "UAA, UAG, અને UGA કોડોનને સ્ટોપ કોડોન કહેવાય છે, જે પ્રોટીન સંશ્લેષણને સમાપ્ત કરે છે. વિકલ્પ A અને B ખોટા છે કારણ કે આ કોડોન પ્રોટીન સંશ્લેષણની શરૂઆત અથવા અમીનો એસિડ ઉમેરવામાં ભાગ લેતા નથી. વિકલ્પ D ખોટો છે કારણ કે પરિવહન માટે અન્ય અણુઓ જવાબદાર હોય છે.", "ref": "Std 12 - Chapter 6: જીન અભિવ્યક્તિ અને જનીનિક નિયંત્રણ", "ch": ""}, {"q": "યુકેરિયોટિક કોષમાં, mRNA ની પ્રક્રિયા (processing) પછી, 5' કેપ અને પોલિ-એ ડીનાઇલેટેડ ટેલની ભૂમિકા શું છે?", "opts": ["mRNA ને ન્યુક્લિયેઝથી બચાવે છે અને રાઇબોઝોમ સાથે જોડાણમાં મદદ કરે છે", "mRNA ની અર્ધઆયુષ્ય વધારે છે અને અનુવાદની કાર્યક્ષમતા વધારે છે", "mRNA ને કોષકેન્દ્રમાંથી બહાર કાઢવામાં મદદ કરે છે અને પ્રોટીન સંશ્લેષણને વેગ આપે છે", "mRNA ની રચના દરમિયાન ત્રુટિઓને સુધારે છે અને જનીન અભિવ્યક્તિને નિયંત્રિત કરે છે"], "ans": 1, "exp": "5' કેપ અને પોલિ-એ ડીનાઇલેટેડ ટેલ mRNA ની અર્ધઆયુષ્ય વધારે છે અને અનુવાદની કાર્યક્ષમતા વધારે છે. 5' કેપ mRNA ને ન્યુક્લિયેઝથી બચાવે છે, પરંતુ તે રાઇબોઝોમ સાથે જોડાણમાં મદદ કરતું નથી (A ગળતર છે). પોલિ-એ ટેલ mRNA ની સ્થિરતા વધારે છે, પરંતુ તે કોષકેન્દ્રમાંથી બહાર કાઢવામાં મદદ કરતું નથી (C ગળતર છે). mRNA ની રચના દરમિયાન ત્રુટિઓ સુધારવા માટે આ રચનાઓ જવાબદાર નથી (D ગળતર છે).", "ref": "Std 12 - અધ્યાય 6: જૈવ અણુઓ અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "એક સંશોધનમાં જાણવા મળ્યું કે કેટલાક વાઇરસમાં mRNA અણુ પોલિસિસ્ટ્રોનિક હોય છે, જ્યારે મોટાભાગના યુકેરિયોટિક mRNA મોનોસિસ્ટ્રોનિક હોય છે. આ તફાવતનું મુખ્ય કારણ શું છે?", "opts": ["વાઇરસમાં એક જ mRNA પરથી એક કરતાં વધુ પ્રોટીનનું સંશ્લેષણ થઈ શકે તેવી જરૂરિયાત હોય છે, જ્યારે યુકેરિયોટ્સમાં એક mRNA એક જ પ્રોટીન માટે હોય છે", "યુકેરિયોટિક કોષોમાં mRNA ની પ્રક્રિયા દરમિયાન પોલિસિસ્ટ્રોનિક mRNA ને મોનોસિસ્ટ્રોનિકમાં ફેરવી દેવામાં આવે છે", "વાઇરસમાં RNA પોલિમરેઝ ઉત્સેચક યુકેરિયોટ્સ કરતાં વધુ કાર્યક્ષમ હોય છે, જે પોલિસિસ્ટ્રોનિક mRNA બનાવી શકે છે", "યુકેરિયોટિક કોષોમાં રાઇબોઝોમ માત્ર મોનોસિસ્ટ્રોનિક mRNA ને જ ઓળખી શકે છે, જ્યારે વાઇરસના રાઇબોઝોમ પોલિસિસ્ટ્રોનિક mRNA ને ઓળખી શકે છે"], "ans": 0, "exp": "સાચો જવાબ વિકલ્પ A છે કારણ કે વાઇરસમાં જગ્યા અને સંસાધનોની મર્યાદાને કારણે એક જ mRNA પરથી એક કરતાં વધુ પ્રોટીનનું સંશ્લેષણ થઈ શકે તેવી જરૂરિયાત હોય છે, જેને પોલિસિસ્ટ્રોનિક mRNA કહે છે. યુકેરિયોટ્સમાં સામાન્ય રીતે એક mRNA એક જ પ્રોટીન માટે હોય છે (મોનોસિસ્ટ્રોનિક). વિકલ્પ B ખોટો છે કારણ કે યુકેરિયોટિક mRNA ની પ્રક્રિયા દરમિયાન પોલિસિસ્ટ્રોનિક mRNA ને મોનોસિસ્ટ્રોનિકમાં ફેરવવામાં આવતું નથી. વિકલ્પ C ખોટો છે કારણ કે વાઇરસમાં RNA પોલિમરેઝની કાર્યક્ષમતા વધુ હોવાનું કોઈ પુરાવા નથી. વિકલ્પ D ખોટો છે કારણ કે યુકેરિયોટિક રાઇબોઝોમ પણ પોલિસિસ્ટ્રોનિક mRNA ને ઓળખી શકે છે, પરંતુ આવા mRNA યુકેરિયોટ્સમાં સામાન્ય રીતે જોવા મળતા નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક પ્રયોગમાં, વૈજ્ઞાનિકોએ માનવ કોષમાંથી અલગ કરેલા mRNA નું વિશ્લેષણ કર્યું. તેમને જાણવા મળ્યું કે આ mRNA અણુમાં એક જ જનીનના કોડિંગ ક્ષેત્રમાંથી બે અલગ-અલગ પ્રોટીનનું સંશ્લેષણ થઈ શકે છે. આ ઘટનાનું સૌથી સંભવિત કારણ શું હોઈ શકે?", "opts": ["mRNA અણુમાં વૈકલ્પિક સ્પ્લાઇસિંગ (alternative splicing) દ્વારા અલગ-અલગ એક્ઝોનનો સમાવેશ થયો છે", "mRNA અણુમાં એક જ કોડિંગ ક્ષેત્રમાંથી બે અલગ-અલગ શરૂઆત કોડોન (start codons) હાજર છે", "mRNA અણુમાં રાઇબોઝોમનું ફ્રેમશિફ્ટિંગ (ribosomal frameshifting) થયું છે, જેનાથી અલગ પ્રોટીન બને છે", "mRNA અણુ પોલિસિસ્ટ્રોનિક છે, જેમાં બે અલગ-અલગ જનીનના કોડિંગ ક્ષેત્રો હાજર છે"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. માનવ કોષોમાં, કેટલાક કિસ્સાઓમાં રાઇબોઝોમ ફ્રેમશિફ્ટિંગ દ્વારા mRNA ના વાંચન ફ્રેમમાં ફેરફાર થાય છે, જેના કારણે એક જ કોડિંગ ક્ષેત્રમાંથી બે અલગ-અલગ પ્રોટીનનું સંશ્લેષણ થઈ શકે છે. આ ઘટના વાઇરસ અને કેટલાક યુકેરિયોટિક જનીનોમાં જોવા મળે છે.\n\nવિકલ્પ A ખોટો છે કારણ કે વૈકલ્પિક સ્પ્લાઇસિંગમાં એક જ જનીનમાંથી અલગ-અલગ mRNA બને છે, પરંતુ અહીં એક જ mRNA અણુમાંથી બે પ્રોટીન બને છે.\n\nવિકલ્પ B ખોટો છે કારણ કે એક જ કોડિંગ ક્ષેત્રમાં બે શરૂઆત કોડોન હોવા છતાં, રાઇબોઝોમ એક જ પ્રોટીનનું સંશ્લેષણ કરે છે.\n\nવિકલ્પ D ખોટો છે કારણ કે માનવ કોષોમાં mRNA મોનોસિસ્ટ્રોનિક હોય છે, જ્યારે પોલિસિસ્ટ્રોનિક mRNA મુખ્યત્વે પ્રોકેરિયોટ્સમાં જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ભિન્નતાના આણ્વિક આધાર", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
