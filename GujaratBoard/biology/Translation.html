<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Translation</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Translation</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Translation</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ટ્રાન્સલેશન દરમિયાન રાઇબોઝોમ પર બનતી પેપ્ટાઇડ શૃંખલાની દિશા કઈ હોય છે?", "opts": ["N-ટર્મિનલથી C-ટર્મિનલ તરફ", "C-ટર્મિનલથી N-ટર્મિનલ તરફ", "5’ થી 3’ દિશામાં", "3’ થી 5’ દિશામાં"], "ans": 0, "exp": "ટ્રાન્સલેશન દરમિયાન, એમિનોએસિડની પેપ્ટાઇડ શૃંખલા N-ટર્મિનલ (અમિનોગ્રુપ) થી C-ટર્મિનલ (કાર્બોક્સિલ ગ્રુપ) તરફ બને છે. રાઇબોઝોમ mRNA ની 5’ થી 3’ દિશામાં વાંચે છે, પરંતુ પેપ્ટાઇડ શૃંખલાની વૃદ્ધિ N-ટર્મિનલથી C-ટર્મિનલ તરફ થાય છે. વિકલ્પ C અને D DNA/RNA ની દિશા સાથે સંબંધિત છે, જ્યારે વિકલ્પ B પેપ્ટાઇડ બંધારણની વિરુદ્ધ દિશા દર્શાવે છે.", "ref": "Std 12 - અધ્યાય 6: જૈવ-અણુઓ અને તેના કાર્યો (ટ્રાન્સલેશન)", "ch": ""}, {"q": "ટ્રાન્સલેશન દરમિયાન tRNA ની કઈ સ્થિતિ તેને રાઇબોઝોમના E સાઇટ પર બાંધી રાખે છે?", "opts": ["એમિનોએસિલ-ટીઆરએનએ", "ડીએસીલ-ટીઆરએનએ", "પેપ્ટિડાઇલ-ટીઆરએનએ", "ઇનિશિયેટર-ટીઆરએનએ"], "ans": 1, "exp": "રાઇબોઝોમના E સાઇટ (Exit site) પર ડીએસીલ-ટીઆરએનએ (deacylated-tRNA) બંધાય છે, જે એમિનોએસિડ વિતરિત કર્યા પછી રાઇબોઝોમ છોડી જાય છે. એમિનોએસિલ-ટીઆરએનએ (A સાઇટ પર) અને પેપ્ટિડાઇલ-ટીઆરએનએ (P સાઇટ પર) ટ્રાન્સલેશનના અગ્રગણ્ય તબક્કામાં ભાગ લે છે. ઇનિશિયેટર-ટીઆરએનએ ટ્રાન્સલેશનની શરૂઆતમાં જ ભાગ લે છે, પરંતુ E સાઇટ સાથે સંબંધિત નથી.", "ref": "Std 12 - અધ્યાય 6: જૈવ-અણુઓ અને તેના કાર્યો (ટ્રાન્સલેશનના તબક્કાઓ)", "ch": ""}, {"q": "પ્રોકેરિયોટ્સમાં ટ્રાન્સલેશનની શરૂઆત કયા કોડોનથી થાય છે?", "opts": ["AUG", "GUG", "UUG", "AUG અથવા GUG"], "ans": 3, "exp": "પ્રોકેરિયોટ્સમાં ટ્રાન્સલેશનની શરૂઆત સામાન્ય રીતે AUG કોડોનથી થાય છે, પરંતુ કેટલાક કિસ્સાઓમાં GUG કોડોન પણ ઇનિશિયેશન તરીકે કામ કરે છે. UUG કોડોન ટ્રાન્સલેશનની શરૂઆત માટે વપરાતો નથી. વિકલ્પ A અને B અંશતઃ સાચા છે, પરંતુ વિકલ્પ D વધુ સંપૂર્ણ અને ચોક્કસ છે.", "ref": "Std 12 - અધ્યાય 6: જૈવ-અણુઓ અને તેના કાર્યો (પ્રોકેરિયોટિક ટ્રાન્સલેશન)", "ch": ""}, {"q": "ટ્રાન્સલેશન દરમિયાન રાઇબોઝોમલ સબયુનિટ્સનું પુનઃએકીકરણ ક્યારે થાય છે?", "opts": ["ઇનિશિયેશન દરમિયાન", "એલોંગેશન દરમિયાન", "ટર્મિનેશન પછી", "ટ્રાન્સલેશન પૂર્ણ થયા પછી"], "ans": 3, "exp": "રાઇબોઝોમલ સબયુનિટ્સ (લઘુ અને ગુરુ) ટ્રાન્સલેશન પૂર્ણ થયા પછી પુનઃએકીકરણ પામે છે. ઇનિશિયેશન દરમિયાન સબયુનિટ્સ એકીકૃત થાય છે, એલોંગેશન દરમિયાન તેઓ કામ કરતી રહે છે, અને ટર્મિનેશન પછી તેઓ અલગ પડે છે. પુનઃએકીકરણ નવી ટ્રાન્સલેશન ચક્ર માટે તૈયારી તરીકે થાય છે.", "ref": "Std 12 - અધ્યાય 6: જૈવ-અણુઓ અને તેના કાર્યો (રાઇબોઝોમનું કાર્ય)", "ch": ""}, {"q": "ટ્રાન્સલેશન દરમિયાન કયા પ્રોટીન ફેક્ટરની ભૂમિકા પેપ્ટાઇડ બંધના નિર્માણમાં મહત્વની હોય છે?", "opts": ["EF-Tu", "EF-G", "પેપ્ટિડાઇલ ટ્રાન્સફરેઝ", "IF-2"], "ans": 2, "exp": "પેપ્ટિડાઇલ ટ્રાન્સફરેઝ એ રાઇબોઝોમનો એન્ઝાઇમ છે જે પેપ્ટાઇડ બંધના નિર્માણ માટે જવાબદાર હોય છે. EF-Tu એમિનોએસિલ-ટીઆરએનએ ને રાઇબોઝોમ પર લાવે છે, EF-G ટ્રાન્સલોકેશનમાં મદદ કરે છે, અને IF-2 ઇનિશિયેશન ફેક્ટર છે. પેપ્ટિડાઇલ ટ્રાન્સફરેઝ રાઇબોઝોમના 50S સબયુનિટમાં સ્થિત છે અને તે પેપ્ટાઇડ બંધ બનાવે છે.", "ref": "Std 12 - અધ્યાય 6: જૈવ-અણુઓ અને તેના કાર્યો (ટ્રાન્સલેશનમાં એન્ઝાઇમો)", "ch": ""}, {"q": "ટ્રાન્સલેશન દરમિયાન, જ્યારે રાઇબોઝોમ mRNA પરના UGA કોડોન પર પહોંચે છે, ત્યારે કયા પ્રકારનું tRNA તેને ઓળખી શકે છે?", "opts": ["સ્ટોપ કોડોન માટે કોઈ tRNA ઓળખી શકતું નથી, કારણ કે તે ટ્રાન્સલેશન ટર્મિનેશનનું સંકેત આપે છે.", "સેલેનોસિસ્ટીન-લોડેડ tRNA, કારણ કે UGA કોડોન સેલેનોસિસ્ટીન માટે કોડ કરે છે.", "ટાયરોસિન-લોડેડ tRNA, કારણ કે UGA કોડોન ટાયરોસિન માટે કોડ કરે છે.", "મિથાયોનિન-લોડેડ tRNA, કારણ કે UGA કોડોન મિથાયોનિન માટે કોડ કરે છે."], "ans": 1, "exp": "UGA કોડોન સામાન્ય રીતે ટ્રાન્સલેશન ટર્મિનેશનનું સંકેત આપે છે, પરંતુ સેલેનોપ્રોટીનના કિસ્સામાં, સેલેનોસિસ્ટીન-લોડેડ tRNA તેને ઓળખી શકે છે. ટાયરોસિન અને મિથાયોનિન માટે UGA કોડોન કોડ કરતું નથી, અને સ્ટોપ કોડોન માટે કોઈ tRNA ઓળખી શકતું નથી, પરંતુ સેલેનોસિસ્ટીન એક અપવાદ છે. આથી, B વિકલ્પ સાચો છે.", "ref": "Std 12 - અધ્યાય 6: જનીન અભિવ્યક્તિ અને જનીનિક કોડ", "ch": ""}, {"q": "ટ્રાન્સલેશન દરમિયાન, રાઇબોઝોમલ A સાઇટ પર કયા પ્રકારનું tRNA બંધાય છે?", "opts": ["પેપ્ટિડિલ-tRNA, જે પેપ્ટાઇડ શૃંખલાને ધરાવે છે.", "એમિનોએસિલ-tRNA, જે નવી એમિનો એસિડ લાવે છે.", "ડિએસિલેટેડ tRNA, જે કોઈ એમિનો એસિડ ધરાવતું નથી.", "rRNA, જે રાઇબોઝોમનું ઘટક છે."], "ans": 1, "exp": "A સાઇટ પર એમિનોએસિલ-tRNA બંધાય છે, જે નવી એમિનો એસિડ લાવે છે. પેપ્ટિડિલ-tRNA P સાઇટ પર હોય છે, ડિએસિલેટેડ tRNA E સાઇટ પર જાય છે, અને rRNA રાઇબોઝોમનું ઘટક છે પરંતુ tRNA નથી. આથી, B વિકલ્પ સાચો છે.", "ref": "Std 12 - અધ્યાય 6: જનીન અભિવ્યક્તિ અને જનીનિક કોડ", "ch": ""}, {"q": "ટ્રાન્સલેશન દરમિયાન, કયા પ્રોટીન ફેક્ટરની ભૂમિકા ટ્રાન્સલેશન ટર્મિનેશનમાં મહત્વની હોય છે?", "opts": ["IF-1, જે ઇનિશિયેશન ફેક્ટર છે.", "EF-Tu, જે એલોંગેશન ફેક્ટર છે.", "RF-1, જે રિલીઝ ફેક્ટર છે.", "EF-G, જે ટ્રાન્સલોકેશનમાં મદદ કરે છે."], "ans": 2, "exp": "RF-1 (રિલીઝ ફેક્ટર 1) ટ્રાન્સલેશન ટર્મિનેશનમાં મહત્વની ભૂમિકા ભજવે છે. IF-1 ઇનિશિયેશન સાથે સંબંધિત છે, EF-Tu એલોંગેશન સાથે સંબંધિત છે, અને EF-G ટ્રાન્સલોકેશનમાં મદદ કરે છે. આથી, C વિકલ્પ સાચો છે.", "ref": "Std 12 - અધ્યાય 6: જનીન અભિવ્યક્તિ અને જનીનિક કોડ", "ch": ""}, {"q": "ટ્રાન્સલેશન દરમિયાન, કયા પ્રકારના રાઇબોઝોમ્સ પ્રોકેરિયોટ્સ અને યુકેરિયોટ્સમાં આલેખિત થાય છે?", "opts": ["પ્રોકેરિયોટ્સમાં 70S અને યુકેરિયોટ્સમાં 80S રાઇબોઝોમ્સ.", "પ્રોકેરિયોટ્સમાં 80S અને યુકેરિયોટ્સમાં 70S રાઇબોઝોમ્સ.", "પ્રોકેરિયોટ્સ અને યુકેરિયોટ્સ બંનેમાં 70S રાઇબોઝોમ્સ.", "પ્રોકેરિયોટ્સ અને યુકેરિયોટ્સ બંનેમાં 80S રાઇબોઝોમ્સ."], "ans": 0, "exp": "પ્રોકેરિયોટ્સમાં 70S રાઇબોઝોમ્સ અને યુકેરિયોટ્સમાં 80S રાઇબોઝોમ્સ આલેખિત થાય છે. આથી, A વિકલ્પ સાચો છે. બાકીના વિકલ્પો ગેરમાર્ગે દોરવા માટે છે.", "ref": "Std 12 - અધ્યાય 6: જનીન અભિવ્યક્તિ અને જનીનિક કોડ", "ch": ""}, {"q": "ટ્રાન્સલેશન દરમિયાન, કયા પ્રકારના tRNA મોલેક્યુલ્સ પેપ્ટાઇડ બંધના નિર્માણમાં સીધી ભૂમિકા ભજવે છે?", "opts": ["એમિનોએસિલ-tRNA, જે એમિનો એસિડ લાવે છે.", "પેપ્ટિડિલ-tRNA, જે પેપ્ટાઇડ શૃંખલાને ધરાવે છે.", "ડિએસિલેટેડ tRNA, જે કોઈ એમિનો એસિડ ધરાવતું નથી.", "rRNA, જે રાઇબોઝોમનું ઘટક છે."], "ans": 1, "exp": "પેપ્ટિડિલ-tRNA પેપ્ટાઇડ શૃંખલાને ધરાવે છે અને પેપ્ટાઇડ બંધના નિર્માણમાં સીધી ભૂમિકા ભજવે છે. એમિનોએસિલ-tRNA નવી એમિનો એસિડ લાવે છે, ડિએસિલેટેડ tRNA કોઈ એમિનો એસિડ ધરાવતું નથી, અને rRNA રાઇબોઝોમનું ઘટક છે પરંતુ પેપ્ટાઇડ બંધના નિર્માણમાં સીધી ભૂમિકા ભજવતું નથી. આથી, B વિકલ્પ સાચો છે.", "ref": "Std 12 - અધ્યાય 6: જનીન અભિવ્યક્તિ અને જનીનિક કોડ", "ch": ""}, {"q": "ટ્રાન્સલેશન દરમિયાન, જ્યારે રાઇબોઝોમ mRNA પરના UAA કોડોન પર પહોંચે છે, ત્યારે કયું મોલેક્યુલ ટર્મિનેશન માટે જરૂરી હોય છે?", "opts": ["RF-1 (Release Factor 1)", "tRNA-ટ્રાયપ્ટોફેન", "EF-Tu (Elongation Factor Tu)", "IF-2 (Initiation Factor 2)"], "ans": 0, "exp": "UAA એ ટર્મિનેશન કોડોન છે, અને RF-1 (Release Factor 1) એ પ્રોકેરિયોટ્સમાં ટર્મિનેશન માટે જરૂરી પ્રોટીન ફેક્ટર છે. tRNA-ટ્રાયપ્ટોફેન (B) એ અમીનો એસિડ વહન કરે છે, પરંતુ ટર્મિનેશન કોડોન માટે નહીં. EF-Tu (C) એ લંબાઈકરણ દરમિયાન tRNA ને રાઇબોઝોમ પર લાવવા માટે જરૂરી છે, જ્યારે IF-2 (D) એ શરૂઆત દરમિયાન જરૂરી હોય છે. અહીં, RF-1 એ યોગ્ય પસંદગી છે કારણ કે તે ટર્મિનેશન કોડોનને ઓળખીને પેપ્ટાઇડ શૃંખલાને મુક્ત કરે છે.", "ref": "Std 12 - અધ્યાય 6: જીવનની વંશપરંપરાગતતા અને પરિવર્તનશીલતા (Translation વિભાગ)", "ch": ""}, {"q": "ટ્રાન્સલેશન દરમિયાન, કયા પ્રકારના રાઇબોઝોમલ સબયુનિટ્સ યુકેરિયોટ્સમાં પેપ્ટાઇડ બંધના નિર્માણમાં ભાગ લે છે?", "opts": ["30S અને 50S", "40S અને 60S", "20S અને 40S", "50S અને 60S"], "ans": 1, "exp": "યુકેરિયોટ્સમાં, રાઇબોઝોમ 40S (લઘુ સબયુનિટ) અને 60S (વડા સબયુનિટ) ના સંગઠનથી બને છે. પ્રોકેરિયોટ્સમાં 30S અને 50S (A) હોય છે, જ્યારે 20S અને 40S (C) અથવા 50S અને 60S (D) એ યુકેરિયોટ્સ માટે યોગ્ય નથી. 40S અને 60S એ યુકેરિયોટિક રાઇબોઝોમના સબયુનિટ્સ છે જે પેપ્ટાઇડ બંધના નિર્માણમાં ભાગ લે છે.", "ref": "Std 12 - અધ્યાય 6: જીવનની વંશપરંપરાગતતા અને પરિવર્તનશીલતા (રાઇબોઝોમની રચના)", "ch": ""}, {"q": "ટ્રાન્સલેશન દરમિયાન, કયા પ્રોટીન ફેક્ટરની ભૂમિકા પેપ્ટાઇડ બંધના નિર્માણમાં મહત્વની હોય છે અને તે રાઇબોઝોમના A સાઇટ પર કામ કરે છે?", "opts": ["EF-G", "EF-Tu", "EF-Ts", "IF-3"], "ans": 1, "exp": "EF-Tu એ લંબાઈકરણ દરમિયાન અમીનોએસિલ-tRNA ને રાઇબોઝોમના A સાઇટ પર લાવવા માટે જરૂરી પ્રોટીન ફેક્ટર છે. EF-G (A) એ રાઇબોઝોમની ગતિ માટે જરૂરી છે, જ્યારે EF-Ts (C) એ EF-Tu ને રીચાર્જ કરવા માટે જરૂરી છે. IF-3 (D) એ શરૂઆત દરમિયાન જરૂરી હોય છે. અહીં, EF-Tu એ યોગ્ય પસંદગી છે કારણ કે તે A સાઇટ પર અમીનોએસિલ-tRNA ને બાંધવા અને પેપ્ટાઇડ બંધના નિર્માણમાં મદદ કરે છે.", "ref": "Std 12 - અધ્યાય 6: જીવનની વંશપરંપરાગતતા અને પરિવર્તનશીલતા (ટ્રાન્સલેશન ફેક્ટર્સ)", "ch": ""}, {"q": "ટ્રાન્સલેશન દરમિયાન, કયા પ્રકારના કોડોનને 'સેન્સ કોડોન' કહેવામાં આવે છે અને તે કયા અમીનો એસિડ માટે કોડ કરે છે?", "opts": ["UAA - ટર્મિનેશન", "AUG - મિથાયોનિન", "UGA - સેલેનોસિસ્ટીન", "UAG - ટર્મિનેશન"], "ans": 2, "exp": "UGA એ સામાન્ય રીતે ટર્મિનેશન કોડોન છે, પરંતુ કેટલાક કિસ્સાઓમાં તે સેલેનોસિસ્ટીન (SeC) માટે કોડ કરે છે, જેને 'સેન્સ કોડોન' કહેવામાં આવે છે. UAA (A) અને UAG (D) એ ટર્મિનેશન કોડોન છે, જ્યારે AUG (B) એ મિથાયોનિન માટે કોડ કરે છે અને શરૂઆત કોડોન પણ છે. UGA એ સેલેનોસિસ્ટીન માટે કોડ કરે છે, જે એક અપવાદ છે.", "ref": "Std 12 - અધ્યાય 6: જીવનની વંશપરંપરાગતતા અને પરિવર્તનશીલતા (જિનેટિક કોડ)", "ch": ""}, {"q": "ટ્રાન્સલેશન દરમિયાન, જ્યારે રાઇબોઝોમ mRNA પરના AUG કોડોન પર પહોંચે છે, ત્યારે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["fMet-tRNAfMet A સાઇટ પર બંધાય છે અને પેપ્ટાઇડ શૃંખલાની શરૂઆત થાય છે.", "પ્રોકેરિયોટ્સમાં, fMet-tRNAfMet ને રાઇબોઝોમના P સાઇટ પર બાંધવા માટે IF-2 ફેક્ટર જરૂરી હોય છે.", "યુકેરિયોટ્સમાં, Met-tRNAiMet ને રાઇબોઝોમના P સાઇટ પર બાંધવા માટે eIF-2 ફેક્ટર જરૂરી હોય છે.", "AUG કોડોન પર પહોંચતા જ પેપ્ટાઇડ શૃંખલાની લંબાઈ વધારવા લાગે છે, પરંતુ શરૂઆતની અમિનો એસિડ મેથિયોનિન તરત જ કાપી નાખવામાં આવે છે."], "ans": 3, "exp": "A) fMet-tRNAfMet A સાઇટ પર બંધાય છે અને પેપ્ટાઇડ શૃંખલાની શરૂઆત થાય છે - આ વિધાન સત્ય છે કારણ કે AUG કોડોન શરૂઆતનો કોડોન છે અને fMet-tRNAfMet A સાઇટ પર બંધાય છે. B) પ્રોકેરિયોટ્સમાં, fMet-tRNAfMet ને રાઇબોઝોમના P સાઇટ પર બાંધવા માટે IF-2 ફેક્ટર જરૂરી હોય છે - આ વિધાન સત્ય છે કારણ કે IF-2 ફેક્ટર પ્રોકેરિયોટ્સમાં શરૂઆતના tRNA ને P સાઇટ પર બાંધવામાં મદદ કરે છે. C) યુકેરિયોટ્સમાં, Met-tRNAiMet ને રાઇબોઝોમના P સાઇટ પર બાંધવા માટે eIF-2 ફેક્ટર જરૂરી હોય છે - આ વિધાન સત્ય છે કારણ કે eIF-2 ફેક્ટર યુકેરિયોટ્સમાં શરૂઆતના tRNA ને P સાઇટ પર બાંધવામાં મદદ કરે છે. D) AUG કોડોન પર પહોંચતા જ પેપ્ટાઇડ શૃંખલાની લંબાઈ વધારવા લાગે છે, પરંતુ શરૂઆતની અમિનો એસિડ મેથિયોનિન તરત જ કાપી નાખવામાં આવે છે - આ વિધાન ખોટું છે કારણ કે મેથિયોનિન (અથવા fMet) તરત જ કાપી નાખવામાં આવતું નથી, તે પેપ્ટાઇડ શૃંખલાનો ભાગ રહે છે અને પછી પ્રોટીન પ્રોસેસિંગ દરમિયાન કાપી શકાય છે.", "ref": "Std 12 - અધ્યાય 6: જૈવિક પ્રક્રિયાઓમાં અનુવંશિકતાનું નિયમન (Translation)", "ch": ""}, {"q": "ટ્રાન્સલેશન દરમિયાન, જો mRNA પરના કોડોનમાં મ્યુટેશન થવાથી UAC (ટાયરોસીન) બદલાઈને UAG થાય, તો તેના પરિણામે શું થશે?", "opts": ["પેપ્ટાઇડ શૃંખલામાં ટાયરોસીન એમિનો એસિડ ઉમેરાશે", "ટ્રાન્સલેશન ટર્મિનેશન થશે અને અપૂર્ણ પ્રોટીન બનશે", "પેપ્ટાઇડ શૃંખલામાં સિસ્ટીન એમિનો એસિડ ઉમેરાશે", "ટ્રાન્સલેશનની ગતિ વધશે"], "ans": 1, "exp": "UAG એ ટર્મિનેશન કોડોન (સ્ટોપ કોડોન) છે, જે ટ્રાન્સલેશનને અટકાવે છે. મ્યુટેશનથી UAC (ટાયરોસીન) બદલાઈને UAG થવાથી ટ્રાન્સલેશન ટર્મિનેશન થશે અને અપૂર્ણ પ્રોટીન બનશે. A) ખોટું છે કારણ કે UAG ટાયરોસીન માટે કોડ કરતું નથી. C) ખોટું છે કારણ કે UAG સિસ્ટીન માટે કોડ કરતું નથી. D) ખોટું છે કારણ કે ટર્મિનેશન કોડોન ટ્રાન્સલેશનની ગતિ અટકાવે છે, વધારતું નથી.", "ref": "Std 12 - અધ્યાય 6: જનીન અભિવ્યક્તિ અને પ્રોટીન સંશ્લેષણ", "ch": ""}, {"q": "ટ્રાન્સલેશન દરમિયાન, રાઇબોઝોમના P સાઇટ પર કયા tRNA મોલેક્યુલ હાજર હોય છે જ્યારે A સાઇટ પર નવું tRNA બંધાય છે?", "opts": ["પેપ્ટિડિલ-tRNA (પેપ્ટાઇડ શૃંખલા સાથે જોડાયેલું)", "એમિનોએસિલ-tRNA (એમિનો એસિડ સાથે જોડાયેલું)", "ડી-એસિલેટેડ tRNA (એમિનો એસિડ વગરનું)", "rRNA (રાઇબોઝોમલ RNA)"], "ans": 0, "exp": "ટ્રાન્સલેશન દરમિયાન, P સાઇટ પર પેપ્ટિડિલ-tRNA હાજર હોય છે, જે પેપ્ટાઇડ શૃંખલા સાથે જોડાયેલું હોય છે. A સાઇટ પર નવું એમિનોએસિલ-tRNA બંધાય છે. B) ખોટું છે કારણ કે એમિનોએસિલ-tRNA A સાઇટ પર બંધાય છે. C) ખોટું છે કારણ કે ડી-એસિલેટેડ tRNA E સાઇટ પરથી બહાર નીકળી જાય છે. D) ખોટું છે કારણ કે rRNA રાઇબોઝોમનું ઘટક છે, પરંતુ તે tRNA નથી.", "ref": "Std 12 - અધ્યાય 6: જનીન અભિવ્યક્તિ અને પ્રોટીન સંશ્લેષણ", "ch": ""}, {"q": "ટ્રાન્સલેશન દરમિયાન, કયા પ્રકારના રાઇબોઝોમ્સ પ્રોકેરિયોટ્સમાં mRNA પર બંધાયેલા હોય છે અને તેની ગતિ કઈ દિશામાં હોય છે?", "opts": ["70S રાઇબોઝોમ, 5' → 3' દિશામાં", "80S રાઇબોઝોમ, 3' → 5' દિશામાં", "70S રાઇબોઝોમ, 3' → 5' દિશામાં", "80S રાઇબોઝોમ, 5' → 3' દિશામાં"], "ans": 0, "exp": "પ્રોકેરિયોટ્સમાં 70S રાઇબોઝોમ mRNA પર બંધાયેલા હોય છે અને તેની ગતિ 5' → 3' દિશામાં હોય છે. B) ખોટું છે કારણ કે 80S રાઇબોઝોમ let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
