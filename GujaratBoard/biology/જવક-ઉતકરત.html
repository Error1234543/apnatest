<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>જૈવિક ઉત્ક્રાંતિ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>જૈવિક ઉત્ક્રાંતિ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">જૈવિક ઉત્ક્રાંતિ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "લેમાર્કના સિદ્ધાંત અનુસાર, જીવોના અંગોના વિકાસમાં કયો પરિબળ મુખ્ય ભૂમિકા ભજવે છે?", "opts": ["પ્રાકૃતિક પસંદગી", "અર્જિત લક્ષણોની અનુવંશિકતા", "જનીન મ્યુટેશન", "જનનિક વૈવિધ્ય"], "ans": 1, "exp": "લેમાર્કના સિદ્ધાંત મુજબ, જીવોના અર્જિત લક્ષણો (જેમ કે ગિરાફની લાંબી ગરદન) પેઢી દર પેઢી પસાર થાય છે, જેને 'અર્જિત લક્ષણોની અનુવંશિકતા' કહેવાય છે. પ્રાકૃતિક પસંદગી (A) ડાર્વિનના સિદ્ધાંત સાથે સંબંધિત છે. જનીન મ્યુટેશન (C) અને જનનિક વૈવિધ્ય (D) આધુનિક ઉત્ક્રાંતિ સિદ્ધાંતના ભાગ છે, પરંતુ લેમાર્કના સિદ્ધાંતમાં તેનો સમાવેશ થતો નથી.", "ref": "Std 12 - અધ્યાય 7: જૈવિક ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના પ્રાકૃતિક પસંદગીના સિદ્ધાંતમાં, કયા પરિબળને 'સર્વાઈવલ ઓફ ધ ફિટેસ્ટ' માટે જવાબદાર ગણવામાં આવે છે?", "opts": ["વાતાવરણીય પરિવર્તન", "જનીન ડ્રિફ્ટ", "પ્રજનન ક્ષમતા", "અતિ ઉત્પાદન અને સંઘર્ષ"], "ans": 3, "exp": "ડાર્વિનના સિદ્ધાંત મુજબ, પ્રજનન દરમિયાન અતિ ઉત્પાદન થાય છે, જેના કારણે ખોરાક અને જગ્યાની અછત સર્જાય છે, પરિણામે જીવો વચ્ચે સંઘર્ષ થાય છે. આ સંઘર્ષમાં ફિટેસ્ટ (સૌથી યોગ્ય) જીવો જીવિત રહે છે. વાતાવરણીય પરિવર્તન (A) અને જનીન ડ્રિફ્ટ (B) અન્ય પરિબળો છે, પરંતુ પ્રાકૃતિક પસંદગીનો મુખ્ય આધાર અતિ ઉત્પાદન અને સંઘર્ષ (D) છે. પ્રજનન ક્ષમતા (C) સીધી રીતે સર્વાઈવલ ઓફ ધ ફિટેસ્ટ સાથે સંબંધિત નથી.", "ref": "Std 12 - અધ્યાય 7: જૈવિક ઉત્ક્રાંતિ", "ch": ""}, {"q": "હાર્ડી-વાઈનબર્ગ સંતુલનના નિયમ અનુસાર, જનસંખ્યામાં જનીન આવર્તન સ્થિર રહે તે માટે કયી શરત પૂરી પાડવી જરૂરી નથી?", "opts": ["મ્યુટેશન ન હોવું", "પ્રવાસી જીવોનો આગમન થવો", "પ્રાકૃતિક પસંદગી ન હોવી", "યાદચ્છિક સંવરણ ન હોવું"], "ans": 1, "exp": "હાર્ડી-વાઈનબર્ગ સંતુલન માટે જનસંખ્યામાં કોઈ પ્રવાસી જીવોનો આગમન થવો જોઈએ નહીં, કારણ કે તે જનીન આવર્તનમાં ફેરફાર કરે છે. મ્યુટેશન ન હોવું (A), પ્રાકૃતિક પસંદગી ન હોવી (C), અને યાદચ્છિક સંવરણ ન હોવું (D) એ સંતુલન માટેની શરતો છે, પરંતુ પ્રવાસી જીવોનો આગમન (B) એ અસંતુલન લાવે છે.", "ref": "Std 12 - અધ્યાય 7: જૈવિક ઉત્ક્રાંતિ", "ch": ""}, {"q": "કયો પુરાવો ઉત્ક્રાંતિ માટે સૌથી પ્રબળ સબૂત માનવામાં આવે છે?", "opts": ["જીવાશ્મો", "તુલનાત્મક શરીરરચના", "ભ્રૂણવિજ્ઞાન", "આણ્વિક જૈવિક પુરાવો (DNA અને પ્રોટીનની સરખામણી)"], "ans": 3, "exp": "આણ્વિક જૈવિક પુરાવો (DNA અને પ્રોટીનની સરખામણી) ઉત્ક્રાંતિ માટે સૌથી પ્રબળ સબૂત છે, કારણ કે તે જીવો વચ્ચેના વંશીય સંબંધોને સીધી રીતે દર્શાવે છે. જીવાશ્મો (A) અને ભ્રૂણવિજ્ઞાન (C) પણ મહત્વના પુરાવા છે, પરંતુ તેઓ આણ્વિક પુરાવા જેટલા નિર્ણાયક નથી. તુલનાત્મક શરીરરચના (B) પણ મહત્વનો પુરાવો છે, પરંતુ તે આણ્વિક પુરાવા જેટલો સ્પષ્ટ નથી.", "ref": "Std 12 - અધ્યાય 7: જૈવિક ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના ફિનચ બીલના અભ્યાસમાં, કયા અંગના આકારમાં ફેરફારને પ્રાકૃતિક પસંદગી દ્વારા સમજાવવામાં આવ્યો છે?", "opts": ["પાંખ", "ચાંચ", "પગ", "પૂંછડી"], "ans": 1, "exp": "ડાર્વિનના ફિનચ બીલના અભ્યાસમાં, ચાંચના આકારમાં ફેરફારને પ્રાકૃતિક પસંદગી દ્વારા સમજાવવામાં આવ્યો છે. ગેલાપાગોસ ટાપુઓ પરના વિવિધ ફિનચ બીલની ચાંચનો આકાર તેમના ખોરાકના પ્રકાર અનુસાર વિકસિત થયો છે. પાંખ (A), પગ (C), અને પૂંછડી (D)ના આકારમાં ફેરફારને પ્રાકૃતિક પસંદગી દ્વારા સમજાવવામાં આવ્યો નથી.", "ref": "Std 12 - અધ્યાય 7: જૈવિક ઉત્ક્રાંતિ", "ch": ""}, {"q": "જૈવિક ઉત્ક્રાંતિ દરમિયાન, કયા પ્રકારના જનીન પરિવર્તનને 'સંરચનાત્મક જનીન પરિવર્તન' કહેવામાં આવે છે, જે પ્રોટીનની રચનામાં ફેરફાર કરે છે?", "opts": ["બિંદુ પરિવર્તન (Point mutation)", "વર્ણસૂત્રીય પરિવર્તન (Chromosomal mutation)", "જનીન વહન (Gene flow)", "જનીન પુનરાવર્તન (Gene recombination)"], "ans": 0, "exp": "બિંદુ પરિવર્તન (Point mutation) એ સંરચનાત્મક જનીન પરિવર્તન છે, જે DNAની ન્યુક્લિયોટાઇડ ક્રમમાં એક જ બદલાવ થવાથી પ્રોટીનની રચનામાં ફેરફાર કરે છે. વર્ણસૂત્રીય પરિવર્તન વર્ણસૂત્રની રચનામાં ફેરફાર કરે છે, જનીન વહન એ જનસંખ્યામાં જનીનના સ્થળાંતરને લગતું છે, અને જનીન પુનરાવર્તન એ જનીનના નવા સંયોજનને લગતું છે.", "ref": "Std 12 - અધ્યાય 7: જૈવિક ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના સિદ્ધાંત અનુસાર, કયા પરિબળ દ્વારા જીવોમાં નવી જાતિઓનું નિર્માણ થાય છે?", "opts": ["પ્રાકૃતિક પસંદગી (Natural selection)", "અરજિત લક્ષણોનો વારસો (Inheritance of acquired characters)", "જનીન વહન (Gene flow)", "પર્યાવરણીય દબાણ (Environmental pressure)"], "ans": 0, "exp": "ડાર્વિનના સિદ્ધાંત અનુસાર, પ્રાકૃતિક પસંદગી (Natural selection) દ્વારા જીવોમાં નવી જાતિઓનું નિર્માણ થાય છે. અરજિત લક્ષણોનો વારસો લેમાર્કના સિદ્ધાંત સાથે સંબંધિત છે, જનીન વહન એ જનસંખ્યામાં જનીનના સ્થળાંતરને લગતું છે, અને પર્યાવરણીય દબાણ એ ઉત્ક્રાંતિના એક પરિબળ છે પરંતુ નવી જાતિઓના નિર્માણ માટે સીધું જવાબદાર નથી.", "ref": "Std 12 - અધ્યાય 7: જૈવિક ઉત્ક્રાંતિ", "ch": ""}, {"q": "કયા પુરાવાને ઉત્ક્રાંતિ માટે 'સંક્રમણશીલ જીવાશ્મ' (Transitional fossils) કહેવામાં આવે છે, જે બે જાતિઓ વચ્ચેના સંક્રમણને દર્શાવે છે?", "opts": ["આર્કિયોપ્ટેરિક્સ (Archaeopteryx)", "ડાયનોસોરના અસ્થિઓ (Dinosaur bones)", "મનુષ્યના કપાલ (Human skulls)", "પત્થરમાં છાપ (Imprints in rocks)"], "ans": 0, "exp": "આર્કિયોપ્ટેરિક્સ (Archaeopteryx) એ સંક્રમણશીલ જીવાશ્મ છે, જે પક્ષી અને સરીસૃપ વચ્ચેના સંક્રમણને દર્શાવે છે. ડાયનોસોરના અસ્થિઓ, મનુષ્યના કપાલ, અને પત્થરમાં છાપ એ ઉત્ક્રાંતિના પુરાવા છે પરંતુ સંક્રમણશીલ જીવાશ્મ નથી.", "ref": "Std 12 - અધ્યાય 7: જૈવિક ઉત્ક્રાંતિ", "ch": ""}, {"q": "જૈવિક ઉત્ક્રાંતિ દરમિયાન, કયા સિદ્ધાંત અનુસાર, જીવોમાં થતા ફેરફારો એ યાદચ્છિક (Random) અને દિશાહીન (Directionless) હોય છે?", "opts": ["લેમાર્કનો સિદ્ધાંત (Lamarckism)", "ડાર્વિનનો સિદ્ધાંત (Darwinism)", "મ્યુટેશન સિદ્ધાંત (Mutation theory)", "પ્રાકૃતિક પસંદગીનો સિદ્ધાંત (Natural selection theory)"], "ans": 2, "exp": "મ્યુટેશન સિદ્ધાંત (Mutation theory) અનુસાર, જીવોમાં થતા ફેરફારો એ યાદચ્છિક (Random) અને દિશાહીન (Directionless) હોય છે. લેમાર્કનો સિદ્ધાંત અરજિત લક્ષણોના વારસા પર ભાર મૂકે છે, ડાર્વિનનો સિદ્ધાંત પ્રાકૃતિક પસંદગી પર ભાર મૂકે છે, અને પ્રાકૃતિક પસંદગીનો સિદ્ધાંત ફેરફારોની દિશા નક્કી કરે છે.", "ref": "Std 12 - અધ્યાય 7: જૈવિક ઉત્ક્રાંતિ", "ch": ""}, {"q": "જૈવિક ઉત્ક્રાંતિ દરમિયાન, 'વિકિરણશીલ ઉત્ક્રાંતિ' (Adaptive Radiation) ના સંદર્ભમાં નીચેનામાંથી કયું કથન સત્ય છે?", "opts": ["એક જ પૂર્વજ પાસેથી ઉદ્ભવેલી વિવિધ જાતિઓ અલગ-અલગ પર્યાવરણીય સ્થાનો પર અનુકૂલન પામે છે", "વિવિધ પૂર્વજો પાસેથી ઉદ્ભવેલી જાતિઓ એક જ પર્યાવરણમાં અનુકૂલન પામે છે", "એક જ જાતિના સભ્યો વિવિધ ભૌગોલિક વિસ્તારોમાં ફેલાઈ જાય છે પરંતુ તેમના લક્ષણોમાં કોઈ ફેરફાર થતો નથી", "ઉત્ક્રાંતિ દરમિયાન જનીન પરિવર્તન થતું નથી, પરંતુ ફક્ત પર્યાવરણીય પરિબળો દ્વારા જાતિઓમાં ફેરફાર થાય છે"], "ans": 0, "exp": "વિકિરણશીલ ઉત્ક્રાંતિ (Adaptive Radiation) માં એક જ પૂર્વજ પાસેથી ઉદ્ભવેલી વિવિધ જાતિઓ અલગ-અલગ પર્યાવરણીય સ્થાનો પર અનુકૂલન પામે છે. ઉદાહરણ તરીકે, ડાર્વિનના ફિનચ પક્ષીઓમાં જોવા મળે છે કે તેઓ અલગ-અલગ ટાપુઓ પર અલગ-અલગ ખોરાક અનુસાર ચાંચના આકારમાં ફેરફાર દર્શાવે છે. વિકલ્પ B ખોટો છે કારણ કે વિવિધ પૂર્વજો પાસેથી ઉદ્ભવેલી જાતિઓ એક જ પર્યાવરણમાં અનુકૂલન પામે તે વિકિરણશીલ ઉત્ક્રાંતિ નથી. વિકલ્પ C ખોટો છે કારણ કે એક જ જાતિના સભ્યો વિવિધ ભૌગોલિક વિસ્તારોમાં ફેલાઈ જાય ત્યારે તેમના લક્ષણોમાં ફેરફાર થાય જ છે. વિકલ્પ D ખોટો છે કારણ કે ઉત્ક્રાંતિ દરમિયાન જનીન પરિવર્તન થાય જ છે, જે અનુકૂલન માટે જવાબદાર હોય છે.", "ref": "Std 12 - અધ્યાય 7: જૈવિક ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના સિદ્ધાંત અનુસાર, 'પ્રાકૃતિક પસંદગી' દ્વારા કયા પ્રકારના ફેરફારો જનસંખ્યામાં ટકી રહે છે?", "opts": ["હાનિકારક ફેરફારો", "તટસ્થ ફેરફારો", "લાભદાયી ફેરફારો", "યાદચ્છિક ફેરફારો"], "ans": 2, "exp": "પ્રાકૃતિક પસંદગી દ્વારા લાભદાયી ફેરફારો જનસંખ્યામાં ટકી રહે છે, કારણ કે તેઓ જીવને પર્યાવરણમાં જીવિત રહેવા અને પ્રજનન કરવા માટે અનુકૂળ બનાવે છે. હાનિકારક ફેરફારો જનસંખ્યામાં ટકી શકતા નથી. તટસ્થ ફેરફારો પ્રાકૃતિક પસંદગી દ્વારા પ્રભાવિત થતા નથી. યાદચ્છિક ફેરફારો પ્રાકૃતિક પસંદગી દ્વારા પસંદ કરવામાં આવતા નથી, પરંતુ તેઓ જનીન વૈવિધ્યમાં યોગદાન આપે છે.", "ref": "Std 12 - અધ્યાય 7: જૈવિક ઉત્ક્રાંતિ", "ch": ""}, {"q": "જૈવિક ઉત્ક્રાંતિ દરમિયાન, 'સહ-ઉત્ક્રાંતિ' (Co-evolution) ના સંદર્ભમાં નીચેનામાંથી કયું જોડી ઉદાહરણરૂપ છે?", "opts": ["મધમાખી અને ફૂલ", "સિંહ અને હરણ", "માછલી અને પાણી", "પક્ષી અને વૃક્ષ"], "ans": 0, "exp": "સહ-ઉત્ક્રાંતિમાં બે જીવો એકબીજા સાથે પરસ્પર અનુકૂલન દ્વારા ઉત્ક્રાંત થાય છે. મધમાખી અને ફૂલ એ આનું ઉદાહરણ છે, જેમાં મધમાખી ફૂલમાંથી મક્કમ મેળવે છે અને ફૂલને પરાગનયનમાં મદદ કરે છે. સિંહ અને હરણ, માછલી અને પાણી, તથા પક્ષી અને વૃક્ષ એ સહ-ઉત્ક્રાંતિ નથી, કારણ કે તેમાં પરસ્પર અનુકૂલન નથી.", "ref": "Std 12 - અધ્યાય 7: જૈવિક ઉત્ક્રાંતિ", "ch": ""}, {"q": "જૈવિક ઉત્ક્રાંતિ દરમિયાન, 'જનીન વહન' (Gene Flow) એટલે શું?", "opts": ["જનસંખ્યામાં જનીન આવર્તનમાં થતો યાદચ્છિક ફેરફાર", "એક જનસંખ્યાથી બીજી જનસંખ્યામાં જનીનનું સ્થળાંતર", "પ્રાકૃતિક પસંદગી દ્વારા જનીન આવર્તનમાં થતો ફેરફાર", "જનીન પરિવર્તન દ્વારા નવા જનીનનું નિર્માણ"], "ans": 1, "exp": "જનીન વહન એ એક જનસંખ્યાથી બીજી જનસંખ્યામાં જનીનનું સ્થળાંતર છે, જે વસતિ વચ્ચેના પ્રજનન દ્વારા થાય છે. જનીન આવર્તનમાં થતો યાદચ્છિક ફેરફાર એ જનીન વહન નથી, પરંતુ તે જનીન વૈવિધ્યનું કારણ બને છે. પ્રાકૃતિક પસંદગી દ્વારા જનીન આવર્તનમાં થતો ફેરફાર એ જનીન વહન નથી. જનીન પરિવર્તન દ્વારા નવા જનીનનું નિર્માણ એ જનીન વહન નથી, પરંતુ તે જનીન વૈવિધ્યનું કારણ બને છે.", "ref": "Std 12 - અધ્યાય 7: જૈવિક ઉત્ક્રાંતિ", "ch": ""}, {"q": "જૈવિક ઉત્ક્રાંતિ દરમિયાન, 'જનીન વૈવિધ્ય' (Genetic Diversity) નું મુખ્ય કારણ કયું છે?", "opts": ["પ્રાકૃતિક પસંદગી", "જનીન પરિવર્તન અને જનીન વહન", "સંકરણ", "વિકિરણશીલ ઉત્ક્રાંતિ"], "ans": 1, "exp": "જનીન વૈવિધ્યનું મુખ્ય કારણ જનીન પરિવર્તન અને જનીન વહન છે. જનીન પરિવર્તન દ્વારા નવા જનીનનું નિર્માણ થાય છે, જ્યારે જનીન વહન દ્વારા એક જનસંખ્યાથી બીજી જનસંખ્યામાં જનીનનું સ્થળાંતર થાય છે. પ્રાકૃતિક પસંદગી જનીન વૈવિધ્યને પ્રભાવિત કરે છે, પરંતુ તે તેનું મુખ્ય કારણ નથી. સંકરણ અને વિકિરણશીલ ઉત્ક્રાંતિ જનીન વૈવિધ્યને પ્રભાવિત કરે છે, પરંતુ તે તેના મુખ્ય કારણો નથી.", "ref": "Std 12 - અધ્યાય 7: જૈવિક ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેના પૈકી કયું ઉદાહરણ 'સમાંતર ઉત્ક્રાંતિ' (Parallel Evolution) નું સૌથી યોગ્ય ઉદાહરણ છે, જ્યાં સમાન પૂર્વજોમાંથી ઉદ્ભવેલી જાતિઓ સ્વતંત્ર રીતે સમાન લક્ષણો વિકસાવે છે, પરંતુ તેમની વચ્ચે પ્રજનન અવરોધ હાજર છે?", "opts": ["ઓસ્ટ્રેલિયાના કાંગારુ અને આફ્રિકાના કાંગારુ ઉંદર (Kangaroo Rat) ના પાછળના પગની રચના", "વ્હેલ અને માછલીના શરીરનો સ્ટ્રીમલાઈન આકાર", "મનુષ્ય અને ચિમ્પાન્ઝીના મગજનું કદ અને જટિલતા", "પેંગ્વિન અને ઓસ્ટ્રિચના પાંખોનો ઉપયોગ"], "ans": 0, "exp": "સમાંતર ઉત્ક્રાંતિ ત્યારે થાય છે જ્યારે સમાન પૂર્વજોમાંથી ઉદ્ભવેલી જાતિઓ સ્વતંત્ર રીતે સમાન લક્ષણો વિકસાવે છે, પરંતુ તેમની વચ્ચે પ્રજનન અવરોધ હોય છે. ઓસ્ટ્રેલિયાના કાંગારુ અને આફ્રિકાના કાંગારુ ઉંદર બંને સમાન પૂર્વજોમાંથી ઉદ્ભવ્યા છે અને તેમના પાછળના પગની રચના સમાન રીતે વિકસી છે, જે સમાંતર ઉત્ક્રાંતિનું ઉત્તમ ઉદાહરણ છે. વિકલ્પ B એ 'અભિસારી ઉત્ક્રાંતિ' (Convergent Evolution) નું ઉદાહરણ છે, જ્યાં અલગ પૂર્વજોમાંથી ઉદ્ભવેલી જાતિઓ સમાન લક્ષણો વિકસાવે છે. વિકલ્પ C અને D સમાંતર ઉત્ક્રાંતિના ઉદાહરણ નથી, કારણ કે તેમાં સમાન લક્ષણોનો વિકાસ સ્વતંત્ર રીતે થયો નથી અથવા પ્રજનન અવરોધ હાજર નથી.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "જૈવિક ઉત્ક્રાંતિના સંદર્ભમાં, 'પંક્ટ્યુએટેડ ઇક્વિલિબ્રિયમ' (Punctuated Equilibrium) સિદ્ધાંત અનુસાર નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["ઉત્ક્રાંતિની પ્રક્રિયા લાંબા સમય સુધી સ્થિરતાની સ્થિતિમાં રહે છે અને પછી અચાનક ઝડપી ફેરફારો થાય છે.", "આ સિદ્ધાંત સ્ટીફન જે. ગુલ્ડ અને નાઈલ્સ એલ્ડ્રેજ દ્વારા પ્રસ્તાવિત કરવામાં આવ્યો હતો.", "આ સિદ્ધાંત અનુસાર, ઉત્ક્રાંતિની પ્રક્રિયા હંમેશા ધીમી અને સતત ગતિએ થતી રહે છે.", "આ સિદ્ધાંત જીવાશ્મ રેકોર્ડમાં જોવા મળતા અચાનક ફેરફારોને સમજાવવા માટે ઉપયોગી છે."], "ans": 2, "exp": "પંક્ટ્યુએટેડ ઇક્વિલિબ્રિયમ સિદ્ધાંત અનુસાર, ઉત્ક્રાંતિની પ્રક્રિયા લાંબા સમય સુધી સ્થિર રહે છે અને પછી અચાનક ઝડપી ફેરફારો થાય છે. આ સિદ્ધાંત ધીમી અને સતત ઉત્ક્રાંતિની પ્રક્રિયાને નકારે છે, તેથી વિકલ્પ C ખોટો છે. વિકલ્પ A, B અને D આ સિદ્ધાંતના મુખ્ય સિદ્ધાંતોને સાચી રીતે વર્ણવે છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેના પૈકી કયું ઉદાહરણ 'હોમોલોગસ અંગો' (Homologous Organs) નું નથી, પરંતુ 'એનાલોગસ અંગો' (Analogous Organs) નું છે?", "opts": ["મનુષ્યના હાથ અને ચામાચીડિયાના પાંખ", "વ્હેલના ફ્લિપર અને ઘોડાના અગ્રઉપાંગ", "પક્ષીના પાંખ અને કીટકના પાંખ", "મગરના અગ્રઉપાંગ અને ગરોળીના અગ્રઉપાંગ"], "ans": 2, "exp": "હોમોલોગસ અંગો એવા અંગો છે જે સમાન ઉત્પત્તિ ધરાવે છે પરંતુ જુદી-જુદી કાર્યક્ષમતા ધરાવે છે, જ્યારે એનાલોગસ અંગો જુદી-જુદી ઉત્પત્તિ ધરાવે છે પરંતુ સમાન કાર્ય કરે છે. પક્ષીના પાંખ અને કીટકના પાંખ એનાલોગસ અંગો છે કારણ કે તેમની ઉત્પત્તિ જુદી-જુદી છે પરંતુ કાર્ય સમાન છે. બાકીના વિકલ્પો હોમોલોગસ અંગોના ઉદાહરણો છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "જૈવિક ઉત્ક્રાંતિ દરમિયાન, 'જનીનિક ડ્રિફ્ટ' (Genetic Drift) ના સંદર્ભમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["જનીનિક ડ્રિફ્ટ નાની જનસંખ્યામાં વધુ અસરકારક હોય છે.", "જનીનિક ડ્રિફ્ટ યાદચ્છિક ઘટનાઓને કારણે જનીન આવર્તનમાં ફેરફાર લાવે છે.", "જનીનિક ડ્રિફ્ટ હંમેશા અનુકૂલનાત્મક ઉત્ક્રાંતિ તરફ દોરી જાય છે.", "જનીનિક ડ્રિફ્ટના બે મુખ્ય પ્રકાર 'બોટલનેક ઇફેક્ટ' અને 'ફાઉન્ડર ઇફેક્ટ' છે."], "ans": 2, "exp": "જનીનિક ડ્રિફ્ટ એ યાદચ્છિક ઘટનાઓને કારણે જનીન આવર્તનમાં થતા ફેરફારો છે, જે હંમેશા અનુકૂલનાત્મક ઉત્ક્રાંતિ તરફ દોરી જતું નથી. તેથી વિકલ્પ C ખોટો છે. બાકીના વિકલ્પો જનીનિક ડ્રિફ્ટના મુખ્ય લક્ષણોને સાચી રીતે વર્ણવે છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેના પૈકી કયું ઉદાહરણ 'સહ-ઉત્ક્રાંતિ' (Co-evolution) નું નથી?", "opts": ["ફૂલો અને પરાગવાહકો વચ્ચેનું સંબંધ", "શિકારી અને શિકાર વચ્ચેનું સંબંધ", "પરોપજીવી અને યજમાન વચ્ચેનું સંબંધ", "એક જ પ્રજાતિના નર અને માદા વચ્ચેનું લૈંગિક પસંદગી"], "ans": 3, "exp": "સહ-ઉત્ક્રાંતિ એ બે અલગ-અલગ પ્રજાતિઓ વચ્ચેની આંતરક્રિયાને કારણે થતી ઉત્ક્રાંતિ છે. એક જ પ્રજાતિના નર અને માદા વચ્ચેની લૈંગિક પસંદગી સહ-ઉત્ક્રાંતિનું ઉદાહરણ નથી. બાકીના વિકલ્પો સહ-ઉત્ક્રાંતિના ઉદાહરણો છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "જૈવિક ઉત્ક્રાંતિ દરમિયાન, 'મોલેક્યુલર ક્લોક' (Molecular Clock) નો ઉપયોગ શેના માટે થાય છે?", "opts": ["જનીનિક પરિવર્તનના દરને માપવા માટે", "પ્રજાતિઓ વચ્ચેના ઉત્ક્રાંતિના સમયગાળાનો અંદાજ કાઢવા માટે", "પ્રોટીનની રચનામાં થતા ફેરફારોને ઓળખવા માટે", "ઉપરોક્ત તમામ"], "ans": 3, "exp": "મોલેક્યુલર ક્લોકનો ઉપયોગ જનીનિક પરિવર્તનના દરને માપવા, પ્રજાતિઓ વચ્ચેના ઉત્ક્રાંતિના સમયગાળાનો અંદાજ કાઢવા અને પ્રોટીનની રચનામાં થતા ફેરફારોને ઓળખવા માટે થાય છે. તેથી વિકલ્પ D સાચો છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}];

  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}

      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
