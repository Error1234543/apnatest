<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B-લિમ્ફોસાઇટ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>B-લિમ્ફોસાઇટ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">B-લિમ્ફોસાઇટ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "B-લિમ્ફોસાઇટ્સની કયી ઉપ-પ્રકારમાં CD4 રિસેપ્ટર જોવા મળે છે અને તે કયા કાર્ય સાથે સંકળાયેલ છે?", "opts": ["B-લિમ્ફોસાઇટ્સમાં CD4 રિસેપ્ટર હોતો નથી, તે ફક્ત T-હેલ્પર કોષોમાં જોવા મળે છે.", "B-લિમ્ફોસાઇટ્સના મેમરી કોષોમાં CD4 રિસેપ્ટર હોતો નથી, પરંતુ પ્લાઝ્મા કોષોમાં જોવા મળે છે.", "B-લિમ્ફોસાઇટ્સમાં CD4 રિસેપ્ટર એન્ટિજન પ્રસ્તુતિકરણ દરમિયાન MHC-II સાથે સંકળાયેલ છે.", "B-લિમ્ફોસાઇટ્સમાં CD4 રિસેપ્ટર ફક્ત એલર્જી પ્રતિક્રિયાઓ દરમિયાન સક્રિય થાય છે."], "ans": 2, "exp": "B-લિમ્ફોસાઇટ્સમાં CD4 રિસેપ્ટર એન્ટિજન પ્રસ્તુતિકરણ દરમિયાન MHC-II સાથે સંકળાયેલ છે. CD4 રિસેપ્ટર સામાન્ય રીતે T-હેલ્પર કોષોમાં જોવા મળે છે, પરંતુ B-લિમ્ફોસાઇટ્સ પણ એન્ટિજન પ્રસ્તુતિકરણ દરમિયાન MHC-II સાથે સંકળાયેલ CD4 રિસેપ્ટરનો ઉપયોગ કરે છે. A વિકલ્પ ખોટો છે કારણ કે B-લિમ્ફોસાઇટ્સમાં CD4 રિસેપ્ટર હોતો નથી એવું કહેવું ચૂક છે. B વિકલ્પ ખોટો છે કારણ કે પ્લાઝ્મા કોષોમાં CD4 રિસેપ્ટર હોતો નથી. D વિકલ્પ ખોટો છે કારણ કે CD4 રિસેપ્ટર એલર્જી પ્રતિક્રિયાઓ સાથે સીધો સંકળાયેલ નથી.", "ref": "Std 12 - પ્રકરણ 10: પ્રતિરક્ષાતંત્ર", "ch": ""}, {"q": "B-લિમ્ફોસાઇટ્સના પરિપક્વન દરમિયાન કયા અવસ્થામાં V(D)J રીકોમ્બિનેશન થાય છે?", "opts": ["હેમાટોપોઇટિક સ્ટેમ કોષ અવસ્થા", "પ્રો-B કોષ અવસ્થા", "પ્રી-B કોષ અવસ્થા", "પોસ્ટ-B કોષ અવસ્થા"], "ans": 1, "exp": "B-લિમ્ફોસાઇટ્સના પરિપક્વન દરમિયાન V(D)J રીકોમ્બિનેશન પ્રો-B કોષ અવસ્થામાં થાય છે. હેમાટોપોઇટિક સ્ટેમ કોષ અવસ્થામાં આ પ્રક્રિયા થતી નથી. પ્રી-B કોષ અવસ્થામાં V(D)J રીકોમ્બિનેશન પૂર્ણ થઈ ચૂક્યું હોય છે. પોસ્ટ-B કોષ અવસ્થા એ પરિપક્વ B-લિમ્ફોસાઇટ્સની અવસ્થા છે, જ્યાં V(D)J રીકોમ્બિનેશન થતું નથી.", "ref": "Std 12 - પ્રકરણ 10: પ્રતિરક્ષાતંત્ર", "ch": ""}, {"q": "B-લિમ્ફોસાઇટ્સ દ્વારા ઉત્પન્ન થતાં એન્ટિબોડીના કયા વર્ગમાં સૌથી ઉચ્ચ અવકાશીકરણ (Affinity) ક્ષમતા હોય છે?", "opts": ["IgM", "IgG", "IgA", "IgE"], "ans": 1, "exp": "IgG એન્ટિબોડી વર્ગમાં સૌથી ઉચ્ચ અવકાશીકરણ (Affinity) ક્ષમતા હોય છે. IgM એ પ્રાથમિક પ્રતિક્રિયામાં ઉત્પન્ન થતું પ્રથમ એન્ટિબોડી છે, પરંતુ તેની અવકાશીકરણ ક્ષમતા ઓછી હોય છે. IgA મ્યુકોસલ સપાટી પર કામ કરે છે, પરંતુ તેની અવકાશીકરણ ક્ષમતા IgG કરતાં ઓછી હોય છે. IgE એલર્જી પ્રતિક્રિયાઓ સાથે સંકળાયેલ છે, પરંતુ તેની અવકાશીકરણ ક્ષમતા પણ ઓછી હોય છે.", "ref": "Std 12 - પ્રકરણ 10: પ્રતિરક્ષાતંત્ર", "ch": ""}, {"q": "B-લિમ્ફોસાઇટ્સના કયા ઉપ-પ્રકારમાં CD5 માર્કર જોવા મળે છે અને તે કયા રોગ સાથે સંકળાયેલ છે?", "opts": ["B-1 કોષ, ક્રોનિક લિમ્ફોસાઇટિક લ્યુકેમિયા", "B-2 કોષ, મલ્ટિપલ માયલોમા", "મેમરી B-કોષ, એડ્સ", "પ્લાઝ્મા કોષ, લિમ્ફોમા"], "ans": 0, "exp": "B-1 કોષોમાં CD5 માર્કર જોવા મળે છે અને તે ક્રોનિક લિમ્ફોસાઇટિક લ્યુકેમિયા સાથે સંકળાયેલ છે. B-2 કોષોમાં CD5 માર્કર હોતો નથી. મેમરી B-કોષ અને પ્લાઝ્મા કોષોમાં CD5 માર્કર હોતો નથી. મલ્ટિપલ માયલોમા, એડ્સ, અને લિમ્ફોમા આ કોષો સાથે સીધો સંકળાયેલ નથી.", "ref": "Std 12 - પ્રકરણ 10: પ્રતિરક્ષાતંત્ર", "ch": ""}, {"q": "B-લિમ્ફોસાઇટ્સની સક્રિયતા દરમિયાન કયા સિગ્નલિંગ પાથવે દ્વારા NF-κB ટ્રાન્સલોકેશન થાય છે?", "opts": ["JAK-STAT પાથવે", "MAPK પાથવે", "BCR સિગ્નલિંગ પાથવે", "Wnt પાથવે"], "ans": 2, "exp": "B-લિમ્ફોસાઇટ્સની સક્રિયતા દરમિયાન BCR (B-Cell Receptor) સિગ્નલિંગ પાથવે દ્વારા NF-κB ટ્રાન્સલોકેશન થાય છે. JAK-STAT પાથવે સામાન્ય રીતે સાયટોકાઇન સિગ્નલિંગ સાથે સંકળાયેલ છે. MAPK પાથવે કોષીય વૃદ્ધિ અને વિભાજન સાથે સંકળાયેલ છે. Wnt પાથવે વિકાસ અને કોષીય વિભેદન સાથે સંકળાયેલ છે.", "ref": "Std 12 - પ્રકરણ 10: પ્રતિરક્ષાતંત્ર", "ch": ""}, {"q": "B-લિમ્ફોસાઇટ્સની સક્રિયતા પછી, કયા સાયટોકાઇન દ્વારા તેની વૃદ્ધિ અને વિભાજનમાં મહત્વની ભૂમિકા ભજવે છે, પરંતુ તે સાયટોકાઇન T-લિમ્ફોસાઇટ્સ દ્વારા ઉત્પન્ન થતું નથી?", "opts": ["IL-2", "IL-4", "IL-6", "IL-10"], "ans": 2, "exp": "IL-6 એ B-લિમ્ફોસાઇટ્સની વૃદ્ધિ અને વિભાજનમાં મહત્વની ભૂમિકા ભજવે છે, પરંતુ તે મુખ્યત્વે મેક્રોફેજ અથવા ડેન્ડ્રિટિક કોષો દ્વારા ઉત્પન્ન થાય છે. IL-2 અને IL-4 T-લિમ્ફોસાઇટ્સ દ્વારા ઉત્પન્ન થાય છે, જ્યારે IL-10 નિર્વિષકરણ (anti-inflammatory) કાર્ય કરે છે અને B-લિમ્ફોસાઇટ્સની સક્રિયતામાં મદદ કરે છે, પરંતુ તે T-લિમ્ફોસાઇટ્સ દ્વારા પણ ઉત્પન્ન થાય છે.", "ref": "Std 12 - Chapter 10: પ્રતિરક્ષાતંત્ર અને રોગપ્રતિકારકતા", "ch": ""}, {"q": "B-લિમ્ફોસાઇટ્સમાં સોમેટિક હાઇપરમ્યુટેશન (Somatic Hypermutation) ક્યારે થાય છે?", "opts": ["પ્રાથમિક લિમ્ફોઇડ અંગોમાં પરિપક્વન દરમિયાન", "એન્ટિજન સાથે પ્રથમ મુલાકાત પછી જર્મિનલ સેન્ટરમાં", "B-લિમ્ફોસાઇટ્સની મૃત્યુ પામતી વખતે", "એન્ટિજન સાથેની દ્વિતીય મુલાકાત પહેલા"], "ans": 1, "exp": "સોમેટિક હાઇપરમ્યુટેશન એન્ટિજન સાથે પ્રથમ મુલાકાત પછી જર્મિનલ સેન્ટરમાં થાય છે, જ્યાં B-લિમ્ફોસાઇટ્સ એન્ટિબોડીની અવકાશીકરણ ક્ષમતા સુધારવા માટે જનીનમાં પરિવર્તન કરે છે. પ્રાથમિક લિમ્ફોઇડ અંગોમાં પરિપક્વન દરમિયાન V(D)J રીકોમ્બિનેશન થાય છે, જ્યારે મૃત્યુ પામતી વખતે અથવા એન્ટિજન સાથેની દ્વિતીય મુલાકાત પહેલા આવું થતું નથી.", "ref": "Std 12 - Chapter 10: પ્રતિરક્ષાતંત્ર અને રોગપ્રતિકારકતા", "ch": ""}, {"q": "B-લિમ્ફોસાઇટ્સમાં કયા જનીનનો અભાવ અથવા મ્યુટેશન પરિણામે X-લિંક્ડ એગામાગ્લોબ્યુલિનેમિયા (XLA) રોગ થાય છે?", "opts": ["RAG-1 અથવા RAG-2", "BTK (Bruton’s Tyrosine Kinase)", "CD40", "CD19"], "ans": 1, "exp": "X-લિંક્ડ એગામાગ્લોબ્યુલિનેમિયા (XLA) રોગ BTK (Bruton’s Tyrosine Kinase) જનીનના અભાવ અથવા મ્યુટેશનને કારણે થાય છે, જે B-લિમ્ફોસાઇટ્સના પરિપક્વન અને સક્રિયતામાં મહત્વની ભૂમિકા ભજવે છે. RAG-1 અથવા RAG-2 ના અભાવથી V(D)J રીકોમ્બિનેશન અટકે છે, જ્યારે CD40 અને CD19 ના અભાવથી અન્ય પ્રતિરક્ષા તંત્રની ખામી થાય છે.", "ref": "Std 12 - Chapter 10: પ્રતિરક્ષાતંત્ર અને રોગપ્રતિકારકતા", "ch": ""}, {"q": "B-લિમ્ફોસાઇટ્સ દ્વારા ઉત્પન્ન થતાં IgM એન્ટિબોડીની કયા ગુણધર્મને કારણે તે પ્રાથમિક પ્રતિક્રિયામાં મહત્વની ભૂમિકા ભજવે છે?", "opts": ["ઉચ્ચ અવકાશીકરણ ક્ષમતા", "પેન્ટામેરિક રચના અને કોમ્પ્લિમેન્ટ સિસ્ટમની સક્રિયતા", "મેમ્બ્રેન પાર ગમી શકવાની ક્ષમતા", "સૌથી લાંબો અર્ધ-આયુષ્ય કાળ"], "ans": 1, "exp": "IgM એન્ટિબોડી પેન્ટામેરિક રચના ધરાવે છે અને કોમ્પ્લિમેન્ટ સિસ્ટમની સક્રિયતામાં મહત્વની ભૂમિકા ભજવે છે, જે પ્રાથમિક પ્રતિક્રિયામાં અસરકારક બનાવે છે. ઉચ્ચ અવકાશીકરણ ક્ષમતા IgG ની વિશેષતા છે, જ્યારે મેમ્બ્રેન પાર ગમી શકવાની ક્ષમતા અને લાંબો અર્ધ-આયુષ્ય કાળ અન્ય એન્ટિબોડી વર્ગો સાથે સંકળાયેલ છે.", "ref": "Std 12 - Chapter 10: પ્રતિરક્ષાતંત્ર અને રોગપ્રતિકારકતા", "ch": ""}, {"q": "B-લિમ્ફોસાઇટ્સની કયા ઉપ-પ્રકારમાં સ્વ-રિએક્ટિવ એન્ટિબોડી ઉત્પન્ન થવાની શક્યતા સૌથી વધુ હોય છે, જે ઓટોઇમ્યુન રોગો તરફ દોરી શકે છે?", "opts": ["B-1 કોષો", "B-2 કોષો", "મેમરી B-કોષો", "પ્લાઝ્મા કોષો"], "ans": 0, "exp": "B-1 કોષો સ્વ-રિએક્ટિવ એન્ટિબોડી ઉત્પન્ન કરવાની સૌથી વધુ શક્યતા ધરાવે છે, જે ઓટોઇમ્યુન રોગો તરફ દોરી શકે છે. B-2 કોષો, મેમરી B-કોષો અને પ્લાઝ્મા કોષો સ્વ-રિએક્ટિવ એન્ટિબોડી ઉત્પન્ન કરવાની ઓછી શક્યતા ધરાવે છે.", "ref": "Std 12 - Chapter 10: પ્રતિરક્ષાતંત્ર અને રોગપ્રતિકારકતા", "ch": ""}, {"q": "B-લિમ્ફોસાઇટ્સના પરિપક્વન દરમિયાન, કયા અવસ્થામાં તે સૌપ્રથમ એન્ટિજન-સ્વીકારક રિસેપ્ટર (BCR) ધરાવે છે, પરંતુ અત્યંત નીચા અવકાશ (affinity) સાથે હોય છે?", "opts": ["હેમેટોપોઇટિક સ્ટેમ સેલ અવસ્થા", "પ્રો-B કોષ અવસ્થા", "પ્રી-B કોષ અવસ્થા", "અપરિપક્વ (immature) B કોષ અવસ્થા"], "ans": 3, "exp": "અપરિપક્વ B કોષ અવસ્થામાં સૌપ્રથમ BCR (IgM) દેખાય છે, પરંતુ તેનો અવકાશ અત્યંત નીચો હોય છે. હેમેટોપોઇટિક સ્ટેમ સેલ (A) અને પ્રો-B કોષ (B) અવસ્થામાં BCR હજુ બનતો નથી. પ્રી-B કોષ (C) અવસ્થામાં પ્રી-BCR બને છે, પરંતુ તે પૂરો BCR નથી. અપરિપક્વ B કોષમાં જ પ્રથમ વખત પૂરો BCR (IgM) દેખાય છે, પરંતુ તેનો અવકાશ નીચો હોય છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "B-લિમ્ફોસાઇટ્સમાં, કયા ઉત્સેચક દ્વારા V(D)J રીકોમ્બિનેશન પ્રક્રિયા સંપન્ન થાય છે, જેના અભાવે Omenn સિન્ડ્રોમ જેવી સ્થિતિ ઉદ્ભવે છે?", "opts": ["DNA પોલિમરેઝ", "RAG-1 અને RAG-2", "ટર્મિનલ ડીઓક્સીન્યુક્લિયોટાઇડ ટ્રાન્સફરેઝ (TdT)", "DNA લિગેઝ IV"], "ans": 1, "exp": "V(D)J રીકોમ્બિનેશન માટે RAG-1 અને RAG-2 ઉત્સેચકો જરૂરી છે. DNA પોલિમરેઝ (A) DNA રેપ્લિકેશનમાં ભાગ લે છે, TdT (C) N-ન્યુક્લિયોટાઇડ ઉમેરણમાં ભાગ લે છે, અને DNA લિગેઝ IV (D) ડબલ-સ્ટ્રેન્ડ બ્રેક રિપેરમાં ભાગ લે છે. RAG ઉત્સેચકોના અભાવે V(D)J રીકોમ્બિનેશન થતું નથી, જે Omenn સિન્ડ્રોમ તરફ દોરી જાય છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "B-લિમ્ફોસાઇટ્સ દ્વારા ઉત્પન્ન થતાં IgA એન્ટિબોડીની કયી લાક્ષણિકતા તેને શ્લેષ્મલ પડ (mucosal surface) પર અસરકારક બનાવે છે?", "opts": ["તે ડાયમરિક રચના ધરાવે છે અને J ચેઇન સાથે જોડાયેલ હોય છે", "તે મોનોમેરિક હોય છે અને ફાગોસાઇટોસિસને પ્રેરે છે", "તે પેન્ટામેરિક હોય છે અને પૂરક (complement) પ્રણાલીને સક્રિય કરે છે", "તે ટેટ્રામેરિક હોય છે અને માસ્ટ સેલ્સને સક્રિય કરે છે"], "ans": 0, "exp": "IgA એન્ટિબોડી શ્લેષ્મલ પડ પર કામ કરે છે અને તે ડાયમેરિક રચનામાં હોય છે, જે J ચેઇન સાથે જોડાયેલ હોય છે. આ રચના તેને શ્લેષ્મલ પડ પર સ્થિર રહેવામાં અને પેથોજેનને બાંધવામાં મદદ કરે છે. બાકીના વિકલ્પો અયોગ્ય છે: IgA મોનોમેરિક (B), પેન્ટામેરિક (C - IgMની લાક્ષણિકતા), અથવા ટેટ્રામેરિક (D) નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "B-લિમ્ફોસાઇટ્સની કયા ઉપ-પ્રકારમાં, એન્ટિજન સંપર્ક પછી, સોમેટિક હાઇપરમ્યુટેશન અને ક્લાસ સ્વિચ રીકોમ્બિનેશન બંને પ્રક્રિયાઓ થાય છે?", "opts": ["B-1 કોષ", "ફોલિક્યુલર B કોષ", "માર્જિનલ ઝોન B કોષ", "પ્લાઝ્મા કોષ"], "ans": 1, "exp": "ફોલિક્યુલર B કોષોમાં જ સોમેટિક હાઇપરમ્યુટેશન અને ક્લાસ સ્વિચ રીકોમ્બિનેશન બંને પ્રક્રિયાઓ થાય છે. B-1 કોષ (A) અને માર્જિનલ ઝોન B કોષ (C) આ પ્રક્રિયાઓ માટે સક્ષમ નથી. પ્લાઝ્મા કોષ (D) એન્ટિબોડી ઉત્પન્ન કરે છે, પરંતુ તે પરિપક્વ B કોષોમાંથી વિકસે છે અને આ પ્રક્રિયાઓ પહેલા જ થઈ ચૂકી હોય છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "B-લિમ્ફોસાઇટ્સમાં, કયા સિગ્નલિંગ મોલેક્યુલના અભાવે, BCR સિગ્નલિંગમાં ખલેલ પડે છે અને પરિણામે B કોષોનું પરિપક્વન અટકી જાય છે?", "opts": ["CD19", "CD21", "CD40", "Btk (Bruton’s tyrosine kinase)"], "ans": 3, "exp": "Btk (Bruton’s tyrosine kinase) એ BCR સિગ્નલિંગ માટે અત્યંત મહત્વપૂર્ણ છે. તેના અભાવે B કોષોનું પરિપક્વન અટકી જાય છે, જે X-લિંક્ડ એગામાગ્લોબ્યુલિનેમિયા (XLA) તરફ દોરી જાય છે. CD19 (A) અને CD21 (B) BCR કો-રિસેપ્ટર તરીકે કામ કરે છે, પરંતુ તેમના અભાવે પરિપક્વન પૂર્ણપણે અટકતું નથી. CD40 (C) T કોષો સાથેની પરસ્પર ક્રિયામાં મહત્વપૂર્ણ છે, પરંતુ BCR સિગ્નલિંગ માટે નહીં.", "ref": "Std 12 - પ્રકરણ 8: માનવ પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "B-લિમ્ફોસાઇટ્સ દ્વારા ઉત્પન્ન થતાં IgE એન્ટિબોડીની કયી લાક્ષણિકતા તેને એલર્જી પ્રતિક્રિયામાં મહત્વની બનાવે છે?", "opts": ["તે મસ્ટ કોષ અને બેસોફિલ સાથે જોડાય છે", "તે પ્લાસેન્ટલ બેરિયરને પાર કરે છે", "તે સૌથી લાંબો અર્ધ-આયુષ્ય ધરાવે છે", "તે બેક્ટેરિયા વિરુદ્ધ પ્રબળ પ્રતિક્રિયા દર્શાવે છે"], "ans": 0, "exp": "IgE એન્ટિબોડી મસ્ટ કોષ અને બેસોફિલ સાથે જોડાઈને એલર્જી પ્રતિક્રિયામાં મહત્વની ભૂમિકા ભજવે છે. પ્લાસેન્ટલ બેરિયરને પાર કરવું IgGની લાક્ષણિકતા છે. સૌથી લાંબો અર્ધ-આયુષ્ય IgGનો હોય છે. બેક્ટેરિયા વિરુદ્ધ પ્રબળ પ્રતિક્રિયા IgM અથવા IgG દ્વારા થાય છે.", "ref": "Std 12 - પ્રકરણ 10: પ્રતિરક્ષાતંત્ર અને રોગપ્રતિકારકતા", "ch": ""}, {"q": "B-લિમ્ફોસાઇટ્સમાં, કયા જનીનનો અભાવ પરિણામે બ્રટનના રોગ (Bruton’s Disease) થાય છે, જે X-લિંક્ડ એગામાગ્લોબ્યુલિનેમિયા (XLA) તરીકે પણ ઓળખાય છે?", "opts": ["RAG-1 અથવા RAG-2", "BTK (Bruton’s Tyrosine Kinase)", "AID (Activation-Induced Cytidine Deaminase)", "CD40L"], "ans": 1, "exp": "BTK (Bruton’s Tyrosine Kinase) જનીનનો અભાવ પરિણામે બ્રટનના રોગ (XLA) થાય છે, જે B-લિમ્ફોસાઇટ્સના પરિપક્વન અને કાર્યમાં ખલેલ પહોંચાડે છે. RAG-1/2નો અભાવ V(D)J રીકોમ્બિનેશનમાં ખલેલ પહોંચાડે છે. AIDનો અભાવ ક્લાસ સ્વિચ રીકોમ્બિનેશન અને સોમેટિક હાઇપરમ્યુટેશનને અસર કરે છે. CD40Lનો અભાવ હાઇપર-IgM સિન્ડ્રોમ તરીકે ઓળખાય છે.", "ref": "Std 12 - પ્રકરણ 10: પ્રતિરક્ષાતંત્ર અને રોગપ્રતિકારકતા", "ch": ""}, {"q": "B-લિમ્ફોસાઇટ્સના કયા ઉપ-પ્રકારમાં, એન્ટિજન સંપર્ક પછી, ક્લાસ સ્વિચ રીકોમ્બિનેશન (CSR) થતું નથી?", "opts": ["B-1 કોષ", "B-2 કોષ", "ફોલિક્યુલર B-કોષ", "માર્ગી B-કોષ (Marginal Zone B-cell)"], "ans": 0, "exp": "B-1 કોષમાં ક્લાસ સ્વિચ રીકોમ્બિનેશન (CSR) થતું નથી, પરંતુ તે સ્વાભાવિક રીતે IgM ઉત્પન્ન કરે છે. B-2 કોષ, ફોલિક્યુલર B-કોષ, અને માર્ગી B-કોષમાં CSR થાય છે, જેના પરિણામે વિવિધ એન્ટિબોડી વર્ગો ઉત્પન્ન થાય છે.", "ref": "Std 12 - પ્રકરણ 10: પ્રતિરક્ષાતંત્ર અને રોગપ્રતિકારકતા", "ch": ""}, {"q": "B-લિમ્ફોસાઇટ્સની સક્રિયતા દરમિયાન, કયા સિગ્નલિંગ મોલેક્યુલના અભાવે, BCR સિગ્નલિંગમાં ખલેલ પડે છે અને પરિણામે B-કોષનું પરિપક્વન અટકી જાય છે?", "opts": ["CD19", "CD21", "CD79a અથવા CD79b", "CD40"], "ans": 2, "exp": "CD79a અથવા CD79bનો અભાવ BCR સિગ્નલિંગને અસર કરે છે, જેના પરિણામે B-કોષનું પરિપક્વન અટકી જાય છે. CD19 અને CD21 BCR સહ-સક્રિયકારક તરીકે કાર્ય કરે છે, પરંતુ તેમના અભાવે સંપૂર્ણ રીતે પરિપક્વન અટકતું નથી. CD40 T-કોષ સાથેની પરસ્પર ક્રિયામાં મહત્વની ભૂમિકા ભજવે છે.", "ref": "Std 12 - પ્રકરણ 10: પ્રતિરક્ષાતંત્ર અને રોગપ્રતિકારકતા", "ch": ""}, {"q": "એક દર્દીને વારંવાર બેક્ટેરિયલ ચેપ લાગે છે અને તેના રુધિરમાં IgG નું પ્રમાણ અસામાન્ય રીતે નીચું જોવા મળે છે, જ્યારે IgM નું પ્રમાણ સામાન્ય છે. આ પરિસ્થિતિમાં B-લિમ્ફોસાઇટ્સ સાથે સંકળાયેલી કઈ પ્રક્રિયામાં ખામી હોવાની સંભાવના સૌથી વધુ છે?", "opts": ["V(D)J રીકોમ્બિનેશન", "ક્લાસ સ્વિચ રીકોમ્બિનેશન (CSR)", "સોમેટિક હાઇપરમ્યુટેશન (SHM)", "એફિનિટી મેચ્યુરેશન"], "ans": 1, "exp": "આ પ્રશ્નમાં દર્દીના રુધિરમાં IgG નું પ્રમાણ નીચું અને IgM નું પ્રમાણ સામાન્ય હોવાનું વર્ણન છે. B-લિમ્ફોસાઇટ્સમાં IgM થી IgG માં વર્ગ પરિવર્તન (Class Switch Recombination - CSR) દ્વારા થાય છે. CSR માં ખામી હોવાને કારણે IgM થી IgG માં પરિવર્તન થઈ શકતું નથી, જેના પરિણામે IgG નું પ્રમાણ નીચું રહે છે. V(D)J રીકોબિનેશન એન્ટિબોડીની વિવિધતા માટે જવાબદાર છે, પરંતુ તે IgM નું પ્રમાણ સામાન્ય રાખવામાં મદદ કરતું નથી. સોમેટિક હાઇપરમ્યુટેશન અને એફિનિટી મેચ્યુરેશન એન્ટિબોડીની વિશિષ્ટતા અને અવકાશીકરણમાં વધારો કરે છે, પરંતુ તે IgG ના નીચા પ્રમાણનું કારણ નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો (પ્રતિરક્ષા તંત્ર)", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
