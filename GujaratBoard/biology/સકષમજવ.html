<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>સૂક્ષ્મજીવો</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>સૂક્ષ્મજીવો</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">સૂક્ષ્મજીવો</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "નીચેના પૈકી કયો સૂક્ષ્મજીવ પ્રકાશસંશ્લેષણ દ્વારા પોતાનો ખોરાક બનાવે છે પરંતુ તેમાં ક્લોરોફિલ-a અને ક્લોરોફિલ-b બંને હાજર હોતા નથી?", "opts": ["નોસ્ટોક (Nostoc)", "યુગ્લિના (Euglena)", "ક્લેમિડોમોનાસ (Chlamydomonas)", "સ્પાયરોગાયરા (Spirogyra)"], "ans": 0, "exp": "નોસ્ટોક એ સાયનોબેક્ટેરિયા છે જે પ્રકાશસંશ્લેષણ કરે છે, પરંતુ તેમાં માત્ર ક્લોરોફિલ-a હોય છે, ક્લોરોફિલ-b હોતું નથી. યુગ્લિના અને ક્લેમિડોમોનાસમાં ક્લોરોફિલ-a અને b બંને હોય છે, જ્યારે સ્પાયરોગાયરામાં પણ બંને પ્રકારના ક્લોરોફિલ હોય છે. તેથી સાચો જવાબ નોસ્ટોક છે.", "ref": "Std 11 - પ્રકરણ 2: સજીવ વિશ્વમાં વિવિધતા", "ch": ""}, {"q": "એક સૂક્ષ્મજીવ જે પ્રોકેરિયોટિક છે, નાઇટ્રોજન સ્થાપન કરે છે, પરંતુ તેને મુક્ત ઓક્સિજનની જરૂર નથી. આ લક્ષણો ધરાવતો સૂક્ષ્મજીવ કયો છે?", "opts": ["રાઇઝોબિયમ (Rhizobium)", "એઝોટોબેક્ટર (Azotobacter)", "ક્લોસ્ટ્રિડિયમ (Clostridium)", "એનાબીના (Anabaena)"], "ans": 2, "exp": "ક્લોસ્ટ્રિડિયમ એ અવાયવીય (anaerobic) બેક્ટેરિયા છે જે નાઇટ્રોજન સ્થાપન કરે છે અને પ્રોકેરિયોટિક છે. રાઇઝોબિયમ અને એઝોટોબેક્ટરને ઓક્સિજનની જરૂર પડે છે, જ્યારે એનાબીના સાયનોબેક્ટેરિયા છે જે ઓક્સિજન ઉત્પન્ન કરે છે. તેથી સાચો જવાબ ક્લોસ્ટ્રિડિયમ છે.", "ref": "Std 11 - પ્રકરણ 10: સૂક્ષ્મજીવો: મિત્ર અને શત્રુ", "ch": ""}, {"q": "નીચેના પૈકી કયો સૂક્ષ્મજીવ પ્રતિરક્ષા પ્રતિભાવમાં મુખ્ય ભૂમિકા ભજવે છે, પરંતુ તે વાઇરસ નથી અને પ્રોકેરિયોટિક પણ નથી?", "opts": ["લેક્ટોબેસિલસ (Lactobacillus)", "પ્લાઝ્મોડિયમ (Plasmodium)", "મોનોસાઇટ્સ (Monocytes)", "ઇન્ફલુએન્ઝા વાઇરસ (Influenza virus)"], "ans": 0, "exp": "મોનોસાઇટ્સ એ શ્વેતકણો (white blood cells) છે જે પ્રતિરક્ષા પ્રતિભાવમાં મુખ્ય ભૂમિકા ભજવે છે. તે વાઇરસ નથી અને પ્રોકેરિયોટિક પણ નથી. લેક્ટોબેસિલસ પ્રોકેરિયોટિક છે, પ્લાઝ્મોડિયમ પ્રજીવ છે, અને ઇન્ફલુએન્ઝા વાઇરસ વાઇરસ છે. તેથી સાચો જવાબ મોનોસાઇટ્સ છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એક સૂક્ષ્મજીવ જે બેક્ટેરિયા છે, પરંતુ તેની કોષદીવાલ પેપ્ટિડોગ્લાયકેન ધરાવતી નથી. આ લક્ષણ ધરાવતો સૂક્ષ્મજીવ કયો છે?", "opts": ["માયકોપ્લાઝમા (Mycoplasma)", "ઇશ્ચેરિચિયા કોલાઇ (Escherichia coli)", "સ્ટ્રેપ્ટોકોકસ (Streptococcus)", "બેસિલસ (Bacillus)"], "ans": 0, "exp": "માયકોપ્લાઝમા એ એકમાત્ર બેક્ટેરિયા છે જેની કોષદીવાલ હોતી નથી અને તેથી પેપ્ટિડોગ્લાયકેન ધરાવતી નથી. અન્ય તમામ વિકલ્પોમાં પેપ્ટિડોગ્લાયકેન ધરાવતી કોષદીવાલ હોય છે. તેથી સાચો જવાબ માયકોપ્લાઝમા છે.", "ref": "Std 11 - પ્રકરણ 2: સજીવ વિશ્વમાં વિવિધતા", "ch": ""}, {"q": "નીચેના પૈકી કયો સૂક્ષ્મજીવ પ્રજનન માટે બીજાણુ (spores) ઉત્પન્ન કરે છે, પરંતુ તે ફૂગ (fungus) નથી અને પ્રજીવ (protozoa) પણ નથી?", "opts": ["પેનિસિલિયમ (Penicillium)", "પ્લાઝ્મોડિયમ (Plasmodium)", "બેસિલસ (Bacillus)", "અમીબા (Amoeba)"], "ans": 2, "exp": "બેસિલસ એ બેક્ટેરિયા છે જે બીજાણુ ઉત્પન્ન કરે છે, પરંતુ તે ફૂગ કે પ્રજીવ નથી. પેનિસિલિયમ ફૂગ છે, પ્લાઝ્મોડિયમ પ્રજીવ છે, અને અમીબા પણ પ્રજીવ છે. તેથી સાચો જવાબ બેસિલસ છે.", "ref": "Std 11 - પ્રકરણ 10: સૂક્ષ્મજીવો: મિત્ર અને શત્રુ", "ch": ""}, {"q": "એક સૂક્ષ્મજીવ જે યુકેરિયોટિક છે, પરંતુ તેની કોષદીવાલ કાઇટિન ધરાવે છે અને તે બહુકોષી પણ હોઈ શકે છે. આ સૂક્ષ્મજીવ કયા સમૂહમાં આવે છે?", "opts": ["બેક્ટેરિયા", "પ્રજીવો (Protozoa)", "ફૂગ (Fungi)", "લીલ (Algae)"], "ans": 2, "exp": "સાચો જવાબ: C) ફૂગ (Fungi). ફૂગ યુકેરિયોટિક સૂક્ષ્મજીવો છે, જેમની કોષદીવાલ કાઇટિન ધરાવે છે અને તેઓ એકકોષી કે બહુકોષી હોઈ શકે છે. બેક્ટેરિયા પ્રોકેરિયોટિક છે અને તેમની કોષદીવાલ પેપ્ટિડોગ્લાયકેન ધરાવે છે. પ્રજીવો યુકેરિયોટિક છે, પરંતુ તેમની કોષદીવાલ હોતી નથી. લીલ પણ યુકેરિયોટિક છે, પરંતુ તેમની કોષદીવાલ સેલ્યુલોઝ ધરાવે છે.", "ref": "Std 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ", "ch": ""}, {"q": "નીચેના પૈકી કયો સૂક્ષ્મજીવ પ્રોટીનનું સંશ્લેષણ કરવા માટે પોતાના રાઇબોઝોમ્સનો ઉપયોગ કરે છે, પરંતુ તેના રાઇબોઝોમ્સ 70S પ્રકારના હોય છે અને તેને કોષકેન્દ્રપટલ હોતું નથી?", "opts": ["અમીબા", "યીસ્ટ", "સાયનોબેક્ટેરિયા", "પેરામીશિયમ"], "ans": 2, "exp": "સાચો જવાબ: C) સાયનોબેક્ટેરિયા. સાયનોબેક્ટેરિયા પ્રોકેરિયોટિક સૂક્ષ્મજીવો છે, જેમના રાઇબોઝોમ્સ 70S પ્રકારના હોય છે અને તેમને કોષકેન્દ્રપટલ હોતું નથી. અમીબા, યીસ્ટ અને પેરામીશિયમ યુકેરિયોટિક છે, જેમના રાઇબોઝોમ્સ 80S પ્રકારના હોય છે અને તેમને કોષકેન્દ્રપટલ હોય છે.", "ref": "Std 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ", "ch": ""}, {"q": "એક સૂક્ષ્મજીવ જે નાઇટ્રોજન સ્થાપન કરે છે, પરંતુ તેને મુક્ત ઓક્સિજનની જરૂર નથી અને તેના કોષોમાં હીમોગ્લોબિન જેવું પ્રોટીન ધરાવે છે. આ સૂક્ષ્મજીવ કયો છે?", "opts": ["એઝોટોબેક્ટર", "રાઇઝોબિયમ", "ક્લોસ્ટ્રિડિયમ", "નોસ્ટોક"], "ans": 2, "exp": "સાચો જવાબ: C) ક્લોસ્ટ્રિડિયમ. ક્લોસ્ટ્રિડિયમ એનારોબિક બેક્ટેરિયા છે જે નાઇટ્રોજન સ્થાપન કરે છે અને તેમને મુક્ત ઓક્સિજનની જરૂર નથી. તેમના કોષોમાં લેગહીમોગ્લોબિન જેવું પ્રોટીન હોતું નથી. એઝોટોબેક્ટર અને રાઇઝોબિયમ એરોબિક છે, જ્યારે નોસ્ટોક સાયનોબેક્ટેરિયા છે જે લેગહીમોગ્લોબિન ધરાવતું નથી.", "ref": "Std 12 - પ્રકરણ 10: સૂક્ષ્મજીવો: મનુષ્યના મિત્રો", "ch": ""}, {"q": "એક સૂક્ષ્મજીવ જે પ્રજનન માટે બીજાણુ ઉત્પન્ન કરે છે, પરંતુ તે બીજાણુ અલિંગી પ્રજનન દ્વારા ઉત્પન્ન થાય છે અને તેને ફૂગના જીવનચક્રમાં ડિકેરિયોટિક તબક્કો હોતો નથી. આ સૂક્ષ્મજીવ કયા વર્ગમાં આવે છે?", "opts": ["બેસિડિયોમાયસીટીસ", "એસ્કોમાયસીટીસ", "ઝાયગોમાયસીટીસ", "ડ્યુટેરોમાયસીટીસ"], "ans": 2, "exp": "સાચો જવાબ: C) ઝાયગોમાયસીટીસ. ઝાયગોમાયસીટીસ ફૂગ અલિંગી બીજાણુ ઉત્પન્ન કરે છે અને તેમના જીવનચક્રમાં ડિકેરિયોટિક તબક્કો હોતો નથી. બેસિડિયોમાયસીટીસ અને એસ્કોમાયસીટીસમાં ડિકેરિયોટિક તબક્કો હોય છે, જ્યારે ડ્યુટેરોમાયસીટીસમાં લિંગી પ્રજનન જાણીતું નથી.", "ref": "Std 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ", "ch": ""}, {"q": "નીચેના પૈકી કયો સૂક્ષ્મજીવ એવો છે કે જે સજીવ કોષમાં પરોપજીવી તરીકે રહે છે, પરંતુ તેના જીવનચક્રમાં મુક્ત-જીવન શક્ય નથી અને તેનું DNA-આરએનએ વહન કરતું વાહક તરીકે વર્તે છે?", "opts": ["બેક્ટરિયોફેજ", "ટી-ઇવી વાયરસ", "પ્લાઝમોડિયમ", "ટ્રાઇકોમોનાસ"], "ans": 0, "exp": "બેક્ટરિયોફેજ એ બેક્ટેરિયામાં પરોપજીવી તરીકે રહેતો વાયરસ છે, જેના જીવનચક્રમાં મુક્ત-જીવન શક્ય નથી. તે બેક્ટેરિયાના કોષમાં પ્રવેશી તેના DNAને પોતાના DNA સાથે એકીકૃત કરે છે અને પ્રજનન કરે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: ટી-ઇવી વાયરસ મનુષ્યમાં રહે છે અને મુક્ત-જીવન શક્ય નથી, પરંતુ તે DNA-આરએનએ વાહક તરીકે વર્તતો નથી; પ્લાઝમોડિયમ મલેરિયા પરોપજીવી છે, પરંતુ તે મુક્ત-જીવન શક્ય છે અને DNA-આરએનએ વાહક તરીકે વર્તતો નથી; ટ્રાઇકોમોનાસ એક પ્રોટોઝોઆ છે જે મુક્ત-જીવન શક્ય છે.", "ref": "Std 11 - Chapter 10: સૂક્ષ્મજીવો અને મનુષ્ય કલ્યાણ", "ch": ""}, {"q": "નીચેના પૈકી કયો સૂક્ષ્મજીવ એવો છે કે જે નાઇટ્રોજન સ્થાપન કરે છે, પરંતુ તે મૃત ઓર્ગેનિક પદાર્થો પર આધારિત છે અને સહજીવી નથી?", "opts": ["રાઇઝોબિયમ", "એઝોટોબેક્ટર", "નોસ્ટોક", "ક્લોસ્ટ્રિડિયમ"], "ans": 3, "exp": "ક્લોસ્ટ્રિડિયમ એક મૃતજીવી (saprophytic) બેક્ટેરિયા છે જે નાઇટ્રોજન સ્થાપન કરે છે, પરંતુ તે સહજીવી નથી. રાઇઝોબિયમ અને નોસ્ટોક સહજીવી નાઇટ્રોજન સ્થાપક છે, જ્યારે એઝોટોબેક્ટર મુક્ત-જીવન નાઇટ્રોજન સ્થાપક છે.", "ref": "Std 11 - Chapter 14: પોષણ અને સૂક્ષ્મજીવોની ભૂમિકા", "ch": ""}, {"q": "નીચેના પૈકી કયો સૂક્ષ્મજીવ એવો છે કે જે પ્રજનન માટે બીજાણુ ઉત્પન્ન કરે છે, પરંતુ તે બીજાણુ અંકુરણ માટે અનુકૂળ પરિસ્થિતિની રાહ જોવી પડે છે?", "opts": ["બેક્ટેરિયા", "ફંગી", "વાયરસ", "પ્રોટોઝોઆ"], "ans": 1, "exp": "ફંગી બીજાણુ ઉત્પન્ન કરે છે જે અંકુરણ માટે અનુકૂળ પરિસ્થિતિની રાહ જોવી પડે છે. બેક્ટેરિયા બીજાણુ ઉત્પન્ન કરતા નથી, વાયરસ બીજાણુ ઉત્પન્ન કરતા નથી, અને પ્રોટોઝોઆ બીજાણુ ઉત્પન્ન કરે છે પરંતુ તે અંકુરણ માટે તરત જ અનુકૂળ પરિસ્થિતિની જરૂર નથી.", "ref": "Std 11 - Chapter 2: સૂક્ષ્મજીવો અને તેના વર્ગીકરણ", "ch": ""}, {"q": "નીચેના પૈકી કયો સૂક્ષ્મજીવ એવો છે કે જે પ્રોટીનનું સંશ્લેષણ કરવા માટે પોતાના રાઇબોઝોમ્સનો ઉપયોગ કરે છે, પરંતુ તેના રાઇબોઝોમ્સ 70S પ્રકારના છે?", "opts": ["યીસ્ટ", "અમીબા", "ઇ. કોલાઇ", "પેરામીશિયમ"], "ans": 2, "exp": "ઇ. કોલાઇ એક પ્રોકેરિયોટિક બેક્ટેરિયા છે જેમના રાઇબોઝોમ્સ 70S પ્રકારના છે. યીસ્ટ, અમીબા, અને પેરામીશિયમ યુકેરિયોટિક સૂક્ષ્મજીવો છે જેમના રાઇબોઝોમ્સ 80S પ્રકારના છે.", "ref": "Std 11 - Chapter 2: સૂક્ષ્મજીવો અને તેના વર્ગીકરણ", "ch": ""}, {"q": "નીચેના પૈકી કયો સૂક્ષ્મજીવ એવો છે કે જે પ્રોકેરિયોટિક છે, પરંતુ તેની જનીનીક સામગ્રીમાં હિસ્ટોન પ્રોટીન જોવા મળતું નથી અને તે નાઇટ્રોજન સ્થાપન પણ કરે છે, પરંતુ તે ઓક્સિજનની હાજરીમાં જીવિત રહી શકતો નથી?", "opts": ["રાઇઝોબિયમ", "એઝોટોબેક્ટર", "ક્લોસ્ટ્રિડિયમ", "સાયનોબેક્ટરિયા"], "ans": 2, "exp": "ક્લોસ્ટ્રિડિયમ પ્રોકેરિયોટિક સૂક્ષ્મજીવ છે, તેની જનીનીક સામગ્રીમાં હિસ્ટોન પ્રોટીન જોવા મળતું નથી. તે નાઇટ્રોજન સ્થાપન કરે છે અને તે અણુઓક્સિજની (anaerobic) છે, એટલે કે તે ઓક્સિજનની હાજરીમાં જીવિત રહી શકતો નથી. રાઇઝોબિયમ અને એઝોટોબેક્ટર ઓક્સિજનની હાજરીમાં જીવિત રહી શકે છે, જ્યારે સાયનોબેક્ટરિયા ઓક્સિજનની હાજરીમાં જીવિત રહી શકે છે અને તેની જનીનીક સામગ્રીમાં હિસ્ટોન પ્રોટીન જોવા મળતું નથી, પરંતુ તે નાઇટ્રોજન સ્થાપન કરે છે.", "ref": "Std 11 - અધ્યાય 2: સૂક્ષ્મજીવો અને જીવન", "ch": ""}, {"q": "નીચેના પૈકી કયો સૂક્ષ્મજીવ એવો છે કે જે યુકેરિયોટિક છે, પરંતુ તે પ્રજનન માટે બીજાણુ ઉત્પન્ન કરે છે અને તેની કોષદીવાલ સેલ્યુલોઝ ધરાવે છે, પરંતુ તે પ્રકાશસંશ્લેષણ દ્વારા ખોરાક બનાવતો નથી?", "opts": ["યીસ્ટ", "મશરૂમ", "એમીબા", "પેરામીશિયમ"], "ans": 0, "exp": "યીસ્ટ યુકેરિયોટિક સૂક્ષ્મજીવ છે, તે પ્રજનન માટે બીજાણુ ઉત્પન્ન કરે છે અને તેની કોષદીવાલ સેલ્યુલોઝ ધરાવે છે, પરંતુ તે પ્રકાશસંશ્લેષણ દ્વારા ખોરાક બનાવતો નથી. મશરૂમ પણ યુકેરિયોટિક છે અને બીજાણુ ઉત્પન્ન કરે છે, પરંતુ તેની કોષદીવાલ કાઇટિન ધરાવે છે. એમીબા અને પેરામીશિયમ બીજાણુ ઉત્પન્ન કરતા નથી.", "ref": "Std 11 - અધ્યાય 2: સૂક્ષ્મજીવો અને જીવન", "ch": ""}, {"q": "નીચેના પૈકી કયો સૂક્ષ્મજીવ એવો છે કે જેના DNAમાં હાઇડ્રોક્સીમિથાઇલસાયટોસીન (Hydroxymethylcytosine) બેઇઝ જોવા મળે છે, પરંતુ તે પ્રોકેરિયોટિક છે અને તેની કોષદીવાલમાં લિપોપોલિસેકેરાઇડ (LPS) હાજર નથી?", "opts": ["એશેરિકિયા કોલાઇ (Escherichia coli)", "માયકોપ્લઝમા (Mycoplasma)", "ટ્યુબરક્યુલોસિસના બેસિલસ (Mycobacterium tuberculosis)", "સાયનોબેક્ટેરિયા (Cyanobacteria)"], "ans": 2, "exp": "માયકોબેક્ટેરિયમ ટ્યુબરક્યુલોસિસ (Mycobacterium tuberculosis)ના DNAમાં હાઇડ્રોક્સીમિથાઇલસાયટોસીન બેઇઝ જોવા મળે છે. તે પ્રોકેરિયોટિક છે, પરંતુ તેની કોષદીવાલમાં લિપોપોલિસેકેરાઇડ (LPS) હાજર નથી, કારણ કે તેની કોષદીવાલ મોમના સ્તરથી ઢંકાયેલી છે. એશેરિકિયા કોલાઇમાં સામાન્ય સાયટોસીન બેઇઝ હાજર છે અને તેની કોષદીવાલમાં LPS હાજર છે. માયકોપ્લઝમામાં કોષદીવાલ જ હાજર નથી. સાયનોબેક્ટેરિયામાં સામાન્ય DNA બેઇઝ અને LPS હાજર છે.", "ref": "Std 11 - અધ્યાય 2: સૂક્ષ્મજીવો અને તેના વર્ગીકરણ", "ch": ""}, {"q": "નીચેના પૈકી કયો સૂક્ષ્મજીવ એવો છે કે જે પ્રજનન માટે બીજાણુ (Spores) ઉત્પન્ન કરે છે, પરંતુ તે બીજાણુ અંકુરણ (Germination) માટે ઓક્સિજનની જરૂરિયાત ધરાવે છે અને તે ફંગી નથી?", "opts": ["એસ્પરજિલસ (Aspergillus)", "બેસિલસ એન્થ્રેસિસ (Bacillus anthracis)", "પેનિસિલિયમ (Penicillium)", "ક્લોસ્ટ્રિડિયમ ટેટેની (Clostridium tetani)"], "ans": 1, "exp": "બેસિલસ એન્થ્રેસિસ (Bacillus anthracis) બીજાણુ ઉત્પન્ન કરે છે, જે અંકુરણ માટે ઓક્સિજનની જરૂરિયાત ધરાવે છે. તે બેક્ટેરિયા છે, ફંગી નથી. એસ્પરજિલસ અને પેનિસિલિયમ ફંગી છે, જ્યારે ક્લોસ્ટ્રિડિયમ ટેટેની બીજાણુ ઉત્પન્ન કરે છે પરંતુ તે અંકુરણ માટે ઓક્સિજનની જરૂરિયાત ધરાવતું નથી (તે અનોક્સિજેનિક છે).", "ref": "Std 11 - અધ્યાય 2: સૂક્ષ્મજીવો અને તેના વર્ગીકરણ", "ch": ""}, {"q": "નીચેના પૈકી કયો સૂક્ષ્મજીવ એવો છે કે જેના DNAમાં થાયમીન (Thymine) બેઇઝ નથી હોતો, પરંતુ તેના બદલે યુરેસિલ (Uracil) હાજર છે અને તે પ્રોકેરિયોટિક છે?", "opts": ["ઇ. કોલાઇ (E. coli)", "માઇકોપ્લાઝમા (Mycoplasma)", "ટી-ઇવન બેક્ટેરિયોફેજ (T-even bacteriophage)", "સાયનોબેક્ટેરિયા (Cyanobacteria)"], "ans": 2, "exp": "ટી-ઇવન બેક્ટેરિયોફેજ (T-even bacteriophage) એ એક વાઇરસ છે જે બેક્ટેરિયાને સંક્રમિત કરે છે. તેના DNAમાં થાયમીન (T) બેઇઝ નથી હોતો, પરંતુ તેના બદલે હાઇડ્રોક્સીમિથાઇલસાયટોસીન (HMC) હાજર છે. આ ઉપરાંત, તેના DNAમાં યુરેસિલ (U) પણ હાજર છે, જે સામાન્ય રીતે RNAમાં જોવા મળે છે. ઇ. કોલાઇ, માઇકોપ્લાઝમા અને સાયનોબેક્ટેરિયા બધા પ્રોકેરિયોટિક સૂક્ષ્મજીવો છે, પરંતુ તેમના DNAમાં થાયમીન હાજર છે.", "ref": "Std 11 - અધ્યાય 10: સૂક્ષ્મજીવો અને સૂક્ષ્મજીવવિજ્ઞાન", "ch": ""}, {"q": "નીચેના પૈકી કયો સૂક્ષ્મજીવ એવો છે કે જેના કોષમાં કોષકેન્દ્ર અનુપસ્થિત છે, પરંતુ તેના જનીનોમાં ઇન્ટ્રોન (Intron) હાજર છે અને તે ઉચ્ચ તાપમાને વૃદ્ધિ પામી શકે છે?", "opts": ["એસ્પર્જિલસ (Aspergillus)", "થર્મસ એક્વેટિકસ (Thermus aquaticus)", "મેથેનોજેન (Methanogen)", "સાયનોબેક્ટીરિયા (Cyanobacteria)"], "ans": 1, "exp": "થર્મસ એક્વેટિકસ (Thermus aquaticus) એક પ્રોકેરિયોટિક સૂક્ષ્મજીવ છે, જેમાં કોષકેન્દ્ર અનુપસ્થિત છે. પરંતુ તેના જનીનોમાં ઇન્ટ્રોન હાજર છે અને તે ઉચ્ચ તાપમાને (થર્મોફિલિક) વૃદ્ધિ પામી શકે છે. એસ્પર્જિલસ યુકેરિયોટિક ફૂગ છે, જેમાં કોષકેન્દ્ર હાજર છે. મેથેનોજેન પ્રોકેરિયોટિક છે, પરંતુ તે ઇન્ટ્રોન ધરાવતો નથી અને ઉચ્ચ તાપમાને વૃદ્ધિ પામતો નથી. સાયનોબેક્ટીરિયા પ્રોકેરિયોટિક છે, પરંતુ તેના જનીનોમાં ઇન્ટ્રોન હાજર નથી.", "ref": "Std 11 - અધ્યાય 2: સૂક્ષ્મજીવો અને તેના વર્ગીકરણ", "ch": ""}, {"q": "એક સૂક્ષ્મજીવ જે પ્રોકેરિયોટિક છે, પરંતુ તેના DNAમાં થાયમીન બેઇઝના સ્થાને હાઇડ્રોક્સીમિથાઇલયુરાસિલ (Hydroxymethyluracil) ધરાવે છે. આ સૂક્ષ્મજીવ કયા વર્ગનો છે અને તેની કોષદીવાલમાં કયું વિશિષ્ટ ઘટક જોવા મળે છે?", "opts": ["આર્કીબેક્ટેરિયા વર્ગનો, કોષદીવાલમાં સ્યુડોમ્યુરિન (Pseudomurein) ધરાવે છે", "માયકોપ્લાઝ્મા વર્ગનો, કોષદીવાલ ગેરહાજર હોય છે", "બેક્ટેરિયોફેજ વર્ગનો, કોષદીવાલમાં પ્રોટીન અને લિપિડનું આવરણ હોય છે", "સાયનોબેક્ટેરિયા વર્ગનો, કોષદીવાલમાં પેપ્ટિડોગ્લાયકેન ધરાવે છે"], "ans": 0, "exp": "સાચો જવાબ વિકલ્પ A છે. આર્કીબેક્ટેરિયા વર્ગના સૂક્ષ્મજીવો પ્રોકેરિયોટિક હોય છે અને તેમના DNAમાં થાયમીનના સ્થાને હાઇડ્રોક્સીમિથાઇલયુરાસિલ જોવા મળે છે. તેમની કોષદીવાલમાં સ્યુડોમ્યુરિન (Pseudomurein) નામનું વિશિષ્ટ ઘટક હોય છે, જે પેપ્ટિડોગ્લાયકેનથી અલગ છે. વિકલ્પ B ખોટો છે કારણ કે માયકોપ્લાઝ્મા કોષદીવાલ ધરાવતા નથી અને તેમના DNAમાં થાયમીન હોય છે. વિકલ્પ C ખોટો છે કારણ કે બેક્ટેરિયોફેજ વાઇરસ છે, જે સ્વતંત્ર કોષ નથી અને તેમની કોષદીવાલ હોતી નથી. વિકલ્પ D ખોટો છે કારણ કે સાયનોબેક્ટેરિયા પેપ્ટિડોગ્લાયકેન ધરાવે છે અને તેમના DNAમાં થાયમીન હોય છે.", "ref": "Std 11 - પ્રકરણ 2: સજીવ વિશ્વનું વર્ગીકરણ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
