<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પરાગણના સાધનો</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>પરાગણના સાધનો</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">પરાગણના સાધનો</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "પરાગણના સાધનોની વાતાવરણમાં સૌથી વધુ અસરકારક રીતે ફેલાવા માટે કયા પવનની દિશા અને વેગનો ઉપયોગ થાય છે?", "opts": ["નીચા વેગવાળા સ્થિર પવન (Stable low-velocity wind)", "ઉચ્ચ વેગવાળા અસ્થિર પવન (High-velocity turbulent wind)", "મધ્યમ વેગવાળા સતત પવન (Moderate steady wind)", "ચક્રવાતી પવન (Cyclonic wind)"], "ans": 1, "exp": "પરાગણના સાધનો (પરાગરજ) માટે ઉચ્ચ વેગવાળા અસ્થિર પવન સૌથી અસરકારક હોય છે કારણ કે તે પરાગરજને દૂર સુધી અને વિવિધ દિશામાં ફેલાવે છે. નીચા વેગવાળા પવન (A) પરાગરજને દૂર ફેલાવી શકતા નથી. મધ્યમ વેગવાળા સતત પવન (C) પરાગરજને એક જ દિશામાં ફેલાવે છે, જ્યારે ચક્રવાતી પવન (D) પરાગરજને અસમતોલ રીતે ફેલાવે છે, જે અસરકારક નથી.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં વનસ્પતિઓ", "ch": ""}, {"q": "જ્યારે પરાગણના સાધન તરીકે જલવાહક (Hydrophily)નો ઉપયોગ થાય છે, ત્યારે કયા પ્લાવી પદાર્થનો ઉપયોગ પરાગરજને પાણીની સપાટી પર તરતા રાખવા માટે થાય છે?", "opts": ["મોમ (Wax)", "સેલ્યુલોઝ (Cellulose)", "લિપિડ (Lipid)", "પ્રોટીન (Protein)"], "ans": 0, "exp": "જલવાહક પરાગણમાં, પરાગરજને પાણીની સપાટી પર તરતા રાખવા માટે મોમ (Wax)નો ઉપયોગ થાય છે. મોમ હલકો અને જળપ્રતિરોધક હોય છે, જે પરાગરજને ભીંજવાથી બચાવે છે. સેલ્યુલોઝ (B), લિપિડ (C), અને પ્રોટીન (D) પાણીમાં ઓગળી જાય છે અથવા ભીંજાય છે, જે પરાગરજને તરતા રાખવામાં અસમર્થ હોય છે.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં વનસ્પતિઓ", "ch": ""}, {"q": "પરાગણના સાધન તરીકે કીટકો (Entomophily)નો ઉપયોગ કરતી વનસ્પતિઓમાં, કયા રંગના ફૂલો કીટકોને સૌથી વધુ આકર્ષે છે?", "opts": ["લાલ અને નારંગી", "પીળો અને જાંબલી", "હરિયો અને કાળો", "સફેદ અને ગુલાબી"], "ans": 1, "exp": "કીટક-પરાગણ વનસ્પતિઓમાં, પીળો અને જાંબલી રંગના ફૂલો કીટકોને સૌથી વધુ આકર્ષે છે કારણ કે કીટકો આ રંગોને સરળતાથી ઓળખી શકે છે. લાલ અને નારંગી (A) કીટકોને ઓછા આકર્ષે છે, જ્યારે હરિયો (C) અને સફેદ/ગુલાબી (D) રંગો કીટકો માટે ઓછા દૃશ્યમાન હોય છે.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં વનસ્પતિઓ", "ch": ""}, {"q": "પરાગણના સાધન તરીકે પક્ષીઓ (Ornithophily)નો ઉપયોગ કરતી વનસ્પતિઓમાં, કયા પ્રકારના ફળો પક્ષીઓને આકર્ષે છે?", "opts": ["સુગંધિત અને રંગીન ફળો", "મજબૂત અને કડક ફળો", "રસાળ અને રંગીન ફળો", "સૂકા અને બેફામ ફળો"], "ans": 2, "exp": "પક્ષી-પરાગણ વનસ્પતિઓમાં, રસાળ અને રંગીન ફળો પક્ષીઓને સૌથી વધુ આકર્ષે છે કારણ કે પક્ષીઓ આ ફળોને સરળતાથી ઓળખી અને ખાઈ શકે છે. સુગંધિત ફળો (A) પક્ષીઓ માટે ઓછા આકર્ષક હોય છે, જ્યારે મજબૂત/કડક (B) અને સૂકા/બેફામ (D) ફળો પક્ષીઓને ઓછા આકર્ષે છે.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં વનસ્પતિઓ", "ch": ""}, {"q": "પરાગણના સાધન તરીકે પવન (Anemophily)નો ઉપયોગ કરતી વનસ્પતિઓમાં, પરાગકોષોની સપાટી પર કયા પદાર્થનો આવરણ હોય છે જે તેમને હવામાં તરતા રાખે છે?", "opts": ["સ્ટાર્ચ (Starch)", "સ્પોરોપોલેનિન (Sporopollenin)", "કિટિન (Chitin)", "લિગ્નિન (Lignin)"], "ans": 1, "exp": "પવન-પરાગણ વનસ્પતિઓમાં, પરાગકોષોની સપાટી પર સ્પોરોપોલેનિનનું આવરણ હોય છે, જે તેમને હવામાં તરતા અને સૂકા રાખવામાં મદદ કરે છે. સ્ટાર્ચ (A) પાણીમાં ઓગળી જાય છે, કિટિન (C) અને લિગ્નિન (D) પરાગકોષોની સપાટી પર નહીં હોય.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં વનસ્પતિઓ", "ch": ""}, {"q": "જ્યારે પરાગણના સાધન તરીકે કીટકો (Entomophily)નો ઉપયોગ થાય છે, ત્યારે નીચેનામાંથી કયું લક્ષણ કીટકોને આકર્ષવા માટે સૌથી ઓછું મહત્વનું ગણવામાં આવે છે?", "opts": ["ફૂલોમાં મધુ (Nectar)નું ઉત્પાદન", "ફૂલોનો આકર્ષક રંગ", "ફૂલોની સુગંધ", "ફૂલોની પાંખડીઓની સંખ્યા"], "ans": 3, "exp": "કીટકોને આકર્ષવા માટે મધુ, રંગ અને સુગંધ મહત્વના પરિબળો છે. મધુ કીટકોને ખોરાક પૂરો પાડે છે, રંગ અને સુગંધ કીટકોને દૂરથી જ આકર્ષે છે. જ્યારે પાંખડીઓની સંખ્યા પરાગણ પ્રક્રિયામાં સીધી અસર કરતી નથી, તેથી તે સૌથી ઓછું મહત્વનું લક્ષણ છે.", "ref": "Std 12 - અધ્યાય 2: વનસ્પતિમાં પ્રજનન", "ch": ""}, {"q": "જલવાહક (Hydrophily) પરાગણ ધરાવતી વનસ્પતિઓમાં, પરાગકોષોની સપાટી પર કયા પદાર્થનો વિકાસ થાય છે, જે પાણીમાં તરવા અને પાણી દ્વારા વહન પામવા માટે મદદરૂપ થાય છે?", "opts": ["મ્યુસિલેજીનસ કવચ", "ક્યુટિનનું કવચ", "વેક્સનું કવચ", "સબેરિનનું કવચ"], "ans": 0, "exp": "જલવાહક પરાગણ ધરાવતી વનસ્પતિઓમાં, પરાગકોષોની સપાટી પર મ્યુસિલેજીનસ કવચ વિકસે છે, જે પાણીમાં તરવા અને પાણી દ્વારા વહન પામવા માટે મદદરૂપ થાય છે. ક્યુટિન, વેક્સ અને સબેરિનના કવચો પાણી-પ્રતિરોધક હોય છે અને પવન-પરાગણ વનસ્પતિઓમાં જોવા મળે છે.", "ref": "Std 12 - અધ્યાય 2: વનસ્પતિમાં પ્રજનન", "ch": ""}, {"q": "પક્ષી-પરાગણ (Ornithophily) ધરાવતી વનસ્પતિઓમાં, ફૂલોના કયા લક્ષણને કારણે પક્ષીઓ પરાગણમાં મદદ કરે છે, પરંતુ કીટકોને આકર્ષતી નથી?", "opts": ["ફૂલોનો લાલ રંગ", "ફૂલોની મજબૂત સુગંધ", "ફૂલોમાં મધુનું ઉત્પાદન", "ફૂલોની નળાકાર આકાર"], "ans": 3, "exp": "પક્ષી-પરાગણ વનસ્પતિઓમાં, ફૂલોનો નળાકાર આકાર પક્ષીઓને પરાગણમાં મદદ કરે છે, કારણ કે પક્ષીઓની ચાંચ આ આકારમાં સરળતાથી પ્રવેશી શકે છે. લાલ રંગ, મજબૂત સુગંધ અને મધુનું ઉત્પાદન કીટકોને પણ આકર્ષે છે, તેથી તે પક્ષી-પરાગણ માટે વિશિષ્ટ લક્ષણ નથી.", "ref": "Std 12 - અધ્યાય 2: વનસ્પતિમાં પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું પરાગણનું સાધન એવી વનસ્પતિઓ માટે ઉપયોગી છે, જ્યાં પવન અને કીટકો બંને પરાગણ માટે અસરકારક નથી?", "opts": ["જલવાહક (Hydrophily)", "પક્ષી-પરાગણ (Ornithophily)", "ચામડાચઢી પરાગણ (Chiropterophily)", "મનુષ્ય-પરાગણ (Anthropophily)"], "ans": 0, "exp": "જલવાહક પરાગણ એવી વનસ્પતિઓ માટે ઉપયોગી છે, જ્યાં પવન અને કીટકો બંને પરાગણ માટે અસરકારક નથી, જેમ કે જલીય વનસ્પતિઓ. પક્ષી-પરાગણ, ચામડાચઢી પરાગણ અને મનુષ્ય-પરાગણ એવા પર્યાવરણમાં જોવા મળે છે, જ્યાં પવન અથવા કીટકો પરાગણ માટે ઉપલબ્ધ હોય છે.", "ref": "Std 12 - અધ્યાય 2: વનસ્પતિમાં પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું પરાગણનું સાધન એવી વનસ્પતિઓ માટે ઉપયોગી છે જ્યાં પવન અને કીટકો બંને અસરકારક નથી, પરંતુ પાણીની હાજરીમાં પરાગણ સફળતાપૂર્વક થાય છે?", "opts": ["એનિમોફિલી (Anemophily)", "હાઇડ્રોફિલી (Hydrophily)", "ઝૂફિલી (Zoophily)", "ઓર્નિથોફિલી (Ornithophily)"], "ans": 1, "exp": "જવાબ B) હાઇડ્રોફિલી (Hydrophily) છે. હાઇડ્રોફિલી એ પાણી દ્વારા થતું પરાગણ છે, જે એવી વનસ્પતિઓ માટે ઉપયોગી છે જ્યાં પવન અથવા કીટકો અસરકારક નથી. ઉદાહરણ તરીકે, વોટર લિલી (Nymphaea) અને વલ્લિસનેરિયા (Vallisneria) જેવી જલીય વનસ્પતિઓમાં પાણી દ્વારા પરાગણ થાય છે. A) એનિમોફિલી પવન દ્વારા થતું પરાગણ છે, જે પાણીની હાજરીમાં અસરકારક નથી. C) ઝૂફિલી કીટકો દ્વારા થતું પરાગણ છે, જે પાણીની હાજરીમાં અસરકારક નથી. D) ઓર્નિથોફિલી પક્ષીઓ દ્વારા થતું પરાગણ છે, જે પાણીની હાજરીમાં અસરકારક નથી.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિઓમાં પ્રજનન", "ch": ""}, {"q": "જલવાહક (Hydrophily) પરાગણ ધરાવતી વનસ્પતિઓમાં, નીચેનામાંથી કયું લક્ષણ પરાગણની સફળતાને સુનિશ્ચિત કરવા માટે સૌથી મહત્વપૂર્ણ છે?", "opts": ["પરાગકોષોની જળપ્રતિરોધક સપાટી", "ફૂલોનો આકર્ષક રંગ", "ફૂલોની સુગંધ", "પરાગકોષોની મોટી સંખ્યા"], "ans": 0, "exp": "જલવાહક (Hydrophily) પરાગણ ધરાવતી વનસ્પતિઓમાં, પરાગકોષોની જળપ્રતિરોધક સપાટી એ પરાગણની સફળતાને સુનિશ્ચિત કરવા માટે સૌથી મહત્વપૂર્ણ લક્ષણ છે. આ સપાટી પરાગકોષોને પાણીમાં ઓગળવા અથવા નષ્ટ થવાથી બચાવે છે. ફૂલોનો રંગ, સુગંધ અથવા પરાગકોષોની સંખ્યા જલ-પરાગણ માટે એટલી મહત્વપૂર્ણ નથી.", "ref": "Std 12 - અધ્યાય 2: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લો: \n(1) ચિરપરાગી (Chiropterophily) પરાગણ ધરાવતી વનસ્પતિઓમાં ફૂલો મોટેભાગે રાત્રે ખીલે છે અને તીવ્ર ગંધ ધરાવે છે. \n(2) ચિરપરાગી પરાગણમાં ફૂલોના રંગ મોટેભાગે સફેદ અથવા આછા રંગના હોય છે. \n(3) ચિરપરાગી પરાગણ માટે ફૂલો મોટા કદના અને મજબૂત પુષ્પદંડ ધરાવે છે. \nઉપરોક્ત વિધાનોમાંથી કયું/કયા વિધાનો સાચું/સાચાં છે?", "opts": ["ફક્ત (1) અને (2)", "ફક્ત (2) અને (3)", "ફક્ત (1) અને (3)", "(1), (2) અને (3)"], "ans": 3, "exp": "(1) સાચું છે કારણ કે ચામાચીડિયા રાત્રે સક્રિય હોય છે અને તીવ્ર ગંધથી આકર્ષાય છે. (2) સાચું છે કારણ કે રાત્રે ખીલતા ફૂલો મોટેભાગે સફેદ અથવા આછા રંગના હોય છે, જે રાત્રે દૃશ્યમાન થાય છે. (3) સાચું છે કારણ કે ચામાચીડિયા મોટા ફૂલોને સરળતાથી પકડી શકે અને મજબૂત પુષ્પદંડ તેમના વજનને સહન કરી શકે છે. તેથી તમામ વિધાનો સાચાં છે.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું લક્ષણ જલવાહક (Hydrophily) પરાગણ ધરાવતી વનસ્પતિઓમાં જોવા મળતું નથી?", "opts": ["પરાગરજ હલકી અને પાણીમાં તરતી હોય છે", "પરાગરજની સપાટી પર મ્યુસિલેજનું આવરણ હોય છે", "ફૂલો મોટેભાગે સુગંધિત અને રંગીન હોય છે", "પરાગરજ પાણીના પ્રવાહ દ્વારા સ્ત્રીકેસર સુધી પહોંચે છે"], "ans": 2, "exp": "જલવાહક પરાગણમાં ફૂલો મોટેભાગે સુગંધિત કે રંગીન હોતા નથી કારણ કે આ પરાગણ પાણી દ્વારા થાય છે, જેમાં કીટકો કે પક્ષીઓને આકર્ષવાની જરૂર નથી. બાકીના વિકલ્પો જલવાહક પરાગણની લાક્ષણિકતાઓ છે: પરાગરજ હલકી અને તરતી હોય છે, મ્યુસિલેજનું આવરણ હોય છે, અને પાણીના પ્રવાહ દ્વારા પરાગરજનું વહન થાય છે.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "એક વનસ્પતિમાં નીચેના લક્ષણો જોવા મળે છે: \n- ફૂલો મોટા કદના અને મજબૂત પુષ્પદંડ ધરાવે છે. \n- ફૂલો રાત્રે ખીલે છે અને તીવ્ર ગંધ ધરાવે છે. \n- પરાગરજ મોટી અને ચીકણી હોય છે. \nઆ વનસ્પતિમાં પરાગણનું સાધન કયું હોવાની શક્યતા સૌથી વધુ છે?", "opts": ["પવન (Anemophily)", "કીટકો (Entomophily)", "ચામાચીડિયા (Chiropterophily)", "પક્ષીઓ (Ornithophily)"], "ans": 2, "exp": "આપેલા લક્ષણો ચિરપરાગી (Chiropterophily) પરાગણ માટે વિશિષ્ટ છે: મોટા કદના ફૂલો, મજબૂત પુષ્પદંડ, રાત્રે ખીલવું, તીવ્ર ગંધ અને મોટી-ચીકણી પરાગરજ ચામાચીડિયા દ્વારા પરાગણ માટે અનુકૂળ છે. પવન પરાગણમાં ફૂલો નાના અને ગંધરહિત હોય છે. કીટકો દ્વારા પરાગણમાં ફૂલો રંગીન અને દિવસે ખીલતા હોય છે. પક્ષીઓ દ્વારા પરાગણમાં ફૂલો લાલ કે નારંગી રંગના અને દિવસે ખીલતા હોય છે.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "નીચેના જોડકાં ધ્યાનમાં લો: \n(1) એન્ટોમોફિલી (Entomophily) - ફૂલો મીઠી સુગંધ ધરાવે છે \n(2) ઓર્નિથોફિલી (Ornithophily) - ફૂલો લાલ કે નારંગી રંગના હોય છે \n(3) હાઇડ્રોફિલી (Hydrophily) - પરાગરજ પાણીમાં ડૂબી જાય છે \n(4) એનેમોફિલી (Anemophily) - પરાગરજ હલકી અને સૂકી હોય છે \nઉપરોક્ત જોડકાંમાંથી કયું/કયાં જોડકું/જોડકાં ખોટું/ખોટાં છે?", "opts": ["ફક્ત (3)", "ફક્ત (1) અને (3)", "ફક્ત (2) અને (4)", "ફક્ત (1), (2) અને (4)"], "ans": 0, "exp": "જોડકું (3) ખોટું છે કારણ કે હાઇડ્રોફિલી (જલવાહક પરાગણ)માં પરાગરજ પાણીમાં તરતી હોય છે, ડૂબતી નથી. બાકીના જોડકાં સાચાં છે: એન્ટોમોફિલીમાં ફૂલો મીઠી સુગંધ ધરાવે છે, ઓર્નિથોફિલીમાં ફૂલો લાલ કે નારંગી રંગના હોય છે, અને એનેમોફિલીમાં પરાગરજ હલકી અને સૂકી હોય છે.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "ચિરપરાગી (Chiropterophily) પરાગણ ધરાવતી વનસ્પતિઓમાં, નીચેનામાંથી કયું લક્ષણ પરાગણની સફળતામાં સૌથી ઓછું યોગદાન આપે છે?", "opts": ["ફૂલો રાત્રે ખીલે છે", "ફૂલો મજબૂત અને મીઠી સુગંધ ધરાવે છે", "ફૂલોનો રંગ સફેદ અથવા હળવા રંગનો હોય છે", "ફૂલોના પરાગકોષો ચીકણા અને ભારે હોય છે"], "ans": 3, "exp": "ચિરપરાગી પરાગણમાં વાટકી (Bats) પરાગણ કરે છે. વાટકી રાત્રે સક્રિય હોય છે, તેથી ફૂલો રાત્રે ખીલે (A) અને મજબૂત સુગંધ (B) ધરાવે તે પરાગણ માટે મહત્વપૂર્ણ છે. હળવા રંગના ફૂલો (C) રાત્રે દેખાય શકે છે. પરંતુ પરાગકોષો ચીકણા અને ભારે (D) હોવા પરાગણ માટે અનુકૂળ નથી, કારણ કે વાટકી પરાગકોષોને વહન કરવામાં મુશ્કેલી પડે છે. તેથી D યોગ્ય જવાબ છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "જ્યારે પરાગણના સાધન તરીકે પવન (Anemophily)નો ઉપયોગ થાય છે, ત્યારે નીચેનામાંથી કયું લક્ષણ પરાગણની કાર્યક્ષમતાને ઘટાડે છે?", "opts": ["પરાગકોષો હલકા અને સૂક્ષ્મ હોય છે", "ફૂલો નાના અને અગોચર હોય છે", "પરાગકોષોની સપાટી પર ચીકણા પદાર્થો હોય છે", "પુષ્પવિન્યાસ સ્પાઇક અથવા કેટલીન જેવા હોય છે"], "ans": 2, "exp": "પવન-પરાગણ (Anemophily)માં પરાગકોષો હલકા અને સૂક્ષ્મ (A) હોવા, ફૂલો નાના અને અગોચર (B) હોવા, અને પુષ્પવિન્યાસ સ્પાઇક જેવા (D) હોવા પરાગણ માટે અનુકૂળ છે. પરંતુ પરાગકોષોની સપાટી પર ચીકણા પદાર્થો (C) હોવા પરાગકોષોને ભારે બનાવે છે, જે પવન દ્વારા વહન કરવામાં મુશ્કેલી ઉભી કરે છે, તેથી પરાગણની કાર્યક્ષમતા ઘટે છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું જોડકું પરાગણના સાધન અને તેની સાથે સંકળાયેલી વનસ્પતિની લાક્ષણિકતા સાથે યોગ્ય રીતે જોડાયેલું નથી?", "opts": ["એન્ટોમોફિલી (Entomophily) - ફૂલો મીઠી સુગંધ અને રંગીન હોય છે", "હાઇડ્રોફિલી (Hydrophily) - પરાગકોષો પાણીમાં તરતા રહે છે", "ઓર્નિથોફિલી (Ornithophily) - ફૂલો લાલ અથવા નારંગી રંગના હોય છે", "એનિમોફિલી (Anemophily) - ફૂલો મોટા અને આકર્ષક હોય છે"], "ans": 3, "exp": "એન્ટોમોફિલી (A)માં કીટકોને આકર્ષવા ફૂલો મીઠી સુગંધ અને રંગીન હોય છે, હાઇડ્રોફિલી (B)માં પરાગકોષો પાણીમાં તરતા રહે છે, અને ઓર્નિથોફિલી (C)માં ફૂલો લાલ અથવા નારંગી રંગના હોય છે. પરંતુ એનિમોફિલી (D)માં ફૂલો નાના અને અગોચર હોય છે, મોટા અને આકર્ષક ફૂલો પવન-પરાગણ માટે અનુકૂળ નથી.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ચિરપરાગી (Chiropterophily) પરાગણ વિશે સાચું નથી?", "opts": ["વાટકી (Bats) પરાગણ કરે છે", "ફૂલો રાત્રે ખીલે છે", "ફૂલોનો રંગ સફેદ અથવા હળવા રંગનો હોય છે", "ફૂલો મજબૂત સુગંધ ધરાવતા નથી"], "ans": 3, "exp": "ચિરપરાગી પરાગણમાં વાટકી (A) પરાગણ કરે છે, ફૂલો રાત્રે ખીલે છે (B), અને ફૂલોનો રંગ સફેદ અથવા હળવા રંગનો (C) હોય છે. પરંતુ ફૂલો મજબૂત સુગંધ ધરાવે છે (D), કારણ કે વાટકી સુગંધ દ્વારા આકર્ષાય છે. તેથી D સાચું નથી.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લો: (1) ચામડી જેવી સપાટી ધરાવતા પરાગકોષો, (2) પરાગકોષોનો મોટો જથ્થો, (3) પરાગકણોનો ચીકણો પદાર્થ વડે આચ્છાદિત હોવો, (4) ફૂલોનો સફેદ રંગ. ચિરપરાગી (Chiropterophily) પરાગણ ધરાવતી વનસ્પતિઓમાં ઉપરોક્તમાંથી કયા લક્ષણો જોવા મળે છે?", "opts": ["(1), (2) અને (3)", "(2), (3) અને (4)", "(1), (3) અને (4)", "(1), (2) અને (4)"], "ans": 1, "exp": "ચિરપરાગી (Chiropterophily) પરાગણ ધરાવતી વનસ્પતિઓમાં, પરાગકોષોનો મોટો જથ્થો (2), પરાગકણોનો ચીકણો પદાર્થ વડે આચ્છાદિત હોવો (3), અને ફૂલોનો સફેદ રંગ (4) જોવા મળે છે. ચામડી જેવી સપાટી ધરાવતા પરાગકોષો (1) એ જલવાહક (Hydrophily) પરાગણનું લક્ષણ છે, જે ચિરપરાગીમાં જોવા મળતું નથી. આથી, સાચો જવાબ (2), (3) અને (4) છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં પ્રજનન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
