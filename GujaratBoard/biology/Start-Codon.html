<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start Codon</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Start Codon</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Start Codon</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "મનુષ્યમાં પ્રોટીન સંશ્લેષણની શરૂઆત કયા કોડોન દ્વારા થાય છે અને તેની વિશિષ્ટતા શું છે?", "opts": ["AUG, જે મિથાયોનિન એમિનોએસિડને કોડ કરે છે અને mRNAના 5' ટર્મિનલ પર સ્થિત હોય છે", "UAA, જે સ્ટોપ કોડોન છે અને સંશ્લેષણની શરૂઆતમાં ભૂમિકા ભજવે છે", "GUG, જે વેલિનને કોડ કરે છે અને પ્રોકેરિયોટ્સમાં પ્રારંભિક કોડોન તરીકે કામ કરે છે", "AGU, જે સેરિનને કોડ કરે છે અને યુકેરિયોટ્સમાં પ્રારંભિક કોડોન તરીકે ઓળખાય છે"], "ans": 0, "exp": "A) AUG એ યુનિવર્સલ સ્ટાર્ટ કોડોન છે જે મિથાયોનિનને કોડ કરે છે અને mRNAના 5' ટર્મિનલ પર સ્થિત હોય છે, જે પ્રોટીન સંશ્લેષણની શરૂઆત કરે છે. B) UAA એ સ્ટોપ કોડોન છે, જે સંશ્લેષણની સમાપ્તિ કરે છે, શરૂઆત નહીં. C) GUG પ્રોકેરિયોટ્સમાં અપવાદરૂપે પ્રારંભિક કોડોન તરીકે કામ કરે છે, પરંતુ તે યુકેરિયોટ્સમાં પ્રમાણભૂત નથી. D) AGU સેરિનને કોડ કરે છે અને સ્ટાર્ટ કોડોન નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "જો કોઈ mRNA અણુમાં AUG કોડોનની જગ્યાએ UUG કોડોન હોય, તો પ્રોટીન સંશ્લેષણ પર શું અસર થશે?", "opts": ["પ્રોટીન સંશ્લેષણ સંપૂર્ણ રીતે બંધ થશે", "પ્રોટીન સંશ્લેષણ L-લ્યુસિનથી શરૂ થશે", "રાઇબોઝોમ mRNA પર બંધ નહીં થાય", "પ્રોટીન સંશ્લેષણ મિથાયોનિનથી શરૂ થશે, પરંતુ ત્યારબાદ UUGને આધારે ચાલુ રહેશે"], "ans": 2, "exp": "C) રાઇબોઝોમ mRNA પર બંધ નહીં થાય કારણ કે UUG એ સ્ટાર્ટ કોડોન નથી, અને રાઇબોઝોમને AUG કોડોનની જરૂર પડે છે. A) પ્રોટીન સંશ્લેષણ બંધ થશે નહીં, પરંતુ શરૂ જ નહીં થાય. B) L-લ્યુસિન એ UUG દ્વારા કોડ થાય છે, પરંતુ સંશ્લેષણ શરૂ થશે નહીં. D) AUG વિના પ્રોટીન સંશ્લેષણ શરૂ થશે નહીં, તેથી મિથાયોનિનથી શરૂ થવાનું કોઈ પ્રશ્ન જ નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "પ્રોકેરિયોટિક કોષોમાં, સ્ટાર્ટ કોડોન AUG ઉપરાંત કયા કોડોન દ્વારા પ્રોટીન સંશ્લેષણ શરૂ થઈ શકે છે?", "opts": ["UAA અને UAG", "GUG અને UUG", "AGG અને AGA", "CCC અને GGG"], "ans": 1, "exp": "B) GUG અને UUG પ્રોકેરિયોટ્સમાં અપવાદરૂપે સ્ટાર્ટ કોડોન તરીકે કામ કરે છે. A) UAA અને UAG સ્ટોપ કોડોન છે. C) AGG અને AGA આર્જિનિનને કોડ કરે છે અને સ્ટાર્ટ કોડોન નથી. D) CCC અને GGG ક્રમશઃ પ્રોલિન અને ગ્લાઇસિનને કોડ કરે છે, સ્ટાર્ટ કોડોન ષણ શરૂ કરવા માટે સીધો અવરોધ નથી. D) tRNA-Metની ગેરહાજરી અસાધારણ છે, કારણ કે તે સ્ટાર્ટ કોડોન માટે આવશ્યક છે, પરંતુ કોઝાક ક્રમની ગેરહાજરી વધુ સામાન્ય કારણ છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "યુકેરિયોટિક mRNAમાં, સ્ટાર્ટ કોડોન AUGની આસપાસ કોઝાક ક્રમ કયો હોય છે અને તેનું મહત્વ શું છે?", "opts": ["ACCAUGG - રાઇબોઝોમને mRNA સાથે બાંધવા માટે મદદ કરે છે", "GCCGCCAUGG - રાઇબોઝોમને યોગ્ય પોઝિશનમાં મૂકવા અને પ્રોટીન સંશ્લેષણ શરૂ કરવા માટે મહત્વપૂર્ણ છે", "UAAUGA - mRNAની સ્થિરતા માટે જરૂરી છે", "AUGGCC - પ્રોટીન સંશ્લેષણની ગતિ નિયંત્રિત કરે છે"], "ans": 1, "exp": "કોઝાક ક્રમ (GCCGCCAUGG) યુકેરિયોટિક mRNAમાં સ્ટાર્ટ કોડોન AUGની આસપાસ હોય છે અને તે રાઇબોઝોમને યોગ્ય પોઝિશનમાં મૂકવા અને પ્રોટીન સંશ્લેષણ શરૂ કરવા માટે મહત્વપૂર્ણ છે. A) ACCAUGG એ પ્રોકેરિયોટિક RBS જેવો છે, પરંતુ યુકેરિયોટ્સમાં કોઝાક ક્રમ વધુ સ્પષ્ટ છે. C) UAAUGA એ સ્ટોપ કોડોન છે અને સ્થિરતા સાથે સંબંધિત નથી. D) AUGGCC એ કોઝાક ક્રમ નથી અને ગતિ નિયંત્રણ સાથે સંબંધિત નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "જો કોઈ mRNA અણુમાં સ્ટાર્ટ કોડોન AUGની જગ્યાએ GUG હોય, તો પ્રોટીન સંશ્લેષણ શરૂ થશે કે કેમ? અને જો હા, તો કયા એમિનો એસિડ સાથે?", "opts": ["નહીં, કારણ કે GUG એ સ્ટાર્ટ કોડોન નથી", "હા, વાલિન (Val) સાથે", "હા, મિથાયોનિન (Met) સાથે", "હા, લ્યુસિન (Leu) સાથે"], "ans": 1, "exp": "પ્રોકેરિયોટિક કોષોમાં, GUG કોડોન પ્રોટીન સંશ્લેષણ શરૂ કરી શકે છે, પરંતુ તે વાલિન (Val) એમિનો એસિડ સાથે શરૂ થશે. A) ખોટું છે કારણ કે GUG પ્રોકેરિયોટ્સમાં સ્ટાર્ટ કોડોન તરીકે કામ કરી શકે છે. C) મિથાયોનિન (Met) ફક્ત AUG કોડોન સાથે જોડાય છે. D) લ્યુસિન (Leu) GUG સાથે જોડાય છે, પરંતુ સ્ટાર્ટ કોડોન તરીકે નહીં.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "સ્ટાર્ટ કોડોન AUGની ઓળખ અને પ્રોટીન સંશ્લેષણ શરૂ કરવા માટે કયા રાઇબોઝોમલ સબયુનિટ મહત્વપૂર્ણ ભૂમિકા ભજવે છે?", "opts": ["60S સબયુનિટ", "40S સબયુનિટ", "30S સબયુનિટ", "50S સબયુનિટ"], "ans": 1, "exp": "યુકેરિયોટિક કોષોમાં, 40S રાઇબોઝોમલ સબયુનિટ mRNA સાથે બાંધીને સ્ટાર્ટ કોડોન AUGની ઓળખ કરે છે અને પ્રોટીન સંશ્લેષણ શરૂ કરવા માટે મહત્વપૂર્ણ છે. A) 60S સબયુનિટ 40S સાથે જોડાઈને 80S રાઇબોઝોમ બનાવે છે, પરંતુ સ્ટાર્ટ કોડોનની ઓળખ માટે 40S જવાબદાર છે. C) અને D) પ્રોકેરિયોટિક રાઇબોઝોમલ સબયુનિટ્સ છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લઈને સાચો વિકલ્પ પસંદ કરો:\n\n(1) મિથિયોનાઇન એમાઇનો એસિડ માટેનો કોડોન માત્ર AUG જ છે.\n(2) કેટલાક પ્રોકેરિયોટિક કોષોમાં GUG અને UUG પણ સ્ટાર્ટ કોડોન તરીકે કાર્ય કરી શકે છે.\n(3) યુકેરિયોટિક કોષોમાં, સ્ટાર્ટ કોડોન AUGની આસપાસનો કોઝાક ક્રમ (Kozak sequence) પ્રોટીન સંશ્લેષણની કાર્યક્ષમતા વધારે છે, પરંતુ તેની ગેરહાજરીમાં પણ પ્રોટીન સંશ્લેષણ શરૂ થઈ શકે છે.\n(4) જો mRNAમાં સ્ટાર્ટ કોડોન AUGની જગ્યાએ CUG હોય, તો તે પ્રોટીન સંશ્લેષણ શરૂ કરવા માટે સક્ષમ નથી કારણ કે તે કોઈપણ એમાઇનો એસિડ માટેનો કોડોન નથી.", "opts": ["વિધાન (1), (2) અને (3) સાચાં છે, પરંતુ (4) ખોટું છે", "વિધાન (1) અને (3) સાચાં છે, પરંતુ (2) અને (4) ખોટાં છે", "વિધાન (2) અને (3) સાચાં છે, પરંતુ (1) અને (4) ખોટાં છે", "વિધાન (1), (2), (3) અને (4) બધાં જ સાચાં છે"], "ans": 2, "exp": "\n- વિધાન (1) ખોટું છે કારણ કે મિથિયોનાઇન માટેનો કોડોન માત્ર AUG જ નથી, પરંતુ પ્રોકેરિયોટિક કોષોમાં પ્રારંભિક મિથિયોનાઇન માટે fMet (ફોર્મિલમિથિયોનાઇન)નો ઉપયોગ થાય છે અને કેટલાક કિસ્સામાં GUG અને UUG પણ સ્ટાર્ટ કોડોન તરીકે કાર્ય કરી શકે છે.\n- વિધાન (2) સાચું છે કારણ કે કેટલાક પ્રોકેરિયોટિક કોષોમાં GUG અને UUG પણ સ્ટાર્ટ કોડોન તરીકે કાર્ય કરી શકે છે.\n- વિધાન (3) સાચું છે કારણ કે યુકેરિયોટિક કોષોમાં કોઝાક ક્રમ પ્રોટીન સંશ્લેષણની કાર્યક્ષમતા વધારે છે, પરંતુ તેની ગેરહાજરીમાં પણ પ્રોટીન સંશ્લેષણ શરૂ થઈ શકે છે.\n- વિધાન (4) ખોટું છે કારણ કે CUG એ લ્યુસિન માટેનો કોડોન છે અને તે કોઈપણ સંજોગોમાં સ્ટાર્ટ કોડોન તરીકે કાર્ય કરી શકતો નથી, પરંતુ તે એમાઇનો એસિડ માટેનો કોડોન તો છે જ.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ભિન્નતાના આણ્વિક આધાર", "ch": ""}, {"q": "યુકેરિયોટિક કોષોમાં, સ્ટાર્ટ કોડોન AUGની ઓળખ કરવા માટે કયા રાઇબોઝોમલ ઉપ-એકમની ભૂમિકા મહત્વપૂર્ણ છે અને તે કેવી રીતે કાર્ય કરે છે?", "opts": ["રાઇબોઝોમલ 40S ઉપ-એકમ eIF2-GTP-Met-tRNAi કોમ્પ્લેક્સ સાથે જોડાઈને AUGની ઓળખ કરે છે", "રાઇબોઝોમલ 60S ઉપ-એકમ mRNAની સેકન્ડરી સ્ટ્રક્ચરને ઓળખીને AUG શોધે છે", "રાઇબોઝોમલ 50S ઉપ-એકમ 16S rRNA દ્વારા AUG સાથે જોડાણ કરે છે", "રાઇબોઝોમલ 30S ઉપ-એકમ શાઇન-ડેલગાર્નો ક્રમ સાથે જોડાઈને AUG ઓળખે છે"], "ans": 0, "exp": "સાચો વિકલ્પ A છે. યુકેરિયોટિક કોષોમાં, 40S રાઇબોઝોમલ ઉપ-એકમ eIF2-GTP-Met-tRNAi કોમ્પ્લેક્સ સાથે જોડાઈને mRNA પરના AUG સ્ટાર્ટ કોડોનની ઓળખ કરે છે. વિકલ્પ B ખોટો છે કારણ કે 60S ઉપ-એકમ mRNAની સેકન્ડરી સ્ટ્રક્ચરને ઓળખતું નથી. વિકલ્પ C પ્રોકેરિયોટિક કોષો માટે સાચો છે, જ્યાં 30S ઉપ-એકમ 16S rRNA દ્વારા AUG ઓળખે છે. વિકલ્પ D પણ પ્રોકેરિયોટિક કોષો માટે સાચો છે, જ્યાં 30S ઉપ-એકમ શાઇન-ડેલગાર્નો ક્રમ સાથે જોડાઈને AUG ઓળખે છે.", "ref": "Std 12 - અધ્યાય 6: જનીન અભિવ્યક્તિ અને જનીન નિયમન", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન સ્ટાર્ટ કોડોન AUG વિશે ખોટું છે?", "opts": ["AUG કોડોન મિથિયોનાઇન એમાઇનો એસિડ માટે કોડ કરે છે", "પ્રોકેરિયોટિક કોષોમાં, AUG ઉપરાંત GUG અને UUG પણ સ્ટાર્ટ કોડોન તરીકે કાર્ય કરી શકે છે", "યુકેરિયોટિક કોષોમાં, AUG સ્ટાર્ટ કોડોન હંમેશા પ્રોટીન સંશ્લેષણની શરૂઆત કરે છે", "AUG કોડોન mRNA પર રાઇબોઝોમને બાંધવા માટે જરૂરી છે"], "ans": 2, "exp": "સાચો વિકલ્પ C છે કારણ કે યુકેરિયોટિક કોષોમાં, AUG સ્ટાર્ટ કોડોન હંમેશા પ્રોટીન સંશ્લેષણની શરૂઆત કરતું નથી. તેના માટે કોઝાક ક્રમ (Kozak sequence)ની હાજરી પણ જરૂરી છે. વિકલ્પ A સાચો છે કારણ કે AUG મિથિયોનાઇન માટે કોડ કરે છે. વિકલ્પ B સાચો છે કારણ કે પ્રોકેરિયોટિક કોષોમાં GUG અને UUG પણ સ્ટાર્ટ કોડોન તરીકે કાર્ય કરી શકે છે. વિકલ્પ D સાચો છે કારણ કે AUG કોડોન રાઇબોઝોમને બાંધવા માટે જરૂરી છે.", "ref": "Std 12 - અધ્યાય 6: જનીન અભિવ્યક્તિ અને જનીન નિયમન", "ch": ""}, {"q": "જો કોઈ mRNA અણુમાં સ્ટાર્ટ કોડોન AUGની આસપાસનો કોઝાક ક્રમ (5’-ACCAUGG-3’) બદલાઈને 5’-UCCAUGG-3’ થાય, તો શું થશે?", "opts": ["પ્રોટીન સંશ્લેષણની ક્ષમતા વધશે", "પ્રોટીન સંશ્લેષણની ક્ષમતા ઘટશે", "પ્રોટીન સંશ્લેષણની શરૂઆત AUGની જગ્યાએ UCC થી થશે", "પ્રોટીન સંશ્લેષણ સંપૂર્ણ રીતે બંધ થશે"], "ans": 1, "exp": "સાચો વિકલ્પ B છે. કોઝાક ક્રમ (5’-ACCAUGG-3’) રાઇબોઝોમને AUG સ્ટાર્ટ કોડોનની ઓળખ કરવામાં મદદ કરે છે. જો આ ક્રમ બદલાઈને 5’-UCCAUGG-3’ થાય, તો રાઇબોઝોમની ઓળખની ક્ષમતા ઘટશે, જેથી પ્રોટીન સંશ્લેષણની ક્ષમતા ઘટશે. વિકલ્પ A ખોટો છે કારણ કે કોઝાક ક્રમમાં ફેરફારથી ક્ષમતા ઘટશે નહીં કે વધશે. વિકલ્પ C ખોટો છે કારણ કે પ્રોટીન સંશ્લેષણની શરૂઆત હંમેશા AUG થી જ થાય છે. વિકલ્પ D ખોટો છે કારણ કે પ્રોટીન સંશ્લેષણ સંપૂર્ણ રીતે બંધ થતું નથી, પરંતુ ક્ષમતા ઘટે છે.", "ref": "Std 12 - અધ્યાય 6: જનીન અભિવ્યક્તિ અને જનીન નિયમન", "ch": ""}, {"q": "નીચેના પૈકી કયું કોમ્બિનેશન સ્ટાર્ટ કોડોન અને તેના સંબંધિત એમાઇનો એસિડની યોગ્ય જોડી છે?", "opts": ["AUG - વેલાઇન", "GUG - મિથિયોનાઇન", "UUG - લ્યુસીન", "CUG - આર્જિનાઇન"], "ans": 2, "exp": "સાચો વિકલ્પ C છે કારણ કે UUG કોડોન લ્યુસીન એમાઇનો એસિડ માટે કોડ કરે છે. વિકલ્પ A ખોટો છે કારણ કે AUG મિથિયોનાઇન માટે કોડ કરે છે, વેલાઇન માટે નહીં. વિકલ્પ B ખોટો છે કારણ કે GUG વેલાઇન માટે કોડ કરે છે, મિથિયોનાઇન માટે નહીં. વિકલ્પ D ખોટો છે કારણ કે CUG લ્યુસીન માટે કોડ કરે છે, આર્જિનાઇન માટે નહીં.", "ref": "Std 12 - અધ્યાય 6: જનીન અભિવ્યક્તિ અને જનીન નિયમન", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લઈને સાચો વિકલ્પ પસંદ કરો: (1) પ્રોકેરિયોટિક કોષોમાં, સ્ટાર્ટ કોડોન AUG ઉપરાંત GUG અને UUG પણ પ્રોટીન સંશ્લેષણની શરૂઆત કરી શકે છે. (2) યુકેરિયોટિક કોષોમાં, સ્ટાર્ટ કોડોન AUGની ઓળખ માટે કોઝાક ક્રમ જરૂરી છે. (3) AUG કોડોન હંમેશા મિથિયોનાઇન એમાઇનો એસિડ માટે કોડ કરે છે.", "opts": ["ફક્ત (1) અને (2) સાચા છે", "ફક્ત (2) અને (3) સાચા છે", "ફક્ત (1) અને (3) સાચા છે", "(1), (2), અને (3) બધા સાચા છે"], "ans": 0, "exp": "સાચો વિકલ્પ A છે. વિધાન (1) સાચું છે કારણ કે પ્રોકેરિયોટિક કોષોમાં GUG અને UUG પણ સ્ટાર્ટ કોડોન તરીકે કાર્ય કરી શકે છે. વિધાન (2) સાચું છે કારણ કે યુકેરિયોટિક કોષોમાં કોઝાક ક્રમ AUGની ઓળખ માટે જરૂરી છે. વિધાન (3) ખોટું છે કારણ કે AUG કોડોન મિથિયોનાઇન માટે કોડ કરે છે, પરંતુ પ્રોકેરિયોટિક કોષોમાં GUG અને UUG પણ સ્ટાર્ટ કોડોન તરીકે કાર્ય કરે છે, જેથી AUG હંમેશા મિથિયોનાઇન માટે કોડ કરતું નથી.", "ref": "Std 12 - અધ્યાય 6: જનીન અભિવ્યક્તિ અને જનીન નિયમન", "ch": ""}, {"q": "યુકેરિયોટિક કોષોમાં, સ્ટાર્ટ કોડોન AUGની ઓળખ કરવા માટે રાઇબોઝોમલ સબયુનિટ eIF4Eની ભૂમિકા શું છે?", "opts": ["તે mRNAના 5’ કેપ સાથે જોડાઈને function renderQ(){

  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
