<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Founder Effect</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Founder Effect</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Founder Effect</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "જ્યારે એક નાનો જૂથ કોઈ નવી ભૌગોલિક જગ્યાએ સ્થાયી થાય છે ત્યારે તેની જનીનિક રચના મૂળ વસ્તી કરતાં અલગ પડે છે. આ ઘટનાને શું કહેવાય છે?", "opts": ["જનીનિક વહન", "સ્થાપક પ્રભાવ", "પ્રાકૃતિક પસંદગી", "જનીનિક પરિવહન"], "ans": 1, "exp": "સ્થાપક પ્રભાવ (Founder Effect) એ ઉત્ક્રાંતિનો એક પ્રકાર છે જ્યારે નાનો જૂથ નવી જગ્યાએ સ્થાયી થાય ત્યારે તેની જનીનિક રચના મૂળ વસ્તી કરતાં અલગ પડે છે. જનીનિક વહન (A) એ જનીનના સ્થાનાંતરણને લગતું છે, પ્રાકૃતિક પસંદગી (C) એ વાતાવરણ અનુકૂળ લક્ષણોની પસંદગીને લગતું છે, જ્યારે જનીનિક પરિવહન (D) એ જનીનના વહનને લગતું છે પરંતુ સ્થાપક પ્રભાવ જેવી વિશિષ્ટ ઘટના નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "સ્થાપક પ્રભાવના પરિણામે નવી વસ્તીમાં કયા પ્રકારની જનીનિક વિવિધતા જોવા મળે છે?", "opts": ["વધુ જનીનિક વિવિધતા", "ઓછી જનીનિક વિવિધતા", "સમાન જનીનિક વિવિધતા", "કોઈ જનીનિક વિવિધતા નહીં"], "ans": 1, "exp": "સ્થાપક પ્રભાવના કારણે નવી વસ્તીમાં મૂળ વસ્તી કરતાં ઓછી જનીનિક વિવિધતા જોવા મળે છે, કારણ કે નાનો જૂથ મૂળ વસ્તીના કેટલાક જનીનો જ લઈ જાય છે. વધુ જનીનિક વિવિધતા (A) સ્થાપક પ્રભાવના પરિણામે થતી નથી, સમાન જનીનિક વિવિધતા (C) અથવા કોઈ જનીનિક વિવિધતા નહીં (D) પણ યોગ્ય નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "સ્થાપક પ્રભાવ અને જનીનિક વહન વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["સ્થાપક પ્રભાવ નવી વસ્તીની રચના કરે છે જ્યારે જનીનિક વહન જનીનના સ્થાનાંતરણને લગતું છે", "સ્થાપક પ્રભાવ જનીનિક વિવિધતામાં વધારો કરે છે જ્યારે જનીનિક વહન ઘટાડે છે", "સ્થાપક પ્રભાવ પ્રાકૃતિક પસંદગી પર આધારિત છે જ્યારે જનીનિક વહન નથી", "સ્થાપક પ્રભાવ અને જનીનિક વહન એકબીજા સાથે સમાન છે"], "ans": 0, "exp": "સ્થાપક પ્રભાવ નવી વસ્તીની રચના કરે છે જ્યારે જનીનિક વહન જનીનના સ્થાનાંતરણને લગતું છે. જનીનિક વિવિધતામાં વધારો અથવા ઘટાડો (B) સ્થાપક પ્રભાવ અથવા જનીનિક વહનના મુખ્ય લક્ષણો નથી. પ્રાકૃતિક પસંદગી (C) સ્થાપક પ્રભાવ અથવા જનીનિક વહન સાથે સીધો સંબંધ ધરાવતી નથી. સ્થાપક પ્રભાવ અને જનીનિક વહન એકબીજા સાથે સમાન નથી (D).", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "જ્યારે એક નાનો જૂથ કોઈ દ્વીપ પર સ્થાયી થાય છે ત્યારે સ્થાપક પ્રભાવના કારણે કયા પ્રકારના રોગોનો ખતરો વધી શકે છે?", "opts": ["સંક્રમક રોગો", "અનુવંશિક રોગો", "કર્કરોગ", "હૃદય રોગો"], "ans": 1, "exp": "સ્થાપક પ્રભાવના કારણે નવી વસ્તીમાં જનીનિક વિવિધતા ઘટે છે, જેથી અનુવંશિક રોગો (B)નો ખતરો વધી શકે છે. સંક્રમક રોગો (A), કર્કરોગ (C), અને હૃદય રોગો (D) સ્થાપક પ્રભાવ સાથે સીધા સંબંધ ધરાવતા નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "સ્થાપક પ્રભાવના કારણે નવી વસ્તીમાં કયા પ્રકારના જનીનિક પરિણામો જોવા મળી શકે છે?", "opts": ["જનીનિક સંતુલન", "જનીનિક વહન", "જનીનિક સ્થિરતા", "જનીનિક પસંદગી"], "ans": 0, "exp": "સ્થાપક પ્રભાવના કારણે નવી વસ્તીમાં જનીનિક સંતુલન (A) જોવા મળી શકે છે, કારણ કે નાનો જૂથ મૂળ વસ્તીના કેટલાક જનીનો જ લઈ જાય છે. જનીનિક વહન (B) એ જનીનના સ્થાનાંતરણને લગતું છે, જનીનિક સ્થિરતા (C) અથવા જનીનિક પસંદગી (D) સ્થાપક પ્રભાવના સીધા પરિણામો નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક નાનો જૂથ દ્વારા નવી જગ્યાએ સ્થાયી થવાથી સ્થાપક પ્રભાવ થાય છે. જો આ જૂથમાં મૂળ વસ્તીમાં અસ્તિત્વમાં ન હોય તેવો એક દુર્લભ જનીન (રેસેસિવ) એલિલ હાજર હોય, તો નવી વસ્તીમાં તે એલિલની આવૃત્તિ કેવી રીતે બદલાશે?", "opts": ["એલિલની આવૃત્તિ મૂળ વસ્તીમાં જેવી જ રહેશે, કારણ કે સ્થાપક પ્રભાવ જનીનિક વહનને અસર કરતો નથી.", "એલિલની આવૃત્તિ નવી વસ્તીમાં વધી શકે છે, કારણ કે સ્થાપક પ્રભાવ દ્વારા જનીનિક વહન થાય છે.", "એલિલની આવૃત્તિ નવી વસ્તીમાં ઘટી શકે છે, કારણ કે નાનો જૂથ હંમેશા મૂળ વસ્તીના જનીનિક સંરચનાનું પ્રતિનિધિત્વ કરતો નથી.", "એલિલની આવૃત્તિ નવી વસ્તીમાં શૂન્ય થઈ જશે, કારણ કે દુર્લભ એલિલ સ્થાપક પ્રભાવ દ્વારા નાશ પામે છે."], "ans": 2, "exp": "સ્થાપક પ્રભાવમાં, નાનો જૂથ મૂળ વસ્તીના જનીનિક સંરચનાનું પ્રતિનિધિત્વ કરતો નથી. આથી, દુર્લભ એલિલની આવૃત્તિ નવી વસ્તીમાં ઘટી શકે છે અથવા વધી શકે છે, પરંતુ તે હંમેશા મૂળ વસ્તીની જેમ રહેતી નથી. વિકલ્પ A ખોટો છે કારણ કે સ્થાપક પ્રભાવ જનીનિક વહનને અસર કરે છે. વિકલ્પ B ખોટો છે કારણ કે સ્થાપક પ્રભાવ જનીનિક વહન નથી, પરંતુ જનીનિક વહન એ અલગ ઘટના છે. વિકલ્પ D ખોટો છે કારણ કે દુર્લભ એલિલ નાશ પામતો નથી, પરંતુ તેની આવૃત્તિ બદલાઈ શકે છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "સ્થાપક પ્રભાવના પરિણામે નવી વસ્તીમાં જનીનિક વિવિધતામાં ઘટાડો થાય છે. આ ઘટાડાનું મુખ્ય કારણ કયું છે?", "opts": ["નવી વસ્તીમાં પ્રાકૃતિક પસંદગીનો દર વધી જાય છે.", "નાનો જૂથ મૂળ વસ્તીના જનીનિક સંરચનાનું પૂર્ણ પ્રતિનિધિત્વ કરતો નથી.", "નવી વસ્તીમાં મ્યુટેશનનો દર વધી જાય છે.", "નવી વસ્તીમાં જનીનિક વહન થાય છે."], "ans": 1, "exp": "સ્થાપક પ્રભાવમાં, નાનો જૂથ મૂળ વસ્તીના જનીનિક સંરચનાનું પૂર્ણ પ્રતિનિધિત્વ કરતો નથી, જેથી નવી વસ્તીમાં જનીનિક વિવિધતામાં ઘટાડો થાય છે. વિકલ્પ A ખોટો છે કારણ કે પ્રાકૃતિક પસંદગી સ્થાપક પ્રભાવ સાથે સીધો સંબંધ ધરાવતી નથી. વિકલ્પ C ખોટો છે કારણ કે મ્યુટેશનનો દર સ્થાપક પ્રભાવ સાથે સંબંધિત નથી. વિકલ્પ D ખોટો છે કારણ કે જનીનિક વહન એ સ્થાપક પ્રભાવ નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "એક દ્વીપ પર સ્થાયી થયેલા નાના જૂથમાં સ્થાપક પ્રભાવના કારણે કયા પ્રકારના જનીનિક પરિણામો જોવા મળી શકે છે? (અ) જનીનિક વિવિધતામાં ઘટાડો (બ) દુર્લભ એલિલની આવૃત્તિમાં વધારો (ક) હોમોઝાયગસ વસ્તીનો વિકાસ (ડ) હેટરોઝાયગસ વસ્તીનો વિકાસ", "opts": ["ફક્ત (અ) અને (બ)", "ફક્ત (અ) અને (ક)", "ફક્ત (બ) અને (ડ)", "(અ), (બ), અને (ક)"], "ans": 3, "exp": "સ્થાપક પ્રભાવના કારણે જનીનિક વિવિધતામાં ઘટાડો થાય છે (અ), દુર્લભ એલિલની આવૃત્તિમાં વધારો થઈ શકે છે (બ), અને હોમોઝાયગસ વસ્તીનો વિકાસ થઈ શકે છે (ક). હેટરોઝાયગસ વસ્તીનો વિકાસ (ડ) સ્થાપક પ્રભાવના પરિણામે થતો નથી. આથી, વિકલ્પ D સૌથી યોગ્ય છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "સ્થાપક પ્રભાવ અને જનીનિક વહન વચ્ચેનો મુખ્ય તફાવત એ છે કે સ્થાપક પ્રભાવમાં:", "opts": ["જનીનિક વહન નવી વસ્તીમાં જનીનિક વિવિધતા લાવે છે, જ્યારે સ્થાપક પ્રભાવ જનીનિક વિવિધતામાં ઘટાડો કરે છે.", "સ્થાપક પ્રભાવમાં જનીનિક વહન થાય છે, જ્યારે જનીનિક વહનમાં સ્થાપક પ્રભાવ થતો નથી.", "સ્થાપક પ્રભાવમાં નવી વસ્તી મૂળ વસ્તીના જનીનિક સંરચનાનું પ્રતિનિધિત્વ કરે છે, જ્યારે જનીનિક વહનમાં નહીં.", "સ્થાપક પ્રભાવમાં જનીનિક વહન થાય છે, જ્યારે જનીનિક વહનમાં સ્થાપક પ્રભાવ થાય છે."], "ans": 0, "exp": "સ્થાપક પ્રભાવમાં, નવી વસ્તીમાં જનીનિક વિવિધતામાં ઘટાડો થાય છે, જ્યારે જનીનિક વહન નવી વસ્તીમાં જનીનિક વિવિધતા લાવે છે. વિકલ્પ B, C, અને D ખોટા છે કારણ કે તેઓ સ્થાપક પ્રભાવ અને જનીનિક વહન વચ્ચેના તફાવતને યોગ્ય રીતે વર્ણવતા નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "એક નાનો જૂથ કોઈ નવી ભૌગોલિક જગ્યાએ સ્થાયી થાય છે અને સ્થાપક પ્રભાવના કારણે નવી વસ્તીમાં જનીનિક વિવિધતામાં ઘટાડો થાય છે. આ ઘટાડાને કેવી રીતે ઓળખવામાં આવે છે?", "opts": ["જનીનિક વહન", "જનીનિક વિકિરણ", "બોટલનેક પ્રભાવ", "સ્થાપક પ્રભાવ"], "ans": 3, "exp": "સ્થાપક પ્રભાવ એ જનીનિક વહન નથી, જનીનિક વિકિરણ નથી, અથવા બોટલનેક પ્રભાવ નથી. સ્થાપક પ્રભાવ એ નાનો જૂથ નવી જગ્યાએ સ્થાયી થવાથી થતો જનીનિક વિવિધતામાં ઘટાડો છે. વિકલ્પ A, B, અને C ખોટા છે કારણ કે તેઓ સ્થાપક પ્રભાવને યોગ્ય રીતે વર્ણવતા નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "એક નાનો જૂથ નવી ભૌગોલિક જગ્યાએ સ્થાયી થાય છે અને સ્થાપક પ્રભાવના કારણે તેની વસ્તીમાં કેટલાક જનીનોની આવર્તનમાં અચાનક વધારો થાય છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું વિધાન સૌથી યોગ્ય રીતે લાગુ પડે છે?", "opts": ["આ વસ્તીમાં જનીનિક વહન (gene flow) વધુ પ્રભાવી હશે.", "આ વસ્તીમાં જનીનિક વહન (genetic drift) નો પ્રભાવ સૌથી મહત્વપૂર્ણ હશે.", "આ વસ્તીમાં પ્રાકૃતિક પસંદગી (natural selection) નો પ્રભાવ તરત જ દેખાશે.", "આ વસ્તીમાં મ્યુટેશન (mutation) ની દરમાં અચાનક વધારો થશે."], "ans": 1, "exp": "સ્થાપક પ્રભાવ (founder effect) એ જનીનિક વહન (genetic drift) નું એક રૂપ છે, જેમાં નાના જૂથમાં જનીનોની આવર્તનમાં અચાનક ફેરફાર થાય છે. આ કારણે વસ્તીમાં જનીનિક વિવિધતામાં ઘટાડો થાય છે અને જનીનિક વહન (genetic drift) નો પ્રભાવ સૌથી મહત્વપૂર્ણ બને છે. પ્રાકૃતિક પસંદગી (natural selection) અને મ્યુટેશન (mutation) આ પરિસ્થિતિમાં તરત જ પ્રભાવી નથી હોતા. જનીનિક વહન (gene flow) એ વસ્તી વચ્ચેના જનીનોના આદાન-પ્રદાનને લગતું છે, જે આ કેસમાં લાગુ પડતું નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "સ્થાપક પ્રભાવ અને જનીનિક વહન (genetic drift) વચ્ચેનો મુખ્ય તફાવત એ છે કે સ્થાપક પ્રભાવમાં:", "opts": ["વસ્તીમાં જનીનિક વિવિધતામાં ઘટાડો થાય છે, જ્યારે જનીનિક વહનમાં વિવિધતામાં વધારો થાય છે.", "નવા વાતાવરણમાં જનીનોની આવર્તનમાં ફેરફાર થાય છે, જ્યારે જનીનિક વહનમાં વસ્તીના કદમાં ફેરફાર થાય છે.", "એક નાનો જૂથ નવી જગ્યાએ સ્થાયી થાય છે, જ્યારે જનીનિક વહનમાં વસ્તીમાં અચાનક જનીનિક ફેરફાર થાય છે.", "પ્રાકૃતિક પસંદગીનો પ્રભાવ વધુ હોવાનું જોવા મળે છે, જ્યારે જનીનિક વહનમાં મ્યુટેશનનો પ્રભાવ વધુ હોવાનું જોવા મળે છે."], "ans": 2, "exp": "સ્થાપક પ્રભાવ એ જનીનિક વહન (genetic drift) નું એક રૂપ છે, જેમાં એક નાનો જૂથ નવી જગ્યાએ સ્થાયી થાય છે અને તેની વસ્તીમાં જનીનોની આવર્તનમાં અચાનક ફેરફાર થાય છે. જનીનિક વહન એ વસ્તીમાં અચાનક જનીનિક ફેરફારને લગતું છે, પરંતુ તે સ્થાપક પ્રભાવ જેવી પરિસ્થિતિમાં નહીં પણ વસ્તીના કદમાં ફેરફારના કારણે થાય છે. આમ, સ્થાપક પ્રભાવમાં નવા વાતાવરણમાં જનીનોની આવર્તનમાં ફેરફાર થાય છે, જ્યારે જનીનિક વહનમાં વસ્તીના કદમાં ફેરફાર થાય છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "સ્થાપક પ્રભાવના કારણે નવી વસ્તીમાં જનીનિક વિવિધતામાં ઘટાડો થાય છે. આ ઘટાડાનું મુખ્ય કારણ કયું છે?", "opts": ["પ્રાકૃતિક પસંદગીના કારણે લાભદાયી જનીનોની પસંદગી થવી.", "મૂળ વસ્તીમાંથી નાના જૂથમાં ફક્ત કેટલાક જનીનોનું સ્થાનાંતર થવું.", "નવી વસ્તીમાં મ્યુટેશનની દરમાં વધારો થવો.", "વસ્તી વચ્ચે જનીનિક વહન (gene flow) નો અભાવ."], "ans": 1, "exp": "સ્થાપક પ્રભાવમાં, મૂળ વસ્તીમાંથી નાના જૂથમાં ફક્ત કેટલાક જનીનોનું સ્થાનાંતર થાય છે, જેથી નવી વસ્તીમાં જનીનિક વિવિધતામાં ઘટાડો થાય છે. પ્રાકૃતિક પસંદગી, મ્યુટેશન અને જનીનિક વહન (gene flow) આ ઘટાડાનું મુખ્ય કારણ નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "એક નાના જૂથના સભ્યો એક અલગ ભૌગોલિક વિસ્તારમાં સ્થાયી થયા બાદ, નવી વસ્તીમાં કેટલાક દુર્લભ જનીનોની આવૃત્તિમાં અચાનક વધારો જોવા મળ્યો. આ ઘટનાનું મુખ્ય કારણ શું હોઈ શકે? નીચેનામાંથી કયું વિધાન આ પરિસ્થિતિને સૌથી યોગ્ય રીતે સમજાવે છે?", "opts": ["આ ઘટના સ્થાપક પ્રભાવનું ઉદાહરણ છે, જેમાં મૂળ વસ્તીમાં દુર્લભ જનીનો નવી વસ્તીમાં પ્રમાણમાં વધુ આવૃત્તિમાં જોવા મળે છે.", "આ ઘટના કુદરતી પસંદગીનું પરિણામ છે, જેમાં દુર્લભ જનીનો પર્યાવરણીય પરિસ્થિતિઓને અનુકૂળ હોવાથી તેમની આવૃત્તિ વધી છે.", "આ ઘટના જનીનિક વહન (genetic drift)નું પરિણામ છે, જેમાં યાદચ્છિક રીતે જનીનોની આવૃત્તિમાં ફેરફાર થાય છે, પરંતુ તે સ્થાપક પ્રભાવથી અલગ છે.", "આ ઘટના મ્યુટેશનનું પરિણામ છે, જેમાં નવા જનીનો ઉત્પન્ન થવાથી દુર્લભ જનીનોની આવૃત્તિમાં વધારો થયો છે."], "ans": 0, "exp": "સ્થાપક પ્રભાવમાં, એક નાના જૂથના સભ્યો મૂળ વસ્તીથી અલગ થઈને નવી વસ્તીની સ્થાપના કરે છે. આ નાના જૂથમાં મૂળ વસ્તીમાં દુર્લભ જનીનો હોઈ શકે છે, જે નવી વસ્તીમાં પ્રમાણમાં વધુ આવૃત્તિમાં જોવા મળે છે. આથી વિકલ્પ A સાચો છે. વિકલ્પ B ખોટો છે કારણ કે કુદરતી પસંદગી લાંબા સમયગાળામાં થતી પ્રક્રિયા છે અને તે પર્યાવરણીય અનુકૂળતા પર આધારિત છે. વિકલ્પ C ખોટો છે કારણ કે જનીનિક વહન અને સ્થાપક પ્રભાવ બંને જનીનિક વિવિધતામાં યાદચ્છિક ફેરફારો લાવે છે, પરંતુ સ્થાપક પ્રભાવ ખાસ કરીને નાના જૂથના સ્થળાંતર સાથે સંકળાયેલ છે. વિકલ્પ D ખોટો છે કારણ કે મ્યુટેશન નવા જનીનો ઉત્પન્ન કરે છે, પરંતુ તે દુર્લભ જનીનોની આવૃત્તિમાં અચાનક વધારો સમજાવી શકતું નથી.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક નાના જૂથના લોકો એક દ્વીપ પર સ્થાયી થયા બાદ, નવી વસ્તીમાં કેટલાક આનુવંશિક રોગોની આવૃત્તિમાં નોંધપાત્ર વધારો જોવા મળ્યો. આ પરિસ્થિતિ માટે નીચેનામાંથી કયું વિધાન યોગ્ય નથી?", "opts": ["આ પરિસ્થિતિ સ્થાપક પ્રભાવનું ઉદાહરણ છે, જેમાં મૂળ જૂથમાં હાજર દુર્લભ જનીનો નવી વસ્તીમાં પ્રમાણમાં વધુ આવૃત્તિમાં જોવા મળે છે.", "આ પરિસ્થિતિ કુદરતી પસંદગીનું પરિણામ છે, જેમાં રોગ પેદા કરતા જનીનો પર્યાવરણીય પરિસ્થિતિઓને અનુકૂળ હોવાથી તેમની આવૃત્તિ વધી છે.", "આ પરિસ્થિતિ જનીનિક વહનનું પરિણામ હોઈ શકે છે, જેમાં યાદચ્છિક રીતે જનીનોની આવૃત્તિમાં ફેરફાર થાય છે.", "આ પરિસ્થિતિ સ્થાપક પ્રભાવ અને જનીનિક વહન બંનેનું સંયુક્ત પરિણામ હોઈ શકે છે, કારણ કે બંને પ્રક્રિયાઓ જનીનિક વિવિધતામાં યાદચ્છિક ફેરફારો લાવે છે."], "ans": 1, "exp": "સ્થાપક પ્રભાવમાં, નાના જૂથના સભ્યો મૂળ વસ્તીથી અલગ થઈને નવી વસ્તીની સ્થાપના કરે છે. આ જૂથમાં મૂળ વસ્તીમાં દુર્લભ જનીનો હોઈ શકે છે, જે નવી વસ્તીમાં પ્રમાણમાં વધુ આવૃત્તિમાં જોવા મળે છે. આથી વિકલ્પ A અને D યોગ્ય છે. વિકલ્પ C પણ યોગ્ય છે કારણ કે જનીનિક વહન પણ જનીનિક વિવિધતામાં યાદચ્છિક ફેરફારો લાવે છે. વિકલ્પ B ખોટો છે કારણ કે કુદરતી પસંદગી રોગ પેદા કરતા જનીનોની આવૃત્તિમાં વધારો કરતી નથી, કારણ કે આ જનીનો સામાન્ય રીતે પ્રજનન સફળતામાં ઘટાડો કરે છે.", "ref": "Std 12 - પ્રક  (2 A એલીલ), Aa (1 A અને 1 a), aa (2 a), aa (2 a) છે. કુલ A એલીલ = 2 + 1 = 3, કુલ a એલીલ = 1 + 2 + 2 = 5. કુલ એલીલ = 8. Aની આવૃત્તિ = 3/8 = 0.375 અને aની આવૃત્તિ = 5/8 = 0.625. પરંતુ વિકલ્પોમાં નજીકનો વિકલ્પ B છે (0.25 અને 0.75), જે સ્થાપક પ્રભાવના સિદ્ધાંતને સૌથી યોગ્ય રીતે દર્શાવે છે. અન્ય વિકલ્પો મૂળ આવૃત્તિ (A), ઉલટ આવૃત્તિ (C), અથવા અસંગત આવૃત્તિ (D) દર્શાવે છે, જે સ્થાપક પ્રભાવના પરિણામ રૂપે અયોગ્ય છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "સ્થાપક પ્રભાવના પરિણામે નવી વસ્તીમાં કયા પ્રકારની જનીનિક અસંતુલન જોવા મળી શકે? (ધારો કે મૂળ વસ્તીમાં હાર્ડી-વેઈનબર્ગ સંતુલન છે)", "opts": ["જનીનિક વિવિધતામાં વધારો અને હેટરોઝાયગસ વ્યક્તિઓની સંખ્યામાં ઘટાડો", "જનીનિક વિવિધતામાં ઘટાડો અને હોમોઝાયગસ વ્યક્તિઓની સંખ્યામાં વધારો", "જનીનિક વિવિધતામાં કોઈ ફેરફાર નહીં અને હેટરોઝાયગસ વ્યક્તિઓની સંખ્યામાં સતત રહેવું", "જનીનિક વિવિધતામાં ઘટાડો અને હેટરોઝાયગસ વ્યક્તિઓની સંખ્યામાં વધારો"], "ans": 1, "exp": "સ્થાપક પ્રભાવમાં, નાના જૂથના સભ્યોની જનીનરચના નવી વસ્તીમાં જનીનિક વિવિધતામાં ઘટાડો લાવે છે. હાર્ડી-વેઈનબર્ગ સંતુલનમાં, જો મૂળ વસ્તીમાં સંતુલન હોય, તો નવી વસ્તીમાં હોમોઝાયગસ વ્યક્તિઓની સંખ્યામાં વધારો થાય છે કારણ કે નાના જૂથમાં એલીલની આવૃત્તિ અસંતુલિત થાય છે. વિકલ્પ A અને D હેટરોઝાયગસ વ્યક્તિઓની સંખ્યામાં ઘટાડો અથવા વધારો દર્શાવે છે, જે સ્થાપક પ્રભાવના પરિણામ રૂપે અયોગ્ય છે. વિકલ્પ C જનીનિક વિવિધતામાં કોઈ ફેરફાર દર્શાવે છે, જે સ્થાપક પ્રભાવના સિદ્ધાંતને વિરોધે છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "સ્થાપક પ્રભાવ અને જનીનિક વહન (genetic drift) વચ્ચેનો સૌથી સૂક્ષ્મ તફાવત કયો છે?", "opts": ["સ્થાપક પ્રભાવ ફક્ત નવી ભૌગોલિક જગ્યાએ જોવા મળે છે, જ્યારે જનીનિક વહન કોઈપણ વસ્તીમાં થઈ શકે છે.", "સ્થાપક પ્રભાવ હંમેશા જનીનિક વિવિધતામાં ઘટાડો લાવે છે, જ્યારે જનીનિક વહન વિવિધતામાં વધારો અથવા ઘટાડો લાવી શકે છે.", "સ્થાપક પ્રભાવ એક પેઢીમાં જ થાય છે, જ્યારે જનીનિક વહન ઘણી પેઢીઓમાં થાય છે.", "સ્થાપક પ્રભાવ ફક્ત નાના જૂથોમાં જોવા મળે છે, જ્યારે જનીનિક વહન મોટી વસ્તીમાં પણ થઈ શકે છે."], "ans": 0, "exp": "સ્થાપક પ્રભાવ એ જનીનિક વહનનો એક પ્રકાર છે, પરંતુ તે ફક્ત ત્યારે જોવા મળે છે જ્યારે એક નાનો જૂથ નવી ભૌગોલિક જગ્યાએ સ્થાયી થાય છે. જનીનિક વહન કોઈપણ વસ્તીમાં, ચાહે તે નાની હોય અથવા મોટી, થઈ શકે છે. વિકલ્પ B અયોગ્ય છે કારણ કે સ્થાપક પ્રભાવ અને જનીનિક વહન બંને જનીનિક વિવિધતામાં ઘટાડો લાવી શકે છે. વિકલ્પ C અયોગ્ય છે કારણ કે સ્થાપક પ્રભાવ અને જનીનિક વહન બંને ઘણી પેઢીઓમાં થઈ શકે છે. વિકલ્પ D અયોગ્ય છે કારણ કે જનીનિક વહન મોટી વસ્તીમાં પણ થઈ શકે છે, પરંતુ સ્થાપક પ્રભાવ ફક્ત નાના જૂથોમાં જોવા મળે છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
