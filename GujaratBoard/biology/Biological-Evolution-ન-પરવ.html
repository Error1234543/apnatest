<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biological Evolution ના પુરાવા</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Biological Evolution ના પુરાવા</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Biological Evolution ના પુરાવા</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "માનવ અને ચિમ્પાન્ઝીના હિમોગ્લોબિનના એમિનો એસિડ ક્રમમાં માત્ર એક જ એમિનો એસિડનો તફાવત જોવા મળે છે. આ તથ્ય ઉત્ક્રાંતિના કયા પુરાવા સાથે સીધો સંબંધ ધરાવે છે?", "opts": ["અવશિષ્ટ અંગોના પુરાવા", "આણ્વિક પુરાવા", "ભૂસ્તરીય પુરાવા", "ભ્રૂણવિજ્ઞાનના પુરાવા"], "ans": 1, "exp": "આ પ્રશ્નમાં આપેલ તથ્ય પ્રોટીનના એમિનો એસિડ ક્રમના તફાવત પર આધારિત છે, જે ઉત્ક્રાંતિના આણ્વિક પુરાવા (Molecular Evidence) સાથે સીધો સંબંધ ધરાવે છે. અવશિષ્ટ અંગો શારીરિક રચનાને લગતા પુરાવા છે, ભૂસ્તરીય પુરાવા જીવાશ્મ પર આધારિત છે, અને ભ્રૂણવિજ્ઞાનના પુરાવા ગર્ભના વિકાસના તબક્કાઓ સાથે સંબંધિત છે. તેથી સાચો જવાબ B છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું ઉદાહરણ ઉત્ક્રાંતિના 'સમમૂલક અંગો' (Analogous Organs) ના પુરાવા તરીકે ગણી શકાય નહીં?", "opts": ["પક્ષી અને ચામાચીડિયાના પાંખ", "માછલી અને વ્હેલના ફિન્સ", "મનુષ્યના હાથ અને ચામાચીડિયાના પાંખ", "કીટક અને પક્ષીના પાંખ"], "ans": 0, "exp": "સમમૂલક અંગો (Analogous Organs) એવા અંગો છે જે સમાન કાર્ય કરે છે પરંતુ તેમનું ઉત્પત્તિ સ્થાન અલગ હોય છે. મનુષ્યના હાથ અને ચામાચીડિયાના પાંખ સમરૂપ અંગો (Homologous Organs) છે કારણ કે તેમનું ઉત્પત્તિ સ્થાન સમાન છે. બાકીના વિકલ્પો સમમૂલક અંગોના ઉદાહરણો છે. તેથી સાચો જવાબ C છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના ઉત્ક્રાંતિવાદ મુજબ, નીચેનામાંથી કયું વિધાન 'પ્રાકૃતિક પસંદગી' (Natural Selection) ના સિદ્ધાંતને સૌથી વધુ સ્પષ્ટ રીતે સમર્થન આપે છે?", "opts": ["બધા સજીવો વધુ સંતતિ ઉત્પન્ન કરે છે જે ટકી શકતા નથી", "સજીવોમાં વારસાગત ભિન્નતાઓ જોવા મળે છે", "જે સજીવો પર્યાવરણ સાથે વધુ અનુકૂલિત હોય છે તેઓ વધુ સંતતિ ઉત્પન્ન કરે છે", "સજીવોના લક્ષણો સમય સાથે બદલાતા રહે છે"], "ans": 2, "exp": "પ્રાકૃતિક પસંદગીનો સિદ્ધાંત એ છે કે જે સજીવો પર્યાવરણ સાથે વધુ અનુકૂલિત હોય છે તેઓ વધુ સંતતિ ઉત્પન્ન કરે છે અને તેમના લક્ષણો આગામી પેઢીમાં ટકી રહે છે. વિકલ્પ A, B અને D પ્રાકૃતિક પસંદગીના પૂર્વશરતો છે, પરંતુ વિકલ્પ C સીધો પ્રાકૃતિક પસંદગીનો સિદ્ધાંત સમજાવે છે. તેથી સાચો જવાબ C છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું ઉદાહરણ ઉત્ક્રાંતિના 'અવશિષ્ટ અંગો' (Vestigial Organs) ના પુરાવા તરીકે ગણી શકાય નહીં?", "opts": ["મનુષ્યમાં એપેન્ડિક્સ", "વ્હેલમાં પશ્ચ પગની હાડકીઓ", "સાપમાં શરીર પરના નાના નિષ્ક્રિય પગના અવશેષો", "પક્ષીઓમાં પાંખોની હાજરી"], "ans": 3, "exp": "અવશિષ્ટ અંગો એવા અંગો છે જે હવે કોઈ કાર્ય કરતા નથી પરંતુ પૂર્વજોમાં કાર્યરત હતા. પક્ષીઓમાં પાંખો સક્રિય અંગો છે જે ઉડવા માટે ઉપયોગી છે, તેથી તે અવશિષ્ટ અંગ નથી. બાકીના વિકલ્પો અવશિષ્ટ અંગોના ઉદાહરણો છે. તેથી સાચો જવાબ D છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક સંશોધનમાં જાણવા મળ્યું કે બે અલગ-અલગ પ્રજાતિઓના DNA ક્રમમાં 98% સમાનતા છે. આ તથ્ય ઉત્ક્રાંતિના કયા પ્રકારના પુરાવાને સમર્થન આપે છે?", "opts": ["ભ્રૂણવિજ્ઞાનના પુરાવા", "જીવાશ્મના પુરાવા", "આણ્વિક પુરાવા", "ભૌગોલિક વિતરણના પુરાવા"], "ans": 2, "exp": "DNA ક્રમની સમાનતા ઉત્ક્રાંતિના આણ્વિક પુરાવા (Molecular Evidence) સાથે સંબંધિત છે. ભ્રૂણવિજ્ઞાનના પુરાવા ગર્ભના વિકાસ સાથે, જીવાશ્મના પુરાવા પ્રાચીન સજીવોના અવશેષો સાથે, અને ભૌગોલિક વિતરણના પુરાવા સજીવોના વિતરણ સાથે સંબંધિત છે. તેથી સાચો જવાબ C છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન 'જીવાશ્મ પુરાવા' (Fossil Evidence) ની ઉત્ક્રાંતિ સાથે સંકળાયેલી મર્યાદા દર્શાવે છે?", "opts": ["જીવાશ્મો દ્વારા પ્રાચીન જીવોના અસ્તિત્વ અને તેમના શારીરિક બંધારણની માહિતી મળે છે.", "જીવાશ્મો દ્વારા ઉત્ક્રાંતિના ક્રમિક વિકાસની સ્પષ્ટ તસવીર મળે છે.", "જીવાશ્મો મૃત જીવોના અવશેષો હોવાથી તેમાં નરમ પેશીઓના પુરાવા મળતા નથી.", "જીવાશ્મો દ્વારા પ્રાણીઓ અને વનસ્પતિઓ વચ્ચેના સંક્રમણના પુરાવા મળે છે."], "ans": 2, "exp": "વિકલ્પ C સચોટ છે કારણ કે જીવાશ્મો મુખ્યત્વે કઠણ ભાગો (હાડકા, દાંત, લાકડા) જ મળી આવે છે, નરમ પેશીઓ જળવાય નહીં. વિકલ્પ A સચોટ છે પરંતુ મર્યાદા દર્શાવતો નથી. વિકલ્પ B અંશતઃ સચોટ છે પરંતુ જીવાશ્મો સંપૂર્ણ ક્રમિક વિકાસ દર્શાવતા નથી. વિકલ્પ D અસત્ય છે કારણ કે જીવાશ્મો પ્રાણી-વનસ્પતિ સંક્રમણના પુરાવા આપતા નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું જોડકું 'સંરચનાત્મક સમાનતા' (Structural Homology) ના પુરાવા તરીકે યોગ્ય નથી?", "opts": ["માનવના હાથ અને વ્હેલના પખના અસ્થિઓ", "કીટકના પાંખ અને પક્ષીના પાંખ", "માનવના કાનના અસ્થિઓ અને સરીસૃપના જડબાના અસ્થિઓ", "માનવના હૃદય અને કૂતરાના હૃદય"], "ans": 1, "exp": "વિકલ્પ B સચોટ નથી કારણ કે કીટકના પાંખ અને પક્ષીના પાંખ 'સમમૂલક અંગો' (Analogous Organs) છે, સંરચનાત્મક સમાનતા (Homology) નહીં. વિકલ્પ A, C, અને D સંરચનાત્મક સમાનતાના ઉદાહરણો છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન 'ભૌગોલિક વિતરણ' (Biogeographical Evidence) ના પુરાવા તરીકે ગણી શકાય નહીં?", "opts": ["ઓસ્ટ્રેલિયામાં માત્ર મર્સુપિયલ પ્રાણીઓ જોવા મળે છે.", "દક્ષિણ અમેરિકા અને આફ્રિકામાં સમાન પ્રકારના સસ્તન પ્રાણીઓ જોવા મળે છે.", "ગેલાપાગોસ ટાપુઓ પરના કાચબા અન્ય ટાપુઓના કાચબાથી ભિન્ન છે.", "ભારતમાં હિમાલયના ઉત્તર ભાગમાં અને યુરોપમાં સમાન પ્રકારના વનસ્પતિ જોવા મળે છે."], "ans": 2, "exp": "વિકલ્પ C સચોટ નથી કારણ કે ગેલાપાગોસ ટાપુઓ પરના કાચબા 'પ્રકરણીકરણ' (Adaptive Radiation) નું ઉદાહરણ છે, ભૌગોલિક વિતરણના પુરાવા તરીકે નહીં. વિકલ્પ A, B, અને D ભૌગોલિક વિતરણના પુરાવા તરીકે ગણી શકાય છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન 'ભ્રૂણીય વિકાસ' (Embryological Evidence) ના પુરાવા તરીકે સૌથી યોગ્ય છે?", "opts": ["માનવ અને ચિમ્પાન્ઝીના ભ્રૂણમાં ગળાના કોઠા (Pharyngeal Slits) જોવા મળે છે.", "માનવ અને કૂતરાના ભ્રૂણમાં પૂંછડી જોવા મળે છે.", "માનવ અને મચ્છરના ભ્રૂણમાં સમાન પ્રકારના અંગવિકાસ જોવા મળે છે.", "માનવ અને પક્ષીના ભ્રૂણમાં પાંખના અસ્થિઓ જોવા મળે છે."], "ans": 0, "exp": "વિકલ્પ A સચોટ છે કારણ કે માનવ અને ચિમ્પાન્ઝીના ભ્રૂણમાં ગળાના કોઠા (Pharyngeal Slits) જોવા મળે છે, જે ભ્રૂણીય સમાનતાનું સ્પષ્ટ ઉદાહરણ છે. વિકલ્પ B અંશતઃ સચોટ છે પરંતુ પૂંછડી માત્ર કૂતરામાં જોવા મળે છે. વિકલ્પ C અને D અસત્ય છે કારણ કે માનવ અને મચ્છર/પક્ષીના ભ્રૂણમાં સમાન અંગવિકાસ જોવા મળતો નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું જોડકું 'આણ્વિક પુરાવા' (Molecular Evidence) તરીકે ગણી શકાય નહીં?", "opts": ["માનવ અને ચિમ્પાન્ઝીના DNA ક્રમમાં 98% સમાનતા", "માનવ અને ગોરિલાના હિમોગ્લોબિનના એમિનો એસિડ ક્રમમાં સમાનતા", "માનવ અને કૂતરાના મિટોકોન્ડ્રિયલ DNAમાં સમાનતા", "માનવ અને વનસ્પતિના ક્લોરોપ્લાસ્ટ DNAમાં સમાનતા"], "ans": 3, "exp": "વિકલ્પ D સચોટ નથી કારણ કે માનવમાં ક્લોરોપ્લાસ્ટ DNA હાજર નથી, તેથી આ જોડકું આણ્વિક પુરાવા તરીકે ગણી શકાય નહીં. વિકલ્પ A, B, અને C આણ્વિક પુરાવાના ઉદાહરણો છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન 'ભ્રૂણીય પડદાઓ' (Embryonic Membranes) ના અભ્યાસ દ્વારા ઉત્ક્રાંતિના પુરાવા તરીકે સૌથી યોગ્ય રીતે સમજાવી શકાય છે?", "opts": ["સસ્તન પ્રાણીઓના ભ્રૂણમાં અમ્નિયોન, કોરિયોન અને એલન્ટોઈસ પડદાઓ જોવા મળે છે, જે સરીસૃપ અને પક્ષીઓમાં પણ જોવા મળે છે.", "માનવ ભ્રૂણમાં ગિલ સ્લિટ્સ (ગળાના છિદ્રો) જોવા મળે છે, જે મત્સ્યમાં શ્વસન માટે ઉપયોગી હોય છે.", "ભ્રૂણના વિકાસ દરમિયાન હૃદયના વિકાસના તબક્કાઓ સરખા હોય છે, પરંતુ પ્રૌઢ અવસ્થામાં અલગ પડે છે.", "ભ્રૂણમાં પૂંછડી જોવા મળે છે, જે માનવમાં વિકાસ પામતી નથી."], "ans": 0, "exp": "સસ્તન, સરીસૃપ અને પક્ષીઓના ભ્રૂણમાં અમ્નિયોન, કોરિયોન અને એલન્ટોઈસ પડદાઓ જોવા મળે છે, જે ઉત્ક્રાંતિ દરમિયાન સમાન પૂર્વજોમાંથી ઉદ્ભવ્યા હોવાનું સૂચવે છે. બાકીના વિકલ્પો ભ્રૂણીય વિકાસના પુરાવા તરીકે યોગ્ય છે, પરંતુ પડદાઓનો અભ્યાસ સૌથી સ્પષ્ટ પુરાવો પૂરો પાડે છે. B, C, D વિધાનો પણ ભ્રૂણીય પુરાવા છે, પરંતુ A વિધાન સૌથી સીધું અને સ્પષ્ટ છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું જોડકું 'આણ્વિક ઘડિયાળ' (Molecular Clock) ના સિદ્ધાંતને સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["DNA ક્રમમાં થતી પરિવર્તનની ગતિ સ્થિર હોય છે અને સમય સાથે સરખી રીતે ઘટે છે.", "પ્રોટીનના એમિનો એસિડ ક્રમમાં થતી ફેરફારોની ગતિ પ્રજાતિના કદ પર આધાર રાખે છે.", "RNA ક્રમમાં થતી પરિવર્તનની ગતિ પ્રજાતિના વાતાવરણ પર આધાર રાખે છે.", "જનીનમાં થતી પરિવર્તનની ગતિ પ્રજાતિના જીવનચક્ર પર આધાર રાખે છે."], "ans": 0, "exp": "'આણ્વિક ઘડિયાળ' ના સિદ્ધાંત મુજબ, DNA ક્રમમાં થતી પરિવર્તનની ગતિ સ્થિર હોય છે અને સમય સાથે સરખી રીતે ઘટે છે, જેનો ઉપયોગ પ્રજાતિઓ વચ્ચેના ઉત્ક્રાંતિક સમયને માપવા માટે થાય છે. B, C, D વિકલ્પો આ સિદ્ધાંતને યોગ્ય રીતે વર્ણવતા નથી, કારણ કે તેઓ પરિવર્તનની ગતિને અન્ય પરિબળો પર આધારિત ગણાવે છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન 'સંકર જીવ' (Hybrid Organisms) ના અભ્યાસ દ્વારા ઉત્ક્રાંતિના પુરાવા તરીકે ગણી શકાય નહીં?", "opts": ["લિગર (સિંહ + વાઘણ) અને મ્યુલ (ઘોડો + ગધેડો) જેવા સંકર જીવોનો અભ્યાસ ઉત્ક્રાંતિક સંબંધો સમજવામાં મદદ કરે છે.", "સંકર જીવોના અભ્યાસ દ્વારા પ્રજાતિઓ વચ્ચેના જનીનિક અંતરને માપી શકાય છે.", "સંકર જીવોના અભ્યાસ દ્વારા પ્રજાતિઓ વચ્ચેના શારીરિક લક્ષણોની સરખામણી કરી શકાય છે.", "સંકર જીવોના અભ્યાસ દ્વારા પ્રજાતિઓ વચ્ચેના વર્તણુકીય લક્ષણોની સરખામણી કરી શકાય છે."], "ans": 0, "exp": "લિગર અને મ્યુલ જેવા સંકર જીવોનો અભ્યાસ ઉત્ક્રાંતિક સંબંધો સમજવામાં મદદ કરે છે, પરંતુ આ સંકર જીવો પ્રજાતિઓ વચ્ચેના જનીનિક અંતર, શારીરિક લક્ષણો અથવા વર્તણુકીય લક્ષણોની સરખામણી માટે ઉપયોગી નથી. B, C, D વિકલ્પો સંકર જીવોના અભ્યાસ દ્વારા મેળવી શકાય તેવા પુરાવાઓ છે, પરંતુ A વિધાન સંપૂર્ણપણે ખોટું છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન 'જીવાશ્મ વનસ્પતિશાસ્ત્ર' (Paleobotany) ના અભ્યાસ દ્વારા ઉત્ક્રાંતિના પુરાવા તરીકે ગણી શકાય છે?", "opts": ["જીવાશ્મ વનસ્પતિઓના અભ્યાસ દ્વારા વનસ્પતિઓના ઉત્ક્રાંતિક ઇતિહાસને સમજી શકાય છે.", "જીવાશ્મ વનસ્પતિઓના અભ્યાસ દ્વારા પ્રાણીઓના ઉત્ક્રાંતિક ઇતિહાસને સમજી શકાય છે.", "જીવાશ્મ વનસ્પતિઓના અભ્યાસ દ્વારા માનવના ઉત્ક્રાંતિક ઇતિહાસને સમજી શકાય છે.", "જીવાશ્મ વનસ્પતિઓના અભ્યાસ દ્વારા પૃથ્વીના ભૌગોલિક ઇતિહાસને સમજી શકાય છે."], "ans": 0, "exp": "જીવાશ્મ વનસ્પતિશાસ્ત્રનો અભ્યાસ વનસ્પતિઓના ઉત્ક્રાંતિક ઇતિહાસને સમજવામાં મદદ કરે છે. B, C, D વિકલ્પો જીવાશ્મ વનસ્પતિશાસ્ત્રના અભ્યાસ સાથે સંકળાયેલા નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક સંશોધનમાં જાણવા મળ્યું કે માનવ અને ગરોળીના આંખના નેત્રપટલ (retina) માં રહેલા ઓપ્સિન પ્રોટીનના જનીન ક્રમમાં નોંધપાત્ર સમાનતા છે, જ્યારે માનવ અને ઓક્ટોપસના ઓપ્સિન પ્રોટીનના જનીન ક્રમમાં આ સમાનતા ખૂબ જ ઓછી જોવા મળે છે. આ અવલોકન ઉત્ક્રાંતિના કયા પુરાવાને સૌથી વધુ સમર્થન આપે છે?", "opts": ["સમમૂલક અંગો (Analogous Organs) ના પુરાવા", "સંરચનાત્મક સમાનતા (Structural Homology) ના પુરાવા", "આણ્વિક પુરાવા (Molecular Evidence) અને સમાન પૂર્વજ (Common Ancestry) નો ખ્યાલ", "સમાંતર ઉત્ક્રાંતિ (Parallel Evolution) ના પુરાવા"], "ans": 2, "exp": "આ પ્રશ્નમાં ઓપ્સિન પ્રોટીનના જનીન ક્રમની સમાનતા આણ્વિક પુરાવા તરીકે ગણી શકાય, જે સૂચવે છે કે માનવ અને ગરોળીના સમાન પૂર્વજ હતા. માનવ અને ઓક્ટોપસના ઓપ્સિન પ્રોટીનમાં ઓછી સમાનતા દર્શાવે છે કે તેમના ઉત્ક્રાંતિના માર્ગ અલગ હતા. આથી વિકલ્પ C સાચો છે. વિકલ્પ A ખોટો છે કારણ કે સમમૂલક અંગો કાર્યની સમાનતા પર આધારિત છે, સંરચનાની નહીં. વિકલ્પ B ખોટો છે કારણ કે સંરચનાત્મક સમાનતા અંગોની રચનામાં સમાનતા પર આધારિત છે, જનીન ક્રમ પર નહીં. વિકલ્પ D ખોટો છે કારણ કે સમાંતર ઉત્ક્રાંતિ એ સ્વતંત્ર રીતે સમાન લક્ષણોનો વિકાસ છે, જે આ કિસ્સામાં લાગુ પડતું નથી.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન 'અંતર્ગત સમાનતા' (Homology) અને 'બાહ્ય સમાનતા' (Analogy) વચ્ચેનો તફાવત સૌથી સ્પષ્ટપણે દર્શાવે છે?", "opts": ["પક્ષીઓના પાંખ અને ચામચીડિયાના પાંખ બંને ઉડવાના કામ માટે વિકસિત થયા છે, પરંતુ તેમની આંતરિક હાડકાની રચના અલગ છે.", "માનવના હાથ અને વ્હેલના પખના હાડકાની રચના સમાન છે, પરંતુ તેમનો ઉપયોગ અલગ છે.", "કીટકના પાંખ અને પક્ષીના પાંખ બંને ઉડવાના કામ માટે વિકસિત થયા છે, પરંતુ તેમની ઉત્પત્તિ અલગ છે.", "માનવના દાંત અને હાથીના દાંત બંને ખોરાક ચાવવા માટે વપરાય છે, પરંતુ તેમની રચના અલગ છે."], "ans": 1, "exp": "વિકલ્પ B સરળતાથી અંતર્ગત સમાનતા (Homology) દર્શાવે છે, કારણ કે માનવ અને વ્હેલના પખના હાડકાની રચના સમાન છે (સમમૂલક અંગો), પરંતુ તેમનો ઉપયોગ અલગ છે. વિકલ્પ A અને C બાહ્ય સમાનતા (Analogy) દર્શાવે છે, કારણ કે તેઓ સમાન કામ માટે વિકસિત થયા છે પરંતુ તેમની ઉત્પત્તિ અલગ છે. વિકલ્પ D અંતર્ગત અથવા બાહ્ય સમાનતાને સ્પષ્ટપણે દર્શાવતો નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "જીવાશ્મ અભ્યાસ દ્વારા ઉત્ક્રાંતિના પુરાવા મેળવવા માટે નીચેનામાંથી કયું ક્રમબદ્ધતા (Sequence) યોગ્ય છે?", "opts": ["સરળ → જટિલ → સરળ", "જટિલ → સરળ → જટિલ", "સરળ → જટિલ", "જટિલ → સરળ"], "ans": 2, "exp": "જીવાશ્મ અભ્યાસ દ્વારા ઉત્ક્રાંતિના પુરાવા મેળવવા માટે સરળ જીવો પછી જટિલ જીવોનો ક્રમ જોવા મળે છે. વિકલ્પ C સરળથી જટિલ તરફનો ક્રમ દર્શાવે છે, જે ઉત્ક્રાંતિના સિદ્ધાંત અનુસાર યોગ્ય છે. અન્ય વિકલ્પો ક્રમબદ્ધતાને યોગ્ય રીતે દર્શાવતા નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન 'ભ્રૂણીય વિકાસ' દ્વારા ઉત્ક્રાંતિના પુરાવા તરીકે ગણી શકાય નહીં?", "opts": ["માનવ ભ્રૂણમાં ગળાના ભાગે કલા (Gill slits) જોવા મળે છે.", "માનવ ભ્રૂણમાં પૂંછડી જોવા મળે છે.", "માનવ ભ્રૂણમાં હૃદયના વિકાસ દરમિયાન બે અલગ ચેમ્બર જોવા મળે છે.", "માનવ ભ્રૂણમાં મગજનો વિકાસ પૂર્ણ વિકસિત માનવ મગજ જેવો જોવા મળે છે."], "ans": 3, "exp": "વિકલ્પ D અયોગ્ય છે, કારણ કે માનવ ભ્રૂણમાં મગજનો વિકાસ પૂર્ણ વિકસિત માનવ મગજ જેવો જોવા મળતો નથી. ભ્રૂણીય વિકાસ દરમિયાન, મગજનો વિકાસ ધીમે ધીમે થાય છે. વિકલ્પ A, B, અને C ભ્રૂણીય વિકાસ દ્વારા ઉત્ક્રાંતિના પુરાવા તરીકે ગણી શકાય છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક સંશોધનમાં જાણવા મળ્યું કે માનવ અને પ્લેટિપસ (Platypus) ના દૂધ ઉત્પાદન સાથે સંકળાયેલા જનીનોમાં નોંધપાત્ર સમાનતા છે, જ્યારે બંને પ્રજાતિઓના પ્રજનન તંત્રમાં મૂળભૂત તફાવત છે. આ અવલોકન ઉત્ક્રાંતિના કયા પુરાવા માટે સૌથી વધુ સુસંગત છે?", "opts": ["સમમૂલક અંગો (Analogous Organs) ના પુરાવા", "આણ્વિક પુરાવા (Molecular Evidence) અને સમાન પૂર્વજતા (Common Ancestry)", "ભૌગોલિક વિતરણ (Biogeographical Evidence) ના પુરાવા", "અવશિષ્ટ અંગો (Vestigial Organs) ના પુરાવા"], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B છે કારણ કે માનવ અને પ્લેટિપસના દૂધ ઉત્પાદન સાથે સંકળાયેલા જનીનોમાં સમાનતા આણ્વિક પુરાવા દર્શાવે છે, જે સૂચવે છે કે બંને પ્રજાતિઓના સમાન પૂર્વજ હતા. આ જનીન સમાનતા બાહ્ય રચના કે કાર્યમાં તફાવત હોવા છતાં પણ જોવા મળે છે. વિકલ્પ A ખોટો છે કારણ કે સમમૂલક અંગો કાર્યમાં સમાનતા દર્શાવે છે, પરંતુ ઉત્પત્તિમાં નહીં. વિકલ્પ C ખોટો છે કારણ કે ભૌગોલિક વિતરણ પ્રજાતિઓના વિતરણ સાથે સંબંધિત છે, જનીન સમાનતા સાથે નહીં. વિકલ્પ D ખોટો છે કારણ કે અવશિષ્ટ અંગો એવા અંગો છે જે હવે કાર્યરહિત છે, જે આ કિસ્સામાં લાગુ પડતું નથી.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું ઉદાહરણ ઉત્ક્રાંતિના પુરાવા તરીકે 'આણ્વિક સમયગાળા' (Molecular Clock) ના સિદ્ધાંતની મર્યાદા દર્શાવે છે?", "opts": ["માનવ અને ગાયના સાયટોક્રોમ c પ્રોટીનના એમિનો એસિડ ક્રમમાં 10% તફાવત છે, જે સૂચવે છે કે બંને પ્રજાતિઓ લગભગ 80 મિલિયન વર્ષ પહેલાં અલગ થઈ હતી.", "એક જ પ્રજાતિના બે અલગ-અલગ વસ્તી સમૂહોમાં મિટોકોન્ડ્રીયલ DNA ના પરિવર્તન દરમાં નોંધપાત્ર તફાવત જોવા મળે છે, જે પર્યાવરણીય પરિબળોને કારણે છે.", "બેક્ટેરિયા અને આર્કિયામાં રાઇબોસોમલ RNA ના ક્રમમાં સમાનતા જોવા મળે છે, જે પ્રોકેરિયોટિક ઉત્પત્તિની સામાન્યતા દર્શાવે છે.", "માનવ અને ફળમાખીના હિસ્ટોન પ્રોટીનના એમિનો એસિડ ક્રમમાં લગભગ 90% સમાનતા છે, જે ઉત્ક્રાંતિના ઝડપી દરને સૂચવે છે."], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B છે કારણ કે આણ્વિક સમયગાળા (Molecular Clock) નો સિદ્ધાંત ધારે છે કે પરિવર્તનનો દર સમય સાથે સ્થિર રહે છે, પરંતુ જો એક જ પ્રજાતિના બે વસ્તી સમૂહોમાં પરિવર્તન દરમાં તફાવત હોય, તો તે આ સિદ્ધાંતની મર્યાદા દર્શાવે છે. વિકલ્પ A ખોટો છે કારણ કે તે આણ્વિક સમયગાળાના સિદ્ધાંતને સમર્થન આપે છે. વિકલ્પ C ખોટો છે કારણ કે તે આણ્વિક પુરાવા દર્શાવે છે, પરંતુ આણ્વિક સમયગાળાની મર્યાદા નહીં. વિકલ્પ D ખોટો છે કારણ કે હિસ્ટોન પ્રોટીનની સમાનતા ઉત્ક્રાંતિની ધીમી ગતિ દર્શાવે છે, જે આણ્વિક સમયગાળાના સિદ્ધાંત સાથે સુસંગત છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
