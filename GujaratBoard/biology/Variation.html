<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Variation</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Variation</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Variation</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "જ્યારે બે જુદા જુદા જાતિઓના સજીવો વચ્ચે સંયુગ્મન થાય છે ત્યારે ઉત્પન્ન થતી સંતતિમાં જોવા મળતી વિશિષ્ટ પ્રકારની વૈવિધ્યતા કયા પ્રકારની ગણવામાં આવે છે?", "opts": ["સંયોજક વૈવિધ્યતા", "સંકર વૈવિધ્યતા", "પર્યાવરણીય વૈવિધ્યતા", "જનીની વૈવિધ્યતા"], "ans": 1, "exp": "સંયુગ્મન બે જુદી જાતિઓ વચ્ચે થાય ત્યારે ઉત્પન્ન થતી સંતતિને સંકર કહેવાય છે, અને તેમાં જોવા મળતી વૈવિધ્યતાને સંકર વૈવિધ્યતા કહેવાય છે. સંયોજક વૈવિધ્યતા જનીનના નવા સંયોજનથી ઉત્પન્ન થાય છે, પર્યાવરણીય વૈવિધ્યતા પર્યાવરણના પરિબળોને કારણે થાય છે, અને જનીની વૈવિધ્યતા જનીનમાં થતા ફેરફારોને કારણે થાય છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વૈવિધ્યતા", "ch": ""}, {"q": "મેન્ડલના પ્રયોગોમાં F2 પેઢીમાં 3:1 નું ગુણોત્તર જોવા મળે છે, પરંતુ કેટલાક કિસ્સાઓમાં 9:3:3:1 નું ગુણોત્તર જોવા મળે છે. આ ફેરફારનો મુખ્ય કારણ કયો છે?", "opts": ["અપૂર્ણ પ્રભાવિતા", "સહ-પ્રભાવિતા", "સ્વતંત્ર વિતરણ", "જનીની સંયોજન"], "ans": 2, "exp": "9:3:3:1 નું ગુણોત્તર મેન્ડલના સ્વતંત્ર વિતરણના નિયમને કારણે જોવા મળે છે, જ્યારે બે જુદા જુદા લક્ષણોના જનીનો સ્વતંત્ર રીતે વિતરિત થાય છે. અપૂર્ણ પ્રભાવિતામાં 1:2:1 નું ગુણોત્તર જોવા મળે છે, સહ-પ્રભાવિતામાં 1:2:1 અથવા 9:3:3:1 નું ગુણોત્તર જોવા મળી શકે છે, પરંતુ સ્વતંત્ર વિતરણ એ જ મુખ્ય કારણ છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વૈવિધ્યતા", "ch": ""}, {"q": "કોઈ એક જાતિમાં જનીની વૈવિધ્યતા વધારવા માટે નીચેનામાંથી કયો પરિબળ સૌથી અસરકારક છે?", "opts": ["પ્રજનન દરમાં વધારો", "જનીની પરિવહન", "પ્રાકૃતિક પસંદગી", "પર્યાવરણીય ફેરફારો"], "ans": 2, "exp": "પ્રાકૃતિક પસંદગી એ જનીની વૈવિધ્યતા વધારવા માટે સૌથી અસરકારક પરિબળ છે, કારણ કે તે જીવિત રહેવા માટે અનુકૂળ લક્ષણો ધરાવતા સજીવોને પસંદ કરે છે, જ્યારે અન્ય પરિબળો જેમ કે પ્રજનન દર, જનીની પરિવહન, અને પર્યાવરણીય ફેરફારો પણ વૈવિધ્યતામાં ફાળો આપે છે, પરંતુ પ્રાકૃતિક પસંદગી એ સૌથી મહત્વપૂર્ણ છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયા કિસ્સામાં વૈવિધ્યતા ઉત્પન્ન થતી નથી?", "opts": ["અલૈંગિક પ્રજનન દ્વારા", "લૈંગિક પ્રજનન દ્વારા", "મ્યુટેશન દ્વારા", "જનીની પુનરાવર્તન દ્વારા"], "ans": 0, "exp": "અલૈંગિક પ્રજનન દ્વારા વૈવિધ્યતા ઉત્પન્ન થતી નથી, કારણ કે તેમાં માત્ર એક જ જીવના વંશજો ઉત્પન્ન થાય છે, જ્યારે લૈંગિક પ્રજનન, મ્યુટેશન, અને જનીની પુનરાવર્તન દ્વારા વૈવિધ્યતા ઉત્પન્ન થાય છે.", "ref": "Std 12 - અધ્યાય 1: પ્રજનન", "ch": ""}, {"q": "જ્યારે એક જ જનીનના બે એલિલ્સ વચ્ચે પૂર્ણ પ્રભાવિતા ન હોવાને કારણે મધ્યવર્તી લક્ષણ દેખાય છે, ત્યારે તેને કya કહેવાય છે?", "opts": ["સહ-પ્રભાવિતા", "અપૂર્ણ પ્રભાવિતા", "બહુ-એલિલીકતા", "પોલિજીની"], "ans": 1, "exp": "જ્યારે એક જ જનીનના બે એલિલ્સ વચ્ચે પૂર્ણ પ્રભાવિતા ન હોવાને કારણે મધ્યવર્તી લક્ષણ દેખાય છે, ત્યારે તેને અપૂર્ણ પ્રભાવિતા કહેવાય છે. સહ-પ્રભાવિતામાં બંને એલિલ્સ પોતપોતાના લક્ષણો દર્શાવે છે, બહુ-એલિલીકતામાં એક જ જનીનના બહુ એલિલ્સ હોય છે, અને પોલિજીનીમાં એક લક્ષણ પર બહુ જનીન અસર કરે છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વૈવિધ્યતા", "ch": ""}, {"q": "નીચેનામાંથી કયો પરિબળ વંશાવળીમાં વૈવિધ્યતા ઉત્પન્ન કરતો નથી, પરંતુ તેને જાળવી રાખે છે?", "opts": ["પરાગરજના અસમાન વિતરણથી થતી કોષવિભાજનની ત્રુટિ", "જનીનના સ્થાનાંતરણ (Translocation)", "સજીવો વચ્ચેના લૈંગિક પ્રજનન", "કોષવિભાજન દરમિયાન DNA નકલમાં થતી ભૂલો"], "ans": 2, "exp": "લૈંગિક પ્રજનન (C) વૈવિધ્યતા ઉત્પન્ન કરતું નથી, પરંતુ તેને જાળવી રાખે છે કારણ કે તે માતા-પિતા પાસેથી જનીનના નવા સંયોજનો બનાવે છે. પરાગરજના અસમાન વિતરણ (A) અને DNA નકલની ભૂલો (D) વૈવિધ્યતા ઉત્પન્ન કરે છે. જનીનના સ્થાનાંતરણ (B) પણ વૈવિધ્યતા ઉત્પન્ન કરે છે કારણ કે તે વર્ણસૂત્રના ટુકડાઓને ફેરવે છે.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વૈવિધ્યતા", "ch": ""}, {"q": "એક જાતિમાં જનીનની આનુવંશિક વૈવિધ્યતા વધારવા માટે નીચેનામાંથી કયો પરિબળ સૌથી ઓછો અસરકારક છે?", "opts": ["પર-પરાગન (Cross-pollination)", "જનીનના ઉલટસુલટ (Inversion)", "કૃત્રિમ પસંદગી (Artificial selection)", "સજાતીય પ્રજનન (Asexual reproduction)"], "ans": 3, "exp": "સજાતીય પ્રજનન (D) વૈવિધ્યતા ઉત્પન્ન કરતું નથી કારણ કે તે એક જ પિતૃ પાસેથી જનીન લે છે. પર-પરાગન (A), જનીનના ઉલટસુલટ (B), અને કૃત્રિમ પસંદગી (C) વૈવિધ્યતા વધારે છે.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વૈવિધ્યતા", "ch": ""}, {"q": "નીચેનામાંથી કયા કિસ્સામાં વૈવિધ્યતા ઉત્પન્ન થતી નથી, પરંતુ તેને પ્રોત્સાહન મળે છે?", "opts": ["મ્યુટેશન (Mutation)", "જનીનના વિનિમય (Gene recombination)", "પ્રાકૃતિક પસંદગી (Natural selection)", "જનીનના ડુપ્લિકેશન (Gene duplication)"], "ans": 2, "exp": "પ્રાકૃતિક પસંદગી (C) વૈવિધ્યતા ઉત્પન્ન કરતી નથી, પરંતુ તે પહેલાથી અસ્તિત્વમાં હોવાની વૈવિધ્યતાને પ્રોત્સાહન આપે છે. મ્યુટેશન (A), જનીનના વિનિમય (B), અને જનીનના ડુપ્લિકેશન (D) વૈવિધ્યતા ઉત્પન્ન કરે છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક જાતિમાં જનીનની વૈવિધ્યતા ઘટાડવા માટે નીચેનામાંથી કયો પરિબળ જવાબદાર છે?", "opts": ["જનીનના પ્રવાહ (Gene flow)", "જનીનના વિરૂપતા (Genetic drift)", "જનીનના સંકરણ (Gene hybridization)", "જનીનના કોષવિભાજન (Gene mitosis)"], "ans": 1, "exp": "જનીનના વિરૂપતા (B) જનીનની વૈવિધ્યતા ઘટાડે છે કારણ કે તે નાના જૂથમાં અચાનક જનીનની આવૃત્તિઓમાં ફેરફાર કરે છે. જનીનના પ્રવાહ (A) અને સંકરણ (C) વૈવિધ્યતા વધારે છે, જ્યારે કોષવિભાજન (D) વૈવિધ્યતાને અસર કરતું નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયો પરિબળ વંશાવળીમાં નવી જનીનની આવૃત્તિઓ ઉત્પન્ન કરતો નથી?", "opts": ["ક્રોમોસોમલ એબેરેશન (Chromosomal aberration)", "પોલિપ્લોઇડી (Polyploidy)", "લૈંગિક પ્રજનન (Sexual reproduction)", "સજાતીય પ્રજનન (Asexual reproduction)"], "ans": 3, "exp": "સજાતીય પ્રજનન (D) નવી જનીનની આવૃત્તિઓ ઉત્પન્ન કરતું નથી કારણ કે તે એક જ પિતૃ પાસેથી જનીન લે છે. ક્રોમોસોમલ એબેરેશન (A), પોલિપ્લોઇડી (B), અને લૈંગિક પ્રજનન (C) નવી જનીનની આવૃત્તિઓ ઉત્પન્ન કરે છે.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વૈવિધ્યતા", "ch": ""}, {"q": "જ્યારે એક જાતિમાં કોષવિભાજન દરમિયાન વર્ણસૂત્રોની અસમાન વહેંચણી થાય છે, ત્યારે ઉત્પન્ન થતી વૈવિધ્યતાને શું કહેવાય છે?", "opts": ["જનીન મ્યુટેશન", "ક્રોમોઝોમલ એબેરેશન", "નોન્ડિસજંકશન", "ક્રોસિંગ ઓવર"], "ans": 2, "exp": "નોન્ડિસજંકશન એ વર્ણસૂત્રોની અસમાન વહેંચણીને કારણે થતી વૈવિધ્યતા છે. જનીન મ્યુટેશન DNAમાં ફેરફારને કારણે થાય છે, ક્રોમોઝોમલ એબેરેશન એ વર્ણસૂત્રના ટુકડાના નુકશાન અથવા વૃદ્ધિને કારણે થાય છે, અને ક્રોસિંગ ઓવર એ હોમોલોગસ વર્ણસૂત્રો વચ્ચે જનીનના વિનિમયને કારણે થાય છે.", "ref": "Std 12 - Chapter 3: વંશાવળી અને વૈવિધ્યતા", "ch": ""}, {"q": "નીચેનામાંથી કયો પરિબળ વંશાવળીમાં નવી જનીન સંયોજનો ઉત્પન્ન કરે છે, પરંતુ વર્ણસૂત્રની સંખ્યામાં ફેરફાર કરતો નથી?", "opts": ["ડુપ્લિકેશન", "ટ્રાન્સલોકેશન", "ડિલીશન", "ઇનવર્ઝન"], "ans": 1, "exp": "ટ્રાન્સલોકેશન એ વર્ણસૂત્રોના ટુકડાઓના સ્થાનાંતરણને કારણે નવી જનીન સંયોજનો ઉત્પન્ન કરે છે, પરંતુ વર્ણસૂત્રની સંખ્યામાં ફેરફાર કરતો નથી. ડુપ્લિકેશન, ડિલીશન અને ઇનવર્ઝન એ વર્ણસૂત્રની રચનામાં ફેરફાર કરે છે, પરંતુ ટ્રાન્સલોકેશન જેવી નવી સંયોજનો ઉત્પન્ન કરતી નથી.", "ref": "Std 12 - Chapter 3: વંશાવળી અને વૈવિધ્યતા", "ch": ""}, {"q": "એક જાતિમાં જનીનની આવૃત્તિઓની આનુવંશિક વૈવિધ્યતા વધારવા માટે નીચેનામાંથી કયો પરિબળ સૌથી અસરકારક છે, જ્યારે તે જાતિ સ્થિર પર્યાવરણમાં રહેતી હોય છે?", "opts": ["પ્રાકૃતિક પસંદગી", "જનીન વહન", "મ્યુટેશન", "જનીન ડ્રિફ્ટ"], "ans": 2, "exp": "સ્થિર પર્યાવરણમાં, પ્રાકૃતિક પસંદગી અને જનીન ડ્રિફ્ટ વૈવિધ્યતા ઘટાડે છે, જ્યારે જનીન વહન એ પોપ્યુલેશન વચ્ચે જનીનના વિનિમયને કારણે વૈવિધ્યતા વધારે છે. પરંતુ મ્યુટેશન એ નવી જનીન આવૃત્તિઓ ઉત્પન્ન કરવાનો સૌથી અસરકારક પરિબળ છે, ખાસ કરીને સ્થિર પર્યાવરણમાં.", "ref": "Std 12 - Chapter 5: ઉત્ક્રાંતિ", "ch": ""}, {"q": "જ્યારે એક જ જાતિમાં બે જુદા જુદા જનીન લોકસ (gene loci) વચ્ચે સંપૂર્ણ સહસંબંધ (complete linkage) હોય છે, ત્યારે નીચેનામાંથી કયું પરિણામ જોવા મળશે?", "opts": ["વંશાવળીમાં વૈવિધ્યતા વધશે", "વંશાવળીમાં વૈવિધ્યતા ઘટશે", "ક્રોસિંગ ઓવરની શક્યતા વધશે", "મ્યુટેશનની શક્યતા ઘટશે"], "ans": 1, "exp": "સંપૂર્ણ સહસંબંધ (complete linkage) એટલે કે બે જનીન લોકસ વચ્ચે ક્રોસિંગ ઓવર થતું નથી, જેથી વંશાવળીમાં વૈવિધ્યતા ઘટે છે. ક્રોસિંગ ઓવરની શક્યતા ઘટે છે, અને મ્યુટેશનની શક્યતા પર કોઈ અસર થતી નથી.", "ref": "Std 12 - Chapter 3: વંશાવળી અને વૈવિધ્યતા", "ch": ""}, {"q": "નીચેનામાંથી કયો કિસ્સામાં વૈવિધ્યતા ઉત્પન્ન થતી નથી, પરંતુ તેને પ્રોત્સાહન મળે છે તે વાંધો જણાવો: એક જાતિમાં સંપૂર્ણ સ્વ-પરાગનયન (self-pollination) થાય છે?", "opts": ["વૈવિધ્યતા ઉત્પન્ન થતી નથી, પરંતુ તેને પ્રોત્સાહન મળે છે", "વૈવિધ્યતા ઉત્પન્ન થાય છે, પરંતુ તેને પ્રોત્સાહન મળતું નથી", "વૈવિધ્યતા ઉત્પન્ન થતી નથી અને તેને પ્રોત્સાહન પણ મળતું નથી", "વૈવિધ્યતા ઉત્પન્ન થાય છે અને તેને પ્રોત્સાહન પણ મળે છે"], "ans": 2, "exp": "સંપૂર્ણ સ્વ-પરાગનયન (self-pollination) થવાને કારણે વૈવિધ્યતા ઉત્પન્ન થતી નથી અને તેને પ્રોત્સાહન પણ મળતું નથી, કારણ કે તે જનીનની એકસરખી નકલો ઉત્પન્ન કરે છે.", "ref": "Std 12 - Chapter 2: અનુવંશિકતા અને વૈવિધ્યતા", "ch": ""}, {"q": "જ્યારે એક જાતિમાં કોષવિભાજન દરમ્યાન વર્ણસૂત્રોની અદલાબદલી (crossing over) થાય છે, ત્યારે નીચેનામાંથી કયો પરિણામ સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["વર્ણસૂત્રોની સંખ્યામાં વધારો થાય છે", "જનીનની નવી સંયોજનો ઉત્પન્ન થાય છે, પરંતુ વર્ણસૂત્રની સંખ્યામાં ફેરફાર થતો નથી", "વર્ણસૂત્રોની સંખ્યામાં ઘટાડો થાય છે", "જનીનની આવૃત્તિઓમાં કોઈ ફેરફાર થતો નથી"], "ans": 1, "exp": "અદલાબદલી (crossing over) દરમ્યાન, હોમોલોગસ વર્ણસૂત્રો વચ્ચે જનીનના ટુકડાઓની અદલાબદલી થાય છે, જેથી નવી જનીન સંયોજનો ઉત્પન્ન થાય છે. પરંતુ વર્ણસૂત્રની સંખ્યામાં કોઈ ફેરફાર થતો નથી. અ) અને સ) વર્ણસૂત્રની સંખ્યામાં ફેરફાર સૂચવે છે, જે ખોટું છે. ડ) જનીનની આવૃત્તિઓમાં ફેરફાર થતો નથી એ ખોટું છે કારણ કે અદલાબદલી નવી જનીન સંયોજનો ઉત્પન્ન કરે છે.", "ref": "Std 12 - Chapter 3: વંશાવળી અને વૈવિધ્યતા", "ch": ""}, {"q": "એક જાતિમાં જ્યારે કોઈ જનીનના બે એલિલ્સ વચ્ચે અપૂર્ણ પ્રભાવિતા (incomplete dominance) જોવા મળે છે, ત્યારે F1 પેઢીમાં કયો પરિણામ જોવા મળે છે?", "opts": ["ફક્ત એક જ એલિલની અભિવ્યક્તિ થાય છે", "બંને એલિલની અભિવ્યક્તિ થાય છે, પરંતુ મિશ્રિત લક્ષણ દેખાય છે", "કોઈપણ એલિલની અભિવ્યક્તિ થતી નથી", "ફક્ત પિતૃ લક્ષણ જ દેખાય છે"], "ans": 1, "exp": "અપૂર્ણ પ્રભાવિતામાં, બંને એલિલની અભિવ્યક્તિ થાય છે, પરંતુ તે મિશ્રિત લક્ષણ તરીકે દેખાય છે. અ) ફક્ત એક એલિલની અભિવ્યક્તિ સૂચવે છે, જે પૂર્ણ પ્રભાવિતામાં થાય છે. સ) કોઈપણ એલિલની અભિવ્યક્તિ ન થવી એ ખોટું છે. ડ) ફક્ત પિતૃ લક્ષણ દેખાય એ પણ ખોટું છે.", "ref": "Std 12 - Chapter 2: વંશાવળીના નિયમો", "ch": ""}, {"q": "જ્યારે એક જાતિમાં કોષવિભાજન દરમ્યાન વર્ણસૂત્રોની અસમાન વહેંચણી (non-disjunction) થાય છે, ત્યારે નીચેનામાંથી કયો પરિણામ સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["વર્ણસૂત્રોની સંખ્યામાં કોઈ ફેરફાર થતો નથી", "કોષમાં વર્ણસૂત્રોની સંખ્યામાં વધારો અથવા ઘટાડો ર હાલના જનીનોનું નવું સંયોજન બનાવે છે, જે વૈવિધ્યતા વધારે છે.\n\nવિકલ્પ A ખોટો છે કારણ કે ક્રોસિંગ ઓવર પણ નવી જનીનિક માહિતી ઉમેરતું નથી, પરંતુ તે જનીનિક પુનઃસંયોજનનો એક ભાગ છે અને વૈવિધ્યતા વધારે છે.\n\nવિકલ્પ B ખોટો છે કારણ કે નોન-ડિસજંક્શન વર્ણસૂત્રોની સંખ્યામાં ફેરફાર કરે છે, જે નવી જનીનિક માહિતી ઉમેરે છે (જેમ કે ટ્રાયસોમી કે મોનોસોમી).\n\nવિકલ્પ D ખોટો છે કારણ કે પર્યાવરણીય પરિબળો જનીન અભિવ્યક્તિને અસર કરે છે, પરંતુ તે જનીનિક માહિતીમાં ફેરફાર કરતા નથી કે નવી જનીનિક માહિતી ઉમેરતા નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને વૈવિધ્યતા", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
