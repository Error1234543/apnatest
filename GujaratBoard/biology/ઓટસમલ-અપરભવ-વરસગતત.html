<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ઓટોસોમલ અપ્રભાવી વારસાગતતા</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ઓટોસોમલ અપ્રભાવી વારસાગતતા</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ઓટોસોમલ અપ્રભાવી વારસાગતતા</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક દંપતીને બે બાળકો છે, જેમાં એક બાળકમાં ઓટોસોમલ અપ્રભાવી રોગ જોવા મળે છે, જ્યારે બીજું બાળક સામાન્ય છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["માતા-પિતા બંને વાહક (હેટેરોઝાયગસ) હોવા જોઈએ", "રોગગ્રસ્ત બાળક હોમોઝાયગસ પ્રભાવી જનીન ધરાવે છે", "સામાન્ય બાળક હોમોઝાયગસ પ્રભાવી અથવા હેટેરોઝાયગસ હોઈ શકે", "આ રોગની સંભાવના દરેક ગર્ભાવસ્થામાં 25% રહે છે"], "ans": 1, "exp": "ઓટોસોમલ અપ્રભાવી વારસાગતતામાં રોગગ્રસ્ત વ્યક્તિ હોમોઝાયગસ અપ્રભાવી (aa) હોય છે, પ્રભાવી નહીં. તેથી વિકલ્પ B ખોટું છે. માતા-પિતા બંને હેટેરોઝાયગસ (Aa) હોવાથી રોગની સંભાવના 25% રહે છે (aa), 50% વાહક (Aa) અને 25% સામાન્ય (AA) હોય છે. વિકલ્પ A, C અને D સાચાં છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "ઓટોસોમલ અપ્રભાવી વારસાગતતામાં નીચેનામાંથી કયું લક્ષણ જોવા મળતું નથી?", "opts": ["રોગગ્રસ્ત વ્યક્તિના માતા-પિતા સામાન્ય દેખાઈ શકે છે", "સ્ત્રી અને પુરુષમાં રોગની સંભાવના સમાન હોય છે", "રોગગ્રસ્ત વ્યક્તિના બધા સંતાનો રોગગ્રસ્ત થાય છે", "આ રોગ એક પેઢીથી બીજી પેઢીમાં છૂટક રીતે જોવા મળે છે"], "ans": 2, "exp": "ઓટોસોમલ અપ્રભાવી વારસાગતતામાં રોગગ્રસ્ત વ્યક્તિના સંતાનો રોગગ્રસ્ત થાય તે જરૂરી નથી, કારણ કે જો સાથી વ્યક્તિ સામાન્ય હોય તો સંતાનો વાહક અથવા સામાન્ય હોઈ શકે છે. તેથી વિકલ્પ C ખોટું છે. અન્ય વિકલ્પો ઓટોસોમલ અપ્રભાવી વારસાગતતાના લક્ષણો છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક પરિવારમાં પિતા ઓટોસોમલ અપ્રભાવી રોગથી પીડિત છે, જ્યારે માતા સામાન્ય છે. તેમના બધા સંતાનો સામાન્ય છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું તારણ સાચું છે?", "opts": ["માતા હોમોઝાયગસ પ્રભાવી (AA) છે", "બધા સંતાનો હેટેરોઝાયગસ (Aa) છે", "પિતા હોમોઝાયગસ અપ્રભાવી (aa) છે", "ઉપરોક્ત તમામ સાચાં છે"], "ans": 3, "exp": "ઓટોસોમલ અપ્રભાવી રોગમાં પીડિત વ્યક્તિ હોમોઝાયગસ અપ્રભાવી (aa) હોય છે. જો માતા હોમોઝાયગસ પ્રભાવી (AA) હોય, તો બધા સંતાનો હેટેરોઝાયગસ (Aa) અને સામાન્ય દેખાશે. તેથી તમામ વિકલ્પો A, B અને C સાચાં છે, અને D સાચો છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "નીચેના પૈકી કયો રોગ ઓટોસોમલ અપ્રભાવી વારસાગતતાનું ઉદાહરણ નથી?", "opts": ["ફિનાઇલકીટોન્યુરિયા (PKU)", "સિકલ સેલ એનીમિયા", "થેલેસેમિયા", "હન્ટિંગ્ટન રોગ"], "ans": 3, "exp": "હન્ટિંગ્ટન રોગ ઓટોસોમલ પ્રભાવી વારસાગતતા દ્વારા પ્રસરે છે, જ્યારે અન્ય ત્રણ રોગો ઓટોસોમલ અપ્રભાવી વારસાગતતા દર્શાવે છે. તેથી વિકલ્પ D ખોટો છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક સ્ત્રી ઓટોસોમલ અપ્રભાવી રોગ માટે વાહક (હેટેરોઝાયગસ) છે. તેના પતિને આ રોગ નથી. તેમના પ્રથમ બાળકને આ રોગ થવાની સંભાવના કેટલી છે? તેમના બીજા બાળકને આ રોગ થવાની સંભાવના કેટલી છે?", "opts": ["પ્રથમ બાળક: 25%, બીજું બાળક: 25%", "પ્રથમ બાળક: 50%, બીજું બાળક: 50%", "પ્રથમ બાળક: 25%, બીજું બાળક: 50%", "પ્રથમ બાળક: 0%, બીજું બાળક: 25%"], "ans": 0, "exp": "ઓટોસોમલ અપ્રભાવી વારસાગતતામાં, જો માતા હેટેરોઝાયગસ (Aa) અને પિતા સામાન્ય (AA) હોય, તો દરેક ગર્ભાવસ્થામાં રોગગ્રસ્ત બાળક (aa) થવાની સંભાવના 25% રહે છે. દરેક ગર્ભાવસ્થા સ્વતંત્ર ઘટના છે, તેથી પ્રથમ અને બીજા બાળક માટે સંભાવના સમાન (25%) રહે છે. તેથી વિકલ્પ A સાચો છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક પરિવારમાં, દાદા અને દાદી બંને સામાન્ય છે, પરંતુ તેમના પૌત્રમાં ફિનાઇલકેટોન્યુરિયા (PKU) નામનો ઓટોસોમલ અપ્રભાવી રોગ જોવા મળે છે. આ કિસ્સામાં, નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["દાદા અને દાદી બંને વાહક (હેટેરોઝાયગસ) હોવા જ જોઈએ.", "દાદા અથવા દાદી પૈકી કોઈ એક વાહક હોવો જ જોઈએ.", "દાદા અને દાદી બંને પેનેટ્રન્સ હોવા જ જોઈએ.", "દાદા અથવા દાદી પૈકી કોઈ એક હોમોઝાયગસ પ્રભાવી હોવો જ જોઈએ."], "ans": 0, "exp": "ફિનાઇલકેટોન્યુરિયા (PKU) એક ઓટોસોમલ અપ્રભાવી રોગ છે, જેમાં બાળકમાં રોગ દેખાય તે માટે માતા અને પિતા બંને વાહક (હેટેરોઝાયગસ) હોવા જરૂરી છે. દાદા અને દાદી બંને સામાન્ય હોવા છતાં તેમના પૌત્રમાં રોગ દેખાય છે, એટલે કે તેમના સંતાન (માતા અથવા પિતા) વાહક હોવા જ જોઈએ, પરંતુ દાદા અને દાદી બંને વાહક હોવા જરૂરી છે. વિકલ્પ B, C, અને D અસત્ય છે કારણ કે ઓટોસોમલ અપ્રભાવી રોગ માટે બંને પિતૃ વાહક હોવા જરૂરી છે.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને વિવિધતા", "ch": ""}, {"q": "એક વ્યક્તિમાં સિકલ સેલ એનિમિયા (Sickle Cell Anemia) નામનો રોગ જોવા મળે છે. જો આ વ્યક્તિના માતા-પિતા બંને સામાન્ય હોય, તો નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["માતા અને પિતા બંને હોમોઝાયગસ પ્રભાવી છે.", "માતા અને પિતા બંને હેટેરોઝાયગસ વાહક છે.", "માતા અથવા પિતા પૈકી કોઈ એક હોમોઝાયગસ અપ્રભાવી છે.", "માતા અને પિતા બંને હોમોઝાયગસ અપ્રભાવી છે."], "ans": 1, "exp": "સિકલ સેલ એનિમિયા એક ઓટોસોમલ અપ્રભાવી રોગ છે. જો બાળકમાં રોગ દેખાય અને માતા-પિતા બંને સામાન્ય હોય, તો તેઓ બંને હેટેરોઝાયગસ વાહક હોવા જ જોઈએ. વિકલ્પ A, C, અને D અસત્ય છે કારણ કે હોમોઝાયગસ પ્રભાવી અથવા અપ્રભાવી વ્યક્તિઓમાં રોગ દેખાતો નથી અથવા તો બાળકમાં રોગ દેખાય નહીં.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને વિવિધતા", "ch": ""}, {"q": "એક પરિવારમાં, માતા અને પિતા બંને ઓટોસોમલ અપ્રભાવી રોગ માટે હેટેરોઝાયગસ વાહક છે. તેમના બાળકમાં રોગ ન દેખાય, પરંતુ તે વાહક હશે. આ કિસ્સામાં, બાળકના જનીનપ્રકાર (Genotype) ની સંભાવના કેટલી છે?", "opts": ["25%", "50%", "75%", "100%"], "ans": 1, "exp": "માતા અને પિતા બંને હેટેરોઝાયગસ (Aa) હોવા છતાં, બાળકમાં રોગ ન દેખાય પરંતુ તે વાહક (Aa) હશે. પનેટ સ્ક્વેર અનુસાર, હેટેરોઝાયગસ વાહક બાળકની સંભાવના 50% છે. વિકલ્પ A (25%) હોમોઝાયગસ અપ્રભાવી (aa) બાળકની સંભાવના છે, વિકલ્પ C (75%) હેટેરોઝાયગસ અથવા હોમોઝાયગસ પ્રભાવી બાળકની સંભાવના છે, અને વિકલ્પ D (100%) અસંભવ છે.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને વિવિધતા", "ch": ""}, {"q": "નીચેનામાંથી કયો રોગ ઓટોસોમલ અપ્રભાવી વારસાગતતાનું ઉદાહરણ છે, જેમાં વાહક વ્યક્તિઓમાં રોગના લક્ષણો દેખાય નહીં, પરંતુ જીનની હાજરીને કારણે બાયોકેમિકલ પરીક્ષણ દ્વારા શોધી શકાય છે?", "opts": ["હિમોફિલિયા", "કલર બ્લાઇન્ડનેસ", "ટેય-સેક્સ રોગ", "ફિનાઇલકેટોન્યુરિયા (PKU)"], "ans": 3, "exp": "ફિનાઇલકેટોન્યુરિયા (PKU) એક ઓટોસોમલ અપ્રભાવી રોગ છે, જેમાં વાહક વ્યક્તિઓમાં રોગના લક્ષણો દેખાય નહીં, પરંતુ જીનની હાજરીને કારણે બાયોકેમિકલ પરીક્ષણ દ્વારા શોધી શકાય છે. હિમોફિલિયા (A) અને કલર બ્લાઇન્ડનેસ (B) X-લિંક્ડ રોગ છે, જ્યારે ટેય-સેક્સ રોગ (C) પણ X-લિંક્ડ રોગ છે.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને વિવિધતા", "ch": ""}, {"q": "એક વ્યક્તિમાં ઓટોસોમલ અપ્રભાવી રોગ છે, પરંતુ તેના માતા-પિતા બંને સામાન્ય છે. જો આ વ્યક્તિના ભાઈ-બહેનોમાં પણ રોગ દેખાય છે, તો નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["માતા અને પિતા બંને હોમોઝાયગસ પ્રભાવી છે.", "માતા અને પિતા બંને હેટેરોઝાયગસ વાહક છે.", "માતા અથવા પિતા પૈકી કોઈ એક હોમોઝાયગસ અપ્રભાવી છે.", "માતા અને પિતા બંને હોમોઝાયગસ અપ્રભાવી છે."], "ans": 1, "exp": "જો વ્યક્તિમાં ઓટોસોમલ અપ્રભાવી રોગ છે અને માતા-પિતા બંને સામાન્ય છે, તો તેઓ બંને હેટેરોઝાયગસ વાહક હોવા જ જોઈએ. ભાઈ-બહેનોમાં પણ રોગ દેખાય છે, એટલે કે તેમના માતા-પિતા બંને વાહક હોવા જરૂરી છે. વિકલ્પ A, C, અને D અસત્ય છે કારણ કે હોમોઝાયગસ પ્રભાવી અથવા અપ્રભાવી વ્યક્તિઓમાં રોગ દેખાતો નથી અથવા તો બાળકમાં રોગ દેખાય નહીં.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને વિવિધતા", "ch": ""}, {"q": "એક પરિવારમાં, માતા અને પિતા બંને સામાન્ય છે, પરંતુ તેમના ત્રણ બાળકોમાંથી એક બાળકમાં ટેય-સેક્સ રોગ જોવા મળે છે. આ કિસ્સામાં નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["ટેય-સેક્સ રોગ ઓટોસોમલ અપ્રભાવી વારસાગતતાનું ઉદાહરણ છે અને બાળકમાં હોમોઝાયગસ રીસેસિવ જનીન હાજર છે.", "ટેય-સેક્સ રોગ X-લિંક્ડ રીસેસિવ વારસાગતતાનું ઉદાહરણ છે અને બાળકમાં હેટેરોઝાયગસ જનીન હાજર છે.", "ટેય-સેક્સ રોગ ઓટોસોમલ પ્રભાવી વારસાગતતાનું ઉદાહરણ છે અને બાળકમાં હોમોઝાયગસ ડોમિનન્ટ જનીન હાજર છે.", "ટેય-સેક્સ રોગ Y-લિંક્ડ વારસાગતતાનું ઉદાહરણ છે અને બાળકમાં Y વર્ણસૂત્ર પર જનીન હાજર છે."], "ans": 0, "exp": "ટેય-સેક્સ રોગ ઓટોસોમલ અપ્રભાવી વારસાગતતાનું ઉદાહરણ છે. માતા અને પિતા બંને સામાન્ય હોવા છતાં બાળકમાં રોગ જોવા મળે છે, જે સૂચવે છે કે બાળકમાં હોમોઝાયગસ રીસેસિવ જનીન (aa) હાજર છે. વિકલ્પ B ખોટો છે કારણ કે ટેય-સેક્સ રોગ X-લિંક્ડ નથી. વિકલ્પ C ખોટો છે કારણ કે તે ઓટોસોમલ પ્રભાવી નથી. વિકલ્પ D ખોટો છે કારણ કે તે Y-લિંક્ડ નથી.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને વિકાસ", "ch": ""}, {"q": "ફિનાઇલકેટોન્યુરિયા (PKU) નામનો રોગ ઓટોસોમલ અપ્રભાવી વારસાગતતાનું ઉદાહરણ છે. નીચેનામાંથી કયું વિધાન આ રોગ વિશે સત્ય નથી?", "opts": ["આ રોગમાં ફિનાઇલએલેનિન નામના એમિનો એસિડનું ચયાપચય થતું નથી.", "રોગી વ્યક્તિઓમાં ફિનાઇલએલેનિન હાઇડ્રોક્સિલેઝ ઉત્સેચકની ઉણપ હાજર છે.", "વાહક વ્યક્તિઓ (હેટેરોઝાયગસ)માં રોગના લક્ષણો દેખાય છે.", "આ રોગનો ઉપચાર આહારમાં ફિનાઇલએલેનિનની માત્રા ઓછી રાખીને થઈ શકે છે."], "ans": 2, "exp": "ફિનાઇલકેટોન્યુરિયા (PKU)માં વાહક વ્યક્તિઓ (હેટેરોઝાયગસ) સામાન્ય રીતે રોગના લક્ષણો દર્શાવતી નથી. વિકલ્પ A અને B સત્ય છે કારણ કે PKUમાં ફિનાઇલએલેનિન હાઇડ્રોક્સિલેઝ ઉત્સેચકની ઉણપ હાજર છે, જેના કારણે ફિનાઇલએલેનિનનું ચયાપચય થતું નથી. વિકલ્પ D સત્ય છે કારણ કે આહારમાં ફિનાઇલએલેનિનની માત્રા ઓછી રાખવાથી રોગનો ઉપચાર થઈ શકે છે.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને વિકાસ", "ch": ""}, {"q": "એક દંપતીને ચાર બાળકો છે. જેમાં બે બાળકો સામાન્ય છે અને બે બાળકો ઓટોસોમલ અપ્રભાવી રોગથી પીડિત છે. માતા અને પિતા બંને સામાન્ય છે. નીચેનામાંથી કયું જનીનોટાઇપિક રેશિયો આ કિસ્સામાં શક્ય છે?", "opts": ["AA x aa", "Aa x Aa", "AA x Aa", "aa x aa"], "ans": 1, "exp": "માતા અને પિતા બંને સામાન્ય હોવા છતાં બાળકોમાં રોગ જોવા મળે છે, જે સૂચવે છે કે બંને હેટેરોઝાયગસ (Aa) છે. Aa x Aa જનીનોટાઇપિક રેશિયોમાં 1:2:1 (AA:Aa:aa) પ્રમાણે બાળકો જન્મે છે, જેમાં 25% બાળકો હોમોઝાયગસ રીસેસિવ (aa) હશે અને રોગથી પીડિત હશે. વિકલ્પ A ખોટો છે કારણ કે AA x aa માં બધા બાળકો Aa હશે અને સામાન્ય હશે. વિકલ્પ C ખોટો છે કારણ કે AA x Aa માં બધા બાળકો સામાન્ય હશે. વિકલ્પ D ખોટો છે કારણ કે aa x aa માં બધા બાળકો રોગથી પીડિત હશે.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને વિકાસ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઓટોસોમલ અપ્રભાવી વારસાગતતાને લગતી અપવાદરૂપ પરિસ્થિતિ દર્શાવે છે?", "opts": ["રોગ ગુણસૂત્ર X સાથે સંકળાયેલો હોય છે", "રોગ વાહક માતા-પિતા પાસેથી બાળકમાં પ્રગટ થાય છે", "રોગ ગુણસૂત્ર Y સાથે સંકળાયેલો હોય છે", "રોગ પિતા પાસેથી પુત્રીને પસાર થાય છે"], "ans": 2, "exp": "ઓટોસોમલ અપ્રભાવી વારસાગતતામાં રોગ ઓટોસોમલ ગુણસૂત્રો સાથે સંકળાયેલો હોય છે, ન કે X અથવા Y ગુણસૂત્ર સાથે. વિકલ્પ A અને D X-સંકળિત વારસાગતતાને દર્શાવે છે, જ્યારે વિકલ્પ B ઓટોસોમલ અપ્રભાવી વારસાગતતાનું સામાન્ય લક્ષણ છે. વિકલ્પ C Y-સંકળિત વારસાગતતાને દર્શાવે છે, જે ઓટોસોમલ અપ્રભાવી વારસાગતતાનો અપવાદ છે.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને પરિવર્તનશીલતા", "ch": ""}, {"q": "એક પરિવારમાં, માતા અને પિતા બંને ફિનાઇલકેટોન્યુરિયા (PKU) રોગ માટે હેટેરોઝાયગસ વાહક છે. તેમના પ્રથમ બાળકમાં આ રોગ જોવા મળ્યો છે. હવે, આ દંપતીને બીજું બાળક થાય તો તે બાળકમાં આ રોગ થવાની સંભાવના કેટલી છે? પરંતુ, જો બીજું બાળક છોકરી હોય અને તેના શરીરમાં ફિનાઇલએલેનાઇન હાઇડ્રોક્સિલેઝ ઉત્સેચકનું પ્રમાણ અપેક્ષા કરતાં ૩૦% વધુ હોય, તો નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["બીજા બાળકમાં રોગ થવાની સંભાવના ૨૫% છે, અને છોકરીમાં ઉત્સેચકનું પ્રમાણ વધુ હોવાથી તે રોગમુક્ત રહેશે.", "બીજા બાળકમાં રોગ થવાની સંભાવના ૨૫% છે, પરંતુ ઉત્સેચકનું પ્રમાણ વધુ હોવા છતાં તે રોગગ્રસ્ત થઈ શકે છે કારણ કે ઓટોસોમલ અપ્રભાવી વારસાગતતામાં જનીન પ્રકાર જ નિર્ણાયક છે.", "બીજા બાળકમાં રોગ થવાની સંભાવના ૫૦% છે, કારણ કે પ્રથમ બાળક રોગગ્રસ્ત છે, અને ઉત્સેચકનું પ્રમાણ વધુ હોવાથી છોકરી વાહક બનશે.", "બીજા બાળકમાં રોગ થવાની સંભાવના ૨૫% છે, પરંતુ ઉત્સેચકનું પ્રમાણ વધુ હોવાથી તેના શરીરમાં ફિનાઇલએલેનાઇનનું પ્રમાણ સામાન્ય રહેશે અને તે રોગના લક્ષણો દર્શાવશે નહીં."], "ans": 1, "exp": "ઓટોસોમલ અપ્રભાવી વારસાગતતામાં, બંને માતા-પિતા હેટેરોઝાયગસ વાહક હોય તો દરેક ગર્ભાધાનમાં રોગ થવાની સંભાવના ૨૫% રહે છે (પુનેટ સ્ક્વેર મુજબ). ઉત્સેચકનું પ્રમાણ વધુ હોવા છતાં, જો બાળકમાં રોગ માટે જવાબદાર જનીન (aa) હોમોઝાયગસ સ્વરૂપે હોય તો તે રોગગ્રસ્ત થશે જ, કારણ કે ઓટોસોમલ અપ્રભાવી વારસાગતતામાં ફિનોટાઇપિક અભિવ્યક્તિ જનીન પ્રકાર પર આધારિત છે, ઉત્સેચકના પ્રમાણ પર નહીં. વિકલ્પ A ખોટો છે કારણ કે ઉત્સેચકનું પ્રમાણ વધુ હોવા છતાં જનીન પ્રકાર નિર્ણાયક છે. વિકલ્પ C ખોટો છે કારણ કે સંભાવના ૨૫% જ રહે છે અને પ્રથમ બાળકનો રોગ બીજા બાળકની સંભાવનાને અસર કરતો નથી. વિકલ્પ D ખોટો છે કારણ કે ઉત્સેચકનું પ્રમાણ વધુ હોવા છતાં જો જનીન પ્રકાર રોગ માટે હોમોઝાયગસ હોય તો રોગના લક્ષણો દેખાશે જ.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક પરિવારમાં, માતા અને પિતા બંને સિકલ સેલ ટ્રેઈટ (HbAS) ધરાવે છે. તેમના બાળકમાં સિકલ સેલ એનિમિયા (HbSS) વિકસવાની સંભાવના કેટલી છે, જો તેમના પૂર્વજોમાં આ રોગના કોઈ કેસ ન હોવાનું જાણવા મળે?", "opts": ["0%", "25%", "50%", "100%"], "ans": 1, "exp": "માતા અને પિતા બંને હેટેરોઝાયગસ (HbAS) હોવાથી, તેમના બાળકમાં HbSS (સિકલ સેલ એનિમિયા) વિકસવાની સંભાવના 25% છે. પૂર્વજોમાં રોગ ન હોવાનું જણાવવું એ અહીં ભ્રામક છે, કારણ કે ઓટોસોમલ અપ્રભાવી રોગો હેટેરોઝાયગસ વાહકો દ્વારા પેઢીદરપેઢી પસાર થઈ શકે છે. A) 0% ખોટું છે કારણ કે સંભાવના શૂન્ય નથી. C) 50% ખોટું છે કારણ કે તે હોમોઝાયગસ અપ્રભાવી બાળકની સંભાવના નથી. D) 100% ખોટું છે કારણ કે બાળક સામાન્ય (HbAA) અથવા વાહક (HbAS) પણ થઈ શકે.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "ફિનાઇલકેટોન્યુરિયા (PKU) ધરાવતી વ્યક્તિમાં, ફિનાઇલએલેનિન હાઇડ્રોક્સિલેઝ ઉત્સેચકની કમીને કારણે કયો પદાર્થ જમા થાય છે, જે મગજને નુકસાન પહોંચાડે છે?", "opts": ["ટાયરોસિન", "ફિનાઇલપિરુવિક એસિડ", "ફિનાઇલએલેનિન", "ટ્રિપ્ટોફેન"], "ans": 2, "exp": "PKUમાં, ફિનાઇલએલેનિન હાઇડ્રોક્સિલેઝ ઉત્સેચકની કમીને કારણે ફિનાઇલએલેનિનનું રૂપાંતર ટાયરોસિનમાં થતું નથી, પરિણામે ફિનાઇલએલેનિન જમા થાય છે. A) ટાયરોસિન ખોટું છે કારણ કે તે ફિનાઇલએલેનિનનું રૂપાંતરિત સ્વરૂપ છે, જે બનતું નથી. B) ફિનાઇલપિરુવિક એસિડ ખોટું છે કારણ કે તે ફિનાઇલએલેનિનના ચયાપચયનું બાયપ્રોડક્ટ છે, પરંતુ પ્રાથમિક જમા પદાર્થ નથી. D) ટ્રિપ્ટોફેન ખોટું છે કારણ કે તે એક અલગ એમિનો એસિડ છે, જે PKU સાથે સંબંધિત નથી.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક દંપતીને ત્રણ બાળકો છે. બે બાળકો સામાન્ય છે અને એક બાળકમાં ઓટોસોમલ અપ્રભાવી રોગ છે. જો માતા અને પિતા બંને સામાન્ય હોય, તો નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["રોગ માટે જવાબદાર જનીન X વર્ણસૂત્ર પર આવેલું છે", "રોગ માટે જવાબદાર જનીન ઓટોસોમ પર આવેલું છે અને માતા-પિતા બંને વાહક છે", "રોગ માટે જવાબદાર જનીન Y વર્ણસૂત્ર પર આવેલું છે", "રોગ સંપૂર્ણપણે પર્યાવરણીય કારણોસર થયો છે"], "ans": 1, "exp": "જો માતા અને પિતા બંને સામાન્ય હોય અને તેમના બાળકમાં ઓટોસોમલ અપ્રભાવી રોગ હોય, તો બંને વાહક (હેટેરોઝાયગસ) હોવા જરૂરી છે. A) ખોટું છે કારણ કે X-લિંક્ડ રોગો પુરુષોમાં વધુ સામાન્ય હોય છે અને માતા વાહક હોવી જરૂરી છે. C) ખોટું છે કારણ કે Y-લિંક્ડ રોગો ફક્ત પુરુષોમાં જોવા મળે છે અને પિતા પાસેથી પસાર થાય છે. D) ખોટું છે કારણ કે ઓટોસોમલ અપ્રભાવી રોગો અનુવંશિક હોય છે, પર્યાવરણીય નહીં.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઓટોસોમલ અપ્રભાવી વારસાગતતાની વિશિષ્ટ પરિસ્થિતિને યોગ્ય રીતે વર્ણવે છે, જ્યાં રોગની અભિવ્યક્તિ પર્યાવરણીય પરિબળો દ્વારા પ્રભાવિત થઈ શકે છે? (ઉદાહરણ: ફિનાઇલકેટોન્યુરિયા - PKU)", "opts": ["રોગની અભિવ્યક્તિ માત્ર જનીન પર આધારિત હોય છે, પર્યાવરણીય પરિબળોનો કોઈ પ્રભાવ નથી.", "રોગની અભિવ્યક્તિ માટે જવાબદાર જનીનનું મ્યુટેશન હંમેશા સંપૂર્ણપણે પ્રભાવી હોય છે, જેના કારણે વાહક વ્યક્તિઓમાં પણ રોગ જોવા મળે છે.", "રોગની અભિવ્યક્તિ પર્યાવરણીય પરિબળો દ્વારા પ્રભાવિત થઈ શકે છે, જેમ કે ફિનાઇલએલેનિન ધરાવતો આહાર લેવાથી PKU રોગની તીવ્રતા વધી શકે છે.", "ઓટોસોમલ અપ્રભાવી રોગો હંમેશા બાળપણમાં જ પ્રગટ થાય છે અને પુખ્તાવસ્થામાં તેની અસર ઓછી થઈ જાય છે."], "ans": 2, "exp": "ફિનાઇલકેટોન્યુરિયા (PKU) ઓટોસોમલ અપ્રભાવી વારસાગતતાનું ઉદાહરણ છે, જેમાં ફિનાઇલએલેનિન હાઇડ્રોક્સિલેઝ ઉત્સેચકની કમીને કારણે ફિનાઇલએલેનિન એમિનો એસિડ શરીરમાં જમા થાય છે. આ રોગની અભિવ્યક્તિ પર્યાવરણીય પરિબળો (જેમ કે આહારમાં ફિનાઇલએલેનિનનું પ્રમાણ) દ્વારા પ્રભાવિત થાય છે. જો રોગી ઓછો ફિનાઇલએલેનિન ધરાવતો આહાર લે, તો રોગની તીવ્રતા ઘટાડી શકાય છે. વિકલ્પ A ખોટો છે કારણ કે પર્યાવરણીય પરિબળોનો પ્રભાવ હોઈ શકે છે. વિકલ્પ B ખોટો છે કારણ કે ઓટોસોમલ અપ્રભાવી રોગોમાં વાહક વ્યક્તિઓમાં રોગ જોવા મળતો નથી. વિકલ્પ D ખોટો છે કારણ કે રોગની અભિવ્યક્તિ ઉંમર પર આધારિત નથી, પરંતુ જનીન અને પર્યાવરણ પર આધારિત છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક પરિવારમાં, માતા અને પિતા બંને સામાન્ય છે, પરંતુ તેમના પુત્ર અને પુત્રી બંનેને અલગ-અલગ ઓટોસોમલ અપ્રભાવી રોગો છે. આ પરિસ્થિતિ માટે નીચેનામાંથી કયું વિધાન સૌથી યોગ્ય છે?", "opts": ["બંને રોગો માટે માતા અને પિતા હેટેરોઝાયગસ વાહક છે, પરંતુ અલગ જનીનો માટે", "માતા અને પિતા બંને એક જ રોગ માટે હોમોઝાયગસ પ્રભાવી છે", "માતા અને પિતા બંને એક જ રોગ માટે હેટેરોઝાયગસ વાહક છે, પરંતુ બાળકોમાં મ્યુટેશન નવું ઉદભવ્યું છે", "માતા અને પિતા બંને સામાન્ય જનીન ધરાવે છે, પરંતુ બાળકોમાં રોગો પર્યાવરણીય કારણોસર ઉદભવ્યા છે"], "ans": 0, "exp": "સાચો જવાબ A છે. ઓટોસોમલ અપ્રભાવી રોગો માટે, વ્યક્તિને રોગ પ્રગટ થાય તે માટે બંને જનીનો પ્રભાવી (હોમોઝાયગસ) હોવા જોઈએ. જો માતા અને પિતા સામાન્ય છે પરંતુ તેમના બાળકોમાં અલગ-અલગ રોગો છે, તો તે સૂચવે છે કે માતા અને પિતા બંને અલગ-અલગ જનીનો માટે હેટેરોઝાયગસ વાહક છે. B ગળતર છે કારણ કે હોમોઝાયગસ પ્રભાવી વ્યક્તિ રોગથી પીડિત હોત, જ્યારે માતા-પિતા સામાન્ય છે. C ગળતર છે કારણ કે નવું મ્યુટેશન બાળકોમાં એક જ રોગ તરફ દોરી શકે, પરંતુ અહીં બે અલગ રોગો છે. D ગળતર છે કારણ કે ઓટોસોમલ અપ્રભાવી રોગો પર્યાવરણીય કારણોસર ઉદભવતા નથી.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને વિવિધતા", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
