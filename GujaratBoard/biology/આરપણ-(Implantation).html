<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>આરોપણ (Implantation)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>આરોપણ (Implantation)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">આરોપણ (Implantation)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "માનવ ગર્ભાશયમાં ગર્ભકોષ્ઠનું આરોપણ કયા તબક્કે થાય છે?", "opts": ["ફલિતાંડ તબક્કે (Zygote stage)", "મોરુલા તબક્કે (Morula stage)", "બ્લાસ્ટોસિસ્ટ તબક્કે (Blastocyst stage)", "ગેસ્ટ્રુલા તબક્કે (Gastrula stage)"], "ans": 2, "exp": "માનવમાં આરોપણ બ્લાસ્ટોસિસ્ટ તબક્કે થાય છે કારણ કે આ તબક્કે ટ્રોફોબ્લાસ્ટ કોષો ગર્ભાશયની અંતઃસ્તર સાથે જોડાણ કરવા સક્ષમ બને છે. ફલિતાંડ અને મોરુલા તબક્કે આરોપણ માટે જરૂરી વિભેદન હજુ થયું હોતું નથી. ગેસ્ટ્રુલા તબક્કો આરોપણ બાદનો તબક્કો છે જેમાં ગર્ભસ્તરોનું નિર્માણ થાય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "આરોપણ દરમિયાન ટ્રોફોબ્લાસ્ટ કોષો દ્વારા સ્ત્રાવિત ઉત્સેચક કયો છે જે ગર્ભાશયની અંતઃસ્તરને ઓગાળવામાં મદદ કરે છે?", "opts": ["પ્રોટીએઝ (Protease)", "લાઇપેઝ (Lipase)", "એમાયલેઝ (Amylase)", "ટ્રાયપ્સિન (Trypsin)"], "ans": 0, "exp": "ટ્રોફોબ્લાસ્ટ કોષો પ્રોટીએઝ ઉત્સેચકનો સ્ત્રાવ કરે છે જે ગર્ભાશયની અંતઃસ્તરના પ્રોટીનને વિઘટિત કરી આરોપણ માટે જગ્યા બનાવે છે. લાઇપેઝ ચરબીનું પાચન કરે છે, એમાયલેઝ કાર્બોદિતનું પાચન કરે છે, અને ટ્રાયપ્સિન પાચનતંત્રમાં પ્રોટીનનું પાચન કરે છે જે આરોપણ સાથે સંકળાયેલ નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન આરોપણની પ્રક્રિયા માટે ખોટું છે?", "opts": ["આરોપણ ફક્ત પ્રાઇમેટ્સમાં જ થાય છે", "આરોપણ માટે ગર્ભાશયનું સ્ત્રાવી તબક્કો (Secretory phase) જરૂરી છે", "પ્રોજેસ્ટેરોન હોર્મોન આરોપણ માટે ગર્ભાશયને તૈયાર કરે છે", "આરોપણ દરમિયાન બ્લાસ્ટોસિસ્ટ ગર્ભાશયની અંતઃસ્તરમાં સંપૂર્ણપણે દાખલ થાય છે"], "ans": 0, "exp": "આરોપણ માત્ર પ્રાઇમેટ્સમાં જ નહીં, પરંતુ અન્ય સસ્તન પ્રાણીઓમાં પણ થાય છે. ગર્ભાશયનું સ્ત્રાવી તબક્કો પ્રોજેસ્ટેરોનના પ્રભાવ હેઠળ આરોપણ માટે જરૂરી છે. બ્લાસ્ટોસિસ્ટ ગર્ભાશયની અંતઃસ્તરમાં સંપૂર્ણપણે દાખલ થાય છે જે આરોપણની સાચી પ્રક્રિયા છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માનવમાં આરોપણની પ્રક્રિયા દરમિયાન બ્લાસ્ટોસિસ્ટના કયા ભાગમાંથી જરાયુ (Placenta) વિકસે છે?", "opts": ["આંતરકોષીય દ્રવ્ય (Inner cell mass)", "ટ્રોફોબ્લાસ્ટ (Trophoblast)", "બ્લાસ્ટોસીલ (Blastocoel)", "એપિબ્લાસ્ટ (Epiblast)"], "ans": 1, "exp": "જરાયુનો વિકાસ ટ્રોફોબ્લાસ્ટ કોષોમાંથી થાય છે જે બ્લાસ્ટોસિસ્ટના બાહ્ય સ્તરનું નિર્માણ કરે છે અને ગર્ભાશયની અંતઃસ્તર સાથે જોડાણ કરી પોષક તત્ત્વોનું પરિવહન કરે છે. આંતરકોષીય દ્રવ્યમાંથી ગર્ભ વિકસે છે, બ્લાસ્ટોસીલ પ્રવાહી ભરેલો પોલાણ છે, અને એપિબ્લાસ્ટ ગર્ભના વિકાસમાં ભાગ ભજવે છે પરંતુ જરાયુ સાથે સીધો સંબંધ નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું પરિબળ આરોપણની સફળતા માટે સૌથી વધુ જવાબદાર છે?", "opts": ["એસ્ટ્રોજન હોર્મોનનું ઊંચું પ્રમાણ", "ગર્ભાશયની અંતઃસ્તરનું પૂરતું જાડું થવું", "ફલિતાંડનું કદ", "શુક્રકોષની સંખ્યા"], "ans": 1, "exp": "ગર્ભાશયની અંતઃસ્તરનું પૂરતું જાડું થવું (પ્રોલિફેરેટિવ તબક્કો) પ્રોજેસ્ટેરોન હોર્મોનના પ્રભાવ હેઠળ આરોપણ માટે જરૂરી છે. એસ્ટ્રોજનનું ઊંચું પ્રમાણ ગર્ભાશયને તૈયાર કરવામાં મદદ કરે છે પરંતુ સીધી રીતે આરોપણ માટે જવાબદાર નથી. ફલિતાંડનું કદ અને શુક્રકોષની સંખ્યા આરોપણ સાથે સીધો સંબંધ ધરાવતા નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "આરોપણ પછી, બ્લાસ્ટોસિસ્ટના અંતર્ગત કોષપુંજ (Inner Cell Mass)માંથી કયા અંગતંત્રનું વિકાસ થતું નથી?", "opts": ["મગજ અને મજ્જાતંત્ર", "હૃદય અને રક્તવાહિનીઓ", "યકૃત અને પાચનતંત્ર", "જરાયુ અને અંતઃસ્ત્રાવી તંત્ર"], "ans": 3, "exp": "અંતર્ગત કોષપુંજ (ICM)માંથી ભ્રૂણના તમામ મુખ્ય અંગતંત્રો જેવા કે મગજ, હૃદય, યકૃત વગેરે વિકસે છે. જ્યારે જરાયુ (Placenta) અને અંતઃસ્ત્રાવી તંત્ર ટ્રોફોબ્લાસ્ટ કોષોમાંથી વિકસે છે, ન કે ICMમાંથી. તેથી D) ખોટું છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "આરોપણ દરમિયાન, બ્લાસ્ટોસિસ્ટના ટ્રોફોબ્લાસ્ટ કોષો દ્વારા સ્ત્રાવિત hCG (Human Chorionic Gonadotropin) હોર્મોનનું મુખ્ય કાર્ય કયું છે?", "opts": ["ગર્ભાશયની અંતઃસ્તરને પોષણ પૂરું પાડવું", "પીટ્યુટરી ગ્રંથિમાંથી પ્રોલેક્ટિન હોર્મોનનું સ્ત્રાવણ વર્ધવું", "કોર્પસ લ્યુટિયમને ટકાવી રાખવા અને પ્રોજેસ્ટેરોનનું સ્ત્રાવણ ચાલુ રાખવું", "ભ્રૂણના હૃદયના વિકાસને ઉત્તેજિત કરવું"], "ans": 2, "exp": "hCG હોર્મોનનું મુખ્ય કાર્ય કોર્પસ લ્યુટિયમને ટકાવી રાખવું અને પ્રોજેસ્ટેરોન હોર્મોનનું સ્ત્રાવણ ચાલુ રાખવું છે, જે આરોપણ અને ગર્ભાવસ્થા જાળવવા માટે જરૂરી છે. A) ગર્ભાશયની અંતઃસ્તરને પોષણ ટ્રોફોબ્લાસ્ટ દ્વારા પૂરું પડે છે, પરંતુ hCGનું આ પ્રાથમિક કાર્ય નથી. B) પ્રોલેક્ટિન સ્તનપાન સાથે સંબંધિત છે. D) hCG ભ્રૂણના હૃદયના વિકાસ સાથે સીધો સંબંધ ધરાવતું નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "આરોપણ દરમિયાન, બ્લાસ્ટોસિસ્ટની સફળતા માટે નીચેનામાંથી કયું પરિબળ સૌથી ઓછું મહત્વનું છે?", "opts": ["ગર્ભાશયની અંતઃસ્તરની પોષક તૈયારી", "બ્લાસ્ટોસિસ્ટના ટ્રોફોબ્લાસ્ટ કોષોની ક્રિયાશીલતા", "માતાના રક્તમાં ઓક્સિજનનું સ્તર", "hCG હોર્મોનનું સ્ત્રાવણ"], "ans": 2, "exp": "ગર્ભાશયની અંતઃસ્તરની પોષક તૈયારી (A), ટ્રોફોબ્લાસ્ટ કોષોની ક્રિયાશીલતા (B), અને hCG હોર્મોનનું સ્ત્રાવણ (D) આરોપણ માટે અત્યંત મહત્વપૂર્ણ છે. માતાના રક્તમાં ઓક્સિજનનું સ્તર (C) આરોપણ દરમિયાન સીધું મહત્વ ધરાવતું નથી, કારણ કે આરોપણના પ્રારંભિક તબક્કે ભ્રૂણ ઓક્સિજન પર આધારિત નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન આરોપણની પ્રક્રિયા દરમિયાન ટ્રોફોબ્લાસ્ટ કોષોની ભૂમિકા વિશે ખોટું છે?", "opts": ["ટ્રોફોબ્લાસ્ટ કોષો ગર્ભાશયની અંતઃસ્તરમાં પ્રવેશ કરે છે અને પોષક તત્ત્વોનું શોષણ કરે છે.", "ટ્રોફોબ્લાસ્ટ કોષો hCG હોર્મોનનું સ્ત્રાવણ કરે છે.", "ટ્રોફોબ્લાસ્ટ કોષો ભ્રૂણના મગજ અને મજ્જાતંત્રના વિકાસ માટે જવાબદાર છે.", "ટ્રોફોબ્લાસ્ટ કોષો જરાયુ (Placenta)ના નિર્માણમાં મહત્વની ભૂમિકા ભજવે છે."], "ans": 2, "exp": "ટ્રોફોબ્લાસ્ટ કોષો ગર્ભાશયની અંતઃસ્તરમાં પ્રવેશ કરે છે (A), hCG હોર્મોનનું સ્ત્રાવણ કરે છે (B), અને જરાયુના નિર્માણમાં મહત્વની ભૂમિકા ભજવે છે (D). પરંતુ ભ્રૂણના મગજ અને મજ્જાતંત્રનો વિકાસ અંતર્ગત કોષપુંજ (ICM)માંથી થાય છે, ન કે ટ્રોફોબ્લાસ્ટ કોષોમાંથી. તેથી C) ખોટું છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "આરોપણ પછી, બ્લાસ્ટોસિસ્ટના વિકાસ દરમિયાન નીચેનામાંથી કયું પગલું સૌપ્રથમ થતું નથી?", "opts": ["ટ્રોફોબ્લાસ્ટ કોષોની વિભાજન ક્રિયા", "અંતર્ગત કોષપુંજ (ICM)માંથી એમ્બ્રિયોનિક ડિસ્કનું નિર્માણ", "ગર્ભાશયની અંતઃસ્તરમાં રક્તવાહિનીઓનું વિકાસ", "hCG હોર્મોનનું સ્ત્રાવણ"], "ans": 1, "exp": "આરોપણ પછી, ટ્રોફોબ્લાસ્ટ કોષોની વિભાજન ક્રિયા (A) અને hCG હોર્મોનનું સ્ત્રાવણ (D) તરત જ શરૂ થાય છે. ગર્ભાશયની અંતઃસ્તરમાં રક્તવાહિનીઓનો વિકાસ (C) પણ આરોપણ પછી જલ્દી શરૂ થાય છે. પરંતુ અંતર્ગત કોષપુંજ (ICM)માંથી એમ્બ્રિયોનિક ડિસ્કનું નિર્માણ થોડા સમય પછી થાય છે, તેથી B) સૌપ્રથમ થતું નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "આરોપણ દરમિયાન, બ્લાસ્ટોસિસ્ટના અંતર્ગત કોષપુંજ (Inner Cell Mass)માંથી કયા અંગતંત્રનું વિકાસ થતું નથી?", "opts": ["ચેતાતંત્ર", "પરિવહનતંત્ર", "ટ્રોફોબ્લાસ્ટ", "ઉત્સર્જનતંત્ર"], "ans": 2, "exp": "અંતર્ગત કોષપુંજ (Inner Cell Mass)માંથી ગર્ભનું મુખ્ય શરીર વિકસે છે, જેમાં ચેતાતંત્ર, પરિવહનતંત્ર, અને ઉત્સર્જનતંત્રનો સમાવેશ થાય છે. ટ્રોફોબ્લાસ્ટ બ્લાસ્ટોસિસ્ટના બાહ્ય સ્તરમાંથી વિકસે છે અને જરાયુ (Placenta)નું નિર્માણ કરે છે. તેથી, ટ્રોફોબ્લાસ્ટ અંતર્ગત કોષપુંજમાંથી વિકસતું નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "આરોપણ દરમિયાન, ગર્ભાશયની અંતઃસ્તરમાં કયા પેશી પરિવર્તન થાય છે જે આરોપણને સહાય કરે છે?", "opts": ["એપિથેલિયલ કોષોનું વિકાસ", "રક્તવાહિનીઓનું વિસ્તરણ અને સ્ત્રાવી ગ્રંથીઓનું વિકાસ", "સ્નાયુ પેશીનું સંકોચન", "કોન્ડ્રોસાઇટ્સનું નિર્માણ"], "ans": 1, "exp": "ગર્ભાશયની અંતઃસ્તરમાં આરોપણ દરમિયાન રક્તવાહિનીઓનું વિસ્તરણ અને સ્ત્રાવી ગ્રંથીઓનું વિકાસ થાય છે, જે બ્લાસ્ટોસિસ્ટને પોષણ પૂરું પાડે છે. A) એપિથેલિયલ કોષોનું વિકાસ આરોપણ માટે સીધું જવાબદાર નથી. C) સ્નાયુ પેશીનું સંકોચન આરોપણને અવરોધે છે. D) કોન્ડ્રોસાઇટ્સનું નિર્માડકાંના વિકાસ સાથે સંબંધિત છે, ગર્ભાશયની અંતઃસ્તર સાથે નહીં.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન આરોપણ દરમિયાન બ્લાસ્ટોસિસ્ટ અને ગર્ભાશયની અંતઃસ્તર વચ્ચેના સંચાર માટે ખોટું છે?", "opts": ["બ્લાસ્ટોસિસ્ટ દ્વારા સ્ત્રાવિત hCG ગર્ભાશયની અંતઃસ્તરને આરોપણ માટે તૈયાર કરે છે", "ગર્ભાશયની અંતઃસ્તર દ્વારા સ્ત્રાવિત સાયટોકાઇન્સ બ્લાસ્ટોસિસ્ટના ટ્રોફોબ્લાસ્ટ કોષોને આકર્ષે છે", "બ્લાસ્ટોસિસ્ટના અંતર્ગત કોષપુંજ દ્વારા સ્ત્રાવિત ઉત્સેચકો ગર્ભાશયની અંતઃસ્તરને વિઘટન કરે છે", "ગર્ભાશયની અંતઃસ્તરમાં રક્તવાહિનીઓનો વિકાસ આરોપણ માટે જરૂરી પોષણ પૂરું પાડે છે"], "ans": 2, "exp": "બ્લાસ્ટોસિસ્ટના અંતર્ગત કોષપુંજ દ્વારા ઉત્સેચકો સ્ત્રાવિત થતાં નથી, જે ગર્ભાશયની અંતઃસ્તરને વિઘટન કરે. આરોપણ દરમિયાન ટ્રોફોબ્લાસ્ટ કોષો દ્વારા ઉત્સેચકો સ્ત્રાવિત થાય છે. A) hCG આરોપણ માટે ગર્ભાશયની અંતઃસ્તરને તૈયાર કરે છે, જે સાચું છે. B) સાયટોકાઇન્સ ટ્રોફોબ્લાસ્ટ કોષોને આકર્ષે છે, જે સાચું છે. D) રક્તવાહિનીઓનો વિકાસ પોષણ પૂરું પાડે છે, જે સાચું છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માનવ પ્રજનનમાં, આરોપણની પ્રક્રિયા દરમિયાન બ્લાસ્ટોસિસ્ટના ટ્રોફોબ્લાસ્ટ કોષો દ્વારા સ્ત્રાવિત હોર્મોન hCG (Human Chorionic Gonadotropin)નું મુખ્ય કાર્ય શું છે? પરંતુ નીચેનામાંથી કયું વિધાન hCGની ભૂમિકા વિશે અપૂર્ણ અથવા ખોટું છે?", "opts": ["hCG હોર્મોન કોર્પસ લ્યુટિયમને અવરોધે છે અને પ્રોજેસ્ટેરોનના સ્ત્રાવને જાળવી રાખે છે.", "hCG હોર્મોન ગર્ભાશયની અંતઃસ્તરમાં રુધિરવાહિનીઓના નિર્માણને પ્રેરિત કરે છે, જે આરોપણ માટે જરૂરી છે.", "hCG હોર્મોન માતાના પ્રતિરક્ષાતંત્રને દબાવીને ગર્ભને અસ્વીકાર થતો અટકાવે છે.", "hCG હોર્મોન ગર્ભાશયના સ્નાયુઓને સંકોચન માટે ઉત્તેજિત કરે છે, જે ગર્ભના સ્થાપનમાં મદદરૂપ થાય છે."], "ans": 3, "exp": "hCG હોર્મોનનું મુખ્ય કાર્ય કોર્પસ લ્યુટિયમને જાળવી રાખી પ્રોજેસ્ટેરોનના સ્ત્રાવને ચાલુ રાખવાનું છે, જે ગર્ભાશયની અંતઃસ્તરને સ્થિર રાખે છે અને ગર્ભના અસ્વીકારને અટકાવે છે. વિકલ્પ A, B અને Cમાં hCGની ભૂમિકા સાચી રીતે વર્ણવેલી છે. પરંતુ વિકલ્પ D ખોટો છે કારણ કે hCG હોર્મોન ગર્ભાશયના સ્નાયુઓને સંકોચન માટે ઉત્તેજિત કરતું નથી; તેના બદલે, પ્રોજેસ્ટેરોન ગર્ભાશયના સ્નાયુઓને શિથિલ રાખે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "આરોપણની પ્રક્રિયા દરમિયાન, બ્લાસ્ટોસિસ્ટ ગર્ભાશયની અંતઃસ્તરમાં સ્થાપિત થાય છે. આ પ્રક્રિયામાં નીચેનામાંથી કયું પરિવર્તન ગર્ભાશયની અંતઃસ્તરમાં થતું નથી, જે આરોપણ માટે જરૂરી છે?", "opts": ["ગર્ભાશયની અંતઃસ્તરના કોષો મોટા અને ગ્રંથિલ બને છે, જેને ડેસિડ્યુઅલ કોષો કહે છે.", "ગર્ભાશયની અંતઃસ્તરમાં રુધિરવાહિનીઓનું વિસ્તરણ થાય છે અને રુધિર પ્રવાહ વધે છે.", "ગર્ભાશયની અંતઃસ્તરના કોષોમાં ગ્લાયકોજન અને લિપિડનું પ્રમાણ વધે છે, જે ગર્ભને પોષણ પૂરું પાડે છે.", "ગર્ભાશયની અંતઃસ્તરના કોષોમાંથી પ્રોલેક્ટિન હોર્મોનનો સ્ત્રાવ થાય છે, જે ગર્ભના વિકાસને પ્રેરિત કરે છે."], "ans": 3, "exp": "આરોપણ દરમિયાન ગર્ભાશયની અંતઃસ્તરમાં મહત્વપૂર્ણ પરિવર્તન થાય છે, જેમાં ડેસિડ્યુઅલ કોષોનું નિર્માણ, રુધિરવાહિનીઓનું વિસ્તરણ અને ગ્લાયકોજન તથા લિપિડનું સંચય થાય છે (વિકલ્પ A, B અને C સાચા છે). પરંતુ વિકલ્પ D ખોટો છે કારણ કે પ્રોલેક્ટિન હોર્મોન ગર્ભાશયની અંતઃસ્તરમાંથી સ્ત્રાવિત થતું નથી; તે પિટ્યુટરી ગ્રંથિમાંથી સ્ત્રાવિત થાય છે અને દૂધ ઉત્પાદનમાં ભૂમિકા ભજવે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "આરોપણ દરમિયાન, બ્લાસ્ટોસિસ્ટની સફળ સ્થાપના માટે ગર્ભાશયની અંતઃસ્તરમાં કયા પેશી પરિવર્તન થાય છે, જે આરોપણને સરળ બનાવે છે?", "opts": ["અંતઃસ્તરના કોષોનું વિકાસ અને રક્તવાહિનીઓનું નિર્માણ", "અંતઃસ્તરના કોષોનું મૃત્યુ અને પડ ઘટવો", "અંતઃસ્તરના કોષોનું સંકોચન અને કડક બનવું", "અંતઃસ્તરના કોષોનું વિકાસ અને પેશીનું કડક બનવું"], "ans": 0, "exp": "આરોપણ દરમિયાન, ગર્ભાશયની અંતઃસ્તરમાં અંતઃસ્તરના કોષોનું વિકાસ અને રક્તવાહિનીઓનું નિર્માણ થાય છે, જે આરોપણને સરળ બનાવે છે. B) અંતઃસ્તરના કોષોનું મૃત્યુ અને પડ ઘટવો એ આરોપણ માટે અનુકૂળ નથી. C) અંતઃસ્તરના કોષોનું સંકોચન અને કડક બનવું એ આરોપણને અવરોધે છે. D) અંતઃસ્તરના કોષોનું વિકાસ અને પેશીનું કડક બનવું એ આરોપણ માટે અનુકૂળ નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "આરોપણ દરમિયાન, બ્લાસ્ટોસિસ્ટ અને ગર્ભાશયની અંતઃસ્તર વચ્ચેના સંચાર માટે કયું પરિબળ સૌથી મહત્વનું છે?", "opts": ["hCG હોર્મોનનું સ્ત્રાવણ", "ટ્રોફોબ્લાસ્ટ કોષો દ્વારા ઉત્સેચકોનું સ્ત્રાવણ", "ગર્ભાશયની અંતઃસ્તરમાં રક્તવાહિનીઓનું નિર્માણ", "બ્લાસ્ટોસિસ્ટના કોષોનું વિકાસ"], "ans": 1, "exp": "આરોપણ દરમિયાન, બ્લાસ્ટોસિસ્ટ અને ગર્ભાશયની અંતઃસ્તર વચ્ચેના સંચાર માટે ટ્રોફોબ્લાસ્ટ કોષો દ્વારા ઉત્સેચકોનું સ્ત્રાવણ સૌથી મહત્વનું છે, જે ગર્ભાશયની અંતઃસ્તરને ભેદી બનાવે છે. A) hCG હોર્મોનનું સ્ત્રાવણ એ કોર્પસ લ્યુટિયમને કાયમી રાખવા માટે મહત્વનું છે. C) ગર્ભાશયની અંતઃસ્તરમાં રક્તવાહિનીઓનું નિર્માણ એ આરોપણ પછીના તબક્કામાં મહત્વનું છે. D) બ્લાસ્ટોસિસ્ટના કોષોનું વિકાસ એ આરોપણ પછીના તબક્કામાં મહત્વનું છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન આરોપણ દરમિયાન ટ્રોફોબ્લાસ્ટ કોષોની ભૂમિકા વિશે ખોટું છે?", "opts": ["ટ્રોફોબ્લાસ્ટ કોષો ગર્ભાશયની અંતઃસ્તરને ભેદી બનાવે છે", "ટ્રોફોબ્લાસ્ટ કોષો hCG હોર્મોનનું સ્ત્રાવણ કરે છે", "ટ્રોફોબ્લાસ્ટ કોષો બ્લાસ્ટોસિસ્ટને પોષણ પૂરું પાડે છે", "ટ્રોફોબ્લાસ્ટ કોષો જરાયુ (Placenta)નું નિર્માણ કરે છે"], "ans": 2, "exp": "ટ્રોફોબ્લાસ્ટ કોષો ગર્ભાશયની અંતઃસ્તરને ભેદી બનાવે છે (A), hCG હોર્મોનનું સ્ત્રાવણ કરે છે (B), અને જરાયુ (Placenta)નું નિર્માણ કરે છે (D). પરંતુ બ્લાસ્ટોસિસ્ટને પોષણ પૂરું પાડવું એ અંતર્ગત કોષપુંજ (Inner Cell Mass)નું કાર્ય છે, ટ્રોફોબ્લાસ્ટ કોષોનું નહીં. તેથી, C) ખોટું વિધાન છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "આરોપણ દરમિયાન, બ્લાસ્ટોસિસ્ટ ગર્ભાશયની અંતઃસ્તરમાં સ્થાપિત થાય છે. નીચેનામાંથી કયું વિધાન આ પ્રક્રિયા દરમિયાન ગર્ભાશયની અંતઃસ્તરમાં થતાં પેશી પરિવર્તનો વિશે ખોટું છે?", "opts": ["અંતઃસ્તરના સ્ત્રાવી કોષો (Glandular cells) વિકસીને મ્યુકોઇડ સ્ત્રાવનો સ્રાવ વધારે છે", "અંતઃસ્તરની રક્તવાહિનીઓમાં સ્થિતિસ્થાપક પેશી (Elastic tissue)નો વિકાસ થાય છે", "અંતઃસ્તરના સ્તરમાં ડેસિડ્યુઅલ કોષો (Decidual cells)નું નિર્માણ થાય છે", "અંતઃસ્તરની રક્તવાહિનીઓમાં સ્ફીંગોમાયેલિન (Sphingomyelin)નું પ્રમાણ ઘટે છે"], "ans": 1, "exp": "આરોપણ દરમિયાન ગર્ભાશયની અંતઃસ્તરમાં ડેસિડ્યુઅલ કોષોનું નિર્માણ (C), મ્યુકોઇડ સ્ત્રાવનો વધારો (A), અને રક્તવાહિનીઓમાં સ્ફીંગોમાયેલિનનું પ્રમાણ ઘટવું (D) થાય છે, જે આરોપણને સહાય કરે છે. પરંતુ સ્થિતિસ્થાપક પેશીનો વિકાસ (B) આ પ્રક્રિયામાં થતું નથી, કારણ કે અંતઃસ્તરમાં મુખ્યત્વે સંયોજક પેશી અને રક્તવાહિનીઓનો વિકાસ થાય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માનવ પ્રજનનમાં, આરોપણની પ્રક્રિયા દરમિયાન બ્લાસ્ટોસિસ્ટ ગર્ભાશયની અંતઃસ્તરમાં સ્થાપિત થાય છે. આ પ્રક્રિયા દરમિયાન નીચેનામાંથી કયું વિધાન અપવાદરૂપ ગણી શકાય?", "opts": ["આરોપણ દરમિયાન ટ્રોફોબ્લાસ્ટ કોષો પ્રોટીઓલિટિક ઉત્સેચકોનો સ્ત્રાવ કરી ગર્ભાશયની અંતઃસ્તરને વિઘટિત કરે છે", "આરોપણ દરમિયાન ગર્ભાશયની અંતઃસ્તરમાં ડેસિડ્યુઅલ કોષોનું નિર્માણ થાય છે જે પોષણ પૂરું પાડે છે", "આરોપણ દરમિયાન બ્લાસ્ટોસિસ્ટના અંતર્ગત કોષપુંજમાંથી ભવિષ્યના ગર્ભના તમામ પેશીઓ અને અંગો વિકસે છે", "આરોપણ દરમિયાન બ્લાસ્ટોસિસ્ટ ગર્ભાશયની અંતઃસ્તરમાં સંપૂર્ણપણે સમાઈ જાય છે અને બાહ્ય પર્યાવરણથી સંપર્ક ગુમાવે છે"], "ans": 3, "exp": "સાચો જવાબ વિકલ્પ D છે. આરોપણ દરમિયાન બ્લાસ્ટોસિસ્ટ ગર્ભાશયની અંતઃસ્તરમાં સ્થાપિત થાય છે, પરંતુ તે સંપૂર્ણપણે સમાઈ જતો નથી કે બાહ્ય પર્યાવરણથી સંપર્ક ગુમાવતો નથી. બ્લાસ્ટોસિસ્ટનો એક ભાગ ગર્ભાશયની અંતઃસ્તરમાં સ્થાપિત થાય છે, જ્યારે બાકીનો ભાગ ગર્ભાશયના પોલાણમાં ખુલ્લો રહે છે. આથી આ વિધાન અપવાદરૂપ ગણી શકાય.\n\nવિકલ્પ A ખોટો છે કારણ કે ટ્રોફોબ્લાસ્ટ કોષો પ્રોટીઓલિટિક ઉત્સેચકોનો સ્ત્રાવ કરી ગર્ભાશયની અંતઃસ્તરને વિઘટિત કરે છે, જે આરોપણ માટે જરૂરી છે.\n\nવિકલ્પ B ખોટો છે કારણ કે ગર્ભાશયની અંતઃસ્તરમાં ડેસિડ્યુઅલ કોષોનું નિર્માણ થાય છે જે ગર્ભને પોષણ પૂરું પાડે છે.\n\nવિકલ્પ C ખોટો છે કારણ કે બ્લાસ્ટોસિસ્ટના અંતર્ગત કોષપુંજમાંથી ભવિષ્યના ગર્ભના તમામ પેશીઓ અને અંગો વિકસે છે, જે સાચું છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
