<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>બાયોસ્ફિયર રિઝર્વ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>બાયોસ્ફિયર રિઝર્વ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">બાયોસ્ફિયર રિઝર્વ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ભારતમાં આવેલા નીચેના બાયોસ્ફિયર રિઝર્વ પૈકી કયું એક યુનેસ્કોના 'મેન એન્ડ બાયોસ્ફિયર પ્રોગ્રામ' હેઠળ સૌપ્રથમ સમાવેશ પામ્યું હતું?", "opts": ["નીલગિરી બાયોસ્ફિયર રિઝર્વ", "નંદાદેવી બાયોસ્ફિયર રિઝર્વ", "સુંદરવન બાયોસ્ફિયર રિઝર્વ", "ગ્રેટ નિકોબાર બાયોસ્ફિયર રિઝર્વ"], "ans": 0, "exp": "નીલગિરી બાયોસ્ફિયર રિઝર્વ (1986) એ ભારતનું પ્રથમ બાયોસ્ફિયર રિઝર્વ છે જે યુનેસ્કોના 'મેન એન્ડ બાયોસ્ફિયર પ્રોગ્રામ' હેઠળ સમાવેશ પામ્યું હતું. નંદાદેવી (1988), સુંદરવન (1989) અને ગ્રેટ નિકોબાર (2013) પછીથી સમાવેશ પામ્યા હતા. આથી વિકલ્પ A સાચો છે, જ્યારે અન્ય વિકલ્પો સમયાનુસાર ખોટા છે.", "ref": "Std 12 - પ્રકરણ 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "બાયોસ્ફિયર રિઝર્વના 'બફર ઝોન' વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["બફર ઝોનમાં મર્યાદિત માનવ પ્રવૃત્તિઓની છૂટ આપવામાં આવે છે.", "બફર ઝોનનો મુખ્ય હેતુ વન્યજીવન અને માનવ વસવાટ વચ્ચે સંતુલન જાળવવાનો છે.", "બફર ઝોનમાં સંશોધન અને શિક્ષણ પ્રવૃત્તિઓ પર સંપૂર્ણ પ્રતિબંધ હોય છે.", "બફર ઝોન કોર ઝોન અને ટ્રાન્ઝિશન ઝોન વચ્ચે આવેલું હોય છે."], "ans": 2, "exp": "બફર ઝોનમાં સંશોધન, શિક્ષણ અને મર્યાદિત પર્યટન જેવી પ્રવૃત્તિઓને મંજૂરી આપવામાં આવે છે, પરંતુ સંપૂર્ણ પ્રતિબંધ હોતો નથી. તેથી વિકલ્પ C ખોટું છે. અન્ય વિકલ્પો બફર ઝોનની વ્યાખ્યા અને કાર્ય સાથે સુસંગત છે.", "ref": "Std 12 - પ્રકરણ 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "નીચેના પૈકી કયું બાયોસ્ફિયર રિઝર્વ ગુજરાત રાજ્યમાં આવેલું નથી, પરંતુ તેની સરહદ નજીક આવેલું છે?", "opts": ["કચ્છનું નાનું રણ બાયોસ્ફિયર રિઝર્વ", "કોલ્ડ ડેઝર્ટ બાયોસ્ફિયર રિઝર્વ", "સુંદરવન બાયોસ્ફિયર રિઝર્વ", "પન્ના બાયોસ્ફિયર રિઝર્વ"], "ans": 1, "exp": "કોલ્ડ ડેઝર્ટ બાયોસ્ફિયર રિઝર્વ હિમાચલ પ્રદેશ અને લદ્દાખમાં આવેલું છે, જે ગુજરાતની ઉત્તર સરહદ નજીક છે, પરંતુ ગુજરાતમાં નથી. કચ્છનું નાનું રણ ગુજરાતમાં છે, જ્યારે સુંદરવન પશ્ચિમ બંગાળમાં અને પન્ના મધ્ય પ્રદેશમાં આવેલું છે. આથી વિકલ્પ B સાચો છે.", "ref": "Std 12 - પ્રકરણ 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "બાયોસ્ફિયર રિઝર્વના સંદર્ભમાં 'ટ્રાન્ઝિશન ઝોન' વિશે નીચેનામાંથી કયું વિધાન યોગ્ય નથી?", "opts": ["ટ્રાન્ઝિશન ઝોનમાં માનવ વસવાટ અને કૃષિ પ્રવૃત્તિઓને પ્રોત્સાહન આપવામાં આવે છે.", "ટ્રાન્ઝિશન ઝોન બફર ઝોનની બહાર આવેલું હોય છે.", "ટ્રાન્ઝિશન ઝોનમાં વન્યજીવનના સંરક્ષણ માટે કડક કાયદાકીય નિયંત્રણો લાગુ પડે છે.", "ટ્રાન્ઝિશન ઝોનનો હેતુ સ્થાનિક સમુદાયોની આર્થિક પ્રવૃત્તિઓને ટકાવી રાખવાનો છે."], "ans": 2, "exp": "ટ્રાન્ઝિશન ઝોનમાં વન્યજીવનના સંરક્ષણ માટે કડક નિયંત્રણો લાગુ પડતા નથી, કારણ કે આ ઝોનમાં માનવ પ્રવૃત્તિઓને પ્રાથમિકતા આપવામાં આવે છે. તેથી વિકલ્પ C ખોટું છે. અન્ય વિકલ્પો ટ્રાન્ઝિશન ઝોનની લાક્ષણિકતાઓ સાથે સુસંગત છે.", "ref": "Std 12 - પ્રકરણ 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "ભારતના કયા બાયોસ્ફિયર રિઝર્વમાં 'સુંદરી' નામનું મેન્ગ્રોવ વૃક્ષ વિશેષ પ્રમાણમાં જોવા મળે છે, જે તેના નામ સાથે સંકળાયેલું છે?", "opts": ["નંદાદેવી બાયોસ્ફિયર રિઝર્વ", "સુંદરવન બાયોસ્ફિયર રિઝર્વ", "માનસ બાયોસ્ફિયર રિઝર્વ", "પચમઢી બાયોસ્ફિયર રિઝર્વ"], "ans": 1, "exp": "સુંદરવન બાયોસ્ફિયર રિઝર્વ તેના નામ પ્રમાણે 'સુંદરી' નામના મેન્ગ્રોવ વૃક્ષ માટે પ્રખ્યાત છે. આ વૃક્ષ ગંગા-બ્રહ્મપુત્રા ડેલ્ટા વિસ્તારમાં વિપુલ પ્રમાણમાં જોવા મળે છે. અન્ય વિકલ્પોમાં આ પ્રકારના મેન્ગ્રોવ વૃક્ષો જોવા મળતા નથી.", "ref": "Std 12 - પ્રકરણ 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "નીચેના પૈકી કયું બાયોસ્ફિયર રિઝર્વ ભારતના પૂર્વોત્તર વિસ્તારમાં આવેલું નથી, પરંતુ તેનું મુખ્ય લક્ષણ ઉષ્ણકટિબંધીય વરસાદી જંગલો છે?", "opts": ["નોકરેક", "ડિહાંગ-ડિબાંગ", "સુંદરવન", "મનાસ"], "ans": 2, "exp": "સુંદરવન બાયોસ્ફિયર રિઝર્વ પશ્ચિમ બંગાળમાં આવેલું છે અને તે ઉષ્ણકટિબંધીય વરસાદી જંગલો તથા મેન્ગ્રોવ વનસ્પતિ માટે પ્રખ્યાત છે. નોકરેક, ડિહાંગ-ડિબાંગ અને મનાસ પૂર્વોત્તર ભારતમાં આવેલા છે. આથી સાચો જવાબ સુંદરવન છે, કારણ કે તે પૂર્વોત્તર વિસ્તારમાં નથી, પરંતુ તેનું મુખ્ય લક્ષણ ઉષ્ણકટિબંધીય વરસાદી જંગલો છે.", "ref": "Std 12 - પ્રકરણ 14: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "બાયોસ્ફિયર રિઝર્વના 'કોર ઝોન' વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?\n1. આ ઝોનમાં માનવ પ્રવૃત્તિઓ પર સંપૂર્ણ પ્રતિબંધ હોય છે.\n2. આ ઝોનમાં વન્યજીવોના સંરક્ષણ માટે સંશોધન અને નિરીક્ષણની મંજૂરી હોય છે.\n3. આ ઝોનમાં સ્થાનિક લોકોને પરંપરાગત રીતે જીવનનિર્વાહ માટે પ્રવેશ આપવામાં આવે છે.\n4. આ ઝ યોસ્ફિયર રિઝર્વ ભારતમાં આવેલું છે, પરંતુ તે યુનેસ્કોના 'વર્લ્ડ નેટવર્ક ઓફ બાયોસ્ફિયર રિઝર્વ'માં સમાવિષ્ટ નથી. સિમલીપાલ, નંદાદેવી અને નોકરેક યુનેસ્કોના નેટવર્કમાં સમાવિષ્ટ છે. આથી સાચો જવાબ કચ્છનું મોટું રણ છે.", "ref": "Std 12 - પ્રકરણ 14: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "બાયોસ્ફિયર રિઝર્વના સંદર્ભમાં, 'કોર ઝોન' અને 'બફર ઝોન' વચ્ચેના સંક્રમણ ક્ષેત્રને કયા નામે ઓળખવામાં આવે છે, જ્યાં માનવીની ક્રિયાઓને નિયંત્રિત રીતે પરવાનગી આપવામાં આવે છે?", "opts": ["ટ્રાન્ઝિશન ઝોન", "મેનિપ્યુલેશન ઝોન", "રેસ્ટોરેશન ઝોન", "પ્રોટેક્શન ઝોન"], "ans": 0, "exp": "કોર ઝોન અને બફર ઝોન વચ્ચેનું ક્ષેત્ર 'ટ્રાન્ઝિશન ઝોન' તરીકે ઓળખાય છે, જ્યાં માનવીની ક્રિયાઓને નિયંત્રિત રીતે પરવાનગી આપવામાં આવે છે. મેનિપ્યુલેશન ઝોન, રેસ્ટોરેશન ઝોન અને પ્રોટેક્શન ઝોન એ બાયોસ્ફિયર રિઝર્વના અલગ અલગ ભાગો છે, પરંતુ તે ટ્રાન્ઝિશન ઝોનના સમાનાર્થી નથી.", "ref": "Std 12 - Chapter 16: પર્યાવરણ અને તેના સંબંધિત મુદ્દાઓ", "ch": ""}, {"q": "ભારતના કયા બાયોસ્ફિયર રિઝર્વમાં 'નીલગિરી તહર' (Nilgiri Tahr) નામનું દુર્લભ સસ્તન પ્રાણી જોવા મળે છે, જેને IUCN દ્વારા 'લુપ્તપ્રાય' (Endangered) ઘોષિત કરવામાં આવ્યું છે?", "opts": ["નીલગિરી બાયોસ્ફિયર રિઝર્વ", "અગસ્ત્યમલાઇ બાયોસ્ફિયર રિઝર્વ", "સુંદરબન બાયોસ્ફિયર રિઝર્વ", "ગ્રેટ નિકોબાર બાયોસ્ફિયર રિઝર્વ"], "ans": 0, "exp": "નીલગિરી તહર એ નીલગિરી બાયોસ્ફિયર રિઝર્વમાં જોવા મળતું દુર્લભ સસ્તન પ્રાણી છે. અગસ્ત્યમલાઇ, સુંદરબન અને ગ્રેટ નિકોબાર બાયોસ્ફિયર રિઝર્વમાં આ પ્રાણી જોવા મળતું નથી.", "ref": "Std 12 - Chapter 16: પર્યાવરણ અને તેના સંબંધિત મુદ્દાઓ", "ch": ""}, {"q": "બાયોસ્ફિયર રિઝર્વના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન 'યુનેસ્કો મેન એન્ડ બાયોસ્ફિયર (MAB) પ્રોગ્રામ' વિશે ખોટું છે?", "opts": ["આ પ્રોગ્રામ ૧૯૭૧માં શરૂ કરવામાં આવ્યો હતો.", "આ પ્રોગ્રામનો ઉદ્દેશ્ય માનવી અને પર્યાવરણ વચ્ચેના સંતુલનને પ્રોત્સાહન આપવાનો છે.", "આ પ્રોગ્રામ હેઠળ બાયોસ્ફિયર રિઝર્વને ત્રણ ઝોનમાં વહેંચવામાં આવે છે.", "આ પ્રોગ્રામનો મુખ્ય ફોકસ માત્ર વન્યજીવ સંરક્ષણ પર છે."], "ans": 3, "exp": "યુનેસ્કો MAB પ્રોગ્રામનો મુખ્ય ફોકસ માત્ર વન્યજીવ સંરક્ષણ પર નથી, પરંતુ તે માનવી અને પર્યાવરણ વચ્ચેના સંતુલનને પ્રોત્સાહન આપવાનો છે. બાકીના તમામ વિધાનો સાચાં છે.", "ref": "Std 12 - Chapter 16: પર્યાવરણ અને તેના સંબંધિત મુદ્દાઓ", "ch": ""}, {"q": "ભારતના કયા બાયોસ્ફિયર રિઝર્વમાં 'કેજીનગર' (Kaziranga) રાષ્ટ્રીય ઉદ્યાન આવેલું છે, જે એક વર્લ્ડ હેરિટેજ સાઇટ પણ છે?", "opts": ["મનાસ બાયોસ્ફિયર રિઝર્વ", "નોક્રેક બાયોસ્ફિયર રિઝર્વ", "કાઝીરંગા બાયોસ્ફિયર રિઝર્વ", "દિબ્રુ-સૈખોવા બાયોસ્ફિયર રિઝર્વ"], "ans": 2, "exp": "કેજીનગર રાષ્ટ્રીય ઉદ્યાન કાઝીરંગા બાયોસ્ફિયર રિઝર્વમાં આવેલું છે. મનાસ, નોક્રેક અને દિબ્રુ-સૈખોવા બાયોસ્ફિયર રિઝર્વમાં આ ઉદ્યાન આવેલું નથી.", "ref": "Std 12 - Chapter 16: પર્યાવરણ અને તેના સંબંધિત મુદ્દાઓ", "ch": ""}, {"q": "બાયોસ્ફિયર રિઝર્વના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન 'કોર ઝોન' અને 'બફર ઝોન' વચ્ચેના સંક્રમણ ક્ષેત્રની લાક્ષણિકતા દર્શાવતું નથી?", "opts": ["આ ક્ષેત્રમાં મર્યાદિત માનવ હસ્તક્ષેપની પરવાનગી આપવામાં આવે છે, જેમ કે સંશોધન અને શિક્ષણ હેતુઓ માટે.", "આ ક્ષેત્રમાં વસ્તીની ઘનતા સૌથી ઓછી હોય છે અને તેને સંરક્ષિત ક્ષેત્ર તરીકે ગણવામાં આવે છે.", "આ ક્ષેત્રમાં પર્યાવરણીય સંતુલન જાળવવા માટે પરંપરાગત કૃષિ પદ્ધતિઓને પ્રોત્સાહન આપવામાં આવે છે.", "આ ક્ષેત્રમાં વન્યજીવન અને વનસ્પતિની જૈવવિવિધતાનું સંરક્ષણ અને અભ્યાસ કરવામાં આવે છે."], "ans": 1, "exp": "કોર ઝોન અને બફર ઝોન વચ્ચેનું સંક્રમણ ક્ષેત્ર (ટ્રાન્ઝિશન ઝોન) એટલે 'માનવ-પ્રભાવિત ક્ષેત્ર' હોય છે, જ્યાં મર્યાદિત માનવ હસ્તક્ષેપની પરવાનગી આપવામાં આવે છે (A યોગ્ય છે). આ ક્ષેત્રમાં પરંપરાગત કૃષિ પદ્ધતિઓને પ્રોત્સાહન આપવામાં આવે છે (C યોગ્ય છે) અને વન્યજીવન અને વનસ્પતિની જૈવવિવિધતાનું અભ્યાસ કરવામાં આવે છે (D યોગ્ય છે). પરંતુ કોર ઝોનમાં જ વસ્તીની ઘનતા સૌથી ઓછી હોય છે અને તેને સંરક્ષિત ક્ષેત્ર તરીકે ગણવામાં આવે છે, સંક્રમણ ક્ષેત્રમાં નહીં (B ખોટું છે).", "ref": "Std 12 - Chapter 16: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "બાયોસ્ફિયર રિઝર્વના સંદર્ભમાં, 'કોર ઝોન'માં નીચેનામાંથી કયું કૃત્ય સૌથી યોગ્ય રીતે પરવાનગી આપવામાં આવે છે?", "opts": ["વૈજ્ઞાનિક સંશોધન અને જૈવવિવિધતાનું નિરીક્ષણ", "મર્યાદિત પર્યટન અને વન્યજીવન અવલોકન", "કૃષિ કામગીરી અને પશુપાલન", "શિકાર અને લાકડાનું કાપણી"], "ans": 0, "exp": "કોર ઝોન બાયોસ્ફિયર રિઝર્વનો સૌથી સંરક્ષિત ભાગ છે, જ્યાં માનવીની હસ્તક્ષેપ ન્યૂનતમ હોય છે. અહીં વૈજ્ઞાનિક સંશોધન અને જૈવવિવિધતાનું નિરીક્ષણ જ યોગ્ય રીતે પરવાનગી આપવામાં આવે છે. મર્યાદિત પર્યટન (B) બફર ઝોનમાં, કૃષિ કામગીરી (C) ટ્રાન્ઝિશન ઝોનમાં, અને શિકાર/લાકડાનું કાપણી (D) કોઈપણ ઝોનમાં પરવાનગી આપવામાં આવતી નથી.", "ref": "Std 12 - Chapter 16: પર્યાવરણના મુદ્દા (બાયોસ્ફિયર રિઝર્વ)", "ch": ""}, {"q": "ભારતના કયા બાયોસ્ફિયર રિઝર્વમાં 'ગ્રેટ ઇન્ડિયન બસ્ટર્ડ' (Great Indian Bustard) નામનું લુપ્તપ્રાય પક્ષી જોવા મળે છે, જેને IUCN દ્વારા ગંભીર જોખમમાં મૂકવામાં આવ્યું છે?", "opts": ["કચ્છનું રણ", "સુંદરબન", "નીલગિરી", "મનાસ"], "ans": 0, "exp": "ગ્રેટ ઇન્ડિયન બસ્ટર્ડ ભારતના કચ્છના રણ બાયોસ્ફિયર રિઝર્વમાં જોવા મળે છે. સુંદરબન (B) મેન્ગ્રોવ વૃક્ષો અને રોયલ બેંગાલ ટાઇગર માટે, નીલગિરી (C) નીલગિરી તહર માટે, અને મનાસ (D) એક-શિંગવાળા ગેંડા માટે પ્રસિદ્ધ છે.", "ref": "Std 12 - Chapter 16: પર્યાવરણના મુદ્દા (ભારતના બાયોસ્ફિયર રિઝર્વ)", "ch": ""}, {"q": "બાયોસ્ફિયર રિઝર્વના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન 'ટ્રાન્ઝિશન ઝોન' વિશે ખોટું છે?", "opts": ["અહીં માનવીની ક્રિયાઓને સંપૂર્ણપણે પ્રતિબંધિત કરવામાં આવે છે.", "અહીં કૃષિ, વસવાટ અને હલકી ઉદ્યોગિક ક્રિયાઓની પરવાનગી આપવામાં આવે છે.", "આ ઝોન કોર અને બફર ઝોનની બહાર આવેલો હોય છે.", "આ ઝોનમાં સ્થાનિક સમુદાયોની સહભાગિતા મહત્વની હોય છે."], "ans": 0, "exp": "ટ્રાન્ઝિશન ઝોનમાં માનવીની ક્રિયાઓને સંપૂર્ણપણે પ્રતિબંધિત કરવામાં આવતી નથી (A ખોટું). અહીં કૃષિ, વસવાટ અને હલકી ઉદ્યોગિક ક્રિયાઓની પરવાનગી આપવામાં આવે છે (B સાચું). આ ઝોન કોર અને બફર ઝોનની બહાર આવેલો હોય છે (C સાચું), અને સ્થાનિક સમુદાયોની સહભાગિતા મહત્વની હોય છે (D સાચું).", "ref": "Std 12 - Chapter 16: પર્યાવરણના મુદ્દા (બાયોસ્ફિયર રિઝર્વના ઝોન)", "ch": ""}, {"q": "ભારતના કયા બાયોસ્ફિયર રિઝર્વમાં 'કેજીરંગા રાષ્ટ્રીય ઉદ્યાન' આવેલું છે, જે એક-શિંગવાળા ગેંડા માટે પ્રસિદ્ધ છે?", "opts": ["મનાસ", "નોક્રેક", "કાઝીરંગા", "સિમલીપાલ"], "ans": 2, "exp": "કેજીરંગા રાષ્ટ્રીય ઉદ્યાન આસામ રાજ્યમાં આવેલું છે અને તે એક-શિંગવાળા ગેંડા માટે પ્રસિદ્ધ છે. મનાસ (A) આસામમાં જ આવેલું છે પરંતુ ગેંડા માટે પ્રસિદ્ધ નથી, નોક્રેક (B) મેઘાલયમાં આવેલું છે, અને સિમલીપાલ (D) ઓડિશામાં આવેલું છે.", "ref": "Std 12 - Chapter 16: પર્યાવરણના મુદ્દા (ભારતના બાયોસ્ફિયર રિઝર્વ)", "ch": ""}, {"q": "ભારતના નીચેના બાયોસ્ફિયર રિઝર્વ પૈકી કયું એક એવું છે જેમાં 'કોર ઝોન'નો સમાવેશ એક કરતાં વધુ રાજ્યોમાં થાય છે, પરંતુ તેનું મુખ્ય મથક માત્ર એક જ રાજ્યમાં આવેલું છે?", "opts": ["નંદાદેવી બાયોસ્ફિયર રિઝર્વ", "સુંદરવન બાયોસ્ફિયર રિઝર્વ", "નીલગિરી બાયોસ્ફિયર રિઝર્વ", "માનસ બાયોસ્ફિયર રિઝર્વ"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C) નીલગિરી બાયોસ્ફિયર રિઝર્વ છે. આ બાયોસ્ફિયર રિઝર્વનો 'કોર ઝોન' તમિલનાડુ, કેરળ અને કર્ણાટક એમ ત્રણ રાજ્યોમાં ફેલાયેલો છે, પરંતુ તેનું મુખ્ય મથક તમિલનાડુના નીલગિરી જિલ્લામાં આવેલું છે. વિકલ્પ A) નંદાદેવી બાયોસ્ફિયર રિઝર્વનો 'કોર ઝોન' માત્ર ઉત્તરાખંડ રાજ્યમાં જ આવેલો છે. વિકલ્પ B) સુંદરવન બાયોસ્ફિયર રિઝર્વનો 'કોર ઝોન' પશ્ચિમ બંગાળ રાજ્યમાં જ સમાયેલો છે. વિકલ્પ D) માનસ બાયોસ્ફિયર રિઝર્વનો 'કોર ઝોન' માત્ર આસામ રાજ્યમાં જ આવેલો છે.", "ref": "Std 12 - પ્રકરણ 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
