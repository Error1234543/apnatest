<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ગટર શુદ્ધિકરણ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ગટર શુદ્ધિકરણ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ગટર શુદ્ધિકરણ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ગટર શુદ્ધિકરણના પ્રાથમિક સારવાર તબક્કામાં નીચેનામાંથી કયું કાર્ય થતું નથી?", "opts": ["અવસાદન દ્વારા ભારે ઘન પદાર્થોને દૂર કરવું", "તરતા પદાર્થોને સ્કિમિંગ દ્વારા દૂર કરવું", "કાર્બનિક પદાર્થોનું જૈવિક વિઘટન કરવું", "ગટરના પ્રવાહને સમાન રીતે વિતરિત કરવું"], "ans": 2, "exp": "પ્રાથમિક સારવારમાં ભૌતિક પદ્ધતિઓ જેમ કે અવસાદન અને સ્કિમિંગ દ્વારા ઘન પદાર્થો દૂર કરવામાં આવે છે, જ્યારે કાર્બનિક પદાર્થોનું જૈવિક વિઘટન દ્વિતીયક સારવારમાં થાય છે. વિકલ્પ C ખોટો છે કારણ કે તે જૈવિક પ્રક્રિયા છે જે પ્રાથમિક તબક્કામાં થતી નથી. વિકલ્પ A અને B પ્રાથમિક સારવારના ભાગ છે, જ્યારે D પ્રવાહના નિયમન માટે જરૂરી છે.", "ref": "Std 12 - પ્રકરણ 16: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "ગટર શુદ્ધિકરણમાં વપરાતા 'એનએરોબિક સ્લજ ડાયજેસ્ટર'માં મુખ્યત્વે કયો ઉત્સેચક પ્રક્રિયામાં સક્રિય હોય છે?", "opts": ["સેલ્યુલેઝ", "પ્રોટીએઝ", "લાઇપેઝ", "મિથેનોજેનિક ઉત્સેચકો"], "ans": 0, "exp": "એનએરોબિક સ્લજ ડાયજેસ્ટરમાં કાર્બનિક પદાર્થોનું વિઘટન મિથેનોજેનિક બેક્ટેરિયા દ્વારા થાય છે, જે મિથેનોજેનિક ઉત્સેચકોનો ઉપયોગ કરીને મિથેન અને કાર્બન ડાયોક્સાઇડ ઉત્પન્ન કરે છે. વિકલ્પ A, B અને C અન્ય ઉત્સેચકો છે જે ચોક્કસ પદાર્થોનું વિઘટન કરે છે, પરંતુ એનએરોબિક ડાયજેસ્ટરમાં મુખ્ય ભૂમિકા મિથેનોજેનિક ઉત્સેચકોની હોય છે.", "ref": "Std 12 - પ્રકરણ 10: માનવ કલ્યાણમાં સૂક્ષ્મજીવો", "ch": ""}, {"q": "ગટર શુદ્ધિકરણના દ્વિતીયક તબક્કામાં વપરાતા 'ટ્રિકલિંગ ફિલ્ટર'માં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["તે જૈવિક ફિલ્મ દ્વારા કાર્બનિક પદાર્થોનું ઓક્સિડેશન કરે છે", "તેમાં વપરાતી સામગ્રી સામાન્ય રીતે પથ્થર કે પ્લાસ્ટિકની હોય છે", "તે એનએરોબિક પરિસ્થિતિમાં કાર્ય કરે છે", "તે ગટરમાંથી નાઇટ્રોજન અને ફોસ્ફરસ દૂર કરવામાં મદદરૂપ છે"], "ans": 2, "exp": "ટ્રિકલિંગ ફિલ્ટર એરોબિક પરિસ્થિતિમાં કાર્ય કરે છે, જ્યાં જૈવિક ફિલ્મ દ્વારા કાર્બનિક પદાર્થોનું ઓક્સિડેશન થાય છે. વિકલ્પ C ખોટો છે કારણ કે તે એનએરોબિક નહીં, પરંતુ એરોબિક પ્રક્રિયા છે. વિકલ્પ A, B અને D સાચાં છે કારણ કે તે ટ્રિકલિંગ ફિલ્ટરની લાક્ષણિકતાઓ છે.", "ref": "Std 12 - પ્રકરણ 16: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "ગટર શુદ્ધિકરણમાં 'સક્રિય સ્લજ પદ્ધતિ'માં નીચેનામાંથી કયું પરિબળ પ્રક્રિયાની કાર્યક્ષમતા ઘટાડી શકે છે?", "opts": ["સ્લજની વધુ પડતી માત્રા", "ઓક્સિજનનું યોગ્ય પ્રમાણ", "pHનું તટસ્થ સ્તર (6.5-8.5)", "તાપમાનનું નિયંત્રણ (20-30°C)"], "ans": 0, "exp": "સક્રિય સ્લજ પદ્ધતિમાં સ્લજની વધુ પડતી માત્રા પ્રક્રિયાની કાર્યક્ષમતા ઘટાડી શકે છે કારણ કે તે ઓક્સિજનના પ્રસરણમાં અવરોધ ઉભો કરે છે અને સૂક્ષ્મજીવોની પ્રવૃત્તિને અસર કરે છે. વિકલ્પ B, C અને D પ્રક્રિયાની કાર્યક્ષમતા વધારવામાં મદદરૂપ પરિબળો છે.", "ref": "Std 12 - પ્રકરણ 10: માનવ કલ્યાણમાં સૂક્ષ્મજીવો", "ch": ""}, {"q": "ગટર શુદ્ધિકરણના તૃતીયક તબક્કામાં નીચેનામાંથી કયું કાર્ય થતું નથી?", "opts": ["રોગકારક સૂક્ષ્મજીવોનું નિષ્ક્રિયીકરણ", "કાર્બનિક પદાર્થોનું જૈવિક વિઘટન", "નાઇટ્રોજન અને ફોસ્ફરસનું રાસાયણિક અવક્ષેપન", "અવશેષ ઘન પદાર્થોનું ફિલ્ટરેશન"], "ans": 1, "exp": "તૃતીયક સારવારમાં રોગકારક સૂક્ષ્મજીવોને દૂર કરવા, પોષક તત્ત્વો (નાઇટ્રોજન અને ફોસ્ફરસ)નું અવક્ષેપન અને અવશેષ ઘન પદાર્થોનું ફિલ્ટરેશન થાય છે. વિકલ્પ B ખોટો છે કારણ કે કાર્બનિક પદાર્થોનું જૈવિક વિઘટન દ્વિતીયક સારવારમાં થાય છે, તૃતીયક સારવારમાં નહીં. વિકલ્પ A, C અને D તૃતીયક સારવારના ભાગ છે.", "ref": "Std 12 - પ્રકરણ 16: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "ગટર શુદ્ધિકરણની પ્રક્રિયામાં 'અપફ્લો એનએરોબિક સ્લજ બ્લેન્કેટ (UASB)' રિએક્ટરમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["આ રિએક્ટરમાં સૂક્ષ્મજીવો ગ્રાન્યુલ્સ સ્વરૂપે એકત્રિત થાય છે", "UASB રિએક્ટરમાં મિથેન અને કાર્બન ડાયોક્સાઇડનું ઉત્પાદન થાય છે", "આ રિએક્ટરમાં પ્રક્રિયા માટે ઓક્સિજનની જરૂર પડે છે", "આ પદ્ધતિ ઉચ્ચ કાર્બનિક ભારવાળા ગટરના શુદ્ધિકરણ માટે અસરકારક છે"], "ans": 2, "exp": "'અપફ્લો એનએરોબિક સ્લજ બ્લેન્કેટ (UASB)' રિએક્ટર એનએરોબિક (ઓક્સિજન વગરની) પ્રક્રિયા છે, જેમાં સૂક્ષ્મજીવો ગ્રાન્યુલ્સ સ્વરૂપે એકત્રિત થાય છે અને મિથેન તથા કાર્બન ડાયોક્સાઇડ ઉત્પન્ન થાય છે. ઓક્સિજનની જરૂર ન હોવાથી વિકલ્પ C ખોટો છે. UASB ઉચ્ચ કાર્બનિક ભારવાળા ગટર માટે અસરકારક છે.", "ref": "Std 12 - પ્રકરણ 10: માનવ કલ્યાણમાં સૂક્ષ્મજીવો", "ch": ""}, {"q": "ગટર શુદ્ધિકરણના દ્વિતીયક તબક્કામાં વપરાતી 'સક્રિય સ્લજ પદ્ધતિ'માં નીચેનામાંથી કયું પરિબળ સૂક્ષ્મજીવોની વૃદ્ધિને અવરોધે છે, પરંતુ પ્રક્રિયાની કાર્યક્ષમતા પર સીધી અસર કરતું નથી?", "opts": ["તાપમાનમાં અચાનક વધારો", "ગટરમાં ભારે ધાતુઓની હાજરી", "pH મૂલ્યમાં હળવો ઘટાડો (6.5 થી 5.5)", "પ્રકાશની હાજરી"], "ans": 3, "exp": "સક્રિય સ્લજ પદ્ધતિમાં સૂક્ષ્મજીવોની વૃદ્ધિ માટે આદર્શ pH 6.5-8.5 હોય છે. pHમાં હળવો ઘટાડો (6.5 થી 5.5) સૂક્ષ્મજીવોની વૃદ્ધિને અવરોધે છે, પરંતુ પ્રક્રિયાની કાર્યક્ષમતા પર સીધી અસર ઓછી થાય છે. તાપમાનમાં અચાનક વધારો અને ભારે ધાતુઓ સૂક્ષ્મજીવોને નુકસાન પહોંચાડે છે, જ્યારે પ્રકાશની હાજરી સૂક્ષ્મજીવોની પ્રક્રિયા પર કોઈ અસર કરતી નથી.", "ref": "Std 12 - પ્રકરણ 10: માનવ કલ્યાણમાં સૂક્ષ્મજીવો", "ch": ""}, {"q": "ગટર શુદ્ધિકરણની પ્રક્રિયામાં 'બાયોફિલ્ટર'નો ઉપયોગ કરવામાં આવે છે. નીચેનામાંથી કયું વિધાન આ પદ્ધતિ માટે ખોટું છે?", "opts": ["બાયોફિલ્ટરમાં સૂક્ષ્મજીવોની પાતળી ફિલ્મ સપાટી પર રચાય છે", "આ પદ્ધતિમાં ગટરને ફિલ્ટર મીડિયા પર છાંટવામાં આવે છે", "બાયોફિલ્ટરમાં એનએરોબિક સ્થિતિ જાળવવામાં આવે છે", "આ પદ્ધતિ કાર્બનિક પદાર્થોના વિઘટન માટે અસરકારક છે"], "ans": 2, "exp": "બાયોફિલ્ટરમાં એરોબિક સ્થિતિ જાળવવામાં આવે છે, જેમાં સૂક્ષ્મજીવોની પાતળી ફિલ્મ સપાટી પર રચાય છે અને ગટરને ફિલ્ટર મીડિયા પર છાંટવામાં આવે છે. આ પદ્ધતિ કાર્બનિક પદાર્થોના વિઘટન માટે અસરકારક છે. વિકલ્પ C ખોટો છે કારણ કે બાયોફિલ્ટરમાં એનએરોબિક સ્થિતિ હોતી નથી.", "ref": "Std 12 - પ્રકરણ 10: માનવ કલ્યાણમાં સૂક્ષ્મજીવો", "ch": ""}, {"q": "ગટર શુદ્ધિકરણના તૃતીયક તબક્કામાં 'રિવર્સ ઓસ્મોસિસ' પદ્ધતિનો ઉપયોગ થાય છે. આ પદ્ધતિ માટે નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["રિવર્સ ઓસ્મોસિસમાં અર્ધપારગમ્ય પટલનો ઉપયોગ થાય છે", "આ પદ્ધતિ દ્વારા દ્રાવ્ય ક્ષારો અને સૂક્ષ્મ કણો દૂર થાય છે", "રિવર્સ ઓસ્મોસિસમાં ઉચ્ચ દબાણની જરૂર પડે છે", "આ પદ્ધતિ કાર્બનિક પદાર્થોના વિઘટન માટે વપરાય છે"], "ans": 3, "exp": "રિવર્સ ઓસ્મોસિસ પદ્ધતિ દ્વારા દ્રાવ્ય ક્ષારો અને સૂક્ષ્મ કણો દૂર કરવામાં આવે છે, જેમાં અર્ધપારગમ્ય પટલ અને ઉચ્ચ દબાણનો ઉપયોગ થાય છે. આ પદ્ધતિ કાર્બનિક પદાર્થોના વિઘટન માટે નહીં, પરંતુ અકાર્બનિક દ્રાવ્ય પદાર્થો દૂર કરવા માટે વપરાય છે. તેથી વિકલ્પ D ખોટો છે.", "ref": "Std 12 - પ્રકરણ 10: માનવ કલ્યાણમાં સૂક્ષ્મજીવો", "ch": ""}, {"q": "ગટર શુદ્ધિકરણની પ્રક્રિયામાં 'એનએરોબિક ડાયજેશન' દરમિયાન નીચેનામાંથી કયું ઉત્પાદન મુખ્યત્વે ઉત્પન્ન થતું નથી?", "opts": ["મિથેન (CH₄)", "કાર્બન ડાયોક્સાઇડ (CO₂)", "હાઇડ્રોજન સલ્ફાઇડ (H₂S)", "ઓક્સિજન (O₂)"], "ans": 3, "exp": "'એનએરોબિક ડાયજેશન' એ ઓક્સિજન વગરની પ્રક્રિયા છે, જેમાં મુખ્યત્વે મિથેન (CH₄), કાર્બન ડાયોક્સાઇડ (CO₂) અને હાઇડ્રોજન સલ્ફાઇડ (H₂S) ઉત્પન્ન થાય છે. ઓક્સિજન (O₂) એનએરોબિક પ્રક્રિયામાં ઉત્પન્ન થતું નથી, તેથી વિકલ્પ D ખોટો છે.", "ref": "Std 12 - પ્રકરણ 10: માનવ કલ્યાણમાં સૂક્ષ્મજીવો", "ch": ""}, {"q": "ગટર શુદ્ધિકરણની પ્રક્રિયામાં 'એનેરોબિક ડાયજેશન' દરમિયાન ઉત્પન્ન થતા મિથેન ગેસનું પ્રમાણ કયા પરિબળ પર આધાર રાખતું નથી?", "opts": ["ટેમ્પરેચર (તાપમાન)", "pH સ્તર", "ગટરમાં રહેલા કલોરાઇડ આયનની માત્રા", "સબસ્ટ્રેટની સાંદ્રતા"], "ans": 2, "exp": "મિથેન ગેસનું ઉત્પાદન એનેરોબિક ડાયજેશન દરમિયાન મુખ્યત્વે તાપમાન, pH સ્તર અને સબસ્ટ્રેટની સાંદ્રતા પર આધાર રાખે છે. કલોરાઇડ આયનની માત્રા મિથેન ઉત્પાદનને સીધી અસર કરતી નથી, પરંતુ તે સૂક્ષ્મજીવોની કાર્યક્ષમતા પર અસર કરી શકે છે. તાપમાન અને pH સ્તર મિથેનોજેનિક બેક્ટેરિયાની ક્રિયાશીલતાને પ્રભાવિત કરે છે, જ્યારે સબસ્ટ્રેટની સાંદ્રતા ઉત્પાદનની માત્રા નક્કી કરે છે.", "ref": "Std 12 - પર્યાવરણ શાસ્ત્ર: ગટર શુદ્ધિકરણ અને કચરો વ્યવસ્થાપન", "ch": ""}, {"q": "ગટર શુદ્ધિકરણના તૃતીયક તબક્કામાં 'યુવી ડિસઇન્ફેક્શન' પદ્ધતિનો ઉપયોગ કરવામાં આવે છે. નીચેનામાંથી કયું વિધાન આ પદ્ધતિ વિશે ખોટું છે?", "opts": ["તે રોગકારક સૂક્ષ્મજીવોને મારવા માટે અલ્ટ્રાવાયોલેટ કિરણોનો ઉપયોગ કરે છે.", "આ પદ્ધતિ રાસાયણિક ડિસઇન્ફેક્ટન્ટ્સ જેવી કે ક્લોરિન પર આધાર રાખતી નથી.", "યુવી કિરણો પાણીના રંગ અને દ્રાવ્ય પદાર્થો દ્વારા શોષાઈ શકે છે, જે તેની કાર્યક્ષમતાને ઘટાડે છે.", "યુવી ડિસઇન્ફેક્શન પદ્ધતિ ગટરમાં રહેલા ભારેપણા ધરાવતા ધાતુઓને દૂર કરે છે."], "ans": 3, "exp": "યુવી ડિસઇન્ફેક્શન પદ્ધતિ રોગકારક સૂક્ષ્મજીવોને મારવા માટે અલ્ટ્રાવાયોલેટ કિરણોનો ઉપયોગ કરે છે અને તે રાસાયણિક ડિસઇન્ફેક્ટન્ટ્સ પર આધાર રાખતી નથી. યુવી કિરણો પાણીના રંગ અને દ્રાવ્ય પદાર્થો દ્વારા શોષાઈ શકે છે, જે તેની કાર્યક્ષમતાને ઘટાડે છે. પરંતુ, આ પદ્ધતિ ભારેપણા ધરાવતા ધાતુઓને દૂર કરતી નથી, તે માત્ર સૂક્ષ્મજીવોને નિષ્ક્રિય કરે છે.", "ref": "Std 12 - પર્યાવરણ શાસ્ત્ર: પાણી શુદ્ધિકરણ તકનીકો", "ch": ""}, {"q": "ગટર શુદ્ધિકરણની પ્રક્રિયામાં 'સ્લજ ડ્રાયિંગ બેડ'નો ઉપયોગ કરવામાં આવે છે. નીચેનામાંથી કયું પરિબળ સ્લજના સૂકવણીની પ્રક્રિયાને સૌથી વધુ પ્રભાવિત કરે છે?", "opts": ["હવાનું તાપમાન", "હવાની આર્દ્રતા", "સ્લજમાં રહેલા જૈવિક પદાર્થોની માત્રા", "સ્લજના સ્તરની જાડાઈ"], "ans": 1, "exp": "સ્લજ ડ્રાયિંગ બેડમાં સ્લજના સૂકવણીની પ્રક્રિયા મુખ્યત્વે હવાની આર્દ્રતા પર આધાર રાખે છે. જ્યારે હવાની આર્દ્રતા ઓછી હોય છે, ત્યારે પાણીનું બાષ્પીભવન વધુ ઝડપથી થાય છે. હવાનું તાપમાન, સ્લજમાં રહેલા જૈવિક પદાર્થોની માત્રા અને સ્લજના સ્તરની જાડાઈ પણ અસર કરે છે, પરંતુ હવાની આર્દ્રતા સૌથી મહત્વપૂર્ણ પરિબળ છે.", "ref": "Std 12 - પર્યાવરણ શાસ્ત્ર: ગટર શુદ્ધિકરણની તકનીકો", "ch": ""}, {"q": "ગટર શુદ્ધિકરણની પ્રક્રિયામાં 'એક્ટિવેટેડ સ્લજ' પદ્ધતિમાં, નીચેનામાંથી કયું વિધાન 'સ્લજ વય' (Sludge Age) વિશે સાચું છે?", "opts": ["સ્લજ વય એટલે સ્લજમાં રહેલા સૂક્ષ્મજીવોની સરેરાશ આયુષ્ય છે.", "સ્લજ વય ઘટાડવાથી સ્લજનું ઉત્પાદન વધે છે.", "સ્લજ વય વધારવાથી સ્લજની સેટલેબિલિટી ઘટે છે.", "સ્લજ વય એ સ્લજના ઉત્પાદન અને ગટરના પ્રવાહ દરનો ગુણોત્તર છે."], "ans": 0, "exp": "સ્લજ વય એ સ્લજમાં રહેલા સૂક્ષ્મજીવોની સરેરાશ આયુષ્યને દર્શાવે છે. સ્લજ વય ઘટાડવાથી સૂક્ષ્મજીવોની વૃદ્ધિ વધે છે, જે સ્લજનું ઉત્પાદન વધારે છે. સ્લજ વય વધારવાથી સૂક્ષ્મજીવોની વૃદ્ધિ ધીમી પડે છે, જે સ્લજની સેટલેબિલિટી સુધારે છે. સ્લજ વય એ સ્લજના ઉત્પાદન અને ગટરના પ્રવાહ દરનો ગુણોત્તર નથી, પરંતુ તે સૂક્ષ્મજીવોની વૃદ્ધિ દર અને સ્લજના ઉત્પાદનને પ્રભાવિત કરે છે.", "ref": "Std 12 - પર્યાવરણ શાસ્ત્ર: જૈવિક ગટર શુદ્ધિકરણ પદ્ધતિઓ", "ch": ""}, {"q": "ગટર શુદ્ધિકરણની પ્રક્રિયામાં 'બાયોરિમીડિયેશન' પદ્ધતિનો ઉપયોગ કરવામાં આવે છે. નીચેનામાંથી કયું વિધાન આ પદ્ધતિ વિશે સાચું નથી?", "opts": ["આ પદ્ધતિમાં ભારેપણા ધરાવતા ધાતુઓને દૂર કરવા માટે સૂક્ષ્મજીવોનો ઉપયોગ થાય છે.", "બાયોરિમીડિયેશન પદ્ધતિ મુખ્યત્વે એનેરોબિક પરિસ્થિતિઓમાં જ કાર્ય કરે છે.", "આ પદ્ધતિમાં સૂક્ષ્મજીવો ભારેપણા ધરાવતા ધાતુઓને કીલેટિંગ એજન્ટ્સ દ્વારા અલગ કરે છે.", "બાયોરિમીડિયેશન પદ્ધતિ ગટરમાં રહેલા કાર્બનિક પ્રદૂષકોને પણ દૂર કરી શકે છે."], "ans": 1, "exp": "બાયોરિમીડિયેશન પદ્ધતિમાં ભારેપણા ધરાવતા ધાતુઓને દૂર કરવા માટે સૂક્ષ્મજીવોનો ઉપયોગ થાય છે અને તે એરોબિક તેમજ એનેરોબિક પરિસ્થિતિઓમાં કાર્ય કરે છે. સૂક્ષ્મજીવો ભારેપણા ધરાવતા ધાતુઓને કીલેટિંગ એજન્ટ્સ દ્વારા અલગ કરે છે અને આ પદ્ધતિ ગટરમાં રહેલા કાર્બનિક પ્રદૂષકોને પણ દૂર કરી શકે છે. પરંતુ, આ પદ્ધતિ મુખ્યત્વે એનેરોબિક પરિસ્થિતિઓમાં જ કાર્ય કરે છે તે વિધાન ખોટું છે.", "ref": "Std 12 - પર્યાવરણ શાસ્ત્ર: જૈવિક અને રાસાયણિક ગટર શુદ્ધિકરણ", "ch": ""}, {"q": "ગટર શુદ્ધિકરણની પ્રક્રિયામાં 'અનુકૂળ સૂક્ષ્મજીવી કોલોની' (Bioaugmentation)નો ઉપયોગ કરવામાં આવે છે. નીચેનામાંથી કયું વિધાન આ પદ્ધતિ વિશે ખોટું છે?", "opts": ["આ પદ્ધતિમાં વિશિષ્ટ સૂક્ષ્મજીવોને ગટરમાં ઉમેરવામાં આવે છે જેથી પ્રદૂષકોનો ઝડપી વિઘટન થાય.", "આ પદ્ધતિ મુખ્યત્વે જટિલ કાર્બનિક પ્રદૂષકો જેવા કે ફિનોલ, પેસ્ટિસાઇડ્સ વગેરેના વિઘટન માટે ઉપયોગી છે.", "આ પદ્ધતિમાં સૂક્ષ્મજીવોની વસતીને કૃત્રિમ રીતે વધારીને પ્રક્રિયાને વેગ આપવામાં આવે છે, પરંતુ તે માટે ઓક્સિજનની જરૂરિયાત રહેતી નથી.", "આ પદ્ધતિનો ઉપયોગ મુખ્યત્વે દ્વિતીયક શુદ્ધિકરણ તબક્કામાં થાય છે જ્યાં જૈવિક પ્રક્રિયાઓ મહત્વની ભૂમિકા ભજવે છે."], "ans": 2, "exp": "વિકલ્પ C ખોટો છે કારણ કે 'અનુકૂળ સૂક્ષ્મજીવી કોલોની' પદ્ધતિમાં સૂક્ષ્મજીવોની વસતીને કૃત્રિમ રીતે વધારીને પ્રક્રિયાને વેગ આપવામાં આવે છે, પરંતુ એનરોબિક સૂક્ષ્મજીવો માટે ઓક્સિજનની જરૂરિયાત રહેતી નથી, જ્યારે એરોબિક સૂક્ષ્મજીવો માટે ઓક્સિજન જરૂરી હોય છે. વિકલ્પ A, B, અને D સાચા છે કારણ કે આ પદ્ધતિ વિશિષ્ટ સૂક્ષ્મજીવો ઉમેરીને પ્રદૂષકોનો વિઘટન કરે છે, જટિલ કાર્બનિક પ્રદૂષકો માટે ઉપયોગી છે, અને દ્વિતીયક શુદ્ધિકરણ તબક્કામાં ઉપયોગ થાય છે.", "ref": "Std 12 - Chapter 16: પર્યાવરણ અને પ્રદૂષણ (વિજ્ઞાન પ્રવાહ)", "ch": ""}, {"q": "ગટર શુદ્ધિકરણની પ્રક્રિયામાં 'મેમ્બ્રેન બાયોરિએક્ટર (MBR)' તકનીકનો ઉપયોગ કરવામાં આવે છે. નીચેનામાંથી કયું વિધાન આ તકનીક વિશે સાચું નથી?", "opts": ["MBRમાં મેમ્બ્રેન ફિલ્ટરેશન અને જૈવિક શુદ્ધિકરણ એકસાથે થાય છે.", "આ તકનીકમાં સ્લજની સાંદ્રતા ઓછી રાખવામાં આવે છે જેથી મેમ્બ્રેનનું જીવન વધે.", "MBR તકનીક દ્વારા શુદ્ધિકરણની કાર્યક્ષમતા વધે છે અને શુદ્ધ પાણીની ગુણવત્તા       '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
