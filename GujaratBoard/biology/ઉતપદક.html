<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ઉત્પાદકો</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ઉત્પાદકો</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ઉત્પાદકો</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 42 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 42 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "નીચેનામાંથી કયો વિકલ્પ ઉત્પાદકો (પ્રોડ્યુસર્સ) માટે સાચો નથી?", "opts": ["તેઓ પ્રકાશસંશ્લેષણ દ્વારા કાર્બોદિતોનું સંશ્લેષણ કરે છે", "તેઓ પોતાના ખોરાકનું ઉત્પાદન સ્વયં કરે છે", "તેઓ હમેશા સજીવ જીવો હોય છે", "તેઓ ખોરાક શૃંખલાનો પાયો બનાવે છે"], "ans": 2, "exp": "ઉત્પાદકો (પ્રોડ્યુસર્સ) પ્રકાશસંશ્લેષણ દ્વારા કાર્બોદિતોનું સંશ્લેષણ કરે છે (A સાચું), પોતાના ખોરાકનું ઉત્પાદન સ્વયં કરે છે (B સાચું), અને ખોરાક શૃંખલાનો પાયો બનાવે છે (D સાચું). પરંતુ ઉત્પાદકો હમેશા સજીવ જીવો નથી હોતા — ઉદાહરણ તરીકે, કેટલાક બેક્ટેરિયા અને સાયનોબેક્ટેરિયા પણ ઉત્પાદકો તરીકે કામ કરે છે, જે એકકોષી સજીવો છે. પરંતુ વિકલ્પ Cમાં 'હમેશા સજીવ જીવો' એવું કહેવામાં આવ્યું છે, જે ખોટું છે કારણ કે ઉત્પાદકો સજીવ અથવા અસજીવ (જેમ કે કેટલાક રસાયણિક પ્રક્રિયાઓ દ્વારા) પણ હોઈ શકે, પરંતુ GSEB પાઠ્યપુસ્તક મુજબ ઉત્પાદકો મુખ્યત્વે સજીવ જીવો (પ્લાન્ટ્સ, શેવાળ વગેરે) હોય છે. પરંતુ અહીં વિકલ્પ C અતિશયોક્તિ છે, જે ખોટો છે.", "ref": "Std 11 - પ્રકરણ 14: પારિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "જે ઉત્પાદકો પાણીમાં રહે છે અને પ્રકાશસંશ્લેષણ દ્વારા ઓક્સિજન ઉત્પન્ન કરે છે, તેમને શું કહેવાય છે?", "opts": ["હરિતકણધારી પેશી", "ફાયટોપ્લાંકટન", "જલીય વનસ્પતિ", "ક્લોરોફિલ યુક્ત બેક્ટેરિયા"], "ans": 1, "exp": "ફાયટોપ્લાંકટન (B) પાણીમાં રહેતા સૂક્ષ્મ ઉત્પાદકો છે જે પ્રકાશસંશ્લેષણ દ્વારા ઓક્સિજન ઉત્પન્ન કરે છે. હરિતકણધારી પેશી (A) સ્થળચર વનસ્પતિઓમાં જોવા મળે છે. જલીય વનસ્પતિ (C) મોટા પાણીના છોડ છે, પરંતુ ફાયટોપ્લાંકટન સૂક્ષ્મ હોય છે. ક્લોરોફિલ યુક્ત બેક્ટેરિયા (D) કેટલાક બેક્ટેરિયા હોઈ શકે, પરંતુ ફાયટોપ્લાંકટન મુખ્યત્વે શેવાળ અને સૂક્ષ્મ વનસ્પતિઓનો સમાવેશ કરે છે.", "ref": "Std 11 - પ્રકરણ 14: પારિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્પાદક પ્રકાશસંશ્લેષણ માટે ક્લોરોફિલના બદલે બેક્ટેરિયોક્લોરોફિલનો ઉપયોગ કરે છે?", "opts": ["સાયનોબેક્ટેરિયા", "રાફલેસિયા", "પર્પલ બેક્ટેરિયા", "યુગ્લીના"], "ans": 2, "exp": "પર્પલ બેક્ટેરિયા (C) પ્રકાશસંશ્લેષણ માટે બેક્ટેરિયોક્લોરોફિલનો ઉપયોગ કરે છે. સાયનોબેક્ટેરિયા (A) ક્લોરોફિલનો ઉપયોગ કરે છે. રાફલેસિયા (B) પરોપજીવી છે અને પ્રકાશસંશ્લેષણ કરતું નથી. યુગ્લીના (D) ક્લોરોફિલ ધરાવે છે.", "ref": "Std 11 - પ્રકરણ 13: વનસ્પતિ જીવન અને તેની વિવિધતા", "ch": ""}, {"q": "ઉત્પાદકો દ્વારા પ્રકાશસંશ્લેષણ દરમિયાન કયા પદાર્થનું ઉત્પાદન થતું નથી?", "opts": ["ગ્લુકોઝ", "ઓક્સિજન", "કાર્બન ડાયોક્સાઇડ", "પાણી"], "ans": 2, "exp": "પ્રકાશસંશ્લેષણ દરમિયાન ઉત્પાદકો ગ્લુકોઝ (A) અને ઓક્સિજન (B) ઉત્પન્ન કરે છે, અને પાણી (D) વપરાય છે. કાર્બન ડાયોક્સાઇડ (C) પ્રકાશસંશ્લેષણ માટે કચરો પદાર્થ નથી, પરંતુ તે પ્રક્રિયાનો કચરો પદાર્થ નથી — તે પ્રકાશસંશ્લેષણમાં વપરાતો કચરો પદાર્થ છે. પરંતુ પ્રશ્નમાં પૂછવામાં આવ્યું છે કે કયા પદાર્થનું ઉત્પાદન થતું નથી, તો કાર્બન ડાયોક્સાઇડ પ્રકાશસંશ્લેષણ દરમિયાન ઉત્પન્ન થતું નથી, પરંતુ શ્વસન દરમિયાન ઉત્પન્ન થાય છે.", "ref": "Std 11 - પ્રકરણ 13: વનસ્પતિ શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્પાદક અંધારામાં પણ પ્રકાશસંશ્લેષણ કરી શકે છે?", "opts": ["ક્લોરેલા", "કેમોલાઇનોબેક્ટેરિયમ", "સ્પાઇરુલિના", "વોલ્વોક્સ"], "ans": 1, "exp": "કેમોલાઇનોબેક્ટેરિયમ (B) કેમોસિંથેટિક બેક્ટેરિયા છે જે અંધારામાં રાસાયણિક ઊર્જાનો ઉપયોગ કરીને ખોરાક ઉત્પન્ન કરે છે. ક્લોરેલા (A), સ્પાઇરુલિના (C), અને વોલ્વોક્સ (D) પ્રકાશસંશ્લેષણ માટે પ્રકાશની જરૂર પડે છે.", "ref": "Std 11 - પ્રકરણ 14: પારિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "જલીય પર્યાવરણમાં રહેતા ઉત્પાદકો દ્વારા પ્રકાશસંશ્લેષણ દરમિયાન કયો પદાર્થ ઉત્પન્ન થતો નથી, પરંતુ તેની હાજરીથી પ્રકાશસંશ્લેષણની ક્રિયા પ્રભાવિત થાય છે?", "opts": ["ઓક્સિજન", "ગ્લુકોઝ", "કાર્બન ડાયોક્સાઇડ", "હાઇડ્રોજન સલ્ફાઇડ"], "ans": 3, "exp": "જલીય ઉત્પાદકો (જેવા કે સાયનોબેક્ટેરિયા) પ્રકાશસંશ્લેષણ દરમિયાન ઓક્સિજન (A), ગ્લુકોઝ (B), અને કાર્બન ડાયોક્સાઇડ (C) ઉત્પન્ન કરે છે અથવા વાપરે છે. પરંતુ હાઇડ્રોજન સલ્ફાઇડ (D) પ્રકાશસંશ્લેષણની ક્રિયા દરમિયાન ઉત્પન્ન થતો નથી, પરંતુ તેની હાજરીથી પ્રકાશસંશ્લેષણની ક્રિયા પ્રભાવિત થઈ શકે છે, ખાસ કરીને અમુક સલ્ફર બેક્ટેરિયામાં.", "ref": "Std 11 - અધ્યાય 13: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્પાદક પ્રકાશસંશ્લેષણ માટે ક્લોરોફિલ a અને b નો ઉપયોગ કરતો નથી, પરંતુ અન્ય વર્ણકોનો ઉપયોગ કરે છે?", "opts": ["શેવાળ (Algae)", "વનસ્પતિ (Plants)", "રેડ એલગા (Rhodophyta)", "બ્લૂ-ગ્રીન એલગા (Cyanobacteria)"], "ans": 2, "exp": "રેડ એલગા (Rhodophyta) (C) પ્રકાશસંશ્લેષણ માટે ક્લોરોફિલ a અને b નો ઉપયોગ કરતું નથી, પરંતુ તે ફાઇકોએરિથ્રિન અને ફાઇકોસાયનિન જેવા વર્ણકોનો ઉપયોગ કરે છે. શેવાળ (A), વનસ્પતિ (B), અને બ્લૂ-ગ્રીન એલગા (D) ક્લોરોફિલ a અને b નો ઉપયોગ કરે છે.", "ref": "Std 11 - અધ્યાય 13: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "જે ઉત્પાદકો અંધારામાં પ્રકાશસંશ્લેષણ કરી શકે છે તે માટે નીચેનામાંથી કયો વિકલ્પ સાચો છે?", "opts": ["તે કેમોસિંથેટિક ઉત્પાદકો છે", "તે ક્લોરોફિલ ધરાવતા ઉત્પાદકો છે", "તે સૂર્યપ્રકાશની જરૂર વગર પ્રકાશસંશ્લેષણ કરે છે", "તે હંમેશા જલીય પર્યાવરણમાં જોવા મળે છે"], "ans": 0, "exp": "અંધારામાં પ્રકાશસંશ્લેષણ કરી શકતા ઉત્પાદકો (જેવા કે કેમોસિંથેટિક બેક્ટેરિયા) કેમોસિંથેટિક ઉત્પાદકો (A) છે, જે રાસાયણિક ઊર્જાનો ઉપયોગ કરે છે. ક્લોરોફિલ ધરાવતા ઉત્પાદકો (B) સૂર્યપ્રકાશની જરૂર પડે છે. સૂર્યપ્રકાશની જરૂર વગર પ્રકાશસંશ્લેષણ કરવું (C) ખોટું છે કારણ કે કેમોસિંથેટિક ઉત્પાદકો પ્રકાશસંશ્લેષણ કરતા નથી, પરંતુ કેમોસિંથેસિસ કરે છે. તે હંમેશા જલીય પર્યાવરણમાં જોવા મળે છે (D) પણ ખોટું છે કારણ કે કેમોસિંથેટિક બેક્ટેરિયા જમીનમાં પણ જોવા મળે છે.", "ref": "Std 11 - અધ્યાય 14: શ્વસન અને ઊર્જા વહન", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્પાદક પ્રકાશસંશ્લેષણ દરમિયાન ઓક્સિજન ઉત્પન્ન કરતો નથી, પરંતુ કાર્બન ડાયોક્સાઇડનો ઉપયોગ કરે છે?", "opts": ["હરિત કવક (Green Algae)", "સાયનોબેક્ટેરિયા (Cyanobacteria)", "રેડ એલગા (Rhodophyta)", "પર્પલ બેક્ટેરિયા (Purple Bacteria)"], "ans": 3, "exp": "પર્પલ બેક્ટેરિયા (D) પ્રકાશસંશ્લેષણ દરમિયાન ઓક્સિજન ઉત્પન્ન કરતું નથી, પરંતુ તે કાર્બન ડાયોક્સાઇડનો ઉપયોગ કરે છે અને હાઇડ્રોજન સલ્ફાઇડ અથવા અન્ય સલ્ફર યોગિકોને ઇલેક્ટ્રોન દાતા તરીકે વાપરે છે. હરિત કવક (A), સાયનોબેક્ટેરિયા (B), અને રેડ એલગા (C) ઓક્સિજન ઉત્પન્ન કરે છે.", "ref": "Std 11 - અધ્યાય 13: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્પાદક પ્રકાશસંશ્લેષણ માટે પાણીના અણુને ઇલેક્ટ્રોન દાતા તરીકે વાપરતો નથી?", "opts": ["વનસ્પતિ", "શેવાળ", "સાયનોબેક્ટેરિયા", "પર્પલ સલ્ફર બેક્ટેરિયા"], "ans": 3, "exp": "પર્પલ સલ્ફર બેક્ટેરિયા (D) પ્રકાશસંશ્લેષણ માટે પાણીના અણુને ઇલેક્ટ્રોન દાતા તરીકે વાપરતું નથી, પરંતુ તે હાઇડ્રોજન સલ્ફાઇડ (H₂S) નો ઉપયોગ કરે છે. વનસ્પતિ (A), શેવાળ (B), અને સાયનોબેક્ટેરિયા (C) પાણીના અણુને ઇલેક્ટ્રોન દાતા તરીકે વાપરે છે.", "ref": "Std 11 - અધ્યાય 13: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "જલીય ઉત્પાદકોમાં, નીચેનામાંથી કયો જીવ પ્રકાશસંશ્લેષણ દરમિયાન સલ્ફરને ઇલેક્ટ્રોન દાતા તરીકે વાપરે છે અને ઓક્સિજન ઉત્પન્ન કરતો નથી?", "opts": ["વોલ્વોક્સ", "ઓસિલેટોરિયા", "ક્લેમાઇડોમોનાસ", "ગ્રીન સલ્ફર બેક્ટરિયા"], "ans": 3, "exp": "ગ્રીન સલ્ફર બેક્ટરિયા (D) પ્રકાશસંશ્લેષણ દરમિયાન સલ્ફરને ઇલેક્ટ્રોન દાતા તરીકે વાપરે છે અને ઓક્સિજન ઉત્પન્ન કરતું નથી, કારણ કે તે અનોક્સિજેનિક પ્રકાશસંશ્લેષણ કરે છે. વોલ્વોક્સ (A), ઓસિલેટોરિયા (B), અને ક્લેમાઇડોમોનાસ (C) ઓક્સિજેનિક પ્રકાશસંશ્લેષણ કરે છે, જેમાં પાણી ઇલેક્ટ્રોન દાતા તરીકે વપરાય છે અને ઓક્સિજન ઉત્પન્ન થાય છે.", "ref": "Std 11 - Chapter 13: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્પાદક પ્રકાશસંશ્લેષણ દરમિયાન ક્લોરોફિલના બદલે ફાઇકોબિલીન વર્ણકોનો ઉપયોગ કરે છે?", "opts": ["સાયનોબેક્ટરિયા", "યુગ્લીના", "સ્પાયરોગાયરા", "એમીબા"], "ans": 0, "exp": "સાયનોબેક્ટરિયા (A) પ્રકાશસંશ્લેષણ માટે ફાઇકોબિલીન વર્ણકોનો ઉપયોગ કરે છે, જે ક્લોરોફિલના બદલે કામ કરે છે. યુગ્લીના (B) અને સ્પાયરોગાયરા (C) ક્લોરોફિલનો ઉપયોગ કરે છે, જ્યારે એમીબા (D) ઉત્પાદક નથી, તે ઉપભોક્તા છે.", "ref": "Std 11 - Chapter 13: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "જે ઉત્પાદકો અત્યંત ઉચ્ચ તાપમાન અને અમ્લીય વાતાવરણમાં જીવિત રહી શકે છે અને પ્રકાશસંશ્લેષણ કરે છે, તે નીચેનામાંથી કયા સમૂહમાં આવે છે?", "opts": ["હરિત કવક", "થર્મોફિલિક સાયનોબેક્ટરિયા", "લાલ શેવાળ", "ડાયટમ્સ"], "ans": 1, "exp": "થર્મોફિલિક સાયનોબેક્ટરિયા (B) અત્યંત ઉચ્ચ તાપમાન અને અમ્લીય વાતાવરણમાં જીવિત રહી શકે છે અને પ્રકાશસંશ્લેષણ કરે છે. હરિત કવક (A), લાલ શેવાળ (C), અને ડાયટમ્સ (D) આવા અતિચરમ વાતાવરણમાં જીવિત રહી શકતા નથી.", "ref": "Std 11 - Chapter 13: પ્રકાશસંશ્લેષણ અને Chapter 14: જીવનમાં વૈવિધ્ય", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્પાદક પ્રકાશસંશ્લેષણ દરમિયાન કાર્બન ડાયોક્સાઇડને કાર્બોદિતમાં રૂપાંતરિત કરવા માટે કેલ્વિન ચક્રના બદલે C4 પથનો ઉપયોગ કરે છે?", "opts": ["ચણો", "મકાઈ", "ગેહૂં", "દિવેલ"], "ans": 1, "exp": "મકાઈ (B) C4 પથનો ઉપયોગ કરે છે, જે કેલ્વિન ચક્ર કરતાં વધુ કાર્યક્ષમ છે અને ઉચ્ચ તાપમાન અને પ્રકાશની તીવ્રતામાં પ્રકાશસંશ્લેષણ માટે અનુકૂળ છે. ચણો (A), ગેહૂં (C), અને દિવેલ (D) કેલ્વિન ચક્રનો ઉપયોગ કરે છે.", "ref": "Std 11 - Chapter 13: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લઈને સાચો વિકલ્પ પસંદ કરો:\n\n(1) કેટલાક ઉત્પાદકો પ્રકાશસંશ્લેષણ દરમિયાન ઓક્સિજન ઉત્પન્ન કરતા નથી, પરંતુ હાઇડ્રોજન સલ્ફાઇડનો ઉપયોગ કરીને સલ્ફરનું નિર્માણ કરે છે.\n(2) લીલ (Algae) અને સાયનોબેક્ટેરિયા બંને પ્રકાશસંશ્લેષણ માટે ક્લોરોફિલ-a નો ઉપયોગ કરે છે, પરંતુ લીલમાં ક્લોરોફિલ-b પણ જોવા મળે છે.\n(3) કેટલાક ઉત્પાદકો જેમ કે જાંબુડિયા બેક્ટેરિયા (Purple Bacteria) પ્રકાશસંશ્લેષણ માટે બેક્ટેરિયોક્લોરોફિલનો ઉપયોગ કરે છે અને તેઓ અજારક (Anaerobic) પરિસ્થિતિમાં જીવિત રહે છે.\n(4) બધા જ ઉત્પાદકો પ્રકાશસંશ્લેષણ દરમિયાન કાર્બન ડાયોક્સાઇડ અને પાણીનો ઉપયોગ કરીને કાર્બોદિતનું નિર્માણ કરે છે.", "opts": ["વિધાન 1, 2 અને 3 સાચાં છે, વિધાન 4 ખોટું છે", "વિધાન 1 અને 3 સાચાં છે, વિધાન 2 અને 4 ખોટાં છે", "વિધાન 2 અને 4 સાચાં છે, વિધાન 1 અને 3 ખોટાં છે", "બધાં જ વિધાનો સાચાં છે"], "ans": 0, "exp": "\n- વિધાન 1 સાચું છે કારણ કે કેટલાક જલીય ઉત્પાદકો (જેમ કે ગ્રીન સલ્ફર બેક્ટેરિયા) પ્રકાશસંશ્લેષણ દરમિયાન હાઇડ્રોજન સલ્ફાઇડનો ઉપયોગ કરીને સલ્ફર ઉત્પન્ન કરે છે અને ઓક્સિજન ઉત્પન્ન કરતા નથી.\n\n- વિધાન 2 સાચું છે કારણ કે લીલમાં ક્લોરોફિલ-a અને ક્લોરોફિલ-b બંને જોવા મળે છે, જ્યારે સાયનોબેક્ટેરિયામાં માત્ર ક્લોરોફિલ-a જ હોય છે.\n\n- વિધાન 3 સાચું છે કારણ કે જાંબુડિયા બેક્ટેરિયા બેક્ટેરિયોક્લોરોફિલનો ઉપયોગ કરે છે અને અજારક પરિસ્થિતિમાં પ્રકાશસંશ્લેષણ કરે છે.\n\n- વિધાન 4 ખોટું છે કારણ કે બધા ઉત્પાદકો પ્રકાશસંશ્લેષણ માટે પાણીનો ઉપયોગ કરતા નથી. કેટલાક ઉત્પાદકો હાઇડ્રોજન સલ્ફાઇડ અથવા અન્ય સંયોજનોનો ઉપયોગ ઇલેક્ટ્રોન દાતા તરીકે કરે છે.\n\nઆથી, વિધાન 1, 2 અને 3 સાચાં છે, જ્યારે વિધાન 4 ખોટું છે.", "ref": "Std 11 - પ્રકરણ 13: ઉચ્ચ વનસ્પતિઓમાં પ્રકાશસંશ્લેષણ અને Std 12 - પ્રકરણ 13: સજીવો અને વસ્તી", "ch": ""}, {"q": "એક એવો ઉત્પાદક જે પ્રકાશસંશ્લેષણ દરમિયાન ઓક્સિજન ઉત્પન્ન કરતો નથી, પરંતુ હાઇડ્રોજન સલ્ફાઇડનો ઉપયોગ કરીને સલ્ફરનું નિર્માણ કરે છે, તે નીચેનામાંથી કયા વર્ગમાં સમાવેશ પામે છે?", "opts": ["લીલ (Algae)", "જલીય વનસ્પતિઓ (Aquatic plants)", "જાંબલી સલ્ફર બેક્ટેરિયા (Purple sulfur bacteria)", "સાયનોબેક્ટેરિયા (Cyanobacteria)"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. જાંબલી સલ્ફર બેક્ટેરિયા પ્રકાશસંશ્લેષણ દરમિયાન હાઇડ્રોજન સલ્ફાઇડ (H₂S) નો ઉપયોગ ઇલેક્ટ્રોન દાતા તરીકે કરે છે અને ઓક્સિજન ઉત્પન્ન કરતા નથી, પરંતુ સલ્ફરનું નિર્માણ કરે છે. લીલ અને સાયનોબેક્ટેરિયા પાણીનો ઉપયોગ કરીને ઓક્સિજન ઉત્પન્ન કરે છે, જ્યારે જલીય વનસ્પતિઓ પણ ઓક્સિજન ઉત્પન્ન કરે છે. તેથી અન્ય વિકલ્પો ખોટા છે.", "ref": "Std 11 - પ્રકરણ 13: વનસ્પતિઓમાં પ્રકાશસંશ્લેષણ અને શ્વસન", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લઈને સાચો વિકલ્પ પસંદ કરો:\n(1) કેટલાક ઉત્પાદકો પ્રકાશસંશ્લેષણ માટે ક્લોરોફિલના બદલે બેક્ટેરિયોક્લોરોફિલનો ઉપયોગ કરે છે.\n(2) આ ઉત્પાદકો પ્રકાશસંશ્લેષણ દરમિયાન ઓક્સિજન ઉત્પન્ન કરે છે.\n(3) તેઓ અકાર્બનિક સંયોજનોને ઇલેક્ટ્રોન દાતા તરીકે ઉપયોગમાં લે છે.", "opts": ["માત્ર વિધાન (1) સાચું છે", "વિધાન (1) અને (3) સાચાં છે", "વિધાન (2) અને (3) સાચાં છે", "ત્રણેય વિધાનો સાચાં છે"], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B છે. કેટલાક ઉત્પાદકો જેમ કે જાંબલી અને લીલા સલ્ફર બેક્ટેરિયા પ્રકાશસંશ્લેષણ માટે બેક્ટેરિયોક્લોરોફિલનો ઉપયોગ કરે છે અને અકાર્બનિક સંયોજનો (જેમ કે H₂S) ને ઇલેક્ટ્રોન દાતા તરીકે ઉપયોગમાં લે છે. પરંતુ તેઓ ઓક્સિજન ઉત્પન્ન કરતા નથી, તેથી વિધાન (2) ખોટું છે.", "ref": "Std 11 - પ્રકરણ 13: વનસ્પતિઓમાં પ્રકાશસંશ્લેષણ અને શ્વસન", "ch": ""}, {"q": "એક એવો ઉત્પાદક જે ઉચ્ચ તાપમાન અને અમ્લીય વાતાવરણમાં જીવિત રહી શકે છે અને પ્રકાશસંશ્લેષણ માટે ક્લોરોફિલ a નો ઉપયોગ કરે છે, તે નીચેનામાંથી કયો હોઈ શકે?", "opts": ["સ્પાયરોગાયરા (Spirogyra)", "થર્મોફિલિક સાયનોબેક્ટેરિયા (Thermophilic cyanobacteria)", "યુગ્લીના (Euglena)", "ડાયેટમ્સ (Diatoms)"], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B છે. થર્મોફિલિક સાયનોબેક્ટેરિયા ઉચ્ચ તાપમાન અને અમ્લીય વાતાવરણમાં જીવિત રહી શકે છે અને પ્રકાશસંશ્લેષણ માટે ક્લોરોફિલ a નો ઉપયોગ કરે છે. સ્પાયરોગાયરા, યુગ્લીના અને ડાયેટમ્સ સામાન્ય તાપમાન અને pH પર જીવિત રહે છે, તેથી અન્ય વિકલ્પો ખોટા છે.", "ref": "Std 12 - પ્રકરણ 13: સૂક્ષ્મજીવો: મિત્ર અને શત્રુ", "ch": ""}, {"q": "એક એવો ઉત્પાદક જે પ્રકાશસંશ્લેષણ માટે ફાઇકોબિલીન વર્ણકોનો ઉપયોગ કરે છે અને મુખ્યત્વે જલીય વાતાવરણમાં જોવા મળે છે, તે નીચેનામાંથી કયો છે?", "opts": ["લાલ લીલ (Red algae)", "લીલી લીલ (Green algae)", "ભૂરી-લીલી લીલ (Blue-green algae)", "બ્રાઉન લીલ (Brown algae)"], "ans": 0, "exp": "સાચો જવાબ વિકલ્પ A છે. લાલ લીલ (રોડોફાયસી) પ્રકાશસંશ્લેષણ માટે ફાઇકોબિલીન વર્ણકો (ફાઇકોએરિથ્રિન અને ફાઇકોસાયનિન) નો ઉપયોગ કરે છે. લીલી લીલ ક્લોરોફિલ a અને b નો ઉપયોગ કરે છે, ભૂરી-લીલી લીલ (સાયનોબેક્ટેરિયા) ફાઇકોબિલીન સાથે ક્લોરોફિલ a નો ઉપયોગ કરે છે, પરંતુ મુખ્ય વર્ણક ફાઇકોબિલીન નથી. બ્રાઉન લીલ ફ્યુકોક્સાન્થિનનો ઉપયોગ કરે છે.", "ref": "Std 11 - પ્રકરણ 3: વનસ્પતિ સૃષ્ટિનું વર્ગીકરણ", "ch": ""}, {"q": "નીચેના પૈકી કયો જીવ ઉત્પાદક તરીકે વર્ગીકૃત થાય છે, પરંતુ તેના કોષોમાં કોષકેન્દ્ર (ન્યુક્લિયસ)નો અભાવ હોય છે અને તે પ્રકાશસંશ્લેષણ દરમિયાન હાઇડ્રોજન સલ્ફાઇડ (H₂S)નો ઇલેક્ટ્રોન દાતા તરીકે ઉપયોગ કરે છે?", "opts": ["નોસ્ટોક (Nostoc)", "ક્લેમિડોમોનાસ (Chlamydomonas)", "ક્લોરોબિયમ (Chlorobium)", "યુલોથ્રિક્સ (Ulothrix)"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C) ક્લોરોબિયમ છે. ક્લોરોબિયમ એક પ્રકારનું લીલું સલ્ફર બેક્ટેરિયા છે જે પ્રોકેરિયોટિક (કોષકેન્દ્ર વગરના) કોષો ધરાવે છે અને પ્રકાશસંશ્લેષણ દરમિયાન હાઇડ્રોજન સલ્ફાઇડ (H₂S)નો ઇલેક્ટ્રોન દાતા તરીકે ઉપયોગ કરે છે. નોસ્ટોક અને યુલોથ્રિક્સ યુકેરિયોટિક (કોષકેન્દ્ર ધરાવતા) ઉત્પાદકો છે, જ્યારે ક્લેમિડોમોનાસ પણ યુકેરિયોટિક છે અને પાણીનો ઇલેક્ટ્રોન દાતા તરીકે ઉપયોગ કરે છે. આથી, માત્ર ક્લોરોબિયમ જ પ્રોકેરિયોટિક ઉત્પાદક છે જે H₂S નો ઉપયોગ કરે છે.", "ref": "Std 11 - પ્રકરણ 13: વનસ્પતિઓમાં પ્રકાશસંશ્લેષણ અને શ્વસન", "ch": ""}, {"q": "નીચેના પૈકી કયો ઉત્પાદક પ્રકાશસંશ્લેષણ દરમિયાન કાર્બન ડાયોક્સાઇડને કાર્બોદિતમાં રૂપાંતરિત કરવા માટે C4 પથનો ઉપયોગ કરતો નથી, પરંતુ તેના બદલે ક્રેસુલેસીયન એસિડ મેટાબોલિઝમ (CAM) પથનો ઉપયોગ કરે છે?", "opts": ["શેરડી (Sugarcane)", "મકાઈ (Maize)", "કેક્ટસ (Cactus)", "બાજરી (Pearl millet)"], "ans": 2, "exp": "કેક્ટસ જેવા રણના છોડ CAM પથનો ઉપયોગ કરે છે, જેમાં રાત્રે કાર્બન ડાયોક્સાઇડનું સ્થિરીકરણ થાય છે અને દિવસે પ્રકાશસંશ્લેષણ થાય છે. શેરડી, મકાઈ અને બાજરી C4 છોડ છે, જે C4 પથનો ઉપયોગ કરે છે. તેથી વિકલ્પ C સાચો છે. બાકીના વિકલ્પો C4 પથનો ઉપયોગ કરતા હોવાથી ખોટા છે.", "ref": "Std 11 - પ્રકરણ 13: છોડોમાં પ્રકાશસંશ્લેષણ અને શ્વસન", "ch": ""}, {"q": "નીચેના પૈકી કયો ઉત્પાદક પ્રકાશસંશ્લેષણ માટે ફાઇકોબિલીન વર્ણકોનો ઉપયોગ કરે છે અને તેના કોષોમાં કોષકેન્દ્ર (ન્યુક્લિયસ) હોતું નથી?", "opts": ["સ્પાયરોગાયરા (Spirogyra)", "નોસ્ટોક (Nostoc)", "વોલ્વોક્સ (Volvox)", "ક્લેમિડોમોનાસ (Chlamydomonas)"], "ans": 1, "exp": "નોસ્ટોક (સાયનોબેક્ટેરિયા) ફાઇકોબિલીન વર્ણકોનો ઉપયોગ કરે છે અને તે પ્રોકેરિયોટિક હોવાથી કોષકેન્દ્ર ધરાવતું નથી. સ્પાયરોગાયરા, વોલ્વોક્સ અને ક્લેમિડોમોનાસ યુકેરિયોટિક લીલ છે, જેમાં કોષકેન્દ્ર હોય છે. તેથી વિકલ્પ B સાચો છે.", "ref": "Std 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ", "ch": ""}, {"q": "એક એવો ઉત્પાદક જે પ્રકાશસંશ્લેષણ દરમિયાન કાર્બન ડાયોક્સાઇડને કાર્બોદિતમાં રૂપાંતરિત કરવા માટે C₄ માર્ગનો ઉપયોગ કરે છે, પરંતુ તેના પર્ણોમાં ક્રાન્ઝ પેશીરચના (Kranz anatomy) જોવા મળતી નથી. નીચેનામાંથી કયો વિકલ્પ આ લક્ષણો ધરાવતો ઉત્પાદક છે?", "opts": ["શેરડી (Saccharum officinarum)", "મકાઈ (Zea mays)", "બાજરી (Pennisetum glaucum)", "અમરાંત (Amaranthus viridis)"], "ans": 3, "exp": "સાચો જવાબ D) અમરાંત (Amaranthus viridis) છે. સામાન્ય રીતે C₄ વનસ્પતિઓમાં ક્રાન્ઝ પેશીરચના જોવા મળે છે, પરંતુ અમરાંત એક અપવાદ છે જે C₄ માર્ગનો ઉપયોગ કરે છે પરંતુ ક્રાન્ઝ પેશીરચના ધરાવતી નથી. શેરડી, મકાઈ અને બાજરી C₄ વનસ્પતિઓ છે અને તેમાં ક્રાન્ઝ પેશીરચના જોવા મળે છે, તેથી આ વિકલ્પો ખોટા છે.", "ref": "Std 11 - પ્રકરણ 13: વનસ્પતિઓમાં પ્રકાશસંશ્લેષણ અને શ્વસન", "ch": ""}, {"q": "નીચેના પૈકી કયો ઉત્પાદક પ્રકાશસંશ્લેષણની પ્રક્રિયા દરમિયાન કાર્બન ડાયોક્સાઇડને કાર્બોદિતમાં રૂપાંતરિત કરવા માટે C₄ માર્ગનો ઉપયોગ કરતો નથી, પરંતુ તેના બદલે ક્રેસુલેશિયન એસિડ મેટાબોલિઝમ (CAM) માર્ગનો ઉપયોગ કરે છે?", "opts": ["મકાઈ (Maize)", "શેરડી (Sugarcane)", "કેક્ટસ (Cactus)", "બાજરી (Pearl millet)"], "ans": 2, "exp": "સાચો જવાબ: C) કેક્ટસ (Cactus). કેક્ટસ જેવા રણમાં ઉગતા છોડ CAM માર્ગનો ઉપયોગ કરે છે, જેમાં તેઓ રાત્રે કાર્બન ડાયોક્સાઇડનું સ્થિરીકરણ કરે છે અને દિવસે પ્રકાશસંશ્લેષણ કરે છે. મકાઈ, શેરડી અને બાજરી C₄ માર્ગનો ઉપયોગ કરે છે, જેમાં કાર્બન ડાયોક્સાઇડનું સ્થિરીકરણ મેસોફિલ કોષોમાં થાય છે અને પછી બંડલ-શીથ કોષોમાં કાર્બોદિતનું નિર્માણ થાય છે. CAM છોડમાં પાણીની ખોટ ઓછી થાય છે, જે રણના વાતાવરણમાં જીવિત રહેવા માટે અનુકૂળ છે.", "ref": "Std 11 - પ્રકરણ 13: છોડમાં પ્રકાશસંશ્લેષણ અને શ્વસન", "ch": ""}, {"q": "નીચેના પૈકી કયો ઉત્પાદક પ્રકાશસંશ્લેષણ દરમિયાન ઇલેક્ટ્રોન દાતા તરીકે H₂S નો ઉપયોગ કરે છે અને તેની પ્રક્રિયામાં ઓક્સિજન ઉત્પન્ન કરતો નથી, પરંતુ સલ્ફરના કણો ઉત્પન્ન કરે છે?", "opts": ["સાયનોબેક્ટેરિયા", "રોડોસ્પિરિલમ", "ક્લોરોબિયમ", "ડાયટમ"], "ans": 2, "exp": "ક્લોરોબિયમ (ગ્રીન સલ્ફર બેક્ટેરિયા) પ્રકાશસંશ્લેષણ દરમિયાન ઇલેક્ટ્રોન દાતા તરીકે H₂S નો ઉપયોગ કરે છે અને તેની પ્રક્રિયામાં ઓક્સિજન ઉત્પન્ન કરતું નથી, પરંતુ સલ્ફરના કણો ઉત્પન્ન કરે છે. સાયનોબેક્ટેરિયા (A) પાણીને ઇલેક્ટ્રોન દાતા તરીકે વાપરે છે અને ઓક્સિજન ઉત્પન્ન કરે છે. રોડોસ્પિરિલમ (B) અંધારામાં પ્રકાશસંશ્લેષણ કરી શકે છે, પરંતુ H₂S નો ઉપયોગ કરતું નથી. ડાયટમ (D) પાણીને ઇલેક્ટ્રોન દાતા તરીકે વાપરે છે અને ઓક્સિજન ઉત્પન્ન કરે છે.", "ref": "Std 11 - પ્રકરણ 13: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્પાદક પ્રકાશસંશ્લેષણ દરમિયાન ઇલેક્ટ્રોન દાતા તરીકે H₂Sનો ઉપયોગ કરે છે અને તેની પ્રક્રિયામાં ઓક્સિજન ઉત્પન્ન કરતો નથી?", "opts": ["સાયનોબેક્ટેરિયા", "રોડોસ્પિરિલમ", "ક્લોરેલા", "ગ્રીન સલ્ફર બેક્ટેરિયા"], "ans": 3, "exp": "ગ્રીન સલ્ફર બેક્ટેરિયા (D) પ્રકાશસંશ્લેષણ દરમિયાન ઇલેક્ટ્રોન દાતા તરીકે H₂Sનો ઉપયોગ કરે છે અને ઓક્સિજન ઉત્પન્ન કરતું નથી, કારણ કે તે અનોક્સિજેનિક પ્રકાશસંશ્લેષણ કરે છે. સાયનોબેક્ટેરિયા (A) ઓક્સિજન ઉત્પન્ન કરે છે, રોડોસ્પિરિલમ (B) પણ અનોક્સિજેનિક છે પરંતુ H₂Sનો ઉપયોગ કરતું નથી, અને ક્લોરેલા (C) ઓક્સિજેનિક પ્રકાશસંશ્લેષણ કરે છે.", "ref": "Std 11 - અધ્યાય 13: ઉત્પાદકો અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્પાદક ક્લોરોફિલ a, b અને c નો ઉપયોગ કરે છે અને તેના કોષભિત્તિમાં સિલિકાનું પ્રમાણ વધારે હોય છે?", "opts": ["સ્પાઇરોગાયરા", "ડાયટમ", "વોલ્વોક્સ", "યુગ્લીના"], "ans": 1, "exp": "ડાયટમ (B) ક્લોરોફિલ a, b અને c નો ઉપયોગ કરે છે અને તેના કોષભિત્તિમાં સિલિકાનું પ્રમાણ વધારે હોય છે. સ્પાઇરોગાયરા (A) ફક્ત ક્લોરોફિલ aનો ઉપયોગ કરે છે, વોલ્વોક્સ (C) ક્લોરોફિલ a અને bનો ઉપયોગ કરે છે, અને યુગ્લીના (D) ક્લોરોફિલ a અને bનો ઉપયોગ કરે છે પરંતુ સિલિકાનું પ્રમાણ ઓછું હોય છે.", "ref": "Std 11 - અધ્યાય 13: શેવાળ અને તેના વર્ગીકરણ", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્પાદક અત્યંત ખારા વાતાવરણમાં જીવિત રહી શકે છે અને તેના કોષરસમાં ગ્લિસરોલનું પ્રમાણ વધારે હોય છે?", "opts": ["ડ્યુનાલિયેલા", "ઓસિલેટોરિયા", "નોસ્ટોક", "ક્લેમાઇડોમોનાસ"], "ans": 0, "exp": "ડ્યુનાલિયેલા (A) અત્યંત ખારા વાતાવરણમાં જીવિત રહી શકે છે અને તેના કોષરસમાં ગ્લિસરોલનું પ્રમાણ વધારે હોય છે, જે તેને ઓસ્મોટિક સંતુલન જાળવવામાં મદદ કરે છે. ઓસિલેટોરિયા (B), નોસ્ટોક (C), અને ક્લેમાઇડોમોનાસ (D) ખારા વાતાવરણમાં જીવિત રહી શકતા નથી.", "ref": "Std 11 - અધ્યાય 13: ઉત્પાદકો અને અતિચરમ વાતાવરણ", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્પાદક પ્રકાશસંશ્લેષણ દરમિયાન ક્લોરોફિલ a અને d નો ઉપયોગ કરે છે અને તે સાયનોબેક્ટેરિયા જૂથનો છે?", "opts": ["એનાબીના", "સ્પાઇરુલિના", "અસેટાબ્યુલેરિયા", "નોસ્ટોક"], "ans": 2, "exp": "અસેટાબ્યુલેરિયા (C) પ્રકાશસંશ્લેષણ દરમિયાન ક્લોરોફિલ a અને d નો ઉપયોગ કરે છે અને તે સાયનોબેક્ટેરિયા જૂથનો છે. એનાબીના (A) અને સ્પાઇરુલિના (B) ફક્ત ક્લોરોફિલ aનો ઉપયોગ કરે છે, અને નોસ્ટોક (D) પણ ફક્ત ક્લોરોફિલ aનો ઉપયોગ કરે છે.", "ref": "Std 11 - અધ્યાય 13: સાયનોબેક્ટેરિયા અને તેના વર્ણકો", "ch": ""}, {"q": "નીચેના પૈકી કયો ઉત્પાદક પ્રકાશસંશ્લેષણ માટે ક્લોરોફિલ a અને c નો ઉપયોગ કરે છે, પરંતુ ક્લોરોફિલ b નો ઉપયોગ કરતો નથી અને તેના કોષદીવાલમાં સિલિકા જોવા મળે છે?", "opts": ["લીલ (Green algae)", "ડાયેટમ્સ (Diatoms)", "લાલ લીલ (Red algae)", "ભૂરા લીલ (Brown algae)"], "ans": 1, "exp": "ડાયેટમ્સ પ્રકાશસંશ્લેષણ માટે ક્લોરોફિલ a અને c નો ઉપયોગ કરે છે, પરંતુ ક્લોરોફિલ b નો ઉપયોગ કરતા નથી. તેમના કોષદીવાલમાં સિલિકા જોવા મળે છે. લીલ ક્લોરોફિલ a અને b નો ઉપયોગ કરે છે, લાલ લીલ ફાઇકોબિલીન વર્ણકોનો ઉપયોગ કરે છે, અને ભૂરા લીલ ક્લોરોફિલ a અને c નો ઉપયોગ કરે છે પરંતુ તેમના કોષદીવાલમાં સિલિકા હોતું નથી.", "ref": "Std 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ", "ch": ""}, {"q": "એક ઉત્પાદક જે ઉચ્ચ તાપમાન અને અત્યંત ખારા વાતાવરણમાં જીવિત રહી શકે છે, તેના કોષોમાં બેક્ટેરિયોરહોડોપ્સિન નામનું પ્રોટીન ધરાવે છે અને પ્રકાશસંશ્લેષણ માટે ક્લોરોફિલનો ઉપયોગ કરતો નથી. આ ઉત્પાદક કયો છે?", "opts": ["હેલોફિલિક બેક્ટેરિયા (Halophilic bacteria)", "થર્મોએસિડોફિલિક બેક્ટેરિયા (Thermoacidophilic bacteria)", "મિથેનોજેન્સ (Methanogens)", "હેલોબેક્ટેરિયમ (Halobacterium)"], "ans": 3, "exp": "હેલોબેક્ટેરિયમ ઉચ્ચ તાપમાન અને અત્યંત ખારા વાતાવરણમાં જીવિત રહી શકે છે. તેના કોષોમાં બેક્ટેરિયોરહોડોપ્સિન નામનું પ્રોટીન હોય છે, જે પ્રકાશ ઊર્જાનું રાસાયણિક ઊર્જામાં રૂપાંતરણ કરે છે. તે પ્રકાશસંશ્લેષણ માટે ક્લોરોફિલનો ઉપયોગ કરતું નથી. હેલોફિલિક બેક્ટેરિયા ખારા વાતાવરણમાં જીવે છે પરંતુ બેક્ટેરિયોરહોડોપ્સિન ધરાવતા નથી. થર્મોએસિડોફિલિક બેક્ટેરિયા ઉચ્ચ તાપમાન અને અમ્લીય વાતાવરણમાં જીવે છે, પરંતુ પ્રકાશસંશ્લેષણ કરતા નથી. મિથેનોજેન્સ મિથેન ઉત્પન્ન કરે છે અને પ્રકાશસંશ્લેષણ કરતા નથી.", "ref": "Std 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ", "ch": ""}, {"q": "એક એવો ઉત્પાદક જે પ્રકાશસંશ્લેષણ દરમિયાન કાર્બન ડાયોક્સાઇડનું સ્થિરીકરણ CAM (Crassulacean Acid Metabolism) માર્ગ દ્વારા કરે છે, પરંતુ તેના પર્ણોની રચનામાં રસધાની (vacuole) ખૂબ જ નાની હોય છે અને તે રાત્રે કાર્બન ડાયોક્સાઇડનું શોષણ કરી શકતો નથી. નીચેના પૈકી કયો ઉત્પાદક આ વર્ણનને અનુરૂપ છે?", "opts": ["કેક્ટસ (Opuntia)", "એલોવેરા (Aloe vera)", "પાઇનેપલ (Ananas comosus)", "આમાંથી એક પણ નહીં"], "ans": 3, "exp": "CAM વનસ્પતિઓમાં રાત્રે કાર્બન ડાયોક્સાઇડનું શોષણ થાય છે અને તેને રસધાનીમાં મેલિક એસિડના સ્વરૂપમાં સંગ્રહિત કરવામાં આવે છે. કેક્ટસ, એલોવેરા અને પાઇનેપલ CAM વનસ્પતિઓ છે જેમાં મોટી રસધાની હોય છે. આ પ્રશ્નમાં આપેલ વર્ણન CAM વનસ્પતિઓના લક્ષણોને અનુરૂપ નથી, તેથી સાચો જવાબ 'આમાંથી એક પણ નહીં' છે. આ પ્રશ્નમાં ખ્યાલ એ છે કે CAM વનસ્પતિઓમાં રસધાની મોટી હોય છે અને તેઓ રાત્રે કાર્બન ડાયોક્સાઇડનું શોષણ કરે છે.", "ref": "Std 11 - પ્રકરણ 13: વનસ્પતિઓમાં પ્રકાશસંશ્લેષણ અને શ્વસન", "ch": ""}, {"q": "એક એવો ઉત્પાદક જે ઉચ્ચ તાપમાન અને અત્યંત ખારા વાતાવરણમાં જીવિત રહી શકે છે, પરંતુ તેના કોષોમાં ક્લોરોફિલ a અને b નો અભાવ હોય છે. આ ઉત્પાદક માટે નીચેનામાંથી કયો વિકલ્પ યોગ્ય છે?", "opts": ["હેલોફિલિક આર્કિયા જે બેક્ટેરિયોરહોડોપ્સિનનો ઉપયોગ કરીને પ્રકાશ ઊર્જાનું રૂપાંતરણ કરે છે", "ડાયનોફ્લેજેલેટ્સ જે ફ્યુકોક્સાન્થિન વર્ણક ધરાવે છે", "લીલી સલ્ફર બેક્ટેરિયા જે બેક્ટેરિયોક્લોરોફિલનો ઉપયોગ કરે છે", "લાલ લીલ જે ફાઇકોબિલીન વર્ણકો ધરાવે છે"], "ans": 0, "exp": "હેલોફિલિક આર્કિયા ઉચ્ચ તાપમાન અને ખારા વાતાવરણમાં જીવિત રહી શકે છે અને તેઓ બેક્ટેરિયોરહોડોપ્સિનનો ઉપયોગ કરીને પ્રકાશ ઊર્જાનું રૂપાંતરણ કરે છે, પરંતુ તેઓ ક્લોરોફિલ ધરાવતા નથી. વિકલ્પ B, C અને D માં આપેલા ઉત્પાદકો ક્લોરોફિલ અથવા અન્ય વર્ણકો ધરાવે છે, જે પ્રશ્નમાં આપેલી શરતને અનુરૂપ નથી.", "ref": "Std 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્પાદક CAM (Crassulacean Acid Metabolism) પધ્ધતિ દ્વારા કાર્બન ડાયોક્સાઇડનું સ્થિરીકરણ કરે છે અને રાત્રિના સમયે તેના રંધ્રો ખુલ્લા રાખે છે?", "opts": ["ચણો (C₃ પ્લાન્ટ)", "મકાઈ (C₄ પ્લાન્ટ)", "નાગફણી (Cacti)", "ગહું (Wheat)"], "ans": 2, "exp": "નાગફણી (Cacti) એ CAM પ્લાન્ટ છે, જે રાત્રિના સમયે રંધ્રો ખુલ્લા રાખીને CO₂નું સ્થિરીકરણ કરે છે અને દિવસ દરમિયાન તેને મેટાબોલિક પ્રક્રિયામાં વાપરે છે. ચણો અને ગહું C₃ પ્લાન્ટ છે, જ્યારે મકાઈ C₄ પ્લાન્ટ છે.", "ref": "Std 11 - અધ્યાય 13: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્પાદક ક્લોરોફિલ a, b, અને c નો ઉપયોગ કરે છે અને જલીય વાતાવરણમાં જીવે છે?", "opts": ["સ્પાયરોગાયરા (Spirogyra)", "ડાયટમ્સ (Diatoms)", "વોલ્વોક્સ (Volvox)", "યુલોથ્રિક્સ (Ulothrix)"], "ans": 1, "exp": "ડાયટમ્સ (Diatoms) ક્લોરોફિલ a, b, અને c ધરાવે છે અને જલીય વાતાવરણમાં જીવે છે. સ્પાયરોગાયરા, વોલ્વોક્સ, અને યુલોથ્રિક્સ ફક્ત ક્લોરોફિલ a અને b ધરાવે છે.", "ref": "Std 11 - અધ્યાય 3: વનસ્પતિ જગતનો વર્ગીકરણ", "ch": ""}, {"q": "નીચેના પૈકી કયો ઉત્પાદક પ્રકાશસંશ્લેષણની પ્રક્રિયા માટે જરૂરી ઊર્જા મેળવવા માટે સૂર્યપ્રકાશના બદલે રાસાયણિક ઊર્જાનો ઉપયોગ કરે છે?", "opts": ["લીલ (Algae)", "લીલી સલ્ફર બેક્ટેરિયા (Green Sulfur Bacteria)", "રસાયણસંશ્લેષી બેક્ટેરિયા (Chemosynthetic Bacteria)", "લીલી વનસ્પતિઓ (Green Plants)"], "ans": 2, "exp": "રસાયણસંશ્લેષી બેક્ટેરિયા પ્રકાશસંશ્લેષણ માટે સૂર્યપ્રકાશનો ઉપયોગ કરતા નથી, પરંતુ રાસાયણિક ઊર્જાનો ઉપયોગ કરીને કાર્બન ડાયોક્સાઇડનું સ્થિરીકરણ કરે છે. લીલ, લીલી સલ્ફર બેક્ટેરિયા અને લીલી વનસ્પતિઓ પ્રકાશસંશ્લેષણ માટે સૂર્યપ્રકાશનો ઉપયોગ કરે છે. તેથી વિકલ્પ C સાચો છે.", "ref": "Std 11 - પ્રકરણ 13: વનસ્પતિઓમાં પ્રકાશસંશ્લેષણ અને શ્વસન", "ch": ""}, {"q": "એક ઉત્પાદક જે પ્રકાશસંશ્લેષણ દરમિયાન ઓક્સિજન ઉત્પન્ન કરતો નથી, પરંતુ તેના કોષોમાં બેક્ટેરિયોક્લોરોફિલ જોવા મળે છે. આ ઉત્પાદક માટે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["તે પ્રકાશસંશ્લેષણ માટે હાઇડ્રોજન સલ્ફાઇડ (H₂S) નો ઉપયોગ કરે છે.", "તેના કોષોમાં ક્લોરોપ્લાસ્ટ જોવા મળતા નથી.", "તે પ્રકાશસંશ્લેષણ માટે પાણીને ઇલેક્ટ્રોન દાતા તરીકે વાપરે છે.", "તે અજારક પ્રકાશસંશ્લેષણ કરે છે."], "ans": 2, "exp": "સાચો જવાબ C) છે. જે ઉત્પાદક બેક્ટેરિયોક્લોરોફિલ ધરાવે છે તે પ્રકાશસંશ્લેષણ માટે પાણીને ઇલેક્ટ્રોન દાતા તરીકે વાપરતો નથી, પરંતુ H₂S જેવા પદાર્થોનો ઉપયોગ કરે છે. આ ઉત્પાદકો અજારક પ્રકાશસંશ્લેષણ કરે છે અને તેમના કોષોમાં ક્લોરોપ્લાસ્ટ હોતા નથી.", "ref": "Std 11 - પ્રકરણ 13: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "નીચેના પૈકી કયો ઉત્પાદક CAM (Crassulacean Acid Metabolism) પધ્ધતિ દ્વારા કાર્બન ડાયોક્સાઇડનું સ્થિરીકરણ કરે છે, પરંતુ તેના પર્ણોમાં રાત્રે કાર્બન ડાયોક્સાઇડનું શોષણ કરવા માટે ખાસ રચના ધરાવતો નથી?", "opts": ["કેક્ટસ (Cactus)", "એલોવેરા (Aloe vera)", "પાઇનેપલ (Pineapple)", "વેલામેન્થસ (Welwitschia)"], "ans": 3, "exp": "સાચો જવાબ D) વેલામેન્થસ છે. કેક્ટસ, એલોવેરા અને પાઇનેપલ CAM વનસ્પતિઓ છે જેમાં રાત્રે કાર્બન ડાયોક્સાઇડનું શોષણ કરવા માટે ખાસ રચના હોય છે, જ્યારે વેલામેન્થસ એક જિમ્નોસ્પર્મ છે જે CAM પધ્ધતિ દ્વારા કાર્બન ડાયોક્સાઇડનું સ્થિરીકરણ કરતો નથી. આ પ્રશ્નમાં વિકલ્પ D એક અપવાદ છે જે CAM પધ્ધતિ સાથે સંકળાયેલ નથી.", "ref": "Std 11 - પ્રકરણ 13: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "નીચેના પૈકી કયો ઉત્પાદક અત્યંત ખારા વાતાવરણમાં જીવિત રહી શકે છે અને તેના પ્રકાશસંશ્લેષણ માટે ક્લોરોફિલ a અને c નો ઉપયોગ કરે છે?", "opts": ["ડાયટમ (Diatom)", "સ્પાયરોગાયરા (Spirogyra)", "યુગ્લીના (Euglena)", "વોલ્વોક્સ (Volvox)"], "ans": 0, "exp": "સાચો વિકલ્પ A) ડાયટમ (Diatom) છે, કારણ કે ડાયટમ અત્યંત ખારા વાતાવરણમાં જીવિત રહી શકે છે અને તેના પ્રકાશસંશ્લેષણ માટે ક્લોરોફિલ a અને c નો ઉપયોગ કરે છે. B) સ્પાયરોગાયરા મીઠા પાણીમાં જીવે છે અને ક્લોરોફિલ a અને b નો ઉપયોગ કરે છે, C) યુગ્લીના મીઠા પાણીમાં જીવે છે અને ક્લોરોફિલ a અને b નો ઉપયોગ કરે છે, અને D) વોલ્વોક્સ મીઠા પાણીમાં જીવે છે અને ક્લોરોફિલ a અને b નો ઉપયોગ કરે છે.", "ref": "Std 12 - Chapter 13: વનસ્પતિઓમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લઈને સાચો વિકલ્પ પસંદ કરો: (1) કેટલાક ઉત્પાદકો પ્રકાશસંશ્લેષણ દરમિયાન ઇલેક્ટ્રોન દાતા તરીકે H2O ને બદલે H2S નો ઉપયોગ કરે છે. (2) આ પ્રકારના ઉત્પાદકો ઓક્સિજન ઉત્પન્ન કરતા નથી, પરંતુ સલ્ફર ઉત્પન્ન કરે છે. (3) આ ઉત્પાદકો સહજીવી સ્વરૂપે જોવા મળે છે.", "opts": ["ફક્ત (1) અને (2) સાચા છે", "ફક્ત (2) અને (3) સાચા છે", "ફક્ત (1) અને (3) સાચા છે", "(1), (2), અને (3) બધા સાચા છે"], "ans": 0, "exp": "કેટલાક ઉત્પાદકો જેવા કે ગંધક બેક્ટેરિયા (પર્પલ સલ્ફર બેક્ટેરિયા) પ્રકાશસંશ્લેષણ દરમિયાન ઇલેક્ટ્રોન દાતા તરીકે H2S નો ઉપયોગ કરે છે અને ઓક્સિજન ઉત્પન્ન કરતા નથી, પરંતુ સલ્ફર ઉત્પન્ન કરે છે. પરંતુ આ ઉત્પાદકો સહજીવી સ્વરૂપે જોવા મળતા નથી, તેઓ સ્વતંત્ર રીતે જીવે છે. તેથી ફક્ત (1) અને (2) સાચા છે.", "ref": "Std 12 - Chapter 13: વનસ્પતિઓમાં પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "નીચેના પૈકી કયો ઉત્પાદક પ્રકાશસંશ્લેષણ દરમિયાન ક્લોરોફિલ a, b, અને c નો ઉપયોગ કરે છે અને જલીય વાતાવરણમાં જીવે છે?", "opts": ["સ્પાયરોગાયરા (Spirogyra)", "ડાયટમ્સ (Diatoms)", "વોલ્વોક્સ (Volvox)", "ક્લેમાઇડોમોનાસ (Chlamydomonas)"], "ans": 1, "exp": "B) ડાયટમ્સ સાચો વિકલ્પ છે કારણ કે તે પ્રકાશસંશ્લેષણ દરમિયાન ક્લોરોફિલ a, b, અને c નો ઉપયોગ કરે છે અને જલીય વાતાવરણમાં જીવે છે. A) સ્પાયરોગાયરા ફક્ત ક્લોરોફિલ aનો ઉપયોગ કરે છે, C) વોલ્વોક્સ ક્લોરોફિલ a અને bનો ઉપયોગ કરે છે, D) ક્લેમાઇડોમોનાસ ક્લોરોફિલ a અને bનો ઉપયોગ કરે છે.", "ref": "Std 12 - Chapter 13: વનસ્પતિશાસ્ત્રમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્પાદક પ્રકાશસંશ્લેષણ માટે ક્લોરોફિલ a, b, અને c નો ઉપયોગ કરે છે અને જલીય વાતાવરણમાં જોવા મળે છે?", "opts": ["વટાણા (Pea)", "ડાયટમ્સ (Diatoms)", "ગજર (Carrot)", "સફરજન (Apple)"], "ans": 1, "exp": "ડાયટમ્સ (Diatoms) પ્રકાશસંશ્લેષણ માટે ક્લોરોફિલ a, b, અને c નો ઉપયોગ કરે છે અને જલીય વાતાવરણમાં જોવા મળે છે. વટાણા, ગજર, અને સફરજન સ્થળીય વનસ્પતિઓ છે અને ક્લોરોફિલ a અને b નો જ ઉપયોગ કરે છે. આથી, સાચો વિકલ્પ B છે.", "ref": "Std 12 - Chapter 13: વનસ્પતિશાસ્ત્રમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
