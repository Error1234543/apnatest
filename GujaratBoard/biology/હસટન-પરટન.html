<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>હિસ્ટોન પ્રોટીન</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>હિસ્ટોન પ્રોટીન</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">હિસ્ટોન પ્રોટીન</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "કોષકેન્દ્રમાં હિસ્ટોન પ્રોટીનની હાજરી સંબંધિત નીચેના વિધાનો ધ્યાનમાં લો: \n(1) હિસ્ટોન પ્રોટીન માત્ર યુકેરિયોટિક કોષોમાં જ જોવા મળે છે. \n(2) હિસ્ટોન પ્રોટીન DNA સાથે સંયોજાઈને ન્યુક્લિઓસોમ બનાવે છે. \n(3) હિસ્ટોન H1 ન્યુક્લિઓસોમના બંધારણમાં સીધો ભાગ લેતો નથી. \n(4) હિસ્ટોન પ્રોટીનનું એસિટાઇલેશન જનીન અભિવ્યક્તિને નિષ્ક્રિય કરે છે. \nઉપરોક્ત વિધાનોમાંથી કયું/કયાં વિધાન ખોટું/ખોટાં છે?", "opts": ["માત્ર (1) અને (4)", "માત્ર (3) અને (4)", "માત્ર (4)", "માત્ર (1), (2) અને (3)"], "ans": 2, "exp": "વિધાન (4) ખોટું છે કારણ કે હિસ્ટોન પ્રોટીનનું એસિટાઇલેશન જનીન અભિવ્યક્તિને સક્રિય કરે છે, નિષ્ક્રિય નહીં. વિધાન (1) સાચું છે કારણ કે હિસ્ટોન પ્રોટીન માત્ર યુકેરિયોટિક કોષોમાં જ જોવા મળે છે. વિધાન (2) સાચું છે કારણ કે હિસ્ટોન પ્રોટીન DNA સાથે સંયોજાઈને ન્યુક્લિઓસોમ બનાવે છે. વિધાન (3) સાચું છે કારણ કે હિસ્ટોન H1 ન્યુક્લિઓસોમના બંધારણમાં સીધો ભાગ લેતો નથી, પરંતુ તે લિંકર તરીકે કાર્ય કરે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ભિન્નતાના આણ્વિક આધાર", "ch": ""}, {"q": "નીચેના પૈકી કયું હિસ્ટોન પ્રોટીન ન્યુક્લિઓસોમના કોર હિસ્ટોન તરીકે ઓળખાતું નથી?", "opts": ["H2A", "H2B", "H3", "H1"], "ans": 3, "exp": "હિસ્ટોન H1 ન્યુક્લિઓસોમના કોર હિસ્ટોન તરીકે ઓળખાતું નથી. તે લિંકર હિસ્ટોન તરીકે ઓળખાય છે અને ન્યુક્લિઓસોમ વચ્ચેના DNA સાથે જોડાય છે. H2A, H2B, H3 અને H4 કોર હિસ્ટોન છે જે ન્યુક્લિઓસોમના કોર બનાવે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ભિન્નતાના આણ્વિક આધાર", "ch": ""}, {"q": "હિસ્ટોન પ્રોટીનના સંદર્ભમાં નીચેના વિધાનો ધ્યાનમાં લો: \n(1) હિસ્ટોન પ્રોટીન બેઝિક પ્રકૃતિ ધરાવે છે. \n(2) હિસ્ટોન પ્રોટીનનું મિથાઇલેશન હંમેશા જનીન અભિવ્યક્તિને સક્રિય કરે છે. \n(3) હિસ્ટોન પ્રોટીનનું ફોસ્ફોરાયલેશન કોષવિભાજન દરમિયાન થાય છે. \nઉપરોક્ત વિધાનોમાંથી કયું/કયાં વિધાન સાચું/સાચાં છે?", "opts": ["માત્ર (1) અને (2)", "માત્ર (1) અને (3)", "માત્ર (2) અને (3)", "(1), (2) અને (3)"], "ans": 1, "exp": "વિધાન (1) સાચું છે કારણ કે હિસ્ટોન પ્રોટીન બેઝિક એમિનો એસિડ (લાઇસિન અને આર્જિનિન) ધરાવે છે. વિધાન (3) સાચું છે કારણ કે હિસ્ટોન પ્રોટીનનું ફોસ્ફોરાયલેશન કોષવિભાજન દરમિયાન થાય છે. વિધાન (2) ખોટું છે કારણ કે હિસ્ટોન પ્રોટીનનું મિથાઇલેશન હંમેશા જનીન અભિવ્યક્તિને સક્રિય કરતું નથી, તે સંદર્ભ પર આધારિત છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ભિન્નતાના આણ્વિક આધાર", "ch": ""}, {"q": "એક સંશોધકને એક અજાણ્યો પ્રોટીન મળે છે જે DNA સાથે જોડાય છે અને ક્રોમેટિનનું બંધારણ બદલે છે. આ પ્રોટીનના ગુણધર્મો નીચે મુજબ છે: \n- તે એસિડિક પ્રકૃતિ ધરાવે છે. \n- તે કોષકેન્દ્રમાં જોવા મળે છે. \n- તે જનીન અભિવ્યક્તિને નિયંત્રિત કરે છે. \nઆ પ્રોટીન કયા પ્રકારનું હોઈ શકે?", "opts": ["હિસ્ટોન પ્રોટીન", "નોન-હિસ્ટોન ક્રોમેટિન પ્રોટીન", "રિબોસોમલ પ્રોટીન", "ટ્યુબ્યુલિન પ્રોટીન"], "ans": 1, "exp": "આ પ્રોટીન નોન-હિસ્ટોન ક્રોમેટિન પ્રોટીન હોઈ શકે છે કારણ કે હિસ્ટોન પ્રોટીન બેઝિક પ્રકૃતિ ધરાવે છે, જ્યારે આ પ્રોટીન એસિડિક છે. નોન-હિસ્ટોન પ્રોટીન ક્રોમેટિનનું બંધારણ બદલવામાં અને જનીન અભિવ્યક્તિને નિયંત્રિત કરવામાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે. રિબોસોમલ પ્રોટીન અને ટ્યુબ્યુલિન પ્રોટીન આ કાર્ય સાથે સંકળાયેલા નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ભિન્નતાના આણ્વિક આધાર", "ch": ""}, {"q": "હિસ્ટોન પ્રોટીનના સંદર્ભમાં નીચેના પૈકી કયું વિધાન અપવાદરૂપ છે?", "opts": ["હિસ્ટોન પ્રોટીન DNA સાથે આયોનિક બોન્ડ દ્વારા જોડાય છે.", "હિસ્ટોન પ્રોટીનનું સંશ્લેષણ S-તબક્કા દરમિયાન થાય છે.", "હિસ્ટોન પ્રોટીન માત્ર પ્રાણી કોષોમાં જ જોવા મળે છે.", "હિસ્ટોન પ્રોટીન ક્રોમેટિનનું સંકોચન કરવામાં મદદ કરે છે."], "ans": 2, "exp": "વિધાન (C) અપવાદરૂપ છે કારણ કે હિસ્ટોન પ્રોટીન માત્ર પ્રાણી કોષોમાં જ નહીં, પરંતુ તમામ યુકેરિયોટિક કોષોમાં (વનસ્પતિ, ફૂગ અને પ્રજીવો સહિત) જોવા મળે છે. અન્ય વિધાનો સાચાં છે: હિસ્ટોન પ્રોટીન DNA સાથે આયોનિક બોન્ડ દ્વારા જોડાય છે, S-તબક્કા દરમિયાન સંશ્લેષણ થાય છે, અને ક્રોમેટિનનું સંકોચન કરવામાં મદદ કરે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ભિન્નતાના આણ્વિક આધાર", "ch": ""}, {"q": "હિસ્ટોન પ્રોટીનના સંદર્ભમાં નીચેના પૈકી કયું વિધાન સત્ય છે જ્યારે DNA ની સાંકળી સાથે તેની અંતરક્રિયા વિશે વિચારવામાં આવે?", "opts": ["હિસ્ટોન પ્રોટીન H1, ન્યુક્લિઓસોમના કોરમાં સ્થિત થાય છે અને DNA ની સાંકળીને સ્થિર કરે છે.", "હિસ્ટોન પ્રોટીન H2A અને H2B, DNA ની ડબલ હેલિક્સને જોડાઈને ઉચ્ચ કક્ષાની સંરચના બનાવે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "હિસ્ટોન પ્રોટીનના એસિટાઇલેશન સંશોધન વિશે નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["એસિટાઇલેશનથી હિસ્ટોન અને DNA વચ્ચેના આંતરક્રિયા બળમાં ઘટાડો થાય છે, જેથી ક્રોમેટિન ખુલ્લું થાય છે.", "HAT (હિસ્ટોન એસિટાઇલટ્રાન્સફરેઝ) ઉત્સેચક દ્વારા હિસ્ટોનના લાઇસિન અમીન એસિડ પર એસિટાઇલ સમૂહ ઉમેરાય છે.", "એસિટાઇલેશનથી હિસ્ટોનની ધન વીજભારિતા વધે છે, જેથી DNA સાથેની બંધન ક્ષમતા વધે છે.", "HDAC (હિસ્ટોન ડી-એસિટાઇલેઝ) ઉત્સેચક એસિટાઇલ સમૂહને દૂર કરે છે, જેથી ક્રોમેટિન સંકોચાય છે."], "ans": 2, "exp": "એસિટાઇલેશનથી હિસ્ટોનની ધન વીજભારિતા ઘટે છે, કારણ કે એસિટાઇલ સમૂહ (CH3CO-) ન્યુટ્રલ છે, જેથી DNA સાથેની બંધન ક્ષમતા ઘટે છે. A, B, અને D વિધાનો સત્ય છે: A) એસિટાઇલેશનથી ક્રોમેટિન ખુલ્લું થાય છે, B) HAT ઉત્સેચક એસિટાઇલ સમૂહ ઉમેરે છે, D) HDAC એસિટાઇલ સમૂહ દૂર કરે છે.", "ref": "Std 12 - અધ્યાય 6: વારસાગતતાનું આણ્વિક આધાર", "ch": ""}, {"q": "નીચેના પૈકી કયું હિસ્ટોન પ્રોટીન H1 ની વિશેષતા નથી?", "opts": ["તે ન્યુક્લિઓસોમના કોર હિસ્ટોનમાં સામેલ નથી.", "તે લિંકર DNA સાથે જોડાય છે અને ક્રોમેટિન ફાઇબરને સ્થિર કરે છે.", "તે H2A, H2B, H3, અને H4 ની જેમ ઓક્ટામર સંરચના બનાવે છે.", "તે ક્રોમેટિનના ઉચ્ચ ક્રમની સંરચનામાં મહત્વની ભૂમિકા ભજવે છે."], "ans": 2, "exp": "H1 હિસ્ટોન પ્રોટીન લિંકર હિસ્ટોન છે અને ન્યુક્લિઓસોમના કોર હિસ્ટોન (H2A, H2B, H3, H4)માં સામેલ નથી. તે લિંકર DNA સાથે જોડાય છે (B) અને ક્રોમેટિનની ઉચ્ચ ક્રમની સંરચનામાં મદદ કરે છે (D). C ખોટું છે કારણ કે H1 ઓક્ટામર સંરચના બનાવતું નથી.", "ref": "Std 12 - અધ્યાય 6: વારસાગતતાનું આણ્વિક આધાર", "ch": ""}, {"q": "હિસ્ટોન પ્રોટીનના મિથાઇલેશન વિશે નીચેના પૈકી કયું વિધાન સત્ય નથી?", "opts": ["મિથાઇલેશન હિસ્ટોનના લાઇસિન અથવા આર્જિનિન અમીન એસિડ પર થાય છે.", "H3K27me3 (H3 લાઇસિન 27 પર ત્રણ મિથાઇલ સમૂહ) જીન દમન સાથે સંકળાયેલ છે.", "મિથાઇલેશનથી હિસ્ટોનની ધન વીજભારિતા ઘટે છે, જેથી DNA સાથેની બંધન ક્ષમતા ઘટે છે.", "મિથાઇલટ્રાન્સફરેઝ ઉત્સેચક દ્વારા મિથાઇલ સમૂહ ઉમેરાય છે."], "ans": 2, "exp": "મિથાઇલેશનથી હિસ્ટોનની ધન વીજભારિતા પર કોઈ અસર થતી નથી, કારણ કે મિથાઇલ સમૂહ (CH3) ન્યુટ્રલ છે. A, B, અને D સત્ય છે: A) મિથાઇલેશન લાઇસિન અથવા આર્જિનિન પર થાય છે, B) H3K27me3 જીન દમન સાથે સંકળાયેલ છે, D) મિથાઇલટ્રાન્સફરેઝ ઉત્સેચક મિથાઇલ સમૂહ ઉમેરે છે.", "ref": "Std 12 - અધ્યાય 6: વારસાગતતાનું આણ્વિક આધાર", "ch": ""}, {"q": "નીચેના પૈકી કયું હિસ્ટોન પ્રોટીનના ફોસ્ફોરાઇલેશન વિશે સત્ય છે?", "opts": ["ફોસ્ફોરાઇલેશન હિસ્ટોનના સેરિન અથવા થ્રેઓનિન અમીન એસિડ પર થાય છે.", "ફોસ્ફોરાઇલેશનથી હિસ્ટોનની ધન વીજભારિતા વધે છે, જેથી DNA સાથેની બંધન ક્ષમતા વધે છે.", "ફોસ્ફોરાઇલેશન કોષચક્ર દરમિયાન ક્રોમેટિનના સંકોચનમાં મદદ કરે છે.", "ફોસ્ફેટેઝ ઉત્સેચક દ્વારા ફોસ્ફેટ સમૂહ ઉમેરાય છે."], "ans": 0, "exp": "ફોસ્ફોરાઇલેશન હિસ્ટોનના સેરિન અથવા થ્રેઓનિન અમીન એસિડ પર થાય છે (A). B ખોટું છે કારણ કે ફોસ્ફોરાઇલેશનથી હિસ્ટોનની ધન વીજભારિતા ઘટે છે (ફોસ્ફેટ સમૂહ -1 ચાર્જ ધરાવે છે). C ખોટું છે કારણ કે ફોસ્ફોરાઇલેશન ક્રોમેટિનને ખુલ્લું કરે છે, નહીં કે સંકોચે. D ખોટું છે કારણ કે ફોસ્ફેટેઝ ફોસ્ફેટ સમૂહ દૂર કરે છે, નહીં કે ઉમેરે.", "ref": "Std 12 - અધ્યાય 6: વારસાગતતાનું આણ્વિક આધાર", "ch": ""}, {"q": "નીચેના પૈકી કયું હિસ્ટોન પ્રોટીન ન્યુક્લિઓસોમની રચનામાં ભાગ લેતું નથી પરંતુ વર્ણસૂત્રની ઉચ્ચ કક્ષાની ગૂંચળીકરણમાં મહત્વની ભૂમિકા ભજવે છે?", "opts": ["H2A", "H2B", "H3", "H1"], "ans": 3, "exp": "H1 હિસ્ટોન પ્રોટીન ન્યુક્લિઓસોમના કોર ઓક્ટામર (H2A, H2B, H3, H4) નો ભાગ નથી. તે લિંકર હિસ્ટોન તરીકે ઓળખાય છે અને DNA ની લિંકર પ્રદેશ સાથે જોડાઈને વર્ણસૂત્રની ઉચ્ચ કક્ષાની ગૂંચળીકરણ (30 nm ફાઇબર) માં મદદ કરે છે. H2A, H2B, H3 અને H4 કોર હિસ્ટોન છે જે ન્યુક્લિઓસોમની રચનામાં સીધા જ ભાગ લે છે.", "ref": "Std 12 - અધ્યાય 4: કોષવિભાજન", "ch": ""}, {"q": "હિસ્ટોન પ્રોટીન H2A ની જગ્યાએ H2A.Z વેરિયન્ટની હાજરી શા માટે મહત્વપૂર્ણ ગણાય છે?", "opts": ["તે DNA ની ડબલ હેલિક્સને વધુ સ્થિર કરે છે, જેથી ટ્રાન્સક્રિપ્શન દર ઘટે છે.", "તે ક્રોમેટિનની સંરચનામાં લવચીકતા લાવે છે, જેથી જનીન અભિવ્યક્તિ નિયંત્રણમાં મદદ મળે છે.", "તે હિસ્ટોન ઓક્ટામરની રચનાને તોડી નાખે છે, જેથી ન્યુક્લિઓસોમ બનતું નથી.", "તે DNA ની મિથાઇલેશન પ્રક્રિયાને વેગ આપે છે, જેથી જનીન સાઇલન્સિંગ થાય છે."], "ans": 1, "exp": "H2A.Z વેરિયન્ટ ક્રોમેટિનની સંરચનામાં લવચીકતા લાવે છે, જેથી જનીન અભિવ્યક્તિ નિયંત્રણમાં મદદ મળે છે. તે ટ્રાન્સક્રિપ્શન ફેક્ટરને બાંધવા માટે અનુકૂળ વાતાવરણ પૂરું પાડે છે. A) ખોટું છે કારણ કે H2A.Z DNA ની સ્થિરતા ઘટાડે છે, ટ્રાન્સક્રિપ્શન દર વધારે છે. C) ખોટું છે કારણ કે H2A.Z હિસ્ટોન ઓક્ટામરની રચનાને તોડતું નથી. D) ખોટું છે કારણ કે H2A.Z મિથાઇલેશન સાથે સીધો સંબંધ ધરાવતું નથી.", "ref": "Std 12 - અધ્યાય 6: વારસાગતતાનું આણ્વિક આધાર", "ch": ""}, {"q": "હિસ્ટોન પ્રોટીનના એસિટાઇલેશન અને મિથાઇલેશન વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["એસિટાઇલેશન ક્રોમેટિનને સંકોચિત કરે છે જ્યારે મિથાઇલેશન તેને શિથિલ કરે છે.", "એસિટાઇલેશન લાઇસિન અમીનોએસિડ પર થાય છે જ્યારે મિથાઇલેશન આર્જિનિન અને લાઇસિન બંને પર થાય છે.", "એસિટાઇલેશન જનીન અભિવ્યક્તિને અવરોધે છે જ્યારે મિથાઇલેશન તેને પ્રોત્સાહન આપે છે.", "એસિટાઇલેશન હિસ્ટોન પ્રોટીનના C-ટર્મિનલ પર થાય છે જ્યારે મિથાઇલેશન N-ટર્મિનલ પર થાય છે."], "ans": 1, "exp": "એસિટાઇલેશન લાઇસિન અમીનોએસિડ પર થાય છે જ્યારે મિથાઇલેશન આર્જિનિન અને લાઇસિન બંને પર થાય છે. A) ખોટું છે કારણ કે એસિટાઇલેશન ક્રોમેટિનને શિથિલ કરે છે જ્યારે મિથાઇલેશન સંકોચિત કરે છે. C) ખોટું છે કારણ કે એસિટાઇલેશન જનીન અભિવ્યક્તિને પ્રોત્સાહન આપે છે જ્યારે મિથાઇલેશન અવરોધે છે. D) ખોટું છે કારણ કે બંને સંશોધનો N-ટર્મિનલ પર થાય છે.", "ref": "Std 12 - અધ્યાય 6: વારસાગતતાનું આણ્વિક આધાર", "ch": ""}, {"q": "હિસ્ટોન પ્રોટીન H1 ની ભૂમિકા સંબંધિત નીચેના પૈકી કયું વિધાન સત્ય છે?", "opts": ["તે ન્યુક્લિઓસોમના કોરમાં સમાવિષ્ટ થાય છે અને DNA ને સ્થિર કરે છે.", "તે લિંકર DNA ને બાંધે છે અને ક્રોમેટિન ફાઇબરની રચનામાં મદદ કરે છે.", "તે હિસ્ટોન ઓક્ટામરની રચનાને તોડી નાખે છે, જેથી ટ્રાન્સક્રિપ્શન સરળ થાય છે.", "તે DNA ની ડબલ હેલિક્સને વળાંક આપે છે, જેથી ન્યુક્લિઓસોમ બનતું નથી."], "ans": 1, "exp": "H1 હિસ્ટોન પ્રોટીન લિંકર DNA ને બાંધે છે અને ક્રોમેટિન ફાઇબરની રચનામાં મદદ કરે છે. A) ખોટું છે કારણ કે H1 ન્યુક્લિઓસોમના કોરમાં સમાવિષ્ટ થતું નથી. C) ખોટું છે કારણ કે H1 હિસ્ટોન ઓક્ટામરની રચનાને તોડતું નથી. D) ખોટું છે કારણ કે H1 DNA ની ડબલ હેલિક્સને વળાંક આપતું નથી.", "ref": "Std 12 - અધ્યાય 6: વારસાગતતાનું આણ્વિક આધાર", "ch": ""}, {"q": "હિસ્ટોન પ્રોટીનના ફોસ્ફોરાઇલેશન સંશોધન વિશે નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["ફોસ્ફોરાઇલેશન સેરિન અને થ્રેઓનિન અમીનોએસિડ પર થાય છે.", "ફોસ્ફોરાઇલેશન ક્રોમેટિનની સંરચનાને શિથિલ કરે છે, જેથી ટ્રાન્સક્રિપ્શન સરળ થાય છે.", "ફોસ્ફોરાઇલેશન હિસ્ટોન પ્રોટીનની વીજભારિત પ્રકૃતિને ઘટાડે છે, જેથી DNA સાથેની અંતરક્રિયા ઓછી થાય છે.", "ફોસ્ફોરાઇલેશન કોષચક્ર દરમિયાન ક્રોમોસોમલ કંડેન્સેશનને પ્રોત્સાહન આપે છે."], "ans": 2, "exp": "ફોસ્ફોરાઇલેશન હિસ્ટોન પ્રોટીનની વીજભારિત પ્રકૃતિને વધારે છે, જેથી DNA સાથેની અંતરક્રિયા ઘટે છે. A) સત્ય છે કારણ કે ફોસ્ફોરાઇલેશન સેરિન અને થ્રેઓનિન પર થાય છે. B) સત્ય છે કારણ કે ફોસ્ફોરાઇલેશન ક્રોમેટિનને શિથિલ કરે છે. D) સત્ય છે કારણ કે ફોસ્ફોરાઇલેશન કોષચક્ર દરમિયાન ક્રોમોસોમલ કંડેન્સેશનને પ્રોત્સાહન આપે છે.", "ref": "Std 12 - અધ્યાય 6: વારસાગતતાનું આણ્વિક આધાર", "ch": ""}, {"q": "હિસ્ટોન પ્રોટીન અને DNA વચ્ચેની અંતરક્રિયા વિશે નીચેના પૈકી કયું વિધાન અપવાદરૂપ છે?", "opts": ["હિસ્ટોન પ્રોટીનના પોઝિટિવ ચાર્જ ડી.એન.એ. ના નેગેટિવ ચાર્જ સાથે આકર્ષણ પેદા કરે છે.", "હિસ્ટોન પ્રોટીનના N-ટર્મિનલ ટેઇલ DNA ની મુખ્ય ખાંચમાં બંધાય છે.", "હિસ્ટોન પ્રોટીનના આર્જિનિન અને લાઇસિન અમીનોએસિડ DNA ની ફોસ્ફેટ જૂથ સાથે હાઇડ્રોજન બંધ રચે છે.", "હિસ્ટોન પ્રોટીન અને DNA વચ્ચેની અંતરક્રિયા મુખ્યત્વે ઇલેક્ટ્રોસ્ટેટિક અને હાઇડ્રોફોબિક બળો દ્વારા થાય છે."], "ans": 1, "exp": "હિસ્ટોન પ્રોટીનના N-ટર્મિનલ ટેઇલ DNA ની મુખ્ય ખાંચમાં બંધાતા નથી, પરંતુ તે DNA ની બાજુની ખાંચ સાથે અંતરક્રિયા કરે છે. A) સત્ય છે કારણ કે હિસ્ટોન પ્રોટીનના પોઝિટિવ ચાર્જ ડી.એન.એ. ના નેગેટિવ ચાર્જ સાથે આકર્ષણ પેદા કરે છે. C) સત્ય છે કારણ કે આર્જિનિન અને લાઇસિન અમીનોએસિડ DNA ની ફોસ્ફેટ જૂથ સાથે હાઇડ્રોજન બંધ રચે છે. D) સત્ય છે કારણ કે અંતરક્રિયા મુખ્યત્વે ઇલેક્ટ્રોસ્ટેટિક અને હાઇડ્રોફોબિક બળો દ્વારા થાય છે.", "ref": "Std 12 - અધ્યાય 6: વારસાગતતાનું આણ્વિક આધાર", "ch": ""}];

  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
