<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>બીજની રચના</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>બીજની રચના</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">બીજની રચના</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "બીજની રચના દરમિયાન, બીજાશયમાંથી બીજબજારની રચના કયા પ્રક્રિયા દ્વારા થાય છે ?", "opts": ["મિયોસિસ-I", "મિયોસિસ-II", "મિટોસિસ", "એમિટોસિસ"], "ans": 1, "exp": "બીજાશયમાંથી બીજબજારની રચના મિયોસિસ-II દ્વારા થાય છે. મિયોસિસ-I દરમિયાન બીજાશયમધ્યસ્થ કોષ (megaspore mother cell) વડે ચાર હેપ્લોઈડ કોષો બને છે, પરંતુ બીજબજારની રચના મિયોસિસ-II ના તબક્કામાં થાય છે. મિટોસિસ અને એમિટોસિસ બીજની રચનામાં ભાગ લેતી નથી.", "ref": "Std 12 - પ્રકરણ ૨: જનન (Reproduction)", "ch": ""}, {"q": "બીજમાં એલ્યુરોન સ્તર કયા પેશીના વિકાસ દ્વારા બને છે ?", "opts": ["બીજાશયની બાહ્ય પેશી", "બીજાશયની અંતઃપેશી", "બીજાશયની મધ્ય પેશી", "બીજાશયની ત્વચા પેશી"], "ans": 1, "exp": "એલ્યુરોન સ્તર બીજાશયની અંતઃપેશી (inner integument) ના વિકાસ દ્વારા બને છે. બાહ્ય પેશી (outer integument) વડે બીજની બાહ્ય ત્વચા બને છે, જ્યારે મધ્ય પેશી અને ત્વચા પેશી એલ્યુરોન સ્તરની રચનામાં ભાગ લેતી નથી.", "ref": "Std 12 - પ્રકરણ ૨: જનન (Reproduction)", "ch": ""}, {"q": "બીજની રચના દરમિયાન, કયા હોર્મોનની ઉણપથી બીજનું અંકુરણ અટકી જાય છે ?", "opts": ["ઓક્સિન", "જિબ્રેલિન", "સાયટોકાઇનિન", "એબ્સિસિક એસિડ"], "ans": 3, "exp": "એબ્સિસિક એસિડ (ABA) ની ઉણપથી બીજનું અંકુરણ અટકી જાય છે. ઓક્સિન, જિબ્રેલિન અને સાયટોકાઇનિન બીજના અંકુરણને પ્રોત્સાહન આપે છે, પરંતુ ABA બીજના સુપ્તાવસ્થા (dormancy) ને જાળવી રાખે છે.", "ref": "Std 12 - પ્રકરણ ૨: જનન (Reproduction)", "ch": ""}, {"q": "બીજમાં ભ્રૂણપોષ (endosperm) ની રચના કયા પ્રક્રિયા દ્વારા થાય છે ?", "opts": ["એકલ કોષીય સંલયન", "દ્વિગુણ કોષીય સંલયન", "ત્રિગુણ કોષીય સંલયન", "ચતુર્ગુણ કોષીય સંલયન"], "ans": 2, "exp": "ભ્રૂણપોષની રચના ત્રિગુણ કોષીય સંલયન (triple fusion) દ્વારા થાય છે, જેમાં બીજાશયમાં રહેલા દ્વિતીય કોષકેન્દ્ર (secondary nucleus) સાથે પુરુષ ગેમીટ (male gamete) નું સંલયન થાય છે. એકલ, દ્વિગુણ અને ચતુર્ગુણ કોષીય સંલયન ભ્રૂણપોષની રચનામાં ભાગ લેતા નથી.", "ref": "Std 12 - પ્રકરણ ૨: જનન (Reproduction)", "ch": ""}, {"q": "બીજની રચના દરમિયાન, કયા વર્ણસૂત્રી તબક્કામાં કોષકેન્દ્રીય વિભાજન થાય છે ?", "opts": ["પ્રોફેઝ-I", "મેટાફેઝ-I", "એનાફેઝ-I", "ટેલોફેઝ-I"], "ans": 3, "exp": "ટેલોફેઝ-I દરમિયાન કોષકેન્દ્રીય વિભાજન (cytokinesis) થાય છે. પ્રોફેઝ-I, મેટાફેઝ-I અને એનાફેઝ-I દરમિયાન કોષકેન્દ્રીય વિભાજન થતું નથી, પરંતુ વર્ણસૂત્રોનું વિભાજન થાય છે.", "ref": "Std 12 - પ્રકરણ ૨: જનન (Reproduction)", "ch": ""}, {"q": "બીજની રચના દરમિયાન, ભ્રૂણકોષ (embryo sac) માં કયા કોષનો વિકાસ થતો નથી?", "opts": ["એન્ટીપોડલ કોષ", "સિનર્જીડ કોષ", "પોલર કોષ", "જનનકોષ"], "ans": 3, "exp": "ભ્રૂણકોષમાં એન્ટીપોડલ કોષ (3), સિનર્જીડ કોષ (2), અને પોલર કોષ (1) વિકસે છે, પરંતુ જનનકોષ (D) ભ્રૂણકોષનો ભાગ નથી. જનનકોષ પરાગકણમાં જોવા મળે છે. એન્ટીપોડલ કોષ ભ્રૂણકોષના છેડે સ્થિત થાય છે, સિનર્જીડ કોષ મધ્યમાં થાય છે, અને પોલર કોષ ભ્રૂણપોષની રચનામાં ભાગ લે છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "બીજની રચના દરમિયાન, દ્વિઅંકુરણ (double fertilization) ની પ્રક્રિયામાં કયા બે કોષોનું સંલયન થાય છે?", "opts": ["એક જનનકોષ અને એક પોલર કોષ", "એક જનનકોષ અને અંડકોષ", "બે જનનકોષ અને એક પોલર કોષ", "બે પોલર કોષ અને એક જનનકોષ"], "ans": 1, "exp": "દ્વિઅંકુરણમાં એક જનનકોષ અંડકોષ સાથે સંલયન પામી ભ્રૂણની રચના કરે છે, જ્યારે બીજો જનનકોષ બે પોલર કોષો સાથે સંલયન પામી ભ્રૂણપોષની રચના કરે છે. પરંતુ પ્રશ્નમાં પૂછવામાં આવ્યું છે કે કયા બે કોષોનું સંલયન થાય છે, જે અંડકોષ અને જનનકોષનું હોય છે. બાકીના વિકલ્પો અશુદ્ધ છે કારણ કે દ્વિઅંકુરણમાં બે જનનકોષોનો ઉપયોગ થતો નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "બીજની રચના દરમિયાન, કયા પેશીના કોષો ભ્રૂણપોષમાં રૂપાંતરિત થતાં નથી?", "opts": ["ભ્રૂણકોષના પોલર કોષ", "ભ્રૂણકોષના સિનર્જીડ કોષ", "ભ્રૂણકોષના એન્ટીપોડલ કોષ", "ભ્રૂણકોષના અંડકોષ"], "ans": 2, "exp": "ભ્રૂણપોષની રચના ભ્રૂણકોષના પોલર કોષો અને જનનકોષના સંલયન દ્વારા થાય છે. સિનર્જીડ કોષ અને અંડકોષ ભ્રૂણની રચનામાં ભાગ લે છે, જ્યારે એન્ટીપોડલ કોષનો ભ્રૂણપોષની રચનામાં કોઈ ભાગ નથી. એન્ટીપોડલ કોષ ભ્રૂણકોષમાં સ્થિત થાય છે પરંતુ ભ્રૂણપોષમાં રૂપાંતરિત થતો નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "બીજની રચના દરમિયાન, કયા હોર્મોનની હાજરી ભ્રૂણપોષના વિકાસને પ્રોત્સાહન આપે છે?", "opts": ["ઓક્સિન", "જિબ્રેલિન", "સાયટોકાઇનિન", "એબ્સિસિક એસિડ"], "ans": 2, "exp": "સાયટોકાઇનિન હોર્મોન ભ્રૂણપોષના વિકાસને પ્રોત્સાહન આપે છે. ઓક્સિન અને જિબ્રેલિન ભ્રૂણના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે, પરંતુ ભ્રૂણપોષના વિકાસમાં સાયટોકાઇનિન મહત્વનું છે. એબ્સિસિક એસિડ બીજના સુપ્તાવસ્થામાં મહત્વનું છે, પરંતુ ભ્રૂણપોષના વિકાસમાં નહીં.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "બીજની રચના દરમિયાન, કયા તબક્કે ભ્રૂણકોષમાં 8 કોષો અને 7 કોષકેન્દ્રો હાજર હોય છે?", "opts": ["ભ્રૂણકોષના વિકાસના પ્રારંભિક તબક્કે", "પરાગનયન પછી તરત જ", "દ્વિઅંકુરણ પહેલા", "દ્વિઅંકુરણ પછી"], "ans": 2, "exp": "ભ્રૂણકોષના વિકાસ દરમિયાન, દ્વિઅંકુરણ પહેલા ભ્રૂણકોષમાં 8 કોષો (3 એન્ટીપોડલ, 2 સિનર્જીડ, 1 અંડકોષ, અને 2 પોલર કોષ) અને 7 કોષકેન્દ્રો હાજર હોય છે. પરાગનયન પછી ભ્રૂણકોષ વિકસિત થવાનું શરૂ કરે છે, પરંતુ તે સમયે 8 કોષો અને 7 કોષકેન્દ્રો હાજર નથી. દ્વિઅંકુરણ પછી ભ્રૂણ અને ભ્રૂણપોષની રચના થાય છે, જેમાં કોષોની સંખ્યા બદલાય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "એકદળી વનસ્પતિમાં બીજની રચના દરમિયાન, ભ્રૂણપોષ (endosperm) ના કયા પ્રકારનું નિર્માણ થાય છે જે અન્ય વનસ્પતિઓથી અલગ હોય છે?", "opts": ["કોષકેન્દ્રીય ભ્રૂણપોષ (Nuclear endosperm)", "કોષીય ભ્રૂણપોષ (Cellular endosperm)", "હેલોબિયલ ભ્રૂણપોષ (Helobial endosperm)", "અવિભાજિત ભ્રૂણપોષ (Non-ruminate endosperm)"], "ans": 2, "exp": "એકદળી વનસ્પતિઓમાં સામાન્ય રીતે હેલોબિયલ ભ્રૂણપોષનું નિર્માણ થાય છે, જેમાં પ્રથમ વિભાજન અસમમિત હોય છે અને બે અસમાન કોષો બને છે. કોષકેન્દ્રીય ભ્રૂણપોષ મોટાભાગે દ્વિદળી વનસ્પતિઓમાં જોવા મળે છે, જ્યારે કોષીય ભ્રૂણપોષ કેટલીક દ્વિદળી વનસ્પતિઓમાં જોવા મળે છે. અવિભાજિત ભ્રૂણપોષ એ ખાસ પ્રકારનો ભ્રૂણપોષ છે જે કેટલીક વિશિષ્ટ વનસ્પતિઓમાં જોવા મળે છે, પરંતુ તે એકદળી વનસ્પતિઓનો લાક્ષણિક ગુણ નથી.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિઓમાં પ્રજનન", "ch": ""}, {"q": "બીજની રચના દરમિયાન, કયા કોષમાંથી ભ્રૂણનો વિકાસ થાય છે પરંતુ તે કોષ પોતે ભ્રૂણનો ભાગ બનતો નથી?", "opts": ["સહાયક કોષ (Synergid cell)", "ઈંડાંકોષ (Egg cell)", "પ્રાથમિક ભ્રૂણપોષ કોષ (Primary endosperm nucleus)", "પ્રતિધ્રુવીય કોષ (Antipodal cell)"], "ans": 1, "exp": "બીજની રચના દરમિયાન, ઈંડાંકોષનું નર જન્યુકોષ સાથે સંલયન થઈને યુગ્મનજ (zygote) બને છે, જે પછીથી ભ્રૂણમાં વિકસે છે. જોકે, ઈંડાંકોષ પોતે ભ્રૂણનો ભાગ બનતો નથી, પરંતુ તે ભ્રૂણના વિકાસ માટે પ્રાથમિક કોષ છે. સહાયક કોષ અને પ્રતિધ્રુવીય કોષ ભ્રૂણના વિકાસમાં સીધી રીતે ભાગ લેતા નથી, જ્યારે પ્રાથમિક ભ્રૂણપોષ કોષ ભ્રૂણપોષમાં રૂપાંતરિત થાય છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિઓમાં પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન બીજની રચના દરમિયાન થતી પ્રક્રિયા માટે ખોટું છે?", "opts": ["દ્વિઅંકુરણ (Double fertilization) દરમિયાન એક નર જન્યુકોષ ઈંડાંકોષ સાથે અને બીજો નર જન્યુકોષ દ્વિતીય કોષકેન્દ્ર સાથે જોડાય છે.", "ભ્રૂણપોષનું નિર્માણ ત્રિકોષકેન્દ્રીય સંલયન (Triple fusion) દ્વારા થાય છે.", "ભ્રૂણનો વિકાસ હંમેશા ભ્રૂણપોષના વિકાસ પહેલાં થાય છે.", "કેટલીક વનસ્પતિઓમાં ભ્રૂણપોષ વગરનું બીજ (Non-albuminous seed) બને છે."], "ans": 2, "exp": "ભ્રૂણનો વિકાસ હંમેશા ભ્રૂણપોષના વિકાસ પહેલાં થતો નથી. વાસ્તવમાં, મોટાભાગની વનસ્પતિઓમાં ભ્રૂણપોષનો વિકાસ ભ્રૂણના વિકાસ સાથે સમાંતર અથવા તેના પહેલાં થાય છે, કારણ કે ભ્રૂણપોષ ભ્રૂણને પોષણ પૂરું પાડે છે. અન્ય તમામ વિધાનો સાચાં છે: દ્વિઅંકુરણમાં બે નર જન્યુકોષોનું સંલયન થાય છે, ત્રિકોષકેન્દ્રીય સંલયનથી ભ્રૂણપોષ બને છે, અને કેટલીક વનસ્પતિઓમાં ભ્રૂણપોષ વગરના બીજ બને છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિઓમાં પ્રજનન", "ch": ""}, {"q": "બીજની રચના દરમિયાન, કયા ઉત્સેચકની હાજરી બીજમાં સંગ્રહિત કાર્બોદિતને સરળ શર્કરામાં રૂપાંતરિત કરવામાં મદદ કરે છે, જે અંકુરણ માટે જરૂરી છે?", "opts": ["એમાયલેઝ (Amylase)", "પ્રોટીએઝ (Protease)", "લાઇપેઝ (Lipase)", "સેલ્યુલેઝ (Cellulase)"], "ans": 0, "exp": "એમાયલેઝ ઉત્સેચક બીજમાં સંગ્રહિત સ્ટાર્ચ (કાર્બોદિત) ને સરળ શર્કરા (મોલ્ટોઝ અને ગ્લુકોઝ) માં રૂપાંતરિત કરે છે, જે અંકુરણ દરમિયાન ભ્રૂણને ઊર્જા પૂરી પાડે છે. પ્રોટીએઝ પ્રોટીનનું વિઘટન કરે છે, લાઇપેઝ ચરબીનું વિઘટન કરે છે, અને સેલ્યુલેઝ સેલ્યુલોઝનું વિઘટન કરે છે, જે બીજના અંકુરણ માટે સીધી રીતે જવાબદાર નથી.", "ref": "Std 11 - પ્રકરણ 12: વનસ્પતિઓમાં ખનીજ પોષણ અને ઉત્સેચકો", "ch": ""}, {"q": "નીચેના પૈકી કયું બીજની રચના સાથે સંકળાયેલું નથી, પરંતુ અન્ય વનસ્પતિ પ્રજનન પ્રક્રિયા સાથે સંબંધિત છે?", "opts": ["પરાગરજનું પરાગાસન પર સ્થાપન (Pollination)", "ભ્રૂણપોષનું નિર્માણ (Endosperm formation)", "બીજાવરણનું નિર્માણ (Seed coat formation)", "ભ્રૂણનો વિકાસ (Embryo development)"], "ans": 0, "exp": "પરાગરજનું પરાગાસન પર સ્થાપન એ બીજની રચના પહેલાંની પ્રક્રિયા છે, જે બીજની રચના માટે જરૂરી છે પરંતુ તે સીધી રીતે બીજની રચના સાથે સંકળાયેલી નથી. બાકીના વિકલ્પો (ભ્રૂણપોષનું નિર્માણ, બીજાવરણનું નિર્માણ, અને ભ્રૂણનો વિકાસ) સીધા બીજની રચના સાથે સંબંધિત છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિઓમાં પ્રજનન", "ch": ""}, {"q": "બીજની રચના દરમિયાન, ભ્રૂણકોષમાં થતી દ્વિઅંકુરણ પ્રક્રિયા પછી, કયા કોષમાંથી સસ્પેન્શર (suspensor) નું નિર્માણ થાય છે ?", "opts": ["અંડકોષ (egg cell) અને નર ગેમેટ (male gamete) ના સંલયનથી બનતા ઝાયગોટ (zygote) માંથી", "દ્વિતીય કોષકેન્દ્ર (secondary nucleus) અને નર ગેમેટ ના સંલયનથી બનતા પ્રાથમિક ભ્રૂણપોષ કોષ (primary endosperm nucleus) માંથી", "ભ્રૂણકોષના એન્ટીપોડલ કોષ (antipodal cells) માંથી", "ભ્રૂણકોષના સિનર્જીડ કોષ (synergid cells) માંથી"], "ans": 0, "exp": "દ્વિઅંકુરણ પછી, ઝાયગોટ (zygote) નું વિભાજન થાય છે, જેમાંથી ભ્રૂણ અને સસ્પેન્શર નું નિર્માણ થાય છે. સસ્પેન્શર ભ્રૂણને ભ્રૂણકોષમાં સ્થિર રાખવામાં મદદ કરે છે. અંડકોષ અને નર ગેમેટના સંલયનથી ઝાયગોટ બને છે, જેથી વિકલ્પ A સાચો છે. દ્વિતીય કોષકેન્દ્ર અને નર ગેમેટના સંલયનથી ભ્રૂણપોષ બને છે (વિકલ્પ B ખોટો). એન્ટીપોડલ અને સિનર્જીડ કોષો ભ્રૂણકોષના અન્ય કોષો છે, પરંતુ તેઓ સસ્પેન્શરમાં રૂપાંતરિત થતાં નથી (વિકલ્પ C અને D ખોટા).", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "એકદળી વનસ્પતિઓમાં, બીજની રચના દરમિયાન, ભ્રૂણપોષનું નિર્માણ કયા પ્રકારે થાય છે અને તે કયા કોષના વિભાજન દ્વારા થાય છે ?", "opts": ["હેપ્લોઈડ, અંડકોષના વિભાજન દ્વારા", "ટ્રિપ્લોઈડ, દ્વિતીય કોષકેન્દ્ર અને નર ગેમેટના સંલયન પછી વિભાજન દ્વારા", "ડિપ્લોઈડ, નર ગેમેટના વિભાજન દ્વારા", "ટેટ્રાપ્લોઈડ, ભ્રૂણકોષના સહાયક કોષોના વિભાજન દ્વારા"], "ans": 1, "exp": "એકદળી વનસ્પતિઓમાં, ભ્રૂણપોષ ટ્રિપ્લોઈડ (3n) હોય છે, કારણ કે તે દ્વિતીય કોષકેન્દ્ર (2n) અને નર ગેમેટ (n) ના સંલયનથી બને છે. આ સંલયન પછી, પ્રાથમિક ભ્રૂણપોષ કોષ વિભાજિત થઈને ભ્રૂણપોષનું નિર્માણ કરે છે. વિકલ્પ A ખોટો છે કારણ કે ભ્રૂણપોષ હેપ્લોઈડ નથી અને અંડકોષના વિભાજનથી નથી બનતું. વિકલ્પ C ખોટો છે કારણ કે ભ્રૂણપોષ ડિપ્લોઈડ નથી અને નર ગેમેટના વિભાજનથી નથી બનતું. વિકલ્પ D ખોટો છે કારણ કે ભ્રૂણપોષ ટેટ્રાપ્લોઈડ નથી અને ભ્રૂણકોષના સહાયક કોષોના વિભાજનથી નથી બનતું.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "બીજની રચના દરમિયાન, ભ્રૂણકોષમાં હાજર રહેતા સિનર્જીડ કોષોનો મુખ્ય કાર્ય કયો છે ?", "opts": ["ભ્રૂણપોષના વિકાસમાં મદદ કરવી", "અંડકોષને પોષણ પૂરું પાડવું અને પરાગનલિકાને આકર્ષવી", "ભ્રૂણના વિકાસમાં સહાય કરવી", "બીજાશયની દીવાલને તોડીને બીજને બહાર કાઢવું"], "ans": 1, "exp": "સિનર્જીડ કોષો ભ્રૂણકોષમાં હાજર રહે છે અને તેમનો મુખ્ય કાર્ય અંડકોષને પોષણ પૂરું પાડવું અને પરાગનલિકાને આકર્ષવી છે, જેથી પરાગરજ બીજાશય સુધી પહોંચી શકે. વિકલ્પ A ખોટો છે કારણ કે ભ્રૂણપોષના વિકાસમાં સિનર્જીડ કોષોની ભૂમિકા નથી. વિકલ્પ C ખોટો છે કારણ કે ભ્રૂણના વિકાસમાં સિનર્જીડ કોષો સીધી ભૂમિકા ભજવતાં નથી. વિકલ્પ D ખોટો છે કારણ કે બીજાશયની દીવાલને તોડવાનું કાર્ય બીજાશયના અન્ય પેશીઓ દ્વારા થાય છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "બીજની રચના દરમિયાન, નીચેના પૈકી કયું વિધાન અંડપરાગણ (apomixis) વિશે સાચું નથી ?", "opts": ["અંડપરાગણમાં, બીજનું નિર્માણ લૈંગિક પ્રજનન વિના થાય છે", "અંડપરાગણમાં, ભ્રૂણપોષનું નિર્માણ થાય છે પરંતુ ભ્રૂણનું નિર્માણ થતું નથી", "અંડપરાગણમાં, ભ્રૂણ અંડકોષમાંથી વિકસે છે પરંતુ પરાગરજની જરૂરિયાત રહેતી નથી", "અંડપરાગણમાં, બીજનું નિર્માણ હેપ્લોઈડ અથવા ડિપ્લોઈડ હોઈ શકે છે"], "ans": 1, "exp": "અંડપરાગણ (apomixis) એ અલૈંગિક પ્રજનનની એક પ્રક્રિયા છે જેમાં બીજનું નિર્માણ લૈંગિક પ્રજનન વિના થાય છે. આ પ્રક્રિયામાં, ભ્રૂણ અંડકોષમાંથી વિકસે છે પરંતુ પરાગરજની જરૂરિયાત રહેતી નથી (વિકલ્પ C સાચો). બીજનું નિર્માણ હેપ્લોઈડ અથવા ડિપ્લોઈડ હોઈ શકે છે (વિકલ્પ D સાચો). પરંતુ ભ્રૂણપોષનું નિર્માણ થાય છે અને ભ્રૂણનું નિર્માણ પણ થાય છે (વિકલ્પ B ખોટો).", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "બીજની રચના દરમિયાન, નીચેના પૈકી કયો હોર્મોન ભ્રૂણપોષના વિકાસને અટકાવે છે અને બીજના અંકુરણને પ્રોત્સાહન આપે છે ?", "opts": ["ઓક્સિન (Auxin)", "જિબ્બરેલિન (Gibberellin)", "એબ્સિસિક એસિડ (Abscisic Acid)", "સાયટોકાઇનિન (Cytokinin)"], "ans": 2, "exp": "એબ્સિસિક એસિડ (ABA) એ હોર્મોન છે જે ભ્રૂણપોષના વિકાસને અટકાવે છે અને બીજના અંકુરણને પ્રોત્સાહન આપે છે. ઓક્સિન (વિકલ્પ A) અને જિબ્બરેલિન (વિકલ્પ B) ભ્રૂણપોષના વિકાસને પ્રોત્સાહન આપે છે, પરંતુ અંકુરણને અટકાવી શકે છે. સાયટોકાઇનિન (વિકલ્પ D) કોષવિભાજનને પ્રોત્સાહન આપે છે, પરંતુ ભ્રૂણપોષના વિકાસ અથવા અંકુરણ પર સીધી અસર કરતું નથી.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન અને પ્રકરણ 15: વનસ્પતિ વૃદ્ધિ અને વિકાસ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
