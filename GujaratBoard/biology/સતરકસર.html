<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>સ્ત્રીકેસર</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>સ્ત્રીકેસર</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">સ્ત્રીકેસર</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ફૂલના સ્ત્રીકેસરમાં આવેલા ભાગોમાંથી કયો ભાગ પરાગરજને સ્વીકારીને પરાગનલિકાનું નિર્માણ કરે છે?", "opts": ["પરાગાસન (Stigma)", "પરાગવાહિની (Style)", "બીજાશય (Ovary)", "અંડક (Ovule)"], "ans": 0, "exp": "પરાગાસન એ સ્ત્રીકેસરનો સૌથી ઉપરનો ભાગ છે જે પરાગરજને સ્વીકારે છે અને પરાગનલિકાના નિર્માણ માટે જરૂરી ઉત્સેચકો ધરાવે છે. પરાગવાહિની માત્ર પરાગનલિકાને બીજાશય સુધી પહોંચાડવાનો માર્ગ પૂરો પાડે છે, બીજાશય અંડકો ધરાવે છે પરંતુ પરાગરજ સ્વીકારતો નથી, અને અંડક ફલીકરણ પછી બીજમાં રૂપાંતરિત થાય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "એકસદની (monocarpellary) સ્ત્રીકેસર ધરાવતા ફૂલમાં બીજાશયમાં અંડકોની ગોઠવણી કેવી હોય છે?", "opts": ["અક્ષીય (Axile)", "મુક્ત કેન્દ્રીય (Free central)", "ધારાવર્તી (Marginal)", "પાયાવર્તી (Basal)"], "ans": 0, "exp": "એકસદની સ્ત્રીકેસરમાં અંડકો બીજાશયની ધાર પર ગોઠવાય છે, જેને ધારાવર્તી ગોઠવણી કહે છે. અક્ષીય ગોઠવણી બહુસદની સ્ત્રીકેસરમાં જોવા મળે છે, મુક્ત કેન્દ્રીય ગોઠવણી પ્રાયમરોઝ જેવા કેટલાક દ્વિદળી વનસ્પતિઓમાં જોવા મળે છે, અને પાયાવર્તી ગોઠવણી સૂર્યમુખી કુળમાં જોવા મળે છે.", "ref": "Std 11 - પ્રકરણ 5: પુષ્પીય વનસ્પતિઓની બાહ્યાકારવિજ્ઞાન", "ch": ""}, {"q": "સ્ત્રીકેસરના કયા ભાગમાંથી ફળનો વિકાસ થાય છે, જ્યારે ફલીકરણ પછી બીજનું નિર્માણ અંડકમાંથી થાય છે?", "opts": ["પરાગાસન", "પરાગવાહિની", "બીજાશય", "અંડક"], "ans": 0, "exp": "ફલીકરણ પછી બીજાશય ફળમાં રૂપાંતરિત થાય છે, જ્યારે અંડક બીજમાં રૂપાંતરિત થાય છે. પરાગાસન અને પરાગવાહિની ફલીકરણ પછી સુકાઈ જાય છે અને ફળના વિકાસમાં ભાગ લેતા નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન સ્ત્રીકેસરના સંદર્ભમાં ખોટું છે?", "opts": ["બહુસદની સ્ત્રીકેસરમાં બીજાશય એક કરતાં વધુ કોટરોમાં વહેંચાયેલું હોય છે", "પરાગવાહિનીની લંબાઈ પ્રજાતિઓ પ્રમાણે અલગ-અલગ હોય છે અને કેટલીક વનસ્પતિઓમાં તે ગેરહાજર પણ હોય છે", "પરાગાસન હંમેશા ચીકણું અને ખરબચડું હોય છે જે પરાગરજને પકડી રાખવામાં મદદ કરે છે", "અંડકમાં માત્ર એક જ અંડકોષ હોય છે જે ફલીકરણ પછી ભ્રૂણમાં વિકસે છે"], "ans": 0, "exp": "વિધાન D ખોટું છે કારણ કે અંડકમાં એક અંડકોષ ઉપરાંત બે સહાયક કોષો, એક અંડપ્રયોગ અને ત્રણ પ્રતિધ્રુવીય કોષો પણ હોય છે. બાકીના વિધાનો સાચાં છે: બહુસદની સ્ત્રીકેસરમાં બીજાશય બહુકોટરીય હોય છે, પરાગવાહિની કેટલીક પ્રજાતિઓમાં ગેરહાજર હોય છે (જેમ કે પોપી), અને પરાગાસન સામાન્ય રીતે ચીકણું હોય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "ફૂલના સ્ત્રીકેસરમાં પરાગવાહિનીની ગેરહાજરી કયા પ્રકારના પરાગનયન સાથે સંકળાયેલી છે?", "opts": ["જલપરાગનયન (Hydrophily)", "પવનપરાગનયન (Anemophily)", "કીટપરાગનયન (Entomophily)", "સ્વપરાગનયન (Cleistogamy)"], "ans": 0, "exp": "સ્વપરાગનયન ધરાવતા ફૂલોમાં (ક્લિસ્ટોગેમી) ફૂલ ક્યારેય ખીલતું નથી અને પરાગવાહિની ગેરહાજર હોય છે અથવા ખૂબ જ ટૂંકી હોય છે, જેથી પરાગરજ સીધી જ પરાગાસન સુધી પહોંચી શકે. જલપરાગનયન, પવનપરાગનયન અને કીટપરાગનયનમાં સામાન્ય રીતે પરાગવાહિની હાજર હોય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "સ્ત્રીકેસરમાં અંડાશયની દીવાલના કયા સ્તરમાંથી અંડક (ovule)નો વિકાસ થાય છે?", "opts": ["બાહ્યત્વચા (Epidermis)", "મધ્યસ્તર (Ground tissue)", "અંડાશયી પેશી (Placenta)", "વાસ્ક્યુલર બંડલ (Vascular bundle)"], "ans": 2, "exp": "સ્ત્રીકેસરમાં અંડાશયની દીવાલના અંડાશયી પેશી (Placenta) સ્તરમાંથી અંડકનો વિકાસ થાય છે. અંડાશયી પેશી અંડકને જોડે રાખે છે અને પોષણ પૂરું પાડે છે. બાહ્યત્વચા (A) અને મધ્યસ્તર (B) અંડકના વિકાસમાં સીધી ભૂમિકા ભજવતાં નથી. વાસ્ક્યુલર બંડલ (D) પોષણ અને પરિવહન માટે જવાબદાર છે, પરંતુ અંડકનો વિકાસ તેનાથી થતો નથી.", "ref": "Std 12 - પ્રકરણ 2: ફૂલ અને ફળ (Flower and Fruit)", "ch": ""}, {"q": "જ્યારે સ્ત્રીકેસરમાં બહુવિભાજિત અંડાશય (multilocular ovary) હોય છે, ત્યારે અંડકોની ગોઠવણી કેવી રીતે થાય છે?", "opts": ["એક જ કોથળીમાં (Unilocular)", "અંડાશયના મધ્ય ભાગમાં (Central)", "પ્રત્યેક કોથળીમાં અલગ અલગ (Locule-wise)", "અંડાશયની બાહ્ય સપાટી પર (External surface)"], "ans": 2, "exp": "બહુવિભાજિત અંડાશયમાં અંડકોની ગોઠવણી પ્રત્યેક કોથળીમાં અલગ અલગ (Locule-wise) થાય છે. આ પ્રકારના અંડાશયમાં અંડકો અલગ અલગ કોથળીઓમાં વિકસે છે. એક જ કોથળીમાં (A) અંડકોની ગોઠવણી એકસદની અંડાશયમાં થાય છે. અંડાશયના મધ્ય ભાગમાં (B) અથવા બાહ્ય સપાટી પર (D) અંડકોની ગોઠવણી થતી નથી.", "ref": "Std 12 - પ્રકરણ 2: ફૂલ અને ફળ (Flower and Fruit)", "ch": ""}, {"q": "સ્ત્રીકેસરમાં પરાગવાહિની (Style)ની લંબાઈ કયા પરિબળ પર આધાર રાખે છે?", "opts": ["ફૂલના રંગ પર", "પરાગરજના કદ પર", "અંડાશય અને પરાગપત્ર વચ્ચેના અંતર પર", "ફૂલની સુગંધ પર"], "ans": 2, "exp": "સ્ત્રીકેસરમાં પરાગવાહિનીની લંબાઈ અંડાશય અને પરાગપત્ર વચ્ચેના અંતર પર આધાર રાખે છે. પરાગવાહિની પરાગરજને અંડાશય સુધી પહોંચાડવાનું કામ કરે છે, જેથી તેની લંબાઈ આ અંતર અનુસાર નક્કી થાય છે. ફૂલના રંગ (A), પરાગરજના કદ (B), અને ફૂલની સુગંધ (D) પરાગવાહિનીની લંબાઈ પર કોઈ અસર કરતાં નથી.", "ref": "Std 12 - પ્રકરણ 2: ફૂલ અને ફળ (Flower and Fruit)", "ch": ""}, {"q": "સ્ત્રીકેસરમાં અંડકના વિકાસ દરમિયાન કયા પેશી સ્તરમાંથી અંડકવિણ (Integument) બને છે?", "opts": ["બાહ્યત્વચા (Epidermis)", "મધ્યસ્તર (Ground tissue)", "અંડાશયી પેશી (Placenta)", "વાસ્ક્યુલર બંડલ (Vascular bundle)"], "ans": 1, "exp": "સ્ત્રીકેસરમાં અંડકના વિકાસ દરમિયાન મધ્યસ્તર (Ground tissue)માંથી અંડકવિણ (Integument) બને છે. અંડકવિણ અંડકને આવરે છે અને રક્ષણ પૂરું પાડે છે. બાહ્યત્વચા (A) અને અંડાશયી પેશી (C) અંડકવિણના નિર્માણમાં સીધી ભૂમિકા ભજવતી નથી. વાસ્ક્યુલર બંડલ (D) પોષણ અને પરિવહન માટે જવાબદાર છે.", "ref": "Std 12 - પ્રકરણ 2: ફૂલ અને ફળ (Flower and Fruit)", "ch": ""}, {"q": "સ્ત્રીકેસરમાં પરાગનલિકા (Pollen tube)નો વિકાસ કયા હોર્મોનના પ્રભાવ હેઠળ થાય છે?", "opts": ["ઓક્સિન (Auxin)", "જિબ્બેરેલિન (Gibberellin)", "સાયટોકાઇનિન (Cytokinin)", "એબ્સિસિક એસિડ (Abscisic Acid)"], "ans": 0, "exp": "સ્ત્રીકેસરમાં પરાગનલિકાનો વિકાસ ઓક્સિન (Auxin) હોર્મોનના પ્રભાવ હેઠળ થાય છે. ઓક્સિન પરાગરજના અંકુરણ અને પરાગનલિકાના વિકાસને પ્રોત્સાહન આપે છે. જિબ્બેરેલિન (B) અને સાયટોકાઇનિન (C) અન્ય વિકાસાત્મક પ્રક્રિયાઓમાં ભૂમિકા ભજવે છે, પરંતુ પરાગનલિકાના વિકાસમાં નહીં. એબ્સિસિક એસિડ (D) વિકાસને અવરોધે છે.", "ref": "Std 12 - પ્રકરણ 15: વનસ્પતિ વિકાસ અને ચળવળ (Plant Growth and Movement)", "ch": ""}, {"q": "સ્ત્રીકેસરમાં અંડાશય (Ovary)ની દીવાલના ત્રણ સ્તરોમાંથી કયું સ્તર અંડક (ovule)ના વિકાસ દરમિયાન ન્યૂનતમ યોગદાન આપે છે?", "opts": ["બાહ્યત્વચા (Epidermis)", "મધ્યસ્તર (Ground tissue)", "અંતસ્તર (Endothelium)", "વાસ્ક્યુલર બંડલ (Vascular bundle)"], "ans": 0, "exp": "બાહ્યત્વચા (Epidermis) અંડકના વિકાસમાં ન્યૂનતમ યોગદાન આપે છે કારણ કે તે મુખ્યત્વે સુરક્ષા પૂરી પાડે છે. મધ્યસ્તર (Ground tissue) અંડકના પોષણ માટે જવાબદાર હોય છે, અંતસ્તર (Endothelium) અંડકના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે, અને વાસ્ક્યુલર બંડલ પોષક તત્વો અને હોર્મોનના વહન માટે જવાબદાર હોય છે.", "ref": "Std 12 - પ્રકરણ 2: ફૂલ અને ફળ (Flowers and Fruits)", "ch": ""}, {"q": "સ્ત્રીકેસરમાં પરાગનલિકા (Pollen tube)નો વિકાસ કયા પેશી સ્તરમાંથી પસાર થતો નથી?", "opts": ["પરાગવાહિની (Style)", "અંડાશય (Ovary)", "અંડકવિણ (Integument)", "પરાગાશય (Anther)"], "ans": 3, "exp": "પરાગનલિકા (Pollen tube)નો વિકાસ પરાગવાહિની (Style) અને અંડાશય (Ovary)માંથી પસાર થાય છે, અને અંડકવિણ (Integument)માં પ્રવેશ કરે છે. પરાગાશય (Anther) સ્ત્રીકેસરનો ભાગ નથી, તે પુષ્પકેસરનો ભાગ છે, તેથી પરાગનલિકા ત્યાંથી પસાર થતી નથી.", "ref": "Std 12 - પ્રકરણ 2: ફૂલ અને ફળ (Flowers and Fruits)", "ch": ""}, {"q": "સ્ત્રીકેસરમાં અંડક (Ovule)ના વિકાસ દરમિયાન, નીચેનામાંથી કયું પેશી સ્તર અંડકવિણ (Integument)ના નિર્માણમાં સીધું યોગદાન આપતું નથી?", "opts": ["બાહ્યત્વચા (Epidermis)", "મધ્યસ્તર (Ground tissue)", "અંતસ્તર (Endothelium)", "વાસ્ક્યુલર બંડલ (Vascular bundle)"], "ans": 3, "exp": "અંડકવિણ (Integument)ના નિર્માણમાં બાહ્યત્વચા (Epidermis), મધ્યસ્તર (Ground tissue), અને અંતસ્તર (Endothelium) સીધું યોગદાન આપે છે. વાસ્ક્યુલર બંડલ (Vascular bundle) અંડકના પોષણ અને વહન માટે જવાબદાર હોય છે, પરંતુ અંડકવિણના નિર્માણમાં સીધું યોગદાન આપતું નથી.", "ref": "Std 12 - પ્રકરણ 2: ફૂલ અને ફળ (Flowers and Fruits)", "ch": ""}, {"q": "ફૂલના સ્ત્રીકેસરમાં અંડાશયના પાયાના ભાગમાં આવેલા 'અંડકપિંડ' (Placenta) ની રચના અને કાર્ય સંબંધિત નીચેનામાંથી કયું વિધાન અયોગ્ય છે?", "opts": ["અંડકપિંડ એ અંડાશયની દીવાલ સાથે જોડાયેલી પેશી છે, જેમાંથી અંડકોનો વિકાસ થાય છે.", "અંડકપિંડની ગોઠવણીના આધારે અંડાશયને એકસદની (unilocular) કે બહુસદની (multilocular) તરીકે વર્ગીકૃત કરવામાં આવે છે.", "અંડકપિંડમાંથી ઉત્પન્ન થતા અંડકો હંમેશા બીજાંડપિંડ (Funicle) દ્વારા અંડાશયની દીવાલ સાથે જોડાયેલા હોય છે, જે પોષક તત્ત્વોના પરિવહનમાં મદદ કરે છે.", "અંડકપિંડની રચના માત્ર આવૃત બીજધારી વનસ્પતિઓમાં જ જોવા મળે છે, જ્યારે અનાવૃત બીજધારી વનસ્પતિઓમાં તેની ગેરહાજરી હોય છે."], "ans": 3, "exp": "વિકલ્પ D અયોગ્ય છે કારણ કે અંડકપિંડની રચના માત્ર આવૃત બીજધારી વનસ્પતિઓમાં જ નહીં, પરંતુ કેટલીક અનાવૃત બીજધારી વનસ્પતિઓ (જેમ કે સાયકસ)માં પણ જોવા મળે છે. અંડકપિંડ એ અંડાશયની અંદરની પેશી છે, જેમાંથી અંડકો વિકસે છે (વિકલ્પ A સાચું). અંડકપિંડની ગોઠવણીના આધારે અંડાશયનું વર્ગીકરણ થાય છે (વિકલ્પ B સાચું). અંડકો બીજાંડપિંડ દ્વારા અંડકપિંડ સાથે જોડાયેલા હોય છે, જે પોષક તત્ત્વોના પરિવહનમાં મદદ કરે છે (વિકલ્પ C સાચું).", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિઓમાં પ્રજનન", "ch": ""}, {"q": "સ્ત્રીકેસરના અંડાશયમાં અંડકોની ગોઠવણી સંબંધિત નીચેના વિધાનોને ધ્યાનમાં લો અને યોગ્ય વિકલ્પ પસંદ કરો:\n\n(1) જ્યારે અંડકો અંડાશયની દીવાલના ઉપરના ભાગમાંથી ઉદ્ભવે છે, ત્યારે તેને 'અધોમુખી' (Apical) ગોઠવણી કહે છે.\n(2) 'આધારીય' (Basal) ગોઠવણીમાં અંડક અંડાશયના પાયાના ભાગમાંથી ઉદ્ભવે છે, જે એકસદની અંડાશયમાં જોવા મળે છે.\n(3) 'અક્ષીય' (Axile) ગોઠવણીમાં અંડકો અંડાશયના કેન્દ્રીય અક્ષ પર ગોઠવાયેલા હોય છે, જે બહુસદની અંડાશયમાં જોવા મળે છે.\n(4) 'મુક્ત કેન્દ્રીય' (Free central) ગોઠવણીમાં અંડકો અંડાશયના કેન્દ્રમાં મુક્ત રીતે ગોઠવાયેલા હોય છે, જે એકસદની અંડાશયમાં જોવા મળે છે.\n\nઉપરોક્ત વિધાનોમાંથી કયું/કયાં વિધાન/વિધાનો ખોટું/ખોટાં છે?", "opts": ["માત્ર (1)", "માત્ર (2) અને (4)", "માત્ર (1) અને (3)", "માત્ર (4)"], "ans": 0, "exp": "વિધાન (1) ખોટું છે કારણ કે જ્યારે અંડકો અંડાશયની દીવાલના ઉપરના ભાગમાંથી ઉદ્ભવે છે, ત્યારે તેને 'અધોમુખી' નહીં, પરંતુ 'પાર્શ્વીય' (Parietal) ગોઠવણી કહે છે. વિધાન (2) સાચું છે કારણ કે આધારીય ગોઠવણીમાં અંડક અંડાશયના પાયાના ભાગમાંથી ઉદ્ભવે છે અને તે એકસદની અંડાશયમાં જોવા મળે છે. વિધાન (3) સાચું છે કારણ કે અક્ષીય ગોઠવણીમાં અંડકો અંડાશયના કેન્દ્રીય અક્ષ પર ગોઠવાયેલા હોય છે, જે બહુસદની અંડાશયમાં જોવા મળે છે. વિધાન (4) સાચું છે કારણ કે મુક્ત કેન્દ્રીય ગોઠવણીમાં અંડકો અંડાશયના કેન્દ્રમાં મુક્ત રીતે ગોઠવાયેલા હોય છે, જે એકસદની અંડાશયમાં જોવા મળે છે.", "ref": "Std 11 - પ્રકરણ 5: વનસ્પતિઓનું બાહ્ય આકારવિજ્ઞાન", "ch": ""}, {"q": "સ્ત્રીકેસરમાં અંડાશય (ovary) ની દીવાલના ત્રણ સ્તરોમાંથી કયું સ્તર અંડક (ovule) ના વિકાસ દરમ્યાન નાશ પામે છે અને પોષક પેશી તરીકે કાર્ય કરે છે?", "opts": ["બાહ્યત્વચા (Epidermis)", "મધ્યસ્તર (Middle layer)", "અંતસ્તર (Inner layer - Tapetum)", "વાસ્ક્યુલર બંડલ (Vascular bundle)"], "ans": 2, "exp": "સ્ત્રીકેસરમાં અંડાશયની દીવાલના અંતસ્તર (Tapetum) સ્તરમાંથી અંડકનો વિકાસ થાય છે. અંતસ્તર (Tapetum) પોષક પેશી તરીકે કાર્ય કરે છે અને અંડકના વિકાસ દરમ્યાન નાશ પામે છે. બાહ્યત્વચા (A) અને મધ્યસ્તર (B) અંડકના વિકાસમાં સીધી ભૂમિકા ભજવતાં નથી. વાસ્ક્યુલર બંડલ (D) પોષણ પૂરું પાડે છે પરંતુ પોષક પેશી તરીકે કાર્ય કરતું નથી.", "ref": "Std 12 - પ્રકરણ 2: ફૂલ અને ફળ (Flower and Fruit)", "ch": ""}, {"q": "સ્ત્રીકેસરમાં પરાગનલિકા (pollen tube) નો વિકાસ કયા હોર્મોનના પ્રભાવ હેઠળ થાય છે અને તે કયા પેશી સ્તરમાંથી પસાર થતો નથી?", "opts": ["ઓક્સિન (Auxin) - બાહ્યત્વચા (Epidermis)", "જિબરેલિન (Gibberellin) - મધ્યસ્તર (Middle layer)", "સાયટોકાઇનિન (Cytokinin) - વાસ્ક્યુલર બંડલ (Vascular bundle)", "એબ્સિસિક એસિડ (Abscisic acid) - અંતસ્તર (Inner layer)"], "ans": 0, "exp": "પરાગનલિકાનો વિકાસ ઓક્સિન (Auxin) હોર્મોનના પ્રભાવ હેઠળ થાય છે. પરાગનલિકા બાહ્યત્વચા (Epidermis) માંથી પસાર થતી નથી, પરંતુ પરાગવાહિની (Style) ના મધ્ય ભાગમાંથી પસાર થાય છે. જિબરેલિન (B), સાયટોકાઇનિન (C), અને એબ્સિસિક એસિડ (D) પરાગનલિકાના વિકાસ સાથે સીધા સંકળાયેલા નથી.", "ref": "Std 12 - પ્રકરણ 2: ફૂલ અને ફળ (Flower and Fruit)", "ch": ""}, {"q": "સ્ત્રીકેસરમાં અંડક (ovule) ના વિકાસ દરમ્યાન, નીચેનામાંથી કયું પેશી સ્તર અંડકવિણ (integument) ના નિર્માણમાં ભાગ લેતું નથી?", "opts": ["બાહ્યત્વચા (Epidermis)", "મધ્યસ્તર (Middle layer)", "અંતસ્તર (Inner layer - Tapetum)", "વાસ્ક્યુલર બંડલ (Vascular bundle)"], "ans": 3, "exp": "અંડકવિણ (integument) નું નિર્માણ બાહ્યત્વચા (A), મધ્યસ્તર (B), અને અંતસ્તર (C) માંથી થાય છે. વાસ્ક્યુલર બંડલ (D) અંડકવિણના નિર્માણમાં ભાગ લેતું નથી, પરંતુ પોષણ પૂરું પાડે છે.", "ref": "Std 12 - પ્રકરણ 2: ફૂલ અને ફળ (Flower and Fruit)", "ch": ""}, {"q": "સ્ત્રીકેસરમાં અંડાશયના પાયાના ભાગમાં આવેલા 'અંડકપિંડ' (placenta) ની રચના અને કાર્ય સંબંધિત નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["અંડકપિંડ અંડકોને જોડે છે અને પોષણ પૂરું પાડે છે.", "અંડકપિંડ અંડાશયની દીવાલના મધ્યસ્તરમાંથી વિકસે છે.", "અંડકપિંડ ફળના વિકાસ દરમ્યાન નાશ પામે છે.", "અંડકપિંડ પરાગનલિકાને માર્ગદર્શન પૂરું પાડે છે."], "ans": 2, "exp": "અંડકપિંડ (placenta) અંડકોને જોડે છે અને પોષણ પૂરું પાડે છે (A), અંડાશયની દીવાલના મધ્યસ્તરમાંથી વિકસે છે (B), અને પરાગનલિકાને માર્ગદર્શન પૂરું પાડે છે (D). પરંતુ અંડકપિંડ ફળના વિકાસ દરમ્યાન નાશ પામતું નથી (C), ઉલટાનું તે ફળના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે.", "ref": "Std 12 - પ્રકરણ 2: ફૂલ અને ફળ (Flower and Fruit)", "ch": ""}, {"q": "સ્ત્રીકેસરમાં બહુવિભાજિત અંડાશય (multilocular ovary) હોય ત્યારે, નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["અંડાશયમાં એકથી વધારે કોઠાઓ (locules) હોય છે.", "અંડકોની ગોઠવણી કોઠાઓમાં અસમાન રીતે થાય છે.", "પરાગનલિકા કોઈપણ કોઠામાં પ્રવેશી શકે છે.", "અંડાશયની દીવાલમાં વાસ્ક્યુલર બંડલની સંખ્યા ઓછી હોય છે."], "ans": 3, "exp": "બહુવિભાજિત અંડાશયમાં એકથી વધારે કોઠાઓ (A) હોય છે, અંડકોની ગોઠવણી અસમાન રીતે થાય છે (B), અને પરાગનલિકા કોઈપણ કોઠામાં પ્રવેશી શકે છે (C). પરંતુ અંડાશયની દીવાલમાં વાસ્ક્યુલર બંડલની સંખ્યા ઓછી હોવાનું વિધાન (D) ખોટું છે, કારણ કે બહુવિભાજિત અંડાશયમાં વાસ્ક્યુલર બંડલની સંખ્યા વધુ હોય છે.", "ref": "Std 12 - પ્રકરણ 2: ફૂલ અને ફળ (Flower and Fruit)", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
