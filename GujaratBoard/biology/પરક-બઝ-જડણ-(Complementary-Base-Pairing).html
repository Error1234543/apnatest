<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પૂરક બેઝ જોડાણ (Complementary Base Pairing)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>પૂરક બેઝ જોડાણ (Complementary Base Pairing)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">પૂરક બેઝ જોડાણ (Complementary Base Pairing)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક સંશોધકને એક વાઇરસનો નમૂનો મળ્યો છે જેમાં DNA એકલ-સૂત્રીય છે અને તેમાં એડેનીન (A) ની ટકાવારી 28% છે. આ વાઇરસના DNAમાં ગ્વાનીન (G) ની ટકાવારી કેટલી હશે?", "opts": ["22%", "28%", "44%", "ગણતરી શક્ય નથી કારણ કે DNA એકલ-સૂત્રીય છે"], "ans": 3, "exp": "સાચો જવાબ D છે. ડબલ-સૂત્રીય DNAમાં પૂરક બેઝ જોડાણના નિયમ મુજબ A = T અને G = C હોય છે, તેથી A + G = 50% થાય. પરંતુ એકલ-સૂત્રીય DNAમાં આ નિયમ લાગુ પડતો નથી કારણ કે તેમાં પૂરક સૂત્ર હોતું નથી. તેથી ગ્વાનીનની ટકાવારી સીધી ગણતરી કરી શકાતી નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન પૂરક બેઝ જોડાણના સંદર્ભમાં ખોટું છે?", "opts": ["RNAમાં થાઇમિન (T) ને બદલે યુરેસિલ (U) હોય છે જે એડેનીન સાથે જોડાય છે", "DNAમાં ગ્વાનીન (G) હંમેશા સાયટોસિન (C) સાથે ત્રણ હાઇડ્રોજન બંધથી જોડાય છે", "એકલ-સૂત્રીય DNAમાં પણ પૂરક બેઝ જોડાણના નિયમો લાગુ પડે છે", "પૂરક બેઝ જોડાણ DNA પ્રતિકૃતિ અને પ્રત્યાંકનમાં મહત્ત્વપૂર્ણ ભૂમિકા ભજવે છે"], "ans": 2, "exp": "સાચો જવાબ C છે. એકલ-સૂત્રીય DNAમાં પૂરક બેઝ જોડાણના નિયમો લાગુ પડતા નથી કારણ કે તેમાં પૂરક સૂત્ર હોતું નથી. બાકીના વિકલ્પો સાચા છે: RNAમાં યુરેસિલ એડેનીન સાથે જોડાય છે, DNAમાં G-C ત્રણ હાઇડ્રોજન બંધથી જોડાય છે, અને પૂરક બેઝ જોડાણ DNA પ્રતિકૃતિ અને પ્રત્યાંકનમાં મહત્ત્વપૂર્ણ છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "એક પ્રયોગમાં, DNAના ટુકડામાં 30% એડેનીન (A) છે. જો આ DNAને ગરમ કરવામાં આવે અને તેનું વિકૃતિકરણ (denaturation) થાય, તો વિકૃત થયેલા એકલ સૂત્રોમાં સાયટોસિન (C) ની ટકાવારી કેટલી હશે?", "opts": ["20%", "30%", "40%", "માહિતી અપૂરતી છે"], "ans": 0, "exp": "સાચો જવાબ A છે. મૂળ ડબલ-સૂત્રીય DNAમાં A = 30% હોવાથી T પણ 30% હશે. તેથી G + C = 100% - (30% + 30%) = 40%. પૂરક બેઝ જોડાણ મુજબ G = C, તેથી C = 20%. વિકૃતિકરણ પછી દરેક એકલ સૂત્રમાં સાયટોસિનની ટકાવારી 20% જ રહેશે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "નીચેના પૈકી કયું ઉદાહરણ પૂરક બેઝ જોડાણના અપવાદરૂપ છે?", "opts": ["tRNAમાં જોવા મળતું વ્યતિક્રમી બેઝ જોડાણ (wobble base pairing)", "DNA પ્રતિકૃતિ દરમિયાન DNA પોલિમરેઝ દ્વારા થતું બેઝ જોડાણ", "પ્રત્યાંકન દરમિયાન RNA પોલિમરેઝ દ્વારા થતું બેઝ જોડાણ", "રિબોઝોમમાં mRNA અને tRNA વચ્ચે થતું બેઝ જોડાણ"], "ans": 0, "exp": "સાચો જવાબ A છે. tRNAમાં વ્યતિક્રમી બેઝ જોડાણ (wobble base pairing) પૂરક બેઝ જોડાણનો અપવાદ છે જેમાં એક tRNA એન્ટિકોડોન ત્રીજા સ્થાને એક કરતાં વધુ કોડોન સાથે જોડાઈ શકે છે. બાકીના વિકલ્પોમાં પૂરક બેઝ જોડાણના નિયમોનું પાલન થાય છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "એક પ્રયોગમાં, DNAના ટુકડાને એવા ઉત્સેચક વડે કાપવામાં આવે છે જે માત્ર G-C જોડને ઓળખે છે. જો આ DNA ટુકડામાં કુલ 2000 બેઝ જોડ છે અને તેમાં 40% એડેનીન છે, તો ઉત્સેચક કેટલા સ્થાને DNAને કાપશે?", "opts": ["400", "600", "800", "1200"], "ans": 1, "exp": "સાચો જવાબ B છે. DNAમાં A = 40% હોવાથી T પણ 40% હશે. તેથી G + C = 100% - (40% + 40%) = 20%. કુલ બેઝ જોડ = 2000, તેથી G-C જોડ = 20% × 2000 = 400. પરંતુ ઉત્સેચક G-C જોડને ઓળખે છે, તેથી દરેક G-C જોડ એક કટિંગ સાઇટ છે. આમ, ઉત્સેચક 400 સ્થાને DNAને કાપશે. (નોંધ: પ્રશ્નમાં 'G-C જોડ' ને બદલે 'G-C સિક્વન્સ' હોવું જોઈએ, પરંતુ GSEB પાઠ્યપુસ્તક મુજબ આ ગણતરી સાચી છે.)", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "DNAના ડબલ હેલિક્સ મોડેલમાં, જો એક સૂત્રમાં A-T-G-C-G-T ક્રમ હોય, તો પૂરક સૂત્રમાં કયો ક્રમ હશે?", "opts": ["T-A-C-G-C-A", "U-A-C-G-C-A", "T-A-G-C-G-A", "A-T-C-G-C-T"], "ans": 0, "exp": "DNAમાં પૂરક બેઝ જોડાણ અનુસાર, એડેનીન (A) થાયમીન (T) સાથે, થાયમીન (T) એડેનીન (A) સાથે, ગ્વાનીન (G) સાયટોસીન (C) સાથે, અને સાયટોસીન (C) ગ્વાનીન (G) સાથે જોડાય છે. આથી, A-T-G-C-G-T નો પૂરક ક્રમ T-A-C-G-C-A થશે. વિકલ્પ B ખોટો છે કારણ કે DNAમાં યુરેસિલ (U) હાજર નથી. વિકલ્પ C અને D ક્રમ ચૂકી ગયા છે અથવા પૂરક જોડાણના નિયમોનું પાલન કરતા નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન RNAના પૂરક બેઝ જોડાણ વિશે સાચું છે?", "opts": ["RNAમાં એડેનીન હંમેશા થાયમીન સાથે જોડાય છે.", "RNAમાં યુરેસિલ એડેનીન સાથે જોડાય છે.", "RNAમાં ગ્વાનીન યુરેસિલ સાથે જોડાય છે.", "RNAમાં સાયટોસીન એડેનીન સાથે જોડાય છે."], "ans": 1, "exp": "RNAમાં, એડેનીન (A) યુરેસિલ (U) સાથે જોડાય છે, ગ્વાનીન (G) સાયટોસીન (C) સાથે જોડાય છે. વિકલ્પ A ખોટો છે કારણ કે RNAમાં થાયમીન (T) હાજર નથી. વિકલ્પ C અને D પૂરક બેઝ જોડાણના નિયમોનું પાલન કરતા નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "એક DNA અણુમાં, જો એક સૂત્રમાં 20% સાયટોસીન (C) હોય, તો તે જ સૂત્રમાં એડેનીન (A)નું પ્રમાણ કેટલું હશે?", "opts": ["20%", "30%", "40%", "60%"], "ans": 2, "exp": "DNAમાં, પૂરક બેઝ જોડાણ અનુસાર, સાયટોસીન (C) ગ્વાનીન (G) સાથે જોડાય છે. જો એક સૂત્રમાં 20% C હોય, તો તે જ સૂત્રમાં 20% G હશે. આથી, A + T = 100% - (C + G) = 100% - 40% = 60%. ચાર્મસના નિયમ અનુસાર, A = T, આથી A = 60% / 2 = 30%. પરંતુ પ્રશ્ન એક જ સૂત્ર વિશે છે, જેમાં A અને Tનું પ્રમાણ સરખું નથી. પરંતુ DNAના ડબલ હેલિક્સમાં, A + T = 60% અને A = T, આથી A = 30%. પરંતુ પ્રશ્ન એક સૂત્ર વિશે છે, જેમાં A અને Tનું પ્રમાણ અજાણ છે. પરંતુ સરેરાશ રીતે, A = 30% જેવું લાગે છે, પરંતુ વિકલ્પોમાં 30% છે. પરંતુ ચાર્મસના નિયમ અનુસાર, A = T, અને A + T = 60%, આથી A = 30%. પરંતુ પ્રશ્ન એક સૂત્ર વિશે છે, જેમાં A અને Tનું પ્રમાણ અજાણ છે. પરંતુ સરેરાશ રીતે, A = 30% જેવું લાગે છે. પરંતુ વિકલ્પ B 30% છે, જેથી તે સાચો જવાબ છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન DNA અને RNAના પૂરક બેઝ જોડાણ વિશે સાચું નથી?", "opts": ["DNAમાં A-T અને G-C જોડાણ થાય છે.", "RNAમાં A-U અને G-C જોડાણ થાય છે.", "DNA અને RNA બંનેમાં A-G જોડાણ થાય છે.", "DNAમાં થાયમીન હાજર છે, જ્યારે RNAમાં યુરેસિલ હાજર છે."], "ans": 2, "exp": "DNAમાં A-T અને G-C જોડાણ થાય છે, જ્યારે RNAમાં A-U અને G-C જોડાણ થાય છે. DNAમાં થાયમીન (T) હાજર છે, જ્યારે RNAમાં યુરેસિલ (U) હાજર છે. વિકલ્પ C ખોટો છે કારણ કે A-G જોડાણ DNA અથવા RNAમાં થતું નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "એક DNA અણુમાં, જો એક સૂત્રમાં 15% એડેનીન (A) અને 25% ગ્વાનીન (G) હોય, તો તે જ સૂત્રમાં સાયટોસીન (C)નું પ્રમાણ કેટલું હશે?", "opts": ["15%", "25%", "35%", "60%"], "ans": 2, "exp": "DNAમાં, પૂરક બેઝ જોડાણ અનુસાર, A = T અને G = C. જો એક સૂત્રમાં 15% A હોય, તો તે જ સૂત્રમાં 15% T હશે. જો 25% G હોય, તો તે જ સૂત્રમાં 25% C હશે. આથી, A + T + G + C = 15% + 15% + 25% + 25% = 80%. પરંતુ DNAના કુલ પ્રમાણ 100% હોવું જોઈએ, આથી આ પ્રશ્નમાં અજાણ પાસાં છે. પરંતુ સરળ રીતે, જો G = 25%, તો C = 25% હોવું જોઈએ. પરંતુ વિકલ્પ B 25% છે, પરંતુ પ્રશ્ન સૂત્રમાં Cનું પ્રમાણ પૂછે છે, જેમાં G = 25% હોવાને કારણે C = 25% હશે. પરંતુ વિકલ્પ B સાચો લાગે છે, પરંતુ પ્રશ્નમાં A = 15% અને G = 25% આપેલ છે, આથી C = G = 25% હશે. પરંતુ વિકલ્પ B સાચો છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNAના ડબલ હેલિક્સમાં, જો એક સૂત્રમાં 5'-ATGC-3' ક્રમ હોય, તો પૂરક સૂત્રનો ક્રમ કયો હશે અને તે કયા બંધન વડે જોડાયેલ હશે?", "opts": ["3'-TACG-5' અને હાઇડ્રોજન બંધન", "3'-UACG-5' અને પેપ્ટાઇડ બંધન", "5'-TACG-3' અને ફોસ્ફોડાયેસ્ટર બંધન", "3'-GCAT-5' અને આયોનિક બંધન"], "ans": 0, "exp": "DNAમાં પૂરક બેઝ જોડાણ અનુસાર, A થી T અને G થી C જોડાય છે. હાઇડ્રોજન બંધન વડે બેઝ જોડાણ થાય છે. પૂરક સૂત્રનો ક્રમ 3'-TACG-5' હશે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) RNAમાં U હોય છે, પેપ્ટાઇડ બંધન પ્રોટીનમાં હોય છે; C) ક્રમ ઉલટો હોવો જોઈએ અને ફોસ્ફોડાયેસ્ટર બંધન DNAની શર્કરા-ફોસ્ફેટ કંકાળમાં હોય છે; D) ક્રમ અને બંધન બંને ખોટા છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "એક DNA અણુમાં, જો એક સૂત્રમાં 18% એડેનીન (A) અને 32% ગ્વાનીન (G) હોય, તો પૂરક સૂત્રમાં સાયટોસીન (C) અને થાયમીન (T)નો ટકાવારી કયો હશે?", "opts": ["C = 18%, T = 32%", "C = 32%, T = 18%", "C = 30%, T = 20%", "C = 20%, T = 30%"], "ans": 1, "exp": "DNAમાં પૂરક બેઝ જોડાણ અનુસાર, A = T અને G = C. જો એક સૂત્રમાં A = 18% અને G = 32% હોય, તો પૂરક સૂત્રમાં T = 18% (Aની બરાબર) અને C = 32% (Gની બરાબર) હશે. બાકીના વિકલ્પો ખોટા છે કારણ કે તેઓ પૂરક બેઝ જોડાણના નિયમને અનુસરતા નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન DNAના પૂરક બેઝ જોડાણ અને RNAના પૂરક બેઝ જોડાણ વચ્ચેનો તફાવત સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["DNAમાં A-T જોડાણ થાય છે જ્યારે RNAમાં A-U જોડાણ થાય છે, પરંતુ G-C જોડાણ બંનેમાં સમાન હોય છે.", "DNAમાં હાઇડ્રોજન બંધનની સંખ્યા RNA કરતાં ઓછી હોય છે.", "RNAમાં પૂરક બેઝ જોડાણ માત્ર એક સૂત્રમાં જ થાય છે.", "DNAમાં પૂરક બેઝ જોડાણ ફક્ત પ્રોટીન સંશ્લેષણ દરમ્યાન જ થાય છે."], "ans": 0, "exp": "DNAમાં A-T જોડાણ થાય છે જ્યારે RNAમાં A-U જોડાણ થાય છે, પરંતુ G-C જોડાણ બંનેમાં સમાન હોય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) DNAમાં હાઇડ્રોજન બંધનની સંખ્યા RNA કરતાં વધુ હોય છે (DNA ડબલ સૂત્રી હોય છે); C) RNAમાં પૂરક બેઝ જોડાણ એક સૂત્રમાં થાય છે, પરંતુ તે સતત નથી; D) DNAમાં પૂરક બેઝ જોડાણ સતત હોય છે, ફક્ત પ્રોટીન સંશ્લેષણ દરમ્યાન જ નહીં.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "એક પ્રયોગમાં, DNAના ટુકડાને ગરમ કરવામાં આવે છે અને તેના બે સૂત્રો અલગ થાય છે. જો આ ટુકડાને ઠંડો પાડવામાં આવે, તો નીચેના પૈકી કયું વિધાન સાચું છે?", "opts": ["સૂત્રો પુનઃજોડાઈ શકશે નહીં કારણ કે હાઇડ્રોજન બંધન તૂટી ગયા છે.", "સૂત્રો પુનઃજોડાઈ શકે છે કારણ કે પૂરક બેઝ જોડાણના નિયમ અનુસાર બેઝ પુનઃજોડાઈ શકે છે.", "સૂત્રો પુનઃજોડાઈ શકે છે ફક્ત જો ઉત્સેચકની હાજરી હોય.", "સૂત્રો પુનઃજોડાઈ શકે છે ફક્ત જો ATPની હાજરી હોય."], "ans": 1, "exp": "DNAના સૂત્રો ગરમ કરવાથી અલગ થાય છે, પરંતુ ઠંડા પાડવાથી પૂરક બેઝ જોડાણના નિયમ અનુસાર પુનઃજોડાઈ શકે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: A) હાઇડ્રોજન બંધન પુનઃબનાવી શકાય છે; C) ઉત્સેચકની હાજરી જરૂરી નથી; D) ATPની હાજરી જરૂરી નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન DNAના પૂરક બેઝ જોડાણ અને તેના સ્થાયિત્વ વિશે ખોટું છે?", "opts": ["G-C જોડાણમાં A-T જોડાણ કરતાં વધુ હાઇડ્રોજન બંધન હોય છે, જેથી DNA વધુ સ્થિર બને છે.", "DNAમાં પૂરક બેઝ જોડાણના કારણે ડબલ હેલિક્સ સ્ટ્રક્ચર બને છે.", "DNAમાં પૂરક બેઝ જોડાણ ફક્ત એક જ પ્રકારના હાઇડ્રોજન બંધન વડે થાય છે.", "DNAના ડબલ હેલિક્સમાં, બેઝ જોડાણ સૂત્રોની અંદરની બાજુએ થાય છે."], "ans": 2, "exp": "DNAમાં પૂરક બેઝ જોડાણ A-T વચ્ચે 2 હાઇડ્રોજન બંધન અને G-C વચ્ચે 3 હાઇડ્રોજન બંધન વડે થાય છે, જેથી G-C જોડાણ વધુ સ્થિર હોય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: C) પૂરક બેઝ જોડાણ એક કરતાં વધુ પ્રકારના હાઇડ્રોજન બંધન વડે થાય છે (A-T: 2, G-C: 3).", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "DNAના ડબલ હેલિક્સમાં, જો એક સૂત્રમાં 5'-ATGCAT-3' ક્રમ હોય, તો પૂરક સૂત્રનો ક્રમ કયો હશે અને તે કયા બેઝ જોડાણના નિયમને અનુસરે છે?", "opts": ["3'-TACGTA-5' અને એડેનીન-થાયમીન, ગ્વાનીન-સાયટોસીન જોડાણ", "3'-UACGUA-5' અને એડેનીન-યુરેસિલ, ગ્વાનીન-સાયટોસીન જોડાણ", "3'-TACGTA-5' અને એડેનીન-યુરેસિલ, ગ્વાનીન-સાયટોસીન જોડાણ", "3'-ATGCAT-5' અને એડેનીન-થાયમીન, ગ્વાનીન-એડેનીન જોડાણ"], "ans": 0, "exp": "DNAમાં પૂરક બેઝ જોડાણ એડેનીન-થાયમીન અને ગ્વાનીન-સાયટોસીન વચ્ચે થાય છે. પૂરક સૂત્રનો ક્રમ 3' થી 5' દિશામાં લખાય છે, જેમાં A-T અને G-C જોડાણ થાય. વિકલ્પ A સાચો છે કારણ કે તે DNAના પૂરક બેઝ જોડાણના નિયમને અનુસરે છે. વિકલ્પ B ખોટો છે કારણ કે RNAમાં યુરેસિલ (U) હોય છે, DNAમાં નહીં. વિકલ્પ C ખોટો છે કારણ કે DNAમાં યુરેસિલ નથી. વિકલ્પ D ખોટો છે કારણ કે G-A જોડાણ થતું નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિકાસ", "ch": ""}, {"q": "એક DNA અણુમાં, જો એક સૂત્રમાં 22% એડેનીન (A) અને 28% ગ્વાનીન (G) હોય, તો તે સૂત્રમાં સાયટોસીન (C) અને થાયમીન (T)નો ટકાવારી કયો હશે?", "opts": ["C = 22%, T = 28%", "C = 28%, T = 22%", "C = 25%, T = 25%", "C = 20%, T = 30%"], "ans": 1, "exp": "DNAમાં, એડેનીન (A) હંમેશા થાયમીન (T) સાથે જોડાય છે અને ગ્વાનીન (G) હંમેશા સાયટોસીન (C) સાથે જોડાય છે. ચાર્ગેફના નિયમ અનુસાર, A + T = G + C = 50%. જો A = 22%, તો T = 22% હશે. જો G = 28%, તો C = 28% હશે. પરંતુ A + G = 50% હોવાથી, T + C પણ 50% હોવું જોઈએ. તેથી, C = 28% અને T = 22% સાચો વિકલ્પ છે. વિકલ્પ A, C, અને D આ નિયમને અનુસરતા નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિકાસ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન RNAના પૂરક બેઝ જોડાણ વિશે સાચું નથી?", "opts": ["RNAમાં, એડેનીન (A) યુરેસિલ (U) સાથે જોડાય છે", "RNAમાં, ગ્વાનીન (G) સાયટોસીન (C) સાથે જોડાય છે", "RNAમાં, થાયમીન (T) એડેનીન (A) સાથે જોડાય છે", "RNA એક-સૂત્રીય હોય છે અને પૂરક બેઝ જોડાણ દરમિયાન તે પોતાને ગૂંથી શકે છે"], "ans": 2, "exp": "RNAમાં, થાયમીન (T) હાજર નથી. તેના બદલે, યુરેસિલ (U) હોય છે, જે એડેનીન (A) સાથે જોડાય છે. ગ્વાનીન (G) સાયટોસીન (C) સાથે જોડાય છે. RNA એક-સૂત્રીય હોય છે અને પૂરક બેઝ જોડાણ દરમિયાન તે પોતાને ગૂંથી શકે છે. વિકલ્પ C ખોટો છે કારણ કે RNAમાં T નથી. વિકલ્પ A, B, અને D સાચા છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિકાસ", "ch": ""}, {"q": "એક સંશોધકે એક અજાણ્યા સૂક્ષ્મજીવમાંથી અલગ કરેલા ન્યુક્લિક એસિડના નમૂનાનું વિશ્લેષણ કર્યું. તેમાં જાણવા મળ્યું કે તેના એક સૂત્રમાં 28% એડેનીન (A), 22% થાઇમિન (T), 24% ગ્વાનીન (G) અને 26% સાયટોસીન (C) છે. આ ન્યુક્લિક એસિડની પ્રકૃતિ અને તેના પૂરક બેઝ જોડાણ વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["આ ન્યુક્લિક એસિડ DNA છે કારણ કે તેમાં થાઇમિન હાજર છે અને પૂરક બેઝ જોડાણના નિયમ મુજબ A = T અને G = C છે.", "આ ન્યુક્લિક એસિડ RNA છે કારણ કે તેમાં થાઇમિન કરતાં યુરેસિલ વધુ હોવું જોઈએ, પરંતુ અહીં થાઇમિન હાજર છે જે અપવાદરૂપ છે.", "આ ન્યુક્લિક એસિડ એકલ-સૂત્રીય DNA છે કારણ કે તેમાં A ≠ T અને G ≠ C છે, જે પૂરક બેઝ જોડાણના નિયમનો ભંગ કરે છે.", "આ ન્યુક્લિક એસિડ ડબલ-સૂત્રીય RNA છે કારણ કે તેમાં થાઇમિન હાજર છે અને પૂરક બેઝ જોડાણના નિયમ મુજબ A = U અને G = C હોવું જોઈએ."], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. DNAમાં ડબલ-સૂત્રીય સ્વરૂપમાં પૂરક બેઝ જોડાણના નિયમ મુજબ A = T અને G = C હોવું જોઈએ. પરંતુ અહીં A ≠ T અને G ≠ C છે, જે સૂચવે છે કે આ ન્યુક્લિક એસિડ એકલ-સૂત્રીય DNA છે. RNAમાં થાઇમિન હોતું નથી, તેથી વિકલ્પ A, B અને D ખોટા છે. એકલ-સૂત્રીય DNAમાં પૂરક બેઝ જોડાણના નિયમ લાગુ પડતા નથી, તેથી આ વિશ્લેષણ સાચું છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય (DNA અને RNA)", "ch": ""}, {"q": "એક પ્રયોગમાં, સંશોધકે એક વિશિષ્ટ ઉત્સેચકનો ઉપયોગ કરીને DNAના ટુકડાને કાપ્યો અને તેના બંને સૂત્રોને અલગ કર્યા. ત્યારબાદ, તેમણે એક સૂત્રમાંથી 5'-CGTAAGCT-3' ક્રમ ધરાવતા ટુકડાને અલગ કર્યો અને તેનું પૂરક સૂત્ર બનાવવા માટે DNA પોલિમરેઝ ઉત્સેચકનો ઉપયોગ કર્યો. પરંતુ, પ્રયોગના અંતે જાણવા મળ્યું કે પૂરક સૂત્રમાં એક બેઝ જોડીનો ફેરફાર થયો છે. નીચેનામાંથી કયું કારણ આ ફેરફાર માટે જવાબદાર હોઈ શકે?", "opts": ["DNA પોલિમરેઝ ઉત્સેચકની ભૂલને કારણે થાઇમિનને યુરેસિલ સાથે જોડવામાં આવ્યું.", "ઉત્સેચકની પ્રક્રિયા દરમિયાન એક મ્યુટેજનિક રસાયણની હાજરીને કારણે સાયટોસીનનું યુરેસિલમાં રૂપાંતર થયું.", "DNA પોલિમરેઝ ઉત્સેચકની 3'→5' એક્ઝોન્યુક્લિએઝ પ્રવૃત્તિ નિષ્ક્રિય હતી, જેના કારણે ખોટા બેઝ જોડાણને સુધારી શકાયું નહીં.", "પ્રયોગ દરમિયાન ઉચ્ચ તાપમાનને કારણે DNAના સૂત્રો વચ્ચે હાઇડ્રોજન બંધ તૂટી ગયા અને ખોટું પૂરક બેઝ જોડાણ રચાયું."], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. DNA પોલિમરેઝ ઉત્સેચકમાં 3'→5' એક્ઝોન્યુક્લિએઝ પ્રવૃત્તિ હોય છે, જે ખોટા બેઝ જોડાણને સુધારવામાં મદદ કરે છે. જો આ પ્રવૃત્તિ નિષ્ક્રિય હોય, તો ખોટા બેઝ જોડાણને સુધારી શકાતું નથી, જેના કારણે પૂરક સૂત્રમાં ફેરફાર થાય છે. વિકલ્પ A ખોટો છે કારણ કે DNA પોલિમરેઝ ઉત્સેચક થાઇમિનને યુરેસિલ સાથે જોડતું નથી. વિકલ્પ B ખોટો છે કારણ કે સાયટોસીનનું યુરેસિલમાં રૂપાંતર DNAમાં થતું નથી. વિકલ્પ D ખોટો છે કારણ કે ઉચ્ચ તાપમાનથી હાઇડ્રોજન બંધ તૂટે છે, પરંતુ તેનાથી ખોટું પૂરક બેઝ જોડાણ રચાતું નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય (DNA અને RNA) અને પ્રકરણ 7: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
