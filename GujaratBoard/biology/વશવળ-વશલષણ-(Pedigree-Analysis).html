<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>વંશાવળી વિશ્લેષણ (Pedigree Analysis)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>વંશાવળી વિશ્લેષણ (Pedigree Analysis)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">વંશાવળી વિશ્લેષણ (Pedigree Analysis)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "નીચેના વંશાવળી આકૃતિમાં, એક બીમારી X-લિંક્ડ રીસેસિવ જનીન દ્વારા નિયંત્રિત થાય છે. જો પિતા અસરગ્રસ્ત હોય અને માતા વાહક હોય, તો તેમની પુત્રીમાં બીમારી પ્રગટ થવાની શક્યતા કેટલી છે?", "opts": ["0%", "25%", "50%", "100%"], "ans": 3, "exp": "X-લિંક્ડ રીસેસિવ બીમારીમાં, પિતા અસરગ્રસ્ત હોવાથી તેમની પુત્રીને X વર્ણસૂત્ર પર બીમારીનું જનીન મળે છે. માતા વાહક હોવાથી તેમની પાસે એક સ્વસ્થ X અને એક બીમારીવાળું X જનીન હોય છે. પુત્રીને માતાના બીમારીવાળા X જનીન મળવાની શક્યતા 50% હોય છે, પરંતુ પિતા પાસેથી બીમારીવાળું X જનીન મળવાનું નક્કી હોય છે. આથી પુત્રી હંમેશા બીમારી પ્રગટ કરશે. બાકીના વિકલ્પો (A, B, C) અંશતઃ સત્ય નથી કારણ કે પિતા પાસેથી બીમારીવાળું X જનીન નક્કી મળે છે.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી વિશ્લેષણ અને અનુવંશિક રોગો", "ch": ""}, {"q": "એક વંશાવળીમાં, એક બીમારી Y-લિંક્ડ જનીન દ્વારા નિયંત્રિત થાય છે. જો કુટુંબના તમામ પુરુષ સભ્યો બીમારી ધરાવે છે, તો નીચેના પૈકી કયું વિધાન સાચું છે?", "opts": ["તમામ સ્ત્રી સભ્યો પણ બીમારી ધરાવશે.", "સ્ત્રી સભ્યો બીમારીના વાહક હોઈ શકે છે.", "બીમારી પુત્રીમાં પ્રગટ થશે જો પિતા બીમાર હોય.", "બીમારી ફક્ત પુત્રમાં જ પ્રગટ થશે."], "ans": 3, "exp": "Y-લિંક્ડ જનીન ફક્ત પુરુષોમાં જ પ્રગટ થાય છે કારણ કે સ્ત્રીઓમાં Y વર્ણસૂત્ર હોતું નથી. આથી બીમારી ફક્ત પુત્રમાં જ પ્રગટ થશે. વિકલ્પ A અને B ખોટા છે કારણ કે સ્ત્રીઓમાં Y વર્ણસૂત્ર ન હોવાથી બીમારી પ્રગટ થઈ શકતી નથી અથવા વાહક બની શકતી નથી. વિકલ્પ C પણ ખોટો છે કારણ કે પુત્રીમાં Y વર્ણસૂત્ર ન હોવાથી બીમારી પ્રગટ થઈ શકતી નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી વિશ્લેષણ અને અનુવંશિક રોગો", "ch": ""}, {"q": "નીચેની વંશાવળીમાં, એક બીમારી ઓટોસોમલ ડોમિનન્ટ જનીન દ્વારા નિયંત્રિત થાય છે. જો માતા અસરગ્રસ્ત હોય અને પિતા સ્વસ્થ હોય, તો તેમના સંતાનમાં બીમારી પ્રગટ થવાની શક્યતા કેટલી છે?", "opts": ["0%", "25%", "50%", "75%"], "ans": 2, "exp": "ઓટોસોમલ ડોમિનન્ટ બીમારીમાં, માતા અસરગ્રસ્ત હોવાથી તેમની પાસે એક સ્વસ્થ અને એક બીમારીવાળું જનીન હોય છે. પિતા સ્વસ્થ હોવાથી તેમની પાસે બંને સ્વસ્થ જનીન હોય છે. સંતાનમાં બીમારી પ્રગટ થવાની શક્યતા 50% હોય છે કારણ કે માતા પાસેથી બીમારીવાળું જનીન મળવાની શક્યતા 50% હોય છે. વિકલ્પ A, B, અને D ખોટા છે કારણ કે શક્યતા 50% છે.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી વિશ્લેષણ અને અનુવંશિક રોગો", "ch": ""}, {"q": "એક વંશાવળીમાં, એક બીમારી X-લિંક્ડ ડોમિનન્ટ જનીન દ્વારા નિયંત્રિત થાય છે. જો પિતા અસરગ્રસ્ત હોય, તો નીચેના પૈકી કયું વિધાન સાચું છે?", "opts": ["તમામ પુત્રીઓ બીમારી ધરાવશે.", "તમામ પુત્રો બીમારી ધરાવશે.", "પુત્રીઓમાં બીમારી પ્રગટ થવાની શક્યતા 50% છે.", "પુત્રોમાં બીમારી પ્રગટ થવાની શક્યતા 50% છે."], "ans": 0, "exp": "X-લિંક્ડ ડોમિનન્ટ બીમારીમાં, પિતા અસરગ્રસ્ત હોવાથી તેમની પાસે X વર્ણસૂત્ર પર બીમારીનું જનીન હોય છે. પુત્રીઓને પિતા પાસેથી X વર્ણસૂત્ર મળે છે, આથી તમામ પુત્રીઓ બીમારી ધરાવશે. પુત્રોને પિતા પાસેથી Y વર્ણસૂત્ર મળે છે, આથી પુત્રો બીમારી ધરાવશે નહીં. વિકલ્પ B, C, અને D ખોટા છે કારણ કે પુત્રો બીમારી ધરાવશે નહીં અને પુત્રીઓમાં શક્યતા 100% છે.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી વિશ્લેષણ અને અનુવંશિક રોગો", "ch": ""}, {"q": "એક વંશાવળીમાં, એક બીમારી ઓટોસોમલ રીસેસિવ જનીન દ્વારા નિયંત્રિત થાય છે. જો માતા અને પિતા બંને વાહક હોય, તો તેમના સંતાનમાં બીમારી પ્રગટ થવાની શક્યતા કેટલી છે?", "opts": ["0%", "25%", "50%", "75%"], "ans": 1, "exp": "ઓટોસોમલ રીસેસિવ બીમારીમાં, માતા અને પિતા બંને વાહક હોવાથી તેમની પાસે એક સ્વસ્થ અને એક બીમારીવાળું જનીન હોય છે. સંતાનમાં બીમારી પ્રગટ થવાની શક્યતા 25% હોય છે કારણ કે સંતાનને બંને પાસેથી બીમારીવાળું જનીન મળવાની શક્યતા 25% હોય છે. વિકલ્પ A, C, અને D ખોટા છે કારણ કે શક્યતા 25% છે.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી વિશ્લેષણ અને અનુવંશિક રોગો", "ch": ""}, {"q": "એક વંશાવળીમાં, એક દંપતીના ત્રણ સંતાનોમાંથી બે છોકરીઓને એક દુર્લભ રોગ જોવા મળે છે, જ્યારે એક છોકરો સ્વસ્થ છે. આ રોગ માટે જવાબદાર જનીન X-લિંક્ડ રીસેસિવ છે. જો દંપતીના પિતા સ્વસ્થ હોવાનું જાણીતું હોય, તો માતાનો જનીનપ્રકાર કયો હશે?", "opts": ["X^R X^R (હોમોઝાયગસ સ્વસ્થ)", "X^R X^r (હેટરોઝાયગસ વાહક)", "X^r X^r (હોમોઝાયગસ રોગગ્રસ્ત)", "X^R Y (હેટરોઝાયગસ પુરુષ)"], "ans": 1, "exp": "માતાનો જનીનપ્રકાર X^R X^r (હેટરોઝાયગસ વાહક) હશે કારણ કે રોગ X-લિંક્ડ રીસેસિવ છે. છોકરીઓમાં રોગ દેખાય છે, જે સૂચવે છે કે માતાએ રોગી જનીન (X^r) વારસામાં આપ્યું છે. પિતા સ્વસ્થ હોવાથી તેમનો જનીનપ્રકાર X^R Y હશે. જો માતા X^R X^R હોત, તો સંતાનોમાં રોગ દેખાત નહીં. જો માતા X^r X^r હોત, તો તમામ સંતાનોમાં રોગ દેખાત. X^R Y પુરુષ માટે લાગુ પડતું નથી, કારણ કે માતા સ્ત્રી છે.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી વિશ્લેષણ અને જનીનિક રોગો", "ch": ""}, {"q": "એક વંશાવળીમાં, એક રોગ ઓટોસોમલ રીસેસિવ જનીન દ્વારા નિયંત્રિત થાય છે. દંપતીના બંને સભ્યો સ્વસ્થ છે, પરંતુ તેમના એક સંતાનને રોગ છે. જો આ દંપતીના અન્ય સંતાનમાં રોગ ન હોવાનું જાણીતું હોય, તો આગળના સંતાનમાં રોગ થવાની શક્યતા કેટલી છે?", "opts": ["0%", "25%", "50%", "75%"], "ans": 1, "exp": "દંપતીના બંને સભ્યો હેટરોઝાયગસ (Aa) હશે, કારણ કે તેમના એક સંતાનમાં રોગ (aa) છે. ઓટોસોમલ રીસેસિવ રોગ માટે, હેટરોઝાયગસ દંપતીના સંતાનમાં રોગ થવાની શક્યતા 25% (aa) છે. જો એક સંતાન સ્વસ્થ છે, તો તે AA અથવા Aa હોવાનું જાણીતું નથી, પરંતુ આગળના સંતાન માટે શક્યતા અગાઉની જેમ 25% રહે છે.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી વિશ્લેષણ અને જનીનિક રોગો", "ch": ""}, {"q": "એક વંશાવળીમાં, એક રોગ Y-લિંક્ડ જનીન દ્વારા નિયંત્રિત થાય છે. દંપતીના પિતાને રોગ છે, પરંતુ માતાને નથી. તેમના સંતાનોમાં રોગ કોને થશે?", "opts": ["તમામ છોકરાઓને", "તમામ છોકરીઓને", "અડધા છોકરાઓને અને અડધી છોકરીઓને", "ફક્ત છોકરાઓને, પરંતુ તમામને નહીં"], "ans": 0, "exp": "Y-લિંક્ડ જનીન ફક્ત પુરુષોમાં (XY) જોવા મળે છે. પિતા તેમના તમામ પુત્રોને Y વર્ણસૂત્ર પસાર કરે છે, જેથી તમામ છોકરાઓને રોગ થશે. છોકરીઓને પિતા પાસેથી X વર્ણસૂત્ર મળે છે, જેથી તેમને રોગ થશે નહીં.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી વિશ્લેષણ અને જનીનિક રોગો", "ch": ""}, {"q": "એક વંશાવળીમાં, એક રોગ X-લિંક્ડ ડોમિનન્ટ જનીન દ્વારા નિયંત્રિત થાય છે. એક રોગગ્રસ્ત પિતા અને સ્વસ્થ માતાના સંતાનોમાં રોગ કોને થશે?", "opts": ["તમામ છોકરીઓને અને કોઈ છોકરાને નહીં", "તમામ છોકરાઓને અને કોઈ છોકરીને નહીં", "અડધા છોકરાઓને અને અડધી છોકરીઓને", "તમામ સંતાનોમાં"], "ans": 0, "exp": "X-લિંક્ડ ડોમિનન્ટ જનીનના કિસ્સામાં, રોગગ્રસ્ત પિતા (X^D Y) તેમની તમામ છોકરીઓને X^D વર્ણસૂત્ર પસાર કરશે, જેથી તમામ છોકરીઓ રોગગ્રસ્ત થશે. છોકરાઓને પિતા પાસેથી Y વર્ણસૂત્ર મળે છે, જેથી તેમને રોગ થશે નહીં.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી વિશ્લેષણ અને જનીનિક રોગો", "ch": ""}, {"q": "એક વંશાવળીમાં, એક રોગ ઓટોસોમલ ડોમિનન્ટ જનીન દ્વારા નિયંત્રિત થાય છે. એક રોગગ્રસ્ત પિતા અને સ્વસ્થ માતાના સંતાનોમાં રોગ થવાની શક્યતા કેટલી છે?", "opts": ["0%", "25%", "50%", "100%"], "ans": 2, "exp": "ઓટોસોમલ ડોમિનન્ટ જનીનના કિસ્સામાં, રોગગ્રસ્ત પિતા (Aa) અને સ્વસ્થ માતા (aa)ના સંતાનોમાં રોગ થવાની શક્યતા 50% છે. સંતાનો Aa (રોગગ્રસ્ત) અથવા aa (સ્વસ્થ) હોવાની સમભાવે શક્યતા છે.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી વિશ્લેષણ અને જનીનિક રોગો", "ch": ""}, {"q": "નીચેની વંશાવળીમાં, એક દુર્લભ રોગ X-લિંક્ડ રીસેસિવ જનીન દ્વારા નિયંત્રિત થાય છે. જો એક અસરગ્રસ્ત પિતા અને સ્વસ્થ માતાના સંતાનમાં છોકરી અસરગ્રસ્ત હોય, તો તેના ભાઈની રોગ પ્રત્યેની સ્થિતિ કઈ હશે?", "opts": ["તે અવશ્ય અસરગ્રસ્ત હશે", "તે અવશ્ય વાહક હશે", "તે સ્વસ્થ હશે પરંતુ વાહક નહીં", "તે અસરગ્રસ્ત અથવા સ્વસ્થ હોઈ શકે"], "ans": 0, "exp": "X-લિંક્ડ રીસેસિવ રોગમાં, પિતા અસરગ્રસ્ત (X^aY) હોય અને માતા સ્વસ્થ (X^AX^A) હોય, તો છોકરી અસરગ્રસ્ત (X^aX^a) થવા માટે પિતા પાસેથી X^a અને માતા પાસેથી X^a મેળવવું પડે. પરંતુ માતા સ્વસ્થ હોવાથી તે X^A જ આપે, જેથી છોકરી X^aX^A (વાહક) થાય. પરંતુ પ્રશ્નમાં છોકરી અસરગ્રસ્ત (X^aX^a) છે, જેથી માતા વાહક (X^AX^a) હોવી જરૂરી છે. આ સ્થિતિમાં, ભાઈ X^aY (અસરગ્રસ્ત) અથવા X^AY (સ્વસ્થ) હોઈ શકે, પરંતુ પ્રશ્નમાં છોકરી અસરગ્રસ્ત હોવાથી પિતા પાસેથી X^a અને માતા પાસેથી X^a મળે છે, જેથી ભાઈ અવશ્ય X^aY (અસરગ્રસ્ત) હશે. બાકીના વિકલ્પો ખોટા છે કારણ કે ભાઈ અસરગ્રસ્ત જ હોવો જોઈએ.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી વિશ્લેષણ", "ch": ""}, {"q": "નીચેની વંશાવળીમાં, એક રોગ Y-લિંક્ડ જનીન દ્વારા નિયંત્રિત થાય છે. જો એક અસરગ્રસ્ત પિતા અને સ્વસ્થ માતાના સંતાનમાં છોકરો અસરગ્રસ્ત હોય, તો તેની બહેનની રોગ પ્રત્યેની સ્થિતિ કઈ હશે?", "opts": ["તે અવશ્ય અસરગ્રસ્ત હશે", "તે અવશ્ય વાહક હશે", "તે સ્વસ્થ હશે", "તે અસરગ્રસ્ત અથવા સ્વસ્થ હોઈ શકે"], "ans": 2, "exp": "Y-લિંક્ડ રોગમાં, જનીન Y વર્ણસૂત્ર પર આવેલું હોય છે, જે ફક્ત પુરુષોમાં જોવા મળે છે. પિતા પાસેથી છોકરો Y વર્ણસૂત્ર મેળવે છે, જેથી તે અસરગ્રસ્ત થાય. પરંતુ છોકરીઓ X વર્ણસૂત્ર માતા અને પિતા પાસેથી મેળવે છે, જેથી તે Y-લિંક્ડ રોગથી અસરગ્રસ્ત થઈ શકતી નથી. તેથી, બહેન સ્વસ્થ હશે. બાકીના વિકલ્પો ખોટા છે કારણ કે Y-લિંક્ડ રોગ છોકરીઓમાં જોવા મળતો નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી વિશ્લેષણ", "ch": ""}, {"q": "નીચેની વંશાવળીમાં, એક દુર્લભ રોગ મિટોકોન્ડ્રિયલ DNA દ્વારા નિયંત્રિત થાય છે. જો એક માતા આ રોગથી પીડિત હોય અને પિતા સ્વસ્થ હોય, તો તેમના સંતાનોમાં રોગની સંભાવના કેટલી હશે?", "opts": ["તમામ છોકરીઓ અને છોકરાઓ પીડિત હશે", "તમામ છોકરીઓ પીડિત હશે પરંતુ છોકરાઓ સ્વસ્થ હશે", "તમામ છોકરાઓ પીડિત હશે પરંતુ છોકરીઓ સ્વસ્થ હશે", "50% સંતાનો પીડિત હશે"], "ans": 0, "exp": "મિટોકોન્ડ્રિયલ જનીનો માતૃવંશી (maternal inheritance) દ્વારા પસાર થાય છે, કારણ કે મિટોકોન્ડ્રિયા માતાના અંડકોષમાંથી જ સંતાનને મળે છે. આથી, જો માતા પીડિત હોય તો તમામ સંતાનો (છોકરા અને છોકરીઓ) રોગથી પીડિત હશે. પિતાના મિટોકોન્ડ્રિયલ DNA સંતાનને પસાર થતું નથી, આથી પિતાનું સ્વાસ્થ્ય સંતાનના રોગ પર અસર કરતું નથી. વિકલ્પ B, C, અને D અંશતઃ અથવા પૂર્ણપણે ખોટા છે કારણ કે તેઓ મિટોકોન્ડ્રિયલ વારસાની મૂળભૂત વિશેષતાને અવગણે છે.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી વિશ્લેષણ અને જનીનિક વિકારો", "ch": ""}, {"q": "નીચેની વંશાવળીમાં, એક રોગ X-લિંક્ડ રીસેસિવ જનીન દ્વારા નિયંત્રિત થાય છે. જો એક પીડિત પિતા અને વાહક માતાના સંતાનમાં, છોકરીઓમાં રોગની સંભાવના કેટલી હશે?", "opts": ["0%", "25%", "50%", "100%"], "ans": 3, "exp": "X-લિંક્ડ રીસેસિવ રોગમાં, પીડિત પિતા (X^aY) અને વાહક માતા (X^AX^a)ના સંતાનોમાં છોકરીઓ (X^AX^a અથવા X^aX^a) હંમેશા રોગવાહક અથવા પીડિત હશે. કારણ કે પિતા તેમની X વર્ણસૂત્ર (X^a) છોકરીઓને આપે છે અને માતા તેમની X^A અથવા X^a આપી શકે છે. પરંતુ છોકરીઓમાં રોગની હાજરી નક્કી થાય છે કારણ કે પિતા પાસેથી X^a મળે જ છે. આથી તમામ છોકરીઓ પીડિત અથવા વાહક હશે, પરંતુ પ્રશ્ન રોગની હાજરી વિશે છે, આથી 100% છોકરીઓ પીડિત હશે. વિકલ્પ A, B, અને C ખોટા છે કારણ કે તેઓ X-લિંક્ડ વારસાની વિશિષ્ટતાને સમજી શકતા નથી.", "ref": "Std 12 - અધ્યાય 5: લિંગ-લિંક્ડ વારસા અને વંશાવળી વિશ્લેષણ", "ch": ""}, {"q": "નીચેની વંશાવળીમાં દર્શાવેલ રોગ માટે નીચેના પૈકી કયું વિધાન ખોટું છે? (વંશાવળી આકૃતિ: પેઢી-I માં એક સ્ત્રી અને એક પુરુષ બંને સામાન્ય છે, પરંતુ તેમના બધા સંતાનો (પેઢી-II) રોગગ્રસ્ત છે. પેઢી-II ના એક રોગગ્રસ્ત પુરુષ અને સામાન્ય સ્ત્રીના લગ્ન થાય છે, જેમના બધા સંતાનો (પેઢી-III) સામાન્ય છે.)", "opts": ["આ રોગ ઓટોસોમલ રીસેસિવ જનીન દ્વારા નિયંત્રિત થઈ શકે છે", "આ રોગ મિટોકોન્ડ્રિયલ DNA દ્વારા નિયંત્રિત થઈ શકે છે", "આ રોગ X-લિંક્ડ રીસેસિવ જનીન દ્વારા નિયંત્રિત થઈ શકે છે", "આ રોગ ઓટોસોમલ ડોમિનન્ટ જનીન દ્વારા નિયંત્રિત થઈ શકે છે"], "ans": 3, "exp": "સાચો જવાબ D છે કારણ કે ઓટોસોમલ ડોમિનન્ટ રોગમાં દરેક પેઢીમાં રોગ દેખાવો જોઈએ, પરંતુ અહીં પેઢી-I ના બંને સામાન્ય વ્યક્તિઓના બધા સંતાનો રોગગ્રસ્ત છે, જે ડોમિનન્ટ વારસાગતિ સાથે સુસંગત નથી. વિકલ્પ A ખોટો નથી કારણ કે ઓટોસોમલ રીસેસિવ વારસાગતિ આ વંશાવળી સાથે સુસંગત છે (બંને સામાન્ય વાલીઓ હીટરોઝાયગસ હોઈ શકે). વિકલ્પ B ખોટો નથી કારણ કે મિટોકોન્ડ્રિયલ વારસાગતિ માત્ર માતા દ્વારા થાય છે અને બધા સંતાનોને અસર કરી શકે છે. વિકલ્પ C ખોટો નથી કારણ કે X-લિંક્ડ રીસેસિવ વારસાગતિ પણ આ વંશાવળી સાથે સુસંગત હોઈ શકે (જો માતા કેરિયર હોય અને પિતા રોગગ્રસ્ત હોય).", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક વંશાવળીમાં, એક દુર્લભ રોગ મિટોકોન્ડ્રિયલ જનીન દ્વારા નિયંત્રિત થાય છે. જો એક અસરગ્રસ્ત માતા અને સ્વસ્થ પિતાનું સંતાન હોય, તો નીચેના પૈકી કયું વિધાન સત્ય છે?", "opts": ["બધા જ પુત્રો અને પુત્રીઓ અસરગ્રસ્ત હશે.", "ફક્ત પુત્રીઓ અસરગ્રસ્ત હશે.", "ફક્ત પુત્રો અસરગ્રસ્ત હશે.", "કોઈપણ સંતાન અસરગ્રસ્ત નહીં હોય."], "ans": 0, "exp": "મિટોકોન્ડ્રિયલ જનીન માતૃવંશી (માતા પાસેથી) પસાર થાય છે, કારણ કે મિટોકોન્ડ્રિયા પિતાના શુક્રકોષમાંથી સંતાનમાં પસાર થતાં નથી. તેથી, અસરગ્રસ્ત માતા પાસેથી બધા જ સંતાનો (પુત્રો અને પુત્રીઓ) અસરગ્રસ્ત હશે. વિકલ્પ B અને C ખોટા છે કારણ કે મિટોકોન્ડ્રિયલ રોગ લિંગ-લિંક્ડ નથી. વિકલ્પ D ખોટો છે કારણ કે માતા અસરગ્રસ્ત હોવાથી સંતાનોને રોગ પસાર થશે.", "ref": "Std 12 - Chapter 5: વંશાવળી વિશ્લેષણ અને જનીનિક વિકારો", "ch": ""}, {"q": "એક વંશાવળીમાં, એક રોગ X-લિંક્ડ રીસેસિવ જનીન દ્વારા નિયંત્રિત થાય છે. જો એક અસરગ્રસ્ત પિતા અને સ્વસ્થ માતાનું સંતાન હોય, તો નીચેના પૈકી કયું વિધાન સત્ય છે?", "opts": ["બધી જ પુત્રીઓ વાહક હશે.", "બધા જ પુત્રો અસરગ્રસ્ત હશે.", "બધા જ પુત્રો અને પુત્રીઓ અસરગ્રસ્ત હશે.", "કોઈપણ સંતાન અસરગ્રસ્ત નહીં હોય."], "ans": 0, "exp": "X-લિંક્ડ રીસેસિવ રોગમાં, અસરગ્રસ્ત પિતા (X^aY) પાસેથી પુત્રીઓને X^a વર્ણસૂત્ર મળે છે, જેથી તેઓ વાહક (X^AX^a) બને છે. પુત્રોને Y વર્ણસૂત્ર મળે છે, તેથી તેઓ અસરગ્રસ્ત નથી (X^AY). વિકલ્પ B ખોટો છે કારણ કે પુત્રો અસરગ્રસ્ત નથી. વિકલ્પ C ખોટો છે કારણ કે પુત્રીઓ અસરગ્રસ્ત નથી, ફક્ત વાહક છે. વિકલ્પ D ખોટો છે કારણ કે પુત્રીઓ વાહક છે.", "ref": "Std 12 - Chapter 5: વંશાવળી વિશ્લેષણ અને જનીનિક વિકારો", "ch": ""}, {"q": "નીચેની વંશાવળીમાં એક દુર્લભ રોગ દર્શાવેલ છે. આ રોગ માટે નીચેના પૈકી કયું વિધાન સત્ય નથી?\n(નોંધ: વંશાવળીમાં ચોરસ = પુરુષ, વર્તુળ = સ્ત્રી, ભરેલા આકાર = રોગગ્રસ્ત વ્યક્તિ)\n1. પેઢી-I નો પુરુષ રોગગ્રસ્ત છે.\n2. પેઢી-II ની તમામ સ્ત્રીઓ વાહક છે.\n3. પેઢી-III નો એક પુરુષ રોગગ્રસ્ત છે.\n4. આ રોગ ઓટોસોમલ રીસેસિવ હોઈ શકે છે.", "opts": ["વિધાન 1 અને 2 બંને ખોટા છે", "માત્ર વિધાન 3 ખોટું છે", "વિધાન 2 અને 4 બંને ખોટા છે", "માત્ર વિધાન 4 ખોટું છે"], "ans": 2, "exp": "આ વંશાવળીમાં રોગ X-લિંક્ડ ડોમિનન્ટ જનીન દ્વારા નિયંત્રિત થાય છે (GSEB Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા).\n- વિધાન 1 સત્ય છે કારણ કે પેઢી-I નો પુરુષ રોગગ્રસ્ત છે (X-લિંક્ડ ડોમિનન્ટ માટે પુરુષમાં એક જ X-વર્ણસૂત્ર પર જનીન હાજર હોય તો રોગ દેખાય).\n- વિધાન 2 ખોટું છે કારણ કે પેઢી-II ની સ્ત્રીઓમાંથી કેટલીક રોગગ્રસ્ત હોઈ શકે છે (જો તેમને પિતા તરફથી રોગગ્રસ્ત X મળ્યું હોય).\n- વિધાન 3 સત્ય છે કારણ કે પેઢી-III નો પુરુષ રોગગ્રસ્ત હોઈ શકે છે (જો માતા વાહક હોય અને પિતા તરફથી Y મળે).\n- વિધાન 4 ખોટું છે કારણ કે ઓટોસોમલ રીસેસિવ રોગ માટે આ વંશાવળીનો નમૂનો અલગ હોય છે (સ્ત્રી-પુરુષમાં સમાન રીતે દેખાવો જોઈએ).", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક વંશાવળીમાં એક દુર્લભ રોગ દર્શાવેલ છે જેમાં માત્ર સ્ત્રીઓ જ રોગગ્રસ્ત જોવા મળે છે, પરંતુ પુરુષો ક્યારેય રોગગ્રસ્ત નથી. આ રોગ માટે નીચેના પૈકી કયું કારણ સૌથી વધુ સંભવિત છે?", "opts": ["રોગ X-લિંક્ડ રીસેસિવ જનીન દ્વારા નિયંત્રિત છે", "રોગ મિટોકોન્ડ્રિયલ DNA દ્વારા નિયંત્રિત છે", "રોગ ઓટોસોમલ ડોમિનન્ટ જનીન દ્વારા નિયંત્રિત છે જે પુરુષોમાં લેથલ છે", "રોગ Y-લિંક્ડ જનીન દ્વારા નિયંત્રિત છે"], "ans": 2, "exp": "આ પ્રશ્નમાં રોગ માત્ર સ્ત્રીઓમાં જોવા મળે છે, જે ઓટોસોમલ ડોમિનન્ટ જનીનની લેથલ અસર સૂચવે છે (GSEB Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા).\n- વિકલ્પ A ખોટો છે કારણ કે X-લિંક્ડ રીસેસિવ રોગ પુરુષોમાં વધુ જોવા મળે છે.\n- વિકલ્પ B ખોટો છે કારણ કે મિટોકોન્ડ્રિયલ DNA દ્વારા નિયંત્રિત રોગ માતા દ્વારા તમામ સંતાનોમાં જાય છે (પુરુષો પણ રોગગ્રસ્ત હોઈ શકે).\n- વિકલ્પ C સાચો છે કારણ કે ઓટોસોમલ ડોમિનન્ટ જનીન પુરુષોમાં લેથલ હોઈ શકે છે (હોમોઝાયગસ સ્થિતિમાં), જ્યારે સ્ત્રીઓમાં હેટરોઝાયગસ સ્થિતિમાં રોગ દેખાય છે.\n- વિકલ્પ D ખોટો છે કારણ કે Y-લિંક્ડ રોગ માત્ર પુરુષોમાં જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક વંશાવળીમાં એક દુર્લભ રોગ દર્શાવેલ છે જેમાં રોગગ્રસ્ત માતા તરફથી તમામ સંતાનો (પુત્ર અને પુત્રીઓ) રોગગ્રસ્ત જોવા મળે છે, પરંતુ રોગગ્રસ્ત પિતા તરફથી કોઈ સંતાન રોગગ્રસ્ત નથી. આ રોગ માટે નીચેના પૈકી કયું કારણ સૌથી વધુ યોગ્ય છે?", "opts": ["રોગ X-લિંક્ડ ડોમિનન્ટ જનીન દ્વારા નિયંત્રિત છે", "રોગ મિટોકોન્ડ્રિયલ DNA દ્વારા નિયંત્રિત છે", "રોગ ઓટોસોમલ રીસેસિવ જનીન દ્વારા નિયંત્રિત છે", "રોગ Y-લિંક્ડ જનીન દ્વારા નિયંત્રિત છે"], "ans": 1, "exp": "આ વંશાવળીનો નમૂનો મિટોકોન્ડ્રિયલ DNA દ્વારા નિયંત્રિત રોગ સૂચવે છે (GSEB Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા).\n- વિકલ્પ A ખોટો છે કારણ કે X-લિંક્ડ ડોમિનન્ટ રોગમાં પિતા તરફથી પુત્રીઓને રોગ મળી શકે છે.\n- વિકલ્પ B સાચો છે કારણ કે મિટોકોન્ડ્રિયલ DNA માત્ર માતા દ્વારા વારસામાં મળે છે, તેથી માતા તરફથી તમામ સંતાનોને રોગ મળે છે, પરંતુ પિતા તરફથી નહીં.\n- વિકલ્પ C ખોટો છે કારણ કે ઓટોસોમલ રીસેસિવ રોગમાં સ્ત્રી-પુરુષ બંનેમાં સમાન રીતે દેખાવો જોઈએ.\n- વિકલ્પ D ખોટો છે કારણ કે Y-લિંક્ડ રોગ માત્ર પુરુષોમાં જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}];

    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
