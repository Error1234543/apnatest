<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darwinism</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Darwinism</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Darwinism</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ડાર્વિનના પ્રાકૃતિક પસંદગીના સિદ્ધાંત અનુસાર, જો એક જાતિમાં અતિશય પ્રજનન ક્ષમતા હોવા છતાં વસ્તી સ્થિર રહે છે, તો તેનું મુખ્ય કારણ કયું છે?", "opts": ["પર્યાવરણીય સંસાધનોની મર્યાદિત ઉપલબ્ધતા અને સ્પર્ધા", "જાતિમાં જનીનીય ભિન્નતાનો અભાવ", "પ્રજનન દરમાં અચાનક ઘટાડો", "પ્રાણીઓમાં પ્રવાસની પ્રવૃત્તિનો અભાવ"], "ans": 0, "exp": "ડાર્વિનના સિદ્ધાંત મુજબ, અતિશય પ્રજનન ક્ષમતા હોવા છતાં વસ્તી સ્થિર રહે છે કારણ કે પર્યાવરણીય સંસાધનો (આહાર, જગ્યા, હવા વગેરે) મર્યાદિત હોય છે, જેના કારણે જીવો વચ્ચે સ્પર્ધા થાય છે અને ફક્ત યોગ્યતમ જીવો જ ટકી શકે છે. બાકીના વિકલ્પો અસત્ય છે: B) જનીનીય ભિન્નતા ડાર્વિનના સિદ્ધાંતનું મૂળભૂત તત્વ છે, C) પ્રજનન દરમાં ઘટાડો સિદ્ધાંતનો ભાગ નથી, D) પ્રવાસની પ્રવૃત્તિનો અભાવ વસ્તી સ્થિરતાનું કારણ નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના ઉત્ક્રાંતિ સિદ્ધાંતમાં 'સર્વવ્યાપી ભિન્નતા' (Universal Variation) ની ભૂમિકા શું છે?", "opts": ["તે પ્રજનન દરને નિયંત્રિત કરે છે", "તે પ્રાકૃતિક પસંદગી માટે કાચો માલ પૂરો પાડે છે", "તે જાતિઓ વચ્ચે સંકરણને રોકે છે", "તે પર્યાવરણીય પરિવર્તનોને રોકે છે"], "ans": 1, "exp": "સર્વવ્યાપી ભિન્નતા એટલે એક જ જાતિમાં જનીનીય રીતે ભિન્ન એકબીજાથી અલગ પડતી વ્યક્તિઓનું અસ્તિત્વ. આ ભિન્નતા પ્રાકૃતિક પસંદગી માટે આધારભૂત છે, કારણ કે તેના કારણે કેટલાક જીવો પર્યાવરણમાં વધુ અનુકૂળ બને છે. A) પ્રજનન દર નિયંત્રણ ભિન્નતાનો ઉદ્દેશ નથી, C) સંકરણ રોકવું તે ભિન્નતાનું કાર્ય નથી, D) પર્યાવરણીય પરિવર્તનો રોકવા ભિન્નતાનો કોઈ સંબંધ નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના સિદ્ધાંત અનુસાર, 'અવશેષી અંગો' (Vestigial Organs) નું મહત્વ કયું છે?", "opts": ["તે જીવના પૂર્વજોની ઉત્ક્રાંતિક ઇતિહાસની નોંધ પૂરી પાડે છે", "તે જીવને પર્યાવરણમાં વધુ અનુકૂળ બનાવે છે", "તે જીવના શરીરમાં નવા અંગોના વિકાસમાં મદદ કરે છે", "તે જીવની પ્રજનન ક્ષમતામાં વધારો કરે છે"], "ans": 0, "exp": "અવશેષી અંગો (જેમ કે માનવમાં અપેન્ડિક્સ અથવા પક્ષીઓમાં પંખા જેવા પગ) એ પૂર્વજોમાં ઉપયોગી હોવા છતાં વર્તમાન જીવમાં કોઈ કાર્ય ન કરતા હોય છે. આ અંગો ઉત્ક્રાંતિક ઇતિહાસની નોંધ પૂરી પાડે છે, કારણ કે તે પૂર્વજોની જીવનશૈલી અને પર્યાવરણીય અનુકૂળનને દર્શાવે છે. B) અવશેષી અંગો પર્યાવરણમાં અનુકૂળતા વધારતા નથી, C) નવા અંગોના વિકાસમાં મદદ કરતા નથી, D) પ્રજનન ક્ષમતામાં કોઈ ભૂમિકા ભજવતા નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના 'પ્રજાતિ ઉત્પત્તિ' (Origin of Species) ગ્રંથમાં વર્ણવેલ 'કૃત્રિમ પસંદગી' (Artificial Selection) નું ઉદાહરણ કયું છે?", "opts": ["જંગલમાં હરણની ગરદન લાંબી થવી", "ખેતરમાં ગાયની દૂધ ઉત્પાદન ક્ષમતા વધારવા માટેની પસંદગી", "પક્ષીઓમાં ચાંચના આકારમાં પર્યાવરણ અનુસાર થતો ફેરફાર", "મધમાખીઓમાં રાણી મધમાખીનો વિકાસ"], "ans": 1, "exp": "કૃત્રિમ પસંદગી એ માનવ દ્વારા કરવામાં આવતી પસંદગી છે, જેમાં માનવી કૃષિ અથવા પાલતુ પ્રાણીઓમાં ઇચ્છિત લક્ષણો ધરાવતા જીવોને પસંદ કરે છે. ઉદાહરણ તરીકે, ગાયની દૂધ ઉત્પાદન ક્ષમતા વધારવા માટે ખેડૂતો ઉચ્ચ દૂધ આપતી ગાયોની પસંદગી કરે છે. A) હરણની ગરદન લાંબી થવી પ્રાકૃતિક પસંદગીનું ઉદાહરણ છે, C) પક્ષીઓની ચાંચનો ફેરફાર પ્રાકૃતિક પસંદગીનું ઉદાહરણ છે, D) મધમાખીઓમાં રાણી મધમાખીનો વિકાસ પ્રાકૃતિક ઉત્ક્રાંતિનો ભાગ છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના સિદ્ધાંત અનુસાર, 'સહ-ઉત્ક્રાંતિ' (Co-evolution) નું સૌથી યોગ્ય ઉદાહરણ કયું છે?", "opts": ["ફૂલ અને પરાગણ કરનારા કીટક વચ્ચેનો સંબંધ", "એક જ જાતિમાં નર અને માદા વચ્ચેનો લક્ષણીય તફાવત", "જંગલમાં વૃક્ષો અને લતાઓ વચ્ચેની સ્પર્ધા", "એક જ પ્રદેશમાં રહેતી બે ભિન્ન જાતિઓ વચ્ચેની જનીનીય ભિન્નતા"], "ans": 0, "exp": "સહ-ઉત્ક્રાંતિ એટલે બે ભિન્ન જાતિઓ એકબીજા સાથે પરસ્પર અનુકૂળન દ્વારા ઉત્ક્રાંત થાય છે. ફૂલ અને પરાગણ કરનારા કીટક (જેમ કે મધમાખી) વચ્ચેનો સંબંધ સહ-ઉત્ક્રાંતિનું ક્લાસિક ઉદાહરણ છે, કારણ કે ફૂલ કીટકને પરાગણ માટે આકર્ષે છે અને કીટક ફૂલમાંથી મધ મેળવે છે. B) નર અને માદા વચ્ચેનો તફાવત લૈંગિક પસંદગીનું ઉદાહરણ છે, C) વૃક્ષો અને લતાઓ વચ્ચેની સ્પર્ધા પ્રાકૃતિક પસંદગીનું ઉદાહરણ છે, D) જનીનીય ભિન્નતા સહ-ઉત્ક્રાંતિ નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના સિદ્ધાંત અનુસાર, 'સમુદાયમાં જીવિત રહેવા માટેના સંઘર્ષ' (Struggle for Existence) નું મુખ્ય કારણ કયું છે?", "opts": ["જાતિઓ વચ્ચેના ખોરાક માટેના સ્પર્ધા", "પ્રજનન ક્ષમતા કરતાં ઓછા સંસાધનોની ઉપલબ્ધતા", "પર્યાવરણીય પરિવર્તનો જેવા કે તાપમાનમાં ફેરફાર", "શિકારી અને શિકાર વચ્ચેનો સંતુલન ભંગ"], "ans": 1, "exp": "ડાર્વિન અનુસાર, 'સમુદાયમાં જીવિત રહેવા માટેનો સંઘર્ષ'નું મુખ્ય કારણ એ છે કે પ્રજનન ક્ષમતા અતિશય હોવા છતાં સંસાધનો (ખોરાક, જગ્યા વગેરે) મર્યાદિત હોવાથી જીવો વચ્ચે સ્પર્ધા ઉદ્ભવે છે. વિકલ્પ A, C, અને D આ સંઘર્ષના પરિણામો અથવા ઉદાહરણો છે, પરંતુ મૂળ કારણ વિકલ્પ B છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના સિદ્ધાંતમાં 'અનુકૂળન' (Adaptation) ની વ્યાખ્યા કયા વિકલ્પમાં સૌથી યોગ્ય રીતે વર્ણવી શકાય છે?", "opts": ["જીવોના શરીરમાં થતી કાયમી ફેરફારો જે પેઢી દર પેઢી પસાર થાય છે", "પર્યાવરણ સાથે સંવેદનશીલ રીતે જોડાયેલી લાક્ષણિકતાઓ જે જીવની જીવિત રહેવાની તકો વધારે છે", "પ્રાકૃતિક પસંદગી દ્વારા ચલાવવામાં આવતી જનીનિક ભિન્નતાઓ", "જીવોના શરીરમાં થતી અચાનક અને અપ્રત્યાશિત પરિવર્તનો"], "ans": 1, "exp": "ડાર્વિન અનુસાર, અનુકૂળન એટલે પર્યાવરણ સાથે જોડાયેલી એવી લાક્ષણિકતાઓ જે જીવની જીવિત રહેવાની તકો વધારે છે. વિકલ્પ A જનીનિક ફેરફારો વિશે વાત કરે છે, વિકલ્પ C પ્રાકૃતિક પસંદગીની પ્રક્રિયા વિશે છે, અને વિકલ્પ D મ્યુટેશન વિશે છે, જે અનુકૂળનની સંપૂર્ણ વ્યાખ્યા નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના સિદ્ધાંત અનુસાર, 'પ્રાકૃતિક પસંદગી' (Natural Selection) ની ક્રિયા કયા પરિબળ પર આધારિત નથી?", "opts": ["જીવોની પ્રજનન ક્ષમતા", "પર્યાવરણીય પરિવર્તનો", "જીવોની જનીનિક ભિન્નતા", "જીવોના શરીરના કદ પર"], "ans": 3, "exp": "પ્રાકૃતિક પસંદગી જીવોની પ્રજનન ક્ષમતા (A), પર્યાવરણીય પરિવર્તનો (B), અને જનીનિક ભિન્નતા (C) પર આધારિત છે. જ્યારે જીવોના શરીરના કદ (D) એ પ્રાકૃતિક પસંદગીનું મૂળભૂત પરિબળ નથી, પરંતુ તે એક લાક્ષણિકતા હોઈ શકે જે પસંદગીના ધોરણ તરીકે કામ કરે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના સિદ્ધાંત અનુસાર, 'જાતિ વિકાસ' (Speciation) ની પ્રક્રિયામાં કયો ઘટક સૌથી મહત્વપૂર્ણ છે?", "opts": ["જીવો વચ્ચેની સ્પર્ધા", "પ્રજનનિક અલગતા (Reproductive Isolation)", "પર્યાવરણીય દબાણ", "જનીનિક મ્યુટેશન"], "ans": 1, "exp": "ડાર્વિન અનુસાર, જાતિ વિકાસ માટે પ્રજનનિક અલગતા (B) સૌથી મહત્વપૂર્ણ છે, કારણ કે તે જીવોને એકબીજાથી પ્રજનનિક રીતે અલગ કરે છે, જેથી નવી જાતિનું નિર્માણ થાય. વિકલ્પ A, C, અને D આ પ્રક્રિયામાં યોગદાન આપે છે, પરંતુ મૂળભૂત ઘટક પ્રજનનિક અલગતા છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના ઉત્ક્રાંતિ સિદ્ધાંતમાં 'પ્રાકૃતિક પસંદગી'ની ક્રિયા દરમિયાન નીચેનામાંથી કયું વિધાન અપવાદરૂપ ગણી શકાય? (નોંધ: આ પ્રશ્નમાં ડાર્વિનના મૂળ સિદ્ધાંતની મર્યાદાઓને ધ્યાનમાં લો.)", "opts": ["પર્યાવરણીય પરિવર્તનની ગેરહાજરીમાં પણ જાતિઓમાં ભિન્નતા જોવા મળે છે, જે પ્રાકૃતિક પસંદગી માટે જરૂરી છે", "પ્રાકૃતિક પસંદગી માત્ર એવા લક્ષણોને જ પસંદ કરે છે જે જીવિત રહેવા અને પ્રજનન માટે સીધો ફાયદો આપતા હોય", "કેટલાક લક્ષણો જે પ્રજનન સફળતામાં વધારો કરે છે પરંતુ જીવિત રહેવામાં કોઈ ફાળો આપતા નથી, તે પણ પ્રાકૃતિક પસંદગી દ્વારા પસંદ થઈ શકે છે", "પ્રાકૃતિક પસંદગીની ક્રિયા હંમેશા ધીમી અને ક્રમિક હોય છે, અને તે ક્યારેય ઝડપી પરિવર્તન લાવી શકતી નથી"], "ans": 3, "exp": "સાચો જવાબ વિકલ્પ D છે. ડાર્વિનના મૂળ સિદ્ધાંત અનુસાર પ્રાકૃતિક પસંદગી સામાન્ય રીતે ધીમી અને ક્રમિક હોય છે, પરંતુ કેટલાક કિસ્સાઓમાં (જેમ કે પર્યાવરણીય આંચકા અથવા જનીનિક અસંતુલન) તે ઝડપી પરિવર્તન પણ લાવી શકે છે. આ ડાર્વિનના સિદ્ધાંતનો અપવાદ છે કારણ કે તેમણે મૂળભૂત રીતે ક્રમિક ઉત્ક્રાંતિ પર ભાર મૂક્યો હતો. વિકલ્પ A ખોટો છે કારણ કે ભિન્નતા હંમેશા પર્યાવરણીય પરિવર્તન સાથે સંકળાયેલી નથી હોતી, પરંતુ તે પ્રાકૃતિક પસંદગી માટે જરૂરી છે. વિકલ્પ B ખોટો છે કારણ કે પ્રાકૃતિક પસંદગી માત્ર જીવિત રહેવા માટે જ નહીં, પ્રજનન સફળતા માટે પણ લક્ષણો પસંદ કરે છે. વિકલ્પ C ખોટો છે કારણ કે પ્રજનન સફળતામાં વધારો કરતા લક્ષણો પણ પ્રાકૃતિક પસંદગીનો ભાગ છે, જેને 'લિંગીય પસંદગી' (Sexual Selection) કહેવાય છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના ઉત્ક્રાંતિ સિદ્ધાંત અનુસાર, 'સંકરણ' (Hybridization) ની ભૂમિકા વિશે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["સંકરણથી નવી જનીન સંયોજનો ઉત્પન્ન થાય છે, જે પ્રાકૃતિક પસંદગી માટે કાચો માલ પૂરો પાડે છે.", "સંકરણથી જાતિઓ વચ્ચેના જનીન વિનિમયને કારણે અનુકૂળનની શક્યતાઓ વધે છે.", "સંકરણ મુખ્યત્વે એક જ જાતિમાં જોવા મળે છે અને તે જાતિ-વિકાસમાં સીધો ફાળો આપે છે.", "સંકરણથી ઉત્પન્ન થતી ભિન્નતાઓ પ્રાકૃતિક પસંદગી દ્વારા પસંદ અથવા નકારી શકાય છે."], "ans": 2, "exp": "વિકલ્પ C) ખોટો છે કારણ કે સંકરણ મુખ્યત્વે વિવિધ જાતિઓ અથવા ઉપજાતિઓ વચ્ચે થાય છે, એક જ જાતિમાં નહીં. સંકરણથી નવી જનીન સંયોજનો ઉત્પન્ન થાય છે (A), જનીન વિનિમય થવાને કારણે અનુકૂળનની શક્યતાઓ વધે છે (B), અને પ્રાકૃતિક પસંદગી દ્વારા ભિન્નતાઓ પસંદ અથવા નકારી શકાય છે (D).", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ડાર્વિનના સિદ્ધાંત અનુસાર, 'અતિશય પ્રજનન' (Overproduction) અને 'સંસાધનો માટેનો સંઘર્ષ' (Struggle for Resources) ની સાથે નીચેનામાંથી કયું પરિબળ સીધું સંબંધ ધરાવે છે?", "opts": ["જનીન પરિવર્તન (Genetic Mutation)", "જાતિ-વિકાસની ગતિ (Rate of Speciation)", "પ્રાકૃતિક પસંદગીની તીવ્રતા (Intensity of Natural Selection)", "વસતિ ઘનતા (Population Density)"], "ans": 2, "exp": "વિકલ્પ C) સીધો સંબંધ ધરાવે છે કારણ કે અતિશય પ્રજનન અને સંસાધનો માટેનો સંઘર્ષ પ્રાકૃતિક પસંદગીની તીવ્રતાને વધારે છે. જનીન પરિવર્તન (A) તો ભિન્નતાનું સ્રોત છે, જાતિ-વિકાસની ગતિ (B) તેના પરિણામ છે, અને વસતિ ઘનતા (D) તેનો એક પરિણામ છે પરંતુ સીધો સંબંધ નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ડાર્વિનના 'પ્રાકૃતિક પસંદગી'ના સિદ્ધાંત અનુસાર, નીચેનામાંથી કયું ઉદાહરણ 'સહ-ઉત્ક્રાંતિ' (Co-evolution) નું સૌથી યોગ્ય ઉદાહરણ નથી?", "opts": ["ફૂલ અને પરાગરજક કીટક (Pollinator Insect)", "શિકારી અને શિકાર (Predator and Prey)", "મનુષ્ય અને કૂતરો (Human and Dog)", "લાયકનમાં ફંગી અને શેવાળ (Fungi and Algae in Lichen)"], "ans": 2, "exp": "વિકલ્પ C) સહ-ઉત્ક્રાંતિનું ઉદાહરણ નથી કારણ કે મનુષ્ય અને કૂતરા વચ્ચેનો સંબંધ કૃત્રિમ પસંદગી (Artificial Selection) નો છે. ફૂલ અને પરાગરજક કીટક (A), શિકારી અને શિકાર (B), તેમજ લાયકનમાં ફંગી અને શેવાળ (D) એ સહ-ઉત્ક્રાંતિના ઉદાહરણો છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ડાર્વિનના ઉત્ક્રાંતિ સિદ્ધાંત અનુસાર, 'પ્રજાતિ-વિકાસ' (Speciation) ની પ્રક્રિયામાં નીચેનામાંથી કયું પરિબળ સૌથી ઓછું મહત્વ ધરાવે છે?", "opts": ["ભૌગોલિક અલગીકરણ (Geographical Isolation)", "પ્રાકૃતિક પસંદગી (Natural Selection)", "જનીન પરિવર્તન (Genetic Mutation)", "કૃત્રિમ પસંદગી (Artificial Selection)"], "ans": 3, "exp": "વિકલ્પ D) સૌથી ઓછું મહત્વ ધરાવે છે કારણ કે કૃત્રિમ પસંદગી મનુષ્ય દ્વારા થાય છે અને તે પ્રજાતિ-વિકાસની પ્રાકૃતિક પ્રક્રિયામાં સીધો ફાળો આપતું નથી. ભૌગોલિક અલગીકરણ (A), પ્રાકૃતિક પસંદગી (B), અને જનીન પરિવર્તન (C) એ પ્રજાતિ-વિકાસના મહત્વપૂર્ણ પરિબળો છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ડાર્વિનના ઉત્ક્રાંતિ સિદ્ધાંત અનુસાર, 'અનુવંશિક ભિન્નતા' (Heritable Variation) ની ઉત્પત્તિ માટે નીચેનામાંથી કયું કારણ સૌથી ઓછું મહત્વનું ગણાય છે?", "opts": ["જનીનમાં થતી યાદચ્છિક પરિવર્તન (Random Mutations)", "લૈંગિક પ્રજનન દરમિયાન થતું જનીનનું પુનરસંયોજન (Genetic Recombination)", "પ્રાકૃતિક પસંદગી દ્વારા થતી જાતિઓની પસંદગી (Selection by Natural Selection)", "પર્યાવરણીય પરિબળો દ્વારા થતી ફિનોટાઇપિક પ્લાસ્ટિસિટી (Phenotypic Plasticity)"], "ans": 3, "exp": "ડાર્વિનના સિદ્ધાંત અનુસાર, અનુવંશિક ભિન્નતા મુખ્યત્વે જનીનમાં થતી યાદચ્છિક પરિવર્તન (A) અને લૈંગિક પ્રજનન દરમિયાન થતું જનીનનું પુનરસંયોજન (B) દ્વારા ઉત્પન્ન થાય છે. પ્રાકૃતિક પસંદગી (C) તો આ ભિન્નતાને પસંદ કરે છે, પરંતુ તેની ઉત્પત્તિનું કારણ નથી. પર્યાવરણીય પરિબળો દ્વારા થતી ફિનોટાઇપિક પ્લાસ્ટિસિટી (D) એ અસ્થાયી ફેરફારો છે, જે અનુવંશિક નથી, તેથી તે અનુવંશિક ભિન્નતાની ઉત્પત્તિ માટે ઓછું મહત્વનું ગણાય છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ડાર્વિનના ઉત્ક્રાંતિ સિદ્ધાંત અનુસાર, 'અનુકૂળન' અને 'પ્રાકૃતિક પસંદગી' વચ્ચેનો સંબંધ કયા વિકલ્પમાં સૌથી યોગ્ય રીતે વર્ણવાયો છે?", "opts": ["અનુકૂળન એ પ્રાકૃતિક પસંદગીનું પરિણામ છે, પરંતુ પ્રાકૃતિક પસંદગી અનુકૂળન પર આધારિત નથી.", "પ્રાકૃતિક પસંદગી અનુકૂળનને પ્રોત્સાહન આપે છે, જ્યારે અનુકૂળન પ્રાકૃતિક પસંદગીની દિશા નક્કી કરે છે.", "અનુકૂળન અને પ્રાકૃતિક પસંદગી પરસ્પર સ્વતંત્ર પ્રક્રિયાઓ છે, જે એકબીજા સાથે કોઈ સંબંધ ધરાવતી નથી.", "પ્રાકૃતિક પસંદગી અનુકૂળનને નિષ્ક્રિય કરે છે, જ્યારે અનુકૂળન પ્રાકૃતિક પસંદગીને વેગ આપે છે."], "ans": 1, "exp": "પ્રાકૃતિક પસંદગી અનુકૂળનને પ્રોત્સાહન આપે છે, કારણ કે જીવો જે તેમના પર્યાવરણ સાથે સૌથી વધુ અનુકૂળ હોય   document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';

  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
