<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ઉપાર્જિત રોગપ્રતિકારકતા</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ઉપાર્જિત રોગપ્રતિકારકતા</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ઉપાર્જિત રોગપ્રતિકારકતા</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "જ્યારે એન્ટિજન પ્રથમ વખત શરીરમાં પ્રવેશે છે ત્યારે પ્રતિરક્ષા પ્રતિસાદમાં બનતી એન્ટીબોડીની પ્રમાણમાં ઓછી માત્રા અને નીચી અસરકારકતા ધરાવતી હોય છે, પરંતુ દ્વિતીય વખત એન્ટિજન પ્રવેશે ત્યારે તરત જ અને વધુ પ્રમાણમાં એન્ટીબોડી બને છે. આ ઘટનાને શું કહેવાય છે?", "opts": ["પ્રાથમિક પ્રતિરક્ષા પ્રતિસાદ", "દ્વિતીય પ્રતિરક્ષા પ્રતિસાદ", "ઉત્ક્રાંતિક સ્મૃતિ", "સક્રિય રોગપ્રતિકારકતા"], "ans": 2, "exp": "ઉત્ક્રાંતિક સ્મૃતિ (Immunological memory) એ પ્રતિરક્ષાતંત્રની એવી લાક્ષણિકતા છે જેમાં પ્રથમ એન્ટિજન એક્સપોઝર પછી શરીર એન્ટિજનને 'યાદ' રાખે છે અને દ્વિતીય વખત એન્ટિજન પ્રવેશે ત્યારે વધુ ઝડપી અને મજબૂત પ્રતિસાદ આપે છે. પ્રાથમિક પ્રતિસાદ (A) પ્રથમ એક્સપોઝર દરમિયાન થાય છે, દ્વિતીય પ્રતિસાદ (B) દ્વિતીય વખત થાય છે પરંતુ આ ઘટનાનું નામ નથી, અને સક્રિય રોગપ્રતિકારકતા (D) એ એન્ટિજન પ્રવેશ પછી શરીર દ્વારા એન્ટીબોડી બનાવવાની પ્રક્રિયાને કહેવાય છે, પરંતુ સ્મૃતિ વિશે વર્ણવતું નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેનામાંથી કયો રોગપ્રતિકારક કોષ એન્ટિજનને ઓળખીને તેની વિરુદ્ધ એન્ટીબોડી બનાવવાનું કામ કરે છે?", "opts": ["B-લસિકાકોષ", "T-લસિકાકોષ", "મૅક્રોફેજ", "ન્યૂટ્રોફિલ"], "ans": 0, "exp": "B-લસિકાકોષ (B-lymphocytes) એ એન્ટિજનને ઓળખીને તેની વિરુદ્ધ એન્ટીબોડી (ઇમ્યુનોગ્લોબ્યુલિન) બનાવે છે. T-લસિકાકોષ (B) એ સેલ-મેડિયેટેડ ઇમ્યુનિટીમાં ભાગ લે છે, મૅક્રોફેજ (C) એ એન્ટિજનને ગળી જાય છે અને એન્ટિજન પ્રસ્તુત કરે છે, જ્યારે ન્યૂટ્રોફિલ (D) એ ફેગોસાઇટોસિસ દ્વારા રોગજીવોને નષ્ટ કરે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એક વ્યક્તિને કોઈ રોગ થયો અને તે સ્વસ્થ થયો, પરંતુ પછી તે જ રોગનો દ્વિતીય હુમલો થતાં તે ગંભીર રીતે બીમાર પડ્યો. આ ઘટનાનું સૌથી યોગ્ય કારણ કયું હોઈ શકે?", "opts": ["પ્રથમ હુમલા પછી એન્ટીબોડી બની નહીં", "દ્વિતીય હુમલો અલગ પ્રકારના રોગજીવ દ્વારા થયો", "પ્રથમ હુમલા પછી ઉત્પન્ન થયેલી એન્ટીબોડી એન્ટિજનિક વેરિએશન ધરાવતા રોગજીવ સામે અસરકારક નથી", "વ્યક્તિની પ્રતિરક્ષાતંત્ર નબળી પડી ગઈ"], "ans": 2, "exp": "આ કિસ્સામાં, રોગજીવમાં એન્ટિજનિક વેરિએશન (antigenic variation) થયું હોઈ શકે, જેથી પ્રથમ હુમલા પછી બનેલી એન્ટીબોડી નવા એન્ટિજન સામે અસરકારક નથી. પ્રથમ હુમલા પછી એન્ટીબોડી બનવી જ જોઈએ (A ખોટું), દ્વિતીય હુમલો તે જ રોગજીવ દ્વારા થયો હોવાનું માની લેવામાં આવે છે (B ખોટું), અને પ્રતિરક્ષાતંત્ર નબળી પડવાનું કારણ અહીં સ્પષ્ટ નથી (D ખોટું).", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેનામાંથી કયો રોગપ્રતિકારક તંત્રનો ઘટક ઉત્પન્ન થવાનું કારણ બને છે જ્યારે શરીરમાં સ્વ-પ્રતિજન (self-antigen) વિરુદ્ધ પ્રતિકારકતા વિકસે છે?", "opts": ["એલર્જી", "ઓટોઇમ્યુન રોગ", "ઇમ્યુનોડેફિશિયન્સી", "સુપરએન્ટિજન"], "ans": 1, "exp": "ઓટોઇમ્યુન રોગ (Autoimmune disease) એ જ ઘટના છે જ્યારે પ્રતિરક્ષાતંત્ર શરીરના સ્વ-પ્રતિજન વિરુદ્ધ પ્રતિકારકતા વિકસાવે છે. એલર્જી (A) એ અતિપ્રતિક્રિયા છે, ઇમ્યુનોડેફિશિયન્સી (C) એ પ્રતિરક્ષાતંત્રની નબળાઈ છે, અને સુપરએન્ટિજન (D) એ એન્ટિજનનું એક પ્રકાર છે જે પ્રબળ પ્રતિક્રિયા ઉત્પન્ન કરે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "જ્યારે એન્ટિજન-એન્ટીબોડી પ્રક્રિયા થાય છે ત્યારે બનતી અગ્રલેખિત (precipitate) જોવા મળે છે. આ પ્રક્રિયા કયા પ્રકારની પ્રતિક્રિયા છે?", "opts": ["એગ્લ્યુટિનેશન", "પ્રિસિપિટેશન", "કોમ્પ્લિમેન્ટ ફિક્સેશન", "ઓપ્સોનાઇઝેશન"], "ans": 1, "exp": "એન્ટિજન-એન્ટીબોડી પ્રક્રિયા દરમિયાન અગ્રલેખિત (precipitate) બનવાની પ્રક્રિયાને પ્રિસિપિટેશન (precipitation) કહેવાય છે. એગ્લ્યુટિનેશન (A) એ કણિકાઓના જૂથ બનવાની પ્રક્રિયા છે, કોમ્પ્લિમેન્ટ ફિક્સેશન (C) એ કોમ્પ્લિમેન્ટ પ્રોટીનની સક્રિયતા સાથે સંબંધિત છે, અને ઓપ્સોનાઇઝેશન (D) એ ફેગોસાઇટોસિસને સરળ બનાવવાની પ્રક્રિયા છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "જ્યારે એક વ્યક્તિને ટેટનસના ટોક્સોઇડનો ડોઝ આપવામાં આવે છે, ત્યારે તેની શરીરમાં ઉત્પન્ન થતી ઉપાર્જિત રોગપ્રતિકારકતાનો પ્રકાર કયો હોય છે?", "opts": ["સક્રિય કૃત્રિમ ઉપાર્જિત રોગપ્રતિકારકતા", "નિષ્ક્રિય કૃત્રિમ ઉપાર્જિત રોગપ્રતિકારકતા", "સક્રિય પ્રાકૃતિક ઉપાર્જિત રોગપ્રતિકારકતા", "નિષ્ક્રિય પ્રાકૃતિક ઉપાર્જિત રોગપ્રતિકારકતા"], "ans": 0, "exp": "ટેટનસના ટોક્સોઇડનો ડોઝ આપવાથી શરીરમાં એન્ટિજન વિરુદ્ધ એન્ટીબોડીનું ઉત્પાદન થાય છે, જે સક્રિય કૃત્રિમ ઉપાર્જિત રોગપ્રતિકારકતાનું ઉદાહરણ છે. નિષ્ક્રિય કૃત્રિમ (B) એ એન્ટીબોડીના સીધા ઇન્જેક્શન (જેવા કે એન્ટી-સેરમ) દ્વારા થાય છે. સક્રિય પ્રાકૃતિક (C) રોગ થયા પછી શરીર દ્વારા સ્વાભાવિક રીતે ઉત્પન્ન થાય છે, જ્યારે નિષ્ક્રિય પ્રાકૃતિક (D) માથી બાળકમાં એન્ટીબોડીના સંક્રમણ દ્વારા થાય છે.", "ref": "Std 12 - Chapter 10: માનવ તંત્રો - પ્રતિરક્ષાતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયા પરિસ્થિતિમાં ઉપાર્જિત રોગપ્રતિકારકતામાં 'એનામ્નેસ્ટિક પ્રતિક્રિયા' (anamnestic response) જોવા મળે છે?", "opts": ["પ્રથમ વખત એન્ટિજનના સંપર્કમાં આવવાથી", "બીજી વખત એન્ટિજનના સંપર્કમાં આવવાથી", "એન્ટીબોડીના સીધા ઇન્જેક્શનથી", "માથી બાળકમાં એન્ટીબોડીના સંક્રમણથી"], "ans": 1, "exp": "એનામ્નેસ્ટિક પ્રતિક્રિયા એ બીજી વખત એન્ટિજનના સંપર્કમાં આવવાથી થતી તીવ્ર અને ઝડપી પ્રતિરક્ષા પ્રતિક્રિયા છે, જેમાં મેમરી કોષો સક્રિય થાય છે. પ્રથમ વખત (A) એ પ્રાથમિક પ્રતિક્રિયા હોય છે. એન્ટીબોડીના સીધા ઇન્જેક્શન (C) અને માથી બાળકમાં સંક્રમણ (D) નિષ્ક્રિય રોગપ્રતિકારકતાનું ઉદાહરણ છે.", "ref": "Std 12 - Chapter 10: માનવ તંત્રો - પ્રતિરક્ષાતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયો રોગપ્રતિકારક કોષ 'સ્મૃતિ કોષ' (memory cell) તરીકે ઓળખાય છે અને ઉપાર્જિત રોગપ્રતિકારકતામાં મહત્વની ભૂમિકા ભજવે છે?", "opts": ["B-લસિકાકોષ", "T-લસિકાકોષ", "પ્લાઝ્મા કોષ", "મૅક્રોફેજ"], "ans": 0, "exp": "B-લસિકાકોષમાંથી જ 'સ્મૃતિ કોષ' (memory B-cell) ઉત્પન્ન થાય છે, જે બીજી વખત એન્ટિજનના સંપર્કમાં આવવાથી ઝડપી અને તીવ્ર પ્રતિક્રિયા આપે છે. T-લસિકાકોષ (B) પણ સ્મૃતિ કોષ બનાવે છે, પરંતુ પ્રશ્નમાં B-લસિકાકોષ વધુ સીધું ઉદાહરણ છે. પ્લાઝ્મા કોષ (C) એન્ટીબોડી ઉત્પન્ન કરે છે, પરંતુ સ્મૃતિ કોષ નથી. મૅક્રોફેજ (D) એ એન્ટિજન પ્રસ્તુત કરનાર કોષ છે.", "ref": "Std 12 - Chapter 10: માનવ તંત્રો - પ્રતિરક્ષાતંત્ર", "ch": ""}, {"q": "એક વ્યક્તિને હેપેટાઇટિસ B વિરુદ્ધ લસીકા આપવામાં આવે છે. લસીકા આપ્યા પછી, શરીરમાં કયા પ્રકારના એન્ટીબોડી પ્રથમ ઉત્પન્ન થશે?", "opts": ["IgG", "IgM", "IgA", "IgE"], "ans": 1, "exp": "પ્રાથમિક પ્રતિરક્ષા પ્રતિક્રિયામાં, પ્રથમ ઉત્પન્ન થતો એન્ટીબોડી IgM હોય છે. IgG (A) બીજી વખત એન્ટિજનના સંપર્કમાં આવવાથી ઉત્પન્ન થાય છે. IgA (C) શ્લેષ્મલ પટલ પર અને IgE (D) એલર્જી પ્રતિક્રિયામાં મહત્વની ભૂમિકા ભજવે છે.", "ref": "Std 12 - Chapter 10: માનવ તંત્રો - પ્રતિરક્ષાતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયા રોગમાં ઉપાર્જિત રોગપ્રતિકારકતા 'કોષમધ્યસ્થ' (cell-mediated) પ્રતિક્રિયા દ્વારા થાય છે?", "opts": ["ટ્યુબરક્યુલોસિસ", "ટેટનસ", "ડિફ્થેરિયા", "હેપેટાઇટિસ A"], "ans": 0, "exp": "ટ્યુબરક્યુલોસિસ (TB) એ કોષમધ્યસ્થ રોગપ્રતિકારકતાનું ઉદાહરણ છે, જેમાં T-લસિકાકોષ મહત્વની ભૂમિકા ભજવે છે. ટેટનસ (B), ડિફ્થેરિયા (C), અને હેપેટાઇટિસ A (D) એ એન્ટીબોડી-મધ્યસ્થ (humoral) રોગપ્રતિકારકતાનું ઉદાહરણ છે.", "ref": "Std 12 - Chapter 10: માનવ તંત્રો - પ્રતિરક્ષાતંત્ર", "ch": ""}, {"q": "જ્યારે શરીરમાં એન્ટિજનનો દ્વિતીય સંપર્ક થાય છે, ત્યારે કયા કોષો દ્વારા તાત્કાલિક અને મજબૂત પ્રતિરક્ષા પ્રતિસાદ ઉત્પન્ન થાય છે, જે ઉપાર્જિત રોગપ્રતિકારકતાનું લક્ષણ છે?", "opts": ["પ્લાઝ્મા કોષો (Plasma cells)", "સ્મૃતિ B કોષો (Memory B cells)", "ટી-હેલ્પર કોષો (T-helper cells)", "મૅક્રોફેજ (Macrophages)"], "ans": 1, "exp": "સ્મૃતિ B કોષો (Memory B cells) એન્ટિજનના પ્રથમ સંપર્ક દરમિયાન બનેલા કોષો છે, જે દ્વિતીય સંપર્ક દરમિયાન તાત્કાલિક અને મજબૂત પ્રતિસાદ આપે છે. પ્લાઝ્મા કોષો એન્ટીબોડી ઉત્પન્ન કરે છે પરંતુ તેઓ લાંબા ગાળા સુધી ટકી શકતા નથી. ટી-હેલ્પર કોષો અને મૅક્રોફેજ પ્રતિરક્ષા પ્રતિસાદમાં મહત્વની ભૂમિકા ભજવે છે, પરંતુ તેઓ સ્મૃતિ પ્રતિસાદ માટે જવાબદાર નથી.", "ref": "Std 12 - પ્રકરણ 8: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}, {"q": "નીચેનામાંથી કયો રોગપ્રતિકારક તંત્રનો ઘટક એન્ટિજન-એન્ટીબોડી જટિલને નિષ્ક્રિય કરવા માટે જવાબદાર છે, જેથી શરીરમાં સૂજન અથવા નુકસાન થતું અટકાવી શકાય?", "opts": ["કોમ્પ્લિમેન્ટ પ્રોટીન (Complement proteins)", "ઇન્ટરફેરોન (Interferons)", "ઇમ્યુનોગ્લોબ્યુલિન E (IgE)", "હિસ્ટામિન (Histamine)"], "ans": 0, "exp": "કોમ્પ્લિમેન્ટ પ્રોટીન એન્ટિજન-એન્ટીબોડી જટિલને નિષ્ક્રિય કરવા અને રોગજીવોને નાશ કરવા માટે જવાબદાર છે. ઇન્ટરફેરોન વાયરસ વિરુદ્ધ કામ કરે છે, ઇમ્યુનોગ્લોબ્યુલિન E એલર્જી પ્રતિક્રિયામાં ભાગ લે છે, અને હિસ્ટામિન સૂજન પ્રક્રિયામાં ભાગ લે છે.", "ref": "Std 12 - પ્રકરણ 8: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}, {"q": "જ્યારે એક વ્યક્તિને એલર્જી થાય છે, ત્યારે શરીરમાં કયા એન્ટીબોડીના સ્તરમાં વધારો થાય છે, જે માસ્ટ કોષોને ઉત્તેજિત કરે છે અને હિસ્ટામિન મુક્ત કરાવે છે?", "opts": ["IgG", "IgM", "IgA", "IgE"], "ans": 3, "exp": "IgE એન્ટીબોડી એલર્જી પ્રતિક્રિયામાં મહત્વની ભૂમિકા ભજવે છે. તે માસ્ટ કોષો સાથે જોડાઈને હિસ્ટામિન મુક્ત કરાવે છે, જે એલર્જીના લક્ષણો તરફ દોરી જાય છે. IgG, IgM, અને IgA અન્ય પ્રકારના એન્ટીબોડી છે જે એલર્જી પ્રતિક્રિયામાં ભાગ લેતા નથી.", "ref": "Std 12 - પ્રકરણ 8: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}, {"q": "નીચેનામાંથી કયા રોગમાં ઉપાર્જિત રોગપ્રતિકારકતા દરમિયાન, શરીરમાં એન્ટીબોડી ઉત્પન્ન થવાને બદલે, ટી-કોષો દ્વારા રોગજીવોને નાશ કરવામાં આવે છે?", "opts": ["ટ્યુબરક્યુલોસિસ (Tuberculosis)", "હેપેટાઇટિસ B (Hepatitis B)", "ટેટનસ (Tetanus)", "ડિફ્થેરિયા (Diphtheria)"], "ans": 0, "exp": "ટ્યુબરક્યુલોસિસમાં, ટી-કોષો (કોષમધ્યસ્થ રોગપ્રતિકારકતા) દ્વારા રોગજીવોને નાશ કરવામાં આવે છે. હેપેટાઇટિસ B, ટેટનસ, અને ડિફ્થેરિયામાં એન્ટીબોડી-મધ્યસ્થ રોગપ્રતિકારકતા જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 8: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}, {"q": "જ્યારે એક વ્યક્તિને રોગપ્રતિકારકતા માટે લસીકા આપવામાં આવે છે, ત્યારે નીચેનામાંથી કયો ઘટક લસીકામાં હાજર હોવો જરૂરી છે, જેથી ઉપાર્જિત રોગપ્રતિકારકતા વિકસિત થઈ શકે?", "opts": ["જીવંત રોગજીવો (Live pathogens)", "મૃત રોગજીવો અથવા તેમના ટોક્સિન (Dead pathogens or their toxins)", "એન્ટીબોડી (Antibodies)", "સ્ટીરોઇડ હોર્મોન (Steroid hormones)"], "ans": 1, "exp": "લસીકામાં મૃત રોગજીવો અથવા તેમના ટોક્સિન (ટોક્સોઇડ) હાજર હોવા જરૂરી છે, જેથી શરીરમાં એન્ટિજન વિરુદ્ધ એન્ટીબોડી ઉત્પન્ન થઈ શકે. જીવંત રોગજીવો ખતરનાક હોઈ શકે છે, એન્ટીબોડી લસીકામાં હાજર નથી હોતી, અને સ્ટીરોઇડ હોર્મોન રોગપ્રતિકારકતામાં ભાગ લેતા નથી.", "ref": "Std 12 - પ્રકરણ 8: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}, {"q": "જ્યારે શરીરમાં પ્રથમ વખત એન્ટિજન પ્રવેશે છે, ત્યારે બનતી પ્રાથમિક એન્ટીબોડી પ્રતિક્રિયા અને દ્વિતીય વખત એન્ટિજન પ્રવેશે ત્યારે બનતી દ્વિતીય પ્રતિક્રિયા વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["પ્રાથમિક પ્રતિક્રિયામાં IgM એન્ટીબોડી બને છે જ્યારે દ્વિતીય પ્રતિક્રિયામાં IgG એન્ટીબોડી બને છે", "પ્રાથમિક પ્રતિક્રિયામાં એન્ટીબોડીનું સ્તર ઝડપથી વધે છે જ્યારે દ્વિતીય પ્રતિક્રિયામાં ધીમે ધીમે વધે છે", "પ્રાથમિક પ્રતિક્રિયામાં સ્મૃતિ કોષો બનતા નથી જ્યારે દ્વિતીય પ્રતિક્રિયામાં સ્મૃતિ કોષો બને છે", "પ્રાથમિક પ્રતિક્રિયામાં T-કોષો સક્રિય થતા નથી જ્યારે દ્વિતીય પ્રતિક્રિયામાં T-કોષો સક્રિય થાય છે"], "ans": 0, "exp": "પ્રાથમિક પ્રતિક્રિયામાં પ્રથમ વખત એન્ટિજન પ્રવેશે ત્યારે શરીર IgM એન્ટીબોડી બનાવે છે, જ્યારે દ્વિતીય વખત એન્ટિજન પ્રવેશે ત્યારે સ્મૃતિ કોષો દ્વારા ઝડપથી અને મજબૂત પ્રતિક્રિયા રૂપે IgG એન્ટીબોડી બનાવે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે પ્રાથમિક પ્રતિક્રિયા ધીમી અને ઓછી તીવ્ર હોય છે, સ્મૃતિ કોષો પ્રાથમિક પ્રતિક્રિયા દરમિયાન જ બનવા શરૂ થાય છે, અને T-કોષો પ્રાથમિક પ્રતિક્રિયામાં પણ સક્રિય થાય છે.", "ref": "Std 12 - પ્રકરણ 10: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}, {"q": "નીચેનામાંથી કયો રોગપ્રતિકારક કોષ એન્ટિજનને પ્રસ્તુત કરવાનું કામ કરે છે અને તેને એન્ટિજન-પ્રસ્તુતક કોષ (APC) કહેવાય છે?", "opts": ["B-લસિકાકોષ", "T-સહાયક કોષ", "ડેન્ડ્રિટિક કોષ", "પ્લાઝ્મા કોષ"], "ans": 2, "exp": "ડેન્ડ્રિટિક કોષ, મેક્રોફેજ અને B-લસિકાકોષ એ એન્ટિજન-પ્રસ્તુતક કોષ (APC) છે જે એન્ટિજનને T-કોષોને પ્રસ્તુત કરે છે. B-લસિકાકોષ એન્ટીબોડી બનાવે છે, T-સહાયક કોષ એન્ટિજનને ઓળખીને પ્રતિક્રિયા આપે છે, અને પ્લાઝ્મા કોષ એન્ટીબોડી ઉત્પન્ન કરે છે.", "ref": "Std 12 - પ્રકરણ 10: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}, {"q": "જ્યારે શરીરમાં એન્ટિજન-એન્ટીબોડી પ્રક્રિયા થાય છે, ત્યારે નીચેનામાંથી કયા પરિણામે કોષના ફાટવાનું (cytolysis) કારણ બને છે?", "opts": ["એગ્લ્યુટિનેશન", "પ્રિસિપિટેશન", "કોમ્પ્લિમેન્ટ સિસ્ટમની સક્રિયતા", "ઓપ્સોનાઇઝેશન"], "ans": 2, "exp": "કોમ્પ્લિમેન્ટ સિસ્ટમની સક્રિયતા દ્વારા એન્ટિજન-એન્ટીબોડી જટિલ કોષના ઝરીને તોડીને કોષનું ફાટવાનું (cytolysis) કરે છે. એગ્લ્યુટિનેશન એ રક્ત કણોના ગુચ્છા બનવાનું કારણ બને છે, પ્રિસિપિટેશન એ અદ્રાવ્ય જટિલ બનવાનું કારણ બને છે, અને ઓપ્સોનાઇઝેશન એ ફેગોસાઇટોસિસને સરળ બનાવે છે.", "ref": "Std 12 - પ્રકરણ 10: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}, {"q": "એક વ્યક્તિને અમુક વર્ષો પહેલાં ઓરીનો ચેપ લાગ્યો હતો અને તે સંપૂર્ણપણે સાજો થયો હતો. હવે તે વ્યક્તિને ફરીથી ઓરીનો ચેપ લાગે છે, પરંતુ આ વખતે રોગના લક્ષણો ખૂબ જ હળવા અને ટૂંકા સમય માટે જોવા મળે છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["આ પરિસ્થિતિમાં 'સ્મૃતિ કોષો' (memory cells) દ્વારા ઝડપી અને પ્રબળ દ્વિતીયક પ્રતિક્રિયા થાય છે.", "પ્રાથમિક ચેપ દરમિયાન ઉત્પન્ન થયેલા IgM એન્ટીબોડીની સરખામણીએ દ્વિતીયક પ્રતિક્રિયામાં IgG એન્ટીબોડીનું પ્રમાણ વધારે હોય છે.", "દ્વિતીયક પ્રતિક્રિયા દરમિયાન ઉત્પન્ન થતા એન્ટીબોડીની આણ્વિક રચના પ્રાથમિક પ્રતિક્રિયા કરતાં અલગ હોય છે, જેને કારણે તે વધુ અસરકારક બને છે.", "આ પરિસ્થિતિમાં 'સહાયક ટી-કોષો' (helper T-cells)ની સંખ્યામાં વધારો થાય છે, જે બી-કોષોને એન્ટીબોડી ઉત્પન્ન કરવા માટે સક્રિય કરે છે."], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે કારણ કે દ્વિતીયક પ્રતિક્રિયા દરમિયાન ઉત્પન્ન થતા એન્ટીબોડીની આણ્વિક રચના પ્રાથમિક પ્રતિક્રિયા કરતાં અલગ હોતી નથી. IgG એન્ટીબોડીની રચના બંને પ્રતિક્રિયામાં સમાન હોય છે, પરંતુ દ્વિતીયક પ્રતિક્રિયામાં તેનું પ્રમાણ અને ઉત્પાદનની ઝડપ વધારે હોય છે. વિકલ્પ A, B અને D સાચાં છે કારણ કે સ્મૃતિ કોષો દ્વારા ઝડપી પ્રતિક્રિયા થાય છે, IgGનું પ્રમાણ વધારે હોય છે અને સહાયક ટી-કોષો બી-કોષોને સક્રિય કરે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેનામાંથી કયું ઉદાહરણ 'કૃત્રિમ સક્રિય ઉપાર્જિત રોગપ્રતિકારકતા' (artificial active acquired immunity)નું નથી?", "opts": ["પોલિયો વિરુદ્ધ લગાવવામાં આવતી મૃત લસીકા (killed vaccine).", "ટાઇફોઇડ વિરુદ્ધ આપવામાં આવતી નિષ્ક્રિય લસીકા (attenuated vaccine).", "ડિફ્થેરિયા વિરુદ્ધ આપવામાં આવતું એન્ટિટોક્સિન (antitoxin).", "હડકવા વિરુદ્ધ આપવામાં આવતી રેબીઝ લસીકા (rabies vaccine)."], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે કારણ કે ડિફ્થેરિયા વિરુદ્ધ આપવામાં આવતું એન્ટિટોક્સિન 'કૃત્રિમ નિષ્ક્રિય ઉપાર્જિત રોગપ્રતિકારકતા' (artificial passive acquired immunity)નું ઉદાહરણ છે. એન્ટિટોક્સિનમાં પહેલેથી તૈયાર એન્ટીબોડી હોય છે, જે શરીરમાં સીધા જ પ્રવેશે છે અને રોગપ્રતિકારકતા પ્રદાન કરે છે, પરંતુ તે સક્રિય રોગપ્રતિકારકતા નથી. વિકલ્પ A, B અને D કૃત્રિમ સક્રિય ઉપાર્જિત રોગપ્રતિકારકતાના ઉદાહરણો છે કારણ કે આ લસીકાઓ શરીરમાં એન્ટિજન પ્રવેશાડાવીને સક્રિય રોગપ્રતિકારક પ્રતિક્રિયા ઉત્તેજિત કરે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
