<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>શુક્રજનન (Spermatogenesis)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>શુક્રજનન (Spermatogenesis)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">શુક્રજનન (Spermatogenesis)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "શુક્રજનનની પ્રક્રિયામાં પ્રાથમિક શુક્રકોષોમાંથી દ્વિતીયક શુક્રકોષોનું નિર્માણ કયા તબક્કામાં થાય છે?", "opts": ["ગુણન તબક્કો (Multiplication phase)", "વૃદ્ધિ તબક્કો (Growth phase)", "પરિપક્વન તબક્કો (Maturation phase)નું પ્રથમ વિભાજન", "પરિપક્વન તબક્કો (Maturation phase)નું દ્વિતીય વિભાજન"], "ans": 2, "exp": "પ્રાથમિક શુક્રકોષોમાંથી દ્વિતીયક શુક્રકોષોનું નિર્માણ પરિપક્વન તબક્કાના પ્રથમ વિભાજન (અર્ધસૂત્રીભાજન-I) દરમિયાન થાય છે. ગુણન તબક્કામાં પ્રાથમિક જનનકોષોમાંથી પ્રાથમિક શુક્રકોષો બને છે, વૃદ્ધિ તબક્કામાં કોષનું કદ વધે છે, જ્યારે દ્વિતીય વિભાજનમાં દ્વિતીયક શુક્રકોષોમાંથી શુક્રકોષો બને છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "શુક્રજનન દરમિયાન શુક્રકોષોના શીર્ષ ભાગમાં આવેલું એક્રોસોમ કયા કોષીય અંગમાંથી વિકસે છે?", "opts": ["કોષકેન્દ્ર (Nucleus)", "ગોલ્ગીકાય (Golgi apparatus)", "મિટોકોન્ડ્રિયા (Mitochondria)", "અંતઃકોષરસજાળ (Endoplasmic reticulum)"], "ans": 0, "exp": "એક્રોસોમ ગોલ્ગીકાયમાંથી વિકસે છે, જેમાં પાચક ઉત્સેચકો હોય છે જે શુક્રકોષને અંડકોષના આવરણને ભેદવામાં મદદ કરે છે. કોષકેન્દ્રમાં આનુવંશિક દ્રવ્ય હોય છે, મિટોકોન્ડ્રિયા ઊર્જા પૂરી પાડે છે, અને અંતઃકોષરસજાળ પ્રોટીન સંશ્લેષણમાં ભાગ લે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન શુક્રજનનની પ્રક્રિયા માટે ખોટું છે?", "opts": ["શુક્રજનનની પ્રક્રિયા શુક્રપિંડના શુક્રજનન નલિકાઓમાં થાય છે.", "પ્રાથમિક શુક્રકોષોમાં 46 વર્ણસૂત્રો હોય છે, જ્યારે શુક્રકોષોમાં 23 વર્ણસૂત્રો હોય છે.", "શુક્રજનનની પ્રક્રિયા ફક્ત યૌવનારંભથી શરૂ થાય છે અને આજીવન ચાલુ રહે છે.", "શુક્રકોષોના પૂંછડીના ભાગમાં મોટી સંખ્યામાં મિટોકોન્ડ્રિયા હોય છે."], "ans": 2, "exp": "શુક્રજનનની પ્રક્રિયા ગર્ભાવસ્થાના અંતિમ તબક્કામાં શરૂ થાય છે અને યૌવનારંભથી સક્રિય બને છે, પરંતુ તે આજીવન ચાલુ રહેતી નથી - વૃદ્ધાવસ્થામાં તે ધીમી પડે છે. અન્ય તમામ વિધાનો સાચાં છે: શુક્રજનન શુક્રપિંડમાં થાય છે, પ્રાથમિક શુક્રકોષોમાં 46 વર્ણસૂત્રો હોય છે જે અર્ધસૂત્રીભાજનથી ઘટીને 23 થાય છે, અને શુક્રકોષના મધ્ય ભાગમાં મિટોકોન્ડ્રિયા હોય છે (પૂંછડીમાં નહીં).", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "શુક્રજનનની પ્રક્રિયામાં સર્ટોલી કોષોનું મુખ્ય કાર્ય શું છે?", "opts": ["ટેસ્ટોસ્ટેરોન હોર્મોનનો સ્રાવ કરવો", "શુક્રકોષોને પોષણ અને આધાર પૂરો પાડવો", "શુક્રકોષોનું સંગ્રહણ અને પરિવહન કરવું", "શુક્રકોષોના DNAનું સમારકામ કરવું"], "ans": 1, "exp": "સર્ટોલી કોષો શુક્રજનન નલિકાઓમાં આવેલા છે અને શુક્રકોષોને પોષણ, આધાર તેમજ રક્ષણ પૂરું પાડે છે. ટેસ્ટોસ્ટેરોનનો સ્રાવ લેડિગ કોષો દ્વારા થાય છે, શુક્રકોષોનું સંગ્રહણ એપિડિડાયમિસમાં થાય છે, અને DNA સમારકામ માટે ખાસ ઉત્સેચકો જવાબદાર હોય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "શુક્રજનનની પ્રક્રિયામાં અર્ધસૂત્રીભાજન-II દરમિયાન નીચેનામાંથી કયું પરિવર્તન થતું નથી?", "opts": ["દ્વિતીયક શુક્રકોષોમાંથી શુક્રકોષોનું નિર્માણ", "વર્ણસૂત્રોની સંખ્યામાં ઘટાડો", "જનીનોનું પુનઃસંયોજન (Genetic recombination)", "કોષકેન્દ્રીય દ્રવ્યનું વિભાજન"], "ans": 2, "exp": "અર્ધસૂત્રીભાજન-II દરમિયાન જનીનોનું પુનઃસંયોજન થતું નથી - આ પ્રક્રિયા અર્ધસૂત્રીભાજન-Iના પ્રોફેઝ-I તબક્કામાં થાય છે. અર્ધસૂત્રીભાજન-IIમાં દ્વિતીયક શુક્રકોષોમાંથી શુક્રકોષો બને છે, વર્ણસૂત્રોની સંખ્યા અડધી થતી નથી (પહેલેથી જ અડધી હોય છે), અને કોષકેન્દ્રીય દ્રવ્યનું વિભાજન થાય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "શુક્રજનનની પ્રક્રિયા દરમિયાન નીચેનામાંથી કયો કોષ **અર્ધસૂત્રીભાજન-I** પૂર્ણ કર્યા બાદ તરત જ **અર્ધસૂત્રીભાજન-II** શરૂ કરતો નથી?", "opts": ["પ્રાથમિક શુક્રકોષ (Primary spermatocyte)", "દ્વિતીયક શુક્રકોષ (Secondary spermatocyte)", "શુક્રાણુજનક કોષ (Spermatogonium)", "શુક્રકોષ (Spermatid)"], "ans": 2, "exp": "પ્રાથમિક શુક્રકોષ (Primary spermatocyte) અર્ધસૂત્રીભાજન-I પૂર્ણ કરીને દ્વિતીયક શુક્રકોષ (Secondary spermatocyte) બને છે, જે તરત જ અર્ધસૂત્રીભાજન-II શરૂ કરે છે. શુક્રાણુજનક કોષ (Spermatogonium) અર્ધસૂત્રીભાજન કરતો નથી, તે માત્ર સમસૂત્રીભાજન દ્વારા પ્રાથમિક શુક્રકોષ બનાવે છે. શુક્રકોષ (Spermatid) અર્ધસૂત્રીભાજન પૂર્ણ કરી ચૂક્યો હોય છે, તેથી તે અર્ધસૂત્રીભાજન-II કરતો નથી. આથી સાચો જવાબ વિકલ્પ C છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "શુક્રજનનની પ્રક્રિયામાં **સર્ટોલી કોષો** દ્વારા નીચેનામાંથી કયું કાર્ય **કરવામાં આવતું નથી**?", "opts": ["શુક્રકોષોને પોષણ પૂરું પાડવું", "શુક્રકોષોના પરિપક્વન માટે જરૂરી ઉત્સેચકોનો સ્ત્રાવ કરવો", "ટેસ્ટોસ્ટેરોન હોર્મોનનો સ્ત્રાવ કરવો", "શુક્રકોષોને યાંત્રિક આધાર પૂરો પાડવો"], "ans": 2, "exp": "સર્ટોલી કોષો શુક્રકોષોને પોષણ પૂરું પાડે છે, ઉત્સેચકોનો સ્ત્રાવ કરે છે અને યાંત્રિક આધાર આપે છે, પરંતુ **ટેસ્ટોસ્ટેરોન હોર્મોનનો સ્ત્રાવ લેડિગ કોષો (Leydig cells) દ્વારા થાય છે**, સર્ટોલી કોષો દ્વારા નહીં. આથી સાચો જવાબ વિકલ્પ C છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "શુક્રજનનની પ્રક્રિયામાં **શુક્રકોષના પૂંછડી ભાગ (Flagellum)** નું નિર્માણ કયા કોષીય અંગમાંથી થાય છે?", "opts": ["ગોલ્ગી કાય (Golgi apparatus)", "મિટોકોન્ડ્રિયા (Mitochondria)", "સેન્ટ્રીઓલ (Centriole)", "રિબોઝોમ (Ribosome)"], "ans": 2, "exp": "શુક્રકોષના પૂંછડી ભાગ (Flagellum) નું નિર્માણ **સેન્ટ્રીઓલ (Centriole)** માંથી થાય છે, જે શુક્રકોષની ગતિશીલતા માટે જવાબદાર છે. ગોલ્ગી કાય એક્રોસોમ બનાવે છે, મિટોકોન્ડ્રિયા ઊર્જા પૂરી પાડે છે, અને રિબોઝોમ પ્રોટીન સંશ્લેષણમાં ભાગ લે છે. આથી સાચો જવાબ વિકલ્પ C છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન **શુક્રજનન અને અંડજનન (Oogenesis) વચ્ચેનો મુખ્ય તફાવત** દર્શાવે છે?", "opts": ["શુક્રજનનમાં અર્ધસૂત્રીભાજન-I અને II બંને વૃષણમાં થાય છે, જ્યારે અંડજનનમાં અર્ધસૂત્રીભાજન-II ફલન બાદ થાય છે.", "શુક્રજનનમાં એક પ્રાથમિક શુક્રકોષમાંથી ચાર શુક્રકોષો બને છે, જ્યારે અંડજનનમાં એક પ્રાથમિક અંડકોષમાંથી માત્ર એક અંડકોષ બને છે.", "શુક્રજનનમાં સર્ટોલી કોષો ભાગ લે છે, જ્યારે અંડજનનમાં ગ્રેન્યુલોસા કોષો ભાગ લે છે.", "ઉપરોક્ત તમામ વિધાનો સાચાં છે."], "ans": 3, "exp": "શુક્રજનનમાં અર્ધસૂત્રીભાજન-I અને II બંને વૃષણમાં પૂર્ણ થાય છે, જ્યારે અંડજનનમાં અર્ધસૂત્રીભાજન-II ફલન બાદ પૂર્ણ થાય છે. શુક્રજનનમાં એક પ્રાથમિક શુક્રકોષમાંથી ચાર શુક્રકોષો બને છે, જ્યારે અંડજનનમાં એક પ્રાથમિક અંડકોષમાંથી માત્ર એક અંડકોષ અને ત્રણ ધ્રુવકાય (Polar bodies) બને છે. સર્ટોલી કોષો શુક્રજનનમાં અને ગ્રેન્યુલોસા કોષો અંડજનનમાં ભાગ લે છે. આથી તમામ વિધાનો સાચાં છે અને સાચો જવાબ વિકલ્પ D છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "શુક્રજનનની પ્રક્રિયામાં **શુક્રકોષના શીર્ષ ભાગમાં આવેલું એક્રોસોમ** નીચેનામાંથી કયા કાર્ય માટે જવાબદાર **નથી**?", "opts": ["અંડકોષના પારદર્શક આવરણ (Zona pellucida) ને પચાવવા માટે ઉત્સેચકોનો સ્ત્રાવ કરવો", "શુક્રકોષને ગતિશીલતા પૂરી પાડવી", "ફલન દરમિયાન શુક્રકોષ અને અંડકોષના કોષકેન્દ્રોના સંમિલનમાં મદદ કરવી", "શુક્રકોષને અંડકોષ તરફ આકર્ષિત કરવા માટે રાસાયણિક સંકેતો મુક્ત કરવા"], "ans": 1, "exp": "એક્રોસોમ અંડકોષના પારદર્શક આવરણને પચાવવા માટે ઉત્સેચકોનો સ્ત્રાવ કરે છે, ફલનમાં મદદ કરે છે અને રાસાયણિક સંકેતો મુક્ત કરે છે, પરંતુ **શુક્રકોષની ગતિશીલતા માટે પૂંછડી ભાગ (Flagellum) જવાબદાર છે**, એક્રોસોમ નહીં. આથી સાચો જવાબ વિકલ્પ B છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "શુક્રજનનની પ્રક્રિયા દરમિયાન **સ્પર્મેટિડ (Spermatid)** માંથી **શુક્રકોષ (Spermatozoa)** માં રૂપાંતરણની ક્રિયાને શું કહે છે?", "opts": ["સ્પર્મિઓજિનેસિસ (Spermiogenesis)", "સ્પર્મિએશન (Spermiation)", "સ્પર્મેટોજિનેસિસ (Spermatogenesis)", "સ્પર્મેટોસાઇટોજિનેસિસ (Spermatocytogenesis)"], "ans": 0, "exp": "સ્પર્મિઓજિનેસિસ એ સ્પર્મેટિડમાંથી શુક્રકોષમાં રૂપાંતરણની ક્રિયા છે, જેમાં શુક્રકોષનું શીર્ષ, મધ્ય ભાગ અને પૂંછડીનું નિર્માણ થાય છે. **સ્પર્મિએશન** એ શુક્રકોષનું સર્ટોલી કોષોમાંથી મુક્ત થવાની ક્રિયા છે, જ્યારે **સ્પર્મેટોજિનેસિસ** એ સમગ્ર શુક્રજનન પ્રક્રિયાને દર્શાવે છે. **સ્પર્મેટોસાઇટોજિનેસિસ** એ પ્રાથમિક અને દ્વિતીયક શુક્રકોષોના નિર્માણની ક્રિયા છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "શુક્રજનનની પ્રક્રિયામાં **સર્ટોલી કોષો** દ્વારા **એન્ડ્રોજન બાઇન્ડિંગ પ્રોટીન (ABP)** નું સ્રાવ થાય છે. આ પ્રોટીનનું મુખ્ય કાર્ય શું છે?", "opts": ["શુક્રકોષના શીર્ષ ભાગમાં એક્રોસોમનું નિર્માણ કરવું", "શુક્રપિંડમાં ટેસ્ટોસ્ટેરોનનું સાંદ્રણ વધારવું", "શુક્રકોષના પૂંછડી ભાગનું નિર્માણ કરવું", "શુક્રકોષોને પોષણ આપવું"], "ans": 1, "exp": "**એન્ડ્રોજન બાઇન્ડિંગ પ્રોટીન (ABP)** શુક્રપિંડમાં ટેસ્ટોસ્ટેરોનનું સાંદ્રણ વધારવામાં મદદ કરે છે, જે શુક્રજનન માટે જરૂરી છે. **શુક્રકોષના શીર્ષ ભાગમાં એક્રોસોમનું નિર્માણ** ગોલ્ગી કાય દ્વારા થાય છે, **પૂંછડીનું નિર્માણ** સેન્ટ્રીઓલ દ્વારા થાય છે, અને **પોષણ આપવું** એ સર્ટોલી કોષોનું એક કાર્ય છે, પરંતુ તે ABP સાથે સંકળાયેલ નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "શુક્રજનનની પ્રક્રિયામાં **અર્ધસૂત્રીભાજન-I** દરમિયાન **સિનેપ્ટોનેમલ કોમ્પ્લેક્સ (Synaptonemal Complex)** નું નિર્માણ કયા તબક્કામાં થાય છે?", "opts": ["લેપ્ટોટીન (Leptotene)", "ઝાયગોટીન (Zygotene)", "પેકીટેન (Pachytene)", "ડિપ્લોટીન (Diplotene)"], "ans": 1, "exp": "**સિનેપ્ટોનેમલ કોમ્પ્લેક્સ** નું નિર્માણ **ઝાયગોટીન** તબક્કામાં થાય છે, જેમાં સમજાત વર્ણસૂત્રો એકબીજા સાથે જોડાય છે. **લેપ્ટોટીન** તબક્કામાં વર્ણસૂત્રો દૃશ્યમાન થાય છે, **પેકીટેન** તબક્કામાં ક્રોસિંગ ઓવર થાય છે, અને **ડિપ્લોટીન** તબક્કામાં સિનેપ્ટોનેમલ કોમ્પ્લેક્સ વિઘટિત થાય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન **શુક્રજનનની પ્રક્રિયા માટે ખોટું છે**?", "opts": ["શુક્રજનનની પ્રક્રિયા **શુક્રપિંડના સેમિનિફેરસ નલિકાઓ** માં થાય છે.", "**સ્પર્મેટોગોનિયા** નું વિભાજન માત્ર અર્ધસૂત્રીભાજન દ્વારા થાય છે.", "**સ્પર્મેટિડ** માંથી શુક્રકોષમાં રૂપાંતરણ **સ્પર્મિઓજિનેસિસ** કહેવાય છે.", "**સર્ટોલી કોષો** શુક્રકોષોને પોષણ અને આધાર આપે છે."], "ans": 1, "exp": "**સ્પર્મેટોગોનિયા** નું વિભાજન **સમસૂત્રીભાજન (Mitosis)** દ્વારા થાય છે, જ્યારે અર્ધસૂત્રીભાજન પ્રાથમિક શુક્રકોષોમાં થાય છે. બાકીના વિધાનો સાચાં છે: શુક્રજનન શુક્રપિંડના સેમિનિફેરસ નલિકાઓમાં થાય છે, સ્પર્મિઓજિનેસિસ એ સ્પર્મેટિડમાંથી શુક્રકોષમાં રૂપાંતરણ છે, અને સર્ટોલી કોષો શુક્રકોષોને પોષણ આપે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "શુક્રજનનની પ્રક્રિયામાં **શુક્રકોષના મધ્ય ભાગ (Middle Piece)** માં આવેલા **માઇટોકોન્ડ્રિયા** નું મુખ્ય કાર્ય શું છે?", "opts": ["શુક્રકોષના શીર્ષ ભાગમાં એક્રોસોમ માટે ઉત્સેચકોનું ઉત્પાદન કરવું", "શુક્રકોષની ગતિશીલતા માટે જરૂરી ATP ઉર્જા પૂરી પાડવી", "શુક્રકોષના DNAનું રક્ષણ કરવું", "શુક્રકોષને પોષણ આપવું"], "ans": 1, "exp": "**માઇટોકોન્ડ્રિયા** શુક્રકોષની ગતિશીલતા માટે જરૂરી **ATP ઉર્જા** પૂરી પાડે છે, જે શુક્રકોષને અંડકોષ સુધી પહોંચવામાં મદદ કરે છે. **એક્રોસોમ માટે ઉત્સેચકોનું ઉત્પાદન** ગોલ્ગી કાય દ્વારા થાય છે, **DNAનું રક્ષણ** કોષકેન્દ્ર દ્વારા થાય છે, અને **પોષણ આપવું** એ સર્ટોલી કોષોનું કાર્ય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "શુક્રજનનની પ્રક્રિયા દરમિયાન, **લેપ્ટોટીન (Leptotene)** તબક્કામાં નીચેનામાંથી કયું પરિવર્તન જોવા મળતું નથી?", "opts": ["વર્ણસૂત્રોનું સંકોચન અને દૃશ્યમાનતા", "વર્ણસૂત્રોના હોમોલોગસ જોડી બનવાનું શરૂ થવું", "વર્ણસૂત્રો પર રેકોમ્બિનેશન નોડ્યુલ્સનું નિર્માણ", "કોષકેન્દ્રીય કવચનું વિઘટન"], "ans": 2, "exp": "લેપ્ટોટીન તબક્કામાં વર્ણસૂત્રો સંકોચાય છે અને દૃશ્યમાન બને છે (A સત્ય), હોમોલોગસ વર્ણસૂત્રો જોડાવાનું શરૂ થાય છે (B સત્ય), અને કોષકેન્દ્રીય કવચ વિઘટિત થાય છે (D સત્ય). પરંતુ રેકોમ્બિનેશન નોડ્યુલ્સનું નિર્માણ **ઝાયગોટીન (Zygotene)** તબક્કામાં થાય છે, લેપ્ટોટીનમાં નહીં. આથી C ખોટું છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "શુક્રજનન દરમિયાન, **સેકન્ડરી સ્પર્મેટોસાઇટ (Secondary Spermatocyte)** ની અર્ધસૂત્રીભાજન-II પૂર્ણ થતાં કયા કોષોનું નિર્માણ થાય છે?", "opts": ["બે સરખા સ્પર્મેટિડ (Spermatids)", "એક સ્પર્મેટિડ અને એક પોલર બોડી", "ચાર સ્પર્મેટિડ", "એક સ્પર્મેટોસાઇટ અને એક સ્પર્મેટિડ"], "ans": 0, "exp": "સેકન્ડરી સ્પર્મેટોસાઇટ (n) અર્ધસૂત્રીભાજન-II દ્વારા વિભાજિત થઈ **બે સરખા હેપ્લોઇડ સ્પર્મેટિડ (n)** ઉત્પન્ન કરે છે. અંડજનનમાં પોલર બોડી બને છે, પરંતુ શુક્રજનનમાં એવું થતું નથી (B ખોટું). ચાર સ્પર્મેટિડ અર્ધસૂત્રીભાજન-I અને II બંનેમાંથી બને છે, પરંતુ સેકન્ડરી સ્પર્મેટોસાઇટમાંથી માત્ર બે બને છે (C ખોટું). D વિકલ્પ અર્ધસૂત્રીભાજનની પ્રક્રિયા સાથે સુસંગત નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "શુક્રજનનની પ્રક્રિયામાં, **એક્રોસોમલ કેપ (Acrosomal Cap)** નું નિર્માણ કયા કોષીય અંગ સાથે સંકળાયેલું છે?", "opts": ["ગોલ્ગી ઉપકરણ", "માઇટોકોન્ડ્રિયા", "એન્ડોપ્લાઝમિક જાળક", "લાઇસોઝોમ"], "ans": 0, "exp": "એક્રોસોમલ કેપ **ગોલ્ગી ઉપકરણ**માંથી વિકસે છે, જ્યાં તે એન્ઝાઇમો (જેમ કે હાયલ્યુરોનિડેઝ) ધરાવતું એક્રોસોમ ગ્રેન્યુલ બને છે. માઇટોકોન્ડ્રિયા શુક્રકોષના મધ્ય ભાગમાં ઉર્જા પૂરી પાડે છે (B ખોટું). એન્ડોપ્લાઝમિક જાળક અને લાઇસોઝોમ એક્રોસોમના નિર્માણ સાથે સીધો સંબંધ function renderQ(){

  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';

    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}

  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
