<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anthropoids</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Anthropoids</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Anthropoids</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "અન્ય મનુષ્યવંશી (Anthropoids) પ્રાણીઓની તુલનામાં માનવીના મગજના કયા ભાગનો વિકાસ સૌથી વધુ પ્રમાણમાં થયો છે, જેને કારણે જટિલ ચિંતન અને ભાષા વિકસિત થઈ શકી?", "opts": ["મેદુલા ઓબ્લોંગેટા (Medulla Oblongata)", "સેરેબેલમ (Cerebellum)", "સેરેબ્રલ કોર્ટેક્સ (Cerebral Cortex)", "હાઇપોથેલેમસ (Hypothalamus)"], "ans": 2, "exp": "માનવીના મગજમાં સેરેબ્રલ કોર્ટેક્સ (Cerebral Cortex)નો વિકાસ સૌથી વધુ થયો છે, જે જટિલ ચિંતન, ભાષા, અને સ્મૃતિ જેવી ઉચ્ચ ક્રિયાઓ માટે જવાબદાર છે. મેદુલા ઓબ્લોંગેટા (A) શ્વસન અને હૃદયના ધબકારા જેવી મૂળભૂત ક્રિયાઓ નિયંત્રિત કરે છે, સેરેબેલમ (B) સંતુલન અને હલનચલન માટે જવાબદાર છે, જ્યારે હાઇપોથેલેમસ (D) હોર્મોનલ નિયંત્રણ અને તાપમાન નિયમન કરે છે. આમાંથી સેરેબ્રલ કોર્ટેક્સ જ માનવીની જટિલ બૌદ્ધિક ક્ષમતાઓ માટે મુખ્ય છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "હોમિનિડ (Hominidae) કુટુંબમાં માનવી અને ચિમ્પાન્ઝી વચ્ચેનો સૌથી નિકટનો સાપેક્ષ કયો છે, અને તે કયા જનીન અભ્યાસ દ્વારા સિદ્ધ થયો છે?", "opts": ["ગોરિલા, માઇટોકોન્ડ્રિયલ DNA અભ્યાસ", "બોનોબો, Y-વર્ણસૂત્ર અભ્યાસ", "ઓરેંગુટાન, રાઇબોઝોમલ RNA અભ્યાસ", "ચિમ્પાન્ઝી, DNA-DNA હાઇબ્રિડાઇઝેશન અભ્યાસ"], "ans": 3, "exp": "માનવી અને ચિમ્પાન્ઝી વચ્ચેનો જનીન સમાનતા સૌથી વધુ (લગભગ 98.7%) હોવાથી તે સૌથી નિકટનો સાપેક્ષ છે. આ સિદ્ધાંત DNA-DNA હાઇબ્રિડાઇઝેશન અભ્યાસ દ્વારા મળેલા પુરાવાઓ પર આધારિત છે. ગોરિલા (A) અને ઓરેંગુટાન (C) માનવી કરતાં વધુ દૂરના સાપેક્ષ છે, જ્યારે બોનોબો (B) ચિમ્પાન્ઝીની જાતિ છે પરંતુ Y-વર્ણસૂત્ર અભ્યાસ માનવી અને ચિમ્પાન્ઝી વચ્ચેના સંપર્ક માટે સૌથી સ્પષ્ટ પુરાવો પૂરો પાડતો નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "માનવીના હાથમાં અંગૂઠાનું વિકાસ કયા ઉત્ક્રાંતિક લાભ માટે થયું હશે, જે અન્ય અન્ય મનુષ્યવંશી પ્રાણીઓમાં ઓછું વિકસિત જોવા મળે છે?", "opts": ["ચાલવાની ગતિ વધારવા", "વસ્તુઓને પકડી રાખવા અને સચોટ હલનચલન માટે", "શરીરના તાપમાનને નિયંત્રિત કરવા", "શ્વસન ક્ષમતા વધારવા"], "ans": 1, "exp": "માનવીના હાથમાં અંગૂઠાનું વિકાસ મુખ્યત્વે વસ્તુઓને પકડી રાખવા અને સચોટ હલનચલન (પ્રિસિઝન ગ્રિપ) માટે થયું છે, જે સાધનોના ઉપયોગ અને જટિલ કૌશલ્ય વિકસાવવામાં મદદરૂપ થયું છે. ચાલવાની ગતિ (A) અંગૂઠા સાથે સીધો સંબંધ ધરાવતો નથી, શરીરના તાપમાન નિયંત્રણ (C) અને શ્વસન ક્ષમતા (D) પણ અંગૂઠાના વિકાસ સાથે સંબંધિત નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ઓસ્ટ્રેલોપિથેકસ (Australopithecus) અને હોમો (Homo) વચ્ચેનો મુખ્ય તફાવત કયો છે, જે માનવીની ઉત્ક્રાંતિમાં મહત્વપૂર્ણ પગલું ગણવામાં આવે છે?", "opts": ["ઓસ્ટ્રેલોપિથેકસમાં મગજનું કદ હોમો કરતાં મોટું હતું", "હોમોમાં સાધનોનો ઉપયોગ કરવાની ક્ષમતા વિકસિત થઈ હતી", "ઓસ્ટ્રેલોપિથેકસ દ્વિપાદી (Bipedal) નહોતા", "હોમોમાં દાંતની રચના ઓસ્ટ્રેલોપિથેકસ કરતાં વધુ પ્રાચીન હતી"], "ans": 1, "exp": "હોમો જાતિમાં સાધનોનો ઉપયોગ કરવાની ક્ષમતા વિકસિત થઈ હતી, જે માનવીની ઉત્ક્રાંતિમાં મહત્વપૂર્ણ પગલું ગણવામાં આવે છે. ઓસ્ટ્રેલોપિથેકસમાં મગજનું કદ હોમો કરતાં નાનું હતું (A), ઓસ્ટ્રેલોપિથેકસ દ્વિપાદી હતા (C), અને હોમોમાં દાંતની રચના વધુ આધુનિક હતી (D).", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "માનવી અને અન્ય મનુષ્યવંશી પ્રાણીઓ (જેમ કે ચિમ્પાન્ઝી) વચ્ચેના વર્ણસૂત્રીય (Chromosomal) તફાવતમાં કયું વર્ણસૂત્ર સૌથી મહત્વપૂર્ણ ભૂમિકા ભજવે છે?", "opts": ["વર્ણસૂત્ર 21", "વર્ણસૂત્ર 2", "વર્ણસૂત્ર X", "વર્ણસૂત્ર Y"], "ans": 1, "exp": "માનવી અને ચિમ્પાન્ઝી વચ્ચે વર્ણસૂત્ર 2 પર થયેલી ફ્યુઝન (જોડાણ) ઘટના સૌથી મહત્વપૂર્ણ છે. ચિમ્પાન્ઝીમાં વર્ણસૂત્ર 12 અને 13 અલગ હોય છે, જ્યારે માનવીમાં તે વર્ણસૂત્ર 2 તરીકે જોડાયેલું છે. વર્ણસૂત્ર 21 (A), X (C), અને Y (D) આ તફાવત માટે જવાબદાર નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "માનવી (Homo sapiens) અને બોનોબો (Pan paniscus) વચ્ચેના ઉત્ક્રાંતિક સંબંધને લગતી નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["બોનોબો અને ચિમ્પાન્ઝી (Pan troglodytes) એ માનવી કરતાં વધુ નજીકના સાપેક્ષ છે, કારણ કે તેમના DNAમાં 99.6% સમાનતા છે.", "માનવી અને બોનોબો વચ્ચેનો સાપેક્ષ સંબંધ ચિમ્પાન્ઝી કરતાં વધુ નજીક છે, કારણ કે બોનોબોમાં માનવી જેવી સામાજિક રચના જોવા મળે છે.", "માનવી, બોનોબો અને ચિમ્પાન્ઝી એ ત્રણેય હોમિનિડ (Hominidae) કુટુંબના સભ્યો છે, પરંતુ માનવી અને બોનોબો વચ્ચેનો સાપેક્ષ સંબંધ ચિમ્પાન્ઝી કરતાં ઓછો નજીક છે.", "બોનોબો અને માનવી વચ્ચેનો સાપેક્ષ સંબંધ ચિમ્પાન્ઝી કરતાં વધુ નજીક છે, કારણ કે બોનોબોમાં માનવી જેવી મગજની જટિલતા જોવા મળે છે."], "ans": 2, "exp": "સાચું વિધાન C છે. માનવી, બોનોબો અને ચિમ્પાન્ઝી એ ત્રણેય હોમિનિડ કુટુંબના સભ્યો છે, પરંતુ ઉત્ક્રાંતિક અભ્યાસો દર્શાવે છે કે માનવી અને ચિમ્પાન્ઝી (Pan troglodytes) વચ્ચેનો સાપેક્ષ સંબંધ બોનોબો (Pan paniscus) કરતાં વધુ નજીક છે. બોનોબો અને ચિમ્પાન્ઝી વચ્ચેનો સંબંધ માનવી કરતાં વધુ નજીક છે, પરંતુ માનવી અને બોનોબો વચ્ચેનો સંબંધ ચિમ્પાન્ઝી કરતાં ઓછો નજીક છે. A, B, અને D વિધાનો ખોટા છે કારણ કે તેઓ ઉત્ક્રાંતિક સંબંધોને ખોટી રીતે રજૂ કરે છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "હોમિનોઇડ (Hominoids) જૂથમાં કયા પ્રાણીને 'લેસર એપ' (Lesser Ape) તરીકે વર્ગીકૃત કરવામાં આવે છે?", "opts": ["ગોરિલા (Gorilla gorilla)", "ઓરેંગુટાન (Pongo pygmaeus)", "ગિબ્બન (Hylobates)", "ચિમ્પાન્ઝી (Pan troglodytes)"], "ans": 2, "exp": "સાચો જવાબ C છે. ગિબ્બન (Hylobates) એ 'લેસર એપ' તરીકે ઓળખાય છે, કારણ કે તે હોમિનોઇડ જૂથમાં સૌથી નાનું અને હલકું વજન ધરાવતું પ્રાણી છે. ગોરિલા, ઓરેંગુટાન અને ચિમ્પાન્ઝી એ 'ગ્રેટ એપ' તરીકે વર્ગીકૃત કરવામાં આવે છે, કારણ કે તેઓ કદમાં મોટા અને વજનમાં ભારે હોય છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "માનવીના ઉત્ક્રાંતિક ઇતિહાસમાં, કયા પ્રાચીન માનવી પ્રજાતિએ પ્રથમ વખત અગ્નિનો ઉપયોગ કર્યો હોવાનું મનાય છે?", "opts": ["હોમો હેબિલિસ (Homo habilis)", "હોમો ઇરેક્ટસ (Homo erectus)", "હોમો નિયાન્ડરથેલેન્સિસ (Homo neanderthalensis)", "હોમો સેપિયન્સ (Homo sapiens)"], "ans": 1, "exp": "સાચો જવાબ B છે. હોમો ઇરેક્ટસ (Homo erectus) એ પ્રથમ પ્રજાતિ હોવાનું મનાય છે જેને અગ્નિનો ઉપયોગ કરવાની ક્ષમતા હતી. આ પ્રજાતિએ લગભગ 1.5 મિલિયન વર્ષ પહેલા અગ્નિનો ઉપયોગ શરૂ કર્યો હોવાનું મનાય છે. હોમો હેબિલિસ એ પથ્થરના હથિયારોનો ઉપયોગ કરતી હતી, પરંતુ અગ્નિનો ઉપયોગ કરતી નહીં. હોમો નિયાન્ડરથેલેન્સિસ અને હોમો સેપિયન્સ એ પછીના કાળમાં અગ્નિનો ઉપયોગ કરતી હતી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન હોમિનિડ (Hominidae) અને હાયલોબેટિડી (Hylobatidae) કુટુંબ વચ્ચેના તફાવતને સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["હાયલોબેટિડી કુટુંબના પ્રાણીઓમાં પૂંછડી હાજર હોય છે, જ્યારે હોમિનિડ કુટુંબના પ્રાણીઓમાં પૂંછડી હાજર નથી.", "હોમિનિડ કુટુંબના પ્રાણીઓમાં મગજનું કદ હાયલોબેટિડી કુટુંબના પ્રાણીઓ કરતાં મોટું હોય છે.", "હાયલોબેટિડી કુટુંબના પ્રાણીઓમાં દાંતની સંખ્યા હોમિનિડ કુટુંબના પ્રાણીઓ કરતાં ઓછી હોય છે.", "હોમિનિડ કુટુંબના પ્રાણીઓમાં હાથની આંગળીઓ હાયલોબેટિડી કુટુંબના પ્રાણીઓ કરતાં લાંબી હોય છે."], "ans": 1, "exp": "સાચો જવાબ B છે. હોમિનિડ કુટુંબના પ્રાણીઓ (જેમ કે માનવી, ચિમ્પાન્ઝી, ગોરિલા)માં મગજનું કદ હાયલોબેટિડી કુટુંબના પ્રાણીઓ (જેમ કે ગિબ્બન) કરતાં મોટું હોય છે. A ખોટું છે કારણ કે હાયલોબેટિડી કુટુંબના પ્રાણીઓમાં પૂંછડી હાજર નથી. C ખોટું છે કારણ કે દાંતની સંખ્યા બંનેમાં સમાન હોય છે. D ખોટું છે કારણ કે હાથની આંગળીઓની લંબાઈ બંનેમાં સમાન જ હોય છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "માનવી અને ચિમ્પાન્ઝી વચ્ચેના ઉત્ક્રાંતિક તફાવતને લગતી નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["માનવીના મગજનું કદ ચિમ્પાન્ઝી કરતાં ત્રણ ગણું મોટું છે.", "માનવીના હાથમાં અંગૂઠો ચિમ્પાન્ઝી કરતાં વધુ વિકસિત છે, જે સુચક આંગળી સાથે સંપર્ક કરે છે.", "માનવી અને ચિમ્પાન્ઝી વચ્ચેના DNAમાં 98.7% સમાનતા છે.", "ચિમ્પાન્ઝી માનવી કરતાં વધુ શાકાહારી હોય છે."], "ans": 3, "exp": "સાચો જવાબ D છે. ચિમ્પાન્ઝી માનવી કરતાં ઓછા શાકાહારી હોય છે, કારણ કે તેઓ માંસ પણ ખાય છે. A સાચું છે કારણ કે માનવીના મગજનું કદ ચિમ્પાન્ઝી કરતાં ત્રણ ગણું મોટું છે. B સાચું છે કારણ કે માનવીના હાથમાં અંગૂઠો ચિમ્પાન્ઝી કરતાં વધુ વિકસિત છે. C સાચું છે કારણ કે માનવી અને ચિમ્પાન્ઝી વચ્ચેના DNAમાં લગભગ 98.7% સમાનતા છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "નીચેનામાંથી કયા મનુષ્યવંશી (Anthropoid) પ્રાણીમાં 'સેક્સુઅલ ડાયમોર્ફિઝમ' (લિંગી દ્વિરૂપતા) સૌથી ઓછું જોવા મળે છે, જે તેમની સામાજિક રચના સાથે સંકળાયેલું છે?", "opts": ["ગોરિલા (Gorilla gorilla)", "ઓરેંગુટાન (Pongo pygmaeus)", "બોનોબો (Pan paniscus)", "ચિમ્પાન્ઝી (Pan troglodytes)"], "ans": 2, "exp": "બોનોબો (Pan paniscus)માં લિંગી દ્વિરૂપતા (Sexual dimorphism) સૌથી ઓછું જોવા મળે છે, કારણ કે તેમની સામાજિક રચના માદા-પ્રધાન (matriarchal) અને શાંતિપૂર્ણ હોય છે, જ્યાં લિંગી સ્પર્ધા ઓછી હોય છે. ગોરિલા અને ઓરેંગુટાનમાં નરો કદમાં મોટા હોય છે, જ્યારે ચિમ્પાન્ઝીમાં નરો અને માદા વચ્ચે કદનો તફાવત જોવા મળે છે, પરંતુ બોનોબોમાં આ તફાવત નગણ્ય હોય છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન હોમિનોઇડ (Hominoids) અને સેરકોપિથેકોઇડ (Cercopithecoids) વચ્ચેના મુખ્ય તફાવતને સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["હોમિનોઇડમાં પૂંછડી હાજર હોય છે, જ્યારે સેરકોપિથેકોઇડમાં નહીં", "હોમિનોઇડમાં મગજનો આકાર ગોળાકાર હોય છે, જ્યારે સેરકોપિથેકોઇડમાં લંબગોળ હોય છે", "હોમિનોઇડમાં કાનના પિના (Pinna) મોટા હોય છે, જ્યારે સેરકોપિથેકોઇડમાં નાના હોય છે", "હોમિનોઇડમાં દાંતની સંરચના 2/1/2/3 હોય છે, જ્યારે સેરકોપિથેકોઇડમાં 2/1/3/3 હોય છે"], "ans": 1, "exp": "હોમિનોઇડ (Hominoids)માં મગજનો આકાર ગોળાકાર હોય છે, જ્યારે સેરકોપિથેકોઇડ (Cercopithecoids)માં લંબગોળ હોય છે. હોમિનોઇડમાં પૂંછડી હાજર નથી હોતી (વિધાન A ખોટું), કાનના પિનાનો આકાર લક્ષણ નથી (વિધાન C ખોટું), અને દાંતની સંરચના બંનેમાં સમાન હોય છે (વિધાન D ખોટું).", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "નીચેનામાંથી કયા મનુષ્યવંશી પ્રાણીમાં 'ક્નકલ વોકિંગ' (Knuckle-walking) જોવા મળે છે, જે તેમની ચાલવાની શૈલી સાથે સંકળાયેલું છે?", "opts": ["ગિબન (Hylobates)", "ઓરેંગુટાન (Pongo pygmaeus)", "ગોરિલા (Gorilla gorilla) અને ચિમ્પાન્ઝી (Pan troglodytes)", "બોનોબો (Pan paniscus)"], "ans": 2, "exp": "ગોરિલા (Gorilla gorilla) અને ચિમ્પાન્ઝી (Pan troglodytes)માં 'ક્નકલ વોકિંગ' (Knuckle-walking) જોવા મળે છે, જ્યાં તેઓ હાથની કોણી પર ચાલે છે. ગિબન (Hylobates) બ્રેકિયેશન (Brachiation) દ્વારા ચાલે છે, ઓરેંગુટાન (Pongo pygmaeus) હાથ અને પગ બOTHનો ઉપયોગ કરે છે, અને બોનોબો (Pan paniscus) બાયપેડલ (Bipedal) ચાલવાનું પસંદ કરે છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન હોમિનિડ (Hominidae) કુટુંબના પ્રાણીઓ માટે ખોટું છે?", "opts": ["હોમિનિડમાં મગજનો કદ સરેરાશ 400 સી.સી.થી વધુ હોય છે", "હોમિનિડમાં પૂંછડી હાજર હોય છે", "હોમિનિડમાં દાંતની સંરચના 2/1/2/3 હોય છે", "હોમિનિડમાં કંઠસ્થાન (Larynx) નીચે સ્થિત હોય છે, જે બોલવાની ક્ષમતા સાથે સંકળાયેલું છે"], "ans": 1, "exp": "હોમિનિડ (Hominidae) કુટુંબના પ્રાણીઓમાં પૂંછડી હાજર નથી હોતી (વિધાન B ખોટું). મગજનો કદ 400 સી.સી.થી વધુ હોય છે (વિધાન A સાચું), દાંતની સંરચના 2/1/2/3 હોય છે (વિધાન C સાચું), અને કંઠસ્થાન (Larynx) નીચે સ્થિત હોય છે, જે બોલવાની ક્ષમતા સાથે સંકળાયેલું છે (વિધાન D સાચું).", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "નીચેનામાંથી કયા મનુષ્યવંશી પ્રાણીમાં 'ફિશન-ફ્રૂટ ઇકોલોજી' (Fission-Fruit Ecology) જોવા મળે છે, જે તેમની ખોરાક શોધવાની રણનીતિ સાથે સંકળાયેલું છે?", "opts": ["ગોરિલા (Gorilla gorilla)", "ચિમ્પાન્ઝી (Pan troglodytes)", "ઓરેંગુટાન (Pongo pygmaeus)", "બોનોબો (Pan paniscus)"], "ans": 1, "exp": "ચિમ્પાન્ઝી (Pan troglodytes)માં 'ફિશન-ફ્રૂટ ઇકોલોજી' (Fission-Fruit Ecology) જોવા મળે છે, જ્યાં તેઓ ફળોની શોધમાં નાના જૂથમાં વિભાજિત થાય છે. ગોરિલા (Gorilla gorilla) મુખ્યત્વે શાકાહારી હોય છે, ઓરેંગુટાન (Pongo pygmaeus) એકાંત પ્રાણી હોય છે, અને બોનોબો (Pan paniscus) સામાજિક રીતે સક્રિય હોય છે પરંતુ ફિશન-ફ્રૂટ ઇકોલોજી સાથે સંકળાયેલા નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "નીચેનામાંથી કયા મનુષ્યવંશી (Anthropoid) પ્રાણીમાં 'બ્રેકિયેશન' (Brachiation) પદ્ધતિ દ્વારા ચાલવાનું પ્રમાણ સૌથી વધુ જોવા મળે છે?", "opts": ["ગોરિલા (Gorilla gorilla)", "ઓરેંગુટાન (Pongo pygmaeus)", "ચિમ્પાન્ઝી (Pan troglodytes)", "જીબ્રોન (Hylobates lar)"], "ans": 3, "exp": "જીબ્રોન (Hylobates lar) એ 'લેસર એપ' (Lesser Ape) તરીકે વર્ગીકૃત થાય છે અને તે બ્રેકિયેશન (હાથ વડે ઝાડની ડાળીઓ પર લટકીને ચાલવું) પદ્ધતિનો સૌથી વધુ ઉપયોગ કરે છે. ગોરિલા, ઓરેંગુટાન અને ચિમ્પાન્ઝી મુખ્યત્વે ક્નકલ વોકિંગ અથવા ચાર પગે ચાલવાનો ઉપયોગ કરે છે. ગોરિલા અને ઓરેંગુટાન મોટાભાગે જમીન પર ચાલે છે, જ્યારે ચિમ્પાન્ઝી ક્નકલ વોકિંગ અને બ્રેકિયેશન બંનેનો ઉપયોગ કરે છે, પરંતુ જીબ્રોનની જેમ સતત નહીં.", "ref": "Std 12 - અધ્યાય 7: માનવ ઉત્ક્રાંતિ અને અન્ય મનુષ્યવંશી પ્રાણીઓ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન હોમિનોઇડ (Hominoids) અને સીબમર્ફી (Cebidae) કુટુંબ વચ્ચેના તફાવતને સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["હોમિનોઇડમાં પૂંછડી હાજર નથી, જ્યારે સીબમર્ફીમાં પૂંછડી હાજર છે", "હોમિનોઇડમાં મગજનું કદ સીબમર્ફી કરતાં નાનું છે", "હોમિનોઇડમાં દાંતની સંરચના સીબમર્ફી કરતાં સરળ છે", "હોમિનોઇડમાં નાકની રચના સીબમર્ફી કરતાં વધુ વિકસિત છે"], "ans": 0, "exp": "હોમિનોઇડ (Hominoids) એટલે એપ્સ (apes) જેમાં પૂંછડી હાજર નથી, જ્યારે સીબમર્ફી (Cebidae) કુટુંબના પ્રાણીઓ (જેમ કે ન્યૂ વર્લ્ડ મંકી) પાસે પૂંછડી હાજર છે. મગજનું કદ હોમિનોઇડમાં સીબમર્ફી કરતાં મોટું છે. દાંતની સંરચના હોમિનોઇડમાં વધુ જટિલ છે, અને નાકની રચના સીબમર્ફીમાં વધુ વિકસિત હોઈ શકે છે, પરંતુ આ તફાવત સૌથી મહત્વપૂર્ણ નથી.", "ref": "Std 12 - અધ્યાય 7: માનવ ઉત્ક્રાંતિ અને અન્ય મનુષ્યવંશી પ્રાણીઓ", "ch": ""}, {"q": "નીચેનામાંથી કયા મનુષ્યવંશી પ્રાણીમાં 'સોલિટરી' (એકલા) જીવનશૈલી અપનાવવામાં આવે છે?", "opts": ["ચિમ્પાન્ઝી (Pan troglodytes)", "બોનોબો (Pan paniscus)", "ઓરેંગુટાન (Pongo pygmaeus)", "ગોરિલા (Gorilla gorilla)"], "ans": 2, "exp": "ઓરેંગુટાન (Pongo pygmaeus) એ એકમાત્ર મહાન એપ (Great Ape) છે જે 'સોલિટરી' જીવનશૈલી અપનાવે છે, એટલે કે તે એકલા જીવે છે. ચિમ્પાન્ઝી, બોનોબો અને ગોરિલા સમાજિક પ્રાણીઓ છે અને જૂથમાં જીવે છે.", "ref": "Std 12 - અધ્યાય 7: માનવ ઉત્ક્રાંતિ અને અન્ય મનુષ્યવંશી પ્રાણીઓ", "ch": ""}, {"q": "નીચેનામાંથી કયા મનુષ્યવંશી પ્રાણીમાં 'ટૂલ યુઝ' (સાધનનો ઉપયોગ) સૌથી ઓછો જોવા મળે છે?", "opts": ["ચિમ્પાન્ઝી (Pan troglodytes)", "ઓરેંગુટાન (Pongo pygmaeus)", "ગોરિલા (Gorilla gorilla)", "બોનોબો (Pan paniscus)"], "ans": 2, "exp": "ગોરિલા (Gorilla gorilla) એ મનુષ્યવંશી પ્રાણીઓમાં 'ટૂલ યુઝ' (સાધનનો ઉપયોગ) સૌથી ઓછો જોવા મળે છે. ચિમ્પાન્ઝી અને બોનોબો તો સાધનનો ઉપયોગ કરવા માટે જાણીતા છે, જ્યારે ઓરેંગુટાન પણ કેટલાક પ્રસંગોમાં સાધનનો ઉપયોગ કરે છે, પરંતુ ગોરિલા એવા પ્રસંગો ખૂબ જ ઓછા છે.", "ref": "Std 12 - અધ્યાય 7: માનવ ઉત્ક્રાંતિ અને અન્ય મનુષ્યવંશી પ્રાણીઓ", "ch": ""}, {"q": "નીચેનામાંથી કયા મનુષ્યવંશી (Anthropoid) પ્રાણીમાં 'ઇસોસેફાલી ઇન્ડેક્સ' (Isocephaly Index) સૌથી નીચો જોવા મળે છે, જે તેમના મગજના આકાર અને કદને લગતી ઉત્ક્રાંતિક લાક્ષણિકતા દર્શાવે છે?", "opts": ["હોમો સેપિયન્સ (Homo sapiens)", "પાન ટ્રોગ્લોડાઇટ્સ (Pan troglodytes - ચિમ્પાન્ઝી)", "ગોરિલા ગોરિલા (Gorilla gorilla)", "પોંગો પાયગ્મેઇ (Pongo pygmaeus - ઓરેંગુટાન)"], "ans": 3, "exp": "ઇસોસેફાલી ઇન્ડેક્સ મગજના કદ અને આકારનો અભ્યાસ કરે છે. ઓરેંગુટાન (Pongo pygmaeus)માં આ ઇન્ડેક્સ સૌથી નીચો હોય છે કારણ કે તેમના મગજનો આકાર લંબગોળ (elongated) અને સાંકડો હોય છે, જ્યારે માનવી (A)માં ગોળાકાર અને વિકસિત હોય છે. ચિમ્પાન્ઝી (B) અને ગોરિલા (C)માં આ ઇન્ડેક્સ માનવી કરતાં ઓછો પરંતુ ઓરેંગુટાન કરતાં વધુ હોય છે. આ તફાવત ઉત્ક્રાંતિ દરમિયાન મગજના વિકાસને દર્શાવે છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}];

function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;

  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
