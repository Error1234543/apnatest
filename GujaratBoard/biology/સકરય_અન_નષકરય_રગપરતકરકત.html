<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>સક્રિય અને નિષ્ક્રિય રોગપ્રતિકારકતા</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>સક્રિય અને નિષ્ક્રિય રોગપ્રતિકારકતા</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">સક્રિય અને નિષ્ક્રિય રોગપ્રતિકારકતા</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "જ્યારે એલર્જીની પ્રતિક્રિયા થાય છે, ત્યારે શરીરમાં કયા પ્રકારના એન્ટીબોડીનું સ્તર અચાનક વધી જાય છે, જે હિસ્ટામિનના મુક્ત થવાને પ્રેરે છે?", "opts": ["IgG", "IgM", "IgE", "IgA"], "ans": 2, "exp": "IgE એન્ટીબોડી એલર્જીની પ્રતિક્રિયામાં મુખ્ય ભૂમિકા ભજવે છે. તે માસ્ટ કોષો સાથે જોડાઈને હિસ્ટામિન જેવા મીડિયેટરોના સ્રાવને પ્રેરે છે, જે એલર્જીના લક્ષણો તરફ દોરી જાય છે. IgG અને IgM સામાન્ય રોગપ્રતિકારક પ્રતિક્રિયાઓમાં ભાગ લે છે, જ્યારે IgA શ્લેષ્મલ પટલો પર રક્ષણ આપે છે.", "ref": "Std 12 - પ્રકરણ 10: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}, {"q": "એક વ્યક્તિને પહેલી વખત ચેપ લાગે છે અને તે બીમાર પડે છે, પરંતુ બીજી વખત તે જ ચેપ લાગે ત્યારે તેને કોઈ લક્ષણો દેખાતા નથી. આ કઈ પ્રકારની રોગપ્રતિકારકતા દર્શાવે છે?", "opts": ["જન્મજાત નિષ્ક્રિય રોગપ્રતિકારકતા", "અર્જિત નિષ્ક્રિય રોગપ્રતિકારકતા", "જન્મજાત સક્રિય રોગપ્રતિકારકતા", "અર્જિત સક્રિય રોગપ્રતિકારકતા"], "ans": 3, "exp": "અર્જિત સક્રિય રોગપ્રતિકારકતામાં, શરીર ચેપ અથવા રસી દ્વારા એન્ટિજેન સાથે સંપર્કમાં આવે છે અને એન્ટીબોડીનું ઉત્પાદન કરે છે, જે ભવિષ્યમાં તે જ ચેપ વિરુદ્ધ રક્ષણ આપે છે. જન્મજાત નિષ્ક્રિય રોગપ્રતિકારકતા તો જન્મથી જ હાજર હોય છે, જ્યારે અર્જિત નિષ્ક્રિય રોગપ્રતિકારકતામાં એન્ટીબોડી બહારથી મળે છે (જેમ કે માતાના દૂધ દ્વારા).", "ref": "Std 12 - પ્રકરણ 10: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}, {"q": "હાઇપરસેન્સિટિવિટી ટાઇપ IV (પ્રકાર IV) પ્રતિક્રિયામાં કયા કોષો મુખ્ય ભૂમિકા ભજવે છે?", "opts": ["B-કોષો", "T-કોષો", "પ્લાઝ્મા કોષો", "માસ્ટ કોષો"], "ans": 1, "exp": "હાઇપરસેન્સિટિવિટી ટાઇપ IV એ ડિલેયડ-ટાઇપ હાઇપરસેન્સિટિવિટી છે, જેમાં T-કોષો (ખાસ કરીને Th1 કોષો) મુખ્ય ભૂમિકા ભજવે છે. આ પ્રતિક્રિયામાં એન્ટિજેન-સંવેદનશીલ T-કોષો સાયટોકાઇન્સ મુક્ત કરે છે, જે માયકોફેજ અને અન્ય કોષોને આકર્ષે છે, પરિણામે જળતર લક્ષણો દેખાય છે. B-કોષો, પ્લાઝ્મા કોષો અને માસ્ટ કોષો અન્ય પ્રકારની પ્રતિક્રિયાઓમાં ભાગ લે છે.", "ref": "Std 12 - પ્રકરણ 10: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}, {"q": "એક વ્યક્તિને રુબેલા (German measles) થયા પછી, તેના શરીરમાં રુબેલા વાયરસ વિરુદ્ધ એન્ટીબોડી બનવા લાગે છે. આ એન્ટીબોડી કયા પ્રકારની રોગપ્રતિકારકતા દર્શાવે છે?", "opts": ["કૃત્રિમ નિષ્ક્રિય રોગપ્રતિકારકતા", "કૃત્રિમ સક્રિય રોગપ્રતિકારકતા", "સ્વાભાવિક સક્રિય રોગપ્રતિકારકતા", "સ્વાભાવિક નિષ્ક્રિય રોગપ્રતિકારકતા"], "ans": 2, "exp": "રુબેલા જેવા ચેપ પછી શરીરમાં સ્વાભાવિક રીતે એન્ટીબોડી બનવા લાગે છે, જે સ્વાભાવિક સક્રિય રોગપ્રતિકારકતા દર્શાવે છે. કૃત્રિમ સક્રિય રોગપ્રતિકારકતામાં રસી દ્વારા એન્ટિજેન આપવામાં આવે છે, જ્યારે નિષ્ક્રિય રોગપ્રતિકારકતામાં એન્ટીબોડી બહારથી આપવામાં આવે છે.", "ref": "Std 12 - પ્રકરણ 10: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}, {"q": "ઇમ્યુનોડેફિશિયન્સી સિન્ડ્રોમ વાળા દર્દીમાં કયા કોષોની કમી અથવા ક્રિયાશીલતાનો અભાવ હોવાને લીધે ચેપ લાગવાની સંભાવના વધી જાય છે?", "opts": ["રક્તકણિકાઓ (પ્લેટલેટ્સ)", "લસિકાકણો (લિમ્ફોસાઇટ્સ)", "લોહીના લાલ કણો (RBCs)", "મોનોસાઇટ્સ"], "ans": 1, "exp": "લસિકાકણો (લિમ્ફોસાઇટ્સ), જેમાં B-કોષો અને T-કોષોનો સમાવેશ થાય છે, તે રોગપ્રતિકારક તંત્રના મુખ્ય ઘટકો છે. ઇમ્યુનોડેફિશિયન્સી સિન્ડ્રોમમાં આ કોષોની કમી અથવા ક્રિયાશીલતાનો અભાવ હોવાને લીધે શરીર ચેપ વિરુદ્ધ લડવાની ક્ષમતા ગુમાવી બેઠું હોય છે. રક્તકણિકાઓ, લોહીના લાલ કણો અને મોનોસાઇટ્સ રોગપ્રતિકારક તંત્રમાં મુખ્ય ભૂમિકા ભજવતા નથી.", "ref": "Std 12 - પ્રકરણ 10: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}, {"q": "જ્યારે શરીરમાં સ્વ-પ્રતિજન (self-antigen) વિરુદ્ધ પ્રતિકારક કોષો પ્રતિક્રિયા આપે છે, ત્યારે કયો રોગ ઉદ્ભવે છે, જેમાં રોગપ્રતિકારક તંત્ર શરીરના સ્વ-પેશીઓ પર હુમલો કરે છે?", "opts": ["એડ્સ (AIDS)", "રુમેટોઇડ આર્થરાઇટિસ (Rheumatoid arthritis)", "એલર્જીક રાઇનાઇટિસ (Allergic rhinitis)", "ટ્યુબરક્યુલોસિસ (Tuberculosis)"], "ans": 1, "exp": "રુમેટોઇડ આર્થરાઇટિસ એ ઓટોઇમ્યુન રોગ છે, જેમાં રોગપ્રતિકારક તંત્ર શરીરના સ્વ-પેશીઓ (જેમ કે જોડો) પર હુમલો કરે છે. એડ્સ એ ઇમ્યુનોડેફિશિયન્સી રોગ છે, એલર્જીક રાઇનાઇટિસ એ એલર્જીની પ્રતિક્રિયા છે, અને ટ્યુબરક્યુલોસિસ એ બેક્ટેરિયલ ચેપ છે. આથી, બીજો વિકલ્પ સૌથી યોગ્ય છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નિષ્ક્રિય રોગપ્રતિકારકતામાં, શરીરને રોગપ્રતિકારકતા પ્રદાન કરવા માટે કયા પ્રકારના એન્ટીબોડીનો ઉપયોગ થાય છે, જે પહેલાથી જ તૈયાર હોય છે?", "opts": ["IgM", "IgG", "IgA", "એન્ટીસેરા (Antisera)"], "ans": 3, "exp": "નિષ્ક્રિય રોગપ્રતિકારકતામાં, શરીરને તાત્કાલિક રક્ષણ આપવા માટે પહેલાથી તૈયાર એન્ટીબોડી (એન્ટીસેરા) આપવામાં આવે છે. IgM, IgG, અને IgA એ સક્રિય રોગપ્રતિકારકતામાં શરીર દ્વારા ઉત્પન્ન થતા એન્ટીબોડી છે, પરંતુ નિષ્ક્રિય રોગપ્રતિકારકતામાં એન્ટીસેરા (જેમ કે ટેટનસ એન્ટીસેરા)નો ઉપયોગ થાય છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "કયો રોગ એવો છે કે જેમાં રોગપ્રતિકારક તંત્રની ક્રિયાશીલતા અતિશય વધી જાય છે, પરંતુ તે ઓટોઇમ્યુન રોગ નથી?", "opts": ["લ્યુપસ (Lupus)", "એસ્ટેમા (Asthma)", "ડાયાબિટીસ મેલિટસ ટાઇપ 1", "મલ્ટિપલ સ્ક્લેરોસિસ (Multiple sclerosis)"], "ans": 1, "exp": "એસ્ટેમા એ હાઇપરસેન્સિટિવિટી (અતિસંવેદનશીલતા) નો રોગ છે, જેમાં રોગપ્રતિકારક તંત્રની પ્રતિક્રિયા અતિશય થાય છે, પરંતુ તે ઓટોઇમ્યુન રોગ નથી. લ્યુપસ, ડાયાબિટીસ મેલિટસ ટાઇપ 1, અને મલ્ટિપલ સ્ક્લેરોસિસ એ ઓટોઇમ્યુન રોગો છે, જેમાં રોગપ્રતિકારક તંત્ર શરીરના સ્વ-પેશીઓ પર હુમલો કરે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "જ્યારે શરીરમાં પ્રથમ વખત એન્ટિજેન પ્રવેશે છે, ત્યારે કયા પ્રકારના એન્ટીબોડી સૌપ્રથમ ઉત્પન્ન થાય છે?", "opts": ["IgG", "IgA", "IgM", "IgE"], "ans": 2, "exp": "પ્રાથમિક રોગપ્રતિકારક પ્રતિક્રિયામાં, શરીરમાં પ્રથમ વખત એન્ટિજેન પ્રવેશે ત્યારે IgM એન્ટીબોડી સૌપ્રથમ ઉત્પન્ન થાય છે. IgG પછીથી ઉત્પન્ન થાય છે, IgA મ્યુકોસલ સપાટી પર કામ કરે છે, અને IgE એલર્જીની પ્રતિક્રિયામાં ભાગ લે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "કયો રોગ એવો છે કે જેમાં રોગપ્રતિકારક તંત્રની કોષીય મધ્યસ્થી (cell-mediated immunity) ની કમી હોવાને લીધે ચેપ લાગવાની સંભાવના વધી જાય છે?", "opts": ["એડ્સ (AIDS)", "હિપેટાઇટિસ B", "ટાઇફોઇડ", "મેલેરિયા"], "ans": 0, "exp": "એડ્સ (AIDS) માં, HIV વાયરસ CD4+ T કોષો (હેલ્પર T કોષો) ને નષ્ટ કરે છે, જે કોષીય મધ્યસ્થી (cell-mediated immunity) ની કમી તરફ દોરી જાય છે. આનાથી શરીરમાં ચેપ લાગવાની સંભાવના વધી જાય છે. હિપેટાઇટિસ B, ટાઇફોઇડ, અને મેલેરિયા એ ચેપી રોગો છે, પરંતુ તેઓ કોષીય મધ્યસ્થીની કમી સાથે સીધો સંબંધ ધરાવતા નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "જ્યારે એડ્સ (AIDS) ગ્રસ્ત વ્યક્તિમાં CD4+ T કોષોની સંખ્યા 200/µL થી ઓછી થાય છે, ત્યારે શરીરમાં કયા પ્રકારની રોગપ્રતિકારકતા સૌથી વધુ પ્રભાવિત થાય છે?", "opts": ["કોષીય મધ્યસ્થી રોગપ્રતિકારકતા (Cell-mediated immunity)", "પ્રવર્તી રોગપ્રતિકારકતા (Humoral immunity)", "સ્વાભાવિક રોગપ્રતિકારકતા (Innate immunity)", "મ્યુકોઝલ રોગપ્રતિકારકતા (Mucosal immunity)"], "ans": 0, "exp": "CD4+ T કોષો કોષીય મધ્યસ્થી રોગપ્રતિકારકતામાં મુખ્ય ભૂમિકા ભજવે છે. જ્યારે તેમની સંખ્યા 200/µL થી ઓછી થાય છે, ત્યારે કોષીય મધ્યસ્થી રોગપ્રતિકારકતા નબળી પડે છે, જે એડ્સના કેસમાં જોવા મળે છે. પ્રવર્તી રોગપ્રતિકારકતા (B) મુખ્યત્વે B કોષો દ્વારા સંચાલિત થાય છે, સ્વાભાવિક રોગપ્રતિકારકતા (C) તાત્કાલિક પ્રતિક્રિયા છે, અને મ્યુકોઝલ રોગપ્રતિકારકતા (D) શ્લેષ્મલ સપાટી પર કામ કરે છે, પરંતુ CD4+ T કોષોની કમી સીધી રીતે કોષીય મધ્યસ્થી રોગપ્રતિકારકતાને પ્રભાવિત કરે છે.", "ref": "Std 12 - પ્રકરણ 10: માનવ તંત્ર - પ્રતિરક્ષાતંત્ર", "ch": ""}, {"q": "નિષ્ક્રિય રોગપ્રતિકારકતામાં, જ્યારે એન્ટીસેરમ આપવામાં આવે છે, ત્યારે તે શરીરમાં કયા પ્રકારના એન્ટીબોડી પ્રદાન કરે છે?", "opts": ["IgM અને IgG", "IgA અને IgD", "IgE અને IgG", "IgM અને IgA"], "ans": 0, "exp": "એન્ટીસેરમમાં મુખ્યત્વે IgG એન્ટીબોડી હોય છે, જે તાત્કાલિક રોગપ્રતિકારકતા પ્રદાન કરે છે. IgM પણ કેટલાક કિસ્સાઓમાં હાજર હોઈ શકે છે. IgA (B, D) અને IgE (C) એન્ટીસેરમમાં મુખ્યત્વે હાજર નથી હોતા, અને IgD (B) રોગપ્રતિકારકતામાં મર્યાદિત ભૂમિકા ભજવે છે.", "ref": "Std 12 - પ્રકરણ 10: માનવ તંત્ર - પ્રતિરક્ષાતંત્ર", "ch": ""}, {"q": "એક વ્યક્તિને ટેટનસના ટોક્સોઈડ વેક્સીન આપવામાં આવે છે. આ વેક્સીન કયા પ્રકારની રોગપ્રતિકારકતા ઉત્પન્ન કરે છે?", "opts": ["સક્રિય કૃત્રિમ રોગપ્રતિકારકતા", "નિષ્ક્રિય કૃત્રિમ રોગપ્રતિકારકતા", "સક્રિય સ્વાભાવિક રોગપ્રતિકારકતા", "નિષ્ક્રિય સ્વાભાવિક રોગપ્રતિકારકતા"], "ans": 0, "exp": "ટેટનસના ટોક્સોઈડ વેક્સીન એ સક્રિય કૃત્રિમ રોગપ્રતિકારકતા ઉત્પન્ન કરે છે, કારણ કે તે શરીરને એન્ટિજેન (ટોક્સોઈડ) આપીને એન્ટીબોડી બનાવવા પ્રેરે છે. નિષ્ક્રિય કૃત્રિમ (B) એન્ટીસેરમ દ્વારા મેળવવામાં આવે છે, સક્રિય સ્વાભાવિક (C) ચેપ લાગવાને લીધે થાય છે, અને નિષ્ક્રિય સ્વાભાવિક (D) માતાના ગર્ભાશયમાંથી શિશુને મળે છે.", "ref": "Std 12 - પ્રકરણ 10: માનવ તંત્ર - પ્રતિરક્ષાતંત્ર", "ch": ""}, {"q": "જ્યારે શરીરમાં એન્ટિજેન-એન્ટીબોડી પ્રતિક્રિયા થાય છે, ત્યારે કયા પ્રકારના પ્રોટીન સક્રિય થઈને પૂરક તંત્ર (Complement system) ને પ્રેરે છે?", "opts": ["C3 અને C4", "IgE અને હિસ્ટામીન", "ઇન્ટરફેરોન અને ઇન્ટરલ્યુકિન", "લાઇસોઝાઇમ અને ફેગોસાઇટોસિસ"], "ans": 0, "exp": "C3 અને C4 પૂરક તંત્રના મુખ્ય ઘટકો છે, જે એન્ટિજેન-એન્ટીબોડી પ્રતિક્રિયા દરમિયાન સક્રિય થાય છે. IgE અને હિસ્ટામીન (B) એલર્જી પ્રતિક્રિયામાં ભૂમિકા ભજવે છે, ઇન્ટરફેરોન અને ઇન્ટરલ્યુકિન (C) સાયટોકાઈન છે, અને લાઇસોઝાઇમ અને ફેગોસાઇટોસિસ (D) સ્વાભાવિક રોગપ્રતિકારકતાના ઘટકો છે.", "ref": "Std 12 - પ્રકરણ 10: માનવ તંત્ર - પ્રતિરક્ષાતંત્ર", "ch": ""}, {"q": "કયા રોગમાં, શરીરના સ્વ-પ્રતિજન વિરુદ્ધ એન્ટીબોડી બનાવવામાં આવે છે, જેના કારણે રક્ત કણોનો નાશ થાય છે?", "opts": ["હીમોલિટિક એનિમિયા", "રુમાટોઈડ આર્થરાઇટિસ", "માયસ્થેનિયા ગ્રેવિસ", "સિસ્ટેમિક લ્યુપસ એરિથેમેટોસસ (SLE)"], "ans": 0, "exp": "હીમોલિટિક એનિમિયામાં, શરીર સ્વ-પ્રતિજન વિરુદ્ધ એન્ટીબોડી બનાવે છે, જે રક્ત કણો (લાલ રક્ત કણો) નો નાશ કરે છે. રુમાટોઈડ આર્થરાઇટિસ (B) જોડોને પ્રભાવિત કરે છે, માયસ્થેનિયા ગ્રેવિસ (C) સ્નાયુઓને પ્રભાવિત કરે છે, અને SLE (D) બહુવિધ અંગોને પ્રભાવિત કરે છે, પરંતુ હીમોલિટિક એનિમિયા સીધી રીતે રક્ત કણોના નાશ સાથે સંકળાયેલ છે.", "ref": "Std 12 - પ્રકરણ 10: માનવ તંત્ર - પ્રતિરક્ષાતંત્ર", "ch": ""}, {"q": "જ્યારે એક વ્યક્તિને રક્તાધાન દરમ્યાન ABO રક્ત જૂથ અસંગતતા થાય છે, ત્યારે કયા પ્રકારની પ્રતિક્રિયા થાય છે અને તે કયા પ્રકારની રોગપ્રતિકારકતાના ઉદાહરણ તરીકે ગણી શકાય?", "opts": ["ટાઇપ I હાઇપરસેન્સિટિવિટી, સક્રિય રોગપ્રતિકારકતા", "ટાઇપ II હાઇપરસેન્સિટિવિટી, નિષ્ક્રિય રોગપ્રતિકારકતા", "ટાઇપ III હાઇપરસેન્સિટિવિટી, સક્રિય રોગપ્રતિકારકતા", "ટાઇપ II હાઇપરસેન્સિટિવિટી, સક્રિય રોગપ્રતિકારકતા"], "ans": 3, "exp": "ABO રક્ત જૂથ અસંગતતામાં, પ્રતિ-એ અથવા પ્રતિ-B એન્ટીબોડી રક્તમાં હાજર એન્ટિજેન સાથે બંધાય છે, જે ટાઇપ II હાઇપરસેન્સિટિવિટી (સાયટોટોક્સિક પ્રતિક્રિયા) છે. આ પ્રતિક્રિયા સક્રિય રોગપ્રતિકારકતાનું ઉદાહરણ છે કારણ કે શરીરમાં પહેલેથી એન્ટીબોડી હાજર હોય છે. A) ટાઇપ I એલર્જી સાથે સંબંધિત છે, B) નિષ્ક્રિય રોગપ્રતિકારકતા એ બાહ્ય એન્ટીબોડીના ઉપયોગને લગતી હોય છે, C) ટાઇપ III ઇમ્યુન કોમ્પ્લેક્સ પ્રતિક્રિયા છે.", "ref": "Std 12 - પ્રકરણ 10: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}, {"q": "રોગપ્રતિકારક તંત્રમાં, કયા કોષો દ્વારા એન્ટિજેન પ્રસ્તુતિકરણ (antigen presentation) થાય છે અને તે કયા પ્રકારની રોગપ્રતિકારકતામાં મહત્વની ભૂમિકા ભજવે છે?", "opts": ["B-કોષો, કોષીય મધ્યસ્થી રોગપ્રતિકારકતા", "T-કોષો, હ્યુમોરલ રોગપ્રતિકારકતા", "ડેન્ડ્રિટિક કોષો, કોષીય મધ્યસ્થી રોગપ્રતિકારકતા", "મેસ્ટ કોષો, હ્યુમોરલ રોગપ્રતિકારકતા"], "ans": 2, "exp": "ડેન્ડ્રિટિક કોષો એન્ટિજેન પ્રસ્તુતિકરણમાં મહત્વની ભૂમિકા ભજવે છે અને તે કોષીય મધ્યસ્થી રોગપ્રતિકારકતામાં મહત્વપૂર્ણ છે. A) B-કોષો હ્યુમોરલ રોગપ્રતિકારકતામાં ભાગ લે છે, B) T-કોષો એન્ટિજેન પ્રસ્તુતિકરણ કરતા નથી, D) મેસ્ટ કોષો એલર્જી પ્રતિક્રિયામાં ભાગ લે છે.", "ref": "Std 12 - પ્રકરણ 10: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}, {"q": "જ્યારે એક વ્યક્તિને પહેલી વખત ટેટનસનું ટોક્સોઈડ વેક્સીન આપવામાં આવે છે, ત્યારે શરીરમાં કયા પ્રકારના એન્ટીબોડી સૌપ્રથમ બનાવવામાં આવે છે અને તે કયા પ્રકારની રોગપ્રતિકારકતાનું ઉદાહરણ છે?", "opts": ["IgM, સક્રિય રોગપ્રતિકારકતા", "IgG, નિષ્ક્રિય રોગપ્રતિકારકતા", "IgA, સક્રિય રોગપ્રતિકારકતા", "IgE, નિષ્ક્રિય રોગપ્રતિકારકતા"], "ans": 0, "exp": "પહેલી વખત એન્ટિજેન પ્રવેશે ત્યારે શરીરમાં IgM એન્ટીબોડી સૌપ્રથમ બનાવવામાં આવે છે, જે સક્રિય રોગપ્રતિકારકતાનું ઉદાહરણ છે. B) IgG પછીના તબક્કામાં બનાવવામાં આવે છે, C) IgA શ્લેષ્મલ તંત્રમાં મહત્વપૂર્ણ છે, D) IgE એલર્જી પ્રતિક્રિયામાં ભાગ લે છે.", "ref": "Std 12 - પ્રકરણ 10: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}, {"q": "કયા રોગમાં, શરીરના સ્વ-પ્રતિજન વિરુદ્ધ T-કોષો પ્રતિક્રિયા આપે છે, જેના કારણે રોગની લક્ષણો દેખાય છે?", "opts": ["રુમેટોઈડ આર્થરાઇટિસ", "ટાઇપ 1 ડાયાબિટીસ", "લ્યુપસ", "એલર્જીક રાઇનાઇટિસ"], "ans": 1, "exp": "ટાઇપ 1 ડાયાબિટીસમાં, T-કોષો શરીરના સ્વ-પ્રતિજન (બીટા કોષો) વિરુદ્ધ પ્રતિક્રિયા આપે છે, જેના કારણે ઇન્સ્યુલિનનું ઉત્પાદન બંધ થાય છે. A) રુમેટોઈડ આર્થરાઇટિસમાં એન્ટીબોડી સ્વ-પ્રતિજન વિરુદ્ધ પ્રતિક્રિયા આપે છે, C) લ્યુપસમાં પણ એન્ટીબોડી સ્વ-પ્રતિજન વિરુદ્ધ પ્રતિક્રિયા આપે છે, D) એલર્જીક રાઇનાઇટિસ એલર્જી સાથે સંબંધિત છે.", "ref": "Std 12 - પ્રકરણ 10: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}, {"q": "નિષ્ક્રિય રોગપ્રતિકારકતામાં, કયા પ્રકારના એન્ટીબોડીનો ઉપયોગ થાય છે જ્યારે એક વ્યક્તિને સર્પદંશ થયો હોય અને તેને એન્ટી-સ્નેક વેનમ સીરમ આપવામાં આવે છે?", "opts": ["IgG અને IgM", "IgA અને IgE", "IgD અને IgM", "IgG અને IgA"], "ans": 0, "exp": "એન્ટી-સ્નેક વેનમ સીરમમાં મુખ્યત્વે IgG અને IgM એન્ટીબોડી હોય છે, જે નિષ્ક્રિય રોગપ્રતિકારકતાનું ઉદાહરણ છે. B) IgA શ્લેષ્મલ તંત્રમાં મહત્વપૂર્ણ છે, C) IgD ના કોઈ મહત્વપૂર્ણ કાર્ય જાણીતું નથી, D) IgA શ્લેષ્મલ તંત્રમાં મહત્વપૂર્ણ છે.", "ref": "Std 12 - પ્રકરણ 10: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
