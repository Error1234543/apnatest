<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>જીવનની ઉત્પત્તિ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>જીવનની ઉત્પત્તિ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">જીવનની ઉત્પત્તિ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ઓપેરિન-હાલ્ડેનના સિદ્ધાંત મુજબ પૃથ્વીના પ્રાથમિક વાતાવરણમાં નીચેનામાંથી કયો વાયુ ગેરહાજર હતો?", "opts": ["મિથેન (CH₄)", "એમોનિયા (NH₃)", "ઓક્સિજન (O₂)", "પાણીની વરાળ (H₂O)"], "ans": 2, "exp": "ઓપેરિન-હાલ્ડેનના સિદ્ધાંત મુજબ પ્રાથમિક વાતાવરણ રિડ્યુસિંગ પ્રકારનું હતું, જેમાં મુક્ત ઓક્સિજન ગેરહાજર હતો કારણ કે તે સમયે પ્રકાશસંશ્લેષણ કરતા સજીવો અસ્તિત્વમાં ન હતા. મિથેન, એમોનિયા અને પાણીની વરાળ પ્રાથમિક વાતાવરણમાં હાજર હતા.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "મિલર-યુરેના પ્રયોગમાં વિદ્યુત સ્પાર્કનો ઉપયોગ શા માટે કરવામાં આવ્યો હતો?", "opts": ["પ્રાથમિક વાતાવરણમાં રહેલા વાયુઓને ઠંડા કરવા", "પ્રાથમિક વાતાવરણમાં વીજળીના તોફાનની નકલ કરવા", "પ્રોટીનના અણુઓનું સંશ્લેષણ કરવા", "કાર્બનિક સંયોજનોનું વિઘટન કરવા"], "ans": 1, "exp": "મિલર-યુરેના પ્રયોગમાં વિદ્યુત સ્પાર્કનો ઉપયોગ પ્રાથમિક પૃથ્વી પર થતા વીજળીના તોફાનની પરિસ્થિતિનું અનુકરણ કરવા માટે કરવામાં આવ્યો હતો, જેના કારણે અકાર્બનિક સંયોજનોમાંથી એમિનો એસિડ જેવા કાર્બનિક સંયોજનોનું નિર્માણ થયું હતું. આ પ્રયોગમાં પ્રોટીનનું સીધું સંશ્લેષણ થયું ન હતું અને વાયુઓને ઠંડા કરવા કે વિઘટન કરવા માટે સ્પાર્કનો ઉપયોગ થયો ન હતો.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન કોએસર્વેટ્સ વિશે ખોટું છે?", "opts": ["કોએસર્વેટ્સ પ્રોટીન અને કાર્બોદિતના સ્વયંભૂ એકત્રીકરણથી બને છે", "કોએસર્વેટ્સમાં પટલ જેવી રચના હોય છે જે પદાર્થોને અલગ કરે છે", "કોએસર્વેટ્સમાં આનુવંશિક દ્રવ્ય (DNA/RNA) હાજર હોય છે", "કોએસર્વેટ્સને પ્રાથમિક કોષોના પૂર્વજ માનવામાં આવે છે"], "ans": 2, "exp": "કોએસર્વેટ્સ પ્રોટીન અને કાર્બોદિતના સ્વયંભૂ એકત્રીકરણથી બને છે અને તેમાં પટલ જેવી રચના હોય છે, પરંતુ તેમાં આનુવંશિક દ્રવ્ય (DNA/RNA) હાજર હોતું નથી. તેઓને પ્રાથમિક કોષોના પૂર્વજ માનવામાં આવે છે, પરંતુ તેમાં આનુવંશિક માહિતીનો અભાવ હોય છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "પૃથ્વી પર જીવનની ઉત્પત્તિ માટે નીચેનામાંથી કયું પરિબળ સૌથી ઓછું મહત્ત્વનું માનવામાં આવે છે?", "opts": ["પ્રાથમિક વાતાવરણમાં રિડ્યુસિંગ પરિસ્થિતિ", "પૃથ્વીના વાતાવરણમાં ઓઝોન સ્તરની હાજરી", "વીજળી અને અલ્ટ્રાવાયોલેટ કિરણોની હાજરી", "પાણીની હાજરી અને યોગ્ય તાપમાન"], "ans": 1, "exp": "પૃથ્વી પર જીવનની ઉત્પત્તિ સમયે ઓઝોન સ્તર હાજર ન હતું કારણ કે મુક્ત ઓક્સિજન ગેરહાજર હતો. રિડ્યુસિંગ વાતાવરણ, વીજળી/અલ્ટ્રાવાયોલેટ કિરણો અને પાણીની હાજરી જીવનની ઉત્પત્તિ માટે અત્યંત મહત્ત્વપૂર્ણ પરિબળો હતા.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન રાસાયણિક ઉત્ક્રાંતિના તબક્કાનું સાચું વર્ણન કરતું નથી?", "opts": ["અકાર્બનિક અણુઓમાંથી કાર્બનિક અણુઓનું નિર્માણ થયું", "કાર્બનિક અણુઓના પોલિમરાઇઝેશનથી જટિલ અણુઓ બન્યા", "પ્રથમ સ્વયંપ્રજનન કરતા અણુઓ DNA હતા", "કોએસર્વેટ્સ જેવી સંરચનાઓનું નિર્માણ થયું"], "ans": 2, "exp": "રાસાયણિક ઉત્ક્રાંતિના તબક્કામાં પ્રથમ સ્વયંપ્રજનન કરતા અણુઓ RNA હતા, DNA નહીં. અકાર્બનિક અણુઓમાંથી કાર્બનિક અણુઓ બન્યા, પોલિમરાઇઝેશન થયું અને કોએસર્વેટ્સ જેવી સંરચનાઓ બની હતી, પરંતુ DNA પછીના તબક્કામાં આવ્યું હતું.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "જીવનની ઉત્પત્તિના સિદ્ધાંત અનુસાર, પ્રાથમિક સૂપમાં નીચેનામાંથી કયા અણુનું નિર્માણ સૌપ્રથમ થયું હોવાનું મનાય છે?", "opts": ["પ્રોટીન", "કાર્બોદિત", "ન્યુક્લિયિક એસિડ", "લિપિડ"], "ans": 0, "exp": "પ્રાથમિક સૂપમાં સૌપ્રથમ પ્રોટીન જેવા સરળ અણુઓનું નિર્માણ થયું હોવાનું મનાય છે, કારણ કે એમિનો એસિડના પોલિમરાઇઝેશનથી પ્રોટીન બને છે, જે જીવનની ઉત્પત્તિ માટે આધારભૂત છે. કાર્બોદિત, ન્યુક્લિયિક એસિડ અને લિપિડ પછીથી ઉત્પન્ન થયા હોવાનું મનાય છે.", "ref": "Std 12 - અધ્યાય 7: જીવનની ઉત્પત્તિ અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "મિલર-યુરેના પ્રયોગમાં ઉત્પન્ન થયેલા કાર્બનિક સંયોજનો પૈકી કયું સંયોજન જીવનની ઉત્પત્તિ માટે સૌથી મહત્ત્વપૂર્ણ ગણવામાં આવે છે?", "opts": ["ફોર્મેલ્ડિહાઇડ", "એસિટિક એસિડ", "એમિનો એસિડ", "યુરિયા"], "ans": 2, "exp": "મિલર-યુરેના પ્રયોગમાં ઉત્પન્ન થયેલા એમિનો એસિડ જીવનની ઉત્પત્તિ માટે સૌથી મહત્ત્વપૂર્ણ ગણવામાં આવે છે, કારણ કે એમિનો એસિડ પ્રોટીનના બિલ્ડિંગ બ્લોક્સ છે. ફોર્મેલ્ડિહાઇડ, એસિટિક એસિડ અને યુરિયા પણ ઉત્પન્ન થયા હતા, પરંતુ એમિનો એસિડની ભૂમિકા વધુ મહત્ત્વપૂર્ણ છે.", "ref": "Std 12 - અધ્યાય 7: જીવનની ઉત્પત્તિ અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "જીવનની ઉત્પત્તિના સિદ્ધાંત અનુસાર, નીચેનામાંથી કયા તત્વનો અભાવ પ્રાથમિક વાતાવરણમાં જીવનની ઉત્પત્તિ માટે અનુકૂળ પરિસ્થિતિ સર્જી શકે છે?", "opts": ["ઓક્સિજન", "હાઇડ્રોજન", "નાઇટ્રોજન", "કાર્બન"], "ans": 0, "exp": "પ્રાથમિક વાતાવરણમાં ઓક્સિજનનો અભાવ જીવનની ઉત્પત્તિ માટે અનુકૂળ પરિસ્થિતિ સર્જી શકે છે, કારણ કે ઓક્સિજન રિએક્ટિવ હોવાથી તે કાર્બનિક સંયોજનોના નિર્માણમાં અડચણ ઉભી કરે છે. હાઇડ્રોજન, નાઇટ્રોજન અને કાર્બનનો અભાવ જીવનની ઉત્પત્તિ માટે અનુકૂળ નથી.", "ref": "Std 12 - અધ્યાય 7: જીવનની ઉત્પત્તિ અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "કોએસર્વેટ્સના સિદ્ધાંત અનુસાર, નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["કોએસર્વેટ્સ એ પ્રોટીન અને ન્યુક્લિક એસિડનો બનેલો કોષ છે.", "કોએસર્વેટ્સમાં સ્વયં-પુનરાવર્તનની ક્ષમતા હોય છે.", "કોએસર્વેટ્સ એ જીવંત કોષ છે.", "કોએસર્વેટ્સ એ કેવળ પ્રોટીનનો બનેલો કણ છે."], "ans": 1, "exp": "કોએસર્વેટ્સમાં સ્વયં-પુનરાવર્તનની ક્ષમતા હોય છે, જે જીવનની ઉત્પત્તિ માટે મહત્ત્વપૂર્ણ છે. કોએસર્વેટ્સ એ પ્રોટીન અને ન્યુક્લિક એસિડનો બનેલો કોષ નથી, ન જીવંત કોષ છે, અને ન કેવળ પ્રોટીનનો બનેલો કણ છે.", "ref": "Std 12 - અધ્યાય 7: જીવનની ઉત્પત્તિ અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "જીવનની ઉત્પત્તિના સિદ્ધાંત અનુસાર, નીચેનામાંથી કયું પરિબળ પ્રાથમિક સૂપમાં કાર્બનિક સંયોજનોના નિર્માણ માટે જવાબદાર નથી?", "opts": ["વિદ્યુત વીજળી", "અલ્ટ્રાવાયોલેટ કિરણો", "ઉચ્ચ તાપમાન", "ઓક્સિજન"], "ans": 3, "exp": "પ્રાથમિક સૂપમાં કાર્બનિક સંયોજનોના નિર્માણ માટે વિદ્યુત વીજળી, અલ્ટ્રાવાયોલેટ કિરણો અને ઉચ્ચ તાપમાન જવાબદાર છે. ઓક્સિજનનો અભાવ જીવનની ઉત્પત્તિ માટે અનુકૂળ પરિસ્થિતિ સર્જે છે, પરંતુ તે કાર્બનિક સંયોજનોના નિર્માણ માટે જવાબદાર નથી.", "ref": "Std 12 - અધ્યાય 7: જીવનની ઉત્પત્તિ અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "ઓપેરિનના મત અનુસાર, પ્રાથમિક પૃથ્વી પર જીવનની ઉત્પત્તિ માટે નીચેનામાંથી કયા તત્વનો સ્રોત મુખ્યત્વે હવાના રૂપમાં હતો?", "opts": ["હાઇડ્રોજન", "ઓક્સિજન", "નાઇટ્રોજન", "કાર્બન ડાયોક્સાઇડ"], "ans": 0, "exp": "ઓપેરિનના સિદ્ધાંત અનુસાર, પ્રાથમિક વાતાવરણમાં હાઇડ્રોજન (H₂), મિથેન (CH₄), અમોનિયા (NH₃) અને પાણીની વરાળ જેવા વાયુઓ હાજર હતા. ઓક્સિજન ગેરહાજર હતો કારણ કે તે પ્રકાશસંશ્લેષણ દ્વારા ઉત્પન્ન થતો નહોતો. નાઇટ્રોજન અને કાર્બન ડાયોક્સાઇડ પણ હાજર હતા, પરંતુ હાઇડ્રોજન એ પ્રાથમિક સ્રોત તરીકે મહત્ત્વનો હતો. આથી, હાઇડ્રોજન સાચો જવાબ છે.", "ref": "Std 12 - અધ્યાય 7: જીવનની ઉત્પત્તિ અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "મિલર-યુરેના પ્રયોગમાં, નીચેનામાંથી કયા સંયોજનનું નિર્માણ થયું નહોતું?", "opts": ["એમિનો એસિડ", "યુરિયા", "ગ્લુકોઝ", "ફોર્મિક એસિડ"], "ans": 2, "exp": "મિલર-યુરેના પ્રયોગમાં, પ્રાથમિક વાતાવરણની પરિસ્થિતિનું અનુકરણ કરવામાં આવ્યું હતું, જેમાં એમિનો એસિડ, યુરિયા, ફોર્મિક એસિડ જેવા કાર્બનિક સંયોજનોનું નિર્માણ થયું હતું. પરંતુ ગ્લુકોઝ જેવા જટિલ કાર્બોદિતનું નિર્માણ થયું નહોતું, કારણ કે તે માટે વધુ જટિલ રાસાયણિક પ્રક્રિયાઓની જરૂર પડે છે. આથી, ગ્લુકોઝ સાચો જવાબ છે.", "ref": "Std 12 - અધ્યાય 7: જીવનની ઉત્પત્તિ અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "કોએસર્વેટ્સના સિદ્ધાંત અનુસાર, નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["પ્રાથમિક સૂપમાં કાર્બનિક સંયોજનોનું સાંદ્રણ વધતું ગયું", "પ્રાથમિક સૂપમાં ઉત્સેચકોની હાજરી હતી", "પ્રાથમિક સૂપમાં જટિલ અણુઓનું નિર્માણ થયું", "પ્રાથમિક સૂપમાં પાણીનું પ્રમાણ ખૂબ જ ઓછું હતું"], "ans": 3, "exp": "કોએસર્વેટ્સના સિદ્ધાંત અનુસાર, પ્રાથમિક સૂપમાં પાણીનું પ્રમાણ ખૂબ જ વધારે હતું, કારણ કે પાણી એ જીવનની ઉત્પત્તિ માટે આવશ્યક મધ્યમ હતું. પ્રાથમિક સૂપમાં કાર્બનિક સંયોજનોનું સાંદ્રણ વધતું ગયું, જટિલ અણુઓનું નિર્માણ થયું, પરંતુ ઉત્સેચકોની હાજરી વિશે કોઈ પુરાવો નથી. આથી, વિધાન D ખોટું છે.", "ref": "Std 12 - અધ્યાય 7: જીવનની ઉત્પત્તિ અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "જીવનની ઉત્પત્તિના સિદ્ધાંત અનુસાર, નીચેનામાંથી કયા તબક્કામાં પ્રથમ જીવંત કોષનું નિર્માણ થયું હોવાનું માનવામાં આવે છે?", "opts": ["રાસાયણિક ઉત્ક્રાંતિ", "પ્રાથમિક સૂપ", "કોએસર્વેટ્સ", "પ્રી-સેલ્યુલર જીવન"], "ans": 3, "exp": "જીવનની ઉત્પત્તિના સિદ્ધાંત અનુસાર, પ્રી-સેલ્યુલર જીવન તબક્કામાં પ્રથમ જીવંત કોષનું નિર્માણ થયું હોવાનું માનવામાં આવે છે. રાસાયણિક ઉત્ક્રાંતિ અને પ્રાથમિક સૂપ તબક્કામાં કાર્બનિક સંયોજનોનું નિર્માણ થાય છે, જ્યારે કોએસર્વેટ્સ તબક્કામાં જટિલ અણુઓનું નિર્માણ થાય છે. આથી, પ્રી-સેલ્યુલર જીવન સાચો જવાબ છે.", "ref": "Std 12 - અધ્યાય 7: જીવનની ઉત્પત્તિ અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન જીવનની ઉત્પત્તિના સિદ્ધાંત સાથે સુસંગત નથી?", "opts": ["પ્રાથમિક વાતાવરણમાં ઓક્સિજન ગેરહાજર હતો", "પ્રાથમિક સૂપમાં કાર્બનિક સંયોજનોનું નિર્માણ UV કિરણો દ્વારા થયું", "પ્રથમ જીવંત કોષમાં કોષકેન્દ્ર હાજર હતું", "પ્રાથમિક પૃથ્વી પર તાપમાન ખૂબ જ ઉચ્ચ હતું"], "ans": 2, "exp": "જીવનની ઉત્પત્તિના સિદ્ધાંત અનુસાર, પ્રથમ જીવંત કોષ પ્રોકેરિયોટિક હતો, જેમાં કોષકેન્દ્ર હાજર નહોતું. પ્રાથમિક વાતાવરણમાં ઓક્સિજન ગેરહાજર હતો, પ્રાથમિક સૂપમાં કાર્બનિક સંયોજનોનું નિર્માણ UV કિરણો દ્વારા થયું, અને પ્રાથમિક પૃથ્વી પર તાપમાન ખૂબ જ ઉચ્ચ હતું. આથી, વિધાન C સુસંગત નથી.", "ref": "Std 12 - અધ્યાય 7: જીવનની ઉત્પત્તિ અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "ઓપેરિન-હાલ્ડેનના સિદ્ધાંત અનુસાર, પ્રાથમિક સૂપમાં નીચેનામાંથી કયા સંયોજનનું નિર્માણ સૌપ્રથમ થયું હોવાનું મનાય છે, જે પછીના તબક્કામાં પ્રોટીન અને ન્યુક્લિક એસિડના નિર્માણ માટે આધારભૂત બન્યું?", "opts": ["એમિનો એસિડ", "ન્યુક્લિયોટાઇડ્સ", "ગ્લૂકોઝ", "લિપિડ્સ"], "ans": 0, "exp": "ઓપેરિન-હાલ્ડેનના સિદ્ધાંત અનુસાર, પ્રાથમિક સૂપમાં સૌપ્રથમ એમિનો એસિડનું નિર્માણ થયું હોવાનું મનાય છે, જે પછી પ્રોટીન અને ન્યુક્લિક એસિડના નિર્માણ માટે આધારભૂત બન્યું. ન્યુક્લિયોટાઇડ્સ, ગ્લૂકોઝ અને લિપિડ્સનું નિર્માણ પછીના તબક્કામાં થયું હોવાનું મનાય છે. એમિનો એસિડ જીવનની ઉત્પત્તિના રાસાયણિક ઉત્ક્રાંતિના તબક્કામાં મહત્ત્વની ભૂમિકા ભજવે છે.", "ref": "Std 12 - અધ્યાય 7: જીવનની ઉત્પત્તિ અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "મિલર-યુરેના પ્રયોગમાં, પ્રાથમિક વાતાવરણની નકલ કરવા માટે નીચેનામાંથી કયા વાયુઓનો સમાવેશ કરવામાં આવ્યો નહોતો?", "opts": ["મિથેન", "અમોનિયા", "ઓક્સિજન", "હાઇડ્રોજન"], "ans": 2, "exp": "મિલર-યુરેના પ્રયોગમાં પ્રાથમિક વાતાવરણની નકલ કરવા માટે મિથેન, અમોનિયા, હાઇડ્રોજન અને પાણીના વરાળનો સમાવેશ કરવામાં આવ્યો હતો. ઓક્સિજનનો સમાવેશ કરવામાં આવ્યો નહોતો, કારણ કે પ્રાથમિક વાતાવરણમાં ઓક્સિજન ગેરહાજર હતો. ઓક્સિજન જીવનની ઉત્પત્તિ પહેલા પૃથ્વી પર ઉપસ્થિત નહોતો.", "ref": "Std 12 - અધ્યાય 7: જીવનની ઉત્પત્તિ અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "ઓપેરિન-હાલ્ડેનના સિદ્ધાંત અનુસાર, પ્રાથમિક સૂપમાં કોઈપણ જીવંત કોષના નિર્માણ પહેલાં નીચેનામાંથી કયા તબક્કામાં કાર્બનિક અણુઓએ સ્વયં-પુનરાવર્તિત થવાની ક્ષમતા વિકસાવી હોવી જરૂરી હતી?", "opts": ["અકાર્બનિક અણુઓથી કાર્બનિક અણુઓનું નિર્માણ", "કાર્બનિક અણુઓનો પોલિમરાઇઝેશન અને મેક્રોમોલેક્યુલ્સનું નિર્માણ", "મેક્રોમોલેક્યુલ્સનો સંગઠન અને પ્રોટોબાયોન્ટ્સનું નિર્માણ", "પ્રોટોબાયોન્ટ્સમાં ચયાપચય ક્રિયાઓનો વિકાસ"], "ans": 2, "exp": "સ્વયં-પુનરાવર્તિત થવાની ક્ષમતા (self-replication) એ મેક્રોમોલેક્યુલ્સ (જેવા કે ન્યુક્લિઓટાઇડ્સ)ના સંગઠન દરમિયાન વિકસે છે, જ્યારે પ્રોટોબાયોન્ટ્સ (પ્રાથમિક જીવંત સંરચનાઓ)નું નિર્માણ થાય છે. અકાર્બનિકથી કાર્બનિક અણુઓનું નિર્માણ (A) અને પોલિમરાઇઝેશન (B) તો આ પહેલાંના તબક્કા છે. ચયાપચય ક્રિયાઓ (D) તો પ્રોટોબાયોન્ટ્સ પછી વિકસે છે. આથી, સ્વયં-પુનરાવર્તન માટે મેક્રોમોલેક્યુલ્સનો સંગઠન (C) જરૂરી છે.", "ref": "Std 12 - અધ્યાય 7: જીવનની ઉત્પત્તિ અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "મિલર-યુરેના પ્રયોગમાં, પ્રાથમિક વાતાવરણની નકલ કરવા માટે વપરાયેલા વાયુઓમાં નીચેનામાંથી કયા વાયુનો સમાવેશ કરવામાં આવ્યો નહોતો, પરંતુ તે વાયુ આજના વાતાવરણમાં મહત્ત્વનો ભાગ ભજવે છે?", "opts": ["મિથેન (CH₄)", "અમોનિયા (NH₃)", "ઓક્સિજન (O₂)", "હાઇડ્રોજન (H₂)"], "ans": 2, "exp": "મિલર-યુરેના પ્રયોગમાં પ્રાથમિક વાતાવરણની નકલ કરવા માટે મિથેન (A), અમોનિયા (B), હાઇડ્રોજન (D) અને પાણીના વરાળનો ઉપયોગ કરવામાં આવ્યો હતો. ઓક્સિજન (C) પ્રાથમિક વાતાવરણમાં ગેરહાજર હતો, કારણ કે તે જીવનની ઉત્પત્તિ પહેલાં હાજર નહોતો. આજના વાતાવરણમાં ઓક્સિજન મહત્ત્વનો ભાગ ભજવે છે, પરંતુ પ્રાથમિક વાતાવરણમાં તે નહોતો.", "ref": "Std 12 - અધ્યાય 7: જીવનની ઉત્પત્તિ અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "કોએસર્વેટ્સના સિદ્ધાંત અનુસાર, જીવનની ઉત્પત્તિ માટે નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["પ્રાથમિક સૂપમાં કાર્બનિક અણુઓનું સાંદ્રણ વધુ હતું", "પ્રાથમિક સૂપમાં ઉત્સેચકોની હાજરી હતી", "પ્રાથમિક સૂપમાં તાપમાન અને દબાણ ઉચ્ચ હતા", "પ્રાથમિક સૂપમાં વિદ્યુત ઝંક અને કિરણોત્સર્ગી શક્તિના સ્ત્રોત હતા"], "ans": 1, "exp": "કોએસર્વેટ્સના સિદ્ધાંત અનુસાર, પ્રાથમિક સૂપમાં કાર્બનિક અણુઓનું સાંદ્રણ વધુ હતું (A), તાપમાન અને દબાણ ઉચ્ચ હતા (C), અને વિદ્યુત ઝંક અને કિરણોત્સર્ગી શક્તિના સ્ત્રોત હતા (D). પરંતુ ઉત્સેચકો (B) પ્રાથમિક સૂપમાં હાજર નહોતા, કારણ કે ઉત્સેચકો જીવંત કોષો દ્વારા જ ઉત્પન્ન થાય છે, જે તે સમયે અસ્તિત્વમાં નહોતા.", "ref": "Std 12 - અધ્યાય 7: જીવનની ઉત્પત્તિ અને ઉત્ક્રાંતિ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
