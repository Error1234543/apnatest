<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>વિઘટકો</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>વિઘટકો</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">વિઘટકો</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 45 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 45 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "વિઘટકોની ક્રિયા દરમિયાન નીચેનામાંથી કયો પદાર્થ સૌથી પહેલા બનાવવામાં આવે છે?", "opts": ["પાયરુવિક એસિડ", "એસિટાઇલ CoA", "સાઇટ્રિક એસિડ", "લેક્ટિક એસિડ"], "ans": 1, "exp": "વિઘટકો (શ્વસન)ની પ્રથમ તબક્કામાં ગ્લૂકોઝનું ગ્લાયકોલિસિસ થાય છે, જેમાં ગ્લૂકોઝ પાયરુવિક એસિડમાં ફેરવાય છે. ત્યારબાદ પાયરુવિક એસિડ એસિટાઇલ CoAમાં રૂપાંતરિત થાય છે, જે ક્રેબ્સ ચક્રમાં પ્રવેશે છે. સાઇટ્રિક એસિડ ક્રેબ્સ ચક્રનો પ્રથમ ઉત્પાદ છે, પરંતુ એસિટાઇલ CoA તે પહેલા બનાવવામાં આવે છે. લેક્ટિક એસિડ અનોક્સિજનિક શ્વસનનો ઉત્પાદ છે, જે વિઘટકોની સંપૂર્ણ પ્રક્રિયાનો ભાગ નથી. અહીં, એસિટાઇલ CoA સૌથી પહેલા બનાવવામાં આવે છે.", "ref": "Std 12 - અધ્યાય 14: શ્વસન અને ઉર્જા ઉત્પાદન", "ch": ""}, {"q": "જો કોઈ કોષમાં સાયટોક્રોમ c ની ઉણપ હોય, તો શ્વસનની કઈ તબક્કા પર અસર થશે?", "opts": ["ગ્લાયકોલિસિસ", "ક્રેબ્સ ચક્ર", "ઇલેક્ટ્રોન વહન શૃંખલા", "સબસ્ટ્રેટ-સ્તર ફોસ્ફોરાઇલેશન"], "ans": 2, "exp": "સાયટોક્રોમ c ઇલેક્ટ્રોન વહન શૃંખલાનો એક મહત્વપૂર્ણ ઘટક છે, જે મિટોકોન્ડ્રિયાના આંતરિક પટલમાં આવેલો છે. તે ઇલેક્ટ્રોનનું વહન કરે છે અને ATP સિંથેઝ માટે પ્રોટોન ગ્રેડિયન્ટ બનાવવામાં મદદ કરે છે. ગ્લાયકોલિસિસ અને ક્રેબ્સ ચક્ર સાયટોક્રોમ c પર આધારિત નથી. સબસ્ટ્રેટ-સ્તર ફોસ્ફોરાઇલેશન ક્રેબ્સ ચક્ર દરમિયાન થાય છે, જે સાયટોક્રોમ c ની ઉણપથી અસરગ્રસ્ત થતું નથી. અહીં, ઇલેક્ટ્રોન વહન શૃંખલા પર અસર થશે.", "ref": "Std 12 - અધ્યાય 14: શ્વસન અને ઉર્જા ઉત્પાદન", "ch": ""}, {"q": "નીચેનામાંથી કયો પદાર્થ વિઘટકો દરમિયાન સીધો જ ATP ઉત્પન્ન કરતો નથી?", "opts": ["ગ્લાયકોલિસિસ", "ક્રેબ્સ ચક્ર", "ઇલેક્ટ્રોન વહન શૃંખલા", "ઓક્સિડેટિવ ફોસ્ફોરાઇલેશન"], "ans": 3, "exp": "ગ્લાયકોલિસિસ અને ક્રેબ્સ ચક્ર દરમિયાન સબસ્ટ્રેટ-સ્તર ફોસ્ફોરાઇલેશન દ્વારા ATP સીધો જ ઉત્પન્ન થાય છે. ઇલેક્ટ્રોન વહન શૃંખલા દરમિયાન પ્રોટોન ગ્રેડિયન્ટ બનાવવામાં આવે છે, જે ઓક્સિડેટિવ ફોસ્ફોરાઇલેશન દ્વારા ATP ઉત્પન્ન કરે છે. ઓક્સિડેટિવ ફોસ્ફોરાઇલેશન એ ઇલેક્ટ્રોન વહન શૃંખલાનો જ એક ભાગ છે, પરંતુ તે સીધો જ ATP ઉત્પન્ન કરતું નથી, પરંતુ પ્રોટોન ગ્રેડિયન્ટ દ્વારા ATP સિંથેઝ કરે છે. અહીં, ઓક્સિડેટિવ ફોસ્ફોરાઇલેશન સીધો જ ATP ઉત્પન્ન કરતું નથી.", "ref": "Std 12 - અધ્યાય 14: શ્વસન અને ઉર્જા ઉત્પાદન", "ch": ""}, {"q": "વિઘટકો દરમિયાન નીચેનામાંથી કયો પદાર્થ સૌથી વધુ ATP ઉત્પન્ન કરે છે?", "opts": ["ગ્લાયકોલિસિસ", "ક્રેબ્સ ચક્ર", "ઇલેક્ટ્રોન વહન શૃંખલા", "ફેરમેન્ટેશન"], "ans": 2, "exp": "ગ્લાયકોલિસિસ દરમિયાન 2 ATP ઉત્પન્ન થાય છે, જ્યારે ક્રેબ્સ ચક્ર દરમિયાન 2 ATP ઉત્પન્ન થાય છે. ઇલેક્ટ્રોન વહન શૃંખલા દરમિયાન ઓક્સિડેટિવ ફોસ્ફોરાઇલેશન દ્વારા લગભગ 28-34 ATP ઉત્પન્ન થાય છે, જે સૌથી વધુ છે. ફેરમેન્ટેશન દરમિયાન માત્ર 2 ATP ઉત્પન્ન થાય છે. અહીં, ઇલેક્ટ્રોન વહન શૃંખલા સૌથી વધુ ATP ઉત્પન્ન કરે છે.", "ref": "Std 12 - અધ્યાય 14: શ્વસન અને ઉર્જા ઉત્પાદન", "ch": ""}, {"q": "નીચેનામાંથી કયો પદાર્થ વિઘટકો દરમિયાન નથી ઉત્પન્ન થતો?", "opts": ["CO2", "H2O", "O2", "ATP"], "ans": 2, "exp": "વિઘટકો (શ્વસન) દરમિયાન ગ્લૂકોઝનું ઓક્સિડેશન થાય છે, જેમાં CO2 અને H2O ઉત્પન્ન થાય છે, અને ATP ઉર્જા રૂપે ઉત્પન્ન થાય છે. O2 વિઘટકો દરમિયાન વપરાય છે, પરંતુ ઉત્પન્ન થતું નથી. અહીં, O2 ઉત્પન્ન થતું નથી.", "ref": "Std 12 - અધ્યાય 14: શ્વસન અને ઉર્જા ઉત્પાદન", "ch": ""}, {"q": "વિઘટકો દરમિયાન, ગ્લાયકોલાઇસિસના પગલામાં કયો ઉત્સેચક પાયરૂવેટને એસિટાઇલ-CoAમાં રૂપાંતરિત કરવા માટે જરૂરી છે?", "opts": ["હેક્સોકિનેઝ", "પાયરૂવેટ ડિહાઇડ્રોજીનેઝ", "ફોસ્ફોફ્રક્ટોકિનેઝ-1", "એલ્ડોલેઝ"], "ans": 1, "exp": "પાયરૂવેટ ડિહાઇડ્રોજીનેઝ ઉત્સેચક પાયરૂવેટને એસિટાઇલ-CoAમાં રૂપાંતરિત કરે છે, જે ક્રેબ્સ ચક્રમાં પ્રવેશે છે. હેક્સોકિનેઝ ગ્લુકોઝને ગ્લુકોઝ-6-ફોસ્ફેટમાં રૂપાંતરિત કરે છે, ફોસ્ફોફ્રક્ટોકિનેઝ-1 ફ્રક્ટોઝ-6-ફોસ્ફેટને ફ્રક્ટોઝ-1,6-બાઇસફોસ્ફેટમાં રૂપાંતરિત કરે છે, અને એલ્ડોલેઝ ફ્રક્ટોઝ-1,6-બાઇસફોસ્ફેટને ગ્લિસરાલ્ડિહાઇડ-3-ફોસ્ફેટ અને ડાઇહાઇડ્રોક્સીએસિટોનમાં તોડે છે.", "ref": "Std 12 - Chapter 14: શ્વસન", "ch": ""}, {"q": "વિઘટકો દરમિયાન, ક્રેબ્સ ચક્રમાં કયો પદાર્થ સીધો જ GTP ઉત્પન્ન કરે છે?", "opts": ["સક્સિનિલ-CoA", "આલ્ફા-કીટોગ્લુટેરેટ", "સિટ્રેટ", "મેલેટ"], "ans": 0, "exp": "સક્સિનિલ-CoA થી સક્સિનેટમાં રૂપાંતરણ દરમિયાન GTP ઉત્પન્ન થાય છે. આલ્ફા-કીટોગ્લુટેરેટ, સિટ્રેટ, અને મેલેટ ક્રેબ્સ ચક્રના અન્ય પગલાંમાં ભાગ લે છે, પરંતુ GTP ઉત્પન્ન કરતા નથી.", "ref": "Std 12 - Chapter 14: શ્વસન", "ch": ""}, {"q": "વિઘટકો દરમિયાન, ઇલેક્ટ્રોન પરિવહન શૃંખલામાં કયો પદાર્થ સીધો જ પાણીનો અણુ બનાવવા માટે ઓક્સિજન સાથે પ્રક્રિયા કરે છે?", "opts": ["NAD+", "FAD", "સાયટોક્રોમ c", "પ્રોટોન (H+)"], "ans": 3, "exp": "ઇલેક્ટ્રોન પરિવહન શૃંખલાના અંતિમ પગલામાં, પ્રોટોન (H+) અને ઇલેક્ટ્રોન ઓક્સિજન સાથે પ્રક્રિયા કરે છે અને પાણીનો અણુ બનાવે છે. NAD+ અને FAD ઇલેક્ટ્રોન વાહકો છે, જ્યારે સાયટોક્રોમ c ઇલેક્ટ્રોન પરિવહન શૃંખલામાં ઇલેક્ટ્રોનનું વહન કરે છે.", "ref": "Std 12 - Chapter 14: શ્વસન", "ch": ""}, {"q": "વિઘટકો દરમિયાન, કયા પદાર્થના ઓક્સિડેશનથી સૌથી વધુ ATP ઉત્પન્ન થાય છે?", "opts": ["ગ્લુકોઝ", "પ્રોટીન", "વસા", "કાર્બોદિત"], "ans": 2, "exp": "વસાના ઓક્સિડેશનથી સૌથી વધુ ATP ઉત્પન્ન થાય છે, કારણ કે વસામાં હાઇડ્રોજન અણુઓની સંખ્યા વધુ હોય છે, જે ઇલેક્ટ્રોન પરિવહન શૃંખલા દ્વારા વધુ ATP ઉત્પન્ન કરે છે. ગ્લુકોઝ, પ્રોટીન, અને કાર્બોદિત ઓક્સિડેશનથી ઓછા ATP ઉત્પન્ન થાય છે.", "ref": "Std 12 - Chapter 14: શ્વસન", "ch": ""}, {"q": "વિઘટકો દરમિયાન, કયો પદાર્થ ક્રેબ્સ ચક્રમાં પ્રવેશતા પહેલા કોઈ રૂપાંતરણ વગર સીધો જ પ્રવેશે છે?", "opts": ["ગ્લુકોઝ", "એસિટાઇલ-CoA", "પાયરૂવેટ", "ફ્રક્ટોઝ"], "ans": 1, "exp": "એસિટાઇલ-CoA ક્રેબ્સ ચક્રમાં સીધો જ પ્રવેશે છે, જ્યારે ગ્લુકોઝ, પાયરૂવેટ, અને ફ્રક્ટોઝને પહેલા એસિટાઇલ-CoAમાં રૂપાંતરિત કરવું પડે છે.", "ref": "Std 12 - Chapter 14: શ્વસન", "ch": ""}, {"q": "વિઘટકો દરમિયાન, જો કોષમાં ઓક્સિજનની અછત હોય તો પાયરૂવેટ નીચેનામાંથી ક્યાં રૂપાંતરિત થાય છે?", "opts": ["એસિટાઇલ-CoA", "લેક્ટિક એસિડ", "સક્સિનિક એસિડ", "સિટ્રિક એસિડ"], "ans": 1, "exp": "ઓક્સિજનની અછતના કિસ્સામાં (અવાયવીય શ્વસન), પાયરૂવેટ લેક્ટિક એસિડમાં રૂપાંતરિત થાય છે. એસિટાઇલ-CoA (A) એ ક્રેબ્સ ચક્રમાં પ્રવેશવા માટે જરૂરી છે, પરંતુ તે ઓક્સિજનની હાજરીમાં જ બનાવવામાં આવે છે. સક્સિનિક એસિડ (C) અને સિટ્રિક એસિડ (D) ક્રેબ્સ ચક્રના મધ્યવર્તી પદાર્થો છે, જેમાં ઓક્સિજનની હાજરી જરૂરી છે.", "ref": "Std 12 - અધ્યાય 14: શ્વસન અને ઉર્જા", "ch": ""}, {"q": "વિઘટકો દરમિયાન, નીચેનામાંથી કયો ઉત્સેચક ક્રેબ્સ ચક્રમાં સક્સિનિક એસિડને ફ્યુમેરિક એસિડમાં રૂપાંતરિત કરે છે?", "opts": ["સક્સિનેટ ડિહાઇડ્રોજનેઝ", "ફ્યુમેરેઝ", "આઇસોસિટ્રેટ ડિહાઇડ્રોજનેઝ", "મેલેટ ડિહાઇડ્રોજનેઝ"], "ans": 0, "exp": "સક્સિનિક એસિડને ફ્યુમેરિક એસિડમાં રૂપાંતરિત કરવા માટે સક્સિનેટ ડિહાઇડ્રોજનેઝ (A) ઉત્સેચક જવાબદાર છે. ફ્યુમેરેઝ (B) ફ્યુમેરિક એસિડને મેલિક એસિડમાં રૂપાંતરિત કરે છે. આઇસોસિટ્રેટ ડિહાઇડ્રોજનેઝ (C) આઇસોસિટ્રેટને α-કીટોગ્લુટેરિક એસિડમાં રૂપાંતરિત કરે છે. મેલેટ ડિહાઇડ્રોજનેઝ (D) મેલિક એસિડને ઓક્સાલોએસિટિક એસિડમાં રૂપાંતરિત કરે છે.", "ref": "Std 12 - અધ્યાય 14: શ્વસન અને ઉર્જા", "ch": ""}, {"q": "વિઘટકો દરમિયાન, નીચેનામાંથી કયો પદાર્થ ક્રેબ્સ ચક્રમાં પ્રવેશતા પહેલા કોઈ રૂપાંતરણ વગર સીધો જ પ્રવેશે છે?", "opts": ["ગ્લુકોઝ", "એસિટાઇલ-CoA", "પાયરૂવેટ", "ફ્રક્ટોઝ"], "ans": 1, "exp": "એસિટાઇલ-CoA (B) ક્રેબ્સ ચક્રમાં સીધો જ પ્રવેશે છે, કારણ કે તે પહેલેથી જ એસિટાઇલ સમૂહ સાથે જોડાયેલું હોય છે. ગ્લુકોઝ (A) અને ફ્રક્ટોઝ (D) ગ્લાયકોલાઇસિસ દ્વારા પાયરૂવેટમાં રૂપાંતરિત થાય છે. પાયરૂવેટ (C) એસિટાઇલ-CoAમાં રૂપાંતરિત થાય છે તે પહેલાં ક્રેબ્સ ચક્રમાં પ્રવેશી શકતું નથી.", "ref": "Std 12 - અધ્યાય 14: શ્વસન અને ઉર્જા", "ch": ""}, {"q": "વિઘટકો દરમિયાન, ઇલેક્ટ્રોન પરિવહન શૃંખલામાં, નીચેનામાંથી કયો પદાર્થ સીધો જ ATP સિંથેઝ સાથે સંકળાયેલો નથી?", "opts": ["સાયટોક્રોમ b", "સાયટોક્રોમ c", "સાયટોક્રોમ a", "સાયટોક્રોમ a3"], "ans": 0, "exp": "સાયટોક્રોમ b (A) ઇલેક્ટ્રોન પરિવહન શૃંખલાનો ભાગ છે, પરંતુ તે સીધો જ ATP સિંથેઝ સાથે સંકળાયેલો નથી. સાયટોક્રોમ c (B), સાયટોક્રોમ a (C), અને સાયટોક્રોમ a3 (D) ઇલેક્ટ્રોન પરિવહન શૃંખલાના અંતિમ તબક્કામાં ભાગ લે છે અને ATP સિંથેઝ સાથે સંકળાયેલા છે.", "ref": "Std 12 - અધ્યાય 14: શ્વસન અને ઉર્જા", "ch": ""}, {"q": "વિઘટકો દરમિયાન, નીચેનામાંથી કયો પદાર્થ ક્રેબ્સ ચક્રમાં ઉત્પન્ન થતો નથી?", "opts": ["NADH", "FADH2", "GTP", "ATP"], "ans": 3, "exp": "ક્રેબ્સ ચક્રમાં NADH (A), FADH2 (B), અને GTP (C) ઉત્પન્ન થાય છે, પરંતુ ATP (D) સીધો જ ક્રેબ્સ ચક્રમાં ઉત્પન્ન થતો નથી. GTP પછી ATPમાં રૂપાંતરિત થાય છે.", "ref": "Std 12 - અધ્યાય 14: શ્વસન અને ઉર્જા", "ch": ""}, {"q": "વિઘટક પ્રક્રિયા દરમિયાન, જો કોષમાં ફ્લોરાઇડ (F⁻) ની હાજરી હોય, તો નીચેનામાંથી કયા ઉત્સેચકની ક્રિયા અવરોધાય છે, જેના કારણે ગ્લાયકોલાઇસિસ અટકી જાય છે?", "opts": ["હેક્સોકિનેઝ", "ફોસ્ફોફ્રક્ટોકિનેઝ-1", "એનોલેઝ", "પાયરૂવેટ કિનેઝ"], "ans": 2, "exp": "ફ્લોરાઇડ (F⁻) એનોલેઝ ઉત્સેચકની ક્રિયાને અવરોધે છે, જે 2-ફોસ્ફોગ્લિસરિક એસિડને ફોસ્ફોઇનોલપાયરૂવેટમાં રૂપાંતરિત કરે છે. આથી ગ્લાયકોલાઇસિસ પ્રક્રિયા અટકી જાય છે. હેક્સોકિનેઝ (A), ફોસ્ફોફ્રક્ટોકિનેઝ-1 (B), અને પાયરૂવેટ કિનેઝ (D) ફ્લોરાઇડ દ્વારા અવરોધાતા નથી.", "ref": "Std 12 - પ્રકરણ 9: શ્વસન", "ch": ""}, {"q": "વિઘટક પ્રક્રિયા દરમિયાન, ક્રેબ્સ ચક્રમાં સક્સિનિલ-CoA થી સક્સિનિક એસિડમાં રૂપાંતરણ દરમિયાન કયો પદાર્થ ઉત્પન્ન થાય છે, જે ગ્લાયકોલાઇસિસમાં વપરાતો નથી?", "opts": ["GTP", "NADH", "FADH₂", "ATP"], "ans": 0, "exp": "સક્સિનિલ-CoA થી સક્સિનિક એસિડમાં રૂપાંતરણ દરમિયાન GTP ઉત્પન્ન થાય છે, જે પછી ATPમાં રૂપાંતરિત થાય છે. NADH (B), FADH₂ (C) ક્રેબ્સ ચક્રના અન્ય પગલામાં ઉત્પન્ન થાય છે, પરંતુ GTP સક્સિનિલ-CoA થી સક્સિનિક એસિડના રૂપાંતરણ દરમિયાન જ ઉત્પન્ન થાય છે. ATP (D) સીધો જ ઉત્પન્ન થતો નથી.", "ref": "Std 12 - પ્રકરણ 9: શ્વસન", "ch": ""}, {"q": "વિઘટક પ્રક્રિયા દરમિયાન, જો કોષમાં સાયનાઇડ (CN⁻) ની હાજરી હોય, તો નીચેનામાંથી કયા પદાર્થનું સંશ્લેષણ સંપૂર્ણ રીતે અટકી જાય છે?", "opts": ["પાયરૂવેટ", "એસિટાઇલ-CoA", "ATP", "NADH"], "ans": 2, "exp": "સાયનાઇડ (CN⁻) ઇલેક્ટ્રોન પરિવહન શૃંખલાના સાયટોક્રોમ c ઓક્સિડેઝ ઉત્સેચકને અવરોધે છે, જેના કારણે ATP નું સંશ્લેષણ અટકી જાય છે. પાયરૂવેટ (A) અને એસિટાઇલ-CoA (B) ગ્લાયકોલાઇસિસ અને પાયરૂવેટ ઓક્સિડેશન દરમિયાન ઉત્પન્ન થાય છે, જ્યારે NADH (D) ક્રેબ્સ ચક્ર અને ગ્લાયકોલાઇસિસ દરમિયાન ઉત્પન્ન થાય છે, પરંતુ ATP નું સંશ્લેષણ સાયનાઇડ દ્વારા અવરોધાય છે.", "ref": "Std 12 - પ્રકરણ 9: શ્વસન", "ch": ""}, {"q": "વિઘટક પ્રક્રિયા દરમિયાન, નીચેનામાંથી કયો પદાર્થ ક્રેબ્સ ચક્રમાં પ્રવેશતા પહેલા એસિટાઇલ-CoAમાં રૂપાંતરિત થવું જરૂરી છે?", "opts": ["ગ્લુકોઝ", "ફ્રક્ટોઝ", "પાયરૂવેટ", "લેક્ટિક એસિડ"], "ans": 2, "exp": "પાયરૂવેટ એ ક્રેબ્સ ચક્રમાં પ્રવેશતા પહેલા એસિટાઇલ-CoAમાં રૂપાંતરિત થવું જરૂરી છે. ગ્લુકોઝ (A) અને ફ્રક્ટોઝ (B) ગ્લાયકોલાઇસિસ દરમિયાન પાયરૂવેટમાં રૂપાંતરિત થાય છે, જ્યારે લેક્ટિક એસિડ (D) અસંપૂર્ણ શ્વસન દરમિયાન ઉત્પન્ન થાય છે અને ક્રેબ્સ ચક્રમાં પ્રવેશતું નથી.", "ref": "Std 12  દરમિયાન, જો કોષમાં 2,4-ડાઇનાઇટ્રોફિનોલ (DNP) હાજર હોય, તો ઇલેક્ટ્રોન પરિવહન શૃંખલામાં કયા પગલામાં અવરોધ ઉત્પન્ન થાય છે અને તેના કારણે કયા પરિણામની શક્યતા રહે છે?", "opts": ["ATP સિંથેઝ, ઓક્સિડેટિવ ફોસ્ફોરાઇલેશનનો અવરોધ", "કોમ્પ્લેક્સ I, NADH નું ઓક્સિડેશન અવરોધાય", "કોમ્પ્લેક્સ IV, ઓક્સિજનનો ઉપયોગ અવરોધાય", "કોમ્પ્લેક્સ II, FADH₂ નું ઓક્સિડેશન અવરોધાય"], "ans": 0, "exp": "2,4-ડાઇનાઇટ્રોફિનોલ (DNP) ATP સિંથેઝને અવરોધે છે, જેના કારણે ઓક્સિડેટિવ ફોસ્ફોરાઇલેશન અવરોધાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) DNP કોમ્પ્લેક્સ I ને અવરોધતો નથી, C) DNP કોમ્પ્લેક્સ IV ને અવરોધતો નથી, D) DNP કોમ્પ્લેક્સ II ને અવરોધતો નથી.", "ref": "Std 12 - અધ્યાય 14: શ્વસન અને ઉર્જા ઉત્પાદન", "ch": ""}, {"q": "વિઘટક પ્રક્રિયા દરમિયાન, જો કોષમાં આર્સેનિક (As) હાજર હોય, તો ક્રેબ્સ ચક્રમાં કયા ઉત્સેચકની ક્રિયા અવરોધાય છે અને તેના કારણે કયા પદાર્થનું સંગ્રહણ થાય છે?", "opts": ["પાયરૂવેટ ડિહાઇડ્રોજીનેઝ, પાયરૂવેટ", "આલ્ફા-કીટોગ્લુટારેટ ડિહાઇડ્રોજીનેઝ, આલ્ફા-કીટોગ્લુટારિક એસિડ", "સક્સિનેટ ડિહાઇડ્રોજીનેઝ, સક્સિનિક એસિડ", "આયસોસિટ્રેટ ડિહાઇડ્રોજીનેઝ, આયસોસિટ્રિક એસિડ"], "ans": 1, "exp": "આર્સેનિક (As) આલ્ફા-કીટોગ્લુટારેટ ડિહાઇડ્રોજીનેઝ ઉત્સેચકને અવરોધે છે, જેના કારણે આલ્ફા-કીટોગ્લુટારિક એસિડનું સંગ્રહણ થાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: A) આર્સેનિક પાયરૂવેટ ડિહાઇડ્રોજીનેઝને અવરોધતો નથી, C) આર્સેનિક સક્સિનેટ ડિહાઇડ્રોજીનેઝને અવરોધતો નથી, D) આર્સેનિક આયસોસિટ્રેટ ડિહાઇડ્રોજીનેઝને અવરોધતો નથી.", "ref": "Std 12 - અધ્યાય 14: શ્વસન અને ઉર્જા ઉત્પાદન", "ch": ""}, {"q": "વિઘટક પ્રક્રિયા દરમિયાન, જો કોષમાં ફ્લોરોએસિટેટ હાજર હોય, તો ક્રેબ્સ ચક્રમાં કયા પદાર્થનું સંગ્રહણ થાય છે અને તે કયા ઉત્સેચકની ક્રિયા દ્વારા અવરોધાય છે?", "opts": ["સિટ્રિક એસિડ, સિટ્રેટ સિંથેઝ", "આયસોસિટ્રિક એસિડ, આયસોસિટ્રેટ ડિહાઇડ્રોજીનેઝ", "સક્સિનિક એસિડ, સક્સિનેટ ડિહાઇડ્રોજીનેઝ", "ફ્યુમેરિક એસિડ, ફ્યુમેરેઝ"], "ans": 0, "exp": "ફ્લોરોએસિટેટ સિટ્રેટ સિંથેઝ ઉત્સેચકને અવરોધે છે, જેના કારણે સિટ્રિક એસિડનું સંગ્રહણ થાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) ફ્લોરોએસિટેટ આયસોસિટ્રેટ ડિહાઇડ્રોજીનેઝને અવરોધતો નથી, C) ફ્લોરોએસિટેટ સક્સિનેટ ડિહાઇડ્રોજીનેઝને અવરોધતો નથી, D) ફ્લોરોએસિટેટ ફ્યુમેરેઝને અવરોધતો નથી.", "ref": "Std 12 - અધ્યાય 14: શ્વસન અને ઉર્જા ઉત્પાદન", "ch": ""}, {"q": "વિઘટક પ્રક્રિયા દરમિયાન, જો કોષમાં મોનોયોડોએસિટેટ (MIA) હાજર હોય, તો ક્રેબ્સ ચક્રમાં કયા ઉત્સેચકની ક્રિયા અવરોધાય છે?", "opts": ["સાયટ્રેટ સિંથેઝ", "આઇસોસાયટ્રેટ ડિહાઇડ્રોજીનેઝ", "એકોનિટેઝ", "સક્સિનેટ ડિહાઇડ્રોજીનેઝ"], "ans": 1, "exp": "મોનોયોડોએસિટેટ (MIA) એ ક્રેબ્સ ચક્રમાં આઇસોસાયટ્રેટ ડિહાઇડ્રોજીનેઝ ઉત્સેચકની ક્રિયાને અવરોધે છે, જેનાથી આઇસોસાયટ્રેટનું એલ્ફા-કીટોગ્લુટેરેટમાં રૂપાંતરણ થતું નથી. સાયટ્રેટ સિંથેઝ (A) એસિટાઇલ-CoA અને ઓક્સાલોએસિટેટને સાયટ્રેટમાં રૂપાંતરિત કરે છે, એકોનિટેઝ (C) સાયટ્રેટને આઇસોસાયટ્રેટમાં રૂપાંતરિત કરે છે, અને સક્સિનેટ ડિહાઇડ્રોજીનેઝ (D) સક્સિનેટને ફ્યુમેરેટમાં રૂપાંતરિત કરે છે, જે MIA દ્વારા અવરોધાતા નથી.", "ref": "Std 12 - અધ્યાય 14: શ્વસન અને ઉર્જા વહન", "ch": ""}, {"q": "વિઘટક પ્રક્રિયા દરમિયાન, જો કોષમાં એન્ટિમાઇસિન A હાજર હોય, તો ઇલેક્ટ્રોન પરિવહન શૃંખલામાં કયા સંકીર્ણની ક્રિયા અવરોધાય છે?", "opts": ["સંકીર્ણ I (NADH ડિહાઇડ્રોજીનેઝ)", "સંકીર્ણ II (સક્સિનેટ ડિહાઇડ્રોજીનેઝ)", "સંકીર્ણ III (સાયટોક્રોમ bc1)", "સંકીર્ણ IV (સાયટોક્રોમ c ઓક્સિડેઝ)"], "ans": 2, "exp": "એન્ટિમાઇસિન A એ ઇલેક્ટ્રોન પરિવહન શૃંખલાના સંકીર્ણ III (સાયટોક્રોમ bc1) ની ક્રિયાને અવરોધે છે, જેનાથી ઇલેક્ટ્રોનનો પ્રવાહ Q થી સાયટોક્રોમ c તરફ અટકી જાય છે. સંકીર્ણ I (A) અને II (B) એન્ટિમાઇસિન A દ્વારા અવરોધાતા નથી, જ્યારે સંકીર્ણ IV (D) એ સાયનાઇડ જેવા અન્ય અવરોધકો દ્વારા અવરોધાય છે.", "ref": "Std 12 - અધ્યાય 14: શ્વસન અને ઉર્જા વહન", "ch": ""}, {"q": "વિઘટક પ્રક્રિયા દરમિયાન, જો કોષમાં મેલોનેટ હાજર હોય, તો ક્રેબ્સ ચક્રમાં કયા પદાર્થનું સંકલન થતું નથી?", "opts": ["સાયટ્રેટ", "આલ્ફા-કીટોગ્લુટેરેટ", "સક્સિનિલ-CoA", "ફ્યુમેરેટ"], "ans": 0, "exp": "મેલોનેટ એ સાયટ્રેટ સિંથેઝ ઉત્સેચકને અવરોધે છે, જેનાથી એસિટાઇલ-CoA અને ઓક્સાલોએસિટેટનું સાયટ્રેટમાં રૂપાંતરણ થતું નથી. આલ્ફા-કીટોગ્લુટેરેટ (B), સક્સિનિલ-CoA (C), અને ફ્યુમેરેટ (D) ના સંકલન પર મેલોનેટનો સીધો પ્રભાવ પડતો નથી.", "ref": "Std 12 - અધ્યાય 14: શ્વસન અને ઉર્જા વહન", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લો અને સાચો વિકલ્પ પસંદ કરો:\n(1) વિઘટકો દરમિયાન, કેટલાક બેક્ટેરિયા લિથોટ્રોફિક શ્વસન દ્વારા અકાર્બનિક પદાર્થોનું ઓક્સિડેશન કરીને ATP ઉત્પન્ન કરે છે.\n(2) ફૂગ અને બેક્ટેરિયા બંને વિઘટકો તરીકે કાર્ય કરે છે, પરંતુ ફૂગ માત્ર અજારક શ્વસન દ્વારા જ કાર્બનિક પદાર્થોનું વિઘટન કરે છે.\n(3) વિઘટકો દ્વારા કાર્બનિક પદાર્થોનું વિઘટન થવાથી કાર્બન ડાયોક્સાઇડ અને પાણી ઉપરાંત નાઇટ્રોજન, ફોસ્ફરસ અને સલ્ફર જેવા પોષક તત્ત્વો પણ પર્યાવરણમાં પાછા ફરે છે.\n(4) વિઘટકો દરમિયાન, કેટલાક બેક્ટેરિયા ડિનાઇટ્રિફિકેશન પ્રક્રિયા દ્વારા નાઇટ્રેટને નાઇટ્રોજન વાયુમાં રૂપાંતરિત કરે છે, જે વાતાવરણમાં પાછો ફરે છે.", "opts": ["વિધાન 1, 2 અને 3 સાચાં છે, પરંતુ 4 ખોટું છે", "વિધાન 1, 3 અને 4 સાચાં છે, પરંતુ 2 ખોટું છે", "વિધાન 2 અને 4 સાચાં છે, પરંતુ 1 અને 3 ખોટાં છે", "બધાં જ વિધાનો સાચાં છે"], "ans": 1, "exp": "વિધાન 1 સાચું છે કારણ કે કેટલાક બેક્ટેરિયા લિથોટ્રોફિક શ્વસન દ્વારા અકાર્બનિક પદાર્થોનું ઓક્સિડેશન કરીને ATP ઉત્પન્ન કરે છે. વિધાન 2 ખોટું છે કારણ કે ફૂગ અજારક શ્વસન ઉપરાંત સારક શ્વસન પણ કરી શકે છે. વિધાન 3 સાચું છે કારણ કે વિઘટકો કાર્બનિક પદાર્થોનું વિઘટન કરીને કાર્બન ડાયોક્સાઇડ અને પાણી ઉપરાંત અન્ય પોષક તત્ત્વો પણ પર્યાવરણમાં મુક્ત કરે છે. વિધાન 4 સાચું છે કારણ કે કેટલાક બેક્ટેરિયા ડિનાઇટ્રિફિકેશન પ્રક્રિયા દ્વારા નાઇટ્રેટને નાઇટ્રોજન વાયુમાં રૂપાંતરિત કરે છે.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન વિઘટકોની પ્રક્રિયા અને તેમની ભૂમિકા માટે અયોગ્ય છે?\n(નોંધ: એક કરતાં વધુ વિકલ્પ સાચા હોઈ શકે છે, પરંતુ માત્ર એક જ વિકલ્પ સંપૂર્ણપણે અયોગ્ય છે.)", "opts": ["વિઘટકો દ્વારા કાર્બનિક પદાર્થોનું વિઘટન થવાથી કાર્બન ચક્રમાં કાર્બન ડાયોક્સાઇડનું પ્રમાણ વધે છે, જે પ્રકાશસંશ્લેષણ માટે જરૂરી છે", "વિઘટકો દ્વારા નાઇટ્રોજનયુક્ત કાર્બનિક પદાર્થોનું વિઘટન થવાથી એમોનિયા ઉત્પન્ન થાય છે, જે નાઇટ્રિફિકેશન બેક્ટેરિયા દ્વારા નાઇટ્રેટમાં રૂપાંતરિત થાય છે", "વિઘટકો દરમિયાન, ફૂગ અને બેક્ટેરિયા બંને સેલ્યુલોઝ અને લિગ્નિન જેવા જટિલ કાર્બનિક પદાર્થોનું વિઘટન કરી શકે છે, પરંતુ માત્ર ફૂગ જ કાઇટિનનું વિઘટન કરી શકે છે", "વિઘટકો દ્વારા કાર્બનિક પદાર્થોનું વિઘટન થવાથી માટીમાં હ્યુમસનું નિર્માણ થાય છે, જે માટીની ફળદ્રુપતા વધારે છે અને છોડના વિકાસ માટે જરૂરી પોષક તત્ત્વો પૂરા પાડે છે"], "ans": 2, "exp": "વિકલ્પ A, B અને D સાચાં છે કારણ કે વિઘટકો કાર્બન ચક્રમાં કાર્બન ડાયોક્સાઇડનું પ્રમાણ વધારે છે, નાઇટ્રોજનયુક્ત પદાર્થોનું વિઘટન કરીને એમોનિયા ઉત્પન્ન કરે છે અને હ્યુમસનું નિર્માણ કરીને માટીની ફળદ્રુપતા વધારે છે. વિકલ્પ C અયોગ્ય છે કારણ કે ફૂગ ઉપરાંત કેટલાક બેક્ટેરિયા પણ કાઇટિનનું વિઘટન કરી શકે છે, જેમ કે *Streptomyces* પ્રજાતિના બેક્ટેરિયા.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ અને Std 11 - પ્રકરણ 12: ખનીજ પોષણ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન વિઘટકો (catabolism) અને અપચય (anabolism) વચ્ચેના સંબંધ માટે ખોટું છે?", "opts": ["વિઘટકો દરમિયાન મુક્ત થતી ઊર્જા અપચય પ્રક્રિયાઓ માટે ઉપયોગમાં લેવાય છે", "વિઘટકો અને અપચય બંને માટે સમાન ઉત્સેચકોનો ઉપયોગ થાય છે, પરંતુ તેમની દિશા ભિન્ન હોય છે", "વિઘટકો દરમિયાન મોટા અણુઓનું નાના અણુઓમાં વિઘટન થાય છે, જ્યારે અપચયમાં નાના અણુઓમાંથી મોટા અણુઓનું નિર્માણ થાય છે", "વિઘટકો અને અપચય બંને પ્રક્રિયાઓ એક જ કોષીય અંગિકામાં એક સાથે થાય છે"], "ans": 3, "exp": "વિઘટકો અને અપચય બંને પ્રક્રિયાઓ એક જ કોષીય અંગિકામાં એક સાથે થતી નથી. વિઘટકો મુખ્યત્વે મિટોકોન્ડ્રિયામાં થાય છે, જ્યારે અપચય પ્રક્રિયાઓ કોષરસ અને અન્ય અંગિકાઓમાં થાય છે. વિકલ્પ A, B અને C સાચા છે કારણ કે વિઘટકોમાં મુક્ત થતી ઊર્જા અપચય માટે ઉપયોગી છે, ઉત્સેચકોની દિશા ભિન્ન હોય છે અને બંને પ્રક્રિયાઓ અલગ-અલગ કાર્યો કરે છે.", "ref": "Std 11 - પ્રકરણ 14: પ્રાણીઓમાં શ્વસન અને ચયાપચય", "ch": ""}, {"q": "નીચેના પૈકી કયો પદાર્થ વિઘટકો દરમિયાન ઇલેક્ટ્રોન પરિવહન શૃંખલામાં સીધો જ પ્રોટોન ગ્રેડિયન્ટ બનાવવામાં ભાગ લેતો નથી?", "opts": ["NADH", "FADH₂", "સાયટોક્રોમ c", "એસિટાઇલ-CoA"], "ans": 3, "exp": "એસિટાઇલ-CoA વિઘટકો દરમિયાન ક્રેબ્સ ચક્રમાં પ્રવેશે છે, પરંતુ તે ઇલેક્ટ્રોન પરિવહન શૃંખલામાં સીધો જ પ્રોટોન ગ્રેડિયન્ટ બનાવવામાં ભાગ લેતો નથી. NADH અને FADH₂ ઇલેક્ટ્રોન દાતા તરીકે કાર્ય કરે છે, જ્યારે સાયટોક્રોમ c ઇલેક્ટ્રોન વાહક તરીકે કામ કરે છે.", "ref": "Std 12 - પ્રકરણ 14: શ્વસન અને ઊર્જા ચયાપચય", "ch": ""}, {"q": "વિઘટકો દરમિયાન, જો કોષમાં  કયો પદાર્થ ક્રેબ્સ ચક્રમાં સંગ્રહ પામશે?", "opts": ["સક્સિનિક એસિડ", "ફ્યુમેરિક એસિડ", "મેલિક એસિડ", "આલ્ફા-કીટોગ્લુટારિક એસિડ"], "ans": 0, "exp": "સક્સિનેટ ડિહાઇડ્રોજીનેઝ ઉત્સેચક સક્સિનિક એસિડને ફ્યુમેરિક એસિડમાં રૂપાંતરિત કરે છે. જો આ ઉત્સેચક અવરોધાય, તો સક્સિનિક એસિડ ક્રેબ્સ ચક્રમાં સંગ્રહ પામશે. બાકીના વિકલ્પો (ફ્યુમેરિક એસિડ, મેલિક એસિડ, આલ્ફા-કીટોગ્લુટારિક એસિડ) આ પગલાના પહેલા અથવા પછીના પદાર્થો છે, પરંતુ સક્સિનિક એસિડ જ સંગ્રહ પામશે.", "ref": "Std 12 - Chapter 14: શ્વસન અને ઉર્જા", "ch": ""}, {"q": "વિઘટક પ્રક્રિયા દરમિયાન, જો કોષમાં એસિટાઇલ-CoA ની માત્રા અચાનક વધી જાય, તો નીચેનામાંથી કયો પદાર્થ ક્રેબ્સ ચક્રમાં ઓછો ઉત્પન્ન થશે?", "opts": ["સાઇટ્રિક એસિડ", "ઓક્સાલોએસિટિક એસિડ", "આલ્ફા-કીટોગ્લુટારિક એસિડ", "સક્સિનિલ-CoA"], "ans": 1, "exp": "એસિટાઇલ-CoA ની વધુ માત્રા ક્રેબ્સ ચક્રમાં ઓક્સાલોએસિટિક એસિડ સાથે જોડાઈને સાઇટ્રિક એસિડ બનાવે છે. પરંતુ જો એસિટાઇલ-CoA ની માત્રા અતિ વધારે હોય, તો ઓક્સાલોએસિટિક એસિડની માત્રા ઘટશે, કારણ કે તે સતત વપરાશે. બાકીના વિકલ્પો (સાઇટ્રિક એસિડ, આલ્ફા-કીટોગ્લુટારિક એસિડ, સક્સિનિલ-CoA) એસિટાઇલ-CoA ના વપરાશથી ઉત્પન્ન થતા પદાર્થો છે, પરંતુ ઓક્સાલોએસિટિક એસિડ જ ઓછો ઉત્પન્ન થશે.", "ref": "Std 12 - Chapter 14: શ્વસન અને ઉર્જા", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન વિઘટકો (catabolism) અને ઉત્સર્ગ પ્રક્રિયા (excretion) વચ્ચેના સંબંધ માટે ખોટું છે?", "opts": ["વિઘટકો દરમિયાન ઉત્પન્ન થતા કેટલાક નાઇટ્રોજનયુક્ત ઉત્સર્ગ પદાર્થો યુરિયા ચક્ર દ્વારા શરીરમાંથી દૂર કરવામાં આવે છે.", "વિઘટકો દરમિયાન ઉત્પન્ન થતો કાર્બન ડાયોક્સાઇડ શ્વસનતંત્ર દ્વારા શરીરમાંથી બહાર કાઢવામાં આવે છે.", "વિઘટકો દરમિયાન ઉત્પન્ન થતો એમોનિયા સીધો જ મૂત્ર દ્વારા શરીરમાંથી બહાર નીકળે છે.", "વિઘટકો દરમિયાન ઉત્પન્ન થતા ક્રિએટિનિનનું ઉત્સર્જન મૂત્રપિંડ દ્વારા થાય છે."], "ans": 2, "exp": "વિઘટકો દરમિયાન ઉત્પન્ન થતો એમોનિયા સીધો જ શરીરમાંથી બહાર નીકળતો નથી, કારણ કે તે ઝેરી હોય છે. તે યકૃતમાં યુરિયા ચક્ર દ્વારા યુરિયામાં રૂપાંતરિત થાય છે અને પછી મૂત્ર દ્વારા ઉત્સર્જિત થાય છે. બાકીના વિકલ્પો સાચા છે: કાર્બન ડાયોક્સાઇડ શ્વસનતંત્ર દ્વારા, યુરિયા અને ક્રિએટિનિન મૂત્રપિંડ દ્વારા ઉત્સર્જિત થાય છે.", "ref": "Std 11 - પ્રકરણ 14: શ્વસન અને ગેસ વિનિમય, Std 11 - પ્રકરણ 19: ઉત્સર્ગ પદાર્થો અને તેમનું નિકાલ", "ch": ""}, {"q": "નીચેના પૈકી કયો પદાર્થ વિઘટકો દરમિયાન ઉત્પન્ન થતો નથી, પરંતુ અપચય (anabolism) દરમિયાન મહત્વપૂર્ણ ભૂમિકા ભજવે છે?", "opts": ["NADPH", "NADH", "FADH₂", "ATP"], "ans": 0, "exp": "NADPH વિઘટકો દરમિયાન ઉત્પન્ન થતો નથી, પરંતુ તે અપચય (anabolism) દરમિયાન જૈવસંશ્લેષણ પ્રક્રિયાઓ માટે મહત્વપૂર્ણ રિડ્યુસિંગ પાવર પૂરો પાડે છે. NADH અને FADH₂ વિઘટકો દરમિયાન ઇલેક્ટ્રોન પરિવહન શૃંખલામાં ઉત્પન્ન થાય છે, જ્યારે ATP વિઘટકો અને અપચય બંને દરમિયાન ઉર્જા ચલણ તરીકે કામ કરે છે.", "ref": "Std 11 - પ્રકરણ 13: ઉચ્ચ કક્ષાના સજીવોમાં પ્રકાશસંશ્લેષણ અને શ્વસન, Std 12 - પ્રકરણ 9: બાયોએનર્જેટિક્સ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન વિઘટકો (catabolism) અને ઉત્સર્જન (excretion) વચ્ચેના સંબંધ માટે ખોટું છે?", "opts": ["વિઘટકો દરમિયાન ઉત્પન્ન થતા નાઇટ્રોજનયુક્ત ઉત્સર્ગ પદાર્થો મુખ્યત્વે યુરિયા, યુરિક એસિડ અને એમોનિયા સ્વરૂપે ઉત્સર્જિત થાય છે.", "વિઘટકો દરમિયાન ઉત્પન્ન થતો કાર્બન ડાયોક્સાઇડ શ્વસનતંત્ર દ્વારા ઉત્સર્જિત થાય છે, જે ઉત્સર્જનનો એક ભાગ છે.", "વિઘટકો દરમિયાન ઉત્પન્ન થતા પાણીનો ઉપયોગ કોષમાં જ થાય છે અને તે ક્યારેય ઉત્સર્જિત થતું નથી.", "વિઘટકો દરમિયાન ઉત્પન્ન થતા કેટલાક ઝેરી પદાર્થો યકૃત દ્વારા ડિટોક્સિફાઇ થઈ મૂત્ર દ્વારા ઉત્સર્જિત થાય છે."], "ans": 2, "exp": "વિકલ્પ C ખોટો છે કારણ કે વિઘટકો દરમિયાન ઉત્પન્ન થતું પાણી કોષમાં ઉપયોગમાં લેવાય છે, પરંતુ વધારાનું પાણી મૂત્ર, પરસેવો અને શ્વાસ દ્વારા ઉત્સર્જિત થાય છે. બાકીના વિકલ્પો સાચા છે: A) નાઇટ્રોજનયુક્ત ઉત્સર્ગ પદાર્થો યુરિયા, યુરિક એસિડ અને એમોનિયા સ્વરૂપે ઉત્સર્જિત થાય છે. B) કાર્બન ડાયોક્સાઇડ શ્વસનતંત્ર દ્વારા ઉત્સર્જિત થાય છે. D) ઝેરી પદાર્થો યકૃત દ્વારા ડિટોક્સિફાઇ થઈ મૂત્ર દ્વારા ઉત્સર્જિત થાય છે.", "ref": "Std 12 - પ્રકરણ 14: ઉત્સર્જન અને ઓસ્મોરેગ્યુલેશન", "ch": ""}, {"q": "વિઘટક પ્રક્રિયા દરમિયાન, જો કોષમાં સાયટોક્રોમ c ઓક્સિડેઝ ઉત્સેચકને અવરોધવામાં આવે, તો નીચેનામાંથી કયો પદાર્થનો સંગ્રહ થશે?", "opts": ["પાયરૂવેટ", "સક્સિનિક એસિડ", "સાયટોક્રોમ a", "એસિટાઇલ-CoA"], "ans": 2, "exp": "સાયટોક્રોમ c ઓક્સિડેઝ ઉત્સેચક ઇલેક્ટ્રોન પરિવહન શૃંખલાનો અંતિમ તબક્કો છે, જે સાયટોક્રોમ a ને ઓક્સિડાઇઝ કરે છે. જો આ ઉત્સેચક અવરોધાય, તો સાયટોક્રોમ a નું ઓક્સિડેશન થતું નથી અને તેનો સંગ્રહ થાય છે. પાયરૂવેટ (A) ગ્લાયકોલાઇસિસનો અંતિમ ઉત્પાદન છે, સક્સિનિક એસિડ (B) ક્રેબ્સ ચક્રનો મધ્યવર્તી પદાર્થ છે, અને એસિટાઇલ-CoA (D) ક્રેબ્સ ચક્રમાં પ્રવેશતા પહેલાનો પદાર્થ છે, પરંતુ આમાંથી કોઈપણ સાયટોક્રોમ c ઓક્સિડેઝના અવરોધથી સીધો અસરગ્રસ્ત થતો નથી.", "ref": "Std 12 - Chapter 14: શ્વસન અને ઉર્જા", "ch": ""}, {"q": "વિઘટક પ્રક્રિયા દરમિયાન, જો કોષમાં રોટેનોન હાજર હોય, તો નીચેનામાંથી કયો પદાર્થ ક્રેબ્સ ચક્રમાં સંગ્રહ પામશે?", "opts": ["NADH અને FADH2", "ATP", "ADP", "ઓક્સિજન"], "ans": 0, "exp": "રોટેનોન ઇલેક્ટ્રોન પરિવહન શૃંખલાનો અવરોધક છે, જે NADH ડિહાઇડ્રોજીનેઝને અવરોધે છે. આના કારણે NADH અને FADH2 નું ઓક્સિડેશન અટકી જાય છે, જેથી તે ક્રેબ્સ ચક્રમાં સંગ્રહ પામે છે. ATP, ADP, અને ઓક્સિજનનો સંગ્રહ થતો નથી.", "ref": "Std 12 - Chapter 14: શ્વસન (Respiration)", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન વિઘટકો (catabolism) અને ઉર્જા મુક્તિ વચ્ચેના સંબંધ માટે અયોગ્ય છે?", "opts": ["વિઘટક પ્રક્રિયાઓ દરમિયાન જટિલ કાર્બનિક અણુઓનું સરળ અણુઓમાં રૂપાંતરણ થાય છે, જે દરમિયાન ઉર્જા મુક્ત થાય છે.", "ગ્લાયકોલાઇસિસ દરમિયાન ગ્લુકોઝનું પાયરૂવેટમાં રૂપાંતરણ થાય છે, જે દરમિયાન ATP અને NADH ઉત્પન્ન થાય છે.", "વિઘટક પ્રક્રિયાઓ દરમિયાન ઉત્પન્ન થતી તમામ ઉર્જા સીધી જ ATPના સ્વરૂપમાં સંગ્રહિત થાય છે અને કોઈ પણ ઉર્જા ઉષ્મા સ્વરૂપે વ્યય પામતી નથી.", "ક્રેબ્સ ચક્ર દરમિયાન એસિટાઇલ-CoAનું ઓક્સિડેશન થાય છે, જે દરમિયાન NADH, FADH₂ અને GTP ઉત્પન્ન થાય છે."], "ans": 2, "exp": "વિઘટક પ્રક્રિયાઓ દરમિયાન ઉત્પન્ન થતી ઉર્જા સંપૂર્ણ રીતે ATPમાં સંગ્રહિત થતી નથી. તેનો એક ભાગ ઉષ્મા સ્વરૂપે વ્યય પામે છે, જે શરીરના તાપમાનને જાળવવામાં મદદરૂપ થાય છે. તેથી વિકલ્પ C અયોગ્ય છે. બાકીના વિકલ્પો વિઘટક પ્રક્રિયાઓ અને ઉર્જા મુક્તિ વચ્ચેના સાચા સંબંધને દર્શાવે છે.", "ref": "Std 11 - પ્રકરણ 14: શ્વસન અને ઉર્જા વિનિમય", "ch": ""}, {"q": "નીચેના પૈકી કયો પદાર્થ વિઘટક પ્રક્રિયાઓ દરમિયાન ઇલેક્ટ્રોન પરિવહન શૃંખલામાં પ્રોટોન ગ્રેડિયન્ટની રચનામાં સીધો ભાગ લેતો નથી?", "opts": ["NADH ડિહાઇડ્રોજીનેઝ (Complex I)", "સક્સિનેટ ડિહાઇડ્રોજીનેઝ (Complex II)", "સાયટોક્રોમ bc₁ કોમ્પ્લેક્સ (Complex III)", "એટીપી સિંથેઝ (ATP Synthase)"], "ans": 3, "exp": "એટીપી સિંથેઝ (ATP Synthase) પ્રોટોન ગ્રેડિયન્ટનો ઉપયોગ કરીને ATPનું સંશ્લેષણ કરે છે, પરંતુ તે પ્રોટોન ગ્રેડિયન્ટની રચનામાં સીધો ભાગ લેતો નથી. બાકીના વિકલ્પો (Complex I, II, III) ઇલેક્ટ્રોન પરિવહન શૃંખલામાં પ્રોટોન ગ્રેડિયન્ટની રચનામાં સીધો ભાગ લે છે.", "ref": "Std 12 - પ્રકરણ 14: શ્વસન અને ઉર્જા ચયાપચય", "ch": ""}, {"q": "વિઘટક પ્રક્રિયા દરમિયાન, જો કોષમાં રોટેનોન હાજર હોય, તો ઇલેક્ટ્રોન પરિવહન શૃંખલામાં કયા પદાર્થના ઓક્સિડેશનમાં અસર થાય છે?", "opts": ["NADH નું ઓક્સિડેશન અવરોધાય છે", "FADH2 નું ઓક્સિડેશન અવરોધાય છે", "સાયટોક્રોમ b ની ક્રિયા અવરોધાય છે", "ATP સિંથેઝ અવરોધાય છે"], "ans": 0, "exp": "રોટેનોન NADH ડિહાઇડ્રોજીનેઝને અવરોધે છે, જેનાથી NADH નું ઓક્સિડેશન અવરોધાય છે. બાકીના વિકલ્પો રોટેનોનની ક્રિયા સાથે સંકળાયેલા નથી.", "ref": "Std 12 - Chapter 14: શ્વસન અને ઉર્જા મુક્તિ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
