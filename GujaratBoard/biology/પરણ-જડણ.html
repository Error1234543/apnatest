<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પૂર્ણ જોડાણ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>પૂર્ણ જોડાણ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">પૂર્ણ જોડાણ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "સસ્તન પ્રાણીઓમાં શુક્રકોષ અને અંડકોષના જોડાણને 'પૂર્ણ જોડાણ' કહે છે. આ પ્રક્રિયામાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["જોડાણ બાદ તરત જ યુગ્મનજ (Zygote)નું નિર્માણ થાય છે", "યુગ્મનજમાં કોષકેન્દ્રનું સંયોજન થાય છે, પરંતુ સાયટોપ્લાઝમનું સંયોજન થતું નથી", "આ પ્રક્રિયા ફલન નળીમાં (Fallopian tube) થાય છે", "પૂર્ણ જોડાણ બાદ યુગ્મનજમાં રંગસૂત્રોની સંખ્યા દ્વિગુણિત (Diploid) થાય છે"], "ans": 1, "exp": "પૂર્ણ જોડાણમાં શુક્રકોષ અને અંડકોષના કોષકેન્દ્ર તેમજ સાયટોપ્લાઝમ બંનેનું સંયોજન થાય છે. યુગ્મનજમાં માત્ર કોષકેન્દ્રનું જ નહીં, પરંતુ સાયટોપ્લાઝમનું પણ સંયોજન થાય છે. બાકીના વિકલ્પો સાચાં છે: યુગ્મનજનું નિર્માણ તરત થાય છે, ફલન નળીમાં આ પ્રક્રિયા થાય છે, અને રંગસૂત્રોની સંખ્યા દ્વિગુણિત થાય છે.", "ref": "Std 12 - પ્રકરણ 1: પ્રજનન (પ્રાણીઓમાં લિંગી પ્રજનન)", "ch": ""}, {"q": "નીચેનામાંથી કયું ઉદાહરણ 'પૂર્ણ જોડાણ'નું નથી?", "opts": ["માનવમાં શુક્રકોષ અને અંડકોષનું સંયોજન", "ફૂગમાં હાઇફાની બે જાતીય કોષિકાઓનું સંયોજન", "પક્ષીઓમાં નર અને માદા જનનકોષોનું સંયોજન", "વનસ્પતિમાં પરાગરજ અને અંડકોષનું સંયોજન"], "ans": 1, "exp": "ફૂગમાં હાઇફાની બે જાતીય કોષિકાઓનું સંયોજન 'પ્લાઝ્મોગેમી' અને 'કેરિયોગેમી'ના સ્વરૂપમાં થાય છે, જેને પૂર્ણ જોડાણ કહી શકાય નહીં. પૂર્ણ જોડાણમાં બંને કોષોના કોષકેન્દ્ર અને સાયટોપ્લાઝમનું સંયોજન એકસાથે થાય છે. માનવ, પક્ષીઓ અને વનસ્પતિમાં આ પ્રક્રિયા પૂર્ણ જોડાણ છે.", "ref": "Std 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ (ફૂગનો પ્રજનન પ્રકાર)", "ch": ""}, {"q": "પૂર્ણ જોડાણ બાદ યુગ્મનજમાં રંગસૂત્રોની સંખ્યા દ્વિગુણિત થાય છે. આ પ્રક્રિયા માટે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["દરેક જનનકોષમાં રંગસૂત્રોની સંખ્યા અર્ધગુણિત (Haploid) હોય છે", "પૂર્ણ જોડાણ બાદ યુગ્મનજમાં રંગસૂત્રોની સંખ્યા પ્રજનનકોષો કરતાં બમણી થાય છે", "આ પ્રક્રિયા માત્ર લિંગી પ્રજનન ધરાવતા સજીવોમાં જ થાય છે", "પૂર્ણ જોડાણ બાદ યુગ્મનજમાં DNAનું પ્રમાણ પણ બમણું થાય છે"], "ans": 3, "exp": "પૂર્ણ જોડાણ માત્ર લિંગી પ્રજનન ધરાવતા સજીવોમાં જ થાય છે એ વિધાન ખોટું છે કારણ કે કેટલાક અલિંગી પ્રજનન ધરાવતા સજીવોમાં પણ જનનકોષોનું સંયોજન થઈ શકે છે (દા.ત. કેટલીક ફૂગ અને પ્રજીવો). બાકીના વિકલ્પો સાચાં છે: જનનકોષો અર્ધગુણિત હોય છે, યુગ્મનજમાં રંગસૂત્રોની સંખ્યા બમણી થાય છે, અને DNAનું પ્રમાણ પણ બમણું થાય છે.", "ref": "Std 12 - પ્રકરણ 1: પ્રજનન (લિંગી પ્રજનન અને રંગસૂત્રોની ભૂમિકા)", "ch": ""}, {"q": "પૂર્ણ જોડાણની પ્રક્રિયા દરમિયાન નીચેનામાંથી કયું પરિવર્તન થતું નથી?", "opts": ["કોષકેન્દ્રીય પટલનું વિલયન", "સેન્ટ્રોમિયરનું વિભાજન", "જનીનોનું પુનઃસંયોજન", "કોષરસનું સંયોજન"], "ans": 1, "exp": "પૂર્ણ જોડાણ દરમિયાન સેન્ટ્રોમિયરનું વિભાજન થતું નથી. સેન્ટ્રોમિયરનું વિભાજન કોષવિભાજન (મિટોસિસ અથવા મિયોસિસ) દરમિયાન થાય છે, જ્યારે પૂર્ણ જોડાણમાં માત્ર કોષકેન્દ્ર અને કોષરસનું સંયોજન થાય છે. બાકીના વિકલ્પો સાચાં છે: કોષકેન્દ્રીય પટલનું વિલયન થાય છે, જનીનોનું પુનઃસંયોજન થઈ શકે છે, અને કોષરસનું સંયોજન થાય છે.", "ref": "Std 12 - પ્રકરણ 4: કોષવિભાજન (મિયોસિસ અને ફલન)", "ch": ""}, {"q": "એક પ્રયોગમાં, વૈજ્ઞાનિકોએ બે અલગ-અલગ પ્રજાતિઓના જનનકોષોનું સંયોજન કરાવ્યું. પરિણામે બનેલા યુગ્મનજમાં રંગસૂત્રોની સંખ્યા 38 હતી. જો એક પ્રજાતિના જનનકોષમાં રંગસૂત્રોની સંખ્યા 12 હોય, તો બીજી પ્રજાતિના જનનકોષમાં રંગસૂત્રોની સંખ્યા કેટલી હશે?", "opts": ["14", "26", "12", "38"], "ans": 1, "exp": "પૂર્ણ જોડાણ બાદ યુગ્મનજમાં રંગસૂત્રોની સંખ્યા બંને જનનકોષોના રંગસૂત્રોના સરવાળા જેટલી હોય છે. અહીં યુગ્મનજમાં રંગસૂત્રોની સંખ્યા 38 છે, જેમાંથી એક જનનકોષમાં 12 રંગસૂત્રો છે. તેથી બીજા જનનકોષમાં રંગસૂત્રોની સંખ્યા = 38 - 12 = 26 હશે. બાકીના વિકલ્પો ગાણિતિક રીતે ખોટા છે.", "ref": "Std 12 - પ્રકરણ 1: પ્રજનન (રંગસૂત્રોની સંખ્યા અને ફલન)", "ch": ""}, {"q": "સસ્તન પ્રાણીઓમાં પૂર્ણ જોડાણની પ્રક્રિયા દરમિયાન શુક્રકોષના કયા ભાગનું કોષકેન્દ્ર સાથે સંમિલન થતું નથી?", "opts": ["એક્રોસોમ", "મધ્ય ભાગ", "પૂંછડી", "કોષકેન્દ્ર"], "ans": 2, "exp": "પૂર્ણ જોડાણ દરમિયાન શુક્રકોષનું માત્ર કોષકેન્દ્ર જ અંડકોષના કોષકેન્દ્ર સાથે જોડાય છે. એક્રોસોમ ઉત્સેચકો ધરાવે છે જે અંડકોષના આવરણને ઓગાળવામાં મદદ કરે છે, મધ્ય ભાગમાં મિટોકોન્ડ્રિયા હોય છે જે શક્તિ પૂરી પાડે છે, જ્યારે પૂંછડી ગતિશીલતા માટે જવાબદાર છે પરંતુ તેનું કોષકેન્દ્ર સાથે સંમિલન થતું નથી. GSEB પાઠ્યપુસ્તકમાં સ્પષ્ટપણે જણાવ્યું છે કે માત્ર કોષકેન્દ્ર જ જોડાણમાં ભાગ લે છે.", "ref": "Std 12 - પ્રકરણ 1: પ્રજનનમાં સજીવોમાં પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પૂર્ણ જોડાણની પ્રક્રિયા માટે ખોટું છે?", "opts": ["પૂર્ણ જોડાણ બાદ યુગ્મનજમાં જનીનોની સંખ્યા બમણી થાય છે", "પૂર્ણ જોડાણમાં બંને જનનકોષોના કોષરસનું સંમિલન થાય છે", "પૂર્ણ જોડાણની પ્રક્રિયા દરમિયાન બંને જનનકોષોના કોષકેન્દ્રોનું સંમિલન થાય છે", "પૂર્ણ જોડાણ બાદ યુગ્મનજમાં રંગસૂત્રોની સંખ્યા દ્વિગુણિત થાય છે"], "ans": 1, "exp": "પૂર્ણ જોડાણમાં માત્ર કોષકેન્દ્રોનું જ સંમિલન થાય છે, કોષરસનું સંમિલન થતું નથી. આ પ્રક્રિયાને 'કેરીયોગેમી' કહે છે. જનીનો અને રંગસૂત્રોની સંખ્યા બમણી થાય છે કારણ કે બંને જનનકોષોના કોષકેન્દ્રો જોડાય છે. GSEB પાઠ્યપુસ્તકમાં આ બાબત સ્પષ્ટપણે સમજાવવામાં આવી છે.", "ref": "Std 12 - પ્રકરણ 1: પ્રજનનમાં સજીવોમાં પ્રજનન", "ch": ""}, {"q": "એક પ્રયોગમાં, વૈજ્ઞાનિકોએ ઉંદરના શુક્રકોષને માનવ અંડકોષ સાથે પ્રયોગશાળામાં જોડાણ કરાવ્યું. આ પ્રક્રિયાને શું કહી શકાય?", "opts": ["પૂર્ણ જોડાણ", "અપૂર્ણ જોડાણ", "પરજાતીય જોડાણ", "કૃત્રિમ ગર્ભાધાન"], "ans": 2, "exp": "અલગ-અલગ પ્રજાતિઓના જનનકોષોનું જોડાણ 'પરજાતીય જોડાણ' કહેવાય છે. પૂર્ણ જોડાણ માટે એક જ પ્રજાતિના જનનકોષોનું જોડાણ જરૂરી છે. અપૂર્ણ જોડાણ એવી પ્રક્રિયા છે જેમાં માત્ર કોષકેન્દ્રનું જ સંમિલન થાય છે પરંતુ કોષરસનું નહીં, જે અહીં લાગુ પડતું નથી. કૃત્રિમ ગર્ભાધાનમાં સમાન પ્રજાતિના જનનકોષોનો ઉપયોગ થાય છે. GSEB પાઠ્યપુસ્તકમાં આ પ્રકારના અપવાદોની ચર્ચા કરવામાં આવી છે.", "ref": "Std 12 - પ્રકરણ 1: પ્રજનનમાં સજીવોમાં પ્રજનન", "ch": ""}, {"q": "પૂર્ણ જોડાણની પ્રક્રિયા દરમિયાન નીચેનામાંથી કયું પરિવર્તન યુગ્મનજમાં જોવા મળતું નથી?", "opts": ["કોષકેન્દ્રમાં રંગસૂત્રોની સંખ્યા બમણી થવી", "કોષરસનું કદ બમણું થવું", "જનીનોની સંખ્યામાં વધારો થવો", "કોષકેન્દ્રપટલનું પુનઃનિર્માણ થવું"], "ans": 1, "exp": "પૂર્ણ જોડાણમાં માત્ર કોષકેન્દ્રોનું જ સંમિલન થાય છે, કોષરસનું નહીં. તેથી કોષરસનું કદ બમણું થતું નથી. રંગસૂત્રો અને જનીનોની સંખ્યા બમણી થાય છે કારણ કે બંને જનનકોષોના કોષકેન્દ્રો જોડાય છે. કોષકેન્દ્રપટલનું પુનઃનિર્માણ થાય છે કારણ કે બંને કોષકેન્દ્રોના પટલો તૂટીને નવું પટલ બને છે. GSEB પાઠ્યપુસ્તકમાં આ બાબત વિગતવાર સમજાવવામાં આવી છે.", "ref": "Std 12 - પ્રકરણ 1: પ્રજનનમાં સજીવોમાં પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું ઉદાહરણ પૂર્ણ જોડાણનું નથી પરંતુ તેને મળતી પ્રક્રિયાનું છે?", "opts": ["મનુષ્યમાં શુક્રકોષ અને અંડકોષનું જોડાણ", "દેડકામાં બાહ્ય ફલન દરમિયાન જનનકોષોનું જોડાણ", "વંદામાં શુક્રકોષ અને અંડકોષનું જોડાણ", "ફૂગમાં હાઇફાની ટોચ પર બે કોષકેન્દ્રોનું સંમિલન"], "ans": 3, "exp": "ફૂગમાં હાઇફાની ટોચ પર બે કોષકેન્દ્રોનું સંમિલન 'કેરીયોગેમી' કહેવાય છે, જે પૂર્ણ જોડાણ જેવું જ છે પરંતુ તે જનનકોષોનું જોડાણ નથી. મનુષ્ય, દેડકા અને વંદામાં શુક્રકોષ અને અંડકોષનું જોડાણ પૂર્ણ જોડાણ છે. GSEB પાઠ્યપુસ્તકમાં ફૂગની પ્રજનન પ્રક્રિયાને અલગ રીતે સમજાવવામાં આવી છે, જે આ પ્રશ્નનો મુખ્ય ખ્યાલ છે.", "ref": "Std 11 - પ્રકરણ 2: સજીવ વિશ્વમાં વિવિધતા અને Std 12 - પ્રકરણ 1: પ્રજનનમાં સજીવોમાં પ્રજનન", "ch": ""}, {"q": "પૂર્ણ જોડાણ પછી યુગ્મનજમાં કયા અંગિકના જનીનો પિતૃ અને માતૃ બંનેમાંથી સમાન પ્રમાણમાં વહેંચાયેલા હોય છે?", "opts": ["માઇટોકોન્ડ્રિયા", "કોષકેન્દ્ર", "રાઇબોઝોમ", "ગોલ્ગી કોષિકા"], "ans": 0, "exp": "પૂર્ણ જોડાણ પછી યુગ્મનજમાં માઇટોકોન્ડ્રિયાના જનીનો મુખ્યત્વે માતૃ પાસેથી જ વારસામાં મળે છે, કારણ કે શુક્રકોષના માઇટોકોન્ડ્રિયા યુગ્મનજમાં પ્રવેશતી વખતે નષ્ટ થઈ જાય છે. કોષકેન્દ્રના જનીનો પિતૃ અને માતૃ બંનેમાંથી સમાન પ્રમાણમાં વહેંચાયેલા હોય છે, પરંતુ પ્રશ્ન માઇટોકોન્ડ્રિયા વિશે પૂછે છે. રાઇબોઝોમ અને ગોલ્ગી કોષિકા મુખ્યત્વે માતૃ કોષ પાસેથી જ મળે છે.", "ref": "Std 12 - Chapter 3: માનવ પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયા પ્રાણીમાં પૂર્ણ જોડાણ દરમિયાન શુક્રકોષનું કોષકેન્દ્ર અંડકોષના કોષકેન્દ્ર સાથે સંપૂર્ણ રીતે સંમિલિત થતું નથી?", "opts": ["મનુષ્ય", "ઉંદર", "મધમાખી", "કુતરો"], "ans": 2, "exp": "મધમાખીમાં પૂર્ણ જોડાણ દરમિયાન શુક્રકોષનું કોષકેન્દ્ર અંડકોષના કોષકેન્દ્ર સાથે સંપૂર્ણ રીતે સંમિલિત થતું નથી. આ પ્રક્રિયા 'પોલીસ્પર્મી' તરીકે ઓળખાય છે, જ્યાં અંડકોષ સાથે એકથી વધુ શુક્રકોષ જોડાય છે, પરંતુ ફક્ત એક શુક્રકોષનું કોષકેન્દ્ર જ સંમિલિત થાય છે. મનુષ્ય, ઉંદર અને કુતરામાં સંપૂર્ણ સંમિલન થાય છે.", "ref": "Std 12 - Chapter 3: માનવ પ્રજનન", "ch": ""}, {"q": "પૂર્ણ જોડાણ પછી યુગ્મનજમાં કયા હોર્મોનનું સ્રાવ થવાનું શરૂ થાય છે જેથી ગર્ભાશયની દીવાલ પર તેનું આરોપણ થાય?", "opts": ["પ્રોજેસ્ટેરોન", "હ્યુમન કોરિયોનિક ગોનેડોટ્રોપિન (hCG)", "ઇસ્ટ્રોજન", "ઓક્સિટોસિન"], "ans": 1, "exp": "પૂર્ણ જોડાણ પછી યુગ્મનજમાં હ્યુમન કોરિયોનિક ગોનેડોટ્રોપિન (hCG) હોર્મોનનું સ્રાવ થવાનું શરૂ થાય છે, જેથી ગર્ભાશયની દીવાલ પર તેનું આરોપણ થાય. પ્રોજેસ્ટેરોન અને ઇસ્ટ્રોજન ગર્ભાશયને આરોપણ માટે તૈયાર કરે છે, પરંતુ hCG યુગ્મનજ દ્વારા સ્રાવાય છે. ઓક્સિટોસિન પ્રસૂતિ દરમિયાન મહત્વની ભૂમિકા ભજવે છે.", "ref": "Std 12 - Chapter 3: માનવ પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પૂર્ણ જોડાણની પ્રક્રિયા વિશે ખોટું છે?", "opts": ["પૂર્ણ જોડાણ દરમિયાન શુક્રકોષનું કોષકેન્દ્ર અંડકોષના કોષકેન્દ્ર સાથે સંમિલિત થાય છે.", "પૂર્ણ જોડાણ પછી યુગ્મનજમાં રંગસૂત્રોની સંખ્યા દ્વિગુણિત થાય છે.", "પૂર્ણ જોડાણ દરમિયાન શુક્રકોષનું પૂંછડું અંડકોષમાં પ્રવેશે છે.", "પૂર્ણ જોડાણ પછી યુગ્મનજમાં માઇટોકોન્ડ્રિયા મુખ્યત્વે માતૃ પાસેથી મળે છે."], "ans": 2, "exp": "પૂર્ણ જોડાણ દરમિયાન શુક્રકોષનું પૂંછડું અંડકોષમાં પ્રવેશતું નથી. શુક્રકોષનું કોષકેન્દ્ર અંડકોષના કોષકેન્દ્ર સાથે સંમિલિત થાય છે, અને પૂર્ણ જોડાણ પછી યુગ્મનજમાં રંગસૂત્રોની સંખ્યા દ્વિગુણિત થાય છે. માઇટોકોન્ડ્રિયા મુખ્યત્વે માતૃ પાસેથી મળે છે.", "ref": "Std 12 - Chapter 3: માનવ પ્રજનન", "ch": ""}, {"q": "પૂર્ણ જોડાણ પછી યુગ્મનજમાં કયા અંગિકના જનીનો માત્ર માતૃ જનનકોષમાંથી જ મળે છે, પિતૃ જનનકોષમાંથી નહીં?", "opts": ["માઇટોકોન્ડ્રિયા", "કોષકેન્દ્ર", "રાઇબોઝોમ", "ગોલ્ગી કોષિકા"], "ans": 0, "exp": "પૂર્ણ જોડાણ દરમિયાન, શુક્રકોષનું માઇટોકોન્ડ્રિયા યુગ્મનજમાં પ્રવેશતું નથી, પરંતુ અંડકોષના માઇટોકોન્ડ્રિયા જ યુગ્મનજમાં રહે છે. આથી માઇટોકોન્ડ્રિયલ DNA માત્ર માતૃ જનનકોષમાંથી જ મળે છે. કોષકેન્દ્ર, રાઇબોઝોમ અને ગોલ્ગી કોષિકા બંને જનનકોષોમાંથી મળે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "પૂર્ણ જોડાણ દરમિયાન, શુક્રકોષના કયા અંગિકનું અંડકોષમાં સંપૂર્ણ રીતે વિઘટન થતું નથી, પરંતુ તે યુગ્મનજમાં જળવાયેલું રહે છે?", "opts": ["માઇટોકોન્ડ્રિયા", "સેન્ટ્રોઝોમ", "એક્રોઝોમ", "રાઇબોઝોમ"], "ans": 1, "exp": "પૂર્ણ જોડાણ દરમિયાન, શુક્રકોષનું સેન્ટ્રોઝોમ અંડકોષમાં સંપૂર્ણ રીતે વિઘટન થતું માટે તૈયાર કરે છે, પરંતુ તે યુગ્મનજ દ્વારા સ્રાવાતા નથી. FSH (D) અંડાશયમાં ફોલિકલના વિકાસ માટે જવાબદાર છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "પૂર્ણ જોડાણ દરમિયાન, શુક્રકોષ અને અંડકોષના કોષકેન્દ્રનું સંમિલન થાય છે. આ પ્રક્રિયા દરમિયાન કયા પગલામાં રંગસૂત્રોનું સંમિલન થાય છે?", "opts": ["શુક્રકોષનું અંડકોષમાં પ્રવેશ", "પ્રોન્યુક્લિયસના બનવા", "રંગસૂત્રોના સિંગેમી", "યુગ્મનજના પ્રથમ કોષવિભાજન"], "ans": 2, "exp": "પૂર્ણ જોડાણ દરમિયાન, રંગસૂત્રોનું સંમિલન રંગસૂત્રોના સિંગેમી (C) પગલામાં થાય છે, જ્યારે પિતૃ અને માતૃ રંગસૂત્રો એકબીજા સાથે જોડાય છે. શુક્રકોષનું અંડકોષમાં પ્રવેશ (A) અને પ્રોન્યુક્લિયસના બનવા (B) આ પહેલાંના પગલાં છે. યુગ્મનજના પ્રથમ કોષવિભાજન (D) રંગસૂત્રોના સંમિલન પછી થાય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
