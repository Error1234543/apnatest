<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protein Synthesis</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Protein Synthesis</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Protein Synthesis</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "પ્રોટીન સંશ્લેષણ દરમિયાન, mRNA પરના કોડોન UAC નું અનુવાદ કયા એમિનો એસિડમાં થાય છે?", "opts": ["ટાયરોઝીન", "સેરીન", "લ્યુસીન", "ફિનાઇલએલેનીન"], "ans": 0, "exp": "UAC કોડોન ટાયરોઝીન (Tyrosine) એમિનો એસિડ માટે કોડ કરે છે. સેરીન (UCU, UCC, UCA, UCG), લ્યુસીન (UUA, UUG, CUU, CUC, CUA, CUG), અને ફિનાઇલએલેનીન (UUU, UUC) માટેના કોડોન અલગ છે. આમ, UAC નું અનુવાદ ટાયરોઝીનમાં જ થાય છે.", "ref": "Std 12 - પ્રકરણ 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "પ્રોટીન સંશ્લેષણમાં, કયા રાઇબોઝોમલ સબયુનિટ mRNA ને બંધન કરે છે અને પ્રારંભિક કોમ્પ્લેક્સ બનાવે છે?", "opts": ["60S સબયુનિટ", "40S સબયુનિટ", "30S સબયુનિટ", "50S સબયુનિટ"], "ans": 1, "exp": "યુકેરિયોટિક કોષોમાં, 40S સબયુનિટ mRNA ને બંધન કરે છે અને પ્રારંભિક કોમ્પ્લેક્સ બનાવે છે. 60S સબયુનિટ પછી જોડાઈને 80S રાઇબોઝોમ બનાવે છે. પ્રોકેરિયોટિક કોષોમાં, 30S સબયુનિટ mRNA ને બંધન કરે છે, પરંતુ પ્રશ્ન યુકેરિયોટિક સંરચના પર આધારિત છે. 50S સબયુનિટ પ્રોકેરિયોટિક રાઇબોઝોમનું ભાગ છે, પરંતુ તે mRNA ને બંધન કરતું નથી.", "ref": "Std 12 - પ્રકરણ 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "પ્રોટીન સંશ્લેષણ દરમિયાન, કયા તત્વનો ઉપયોગ પેપ્ટાઇડ બંધન બનાવવા માટે થાય છે?", "opts": ["ATP", "GTP", "CTP", "UTP"], "ans": 1, "exp": "પેપ્ટાઇડ બંધન બનાવવા માટે GTP નો ઉપયોગ થાય છે. ATP એનર્જી માટે વપરાય છે, પરંતુ પેપ્ટાઇડ ટ્રાન્સફરેઝ ક્રિયામાં GTP જરૂરી છે. CTP અને UTP RNA સંશ્લેષણમાં વપરાય છે, પરંતુ પેપ્ટાઇડ બંધન માટે નહીં.", "ref": "Std 12 - પ્રકરણ 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "કયા પ્રકારના RNA મોલેક્યુલમાં એન્ટિકોડોન હોય છે અને એમિનો એસિડને રાઇબોઝોમ સુધી વહન કરે છે?", "opts": ["mRNA", "tRNA", "rRNA", "snRNA"], "ans": 1, "exp": "tRNA (ટ્રાન્સફર RNA) મોલેક્યુલમાં એન્ટિકોડોન હોય છે અને એમિનો એસિડને રાઇબોઝોમ સુધી વહન કરે છે. mRNA મેસેંજર RNA છે જે જનીનિક માહિતી લઈ જાય છે. rRNA રાઇબોઝોમનું સ્ટ્રક્ચરલ ઘટક છે. snRNA સ્પ્લાઇસિંગમાં ભાગ લે છે.", "ref": "Std 12 - પ્રકરણ 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "પ્રોટીન સંશ્લેષણ દરમિયાન, કયા ઉત્સેચક દ્વારા પેપ્ટાઇડ બંધન બનાવવામાં આવે છે?", "opts": ["RNA પોલિમરેઝ", "DNA પોલિમરેઝ", "પેપ્ટિડાઇલ ટ્રાન્સફરેઝ", "હેલિકેઝ"], "ans": 2, "exp": "પેપ્ટિડાઇલ ટ્રાન્સફરેઝ ઉત્સેચક રાઇબોઝોમમાં હોય છે અને પેપ્ટાઇડ બંધન બનાવવામાં મદદ કરે છે. RNA પોલિમરેઝ RNA સંશ્લેષણમાં, DNA પોલિમરેઝ DNA સંશ્લેષણમાં, અને હેલિકેઝ DNA ને અનવાઇન્ડ કરવામાં વપરાય છે.", "ref": "Std 12 - પ્રકરણ 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "પ્રોટીન સંશ્લેષણ દરમિયાન, કયા પરિસ્થિતિમાં રાઇબોઝોમ mRNA ની વાંચન દિશા બદલી શકે છે અને તેને ફ્રેમશિફ્ટ મ્યુટેશન કહેવાય છે?", "opts": ["જ્યારે mRNA પર અસાધારણ કોડોન જેવા કે UGA (સ્ટોપ કોડોન) આગળ વાંચન ચાલુ રહે છે", "જ્યારે રાઇબોઝોમ mRNA પરના ન્યુક્લિયોટાઇડની ગણતરીમાં એક અથવા બે ન્યુક્લિયોટાઇડ છૂટી જાય છે", "જ્યારે tRNA એમિનો એસિડને લાવવાને બદલે mRNA ને સીધું જ બંધન કરે છે", "જ્યારે રાઇબોઝોમ mRNA ની 5' થી 3' દિશા બદલીને 3' થી 5' દિશામાં વાંચવાનું શરૂ કરે છે"], "ans": 1, "exp": "ફ્રેમશિફ્ટ મ્યુટેશન ત્યારે થાય છે જ્યારે mRNA પરના ન્યુક્લિયોટાઇડની ગણતરીમાં એક અથવા બે ન્યુક્લિયોટાઇડની ઉણપ અથવા વૃદ્ધિ થાય છે, જેનાથી વાંચન ફ્રેમ બદલાઈ જાય છે. આથી રાઇબોઝોમ દ્વારા એમિનો એસિડની શૃંખલા ખોટી રીતે બને છે. A) UGA સ્ટોપ કોડોન છે, જે વાંચન અટકાવે છે, ફ્રેમશિફ્ટ નહીં. C) tRNA એમિનો એસિડને લાવે છે, mRNA ને બંધન કરતું નથી. D) રાઇબોઝોમ હંમેશા 5' થી 3' દિશામાં વાંચન કરે છે, દિશા બદલતું નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "પ્રોટીન સંશ્લેષણ દરમિયાન, કયા પ્રકારના RNA મોલેક્યુલ દ્વારા રાઇબોઝોમના સબયુનિટને એકત્રિત કરવામાં આવે છે અને તેને રાઇબોઝોમલ RNA (rRNA) કહેવાય છે?", "opts": ["mRNA", "tRNA", "rRNA", "snRNA"], "ans": 2, "exp": "રાઇબોઝોમલ RNA (rRNA) રાઇબોઝોમના સબયુનિટને એકત્રિત કરે છે અને પ્રોટીન સંશ્લેષણમાં મહત્વની ભૂમિકા ભજવે છે. mRNA મેસેન્જર RNA છે જે જનીનની માહિતી લાવે છે. tRNA ટ્રાન્સફર RNA છે જે એમિનો એસિડ લાવે છે. snRNA સ્નર્ન (small nuclear RNA) છે જે RNA પ્રોસેસિંગમાં ભાગ લે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "પ્રોટીન સંશ્લેષણ દરમિયાન, કયા ઉત્સેચક દ્વારા પેપ્ટાઇડ બંધન તૂટી જાય છે જ્યારે ખોટા એમિનો એસિડ જોડાય છે?", "opts": ["પેપ્ટિડાઇલ ટ્રાન્સફરેઝ", "એમિનોએસિલ-TRNA સિંથેટેઝ", "રાઇબોઝોમલ પેપ્ટિડાઇલ હાઇડ્રોલેઝ", "RNA પોલિમરેઝ"], "ans": 2, "exp": "રાઇબોઝોમલ પેપ્ટિડાઇલ હાઇડ્રોલેઝ ઉત્સેચક દ્વારા ખોટા એમિનો એસિડ જોડાયા હોવાને લીધે બનેલા પેપ્ટાઇડ બંધનને તોડીને સુધારો કરવામાં આવે છે. પેપ્ટિડાઇલ ટ્રાન્સફરેઝ પેપ્ટાઇડ બંધન બનાવે છે. એમિનોએસિલ-TRNA સિંથેટેઝ tRNA સાથે એમિનો એસિડ જોડે છે. RNA પોલિમરેઝ mRNA નું સંશ્લેષણ કરે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "પ્રોટીન સંશ્લેષણ દરમિયાન, કયા પરિબળ દ્વારા રાઇબોઝોમની ગતિ mRNA પર ધીમી પડે છે અને તેને ટર્મિનેશન કહેવાય છે?", "opts": ["રિલીઝ ફેક્ટર (RF)", "ઇલોંગેશન ફેક્ટર (EF)", "ઇનિશિયેશન ફેક્ટર (IF)", "ટ્રાન્સલોકેશન ફેક્ટર (TF)"], "ans": 0, "exp": "રિલીઝ ફેક્ટર (RF) રાઇબોઝોમની ગતિને અટકાવે છે અને પ્રોટીન સંશ્લેષણને પૂર્ણ કરે છે, જેને ટર્મિનેશન કહેવાય છે. ઇલોંગેશન ફેક્ટર (EF) પ્રોટીન શૃંખલાનું વિસ્તરણ કરે છે. ઇનિશિયેશન ફેક્ટર (IF) પ્રોટીન સંશ્લેષણની શરૂઆત કરે છે. ટ્રાન્સલોકેશન ફેક્ટર (TF) રાઇબોઝોમની હરકતને સુનિશ્ચિત કરે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "પ્રોટીન સંશ્લેષણ દરમિયાન, કયા પ્રકારના મ્યુટેશન દ્વારા એમિનો એસિડની શૃંખલામાં એક જ એમિનો એસિડ બદલાઈ જાય છે, પરંતુ પ્રોટીનની કાર્યક્ષમતામાં કોઈ ફરક પડતો નથી?", "opts": ["મિસસેન્સ મ્યુટેશન", "નોન્સેન્સ મ્યુટેશન", "સાયલન્ટ મ્યુટેશન", "ફ્રેમશિફ્ટ મ્યુટેશન"], "ans": 2, "exp": "સાયલન્ટ મ્યુટેશનમાં DNA ના કોડોનમાં ફેરફાર થાય છે, પરંતુ તે એમિનો એસિડમાં કોઈ ફેરફાર લાવતું નથી અથવા એમિનો એસિડ બદલાય છે પરંતુ પ્રોટીનની કાર્યક્ષમતામાં કોઈ ફરક પડતો નથી. મિસસેન્સ મ્યુટેશનમાં એક એમિનો એસિડ બદલાઈ જાય છે અને પ્રોટીનની કાર્યક્ષમતા બદલાઈ શકે છે. નોન્સેન્સ મ્યુટેશનમાં સ્ટોપ કોડોન ઉત્પન્ન થાય છે અને પ્રોટીન અપૂર્ણ બને છે. ફ્રેમશિફ્ટ મ્યુટેશનમાં વાંચન ફ્રેમ બદલાઈ જાય છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "પ્રોટીન સંશ્લેષણ દરમિયાન, કયા પરિસ્થિતિમાં રાઇબોઝોમ દ્વારા mRNA ની વાંચન દિશા અચાનક રિવર્સ (ઉલટી) થઈ શકે છે અને તેની પાછળનું કારણ કયું છે?", "opts": ["જ્યારે mRNA પર અટકાવ કોડોન (Stop codon) આવે છે અને રિલીઝ ફેક્ટર (RF) બંધાય છે", "જ્યારે રાઇબોઝોમ +1 ફ્રેમશિફ્ટ મ્યુટેશન દ્વારા પ્રભાવિત થાય છે અને ટ્રાન્સફર RNA (tRNA) ની ગેરહાજરીમાં પેપ્ટાઇડ શૃંખલા વિકસિત થાય છે", "જ્યારે mRNA પર રિબોઝોમ બાઇન્ડિંગ સાઇટ (RBS) ની ગેરહાજરીમાં રાઇબોઝોમ mRNA ને યોગ્ય રીતે બંધન કરવા અસમર્થ હોય છે", "જ્યારે એમિનો એસિડની અછત હોય છે અને રાઇબોઝોમ સ્ટોલ (stalls) થાય છે"], "ans": 1, "exp": "રાઇબોઝોમ દ્વારા mRNA ની વાંચન દિશા અચાનક રિવર્સ થવાનું કારણ +1 ફ્રેમશિફ્ટ મ્યુટેશન હોઈ શકે છે, જ્યારે ટ્રાન્સફર RNA (tRNA) ની ગેરહાજરીમાં પેપ્ટાઇડ શૃંખલા વિકસિત થાય છે. આ પરિસ્થિતિમાં, રાઇબોઝોમ mRNA ની વાંચન દિશા બદલી શકે છે. બાકીના વિકલ્પો અયોગ્ય છે: A) અટકાવ કોડોન અને રિલીઝ ફેક્ટર વાંચનને અટકાવે છે, રિવર્સ કરતું નથી. C) RBS ની ગેરહાજરીમાં રાઇબોઝોમ mRNA ને બંધન કરવા અસમર્થ હોય છે, પરંતુ વાંચન દિશા રિવર્સ થતી નથી. D) એમિનો એસિડની અછતમાં રાઇબોઝોમ સ્ટોલ થાય છે, પરંતુ વાંચન દિશા રિવર્સ થતી નથી.", "ref": "Std 12 - અધ્યાય 6: જૈવિક પ્રક્રિયાઓ અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "પ્રોટીન સંશ્લેષણ દરમિયાન, કયા પરિબળને કારણે રાઇબોઝોમ દ્વારા mRNA ની વાંચન પ્રક્રિયા અટકી જાય છે અને તેને 'પ્રીમેચ્યુર ટર્મિનેશન' કહેવાય છે?", "opts": ["mRNA પર અસાધારણ કોડોન (નોનસેન્સ કોડોન) હાજર હોવા", "tRNA ની અછત હોવા", "રાઇબોઝોમલ સબયુનિટ્સ ના અલગ પડવા", "એમિનો એસિડની અછત હોવા"], "ans": 0, "exp": "પ્રીમેચ્યુર ટર્મિનેશન એ mRNA પર અસાધારણ કોડોન (નોનસેન્સ કોડોન જેવા કે UAA, UAG, UGA) હાજર હોવા કારણે થાય છે, જે રાઇબોઝોમને વાંચન પ્રક્રિયા અટકાવવા માટે સંકેત આપે છે. B) tRNA ની અછત હોવા એ પ્રક્રિયાને ધીમી પાડી શકે પરંતુ અટકાવતું નથી. C) રાઇબોઝોમલ સબયુનિટ્સ ના અલગ પડવા એ પ્રક્રિયાને અસર કરે પરંતુ પ્રીમેચ્યુર ટર્મિનેશન નથી. D) એમિનો એસિડની અછત હોવા એ પણ પ્રક્રિયાને ધીમી પાડે પરંતુ અટકાવતું નથી.", "ref": "Std 12 - અધ્યાય 6: જૈવિક પ્રક્રિયાઓ અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "પ્રોટીન સંશ્લેષણ દરમિયાન, કયા RNA મોલેક્યુલ દ્વારા રાઇબોઝોમની સક્રિયતા નિયંત્રિત થાય છે અને તેને 'રાઇબોઝાઇમ' કહેવાય છે?", "opts": ["rRNA", "mRNA", "tRNA", "snRNA"], "ans": 0, "exp": "rRNA (રાઇબોઝોમલ RNA) એ રાઇબોઝોમની સક્રિયતા નિયંત્રિત કરે છે અને તેને 'રાઇબોઝાઇમ' કહેવાય છે કારણ કે તે ઉત્સેચક જેવી ક્રિયા કરે છે. mRNA એ મેસેઞ્જર RNA છે જે જનીન સંદેશો વહન કરે છે. tRNA એ ટ્રાન્સફર RNA છે જે એમિનો એસિડ વહન કરે છે. snRNA એ સ્નાલ RNA છે જે RNA પ્રોસેસિંગમાં ભાગ લે છે.", "ref": "Std 12 - અધ્યાય 6: જૈવિક પ્રક્રિયાઓ અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "પ્રોટીન સંશ્લેષણ દરમિયાન, કયા પરિસ્થિતિમાં રાઇબોઝોમ દ્વારા એક જ mRNA પર એકથી વધારે રાઇબોઝોમ કામ કરતા હોય છે અને તેને 'પોલીસોમ' કહેવાય છે?", "opts": ["જ્યારે mRNA લાંબો હોય અને તેની વાંચન પ્રક્રિયા ધીમી હોય", "જ્યારે રાઇબોઝોમની સંખ્યા ઓછી હોય", "જ્યારે એમિનો એસિડની સંખ્યા ઓછી હોય", "જ્યારે tRNA ની સંખ્યા વધારે હોય"], "ans": 0, "exp": "પોલીસોમ એ એક જ mRNA પર એકથી વધારે રાઇબોઝોમ કામ કરતા હોય છે, જે મુખ્યત્વે લાંબા mRNA અને ધીમી વાંચન પ્રક્રિયા દરમિયાન બને છે. B) રાઇબોઝોમની સંખ્યા ઓછી હોવા એ પોલીસોમ બનાવવા માટે જરૂરી નથી. C) એમિનો એસિડની સંખ્યા ઓછી હોવા એ પણ પોલીસોમ બનાવવા માટે જરૂરી નથી. D) tRNA ની સંખ્યા વધારે હોવા એ પોલીસોમ બનાવવા માટે જરૂરી નથી.", "ref": "Std 12 - અધ્યાય 6: જૈવિક પ્રક્રિયાઓ અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "પ્રોટીન સંશ્લેષણ દરમિયાન, કયા ઉત્સેચક દ્વારા એમિનો એસિડને tRNA સાથે જોડવામાં આવે છે અને તેને 'એમિનોએસિલ-tRNA સિન્થેટેઝ' કહેવાય છે?", "opts": ["પેપ્ટિડાઇલ ટ્રાન્સફરેઝ", "એમિનોએસિલ-tRNA સિન્થેટેઝ", "RNA પોલિમરેઝ", "હેલિકેઝ"], "ans": 1, "exp": "એમિનોએસિલ-tRNA સિન્થેટેઝ એ ઉત્સેચક છે જે એમિનો એસિડને tRNA સાથે જોડે છે. પેપ્ટિડાઇલ ટ્રાન્સફરેઝ એ પેપ્ટાઇડ બંધન બનાવવા માટે જવાબદાર છે. RNA પોલિમરેઝ એ mRNA સંશ્લેષણ માટે જવાબદાર છે. હેલિકેઝ એ DNA ની ડબલ હેલિક્સને ખોલવા માટે જવાબદાર છે.", "ref": "Std 12 - અધ્યાય 6: જૈવિક પ્રક્રિયાઓ અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "પ્રોટીન સંશ્લેષણ દરમિયાન, કયા પરિસ્થિતિમાં રાઇબોઝોમ દ્વારા 'ફ્રેમશિફ્ટ મ્યુટેશન' થઈ શકે છે, જેમાં વાંચન ફ્રેમ બદલાઈ જાય છે?", "opts": ["mRNA પર એક એડિનિન ન્યુક્લિયોટાઇડનું દૂર થવું", "tRNA પર એન્ટિકોડોનની ગેરહાજરી", "રાઇબોઝોમલ સબયુનિટના વિયોજન", "પેપ્ટાઇડ બંધનના તૂટવાને કારણે"], "ans": 0, "exp": "ફ્રેમશિફ્ટ મ્યુટેશન એટલે વાંચન ફ્રેમમાં ફેરફાર થવો, જે મુખ્યત્વે mRNA પર એક અથવા વધુ ન્યુક્લિયોટાઇડનું દૂર થવું અથવા ઉમેરાવાને કારણે થાય છે. અહીં, વિકલ્પ A (mRNA પર એક એડિનિન ન્યુક્લિયોટાઇડનું દૂર થવું) સીધું જ ફ્રેમશિફ્ટ મ્યુટેશન તરફ દોરી જાય છે. વિકલ્પ B (tRNA પર એન્ટિકોડોનની ગેરહાજરી) પ્રોટીન સંશ્લેષણને અટકાવી શકે પરંતુ ફ્રેમશિફ્ટ થતો નથી. વિકલ્પ C (રાઇબોઝોમલ સબયુનિટના વિયોજન) પ્રક્રિયાને અટકાવે છે, પરંતુ ફ્રેમશિફ્ટ થતો નથી. વિકલ્પ D (પેપ્ટાઇડ બંધનના તૂટવાને કારણે) પ્રોટીનની લંબાઈને અસર કરે પરંતુ ફ્રેમશિફ્ટ થતો નથી.", "ref": "Std 12 - Chapter 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "પ્રોટીન સંશ્લેષણ દરમિયાન, કયા સ્થાને રાઇબોઝોમ દ્વારા mRNA ની વાંચન પ્રક્રિયા શરૂ થાય છે અને તે કયા કોડોન દ્વારા નિર્દેશિત થાય છે?", "opts": ["5' ટર્મિનલ પર, AUG કોડોન દ્વારા", "3' ટર્મિનલ પર, UAA કોડોન દ્વારા", "મધ્યમાં કોઈપણ સ્થાને, GUA કોડોન દ્વારા", "5' ટર્મિનલ પર, UAG કોડોન દ્વારા"], "ans": 0, "exp": "પ્રોટીન સંશ્લેષણની શરૂઆત હંમેશા mRNA ના 5' ટર્મિનલ પર થાય છે અને તે AUG કોડોન (મેથિયોનિન માટે) દ્વારા નિર્દેશિત થાય છે. UAA અને UAG ટર્મિનેશન કોડોન છે, જ્યારે GUA કોઈ પ્રારંભિક કોડોન નથી. તેથી, A વિકલ્પ સચોટ છે.", "ref": "Std 12 - અધ્યાય 6: જૈવિક પ્રક્રિયાઓ અને અનુવંશિકતા (પ્રોટીન સંશ્લેષણ)", "ch": ""}, {"q": "પ્રોટીન સંશ્લેષણ દરમિયાન, કયા ઉત્સેચક દ્વારા એમિનો એસિડ અને tRNA વચ્ચેનો બંધન તૂટે છે જ્યારે એમિનો એસિડ પેપ્ટાઇડ શૃંખલામાં જોડાય છે?", "opts": ["પેપ્ટિડાઇલ ટ્રાન્સફરેઝ", "એમિનોએસિલ-tRNA સિંથેટેઝ", "હેલિકેઝ", "RNA પોલિમરેઝ"], "ans": 0, "exp": "પેપ્ટિડાઇલ ટ્રાન્સફરેઝ ઉત્સેચક દ્વારા પેપ્ટાઇડ બંધન બનાવવામાં આવે છે અને એમિનો એસિડ અને tRNA વચ્ચેનો બંધન તૂટે છે. એમિનોએસિલ-tRNA સિંથેટેઝ એમિનો એસિડને tRNA સાથે જોડે છે, હેલિકેઝ DNA ને અનવાઇન્ડ કરે છે, અને RNA પોલિમરેઝ mRNA ની નકલ કરે છે. તેથી, A વિકલ્પ સચોટ છે.", "ref": "Std 12 - અધ્યાય 6: જૈવિક પ્રક્રિયાઓ અને અનુવંશિકતા (પ્રોટીન સંશ્લેષણ)", "ch": ""}, {"q": "પ્રોટીન સંશ્લેષણની પ્રક્રિયામાં, નીચેના પૈકી કયું વિધાન **અપવાદરૂપ** છે?\n1. યુકેરિયોટિક કોષોમાં પ્રી-mRNA નું પ્રોસેસિંગ થાય છે, જેમાં ઇન્ટ્રોન દૂર થાય છે અને એક્ઝોન જોડાય છે.\n2. પ્રોકેરિયોટિક કોષોમાં ટ્રાન્સક્રિપ્શન અને ટ્રાન્સલેશન એકસાથે થઈ શકે છે કારણ કે કોષકેન્દ્રનો અભાવ હોય છે.\n3. યુકેરિયોટિક કોષોમાં, mRNA ની 5' ટોપી અને 3' પોલી-એ હેંગ ઉમેરાય છે, જે તેની સ્થિરતા વધારે છે.\n4. પ્રોકેરિયોટિક કોષોમાં, એક જ mRNA પર એકથી વધુ પ્રોટીન સંશ્લેષિત થઈ શકે છે કારણ કે તેમાં **પોલિસિસ્ટ્રોનિક mRNA** હોય છે, પરંતુ યુકેરિયોટિક કોષોમાં આ શક્ય નથી.", "opts": ["વિધાન 1 અને 2 સાચાં છે, પરંતુ 4 અપવાદરૂપ છે.", "વિધાન 3 અને 4 સાચાં છે, પરંતુ 2 અપવાદરૂપ છે.", "વિધાન 4 અપવાદરૂપ છે કારણ કે યુકેરિયોટિક કોષોમાં પણ પોલિસિસ્ટ્રોનિક mRNA જોવા મળે છે.", "વિધાન 2 અપવાદરૂપ છે કારણ કે પ્રોકેરિયોટિક કોષોમાં ટ્રાન્સક્રિપ્શન અને ટ્રાન્સલેશન એકસાથે થઈ શકતું નથી."], "ans": 2, "exp": "વિધાન 4 અપવાદરૂપ છે કારણ કે **યુકેરિયોટિક કોષોમાં સામાન્ય રીતે મોનોસિસ્ટ્રોનિક mRNA હોય છે**, પરંતુ અપવાદરૂપ કિસ્સાઓમાં (જેમ કે વાઇરસ અથવા કેટલાક જનીનોમાં) પોલિસિસ્ટ્રોનિક mRNA જોવા મળી શકે છે. બાકીના તમામ વિધાનો પ્રોટીન સંશ્લેષણની સામાન્ય પ્રક્રિયા અનુસાર સાચાં છે. વિધાન 1, 2 અને 3 યોગ્ય રીતે યુકેરિયોટિક અને પ્રોકેરિયોટિક કોષો વચ્ચેના તફાવત દર્શાવે છે. વિધાન 2 ખોટું નથી કારણ કે પ્રોકેરિયોટિક કોષોમાં કોષકેન્દ્ર ન હોવાથી ટ્રાન્સક્રિપ્શન અને ટ્રાન્સલેશન એકસાથે થઈ શકે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ (પ્રોટીન સંશ્લેષણ)", "ch": ""}, {"q": "એક સંશોધકને એક એવું mRNA મળ્યું છે જેમાં **સ્ટાર્ટ કોડોન (AUG) ની ગેરહાજરી** છે, પરંતુ તેના બદલે **GUG** કોડોનથી શરૂઆત થાય છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું વિધાન **સાચું** છે?\n(નોંધ: સામાન્ય રીતે GUG વેલિન માટેનો કોડોન છે, પરંતુ અપવાદરૂપ કિસ્સાઓમાં તે મેથિયોનિન તરીકે કાર્ય કરી શકે છે.)", "opts": ["આ mRNA પરથી પ્રોટીન સંશ્લેષણ શક્ય નથી કારણ કે સ્ટાર્ટ કોડોન જરૂરી છે.", "આ mRNA પરથી પ્રોટીન સંશ્લેષણ થઈ શકે છે, પરંતુ તે **ફ્રેમશિફ્ટ મ્યુટેશન** તરફ દોરી જશે.", "આ mRNA પરથી પ્રોટીન સંશ્લેષણ થઈ શકે છે, પરંતુ **GUG કોડોન મેથિયોનિન તરીકે કાર્ય કરશે** અને પ્રોટીનની શરૂઆત કરશે.", "આ mRNA પરથી પ્રોટીન સંશ્લેષણ થઈ શકે છે, પરંતુ **રાઇબોઝોમ તેને ઓળખી શકશે નહીં** અને પ્રક્રિયા અટકી જશે."], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે કારણ કે **કેટલાક અપવાદરૂપ કિસ્સાઓમાં GUG કોડોન મેથિયોનિન તરીકે કાર્ય કરી શકે છે** અને પ્રોટીન સંશ્લેષણની શરૂઆત કરે છે. આ ઘટના કેટલાક બેક્ટેરિયા અને વાઇરસમાં જોવા મળે છે. વિકલ્પ A ખોટો છે કારણ કે સ્ટાર્ટ કોડોનની ગેરહાજરી હોવા છતાં પ્રોટીન સંશ્લેષણ શક્ય છે. વિકલ્પ B ખોટો છે કારણ કે આ ફ્રેમશિફ્ટ મ્યુટેશન નથી, પરંતુ કોડોનની અપવાદરૂપ ઓળખ છે. વિકલ્પ D ખોટો છે કારણ કે રાઇબોઝોમ GUG ને ઓળખી શકે છે અને પ્રક્રિયા ચાલુ રાખી શકે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ (જનીન અભિવ્યક્તિ અને કોડોનનો અપવાદ)", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
