<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Evolution</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Human Evolution</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Human Evolution</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "માનવ ઉત્ક્રાંતિના સંદર્ભમાં, 'લૂસી' (Lucy) નામનો જાણીતો ફોસિલ કયા પ્રજાતિનો છે અને તેની ખાસિયત શું હતી?", "opts": ["ઓસ્ટ્રેલોપિથેકસ અફરેન્સિસ, જે સૌપ્રથમ દ્વિપાદી ચાલવાનો પુરાવો આપે છે", "હોમો હેબિલિસ, જે પહેલી વખત હાથમાં સાધનોનો ઉપયોગ કરતો હોવાનું માનવામાં આવે છે", "હોમો ઇરેક્ટસ, જે અગ્નિનો ઉપયોગ કરતો હોવાનો પુરાવો આપે છે", "રેમાપિથેકસ, જે વાનર અને માનવ વચ્ચેનો કડી માનવામાં આવે છે"], "ans": 0, "exp": "લૂસી ઓસ્ટ્રેલોપિથેકસ અફરેન્સિસ પ્રજાતિનો ફોસિલ છે, જે ૩.૨ મિલિયન વર્ષ જૂનો છે અને સૌપ્રથમ દ્વિપાદી ચાલવાનો પુરાવો આપે છે. હોમો હેબિલિસ (B) સાધનોનો ઉપયોગ કરતો હોવાનું માનવામાં આવે છે, પરંતુ લૂસી તે નથી. હોમો ઇરેક્ટસ (C) અગ્નિનો ઉપયોગ કરતો હોવાનો પુરાવો આપે છે, પરંતુ લૂસી તે નથી. રેમાપિથેકસ (D) વાનર અને માનવ વચ્ચેનો કડી માનવામાં આવે છે, પરંતુ લૂસી તે નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "માનવ ઉત્ક્રાંતિમાં, કયા જનીનની ઉત્ક્રાંતિને કારણે માનવ મગજનો આકાર અને કદ વિકસિત થયો હોવાનું માનવામાં આવે છે?", "opts": ["FOXP2 જનીન, જે ભાષા વિકાસ સાથે સંકળાયેલ છે", "MYH16 જનીન, જે જડબા અને મગજના કદ સાથે સંકળાયેલ છે", "BRCA1 જનીન, જે કૅન્સર સાથે સંકળાયેલ છે", "HBB જનીન, જે હિમોગ્લોબિન સાથે સંકળાયેલ છે"], "ans": 1, "exp": "MYH16 જનીન માનવ મગજના કદ અને જડબા સાથે સંકળાયેલ છે. FOXP2 (A) ભાષા વિકાસ સાથે સંકળાયેલ છે, પરંતુ મગજના કદ સાથે નહીં. BRCA1 (C) કૅન્સર સાથે સંકળાયેલ છે, જ્યારે HBB (D) હિમોગ્લોબિન સાથે સંકળાયેલ છે, બંને માનવ ઉત્ક્રાંતિના મગજના વિકાસ સાથે સંકળાયેલ નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "માનવ ઉત્ક્રાંતિમાં, કયા ફોસિલ પુરાવા દ્વારા સૌપ્રથમ માનવ દ્વારા અગ્નિનો ઉપયોગ કરવાનું સૂચન મળે છે?", "opts": ["ઓલ્ડુવાઈ ગોર્જમાંથી મળેલા હાડકાં", "ચાઈના પેકિંગમાંથી મળેલા હોમો ઇરેક્ટસના અવશેષો", "જાવામાંથી મળેલા હોમો ઇરેક્ટસના ફોસિલ", "નિયાનડરથલના ગુફા અવશેષો"], "ans": 2, "exp": "જાવામાંથી મળેલા હોમો ઇરેક્ટસના ફોસિલ દ્વારા સૌપ્રથમ માનવ દ્વારા અગ્નિનો ઉપયોગ કરવાનું સૂચન મળે છે. ઓલ્ડુવાઈ ગોર્જ (A) સાધનોના ઉપયોગ સાથે સંકળાયેલ છે, ચાઈના પેકિંગ (B) હોમો ઇરેક્ટસના અવશેષો છે, પરંતુ અગ્નિના ઉપયોગનો પુરાવો નથી. નિયાનડરથલ (D) ગુફા અવશેષો અગ્નિના ઉપયોગ સાથે સંકળાયેલ છે, પરંતુ તે પહેલા હોમો ઇરેક્ટસ દ્વારા અગ્નિનો ઉપયોગ થયો હોવાનું માનવામાં આવે છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "માનવ ઉત્ક્રાંતિમાં, કયા પ્રાણી સાથે માનવનો સૌથી નજીકનો વંશીય સંબંધ છે?", "opts": ["ચિમ્પાન્ઝી", "ગોરિલા", "ઓરેંગુટાન", "બોનોબો"], "ans": 0, "exp": "માનવનો સૌથી નજીકનો વંશીય સંબંધ ચિમ્પાન્ઝી સાથે છે, કેમ કે બંનેની DNA ૯૮.૭% સમાન છે. ગોરિલા (B), ઓરેંગુટાન (C), અને બોનોબો (D) સાથેનો સંબંધ ચિમ્પાન્ઝી કરતાં ઓછો નજીકનો છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "માનવ ઉત્ક્રાંતિમાં, કયા સિદ્ધાંત અનુસાર માનવ મગજના વિકાસમાં સંવેદનશીલતાનો મહત્વનો ભાગ ભજવ્યો છે?", "opts": ["લેમાર્કનો ઉપયોગ અને અનુપયોગનો સિદ્ધાંત", "ડાર્વિનનો પ્રાકૃતિક પસંદગીનો સિદ્ધાંત", "બોલ્ડવિન પ્રભાવ", "જીન ડ્રિફ્ટ"], "ans": 2, "exp": "બોલ્ડવિન પ્રભાવ અનુસાર, સંવેદનશીલતા (લર્નિંગ) અને ઉત્ક્રાંતિ વચ્ચેનો સંબંધ માનવ મગજના વિકાસમાં મહત્વનો ભાગ ભજવે છે. લેમાર્કનો સિદ્ધાંત (A) ઉપયોગ અને અનુપયોગ પર આધારિત છે, ડાર્વિનનો સિદ્ધાંત (B) પ્રાકૃતિક પસંદગી પર આધારિત છે, જ્યારે જીન ડ્રિફ્ટ (D) અનિયોજિત જનીનિક પરિવર્તનો પર આધારિત છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "માનવ ઉત્ક્રાંતિમાં, 'હોમો ઇરેક્ટસ' ની શોધ ક્યાંથી થઈ હતી અને તેની સૌથી મહત્વની લાક્ષણિકતા કઈ હતી?", "opts": ["જાવા, ઇન્ડોનેશિયા; મગજનું કદ 900-1100 સે.મી. અને અગ્નિનો ઉપયોગ", "આફ્રિકા, ઇથિયોપિયા; મગજનું કદ 600-800 સે.મી. અને દ્વિપાદી ચાલવું", "ચીન, પેકિંગ મેન; મગજનું કદ 1200-1400 સે.મી. અને ભાષાનો વિકાસ", "યુરોપ, નિયાન્ડરથલ; મગજનું કદ 1500 સે.મી. અને શિકાર માટે હથિયારોનો ઉપયોગ"], "ans": 0, "exp": "હોમો ઇરેક્ટસની શોધ જાવા, ઇન્ડોનેશિયામાં થઈ હતી. તેની મહત્વની લાક્ષણિકતા એ હતી કે તેનું મગજનું કદ 900-1100 સે.મી. હતું અને તે અગ્નિનો ઉપયોગ કરતો હતો. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) હોમો હેબિલિસનું મગજનું કદ 600-800 સે.મી. હતું, C) પેકિંગ મેન હોમો ઇરેક્ટસનો ભાગ નથી, D) નિયાન્ડરથલ હોમો સેપિયન્સનો પૂર્વજ નથી અને તે યુરોપમાં મળ્યો હતો.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "માનવ ઉત્ક્રાંતિમાં, કયા જનીનની ઉત્ક્રાંતિને કારણે માનવમાં ભાષાનો વિકાસ થયો હોવાનું મનાય છે?", "opts": ["FOXP2 જનીન", "BRCA1 જનીન", "TP53 જનીન", "HBB જનીન"], "ans": 0, "exp": "FOXP2 જનીનની ઉત્ક્રાંતિને કારણે માનવમાં ભાષાનો વિકાસ થયો હોવાનું મનાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) BRCA1 જનીન કૅન્સર સાથે સંબંધિત છે, C) TP53 જનીન ટ્યુમર સપ્રેશન સાથે સંબંધિત છે, D) HBB જનીન હિમોગ્લોબિન સાથે સંબંધિત છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "માનવ ઉત્ક્રાંતિમાં, 'હોમો હેબિલિસ' ની સરખામણીમાં 'હોમો ઇરેક્ટસ' ની ખોપરીની સૌથી મહત્વની લાક્ષણિકતા કયી હતી?", "opts": ["ખોપરીનો આકાર ગોળાકાર અને મગજનું કદ ૧૦૦૦ સી.સી. થી વધુ", "ખોપરી પરના ભૌંકા (Brow ridges) વધુ પ્રખર અને આગળ નીકળેલા", "જડબાનું કદ નાનું અને દાંતની ગોઠવણી આધુનિક માનવ જેવી", "ખોપરીની પાછળનો ભાગ ચપટી અને કપાળનું કદ મર્યાદિત"], "ans": 0, "exp": "હોમો ઇરેક્ટસની ખોપરીનો આકાર ગોળાકાર હતો અને મગજનું કદ ૧૦૦૦ સી.સી. થી વધુ હતું, જે ઉત્ક્રાંતિમાં મહત્વનો ટપ્પો ગણાય છે. ઓપ્શન A સચોટ છે. ઓપ્શન B હોમો હેબિલિસની લાક્ષણિકતા છે, જ્યારે ઓપ્શન C અને D અનુક્રમે હોમો સેપિયન્સ અને ઓસ્ટ્રેલોપિથેકસની લાક્ષણિકતાઓ છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "માનવ ઉત્ક્રાંતિમાં, 'નિયેન્ડરથલ માનવ' (Homo neanderthalensis) ની સંસ્કૃતિમાં કયું પુરાવો મળ્યો છે જે તેની સાંસ્કૃતિક પ્રગતિ દર્શાવે છે?", "opts": ["પથ્થરના હથિયારો અને મૃતદેહને દફનાવવાની પ્રથા", "લોખંડના હથિયારો અને કૃષિના પુરાવા", "ચિત્રલેખન અને લિખિત ભાષાના પુરાવા", "ધાતુના આભૂષણો અને વાસણોના પુરાવા"], "ans": 0, "exp": "નિયેન્ડરથલ માનવ પાસે પથ્થરના હથિયારો બનાવવાની કુશળતા હતી અને મૃતદેહને દફનાવવાની પ્રથા જોવા મળી છે, જે સાંસ્કૃતિક પ્રગતિ દર્શાવે છે. ઓપ્શન A સચોટ છે. ઓપ્શન B, C, અને D અનુક્રમે હોમો સેપિયન્સના પછીના તબક્કામાં જોવા મળે છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "માનવ ઉત્ક્રાંતિમાં, 'હોમો સેપિયન્સ' ની ઉત્ક્રાંતિમાં કયા જનીનની ભૂમિકા મહત્વની હતી જે માનવમાં ભાષા અને સંવેદનશીલતાના વિકાસમાં મદદરૂપ થઈ?", "opts": ["FOXP2 જનીન", "BRCA1 જનીન", "HBB જનીન", "TP53 જનીન"], "ans": 0, "exp": "FOXP2 જનીન માનવમાં ભાષા અને સંવેદનશીલતાના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે. ઓપ્શન A સચોટ છે. BRCA1 (કૅન્સર સંબંધિત), HBB (હીમોગ્લોબિન સંબંધિત), અને TP53 (ટ્યુમર સપ્રેસર) જનીનો ભાષા અથવા સંવેદનશીલતાના વિકાસ સાથે સંબંધિત નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "માનવ ઉત્ક્રાંતિમાં, 'હોમો ફ્લોરેસિયન્સિસ' (Homo floresiensis) ની ખોપરીનું કદ કયા પ્રાણીની ખોપરીના કદ જેવું હોવાનું શોધાયું છે, જે તેની ઉત્ક્રાંતિક વૈશિષ્ટ્યતા દર્શાવે છે?", "opts": ["ચિમ્પાન્ઝી (Pan troglodytes)", "ગોરિલા (Gorilla gorilla)", "ઓરંગુટાન (Pongo pygmaeus)", "બોનોબો (Pan paniscus)"], "ans": 0, "exp": "'હોમો ફ્લોરેસિયન્સિસ' ની ખોપરીનું કદ ચિમ્પાન્ઝી (Pan troglodytes) જેવું હોવાનું શોધાયું છે, જે તેની નાની કદની અને અલગ પ્રકારની ઉત્ક્રાંતિક લાક્ષણિકતા દર્શાવે છે. ગોરિલા, ઓરંગુટાન અને બોનોબોની ખોપરીનું કદ આથી મોટું હોય છે, તેથી બાકીના વિકલ્પો ખોટા છે.", "ref": "Std 12 - Chapter 7: માનવ ઉત્ક્રાંતિ અને વંશપરંપરા", "ch": ""}, {"q": "માનવ ઉત્ક્રાંતિમાં, 'આર્ડિપિથેકસ રેમિડસ' (Ardipithecus ramidus) ના ફોસિલમાં કયું લાક્ષણિક ગુણ જોવા મળે છે, જે તેને વાનર અને માનવ વચ્ચેનો કડી તરીકે ઓળખાવે છે?", "opts": ["સંપૂર્ણ દ્વિપાદ ચાલવાની ક્ષમતા", "હાથમાં અંગૂઠો અને બાકીના બે અંગૂઠા વચ્ચેનો કોણ ૯૦ ડિગ્રી જેટલો હોવો", "મગજનું કદ આધુનિક માનવ જેવું હોવું", "દાંતની રચના સંપૂર્ણપણે શાકાહારી પ્રાણી જેવી હોવી"], "ans": 1, "exp": "'આર્ડિપિથેકસ રેમિડસ' ના ફોસિલમાં હાથમાં અંગૂઠો અને બાકીના બે અંગૂઠા વચ્ચેનો કોણ ૯૦ ડિગ્રી જેટલો હોવાનું જોવા મળે છે, જે તેને વાનર અને માનવ વચ્ચેનો કડી તરીકે ઓળખાવે છે. સંપૂર્ણ દ્વિપાદ ચાલવાની ક્ષમતા, મગજનું કદ, અને દાંતની રચના આ પ્રજાતિમાં આધુનિક માનવ જેવી નહોતી, તેથી બાકીના વિકલ્પો ખોટા છે.", "ref": "Std 12 - Chapter 7: માનવ ઉત્ક્રાંતિ અને વંશપરંપરા", "ch": ""}, {"q": "માનવ ઉત્ક્રાંતિમાં, 'હોમો નાલેડી' (Homo naledi) ના ફોસિલમાં કયું અસાધારણ લાક્ષણ જોવા મળે છે, જે તેને અન્ય પ્રાચીન માનવ પ્રજાતિઓથી અલગ પાડે છે?", "opts": ["ખૂબ જ મોટું મગજ", "હાથની રચના આધુનિક માનવ જેવી હોવી, પરંતુ પગની રચના વાનર જેવી હોવી", "દાંતની રચના માંસાહારી પ્રાણી જેવી હોવી", "ખોપરીનું આકાર સંપૂર્ણ ગોળાકાર હોવું"], "ans": 1, "exp": "'હોમો નાલેડી' ના ફોસિલમાં હાથની રચના આધુનિક માનવ જેવી હોવી, પરંતુ પગની રચના વાનર જેવી હોવાનું જોવા મળે છે, જે તેને અન્ય પ્રાચીન માનવ પ્રજાતિઓથી અલગ પાડે છે. ખૂબ જ મોટું મગજ, દાંતની રચના, અને ખોપરીનું આકાર આ પ્રજાતિમાં આ રીતે નહોતાં, તેથી બાકીના વિકલ્પો ખોટા છે.", "ref": "Std 12 - Chapter 7: માનવ ઉત્ક્રાંતિ અને વંશપરંપરા", "ch": ""}, {"q": "માનવ ઉત્ક્રાંતિમાં, 'હોમો ડ્યુપ્રેઝી' (Homo duprez) ની શોધ ક્યાંથી થઈ હતી, જે તેની ભૌગોલિક વિશિષ્ટતા દર્શાવે છે?", "opts": ["આફ્રિકાના ઇથિયોપિયા ખાતે", "એશિયાના ચીન ખાતે", "યુરોપના ફ્રાન્સ ખાતે", "ઓસ્ટ્રેલિયાના ક્વીન્સલૅન્ડ ખાતે"], "ans": 0, "exp": "'હોમો ડ્યુપ્રેઝી' ની શોધ આફ્રિકાના ઇથિયોપિયા ખાતે થઈ હતી, જે તેની ભૌગોલિક વિશિષ્ટતા દર્શાવે છે. ચીન, ફ્રાન્સ, અને ઓસ્ટ્રેલિયામાં આ પ્રજાતિના ફોસિલ મળ્યા નથી, તેથી બાકીના વિકલ્પો ખોટા છે.", "ref": "Std 12 - Chapter 7: માનવ ઉત્ક્રાંતિ અને વંશપરંપરા", "ch": ""}, {"q": "માનવ ઉત્ક્રાંતિમાં, 'હોમો લુઝોનન્સિસ' (Homo luzonensis) ના ફોસિલમાં કયું લાક્ષણિક ગુણ જોવા મળે છે, જે તેને ફિલિપાઈન્સના દ્વીપ પરના અલગ વાતાવરણ સાથે અનુકૂળ થવાનું દર્શાવે છે?", "opts": ["ખૂબ જ નાનું કદ અને વાનર જેવી લાક્ષણિકતાઓ", "મોટું મગજ અને આધુનિક માનવ જેવી ખોપરી", "દાંતની રચના માંસાહારી પ્રાણી જેવી હોવી", "હાથ અને પગની રચના સંપૂર્ણપણે આધુનિક માનવ જેવી હોવી"], "ans": 0, "exp": "'હોમો લુઝોનન્સિસ' ના ફોસિલમાં ખૂબ જ નાનું કદ અને વાનર જેવી લાક્ષણિકતાઓ જોવા મળે છે, જે તેને ફિલિપાઈન્સના દ્વીપ પરના અલગ વાતાવરણ સાથે અનુકૂળ થવાનું દર્શાવે છે. મોટું મગજ, દાંતની રચના, અને હાથ-પગની રચના આ પ્રજાતિમાં આ રીતે નહોતાં, તેથી બાકીના વિકલ્પો ખોટા છે.", "ref": "Std 12 - Chapter 7: માનવ ઉત્ક્રાંતિ અને વંશપરંપરા", "ch": ""}, {"q": "માનવ ઉત્ક્રાંતિમાં, 'હોમો હેબિલિસ' અને 'હોમો ઇરેક્ટસ' વચ્ચેના સંક્રમણકાળ દરમિયાન કયા ફોસિલ પ્રકારમાં 'ઓલ્ડુવાઇ ગોર્જ' (Olduvai Gorge) ખાતે મળેલા પુરાવામાં મગજનું કદ અને જડબાના આકારમાં અસાધારણ પરિવર્તન જોવા મળે છે?", "opts": ["ઓસ્ટ્રેલોપિથેકસ અફરેન્સિસ", "હોમો રુડોલ્ફેન્સિસ", "હોમો એન્ટિસેપર", "હોમો એર્ગાસ્ટર"], "ans": 1, "exp": "હોમો રુડોલ્ફેન્સિસ (B) એ 'હોમો હેબિલિસ' અને 'હોમો ઇરેક્ટસ' વચ્ચેનો સંક્રમણકાળનો ફોસિલ છે, જે 'ઓલ્ડુવાઇ ગોર્જ' ખાતે મળેલા પુરાવામાં મગજનું કદ (લગભગ 750-800 cc) અને જડબાના આકારમાં પરિવર્તન દર્શાવે છે. ઓસ્ટ્રેલોપિથેકસ અફરેન્સિસ (A) તો 'હોમો' જાતિ પહેલાનો છે, જ્યારે હોમો એન્ટિસેપર (C) અને હોમો એર્ગાસ્ટર (D) એ પછીના કાળના છે, જેમના ફોસિલ પુરાવા અલગ પ્રદેશોમાંથી મળ્યા છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "માનવ ઉત્ક્રાંતિમાં, 'હોમો ઇરેક્ટસ' ની ખોપરીની રચનામાં કયું લાક્ષણિક ગુણ તેને 'હોમો હેબિલિસ' થી અલગ પાડે છે, જે મગજના વિકાસ સાથે સીધો સંબંધ ધરાવે છે?", "opts": ["ખોપરીની પાછળનો ભાગ વધુ ગોળાકાર", "કપાલની હાડકાંની જાડાઈમાં ઘટાડો", "બ્રોવ રિજ (Brow Ridge) ની હાજરી", "જડબાનો આગળનો ભાગ વધુ બહાર નીકળેલો"], "ans": 2, "exp": "હોમો ઇરેક્ટસમાં બ્રોવ રિજ (Brow Ridge) ની હાજરી (C) એ મગજના વિકાસ સાથે સંકળાયેલું લાક્ષણિક ગુણ છે, જે તેને 'હોમો હેબિલિસ' થી અલગ પાડે છે. ખોપરીની પાછળનો ભાગ ગોળાકાર (A) અને કપાલની હાડકાંની જાડાઈમાં ઘટાડો (B) એ તો પછીના કાળના હોમો સેપિયન્સમાં જોવા મળે છે, જ્યારે જડબાનો આગળનો ભાગ બહાર નીકળેલો (D) એ ઓસ્ટ્રેલોપિથેકસ જેવા પૂર્વજોમાં જોવા મળે છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "માનવ ઉત્ક્રાંતિના સંદર્ભમાં, નીચેના પૈકી કયું વિધાન 'હોમો નાલેડી' (Homo naledi) માટે અસત્ય છે?", "opts": ["'હોમો નાલેડી' ના ફોસિલ દક્ષિણ આફ્રિકાના રાઇઝિંગ સ્ટાર ગુફા સિસ્ટમમાંથી મળી આવ્યા હતા.", "'હોમો નાલેડી' ની ખોપરીનું કદ આધુનિક માનવ કરતાં નાનું હતું, પરંતુ તેની મગજની રચના જટિલ હતી.", "'હોમો નાલેડી' ના હાથ અને પગની રચના વૃક્ષારોહણ (tree climbing) માટે અનુકૂળ હતી, જે તેને 'હોમો ઇરેક્ટસ' થી અલગ પાડે છે.", "'હોમો નાલેડી' ના ફોસિલ સાથે અગ્નિના ઉપયોગના પુરાવા મળ્યા છે, જે તેને માનવ ઉત્ક્રાંતિના પ્રારંભિક તબક્કામાં મૂકે છે."], "ans": 3, "exp": "'હોમો નાલેડી' ના ફોસિલમાં અગ્નિના ઉપયોગના કોઈ પુરાવા મળ્યા નથી. આ પ્રજાતિના ફોસિલ દક્ષિણ આફ્રિકાની રાઇઝિંગ સ્ટાર ગુફામાંથી મળ્યા હતા, તેની ખોપરી નાની હતી પરંતુ મગજની રચના જટિલ હતી, અને તેના હાથ-પગ વૃક્ષારોહણ માટે અનુકૂળ હતા. 'હોમો ઇરેક્ટસ' માં અગ્નિનો ઉપયોગ જોવા મળ્યો હતો, પરંતુ 'હોમો નાલેડી' માટે આવા પુરાવા નથી.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "માનવ ઉત્ક્રાંતિમાં, 'હોમો સેપિયન્સ' અને 'નિયેન્ડરથલ માનવ' (Homo neanderthalensis) વચ્ચેના આંતરપ્રજનનના પુરાવા કયા આણ્વિક જનીનિક અભ્યાસ દ્વારા મળ્યા હતા?", "opts": ["મિટોકોન્ડ્રીયલ DNA વિશ્લેષણ દ્વારા, જે માતૃવંશીય વંશાવળી દર્શાવે છે.", "Y-વર્ણસૂત્રના વિશ્લેષણ દ્વારા, જે પિતૃવંશીય વંશાવળી દર્શાવે છે.", "સમગ્ર જીનોમ સિક્વન્સિંગ દ્વારા, જે બંને પ્રજાતિઓના DNA ની સરખામણી કરે છે.", "રક્તજૂથના પ્રોટીન વિશ્લેષણ દ્વારા, જે પ્રતિરક્ષા પ્રણાલીની સમાનતા દર્શાવે છે."], "ans": 2, "exp": "સમગ્ર જીનોમ સિક્વન્સિંગ દ્વારા 'હોમો સેપિયન્સ' અને 'નિયેન્ડરથલ માનવ' વચ્ચેના આંતરપ્રજનનના પુરાવા મળ્યા હતા. આ અભ્યાસ બંને પ્રજાતિઓના DNA ની સરખામણી કરીને તેમની વચ્ચેના આનુવંશિક સંબંધો દર્શાવે છે. મિટોકોન્ડ્રીયલ DNA અને Y-વર્ણસૂત્રના વિશ્લેષણ માત્ર એકલ વંશાવળી દર્શાવે છે, જ્યારે રક્તજૂથના પ્રોટીન વિશ્લેષણ આટલી ચોક્કસ માહિતી આપી શકતા નથી.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેના પૈકી કયું લક્ષણ 'આર્ડિપિથેકસ રેમિડસ' (Ardipithecus ramidus) ને 'ઓસ્ટ્રેલોપિથેકસ અફારેન્સિસ' (Australopithecus afarensis) થી અલગ પાડે છે અને માનવ ઉત્ક્રાંતિના કયા તબક્કાનું સૂચન કરે છે?", "opts": ["'આર્ડિપિથેકસ રેમિડસ' ના પગના અંગૂઠા વિરુદ્ધ દિશામાં વળેલા હતા, જે વૃક્ષારોહણ માટે અનુકૂળતા દર્શાવે છે, જ્યારે 'ઓસ્ટ્રેલોપિથેકસ અફારેન્સિસ' માં આ લક્ષણ ન હતું.", "'આર્ડિપિથેકસ રેમિડસ' ની ખોપરીનું કદ 'ઓસ્ટ્રેલોપિથેકસ અફારેન્સિસ' કરતાં મોટું હતું, જે ઉચ્ચ મગજ કાર્યક્ષમતા દર્શાવે છે.", "'આર્ડિપિથેકસ રેમિડસ' ના હાથની રચના લાંબી અને સાંકડી હતી, જે દ્વિપાદીય હલનચલન માટે અનુકૂળ હતી, જ્યારે 'ઓસ્ટ્રેલોપિથેકસ અફારેન્સિસ' માં આ લક્ષણ ન હતું.", "'આર્ડિપિથેકસ રેમિડસ' ના દાંતની રચના વધુ શાકાહારી આહાર માટે અનુકૂળ હતી, જ્યારે 'ઓસ્ટ્રેલોપિથેકસ અફારેન્સિસ' માં મિશ્ર આહારના પુરાવા મળે છે."], "ans": 0, "exp": "'આર્ડિપિથેકસ રેમિડસ' ના પગના અંગૂઠા વિરુદ્ધ દિશામાં વળેલા હતા, જે વૃક્ષારોહણ માટેની અનુકૂળતા દર્શાવે છે. આ લક્ષણ તેને 'ઓસ્ટ્રેલોપિથેકસ અફારેન્સિસ' થી અલગ પાડે છે, જે દ્વિપાદીય હલનચલન તરફના સંક્રમણકાળનું સૂચન કરે છે. બાકીના વિકલ્પોમાં વર્ણવેલ લક્ષણો 'આર્ડિપિથેકસ રેમિડસ' માટે અસત્ય છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
