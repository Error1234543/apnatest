<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પુષ્પની રચના</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>પુષ્પની રચના</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">પુષ્પની રચના</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક વિદ્યાર્થીએ જોયું કે એક પુષ્પમાં પુંકેસર અને સ્ત્રીકેસર બંને હાજર છે, પરંતુ તે પુષ્પમાં પરાગાશય ખૂલતા નથી અને પરાગરજ બહાર આવતી નથી. આ પરિસ્થિતિમાં નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["આ પુષ્પમાં અંડકોનું ફલન થશે નહીં કારણ કે પરાગરજ બહાર આવતી નથી.", "આ પુષ્પમાં અંડકોનું ફલન થઈ શકે છે કારણ કે તે ઉભયલિંગી પુષ્પ છે.", "આ પુષ્પમાં અંડકોનું ફલન થઈ શકે છે કારણ કે પરાગાશય ખૂલ્યા વગર પણ પરાગરજ સ્ત્રીકેસર સુધી પહોંચી શકે છે.", "આ પુષ્પમાં અંડકોનું ફલન થશે કારણ કે પરાગાશય ખૂલ્યા વગર પણ પરાગરજનું સ્વ-પરાગનયન થાય છે."], "ans": 0, "exp": "પરાગાશય ખૂલ્યા વગર પરાગરજ બહાર આવી શકતી નથી, તેથી પરાગનયન થઈ શકતું નથી. પરિણામે અંડકોનું ફલન થશે નહીં. ઉભયલિંગી પુષ્પ હોવા છતાં, જો પરાગરજ બહાર ન આવે તો ફલન શક્ય નથી. વિકલ્પ B, C અને D ખોટા છે કારણ કે પરાગનયન વગર ફલન શક્ય નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું પુષ્પ એકલિંગી છે પરંતુ તેના છોડ ઉભયલિંગી છે?", "opts": ["પપૈયું", "મકાઈ", "તડબૂચ", "દૂધી"], "ans": 1, "exp": "મકાઈમાં નર પુષ્પ (ટાસેલ) અને માદા પુષ્પ (સિલ્ક) અલગ-અલગ હોય છે, પરંતુ એક જ છોડ પર બંને પ્રકારના પુષ્પો હોય છે, તેથી તે ઉભયલિંગી છોડ છે. પપૈયું દ્વિલિંગી છોડ છે, જ્યારે તડબૂચ અને દૂધી એકલિંગી છોડ છે જેમાં નર અને માદા પુષ્પો અલગ-અલગ છોડ પર હોય છે.", "ref": "Std 11 - પ્રકરણ 5: પુષ્પીય વનસ્પતિઓની બાહ્યાકાર રચના", "ch": ""}, {"q": "એક પુષ્પમાં વજ્રપત્રો અને દલપત્રો સમાન સંખ્યામાં હોય છે, પરંતુ વજ્રપત્રો લીલા રંગના અને દલપત્રો રંગીન હોય છે. આ પુષ્પની રચનામાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["આ પુષ્પમાં વજ્રપત્રો અને દલપત્રોનું કાર્ય અલગ-અલગ હોય છે.", "આ પુષ્પમાં વજ્રપત્રો પ્રકાશસંશ્લેષણ કરી શકે છે કારણ કે તે લીલા રંગના છે.", "આ પુષ્પમાં દલપત્રો પરાગનયન માટે જવાબદાર છે કારણ કે તે રંગીન છે.", "આ પુષ્પમાં વજ્રપત્રો અને દલપત્રોની સંખ્યા સમાન હોવાથી તેને 'પેરિગાયનસ' કહે છે."], "ans": 3, "exp": "વજ્રપત્રો અને દલપત્રોની સંખ્યા સમાન હોવાને કારણે પુષ્પને 'પેરિગાયનસ' નહીં, પરંતુ 'આઈસોમેરસ' કહે છે. વિકલ્પ A, B અને C સાચા છે કારણ કે વજ્રપત્રો રક્ષણ અને પ્રકાશસંશ્લેષણનું કાર્ય કરે છે, જ્યારે દલપત્રો પરાગનયનમાં મદદ કરે છે.", "ref": "Std 11 - પ્રકરણ 5: પુષ્પીય વનસ્પતિઓની બાહ્યાકાર રચના", "ch": ""}, {"q": "એક પુષ્પમાં પુંકેસરની સંખ્યા 6 છે, જેમાંથી 3 લાંબા અને 3 ટૂંકા છે. આ પ્રકારના પુંકેસરની ગોઠવણીને શું કહે છે?", "opts": ["દ્વિબળી (Diadelphous)", "દ્વિસમયુક્ત (Didynamous)", "બહુબળી (Polyadelphous)", "એકસમયુક્ત (Monadelphous)"], "ans": 1, "exp": "જ્યારે પુંકેસરની સંખ્યા 6 હોય અને તેમાંથી 3 લાંબા અને 3 ટૂંકા હોય, ત્યારે તેને 'દ્વિસમયુક્ત' (Didynamous) કહે છે. દ્વિબળી (Diadelphous)માં પુંકેસરો બે જૂથમાં ગોઠવાય છે, બહુબળી (Polyadelphous)માં ત્રણ કે તેથી વધુ જૂથમાં ગોઠવાય છે, અને એકસમયુક્ત (Monadelphous)માં બધા પુંકેસર એક જૂથમાં જોડાયેલા હોય છે.", "ref": "Std 11 - પ્રકરણ 5: પુષ્પીય વનસ્પતિઓની બાહ્યાકાર રચના", "ch": ""}, {"q": "નીચેનામાંથી કયા પુષ્પમાં 'અધોજાયી' (Epigynous) અંડાશય હોય છે?", "opts": ["સરસવ", "જાસૂદ", "સૂર્યમુખી", "ગુલાબ"], "ans": 2, "exp": "સૂર્યમુખીના પુષ્પમાં અંડાશય 'અધોજાયી' (Epigynous) હોય છે, જેમાં અંડાશય અન્ય પુષ્પીય ભાગોની નીચે ગોઠવાયેલું હોય છે. સરસવ અને ગુલાબમાં 'ઉપરજાયી' (Hypogynous) અંડાશય હોય છે, જ્યારે જાસૂદમાં 'પરિજાયી' (Perigynous) અંડાશય હોય છે.", "ref": "Std 11 - પ્રકરણ 5: પુષ્પીય વનસ્પતિઓની બાહ્યાકાર રચના", "ch": ""}, {"q": "એક પુષ્પમાં જોવા મળતા 'સ્ત્રીકેસર'ના ભાગોમાંથી કયો ભાગ ફલન બાદ ફળમાં રૂપાંતરિત થતો નથી, પરંતુ બીજના વિકાસમાં મહત્વનો ભાગ ભજવે છે?", "opts": ["પરાગાસન (Stigma)", "પરાગવાહિની (Style)", "અંડાશય (Ovary)", "અંડકોષ (Ovule)"], "ans": 3, "exp": "સાચો જવાબ D) અંડકોષ છે. ફલન બાદ અંડકોષ બીજમાં રૂપાંતરિત થાય છે, જ્યારે અંડાશય ફળમાં રૂપાંતરિત થાય છે. પરાગાસન અને પરાગવાહિની ફલન પછી સુકાઈ જાય છે અને ફળ કે બીજના નિર્માણમાં સીધો ભાગ લેતા નથી. અંડકોષમાં ફલિતાંડ (Zygote) બને છે, જે બીજના વિકાસ માટે જવાબદાર છે.", "ref": "Std 11 - પ્રકરણ 4: પુષ્પીય વનસ્પતિઓની બાહ્યાકારવિજ્ઞાન", "ch": ""}, {"q": "નીચેનામાંથી કયું પુષ્પ 'પરિપુષ્પી' (Perigynous) રચના ધરાવે છે, જેમાં પુષ્પાસન (Thalamus) અંડાશયની આસપાસ વક્રાકાર રીતે વિકસિત થયેલું હોય છે?", "opts": ["જાસૂદ (Hibiscus)", "ગુલાબ (Rose)", "સરસવ (Mustard)", "મકાઈ (Maize)"], "ans": 1, "exp": "સાચો જવાબ B) ગુલાબ છે. ગુલાબમાં પુષ્પાસન અંડાશયની આસપાસ વક્રાકાર રીતે વિકસિત થાય છે, જેને 'પરિપુષ્પી' (Perigynous) રચના કહે છે. જાસૂદમાં 'અધોપુષ્પી' (Hypogynous) અને મકાઈમાં 'અધોજાયી' (Epigynous) રચના જોવા મળે છે. સરસવમાં પણ અધોપુષ્પી રચના હોય છે.", "ref": "Std 11 - પ્રકરણ 4: પુષ્પીય વનસ્પતિઓની બાહ્યાકારવિજ્ઞાન", "ch": ""}, {"q": "એક પુષ્પમાં જોવા મળતા 'પુંકેસર'ના ભાગોમાંથી કયો ભાગ પરાગરજ (Pollen grain) ઉત્પન્ન કરે છે, પરંતુ તે પોતે ફલનમાં સીધો ભાગ લેતો નથી?", "opts": ["પરાગાશય (Anther)", "તંતુ (Filament)", "પરાગવાહિની (Style)", "પરાગાસન (Stigma)"], "ans": 0, "exp": "સાચો જવાબ A) પરાગાશય છે. પરાગાશયમાં પરાગરજ ઉત્પન્ન થાય છે, જે ફલન માટે જરૂરી છે, પરંતુ પરાગાશય પોતે ફલનમાં સીધો ભાગ લેતો નથી. તંતુ માત્ર પરાગાશયને ટેકો આપે છે. પરાગવાહિની અને પરાગાસન સ્ત્રીકેસરના ભાગ છે અને ફલનમાં સક્રિય ભૂમિકા ભજવે છે.", "ref": "Std 11 - પ્રકરણ 4: પુષ્પીય વનસ્પતિઓની બાહ્યાકારવિજ્ઞાન", "ch": ""}, {"q": "નીચેનામાંથી કયા પુષ્પમાં 'સહાયક કોષો' (Synergids) અને 'અંડકોષ' (Egg cell) એક જ ભાગમાં જોવા મળે છે, જે ફલન માટે જરૂરી છે?", "opts": ["પરાગાશય (Anther)", "ભ્રૂણપુટ (Embryo sac)", "અંડાશય (Ovary)", "પરાગવાહિની (Style)"], "ans": 1, "exp": "સાચો જવાબ B) ભ્રૂણપુટ છે. ભ્રૂણપુટમાં અંડકોષ, સહાયક કોષો અને અન્ય કોષો જોવા મળે છે, જે ફલન માટે જરૂરી છે. પરાગાશયમાં પરાગરજ ઉત્પન્ન થાય છે, અંડાશયમાં અંડકોષો હોય છે પરંતુ સહાયક કોષો નહીં, અને પરાગવાહિની ફલન માટે માર્ગ પૂરો પાડે છે.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "એક પુષ્પમાં જોવા મળતા 'વજ્રપત્રો' (Sepals) અને 'દલપત્રો' (Petals) ની સંખ્યા સમાન હોય, પરંતુ વજ્રપત્રો લીલા રંગના અને દલપત્રો રંગીન હોય ત્યારે આ પુષ્પને કયા પ્રકારમાં વર્ગીકૃત કરવામાં આવે છે?", "opts": ["એકસદની (Monochlamydeous)", "દ્વિસદની (Dichlamydeous)", "બહુસદની (Polychlamydeous)", "અસદની (Achlamydeous)"], "ans": 1, "exp": "સાચો જવાબ B) દ્વિસદની છે. જ્યારે પુષ્પમાં વજ્રપત્રો અને દલપત્રો બંને અલગ-અલગ હોય ત્યારે તેને 'દ્વિસદની' કહે છે. એકસદનીમાં માત્ર એક જ પ્રકારનું પરિદલપુંજ (Perianth) હોય છે, જ્યારે અસદનીમાં પરિદલપુંજ હોતું નથી. બહુસદની પુષ્પોમાં બહુવિધ સ્તરો હોય છે, જે આ કિસ્સામાં લાગુ પડતું નથી.", "ref": "Std 11 - પ્રકરણ 4: પુષ્પીય વનસ્પતિઓની બાહ્યાકારવિજ્ઞાન", "ch": ""}, {"q": "એક પુષ્પમાં જોવા મળતા 'અંડક' (Ovule) ની રચનામાં 'ફ્યુનિક્યુલસ' (Funiculus) નું મુખ્ય કાર્ય શું છે?", "opts": ["અંડકને અંડાશયની દીવાલ સાથે જોડવું", "પરાગનલિકા (Pollen tube) ને માર્ગદર્શન આપવું", "અંડકોષ (Egg cell) નું પોષણ કરવું", "પરાગરજ (Pollen grain) ને અંડક સુધી પહોંચાડવું"], "ans": 0, "exp": "ફ્યુનિક્યુલસ એ અંડકને અંડાશયની દીવાલ સાથે જોડતી નળી જેવી રચના છે, જે અંડકને પોષક તત્ત્વો અને પાણી પૂરું પાડે છે. પરાગનલિકાને માર્ગદર્શન આપવાનું કાર્ય 'સહાયક કોષો' (Synergids) કરે છે, અંડકોષનું પોષણ 'પોષક પેશી' (Nucellus) દ્વારા થાય છે, અને પરાગરજને અંડક સુધી પહોંચાડવાનું કાર્ય પરાગનલિકાનું છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું પુષ્પ 'હાઇપોજાયસ' (Hypogynous) રચના ધરાવે છે, પરંતુ તેના પુષ્પાસન (Thalamus) ની રચના અન્ય હાઇપોજાયસ પુષ્પોથી અલગ છે?", "opts": ["જાસૂદ (Hibiscus)", "ગુલાબ (Rose)", "સરસવ (Mustard)", "સૂર્યમુખી (Sunflower)"], "ans": 2, "exp": "સરસવ (Mustard) નું પુષ્પ હાઇપોજાયસ રચના ધરાવે છે, પરંતુ તેનું પુષ્પાસન લાંબું અને નળાકાર હોય છે, જે અન્ય હાઇપોજાયસ પુષ્પો (જેમ કે જાસૂદ) થી અલગ છે. જાસૂદ અને ગુલાબ પરિપુષ્પી (Perigynous) રચના ધરાવે છે, જ્યારે સૂર્યમુખી એપિજાયસ (Epigynous) રચના ધરાવે છે.", "ref": "Std 11 - પ્રકરણ 5: પુષ્પની રચના", "ch": ""}, {"q": "એક પુષ્પમાં જોવા મળતા 'પરાગાશય' (Anther) ની રચનામાં 'ટેપેટમ' (Tapetum) નું મુખ્ય કાર્ય શું છે?", "opts": ["પરાગરજના વિકાસ માટે પોષક તત્ત્વો પૂરા પાડવા", "પરાગરજને યાંત્રિક રક્ષણ આપવું", "પરાગનલિકાના વિકાસને ઉત્તેજિત કરવું", "પરાગરજના પરાગનયન માટે આકર્ષણ ઉત્પન્ન કરવું"], "ans": 0, "exp": "ટેપેટમ એ પરાગાશયની અંદરની સ્તર છે, જે પરાગરજના વિકાસ માટે જરૂરી પોષક તત્ત્વો અને ઉત્સેચકો પૂરા પાડે છે. પરાગરજને યાંત્રિક રક્ષણ 'એન્ડોથેસિયમ' (Endothecium) આપે છે, પરાગનલિકાના વિકાસને ઉત્તેજિત કરવાનું કાર્ય 'સ્ત્રીકેસર' (Pistil) નું છે, અને પરાગનયન માટે આકર્ષણ દલપત્રો (Petals) દ્વારા થાય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું પુષ્પ 'સંમિશ્ર પુષ્પવિન્યાસ' (Mixed Inflorescence) ધરાવે છે, જેમાં 'રેસીમ' (Raceme) અને 'સાયમ' (Cyme) બંને પ્રકારના પુષ્પવિન્યાસ જોવા મળે છે?", "opts": ["આંબો (Mango)", "બોગનવેલ (Bougainvillea)", "જામફળ (Guava)", "લીમડો (Neem)"], "ans": 1, "exp": "બોગનવેલમાં સંમિશ્ર પુષ્પવિન્યાસ જોવા મળે છે, જેમાં મુખ્ય અક્ષ પર રેસીમ પ્રકારનો પુષ્પવિન્યાસ અને પાર્શ્વ અક્ષો પર સાયમ પ્રકારનો પુષ્પવિન્યાસ હોય છે. આંબો અને જામફળમાં પેનિકલ (Panicle) પ્રકારનો પુષ્પવિન્યાસ જોવા મળે છે, જ્યારે લીમડામાં રેસીમ પ્રકારનો પુષ્પવિન્યાસ હોય છે.", "ref": "Std 11 - પ્રકરણ 5: પુષ્પની રચના", "ch": ""}, {"q": "એક પુષ્પમાં જોવા મળતા 'અંડક' (Ovule) ની રચનામાં 'માઇક્રોપાઇલ' (Micropyle) નું મુખ્ય કાર્ય શું છે?", "opts": ["પરાગનલિકાને અંડકમાં પ્રવેશ માટે માર્ગ પૂરો પાડવો", "અંડકોષને પોષણ આપવું", "અંડકને અંડાશય સાથે જોડવું", "ફલન બાદ બીજાંડ (Seed) નું નિર્માણ કરવું"], "ans": 0, "exp": "માઇક્રોપાઇલ એ અંડકની ટોચ પર આવેલું નાનું છિદ્ર છે, જે પરાગનલિકાને અંડકમાં પ્રવેશ માટે માર્ગ પૂરો પાડે છે. અંડકોષને પોષણ 'ન્યુસેલસ' (Nucellus) દ્વારા મળે છે, અંડકને અંડાશય સાથે જોડવાનું કાર્ય 'ફ્યુનિક્યુલસ' (Funiculus) નું છે, અને ફલન બાદ બીજાંડનું નિર્માણ સમગ્ર અંડકમાંથી થાય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય પ્રજનન", "ch": ""}, {"q": "એક પુષ્પમાં 'એકબીજાણુ' (Monosporic) અંડક વિકાસ પામે છે. નીચેનામાંથી કયું વિધાન આ પ્રક્રિયા વિશે સાચું છે?", "opts": ["અંડકમાં ફક્ત એક મેગાસ્પોર મધ્યકોષ (Megasporocyte) ઉત્પન્ન થાય છે અને તે ત્રણ વખત મિયોસિસથી વહેંચાય છે.", "મેગાસ્પોર મધ્યકોષ (Megasporocyte) એક વખત મિયોસિસથી વહેંચાઈને ચાર મેગાસ્પોર બનાવે છે, પરંતુ ફક્ત એક જ વિકસિત થાય છે.", "અંડકમાં ચાર મેગાસ્પોર ઉત્પન્ન થાય છે અને તમામ ચાર જ વિકસિત થઈને અંડકોષ બનાવે છે.", "મેગાસ્પોર મધ્યકોષ (Megasporocyte) મિયોસિસ વગર જ વહેંચાઈને અંડકોષ બનાવે છે."], "ans": 1, "exp": "સાચું વિધાન B છે. એકબીજાણુ અંડક વિકાસમાં, મેગાસ્પોર મધ્યકોષ (Megasporocyte) એક વખત મિયોસિસથી વહેંચાઈને ચાર મેગાસ્પોર બનાવે છે, પરંતુ ફક્ત એક જ મેગાસ્પોર વિકસિત થાય છે અને અંડકોષ તથા અન્ય કોષો બનાવે છે. A ગળત છે કારણ કે મિયોસિસ ફક્ત એક વખત જ થાય છે. C ગળત છે કારણ કે ફક્ત એક જ મેગાસ્પોર વિકસિત થાય છે. D ગળત છે કારણ કે મિયોસિસ થવું જરૂરી છે.", "ref": "Std 12 - Chapter 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "એક પુષ્પમાં 'પરાગરજ' (Pollen grain) ની રચનામાં 'જનન કોષ' (Generative cell) અને 'નલિકા કોષ' (Tube cell) ની ઉત્પત્તિ ક્યારે થાય છે?", "opts": ["પરાગરજના બહાર નીકળતા પહેલા જનન કોષ અને નલિકા કોષ અલગ પડી જાય છે.", "પરાગરજ વિકસિત થતાં જનન કોષ અને નલિકા કોષ એકસાથે બનવા લાગે છે, પરંતુ પરાગનયન દરમિયાન જ અલગ પડે છે.", "પરાગરજમાં મિયોસિસ પૂર્ણ થયા પછી તરત જ જનન કોષ અને નલિકા કોષ અલગ પડી જાય છે.", "પરાગરજમાં મિયોસિસ પહેલાં જ જનન કોષ અને નલિકા કોષ અલગ પડી જાય છે."], "ans": 1, "exp": "સાચું વિધાન B છે. પરાગરજમાં જનન કોષ અને નલિકા કોષની ઉત્પત્તિ પરાગરજ વિકસિત થતાં જ શરૂ થાય છે, પરંતુ તે પરાગનયન દરમિયાન જ અલગ પડે છે. A ગળત છે કારણ કે પરાગરજ બહાર નીકળતા પહેલા અલગ પડતા નથી. C ગળત છે કારણ કે મિયોસિસ પૂર્ણ થયા પછી તરત જ અલગ પડતા નથી. D ગળત છે કારણ કે મિયોસિસ પહેલાં અલગ પડતા નથી.", "ref": "Std 12 - Chapter 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું પુષ્પ 'ડાયકલામાઇડિયસ' (Diclamydeous) છે, પરંતુ તેના વજ્રપત્રો (Sepals) અને દલપત્રો (Petals) ની સંખ્યા અસમાન છે?", "opts": ["ગુલાબ (Rose)", "મરીગોલ્ડ (Marigold)", "સૂરજમુખી (Sunflower)", "કપાસ (Cotton)"], "ans": 0, "exp": "સાચું ઉત્તર A છે. ગુલાબ (Rose) એક ડાયકલામાઇડિયસ પુષ્પ છે, જેમાં વજ્રપત્રો અને દલપત્રો બંને હાજર છે, પરંતુ તેમની સંખ્યા અસમાન હોય છે (વજ્રપત્રો 5 અને દલપત્રો 5 થી વધુ). B ગળત છે કારણ કે મરીગોલ્ડમાં વજ્રપત્રો અને દલપત્રોની સંખ્યા સમાન હોય છે. C ગળત છે કારણ કે સૂરજમુખી એક અપૂર્ણ પુષ્પ છે અને ડાયકલામાઇડિયસ નથી. D ગળત છે કારણ કે કપાસમાં વજ્રપત્રો અને દલપત્રોની સંખ્યા સમાન હોય છે.", "ref": "Std 11 - Chapter 13: પુષ્પની રચના", "ch": ""}, {"q": "એક પુષ્પમાં 'સહાયક કોષો' (Synergids) ની સંખ્યા કેટલી હોય છે અને તેમનું મુખ્ય કાર્ય શું છે?", "opts": ["2, પરાગનયન દરમિયાન પરાગનલિકાને આકર્ષવી", "3, અંડકોષને પોષણ પૂરું પાડવું", "1, ફલન દરમિયાન શુક્રકોષને માર્ગદર્શન આપવું", "4, પરાગરજના અંકુરણમાં મદદ કરવી"], "ans": 0, "exp": "સાચું ઉત્તર A છે. સહાયક કોષોની સંખ્યા 2 હોય છે અને તેમનું મુખ્ય કાર્ય પરાગનયન દરમિયાન પરાગનલિકાને આકર્ષવી છે. B ગળત છે કારણ કે સહાયક કોષોની સંખ્યા 2 હોય છે અને તેમનું કાર્ય પરાગનલિકાને આકર્ષવી છે, પોષણ પૂરું પાડવું નહીં. C ગળત છે કારણ કે સહાયક કોષોની સંખ્યા 2 હોય છે અને તેમનું કાર્ય પરાગનલિકાને આકર્ષવી છે, શુક્રકોષને માર્ગદર્શન આપવું નહીં. D ગળત છે કારણ કે સહાયક કોષોની સંખ્યા 2 હોય છે અને તેમનું કાર્ય પરાગરજના અંકુરણમાં મદદ કરવી નહીં.", "ref": "Std 12 - Chapter 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું પુષ્પ 'અધોજાયી' (Epigynous) અંડાશય ધરાવે છે, પરંતુ તેના પુષ્પાસન (Thalamus) પર વજ્રપત્રો (Sepals), દલપત્રો (Petals) અને પુંકેસર (Stamens) ની વ્યવસ્થા 'હેમિપેરિજાયનસ' (Hemiepigynous) છે?", "opts": ["ટામેટો (Tomato)", "કાકડી (Cucumber)", "સફરજન (Apple)", "બોર (Jujube)"], "ans": 2, "exp": "સાચું ઉત્તર C છે. સફરજન (Apple) માં અંડાશય અધોજાયી (Epigynous) હોય છે, પરંતુ પુષ્પાસન પર વજ્રપત્રો, દલપત્રો અને પુંકેસરની વ્યવસ્થા હેમિપેરિજાયનસ (Hemiepigynous) હોય છે. A ગળત છે કારણ કે ટામેટોમાં અંડાશય અધોજાયી હોય છે, પરંતુ પુષ્પાસન પરની વ્યવસ્થા હેમિપેરિજાયનસ નથી. B ગળત છે કારણ કે કાકડીમાં અંડાશય અધોજાયી હોય છે, પરંતુ પુષ્પાસન પરની વ્યવસ્થા હેમિપેરિજાયનસ નથી. D ગળત છે કારણ કે બોરમાં અંડાશય અધોજાયી નથી.", "ref": "Std 11 - Chapter 13: પુષ્પની રચના", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
