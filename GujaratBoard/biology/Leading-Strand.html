<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leading Strand</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Leading Strand</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Leading Strand</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 17 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 17 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ડીએનએ પ્રતિકૃતિ દરમિયાન લીડીંગ સ્ટ્રેન્ડની રચના માટે કયું ઉત્સેચક જવાબદાર છે અને શા માટે તેને સતત સ્ટ્રેન્ડ પણ કહેવામાં આવે છે?", "opts": ["ડીએનએ પોલિમરેઝ III, કારણ કે તે 5' થી 3' દિશામાં સતત સિંથેસ કરે છે", "ડીએનએ લાઇગેઝ, કારણ કે તે ઓકાજાકી ફ્રેગમેન્ટ્સને જોડે છે", "હેલિકેઝ, કારણ કે તે ડીએનએને અનવાઇન્ડ કરે છે", "પ્રાઇમેઝ, કારણ કે તે RNA પ્રાઇમર બનાવે છે"], "ans": 0, "exp": "લીડીંગ સ્ટ્રેન્ડની રચના ડીએનએ પોલિમરેઝ III દ્વારા થાય છે, જે 5' થી 3' દિશામાં સતત સિંથેસ કરે છે. આ કારણે તેને સતત સ્ટ્રેન્ડ કહેવામાં આવે છે. બાકીના વિકલ્પો અસત્ય છે: ડીએનએ લાઇગેઝ ઓકાજાકી ફ્રેગમેન્ટ્સને જોડે છે (લેગીંગ સ્ટ્રેન્ડ સાથે સંબંધિત), હેલિકેઝ ડીએનએને અનવાઇન્ડ કરે છે, અને પ્રાઇમેઝ RNA પ્રાઇમર બનાવે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "લીડીંગ સ્ટ્રેન્ડ અને લેગીંગ સ્ટ્રેન્ડ વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["લીડીંગ સ્ટ્રેન્ડ 3' થી 5' દિશામાં સિંથેસ થાય છે", "લેગીંગ સ્ટ્રેન્ડ પર ઓકાજાકી ફ્રેગમેન્ટ્સ બનતાં નથી", "લીડીંગ સ્ટ્રેન્ડ પર સતત સિંથેસ થાય છે જ્યારે લેગીંગ સ્ટ્રેન્ડ પર અસતત સિંથેસ થાય છે", "લીડીંગ સ્ટ્રેન્ડ માટે RNA પ્રાઇમરની જરૂર પડતી નથી"], "ans": 2, "exp": "લીડીંગ સ્ટ્રેન્ડ પર સતત સિંથેસ થાય છે જ્યારે લેગીંગ સ્ટ્રેન્ડ પર અસતત સિંથેસ થાય છે (ઓકાજાકી ફ્રેગમેન્ટ્સના રૂપમાં). વિકલ્પ A ખોટો છે કારણ કે લીડીંગ સ્ટ્રેન્ડ 5' થી 3' દિશામાં સિંથેસ થાય છે. વિકલ્પ B ખોટો છે કારણ કે લેગીંગ સ્ટ્રેન્ડ પર ઓકાજાકી ફ્રેગમેન્ટ્સ બનતાં હોય છે. વિકલ્પ D ખોટો છે કારણ કે લીડીંગ સ્ટ્રેન્ડ માટે પણ RNA પ્રાઇમરની જરૂર પડે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "ડીએનએ પ્રતિકૃતિ દરમિયાન લીડીંગ સ્ટ્રેન્ડની રચનામાં કયું પગલું સૌથી પહેલા થાય છે?", "opts": ["ડીએનએ પોલિમરેઝ III દ્વારા ન્યુક્લિયોટાઇડ્સનું જોડાણ", "હેલિકેઝ દ્વારા ડીએનએનું અનવાઇન્ડિંગ", "પ્રાઇમેઝ દ્વારા RNA પ્રાઇમરની રચના", "ડીએનએ લાઇગેઝ દ્વારા ફોસ્ફોડાયેસ્ટર બંધની રચના"], "ans": 1, "exp": "ડીએનએ પ્રતિકૃતિ દરમિયાન સૌથી પહેલા હેલિકેઝ દ્વારા ડીએનએનું અનવાઇન્ડિંગ થાય છે, જેથી ડીએનએના બંને સ્ટ્રેન્ડ્સ અલગ થઈ શકે. ત્યારબાદ પ્રાઇમેઝ દ્વારા RNA પ્રાઇમરની રચના થાય છે, અને પછી ડીએનએ પોલિમરેઝ III દ્વારા ન્યુક્લિયોટાઇડ્સનું જોડાણ થાય છે. ડીએનએ લાઇગેઝનું કામ લેગીંગ સ્ટ્રેન્ડ પર ઓકાજાકી ફ્રેગમેન્ટ્સને જોડવાનું હોય છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "લીડીંગ સ્ટ્રેન્ડની રચના દરમિયાન કયું ઉત્સેચક RNA પ્રાઇમરને દૂર કરે છે અને તેની જગ્યાએ DNA ન્યુક્લિયોટાઇડ્સ ઉમેરે છે?", "opts": ["ડીએનએ પોલિમરેઝ I", "ડીએનએ પોલિમરેઝ III", "હેલિકેઝ", "ટોપોઇઝોમરેઝ"], "ans": 0, "exp": "ડીએનએ પોલિમરેઝ I RNA પ્રાઇમરને દૂર કરે છે અને તેની જગ્યાએ DNA ન્યુક્લિયોટાઇડ્સ ઉમેરે છે. ડીએનએ પોલિમરેઝ III નવાં ન્યુક્લિયોટાઇડ્સ ઉમેરવાનું કામ કરે છે, હેલિકેઝ ડીએનએને અનવાઇન્ડ કરે છે, અને ટોપોઇઝોમરેઝ ડીએનએમાં તણાવ ઘટાડવાનું કામ કરે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "ડીએનએ પ્રતિકૃતિ દરમિયાન લીડીંગ સ્ટ્રેન્ડ અને લેગીંગ સ્ટ્રેન્ડ વચ્ચે કયો તફાવત સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["લીડીંગ સ્ટ્રેન્ડ પર પ્રતિકૃતિની ગતિ ધીમી હોય છે", "લેગીંગ સ્ટ્રેન્ડ પર RNA પ્રાઇમરની જરૂર પડતી નથી", "લીડીંગ સ્ટ્રેન્ડ પર સતત સિંથેસ થાય છે જ્યારે લેગીંગ સ્ટ્રેન્ડ પર અસતત સિંથેસ થાય છે", "લેગીંગ સ્ટ્રેન્ડ પર ડીએનએ પોલિમરેઝ Iનું કામ નથી"], "ans": 2, "exp": "લીડીંગ સ્ટ્રેન્ડ પર સતત સિંથેસ થાય છે જ્યારે લેગીંગ સ્ટ્રેન્ડ પર અસતત સિંથેસ થાય છે (ઓકાજાકી ફ્રેગમેન્ટ્સના રૂપમાં). વિકલ્પ A ખોટો છે કારણ કે લીડીંગ સ્ટ્રેન્ડ પર પ્રતિકૃતિની ગતિ ઝડપી હોય છે. વિકલ્પ B ખોટો છે કારણ કે લેગીંગ સ્ટ્રેન્ડ પર પણ RNA પ્રાઇમરની જરૂર પડે છે. વિકલ્પ D ખોટો છે કારણ કે લેગીંગ સ્ટ્રેન્ડ પર ડીએનએ પોલિમરેઝ I RNA પ્રાઇમરને દૂર કરે છે અને DNA ન્યુક્લિયોટાઇડ્સ ઉમેરે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "ડીએનએ પ્રતિકૃતિ દરમિયાન લીડીંગ સ્ટ્રેન્ડની રચના વખતે, જો DNA પોલિમરેઝ I નું કામ અવરોધાય તો શું થશે?", "opts": ["લીડીંગ સ્ટ્રેન્ડની રચના પૂર્ણપણે અટકી જશે", "લેગીંગ સ્ટ્રેન્ડની રચના અટકી જશે પરંતુ લીડીંગ સ્ટ્રેન્ડની રચના ચાલુ રહેશે", "RNA પ્રાઇમર દૂર થશે નહીં, પરંતુ નવી ન્યુક્લિયોટાઇડ્સ ઉમેરાવા ચાલુ રહેશે", "ઓકાઝાકી ફ્રેગમેન્ટ્સની રચના અટકી જશે"], "ans": 2, "exp": "DNA પોલિમરેઝ I નું મુખ્ય કામ RNA પ્રાઇમરને દૂર કરવું અને ગેપ્સ ભરવાનું છે. જો તે અવરોધાય તો RNA પ્રાઇમર દૂર થશે નહીં, પરંતુ DNA પોલિમરેઝ III દ્વારા નવી ન્યુક્લિયોટાઇડ્સ ઉમેરાવા ચાલુ રહેશે. લીડીંગ સ્ટ્રેન્ડની રચના પૂર્ણપણે અટકશે નહીં (A ખોટું), લેગીંગ સ્ટ્રેન્ડ પર અસર થશે નહીં (B ખોટું), અને ઓકાઝાકી ફ્રેગમેન્ટ્સ લેગીંગ સ્ટ્રેન્ડ સાથે સંબંધિત છે (D ખોટું).", "ref": "Std 12 - અધ્યાય 6: વંશવેલા અને ઉત્ક્રાંતિ (DNA પ્રતિકૃતિ)", "ch": ""}, {"q": "લીડીંગ સ્ટ્રેન્ડની રચના દરમિયાન, કયું ઉત્સેચક DNA હેલિકેઝને સહાય કરે છે જેથી ડબલ સ્ટ્રેન્ડ ડીએનએ ખુલી શકે?", "opts": ["ટોપોઇઝોમરેઝ", "સિંગલ-સ્ટ્રેન્ડ બાઇન્ડિંગ પ્રોટીન (SSB)", "DNA પોલિમરેઝ III", "પ્રાઇમેઝ"], "ans": 0, "exp": "ટોપોઇઝોમરેઝ ઉત્સેચક DNA હેલિકેઝને સહાય કરે છે જેથી ડબલ સ્ટ્રેન્ડ ડીએનએ ખુલી શકે અને સુપરકોઇલિંગને રોકી શકે. SSB પ્રોટીન ખુલ્લા સ્ટ્રેન્ડ્સને સ્થિર કરે છે (B ખોટું), DNA પોલિમરેઝ III ન્યુક્લિયોટાઇડ્સ ઉમેરે છે (C ખોટું), અને પ્રાઇમેઝ RNA પ્રાઇમર બનાવે છે (D ખોટું).", "ref": "Std 12 - અધ્યાય 6: વંશવેલા અને ઉત્ક્રાંતિ (DNA પ્રતિકૃતિ)", "ch": ""}, {"q": "લીડીંગ સ્ટ્રેન્ડની રચના દરમિયાન, કયું પગલું સૌથી ઓછું ઉર્જા-ખર્ચાળ છે?", "opts": ["DNA હેલિકેઝ દ્વારા ડબલ સ્ટ્રેન્ડને ખોલવું", "RNA પ્રાઇમરની રચના", "DNA પોલિમરેઝ III દ્વારા ન્યુક્લિયોટાઇડ્સ ઉમેરવી", "DNA પોલિમરેઝ I દ્વારા RNA પ્રાઇમરને દૂર કરવું"], "ans": 2, "exp": "DNA પોલિમરેઝ III દ્વારા ન્યુક્લિયોટાઇડ્સ ઉમેરવું સૌથી ઓછું ઉર્જા-ખર્ચાળ પગલું છે કારણ કે તે 3’-OH ગ્રુપ સાથે ફોસ્ફોડાયેસ્ટર બંધ બનાવે છે, જે ઉર્જા-સમૃદ્ધ છે. DNA હેલિકેઝ દ્વારા ડબલ સ્ટ્રેન્ડ ખોલવું (A) અને RNA પ્રાઇમરની રચના (B) વધુ ઉર્જા-ખર્ચાળ છે. DNA પોલિમરેઝ I દ્વારા RNA પ્રાઇમરને દૂર કરવું (D) પણ ઉર્જા-ખર્ચાળ છે.", "ref": "Std 12 - અધ્યાય 6: વંશવેલા અને ઉત્ક્રાંતિ (DNA પ્રતિકૃતિ)", "ch": ""}, {"q": "લીડીંગ સ્ટ્રેન્ડની રચના દરમિયાન, કયું ઉત્સેચક 5’ → 3’ એક્સોન્યુક્લિયેઝ ક્રિયાશીલતાનો ઉપયોગ કરે છે?", "opts": ["DNA પોલિમરેઝ I", "DNA પોલિમરેઝ III", "DNA લાઇગેઝ", "હેલિકેઝ"], "ans": 0, "exp": "DNA પોલિમરેઝ I ની 5’ → 3’ એક્સોન્યુક્લિયેઝ ક્રિયાશીલતા RNA પ્રાઇમરને દૂર કરવા અને ગેપ્સ ભરવા માટે ઉપયોગી છે. DNA પોલિમરેઝ III (B) 3’ → 5’ એક્સોન્યુક્લિયેઝ ક્રિયાશીલતા ધરાવે છે, DNA લાઇગેઝ (C) ન્યુક્લિયોટાઇડ્સ જોડે છે, અને હેલિકેઝ (D) ડબલ સ્ટ્રેન્ડ ખોલે છે.", "ref": "Std 12 - અધ્યાય 6: વંશવેલા અને ઉત્ક્રાંતિ (DNA પ્રતિકૃતિ)", "ch": ""}, {"q": "લીડીંગ સ્ટ્રેન્ડની રચના દરમિયાન, કયું પગલું સૌથી અંતિમ છે?", "opts": ["RNA પ્રાઇમરની રચના", "DNA પોલિમરેઝ III દ્વારા ન્યુક્લિયોટાઇડ્સ ઉમેરવી", "DNA પોલિમરેઝ I દ્વારા RNA પ્રાઇમરને દૂર કરવું", "DNA લાઇગેઝ દ્વારા ન્યુક્લિયોટાઇડ્સ જોડવી"], "ans": 3, "exp": "DNA લાઇગેઝ દ્વારા ન્યુક્લિયોટાઇડ્સ જોડવું સૌથી અંતિમ પગલું છે કારણ કે તે ઓકાઝાકી ફ્રેગમેન્ટ્સ અને લીડીંગ સ્ટ્રેન્ડને જોડીને પૂર્ણ ડીએનએ સ્ટ્રેન્ડ બનાવે છે. RNA પ્રાઇમરની રચના (A) અને DNA પોલિમરેઝ III દ્વારા ન્યુક્લિયોટાઇડ્સ ઉમેરવી (B) પહેલાં થાય છે. DNA પોલિમરેઝ I દ્વારા RNA પ્રાઇમરને દૂર કરવું (C) પણ અંતિમ પગલું નથી.", "ref": "Std 12 - અધ્યાય 6: વંશવેલા અને ઉત્ક્રાંતિ (DNA પ્રતિકૃતિ)", "ch": ""}, {"q": "ડીએનએ પ્રતિકૃતિ દરમિયાન લીડીંગ સ્ટ્રેન્ડની સતત સંશ્લેષણ પ્રક્રિયામાં, નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["લીડીંગ સ્ટ્રેન્ડનું સંશ્લેષણ 5’ → 3’ દિશામાં થાય છે અને તે સતત હોય છે.", "DNA પોલિમરેઝ III મુખ્ય ઉત્સેચક છે જે લીડીંગ સ્ટ્રેન્ડના સંશ્લેષણ માટે જવાબદાર છે.", "લીડીંગ સ્ટ્રેન્ડના સંશ્લેષણ માટે એક જ RNA પ્રાઇમરની જરૂર પડે છે.", "લીડીંગ સ્ટ્રેન્ડના સંશ્લેષણ દરમિયાન DNA લિગેઝ ઉત્સેચક સક્રિય રીતે ભાગ લે છે."], "ans": 3, "exp": "લીડીંગ સ્ટ્રેન્ડનું સંશ્લેષણ સતત થતું હોવાથી, તેમાં એક જ RNA પ્રાઇમરની જરૂર પડે છે અને DNA પોલિમરેઝ III દ્વારા સંશ્લેષણ થાય છે. જોકે, DNA લિગેઝ ઉત્સેચક લેગીંગ સ્ટ્રેન્ડ પર ઓકાઝાકી ટુકડાઓને જોડવા માટે જરૂરી છે, લીડીંગ સ્ટ્રેન્ડ પર નહીં. તેથી વિકલ્પ D ખોટું છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ભિન્નતાના આણ્વિક આધાર", "ch": ""}, {"q": "ડીએનએ પ્રતિકૃતિ દરમિયાન, લીડીંગ સ્ટ્રેન્ડના સંશ્લેષણ માટે જરૂરી RNA પ્રાઇમરની સંખ્યા શા માટે લેગીંગ સ્ટ્રેન્ડ કરતાં ઓછી હોય છે? નીચેનામાંથી કયું કારણ યોગ્ય નથી?", "opts": ["લીડીંગ સ્ટ્રેન્ડનું સંશ્લેષણ સતત થાય છે, જ્યારે લેગીંગ સ્ટ્રેન્ડનું સંશ્લેષણ અસતત થાય છે.", "લીડીંગ સ્ટ્રેન્ડ પર DNA પોલિમરેઝ III સતત કામ કરે છે, જ્યારે લેગીંગ સ્ટ્રેન્ડ પર તે વારંવાર શરૂઆત કરે છે.", "લીડીંગ સ્ટ્રેન્ડ પર RNA પ્રાઇમરની જરૂર પડતી નથી કારણ કે DNA પોલિમરેઝ I સીધું જ કામ શરૂ કરી શકે છે.", "લેગીંગ સ્ટ્રેન્ડ પર દરેક ઓકાઝાકી ટુકડા માટે નવો RNA પ્રાઇમર જરૂરી છે."], "ans": 2, "exp": "લીડીંગ સ્ટ્રેન્ડ પર પણ RNA પ્રાઇમરની જરૂર પડે છે, કારણ કે DNA પોલિમરેઝ III સ્વતંત્ર રીતે સંશ્લેષણ શરૂ કરી શકતું નથી. DNA પોલિમરેઝ I RNA પ્રાઇમરને દૂર કરી DNA વડે બદલે છે, પરંતુ તે પ્રાઇમર વગર કામ શરૂ કરી શકતું નથી. તેથી વિકલ્પ C ખોટું છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ભિન્નતાના આણ્વિક આધાર", "ch": ""}, {"q": "ડીએનએ પ્રતિકૃતિ દરમિયાન, જો લીડીંગ સ્ટ્રેન્ડના સંશ્લેષણ માટે જરૂરી DNA પોલિમરેઝ III ઉત્સેચકની ક્રિયાશીલતા અવરોધાય તો નીચેનામાંથી કયું પરિણામ સંભવિત નથી?", "opts": ["લીડીંગ સ્ટ્રેન્ડનું સંશ્લેષણ અટકી જશે.", "લેગીંગ સ્ટ્રેન્ડનું સંશ્લેષણ પણ અસરગ્રસ્ત થશે કારણ કે DNA પોલિમરેઝ III બંને સ્ટ્રેન્ડ માટે જરૂરી છે.", "RNA પ્રાઇમરનું સંશ્લેષણ અટકી જશે કારણ કે DNA પોલિમરેઝ III પ્રાઇમર બનાવે છે.", "પ્રતિકૃતિ પ્રક્રિયા અધૂરી રહેશે અને કોષ વિભાજનમાં સમસ્યા ઉભી થશે."], "ans": 2, "exp": "DNA પોલિમરેઝ III RNA પ્રાઇમર બનાવતું નથી, તે માત્ર DNA સંશ્લેષણ માટે જવાબદાર છે. RNA પ્રાઇમર પ્રાઇમેઝ ઉત્સેચક દ્વારા બનાવવામાં આવે છે. તેથી વિકલ્પ C ખોટું છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ભિન્નતાના આણ્વિક આધાર", "ch": ""}, {"q": "ડીએનએ પ્રતિકૃતિ દરમિયાન લીડીંગ સ્ટ્રેન્ડના સંશ્લેષણમાં, નીચેનામાંથી કયું પગલું DNA પોલિમરેઝ I દ્વારા થતું નથી?", "opts": ["RNA પ્રાઇમરને દૂર કરવું.", "દૂર કરેલા RNA પ્રાઇમરના સ્થાને DNA ન્યુક્લિયોટાઇડ્સ ઉમેરવા.", "DNA ના ટુકડાઓને એકબીજા સાથે જોડવા.", "5’ → 3’ એક્સોન્યુક્લિયેઝ ક્રિયાશીલતા દ્વારા RNA પ્રાઇમરને હટાવવું."], "ans": 2, "exp": "DNA પોલિમરેઝ I RNA પ્રાઇમરને દૂર કરે છે અને તેના સ્થાને DNA ન્યુક્લિયોટાઇડ્સ ઉમેરે છે, પરંતુ DNA ના ટુકડાઓને જોડવાનું કામ DNA લિગેઝ ઉત્સેચક કરે છે. તેથી વિકલ્પ C ખોટું છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ભિન્નતાના આણ્વિક આધાર", "ch": ""}, {"q": "ડીએનએ પ્રતિકૃતિ દરમિયાન લીડીંગ સ્ટ્રેન્ડના સંશ્લેષણ સંદર્ભે નીચેનામાંથી કયું વિધાન અપવાદરૂપ છે?", "opts": ["લીડીંગ સ્ટ્રેન્ડનું સંશ્લેષણ 5’ → 3’ દિશામાં સતત થાય છે", "લીડીંગ સ્ટ્રેન્ડના સંશ્લેષણ માટે માત્ર એક જ RNA પ્રાઇમરની જરૂર પડે છે", "લીડીંગ સ્ટ્રેન્ડના સંશ્લેષણ દરમિયાન DNA પોલિમરેઝ III દ્વારા ઓકાઝાકી ટુકડાઓનું નિર્માણ થાય છે", "લીડીંગ સ્ટ્રેન્ડના સંશ્લેષણ માટે DNA લિગેઝ ઉત્સેચકની જરૂર પડતી નથી"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. લીડીંગ સ્ટ્રેન્ડનું સંશ્લેષણ સતત અને 5’ → 3’ દિશામાં થાય છે, જેમાં માત્ર એક RNA પ્રાઇમરની જરૂર પડે છે અને DNA લિગેઝની જરૂર પડતી નથી કારણ કે તેમાં ઓકાઝાકી ટુકડાઓ બનતા નથી. વિકલ્પ C ખોટો છે કારણ કે ઓકાઝાકી ટુકડાઓ લેગીંગ સ્ટ્રેન્ડના સંશ્લેષણ દરમિયાન બને છે, લીડીંગ સ્ટ્રેન્ડમાં નહીં. વિકલ્પ A, B અને D સાચાં વિધાનો છે, પરંતુ લીડીંગ સ્ટ્રેન્ડના સંદર્ભમાં અપવાદરૂપ નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "ડીએનએ પ્રતિકૃતિ દરમિયાન લીડીંગ સ્ટ્રેન્ડના સંશ્લેષણમાં, જો DNA પોલિમરેઝ III ની 3’ → 5’ પ્રૂફરીડીંગ ક્રિયાશીલતા નિષ્ક્રિય થાય, તો નીચેનામાંથી કયું પરિણામ સૌથી યોગ્ય રીતે અપેક્ષિત છે?", "opts": ["લીડીંગ સ્ટ્રેન્ડમાં મ્યુટેશનનો દર વધશે, કારણ કે ભૂલો સુધારવામાં અસમર્થતા રહેશે.", "લેગીંગ સ્ટ્રેન્ડના સંશ્લેષણ પર કોઈ અસર થશે નહીં, કારણ કે તે લીડીંગ સ્ટ્રેન્ડથી સ્વતંત્ર છે.", "પ્રતિકૃતિ પ્રક્રિયા પૂર્ણપણે અટકી જશે, કારણ કે DNA પોલિમરેઝ III ની પ્રાથમિક ક્રિયાશીલતા અવરોધાશે.", "લીડીંગ સ્ટ્રેન્ડનું સંશ્લેષણ ધીમું પડશે, પરંતુ ભૂલો સુધારવા માટે DNA પોલિમરેઝ I તેની જગ્યાએ કામ કરશે."], "ans": 0, "exp": "DNA પોલિમરેઝ III ની 3’ → 5’ પ્રૂફરીડીંગ ક્રિયાશીલતા ભૂલોને સુધારવા માટે જવાબદાર છે. જો આ ક્રિયાશીલતા નિષ્ક્રિય થાય, તો લીડીંગ સ્ટ્રેન્ડમાં ભૂલો સુધારવામાં અસમર્થતા રહેશે, જેના કારણે મ્યુટેશનનો દર વધશે. બાકીના વિકલ્પો ખોટા છે: B) લેગીંગ સ્ટ્રેન્ડના સંશ્લેષણ પર અસર થશે, કારણ કે DNA પોલિમરેઝ III બંને સ્ટ્રેન્ડના સંશ્લેષણમાં ભાગ લે છે. C) પ્રતિકૃતિ પ્રક્રિયા પૂર્ણપણે અટકશે નહીં, કારણ કે પ્રૂફરીડીંગ ક્રિયાશીલતા નિષ્ક્રિય થવી એ પ્રાથમિક ક્રિયાશીલતા નિષ્ક્રિય થવી નથી. D) DNA પોલિમરેઝ I ની પ્રૂફરીડીંગ ક્રિયાશીલતા નથી, તેથી તે ભૂલો સુધારી શકશે નહીં.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર (Molecular Genetics)", "ch": ""}, {"q": "ડીએનએ પ્રતિકૃતિ દરમિયાન, લીડીંગ સ્ટ્રેન્ડના સંશ્લેષણમાં નીચેનામાંથી કયું ઉત્સેચક સીધું સહભાગી નથી, પરંતુ તેની ગેરહાજરીમાં લીડીંગ સ્ટ્રેન્ડનું સંશ્લેષણ અશક્ય બને છે?", "opts": ["DNA પોલિમરેઝ III", "હેલિકેઝ", "ટોપોઈઝોમરેઝ", "DNA લાઇગેઝ"], "ans": 3, "exp": "DNA લાઇગેઝ લીડીંગ સ્ટ્રેન્ડના સંશ્લેષણમાં સીધું સહભાગી નથી, પરંતુ તે ઓકેઝાકી ફ્રેગમેન્ટ્સને જોડવા માટે લેગીંગ સ્ટ્રેન્ડમાં મહત્વપૂર્ણ છે. જો DNA લાઇગેઝ ગેરહાજર હોય, તો લેગીંગ સ્ટ્રેન્ડનું સંશ્લેષણ અટકી જશે, જેથી લીડીંગ સ્ટ્રેન્ડનું સંશ્લેષણ પણ અશક્ય બનશે. વિકલ્પ A, B, અને C સીધું લીડીંગ સ્ટ્રેન્ડના સંશ્લેષણમાં સહભાગી છે.", "ref": "Std 12 - Chapter 6: વંશવિધાનના આણ્વિક આધાર (Molecular Basis of Inheritance)", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
