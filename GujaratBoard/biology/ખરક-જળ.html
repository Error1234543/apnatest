<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ખોરાક જાળ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ખોરાક જાળ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ખોરાક જાળ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 50 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 50 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ખોરાક જાળમાં, જો એક પોષક સ્તરે ઉર્જાનો ૫૦% ભાગ બીજા પોષક સ્તરમાં સ્થાનાંતરિત થાય છે, તો શું કહી શકાય કે આ ખોરાક જાળની કુશળતા ૫૦% છે?", "opts": ["હા, કારણ કે ઉર્જા સ્થાનાંતરણનું પ્રમાણ કુશળતાનું મૂલ્ય નક્કી કરે છે.", "ના, કારણ કે કુશળતા ઉર્જાના સ્થાનાંતરણ અને નુકસાન બંનેમાંથી નક્કી થાય છે.", "હા, કારણ કે ઉર્જા સ્થાનાંતરણનું પ્રમાણ જ કુશળતાનું એકમાત્ર માપદંડ છે.", "ના, કારણ કે કુશળતા ફક્ત ઉત્પાદક સ્તરે જ મહત્વની હોય છે."], "ans": 1, "exp": "કુશળતા ફક્ત ઉર્જાના સ્થાનાંતરણના પ્રમાણ પર આધારિત નથી, પરંતુ ઉર્જાના નુકસાન (જેમ કે શ્વસન દ્વારા) પર પણ આધારિત હોય છે. આથી, ફક્ત ૫૦% ઉર્જા સ્થાનાંતરણ થવું એ કુશળતાનું સંપૂર્ણ મૂલ્ય નથી. વિકલ્પ A અને C ખોટા છે કારણ કે તેઓ ફક્ત સ્થાનાંતરણ પર ધ્યાન કેન્દ્રિત કરે છે. વિકલ્પ D ખોટો છે કારણ કે કુશળતા તમામ પોષક સ્તરો માટે મહત્વની હોય છે, ફક્ત ઉત્પાદક સ્તર માટે નહીં.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "ખોરાક જાળમાં, જો એક જીવ એકથી વધુ પોષક સ્તરે સ્થાન પામે છે, તો તેને શું કહેવાય?", "opts": ["ઉત્પાદક", "વપરાશકર્તા", "બહુપોષી", "વિઘટક"], "ans": 2, "exp": "જ્યારે એક જીવ એકથી વધુ પોષક સ્તરે સ્થાન પામે છે, ત્યારે તેને બહુપોષી (Omnivore) કહેવાય છે. ઉત્પાદક (A) ફક્ત પોષક સ્તર ૧ પર હોય છે, વપરાશકર્તા (B) એક જ પોષક સ્તરે હોય છે, અને વિઘટક (D) મૃત જૈવિક પદાર્થોનું વિઘટન કરે છે, પરંતુ તે પોષક સ્તરમાં ગણાતો નથી.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "ખોરાક જાળમાં, જો એક જીવ ફક્ત મૃત જૈવિક પદાર્થો પર આહાર લે છે, તો તે કયા પોષક સ્તરમાં મૂકવામાં આવે છે?", "opts": ["પ્રાથમિક વપરાશકર્તા", "દ્વિતીય વપરાશકર્તા", "વિઘટક", "તૃતીય વપરાશકર્તા"], "ans": 2, "exp": "મૃત જૈવિક પદાર્થો પર આહાર લેનારા જીવોને વિઘટક (Decomposer) કહેવાય છે. પ્રાથમિક વપરાશકર્તા (A) ઉત્પાદકો પર આહાર લે છે, દ્વિતીય વપરાશકર્તા (B) પ્રાથમિક વપરાશકર્તાઓ પર આહાર લે છે, અને તૃતીય વપરાશકર્તા (D) દ્વિતીય વપરાશકર્તાઓ પર આહાર લે છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "ખોરાક જાળમાં, ઉર્જાનું સ્થાનાંતરણ કયા સ્વરૂપમાં થાય છે?", "opts": ["રાસાયણિક ઉર્જા", "યાંત્રિક ઉર્જા", "ઉષ્મા ઉર્જા", "પ્રકાશ ઉર્જા"], "ans": 0, "exp": "ખોરાક જાળમાં ઉર્જાનું સ્થાનાંતરણ મુખ્યત્વે રાસાયણિક ઉર્જા (Chemical Energy) સ્વરૂપે થાય છે, જે ખોરાકના રૂપમાં એક જીવથી બીજા જીવમાં પહોંચે છે. યાંત્રિક ઉર્જા (B), ઉષ્મા ઉર્જા (C), અને પ્રકાશ ઉર્જા (D) ખોરાક જાળમાં ઉર્જા સ્થાનાંતરણના મુખ્ય સ્વરૂપ નથી.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "ખોરાક જાળમાં, જો એક પોષક સ્તરે ઉર્જાનો ૧૦% ભાગ બીજા પોષક સ્તરમાં સ્થાનાંતરિત થાય છે, તો આ ખોરાક જાળની કુશળતા કેટલી હશે?", "opts": ["૧૦%", "૯૦%", "૧%", "૦.૧%"], "ans": 0, "exp": "ખોરાક જાળમાં, ઉર્જા સ્થાનાંતરણની કુશળતા એટલે જેટલી ઉર્જા એક પોષક સ્તરથી બીજા પોષક સ્તરમાં પહોંચે છે. અહીં, ૧૦% ઉર્જા સ્થાનાંતરિત થાય છે, આથી કુશળતા ૧૦% હશે. વિકલ્પ B, C, અને D ખોટા છે કારણ કે તેઓ ઉર્જા સ્થાનાંતરણના પ્રમાણ સાથે મેળ ખાતા નથી.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "ખોરાક જાળમાં, જો એક જીવ સજીવ અને મૃત જૈવિક પદાર્થો બંને પર આહાર લે છે, તો તેને કયા પોષક સ્તરે ગણવામાં આવે છે?", "opts": ["ઉત્પાદક (Producer)", "પ્રાથમિક ઉપભોક્તા (Primary Consumer)", "દ્વિતીય ઉપભોક્તા (Secondary Consumer)", "વિઘટક (Decomposer)"], "ans": 1, "exp": "જે જીવ સજીવ અને મૃત જૈવિક પદાર્થો બંને પર આહાર લે છે તેને 'સર્વભક્ષી' (Omnivore) કહેવાય છે, જે પ્રાથમિક ઉપભોક્તા તરીકે ગણવામાં આવે છે. ઉત્પાદક (A) ફક્ત પ્રકાશસંશ્લેષણ દ્વારા ખોરાક ઉત્પન્ન કરે છે. દ્વિતીય ઉપભોક્તા (C) ફક્ત પ્રાથમિક ઉપભોક્તાઓ પર આહાર લે છે. વિઘટક (D) ફક્ત મૃત જૈવિક પદાર્થોનું વિઘટન કરે છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર (Ecosystem)", "ch": ""}, {"q": "ખોરાક જાળમાં, જો એક જીવ ફક્ત પ્રાણીજન્ય પદાર્થો પર આહાર લે છે, પરંતુ તેનો આહાર બે અલગ પોષક સ્તરોના જીવો પર આધારિત હોય, તો તે કયા પોષક સ્તરે સ્થાન પામે છે?", "opts": ["પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા", "તૃતીય ઉપભોક્તા", "પ્રાથમિક અને દ્વિતીય ઉપભોક્તા બંને"], "ans": 3, "exp": "જો એક જીવ બે અલગ પોષક સ્તરોના જીવો પર આહાર લે છે, તો તે બંને પોષક સ્તરો પર સ્થાન પામે છે. ઉદાહરણ તરીકે, જો એક જીવ પ્રાથમિક ઉપભોક્તા (શાકાહારી) અને દ્વિતીય ઉપભોક્તા (માંસાહારી) બંને પર આહાર લે, તો તે પ્રાથમિક અને દ્વિતીય ઉપભોક્તા બંને તરીકે ગણાય છે. A, B, અને C પર્યાયો ફક્ત એક જ પોષક સ્તર દર્શાવે છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર (Ecosystem)", "ch": ""}, {"q": "ખોરાક જાળમાં, જો એક જીવ મૃત જૈવિક પદાર્થો અને સજીવ જીવો બંને પર આહાર લે છે, તો તેના માટે કયો પર્યાય યોગ્ય છે?", "opts": ["વિઘટક", "પરોપજીવી", "મૃતોપજીવી", "સહજીવી"], "ans": 2, "exp": "જે જીવ મૃત જૈવિક પદાર્થો અને સજીવ જીવો બંને પર આહાર લે છે તેને 'મૃતોપજીવી' (Scavenger) કહેવાય છે. વિઘટક (A) ફક્ત મૃત જૈવિક પદાર્થોનું વિઘટન કરે છે. પરોપજીવી (B) ફક્ત સજીવ જીવો પર આશ્રિત હોય છે. સહજીવી (D) બંને જીવોને લાભ થાય તેવું સંબંધ દર્શાવે છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર (Ecosystem)", "ch": ""}, {"q": "ખોરાક જાળમાં, જો એક જીવ ફક્ત પ્રકાશસંશ્લેષણ દ્વારા ઉર્જા મેળવે છે, પરંતુ તેનો આહાર અન્ય ઉત્પાદકો પર પણ આધારિત હોય, તો તેને કયા પોષક સ્તરે ગણવામાં આવે છે?", "opts": ["ઉત્પાદક", "પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા", "ઉત્પાદક અને પ્રાથમિક ઉપભોક્તા બંને"], "ans": 3, "exp": "જો એક જીવ પ્રકાશસંશ્લેષણ દ્વારા ઉર્જા મેળવે છે (ઉત્પાદક) અને અન્ય ઉત્પાદકો પર પણ આહાર લે છે, તો તે ઉત્પાદક અને પ્રાથમિક ઉપભોક્તા બંને તરીકે ગણાય છે. A ફક્ત ઉત્પાદક દર્શાવે છે, B અને C ફક્ત એક જ પોષક સ્તર દર્શાવે છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર (Ecosystem)", "ch": ""}, {"q": "ખોરાક જાળમાં, જો એક જીવ ફક્ત અન્ય જીવોના મળમૂત્ર પર આહાર લે છે, તો તેને કયા પોષક સ્તરે ગણવામાં આવે છે?", "opts": ["વિઘટક", "પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા", "મૃતોપજીવી"], "ans": 0, "exp": "જે જીવ ફક્ત અન્ય જીવોના મળમૂત્ર પર આહાર લે છે તેને 'વિઘટક' (Decomposer) કહેવાય છે, કારણ કે તે મૃત જૈવિક પદાર્થોનું વિઘટન કરે છે. પ્રાથમિક ઉપભોક્તા (B) અને દ્વિતીય ઉપભોક્તા (C) સજીવ જીવો પર આહાર લે છે. મૃતોપજીવી (D) મૃત જીવો પર આહાર લે છે, પરંતુ મળમૂત્ર પર નહીં.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર (Ecosystem)", "ch": ""}, {"q": "ખોરાક જાળમાં, જો એક જીવ સીધો સૂર્યપ્રકાશનો ઉપયોગ કર્યા વગર, અન્ય જીવના શરીરમાંથી કાર્બન મેળવે છે, પરંતુ તે જીવ પોતે પ્રાથમિક ઉત્પાદક નથી, તો તે કયા પોષક સ્તરે ગણાય છે?", "opts": ["પ્રાથમિક ઉત્પાદક", "દ્વિતીય ઉત્પાદક", "પ્રાથમિક ઉપભોક્તા", "તૃતીય ઉપભોક્તા"], "ans": 2, "exp": "પ્રાથમિક ઉપભોક્તા (C) સીધો સૂર્યપ્રકાશનો ઉપયોગ કર્યા વગર અન્ય જીવ (મુખ્યત્વે ઉત્પાદકો) પર આહાર લે છે અને કાર્બન મેળવે છે. પ્રાથમિક ઉત્પાદક (A) સૂર્યપ્રકાશનો ઉપયોગ કરે છે, દ્વિતીય ઉત્પાદક (B) શબ્દ ખોરાક જાળમાં વાપરાતો નથી, અને તૃતીય ઉપભોક્તા (D) પ્રાથમિક ઉપભોક્તા પર આહાર લે છે, પરંતુ પ્રશ્નમાં વર્ણવેલ જીવ પ્રાથમિક ઉપભોક્તા છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણ અને જૈવવિવિધતા", "ch": ""}, {"q": "ખોરાક જાળમાં, જો એક જીવ મૃત જૈવિક પદાર્થોનું વિઘટન કરે છે અને તેની ઉર્જા મેળવે છે, પરંતુ તે જીવ પોતે વિઘટક નથી, તો તે કયા પ્રકારનો જીવ ગણાય છે?", "opts": ["પરોપજીવી", "મૃતોપજીવી", "સહજીવી", "વિઘટક"], "ans": 1, "exp": "મૃતોપજીવી (B) મૃત જૈવિક પદાર્થો પર આહાર લે છે, પરંતુ વિઘટક (D) તો મૃત જૈવિક પદાર્થોનું વિઘટન કરે છે અને પોષક તત્વો મુક્ત કરે છે. પરોપજીવી (A) જીવંત જીવ પર આશ્રિત હોય છે, અને સહજીવી (C) બંને જીવોને લાભ થાય છે તેવી સ્થિતિ છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણ અને જૈવવિવિધતા", "ch": ""}, {"q": "ખોરાક જાળમાં, જો એક જીવ પ્રકાશસંશ્લેષણ દ્વારા ઉર્જા મેળવતો નથી, પરંતુ તે પોતે પ્રાણી છે અને અન્ય પ્રાણીઓના રક્ત પર આહાર લે છે, તો તે કયા પોષક સ્તરે ગણાય છે?", "opts": ["પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા", "તૃતીય ઉપભોક્તા", "ચતુર્થ ઉપભોક્તા"], "ans": 2, "exp": "જીવ જે અન્ય પ્રાણીઓના રક્ત પર આહાર લે છે તે તૃતીય ઉપભોક્તા (C) ગણાય છે, કારણ કે તે પ્રાથમિક અથવા દ્વિતીય ઉપભોક્તા પર આશ્રિત હોય છે. પ્રાથમિક ઉપભોક્તા (A) ઉત્પાદકો પર આહાર લે છે, દ્વિતીય ઉપભોક્તા (B) પ્રાથમિક ઉપભોક્તા પર આહાર લે છે, અને ચતુર્થ ઉપભોક્તા (D) તૃતીય ઉપભોક્તા પર આહાર લે છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણ અને જૈવવિવિધતા", "ch": ""}, {"q": "ખોરાક જાળમાં, જો એક જીવ પોતે ઉત્પાદક નથી, પરંતુ તે અન્ય જીવના શરીરમાં રહે છે અને તેના પોષક તત્વો મેળવે છે, તો તે કયા પ્રકારનો જીવ ગણાય છે?", "opts": ["સહજીવી", "પરોપજીવી", "મૃતોપજીવી", "વિઘટક"], "ans": 1, "exp": "પરોપજીવી (B) અન્ય જીવના શરીરમાં રહે છે અને તેના પોષક તત્વો મેળવે છે, જ્યારે સહજીવી (A) બંને જીવોને લાભ થાય છે, મૃતોપજીવી (C) મૃત જૈવિક પદાર્થો પર આહાર લે છે, અને વિઘટક (D) મૃત જૈવિક પદાર્થોનું વિઘટન કરે છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણ અને જૈવવિવિધતા", "ch": ""}, {"q": "ખોરાક જાળમાં, જો એક જીવ પોતે પ્રકાશસંશ્લેષણ કરતો નથી, પરંતુ તે અન્ય જીવના શરીરમાં રહીને તેના ઉત્સર્જન પદાર્થોનો ઉપયોગ કરે છે, તો તે કયા પ્રકારનો જીવ ગણાય છે?", "opts": ["સહજીવી", "પરોપજીવી", "મૃતોપજીવી", "વિઘટક"], "ans": 0, "exp": "સહજીવી (A) જીવ અન્ય જીવના શરીરમાં રહીને તેના ઉત્સર્જન પદાર્થોનો ઉપયોગ કરે છે અને બંને જીવોને લાભ થાય છે. પરોપજીવી (B) અન્ય જીવના શરીરમાં રહે છે અને તેના પોષક તત્વો મેળવે છે, મૃતોપજીવી (C) મૃત જૈવિક પદાર્થો પર આહાર લે છે, અને વિઘટક (D) મૃત જૈવિક પદાર્થોનું વિઘટન કરે છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણ અને જૈવવિવિધતા", "ch": ""}, {"q": "ખોરાક જાળમાં, જ્યારે એક જીવ સજીવ અને મૃત કોષીય પદાર્થો બંનેનો ઉપભોગ કરે છે, ત્યારે તેને કયા પોષક સ્તરમાં ગણવામાં આવે છે?", "opts": ["ઉત્પાદક (Producer)", "પ્રાથમિક ઉપભોક્તા (Primary Consumer)", "દ્વિતીય ઉપભોક્તા (Secondary Consumer)", "વિઘટક (Decomposer)"], "ans": 3, "exp": "વિઘટક (Decomposer) એવા જીવો છે જે મૃત જૈવિક પદાર્થોનું વિઘટન કરે છે અને પોષક તત્વોને પુનઃચક્રિત કરે છે. જ્યારે એક જીવ સજીવ અને મૃત કોષીય પદાર્થો બંનેનો ઉપભોગ કરે છે, ત્યારે તે વિઘટકની ભૂમિકા ભજવે છે. ઉત્પાદકો (A) પ્રકાશસંશ્લેષણ દ્વારા ઉર્જા ઉત્પન્ન કરે છે, પ્રાથમિક ઉપભોક્તા (B) ફક્ત ઉત્પાદકો પર આહાર લે છે, અને દ્વિતીય ઉપભોક્તા (C) પ્રાથમિક ઉપભોક્તાઓ પર આહાર લે છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણ અને તેના ઘટકો", "ch": ""}, {"q": "ખોરાક જાળમાં, જો એક જીવ ફક્ત અન્ય જીવોના રક્ત પર આહાર લે છે, તો તેને કયા પોષક સ્તરમાં ગણવામાં આવે છે?", "opts": ["પરોપજીવી (Parasite)", "મૃતોપજીવી (Saprophyte)", "શિકારી (Predator)", "સહજીવી (Symbiont)"], "ans": 0, "exp": "રક્ત પર આહાર લેનારા જીવો (જેમ કે જૂ, મચ્છર) પરોપજીવી (Parasite) હોય છે, કારણ કે તેઓ જીવંત હોસ્ટ પર આશ્રિત હોય છે અને તેના રક્તનો ઉપભોગ કરે છે. મૃતોપજીવી (B) મૃત જૈવિક પદાર્થો પર આહાર લે છે, શિકારી (C) અન્ય જીવોને મારીને ખાય છે, અને સહજીવી (D) પરસ્પર લાભ માટેના સંબંધમાં હોય છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણ અને તેના ઘટકો", "ch": ""}, {"q": "ખોરાક જાળમાં, જ્યારે એક જીવ અન્ય જીવના શરીરમાં રહીને તેના પોષક તત્વોનો ઉપભોગ કરે છે અને તેને નુકસાન પહોંચાડે છે, તો તેને કયા પ્રકારનો સંબંધ કહેવાય છે?", "opts": ["સહજીવન (Mutualism)", "પરોપજીવીતા (Parasitism)", "સહભોજીતા (Commensalism)", "સ્પર્ધા (Competition)"], "ans": 1, "exp": "જ્યારે એક જીવ અન્ય જીવના શરીરમાં રહીને તેના પોષક તત્વોનો ઉપભોગ કરે છે અને તેને નુકસાન પહોંચાડે છે, ત્યારે તે પરોપજીવીતા (Parasitism) કહેવાય છે. સહજીવન (A)માં બંને જીવોને લાભ થાય છે, સહભોજીતા (C)માં એક જીવને લાભ થાય છે અને બીજાને નુકસાન નથી, અને સ્પર્ધા (D)માં બંને જીવો એકબીજા સાથે સ્પર્ધા કરે છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણ અને તેના ઘટકો", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લો અને સાચો વિકલ્પ પસંદ કરો:\n\nવિધાન ૧: ખોરાક જાળમાં, જો એક જીવ એક કરતાં વધુ પોષક સ્તરે સ્થાન પામતો હોય તો તેને 'ઓમ્નિવોર' કહેવાય છે.\nવિધાન ૨: ખોરાક જાળમાં, જો એક જીવ ફક્ત મૃત જૈવિક પદાર્થોનું વિઘટન કરતો હોય તો તેને 'ડેટ્રિટિવોર' કહેવાય છે.\nવિધાન ૩: ખોરાક જાળમાં, જો એક જીવ અન્ય જીવોના શરીરમાં રહીને તેના પોષક તત્વો મેળવતો હોય તો તેને 'પરોપજીવી' કહેવાય છે.\n\nવિકલ્પો:\nA) વિધાન ૧ અને ૨ સાચાં છે, વિધાન ૩ ખોટું છે\nB) વિધાન ૧ અને ૩ સાચાં છે, વિધાન ૨ ખોટું છે\nC) વિધાન ૨ અને ૩ સાચાં છે, વિધાન ૧ ખોટું છે\nD) ત્રણેય વિધાનો સાચાં છે", "opts": ["વિધાન ૧ અને ૨ સાચાં છે, વિધાન ૩ ખોટું છે", "વિધાન ૧ અને ૩ સાચાં છે, વિધાન ૨ ખોટું છે", "વિધાન ૨ અને ૩ સાચાં છે, વિધાન ૧ ખોટું છે", "ત્રણેય વિધાનો સાચાં છે"], "ans": 2, "exp": "વિધાન ૧ ખોટું છે કારણ કે 'ઓમ્નિવોર' એવા જીવને કહેવાય છે જે વનસ્પતિજન્ય અને પ્રાણીજન્ય બંને પ્રકારનો આહાર લે છે, પરંતુ તે એક કરતાં વધુ પોષક સ્તરે સ્થાન પામે તે જરૂરી નથી. વિધાન ૨ સાચું છે કારણ કે 'ડેટ્રિટિવોર' એવા જીવો છે જે મૃત જૈવિક પદાર્થોનું વિઘટન કરે છે. વિધાન ૩ સાચું છે કારણ કે 'પરોપજીવી' એવા જીવો છે જે અન્ય જીવોના શરીરમાં રહીને પોષક તત્વો મેળવે છે.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ અને ઉકેલો", "ch": ""}, {"q": "એક ખોરાક જાળમાં, એક જીવ 'X' નીચેના લક્ષણો ધરાવે છે:\n- તે સૂર્યપ્રકાશનો સીધો ઉપયોગ કરી શકતો નથી.\n- તે અન્ય જીવોના મૃત શરીર પર આહાર લે છે.\n- તે પોતાના આહારમાંથી કાર્બનિક પદાર્થોનું અકાર્બનિક પદાર્થોમાં રૂપાંતરણ કરે છે.\n\nઆ જીવ 'X' ને ખોરાક જાળમાં કયા પ્રકારના જીવ તરીકે વર્ગીકૃત કરવામાં આવશે?\n\nવિકલ્પો:\nA) ઉત્પાદક\nB) પ્રાથમિક ઉપભોક્તા\nC) વિઘટક\nD) ગૌણ ઉપભોક્તા", "opts": ["ઉત્પાદક", "પ્રાથમિક ઉપભોક્તા", "વિઘટક", "ગૌણ ઉપભોક્તા"], "ans": 2, "exp": "જીવ 'X' ને 'વિઘટક' તરીકે વર્ગીકૃત કરવામાં આવશે કારણ કે તે મૃત જૈવિક પદાર્થો પર આહાર લે છે અને કાર્બનિક પદાર્થોનું અકાર્બનિક પદાર્થોમાં રૂપાંતરણ કરે છે, જે વિઘટકોનું મુખ્ય કાર્ય છે. ઉત્પાદકો સૂર્યપ્રકાશનો ઉપયોગ કરીને ખોરાક બનાવે છે, જે આ જીવ કરી શકતો નથી. પ્રાથમિક અને ગૌણ ઉપભોક્તાઓ અન્ય સજીવો પર આહાર લે છે, પરંતુ તેઓ વિઘટનનું કાર્ય કરતા નથી.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ અને ઉકેલો", "ch": ""}, {"q": "ખોરાક જાળમાં, જો એક જીવ 'A' સીધો ઉત્પાદક નથી, પરંતુ તે મૃત જૈવિક પદાર્થોનું વિઘટન કરે છે અને તેના પોષક તત્વો મેળવે છે, તો તે કયા પોષક સ્તરે સ્થાન પામે છે?", "opts": ["પ્રથમ પોષક સ્તર (ઉત્પાદક)", "દ્વિતીય પોષક સ્તર (પ્રાથમિક ઉપભોક્તા)", "તૃતીય પોષક સ્તર (દ્વિતીયક ઉપભોક્તા)", "વિઘટક (ડીકમ્પોઝર)"], "ans": 3, "exp": "જીવ 'A' મૃત જૈવિક પદાર્થોનું વિઘટન કરે છે અને પોષક તત્વો મેળવે છે, જે વિઘટક (ડીકમ્પોઝર)ની ભૂમિકા છે. ઉત્પાદકો (A) પ્રકાશસંશ્લેષણ દ્વારા ઉર્જા ઉત્પન્ન કરે છે, પ્રાથમિક ઉપભોક્તા (B) સજીવ વનસ્પતિ ખાય છે, અને દ્વિતીયક ઉપભોક્તા (C) અન્ય પ્રાણીઓ ખાય છે. વિઘટકો મૃત જૈવિક પદાર્થોનું વિઘટન કરે છે અને પોષક ચક્રમાં મહત્વની ભૂમિકા ભજવે છે.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "ખોરાક જાળમાં, જો એક જીવ 'B' અન્ય જીવના શરીરમાં રહીને તેના પોષક તત્વોનો ઉપભોગ કરે છે અને તેને નુકસાન પહોંચાડે છે, તો તે કયા પ્રકારનો પોષક સંબંધ દર્શાવે છે?", "opts": ["પરોપજીવી (Parasitism)", "સહજીવન (Mutualism)", "મૃતોપજીવી (Saprophytism)", "સહભોજી (Commensalism)"], "ans": 0, "exp": "જીવ 'B' અન્ય જીવના શરીરમાં રહીને તેના પોષક તત્વોનો ઉપભોગ કરે છે અને તેને નુકસાન પહોંચાડે છે, જે પરોપજીવી (Parasitism) સંબંધ છે. સહજીવન (B)માં બંને જીવોને ફાયદો થાય છે, મૃતોપજીવી (C) મૃત જૈવિક પદાર્થો પર આધાર રાખે છે, અને સહભોજી (D)માં એક જીવ ફાયદો મેળવે છે અને બીજાને નુકસાન થતું નથી.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "ખોરાક જાળમાં, જો એક જીવ 'C' ફક્ત અન્ય જીવોના રક્ત પર આહાર લે છે, તો તે કયા પોષક સ્તરે સ્થાન પામે છે?", "opts": ["પ્રથમ પોષક સ્તર (ઉત્પાદક)", "દ્વિતીય પોષક સ્તર (પ્રાથમિક ઉપભોક્તા)", "તૃતીય પોષક સ્તર (દ્વિતીયક ઉપભોક્તા)", "ચતુર્થ પોષક સ્તર (તૃતીયક ઉપભોક્તા)"], "ans": 2, "exp": "જીવ 'C' અન્ય જીવોના રક્ત પર આહાર લે છે, જે તેને દ્વિતીયક ઉપભોક્તા (તૃતીય પોષક સ્તર) બનાવે છે. ઉત્પાદકો (A) પ્રકાશસંશ્લેષણ દ્વારા ઉર્જા ઉત્પન્ન કરે છે, પ્રાથમિક ઉપભોક્તા (B) સજીવ વનસ્પતિ ખાય છે, અને તૃતીયક ઉપભોક્તા (D) દ્વિતીયક ઉપભોક્તાઓ ખાય છે.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "ખોરાક જાળમાં, જો એક જીવ 'D' પોતે પ્રકાશસંશ્લેષણ કરતો નથી, પરંતુ તે અન્ય જીવના શરીરમાં રહીને તેના પોષક તત્વોનો ઉપભોગ કરે છે અને તેને નુકસાન પહોંચાડતો નથી, તો તે કયા પ્રકારનો પોષક સંબંધ દર્શાવે છે?", "opts": ["પરોપજીવી (Parasitism)", "સહજીવન (Mutualism)", "સહભોજી (Commensalism)", "મૃતોપજીવી (Saprophytism)"], "ans": 2, "exp": "જીવ 'D' અન્ય જીવના શરીરમાં રહીને તેના પોષક તત્વોનો ઉપભોગ કરે છે પરંતુ તેને નુકસાન પહોંચાડતો નથી, જે સહભોજી (Commensalism) સંબંધ છે. પરોપજીવી (A)માં હાનિ થાય છે, સહજીવન (B)માં બંનેને ફાયદો થાય છે, અને મૃતોપજીવી (D) મૃત જૈવિક પદાર્થો પર આધાર રાખે છે.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "ખોરાક જાળમાં, જો એક જીવ 'E' મૃત જૈવિક પદાર્થો અને સજીવ જીવો બંને પર આહાર લે છે, તો તે કયા પોષક સ્તરે સ્થાન પામે છે?", "opts": ["પ્રથમ પોષક સ્તર (ઉત્પાદક)", "દ્વિતીય પોષક સ્તર (પ્રાથમિક ઉપભોક્તા)", "તૃતીય પોષક સ્તર (દ્વિતીયક ઉપભોક્તા)", "વિઘટક અને ઉપભોક્તા બંને"], "ans": 3, "exp": "જીવ 'E' મૃત જૈવિક પદાર્થો અને સજીવ જીવો બંને પર આહાર લે છે, જે તેને વિઘટક અને ઉપભોક્તા બંનેની ભૂમિકા અપાવે છે. ઉત્પાદકો (A) પ્રકાશસંશ્લેષણ દ્વારા ઉર્જા ઉત્પન્ન કરે છે, પ્રાથમિક ઉપભોક્તા (B) સજીવ વનસ્પતિ ખાય છે, અને દ્વિતીયક ઉપભોક્તા (C) અન્ય પ્રાણીઓ ખાય છે.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "ખોરાક જાળમાં, જો એક જીવ 'Y' નીચેના લક્ષણો ધરાવે છે: (૧) તે મૃત જૈવિક પદાર્થોનું વિઘટન કરે છે, (૨) તે કાર્બન ચક્રમાં મહત્વની ભૂમિકા ભજવે છે, (૩) તે પ્રકાશસંશ્લે   }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
