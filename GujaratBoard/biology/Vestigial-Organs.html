<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vestigial Organs</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Vestigial Organs</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Vestigial Organs</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "માનવમાં અવશેષી અંગોના સંદર્ભમાં નીચેના પૈકી કયું વિધાન સત્ય નથી?", "opts": ["અપેન્ડિક્સ એક અવશેષી અંગ છે જેનો હાલમાં કોઈ મહત્વપૂર્ણ કાર્ય નથી.", "કોક્સિક્સ (Tailbone) માનવમાં પૂંછડીનું અવશેષી સ્વરૂપ છે.", "કર્ણસંચાળન (Muscles of ear) માનવમાં સંપૂર્ણ રીતે કામ કરતાં નથી પરંતુ અન્ય સસ્તનોમાં સરખી રીતે કાર્ય કરે છે.", "થાયરોઈડ ગ્રંથિ એક અવશેષી અંગ છે જેનો માનવમાં કોઈ ઉપયોગ નથી."], "ans": 3, "exp": "થાયરોઈડ ગ્રંથિ એક અગત્યનું હોર્મોન ઉત્પન્ન કરતું અંગ છે, જે ચયાપચયને નિયંત્રિત કરે છે. તે અવશેષી અંગ નથી. અપેન્ડિક્સ, કોક્સિક્સ અને કર્ણસંચાળન અવશેષી અંગો છે, જેઓ ઉત્ક્રાંતિ દરમિયાન તેમના મૂળ કાર્ય ગુમાવી ચૂક્યા છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેના પૈકી કયું જોડકું અવશેષી અંગ અને તેના મૂળ કાર્યનું સરખું નથી?", "opts": ["અપેન્ડિક્સ - પાચનમાં મદદ", "કોક્સિક્સ - શરીરના સંતુલનમાં મદદ", "વિસરમ (Wisdom teeth) - ખોરાક ચાવવો", "પ્લિકા સેમિલ્યુનારિસ - આંખની હલનચલનમાં મદદ"], "ans": 0, "exp": "અપેન્ડિક્સનું મૂળ કાર્ય પાચન નહીં પરંતુ કદાચ લસિકા પેશી સાથે સંબંધિત હતું. કોક્સિક્સ પૂંછડીનો અવશેષ છે જે સંતુલનમાં મદદ કરતું હતું. વિસરમ દાંત ખોરાક ચાવવામાં મદદ કરતા હતા. પ્લિકા સેમિલ્યુનારિસ આંખની હલનચલનમાં મદદ કરતી હતી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "માનવમાં અવશેષી અંગોના અભ્યાસથી ઉત્ક્રાંતિના કયા સિદ્ધાંતની પુષ્ટિ થાય છે?", "opts": ["પ્રાકૃતિક પસંદગી", "ઉપાર્જિત લક્ષણોની અનુવંશિકતા", "વર્ગીકરણના પુરાવા", "જનીન વહન"], "ans": 2, "exp": "અવશેષી અંગો વર્ગીકરણના પુરાવા તરીકે ગણવામાં આવે છે, કારણ કે તેઓ સમાન પૂર્વજ ધરાવતા જીવો વચ્ચેના સંબંધો દર્શાવે છે. પ્રાકૃતિક પસંદગી અને ઉપાર્જિત લક્ષણોની અનુવંશિકતા અવશેષી અંગો સાથે સીધા સંબંધિત નથી. જનીન વહન તો આનુવંશિકતાનો ભાગ છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેના પૈકી કયું અવશેષી અંગ નથી પરંતુ તેનું કદ ઘટી ગયું છે?", "opts": ["અપેન્ડિક્સ", "થાયમસ ગ્રંથિ", "કોક્સિક્સ", "વિસરમ દાંત"], "ans": 1, "exp": "થાયમસ ગ્રંથિ બાળપણમાં પ્રતિરક્ષાતંત્રમાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે પરંતુ વય સાથે તેનું કદ ઘટી જાય છે, પરંતુ તે અવશેષી અંગ નથી. અપેન્ડિક્સ, કોક્સિક્સ અને વિસરમ દાંત અવશેષી અંગો છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "માનવમાં કોઈપણ અવશેષી અંગનું કદ ઘટી જવાનું મુખ્ય કારણ કયું છે?", "opts": ["તે અંગનો ઉપયોગ લાંબા સમયથી બંધ થયો હોવાથી તેનો વિકાસ થતો નથી", "તે અંગમાં જનીન મ્યુટેશન થવાથી તેનું કદ ઘટી ગયું છે", "તે અંગ પર્યાવરણીય દબાણને કારણે નિષ્ક્રિય બન્યું છે", "તે અંગનું કાર્ય અન્ય અંગોએ લઈ લેવાથી તેનો ઉપયોગ રહેતો નથી"], "ans": 3, "exp": "સરળ શબ્દોમાં, અવશેષી અંગો એવા અંગો છે જે પૂર્વજોમાં ઉપયોગી હતા પરંતુ વર્તમાન જીવમાં તેનું કાર્ય અન્ય અંગો દ્વારા લેવામાં આવે છે, જેથી તે અંગનો ઉપયોગ રહેતો નથી અને તેનું કદ ઘટી જાય છે. ઓપ્શન D સરળતાથી સમજાવે છે કે અવશેષી અંગનું કાર્ય અન્ય અંગોએ લઈ લેવાથી તેનો ઉપયોગ રહેતો નથી, જે અવશેષી અંગોના ઘટતા કદનું મુખ્ય કારણ છે. ઓપ્શન A, B, અને C અવશેષી અંગોના ઘટતા કદના સીધા કારણો નથી, પરંતુ તે અવશેષી અંગોના વિકાસ સાથે સંકળાયેલા પરિબળો હોઈ શકે છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "માનવમાં અપેન્ડિક્સ (Appendix) એ અવશેષી અંગ છે. તેના સંબંધમાં નીચેના પૈકી કયું વિધાન સત્ય છે?", "opts": ["તે પાચનતંત્રનું સક્રિય અંગ છે અને આહારના પાચનમાં મહત્વની ભૂમિકા ભજવે છે.", "તે મૂળ રૂપે સસ્તન પ્રાણીઓમાં પાચન માટે ઉપયોગી હતું પરંતુ માનવમાં તેનું કાર્ય લગભગ નિષ્ક્રિય થઈ ગયું છે.", "તે શરીરમાં હોર્મોન ઉત્પન્ન કરે છે જે પ્રજનન ક્રિયામાં મદદ કરે છે.", "તે ચેતાતંત્ર સાથે સીધો સંબંધ ધરાવે છે અને સ્નાયુ ગતિવિધિઓને નિયંત્રિત કરે છે."], "ans": 1, "exp": "અપેન્ડિક્સ એ માનવમાં અવશેષી અંગ છે જે મૂળ રૂપે સસ્તન પ્રાણીઓમાં પાચન માટે ઉપયોગી હતું, પરંતુ માનવ ઉત્ક્રાંતિમાં તેનું કાર્ય લગભગ નિષ્ક્રિય થઈ ગયું છે. A) ખોટું છે કારણ કે અપેન્ડિક્સ પાચનમાં સક્રિય ભૂમિકા ભજવતું નથી. C) ખોટું છે કારણ કે અપેન્ડિક્સ હોર્મોન ઉત્પન્ન કરતું નથી. D) ખોટું છે કારણ કે અપેન્ડિક્સ ચેતાતંત્ર સાથે સીધો સંબંધ ધરાવતું નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "નીચેના પૈકી કયું જોડકું અવશેષી અંગ અને તેના મૂળ કાર્યનું યોગ્ય સંબંધ દર્શાવે છે?", "opts": ["કોક્સિક્સ (Coccyx) - પૂંછડીની હલનચલન માટે મદદરૂપ", "પ્લિકા સેમિલ્યુનારિસ (Plica semilunaris) - આંખની રક્ષા માટે પલકના રૂપમાં વિકસિત", "વર્મિફોર્મ એપેન્ડિક્સ (Vermiform appendix) - રોગપ્રતિકારક કોષોનું ઉત્પાદન", "મસલ્સ ઓફ ઈયર (Muscles of ear) - શ્રવણ શક્તિ વધારવા માટે"], "ans": 0, "exp": "કોક્સિક્સ એ માનવમાં અવશેષી અંગ છે જે મૂળ રૂપે પૂંછડીની હલનચલન માટે ઉપયોગી હતું. B) ખોટું છે કારણ કે પ્લિકા સેમિલ્યુનારિસ આંખની રક્ષા માટે નહીં પરંતુ આંસુના વહનમાં મદદ કરે છે. C) ખોટું છે કારણ કે વર્મિફોર્મ એપેન્ડિક્સ રોગપ્રતિકારક કોષોનું ઉત્પાદન કરતું નથી. D) ખોટું છે કારણ કે મસલ્સ ઓફ ઈયર શ્રવણ શક્તિ વધારવા માટે નહીં પરંતુ કાનની હલનચલન માટે ઉપયોગી હતા.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "માનવમાં અવશેષી અંગોના અભ્યાસથી નીચેના પૈકી કયો સિદ્ધાંત સ્પષ્ટ થતો નથી?", "opts": ["ઉત્ક્રાંતિ દરમિયાન અંગોનું કદ અને કાર્ય ઘટી શકે છે.", "અવશેષી અંગો એ ઉત્ક્રાંતિના પુરાવા તરીકે ગણી શકાય છે.", "માનવ અને અન્ય સસ્તન પ્રાણીઓ વચ્ચે સમાન પૂર્વજ હોઈ શકે છે.", "અવશેષી અંગો એ જનીન મ્યુટેશનના પરિણામે ઉત્પન્ન થાય છે."], "ans": 3, "exp": "અવશેષી અંગો એ ઉત્ક્રાંતિ દરમિયાન અંગોના ઉપયોગમાં ઘટાડા કારણે ઉત્પન્ન થાય છે, જનીન મ્યુટેશનના પરિણામે નહીં. A, B, અને C સિદ્ધાંતો અવશેષી અંગોના અભ્યાસથી સ્પષ્ટ થાય છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "નીચેના પૈકી કયું અવશેષી અંગ નથી પરંતુ તેનું કાર્ય માનવમાં બદલાઈ ગયું છે?", "opts": ["કોક્સિક્સ (Coccyx)", "પ્લિકા સેમિલ્યુનારિસ (Plica semilunaris)", "ક્લેવિકલ (Clavicle)", "વર્મિફોર્મ એપેન્ડિક્સ (Vermiform appendix)"], "ans": 2, "exp": "ક્લેવિકલ (Clavicle) એ અવશેષી અંગ નથી, પરંતુ તેનું કાર્ય માનવમાં બદલાઈ ગયું છે. A, B, અને D અવશેષી અંગો છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "માનવમાં અવશેષી અંગોના અભ્યાસથી નીચેના પૈકી કયો નિષ્કર્ષ કાઢી શકાય નહીં?", "opts": ["માનવ ઉત્ક્રાંતિમાં અંગોનું કદ અને કાર્ય ઘટી શકે છે.", "માનવ અને અન્ય પ્રાણીઓ વચ્ચે સમાન પૂર્વજ હોઈ શકે છે.", "અવશેષી અંગો એ ઉત્ક્રાંતિના પુરાવા તરીકે ગણી શકાય છે.", "અવશેષી અંગો એ માનવમાં નવા કાર્ય માટે વિકસિત થયા છે."], "ans": 3, "exp": "અવશેષી અંગો એ ઉત્ક્રાંતિ દરમિયાન અંગોના ઉપયોગમાં ઘટાડા કારણે ઉત્પન્ન થાય છે, નવા કાર્ય માટે વિકસિત થયા નથી. A, B, અને C નિષ્કર્ષો અવશેષી અંગોના અભ્યાસથી કાઢી શકાય છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "માનવમાં કોસ્ટા (Coccyx) એ અવશેષી અંગ છે. તેના સંબંધમાં નીચેના પૈકી કયું વિધાન સત્ય છે?", "opts": ["તે પૂર્વજોમાં પૂંછડીના અસ્થિઓનો ભાગ હતો અને હવે તેનું કોઈ કાર્ય નથી.", "તે પૂર્વજોમાં પૂંછડીના અસ્થિઓનો ભાગ હતો અને હવે તે પેલ્વિક અસ્થિઓને સ્થિરતા આપે છે.", "તે પૂર્વજોમાં પગના અસ્થિઓનો ભાગ હતો અને હવે તે ચાલવામાં મદદ કરે છે.", "તે પૂર્વજોમાં હાથના અસ્થિઓનો ભાગ હતો અને હવે તે હાથની હલનચલનમાં મદદ કરે છે."], "ans": 1, "exp": "કોસ્ટા (Coccyx) પૂર્વજોમાં પૂંછડીના અસ્થિઓનો ભાગ હતો, પરંતુ હવે તે પેલ્વિક અસ્થિઓને સ્થિરતા આપે છે. વિકલ્પ A ખોટો છે કારણ કે કોસ્ટાનું હજુ પણ કેટલાક કાર્યો છે. વિકલ્પ C અને D ખોટા છે કારણ કે કોસ્ટા પૂંછડીના અસ્થિઓનો ભાગ હતો, પગ અથવા હાથના નહીં.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "માનવમાં નીચેના પૈકી કયું અવશેષી અંગ નથી, પરંતુ તેનું કાર્ય પૂર્ણપણે બદલાઈ ગયું છે?", "opts": ["અપેન્ડિક્સ (Appendix)", "કાનની પેશી (Muscle of the ear)", "ત્રિકોણાકાર પડદો (Plica semilunaris)", "થાયરોઈડ ગ્રંથિ (Thyroid gland)"], "ans": 3, "exp": "થાયરોઈડ ગ્રંથિ અવશેષી અંગ નથી, પરંતુ તેનું કાર્ય હોર્મોન ઉત્પાદન છે, જે પૂર્વજોમાં અલગ હતું. અપેન્ડિક્સ, કાનની પેશી, અને ત્રિકોણાકાર પડદો અવશેષી અંગો છે, જેમના કાર્યો ઘટી ગયા છે અથવા બદલાઈ ગયા છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "માનવમાં નીચેના પૈકી કયું જોડકું અવશેષી અંગ અને તેના મૂળ કાર્યનું યોગ્ય સંબંધ દર્શાવતું નથી?", "opts": ["અપેન્ડિક્સ - આંતરડાનું પચન", "કાનની પેશી - કાનની હલનચલન", "ત્રિકોણાકાર પડદો - આંખનું રક્ષણ", "કોસ્ટા - પૂંછડીની હલનચલન"], "ans": 0, "exp": "અપેન્ડિક્સનું મૂળ કાર્ય આંતરડાનું પચન નથી, પરંતુ તે પૂર્વજોમાં પચનમાં મદદ કરતું હતું. કાનની પેશી (B), ત્રિકોણાકાર પડદો (C), અને કોસ્ટા (D) એ તેમના મૂળ કાર્યો સાથે યોગ્ય સંબંધ દર્શાવે છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "માનવમાં અવશેષી અંગોના સંદર્ભમાં નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["અવશેષી અંગો પૂર્વજોમાં ઉપયોગી હતા, પરંતુ હવે તેનું કદ ઘટી ગયું છે.", "અવશેષી અંગો પૂર્વજોમાં ઉપયોગી હતા, પરંતુ હવે તેનું કાર્ય બદલાઈ ગયું છે.", "અવશેષી અંગો પૂર્વજોમાં ઉપયોગી નહોતા, પરંતુ હવે તે ઉપયોગી બન્યા છે.", "અવશેષી અંગો પૂર્વજોમાં ઉપયોગી હતા, પરંતુ હવે તેનું કદ અને કાર્ય બંને ઘટી ગયા છે."], "ans": 2, "exp": "અવશેષી અંગો પૂર્વજોમાં ઉપયોગી હતા, પરંતુ હવે તેનું કદ ઘટી ગયું છે (A), કાર્ય બદલાઈ ગયું છે (B), અથવા કદ અને કાર્ય બંને ઘટી ગયા છે (D). વિકલ્પ C ખોટો છે કારણ કે અવશેષી અંગો પૂર્વજોમાં ઉપયોગી હતા, હવે ઉપયોગી બન્યા નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "માનવ શરીરમાં જોવા મળતા નીચેના પૈકી કયા અંગને 'અવશેષી અંગ' તરીકે વર્ગીકૃત કરવામાં આવે છે, પરંતુ તે હાલમાં પણ કેટલાક વ્યક્તિઓમાં કાર્યશીલ હોઈ શકે છે અને તેનું કાર્ય ઉત્ક્રાંતિ દરમિયાન સંપૂર્ણપણે લુપ્ત થયું નથી?", "opts": ["કર્ણપલ્લવ સ્નાયુ (Auricular muscles)", "નેત્રપટલ (Nictitating membrane)", "અક્કલ દાંત (Wisdom teeth)", "એપેન્ડિક્સ (Vermiform appendix)"], "ans": 3, "exp": "સાચો જવાબ D) એપેન્ડિક્સ છે. એપેન્ડિક્સને અવશેષી અંગ તરીકે ગણવામાં આવે છે કારણ કે તેનું મૂળ કાર્ય (સેલ્યુલોઝનું પાચન) માનવમાં લગભગ લુપ્ત થઈ ગયું છે, પરંતુ હાલના અભ્યાસો દર્શાવે છે કે તે પ્રતિરક્ષાતંત્રમાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે અને કેટલાક વ્યક્તિઓમાં કાર્યશીલ હોઈ શકે છે. A) કર્ણપલ્લવ સ્નાયુ મોટાભાગના માનવોમાં કાર્યહીન છે અને તેનું કાર્ય સંપૂર્ણપણે લુપ્ત થયું છે. B) નેત્રપટલ માનવમાં અવશેષી છે અને તેનું કાર્ય લુપ્ત થયું છે. C) અક્કલ દાંતને અવશેષી અંગ તરીકે ગણવામાં આવતું નથી, તે માત્ર કદમાં ઘટાડો દર્શાવે છે પરંતુ તેનું કાર્ય યથાવત છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "માનવ શરીરમાં જોવા મળતા 'પ્લીહા' (Spleen) અંગના સંદર્ભમાં નીચેના પૈકી કયું વિધાન અવશેષી અંગની વ્યાખ્યાને અનુરૂપ નથી?", "opts": ["પ્લીહા રક્તકણોના નાશમાં મદદ કરે છે, જે તેનું મૂળ કાર્ય છે.", "પ્લીહા પ્રતિરક્ષા પ્રતિક્રિયામાં ભાગ લે છે, જે તેનું વર્તમાન કાર્ય છે.", "પ્લીહાનું કદ ઉત્ક્રાંતિ દરમિયાન ઘટ્યું નથી, પરંતુ તેનું કાર્ય બદલાયું છે.", "પ્લીહા એ અવશેષી અંગ છે કારણ કે તેનું મૂળ કાર્ય હવે અસ્તિત્વમાં નથી."], "ans": 3, "exp": "પ્લીહા એ અવશેષી અંગ નથી કારણ કે તેનું મૂળ કાર્ય (રક્તકણોનો નાશ) હજુ પણ ચાલુ છે અને તેનું કદ ઘટ્યું નથી. અવશેષી અંગોનું મુખ્ય લક્ષણ એ છે કે તેમનું મૂળ કાર્ય લુપ્ત થઈ ગયું હોય અથવા કદ ઘટી ગયું હોય. વિકલ્પ D ખોટો છે કારણ કે પ્લીહાનું મૂળ કાર્ય હજુ પણ અસ્તિત્વમાં છે અને તેનું કાર્ય બદલાયું છે, પરંતુ તે અવશેષી નથી.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેના પૈકી કયું અવશેષી અંગ માનવમાં જોવા મળતું નથી, પરંતુ કેટલાક પ્રાણીઓમાં તેનું કાર્ય હજુ પણ સક્રિય છે?", "opts": ["નિક્ટિટેટિંગ પટલ (Nictitating Membrane)", "એપેન્ડિક્સ (Appendix)", "કોસ્ટા (Coccyx)", "વાઈઝડમ દાંત (Wisdom Teeth)"], "ans": 0, "exp": "નિક્ટિટેટિંગ પટલ એ માનવમાં અવશેષી અંગ નથી, પરંતુ કેટલાક પ્રાણીઓ (જેમ કે પક્ષીઓ, બિલાડીઓ)માં તેનું કાર્ય હજુ પણ સક્રિય છે. તે આંખને રક્ષણ આપવા માટે ઉપયોગી છે. માનવમાં તેનું કોઈ કાર્ય નથી અને તે અવશેષી નથી. અન્ય વિકલ્પો (B, C, D) માનવમાં અવશેષી અંગો છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "માનવમાં જોવા મળતા અવશેષી અંગોના સંદર્ભમાં નીચેના પૈકી કયું વિધાન ખોટું છે, જે ઉત્ક્રાંતિના સિદ્ધાંત સાથે સુસંગત નથી?", "opts": ["અવશેષી અંગોનું અસ્તિત્વ એ દર્શાવે છે કે માનવના પૂર્વજોમાં આ અંગો કાર્યરત હતા.", "અવશેષી અંગોનું કદ ઘટવું એ ઉત્ક્રાંતિ દરમિયાન ઉપયોગિતા ગુમાવવાનું પરિણામ છે.", "અવશેષી અંગો હંમેશા માનવ શરીર માટે હાનિકારક હોય છે અને તેને દૂર કરવા જોઈએ.", "અવશેષી અંગો ઉત્ક્રાંતિના પુરાવા તરીકે ગણી શકાય છે."], "ans": 2, "exp": "અવશેષી અંગો હંમેશા હાનિકારક હોતા નથી અને તેને દૂર કરવાની જરૂર નથી. ઉદાહરણ તરીકે, એપેન્ડિક્સ પ્રતિરક્ષા પ્રણાલીમાં મદદરૂપ હોઈ શકે છે. વિકલ્પ C ખોટો છે કારણ કે તે ઉત્ક્રાંતિના સિદ્ધાંત સાથે સુસંગત નથી. અન્ય વિકલ્પો ઉત્ક્રાંતિના સિદ્ધાંતોને સમર્થન આપે છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેના પૈકી કયું અવશેષી અંગ માનવમાં જોવા મળે છે, પરંતુ તેનું કાર્ય હજુ પણ આંશિક રીતે જળવાઈ રહ્યું છે?", "opts": ["કાનની સ્નાયુઓ (Auricular Muscles)", "એપેન્ડિક્સ (Appendix)", "પૂંછડીના હાડકાં (Coccyx)", "વાઈઝડમ દાંત (Wisdom Teeth)"], "ans": 1, "exp": "એપેન્ડિક્સ એ અવશેષી અંગ છે, પરંતુ તેનું કાર્ય હજુ પણ આંશિક રીતે જળવાઈ રહ્યું છે. તે પ્રતિરક્ષા પ્રણાલીમાં મદદરૂપ થઈ શકે છે. અન્ય વિકલ્પો (A, C, D)નું કાર્ય લગભગ સંપૂર્ણપણે લુપ્ત થઈ ગયું છે અથવા માત્ર અવશેષ સ્વરૂપે જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "માનવમાં જોવા મળતા અવશેષી અંગોના સંદર્ભમાં નીચેના પૈકી કયું જોડકું યોગ્ય નથી?", "opts": ["પ્લીકા સેમિલ્યુનારિસ (Plica Semilunaris) - ત્રીજી પાંપણનું અવશેષ", "એપેન્ડિક્સ (Appendix) - સેલ્યુલોઝ પાચનમાં મદદ કરતું અંગ", "કાનની સ્નાયુઓ (Auricular Muscles) - કાન હલાવવામાં મદદ કરતું અંગ", "વાઈઝડમ દાંત (Wisdom Teeth) - જડબાના કદમાં ઘટાડાનું પરિણામ"], "ans": 1, "exp": "એપેન્ડિક્સ એ સેલ્યુલોઝ પાચનમાં મદદ કરતું અંગ નથી. તે માનવના પૂર્વજોમાં સેલ્યુલોઝ પાચનમાં મદદરૂપ હતું, પરંતુ હવે તેનું કાર્ય બદલાઈ ગયું છે. વિકલ્પ B ખોટું છે કારણ કે તે અવશેષી અંગના મૂળ કાર્ય સાથે સુસંગત નથી. અન્ય વિકલ્પો યોગ્ય જોડકાં છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
