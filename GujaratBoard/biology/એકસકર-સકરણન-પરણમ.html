<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>એકસંકરી સંકરણનું પરિણામ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>એકસંકરી સંકરણનું પરિણામ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">એકસંકરી સંકરણનું પરિણામ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એકસંકરી સંકરણમાં F₂ પેઢીમાં ફિનોટાઇપિક ગુણોત્તર ૩:૧ મળે છે, પરંતુ જ્યારે સંપૂર્ણ પ્રભાવિતા ન હોય ત્યારે કયું ગુણોત્તર મળે છે?", "opts": ["૧:૨:૧", "૯:૩:૩:૧", "૧:૧:૧:૧", "૩:૧"], "ans": 0, "exp": "સંપૂર્ણ પ્રભાવિતામાં F₂ પેઢીમાં ૩:૧ ગુણોત્તર મળે છે, પરંતુ અપૂર્ણ પ્રભાવિતામાં (જેમ કે ગુલાબી ફૂલના રંગમાં) F₂ પેઢીમાં ફિનોટાઇપિક ગુણોત્તર ૧:૨:૧ મળે છે. બાકીના વિકલ્પો અસંગત છે: ૯:૩:૩:૧ ડાયહાયબ્રિડ ક્રોસનું ગુણોત્તર છે, ૧:૧:૧:૧ ટેટ્રાહાયબ્રિડ ક્રોસનું નહીં, અને ૩:૧ સંપૂર્ણ પ્રભાવિતાનું ગુણોત્તર છે.", "ref": "Std 12 - અધ્યાય ૫: વંશવિજ્ઞાનના સિદ્ધાંતો", "ch": ""}, {"q": "મેન્ડલના એકસંકરી સંકરણ પ્રયોગમાં, જ્યારે બે વિરોધી લક્ષણો ધરાવતા શુદ્ધ જાતના છોડને સંકરિત કરવામાં આવે છે, ત્યારે F₁ પેઢીમાં કયું લક્ષણ દેખાય છે?", "opts": ["મિશ્ર લક્ષણ", "પ્રભાવી લક્ષણ", "અપ્રભાવી લક્ષણ", "કોઈ લક્ષણ દેખાતું નથી"], "ans": 1, "exp": "મેન્ડલના પ્રયોગો અનુસાર, F₁ પેઢીમાં પ્રભાવી લક્ષણ જ દેખાય છે, કારણ કે પ્રભાવી જનીન અપ્રભાવી જનીન પર પ્રભાવ પાડે છે. મિશ્ર લક્ષણ અપૂર્ણ પ્રભાવિતામાં જોવા મળે છે, અપ્રભાવી લક્ષણ F₁માં દેખાતું નથી, અને કોઈ લક્ષણ ન દેખાય તે અશક્ય છે.", "ref": "Std 12 - અધ્યાય ૫: વંશવિજ્ઞાનના સિદ્ધાંતો", "ch": ""}, {"q": "એકસંકરી સંકરણમાં, જો F₁ પેઢીના સજીવને અપ્રભાવી શુદ્ધ જાત સાથે સંકરિત કરવામાં આવે, તો તેને શું કહેવાય છે?", "opts": ["ટેસ્ટ ક્રોસ", "બેક ક્રોસ", "ડાયહાયબ્રિડ ક્રોસ", "રિસિપ્રોકલ ક્રોસ"], "ans": 0, "exp": "F₁ પેઢીના સજીવને અપ્રભાવી શુદ્ધ જાત સાથે સંકરિત કરવાને ટેસ્ટ ક્રોસ કહેવાય છે, જેનો ઉપયોગ જનીનોટાઇપ નક્કી કરવા માટે થાય છે. બેક ક્રોસમાં F₁ ને પેરન્ટલ જાત સાથે સંકરિત કરવામાં આવે છે, ડાયહાયબ્રિડ ક્રોસ બે લક્ષણો માટે થાય છે, અને રિસિપ્રોકલ ક્રોસમાં સ્ત્રી અને પુરુષ પેરન્ટ્સની અદલાબદલી થાય છે.", "ref": "Std 12 - અધ્યાય ૫: વંશવિજ્ઞાનના સિદ્ધાંતો", "ch": ""}, {"q": "મેન્ડલના એકસંકરી સંકરણમાં, જો પ્રભાવી જનીન 'A' અને અપ્રભાવી જનીન 'a' હોય, તો F₂ પેઢીમાં શુદ્ધ પ્રભાવી સજીવોનું પ્રમાણ કેટલું હશે?", "opts": ["૨૫%", "૫૦%", "૭૫%", "૧૦૦%"], "ans": 0, "exp": "F₂ પેઢીમાં જનીનોટાઇપિક ગુણોત્તર ૧:૨:૧ હોય છે, જેમાં AA (શુદ્ધ પ્રભાવી) ૨૫%, Aa (સંકર) ૫૦%, અને aa (શુદ્ધ અપ્રભાવી) ૨૫% હોય છે. આથી શુદ્ધ પ્રભાવી સજીવોનું પ્રમાણ ૨૫% હોય છે.", "ref": "Std 12 - અધ્યાય ૫: વંશવિજ્ઞાનના સિદ્ધાંતો", "ch": ""}, {"q": "એકસંકરી સંકરણમાં, જો F₁ પેઢીના સજીવમાં અપૂર્ણ પ્રભાવિતા જોવા મળે, તો F₂ પેઢીમાં ફિનોટાઇપિક ગુણોત્તર કયું હશે?", "opts": ["૩:૧", "૧:૨:૧", "૯:૩:૩:૧", "૧:૧"], "ans": 1, "exp": "અપૂર્ણ પ્રભાવિતામાં, F₁ પેઢીમાં સંકર લક્ષણ (જેમ કે ગુલાબી રંગ) દેખાય છે, અને F₂ પેઢીમાં ફિનોટાઇપિક ગુણોત્તર ૧:૨:૧ હોય છે (૧ શુદ્ધ પ્રભાવી, ૨ સંકર, ૧ શુદ્ધ અપ્રભાવી). ૩:૧ સંપૂર્ણ પ્રભાવિતાનું ગુણોત્તર છે, ૯:૩:૩:૧ ડાયહાયબ્રિડ ક્રોસનું છે, અને ૧:૧ ટેસ્ટ ક્રોસનું ગુણોત્તર છે.", "ref": "Std 12 - અધ્યાય ૫: વંશવિજ્ઞાનના સિદ્ધાંતો", "ch": ""}, {"q": "એકસંકરી સંકરણના પ્રયોગમાં, જો F1 પેઢીના સજીવમાં પ્રભાવી લક્ષણ ધરાવતા હોવા છતાં, F2 પેઢીમાં ૧:૨:૧ નું ફિનોટાઇપિક ગુણોત્તર જોવા મળે, તો નીચેનામાંથી કયો નિર્ણય સાચો છે?", "opts": ["અપૂર્ણ પ્રભાવિતા (Incomplete dominance) જોવા મળે છે", "સહ-પ્રભાવિતા (Co-dominance) જોવા મળે છે", "પ્રભાવી જનીન લેથલ (Lethal dominant gene) છે", "અપ્રભાવી જનીન લેથલ (Lethal recessive gene) છે"], "ans": 0, "exp": "F2 પેઢીમાં ૧:૨:૧ નું ગુણોત્તર અપૂર્ણ પ્રભાવિતાનું લક્ષણ છે, જ્યાં પ્રભાવી અને અપ્રભાવી જનીનના મિશ્રણથી મધ્યવર્તી લક્ષણ દેખાય છે. સહ-પ્રભાવિતામાં ૧:૨:૧ ગુણોત્તર પણ મળે, પરંતુ ત્યાં બંને લક્ષણો સ્પષ્ટ રીતે દેખાય છે (ઉદા. AB રક્તગ્રુપ). પ્રભાવી અથવા અપ્રભાવી લેથલ જનીનના કિસ્સામાં ગુણોત્તર ૨:૧ અથવા ૧:૧ હશે, ૧:૨:૧ નહીં.", "ref": "Std 12 - Chapter 3: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "મેન્ડલના એકસંકરી સંકરણમાં, જો F1 પેઢીના સજીવને બંને શુદ્ધ જાતના માતાપિતા સાથે પાછળ સંકરિત કરવામાં આવે, તો કયું ગુણોત્તર મળશે?", "opts": ["૧:૧", "૩:૧", "૧:૨:૧", "૨:૧"], "ans": 0, "exp": "F1 પેઢીના સજીવ (Aa)ને શુદ્ધ પ્રભાવી (AA) અથવા શુદ્ધ અપ્રભાવી (aa) સાથે સંકરિત કરવામાં આવે ત્યારે, તેને પાછળ સંકરણ (Backcross) કહેવાય. શુદ્ધ અપ્રભાવી (aa) સાથે સંકરણ કરતા, F2 પેઢીમાં ૧:૧ નું ગુણોત્તર મળે (Aa:aa). બાકીના વિકલ્પો અયોગ્ય છે કારણ કે ૩:૧ F2 પેઢીના સ્વ-પરાગનયનમાં, ૧:૨:૧ અપૂર્ણ પ્રભાવિતામાં, અને ૨:૧ લેથલ જનીનના કિસ્સામાં મળે.", "ref": "Std 12 - Chapter 3: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એકસંકરી સંકરણમાં, જો પ્રભાવી જનીન 'A' અને અપ્રભાવી જનીન 'a' ધરાવતા સજીવમાં, 'A' જનીન લેથલ હોય, તો F2 પેઢીમાં કયું ગુણોત્તર મળશે?", "opts": ["૩:૧", "૧:૨:૧", "૨:૧", "૧:૧"], "ans": 2, "exp": "જો પ્રભાવી જનીન 'A' લેથલ હોય, તો F1 પેઢી (Aa) જીવંત રહેશે, પરંતુ F2 પેઢીમાં AA જનીનધારી સજીવ મરી જશે. આથી, F2 પેઢીમાં ફક્ત Aa (જીવંત) અને aa (જીવંત) મળશે, જેથી ગુણોત્તર ૨:૧ (Aa:aa) થશે. ૩:૧ અને ૧:૨:૧ લેથલ જનીનના કિસ્સામાં લાગુ પડતું નથી, જ્યારે ૧:૧ પાછળ સંકરણમાં મળે.", "ref": "Std 12 - Chapter 3: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એકસંકરી સંકરણમાં, જો F1 પેઢીના સજીવમાં સહ-પ્રભાવિતા (Co-dominance) જોવા મળે, તો F2 પેઢીમાં કયું ગુણોત્તર મળશે?", "opts": ["૧:૨:૧", "૩:૧", "૧:૧:૧:૧", "૨:૧:૧"], "ans": 0, "exp": "સહ-પ્રભાવિતામાં, બંને એલિલ્સ પોતપોતાના લક્ષણો દર્શાવે છે (ઉદા. AB રક્તગ્રુપ). F1 પેઢી (Aa)માં બંને લક્ષણો દેખાય, અને F2 પેઢીમાં AA, Aa, aa નું ગુણોત્તર ૧:૨:૧ મળે, જ્યાં Aa હેટરોઝાયગસમાં બંને લક્ષણો દેખાય. ૩:૧ અપૂર્ણ પ્રભાવિતા અથવા સંપૂર્ણ પ્રભાવિતામાં, ૧:૧:૧:૧ દ્વિસંકરી સંકરણમાં, અને ૨:૧:૧ લેથલ જનીનના કિસ્સામાં મળે.", "ref": "Std 12 - Chapter 3: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એકસંકરી સંકરણમાં, જો F1 પેઢીના સજીવને અપ્રભાવી શુદ્ધ જાત સાથે સંકરિત કરવામાં આવે, તો F2 પેઢીમાં કયું ગુણોત્તર મળશે, જો પ્રભાવી જનીન 'A' લેથલ ન હોય?", "opts": ["૧:૧", "૩:૧", "૧:૨:૧", "૨:૧"], "ans": 0, "exp": "F1 પેઢીના સજીવ (Aa)ને અપ્રભાવી શુદ્ધ જાત (aa) સાથે સંકરિત કરવામાં આવે ત્યારે, તેને ટેસ્ટ ક્રોસ કહેવાય. આ સંકરણમાં, F2 પેઢીમાં Aa અને aa નું ગુણોત્તર ૧:૧ મળે. ૩:૧ F2 પેઢીના સ્વ-પરાગનયનમાં, ૧:૨:૧ અપૂર્ણ પ્રભાવિતામાં, અને ૨:૧ લેથલ જનીનના કિસ્સામાં મળે.", "ref": "Std 12 - Chapter 3: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એકસંકરી સંકરણમાં, જો F1 પેઢીના સજીવમાં લેથલ જનીન (લીથલ જીન) હાજર હોય અને તે અપ્રભાવી હોય, તો F2 પેઢીમાં ફિનોટાઇપિક ગુણોત્તર કયું મળશે?", "opts": ["૩:૧", "૨:૧", "૧:૧", "૧:૨:૧"], "ans": 1, "exp": "લેથલ જનીન અપ્રભાવી હોવાથી F1 પેઢીના સજીવ જીવિત રહેશે, પરંતુ F2 પેઢીમાં AA: Aa: aa ગુણોત્તર ૧:૨:૧ મળે છે. પરંતુ aa (લેથલ) ધરાવતા સજીવ મરી જાય છે, જેથી ફિનોટાઇપિક ગુણોત્તર ૨:૧ (જીવિત:AA અને Aa) મળે છે. A) ૩:૧ ખોટું છે કારણ કે લેથલ જનીનના કારણે aa મરી જાય છે. C) ૧:૧ અને D) ૧:૨:૧ ફિનોટાઇપિક ગુણોત્તર નથી.", "ref": "Std 12 - અધ્યાય ૫: વંશવિજ્ઞાન અને વિકાસ", "ch": ""}, {"q": "મેન્ડલના એકસંકરી સંકરણમાં, જો પ્રભાવી જનીન 'B' અને અપ્રભાવી જનીન 'b' ધરાવતા સજીવમાં, 'B' જનીન પુરુષ ગેમેટમાં જ મરી જાય છે, તો F2 પેઢીમાં ફિનોટાઇપિક ગુણોત્તર કયું મળશે?", "opts": ["૧:૧", "૩:૧", "૨:૧", "૧:૨"], "ans": 0, "exp": "જો 'B' જનીન પુરુષ ગેમેટમાં જ મરી જાય, તો F1 પેઢીના સજીવ (Bb) માત્ર 'b' ગેમેટ જ ઉત્પન્ન કરશે. જ્યારે F1ને આત્મપરાગણ કરાવવામાં આવે, તો F2 પેઢીમાં માત્ર 'bb' જ મળશે, પરંતુ F1 (Bb) અને અપ્રભાવી શુદ્ધ જાત (bb) વચ્ચે સંકરણ કરવામાં આવે તો F2 પેઢીમાં Bb અને bb ગુણોત્તર ૧:૧ મળે છે. B) ૩:૧, C) ૨:૧, અને D) ૧:૨ ખોટા છે કારણ કે 'B' ગેમેટ મરી જાય છે.", "ref": "Std 12 - અધ્યાય ૫: વંશવિજ્ઞાન અને વિકાસ", "ch": ""}, {"q": "એકસંકરી સંકરણમાં, જો F1 પેઢીના સજીવમાં 'A' અને 'a' જનીન ધરાવતા હોય અને 'A' જનીન પુરુષ ગેમેટમાં જ મરી જાય, તો F1ને અપ્રભાવી શુદ્ધ જાત (aa) સાથે સંકરિત કરવામાં આવે, તો સંતતિઓમાં કયું ગુણોત્તર મળશે?", "opts": ["૧:૧", "૨:૧", "૩:૧", "માત્ર aa"], "ans": 3, "exp": "F1 (Aa) માત્ર 'a' ગેમેટ જ ઉત્પન્ન કરશે કારણ કે 'A' પુરુષ ગેમેટમાં મરી જાય છે. જ્યારે F1 (Aa)ને aa સાથે સંકરિત કરવામાં આવે, તો સંતતિઓમાં માત્ર 'aa' જ મળશે. A) ૧:૧, B) ૨:૧, અને C) ૩:૧ ખોટા છે કારણ કે 'A' ગેમેટ મરી જાય છે.", "ref": "Std 12 - અધ્યાય ૫: વંશવિજ્ઞાન અને વિકાસ", "ch": ""}, {"q": "એકસંકરી સંકરણના પ્રયોગમાં, જો પ્રભાવી જનીન 'A' અને અપ્રભાવી જનીન 'a' ધરાવતા બે વિષમયુગ્મી (Heterozygous) સજીવો વચ્ચે સંકરણ કરવામાં આવે, તો F1 પેઢીમાં કયું પરિણામ મળવાની સંભાવના નથી? (નોંધ: અહીં લેથલ જનીનની અસર ધ્યાનમાં લો.)", "opts": ["૧૦૦% સજીવોમાં પ્રભાવી લક્ષણ દેખાશે", "૨૫% સજીવો અપ્રભાવી લક્ષણ દર્શાવશે", "૨૫% સજીવો જીવિત નહીં રહે", "૫૦% સજીવો વિષમયુગ્મી હશે"], "ans": 0, "exp": "આ પ્રશ્નમાં લેથલ જનીનની અસર ધ્યાનમાં લેવામાં આવી છે. જો 'AA' જનીનપ્રકાર લેથલ હોય, તો F1 પેઢીમાં 'AA' જનીનપ્રકાર ધરાવતા સજીવો જીવિત નહીં રહે. આથી, ૨૫% 'AA' (લેથલ), ૫૦% 'Aa' (વિષમયુગ્મી), અને ૨૫% 'aa' (અપ્રભાવી) મળશે. આથી, ૧૦૦% સજીવોમાં પ્રભાવી લક્ષણ દેખાવાની સંભાવના નથી. વિકલ્પ A ખોટો છે કારણ કે ૨૫% સજીવો ('AA') જીવિત નહીં રહે, તેથી પ્રભાવી લક્ષણ ધરાવતા સજીવોની ટકાવારી ૭૫% થશે. વિકલ્પ B, C અને D સાચા પરિણામો દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ ૫: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એકસંકરી સંકરણના પ્રયોગમાં, જો F1 પેઢીના વિષમયુગ્મી સજીવ ('Aa') ને અપ્રભાવી શુદ્ધ જાત ('aa') સાથે સંકરિત કરવામાં આવે, તો પરિણામી પેઢીમાં કયું પરિણામ અપેક્ષિત નથી? (નોંધ: અહીં સહ-પ્રભાવિતા (Co-dominance) અને લિંગ-સંકલિત વારસો (Sex-linked inheritance) ધ્યાનમાં લો.)", "opts": ["૫૦% સજીવો પ્રભાવી લક્ષણ દર્શાવશે", "૧૦૦% સજીવો વિષમયુગ્મી હશે", "૫૦% સજીવો અપ્રભાવી લક્ષણ દર્શાવશે", "જો સહ-પ્રભાવિતા હોય, તો ૧૦૦% સજીવો મધ્યવર્તી લક્ષણ દર્શાવશે"], "ans": 1, "exp": "આ પ્રશ્નમાં બેકક્રોસ (Test cross) નું પરિણામ ધ્યાનમાં લેવામાં આવ્યું છે. વિષમયુગ્મી ('Aa') અને અપ્રભાવી શુદ્ધ જાત ('aa') ના સંકરણથી ૫૦% 'Aa' (પ્રભાવી લક્ષણ) અને ૫૦% 'aa' (અપ્રભાવી લક્ષણ) મળે છે. વિકલ્પ B ખોટો છે કારણ કે ૧૦૦% સજીવો વિષમયુગ્મી હોવાની સંભાવના નથી. જો સહ-પ્રભાવિતા હોય, તો પણ ૫૦% 'Aa' અને ૫૦% 'aa' મળશે, જેમાં 'Aa' સહ-પ્રભાવિતા દર્શાવશે, પરંતુ ૧૦૦% નહીં. વિકલ્પ A, C અને D સાચા પરિણામો દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ ૫: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એકસંકરી સંકરણમાં, જો F1 પેઢીના સજીવમાં 'A' (પ્રભાવી) અને 'a' (અપ્રભાવી) જનીન ધરાવતા હોય અને F2 પેઢીમાં ફિનોટાઇપિક ગુણોત્તર ૧:૨:૧ મળે, તો નીચેનામાંથી કયો પરિબળ આ ગુણોત્તર માટે જવાબદાર છે?", "opts": ["સંપૂર્ણ પ્રભાવિતા (Complete dominance)", "અપૂર્ણ પ્રભાવિતા (Incomplete dominance)", "સહ-પ્રભાવિતા (Co-dominance)", "લેથલ જનીન (Lethal gene)"], "ans": 1, "exp": "ફિનોટાઇપિક ગુણોત્તર ૧:૨:૧ અપૂર્ણ પ્રભાવિતાના કિસ્સામાં જોવા મળે છે, જ્યાં વિષમયુગ્મી (Aa) સજીવોનું લક્ષણ શુદ્ધ પ્રભાવી (AA) અને શુદ્ધ અપ્રભાવી (aa) સજીવોના લક્ષણોથી ભિન્ન હોય છે. સંપૂર્ણ પ્રભાવિતામાં ગુણોત્તર ૩:૧ મળે છે, સહ-પ્રભાવિતામાં ફિનોટાઇપિક ગુણોત્તર ૧:૨:૧ મળે પરંતુ લક્ષણો અલગ અલગ પ્રકારે પ્રગટ થાય છે, જ્યારે લેથલ જનીનના કિસ્સામાં ગુણોત્તર ૨:૧ મળે છે.", "ref": "Std 12 - અધ્યાય ૫: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "એકસંકરી સંકરણના પ્રયોગમાં, જો પ્રભાવી જનીન 'A' એ અપ્રભાવી જનીન 'a' પર સંપૂર્ણ પ્રભાવી હોય, પરંતુ 'A' જનીન ધરાવતા સજીવમાં જીવનક્ષમતા 50% જેટલી ઘટી જતી હોય, તો F2 પેઢીમાં ફિનોટાઇપિક ગુણોત્તર કયો મળે?", "opts": ["૨:૧", "૧:૨:૧", "૧:૧", "૩:૧"], "ans": 0, "exp": "અહીં 'A' જનીન ધરાવતા સજીવની જીવનક્ષમતા 50% ઘટી જાય છે, એટલે કે 'AA' જનીનપ્રકાર ધરાવતા સજીવોની સંખ્યા અડધી થઈ જાય છે. આથી F2 પેઢીમાં 'AA' : 'Aa' : 'aa' નો જનીનપ્રકાર ગુણોત્તર ૧:૨:૧ મળે, પરંતુ 'AA' ની સંખ્યા અડધી થવાથી ફિનોટાઇપિક ગુણોત્તર ૨ ('Aa' + અડધા 'AA') : ૧ ('aa') મળે છે. વિકલ્પ A સાચો છે. બાકીના વિકલ્પો આ પરિસ્થિતિને અનુરૂપ નથી.", "ref": "Std 12 - પ્રકરણ ૫: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "એકસંકરી સંકરણના પ્રયોગમાં, જો F1 પેઢીના સજીવમાં 'A' (પ્રભાવી) અને 'a' (અપ્રભાવી) જનીન ધરાવતા હોય અને F2 પેઢીમાં ફિનોટાઇપિક ગુણોત્તર ૩:૧ ન મળે પરંતુ ૨:૧ મળે, તો આ કયા અનુવંશિકતા પ્રકારને સૂચવે છે?", "opts": ["સંપૂર્ણ પ્રભાવિતા", "અપૂર્ણ પ્રભાવિતા", "સહ-પ્રભાવિતા", "લેથલ જનીનની હાજરી"], "ans": 3, "exp": "F2 પેઢીમાં ફિનોટાઇપિક ગુણોત્તર ૨:૧ મળવું એ લેથલ જનીનની હાજરીને સૂચવે છે. સંપૂર્ણ પ્રભાવિતામાં ગુણોત્તર ૩:૧, અપૂર્ણ પ્રભાવિતામાં ૧:૨:૧, અને સહ-પ્રભાવિતામાં ૧:૨:૧ મળે છે. લેથલ જનીનના કિસ્સામાં, વિષમયુગ્મી સજીવ (Aa) જીવંત રહે છે પરંતુ સમાનયુગ્મી પ્રભાવી (AA) અથવા સમાનયુગ્મી અપ્રભાવી (aa) સજીવ મરી જાય છે, જેથી ગુણોત્તર ૨:૧ મળે છે.", "ref": "Std 12 - Chapter 3: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "મેન્ડલના એકસંકરી સંકરણ પ્રયોગમાં, જો F1 પેઢીના સજીવને અપ્રભાવી શુદ્ધ જાત સાથે સંકરિત કરવામાં આવે અને F2 પેઢીમાં ફિનોટાઇપિક ગુણોત્તર ૧:૧ મળે, તો F1 પેઢીના સજીવની જનીનરચના કઈ હશે?", "opts": ["AA", "Aa", "aa", "AABb"], "ans": 1, "exp": "F1 પેઢીના સજીવને અપ્રભાવી શુદ્ધ જાત (aa) સાથે સંકરિત કરવામાં આવે ત્યારે F2 પેઢીમાં ફિનોટાઇપિક ગુણોત્તર ૧:૧ મળે છે, જે વિષમયુગ્મી સજીવ (Aa) ની જનીનરચનાને સૂચવે છે. AA અથવા aa જનીનરચના ધરાવતા સજીવો સાથે સંકરણ કરવામાં આવે તો ગુણોત્તર ૧:૦ અથવા ૦:૧ મળે. AABb એ બહુસંકરી સંકરણની જનીનરચના છે, જે એકસંકરી સંકરણમાં લાગુ પડતી નથી.", "ref": "Std 12 - Chapter 3: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "એકસંકરી સંકરણના પ્રયોગમાં, જો F1 પેઢીના સજીવમાં 'A' અને 'a' જનીન ધરાવતા હોય અને F2 પેઢીમાં ફિનોટાઇપિક ગુણોત્તર ૧:૨:૧ મળે, તો આ કયા અનુવંશિકતા પ્રકારને સૂચવે છે?", "opts": ["સંપૂર્ણ પ્રભાવિતા", "અપૂર્ણ પ્રભાવિતા અથવા સહ-પ્રભાવિતા", "લેથલ જનીનની હાજરી", "બહુસંકરી સંકરણ"], "ans": 1, "exp": "F2 પેઢીમાં ફિનોટાઇપિક ગુણોત્તર ૧:૨:૧ મળવું એ અપૂર્ણ પ્રભાવિતા અથવા સહ-પ્રભાવિતાને સૂચવે છે. સંપૂર્ણ પ્રભાવિતામાં ગુણોત્તર ૩:૧, લેથલ જનીનના કિસ્સામાં ૨:૧, અને બહુસંકરી સંકરણમાં ગુણોત્તર ૯:૩:૩:૧ મળે છે. અપૂર્ણ પ્રભાવિતામાં, વિષમયુગ્મી સજીવ (Aa) નું લક્ષણ પ્રભાવી અને અપ્રભાવી લક્ષણના મિશ્રણ જેવું હોય છે, જ્યારે સહ-પ્રભાવિતામાં બંને લક્ષણો સ્પષ્ટ રીતે દેખાય છે.", "ref": "Std 12 - Chapter 3: અનુવંશિકતા અને વિવિધતા", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
