<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>બેક ક્રોસ (Back Cross)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>બેક ક્રોસ (Back Cross)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">બેક ક્રોસ (Back Cross)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "બેક ક્રોસ પ્રયોગમાં F₁ પેઢીના સંકર (હેટરોઝાયગસ) વ્યક્તિને પાછળના પિતૃ (પેરન્ટલ) જન્યુક્રમ સાથે ક્રોસ કરવામાં આવે છે. જો F₁ પેઢીનો જન્યુક્રમ AaBb હોય અને પાછળનો પિતૃ જન્યુક્રમ aabb હોય, તો F₂ પેઢીમાં ફીનોટાઇપિક રેશિયો કયો હશે?", "opts": ["1:1:1:1", "9:3:3:1", "3:1", "1:2:1"], "ans": 0, "exp": "બેક ક્રોસમાં F₁ પેઢીના સંકર વ્યક્તિને પાછળના પિતૃ જન્યુક્રમ (રિસેસિવ હોમોઝાયગસ) સાથે ક્રોસ કરવામાં આવે છે. અહીં F₁ (AaBb) અને aabb વચ્ચેના ક્રોસથી ચાર પ્રકારના ગેમેટ્સ (AB, Ab, aB, ab) અને aabbના ગેમેટ્સ (ab) મળે છે. પરિણામે F₂ પેઢીમાં ચાર પ્રકારના ફીનોટાઇપ્સ (AaBb, Aabb, aaBb, aabb) સરખા પ્રમાણમાં (1:1:1:1) મળે છે. બાકીના વિકલ્પો (B, C, D) ડાયહાઇબ્રિડ ક્રોસ અથવા મોનોહાઇબ્રિડ ક્રોસના રેશિયો છે, જે અહીં લાગુ પડતાં નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વારસાગત રોગો", "ch": ""}, {"q": "મેન્ડલના પ્રયોગોમાં બેક ક્રોસનો ઉપયોગ શા માટે કરવામાં આવે છે?", "opts": ["ડોમિનન્ટ અને રિસેસિવ લક્ષણોની ઓળખ કરવા", "જનીનની સ્થિતિ (લોકસ) નક્કી કરવા", "F₂ પેઢીમાં ફીનોટાઇપિક રેશિયો શોધવા", "મ્યુટેશનની શક્યતાઓ તપાસવા"], "ans": 0, "exp": "બેક ક્રોસનો મુખ્ય હેતુ ડોમિનન્ટ અને રિસેસિવ લક્ષણોની ઓળખ કરવાનો હોય છે. જ્યારે F₁ પેઢીના સંકર વ્યક્તિને રિસેસિવ પિતૃ સાથે ક્રોસ કરવામાં આવે છે, ત્યારે ફીનોટાઇપિક રેશિયો દર્શાવે છે કે કયા લક્ષણ ડોમિનન્ટ છે અને કયા રિસેસિવ છે. બાકીના વિકલ્પો (B, C, D) બેક ક્રોસના મુખ્ય ઉદ્દેશ્ય નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વારસાગત રોગો", "ch": ""}, {"q": "જો એક બેક ક્રોસ પ્રયોગમાં F₁ પેઢીનો જન્યુક્રમ Aa હોય અને પાછળનો પિતૃ જન્યુક્રમ aa હોય, તો F₂ પેઢીમાં કેટલા ટકા વ્યક્તિઓમાં ડોમિનન્ટ ફીનોટાઇપ દેખાશે?", "opts": ["25%", "50%", "75%", "100%"], "ans": 1, "exp": "F₁ પેઢીનો જન્યુક્રમ Aa અને પાછળનો પિતૃ aa હોય ત્યારે બેક ક્રોસથી બે પ્રકારના ગેમેટ્સ (A અને a) ઉત્પન્ન થાય છે. પરિણામે F₂ પેઢીમાં 50% વ્યક્તિઓ Aa (ડોમિનન્ટ ફીનોટાઇપ) અને 50% aa (રિસેસિવ ફીનોટાઇપ) મળે છે. અહીં 50% વ્યક્તિઓમાં ડોમિનન્ટ ફીનોટાઇપ દેખાશે. બાકીના વિકલ્પો (A, C, D) સંમત નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વારસાગત રોગો", "ch": ""}, {"q": "બેક ક્રોસ અને ટેસ્ટ ક્રોસ વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["બેક ક્રોસમાં F₁ પેઢીને ડોમિનન્ટ પિતૃ સાથે ક્રોસ કરવામાં આવે છે, જ્યારે ટેસ્ટ ક્રોસમાં રિસેસિવ પિતૃ સાથે ક્રોસ કરવામાં આવે છે", "બેક ક્રોસમાં F₁ પેઢીને રિસેસિવ પિતૃ સાથે ક્રોસ કરવામાં આવે છે, જ્યારે ટેસ્ટ ક્રોસમાં ડોમિનન્ટ પિતૃ સાથે ક્રોસ કરવામાં આવે છે", "બેક ક્રોસ અને ટેસ્ટ ક્રોસ એક જ પ્રકારના ક્રોસ છે, ફરક ફક્ત નામમાં છે", "બેક ક્રોસમાં F₂ પેઢીનો અભ્યાસ કરવામાં આવે છે, જ્યારે ટેસ્ટ ક્રોસમાં F₁ પેઢીનો અભ્યાસ કરવામાં આવે છે"], "ans": 0, "exp": "બેક ક્રોસમાં F₁ પેઢીને પાછળના પિતૃ (ડોમિનન્ટ અથવા રિસેસિવ) સાથે ક્રોસ કરવામાં આવે છે, જ્યારે ટેસ્ટ ક્રોસમાં F₁ પેઢીને રિસેસિવ હોમોઝાયગસ પિતૃ સાથે ક્રોસ કરવામાં આવે છે. અહીં બેક ક્રોસમાં ડોમિનન્ટ પિતૃ સાથે ક્રોસ કરવાનો ઉલ્લેખ છે, જ્યારે ટેસ્ટ ક્રોસમાં રિસેસિવ પિતૃ સાથે ક્રોસ કરવાનો ઉલ્લેખ છે. બાકીના વિકલ્પો (B, C, D) ખોટા છે.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વારસાગત રોગો", "ch": ""}, {"q": "જો એક બેક ક્રોસ પ્રયોગમાં F₁ પેઢીનો જન્યુક્રમ AaBb હોય અને પાછળનો પિતૃ જન્યુક્રમ AABB હોય, તો F₂ પેઢીમાં કયા જન્યુક્રમો મળશે?", "opts": ["AABB, AaBB, AAbb, Aabb", "AaBb, AABb, AaBB, AAbb", "AABB, AaBb, AAbb, aabb", "AaBb, Aabb, aaBb, aabb"], "ans": 1, "exp": "F₁ પેઢીનો જન્યુક્રમ AaBb અને પાછળનો પિતૃ AABB હોય ત્યારે બેક ક્રોસથી F₁ના ગેમેટ્સ (AB, Ab, aB, ab) અને પિતૃના ગેમેટ્સ (AB) મળે છે. પરિણામે F₂ પેઢીમાં AABB, AABb, AAbb, AaBB જન્યુક્રમો મળે છે. અહીં વિકલ્પ B સૌથી નજીક છે, પરંતુ સચોટ જન્યુક્રમો AABB, AABb, AAbb, AaBB છે. બાકીના વિકલ્પો (A, C, D) ખોટા છે.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વારસાગત રોગો", "ch": ""}, {"q": "બેક ક્રોસ પ્રયોગમાં, જો F1 પેઢીનો જન્યુક્રમ AaBb હોય અને પાછળનો પિતૃ (પેરન્ટલ) જન્યુક્રમ aabb હોય, તો F2 પેઢીમાં ફીનોટાઇપિક ગુણોત્તર કયો હશે?", "opts": ["1:1:1:1", "9:3:3:1", "1:2:1", "3:1"], "ans": 0, "exp": "બેક ક્રોસમાં F1 (AaBb)ને રિસેસિવ પેરન્ટ (aabb) સાથે ક્રોસ કરવામાં આવે છે. આથી ગેમેટ્સના સંયોજનથી 4 પ્રકારના ફીનોટાઇપ્સ પ્રાપ્ત થાય છે: AaBb, Aabb, aaBb, aabb. આથી ગુણોત્તર 1:1:1:1 થાય છે. વિકલ્પ B (9:3:3:1) ડાયહાયબ્રિડ ક્રોસનો ગુણોત્તર છે, વિકલ્પ C (1:2:1) મોનોહાયબ્રિડ ક્રોસનો છે, અને વિકલ્પ D (3:1) સંપૂર્ણ પ્રભાવી લક્ષણનો છે.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વારસાગત રોગો", "ch": ""}, {"q": "બેક ક્રોસ પ્રયોગમાં, જો F1 પેઢીનો જન્યુક્રમ Aa હોય અને પાછળનો પિતૃ જન્યુક્રમ aa હોય, તો F2 પેઢીમાં જન્યુક્રમિક ગુણોત્તર કયો હશે?", "opts": ["1:1", "1:2:1", "3:1", "1:1:1:1"], "ans": 0, "exp": "F1 (Aa)ને રિસેસિવ પેરન્ટ (aa) સાથે ક્રોસ કરવામાં આવે છે. ગેમેટ્સ A અને a (F1) તથા a (પેરન્ટ) સાથે સંયોજનથી Aa અને aa જન્યુક્રમો પ્રાપ્ત થાય છે. આથી જન્યુક્રમિક ગુણોત્તર 1:1 (Aa:aa) થાય છે. વિકલ્પ B (1:2:1) મોનોહાયબ્રિડ ક્રોસનો જન્યુક્રમિક ગુણોત્તર છે, વિકલ્પ C (3:1) ફીનોટાઇપિક ગુણોત્તર છે, અને વિકલ્પ D ડાયહાયબ્રિડ ક્રોસનો છે.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વારસાગત રોગો", "ch": ""}, {"q": "એક પ્રયોગમાં, લાલ ફૂલ ધરાવતા શુદ્ધ સંવર્ધિત વટાણાના છોડ (RR) ને સફેદ ફૂલ ધરાવતા શુદ્ધ સંવર્ધિત છોડ (rr) સાથે સંકરણ કરાવવામાં આવ્યું. F₁ પેઢીના છોડને પછી સફેદ ફૂલ ધરાવતા પિતૃ (rr) સાથે બેક ક્રોસ કરાવવામાં આવ્યો. પરિણામી સંતતિમાં લાલ અને સફેદ ફૂલોનું પ્રમાણ 1:1 મળ્યું. હવે, જો આ જ F₁ પેઢીના છોડને લાલ ફૂલ ધરાવતા પિતૃ (RR) સાથે બેક ક્રોસ કરાવવામાં આવે, તો નીચેનામાંથી કયું પરિણામ મળવાની સંભાવના છે?", "opts": ["બધા જ છોડ લાલ ફૂલ ધરાવતા હશે", "લાલ અને સફેદ ફૂલોનું પ્રમાણ 3:1 હશે", "લાલ અને સફેદ ફૂલોનું પ્રમાણ 1:1 હશે", "બધા જ છોડ સફેદ ફૂલ ધરાવતા હશે"], "ans": 0, "exp": "F₁ પેઢીનો જન્યુક્રમ Rr (હેટરોઝાયગસ) છે. જ્યારે તેને શુદ્ધ લાલ પિતૃ (RR) સાથે બેક ક્રોસ કરાવવામાં આવે, ત્યારે બે પ્રકારના જન્યુઓ ઉત્પન્ન થશે: R (F₁ પેઢીમાંથી) અને R અથવા r (પિતૃમાંથી). આમ, બધી જ સંતતિમાં ઓછામાં ઓછું એક પ્રભાવી જનીન (R) હશે, જે લાલ ફૂલનું નિર્માણ કરશે. તેથી બધા જ છોડ લાલ ફૂલ ધરાવતા હશે. વિકલ્પ B અને C ખોટા છે કારણ કે 3:1 અથવા 1:1 નું પ્રમાણ મેંડેલિયન સંકરણમાં જોવા મળે છે, બેક ક્રોસમાં નહીં. વિકલ્પ D ખોટો છે કારણ કે સફેદ ફૂલ માટે rr જન્યુક્રમ જરૂરી છે, જે આ કિસ્સામાં શક્ય નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક પ્રયોગમાં, એક છોડમાં બે લક્ષણોનું સંકરણ કરવામાં આવ્યું: ઊંચાઈ (T - ઊંચો, t - નીચો) અને બીજનો આકાર (R - ગોળ, r - ખરબચડો). F₁ પેઢીનો જન્યુક્રમ TtRr મળ્યો. જો આ F₁ પેઢીને દ્વિસંકર પિતૃ (TTRR) સાથે બેક ક્રોસ કરાવવામાં આવે, તો નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["બધી જ સંતતિ ઊંચી અને ગોળ બીજ ધરાવતી હશે", "સંતતિમાં જનીનિક વિવિધતા જોવા મળશે નહીં", "સંતતિમાં ફક્ત બે જ પ્રકારના ફિનોટાઇપ જોવા મળશે", "સંતતિમાં ચાર પ્રકારના જન્યુઓ ઉત્પન્ન થશે"], "ans": 3, "exp": "F₁ પેઢીનો જન્યુક્રમ TtRr છે અને પિતૃનો જન્યુક્રમ TTRR છે. બેક ક્રોસમાં, F₁ પેઢીના જન્યુઓ TR, Tr, tR, tr ઉત્પન્ન થશે, પરંતુ પિતૃ માત્ર TR જન્યુ ઉત્પન્ન કરશે. તેથી સંતતિમાં માત્ર બે પ્રકારના જન્યુક્રમ (TTRR અને TtRr) મળશે, જે બંને ઊંચા અને ગોળ બીજ ધરાવતા હશે. વિકલ્પ A, B અને C સાચા છે કારણ કે બધી સંતતિ એકસરખી હશે અને જનીનિક વિવિધતા નહીં હોય. વિકલ્પ D ખોટો છે કારણ કે સંતતિમાં ચાર પ્રકારના જન્યુઓ ઉત્પન્ન થશે નહીં, માત્ર બે જ પ્રકારના ફિનોટાઇપ મળશે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક પ્રયોગમાં, એક પ્રાણીમાં બે લક્ષણોનું સંકરણ કરવામાં આવ્યું: રંગ (B - કાળો, b - સફેદ) અને આંખનો આકાર (E - ગોળ, e - લંબગોળ). F₁ પેઢીનો જન્યુક્રમ BbEe મળ્યો. જો આ F₁ પેઢીને સફેદ અને લંબગોળ આંખ ધરાવતા પિતૃ (bbee) સાથે બેક ક્રોસ કરાવવામાં આવે, તો નીચેનામાંથી કયું પરિણામ મળવાની સંભાવના નથી?", "opts": ["કાળો રંગ અને ગોળ આંખ ધરાવતી સંતતિ", "કાળો રંગ અને લંબગોળ આંખ ધરાવતી સંતતિ", "સફેદ રંગ અને ગોળ આંખ ધરાવતી સંતતિ", "બધી જ સંતતિ સફેદ રંગ અને લંબગોળ આંખ ધરાવતી હશે"], "ans": 3, "exp": "F₁ પેઢીનો જન્યુક્રમ BbEe છે અને પિતૃનો જન્યુક્રમ bbee છે. બેક ક્રોસમાં, F₁ પેઢીના જન્યુઓ BE, Be, bE, be ઉત્પન્ન થશે અને પિતૃ માત્ર be જન્યુ ઉત્પન્ન કરશે. તેથી સંતતિમાં ચાર પ્રકારના જન્યુક્રમ મળશે: BbEe (કાળો-ગોળ), Bbee (કાળો-લંબગોળ), bbEe (સફેદ-ગોળ), અને bbee (સફેદ-લંબગોળ). વિકલ્પ A, B અને C સાચા છે કારણ કે આ ત્રણેય પ્રકારની સંતતિ મળી શકે છે. વિકલ્પ D ખોટો છે કારણ કે બધી જ સંતતિ સફેદ અને લંબગોળ હોવાની સંભાવના નથી, કારણ કે F₁ પેઢીના જન્યુઓમાં પ્રભાવી જનીનો પણ હાજર છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "બેક ક્રોસ પ્રયોગમાં, જો F1 પેઢીનો જન્યુક્રમ AaBbCc હોય અને પાછળનો પિતૃ જન્યુક્રમ aabbcc હોય, તો F2 પેઢીમાં કેટલા પ્રકારના જન્યુક્રમો મળી શકે?", "opts": ["8 પ્રકાર", "16 પ્રકાર", "32 પ્રકાર", "64 પ્રકાર"], "ans": 2, "exp": "F1 પેઢીનો જન્યુક્રમ AaBbCc હોવાથી, પાછળના પિતૃ aabbcc સાથે બેક ક્રોસ કરતા, ગેમીટ્સની સંભાવના AaBbCc માંથી 8 પ્રકારના ગેમીટ્સ અને aabbcc માંથી એક પ્રકારનો ગેમીટ મળે છે. પરિણામે, F2 પેઢીમાં 8 (ગેમીટ્સ) × 4 (સંયોજનો) = 32 પ્રકારના જન્યુક્રમો મળી શકે. A) 8 પ્રકાર ખોટું છે કારણ કે તે ગેમીટ્સની સંખ્યા દર્શાવે છે, નહીં જન્યુક્રમોની. B) 16 પ્રકાર ખોટું છે કારણ કે તે બે જનીનના સંકરણના પરિણામે મળે. D) 64 પ્રકાર ખોટું છે કારણ કે તે ત્રણ હેટરોઝાયગસ જન્યુક્રમો વચ્ચેના સંકરણના પરિણામે મળે.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વારસાગત રોગો", "ch": ""}, {"q": "એક પ્રયોગમાં, એક વૈજ્ઞાનિકે બે પ્રકારના વટાણાના છોડ વચ્ચે સંકરણ કર્યું: એક ઊંચો (TT) અને પીળા બીજવાળો (YY), બીજો નીચો (tt) અને લીલા બીજવાળો (yy). F1 પેઢીના છોડને પછી નીચા અને લીલા બીજવાળા પિતૃ સાથે બેક ક્રોસ કરવામાં આવ્યો. પરિણામી સંતતિમાં કયા પ્રમાણમાં ઊંચા અને પીળા બીજવાળા છોડ મળે તેવી અપેક્ષા છે?", "opts": ["1/16", "1/8", "1/4", "1/2"], "ans": 2, "exp": "F1 પેઢીનો જન્યુક્રમ TtYy હશે. બેક ક્રોસમાં તેને tt yy પિતૃ સાથે સંકરણ કરવામાં આવે છે. દરેક જનીન માટે સ્વતંત્ર વિશ્લેષણ કરતાં, Tt × tt → 1/2 Tt (ઊંચા) અને 1/2 tt (નીચા), તેમજ Yy × yy → 1/2 Yy (પીળા બીજ) અને 1/2 yy (લીલા બીજ) મળે. તેથી, ઊંચા અને પીળા બીજવાળા છોડનું પ્રમાણ = (1/2) × (1/2) = 1/4. અન્ય વિકલ્પો ખોટા છે કારણ કે તેઓ જનીનોના સ્વતંત્ર વહેંચણીના નિયમને યોગ્ય રીતે લાગુ કરતા નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન બેક ક્રોસની લાક્ષણિકતા નથી?", "opts": ["બેક ક્રોસમાં F1 પેઢીના સંકર વ્યક્તિને કોઈ પણ એક પિતૃ સાથે સંકરણ કરવામાં આવે છે.", "બેક ક્રોસનો ઉપયોગ મેન્ડેલિયન જનીનોની પ્રભાવિતા નક્કી કરવા માટે થાય છે.", "બેક ક્રોસમાં F1 પેઢીના વ્યક્તિને હંમેશા પ્રભાવી લક્ષણ ધરાવતા પિતૃ સાથે સંકરણ કરવામાં આવે છે.", "બેક ક્રોસના પરિણામોનો ઉપયોગ જનીન પ્રકાર નક્કી કરવા માટે થઈ શકે છે."], "ans": 2, "exp": "બેક ક્રોસમાં F1 પેઢીના સંકર વ્યક્તિને કોઈ પણ એક પિતૃ (પ્રભાવી અથવા પ્રચ્છન્ન) સાથે સંકરણ કરી શકાય છે, નહીં કે માત્ર પ્રભાવી પિતૃ સાથે. વિકલ્પ A, B અને D સાચી લાક્ષણિકતાઓ છે કારણ કે બેક ક્રોસનો ઉપયોગ જનીન પ્રકાર નક્કી કરવા અને પ્રભાવિતા સમજવા માટે થાય છે. વિકલ્પ C ખોટો છે કારણ કે તે બેક ક્રોસની વ્યાખ્યાને મર્યાદિત કરે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક પ્રયોગમાં, એક પ્રાણીની F1 પેઢીનો જન્યુક્રમ AaBb છે. જો આ પ્રાણીને aaBB જન્યુક્રમ ધરાવતા પિતૃ સાથે બેક ક્રોસ કરવામાં આવે, તો પરિણામી સંતતિમાં કયો જનીન પ્રકાર મળશે નહીં?", "opts": ["AaBB", "aaBb", "AABB", "AaBb"], "ans": 2, "exp": "બેક ક્રોસમાં F1 પેઢીનો જન્યુક્રમ AaBb અને પિતૃનો જન્યુક્રમ aaBB છે. ગેમેટ્સનું સંયોજન કરતાં, પરિણામી સંતતિમાં AaBB, AaBb, aaBB અને aaBb જનીન પ્રકારો મળશે. AABB જનીન પ્રકાર મળશે નહીં કારણ કે F1 પેઢીમાં 'A' જનીન માટે હેટરોઝાયગસ હોવાથી તે 'AA' જનીન પ્રકાર ધરાવતો ગેમેટ ઉત્પન્ન કરી શકતો નથી. અન્ય વિકલ્પો ખોટા છે કારણ કે તે પરિણામી સંતતિમાં મળી શકે તેવા જનીન પ્રકારો છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક પ્રયોગમાં, એક છોડમાં બે લક્ષણોનું સંકરણ કરવામાં આવ્યું: ફૂલનો રંગ (R - લાલ, r - સફેદ) અને પાંદડાનો આકાર (L - ગોળ, l - લાંબા). F1 પેઢીના છોડને સફેદ ફૂલ અને લાંબા પાંદડા ધરાવતા પિતૃ સાથે બેક ક્રોસ કરવામાં આવ્યો. પરિણામી સંતતિમાં 25% છોડ લાલ ફૂલ અને ગોળ પાંદડા ધરાવતા હતા. આ પરિણામ પરથી શું નિષ્કર્ષ કાઢી શકાય?", "opts": ["F1 પેઢીના છોડનો જનીન પ્રકાર RR LL હતો.", "બંને જનીનો એક જ વર્ણસૂત્ર પર આવેલા છે અને સંપૂર્ણ જોડાણ દર્શાવે છે.", "બંને જનીનો અલગ અલગ વર્ણસૂત્રો પર આવેલા છે અને સ્વતંત્ર રીતે વહેંચાય છે.", "F1 પેઢીના છોડમાં કોઈ એક જનીન માટે મ્યુટેશન થયું હતું."], "ans": 2, "exp": "જો બંને જનીનો સ્વતંત્ર રીતે વહેંચાતા હોય, તો બેક ક્રોસના પરિણામમાં દરેક લક્ષણનું પ્રમાણ 1:1 હોવું જોઈએ. અહીં, લાલ ફૂલ અને ગોળ પાંદડા ધરાવતા છોડનું પ્રમાણ 25% છે, જે સૂચવે છે કે બંને જનીનો અલગ અલગ વર્ણસૂત્રો પર આવેલા છે અને મેન્ડલના સ્વતંત્ર વહેંચણીના નિયમનું પાલન કરે છે. વિકલ્પ A ખોટો છે કારણ કે F1 પેઢી હેટરોઝાયગસ હોવી જોઈએ. વિકલ્પ B ખોટો છે કારણ કે જોડાણના કિસ્સામાં પ્રમાણ અલગ હોત. વિકલ્પ D ખોટો છે કારણ કે મ્યુટેશનની સંભાવના આ પરિણામને સમજાવી શકતી નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન બેક ક્રોસ પ્રયોગ માટે સત્ય નથી?", "opts": ["બેક ક્રોસમાં F1 પેઢીને પાછળના પિતૃ સાથે સંકરણ કરવામાં આવે છે.", "બેક ક્રોસનો ઉપયોગ જન્યુક્રમની શુદ્ધતા ચકાસવા માટે થાય છે.", "બેક ક્રોસમાં F2 પેઢીમાં હંમેશા 9:3:3:1 ગુણોત્તર મળે છે.", "બેક ક્રોસનો ઉપયોગ ડોમિનન્ટ અને રિસેસિવ લક્ષણોની ઓળખ માટે થાય છે."], "ans": 2, "exp": "બેક ક્રોસમાં F1 પેઢીને પાછળના પિતૃ સાથે સંકરણ કરવામાં આવે છે (A સત્ય). તેનો ઉપયોગ જન્યુક્રમની શુદ્ધતા ચકાસવા (B સત્ય) અને ડોમિનન્ટ-રિસેસિવ લક્ષણોની ઓળખ માટે (D સત્ય) થાય છે. પરંતુ 9:3:3:1 ગુણોત્તર ડાયહાઇબ્રિડ ક્રોસમાં મળે છે, બેક ક્રોસમાં નહીં (C અસત્ય).", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વૈવિધ્યતા", "ch": ""}, {"q": "એક બેક ક્રોસ પ્રયોગમાં, જો F1 પેઢીનો જન્યુક્રમ AaBbCc હોય અને પાછળનો પિતૃ aabbcc હોય, તો F2 પેઢીમાં કેટલા પ્રકારના ફિનોટાઇપ મળશે, જો સંપૂર્ણ ડોમિનન્સ હોય?", "opts": ["4 પ્રકાર", "8 પ્રકાર", "16 પ્રકાર", "32 પ્રકાર"], "ans": 1, "exp": "F1 પેઢીનો જન્યુક્રમ AaBbCc છે અને પાછળનો પિતૃ aabbcc છે. બેક ક્રોસમાં, AaBbCc × aabbcc સંકરણ થશે. સંપૂર્ણ ડોમિનન્સ હેઠળ, પ્રત્યેક જનીન માટે 2 ફિનોટાઇપ (ડોમિનન્ટ અથવા રિસેસિવ) મળશે. ત્રણ જનીન માટે, 2 × 2 × 2 = 8 પ્રકારના ફિનોટાઇપ મળશે. તેથી, 8 પ્રકારના ફિનોટાઇપ મળે છે. બાકીના વિકલ્પો (4, 16, 32) યોગ્ય નથી.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વૈવિધ્યતા", "ch": ""}, {"q": "એક પ્રયોગમાં, એક વૈજ્ઞાનિકે એક પ્રાણીની F1 પેઢી (AaBb) ને તેના પૈતૃક પ્રકાર (aaBB) સાથે બેક ક્રોસ કર્યો. પરિણામી સંતતિમાં નીચેના પૈકી કયું જન્યુક્રમ ગુણોત્તર મળવાની શક્યતા સૌથી ઓછી છે?", "opts": ["AaBB : 1/4", "aaBb : 1/4", "AaBb : 1/4", "aaBB : 1/4"], "ans": 2, "exp": "બેક ક્રોસમાં F1 પેઢી (AaBb) ને પૈતૃક પ્રકાર (aaBB) સાથે સંકરણ કરતાં, જન્યુઓનું સંયોજન આ પ્રમાણે થશે: F1 પેઢીના જન્યુઓ AB, Ab, aB, ab અને પૈતૃક પ્રકારના જન્યુઓ aB. આ સંયોજનથી મળતા જન્યુક્રમો: AaBB, AaBb, aaBB, aaBb દરેકની સંભાવના 1/4 છે. પરંતુ AaBb જન્યુક્રમ પુનરાવર્તિત થતો નથી કારણ કે તે ફક્ત એક જ સંયોજન (aB + Ab) થી મળે છે, જે વાસ્તવમાં અશક્ય છે કારણ કે Ab જન્યુ પૈતૃક પ્રકારમાં નથી. તેથી AaBb ની સંભાવના 0 છે, જે સૌથી ઓછી છે. અન્ય તમામ વિકલ્પો સાચા સંયોજન દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લો અને સાચો વિકલ્પ પસંદ કરો:\n\n(1) બેક ક્રોસ હંમેશા પ્રભાવી લક્ષણ ધરાવતા પિતૃ સાથે કરવામાં આવે છે.\n(2) બેક ક્રોસનો ઉપયોગ ફક્ત એક જ લક્ષણ માટેના જન્યુક્રમની ચકાસણી માટે થાય છે.\n(3) બેક ક્રોસમાં, F1 પેઢીને તેના કોઈપણ પિતૃ સાથે સંકરણ કરી શકાય છે.\n(4) બેક ક્રોસ અને ટેસ્ટ ક્રોસ બંનેનો હેતુ સમાન હોય છે - અજ્ઞાત જન્યુક્રમની ચકાસણી કરવી.", "opts": ["માત્ર (3) સાચું છે", "(1) અને (2) સાચાં છે", "(3) અને (4) સાચાં છે", "માત્ર (4) સાચું છે"], "ans": 0, "exp": "વિધાન (3) સાચું છે કારણ કે બેક ક્રોસમાં F1 પેઢીને તેના કોઈપણ પિતૃ (પ્રભાવી કે પ્રચ્છન્ન) સાથે સંકરણ કરી શકાય છે. વિધાન (1) ખોટું છે કારણ કે બેક ક્રોસ પ્રભાવી કે પ્રચ્છન્ન પિતૃ સાથે થઈ શકે છે. વિધાન (2) ખોટું છે કારણ કે બેક ક્રોસ એક કરતાં વધુ લક્ષણો માટે પણ થઈ શકે છે. વિધાન (4) ખોટું છે કારણ કે બેક ક્રોસનો હેતુ પિતૃ સાથેના જન્યુક્રમની ચકાસણી છે, જ્યારે ટેસ્ટ ક્રોસનો હેતુ અજ્ઞાત જન્યુક્રમની ચકાસણી છે (સામાન્ય રીતે પ્રચ્છન્ન સમયુગ્મી સાથે).", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક પ્રયોગમાં, એક વૈજ્ઞાનિકે એક છોડની F1 પેઢી (AaBb) ને તેના પ્રચ્છન્ન પિતૃ (aabb) સાથે બેક ક્રોસ કર્યો. પરિણામી સંતતિમાં 1:1:1:1 ના ગુણોત્તરને બદલે 9:3:3:1 નો ગુણોત્તર મળ્યો. આ અસામાન્ય પરિણામ માટે નીચેના પૈકી કયું કારણ સૌથી વધુ સંભવિત છે?", "opts": ["બંને જનીનો એક જ વર્ણસૂત્ર પર સંલગ્ન છે", "બંને જનીનો સ્વતંત્ર રીતે વહેંચાય છે પરંતુ પર્યાવરણીય પરિબળોએ અસર કરી છે", "F1 પેઢી સમયુગ્મી હતી (AABB) જેના કારણે આ પરિણામ મળ્યું", "પ્રયોગમાં ટેસ્ટ ક્રોસ કરવામાં આવ્યો હતો, બેક ક્રોસ નહીં"], "ans": 0, "exp": "9:3:3:1 નો ગુણોત્તર F2 પેઢીમાં સ્વતંત્ર વહેંચણી માટે મળે છે, બેક ક્રોસમાં નહીં. જો બંને જનીનો એક જ વર્ણસૂત્ર પર સંલગ્ન હોય, તો તેઓ સ્વતંત્ર રીતે વહેંચાતા નથી અને પરિણામી ગુણોત્તર બદલાઈ જાય છે. આ કિસ્સામાં, સંલગ્નતાને કારણે પિતૃ જન્યુક્રમો વધુ પ્રમાણમાં મળે છે અને પુનઃસંયોજિત જન્યુક્રમો ઓછા પ્રમાણમાં મળે છે, જે 1:1:1:1 ના ગુણોત્તરને બદલે અસામાન્ય ગુણોત્તર તરફ દોરી જાય છે. અન્ય વિકલ્પો આ પરિણામ માટે ઓછા સંભવિત છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
