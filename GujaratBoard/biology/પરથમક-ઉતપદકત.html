<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પ્રાથમિક ઉત્પાદકતા</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>પ્રાથમિક ઉત્પાદકતા</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">પ્રાથમિક ઉત્પાદકતા</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 44 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 44 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક જળીય પરિસ્થિતિકી તંત્રમાં પ્રાથમિક ઉત્પાદકતા માપવા માટે વૈજ્ઞાનિકો દ્વારા ઓક્સિજન ઉત્પાદન પદ્ધતિનો ઉપયોગ કરવામાં આવે છે. જો 24 કલાકના સમયગાળામાં 1 લિટર પાણીમાં ઓક્સિજનનું પ્રમાણ 8 mg/L થી વધીને 12 mg/L થાય, તો નીચેનામાંથી કયું વિધાન સાચું છે? (ધારો કે શ્વસન દર સતત 4 mg/L/દિવસ છે)", "opts": ["કુલ પ્રાથમિક ઉત્પાદકતા 8 mg/L/દિવસ છે", "ચોખ્ખી પ્રાથમિક ઉત્પાદકતા 4 mg/L/દિવસ છે", "કુલ પ્રાથમિક ઉત્પાદકતા 12 mg/L/દિવસ છે", "ચોખ્ખી પ્રાથમિક ઉત્પાદકતા 8 mg/L/દિવસ છે"], "ans": 0, "exp": "ઓક્સિજનમાં થયેલો વધારો (12-8=4 mg/L) એ ચોખ્ખી પ્રાથમિક ઉત્પાદકતા દર્શાવે છે. શ્વસન દર 4 mg/L/દિવસ છે, તેથી કુલ પ્રાથમિક ઉત્પાદકતા = ચોખ્ખી ઉત્પાદકતા + શ્વસન = 4 + 4 = 8 mg/L/દિવસ. વિકલ્પ A સાચો છે. અન્ય વિકલ્પોમાં ગણતરીની ભૂલ છે.", "ref": "Std 12 - પ્રકરણ 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પ્રાથમિક ઉત્પાદકતા માટે અયોગ્ય છે?", "opts": ["ઉષ્ણકટિબંધીય વર્ષાવનોમાં પ્રાથમિક ઉત્પાદકતા સૌથી વધુ હોય છે", "મહાસાગરોમાં પ્રાથમિક ઉત્પાદકતા મુખ્યત્વે ફાયટોપ્લાંકટોન દ્વારા થાય છે", "રણ પ્રદેશોમાં પ્રાથમિક ઉત્પાદકતા શૂન્ય હોય છે કારણ કે ત્યાં વનસ્પતિ હોતી નથી", "તાજા પાણીના તળાવોમાં પ્રાથમિક ઉત્પાદકતા મોસમ પ્રમાણે બદલાય છે"], "ans": 2, "exp": "રણ પ્રદેશોમાં પણ કેટલીક વનસ્પતિઓ જોવા મળે છે જે પ્રકાશસંશ્લેષણ દ્વારા પ્રાથમિક ઉત્પાદકતા કરે છે, તેથી તે શૂન્ય હોતી નથી. વિકલ્પ C અયોગ્ય છે. અન્ય વિકલ્પો સાચાં છે.", "ref": "Std 12 - પ્રકરણ 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "એક સંશોધક જંગલમાં પ્રાથમિક ઉત્પાદકતા માપવા માટે CO₂ શોષણ પદ્ધતિનો ઉપયોગ કરે છે. જો 1 ચોરસ મીટર વિસ્તારમાં 1 કલાકમાં 2 ગ્રામ CO₂ શોષાય છે, તો નીચેનામાંથી કયું વિધાન સાચું નથી? (ધારો કે 1 ગ્રામ CO₂ શોષણથી 0.68 ગ્રામ કાર્બોદિતનું ઉત્પાદન થાય છે)", "opts": ["કુલ પ્રાથમિક ઉત્પાદકતા 1.36 ગ્રામ/મીટર²/કલાક છે", "આ માપ ચોખ્ખી પ્રાથમિક ઉત્પાદકતા દર્શાવે છે", "આ પદ્ધતિ પ્રકાશસંશ્લેષણ દર માપવા માટે ઉપયોગી છે", "આ માપમાં શ્વસન દરનો સમાવેશ થતો નથી"], "ans": 1, "exp": "CO₂ શોષણ પદ્ધતિ દ્વારા માપવામાં આવતી પ્રાથમિક ઉત્પાદકતા એ કુલ પ્રાથમિક ઉત્પાદકતા છે, કારણ કે તેમાં શ્વસન દરનો સમાવેશ થતો નથી. વિકલ્પ B ખોટું છે. અન્ય વિકલ્પો સાચાં છે.", "ref": "Std 12 - પ્રકરણ 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું પરિબળ પ્રાથમિક ઉત્પાદકતાને પ્રત્યક્ષ રીતે અસર કરતું નથી?", "opts": ["સૂર્યપ્રકાશની તીવ્રતા", "પોષક તત્ત્વોની ઉપલબ્ધતા", "વરસાદનું પ્રમાણ", "પ્રાણીઓની સંખ્યા"], "ans": 3, "exp": "પ્રાણીઓની સંખ્યા પ્રાથમિક ઉત્પાદકતા પર પ્રત્યક્ષ અસર કરતી નથી, કારણ કે પ્રાથમિક ઉત્પાદકતા વનસ્પતિઓ દ્વારા થાય છે. અન્ય પરિબળો પ્રાથમિક ઉત્પાદકતા પર પ્રત્યક્ષ અસર કરે છે. વિકલ્પ D સાચો છે.", "ref": "Std 12 - પ્રકરણ 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "એક તળાવમાં પ્રાથમિક ઉત્પાદકતા માપવા માટે વૈજ્ઞાનિકો દ્વારા 'લાઇટ-ડાર્ક બોટલ' પદ્ધતિનો ઉપયોગ કરવામાં આવે છે. જો પ્રકાશિત બોટલમાં ઓક્સિજનનું પ્રમાણ 10 mg/L થી વધીને 14 mg/L થાય અને અંધારી બોટલમાં 10 mg/L થી ઘટીને 7 mg/L થાય, તો નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["કુલ પ્રાથમિક ઉત્પાદકતા 7 mg/L છે", "ચોખ્ખી પ્રાથમિક ઉત્પાદકતા 4 mg/L છે", "શ્વસન દર 3 mg/L છે", "આ પદ્ધતિ માત્ર ચોખ્ખી પ્રાથમિક ઉત્પાદકતા માપે છે"], "ans": 3, "exp": "લાઇટ-ડાર્ક બોટલ પદ્ધતિ દ્વારા કુલ પ્રાથમિક ઉત્પાદકતા અને શ્વસન દર બંને માપી શકાય છે. વિકલ્પ D ખોટું છે. અન્ય વિકલ્પો સાચાં છે: કુલ પ્રાથમિક ઉત્પાદકતા = (14-10) + (10-7) = 7 mg/L, ચોખ્ખી પ્રાથમિક ઉત્પાદકતા = 14-10 = 4 mg/L, શ્વસન દર = 10-7 = 3 mg/L.", "ref": "Std 12 - પ્રકરણ 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "જ્યારે એક જળીય પરિસ્થિતિકી તંત્રમાં પ્રાથમિક ઉત્પાદકતા માપવા માટે 'લાઇટ-ડાર્ક બોટલ' પદ્ધતિનો ઉપયોગ કરવામાં આવે છે, ત્યારે ડાર્ક બોટલમાં ઓક્સિજનની માત્રામાં થતો ઘટાડો કયા પ્રક્રિયાને દર્શાવે છે?", "opts": ["પ્રકાશસંશ્લેષણ દર", "શ્વસન દર", "કુલ પ્રાથમિક ઉત્પાદકતા", "શુદ્ધ પ્રાથમિક ઉત્પાદકતા"], "ans": 1, "exp": "ડાર્ક બોટલમાં પ્રકાશ અભાવે પ્રકાશસંશ્લેષણ થતું નથી, પરંતુ શ્વસન ચાલુ રહે છે. ઓક્સિજનની માત્રામાં થતો ઘટાડો શ્વસન દરને દર્શાવે છે. પ્રકાશસંશ્લેષણ દર (A) પ્રકાશની હાજરીમાં માપવામાં આવે છે. કુલ પ્રાથમિક ઉત્પાદકતા (C) અને શુદ્ધ પ્રાથમિક ઉત્પાદકતા (D) લાઇટ બોટલના ડેટાથી ગણવામાં આવે છે.", "ref": "Std 12 - અધ્યાય 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "એક વનસ્પતિ સમુદાયમાં, જો પ્રકાશસંશ્લેષણ દર અચાનક ઘટી જાય પરંતુ શ્વસન દર સ્થિર રહે, તો શુદ્ધ પ્રાથમિક ઉત્પાદકતા પર કયો પ્રભાવ પડશે?", "opts": ["શુદ્ધ પ્રાથમિક ઉત્પાદકતા વધશે", "શુદ્ધ પ્રાથમિક ઉત્પાદકતા ઘટશે", "શુદ્ધ પ્રાથમિક ઉત્પાદકતા સ્થિર રહેશે", "શુદ્ધ પ્રાથમિક ઉત્પાદકતા શૂન્ય થશે"], "ans": 1, "exp": "શુદ્ધ પ્રાથમિક ઉત્પાદકતા = કુલ પ્રાથમિક ઉત્પાદકતા (પ્રકાશસંશ્લેષણ) - શ્વસન. જો પ્રકાશસંશ્લેષણ ઘટે અને શ્વસન સ્થિર રહે, તો શુદ્ધ પ્રાથમિક ઉત્પાદકતા ઘટશે. વિકલ્પ A, C, અને D યોગ્ય નથી કારણ કે તે પ્રકાશસંશ્લેષણના ઘટાડાને ધ્યાનમાં લેતા નથી.", "ref": "Std 12 - અધ્યાય 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પ્રાથમિક ઉત્પાદકતા અને દ્વિતીય ઉત્પાદકતા વચ્ચેના તફાવતને સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["પ્રાથમિક ઉત્પાદકતા ફક્ત વનસ્પતિઓ દ્વારા જ થાય છે, જ્યારે દ્વિતીય ઉત્પાદકતા ફક્ત પ્રાણીઓ દ્વારા થાય છે", "પ્રાથમિક ઉત્પાદકતા સૂર્યપ્રકાશના ઉપયોગથી કાર્બનિક પદાર્થોનું નિર્માણ છે, જ્યારે દ્વિતીય ઉત્પાદકતા પ્રાથમિક ઉત્પાદકો દ્વારા ઉત્પાદિત પદાર્થોનો ઉપભોગ છે", "પ્રાથમિક ઉત્પાદકતા અને દ્વિતીય ઉત્પાદકતા બંને ઓક્સિજન ઉત્પન્ન કરે છે", "પ્રાથમિક ઉત્પાદકતા ફક્ત જળીય પરિસ્થિતિકી તંત્રોમાં જ થાય છે"], "ans": 1, "exp": "પ્રાથમિક ઉત્પાદકતા સૂર્યપ્રકાશના ઉપયોગથી કાર્બનિક પદાર્થોનું નિર્માણ છે (પ્રકાશસંશ્લેષણ દ્વારા), જ્યારે દ્વિતીય ઉત્પાદકતા પ્રાથમિક ઉત્પાદકો (વનસ્પતિઓ) દ્વારા ઉત્પાદિત પદાર્થોનો ઉપભોગ છે. વિકલ્પ A અપૂર્ણ છે કારણ કે પ્રાથમિક ઉત્પાદકતા કેટલાક સૂક્ષ્મજીવો દ્વારા પણ થાય છે. વિકલ્પ C ખોટો છે કારણ કે દ્વિતીય ઉત્પાદકતા ઓક્સિજન ઉત્પન્ન કરતી નથી. વિકલ્પ D ખોટો છે કારણ કે પ્રાથમિક ઉત્પાદકતા સ્થળીય અને જળીય બંને પરિસ્થિતિકી તંત્રોમાં થાય છે.", "ref": "Std 12 - અધ્યાય 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "એક પરિસ્થિતિકી તંત્રમાં, જો પ્રાથમિક ઉત્પાદકોની વસતી અચાનક ઘટી જાય, તો નીચેનામાંથી કયા પરિબળ પર સૌથી વધુ પ્રભાવ પડશે?", "opts": ["વાતાવરણમાં કાર્બન ડાયોક્સાઇડની માત્રા", "વાતાવરણમાં ઓક્સિજનની માત્રા", "દ્વિતીય ઉત્પાદકો (શાકાહારી)ની વસતી", "મૃત પદાર્થોના વિઘટન દર"], "ans": 2, "exp": "પ્રાથમિક ઉત્પાદકો (વનસ્પતિઓ) દ્વિતીય ઉત્પાદકો (શાકાહારી પ્રાણીઓ) માટે ખોરાકનો મુખ્ય સ્રોત છે. જો પ્રાથમિક ઉત્પાદકોની વસતી ઘટે, તો શાકાહારી પ્રાણીઓના ખોરાકનો પુરવઠો ઘટશે, જે તેમની વસતી પર સીધો પ્રભાવ પાડશે. વિકલ્પ A અને B અપ્રત્યક્ષ રીતે અસર કરશે, પરંતુ તાત્કાલિક પ્રભાવ દ્વિતીય ઉત્પાદકો પર પડશે. વિકલ્પ D મૃત પદાર્થોના વિઘટન દર પર અસર કરશે નહીં.", "ref": "Std 12 - અધ્યાય 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પ્રાથમિક ઉત્પાદકતા માપવા માટેની 'હાર્વેસ્ટ પદ્ધતિ' વિશે સાચું નથી?", "opts": ["આ પદ્ધતિમાં વનસ્પતિ બાયોમાસનું નમૂના લેવામાં આવે છે", "આ પદ્ધતિ મુખ્યત્વે સ્થળીય પરિસ્થિતિકી તંત્રોમાં ઉપયોગી છે", "આ પદ્ધતિમાં પ્રાથમિક ઉત્પાદકતા માપવા માટે ઓક્સિજન ઉત્પાદનનો ઉપયોગ કરવામાં આવે છે", "આ પદ્ધતિ લાંબા ગાળાના અભ્યાસ માટે યોગ્ય છે"], "ans": 2, "exp": "હાર્વેસ્ટ પદ્ધતિમાં પ્રાથમિક ઉત્પાદકતા માપવા માટે વનસ્પતિ બાયોમાસનું નમૂના લેવામાં આવે છે (A), મુખ્યત્વે સ્થળીય પરિસ્થિતિકી તંત્રોમાં ઉપયોગી છે (B), અને લાંબા ગાળાના અભ્યાસ માટે યોગ્ય છે (D). પરંતુ આ પદ્ધતિમાં ઓક્સિજન ઉત્પાદનનો ઉપયોગ કરવામાં આવતો નથી (C), જે ખોટું વિધાન છે.", "ref": "Std 12 - અધ્યાય 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "જળીય પરિસ્થિતિકી તંત્રમાં, જો પ્રાથમિક ઉત્પાદકતાનું માપન 'લાઇટ-ડાર્ક બોટલ' પદ્ધતિથી કરવામાં આવે, તો નીચેનામાંથી કયું પરિણામ પ્રકાશસંશ્લેષણ અને શ્વસન વચ્ચેના સંતુલનને દર્શાવે છે?", "opts": ["લાઇટ બોટલમાં ઓક્સિજનનું પ્રમાણ ડાર્ક બોટલ કરતાં ઓછું હોય છે", "લાઇટ બોટલમાં ઓક્સિજનનું પ્રમાણ ડાર્ક બોટલ કરતાં વધુ હોય છે, પરંતુ શ્વસન દર કરતાં ઓછું હોય છે", "લાઇટ બોટલ અને ડાર્ક બોટલમાં ઓક્સિજનનું પ્રમાણ સરખું હોય છે", "લાઇટ બોટલમાં ઓક્સિજનનું પ્રમાણ ડાર્ક બોટલ કરતાં વધુ હોય છે અને તે પ્રકાશસંશ્લેષણ દર મહત્તમ હોય તે સૂચવે છે"], "ans": 1, "exp": "લાઇટ બોટલમાં પ્રકાશસંશ્લેષણ થાય છે, જેમાં ઓક્સિજન ઉત્પન્ન થાય છે, જ્યારે ડાર્ક બોટલમાં ફક્ત શ્વસન થાય છે, જેમાં ઓક્સિજન વપરાય છે. જો પ્રકાશસંશ્લેષણ અને શ્વસન વચ્ચે સંતુલન હોય, તો લાઇટ બોટલમાં ઓક્સિજનનું પ્રમાણ ડાર્ક બોટલ કરતાં વધુ હોય છે, પરંતુ શ્વસન દર કરતાં ઓછું હોય છે. A) ખોટું છે કારણ કે લાઇટ બોટલમાં ઓક્સિજન વધુ હોય છે. C) ખોટું છે કારણ કે બંને બોટલમાં ઓક્સિજન સરખું નથી. D) ખોટું છે કારણ કે મહત્તમ પ્રકાશસંશ્લેષણ દર સૂચવતું નથી, ફક્ત સંતુલન સૂચવે છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "એક વનસ્પતિ સમુદાયમાં, જો પ્રાથમિક ઉત્પાદકતા માપવા માટે 'હાર્વેસ્ટ પદ્ધતિ'નો ઉપયોગ કરવામાં આવે, તો નીચેનામાંથી કયું પરિબળ માપનમાં ત્રુટિ લાવી શકે છે?", "opts": ["વનસ્પતિના પર્ણોનું વજન", "વનસ્પતિના મૂળના વજનમાં થતો વધારો", "વનસ્પતિ દ્વારા શ્વસનમાં વપરાતી ઊર્જા", "વનસ્પતિના તણાવના વજનમાં થતો ઘટાડો"], "ans": 2, "exp": "'હાર્વેસ્ટ પદ્ધતિ'માં વનસ્પતિના બાયોમાસને માપવામાં આવે છે, પરંતુ શ્વસન દરમિયાન વપરાતી ઊર્જાને ધ્યાનમાં લેવાતી નથી, જે માપનમાં ત્રુટિ લાવી શકે છે. A) અને D) ખોટા છે કારણ કે પર્ણો અને તણાવના વજનને માપવામાં આવે છે. B) ખોટું છે કારણ કે મૂળના વજનમાં થતો વધારો માપવામાં આવે છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પ્રાથમિક ઉત્પાદકતા અને નેટ પ્રાથમિક ઉત્પાદકતા (NPP) વચ્ચેના તફાવતને સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["પ્રાથમિક ઉત્પાદકતા = NPP + શ્વસન દરમ્યાન વપરાતી ઊર્જા", "પ્રાથમિક ઉત્પાદકતા = NPP - શ્વસન દરમ્યાન વપરાતી ઊર્જા", "NPP = પ્રાથમિક ઉત્પાદકતા + શ્વસન દરમ્યાન વપરાતી ઊર્જા", "NPP = પ્રાથમિક ઉત્પાદકતા - શ્વસન દરમ્યાન વપરાતી ઊર્જા"], "ans": 3, "exp": "નેટ પ્રાથમિક ઉત્પાદકતા (NPP) એ પ્રાથમિક ઉત્પાદકતામાંથી શ્વસન દરમ્યાન વપરાતી ઊર્જાને બાદ કરતાં મળે છે. A) અને B) ખોટા છે કારણ કે તે સૂત્રને ખોટી રીતે વર્ણવે છે. C) ખોટું છે કારણ કે NPP પ્રાથમિક ઉત્પાદકતા કરતાં ઓછું હોય છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "એક જળીય પરિસ્થિતિકી તંત્રમાં, જો પ્રાથમિક ઉત્પાદકતાનું માપન 'લાઇટ-ડાર્ક બોટલ' પદ્ધતિથી કરવામાં આવે, તો નીચેનામાંથી કયું પરિણામ પ્રકાશસંશ્લેષણ દર શૂન્ય હોવાનું સૂચવે છે?", "opts": ["લાઇટ બોટલમાં ઓક્સિજનનું પ્રમાણ ડાર્ક બોટલ કરતાં ઓછું હોય છે", "લાઇટ બોટલમાં ઓક્સિજનનું પ્રમાણ ડાર્ક બોટલ કરતાં સરખું હોય છે", "લાઇટ બોટલમાં ઓક્સિજનનું પ્રમાણ ડાર્ક બોટલ કરતાં વધુ હોય છે", "લાઇટ બોટલ અને ડાર્ક બોટલમાં ઓક્સિજનનું પ્રમાણ શૂન્ય હોય છે"], "ans": 1, "exp": "જો પ્રકાશસંશ્લેષણ દર શૂન્ય હોય, તો લાઇટ બોટલમાં ફક્ત શ્વસન થાય છે, જે ડાર્ક બોટલમાં થાય છે. આથી, લાઇટ બોટલ અને ડાર્ક બોટલમાં ઓક્સિજનનું પ્રમાણ સરખું હોય છે. A) ખોટું છે કારણ કે લાઇટ બોટલમાં ઓક્સિજન ઓછું નથી. C) ખોટું છે કારણ કે લાઇટ બોટલમાં ઓક્સિજન વધુ નથી. D) ખોટું છે કારણ કે ઓક્સિજન શૂન્ય નથી.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું પરિબળ પ્રાથમિક ઉત્પાદકતાને અસર કરતું નથી, પરંતુ દ્વિતીય ઉત્પાદકતાને અસર કરે છે?", "opts": ["પ્રકાશની તીવ્રતા", "તાપમાન", "શિકારી-શિકાર સંબંધ", "કાર્બન ડાયોક્સાઇડનું પ્રમાણ"], "ans": 2, "exp": "શિકારી-શિકાર સંબંધ એ દ્વિતીય ઉત્પાદકતા (જેમ કે શાકાહારી અને માસાહારી જીવો)ને અસર કરે છે, પરંતુ પ્રાથમિક ઉત્પાદકતા (વનસ્પતિ)ને અસર કરતું નથી. A), B), અને D) પ્રાથમિક ઉત્પાદકતાને અસર કરે છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "જળીય પરિસ્થિતિકી તંત્રમાં, જો 'લાઇટ બોટલ'માં ઓક્સિજનની માત્રા 10 mg/L અને 'ડાર્ક બોટલ'માં ઓક્સિજનની માત્રા 4 mg/L માપવામાં આવે, તો નેટ પ્રાથમિક ઉત્પાદકતા (NPP) કેટલી હશે?", "opts": ["6 mg/L", "10 mg/L", "4 mg/L", "14 mg/L"], "ans": 0, "exp": "લાઇટ બોટલમાં ઓક્સિજન ઉત્પાદન પ્રકાશસંશ્લેષણ (GPP) અને શ્વસન બંનેથી થાય છે, જ્યારે ડાર્ક બોટલમાં ફક્ત શ્વસન થાય છે. GPP = લાઇટ બોટલ O2 (10 mg/L), શ્વસન = ડાર્ક બોટલ O2 (4 mg/L). NPP = GPP - શ્વસન = 10 - 4 = 6 mg/L. A સાચું છે. B ફક્ત GPP દર્શાવે છે, C ફક્ત શ્વસન દર્શાવે છે, D GPP + શ્વસન છે જે અયોગ્ય છે.", "ref": "Std 12 - અધ્યાય 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પ્રાથમિક ઉત્પાદકતા માપવા માટેની 'ઓક્સિજન પદ્ધતિ' વિશે ખોટું છે?", "opts": ["આ પદ્ધતિમાં જળીય પરિસ્થિતિકી તંત્રમાં ઓક્સિજનના ઉત્પાદન અને વપરાશને માપવામાં આવે છે.", "લાઇટ બોટલમાં પ્રકાશસંશ્લેષણ અને શ્વસન બંને થાય છે.", "ડાર્ક બોટલમાં ફક્ત પ્રકાશસંશ્લેષણ થાય છે.", "નેટ પ્રાથમિક ઉત્પાદકતા (NPP) = લાઇટ બોટલ O2 - ડાર્ક બોટલ O2"], "ans": 2, "exp": "ડાર્ક બોટલમાં પ્રકાશ અભાવે ફક્ત શ્વસન થાય છે, પ્રકાશસંશ્લેષણ થતું નથી. A, B, અને D સાચાં છે. C ખોટું છે કારણ કે ડાર્ક બોટલમાં પ્રકાશસંશ્લેષણ થતું નથી.", "ref": "Std 12 - અધ્યાય 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "એક વનસ્પતિ સમુદાયમાં, જો પ્રકાશસંશ્લેષણ દર 20 g C/m²/વર્ષ અને શ્વસન દર 8 g C/m²/વર્ષ હોય, તો ગ્રોસ પ્રાથમિક ઉત્પાદકતા (GPP) અને નેટ પ્રાથમિક ઉત્પાદકતા (NPP) અનુક્રમે કેટલી હશે?", "opts": ["GPP = 20 g C/m²/વર્ષ, NPP = 12 g C/m²/વર્ષ", "GPP = 12 g C/m²/વર્ષ, NPP = 8 g C/m²/વર્ષ", "GPP = 8 g C/m²/વર્ષ, NPP = 20 g C/m²/વર્ષ", "GPP = 20 g C/m²/વર્ષ, NPP = 8 g C/m²/વર્ષ"], "ans": 0, "exp": "GPP (ગ્રોસ પ્રાથમિક ઉત્પાદકતા) પ્રકાશસંશ્લેષણ દર જેટલી હોય છે, એટલે 20 g C/m²/વર્ષ. NPP = GPP - શ્વસન = 20 - 8 = 12 g C/m²/વર્ષ. A સાચું છે. B, C, અને Dમાં GPP અને NPPની કિંમતો ખોટી રજૂ કરેલી છે.", "ref": "Std 12 - અધ્યાય 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "એક જળીય પરિસ્થિતિકી તંત્રમાં, જો 'લાઇટ-ડાર્ક બોટલ' પદ્ધતિથી માપન કરતાં, લાઇટ બોટલમાં ઓક્સિજનની માત્રા 15 mg/L અને ડાર્ક બોટલમાં ઓક્સિજનની માત્રા 3 mg/L હોય, તો ગ્રોસ પ્રાથમિક ઉત્પાદકતા (GPP) કેટલી હશે?", "opts": ["12 mg/L", "15 mg/L", "3 mg/L", "18 mg/L"], "ans": 1, "exp": "લાઇટ બોટલમાં ઓક્સિજનનું ઉત્પાદન GPP (પ્રકાશસંશ્લેષણ) અને શ્વસન બંનેથી થાય છે. ડાર્ક બોટલમાં ફક્ત શ્વસન થાય છે, જેથી શ્વસન દર = 3 mg/L. લાઇટ બોટલમાં O2 = GPP - શ્વસન = 15 mg/L. એટલે GPP = 15 + 3 = 18 mg/L. પરંતુ પ્રશ્નમાં લાઇટ બોટલમાં O2 = 15 mg/L એ GPP જ નહીં, પરંતુ NPP + શ્વસન છે. ગણતરી અનુસાર, GPP = લાઇટ બોટલ O2 + ડાર્ક બોટલ O2 = 15 + 3 = 18 mg/L. પરંતુ વિકલ્પ D 18 mg/L છે, પરંતુ પ્રશ્નમાં GPP માગવામાં આવી છે, અને લાઇટ બોટલમાં O2 = GPP - શ્વસન = 15, શ્વસન = 3, તો GPP = 15 + 3 = 18. પરંતુ વિકલ્પ B (15 mg/L) લાઇટ બોટલનું O2 દર્શાવે છે, જે NPP + શ્વસન છે. ગણતરી અનુસાર, GPP = 18 mg/L, પરંતુ વિકલ્પ D 18 mg/L છે. પરંતુ પ્રશ્નમાં GPP માગવામાં આવી છે, અને લાઇટ બોટલમાં O2 = GPP - શ્વસન = 15, શ્વસન = 3, તો GPP = 15 + 3 = 18. એટલે D સાચું છે.", "ref": "Std 12 - અધ્યાય 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "એક મરુભૂમી પરિસ્થિતિકી તંત્રમાં, જ્યારે પ્રાથમિક ઉત્પાદકતા માપવા માટે 'ક્લોરોફિલ a' પદ્ધતિનો ઉપયોગ કરવામાં આવે છે, ત્યારે નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["ક્લોરોફિલ aની સાંદ્રતા પ્રાથમિક ઉત્પાદકતા સાથે સીધો સંબંધ ધરાવે છે, કારણ કે તે પ્રકાશસંશ્લેષણની ક્ષમતાનું પ્રતીક છે.", "ક્લોરોફિલ aની સાંદ્રતા પ્રાથમિક ઉત્પાદકતા સાથે વ્યસ્ત સંબંધ ધરાવે છે, કારણ કે મરુભૂમીમાં પાણીની અછત હોય છે.", "ક્લોરોફિલ aની સાંદ્રતા પ્રાથમિક ઉત્પાદકતાને માપવા માટે અયોગ્ય છે, કારણ કે તે ફક્ત જળીય પરિસ્થિતિકી તંત્રોમાં જ ઉપયોગી છે.", "ક્લોરોફિલ aની સાંદ્રતા પ્રાથમિક ઉત્પાદકતા સાથે કોઈ સંબંધ ધરાવતી નથી, કારણ કે મરુભૂમીમાં વનસ્પતિઓ ક્લોરોફિલ bનો ઉપયોગ કરે છે."], "ans": 0, "exp": "ક્લોરોફિલ a પ્રકાશસંશ્લેષણમાં મુખ્ય રંગદ્રવ્ય છે અને તેની સાંદ્રતા પ્રાથમિક ઉત્પાદકતા સાથે સીધો સંબંધ ધરાવે છે, કારણ કે તે પ્રકાશશક્તિ શોષીને કાર્બન ડાયોક્સાઇડને કાર્બોદિતમાં રૂપાંતરિત કરવાની ક્ષમતાનું પ્રતીક છે. વિકલ્પ B ખોટો છે કારણ કે ક્લોરોફિલ a અને પ્રાથમિક ઉત્પાદકતા વચ્ચે વ્યસ્ત સંબંધ નથી. વિકલ્પ C ખોટો છે કારણ કે ક્લોરોફિલ a પદ્ધતિ જળીય અને સ્થળીય બંને પરિસ્થિતિકી તંત્રોમાં ઉપયોગી છે. વિકલ્પ D ખોટો છે કારણ કે મરુભૂમીની વનસ્પતિઓ પણ ક્લોરોફિલ aનો ઉપયોગ કરે છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "એક જળીય પરિસ્થિતિકી તંત્રમાં, જો 'લાઇટ બોટલ'માં ઓક્સિજનની માત્રા 12 mg/L અને 'ડાર્ક બોટલ'માં ઓક્સિજનની માત્રા 4 mg/L માપવામાં આવે, તો નેટ પ્રાથમિક ઉત્પાદકતા (NPP) કેટલી હશે? (ઓક્સિજનની માત્રા g O2/m³માં ગણો)", "opts": ["8 g O2/m³", "12 g O2/m³", "4 g O2/m³", "16 g O2/m³"], "ans": 0, "exp": "લાઇટ બોટલમાં ઓક્સિજનની માત્રા પ્રકાશસંશ્લેષણ અને શ્વસન બંનેથી અસર પામે છે, જ્યારે ડાર્ક બોટલમાં ફક્ત શ્વસન થાય છે. નેટ પ્રાથમિક ઉત્પાદકતા (NPP) = (લાઇટ બોટલ O2) - (ડાર્ક બોટલ O2) = 12 - 4 = 8 mg/L = 8 g O2/m³. A સાચું છે. B ફક્ત પ્રકાશસંશ્લેષણ દર દર્શાવે છે, C ફક્ત શ્વસન દર દર્શાવે છે, D કોઈ પણ સિદ્ધાંત સાથે મેળ ખાતું નથી.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પ્રાથમિક ઉત્પાદકતા અને ક્લોરોફિલ a વચ્ચેના સંબંધ વિશે ખોટું છે?", "opts": ["ક્લોરોફિલ aની સાંદ્રતા પ્રાથમિક ઉત્પાદકતાનો સારો સૂચક છે", "ક્લોરોફિલ a માત્ર ફાઇટોપ્લાંકટનમાં જ જોવા મળે છે", "ક્લોરોફિલ aની માત્રા પ્રકાશસંશ્લેષણ દર સાથે સીધો સંબંધ ધરાવે છે", "ક્લોરોફિલ aની માપણી સ્પેક્ટ્રોફોટોમીટર દ્વારા કરવામાં આવે છે"], "ans": 1, "exp": "ક્લોરોફિલ a ફાઇટોપ્લાંકટન સિવાય અન્ય પ્રાથમિક ઉત્પાદકોમાં પણ જોવા મળે છે, જેમ કે મોસ, શેવાળ વગેરે. A સાચું છે કારણ કે ક્લોરોફિલ a પ્રાથમિક ઉત્પાદકતાનો સૂચક છે. C સાચું છે કારણ કે પ્રકાશસંશ્લેષણ માટે ક્લોરોફિલ a જરૂરી છે. D સાચું છે કારણ કે ક્લોરોફિલ aની માપણી સ્પેક્ટ્રોફોટોમીટર દ્વારા કરવામાં આવે છે. B ખોટું છે કારણ કે ક્લોરોફિલ a ફક્ત ફાઇટોપ્લાંકટનમાં જ નહીં, પરંતુ અન્ય પ્રાથમિક ઉત્પાદકોમાં પણ હાજર હોય છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "એક વનસ્પતિ સમુદાયમાં, જો ગ્રોસ પ્રાથમિક ઉત્પાદકતા (GPP) 50 g C/m²/વર્ષ અને શ્વસન દર 20 g C/m²/વર્ષ હોય, તો નેટ પ્રાથમિક ઉત્પાદકતા (NPP) અને શ્વસન દરનો ગુણોત્તર કેટલો હશે?", "opts": ["1.5", "2.5", "3.0", "0.6"], "ans": 0, "exp": "NPP = GPP - શ્વસન = 50 - 20 = 30 g C/m²/વર્ષ. શ્વસન દર = 20 g C/m²/વર્ષ. ગુણોત્તર = NPP / શ્વસન = 30 / 20 = 1.5. A સાચું છે. B, C, અને D ગણિતી રીતે ખોટા છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "એક સંશોધકે એક જંગલ પરિસ્થિતિકી તંત્રમાં પ્રાથમિક ઉત્પાદકતા માપવા માટે 'હાર્વેસ્ટ પદ્ધતિ'નો ઉપયોગ કર્યો. તેણે 1 ચોરસ મીટર વિસ્તારમાંથી તમામ વનસ્પતિ દ્રવ્ય એકત્રિત કરીને તેનું શુષ્ક વજન માપ્યું. જો આ માપનમાં 500 ગ્રામ કાર્બનિક દ્રવ્ય પ્રાપ્ત થયું હોય, પરંતુ સંશોધકને ખબર પડી કે આ વિસ્તારમાં અગાઉથી જ 200 ગ્રામ કાર્બનિક દ્રવ્ય જમીનમાં સંગ્રહિત હતું, તો આ પરિસ્થિતિકી તંત્રની નેટ પ્રાથમિક ઉત્પાદકતા (NPP) કેટલી હશે?", "opts": ["300 ગ્રામ/મી²/વર્ષ", "500 ગ્રામ/મી²/વર્ષ", "700 ગ્રામ/મી²/વર્ષ", "માહિતી અપૂરતી છે"], "ans": 3, "exp": "'હાર્વેસ્ટ પદ્ધતિ' દ્વારા માપવામાં આવતું વનસ્પતિ દ્રવ્ય એ ગ્રોસ પ્રાથમિક ઉત્પાદકતા (GPP) નહીં, પરંતુ નેટ પ્રાથમિક ઉત્પાદકતા (NPP) દર્શાવે છે, કારણ કે તેમાં શ્વસન દ્વારા થતો કાર્બનિક દ્રવ્યનો વપરાશ પહેલેથી જ સમાવિષ્ટ હોય છે. જો કે, પ્રશ્નમાં આપેલ માહિતી માત્ર એક જ સમયે થયેલ માપન દર્શાવે છે, જ્યારે NPP નું માપન સમયાંતરે થયેલ વૃદ્ધિ દર્શાવે છે. આ ઉપરાંત, જમીનમાં સંગ્રહિત કાર્બનિક દ્રવ્ય એ NPP નો ભાગ નથી, પરંતુ તે પરિસ્થિતિકી તંત્રના કાર્બન સંગ્રહનો ભાગ છે. તેથી, સમયાંતરે થયેલ વૃદ્ધિની માહિતીના અભાવે NPP નું ચોક્કસ મૂલ્ય નક્કી કરી શકાતું નથી.", "ref": "Std 12 - પ્રકરણ 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન જલીય પરિસ્થિતિકી તંત્રમાં પ્રાથમિક ઉત્પાદકતા માપવા માટેની 'ક્લોરોફિલ a' પદ્ધતિ વિશે ખોટું છે?", "opts": ["આ પદ્ધતિ ફાયટોપ્લાંકટનની જૈવભારનું પરોક્ષ માપન કરે છે.", "ક્લોરોફિલ a નું પ્રમાણ પ્રકાશસંશ્લેષણ ક્ષમતા સાથે સીધો સંબંધ ધરાવે છે.", "આ પદ્ધતિ દ્વારા માપવામાં આવતું ક્લોરોફિલ a નું પ્રમાણ હંમેશા પ્રાથમિક ઉત્પાદકતા સાથે સીધો સંબંધ ધરાવે છે.", "આ પદ્ખ્યત્વે મહાસાગરો અને મોટા જળાશયોમાં થાય છે."], "ans": 2, "exp": "ક્લોરોફિલ a પદ્ધતિ ફાયટોપ્લાંકટનની જૈવભારનું પરોક્ષ માપન કરે છે અને તે પ્રકાશસંશ્લેષણ ક્ષમતા સાથે સંબંધિત છે, પરંતુ ક્લોરોફિલ a નું પ્રમાણ હંમેશા પ્રાથમિક ઉત્પાદકતા સાથે સીધો સંબંધ ધરાવતું નથી. વિવિધ પર્યાવરણીય પરિબળો જેવા કે પ્રકાશની તીવ્રતા, પોષક તત્ત્વોની ઉપલબ્ધતા અને તાપમાન ક્લોરોફિલ a ની પ્રકાશસંશ્લેષણ કાર્યક્ષમતા પર અસર કરે છે. તેથી, ક્લોરોફિલ a નું પ્રમાણ માત્ર પ્રાથમિક ઉત્પાદકતાનું સૂચક હોઈ શકે છે, પરંતુ તે હંમેશા સીધો સંબંધ ધરાવતું નથી. બાકીના વિકલ્પો સાચાં છે કારણ કે આ પદ્ધતિ ફાયટોપ્લાંકટનની જૈવભાર માપવા માટે ઉપયોગી છે અને મહાસાગરોમાં વ્યાપક રીતે ઉપયોગમાં લેવાય છે.", "ref": "Std 12 - પ્રકરણ 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "એક વનસ્પતિ સમુદાયમાં, જો ગ્રોસ પ્રાથમિક ઉત્પાદકતા (GPP) 80 g C/m²/વર્ષ અને શ્વસન દર 30 g C/m²/વર્ષ હોય, તો નેટ પ્રાથમિક ઉત્પાદકતા (NPP) કેટલી હશે?", "opts": ["50 g C/m²/વર્ષ", "80 g C/m²/વર્ષ", "30 g C/m²/વર્ષ", "110 g C/m²/વર્ષ"], "ans": 0, "exp": "નેટ પ્રાથમિક ઉત્પાદકતા (NPP) = GPP - શ્વસન દર = 80 - 30 = 50 g C/m²/વર્ષ. વિકલ્પ B (80 g) GPP છે, વિકલ્પ C (30 g) શ્વસન દર છે, અને વિકલ્પ D (110 g) GPP અને શ્વસન દરનો સરવાળો છે, જે ગણતરીની ચૂક છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "જળીય પરિસ્થિતિકી તંત્રમાં, જો 'લાઇટ-ડાર્ક બોટલ' પદ્ધતિથી માપન કરતાં, લાઇટ બોટલમાં ઓક્સિજનની માત્રા 15 mg/L અને ડાર્ક બોટલમાં 5 mg/L જોવા મળે, તો નેટ પ્રાથમિક ઉત્પાદકતા (NPP) કેટલી હશે?", "opts": ["10 mg/L O2", "20 mg/L O2", "5 mg/L O2", "15 mg/L O2"], "ans": 0, "exp": "લાઇટ બોટલમાં ઓક્સિજનની માત્રા (15 mg/L) પ્રકાશસંશ્લેષણ દરમિયાન ઉત્પન્ન થયેલ ઓક્સિજન દર્શાવે છે, જ્યારે ડાર્ક બોટલમાં ઓક્સિજનની માત્રા (5 mg/L) શ્વસન દરમિયાન વપરાયેલ ઓક્સિજન દર્શાવે છે. નેટ પ્રાથમિક ઉત્પાદકતા (NPP) = લાઇટ બોટલ O2 - ડાર્ક બોટલ O2 = 15 - 5 = 10 mg/L O2. અહીં, A સાચું છે કારણ કે NPP = GPP - શ્વસન. B, C, અને D ગણતરીમાં ખોટા છે.", "ref": "Std 12 - અધ્યાય 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "એક મરુભૂમી પરિસ્થિતિકી તંત્રમાં, પ્રાથમિક ઉત્પાદકતા નીચેના પૈકી કયા પરિબળ દ્વારા સૌથી વધુ પ્રભાવિત થશે?", "opts": ["તાપમાન", "પ્રકાશની તીવ્રતા", "પાણીની ઉપલબ્ધતા", "CO2ની સાંદ્રતા"], "ans": 2, "exp": "મરુભૂમી પરિસ્થિતિકી તંત્રમાં, પાણીની ઉપલબ્ધતા પ્રાથમિક ઉત્પાદકતાને સૌથી વધુ પ્રભાવિત કરે છે કારણ કે પાણીનો અભાવ વનસ્પતિ વૃદ્ધિને મર્યાદિત કરે છે. તાપમાન (A), પ્રકાશની તીવ્રતા (B), અને CO2ની સાંદ્રતા (D) પણ પ્રાથમિક ઉત્પાદકતાને અસર કરે છે, પરંતુ મરુભૂમીમાં પાણીની ઉપલબ્ધતા સૌથી મહત્વપૂર્ણ પરિબળ છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું પરિબળ મરુભૂમી પરિસ્થિતિકી તંત્રમાં પ્રાથમિક ઉત્પાદકતાને સૌથી વધુ અસર કરે છે?", "opts": ["તાપમાન", "પ્રકાશની તીવ્રતા", "પાણીની ઉપલબ્ધતા", "CO₂ ની સાંદ્રતા"], "ans": 2, "exp": "મરુભૂમી પરિસ્થિતિકી તંત્રમાં પાણીની ઉપલબ્ધતા પ્રાથમિક ઉત્પાદકતાનો સૌથી મહત્વનો નિયંત્રક પરિબળ છે. A, B, D પણ અસર કરે છે, પરંતુ C સૌથી મહત્વનો છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "એક વનસ્પતિ સમુદાયમાં, જો ગ્રોસ પ્રાથમિક ઉત્પાદકતા (GPP) 60 g C/m²/વર્ષ અને શ્વસન દર 20 g C/m²/વર્ષ હોય, તો નેટ પ્રાથમિક ઉત્પાદકતા (NPP) કેટલી હશે?", "opts": ["40 g C/m²/વર્ષ", "60 g C/m²/વર્ષ", "20 g C/m²/વર્ષ", "80 g C/m²/વર્ષ"], "ans": 0, "exp": "નેટ પ્રાથમિક ઉત્પાદકતા (NPP) = GPP - શ્વસન દર = 60 - 20 = 40 g C/m²/વર્ષ. A સાચું છે. B, C, D ગણતરીમાં ખોટા છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "મરુભૂમી પરિસ્થિતિકી તંત્રમાં, પ્રાથમિક ઉત્પાદકતા નીચેના પૈકી કયા પરિબળ દ્વારા સૌથી ઓછી અસર પામે છે?", "opts": ["તાપમાન", "પ્રકાશની તીવ્રતા", "પાણીની ઉપલબ્ધતા", "વાતાવરણીય CO2ની સાંદ્રતા"], "ans": 1, "exp": "મરુભૂમી પરિસ્થિતિકી તંત્રમાં, પાણીની ઉપલબ્ધતા (C) અને તાપમાન (A) પ્રાથમિક ઉત્પાદકતાને સૌથી વધુ અસર કરે છે, કારણ કે પાણીનો અભાવ વનસ્પતિ વૃદ્ધિને મર્યાદિત કરે છે. વાતાવરણીય CO2ની સાંદ્રતા (D) પણ અગત્યની ભૂમિકા ભજવે છે, પરંતુ પ્રકાશની તીવ્રતા (B) મરુભૂમીમાં સામાન્ય રીતે ઉચ્ચ હોય છે અને પ્રાથમિક ઉત્પાદકતાને ઓછી અસર કરે છે. આથી, B વિકલ્પ સાચો છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "એક વનસ્પતિ સમુદાયમાં, જો ગ્રોસ પ્રાથમિક ઉત્પાદકતા (GPP) 70 g C/m2/વર્ષ અને શ્વસન દર 20 g C/m2/વર્ષ હોય, તો નેટ પ્રાથમિક ઉત્પાદકતા (NPP) કેટલી હશે?", "opts": ["50 g C/m2/વર્ષ", "70 g C/m2/વર્ષ", "20 g C/m2/વર્ષ", "90 g C/m2/વર્ષ"], "ans": 0, "exp": "ગ્રોસ પ્રાથમિક ઉત્પાદકતા (GPP) એ ટોટલ કાર્બન ઉત્પાદન દર્શાવે છે, જ્યારે શ્વસન દર એ વનસ્પતિ દ્વારા વપરાયેલ કાર્બન દર્શાવે છે. નેટ પ્રાથમિક ઉત્પાદકતા (NPP) = GPP - શ્વસન દર = 70 - 20 = 50 g C/m2/વર્ષ. આથી, A વિકલ્પ સાચો છે. B, C, અને D વિકલ્પો ગણતરીમાં ભૂલ દર્શાવે છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "એક જળીય પરિસ્થિતિકી તંત્રમાં, જ્યારે 'લાઇટ-ડાર્ક બોટલ' પદ્ધતિથી પ્રાથમિક ઉત્પાદકતા માપવામાં આવે ત્યારે, લાઇટ બોટલમાં ઓક્સિજનની વૃદ્ધિ 8 mg/L અને ડાર્ક બોટલમાં ઓક્સિજનની ઘટ 3 mg/L નોંધાય છે. જો આ જ પરિસ્થિતિકી તંત્રમાં ક્લોરોફિલ aની સાંદ્રતા 15 µg/L હોય, તો નીચેનામાંથી કયું વિધાન સૌથી યોગ્ય રીતે આ ડેટાનું વિશ્લેષણ કરે છે?", "opts": ["ગ્રોસ પ્રાથમિક ઉત્પાદકતા (GPP) 11 mg/L O2 છે, પરંતુ ક્લોરોફિલ aની સાંદ્રતા અને GPP વચ્ચે કોઈ સંબંધ નથી.", "નેટ પ્રાથમિક ઉત્પાદકતા (NPP) 5 mg/L O2 છે, અને ક્લોરોફિલ aની સાંદ્રતા GPP સાથે સીધો સંબંધ ધરાવે છે.", "શ્વસન દર 3 mg/L O2 છે, અને ક્લોરોફિલ aની સાંદ્રતા પ્રાથમિક ઉત્પાદકતાને પ્રત્યક્ષ રીતે અસર કરતી નથી.", "ગ્રોસ પ્રાથમિક ઉત્પાદકતા (GPP) 8 mg/L O2 છે, અને ક્લોરોફિલ aની સાંદ્રતા પ્રાથમિક ઉત્પાદકતાને અસર કરતી નથી."], "ans": 1, "exp": "લાઇટ-ડાર્ક બોટલ પદ્ધતિમાં, લાઇટ બોટલમાં ઓક્સિજનની વૃદ્ધિ (8 mg/L) GPP - શ્વસન દર દર્શાવે છે, જ્યારે ડાર્ક બોટલમાં ઓક્સિજનની ઘટ (3 mg/L) શ્વસન દર દર્શાવે છે. આથી, GPP = 8 + 3 = 11 mg/L O2 અને NPP = GPP - શ્વસન = 11 - 3 = 8 mg/L O2. પરંતુ ક્લોરોફિલ aની સાંદ્રતા પ્રાથમિક ઉત્પાદકતા (GPP) સાથે સીધો સંબંધ ધરાવે છે, કારણ કે ક્લોરોફિલ a પ્રકાશસંશ્લેષણ માટે જરૂરી છે. આથી, વિકલ્પ B યોગ્ય છે, કારણ કે NPP = 5 mg/L O2 (8 - 3) અને ક્લોરોફિલ a GPP સાથે સંબંધિત છે. વિકલ્પ Aમાં GPP સાચો છે પરંતુ ક્લોરોફિલ a અને GPP વચ્ચેનો સંબંધ ખોટો છે. વિકલ્પ Cમાં શ્વસન દર સાચો છે પરંતુ ક્લોરોફિલ aની અસર વિશે ખોટું વિધાન છે. વિકલ્પ Dમાં GPP અને ક્લોરોફિલ a વિશે ખોટું વિધાન છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "મરુભૂમી પરિસ્થિતિકી તંત્રમાં, જ્યારે ક્લોરોફિલ aની સાંદ્રતા ઓછી હોવા છતાં પ્રાથમિક ઉત્પાદકતા અપેક્ષાકૃત ઉચ્ચ જોવા મળે છે, તો તેનું સૌથી યોગ્ય કારણ કયું હશે?", "opts": ["ક્લોરોફિલ aની સાથે સાથે કેટલાક સાયનોબેક્ટેરિયા પણ પ્રકાશસંશ્લેષણમાં યોગદાન આપે છે, જે ક્લોરોફિલ a પદ્ધતિમાં ધ્યાનમાં લેવાતા નથી.", "મરુભૂમીમાં ઉચ્ચ તાપમાનને કારણે પ્રકાશસંશ્લેષણનો દર વાધે છે, જે ક્લોરોફિલ aની ઓછી સાંદ્રતાને પૂરક બને છે.", "મરુભૂમીમાં પાણીની અછતને કારણે વનસ્પતિઓ દ્વારા ક્લોરોફિલ aનું ઉત્પાદન ઘટે છે, પરંતુ તેની કામગીરી વધુ કાર્યક્ષમ બને છે.", "ક્લોરોફિલ a પદ્ધતિ ફક્ત જલીય પરિસ્થિતિકી તંત્ર માટે જ વપરાય છે, મરુભૂમી માટે નહીં."], "ans": 0, "exp": "ક્લોરોફિલ a પદ્ધતિ ફક્ત વનસ્પતિઓમાં હાજર ક્લોરોફિલ aને માપે છે, પરંતુ મરુભૂમી પરિસ્થિતિકી તંત્રમાં સાયનોબેક્ટેરિયા અને અન્ય પ્રકાશસંશ્લેષી સૂક્ષ્મજીવો પણ પ્રાથમિક ઉત્પાદકતામાં યોગદાન આપે છે, જે આ પદ્ધતિમાં ધ્યાનમાં લેવાતા નથી. અ) સાચું છે. બ) ઉચ્ચ તાપમાન પ્રકાશસંશ્લેષણને વધારી શકે પરંતુ તે ક્લોરોફિલ aની ઓછી સાંદ્રતાને સીધું સમજાવતું નથી. ચ) પાણીની અછત ક્લોરોફિલ aની કામગીરીમાં ઘટાડો કરે, નહીં કે વધારો. ડ) ક્લોરોફિલ a પદ્ધતિ મરુભૂમી માટે પણ વપરાય છે, પરંતુ તેની મર્યાદાઓ છે.", "ref": "Std 12 - અધ્યાય 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "એક વનસ્પતિ સમુદાયમાં, જો ગ્રોસ પ્રાથમિક ઉત્પાદકતા (GPP) 100 g C/m²/વર્ષ અને શ્વસન દર (R) 40 g C/m²/વર્ષ હોય, તો નેટ પ્રાથમિક ઉત્પાદકતા (NPP) અને શ્વસન દરનો ગુણોત્તર કેટલો હશે?", "opts": ["1.5", "2.5", "0.6", "3.0"], "ans": 0, "exp": "NPP = GPP - R = 100 - 40 = 60 g C/m²/વર્ષ. શ્વસન દર (R) = 40 g C/m²/વર્ષ. ગુણોત્તર = NPP / R = 60 / 40 = 1.5. અ) સાચું છે. બ), ચ), અને ડ) ગણતરીમાં ખોટા પડે છે.", "ref": "Std 12 - અધ્યાય 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "એક સંશોધકે એક જળીય પરિસ્થિતિકી તંત્રમાં પ્રાથમિક ઉત્પાદકતા માપવા માટે 'લાઇટ-ડાર્ક બોટલ' પદ્ધતિનો ઉપયોગ કર્યો. માપન દરમિયાન, લાઇટ બોટલમાં ઓક્સિજનની માત્રા 14 mg/L અને ડાર્ક બોટલમાં 6 mg/L નોંધાઈ. જો આ પરિસ્થિતિકી તંત્રમાં પ્રાથમિક ઉત્પાદકોનું શ્વસન દર 2 mg O₂/L/કલાક હોય, તો આ પરિસ્થિતિકી તંત્રની નેટ પ્રાથમિક ઉત્પાદકતા (NPP) કેટલી હશે?", "opts": ["4 mg O₂/L/કલાક", "6 mg O₂/L/કલાક", "8 mg O₂/L/કલાક", "10 mg O₂/L/કલાક"], "ans": 1, "exp": "લાઇટ બોટલમાં ઓક્સિજનનું પ્રમાણ પ્રકાશસંશ્લેષણ અને શ્વસન બંને પ્રક્રિયાઓનું પરિણામ છે, જ્યારે ડાર્ક બોટલમાં માત્ર શ્વસન થાય છે. ગ્રોસ પ્રાથમિક ઉત્પાદકતા (GPP) = લાઇટ બોટલમાં ઓક્સિજન - ડાર્ક બોટલમાં ઓક્સિજન = 14 - 6 = 8 mg O₂/L. આપેલ શ્વસન દર 2 mg O₂/L/કલાક છે, તેથી નેટ પ્રાથમિક ઉત્પાદકતા (NPP) = GPP - શ્વસન = 8 - 2 = 6 mg O₂/L/કલાક. વિકલ્પ A ખોટો છે કારણ કે તેમાં શ્વસન દર બાદ કર્યો નથી. વિકલ્પ C અને D ખોટા છે કારણ કે તેમાં ગણતરીની ભૂલ છે.", "ref": "Std 12 - પ્રકરણ 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન મરુભૂમી પરિસ્થિતિકી તંત્રમાં પ્રાથમિક ઉત્પાદકતા માટે અપવાદરૂપ છે?", "opts": ["મરુભૂમિમાં પ્રકાશની તીવ્રતા વધુ હોવા છતાં પ્રાથમિક ઉત્પાદકતા ઓછી હોય છે", "મરુભૂમિમાં ક્લોરોફિલ aની સાંદ્રતા ઓછી હોવાથી પ્રાથમિક ઉત્પાદકતા ઓછી હોય છે", "મરુભૂમિમાં પાણીની અછત હોવા છતાં કેટલાક વનસ્પતિઓ ઉચ્ચ પ્રાથમિક ઉત્પાદકતા દર્શાવે છે", "મરુભૂમિમાં તાપમાન વધુ હોવાથી પ્રકાશસંશ્લેષણ દર વધે છે"], "ans": 2, "exp": "મરુભૂમિમાં સામાન્ય રીતે પાણીની અછતને કારણે પ્રાથમિક ઉત્પાદકતા ઓછી હોય છે, પરંતુ કેટલીક વનસ્પતિઓ (જેમ કે કેક્ટસ) વિશિષ્ટ અનુકૂલનો ધરાવે છે જે તેમને પાણીનો કાર્યક્ષમ ઉપયોગ કરીને પ્રમાણમાં ઉચ્ચ પ્રાથમિક ઉત્પાદકતા દર્શાવવા સક્ષમ બનાવે છે. આ એક અપવાદરૂપ પરિસ્થિતિ છે. વિકલ્પ A, B અને D સામાન્ય પરિસ્થિતિનું વર્ણન કરે છે અને અપવાદરૂપ નથી.", "ref": "Std 12 - પ્રકરણ 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "એક સંશોધકે એક ઊંડા સરોવરના જળીય પરિસ્થિતિકી તંત્રમાં પ્રાથમિક ઉત્પાદકતા માપવા માટે 'લાઇટ-ડાર્ક બોટલ' પદ્ધતિનો ઉપયોગ કર્યો. માપન દરમિયાન, તેમણે જોયું કે 'લાઇટ બોટલ'માં ઓક્સિજનની માત્રા 8 mg/L અને 'ડાર્ક બોટલ'માં 4 mg/L હતી. જો સરોવરના પાણીનું તાપમાન અચાનક 10°C થી 25°C સુધી વધી જાય, તો નીચેનામાંથી કયું વિધાન આ પરિસ્થિતિમાં પ્રાથમિક ઉત્પાદકતા માટે સૌથી વધુ યોગ્ય રહેશે? (ધ્યાનમાં લો કે અન્ય પરિબળો અચળ રહે છે.)", "opts": ["પ્રાથમિક ઉત્પાદકતા વધશે કારણ કે ઉત્સેચકોની પ્રક્રિયા ઝડપી બનશે", "પ્રાથમિક ઉત્પાદકતા ઘટશે કારણ કે પાણીમાં ઓક્સિજનની દ્રાવ્યતા ઘટશે", "પ્રાથમિક ઉત્પાદકતા અચળ રહેશે કારણ કે પ્રકાશની તીવ્રતા બદલાઈ નથી", "પ્રાથમિક ઉત્પાદકતા ઘટશે કારણ કે ફાયટોપ્લાંકટનની શ્વસન ક્રિયા વધશે અને પ્રકાશસંશ્લેષણ પર પ્રતિકૂળ અસર થશે"], "ans": 3, "exp": "સાચો જવાબ વિકલ્પ D છે. જ્યારે તાપમાન વધે છે, ત્યારે ફાયટોપ્લાંકટનની શ્વસન ક્રિયા ઝડપી બને છે, જેના કારણે પ્રકાશસંશ્લેષણ દરમિયાન ઉત્પન્ન થતો ઓક્સિજન શ્વસનમાં વધુ વપરાય છે. આથી નેટ પ્રાથમિક ઉત્પાદકતા ઘટે છે. વિકલ્પ A ખોટો છે કારણ કે ઉત્સેચકોની પ્રક્રિયા ઝડપી બનવા છતાં શ્વસન દર પણ વધે છે, જે પ્રકાશસંશ્લેષણની અસરને નાબૂદ કરે છે. વિકલ્પ B ખોટો છે કારણ કે ઓક્સિજનની દ્રાવ્યતા ઘટવાથી પ્રાથમિક ઉત્પાદકતા પર પ્રત્યક્ષ અસર થતી નથી. વિકલ્પ C ખોટો છે કારણ કે તાપમાનમાં ફેરફાર પ્રકાશસંશ્લેષણ અને શ્વસન બંને પર અસર કરે છે.", "ref": "Std 12 - પ્રકરણ 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "એક ઊંડા સરોવરના જળીય પરિસ્થિતિકી તંત્રમાં, જ્યારે 'લાઇટ-ડાર્ક બોટલ' પદ્ધતિથી પ્રાથમિક ઉત્પાદકતા માપવામાં આવે, ત્યારે લાઇટ બોટલમાં ઓક્સિજનની માત્રા 8 mg/L અને ડાર્ક બોટલમાં ઓક્સિજનની માત્રા 3 mg/L જોવા મળે છે. તો નેટ પ્રાથમિક ઉત્પાદકતા (NPP) કેટલી હશે?", "opts": ["5 mg/L O2", "8 mg/L O2", "3 mg/L O2", "11 mg/L O2"], "ans": 0, "exp": "લાઇટ બોટલમાં ઓક્સિજનની માત્રા (8 mg/L) પ્રકાશસંશ્લેષણ દર (GPP) દર્શાવે છે, જ્યારે ડાર્ક બોટલમાં ઓક્સિજનની માત્રા (3 mg/L) શ્વસન દર દર્શાવે છે. નેટ પ્રાથમિક ઉત્પાદકતા (NPP) = GPP - શ્વસન = 8 - 3 = 5 mg/L O2. B) 8 mg/L GPP છે, NPP નથી. C) 3 mg/L શ્વસન દર છે. D) 11 mg/L કોઈપણ સીધી ગણતરી સાથે સંગત નથી.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "નીચેનામાંથી કયું પરિબળ જલીય પરિસ્થિતિકી તંત્રમાં પ્રાથમિક ઉત્પાદકતા  ઉત્પાદકતા સામાન્ય રીતે નીચી હોય છે, પરંતુ તે હંમેશા ક્લોરોફિલ aની સાંદ્રતા પર આધારિત નથી. કેટલીક મરુભૂમિ વનસ્પતિઓમાં ક્લોરોફિલ aની સાંદ્રતા ઓછી હોવા છતાં, તેઓ અન્ય અનુકૂલનો જેમ કે CAM માર્ગ અથવા ઊંડા મૂળતંત્ર દ્વારા પ્રકાશસંશ્લેષણ કરી શકે છે. તેથી વિકલ્પ C અપવાદરૂપ છે. વિકલ્પ A, B અને D સાચા છે કારણ કે તે મરુભૂમિ પરિસ્થિતિકી તંત્રમાં પ્રાથમિક ઉત્પાદકતા માટેના સામાન્ય અનુકૂલનો દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "એક ઊંડા સરોવરના જળીય પરિસ્થિતિકી તંત્રમાં, 'લાઇટ-ડાર્ક બોટલ' પદ્ધતિથી પ્રાથમિક ઉત્પાદકતા માપતી વખતે, જો ડાર્ક બોટલમાં ઓક્સિજનની માત્રા વધી જાય, તો તેનું શું કારણ હોઈ શકે?", "opts": ["બોટલમાં બેક્ટેરિયા દ્વારા શ્વસન ક્રિયા થઈ રહી છે", "બોટલમાં કોઈ જૈવિક ક્રિયા થતી નથી", "બોટલમાં પ્રકાશસંશ્લેષણ થઈ રહ્યું છે", "બોટલમાં રાસાયણિક ક્રિયા દ્વારા ઓક્સિજન ઉત્પન્ન થઈ રહ્યું છે"], "ans": 0, "exp": "ડાર્ક બોટલમાં પ્રકાશ ન હોવાથી પ્રકાશસંશ્લેષણ થતું નથી, પરંતુ શ્વસન ક્રિયા ચાલુ રહે છે. જો ઓક્સિજનની માત્રા વધી રહી હોય, તો તે બેક્ટેરિયા અથવા અન્ય સૂક્ષ્મજીવો દ્વારા શ્વસન ક્રિયા થવાને કારણે હોઈ શકે (A). બાકીના વિકલ્પો અયોગ્ય છે: (B) જૈવિક ક્રિયા થતી ન હોવી જોઈએ, (C) પ્રકાશસંશ્લેષણ માટે પ્રકાશ જરૂરી છે, અને (D) રાસાયણિક ક્રિયા દ્વારા ઓક્સિજન ઉત્પન્ન થવું જળીય પરિસ્થિતિકી તંત્રમાં સામાન્ય નથી.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "નીચેનામાંથી કયું પરિબળ જળીય પરિસ્થિતિકી તંત્રમાં પ્રાથમિક ઉત્પાદકતાને અસર કરે છે, પરંતુ સ્થળીય પરિસ્થિતિકી તંત્રમાં અસર કરતું નથી?", "opts": ["પ્રકાશની તીવ્રતા", "પાણીની ઉપલબ્ધતા", "પોષક તત્ત્વોની સાંદ્રતા", "પાણીની પારદર્શિતા"], "ans": 3, "exp": "પાણીની પારદર્શિતા (D) ફક્ત જળીય પરિસ્થિતિકી તંત્રમાં પ્રાથમિક ઉત્પાદકતાને અસર કરે છે, કારણ કે તે પ્રકાશના પેનેટ્રેશનને અસર કરે છે, જે પ્રકાશસંશ્લેષણ માટે જરૂરી છે. પ્રકાશની તીવ્રતા (A), પાણીની ઉપલબ્ધતા (B), અને પોષક તત્ત્વોની સાંદ્રતા (C) બંને જળીય અને સ્થળીય પરિસ્થિતિકી તંત્રમાં પ્રાથમિક ઉત્પાદકતાને અસર કરે છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
