<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lamarckism</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Lamarckism</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Lamarckism</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "લેમાર્કવાદ અનુસાર, જીવોના અંગોનો વિકાસ કયા સિદ્ધાંત પર આધારિત છે?", "opts": ["ઉપયોગ અને અનુપયોગનો નિયમ", "પ્રાકૃતિક પસંદગી", "જનીન મ્યુટેશન", "જનુકીય વહન"], "ans": 0, "exp": "લેમાર્કવાદમાં 'ઉપયોગ અને અનુપયોગનો નિયમ' મુખ્ય સિદ્ધાંત છે, જેમાં અંગોનો વિકાસ તેમના ઉપયોગ પર આધારિત હોય છે. પ્રાકૃતિક પસંદગી ડાર્વિનના સિદ્ધાંત સાથે સંબંધિત છે, જનીન મ્યુટેશન અને જનુકીય વહન આધુનિક ઉત્ક્રાંતિ સિદ્ધાંતો છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Lamarckism)", "ch": ""}, {"q": "લેમાર્કના સિદ્ધાંત અનુસાર, ગિરાફની લાંબી ગરદનનો વિકાસ કયા કારણસર થયો હોવાનું માનવામાં આવે છે?", "opts": ["પાન ખાવા માટે ઝાડ પર પહોંચવા અંગેના પ્રયત્નો", "પ્રાકૃતિક પસંદગી દ્વારા લાંબી ગરદનવાળા ગિરાફનો બચાવ", "જનીન મ્યુટેશન દ્વારા અચાનક લાંબી ગરદનનો વિકાસ", "પર્યાવરણીય દબાણને કારણે જનીનમાં ફેરફાર"], "ans": 0, "exp": "લેમાર્કના સિદ્ધાંત અનુસાર, ગિરાફની લાંબી ગરદન પાન ખાવા માટે ઝાડ પર પહોંચવા માટેના પ્રયત્નોને કારણે વિકસી છે. પ્રાકૃતિક પસંદગી ડાર્વિનના સિદ્ધાંત સાથે સંબંધિત છે, જનીન મ્યુટેશન અને પર્યાવરણીય દબાણ આધુનિક સિદ્ધાંતો છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Lamarckism)", "ch": ""}, {"q": "લેમાર્કવાદ અને ડાર્વિનવાદ વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["લેમાર્કવાદમાં અંગોનો વિકાસ ઉપયોગ પર આધારિત છે, જ્યારે ડાર્વિનવાદમાં પ્રાકૃતિક પસંદગી મહત્વની ભૂમિકા ભજવે છે", "લેમાર્કવાદમાં જનીન મ્યુટેશન પર ભાર મૂકવામાં આવે છે", "ડાર્વિનવાદમાં અંગોનો વિકાસ અનુવંશિકતા પર આધારિત નથી", "લેમાર્કવાદમાં પ્રજનન દરમિયાન પ્રાપ્ત લક્ષણોનું વહન થતું નથી"], "ans": 0, "exp": "લેમાર્કવાદમાં અંગોનો વિકાસ ઉપયોગ અને અનુપયોગના નિયમ પર આધારિત છે, જ્યારે ડાર્વિનવાદમાં પ્રાકૃતિક પસંદગી મહત્વની ભૂમિકા ભજવે છે. બાકીના વિકલ્પો લેમાર્કવાદ અને ડાર્વિનવાદના મૂળ સિદ્ધાંતો સાથે મેળ ખાતા નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Lamarckism vs Darwinism)", "ch": ""}, {"q": "લેમાર્કના સિદ્ધાંત અનુસાર, પ્રાપ્ત લક્ષણોનું વહન કેવી રીતે થાય છે?", "opts": ["પ્રાપ્ત લક્ષણો સંતતિઓમાં વહન પામે છે", "પ્રાપ્ત લક્ષણો ફક્ત વ્યક્તિગત જીવન દરમિયાન જ રહે છે", "પ્રાપ્ત લક્ષણો ફક્ત જનીન મ્યુટેશન દ્વારા વહન પામે છે", "પ્રાપ્ત લક્ષણો પર્યાવરણીય પરિબળો દ્વારા નક્કી થાય છે"], "ans": 0, "exp": "લેમાર્કના સિદ્ધાંત અનુસાર, પ્રાપ્ત લક્ષણો (જેમ કે અંગોનો વિકાસ) સંતતિઓમાં વહન પામે છે. બાકીના વિકલ્પો લેમાર્કના સિદ્ધાંત સાથે સુસંગત નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Inheritance of Acquired Characters)", "ch": ""}, {"q": "લેમાર્કવાદના કયા પાસાંને આધુનિક વૈજ્ઞાનિકો દ્વારા સ્વીકારવામાં આવતું નથી?", "opts": ["પ્રાપ્ત લક્ષણોનું વહન", "અંગોનો વિકાસ ઉપયોગ પર આધારિત", "જીવોના પર્યાવરણ સાથે અનુકૂલન", "ઉત્ક્રાંતિની પ્રક્રિયા"], "ans": 0, "exp": "આધુનિક વૈજ્ઞાનિકો દ્વારા લેમાર્કના 'પ્રાપ્ત લક્ષણોના વહન'ના સિદ્ધાંતને સ્વીકારવામાં આવતું નથી, કારણ કે જનીન વૈજ્ઞાનિકો એ સિદ્ધ કર્યું છે કે પ્રાપ્ત લક્ષણો જનીનમાં ફેરફાર કરતાં નથી. બાકીના પાસાં (અંગોનો વિકાસ, અનુકૂલન, ઉત્ક્રાંતિ) આધુનિક સિદ્ધાંતો સાથે અંશતઃ સુસંગત છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Criticism of Lamarckism)", "ch": ""}, {"q": "લેમાર્કવાદ અનુસાર, જો એક જીવ તેના જીવનકાળ દરમિયાન કોઈ અંગનો ઉપયોગ કરતો નથી, તો તે અંગનું ભવિષ્યમાં શું થશે?", "opts": ["તે અંગ વધુ વિકસિત થશે", "તે અંગ ક્રમશઃ લુપ્ત થતું જશે", "તે અંગનો આકાર બદલાશે પરંતુ કદ સમાન રહેશે", "તે અંગ અન્ય અંગોમાં રૂપાંતરિત થશે"], "ans": 1, "exp": "લેમાર્કવાદ અનુસાર, 'ઉપયોગ અને અનુપયોગનો નિયમ' મુજબ, જો કોઈ અંગનો ઉપયોગ ન થાય તો તે ક્રમશઃ લુપ્ત થતું જાય છે. આથી વિકલ્પ B સાચો છે. વિકલ્પ A લેમાર્કના 'ઉપયોગના નિયમ'ને વિરોધે છે, જ્યારે વિકલ્પ C અને D લેમાર્કવાદમાં વર્ણવેલા કોઈપણ સિદ્ધાંત સાથે સુસંગત નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કવાદમાં 'પ્રાપ્ત લક્ષણોના વહન'ના સિદ્ધાંતને આધુનિક જનીનશાસ્ત્રના આધારે કયા કારણસર ખોટો ગણવામાં આવે છે?", "opts": ["પ્રાપ્ત લક્ષણો DNAમાં ફેરફાર કરતાં નથી", "પ્રાપ્ત લક્ષણો કેવળ સોમેટિક કોષોમાં જ થાય છે", "પ્રાપ્ત લક્ષણો જનન કોષોમાં વહન પામતાં નથી", "ઉપરોક્ત તમામ"], "ans": 3, "exp": "લેમાર્કવાદમાં પ્રાપ્ત લક્ષણોના વહનનો સિદ્ધાંત આધુનિક જનીનશાસ્ત્ર અનુસાર ખોટો છે કારણ કે પ્રાપ્ત લક્ષણો DNAમાં ફેરફાર કરતાં નથી (A), તે કેવળ સોમેટિક કોષોમાં જ થાય છે (B), અને જનન કોષોમાં વહન પામતાં નથી (C). આથી વિકલ્પ D સાચો છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કવાદ અનુસાર, જીવોના ઉત્ક્રાંતિ માટે કયા બે મુખ્ય પરિબળો જવાબદાર ગણવામાં આવે છે?", "opts": ["પ્રાકૃતિક પસંદગી અને જનીન પરિવર્તન", "અંતર્ગત પ્રેરણા અને પ્રાપ્ત લક્ષણોનું વહન", "પર્યાવરણીય દબાણ અને જનીન વહન", "પ્રજનન દર અને મૃત્યુ દર"], "ans": 1, "exp": "લેમાર્કવાદ અનુસાર, ઉત્ક્રાંતિ માટે અંતર્ગત પ્રેરણા (જીવોની આંતરિક ઇચ્છા) અને પ્રાપ્ત લક્ષણોનું વહન (વપરાશ અને અનવપરાશના આધારે) બે મુખ્ય પરિબળો ગણવામાં આવે છે. વિકલ્પ A ડાર્વિનવાદ સાથે સંકળાયેલ છે, જ્યારે વિકલ્પ C અને D લેમાર્કવાદના સિદ્ધાંતો નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કવાદ અને ડાર્વિનવાદ વચ્ચેનો કયો તફાવત છે જે લેમાર્કવાદને વૈજ્ઞાનિક રીતે અસ્વીકાર્ય બનાવે છે?", "opts": ["લેમાર્કવાદ પ્રાપ્ત લક્ષણોના વહન પર ભાર મૂકે છે, જ્યારે ડાર્વિનવાદ પ્રાકૃતિક પસંદગી પર ભાર મૂકે છે", "લેમાર્કવાદ જનીન પરિવર્તનને માન્યતા આપે છે, જ્યારે ડાર્વિનવાદ નહીં", "લેમાર્કવાદ પર્યાવરણીય દબાણને ઉત્ક્રાંતિનું કારણ માને છે, જ્યારે ડાર્વિનવાદ અંતર્ગત પ્રેરણાને માને છે", "લેમાર્કવાદ મ્યુટેશન પર આધારિત છે, જ્યારે ડાર્વિનવાદ પ્રાપ્ત લક્ષણો પર આધારિત છે"], "ans": 0, "exp": "લેમાર્કવાદ પ્રાપ્ત લક્ષણોના વહન પર ભાર મૂકે છે, જ્યારે ડાર્વિનવાદ પ્રાકૃતિક પસંદગી પર ભાર મૂકે છે. આ તફાવત લેમાર્કવાદને વૈજ્ઞાનિક રીતે અસ્વીકાર્ય બનાવે છે કારણ કે પ્રાપ્ત લક્ષણોનું વહન આધુનિક જનીનશાસ્ત્ર અનુસાર શક્ય નથી. વિકલ્પ B, C, અને D લેમાર્કવાદ અને ડાર્વિનવાદના ખોટા વર્ણન છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કવાદ અનુસાર, નીચેના પૈકી કયું ઉદાહરણ લેમાર્કના 'અંગોના ઉપયોગ અને અનુપયોગ'ના સિદ્ધાંતને સંપૂર્ણપણે અનુરૂપ નથી?", "opts": ["ગુફામાં રહેતા પ્રાણીઓની આંખો નાની થવી અથવા અદૃશ્ય થવી", "સાપની પૂંછડીનો ઉપયોગ ઓછો થવાથી તેનું કદ ઘટવું", "માનવમાં અક્કલ દાઢનો ઉપયોગ ઓછો થવાથી તેનું કદ ઘટવું", "પક્ષીઓમાં પાંખોનો સતત ઉપયોગ થવાથી તેની પાંખોની સ્નાયુબદ્ધતા વધવી"], "ans": 3, "exp": "લેમાર્કવાદ અનુસાર, અંગોનો ઉપયોગ વધવાથી તેનો વિકાસ થાય છે અને ઉપયોગ ન થવાથી તે નબળા પડે છે અથવા લુપ્ત થાય છે. વિકલ્પ A, B અને Cમાં અંગોનો ઉપયોગ ઓછો થવાથી તેનું કદ ઘટવું અથવા અદૃશ્ય થવું લેમાર્કના સિદ્ધાંતને અનુરૂપ છે. પરંતુ વિકલ્પ Dમાં પાંખોનો સતત ઉપયોગ થવાથી સ્નાયુબદ્ધતા વધવી એ લેમાર્કવાદના સિદ્ધાંતને સંપૂર્ણપણે અનુરૂપ નથી, કારણ કે લેમાર્કવાદમાં અંગોના કદમાં ફેરફાર થવાની વાત છે, સ્નાયુબદ્ધતામાં ફેરફારની નહીં. વધુમાં, સ્નાયુબદ્ધતા વધવી એ પ્રાપ્ત લક્ષણ છે જે આનુવંશિક રીતે વારસામાં મળતું નથી, જે લેમાર્કવાદના મુખ્ય ખ્યાલને પણ અનુરૂપ નથી. તેથી વિકલ્પ D ખોટો છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કવાદ અનુસાર, 'પ્રાપ્ત લક્ષણોના વહન'ના સિદ્ધાંતને આધુનિક જનીનશાસ્ત્રના આધારે કયા કારણસર ખોટો ગણવામાં આવે છે?", "opts": ["પ્રાપ્ત લક્ષણો DNAમાં ફેરફાર કરતાં નથી", "પ્રાપ્ત લક્ષણો કેવળ શરીરની કોષોમાં જ ફેરફાર કરે છે, જ્યારે જનન કોષો અસરગ્રસ્ત થતી નથી", "પ્રાપ્ત લક્ષણો હંમેશા પેઢી દર પેઢી પસાર થતાં નથી", "પ્રાપ્ત લક્ષણો ફક્ત પ્રાણીઓમાં જ દેખાય છે, વનસ્પતિઓમાં નહીં"], "ans": 1, "exp": "લેમાર્કના 'પ્રાપ્ત લક્ષણોના વહન'ના સિદ્ધાંત મુજબ, જીવ દ્વારા જીવનકાળ દરમિયાન મેળવેલા લક્ષણો તેની સંતાનોને પસાર થાય છે. પરંતુ આધુનિક જનીનશાસ્ત્ર અનુસાર, પ્રાપ્ત લક્ષણો ફક્ત શરીરની કોષો (સોમેટિક કોષો)માં ફેરફાર કરે છે, જ્યારે જનન કોષો (જનન કોષો) અસરગ્રસ્ત થતી નથી. આથી વિકલ્પ B સાચો છે. વિકલ્પ A અપૂર્ણ છે, કારણ કે પ્રાપ્ત લક્ષણો ક્યારેક DNAમાં ફેરફાર કરી શકે છે, પરંતુ તે વંશાનુગત નથી. વિકલ્પ C અને D લેમાર્કવાદના મૂળ સિદ્ધાંતને સંપૂર્ણપણે વર્ણવતાં નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કવાદ અનુસાર, નીચેના પૈકી કયું ઉદાહરણ 'અંગોના ઉપયોગ અને અનુપયોગ'ના સિદ્ધાંતને સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["ગિરાફની લાંબી ગરદન", "મનુષ્યના હાથની આંગળીઓની લંબાઈ", "અંધેરામાં રહેતા ગુફા મચ્છરના અંધ અંશતઃ અદૃશ્ય થયેલા આંખો", "પક્ષીઓના પાંખના આકારમાં ફેરફાર"], "ans": 2, "exp": "લેમાર્કના 'અંગોના ઉપયોગ અને અનુપયોગ'ના સિદ્ધાંત અનુસાર, જો કોઈ અંગનો ઉપયોગ ન થતો હોય, તો તે ક્રમશઃ નબળું પડે છે અને અદૃશ્ય થઈ જાય છે. અંધેરામાં રહેતા ગુફા મચ્છરના આંખોનો ઉપયોગ ન થતો હોવાથી તે અંશતઃ અદૃશ્ય થયેલા છે, જે આ સિદ્ધાંતને યોગ્ય રીતે વર્ણવે છે. આથી વિકલ્પ C સાચો છે. વિકલ્પ A અને D 'અંગોના ઉપયોગ'ના સિદ્ધાંતને વર્ણવે છે, જ્યારે વિકલ્પ B લેમાર્કવાદ સાથે સીધો સંબંધ ધરાવતો નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કવાદ અનુસાર, ઉત્ક્રાંતિ માટે કયા બે મુખ્ય પરિબળો જવાબદાર ગણવામાં આવે છે?", "opts": ["કુદરતી પસંદગી અને જનીન પરિવર્તન", "અંગોનો ઉપયોગ અને અનુપયોગ, પ્રાપ્ત લક્ષણોનું વહન", "વાતાવરણીય દબાણ અને પ્રજનન દર", "મ્યુટેશન અને જનીન વહન"], "ans": 1, "exp": "લેમાર્કવાદ અનુસાર, ઉત્ક્રાંતિ માટેના મુખ્ય પરિબળો એ છે: 1) અંગોનો ઉપયોગ અને અનુપયોગ, જેમાં અંગોનો વિકાસ અથવા ક્ષીણતા થાય છે, અને 2) પ્રાપ્ત લક્ષણોનું વહન, જેમાં જીવ દ્વારા મેળવેલા લક્ષણો સંતાનોને પસાર થાય છે. આથી વિકલ્પ B સાચો છે. વિકલ્પ A, C, અને D ડાર્વિનવાદ અથવા આધુનિક ઉત્ક્રાંતિ સિદ્ધાંતો સાથે સંબંધિત છે, લેમાર્કવાદ સાથે નહીં.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કવાદના 'પ્રાપ્ત લક્ષણોના વહન'ના સિદ્ધાંતને આધુનિક જનીનશાસ્ત્રના આધારે કયા કારણસર ખોટો ગણવામાં આવે છે? અને આ સિદ્ધાંત કયા ઉદાહરણ દ્વારા સમજાવવામાં આવે છે?", "opts": ["પ્રાપ્ત લક્ષણો DNAમાં ફેરફાર કરતાં નથી અને આ સિદ્ધાંત ગિરાફની લાંબી ગરદન દ્વારા સમજાવવામાં આવે છે", "પ્રાપ્ત લક્ષણો જનીનમાં ફેરફાર કરે છે અને આ સિદ્ધાંત મનુષ્યના સ્નાયુઓના વિકાસ દ્વારા સમજાવવામાં આવે છે", "પ્રાપ્ત લક્ષણો કોષકેન્દ્રમાં સંગ્રહિત થાય છે અને આ સિદ્ધાંત પક્ષીઓના પાંખના વિકાસ દ્વારા સમજાવવામાં આવે છે", "પ્રાપ્ત લક્ષણો હોર્મોન દ્વારા વહન પામે છે અને આ સિદ્ધાંત મચ્છરના ડંખ દ્વારા સમજાવવામાં આવે છે"], "ans": 0, "exp": "લેમાર્કના 'પ્રાપ્ત લક્ષણોના વહન'ના સિદ્ધાંતને આધુનિક જનીનશાસ્ત્ર અનુસાર ખોટો ગણવામાં આવે છે કારણ કે પ્રાપ્ત લક્ષણો DNAમાં ફેરફાર કરતાં નથી, અને આ સિદ્ધાંત ગિરાફની લાંબી ગરદન દ્વારા સમજાવવામાં આવે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) પ્રાપ્ત લક્ષણો જનીનમાં ફેરફાર કરતાં નથી; C) પ્રાપ્ત લક્ષણો કોષકેન્દ્રમાં સંગ્રહિત થતાં નથી; D) પ્રાપ્ત લક્ષણો હોર્મોન દ્વારા વહન પામતાં નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કવાદ અનુસાર, નીચેના પૈકી કયું વિધાન લેમાર્કના 'આંતરિક જરૂરિયાતના સિદ્ધાંત' (Internal Vital Force) સાથે સુસંગત નથી?", "opts": ["જીવોની શારીરિક રચના તેમની આંતરિક જરૂરિયાત મુજબ બદલાય છે", "આંતરિક જરૂરિયાતને કારણે જીવોમાં નવા અંગોનો વિકાસ થઈ શકે છે", "આંતરિક જરૂરિયાત માત્ર પર્યાવરણીય પરિબળો દ્વારા જ પ્રેરિત થાય છે", "આંતરિક જરૂરિયાતને લીધે જીવોના વર્તનમાં ફેરફાર થાય છે જે ઉત્ક્રાંતિને અસર કરે છે"], "ans": 2, "exp": "લેમાર્કના 'આંતરિક જરૂરિયાતના સિદ્ધાંત' અનુસાર, જીવોની ઉત્ક્રાંતિ માટે આંતરિક જરૂરિયાત (Internal Vital Force) જવાબદાર છે, જે જીવની આંતરિક પ્રેરણા અને વિકાસ માટેની કુદરતી વૃત્તિ છે. આ સિદ્ધાંત મુજબ, આંતરિક જરૂરિયાત માત્ર બાહ્ય પર્યાવરણીય પરિબળો પર આધારિત નથી, પરંતુ જીવની આંતરિક પ્રેરણા પણ મહત્વપૂર્ણ છે. તેથી વિકલ્પ C ખોટો છે કારણ કે તે માત્ર પર્યાવરણીય પરિબળો પર જ આધારિત છે. બાકીના વિકલ્પો લેમાર્કવાદ સાથે સુસંગત છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કવાદ અનુસાર, 'આંતરિક જરૂરિયાતના સિદ્ધાંત' મુજબ જીવોના અંગોનો વિકાસ કયા કારણસર થાય છે?", "opts": ["પર્યાવરણીય દબાણને કારણે", "જીવની આંતરિક ઇચ્છા અને જરૂરિયાતને કારણે", "પ્રાકૃતિક પસંદગીને કારણે", "જનીન મ્યુટેશનને કારણે"], "ans": 1, "exp": "લેમાર્કના 'આંતરિક જરૂરિયાતના સિદ્ધાંત' અનુસાર, જીવોના અંગોનો વિકાસ જીવની આંતરિક ઇચ્છા અને જરૂરિયાતને કારણે થાય છે. આથી વિકલ્પ B સાચો છે. વિકલ્પ A ખોટો છે કારણ કે પર્યાવરણીય દબાણ ડાર્વિનવાદનો ભાગ છે. વિકલ્પ C ખોટો છે કારણ કે પ્રાકૃતિક પસંદગી ડાર્વિનના સિદ્ધાંતનો ભાગ છે. વિકલ્પ D ખોટો છે કારણ કે જનીન મ્યુટેશન આધુનિક ઉત્ક્રાંતિ સિદ્ધાંતનો ભાગ છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કવાદ અને ડાર્વિનવાદ વચ્ચેનો નીચેના પૈકી કયો તફાવત સૌથી મહત્વપૂર્ણ છે?", "opts": ["લેમાર્કવાદમાં પ્રાપ્ત લક્ષણોનું વહન થાય છે જ્યારે ડાર્વિનવાદમાં નથી", "લેમાર્કવાદમાં પ્રાકૃતિક પસંદગીનો સમાવેશ થાય છે જ્યારે ડાર્વિનવાદમાં નથી", "લેમાર્કવાદમાં જનીન મ્યુટેશનનો સમાવેશ થાય છે જ્યારે ડાર્વિનવાદમાં નથી", "લેમાર્કવાદમાં જીવોના અંગોનો વિકાસ પર્યાવરણીય દબાણને કારણે થાય છે જ્યારે ડાર્વિનવાદમાં આંતરિક જરૂરિયાતને કારણે"], "ans": 0, "exp": "લેમાર્કવાદ અને ડાર્વિનવાદ વચ્ચેનો સૌથી મહત્વપૂર્ણ તફાવત એ છે કે લેમાર્કવાદમાં પ્રાપ્ત લક્ષણોનું વહન થાય છે જ્યારે ડાર્વિનવાદમાં એવું માનવામાં આવતું નથી. આથી વિકલ્પ A સાચો છે. વિકલ્પ B ખોટો છે કારણ કે પ્રાકૃતિક પસંદગી ડાર્વિનવાદનો મુખ્ય ભાગ છે. વિકલ્પ C ખોટો છે કારણ કે જનીન મ્યુટેશન આધુનિક ઉત્ક્રાંતિ સિદ્ધાંતનો ભાગ છે. વિકલ્પ D ખોટો છે કારણ કે લેમાર્કવાદમાં અંગોનો વિકાસ આંતરિક જરૂરિયાતને કારણે થાય છે જ્યારે ડાર્વિનવાદમાં પર્યાવરણીય દબાણને કારણે થાય છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કવાદ અનુસાર, નીચેના પૈકી કયું ઉદાહરણ 'પ્રાપ્ત લક્ષણોના વહન'ના સિદ્ધાંતને સૌથી યોગ્ય રીતે દર્શાવે છે?", "opts": ["ગિરાફની લાંબી ગરદન", "કૂતરાની કાપેલી પૂંછડીના સંતાનોમાં પૂંછડીનો અભાવ", "મનુષ્યમાં એપેન્ડિક્સનું અલોપ થવું", "પેંગ્વિનની પાંખોનું પખેરૂના રૂપમાં રૂપાંતરણ"], "ans": 1, "exp": "લેમાર્કના 'પ્રાપ્ત લક્ષણોના વહન'ના સિદ્ધાંત અનુસાર, જો કૂતરાની પૂંછડી કાપી નાખવામાં આવે તો તેનું સંતાન પૂંછડી વગર જન્મે છે. આથી વિકલ્પ B સાચો છે. વિકલ્પ A લેમાર્કના 'અંગોના ઉપયોગ અને અનુપયોગ'ના સિદ્ધાંતને દર્શાવે છે. વિકલ્પ C અને D લેમાર્કવાદના અન્ય સિદ્ધાંતોને દર્શાવે છે પરંતુ 'પ્રાપ્ત લક્ષણોના વહન'ના સિદ્ધાંતને નહીં.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કવાદના કયા સિદ્ધાંતને આધુનિક વૈજ્ઞાનિકો દ્વારા સ્વીકારવામાં આવે છે?", "opts": ["પ્રાપ્ત લક્ષણોના વહનનો સિદ્ધાંત", "અંગોના ઉપયોગ અને અનુપયોગનો સિદ્ધાંત", "જીવોની ઉત્ક્રાંતિ માટે પર્યાવરણનો પ્રભાવ", "આંતરિક જરૂરિયાતનો સિદ્ધાંત"], "ans": 2, "exp": "લેમાર્કવાદના 'જીવોની ઉત્ક્રાંતિ માટે પર્યાવરણનો પ્રભાવ' સિદ્ધાંતને આધુનિક વૈજ્ઞાનિકો દ્વારા આંશિક રીતે સ્વીકારવામાં આવે છે. આથી વિકલ્પ C સાચો છે. વિકલ્પ A અને B ખોટા છે કારણ કે આ સિદ્ધાંતોને આધુનિક વૈજ્ઞાનિકો દ્વારા સ્વીકારવામાં આવતા નથી. વિકલ્પ D ખોટો છે કારણ કે 'આંતરિક જરૂરિયાતનો સિદ્ધાંત'ને આધુનિક વૈજ્ઞાનિકો દ્વારા સ્વીકારવામાં આવતો નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કવાદ અનુસાર, જો એક જીવ તેના જીવનકાળ દરમ્યાન કોઈ અંગનો ઉપયોગ ન કરે તો તે અંગનું શું થાય છે અને આ પ્રક્રિયાને કયા સિદ્ધાંત દ્વારા સમજાવવામાં આવે છે?", "opts": ["અંગ ક્ષીઅનુપયોગના સિદ્ધાંત' દ્વારા સમજાવવામાં આવે છે", "અંગ વિકસિત થાય છે અને તેને 'ઉપયોગના સિદ્ધાંત' દ્વારા સમજાવવામાં આવે છે", "અંગમાં કોઈ ફેરફાર થતો નથી અને તેને 'આંતરિક જરૂરિયાતના સિદ્ધાંત' દ્વારા સમજાવવામાં આવે છે", "અંગ લુપ્ત થાય છે અને તેને 'પ્રાપ્ત લક્ષણોના વહનના સિદ્ધાંત' દ્વારા સમજાવવામાં આવે છે"], "ans": 0, "exp": "લેમાર્કવાદ અનુસાર, જો જીવ તેના જીવનકાળ દરમ્યાન કોઈ અંગનો ઉપયોગ ન કરે તો તે અંગ ક્ષીણ થાય છે. આ પ્રક્રિયાને 'અનુપયોગના સિદ્ધાંત' દ્વારા સમજાવવામાં આવે છે. વિકલ્પ B ખોટો છે કારણ કે અંગ વિકસિત થાય છે તે 'ઉપયોગના સિદ્ધાંત' હેઠળ થાય છે, પરંતુ પ્રશ્ન અનુપયોગ વિશે છે. વિકલ્પ C ખોટો છે કારણ કે 'આંતરિક જરૂરિયાતના સિદ્ધાંત' અંગોના વિકાસ સાથે સંબંધિત છે, પરંતુ અહીં અંગનો ઉપયોગ ન થવાને કારણે ક્ષીણ થવાનો મુદ્દો છે. વિકલ્પ D ખોટો છે કારણ કે 'પ્રાપ્ત લક્ષણોના વહન' એ અંગના ક્ષીણ થવાને લગતો સિદ્ધાંત નથી, પરંતુ લક્ષણોના વંશપરંપરાગત વહન વિશે છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
