<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>અજૈવિક ઘટકો</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>અજૈવિક ઘટકો</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">અજૈવિક ઘટકો</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 48 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 48 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક જળાશયમાં ઓક્સિજનનું પ્રમાણ અચાનક ઘટી જાય છે. આ ઘટનાને કારણે નીચેનામાંથી કયો અજૈવિક ઘટક સીધો પ્રભાવિત થશે નહીં?", "opts": ["પાણીનું pH સ્તર", "કાર્બન ડાયોક્સાઇડનું દ્રાવ્યતા સંતુલન", "જળચર વનસ્પતિઓમાં પ્રકાશસંશ્લેષણની ક્રિયા", "માછલીઓના શ્વસન માટે ઉપલબ્ધ ઓક્સિજન"], "ans": 2, "exp": "સાચો જવાબ C છે. ઓક્સિજનનું પ્રમાણ ઘટવાથી પાણીમાં દ્રાવ્ય ઓક્સિજનની માત્રા ઘટે છે, જે માછલીઓના શ્વસનને સીધું પ્રભાવિત કરે છે (D ખોટું). ઓક્સિજનનું પ્રમાણ ઘટવાથી કાર્બન ડાયોક્સાઇડનું સંતુલન બગડે છે અને pH સ્તર પણ પ્રભાવિત થાય છે (A અને B ખોટાં). જોકે, પ્રકાશસંશ્લેષણ માટે વનસ્પતિઓ કાર્બન ડાયોક્સાઇડનો ઉપયોગ કરે છે, ઓક્સિજનનો નહીં, તેથી આ ક્રિયા સીધી પ્રભાવિત થશે નહીં (C સાચું).", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "નીચેનામાંથી કયો અજૈવિક ઘટક સીધો જૈવિક ક્રિયાઓને નિયંત્રિત કરતો નથી, પરંતુ પરોક્ષ રીતે પર્યાવરણીય પરિસ્થિતિઓને અસર કરે છે?", "opts": ["સૂર્યપ્રકાશની તીવ્રતા", "ભૂમિનું pH", "વાતાવરણીય દબાણ", "ખનીજ તત્ત્વોની પ્રાપ્યતા"], "ans": 2, "exp": "સાચો જવાબ C છે. સૂર્યપ્રકાશની તીવ્રતા પ્રકાશસંશ્લેષણને સીધી અસર કરે છે (A ખોટું). ભૂમિનું pH ખનીજ તત્ત્વોની પ્રાપ્યતા અને વનસ્પતિ વૃદ્ધિને અસર કરે છે (B અને D ખોટાં). વાતાવરણીય દબાણ સીધી જૈવિક ક્રિયાઓને નિયંત્રિત કરતું નથી, પરંતુ તે હવામાન અને ઓક્સિજનની પ્રાપ્યતા પર અસર કરે છે (C સાચું).", "ref": "Std 11 - પ્રકરણ 13: વનસ્પતિઓમાં વહન અને પ્રાણીઓમાં પરિવહન", "ch": ""}, {"q": "એક જંગલમાં લાંબા સમયથી વરસાદ ન પડ્યો હોય તો નીચેનામાંથી કયો અજૈવિક ઘટક સૌથી વધુ પ્રભાવિત થશે, જેના કારણે વનસ્પતિઓની વૃદ્ધિ મર્યાદિત થાય છે?", "opts": ["હવામાં કાર્બન ડાયોક્સાઇડનું પ્રમાણ", "ભૂમિમાં નાઇટ્રોજનનું પ્રમાણ", "ભૂમિમાં પાણીની પ્રાપ્યતા", "સૂર્યપ્રકાશની તીવ્રતા"], "ans": 2, "exp": "સાચો જવાબ C છે. વરસાદના અભાવે ભૂમિમાં પાણીની પ્રાપ્યતા ઘટે છે, જે વનસ્પતિઓની વૃદ્ધિ માટે જરૂરી છે (C સાચું). હવામાં કાર્બન ડાયોક્સાઇડનું પ્રમાણ સામાન્ય રીતે સ્થિર રહે છે (A ખોટું). નાઇટ્રોજનનું પ્રમાણ ભૂમિમાં રહે છે, પરંતુ તેની પ્રાપ્યતા પાણી પર આધારિત છે (B ખોટું). સૂર્યપ્રકાશની તીવ્રતા પર વરસાદની અસર થતી નથી (D ખોટું).", "ref": "Std 11 - પ્રકરણ 12: ખનીજ પોષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો અજૈવિક ઘટક જૈવિક ક્રિયાઓમાં ઉત્સેચકોની પ્રવૃત્તિને સીધી અસર કરતો નથી, પરંતુ પર્યાવરણીય પરિસ્થિતિઓને અસર કરે છે?", "opts": ["તાપમાન", "ભેજનું પ્રમાણ", "વાતાવરણીય દબાણ", "ભૂમિનું pH"], "ans": 2, "exp": "સાચો જવાબ C છે. તાપમાન અને pH ઉત્સેચકોની પ્રવૃત્તિને સીધી અસર કરે છે (A અને D ખોટાં). ભેજનું પ્રમાણ વનસ્પતિઓની વૃદ્ધિ અને શ્વસનને અસર કરે છે (B ખોટું). વાતાવરણીય દબાણ સીધી ઉત્સેચક પ્રવૃત્તિને અસર કરતું નથી, પરંતુ તે હવામાન પર અસર કરે છે (C સાચું).", "ref": "Std 12 - પ્રકરણ 9: જૈવિક અણુઓ", "ch": ""}, {"q": "એક તળાવમાં પ્રદૂષણને કારણે પાણીનું તાપમાન વધી જાય છે. આ પરિવર્તનને કારણે નીચેનામાંથી કયો અજૈવિક ઘટક સૌથી ઓછો પ્રભાવિત થશે?", "opts": ["પાણીમાં ઓક્સિજનની દ્રાવ્યતા", "કાર્બન ડાયોક્સાઇડનું સંતુલન", "પાણીનું બાષ્પીભવન દર", "જળચર પ્રાણીઓની ચયાપચય ક્રિયા"], "ans": 1, "exp": "સાચો જવાબ B છે. તાપમાન વધવાથી પાણીમાં ઓક્સિજનની દ્રાવ્યતા ઘટે છે (A ખોટું). બાષ્પીભવન દર વધે છે (C ખોટું). જળચર પ્રાણીઓની ચયાપચય ક્રિયા તાપમાન પર આધારિત છે (D ખોટું). જોકે, કાર્બન ડાયોક્સાઇડનું સંતુલન મુખ્યત્વે pH અને જૈવિક ક્રિયાઓ પર આધારિત છે, તેથી તે સૌથી ઓછું પ્રભાવિત થશે (B સાચું).", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "જ્યારે મૃદામાં કેલ્શિયમ અને મેગ્નેશિયમની ઉણપ હોય છે, ત્યારે નીચેનામાંથી કયો અજૈવિક ઘટક સૌથી વધુ પ્રભાવિત થશે, જેના કારણે વનસ્પતિઓમાં ક્લોરોફિલના સંશ્લેષણમાં ઘટાડો થશે?", "opts": ["નાઈટ્રોજન", "ફોસ્ફરસ", "મેગ્નેશિયમ", "પોટેશિયમ"], "ans": 2, "exp": "મેગ્નેશિયમ ક્લોરોફિલના કેન્દ્રીય અણુ તરીકે કામ કરે છે. કેલ્શિયમ અને મેગ્નેશિયમની ઉણપ હોવા છતાં, મેગ્નેશિયમની ઉણપ સીધી રીતે ક્લોરોફિલના સંશ્લેષણને પ્રભાવિત કરે છે. નાઈટ્રોજન (A) અને ફોસ્ફરસ (B) પ્રોટીન અને ન્યુક્લિક એસિડના સંશ્લેષણમાં મહત્વના છે, પરંતુ ક્લોરોફિલના સંશ્લેષણમાં નહીં. પોટેશિયમ (D) એન્ઝાઇમની ક્રિયાશીલતામાં મદદ કરે છે, પરંતુ ક્લોરોફિલના સંશ્લેષણમાં નહીં.", "ref": "Std 11 - અધ્યાય 12: વનસ્પતિ પોષણ", "ch": ""}, {"q": "એક જળાશયમાં pHનું મૂલ્ય અચાનક 5 થી 9 સુધી વધી જાય છે. આ પરિવર્તનને કારણે નીચેનામાંથી કયા અજૈવિક ઘટકના સ્તરમાં તાત્કાલિક ઘટાડો થશે, જેના કારણે જલીય જીવોના શ્વસન પર અસર પડશે?", "opts": ["ઓક્સિજન", "કાર્બન ડાયોક્સાઇડ", "નાઈટ્રોજન", "સલ્ફર"], "ans": 0, "exp": "pHમાં વધારો (અલ્કલાઇન પરિસ્થિતિ) ઓક્સિજનની દ્રાવ્યતાને ઘટાડે છે, જેના કારણે જલીય જીવોના શ્વસન પર અસર પડે છે. કાર્બન ડાયોક્સાઇડ (B) અને નાઈટ્રોજન (C)ની દ્રાવ્યતા pHમાં વધારાથી ઘટતી નથી, ઉલટાનું, કાર્બન ડાયોક્સાઇડની દ્રાવ્યતા ઘટે છે પરંતુ તે શ્વસન પર સીધી અસર કરતું નથી. સલ્ફર (D) pHમાં ફેરફારથી સીધી અસર પામતું નથી.", "ref": "Std 11 - અધ્યાય 14: પર્યાવરણ અને તેના ઘટકો", "ch": ""}, {"q": "નીચેનામાંથી કયો અજૈવિક ઘટક વનસ્પતિઓમાં પ્રકાશસંશ્લેષણની ક્રિયામાં સહભાગી નથી, પરંતુ તેના અભાવે વનસ્પતિના વિકાસમાં અવરોધ ઉભો થાય છે?", "opts": ["મેગ્નેશિયમ", "લોખંડ", "ક્લોરિન", "કોબાલ્ટ"], "ans": 3, "exp": "કોબાલ્ટ (D) પ્રકાશસંશ્લેષણમાં સહભાગી નથી, પરંતુ તે નાઈટ્રોજન સ્થિરીકરણમાં મહત્વની ભૂમિકા ભજવે છે અને તેના અભાવે વનસ્પતિના વિકાસમાં અવરોધ ઉભો થાય છે. મેગ્નેશિયમ (A) ક્લોરોફિલનો ઘટક છે અને પ્રકાશસંશ્લેષણમાં સહભાગી છે. લોખંડ (B) અને ક્લોરિન (C) પણ પ્રકાશસંશ્લેષણમાં મહત્વની ભૂમિકા ભજવે છે.", "ref": "Std 11 - અધ્યાય 12: વનસ્પતિ પોષણ", "ch": ""}, {"q": "એક કૃષિ ખેતરમાં લાંબા સમયથી જિપ્સમ (CaSO4·2H2O)નો ઉપયોગ કરવામાં આવે છે. આના કારણે મૃદામાં નીચેનામાંથી કયા અજૈવિક ઘટકના સ્તરમાં વધારો થશે, જેના કારણે મૃદાની સંરચના સુધરશે?", "opts": ["સોડિયમ", "કેલ્શિયમ", "પોટેશિયમ", "મેગ્નેશિયમ"], "ans": 1, "exp": "જિપ્સમ (CaSO4·2H2O)માં કેલ્શિયમ હોય છે, જેના કારણે મૃદામાં કેલ્શિયમના સ્તરમાં વધારો થશે. કેલ્શિયમ મૃદાની સંરચના સુધારવામાં મદદ કરે છે. સોડિયમ (A), પોટેશિયમ (C), અને મેગ્નેશિયમ (D) જિપ્સમમાં હાજર નથી અને તેમના સ્તરમાં વધારો થતો નથી.", "ref": "Std 12 - અધ્યાય 14: મૃદા અને તેનું વર્ગીકરણ", "ch": ""}, {"q": "નીચેનામાંથી કયો અજૈવિક ઘટક જલીય પર્યાવરણમાં ઓક્સિજનના સ્તરને સીધી અસર કરતો નથી, પરંતુ તેના ઉચ્ચ સાંદ્રતાથી જલીય જીવોના શ્વસન પર પરોક્ષ અસર પડે છે?", "opts": ["કાર્બન ડાયોક્સાઇડ", "નાઈટ્રોજન", "સલ્ફર", "ફોસ્ફરસ"], "ans": 1, "exp": "નાઈટ્રોજન (B) ઓક્સિજનના સ્તરને સીધી અસર કરતું નથી, પરંતુ તેના ઉચ્ચ સાંદ્રતાથી જલીય વનસ્પતિઓના વિકાસને પ્રોત્સાહન મળે છે, જેના કારણે ઓક્ રોટિયેઝ"], "ans": 0, "exp": "લોખંડ (Fe) એ કેટલેઝ ઉત્સેચકના સક્રિય સ્થાનનો મહત્વપૂર્ણ ઘટક છે, જે હાઇડ્રોજન પેરોક્સાઇડને પાણી અને ઓક્સિજનમાં તોડે છે. એમાઇલેઝ (B), લાઇપેઝ (C), અને પ્રોટિયેઝ (D) ઉત્સેચકો માટે લોખંડ જરૂરી નથી. આથી લોખંડની ઉણપથી કેટલેઝ (A)ની ક્રિયાશીલતા સૌથી વધુ ઘટશે.", "ref": "Std 12 - Chapter 3: ઉત્સેચકો", "ch": ""}, {"q": "જ્યારે મૃદામાં મેગ્નેશિયમ (Mg)ની ઉણપ હોય છે, ત્યારે નીચેનામાંથી કયા પેશી અથવા અંગ પર સૌથી વધુ અસર થશે?", "opts": ["પર્ણહરિત (ક્લોરોફિલ) યુક્ત પેશી", "મૂળની વહન પેશી (ઝાઇલમ)", "તણાવ પેશી (કોલેન્કાઇમા)", "છાલની કોષરચના"], "ans": 0, "exp": "મેગ્નેશિયમ (Mg) એ ક્લોરોફિલ અણુનો કેન્દ્રીય અણુ છે, જે પ્રકાશસંશ્લેષણ માટે જરૂરી છે. આથી મેગ્નેશિયમની ઉણપથી પર્ણહરિત (ક્લોરોફિલ) યુક્ત પેશી (A) પર સૌથી વધુ અસર થશે. મૂળની વહન પેશી (B), તણાવ પેશી (C), અને છાલની કોષરચના (D) પર મેગ્નેશિયમની ઉણપની સીધી અસર ઓછી થાય છે.", "ref": "Std 11 - Chapter 13: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "એક જળાશયમાં કાર્બન ડાયોક્સાઇડ (CO₂)ની સાંદ્રતા અચાનક ઘટી જાય છે. આ પરિવર્તનને કારણે નીચેનામાંથી કયા જૈવિક પ્રક્રિયા પર સૌથી ઓછી અસર થશે?", "opts": ["જલીય વનસ્પતિઓમાં પ્રકાશસંશ્લેષણની દર", "જલીય પ્રાણીઓમાં શ્વસનની ક્રિયાવિધિ", "જલીય સૂક્ષ્મજીવો દ્વારા કાર્બનિક પદાર્થોનું વિઘટન", "જલીય વનસ્પતિઓમાં પાણીનું શોષણ"], "ans": 3, "exp": "કાર્બન ડાયોક્સાઇડ (CO₂) પ્રકાશસંશ્લેષણ (A) માટે મુખ્ય કાચો માલ છે, આથી તેની સાંદ્રતા ઘટવાથી પ્રકાશસંશ્લેષણની દર પર સીધી અસર થશે. શ્વસન (B) માટે CO₂ જરૂરી નથી, પરંતુ O₂ જરૂરી છે, પરંતુ CO₂ની ઉણપથી પરોક્ષ રીતે શ્વસન પર અસર થઈ શકે છે. સૂક્ષ્મજીવો દ્વારા વિઘટન (C) માટે CO₂ જરૂરી નથી, પરંતુ કાર્બનિક પદાર્થોની ઉપલબ્ધતા મહત્વપૂર્ણ છે. પાણીનું શોષણ (D) મુખ્યત્વે મૃદા અથવા જળાશયમાં પાણીની ઉપલબ્ધતા પર આધાર રાખે છે, CO₂ની સાંદ્રતાથી તેની સીધી અસર થતી નથી. આથી પાણીના શોષણ પર સૌથી ઓછી અસર થશે.", "ref": "Std 12 - Chapter 13: પર્યાવરણ અને તેના ઘટકો", "ch": ""}, {"q": "મૃદામાં નાઇટ્રોજનની ઉણપ હોય ત્યારે નીચેનામાંથી કયો અજૈવિક ઘટક વનસ્પતિઓમાં પ્રોટીન સંશ્લેષણને સૌથી વધુ અસર કરશે, પરંતુ તે સીધો જ પ્રોટીન બનાવતો નથી?", "opts": ["નાઇટ્રેટ (NO₃⁻)", "એમોનિયમ (NH₄⁺)", "યુરિયા (CO(NH₂)₂)", "નાઇટ્રોજન ગેસ (N₂)"], "ans": 0, "exp": "નાઇટ્રેટ (NO₃⁻) વનસ્પતિઓ દ્વારા શોષાય છે અને નાઇટ્રોજન ચક્રમાં મહત્વની ભૂમિકા ભજવે છે. તે સીધો પ્રોટીન બનાવતો નથી, પરંતુ વનસ્પતિઓમાં એમિનો એસિડ અને પ્રોટીન સંશ્લેષણ માટે આવશ્યક છે. એમોનિયમ (NH₄⁺) અને યુરિયા (CO(NH₂)₂) પણ નાઇટ્રોજનના સ્ત્રોત છે, પરંતુ નાઇટ્રેટ વધુ સ્થિર અને વનસ્પતિઓ માટે સરળતાથી ઉપલબ્ધ હોય છે. નાઇટ્રોજન ગેસ (N₂) વનસ્પતિઓ દ્વારા સીધો ઉપયોગમાં લેવાતો નથી, તેથી તે પ્રોટીન સંશ્લેષણને સીધી અસર કરતો નથી.", "ref": "Std 12 - Chapter 14: પોષણ અને ખનીજ પોષણ", "ch": ""}, {"q": "જ્યારે મૃદામાં ફોસ્ફરસની ઉણપ હોય છે, ત્યારે નીચેનામાંથી કયો અજૈવિક ઘટક વનસ્પતિઓમાં ATP અને DNA સંશ્લેષણને અસર કરશે, પરંતુ તે સીધો ઉર્જા સ્ત્રોત નથી?", "opts": ["ફોસ્ફેટ (PO₄³⁻)", "ગ્લુકોઝ (C₆H₁₂O₆)", "ઓક્સિજન (O₂)", "પાણી (H₂O)"], "ans": 0, "exp": "ફોસ્ફેટ (PO₄³⁻) ATP અને DNA જેવા અણુઓમાં ફોસ્ફરસનું મહત્વનું ઘટક છે. તે સીધો ઉર્જા સ્ત્રોત નથી, પરંતુ ઉર્જા સંગ્રહ અને અનુવંશિક માહિતીના સંગ્રહમાં મહત્વની ભૂમિકા ભજવે છે. ગ્લુકોઝ ઉર્જાનો સ્ત્રોત છે, ઓક્સિજન શ્વસનમાં ઉપયોગી છે, અને પાણી જીવન માટે આવશ્યક છે, પરંતુ તે ATP અથવા DNA સંશ્લેષણમાં સીધી ભૂમિકા ભજવતું નથી.", "ref": "Std 12 - Chapter 14: પોષણ અને ખનીજ પોષણ", "ch": ""}, {"q": "એક જળાશયમાં સિલિકા (SiO₂)ની સાંદ્રતા અચાનક વધી જાય છે. આ પરિવર્તનને કારણે નીચેનામાંથી કયા જૈવિક સમુદાય પર સૌથી વધુ અસર થશે?", "opts": ["ડાયટમ (Diatoms)", "મત્સ્ય (Fish)", "જલીય વનસ્પતિ (Aquatic Plants)", "બેક્ટેરિયા (Bacteria)"], "ans": 0, "exp": "ડાયટમ (Diatoms) તેમના કોષભિત્તિ માટે સિલિકાનો ઉપયોગ કરે છે. સિલિકાની સાંદ્રતામાં વધારો તેમના વૃદ્ધિ અને પ્રજનનને પ્રોત્સાહન આપી શકે છે. મત્સ્ય, જલીય વનસ્પતિ અને બેક્ટેરિયા સિલિકા પર આધારિત નથી, તેથી તેમના પર સીધી અસર થતી નથી.", "ref": "Std 12 - Chapter 13: પર્યાવરણ અને પર્યાવરણીય સમસ્યાઓ", "ch": ""}, {"q": "મૃદામાં પોટેશિયમ (K)ની ઉણપ હોય ત્યારે નીચેનામાંથી કયા જૈવિક ક્રિયા પર સૌથી વધુ અસર થશે, જ્યારે તે સીધો ઉત્સેચક નથી?", "opts": ["પ્રકાશસંશ્લેષણમાં સ્ટોમેટલ ખુલ્લા રાખવા", "શ્વસન ક્રિયા", "પ્રોટીન સંશ્લેષણ", "DNA પ્રતિકૃતિ"], "ans": 0, "exp": "પોટેશિયમ (K) સ્ટોમેટલ ખુલ્લા રાખવામાં મહત્વની ભૂમિકા ભજવે છે, જે પ્રકાશસંશ્લેષણ માટે આવશ્યક છે. તે સીધો ઉત્સેચક નથી, પરંતુ તે સેલ્યુલર ક્રિયાઓમાં આયન સંતુલન જાળવવામાં મદદ કરે છે. શ્વસન, પ્રોટીન સંશ્લેષણ અને DNA પ્રતિકૃતિ માટે પોટેશિયમની સીધી જરૂરિયાત નથી.", "ref": "Std 12 - Chapter 14: પોષણ અને ખનીજ પોષણ", "ch": ""}, {"q": "એક જળાશયમાં કેલ્શિયમ (Ca) અને મેગ્નેશિયમ (Mg)ની સાંદ્રતા અચાનક ઘટી જાય છે. આ પરિવર્તનને કારણે નીચેનામાંથી કયા જૈવિક ઘટક પર સૌથી વધુ અસર થશે, જ્યારે તે સીધો ઉત્સેચક નથી?", "opts": ["કોષભિત્તિની સ્થિરતા", "ઉત્સેચક ક્રિયાશીલતા", "DNA સંશ્લેષણ", "પ્રકાશસંશ્લેષણમાં ક્લોરોફિલ સંશ્લેષણ"], "ans": 3, "exp": "મેગ્નેશિયમ (Mg) ક્લોરોફિલનું કેન્દ્રીય અણુ છે, અને કેલ્શિયમ (Ca) કોષભિત્તિની સ્થિરતામાં મદદ કરે છે. જ્યારે આ બંનેની સાંદ્રતા ઘટે છે, ત્યારે પ્રકાશસંશ્લેષણમાં ક્લોરોફિલ સંશ્લેષણ પર સૌથી વધુ અસર થશે. ઉત્સેચક ક્રિયાશીલતા અને DNA સંશ્લેષણ પર સીધી અસર થતી નથી, જ્યારે કોષભિત્તિની સ્થિરતા પર કેલ્શિયમની ઉણપથી અસર થશે, પરંતુ તે પ્રકાશસંશ્લેષણ જેટલી મહત્વપૂર્ણ નથી.", "ref": "Std 12 - Chapter 14: પોષણ અને ખનીજ પોષણ", "ch": ""}, {"q": "મૃદામાં બોરોન (B)ની ઉણપ હોય ત્યારે વનસ્પતિઓમાં નીચેનામાંથી કયા જૈવિક ક્રિયાને સૌથી વધુ અસર થાય છે?", "opts": ["પ્રકાશસંશ્લેષણમાં કાર્બોદિતના સંશ્લેષણની ગતિ ઘટે છે", "કોષભિત્તિના સંશ્લેષણ અને કોષવિભાજન પર અસર થાય છે", "નાઇટ્રોજન સ્થિરીકરણની ક્રિયા મંદ પડે છે", "શ્વસન ક્રિયામાં ગ્લુકોઝના ઓક્સિડેશનની ગતિ વધે છે"], "ans": 1, "exp": "બોરોન (B) કોષભિત્તિના સંશ્લેષણ અને કોષવિભાજન માટે આવશ્યક છે, ખાસ કરીને કોષભિત્તિના પેક્ટિન પદાર્થોના નિર્માણમાં. તેની ઉણપે કોષભિત્તિ નબળી પડે છે અને કોષવિભાજન અવરોધાય છે. પ્રકાશસંશ્લેષણ (A) મુખ્યત્વે મેગ્નેશિયમ સાથે સંબંધિત છે, નાઇટ્રોજન સ્થિરીકરણ (C) મોટે અણુ નાઇટ્રોજનેસ સાથે સંબંધિત છે, અને શ્વસન (D) બોરોન સાથે સીધો સંબંધ ધરાવતું નથી.", "ref": "Std 12 - અજૈવિક ઘટકો: ખનીજ પોષક તત્ત્વો અને તેમની ભૂમિકા", "ch": ""}, {"q": "જળાશયમાં મેંગેનીઝ (Mn)ની સાંદ્રતા અચાનક ઘટી જાય છે. આ પરિવર્તનને કારણે નીચેનામાંથી કયા ક્રિયાને સૌથી વધુ અસર થશે?", "opts": ["પ્રકાશસંશ્લેષણની ફોટોસિસ્ટમ IIની ક્રિયાશીલતા ઘટશે", "નાઇટ્રેટ રિડક્ટેઝ ઉત્સેચકની ક્રિયા મંદ પડશે", "ક્લોરોફિલના સંશ્લેષણમાં વૃદ્ધિ થશે", "શ્વસન ક્રિયામાં એટીપીનું ઉત્પાદન વધશે"], "ans": 0, "exp": "મેંગેનીઝ (Mn) પ્રકાશસંશ્લેષણની ફોટોસિસ્ટમ IIમાં પાણીના ફોટોલાઇસિસ માટે આવશ્યક છે. તેની ઉણપે ફોટોસિસ્ટમ IIની ક્રિયાશીલતા ઘટે છે, જે પ્રકાશસંશ્લેષણને અસર કરે છે. નાઇટ્રેટ રિડક્ટેઝ (B) મોલિબ્ડેનમ સાથે સંબંધિત છે, ક્લોરોફિલ સંશ્લેષણ (C) મેગ્નેશિયમ સાથે સંબંધિત છે, અને શ્વસન (D) મેંગેનીઝ સાથે સીધો સંબંધ ધરાવતું નથી.", "ref": "Std 12 - અજૈવિક ઘટકો: સૂક્ષ્મ પોષક તત્ત્વો અને તેમની જૈવિક ભૂમિકા", "ch": ""}, {"q": "મૃદામાં કોપર (Cu)ની ઉણપ હોય ત્યારે વનસ્પતિઓમાં નીચેનામાંથી કયા ઉત્સેચકની ક્રિયાશીલતા સૌથી વધુ ઘટશે?", "opts": ["કેટાલેઝ", "સાયટોક્રોમ ઓક્સિડેઝ", "એમાઇલેઝ", "રૂબિસ્કો"], "ans": 1, "exp": "કોપર (Cu) સાયટોક્રોમ ઓક્સિડેઝ ઉત્સેચક માટે આવશ્યક છે, જે શ્વસન શૃંખલામાં ઇલેક્ટ્રોન વહન માટે જરૂરી છે. કેટાલેઝ (A) લોખંડ (Fe) સાથે સંબંધિત છે, એમાઇલેઝ (C) કાર્બોદિતના પાચન માટે છે, અને રૂબિસ્કો (D) પ્રકાશસંશ્લેષણ સાથે સંબંધિત છે.", "ref": "Std 12 - અજૈવિક ઘટકો: સૂક્ષ્મ પોષક તત્ત્વો અને ઉત્સેચક ક્રિયાશીલતા", "ch": ""}, {"q": "એક જળાશયમાં સોડિયમ (Na) અને પોટેશિયમ (K)ની સાંદ્રતા વચ્ચેનું પ્રમાણ અચાનક બદલાઈ જાય છે. આ પરિવર્તનને કારણે નીચેનામાંથી કયા જૈવિક ક્રિયાને સૌથી વધુ અસર થશે?", "opts": ["કોષીય શ્વસનની ગતિ ઘટશે", "કોષમાં ઓસ્મોસિસની ક્રિયા અસંતુલિત થશે", "પ્રકાશસંશ્લેષણની ક્રિયામાં ક્લોરોફિલનું સંશ્લેષણ ઘટશે", "પ્રોટીન સંશ્લેષણની ગતિ વધશે"], "ans": 1, "exp": "સોડિયમ (Na) અને પોટેશિયમ (K) કોષીય દ્રવ્યના ઓસ્મોટિક સંતુલન માટે જરૂરી છે. તેમના પ્રમાણમાં ફેરફાર થવાથી કોષમાં ઓસ્મોસિસની ક્રિયા અસંતુલિત થાય છે. કોષીય શ્વસન (A) મુખ્યત્વે મિટોકોન્ડ્રિયા સાથે સંબંધિત છે, ક્લોરોફિલ સંશ્લેષણ (C) મેગ્નેશિયમ સાથે સંબંધિત છે, અને પ્રોટીન સંશ્લેષણ (D) નાઇટ્રોજન સાથે સંબંધિત છે.", "ref": "Std 12 - અજૈવિક ઘટકો: ખનીજ આયનો અને કોષીય ક્રિયાઓ", "ch": ""}, {"q": "મૃદામાં જસત (Zn)ની ઉણપ હોય ત્યારે વનસ્પતિઓમાં નીચેનામાંથી કયા હોર્મોનના સંશ્લેષણ પર સૌથી વધુ અસર થાય છે?", "opts": ["ઓક્સિન", "જિબરેલિન", "સાયટોકાઇનિન", "એબ્સિસિક એસિડ"], "ans": 0, "exp": "જસત (Zn) ઓક્સિન હોર્મોનના સંશ્લેષણ માટે આવશ્યક છે, જે વનસ્પતિ વૃદ્ધિ અને વિકાસમાં મહત્વની ભૂમિકા ભજવે છે. જિબરેલિન (B), સાયટોકાઇનિન (C), અને એબ્સિસિક એસિડ (D)ના સંશ્લેષણ માટે જસત આવશ્યક નથી.", "ref": "Std 12 - અજૈવિક ઘટકો: સૂક્ષ્મ પોષક તત્ત્વો અને વનસ્પતિ હોર્મોન", "ch": ""}, {"q": "એક જળાશયમાં મેંગેનીઝ (Mn²⁺) અને ક્લોરાઇડ (Cl⁻)ની સાંદ્રતા એકસાથે વધી જાય છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયો જૈવિક પ્રક્રિયા સૌથી વધુ પ્રભાવિત થશે?", "opts": ["પ્રકાશસંશ્લેષણમાં પાણીના અણુના વિઘટન (ફોટોલાઇસિસ)ની ક્રિયા", "શ્વસનમાં ગ્લૂકોઝનું ઓક્સિડેશન", "નાઇટ્રોજન સ્થિરીકરણ", "પ્રોટીન સંશ્લેષણ"], "ans": 0, "exp": "મેંગેનીઝ (Mn²⁺) પ્રકાશસંશ્લેષણના ફોટોલાઇસિસ તબક્કામાં પાણીના અણુને વિઘટિત કરવા માટે જરૂરી છે (OEC - Oxygen Evolving Complexમાં ભાગ ભજવે છે). ક્લોરાઇડ (Cl⁻) પણ ફોટોલાઇસિસમાં સહાયક ભૂમિકા ભજવે છે. આથી, આ બંનેની સાંદ્રતામાં વધારો થવાથી પ્રકાશસંશ્લેષણની ફોટોલાઇસિસ ક્રિયા સૌથી વધુ પ્રભાવિત થશે. શ્વસન, નાઇટ્રોજન સ્થિરીકરણ અને પ્રોટીન સંશ્લેષણ પર આ આયનોની સીધી અસર થતી નથી.", "ref": "Std 11 - અધ્યાય 13: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "મૃદામાં બોરોન (B) અને મોલિબ્ડેનમ (Mo)ની ઉણપ એકસાથે જોવા મળે છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયા જૈવિક અણુના સંશ્લેષણ પર સૌથી વધુ અસર પડશે?", "opts": ["સેલ્યુલોઝ", "DNA", "ક્લોરોફિલ", "એમિનો એસિડ"], "ans": 1, "exp": "બોરોન (B) DNA અને RNAના સંશ્લેષણમાં મહત્વની ભૂમિકા ભજવે છે, જ્યારે મોલિબ્ડેનમ (Mo) નાઇટ્રોજન સ્થિરીકરણમાં જરૂરી છે. DNAના સંશ્લેષણ માટે બોરોનની ઉણપ સીધી અસર કરે છે. સેલ્યુલોઝ, ક્લોરોફિલ અને એમિનો એસિડના સંશ્લેષણ પર આ બંને તત્વોની સીધી અસર થતી નથી.", "ref": "Std 11 - અધ્યાય 12: વનસ્પતિઓમાં ખનીજ પોષણ", "ch": ""}, {"q": "એક જળાશયમાં સિલિકા (SiO₂) અને કેલ્શિયમ (Ca²⁺)ની સાંદ્રતા અચાનક ઘટી જાય છે. આ પરિવર્તનને કારણે નીચેનામાંથી કયા જૈવિક સમૂહ પર સૌથી વધુ નકારાત્મક અસર પડશે?", "opts": ["ડાયટમ (Diatoms)", "શેવાળ (Algae)", "મત્સ્ય (Fish)", "બેક્ટેરિયા (Bacteria)"], "ans": 0, "exp": "ડાયટમ (Diatoms) તેમના કવચ (cell wall)ના નિર્માણ માટે સિલિકાનો ઉપયોગ કરે છે. કેલ્શિયમ પણ તેમના કોષીય કવચમાં ભાગ ભજવે છે. આથી, સિલિકા અને કેલ્શિયમની ઉણપથી ડાયટમ પર સૌથી વધુ નકારાત્મક અસર પડશે. શેવાળ, મત્સ્ય અને બેક્ટેરિયા પર આ તત્વોની સીધી અસર થતી નથી.", "ref": "Std 12 - અધ્યાય 13: જળીય પર્યાવરણ", "ch": ""}, {"q": "મૃદામાં કોપર (Cu) અને જસત (Zn)ની ઉણપ હોય ત્યારે નીચેનામાંથી કયા ઉત્સેચકની ક્રિયાશીલતામાં સૌથી વધુ ઘટાડો થશે?", "opts": ["કેટલેઝ (Catalase)", "સુપરઓક્સાઇડ ડિસ્મ્યુટેઝ (SOD)", "રુબિસ્કો (RuBisCO)", "એમાઇલેઝ (Amylase)"], "ans": 1, "exp": "કોપર (Cu) અને જસત (Zn) બંને સુપરઓક્સાઇડ ડિસ્મ્યુટેઝ (SOD) ઉત્સેચકની ક્રિયાશીલતામાં મહત્વની ભૂમિકા ભજવે છે. SOD ઓક્સિડેટિવ તણાવ સામે રક્ષણ આપે છે. કેટલેઝ, રુબિસ્કો અને એમાઇલેઝ માટે આ તત્વો જરૂરી નથી.", "ref": "Std 11 - અધ્યાય 10: જૈવિક અણુઓ અને ઉત્સેચકો", "ch": ""}, {"q": "એક જળાશયમાં કાર્બન ડાયોક્સાઇડ (CO₂) અને ઓક્સિજન (O₂)ની સાંદ્રતા વચ્ચેનું પ્રમાણ અચાનક 1:2 થી 2:1 સુધી બદલાઈ જાય છે. આ પરિવર્તનને કારણે નીચેનામાંથી કયા જૈવિક પ્રક્રિયાને સૌથી વધુ પ્રોત્સાહન મળશે?", "opts": ["પ્રકાશસંશ્લેષણ", "શ્વસન", "નાઇટ્રિફિકેશન", "ડીનાઇટ્રિફિકેશન"], "ans": 1, "exp": "કાર્બન ડાયોક્સાઇડ (CO₂) અને ઓક્સિજન (O₂)ના પ્રમાણમાં વધારો થવાથી શ્વસન ક્રિયાને પ્રોત્સાહન મળે છે, કારણ કે શ્વસન માટે ઓક્સિજન જરૂરી છે અને CO₂ તેનું ઉપ-ઉત્પાદન છે. પ્રકાશસંશ્લેષણ માટે CO₂ જરૂરી છે પરંતુ O₂ની વધુ સાંદ્રતા ફોટોરેસ્પિરેશનને પ્રોત્સાહન આપે છે, જે પ્રકાશસંશ્લેષણને ઘટાડે છે. નાઇટ્રિફિકેશન અને ડીનાઇટ્રિફિકેશન પર આ પ્રમાણની સીધી અસર થતી નથી.", "ref": "Std 11 - અધ્યાય 14: શ્વસન અને ઉર્જા ઉત્પાદન", "ch": ""}, {"q": "એક જળાશયમાં અચાનક એમોનિયા (NH₃)ની સાંદ્રતા વધી જાય છે. આ પરિવર્તનને કારણે નીચેનામાંથી કયો અજૈવિક ઘટક સીધી રીતે પ્રભાવિત થશે નહીં, પરંતુ પરોક્ષ રીતે જૈવિક ક્રિયાઓ પર અસર કરશે?", "opts": ["પાણીનું pH મૂલ્ય", "ઓક્સિજનની દ્રાવ્યતા", "નાઇટ્રોજનના સંયોજનોનું રૂપાંતરણ", "કાર્બન ડાયોક્સાઇડની સાંદ્રતા"], "ans": 3, "exp": "એમોનિયા (NH₃)ની સાંદ્રતા વધવાથી પાણીનું pH મૂલ્ય વધે છે (આલ્કલાઇન બને છે), જે ઓક્સિજનની દ્રાવ્યતા ઘટાડે છે અને નાઇટ્રોજનના સંયોજનોનું રૂપાંતરણ (નાઇટ્રિફિકેશન) પ્રભાવિત થાય છે. પરંતુ કાર્બન ડાયોક્સાઇડની સાંદ્રતા પર સીધી અસર થતી નથી, કારણ કે CO₂નું સ્તર મુખ્યત્વે શ્વસન અને પ્રકાશસંશ્લેષણ પર આધારિત છે. તેથી વિકલ્પ D સાચો છે.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "નીચેનામાંથી કયો અજૈવિક ઘટક વનસ્પતિઓમાં કોષદીવાલના નિર્માણમાં સહભાગી નથી, પરંતુ તેની ઉણપથી કોષદીવાલની મજબૂતાઈ પર અસર પડે છે?", "opts": ["કેલ્શિયમ (Ca²⁺)", "બોરોન (B)", "સિલિકા (SiO₂)", "મેગ્નેશિયમ (Mg²⁺)"], "ans": 3, "exp": "કેલ્શિયમ કોષદીવાલના પેક્ટેટ સંયોજનોના નિર્માણમાં મહત્વનો ભાગ ભજવે છે, બોરોન કાર્બોહાઇડ્રેટના પરિવહનમાં મદદ કરે છે અને સિલિકા કેટલીક વનસ્પતિઓમાં કોષદીવાલને મજબૂત બનાવે છે. મેગ્નેશિયમ ક્લોરોફિલનો મુખ્ય ઘટક છે અને પ્રકાશસંશ્લેષણમાં સહભાગી છે, પરંતુ તે કોષદીવાલના નિર્માણમાં સીધો ભાગ લેતો નથી. તેથી વિકલ્પ D સાચો છે.", "ref": "Std 11 - પ્રકરણ 12: ખનીજ પોષણ", "ch": ""}, {"q": "એક જળાશયમાં ફ્લોરાઇડ (F⁻)ની સાંદ્રતા અચાનક વધી જાય છે. આ પરિવર્તનને કારણે નીચેનામાંથી કયા જૈવિક પ્રક્રિયા પર સૌથી વધુ પ્રતિકૂળ અસર પડશે?", "opts": ["પ્રકાશસંશ્લેષણ", "ઉત્સેચકીય પ્રક્રિયાઓ", "DNA પ્રતિકૃતિ", "કોષપટલની પારગમ્યતા"], "ans": 1, "exp": "ફ્લોરાઇડ ઉત્સેચકોની ક્રિયાશીલતા પર પ્રતિકૂળ અસર કરે છે, ખાસ કરીને એન્ઝાઇમ્સ જેમ કે એનોલેઝ જે ગ્લાયકોલિસિસમાં ભાગ લે છે. પ્રકાશસંશ્લેષણ, DNA પ્રતિકૃતિ અને કોષપટલની પારગમ્યતા પર ફ્લોરાઇડની સીધી અસર ઓછી જોવા મળે છે. તેથી વિકલ્પ B સાચો છે.", "ref": "Std 12 - પ્રકરણ 9: જૈવિક અણુઓ", "ch": ""}, {"q": "નીચેનામાંથી કયો અજૈવિક ઘટક વનસ્પતિઓમાં પ્રોટીન સંશ્લેષણ માટે સીધો જરૂરી નથી, પરંતુ તેની ઉણપથી પ્રોટીન સંશ્લેષણ પરોક્ષ રીતે અવરોધાય છે?", "opts": ["નાઇટ્રોજન (N)", "સલ્ફર (S)", "પોટેશિયમ (K)", "ફોસ્ફરસ (P)"], "ans": 2, "exp": "નાઇટ્રોજન અને સલ્ફર પ્રોટીનના મુખ્ય ઘટકો છે, જ્યારે ફોસ્ફરસ ન્યુક્લિક એસિડના નિર્માણમાં જરૂરી છે. પોટેશિયમ પ્રોટીન સંશ્લેષણ માટે સીધો જરૂરી નથી, પરંતુ તે ઉત્સેચકોની ક્રિયાશીલતા અને કોષીય પરિવહનમાં મહત્વનો ભાગ ભજવે છે, જેના અભાવે પ્રોટીન સંશ્લેષણ પરોક્ષ રીતે અવરોધાય છે. તેથી વિકલ્પ C સાચો છે.", "ref": "Std 11 - પ્રકરણ 12: ખનીજ પોષણ", "ch": ""}, {"q": "એક જળાશયમાં અચાનક એલ્યુમિનિયમ (Al³⁺)ની સાંદ્રતા વધી જાય છે. આ પરિવર્તનને કારણે નીચેનામાંથી કયા અજૈવિક ઘટકની જૈવિક ઉપલબ્ધતા સૌથી વધુ ઘટશે?", "opts": ["ફોસ્ફરસ (P)", "નાઇટ્રોજન (N)", "કેલ્શિયમ (Ca²⁺)", "મેગ્નેશિયમ (Mg²⁺)"], "ans": 0, "exp": "એલ્યુમિનિયમ (Al³⁺) ફોસ્ફરસ સાથે અદ્રાવ્ય સંયોજનો બનાવે છે, જેનાથી ફોસ્ફરસની જૈવિક ઉપલબ્ધતા ઘટે છે. નાઇટ્રોજન, કેલ્શિયમ અને મેગ્નેશિયમ પર એલ્યુમિનિયમની સીધી અસર ઓછી જોવા મળે છે. તેથી વિકલ્પ A સાચો છે.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "એક જળાશયમાં અચાનક સલ્ફેટ (SO₄²⁻) આયનની સાંદ્રતા વધી જાય છે. આ પરિવર્તનને કારણે નીચેનામાંથી કયા જૈવિક પ્રક્રિયા પર સૌથી વધુ પ્રતિકૂળ અસર પડે છે?", "opts": ["વનસ્પતિઓમાં ક્લોરોફિલનું સંશ્લેષણ", "પ્રાણીઓમાં હિમોગ્લોબિનનું નિર્માણ", "વનસ્પતિઓમાં એમિનો એસિડનું સંશ્લેષણ", "બેક્ટેરિયામાં નાઇટ્રોજન સ્થાપન"], "ans": 3, "exp": "સલ્ફેટ (SO₄²⁻) આયન એ સલ્ફરનો મુખ્ય સ્રોત છે, જે એમિનો એસિડ (સિસ્ટીન અને મેથિઓનાઇન)ના સંશ્લેષણ માટે જરૂરી છે. જ્યારે સલ્ફેટની સાંદ્રતા વધે છે, ત્યારે તેની વધુ પડતી માત્રા ઝેરી અસર કરી શકે છે, જેના કારણે બેક્ટેરિયામાં નાઇટ્રોજન સ્થાપનની ક્રિયા પર પ્રતિકૂળ અસર પડે છે. ક્લોરોફિલનું સંશ્લેષણ મેગ્નેશિયમ પર આધારિત છે, હિમોગ્લોબિનનું નિર્માણ લોખંડ પર આધારિત છે, અને એમિનો એસિડનું સંશ્લેષણ સલ્ફર સિવાય અન્ય તત્વો પર પણ આધારિત હોઈ શકે છે.", "ref": "Std 11 - પ્રકરણ 12: ખનીજ પોષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો અજૈવિક ઘટક વનસ્પતિઓમાં DNA પ્રતિકૃતિ માટે સીધો જરૂરી નથી, પરંતુ તેની ઉણપથી કોષવિભાજનની ક્રિયા મંદ પડે છે?", "opts": ["ફોસ્ફરસ (P)", "કેલ્શિયમ (Ca)", "નાઇટ્રોજન (N)", "મેગ્નેશિયમ (Mg)"], "ans": 1, "exp": "ફોસ્ફરસ DNAના નિર્માણ માટે જરૂરી છે, નાઇટ્રોજન ન્યુક્લિક એસિડના બેઝ માટે જરૂરી છે, અને મેગ્નેશિયમ ક્લોરોફિલ અને ઉત્સેચકો માટે જરૂરી છે. કેલ્શિયમ DNA પ્રતિકૃતિ માટે સીધો જરૂરી નથી, પરંતુ તે કોષદીવાલના નિર્માણ અને કોષવિભાજનમાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે. તેની ઉણપથી કોષવિભાજન મંદ પડે છે.", "ref": "Std 11 - પ્રકરણ 12: ખનીજ પોષણ", "ch": ""}, {"q": "એક જળાશયમાં અચાનક કોબાલ્ટ (Co)ની સાંદ્રતા વધી જાય છે. આ પરિવર્તનને કારણે નીચેનામાંથી કયા સૂક્ષ્મજીવોની પ્રવૃત્તિ પર સૌથી વધુ અસર પડશે?", "opts": ["નાઇટ્રીફાઇંગ બેક્ટેરિયા", "ડિનાઇટ્રીફાઇંગ બેક્ટેરિયા", "નાઇટ્રોજન સ્થાપક બેક્ટેરિયા", "સલ્ફર ઓક્સિડાઇઝિંગ બેક્ટેરિયા"], "ans": 2, "exp": "કોબાલ્ટ એ વિટામિન B₁₂નો મુખ્ય ઘટક છે, જે નાઇટ્રોજન સ્થાપક બેક્ટેરિયા (જેમ કે રાઇઝોબિયમ) માટે જરૂરી છે. કોબાલ્ટની વધુ પડતી માત્રા ઝેરી અસર કરી શકે છે, જે આ બેક્ટેરિયાની પ્રવૃત્તિને અવરોધે છે. નાઇટ્રીફાઇંગ અને ડિનાઇટ્રીફાઇંગ બેક્ટેરિયા પર કોબાલ્ટની સીધી અસર ઓછી હોય છે, અને સલ્ફર ઓક્સિડાઇઝિંગ બેક્ટેરિયા પર તેની કોઈ ખાસ અસર થતી નથી.", "ref": "Std 11 - પ્રકરણ 12: ખનીજ પોષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો અજૈવિક ઘટક વનસ્પતિઓમાં શ્વસનની ક્રિયામાં સહભાગી નથી, પરંતુ તેની ઉણપથી મૂળના વિકાસ પર પ્રતિકૂળ અસર પડે છે?", "opts": ["પોટેશિયમ (K)", "બોરોન (B)", "ફોસ્ફરસ (P)", "કેલ્શિયમ (Ca)"], "ans": 1, "exp": "પોટેશિયમ શ્વસનમાં ઉત્સેચકોની ક્રિયાશીલતા માટે જરૂરી છે, ફોસ્ફરસ ATPના નિર્માણ માટે જરૂરી છે, અને કેલ્શિયમ કોષદીવાલના નિર્માણ માટે જરૂરી છે. બોરોન શ્વસનમાં સહભાગી નથી, પરંતુ તેની ઉણપથી મૂળના વિકાસ પર પ્રતિકૂળ અસર પડે છે કારણ કે તે કોષદીવાલના નિર્માણ અને કાર્બોહાઇડ્રેટના પરિવહનમાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે.", "ref": "Std 11 - પ્રકરણ 12: ખનીજ પોષણ", "ch": ""}, {"q": "એક જળાશયમાં અચાનક મોલિબ્ડેનમ (Mo)ની સાંદ્રતા ઘટી જાય છે. આ પરિવર્તનને કારણે નીચેનામાંથી કયા જૈવિક અણુના સંશ્લેષણ પર સૌથી વધુ અસર પડશે?", "opts": ["ક્લોરોફિલ", "નાઇટ્રેટ રિડક્ટેઝ ઉત્સેચક", "સેલ્યુલોઝ", "હિમોગ્લોબિન"], "ans": 1, "exp": "મોલિબ્ડેનમ એ નાઇટ્રેટ રિડક્ટેઝ ઉત્સેચકનો મુખ્ય ઘટક છે, જે નાઇટ્રેટને નાઇટ્રાઇટમાં રૂપાંતરિત કરે છે. આ ઉત્સેચક વનસ્પતિઓમાં નાઇટ્રોજન ચયાપચય માટે જરૂરી છે. ક્લોરોફિલ મેગ્નેશિયમ પર આધારિત છે, સેલ્યુલોઝ કાર્બોહાઇડ્રેટ છે, અને હિમોગ્લોબિન લોખંડ પર આધારિત છે, તેથી આ તત્વો પર મોલિબ્ડેનમની અસર ઓછી હોય છે.", "ref": "Std 11 - પ્રકરણ 12: ખનીજ પોષણ", "ch": ""}, {"q": "મૃદામાં કોબાલ્ટ (Co)ની ઉણપ હોય ત્યારે નીચેનામાંથી કયા જીવાણુના જીવનચક્ર પર સૌથી વધુ અસર થાય છે, જેના કારણે વનસ્પતિઓમાં નાઇટ્રોજન સ્થિરીકરણ પ્રક્રિયા ખોરવાઈ જાય છે?", "opts": ["રાઇઝોબિયમ (Rhizobium)", "એઝોટોબેક્ટર (Azotobacter)", "સાયનોબેક્ટરિયા (Cyanobacteria)", "લેક્ટોબેસિલસ (Lactobacillus)"], "ans": 0, "exp": "કોબાલ્ટ (Co) રાઇઝોબિયમ જીવાણુઓમાં નાઇટ્રોજનેઝ ઉત્સેચકના સક્રિય સ્થાન માટે જરૂરી છે, જે નાઇટ્રોજન સ્થિરીકરણ માટે આવશ્યક છે. એઝોટોબેક્ટર અને સાયનોબેક્ટરિયા પણ નાઇટ્રોજન સ્થિરીકરણ કરે છે, પરંતુ રાઇઝોબિયમ પર કોબાલ્ટની અસર સૌથી નોંધપાત્ર હોય છે. લેક્ટોબેસિલસ નાઇટ્રોજન સ્થિરીકરણ સાથે સંબંધિત નથી, તેથી તે અયોગ્ય વિકલ્પ છે.", "ref": "Std 12 - Chapter 14: પોષણ અને વનસ્પતિ-પોષણ (Nutrition and Plant Nutrition)", "ch": ""}, {"q": "જળાશયમાં અચાનક એલ્યુમિનિયમ (Al³⁺)ની સાંદ્રતા વધી જાય છે. આ પરિવર્તનને કારણે નીચેનામાંથી કયા જૈવિક ક્રિયા પર સૌથી વધુ નકારાત્મક અસર થશે?", "opts": ["ફોસ્ફેટ ઉત્સેચકોની ક્રિયાશીલતા", "પ્રકાશસંશ્લેષણની દર", "કોષીય શ્વસનની દર", "પ્રોટીન સંશ્લેષણની દર"], "ans": 0, "exp": "એલ્યુમિનિયમ (Al³⁺) ફોસ્ફેટ ઉત્સેચકોની ક્રિયાશીલતાને અવરોધે છે, જેના કારણે ફોસ્ફરસના ઉપયોગમાં અડચણ ઉત્પન્ન થાય છે. પ્રકાશસંશ્લેષણ, કોષીય શ્વસન અને પ્રોટીન સંશ્લેષણ પર એલ્યુમિનિયમની સીધી અસર ઓછી હોય છે, પરંતુ ફોસ્ફેટ ઉત્સેચકો પર તેની અસર સૌથી નોંધપાત્ર હોય છે.", "ref": "Std 12 - Chapter 14: પોષણ અને વનસ્પતિ-પોષણ (Nutrition and Plant Nutrition)", "ch": ""}, {"q": "મૃદામાં મોલિબ્ડેનમ (Mo) અને કોપર (Cu)ની ઉણપ એકસાથે જોવા મળે છે. આ સ્થિતિમાં નીચેનામાંથી કયા ઉત્સેચકના સંશ્લેષણ પર સૌથી વધુ અસર થશે?", "opts": ["નાઇટ્રેટ રિડક્ટેઝ", "સુપરઑક્સાઇડ ડિસ્મ્યુટેઝ", "કેટલેઝ", "એમાઇલેઝ"], "ans": 0, "exp": "નાઇટ્રેટ રિડક્ટેઝ ઉત્સેચક માટે મોલિબ્ડેનમ (Mo) આવશ્યક છે, જ્યારે સુપરઑક્સાઇડ ડિસ્મ્યુટેઝ માટે કોપર (Cu) અને જસત (Zn) જરૂરી છે. કેટલેઝ અને એમાઇલેઝ માટે આ ધાતુઓ આવશ્યક નથી. મોલિબ્ડેનમ અને કોપરની ઉણપથી નાઇટ્રેટ રિડક્ટેઝ પર સૌથી વધુ અસર થશે.", "ref": "Std 12 - Chapter 9: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "મૃદામાં બોરોન (B) અને કેલ્શિયમ (Ca)ની ઉણપ એકસાથે જોવા મળે છે. આ સ્થિતિમાં નીચેનામાંથી કયા પેશી અથવા અંગ પર સૌથી વધુ અસર થશે?", "opts": ["કોષદીવાલનું નિર્માણ", "ફૂલના પુષ્પપત્રોનું વિકાસ", "મૂળના વૃદ્ધિ બિંદુઓ", "પર્ણહરિતના સંશ્લેષણ"], "ans": 2, "exp": "બોરોન (B) અને કેલ્શિયમ (Ca) બંને મૂળના વૃદ્ધિ બિંદુઓના વિકાસ અને કોષદીવાલના નિર્માણ માટે જરૂરી છે. પરંતુ મૂળના વૃદ્ધિ બિંદુઓ પર તેમની ઉણપની અસર સૌથી નોંધપાત્ર હોય છે, કારણ કે બોરોન કોષવિભાજન અને કેલ્શિયમ કોષદીવાલની સ્થિરતા માટે આવશ્યક છે. ફૂલના પુષ્પપત્રો અને પર્ણહરિતના સંશ્લેષણ પર તેમની અસર ઓછી હોય છે.", "ref": "Std 12 - Chapter 14: પોષણ અને વનસ્પતિ-પોષણ (Nutrition and Plant Nutrition)", "ch": ""}, {"q": "એક જળાશયમાં અચાનક નાઇટ્રેટ (NO₃⁻) અને ફોસ્ફેટ (PO₄³⁻)ની સાંદ્રતા એકસાથે ઘટી જાય છે. આ પરિવર્તનને કારણે નીચેનામાંથી કયો જૈવિક પ્રક્રિયાને સૌથી વધુ અસર થશે?", "opts": ["પ્રકાશસંશ્લેષણની દરમાં ઘટાડો થશે કારણ કે ક્લોરોફિલ સંશ્લેષણ માટે મેગ્નેશિયમની ઉણપ થશે", "જલીય વનસ્પતિઓમાં પ્રોટીન સંશ્લેષણમાં ઘટાડો થશે કારણ કે નાઇટ્રોજન અને ફોસ્ફરસની ઉણપ થશે", "ઓક્સિજનના સ્તરમાં વધારો થશે કારણ કે શેવાળના વિકાસમાં ઘટાડો થશે", "કર્બન ચક્ર પર કોઈ અસર થશે નહીં કારણ કે કાર્બન ડાયોક્સાઇડની સાંદ્રતા સ્થિર રહેશે"], "ans": 1, "exp": "નાઇટ્રેટ (NO₃⁻) અને ફોસ્ફેટ (PO₄³⁻) એ વનસ્પતિઓ માટે આવશ્યક પોષક તત્ત્વો છે. નાઇટ્રોજન પ્રોટીન, ન્યુક્લિક એસિડ અને ક્લોરોફિલના સંશ્લેષણ માટે જરૂરી છે, જ્યારે ફોસ્ફરસ ATP, DNA, RNA અને ફોસ્ફોલિપિડના સંશ્લેષણ માટે જરૂરી છે. આમ, તેમની ઉણપથી પ્રોટીન સંશ્લેષણ પર સૌથી વધુ અસર થશે. વિકલ્પ A ખોટો છે કારણ કે મેગ્નેશિયમની ઉણપનો ઉલ્લેખ નથી. વિકલ્પ C ખોટો છે કારણ કે શેવાળના વિકાસમાં ઘટાડો થવાને કારણે ઓક્સિજનનું સ્તર ઘટશે, નહીં કે વધશે. વિકલ્પ D ખોટો છે કારણ કે પોષક તત્ત્વોની ઉણપ કર્બન ચક્રને પરોક્ષ રીતે અસર કરશે.", "ref": "Std 12 - Chapter 14: પર્યાવરણ અને તેના ઘટકો", "ch": ""}, {"q": "મૃદામાં મોલિબ્ડેનમ (Mo)ની ઉણપ હોય ત્યારે નીચેનામાંથી કયા ઉત્સેચકની ક્રિયાશીલતા સૌથી વધુ અસરગ્રસ્ત થાય છે, જ્યારે નાઇટ્રોજન ચક્રમાં તેની ભૂમિકા ધ્યાનમાં લેવામાં આવે?", "opts": ["નાઇટ્રેઝ ઉત્સેચક", "નાઇટ્રાઇટ રિડક્ટેઝ ઉત્સેચક", "નાઇટ્રેટ રિડક્ટેઝ ઉત્સેચક", "યુરિયેઝ ઉત્સેચક"], "ans": 2, "exp": "મોલિબ્ડેનમ (Mo) નાઇટ્રેટ રિડક્ટેઝ ઉત્સેચકના સક્રિય સ્થાનનો ભાગ છે, જે નાઇટ્રેટ (NO3−)ને નાઇટ્રાઇટ (NO2−)માં રૂપાંતરિત કરે છે. નાઇટ્રેઝ ઉત્સેચક (A) એમોનિયાને નાઇટ્રાઇટમાં રૂપાંતરિત કરે છે, પરંતુ તે મોલિબ્ડેનમ પર આધારિત નથી. નાઇટ્રાઇટ રિડક્ટેઝ (B) નાઇટ્રાઇટને એમોનિયામાં રૂપાંતરિત કરે છે, પરંતુ તે મોલિબ્ડેનમ પર આધારિત નથી. યુરિયેઝ (D) યુરિયાને એમોનિયા અને કાર્બન ડાયોક્સાઇડમાં તોડે છે, પરંતુ તે મોલિબ્ડેનમ પર આધારિત નથી.", "ref": "Std 12 - Chapter 14: પોષણ અને ખનીજ પોષણ (Mineral Nutrition)", "ch": ""}, {"q": "એક જળાશયમાં અચાનક ફ્લોરાઇડ (F⁻)ની સાંદ્રતા વધી જાય છે. આ પરિવર્તનને કારણે નીચેનામાંથી કયા જૈવિક પ્રક્રિયા પર સૌથી વધુ પ્રતિકૂળ અસર પડશે?", "opts": ["ક્લોરોફિલના સંશ્લેષણ પર", "કોષદીવાલના સેલ્યુલોઝ નિર્માણ પર", "ઉત્સેચકોની ક્રિયાશીલતા પર", "કેલ્શિયમના શોષણ અને ઉપયોગ પર"], "ans": 3, "exp": "ફ્લોરાઇડ (F⁻)ની વધેલી સાંદ્રતા કેલ્શિયમ (Ca²⁺) સાથે અદ્રાવ્ય કેલ્શિયમ ફ્લોરાઇડ (CaF₂) બનાવે છે, જે કેલ્શિયમના શોષણ અને ઉપયોગને અવરોધે છે. કેલ્શિયમ કોષદીવાલના નિર્માણ, સંકેત પ્રસારણ અને ઉત્સેચકોની ક્રિયાશીલતા માટે જરૂરી છે. બાકીના વિકલ્પોમાં ફ્લોરાઇડની સીધી અસર ઓછી છે: ક્લોરોફિલનું સંશ્લેષણ મેગ્નેશિયમ પર આધારિત છે, સેલ્યુલોઝનું નિર્માણ કાર્બોહાઇડ્રેટ ચયાપચય પર આધારિત છે, અને ઉત્સેચકોની ક્રિયાશીલતા મુખ્યત્વે સહકારકો (co-factors) પર આધારિત છે.", "ref": "Std 11 - પ્રકરણ 12: ખનીજ પોષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો અજૈવિક ઘટક વનસ્પતિઓમાં ક્લોરોફિલના સંશ્લેષણ માટે સીધો જરૂરી નથી, પરંતુ તેની ઉણપથી ક્લોરોફિલનું વિઘટન થાય છે અને પર્ણો પીળા પડી જાય છે?", "opts": ["મેગ્નેશિયમ (Mg²⁺)", "લોખંડ (Fe²⁺)", "નાઇટ્રોજન (N)", "મેંગેનીઝ (Mn²⁺)"], "ans": 3, "exp": "મેંગેનીઝ (Mn²⁺) ક્લોરોફિલના સંશ્લેષણમાં સીધી રીતે ભાગ લેતું નથી, પરંતુ તેની ઉણપથી ક્લોરોફિલનું વિઘટન થાય છે અને પર્ણો પીળા પડી જાય છે (ક્લોરોસિસ). મેગ્નેશિયમ ક્લોરોફિલનો મુખ્ય ઘટક છે, લોખંડ હીમ સંશ્લેષણ માટે જરૂરી છે, અને નાઇટ્રોજન એમિનો એસિડ અને પ્રોટીનના સંશ્લેષણ માટે જરૂરી છે.", "ref": "Std 11 - પ્રકરણ 12: ખનીજ પોષણ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
