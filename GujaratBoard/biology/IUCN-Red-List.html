<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IUCN Red List</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>IUCN Red List</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">IUCN Red List</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "IUCN રેડ લિસ્ટમાં 'વલ્નરેબલ (Vulnerable)' શ્રેણીમાં મૂકવામાં આવેલ પ્રાણીની વસતીના કયા માપદંડને આધારે નક્કી કરવામાં આવે છે?", "opts": ["વસતી ૫૦%થી વધુ ઘટી ગઈ હોય અને તે ૧૦ વર્ષમાં અથવા ૩ પેઢીમાં થયું હોય", "વસતી ૨૦%થી ઓછી ઘટી ગઈ હોય અને તે ૧૦૦ વર્ષમાં અથવા ૫ પેઢીમાં થયું હોય", "વસતી ૩૦%થી વધુ ઘટી ગઈ હોય અને તે ૧૦ વર્ષમાં અથવા ૩ પેઢીમાં થયું હોય", "વસતી ૪૦%થી ઓછી ઘટી ગઈ હોય અને તે ૨૦ વર્ષમાં અથવા ૫ પેઢીમાં થયું હોય"], "ans": 0, "exp": "IUCN રેડ લિસ્ટના માપદંડ મુજબ, 'વલ્નરેબલ' શ્રેણી માટે વસતીમાં ૫૦%થી વધુ ઘટાડો થયો હોય અને તે ૧૦ વર્ષ અથવા ૩ પેઢીમાં થયો હોય તો તેને આ શ્રેણીમાં મૂકવામાં આવે છે. બાકીના વિકલ્પો (B, C, D) માપદંડો સાથે મેળ ખાતા નથી. ઉદાહરણ તરીકે, વિકલ્પ Bમાં ૨૦% ઘટાડો અને ૧૦૦ વર્ષ/૫ પેઢીનો સમયગાળો 'નિયર થ્રેટનડ' શ્રેણી માટે યોગ્ય હોઈ શકે, પરંતુ 'વલ્નરેબલ' માટે નહીં.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "IUCN રેડ લિસ્ટમાં 'એક્સટીંક્ટ ઇન ધ વાઇલ્ડ (Extinct in the Wild)' શ્રેણીમાં કયા પ્રાણીનો સમાવેશ થાય છે?", "opts": ["જે પ્રાણીની વસતી પ્રકૃતિમાં પૂરતી મોટી ન હોય પરંતુ કેદમાં જીવિત હોય", "જે પ્રાણીની વસતી પ્રકૃતિમાં અને કેદમાં બંનેમાં સંપૂર્ણપણે નાશ પામી હોય", "જે પ્રાણીની વસતી પ્રકૃતિમાં જોવા મળતી ન હોય પરંતુ કેદમાં જીવિત હોય", "જે પ્રાણીની વસતી પ્રકૃતિમાં અસ્તિત્વમાં હોય પરંતુ ખૂબ જ ઓછી હોય"], "ans": 2, "exp": "'એક્સટીંક્ટ ઇન ધ વાઇલ્ડ' શ્રેણી તે પ્રાણીઓ માટે છે જે પ્રકૃતિમાં જોવા મળતા નથી પરંતુ કેદમાં (જેમ કે ચિડિયાઘર અથવા સંશોધન કેંદ્રોમાં) જીવિત હોય. વિકલ્પ A અસ્પષ્ટ છે કારણ કે 'પૂરતી મોટી' વસતીનો અર્થ સ્પષ્ટ નથી. વિકલ્પ B 'એક્સટીંક્ટ' શ્રેણીને વર્ણવે છે, જ્યારે વિકલ્પ D 'ક્રિટિકલી એન્ડેન્જર્ડ' અથવા 'એન્ડેન્જર્ડ' શ્રેણીને વર્ણવી શકે.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "IUCN રેડ લિસ્ટના માપદંડો અનુસાર, કયા પ્રાણીને 'ક્રિટિકલી એન્ડેન્જર્ડ (Critically Endangered)' શ્રેણીમાં મૂકવામાં આવે છે?", "opts": ["જેની વસતી ૨૦%થી વધુ ઘટી ગઈ હોય અને તે ૫ વર્ષમાં અથવા ૨ પેઢીમાં થયું હોય", "જેની વસતી ૫૦%થી વધુ ઘટી ગઈ હોય અને તે ૧૦ વર્ષમાં અથવા ૩ પેઢીમાં થયું હોય", "જેની વસતી ૮૦%થી વધુ ઘટી ગઈ હોય અને તે ૫ વર્ષમાં અથવા ૨ પેઢીમાં થયું હોય", "જેની વસતી ૯૦%થી વધુ ઘટી ગઈ હોય અને તે ૧૦ વર્ષમાં અથવા ૩ પેઢીમાં થયું હોય"], "ans": 3, "exp": "'ક્રિટિકલી એન્ડેન્જર્ડ' શ્રેણી માટે IUCN માપદંડ મુજબ, વસતીમાં ૯૦%થી વધુ ઘટાડો થયો હોય અને તે ૧૦ વર્ષ અથવા ૩ પેઢીમાં થયો હોય તો તેને આ શ્રેણીમાં મૂકવામાં આવે છે. વિકલ્પ A અને B અનુક્રમે 'એન્ડેન્જર્ડ' અને 'વલ્નરેબલ' શ્રેણી માટે યોગ્ય હોઈ શકે, જ્યારે વિકલ્પ C 'ક્રિટિકલી એન્ડેન્જર્ડ' માટે પૂરતો કડક નથી.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "IUCN રેડ લિસ્ટમાં 'ડેટા ડિફિસિયન્ટ (Data Deficient)' શ્રેણી ક્યારે લાગુ પડે છે?", "opts": ["જ્યારે પ્રાણીની વસતી અસ્તિત્વમાં ન હોય", "જ્યારે પ્રાણીની વસતી વિશે પૂરતી માહિતી ઉપલબ્ધ ન હોય", "જ્યારે પ્રાણીની વસતી ખૂબ જ ઓછી હોય પરંતુ તેના અસ્તિત્વ વિશે ખાતરી હોય", "જ્યારે પ્રાણીની વસતી પ્રકૃતિમાં અને કેદમાં બંનેમાં સંપૂર્ણપણે નાશ પામી હોય"], "ans": 1, "exp": "'ડેટા ડિફિસિયન્ટ' શ્રેણી તે પ્રાણીઓ માટે છે જ્યારે તેમની વસતી, વિતરણ અથવા જોખમો વિશે પૂરતી માહિતી ઉપલબ્ધ ન હોય. વિકલ્પ A 'એક્સટીંક્ટ' શ્રેણીને વર્ણવે છે, વિકલ્પ C 'એન્ડેન્જર્ડ' અથવા 'ક્રિટિકલી એન્ડેન્જર્ડ' શ્રેણીને વર્ણવી શકે, જ્યારે વિકલ્પ D 'એક્સટીંક્ટ' શ્રેણીને વર્ણવે છે.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "IUCN રેડ લિસ્ટમાં 'લીસ્ટ ઓફ થ્રેટનડ સ્પીસીઝ' (LTS) કયા ઉદ્દેશ્ય માટે તૈયાર કરવામાં આવે છે?", "opts": ["જૈવવૈવિધ્યના સંશોધન માટે", "લુપ્ત થવાના જોખમમાં મુકાયેલ પ્રજાતિઓની ઓળખ અને સંરક્ષણ માટે", "નવી પ્રજાતિઓની શોધ માટે", "પ્રાણીઓના વર્ગીકરણ માટે"], "ans": 1, "exp": "IUCN રેડ લિસ્ટનો મુખ્ય ઉદ્દેશ્ય લુપ્ત થવાના જોખમમાં મુકાયેલ પ્રજાતિઓની ઓળખ કરવી અને તેમના સંરક્ષણ માટે પગલાં લેવા છે. વિકલ્પ A, C, અને D રેડ લિસ્ટના મુખ્ય ઉદ્દેશ્ય સાથે સંકળાયેલા નથી. રેડ લિસ્ટ એ જૈવવૈવિધ્યના સંશોધન અથવા વર્ગીકરણ માટે નહીં, પરંતુ સંરક્ષણ માટે તૈયાર કરવામાં આવે છે.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "IUCN રેડ લિસ્ટમાં 'નિયર થ્રેટનડ (Near Threatened)' શ્રેણીમાં મૂકવામાં આવેલ જીવજંતુઓ માટે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["આ જીવજંતુઓ ભવિષ્યમાં લુપ્ત થવાના જોખમને નજીક છે પરંતુ હાલમાં લુપ્ત થવાના માપદંડો પૂરા કરતા નથી.", "આ શ્રેણી IUCN દ્વારા 'લો રિસ્ક' તરીકે વર્ગીકૃત કરવામાં આવે છે.", "આ શ્રેણીમાં મૂકવામાં આવેલ જીવજંતુઓની વસતીમાં ૩૦%થી વધુ ઘટાડો થયો હોવો જરૂરી છે.", "આ શ્રેણી 'લીસ્ટ ઓફ થ્રેટનડ સ્પીસીઝ' (LTS)નો ભાગ નથી."], "ans": 2, "exp": "સી) આ વિધાન ખોટું છે કારણ કે 'નિયર થ્રેટનડ' શ્રેણીમાં વસતી ઘટાડાનું પ્રમાણ નિર્ધારિત નથી. આ શ્રેણી એવા જીવજંતુઓ માટે છે જે લુપ્ત થવાના જોખમને નજીક છે પરંતુ હાલમાં લુપ્ત થવાના માપદંડો પૂરા કરતા નથી. અ) સત્ય છે કારણ કે આ શ્રેણી ભવિષ્યના જોખમને ધ્યાનમાં લે છે. બ) સત્ય છે કારણ કે 'નિયર થ્રેટનડ'ને પહેલા 'લો રિસ્ક' તરીકે ઓળખવામાં આવતી. ડ) ખોટું છે કારણ કે 'નિયર થ્રેટનડ' શ્રેણી LTSનો ભાગ છે.", "ref": "Std 12 - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "IUCN રેડ લિસ્ટમાં 'એક્સટીંક્ટ (Extinct)' શ્રેણીમાં મૂકવામાં આવેલ જીવજંતુ માટે નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["આ જીવજંતુ કેદમાં જીવિત રહી શકે છે.", "આ જીવજંતુના અંતિમ જીવિત સદસ્યનું મૃત્યુ ૫૦ વર્ષ પહેલા થયું હોવું જરૂરી છે.", "આ જીવજંતુના અંતિમ જીવિત સદસ્યનું મૃત્યુ ૧૦૦ વર્ષ પહેલા થયું હોવું જરૂરી છે.", "આ જીવજંતુના અંતિમ જીવિત સદસ્યનું મૃત્યુ ક્યારેય નક્કી કરવામાં આવતું નથી."], "ans": 1, "exp": "બ) આ વિધાન સત્ય છે કારણ કે IUCN માપદંડો અનુસાર, 'એક્સટીંક્ટ' શ્રેણીમાં મૂકવામાં આવેલ જીવજંતુના અંતિમ જીવિત સદસ્યનું મૃત્યુ ૫૦ વર્ષ પહેલા થયું હોવું જરૂરી છે. અ) ખોટું છે કારણ કે 'એક્સટીંક્ટ' શ્રેણી કેદમાં જીવિત રહેલ જીવજંતુઓ માટે લાગુ પડતી નથી (તે 'એક્સટીંક્ટ ઇન ધ વાઇલ્ડ' શ્રેણી હેઠળ આવે છે). સી) ખોટું છે કારણ કે ૧૦૦ વર્ષનો સમયગાળો નિર્ધારિત નથી. ડ) ખોટું છે કારણ કે IUCN માપદંડો અનુસાર મૃત્યુનો સમયગાળો નક્કી કરવામાં આવે છે.", "ref": "Std 12 - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "IUCN રેડ લિસ્ટમાં 'લીસ્ટ ઓફ થ્રેટનડ સ્પીસીઝ' (LTS)માં કયા જીવજંતુઓનો સમાવેશ થતો નથી?", "opts": ["ક્રિટિકલી એન્ડેન્જર્ડ", "એન્ડેન્જર્ડ", "વલ્નરેબલ", "ડેટા ડિફિસિયન્ટ"], "ans": 3, "exp": "ડ) 'ડેટા ડિફિસિયન્ટ' શ્રેણી LTSનો ભાગ નથી કારણ કે આ શ્રેણીમાં એવા જીવજંતુઓનો સમાવેશ થાય છે જ્યારે તેમની વસતી અથવા જોખમ વિશે પૂરતા ડેટા ઉપલબ્ધ નથી. અ, બ, અને સી શ્રેણીઓ LTSનો ભાગ છે કારણ કે તેઓ લુપ્ત થવાના જોખમ ધરાવે છે.", "ref": "Std 12 - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "IUCN રેડ લિસ્ટમાં 'એન્ડેન્જર્ડ (Endangered)' શ્રેણીમાં મૂકવામાં આવેલ જીવજંતુ માટે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["આ જીવજંતુ લુપ્ત થવાના ખૂબ જ ઉચ્ચ જોખમ ધરાવે છે.", "આ શ્રેણીમાં મૂકવામાં આવેલ જીવજંતુઓની વસતી ૨૫૦૦થી ઓછી જીવિત પ્રજાતિઓ ધરાવે છે.", "આ શ્રેણીમાં મૂકવામાં આવેલ જીવજંતુઓની વસતીમાં ૫૦%થી વધુ ઘટાડો થયો હોવો જરૂરી છે.", "આ શ્રેણી 'ક્રિટિકલી એન્ડેન્જર્ડ' કરતાં ઓછા જોખમ ધરાવે છે."], "ans": 2, "exp": "સી) આ વિધાન ખોટું છે કારણ કે 'એન્ડેન્જર્ડ' શ્રેણીમાં વસતી ઘટાડાનું પ્રમાણ નિર્ધારિત નથી. અ) સત્ય છે કારણ કે 'એન્ડેન્જર્ડ' શ્રેણી લુપ્ત થવાના ઉચ્ચ જોખમ ધરાવે છે. બ) સત્ય છે કારણ કે IUCN માપદંડો અનુસાર, 'એન્ડેન્જર્ડ' શ્રેણીમાં વસતી ૨૫૦૦થી ઓછી જીવિત પ્રજાતિઓ ધરાવે છે. ડ) સત્ય છે કારણ કે 'ક્રિટિકલી એન્ડેન્જર્ડ' શ્રેણી 'એન્ડેન્જર્ડ' કરતાં વધુ જોખમ ધરાવે છે.", "ref": "Std 12 - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "IUCN રેડ લિસ્ટમાં 'કન્ઝર્વેશન ડિપેન્ડન્ટ (Conservation Dependent)' શ્રેણીમાં મૂકવામાં આવેલ જીવજંતુ માટે નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["આ જીવજંતુ હાલમાં લુપ્ત થવાના જોખમ ધરાવતું નથી પરંતુ ભવિષ્યમાં સંરક્ષણ પ્રયત્નો બંધ થયા બાદ લુપ્ત થવાના જોખમમાં મૂકાઈ શકે છે.", "આ શ્રેણી IUCN દ્વારા 'હાય રિસ્ક' તરીકે વર્ગીકૃત કરવામાં આવે છે.", "આ શ્રેણીમાં મૂકવામાં આવેલ જીવજંતુઓની વસતી ૫૦થી ઓછી જીવિત પ્રજાતિઓ ધરાવે છે.", "આ શ્રેણી 'લીસ્ટ ઓફ થ્રેટનડ સ્પીસીઝ' (LTS)નો ભાગ નથી."], "ans": 0, "exp": "અ) આ વિધાન સત્ય છે કારણ કે 'કન્ઝર્વેશન ડિપેન્ડન્ટ' શ્રેણીમાં એવા જીવજંતુઓનો સમાવેશ થાય છે જે હાલમાં લુપ્ત થવાના જોખમ ધરાવતા નથી પરંતુ ભવિષ્યમાં સંરક્ષણ પ્રયત્નો બંધ થયા બાદ લુપ્ત થવાના જોખમમાં મૂકાઈ શકે છે. બ) ખોટું છે કારણ કે આ શ્રેણી 'લો રિસ્ક' તરીકે વર્ગીકૃત કરવામાં આવે છે. સી) ખોટું છે કારણ કે વસતીનું પ્રમાણ નિર્ધારિત નથી. ડ) ખોટું છે કારણ કે આ શ્રેણી LTSનો ભાગ છે.", "ref": "Std 12 - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "IUCN રેડ લિસ્ટમાં 'રીજનલી એક્સટીંક્ટ (Regionally Extinct)' શ્રેણી ક્યારે લાગુ પડે છે?", "opts": ["જ્યારે જીવજંતુ પૃથ્વી પરથી સંપૂર્ણપણે નાશ પામ્યું હોય", "જ્યારે જીવજંતુ એક વિશિષ્ટ ભૌગોલિક વિસ્તારમાંથી નાશ પામ્યું હોય પરંતુ અન્ય સ્થળે અસ્તિત્વમાં હોય", "જ્યારે જીવજંતુની વસતી ૫૦%થી વધુ ઘટી ગઈ હોય", "જ્યારે જીવજંતુની વસતી અજ્ઞાત હોય"], "ans": 1, "exp": "રીજનલી એક્સટીંક્ટ શ્રેણી એટલે જીવજંતુ એક વિશિષ્ટ ભૌગોલિક વિસ્તારમાંથી નાશ પામ્યું હોય પરંતુ અન્ય સ્થળે અસ્તિત્વમાં હોય. A) એક્સટીંક્ટ (Extinct) શ્રેણી છે. C) વસતી ઘટાડાને આધારે વલ્નરેબલ અથવા એન્ડેન્જર્ડ શ્રેણી લાગુ પડે. D) ડેટા ડિફિસિયન્ટ શ્રેણી છે.", "ref": "Std 12 - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "IUCN રેડ લિસ્ટમાં 'લો રિસ્ક/લીસ્ટ કન્સર્ન (Low Risk/Least Concern)' શ્રેણીમાં મૂકવામાં આવેલ જીવજંતુઓ માટે નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["આ જીવજંતુઓને તાત્કાલિક સંરક્ષણની જરૂર નથી", "આ જીવજંતુઓની વસતી ઝડપથી ઘટી રહી છે", "આ જીવજંતુઓને વલ્નરેબલ શ્રેણીમાં મૂકવામાં આવે છે", "આ જીવજંતુઓને એન્ડેન્જર્ડ શ્રેણીમાં મૂકવામાં આવે છે"], "ans": 0, "exp": "લો રિસ્ક/લીસ્ટ કન્સર્ન શ્રેણીમાં મૂકવામાં આવેલ જીવજંતુઓને તાત્કાલિક સંરક્ષણની જરૂર નથી. B) વસતી ઘટાડા વલ્નરેબલ અથવા એન્ડેન્જર્ડ શ્રેણી સૂચવે છે. C) અને D) ખોટા છે કારણ કે લો રિસ્ક શ્રેણી એ સુરક્ષિત શ્રેણી છે.", "ref": "Std 12 - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "IUCN રેડ લિસ્ટમાં 'ડોમેસ્ટિકેડ (Domesticated)' જીવજંતુઓ ક્યારે સૂચિબદ્ધ થતાં નથી?", "opts": ["જ્યારે તેઓ પ્રાકૃતિક નિવાસસ્થાનમાં જીવે છે", "જ્યારે તેઓ માનવી દ્વારા પાળેલા હોય છે", "જ્યારે તેઓ કૃત્રિમ વાતાવરણમાં જીવે છે", "જ્યારે તેઓની વસતી સ્થિર હોય છે"], "ans": 0, "exp": "IUCN રેડ લિસ્ટમાં ડોમેસ્ટિકેડ જીવજંતુઓ સૂચિબદ્ધ થતાં નથી કારણ કે તેઓ પ્રાકૃતિક નિવાસસ્થાનમાં જીવતા નથી. B), C), અને D) ખોટા છે કારણ કે ડોમેસ્ટિકેડ જીવજંતુઓ માનવી દ્વારા પાળેલા હોય છે અને કૃત્રિમ વાતાવરણમાં જીવે છે.", "ref": "Std 12 - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "IUCN રેડ લિસ્ટમાં 'ક્રિટિકલી એન્ડેન્જર્ડ (Critically Endangered)' શ્રેણીમાં મૂકવામાં આવેલ એક જીવજંતુની વસતી 50% ઘટી જાય છે, તો તેની પુનઃમૂલ્યાંકન ક્યારે થાય છે?", "opts": ["2 વર્ષ પછી", "5 વર્ષ પછી", "તરત જ (ઇમરજન્સી બેઝ પર)", "10 વર્ષ પછી"], "ans": 2, "exp": "IUCN રેડ લિસ્ટના માપદંડો અનુસાર, જો કોઈ જીવજંતુ 'ક્રિટિકલી એન્ડેન્જર્ડ' શ્રેણીમાં હોય અને તેની વસતી 50% કે તેથી વધુ ઘટી જાય, તો તેનું પુનઃમૂલ્યાંકન તરત જ (ઇમરજન્સી બેઝ પર) કરવામાં આવે છે. આમ, વિકલ્પ C સચોટ છે. વિકલ્પ A, B, અને D અયોગ્ય છે કારણ કે તેઓ IUCNના માપદંડો સાથે મેળ ખાતા નથી.", "ref": "Std 12 - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "IUCN રેડ લિસ્ટમાં 'ક્વેસ્ટીનેબલ (Not Evaluated)' શ્રેણીમાં સમાવિષ્ટ જીવજંતુઓ માટે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["આ શ્રેણીમાં આવતા જીવજંતુઓની સંરક્ષણ સ્થિતિનું મૂલ્યાંકન કરવામાં આવ્યું નથી", "આ શ્રેણીમાં સમાવિષ્ટ જીવજંતુઓને ભવિષ્યમાં લુપ્ત થવાનું જોખમ નથી હોતું", "આ શ્રેણીમાં આવતા જીવજંતુઓ માટે પૂરતી માહિતી ઉપલબ્ધ નથી એવું જરૂરી નથી", "આ શ્રેણીમાં સમાવિષ્ટ જીવજંતુઓને IUCN દ્વારા સક્રિય રીતે મૂલ્યાંકન કરવામાં આવ્યા નથી"], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B છે. 'Not Evaluated (NE)' શ્રેણીમાં સમાવિષ્ટ જીવજંતુઓનું મૂલ્યાંકન કરવામાં આવ્યું નથી, પરંતુ આનો અર્થ એ નથી કે તેમને લુપ્ત થવાનું જોખમ નથી. વિકલ્પ A, C અને D સાચાં છે કારણ કે આ શ્રેણીમાં આવતા જીવજંતુઓનું મૂલ્યાંકન થયું નથી, તેમના માટે પૂરતી માહિતી ન હોવી જરૂરી નથી અને તેમને સક્રિય રીતે મૂલ્યાંકન કરવામાં આવ્યા નથી.", "ref": "Std 12 - પ્રકરણ 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "IUCN રેડ લિસ્ટના માપદંડ B અનુસાર, જ્યારે કોઈ પ્રજાતિની વસતી ૫ વર્ષમાં ૮૦% ઘટે છે, ત્યારે તે કયા વર્ગમાં મૂકવામાં આવે છે, જો તે ઘટાડાનું કારણ અજાણ્યું હોય?", "opts": ["ક્રિટિકલી એન્ડેન્જર્ડ (Critically Endangered)", "એન્ડેન્જર્ડ (Endangered)", "વલ્નરેબલ (Vulnerable)", "ડેટા ડિફિસિયન્ટ (Data Deficient)"], "ans": 0, "exp": "માપદંડ B અનુસાર, ૫ વર્ષમાં ૮૦% વસતી ઘટાડો થયો હોય અને તે ઘટાડાનું કારણ અજાણ્યું હોય તો પણ પ્રજાતિને 'ક્રિટિકલી એન્ડેન્જર્ડ' વર્ગમાં મૂકવામાં આવે છે. ડેટા ડિફિસિયન્ટ વર્ગમાં મૂકવામાં આવે છે જ્યારે વસતી અથવા હાજરી વિશે પૂરતા ડેટા ન હોય. એન્ડેન્જર્ડ અને વલ્નરેબલ વર્ગ માટે ઘટાડાનું પ્રમાણ ઓછું હોય છે (ક્રમશ: ૫૦% અને ૩૦%).", "ref": "Std 12 - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "IUCN રેડ લિસ્ટમાં 'એક્સટીંક્ટ ઇન ધ વાઇલ્ડ' (EW) શ્રેણીમાં મૂકવામાં આવેલ પ્રજાતિ માટે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["તે પ્રજાતિ કેદમાં અથવા કૃત્રિમ વાતાવરણમાં જીવિત રહી શકે છે.", "તે પ્રજાતિના જંગલી વાતાવરણમાં કોઈ જીવિત સભ્ય બચ્યા નથી.", "તે પ્રજાતિને IUCN દ્વારા સંપૂર્ણપણે લુપ્ત ગણવામાં આવે છે.", "તે પ્રજાતિના પુન:સ્થાપન માટે પ્રયાસો ચાલી રહ્યા હોય શકે છે."], "ans": 2, "exp": "'એક્સટીંક્ટ ઇન ધ વાઇલ્ડ' (EW) શ્રેણી એટલે પ્રજાતિ જંગલી વાતાવરણમાં લુપ્ત થઈ ગઈ છે, પરંતુ કેદમાં અથવા કૃત્રિમ વાતાવરણમાં જીવિત છે. સંપૂર્ણ લુપ્ત (Extinct - EX) ગણવામાં આવે છે જ્યારે પ્રજાતિના કોઈ જીવિત સભ્ય બચ્યા ન હોય. વિકલ્પ C ખોટો છે કારણ કે EW અને EX વચ્ચે તફાવત છે.", "ref": "Std 12 - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "IUCN રેડ લિસ્ટના માપદંડ C અનુસાર, જ્યારે કોઈ પ્રજાતિની વસતી ૫૦ અથવા તેનાથી ઓછી જીવિત પ્રજાતિઓ બચી હોય અને તેની વસતી ઘટી રહી હોય, ત્યારે તે કયા વર્ગમાં મૂકવામાં આવે છે?", "opts": ["ક્રિટિકલી એન્ડેન્જર્ડ (Critically Endangered)", "એન્ડેન્જર્ડ (Endangered)", "વલ્નરેબલ (Vulnerable)", "નિયર થ્રેટનડ (Near Threatened)"], "ans": 0, "exp": "માપદંડ C અનુસાર, જો કોઈ પ્રજાતિની વસતી ૫૦ અથવા તેનાથી ઓછી જીવિત પ્રજાતિઓ બચી હોય અને વસતી ઘટી રહી હોય, તો તેને 'ક્રિટિકલી એન્ડેન્જર્ડ' વર્ગમાં મૂકવામાં આવે છે. એન્ડેન્જર્ડ અને વલ્નરેબલ વર્ગ માટે વસતીનું પ્રમાણ વધુ હોય છે.", "ref": "Std 12 - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "IUCN રેડ લિસ્ટમાં 'કન્ઝર્વેશન ડિપેન્ડન્ટ' (CD) શ્રેણીમાં મૂકવામાં આવેલ પ્રજાતિ માટે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["તે પ્રજાતિ સંરક્ષણ પ્રયાસો બંધ થઈ જાય તો લુપ્ત થવાનું જોખમ રહેલું છે.", "તે પ્રજાતિ હાલમાં સંરક્ષણ પ્રયાસો હેઠળ સુરક્ષિત છે.", "તે પ્રજાતિને 'થ્રેટનડ' શ્રેણીમાં મૂકવામાં આવે છે.", "તે પ્રજાતિની વસતી સ્થિર અથવા વધી રહી છે."], "ans": 2, "exp": "'કન્ઝર્વેશન ડિપેન્ડન્ટ' (CD) શ્રેણી એટલે પ્રજાતિ સંરક્ષણ પ્રયાસો પર આધારિત છે અને જો પ્રયાસો બંધ થાય તો લુપ્ત થવાનું જોખમ રહેલું છે. તેને 'થ્રેટનડ' શ્રેણીમાં મૂકવામાં આવતી નથી, પરંતુ તે સંરક્ષણ પર આધારિત હોય છે. વિકલ્પ C ખોટો છે.", "ref": "Std 12 - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "IUCN રેડ લિસ્ટમાં 'રીજનલી એક્સટીંક્ટ' (RE) શ્રેણી ક્યારે લાગુ પડે છે?", "opts": ["જ્યારે પ્રજાતિ વિશ્વભરમાં લુપ્ત થઈ ગઈ હોય.", "જ્યારે પ્રજાતિ કોઈ એક વિસ્તારમાં લુપ્ત થઈ ગઈ હોય, પરંતુ અન્ય વિસ્તારોમાં જીવિત હોય.", "જ્યારે પ્રજાતિ કેદમાં જીવિત હોય, પરંતુ જંગલી વાતાવરણમાં લુપ્ત થઈ ગઈ હોય.", "જ્યારે પ્રજાતિની વસતી ૫૦% ઘટી ગઈ હોય."], "ans": 1, "exp": "'રીજનલી એક્સટીંક્ટ' (RE) શ્રેણી એટલે પ્રજાતિ કોઈ એક વિસ્તારમાં લુપ્ત થઈ ગઈ હોય, પરંતુ અન્ય વિસ્તારોમાં જીવિત હોય. વિશ્વભરમાં લુપ્ત થવાનું 'એક્સટીંક્ટ' (EX) કહેવાય છે. કેદમાં જીવિત હોવાનું 'એક્સટીંક્ટ ઇન ધ વાઇલ્ડ' (EW) કહેવાય છે. વસતી ઘટાડો માપદંડ B અથવા C હેઠળ ગણવામાં આવે છે.", "ref": "Std 12 - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
