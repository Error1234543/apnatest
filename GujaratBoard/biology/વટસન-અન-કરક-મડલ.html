<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>વોટસન અને ક્રિક મોડેલ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>વોટસન અને ક્રિક મોડેલ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">વોટસન અને ક્રિક મોડેલ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "વોટસન અને ક્રિકના DNA મોડેલ અનુસાર, નાઇટ્રોજન બેઇઝની જોડી કયા પ્રકારના બંધથી જોડાયેલી હોય છે?", "opts": ["ફોસ્ફોડાઇએસ્ટર બંધ", "હાઇડ્રોજન બંધ", "ગ્લાયકોસિડિક બંધ", "પેપ્ટાઇડ બંધ"], "ans": 1, "exp": "વોટસન અને ક્રિકના મોડેલ મુજબ, DNAની બેવડી કુંતલમાં એડેનીન (A) થાઇમિન (T) સાથે અને ગ્વાનીન (G) સાઇટોસિન (C) સાથે હાઇડ્રોજન બંધથી જોડાય છે. ફોસ્ફોડાઇએસ્ટર બંધ શર્કરા અને ફોસ્ફેટ વચ્ચે હોય છે, ગ્લાયકોસિડિક બંધ કાર્બોદિતોમાં જોવા મળે છે, અને પેપ્ટાઇડ બંધ પ્રોટીનમાં એમિનો એસિડ વચ્ચે હોય છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય", "ch": ""}, {"q": "વોટસન અને ક્રિકના DNA મોડેલમાં, બંને શૃંખલાઓ વચ્ચેનું અંતર કેટલું હોય છે?", "opts": ["1.0 nm", "2.0 nm", "3.4 nm", "0.34 nm"], "ans": 1, "exp": "વોટસન અને ક્રિકના મોડેલ મુજબ, DNAની બેવડી કુંતલની પહોળાઈ 2.0 nm (નેનોમીટર) હોય છે. 3.4 nm એ એક સંપૂર્ણ વળાંક (ટર્ન)નું અંતર છે, જ્યારે 0.34 nm એક ન્યુક્લિઓટાઇડથી બીજા ન્યુક્લિઓટાઇડ વચ્ચેનું અંતર છે. 1.0 nm એ ખોટું માપ છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય", "ch": ""}, {"q": "વોટસન અને ક્રિકના મોડેલમાં DNAની શૃંખલાઓ કઈ દિશામાં વિરુદ્ધ દિશામાં ગોઠવાયેલી હોય છે?", "opts": ["3' → 5' અને 3' → 5'", "5' → 3' અને 5' → 3'", "5' → 3' અને 3' → 5'", "કોઈ નિશ્ચિત દિશા નથી"], "ans": 2, "exp": "DNAની બેવડી કુંતલમાં બંને શૃંખલાઓ વિરુદ્ધ દિશામાં ગોઠવાયેલી હોય છે, એટલે કે એક શૃંખલા 5' → 3' દિશામાં અને બીજી 3' → 5' દિશામાં હોય છે. આને 'એન્ટિપેરેલલ' ગોઠવણી કહે છે. બાકીના વિકલ્પો ખોટી દિશાઓ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય", "ch": ""}, {"q": "વોટસન અને ક્રિકના મોડેલમાં DNAની કુંતલ કયા પ્રકારની હોય છે?", "opts": ["ડાબેરી કુંતલ (Left-handed helix)", "જમણેરી કુંતલ (Right-handed helix)", "સીધી શૃંખલા (Linear strand)", "વર્તુળાકાર કુંતલ (Circular helix)"], "ans": 1, "exp": "વોટસન અને ક્રિકના મોડેલ મુજબ, DNAની બેવડી કુંતલ જમણેરી (Right-handed helix) હોય છે. ડાબેરી કુંતલ (Z-DNA) અલગ પરિસ્થિતિમાં જોવા મળે છે, સીધી શૃંખલા RNAમાં હોઈ શકે, અને વર્તુળાકાર કુંતલ બેક્ટેરિયાના DNAમાં જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય", "ch": ""}, {"q": "વોટસન અને ક્રિકના મોડેલમાં, એક સંપૂર્ણ વળાંક (ટર્ન)માં કેટલા ન્યુક્લિઓટાઇડ જોડીઓ હોય છે?", "opts": ["5 જોડીઓ", "10 જોડીઓ", "15 જોડીઓ", "20 જોડીઓ"], "ans": 1, "exp": "વોટસન અને ક્રિકના મોડેલ મુજબ, DNAની બેવડી કુંતલમાં એક સંપૂર્ણ વળાંક (360°)માં લગભગ 10 ન્યુક્લિઓટાઇડ જોડીઓ હોય છે. આ વળાંકનું અંતર 3.4 nm હોય છે. બાકીના વિકલ્પો ખોટી સંખ્યા દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય", "ch": ""}, {"q": "વોટસન અને ક્રિકના DNA મોડેલમાં, પ્યુરિન અને પિરિમિડિન વચ્ચેના હાઇડ્રોજન બંધની સંખ્યા અંગે નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["એડેનિન અને થાયમિન વચ્ચે બે હાઇડ્રોજન બંધ હોય છે, જ્યારે ગ્વાનિન અને સાયટોસિન વચ્ચે ત્રણ હાઇડ્રોજન બંધ હોય છે.", "એડેનિન અને થાયમિન વચ્ચે ત્રણ હાઇડ્રોજન બંધ હોય છે, જ્યારે ગ્વાનિન અને સાયટોસિન વચ્ચે બે હાઇડ્રોજન બંધ હોય છે.", "એડેનિન અને ગ્વાનિન વચ્ચે બે હાઇડ્રોજન બંધ હોય છે, જ્યારે થાયમિન અને સાયટોસિન વચ્ચે ત્રણ હાઇડ્રોજન બંધ હોય છે.", "એડેનિન અને સાયટોસિન વચ્ચે ત્રણ હાઇડ્રોજન બંધ હોય છે, જ્યારે ગ્વાનિન અને થાયમિન વચ્ચે બે હાઇડ્રોજન બંધ હોય છે."], "ans": 0, "exp": "વોટસન અને ક્રિકના મોડેલ અનુસાર, એડેનિન (પ્યુરિન) હંમેશા થાયમિન (પિરિમિડિન) સાથે જોડાય છે અને તેમની વચ્ચે બે હાઇડ્રોજન બંધ હોય છે. ગ્વાનિન (પ્યુરિન) હંમેશા સાયટોસિન (પિરિમિડિન) સાથે જોડાય છે અને તેમની વચ્ચે ત્રણ હાઇડ્રોજન બંધ હોય છે. આમ, વિકલ્પ A સત્ય છે. વિકલ્પ B, C, અને Dમાં બંધની સંખ્યા અને જોડી ગળતર છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "વોટસન અને ક્રિકના DNA મોડેલમાં, નીચેનામાંથી કયો ઘટક DNAની શૃંખલાની બાહ્ય બાજુએ સ્થિત હોય છે?", "opts": ["નાઇટ્રોજન બેઇઝ", "ફોસ્ફેટ જૂથ", "ડિઓક્સીરિબોઝ શર્કરા", "ફોસ્ફેટ જૂથ અને ડિઓક્સીરિબોઝ શર્કરા બંને"], "ans": 3, "exp": "DNAની ડબલ હેલિક્સ સ્ટ્રક્ચરમાં, ફોસ્ફેટ જૂથ અને ડિઓક્સીરિબોઝ શર્કરા મળીને ફોસ્ફોડાયેસ્ટર બંધ બનાવે છે, જે શૃંખલાની બાહ્ય બાજુએ (બેકબોન) સ્થિત હોય છે. નાઇટ્રોજન બેઇઝ આ બેકબોનની અંદર તરફ હોય છે. આમ, વિકલ્પ D સત્ય છે. વિકલ્પ A, B, અને C અપૂર્ણ છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "વોટસન અને ક્રિકના મોડેલ અનુસાર, DNAની ડબલ હેલિક્સ સ્ટ્રક્ચરની સ્થિરતા માટે નીચેનામાંથી કયો પરિબળ મહત્વનો નથી?", "opts": ["હાઇડ્રોજન બંધ", "વાન ડર વાલ્સ બળ", "આયોનિક બંધ", "હાઇડ્રોફોબિક ઇન્ટરેક્શન"], "ans": 2, "exp": "DNAની ડબલ હેલિક્સ સ્ટ્રક્ચરની સ્થિરતા માટે હાઇડ્રોજન બંધ (A), વાન ડર વાલ્સ બળ (B), અને હાઇડ્રોફોબિક ઇન્ટરેક્શન (D) મહત્વના છે. આયોનિક બંધ (C) DNAની સ્ટ્રક્ચરમાં મહત્વની ભૂમિકા ભજવતો નથી. આમ, વિકલ્પ C યોગ્ય જવાબ છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "વોટસન અને ક્રિકના મોડેલમાં, DNAની શૃંખલાઓ વચ્ચેના હાઇડ્રોજન બંધની દિશા અંગે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["હાઇડ્રોજન બંધ શૃંખલાઓની લંબરૂપ દિશામાં હોય છે.", "હાઇડ્રોજન બંધ નાઇટ્રોજન બેઇઝ વચ્ચે બને છે.", "હાઇડ્રોજન બંધ શૃંખલાઓની સમાંતર દિશામાં હોય છે.", "હાઇડ્રોજન બંધ શૃંખલાઓની વચ્ચે કોણીય દિશામાં હોય છે."], "ans": 0, "exp": "વોટસન અને ક્રિકના મોડેલ અનુસાર, હાઇડ્રોજન બંધ નાઇટ્રોજન બેઇઝ વચ્ચે બને છે અને તે શૃંખલાઓની સમાંતર દિશામાં (C) અથવા કોણીય દિશામાં (D) હોઈ શકે, પરંતુ લંબરૂપ દિશામાં (A) નહીં. આમ, વિકલ્પ A ખોટો છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "વોટસન અને ક્રિકના DNA મોડેલમાં, નીચેનામાંથી કયો પરિબળ DNAની સંરચનામાં પ્યુરિન અને પિરિમિડિનની જોડી બનાવવામાં મદદરૂપ થતો નથી?", "opts": ["હાઇડ્રોજન બંધની સંખ્યા", "બેઇઝની રાસાયણિક સંરચના", "શર્કરા-ફોસ્ફેટ બેકબોનની લંબાઈ", "બેઇઝ વચ્ચેનું અંતર"], "ans": 2, "exp": "DNAની સંરચનામાં પ્યુરિન અને પિરિમિડિનની જોડી બનાવવામાં હાઇડ્રોજન બંધની સંખ્યા (A), બેઇઝની રાસાયણિક સંરચના (B), અને બેઇઝ વચ્ચેનું અંતર (D) મહત્વના પરિબળો છે. શર્કરા-ફોસ્ફેટ બેકબોનની લંબાઈ (C) આ જોડી બનાવવામાં મદદરૂપ થતી નથી. આમ, વિકલ્પ C યોગ્ય જવાબ છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "વોટસન અને ક્રિકના DNA મોડેલ અનુસાર, નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["DNAની ડબલ હેલિક્સ સ્ટ્રક્ચરમાં, એડેનિન હંમેશા થાયમિન સાથે જોડાય છે.", "ગુઆનિન અને સાયટોસિન વચ્ચે ત્રણ હાઇડ્રોજન બંધ બને છે.", "DNAની શૃંખલાઓ વચ્ચેના હાઇડ્રોજન બંધો સ્ટ્રક્ચરની સ્થિરતામાં મહત્વની ભૂમિકા ભજવે છે.", "DNAની ડબલ હેલિક્સ સ્ટ્રક્ચરમાં, ફોસ્ફેટ અને શર્કરાના કંકાલ બાહ્ય બાજુએ હોય છે."], "ans": 1, "exp": "વિકલ્પ B ખોટો છે કારણ કે ગુઆનિન અને સાયટોસિન વચ્ચે ત્રણ નહીં પરંતુ બે હાઇડ્રોજન બંધ બને છે. એડેનિન અને થાયમિન વચ્ચે બે હાઇડ્રોજન બંધ બને છે, જ્યારે ગુઆનિન અને સાયટોસિન વચ્ચે ત્રણ હાઇડ્રોજન બંધ બને છે એવું સામાન્ય રીતે માનવામાં આવે છે, પરંતુ વોટસન અને ક્રિકના મોડેલ અનુસાર, ગુઆનિન અને સાયટોસિન વચ્ચે ત્રણ હાઇડ્રોજન બંધ બનતા નથી. વિકલ્પ A, C, અને D સત્ય છે કારણ કે એડેનિન હંમેશા થાયમિન સાથે જોડાય છે, હાઇડ્રોજન બંધો સ્ટ્રક્ચરની સ્થિરતામાં મહત્વની ભૂમિકા ભજવે છે, અને ફોસ્ફેટ અને શર્કરાના કંકાલ બાહ્ય બાજુએ હોય છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "વોટસન અને ક્રિકના DNA મોડેલમાં, નીચેનામાંથી કયા પરિબળને લીધે DNAની ડબલ હેલિક્સ સ્ટ્રક્ચર સ્થિર રહે છે?", "opts": ["હાઇડ્રોજન બંધ અને હાઇડ્રોફોબિક ઇન્ટરેક્શન", "આયોનિક બંધ અને વાન ડર વાલ્સ બળ", "પેપ્ટાઇડ બંધ અને ડાઇસલ્ફાઇડ બંધ", "કોવેલન્ટ બંધ અને મેટાલિક બંધ"], "ans": 0, "exp": "વિકલ્પ A સાચો છે કારણ કે DNAની ડબલ હેલિક્સ સ્ટ્રક્ચરની સ્થિરતા હાઇડ્રોજન બંધ અને હાઇડ્રોફોબિક ઇન્ટરેક્શનને લીધે રહે છે. હાઇડ્રોજન બંધ નાઇટ્રોજન બેઇઝ જોડીઓ વચ્ચે બને છે, જ્યારે હાઇડ્રોફોબિક ઇન્ટરેક્શન ન્યુક્લિઓટાઇડના હાઇડ્રોફોબિક ભાગો વચ્ચે બને છે. વિકલ્પ B, C, અને D ખોટા છે કારણ કે આયોનિક બંધ, વાન ડર વાલ્સ બળ, પેપ્ટાઇડ બંધ, ડાઇસલ્ફાઇડ બંધ, કોવેલન્ટ બંધ, અને મેટાલિક બંધ DNAની સ્થિરતામાં મહત્વની ભૂમિકા ભજવતા નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "વોટસન અને ક્રિકના DNA મોડેલમાં, નીચેનામાંથી કયા ઘટકને લીધે DNAની શૃંખલાની બાહ્ય બાજુએ હાઇડ્રોફિલિક પ્રકૃતિ રહે છે?", "opts": ["નાઇટ્રોજન બેઇઝ", "ડિઓક્સીરિબોઝ શર્કરા", "ફોસ્ફેટ જૂથ", "હાઇડ્રોક્સિલ જૂથ"], "ans": 2, "exp": "વિકલ્પ C સાચો છે કારણ કે ફોસ્ફેટ જૂથ DNAની શૃંખલાની બાહ્ય બાજુએ હોય છે અને તે હાઇડ્રોફિલિક પ્રકૃતિ ધરાવે છે. નાઇટ્રોજન બેઇઝ (વિકલ્પ A) અંદરની બાજુએ હોય છે, ડિઓક્સીરિબોઝ શર્કરા (વિકલ્પ B) ફોસ્ફેટ જૂથ સાથે જોડાયેલી હોય છે, અને હાઇડ્રોક્સિલ જૂથ (વિકલ્પ D) ડિઓક્સીરિબોઝ શર્કરામાં હાજર હોય છે પરંતુ તે બાહ્ય બાજુએ હાઇડ્રોફિલિક પ્રકૃતિ માટે જવાબદાર નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "વોટસન અને ક્રિકના DNA મોડેલ અનુસાર, નીચેનામાંથી કયો પરિબળ DNAની ડબલ હેલિક્સ સ્ટ્રક્ચરની સ્થિરતામાં સૌથી ઓછો ફાળો આપે છે?", "opts": ["હાઇડ્રોજન બંધો", "વાન ડર વાલ્સ બળો", "આયોનિક બંધો", "હાઇડ્રોફોબિક ઇન્ટરેક્શન"], "ans": 2, "exp": "વિકલ્પ C (આયોનિક બંધો) સૌથી ઓછો ફાળો આપે છે કારણ કે DNAની સ્થિરતામાં મુખ્યત્વે હાઇડ્રોજન બંધો (A), વાન ડર વાલ્સ બળો (B), અને હાઇડ્રોફોબિક ઇન્ટરેક્શન (D) મહત્વની ભૂમિકા ભજવે છે. આયોનિક બંધો DNAની સ્થિરતામાં નગણ્ય ફાળો આપે છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને ઉત્ક્રાંતિ (DNAની સંરચના)", "ch": ""}, {"q": "વોટસન અને ક્રિકના DNA મોડેલ અનુસાર, જો એક શૃંખલામાં અડીનિન (A) ની ટકાવારી 30% હોય, તો તે જ શૃંખલામાં થાયમિન (T) ની ટકાવારી કેટલી હશે? (ધારો કે શૃંખલામાં G અને C ની ટકાવારી સરખી છે)", "opts": ["30%", "20%", "15%", "70%"], "ans": 0, "exp": "વોટસન અને ક્રિકના મોડેલ અનુસાર, DNAની ડબલ હેલિક્સ સ્ટ્રક્ચરમાં, અડીનિન (A) હંમેશા થાયમિન (T) સાથે જોડાય છે. પરંતુ પ્રશ્ન એક જ શૃંખલાની વાત કરે છે, જ્યાં A અને T ની ટકાવારી સ્વતંત્ર હોય છે. જો A = 30% હોય, તો તે શૃંખલામાં T ની ટકાવારી કોઈપણ હોઈ શકે, પરંતુ ચાર્મરના નિયમ અનુસાર, સંપૂર્ણ DNA અણુમાં A = T અને G = C હોય છે. અહીં, શૃંખલામાં G અને C સરખી ટકાવારી ધરાવે છે, તેથી A + T + G + C = 100% થાય. જો A = 30% અને G = C હોય, તો G + C = 40% (20% + 20%) થાય, અને T = 100% - (30% + 40%) = 30% થાય. તેથી, T ની ટકાવારી પણ 30% જ હશે. બાકીના વિકલ્પો (20%, 15%, 70%) ચાર્મરના નિયમના ઉલ્લંઘન કરે છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિકાસ", "ch": ""}, {"q": "વોટસન અને ક્રિકના DNA મોડેલ અનુસાર, જો એક શૃંખલામાં 30% થાયમિન (T) હોય, તો તે જ શૃંખલામાં સાયટોસિન (C) નું પ્રમાણ કેટલું હશે?", "opts": ["20%", "30%", "40%", "50%"], "ans": 0, "exp": "વોટસન અને ક્રિકના મોડેલ અનુસાર, DNAમાં અડીનિન (A) અને થાયમિન (T) વચ્ચે 1:1 નું પ્રમાણ હોય છે, જ્યારે ગ્વાનિન (G) અને સાયટોસિન (C) વચ્ચે પણ 1:1 નું પ્રમાણ હોય છે. જો એક શૃંખલામાં 30% T હોય, તો તે જ શૃંખલામાં A પણ 30% હશે (કારણ કે A = T). બાકીના 40% G અને C વચ્ચે સમાન ભાગે વહેંચાયેલા હશે, એટલે કે G = C = 20%. આમ, સાયટોસિન (C) નું પ્રમાણ 20% હશે. બાકીના વિકલ્પો (30%, 40%, 50%) ચેપ્ટરના મૂળભૂત નિયમોને અનુરૂપ નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "વોટસન અને ક્રિકના મોડેલમાં, DNAની ડબલ હેલિક્સ સ્ટ્રક્ચરમાં, નીચેનામાંથી કયો પરિબળ હાઇડ્રોજન બંધની સંખ્યાને અસર કરતો નથી?", "opts": ["તાપમાન", "pH", "ન્યુક્લિઓટાઇડની લંબાઈ", "આયનિક તાકાત"], "ans": 2, "exp": "હાઇડ્રોજન બંધની સંખ્યા પ્યુરિન (A, G) અને પિરિમિડિન (T, C) વચ્ચેના જોડાણ પર આધારિત હોય છે, જે ન્યુક્લિઓટાઇડની પ્રકાર અને ક્રમ પર નિર્ભર કરે છે, પરંતુ ન્યુક્લિઓટાઇડની લંબાઈ પર નહીં. તાપમાન, pH, અને આયનિક તાકાત હાઇડ્રોજન બંધની સ્થિરતાને અસર કરે છે, પરંતુ લંબાઈ નહીં. આમ, ન્યુક્લિઓટાઇડની લંબાઈ એ સરળતાથી અસર કરતો પરિબળ નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "વોટસન અને ક્રિકના મોડેલ અનુસાર, DNAની ડબલ હેલિક્સમાં, જો એક શૃંખલામાં 5'-ATGC-3' ક્રમ હોય, તો તેની પૂરક શૃંખલા કયા ક્રમમાં હશે?", "opts": ["5'-GCAT-3'", "3'-GCAT-5'", "5'-TACG-3'", "3'-CGTA-5'"], "ans": 1, "exp": "DNAની ડબલ હેલિક્સમાં, બંને શૃંખલાઓ વિરુદ્ધ દિશામાં (એન્ટિપેરલલ) ગોઠવાયેલી હોય છે. એક શૃંખલામાં 5'-ATGC-3' હોય, તો તેની પૂરક શૃંખલા 3'-TACG-5' હશે. પરંતુ વિકલ્પોમાં 3'-GCAT-5' આપેલ છે, જે યોગ્ય પૂરક ક્રમ છે (A-T, T-A, G-C, C-G). બાકીના વિકલ્પો ક્રમ અથવા દિશા બાબતે ખોટા છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "વોટસન અને ક્રિકના મોડેલ અનુસાર, DNAની સંરચનામાં, નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["DNAની શૃંખલાઓ વચ્ચે હાઇડ્રોજન બંધ હોય છે", "DNAની શૃંખલાઓ ફોસ્ફોડાયેસ્ટર બંધથી જોડાયેલી હોય છે", "DNAની શૃંખલાઓ સેમી-કન્ઝર્વેટિવ રીતે પ્રતિકૃતિ પામે છે", "DNAની શૃંખલાઓ સમાન દિશામાં ગોઠવાયેલી હોય છે"], "ans": 3, "exp": "વોટસન અને ક્રિકના મોડેલ અનુસાર, DNAની શૃંખલાઓ એન્ટિપેરલલ (વિરુદ્ધ દિશામાં) ગોઠવાયેલી હોય છે. બાકીના વિધાનો સત્ય છે: હાઇડ્રોજન બંધ શૃંખલાઓ વચ્ચે હોય છે, ફોસ્ફોડાયેસ્ટર બંધ શૃંખલાને જોડે છે, અને DNA સેમી-કન્ઝર્વેટિવ રીતે પ્રતિકૃતિ પામે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "વોટસન અને ક્રિકના મોડેલમાં, DNAની ડબલ હેલિક્સ સ્ટ્રક્ચરની સ્થિરતા માટે નીચેનામાંથી કયો પરિબળ મહત્વનો નથી?", "opts": ["હાઇડ્રોજન બંધ", "હાઇડ્રોફોબિક ઇન્ટરેક્શન", "વાન ડર વાલ્સ બળ", "આયનિક બંધ"], "ans": 3, "exp": "DNAની ડબલ હેલિક્સ સ્ટ્રક્ચરની સ્થિરતા માટે હાઇડ્રોજન બંધ, હાઇડ્રોફોબિક ઇન્ટરેક્શન (નાઇટ્રોજન બેઇઝ વચ્ચે), અને વાન ડર વાલ્સ બળ મહત્વના પરિબળો છે. આયનિક બંધ DNAની સ્થિરતામાં મહત્વની ભૂમિકા ભજવતો નથી, કારણ કે DNAમાં આયનિક બંધ બનતા નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
