<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABO રક્તસમૂહના જનોટાઇપ અને ફિનોટાઇપ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ABO રક્તસમૂહના જનોટાઇપ અને ફિનોટાઇપ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ABO રક્તસમૂહના જનોટાઇપ અને ફિનોટાઇપ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક માતા-પિતા બંનેનો રક્તસમૂહ AB છે. તેમના સંતાનમાં નીચેનામાંથી કયો રક્તસમૂહ શક્ય નથી?", "opts": ["A", "B", "AB", "O"], "ans": 3, "exp": "માતા-પિતા બંને AB રક્તસમૂહ ધરાવતા હોવાથી તેમના જનોટાઇપ IAIB હશે. આથી તેમના સંતાનમાં IAIA (A), IBIB (B), IAIB (AB) જનોટાઇપ શક્ય છે, પરંતુ ii (O) જનોટાઇપ શક્ય નથી કારણ કે બંને પૈકી એક પણ પિતૃમાં i એલેલ નથી. તેથી O રક્તસમૂહ શક્ય નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક વ્યક્તિનો રક્તસમૂહ B છે અને તેના પિતાનો રક્તસમૂહ A છે. આ પરિસ્થિતિમાં માતાનો સંભવિત જનોટાઇપ શું હોઈ શકે?", "opts": ["IAIA", "IAi", "IBi", "ii"], "ans": 2, "exp": "પિતાનો રક્તસમૂહ A હોવાથી તેનો જનોટાઇપ IAIA અથવા IAi હોઈ શકે. સંતાનનો રક્તસમૂહ B છે, જેનો જનોટાઇપ IBIB અથવા IBi હોઈ શકે. જો પિતાનો જનોટાઇપ IAi હોય, તો માતામાં IB એલેલ હોવું જરૂરી છે. તેથી માતાનો જનોટાઇપ IBi અથવા IBIB હોઈ શકે. વિકલ્પોમાં માત્ર IBi આપેલ છે, જે યોગ્ય છે. IAIA અથવા IAi માતામાં IB એલેલ આપી શકતા નથી, અને ii માતા IB એલેલ આપી શકતી નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લો:\n1. ABO રક્તસમૂહના જનોટાઇપ IAIB ધરાવતી વ્યક્તિનો ફિનોટાઇપ AB હોય છે.\n2. O રક્તસમૂહ ધરાવતી વ્યક્તિના જનોટાઇપમાં IA અને IB બંને એલેલ હાજર હોય છે.\n3. A રક્તસમૂહ ધરાવતી વ્યક્તિનો જનોટાઇપ IAIA અથવા IAi હોઈ શકે છે.\nઉપરોક્ત વિધાનોમાંથી કયું/કયા ખોટું/ખોટાં છે?", "opts": ["માત્ર 1", "માત્ર 2", "1 અને 3", "2 અને 3"], "ans": 1, "exp": "વિધાન 1 સાચું છે કારણ કે IAIB જનોટાઇપ ધરાવતી વ્યક્તિનો ફિનોટાઇપ AB હોય છે. વિધાન 2 ખોટું છે કારણ કે O રક્તસમૂહ ધરાવતી વ્યક્તિનો જનોટાઇપ ii હોય છે, જેમાં IA કે IB એલેલ હાજર હોતા નથી. વિધાન 3 સાચું છે કારણ કે A રક્તસમૂહ ધરાવતી વ્યક્તિનો જનોટાઇપ IAIA અથવા IAi હોઈ શકે છે. તેથી માત્ર વિધાન 2 ખોટું છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક પરિવારમાં પિતાનો રક્તસમૂહ A અને માતાનો રક્તસમૂહ B છે. તેમના સંતાનમાં O રક્તસમૂહ શક્ય બને તે માટે માતા-પિતાના જનોટાઇપ કયા હોવા જોઈએ?", "opts": ["પિતા: IAIA, માતા: IBIB", "પિતા: IAi, માતા: IBi", "પિતા: IAIA, માતા: IBi", "પિતા: IAi, માતા: IBIB"], "ans": 1, "exp": "સંતાનમાં O રક્તસમૂહ (ii) શક્ય બનવા માટે માતા-પિતા બંનેમાં i એલેલ હોવું જરૂરી છે. પિતાનો જનોટાઇપ IAi અને માતાનો જનોટાઇપ IBi હોવો જોઈએ, જેથી બંને i એલેલ આપી શકે. વિકલ્પ B માં આ શરત પૂરી થાય છે. અન્ય વિકલ્પોમાં એક અથવા બંને પિતૃમાં i એલેલ ન હોવાથી O રક્તસમૂહ શક્ય નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક વ્યક્તિનો રક્તસમૂહ AB છે અને તેની માતાનો રક્તસમૂહ A છે. આ પરિસ્થિતિમાં પિતાનો સંભવિત રક્તસમૂહ અને જનોટાઇપ શું હોઈ શકે? (અપવાદરૂપ કિસ્સાને ધ્યાનમાં લીધા વિના)", "opts": ["રક્તસમૂહ B, જનોટાઇપ IBIB", "રક્તસમૂહ AB, જનોટાઇપ IAIB", "રક્તસમૂહ A, જનોટાઇપ IAIA", "રક્તસમૂહ O, જનોટાઇપ ii"], "ans": 1, "exp": "સંતાનનો રક્તસમૂહ AB (IAIB) છે અને માતાનો રક્તસમૂહ A (IAIA અથવા IAi) છે. તેથી પિતા IB એલેલ આપી શકે તેવો હોવો જોઈએ. વિકલ્પ A માં પિતાનો રક્તસમૂહ B અને જનોટાઇપ IBIB છે, જે IB એલેલ આપી શકે છે. વિકલ્પ B માં પિતાનો રક્તસમૂહ AB છે, જે પણ IB એલેલ આપી શકે છે, પરંતુ પ્રશ્નમાં અપવાદરૂપ કિસ્સાને બાકાત રાખ્યો છે. વિકલ્પ C અને D માં પિતા IB એલેલ આપી શકતા નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક પરિવારમાં માતા-પિતા બંનેનો ફિનોટાઇપ રક્તસમૂહ A છે, પરંતુ તેમના સંતાનનો રક્તસમૂહ O છે. આ પરિસ્થિતિમાં માતા-પિતાના જનોટાઇપ નીચેનામાંથી કયા હોવા જોઈએ?", "opts": ["IAIA અને IAIA", "IAi અને IAi", "IAIA અને IAi", "IAi અને ii"], "ans": 1, "exp": "સાચો જવાબ: B) IAi અને IAi. રક્તસમૂહ A ધરાવતા માતા-પિતામાં જનોટાઇપ IAi હોવો જોઈએ કારણ કે માત્ર IAi × IAi ક્રૉસમાં જ i જનીનનું સંમિશ્રણ થઈને ii (રક્તસમૂહ O) સંતાન ઉત્પન્ન થઈ શકે છે. IAIA × IAIA ક્રૉસમાં માત્ર IAIA જ સંતાન મળે, IAIA × IAi ક્રૉસમાં IAIA અથવા IAi સંતાન મળે, અને IAi × ii ક્રૉસમાં IAi અથવા ii સંતાન મળે પરંતુ માતા-પિતા બંનેનો ફિનોટાઇપ A હોવાથી ii શક્ય નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક વ્યક્તિનો રક્તસમૂહ AB છે અને તેના પિતાનો રક્તસમૂહ O છે. આ પરિસ્થિતિ માટે નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["આ પરિસ્થિતિ જનીનિક રીતે અશક્ય છે", "માતાનો રક્તસમૂહ AB હોવો જોઈએ", "પિતાનો જનોટાઇપ IAi હોવો જોઈએ", "માતાનો જનોટાઇપ IAIB હોવો જોઈએ"], "ans": 0, "exp": "સાચો જવાબ: A) આ પરિસ્થિતિ જનીનિક રીતે અશક્ય છે. રક્તસમૂહ AB ધરાવતી વ્યક્તિનો જનોટાઇપ IAIB હોય છે, જે IA અને IB એલેલ્સનું સંમિશ્રણ છે. રક્તસમૂહ O ધરાવતા પિતાનો જનોટાઇપ ii હોય છે, જે માત્ર i એલેલ્સ ધરાવે છે. આથી પિતા તરફથી IA અથવા IB એલેલ મળી શકે નહીં, તેથી સંતાનનો રક્તસમૂહ AB શક્ય નથી. અન્ય વિકલ્પો આ પરિસ્થિતિને સમજાવી શકતા નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેના જોડકાં ધ્યાનમાં લો: (P) IAIA (Q) IAi (R) IBIB (S) IBi (T) IAIB (U) ii. આ જનોટાઇપ્સને તેમના સંભવિત ફિનોટાઇપ સાથે જોડો.", "opts": ["P-1, Q-1, R-2, S-2, T-3, U-4", "P-1, Q-2, R-1, S-3, T-4, U-2", "P-1, Q-1, R-2, S-2, T-4, U-3", "P-2, Q-1, R-3, S-2, T-4, U-1"], "ans": 2, "exp": "સાચો જવાબ: C) P-1 (A), Q-1 (A), R-2 (B), S-2 (B), T-4 (AB), U-3 (O). IAIA અને IAi બંને રક્તસમૂહ A દર્શાવે છે, IBIB અને IBi બંને રક્તસમૂહ B દર્શાવે છે, IAIB રક્તસમૂહ AB દર્શાવે છે, અને ii રક્તસમૂહ O દર્શાવે છે. અન્ય વિકલ્પોમાં જનોટાઇપ અને ફિનોટાઇપનું ખોટું જોડાણ છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક પરિવારમાં માતાનો રક્તસમૂહ B અને પિતાનો રક્તસમૂહ AB છે. તેમના સંતાનમાં નીચેનામાંથી કયો રક્તસમૂહ શક્ય નથી?", "opts": ["A", "B", "AB", "O"], "ans": 3, "exp": "સાચો જવાબ: D) O. માતાનો રક્તસમૂહ B હોવાથી તેનો જનોટાઇપ IBIB અથવા IBi હોઈ શકે, અને પિતાનો રક્તસમૂહ AB હોવાથી તેનો જનોટાઇપ IAIB છે. આ ક્રૉસમાં IA અથવા IB એલેલ્સ મળે છે, પરંતુ i એલેલ મળતો નથી. તેથી સંતાનનો રક્તસમૂહ O (ii) શક્ય નથી. અન્ય વિકલ્પો (A, B, AB) આ ક્રૉસમાં શક્ય છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક વ્યક્તિનો રક્તસમૂહ A છે અને તેના માતા-પિતા બંનેનો રક્તસમૂહ AB છે. આ પરિસ્થિતિ માટે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["આ પરિસ્થિતિ જનીનિક રીતે શક્ય નથી", "વ્યક્તિનો જનોટાઇપ IAi હોવો જોઈએ", "માતા-પિતા બંનેનો જનોટાઇપ IAIB છે", "આ પરિસ્થિતિ જનીનિક રીતે શક્ય છે"], "ans": 0, "exp": "સાચો જવાબ: A) આ પરિસ્થિતિ જનીનિક રીતે શક્ય નથી. આ વિધાન ખોટું છે કારણ કે માતા-પિતા બંનેનો જનોટાઇપ IAIB હોય તો તેમના સંતાનનો જનોટાઇપ IAIA અથવા IAIB હોઈ શકે, પરંતુ રક્તસમૂહ A માટે IAi જનોટાઇપ જરૂરી છે, જે આ ક્રૉસમાં શક્ય નથી. તેથી આ પરિસ્થિતિ જનીનિક રીતે અશક્ય છે. અન્ય વિકલ્પો આ પરિસ્થિતિને યોગ્ય રીતે સમજાવે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક વ્યક્તિનો રક્તસમૂહ O છે અને તેના પિતાનો રક્તસમૂહ AB છે. માતાનો શક્ય જનોટાઇપ કયો હશે?", "opts": ["IAIB", "IAi", "IBi", "ii"], "ans": 3, "exp": "સંતાનનો રક્તસમૂહ O (ii) હોવાથી, તેને માતા અને પિતા પાસેથી પ્રત્યેક i જનીન મળ્યું હોવું જોઈએ. પિતાનો રક્તસમૂહ AB (IAIB) છે, જેથી તે i જનીન આપી શકતો નથી. આથી માતાએ સંતાનને i જનીન આપ્યું હોવું જોઈએ, પરંતુ માતાનો જનોટાઇપ ii હોવો જરૂરી છે. IAIB, IAi, અને IBi જનોટાઇપ ધરાવતી માતા i જનીન આપી શકતી નથી, કારણ કે તેઓ A અથવા B એલિલ ધરાવે છે. આથી કેવળ ii જનોટાઇપ યોગ્ય છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "ABO રક્તસમૂહ વ્યવસ્થામાં, નીચેનામાંથી કયો જનોટાઇપ હોમોઝાયગસ નથી?", "opts": ["IAIA", "IAi", "IBIB", "ii"], "ans": 1, "exp": "હોમોઝાયગસ જનોટાઇપમાં બે સરખા એલિલ હોવા જોઈએ. IAIA, IBIB, અને ii બધા હોમોઝાયગસ છે. IAi હેટરોઝાયગસ છે, કારણ કે તે બે ભિન્ન એલિલ (IA અને i) ધરાવે છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક પરિવારમાં, માતા અને પિતા બંનેનો રક્તસમૂહ A છે, પરંતુ તેમના સંતાનનો રક્તસમૂહ O છે. આ કેસમાં માતા-પિતાના શક્ય જનોટાઇપ કયા હશે?", "opts": ["IAIA અને IAIA", "IAi અને IAi", "IAIA અને IAi", "IAIB અને IBi"], "ans": 1, "exp": "સંતાનનો રક્તસમૂહ O (ii) હોવાથી, તેને માતા અને પિતા પાસેથી પ્રત્યેક i જનીન મળ્યું હોવું જોઈએ. જો માતા-પિતા બંનેનો ફિનોટાઇપ A છે, પરંતુ તેમના જનોટાઇપ IAi હોવાનું કહેવાય, તો તેઓ i જનીન આપી શકે છે. IAIA જનોટાઇપ ધરાવતી વ્યક્તિ i જનીન આપી શકતી નથી. IAIB અને IBi જનોટાઇપ ધરાવતી વ્યક્તિઓ A અથવા B ફિનોટાઇપ ધરાવતી નથી. આથી કેવળ IAi અને IAi જનોટાઇપ યોગ્ય છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "ABO રક્તસમૂહ વ્યવસ્થામાં, નીચેનામાંથી કયો ફિનોટાઇપ અને જનોટાઇપ વચ્ચેનો સંબંધ ખોટો છે?", "opts": ["ફિનોટાઇપ A - જનોટાઇપ IAIA અથવા IAi", "ફિનોટાઇપ B - જનોટાઇપ IBIB અથવા IBi", "ફિનોટાઇપ AB - જનોટાઇપ IAIB", "ફિનોટાઇપ O - જનોટાઇપ IAi અથવા IBi"], "ans": 3, "exp": "ફિનોટાઇપ O ધરાવતી વ્યક્તિનો જનોટાઇપ કેવળ ii હોવો જોઈએ. IAi અથવા IBi જનોટાઇપ ધરાવતી વ્યક્તિઓનો ફિનોટાઇપ અનુક્રમે A અથવા B હશે. આથી વિકલ્પ D ખોટો છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક વ્યક્તિનો રક્તસમૂહ AB છે અને તેના સંતાનનો રક્તસમૂહ A છે. સંતાનના પિતા અથવા માતાનો શક્ય જનોટાઇપ કયો હોવો જોઈએ?", "opts": ["IAIA", "IAi", "IBi", "ii"], "ans": 2, "exp": "AB રક્તસમૂહ ધરાવતી વ્યક્તિનો જનોટાઇપ IAIB હશે. સંતાનનો રક્તસમૂહ A (IAIA અથવા IAi) હોવાથી, તેને IA અથવા i જનીન મળ્યું હોવું જોઈએ. AB વ્યક્તિ પાસેથી IA અથવા IB મળી શકે, પરંતુ સંતાનને IA મળ્યું છે. આથી બીજા માતા-પિતાએ i જનીન આપ્યું હોવું જોઈએ. આથી શક્ય જનોટાઇપ IBi હશે, કારણ કે તે IA અથવા i આપી શકે. IAIA અને IAi જનોટાઇપ ધરાવતી વ્યક્તિ i આપી શકતી નથી, જ્યારે ii જનોટાઇપ ધરાવતી વ્યક્તિ IA આપી શકતી નથી.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક વ્યક્તિનો રક્તસમૂહ O છે અને તેના પિતાનો રક્તસમૂહ A છે. માતાનો રક્તસમૂહ કયો હોવો જોઈએ જેથી સંતાનનો રક્તસમૂહ O થાય?", "opts": ["O અથવા A", "માત્ર O", "માત્ર B", "A અથવા B"], "ans": 0, "exp": "સંતાનનો રક્તસમૂહ O (ii) હોવો જોઈએ, જે માટે પિતા (IAi) અને માતા બંને પાસેથી 'i' એલિલ મળવું જરૂરી છે. પિતા પાસે IA અને i એલિલ છે, જેથી માતા પાસે 'i' એલિલ હોવું જરૂરી છે. માતા O (ii) અથવા A (IAi) હોવી જોઈએ. B અથવા AB રક્તસમૂહ ધરાવતી માતા પાસેથી 'i' એલિલ મળી શકતું નથી, જેથી B અને D ખોટા છે. માત્ર O હોવું જરૂરી નથી, કારણ કે A (IAi) માતા પણ 'i' એલિલ આપી શકે, જેથી B ખોટું છે.", "ref": "Std 12 - અધ્યાય 5: વંશાગતિ અને વૈવિધ્યતાના સિદ્ધાંતો", "ch": ""}, {"q": "ABO રક્તસમૂહ વ્યવસ્થામાં, નીચેનામાંથી કયો જનોટાઇપ હેટરોઝાયગસ છે પરંતુ ફિનોટાઇપમાં O રક્તસમૂહ દર્શાવે છે?", "opts": ["IAIA", "IAi", "ii", "કોઈપણ નહીં"], "ans": 3, "exp": "ABO રક્તસમૂહ વ્યવસ્થામાં, O રક્તસમૂહનો ફિનોટાઇપ માત્ર જ્યારે જનોટાઇપ ii હોય ત્યારે જ દેખાય છે. IAIA અને IAi જનોટાઇપ ધરાવતી વ્યક્તિઓ ક્રમશઃ A અને A ફિનોટાઇપ દર્શાવે છે. ii જનોટાઇપ હોમોઝાયગસ છે, હેટરોઝાયગસ નથી. આથી, કોઈપણ હેટરોઝાયગસ જનોટાઇપ O ફિનોટાઇપ દર્શાવતો નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાગતિ અને વૈવિધ્યતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક પરિવારમાં, પિતાનો રક્તસમૂહ AB છે અને માતાનો રક્તસમૂહ O છે. તેમના સંતાનમાં નીચેનામાંથી કયો રક્તસમૂહ શક્ય નથી?", "opts": ["A", "B", "AB", "O"], "ans": 2, "exp": "પિતાનો જનોટાઇપ IAIB છે અને માતાનો જનોટાઇપ ii છે. સંતાનને પિતા પાસેથી IA અથવા IB અને માતા પાસેથી i એલિલ મળશે. આથી, સંતાનનો રક્તસમૂહ A (IAi) અથવા B (IBi) હોવો જોઈએ. O (ii) રક્તસમૂહ પણ શક્ય છે જો સંતાનને પિતા પાસેથી IA અથવા IB ન મળે, પરંતુ પિતા AB હોવાથી તે શક્ય નથી. AB રક્તસમૂહ માટે સંતાનને પિતા પાસેથી IA અને IB બંને એલિલ મળવા જોઈએ, પરંતુ માતા પાસેથી માત્ર i જ મળે, જેથી AB શક્ય નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાગતિ અને વૈવિધ્યતાના સિદ્ધાંતો", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લો: 1. ABO રક્તસમૂહના જનોટાઇપ IAi ધરાવતી વ્યક્તિનો ફિનોટાઇપ A હોય છે. 2. ABO રક્તસમૂહના જનોટાઇપ IBi ધરાવતી વ્યક્તિનો ફિનોટાઇપ B હોય છે. 3. ABO રક્તસમૂહના જનોટાઇપ ii ધરાવતી વ્યક્તિનો ફિનોટાઇપ O હોય છે. 4. ABO રક્તસમૂહના જનોટાઇપ IAIB ધરાવતી વ્યક્તિનો ફિનોટાઇપ AB હોય છે. કયા વિધાનો સાચા છે?", "opts": ["1, 2, 3 અને 4", "1, 2 અને 3 માત્ર", "2, 3 અને 4 માત્ર", "1, 3 અને 4 માત્ર"], "ans": 0, "exp": "ABO રક્તસમૂહ વ્યવસ્થામાં, IA અને IB એલિલ ડોમિનન્ટ છે, જ્યારે i એલિલ રિસેસિવ છે. IAi જનોટાઇપ ધરાવતી વ્યક્તિનો ફિનોટાઇપ A હોય છે (વિધાન 1 સાચું). IBi જનોટાઇપ ધરાવતી વ્યક્તિનો ફિનોટાઇપ B હોય છે (વિધાન 2 સાચું). ii જનોટાઇપ ધરાવતી વ્યક્તિનો ફિનોટાઇપ O હોય છે (વિધાન 3 સાચું). IAIB જનોટાઇપ ધરાવતી વ્યક્તિનો ફિનોટાઇપ AB હોય છે (વિધાન 4 સાચું). આથી, બધા જ વિધાનો સાચા છે.", "ref": "Std 12 - અધ્યાય 5: વંશાગતિ અને વૈવિધ્યતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક વ્યક્તિનો રક્તસમૂહ O છે અને તેના માતા-પિતા બંનેમાં રક્તસમૂહ A અને B વરણી (alleles) ઉપસ્થિત છે. નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["માતા-પિતા બંનેએ હેટરોઝાયગસ જનોટાઇપ (IAi અને IBi) ધરાવતા હશે.", "માતા-પિતા બંનેએ હોમોઝાયગસ જનોટાઇપ (IAIA અને IBIB) ધરાવતા હશે.", "માતા-પિતા પૈકી એક હેટરોઝાયગસ (IAi અથવા IBi) અને બીજું હોમોઝાયગસ (IAIA અથવા IBIB) ધરાવતા હશે.", "માતા-પિતા બંનેએ હેટરોઝાયગસ જનોટાઇપ (IAIB) ધરાવતા હશે."], "ans": 0, "exp": "સરળતાથી કહીએ તો, O રક્તસમૂહ ધરાવતું સંતાન મેળવવા માટે માતા-પિતા બંનેએ i વરણી (allele) પસાર કરવી જરૂરી છે. A અને B રક્તસમૂહ ધરાવતા માતા-પિતા પૈકી O રક્તસમૂહ ધરાવતું સંતાન મેળવવા માટે, બંનેએ હેટરોઝાયગસ જનોટાઇપ (IAi અને IBi) ધરાવતા હોવા જરૂરી છે, કારણ કે તેઓ i વરણી પસાર કરી શકે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) હોમોઝાયગસ જનોટાઇપ (IAIA અથવા IBIB) ધરાવતા માતા-પિતા i વરણી પસાર કરી શકતા નથી. C) એક હેટરોઝાયગસ અને એક હોમોઝાયગસ ધરાવતા માતા-પિતા પૈકી, હોમોઝાયગસ વ્યક્તિ i વરણી પસાર કરી શકતી નથી. D) IAIB જનોટાઇપ ધરાવતા માતા-પિતા i વરણી પસાર કરી શકતા નથી.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વૈવિધ્યતા", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
