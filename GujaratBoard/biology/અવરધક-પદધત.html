<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>અવરોધક પદ્ધતિ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>અવરોધક પદ્ધતિ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">અવરોધક પદ્ધતિ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "અવરોધક પદ્ધતિ દરમિયાન જો કોષના કોષકેન્દ્રમાં DNA ની નકલ થવાની પ્રક્રિયા અવરોધાય છે, તો નીચેનામાંથી કયું પરિણામ સૌથી યોગ્ય રીતે લાગુ પડે?", "opts": ["કોષ વહેંચણી પૂર્ણ થશે પરંતુ અનુવંશિક માહિતી ગુમાવશે", "કોષ વહેંચણી અટકી જશે કારણ કે વર્ણસૂત્રોની નકલ થવી જરૂરી છે", "કોષ મૃત્યુ પામશે કારણ કે ઉર્જા ઉત્પન્ન થવી બંધ થશે", "કોષ સામાન્ય રીતે વહેંચણી કરશે પરંતુ નવા કોષોમાં DNA નહીં હોય"], "ans": 1, "exp": "કોષકેન્દ્રમાં DNA ની નકલ (રેપ્લિકેશન) વહેંચણી માટે આવશ્યક છે. જો આ પ્રક્રિયા અવરોધાય તો વર્ણસૂત્રોની નકલ ન થઈ શકે, જેના કારણે કોષ વહેંચણી (મિટોસિસ) અટકી જશે. વિકલ્પ A ખોટો છે કારણ કે અનુવંશિક માહિતી ગુમાવવી એ વહેંચણી પૂર્ણ થવાનું કારણ નથી. વિકલ્પ C ખોટો છે કારણ કે ઉર્જા ઉત્પન્ન થવી એ DNA રેપ્લિકેશન પર આધારિત નથી. વિકલ્પ D ખોટો છે કારણ કે DNA વગરના કોષો બનવું શક્ય નથી.", "ref": "Std 12 - અધ્યાય 4: કોષ વહેંચણી", "ch": ""}, {"q": "એક ઉત્સેચક અવરોધક પદ્ધતિ દ્વારા કોષમાં પ્રવેશે છે અને તે પ્રોટીન સંશ્લેષણને અવરોધે છે. આ સ્થિતિમાં કયું પરિણામ સૌથી યોગ્ય રીતે જોવા મળશે?", "opts": ["કોષમાં કાર્બોદિતનું પ્રમાણ વધશે", "કોષમાં ઉત્સેચકોનું પ્રમાણ ઘટશે અને ચયાપચય ક્રિયાઓ ધીમી પડશે", "કોષ તરત જ મૃત્યુ પામશે કારણ કે DNA ની માહિતી નષ્ટ થશે", "કોષમાં હોર્મોનનું ઉત્પાદન વધશે"], "ans": 1, "exp": "પ્રોટીન સંશ્લેષણ અવરોધાય તો ઉત્સેચકો (જે પ્રોટીન છે)નું ઉત્પાદન ઘટશે, જેના કારણે ચયાપચય ક્રિયાઓ ધીમી પડશે. વિકલ્પ A ખોટો છે કારણ કે કાર્બોદિતનું પ્રમાણ પ્રોટીન સંશ્લેષણ પર આધારિત નથી. વિકલ્પ C ખોટો છે કારણ કે DNA ની માહિતી નષ્ટ થવી એ પ્રોટીન સંશ્લેષણ અવરોધાય તેના પરિણામ રૂપ નથી. વિકલ્પ D ખોટો છે કારણ કે હોર્મોનનું ઉત્પાદન પ્રોટીન સંશ્લેષણ પર આધારિત નથી.", "ref": "Std 12 - અધ્યાય 5: પ્રોટીન સંશ્લેષણ અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "અવરોધક પદ્ધતિ દરમિયાન જો કોષના ચેતાતંત્ર સાથે સંકળાયેલા અંગમાં રાસાયણિક અવરોધકનો ઉપયોગ થાય છે, તો કયું પરિણામ સૌથી યોગ્ય રીતે જોવા મળશે?", "opts": ["કોષમાં પ્રકાશસંશ્લેષણની ક્રિયા વધશે", "કોષમાં સંકેત વહન (સિગ્નલ ટ્રાન્સડક્શન) અવરોધાશે", "કોષમાં શ્વસનની ક્રિયા ધીમી પડશે", "કોષમાં ઉત્સર્જનની ક્રિયા વધશે"], "ans": 1, "exp": "ચેતાતંત્ર સાથે સંકળાયેલા અંગમાં રાસાયણિક અવરોધકનો ઉપયોગ થાય તો સંકેત વહન (સિગ્નલ ટ્રાન્સડક્શન) અવરોધાશે, જેના કારણે કોષની પ્રતિક્રિયા ક્ષમતા ઘટશે. વિકલ્પ A, C, અને D ખોટા છે કારણ કે પ્રકાશસંશ્લેષણ, શ્વસન, અને ઉત્સર્જન એ ચેતાતંત્ર સાથે સીધા સંકળાયેલા નથી.", "ref": "Std 12 - અધ્યાય 10: ચેતાતંત્ર અને સંકેત વહન", "ch": ""}, {"q": "એક કોષમાં અવરોધક પદ્ધતિ દ્વારા DNA-આરએનએ ટ્રાન્સક્રિપ્શન અવરોધાય છે. આ સ્થિતિમાં કયું પરિણામ સૌથી યોગ્ય રીતે જોવા મળશે?", "opts": ["કોષમાં પ્રોટીન સંશ્લેષણ વધશે", "કોષમાં mRNA નું પ્રમાણ ઘટશે અને પ્રોટીન સંશ્લેષણ અવરોધાશે", "કોષમાં DNA ની નકલ વધશે", "કોષમાં ઉર્જા ઉત્પન્ન થવી બંધ થશે"], "ans": 1, "exp": "DNA-આરએનએ ટ્રાન્સક્રિપ્શન અવરોધાય તો mRNA નું પ્રમાણ ઘટશે, જેના કારણે પ્રોટીન સંશ્લેષણ અવરોધાશે. વિકલ્પ A ખોટો છે કારણ કે પ્રોટીન સંશ્લેષણ mRNA પર આધારિત છે. વિકલ્પ C ખોટો છે કારણ કે DNA ની નકલ ટ્રાન્સક્રિપ્શન પર આધારિત નથી. વિકલ્પ D ખોટો છે કારણ કે ઉર્જા ઉત્પન્ન થવી એ ટ્રાન્સક્રિપ્શન પર આધારિત નથી.", "ref": "Std 12 - અધ્યાય 5: પ્રોટીન સંશ્લેષણ અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "અવરોધક પદ્ધતિ દરમિયાન જો કોષમાં ઉત્સર્જન સાથે સંકળાયેલા અંગિકાઓ (ઓર્ગેનેલ્સ) ને અવરોધવામાં આવે, તો કયું પરિણામ સૌથી યોગ્ય રીતે જોવા મળશે?", "opts": ["કોષમાં પાણી અને ખનીજોનું પ્રમાણ વધશે", "કોષમાં કચરા પદાર્થોનું સંગ્રહણ થશે અને કોષ વિષાક્ત થશે", "કોષમાં પ્રકાશસંશ્લેષણની ક્રિયા વધશે", "કોષમાં હોર્મોનનું ઉત્પાદન વધશે"], "ans": 1, "exp": "ઉત્સર્જન સાથે સંકળાયેલા અંગિકાઓ અવરોધાય તો કચરા પદાર્થોનું સંગ્રહણ થશે, જેના કારણે કોષ વિષાક્ત થશે. વિકલ્પ A ખોટો છે કારણ કે પાણી અને ખનીજોનું પ્રમાણ ઉત્સર્જન પર આધારિત નથી. વિકલ્પ C અને D ખોટા છે કારણ કે પ્રકાશસંશ્લેષણ અને હોર્મોન ઉત્પાદન એ ઉત્સર્જન સાથે સીધા સંકળાયેલા નથી.", "ref": "Std 12 - અધ્યાય 9: ઉત્સર્જન અને કોષીય ચયાપચય", "ch": ""}, {"q": "અવરોધક પદ્ધતિ દરમિયાન જો કોષમાં ગ્લાયકોલાઇસિસની પ્રક્રિયા અવરોધાય છે, તો કયા અંગિકામાં સૌથી વધુ અસર થશે?", "opts": ["માઇટોકોન્ડ્રિયા", "રાઇબોઝોમ", "ક્લોરોપ્લાસ્ટ", "એન્ડોપ્લાઝમિક જાળક"], "ans": 0, "exp": "ગ્લાયકોલાઇસિસ સાયટોપ્લાઝમમાં થાય છે, પરંતુ તેના પરિણામે ઉત્પન્ન થતો પાયરુવેટ માઇટોકોન્ડ્રિયામાં જઈને ક્રેબ્સ ચક્રમાં પ્રવેશે છે. ગ્લાયકોલાઇસિસ અવરોધાશે તો માઇટોકોન્ડ્રિયામાં શ્વસનની પ્રક્રિયા અધૂરી રહેશે, જેથી માઇટોકોન્ડ્રિયા સૌથી વધુ અસરગ્રસ્ત થશે. રાઇબોઝોમ પ્રોટીન સંશ્લેષણ સાથે, ક્લોરોપ્લાસ્ટ પ્રકાશસંશ્લેષણ સાથે, અને એન્ડોપ્લાઝમિક જાળક લિપિડ અને પ્રોટીન સંશ્લેષણ સાથે સંકળાયેલા છે, જેથી આ અંગિકાઓ પર સીધી અસર થશે નહીં.", "ref": "Std 11 - અધ્યાય 14: શ્વસન અને ઉર્જા ઉત્પાદન", "ch": ""}, {"q": "એક કોષમાં અવરોધક પદ્ધતિ દ્વારા RNA પોલિમરેઝ ઉત્સેચક અવરોધાય છે. આ સ્થિતિમાં કયા પ્રક્રિયા સૌથી વધુ પ્રભાવિત થશે?", "opts": ["DNA ની નકલ", "ટ્રાન્સક્રિપ્શન", "ટ્રાન્સલેશન", "DNA મરામત"], "ans": 1, "exp": "RNA પોલિમરેઝ ઉત્સેચક ટ્રાન્સક્રિપ્શન પ્રક્રિયામાં મુખ્ય ભૂમિકા ભજવે છે, જેમાં DNA પરથી mRNA ની નકલ બનાવવામાં આવે છે. આ ઉત્સેચક અવરોધાશે તો ટ્રાન્સક્રિપ્શન પ્રક્રિયા અવરોધાશે. DNA ની નકલ (રેપ્લિકેશન) માટે DNA પોલિમરેઝ જરૂરી છે, ટ્રાન્સલેશન માટે રાઇબોઝોમ અને tRNA જરૂરી છે, અને DNA મરામત માટે વિવિધ મરામત ઉત્સેચકો જરૂરી છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "અવરોધક પદ્ધતિ દરમિયાન જો કોષમાં કેલ્શિયમ આયનના પ્રવેશને અવરોધવામાં આવે, તો કયા કોષીય પ્રક્રિયા પર સૌથી વધુ અસર થશે?", "opts": ["કોષ વિભાજન", "પ્રકાશસંશ્લેષણ", "પ્રોટીન સંશ્લેષણ", "સ્ફોટન (Exocytosis)"], "ans": 0, "exp": "કેલ્શિયમ આયન કોષ વિભાજન દરમિયાન મહત્વની ભૂમિકા ભજવે છે, ખાસ કરીને માઇટોસિસના મેટાફેઝ અને એનાફેઝ તબક્કામાં. કેલ્શિયમ આયનના અભાવે કોષ વિભાજનની પ્રક્રિયા અવરોધાશે. પ્રકાશસંશ્લેષણ માટે પ્રકાશ અને ક્લોરોફિલ જરૂરી છે, પ્રોટીન સંશ્લેષણ માટે રાઇબોઝોમ અને mRNA જરૂરી છે, અને સ્ફોટન માટે કોષરસની ગતિશીલતા જરૂરી છે.", "ref": "Std 11 - અધ્યાય 10: કોષ ચક્ર અને કોષ વિભાજન", "ch": ""}, {"q": "એક કોષમાં અવરોધક પદ્ધતિ દ્વારા સાયક્લિન-ડિપેન્ડન્ટ કિનેઝ (CDK) અવરોધાય છે. આ સ્થિતિમાં કયા તબક્કામાં કોષ અટકી જશે?", "opts": ["G1 તબક્કો", "S તબક્કો", "G2 તબક્કો", "M તબક્કો"], "ans": 3, "exp": "સાયક્લિન-ડિપેન્ડન્ટ કિનેઝ (CDK) કોષ ચક્રના વિવિધ તબક્કાઓમાં મહત્વની ભૂમિકા ભજવે છે, પરંતુ M તબક્કો (માઇટોસિસ) માટે તે અત્યંત આવશ્યક છે. CDK અવરોધાશે તો કોષ M તબક્કામાં પ્રવેશી શકશે નહીં અને કોષ ચક્ર અટકી જશે. G1, S, અને G2 તબક્કાઓમાં પણ CDKની ભૂમિકા છે, પરંતુ M તબક્કો સૌથી વધુ પ્રભાવિત થશે.", "ref": "Std 11 - અધ્યાય 10: કોષ ચક્ર અને કોષ વિભાજન", "ch": ""}, {"q": "અવરોધક પદ્ધતિ દરમિયાન જો કોષમાં માઇક્રોટ્યુબ્યુલ્સના નિર્માણને અવરોધવામાં આવે, તો કયા કોષીય રચના પર સૌથી વધુ અસર થશે?", "opts": ["સેન્ટ્રિઓલ", "સેન્ટ્રોમિયર", "માઇટોટિક સ્પિન્ડલ", "કોષરસજાળ"], "ans": 2, "exp": "માઇક્રોટ્યુબ્યુલ્સ માઇટોટિક સ્પિન્ડલની રચનામાં મુખ્ય ઘટક છે, જે કોષ વિભાજન દરમિયાન વર્ણસૂત્રોને અલગ પાડવામાં મદદ કરે છે. માઇક્રોટ્યુબ્યુલ્સના અભાવે માઇટોટિક સ્પિન્ડલ બનશે નહીં, જેથી કોષ વિભાજન અવરોધાશે. સેન્ટ્રિઓલ અને સેન્ટ્રોમિયર માઇક્રોટ્યુબ્યુલ્સના નિર્માણમાં મદદ કરે છે, પરંતુ તે સીધી રચના નથી. કોષરસજાળ માઇક્રોટ્યુબ્યુલ્સ પર આધારિત નથી.", "ref": "Std 11 - અધ્યાય 10: કોષ ચક્ર અને કોષ વિભાજન", "ch": ""}, {"q": "અવરોધક પદ્ધતિ દરમિયાન જો કોષમાં મિટોકોન્ડ્રિયામાં ATP સંશ્લેષણની પ્રક્રિયા અવરોધાય છે, તો કયું પરિણામ સૌથી યોગ્ય રીતે થશે?", "opts": ["કોષમાં ગ્લાયકોલાઇસિસની ગતિ વધશે", "કોષમાં ઓક્સિડેટિવ ફોસ્ફોરાઇલેશનની પ્રક્રિયા થંભી જશે", "કોષમાં પ્રકાશસંશ્લેષણની પ્રક્રિયા ત્વરિત થશે", "કોષમાં પ્રોટીન સંશ્લેષણની પ્રક્રિયા વધુ સક્રિય બનશે"], "ans": 1, "exp": "મિટોકોન્ડ્રિયામાં ATP સંશ્લેષણ ઓક્સિડેટિવ ફોસ્ફોરાઇલેશન દ્વારા થાય છે. જો આ પ્રક્રિયા અવરોધાય, તો ઓક્સિડેટિવ ફોસ્ફોરાઇલેશન થંભી જશે. ગ્લાયકોલાઇસિસ મિટોકોન્ડ્રિયામાં નહીં પણ સાયટોપ્લાઝમમાં થાય છે, તેથી તેની ગતિ પર અસર થશે નહીં. પ્રકાશસંશ્લેષણ ક્લોરોપ્લાસ્ટમાં થાય છે અને પ્રોટીન સંશ્લેષણ રાઇબોઝોમ પર થાય છે, તેથી આ બંને પ્રક્રિયાઓ પર અસર થશે નહીં.", "ref": "Std 11 - Chapter 14: શ્વસન અને ઉર્જા ઉત્પાદન", "ch": ""}, {"q": "અવરોધક પદ્ધતિ દ્વારા કોષમાં રાઇબોઝોમના 60S અને 40S ઉપએકમોના જોડાણને અવરોધવામાં આવે છે. આ સ્થિતિમાં કયું પરિણામ જોવા મળશે?", "opts": ["mRNA નું ટ્રાન્સલેશન પૂર્ણ થશે નહીં", "DNA ની રેપ્લિકેશન પ્રક્રિયા અવરોધાશે", "કોષમાં લિપિડ સંશ્લેષણ વધશે", "કોષમાં કાર્બોદિતના ભંગણની પ્રક્રિયા ત્વરિત થશે"], "ans": 0, "exp": "રાઇબોઝોમના 60S અને 40S ઉપએકમોના જોડાણ વિના mRNA નું ટ્રાન્સલેશન શક્ય નથી, કારણ કે આ જોડાણ પ્રોટીન સંશ્લેષણ માટે આવશ્યક છે. DNA રેપ્લિકેશન, લિપિડ સંશ્લેષણ અને કાર્બોદિત ભંગણ એ રાઇબોઝોમના કામકાજ પર આધારિત નથી, તેથી આ પ્રક્રિયાઓ પર અસર થશે નહીં.", "ref": "Std 11 - Chapter 15: જીવરસાયણ અને કોષીય શ્વસન", "ch": ""}, {"q": "અવરોધક પદ્ધતિ દરમિયાન કોષમાં કેલ્શિયમ આયનના સંગ્રહને અવરોધવામાં આવે છે. આ સ્થિતિમાં કયા કોષીય પ્રક્રિયા પર સૌથી વધુ અસર થશે?", "opts": ["કોષવિભાજન દરમિયાન ક્રોમોસોમના વિભાજન", "કોષમાં ગ્લુકોઝના પરિવહન", "કોષમાં RNA નું ટ્રાન્સક્રિપ્શન", "કોષમાં લિપિડનું ભંગણ"], "ans": 0, "exp": "કેલ્શિયમ આયન કોષવિભાજન દરમિયાન ક્રોમોસોમના વિભાજન માટે આવશ્યક છે, ખાસ કરીને મિટોટિક સ્પિન્ડલના નિર્માણ અને કામકાજ માટે. ગ્લુકોઝ પરિવહન, RNA ટ્રાન્સક્રિપ્શન અને લિપિડ ભંગણ માટે કેલ્શિયમ આયનની આવશ્યકતા નથી, તેથી આ પ્રક્રિયાઓ પર અસર થશે નહીં.", "ref": "Std 11 - Chapter 10: કોષ ચક્ર અને કોષવિભાજન", "ch": ""}, {"q": "અવરોધક પદ્ધતિ દ્વારા કોષમાં સાયટોક્રોમ C ની ક્રિયા અવરોધાય છે. આ સ્થિતિમાં કયું પરિણામ જોવા મળશે?", "opts": ["કોષમાં ઇલેક્ટ્રોન પરિવહન શૃંખલા થંભી જશે", "કોષમાં ગ્લાયકોલાઇસિસની પ્રક્રિયા ત્વરિત થશે", "કોષમાં પ્રકાશસંશ્લેષણની પ્રક્રિયા અવરોધાશે", "કોષમાં DNA ની મરામતની પ્રક્રિયા વધશે"], "ans": 0, "exp": "સાયટોક્રોમ C ઇલેક્ટ્રોન પરિવહન શૃંખલામાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે. જો તેની ક્રિયા અવરોધાય, તો ઇલેક્ટ્રોન પરિવહન શૃંખલા થંભી જશે. ગ્લાયકોલાઇસિસ, પ્રકાશસંશ્લેષણ અને DNA મરામતની પ્રક્રિયાઓ સાયટોક્રોમ C પર આધારિત નથી, તેથી આ પ્રક્રિયાઓ પર અસર થશે નહીં.", "ref": "Std 11 - Chapter 14: શ્વસન અને ઉર્જા ઉત્પાદન", "ch": ""}, {"q": "અવરોધક પદ્ધતિ દરમિયાન કોષમાં ટેલોમેરેઝ ઉત્સેચકની ક્રિયા અવરોધાય છે. આ સ્થિતિમાં કયું પરિણામ સૌથી યોગ્ય રીતે થશે?", "opts": ["કોષમાં કોષવિભાજનની પ્રક્રિયા અવરોધાશે", "કોષમાં DNA ની રેપ્લિકેશનની પ્રક્રિયા ત્વરિત થશે", "કોષમાં ટેલોમિયરની લંબાઈ ઘટશે", "કોષમાં પ્રોટીન સંશ્લેષણની પ્રક્રિયા અવરોધાશે"], "ans": 2, "exp": "ટેલોમેરેઝ ઉત્સેચક ટેલોમિયરની લંબાઈ જાળવી રાખવા માટે જવાબદાર છે. જો આ ઉત્સેચકની ક્રિયા અવરોધાય, તો ટેલોમિયરની લંબાઈ ઘટશે. કોષવિભાજન, DNA રેપ્લિકેશન અને પ્રોટીન સંશ્લેષણ પર ટેલોમેરેઝની અસર સીધી રીતે નહીં થાય, તેથી આ પ્રક્રિયાઓ પર અસર થશે નહીં.", "ref": "Std 12 - Chapter 6: આણ્વિક આનુવંશિકતા", "ch": ""}, {"q": "એક કોષમાં અવરોધક પદ્ધતિ દ્વારા હિસ્ટોન પ્રોટીનના એસિટાઇલેશનને અવરોધવામાં આવે છે. આ સ્થિતિમાં નીચેનામાંથી કયું પરિણામ સંભવિત નથી?", "opts": ["ક્રોમેટિનનું સંકોચન વધશે અને જનીન અભિવ્યક્તિ ઘટશે", "ટ્રાન્સક્રિપ્શન ફેક્ટર્સનું DNA સાથે જોડાણ વધશે અને જનીન અભિવ્યક્તિ વધશે", "કોષચક્રના G1 તબક્કામાં અટકાવ થઈ શકે છે", "DNA નુકસાનની સુધારણા પ્રક્રિયા પ્રભાવિત થઈ શકે છે"], "ans": 1, "exp": "હિસ્ટોન પ્રોટીનના એસિટાઇલેશનથી ક્રોમેટિનનું સંકોચન ઘટે છે અને જનીન અભિવ્યક્તિ વધે છે. જ્યારે આ પ્રક્રિયા અવરોધાય ત્યારે ક્રોમેટિન સંકોચાય છે અને જનીન અભિવ્યક્તિ ઘટે છે. તેથી ટ્રાન્સક્રિપ્શન ફેક્ટર્સનું DNA સાથે જોડાણ વધવું શક્ય નથી. વિકલ્પ A, C અને D એ હિસ્ટોન ડીએસિટાઇલેશનના સાચા પરિણામો છે, જ્યારે વિકલ્પ B ખોટો છે કારણ કે જનીન અભિવ્યક્તિ ઘટે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "અવરોધક પદ્ધતિ દરમિયાન કોષમાં p53 પ્રોટીનની ક્રિયાને અવરોધવામાં આવે છે. આ સ્થિતિમાં નીચેનામાંથી કયું પરિણામ સંભવિત નથી?", "opts": ["DNA નુકસાનની સુધારણા પ્રક્રિયા અવરોધાશે", "કોષચક્રના G1 તબક્કામાં અટકાવ થશે નહીં", "એપોપ્ટોસિસની પ્રક્રિયા વધશે", "કોષનું અનિયંત્રિત વિભાજન થઈ શકે છે"], "ans": 2, "exp": "p53 પ્રોટીન DNA નુકસાનની સુધારણા અને કોષચક્રના નિયંત્રણમાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે. તેની ક્રિયા અવરોધાતા DNA નુકસાનની સુધારણા અવરોધાય છે, કોષચક્રનો અટકાવ થતો નથી અને અનિયંત્રિત વિભાજન થઈ શકે છે. પરંતુ એપોપ્ટોસિસની પ્રક્રિયા ઘટશે, નહીં કે વધશે. તેથી વિકલ્પ C ખોટો છે.", "ref": "Std 12 - પ્રકરણ 10: માનવ કલ્યાણમાં જીવવિજ્ઞાન", "ch": ""}, {"q": "એક પ્રયોગમાં અવરોધક પદ્ધતિ દ્વારા કોષમાં પ્રોટીઓઝોમની ક્રિયાને અવરોધવામાં આવે છે. આ સ્થિતિમાં નીચેનામાંથી કયું પરિણામ સંભવિત છે?", "opts": ["કોષમાં પ્રોટીનનું અપચય વધશે", "કોષમાં નુકસાનકારક પ્રોટીનનું સંચય થશે", "કોષચક્રના નિયંત્રણમાં વધારો થશે", "યુબિક્વિટિન-પ્રોટીન કોન્જુગેટ્સનું નિર્માણ વધશે"], "ans": 1, "exp": "પ્રોટીઓઝોમ કોષમાં પ્રોટીનના અપચય માટે જવાબદાર છે. તેની ક્રિયા અવરોધાતા પ્રોટીનનું અપચય ઘટે છે અને નુકસાનકારક પ્રોટીનનું સંચય થાય છે. વિકલ્પ A ખોટો છે કારણ કે પ્રોટીનનું અપચય ઘટશે. વિકલ્પ C ખોટો છે કારણ કે પ્રોટીઓઝોમના અવરોધથી કોષચક્રનું નિયંત્રણ ઘટશે. વિકલ્પ D ખોટો છે કારણ કે યુબિક્વિટિન-પ્રોટીન કોન્જુગેટ્સનું નિર્માણ પ્રોટીઓઝોમની ક્રિયા પર આધારિત નથી.", "ref": "Std 12 - પ્રકરણ 9: બાયોટેકનોલોજી: સિદ્ધાંતો અને પ્રક્રિયાઓ", "ch": ""}, {"q": "અવરોધક પદ્ધતિ દરમિયાન કોષમાં ગ્લાયકોસાઇલેશન પ્રક્રિયાને અવરોધવામાં આવે છે. આ સ્થિતિમાં નીચેનામાંથી કયું પરિણામ સંભવિત નથી?", "opts": ["કોષપટલ પર ગ્લાયકોપ્રોટીનનું નિર્માણ ઘટશે", "પ્રોટીનનું સ્થિરીકરણ અને કાર્ય પ્રભાવિત થશે", "કોષીય સંકેતન પ્રક્રિયા અવરોધાશે", "પ્રોટીનનું સંસ્લેષણ સંપૂર્ણપણે બંધ થઈ જશે"], "ans": 3, "exp": "ગ્લાયકોસાઇલેશન પ્રક્રિયા પ્રોટીનના કાર્ય અને સ્થિરીકરણ માટે મહત્વપૂર્ણ છે. તેના અવરોધથી ગ્લાયકોપ્રોટીનનું નિર્માણ ઘટે છે, પ્રોટીનનું કાર્ય પ્રભાવિત થાય છે અને કોષીય સંકેતન પ્રક્રિયા અવરોધાય છે. પરંતુ પ્રોટીનનું સંસ્લેષણ સંપૂર્ણપણે બંધ થતું નથી, તેથી વિકલ્પ D ખોટો છે.", "ref": "Std 11 - પ્રકરણ 9: બાયોમોલેક્યુલ્સ", "ch": ""}, {"q": "એક કોષમાં અવરોધક પદ્ધતિ દ્વારા NF-κB સંકેતન માર્ગને અવરોધવામાં આવે છે. આ સ્થિતિમાં નીચેનામાંથી કયું પરિણામ સંભવિત નથી?", "opts": ["બળતરા પ્રતિભાવ ઘટશે", "કોષીય પ્રતિરક્ષા પ્રતિભાવ વધશે", "કોષીય અસ્તિત્વ અને પ્રસાર ઘટશે", "એપોપ્ટોસિસની પ્રક્રિયા વધશે"], "ans": 1, "exp": "NF-κB સંકેતન માર્ગ બળતરા અને પ્રતિરક્ષા પ્રતિભાવમાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે. તેના અવરોધથી બળતરા પ્રતિભાવ ઘટે છે, કોષીય અસ્તિત્વ અને પ્રસાર ઘટે છે, અને એપોપ્ટોસિસ વધે છે. પરંતુ કોષીય પ્રતિરક્ષા પ્રતિભાવ ઘટશે, નહીં કે વધશે. તેથી વિકલ્પ B ખોટો છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}];

      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
