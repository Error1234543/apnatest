<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inducer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Inducer</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Inducer</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>

પ્શન માટે જવાબદાર છે, પરંતુ તે ઓપરેટર સાથે બંધન કરતું નથી. β-ગેલેક્ટોઝિડેઝ ઉત્સેચક છે, રિપ્રેસર નહીં.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "લેક્ટોઝ ઓપરોનમાં, ઇન્ડ્યુસરની હાજરીમાં કયા જનીનનું ટ્રાન્સક્રિપ્શન સૌથી પહેલા થાય છે?", "opts": ["lacZ", "lacY", "lacA", "lacI"], "ans": 0, "exp": "lacZ જનીન β-ગેલેક્ટોઝિડેઝ ઉત્સેચક માટે કોડ કરે છે અને ઇન્ડ્યુસરની હાજરીમાં સૌથી પહેલા ટ્રાન્સક્રાઇબ થાય છે. lacY અને lacA પણ ટ્રાન્સક્રાઇબ થાય છે, પરંતુ lacZ પહેલા થાય છે. lacI રિપ્રેસર પ્રોટીન માટે કોડ કરે છે અને તે ઇન્ડ્યુસરની હાજરીમાં ટ્રાન્સક્રાઇબ થતું નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન ઇન્ડ્યુસરની વ્યાખ્યા અને કાર્ય માટે અયોગ્ય છે?", "opts": ["ઇન્ડ્યુસર એવો નાનો અણુ છે જે રિપ્રેસર પ્રોટીન સાથે જોડાઈને તેને ઓપરેટર સાથે બંધન કરતા અટકાવે છે.", "ઇન્ડ્યુસરની હાજરીમાં ટ્રાન્સક્રિપ્શન પ્રક્રિયા શરૂ થાય છે કારણ કે તે રિપ્રેસરને નિષ્ક્રિય કરે છે.", "ઇન્ડ્યુસર હંમેશા બાહ્ય પર્યાવરણમાંથી આવે છે અને કોષ દ્વારા સંશ્લેષિત થતો નથી.", "ઇન્ડ્યુસર જનીન અભિવ્યક્તિને નિયંત્રિત કરવામાં મહત્ત્વનો ભાગ ભજવે છે, જેમ કે લેક્ટોઝ ઓપરોનમાં અલોલેક્ટોઝ."], "ans": 2, "exp": "વિકલ્પ C ખોટો છે કારણ કે ઇન્ડ્યુસર હંમેશા બાહ્ય પર્યાવરણમાંથી આવતો નથી. ઉદાહરણ તરીકે, લેક્ટોઝ ઓપરોનમાં અલોલેક્ટોઝ (ઇન્ડ્યુસર) લેક્ટોઝમાંથી કોષ દ્વારા જ ઉત્પન્ન થાય છે. વિકલ્પ A, B અને D ઇન્ડ્યુસરની સાચી વ્યાખ્યા અને કાર્ય દર્શાવે છે. ઇન્ડ્યુસર રિપ્રેસર પ્રોટીનને નિષ્ક્રિય કરીને ટ્રાન્સક્રિપ્શન શરૂ કરવામાં મદદ કરે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ભિન્નતાનું આણ્વિક આધાર", "ch": ""}, {"q": "એક પ્રયોગમાં, *E. coli* ના કોષોમાં લેક્ટોઝ ઓપરોનના નિયંત્રણમાં ફેરફાર કરવામાં આવ્યો છે જેથી રિપ્રેસર પ્રોટીન ઇન્ડ્યુસર સાથે જોડાઈ શકે નહીં. આ પરિસ્થિતિમાં નીચેનામાંથી કયું પરિણામ સંભવિત છે?", "opts": ["લેક્ટોઝ ઓપરોનનું ટ્રાન્સક્રિપ્શન સતત થતું રહેશે, પછી ભલે ઇન્ડ્યુસર હાજર હોય કે ન હોય.", "લેક્ટોઝ ઓપરોનનું ટ્રાન્સક્રિપ્શન ક્યારેય થશે નહીં, કારણ કે રિપ્રેસર હંમેશા ઓપરેટર સાથે જોડાયેલો રહેશે.", "ઇન્ડ્યુસરની હાજરીમાં પણ લેક્ટોઝ ઓપરોનનું ટ્રાન્સક્રિપ્શન થશે નહીં, કારણ કે રિપ્રેસર નિષ્ક્રિય થઈ શકશે નહીં.", "લેક્ટોઝ ઓપરોનનું ટ્રાન્સક્રિપ્શન માત્ર ગ્લુકોઝની ગેરહાજરીમાં થશે, કારણ કે CAP પ્રોટીનની જરૂર પડશે."], "ans": 2, "exp": "વિકલ્પ C સાચો છે કારણ કે જો રિપ્રેસર પ્રોટીન ઇન્ડ્યુસર સાથે જોડાઈ શકતો નથી, તો તે નિષ્ક્રિય થઈ શકશે નહીં. આથી, રિપ્રેસર ઓપરેટર સાથે જોડાયેલો રહેશે અને ટ્રાન્સક્રિપ્શન અટકાવશે, પછી ભલે ઇન્ડ્યુસર હાજર હોય. વિકલ્પ A ખોટો છે કારણ કે રિપ્રેસર હંમેશા સક્રિય રહેશે. વિકલ્પ B ખોટો છે કારણ કે રિપ્રેસર ઓપરેટર સાથે જોડાયેલો રહેશે, પરંતુ ઇન્ડ્યુસરની ગેરહાજરીમાં પણ આ પરિસ્થિતિ લાગુ પડે છે. વિકલ્પ D ખોટો છે કારણ કે CAP પ્રોટીનની ભૂમિકા અહીં મુખ્ય નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ભિન્નતાનું આણ્વિક આધાર", "ch": ""}, {"q": "નીચેના પૈકી કયું સંયોજન પ્રોકેરિયોટિક કોષોમાં ઇન્ડ્યુસર તરીકે કાર્ય કરી શકે છે, પરંતુ યુકેરિયોટિક કોષોમાં તેનું કાર્ય અલગ હોય છે?", "opts": ["લેક્ટોઝ", "ગ્લુકોઝ", "સ્ટેરોઇડ હોર્મોન", "એમિનો એસિડ"], "ans": 2, "exp": "સ્ટેરોઇડ હોર્મોન યુકેરિયોટિક કોષોમાં રિસેપ્ટર પ્રોટીન સાથે જોડાઈને જનીન અભિવ્યક્તિને નિયંત્રિત કરે છે, જ્યારે પ્રોકેરિયોટિક કોષોમાં તે ઇન્ડ્યુસર તરીકે કાર્ય કરી શકે છે. લેક્ટોઝ માત્ર પ્રોકેરિયોટિક કોષોમાં ઇન્ડ્યુસર તરીકે કાર્ય કરે છે. ગ્લુકોઝ અને એમિનો એસિડ સામાન્ય રીતે ઇન્ડ્યુસર તરીકે કાર્ય કરતા નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન ઇન્ડ્યુસરના કાર્ય માટે ખોટું છે?", "opts": ["ઇન્ડ્યુસર રિપ્રેસર પ્રોટીન સાથે જોડાઈને તેને નિષ્ક્રિય કરે છે", "ઇન્ડ્યુસર હંમેશા જનીન અભિવ્યક્તિને ઉત્તેજે છે", "ઇન્ડ્યુસર કેટલાક કિસ્સામાં એન્ઝાઇમની પ્રવૃત્તિને પણ અસર કરી શકે છે", "ઇન્ડ્યુસરની ગેરહાજરીમાં પણ કેટલાક ઓપરોન સક્રિય રહી શકે છે"], "ans": 1, "exp": "ઇન્ડ્યુસર હંમેશા જનીન અભિવ્યક્તિને ઉત્તેજે છે એ વિધાન ખોટું છે, કારણ કે કેટલાક કિસ્સામાં ઇન્ડ્યુસરની હાજરી જનીન અભિવ્યક્તિને અટકાવી શકે છે (દા.ત. ટ્રિપ્ટોફાન ઓપરોન). અન્ય વિકલ્પો સાચાં છે: ઇન્ડ્યુસર રિપ્રેસરને નિષ્ક્રિય કરે છે, એન્ઝાઇમ પ્રવૃત્તિને અસર કરી શકે છે, અને કેટલાક ઓપરોન ઇન્ડ્યુસર વગર પણ સક્રિય રહે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક સંશોધકને એક નવો પ્રોકેરિયોટિક ઓપરોન મળ્યો છે જેનું નિયંત્રણ લેક્ટોઝ ઓપરોનથી અલગ છે. આ ઓપરોનમાં ઇન્ડ્યુસરની હાજરીમાં રિપ્રેસર પ્રોટીન ઓપરેટર સાથે જોડાય છે. આ પરિસ્થિતિમાં નીચેના પૈકી કયું સંભવિત છે?", "opts": ["આ ઓપરોનનું ટ્રાન્સક્રિપ્શન ઇન્ડ્યુસરની હાજરીમાં થશે", "આ ઓપરોનનું ટ્રાન્સક્રિપ્શન ઇન્ડ્યુસરની ગેરહાજરીમાં થશે", "આ ઓપરોનનું ટ્રાન્સક્રિપ્શન ક્યારેય થશે નહીં", "આ ઓપરોનનું નિયંત્રણ લેક્ટોઝ ઓપરોન જેવું જ હશે"], "ans": 1, "exp": "આ પરિસ્થિતિમાં, ઇન્ડ્યુસરની હાજરીમાં રિપ્રેસર ઓપરેટર સાથે જોડાય છે, જે લેક્ટોઝ ઓપરોનથી વિપરીત છે. આથી ઇન્ડ્યુસરની ગેરહાજરીમાં ઓપરોન સક્રિય રહેશે અને ટ્રાન્સક્રિપ્શન થશે. ઇન્ડ્યુસરની હાજરીમાં ઓપરોન નિષ્ક્રિય થશે. આથી વિકલ્પ B સાચો છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેના પૈકી કયું ઉદાહરણ ઇન્ડ્યુસરના કાર્ય સાથે સીધો સંબંધ ધરાવતું નથી?", "opts": ["લેક્ટોઝ ઓપરોનમાં લેક્ટોઝનું કાર્ય", "ટ્રિપ્ટોફાન ઓપરોનમાં ટ્રિપ્ટોફાનનું કાર્ય", "લેક ઓપરોનમાં cAMP-CAP કોમ્પ્લેક્સનું નિર્માણ", "ગ્લુકોઝની હાજરીમાં લેક્ટોઝ ઓપરોનનું નિષ્ક્રિયકરણ"], "ans": 2, "exp": "ટ્રિપ્ટોફાન ઓપરોનમાં ટ્રિપ્ટોફાન કોરિપ્રેસર તરીકે કાર્ય કરે છે, ઇન્ડ્યુસર તરીકે નહીં. લેક્ટોઝ ઓપરોનમાં લેક્ટોઝ ઇન્ડ્યુસર તરીકે કાર્ય કરે છે. cAMP-CAP કોમ્પ્લેક્સ ઇન્ડ્યુસર નથી, પરંતુ તે લેક્ટોઝ ઓપરોનના નિયંત્રણમાં મહત્ત્વપૂર્ણ ભૂમિકા ભજવે છે. ગ્લુકોઝની હાજરીમાં લેક્ટોઝ ઓપરોનનું નિષ્ક્રિયકરણ કેટાબોલાઇટ રિપ્રેશન સાથે સંબંધિત છે, જે ઇન્ડ્યુસરના કાર્ય સાથે સીધો સંબંધ ધરાવતું નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેક્ટોઝ ઓપરોનમાં, જ્યારે અલોલેક્ટોઝ (ઇન્ડ્યુસર) હાજર હોય ત્યારે નીચેના પૈકી કયો પ્રોટીન કોમ્પ્લેક્સ બનવાનું બંધ થાય છે અને ટ્રાન્સક્રિપ્શનને અવરોધે છે?", "opts": ["RNA પોલિમરેઝ + સિગ્મા ફેક્ટર", "રિપ્રેસર પ્રોટીન + ઓપરેટર DNA", "CAP પ્રોટીન + cAMP", "લેક્ટોઝ પર્મિયેઝ + લેક્ટોઝ"], "ans": 1, "exp": "અલોલેક્ટોઝ (ઇન્ડ્યુસર) હાજર હોવાથી રિપ્રેસર પ્રોટીનનો કોન્ફોર્મેશનલ બદલાવ થાય છે, જેથી તે ઓપરેટર DNA સાથે બંધન કરવાનું બંધ થાય છે. આથી ટ્રાન્સક્રિપ્શનને અવરોધતો રિપ્રેસર-ઓપરેટર કોમ્પ્લેક્સ તૂટી જાય છે. A) RNA પોલિમરેઝ + સિગ્મા ફેક્ટર ટ્રાન્સક્રિપ્શન શરૂ કરવા માટે જરૂરી છે, પરંતુ ઇન્ડ્યુસરની હાજરીથી તે અવરોધાતું નથી. C) CAP પ્રોટીન + cAMP ટ્રાન્સક્રિપ્શનને ઉત્તેજે છે, ઇન્ડ્યુસરની હાજરીથી તે અવરોધાતું નથી. D) લેક્ટોઝ પર્મિયેઝ લેક્ટોઝના પરિવહનમાં સામેલ છે, પરંતુ ઇન્ડ્યુસરની હાજરીથી તે બંધ થતું નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "લેક્ટોઝ ઓપરોનમાં, ઇન્ડ્યુસર તરીકે કાર્ય કરતા અલોલેક્ટોઝની સાંદ્રતા વધારતાં, નીચેના પૈકી કયું પરિણામ થશે?", "opts": ["લેક રિપ્રેસર પ્રોટીનનું ઓપરેટર સાથેનું બંધન મજબૂત બનશે", "RNA પોલિમરેઝનું પ્રમોટર સાથેનું બંધન વધુ કુશળતાપૂર્વક થશે", "β-ગેલેક્ટોઝિડેઝ ઉત્સેચકનું સંશ્લેષણ ઘટશે", "કેપ (CAP) પ્રોટીનનું cAMP સાથેનું બંધન તૂટશે"], "ans": 1, "exp": "અલોલેક્ટોઝ (ઇન્ડ્યુસર)ની સાંદ્રતા વધારતાં, તે લેક રિપ્રેસર સાથે બંધન કરે છે, જેથી રિપ્રેસર ઓપરેટરથી અલગ થાય છે. આથી RNA પોલિમરેઝ પ્રમોટર સાથે બંધન કરી શકે છે અને ટ્રાન્સક્રિપ્શન શરૂ થાય છે. A) ખોટું છે કારણ કે ઇન્ડ્યુસર રિપ્રેસરને ઓપરેટરથી અલગ કરે છે, બંધન મજબૂત નથી થતું. C) ખોટું છે કારણ કે β-ગેલેક્ટોઝિડેઝનું સંશ્લેષણ વધશે, ઘટશે નહીં. D) ખોટું છે કારણ કે કેપ પ્રોટીન અને cAMPનું બંધન ઇન્ડ્યુસરની સાંદ્રતાથી પ્રભાવિત થતું નથી.", "ref": "Std 12 - Chapter 6: જીન અભિવ્યક્તિ અને નિયંત્રણ (લેક્ટોઝ ઓપરોન)", "ch": ""}, {"q": "નીચેના પૈકી કયું સંયોજન લેક્ટોઝ ઓપરોનમાં ઇન્ડ્યુસર તરીકે કાર્ય કરતું નથી, પરંતુ તેની રચના ઇન્ડ્યુસરની હાજરીમાં થાય છે?", "opts": ["અલોલેક્ટોઝ", "β-ગેલેક્ટોઝિડેઝ", "લેક્ટોઝ", "cAMP"], "ans": 1, "exp": "β-ગેલેક્ટોઝિડેઝ એ ઉત્સેચક છે જે ઇન્ડ્યુસર (અલોલેક્ટોઝ)ની હાજરીમાં સંશ્લેષિત થાય છે, પરંતુ તે ઇન્ડ્યુસર તરીકે કાર્ય કરતું નથી. A) અલોલેક્ટોઝ ઇન્ડ્યુસર છે. C) લેક્ટોઝ ઇન્ડ્યુસર તરીકે કાર્ય કરે છે. D) cAMP એ સેકન્ડ મેસેંજર છે, ઇન્ડ્યુસર નથી.", "ref": "Std 12 - Chapter 6: જીન અભિવ્યક્તિ અને નિયંત્રણ (લેક્ટોઝ ઓપરોન)", "ch": ""}, {"q": "લેક્ટોઝ ઓપરોનમાં, ઇન્ડ્યુસરની હાજરીમાં નીચેના પૈકી કયો પ્રોટીન કોમ્પ્લેક્સ બનતો નથી?", "opts": ["લેક રિપ્રેસર - અલોલેક્ટોઝ", "RNA પોલિમરેઝ - પ્રમોટર", "કેપ પ્રોટીન - cAMP - DNA", "લેક રિપ્રેસર - ઓપરેટર"], "ans": 3, "exp": "ઇન્ડ્યુસર (અલોલેક્ટોઝ)ની હાજરીમાં, લેક રિપ્રેસર ઓપરેટર સાથે બંધન કરતું નથી, પરંતુ અલોલેક્ટોઝ સાથે બંધન કરે છે. A) લેક રિપ્રેસર - અલોલેક્ટોઝ કોમ્પ્લેક્સ બને છે. B) RNA પોલિમરેઝ પ્રમોટર સાથે બંધન કરે છે. C) કેપ પ્રોટીન - cAMP - DNA કોમ્પ્લેક્સ બને છે. D) લેક રિપ્રેસર ઓપરેટર સાથે બંધન કરતું નથી, તેથી આ કોમ્પ્લેક્સ બનતો નથી.", "ref": "Std 12 - Chapter 6: જીન અભિવ્યક્તિ અને નિયંત્રણ (લેક્ટોઝ ઓપરોન)", "ch": ""}, {"q": "લેક્ટોઝ ઓપરોનમાં, ઇન્ડ્યુસરની હાજરીમાં નીચેના પૈકી કયું પરિણામ થતું નથી?", "opts": ["લેક રિપ્રેસર પ્રોટીનનું કોન્ફોર્મેશનલ બદલાવ થાય છે", "RNA પોલિમરેઝનું ટ્રાન્સક્રિપ્શન દર વધે છે", "કેપ પ્રોટીનનું cAMP સાથેનું બંધન તૂટે છે", "લેક Z, લેક Y, અને લેક A જનીનનું ટ્રાન્સક્રિપ્શન થાય છે"], "ans": 2, "exp": "ઇન્ડ્યુસરની હાજરીમાં કેપ પ્રોટીન અને cAMPનું બંધન તૂટતું નથી, પરંતુ તે DNA સાથે બંધન કરે છે અને ટ્રાન્સક્રિપ્શનને ઉત્તેજે છે. A) લેક રિપ્રેસર પ્રોટીનનું કોન્ફોર્મેશનલ બદલાવ થાય છે. B) RNA પોલિમરેઝનું ટ્રાન્સક્રિપ્શન દર વધે છે. D) લેક Z, લેક Y, અને લેક A જનીનનું ટ્રાન્સક્રિપ્શન થાય છે.", "ref": "Std 12 - Chapter 6: જીન અભિવ્યક્તિ અને નિયંત્રણ (લેક્ટોઝ ઓપરોન)", "ch": ""}, {"q": "એક પ્રયોગમાં, *E. coli* ના કોષોમાં લેક્ટોઝની સાથે સાથે ગ્લુકોઝ પણ ઉચ્ચ સાંદ્રતામાં હાજર છે. આ પરિસ્થિતિમાં નીચેના પૈકી કયું વિધાન સાચું છે?", "opts": ["લેક્ટોઝ ઓપરોનનું ટ્રાન્સક્રિપ્શન સંપૂર્ણ રીતે થશે કારણ કે ઇન્ડ્યુસર (અલોલેક્ટોઝ) હાજર છે.", "લેક્ટોઝ ઓપરોનનું ટ્રાન્સક્રિપ્શન થશે નહીં કારણ કે ગ્લુકોઝની હાજરીમાં CAP (Catabolite Activator Protein) નિષ્ક્રિય રહે છે.", "લેક્ટોઝ ઓપરોનનું ટ્રાન્સક્રિપ્શન થશે પરંતુ તેની ગતિ ખૂબ ધીમી હશે કારણ કે ગ્લુકોઝ ઇન્ડ્યુસરના કાર્યને અવરોધે છે.", "લેક્ટોઝ ઓપરોનનું ટ્રાન્સક્રિપ્શન માત્ર ત્યારે જ થશે જ્યારે ગ્લુકોઝ સંપૂર્ણપણે વપરાઈ જાય અને cAMP નું સ્તર વધે."], "ans": 1, "exp": "સાચો વિકલ્પ B છે. ગ્લુકોઝની હાજરીમાં cAMP નું સ્તર ઘટે છે, જેના કારણે CAP (Catabolite Activator Protein) નિષ્ક્રિય રહે છે. CAP ની ગેરહાજરીમાં RNA પોલિમરેઝ પ્રમોટર સાથે બંધાઈ શકતું નથી, તેથી લેક્ટોઝ ઓપરોનનું ટ્રાન્સક્રિપ્શન થતું નથી. વિકલ્પ A ખોટો છે કારણ કે માત્ર ઇન્ડ્યુસરની હાજરી પૂરતી નથી, CAP ની સક્રિયતા પણ જરૂરી છે. વિકલ્પ C ખોટો છે કારણ કે ગ્લુકોઝ ઇન્ડ્યુસરના કાર્યને અવરોધતું નથી, પરંતુ CAP ને નિષ્ક્રિય કરે છે. વિકલ્પ D ખોટો છે કારણ કે ગ્લુકોઝની હાજરીમાં cAMP નું સ્તર નીચું રહે છે, તેથી CAP સક્રિય થતું નથી અને ટ્રાન્સક્રિપ્શન શરૂ થતું નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ (જનીન નિયંત્રણ અને ઓપરોન સિદ્ધાંત)", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
