<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alec Jeffreys</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Alec Jeffreys</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Alec Jeffreys</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "સર એલેક જેફ્રીસ દ્વારા શોધાયેલી 'DNA ફિંગરપ્રિન્ટિંગ' તકનીકમાં નીચેનામાંથી કયો ઉત્સેચક મુખ્ય ભૂમિકા ભજવે છે?", "opts": ["DNA લાઇગેઝ", "રેસ્ટ્રીક્શન એન્ડોન્યુક્લિએઝ", "DNA પોલિમરેઝ", "રિવર્સ ટ્રાન્સક્રિપ્ટેઝ"], "ans": 1, "exp": "DNA ફિંગરપ્રિન્ટિંગમાં રેસ્ટ્રીક્શન એન્ડોન્યુક્લિએઝ ઉત્સેચકનો ઉપયોગ DNAને ચોક્કસ સ્થાનોએ કાપવા માટે થાય છે, જેનાથી વિશિષ્ટ ફિંગરપ્રિન્ટ પેટર્ન મળે છે. DNA લાઇગેઝ DNAના ટુકડાઓને જોડે છે, DNA પોલિમરેઝ DNAનું સંશ્લેષણ કરે છે, અને રિવર્સ ટ્રાન્સક્રિપ્ટેઝ RNAમાંથી DNA બનાવે છે, જે આ તકનીકમાં ઉપયોગી નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "DNA ફિંગરપ્રિન્ટિંગમાં 'VNTR' (Variable Number Tandem Repeats) નું મહત્વ શું છે? નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["VNTR વિસ્તારો વ્યક્તિગત ઓળખ માટે અનન્ય હોય છે.", "VNTRની સંખ્યા વ્યક્તિથી વ્યક્તિમાં બદલાતી રહે છે.", "VNTR માત્ર પ્રોકેરિયોટિક કોષોમાં જોવા મળે છે.", "VNTRનો ઉપયોગ પિતૃત્વ પરીક્ષણમાં થાય છે."], "ans": 2, "exp": "VNTR (Variable Number Tandem Repeats) યુકેરિયોટિક કોષોમાં જોવા મળે છે, પ્રોકેરિયોટિક કોષોમાં નહીં. VNTR વિસ્તારો વ્યક્તિગત ઓળખ માટે અનન્ય હોય છે, તેમની સંખ્યા વ્યક્તિથી વ્યક્તિમાં બદલાય છે, અને પિતૃત્વ પરીક્ષણમાં ઉપયોગી છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું કાર્ય DNA ફિંગરપ્રિન્ટિંગ સાથે સીધું સંબંધિત નથી?", "opts": ["ગુનાહિત તપાસમાં આરોપીની ઓળખ", "વનસ્પતિઓમાં પ્રકાશસંશ્લેષણની ક્ષમતાનું માપન", "પિતૃત્વ અને વંશાવલી નિર્ધારણ", "લુપ્ત પ્રાણીઓના અવશેષોનું વિશ્લેષણ"], "ans": 1, "exp": "DNA ફિંગરપ્રિન્ટિંગનો ઉપયોગ ગુનાહિત તપાસ, પિતૃત્વ પરીક્ષણ અને લુપ્ત પ્રાણીઓના અવશેષોના વિશ્લેષણમાં થાય છે. પ્રકાશસંશ્લેષણની ક્ષમતાનું માપન આ તકનીક સાથે સીધું સંબંધિત નથી, કારણ કે તે વનસ્પતિઓની શારીરિક પ્રક્રિયા છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "DNA ફિંગરપ્રિન્ટિંગમાં 'PCR' (Polymerase Chain Reaction) તકનીકનો ઉપયોગ શા માટે થાય છે? નીચેનામાંથી કયું કારણ ખોટું છે?", "opts": ["DNAના નાના નમૂનાનું વિશાળ પ્રમાણમાં પ્રવર્ધન કરવા", "DNAના નમૂનાને શુદ્ધ કરવા માટે", "DNAના ચોક્કસ વિસ્તારોને પસંદગીપૂર્વક કૉપી કરવા", "DNAના નમૂનાને વિશિષ્ટ ઉત્સેચકો વડે કાપવા"], "ans": 3, "exp": "PCR (Polymerase Chain Reaction)નો ઉપયોગ DNAના નાના નમૂનાનું વિશાળ પ્રમાણમાં પ્રવર્ધન કરવા અને ચોક્કસ વિસ્તારોને પસંદગીપૂર્વક કૉપી કરવા માટે થાય છે. DNAને શુદ્ધ કરવા માટે તેનો ઉપયોગ થતો નથી, અને DNAને કાપવા માટે રેસ્ટ્રીક્શન એન્ડોન્યુક્લિએઝ ઉત્સેચકનો ઉપયોગ થાય છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "DNA ફિંગરપ્રિન્ટિંગના સંદર્ભમાં નીચેનામાંથી કયું વિધાન સાચું છે? (અપવાદરૂપ કેસ ધ્યાનમાં લો)", "opts": ["સમાન જોડિયા (Identical Twins)ના DNA ફિંગરપ્રિન્ટ સમાન હોય છે.", "DNA ફિંગરપ્રિન્ટિંગ માત્ર મનુષ્યોમાં જ શક્ય છે.", "DNA ફિંગરપ્રિન્ટિંગ માટે હંમેશા તાજા DNA નમૂનાની જરૂર પડે છે.", "DNA ફિંગરપ્રિન્ટિંગમાં વપરાતા પ્રોબ્સ માત્ર એક જ પ્રકારના હોય છે."], "ans": 0, "exp": "સમાન જોડિયા (Identical Twins)ના DNA ફિંગરપ્રિન્ટ સમાન હોય છે કારણ કે તેમનું આનુવંશિક દ્રવ્ય એકસરખું હોય છે. DNA ફિંગરપ્રિન્ટિંગ અન્ય પ્રાણીઓ અને વનસ્પતિઓમાં પણ શક્ય છે. જૂના અથવા અંશતઃ વિઘટિત DNA નમૂનાનો પણ ઉપયોગ થઈ શકે છે. DNA ફિંગરપ્રિન્ટિંગમાં વિવિધ પ્રકારના પ્રોબ્સનો ઉપયોગ થાય છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "સર એલેક જેફ્રીસ દ્વારા વિકસાવેલી DNA ફિંગરપ્રિન્ટિંગ પદ્ધતિમાં, 'મિનીસેટેલાઇટ DNA' ની ભૂમિકા શું છે?", "opts": ["તે DNA ની દ્વિગુણન પ્રક્રિયામાં મદદ કરે છે", "તે વ્યક્તિગત ઓળખ માટે વપરાતા બહુવિધ અલગ-અલગ લંબાઈના ટુકડાઓ ઉત્પન્ન કરે છે", "તે પ્રોટીન સંશ્લેષણમાં સીધો ભાગ ભજવે છે", "તે કોષકેન્દ્રની રચનામાં મદદ કરે છે"], "ans": 1, "exp": "મિનીસેટેલાઇટ DNA એ VNTR (Variable Number Tandem Repeats) ના રૂપમાં હોય છે, જે વ્યક્તિગત ઓળખ માટે અલગ-અલગ લંબાઈના ટુકડાઓ ઉત્પન્ન કરે છે. A) DNA દ્વિગુણનમાં મદદ કરતું નથી, C) પ્રોટીન સંશ્લેષણમાં સીધો ભાગ ભજવતું નથી, D) કોષકેન્દ્રની રચનામાં મદદ કરતું નથી.", "ref": "Std 12 - Chapter 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ફિંગરપ્રિન્ટિંગમાં, 'સાઉદર્ન બ્લોટિંગ' તકનીકનો ઉપયોગ ક્યારે થાય છે?", "opts": ["DNA ની માત્રા વધારવા માટે", "DNA ના ટુકડાઓને અલગ કરવા અને ઓળખવા માટે", "પ્રોટીન ની રચના માટે", "RNA ની નકલ કરવા માટે"], "ans": 1, "exp": "સાઉદર્ન બ્લોટિંગ એ DNA ના ટુકડાઓને અલગ કરવા અને ઓળખવા માટે વપરાતી તકનીક છે. A) DNA ની માત્રા વધારવા માટે PCR વપરાય છે, C) પ્રોટીન ની રચના માટે વેસ્ટર્ન બ્લોટિંગ વપરાય છે, D) RNA ની નકલ કરવા માટે રિવર્સ ટ્રાન્સક્રિપ્ટેઝ વપરાય છે.", "ref": "Std 12 - Chapter 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "એલેક જેફ્રીસની શોધ નીચેનામાંથી કયા ક્ષેત્રમાં ક્રાંતિ લાવી છે?", "opts": ["પેશી સંવર્ધન", "ફોરેન્સિક વિજ્ઞાન અને અનુવંશિક રોગોની ઓળખ", "પ્રકાશસંશ્લેષણ અભ્યાસ", "હોર્મોન ઉત્પાદન"], "ans": 1, "exp": "DNA ફિંગરપ્રિન્ટિંગ એ ફોરેન્સિક વિજ્ઞાન અને અનુવંશિક રોગોની ઓળખમાં ક્રાંતિ લાવી છે. A) પેશી સંવર્ધન સાથે સીધો સંબંધ નથી, C) પ્રકાશસંશ્લેષણ સાથે સીધો સંબંધ નથી, D) હોર્મોન ઉત્પાદન સાથે સીધો સંબંધ નથી.", "ref": "Std 12 - Chapter 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ફિંગરપ્રિન્ટિંગમાં, 'રેસ્ટ્રિક્શન એન્ઝાઇમ' નો ઉપયોગ શા માટે થાય છે?", "opts": ["DNA ની નકલ કરવા માટે", "DNA ના દ્વિગુણન માટે", "DNA ને વિશિષ્ટ સ્થાને કાપવા માટે", "RNA ની રચના માટે"], "ans": 2, "exp": "રેસ્ટ્રિક્શન એન્ઝાઇમ DNA ને વિશિષ્ટ સ્થાને કાપવા માટે વપરાય છે. A) DNA ની નકલ કરવા માટે PCR વપરાય છે, B) DNA ના દ્વિગુણન માટે DNA પોલિમરેઝ વપરાય છે, D) RNA ની રચના માટે RNA પોલિમરેઝ વપરાય છે.", "ref": "Std 12 - Chapter 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "એલેક જેફ્રીસની DNA ફિંગરપ્રિન્ટિંગ પદ્ધતિ નીચેનામાંથી કયા સિદ્ધાંત પર આધારિત છે?", "opts": ["પ્રોટીન ની રચના", "DNA ની અનન્યતા અને વારસાગત વૈવિધ્ય", "કોષકેન્દ્રની રચના", "ઉત્સેચકની ક્રિયાશીલતા"], "ans": 1, "exp": "DNA ફિંગરપ્રિન્ટિંગ એ DNA ની અનન્યતા અને વારસાગત વૈવિધ્ય પર આધારિત છે. A) પ્રોટીન ની રચના સાથે સીધો સંબંધ નથી, C) કોષકેન્દ્રની રચના સાથે સીધો સંબંધ નથી, D) ઉત્સેચકની ક્રિયાશીલતા સાથે સીધો સંબંધ નથી.", "ref": "Std 12 - Chapter 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "સર એલેક જેફ્રીસની DNA ફિંગરપ્રિન્ટિંગ પદ્ધતિમાં, 'હાઇપરવેરિયેબલ રીજન' (HVR) ની ભૂમિકા શું છે? નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["HVR રીજન વ્યક્તિગત ભિન્નતાને ઓળખવા માટે ઉપયોગી છે.", "HVR રીજન મુખ્યત્વે કોડિંગ DNA ના ભાગોમાં આવેલા હોય છે.", "HVR રીજનમાં મ્યુટેશનનો દર અન્ય DNA ક્ષેત્રો કરતાં વધારે હોય છે.", "HVR રીજનનો ઉપયોગ વંશાવળી અને ફોરેન્સિક વિજ્ઞાનમાં થાય છે."], "ans": 1, "exp": "HVR (હાઇપરવેરિયેબલ રીજન) મુખ્યત્વે નોન-કોડિંગ DNA ના ભાગોમાં આવેલા હોય છે, જેમાં મ્યુટેશનનો દર વધારે હોય છે. આ રીજન વ્યક્તિગત ભિન્નતાને ઓળખવા, વંશાવળી અને ફોરેન્સિક વિજ્ઞાનમાં ઉપયોગી છે. પરંતુ HVR રીજન મુખ્યત્વે કોડિંગ DNA ના ભાગોમાં આવેલા નથી, એટલે કે વિકલ્પ B ખોટો છે.", "ref": "Std 12 - Chapter 6: મોલેક્યુલર બાયોલોજી અને જીનેટિક એન્જિનિયરિંગ", "ch": ""}, {"q": "એલેક જેફ્રીસની DNA ફિંગરપ્રિન્ટિંગ પદ્ધતિમાં, 'પ્રોબ' (Probe) નો ઉપયોગ શા માટે થાય છે? નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["પ્રોબનો ઉપયોગ DNA ના દ્વિગુણીકરણ માટે થાય છે.", "પ્રોબનો ઉપયોગ DNA ના ટુકડાઓને અલગ પાડવા માટે થાય છે.", "પ્રોબનો ઉપયોગ સ્પેશિફિક DNA અનુક્રમોને ઓળખવા અને બંધન કરવા માટે થાય છે.", "પ્રોબનો ઉપયોગ DNA ના ટુકડાઓને કાપવા માટે થાય છે."], "ans": 2, "exp": "DNA ફિંગરપ્રિન્ટિંગમાં, પ્રોબનો ઉપયોગ સ્પેશિફિક DNA અનુક્રમોને ઓળખવા અને બંધન કરવા માટે થાય છે. પ્રોબ એ રેડિયોએક્ટિવ અથવા ફ્લોરોસેન્ટ લેબલ ધરાવતો ન્યુક્લિયોટાઇડ અનુક્રમ હોય છે, જે પૂરક DNA અનુક્રમ સાથે જોડાઈને તેને ઓળખે છે. વિકલ્પ A, B, અને D ખોટા છે કારણ કે તે પ્રોબની ભૂમિકાને યોગ્ય રીતે વર્ણવતા નથી.", "ref": "Std 12 - Chapter 6: મોલેક્યુલર બાયોલોજી અને જીનેટિક એન્જિનિયરિંગ", "ch": ""}, {"q": "DNA ફિંગરપ્રિન્ટિંગમાં, 'ડાયજેસ્ટ' (Digest) શબ્દનો અર્થ શું છે? નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["DNA ના ટુકડાઓને એકબીજા સાથે જોડવા.", "DNA ના ટુકડાઓને રેડિયોએક્ટિવ લેબલ સાથે જોડવા.", "રેસ્ટ્રિક્શન એન્ઝાઇમ દ્વારા DNA ના ટુકડાઓમાં કાપવું.", "DNA ના ટુકડાઓને પોલિમરેઝ એન્ઝાઇમ દ્વારા વર્ધાવવા."], "ans": 2, "exp": "DNA ફિંગરપ્રિન્ટિંગમાં, 'ડાયજેસ્ટ' શબ્દનો અર્થ રેસ્ટ્રિક્શન એન્ઝાઇમ દ્વારા DNA ના ટુકડાઓમાં કાપવું એવો થાય છે. આ પ્રક્રિયા દરમિયાન, રેસ્ટ્રિક્શન એન્ઝાઇમ સ્પેશિફિક અનુક્રમોને ઓળખીને DNA ને કાપે છે. વિકલ્પ A, B, અને D ખોટા છે કારણ કે તે ડાયજેસ્ટની યોગ્ય વ્યાખ્યા નથી.", "ref": "Std 12 - Chapter 6: મોલેક્યુલર બાયોલોજી અને જીનેટિક એન્જિનિયરિંગ", "ch": ""}, {"q": "એલેક જેફ્રીસની શોધના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન 'મિનીસેટેલાઇટ DNA' વિશે સાચું નથી?", "opts": ["મિનીસેટેલાઇટ DNA એ શોર્ટ ટેન્ડેમ રિપીટ (STR) ના સ્વરૂપમાં હોય છે.", "મિનીસેટેલાઇટ DNA નો ઉપયોગ વ્યક્તિગત ઓળખ માટે થાય છે.", "મિનીસેટેલાઇટ DNA મુખ્યત્વે કોડિંગ ક્ષેત્રોમાં આવેલા હોય છે.", "મિનીસેટેલાઇટ DNA ની લંબાઈ વ્યક્તિઓ વચ્ચે ભિન્ન હોય છે."], "ans": 2, "exp": "મિનીસેટેલાઇટ DNA એ શોર્ટ ટેન્ડેમ રિપીટ (STR) ના સ્વરૂપમાં હોય છે અને તેનો ઉપયોગ વ્યક્તિગત ઓળખ માટે થાય છે. મિનીસેટેલાઇટ DNA ની લંબાઈ વ્યક્તિઓ વચ્ચે ભિન્ન હોય છે. પરંતુ મિનીસેટેલાઇટ DNA મુખ્યત્વે નોન-કોડિંગ ક્ષેત્રોમાં આવેલા હોય છે, એટલે કે વિકલ્પ C ખોટો છે.", "ref": "Std 12 - Chapter 6: મોલેક્યુલર બાયોલોજી અને જીનેટિક એન્જિનિયરિંગ", "ch": ""}, {"q": "DNA ફિંગરપ્રિન્ટિંગમાં, 'ઓથોરેડિયોગ્રાફી' (Autoradiography) તકનીકનો ઉપયોગ શા માટે થાય છે? નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["DNA ના ટુકડાઓને અલગ પાડવા માટે.", "રેડિયોએક્ટિવ લેબલ ધરાવતા DNA ટુકડાઓને દૃશ્યમાન બનાવવા માટે.", "DNA ના ટુકડાઓને કાપવા માટે.", "DNA ના ટુકડાઓને વર્ધાવવા માટે."], "ans": 1, "exp": "DNA ફિંગરપ્રિન્ટિંગમાં, 'ઓથોરેડિયોગ્રાફી' તકનીકનો ઉપયોગ રેડિયોએક્ટિવ લેબલ ધરાવતા DNA ટુકડાઓને દૃશ્યમાન બનાવવા માટે થાય છે. આ તકનીક દ્વારા, રેડિયોએક્ટિવ લેબલ ધરાવતા DNA ટુકડાઓ ફિલ્મ પર કાળા ધબ્બા સ્વરૂપે દેખાય છે. વિકલ્પ A, C, અને D ખોટા છે કારણ કે તે ઓથોરેડિયોગ્રાફીની ભૂમિકાને યોગ્ય રીતે વર્ણવતા નથી.", "ref": "Std 12 - Chapter 6: મોલેક્યુલર બાયોલોજી અને જીનેટિક એન્જિનિયરિંગ", "ch": ""}, {"q": "સર એલેક જેફ્રીસની DNA ફિંગરપ્રિન્ટિંગ પદ્ધતિમાં, 'મલ્ટીપ્લેક્સ PCR' નો ઉપયોગ ક્યારે અત્યંત મહત્વપૂર્ણ બને છે?", "opts": ["જ્યારે એક જ વ્યક્તિના મલ્ટિપ્લ DNA નમૂનાઓની તુલના કરવાની હોય", "જ્યારે નાના પ્રમાણમાં અને ખરાબ ક્વોલિટીના DNA નમૂનાઓ સાથે કામ કરવાનું હોય", "જ્યારે વારંવાર પુનરાવર્તિત અનુક્રમો (VNTR) ની ઓળખ કરવાની હોય", "જ્યારે DNA ની સંપૂર્ણ અનુક્રમણિકા (Sequencing) કરવાની હોય"], "ans": 1, "exp": "મલ્ટીપ્લેક્સ PCR નો ઉપયોગ ખાસ કરીને નાના પ્રમાણમાં અને ખરાબ ક્વોલિટીના DNA નમૂનાઓ સાથે કામ કરતી વખતે થાય છે, કારણ કે તે એકસાથે ઘણા લોકસ (loci) ને એમ્પ્લિફાય કરવા સક્ષમ હોય છે. A) એક જ વ્યક્તિના મલ્ટિપ્લ નમૂનાઓની તુલના માટે સિંગલ લોકસ PCR પૂરતું હોય છે. C) VNTR ની ઓળખ માટે સાદા PCR અથવા RFLP પદ્ધતિ વાપરવામાં આવે છે. D) સંપૂર્ણ અનુક્રમણિકા માટે સેંગર મેથડ અથવા NGS વાપરવામાં આવે છે.", "ref": "Std 12 - Chapter 6: જૈવતકનીકી (Biotechnology)", "ch": ""}, {"q": "એલેક જેફ્રીસની DNA ફિંગરપ્રિન્ટિંગ પદ્ધતિમાં, 'સ્ટ્રિંગન્ટ સ્થિતિ' (Stringent Conditions) નો ઉપયોગ ક્યારે થાય છે?", "opts": ["DNA ને રેડિયોએક્ટિવ લેબલ કરતી વખતે", "હાઇબ્રિડાઇઝેશન દરમિયાન પ્રોબ અને ટારગેટ DNA વચ્ચેની અસરકારક જોડાણી સુનિશ્ચિત કરવા", "જેલ ઇલેક્ટ્રોફોરેસિસ દરમિયાન DNA ના અણુઓને અલગ કરવા", "PCR દરમિયાન DNA ની પ્રતિકૃતિ બનાવતી વખતે"], "ans": 1, "exp": "સ્ટ્રિંગન્ટ સ્થિતિ હાઇબ્રિડાઇઝેશન દરમિયાન વાપરવામાં આવે છે, જેથી પ્રોબ ફક્ત તેના પૂરક અનુક્રમ સાથે જ જોડાય અને અસંગત જોડાણો ટાળી શકાય. A) રેડિયોએક્ટિવ લેબલિંગ માટે સ્ટ્રિંગન્ટ સ્થિતિની જરૂર નથી. C) જેલ ઇલેક્ટ્રોફોરેસિસમાં વોલ્ટેજ અને બફરની સ્થિતિ મહત્વની હોય છે, સ્ટ્રિંગન્ટ સ્થિતિ નહીં. D) PCR દરમિયાન તાપમાન અને સાઇકલની સ્થિતિ મહત્વની હોય છે.", "ref": "Std 12 - Chapter 6: જૈવતકનીકી (Biotechnology)", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન એલેક જેફ્રીસની DNA ફિંગરપ્રિન્ટિંગ પદ્ધતિના સંદર્ભમાં 'અલેલિક લેડર' (Allelic Ladder) વિશે સાચું છે?", "opts": ["તે એક પ્રકારનો DNA લેબલ છે જે નમૂનાઓને રંગીન બનાવે છે", "તે એક સ્ટાન્ડર્ડ રેફરન્સ છે જે VNTR લોકસ માટે જાણીતા આકારના અલેલ્સ ધરાવે છે", "તે PCR પ્રક્રિયા દરમિયાન વાપરવામાં આવતો ઉત્સેચક છે", "તે DNA ની સંપૂર્ણ અનુક્રમણિકા માટે વાપરવામાં આવતી પદ્ધતિ છે"], "ans": 1, "exp": "અલેલિક લેડર એક સ્ટાન્ડર્ડ રેફરન્સ છે જે VNTR લોકસ માટે જાણીતા આકારના અલેલ્સ ધરાવે છે, જેનાથી નમૂનાઓમાં અલેલ્સની ઓળખ અને તુલના સરળ બને છે. A) અલેલિક લેડર રંગીન બનાવવા માટે નથી, પરંતુ આકારની તુલના માટે છે. C) તે ઉત્સેચક નથી, પરંતુ રેફરન્સ DNA છે. D) તે અનુક્રમણિકા માટે નથી, પરંતુ VNTR ની ઓળખ માટે છે.", "ref": "Std 12 - Chapter 6: જૈવતકનીકી (Biotechnology)", "ch": ""}, {"q": "એલેક જેફ્રીસની DNA ફિંગરપ્રિન્ટિંગ પદ્ધતિમાં, 'હેટરોઝાયગસ' (Heterozygous) અને 'હોમોઝાયગસ' (Homozygous) વચ્ચેનો ત let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
