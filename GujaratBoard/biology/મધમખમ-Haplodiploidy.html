<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>મધમાખીમાં Haplodiploidy</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>મધમાખીમાં Haplodiploidy</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">મધમાખીમાં Haplodiploidy</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "મધમાખીના સમાજમાં નર મધમાખી (ડ્રોન)નું નિર્માણ અફલિત અંડકોષમાંથી થાય છે. આ પ્રક્રિયાને શું કહે છે?", "opts": ["પાર્થેનોકાર્પી", "પાર્થેનોજિનેસીસ", "એપોમાઇક્સીસ", "જીનોમિક ઇમ્પ્રિન્ટીંગ"], "ans": 1, "exp": "સાચો જવાબ B) પાર્થેનોજિનેસીસ છે. મધમાખીમાં નર (ડ્રોન) અફલિત અંડકોષમાંથી વિકસે છે, જેને પાર્થેનોજિનેસીસ કહે છે. પાર્થેનોકાર્પી ફળ વિકાસ સાથે સંબંધિત છે, એપોમાઇક્સીસ વનસ્પતિઓમાં અલિંગી પ્રજનનનો પ્રકાર છે, જ્યારે જીનોમિક ઇમ્પ્રિન્ટીંગ જનીન અભિવ્યક્તિનું નિયંત્રણ છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "મધમાખીના સમાજમાં રાણી મધમાખીના ફલિત અંડકોષમાંથી કયા પ્રકારના વ્યક્તિઓ વિકસે છે?", "opts": ["માત્ર નર મધમાખી (ડ્રોન)", "માત્ર કામદાર મધમાખી", "રાણી મધમાખી અથવા કામદાર મધમાખી", "માત્ર રાણી મધમાખી"], "ans": 2, "exp": "સાચો જવાબ C) રાણી મધમાખી અથવા કામદાર મધમાખી છે. ફલિત અંડકોષમાંથી રાણી અથવા કામદાર મધમાખી વિકસે છે, જે તેમના ખોરાક (રોયલ જેલી) પર આધારિત છે. નર મધમાખી (ડ્રોન) અફલિત અંડકોષમાંથી વિકસે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "મધમાખીમાં haplodiploidy પ્રણાલી અનુસાર, નર મધમાખીના કોષોમાં કેટલા વર્ણસૂત્રો હોય છે?", "opts": ["2n (દ્વિગુણિત)", "n (એકગુણિત)", "3n (ત્રિગુણિત)", "n અથવા 2n બંને હોઈ શકે"], "ans": 1, "exp": "સાચો જવાબ B) n (એકગુણિત) છે. મધમાખીમાં haplodiploidy પ્રણાલી અનુસાર, નર મધમાખી (ડ્રોન) અફલિત અંડકોષમાંથી વિકસે છે, તેથી તેમના કોષોમાં એકગુણિત (n) વર્ણસૂત્રો હોય છે. રાણી અને કામદાર મધમાખી ફલિત અંડકોષમાંથી વિકસે છે, તેથી તેમના કોષોમાં દ્વિગુણિત (2n) વર્ણસૂત્રો હોય છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "મધમાખીના સમાજમાં કામદાર મધમાખીઓ અને રાણી મધમાખી વચ્ચેનો મુખ્ય આનુવંશિક તફાવત શું છે?", "opts": ["કામદાર મધમાખીઓ એકગુણિત હોય છે, જ્યારે રાણી દ્વિગુણિત હોય છે", "બંને દ્વિગુણિત હોય છે, પરંતુ રાણીને વિશેષ ખોરાક મળે છે", "રાણી મધમાખી અફલિત અંડકોષમાંથી વિકસે છે", "કામદાર મધમાખીઓમાં જનીનોનું મિથાઈલેશન થતું નથી"], "ans": 1, "exp": "સાચો જવાબ B) બંને દ્વિગુણિત હોય છે, પરંતુ રાણીને વિશેષ ખોરાક મળે છે છે. કામદાર અને રાણી મધમાખી બંને ફલિત અંડકોષમાંથી વિકસે છે, તેથી બંને દ્વિગુણિત (2n) હોય છે. રાણી મધમાખીને લાર્વા અવસ્થામાં રોયલ જેલી મળે છે, જે તેમને રાણી બનાવે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "મધમાખીમાં haplodiploidy પ્રણાલીનું ઉત્ક્રાંતીય મહત્વ શું છે?", "opts": ["આ પ્રણાલીને કારણે નર મધમાખીઓમાં જનીનિક વિવિધતા વધે છે", "આ પ્રણાલીને કારણે કામદાર મધમાખીઓમાં સહકાર અને પરોપકારી વર્તન વિકસે છે", "આ પ્રણાલી માત્ર મધમાખીમાં જ જોવા મળે છે", "આ પ્રણાલીને કારણે રાણી મધમાખીનું આયુષ્ય વધે છે"], "ans": 1, "exp": "સાચો જવાબ B) આ પ્રણાલીને કારણે કામદાર મધમાખીઓમાં સહકાર અને પરોપકારી વર્તન વિકસે છે છે. Haplodiploidy પ્રણાલીમાં કામદાર મધમાખીઓ એકબીજા સાથે વધુ નજીકથી સંબંધિત હોય છે (75% જનીનો સામાન્ય), જે સહકાર અને પરોપકારી વર્તનના ઉત્ક્રાંતિમાં મહત્વપૂર્ણ છે. નર મધમાખીઓ એકગુણિત હોવાથી તેમનામાં જનીનિક વિવિધતા ઓછી હોય છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "મધમાખીના સમાજમાં રાણી મધમાખી દ્વારા મૂકવામાં આવતા અફલિત અંડકોષમાંથી નર મધમાખી (ડ્રોન) વિકસે છે. આ પ્રક્રિયાને શું કહે છે?", "opts": ["પાર્થેનોકાર્પી", "પાર્થેનોજેનેસીસ", "એપોમાઇક્સીસ", "જીનોગેમી"], "ans": 1, "exp": "સાચો જવાબ B) પાર્થેનોજેનેસીસ છે. મધમાખીમાં નર મધમાખી (ડ્રોન) અફલિત અંડકોષમાંથી વિકસે છે, જેને પાર્થેનોજેનેસીસ કહે છે. પાર્થેનોકાર્પી ફળ વિકાસ સાથે સંબંધિત છે, એપોમાઇક્સીસ વનસ્પતિઓમાં અલિંગી પ્રજનન છે, જ્યારે જીનોગેમી એક પ્રકારનું જનનિક સંયોજન છે જે અહીં લાગુ પડતું નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "મધમાખીમાં haplodiploidy પ્રણાલી અનુસાર, રાણી મધમાખીના ફલિત અંડકોષમાંથી વિકસતી માદા મધમાખીઓ (કામદાર અને રાણી) વચ્ચેનો આનુવંશિક સંબંધ શું છે?", "opts": ["બંને સંપૂર્ણ સમાન જનીનિક બંધારણ ધરાવે છે", "કામદાર મધમાખીઓ રાણી કરતાં વધુ વિષમયુગ્મી હોય છે", "રાણી મધમાખી કામદાર મધમાખીઓ કરતાં વધુ વિષમયુગ્મી હોય છે", "બંને સમાન સંખ્યામાં વર્ણસૂત્રો ધરાવે છે પરંતુ જનીનિક ભિન્નતા હોય છે"], "ans": 3, "exp": "સાચો જવાબ D) બંને સમાન સંખ્યામાં વર્ણસૂત્રો ધરાવે છે પરંતુ જનીનિક ભિન્નતા હોય છે. રાણી અને કામદાર મધમાખીઓ બંને ફલિત અંડકોષમાંથી વિકસે છે અને ડિપ્લોઇડ હોય છે, પરંતુ તેમના વિકાસ દરમિયાન મળતા પોષણ અને પર્યાવરણીય પરિબળોને કારણે જનીનિક અભિવ્યક્તિમાં ભિન્નતા આવે છે. બંને સંપૂર્ણ સમાન જનીનિક બંધારણ ધરાવતા નથી, અને વિષમયુગ્મતામાં તફાવત હોતો નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "મધમાખીમાં haplodiploidy પ્રણાલીનું એક વિશિષ્ટ લક્ષણ એ છે કે નર મધમાખીના કોઈ પિતા હોતા નથી, પરંતુ દાદા હોય છે. આ વિધાનનું કારણ શું છે?", "opts": ["નર મધમાખી અફલિત અંડકોષમાંથી વિકસે છે, તેથી માત્ર માતા તરફથી જ વર્ણસૂત્રો મળે છે", "નર મધમાખીના વિકાસ દરમિયાન પિતૃ વર્ણસૂત્રોનો નાશ થાય છે", "નર મધમાખી માત્ર માતાના જનીનોનું પ્રતિકૃતિ ધરાવે છે", "નર મધમાખીના કોષોમાં માત્ર એક જ વર્ણસૂત્ર હોય છે, તેથી પિતૃ વર્ણસૂત્રોની ગેરહાજરી હોય છે"], "ans": 0, "exp": "સાચો જવાબ A) નર મધમાખી અફલિત અંડકોષમાંથી વિકસે છે, તેથી માત્ર માતા તરફથી જ વર્ણસૂત્રો મળે છે. મધમાખીમાં haplodiploidy પ્રણાલી અનુસાર, નર મધમાખી (ડ્રોન) અફલિત અંડકોષમાંથી વિકસે છે, જે માત્ર માતાના વર્ણસૂત્રો ધરાવે છે. તેથી નર મધમાખીને પિતા હોતા નથી, પરંતુ દાદા હોય છે કારણ કે માતાના વર્ણસૂત્રો તેના દાદા તરફથી આવે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "મધમાખીના સમાજમાં કામદાર મધમાખીઓ વંધ્ય હોય છે, પરંતુ તેઓ રાણી મધમાખીના જનીનોને આગામી પેઢીમાં પહોંચાડવામાં મદદ કરે છે. આ ઘટનાને શું કહે છે?", "opts": ["જનીનિક ડ્રિફ્ટ", "કૌટુંબિક પસંદગી (Kin Selection)", "જનીનિક ભિન્નતા", "પર્યાવરણીય અનુકૂલન"], "ans": 1, "exp": "સાચો જવાબ B) કૌટુંબિક પસંદગી (Kin Selection) છે. મધમાખીના સમાજમાં કામદાર મધમાખીઓ વંધ્ય હોવા છતાં રાણી મધમાખીના જનીનોને આગામી પેઢીમાં પહોંચાડવામાં મદદ કરે છે, જેને કૌટુંબિક પસંદગી કહે છે. આ સિદ્ધાંત અનુસાર, નજીકના સંબંધીઓના જનીનોનું સંરક્ષણ કરવામાં આવે છે. જનીનિક ડ્રિફ્ટ અને જનીનિક ભિન્નતા આ ઘટનાને સમજાવતા નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "મધમાખીમાં haplodiploidy પ્રણાલી અનુસાર, નર મધમાખીના શુક્રકોષોનું નિર્માણ કઈ પ્રક્રિયા દ્વારા થાય છે?", "opts": ["સમભાજન (Mitosis)", "અર્ધસૂત્રીભાજન (Meiosis)", "અસમભાજન (Amitosis)", "સમસૂત્રીભાજન (Equational Division) વગરની પ્રક્રિયા"], "ans": 0, "exp": "સાચો જવાબ A) સમભાજન (Mitosis) છે. મધમાખીમાં haplodiploidy પ્રણાલી અનુસાર, નર મધમાખી હેપ્લોઇડ હોય છે અને તેમના શુક્રકોષો સમભાજન દ્વારા નિર્માણ પામે છે. અર્ધસૂત્રીભાજન ડિપ્લોઇડ કોષોમાં થાય છે, જ્યારે અસમભાજન અને સમસૂત્રીભાજન વગરની પ્રક્રિયા અહીં લાગુ પડતી નથી.", "ref": "Std 12 - પ્રકરણ 4: કોષ વિભાજન", "ch": ""}, {"q": "મધમાખીમાં haplodiploidy પ્રણાલી હેઠળ, જો એક રાણી મધમાખીને બે વખત સંવનન કરાવવામાં આવે તો તેના સંતાનોમાં જનીનીય વૈવિધ્ય કેવી રીતે અસર પામે છે?", "opts": ["નર મધમાખીઓમાં જનીનીય વૈવિધ્ય વધશે કારણ કે તેઓ બે પિતૃ પાસેથી જનીનો મેળવશે.", "માદા કામદાર મધમાખીઓમાં જનીનીય વૈવિધ્ય વધશે કારણ કે તેઓ બે પિતૃ પાસેથી જનીનો મેળવશે.", "નર અને માદા બંનેમાં જનીનીય વૈવિધ્ય સમાન રહેશે કારણ કે રાણીના જનીનો પ્રભાવી હશે.", "માદા કામદાર મધમાખીઓમાં જનીનીય વૈવિધ્ય ઘટશે કારણ કે રાણીના જનીનો એકસરખા હશે."], "ans": 1, "exp": "રાણી મધમાખી બે વખત સંવનન કરે તો માદા કામદાર મધમાખીઓ બે અલગ પિતૃ પાસેથી જનીનો મેળવે છે, જેથી તેમમાં જનીનીય વૈવિધ્ય વધે છે. નર મધમાખીઓ હમેશા અફલિત અંડકોષમાંથી ઉત્પન્ન થાય છે, તેથી તેમના જનીનીય વૈવિધ્ય પર સંવનનની અસર થતી નથી. વિકલ્પ A ખોટો છે કારણ કે નર મધમાખીઓ ફક્ત રાણીના જનીનો ધરાવે છે. વિકલ્પ C અને D ખોટા છે કારણ કે માદા કામદાર મધમાખીઓમાં જનીનીય વૈવિધ્ય વધે છે, નહીં કે ઘટે અથવા સમાન રહે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વૈવિધ્ય", "ch": ""}, {"q": "મધમાખીમાં haplodiploidy પ્રણાલી હેઠળ, નર મધમાખી (ડ્રોન)ના શુક્રકોષોમાં કેટલા વર્ણસૂત્રો હોય છે અને તેનું નિર્માણ કઈ પ્રક્રિયા દ્વારા થાય છે?", "opts": ["16 વર્ણસૂત્રો, માયોસિસ દ્વારા", "32 વર્ણસૂત્રો, માયોસિસ દ્વારા", "16 વર્ણસૂત્રો, માયટોસિસ દ્વારા", "8 વર્ણસૂત્રો, માયોસિસ દ્વારા"], "ans": 0, "exp": "મધમાખીમાં નર મધમાખી (ડ્રોન) હેપ્લોઇડ (n) હોય છે, જેમાં 16 વર્ણસૂત્રો હોય છે. શુક્રકોષોનું નિર્માણ માયોસિસ દ્વારા થાય છે, પરંતુ હેપ્લોઇડ કોષોમાં માયોસિસ થતું નથી, પરંતુ મધમાખીના કિસ્સામાં, નર મધમાખીના શુક્રકોષોનું નિર્માણ માયટોસિસ દ્વારા થાય છે. પરંતુ પ્રશ્નમાં માયોસિસ દ્વારા 16 વર્ણસૂત્રો ધરાવતા શુક્રકોષોનું નિર્માણ થાય છે. વિકલ્પ B ખોટો છે કારણ કે 32 વર્ણસૂત્રો ડિપ્લોઇડ કોષો માટે હોય છે. વિકલ્પ C ખોટો છે કારણ કે માયટોસિસ દ્વારા શુક્રકોષોનું નિર્માણ થતું નથી. વિકલ્પ D ખોટો છે કારણ કે 8 વર્ણસૂત્રો હેપ્લોઇડ કોષો માટે ખૂબ ઓછા છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વૈવિધ્ય", "ch": ""}, {"q": "મધમાખીમાં haplodiploidy પ્રણાલી હેઠળ, રાણી મધમાખીના ફલિત અંડકોષમાંથી વિકસતી માદા મધમાખી (કામદાર અથવા રાણી)ના કોષોમાં કેટલા વર્ણસૂત્રો હોય છે અને તે કયા પ્રકારના હોય છે?", "opts": ["16 વર્ણસૂત્રો, હેપ્લોઇડ", "32 વર્ણસૂત્રો, ડિપ્લોઇડ", "24 વર્ણસૂત્રો, ટ્રિપ્લોઇડ", "8 વર્ણસૂત્રો, હેપ્લોઇડ"], "ans": 1, "exp": "રાણી મધમાખીના ફલિત અંડકોષમાંથી વિકસતી માદા મધમાખી (કામદાર અથવા રાણી)ના કોષોમાં 32 વર્ણસૂત્રો હોય છે અને તે ડિપ્લોઇડ (2n) હોય છે. વિકલ્પ A ખોટો છે કારણ કે 16 વર્ણસૂત્રો હેપ્લોઇડ કોષો માટે હોય છે. વિકલ્પ C ખોટો છે કારણ કે ટ્રિપ્લોઇડ કોષોમાં 3n વર્ણસૂત્રો હોય છે, જે મધમાખીમાં જોવા મળતું નથી. વિકલ્પ D ખોટો છે કારણ કે 8 વર્ણસૂત્રો હેપ્લોઇડ કોષો માટે ખૂબ ઓછા છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વૈવિધ્ય", "ch": ""}, {"q": "મધમાખીમાં haplodiploidy પ્રણાલી હેઠળ, નર મધમાખી (ડ્રોન)ના કોષોમાં કયા પ્રકારના જનીનોમાં સંપૂર્ણ હોમોઝાઇગોસિટી જોવા મળે છે?", "opts": ["ઓટોસોમલ જનીનો", "X-વર્ણસૂત્ર પરના જનીનો", "Y-વર્ણસૂત્ર પરના જનીનો", "માયટોકોન્ડ્રિયલ જનીનો"], "ans": 0, "exp": "નર મધમાખી (ડ્રોન) હેપ્લોઇડ હોય છે, જેમાં ફક્ત એક સેટ ઓટોસોમલ વર્ણસૂત્રો હોય છે. તેથી, ઓટોસોમલ જનીનોમાં સંપૂર્ણ હોમોઝાઇગોસિટી જોવા મળે છે કારણ કે તેમની પાસે ફક્ત એક જ અલેલ હોય છે. વિકલ્પ B ખોટો છે કારણ કે મધમાખીમાં લિંગ નિર્ધારણ પ્રણાલી X-Y નથી, પરંતુ હેપ્લોડિપ્લોઇડ છે. વિકલ્પ C ખોટો છે કારણ કે મધમાખીમાં Y-વર્ણસૂત્ર હાજર નથી. વિકલ્પ D ખોટો છે કારણ કે માયટોકોન્ડ્રિયલ જનીનો માતૃવંશી હોય છે અને હોમોઝાઇગોસિટી સાથે સંબંધિત નથી.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વૈવિધ્ય", "ch": ""}, {"q": "મધમાખીમાં haplodiploidy પ્રણાલી હેઠળ, જો એક રાણી મધમાખીને એક જ નર મધમાખી સાથે સંવનન કરાવવામાં આવે, તો તેના સંતાનોમાં કયા પ્રકારના જનીનીય સંબંધો જોવા મળશે?", "opts": ["બધી માદા કામદાર મધમાખીઓ એકબીજા સાથે અર્ધ-ભગિની હશે.", "બધી માદા કામદાર મધમાખીઓ એકબીજા સાથે પૂર્ણ ભગિની હશે.", "નર મધમાખીઓ અને માદા કામદાર મધમાખીઓ વચ્ચે પૂર્ણ ભાઈ-ભગિની સંબંધ હશે.", "નર મધમાખીઓ એકબીજા સાથે અર્ધ-ભાઈ હશે."], "ans": 0, "exp": "જો રાણી મધમાખી એક જ નર મધમાખી સાથે સંવનન કરે, તો બધી માદા કામદાર મધમાખીઓ એક જ પિતૃ પાસેથી જનીનો મેળવે છે. પરંતુ રાણી મધમાખીના જનીનો અલગ અલગ હોવાથી, માદા કામદાર મધમાખીઓ એકબીજા સાથે અર્ધ-ભગિની (half-sisters) હશે. વિકલ્પ B ખોટો છે કારણ કે પૂર્ણ ભગિની માટે બંને પિતૃ સમાન હોવા જોઈએ. વિકલ્પ C ખોટો છે કારણ કે નર મધમાખીઓ ફક્ત રાણીના જનીનો ધરાવે છે, તેથી તેઓ માદા કામદાર મધમાખીઓ સાથે અર્ધ-ભાઈ હશે. વિકલ્પ D ખોટો છે કારણ કે નર મધમાખીઓ એકબીજા સાથે કોઈ સંબંધ ધરાવતા નથી, કારણ કે તેઓ અફલિત અંડકોષમાંથી ઉત્પન્ન થાય છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વૈવિધ્ય", "ch": ""}, {"q": "મધમાખીમાં haplodiploidy પ્રણાલી હેઠળ, રાણી મધમાખીના અફલિત અંડકોષમાંથી વિકસતી નર મધમાખી (ડ્રોન)ના કોષોમાં કયા પ્રકારના જનીનોમાં હોમોઝાઇગસિટી જોવા મળે છે?", "opts": ["ઓટોસોમલ જનીનો", "X-વર્ણસૂત્ર પરના જનીનો", "Y-વર્ણસૂત્ર પરના જનીનો", "મિટોકોન્ડ્રિયલ જનીનો"], "ans": 0, "exp": "નર મધમાખી (ડ્રોન) હેપ્લોઈડ હોય છે, જેથી તેના કોષોમાં ફક્ત એક સેટ વર્ણસૂત્રો હોય છે. આ કારણે, ઓટોસોમલ જનીનો હોમોઝાઇગસ હોય છે, કારણ કે તેઓ એક જ પ્રતિ ધરાવે છે. X-વર્ણસૂત્ર પરના જનીનો હેતુરૂપે હેમીઝાઇગસ હોય છે, કારણ કે નર મધમાખી પાસે ફક્ત એક X-વર્ણસૂત્ર હોય છે. Y-વર્ણસૂત્ર મધમાખીમાં અસ્તિત્વમાં નથી, અને મિટોકોન્ડ્રિયલ જનીનો માતૃવંશી હોય છે, પરંતુ તેઓ હોમોઝાઇગસિટીના સિદ્ધાંત સાથે સંકળાયેલા નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાનુગતિકતા અને વિવિધતા", "ch": ""}, {"q": "મધમાખીમાં haplodiploidy પ્રણાલી હેઠળ, જો એક રાણી મધમાખીને ત્રણ વખત સંવનન કરાવવામાં આવે, તો તેના સંતાનોમાં કેટલા અલગ અલગ જનીનપૂલ (gene pool) જોવા મળી શકે?", "opts": ["1", "2", "3", "4"], "ans": 2, "exp": "રાણી મધમાખી તેના જીવનકાળ દરમિયાન એક જ વખત સંવનન કરે છે અને શુક્રકોષોને સંગ્રહિત કરે છે. જો તેને ત્રણ વખત સંવનન કરાવવામાં આવે, તો તે ત્રણ અલગ અલગ નર મધમાખીઓ પાસેથી શુક્રકોષો મેળવી શકે છે. આ કારણે, તેના સંતાનોમાં ત્રણ અલગ અલગ જનીનપૂલ જોવા મળી શકે છે. એક અથવા બે સંવનનના કિસ્સામાં, જનીનપૂલની સંખ્યા અનુક્રમે 1 અથવા 2 હશે.", "ref": "Std 12 - અધ્યાય 5: વંશાનુગતિકતા અને વિવિધતા", "ch": ""}, {"q": "મધમાખીમાં haplodiploidy પ્રણાલી હેઠળ, કામદાર મધમાખીઓ અને રાણી મધમાખી વચ્ચેનો આનુવંશિક તફાવત કયા તત્ત્વ પર આધારિત છે?", "opts": ["અંડકોષના ફલનની સ્થિતિ", "અંડકોષના આકાર", "અંડકોષમાં રહેલા પોષક તત્ત્વો", "અંડકોષના રંગ"], "ans": 0, "exp": "મધમાખીમાં, રાણી મધમાખી અને કામદાર મધમાખીઓ બંને ફલિત અંડકોષમાંથી વિકસે છે, પરંતુ તેઓ વચ્ચેનો તફાવત અંડકોષના ફલનની સ્થિતિ પર નહીં, પરંતુ અંડકોષને મળતા આહાર પર આધારિત છે. જો લાર્વાને રોયલ જેલી ખવડાવવામાં આવે, તો તે રાણી બને છે, નહીં તો કામદાર બને છે. આમ, અહીં ફલનની સ્થિતિ નહીં, પરંતુ પોષણ પર આધાર રાખે છે. પરંતુ પ્રશ્ન આનુવંશિક તફાવત વિશે છે, જે ફલનની સ્થિતિ પર આધારિત નથી, પરંતુ આહાર પર આધારિત છે. પરંતુ વિકલ્પોમાં ફક્ત ફલનની સ્થિતિ જ આનુવંશિક તફાવત સાથે સંકળાયેલ છે.", "ref": "Std 12 - અધ્યાય 5: વંશાનુગતિકતા અને વિવિધતા", "ch": ""}, {"q": "મધમાખીના સમાજમાં haplodiploidy પ્રણાલી હેઠળ, નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["નર મધમાખી (ડ્રોન)ના શુક્રકોષોમાં રાણી મધમાખીના અંડકોષ કરતાં અડધા વર્ણસૂત્રો હોય છે.", "કામદાર મધમાખીઓ વચ્ચેનો આનુવંશિક સંબંધ (genetic relatedness) 75% જેટલો હોઈ શકે છે.", "રાણી મધમાખીના ફલિત અંડકોષમાંથી વિકસતી માદા મધમાખીઓમાં વર્ણસૂત્રોની સંખ્યા સમાન હોય છે, પછી ભલે તે રાણી હોય કે કામદાર.", "નર મધમાખી (ડ્રોન)ના કોષોમાં માત્ર એક જ પ્રકારના જનીનો હોય છે, કારણ કે તેઓ અફલિત હોય છે."], "ans": 0, "exp": "વિકલ્પ A ખોટો છે કારણ કે નર મધમાખી (ડ્રોન)ના શુક્રકોષોમાં રાણી મધમાખીના અંડકોષ જેટલા જ વર્ણસૂત્રો હોય છે (હેપ્લોઈડ સંખ્યા). નર મધમાખીના શુક્રકોષો અફલિત હોવાથી તેમાં વર્ણસૂત્રોની સંખ્યા રાણીના અંડકોષ જેટલી જ હોય છે, અડધી નહીં. વિકલ્પ B સાચો છે કારણ કે કામદાર મધમાખીઓ એક જ રાણી અને એક જ નર મધમાખીમાંથી ઉત્પન્ન થતી હોવાથી તેમની વચ્ચેનો આનુવંશિક સંબંધ 75% હોઈ શકે છે. વિકલ્પ C સાચો છે કારણ કે રાણી અને કામદાર મધમાખીઓ બંને ફલિત અંડકોષમાંથી વિકસે છે, તેથી તેમની વર્ણસૂત્રોની સંખ્યા સમાન હોય છે. વિકલ્પ D સાચો છે કારણ કે નર મધમાખી અફલિત હોવાથી તેમના કોષોમાં માત્ર એક જ પ્રકારના જનીનો હોય છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "મધમાખીના સમાજમાં haplodiploidy પ્રણાલી હેઠળ, જો એક રાણી મધમાખીને બે અલગ-અલગ નર મધમાખીઓ સાથે સંવનન કરાવવામાં આવે, તો નીચેનામાંથી કયું પરિણામ શક્ય નથી?", "opts": ["કામદાર મધમાખીઓ વચ્ચેનો આનુવંશિક સંબંધ 25% જેટલો ઓછો હોઈ શકે છે.", "એક જ કોલોનીમાં કામદાર મધમાખીઓના જનીનિક ભિન્નતા (genetic diversity) વધી શકે છે.", "નર મધમાખી (ડ્રોન)ના શુક્રકોષોમાં વર્ણસૂત્રોની સંખ્યા બદલાઈ શકે છે.", "રાણી મધમાખી દ્વારા ઉત્પન્ન થતી કામદાર મધમાખીઓમાં જનીનિક ભિન્નતા જોવા મળી શકે છે."], "ans": 2, "exp": "વિકલ્પ C શક્ય નથી કારણ કે નર મધમાખી (ડ્રોન)ના શુક્રકોષોમાં હંમેશા હેપ્લોઈડ સંખ્યામાં વર્ણસૂત્રો હોય છે, જે બદલાતી નથી. વિકલ્પ A શક્ય છે કારણ કે જો કામદાર મધમાખીઓ અલગ-અલગ નર મધમાખીઓમાંથી ઉત્પન્ન થાય, તો તેમનો આનુવંશિક સંબંધ 25% જેટલો ઓછો હોઈ શકે છે. વિકલ્પ B અને D સાચા છે કારણ કે બહુવિધ નર મધમાખીઓ સાથે સંવનન કરવાથી કોલોનીમાં જનીનિક ભિન્નતા વધે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
