<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evolution of Horse</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Evolution of Horse</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Evolution of Horse</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ઘોડાની ઉત્ક્રાંતિમાં, Eohippus (Hyracotherium) થી Equus સુધીના ક્રમમાં કયા લક્ષણનો વિકાસ સૌથી અગત્યનો ગણાય છે, જે તેને દોડવાની ક્ષમતામાં સુધારો લાવે છે?", "opts": ["દાંતની સંરચનામાં પરિવર્તન (મોલર દાંતમાં રિજનું વિકાસ)", "પગની હાડકાંની સંખ્યામાં ઘટાડો (ટ્રાઇડેક્ટાઇલ થી મોનોડેક્ટાઇલ)", "કપાલની કદમાં વૃદ્ધિ (મગજના કદમાં વધારો)", "પૂંછડીની લંબાઈમાં ઘટાડો"], "ans": 1, "exp": "ઘોડાની ઉત્ક્રાંતિમાં પગની હાડકાંની સંખ્યામાં ઘટાડો (ટ્રાઇડેક્ટાઇલ થી મોનોડેક્ટાઇલ) એ સૌથી અગત્યનો પરિવર્તન છે, કારણ કે તે પગની સ્થિરતા અને દોડવાની ક્ષમતામાં સુધારો લાવે છે. દાંતની સંરચના (A) ખોરાકના પ્રકાર સાથે સંબંધિત છે, કપાલનું કદ (C) બુદ્ધિમાં વૃદ્ધિ દર્શાવે છે, પરંતુ દોડવાની ક્ષમતામાં સીધો ફાળો નથી. પૂંછડીની લંબાઈ (D) ઉત્ક્રાંતિમાં મહત્વનો વિષય નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ઘોડાની ઉત્ક્રાંતિમાં Mesohippus અવસ્થામાં કયું લક્ષણ પ્રથમ વખત જોવા મળે છે, જે પાછળથી આધુનિક ઘોડામાં વિકસિત થાય છે?", "opts": ["ત્રણ પગની અંગૂઠી (ટ્રાઇડેક્ટાઇલ)", "ચોથી પગની અંગૂઠીનો અદૃશ્ય થવો", "દાંતમાં સિમેન્ટની હાજરી", "કાનની લંબાઈમાં વૃદ્ધિ"], "ans": 2, "exp": "Mesohippus અવસ્થામાં દાંતમાં સિમેન્ટની હાજરી પ્રથમ વખત જોવા મળે છે, જે આધુનિક ઘોડામાં ખોરાકના ચાવવામાં મદદ કરે છે. ત્રણ પગની અંગૂઠી (A) Eohippusમાં જોવા મળે છે, ચોથી પગની અંગૂઠીનો અદૃશ્ય થવો (B) પાછળથી Merychippusમાં થાય છે, અને કાનની લંબાઈ (D) ઉત્ક્રાંતિમાં મહત્વનો વિષય નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ઘોડાની ઉત્ક્રાંતિમાં, કયા પૂર્વજમાં પ્રથમ વખત ગ્રાસ ખાવાની આદત વિકસિત થઈ હતી, જેના કારણે દાંતની સંરચનામાં પરિવર્તન થયું હતું?", "opts": ["Eohippus", "Mesohippus", "Merychippus", "Pliohippus"], "ans": 2, "exp": "Merychippusમાં પ્રથમ વખત ગ્રાસ ખાવાની આદત વિકસિત થઈ હતી, જેના કારણે દાંતમાં રિજ અને સિમેન્ટનો વિકાસ થયો હતો. Eohippus (A) અને Mesohippus (B) મુખ્યત્વે પર્ણ અને નરમ વનસ્પતિ ખાતા હતા, જ્યારે Pliohippus (D) પાછળથી આવેલો છે અને આ લક્ષણ ધરાવે છે પરંતુ પ્રથમ નહીં.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ઘોડાની ઉત્ક્રાંતિમાં, કયા પગલામાં પગની મધ્યમ અંગૂઠી (third toe) સંપૂર્ણપણે વિકસિત થઈ અને બાકીની અંગૂઠીઓ અલ્પવિકસિત થઈ ગઈ?", "opts": ["Eohippus થી Mesohippus", "Mesohippus થી Merychippus", "Merychippus થી Pliohippus", "Pliohippus થી Equus"], "ans": 3, "exp": "Pliohippus થી Equusના પગલામાં પગની મધ્યમ અંગૂઠી સંપૂર્ણપણે વિકસિત થઈ અને બાકીની અંગૂઠીઓ અલ્પવિકસિત થઈ ગઈ, જે આધુનિક ઘોડાની મોનોડેક્ટાઇલ સ્થિતિ તરફ દોરી ગઈ. બાકીના વિકલ્પો (A, B, C)માં આ પરિવર્તન પૂર્ણ થયું નહોતું.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ઘોડાની ઉત્ક્રાંતિમાં, કયા લક્ષણને કારણે તેને સવાના (ગ્રાસલેન્ડ) વાતાવરણમાં જીવવાની ક્ષમતા મળી હતી?", "opts": ["દાંતમાં એનામેલની મોટી પરત", "પગની હાડકાંની સંખ્યામાં ઘટાડો અને લાંબી પગની હાડકાં", "કપાલમાં હવાઈ કોથળીઓનો વિકાસ", "પૂંછડીની લંબાઈમાં વૃદ્ધિ"], "ans": 1, "exp": "પગની હાડકાંની સંખ્યામાં ઘટાડો અને લાંબી પગની હાડકાં (B)ને કારણે ઘોડાને સવાના વાતાવરણમાં દોડવાની અને શિકારી પાસેથી બચવાની ક્ષમતા મળી હતી. દાંતમાં એનામેલની મોટી પરત (A) ખોરાક ચાવવામાં મદદ કરે છે, કપાલમાં હવાઈ કોથળીઓ (C) અને પૂંછડીની લંબાઈ (D) સવાના વાતાવરણ સાથે સીધો સંબંધ ધરાવતી નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ઘોડાની ઉત્ક્રાંતિમાં, Pliohippus અવસ્થામાં કયું લક્ષણ અદૃશ્ય થયું હતું, જે પહેલાંના પૂર્વજોમાં હાજર હતું?", "opts": ["ત્રણ પગની અંગૂઠીઓ (toes)માંથી મધ્યમ અંગૂઠીનો સંપૂર્ણ વિકાસ", "દાંતની સપાટી પર જટિલ ક્રીડા (complex ridges)નો વિકાસ", "પગની બાજુની અંગૂઠીઓ (lateral toes)નો સંપૂર્ણ અદૃશ્ય થવો", "કદમાં નોંધપાત્ર ઘટાડો"], "ans": 2, "exp": "Pliohippus અવસ્થામાં, પગની બાજુની અંગૂઠીઓ (lateral toes) સંપૂર્ણપણે અદૃશ્ય થઈ ગઈ હતી, જે પહેલાંના પૂર્વજોમાં (જેમ કે Mesohippus) હાજર હતી. A) મધ્યમ અંગૂઠીનો વિકાસ તો પહેલાંથી જ થયો હતો. B) દાંતની સપાટી પર જટિલ ક્રીડાનો વિકાસ Pliohippusમાં જોવા મળે છે, પરંતુ તે અદૃશ્ય થયું નથી. D) કદમાં ઘટાડો થયો નહોતો, ઉલટાનું કદમાં વૃદ્ધિ થઈ હતી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ઘોડાની ઉત્ક્રાંતિમાં, Merychippus અવસ્થામાં કયું નવું લક્ષણ પ્રગટ થયું હતું, જે તેના પૂર્વજોમાં નહોતું?", "opts": ["ગ્રાસ ખાવાની આદત", "દાંતમાં સિમેન્ટ (cement)ની હાજરી", "પગની મધ્યમ અંગૂઠીનો સંપૂર્ણ વિકાસ", "કાનના હાડકાંનો વિકાસ"], "ans": 1, "exp": "Merychippus અવસ્થામાં, દાંતમાં સિમેન્ટ (cement)ની હાજરી પ્રથમ વખત જોવા મળે છે, જે દાંતને મજબૂત બનાવે છે. A) ગ્રાસ ખાવાની આદત તો પહેલાંથી જ (Mesohippusમાં) વિકસિત થઈ હતી. C) પગની મધ્યમ અંગૂઠીનો વિકાસ પહેલાંથી જ થયો હતો. D) કાનના હાડકાંનો વિકાસ તો પહેલાંના પૂર્વજોમાં જોવા મળે છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ઘોડાની ઉત્ક્રાંતિમાં, કયા પૂર્વજમાં પ્રથમ વખત એક જ પગની અંગૂઠી (single toe)નો વિકાસ જોવા મળે છે?", "opts": ["Eohippus (Hyracotherium)", "Mesohippus", "Pliohippus", "Equus"], "ans": 3, "exp": "Equus અવસ્થામાં પ્રથમ વખત એક જ પગની અંગૂઠી (single toe)નો વિકાસ જોવા મળે છે. A) Eohippusમાં ચાર પગની અંગૂઠીઓ હતી. B) Mesohippusમાં ત્રણ પગની અંગૂઠીઓ હતી. C) Pliohippusમાં બાજુની અંગૂઠીઓ અદૃશ્ય થઈ ગઈ હતી, પરંતુ મધ્યમ અંગૂઠી સંપૂર્ણ વિકસિત નહોતી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ઘોડાની ઉત્ક્રાંતિમાં, કયા પૂર્વજમાં દાંતની સપાટી પર જટિલ ક્રીડા (complex ridges)નો વિકાસ પ્રથમ વખત જોવા મળે છે?", "opts": ["Eohippus (Hyracotherium)", "Mesohippus", "Merychippus", "Pliohippus"], "ans": 2, "exp": "Merychippus અવસ્થામાં દાંતની સપાટી પર જટિલ ક્રીડા (complex ridges)નો વિકાસ પ્રથમ વખત જોવા મળે છે, જે ગ્રાસ ખાવામાં મદદ કરે છે. A) Eohippus અને B) Mesohippusમાં દાંતની સપાટી સરળ હતી. D) Pliohippusમાં આ લક્ષણ પહેલાંથી જ વિકસિત થયું હતું.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ઘોડાની ઉત્ક્રાંતિમાં, કયા પૂર્વજમાં કદમાં સૌથી વધુ વૃદ્ધિ જોવા મળે છે?", "opts": ["Eohippus (Hyracotherium)", "Mesohippus", "Merychippus", "Pliohippus"], "ans": 2, "exp": "Merychippus અવસ્થામાં કદમાં સૌથી વધુ વૃદ્ધિ જોવા મળે છે, જે તેને સવાના (ગ્રાસલેન્ડ) વાતાવરણમાં જીવવાની ક્ષમતા આપે છે. A) Eohippus અને B) Mesohippusમાં કદ નાનું હતું. D) Pliohippusમાં કદમાં થોડી વૃદ્ધિ થઈ હતી, પરંતુ Merychippus જેટલી નહીં.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ઘોડાની ઉત્ક્રાંતિમાં, Eohippus થી Equus સુધીના ક્રમમાં કયા પૂર્વજમાં દાંતની સપાટી પર 'લોફ' (loops) અને 'ફોસેટ' (fossae) જેવી જટિલ રચનાઓનો વિકાસ પ્રથમ વખત જોવા મળે છે, જે ઘાસ ચરવાની આદત સાથે સંકળાયેલ છે?", "opts": ["Mesohippus", "Miohippus", "Merychippus", "Pliohippus"], "ans": 2, "exp": "Merychippusમાં દાંતની સપાટી પર 'લોફ' અને 'ફોસેટ' જેવી જટિલ રચનાઓનો વિકાસ પ્રથમ વખત જોવા મળે છે, જે ઘાસ ચરવાની આદત સાથે સંકળાયેલ છે. Mesohippus અને Miohippusમાં આ લક્ષણ નથી, જ્યારે Pliohippusમાં આ લક્ષણ પહેલેથી જ અસ્તિત્વમાં છે. આ લક્ષણ ઘોડાને કઠણ ઘાસ ચાવવાની ક્ષમતા આપે છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ઘોડાની ઉત્ક્રાંતિમાં, કયા પૂર્વજમાં પગની રચનામાં 'સ્પ્લિન્ટ બોન' (splint bones)નો વિકાસ જોવા મળે છે, જે પગની મધ્યમ અંગૂઠીને સહારો આપે છે?", "opts": ["Eohippus", "Mesohippus", "Merychippus", "Equus"], "ans": 2, "exp": "Merychippusમાં પગની રચનામાં 'સ્પ્લિન્ટ બોન'નો વિકાસ જોવા મળે છે, જે પગની મધ્યમ અંગૂઠીને સહારો આપે છે. Eohippus અને Mesohippusમાં આ લક્ષણ નથી, જ્યારે Equusમાં આ લક્ષણ પહેલેથી જ અસ્તિત્વમાં છે. આ લક્ષણ ઘોડાને દોડવાની ક્ષમતા વધારે છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ઘોડાની ઉત્ક્રાંતિમાં, કયા પૂર્વજમાં કપાલની રચનામાં 'પોસ્ટ-ઓર્બિટલ બાર' (post-orbital bar)નો વિકાસ જોવા મળે છે, જે આંખોની રક્ષા કરે છે?", "opts": ["Eohippus", "Mesohippus", "Miohippus", "Pliohippus"], "ans": 1, "exp": "Mesohippusમાં કપાલની રચનામાં 'પોસ્ટ-ઓર્બિટલ બાર'નો વિકાસ પ્રથમ વખત જોવા મળે છે, જે આંખોની રક્ષા કરે છે. Eohippusમાં આ લક્ષણ નથી, જ્યારે Miohippus અને Pliohippusમાં આ લક્ષણ પહેલેથી જ અસ્તિત્વમાં છે. આ લક્ષણ ઘોડાને દૃષ્ટિ સુધારવાની ક્ષમતા આપે છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ઘોડાની ઉત્ક્રાંતિમાં, કયા પૂર્વજમાં દાંતની રચનામાં 'હાયપ્સોડોન્ટ' (hypsodont) દાંતનો વિકાસ જોવા મળે છે, જે લાંબા સમય સુધી ઘાસ ચાવવાની ક્ષમતા આપે છે?", "opts": ["Eohippus", "Mesohippus", "Merychippus", "Equus"], "ans": 2, "exp": "Merychippusમાં દાંતની રચનામાં 'હાયપ્સોડોન્ટ' દાંતનો વિકાસ પ્રથમ વખત જોવા મળે છે, જે લાંબા સમય સુધી ઘાસ ચાવવાની ક્ષમતા આપે છે. Eohippus અને Mesohippusમાં આ લક્ષણ નથી, જ્યારે Equusમાં આ લક્ષણ પહેલેથી જ અસ્તિત્વમાં છે. આ લક્ષણ ઘોડાને કઠણ ઘાસ ચાવવાની ક્ષમતા વધારે છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ઘોડાની ઉત્ક્રાંતિમાં, કયા પૂર્વજમાં પગની રચનામાં 'કેનન બોન' (cannon bone)નો વિકાસ જોવા મળે છે, જે પગની મજબૂતાઈ વધારે છે?", "opts": ["Miohippus", "Merychippus", "Pliohippus", "Equus"], "ans": 2, "exp": "Pliohippusમાં પગની રચનામાં 'કેનન બોન'નો વિકાસ પ્રથમ વખત જોવા મળે છે, જે પગની મજબૂતાઈ વધારે છે. Miohippus અને Merychippusમાં આ લક્ષણ નથી, જ્યારે Equusમાં આ લક્ષણ પહેલેથી જ અસ્તિત્વમાં છે. આ લક્ષણ ઘોડાને દોડવાની ક્ષમતા વધારે છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ઘોડાની ઉત્ક્રાંતિના ક્રમમાં, નીચેના પૈકી કયા પૂર્વજમાં પ્રથમ વખત 'બ્રેકિઓસેફાલિક' (brachycephalic) ખોપરીની રચના જોવા મળી હતી, જે પછીના તબક્કામાં લુપ્ત થઈ ગઈ હતી?", "opts": ["Eohippus (Hyracotherium)", "Orohippus", "Mesohippus", "Merychippus"], "ans": 1, "exp": "સાચો જવાબ B) Orohippus છે. Orohippusમાં પ્રથમ વખત બ્રેકિઓસેફાલિક (ટૂંકી અને પહોળી) ખોપરીની રચના જોવા મળી હતી, જે પછીના પૂર્વજોમાં લુપ્ત થઈ ગઈ હતી કારણ કે ખોપરી લાંબી અને સાંકડી થતી ગઈ. Eohippusમાં ખોપરી લાંબી અને સાંકડી હતી, જ્યારે Mesohippus અને Merychippusમાં ખોપરી વધુ લાંબી અને સાંકડી બની હતી. આ ફેરફાર ગ્રાસલેન્ડમાં જીવવા માટે અનુકૂલનનો ભાગ હતો.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ઘોડાની ઉત્ક્રાંતિમાં, નીચેના પૈકી કયા પૂર્વજમાં પગની રચનામાં 'સેસામોઇડ હાડકાં' (sesamoid bones)નો વિકાસ પ્રથમ વખત જોવા મળ્યો હતો, જે પગની સ્થિરતા વધારવામાં મદદરૂપ હતું?", "opts": ["Pliohippus", "Merychippus", "Parahippus", "Equus"], "ans": 2, "exp": "સાચો જવાબ C) Parahippus છે. Parahippusમાં પ્રથમ વખત સેસામોઇડ હાડકાંનો વિકાસ જોવા મળ્યો હતો, જે પગની સ્થિરતા અને ગતિને નિયંત્રિત કરવામાં મદદરૂપ હતું. Pliohippus અને Equusમાં આ હાડકાં વધુ વિકસિત હતાં, પરંતુ પ્રથમ વખત Parahippusમાં જોવા મળ્યાં હતાં. Merychippusમાં આ હાડકાં હજુ વિકસિત થયાં ન હતાં.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ઘોડાની ઉત્ક્રાંતિના સંદર્ભમાં, નીચેના વિધાનો ધ્યાનમાં લો અને સાચો વિકલ્પ પસંદ કરો:\n\n(1) Merychippusમાં પ્રથમ વખત 'હાયપ્સોડોન્ટ' દાંતનો વિકાસ થયો હતો.\n(2) Pliohippusમાં પગની રચનામાં 'કેનન બોન' સંપૂર્ણપણે વિકસિત થઈ હતી.\n(3) Equusમાં ખોપરીની રચનામાં 'પોસ્ટ-ઓર્બિટલ બાર' સંપૂર્ણપણે બંધ થઈ ગયું હતું.\n(4) Eohippusમાં દાંતની સપાટી પર 'બુનોડોન્ટ' (bunodont) પ્રકારની રચના જોવા મળતી હતી.", "opts": ["વિધાન 1, 2 અને 3 સાચાં છે", "વિધાન 1, 2 અને 4 સાચાં છે", "વિધાન 2, 3 અને 4 સાચાં છે", "વિધાન 1, 3 અને 4 સાચાં છે"], "ans": 1, "exp": "સાચો જવાબ B) વિધાન 1, 2 અને 4 સાચાં છે. Merychippusમાં હાયપ્સોડોન્ટ દાંતનો વિકાસ થયો હતો, Pliohippusમાં કેનન બોન સંપૂર્ણપણે વિકસિત થઈ હતી, અને Eohippusમાં બુનોડોન્ટ દાંતની રચના હતી. વિધાન 3 ખોટું છે કારણ કે Equusમાં પોસ્ટ-ઓર્બિટલ બાર સંપૂર્ણપણે બંધ નથી થયું, પરંતુ તે વધુ મજબૂત બન્યું છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ઘોડાની ઉત્ક્રાંતિમાં, નીચેના પૈકી કયા પૂર્વજમાં 'પ્રીમોલર દાંત' (premolar teeth) અને 'મોલર દાંત' (molar teeth)ની રચનામાં સમાનતા પ્રથમ વખત જોવા મળી હતી, જે ગ્રાસ ખાવાની આદત સાથે સંકળાયેલ છે?", "opts": ["Mesohippus", "Merychippus", "Parahippus", "Pliohippus"], "ans": 2, "exp": "સાચો જવાબ C) Parahippus છે. Parahippusમાં પ્રથમ વખત પ્રીમોલર અને મોલર દાંતની રચનામાં સમાનતા જોવા મળી હતી, જે ગ્રાસ ખાવાની આદત સાથે અનુકૂલનનો ભાગ હતો. Mesohippusમાં આ સમાનતા હજુ વિકસિત થઈ ન હતી, જ્યારે Merychippus અને Pliohippusમાં આ લક્ષણ વધુ વિકસિત હતું.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ઘોડાની ઉત્ક્રાંતિના ક્રમમાં, નીચેના પૈકી કયું લક્ષણ 'Orohippus' અને 'Epihippus' બંનેમાં જોવા મળતું હતું, પરંતુ 'Mesohippus'માં લુપ્ત થઈ ગયું હતું?", "opts": ["પગમાં ચાર અંગૂઠા (toes)ની હાજરી", "ખોપરીની રચનામાં 'પોસ્ટ-ઓર્બિટલ બાર'નો અભાવ", "દાંતની સપાટી પર 'બુનોસેલેનોડોન્ટ' (bunoselenodont) પ્રકારની રચના", "પગની રચનામાં 'સ્પ્લિન્ટ બોન'નો વિકાસ"], "ans": 2, "exp": "સાચો જવાબ C) દાંતની સપાટી પર 'બુનોસેલેનોડોન્ટ' પ્રકારની રચના છે. Orohippus અને Epihippus બંનેમાં દાંતની સપાટી પર બુનોસેલેનોડોન્ટ રચના જોવા મળતી હતી, જે Mesohippusમાં લુપ્ત થઈ ગઈ હતી કારણ કે દાંતની રચના ગ્રાસ ખાવા માટે અનુકૂળ થઈ હતી. પગમાં ચાર અંગૂઠા Orohippusમાં હતા, પરંતુ Epihippusમાં ત્રણ અંગૂઠા હતા. પોસ્ટ-ઓર્બિટલ બાર Orohippusમાં ન હતો, પરંતુ Epihippusમાં વિકસિત થયો હતો. સ્પ્લિન્ટ બોનનો વિકાસ પછીના તબક્કામાં થયો હતો.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
