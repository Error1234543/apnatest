<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પરિતંત્ર</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>પરિતંત્ર</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">પરિતંત્ર</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 49 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 49 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક સંશોધકને એક નવો સજીવ મળ્યો જે સ્વયંપોષી છે, પરંતુ તેના કોષોમાં હરિતકણોનો અભાવ છે. આ સજીવ કયા પ્રકારનું પરિતંત્ર ધરાવે છે?", "opts": ["પ્રકાશસંશ્લેષી પરિતંત્ર", "રસાયણસંશ્લેષી પરિતંત્ર", "પરપોષી પરિતંત્ર", "મૃતોપજીવી પરિતંત્ર"], "ans": 1, "exp": "આ સજીવ સ્વયંપોષી છે પરંતુ હરિતકણો ધરાવતો નથી, જેનો અર્થ છે કે તે પ્રકાશસંશ્લેષણ કરી શકતો નથી. તેથી તે રસાયણસંશ્લેષી પરિતંત્ર ધરાવે છે, જેમાં અકાર્બનિક પદાર્થોના ઓક્સિડેશન દ્વારા ઊર્જા મેળવે છે. પ્રકાશસંશ્લેષી પરિતંત્ર માટે હરિતકણો જરૂરી છે, પરપોષી અને મૃતોપજીવી પરિતંત્ર સ્વયંપોષી નથી.", "ref": "Std 11 - પ્રકરણ 13: સજીવો અને વસ્તી", "ch": ""}, {"q": "નીચેનામાંથી કયો સજીવ પરિતંત્રના સંદર્ભમાં અપવાદરૂપ છે? (સૂચના: તેના પોષણની રીત પર ધ્યાન આપો)", "opts": ["યુગ્લિના (Euglena)", "લાઈકેન (Lichen)", "અમીબા (Amoeba)", "પેરામીશિયમ (Paramecium)"], "ans": 0, "exp": "યુગ્લિના એક અપવાદરૂપ સજીવ છે કારણ કે તે હરિતકણો ધરાવે છે અને પ્રકાશસંશ્લેષણ કરી શકે છે (સ્વયંપોષી), પરંતુ જરૂર પડે ત્યારે પરપોષી રીતે પણ પોષણ મેળવી શકે છે. લાઈકેન એ ફૂગ અને લીલનું સહજીવન છે, અમીબા અને પેરામીશિયમ પરપોષી છે.", "ref": "Std 11 - પ્રકરણ 9: સજીવોમાં વિવિધતા", "ch": ""}, {"q": "એક વિદ્યાર્થીએ અવલોકન કર્યું કે એક બેક્ટેરિયા સલ્ફરના સંયોજનોનો ઉપયોગ કરીને કાર્બન ડાયોક્સાઇડમાંથી કાર્બોદિતનું સંશ્લેષણ કરે છે. આ બેક્ટેરિયા કયા પ્રકારનું પરિતંત્ર ધરાવે છે અને તેની ઊર્જાનો મુખ્ય સ્રોત શું છે?", "opts": ["પ્રકાશસંશ્લેષી પરિતંત્ર, સૂર્યપ્રકાશ", "રસાયણસંશ્લેષી પરિતંત્ર, સલ્ફર સંયોજનોનું ઓક્સિડેશન", "પરપોષી પરિતંત્ર, કાર્બનિક પદાર્થો", "મૃતોપજીવી પરિતંત્ર, મૃત કાર્બનિક પદાર્થો"], "ans": 1, "exp": "આ બેક્ટેરિયા રસાયણસંશ્લેષી પરિતંત્ર ધરાવે છે કારણ કે તે અકાર્બનિક પદાર્થો (સલ્ફર સંયોજનો)ના ઓક્સિડેશન દ્વારા ઊર્જા મેળવે છે અને કાર્બન ડાયોક્સાઇડમાંથી કાર્બોદિતનું સંશ્લેષણ કરે છે. પ્રકાશસંશ્લેષી પરિતંત્ર માટે સૂર્યપ્રકાશ જરૂરી છે, પરપોષી અને મૃતોપજીવી પરિતંત્ર કાર્બનિક પદાર્થો પર આધારિત છે.", "ref": "Std 11 - પ્રકરણ 13: સજીવો અને વસ્તી", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પરિતંત્રના સંદર્ભમાં ખોટું છે?", "opts": ["પરપોષી સજીવો કાર્બનિક પદાર્થોમાંથી ઊર્જા મેળવે છે.", "મૃતોપજીવી સજીવો મૃત કાર્બનિક પદાર્થોનું વિઘટન કરીને પોષણ મેળવે છે.", "રસાયણસંશ્લેષી સજીવો સૂર્યપ્રકાશનો ઉપયોગ કરીને કાર્બન ડાયોક્સાઇડનું સ્થિરીકરણ કરે છે.", "સ્વયંપોષી સજીવો કાર્બન ડાયોક્સાઇડ અને પાણીમાંથી કાર્બોદિતનું સંશ્લેષણ કરે છે."], "ans": 2, "exp": "રસાયણસંશ્લેષી સજીવો સૂર્યપ્રકાશનો ઉપયોગ કરતા નથી, પરંતુ અકાર્બનિક પદાર્થોના ઓક્સિડેશન દ્વારા ઊર્જા મેળવે છે. બાકીના વિધાનો સાચાં છે: પરપોષી સજીવો કાર્બનિક પદાર્થોમાંથી ઊર્જા મેળવે છે, મૃતોપજીવી સજીવો મૃત કાર્બનિક પદાર્થોનું વિઘટન કરે છે, અને સ્વયંપોષી સજીવો કાર્બન ડાયોક્સાઇડ અને પાણીમાંથી કાર્બોદિતનું સંશ્લેષણ કરે છે.", "ref": "Std 11 - પ્રકરણ 13: સજીવો અને વસ્તી", "ch": ""}, {"q": "એક સજીવ જે પાણીની અંદર ઊંડે રહે છે અને સૂર્યપ્રકાશ પહોંચી શકતો નથી, પરંતુ હાઇડ્રોજન સલ્ફાઇડનો ઉપયોગ કરીને કાર્બન ડાયોક્સાઇડનું સ્થિરીકરણ કરે છે. આ સજીવ કયા પ્રકારનું પરિતંત્ર ધરાવે છે અને તેની ઊર્જા ક્યાંથી મેળવે છે?", "opts": ["પ્રકાશસંશ્લેષી પરિતંત્ર, સૂર્યપ્રકાશ", "રસાયણસંશ્લેષી પરિતંત્ર, હાઇડ્રોજન સલ્ફાઇડનું ઓક્સિડેશન", "પરપોષી પરિતંત્ર, કાર્બનિક પદાર્થો", "મૃતોપજીવી પરિતંત્ર, મૃત કાર્બનિક પદાર્થો"], "ans": 1, "exp": "આ સજીવ રસાયણસંશ્લેષી પરિતંત્ર ધરાવે છે કારણ કે તે સૂર્યપ્રકાશ વગર હાઇડ્રોજન સલ્ફાઇડના ઓક્સિડેશન દ્વારા ઊર્જા મેળવે છે અને કાર્બન ડાયોક્સાઇડનું સ્થિરીકરણ કરે છે. પ્રકાશસંશ્લેષી પરિતંત્ર માટે સૂર્યપ્રકાશ જરૂરી છે, પરપોષી અને મૃતોપજીવી પરિતંત્ર કાર્બનિક પદાર્થો પર આધારિત છે.", "ref": "Std 11 - પ્રકરણ 13: સજીવો અને વસ્તી", "ch": ""}, {"q": "એક સજીવ જે અન્ય સજીવના શરીરની સપાટી પર રહીને તેના શરીરમાંથી પોષક તત્ત્વો મેળવે છે, પરંતુ તેના યજમાનને તાત્કાલિક નુકસાન પહોંચાડતો નથી, તેને કયા પ્રકારના પરિતંત્રમાં વર્ગીકૃત કરવામાં આવે છે?", "opts": ["બાહ્ય પરોપજીવી (Ectoparasite)", "અંત:પરોપજીવી (Endoparasite)", "પરોપજીવી-સહજીવન (Parasitoid)", "સહજીવી (Commensal)"], "ans": 0, "exp": "સજીવ જે યજમાનની સપાટી પર રહીને પોષણ મેળવે છે તેને બાહ્ય પરોપજીવી કહે છે. અંત:પરોપજીવી યજમાનના શરીરની અંદર રહે છે. પરોપજીવી-સહજીવનમાં યજમાનને અંતે મૃત્યુ થાય છે, જ્યારે સહજીવીમાં યજમાનને કોઈ નુકસાન થતું નથી. અહીં સજીવ યજમાનને તાત્કાલિક નુકસાન પહોંચાડતો નથી, તેથી તે સહજીવી નથી, પરંતુ બાહ્ય પરોપજીવી છે.", "ref": "Std 11 - પ્રકરણ 13: સજીવો અને વસ્તી", "ch": ""}, {"q": "નીચેનામાંથી કયો સજીવ પરિતંત્રના સંદર્ભમાં અપવાદરૂપ છે કારણ કે તે પ્રકાશસંશ્લેષણ કરવા છતાં પરપોષી પણ છે?", "opts": ["યુગ્લિના (Euglena)", "કસ્કુટા (Cuscuta)", "લાઈકેન (Lichen)", "રાઈઝોબિયમ (Rhizobium)"], "ans": 0, "exp": "યુગ્લિનામાં ક્લોરોફિલ હોવાથી તે પ્રકાશસંશ્લેષણ કરી શકે છે, પરંતુ જરૂર પડે ત્યારે તે પરપોષી તરીકે પણ વર્તે છે. કસ્કુટા પરોપજીવી વનસ્પતિ છે જે પ્રકાશસંશ્લેષણ કરતી નથી. લાઈકેન એ ફૂગ અને લીલનું સહજીવન છે, જ્યારે રાઈઝોબિયમ એ સહજીવી બેક્ટેરિયા છે જે નાઇટ્રોજન સ્થાપન કરે છે. તેથી યુગ્લિના અપવાદરૂપ છે.", "ref": "Std 11 - પ્રકરણ 14: વનસ્પતિઓમાં પોષણ", "ch": ""}, {"q": "એક વિદ્યાર્થીએ અવલોકન કર્યું કે એક પ્રકારની ફૂગ મૃત કાર્બનિક પદાર્થો પર વૃદ્ધિ પામે છે અને તેના ઉત્સેચકોનો સ્રાવ કરીને પોષક તત્ત્વોનું શોષણ કરે છે. આ પ્રકારના પરિતંત્રને શું કહે છે?", "opts": ["પરોપજીવી (Parasitic)", "મૃતોપજીવી (Saprophytic)", "સ્વયંપોષી (Autotrophic)", "સહજીવી (Symbiotic)"], "ans": 1, "exp": "મૃત કાર્બનિક પદાર્થો પર વૃદ્ધિ પામીને પોષણ મેળવતા સજીવોને મૃતોપજીવી કહે છે. પરોપજીવી જીવંત યજમાન પર આધાર રાખે છે. સ્વયંપોષી પ્રકાશસંશ્લેષણ દ્વારા પોષણ મેળવે છે, જ્યારે સહજીવીમાં બંને સજીવોને લાભ થાય છે. અહીં ફૂગ મૃત પદાર્થો પર વૃદ્ધિ પામે છે, તેથી તે મૃતોપજીવી છે.", "ref": "Std 11 - પ્રકરણ 14: વનસ્પતિઓમાં પોષણ", "ch": ""}, {"q": "એક સજીવ જે અન્ય સજીવના શરીરમાં રહીને તેના પોષક તત્ત્વોનો ઉપયોગ કરે છે અને યજમાનને ગંભીર નુકસાન પહોંચાડે છે, પરંતુ યજમાનનું મૃત્યુ થતું નથી. આ પ્રકારના સંબંધને શું કહે છે?", "opts": ["પરોપજીવી-સહજીવન (Parasitoid)", "અંત:પરોપજીવી (Endoparasite)", "સહજીવી (Commensal)", "પરભક્ષી (Predator)"], "ans": 1, "exp": "સજીવ જે યજમાનના શરીરની અંદર રહીને પોષણ મેળવે છે અને યજમાનને નુકસાન પહોંચાડે છે તેને અંત:પરોપજીવી કહે છે. પરોપજીવી-સહજીવનમાં યજમાનનું મૃત્યુ થાય છે. સહજીવીમાં યજમાનને કોઈ નુકસાન થતું નથી, અને પરભક્ષીમાં એક સજીવ બીજાને મારીને ખાય છે. અહીં યજમાનનું મૃત્યુ થતું નથી, તેથી તે અંત:પરોપજીવી છે.", "ref": "Std 11 - પ્રકરણ 13: સજીવો અને વસ્તી", "ch": ""}, {"q": "નીચેનામાંથી કયા સજીવને પરિતંત્રમાં 'સહજીવી' (સિમ્બાયોન્ટ) ગણવામાં આવે છે, પરંતુ તેના પોષણની રીત મુજબ તે 'પરોપજીવી' તરીકે પણ વર્ગીકૃત થઈ શકે છે?", "opts": ["લાઇકન (Lichen)", "રાઈઝોબિયમ (Rhizobium)", "પ્લાઝમોડિયમ (Plasmodium)", "મ્યુકોર (Mucor)"], "ans": 2, "exp": "પ્લાઝમોડિયમ (Plasmodium) એ મલેરિયા રોગનું કારણ ભૂત છે, જે મચ્છરના શરીરમાં રહીને તેના પોષક તત્ત્વોનો ઉપયોગ કરે છે, પરંતુ તે મનુષ્યના શરીરમાં પણ પરોપજીવી તરીકે વર્તે છે. લાઇકન અને રાઈઝોબિયમ સહજીવી સંબંધ ધરાવે છે, જ્યારે મ્યુકોર મૃત કાર્બનિક પદાર્થો પર જીવે છે, જેને મૃતોપજીવી (Saprophyte) કહેવાય છે. પ્લાઝમોડિયમ એવો સજીવ છે જે સહજીવી અને પરોપજીવી બંને રીતે વર્તી શકે છે, પરંતુ મુખ્યત્વે તે પરોપજીવી તરીકે ઓળખાય છે.", "ref": "Std 12 - અધ્યાય 13: સજીવો અને વાતાવરણ", "ch": ""}, {"q": "નીચેનામાંથી કયું જોડકું પરિતંત્રમાં ઉર્જાનું સ્થાનાંતરણ અને પોષણ સ્તરના સંબંધને સૌથી યોગ્ય રીતે દર્શાવે છે?", "opts": ["ઉત્પાદક → પ્રાથમિક ઉપભોક્તા → દ્વિતીયક ઉપભોક્તા → તૃતીયક ઉપભોક્તા", "સૂર્યપ્રકાશ → ઉત્પાદક → પ્રાથમિક ઉપભોક્તા → અપઘટક", "અપઘટક → ઉત્પાદક → પ્રાથમિક ઉપભોક્તા → સૂર્યપ્રકાશ", "પ્રાથમિક ઉપભોક્તા → ઉત્પાદક → દ્વિતીયક ઉપભોક્તા → અપઘટક"], "ans": 1, "exp": "પરિતંત્રમાં ઉર્જાનું સ્થાનાંતરણ સૂર્યપ્રકાશથી શરૂ થાય છે, જે ઉત્પાદકો (પ્રકાશસંશ્લેષણ કરનારા) દ્વારા શોષાય છે. ત્યારબાદ ઉત્પાદકો પ્રાથમિક ઉપભોક્તાઓ (શાકાહારી) દ્વારા ખાવામાં આવે છે, અને અંતે અપઘટકો (વિઘટનકારો) દ્વારા મૃત કાર્બનિક પદાર્થોનું વિઘટન થાય છે. વિકલ્પ A પોષણ સ્તરનો ક્રમ યોગ્ય છે, પરંતુ ઉર્જાનું સ્થાનાંતરણ સૂર્યપ્રકાશથી શરૂ થતું નથી. વિકલ્પ C અને D ઉર્જાના પ્રવાહને ઉલટાવે છે, જે બાયોજિયોકેમિકલ કાયદાઓના વિરુદ્ધ છે.", "ref": "Std 12 - અધ્યાય 14: પરિતંત્ર", "ch": ""}, {"q": "એક પરિતંત્રમાં, જો એક પ્રજાતિ તેના પોષણ માટે મૃત કાર્બનિક પદાર્થો પર આધાર રાખે છે, તો તેને કયા પોષણ સ્તરમાં ગણવામાં આવશે?", "opts": ["ઉત્પાદક", "પ્રાથમિક ઉપભોક્તા", "દ્વિતીયક ઉપભોક્તા", "અપઘટક"], "ans": 3, "exp": "મૃત કાર્બનિક પદાર્થો પર આધાર રાખનારા સજીવોને અપઘટક (વિઘટનકાર) કહેવામાં આવે છે, જેમ કે બેક્ટેરિયા અને ફૂગ. ઉત્પાદકો (A) પ્રકાશસંશ્લેષણ દ્વારા પોતાનું ખોરાક ઉત્પન્ન કરે છે. પ્રાથમિક ઉપભોક્તા (B) ઉત્પાદકો પર આધાર રાખે છે, જ્યારે દ્વિતીયક ઉપભોક્તા (C) પ્રાથમિક ઉપભોક્તાઓ પર આધાર રાખે છે.", "ref": "Std 12 - અધ્યાય 14: પરિતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પરિતંત્રમાં કાર્બન ચક્રના સંદર્ભમાં ખોટું છે?", "opts": ["કાર્બન ડાયોક્સાઇડ વાયુમંડળમાંથી ઉત્પાદકો દ્વારા શોષાય છે.", "પ્રાણીઓ દ્વારા શ્વસન ક્રિયા દરમિયાન કાર્બન ડાયોક્સાઇડ મુક્ત થાય છે.", "અપઘટકો દ્વારા મૃત સજીવોનું વિઘટન થતું નથી, પરંતુ તે કાર્બન ચક્રમાં ભાગ લે છે.", "જ્વાળામુખી વિસ્ફોટ દરમિયાન કાર્બન ડાયોક્સાઇડ વાયુમંડળમાં મુક્ત થાય છે."], "ans": 2, "exp": "અપઘટકો (વિઘટનકારો) મૃત સજીવોનું વિઘટન કરે છે અને કાર્બન ચક્રમાં મહત્વની ભૂમિકા ભજવે છે. વિકલ્પ C ખોટો છે કારણ કે અપઘટકો મૃત સજીવોનું વિઘટન કરે છે અને કાર્બનને પુનઃચક્રિત કરે છે. વિકલ્પ A, B, અને D કાર્બન ચક્રના યોગ્ય પાસાઓ છે.", "ref": "Std 12 - અધ્યાય 14: પરિતંત્ર", "ch": ""}, {"q": "એક પરિતંત્રમાં, જો એક સજીવ તેના પોષણ માટે અન્ય સજીવના શરીરમાં રહીને પોષક તત્ત્વો મેળવે છે, તો તેને કયા પ્રકારના પરપોષી તરીકે ઓળખવામાં આવશે?", "opts": ["પરજીવી", "મૃતોપજીવી", "સહજીવી", "સહભોજી"], "ans": 0, "exp": "જે સજીવ અન્ય સજીવના શરીરમાં રહીને તેના પોષક તત્ત્વોનો ઉપયોગ કરે છે તેને પરજીવી કહેવામાં આવે છે. મૃતોપજીવી (B) મૃત કાર્બનિક પદાર્થો પર આધાર રાખે છે, સહજીવી (C) પરસ્પર લાભદાયી સંબંધ ધરાવે છે, અને સહભોજી (D) એક જ પ્રજાતિના સજીવો વચ્ચેનો સંબંધ છે.", "ref": "Std 12 - અધ્યાય 14: પરિતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું જોડકું પરિતંત્રમાં નાઇટ્રોજન ચક્રના સંદર્ભમાં યોગ્ય છે?", "opts": ["વાયુમંડળીય નાઇટ્રોજન → નાઇટ્રોજન સ્થિરીકરણ → અમોનિયા → નાઇટ્રેટ → નાઇટ્રાઇટ", "વાયુમંડળીય નાઇટ્રોજન → નાઇટ્રોજન સ્થિરીકરણ → નાઇટ્રાઇટ → નાઇટ્રેટ → અમોનિયા", "વાયુમંડળીય નાઇટ્રોજન → નાઇટ્રોજન સ્થિરીકરણ → નાઇટ્રેટ → નાઇટ્રાઇટ → અમોનિયા", "વાયુમંડળીય નાઇટ્રોજન → અમોનિયા → નાઇટ્રાઇટ → નાઇટ્રેટ → નાઇટ્રોજન સ્થિરીકરણ"], "ans": 1, "exp": "નાઇટ્રોજન ચક્રમાં, વાયુમંડળીય નાઇટ્રોજન નાઇટ્રોજન સ્થિરીકરણ દ્વારા અમોનિયામાં રૂપાંતરિત થાય છે, ત્યારબાદ નાઇટ્રાઇટ અને પછી નાઇટ્રેટમાં રૂપાંતરિત થાય છે. વિકલ્પ B યોગ્ય ક્રમ દર્શાવે છે. વિકલ્પ A, C, અને D ક્રમમાં ખામી ધરાવે છે.", "ref": "Std 12 - અધ્યાય 14: પરિતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પરિતંત્રમાં ઉર્જાનું સ્થાનાંતરણ સંબંધી ખોટું છે?", "opts": ["ઉર્જા એક પોષણ સ્તરથી બીજા પોષણ સ્તરમાં સ્થાનાંતરિત થાય છે.", "ઉર્જાનું સ્થાનાંતરણ એકદિશાત્મક (Unidirectional) હોય છે.", "ઉર્જાનું સ્થાનાંતરણ ચક્રીય (Cyclic) હોય છે.", "ઉર્જાનું સ્થાનાંતરણ પોષણ શૃંખલા દ્વારા થાય છે."], "ans": 2, "exp": "ઉર્જાનું સ્થાનાંતરણ પરિતંત્રમાં એકદિશાત્મક હોય છે, એટલે કે તે એક પોષણ સ્તરથી બીજા પોષણ સ્તરમાં વહે છે અને પાછું વળતું નથી. ચક્રીય ઉર્જા સ્થાનાંતરણ પરિતંત્રમાં થતું નથી. બાકીના વિધાનો સાચાં છે.", "ref": "Std 12 - Chapter 14: પરિતંત્ર", "ch": ""}, {"q": "એક પરિતંત્રમાં, જો એક સજીવ તેના પોષણ માટે મૃત કાર્બનિક પદાર્થો પર આધાર રાખે છે, તો તેને કયા પ્રકારના સજીવ તરીકે ઓળખવામાં આવે છે?", "opts": ["ઉત્પાદક (Producer)", "વપરાશકર્તા (Consumer)", "વિઘટક (Decomposer)", "પરોપજીવી (Parasite)"], "ans": 2, "exp": "મૃત કાર્બનિક પદાર્થો પર આધાર રાખનારા સજીવોને 'વિઘટક' કહેવાય છે, કારણ કે તેઓ મૃત પદાર્થોનું વિઘટન કરે છે અને પોષક તત્ત્વોને પરિતંત્રમાં પુનઃચક્રિત કરે છે. ઉત્પાદકો સ્વયંપોષી હોય છે, વપરાશકર્તાઓ જીવંત સજીવો પર આધાર રાખે છે, અને પરોપજીવી જીવંત હોસ્ટ પર આધાર રાખે છે.", "ref": "Std 12 - Chapter 14: પરિતંત્ર", "ch": ""}, {"q": "એક પરિતંત્રમાં, જો એક સજીવ તેના પોષણ માટે સૂર્યપ્રકાશનો ઉપયોગ કરે છે અને કાર્બન ડાયોક્સાઇડને કાર્બોદિતમાં રૂપાંતરિત કરે છે, તો તેને કયા પ્રકારના સજીવ તરીકે વર્ગીકૃત કરવામાં આવે છે?", "opts": ["સ્વયંપોષી (Autotroph)", "પરપોષી (Heterotroph)", "મૃતોપજીવી (Saprotroph)", "પરોપજીવી (Parasite)"], "ans": 0, "exp": "સજીવ જે સૂર્યપ્રકાશનો ઉપયોગ કરે છે અને કાર્બન ડાયોક્સાઇડને કાર્બોદિતમાં રૂપાંતરિત કરે છે તેને 'સ્વયંપોષી' કહેવાય છે, કારણ કે તે પોતાના પોષણ માટે પ્રકાશસંશ્લેષણ કરે છે. પરપોષી સજીવો અન્ય સજીવો પર આધાર રાખે છે, મૃતોપજીવી મૃત પદાર્થો પર આધાર રાખે છે, અને પરોપજીવી જીવંત હોસ્ટ પર આધાર રાખે છે.", "ref": "Std 12 - Chapter 14: પરિતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું જોડકું પરિતંત્રમાં ઉર્જાના પ્રવાહ અને પોષણ સ્તરના સંબંધને સૌથી યોગ્ય રીતે દર્શાવે છે, જ્યાં પ્રથમ સજીવ સ્વયંપોષી છે અને બીજો સજીવ તેના પર આધારિત છે?", "opts": ["ઘાસ → હરણ → સિંહ", "ફૂગ → બેક્ટેરિયા → વૃક્ષ", "વૃક્ષ → ફૂગ → બેક્ટેરિયા", "બેક્ટેરિયા → ફૂગ → વૃક્ષ"], "ans": 0, "exp": "પરિતંત્રમાં ઉર્જાનો પ્રવાહ હંમેશા સ્વયંપોષી (ઉત્પાદક) થી શરૂ થાય છે અને પછી પ્રાથમિક ઉપભોક્તા, દ્વિતીય ઉપભોક્તા વગેરે તરફ વહે છે. ઘાસ સ્વયંપોષી છે, હરણ પ્રાથમિક ઉપભોક્તા છે, અને સિંહ દ્વિતીય ઉપભોક્તા છે. આ જોડકું ઉર્જાના પ્રવાહને યોગ્ય રીતે દર્શાવે છે. બાકીના જોડકાંમાં, ફૂગ અને બેક્ટેરિયા મૃતોપજીવી અથવા વિઘટક છે, જે ઉર્જાના પ્રવાહમાં અંતિમ સ્તરે આવે છે.", "ref": "Std 12 - Chapter 14: પરિતંત્ર અને પર્યાવરણ", "ch": ""}, {"q": "એક સંશોધકે દરિયાઈ પાણીમાં રહેતા એક એકકોષી પ્રજીવનું અવલોકન કર્યું, જેના કોષમાં ક્લોરોપ્લાસ્ટની ગેરહાજરી હોવા છતાં તે પ્રકાશસંશ્લેષણ કરી શકે છે. આ પ્રજીવમાં જોવા મળતી આ વિશિષ્ટતા પરિતંત્રના સંદર્ભમાં કયા પ્રકારનું પોષણ દર્શાવે છે અને તેનું મુખ્ય કારણ શું છે?", "opts": ["પરપોષણ, કારણ કે તે અન્ય સજીવના કોષમાંથી ક્લોરોપ્લાસ્ટ મેળવે છે", "પરિતંત્ર, કારણ કે તે અન્ય પ્રકાશસંશ્લેષી બેક્ટેરિયાના ક્લોરોફિલનો ઉપયોગ કરે છે", "સ્વયંપોષણ, કારણ કે તેના કોષમાં સ્વતંત્ર રીતે પ્રકાશસંશ્લેષણ માટે જરૂરી ઉત્સેચકો હોય છે", "સહજીવન, કારણ કે તે પ્રકાશસંશ્લેષી બેક્ટેરિયા સાથે સહજીવન સંબંધ ધરાવે છે અને તેમના ક્લોરોફિલનો ઉપયોગ કરે છે"], "ans": 3, "exp": "આ પ્રશ્નમાં વર્ણવેલ પ્રજીવ 'હેટેરોકોન્ટોફાઇટા' સમૂહનો છે, જેમાં 'હેટેરોટ્રોફિક પ્રજીવો' પ્રકાશસંશ્લેષી બેક્ટેરિયા (સાયનોબેક્ટેરિયા)ને પચાવ્યા વગર તેમના કોષમાં સમાવી લે છે અને તેમના ક્લોરોફિલનો ઉપયોગ કરીને પ્રકાશસંશ્લેષણ કરે છે. આ પ્રકારના સંબંધને 'સહજીવન' (સિમ્બાયોસિસ) કહેવાય છે, જેમાં બંને સજીવોને લાભ થાય છે. વિકલ્પ A ખોટો છે કારણ કે ક્લોરોપ્લાસ્ટ સીધો અન્ય સજીવના કોષમાંથી મેળવવામાં આવતો નથી. વિકલ્પ B ખોટો છે કારણ કે બેક્ટેરિયાના ક્લોરોફિલનો ઉપયોગ સીધો થતો નથી, પરંતુ બેક્ટેરિયા જ પ્રજીવના કોષમાં સમાયેલા હોય છે. વિકલ્પ C ખોટો છે કારણ કે પ્રજીવના કોષમાં ક્લોરોપ્લાસ્ટની ગેરહાજરી હોવાથી તે સ્વતંત્ર રીતે પ્રકાશસંશ્લેષણ કરી શકતો નથી. તેથી વિકલ્પ D સાચો છે.", "ref": "Std 11 - પ્રકરણ 2: સજીવોનું વર્ગીકરણ અને Std 12 - પ્રકરણ 13: સજીવો અને વસ્તી", "ch": ""}, {"q": "એક પરિતંત્રમાં રહેતો સજીવ જે અન્ય સજીવના શરીરમાં રહીને તેના પોષક તત્ત્વોનો ઉપયોગ કરે છે, પરંતુ તેના યજમાનને કોઈ નુકસાન પહોંચાડતો નથી. આ પ્રકારના સજીવને શું કહેવાય?", "opts": ["પરોપજીવી (પેરાસાઇટ)", "સહજીવી (કમેન્સલ)", "પરોપજીવી-સહજીવી (પેરાસિટોઇડ)", "પરોપકારી (મ્યુચ્યુઅલિસ્ટ)"], "ans": 1, "exp": "સહજીવી (કમેન્સલ) સજીવ યજમાનને કોઈ નુકસાન પહોંચાડ્યા વગર તેના શરીરમાંથી પોષક તત્ત્વો મેળવે છે. પરોપજીવી (પેરાસાઇટ) યજમાનને નુકસાન પહોંચાડે છે, પરોપજીવી-સહજીવી (પેરાસિટોઇડ) યજમાનને મારી નાખે છે, અને પરોપકારી (મ્યુચ્યુઅલિસ્ટ) બંને સજીવોને લાભ થાય છે.", "ref": "Std 11 - પ્રકરણ 14: પર્યાવરણીય સંકુલતા અને જૈવવિવિધતા", "ch": ""}, {"q": "એક પરિતંત્રમાં, એક સજીવ જે મૃત કાર્બનિક પદાર્થોનું વિઘટન કરીને પોષણ મેળવે છે, પરંતુ તેના શરીરમાં કોષકેન્દ્રનો અભાવ છે. આ સજીવ કયા વર્ગમાં આવે છે?", "opts": ["ફૂગ (Fungi)", "બેક્ટેરિયા (Bacteria)", "પ્રજીવ (Protozoa)", "વાઇરસ (Virus)"], "ans": 1, "exp": "બેક્ટેરિયા પ્રોકેરિયોટિક સજીવો છે જેમાં કોષકેન્દ્રનો અભાવ હોય છે અને મૃત કાર્બનિક પદાર્થોનું વિઘટન કરીને પોષણ મેળવે છે. ફૂગ યુકેરિયોટિક છે, પ્રજીવ એકકોષી યુકેરિયોટિક છે, અને વાઇરસ સજીવ નથી.", "ref": "Std 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ", "ch": ""}, {"q": "એક પરિતંત્રમાં, એક સજીવ જે અન્ય સજીવના શરીરમાં રહીને તેના પોષક તત્ત્વોનો ઉપયોગ કરે છે, પરંતુ તેના યજમાનને મારી નાખતો નથી. આ સજીવને શું કહેવાય અને તે કયા પ્રકારનું પોષણ દર્શાવે છે?", "opts": ["પરોપજીવી (પેરાસાઇટ) - પરોપજીવી પોષણ", "સહજીવી (કમેન્સલ) - સહજીવી પોષણ", "વિઘટક (ડિકમ્પોઝર) - વિઘટન પોષણ", "પરોપકારી (મ્યુચ્યુઅલિસ્ટ) - પરોપકારી પોષણ"], "ans": 0, "exp": "આ સજીવ પરોપજીવી (પેરાસાઇટ) છે અને પરોપજીવી પોષણ દર્શાવે છે, જેમાં તે યજમાનને નુકસાન પહોંચાડે છે પરંતુ મારતો નથી. સહજીવી યજમાનને નુકસાન પહોંચાડતો નથી, વિઘટક મૃત પદાર્થોનું વિઘટન કરે છે, અને પરોપકારી બંનેને લાભ થાય છે.", "ref": "Std 11 - પ્રકરણ 13: વનસ્પતિઓમાં પોષણ અને પરિવહન", "ch": ""}, {"q": "નીચેનામાંથી કયો સજીવ પરિતંત્રના સંદર્ભમાં 'પરોપજીવી' (પેરાસાઇટ) તરીકે ઓળખાય છે, પરંતુ તેના જીવનચક્રના અમુક તબક્કે સ્વતંત્ર રીતે પણ જીવિત રહી શકે છે?", "opts": ["પ્લાઝમોડિયમ (મેલેરિયા પરોપજીવી)", "ટીનિયા સોલિયમ (પટ્ટીકૃમિ)", "લીશ્માનિયા (કાલા-અઝાર પરોપજીવી)", "એસ્કેરિસ લુમ્બ્રિકોઇડિસ (ગોળકૃમિ)"], "ans": 2, "exp": "લીશ્માનિયા પરોપજીવી છે જે મનુષ્ય અને રેતીમાં રહેતા માખી (સેન્ડફ્લાય) બંનેમાં જીવનચક્ર પૂર્ણ કરે છે. તેના જીવનચક્રનો એક તબક્કો માખીના શરીરમાં સ્વતંત્ર રીતે વિકાસ પામે છે, જ્યારે બીજો તબક્કો મનુષ્યના શરીરમાં પરોપજીવી તરીકે વિતાવે છે. પ્લાઝમોડિયમ અને ટીનિયા સંપૂર્ણપણે પરોપજીવી છે અને સ્વતંત્ર જીવન જીવી શકતા નથી. એસ્કેરિસ લુમ્બ્રિકોઇડિસ પણ સંપૂર્ણ પરોપજીવી છે અને તેના જીવનચક્રમાં સ્વતંત્ર તબક્કો નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ કલ્યાણમાં સૂક્ષ્મજીવો", "ch": ""}, {"q": "એક સંશોધકે એક નવો બહુકોષી સજીવ શોધ્યો જેના કોષોમાં કોષકેન્દ્ર હાજર છે, પરંતુ તે સ્વયંપોષી નથી. આ સજીવ અન્ય સજીવના શરીરની બહાર રહીને તેના શરીરમાંથી પોષક તત્ત્વો મેળવે છે. આ સજીવના પોષણની રીતને પરિતંત્રના સંદર્ભમાં શું કહેવાય? અને તેના માટે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["આ સજીવને 'મૃતોપજીવી' (સેપ્રોફાઇટ) કહેવાય અને તે મૃત કાર્બનિક પદાર્થોનું વિઘટન કરીને પોષણ મેળવે છે", "આ સજીવને 'પરોપજીવી' (પેરાસાઇટ) કહેવાય અને તે જીવંત યજમાનના શરીરમાંથી પોષક તત્ત્વો મેળવે છે", "આ સજીવને 'બાહ્યપરોપજીવી' (એક્ટોપેરાસાઇટ) કહેવાય અને તે યજમાનના શરીરની સપાટી પર રહીને પોષણ મેળવે છે", "આ સજીવને 'મૃતોપજીવી' કહેવાય અને તે યજમાનના શરીરમાં રહીને પોષણ મેળવે છે"], "ans": 3, "exp": "સાચો જવાબ વિકલ્પ D છે. આ સજીવ બહુકોષી છે, કોષકેન્દ્ર ધરાવે છે, પરંતુ સ્વયંપોષી નથી અને અન્ય સજીવના શરીરની બહાર રહીને પોષણ મેળવે છે, તેથી તેને 'બાહ્યપરોપજીવી' (એક્ટોપેરાસાઇટ) કહેવાય. વિકલ્પ A ખોટો છે કારણ કે મૃતોપજીવી મૃત કાર્બનિક પદાર્થો પર આધારિત હોય છે, જ્યારે આ સજીવ જીવંત યજમાન પર આધારિત છે. વિકલ્પ B ખોટો છે કારણ કે પરોપજીવી સામાન્ય રીતે યજમાનના શરીરની અંદર રહે છે. વિકલ્પ C સાચું છે પરંતુ પ્રશ્નમાં ખોટું વિધાન પૂછવામાં આવ્યું છે, તેથી તે યોગ્ય નથી. વિકલ્પ D ખોટો છે કારણ કે મૃતોપજીવી યજમાનના શરીરમાં રહીને પોષણ મેળવતા નથી અને આ સજીવ જીવંત યજમાન પર આધારિત છે.", "ref": "Std 11 - પ્રકરણ 14: સજીવોનું વર્ગીકરણ અને પોષણની રીતો", "ch": ""}, {"q": "નીચેનામાંથી કયો સજીવ પરિતંત્રના સંદર્ભમાં 'ઉપભોક્તા' તરીકે ઓળખાય છે, પરંતુ તે પ્રાથમિક ઉત્પાદકો પર સીધો આધારિત નથી?", "opts": ["હરણ (ડીયર)", "સિંહ (લાયન)", "ફૂગ (ફંગસ)", "લીલ (આલ્ગી)"], "ans": 1, "exp": "સિંહ (લાયન) તૃતીયક ઉપભોક્તા છે જે પ્રાથમિક ઉત્પાદકો પર સીધો આધારિત નથી, પરંતુ અન્ય ઉપભોક્તાઓ પર આધારિત છે. હરણ પ્રાથમિક ઉપભોક્તા છે, ફૂગ વિઘટક છે, અને લીલ પ્રાથમિક ઉત્પાદક છે.", "ref": "Std 12 - પ્રકરણ 14: પરિતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પરિતંત્રમાં ઉર્જાના પ્રવાહ સંબંધી ખોટું છે?", "opts": ["ઉર્જાનો પ્રવાહ એકદિશીય હોય છે અને તે ઉત્પાદકોથી ઉપભોક્તાઓ તરફ વહે છે.", "ઉર્જાનું સ્થાનાંતરણ એક પોષણ સ્તરથી બીજા પોષણ સ્તરે 100% કાર્યક્ષમ હોય છે.", "ઉર્જાનો મોટો ભાગ શ્વસન અને ઉષ્મા સ્વરૂપે ગુમાવાય છે.", "પરિતંત્રમાં ઉર્જાનો પ્રવાહ સૂર્યથી શરૂ થાય છે."], "ans": 1, "exp": "ઉર્જાનું સ્થાનાંતરણ એક પોષણ સ્તરથી બીજા પોષણ સ્તરે 10% નિયમ અનુસાર થાય છે, જે 100% કાર્યક્ષમ નથી. બાકીના વિધાનો પરિતંત્રમાં ઉર્જાના પ્રવાહ સંબંધી સાચાં છે.", "ref": "Std 12 - પ્રકરણ 14: પરિતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પરિતંત્રમાં ઉર્જાના પ્રવાહ સંબંધી સત્ય નથી?", "opts": ["ઉર્જાનો પ્રવાહ એકદિશાત્મક હોય છે.", "ઉર્જાનું સ્થાનાંતરણ પોષણ સ્તરોમાં થાય છે.", "ઉર્જાનો પ્રવાહ ચક્રીય હોય છે.", "ઉર્જાનો પ્રવાહ સૂર્યમાંથી પ્રારંભ થાય છે."], "ans": 2, "exp": "પરિતંત્રમાં ઉર્જાનો પ્રવાહ એકદિશાત્મક હોય છે, એટલે કે તે એક દિશામાં જ પ્રવાહિત થાય છે (A સત્ય). ઉર્જાનું સ્થાનાંતરણ પોષણ સ્તરોમાં થાય છે (B સત્ય). ઉર્જાનો પ્રવાહ સૂર્યમાંથી પ્રારંભ થાય છે (D સત્ય). પરંતુ ઉર્જાનો પ્રવાહ ક્યારેય ચક્રીય નથી હોતો (C ખોટું).", "ref": "Std 12 - Chapter 13: પરિતંત્ર અને ઉર્જાનો પ્રવાહ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પરિતંત્રમાં ઉર્જાના પ્રવાહ સંબંધી અયોગ્ય છે?", "opts": ["ઉર્જાનો પ્રવાહ એકદિશાત્મક (યુનિડાયરેક્શનલ) હોય છે.", "ઉર્જાનું સ્થાનાંતરણ પોષણ સ્તરોમાંથી થાય છે, અને દરેક સ્તરે ઉર્જાનો કેટલાક ભાગ ઉષ્મા રૂપે નષ્ટ થાય છે.", "પ્રાથમિક ઉત્પાદકો (સ્વયંપોષી) સૂર્યપ્રકાશની ઉર્જાને રાસાયણિક ઉર્જામાં રૂપાંતરિત કરે છે.", "ઉર્જાનો પ્રવાહ ચક્રીય હોય છે અને તે પરિતંત્રમાં પુનરાવર્તિત થાય છે."], "ans": 3, "exp": "પરિતંત્રમાં ઉર્જાનો પ્રવાહ એકદિશાત્મક હોય છે, એટલે કે તે એક દિશામાં જ પ્રવાહિત થાય છે (A સત્ય). દરેક પોષણ સ્તરે ઉર્જાનો કેટલાક ભાગ ઉષ્મા રૂપે નષ્ટ થાય છે (B સત્ય). પ્રાથમિક ઉત્પાદકો સૂર્યપ્રકાશની ઉર્જાને રાસાયણિક ઉર્જામાં રૂપાંતરિત કરે છે (C સત્ય). પરંતુ ઉર્જાનો પ્રવાહ ક્યારેય ચક્રીય નથી હોતો, તે હંમેશા એકદિશાત્મક જ હોય છે (D ખોટું).", "ref": "Std 12 - અધ્યાય 14: પરિતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયો સજીવ પરિતંત્રમાં 'ઉત્પાદક' તરીકે ઓળખાય છે, પરંતુ તે પ્રકાશસંશ્લેષણ કરતો નથી?", "opts": ["લીલ (આલ્ગી)", "રસાયણસંશ્લેષી બેક્ટેરિયા (કેમોસિન્થેટિક બેક્ટેરિયા)", "ફૂગ (ફંગસ)", "લીલી વનસ્પતિઓ (ગ્રીન પ્લાન્ટ્સ)"], "ans": 1, "exp": "રસાયણસંશ્લેષી બેક્ટેરિયા (કેમોસિન્થેટિક બેક્ટેરિયા) અકાર્બનિક પદાર્થોના ઓક્સિડેશન દ્વારા ઉર્જા મેળવે છે અને પરિતંત્રમાં ઉત્પાદક તરીકે કાર્ય કરે છે, પરંતુ તેઓ પ્રકાશસંશ્લેષણ કરતા નથી. લીલ અને લીલી વનસ્પતિઓ પ્રકાશસંશ્લેષણ કરે છે, જ્યારે ફૂગ વિઘટક તરીકે કાર્ય કરે છે.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "એક પરિતંત્રમાં, જો એક સજીવ અન્ય સજીવના શરીરમાં રહીને તેના પોષક તત્ત્વોનો ઉપયોગ કરે છે અને તે યજમાનને મારી નાખે છે, તો આ પ્રકારના પોષણને શું કહેવાય?", "opts": ["પરોપજીવીતા (પેરાસિટિઝમ)", "પરોપજીવી-સહજીવીતા (પેરાસિટોઇડિઝમ)", "પરભક્ષણ (પ્રેડેશન)", "સહજીવન (કમેન્સલિઝમ)"], "ans": 1, "exp": "પરોપજીવી-સહજીવીતા (પેરાસિટોઇડિઝમ)માં સજીવ યજમાનના શરીરમાં રહીને તેના પોષક તત્ત્વોનો ઉપયોગ કરે છે અને અંતે યજમાનને મારી નાખે છે. પરોપજીવીતા (પેરાસિટિઝમ)માં યજમાનને તાત્કાલિક નુકસાન થતું નથી, પરભક્ષણ (પ્રેડેશન)માં એક સજીવ બીજાને ખાઈ જાય છે, અને સહજીવન (કમેન્સલિઝમ)માં યજમાનને કોઈ નુકસાન થતું નથી.", "ref": "Std 12 - પ્રકરણ 13: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પરિતંત્રમાં 'વિઘટકો' (ડિકમ્પોઝર્સ)ના સંદર્ભમાં ખોટું છે?", "opts": ["વિઘટકો મૃત કાર્બનિક પદાર્થોનું અકાર્બનિક પદાર્થોમાં રૂપાંતર કરે છે.", "વિઘટકો પરિતંત્રમાં ઉર્જાના પ્રવાહમાં મહત્ત્વપૂર્ણ ભૂમિકા ભજવે છે.", "વિઘટકો પ્રકાશસંશ્લેષણ દ્વારા ઉર્જા મેળવે છે.", "વિઘટકો કાર્બન અને નાઇટ્રોજન ચક્રમાં મહત્ત્વપૂર્ણ ભૂમિકા ભજવે છે."], "ans": 2, "exp": "વિઘટકો પ્રકાશસંશ્લેષણ કરતા નથી, તેઓ મૃત કાર્બનિક પદાર્થોનું વિઘટન કરીને અકાર્બનિક પદાર્થોમાં રૂપાંતર કરે છે. તેઓ પરિતંત્રમાં ઉર્જાના પ્રવાહ અને પોષક ચક્રમાં મહત્ત્વપૂર્ણ ભૂમિકા ભજવે છે.", "ref": "Std 11 - પ્રકરણ 14: પર્યાવરણ અને પરિતંત્ર", "ch": ""}, {"q": "એક પરિતંત્રમાં, જો એક સજીવ અન્ય સજીવના શરીર પર રહીને તેના શરીરમાંથી પોષક તત્ત્વો મેળવે છે, પરંતુ તે યજમાનને કોઈ લાભ કે નુકસાન પહોંચાડતો નથી, તો આ પ્રકારના સંબંધને શું કહેવાય?", "opts": ["પરોપજીવીતા (પેરાસિટિઝમ)", "પરસ્પરતા (મ્યુચ્યુઅલિઝમ)", "સહજીવન (કમેન્સલિઝમ)", "પરભક્ષણ (પ્રેડેશન)"], "ans": 2, "exp": "સહજીવન (કમેન્સલિઝમ)માં એક સજીવ યજમાનના શરીર પર રહીને પોષક તત્ત્વો મેળવે છે, પરંતુ યજમાનને કોઈ લાભ કે નુકસાન થતું નથી. પરોપજીવીતા (પેરાસિટિઝમ)માં યજમાનને નુકસાન થાય છે, પરસ્પરતા (મ્યુચ્યુઅલિઝમ)માં બંનેને લાભ થાય છે, અને પરભક્ષણ (પ્રેડેશન)માં એક સજીવ બીજાને ખાઈ જાય છે.", "ref": "Std 12 - પ્રકરણ 13: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "એક સંશોધકે એક નવો બહુકોષી સજીવ શોધ્યો જે અન્ય સજીવના શરીરમાં રહીને તેના પોષક તત્ત્વો મેળવે છે, પરંતુ તે સજીવને કોઈ નુકસાન પહોંચાડતો નથી અને તેના યજમાન સાથે લાંબા સમય સુધી સહઅસ્તિત્વ જાળવી શકે છે. આ સજીવને પરિતંત્રના સંદર્ભમાં કયા પ્રકારમાં વર્ગીકૃત કરી શકાય?", "opts": ["પરોપજીવી (પેરાસાઇટ)", "સહજીવી (કમેન્સલ)", "પરજીવી (પરાસિટોઇડ)", "પરાવલંબી (એપિફાઇટ)"], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B) સહજીવી (કમેન્સલ) છે. આ સજીવ યજમાનને કોઈ નુકસાન પહોંચાડ્યા વગર તેના શરીરમાંથી પોષક તત્ત્વો મેળવે છે, જે સહજીવીની લાક્ષણિકતા છે. પરોપજીવી (વિકલ્પ A) યજમાનને નુકસાન પહોંચાડે છે, પરજીવી (વિકલ્પ C) યજમાનને મારી નાખે છે, જ્યારે પરાવલંબી (વિકલ્પ D) અન્ય વનસ્પતિ પર ઉગે છે પરંતુ તેના શરીરમાંથી પોષણ મેળવતો નથી. તેથી આ ત્રણેય વિકલ્પો ખોટા છે.", "ref": "Std 12 - પ્રકરણ 13: સજીવો અને વસ્તી", "ch": ""}, {"q": "નીચેનામાંથી કયો સજીવ પરિતંત્રમાં 'પરોપજીવી' તરીકે ઓળખાય છે, પરંતુ તેના પોષણની રીત અન્ય પરોપજીવીઓથી અલગ છે કારણ કે તે પોતાના યજમાનના શરીરમાં પ્રવેશ્યા વગર તેના શરીરની સપાટી પરથી પોષક તત્ત્વો મેળવે છે?", "opts": ["જૂ (લાઇસ)", "અમીબા", "પ્લાઝમોડિયમ", "ફૂગ (ફંગસ)"], "ans": 0, "exp": "જૂ (લાઇસ) એક બાહ્ય પરોપજીવી (એક્ટોપેરાસાઇટ) છે જે યજમાનના શરીરની સપાટી પર રહીને લોહી ચૂસે છે. અમીબા અને પ્લાઝમોડિયમ આંતરિક પરોપજીવી (એન્ડોપેરાસાઇટ) છે, જ્યારે ફૂગ મોટે ભાગે વિઘટક અથવા પરોપજીવી તરીકે કામ કરે છે, પરંતુ તે બાહ્ય પરોપજીવી નથી.", "ref": "Std 12 - પ્રકરણ 13: સજીવો અને પર્યાવરણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પરિતંત્રમાં 'પરોપજીવી' (પેરાસાઇટ)ના સંદર્ભમાં ખોટું છે?", "opts": ["પરોપજીવી હંમેશા યજમાનને મારી નાખે છે.", "પરોપજીવી યજમાનના શરીરમાંથી પોષક તત્ત્વો મેળવે છે.", "પરોપજીવી યજમાનના શરીરમાં અથવા તેની સપાટી પર રહી શકે છે.", "પરોપજીવી યજમાનના શરીરમાં રોગ ઉત્પન્ન કરી શકે છે."], "ans": 0, "exp": "પરોપજીવી સામાન્ય રીતે યજમાનને તાત્કાલિક મારતા નથી, કારણ કે તેમને યજમાનની જરૂર પડે છે. પરોપજીવી યજમાનના શરીરમાંથી પોષક તત્ત્વો મેળવે છે, તે યજમાનના શરીરમાં અથવા સપાટી પર રહી શકે છે, અને તે યજમાનમાં રોગ ઉત્પન્ન કરી શકે છે.", "ref": "Std 12 - પ્રકરણ 13: સજીવો અને પર્યાવરણ", "ch": ""}, {"q": "એક સંશોધકે એક નવો સજીવ શોધ્યો જે અન્ય સજીવના શરીરમાં રહીને તેના પોષક તત્ત્વો મેળવે છે, પરંતુ તે સજીવને મારતો નથી. આ સજીવના કોષોમાં કોષકેન્દ્ર હાજર નથી અને તે પ્રોકેરિયોટિક છે. આ સજીવ કયા સમૂહમાં આવે છે?", "opts": ["બેક્ટેરિયા", "પ્રજીવ (પ્રોટોઝોઆ)", "ફૂગ (ફંગસ)", "વાઇરસ"], "ans": 0, "exp": "બેક્ટેરિયા પ્રોકેરિયોટિક સજીવો છે જેમાં કોષકેન્દ્ર હાજર નથી અને તેઓ પરોપજીવી તરીકે કામ કરી શકે છે. પ્રજીવ (પ્રોટોઝોઆ) અને ફૂગ (ફંગસ) યુકેરિયોટિક છે, જ્યારે વાઇરસ સજીવ નથી અને તેને કોષરચના હોતી નથી.", "ref": "Std 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ, Std 12 - પ્રકરણ 13: સજીવો અને પર્યાવરણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન 'પરોપજીવી' (પેરાસાઇટ)ના સંદર્ભમાં ખોટું છે, જે પરિતંત્રના પોષણ સ્તરને અસર કરે છે?", "opts": ["પરોપજીવી હંમેશા યજમાનના શરીરમાં રહીને તેના પોષક તત્ત્વોનો ઉપયોગ કરે છે.", "કેટલાક પરોપજીવીઓ યજમાનના શરીરમાંથી બહાર નીકળીને સ્વતંત્ર જીવન જીવી શકે છે.", "પરોપજીવીઓ યજમાનના શરીરમાં રહીને તેની પ્રજનન ક્ષમતા ઘટાડી શકે છે.", "પરોપજીવીઓ હંમેશા યજમાનને તાત્કાલિક મારી નાખે છે."], "ans": 3, "exp": "સાચો જવાબ વિકલ્પ D) પરોપજીવીઓ હંમેશા યજમાનને તાત્કાલિક મારી નાખે છે. આ વિધાન ખોટું છે કારણ કે પરોપજીવીઓ સામાન્ય રીતે યજમાનને તાત્કાલિક મારતા નથી, પરંતુ તેના શરીરમાંથી પોષક તત્ત્વો મેળવીને લાંબા સમય સુધી જીવે છે. વિકલ્પ A) સાચું છે કારણ કે પરોપજીવીઓ યજમાનના શરીરમાં રહીને પોષણ મેળવે છે. વિકલ્પ B) સાચું છે કારણ કે કેટલાક પરોપજીવીઓ જીવનચક્રના અમુક તબક્કે સ્વતંત્ર જીવન જીવી શકે છે. વિકલ્પ C) સાચું છે કારણ કે પરોપજીવીઓ યજમાનની પ્રજનન ક્ષમતા ઘટાડી શકે છે.", "ref": "Std 12 - પ્રકરણ 13: સજીવો અને વસ્તી", "ch": ""}, {"q": "એક દરિયાઈ પરિતંત્રમાં, એક સજીવ જો મૃત જૈવિક પદાર્થો પર આધારિત હોય અને તેના શરીરમાં ક્લોરોફિલ હાજર ન હોય, પરંતુ તેના જીવનચક્રના એક તબક્કે પ્રકાશસંશ્લેષણ કરતો હોય, તો તેને નીચેનામાંથી કયા પોષણ સ્તરમાં ગણવામાં આવે?", "opts": ["ઉત્પાદક (પ્રાથમિક ઉત્પાદક)", "વિઘટક (ડિકમ્પોઝર)", "પ્રાથમિક ઉપભોક્તા (હર્બિવોર)", "મિશ્ર પોષણ ધરાવતો સજીવ (મિક્સોટ્રોફ)"], "ans": 3, "exp": "જવાબ D) મિશ્ર પોષણ ધરાવતો સજીવ (મિક્સોટ્રોફ) છે. આ સજીવ મૃત જૈવિક પદાર્થો પર આધારિત હોવા છતાં તેના જીવનચક્કાના એક તબક્કે પ્રકાશસંશ્લેષણ કરે છે, જે મિક્સોટ્રોફીનું લક્ષણ છે. A) ઉત્પાદક ખોટું છે કારણ કે તે સતત પ્રકાશસંશ્લેષણ કરતો નથી. B) વિઘટક ખોટું છે કારણ કે તે મૃત પદાર્થોનું વિઘટન કરે છે પરંતુ પ્રકાશસંશ્લેષણ પણ કરે છે, જે વિઘટકની વ્યાખ્યામાં બંધબેસતું નથી. C) પ્રાથમિક ઉપભોક્તા ખોટું છે કારણ કે તે જીવંત ઉત્પાદકો પર આધારિત હોય છે, મૃત પદાર્થો પર નહીં.", "ref": "Std 12 - અધ્યાય 14: પરિતંત્ર", "ch": ""}, {"q": "એક પરિતંત્રમાં, જો એક સજીવ તેના પોષણ માટે રસાયણસંશ્લેષણ (કેમોસિનથેસિસ) પર આધારિત હોય, તો તેને કયા પોષણ સ્તરમાં ગણવામાં આવે છે?", "opts": ["ઉત્પાદક (પ્રોડ્યુસર)", "પ્રાથમિક ઉપભોક્તા (પ્રાઇમરી કન્ઝ્યુમર)", "દ્વિતીય ઉપભોક્તા (સેકન્ડરી કન્ઝ્યુમર)", "વિઘટક (ડિકમ્પોઝર)"], "ans": 0, "exp": "રસાયણસંશ્લેષણ દ્વારા પોષણ મેળવતા સજીવો (જેમ કે કેટલાક બેક્ટેરિયા) સ્વયંપોષી હોય છે અને પરિતંત્રમાં ઉત્પાદક તરીકે ગણવામાં આવે છે. પ્રાથમિક ઉપભોક્તા શાકાહારી હોય છે, દ્વિતીય ઉપભોક્તા માંસાહારી હોય છે, અને વિઘટકો મૃત કાર્બનિક પદાર્થોનું વિઘટન કરે છે. અહીં, રસાયણસંશ્લેષણ કરતા સજીવો ઉત્પાદક છે કારણ કે તેઓ અનુકૂળ રસાયણિક ઉર્જાનો ઉપયોગ કરીને કાર્બનિક પદાર્થોનું નિર્માણ કરે છે.", "ref": "Std 12 - Chapter 14: પરિતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયો સજીવ પરિતંત્રમાં 'અપવાદરૂપ ઉત્પાદક' ગણી શકાય, કારણ કે તે પ્રકાશસંશ્લેષણ ન કરતો હોય પરંતુ રસાયણસંશ્લેષણ દ્વારા પોષણ મેળવે છે?", "opts": ["સાયનોબેક્ટેરિયા", "નાઇટ્રોજન ફિક્સિંગ બેક્ટેરિયા", "સલ્ફર બેક્ટેરિયા (જેમ કે Thiobacillus)", "ફૂગ (ફંગી)"], "ans": 2, "exp": "સલ્ફર બેક્ટેરિયા (જેમ કે Thiobacillus) રસાયણસંશ્લેષણ દ્વારા પોષણ મેળવે છે, જ્યાં તેઓ સલ્ફરના સંયોજનોનું ઓક્સીડેશન કરીને ઉર્જા મેળવે છે. આ સજીવો ઉત્પાદક છે કારણ કે તેઓ અનુકૂળ રસાયણિક ઉર્જાનો ઉપયોગ કરીને કાર્બનિક પદાર્થોનું નિર્માણ કરે છે, પરંતુ પ્રકાશસંશ્લેષણ કરતા નથી. સાયનોબેક્ટેરિયા પ્રકાશસંશ્લેષણ કરે છે, નાઇટ્રોજન ફિક્સિંગ બેક્ટેરિયા નાઇટ્રોજનનું સ્થિરીકરણ કરે છે, અને ફૂગ વિઘટક અથવા પરોપજીવી હોય છે.", "ref": "Std 12 - Chapter 14: પરિતંત્ર", "ch": ""}, {"q": "એક પરિતંત્રમાં, જો એક સજીવ મૃત કાર્બનિક પદાર્થોનું વિઘટન કરીને પોષણ મેળવે છે, તો તેને કયા પોષણ સ્તરમાં ગણવામાં આવે છે?", "opts": ["પ્રાથમિક ઉત્પાદક", "પ્રાથમિક ઉપભોક્તા", "વિઘટક", "તૃતીય ઉપભોક્તા"], "ans": 2, "exp": "મૃત કાર્બનિક પદાર્થોનું વિઘટન કરીને પોષણ મેળવતા સજીવોને વિઘટક (ડિકમ્પોઝર) કહેવામાં આવે છે. પ્રાથમિક ઉત્પાદકો પ્રકાશસંશ્લેષણ અથવા રસાયણસંશ્લેષણ દ્વારા પોષણ મેળવે છે, પ્રાથમિક ઉપભોક્તા શાકાહારી હોય છે, અને તૃતીય ઉપભોક્તા માંસાહારી હોય છે જે દ્વિતીય ઉપભોક્તાને ખાય છે.", "ref": "Std 12 - Chapter 14: પરિતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પરિતંત્રમાં 'રસાયણસંશ્લેષી બેક્ટેરિયા'ના સંદર્ભમાં ખોટું છે?", "opts": ["તેઓ અકાર્બનિક પદાર્થોનો ઉપયોગ કરીને ઉર્જા મેળવે છે.", "તેઓ સૂર્યપ્રકાશ પર આધારિત હોય છે.", "તેઓ દરિયાઈ ગરમ જળસ્રોત નજીક જોવા મળે છે.", "તેઓ કાર્બન ડાયોક્સાઇડને કાર્બનિક સંયોજનોમાં રૂપાંતરિત કરે છે."], "ans": 1, "exp": "રસાયણસંશ્લેષી બેક્ટેરિયા અકાર્બનિક પદાર્થો (જેમ કે હાઇડ્રોજન સલ્ફાઇડ)નો ઉપયોગ કરીને ઉર્જા મેળવે છે, સૂર્યપ્રકાશ પર આધારિત નથી હોતા. વિકલ્પ A, C, અને D સત્ય છે: તેઓ અકાર્બનિક પદાર્થો પર આધારિત હોય છે (A), દરિયાઈ ગરમ જળસ્રોત નજીક જોવા મળે છે (C), અને કાર્બન ડાયોક્સાઇડને કાર્બનિક સંયોજનોમાં રૂપાંતરિત કરે છે (D). વિકલ્પ B ખોટો છે કારણ કે રસાયણસંશ્લેષી બેક્ટેરિયા સૂર્યપ્રકાશ પર આધારિત નથી હોતા, પરંતુ રાસાયણિક ઉર્જા પર આધારિત હોય છે.", "ref": "Std 12 - Chapter 14: પરિતંત્ર", "ch": ""}, {"q": "એક દરિયાઈ પરિતંત્રમાં, એક સજીવ જેણે રસાયણસંશ્લેષણ દ્વારા ઉર્જા મેળવવાની ક્ષમતા ધરાવે છે, પરંતુ તે હાઇડ્રોથર્મલ વેન્ટની આસપાસ જોવા મળે છે. આ સજીવની પોષણ પદ્ધતિ અને પરિતંત્રમાં તેની ભૂમિકા વિશે નીચેનામાંથી કયું વિધાન સૌથી યોગ્ય છે?", "opts": ["તે એક પ્રાથમિક ઉત્પાદક છે અને રસાયણસંશ્લેષી બેક્ટેરિયા તરીકે ઓળખાય છે, જે હાઇડ્રોજન સલ્ફાઇડનો ઉપયોગ કરીને કાર્બન ડાયોક્સાઇડને કાર્બોદિતમાં રૂપાંતરિત કરે છે.", "તે એક દ્વિતીય ઉત્પાદક છે અને સહજીવી સંબંધ ધરાવે છે, જે હાઇડ્રોથર્મલ વેન્ટમાં રહેતા અન્ય સજીવો સાથે ઉર્જા વહેંચે છે.", "તે એક વિઘટક છે અને મૃત કાર્બનિક પદાર્થોનું વિઘટન કરીને ઉર્જા મેળવે છે, પરંતુ હાઇડ્રોથર્મલ વેન્ટની આસપાસ રહે છે.", "તે એક પરોપજીવી છે અને હાઇડ્રોથર્મલ વેન્ટમાં રહેતા અન્ય સજીવોના શરીરમાંથી પોષક તત્ત્વો શોષી લે છે."], "ans": 0, "exp": "યોગ્ય જવાબ A છે કારણ કે હાઇડ્રોથર્મલ વેન્ટની આસપાસ રહેતા રસાયણસંશ્લેષી બેક્ટેરિયા હાઇડ્રોજન સલ્ફાઇડ જેવા અકાર્બનિક સંયોજનોનો ઉપયોગ કરીને કાર્બન ડાયોક્સાઇડને કાર્બોદિતમાં રૂપાંતરિત કરે છે, જે તેમને પ્રાથમિક ઉત્પાદક બનાવે છે. B ખોટું છે કારણ કે રસાયણસંશ્લેષી બેક્ટેરિયા દ્વિતીય ઉત્પાદક નથી, C ખોટું છે કારણ કે તેઓ વિઘટક નથી, અને D ખોટું છે કારણ કે તેઓ પરોપજીવી નથી.", "ref": "Std 12 - Chapter 14: પરિતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયો સજીવ પરિતંત્રમાં 'સહજીવી' તરીકે ઓળખાય છે, પરંતુ તેના પોષણની રીત અર્ધ-પરોપજીવી (હેમિપેરાસાઇટિક) છે?", "opts": ["લાઇકેન (Lichen)", "ઓર્કિડ (Orchid)", "રાઇઝોબિયમ (Rhizobium)", "એસ્કેરિસ (Ascaris)"], "ans": 1, "exp": "ઓર્કિડ (Orchid) એક સહજીવી સજીવ છે જે અન્ય વૃક્ષ પર વસે છે, પરંતુ તે અર્ધ-પરોપજીવી હોય છે કારણ કે તે પોતાના પોષણ માટે આંશિક રીતે પોષક તત્ત્વો મેળવે છે. લાઇકેન સંપૂર્ણ સહજીવી છે (ફૂગ + શૈવાળ), રાઇઝોબિયમ નાઇટ્રોજન સ્થિરીકરણ કરે છે, અને એસ્કેરિસ પરોપજીવી છે.", "ref": "Std 12 - Chapter 14: પરિતંત્ર", "ch": ""}, {"q": "એક પરિતંત્રમાં, જો એક સજીવ તેના પોષણ માટે રસાયણસંશ્લેષણ પર આધારિત છે, પરંતુ તે સલ્ફરના સંયોજનોનો ઉપયોગ કરે છે, તો તેને કયા પ્રકારના સજીવ તરીકે વર્ગીકૃત કરવામાં આવે?", "opts": ["પ્રકાશસંશ્લેષી સજીવ", "રસાયણસંશ્લેષી સજીવ (કેમોઓટ્રોફ)", "પરોપજીવી સજીવ", "વિઘટક સજીવ"], "ans": 1, "exp": "રસાયણસંશ્લેષણ દ્વારા ઉર્જા મેળવતા સજીવોને રસાયણસંશ્લેષી સજીવ (કેમોઓટ્રોફ) કહેવામાં આવે છે. સલ્ફરના સંયોજનોનો ઉપયોગ કરતા સજીવો પણ આ શ્રેણીમાં આવે છે. વિકલ્પ A ખોટો છે કારણ કે તે પ્રકાશસંશ્લેષણ પર આધારિત છે. વિકલ્પ C અને D ખોટા છે કારણ કે તેઓ અન્ય સજીવો પર આધારિત છે.", "ref": "Std 12 - Chapter 14: પરિતંત્ર", "ch": ""}, {"q": "એક સંશોધકે દરિયાઈ ઊંડાણમાં રહેતા એક બહુકોષી સજીવનું અવલોકન કર્યું, જેના શરીરમાં ક્લોરોફિલ નથી પરંતુ તે રસાયણસંશ્લેષી બેક્ટેરિયા સાથે સહજીવન ધરાવે છે. આ સજીવ પરિતંત્રમાં કયા પોષણ સ્તરમાં ગણી શકાય?", "opts": ["પ્રાથમિક ઉત્પાદક", "દ્વિતીયક ઉપભોક્તા", "તૃતીયક ઉપભોક્તા", "વિઘટક"], "ans": 0, "exp": "આ સજીવ રસાયણસંશ્લેષી બેક્ટેરિયા સાથે સહજીવન ધરાવે છે, જે રાસાયણિક ઉર્જાનો ઉપયોગ કરીને કાર્બનિક સંયોજનોનું નિર્માણ કરે છે. આ પ્રક્રિયા પરોક્ષ રીતે પ્રકાશસંશ્લેષણની જેમ કાર્બનિક પદાર્થોનું ઉત્પાદન કરે છે, તેથી આ સજીવને પ્રાથમિક ઉત્પાદક ગણી શકાય. બાકીના વિકલ્પો ખોટા છે કારણ કે: દ્વિતીયક અને તૃતીયક ઉપભોક્તા અન્ય સજીવોનું ભક્ષણ કરે છે, અને વિઘટકો મૃત કાર્બનિક પદાર્થોનું વિઘટન કરે છે.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પરિતંત્રમાં 'સહજીવન' (સિમ્બાયોસિસ)ના સંદર્ભમાં અપવાદરૂપ છે, કારણ કે તેમાં એક સજીવને લાભ થાય છે જ્યારે બીજાને નુકસાન થાય છે?", "opts": ["લાઈકેનમાં ફૂગ અને લીલ વચ્ચેનું સહજીવન", "રાઇઝોબિયમ બેક્ટેરિયા અને શિમ્બી કુળના છોડ વચ્ચેનું સહજીવન", "ટ્રાઇકોડર્મા ફૂગ અને કેટલાક છોડની મૂળ વચ્ચેનું સહજીવન", "કેટલાક પ્રકારના ફૂગ અને કીટકો વચ્ચેનું સહજીવન જ્યાં ફૂગ કીટકના શરીરમાં વિકાસ પામે છે"], "ans": 3, "exp": "કેટલાક પ્રકારના ફૂગ (જેમ કે એન્ટોમોફથોરા) કીટકોના શરીરમાં વિકાસ પામીને તેમને મારી નાખે છે, જેને 'પરોપજીવી સહજીવન' અથવા 'પરોપજીવી' તરીકે ગણી શકાય. આમાં ફૂગને લાભ થાય છે જ્યારે કીટકને નુકસાન થાય છે. બાકીના વિકલ્પોમાં બંને સજીવોને લાભ થાય છે: લાઈકેનમાં ફૂગ અને લીલ બંનેને લાભ, રાઇઝોબિયમ અને શિમ્બી છોડ વચ્ચે નાઇટ્રોજન સ્થાપનમાં લાભ, ટ્રાઇકોડર્મા ફૂગ છોડને રોગકારકોથી રક્ષણ આપે છે.", "ref": "Std 11 - પ્રકરણ 12: ખનીજ પોષણ", "ch": ""}, {"q": "એક દરિયાઈ પરિતંત્રમાં રહેતો સજીવ જે અન્ય સજીવના શરીરમાં રહીને તેના પોષક તત્ત્વો મેળવે છે, પરંતુ તે સજીવને કોઈ નુકસાન પહોંચાડતો નથી અને તેની સાથે લાંબા ગાળાનો સંબંધ ધરાવે છે. આ સજીવને પરિતંત્રના સંદર્ભમાં શું કહી શકાય, જે પરંપરાગત વર્ગીકરણમાં અપવાદરૂપ ગણાય છે?", "opts": ["પરોપજીવી (પેરાસાઇટ), કારણ કે તે અન્ય સજીવના શરીરમાં રહે છે", "સહજીવી (કમેન્સલ), કારણ કે તે યજમાનને નુકસાન પહોંચાડતો નથી", "પરોપજીવી-સહજીવી સંક્રાંતિ (પેરાસાઇટ-કમેન્સલ ટ્રાન્ઝિશન), કારણ કે તે યજમાન સાથે લાંબા ગાળાનો સંબંધ ધરાવે છે", "પરોપજીવી-પરસ્પરજીવી સંકરણ (પેરાસાઇટ-મ્યુચ્યુઅલિસ્ટ હાઇબ્રિડ), કારણ કે તે યજમાનને કોઈ લાભ કે નુકસાન પહોંચાડતો નથી"], "ans": 3, "exp": "સાચો જવાબ વિકલ્પ D છે. પરંપરાગત વર્ગીકરણ મુજબ, પરોપજીવી (પેરાસાઇટ) યજમાનને નુકસાન પહોંચાડે છે, જ્યારે સહજીવી (કમેન્સલ) યજમાનને નુકસાન કે લાભ પહોંચાડતો નથી. પરંતુ અહીં વર્ણવેલ સજીવ યજમાનને નુકસાન પહોંચાડતો નથી અને લાંબા ગાળાનો સંબંધ ધરાવે છે, જે પરોપજીવી અને પરસ્પરજીવી (મ્યુચ્યુઅલિસ્ટ) વચ્ચેની સંક્રાંતિ સ્થિતિ દર્શાવે છે. આ પ્રકારના સંબંધને 'પરોપજીવી-પરસ્પરજીવી સંકરણ' તરીકે ઓળખવામાં આવે છે, જે પરિતંત્રના પોષણ સ્તરમાં અપવાદરૂપ ગણાય છે.\n\nવિકલ્પ A ખોટો છે કારણ કે પરોપજીવી યજમાનને નુકસાન પહોંચાડે છે, જે અહીં થતું નથી.\nવિકલ્પ B ખોટો છે કારણ કે સહજીવી યજમાન સાથે લાંબા ગાળાનો પરસ્પર સંબંધ ધરાવતો નથી.\nવિકલ્પ C ખોટો છે કારણ કે 'પેરાસાઇટ-કમેન્સલ ટ્રાન્ઝિશન' એ પરંપરાગત વર્ગીકરણ નથી અને આ સ્થિતિને સ્પષ્ટ રીતે વ્યાખ્યાયિત કરતો નથી.", "ref": "Std 12 - પ્રકરણ 13: સજીવો અને વસ્તી (પરિતંત્ર અને પોષણ સ્તર)", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
