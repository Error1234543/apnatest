<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homo erectus</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Homo erectus</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Homo erectus</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "હોમો ઇરેક્ટસના અવશેષોમાંથી મળી આવેલા સૌથી જૂના સાધનો કયા પ્રકારના હતા?", "opts": ["અશુલિયન હસ્તકુહાડી (Acheulean hand-axes)", "ઓલ્ડોવાન પથ્થરનાં ઓજારો (Oldowan tools)", "મૌસ્ટેરિયન બ્લેડ (Mousterian blades)", "નિએન્ડરથલની હાડકાંની સોયો (Neanderthal bone needles)"], "ans": 1, "exp": "હોમો ઇરેક્ટસના પ્રારંભિક તબક્કામાં ઓલ્ડોવાન પથ્થરનાં ઓજારોનો ઉપયોગ થતો હતો, જે તેમના પૂર્વજ હોમો હેબિલિસ પાસેથી વારસામાં મળ્યા હતા. અશુલિયન હસ્તકુહાડી પાછળના તબક્કામાં વિકસિત થઈ હતી. મૌસ્ટેરિયન બ્લેડ નિએન્ડરથલ સાથે સંકળાયેલા છે, જ્યારે હાડકાંની સોયો તો આધુનિક માનવના સમયની છે. (GSEB પાઠ્યપુસ્તકમાં ઉત્ક્રાંતિના પ્રકરણમાં વર્ણવેલ છે.)", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો ઇરેક્ટસના મગજનું કદ આશરે કેટલું હતું, જે તેમના પૂર્વજ હોમો હેબિલિસ કરતાં નોંધપાત્ર રીતે મોટું હતું?", "opts": ["500-600 ઘન સેમી", "650-800 ઘન સેમી", "900-1100 ઘન સેમી", "1200-1400 ઘન સેમી"], "ans": 2, "exp": "હોમો ઇરેક્ટસનું મગજનું કદ આશરે 900-1100 ઘન સેમી હતું, જે હોમો હેબિલિસ (650-800 ઘન સેમી) કરતાં નોંધપાત્ર રીતે મોટું હતું. આધુનિક માનવનું મગજનું કદ આશરે 1300-1400 ઘન સેમી છે. આ માહિતી ઉત્ક્રાંતિના પ્રકરણમાં આપવામાં આવી છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન હોમો ઇરેક્ટસની વિશિષ્ટતા નથી, પરંતુ તેમના પછીના પ્રજાતિઓમાં જોવા મળે છે?", "opts": ["અગ્નિનો ઉપયોગ કરવો", "શિકાર માટે સામૂહિક વ્યૂહરચના અપનાવવી", "પ્રતીકાત્મક ભાષા (symbolic language)નો વિકાસ", "દ્વિપાદીય હલનચલન (bipedal locomotion)"], "ans": 2, "exp": "હોમો ઇરેક્ટસ અગ્નિનો ઉપયોગ કરતા હતા, સામૂહિક શિકાર કરતા હતા અને દ્વિપાદીય હલનચલન ધરાવતા હતા. જોકે, પ્રતીકાત્મક ભાષાનો વિકાસ તેમના પછીની પ્રજાતિઓ જેમ કે હોમો સેપિયન્સમાં જોવા મળ્યો હતો. આ ભેદ ઉત્ક્રાંતિના પ્રકરણમાં સ્પષ્ટ કરવામાં આવ્યો છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો ઇરેક્ટસના અવશેષો આફ્રિકા ઉપરાંત કયા ખંડોમાંથી મળી આવ્યા છે, જે તેમની સ્થળાંતર ક્ષમતા દર્શાવે છે?", "opts": ["માત્ર એશિયા", "એશિયા અને યુરોપ", "એશિયા, યુરોપ અને ઓસ્ટ્રેલિયા", "એશિયા, યુરોપ અને ઉત્તર અમેરિકા"], "ans": 1, "exp": "હોમો ઇરેક્ટસના અવશેષો આફ્રિકા ઉપરાંત એશિયા અને યુરોપમાંથી મળી આવ્યા છે, જે તેમની સ્થળાંતર ક્ષમતા દર્શાવે છે. ઓસ્ટ્રેલિયા અને ઉત્તર અમેરિકામાં તેમના અવશેષો મળ્યા નથી. આ માહિતી ઉત્ક્રાંતિના પ્રકરણમાં આપવામાં આવી છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો ઇરેક્ટસના શરીરની રચનામાં નીચેનામાંથી કયું લક્ષણ આધુનિક માનવ કરતાં અલગ હતું, જે તેમને ઠંડા વાતાવરણમાં અનુકૂલનમાં મદદ કરતું હતું?", "opts": ["લાંબા અને પાતળા અંગો (long and slender limbs)", "ટૂંકા અને જાડા અંગો (short and stocky limbs)", "વિશાળ નાક (wide nasal aperture)", "પાતળી ખોપરીની હાડકાં (thin cranial bones)"], "ans": 2, "exp": "હોમો ઇરેક્ટસમાં ટૂંકા અને જાડા અંગો જોવા મળતા હતા, જે ઠંડા વાતાવરણમાં શરીરનું તાપમાન જાળવવામાં મદદ કરતા હતા (એલનનું નિયમ). આધુનિક માનવમાં સામાન્ય રીતે લાંબા અને પાતળા અંગો જોવા મળે છે. વિશાળ નાક અને પાતળી ખોપરીની હાડકાં હોમો ઇરેક્ટસની લાક્ષણિકતા ન હતી. આ માહિતી ઉત્ક્રાંતિના અનુકૂલનના ભાગમાં વર્ણવેલ છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો ઇરેક્ટસના જીવનશૈલી અભ્યાસમાંથી કયો પુરાવો તેમની સાંસ્કૃતિક પ્રગતિનો સૌથી મજબૂત પુરાવો ગણવામાં આવે છે?", "opts": ["અગ્નિનો ઉપયોગ અને નિયંત્રણ", "પથ્થરના સાધનોનું નિર્માણ", "શિકાર માટે સહકાર્ય પૂર્વક રહેઠાણ", "મૃતદેહોનું સંસ્કાર કરવાની પ્રથા"], "ans": 0, "exp": "હોમો ઇરેક્ટસ દ્વારા અગ્નિનો ઉપયોગ અને નિયંત્રણ તેમની સાંસ્કૃતિક પ્રગતિનો સૌથી મજબૂત પુરાવો છે, કારણ કે આ તેમની તકનીકી કુશળતા અને પર્યાવરણ સાથે અનુકૂલનની ક્ષમતાને દર્શાવે છે. પથ્થરના સાધનોનું નિર્માણ પણ મહત્વપૂર્ણ છે, પરંતુ અગ્નિનો ઉપયોગ વધુ અદ્યતન સાંસ્કૃતિક લક્ષણ છે. શિકાર માટે સહકાર્ય પૂર્વક રહેઠાણ અને મૃતદેહોના સંસ્કારની પ્રથા હોમો ઇરેક્ટસમાં સ્પષ્ટ રીતે નોંધાયેલ નથી, તેથી તે અયોગ્ય વિકલ્પો છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "હોમો ઇરેક્ટસના કંકાળ અભ્યાસમાંથી કયું લક્ષણ તેમને હોમો હેબિલિસ કરતાં વધુ આધુનિક બનાવે છે?", "opts": ["ખભાના હાડકાંની રચના જે ચડતી કલા માટે અનુકૂળ હતી", "જડબાના હાડકાંની રચના જે મજબૂત દાંત ધરાવતી હતી", "પગની હાડકાંની રચના જે દોડવાની ક્ષમતા વધારતી હતી", "કમરની હાડકાંની રચના જે સીધા ઉભા રહેવાની ક્ષમતા ધરાવતી હતી"], "ans": 3, "exp": "હોમો ઇરેક્ટસમાં કમરની હાડકાંની રચના સીધા ઉભા રહેવાની ક્ષમતા ધરાવતી હતી, જે તેમને હોમો હેબિલિસ કરતાં વધુ આધુનિક બનાવે છે. ખભાના હાડકાં, જડબાના હાડકાં, અને પગની હાડકાંની રચના પણ મહત્વપૂર્ણ છે, પરંતુ કમરની રચના સૌથી નિર્ણાયક લક્ષણ છે જે તેમને આધુનિક માનવ જેવી શારીરિક રચના તરફ લઈ ગયું.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "હોમો ઇરેક્ટસના અવશેષોના ભૌગોલિક વિતરણને ધ્યાનમાં લેતા, કયો ખંડ તેમના વસવાટનો સૌથી મહત્વપૂર્ણ પુરાવો પૂરો પાડે છે જે આફ્રિકા બહાર છે?", "opts": ["યુરોપ", "એશિયા", "ઓસ્ટ્રેલિયા", "ઉત્તર અમેરિકા"], "ans": 1, "exp": "હોમો ઇરેક્ટસના અવશેષો એશિયામાં સૌથી વધુ પ્રમાણમાં મળી આવ્યા છે, ખાસ કરીને ઇન્ડોનેશિયા અને ચીનમાં. યુરોપમાં પણ અવશેષો મળ્યા છે, પરંતુ એશિયા સૌથી મહત્વપૂર્ણ ભૌગોલિક વિતરણ ધરાવે છે. ઓસ્ટ્રેલિયા અને ઉત્તર અમેરિકામાં હોમો ઇરેક્ટસના અવશેષો મળ્યા નથી, તેથી તે અયોગ્ય વિકલ્પો છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "હોમો ઇરેક્ટસના મગજના કદ અને રચનાને ધ્યાનમાં લેતા, કયું વિધાન સૌથી યોગ્ય રીતે તેમની બૌદ્ધિક ક્ષમતાને વર્ણવે છે?", "opts": ["તેમનો મગજ આધુનિક માનવ જેટલો મોટો હતો, પરંતુ તેની રચના સરળ હતી", "તેમનો મગજ હોમો હેબિલિસ કરતાં મોટો હતો, પરંતુ આધુનિક માનવ કરતાં નાનો હતો અને તેની રચના જટિલ હતી", "તેમનો મગજ હોમો હેબિલિસ જેટલો જ હતો, પરંતુ તેની રચના વધુ વિકસિત હતી", "તેમનો મગજ આધુનિક માનવ કરતાં મોટો હતો, પરંતુ તેની રચના સરળ હતી"], "ans": 1, "exp": "હોમો ઇરેક્ટસનો મગજ હોમો હેબિલિસ કરતાં મોટો હતો (આશરે 900-1100 ઘન સેન્ટિમીટર), પરંતુ આધુનિક માનવ કરતાં નાનો હતો (આશરે 1300-1400 ઘન સેન્ટિમીટર). તેમની મગજની રચના પણ વધુ જટિલ હતી, જે તેમની બૌદ્ધિક ક્ષમતાને દર્શાવે છે. અન્ય વિકલ્પો અયોગ્ય છે કારણ કે તેઓ મગજના કદ અથવા રચનાને યોગ્ય રીતે વર્ણવતા નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "હોમો ઇરેક્ટસના શારીરિક લક્ષણો અને વર્તણૂકને ધ્યાનમાં લેતા, કયું વિધાન તેમની જીવનશૈલી વિશે સૌથી અયોગ્ય છે?", "opts": ["તેઓ સહકાર્ય પૂર્વક શિકાર કરતા હતા", "તેઓ પથ્થરના સાધનોનો ઉપયોગ કરતા હતા", "તેઓ સ્થાયી રહેઠાણો બનાવતા હતા", "તેઓ અગ્નિનો ઉપયોગ કરતા હતા"], "ans": 2, "exp": "હોમો ઇરેક્ટસ સ્થાયી રહેઠાણો બનાવતા નહોતા, પરંતુ તેઓ સહકાર્ય પૂર્વક શિકાર કરતા હતા, પથ્થરના સાધનોનો ઉપયોગ કરતા હતા, અને અગ્નિનો ઉપયોગ કરતા હતા. સ્થાયી રહેઠાણો બનાવવાની પ્રથા પાછળથી આધુનિક માનવમાં વિકસિત થઈ, તેથી આ વિધાન અયોગ્ય છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "હોમો ઇરેક્ટસના અવશેષોમાં મળી આવેલા કંકાળના અભ્યાસ દરમિયાન, નીચેનામાંથી કયું લક્ષણ તેમને હોમો હેબિલિસ કરતાં વધુ ઉચ્ચ કોટિના શિકારી બનાવતું હોવાનું સૂચવે છે?", "opts": ["લાંબા અને સાંકડા દાંતોની હાજરી, જે કઠણ ખોરાક ચાવવા માટે અનુકૂળ હતા", "ખભાના હાડકાંની રચના, જે લાંબા અંતર સુધી દોડવા અને શિકાર કરવા માટે અનુકૂળ હતી", "પગની હાડકાંની રચના, જે સીધા ઊભા રહેવા અને ચાલવા માટે અનુકૂળ હતી", "હાથની હાડકાંની રચના, જે સાધનો બનાવવા અને વાપરવા માટે અનુકૂળ હતી"], "ans": 1, "exp": "હોમો ઇરેક્ટસના ખભાના હાડકાંની રચના લાંબા અંતર સુધી દોડવા અને શિકાર કરવા માટે અનુકૂળ હતી, જે તેમને વધુ ઉચ્ચ કોટિના શિકારી બનાવતું હતું. લાંબા અને સાંકડા દાંતો (A) કઠણ ખોરાક ચાવવા માટે અનુકૂળ હતા, પરંતુ શિકારી કૌશલ્ય સાથે સીધો સંબંધ ધરાવતા નથી. પગની હાડકાંની રચના (C) સીધા ઊભા રહેવા અને ચાલવા માટે અનુકૂળ હતી, પરંતુ શિકારી કૌશલ્ય સાથે સીધો સંબંધ ધરાવતા નથી. હાથની હાડકાંની રચના (D) સાધનો બનાવવા અને વાપરવા માટે અનુકૂળ હતી, પરંતુ શિકારી કૌશલ્ય સાથે સીધો સંબંધ ધરાવતા નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો ઇરેક્ટસના જીવનશૈલી અભ્યાસમાં, નીચેનામાંથી કયો પુરાવો તેમની સાંસ્કૃતિક પ્રગતિનો સૌથી મજબૂત પુરાવો નથી?", "opts": ["અગ્નિનો ઉપયોગ", "સાધનોનું નિર્માણ અને ઉપયોગ", "શિકાર અને ખોરાક એકત્રિત કરવો", "કલાત્મક ચિત્રો અથવા શિલ્પોનું નિર્માણ"], "ans": 3, "exp": "હોમો ઇરેક્ટસના જીવનશૈલી અભ્યાસમાં, કલાત્મક ચિત્રો અથવા શિલ્પોનું નિર્માણ (D) તેમની સાંસ્કૃતિક પ્રગતિનો પુરાવો નથી, કારણ કે આ લક્ષણો હોમો સેપિયન્સ જેવી વધુ આધુનિક પ્રજાતિઓમાં જોવા મળે છે. અગ્નિનો ઉપયોગ (A), સાધનોનું નિર્માણ અને ઉપયોગ (B), અને શિકાર અને ખોરાક એકત્રિત કરવો (C) એ તમામ હોમો ઇરેક્ટસની સાંસ્કૃતિક પ્રગતિના મજબૂત પુરાવા છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો ઇરેક્ટસના અવશેષોના ભૌગોલિક વિતરણને ધ્યાનમાં લેતા, નીચેનામાંથી કયો ખંડ તેમના વસવાટનો સૌથી ઓછો પુરાવો ધરાવે છે?", "opts": ["આફ્રિકા", "એશિયા", "યુરોપ", "ઓસ્ટ્રેલિયા"], "ans": 3, "exp": "હોમો ઇરેક્ટસના અવશેષો આફ્રિકા, એશિયા અને યુરોપ ખંડોમાંથી મળી આવ્યા છે, પરંતુ ઓસ્ટ્રેલિયા (D) ખંડમાં તેમના વસવાટનો કોઈ પુરાવો મળ્યો નથી. આફ્રિકા (A), એશિયા (B), અને યુરોપ (C) ખંડોમાં તેમના વસવાટના મજબૂત પુરાવા છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો ઇરેક્ટસના મગજના કદ અને રચનાને ધ્યાનમાં લેતા, નીચેનામાંથી કયું વિધાન સૌથી અયોગ્ય છે?", "opts": ["તેમનો મગજનો કદ આશરે 900-1100 ઘન સેન્ટિમીટર હતો", "તેમના મગજની રચના આધુનિક માનવ કરતાં સરળ હતી", "તેમના મગજનો કદ હોમો હેબિલિસ કરતાં મોટો હતો", "તેમના મગજની રચના હોમો સેપિયન્સ કરતાં જટિલ હતી"], "ans": 3, "exp": "હોમો ઇરેક્ટસના મગજની રચના હોમો સેપિયન્સ કરતાં સરળ હતી, નહીં કે જટિલ (D). તેમનો મગજનો કદ આશરે 900-1100 ઘન સેન્ટિમીટર હતો (A), તેમના મગજની રચના આધુનિક માનવ કરતાં સરળ હતી (B), અને તેમના મગજનો કદ હોમો હેબિલિસ કરતાં મોટો હતો (C).", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો ઇરેક્ટસના શારીરિક લક્ષણો અને વર્તણૂકને ધ્યાનમાં લેતા, નીચેનામાંથી કયું વિધાન તેમની જીવનશૈલી વિશે સૌથી અયોગ્ય છે?", "opts": ["તેઓ સંપૂર્ણ રીતે સ્થળચર હતા અને જમીન પર જ જીવતા હતા", "તેઓ શિકાર કરવા અને ખોરાક એકત્રિત કરવા માટે જૂથમાં રહેતા હતા", "તેઓ અગ્નિનો ઉપયોગ કરતા હતા અને સાધનો બનાવતા હતા", "તેઓ પાણીની નજીક રહેતા હતા અને મછલી પકડતા હતા"], "ans": 0, "exp": "હોમો ઇરેક્ટસ સંપૂર્ણ રીતે સ્થળચર નહોતા, પરંતુ તેઓ જમીન પર જીવતા હતા અને પાણીની નજીક રહેતા હતા (A અયોગ્ય છે). તેઓ શિકાર કરવા અને ખોરાક એકત્રિત કરવા માટે જૂથમાં રહેતા હતા (B), અગ્નિનો ઉપયોગ કરતા હતા અને સાધનો બનાવતા હતા (C), અને પાણીની નજીક રહેતા હતા અને મછલી પકડતા હતા (D).", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો ઇરેક્ટસના અવશેષોના અભ્યાસ દરમિયાન, તેમના કંકાળમાં જોવા મળેલા 'સેગિટલ કીલ' (Sagittal Keel) નું કયું મહત્વ છે?", "opts": ["તે તેમના મગજના કદમાં વૃદ્ધિ સાથે સંકળાયેલ છે, જે તેમની બૌદ્ધિક ક્ષમતામાં સુધારો દર્શાવે છે.", "તે તેમના જડબામાં મજબૂત મસલ્સની હાજરી દર્શાવે છે, જે કઠણ ખોરાક ચાવવા માટે ઉપયોગી હતી.", "તે તેમના ખોપરીની રચનામાં એક અનન્ય લક્ષણ છે, જે તેમને હોમો હેબિલિસ કરતાં અલગ પાડે છે.", "તે તેમના શરીરના સંતુલનને સુધારવા માટે ઉપયોગી હતું, જે તેમને લાંબા અંતર સુધી ચાલવા માટે મદદ કરતું હતું."], "ans": 0, "exp": "સેગિટલ કીલ હોમો ઇરેક્ટસના ખોપરી પર એક ઉભરો છે, જે મગજના કદમાં વૃદ્ધિ સાથે સંકળાયેલ છે. આ લક્ષણ તેમની બૌદ્ધિક ક્ષમતામાં સુધારો દર્શાવે છે. બાકીના વિકલ્પો અયોગ્ય છે: B) જડબાના મસલ્સ સાથે સંકળાયેલ નથી, C) ખોપરીની રચનામાં અનન્ય લક્ષણ નથી, અને D) શરીરના સંતુલન સાથે સંકળાયેલ નથી.", "ref": "Std 12 - Chapter 7: માનવ ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો ઇરેક્ટસના જીવનશૈલી અભ્યાસમાં, 'ઓલ્ડુવાઇ ગોર્જ' (Olduvai Gorge) માંથી મળી આવેલા પુરાવાઓમાંથી કયું વિધાન તેમની સાંસ્કૃતિક પ્રગતિને સૌથી મજબૂત રીતે સમર્થન આપે છે?", "opts": ["તેમણે પથ્થરના સાધનો બનાવવા માટે અગ્નિનો ઉપયોગ કર્યો હતો.", "તેમણે શિકાર માટે લાકડાના હથિયારોનો ઉપયોગ કર્યો હતો.", "તેમણે સંગઠિત રીતે શિકાર કરવા માટે સમૂહમાં કામ કર્યું હતું.", "તેમણે મૃત પ્રાણીઓના માંસને ખાવા માટે પથ્થરના સાધનોનો ઉપયોગ કર્યો હતો."], "ans": 3, "exp": "ઓલ્ડુવાઇ ગોર્જમાંથી મળી આવેલા પુરાવાઓ દર્શાવે છે કે હોમો ઇરેક્ટસે મૃત પ્રાણીઓના માંસને ખાવા માટે પથ્થરના સાધનોનો ઉપયોગ કર્યો હતો. આ તેમની સાંસ્કૃતિક પ્રગતિનો મજબૂત પુરાવો છે. બાકીના વિકલ્પો અયોગ્ય છે: A) અગ્નિનો ઉપયોગ કરવાનો પુરાવો નથી, B) લાકડાના હથિયારોનો પુરાવો નથી, અને C) સંગઠિત શિકારનો પુરાવો નથી.", "ref": "Std 12 - Chapter 7: માનવ ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો ઇરેક્ટસના કંકાળ અભ્યાસમાં, 'ટર્કાના બાળક' (Turkana Boy) ના અવશેષોમાંથી કયું લક્ષણ તેમને આધુનિક માનવ કરતાં અલગ પાડે છે?", "opts": ["તેમના હાથ અને પગની હાડકાંની રચના વધુ મજબૂત હતી.", "તેમના ખોપરીનું કદ આધુનિક માનવ કરતાં નાનું હતું.", "તેમના જડબામાં દાંતની રચના વધુ વિકસિત હતી.", "તેમના શરીરની ઉંચાઈ આધુનિક માનવ કરતાં ઓછી હતી."], "ans": 1, "exp": "ટર્કાના બાળકના અવશેષોમાંથી જાણવા મળે છે કે હોમો ઇરેક્ટસના ખોપરીનું કદ આધુનિક માનવ કરતાં નાનું હતું. બાકીના વિકલ્પો અયોગ્ય છે: A) હાથ અને પગની હાડકાંની રચના મજબૂત હોવાનો પુરાવો નથી, C) જડબામાં દાંતની રચના વધુ વિકસિત હોવાનો પુરાવો નથી, અને D) શરીરની ઉંચાઈ ઓછી હોવાનો પુરાવો નથી.", "ref": "Std 12 - Chapter 7: માનવ ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો ઇરેક્ટસના અવશેષોમાં જોવા મળેલા 'ટર્કાના બાળક' (KNM-WT 15000) ના કંકાળના અભ્યાસ દરમિયાન, નીચેનામાંથી કયું લક્ષણ તેમની ઉત્ક્રાંતિ ક્રમમાં મહત્વપૂર્ણ સંકેત નથી, પરંતુ આધુનિક માનવમાં જોવા મળતું લક્ષણ છે?", "opts": ["લાંબા અને સાંકડા પેલ્વિસ (શ્રોણી) ની રચના, જે દોડવાની ક્ષમતા સૂચવે છે", "મજબૂત અને વક્રિય ફીમર (મણકાનું હાડકું), જે લાંબા અંતરે ચાલવાની ક્ષમતા દર્શાવે છે", "સંપૂર્ણ રીતે વિકસિત ચેતાતંત્ર સાથે સંકળાયેલા કપાલના હાડકાંની જાડાઈ", "અલ્પ વિકસિત જડબા (મેન્ડિબલ) અને દાંતની રચના, જે નરમ ખોરાકના સેવનનો સંકેત આપે છે"], "ans": 3, "exp": "ટર્કાના બાળક (હોમો ઇરેક્ટસ) ના કંકાળમાં જડબા અને દાંતની રચના અલ્પ વિકસિત નથી, પરંતુ મજબૂત અને મોટા દાંત સાથે જડબા હાજર છે, જે કઠણ ખોરાકના સેવનનો સંકેત આપે છે. આધુનિક માનવમાં જડબા અને દાંતની રચના નરમ ખોરાકના અનુકૂલનને લીધે અલ્પ વિકસિત છે. લાંબા અને સાંકડા પેલ્વિસ (A), મજબૂત ફીમર (B), અને કપાલની જાડાઈ (C) એ હોમો ઇરેક્ટસના લક્ષણો છે, જે તેમની શારીરિક ક્ષમતા અને ઉત્ક્રાંતિ ક્રમમાં મહત્વપૂર્ણ છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "હોમો ઇરેક્ટસના ભૌગોલિક વિતરણ અને સાંસ્કૃતિક પ્રગતિને ધ્યાનમાં લેતા, નીચેનામાંથી કયું વિધાન તેમની 'આફ્રિકા બહાર નીકળવાની' (Out of Africa) થિયરીને સપોર્ટ કરતું નથી?", "opts": ["જાવા મેન (Java Man) ના અવશેષો ઇન્ડોનેશિયામાં મળી આવ્યા છે, જે આફ્રિકા બહાર તેમના વસવાટનો પુરાવો છે", "ઓલ્ડુવાઇ ગોર્જ (Olduvai Gorge) માંથી મળી આવેલા સાધનો તેમની સાંસ્કૃતિક પ્રગતિનો પુરાવો આપે છે, પરંતુ ભૌગોલિક વિતરણને સપોર્ટ કરતું નથી", "ચીનમાંથી મળી આવેલા 'પેકિંગ મેન' (Peking Man) ના અવશેષો તેમના એશિયામાં વસવાટનો પુરાવો છે", "યુરોપમાંથી મળી આવેલા અવશેષો તેમના આફ્રિકા બહારના પ્રસારનો પુરાવો આપે છે"], "ans": 1, "exp": "ઓલ્ડુવાઇ ગોર્જ (B) એ આફ્રિકામાં સ્થિત છે અને ત્યાંથી મળી આવેલા સાધનો હોમો ઇરેક્ટસની સાંસ્કૃતિક પ્રગતિનો પુરાવો આપે છે, પરંતુ આ ફક્ત આફ્રિકા સીમિત છે અને 'આફ્રિકા બહાર નીકળવાની' થિયરીને સીધો સપોર્ટ કરતું નથી. જાવા મેન (A), પેકિંગ મેન (C), અને યુરોપના અવશેષો (D) એ આફ્રિકા બહાર તેમના વસવાટનો પુરાવો આપે છે, જે થિયરીને સપોર્ટ કરે છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
