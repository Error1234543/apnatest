<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>સ્વપરાગણ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>સ્વપરાગણ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">સ્વપરાગણ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "જ્યારે એક જ છોડ પર પુષ્પોના પરાગકોષો અને વર્તિકાગ્ર પર પરાગણ થાય છે, ત્યારે તેને કયા પ્રકારનું સ્વપરાગણ કહેવાય છે?", "opts": ["ગેઇટોનોગેમી", "ક્લીસ્ટોગેમી", "હેરકોગેમી", "જીનોનોગેમી"], "ans": 1, "exp": "ક્લીસ્ટોગેમી એ સ્વપરાગણનો એક પ્રકાર છે જ્યાં પરાગકોષો અને વર્તિકાગ્ર એક જ પુષ્પમાં હાજર હોય છે અને પરાગણ પુષ્પ બંધ હોવા છતાં થાય છે. ગેઇટોનોગેમી એ પરાગણ છે જ્યાં પરાગકોષો અને વર્તિકાગ્ર એક જ છોડ પર પણ અલગ પુષ્પોમાં હોય છે. હેરકોગેમી એ પરપરાગણ સાથે સંબંધિત છે, જ્યારે જીનોનોગેમી એવો શબ્દ નથી.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં છોડ", "ch": ""}, {"q": "સ્વપરાગણ દરમિયાન, પરાગનલિકાની વૃદ્ધિ કયા પેશી દ્વારા થાય છે?", "opts": ["વર્તિકા", "પરાગાશય", "પરાગનલિકા પેશી", "બીજાંડ"], "ans": 2, "exp": "પરાગનલિકાની વૃદ્ધિ પરાગનલિકા પેશી દ્વારા થાય છે, જે પરાગકોષમાંથી ઉદ્ભવે છે. વર્તિકા એ પુષ્પનો ભાગ છે જ્યાં પરાગકોષો જમા થાય છે, પરાગાશય એ પરાગકોષો ધરાવતો ભાગ છે, અને બીજાંડ એ સ્ત્રી જનન અંગ છે.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં છોડ", "ch": ""}, {"q": "સ્વપરાગણના કયા ફાયદાને લીધે છોડમાં અનુવંશિકતા સ્થિર રહે છે?", "opts": ["જનીનીય વિવિધતામાં વધારો", "જનીનીય એકસમાનતા", "નવી જાતોનું સર્જન", "પરાગણની ગતિ વધારવી"], "ans": 1, "exp": "સ્વપરાગણમાં, પરાગણ એક જ છોડ પર થવાને લીધે જનીનીય એકસમાનતા જળવાઈ રહે છે, જેથી અનુવંશિકતા સ્થિર રહે છે. જનીનીય વિવિધતામાં વધારો અને નવી જાતોનું સર્જન પરપરાગણના ફાયદા છે. પરાગણની ગતિ વધારવી એ સ્વપરાગણનો મુખ્ય હેતુ નથી.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં છોડ", "ch": ""}, {"q": "કયા છોડમાં સ્વપરાગણ રોકવા માટે પુષ્પોના પુરુષ અને સ્ત્રી ભાગોની પરિપક્વતામાં તફાવત હોય છે?", "opts": ["ડિચોજીનિયા", "પ્રોટાન્ડ્રી", "પ્રોટોગીની", "હેરમેફ્રોડાઇટ"], "ans": 2, "exp": "પ્રોટોગીની એ એક સ્થિતિ છે જ્યાં વર્તિકાગ્ર પહેલા પરિપક્વ થાય છે અને પરાગકોષો પછી, જેથી સ્વપરાગણ રોકાય છે. પ્રોટાન્ડ્રીમાં પરાગકોષો પહેલા પરિપક્વ થાય છે. ડિચોજીની અને હેરમેફ્રોડાઇટ એ સ્વપરાગણ સાથે સંબંધિત નથી.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં છોડ", "ch": ""}, {"q": "સ્વપરાગણ દરમિયાન, પરાગકોષમાંથી ઉત્પન્ન થતી પરાગનલિકા કયા કોષમાં પ્રવેશ કરે છે?", "opts": ["બીજાંડકોષ", "વર્તિકાગ્ર કોષ", "અંડકોષ", "સહાયક કોષ"], "ans": 1, "exp": "પરાગનલિકા વર્તિકાગ્ર કોષમાં પ્રવેશ કરે છે, જ્યાં ફલન થાય છે. બીજાંડકોષ એ બીજાંડનો ભાગ છે, અંડકોષ એ સ્ત્રી જનન કોષ છે, અને સહાયક કોષ એ વર્તિકાગ્રને સહાય કરે છે પરંતુ પરાગનલિકા ત્યાં પ્રવેશતી નથી.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં છોડ", "ch": ""}, {"q": "જો એક છોડમાં સ્વપરાગણ થતું હોય અને તેના પરાગકોષમાં બે અલગ-અલગ એલિલ ધરાવતા જનીનો હોય, તો પરાગનલિકા દ્વારા વર્તિકાગ્ર સુધી પહોંચતા સ્વરૂપમાં કયા જનીનની સંરચના રહેશે?", "opts": ["હેમીઝાઇગસ (એક જ એલિલ ધરાવતું)", "હોમોઝાઇગસ (બે સરખા એલિલ ધરાવતું)", "હેટરોઝાઇગસ (બે અલગ એલિલ ધરાવતું)", "એન્યુપ્લોઈડ (વર્ણસૂત્રોની સંખ્યામાં ફેરફાર)"], "ans": 0, "exp": "સ્વપરાગણ દરમિયાન, પરાગકોષ (હેપ્લોઈડ) મિઓસિસ દ્વારા ઉત્પન્ન થાય છે, જેમાં માત્ર એક જ એલિલ હોય છે. પરાગનલિકા વિકસિત થતાં તે હેમીઝાઇગસ રહે છે. હોમોઝાઇગસ અથવા હેટરોઝાઇગસ સ્થિતિ ડિપ્લોઈડ કોષોમાં જોવા મળે છે, જ્યારે એન્યુપ્લોઈડી વર્ણસૂત્રોની સંખ્યામાં ફેરફાર સાથે સંબંધિત છે, જે અહીં લાગુ પડતું નથી.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં છોડ", "ch": ""}, {"q": "સ્વપરાગણ દરમિયાન, પરાગનલિકાની ટોચ પર સ્થિત જનન કોષ (generative cell) કયા પ્રકારનું વિભાજન પામે છે?", "opts": ["મિટોટિક વિભાજન", "મિઓટિક વિભાજન", "અમિટોટિક વિભાજન", "એન્ડોમિટોટિક વિભાજન"], "ans": 0, "exp": "પરાગનલિકાની ટોચ પર સ્થિત જનન કોષ મિટોટિક વિભાજન પામે છે, જેથી બે શુક્રકોષ (sperm cells) ઉત્પન્ન થાય. મિઓટિક વિભાજન પરાગકોષના નિર્માણ દરમિયાન થાય છે, જ્યારે અમિટોટિક અને એન્ડોમિટોટિક વિભાજન અહીં લાગુ પડતાં નથી.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં છોડ", "ch": ""}, {"q": "સ્વપરાગણ દરમિયાન, પરાગનલિકા વર્તિકાગ્રની કયા ભાગમાં પ્રવેશ કરે છે?", "opts": ["વર્તિકા (Style)", "વર્તિકાગ્ર (Stigma)", "અંડાશય (Ovary)", "બીજાંડ (Ovule)"], "ans": 1, "exp": "પરાગનલિકા સૌપ્રથમ વર્તિકાગ્ર (Stigma)માં પ્રવેશ કરે છે, જ્યાં તે અંકુરિત થાય છે અને પછી વર્તિકા (Style) દ્વારા અંડાશય (Ovary) તરફ આગળ વધે છે. બીજાંડ (Ovule) પરાગનલિકાના અંતિમ લક્ષ્ય સ્થાન છે, પરંતુ પ્રવેશ બિંદુ વર્તિકાગ્ર છે.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં છોડ", "ch": ""}, {"q": "સ્વપરાગણ દરમિયાન, પરાગકોષમાં રહેલા DNAની માત્રા કયા તબક્કે ડબલ થાય છે?", "opts": ["પરાગકોષના નિર્માણ પૂર્વે (મિઓસિસ I)", "પરાગકોષના નિર્માણ દરમિયાન (મિઓસિસ II)", "પરાગનલિકાની વૃદ્ધિ દરમિયાન", "નિષેચન પૂર્વે"], "ans": 0, "exp": "પરાગકોષના નિર્માણ પૂર્વે, મિઓસિસ I દરમિયાન, DNAની માત્રા ડબલ થાય છે (S તબક્કે). મિઓસિસ II દરમિયાન કોષ વિભાજન થાય છે, પરંતુ DNAની માત્રા ડબલ થતી નથી. પરાગનલિકાની વૃદ્ધિ અને નિષેચન દરમિયાન DNAની માત્રામાં કોઈ ફેરફાર થતો નથી.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં છોડ", "ch": ""}, {"q": "સ્વપરાગણ દરમિયાન, પરાગનલિકાની વૃદ્ધિ માટે જરૂરી ઉત્સેચક કયું છે?", "opts": ["એમાઇલેઝ", "સેલ્યુલેઝ", "પેક્ટિનેઝ", "પ્રોટિયેઝ"], "ans": 2, "exp": "પરાગનલિકાની વૃદ્ધિ દરમિયાન, વર્તિકા (Style)માં રહેલા પેક્ટિન પદાર્થોને તોડવા માટે પેક્ટિનેઝ ઉત્સેચક જરૂરી છે. એમાઇલેઝ કાર્બોદિતના વિઘટન માટે, સેલ્યુલેઝ સેલ્યુલોઝના વિઘટન માટે, અને પ્રોટિયેઝ પ્રોટીનના વિઘટન માટે જવાબદાર છે, જે અહીં લાગુ પડતાં નથી.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં છોડ", "ch": ""}, {"q": "સ્વપરાગણ દરમિયાન, પરાગકોષમાંથી ઉત્પન્ન થતી પરાગનલિકામાં કયા બે કોષો હાજર હોય છે, જેમાંથી એક કોષ વર્તિકાગ્રમાં પ્રવેશી બીજાંધ (zygote) બનાવે છે?", "opts": ["વેજિટેટિવ કોષ અને જનન કોષ", "સહાયક કોષ અને અંડકોષ", "ટ્યુબ કોષ અને સિનર્જિડ કોષ", "એન્ટીપોડલ કોષ અને કેન્દ્રીય કોષ"], "ans": 0, "exp": "સ્વપરાગણ દરમિયાન, પરાગકોષમાંથી ઉત્પન્ન થતી પરાગનલિકામાં વેજિટેટિવ કોષ (જે પરાગનલિકાની વૃદ્ધિ કરે છે) અને જનન કોષ (જે વર્તિકાગ્રમાં પ્રવેશી બીજાંધ બનાવે છે) હાજર હોય છે. બાકીના વિકલ્પો અંડાશય સાથે સંબંધિત કોષો છે, પરાગકોષ સાથે નહીં.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં છોડો", "ch": ""}, {"q": "સ્વપરાગણ દરમિયાન, પરાગનલિકા વર્તિકાગ્રના કયા ભાગમાં પ્રવેશ કરતી વખતે, અંડકોષ સાથે સંલયન (fusion) થાય છે?", "opts": ["વર્તિકાગ્રની ટોચ પરના સ્ટિગ્મા (stigma) ભાગમાં", "વર્તિકાગ્રની મધ્યમાં આવેલા શૈલ (style) ભાગમાં", "અંડાશયના અંડક (ovule)માં આવેલા માઇક્રોપાઇલ (micropyle) દ્વારા", "વર્તિકાગ્રની નીચે આવેલા અંડાશય (ovary) ભાગમાં"], "ans": 2, "exp": "સ્વપરાગણ દરમિયાન, પરાગનલિકા અંડાશયના અંડક (ovule)માં આવેલા માઇક્રોપાઇલ (micropyle) દ્વારા પ્રવેશ કરે છે અને ત્યાં અંડકોષ સાથે સંલયન થાય છે. સ્ટિગ્મા અને શૈલ પરાગનલિકાના પ્રવેશ માટેના માર્ગ છે, પરંતુ સંલયન અંડકમાં જ થાય છે. અંડાશય એ અંડકનું સ્થાન છે, પરંતુ માઇક્રોપાઇલ દ્વારા જ પ્રવેશ થાય છે.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં છોડો", "ch": ""}, {"q": "સ્વપરાગણ દરમિયાન, પરાગકોષમાં રહેલા જનીનની સંખ્યા કયા તબક્કે અડધી થાય છે?", "opts": ["પરાગકોષના નિર્માણ દરમિયાન મિયોસિસ-1માં", "પરાગકોષના નિર્માણ દરમિયાન મિયોસિસ-2માં", "પરાગનલિકાની વૃદ્ધિ દરમિયાન માઇટોસિસમાં", "બીજાંધના નિર્માણ દરમિયાન"], "ans": 1, "exp": "પરાગકોષના નિર્માણ દરમિયાન મિયોસિસ-2માં જનીનની સંખ્યા અડધી થાય છે, કારણ કે મિયોસિસ-2 દરમિયાન ક્રોમોઝોમની સંખ્યા અડધી થાય છે. મિયોસિસ-1 દરમિયાન હોમોલોગસ ક્રોમોઝોમ અલગ થાય છે, પરંતુ જનીનની સંખ્યા અડધી થતી નથી. માઇટોસિસ દરમિયાન ક્રોમોઝોમની સંખ્યા સમાન રહે છે, અને બીજાંધના નિર્માણ દરમિયાન જનીનની સંખ્યા ડબલ થાય છે.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં છોડો", "ch": ""}, {"q": "સ્વપરાગણ દરમિયાન, જો એક છોડમાં પુષ્પના પરાગકોષોમાં 'S' જનીનની બે અલગ-અલગ એલિલ (S₁ અને S₂) હાજર હોય, તો પરાગનલિકાની વૃદ્ધિ કયા પરિબળ પર આધાર રાખશે?", "opts": ["વર્તિકાગ્રમાં હાજર 'S' જનીનની એલિલ સાથેની અનુકૂળતા", "પરાગકોષમાં ઉત્પન્ન થતી ઉર્જાની માત્રા", "પુષ્પના રંગ અને આકાર પર આધારિત પ્રકાશસંશ્લેષણની ક્ષમતા", "મૃદા પોષક તત્ત્વોની ઉપલબ્ધતા"], "ans": 0, "exp": "સ્વપરાગણ દરમિયાન, 'S' જનીન (સ્વ-અસંગતતા જનીન)ની એલિલ પરાગનલિકાની વૃદ્ધિને અસર કરે છે. જો વર્તિકાગ્રમાં હાજર 'S' જનીનની એલિલ પરાગકોષમાં હાજર એલિલ સાથે અનુકૂળ ન હોય, તો પરાગનલિકાની વૃદ્ધિ અટકી જાય છે. આ ઘટનાને 'સ્વ-અસંગતતા' કહેવાય છે. બાકીના વિકલ્પો (B, C, D) પરાગનલિકાની વૃદ્ધિ સાથે સીધો સંબંધ ધરાવતા નથી.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં છોડો", "ch": ""}, {"q": "સ્વપરાગણ દરમિયાન, પરાગનલિકા વર્તિકાગ્રમાં પ્રવેશ કરતી વખતે, જો અંડકોષમાં 'ગેમેટોફાઇટિક સેલ્ફ-ઇનકોમ્પેટિબિલિટી' (GSI) પ્રણાલી સક્રિય હોય, તો કયું પગલું ઘટશે?", "opts": ["પરાગનલિકાની વૃદ્ધિ અટકી જશે અને ફલન થશે નહીં", "પરાગનલિકા વર્તિકાગ્રમાં પ્રવેશ કરશે પરંતુ અંડકોષ સાથે સંલયન થશે નહીં", "પરાગનલિકા વર્તિકાગ્રમાં પ્રવેશ કરશે અને અંડકોષ સાથે સંલયન થશે, પરંતુ ભ્રૂણ વિકાસ પામશે નહીં", "પરાગનલિકાની વૃદ્ધિ વેગવંતી બનશે અને ફલન થશે"], "ans": 0, "exp": "ગેમેટોફાઇટિક સેલ્ફ-ઇનકોમ્પેટિબિલિટી (GSI) પ્રણાલીમાં, જો પરાગકોષ અને વર્તિકાગ્રમાં હાજર 'S' જનીનની એલિલ એકસરખી હોય, તો પરાગનલિકાની વૃદ્ધિ અટકી જાય છે અને ફલન થતું નથી. આ પ્રણાલી સ્વપરાગણને રોકવા માટે વિકસિત થયેલ છે. બાકીના વિકલ્પો (B, C, D) GSI પ્રણાલીની ક્રિયાવિધિ સાથે સુસંગત નથી.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં છોડો", "ch": ""}, {"q": "સ્વપરાગણ દરમિયાન, જો એક છોડમાં 'S-જનીન' આધારિત સ્વ-અસંગતતા (self-incompatibility) જોવા મળે, તો પરાગનલિકાની વૃદ્ધિ ક્યારે અટકી જાય છે?", "opts": ["પરાગકોષ વર્તિકાગ્ર પર પડતાં જ અટકી જાય છે", "પરાગનલિકા વર્તિકા (style)માં પ્રવેશતાં જ અટકી જાય છે", "પરાગનલિકા વર્તિકાગ્રના સ્ત્રી જનનકોષ (egg cell) સુધી પહોંચતાં અટકી જાય છે", "પરાગનલિકા અંડાશય (ovary)માં પ્રવેશતાં અટકી જાય છે"], "ans": 1, "exp": "સ્વ-અસંગતતા (self-incompatibility) ધરાવતા છોડોમાં, 'S-જનીન'ની હાજરીથી પરાગનલિકાની વૃદ્ધિ વર્તિકા (style)માં પ્રવેશતાં જ અટકી જાય છે. આ કારણથી પરાગનલિકા અંડકોષ સુધી પહોંચી શકતી નથી. વિકલ્પ A ખોટો છે કારણ કે પરાગકોષ વર્તિકાગ્ર પર પડતાં જ અટકી જવું એ સ્વ-અસંગતતાનું લક્ષણ નથી. વિકલ્પ C અને D ખોટા છે કારણ કે પરાગનલિકા વર્તિકાગ્રના સ્ત્રી જનનકોષ અથવા અંડાશય સુધી પહોંચતી નથી.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં છોડોમાં થતી પ્રક્રિયાઓ", "ch": ""}, {"q": "સ્વપરાગણ દરમિયાન, જો એક છોડમાં 'ક્લીસ્ટોગેમી' (cleistogamy) જોવા મળે, તો તેના સંદર્ભમાં કયું વિધાન સત્ય છે?", "opts": ["આ પ્રકારના પુષ્પો હંમેશા ખુલ્લા રહે છે અને પરાગણ સરળતાથી થાય છે", "આ પ્રકારના પુષ્પો બંધ રહે છે અને સ્વપરાગણ થાય છે", "આ પ્રકારના પુષ્પોમાં પરાગકોષો અને વર્તિકાગ્ર વિકસિત જ નથી થતા", "આ પ્રકારના પુષ્પોમાં પરાગણ માટે કીટકોની જરૂર પડે છે"], "ans": 1, "exp": "ક્લીસ્ટોગેમી (cleistogamy)માં પુષ્પો બંધ રહે છે અને સ્વપરાગણ થાય છે. આ કારણથી પરાગણ માટે બાહ્ય પરિબળોની જરૂર પડતી નથી. વિકલ્પ A ખોટો છે કારણ કે ક્લીસ્ટોગેમી પુષ્પો ખુલ્લા રહેતા નથી. વિકલ્પ C ખોટો છે કારણ કે પરાગકોષો અને વર્તિકાગ્ર વિકસિત થાય છે. વિકલ્પ D ખોટો છે કારણ કે કીટકોની જરૂર પડતી નથી.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં છોડોમાં થતી પ્રક્રિયાઓ", "ch": ""}, {"q": "સ્વપરાગણ દરમિયાન, જો એક છોડમાં 'હેટરોસ્ટાઇલી' (heterostyly) જોવા મળે, તો તેના સંદર્ભમાં કયું વિધાન ખોટું છે?", "opts": ["આ છોડોમાં વર્તિકા અને પરાગકોષોની લંબાઈમાં તફાવત હોય છે", "આ છોડોમાં સ્વપરાગણ રોકવા માટે પુષ્પોના પુરુષ અને સ્ત્રી ભાગોની સ્થિતિમાં તફાવત હોય છે", "આ છોડોમાં પરાગણ માટે કીટકોની જરૂર પડે છે", "આ છોડોમાં સ્વપરાગણ હંમેશા શક્ય બને છે"], "ans": 3, "exp": "હેટરોસ્ટાઇલી (heterostyly) ધરાવતા છોડોમાં વર્તિકા અને પરાગકોષોની લંબાઈમાં તફાવત હોય છે, જે સ્વપરાગણ રોકવા માટે મદદરૂપ થાય છે. વિકલ્પ D ખોટો છે કારણ કે આ પ્રકારના છોડોમાં સ્વપરાગણ હંમેશા શક્ય બનતું નથી. વિકલ્પ A, B, અને C સત્ય છે.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં છોડોમાં થતી પ્રક્રિયાઓ", "ch": ""}, {"q": "સ્વપરાગણ દરમિયાન, જો એક છોડમાં 'પાર્થેનોકાર્પી' (parthenocarpy) જોવા મળે, તો તેના સંદર્ભમાં કયું વિધાન સત્ય છે?", "opts": ["આ છોડોમાં ફળનો વિકાસ પરાગણ વિના થાય છે", "આ છોડોમાં ફળનો વિકાસ પરાગણ પછી જ થાય છે", "આ છોડોમાં બીજોનો વિકાસ થતો નથી", "આ છોડોમાં ફળ અને બીજો બંનેમાં વિકાસ થતો નથી"], "ans": 0, "exp": "પાર્થેનોકાર્પી (parthenocarpy)માં ફળનો વિકાસ પરાગણ વિના થાય છે. આ કારણથી ફળમાં બીજોનો વિકાસ થતો નથી. વિકલ્પ B ખોટો છે કારણ કે પરાગણ પછી ફળનો વિકાસ થતો નથી. વિકલ્પ C ખોટો છે કારણ કે બીજોનો વિકાસ થતો નથી, પરંતુ ફળનો વિકાસ થાય છે. વિકલ્પ D ખોટો છે કારણ કે ફળનો વિકાસ થાય છે.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં છોડોમાં થતી પ્રક્રિયાઓ", "ch": ""}, {"q": "સ્વપરાગણ દરમિયાન, જો એક છોડમાં 'એપોમિક્સિસ' (apomixis) જોવા મળે, તો તેના સંદર્ભમાં કયું વિધાન ખોટું છે?", "opts": ["આ પ્રક્રિયામાં બીજોનો વિકાસ પરાગણ વિના થાય છે", "આ પ્રક્રિયામાં અંડકોષમાંથી ભ્રૂણ વિકસે છે", "આ પ્રક્રિયામાં પરાગણની જરૂર પડે છે", "આ પ્રક્રિયામાં નવા છોડની અનુવંશિકતા માતૃછોડ જેવી જ હોય છે"], "ans": 2, "exp": "એપોમિક્સિસ (apomixis)માં બીજોનો વિકાસ પરાગણ વિના થાય છે અને અંડકોષમાંથી ભ્રૂણ વિકસે છે. આ પ્રક્રિયામાં પરાગણની જરૂર પડતી નથી. વિકલ્પ C ખોટો છે કારણ કે પરાગણની જરૂર પડતી નથી. વિકલ્પ A, B, અને D સત્ય છે.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં છોડોમાં થતી પ્રક્રિયાઓ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
