<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RNA Polymerase</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>RNA Polymerase</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">RNA Polymerase</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 17 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 17 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "RNA પોલિમરેઝ એન્ઝાઇમની કયી સબયુનિટ DNA ટેમ્પલેટ સાથે જોડાઈને પ્રોમોટર પ્રદેશને ઓળખે છે?", "opts": ["આલ્ફા (α) સબયુનિટ", "બીટા (β) સબયુનિટ", "સિગ્મા (σ) સબયુનિટ", "ઓમેગા (ω) સબયુનિટ"], "ans": 2, "exp": "RNA પોલિમરેઝમાં સિગ્મા (σ) સબયુનિટ પ્રોમોટર પ્રદેશને ઓળખીને DNA ટેમ્પલેટ સાથે જોડાય છે. આલ્ફા (α) અને બીટા (β) સબયુનિટ કેટાલિટિક ક્રિયા માટે જવાબદાર છે, જ્યારે ઓમેગા (ω) સબયુનિટ એસેમ્બલી અને સ્થિરતા માટે મદદ કરે છે. સિગ્મા સબયુનિટ પ્રોમોટર ઓળખમાં મહત્વની ભૂમિકા ભજવે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "પ્રોકેરિયોટિક RNA પોલિમરેઝ અને યુકેરિયોટિક RNA પોલિમરેઝ II વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["પ્રોકેરિયોટિક RNA પોલિમરેઝ એક જ પ્રકારની હોય છે, જ્યારે યુકેરિયોટિક RNA પોલિમરેઝ II mRNA સંશ્લેષણ માટે જવાબદાર છે.", "પ્રોકેરિયોટિક RNA પોલિમરેઝમાં સિગ્મા સબયુનિટ હોય છે, જ્યારે યુકેરિયોટિક RNA પોલિમરેઝ IIમાં તે નથી.", "યુકેરિયોટિક RNA પોલિમરેઝ II કોષકેન્દ્રમાં જોવા મળે છે, જ્યારે પ્રોકેરિયોટિક RNA પોલિમરેઝ સાયટોપ્લાઝમમાં હોય છે.", "પ્રોકેરિયોટિક RNA પોલિમરેઝ DNA રેપ્લિકેશન પણ કરે છે."], "ans": 1, "exp": "પ્રોકેરિયોટિક RNA પોલિમરેઝમાં સિગ્મા સબયુનિટ હોય છે, જે પ્રોમોટર ઓળખમાં મદદ કરે છે, જ્યારે યુકેરિયોટિક RNA પોલિમરેઝ IIમાં સિગ્મા સબયુનિટ નથી. યુકેરિયોટિક RNA પોલિમરેઝ II mRNA સંશ્લેષણ માટે જવાબદાર છે, પરંતુ તેની રચના અને કાર્ય પ્રોકેરિયોટિક કરતાં જુદી છે. પ્રોકેરિયોટિક RNA પોલિમરેઝ એક જ પ્રકારની હોય છે, પરંતુ તે DNA રેપ્લિકેશન કરતી નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "RNA પોલિમરેઝ દ્વારા ટ્રાન્સક્રિપ્શન દરમિયાન કયો કોફેક્ટર વપરાય છે?", "opts": ["Mg²⁺", "Zn²⁺", "Ca²⁺", "Fe²⁺"], "ans": 0, "exp": "RNA પોલિમરેઝની ક્રિયા માટે Mg²⁺ આયન કોફેક્ટર તરીકે વપરાય છે. તે RNA ન્યુક્લિઓટાઇડ્સની પોલિમરાઇઝેશન પ્રક્રિયામાં મહત્વની ભૂમિકા ભજવે છે. Zn²⁺, Ca²⁺, અને Fe²⁺ ટ્રાન્સક્રિપ્શન પ્રક્રિયામાં વપરાતા નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "યુકેરિયોટિક કોષમાં, RNA પોલિમરેઝ I, II, અને III પૈકી કયું એન્ઝાઇમ rRNA સંશ્લેષણ માટે જવાબદાર છે?", "opts": ["RNA પોલિમરેઝ I", "RNA પોલિમરેઝ II", "RNA પોલિમરેઝ III", "RNA પોલિમરેઝ I અને III બંને"], "ans": 3, "exp": "યુકેરિયોટિક કોષમાં, RNA પોલિમરેઝ I 28S, 18S, અને 5.8S rRNAનું સંશ્લેષણ કરે છે, જ્યારે RNA પોલિમરેઝ III 5S rRNA અને tRNAનું સંશ્લેષણ કરે છે. RNA પોલિમરેઝ II mRNA સંશ્લેષણ માટે જવાબદાર છે. આમ, rRNA સંશ્લેષણ માટે RNA પોલિમરેઝ I અને III બંને જવાબદાર છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "RNA પોલિમરેઝ દ્વારા ટ્રાન્સક્રિપ્શન દરમિયાન, કયા દિશામાં RNA સંશ્લેષણ થાય છે?", "opts": ["3' → 5'", "5' → 3'", "5' → 5'", "3' → 3'"], "ans": 1, "exp": "RNA પોલિમરેઝ દ્વારા RNA સંશ્લેષણ 5' → 3' દિશામાં થાય છે. આ દિશા ન્યુક્લિઓટાઇડ્સની ઉમેરણીની દિશા છે, જ્યાં નવા ન્યુક્લિઓટાઇડ્સ RNA શૃંખલાના 3' છેડે ઉમેરાય છે. 3' → 5' દિશા એ DNA પોલિમરેઝની પ્રૂફરીડિંગ ક્રિયા માટે છે, જ્યારે 5' → 5' અને 3' → 3' દિશાઓ બાયોકેમિકલ રીતે શક્ય નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "ટ્રાન્સક્રિપ્શન દરમિયાન RNA પોલિમરેઝ દ્વારા સૌપ્રથમ કયો ન્યુક્લિયોટાઇડ જોડાય છે અને તે કયા આધારે નક્કી થાય છે?", "opts": ["GTP, પ્રોમોટર પ્રદેશમાં પુરીન-પાયરિમિડીન ક્રમ", "ATP, ટેમ્પલેટ DNA પરના પ્રથમ કોડિંગ બેઝ સાથે પૂરકતા", "CTP, ટર્મિનેટર સિક્વન્સની હાજરી", "UTP, સિગ્મા ફેક્ટરની ઓળખ"], "ans": 1, "exp": "RNA પોલિમરેઝ દ્વારા ટ્રાન્સક્રિપ્શનની શરૂઆતમાં પ્રથમ ન્યુક્લિયોટાઇડ તરીકે ATP (અથવા ક્યારેક GTP) જોડાય છે, જે ટેમ્પલેટ DNA પરના પ્રથમ કોડિંગ બેઝ સાથે પૂરકતા દર્શાવે છે. પ્રોમોટર પ્રદેશમાં પુરીન-પાયરિમિડીન ક્રમ (A) સિગ્મા ફેક્ટર દ્વારા ઓળખાય છે, પરંતુ તે ન્યુક્લિયોટાઇડ પસંદગી નક્કી કરતું નથી. ટર્મિનેટર સિક્વન્સ (C) ટ્રાન્સક્રિપ્શનના અંત સાથે સંબંધિત છે, નહીં શરૂઆત સાથે. સિગ્મા ફેક્ટર (D) પ્રોમોટર ઓળખમાં મદદ કરે છે, પરંતુ ન્યુક્લિયોટાઇડ પસંદગી નક્કી કરતું નથી.", "ref": "Std 12 - અધ્યાય 6: વંશવેલા અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "યુકેરિયોટિક કોષમાં, RNA પોલિમરેઝ II દ્વારા ટ્રાન્સક્રિપ્શન દરમિયાન કયા પ્રકારના RNA નિર્માણ પહેલા થાય છે અને તેને કયા પ્રક્રિયા દ્વારા પરિપક્વ બનાવવામાં આવે છે?", "opts": ["hnRNA, સ્પ્લાઇસિંગ", "tRNA, 5' કેપિંગ", "rRNA, 3' પોલિએડેનાઇલેશન", "miRNA, મિથાઇલેશન"], "ans": 0, "exp": "RNA પોલિમરેઝ II દ્વારા hnRNA (હેટરોજિનિયસ ન્યુક્લિયર RNA) નિર્માણ થાય છે, જેને સ્પ્લાઇસિંગ પ્રક્રિયા દ્વારા પરિપક્વ mRNAમાં રૂપાંતરિત કરવામાં આવે છે. tRNA (B) RNA પોલિમરેઝ III દ્વારા નિર્માણ થાય છે. rRNA (C) RNA પોલિમરેઝ I દ્વારા નિર્માણ થાય છે. miRNA (D) RNA પોલિમરેઝ II દ્વારા નિર્માણ થાય છે, પરંતુ તેને મિથાઇલેશન દ્વારા પરિપક્વ બનાવવામાં આવતું નથી.", "ref": "Std 12 - અધ્યાય 6: વંશવેલા અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "પ્રોકેરિયોટિક કોષમાં, RNA પોલિમરેઝ એન્ઝાઇમની કયી સબયુનિટ ટ્રાન્સક્રિપ્શન દરમિયાન DNA ટેમ્પલેટ સાથે સીધી રીતે અંતરક્રિયા કરે છે અને તેનું કાર્ય કયું છે?", "opts": ["α સબયુનિટ, એન્ઝાઇમની સક્રિય સ્થિતિ જાળવી રાખવી", "β સબયુનિટ, RNA સંશ્લેષણ માટે કેટાલિટિક ક્રિયા કરવી", "β' સબયુનિટ, DNA ટેમ્પલેટ સાથે જોડાઈ રહેવું", "σ સબયુનિટ, પ્રોમોટર ઓળખ અને ટ્રાન્સક્રિપ્શન શરૂ કરવું"], "ans": 2, "exp": "પ્રોકેરિયોટિક RNA પોલિમરેઝમાં, β' સબયુનિટ DNA ટેમ્પલેટ સાથે સીધી રીતે અંતરક્રિયા કરે છે અને તેને જોડી રાખે છે. α સબયુનિટ (A) એન્ઝાઇમની સક્રિય સ્થિતિ જાળવી રાખે છે, પરંતુ DNA સાથે સીધી અંતરક્રિયા કરતી નથી. β સબયુનિટ (B) કેટાલિટિક ક્રિયા કરે છે, પરંતુ DNA સાથે સીધી અંતરક્રિયા કરતી નથી. σ સબયુનિટ (D) પ્રોમોટર ઓળખ અને ટ્રાન્સક્રિપ્શન શરૂ કરવામાં મદદ કરે છે, પરંતુ DNA સાથે સીધી અંતરક્રિયા કરતી નથી.", "ref": "Std 12 - અધ્યાય 6: વંશવેલા અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "RNA પોલિમરેઝ દ્વારા ટ્રાન્સક્રિપ્શન દરમિયાન, કયા પરિબળો દ્વારા ટ્રાન્સક્રિપ્શનની ગતિ નિયંત્રિત થાય છે?", "opts": ["DNA ટેમ્પલેટ પરના GC કન્ટેન્ટ અને ટેમ્પરેચર", "RNA પોલિમરેઝની સાંદ્રતા અને કોષરસમાં pH", "ટ્રાન્સક્રિપ્શન ફેક્ટરોની હાજરી અને DNA ટોપોલોજી", "ન્યુક્લિયોટાઇડની ઉપલબ્ધતા અને RNA સ્થિરતા"], "ans": 2, "exp": "ટ્રાન્સક્રિપ્શનની ગતિ મુખ્યત્વે ટ્રાન્સક્રિપ્શન ફેક્ટરોની હાજરી અને DNA ટોપોલોજી (જેમ કે સુપરકોઇલિંગ) દ્વારા નિયંત્રિત થાય છે. GC કન્ટેન્ટ અને ટેમ્પરેચર (A) DNAની સ્થિરતાને અસર કરે છે, પરંતુ ટ્રાન્સક્રિપ્શનની ગતિ પર સીધી અસર કરતાં નથી. RNA પોલિમરેઝની સાંદ્રતા અને pH (B) કોષરસમાં એન્ઝાઇમની ક્રિયાશીલતાને અસર કરે છે, પરંતુ ટ્રાન્સક્રિપ્શનની ગતિ પર સીધી અસર કરતાં નથી. ન્યુક્લિયોટાઇડની ઉપલબ્ધતા (D) ટ્રાન્સક્રિપ્શન માટે જરૂરી છે, પરંતુ ગતિ નિયંત્રણમાં મુખ્ય પરિબળ નથી.", "ref": "Std 12 - અધ્યાય 6: વંશવેલા અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "એક સંશોધક યુકેરિયોટિક કોષમાં ટ્રાન્સક્રિપ્શનની પ્રક્રિયાનો અભ્યાસ કરી રહ્યો છે. તેણે જોયું કે RNA પોલિમરેઝ II દ્વારા ટ્રાન્સક્રિપ્શનની શરૂઆત થઈ છે, પરંતુ પ્રારંભિક RNA ટ્રાન્સક્રિપ્ટમાં અસામાન્ય રીતે લાંબા 5' અંતમાં અતિરિક્ત ન્યુક્લિયોટાઇડ્સ જોડાયેલા છે. આ અસામાન્યતા માટે નીચેનામાંથી કયું પરિબળ સૌથી વધુ સંભવિત કારણ હોઈ શકે?", "opts": ["TFIIH ઉત્સેચકની હેલિકેઝ પ્રવૃત્તિની ખામી", "5' કેપિંગ ઉત્સેચક (ગુઆનિલ ટ્રાન્સફરેઝ)ની ગેરહાજરી", "ટોપોઆઇસોમરેઝ ઉત્સેચકની વધુ પડતી પ્રવૃત્તિ", "સ્પ્લિસિઓસોમ કોમ્પ્લેક્સની અપૂરતી ક્રિયાશીલતા"], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B છે. યુકેરિયોટિક કોષમાં RNA પોલિમરેઝ II દ્વારા ટ્રાન્સક્રિપ્શનની શરૂઆત બાદ તરત જ 5' અંત પર ગુઆનિલ ટ્રાન્સફરેઝ ઉત્સેચક દ્વારા 7-મિથાઇલગુઆનોસિન કેપ ઉમેરાય છે. જો આ ઉત્સેચકની ગેરહાજરી હોય, તો પ્રારંભિક RNA ટ્રાન્સક્રિપ્ટમાં અસામાન્ય રીતે લાંબા 5' અંતમાં ન્યુક્લિયોટાઇડ્સ જોડાયેલા રહે છે. વિકલ્પ A ખોટો છે કારણ કે TFIIH ની હેલિકેઝ પ્રવૃત્તિ DNA ને ખોલવા માટે જવાબદાર છે, જે ટ્રાન્સક્રિપ્શનની શરૂઆત માટે જરૂરી છે, પરંતુ તે 5' અંતની લંબાઈને અસર કરતી નથી. વિકલ્પ C ખોટો છે કારણ કે ટોપોઆઇસોમરેઝ DNA ના સુપરકોઇલિંગને નિયંત્રિત કરે છે, જે ટ્રાન્સક્રિપ્શનની પ્રક્રિયાને અસર કરી શકે, પરંતુ તે 5' અંતની લંબાઈ સાથે સીધો સંબંધ ધરાવતું નથી. વિકલ્પ D ખોટો છે કારણ કે સ્પ્લિસિઓસોમ કોમ્પ્લેક્સ ઇન્ટ્રોનને દૂર કરવા માટે જવાબદાર છે, જે 5' અંતની લંબાઈને અસર કરતું નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્યો અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "પ્રોકેરિયોટિક કોષમાં, RNA પોલિમરેઝ એન્ઝાઇમ દ્વારા ટ્રાન્સક્રિપ્શન દરમિયાન, કયા પરિબળ દ્વારા ટ્રાન્સક્રિપ્શનની શરૂઆત થાય છે અને તેના અભાવે ટ્રાન્સક્રિપ્શન થતું નથી?", "opts": ["સિગ્મા પરિબળ", "રોહો પ્રોટીન", "હેલિકેઝ", "ટોપોઇઝોમેરેઝ"], "ans": 0, "exp": "સિગ્મા પરિબળ (σ) પ્રોમોટર પ્રદેશને ઓળખીને RNA પોલિમરેઝને DNA સાથે બંધન કરવામાં મદદ કરે છે, જેના અભાવે ટ્રાન્સક્રિપ્શન શરૂ થતું નથી. રોહો પ્રોટીન ટ્રાન્સક્રિપ્શન ટર્મિનેશનમાં ભાગ ભજવે છે, હેલિકેઝ DNAને અનવાઇન્ડ કરે છે, અને ટોપોઇઝોમેરેઝ DNAની સુપરકોઇલિંગને દૂર કરે છે.", "ref": "Std 12 - અધ્યાય 6: જીવરસાયણ અને આણ્વિક જૈવશાસ્ત્ર (અનુવંશિકતાનું આણ્વિક આધાર)", "ch": ""}, {"q": "RNA પોલિમરેઝ દ્વારા ટ્રાન્સક્રિપ્શન દરમિયાન, કયા ન્યુક્લિયોટાઇડના ઉમેરાથી ટ્રાન્સક્રિપ્શનની શરૂઆત થાય છે અને તે પછીના ન્યુક્લિયોટાઇડ્સના ઉમેરા માટે આધાર તરીકે કામ કરે છે?", "opts": ["GTP", "ATP", "CTP", "UTP"], "ans": 0, "exp": "ટ્રાન્સક્રિપ્શનની શરૂઆતમાં, RNA પોલિમરેઝ દ્વારા સૌપ્રથમ GTP ન્યુક્લિયોટાઇડ જોડાય છે, જે પછીના ન્યુક્લિયોટાઇડ્સના ઉમેરા માટે આધાર તરીકે કામ કરે છે. ATP, CTP, અને UTP પણ ટ્રાન્સક્રિપ્શનમાં વપરાય છે, પરંતુ શરૂઆતમાં GTP જ જોડાય છે.", "ref": "Std 12 - અધ્યાય 6: જીવરસાયણ અને આણ્વિક જૈવશાસ્ત્ર (અનુવંશિકતાનું આણ્વિક આધાર)", "ch": ""}, {"q": "ટ્રાન્સક્રિપ્શન દરમિયાન, RNA પોલિમરેઝ દ્વારા કયા પ્રકારના તણાવ (stress)ને કારણે ટ્રાન્સક્રિપ્શનની ગતિ ધીમી પડે છે અથવા રોકાઈ જાય છે?", "opts": ["ઉચ્ચ તાપમાન", "DNAમાં સુપરકોઇલિંગ", "નીચા pH", "ઉચ્ચ કેલ્શિયમ એકાગ્રતા"], "ans": 1, "exp": "DNAમાં સુપરકોઇલિંગને કારણે RNA પોલિમરેઝની ગતિ ધીમી પડે છે અથવા રોકાઈ જાય છે, કારણ કે તે DNAની ડબલ હેલિક્સને ખોલવામાં અડચણ ઉભી કરે છે. ઉચ્ચ તાપમાન, નીચા pH, અને ઉચ્ચ કેલ્શિયમ એકાગ્રતા ટ્રાન્સક્રિપ્શન પર સીધો અસર કરતાં નથી.", "ref": "Std 12 - અધ્યાય 6: જીવરસાયણ અને આણ્વિક જૈવશાસ્ત્ર (અનુવંશિકતાનું આણ્વિક આધાર)", "ch": ""}, {"q": "એક સંશોધકે યુકેરિયોટિક કોષમાં RNA પોલિમરેઝ II દ્વારા થતા ટ્રાન્સક્રિપ્શનની પ્રક્રિયાનો અભ્યાસ કર્યો. તેણે જોયું કે ટ્રાન્સક્રિપ્શનની શરૂઆત પછી, RNA પોલિમરેઝ II થોડાક ન્યુક્લિયોટાઇડ્સ જોડ્યા બાદ થોભી જાય છે અને પછી ફરીથી ટ્રાન્સક્રિપ્શન શરૂ કરે છે. આ ઘટનાને શું કહેવાય છે અને તેનું મુખ્ય કારણ શું છે?", "opts": ["એબોર્ટિવ ઇનિશિયેશન (Abortive Initiation) - RNA પોલિમરેઝ II ની સક્રિયતા ઓછી હોવાને કારણે", "પ્રોમોટર ક્લિયરન્સ (Promoter Clearance) - ટ્રાન્સક્રિપ્શન ફેક્ટર્સના અભાવને કારણે", "પોઝિશનિંગ એરર (Positioning Error) - DNA ટેમ્પલેટમાં ખામીને કારણે", "ટ્રાન્સક્રિપ્શનલ પોઝિંગ (Transcriptional Pausing) - ન્યુક્લિયોસોમ્સના અવરોધને કારણે"], "ans": 0, "exp": "સાચો જવાબ A) એબોર્ટિવ ઇનિશિયેશન છે. યુકેરિયોટિક કોષમાં RNA પોલિમરેઝ II દ્વારા ટ્રાન્સક્રિપ્શનની શરૂઆત દરમિયાન, એન્ઝાઇમ થોડાક ન્યુક્લિયોટાઇડ્સ જોડ્યા બાદ થોભી જાય છે અને નાના RNA ટુકડાઓ મુક્ત કરે છે. આ ઘટનાને એબોર્ટિવ ઇનિશિયેશન કહે છે. તેનું મુખ્ય કારણ RNA પોલિમરેઝ II ની પ્રારંભિક સક્રિયતા ઓછી હોવાને કારણે છે, જે પછીથી ટ્રાન્સક્રિપ્શન ફેક્ટર્સના સહયોગથી સુધરે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) પ્રોમોટર ક્લિયરન્સ એ ટ્રાન્સક્રિપ્શનની શરૂઆત પછીની પ્રક્રિયા છે, C) પોઝિશનિંગ એરર DNA ખામીને કારણે થતી નથી, D) ટ્રાન્સક્રિપ્શનલ પોઝિંગ એ ન્યુક્લિયોસોમ્સના અવરોધને કારણે થતી ઘટના નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક પ્રયોગમાં, સંશોધકે પ્રોકેરિયોટિક કોષમાં RNA પોલિમરેઝ દ્વારા ટ્રાન્સક્રિપ્શનની પ્રક્રિયા પર અભ્યાસ કર્યો. તેણે જોયું કે RNA પોલિમરેઝ દ્વારા ટ્રાન્સક્રિપ્શન દરમિયાન, DNA ટેમ્પલેટના અમુક વિસ્તારોમાં સુપરકોઇલિંગ (supercoiling) ઉત્પન્ન થાય છે. આ સુપરકોઇલિંગને દૂર કરવા માટે કયું એન્ઝાઇમ જવાબદાર છે અને તેની ગેરહાજરીમાં શું થાય?", "opts": ["ટોપોઆઇસોમરેઝ I - ટ્રાન્સક્રિપ્શન અટકી જાય અને DNA નુકસાન થાય", "હેલિકેઝ - DNA ડબલ હેલિક્સનું અલગીકરણ અટકી જાય", "લાઇગેઝ - RNA ટુકડાઓ જોડાઈ શકતા નથી", "પ્રાઇમેઝ - RNA પ્રાઇમરનું સંશ્લેષણ અટકી જાય"], "ans": 0, "exp": "સાચો જવાબ A) ટોપોઆઇસોમરેઝ I છે. RNA પોલિમરેઝ દ્વારા ટ્રાન્સક્રિપ્શન દરમિયાન DNA ટેમ્પલેટમાં સુપરકોઇલિંગ ઉત્પન્ન થાય છે, જેને દૂર કરવા માટે ટોપોઆઇસોમરેઝ I એન્ઝાઇમ જવાબદાર છે. આ એન્ઝાઇમની ગેરહાજરીમાં, સુપરકોઇલિંગના કારણે ટ્રાન્સક્રિપ્શન અટકી જાય છે અને DNA નુકસાન થઈ શકે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) હેલિકેઝ DNA ડબલ હેલિક્સને અલગ કરે છે, પરંતુ સુપરકોઇલિંગ દૂર કરતું નથી, C) લાઇગેઝ DNA ટુકડાઓને જોડે છે, RNA ને નહીં, D) પ્રાઇમેઝ RNA પ્રાઇમરનું સંશ્લેષણ કરે છે, જે ટ્રાન્સક્રિપ્શનમાં સીધી રીતે સંકળાયેલું નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "RNA પોલિમરેઝ દ્વારા ટ્રાન્સક્રિપ્શન દરમિયાન, કયા પરિબળ દ્વારા ટ્રાન્સક્રિપ્શનની પ્રક્રિયા દરમિયાન DNA-RNA હાઇબ્રિડની લંબાઈ નિયંત્રિત થાય છે?", "opts": ["ટોપોઇઝોમરેઝ", "હેલિકેઝ", "સિંગલ-સ્ટ્રેન્ડ બાઇન્ડિંગ પ્રોટીન (SSB)", "ટ્રાન્સક્રિપ્શન ફેક્ટર TFIIS"], "ans": 3, "exp": "TFIIS એ ટ્રાન્સક્રિપ્શન દરમિયાન RNA પોલિમરેઝની પ્રવૃત્તિને નિયંત્રિત કરે છે અને DNA-RNA હાઇબ્રિડની લંબાઈને સ્થિર રાખે છે. ટોપોઇઝોમરેઝ DNAના સુપરકોઇલિંગને નિયંત્રિત કરે છે, હેલિકેઝ DNAને અનવાઇન્ડ કરે છે, અને SSB એકલ-સૂત્રી DNAને સ્થિર કરે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "યુકેરિયોટિક કોષમાં, RNA પોલિમરેઝ III દ્વારા કયા પ્રકારના RNA નિર્માણ થાય છે?", "opts": ["mRNA", "tRNA અને 5S rRNA", "28S rRNA", "snRNA"], "ans": 1, "exp": "RNA પોલિમરેઝ III દ્વારા tRNA અને 5S rRNA નિર્માણ થાય છે. mRNA નિર્માણ RNA પોલિમરેઝ II દ્વારા થાય છે. 28S rRNA નિર્માણ RNA પોલિમરેઝ I દ્વારા થાય છે. snRNA નિર્માણ RNA પોલિમરેઝ II અથવા III દ્વારા થઈ શકે છે, પરંતુ મુખ્યત્વે RNA પોલિમરેઝ III દ્વારા tRNA અને 5S rRNA નિર્માણ થાય છે.", "ref": "Std 12 - Chapter 6: જીન અભિવ્યક્તિ અને જનીન નિયંત્રણ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
