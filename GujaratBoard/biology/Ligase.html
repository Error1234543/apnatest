<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ligase</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Ligase</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Ligase</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "DNA ની દુરસ્તી પ્રક્રિયા દરમિયાન, લાઇગેઝ ઉત્સેચકનું મુખ્ય કાર્ય કયું છે?", "opts": ["DNA ની ડબલ હેલિક્સને ખોલવા", "DNA ના ટૂકડાઓને ફોસ્ફોડાયેસ્ટર બંધ દ્વારા જોડવા", "RNA ની પ્રતિકૃતિ બનાવવા", "પ્રોટીન સંશ્લેષણમાં મદદ કરવા"], "ans": 1, "exp": "લાઇગેઝ ઉત્સેચકનું મુખ્ય કાર્ય DNA ના ટૂકડાઓને ફોસ્ફોડાયેસ્ટર બંધ દ્વારા જોડવાનું છે. A) DNA હેલિકેઝ ઉત્સેચકનું કાર્ય છે. C) RNA પોલિમરેઝ ઉત્સેચકનું કાર્ય છે. D) રાઇબોઝોમનું કાર્ય છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "પીસીઆર (PCR) પ્રક્રિયામાં લાઇગેઝ ઉત્સેચકનો ઉપયોગ ક્યારે થાય છે?", "opts": ["પ્રારંભિક ડીનેચરેશન દરમિયાન", "પ્રાઇમર એનલિંગ દરમિયાન", "એક્સટેન્શન પછી DNA ના ટૂકડાઓને જોડવા", "PCR ચક્રના અંતે ઉત્પાદનને શુદ્ધ કરવા"], "ans": 2, "exp": "PCR માં લાઇગેઝ ઉત્સેચકનો ઉપયોગ એક્સટેન્શન પછી DNA ના ટૂકડાઓને જોડવા માટે થાય છે. A) ડીનેચરેશન માટે ઉચ્ચ તાપમાનનો ઉપયોગ થાય છે. B) પ્રાઇમર એનલિંગ માટે તાપમાન નિયંત્રણ જરૂરી છે. D) શુદ્ધિકરણ માટે અન્ય પદ્ધતિઓ વપરાય છે.", "ref": "Std 12 - અધ્યાય 11: જૈવતકનીકી", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન લાઇગેઝ ઉત્સેચક વિશે ખોટું છે?", "opts": ["તે ATP અથવા NAD+ નો ઉપયોગ કરે છે", "તે DNA અને RNA બંનેને જોડી શકે છે", "તે 3’-OH અને 5’-ફોસ્ફેટ ગ્રુપ વચ્ચે બંધ બનાવે છે", "તે DNA ની દુરસ્તી અને પ્રતિકૃતિમાં મહત્વની ભૂમિકા ભજવે છે"], "ans": 1, "exp": "લાઇગેઝ ઉત્સેચક ફક્ત DNA ને જ જોડી શકે છે, RNA નહીં. A) લાઇગેઝ ATP અથવા NAD+ નો ઉપયોગ કરે છે. C) તે 3’-OH અને 5’-ફોસ્ફેટ ગ્રુપ વચ્ચે બંધ બનાવે છે. D) તે DNA ની દુરસ્તી અને પ્રતિકૃતિમાં મહત્વની ભૂમિકા ભજવે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA લાઇગેઝ ઉત્સેચકની ક્રિયા માટે કયા કોફેક્ટરની જરૂર પડે છે?", "opts": ["Mg²⁺ અથવા Mn²⁺", "Ca²⁺", "Zn²⁺", "Fe²⁺"], "ans": 0, "exp": "DNA લાઇગેઝ ઉત્સેચકની ક્રિયા માટે Mg²⁺ અથવા Mn²⁺ કોફેક્ટરની જરૂર પડે છે. B), C), અને D) અન્ય ઉત્સેચકો માટે વપરાતા કોફેક્ટર છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "જો DNA લાઇગેઝ ઉત્સેચક કામ કરતું ન હોય, તો નીચેનામાંથી કયું પરિણામ થશે?", "opts": ["DNA ની પ્રતિકૃતિ વધુ ઝડપી થશે", "DNA ના ટૂકડાઓ યોગ્ય રીતે જોડાઈ નહીં શકે", "RNA ની પ્રતિકૃતિ વધુ ઝડપી થશે", "પ્રોટીન સંશ્લેષણમાં વધારો થશે"], "ans": 1, "exp": "DNA લાઇગેઝ ઉત્સેચક કામ ન કરતું હોય તો DNA ના ટૂકડાઓ યોગ્ય રીતે જોડાઈ નહીં શકે. A) પ્રતિકૃતિ ધીમી પડશે. C) RNA પ્રતિકૃતિ પર અસર થશે નહીં. D) પ્રોટીન સંશ્લેષણ પર અસર થશે નહીં.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA લાઇગેઝ ઉત્સેચક દ્વારા કેટલીક વખત 'નિક' (nicks) દૂર કરવામાં આવે છે, પરંતુ ડબલ-સ્ટ્રેન્ડ બ્રેક (DSB) ની મરામતમાં તેની ભૂમિકા મર્યાદિત હોય છે. આ કયા કારણસર છે?", "opts": ["લાઇગેઝ ફક્ત 3'-OH અને 5'-ફોસ્ફેટ ગ્રુપ વચ્ચેના ફોસ્ફોડાયેસ્ટર બંધ તૈયાર કરે છે, પરંતુ DSB મરામત માટે અતિરિક્ત ઉત્સેચકો જેવા કે DNA પોલિમરેઝ અને ન્યુક્લિયેઝની જરૂર પડે છે.", "લાઇગેઝ ઉત્સેચક ફક્ત RNA અણુઓ સાથે કામ કરે છે, DNA સાથે નહીં.", "લાઇગેઝ ઉત્સેચક ફક્ત પ્રકાશસંશ્લેષણ દરમિયાન સક્રિય થાય છે, જ્યારે DSB મરામત અંધારામાં થાય છે.", "લાઇગેઝ ઉત્સેચક કોષકેન્દ્ર બહાર સક્રિય નથી, જ્યારે DSB મરામત મિટોકોન્ડ્રિયામાં થાય છે."], "ans": 0, "exp": "લાઇગેઝ ઉત્સેચક ફક્ત 3'-OH અને 5'-ફોસ્ફેટ ગ્રુપ વચ્ચેના ફોસ્ફોડાયેસ્ટર બંધ તૈયાર કરે છે, જે એકલ-સ્ટ્રેન્ડ બ્રેક (નિક) ની મરામત માટે પૂરતું છે. પરંતુ ડબલ-સ્ટ્રેન્ડ બ્રેક (DSB) ની મરામત માટે અતિરિક્ત ઉત્સેચકો જેવા કે DNA પોલિમરેઝ (નવો DNA સિંથેસ કરવા) અને ન્યુક્લિયેઝ (ખોટા ભાગ કાપવા) ની જરૂર પડે છે. બાકીના વિકલ્પો ખોટા છે: લાઇગેઝ DNA સાથે કામ કરે છે (B), તે પ્રકાશસંશ્લેષણ સાથે સંબંધિત નથી (C), અને તે કોષકેન્દ્રમાં સક્રિય થાય છે (D).", "ref": "Std 12 - Chapter 6: DNA દુરસ્તી અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન DNA લાઇગેઝ અને DNA પોલિમરેઝ વચ્ચેનો તફાવત સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["DNA લાઇગેઝ નવા ન્યુક્લિયોટાઇડ ઉમેરે છે, જ્યારે DNA પોલિમરેઝ ફક્ત બંધ તૈયાર કરે છે.", "DNA પોલિમરેઝ નવા ન્યુક્લિયોટાઇડ ઉમેરે છે, જ્યારે DNA લાઇગેઝ ફક્ત વચ્ચેના બંધ તૈયાર કરે છે.", "DNA લાઇગેઝ અને DNA પોલિમરેઝ બંને ફક્ત RNA ટેમ્પલેટ પર કામ કરે છે.", "DNA લાઇગેઝ અને DNA પોલિમરેઝ બંને ફક્ત પ્રોટીન સિંથેસ માટે જરૂરી છે."], "ans": 1, "exp": "DNA પોલિમરેઝ નવા ન્યુક્લિયોટાઇડ ઉમેરે છે (DNA સિંથેસ), જ્યારે DNA લાઇગેઝ ફક્ત વચ્ચેના ફોસ્ફોડાયેસ્ટર બંધ તૈયાર કરે છે (નિક અથવા બ્રેક દૂર કરવા). વિકલ્પ A ઉલટો છે, વિકલ્પ C ખોટો છે કારણ કે તેઓ DNA ટેમ્પલેટ પર કામ કરે છે, અને વિકલ્પ D ખોટો છે કારણ કે તેઓ પ્રોટીન સિંથેસ સાથે સંબંધિત નથી.", "ref": "Std 12 - Chapter 6: DNA દુરસ્તી અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "જો એક કોષમાં DNA લાઇગેઝ ઉત્સેચકની ક્રિયા અવરોધાય છે, તો નીચેનામાંથી કયું પરિણામ ઓકેઝિટલી (Okazaki) ફ્રેગમેન્ટ્સના સંદર્ભમાં થશે?", "opts": ["ઓકેઝિટલી ફ્રેગમેન્ટ્સ એકબીજા સાથે જોડાઈ શકશે નહીં, પરિણામે DNA રેપ્લિકેશન અધૂરું રહેશે.", "ઓકેઝિટલી ફ્રેગમેન્ટ્સ વધુ લાંબા બનશે, કારણ કે DNA પોલિમરેઝ વધુ કામ કરશે.", "ઓકેઝિટલી ફ્રેગમેન્ટ્સ RNA પ્રાઇમરમાં રૂપાંતરિત થશે.", "ઓકેઝિટલી ફ્રેગમેન્ટ્સ કોષકેન્દ્ર બહાર જશે અને નાશ પામશે."], "ans": 0, "exp": "DNA લાઇગેઝ ઓકેઝિટલી ફ્રેગમેન્ટ્સ (લેગિંગ સ્ટ્રેન્ડ પર બનતા ટૂંકા DNA ટુકડાઓ) ને એકબીજા સાથે જોડે છે. જો તેની ક્રિયા અવરોધાય, તો ફ્રેગમેન્ટ્સ જોડાઈ શકશે નહીં, પરિણામે DNA રેપ્લિકેશન અધૂરું રહેશે. બાકીના વિકલ્પો ખોટા છે: ઓકેઝિટલી ફ્રેગમેન્ટ્સની લંબાઈ DNA પોલિમરેઝ પર આધાર રાખે છે (B), તેઓ RNA પ્રાઇમરમાં રૂપાંતરિત થતા નથી (C), અને તેઓ કોષકેન્દ્રમાં જ રહે છે (D).", "ref": "Std 12 - Chapter 5: વંશવેલા અને અનુવંશિકતા", "ch": ""}, {"q": "નીચેનામાંથી કયું કોફેક્ટર DNA લાઇગેઝ ઉત્સેચકની ક્રિયા માટે જરૂરી છે, પરંતુ તેની અછતમાં કોષમાં કયું પરિણામ જોવા મળે છે?", "opts": ["Mg²⁺; લાઇગેઝ ક્રિયા અવરોધાય છે, પરિણામે DNA દુરસ્તી અધૂરી રહે છે.", "Zn²⁺; લાઇગેઝ ક્રિયા વધે છે, પરિણામે DNA મ્યુટેશન થાય છે.", "Ca²⁺; લાઇગેઝ ક્રિયા અવરોધાય છે, પરિણામે કોષ મૃત્યુ પામે છે.", "Fe²⁺; લાઇગેઝ ક્રિયા અવરોધાય છે, પરિણામે RNA સિંથેસ થાય છે."], "ans": 0, "exp": "DNA લાઇગેઝ ઉત્સેચકની ક્રિયા માટે Mg²⁺ (મેગ્નેશિયમ આયન) કોફેક્ટર તરીકે જરૂરી છે. જો તેની અછત હોય, તો લાઇગેઝ ક્રિયા અવરોધાય છે, પરિણામે DNA દુરસ્તી અધૂરી રહે છે. બાકીના વિકલ્પો ખોટા છે: Zn²⁺, Ca²⁺, અને Fe²⁺ લાઇગેઝ માટે જરૂરી નથી, અને તેમની અસરો પણ યોગ્ય નથી (B, C, D).", "ref": "Std 12 - Chapter 6: DNA દુરસ્તી અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન DNA લાઇગેઝ અને RNA લાઇગેઝ વચ્ચેનો તફાવત સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["DNA લાઇગેઝ અને RNA લાઇગેઝ બંને એકસરખી ક્રિયા કરે છે, ફક્ત અણુઓ અલગ હોય છે.", "DNA લાઇગેઝ ફક્ત DNA પર કામ કરે છે, જ્યારે RNA લાઇગેઝ RNA અણુઓના સ્પ્લાઇસિંગમાં ભાગ લે છે.", "RNA લાઇગેઝ DNA લાઇગેઝ કરતાં વધુ સક્રિય હોય છે.", "DNA લાઇગેઝ RNA પર કામ કરે છે, જ્યારે RNA લાઇગેઝ DNA પર કામ કરે છે."], "ans": 1, "exp": "DNA લાઇગેઝ ફક્ત DNA અણુઓ પર કામ કરે છે (ફોસ્ફોડાયેસ્ટર બંધ તૈયાર કરવા), જ્યારે RNA લાઇગેઝ RNA અણુઓના સ્પ્લાઇસિંગ (જેમ કે tRNA અથવા rRNA પ્રોસેસિંગ) માં ભાગ લે છે. બાકીના વિકલ્પો ખોટા છે: તેઓ એકસરખી ક્રિયા કરતા નથી (A), RNA લાઇગેઝ વધુ સક્રિય હોવાનું કોઈ પુરાવો નથી (C), અને તેઓ અણુઓની અદલાબદલી કરતા નથી (D).", "ref": "Std 12 - Chapter 6: DNA દુરસ્તી અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "DNA લાઇગેઝ ઉત્સેચક દ્વારા કેટલાક કિસ્સાઓમાં 'સ્ટિકી એન્ડ' (sticky ends) જોડાણ દરમિયાન કયો પગલો સૌથી મહત્વપૂર્ણ છે?", "opts": ["DNA ના બે સિંગલ-સ્ટ્રેન્ડેડ ભાગો વચ્ચે હાઇડ્રોજન બંધોની રચના", "3'-OH અને 5'-ફોસ્ફેટ ગ્રુપ વચ્ચે ફોસ્ફોડાયેસ્ટર બંધની રચના", "DNA ના ડબલ-સ્ટ્રેન્ડેડ ભાગમાં સુગર-ફોસ્ફેટ બેકબોનનું વિઘટન", "DNA ના સિંગલ-સ્ટ્રેન્ડેડ ભાગમાં ન્યુક્લિયોટાઇડની ઉમેરણી"], "ans": 1, "exp": "DNA લાઇગેઝ ઉત્સેચકનું મુખ્ય કાર્ય 3'-OH અને 5'-ફોસ્ફેટ ગ્રુપ વચ્ચે ફોસ્ફોડાયેસ્ટર બંધની રચના કરવાનું છે, જેથી DNA ના બે ટુકડાઓ જોડાઈ શકે. હાઇડ્રોજન બંધો (A) DNA ના ડબલ હેલિક્સને સ્થિર કરે છે, પરંતુ લાઇગેઝ દ્વારા રચાય નથી. સુગર-ફોસ્ફેટ બેકબોનનું વિઘટન (C) ન્યુક્લિયેઝ દ્વારા થાય છે, લાઇગેઝ નહીં. ન્યુક્લિયોટાઇડની ઉમેરણી (D) DNA પોલિમરેઝનું કાર્ય છે.", "ref": "Std 12 - અધ્યાય 11: જૈવ-તકનીકી (Biotechnology)", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન DNA લાઇગેઝ ઉત્સેચકની ક્રિયા માટેના ઉત્ક્રાંતિક (evolutionary) મહત્વ વિશે સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["તે DNA ની દુરસ્તી પ્રક્રિયામાં મદદ કરે છે, જેથી મ્યુટેશનનો દર ઘટે", "તે પ્રજનન દરમિયાન જનીનની અદલાબદલીને પ્રોત્સાહન આપે છે", "તે DNA ની પ્રતિકૃતિ (replication) દરમિયાન લાગુ પડતું નથી", "તે કોષીકા વિભાજન દરમિયાન વર્ણસૂત્રોની સ્થિરતામાં મદદ કરે છે"], "ans": 0, "exp": "DNA લાઇગેઝ ઉત્સેચક DNA ની દુરસ્તી પ્રક્રિયામાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે, જેથી DNA ના ટુકડાઓ યોગ્ય રીતે જોડાઈ શકે અને મ્યુટેશનનો દર ઘટે (A). જનીનની અદલાબદલી (B) રિકોમ્બિનેશન દ્વારા થાય છે, લાઇગેઝ દ્વારા નહીં. DNA પ્રતિકૃતિ (C) દરમિયાન લાઇગેઝ ઓકાઝિયોનલી લાગુ પડે છે, પરંતુ તેનું મુખ્ય કાર્ય દુરસ્તી છે. કોષીકા વિભાજન (D) દરમિયાન વર્ણસૂત્રોની સ્થિરતા માટે કોઈનેસિન અને અન્ય પ્રોટીન જવાબદાર છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિકાસ (Heredity and Evolution)", "ch": ""}, {"q": "જો એક પ્રયોગશાળામાં DNA લાઇગેઝ ઉત્સેચકની જગ્યાએ T4 DNA લાઇગેઝનો ઉપયોગ કરવામાં આવે, તો નીચેનામાંથી કયું પરિણામ અપેક્ષિત છે?", "opts": ["DNA ના ટુકડાઓ જોડાશે નહીં, કારણ કે T4 લાઇગેઝ મનુષ્યના DNA સાથે કામ કરતું નથી", "DNA ના ટુકડાઓ યોગ્ય રીતે જોડાશે, કારણ કે T4 લાઇગેઝ યુનિવર્સલ છે", "DNA ના ટુકડાઓ જોડાશે, પરંતુ ફક્ત બેક્ટરિયલ DNA સાથે", "DNA ના ટુકડાઓ જોડાશે, પરંતુ ફક્ત RNA ની હાજરીમાં"], "ans": 1, "exp": "T4 DNA લાઇગેઝ એક બેક્ટરિયોફેજ એન્ઝાઇમ છે, પરંતુ તે યુનિવર્સલ છે અને મનુષ્યના DNA સહિત વિવિધ પ્રકારના DNA ના ટુકડાઓ જોડી શકે છે (B). તે મનુષ્યના DNA સાથે કામ કરે છે (A ખોટું). તે ફક્ત બેક્ટરિયલ DNA સાથે જ કામ કરે છે એવું નથી (C ખોટું). તેને RNA ની જરૂર પડતી નથી (D ખોટું).", "ref": "Std 12 - અધ્યાય 11: જૈવ-તકનીકી (Biotechnology)", "ch": ""}, {"q": "DNA લાઇગેઝ ઉત્સેચકની ક્રિયા માટે નીચેનામાંથી કયું પરિબળ સૌથી મહત્વપૂર્ણ છે, જ્યારે તે 'બ્લંટ એન્ડ' (blunt ends) જોડાણ કરે છે?", "opts": ["ઉચ્ચ તાપમાન (70°C)", "નીચું તાપમાન (4°C)", "ઉચ્ચ સાંદ્રતામાં Mg²⁺ આયન", "ઉચ્ચ સાંદ્રતામાં NaCl"], "ans": 2, "exp": "DNA લાઇગેઝ ઉત્સેચક 'બ્લંટ એન્ડ' જોડાણ માટે ઉચ્ચ સાંદ્રતામાં Mg²⁺ આયનની જરૂર પડે છે, કારણ કે તે ફોસ્ફોડાયેસ્ટર બંધની રચનામાં મદદ કરે છે (C). ઉચ્ચ તાપમાન (A) ઉત્સેચકને નિષ્ક્રિય કરે છે. નીચું તાપમાન (B) ક્રિયાને ધીમું પાડે છે. ઉચ્ચ સાંદ્રતામાં NaCl (D) ક્રિયાને અવરોધે છે.", "ref": "Std 12 - અધ્યાય 11: જૈવ-તકનીકી (Biotechnology)", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન DNA લાઇગેઝ ઉત્સેચક અને DNA પોલિમરેઝ ઉત્સેચક વચ્ચેના સહ-સંબંધ (synergy) વિશે સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["DNA પોલિમરેઝ દ્વારા DNA ની પ્રતિકૃતિ દરમિયાન, DNA લાઇગેઝ ઓકાઝિયોનલી લાગુ પડે છે", "DNA લાઇગેઝ દ્વારા DNA ની દુરસ્તી દરમિયાન, DNA પોલિમરેઝ નિષ્ક્રિય થાય છે", "DNA પોલિમરેઝ અને DNA લાઇગેઝ એકસાથે કામ કરે છે, પરંતુ ફક્ત પ્રકાશસંશ્લેષણ દરમિયાન", "DNA લાઇગેઝ અને DNA પોલિમરેઝ વચ્ચે કોઈ સહ-સંબંધ નથી"], "ans": 0, "exp": "DNA પોલિમરેઝ દ્વારા DNA ની પ્રતિકૃતિ દરમિયાન, DNA લાઇગેઝ ઓકાઝિયોનલી લાગુ પડે છે, જેથી ઓકાઝિયોનલી રહેલા 'નિક' (nicks) દૂર થઈ શકે (A). DNA લાઇગેઝ દ્વારા DNA ની દુરસ્તી દરમિયાન DNA પોલિમરેઝ નિષ્ક્રિય થતું નથી (B ખોટું). તે ફક્ત પ્રકાશસંશ્લેષણ દરમિયાન કામ કરે છે એવું નથી (C ખોટું). તે બંને વચ્ચે સહ-સંબંધ છે (D ખોટું).", "ref": "Std 12 - અધ્યાય 5: કોષચક્ર અને કોષવિભાજન (Cell Cycle and Cell Division)", "ch": ""}, {"q": "DNA લાઇગેઝ ઉત્સેચક દ્વારા કેટલાક કિસ્સાઓમાં 'બ્લન્ટ એન્ડ' (blunt ends) જોડાણ દરમિયાન કયા ઉત્સેચક સાથે સહકાર થાય છે, જેથી DNA ની સ્થિરતા વધે?", "opts": ["DNA પોલિમરેઝ I", "હેલિકેઝ", "ટોપોઇઝોમરેઝ", "એન્ડોન્યુક્લિએઝ"], "ans": 0, "exp": "DNA લાઇગેઝ 'બ્લન્ટ એન્ડ' જોડાણ દરમિયાન DNA પોલિમરેઝ I સાથે સહકાર કરે છે, કારણ કે DNA પોલિમરેઝ I પાસે 5’→3’ એક્સોન્યુક્લિએઝ ક્રિયા હોય છે, જે 'ગેપ ફિલિંગ'માં મદદ કરે છે. હેલિકેઝ DNA ને અણી કરે છે, ટોપોઇઝોમરેઝ સુપરકોઇલિંગ દૂર કરે છે, અને એન્ડોન્યુક્લિએઝ DNA કાપે છે, જે આ ક્રિયામાં સીધો સહકાર આપતું નથી.", "ref": "Std 12 - Chapter 11: જનીન અભિવ્યક્તિ અને નિયમન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન DNA લાઇગેઝ ઉત્સેચકની ક્રિયા માટેના થર્મોડાયનેમિક્સ વિશે સૌથી યોગ્ય છે?", "opts": ["લાઇગેઝ ક્રિયા એ એક એન્ડરગોનિક પ્રક્રિયા છે, જે ATP અથવા NAD+ નો ઉપયોગ કરે છે.", "લાઇગેઝ ક્રિયા એ એક એક્સરગોનિક પ્રક્રિયા છે, જે ATP અથવા NAD+ નો ઉપયોગ કરે છે.", "લાઇગેઝ ક્રિયા એ એક એન્ડરગોનિક પ્રક્રિયા છે, જે GTP નો ઉપયોગ કરે છે.", "લાઇગેઝ ક્રિયા એ એક એક્સરગોનિક પ્રક્રિયા છે, જે GTP નો ઉપયોગ કરે છે."], "ans": 0, "exp": "DNA લાઇગેઝ ક્રિયા એ એક એન્ડરગોનિક પ્રક્રિયા છે, કારણ કે તે ફોસ્ફોડાયેસ્ટર બંધ બનાવવા માટે ઉર્જાની જરૂર હોય છે, જે ATP અથવા NAD+ (બેક્ટેરિયામાં) દ્વારા પૂરી પાડવામાં આવે છે. એક્સરગોનિક પ્રક્રિયા ઉર્જા મુક્ત કરે છે, જે અહીં લાગુ પડતું નથી. GTP લાઇગેઝ ક્રિયામાં ઉપયોગમાં લેવાતુ let userAns={},curIdx=0;

function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
