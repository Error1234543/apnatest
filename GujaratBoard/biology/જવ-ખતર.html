<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>જૈવ ખાતર</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>જૈવ ખાતર</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">જૈવ ખાતર</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "નીચેના પૈકી કયું જૈવ ખાતર મુખ્યત્વે ફોસ્ફરસનું દ્રાવ્યીકરણ કરવાનું કાર્ય કરે છે, પરંતુ તે નાઇટ્રોજન સ્થાપનમાં સીધો ભાગ લેતું નથી?", "opts": ["રાઇઝોબિયમ (Rhizobium)", "એઝોટોબેક્ટર (Azotobacter)", "ફોસ્ફોબેક્ટેરિયમ (Phosphobacterium)", "એનાબીના (Anabaena)"], "ans": 2, "exp": "ફોસ્ફોબેક્ટેરિયમ મુખ્યત્વે અદ્રાવ્ય ફોસ્ફરસને દ્રાવ્ય સ્વરૂપમાં રૂપાંતરિત કરે છે, જે છોડને ઉપલબ્ધ થાય છે. રાઇઝોબિયમ અને એઝોટોબેક્ટર નાઇટ્રોજન સ્થાપનમાં ભાગ લે છે, જ્યારે એનાબીના સાયનોબેક્ટેરિયા છે જે નાઇટ્રોજન સ્થાપન કરે છે. તેથી ફોસ્ફોબેક્ટેરિયમ જ ફોસ્ફરસ દ્રાવ્યીકરણ માટે જવાબદાર છે.", "ref": "Std 12 - પ્રકરણ 10: ખેતીવિદ્યામાં સૂક્ષ્મજીવો", "ch": ""}, {"q": "એક ખેડૂત પોતાના ખેતરમાં જૈવ ખાતર તરીકે એઝોલા (Azolla)નો ઉપયોગ કરે છે. આ એઝોલા સાથે સહજીવનમાં રહેતા સૂક્ષ્મજીવનું નામ શું છે, જે નાઇટ્રોજન સ્થાપનમાં મદદ કરે છે?", "opts": ["રાઇઝોબિયમ (Rhizobium)", "એનાબીના (Anabaena)", "એઝોટોબેક્ટર (Azotobacter)", "ક્લોસ્ટ્રિડિયમ (Clostridium)"], "ans": 1, "exp": "એઝોલા એક જળચર ફર્ન છે જે એનાબીના નામના સાયનોબેક્ટેરિયા સાથે સહજીવન ધરાવે છે. એનાબીના વાતાવરણીય નાઇટ્રોજનનું સ્થાપન કરીને છોડને નાઇટ્રોજન પૂરો પાડે છે. રાઇઝોબિયમ શિમ્બી કુળના છોડના મૂળમાં ગાંઠો બનાવે છે, જ્યારે એઝોટોબેક્ટર અને ક્લોસ્ટ્રિડિયમ મુક્તજીવી નાઇટ્રોજન સ્થાપક છે.", "ref": "Std 12 - પ્રકરણ 10: ખેતીવિદ્યામાં સૂક્ષ્મજીવો", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લો: \n(1) જૈવ ખાતરો માત્ર નાઇટ્રોજન પોષક તત્ત્વ પૂરું પાડે છે. \n(2) જૈવ ખાતરો જમીનની ભૌતિક અને રાસાયણિક ગુણવત્તામાં સુધારો કરે છે. \n(3) જૈવ ખાતરોનો ઉપયોગ રાસાયણિક ખાતરોના ઉપયોગને સંપૂર્ણપણે બદલી શકે છે. \nઉપરોક્ત વિધાનોમાંથી કયું/કયાં વિધાન/વિધાનો ખોટું/ખોટાં છે?", "opts": ["માત્ર 1 અને 3", "માત્ર 2", "માત્ર 1", "માત્ર 2 અને 3"], "ans": 0, "exp": "વિધાન 1 ખોટું છે કારણ કે જૈવ ખાતરો માત્ર નાઇટ્રોજન જ નહીં, પરંતુ ફોસ્ફરસ અને અન્ય પોષક તત્ત્વો પણ પૂરા પાડે છે. વિધાન 3 ખોટું છે કારણ કે જૈવ ખાતરો રાસાયણિક ખાતરોને સંપૂર્ણપણે બદલી શકતા નથી, પરંતુ તેમના ઉપયોગમાં ઘટાડો કરી શકે છે. વિધાન 2 સાચું છે કારણ કે જૈવ ખાતરો જમીનની ગુણવત્તામાં સુધારો કરે છે.", "ref": "Std 12 - પ્રકરણ 10: ખેતીવિદ્યામાં સૂક્ષ્મજીવો", "ch": ""}, {"q": "નીચેના પૈકી કયું જૈવ ખાતર મૂળગાંઠ બેક્ટેરિયા તરીકે ઓળખાય છે અને તે શિમ્બી કુળના છોડ સાથે સહજીવન ધરાવે છે?", "opts": ["એઝોસ્પિરિલમ (Azospirillum)", "રાઇઝોબિયમ (Rhizobium)", "ફ્રેન્કિયા (Frankia)", "એઝોટોબેક્ટર (Azotobacter)"], "ans": 1, "exp": "રાઇઝોબિયમ બેક્ટેરિયા શિમ્બી કુળના છોડના મૂળમાં ગાંઠો બનાવીને સહજીવન ધરાવે છે અને નાઇટ્રોજન સ્થાપન કરે છે. ફ્રેન્કિયા પણ નાઇટ્રોજન સ્થાપન કરે છે, પરંતુ તે બિન-શિમ્બી છોડ સાથે સંકળાયેલું છે. એઝોસ્પિરિલમ અને એઝોટોબેક્ટર મુક્તજીવી નાઇટ્રોજન સ્થાપક છે.", "ref": "Std 12 - પ્રકરણ 10: ખેતીવિદ્યામાં સૂક્ષ્મજીવો", "ch": ""}, {"q": "એક ખેડૂત પોતાના ખેતરમાં જૈવ ખાતર તરીકે વર્મીકમ્પોસ્ટનો ઉપયોગ કરે છે. આ વર્મીકમ્પોસ્ટમાં નીચેના પૈકી કયું લક્ષણ જોવા મળતું નથી?", "opts": ["જમીનની જલધારણ ક્ષમતામાં વધારો", "સૂક્ષ્મ પોષક તત્ત્વોનું પ્રમાણ વધારે", "વાતાવરણીય નાઇટ્રોજનનું સીધું સ્થાપન", "જમીનની હવાની અવરજવરમાં સુધારો"], "ans": 2, "exp": "વર્મીકમ્પોસ્ટમાં સેન્દ્રિય પદાર્થોનું વિઘટન થાય છે, જે જમીનની ગુણવત્તામાં સુધારો કરે છે, પરંતુ તે વાતાવરણીય નાઇટ્રોજનનું સીધું સ્થાપન કરતું નથી. નાઇટ્રોજન સ્થાપન માટે જૈવ ખાતરો જેવા કે રાઇઝોબિયમ અથવા એઝોટોબેક્ટરનો ઉપયોગ થાય છે. વર્મીકમ્પોસ્ટ જમીનની જલધારણ ક્ષમતા, પોષક તત્ત્વોનું પ્રમાણ અને હવાની અવરજવરમાં સુધારો કરે છે.", "ref": "Std 12 - પ્રકરણ 10: ખેતીવિદ્યામાં સૂક્ષ્મજીવો", "ch": ""}, {"q": "જૈવ ખાતર તરીકે વાપરાતા રાઈઝોબિયમ (Rhizobium) બેક્ટેરિયા વિશે નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["તે મૂળગાંઠમાં વસે છે અને વાતાવરણીય નાઇટ્રોજનનું સ્થિરીકરણ કરે છે.", "તે લેગ્યુમિનસ પરિવારના છોડ સાથે સહજીવી સંબંધ ધરાવે છે.", "તે નાઇટ્રોજનને અમોનિયામાં રૂપાંતરિત કરે છે, જે છોડ દ્વારા શોષાઈ શકે છે.", "તે મૃત કોષોમાં જીવે છે અને સડો પડવાની પ્રક્રિયામાં ભાગ લે છે."], "ans": 3, "exp": "રાઈઝોબિયમ બેક્ટેરિયા જીવંત મૂળગાંઠોમાં વસે છે અને નાઇટ્રોજન સ્થિરીકરણ કરે છે, લેગ્યુમિનસ છોડ સાથે સહજીવી સંબંધ ધરાવે છે, અને નાઇટ્રોજનને અમોનિયામાં રૂપાંતરિત કરે છે. પરંતુ તે મૃત કોષોમાં જીવતું નથી અથવા સડો પડવાની પ્રક્રિયામાં ભાગ લેતું નથી, એટલે વિધાન D ખોટું છે.", "ref": "Std 12 - અધ્યાય 10: સજીવો અને વાતાવરણ", "ch": ""}, {"q": "એઝોટોબેક્ટર (Azotobacter) અને એઝોસ્પિરિલમ (Azospirillum) વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["એઝોટોબેક્ટર મૂળગાંઠ બનાવે છે જ્યારે એઝોસ્પિરિલમ નહીં.", "એઝોટોબેક્ટર મુખ્યત્વે ગેહું અને જુવાર જેવા અનાજના છોડમાં જોવા મળે છે જ્યારે એઝોસ્પિરિલમ લેગ્યુમિનસ છોડમાં જોવા મળે છે.", "એઝોટોબેક્ટર મુક્ત-જીવી નાઇટ્રોજન સ્થિરીકરણ કરે છે જ્યારે એઝોસ્પિરિલમ છોડની મૂળની સપાટી પર રહે છે.", "એઝોટોબેક્ટર ફોસ્ફરસનું દ્રાવ્યીકરણ કરે છે જ્યારે એઝોસ્પિરિલમ નાઇટ્રોજન સ્થિરીકરણ કરે છે."], "ans": 2, "exp": "એઝોટોબેક્ટર મુક્ત-જીવી નાઇટ્રોજન સ્થિરીકરણ કરે છે, જ્યારે એઝોસ્પિરિલમ છોડની મૂળની સપાટી પર રહે છે અને નાઇટ્રોજન સ્થિરીકરણમાં મદદ કરે છે. વિધાન A ખોટું છે કારણ કે એઝોટોબેક્ટર મૂળગાંઠ બનાવતું નથી. વિધાન B ખોટું છે કારણ કે એઝોસ્પિરિલમ લેગ્યુમિનસ છોડમાં નહીં પરંતુ અનાજના છોડમાં જોવા મળે છે. વિધાન D ખોટું છે કારણ કે એઝોટોબેક્ટર ફોસ્ફરસનું દ્રાવ્યીકરણ કરતું નથી.", "ref": "Std 12 - અધ્યાય 10: સજીવો અને વાતાવરણ", "ch": ""}, {"q": "નીચેના પૈકી કયું જૈવ ખાતર ફોસ્ફરસનું દ્રાવ્યીકરણ કરવાનું કાર્ય કરતું નથી?", "opts": ["બેસિલસ મેગાટેરિયમ (Bacillus megaterium)", "પ્સ્યુડોમોનાસ સ્ટ્રાયટા (Pseudomonas striata)", "એઝોટોબેક્ટર (Azotobacter)", "એસ્પરગિલસ અવામોરી (Aspergillus awamori)"], "ans": 2, "exp": "એઝોટોબેક્ટર નાઇટ્રોજન સ્થિરીકરણ કરે છે, ફોસ્ફરસનું દ્રાવ્યીકરણ કરતું નથી. બેસિલસ મેગાટેરિયમ, પ્સ્યુડોમોનાસ સ્ટ્રાયટા, અને એસ્પરગિલસ અવામોરી ફોસ્ફરસનું દ્રાવ્યીકરણ કરે છે.", "ref": "Std 12 - અધ્યાય 10: સજીવો અને વાતાવરણ", "ch": ""}, {"q": "જૈવ ખાતર તરીકે વાપરાતા સાયનોબેક્ટીરિયા (Cyanobacteria) વિશે નીચેના પૈકી કયું વિધાન સત્ય છે?", "opts": ["તે માત્ર જળાશયોમાં જ જીવી શકે છે.", "તે નાઇટ્રોજન સ્થિરીકરણ સાથે સાથે કાર્બનિક પદાર્થોનું વિઘટન પણ કરે છે.", "તે ફક્ત નાઇટ્રોજન સ્થિરીકરણ જ કરે છે, પરંતુ ફોસ્ફરસનું દ્રાવ્યીકરણ કરતું નથી.", "તે પ્રકાશસંશ્લેષણ દ્વારા પોતાનું ખોરાક બનાવે છે અને નાઇટ્રોજન સ્થિરીકરણ પણ કરે છે."], "ans": 3, "exp": "સાયનોબેક્ટીરિયા પ્રકાશસંશ્લેષણ દ્વારા પોતાનું ખોરાક બનાવે છે અને નાઇટ્રોજન સ્થિરીકરણ પણ કરે છે. વિધાન A ખોટું છે કારણ કે તે જમીન અને જળાશયોમાં જીવી શકે છે. વિધાન B ખોટું છે કારણ કે તે કાર્બનિક પદાર્થોનું વિઘટન કરતું નથી. વિધાન C ખોટું છે કારણ કે કેટલાક સાયનોબેક્ટીરિયા ફોસ્ફરસનું દ્રાવ્યીકરણ પણ કરે છે.", "ref": "Std 12 - અધ્યાય 10: સજીવો અને વાતાવરણ", "ch": ""}, {"q": "નીચેના પૈકી કયું જૈવ ખાતર મૃત કોષોમાં જીવે છે અને સડો પડવાની પ્રક્રિયામાં ભાગ લે છે?", "opts": ["રાઈઝોબિયમ (Rhizobium)", "એઝોટોબેક્ટર (Azotobacter)", "બેસિલસ સબ્ટિલિસ (Bacillus subtilis)", "એઝોલા (Azolla)"], "ans": 2, "exp": "બેસિલસ સબ્ટિલિસ મૃત કોષોમાં જીવે છે અને સડો પડવાની પ્રક્રિયામાં ભાગ લે છે. રાઈઝોબિયમ મૂળગાંઠમાં જીવે છે, એઝોટોબેક્ટર મુક્ત-જીવી છે, અને એઝોલા એક જલીય ફર્ન છે જે નાઇટ્રોજન સ્થિરીકરણ કરે છે.", "ref": "Std 12 - અધ્યાય 10: સજીવો અને વાતાવરણ", "ch": ""}, {"q": "જૈવ ખાતર તરીકે વાપરાતા 'ફ્રાન્કિયા' (Frankia) વિશે નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["તે એક્ટિનોમાઇસીટ્સ (Actinomycetes) જૂથનું બેક્ટેરિયા છે.", "તે મુખ્યત્વે નાઇટ્રોજન સ્થિરીકરણ કરે છે અને કેસ્યુઅરિના (Casuarina) જેવા છોડ સાથે સહજીવન ધરાવે છે.", "તે મૃત ઓર્ગેનિક પદાર્થોનું વિઘટન કરે છે અને હ્યુમસ બનાવવામાં મદદ કરે છે.", "તે મૂળગાંઠ નોડ્યુલ્સમાં વસવાટ કરે છે અને વાતાવરણમાંથી નાઇટ્રોજનનું સ્થિરીકરણ કરે છે."], "ans": 2, "exp": "ફ્રાન્કિયા એ એક્ટિનોમાઇસીટ્સ જૂથનું બેક્ટેરિયા છે જે નાઇટ્રોજન સ્થિરીકરણ કરે છે અને કેસ્યુઅરિના જેવા છોડ સાથે સહજીવન ધરાવે છે (A અને B સત્ય). તે મૂળગાંઠ નોડ્યુલ્સમાં વસવાટ કરે છે (D સત્ય). પરંતુ તે મૃત ઓર્ગેનિક પદાર્થોનું વિઘટન કરતું નથી, હ્યુમસ બનાવવાનું કાર્ય મુખ્યત્વે ફંગી અને બેક્ટેરિયા જેવા કે સ્યુડોમોનાસ કરે છે (C ખોટું).", "ref": "Std 12 - Chapter 10: સજીવો અને પર્યાવરણ (જૈવ ખાતર અને સહજીવન)", "ch": ""}, {"q": "જૈવ ખાતર તરીકે વાપરાતા 'ટ્રાઇકોડર્મા' (Trichoderma) વિશે નીચેના પૈકી કયું વિધાન સત્ય નથી?", "opts": ["તે ફંગી છે જે મૃત ઓર્ગેનિક પદાર્થોનું વિઘટન કરે છે.", "તે મૃદામાં ફોસ્ફરસ અને પોટેશિયમ જેવા પોષક તત્ત્વોને દ્રાવ્ય બનાવવામાં મદદ કરે છે.", "તે નાઇટ્રોજન સ્થિરીકરણ કરે છે અને વાતાવરણમાંથી નાઇટ્રોજન લે છે.", "તે છોડના મૂળ વિકાસને પ્રોત્સાહન આપે છે અને રોગપ્રતિકારક શક્તિ વધારે છે."], "ans": 2, "exp": "ટ્રાઇકોડર્મા એ ફંગી છે જે મૃત ઓર્ગેનિક પદાર્થોનું વિઘટન કરે છે (A સત્ય). તે મૃદામાં ફોસ્ફરસ અને પોટેશિયમ જેવા પોષક તત્ત્વોને દ્રાવ્ય બનાવે છે (B સત્ય) અને છોડના મૂળ વિકાસને પ્રોત્સાહન આપે છે (D સત્ય). પરંતુ તે નાઇટ્રોજન સ્થિરીકરણ કરતું નથી (C ખોટું).", "ref": "Std 12 - Chapter 10: સજીવો અને પર્યાવરણ (જૈવ ખાતર અને ફંગી)", "ch": ""}, {"q": "નીચેના પૈકી કયું જૈવ ખાતર મૃદામાં કેલ્શિયમ અને મેગ્નેશિયમ જેવા સૂક્ષ્મ પોષક તત્ત્વોને દ્રાવ્ય બનાવવામાં મદદ કરે છે?", "opts": ["એઝોટોબેક્ટર (Azotobacter)", "એઝોસ્પિરિલમ (Azospirillum)", "બેસિલસ મેગાથેરિયમ (Bacillus megaterium)", "રાઈઝોબિયમ (Rhizobium)"], "ans": 2, "exp": "બેસિલસ મેગાથેરિયમ (Bacillus megaterium) મૃદામાં કેલ્શિયમ અને મેગ્નેશિયમ જેવા સૂક્ષ્મ પોષક તત્ત્વોને દ્રાવ્ય બનાવવામાં મદદ કરે છે. એઝોટોબેક્ટર અને એઝોસ્પિરિલમ મુખ્યત્વે નાઇટ્રોજન સ્થિરીકરણ કરે છે (A અને B ખોટા). રાઈઝોબિયમ મૂળગાંઠ બેક્ટેરિયા છે અને નાઇટ્રોજન સ્થિરીકરણ કરે છે (D ખોટું).", "ref": "Std 12 - Chapter 10: સજીવો અને પર્યાવરણ (જૈવ ખાતર અને પોષક તત્ત્વો)", "ch": ""}, {"q": "જૈવ ખાતર તરીકે વાપરાતા 'માયકોરાઈઝા' (Mycorrhiza) વિશે નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["તે ફંગી અને છોડના મૂળ વચ્ચેનું સહજીવી સંબંધ છે.", "તે મૃદામાંથી પાણી અને પોષક તત્ત્વોના શોષણમાં મદદ કરે છે.", "તે નાઇટ્રોજન સ્થિરીકરણ કરે છે અને વાતાવરણમાંથી નાઇટ્રોજન લે છે.", "તે છોડની વૃદ્ધિ અને રોગપ્રતિકારક શક્તિ વધારે છે."], "ans": 2, "exp": "માયકોરાઈઝા એ ફંગી અને છોડના મૂળ વચ્ચેનો સહજીવી સંબંધ છે (A સત્ય). તે મૃદામાંથી પાણી અને પોષક તત્ત્વોના શોષણમાં મદદ કરે છે (B સત્ય) અને છોડની વૃદ્ધિ અને રોગપ્રતિકારક શક્તિ વધારે છે (D સત્ય). પરંતુ તે નાઇટ્રોજન સ્થિરીકરણ કરતું નથી (C ખોટું).", "ref": "Std 12 - Chapter 10: સજીવો અને પર્યાવરણ (જૈવ ખાતર અને માયકોરાઈઝા)", "ch": ""}, {"q": "નીચેના પૈકી કયું જૈવ ખાતર મૃદામાં સલ્ફરનું ઓક્સીડેશન કરે છે અને સલ્ફરના ચક્રમાં મહત્વની ભૂમિકા ભજવે છે?", "opts": ["થાયોબેસિલસ (Thiobacillus)", "એઝોટોબેક્ટર (Azotobacter)", "ક્લોસ્ટ્રિડિયમ (Clostridium)", "રાઈઝોબિયમ (Rhizobium)"], "ans": 0, "exp": "થાયોબેસિલસ (Thiobacillus) મૃદામાં સલ્ફરનું ઓક્સીડેશન કરે છે અને સલ્ફરના ચક્રમાં મહત્વની ભૂમિકા ભજવે છે. એઝોટોબેક્ટર, ક્લોસ્ટ્રિડિયમ, અને રાઈઝોબિયમ મુખ્યત્વે નાઇટ્રોજન સ્થિરીકરણ કરે છે (B, C, D ખોટા).", "ref": "Std 12 - Chapter 10: સજીવો અને પર્યાવરણ (જૈવ ખાતર અને પોષક ચક્ર)", "ch": ""}, {"q": "નીચેના પૈકી કયું જૈવ ખાતર મૃદામાં પોટેશિયમના અવશોષણને વેગ આપે છે અને તેના દ્રાવ્યીકરણમાં મદદ કરે છે, પરંતુ તે નાઇટ્રોજન સ્થિરીકરણ સાથે સીધું સંબંધ ધરાવતું નથી?", "opts": ["રાઈઝોબિયમ (Rhizobium)", "બેસિલસ મેગેટેરિયમ (Bacillus megaterium)", "ફ્રાન્કિયા (Frankia)", "એઝોટોબેક્ટર (Azotobacter)"], "ans": 1, "exp": "બેસિલસ મેગેટેરિયમ (Bacillus megaterium) મૃદામાં પોટેશિયમના અવશોષણને વેગ આપે છે અને તેના દ્રાવ્યીકરણમાં મદદ કરે છે. રાઈઝોબિયમ અને ફ્રાન્કિયા નાઇટ્રોજન સ્થિરીકરણ સાથે સીધું સંબંધ ધરાવે છે, જ્યારે એઝોટોબેક્ટર પણ નાઇટ્રોજન સ્થિરીકરણમાં મદદ કરે છે. આમ, બેસિલસ મેગેટેરિયમ એ એકમાત્ર વિકલ્પ છે જે પોટેશિયમ સાથે સંબંધિત છે.", "ref": "Std 12 - Chapter 10: ખેતી અને પોષણ (કૃષિ વિજ્ઞાન)", "ch": ""}, {"q": "એક ખેડૂતે તેના ખેતરમાં જૈવ ખાતર તરીકે 'પિરિફોર્મોસ્પોરા ઇન્ડિકા'નો ઉપયોગ કર્યો. નીચેના પૈકી કયું તેનું મુખ્ય કાર્ય નથી?", "opts": ["ફોસ્ફરસનું દ્રાવ્યીકરણ", "નાઇટ્રોજન સ્થિરીકરણ", "મૃદામાં જીવાંત્રીક ક્રિયાઓને ઉત્તેજન", "છોડના મૂળ વિકાસને પ્રોત્સાહન"], "ans": 1, "exp": "'પિરિફોર્મોસ્પોરા ઇન્ડિકા' મુખ્યત્વે ફોસ્ફરસનું દ્રાવ્યીકરણ કરે છે, મૃદામાં જીવાંત્રીક ક્રિયાઓને ઉત્તેજન આપે છે અને છોડના મૂળ વિકાસને પ્રોત્સાહન આપે છે. પરંતુ તે નાઇટ્રોજન સ્થિરીકરણ સાથે સીધું સંબંધ ધરાવતું નથી.", "ref": "Std 12 - Chapter 10: ખેતી અને પોષણ (કૃષિ વિજ્ઞાન)", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લો: (1) 'સ્યુડોમોનાસ' જૈવ ખાતર તરીકે વાપરાતું બેક્ટેરિયા છે જે મૃદામાં સલ્ફરનું ઓક્સીડેશન કરે છે. (2) 'ટ્રાઇકોડર્મા' મૃદામાં રોગકારક સૂક્ષ્મજીવોને નિયંત્રિત કરે છે. (3) 'એઝોલા' નાઇટ્રોજન સ્થિરીકરણ કરતું જૈવ ખાતર છે. ઉપરના વિધાનો પૈકી કયા સત્ય છે?", "opts": ["ફક્ત (1) અને (2)", "ફક્ત (2) અને (3)", "ફક્ત (1) અને (3)", "(1), (2) અને (3)"], "ans": 1, "exp": "'સ્યુડોમોનાસ' સલ્ફરનું ઓક્સીડેશન કરતું નથી, પરંતુ 'ટ્રાઇકોડર્મા' રોગકારક સૂક્ષ્મજીવોને નિયંત્રિત કરે છે અને 'એઝોલા' નાઇટ્રોજન સ્થિરીકરણ કરે છે. આમ, ફક્ત (2) અને (3) સત્ય છે.", "ref": "Std 12 - Chapter 10: ખેતી અને પોષણ (કૃષિ વિજ્ઞાન)", "ch": ""}, {"q": "નીચેના પૈકી કયું જૈવ ખાતર મૃદામાં હ્યુમિક એસિડનું ઉત્પાદન કરે છે અને મૃદાની ઉર્જા ધરાવતી ક્ષમતાને સુધારે છે?", "opts": ["ટ્રાઇકોડર્મા (Trichoderma)", "ફોસ્ફોરસ બેક્ટેરિયા (Phosphorus bacteria)", "પિરિફોર્મોસ્પોરા ઇન્ડિકા (Piriformospora indica)", "એઝોટોબેક્ટર (Azotobacter)"], "ans": 2, "exp": "પિરિફોર્મોસ્પોરા ઇન્ડિકા (Piriformospora indica) મૃદામાં હ્યુમિક એસિડનું ઉત્પાદન કરે છે અને મૃદાની ઉર્જા ધરાવતી ક્ષમતાને સુધારે છે. ટ્રાઇકોડર્મા, ફોસ્ફોરસ બેક્ટેરિયા અને એઝોટોબેક્ટર આ કાર્ય સાથે સીધું સંબંધ ધરાવતા નથી.", "ref": "Std 12 - Chapter 10: ખેતી અને પોષણ (કૃષિ વિજ્ઞાન)", "ch": ""}, {"q": "એક ખેડૂતે તેના ડાંગરના ખેતરમાં જૈવ ખાતર તરીકે 'એનાબીના' (Anabaena)નો ઉપયોગ કર્યો. આ જૈવ ખાતરના ઉપયોગ બાદ નીચેના પૈકી કયું પરિણામ અપેક્ષિત નથી?", "opts": ["ડાંગરના છોડમાં નાઇટ્રોજનનું પ્રમાણ વધશે અને છોડની વૃદ્ધિ સારી થશે", "ખેતરની મૃદામાં ફોસ્ફરસનું દ્રાવ્યીકરણ થશે અને છોડને ફોસ્ફરસનું શોષણ સરળ બનશે", "મૃદામાં કાર્બનિક પદાર્થોનું પ્રમાણ વધશે અને મૃદાની ફળદ્રુપતા વધશે", "ડાંગરના છોડમાં પાણીનું શોષણ વધશે અને સૂકા પ્રતિરોધકતા વધશે"], "ans": 3, "exp": "'એનાબીના' એ સાયનોબેક્ટેરિયા છે જે નાઇટ્રોજન સ્થાપન (Nitrogen Fixation)નું કાર્ય કરે છે, તેથી ડાંગરના છોડમાં નાઇટ્રોજનનું પ્રમાણ વધશે અને છોડની વૃદ્ધિ સુધરશે (વિકલ્પ A સાચું છે). તે મૃદામાં કાર્બનિક પદાર્થોનું પ્રમાણ પણ વધારે છે, જે મૃદાની ફળદ્રુપતા વધારે છે (વિકલ્પ C સાચું છે). જોકે, 'એનાબીના' ફોસ્ફરસનું દ્રાવ્યીકરણ કરતું નથી, તેથી વિકલ્પ B ખોટું છે. વધુમાં, 'એનાબીના' છોડમાં પાણીના શોષણમાં સીધી રીતે મદદ કરતું નથી કે સૂકા પ્રતિરોધકતા વધારતું નથી, તેથી વિકલ્પ D અપેક્ષિત નથી.", "ref": "Std 12 - પ્રકરણ 10: ખેતીવિદ્યા અને જૈવ ખાતરો", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;

function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
