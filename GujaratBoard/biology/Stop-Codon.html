<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stop Codon</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Stop Codon</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Stop Codon</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "નીચેના પૈકી કયું વિધાન સ્ટોપ કોડોન માટે ખોટું છે?\n1. સ્ટોપ કોડોનને 'નોન્સેન્સ કોડોન' પણ કહે છે.\n2. સ્ટોપ કોડોન ટ્રાન્સફર RNA (tRNA) સાથે જોડાય છે.\n3. સ્ટોપ કોડોન પ્રોટીન સંશ્લેષણની પ્રક્રિયાને સમાપ્ત કરે છે.\n4. UAA, UAG અને UGA એ સ્ટોપ કોડોન છે.", "opts": ["ફક્ત 1 અને 2", "ફક્ત 2", "ફક્ત 2 અને 3", "ફક્ત 4"], "ans": 1, "exp": "સ્ટોપ કોડોન (UAA, UAG, UGA) પ્રોટીન સંશ્લેષણની પ્રક્રિયાને સમાપ્ત કરે છે અને તેને 'નોન્સેન્સ કોડોન' પણ કહે છે. પરંતુ સ્ટોપ કોડોન કોઈ પણ tRNA સાથે જોડાતા નથી, તેના બદલે રિલીઝ ફેક્ટર પ્રોટીન સાથે જોડાય છે. તેથી વિધાન 2 ખોટું છે. બાકીના વિધાનો સાચાં છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક પ્રયોગમાં, બેક્ટેરિયાના જનીનમાં એક બિંદુ પરિવર્તન થવાથી UAC કોડોન UAA બની જાય છે. આ પરિવર્તનથી શું અસર થશે?", "opts": ["પ્રોટીન સંશ્લેષણ સામાન્ય રીતે ચાલુ રહેશે.", "પ્રોટીનની લંબાઈ ઘટશે કારણ કે સ્ટોપ કોડોન વહેલું આવશે.", "પ્રોટીનમાં એક એમિનો એસિડ બદલાઈ જશે.", "પ્રોટીન સંશ્લેષણ અટકશે નહીં, પરંતુ ખોટું પ્રોટીન બનશે."], "ans": 1, "exp": "UAC એ ટાયરોસિન માટેનો કોડોન છે, જ્યારે UAA એ સ્ટોપ કોડોન છે. આ પરિવર્તનથી પ્રોટીન સંશ્લેષણ વહેલું સમાપ્ત થશે અને પ્રોટીનની લંબાઈ ઘટશે. આને 'નોન્સેન્સ મ્યુટેશન' કહે છે. બાકીના વિકલ્પો આ પરિસ્થિતિને યોગ્ય રીતે વર્ણવતા નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેના પૈકી કયું સ્ટોપ કોડોનનું વિશિષ્ટ લક્ષણ નથી?", "opts": ["તેના માટે કોઈ tRNA અણુ હાજર નથી.", "તેના માટે વિશિષ્ટ રિલીઝ ફેક્ટર પ્રોટીન જરૂરી છે.", "તે પ્રોટીનની શૃંખલામાં અંતિમ એમિનો એસિડ તરીકે કાર્ય કરે છે.", "તે mRNA પર ત્રણ ન્યુક્લિઓટાઇડના ક્રમ દ્વારા રજૂ થાય છે."], "ans": 2, "exp": "સ્ટોપ કોડોન પ્રોટીનની શૃંખલામાં અંતિમ એમિનો એસિડ તરીકે કાર્ય કરતા નથી. તેના બદલે, તે પ્રોટીન સંશ્લેષણની પ્રક્રિયાને સમાપ્ત કરવાનો સંકેત આપે છે. બાકીના વિકલ્પો સ્ટોપ કોડોનના સાચા લક્ષણો છે: તેના માટે tRNA હાજર નથી, રિલીઝ ફેક્ટર પ્રોટીન જરૂરી છે, અને તે ત્રણ ન્યુક્લિઓટાઇડના ક્રમ દ્વારા રજૂ થાય છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક વૈજ્ઞાનિકે જોયું કે એક વિશિષ્ટ જીવમાં સેલેનોસિસ્ટીન એમિનો એસિડ UGA કોડોન દ્વારા સંકેતિત થાય છે, જે સામાન્ય રીતે સ્ટોપ કોડોન છે. આ ઘટનાને શું કહેવાય છે?", "opts": ["કોડોન ડિજનરસી", "કોડોન રીડથ્રુ", "નોન્સેન્સ સપ્રેશન", "ફ્રેમશિફ્ટ મ્યુટેશન"], "ans": 1, "exp": "UGA કોડોન સામાન્ય રીતે સ્ટોપ કોડોન છે, પરંતુ કેટલાક જીવોમાં તે સેલેનોસિસ્ટીન એમિનો એસિડ માટે કોડ કરી શકે છે. આ ઘટનાને 'કોડોન રીડથ્રુ' કહે છે, જેમાં સ્ટોપ કોડોનને અવગણીને પ્રોટીન સંશ્લેષણ ચાલુ રહે છે. બાકીના વિકલ્પો આ ઘટનાને યોગ્ય રીતે વર્ણવતા નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન સ્ટોપ કોડોન અને રિલીઝ ફેક્ટર વચ્ચેના સંબંધ માટે સાચું નથી?", "opts": ["રિલીઝ ફેક્ટર સ્ટોપ કોડોનને ઓળખીને પ્રોટીન સંશ્લેષણ સમાપ્ત કરે છે.", "રિલીઝ ફેક્ટર tRNA જેવું જ કાર્ય કરે છે અને એમિનો એસિડ લાવે છે.", "રિલીઝ ફેક્ટરના કારણે રિબોઝોમના મોટા અને નાના એકમ છૂટા પડે છે.", "રિલીઝ ફેક્ટર પ્રોટીન છે, જે સ્ટોપ કોડોન સાથે જોડાય છે."], "ans": 1, "exp": "રિલીઝ ફેક્ટર tRNA જેવું કાર્ય કરતું નથી કે એમિનો એસિડ લાવતું નથી. તે એક પ્રોટીન છે જે સ્ટોપ કોડોનને ઓળખીને પ્રોટીન સંશ્લેષણ સમાપ્ત કરે છે અને રિબોઝોમના એકમોને છૂટા પાડે છે. બાકીના વિકલ્પો સાચાં છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક પ્રયોગશાળામાં, શોધાયું કે એક યુકેરિયોટિક કોષમાં UAG કોડોન દ્વારા કોઈ પ્રોટીન સંશ્લેષણ થતું નથી, પરંતુ તે જ કોડોન બેક્ટેરિયામાં પ્રોટીન સંશ્લેષણને અટકાવે છે. આ ઘટનાનું સૌથી યોગ્ય સ્પષ્ટીકરણ કયું છે?", "opts": ["યુકેરિયોટમાં UAG કોડોન સેલેનોસિસ્ટીન માટે કોડ કરે છે, જ્યારે બેક્ટેરિયામાં તે સ્ટોપ કોડોન તરીકે વર્તે છે.", "બેક્ટેરિયામાં રિલીઝ ફેક્ટરનો અભાવ હોવાથી UAG કોડોન પ્રોટીન સંશ્લેષણને અટકાવી શકતું નથી.", "યુકેરિયોટમાં mRNA પરિવહન દરમિયાન UAG કોડોનનું રૂપાંતર થાય છે, જ્યારે બેક્ટેરિયામાં એવું થતું નથી.", "યુકેરિયોટમાં UAG કોડોનને ઓળખવા માટેનો tRNA અભાવે છે, જ્યારે બેક્ટેરિયામાં તે ઉપલબ્ધ છે."], "ans": 0, "exp": "સેલેનોસિસ્ટીન એમિનો એસિડ માટે UGA કોડોન વાપરવામાં આવે છે, પરંતુ કેટલાક યુકેરિયોટ્સમાં UAG કોડોન પણ સેલેનોસિસ્ટીન માટે કોડ કરે છે, જ્યારે બેક્ટેરિયામાં UAG હંમેશા સ્ટોપ કોડોન તરીકે વર્તે છે. બાકીના વિકલ્પો અસત્ય છે: બેક્ટેરિયામાં રિલીઝ ફેક્ટર ઉપલબ્ધ હોય છે, mRNA પરિવહન દરમિયાન કોડોનનું રૂપાંતર થતું નથી, અને tRNAનો અભાવ સ્ટોપ કોડોનની ઓળખ સાથે સંબંધિત નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "નીચેના પૈકી કયું કોડોન, સ્ટોપ કોડોન તરીકે ઓળખાય છે, પરંતુ કેટલાક વિશિષ્ટ પરિસ્થિતિઓમાં એમિનો એસિડ માટે કોડ કરે છે?", "opts": ["UAA", "UAG", "UGA", "AUG"], "ans": 2, "exp": "UGA કોડોન સામાન્ય રીતે સ્ટોપ કોડોન તરીકે ઓળખાય છે, પરંતુ કેટલાક જીવોમાં (જેમ કે બેક્ટેરિયા અને કેટલાક યુકેરિયોટ્સ) તે સેલેનોસિસ્ટીન એમિનો એસિડ માટે કોડ કરે છે. UAA અને UAG હંમેશા સ્ટોપ કોડોન તરીકે વર્તે છે, જ્યારે AUG મેથિયોનિન માટે કોડ કરે છે અને પ્રારંભ કોડોન તરીકે પણ ઓળખાય છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "એક જીવમાં, UGA કોડોન સેલેનોસિસ્ટીન માટે કોડ કરે છે. આ ઘટનાને શું કહેવાય છે?", "opts": ["કોડોન પુનરાવર્તન", "કોડોન વિકલ્પ", "કોડોન પુનર્વ્યાખ્યાયન", "કોડોન વિસંગતતા"], "ans": 2, "exp": "UGA કોડોન સામાન્ય રીતે સ્ટોપ કોડોન તરીકે ઓળખાય છે, પરંતુ કેટલાક જીવોમાં તે સેલેનોસિસ્ટીન માટે કોડ કરે છે. આ ઘટનાને કોડોન પુનર્વ્યાખ્યાયન (Recoding) કહેવાય છે. બાકીના વિકલ્પો અસત્ય છે: કોડોન પુનરાવર્તન એ કોડોનની પુનરાવૃત્તિ છે, કોડોન વિકલ્પ એ કોડોનની જગ્યાએ બીજું કોડોન વાપરવું છે, અને કોડોન વિસંગતતા એ કોડોન અને એમિનો એસિડ વચ્ચેનો અસંગત સંબંધ છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "એક પ્રયોગમાં, એક જીવના જનીનમાં UGA કોડોનને UGG કોડોનમાં બદલવામાં આવ્યું. આ પરિવર્તનનો પ્રોટીન સંશ્લેષણ પર કયો અસર થશે?", "opts": ["પ્રોટીન સંશ્લેષણ અટકી જશે, કારણ કે UGG પણ સ્ટોપ કોડોન છે.", "પ્રોટીન સંશ્લેષણ ચાલુ રહેશે, કારણ કે UGG ટ્રિપ્ટોફેન માટે કોડ કરે છે.", "પ્રોટીન સંશ્લેષણ અટકી જશે, કારણ કે UGG કોડોન અસ્તિત્વમાં નથી.", "પ્રોટીન સંશ્લેષણની ગતિ વધશે, કારણ કે UGG કોડોન વધુ કાર્યક્ષમ છે."], "ans": 1, "exp": "UGA કોડોન સામાન્ય રીતે સ્ટોપ કોડોન તરીકે ઓળખાય છે, પરંતુ UGG કોડોન ટ્રિપ્ટોફેન એમિનો એસિડ માટે કોડ કરે છે. આથી, UGA ને UGG માં બદલવાથી પ્રોટીન સંશ્લેષણ ચાલુ રહેશે. બાકીના વિકલ્પો અસત્ય છે: UGG સ્ટોપ કોડોન નથી, UGG કોડોન અસ્તિત્વમાં છે, અને UGG કોડોનની કાર્યક્ષમતા પ્રોટીન સંશ્લેષણની ગતિ પર અસર કરતી નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "એક સંશોધકને એક વિશિષ્ટ યુકેરિયોટિક સજીવમાં જોવા મળ્યું કે, તેના મિટોકોન્ડ્રિયલ જનીનોમાં UGA કોડોન ટ્રિપ્ટોફેન એમિનો એસિડ માટે કોડ કરે છે, જ્યારે તે જ સજીવના કોષકેન્દ્રીય જનીનોમાં UGA સ્ટોપ કોડોન તરીકે કાર્ય કરે છે. આ ઘટનાને શું કહેવાય છે અને તેનું મુખ્ય કારણ શું છે?", "opts": ["કોડોન અસ્પષ્ટતા (Codon Ambiguity) - એક જ કોડોન એક કરતાં વધુ એમિનો એસિડ માટે કોડ કરી શકે છે", "કોડોન પુનઃનિર્ધારણ (Codon Reassignment) - જનીનિક કોડના સાર્વત્રિક નિયમમાં અપવાદરૂપ ફેરફાર", "જનીનિક કોડનું સાર્વત્રિકત્વ (Universality of Genetic Code) - બધા સજીવોમાં કોડોનનો અર્થ સમાન હોય છે", "કોડોન બાયસ (Codon Bias) - કેટલાક કોડોનનો ઉપયોગ અન્ય કરતાં વધુ પ્રમાણમાં થાય છે"], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B છે. આ ઘટનાને કોડોન પુનઃનિર્ધારણ (Codon Reassignment) કહેવાય છે, જેમાં સાર્વત્રિક જનીનિક કોડના નિયમોમાં અપવાદરૂપ ફેરફાર થાય છે. મિટોકોન્ડ્રિયામાં જનીનિક કોડના નિયમો કોષકેન્દ્રીય જનીનોથી અલગ હોઈ શકે છે, જેને કારણે UGA જેવા કોડોનનો અર્થ બદલાઈ જાય છે. વિકલ્પ A ખોટો છે કારણ કે એક જ કોડોન સામાન્ય રીતે એક જ એમિનો એસિડ માટે કોડ કરે છે. વિકલ્પ C ખોટો છે કારણ કે આ ઘટના જનીનિક કોડના સાર્વત્રિકત્વનો અપવાદ દર્શાવે છે. વિકલ્પ D ખોટો છે કારણ કે કોડોન બાયસ એ કોડોનના ઉપયોગની આવૃત્તિ સાથે સંબંધિત છે, તેના અર્થ સાથે નહીં.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ (મોલેક્યુલર આધાર)", "ch": ""}, {"q": "યુકેરિયોટિક કોષમાં, સ્ટોપ કોડોન UAA દ્વારા પ્રોટીન સંશ્લેષણ રોકાય છે. પરંતુ કેટલાક કિસ્સાઓમાં, આ કોડોન દ્વારા પ્રોટીન સંશ્લેષણ ચાલુ રહે છે. આ ઘટનાનું મુખ્ય કારણ કયું હોઈ શકે?", "opts": ["રિબોઝોમલ સબયુનિટની ગેરહાજરી", "રિલીઝ ફેક્ટર (RF) પ્રોટીનની મ્યુટેશન", "mRNAમાં ગૌણરૂપે સંરચના (secondary structure) બનવી", "tRNAની અછત"], "ans": 2, "exp": "સ્ટોપ કોડોન UAA દ્વારા પ્રોટીન સંશ્લેષણ રોકાય છે, પરંતુ mRNAમાં ગૌણરૂપે સંરચના (હેરપિન લૂપ જેવી) બનવાથી રિબોઝોમ આ કોડોનને ઓળખી શકતું નથી, જેથી પ્રોટીન સંશ્લેષણ ચાલુ રહે છે. A) રિબોઝોમલ સબયુનિટની ગેરહાજરીથી પ્રોટીન સંશ્લેષણ જ ચાલુ રહેતું નથી. B) રિલીઝ ફેક્ટરની મ્યુટેશનથી સ્ટોપ કોડોન ઓળખી શકાતું નથી, પરંતુ આ ઘટના સ્ટોપ કોડોન રીડ-થ્રૂ (read-through) નથી. D) tRNAની અછતથી પ્રોટીન સંશ્લેષણ ધીમું પડે, પરંતુ સ્ટોપ કોડોનને અવગણવું નહીં.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "સેલેનોસિસ્ટીન એમિનો એસિડ માટે કોડ કરતું UGA કોડોન સ્ટોપ કોડોન તરીકે ઓળખાતું નથી. આ ઘટનાને શું કહેવાય છે?", "opts": ["કોડોન ડિજનરેસી", "કોડોન રીઅસાઇનમેન્ટ", "કોડોન વોબલ", "કોડોન ઓવરલેપ"], "ans": 1, "exp": "UGA કોડોન સામાન્ય રીતે સ્ટોપ કોડોન છે, પરંતુ સેલેનોસિસ્ટીન માટે કોડ કરે ત્યારે તેને કોડોન રીઅસાઇનમેન્ટ (reassignment) કહેવાય છે. A) કોડોન ડિજનરેસી એટલે એક જ એમિનો એસિડ માટે બહુવિધ કોડોન હોવા. C) કોડોન વોબલ એટલે tRNA અને mRNA વચ્ચેના જોડાણમાં લવચીકતા. D) કોડોન ઓવરલેપ એટલે એક જ ન્યુક્લિયોટાઇડ બહુવિધ કોડોનમાં સમાવિષ્ટ થવું.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "મિટોકોન્ડ્રિયલ જનીનોમાં, UGA કોડોન સ્ટોપ કોડોન તરીકે કામ કરતું નથી, પરંતુ તે ટ્રિપ્ટોફેન માટે કોડ કરે છે. આ ઘટનાનું કારણ કયું છે?", "opts": ["મિટોકોન્ડ્રિયલ રિબોઝોમની સંરચના અલગ હોવી", "મિટોકોન્ડ્રિયલ DNAમાં થાયલીન ન્યુક્લિયોટાઇડની ગેરહાજરી", "મિટોકોન્ડ્રિયલ tRNAની અલગ સંરચના", "મિટોકોન્ડ્રિયલ mRNAની અલગ સંરચના"], "ans": 0, "exp": "મિટોકોન્ડ્રિયલ રિબોઝોમની સંરચના સાયટોપ્લાઝમિક રિબોઝોમ કરતાં અલગ હોવાથી, UGA કોડોનને ટ્રિપ્ટોફેન માટે કોડ કરવા માટે ઓળખી શકાય છે. B) થાયલીન ન્યુક્લિયોટાઇડની ગેરહાજરીથી કોડોન બદલાતું નથી. C) અને D) મિટોકોન્ડ્રિયલ tRNA અને mRNAની સંરચના અલગ હોવા છતાં, રિબોઝોમની સંરચના મુખ્ય કારણ છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "એક પ્રયોગમાં, બેક્ટેરિયાના જનીનમાં UAG કોડોનને UGG કોડોનમાં બદલવામાં આવ્યું. આ પરિવર્તનથી પ્રોટીનની લંબાઈ પર શું અસર થશે?", "opts": ["પ્રોટીનની લંબાઈ ઘટશે", "પ્રોટીનની લંબાઈ વધશે", "પ્રોટીનની લંબાઈ અચળ રહેશે", "પ્રોટીન બનવું બંધ થશે"], "ans": 2, "exp": "UAG સ્ટોપ કોડોન છે, જ્યારે UGG ટ્રિપ્ટોફેન માટે કોડ કરે છે. આ પરિવર્તનથી સ્ટોપ કોડોન દૂર થાય છે અને તેની જગ્યાએ એમિનો એસિડ આવે છે, પરંતુ પ્રોટીનની લંબાઈ અચળ રહે છે કારણ કે એક સ્ટોપ કોડોનને એક એમિનો એસિડ કોડ કરતું કોડોનમાં બદલવામાં આવ્યું છે. A), B), અને D) વિકલ્પો આ પરિસ્થિતિમાં લાગુ પડતા નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "એક સંશોધકે માનવ કોષના કોષકેન્દ્રીય જનીનોમાંથી મેળવેલા mRNA ના અનુક્રમમાં UGA કોડોન શોધ્યું. આ કોડોન નીચેના પૈકી કયા સંજોગોમાં સ્ટોપ કોડોન તરીકે કાર્ય ન કરી શકે?", "opts": ["જ્યારે mRNA ના 3' અંતે SECIS તત્વ હાજર હોય અને સેલેનોસિસ્ટીન-ટ્રાન્સફર RNA ઉપલબ્ધ હોય", "જ્યારે રિબોઝોમમાં રિલીઝ ફેક્ટર eRF1 ની સાંદ્રતા ખૂબ જ ઓછી હોય", "જ્યારે mRNA ના 5' અંતે 7-મિથાઇલગુઆનોસિન કેપ ન હોય", "જ્યારે પોલિપેપ્ટાઇડ શૃંખલામાં પહેલેથી જ 50 કરતાં વધુ એમિનો એસિડ જોડાઈ ગયા હોય"], "ans": 0, "exp": "સાચો જવાબ વિકલ્પ A છે. માનવ કોષોમાં UGA કોડોન સેલેનોસિસ્ટીન એમિનો એસિડ માટે કોડ કરી શકે છે, પરંતુ આ માટે mRNA ના 3' અસંક્રમિત પ્રદેશમાં SECIS (Selenocysteine Insertion Sequence) તત્વ હાજર હોવું જરૂરી છે. આ તત્વ સેલેનોસિસ્ટીન-ટ્રાન્સફર RNA ને ઓળખવામાં મદદ કરે છે, જે UGA કોડોનને સ્ટોપ કોડોન તરીકે નહીં, પરંતુ સેલેનોસિસ્ટીન માટે કોડ તરીકે વાંચે છે. વિકલ્પ B ખોટો છે કારણ કે રિલીઝ ફેક્ટરની ઓછી સાંદ્રતા UGA ને સ્ટોપ કોડોન તરીકે ઓળખવામાં અવરોધ નથી ઉત્પન્ન કરતી. વિકલ્પ C ખોટો છે કારણ કે 5' કેપની ગેરહાજરી પ્રોટીન સંશ્લેષણની શરૂઆતને અસર કરે છે, પરંતુ સ્ટોપ કોડોનની ઓળખને નહીં. વિકલ્પ D ખોટો છે કારણ કે પોલિપેપ્ટાઇડ શૃંખલાની લંબાઈ સ્ટોપ કોડોનની ઓળખને અસર કરતી નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ભિન્નતાના આણ્વિક આધાર", "ch": ""}, {"q": "એક સંશોધકે માનવ કોષના મિટોકોન્ડ્રિયામાંથી અલગ કરેલા mRNA અનુક્રમમાં UGA કોડોન શોધ્યું. આ કોડોનનું કાર્ય શું હશે?", "opts": ["પ્રોટીન સંશ્લેષણનો અંત દર્શાવે છે", "સેલેનોસિસ્ટીન એમિનો એસિડ માટે કોડ કરે છે", "ટ્રિપ્ટોફેન એમિનો એસિડ માટે કોડ કરે છે", "પ્રોટીન સંશ્લેષણમાં કોઈ ફેરફાર થતો નથી"], "ans": 2, "exp": "માનવ મિટોકોન્ડ્રિયલ જનીનોમાં UGA કોડોન ટ્રિપ્ટોફેન માટે કોડ કરે છે, જે યુનિવર્સલ જનીન કોડથી અલગ છે. સામાન્ય રીતે UGA સ્ટોપ કોડોન તરીકે ઓળખાય છે, પરંતુ મિટોકોન્ડ્રિયામાં તેનું કાર્ય બદલાય છે. સેલેનોસિસ્ટીન માટે કોડિંગ કેટલાક બેક્ટેરિયા અને યુકેરિયોટ્સમાં જોવા મળે છે, પરંતુ પરિવર્તન અથવા tRNA નું પરિવર્તન આ પ્રક્રિયામાં સીધી રીતે સામેલ નથી. mRNA નું ફોલ્ડિંગ પણ આ પ્રક્રિયામાં મુખ્ય ભૂમિકા ભજવતું નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક પ્રયોગમાં, એક યુકેરિયોટિક કોષમાં UAG કોડોનને UAA કોડોનમાં બદલવામાં આવ્યું. આ પરિવર્તનથી નીચેના પૈકી કયું પરિણામ સંભવિત નથી?", "opts": ["પ્રોટીન સંશ્લેષણ વહેલું સમાપ્ત થશે", "પ્રોટીનનું કાર્ય બદલાઈ જશે", "પ્રોટીન સંશ્લેષણ પર કોઈ અસર થશે નહીં", "પ્રોટીનની લંબાઈમાં ફેરફાર થશે"], "ans": 1, "exp": "UAG અને UAA બંને સ્ટોપ કોડોન છે, તેથી એકને બીજામાં બદલવાથી પ્રોટીનનું કાર્ય બદલાશે નહીં કારણ કે એમિનો એસિડ અનુક્રમમાં કોઈ ફેરફાર થતો નથી. પ્રોટીન સંશ્લેષણ વહેલું સમાપ્ત થઈ શકે છે અથવા ન પણ થઈ શકે, પરંતુ પ્રોટીનની લંબાઈમાં ફેરફાર થઈ શકે છે. જો કે, પ્રોટીનનું કાર્ય બદલાવાની શક્યતા નથી કારણ કે સ્ટોપ કોડોન માત્ર સંશ્લેષણનો અંત દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
