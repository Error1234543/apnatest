<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Genome ના મુખ્ય મુદ્દા</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Human Genome ના મુખ્ય મુદ્દા</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Human Genome ના મુખ્ય મુદ્દા</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "માનવ જીનોમ પ્રોજેક્ટ (HGP) દરમિયાન મળેલા નીચેના પૈકી કયા તથ્યને 'સરપ્રાઇઝ ઓફ ધ સેન્ચ્યુરી' તરીકે ઓળખવામાં આવે છે?", "opts": ["માનવ જીનોમમાં લગભગ ૩.૨ અબજ બેઇઝ જોડીઓ હોવાનું જણાયું", "માનવમાં માત્ર ૨૦,૦૦૦-૨૫,૦૦૦ જનીનો જ હોવાનું જાણવા મળ્યું", "માનવ જીનોમનો ૯૮% ભાગ 'જંક DNA' તરીકે ઓળખાય છે", "માનવ અને ચિમ્પાન્ઝીના જીનોમ વચ્ચે ૯૮% સમાનતા જોવા મળી"], "ans": 1, "exp": "માનવ જીનોમ પ્રોજેક્ટ દરમિયાન જાણવા મળ્યું કે માનવમાં માત્ર ૨૦,૦૦૦-૨૫,૦૦૦ જનીનો જ છે, જે અપેક્ષા કરતાં ઘણું ઓછું હતું. આ તથ્યને 'સરપ્રાઇઝ ઓફ ધ સેન્ચ્યુરી' કહેવામાં આવે છે. વિકલ્પ A સાચું છે પરંતુ તેને સરપ્રાઇઝ તરીકે ઓળખવામાં આવતું નથી. વિકલ્પ C અને D પણ સાચા છે પરંતુ તે મુખ્ય આશ્ચર્ય નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "માનવ જીનોમમાં હાજર 'સ્યુડોજીન' વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["સ્યુડોજીન એ કાર્યરત જનીનોના નિષ્ક્રિય સ્વરૂપ છે", "સ્યુડોજીનમાં મ્યુટેશનના કારણે પ્રોટીનનું ઉત્પાદન થતું નથી", "સ્યુડોજીન માનવ ઉત્ક્રાંતિના અભ્યાસમાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે", "સ્યુડોજીન માત્ર પ્રોકેરિયોટ્સમાં જોવા મળે છે"], "ans": 3, "exp": "સ્યુડોજીન માત્ર યુકેરિયોટ્સમાં જોવા મળે છે, પ્રોકેરિયોટ્સમાં નહીં. તેઓ કાર્યરત જનીનોના નિષ્ક્રિય સ્વરૂપ છે અને મ્યુટેશનના કારણે પ્રોટીન ઉત્પાદન કરતા નથી. તેઓ ઉત્ક્રાંતિના અભ્યાસમાં મહત્વપૂર્ણ છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "માનવ જીનોમમાં હાજર 'રિપીટ સિક્વન્સ' વિશે નીચેનામાંથી કયું વિધાન યોગ્ય નથી?", "opts": ["રિપીટ સિક્વન્સ જનીન નિયમનમાં ભાગ ભજવે છે", "ટેલોમેરિક રિપીટ્સ કોષ વિભાજનમાં મહત્વપૂર્ણ છે", "સેન્ટ્રોમેરિક રિપીટ્સ વર્ણસૂત્રના વિભાજનમાં મદદ કરે છે", "રિપીટ સિક્વન્સ માત્ર પ્રોટીન કોડિંગ વિસ્તારમાં જોવા મળે છે"], "ans": 3, "exp": "રિપીટ સિક્વન્સ પ્રોટીન કોડિંગ વિસ્તાર સિવાયના વિસ્તારોમાં પણ જોવા મળે છે. તેઓ જનીન નિયમન, ટેલોમેરિક અને સેન્ટ્રોમેરિક કાર્યોમાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "માનવ જીનોમ પ્રોજેક્ટના સંદર્ભમાં 'SNP' (સિંગલ ન્યુક્લિયોટાઇડ પોલીમોર્ફિઝમ) વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["SNP એ DNA સિક્વન્સમાં એક જ ન્યુક્લિયોટાઇડમાં થતો ફેરફાર છે", "SNP માનવ વસ્તીમાં આનુવંશિક વિવિધતા માટે જવાબદાર છે", "SNP માત્ર પ્રોટીન કોડિંગ વિસ્તારમાં જ જોવા મળે છે", "SNPનો ઉપયોગ રોગોના જોખમનું અનુમાન કરવા માટે થાય છે"], "ans": 2, "exp": "SNP માત્ર પ્રોટીન કોડિંગ વિસ્તારમાં જ નહીં, પરંતુ સમગ્ર જીનોમમાં જોવા મળે છે. તે DNA સિક્વન્સમાં એક ન્યુક્લિયોટાઇડનો ફેરફાર છે અને આનુવંશિક વિવિધતા તેમજ રોગોના જોખમના અનુમાનમાં મહત્વપૂર્ણ છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "માનવ જીનોમમાં હાજર 'ટ્રાન્સપોઝેબલ એલિમેન્ટ્સ' (Transposable Elements) વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["ટ્રાન્સપોઝેબલ એલિમેન્ટ્સ DNAના એક ભાગમાંથી બીજા ભાગમાં ખસી શકે છે", "તેઓ 'જંપિંગ જીન્સ' તરીકે પણ ઓળખાય છે", "ટ્રાન્સપોઝેબલ એલિમેન્ટ્સ માત્ર પ્રોકેરિયોટ્સમાં જોવા મળે છે", "તેઓ જનીન અભિવ્યક્તિ અને ઉત્ક્રાંતિમાં ભૂમિકા ભજવે છે"], "ans": 2, "exp": "ટ્રાન્સપોઝેબલ એલિમેન્ટ્સ યુકેરિયોટ્સ અને પ્રોકેરિયોટ્સ બંનેમાં જોવા મળે છે. તેઓ DNAના એક ભાગમાંથી બીજા ભાગમાં ખસી શકે છે અને 'જંપિંગ જીન્સ' તરીકે ઓળખાય છે. તેઓ જનીન અભિવ્યક્તિ અને ઉત્ક્રાંતિમાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "માનવ જીનોમમાં 'ઇન્ટ્રોન' અને 'એક્ઝોન' વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["ઇન્ટ્રોન મુખ્યત્વે mRNA પ્રોસેસિંગ દરમિયાન કાપી નાખવામાં આવે છે.", "એક્ઝોન પ્રોટીન સંશ્લેષણમાં સીધો ભાગ ભજવે છે.", "ઇન્ટ્રોનમાં ક્યારેક રેગ્યુલેટરી સિક્વન્સ હાજર હોય છે જે જીન એક્સપ્રેશનને નિયંત્રિત કરે છે.", "એક્ઝોન માનવ જીનોમના કુલ DNAના 95%થી વધુ ભાગ ધરાવે છે."], "ans": 3, "exp": "વિકલ્પ D ખોટો છે કારણ કે માનવ જીનોમમાં ઇન્ટ્રોન (નન-કોડિંગ ભાગ) કુલ DNAના લગભગ 95-98% ભાગ ધરાવે છે, જ્યારે એક્ઝોન (કોડિંગ ભાગ) માત્ર 1-2% જેટલો જ ભાગ ધરાવે છે. વિકલ્પ A સાચો છે કારણ કે ઇન્ટ્રોન mRNA પ્રોસેસિંગ દરમિયાન સ્પ્લાઇસિંગ દ્વારા કાપી નાખવામાં આવે છે. વિકલ્પ B સાચો છે કારણ કે એક્ઝોન mRNAમાં રહી જાય છે અને પ્રોટીન સંશ્લેષણમાં ભાગ લે છે. વિકલ્પ C સાચો છે કારણ કે કેટલાક ઇન્ટ્રોનમાં રેગ્યુલેટરી એલિમેન્ટ્સ હોય છે જે જીન એક્સપ્રેશનને અસર કરે છે.", "ref": "Std 12 - અધ્યાય 6: વંશાભિગમ અને જીનોમિક્સ", "ch": ""}, {"q": "માનવ જીનોમ પ્રોજેક્ટના સંશોધન અનુસાર, નીચેનામાંથી કયું જીન પરિવાર માનવમાં સૌથી વધુ પ્રમાણમાં જોવા મળે છે?", "opts": ["ઓલ્ફેક્ટરી રિસેપ્ટર જીન પરિવાર", "હીમોગ્લોબિન જીન પરિવાર", "ઇમ્યુનોગ્લોબ્યુલિન જીન પરિવાર", "સાયટોક્રોમ P450 જીન પરિવાર"], "ans": 0, "exp": "વિકલ્પ A સાચો છે કારણ કે માનવ જીનોમમાં ઓલ્ફેક્ટરી રિસેપ્ટર (ગંધ ગ્રહણ કરનારા) જીન પરિવાર સૌથી મોટો છે, જેમાં લગભગ 800થી વધુ જીન હાજર છે. વિકલ્પ B ખોટો છે કારણ કે હીમોગ્લોબિન જીન પરિવારમાં માત્ર થોડા જીન હોય છે. વિકલ્પ C ખોટો છે કારણ કે ઇમ્યુનોગ્લોબ્યુલિન જીન પરિવાર પણ ઓલ્ફેક્ટરી રિસેપ્ટર કરતાં ઓછા જીન ધરાવે છે. વિકલ્પ D ખોટો છે કારણ કે સાયટોક્રોમ P450 જીન પરિવાર પણ ઓલ્ફેક્ટરી રિસેપ્ટર કરતાં ઓછા જીન ધરાવે છે.", "ref": "Std 12 - અધ્યાય 6: વંશાભિગમ અને જીનોમિક્સ", "ch": ""}, {"q": "માનવ જીનોમમાં 'ટેલોમિયર' વિશે નીચેનામાંથી કયું વિધાન યોગ્ય નથી?", "opts": ["ટેલોમિયર વર્ણસૂત્રના અંતે સ્થિત હોય છે અને તેની લંબાઈ ઉંમર સાથે ઘટે છે.", "ટેલોમિયરમાં 'TTAGGG' ની પુનરાવર્તિત સિક્વન્સ હાજર હોય છે.", "ટેલોમરેઝ ઉત્સેચક ટેલોમિયરની લંબાઈને જાળવી રાખવામાં મદદ કરે છે.", "ટેલોમિયર કોષવિભાજન દરમિયાન વર્ણસૂત્રની અસ્થિરતા વધારે છે."], "ans": 3, "exp": "વિકલ્પ D ખોટો છે કારણ કે ટેલોમિયર કોષવિભાજન દરમિયાન વર્ણસૂત્રની અસ્થિરતા ઘટાડે છે અને વર્ણસૂત્રના અંતને સુરક્ષિત રાખે છે. વિકલ્પ A સાચો છે કારણ કે ટેલોમિયર ઉંમર સાથે ઘટે છે અને કોષની ઉંમર સાથે સંબંધિત છે. વિકલ્પ B સાચો છે કારણ કે માનવ ટેલોમિયરમાં 'TTAGGG' ની પુનરાવર્તિત સિક્વન્સ હાજર હોય છે. વિકલ્પ C સાચો છે કારણ કે ટેલોમરેઝ ઉત્સેચક ટેલોમિયરની લંબાઈને જાળવી રાખે છે, ખાસ કરીને કૅન્સર કોષ અને જર્મલાઇન કોષમાં.", "ref": "Std 12 - અધ્યાય 5: વર્ણસૂત્ર અને વર્ણસૂત્રીય વિકૃતિઓ", "ch": ""}, {"q": "માનવ જીનોમ પ્રોજેક્ટના અભ્યાસ અનુસાર, નીચેનામાંથી કયું વિધાન 'જીન ડેસર્ટ' (Gene Desert) વિશે સાચું છે?", "opts": ["જીન ડેસર્ટમાં કોઈપણ જીન હાજર નથી.", "જીન ડેસર્ટમાં જીનની ઘનતા ખૂબ ઓછી હોય છે અને મુખ્યત્વે નન-કોડિંગ DNA હાજર હોય છે.", "જીન ડેસર્ટ માત્ર X વર્ણસૂત્રમાં જોવા મળે છે.", "જીન ડેસર્ટમાં માત્ર ટ્રાન્સપોઝેબલ એલિમેન્ટ્સ જ હાજર હોય છે."], "ans": 1, "exp": "વિકલ્પ B સાચો છે કારણ કે જીન ડેસર્ટ એ વર્ણસૂત્રના એવા ભાગ છે જ્યાં જીનની ઘનતા ખૂબ ઓછી હોય છે અને મુખ્યત્વે નન-કોડિંગ DNA, રિપીટ સિક્વન્સ અથવા રેગ્યુલેટરી એલિમેન્ટ્સ હાજર હોય છે. વિકલ્પ A ખોટો છે કારણ કે જીન ડેસર્ટમાં કેટલાક જીન હાજર હોઈ શકે છે, પરંતુ તેમની ઘનતા ખૂબ ઓછી હોય છે. વિકલ્પ C ખોટો છે કારણ કે જીન ડેસર્ટ કોઈપણ વર્ણસૂત્રમાં જોવા મળી શકે છે, માત્ર X વર્ણસૂત્રમાં જ નહીં. વિકલ્પ D ખોટો છે કારણ કે જીન ડેસર્ટમાં ટ્રાન્સપોઝેબલ એલિમેન્ટ્સ સિવાય અન્ય નન-કોડિંગ સિક્વન્સ પણ હાજર હોઈ શકે છે.", "ref": "Std 12 - અધ્યાય 6: વંશાભિગમ અને જીનોમિક્સ", "ch": ""}, {"q": "માનવ જીનોમમાં 'અલ્ટ્રા-કન્ઝર્વડ એલિમેન્ટ્સ' (Ultraconserved Elements) વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["અલ્ટ્રા-કન્ઝર્વડ એલિમેન્ટ્સ 100% સરખી સિક્વન્સ સાથે માનવ, માકડ અને ઇષ્ટતુત (ઝેબ્રાફિશ) જેવા પ્રાણીઓમાં જોવા મળે છે.", "અલ્ટ્રા-કન્ઝર્વડ એલિમેન્ટ્સ મુખ્યત્વે પ્રોટીન-કોડિંગ જીનમાં જોવા મળે છે.", "અલ્ટ્રા-કન્ઝર્વડ એલિમેન્ટ્સ જીન રેગ્યુલેશન અને RNA પ્રોસેસિંગમાં મહત્વની ભૂમિકા ભજવે છે.", "અલ્ટ્રા-કન્ઝર્વડ એલિમેન્ટ્સમાં મ્યુટેશન થવું અત્યંત દુર્લભ હોય છે."], "ans": 1, "exp": "વિકલ્પ B ખોટો છે કારણ કે અલ્ટ્રા-કન્ઝર્વડ એલિમેન્ટ્સ મુખ્યત્વે નન-કોડિંગ પ્રદેશોમાં જોવા મળે છે અને તે પ્રોટીન-કોડિંગ જીનમાં ઓછા પ્રમાણમાં હાજર હોય છે. વિકલ્પ A સાચો છે કારણ કે અલ્ટ્રા-કન્ઝર્વડ એલિમેન્ટ્સ 100% સરખી સિક્વન્સ સાથે વિવિધ પ્રાણીઓમાં કન્ઝર્વ થયેલા હોય છે. વિકલ્પ C સાચો છે કારણ કે આ એલિમેન્ટ્સ જીન રેગ્યુલેશન, RNA સ્પ્લાઇસિંગ અને અન્ય મહત્વના કોષીય પ્રક્રિયાઓમાં ભાગ લે છે. વિકલ્પ D સાચો છે કારણ કે અલ્ટ્રા-કન્ઝર્વડ એલિમેન્ટ્સમાં મ્યુટેશન થવું અત્યંત દુર્લભ હોય છે, જે તેમની મહત્વની ભૂમિકાને દર્શાવે છે.", "ref": "Std 12 - અધ્યાય 6: વંશાભિગમ અને જીનોમિક્સ", "ch": ""}, {"q": "માનવ જીનોમમાં હાજર 'માઇક્રોસેટેલાઇટ' (Microsatellite) વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["માઇક્રોસેટેલાઇટ્સ 1 થી 6 બેઝ પેરના ટૂંકા પુનરાવર્તિત ક્રમો છે", "તેઓ મુખ્યત્વે જનીનોમાં એક્ઝોન પ્રદેશમાં જોવા મળે છે", "આ ક્રમોનો ઉપયોગ DNA ફિંગરપ્રિન્ટિંગ અને ફોરેન્સિક વિજ્ઞાનમાં થાય છે", "તેઓ જનીનિક અસ્થિરતા અને કેટલાક રોગો સાથે સંકળાયેલા હોઈ શકે છે"], "ans": 1, "exp": "માઇક્રોસેટેલાઇટ્સ મુખ્યત્વે જનીનોમાં ઇન્ટ્રોન પ્રદેશ અથવા જનીન વચ્ચેના પ્રદેશોમાં જોવા મળે છે, એક્ઝોન પ્રદેશમાં નહીં. એક્ઝોન પ્રદેશમાં હાજર હોવાનું વિધાન ખોટું છે. બાકીના વિકલ્પો માઇક્રોસેટેલાઇટ્સના ગુણધર્મો અને ઉપયોગોને સાચી રીતે વર્ણવે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "માનવ જીનોમમાં હાજર 'સ્ટ્રક્ચરલ વેરિયન્ટ્સ' (Structural Variants) વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["સ્ટ્રક્ચરલ વેરિયન્ટ્સમાં ડિલીશન, ડુપ્લિકેશન, ઇન્વર્ઝન અને ટ્રાન્સલોકેશનનો સમાવેશ થાય છે", "તેઓ સામાન્ય રીતે 50 બેઝ પેરથી વધુ લંબાઈના હોય છે", "સ્ટ્રક્ચરલ વેરિયન્ટ્સ માત્ર વર્ણસૂત્રોના ટેલોમિયર પ્રદેશમાં જોવા મળે છે", "આ વેરિયન્ટ્સ જનીનિક અભિવ્યક્તિ અને રોગોના વિકાસમાં ફેરફાર લાવી શકે છે"], "ans": 2, "exp": "સ્ટ્રક્ચરલ વેરિયન્ટ્સ વર્ણસૂત્રોના કોઈપણ પ્રદેશમાં જોવા મળી શકે છે, માત્ર ટેલોમિયર પ્રદેશમાં નહીં. આથી વિકલ્પ C ખોટું છે. બાકીના વિકલ્પો સ્ટ્રક્ચરલ વેરિયન્ટ્સના પ્રકારો અને અસરોને સાચી રીતે વર્ણવે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "માનવ જીનોમ પ્રોજેક્ટના સંશોધન અનુસાર, નીચેનામાંથી કયું વિધાન 'જનીન ફેમિલી' (Gene Family) માટે યોગ્ય નથી?", "opts": ["જનીન ફેમિલી એ સમાન ક્રમ ધરાવતા જનીનોનો સમૂહ છે જે એક જ પૂર્વજ જનીનમાંથી ઉતરી આવ્યા છે", "હિમોગ્લોબિન જનીન ફેમિલી માનવમાં સૌથી મોટી જનીન ફેમિલી છે", "જનીન ફેમિલીના સભ્યો સમાન અથવા સંબંધિત કાર્યો ધરાવતા હોઈ શકે છે", "જનીન ડુપ્લિકેશન અને ડાઇવર્જન્સ જનીન ફેમિલીના ઉદ્ભવ માટે જવાબદાર છે"], "ans": 1, "exp": "હિમોગ્લોબિન જનીન ફેમિલી માનવમાં સૌથી મોટી જનીન ફેમિલી નથી. સૌથી મોટી જનીન ફેમિલી 'ઓલ્ફેક્ટરી રીસેપ્ટર જનીન ફેમિલી' છે. આથી વિકલ્પ B ખોટું છે. બાકીના વિકલ્પો જનીન ફેમિલીના લક્ષણો અને ઉત્પત્તિને સાચી રીતે વર્ણવે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "માનવ જીનોમમાં હાજર 'લોન્ગ નોન-કોડિંગ RNA' (Long Non-Coding RNA - lncRNA) વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["lncRNA 200 બેઝ પેરથી વધુ લંબાઈ ધરાવતા RNA અણુઓ છે જે પ્રોટીનમાં અનુવાદિત થતા નથી", "તેઓ જનીન અભિવ્યક્તિના નિયમનમાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે", "lncRNA માત્ર કોષકેન્દ્રમાં જ જોવા મળે છે અને કોષરસમાં હોતા નથી", "કેટલાક lncRNA રોગો જેમ કે કેન્સર અને ન્યુરોલોજિકલ ડિસઓર્ડર સાથે સંકળાયેલા છે"], "ans": 2, "exp": "lncRNA કોષકેન્દ્ર અને કોષરસ બંને જગ્યાએ જોવા મળે છે, માત્ર કોષકેન્દ્રમાં નહીં. આથી વિકલ્પ C ખોટું છે. બાકીના વિકલ્પો lncRNA ના લક્ષણો અને કાર્યોને સાચી રીતે વર્ણવે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "માનવ જીનોમના સંશોધન દરમિયાન જાણવા મળેલ છે કે, 'અલ્યુમિનિયમ રિપીટ સિક્વન્સ' (Alu Repeats) વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["અલ્યુમિનિયમ રિપીટ સિક્વન્સ માનવ જીનોમના લગભગ 10% ભાગને આચ્છાદિત કરે છે અને તે ટ્રાન્સપોઝેબલ એલિમેન્ટ્સના SINE (Short Interspersed Nuclear Elements) કુટુંબના છે.", "અલ્યુમિનિયમ રિપીટ સિક્વન્સ માત્ર ઇન્ટ્રોનિક પ્રદેશોમાં જ જોવા મળે છે અને તે જીન એક્સપ્રેશનને પ્રભાવિત કરતું નથી.", "અલ્યુમિનિયમ રિપીટ સિક્વન્સ માનવ જીનોમમાં સૌથી વધુ પ્રમાણમાં હાજર રહેલી રિપીટ સિક્વન્સ છે અને તે લગભગ 300 bp લાંબી હોય છે.", "અલ્યુમિનિયમ રિપીટ સિક્વન્સ માત્ર એક્ઝોનિક પ્રદેશોમાં જોવા મળે છે અને તે પ્રોટીન કોડિંગમાં સીધો ભાગ લે છે."], "ans": 0, "exp": "અલ્યુમિનિયમ રિપીટ સિક્વન્સ (Alu Repeats) માનવ જીનોમના લગભગ 10% ભાગને આચ્છાદિત કરે છે અને તે ટ્રાન્સપોઝેબલ એલિમેન્ટ્સના SINE (Short Interspersed Nuclear Elements) કુટુંબના છે. તે ઇન્ટ્રોનિક અને ઇન્ટરજીનિક પ્રદેશોમાં જોવા મળે છે અને જીન એક્સપ્રેશનને પ્રભાવિત કરે છે. વિકલ્પ B ખોટો છે કારણ કે અલ્યુમિનિયમ રિપીટ સિક્વન્સ ઇન્ટ્રોનિક અને ઇન્ટરજીનિક પ્રદેશોમાં જોવા મળે છે અને જીન એક્સપ્રેશનને પ્રભાવિત કરે છે. વિકલ્પ C ખોટો છે કારણ કે અલ્યુમિનિયમ રિપીટ સિક્વન્સ લગભગ 300 bp લાંબી હોય છે પરંતુ તે માનવ જીનોમમાં સૌથી વધુ પ્રમાણમાં હાજર રહેલી રિપીટ સિક્વન્સ નથી (LINE-1 સિક્વન્સ વધુ પ્રમાણમાં હોય છે). વિકલ્પ D ખોટો છે કારણ કે અલ્યુમિનિયમ રિપીટ સિક્વન્સ એક્ઝોનિક પ્રદેશોમાં જોવા મળતી નથી અને તે પ્રોટીન કોડિંગમાં સીધો ભાગ લેતી નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન અને માનવ જીનોમ પ્રોજેક્ટ", "ch": ""}, {"q": "માનવ જીનોમમાં 'હૉટસ્પૉટ' (Hotspot) વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["હૉટસ્પૉટ એ જીનોમના એવા પ્રદેશો છે જ્યાં મ્યુટેશનનો દર સરેરાશ કરતાં વધુ હોય છે.", "હૉટસ્પૉટમાં સ્થિત જીનોમાં ઉત્ક્રાંતિ દરમિયાન ત્વરિત ફેરફારો થાય છે.", "હૉટસ્પૉટ માત્ર એક્ઝોન પ્રદેશોમાં જ જોવા મળે છે, ઇન્ટ્રોનમાં નહીં.", "હૉટસ્પૉટના અભ્યાસથી રોગોના જનીનિક આધારને સમજવામાં મદદ મળે છે."], "ans": 2, "exp": "હૉટસ્પૉટ એ જીનોમના એવા પ્રદેશો છે જ્યાં મ્યુટેશનનો દર સરેરાશ કરતાં વધુ હોય છે (A સાચું). હૉટસ્પૉટમાં સ્થિત જીનોમાં ઉત્ક્રાંતિ દરમિયાન ત્વરિત ફેરફારો થાય છે (B સાચું). હૉટસ્પૉટ એક્ઝોન અને ઇન્ટ્રોન બંનેમાં જોવા મળી શકે છે, એટલે C ખોટું છે. હૉટસ્પૉટના અભ્યાસથી રોગોના જનીનિક આધારને સમજવામાં મદદ મળે છે (D સાચું).", "ref": "Std 12 - અધ્યાય 6: જનીન અને જીનોમ", "ch": ""}, {"q": "માનવ જીનોમમાં 'કૉપી નંબર વેરિયેશન' (Copy Number Variation - CNV) વિશે નીચેનામાંથી કયું વિધાન યોગ્ય છે?", "opts": ["CNV એ DNAના એવા ટુકડા છે જેમાં ન્યુક્લિયોટાઇડની સંખ્યા 1000 થી ઓછી હોય છે.", "CNV માત્ર ઓટોસોમલ વર્ણસૂત્રોમાં જ જોવા મળે છે, લિંગ વર્ણસૂત્રોમાં નહીં.", "CNV રોગો, વિકાસાત્મક વિકૃતિઓ અને કૅન્સર સાથે સંકળાયેલા હોઈ શકે છે.", "CNV માત્ર જીનોમના કોડિંગ પ્રદેશોમાં જ જોવા મળે છે."], "ans": 2, "exp": "CNV એ DNAના ટુકડા છે જેમાં ન્યુક્લિયોટાઇડની સંખ્યા 1000 થી વધુ હોય છે, એટલે A ખોટું છે. CNV ઓટોસોમલ અને લિંગ વર્ણસૂત્રોમાં જોવા મળી શકે છે, એટલે B ખોટું છે. CNV રોગો, વિકાસાત્મક વિકૃતિઓ અને કૅન્સર સાથે સંકળાયેલા હોઈ શકે છે (C સાચું). CNV કોડિંગ અને નૉન-કોડિંગ બંને પ્રદેશોમાં જોવા મળી શકે છે, એટલે D ખોટું છે.", "ref": "Std 12 - અધ્યાય 6: જનીન અને જીનોમ", "ch": ""}, {"q": "માનવ જીનોમમાં 'એપિજેનેટિક મોડિફિકેશન' વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["એપિજેનેટિક મોડિફિકેશનમાં DNAની ન્યુક્લિયોટાઇડ ક્રમમાં ફેરફાર થતો નથી.", "મિથાઇલેશન અને હિસ્ટોન મોડિફિકેશન એ એપિજેનેટિક મોડિફિકેશનના ઉદાહરણો છે.", "એપિજેનેટિક મોડિફિકેશન વંશપરંપરાગત હોય છે અને પેઢી દર પેઢી પસાર થાય છે.", "એપિજેનેટિક મોડિફિકેશન પર્યાવરણીય પરિબળો દ્વારા પ્રભાવિત થઈ શકે છે."], "ans": 2, "exp": "એપિજેનેટિક મોડિફિકેશનમાં DNAની ન્યુક્લિયોટાઇડ ક્રમમાં ફેરફાર થતો નથી (A સાચું). મિથાઇલેશન અને હિસ્ટોન મોડિફિકેશન એ એપિજેનેટિક મોડિફિકેશનના ઉદાહરણો છે (B સાચું). એપિજેનેટિક મોડિફિકેશન વંશપરંપરાગત નથી હોતું, એટલે C ખોટું છે. એપિજેનેટિક મોડિફિકેશન પર્યાવરણીય પરિબળો દ્વારા પ્રભાવિત થઈ શકે છે (D સાચું).", "ref": "Std 12 - અધ્યાય 6: જનીન અને જીનોમ", "ch": ""}, {"q": "માનવ જીનોમમાં 'હૅપલોટાઇપ' વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["હૅપલોટાઇપ એ એક જ વર્ણસૂત્ર પર સ્થિત જીનના એલેલ્સનો સેટ છે.", "હૅપલોટાઇપ માત્ર ઓટોસોમલ વર્ણસૂત્રોમાં જ જોવા મળે છે.", "હૅપલોટાઇપના અભ્યાસથી વસ્તીના જનીનિક વૈવિધ્યને સમજવામાં મદદ મળતી નથી.", "હૅપલોટાઇપ એ DNAના એવા પ્રદેશો છે જેમાં મ્યુટેશનનો દર શૂન્ય હોય છે."], "ans": 0, "exp": "હૅપલોટાઇપ એ એક જ વર્ણસૂત્ર પર સ્થિત જીનના એલેલ્સનો સેટ છે (A સાચું). હૅપલોટાઇપ ઓટોસોમલ અને લિંગ વર્ણસૂત્રોમાં જોવા મળી શકે છે, એટલે B ખોટું છે. હૅપલોટાઇપના અભ્યાસથી વસ્તીના જનીનિક વૈવિધ્યને સમજવામાં મદદ મળે છે, એટલે C ખોટું છે. હૅપલોટાઇપ એ DNAના પ્રદેશો છે જેમાં મ્યુટેશનનો દર શૂન્ય હોતો નથી, એટલે D ખોટું છે.", "ref": "Std 12 - અધ્યાય 6: જનીન અને જીનોમ", "ch": ""}, {"q": "માનવ જીનોમમાં 'સિંગલ ન્યુક્લિયોટાઇડ પોલીમોર્ફિઝમ' (SNP) અને 'કૉપી નંબર વેરિયેશન' (CNV) વચ્ચેનો તફાવત નીચેનામાંથી કયો છે?", "opts": ["SNP એ એક જ ન્યુક્લિયોટાઇડનો ફેરફાર છે, જ્યારે CNV એ DNAના ટુકડાની સંખ્યામાં ફેરફાર છે.", "SNP માત્ર કોડિંગ પ્રદેશોમાં જોવા મળે છે, જ્યારે CNV માત્ર નૉન-કોડિંગ પ્રદેશોમાં જોવા મળે છે.", "SNP વંશપરંપરાગત નથી હોતું, જ્યારે CNV વંશપરંપરાગત હોય છે.", "SNP એ જીનોમના મોટા ભાગને આચ્છાદિત કરે છે, જ્યારે CNV એ જીનોમના લઘુ ભાગને આચ્છાદિત કરે છે."], "ans": 0, "exp": "SNP એ એક જ ન્યુક્લિયોટાઇડનો ફેરફાર છે, જ્યારે CNV એ DNAના ટુકડાની સંખ્યામાં ફેરફાર છે (A સાચું). SNP કોડિંગ અને નૉન-કોડિંગ બંને પ્રદેશોમાં જોવા મળી શકે છે, જ્યારે CNV પણ બંને પ્રદેશોમાં જોવા મળી શકે છે, એટલે B ખોટું છે. SNP અને CNV બંને વંશપરંપરાગત હોઈ શકે છે, એટલે C ખોટું છે. SNP એ જીનોમના મોટા ભાગને આચ્છાદિત કરે છે, પરંતુ CNV પણ જીનોમના મહત્વપૂર્ણ ભાગને આચ્છાદિત કરે છે, એટલે D ખોટું છે.", "ref": "Std 12 - અધ્યાય 6: જનીન અને જીનોમ", "ch": ""}];

  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
