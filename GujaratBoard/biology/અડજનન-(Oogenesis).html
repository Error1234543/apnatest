<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>અંડજનન (Oogenesis)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>અંડજનન (Oogenesis)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">અંડજનન (Oogenesis)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "માનવ અંડજનન દરમિયાન પ્રાથમિક અંડકોષમાં વર્ણસૂત્રોની સંખ્યા 46 હોય છે. આ પ્રાથમિક અંડકોષમાંથી ઉત્પન્ન થતા દ્વિતીયક અંડકોષ અને ધ્રુવકાયમાં વર્ણસૂત્રોની સંખ્યા અનુક્રમે કેટલી હશે?", "opts": ["23 અને 23", "46 અને 23", "23 અને 46", "46 અને 46"], "ans": 0, "exp": "પ્રાથમિક અંડકોષમાં સમવિભાજન (મિયોસિસ-I) થાય છે, જેમાં વર્ણસૂત્રોની સંખ્યા અડધી થઈ જાય છે. તેથી દ્વિતીયક અંડકોષ અને પ્રથમ ધ્રુવકાય બંનેમાં 23 વર્ણસૂત્રો હોય છે. વિકલ્પ A સિવાયના બાકીના વિકલ્પોમાં વર્ણસૂત્રોની સંખ્યા ખોટી દર્શાવેલી છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડજનનની પ્રક્રિયા દરમિયાન નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["પ્રાથમિક અંડકોષમાં મિયોસિસ-I પૂર્ણ થયા બાદ દ્વિતીયક અંડકોષ અને પ્રથમ ધ્રુવકાય બને છે", "દ્વિતીયક અંડકોષમાં મિયોસિસ-II પૂર્ણ થયા બાદ પરિપક્વ અંડકોષ અને બીજો ધ્રુવકાય બને છે", "પ્રાથમિક અંડકોષ ગર્ભાવસ્થાના સમયે જ બને છે અને જન્મ સમયે તે સ્થગિત અવસ્થામાં હોય છે", "દરેક પ્રાથમિક અંડકોષમાંથી ચાર કાર્યક્ષમ અંડકોષો ઉત્પન્ન થાય છે"], "ans": 3, "exp": "અંડજનન દરમિયાન પ્રાથમિક અંડકોષમાંથી માત્ર એક જ કાર્યક્ષમ અંડકોષ ઉત્પન્ન થાય છે, બાકીના ત્રણ ધ્રુવકાય બને છે જે નાશ પામે છે. વિકલ્પ D ખોટું છે કારણ કે તેમાં ચાર કાર્યક્ષમ અંડકોષો ઉત્પન્ન થવાનું દર્શાવેલ છે, જે વાસ્તવિકતા નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડજનનની પ્રક્રિયા દરમિયાન પ્રાથમિક અંડકોષમાં મિયોસિસ-I ની પ્રોફેઝ-I ના કયા તબક્કામાં સિનેપ્ટોનેમલ કોમ્પ્લેક્સ બને છે?", "opts": ["લેપ્ટોટીન", "ઝાયગોટીન", "પેકીટેન", "ડિપ્લોટીન"], "ans": 0, "exp": "સિનેપ્ટોનેમલ કોમ્પ્લેક્સ મિયોસિસ-I ની પ્રોફેઝ-I ના ઝાયગોટીન તબક્કામાં બને છે, જેમાં સમજાત વર્ણસૂત્રો એકબીજા સાથે જોડાય છે. લેપ્ટોટીનમાં વર્ણસૂત્રો દૃશ્યમાન થાય છે, પેકીટેનમાં ક્રોસિંગ ઓવર થાય છે, અને ડિપ્લોટીનમાં સિનેપ્ટોનેમલ કોમ્પ્લેક્સ વિઘટિત થાય છે. તેથી વિકલ્પ B સાચો છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માનવ અંડજનનમાં નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["પ્રાથમિક અંડકોષનો વિકાસ ગર્ભાવસ્થાના પાંચમા મહિનામાં સ્થગિત થાય છે", "દ્વિતીયક અંડકોષમાં મિયોસિસ-II ફલન બાદ પૂર્ણ થાય છે", "અંડકોષનું ફલન ફેલોપિયન નલિકાના ઇસ્થમસ ભાગમાં થાય છે", "પ્રાથમિક અંડકોષ ગ્રાફિયન પુટિકામાં સમાવિષ્ટ હોય છે"], "ans": 2, "exp": "માનવ અંડકોષનું ફલન સામાન્ય રીતે ફેલોપિયન નલિકાના એમ્પુલા ભાગમાં થાય છે, ઇસ્થમસમાં નહીં. વિકલ્પ C ખોટું છે. બાકીના વિકલ્પો સાચા છે: પ્રાથમિક અંડકોષ ગર્ભાવસ્થાના પાંચમા મહિનામાં સ્થગિત થાય છે, દ્વિતીયક અંડકોષમાં મિયોસિસ-II ફલન બાદ પૂર્ણ થાય છે, અને પ્રાથમિક અંડકોષ ગ્રાફિયન પુટિકામાં સમાવિષ્ટ હોય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડજનનની પ્રક્રિયા દરમિયાન નીચેનામાંથી કયું પરિવર્તન મિયોસિસ-II ના અનાફેઝ-II તબક્કામાં થાય છે?", "opts": ["સમજાત વર્ણસૂત્રોનું અલગીકરણ", "સેન્ટ્રોમિયરનું વિભાજન અને બહેન ક્રોમેટિડનું અલગીકરણ", "સિનેપ્ટોનેમલ કોમ્પ્લેક્સનું નિર્માણ", "ક્રોસિંગ ઓવરની પ્રક્રિયા"], "ans": 1, "exp": "મિયોસિસ-II ના અનાફેઝ-II તબક્કામાં સેન્ટ્રોમિયરનું વિભાજન થાય છે અને બહેન ક્રોમેટિડ એકબીજાથી અલગ થાય છે. સમજાત વર્ણસૂત્રોનું અલગીકરણ મિયોસિસ-I ના અનાફેઝ-I માં થાય છે, સિનેપ્ટોનેમલ કોમ્પ્લેક્સનું નિર્માણ પ્રોફેઝ-I ના ઝાયગોટીન તબક્કામાં થાય છે, અને ક્રોસિંગ ઓવર પેકીટેન તબક્કામાં થાય છે. તેથી વિકલ્પ B સાચો છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માનવ અંડજનનની પ્રક્રિયામાં, પ્રાથમિક અંડકોષમાંથી દ્વિતીયક અંડકોષ અને ધ્રુવકાય (polar body) નું નિર્માણ કયા તબક્કામાં થાય છે?", "opts": ["મિયોસિસ-I ની પ્રોફેઝ-I ના ડિપ્લોટીન તબક્કામાં", "મિયોસિસ-I ના અંતે, સાયટોકાઇનેસિસ પછી", "મિયોસિસ-II ની મેટાફેઝ-II દરમિયાન", "પ્રાથમિક અંડકોષના વિકાસ દરમિયાન, ગર્ભાવસ્થા પહેલાં"], "ans": 1, "exp": "પ્રાથમિક અંડકોષમાં મિયોસિસ-I પૂર્ણ થયા બાદ સાયટોકાઇનેસિસ થાય છે, જેના પરિણામે એક દ્વિતીયક અંડકોષ અને એક ધ્રુવકાયનું નિર્માણ થાય છે. પ્રોફેઝ-I ના ડિપ્લોટીન તબક્કામાં માત્ર ક્રોસિંગ ઓવર થાય છે, મિયોસિસ-II દરમિયાન ધ્રુવકાયનું વિભાજન થાય છે, અને ગર્ભાવસ્થા પહેલાં માત્ર પ્રાથમિક અંડકોષનો વિકાસ થાય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડજનનની પ્રક્રિયામાં, દ્વિતીયક અંડકોષમાં નીચેનામાંથી કયું લક્ષણ જોવા મળતું નથી?", "opts": ["હેપ્લોઇડ વર્ણસૂત્રોની સંખ્યા", "સંપૂર્ણ સાયટોપ્લાઝમ ધરાવતો કોષ", "મિયોસિસ-II પૂર્ણ કર્યા પછીનું નિર્માણ", "ફલન પહેલાં મેટાફેઝ-II તબક્કામાં અટકેલો કોષ"], "ans": 2, "exp": "દ્વિતીયક અંડકોષ મિયોસિસ-II પૂર્ણ કર્યા વગર જ ફલન માટે તૈયાર થાય છે. તે હેપ્લોઇડ વર્ણસૂત્રો ધરાવે છે, સંપૂર્ણ સાયટોપ્લાઝમ સાથેનો કોષ છે, અને ફલન પહેલાં મેટાફેઝ-II તબક્કામાં અટકેલો હોય છે. મિયોસિસ-II માત્ર ફલન બાદ પૂર્ણ થાય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડજનનની પ્રક્રિયામાં, પ્રાથમિક અંડકોષમાંથી નિર્માણ પામતા ધ્રુવકાય (polar body) વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["પ્રથમ ધ્રુવકાય મિયોસિસ-I બાદ નિર્માણ પામે છે અને તે હેપ્લોઇડ હોય છે", "બીજો ધ્રુવકાય મિયોસિસ-II બાદ નિર્માણ પામે છે અને તે ડિપ્લોઇડ હોય છે", "ધ્રુવકાયનું નિર્માણ સાયટોપ્લાઝમના અસમાન વિતરણને કારણે થાય છે", "ધ્રુવકાયનું કાર્ય અંડકોષમાં જનીનિક સામગ્રીનું પ્રમાણ જાળવી રાખવાનું છે"], "ans": 1, "exp": "બીજો ધ્રુવકાય પણ હેપ્લોઇડ હોય છે, કારણ કે તે મિયોસિસ-II બાદ નિર્માણ પામે છે. પ્રથમ ધ્રુવકાય હેપ્લોઇડ હોય છે, ધ્રુવકાયનું નિર્માણ સાયટોપ્લાઝમના અસમાન વિતરણને કારણે થાય છે, અને તે અંડકોષમાં જનીનિક સામગ્રીનું પ્રમાણ જાળવવામાં મદદ કરે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માનવ અંડજનનમાં, પ્રાથમિક અંડકોષનો વિકાસ ગર્ભાવસ્થા દરમિયાન કયા તબક્કામાં અટકી જાય છે અને જન્મ બાદ કયા તબક્કામાં ફરી શરૂ થાય છે?", "opts": ["પ્રોફેઝ-I ના ડિપ્લોટીન તબક્કામાં અટકે છે અને યૌવનારંભે ફરી શરૂ થાય છે", "મિયોસિસ-I ના અંતે અટકે છે અને ફલન બાદ ફરી શરૂ થાય છે", "પ્રોફેઝ-I ના લેપ્ટોટીન તબક્કામાં અટકે છે અને ગર્ભાવસ્થા દરમિયાન ફરી શરૂ થાય છે", "મિયોસિસ-II ની મેટાફેઝ-II માં અટકે છે અને યૌવનારંભે ફરી શરૂ થાય છે"], "ans": 0, "exp": "પ્રાથમિક અંડકોષ ગર્ભાવસ્થા દરમિયાન પ્રોફેઝ-I ના ડિપ્લોટીન તબક્કામાં અટકી જાય છે અને યૌવનારંભે (puberty) ફરી શરૂ થાય છે. મિયોસિસ-I નો અંત યૌવનારંભે થાય છે, અને મિયોસિસ-II ફલન બાદ પૂર્ણ થાય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડજનનની પ્રક્રિયામાં, નીચેનામાંથી કયું પરિવર્તન ફક્ત અંડકોષમાં જોવા મળે છે, શુક્રકોષમાં નહીં?", "opts": ["હેપ્લોઇડ વર્ણસૂત્રોનું નિર્માણ", "સાયટોપ્લાઝમનું અસમાન વિતરણ", "મિયોસિસ-I અને મિયોસિસ-II નું પૂર્ણ થવું", "જનીનિક પુનઃસંયોજન (genetic recombination)"], "ans": 1, "exp": "સાયટોપ્લાઝમનું અસમાન વિતરણ અંડજનનની વિશિષ્ટતા છે, જેમાં મોટાભાગનું સાયટોપ્લાઝમ અંડકોષમાં જાય છે અને ધ્રુવકાયમાં ખૂબ ઓછું સાયટોપ્લાઝમ રહે છે. હેપ્લોઇડ વર્ણસૂત્રોનું નિર્માણ, મિયોસિસનું પૂર્ણ થવું, અને જનીનિક પુનઃસંયોજન શુક્રકોષજનનમાં પણ જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડજનન પ્રક્રિયા દરમિયાન, પ્રાથમિક અંડકોષમાંથી બનતા પ્રથમ ધ્રુવકાય (first polar body) અને દ્વિતીય ધ્રુવકાય (second polar body) વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["પ્રથમ ધ્રુવકાયમાં કોષદ્રવ્ય (cytoplasm) ઓછું હોય છે, જ્યારે દ્વિતીય ધ્રુવકાયમાં કોષદ્રવ્ય વધુ હોય છે.", "પ્રથમ ધ્રુવકાય મિયોસિસ-I પછી બને છે, જ્યારે દ્વિતીય ધ્રુવકાય મિયોસિસ-II પછી બને છે.", "પ્રથમ અને દ્વિતીય ધ્રુવકાય બંને ફલિત થઈ શકે છે.", "પ્રથમ ધ્રુવકાય હેપ્લોઇડ હોય છે, જ્યારે દ્વિતીય ધ્રુવકાય ડિપ્લોઇડ હોય છે."], "ans": 1, "exp": "પ્રથમ ધ્રુવકાય મિયોસિસ-I ના પૂર્ણ થયા પછી બને છે, જ્યારે દ્વિતીય ધ્રુવકાય મિયોસિસ-II ના પૂર્ણ થયા પછી બને છે. પ્રથમ ધ્રુવકાય હેપ્લોઇડ હોય છે અને તેના કોષદ્રવ્યમાં ઓછું પ્રમાણ હોય છે. દ્વિતીય ધ્રુવકાય પણ હેપ્લોઇડ હોય છે અને તે ફલિત થઈ શકતું નથી. વિકલ્પ A ખોટો છે કારણ કે દ્વિતીય ધ્રુવકાયમાં પણ કોષદ્રવ્ય ઓછું જ હોય છે. વિકલ્પ C ખોટો છે કારણ કે ધ્રુવકાય ફલિત થઈ શકતું નથી. વિકલ્પ D ખોટો છે કારણ કે બંને ધ્રુવકાય હેપ્લોઇડ જ હોય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડજનન દરમિયાન, નીચેનામાંથી કયું પરિવર્તન ફક્ત અંડકોષમાં જ થાય છે, શુક્રકોષમાં નહીં?", "opts": ["મિયોસિસ-I દરમિયાન ક્રોસિંગ ઓવર થવું", "મિયોસિસ-II દરમિયાન કોષદ્રવ્યના અસમાન વિતરણ", "પ્રોફેઝ-I દરમિયાન સિનેપ્ટોનેમલ કોમ્પ્લેક્સનું નિર્માણ", "અનાફેઝ-I દરમિયાન હોમોલોગસ વર્ણસૂત્રોનું અલગ થવું"], "ans": 1, "exp": "અંડજનન દરમિયાન, મિયોસિસ-II ના અનાફેઝ-II તબક્કામાં કોષદ્રવ્યનું અસમાન વિતરણ થાય છે, જેથી અંડકોષમાં કોષદ્રવ્યનું પ્રમાણ વધુ રહે છે અને ધ્રુવકાયમાં ઓછું રહે છે. આ પરિવર્તન ફક્ત અંડકોષમાં જ થાય છે, શુક્રકોષમાં નહીં. વિકલ્પ A, C, અને D એવા પરિવર્તનો છે જે અંડકોષ અને શુક્રકોષ બંનેમાં થાય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડજનન પ્રક્રિયા દરમિયાન, નીચેનામાંથી કયું વિધાન પ્રાથમિક અંડકોષ (primary oocyte) વિશે સાચું નથી?", "opts": ["તે ગર્ભાવસ્થા દરમિયાન જ બને છે.", "તે ડિપ્લોઇડ હોય છે.", "તે પ્રોફેઝ-I તબક્કામાં લાંબા સમય સુધી અટકી રહે છે.", "તે મિયોસિસ-I પૂર્ણ કર્યા પછી દ્વિતીયક અંડકોષ અને પ્રથમ ધ્રુવકાય બનાવે છે."], "ans": 0, "exp": "પ્રાથમિક અંડકોષ (primary oocyte) ગર્ભાવસ્થા દરમિયાન જ બનતું નથી, પરંતુ તે સ્ત્રીના જન્મ પહેલા જ બને છે અને જન્મ પછી પ્રોફેઝ-I તબક્કામાં અટકી રહે છે. વિકલ્પ B, C, અને D સાચા છે કારણ કે પ્રાથમિક અંડકોષ ડિપ્લોઇડ હોય છે, પ્રોફેઝ-I તબક્કામાં લાંબા સમય સુધી અટકી રહે છે, અને મિયોસિસ-I પૂર્ણ કર્યા પછી દ્વિતીયક અંડકોષ અને પ્રથમ ધ્રુવકાય બનાવે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડજનન પ્રક્રિયા દરમિયાન, નીચેનામાંથી કયું પરિવર્તન મિયોસિસ-I ના મેટાફેઝ-I તબક્કામાં થતું નથી?", "opts": ["હોમોલોગસ વર્ણસૂત્રોનો જોડો બનવો", "કાયનેટોકોરનું નિર્માણ", "વર્ણસૂત્રોનું વિરુદ્ધ ધ્રુવો તરફ ખેંચાણ", "કોષકેંદ્રનું વિઘટન"], "ans": 2, "exp": "મિયોસિસ-I ના મેટાફેઝ-I તબક્કામાં, હોમોલોગસ વર્ણસૂત્રોનો જોડો બને છે (A), કાયનેટોકોરનું નિર્માણ થાય છે (B), અને કોષકેંદ્રનું વિઘટન થાય છે (D). વર્ણસૂત્રોનું વિરુદ્ધ ધ્રુવો તરફ ખેંચાણ અનાફેઝ-I તબક્કામાં થાય છે, મેટાફેઝ-I માં નહીં. તેથી વિકલ્પ C ખોટો છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડજનન પ્રક્રિયા દરમિયાન, નીચેનામાંથી કયું વિધાન દ્વિતીયક અંડકોષ (secondary oocyte) વિશે સાચું છે?", "opts": ["તે હેપ્લોઇડ હોય છે અને મિયોસિસ-II પૂર્ણ કર્યા પછી જ ફલિત થઈ શકે છે.", "તે ડિપ્લોઇડ હોય છે અને મિયોસિસ-I પૂર્ણ કર્યા પછી બને છે.", "તે હેપ્લોઇડ હોય છે અને મિયોસિસ-I પૂર્ણ કર્યા પછી બને છે.", "તે ડિપ્લોઇડ હોય છે અને મિયોસિસ-II પૂર્ણ કર્યા પછી બને છે."], "ans": 1, "exp": "દ્વિતીયક અંડકોષ (secondary oocyte) મિયોસિસ-I પૂર્ણ કર્યા પછી બને છે અને તે ડિપ્લોઇડ હોય છે. તે મિયોસિસ-II પૂર્ણ કર્યા પછી જ ફલિત થઈ શકે છે. વિકલ્પ A ખોટો છે કારણ કે દ્વિતીયક અંડકોષ ડિપ્લોઇડ હોય છે. વિકલ્પ C ખોટો છે કારણ કે તે ડિપ્લોઇડ હોય છે. વિકલ્પ D ખોટો છે કારણ કે તે મિયોસિસ-I પૂર્ણ કર્યા પછી બને છે, મિયોસિસ-II પછી નહીં.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડજનન પ્રક્રિયા દરમિયાન, પ્રાથમિક અંડકોષમાંથી બનતી ધ્રુવકાયો (polar bodies) વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["પ્રથમ ધ્રુવકાયમાં 23 વર્ણસૂત્રો હોય છે અને તે મિયોસિસ-II પૂર્ણ કરે છે.", "બીજી ધ્રુવકાયમાં 23 વર્ણસૂત્રો હોય છે અને તે મિયોસિસ-II પૂર્ણ કરતી નથી.", "તમામ ધ્રુવકાયોમાં 46 વર્ણસૂત્રો હોય છે અને તે અંતિમ અંડકોષ સાથે વિલીન થાય છે.", "પ્રથમ ધ્રુવકાયમાં 46 વર્ણસૂત્રો હોય છે અને તે મિયોસિસ-I પૂર્ણ કરે છે."], "ans": 1, "exp": "બીજી ધ્રુવકાય (second polar body) મિયોસિસ-II દરમિયાન બને છે અને તેમાં 23 વર્ણસૂત્રો હોય છે, પરંતુ તે મિયોસિસ-II પૂર્ણ કરતી નથી. પ્રથમ ધ્રુવકાયમાં 23 વર્ણસૂત્રો હોય છે પરંતુ તે મિયોસિસ-II પૂર્ણ કરે છે (A ખોટું છે). તમામ ધ્રુવકાયોમાં 23 વર્ણસૂત્રો હોય છે અને તે અંડકોષ સાથે વિલીન થતી નથી (C ખોટું છે). પ્રથમ ધ્રુવકાયમાં 23 વર્ણસૂત્રો હોય છે, 46 નહીં (D ખોટું છે).", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડજનન પ્રક્રિયા દરમિયાન, નીચેનામાંથી કયું પરિવર્તન ફક્ત અંડકોષમાં જ થાય છે, શુક્રકોષમાં નહીં?", "opts": ["મિયોસિસ-I દરમિયાન સિનેપ્ટોનેમલ કોમ્પ્લેક્સનું નિર્માણ", "મિયોસિસ-II દરમિયાન અસમાન સાયટોપ્લાઝમિક વિભાજન", "પ્રોફેઝ-I દરમિયાન ક્રોસિંગ ઓવર", "મેટાફેઝ-I દરમિયાન વર્ણસૂત્રોનું જોડાણ"], "ans": 1, "exp": "મિયોસિસ-II દરમિયાન અંડકોષમાં અસમાન સાયટોપ્લાઝમિક વિભાજન થાય છે, જેથી એક મોટો અંડકોષ અને એક નાનો ધ્રુવકાય બને છે. આ પરિવર્તન શુક્રકોષમાં થતું નથી. સિનેપ્ટોનેમલ કોમ્પ્લેક્સ, ક્રોસિંગ ઓવર અને વર્ણસૂત્રોનું જોડાણ અંડકોષ અને શુક્રકોષ બંનેમાં થાય છે (A, C, D ખોટા છે).", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડજનન પ્રક્રિયા દરમિયાન, પ્રાથમિક અંડકોષમાંથી બનતા દ્વિતીયક અંડકોષ વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["તે મિયોસિસ-I પૂર્ણ કર્યા પછી બને છે.", "તેમાં 23 વર્ણસૂત્રો હોય છે.", "તે ગર્ભાશયમાં ફલન માટે તૈયાર હોય છે.", "તે મિયોસિસ-II પૂર્ણ કર્યા પછી જ અંતિમ અંડકોષ બને છે."], "ans": 2, "exp": "દ્વિતીયક અંડકોષ ગર્ભાશયમાં ફલન માટે તૈયાર હોતો નથી, પરંતુ તે ફેલોપિયન ટ્યુબમાં ફલન માટે તૈયાર હોય છે. દ્વિતીયક અંડકોષ મિયોસિસ-I પૂર્ણ કર્યા પછી બને છે (A સાચું છે), તેમાં 23 વર્ણસૂત્રો હોય છે (B સાચું છે), અને તે મિયોસિસ-II પૂર્ણ કર્યા પછી જ અંતિમ અંડકોષ બને છે (D સાચું છે).", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડજનન પ્રક્રિયા દરમિયાન, પ્રાથમિક અંડકોષમાંથી બનતા ત્રણ ધ્રુવકાયો (polar bodies) અને એક અંડકોષમાં વર્ણસૂત્રોની સંખ્યા અને જનીની સમાનતા વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["ત્રણેય ધ્રુવકાયોમાં વર્ણસૂત્રોની સંખ્યા 23 હોય છે અને જનીની રીતે સરખા હોય છે, પરંતુ અંડકોષ જનીની રીતે અલગ હોય છે.", "પ્રથમ ધ્રુવકાયમાં 23 વર્ણસૂત્રો હોય છે, જ્યારે બીજા અને ત્રીજા ધ્રુવકાયમાં 46 વર્ણસૂત્રો હોય છે, અને અંડકોષમાં 23 વર્ણસૂત્રો હોય છે.", "પ્રથમ ધ્રુવકાયમાં 23 વર્ણસૂત્રો હોય છે, બીજા ધ્રુવકાયમાં 23 વર્ણસૂત્રો હોય છે, ત્રીજા ધ્રુવકાયમાં 0 વર્ણસૂત્રો હોય છે, અને અંડકોષમાં 23 વર્ણસૂત્રો હોય છે.", "ત્રણેય ધ્રુવકાયો અને અંડકોષમાં 23 વર્ણસૂત્રો હોય છે, પરંતુ જનીની રીતે તમામ અલગ અલગ હોય છે."], "ans": 2, "exp": "અંડજનન પ્રક્રિયા દરમિયાન, પ્રાથમિક અંડકોષ (46 વર્ણસૂત્રો) મિયોસિસ-I દ્વારા દ્વિતીયક અંડકોષ (23 વર્ણસૂત્રો) અને પ્રથમ ધ્રુવકાય (23 વર્ણસૂત્રો) બનાવે છે. ત્યારબાદ, દ્વિતીયક અંડકોષ મિયોસિસ-II દ્વારા અંડકોષ (23 વર્ણસૂત્રો) અને બીજો ધ્રુવકાય (23 વર્ણસૂત્રો) બનાવે છે. બીજો ધ્રુવકાય પછી મિયોસિસ-II પૂર્ણ કરે છે અને ત્રીજો ધ્રુવકાય (0 વર્ણસૂત્રો, ક્યારેક નાશ પામે છે) બનાવે છે. આમ, પ્રથમ અને બીજા ધ્રુવકાયમાં 23 વર્ણસૂત્રો હોય છે, ત્રીજા ધ્રુવકાયમાં 0 વર્ણસૂત્રો હોય છે, અને અંડકોષમાં 23 વર્ણસૂત્રો હોય છે. વિકલ્પ A ખોટો છે કારણ કે ધ્રુવકાયો જનીની રીતે સરખા નથી. વિકલ્પ B ખોટો છે કારણ કે બીજા ધ્રુવકાયમાં 23 વર્ણસૂત્રો હોય છે, 46 નહીં. વિકલ્પ D ખોટો છે કારણ કે ત્રીજા ધ્રુવકાયમાં 0 વર્ણસૂત્રો હોય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માનવ અંડજનનની પ્રક્રિયામાં, નીચેનામાંથી કયું વિધાન અંડકોષના કોષરસીય વિતરણ (cytoplasmic distribution) વિશે અપવાદરૂપ છે?", "opts": ["પ્રાથમિક અંડકોષમાંથી બનતા દ્વિતીયક અંડકોષને મોટાભાગનું કોષરસ મળે છે, જ્યારે પ્રથમ ધ્રુવકાયને ખૂબ જ ઓછું કોષરસ મળે છે.", "દ્વિતીયક અંડકોષમાંથી બનતા પરિપક્વ અંડકોષને લગભગ બધું જ કોષરસ મળે છે, જ્યારે બીજો ધ્રુવકાય લગભગ કોષરસવિહીન હોય છે.", "પ્રાથમિક અંડકોષમાંથી બનતા પ્રથમ ધ્રુવકાયમાં પણ મિયોસિસ-II પૂર્ણ થાય છે અને તે બે નાના ધ્રુવકાયોમાં વિભાજિત થાય છે, જેમાં સમાન કોષરસ વહેંચાય છે.", "અંડકોષના કોષરસીય વિતરણનો મુખ્ય હેતુ ભાવિ ગર્ભના વિકાસ માટે જરૂરી પોષક તત્ત્વો અને ઓર્ગેનેલ્સનો સંગ્રહ કરવાનો છે."], "ans": 2, "exp": "વિકલ્પ C અપવાદરૂપ છે કારણ કે પ્રાથમિક અંડકોષમાંથી બનતા પ્રથમ ધ્રુવકાયમાં મિયોસિસ-II પૂર્ણ થતી નથી. તે સામાન્ય રીતે અવિભાજિત રહે છે અથવા ક્યારેક અપૂર્ણ વિભાજન દર્શાવે છે, પરંતુ તેમાં સમાન કોષરસ વહેંચણી થતી નથી. બાકીના વિકલ્પો અંડજનન દરમિયાન કોષરસીય વિતરણના સાચા સિદ્ધાંતો દર્શાવે છે: વિકલ્પ A અને B અંડકોષને વધુ કોષરસ મળવાની સાચી પ્રક્રિયા દર્શાવે છે, જ્યારે વિકલ્પ D અંડકોષના કોષરસીય વિતરણનો સાચો હેતુ સમજાવે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
