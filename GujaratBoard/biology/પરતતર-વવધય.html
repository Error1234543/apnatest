<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પરિતંત્ર વૈવિધ્ય</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>પરિતંત્ર વૈવિધ્ય</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">પરિતંત્ર વૈવિધ્ય</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક જંગલમાં વૃક્ષોની ટોચ પર ઊગતા ઑર્કિડ છોડ અને વૃક્ષ વચ્ચેના સંબંધને શું કહેવાય છે?", "opts": ["પરોપજીવન", "સહજીવન", "પરિતંત્રીય સહભોજિતા", "પરિતંત્રીય પરોપજીવન"], "ans": 2, "exp": "ઑર્કિડ છોડ વૃક્ષ પર માત્ર આધાર લે છે, પરંતુ વૃક્ષને કોઈ નુકસાન કે લાભ થતો નથી. આ સંબંધને પરિતંત્રીય સહભોજિતા (Commensalism) કહે છે. પરોપજીવનમાં યજમાનને નુકસાન થાય છે, સહજીવનમાં બંનેને લાભ થાય છે, જ્યારે અહીં માત્ર ઑર્કિડને લાભ છે અને વૃક્ષને કોઈ અસર નથી. GSEB Std 12 - પ્રકરણ 13: જૈવિક વર્ગીકરણ અને પરિતંત્ર.", "ref": "Std 12 - પ્રકરણ 13: જૈવિક વર્ગીકરણ અને પરિતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું ઉદાહરણ પરિતંત્રીય સ્પર્ધા (Inter-specific competition)નું નથી?", "opts": ["સિંહ અને વાઘ વચ્ચેનો શિકાર માટેનો સંઘર્ષ", "એક જ પ્રકારના બે પક્ષીઓ વચ્ચે માળો બાંધવા માટેની જગ્યાની સ્પર્ધા", "વનસ્પતિઓ વચ્ચે સૂર્યપ્રકાશ માટેની સ્પર્ધા", "હરણ અને જંગલી ભેંસ વચ્ચે ઘાસ માટેની સ્પર્ધા"], "ans": 1, "exp": "સ્પર્ધા બે પ્રકારની હોય છે: આંતરજાતીય (Inter-specific) જ્યારે બે અલગ પ્રજાતિઓ વચ્ચે સંસાધન માટે સ્પર્ધા થાય, અને અંતરજાતીય (Intra-specific) જ્યારે એક જ પ્રજાતિના સભ્યો વચ્ચે સ્પર્ધા થાય. વિકલ્પ Bમાં એક જ પ્રકારના બે પક્ષીઓ વચ્ચેની સ્પર્ધા અંતરજાતીય છે, જ્યારે બાકીના વિકલ્પોમાં આંતરજાતીય સ્પર્ધા દર્શાવેલ છે. GSEB Std 12 - પ્રકરણ 13: પરિતંત્ર.", "ref": "Std 12 - પ્રકરણ 13: પરિતંત્ર", "ch": ""}, {"q": "એક જંગલમાં વનસ્પતિઓ, હરણ, વાઘ અને વિઘટકોનું અસ્તિત્વ છે. જો વાઘની સંખ્યા અચાનક ઘટી જાય તો નીચેનામાંથી કયું પરિણામ સંભવિત નથી?", "opts": ["હરણની સંખ્યામાં વધારો થશે", "વનસ્પતિઓની સંખ્યામાં ઘટાડો થશે", "વિઘટકોની પ્રવૃત્તિમાં વધારો થશે", "વાઘની સંખ્યા ફરીથી વધવા લાગશે"], "ans": 3, "exp": "વાઘની સંખ્યા ઘટવાથી હરણની સંખ્યા વધશે (A), જેના કારણે વનસ્પતિઓની સંખ્યા ઘટશે (B). હરણના મૃતદેહો વધવાથી વિઘટકોની પ્રવૃત્તિમાં થોડો વધારો થઈ શકે, પરંતુ તે નોંધપાત્ર નહીં હોય કારણ કે વિઘટકો મુખ્યત્વે મૃત કાર્બનિક પદાર્થો પર આધારિત હોય છે. વાઘની સંખ્યા ફરીથી વધવાની શક્યતા નથી કારણ કે પર્યાવરણીય પરિબળો બદલાઈ ગયા છે (D). GSEB Std 12 - પ્રકરણ 13: પરિતંત્ર.", "ref": "Std 12 - પ્રકરણ 13: પરિતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું પરિતંત્રીય સ્તર (Trophic level)નું ઉદાહરણ નથી?", "opts": ["ઉત્પાદકો (Producers)", "પ્રાથમિક ઉપભોક્તા (Primary consumers)", "દ્વિતીયક ઉપભોક્તા (Secondary consumers)", "વિઘટકો (Decomposers)"], "ans": 3, "exp": "પરિતંત્રીય સ્તરમાં ઉત્પાદકો, પ્રાથમિક ઉપભોક્તા, દ્વિતીયક ઉપભોક્તા અને તૃતીયક ઉપભોક્તા સામેલ છે. વિઘટકો (Decomposers) પરિતંત્રીય સ્તરનો ભાગ નથી, કારણ કે તેઓ તમામ સ્તરના મૃત કાર્બનિક પદાર્થોનું વિઘટન કરે છે અને પોષક તત્ત્વો પરત પરિતંત્રમાં મુક્ત કરે છે. GSEB Std 12 - પ્રકરણ 13: પરિતંત્ર.", "ref": "Std 12 - પ્રકરણ 13: પરિતંત્ર", "ch": ""}, {"q": "એક જળચર પરિતંત્રમાં ફાયટોપ્લાંકટન, ઝૂપ્લાંકટન, નાના માછલીઓ અને મોટી માછલીઓનો સમાવેશ થાય છે. જો ફાયટોપ્લાંકટનની સંખ્યા અચાનક ઘટી જાય તો નીચેનામાંથી કયું પરિણામ સંભવિત નથી?", "opts": ["ઝૂપ્લાંકટનની સંખ્યામાં ઘટાડો થશે", "નાની માછલીઓની સંખ્યામાં વધારો થશે", "મોટી માછલીઓની સંખ્યામાં ઘટાડો થશે", "સમગ્ર પરિતંત્રનું સંતુલન ખોરવાઈ જશે"], "ans": 1, "exp": "ફાયટોપ્લાંકટન ઉત્પાદકો છે, જે ઝૂપ્લાંકટન માટે ખોરાક પૂરો પાડે છે. ફાયટોપ્લાંકટન ઘટવાથી ઝૂપ્લાંકટનની સંખ્યા ઘટશે (A), જેના કારણે નાની માછલીઓને ખોરાકની અછત સર્જાશે અને તેમની સંખ્યા ઘટશે, નહીં કે વધશે (B). આથી મોટી માછલીઓને પણ ખોરાકની અછત થશે અને તેમની સંખ્યા ઘટશે (C). સમગ્ર પરિતંત્રનું સંતુલન ખોરવાઈ જશે (D). GSEB Std 12 - પ્રકરણ 13: પરિતંત્ર.", "ref": "Std 12 - પ્રકરણ 13: પરિતંત્ર", "ch": ""}, {"q": "એક જંગલ પરિતંત્રમાં વનસ્પતિઓ દ્વારા ઉત્પાદિત કુલ ઊર્જામાંથી કેટલા ટકા ઊર્જા પ્રાથમિક ઉપભોક્તા સુધી પહોંચે છે, જ્યારે બાકીની ઊર્જા ઉષ્મા સ્વરૂપે ગુમાવાય છે? આ ઘટનાને કયા નિયમ દ્વારા સમજાવી શકાય?", "opts": ["૧૦% ઊર્જા, લિન્ડેમેનનો દસ ટકાનો નિયમ", "૨૦% ઊર્જા, ગોસનો સ્પર્ધા નિયમ", "૫% ઊર્જા, શેલફોર્ડનો સહિષ્ણુતા નિયમ", "૧૫% ઊર્જા, હાર્ડી-વેઇનબર્ગનો સંતુલન નિયમ"], "ans": 0, "exp": "સાચો જવાબ વિકલ્પ A છે. પરિતંત્રમાં ઊર્જાનું વહન લિન્ડેમેનના દસ ટકાના નિયમ મુજબ થાય છે, જેમાં માત્ર ૧૦% ઊર્જા એક પોષક સ્તરથી બીજા સ્તર સુધી પહોંચે છે. બાકીની ૯૦% ઊર્જા ઉષ્મા સ્વરૂપે ગુમાવાય છે. વિકલ્પ B, C અને D અન્ય પરિસ્થિતિઓને લાગુ પડતા નિયમો છે, જે પરિતંત્રીય ઊર્જા વહન સાથે સંબંધિત નથી.", "ref": "Std 12 - પ્રકરણ 14: પરિતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું ઉદાહરણ પરિતંત્રીય સહજીવન (Mutualism)નું નથી, પરંતુ પરોપજીવન (Parasitism)નું છે?", "opts": ["લાઈકેનમાં ફૂગ અને લીલ વચ્ચેનો સંબંધ", "રાઈઝોબિયમ બેક્ટેરિયા અને શિમ્બી કુળની વનસ્પતિઓ વચ્ચેનો સંબંધ", "ટેપવોર્મ અને મનુષ્યના આંતરડા વચ્ચેનો સંબંધ", "માયકોરાઇઝા ફૂગ અને વનસ્પતિ મૂળ વચ્ચેનો સંબંધ"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. ટેપવોર્મ અને મનુષ્યના આંતરડા વચ્ચેનો સંબંધ પરોપજીવનનો છે, જેમાં ટેપવોર્મને લાભ થાય છે અને મનુષ્યને નુકસાન થાય છે. વિકલ્પ A, B અને D પરિતંત્રીય સહજીવનના ઉદાહરણો છે, જેમાં બંને સજીવોને લાભ થાય છે.", "ref": "Std 12 - પ્રકરણ 14: પરિતંત્ર", "ch": ""}, {"q": "એક તળાવ પરિતંત્રમાં ફાયટોપ્લાંકટનની સંખ્યામાં અચાનક વધારો થાય છે, જેને કારણે પાણીમાં ઓક્સિજનનું પ્રમાણ ઘટી જાય છે અને માછલીઓ મૃત્યુ પામે છે. આ ઘટનાને શું કહેવાય?", "opts": ["જૈવિક વિવર્ધન (Biological magnification)", "યુટ્રોફિકેશન (Eutrophication)", "જૈવિક સંચય (Bioaccumulation)", "પરિસ્થિતિકીય અનુક્રમણ (Ecological succession)"], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B છે. ફાયટોપ્લાંકટનની સંખ્યામાં અચાનક વધારો થવાથી પાણીમાં ઓક્સિજનનું પ્રમાણ ઘટી જાય છે, જેને યુટ્રોફિકેશન કહે છે. વિકલ્પ A અને C ઝેરી પદાર્થોના સંચય સાથે સંબંધિત છે, જ્યારે વિકલ્પ D પરિતંત્રના ક્રમિક પરિવર્તનને દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 14: પરિતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પરિતંત્રીય સ્થિરતા (Ecosystem stability) માટે ખોટું છે?", "opts": ["પરિતંત્રમાં જૈવવિવિધતા વધુ હોય તો તે વધુ સ્થિર હોય છે", "પરિતંત્રમાં ખોરાકજાળ (Food web) જટિલ હોય તો તેની સ્થિરતા વધે છે", "પરિતંત્રમાં એક જ પ્રકારના ઉત્પાદકો હોય તો તે વધુ સ્થિર હોય છે", "પરિતંત્રમાં વિઘટકોની ભૂમિકા સ્થિરતા માટે મહત્વપૂર્ણ છે"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. પરિતંત્રમાં એક જ પ્રકારના ઉત્પાદકો હોય તો તે ઓછું સ્થિર હોય છે, કારણ કે કોઈ પણ પ્રકારની ખલેલથી સમગ્ર પરિતંત્ર પર અસર થઈ શકે છે. વિકલ્પ A, B અને D પરિતંત્રીય સ્થિરતા માટે સાચાં વિધાનો છે.", "ref": "Std 12 - પ્રકરણ 14: પરિતંત્ર", "ch": ""}, {"q": "એક જંગલ પરિતંત્રમાં વનસ્પતિઓ, હરણ, વરુ અને સિંહનો સમાવેશ થાય છે. જો વરુની સંખ્યા અચાનક ઘટી જાય, તો નીચેનામાંથી કઈ ઘટના બનવાની શક્યતા સૌથી વધુ છે?", "opts": ["હરણની સંખ્યામાં વધારો થશે અને વનસ્પતિઓની સંખ્યા ઘટશે", "સિંહની સંખ્યામાં વધારો થશે કારણ કે તેને વધુ હરણ મળશે", "વનસ્પતિઓની સંખ્યામાં વધારો થશે કારણ કે હરણ ઓછા થશે", "હરણની સંખ્યામાં ઘટાડો થશે કારણ કે સિંહ વધુ હરણનો શિકાર કરશે"], "ans": 0, "exp": "સાચો જવાબ વિકલ્પ A છે. વરુ હરણનો શિકાર કરે છે, તેથી વરુની સંખ્યા ઘટતાં હરણની સંખ્યામાં વધારો થશે, જેના કારણે વનસ્પતિઓની સંખ્યા ઘટશે. વિકલ્પ B ખોટો છે કારણ કે સિંહ મુખ્યત્વે મોટા શિકારને પસંદ કરે છે. વિકલ્પ C અને D પણ ખોટાં છે કારણ કે હરણની સંખ્યા વધવાથી વનસ્પતિઓ ઘટશે અને સિંહની સંખ્યા પર મર્યાદિત અસર થશે.", "ref": "Std 12 - પ્રકરણ 14: પરિતંત્ર", "ch": ""}, {"q": "જ્યારે એક જ પરિતંત્રમાં બે જુદી જુદી પ્રજાતિઓ એક જ સંસાધન માટે સ્પર્ધા કરે છે, ત્યારે નીચેનામાંથી કયું પરિણામ સૌથી વધુ સંભવિત છે?", "opts": ["બંને પ્રજાતિઓની સંખ્યામાં સતત વધારો થશે", "એક પ્રજાતિ દબાય જશે અથવા લુપ્ત થશે, જ્યારે બીજી પ્રજાતિ ટકી રહેશે", "બંને પ્રજાતિઓ એકબીજા સાથે સહજીવનમાં પ્રવેશશે", "બંને પ્રજાતિઓ નવી પરિતંત્રીય નિશ (ecological niche) વિકસિત કરશે અને સ્પર્ધા ટાળશે"], "ans": 3, "exp": "સ્પર્ધા દરમિયાન, પ્રજાતિઓ સામાન્ય રીતે નવી પરિતંત્રીય નિશ વિકસિત કરે છે અથવા સંસાધનનો ઉપયોગ કરવા માટે વિભાજન કરે છે, જેથી સ્પર્ધા ટાળી શકાય. બંને પ્રજાતિઓની સંખ્યામાં સતત વધારો (A) અશક્ય છે કારણ કે સંસાધન મર્યાદિત હોય છે. એક પ્રજાતિનું લુપ્ત થવું (B) શક્ય છે પરંતુ સૌથી સંભવિત પરિણામ નથી. સહજીવન (C) સ્પર્ધાના પરિણામ તરીકે નહીં પણ સહકારના પરિણામ તરીકે થાય છે.", "ref": "Std 12 - Chapter 13: પરિતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પરિતંત્રીય પિરામિડના ઊર્જા પિરામિડ વિશે ખોટું છે?", "opts": ["ઊર્જા પિરામિડ હંમેશા સીધો હોય છે", "ઉત્પાદક સ્તરે ઊર્જા સૌથી વધુ હોય છે", "ઊર્જા એક પોષણ સ્તરથી બીજા પોષણ સ્તરમાં જતી વખતે 10% જેટલી ઊર્જા જ ટકી રહે છે", "વિઘટકો ઊર્જા પિરામિડમાં સમાવિષ્ટ થતાં નથી"], "ans": 3, "exp": "વિઘટકો ઊર્જા પિરામિડમાં સમાવિષ્ટ થાય છે કારણ કે તેઓ પણ ઊર્જાનો ઉપયોગ કરે છે. ઊર્જા પિરામિડ હંમેશા સીધો હોય છે (A) અને ઉત્પાદક સ્તરે ઊર્જા સૌથી વધુ હોય છે (B). ઊર્જાના સંક્રમણ દરમિયાન 10% ઊર્જા જ ટકી રહે છે (C) એ સાચું છે.", "ref": "Std 12 - Chapter 13: પરિતંત્ર", "ch": ""}, {"q": "એક જળચર પરિતંત્રમાં, જો ફાયટોપ્લાંકટનની સંખ્યામાં અચાનક ઘટાડો થાય, તો નીચેનામાંથી કયું પરિણામ સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["ઝૂપ્લાંકટનની સંખ્યામાં તાત્કાલિક વધારો થશે", "નાના માછલીઓની સંખ્યામાં ઘટાડો થશે કારણ કે તેમનું ખોરાક સ્રોત ઘટશે", "મોટી માછલીઓની સંખ્યામાં વધારો થશે કારણ કે સ્પર્ધા ઘટશે", "પાણીમાં ઓક્સિજનનું પ્રમાણ વધશે"], "ans": 1, "exp": "ફાયટોપ્લાંકટન ઝૂપ્લાંકટનનું મુખ્ય ખોરાક સ્રોત છે. જો ફાયટોપ્લાંકટન ઘટે, તો ઝૂપ્લાંકટનની સંખ્યામાં ઘટાડો થશે, જેના કારણે નાના માછલીઓનું ખોરાક સ્રોત ઘટશે અને તેમની સંખ્યામાં ઘટાડો થશે. ઝૂપ્લાંકટનની સંખ્યામાં વધારો (A) અશક્ય છે કારણ કે તેમનું ખોરાક ઘટ્યું છે. મોટી માછલીઓની સંખ્યામાં વધારો (C) નહીં થાય કારણ કે તેમનું ખોરાક (નાના માછલીઓ) ઘટશે. ઓક્સિજનનું પ્રમાણ (D) ઘટશે કારણ કે ફાયટોપ્લાંકટન પ્રકાશસંશ્લેષણ દ્વારા ઓક્સિજન ઉત્પન્ન કરે છે.", "ref": "Std 12 - Chapter 13: પરિતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું પરિતંત્રીય સંતુલન (Ecological balance) માટે જરૂરી નથી?", "opts": ["ઉત્પાદકો અને વપરાશકર્તાઓ વચ્ચેનો સંતુલિત ગુણોત્તર", "વિઘટકોની હાજરી", "એક જ પ્રજાતિની પ્રભુતા", "ઊર્જા અને પોષક તત્વોનો સરળ પ્રવાહ"], "ans": 2, "exp": "પરિતંત્રીય સંતુલન માટે ઉત્પાદકો અને વપરાશકર્તાઓ વચ્ચેનો સંતુલિત ગુણોત્તર (A), વિઘટકોની હાજરી (B), અને ઊર્જા અને પોષક તત્વોનો સરળ પ્રવાહ (D) જરૂરી છે. એક જ પ્રજાતિની પ્રભુતા (C) પરિતંત્રીય સંતુલન માટે હાનિકારક હોય છે કારણ કે તે વૈવિધ્ય ઘટાડે છે અને પરિતંત્રને અસ્થિર બનાવે છે.", "ref": "Std 12 - Chapter 13: પરિતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પરિતંત્રીય વૈવિધ્ય (Biodiversity) અને પરિતંત્રીય સ્થિરતા (Ecosystem stability) વચ્ચેના સંબંધ વિશે સાચું છે?", "opts": ["પરિતંત્રીય વૈવિધ્ય ઘટે ત્યારે પરિતંત્રીય સ્થિરતા વધે છે", "પરિતંત્રીય વૈવિધ્ય અને પરિતંત્રીય સ્થિરતા વચ્ચે કોઈ સંબંધ નથી", "પરિતંત્રીય વૈવિધ્ય વધે ત્યારે પરિતંત્રીય સ્થિરતા ઘટે છે", "પરિતંત્રીય વૈવિધ્ય વધે ત્યારે પરિતંત્રીય સ્થિરતા વધે છે"], "ans": 3, "exp": "પરિતંત્રીય વૈવિધ્ય અને પરિતંત્રીય સ્થિરતા વચ્ચે સકરાત્મક સંબંધ હોય છે. જ્યારે પરિતંત્રમાં વૈવિધ્ય વધે છે, ત્યારે પરિતંત્ર વધુ સ્થિર બને છે કારણ કે વિવિધ પ્રજાતિઓ વિવિધ પર્યાવરણીય પરિસ્થિતિઓને સહન કરવાની ક્ષમતા ધરાવે છે. A, B, અને C વિધાનો ખોટા છે કારણ કે તેઓ આ સંબંધને યોગ્ય રીતે વર્ણવતાં નથી.", "ref": "Std 12 - Chapter 13: પરિતંત્ર", "ch": ""}, {"q": "એક જંગલ પરિતંત્રમાં, જો કોઈ એક પ્રજાતિના વિઘટકો (Decomposers) નાશ પામે, તો નીચેનામાંથી કયું પરિણામ સૌથી ઓછું સંભવિત છે?", "opts": ["કર્બન અને નાઇટ્રોજનના ચક્રમાં વિક્ષેપ પડશે", "મૃત જૈવિક પદાર્થોનો સંગ્રહ વધશે", "ઉત્પાદકો (Producers)ની વૃદ્ધિમાં તાત્કાલિક ઘટાડો થશે", "ખાદ્ય જાળમાં ઊર્જાનો પ્રવાહ મંદ પડશે"], "ans": 2, "exp": "વિઘટકો મૃત જૈવિક પદાર્થોનું વિઘટન કરે છે અને પોષક તત્ત્વોને પુનઃચક્રિત કરે છે. તેમના અભાવે કર્બન અને નાઇટ્રોજનના ચક્રમાં વિક્ષેપ પડશે (A), મૃત પદાર્થોનો સંગ્રહ વધશે (B), અને ખાદ્ય જાળમાં ઊર્જાનો પ્રવાહ મંદ પડશે (D). પરંતુ ઉત્પાદકો (વનસ્પતિઓ) સીધા રીતે પોષક તત્ત્વોને શોષી શકે છે, તેથી તેમની વૃદ્ધિમાં તાત્કાલિક ઘટાડો થવાની સંભાવના ઓછી છે (C).", "ref": "Std 12 - Chapter 14: પરિતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું પરિતંત્રીય વૈવિધ્યના 'આલ્ફા વૈવિધ્ય' (Alpha Diversity)નું સૌથી યોગ્ય ઉદાહરણ છે?", "opts": ["એક જ જંગલમાં વૃક્ષો, ઝાડીઓ અને ઘાસની જુદી જુદી પ્રજાતિઓની હાજરી", "ભારત અને શ્રીલંકા વચ્ચે સરખામણી કરતાં વનસ્પતિ પ્રજાતિઓની સંખ્યામાં તફાવત", "એક તળાવમાં મત્સ્ય, કાચબા અને જળપક્ષીઓની પ્રજાતિઓની સંખ્યા", "એક પર્વતની તળેટીથી શિખર સુધી વનસ્પતિ પ્રજાતિઓમાં થતો ફેરફાર"], "ans": 0, "exp": "આલ્ફા વૈવિધ્ય એ એક જ સ્થળે (હેબિટેટ)માં જોવા મળતી પ્રજાતિઓની વૈવિધ્યતા છે. વિકલ્પ A એક જ જંગલમાં જુદી જુદી વનસ્પતિ પ્રજાતિઓની હાજરી દર્શાવે છે, જે આલ્ફા વૈવિધ્યનું ઉદાહરણ છે. વિકલ્પ B બેટા વૈવિધ્ય (ભૌગોલિક તફાવત) દર્શાવે છે, વિકલ્પ C એક જળચર પરિતંત્રનું વૈવિધ્ય દર્શાવે છે પરંતુ આલ્ફા વૈવિધ્યની વ્યાખ્યા સંપૂર્ણ રીતે બંધબેસતી નથી, અને વિકલ્પ D ગામા વૈવિધ્ય (વિસ્તાર સાથે ફેરફાર) દર્શાવે છે.", "ref": "Std 12 - Chapter 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "એક પરિતંત્રમાં, જો કીટકભક્ષી વનસ્પતિ (Insectivorous plant)ની સંખ્યામાં વધારો થાય, તો નીચેનામાંથી કયું પરિણામ સૌથી યોગ્ય રીતે અપેક્ષિત છે?", "opts": ["કીટકોની સંખ્યામાં તાત્કાલિક ઘટાડો થશે", "મૃદામાં નાઇટ્રોજનની ઉપલબ્ધતા વધશે", "પરાગનયન (Pollination)ની પ્રક્રિયા મંદ પડશે", "શાકાહારી પ્રાણીઓની સંખ્યામાં વધારો થશે"], "ans": 1, "exp": "કીટકભક્ષી વનસ્પતિઓ કીટકોને પકડીને તેમના શરીરમાંથી નાઇટ્રોજન મેળવે છે. તેથી, તેમની સંખ્યામાં વધારો થતાં મૃદામાં નાઇટ્રોજનની ઉપલબ્ધતા વધશે (B). કીટકોની સંખ્યામાં ઘટાડો થવો જરૂરી નથી (A), કારણ કે કીટકભક્ષી વનસ્પતિઓ ફક્ત કેટલાક કીટકોને જ પકડે છે. પરાગનયનની પ્રક્રિયા (C) અને શાકાહારી પ્રાણીઓની સંખ્યા (D) પર સીધો અસર થવાની સંભાવના ઓછી છે.", "ref": "Std 12 - Chapter 14: પરિતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પરિતંત્રીય વૈવિધ્ય અને પરિતંત્રીય સેવાઓ (Ecosystem Services) વચ્ચેના સંબંધ વિશે ખોટું છે?", "opts": ["જૈવ વૈવિધ્ય વધારે હોય તેવા પરિતંત્રોમાં પોષક તત્ત્વોનું ચક્રણ વધારે કાર્યક્ષમ હોય છે", "વૈવિધ્યસભર પરિતંત્રોમાં રોગો અને કીટકોનો પ્રસાર ઓછો હોય છે", "પરિતંત્રીય વૈવિધ્ય ઘટતાં, પરિતંત્રની ઉત્પાદકતા (Productivity)માં તાત્કાલિક ઘટાડો થાય છે", "વૈવિધ્યસભર પરિતંત્રોમાં પર્યાવરણીય ફેરફારો સામે અનુકૂલનક્ષમતા (Resilience) વધારે હોય છે"], "ans": 2, "exp": "પરિતંત્રીય વૈવિધ્ય ઘટતાં, પરિતંત્રની ઉત્પાદકતામાં તાત્કાલિક ઘટાડો થવો જરૂરી નથી (C). વૈવિધ્યસભર પરિતંત્રોમાં પોષક તત્ત્વોનું ચક્રણ કાર્યક્ષમ હોય છે (A), રોગો અને કીટકોનો પ્રસાર ઓછો હોય છે (B), અને પર્યાવરણીય ફેરફારો સામે અનુકૂલનક્ષમતા વધારે હોય છે (D).", "ref": "Std 12 - Chapter 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "એક જળચર પરિતંત્રમાં, જો મોટી માછલીઓની સંખ્યામાં અચાનક ઘટાડો થાય, તો નીચેનામાંથી કયું પરિણામ સૌથી ઓછું સંભવિત છે?", "opts": ["નાની માછલીઓની સંખ્યામાં વધારો થશે", "ફાયટોપ્લાંકટનની સંખ્યામાં ઘટાડો થશે", "ઝૂપ્લાંકટનની સંખ્યામાં વધારો થશે", "પાણીમાં ઓક્સિજનની માત્રામાં ઘટાડો થશે"], "ans": 1, "exp": "મોટી માછલીઓ નાની માછલીઓને ખાય છે, તેથી તેમની સંખ્યામાં ઘટાડો થતાં નાની માછલીઓની સંખ્યામાં વધારો થશે (A). નાની માછલીઓ ઝૂપ્લાંકટન ખાય છે, તેથી ઝૂપ્લાંકટનની સંખ્યામાં ઘટાડો થવાની સંભાવના છે, પરંતુ વિકલ્પ C એ વિરુદ્ધ દર્શાવે છે. પાણીમાં ઓક્સિજનની માત્રા ઘટશે (D) કારણ કે વધુ નાની માછલીઓ અને ઝૂપ્લાંકટન શ્વસન દ્વારા ઓક્સિજનનો ઉપયોગ કરશે. ફાયટોપ્લાંકટનની સંખ્યામાં ઘટાડો થવો ઓછું સંભવિત છે (B), કારણ કે ઝૂપ્લાંકટનની સંખ્યામાં વધારો થતાં ફાયટોપ્લાંકટન પર દબાણ વધશે, પરંતુ તે તાત્કાલિક અસર નહીં હોય.", "ref": "Std 12 - Chapter 14: પરિતંત્ર", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
