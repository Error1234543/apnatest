<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ઉપભોક્તાઓ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ઉપભોક્તાઓ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ઉપભોક્તાઓ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 48 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 48 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક જૈવિક તંત્રમાં કયો સજીવ પ્રાથમિક ઉપભોક્તા તરીકે વર્ગીકૃત થઈ શકે નહીં?", "opts": ["ગાય", "હરણ", "વંદો", "ફૂગ"], "ans": 3, "exp": "ફૂગ એ વિઘટક (decomposer) છે, ઉપભોક્તા નહીં. ગાય અને હરણ તૃણાહારી પ્રાણીઓ હોવાથી પ્રાથમિક ઉપભોક્તા છે. વંદો મૃત કાર્બનિક પદાર્થો ખાય છે પરંતુ તેને પ્રાથમિક ઉપભોક્તા તરીકે ગણી શકાય કારણ કે તે પ્રત્યક્ષ કે પરોક્ષ રીતે ઉત્પાદકો પર આધારિત છે. ફૂગ સ્વયંપોષી નથી અને વિઘટન દ્વારા પોષણ મેળવે છે.", "ref": "Std 12 - પ્રકરણ 14: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "નીચેના પૈકી કયો સજીવ ઊર્જા પિરામિડમાં પ્રાથમિક ઉપભોક્તા તરીકે ગણાય પરંતુ ખરેખર તે મૃત કાર્બનિક પદાર્થોનું વિઘટન કરે છે?", "opts": ["કીટકભક્ષી છોડ", "કેટલાક પ્રકારના કીડાઓ", "શેવાળ", "લીલી વનસ્પતિ"], "ans": 1, "exp": "કેટલાક કીડાઓ (જેમ કે કેટલાક ભંગાણકારો) મૃત કાર્બનિક પદાર્થોનું વિઘટન કરે છે, પરંતુ ઊર્જા પિરામિડમાં તેમને પ્રાથમિક ઉપભોક્તા તરીકે ગણવામાં આવે છે કારણ કે તેઓ પરોક્ષ રીતે ઉત્પાદકો પર આધારિત છે. કીટકભક્ષી છોડ સ્વયંપોષી છે, શેવાળ ઉત્પાદક છે, અને લીલી વનસ્પતિ પણ ઉત્પાદક છે.", "ref": "Std 11 - પ્રકરણ 14: પર્યાવરણીય સમસ્યાઓ", "ch": ""}, {"q": "એક જંગલના ખોરાકજાળમાં, એક પ્રાણી જે ફક્ત ફળો ખાય છે તેને કયા સ્તરે મૂકવામાં આવશે? (નોંધ: આ પ્રાણી કોઈ અન્ય પ્રકારનો ખોરાક લેતું નથી)", "opts": ["પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા", "તૃતીય ઉપભોક્તા", "ઉત્પાદક"], "ans": 0, "exp": "ફળો ખાનાર પ્રાણી પ્રાથમિક ઉપભોક્તા છે કારણ કે તે સીધું ઉત્પાદકો (વનસ્પતિઓ) પર આધારિત છે. ફળો વનસ્પતિઓનો ભાગ છે, તેથી તે પ્રાથમિક ઉપભોક્તા તરીકે વર્ગીકૃત થાય છે. દ્વિતીય અને તૃતીય ઉપભોક્તા અન્ય પ્રાણીઓને ખાય છે, જ્યારે ઉત્પાદકો સ્વયંપોષી હોય છે.", "ref": "Std 12 - પ્રકરણ 13: સજીવો અને વસ્તી", "ch": ""}, {"q": "ખોરાકશૃંખલામાં, જો એક ઉપભોક્તા માત્ર અન્ય ઉપભોક્તાઓને જ ખાય છે અને ક્યારેય વનસ્પતિ આધારિત ખોરાક લેતો નથી, તો તેને શું કહેવાય? (અપવાદ: તે કોઈ વિશિષ્ટ પરિસ્થિતિમાં વનસ્પતિ ખાતો નથી)", "opts": ["પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા અથવા ઉચ્ચ સ્તરનો ઉપભોક્તા", "ઉત્પાદક", "વિઘટક"], "ans": 1, "exp": "જો ઉપભોક્તા માત્ર અન્ય ઉપભોક્તાઓને ખાય છે, તો તે દ્વિતીય ઉપભોક્તા અથવા ઉચ્ચ સ્તરનો ઉપભોક્તા (તૃતીય/ચતુર્થ) હોઈ શકે. પ્રાથમિક ઉપભોક્તા વનસ્પતિ ખાય છે, ઉત્પાદકો સ્વયંપોષી છે, અને વિઘટકો મૃત કાર્બનિક પદાર્થોનું વિઘટન કરે છે.", "ref": "Std 12 - પ્રકરણ 14: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "નીચેના પૈકી કયો સજીવ ખોરાકશૃંખલામાં ઉપભોક્તા તરીકે ગણાય પરંતુ તેની પોષણ પદ્ધતિ અન્ય ઉપભોક્તાઓથી અલગ છે?", "opts": ["સિંહ (માત્ર માંસાહારી)", "ગીધ (મૃત પ્રાણીઓ ખાય છે)", "હરણ (તૃણાહારી)", "વંદો (મૃત કાર્બનિક પદાર્થો ખાય છે)"], "ans": 1, "exp": "ગીધ મૃત પ્રાણીઓ ખાય છે, જેને સફાઈ કામદાર (scavenger) કહેવાય છે. તે ખોરાકશૃંખલામાં ઉપભોક્તા તરીકે ગણાય છે પરંતુ તેની પોષણ પદ્ધતિ અન્ય ઉપભોક્તાઓથી અલગ છે. સિંહ અને હરણ અનુક્રમે માંસાહારી અને તૃણાહારી છે, જ્યારે વંદો વિઘટક તરીકે ગણાય છે પરંતુ કેટલાક સંજોગોમાં ઉપભોક્તા તરીકે પણ વર્ગીકૃત થઈ શકે છે.", "ref": "Std 11 - પ્રકરણ 14: પર્યાવરણીય સમસ્યાઓ", "ch": ""}, {"q": "એક જળીય પરિસ્થિતિતંત્રમાં, એક સૂક્ષ્મજીવ જે મૃત કાર્બનિક પદાર્થોનું વિઘટન કરે છે અને સાથે સાથે જીવંત શેવાળના કોષોને પણ ખાય છે, તેને કયા પોષક સ્તરે મૂકી શકાય?", "opts": ["ઉત્પાદક", "પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા", "વિઘટક અને પ્રાથમિક ઉપભોક્તા બંને"], "ans": 3, "exp": "આ સૂક્ષ્મજીવ મૃત કાર્બનિક પદાર્થોનું વિઘટન કરે છે તેથી તે વિઘટક તરીકે કાર્ય કરે છે. સાથે સાથે જીવંત શેવાળ (ઉત્પાદક)ને ખાય છે તેથી તે પ્રાથમિક ઉપભોક્તા પણ છે. આથી તે બંને પોષક સ્તરે કાર્ય કરે છે. અન્ય વિકલ્પો આ બેવડી ભૂમિકાને આવરી શકતા નથી.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "એક ખોરાકજાળમાં, એક પ્રાણી જે મુખ્યત્વે ફળો ખાય છે પરંતુ ક્યારેક નાના કીટકો પણ ખાય છે, તેને કયા પ્રકારના ઉપભોક્તા તરીકે વર્ગીકૃત કરી શકાય?", "opts": ["ફક્ત પ્રાથમિક ઉપભોક્તા", "ફક્ત દ્વિતીય ઉપભોક્તા", "મિશ્ર ઉપભોક્તા (Omnivore) જે પ્રાથમિક અને દ્વિતીય બંને તરીકે કાર્ય કરે", "વિઘટક"], "ans": 2, "exp": "આ પ્રાણી મુખ્યત્વે ફળો (ઉત્પાદકો) ખાય છે તેથી પ્રાથમિક ઉપભોક્તા છે, પરંતુ ક્યારેક કીટકો (અન્ય ઉપભોક્તાઓ) પણ ખાય છે તેથી દ્વિતીય ઉપભોક્તા તરીકે પણ કાર્ય કરે છે. આથી તે મિશ્ર ઉપભોક્તા છે. અન્ય વિકલ્પો આ બેવડી પ્રકૃતિને સમજાવી શકતા નથી.", "ref": "Std 11 - પ્રકરણ 14: પર્યાવરણ અને તેના સંસાધનો", "ch": ""}, {"q": "નીચેના પૈકી કયો સજીવ ખોરાકશૃંખલામાં ઉપભોક્તા તરીકે ગણાય છે પરંતુ તેની પોષણ પદ્ધતિ સંપૂર્ણપણે પરોપજીવી નથી?", "opts": ["અમરવેલ (Cuscuta)", "ફૂગ (Fungi) જે મૃત કાર્બનિક પદાર્થો પર વૃદ્ધિ પામે છે", "મચ્છર (Mosquito) જે માનવ રક્ત ચૂસે છે", "સિંહ (Lion) જે હરણનો શિકાર કરે છે"], "ans": 2, "exp": "મચ્છર માનવ રક્ત ચૂસે છે જે પરોપજીવી લક્ષણ છે, પરંતુ તે સંપૂર્ણપણે પરોપજીવી નથી કારણ કે તે અન્ય પોષક સ્ત્રોતોનો પણ ઉપયોગ કરે છે. અમરવેલ સંપૂર્ણ પરોપજીવી છે, ફૂગ વિઘટક છે, અને સિંહ સક્રિય શિકારી છે જે ઉપભોક્તા તરીકે ગણાય છે પરંતુ પરોપજીવી નથી.", "ref": "Std 12 - પ્રકરણ 13: સજીવો અને વસ્તી", "ch": ""}, {"q": "એક જંગલના ખોરાકજાળમાં, એક પક્ષી જે મુખ્યત્વે બીજ ખાય છે પરંતુ પ્રજનન ઋતુમાં કીટકો પણ ખાય છે. આ પક્ષીના પોષક સ્તરમાં થતા ફેરફારને શું કહેવાય?", "opts": ["પોષક સ્તરમાં કાયમી ફેરફાર", "પોષક સ્તરમાં કામચલાઉ ફેરફાર", "પોષક સ્તરમાં કોઈ ફેરફાર નહીં", "પોષક સ્તરમાં ઉત્ક્રાંતિ"], "ans": 1, "exp": "આ પક્ષી મુખ્યત્વે બીજ (ઉત્પાદકો) ખાય છે તેથી પ્રાથમિક ઉપભોક્તા છે, પરંતુ પ્રજનન ઋતુમાં કીટકો (અન્ય ઉપભોક્તાઓ) ખાય છે તેથી દ્વિતીય ઉપભોક્તા બને છે. આ ફેરફાર કામચલાઉ છે અને ઋતુ આધારિત છે, કાયમી નથી. ઉત્ક્રાંતિ લાંબા ગાળાના ફેરફારો સાથે સંબંધિત છે.", "ref": "Std 11 - પ્રકરણ 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "એક જળીય પરિસ્થિતિતંત્રમાં, એક માછલી જે નાના પ્રાણપ્લવકો ખાય છે પરંતુ ક્યારેક મૃત કાર્બનિક પદાર્થો પણ ખાય છે. આ માછલીને કયા પ્રકારના ઉપભોક્તા તરીકે વર્ગીકૃત કરી શકાય?", "opts": ["ફક્ત પ્રાથમિક ઉપભોક્તા", "ફક્ત દ્વિતીય ઉપભોક્તા", "મિશ્ર ઉપભોક્તા અને વિઘટક બંને", "ફક્ત વિઘટક"], "ans": 2, "exp": "આ માછલી મુખ્યત્વે પ્રાણપ્લવકો (પ્રાથમિક ઉપભોક્તાઓ) ખાય છે તેથી દ્વિતીય ઉપભોક્તા છે, પરંતુ ક્યારેક મૃત કાર્બનિક પદાર્થો પણ ખાય છે જે વિઘટકોનું કાર્ય છે. આથી તે મિશ્ર ઉપભોક્તા અને વિઘટક બંને તરીકે કાર્ય કરે છે. અન્ય વિકલ્પો આ બેવડી ભૂમિકાને આવરી શકતા નથી.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "ખોરાકજાળમાં એક સજીવ જે મુખ્યત્વે શાકાહારી છે પરંતુ ક્યારેક કીટકો ખાય છે, તેને કયા પ્રકારનો ઉપભોક્તા કહેવાય?", "opts": ["પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા", "તૃતીય ઉપભોક્તા", "સર્વભક્ષી ઉપભોક્તા"], "ans": 3, "exp": "સર્વભક્ષી ઉપભોક્તા (D) સજીવો છે જે શાકાહારી અને માંસાહારી બંને પ્રકારના આહાર લે છે. પ્રાથમિક ઉપભોક્તા (A) ફક્ત ઉત્પાદકો (પ્લાન્ટ્સ) ખાય છે, દ્વિતીય ઉપભોક્તા (B) પ્રાથમિક ઉપભોક્તાઓ ખાય છે, અને તૃતીય ઉપભોક્તા (C) દ્વિતીય ઉપભોક્તાઓ ખાય છે. આ સજીવ સર્વભક્ષી હોવાથી D યોગ્ય જવાબ છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "નીચેના પૈકી કયો સજીવ ખોરાકશૃંખલામાં તૃતીય ઉપભોક્તા તરીકે ગણાય છે?", "opts": ["હરણ", "સિંહ", "ગીધ", "વાઘ"], "ans": 2, "exp": "ગીધ (C) મૃત પ્રાણીઓનું માંસ ખાય છે, જેને તૃતીય ઉપભોક્તા કહેવાય છે. હરણ (A) પ્રાથમિક ઉપભોક્તા છે, સિંહ (B) અને વાઘ (D) દ્વિતીય ઉપભોક્તા છે કારણ કે તેઓ પ્રાથમિક ઉપભોક્તાઓને ખાય છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "ખોરાકશૃંખલામાં, એક પ્રાણી જે ફક્ત અન્ય માંસાહારી પ્રાણીઓને ખાય છે, તેને કયા પ્રકારનો ઉપભોક્તા કહેવાય?", "opts": ["પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા", "તૃતીય ઉપભોક્તા", "ચતુર્થ ઉપભોક્તા"], "ans": 3, "exp": "જે પ્રાણી ફક્ત અન્ય માંસાહારી પ્રાણીઓને ખાય છે તે ચતુર્થ ઉપભોક્તા (D) છે. પ્રાથમિક ઉપભોક્તા (A) ઉત્પાદકો ખાય છે, દ્વિતીય ઉપભોક્તા (B) પ્રાથમિક ઉપભોક્તાઓ ખાય છે, અને તૃતીય ઉપભોક્તા (C) દ્વિતીય ઉપભોક્તાઓ ખાય છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "એક જળીય પરિસ્થિતિતંત્રમાં, એક માછલી જે નાના પ્રાણપ્લવકો અને સૂક્ષ્મ શેવાળ બંને ખાય છે, તેને ખોરાકશૃંખલામાં કયા સ્થાને ગણવામાં આવશે?", "opts": ["પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા", "તૃતીય ઉપભોક્તા", "સર્વભક્ષી (Omnivore) પરંતુ ઉપભોક્તા વર્ગીકરણમાં સમાવેશ થતો નથી"], "ans": 1, "exp": "આ માછલી પ્રાણપ્લવકો (પ્રાથમિક ઉપભોક્તા) અને સૂક્ષ્મ શેવાળ (ઉત્પાદક) બંને ખાય છે, પરંતુ ખોરાકશૃંખલામાં તેને દ્વિતીય ઉપભોક્તા તરીકે ગણવામાં આવે છે કારણ કે તે પ્રાથમિક ઉપભોક્તાઓને ખાય છે. સૂક્ષ્મ શેવાળ ખાવાથી તે ઉત્પાદક સ્તર સાથે પણ જોડાય છે, પરંતુ પ્રાણપ્લવકો ખાવાથી તેને ઉપભોક્તા તરીકે વર્ગીકૃત કરવામાં આવે છે. વિકલ્પ A ખોટો છે કારણ કે તે ફક્ત ઉત્પાદકોને ખાતું નથી. વિકલ્પ C ખોટો છે કારણ કે તે તૃતીય સ્તરે નથી. વિકલ્પ D ખોટો છે કારણ કે સર્વભક્ષી પણ ઉપભોક્તા વર્ગીકરણમાં સમાવેશ થાય છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિતંત્ર", "ch": ""}, {"q": "ખોરાકજાળમાં, એક પ્રાણી જે મુખ્યત્વે ફળો ખાય છે પરંતુ ક્યારેક નાના કીટકો પણ ખાય છે, તેને નીચેના પૈકી કયા સ્થાને ગણવામાં આવશે?", "opts": ["પ્રાથમિક ઉપભોક્તા અને દ્વિતીય ઉપભોક્તા બંને", "ફક્ત પ્રાથમિક ઉપભોક્તા", "ફક્ત દ્વિતીય ઉપભોક્તા", "તૃતીય ઉપભોક્તા"], "ans": 0, "exp": "આ પ્રાણી ફળો (ઉત્પાદકોના ભાગ) ખાય છે, જે તેને પ્રાથમિક ઉપભોક્તા બનાવે છે, અને કીટકો (પ્રાથમિક ઉપભોક્તા) ખાય છે, જે તેને દ્વિતીય ઉપભોક્તા પણ બનાવે છે. આથી તે બંને સ્તરે ગણવામાં આવે છે. વિકલ્પ B અને C અપૂર્ણ છે કારણ કે તે ફક્ત એક જ સ્તરને ધ્યાનમાં લે છે. વિકલ્પ D ખોટો છે કારણ કે તે તૃતીય સ્તરે નથી.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિતંત્ર", "ch": ""}, {"q": "ખોરાકજાળમાં, એક પ્રાણી જે મુખ્યત્વે શાકાહારી છે પરંતુ ક્યારેક કીટકો ખાય છે, તેને નીચેના પૈકી કયા વર્ગમાં મૂકી શકાય?", "opts": ["પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા", "મિશ્રપોષી (Omnivore)", "તૃતીય ઉપભોક્તા"], "ans": 2, "exp": "આ પ્રાણી મિશ્રપોષી (Omnivore) છે કારણ કે તે વનસ્પતિજ (શાકાહારી) અને પ્રાણીજ (કીટકો) બંને ખોરાક તરીકે લે છે. પ્રાથમિક ઉપભોક્તા ફક્ત વનસ્પતિજ ખોરાક લે છે, દ્વિતીય ઉપભોક્તા ફક્ત પ્રાણીજ ખોરાક લે છે, અને તૃતીય ઉપભોક્તા દ્વિતીય ઉપભોક્તાઓને ખાય છે. આથી, મિશ્રપોષી એ સરળ જવાબ છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિતંત્ર", "ch": ""}, {"q": "એક જટિલ ખોરાકજાળ ધરાવતા જંગલ પરિસ્થિતિતંત્રમાં, એક સસ્તન પ્રાણી મુખ્યત્વે ફળો અને બીજ ખાય છે, પરંતુ પ્રજનન ઋતુ દરમિયાન તે નાના પક્ષીઓના ઈંડા પણ ખાય છે. આ પ્રાણીને ખોરાકશૃંખલામાં કયા સ્તરે મૂકી શકાય, જો તેના ખોરાકના ૯૦% ભાગ શાકાહારી અને ૧૦% ભાગ માંસાહારી હોય?", "opts": ["પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા", "તૃતીય ઉપભોક્તા", "પ્રાથમિક અને દ્વિતીય ઉપભોક્તા બંને"], "ans": 3, "exp": "આ પ્રાણી મુખ્યત્વે શાકાહારી ખોરાક (ફળો અને બીજ) ખાય છે, જે પ્રાથમિક ઉપભોક્તાનું લક્ષણ છે. પરંતુ તે ક્યારેક ઈંડા (જે પક્ષીઓ દ્વારા ઉત્પન્ન થાય છે) પણ ખાય છે, જે દ્વિતીય ઉપભોક્તાનું લક્ષણ છે. GSEB પાઠ્યપુસ્તક મુજબ, જ્યારે કોઈ સજીવ બંને સ્તરે ખોરાક ગ્રહણ કરે છે, ત્યારે તેને બંને સ્તરે વર્ગીકૃત કરી શકાય છે. પ્રાથમિક ઉપભોક્તા માત્ર ઉત્પાદકો પર આધારિત હોય છે, જ્યારે દ્વિતીય ઉપભોક્તા અન્ય ઉપભોક્તાઓ પર આધારિત હોય છે. આ પ્રાણી બંને પ્રકારનો ખોરાક ગ્રહણ કરે છે, તેથી તેને પ્રાથમિક અને દ્વિતીય ઉપભોક્તા બંને તરીકે ગણી શકાય.", "ref": "Std 12 - પ્રકરણ 14: પરિસ્થિતિતંત્ર", "ch": ""}, {"q": "એક જળીય પરિસ્થિતિતંત્રમાં, એક પ્રાણી જે મુખ્યત્વે પ્રાણપ્લવકો ખાય છે, પરંતુ ક્યારેક સૂક્ષ્મજીવો દ્વારા વિઘટિત થતા કાર્બનિક પદાર્થો પણ ગ્રહણ કરે છે. આ પ્રાણીને ખોરાકશૃંખલામાં કયા સ્તરે મૂકી શકાય, જો તેના ખોરાકનો મુખ્ય ભાગ પ્રાણપ્લવકોમાંથી મળે છે?", "opts": ["પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા", "વિઘટક", "પ્રાથમિક ઉપભોક્તા અને વિઘટક બંને"], "ans": 0, "exp": "આ પ્રાણી મુખ્યત્વે પ્રાણપ્લવકો ખાય છે, જે ઉત્પાદકો (શેવાળ) પર આધારિત હોય છે. તેથી તે પ્રાથમિક ઉપભોક્તા તરીકે વર્ગીકૃત થાય છે. GSEB પાઠ્યપુસ્તક મુજબ, પ્રાથમિક ઉપભોક્તા એવા સજીવો છે જે સીધા ઉત્પાદકો પર આધારિત હોય છે. વિઘટકો મૃત કાર્બનિક પદાર્થોનું વિઘટન કરે છે, પરંતુ આ પ્રાણી મુખ્યત્વે પ્રાણપ્લવકો ખાય છે, તેથી તે વિઘટક નથી. જો કે તે ક્યારેક વિઘટિત પદાર્થો ગ્રહણ કરે છે, પરંતુ તેનો મુખ્ય ખોરાક પ્રાણપ્લવકો છે, તેથી તેને માત્ર પ્રાથમિક ઉપભોક્તા તરીકે ગણી શકાય.", "ref": "Std 12 - પ્રકરણ 14: પરિસ્થિતિતંત્ર", "ch": ""}, {"q": "એક ખોરાકજાળમાં, એક સજીવ જે મુખ્યત્વે અન્ય માંસાહારી પ્રાણીઓને ખાય છે, પરંતુ ક્યારેક વનસ્પતિજન્ય પદાર્થો પણ ગ્રહણ કરે છે. આ સજીવને ખોરાકશૃંખલામાં કયા સ્તરે મૂકી શકાય, જો તેના ખોરાકનો ૮૦% ભાગ માંસાહારી અને ૨૦% ભાગ શાકાહારી હોય?", "opts": ["દ્વિતીય ઉપભોક્તા", "તૃતીય ઉપભોક્તા", "તૃતીય ઉપભોક્તા અને પ્રાથમિક ઉપભોક્તા બંને", "ચતુર્થ ઉપભોક્તા"], "ans": 1, "exp": "આ સજીવ મુખ્યત્વે અન્ય માંસાહારી પ્રાણીઓને ખાય છે, જેનો અર્થ છે કે તે તૃતીય ઉપભોક્તા છે. GSEB પાઠ્યપુસ્તક મુજબ, તૃતીય ઉપભોક્તા એવા સજીવો છે જે દ્વિતીય ઉપભોક્તાઓને ખાય છે. જો કે તે ક્યારેક વનસ્પતિજન્ય પદાર્થો ગ્રહણ કરે છે, પરંતુ તેનો મુખ્ય ખોરાક માંસાહારી છે, તેથી તેને માત્ર તૃતીય ઉપભોક્તા તરીકે ગણી શકાય. પ્રાથમિક ઉપભોક્તા માત્ર ઉત્પાદકો પર આધારિત હોય છે, જે આ સજીવ માટે ગૌણ છે.", "ref": "Std 12 - પ્રકરણ 14: પરિસ્થિતિતંત્ર", "ch": ""}, {"q": "એક જંગલ પરિસ્થિ ટન કરે છે, પરંતુ તે જીવંત શેવાળના કોષોને પણ ખાય છે, જે પ્રાથમિક ઉપભોક્તાની લાક્ષણિકતા છે. તેથી તે બંને ભૂમિકા ભજવે છે. ઉત્પાદકો સ્વયંપોષી હોય છે, જે આ સૂક્ષ્મજીવ માટે લાગુ પડતું નથી.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ અને પરિસ્થિતિતંત્ર", "ch": ""}, {"q": "એક ખોરાકજાળમાં, એક પ્રાણી જે મુખ્યત્વે અન્ય પ્રાણીઓના મળ પર આધાર રાખે છે, પરંતુ ક્યારેક જીવંત વનસ્પતિઓના ભાગો પણ ખાય છે. આ પ્રાણીને ખોરાકશૃંખલામાં કયા સ્તરે વર્ગીકૃત કરવું જોઈએ?", "opts": ["પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા", "વિઘટક અને પ્રાથમિક ઉપભોક્તા બંને", "ફક્ત વિઘટક"], "ans": 2, "exp": "આ પ્રાણી મુખ્યત્વે મળ પર આધાર રાખે છે, જે વિઘટકની લાક્ષણિકતા છે, પરંતુ તે જીવંત વનસ્પતિઓના ભાગો પણ ખાય છે, જે પ્રાથમિક ઉપભોક્તાની લાક્ષણિકતા છે. તેથી તે બંને ભૂમિકા ભજવે છે. દ્વિતીય ઉપભોક્તા અન્ય પ્રાણીઓને ખાય છે, જે અહીં મુખ્ય નથી.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ અને પરિસ્થિતિતંત્ર", "ch": ""}, {"q": "એક જંગલ પરિસ્થિતિતંત્રમાં, એક પક્ષી જે મુખ્યત્વે ફળો ખાય છે, પરંતુ પ્રજનન ઋતુ દરમિયાન તેના બચ્ચાંને કીટકો ખવડાવે છે. આ પક્ષીના પોષણ સ્તરનું વર્ગીકરણ કેવી રીતે કરવું જોઈએ?", "opts": ["ફક્ત પ્રાથમિક ઉપભોક્તા", "પ્રાથમિક અને દ્વિતીય ઉપભોક્તા બંને", "ફક્ત દ્વિતીય ઉપભોક્તા", "પ્રાથમિક ઉપભોક્તા અને ક્યારેક તૃતીય ઉપભોક્તા"], "ans": 1, "exp": "આ પક્ષી મુખ્યત્વે ફળો ખાય છે, જે પ્રાથમિક ઉપભોક્તાની લાક્ષણિકતા છે. પ્રજનન ઋતુ દરમિયાન બચ્ચાંને કીટકો ખવડાવવા એ પક્ષીની પોષણ પદ્ધતિને બદલતું નથી, કારણ કે તે પોતે કીટકો ખાતું નથી. તેથી તેને ફક્ત પ્રાથમિક ઉપભોક્તા તરીકે વર્ગીકૃત કરવું જોઈએ. દ્વિતીય ઉપભોક્તા અન્ય પ્રાણીઓને ખાય છે, જે અહીં લાગુ પડતું નથી.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ અને પરિસ્થિતિતંત્ર", "ch": ""}, {"q": "એક જળીય પરિસ્થિતિતંત્રમાં, એક માછલી જે મુખ્યત્વે નાના પ્રાણપ્લવકો ખાય છે, પરંતુ ક્યારેક મૃત માછલીઓના અવશેષો પણ ખાય છે. આ માછલીને ખોરાકશૃંખલામાં કયા સ્તરે મૂકવી જોઈએ?", "opts": ["પ્રાથમિક ઉપભોક્તા અને વિઘટક બંને", "ફક્ત પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા અને વિઘટક બંને", "ફક્ત દ્વિતીય ઉપભોક્તા"], "ans": 0, "exp": "આ માછલી મુખ્યત્વે પ્રાણપ્લવકો ખાય છે, જે પ્રાથમિક ઉપભોક્તાની લાક્ષણિકતા છે. પરંતુ તે મૃત માછલીઓના અવશેષો પણ ખાય છે, જે વિઘટકની લાક્ષણિકતા છે. તેથી તે બંને ભૂમિકા ભજવે છે. દ્વિતીય ઉપભોક્તા અન્ય પ્રાણીઓને ખાય છે, જે અહીં મુખ્ય નથી.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ અને પરિસ્થિતિતંત્ર", "ch": ""}, {"q": "ખોરાકજાળમાં એક સજીવ જે મુખ્યત્વે મૃત પ્રાણીઓના અવશેષો પર આહાર લે છે, પરંતુ ક્યારેક જીવંત કીટકોને પણ ખાય છે, તેને નીચેના પૈકી કયા વર્ગમાં સૌથી યોગ્ય રીતે ગણી શકાય?", "opts": ["પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા", "તૃતીય ઉપભોક્તા", "વિઘટક અને મૃતોપજીવી"], "ans": 3, "exp": "જવાબ D) વિઘટક અને મૃતોપજીવી છે. મૃત પ્રાણીઓના અવશેષો પર આહાર લેનારા સજીવોને વિઘટક અથવા મૃતોપજીવી કહેવાય છે. પ્રાથમિક ઉપભોક્તા (A) શાકાહારી હોય છે, દ્વિતીય ઉપભોક્તા (B) પ્રાથમિક ઉપભોક્તાઓને ખાય છે, અને તૃતીય ઉપભોક્તા (C) દ્વિતીય ઉપભોક્તાઓને ખાય છે. આ સજીવ મુખ્યત્વે મૃત પદાર્થો પર આધારિત હોવાથી વિઘટક અને મૃતોપજીવી વર્ગમાં આવે છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર", "ch": ""}, {"q": "એક જટિલ ખોરાકજાળમાં, એક પ્રાણી જે મુખ્યત્વે શાકાહારી છે પરંતુ ક્યારેક નાના કીટકો પણ ખાય છે, તેને નીચેના પૈકી કયા વર્ગમાં ગણી શકાય?", "opts": ["ફક્ત પ્રાથમિક ઉપભોક્તા", "ફક્ત દ્વિતીય ઉપભોક્તા", "પ્રાથમિક અને દ્વિતીય ઉપભોક્તા બંને", "તૃતીય ઉપભોક્તા"], "ans": 2, "exp": "જવાબ C) પ્રાથમિક અને દ્વિતીય ઉપભોક્તા બંને છે. શાકાહારી પ્રાણી પ્રાથમિક ઉપભોક્તા હોય છે, પરંતુ જ્યારે તે કીટકો ખાય છે ત્યારે તે દ્વિતીય ઉપભોક્તા તરીકે પણ વર્તે છે. આથી તે બંને વર્ગમાં આવે છે. A અને B ફક્ત એક જ વર્ગમાં ગણવાનું ચલાવે છે, જ્યારે D તૃતીય ઉપભોક્તા માટે યોગ્ય નથી કારણ કે તે માત્ર માંસાહારી પ્રાણીઓને ખાય છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર", "ch": ""}, {"q": "ખોરાકજાળમાં એક સજીવ જે મુખ્યત્વે અન્ય ઉપભોક્તાઓને ખાય છે, પરંતુ ક્યારેક ઉત્પાદકો (જેવા કે શેવાળ) પણ ખાય છે, તેને નીચેના પૈકી કયા વર્ગમાં સૌથી યોગ્ય રીતે ગણી શકાય?", "opts": ["ફક્ત દ્વિતીય ઉપભોક્તા", "ફક્ત તૃતીય ઉપભોક્તા", "દ્વિતીય અને તૃતીય ઉપભોક્તા બંને", "પ્રાથમિક, દ્વિતીય અને તૃતીય ઉપભોક્તા બંને"], "ans": 3, "exp": "જવાબ D) પ્રાથમિક, દ્વિતીય અને તૃતીય ઉપભોક્તા બંને છે. ઉત્પાદકો (શેવાળ) ખાવાથી તે પ્રાથમિક ઉપભોક્તા બને છે, અન્ય પ્રાથમિક ઉપભોક્તાઓ ખાવાથી દ્વિતીય ઉપભોક્તા બને છે, અને અન્ય ઉપભોક્તાઓ ખાવાથી તૃતીય ઉપભોક્તા બને છે. A, B, અને C ફક્ત એક અથવા બે વર્ગમાં ગણવાનું ચલાવે છે, પરંતુ આ સજીવ ત્રણેય વર્ગમાં આવે છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર", "ch": ""}, {"q": "એક જટિલ જંગલ પરિસ્થિતિતંત્રમાં, એક સજીવ જે મુખ્યત્વે ફળો અને બીજ ખાય છે, પરંતુ ક્યારેક નાના કીટકો અને તેમના અંડાઓ પણ ખાય છે. આ સજીવને ખોરાકશૃંખલામાં કયા સ્તરે વર્ગીકૃત કરવો જોઈએ?", "opts": ["પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા", "પ્રાથમિક અને દ્વિતીય ઉપભોક્તા બંને", "તૃતીય ઉપભોક્તા"], "ans": 2, "exp": "આ સજીવ ફળો અને બીજ ખાય છે, જે તેને પ્રાથમિક ઉપભોક્તા (શાકાહારી) બનાવે છે. પરંતુ ક્યારેક કીટકો અને તેમના અંડાઓ ખાવાથી તે દ્વિતીય ઉપભોક્તા તરીકે પણ વર્તે છે. આથી તે બંને સ્તરો પર આવે છે. વિકલ્પ A ફક્ત શાકાહારી પોષણ ધ્યાનમાં લે છે, વિકલ્પ B ફક્ત માંસાહારી પોષણ ધ્યાનમાં લે છે, વિકલ્પ D તૃતીય સ્તરે ખાવાનું સૂચવે છે જે અહીં લાગુ પડતું નથી.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિતંત્ર", "ch": ""}, {"q": "ખોરાકજાળમાં એક સજીવ જે મૃત પ્રાણીઓના અવશેષો પર આહાર લે છે, પરંતુ ક્યારેક જીવંત નાના પ્રાણીઓને પણ પકડી ખાય છે. આ સજીવની ભૂમિકા કઈ છે?", "opts": ["વિઘટક અને પ્રાથમિક ઉપભોક્તા", "વિઘટક અને દ્વિતીય ઉપભોક્તા", "વિઘટક અને તૃતીય ઉપભોક્તા", "મૃતોપજીવી અને દ્વિતીય ઉપભોક્તા"], "ans": 3, "exp": "મૃત પ્રાણીઓના અવશેષો પર આહાર લેનારા સજીવને મૃતોપજીવી (Scavenger) કહેવાય છે, જ્યારે જીવંત પ્રાણીઓને ખાનારા સજીવને ઉપભોક્તા કહેવાય છે. અહીં, સજીવ મૃતોપજીવી તરીકે વર્તે છે અને જીવંત પ્રાણીઓ ખાવાથી દ્વિતીય ઉપભોક્તા તરીકે પણ વર્તે છે. વિકલ્પ A, B, અને C વિઘટક શબ્દનો ઉપયોગ કરે છે, જે મૃત કાર્બનિક પદાર્થોનું વિઘટન કરનારા સૂક્ષ્મજીવો માટે વાપરવામાં આવે છે, પરંતુ અહીં સજીવ મૃતોપજીવી છે, વિઘટક નહીં.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિતંત્ર", "ch": ""}, {"q": "એક જટિલ જંગલ પરિસ્થિતિતંત્રમાં, એક પક્ષી જે મુખ્યત્વે કીટકો ખાય છે પરંતુ ક્યારેક નાના સરીસૃપોને પણ ખાય છે, તેને ખોરાકશૃંખલામાં કયા સ્થાને ગણવું જોઈએ?", "opts": ["પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા", "તૃતીય ઉપભોક્તા", "ચતુર્થ ઉપભોક્તા"], "ans": 2, "exp": "આ પક્ષી મુખ્યત્વે કીટકો (દ્વિતીય ઉપભોક્તા) ખાય છે, પરંતુ ક્યારેક સરીસૃપો (તૃતીય ઉપભોક્તા) પણ ખાય છે. જ્યારે તે સરીસૃપ ખાય છે, ત્યારે તે ચતુર્થ સ્તરે પહોંચે છે, પરંતુ મુખ્ય પોષણ સ્તર તૃતીય ઉપભોક્તા છે. પ્રાથમિક ઉપભોક્તા (A) શાકાહારી હોય છે, દ્વિતીય ઉપભોક્તા (B) ફક્ત પ્રાથમિક ઉપભોક્તા ખાય છે, અને ચતુર્થ ઉપભોક્તા (D) ફક્ત તૃતીય ઉપભોક્તા ખાય છે, જે અહીં લાગુ પડતું નથી.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકતંત્ર", "ch": ""}, {"q": "એક જળીય પરિસ્થિતિતંત્રમાં, એક માછલી જે મુખ્યત્વે શેવાળ ખાય છે પરંતુ ક્યારેક નાના પ્રાણપ્લવકો પણ ખાય છે, તેને ખોરાકશૃંખલામાં કયા સ્થાને ગણવું જોઈએ?", "opts": ["પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા", "પ્રાથમિક અને દ્વિતીય ઉપભોક્તા બંને", "તૃતીય ઉપભોક્તા"], "ans": 2, "exp": "આ માછલી શેવાળ (ઉત્પાદક) ખાય છે, જે તેને પ્રાથમિક ઉપભોક્તા બનાવે છે, પરંતુ તે પ્રાણપ્લવકો (પ્રાથમિક ઉપભોક્તા) પણ ખાય છે, જે તેને દ્વિતીય ઉપભોક્તા પણ બનાવે છે. તેથી, તે બંને સ્તરે ગણી શકાય છે. પ્રાથમિક (A) અને દ્વિતીય (B) ફક્ત એક જ સ્તર દર્શાવે છે, જ્યારે તૃતીય (D) અહીં લાગુ પડતું નથી.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકતંત્ર", "ch": ""}, {"q": "નીચેના પૈકી કયો સજીવ ખોરાકજાળમાં એક જ સમયે પ્રાથમિક, દ્વિતીય, અને તૃતીય ઉપભોક્તા તરીકે વર્તી શકે છે?", "opts": ["વરુ", "માનવ", "વાઘ", "ગાય"], "ans": 1, "exp": "માનવ (B) શાકાહારી (પ્રાથમિક ઉપભોક્તા), માંસાહારી (દ્વિતીય ઉપભોક્તા), અને માંસાહારી જે અન્ય માંસાહારી ખાય છે (તૃતીય ઉપભોક્તા) તરીકે વર્તી શકે છે. વરુ (A) ફક્ત માંસાહારી છે, વાઘ (C) ફક્ત તૃતીય ઉપભોક્તા છે, અને ગાય (D) ફક્ત પ્રાથમિક ઉપભોક્તા છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકતંત્ર", "ch": ""}, {"q": "એક જંગલના ખોરાકજાળમાં, એક પ્રાણી જે મુખ્યત્વે ફળો ખાય છે પરંતુ ક્યારેક નાના સસ્તન પ્રાણીઓને પણ ખાય છે, તેને ખોરાકશૃંખલામાં કયા સ્થાને ગણવું જોઈએ?", "opts": ["પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા", "તૃતીય ઉપભોક્તા", "પ્રાથમિક અને તૃતીય ઉપભોક્તા બંને"], "ans": 3, "exp": "આ પ્રાણી ફળો (ઉત્પાદક) ખાય છે, જે તેને પ્રાથમિક ઉપભોક્તા બનાવે છે, પરંતુ તે નાના સસ્તન પ્રાણીઓ (દ્વિતીય ઉપભોક્તા) પણ ખાય છે, જે તેને તૃતીય ઉપભોક્તા પણ બનાવે છે. તેથી, તે બંને સ્તરે ગણી શકાય છે. પ્રાથમિક (A), દ્વિતીય (B), અને તૃતીય (C) ફક્ત એક જ સ્તર દર્શાવે છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકતંત્ર", "ch": ""}, {"q": "એક જટિલ જંગલ પરિસ્થિતિતંત્રમાં, એક સજીવ જે મુખ્યત્વે ફળો ખાય છે, પરંતુ ક્યારેક નાના કીટકો અને મૃત પ્રાણીઓના અવશેષો પર પણ આહાર લે છે, તેને નીચેના પૈકી કયા વર્ગમાં સૌથી યોગ્ય રીતે ગણી શકાય?", "opts": ["ફક્ત પ્રાથમિક ઉપભોક્તા", "પ્રાથમિક અને દ્વિતીય ઉપભોક્તા", "પ્રાથમિક, દ્વિતીય અને વિઘટક", "દ્વિતીય અને તૃતીય ઉપભોક્તા"], "ans": 2, "exp": "આ સજીવ ફળો ખાય છે, જે તેને પ્રાથમિક ઉપભોક્તા બનાવે છે (ઉત્પાદકો પર આધારિત). કીટકો ખાવાથી તે દ્વિતીય ઉપભોક્તા બને છે (પ્રાથમિક ઉપભોક્તાઓ પર આધારિત). મૃત પ્રાણીઓના અવશેષો પર આહાર લેવાથી તે વિઘટકની ભૂમિકા પણ ભજવે છે. આથી, તે ત્રણેય ભૂમિકાઓ ભજવે છે. વિકલ્પ A અને B અપૂર્ણ છે, જ્યારે D વિઘટકની ભૂમિકાને અવગણે છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિતંત્ર", "ch": ""}, {"q": "એક જળીય પરિસ્થિતિતંત્રમાં, એક માછલી મુખ્યત્વે પ્રાણપ્લવકો ખાય છે, પરંતુ ક્યારેક નાના ક્રસ્ટેશિયન્સ (જે પ્રાણપ્લવકો ખાય છે) પણ ખાય છે. આ માછલીને ખોરાકજાળમાં કયા સ્તરે ગણી શકાય?", "opts": ["ફક્ત પ્રાથમિક ઉપભોક્તા", "પ્રાથમિક અને દ્વિતીય ઉપભોક્તા બંને", "ફક્ત દ્વિતીય ઉપભોક્તા", "તૃતીય ઉપભોક્તા"], "ans": 1, "exp": "આ માછલી મુખ્યત્વે પ્રાણપ્લવકો (ઉત્પાદકો) ખાય છે તેથી તે પ્રાથમિક ઉપભોક્તા છે. પરંતુ તે ક્યારેક ક્રસ્ટેશિયન્સ (જે પ્રાણપ્લવકો ખાય છે) ખાય છે તેથી તે દ્વિતીય ઉપભોક્તા પણ છે. આમ, તે બંને સ્તરે ગણી શકાય. વિકલ્પ A ખોટો છે કારણ કે તે માત્ર પ્રાથમિક ઉપભોક્તા નથી. વિકલ્પ C ખોટો છે કારણ કે તે પ્રાથમિક ઉપભોક્તા પણ છે. વિકલ્પ D ખોટો છે કારણ કે તે તૃતીય ઉપભોક્તા નથી.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય સમસ્યાઓ અને સમાધાન", "ch": ""}, {"q": "એક ખોરાકજાળમાં, એક સજીવ મુખ્યત્વે અન્ય માંસાહારી પ્રાણીઓને ખાય છે, પરંતુ ક્યારેક ઉત્પાદકો પણ ખાય છે. આ સજીવને ખોરાકજાળમાં કયા સ્તરે વર્ગીકૃત કરી શકાય?", "opts": ["ફક્ત તૃતીય ઉપભોક્તા", "દ્વિતીય અને તૃતીય ઉપભોક્તા બંને", "તૃતીય ઉપભોક્તા અને પ્રાથમિક ઉપભોક્તા બંને", "ફક્ત દ્વિતીય ઉપભોક્તા"], "ans": 2, "exp": "આ સજીવ મુખ્યત્વે અન્ય માંસાહારી પ્રાણીઓ (દ્વિતીય ઉપભોક્તા) ખાય છે તેથી તે તૃતીય ઉપભોક્તા છે. પરંતુ તે ક્યારેક ઉત્પાદકો પણ ખાય છે તેથી તે પ્રાથમિક ઉપભોક્તા પણ છે. આમ, તે બંને સ્તરે વર્ગીકૃત થાય છે. વિકલ્પ A ખોટો છે કારણ કે તે માત્ર તૃતીય ઉપભોક્તા નથી. વિકલ્પ B ખોટો છે કારણ કે તે પ્રાથમિક ઉપભોક્તા પણ છે. વિકલ્પ D ખોટો છે કારણ કે તે તૃતીય ઉપભોક્તા પણ છે.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય સમસ્યાઓ અને સમાધાન", "ch": ""}, {"q": "એક જટિલ જંગલ પરિસ્થિતિતંત્રમાં, એક પક્ષી મુખ્યત્વે કીટકો ખાય છે, પરંતુ પ્રજનન ઋતુ દરમિયાન ફળો પણ ખાય છે. આ પક્ષીને ખોરાકજાળમાં કયા સ્તરે ગણી શકાય?", "opts": ["ફક્ત દ્વિતીય ઉપભોક્તા", "દ્વિતીય અને પ્રાથમિક ઉપભોક્તા બંને", "ફક્ત પ્રાથમિક ઉપભોક્તા", "તૃતીય ઉપભોક્તા"], "ans": 1, "exp": "આ પક્ષી મુખ્યત્વે કીટકો (જે પ્રાથમિક ઉપભોક્તા છે) ખાય છે તેથી તે દ્વિતીય ઉપભોક્તા છે. પરંતુ પ્રજનન ઋતુ દરમિયાન તે ફળો (ઉત્પાદકો) પણ ખાય છે તેથી તે પ્રાથમિક ઉપભોક્તા પણ છે. આમ, તે બંને સ્તરે ગણી શકાય. વિકલ્પ A ખોટો છે કારણ કે તે પ્રાથમિક ઉપભોક્તા પણ છે. વિકલ્પ C ખોટો છે કારણ કે તે દ્વિતીય ઉપભોક્તા પણ છે. વિકલ્પ D ખોટો છે કારણ કે તે તૃતીય ઉપભોક્તા નથી.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય સમસ્યાઓ અને સમાધાન", "ch": ""}, {"q": "એક જળીય પરિસ્થિતિતંત્રમાં, એક સૂક્ષ્મજીવ મુખ્યત્વે મૃત કાર્બનિક પદાર્થોનું વિઘટન કરે છે, પરંતુ ક્યારેક જીવંત શેવાળના કોષો પર પણ આહાર લે છે. આ સૂક્ષ્મજીવને ખોરાકજાળમાં કયા સ્તરે વર્ગીકૃત કરી શકાય?", "opts": ["ફક્ત વિઘટક", "વિઘટક અને પ્રાથમિક ઉપભોક્તા બંને", "ફક્ત પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા"], "ans": 1, "exp": "આ સૂક્ષ્મજીવ મુખ્યત્વે મૃત કાર્બનિક પદાર્થોનું વિઘટન કરે છે તેથી તે વિઘટક છે. પરંતુ તે ક્યારેક જીવંત શેવાળ (ઉત્પાદકો) પર પણ આહાર લે છે તેથી તે પ્રાથમિક ઉપભોક્તા પણ છે. આમ, તે બંને સ્તરે વર્ગીકૃત થાય છે. વિકલ્પ A ખોટો છે કારણ કે તે પ્રાથમિક ઉપભોક્તા પણ છે. વિકલ્પ C ખોટો છે કારણ કે તે વિઘટક પણ છે. વિકલ્પ D ખોટો છે કારણ કે તે દ્વિતીય ઉપભોક્તા નથી.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય સમસ્યાઓ અને સમાધાન", "ch": ""}, {"q": "એક જટિલ જંગલ પરિસ્થિતિતંત્રના ખોરાકજાળમાં, એક સજીવ જે મુખ્યત્વે ફળો અને બીજ ખાય છે, પરંતુ પ્રજનન ઋતુ દરમિયાન નાના કીટકો અને તેમના ઇંડા પણ ખાય છે. આ સજીવને ખોરાકજાળમાં કયા પ્રકારના ઉપભોક્તા તરીકે વર્ગીકૃત કરી શકાય, જો તેના આહારનો મુખ્ય ભાગ શાકાહારી હોય પરંતુ ક્યારેક માંસાહારી પણ હોય?", "opts": ["ફક્ત પ્રાથમિક ઉપભોક્તા", "પ્રાથમિક અને દ્વિતીય ઉપભોક્તા બંને", "ફક્ત દ્વિતીય ઉપભોક્તા", "તૃતીય ઉપભોક્તા"], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B છે. આ સજીવ મુખ્યત્વે ફળો અને બીજ ખાય છે, જે ઉત્પાદકો (વનસ્પતિઓ) પર આધારિત છે, તેથી તે પ્રાથમિક ઉપભોક્તા છે. પરંતુ પ્રજનન ઋતુ દરમિયાન તે નાના કીટકો અને તેમના ઇંડા ખાય છે, જે પ્રાથમિક ઉપભોક્તાઓ છે, તેથી તે દ્વિતીય ઉપભોક્તા પણ બની શકે છે. આમ, તે બંને પ્રકારના ઉપભોક્તા તરીકે વર્ગીકૃત થાય છે.\n\nવિકલ્પ A ખોટો છે કારણ કે તે માત્ર પ્રાથમિક ઉપભોક્તા નથી, ક્યારેક દ્વિતીય ઉપભોક્તા પણ બને છે.\nવિકલ્પ C ખોટો છે કારણ કે તે માત્ર દ્વિતીય ઉપભોક્તા નથી, મુખ્યત્વે પ્રાથમિક ઉપભોક્તા છે.\nવિકલ્પ D ખોટો છે કારણ કે તૃતીય ઉપભોક્તા તેને કહી શકાય નહીં, કારણ કે તે માત્ર દ્વિતીય ઉપભોક્તાઓને ખાતો નથી.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ અને પરિસ્થિતિતંત્ર", "ch": ""}, {"q": "ખોરાકશૃંખલામાં, એક પ્રાણી જે મુખ્યત્વે શાકાહારી છે પરંતુ ક્યારેક અન્ય શાકાહારી પ્રાણીઓને ખાય છે, તેને નીચેના પૈકી કયા સ્તરે ગણી શકાય?", "opts": ["ફક્ત પ્રાથમિક ઉપભોક્તા", "પ્રાથમિક અને દ્વિતીય ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા", "તૃતીય ઉપભોક્તા"], "ans": 1, "exp": "આ પ્રાણી શાકાહારી હોવાથી પ્રાથમિક ઉપભોક્તા છે, પરંતુ જ્યારે તે અન્ય શાકાહારી પ્રાણીઓને ખાય છે, ત્યારે તે દ્વિતીય ઉપભોક્તા બને છે. A) ખોટું છે કારણ કે તે ફક્ત પ્રાથમિક ઉપભોક્તા નથી. C) અને D) ખોટા છે કારણ કે તે તૃતીય ઉપભોક્તા નથી, અને ફક્ત દ્વિતીય ઉપભોક્તા તરીકે ગણી શકાય નહીં.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિતંત્ર", "ch": ""}, {"q": "ખોરાકજાળમાં, એક સજીવ જે મુખ્યત્વે અન્ય ઉપભોક્તાઓને ખાય છે, પરંતુ ક્યારેક ઉત્પાદકો (હરિયાળી શેવાળ) પણ ખાય છે, તેને નીચેના પૈકી કયા વર્ગમાં ગણી શકાય?", "opts": ["ફક્ત તૃતીય ઉપભોક્તા", "દ્વિતીય અને તૃતીય ઉપભોક્તા", "પ્રાથમિક, દ્વિતીય, અને તૃતીય ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા અને વિઘટક"], "ans": 2, "exp": "આ સજીવ અન્ય ઉપભોક્તાઓને ખાય છે (તૃતીય ઉપભોક્તા), પરંતુ ક્યારેક ઉત્પાદકો પણ ખાય છે (પ્રાથમિક ઉપભોક્તા). જો તે અન્ય ઉપભોક્તાઓને ખાય છે જે પ્રાથમિક ઉપભોક્તાઓ છે, તો તે દ્વિતીય ઉપભોક્તા પણ બને છે. A) ખોટું છે કારણ કે તે ફક્ત તૃતીય ઉપભોક્તા નથી. B) અપૂર્ણ છે કારણ કે તે પ્રાથમિક ઉપભોક્તા તરીકેની ભૂમિકા પણ ભજવે છે. D) ખોટું છે કારણ કે તે વિઘટક નથી.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિતંત્ર", "ch": ""}, {"q": "જંગલના ખોરાકજાળમાં એક સજીવ જે મુખ્યત્વે ફળો ખાય છે, પરંતુ ક્યારેક નાના કીટકો પણ ખાય છે. આ સજીવને નીચેના પૈકી કયા વર્ગમાં સૌથી યોગ્ય રીતે ગણી શકાય?", "opts": ["પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા", "તૃતીય ઉપભોક્તા", "સર્વભક્ષી (Omnivore) પરંતુ ઉપભોક્તા વર્ગમાં ન ગણાય"], "ans": 0, "exp": "ફળો ખાનાર સજીવો પ્રાથમિક ઉપભોક્તા (શાકાહારી) ગણાય છે, કારણ કે તેઓ ઉત્પાદકો (વૃક્ષો) પર આધાર રાખે છે. ક્યારેક કીટકો ખાવાથી તે સર્વભક્ષી બને છે, પરંતુ ખોરાકશૃંખલામાં તેનો મુખ્ય સ્રોત ઉત્પાદકો હોવાથી તે પ્રાથમિક ઉપભોક્તા જ રહે છે. દ્વિતીય અથવા તૃતીય ઉપભોક્તા તો તે જ્યારે માત્ર પ્રાણીઓને ખાય ત્યારે ગણાય. વિકલ્પ D ખોટો છે કારણ કે સર્વભક્ષી પણ ઉપભોક્તા વર્ગમાં ગણાય છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી (Ecology)", "ch": ""}, {"q": "ખોરાકશૃંખલામાં, એક પ્રાણી જે મુખ્યત્વે અન્ય માંસાહારી પ્રાણીઓને ખાય છે, પરંતુ ક્યારેક ઉત્પાદકો (હરિયાળી શેવાળ) પર પણ આહાર લે છે, તેને નીચેના પૈકી કયા વર્ગમાં ગણી શકાય?", "opts": ["ફક્ત તૃતીય ઉપભોક્તા", "ફક્ત પ્રાથમિક ઉપભોક્તા", "પ્રાથમિક અને તૃતીય ઉપભોક્તા તરીકે કામ કરતો સરવૈયો ઉપભોક્તા", "ફક્ત વિઘટક"], "ans": 2, "exp": "યોગ્ય જવાબ C છે. આ પ્રાણી અન્ય માંસાહારી પ્રાણીઓને ખાય છે (તૃતીય ઉપભોક્તા) અને ક્યારેક ઉત્પાદકો પર પણ આહાર લે છે (પ્રાથમિક ઉપભોક્તા). તેથી તે એક સરવૈયો ઉપભોક્તા છે જે પ્રાથમિક અને તૃતીય ઉપભોક્તા તરીકે કામ કરે છે. A ગળતર છે કારણ કે તે ફક્ત તૃતીય ઉપભોક્તા તરીકે ગણે છે, B ગળતર છે કારણ કે તે ફક્ત પ્રાથમિક ઉપભોક્તા તરીકે ગણે છે, અને D ગળતર છે કારણ કે તે વિઘટકની ભૂમિકા ધરાવતું નથી.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિતંત્ર", "ch": ""}, {"q": "જંગલના ખોરાકજાળમાં એક પક્ષી જે મુખ્યત્વે કીટકો ખાય છે પરંતુ ક્યારેક ફળો પણ ખાય છે, તેને નીચેના પૈકી કયા વર્ગમાં સૌથી યોગ્ય રીતે ગણી શકાય?", "opts": ["ફક્ત પ્રાથમિક ઉપભોક્તા", "ફક્ત દ્વિતીય ઉપભોક્તા", "પ્રાથમિક અને દ્વિતીય ઉપભોક્તા બંને", "તૃતીય ઉપભોક્તા"], "ans": 2, "exp": "આ પક્ષી કીટકો (પ્રાથમિક ઉપભોક્તા) ખાય છે, જેથી તે દ્વિતીય ઉપભોક્તા બને છે. જ્યારે તે ફળો (ઉત્પાદકો) ખાય છે, ત્યારે તે પ્રાથમિક ઉપભોક્તા બને છે. આથી તે બંને વર્ગમાં આવે છે. વિકલ્પ A અને B અપૂર્ણ છે, જ્યારે D ત્રીજા સ્તરને સૂચવે છે, જે અહીં લાગુ પડતું નથી.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર", "ch": ""}, {"q": "ખોરાકશૃંખલામાં એક સજીવ જે મુખ્યત્વે અન્ય ઉપભોક્તાઓને ખાય છે, પરંતુ ક્યારેક ઉત્પાદકો (હરિયાળી વનસ્પતિ) પણ ખાય છે, તેને નીચેના પૈકી કયા વર્ગમાં ગણી શકાય?", "opts": ["ફક્ત તૃતીય ઉપભોક્તા", "દ્વિતીય અને તૃતીય ઉપભોક્તા", "પ્રાથમિક, દ્વિતીય, અને તૃતીય ઉપભોક્તા", "ફક્ત દ્વિતીય ઉપભોક્તા"], "ans": 2, "exp": "આ સજીવ અન્ય ઉપભોક્તાઓ ખાય છે, જેથી તે તૃતીય ઉપભોક્તા બને છે. જ્યારે તે ઉત્પાદકો ખાય છે, ત્યારે તે પ્રાથમિક ઉપભોક્તા બને છે. જો તે પ્રાથમિક ઉપભોક્તાઓને પણ ખાય છે, તો તે દ્વિતીય ઉપભોક્તા પણ બને છે. આથી વિકલ્પ C સૌથી યોગ્ય છે. વિકલ્પ A અને D અપૂર્ણ છે, જ્યારે B પ્રાથમિક ઉપભોક્તાની ભૂમિકાને અવગણે છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર", "ch": ""}, {"q": "એક જટિલ જંગલ પરિસ્થિતિતંત્રમાં, એક સસ્તન પ્રાણી મુખ્યત્વે ફળો અને બીજ ખાય છે, પરંતુ ક્યારેક નાના કશેરુકી પ્રાણીઓને પણ શિકાર કરે છે. આ પ્રાણીની ખોરાકશૃંખલામાંની ભૂમિકા કઈ છે?", "opts": ["ફક્ત પ્રાથમિક ઉપભોક્તા", "પ્રાથમિક અને તૃતીય ઉપભોક્તા", "પ્રાથમિક અને દ્વિતીય ઉપભોક્તા", "પ્રાથમિક, દ્વિતીય, અને તૃતીય ઉપભોક્તા"], "ans": 2, "exp": "આ સસ્તન ફળો અને બીજ (ઉત્પાદકો) ખાય છે, જેથી તે પ્રાથમિક ઉપભોક્તા બને છે. જ્યારે તે નાના કશેરુકી પ્રાણીઓ (જે પ્રાથમિક ઉપભોક્તા હોવાની શક્યતા છે) ખાય છે, ત્યારે તે દ્વિતીય ઉપભોક્તા બને છે. તૃતીય ઉપભોક્તા બનવા માટે, તેને અન્ય માંસાહારી પ્રાણીઓને ખાવા જોઈએ, જે અહીં ઉલ્લેખિત નથી. આથી વિકલ્પ C યોગ્ય છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર", "ch": ""}, {"q": "એક જળીય પરિસ્થિતિતંત્રમાં, એક માછલી મુખ્યત્વે નાના પ્રાણપ્લવકો ખાય છે, પરંતુ ક્યારેક નાના માછલીઓ અને ક્રસ્ટેશિયન પણ ખાય છે. આ માછલીના સંદર્ભમાં નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["આ માછલીને ખોરાકશૃંખલામાં પ્રાથમિક ઉપભોક્તા તરીકે ગણી શકાય કારણ કે તે મુખ્યત્વે પ્રાણપ્લવકો ખાય છે.", "આ માછલીને ખોરાકશૃંખલામાં દ્વિતીય ઉપભોક્તા તરીકે ગણી શકાય કારણ કે તે ક્યારેક અન્ય ઉપભોક્તાઓને ખાય છે.", "આ માછલીને ખોરાકશૃંખલામાં તૃતીય ઉપભોક્તા તરીકે ગણી શકાય કારણ કે તે ક્યારેક અન્ય માંસાહારી પ્રાણીઓને ખાય છે.", "આ માછલીને ખોરાકશૃંખલામાં ફક્ત એક જ સ્તરે વર્ગીકૃત કરી શકાય કારણ કે તેની આહાર પદ્ધતિ અસ્થિર છે."], "ans": 3, "exp": "સાચો જવાબ વિકલ્પ D છે કારણ કે આ માછલીને એક કરતાં વધુ સ્તરે વર્ગીકૃત કરી શકાય છે. તે મુખ્યત્વે પ્રાણપ્લવકો ખાય છે, જે તેને પ્રાથમિક ઉપભોક્તા બનાવે છે (વિકલ્પ A સાચું). તે ક્યારેક નાના માછલીઓ અને ક્રસ્ટેશિયન ખાય છે, જે તેને દ્વિતીય ઉપભોક્તા બનાવે છે (વિકલ્પ B સાચું). જો નાના માછલીઓ કે ક્રસ્ટેશિયન પોતે માંસાહારી હોય, તો આ માછલી તૃતીય ઉપભોક્તા પણ બની શકે છે (વિકલ્પ C સાચું). વિકલ્પ D ખોટો છે કારણ કે આ માછલીને એક કરતાં વધુ સ્તરે વર્ગીકૃત કરી શકાય છે અને તેની આહાર પદ્ધતિ અસ્થિર નથી, પરંતુ મિશ્ર છે.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ અને સજીવો વચ્ચેની આંતરક્રિયાઓ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
