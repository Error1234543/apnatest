<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>વિઘટન.</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>વિઘટન.</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">વિઘટન.</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 42 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 42 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "નીચેના પૈકી કયું વિધાન વિઘટનની પ્રક્રિયા માટે ખોટું છે?\n1. વિઘટનમાં જટિલ કાર્બનિક પદાર્થોનું સરળ અકાર્બનિક પદાર્થોમાં રૂપાંતર થાય છે.\n2. વિઘટનની પ્રક્રિયા મુખ્યત્વે બેક્ટેરિયા અને ફૂગ દ્વારા થાય છે.\n3. વિઘટનની પ્રક્રિયા માટે ઓક્સિજનની હાજરી જરૂરી છે, તેથી તેને અજારક પ્રક્રિયા કહે છે.\n4. વિઘટનથી પોષક તત્ત્વોનું પુનઃચક્રણ થાય છે અને જમીનની ફળદ્રુપતા વધે છે.", "opts": ["ફક્ત 1 અને 2", "ફક્ત 3", "ફક્ત 2 અને 4", "ફક્ત 1, 2 અને 4"], "ans": 1, "exp": "વિઘટનની પ્રક્રિયા મુખ્યત્વે બેક્ટેરિયા અને ફૂગ દ્વારા થાય છે, જેમાં જટિલ કાર્બનિક પદાર્થોનું સરળ અકાર્બનિક પદાર્થોમાં રૂપાંતર થાય છે. આ પ્રક્રિયા ઓક્સિજનની હાજરીમાં (જારક) તેમજ ઓક્સિજનની ગેરહાજરીમાં (અજારક) પણ થઈ શકે છે. વિધાન 3 ખોટું છે કારણ કે વિઘટન અજારક પણ હોઈ શકે છે. બાકીના વિધાનો સાચાં છે.", "ref": "Std 11 - પ્રકરણ 14: પર્યાવરણીય રસાયણશાસ્ત્ર", "ch": ""}, {"q": "એક વિદ્યાર્થીએ જોયું કે જંગલમાં પડેલા સૂકા પાંદડાઓ ધીમે ધીમે અદૃશ્ય થઈ રહ્યા છે. આ પ્રક્રિયામાં નીચેના પૈકી કયું પરિબળ સૌથી ઓછી ભૂમિકા ભજવે છે?", "opts": ["તાપમાન", "ભેજ", "પ્રકાશસંશ્લેષણ", "સૂક્ષ્મજીવોની પ્રવૃત્તિ"], "ans": 2, "exp": "વિઘટનની પ્રક્રિયામાં તાપમાન, ભેજ અને સૂક્ષ્મજીવોની પ્રવૃત્તિ મહત્ત્વપૂર્ણ પરિબળો છે. પ્રકાશસંશ્લેષણ એ વિઘટનની પ્રક્રિયા નથી, તે વનસ્પતિઓમાં ખોરાક બનાવવાની પ્રક્રિયા છે. તેથી પ્રકાશસંશ્લેષણ વિઘટનમાં સૌથી ઓછી ભૂમિકા ભજવે છે.", "ref": "Std 12 - પ્રકરણ 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિઘટનની પ્રક્રિયાનું ઉદાહરણ નથી?", "opts": ["ખાતર બનાવવાની પ્રક્રિયા", "દૂધનું દહીંમાં રૂપાંતર", "મૃત પ્રાણીઓનું સડવું", "પાંદડાઓનું કોહવું"], "ans": 1, "exp": "ખાતર બનાવવાની પ્રક્રિયા, મૃત પ્રાણીઓનું સડવું અને પાંદડાઓનું કોહવું એ વિઘટનની પ્રક્રિયાના ઉદાહરણો છે. દૂધનું દહીંમાં રૂપાંતર એ આથવણ (Fermentation) પ્રક્રિયા છે, જે વિઘટન નથી. તેમાં લેક્ટિક એસિડ બેક્ટેરિયા દ્વારા લેક્ટોઝનું લેક્ટિક એસિડમાં રૂપાંતર થાય છે, જે વિઘટનથી અલગ પ્રક્રિયા છે.", "ref": "Std 11 - પ્રકરણ 9: જૈવિક અણુઓ", "ch": ""}, {"q": "એક ઇકોસિસ્ટમમાં વિઘટકોની ગેરહાજરીમાં નીચેના પૈકી શું થવાની સંભાવના સૌથી વધુ છે?", "opts": ["કાર્બન ડાયોક્સાઇડનું પ્રમાણ વધશે", "પોષક તત્ત્વોનું પુનઃચક્રણ અટકી જશે", "પ્રાથમિક ઉત્પાદકોની સંખ્યા વધશે", "પ્રાણીઓની સંખ્યામાં વધારો થશે"], "ans": 1, "exp": "વિઘટકોની ગેરહાજરીમાં પોષક તત્ત્વોનું પુનઃચક્રણ અટકી જશે, કારણ કે વિઘટકો મૃત કાર્બનિક પદાર્થોને અકાર્બનિક પોષક તત્ત્વોમાં રૂપાંતરિત કરે છે. કાર્બન ડાયોક્સાઇડનું પ્રમાણ ઘટશે કારણ કે પ્રકાશસંશ્લેષણ માટે જરૂરી કાર્બન ડાયોક્સાઇડનું પુનઃચક્રણ અટકી જશે. પ્રાથમિક ઉત્પાદકો અને પ્રાણીઓની સંખ્યા ઘટશે કારણ કે પોષક તત્ત્વોની ઉપલબ્ધતા ઘટશે.", "ref": "Std 12 - પ્રકરણ 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન વિઘટનની પ્રક્રિયા માટે સાચું નથી?\n1. વિઘટનની પ્રક્રિયા માટે ઉત્સેચકો જરૂરી છે.\n2. વિઘટનની પ્રક્રિયા માત્ર જમીનમાં જ થાય છે.\n3. વિઘટનની પ્રક્રિયા દરમિયાન ઊર્જા મુક્ત થાય છે.\n4. વિઘટનની પ્રક્રિયા વનસ્પતિઓ અને પ્રાણીઓ બંને માટે મહત્ત્વપૂર્ણ છે.", "opts": ["ફક્ત 1 અને 3", "ફક્ત 2", "ફક્ત 2 અને 4", "ફક્ત 1, 3 અને 4"], "ans": 1, "exp": "વિઘટનની પ્રક્રિયા માટે ઉત્સેચકો જરૂરી છે અને આ પ્રક્રિયા દરમિયાન ઊર્જા મુક્ત થાય છે. વિઘટન વનસ્પતિઓ અને પ્રાણીઓ બંને માટે મહત્ત્વપૂર્ણ છે કારણ કે તે પોષક તત્ત્વોનું પુનઃચક્રણ કરે છે. વિધાન 2 ખોટું છે કારણ કે વિઘટન માત્ર જમીનમાં જ નહીં, પણ પાણીમાં અને અન્ય પર્યાવરણોમાં પણ થાય છે.", "ref": "Std 11 - પ્રકરણ 14: પર્યાવરણીય રસાયણશાસ્ત્ર", "ch": ""}, {"q": "વિઘટન પ્રક્રિયા દરમિયાન નીચેના પૈકી કયા પદાર્થનું વિભાજન સૌથી અંતે થાય છે?", "opts": ["સેલ્યુલોઝ", "હેમીસેલ્યુલોઝ", "લિગ્નિન", "કાઇટિન"], "ans": 2, "exp": "લિગ્નિન એ સૌથી જટિલ અને કઠણ કાર્બનિક પદાર્થ છે, જેનું વિઘટન સૌથી અંતે થાય છે. સેલ્યુલોઝ અને હેમીસેલ્યુલોઝ તુલનાત્મક રીતે સરળતાથી વિઘટન પામે છે, જ્યારે કાઇટિન પણ લિગ્નિન કરતાં ઝડપથી વિઘટન પામે છે. વિઘટકો (જેવા કે બેક્ટેરિયા અને ફંગી) લિગ્નિનને તોડવા માટે વિશિષ્ટ ઉત્સેચકોની જરૂર પડે છે, જે પ્રક્રિયા ધીમી અને જટિલ હોય છે.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "નીચેના પૈકી કયા જીવો વિઘટન પ્રક્રિયામાં સક્રિય ભૂમિકા ભજવતા નથી?", "opts": ["એસ્પર્જિલસ", "પેનિસિલિયમ", "એનાબીના", "યૂગ્લીના"], "ans": 3, "exp": "યૂગ્લીના એ એક પ્રોટિસ્ટ છે જે પ્રકાશસંશ્લેષણ દ્વારા પોતાનું ખોરાક ઉત્પન્ન કરે છે, પરંતુ તે વિઘટન પ્રક્રિયામાં સક્રિય ભૂમિકા ભજવતું નથી. એસ્પર્જિલસ, પેનિસિલિયમ, અને એનાબીના એ ફંગી છે જે વિઘટન પ્રક્રિયામાં મહત્વની ભૂમિકા ભજવે છે.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "વિઘટન પ્રક્રિયા દરમિયાન નીચેના પૈકી કયા પદાર્થનું ઉત્પાદન થતું નથી?", "opts": ["કાર્બન ડાયોક્સાઇડ", "પાણી", "ઓક્સિજન", "અમોનિયા"], "ans": 2, "exp": "વિઘટન પ્રક્રિયા એ એક એરોબિક પ્રક્રિયા છે જેમાં કાર્બનિક પદાર્થોનું વિભાજન થાય છે અને કાર્બન ડાયોક્સાઇડ, પાણી, અને અમોનિયા જેવા પદાર્થો ઉત્પન્ન થાય છે. ઓક્સિજન એ પ્રક્રિયા માટે જરૂરી છે, પરંતુ તેનું ઉત્પાદન થતું નથી.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન વિઘટન અને પોષણ ચક્ર વચ્ચેના સંબંધ વિશે ખોટું છે?", "opts": ["વિઘટન દ્વારા કાર્બન ચક્રમાં કાર્બન પુનઃસ્થાપિત થાય છે.", "વિઘટન દરમિયાન નાઇટ્રોજન અમોનિફિકેશન દ્વારા મુક્ત થાય છે.", "વિઘટન દરમિયાન ફોસ્ફરસ સીધું જ પેશીઓમાં શોષાય છે.", "વિઘટન દરમિયાન સલ્ફર હાઇડ્રોજન સલ્ફાઇડમાં રૂપાંતરિત થાય છે."], "ans": 2, "exp": "વિઘટન દરમિયાન ફોસ્ફરસ સીધું જ પેશીઓમાં શોષાતું નથી. ફોસ્ફરસનું વિઘટન થઈને તે ફોસ્ફેટ આયનમાં રૂપાંતરિત થાય છે, જે પછી પેશીઓ દ્વારા શોષાય છે. બાકીના વિધાનો સાચા છે: વિઘટન દ્વારા કાર્બન ચક્રમાં કાર્બન પુનઃસ્થાપિત થાય છે, નાઇટ્રોજન અમોનિફિકેશન દ્વારા મુક્ત થાય છે, અને સલ્ફર હાઇડ્રોજન સલ્ફાઇડમાં રૂપાંતરિત થાય છે.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "વિઘટન પ્રક્રિયા દરમિયાન નીચેના પૈકી કયા પરિબળથી વિઘટકોની ક્રિયાશીલતા સૌથી વધુ પ્રભાવિત થાય છે?", "opts": ["તાપમાન", "ભેજ", "pH", "ઓક્સિજનની ઉપલબ્ધતા"], "ans": 1, "exp": "વિઘટકોની ક્રિયાશીલતા પર ભેજનો સૌથી મહત્વનો પ્રભાવ પડે છે. ભેજ વિના, વિઘટકો (જેવા કે બેક્ટેરિયા અને ફંગી) તેમની ચયાપચય ક્રિયાઓ કરવા સક્ષમ નથી. તાપમાન, pH, અને ઓક્સિજનની ઉપલબ્ધતા પણ મહત્વના પરિબળો છે, પરંતુ ભેજ એ સૌથી નિર્ણાયક છે.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "વિઘટન પ્રક્રિયા દરમિયાન નીચેના પૈકી કયા જીવો દ્વારા સેલ્યુલોઝનું વિઘટન થાય છે, પરંતુ લિગ્નિનનું વિઘટન થતું નથી?", "opts": ["બેક્ટરિયા (Clostridium)", "ફંગી (White-rot fungi)", "બેક્ટરિયા (Pseudomonas)", "ફંગી (Brown-rot fungi)"], "ans": 3, "exp": "Brown-rot fungi સેલ્યુલોઝ અને હેમિસેલ્યુલોઝનું વિઘટન કરે છે, પરંતુ લિગ્નિનનું વિઘટન કરતાં નથી. White-rot fungi લિગ્નિન અને સેલ્યુલોઝ બંનેમાં વિઘટન કરે છે. Clostridium અને Pseudomonas બેક્ટરિયા સેલ્યુલોઝનું વિઘટન કરે છે, પરંતુ લિગ્નિનનું વિઘટન કરવાની ક્ષમતા ધરાવતા નથી. આથી, Brown-rot fungi એ સેલ્યુલોઝનું વિઘટન કરે છે પરંતુ લિગ્નિનનું નહીં.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "વિઘટન પ્રક્રિયા દરમિયાન નીચેના પૈકી કયા પદાર્થનું વિઘટન સૌથી મુશ્કેલ છે અને તેના માટે વિશેષ ઉત્સેચકોની જરૂર પડે છે?", "opts": ["સ્ટાર્ચ", "પ્રોટીન", "લિગ્નિન", "લિપિડ"], "ans": 2, "exp": "લિગ્નિન એ એક જટિલ અને સ્થિર બાયોપોલિમર છે, જેનું વિઘટન સૌથી મુશ્કેલ છે. તેના વિઘટન માટે વિશેષ ઉત્સેચકો જેવા કે લેકેઝ, મેંગેનીઝ પર્પલેઝ, અને લિગ્નિન પર્પલેઝની જરૂર પડે છે. સ્ટાર્ચ, પ્રોટીન, અને લિપિડનું વિઘટન સરળતાથી થાય છે અને તેના માટે સામાન્ય ઉત્સેચકો પૂરતા હોય છે.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "વિઘટન પ્રક્રિયા દરમિયાન નીચેના પૈકી કયા જીવો દ્વારા નાઇટ્રોજનનું સ્થિરીકરણ થાય છે?", "opts": ["ફંગી (Aspergillus)", "બેક્ટરિયા (Rhizobium)", "બેક્ટરિયા (E. coli)", "ફંગી (Penicillium)"], "ans": 1, "exp": "Rhizobium બેક્ટરિયા નાઇટ્રોજન સ્થિરીકરણ કરે છે, જે વાતાવરણમાંથી નાઇટ્રોજનને સ્થિર કરે છે અને તેને પ્લાન્ટ્સ માટે ઉપલબ્ધ બનાવે છે. Aspergillus અને Penicillium ફંગી નાઇટ્રોજન સ્થિરીકરણ કરતા નથી. E. coli બેક્ટરિયા પણ નાઇટ્રોજન સ્થિરીકરણ કરતું નથી. આથી, Rhizobium એ નાઇટ્રોજન સ્થિરીકરણ કરતું બેક્ટરિયા છે.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "એક સંશોધકે જોયું કે જંગલની જમીનમાં પડેલા સૂકા પાંદડાઓનું વિઘટન ખૂબ જ ધીમી ગતિએ થઈ રહ્યું છે. આ પરિસ્થિતિમાં નીચેના પૈકી કયું પરિબળ વિઘટનની પ્રક્રિયાને સૌથી વધુ પ્રભાવિત કરતું નથી?", "opts": ["જમીનનું pH સ્તર ખૂબ જ ઍસિડિક હોવું", "જમીનમાં ઓક્સિજનનું પ્રમાણ ખૂબ જ ઓછું હોવું", "જમીનનું તાપમાન 35°C કરતાં વધુ હોવું", "જમીનમાં નાઇટ્રોજનનું પ્રમાણ વધુ હોવું"], "ans": 2, "exp": "વિઘટનની પ્રક્રિયા માટે તાપમાન એક મહત્ત્વપૂર્ણ પરિબળ છે, પરંતુ 35°C કરતાં વધુ તાપમાન વિઘટકોની ક્રિયાશીલતા ઘટાડે છે. જ્યારે ઍસિડિક pH, ઓક્સિજનની અછત અને નાઇટ્રોજનનું ઓછું પ્રમાણ વિઘટનની ગતિને નોંધપાત્ર રીતે ધીમું પાડે છે. તેથી, 35°C કરતાં વધુ તાપમાન વિઘટનને સૌથી ઓછું પ્રભાવિત કરતું નથી.", "ref": "Std 12 - પ્રકરણ 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન વિઘટન પ્રક્રિયા અને કાર્બન ચક્ર વચ્ચેના સંબંધ માટે ખોટું છે?\n\n1. વિઘટન દરમિયાન કાર્બન ડાયોક્સાઇડ વાતાવરણમાં મુક્ત થાય છે.\n2. વિઘટકો કાર્બનિક પદાર્થોનું અકાર્બનિક પદાર્થોમાં રૂપાંતર કરે છે.\n3. વિઘટન પ્રક્રિયા દરમિયાન કાર્બનનું સ્થિરીકરણ થાય છે.\n4. વિઘટનની ગતિ પર્યાવરણીય પરિબળોથી પ્રભાવિત થાય છે.", "opts": ["માત્ર 1 અને 2 ખોટાં છે", "માત્ર 3 ખોટું છે", "માત્ર 2 અને 4 ખોટાં છે", "માત્ર 1 અને 3 ખોટાં છે"], "ans": 1, "exp": "વિઘટન પ્રક્રિયા દરમિયાન કાર્બન ડાયોક્સાઇડ મુક્ત થાય છે અને કાર્બનિક પદાર્થોનું અકાર્બનિક પદાર્થોમાં રૂપાંતર થાય છે, જે સાચું છે. પરંતુ વિઘટન દરમિયાન કાર્બનનું સ્થિરીકરણ થતું નથી, કારણ કે સ્થિરીકરણ પ્રકાશસંશ્લેષણ દ્વારા થાય છે. તેથી વિધાન 3 ખોટું છે.", "ref": "Std 12 - પ્રકરણ 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "વિઘટન પ્રક્રિયા દરમિયાન નીચેના પૈકી કયા જીવો દ્વારા લિગ્નિનનું વિઘટન થાય છે, જ્યારે અન્ય ત્રણ જીવો સેલ્યુલોઝ પર આધારિત હોય છે?", "opts": ["બેક્ટરિયા (Bacillus spp.)", "ફૂગ (White-rot fungi)", "એક્ટિનોમાઈસીટ્સ (Actinomyces)", "પ્રોટોઝોઆ (Amoeba)"], "ans": 1, "exp": "લિગ્નિનનું વિઘટન મુખ્યત્વે શ્વેત-ક્ષય ફૂગ (White-rot fungi) દ્વારા થાય છે, જે લિગ્નિનને તોડી શકે તેવા ઉત્સેચકો (લિગ્નિન પેરોક્સિડેઝ) ઉત્પન્ન કરે છે. બેક્ટરિયા (Bacillus spp.) અને એક્ટિનોમાઈસીટ્સ મુખ્યત્વે સેલ્યુલોઝ અને હેમીસેલ્યુલોઝનું વિઘટન કરે છે, જ્યારે પ્રોટોઝોઆ (Amoeba) વિઘટન પ્રક્રિયામાં સક્રિય ભૂમિકા ભજવતા નથી.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "વિઘટન પ્રક્રિયા દરમિયાન નીચેના પૈકી કયા પરિબળને લીધે વિઘટકોની ક્રિયાશીલતા સૌથી ઓછી પ્રભાવિત થાય છે?", "opts": ["તાપમાન", "ભેજ", "pH", "પ્રકાશની તીવ્રતા"], "ans": 3, "exp": "વિઘટકોની ક્રિયાશીલતા મુખ્યત્વે તાપમાન, ભેજ અને pH દ્વારા પ્રભાવિત થાય છે. પ્રકાશની તીવ્રતા વિઘટન પ્રક્રિયા પર નગણ્ય અસર કરે છે, કેમ કે વિઘટકો (જેમ કે બેક્ટરિયા અને ફૂગ) પ્રકાશસંશ્લેષણ પર આધારિત નથી હોતા.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન વિઘટન પ્રક્રિયા અને નાઇટ્રોજન ચક્ર વચ્ચેના સંબંધ વિશે ખોટું છે?", "opts": ["વિઘટન દરમિયાન એમોનિફિકેશન થાય છે, જ્યારે નાઇટ્રિફિકેશન નાઇટ્રોજન ચક્રનો ભાગ છે.", "વિઘટકો દ્વારા મૃત જૈવિક પદાર્થોમાંથી એમોનિયા મુક્ત થાય છે, જે નાઇટ્રોજન ચક્રમાં વાપરવામાં આવે છે.", "વિઘટન પ્રક્રિયા દરમિયાન નાઇટ્રોજન ગેસ મુક્ત થાય છે, જે વાતાવરણમાં પરત ફરે છે.", "નાઇટ્રોજન સ્થિરીકરણ વિઘટકો દ્વારા થતું નથી, પરંતુ નાઇટ્રોજન ચક્રનો ભાગ છે."], "ans": 2, "exp": "વિઘટન પ્રક્રિયા દરમિયાન નાઇટ્રોજન ગેસ મુક્ત થતું નથી. એમોનિફિકેશન દરમિયાન એમોનિયા મુક્ત થાય છે, જે નાઇટ્રિફિકેશન દ્વારા નાઇટ્રેટમાં રૂપાંતરિત થાય છે. નાઇટ્રોજન ગેસ મુક્ત થવું ડીનાઇટ્રિફિકેશન પ્રક્રિયાનો ભાગ છે, જે વિઘટન પ્રક્રિયાથી અલગ છે.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "વિઘટન પ્રક્રિયા દરમિયાન નીચેના પૈકી કયા જીવો દ્વારા સલ્ફરનું ઓક્સિડેશન થાય છે, જ્યારે અન્ય ત્રણ જીવો કાર્બન ચક્રમાં સક્રિય હોય છે?", "opts": ["બેક્ટરિયા (Pseudomonas spp.)", "ફૂગ (Aspergillus spp.)", "સલ્ફર બેક્ટરિયા (Thiobacillus spp.)", "એક્ટિનોમાઈસીટ્સ (Streptomyces spp.)"], "ans": 2, "exp": "સલ્ફર બેક્ટરિયા (Thiobacillus spp.) દ્વારા સલ્ફરનું ઓક્સિડેશન થાય છે, જે સલ્ફર ચક્રનો ભાગ છે. બેક્ટરિયા (Pseudomonas spp.), ફૂગ (Aspergillus spp.) અને એક્ટિનોમાઈસીટ્સ (Streptomyces spp.) મુખ્યત્વે કાર્બન ચક્રમાં સક્રિય હોય છે.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "વિઘટન પ્રક્રિયા દરમિયાન નીચેના પૈકી કયા જોડીમાં રાસાયણિક પરિવર્તન અને તે માટે જવાબદાર સૂક્ષ્મજીવોની યોગ્ય જોડણી છે?", "opts": ["સેલ્યુલોઝ → ગ્લુકોઝ : બેક્ટરિયા (સેલ્યુલોઝ-વિઘટક) અને ફંગી (ટ્રાઇકોડર્મા)", "લિગ્નિન → હ્યુમિક એસિડ : બેક્ટરિયા (પ્સ્યુડોમોનાસ) અને ફંગી (ફેનેરોકેટ)", "કિટિન → એમિનો એસિડ : બેક્ટરિયા (બેસિલસ) અને ફંગી (એસ્પર્જિલસ)", "હિમિસેલ્યુલોઝ → પેન્ટોઝ : બેક્ટરિયા (ક્લોસ્ટ્રિડિયમ) અને ફંગી (મ્યુકોર)"], "ans": 1, "exp": "લિગ્નિનનું વિઘટન ખૂબ જ જટિલ પ્રક્રિયા છે, જે મુખ્યત્વે ફંગી જેવા કે ફેનેરોકેટ (Phaenerochaete) અને બેક્ટરિયા જેવા કે પ્સ્યુડોમોનાસ દ્વારા થાય છે, જે હ્યુમિક એસિડમાં પરિવર્તિત થાય છે. અહીં, વિકલ્પ B સાચો છે. વિકલ્પ Aમાં સેલ્યુલોઝનું વિઘટન ટ્રાઇકોડર્મા દ્વારા થાય છે, પરંતુ તે ગ્લુકોઝમાં પરિવર્તિત થાય છે, પરંતુ આ જોડણી અંશતઃ સાચી છે, પરંતુ લિગ્નિનની જોડણી વધુ ચોક્કસ છે. વિકલ્પ Cમાં કિટિનનું વિઘટન એમિનો એસિડમાં થતું નથી, તે એન-એસિટાઇલ-ગ્લુકોઝામાઇનમાં પરિવર્તિત થાય છે. વિકલ્પ Dમાં હિમિસેલ્યુલોઝનું વિઘટન પેન્ટોઝમાં થાય છે, પરંતુ ક્લોસ્ટ્રિડિયમ અને મ્યુકોરની ભૂમિકા અહીં સંપૂર્ણ રીતે ચોક્કસ નથી.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ (વિઘટન પ્રક્રિયા અને સૂક્ષ્મજીવોની ભૂમિકા)", "ch": ""}, {"q": "વિઘટન પ્રક્રિયા દરમિયાન નીચેના પૈકી કયા પરિબળને કારણે વિઘટકોની ક્રિયાશીલતા સૌથી ઓછી પ્રભાવિત થાય છે?", "opts": ["તાપમાન", "ભેજ", "pH", "પ્રકાશની તીવ્રતા"], "ans": 3, "exp": "વિઘટકોની ક્રિયાશીલતા મુખ્યત્વે તાપમાન, ભેજ અને pH દ્વારા પ્રભાવિત થાય છે. પ્રકાશની તીવ્રતા વિઘટન પ્રક્રિયા પર સીધો પ્રભાવ પાડતી નથી, કારણ કે વિઘટકો (જેમ કે બેક્ટેરિયા અને ફંગી) પ્રકાશસંશ્લેષણ પર આધારિત નથી. તાપમાન, ભેજ અને pH એ વિઘટકોની ઉત્સેચક ક્રિયાશીલતા માટે મહત્વપૂર્ણ પરિબળો છે.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "એક ઇકોસિસ્ટમમાં વિઘટન પ્રક્રિયા દરમિયાન નીચેના પૈકી કયા પરિબળની હાજરીમાં વિઘટકોની ક્રિયાશીલતા સૌથી વધુ ઘટે છે અને તેનું મુખ્ય કારણ શું છે?", "opts": ["ઓક્સિજનની વધુ માત્રા - કારણ કે વિઘટકો અજારક શ્વસન કરે છે", "પાણીની અતિશય માત્રા - કારણ કે વિઘટકોના ઉત્સેચકોની ક્રિયાશીલતા ઘટે છે", "તાપમાનમાં અચાનક વધારો - કારણ કે ઉત્સેચકો નિષ્ક્રિય થઈ જાય છે", "કાર્બનિક પદાર્થોની અછત - કારણ કે વિઘટકોને ઊર્જા મળતી નથી"], "ans": 1, "exp": "વિઘટકોની ક્રિયાશીલતા માટે યોગ્ય ભેજ જરૂરી છે, પરંતુ પાણીની અતિશય માત્રા જમીનમાં ઓક્સિજનનું પ્રમાણ ઘટાડે છે, જે વિઘટકોના અજારક શ્વસનને અવરોધે છે. આથી ઉત્સેચકોની ક્રિયાશીલતા ઘટે છે. ઓક્સિજનની વધુ માત્રા વિઘટન માટે અનુકૂળ છે, તાપમાનમાં વધારો અમુક હદ સુધી ક્રિયાશીલતા વધારે છે, અને કાર્બનિક પદાર્થોની અછત લાંબા ગાળે અસર કરે છે, પરંતુ તાત્કાલિક અસર ઓછી છે.", "ref": "Std 12 - પ્રકરણ 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન વિઘટન પ્રક્રિયા અને ખનીજીકરણ (mineralization) વચ્ચેના સંબંધ માટે ખોટું છે?", "opts": ["વિઘટન પ્રક્રિયા દરમિયાન કાર્બનિક પદાર્થોનું અકાર્બનિક પદાર્થોમાં રૂપાંતરણ થાય છે, જેને ખનીજીકરણ કહે છે", "ખનીજીકરણ એ વિઘટનની અંતિમ અવસ્થા છે જેમાં પોષક તત્ત્વો જમીનમાં મુક્ત થાય છે", "વિઘટન પ્રક્રિયા દરમિયાન ખનીજીકરણ માત્ર બેક્ટેરિયા દ્વારા જ થાય છે, ફૂગ દ્વારા નહીં", "ખનીજીકરણની પ્રક્રિયા ઇકોસિસ્ટમમાં પોષક તત્ત્વોના ચક્ર માટે અત્યંત મહત્ત્વપૂર્ણ છે"], "ans": 2, "exp": "ખનીજીકરણ એ વિઘટનની અંતિમ અવસ્થા છે જેમાં બેક્ટેરિયા અને ફૂગ બંને મહત્ત્વપૂર્ણ ભૂમિકા ભજવે છે. માત્ર બેક્ટેરિયા દ્વારા જ ખનીજીકરણ થાય છે એ વિધાન ખોટું છે. બાકીના વિકલ્પો વિઘટન અને ખનીજીકરણ વચ્ચેના સંબંધને સાચી રીતે વર્ણવે છે.", "ref": "Std 12 - પ્રકરણ 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "એક સંશોધકે જોયું કે એક જંગલમાં પડેલા સૂકા પાંદડાઓનું વિઘટન ખૂબ જ ધીમું થઈ રહ્યું છે. નીચેના પૈકી કયું પરિબળ આ ઘટના માટે સૌથી વધુ જવાબદાર હોઈ શકે છે?", "opts": ["જમીનનું pH 8.5 (આલ્કલાઇન) હોવું", "જમીનનું તાપમાન 30°C હોવું", "જમીનમાં કાર્બનિક પદાર્થોનું પ્રમાણ વધુ હોવું", "જમીનમાં નાઇટ્રોજનનું પ્રમાણ વધુ હોવું"], "ans": 0, "exp": "વિઘટન પ્રક્રિયા માટે જમીનનું pH તટસ્થ (6.5-7.5) હોવું જરૂરી છે. આલ્કલાઇન pH (8.5) વિઘટકોની ક્રિયાશીલતા ઘટાડે છે, જે વિઘટનની પ્રક્રિયાને ધીમી કરે છે. 30°C તાપમાન વિઘટન માટે અનુકૂળ છે, કાર્બનિક પદાર્થોની વધુ માત્રા વિઘટનને પ્રોત્સાહન આપે છે, અને નાઇટ્રોજનનું વધુ પ્રમાણ વિઘટનને ઝડપી બનાવે છે.", "ref": "Std 12 - પ્રકરણ 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "વિઘટન પ્રક્રિયા દરમિયાન નીચેના પૈકી કયા જોડકામાં રાસાયણિક પરિવર્તન અને તે માટે જવાબદાર સૂક્ષ્મજીવોની જોડી ખોટી છે?", "opts": ["સેલ્યુલોઝનું વિઘટન - ટ્રાઇકોડર્મા ફૂગ", "લિગ્નિનનું વિઘટન - બેસિડિયોમાયસીટીસ ફૂગ", "પ્રોટીનનું વિઘટન - નાઇટ્રોસોમોનાસ બેક્ટેરિયા", "ચરબીનું વિઘટન - સ્યુડોમોનાસ બેક્ટેરિયા"], "ans": 2, "exp": "પ્રોટીનનું વિઘટન મુખ્યત્વે પ્રોટીઓલાઇટિક બેક્ટેરિયા (જેમ કે બેસિલસ) અને ફૂગ દ્વારા થાય છે. નાઇટ્રોસોમોનાસ બેક્ટેરિયા નાઇટ્રિફિકેશન પ્રક્રિયામાં ભાગ લે છે, પ્રોટીનના વિઘટનમાં નહીં. બાકીના વિકલ્પો સાચી જોડીઓ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "એક જંગલની જમીનમાં પડેલા સૂકા પાંદડાઓનું વિઘટન થતું હોય ત્યારે નીચેના પૈકી કયું પરિબળ વિઘટનની ગતિને સૌથી વધુ ધીમું કરે છે?", "opts": ["જમીનનું pH 6.5 થી 7.5 ની વચ્ચે હોવું", "જમીનમાં ઓક્સિજનનું પ્રમાણ 5% કરતાં ઓછું હોવું", "જમીનનું તાપમાન 25°C થી 30°C ની વચ્ચે હોવું", "જમીનમાં ભેજનું પ્રમાણ 40% થી 60% ની વચ્ચે હોવું"], "ans": 1, "exp": "વિઘટન પ્રક્રિયા માટે ઓક્સિજન આવશ્યક છે. જ્યારે જમીનમાં ઓક્સિજનનું પ્રમાણ 5% કરતાં ઓછું હોય ત્યારે વિઘટકોની ક્રિયાશીલતા ઘટી જાય છે, જે વિઘટનની ગતિને ધીમી પાડે છે. pH 6.5-7.5, તાપમાન 25-30°C અને ભેજ 40-60% વિઘટન માટે અનુકૂળ પરિસ્થિતિઓ છે, તેથી આ પરિબળો વિઘટનને ધીમું કરતા નથી.", "ref": "Std 12 - પ્રકરણ 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન વિઘટન પ્રક્રિયા અને ઊર્જા પ્રવાહ વચ્ચેના સંબંધ માટે ખોટું છે?", "opts": ["વિઘટન પ્રક્રિયા દરમિયાન સૂર્યપ્રકાશમાંથી મેળવેલી ઊર્જાનો ઉપયોગ થતો નથી", "વિઘટકો દ્વારા મુક્ત થતી ઊર્જા ઇકોસિસ્ટમના ઊર્જા પ્રવાહમાં ફરીથી ઉપયોગમાં લેવાય છે", "વિઘટન પ્રક્રિયા દરમિયાન કાર્બનિક પદાર્થોનું અકાર્બનિક પદાર્થોમાં રૂપાંતરણ થાય છે, જે ઊર્જા મુક્ત કરે છે", "વિઘટન પ્રક્રિયા દરમિયાન ઉત્પન્ન થતી ઊર્જા પ્રાથમિક ઉત્પાદકો દ્વારા સીધી ઉપયોગમાં લેવાય છે"], "ans": 3, "exp": "વિઘટન પ્રક્રિયા દરમિયાન ઉત્પન્ન થતી ઊર્જા પ્રાથમિક ઉત્પાદકો દ્વારા સીધી ઉપયોગમાં લેવાતી નથી. આ ઊર્જા વિઘટકોના ચયાપચય માટે વપરાય છે અને ઇકોસિસ્ટમના ઊર્જા પ્રવાહમાં પરોક્ષ રીતે ફરીથી ઉપયોગમાં આવે છે. વિઘટનમાં સૂર્યપ્રકાશનો સીધો ઉપયોગ થતો નથી, અને કાર્બનિક પદાર્થોનું અકાર્બનિક પદાર્થોમાં રૂપાંતરણ ઊર્જા મુક્ત કરે છે.", "ref": "Std 12 - પ્રકરણ 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "નીચેના પૈકી કયું જોડકું વિઘટન પ્રક્રિયા દરમિયાન થતા રાસાયણિક પરિવર્તન અને તે માટે જવાબદાર ઉત્સેચકનું સાચું જોડાણ દર્શાવે છે?", "opts": ["સેલ્યુલોઝ → સેલ્યુલેઝ", "પ્રોટીન → લિપેઝ", "લિગ્નિન → એમાયલેઝ", "ચરબી → પ્રોટીએઝ"], "ans": 0, "exp": "સેલ્યુલોઝનું વિઘટન સેલ્યુલેઝ ઉત્સેચક દ્વારા થાય છે, જે સાચું જોડાણ છે. પ્રોટીનનું વિઘટન પ્રોટીએઝ દ્વારા થાય છે, લિપેઝ ચરબીનું વિઘટન કરે છે, લિગ્નિનનું વિઘટન લિગ્નિનેઝ દ્વારા થાય છે, અને એમાયલેઝ કાર્બોદિતનું વિઘટન કરે છે. તેથી અન્ય વિકલ્પો ખોટા છે.", "ref": "Std 12 - પ્રકરણ 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "એક સંશોધકે જંગલની જમીનમાં પડેલા સૂકા પાંદડાઓના વિઘટન દરમિયાન નીચેના અવલોકનો નોંધ્યા: (1) વિઘટનની પ્રક્રિયા શરૂ થયાના પ્રથમ બે અઠવાડિયામાં કાર્બન ડાયોક્સાઇડનું ઉત્સર્જન ઝડપથી વધ્યું, (2) ત્યારબાદ કાર્બન ડાયોક્સાઇડનું ઉત્સર્જન ઘટવા લાગ્યું અને મિથેનનું ઉત્પાદન શરૂ થયું. આ અવલોકનો માટે નીચેના પૈકી કયું કારણ સૌથી વધુ યોગ્ય છે?", "opts": ["પ્રથમ તબક્કામાં અવાયવીય વિઘટકો સક્રિય હતા, જ્યારે બીજા તબક્કામાં વાયવીય વિઘટકો સક્રિય બન્યા.", "પ્રથમ તબક્કામાં વાયવીય વિઘટકો દ્વારા કાર્બોદિતનું ઝડપી વિઘટન થયું, જ્યારે બીજા તબક્કામાં અવાયવીય વિઘટકો દ્વારા સેલ્યુલોઝ અને લિગ્નિનનું વિઘટન શરૂ થયું.", "પ્રથમ તબક્કામાં વાયવીય વિઘટકો દ્વારા કાર્બન ડાયોક્સાઇડનું ઉત્પાદન થયું, જ્યારે બીજા તબક્કામાં ઓક્સિજનની અછતને કારણે અવાયવીય વિઘટકો સક્રિય બન્યા અને મિથેનનું ઉત્પાદન શરૂ થયું.", "પ્રથમ તબક્કામાં વિઘટકોની સંખ્યા વધુ હતી, જ્યારે બીજા તબક્કામાં પોષક તત્ત્વોની અછતને કારણે વિઘટકોની ક્રિયાશીલતા ઘટી અને મિથેનનું ઉત્પાદન શરૂ થયું."], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. વિઘટનની પ્રક્રિયા દરમિયાન શરૂઆતમાં વાયવીય પરિસ્થિતિમાં વિઘટકો (જેમ કે બેક્ટેરિયા અને ફૂગ) કાર્બોદિતનું ઝડપી વિઘટન કરી કાર્બન ડાયોક્સાઇડ ઉત્પન્ન કરે છે. જ્યારે ઓક્સિજનની અછત થાય છે, ત્યારે અવાયવીય વિઘટકો સક્રિય બને છે અને મિથેનનું ઉત્પાદન શરૂ થાય છે. વિકલ્પ A ખોટો છે કારણ કે પ્રથમ તબક્કામાં વાયવીય વિઘટકો સક્રિય હોય છે, અવાયવીય નહીં. વિકલ્પ B ખોટો છે કારણ કે સેલ્યુલોઝ અને લિગ્નિનનું વિઘટન પ્રથમ તબક્કામાં ઓછું થાય છે. વિકલ્પ D ખોટો છે કારણ કે મિથેનનું ઉત્પાદન પોષક તત્ત્વોની અછતને કારણે નહીં, પરંતુ ઓક્સિજનની અછતને કારણે થાય છે.", "ref": "Std 12 - પ્રકરણ 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન વિઘટન પ્રક્રિયા અને પોષક તત્ત્વોના ચક્ર વચ્ચેના સંબંધ માટે ખોટું છે? (અપવાદરૂપ પરિસ્થિતિ ધ્યાનમાં લો)", "opts": ["વિઘટન પ્રક્રિયા દરમિયાન કાર્બનિક પદાર્થોનું અકાર્બનિક પદાર્થોમાં રૂપાંતર થાય છે, જે પોષક તત્ત્વોના ચક્રમાં ફરીથી ઉપયોગમાં લેવાય છે.", "વિઘટન પ્રક્રિયા દરમિયાન નાઇટ્રોજનનું ખનીજીકરણ થાય છે, જે વનસ્પતિઓ માટે સીધું ઉપલબ્ધ બને છે.", "વિઘટન પ્રક્રિયા દરમિયાન ફોસ્ફરસનું ખનીજીકરણ થતું નથી, કારણ કે ફોસ્ફરસનું ચક્ર વાતાવરણીય પ્રક્રિયાઓ પર આધારિત નથી.", "વિઘટન પ્રક્રિયા દરમિયાન સલ્ફરનું ઓક્સિડેશન થાય છે, જે સલ્ફેટના સ્વરૂપમાં વનસ્પતિઓ માટે ઉપલબ્ધ બને છે."], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. વિઘટન પ્રક્રિયા દરમિયાન ફોસ્ફરસનું ખનીજીકરણ થાય છે, કારણ કે વિઘટકો કાર્બનિક ફોસ્ફરસને અકાર્બનિક ફોસ્ફેટમાં રૂપાંતરિત કરે છે, જે વનસ્પતિઓ માટે ઉપલબ્ધ બને છે. ફોસ્ફરસનું ચક્ર વાતાવરણીય પ્રક્રિયાઓ પર આધારિત નથી, પરંતુ તેનું ખનીજીકરણ વિઘટન દ્વારા થાય છે. વિકલ્પ A, B અને D સાચાં છે કારણ કે વિઘટન દરમિયાન કાર્બન, નાઇટ્રોજન અને સલ્ફરનું ખનીજીકરણ થાય છે, જે પોષક તત્ત્વોના ચક્રમાં ફરીથી ઉપયોગમાં લેવાય છે.", "ref": "Std 12 - પ્રકરણ 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "વિઘટન પ્રક્રિયા દરમિયાન લિગ્નિન અને સેલ્યુલોઝના વિઘટન માટે નીચેના પૈકી કયા જીવોની જોડી સૌથી અસરકારક ગણવામાં આવે છે?", "opts": ["બેક્ટેરિયા અને ફંગી", "ફંગી અને એક્ટિનોમાઇસીટ્સ", "એક્ટિનોમાઇસીટ્સ અને પ્રોટોઝોઆ", "પ્રોટોઝોઆ અને વાયરસ"], "ans": 1, "exp": "લિગ્નિન અને સેલ્યુલોઝ જેવા જટિલ કાર્બોદિતોના વિઘટન માટે ફંગી (મુખ્યત્વે બસીડીઓમાઇસીટ્સ અને એસ્કોમાઇસીટ્સ) અને એક્ટિનોમાઇસીટ્સ (જેમ કે સ્ટ્રેપ્ટોમાઇસીસ) સૌથી અસરકારક વિઘટકો છે. ફંગી લિગ્નિનને તોડવા માટે લિગ્નિન પેરોક્સિડેઝ અને મેંગનીઝ પેરોક્સિડેઝ જેવા ઉત્સેચકો ઉત્પન્ન કરે છે, જ્યારે એક્ટિનોમાઇસીટ્સ સેલ્યુલોઝના વિઘટનમાં મદદ કરે છે. બેક્ટેરિયા પણ વિઘટનમાં ભાગ લે છે, પરંતુ ફંગી અને એક્ટિનોમાઇસીટ્સની જોડી સૌથી અસરકારક છે. પ્રોટોઝોઆ અને વાયરસ વિઘટન પ્રક્રિયામાં સીધી ભૂમિકા ભજવતા નથી.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "વિઘટન પ્રક્રિયા દરમિયાન નીચેના પૈકી કયા રાસાયણિક પરિવર્તન માટે સલ્ફર બેક્ટેરિયા જવાબદાર છે?", "opts": ["સલ્ફેટને સલ્ફાઇડમાં રૂપાંતરણ", "સલ્ફાઇડને સલ્ફેટમાં રૂપાંતરણ", "સલ્ફરને સલ્ફાઇડમાં રૂપાંતરણ", "સલ્ફેટને સલ્ફરમાં રૂપાંતરણ"], "ans": 1, "exp": "સલ્ફર બેક્ટેરિયા (જેમ કે થિયોબેસિલસ) સલ્ફાઇડને સલ્ફેટમાં ઓક્સિડાઇઝ કરવા માટે જવાબદાર છે. આ પ્રક્રિયા સલ્ફર ચક્રનો એક મહત્વપૂર્ણ ભાગ છે, જ્યાં સલ્ફાઇડને ઓક્સિજનની હાજરીમાં સલ્ફેટમાં રૂપાંતરિત કરવામાં આવે છે. બાકીના વિકલ્પો સલ્ફર ચક્રની અન્ય પ્રક્રિયાઓને દર્શાવે છે, પરંતુ સલ્ફર બેક્ટેરિયા દ્વારા થતી પ્રક્રિયા સલ્ફાઇડથી સલ્ફેટનું રૂપાંતરણ છે.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "વિઘટન પ્રક્રિયા દરમિયાન લિગ્નિનના વિઘટન માટે નીચેના પૈકી કયા જીવોની જરૂરિયાત સૌથી વધુ હોય છે, પરંતુ તેની ગેરહાજરીમાં પ્રક્રિયા અટકી જાય છે?", "opts": ["બેક્ટેરિયા (પ્સ્યુડોમોનાસ)", "ફંગી (વ્હાઇટ રોટ ફંગી)", "પ્રોટોઝોઆ", "વાયરસ"], "ans": 1, "exp": "લિગ્નિનનું વિઘટન મુખ્યત્વે ફંગી (વ્હાઇટ રોટ ફંગી) દ્વારા થાય છે, જેઓ લિગ્નિન-વિઘટક ઉત્સેચકો જેવા કે લેકેઝ અને પેરોક્સિડેઝ ઉત્પન્ન કરે છે. બેક્ટેરિયા (પ્સ્યુડોમોનાસ) પણ લિગ્નિનનું વિઘટન કરે છે, પરંતુ તેની ક્રિયાશીલતા ફંગી કરતાં ઓછી હોય છે. પ્રોટોઝોઆ અને વાયરસ લિગ્નિનના વિઘટનમાં સક્રિય ભૂમિકા ભજવતા નથી.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "જંગલની જમીનમાં પડેલા સૂકા પાંદડાઓના વિઘટન દરમિયાન, નીચેના પૈકી કયા જોડકામાં રાસાયણિક પરિવર્તન અને તે માટે જવાબદાર સૂક્ષ્મજીવોની યોગ્ય જોડણી કરેલી છે?", "opts": ["સેલ્યુલોઝ → ગ્લુકોઝ : એસિડોફિલિક બેક્ટેરિયા", "લિગ્નિન → હ્યુમિક એસિડ : બેસીડીઓમાઈસીટી ફંગી", "કિટિન → એમિનો એસિડ : નાઇટ્રોફિકેશન બેક્ટેરિયા", "હેમીસેલ્યુલોઝ → પેન્ટોઝ : મિથેનોજેનિક આર્કિયા"], "ans": 1, "exp": "લિગ્નિનનું વિઘટન બેસીડીઓમાઈસીટી (બસીડિયોમાઈસીટ્સ) ફંગી દ્વારા થાય છે, જે લિગ્નિનને હ્યુમિક એસિડમાં પરિવર્તિત કરે છે. સેલ્યુલોઝનું વિઘટન મુખ્યત્વે ફંગી અને બેક્ટેરિયા દ્વારા થાય છે, પરંતુ એસિડોફિલિક બેક્ટેરિયા સેલ્યુલોઝને ગ્લુકોઝમાં પરિવર્તિત કરતાં નથી. કિટિનનું વિઘટન કિટિનેઝ ઉત્સેચક દ્વારા થાય છે, જે મુખ્યત્વે ફંગી દ્વારા ઉત્પન્ન થાય છે, ન કે નાઇટ્રોફિકેશન બેક્ટેરિયા દ્વારા. હેમીસેલ્યુલોઝનું વિઘટન મિથેનોજેનિક આર્કિયા દ્વારા થતું નથી, પરંતુ બેક્ટેરિયા અને ફંગી દ્વારા થાય છે.", "ref": "Std 12 - અધ્યાય 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "વિઘટન પ્રક્રિયા દરમિયાન, નીચેના પૈકી કયા પરિબળને કારણે વિઘટકોની ક્રિયાશીલતા સૌથી ઓછી પ્રભાવિત થાય છે?", "opts": ["તાપમાન", "ભેજ", "ઓક્સિજનની ઉપલબ્ધતા", "પ્રકાશની તીવ્રતા"], "ans": 3, "exp": "વિઘટન પ્રક્રિયા મુખ્યત્વે તાપમાન, ભેજ અને ઓક્સિજનની ઉપલબ્ધતાથી પ્રભાવિત થાય છે. પ્રકાશની તીવ્રતા વિઘટન પ્રક્રિયા પર નગણ્ય પ્રભાવ પાડે છે, કેમ કે વિઘટકો (જેમ કે બેક્ટેરિયા અને ફંગી) પ્રકાશસંશ્લેષણ પર આધારિત નથી. તાપમાન અને ભેજ વિઘટકોની ઉત્સેચક ક્રિયાશીલતાને સીધા પ્રભાવિત કરે છે, જ્યારે ઓક્સિજનની ઉપલબ્ધતા એરોબિક અને એનેરોબિક વિઘટન પ્રક્રિયાઓને નક્કી કરે છે.", "ref": "Std 12 - અધ્યાય 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "જંગલની જમીનમાં પડેલા સૂકા પાંદડાઓના વિઘટન દરમિયાન, લિગ્નિનના વિઘટન માટે નીચેના પૈકી કયા ઉત્સેચકની જરૂર પડે છે?", "opts": ["સેલ્યુલેઝ", "લિગ્નિન પર્પલેક્સ", "એમાઇલેઝ", "પ્રોટીએઝ"], "ans": 1, "exp": "લિગ્નિનના વિઘટન માટે લિગ્નિન પર્પલેક્સ ઉત્સેચક જરૂરી છે, જે ફૂગ અને કેટલાક બેક્ટેરિયા દ્વારા ઉત્પન્ન થાય છે. સેલ્યુલેઝ સેલ્યુલોઝના વિઘટન માટે, એમાઇલેઝ કાર્બોદિતના વિઘટન માટે, અને પ્રોટીએઝ પ્રોટીનના વિઘટન માટે જવાબદાર છે.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "વિઘટન પ્રક્રિયા દરમિયાન, નીચેના પૈકી કયા પદાર્થનું વિઘટન સૌથી મુશ્કેલ છે અને તે માટે કયા જીવ જવાબદાર છે?", "opts": ["સેલ્યુલોઝ - બેક્ટેરિયા", "લિગ્નિન - ફૂગ", "પ્રોટીન - પ્રોટીઓલિટિક બેક્ટેરિયા", "લિપિડ - લિપેઝ ઉત્સેચક"], "ans": 1, "exp": "લિગ્નિનનું વિઘટન સૌથી મુશ્કેલ છે કારણ કે તેની રચના જટિલ અને મજબૂત હોય છે. ફૂગ (જેમ કે વ્હાઇટ રોટ ફૂગ) લિગ્નિનના વિઘટનમાં મહત્વની ભૂમિકા ભજવે છે. સેલ્યુલોઝ, પ્રોટીન અને લિપિડનું વિઘટન અનુક્રમે બેક્ટેરિયા, પ્રોટીઓલિટિક બેક્ટેરિયા અને લિપેઝ ઉત્સેચક દ્વારા થાય છે.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "વિઘટન પ્રક્રિયા દરમિયાન, નીચેના પૈકી કયા જોડકામાં રાસાયણિક પરિવર્તન અને તે માટે જવાબદાર જીવની યોગ્ય જોડી છે?", "opts": ["નાઇટ્રોજન સ્થિરીકરણ - રાઇઝોબિયમ", "સલ્ફર ઓક્સિડેશન - નાઇટ્રોસોમોનાસ", "કાર્બનિક પદાર્થનું વિઘટન - સાયનોબેક્ટેરિયા", "એમોનિયા ઓક્સિડેશન - લેક્ટોબેસિલસ"], "ans": 0, "exp": "નાઇટ્રોજન સ્થિરીકરણ માટે રાઇઝોબિયમ જવાબદાર છે, જે મટરકુળના મૂળમાં રહે છે. નાઇટ્રોસોમોનાસ એમોનિયાનું નાઇટ્રાઇટમાં ઓક્સિડેશન કરે છે, સાયનોબેક્ટેરિયા નાઇટ્રોજન સ્થિરીકરણમાં પણ ભાગ લે છે પરંતુ કાર્બનિક પદાર્થનું વિઘટન મુખ્યત્વે બેક્ટેરિયા અને ફૂગ દ્વારા થાય છે. લેક્ટોબેસિલસ દૂધના કિણવણમાં ભાગ લે છે, એમોનિયા ઓક્સિડેશનમાં નહીં.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "વિઘટન પ્રક્રિયા દરમિયાન, નીચેના પૈકી કયા રાસાયણિક પરિવર્તન માટે સલ્ફર બેક્ટેરિયા જવાબદાર છે?", "opts": ["સલ્ફેટને સલ્ફાઇડમાં રૂપાંતરણ", "સલ્ફાઇડને સલ્ફેટમાં ઓક્સિડેશન", "એમોનિયાને નાઇટ્રેટમાં ઓક્સિડેશન", "કાર્બન ડાયોક્સાઇડનું સ્થિરીકરણ"], "ans": 1, "exp": "સલ્ફર બેક્ટેરિયા (જેમ કે થિયોબેસિલસ) સલ્ફાઇડને સલ્ફેટમાં ઓક્સિડેશન કરે છે. સલ્ફેટને સલ્ફાઇડમાં રૂપાંતરણ અનોક્સિક સ્થિતિમાં થાય છે, એમોનિયાને નાઇટ્રેટમાં ઓક્સિડેશન નાઇટ્રોસોમોનાસ અને નાઇટ્રોબેક્ટર દ્વારા થાય છે, અને કાર્બન ડાયોક્સાઇડનું સ્થિરીકરણ પ્રકાશસંશ્લેષણ દરમિયાન થાય છે.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "જંગલની જમીનમાં પડેલા સૂકા પાંદડાઓના વિઘટન દરમિયાન, લિગ્નિન અને સેલ્યુલોઝના વિઘટન માટે નીચેના પૈકી કયા જીવોની જોડી સૌથી અસરકારક ગણવામાં આવે છે, જ્યારે તાપમાન ૨૫°C અને pH ૬.૫ હોય?", "opts": ["બેક્ટેરિયા અને ફંગી", "ફંગી અને પ્રોટોઝોઆ", "એક્ટિનોમાઇસીટ્સ અને ફંગી", "વાયરસ અને બેક્ટેરિયા"], "ans": 2, "exp": "લિગ્નિન અને સેલ્યુલોઝ જેવા જટિલ કાર્બનિક પદાર્થોના વિઘટન માટે એક્ટિનોમાઇસીટ્સ (Actinomycetes) અને ફંગી (Fungi) સૌથી અસરકારક વિઘટકો ગણવામાં આવે છે. એક્ટિનોમાઇસીટ્સ લિગ્નિનના વિઘટનમાં મહત્વની ભૂમિકા ભજવે છે, જ્યારે ફંગી (જેમ કે બાસીડીઓમાઈકોટા) સેલ્યુલોઝ અને હેમિસેલ્યુલોઝના વિઘટનમાં સક્રિય હોય છે. તાપમાન ૨૫°C અને pH ૬.૫ જેવા અનુકૂળ પર્યાવરણીય પરિબળોમાં આ જીવોની ક્રિયાશીલતા વધુ હોય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: A) બેક્ટેરિયા લિગ્નિનના વિઘટનમાં ઓછા અસરકારક હોય છે, B) પ્રોટોઝોઆ વિઘટન પ્રક્રિયામાં મુખ્ય ભૂમિકા ભજવતા નથી, D) વાયરસ વિઘટન પ્રક્રિયામાં સક્રિય ભૂમિકા ભજવતા નથી.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ (Ecosystem)", "ch": ""}, {"q": "એક ઇકોસિસ્ટમમાં વિઘટન પ્રક્રિયા દરમિયાન, નીચેના પૈકી કયા પદાર્થનું વિઘટન સૌથી મુશ્કેલ છે અને તે માટે જવાબદાર જીવોની સંખ્યા પણ સીમિત છે?", "opts": ["સેલ્યુલોઝ", "હેમિસેલ્યુલોઝ", "લિગ્નિન", "પ્રોટીન"], "ans": 2, "exp": "લિગ્નિનનું વિઘટન સૌથી મુશ્કેલ છે, કારણ કે તે એક જટિલ અને સ્થિર બાયોપોલિમર છે. લિગ્નિનના વિઘટન માટે વિશેષ ઉત્સેચકોની જરૂર હોય છે, જે ફક્ત કેટલાક ફંગી (જેમ કે વ્હાઇટ રોટ ફંગી) અને બેક્ટેરિયા દ્વારા ઉત્પન્ન થાય છે. સેલ્યુલોઝ, હેમિસેલ્યુલોઝ અને પ્રોટીનના વિઘટન માટે વધુ સરળતાથી ઉત્સેચકો મળી શકે છે, અને તેના વિઘટન માટે જવાબદાર જીવોની સંખ્યા પણ વધુ છે.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}, {"q": "એક ઇકોસિસ્ટમમાં વિઘટન પ્રક્રિયા દરમિયાન, નીચેના પૈકી કયા પરિબળને કારણે વિઘટકોની ક્રિયાશીલતા સૌથી ઓછી થાય છે?", "opts": ["જમીનમાં ઓક્સિજનની ઉચ્ચ સાંદ્રતા", "જમીનમાં કાર્બનિક પદાર્થની ઉચ્ચ સાંદ્રતા", "જમીનમાં pH 2 થી 3 (ખૂબ જ અમ્લીય)", "જમીનમાં તાપમાન 25°C થી 30°C"], "ans": 2, "exp": "વિઘટકોની ક્રિયાશીલતા પર વિવિધ પરિબળો પ્રભાવ પાડે છે. જમીનમાં ઓક્સિજનની ઉચ્ચ સાંદ્રતા, કાર્બનિક પદાર્થની ઉચ્ચ સાંદ્રતા અને મધ્યમ તાપમાન (25°C થી 30°C) વિઘટકોની ક્રિયાશીલતા વધારે છે. પરંતુ જમીનમાં ખૂબ જ અમ્લીય pH (2 થી 3) વિઘટકોની ક્રિયાશીલતા સૌથી ઓછી કરે છે, કારણ કે મોટાભાગના વિઘટકો અમ્લીય પરિસ્થિતિમાં કામ કરવા માટે અનુકૂળ નથી.", "ref": "Std 12 - Chapter 14: ઇકોસિસ્ટમ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
