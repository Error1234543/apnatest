<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primase</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Primase</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Primase</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "DNA પ્રતિકૃતિકરણ દરમિયાન પ્રાઇમેઝ ઉત્સેચકનું મુખ્ય કાર્ય કયું છે?", "opts": ["DNAની દ્વિગુણી સળીયાને તોડીને એકલ સળીયા બનાવવી", "RNA પ્રાઇમરની સંરચના કરવી જેથી DNA પોલિમરેઝ તેની શરૂઆત કરી શકે", "DNAની નવી સળીયાને સ્થિર કરવા માટે હાઇડ્રોજન બંધો બનાવવા", "DNAની તૂટેલી જગ્યાઓને જોડીને મુરત કરવી"], "ans": 1, "exp": "પ્રાઇમેઝ ઉત્સેચકનું મુખ્ય કાર્ય RNA પ્રાઇમરની સંરચના કરવી છે, જેથી DNA પોલિમરેઝ તેના પર કામ કરી શકે. A વિકલ્પ DNA હેલિકેઝનું કાર્ય છે. C વિકલ્પ DNA લાઇગેઝનું કાર્ય નથી, પરંતુ હાઇડ્રોજન બંધો સ્વતઃ બને છે. D વિકલ્પ DNA લાઇગેઝનું કાર્ય છે, પરંતુ તે પ્રાઇમેઝનું નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "પ્રાઇમેઝ ઉત્સેચક કયા પ્રકારનું ઉત્સેચક છે?", "opts": ["DNA-નિર્ભર RNA પોલિમરેઝ", "RNA-નિર્ભર DNA પોલિમરેઝ", "DNA-નિર્ભર DNA પોલિમરેઝ", "RNA-નિર્ભર RNA પોલિમરેઝ"], "ans": 0, "exp": "પ્રાઇમેઝ ઉત્સેચક DNA-નિર્ભર RNA પોલિમરેઝ છે, કારણ કે તે DNA ટેમ્પલેટ પરથી RNA પ્રાઇમરની સંરચના કરે છે. B વિકલ્પ રિવર્સ ટ્રાન્સક્રિપ્ટેઝનું લક્ષણ છે. C વિકલ્પ DNA પોલિમરેઝનું લક્ષણ છે. D વિકલ્પ RNA પોલિમરેઝનું લક્ષણ છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "યુકેરિયોટિક કોષોમાં પ્રાઇમેઝ ઉત્સેચક કયા અંગિક સાથે સંકળાયેલું હોય છે?", "opts": ["રાઇબોઝોમ", "માઇટોકોન્ડ્રિયા", "કોષકેન્દ્ર", "ગોલ્ગી કોથળી"], "ans": 2, "exp": "યુકેરિયોટિક કોષોમાં પ્રાઇમેઝ ઉત્સેચક કોષકેન્દ્ર સાથે સંકળાયેલું હોય છે, કારણ કે DNA પ્રતિકૃતિકરણ કોષકેન્દ્રમાં થાય છે. A વિકલ્પ પ્રોટીન સંશ્લેષણ સાથે સંકળાયેલું છે. B વિકલ્પ શક્તિ ઉત્પાદન સાથે સંકળાયેલું છે. D વિકલ્પ પ્રોટીન પેકેજિંગ સાથે સંકળાયેલું છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "પ્રાઇમેઝ ઉત્સેચક દ્વારા બનાવવામાં આવતો RNA પ્રાઇમર કેટલા ન્યુક્લિયોટાઇડનો હોય છે?", "opts": ["5-10 ન્યુક્લિયોટાઇડ", "10-15 ન્યુક્લિયોટાઇડ", "15-20 ન્યુક્લિયોટાઇડ", "20-25 ન્યુક્લિયોટાઇડ"], "ans": 1, "exp": "પ્રાઇમેઝ ઉત્સેચક દ્વારા બનાવવામાં આવતો RNA પ્રાઇમર સામાન્ય રીતે 10-15 ન્યુક્લિયોટાઇડનો હોય છે. A, C, અને D વિકલ્પો અયોગ્ય લંબાઈ દર્શાવે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "પ્રાઇમેઝ ઉત્સેચક કયા પ્રકારના DNA પ્રતિકૃતિકરણમાં ભાગ લે છે?", "opts": ["સંરક્ષણાત્મક પ્રતિકૃતિકરણ", "અસંરક્ષણાત્મક પ્રતિકૃતિકરણ", "અર્ધ-સંરક્ષણાત્મક પ્રતિકૃતિકરણ", "ઉપરના તમામ"], "ans": 2, "exp": "પ્રાઇમેઝ ઉત્સેચક અર્ધ-સંરક્ષણાત્મક પ્રતિકૃતિકરણમાં ભાગ લે છે, કારણ કે DNA પ્રતિકૃતિકરણ અર્ધ-સંરક્ષણાત્મક હોય છે. A અને B વિકલ્પો અયોગ્ય છે, કારણ કે DNA પ્રતિકૃતિકરણ હંમેશા અર્ધ-સંરક્ષણાત્મક હોય છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA પ્રતિકૃતિકરણ દરમિયાન પ્રાઇમેઝ ઉત્સેચક દ્વારા સિંથેસ થતો RNA પ્રાઇમર કયા દિશામાં વૃદ્ધિ પામે છે?", "opts": ["5’ → 3’ દિશામાં", "3’ → 5’ દિશામાં", "બંને દિશામાં સરખી ગતિએ", "પ્રાઇમરની દિશા પ્રતિકૃતિકરણની શરૂઆત પર નિર્ભર રહે છે"], "ans": 0, "exp": "પ્રાઇમેઝ ઉત્સેચક દ્વારા સિંથેસ થતો RNA પ્રાઇમર હંમેશા 5’ → 3’ દિશામાં વૃદ્ધિ પામે છે, કારણ કે RNA પોલિમરેઝ અને DNA પોલિમરેઝની જેમ જ તેના કેટાલિટિક ક્રિયા માટે 3’-OH ગ્રુપની જરૂર પડે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) 3’ → 5’ દિશા RNA સિંથેસ માટે શક્ય નથી, C) બંને દિશામાં વૃદ્ધિ થતી નથી, D) પ્રાઇમરની દિશા પ્રતિકૃતિકરણની શરૂઆત પર નિર્ભર નથી હોતી.", "ref": "Std 12 - Chapter 6: વંશવેલા અને જૈવ-તકનીકી (DNA પ્રતિકૃતિકરણ)", "ch": ""}, {"q": "પ્રાઇમેઝ ઉત્સેચક દ્વારા બનાવવામાં આવતો RNA પ્રાઇમર કયા ન્યુક્લિયોટાઇડથી શરૂ થાય છે?", "opts": ["એડેનિન (A)", "ગ્વાનિન (G)", "સાયટોસિન (C)", "થાયમિન (T)"], "ans": 1, "exp": "પ્રાઇમેઝ ઉત્સેચક દ્વારા બનાવવામાં આવતો RNA પ્રાઇમર સામાન્ય રીતે ગ્વાનિન (G) ન્યુક્લિયોટાઇડથી શરૂ થાય છે, કારણ કે પ્રાઇમેઝ ઉત્સેચક ગ્વાનિન-આધારિત પ્રાઇમર બનાવવા માટે પસંદગી દર્શાવે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: A) એડેનિનથી શરૂ થતો નથી, C) સાયટોસિનથી શરૂ થતો નથી, D) થાયમિન RNAમાં હાજર નથી.", "ref": "Std 12 - Chapter 6: વંશવેલા અને જૈવ-તકનીકી (DNA પ્રતિકૃતિકરણ)", "ch": ""}, {"q": "પ્રાઇમેઝ ઉત્સેચક કયા પ્રકારના DNA ટેમ્પલેટ પર કામ કરવાનું ટાળે છે?", "opts": ["એકલ-સૂત્રી DNA", "દ્વિ-સૂત્રી DNA", "RNA-DNA હાઇબ્રિડ", "સુપરકોઇલ્ડ DNA"], "ans": 2, "exp": "પ્રાઇમેઝ ઉત્સેચક RNA-DNA હાઇબ્રિડ ટેમ્પલેટ પર કામ કરવાનું ટાળે છે, કારણ કે તેના કેટાલિટિક ક્રિયા માટે શુદ્ધ DNA ટેમ્પલેટની જરૂર પડે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: A) એકલ-સૂત્રી DNA પર કામ કરે છે, B) દ્વિ-સૂત્રી DNA પર કામ કરે છે, D) સુપરકોઇલ્ડ DNA પર કામ કરે છે.", "ref": "Std 12 - Chapter 6: વંશવેલા અને જૈવ-તકનીકી (DNA પ્રતિકૃતિકરણ)", "ch": ""}, {"q": "પ્રાઇમેઝ ઉત્સેચકની ક્રિયા માટે કયા આયનની જરૂર પડે છે?", "opts": ["Mg²⁺", "Zn²⁺", "Ca²⁺", "Fe²⁺"], "ans": 0, "exp": "પ્રાઇમેઝ ઉત્સેચકની ક્રિયા માટે Mg²⁺ આયનની જરૂર પડે છે, કારણ કે તે DNA પોલિમરેઝ અને અન્ય ન્યુક્લિઓટાઇડ ટ્રાન્સફરેઝ ઉત્સેચકોની જેમ જ કોફેક્ટર તરીકે કામ કરે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) Zn²⁺ પ્રાઇમેઝ માટે જરૂરી નથી, C) Ca²⁺ પ્રાઇમેઝ માટે જરૂરી નથી, D) Fe²⁺ પ્રાઇમેઝ માટે જરૂરી નથી.", "ref": "Std 12 - Chapter 6: વંશવેલા અને જૈવ-તકનીકી (DNA પ્રતિકૃતિકરણ)", "ch": ""}, {"q": "પ્રાઇમેઝ ઉત્સેચક દ્વારા બનાવવામાં આવતો RNA પ્રાઇમર કયા ઉત્સેચક દ્વારા હટાવવામાં આવે છે?", "opts": ["DNA પોલિમરેઝ I", "DNA પોલિમરેઝ III", "હેલિકેઝ", "લાઇગેઝ"], "ans": 0, "exp": "પ્રાઇમેઝ ઉત્સેચક દ્વારા બનાવવામાં આવતો RNA પ્રાઇમર DNA પોલિમરેઝ I દ્વારા હટાવવામાં આવે છે, કારણ કે DNA પોલિમરેઝ Iમાં 5’ → 3’ એક્સોન્યુક્લિયેઝ ક્રિયા હોય છે જે RNA પ્રાઇમરને હટાવે છે અને DNA ન્યુક્લિયોટાઇડથી બદલે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) DNA પોલિમરેઝ III પ્રાઇમર હટાવતું નથી, C) હેલિકેઝ DNAને અનવાઇન્ડ કરે છે, D) લાઇગેઝ DNA ટુકડાઓને જોડે છે.", "ref": "Std 12 - Chapter 6: વંશવેલા અને જૈવ-તકનીકી (DNA પ્રતિકૃતિકરણ)", "ch": ""}, {"q": "પ્રાઇમેઝ ઉત્સેચકની ક્રિયા માટે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["તે DNA ટેમ્પલેટ પર RNA પ્રાઇમરની સિંથેસ કરે છે", "તે 3’ → 5’ દિશામાં કામ કરે છે", "તે ડિઓક્સીરાઇબોન્યુક્લિયોટાઇડને જોડે છે", "તે DNA પોલિમરેઝ માટે પ્રારંભ બિંદુ તૈયાર કરે છે"], "ans": 2, "exp": "પ્રાઇમેઝ ઉત્સેચક RNA પ્રાઇમરની સિંથેસ કરે છે, જે રાઇબોન્યુક્લિયોટાઇડથી બનેલો હોય છે, ડિઓક્સીરાઇબોન્યુક્લિયોટાઇડથી નહીં. તે DNA ટેમ્પલેટ પર કામ કરે છે, 5’ → 3’ દિશામાં RNA પ્રાઇમર બનાવે છે (અહીં 3’ → 5’ દિશા ખોટી છે), અને DNA પોલિમરેઝ માટે પ્રારંભ બિંદુ તૈયાર કરે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "યુકેરિયોટિક કોષોમાં, પ્રાઇમેઝ ઉત્સેચકની ક્રિયા નીચેનામાંથી કયા પરિબળ દ્વારા અવરોધાય છે?", "opts": ["DNA ટેમ્પલેટ પર અતિરિક્ત G-C બેઝ જોડાણો", "DNA ટેમ્પલેટ પર સિંગલ-સ્ટ્રેન્ડ બ્રેક", "DNA ટેમ્પલેટ પર મિથાઇલેશન", "DNA ટેમ્પલેટ પર હાઇપરકોઇલિંગ"], "ans": 1, "exp": "પ્રાઇમેઝ ઉત્સેચકને સિંગલ-સ્ટ્રેન્ડ બ્રેક વાળા DNA ટેમ્પલેટ પર કામ કરવું અશક્ય હોય છે, કારણ કે તેને સતત અને અખંડિત ટેમ્પલેટની જરૂર પડે છે. G-C બેઝ જોડાણો, મિથાઇલેશન, અને હાઇપરકોઇલિંગ પ્રાઇમેઝની ક્રિયાને અસર કરતાં નથી, પરંતુ સિંગલ-સ્ટ્રેન્ડ બ્રેક તેની ક્રિયાને અવરોધે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પ્રાઇમેઝ ઉત્સેચક અને DNA પોલિમરેઝ વચ્ચેનો મુખ્ય તફાવત સૂચવે છે?", "opts": ["પ્રાઇમેઝ ઉત્સેચક RNA પ્રાઇમર બનાવે છે, જ્યારે DNA પોલિમરેઝ DNAને સિંથેસ કરે છે", "પ્રાઇમેઝ ઉત્સેચકને પ્રૂફરીડીંગ ક્ષમતા હોય છે, જ્યારે DNA પોલિમરેઝને નહીં", "પ્રાઇમેઝ ઉત્સેચક 5’ → 3’ દિશામાં કામ કરે છે, જ્યારે DNA પોલિમરેઝ 3’ → 5’ દિશામાં કામ કરે છે", "પ્રાઇમેઝ ઉત્સેચકને Mg²⁺ આયનની જરૂર પડે છે, જ્યારે DNA પોલિમરેઝને Zn²⁺ આયનની જરૂર પડે છે"], "ans": 0, "exp": "પ્રાઇમેઝ ઉત્સેચક RNA પ્રાઇમરની સિંથેસ કરે છે, જ્યારે DNA પોલિમરેઝ DNAની સિંથેસ કરે છે. પ્રૂફરીડીંગ ક્ષમતા DNA પોલિમરેઝમાં જોવા મળે છે, પ્રાઇમેઝમાં નહીં. બંને ઉત્સેચકો 5’ → 3’ દિશામાં કામ કરે છે, અને બંનેને Mg²⁺ આયનની જરૂર પડે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "પ્રાઇમેઝ ઉત્સેચક દ્વારા સિંથેસ થતો RNA પ્રાઇમર નીચેનામાંથી કયા પરિસ્થિતિમાં સૌથી ઓછો સ્થિર હોય છે?", "opts": ["ઉચ્ચ તાપમાને (70°C)", "નીચા pH (4.0) પર", "ઉચ્ચ Mg²⁺ સાંદ્રતામાં", "DNA-RNA હાઇબ્રિડ દ્વિગુણ હેલિક્સમાં"], "ans": 0, "exp": "RNA પ્રાઇમર ઉચ્ચ તાપમાને (70°C) અસ્થિર બને છે, કારણ કે RNA અણુઓ ઉચ્ચ તાપમાને વિખંડિત થઈ જાય છે. નીચા pH પર RNA અસ્થિર બનવાનું કારણ નથી, ઉચ્ચ Mg²⁺ સાંદ્રતા RNAને સ્થિર કરે છે, અને DNA-RNA હાઇબ્રિડ દ્વિગુણ હેલિક્સમાં RNA પ્રાઇમર સ્થિર હોય છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA પ્રતિકૃતિકરણ દરમિયાન, પ્રાઇમેઝ ઉત્સેચક દ્વારા સિંથેસ થતો RNA પ્રાઇમર નીચેનામાંથી કયા કિસ્સામાં સૌથી લાંબો હોઈ શકે છે?", "opts": ["લીડિંગ સ્ટ્રેન્ડ પર", "લેગિંગ સ્ટ્રેન્ડ પર જ્યાં ઓકાઝાકી ફ્રેગમેન્ટ્સ નજીક નજીક હોય", "ટેલોમિયર પ્રદેશમાં", "સિંગલ-સ્ટ્રેન્ડ બ્રેક રિપેર દરમિયાન"], "ans": 2, "exp": "પ્રાઇમેઝ ઉત્સેચક દ્વારા સિંથેસ થતો RNA પ્રાઇમર ટેલોમિયર પ્રદેશમાં સૌથી લાંબો હોઈ શકે છે કારણ કે ટેલોમિયર પ્રદેશમાં DNA પ્રતિકૃતિકરણ દરમિયાન લેગિંગ સ્ટ્રેન્ડ પર અવારનવાર પ્રાઇમરની જરૂર પડે છે અને પ્રાઇમેઝ ઉત્સેચકને વધુ લાંબો RNA પ્રાઇમર બનાવવાની તક મળે છે. A) લીડિંગ સ્ટ્રેન્ડ પર પ્રાઇમર ઓછો લાંબો હોય છે કારણ કે ત્યાં સતત સિંથેસ થાય છે. B) લેગિંગ સ્ટ્રેન્ડ પર ઓકાઝાકી ફ્રેગમેન્ટ્સ નજીક હોવા છતાં પ્રાઇમર લંબાઈ મર્યાદિત હોય છે. D) સિંગલ-સ્ટ્રેન્ડ બ્રેક રિપેર દરમિયાન પ્રાઇમર લંબાઈ સામાન્ય રીતે ઓછી હોય છે.", "ref": "Std 12 - અધ્યાય 6: વંશવહનનું આણ્વિક આધાર", "ch": ""}, {"q": "પ્રાઇમેઝ ઉત્સેચક દ્વારા સિંથેસ થતો RNA પ્રાઇમર કયા પરિસ્થિતિમાં DNA ટેમ્પલેટ પર બંધન કરવાનું ટાળે છે જ્યારે ટેમ્પલેટ પર પહેલેથી જ RNA પ્રાઇમર હાજર હોય?", "opts": ["જ્યારે DNA ટેમ્પલેટ પર G-સમૃદ્ધ પ્રદેશ હોય", "જ્યારે DNA ટેમ્પલેટ પર પહેલેથી જ RNA પ્રાઇમર હાજર હોય", "જ્યારે DNA ટેમ્પલેટ પર અતિશય સ્પાઇરલ હોય", "જ્યારે DNA ટેમ્પલેટ પર મિથાઇલેશન હોય"], "ans": 1, "exp": "પ્રાઇમેઝ ઉત્સેચક DNA ટેમ્પલેટ પર પહેલેથી હાજર RNA પ્રાઇમરની હાજરીમાં બંધન કરવાનું ટાળે છે, કારણ કે તેની ક્રિયા માટે મુક્ત 3'-OH ગ્રુપની જરૂર હોય છે. G-સમૃદ્ધ પ્રદેશ, અતિશય સ્પાઇરલ, અથવા મિથાઇલેશન પ્રાઇમેઝની ક્રિયાને અસર કરતું નથી, પરંતુ પહેલેથી હાજર RNA પ્રાઇમર તેની ક્રિયાને અટકાવે છે.", "ref": "Std 12 - અધ્યાય 6: વંશાવળી અને આણ્વિક આનુવંશિકતા", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પ્રાઇમેઝ ઉત્સેચક અને DNA પોલિમરેઝ II વચ્ચેનો સરખામણી સૂચવે છે?", "opts": ["બંને RNA પ્રાઇમરનું સિંથેસ કરે છે", "પ્રાઇમેઝ ઉત્સેચક RNA પ્રાઇમરનું સિંથેસ કરે છે, જ્યારે DNA પોલિમરેઝ II DNAની દુરુસ્તી કરે છે", "બંને DNA ટેમ્પલેટ પર 5' થી 3' દિશામાં કામ કરે છે", "બંને 3' થી 5' એક્સોન્યુક્લિયેઝ ક્રિયાશીલતા ધરાવે છે"], "ans": 1, "exp": "પ્રાઇમેઝ ઉત્સેચકનું કાર્ય RNA પ્રાઇમરનું સિંથેસ કરવું છે, જ્યારે DNA પોલિમરેઝ IIનું કાર્ય DNAની દુરુસ્તી અને પ્રતિકૃતિકરણ છે. A ખોટું છે કારણ કે DNA પોલિમરેઝ II RNA પ્રાઇમરનું સિંથેસ કરતું નથી. C ખોટું છે કારણ કે પ્રાઇમેઝ 5' થી 3' દિશામાં કામ કરે છે, પરંતુ DNA પોલિમરેઝ II 3' થી 5' દિશામાં દુરુસ્તી કરે છે. D ખોટું છે કારણ કે પ્રાઇમેઝમાં એક્સોન્યુક્લિયેઝ ક્રિયાશીલતા નથી.", "ref": "Std 12 - અધ્યાય 6: વંશાવળી અને આણ્વિક આનુવંશિકતા", "ch": ""}, {"q": "પ્રાઇમેઝ ઉત્સેચકની ક્રિયા માટે નીચેનામાંથી કયું પરિબળ સૌથી મહત્વનું છે જ્યારે DNA પ્રતિકૃતિકરણ દરમિયાન ટેમ્પલેટ પર અસાધારણ રચના (જેવી કે હેરપિન) હોય?", "opts": ["Mg²⁺ આયનની હાજરી", "DNA ટેમ્પલેટની સ્થિરતા", "પ્રાઇમેઝ ઉત્સેચકની સાંદ્રતા", "RNA પ્રાઇમરની લંબાઈ"], "ans": 1, "exp": "DNA ટેમ્પલેટની સ્થિરતા પ્રાઇમેઝ ઉત્સેચકની ક્રિયા માટે મહત્વપૂર્ણ છે, ખાસ કરીને જ્યારે ટેમ્પલેટ પર અસાધારણ રચના (જેવી કે હેરપિન) હોય. Mg²⁺ આયનની હાજરી પ્રાઇમેઝની ક્રિયા માટે જરૂરી છે, પરંતુ તે અસાધારણ રચનાને અસર કરતું નથી. પ્રાઇમેઝની સાંદ્રતા અને RNA પ્રાઇમરની લંબાઈ પણ મહત્વપૂર્ણ છે, પરંતુ ટેમ્પલેટની સ્થિરતા સૌથી મહત્વપૂર્ણ પરિબળ છે.", "ref": "Std 12 - અધ્યાય 6: વંશાવળી અને આણ્વિક આનુવંશિકતા", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પ્રાઇમેઝ ઉત્સેચકની ક્રિયા માટે સત્ય નથી જ્યારે તે DNA પ્રતિકૃતિકરણ દરમિયાન કામ કરે છે?", "opts": ["તે DNA ટેમ્પલેટ પર 5' થી 3' દિશામાં RNA પ્રાઇમરનું સિંથેસ કરે છે", "તે DNA ટેમ્પલેટ પર પાયરિમિડીન-પુરીન યુગ્મોની હાજરીમાં સક્રિય થાય છે", "તે DNA ટેમ્પલેટ પર પહેલેથી હાજર RNA પ્રાઇમરની હાજરીમાં સક્રિય થાય છે", "તે DNA ટેમ્પલેટ પર ગુજરાતી પ્રદેશોમાં સક્રિય થાય છે જ્યાં A-T સંપૂર્ણપણે હાજર હોય"], "ans": 2, "exp": "પ્રાઇમેઝ ઉત્સેચક DNA ટેમ્પલેટ પર પહેલેથી હાજર RNA પ્રાઇમરની હાજરીમાં સક્રિય થતું નથી, કારણ કે તેની ક્રિયા માટે મુક્ત 3'-OH ગ્રુપની જરૂર હોય છે. A, B, અને D સત્ય છે: પ્રાઇમેઝ 5' થી 3' દિશામાં કામ કરે છે, પાયરિમિડીન-પુરીન યુગ્મોની હાજરીમાં સક્રિય થાય છે, અને A-T સમૃદ્ધ પ્રદેશોમાં સક્રિય થાય છે.", "ref": "Std 12 - અધ્યાય 6: વંશાવળી અને આણ્વિક આનુવંશિકતા", "ch": ""}, {"q": "DNA પ્રતિકૃતિકરણ દરમિયાન, પ્રાઇમેઝ ઉત્સેચક દ્વારા સર્જાતા RNA પ્રાઇમરની લંબાઈ અને સ્થિરતા માટે નીચેનામાંથી કયું પરિબળ સૌથી વધુ જવાબદાર છે, જે પ્રોકેરિયોટિક અને યુકે let userAns={},curIdx=0;

function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;

  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';

    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}

  }).join('');

}

  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
