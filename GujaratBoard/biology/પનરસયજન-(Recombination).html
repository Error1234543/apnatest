<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પુનર્સંયોજન (Recombination)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>પુનર્સંયોજન (Recombination)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">પુનર્સંયોજન (Recombination)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "પુનર્સંયોજન દરમિયાન કયા ઉત્સેચક દ્વારા DNA ની દ્વિગુણી સાંકળમાં એકલ સાંકળમાં કાપ મૂકવામાં આવે છે, જેથી ક્રોસિંગ ઓવર થઈ શકે?", "opts": ["DNA પોલિમરેઝ", "રેસ્ટ્રિકશન એન્ડોન્યુક્લિયેઝ", "રેકોમ્બિનેઝ", "લાયગેઝ"], "ans": 2, "exp": "પુનર્સંયોજન પ્રક્રિયામાં રેકોમ્બિનેઝ ઉત્સેચક DNA ની દ્વિગુણી સાંકળમાં એકલ સાંકળમાં કાપ મૂકીને ક્રોસિંગ ઓવર સહાયક બનાવે છે. DNA પોલિમરેઝ DNA ની નકલ કરે છે, રેસ્ટ્રિકશન એન્ડોન્યુક્લિયેઝ વિદેશી DNA કાપે છે, અને લાયગેઝ DNA ના ટુકડાઓ જોડે છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "હોમોલોગસ ક્રોમોઝોમ્સ વચ્ચે ક્રોસિંગ ઓવર થવાનું મુખ્ય કારણ કયું છે?", "opts": ["કોષવિભાજન દરમિયાન વર્ણસૂત્રોની ગતિ", "હોમોલોગસ ક્રોમોઝોમ્સ વચ્ચે જનીનના વિનિમય માટે સાયનેપ્ટોનેમલ કોમ્પ્લેક્સનું નિર્માણ", "DNA ની નકલ દરમિયાન થતી ભૂલો", "મ્યુટેશન દરમિયાન થતી જનીનની ફેરફારો"], "ans": 1, "exp": "હોમોલોગસ ક્રોમોઝોમ્સ વચ્ચે ક્રોસિંગ ઓવર સાયનેપ્ટોનેમલ કોમ્પ્લેક્સ દ્વારા થાય છે, જે જનીનના વિનિમયને સહાયક બનાવે છે. કોષવિભાજન દરમિયાન વર્ણસૂત્રોની ગતિ, DNA ની નકલ દરમિયાન ભૂલો, અને મ્યુટેશન ક્રોસિંગ ઓવરના મુખ્ય કારણ નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "પુનર્સંયોજન દરમિયાન કયા પગલામાં હોલિડે જંકશન બનાવવામાં આવે છે?", "opts": ["સિંગલ-સ્ટ્રેન્ડ બ્રેક નિર્માણ", "ડબલ-સ્ટ્રેન્ડ બ્રેક નિર્માણ", "સ્ટ્રેન્ડ ઇન્વેઝન", "રેસોલ્યુશન ઓફ ક્રોસિંગ ઓવર"], "ans": 2, "exp": "હોલિડે જંકશન સ્ટ્રેન્ડ ઇન્વેઝન પગલામાં બનાવવામાં આવે છે, જ્યારે એક સાંકળ બીજી સાંકળમાં પ્રવેશ કરે છે. સિંગલ-સ્ટ્રેન્ડ બ્રેક, ડબલ-સ્ટ્રેન્ડ બ્રેક, અને રેસોલ્યુશન ઓફ ક્રોસિંગ ઓવર હોલિડે જંકશન નિર્માણના પગલા નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "કયા પ્રકારના પુનર્સંયોજનમાં બેક્ટરિયામાં હોરિઝોન્ટલ જીન ટ્રાન્સફર થાય છે?", "opts": ["હોમોલોગસ પુનર્સંયોજન", "સાઇટ-સ્પેસિફિક પુનર્સંયોજન", "ટ્રાન્સપોઝિશન", "કોન્જ્યુગેશન, ટ્રાન્સડકશન, અને ટ્રાન્સફોર્મેશન"], "ans": 3, "exp": "બેક્ટરિયામાં હોરિઝોન્ટલ જીન ટ્રાન્સફર કોન્જ્યુગેશન, ટ્રાન્સડકશન, અને ટ્રાન્સફોર્મેશન દ્વારા થાય છે. હોમો ેપ્ટિક પગલામાં", "સાઇટ-સ્પેસિફિક પુનર્સંયોજન દરમિયાન ક્રોસિંગ ઓવર પગલામાં", "હોમોલોગસ પુનર્સંયોજન દરમિયાન પોસ્ટ-સિનેપ્ટિક પગલામાં", "ટ્રાન્સપોઝન દરમિયાન ઇન્ટિગ્રેશન પગલામાં"], "ans": 0, "exp": "હોમોલોગસ પુનર્સંયોજન દરમિયાન પ્રી-સિનેપ્ટિક પગલામાં 'રેકબીનેશન નોડ્યુલ' ની રચના થાય છે, જે હોમોલોગસ વર્ણસૂત્રો વચ્ચેની અદલાબદલીને સુગમ બનાવે છે. બાકીના વિકલ્પો અયોગ્ય છે કારણ કે: B) સાઇટ-સ્પેસિફિક પુનર્સંયોજનમાં ક્રોસિંગ ઓવર થતું નથી, C) પોસ્ટ-સિનેપ્ટિક પગલામાં રેકબીનેશન નોડ્યુલ બનતું નથી, D) ટ્રાન્સપોઝનમાં ઇન્ટિગ્રેશન પગલામાં આ રચના જોવા મળતી નથી.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "બેક્ટરિયામાં, કયા પ્રકારના પુનર્સંયોજનમાં 'રેકA' પ્રોટીનની ભૂમિકા મહત્વપૂર્ણ નથી?", "opts": ["હોમોલોગસ પુનર્સંયોજન", "ટ્રાન્સફોર્મેશન", "ટ્રાન્સડક્શન", "કોન્જ્યુગેશન"], "ans": 3, "exp": "'રેકA' પ્રોટીન હોમોલોગસ પુનર્સંયોજન, ટ્રાન્સફોર્મેશન અને ટ્રાન્સડક્શનમાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે, પરંતુ કોન્જ્યુગેશનમાં તેની ભૂમિકા નગણ્ય છે. કોન્જ્યુગેશનમાં F-પ્લાઝમિડ દ્વારા DNA ટ્રાન્સફર થાય છે, જેમાં રેકA પ્રોટીનની જરૂર પડતી નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક આનુવંશિકતા", "ch": ""}, {"q": "પુનર્સંયોજન દરમિયાન, કયા પ્રકારના DNA નુકસાનને 'નોન-હોમોલોગસ એન્ડ જોઈનિંગ' (NHEJ) દ્વારા દુરુસ્ત કરવામાં આવે છે, પરંતુ તે દરમિયાન જનીનની ક્રમમાં ભૂલો થવાની શક્યતા રહે છે?", "opts": ["સિંગલ-સ્ટ્રેન્ડ બ્રેક", "ડબલ-સ્ટ્રેન્ડ બ્રેક (DSB) જ્યાં હોમોલોગસ ટેમ્પલેટ ઉપલબ્ધ ન હોય", "ઓક્સિડેટિવ ડેમેજ", "થાયમિન ડાઇમર"], "ans": 1, "exp": "NHEJ (નોન-હોમોલોગસ એન્ડ જોઈનિંગ) ડબલ-સ્ટ્રેન્ડ બ્રેક (DSB) ને દુરુસ્ત કરે છે, ખાસ કરીને જ્યારે હોમોલોગસ ટેમ્પલેટ ઉપલબ્ધ ન હોય. આ પ્રક્રિયામાં જનીનની ક્રમમાં ભૂલો થવાની શક્યતા રહે છે. બાકીના વિકલ્પો અયોગ્ય છે કારણ કે: A) સિંગલ-સ્ટ્રેન્ડ બ્રેકને NHEJ દ્વારા દુરુસ્ત કરાતું નથી, C) ઓક્સિડેટિવ ડેમેજને બીજી પ્રક્રિયાઓ દ્વારા દુરુસ્ત કરવામાં આવે છે, D) થાયમિન ડાઇમરને ફોટોલાયસ પ્રક્રિયા દ્વારા દુરુસ્ત કરવામાં આવે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક આનુવંશિકતા", "ch": ""}, {"q": "પુનર્સંયોજન પ્રક્રિયા દરમિયાન, હોમોલોગસ વર્ણસૂત્રો વચ્ચે ક્રોસિંગ ઓવર થાય છે, પરંતુ કયા પ્રકારના પુનર્સંયોજનમાં વર્ણસૂત્રોની સમાનતા (હોમોલોજી) જરૂરી નથી?", "opts": ["હોમોલોગસ પુનર્સંયોજન", "સાઇટ-સ્પેસિફિક પુનર્સંયોજન", "ટ્રાન્સપોઝન-મેડિયેટેડ પુનર્સંયોજન", "ઇલેગિટિમેટ પુનર્સંયોજન"], "ans": 3, "exp": "ઇલેગિટિમેટ પુનર્સંયોજન (Non-homologous recombination)માં વર્ણસૂત્રોની સમાનતા જરૂરી નથી. આ પ્રકારનું પુનર્સંયોજન હોમોલોજી વગરના વિસ્તારોમાં થાય છે. હોમોલોગસ પુનર્સંયોજન (A)માં હોમોલોજી જરૂરી છે. સાઇટ-સ્પેસિફિક પુનર્સંયોજન (B)માં સ્પષ્ટ સ્થાનો પર પુનર્સંયોજન થાય છે, પરંતુ તે હોમોલોજી પર આધારિત નથી. ટ્રાન્સપોઝન-મેડિયેટેડ પુનર્સંયોજન (C)માં ટ્રાન્સપોઝન એલિમેન્ટ્સ દ્વારા પુનર્સંયોજન થાય છે, પરંતુ તે હોમોલોજી પર આધારિત નથી.", "ref": "Std 12 - અધ્યાય 5: આનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "બેક્ટરિયામાં, કયા પ્રકારના પુનર્સંયોજનમાં 'રેકબીનેશન નોડ્યુલ' (Recombination Nodule) ની રચના થતી નથી?", "opts": ["હોમોલોગસ પુનર્સંયોજન", "સાઇટ-સ્પેસિફિક પુનર્સંયોજન", "ટ્રાન્સફોર્મેશન", "ટ્રાન્સડક્શન"], "ans": 1, "exp": "સાઇટ-સ્પેસિફિક પુનર્સંયોજન (B)માં 'રેકબીનેશન નોડ્યુલ' ની રચના થતી નથી, કારણ કે આ પ્રકારનું પુનર્સંયોજન સ્પષ્ટ સ્થાનો પર થાય છે અને હોમોલોજી પર આધારિત નથી. હોમોલોગસ પુનર્સંયોજન (A)માં રેકબીનેશન નોડ્યુલ બનાવવામાં આવે છે. ટ્રાન્સફોર્મેશન (C) અને ટ્રાન્સડક્શન (D)માં પણ રેકબીનેશન નોડ્યુલ બનાવવામાં આવે છે, કારણ કે તે હોમોલોગસ પુનર્સંયોજન સાથે સંકળાયેલા છે.", "ref": "Std 12 - અધ્યાય 5: આનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "પુનર્સંયોજન પ્રક્રિયા દરમિયાન, કયા પ્રોટીન દ્વારા ડબલ-સ્ટ્રેન્ડ બ્રેકની માહિતી ઓળખવામાં આવે છે અને તેની માહિતીને આગળ પહોંચાડવામાં આવે છે?", "opts": ["રેકA પ્રોટીન", "રેડ51 પ્રોટીન", "ATM કિનેઝ", "DNA પોલિમરેઝ"], "ans": 2, "exp": "ATM કિનેઝ (C) દ્વારા ડબલ-સ્ટ્રેન્ડ બ્રેકની માહિતી ઓળખવામાં આવે છે અને તેની માહિતીને આગળ પહોંચાડવામાં આવે છે. રેકA પ્રોટીન (A) અને રેડ51 પ્રોટીન (B) હોમોલોગસ પુનર્સંયોજનમાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે, પરંતુ ડબલ-સ્ટ્રેન્ડ બ્રેકની માહિતી ઓળખવામાં નથી. DNA પોલિમરેઝ (D) DNA ની દ્વિગુણી સાંકળ બનાવવામાં મહત્વપૂર્ણ છે, પરંતુ ડબલ-સ્ટ્રેન્ડ બ્રેકની માહિતી ઓળખવામાં નથી.", "ref": "Std 12 - અધ્યાય 5: આનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "પુનર્સંયોજન દરમિયાન, કયા પ્રકારના પુનર્સંયોજનમાં બેક્ટરિયામાં હોરિઝોન્ટલ જીન ટ્રાન્સફર થતું નથી?", "opts": ["ટ્રાન્સફોર્મેશન", "ટ્રાન્સડક્શન", "કોન્જ્યુગેશન", "હોમોલોગસ પુનર્સંયોજન"], "ans": 3, "exp": "હોમોલોગસ પુનર્સંયોજન (D)માં બેક્ટરિયામાં હોરિઝોન્ટલ જીન ટ્રાન્સફર થતું નથી. ટ્રાન્સફોર્મેશન (A), ટ્રાન્સડક્શન (B), અને કોન્જ્યુગેશન (C)માં હોરિઝોન્ટલ જીન ટ્રાન્સફર થાય છે, જ્યારે હોમોલોગસ પુનર્સંયોજન એક કોષમાં જ થાય છે.", "ref": "Std 12 - અધ્યાય 5: આનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન પુનર્સંયોજન (Recombination) માટે અયોગ્ય છે?\nI. મિયોસિસ-I ના પ્રોફેઝ-I ના પેકિટેન તબક્કામાં હોમોલોગસ વર્ણસૂત્રો વચ્ચે ક્રોસિંગ ઓવર થાય છે.\nII. બેક્ટરિયામાં સાઇટ-સ્પેસિફિક પુનર્સંયોજન દરમિયાન 'રેકA' પ્રોટીનની ભૂમિકા મહત્વપૂર્ણ હોય છે.\nIII. યુકેરિયોટ્સમાં, હોમોલોગસ પુનર્સંયોજન દરમિયાન 'રેકબીનેશન નોડ્યુલ' ની રચના થાય છે.\nIV. નોન-હોમોલોગસ એન્ડ જોઈનિંગ (NHEJ) પદ્ધતિ દ્વારા ડબલ-સ્ટ્રેન્ડ બ્રેકનું સમારકામ થાય છે, પરંતુ તેમાં જનીનિક વિવિધતા ઉત્પન્ન થતી નથી.", "opts": ["ફક્ત II અને III", "ફક્ત II", "ફક્ત I અને IV", "ફક્ત III અને IV"], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B (ફક્ત II) છે.\n\nકારણો:\n- વિધાન I: સાચું છે. મિયોસિસ-I ના પ્રોફેઝ-I ના પેકિટેન તબક્કામાં હોમોલોગસ વર્ણસૂત્રો વચ્ચે ક્રોસિંગ ઓવર થાય છે, જે પુનર્સંયોજનનું મુખ્ય ઉદાહરણ છે.\n\n- વિધાન II: ખોટું છે. બેક્ટરિયામાં સાઇટ-સ્પેસિફિક પુનર્સંયોજન (જેમ કે લેમ્બડા ફેજનું એકીકરણ) દરમિયાન 'રેકA' પ્રોટીનની ભૂમિકા મહત્વપૂર્ણ નથી. 'રેકA' પ્રોટીન સામાન્ય રીતે હોમોલોગસ પુનર્સંયોજનમાં ભાગ લે છે, જ્યારે સાઇટ-સ્પેસિફિક પુનર્સંયોજનમાં 'ઇન્ટિગ્રેઝ' ઉત્સેચક મહત્વનો હોય છે.\n\n- વિધાન III: સાચું છે. યુકેરિયોટ્સમાં હોમોલોગસ પુનર્સંયોજન દરમિયાન 'રેકબીનેશન નોડ્યુલ' ની રચના થાય છે, જે ક્રોસિંગ ઓવરની પ્રક્રિયામાં મદદ કરે છે.\n\n- વિધાન IV: સાચું છે. નોન-હોમોલોગસ એન્ડ જોઈનિંગ (NHEJ) પદ્ધતિ દ્વારા ડબલ-સ્ટ્રેન્ડ બ્રેકનું સમારકામ થાય છે, પરંતુ તેમાં જનીનિક વિવિધતા ઉત્પન્ન થતી નથી કારણ કે તે માત્ર બ્રેકના છેડાને જોડે છે.\n\nઆથી, માત્ર વિધાન II અયોગ્ય છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના આણ્વિક આધાર", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન હોમોલોગસ પુનર્સંયોજન (Homologous Recombination) માટે ખોટું છે?", "opts": ["તે મિયોસિસ-I ના પ્રોફેઝ-I ના પેચીટેન તબક્કામાં થાય છે.", "તે દરમિયાન હોલિડે જંકશન (Holliday Junction) ની રચના થાય છે.", "તે માત્ર પ્રોકેરિયોટ્સમાં જોવા મળે છે અને યુકેરિયોટ્સમાં જોવા મળતું નથી.", "તેના દ્વારા જનીનિક વિવિધતા (Genetic Diversity) વધે છે."], "ans": 2, "exp": "હોમોલોગસ પુનર્સંયોજન યુકેરિયોટ્સ અને પ્રોકેરિયોટ્સ બંનેમાં જોવા મળે છે, તેથી વિકલ્પ C ખોટું છે. વિકલ્પ A, B અને D સાચાં છે કારણ કે હોમોલોગસ પુનર્સંયોજન મિયોસિસ-I ના પેચીટેન તબક્કામાં થાય છે, હોલિડે જંકશન બને છે અને જનીનિક વિવિધતા વધારે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "બેક્ટરિયામાં 'રેકA' પ્રોટીનની ભૂમિકા નીચેના પૈકી કયા પ્રકારના પુનર્સંયોજનમાં મહત્વપૂર્ણ નથી?", "opts": ["સામાન્ય હોમોલોગસ પુનર્સંયોજન (General Homologous Recombination)", "સાઇટ-સ્પેસિફિક પુનર્સંયોજન (Site-Specific Recombination)", "ટ્રાન્સપોઝિશન (Transposition)", "બેક્ટેરિયોફેજ દ્વારા થતું પુનર્સંયોજન (Phage-Mediated Recombination)"], "ans": 2, "exp": "'રેકA' પ્રોટીન સામાન્ય હોમોલોગસ પુનર્સંયોજનમાં મહત્વપૂર્ણ છે, પરંતુ ટ્રાન્સપોઝિશનમાં તેની ભૂમિકા નથી. સાઇટ-સ્પેસિફિક પુનર્સંયોજન અને બેક્ટેરિયોફેજ દ્વારા થતું પુનર્સંયોજન પણ રેકA પર આધારિત નથી.", "ref": "Std 12 - પ્રકરણ 6: આણ્વિક આધાર આનુવંશિકતા", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન 'નોન-હોમોલોગસ એન્ડ જોઈનિંગ' (NHEJ) માટે સાચું નથી?", "opts": ["તે ડબલ-સ્ટ્રેન્ડ બ્રેક (DSB) ની સુધારણા માટે ઉપયોગી છે.", "તે દરમિયાન DNA ના છેડાઓને સીધા જોડવામાં આવે છે.", "તે હંમેશા ભૂલરહિત (Error-Free) પ્રક્રિયા છે.", "તે કોષચક્રના કોઈપણ તબક્કામાં થઈ શકે છે."], "ans": 2, "exp": "નોન-હોમોલોગસ એન્ડ જોઈનિંગ (NHEJ) ભૂલરહિત હોતું નથી, કારણ કે તેમાં DNA ના છેડાઓને સીધા જોડતી વખતે ન્યુક્લિયોટાઇડ્સ ગુમાવી શકાય છે અથવા ઉમેરી શકાય છે. બાકીના વિકલ્પો સાચાં છે.", "ref": "Std 12 - પ્રકરણ 6: આણ્વિક આધાર આનુવંશિકતા", "ch": ""}, {"q": "પુનર્સંયોજન પ્રક્રિયા દરમિયાન, 'રેકબીનેશન નોડ્યુલ' (Recombination Nodule) ની રચના નીચેના પૈકી કયા તબક્કામાં થાય છે?", "opts": ["લેપ્ટોટીન (Leptotene)", "ઝાયગોટીન (Zygotene)", "પેચીટેન (Pachytene)", "ડિપ્લોટીન (Diplotene)"], "ans": 2, "exp": "'રેકબીનેશન નોડ્યુલ' ની રચના મિયોસિસ-I ના પેચીટેન તબક્કામાં થાય છે, જ્યારે ક્રોસિંગ ઓવર થાય છે. અન્ય તબક્કાઓમાં આ રચના જોવા મળતી નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેના પૈકી કયું પુનર્સંયોજનનું ઉદાહરણ 'હોરિઝોન્ટલ જીન ટ્રાન્સફર' (Horizontal Gene Transfer) નથી?", "opts": ["ટ્રાન્સડક્શન (Transduction)", "કન્જુગેશન (Conjugation)", "ટ્રાન્સફોર્મેશન (Transformation)", "મિયોસિસ દરમિયાન ક્રોસિંગ ઓવર (Crossing Over during Meiosis)"], "ans": 3, "exp": "મિયોસિસ દરમિયાન ક્રોસિંગ ઓવર એ વર્ટિકલ જીન ટ્રાન્સફર છે, જ્યારે ટ્રાન્સડક્શન, કન્જુગેશન અને ટ્રાન્સફોર્મેશન હોરિઝોન્ટલ જીન ટ્રાન્સફરના ઉદાહરણો છે.", "ref": "Std 12 - પ્રકરણ 6: આણ્વિક આધાર આનુવંશિકતા", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
