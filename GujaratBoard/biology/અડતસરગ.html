<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>અંડોત્સર્ગ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>અંડોત્સર્ગ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">અંડોત્સર્ગ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "સ્ત્રીના અંડપિંડમાંથી અંડકોષ મુક્ત થવાની ઘટના અંડોત્સર્ગ તરીકે ઓળખાય છે. આ પ્રક્રિયા દરમિયાન નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["અંડોત્સર્ગ પહેલાં પ્રાથમિક પુટિકા ગ્રાફિયન પુટિકામાં રૂપાંતરિત થાય છે", "LH હોર્મોનનો ઝડપી વધારો અંડોત્સર્ગ માટે જવાબદાર છે", "અંડોત્સર્ગ સમયે અંડકોષ હંમેશા દ્વિતીય અર્ધીકરણની મધ્યાવસ્થામાં હોય છે", "અંડોત્સર્ગ પછી ગ્રાફિયન પુટિકા કોર્પસ લ્યુટિયમમાં રૂપાંતરિત થાય છે"], "ans": 2, "exp": "સાચો જવાબ C છે. અંડોત્સર્ગ સમયે અંડકોષ હંમેશા પ્રથમ અર્ધીકરણની મધ્યાવસ્થામાં હોય છે, દ્વિતીય અર્ધીકરણ તો ફલન બાદ જ પૂર્ણ થાય છે. વિકલ્પ A, B અને D સાચાં છે: પ્રાથમિક પુટિકા ગ્રાફિયન પુટિકામાં રૂપાંતરિત થાય છે, LH હોર્મોનનો ઝડપી વધારો અંડોત્સર્ગ માટે જવાબદાર છે, અને ગ્રાફિયન પુટિકા કોર્પસ લ્યુટિયમમાં રૂપાંતરિત થાય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "એક સ્ત્રીમાં માસિક ચક્રના 14મા દિવસે અંડોત્સર્ગ થાય છે. આ પ્રક્રિયા સાથે સંકળાયેલા હોર્મોન્સની ભૂમિકા અંગે નીચેનામાંથી કયું વિધાન યોગ્ય નથી?", "opts": ["FSH હોર્મોન પુટિકાના વિકાસને ઉત્તેજિત કરે છે", "LH હોર્મોન અંડોત્સર્ગ માટે જવાબદાર છે", "એસ્ટ્રોજન હોર્મોન LHના સ્ત્રાવને અવરોધે છે", "પ્રોજેસ્ટેરોન હોર્મોન ગર્ભાશયની અંતઃસ્તરને જાડું કરવામાં મદદ કરે છે"], "ans": 2, "exp": "સાચો જવાબ C છે. એસ્ટ્રોજન હોર્મોન LHના સ્ત્રાવને ઉત્તેજિત કરે છે, અવરોધતું નથી. વિકલ્પ A, B અને D સાચાં છે: FSH પુટિકાના વિકાસને ઉત્તેજિત કરે છે, LH અંડોત્સર્ગ માટે જવાબદાર છે, અને પ્રોજેસ્ટેરોન ગર્ભાશયની અંતઃસ્તરને જાડું કરવામાં મદદ કરે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડોત્સર્ગની પ્રક્રિયા દરમિયાન અંડકોષ સાથે નીચેનામાંથી શું મુક્ત થતું નથી?", "opts": ["કોરોના રેડિયાટા કોષો", "ઝોના પેલ્યુસિડા સ્તર", "પ્રાથમિક ધ્રુવકાય", "દ્વિતીય ધ્રુવકાય"], "ans": 3, "exp": "સાચો જવાબ D છે. અંડોત્સર્ગ સમયે અંડકોષ પ્રથમ અર્ધીકરણની મધ્યાવસ્થામાં હોય છે, તેથી દ્વિતીય ધ્રુવકાય હજુ બન્યો નથી. વિકલ્પ A, B અને C સાચાં છે: કોરોના રેડિયાટા કોષો, ઝોના પેલ્યુસિડા સ્તર અને પ્રાથમિક ધ્રુવકાય અંડકોષ સાથે મુક્ત થાય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "એક સ્ત્રીમાં અંડોત્સર્ગની પ્રક્રિયા દરમિયાન નીચેનામાંથી કયું પરિવર્તન ગ્રાફિયન પુટિકામાં જોવા મળતું નથી?", "opts": ["પુટિકામાં પ્રવાહીનું પ્રમાણ વધે છે", "પુટિકાની દીવાલ પાતળી થાય છે", "અંડકોષ પ્રાથમિક પુટિકામાંથી ગ્રાફિયન પુટિકામાં સ્થાનાંતરિત થાય છે", "પુટિકામાં રુધિરવાહિનીઓનું નિર્માણ વધે છે"], "ans": 2, "exp": "સાચો જવાબ C છે. અંડકોષ પ્રાથમિક પુટિકામાંથી ગ્રાફિયન પુટિકામાં સ્થાનાંતરિત થતો નથી, તે પહેલેથી જ ગ્રાફિયન પુટિકામાં હોય છે. વિકલ્પ A, B અને D સાચાં છે: પુટિકામાં પ્રવાહીનું પ્રમાણ વધે છે, પુટિકાની દીવાલ પાતળી થાય છે, અને રુધિરવાહિનીઓનું નિર્માણ વધે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડોત્સર્ગની પ્રક્રિયા સાથે સંકળાયેલા હોર્મોન્સના નિયંત્રણ અંગે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["હાઇપોથેલેમસ GnRH હોર્મોનનો સ્ત્રાવ કરી પિટ્યુટરી ગ્રંથિને ઉત્તેજિત કરે છે", "પિટ્યુટરી ગ્રંથિ FSH અને LH હોર્મોનનો સ્ત્રાવ કરે છે", "LH હોર્મોનનો ઝડપી વધારો અંડોત્સર્ગ માટે જવાબદાર છે", "પ્રોજેસ્ટેરોન હોર્મોન અંડોત્સર્ગ પહેલાં LHના સ્ત્રાવને ઉત્તેજિત કરે છે"], "ans": 3, "exp": "સાચો જવાબ D છે. પ્રોજેસ્ટેરોન હોર્મોન અંડોત્સર્ગ પછી LHના સ્ત્રાવને અવરોધે છે, ઉત્તેજિત નથી કરતું. વિકલ્પ A, B અને C સાચાં છે: હાઇપોથેલેમસ GnRH હોર્મોનનો સ્ત્રાવ કરે છે, પિટ્યુટરી ગ્રંથિ FSH અને LH હોર્મોનનો સ્ત્રાવ કરે છે, અને LHનો ઝડપી વધારો અંડોત્સર્ગ માટે જવાબદાર છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "સ્ત્રીના પ્રજનન તંત્રમાં અંડોત્સર્ગની પ્રક્રિયા દરમિયાન ગ્રાફિયન પુટિકામાંથી અંડકોષ મુક્ત થયા બાદ નીચેનામાંથી કઈ રચના બને છે, જે પ્રોજેસ્ટેરોન હોર્મોનનો સ્ત્રાવ કરે છે?", "opts": ["પ્રાથમિક પુટિકા", "દ્વિતીયક પુટિકા", "કોર્પસ લ્યુટિયમ", "કોર્પસ એલ્બિકન્સ"], "ans": 2, "exp": "અંડોત્સર્ગ બાદ ગ્રાફિયન પુટિકાના અવશેષોમાંથી કોર્પસ લ્યુટિયમ રચાય છે, જે પ્રોજેસ્ટેરોન હોર્મોનનો સ્ત્રાવ કરે છે. પ્રોજેસ્ટેરોન ગર્ભાશયની દીવાલને ગર્ભધારણ માટે તૈયાર કરે છે. પ્રાથમિક અને દ્વિતીયક પુટિકા અંડકોષના વિકાસના પહેલાના તબક્કામાં હોય છે, જ્યારે કોર્પસ એલ્બિકન્સ કોર્પસ લ્યુટિયમનું અવશેષ સ્વરૂપ છે, જે હોર્મોન સ્ત્રાવ કરતું નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "એક સ્ત્રીમાં અંડોત્સર્ગની પ્રક્રિયા દરમિયાન LH (લ્યુટિનાઇઝિંગ હોર્મોન) નું સ્તર અચાનક વધી જાય છે. આ વધારો નીચેનામાંથી કઈ ઘટનાને પ્રેરિત કરે છે?", "opts": ["પ્રાથમિક પુટિકાનું દ્વિતીયક પુટિકામાં રૂપાંતર", "ગ્રાફિયન પુટિકામાંથી અંડકોષનું મુક્ત થવું", "એન્ડોમેટ્રિયમનું વિઘટન", "પ્રોજેસ્ટેરોન હોર્મોનનું ઉત્પાદન ઘટવું"], "ans": 1, "exp": "LH હોર્મોનના સ્તરમાં અચાનક થતો વધારો અંડોત્સર્ગની પ્રક્રિયાને પ્રેરિત કરે છે, જેમાં ગ્રાફિયન પુટિકામાંથી અંડકોષ મુક્ત થાય છે. પ્રાથમિક પુટિકાનું દ્વિતીયક પુટિકામાં રૂપાંતર FSH હોર્મોન દ્વારા થાય છે. એન્ડોમેટ્રિયમનું વિઘટન માસિક સ્રાવ દરમિયાન થાય છે, અને પ્રોજેસ્ટેરોનનું ઉત્પાદન કોર્પસ લ્યુટિયમ દ્વારા થાય છે, જે અંડોત્સર્ગ બાદ રચાય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન અંડોત્સર્ગની પ્રક્રિયા સાથે સંકળાયેલા હોર્મોનલ નિયંત્રણ માટે ખોટું છે?", "opts": ["FSH હોર્મોન પુટિકાના વિકાસને ઉત્તેજિત કરે છે.", "LH હોર્મોનનો વધારો અંડોત્સર્ગને પ્રેરિત કરે છે.", "એસ્ટ્રોજન હોર્મોન LH ના સ્ત્રાવને અવરોધે છે.", "પ્રોજેસ્ટેરોન હોર્મોન ગર્ભાશયની દીવાલને જાડી બનાવે છે."], "ans": 2, "exp": "એસ્ટ્રોજન હોર્મોન LH ના સ્ત્રાવને અવરોધતું નથી, પરંતુ તે LH ના સ્ત્રાવને પ્રેરિત કરે છે. FSH પુટિકાના વિકાસને ઉત્તેજિત કરે છે, LH અંડોત્સર્ગને પ્રેરિત કરે છે, અને પ્રોજેસ્ટેરોન ગર્ભાશયની દીવાલને જાડી બનાવે છે. આથી વિકલ્પ C ખોટું છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "એક સ્ત્રીમાં અંડોત્સર્ગની પ્રક્રિયા દરમિયાન અંડકોષ મુક્ત થયા બાદ તેનું ફલન ન થાય તો નીચેનામાંથી શું થાય છે?", "opts": ["કોર્પસ લ્યુટિયમ કાયમી રહે છે અને પ્રોજેસ્ટેરોનનો સ્ત્રાવ ચાલુ રાખે છે.", "કોર્પસ લ્યુટિયમનું કોર્પસ એલ્બિકન્સમાં રૂપાંતર થાય છે અને પ્રોજેસ્ટેરોનનું સ્તર ઘટે છે.", "ગ્રાફિયન પુટિકા ફરીથી વિકસિત થાય છે.", "એન્ડોમેટ્રિયમનું સ્તર વધતું રહે છે."], "ans": 1, "exp": "ફલન ન થાય તો કોર્પસ લ્યુટિયમનું કોર્પસ એલ્બિકન્સમાં રૂપાંતર થાય છે, જેના કારણે પ્રોજેસ્ટેરોનનું સ્તર ઘટે છે. આથી એન્ડોમેટ્રિયમનું વિઘટન થાય છે અને માસિક સ્રાવ શરૂ થાય છે. કોર્પસ લ્યુટિયમ કાયમી રહેતું નથી, અને ગ્રાફિયન પુટિકા ફરીથી વિકસિત થતી નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડોત્સર્ગની પ્રક્રિયા દરમિયાન અંડકોષ મુક્ત થયા બાદ તેનું ફલન થાય તો નીચેનામાંથી કયું પરિવર્તન થતું નથી?", "opts": ["કોર્પસ લ્યુટિયમનું કોર્પસ એલ્બિકન્સમાં રૂપાંતર થાય છે.", "પ્રોજેસ્ટેરોન હોર્મોનનું સ્તર ઊંચું રહે છે.", "ગર્ભાશયની દીવાલ જાડી બની ગર્ભધારણ માટે તૈયાર થાય છે.", "HCG હોર્મોનનો સ્ત્રાવ થાય છે."], "ans": 0, "exp": "ફલન થાય તો કોર્પસ લ્યુટિયમનું કોર્પસ એલ્બિકન્સમાં રૂપાંતર થતું નથી, પરંતુ તે પ્રોજેસ્ટેરોનનો સ્ત્રાવ ચાલુ રાખે છે. પ્રોજેસ્ટેરોનનું સ્તર ઊંચું રહે છે, ગર્ભાશયની દીવાલ જાડી બને છે, અને HCG હોર્મોનનો સ્ત્રાવ થાય છે, જે ગર્ભાવસ્થાને જાળવવામાં મદદ કરે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડોત્સર્ગ પછી ગ્રાફિયન પુટિકાનું રૂપાંતર ક્યાંમાં થાય છે અને તેનું મુખ્ય કાર્ય શું છે?", "opts": ["કોર્પસ લ્યુટિયમમાં, પ્રોજેસ્ટેરોન અને ઇસ્ટ્રોજનનું સ્રાવ કરવું", "કોર્પસ એલ્બિકાન્સમાં, FSH નું સ્રાવ કરવું", "કોર્પસ હેમોરેજિકમમાં, ઓક્સિટોસિનનું સ્રાવ કરવું", "કોર્પસ કેપ્સ્યુલેરમાં, LH નું સ્રાવ કરવું"], "ans": 0, "exp": "અંડોત્સર્ગ પછી ગ્રાફિયન પુટિકાનું રૂપાંતર કોર્પસ લ્યુટિયમમાં થાય છે, જે પ્રોજેસ્ટેરોન અને ઇસ્ટ્રોજનનું સ્રાવ કરે છે. આ હોર્મોન્સ ગર્ભાશયની દીવાલને મોટી અને રક્તવહન યુક્ત બનાવે છે, જેથી ગર્ભ ધરણ થાય. બાકીના વિકલ્પો ખોટા છે કારણ કે કોર્પસ એલ્બિકાન્સ ગ્રાફિયન પુટિકાનું અવશેષ સ્વરૂપ છે, કોર્પસ હેમોરેજિકમ રક્તસ્રાવ યુક્ત અવસ્થા છે, અને કોર્પસ કેપ્સ્યુલેર અસ્તિત્વમાં નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડોત્સર્ગ દરમિયાન નીચેનામાંથી કયો હોર્મોન અચાનક વધે છે અને તેનું કારણ શું છે?", "opts": ["FSH, ગ્રાફિયન પુટિકાને પક્વ બનાવવા માટે", "LH, અંડકોષને મુક્ત કરવા માટે", "પ્રોલેક્ટિન, દૂધ ઉત્પાદન માટે", "ઓક્સિટોસિન, પ્રસવ માટે"], "ans": 1, "exp": "અંડોત્સર્ગ દરમિયાન LH (લ્યુટિનાઇઝિંગ હોર્મોન) અચાનક વધે છે, જે અંડકોષને ગ્રાફિયન પુટિકામાંથી મુક્ત કરવા માટે જવાબદાર છે. FSH ગ્રાફિયન પુટિકાને પક્વ બનાવે છે, પરંતુ અંડોત્સર્ગ દરમિયાન તે અચાનક વધતું નથી. પ્રોલેક્ટિન અને ઓક્સિટોસિન અંડોત્સર્ગ સાથે સીધા સંકળાયેલા નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડોત્સર્ગ પછી અંડકોષ કેટલો સમય જીવંત રહે છે અને તે ક્યાં ફલન પામે છે?", "opts": ["24 કલાક, ફેલોપિયન ટ્યુબમાં", "48 કલાક, ગર્ભાશયમાં", "72 કલાક, અંડપિંડમાં", "12 કલાક, યોનિમાં"], "ans": 0, "exp": "અંડોત્સર્ગ પછી અંડકોષ લગભગ 24 કલાક જીવંત રહે છે અને ફલન ફેલોપિયન ટ્યુબમાં થાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે અંડકોષ 48 કે 72 કલાક જીવંત રહેતું નથી, અને ફલન ગર્ભાશય, અંડપિંડ કે યોનિમાં થતું નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન અંડોત્સર્ગ અને હોર્મોનલ ચક્ર અંગે સાચું નથી?", "opts": ["અંડોત્સર્ગ પહેલા ઇસ્ટ્રોજનનું સ્તર અચાનક ઘટે છે", "અંડોત્સર્ગ પછી પ્રોજેસ્ટેરોનનું સ્તર વધે છે", "અંડોત્સર્ગ દરમિયાન LH નું સ્તર શિખર પર પહોંચે છે", "અંડોત્સર્ગ પહેલા FSH નું સ્તર વધે છે"], "ans": 0, "exp": "અંડોત્સર્ગ પહેલા ઇસ્ટ્રોજનનું સ્તર અચાનક ઘટતું નથી, ઉલટાનું તે વધે છે. અંડોત્સર્ગ પછી પ્રોજેસ્ટેરોનનું સ્તર વધે છે, અંડોત્સર્ગ દરમિયાન LH નું સ્તર શિખર પર પહોંચે છે, અને અંડોત્સર્ગ પહેલા FSH નું સ્તર વધે છે. આથી વિધાન A ખોટું છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડોત્સર્ગની પ્રક્રિયા દરમિયાન નીચેનામાંથી કયું પરિવર્તન ગ્રાફિયન પુટિકામાં જોવા મળતું નથી?", "opts": ["ગ્રાફિયન પુટિકાનો આકાર મોટો થવો", "પુટિકા દ્રવના પ્રમાણમાં વધારો થવો", "અંડકોષના કોષકેન્દ્રમાં મિયોસિસ-I પૂર્ણ થવું", "ગ્રાફિયન પુટિકામાં રક્તવાહિનીઓની સંખ્યામાં ઘટાડો થવો"], "ans": 3, "exp": "ગ્રાફિયન પુટિકામાં અંડોત્સર્ગ દરમિયાન રક્તવાહિનીઓની સંખ્યામાં ઘટાડો થતો નથી, ઉલટાનું તે વધે છે. ગ્રાફિયન પુટિકાનો આકાર મોટો થાય છે, પુટિકા દ્રવનું પ્રમાણ વધે છે, અને અંડકોષના કોષકેન્દ્રમાં મિયોસિસ-I પૂર્ણ થાય છે. આથી વિધાન D ખોટું છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડોત્સર્ગ પછી ગ્રાફિયન પુટિકાનું રૂપાંતર કોર્પસ લ્યુટિયમમાં થાય છે. આ દરમિયાન નીચેનામાંથી કયો હોર્મોન સ્રાવવામાં આવતો નથી?", "opts": ["પ્રોજેસ્ટેરોન", "ઇસ્ટ્રોજન", "રિલેક્સિન", "ફોલિકલ સ્ટિમ્યુલેટિંગ હોર્મોન (FSH)"], "ans": 3, "exp": "કોર્પસ લ્યુટિયમ દ્વારા પ્રોજેસ્ટેરોન, ઇસ્ટ્રોજન અને રિલેક્સિન હોર્મોન સ્રાવવામાં આવે છે. FSH અંડપિંડ દ્વારા સ્રાવાતો હોર્મોન છે અને તે કોર્પસ લ્યુટિયમ દ્વારા સ્રાવાતો નથી. FSHનું સ્રાવ પિટ્યુટરી ગ્રંથિથી થાય છે અને તે ફોલિકલ વિકાસને ઉત્તેજિત કરે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડોત્સર્ગની પ્રક્રિયા દરમિયાન, ગ્રાફિયન પુટિકાના ફાટવાના થોડા કલાકો પહેલા, નીચેનામાંથી કયો હોર્મોનનો સ્તર અચાનક વધે છે અને તે કયા અંગ દ્વારા સ્રાવાય છે?", "opts": ["LH - પિટ્યુટરી ગ્રંથિ", "FSH - અંડપિંડ", "ઇસ્ટ્રોજન - અંડપિંડ", "પ્રોલેક્ટિન - પિટ્યુટરી ગ્રંથિ"], "ans": 0, "exp": "અંડોત્સર્ગની પ્રક્રિયા દરમિયાન, લ્યુટિનાઇઝિંગ હોર્મોન (LH) નો સ્તર અચાનક વધે છે અને તે પિટ્યુટરી ગ્રંથિ દ્વારા સ્રાવાય છે. આ વધારો ગ્રાફિયન પુટિકાના ફાટવા અને અંડકોષની મુક્તિ માટે જવાબદાર છે. FSH અંડપિંડ દ્વારા સ્રાવાતો નથી, ઇસ્ટ્રોજનનો સ્તર અંડોત્સર્ગ પહેલા વધે છે પરંતુ અચાનક નહીં, અને પ્રોલેક્ટિન અંડોત્સર્ગ સાથે સીધો સંબંધ ધરાવતો નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડોત્સર્ગ પછી, અંડકોષ ક્યાં ફલન પામે છે અને તે કેટલો સમય જીવંત રહે છે?", "opts": ["અંડવાહિની - 12 થી 24 કલાક", "ગર્ભાશય - 48 કલાક", "યોનિ - 6 કલાક", "અંડપિંડ - 72 કલાક"], "ans": 0, "exp": "અંડોત્સર્ગ પછી, અંડકોષ અંડવાહિનીમાં ફલન પામે છે અને તે 12 થી 24 કલાક સુધી જીવંત રહે છે. ગર્ભાશય, યોનિ અને અંડપિંડમાં ફલન થતું નથી, અને અંડકોષ આટલો લાંબો સમય જીવંત રહેતો નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડોત્સર્ગની પ્રક્રિયા દરમિયાન, નીચેનામાંથી કયું પરિવર્તન ગ્રાફિયન પુટિકામાં જોવા મળતું નથી?", "opts": ["ગ્રાફિયન પુટિકાનો આકાર વધે છે", "પુટિકા દ્રવનો કદ વધે છે", "અંડકોષનો વિકાસ થાય છે", "પુટિકા કોષોની સંખ્યા ઘટે છે"], "ans": 3, "exp": "ગ્રાફિયન પુટિકાના વિકાસ દરમિયાન, તેનો આકાર અને કદ વધે છે, પુટિકા દ્રવનો કદ વધે છે, અને અંડકોષનો વિકાસ થાય છે. પુટિકા કોષોની સંખ્યા ઘટતી નથી, પરંતુ તે વધે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "અંડોત્સર્ગ પછી, કોર્પસ લ્યુટિયમનું મુખ્ય કાર્ય નીચેનામાંથી કયું છે?", "opts": ["અંડકોષનો વિકાસ કરવો", "પ્રોજેસ્ટેરોન અને ઇસ્ટ્રોજન સ્રાવવું", "FSH અને LH સ્રાવવું", "અંડપિંડને ઉત્તેજિત કરવું"], "ans": 1, "exp": "કોર્પસ લ્યુટિયમનું મુખ્ય કાર્ય પ્રોજેસ્ટેરોન અને ઇસ્ટ્રોજન હોર્મોન સ્રાવવું છે, જે ગર્ભાશયની દીવાલને ગર્ભધારણ માટે તૈયાર કરે છે. અંડકોષનો વિકાસ ગ્રાફિયન પુટિકામાં થાય છે, FSH અને LH પિટ્યુટરી ગ્રંથિ દ્વારા સ્રાવાય છે, અને અંડપિંડને ઉત્તેજિત કરવું એ FSH અને LHનું કાર્ય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
