<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SONIC HUB  LEARN X PRO</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* ── reset & base ── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f4f7fc;
      color: #0b1a2e;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── navbar ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(0, 20, 50, 0.06);
      padding: 12px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.2rem;
      font-weight: 800;
      color: #0b1a2e;
    }

    .logo img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #2563eb;
      object-fit: cover;
    }

    .logo span {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .breadcrumb {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .breadcrumb a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    .breadcrumb a:hover {
      text-decoration: underline;
    }

    /* ── hero ── */
    .hero {
      text-align: center;
      padding: 50px 5% 30px;
    }

    .std-badge {
      display: inline-block;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
      font-weight: 900;
      font-size: 2.8rem;
      width: 80px;
      height: 80px;
      border-radius: 20px;
      line-height: 80px;
      margin-bottom: 16px;
      box-shadow: 0 8px 30px rgba(37, 99, 235, 0.25);
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      background: linear-gradient(135deg, #0b1a2e 30%, #2563eb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .hero p {
      color: #475569;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
    }

    /* ── section title ── */
    .section-title {
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #64748b;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 30px;
    }

    .section-title span {
      color: #2563eb;
      font-weight: 700;
    }

    /* ── subject grid ── */
    .subject-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      max-width: 900px;
      margin: 0 auto 60px;
      padding: 0 5%;
    }

    .subject-card {
      background: #ffffff;
      border-radius: 28px;
      padding: 40px 28px 32px;
      text-align: center;
      text-decoration: none;
      display: block;
      border: 1px solid rgba(0, 20, 50, 0.05);
      box-shadow: 0 8px 30px rgba(0, 20, 50, 0.04);
      transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
      position: relative;
      overflow: hidden;
    }

    .subject-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }

    .physics::before {
      background: linear-gradient(90deg, #2563eb, #06b6d4);
    }
    .chemistry::before {
      background: linear-gradient(90deg, #7c3aed, #ec4899);
    }
    .biology::before {
      background: linear-gradient(90deg, #10b981, #84cc16);
    }

    .subject-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 50px rgba(37, 99, 235, 0.10);
    }

    .physics:hover {
      border-color: rgba(37, 99, 235, 0.25);
    }
    .chemistry:hover {
      border-color: rgba(124, 58, 237, 0.25);
    }
    .biology:hover {
      border-color: rgba(16, 185, 129, 0.25);
    }

    .subject-card:hover::before {
      transform: scaleX(1);
    }

    .subject-icon {
      font-size: 3.2rem;
      display: block;
      margin-bottom: 14px;
    }

    .subject-card h2 {
      font-size: 1.4rem;
      font-weight: 800;
      color: #0b1a2e;
      margin-bottom: 4px;
    }

    .subject-card p {
      color: #64748b;
      font-size: 0.8rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .subject-card .tag {
      display: inline-block;
      margin-top: 16px;
      padding: 5px 16px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
    }

    .physics .tag {
      background: #eef2ff;
      color: #2563eb;
      border: 1px solid rgba(37, 99, 235, 0.10);
    }

    .chemistry .tag {
      background: #f3e8ff;
      color: #7c3aed;
      border: 1px solid rgba(124, 58, 237, 0.10);
    }

    .biology .tag {
      background: #dcfce7;
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.10);
    }

    /* ── footer ── */
    footer {
      text-align: center;
      padding: 28px 5%;
      color: #94a3b8;
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
      border-top: 1px solid rgba(0, 20, 50, 0.06);
      background: #ffffff;
    }

    /* ── responsive ── */
    @media (max-width: 600px) {
      nav {
        flex-direction: column;
        align-items: center;
      }
      .breadcrumb {
        font-size: 0.65rem;
      }
      .hero {
        padding: 36px 5% 24px;
      }
      .std-badge {
        width: 64px;
        height: 64px;
        font-size: 2.2rem;
        line-height: 64px;
      }
      .subject-card {
        padding: 32px 20px 28px;
      }
      .subject-grid {
        grid-template-columns: 1fr;
        max-width: 400px;
      }
    }
  </style>
</head>
<body>

  <!-- ─── Navbar ─── -->
  <nav>
    <div class="logo">
      <img src="https://i.ibb.co/Q152gXX/x.jpg" alt="logo" />
      <span>LEARN X PRO</span>
    </div>
    <div class="breadcrumb">
      <a href="../index.html">Home</a> › <span>STD 11</span>
    </div>
  </nav>

  <!-- ─── Hero ─── -->
  <section class="hero">
    <div class="std-badge">11</div>
    <h1>Standard 11</h1>
    <p>Select your subject to start practicing</p>
  </section>

  <!-- ─── Subject Grid ─── -->
  <p class="section-title">— Choose Your <span>Subject</span> —</p>

  <div class="subject-grid">
    <a href="physics/index.html" class="subject-card physics">
      <span class="subject-icon">📘</span>
      <h2>Physics</h2>
      <p>Chapter-wise tests &amp; topics</p>
      <span class="tag">PHY →</span>
    </a>
    <a href="chemistry/index.html" class="subject-card chemistry">
      <span class="subject-icon">🧪</span>
      <h2>Chemistry</h2>
      <p>Chapter-wise tests &amp; topics</p>
      <span class="tag">CHEM →</span>
    </a>
    <a href="biology/index.html" class="subject-card biology">
      <span class="subject-icon">🌿</span>
      <h2>Biology</h2>
      <p>Chapter-wise tests &amp; topics</p>
      <span class="tag">BIO →</span>
    </a>
  </div>

  <!-- ─── Footer ─── -->
  <footer>© 2025 LEARN X PRO — STD 11</footer>

</body>
</html>
