<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>અંડયંત્ર (Egg Apparatus)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>અંડયંત્ર (Egg Apparatus)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">અંડયંત્ર (Egg Apparatus)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "અંડકોષ્ઠમાં આવેલા અંડયંત્રમાં ત્રણ કોષો પૈકી મધ્યસ્થ કોષને શું કહે છે?", "opts": ["સહાયક કોષ (Synergid)", "અંડકોષ (Egg cell)", "પ્રતિધ્રુવીય કોષ (Antipodal cell)", "મધ્યસ્થ કોષ (Central cell)"], "ans": 1, "exp": "અંડયંત્રમાં ત્રણ કોષો હોય છે: બે સહાયક કોષો અને એક અંડકોષ. મધ્યસ્થ કોષ એ અંડયંત્રનો ભાગ નથી, તે તો દ્વિતીય કોષકેન્દ્ર ધરાવતો કોષ છે જે અંડકોષ્ઠમાં અલગથી આવેલો હોય છે. સહાયક કોષો અંડકોષની બંને બાજુએ આવેલા હોય છે, જ્યારે પ્રતિધ્રુવીય કોષો અંડકોષ્ઠના વિરુદ્ધ છેડે આવેલા હોય છે. તેથી સાચો જવાબ અંડકોષ છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "અંડયંત્રના સહાયક કોષોનું મુખ્ય કાર્ય શું છે?", "opts": ["પરાગનલિકાને આકર્ષી તેને અંડકોષ સુધી પહોંચાડવામાં મદદ કરવી", "ફલીકરણ બાદ ભ્રૂણપોષનું નિર્માણ કરવું", "અંડકોષ્ઠમાં પોષક તત્ત્વોનો સંગ્રહ કરવો", "પરાગરજનું અંકુરણ થવા માટે ઉત્સેચકોનો સ્રાવ કરવો"], "ans": 0, "exp": "સહાયક કોષોનું મુખ્ય કાર્ય પરાગનલિકાને રાસાયણિક સંકેતો દ્વારા આકર્ષી તેને અંડકોષ સુધી પહોંચાડવામાં મદદ કરવાનું છે. ફલીકરણ બાદ ભ્રૂણપોષનું નિર્માણ તો દ્વિતીય કોષકેન્દ્ર અને નર જનનકોષના સંયોજનથી થાય છે. પોષક તત્ત્વોનો સંગ્રહ અને પરાગરજના અંકુરણ માટે ઉત્સેચકોનો સ્રાવ એ સહાયક કોષોનું પ્રાથમિક કાર્ય નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન અંડયંત્ર માટે અયોગ્ય છે?", "opts": ["અંડયંત્રમાં ત્રણ કોષો હોય છે: એક અંડકોષ અને બે સહાયક કોષો", "સહાયક કોષો ફિલિફોર્મ ઉપકરણ ધરાવે છે જે પરાગનલિકાને માર્ગદર્શન આપે છે", "અંડકોષ અને સહાયક કોષોનું કોષકેન્દ્ર હેપ્લોઇડ હોય છે", "અંડયંત્રના ત્રણેય કોષો ફલીકરણ બાદ ભ્રૂણમાં રૂપાંતરિત થાય છે"], "ans": 3, "exp": "અંડયંત્રમાં ત્રણ કોષો હોય છે: એક અંડકોષ અને બે સહાયક કોષો, જે સાચું છે. સહાયક કોષો ફિલિફોર્મ ઉપકરણ ધરાવે છે જે પરાગનલિકાને માર્ગદર્શન આપે છે, આ પણ સાચું છે. અંડકોષ અને સહાયક કોષોનું કોષકેન્દ્ર હેપ્લોઇડ હોય છે, જે યોગ્ય છે. પરંતુ ફલીકરણ બાદ માત્ર અંડકોષ જ ભ્રૂણમાં રૂપાંતરિત થાય છે, સહાયક કોષો નહીં. તેથી આ વિધાન અયોગ્ય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "અંડયંત્રના સહાયક કોષોમાં જોવા મળતું ફિલિફોર્મ ઉપકરણ શેનું બનેલું હોય છે?", "opts": ["સેલ્યુલોઝ અને પેક્ટિન", "લિગ્નિન અને સુબેરિન", "પ્રોટીન અને લિપિડ", "કાઇટિન અને ગ્લાયકોપ્રોટીન"], "ans": 0, "exp": "ફિલિફોર્મ ઉપકરણ સેલ્યુલોઝ અને પેક્ટિનનું બનેલું હોય છે, જે કોષદીવાલના મુખ્ય ઘટકો છે. લિગ્નિન અને સુબેરિન કોષદીવાલને કઠણ બનાવવા માટે જવાબદાર છે, જે ફિલિફોર્મ ઉપકરણમાં જોવા મળતા નથી. પ્રોટીન અને લિપિડ કોષરસપટલના ઘટકો છે, જ્યારે કાઇટિન ફૂગ અને કેટલાક પ્રાણીઓની બાહ્ય કંકાલમાં જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "એક વિદ્યાર્થીએ અંડકોષ્ઠનો અભ્યાસ કરતી વખતે અંડયંત્રના સહાયક કોષોમાં કોષકેન્દ્ર જોયું નહીં. આ ઘટનાનું સંભવિત કારણ શું હોઈ શકે?", "opts": ["સહાયક કોષો હંમેશા કોષકેન્દ્રવિહીન હોય છે", "પરાગનલિકા સહાયક કોષોમાં પ્રવેશતા જ તેમનું કોષકેન્દ્ર વિઘટિત થઈ જાય છે", "સહાયક કોષોનું કોષકેન્દ્ર ફક્ત ફલીકરણ બાદ જ દેખાય છે", "અવલોકન દરમિયાન સહાયક કોષોનું કોષકેન્દ્ર કોષરસમાં ઓગળી ગયું હતું"], "ans": 1, "exp": "સહાયક કોષો સામાન્ય રીતે કોષકેન્દ્ર ધરાવે છે, પરંતુ પરાગનલિકા સહાયક કોષોમાં પ્રવેશ કરે ત્યારે તેમનું કોષકેન્દ્ર વિઘટિત થઈ જાય છે. આ એક સામાન્ય પ્રક્રિયા છે જે પરાગનલિકાને અંડકોષ સુધી પહોંચવામાં મદદ કરે છે. સહાયક કોષો હંમેશા કોષકેન્દ્રવિહીન હોતા નથી, અને ફલીકરણ બાદ પણ તેમનું કોષકેન્દ્ર દેખાતું નથી. કોષકેન્દ્ર કોષરસમાં ઓગળી જવું એ અસામાન્ય ઘટના છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "અંડયંત્રમાં આવેલા સહાયક કોષો અને અંડકોષ વચ્ચે કયો તફાવત સાચો નથી?", "opts": ["સહાયક કોષોનું કદ અંડકોષ કરતાં નાનું હોય છે", "સહાયક કોષોમાં કોષકેન્દ્ર અંડકોષ કરતાં વધુ સક્રિય હોય છે", "અંડકોષમાં વર્ણસૂત્રોની સંખ્યા સહાયક કોષો કરતાં અડધી હોય છે", "સહાયક કોષો અંડકોષની તુલનામાં વધુ પ્રોટીન સંશ્લેષણ કરે છે"], "ans": 2, "exp": "સહાયક કોષો અને અંડકોષ બંનેમાં વર્ણસૂત્રોની સંખ્યા સમાન (હેપ્લોઈડ) હોય છે, કારણ કે તે બધા અંડકોષ્ઠમાંથી ઉત્પન્ન થાય છે. અંડકોષનું કદ મોટું હોય છે (A સાચું), સહાયક કોષોનું કોષકેન્દ્ર વધુ સક્રિય હોય છે (B સાચું), અને સહાયક કોષો અંડકોષ કરતાં વધુ પ્રોટીન સંશ્લેષણ કરે છે (D સાચું). પરંતુ વર્ણસૂત્રોની સંખ્યાનો તફાવત સાચો નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "અંડયંત્રના સહાયક કોષોના કોષદીવાલ પર જોવા મળતી ખાસ રચના કયા કાર્ય સાથે સંબંધિત છે?", "opts": ["પાણીના પરિવહનમાં મદદ કરવી", "પોષક તત્ત્વોના શોષણમાં વૃદ્ધિ કરવી", "અંડકોષ તરફ પોષક તત્ત્વોના સ્થળાંતરમાં મદદ કરવી", "ઉત્સેચકોના સ્રાવણમાં ભૂમિકા ભજવવી"], "ans": 2, "exp": "સહાયક કોષોની કોષદીવાલ પર ફિલિફોર્મ ઉપકરણ જોવા મળે છે, જે અંડકોષ તરફ પોષક તત્ત્વોના સ્થળાંતરમાં મદદ કરે છે. પાણીના પરિવહન (A) અથવા પોષક તત્ત્વોના શોષણ (B) માટે આ રચના વિશિષ્ટ નથી. ઉત્સેચકોના સ્રાવણ (D) પણ આ રચનાનું મુખ્ય કાર્ય નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "અંડયંત્રમાં અંડકોષની સ્થિતિ અને તેની આસપાસના સહાયક કોષોની ગોઠવણી કયા હેતુ માટે મહત્વપૂર્ણ છે?", "opts": ["પરાગકણોને આકર્ષવા માટે", "ફલન પછી ભ્રૂણપોષણના નિર્માણ માટે", "પરાગનલિકાની વૃદ્ધિને દિશા આપવા માટે", "અંડાશયની રચનામાં મદદ કરવા માટે"], "ans": 2, "exp": "અંડયંત્રમાં અંડકોષ મધ્યસ્થ સ્થાને અને સહાયક કોષો તેની આસપાસ ગોઠવાયેલા હોય છે, જે પરાગનલિકાની વૃદ્ધિને અંડકોષ તરફ દિશા આપવામાં મદદ કરે છે. પરાગકણોને આકર્ષવું (A) અંડયંત્રનું કાર્ય નથી. ભ્રૂણપોષણનું નિર્માણ (B) ફલન પછી થાય છે, પરંતુ તે અંડયંત્રની ગોઠવણી સાથે સીધો સંબંધ ધરાવતું નથી. અંડાશયની રચના (D) અંડયંત્ર કરતાં વધુ મોટા પાયે થાય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "અંડયંત્રના સહાયક કોષો અને અંડકોષ વચ્ચે કયો જનીન તફાવત જોવા મળે છે?", "opts": ["સહાયક કોષોમાં Y-વર્ણસૂત્ર હોય છે જ્યારે અંડકોષમાં નહીં", "સહાયક કોષો અને અંડકોષ બંનેમાં જનીન સમાનતા હોય છે", "અંડકોષમાં X-વર્ણસૂત્ર હોય છે જ્યારે સહાયક કોષોમાં નહીં", "સહાયક કોષોમાં મિટોકોન્ડ્રિયલ DNA અંડકોષ કરતાં અલગ હોય છે"], "ans": 1, "exp": "અંડયંત્રના સહાયક કોષો અને અંડકોષ બંનેમાં જનીન સમાનતા હોય છે, કારણ કે તે બધા એક જ મૂળ કોષ (મેગાસ્પોર મધ્યકોષ)માંથી ઉત્પન્ન થાય છે. Y-વર્ણસૂત્ર (A) અથવા X-વર્ણસૂત્ર (C)નો તફાવત અહીં લાગુ પડતો નથી, કારણ કે વનસ્પતિઓમાં લિંગી વર્ણસૂત્રો નથી. મિટોકોન્ડ્રિયલ DNA (D) પણ સમાન હોય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "અંડયંત્રમાં અંડકોષની આસપાસના સહાયક કોષોના કોષરસમાં કયા પદાર્થની પ્રચુરતા જોવા મળે છે, જે અંડકોષના વિકાસ માટે મહત્વપૂર્ણ છે?", "opts": ["સ્ટાર્ચ", "પ્રોટીન અને RNA", "લિપિડ", "સેલ્યુલોઝ"], "ans": 1, "exp": "સહાયક કોષોના કોષરસમાં પ્રોટીન અને RNAની પ્રચુરતા જોવા મળે છે, જે અંડકોષના વિકાસ અને પોષણ માટે મહત્વપૂર્ણ છે. સ્ટાર્ચ (A) અને લિપિડ (C) અંડકોષના પોષણ માટે મહત્વપૂર્ણ નથી, જ્યારે સેલ્યુલોઝ (D) કોષદીવાલનું ઘટક છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "અંડયંત્રમાં અંડકોષ અને સહાયક કોષો વચ્ચે કયો તફાવત સાચો છે, જ્યારે તેઓ એક જ મૂળ કોષ (મેગાસ્પોર મધ્યકોષ)માંથી ઉત્પન્ન થાય છે?", "opts": ["અંડકોષમાં કોષકેન્દ્ર એકલું હોય છે જ્યારે સહાયક કોષોમાં બહુકોષકેન્દ્રી હોય છે", "અંડકોષમાં કોષરસની માત્રા ઓછી હોય છે જ્યારે સહાયક કોષોમાં વધુ હોય છે", "અંડકોષમાં વર્ણસૂત્રોની સંખ્યા સહાયક કોષો કરતાં અડધી હોય છે", "અંડકોષમાં ફિલિફોર્મ ઉપકરણ જોવા મળે છે જ્યારે સહાયક કોષોમાં નહીં"], "ans": 2, "exp": "સહી જવાબ C છે. અંડકોષ હેપ્લોઇડ (n) હોય છે જ્યારે સહાયક કોષો ડિપ્લોઇડ (2n) હોય છે, કારણ કે અંડયંત્રનું નિર્માણ મેગાગેમેટોફાઇટ (7-કોષીય, 8-કોષકેન્દ્રીય)માંથી થાય છે, જેમાં અંડકોષ હેપ્લોઇડ રહે છે જ્યારે સહાયક કોષો ડિપ્લોઇડ બને છે. A ખોટું છે કારણ કે બંનેમાં એક જ કોષકેન્દ્ર હોય છે. B ખોટું છે કારણ કે અંડકોષમાં કોષરસ વધુ પ્રમાણમાં હોય છે. D ખોટું છે કારણ કે ફિલિફોર્મ ઉપકરણ સહાયક કોષોમાં જોવા મળે છે, અંડકોષમાં નહીં.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "અંડયંત્રના સહાયક કોષોમાં જોવા મળતી ફિલિફોર્મ ઉપકરણની રચના કયા પદાર્થના સંકલનથી બને છે?", "opts": ["સેલ્યુલોઝ અને પેક્ટિન", "પ્રોટીન અને લિપિડ", "કાર્બોદિત અને પ્રોટીન", "લિગ્નિન અને સબેરિન"], "ans": 0, "exp": "સહી જવાબ A છે. ફિલિફોર્મ ઉપકરણ સહાયક કોષોની કોષદીવાલ પર જોવા મળતી રચના છે, જે મુખ્યત્વે સેલ્યુલોઝ અને પેક્ટિનના બનેલી હોય છે. B, C, અને D ખોટા છે કારણ કે આ પદાર્થો ફિલિફોર્મ ઉપકરણની રચનામાં સામેલ નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "અંડયંત્રના સહાયક કોષો અને અંડકોષ વચ્ચે કયો જનીન તફાવત સાચો છે?", "opts": ["સહાયક કોષોમાં જનીનની સંખ્યા અંડકોષ કરતાં અડધી હોય છે", "અંડકોષમાં જનીનની સંખ્યા સહાયક કોષો કરતાં અડધી હોય છે", "બંનેમાં જનીનની સંખ્યા સરખી હોય છે", "સહાયક કોષોમાં જનીનની સંખ્યા અંડકોષ કરતાં ત્રણ ગણી હોય છે"], "ans": 1, "exp": "સહી જવાબ B છે. અંડકોષ હેપ્લોઇડ (n) હોય છે, જ્યારે સહાયક કોષો ડિપ્લોઇડ (2n) હોય છે, તેથી અંડકોષમાં જનીનની સંખ્યા સહાયક કોષો કરતાં અડધી હોય છે. A, C, અને D ખોટા છે કારણ કે તેઓ જનીન સંખ્યાના યોગ્ય ગુણોત્તરને દર્શાવતા નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "અંડયંત્રના વિકાસ દરમિયાન, નીચેનામાંથી કયું વિધાન અંડકોષ અને સહાયક કોષો વચ્ચેના જનીન તફાવતને સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["અંડકોષમાં મિતોસિસ દ્વારા વર્ણસૂત્રોની સંખ્યા બમણી થાય છે, જ્યારે સહાયક કોષોમાં મિયોસિસ થાય છે.", "અંડકોષમાં હેપ્લોઇડ વર્ણસૂત્રો હોય છે, જ્યારે સહાયક કોષોમાં ડિપ્લોઇડ વર્ણસૂત્રો હોય છે.", "અંડકોષ અને સહાયક કોષો બંનેમાં હેપ્લોઇડ વર્ણસૂત્રો હોય છે, પરંતુ સહાયક કોષોમાં જનીન અભિવ્યક્તિ અલગ હોય છે.", "અંડકોષમાં ડિપ્લોઇડ વર્ણસૂત્રો હોય છે, જ્યારે સહાયક કોષોમાં હેપ્લોઇડ વર્ણસૂત્રો હોય છે."], "ans": 2, "exp": "અંડયંત્રના વિકાસ દરમિયાન, અંડકોષ અને સહાયક કોષો બંનેમાં હેપ્લોઇડ (n) વર્ણસૂત્રો હોય છે, કારણ કે તેઓ મિયોસિસ પછી બને છે. પરંતુ સહાયક કોષોમાં જનીન અભિવ્યક્તિ (gene expression) અલગ હોય છે, જે તેમને અંડકોષ કરતાં ભિન્ન કાર્ય કરવા સક્ષમ બનાવે છે. અંડકોષમાં મિતોસિસ દ્વારા વર્ણસૂત્રોની સંખ્યા બમણી થવાનું વિધાન ખોટું છે, કારણ કે અંડકોષ હેપ્લોઇડ હોય છે અને મિતોસિસ તેની વર્ણસૂત્ર સંખ્યા બદલતી નથી. ડિપ્લોઇડ વર્ણસૂત્રો હોવાનું વિધાન પણ ખોટું છે, કારણ કે અંડયંત્રના તમામ કોષો હેપ્લોઇડ હોય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "એક સંશોધકે *પેપાવર સોમ્નિફેરમ* (અફીણના છોડ)ના અંડકોષ્ઠમાં અંડયંત્રનો અભ્યાસ કરતી વખતે નીચેના અવલોકનો નોંધ્યા: (1) અંડયંત્રમાં ત્રણ કોષો જોવા મળ્યા, જેમાં મધ્યસ્થ કોષ અંડકોષ હતો. (2) બંને સહાયક કોષોના કોષકેન્દ્રો અસામાન્ય રીતે મોટા અને બહુકોષકેન્દ્રીય જોવા મળ્યા. (3) સહાયક કોષોના કોષદીવાલ પર ફિલિફોર્મ ઉપકરણની ગેરહાજરી નોંધાઈ. (4) અંડકોષ અને સહાયક કોષો વચ્ચે કોષરસીય સેતુ જોવા મળ્યો નહીં. ઉપરોક્ત અવલોકનોમાંથી કયું વિધાન *પેપાવર સોમ્નિફેરમ*ના અંડયંત્ર માટે અપેક્ષિત નથી અને તેની અસામાન્યતા સૂચવે છે?", "opts": ["વિધાન (1) - અંડયંત્રમાં મધ્યસ્થ કોષ હંમેશા અંડકોષ હોય છે, જે સામાન્ય છે", "વિધાન (2) - સહાયક કોષોમાં બહુકોષકેન્દ્રીય સ્થિતિ સામાન્ય રીતે જોવા મળતી નથી", "વિધાન (3) - ફિલિફોર્મ ઉપકરણની ગેરહાજરી અંડયંત્રમાં સામાન્ય છે", "વિધાન (4) - અંડકોષ અને સહાયક કોષો વચ્ચે કોષરસીય સેતુની ગેરહાજરી અસામાન્ય નથી"], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B છે. *પેપાવર સોમ્નિફેરમ*ના અંડયંત્રમાં સહાયક કોષો સામાન્ય રીતે એકકોષકેન્દ્રીય હોય છે, પરંતુ અહીં બહુકોષકેન્દ્રીય સ્થિતિ અસામાન્ય છે અને તે અપેક્ષિત નથી. વિધાન (1) સાચું છે કારણ કે મધ્યસ્થ કોષ હંમેશા અંડકોષ હોય છે. વિધાન (3) ખોટું છે કારણ કે ફિલિફોર્મ ઉપકરણ સામાન્ય રીતે સહાયક કોષોમાં જોવા મળે છે, તેની ગેરહાજરી અસામાન્ય છે. વિધાન (4) સાચું છે કારણ કે કોષરસીય સેતુની ગેરહાજરી અંડયંત્રમાં સામાન્ય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "અંડયંત્રના વિકાસ દરમ્યાન, સહાયક કોષો અને અંડકોષ વચ્ચે કયા જનીન તફાવતને લીધે સહાયક કોષોમાં કોષકેન્દ્રનું અદૃશ્ય થવું જોવા મળે છે?", "opts": ["સહાયક કોષોમાં 'FIE' જનીનનું અભાવી હોવું, જે કોષકેન્દ્રના વિકાસ માટે જરૂરી છે", "અંડકોષમાં 'DD45' જનીનનું અતિરિક્ત પ્રમાણ, જે સહાયક કોષોના કોષકેન્દ્રને નષ્ટ કરે છે", "સહાયક કોષોમાં 'MYB64' જનીનનું ઓવરએક્સપ્રેશન, જે કોષકેન્દ્રના વિકાસને અટકાવે છે", "અંડકોષ અને સહાયક કોષો વચ્ચે 'AGAMOUS' જનીનનું અસંતુલિત વિતરણ"], "ans": 0, "exp": "સહાયક કોષોમાં કોષકેન્દ્રનું અદૃશ્ય થવું 'FIE' જનીનના અભાવને લીધે થાય છે, જે કોષકેન્દ્રના વિકાસ માટે આવશ્યક છે. બાકીના વિકલ્પો અયોગ્ય છે: B) 'DD45' જનીન અંડકોષના વિકાસ સાથે સંબંધિત નથી, C) 'MYB64' જનીન કોષકેન્દ્રના વિકાસને અટકાવતું નથી, D) 'AGAMOUS' જનીન પુષ્પના વિકાસ સાથે સંબંધિત છે, અંડયંત્રના કોષકેન્દ્ર સાથે નહીં.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં પ્રજનન", "ch": ""}, {"q": "અંડયંત્રના સહાયક કોષો અને અંડકોષ વચ્ચે કયો તફાવત સાચો છે, જ્યારે તેઓ વિકાસના અંતિમ તબક્કે હોય છે?", "opts": ["સહાયક કોષોમાં કોષકેન્દ્ર હાજર હોય છે, જ્યારે અંડકોષમાં કોષકેન્દ્ર અદૃશ્ય થઈ ગયું હોય છે", "અંડકોષમાં કોષકેન્દ્ર હાજર હોય છે, જ્યારે સહાયક કોષોમાં કોષકેન્દ્ર અદૃશ્ય થઈ ગયું હોય છે", "બંનેમાં કોષકેન્દ્ર હાજર હોય છે, પરંતુ સહાયક કોષોના કોષકેન્દ્રનું કદ અંડકોષ કરતાં મોટું હોય છે", "બંનેમાં કોષકેન્દ્ર અદૃશ્ય થઈ ગયું હોય છે, પરંતુ સહાયક કોષોમાં કોષરસ વધુ પ્રમાણમાં હોય છે"], "ans": 1, "exp": "વિકાસના અંતિમ તબક્કે અંડકોષમાં કોષકેન્દ્ર હાજર હોય છે, જ્યારે સહાયક કોષોમાં કોષકેન્દ્ર અદૃશ્ય થઈ ગયું હોય છે. બાકીના વિકલ્પો અયોગ્ય છે: A) સહાયક કોષોમાં કોષકેન્દ્ર હાજર નથી, C) સહાયક કોષોના કોષકેન્દ્રનું કદ અંડકોષ કરતાં મોટું હોવાનું વિધાન અયોગ્ય છે, D) અંડકોષમાં કોષકેન્દ્ર હાજર હોય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં પ્રજનન", "ch": ""}, {"q": "અંડયંત્રના વિકાસ દરમ્યાન, નીચેનામાંથી કયું વિધાન અંડકોષ અને સહાયક કોષો વચ્ચેના જનીન તફાવતને સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["અંડકોષમાં 'DEMETER' જનીનનું અતિરિક્ત પ્રમાણ હોય છે, જે સહાયક કોષોના કોષકેન્દ્રને નિષ્ક્રિય કરે છે", "સહાયક કોષોમાં 'RETINOBLASTOMA' જનીનનું અભાવી હોવું, જે કોષચક્રને નિયંત્રિત કરે છે", "અંડકોષમાં 'MEDEA' જનીનનું પ્રમાણ સહાયક કોષો કરતાં ઓછું હોય છે, જે ભ્રૂણપોષણના વિકાસને અસર કરે છે", "સહાયક કોષોમાં 'FIS2' જનીનનું ઓવરએક્સપ્રેશન હોય છે, જે અંડકોષના કોષકેન્દ્રને અદૃશ્ય કરે છે"], "ans": 2, "exp": "અંડકોષમાં 'MEDEA' જનીનનું પ્રમાણ સહાયક કોષો કરતાં ઓછું હોય છે, જે ભ્રૂણપોષણના વિકાસને અસર કરે છે. બાકીના વિકલ્પો અયોગ્ય છે: A) 'DEMETER' જનીન અંડકોષ અને સહાયક કોષો વચ્ચેના તફાવત સાથે સંબંધિત નથી, B) 'RETINOBLASTOMA' જનીન કોષચક્રને નિયંત્રિત કરે છે, પરંતુ અંડયંત્રના વિકાસ સાથે સીધો સંબંધ ધરાવતું નથી, D) 'FIS2' જનીન અંડકોષના કોષકેન્દ્રને અદૃશ્ય કરતું નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં પ્રજનન", "ch": ""}, {"q": "અંડયંત્રના વિકાસ દરમિયાન, સહાયક કોષો અને અંડકોષ વચ્ચે જનીન સ્તરે કયો તફાવત સાચો છે, જ્યારે અંડકોષમાં કોષવિભાજન થતું નથી અને સહાયક કોષોમાં થાય છે?", "opts": ["અંડકોષમાં મિયોસિસ II પૂર્ણ થયા પછી કોષકેન્દ્રમાં 1n DNA હોય છે, જ્યારે સહાયક કોષોમાં 2n DNA હોય છે.", "અંડકોષમાં મિયોસિસ I પૂર્ણ થયા પછી કોષકેન્દ્રમાં 2 ી પ્રજનન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
