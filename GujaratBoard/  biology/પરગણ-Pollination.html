<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પરાગણ (Pollination)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>પરાગણ (Pollination)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">પરાગણ (Pollination)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "નીચેના પૈકી કયું વિધાન પરાગનલિકાના વિકાસ માટે ખોટું છે?\n1. પરાગરજનું અંકુરણ પરાગાશયમાં જ થાય છે.\n2. પરાગનલિકા સ્ત્રીકેસરના પરાગાસન સુધી પહોંચવા માટે રાસાયણિક પ્રેરકો દ્વારા માર્ગદર્શન મેળવે છે.\n3. પરાગનલિકામાં બે નર પ્રજનન કોષો હોય છે.\n4. પરાગનલિકા વૃદ્ધિ માટે કેલ્શિયમ આયનો મહત્વપૂર્ણ છે.", "opts": ["ફક્ત 1", "ફક્ત 1 અને 3", "ફક્ત 2 અને 4", "ફક્ત 3"], "ans": 0, "exp": "વિધાન 1 ખોટું છે કારણ કે પરાગરજનું અંકુરણ પરાગાસન પર થાય છે, પરાગાશયમાં નહીં. વિધાન 3 સાચું છે કારણ કે પરાગનલિકામાં સામાન્ય રીતે બે નર પ્રજનન કોષો હોય છે. વિધાન 2 અને 4 સાચાં છે કારણ કે પરાગનલિકાને રાસાયણિક પ્રેરકો અને કેલ્શિયમ આયનો દ્વારા માર્ગદર્શન મળે છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "એક વનસ્પતિમાં પરાગાસન પરાગરજના સંપર્કમાં આવ્યા બાદ પણ પરાગનલિકા વિકસિત થતી નથી. આ ઘટનાનું કારણ શું હોઈ શકે?\n1. સ્વ-અસંગતતા (Self-incompatibility)\n2. પરાગરજની અપરિપક્વતા\n3. પરાગાસનની સપાટી પર રાસાયણિક અવરોધ\n4. પરાગરજમાં પૂરતા પોષક તત્વોનો અભાવ", "opts": ["ફક્ત 1 અને 2", "ફક્ત 1, 2 અને 3", "ફક્ત 2, 3 અને 4", "1, 2, 3 અને 4"], "ans": 3, "exp": "આ તમામ પરિબળો પરાગનલિકાના વિકાસને અવરોધી શકે છે. સ્વ-અસંગતતા જનીનિક નિયંત્રણ હેઠળ પરાગનલિકાના વિકાસને અટકાવે છે. પરાગરજની અપરિપક્વતા, પરાગાસન પર રાસાયણિક અવરોધ અને પોષક તત્વોનો અભાવ પણ પરાગનલિકાના વિકાસને અસર કરે છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયું જોડકું ખોટું છે?\n(પરાગણના પ્રકાર - ઉદાહરણ)", "opts": ["જલપરાગણ - વેલિસ્નેરિયા", "પક્ષી પરાગણ - સૂર્યમુખી", "કીટપરાગણ - સલગમ", "પવનપરાગણ - ઘઉં"], "ans": 1, "exp": "સૂર્યમુખી કીટપરાગણ દ્વારા પરાગિત થાય છે, પક્ષી પરાગણ દ્વારા નહીં. બાકીના જોડકાં સાચાં છે: વેલિસ્નેરિયા જલપરાગણ, સલગમ કીટપરાગણ અને ઘઉં પવનપરાગણ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "એક વનસ્પતિમાં પરાગરજનું પરાગાસન પર સ્થાપન થયા બાદ નીચેની ક્રિયાઓ કયા ક્રમમાં થાય છે?\n1. પરાગનલિકાનો વિકાસ\n2. દ્વિકીય યુગ્મનજનું નિર્માણ\n3. નર પ્રજનન કોષોનું સ્થળાંતરણ\n4. પરાગરજનું અંકુરણ", "opts": ["4 → 1 → 3 → 2", "1 → 4 → 3 → 2", "4 → 3 → 1 → 2", "1 → 3 → 4 → 2"], "ans": 0, "exp": "પરાગરજનું અંકુરણ (4) પહેલાં થાય છે, ત્યારબાદ પરાગનલિકાનો વિકાસ (1) થાય છે. પછી નર પ્રજનન કોષોનું સ્થળાંતરણ (3) થાય છે અને અંતમાં દ્વિકીય યુગ્મનજનું નિર્માણ (2) થાય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લો:\n(1) કેટલીક વનસ્પતિઓમાં પરાગરજનું પરાગાસન પર સ્થાપન થયા બાદ પણ ફલીકરણ થતું નથી.\n(2) આ ઘટના હંમેશા સ્વ-અસંગતતાને કારણે થાય છે.\n(3) કેટલીક વખત પરાગરજ અને પરાગાસન વચ્ચે રાસાયણિક અસંગતતા પણ કારણભૂત હોઈ શકે છે.\nઉપરોક્ત વિધાનો પૈકી કયું/કયાં સાચું/સાચાં છે?", "opts": ["ફક્ત 1 અને 2", "ફક્ત 1 અને 3", "ફક્ત 2 અને 3", "1, 2 અને 3"], "ans": 1, "exp": "વિધાન 1 અને 3 સાચાં છે. પરાગરજનું સ્થાપન થયા બાદ પણ ફલીકરણ ન થવાના ઘણાં કારણો હોઈ શકે છે, જેમાં સ્વ-અસંગતતા અને રાસાયણિક અસંગતતા બંને સામેલ છે. વિધાન 2 ખોટું છે કારણ કે આ ઘટના હંમેશા સ્વ-અસંગતતાને કારણે થતી નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયા પરાગણના પ્રકારમાં પરાગરજ એક જ ફૂલના પરાગકોષથી પરાગાસન પર સ્થળાંતર પામે છે, પરંતુ તે ફૂલના પરાગાસન પર અંકુરિત થતું નથી?", "opts": ["સ્વ-પરાગણ (Autogamy)", "ભ્રાતૃ-પરાગણ (Geitonogamy)", "પર-પરાગણ (Xenogamy)", "કૃત્રિમ પરાગણ (Artificial pollination)"], "ans": 1, "exp": "ભ્રાતૃ-પરાગણ (Geitonogamy)માં પરાગરજ એક જ વનસ્પતિના બીજા ફૂલના પરાગાસન પર સ્થળાંતર પામે છે, પરંતુ તે ફૂલના પરાગાસન પર અંકુરિત થતું નથી. સ્વ-પરાગણમાં પરાગરજ અને પરાગાસન એક જ ફૂલના હોય છે અને અંકુરણ થાય છે. પર-પરાગણમાં પરાગરજ બીજી વનસ્પતિના ફૂલના પરાગાસન પર સ્થળાંતર પામે છે. કૃત્રિમ પરાગણ માનવી દ્વારા કરવામાં આવે છે.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં ફૂલોની ભૂમિકા", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન પરાગણ દરમિયાન પરાગનલિકાના વિકાસ માટે સૌથી નિર્ણાયક પરિબળ છે?", "opts": ["તાપમાન અને ભેજ", "પરાગરજમાં સ્ટાર્ચની હાજરી", "પરાગાસન દ્વારા સ્રાવેલા રસાયણો", "પ્રકાશની તીવ્રતા"], "ans": 2, "exp": "પરાગાસન દ્વારા સ્રાવેલા રસાયણો (જેમ કે શર્કરા, પ્રોટીન અને ઉત્સેચકો) પરાગરજના અંકુરણ અને પરાગનલિકાના વિકાસ માટે નિર્ણાયક હોય છે. તાપમાન અને ભેજ પરાગણને પ્રભાવિત કરે છે, પરંતુ તે પરાગનલિકાના વિકાસ માટે સીધું પરિબળ નથી. પરાગરજમાં સ્ટાર્ચની હાજરી એ પોષણ માટે મહત્વપૂર્ણ છે, પરંતુ તે નિર્ણાયક પરિબળ નથી. પ્રકાશની તીવ્રતા પરાગણને પ્રભાવિત કરતી નથી.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં ફૂલોની ભૂમિકા", "ch": ""}, {"q": "એક વનસ્પતિમાં પરાગરજનું પરાગાસન પર સ્થાપન થયા બાદ, પરાગનલિકા વિકસિત થાય છે, પરંતુ તે બીજાંડકોષ સુધી પહોંચતી નથી. આ સ્થિતિ કયા કારણસર થઈ શકે?", "opts": ["પરાગરજમાં જનીન દોષ", "પરાગાસન અને પરાગરજ વચ્ચે અનુકૂળતા ન હોવી", "પરાગનલિકાના વિકાસ માટે પૂરતા પોષક તત્વોની ઉણપ", "ઉપરોક્ત તમામ"], "ans": 3, "exp": "પરાગનલિકા વિકસિત થયા બાદ બીજાંડકોષ સુધી પહોંચતી નથી તેના ઘણા કારણો હોઈ શકે: પરાગરજમાં જનીન દોષ, પરાગાસન અને પરાગરજ વચ્ચે અનુકૂળતા ન હોવી, અથવા પોષક તત્વોની ઉણપ. આથી, ઉપરોક્ત તમામ વિકલ્પો સાચા છે.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં ફૂલોની ભૂમિકા", "ch": ""}, {"q": "નીચેના પૈકી કયું જોડકું પરાગણના પ્રકાર અને તેના ઉદાહરણ સાથે ખોટું છે?", "opts": ["સ્વ-પરાગણ - કમળ", "પર-પરાગણ - મકાઈ", "ભ્રાતૃ-પરાગણ - પપૈયા", "કૃત્રિમ પરાગણ - ટામેટા"], "ans": 0, "exp": "કમળમાં સ્વ-પરાગણ થતું નથી, કારણ કે તેના પરાગકોષ અને પરાગાસન વચ્ચે અંતર હોય છે. મકાઈમાં પર-પરાગણ થાય છે, પપૈયામાં ભ્રાતૃ-પરાગણ થાય છે, અને ટામેટામાં કૃત્રિમ પરાગણ કરવામાં આવે છે.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં ફૂલોની ભૂમિકા", "ch": ""}, {"q": "પરાગણ દરમિયાન, પરાગરજનું પરાગાસન પર સ્થાપન થયા બાદ, નીચેની ક્રિયાઓમાંથી કયું ક્રમ સાચો છે? 1. પરાગરજનું અંકુરણ, 2. પરાગનલિકાનો વિકાસ, 3. પરાગનલિકા દ્વારા બીજાંડકોષ તરફ પ્રવેશ, 4. નર ગેમીટની રચના", "opts": ["1, 2, 3, 4", "2, 1, 4, 3", "1, 3, 2, 4", "4, 1, 2, 3"], "ans": 0, "exp": "પરાગરજનું અંકુરણ (1) થયા બાદ પરાગનલિકાનો વિકાસ (2) થાય છે, ત્યારબાદ પરાગનલિકા બીજાંડકોષ તરફ પ્રવેશે છે (3), અને અંતે નર ગેમીટની રચના (4) થાય છે. આથી, સાચો ક્રમ 1, 2, 3, 4 છે.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં ફૂલોની ભૂમિકા", "ch": ""}, {"q": "નીચેના પૈકી કયા પરાગણના પ્રકારમાં પરાગરજ એક જ વનસ્પતિના ભિન્ન ફૂલોમાં સ્થાનાંતરિત થાય છે, પરંતુ તેને અંતર્ગત પરાગણ ગણવામાં આવે છે?", "opts": ["સ્વ-પરાગણ (Autogamy)", "ભ્રાતૃ-પરાગણ (Geitonogamy)", "પર-પરાગણ (Xenogamy)", "કૃત્રિમ પરાગણ (Artificial pollination)"], "ans": 1, "exp": "ભ્રાતૃ-પરાગણ (Geitonogamy)માં પરાગરજ એક જ વનસ્પતિના ભિન્ન ફૂલોમાં સ્થાનાંતરિત થાય છે, પરંતુ જનનિક દ્રષ્ટિએ તે અંતર્ગત પરાગણ ગણાય છે કારણ કે પરાગરજ અને પરાગાસન એક જ વનસ્પતિના હોય છે. સ્વ-પરાગણમાં પરાગરજ અને પરાગાસન એક જ ફૂલના હોય છે. પર-પરાગણમાં પરાગરજ ભિન્ન વનસ્પતિના ફૂલ પર સ્થાનાંતરિત થાય છે. કૃત્રિમ પરાગણ માનવી દ્વારા કરવામાં આવે છે.", "ref": "Std 12 - અધ્યાય 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "નીચેના વિધાનો પૈકી કયું પરાગણ દરમિયાન પરાગનલિકાના વિકાસ માટે સૌથી અગત્યનું છે?", "opts": ["પરાગાસન પર પૂરતું પાણી હોવું", "પરાગરજમાં સક્રિય ઉત્સેચકોની હાજરી", "પરાગાસન દ્વારા સ્રાવવામાં આવતી રસાયણિક સંકેતો", "ઉચ્ચ તાપમાન અને આર્દ્રતા"], "ans": 2, "exp": "પરાગાસન દ્વારા સ્રાવવામાં આવતી રસાયણિક સંકેતો (જેમ કે પ્રોટીન, શર્કરા) પરાગરજના અંકુરણ અને પરાગનલિકાના વિકાસ માટે નિર્ણાયક હોય છે. પરાગાસન પર પાણી હોવું અંકુરણ માટે મદદરૂપ થાય છે, પરંતુ તે નિર્ણાયક પરિબળ નથી. પરાગરજમાં ઉત્સેચકો હોવા છતાં, પરાગાસનના સંકેતો વિના પરાગનલિકા વિકસિત થતી નથી. ઉચ્ચ તાપમાન અને આર્દ્રતા પરાગણને પ્રભાવિત કરે છે, પરંતુ તે પરાગનલિકાના વિકાસ માટે સૌથી અગત્યના પરિબળો નથી.", "ref": "Std 12 - અધ્યાય 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયા પરાગણના પ્રકારમાં પરાગરજનું સ્થાનાંતરણ પવન દ્વારા થાય છે અને તે માટે પરાગરજ હલકો, શુષ્ક અને મોટા પ્રમાણમાં ઉત્પન્ન થાય છે?", "opts": ["જલ-પરાગણ (Hydrophily)", "કીટક-પરાગણ (Entomophily)", "વાયુ-પરાગણ (Anemophily)", "પક્ષી-પરાગણ (Ornithophily)"], "ans": 2, "exp": "વાયુ-પરાગણ (Anemophily)માં પરાગરજનું સ્થાનાંતરણ પવન દ્વારા થાય છે. આ માટે પરાગરજ હલકો, શુષ્ક અને મોટા પ્રમાણમાં ઉત્પન્ન થાય છે જેથી પવન દ્વારા સરળતાથી વહન થઈ શકે. જલ-પરાગણમાં પાણી દ્વારા, કીટક-પરાગણમાં કીટકો દ્વારા અને પક્ષી-પરાગણમાં પક્ષીઓ દ્વારા પરાગરજનું સ્થાનાંતરણ થાય છે.", "ref": "Std 12 - અધ્યાય 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયા પરાગણના પ્રકારમાં પરાગરજનું સ્થાનાંતરણ પાણી દ્વારા થાય છે અને તે માટે પરાગરજ ચીકણો અને પાણીમાં તરતો હોય છે?", "opts": ["વાયુ-પરાગણ (Anemophily)", "કીટક-પરાગણ (Entomophily)", "જલ-પરાગણ (Hydrophily)", "પક્ષી-પરાગણ (Ornithophily)"], "ans": 2, "exp": "જલ-પરાગણ (Hydrophily)માં પરાગરજનું સ્થાનાંતરણ પાણી દ્વારા થાય છે. આ માટે પરાગરજ ચીકણો અને પાણીમાં તરતો હોય છે જેથી પાણી દ્વારા સરળતાથી વહન થઈ શકે. વાયુ-પરાગણમાં પવન, કીટક-પરાગણમાં કીટકો અને પક્ષી-પરાગણમાં પક્ષીઓ દ્વારા પરાગરજનું સ્થાનાંતરણ થાય છે.", "ref": "Std 12 - અધ્યાય 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયા પરાગણના પ્રકારમાં પરાગરજનું સ્થાનાંતરણ જીવજંતુઓ દ્વારા થાય છે અને તે દરમિયાન પરાગરજના કણોની સપાટી પર મીણ જેવું પદાર્થનું આવરણ હાજર હોય છે, જે પરાગરજને સૂકવણી થતી અટકાવે છે?", "opts": ["એનિમોફિલી", "હાઇડ્રોફિલી", "એનેમોફિલી", "ઝૂફિલી"], "ans": 0, "exp": "એનિમોફિલી (જીવપરાગણ)માં પરાગરજનું સ્થાનાંતરણ જીવજંતુઓ (જેવા કે મધમાખી, પતંગિયા વગેરે) દ્વારા થાય છે. આ પ્રકારના પરાગણમાં પરાગરજના કણોની સપાટી પર મીણ જેવું પદાર્થનું આવરણ (લિપિડ કોટિંગ) હાજર હોય છે, જે પરાગરજને સૂકવણી થતી અટકાવે છે અને જીવજંતુઓ દ્વારા વહન દરમિયાન તેનું રક્ષણ કરે છે. હાઇડ્રોફિલી (પાણી દ્વારા પરાગણ)માં પરાગરજ પાણી દ્વારા વહન પામે છે, એનેમોફિલી (પવન દ્વારા પરાગણ)માં પરાગરજ પવન દ્વારા વહન પામે છે, જ્યારે ઝૂફિલી એ અસ્તિત્વમાં નથી. આમ, સાચો જવાબ એનિમોફિલી છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયા પરાગણના પ્રકારમાં પરાગરજનું સ્થાનાંતરણ એક જ વનસ્પતિના ભિન્ન ફૂલોમાં થાય છે, પરંતુ તેને અંતર્ગત પરાગણ (Geitonogamy) ન કહી શકાય?", "opts": ["સ્વ-પરાગણ (Autogamy)", "કૃત્રિમ પરાગણ (Artificial pollination)", "પર-પરાગણ (Xenogamy)", "હવા દ્વારા થતું પરાગણ (Anemophily)"], "ans": 0, "exp": "સ્વ-પરાગણ (Autogamy)માં પરાગરજ એક જ ફૂલના પરાગકોષથી પરાગાસન પર સ્થાનાંતરિત થાય છે, પરંતુ અંતર્ગત પરાગણ (Geitonogamy)માં પરાગરજ એક જ વનસ્પતિના ભિન્ન ફૂલોમાં સ્થાનાંતરિત થાય છે. ઉલ્લેખનીય છે કે સ્વ-પરાગણને અંતર્ગત પરાગણ ન કહી શકાય, કારણ કે તે એક જ ફૂલમાં થાય છે. કૃત્રિમ પરાગણ માનવી દ્વારા કરવામાં આવે છે, પર-પરાગણ ભિન્ન વનસ્પતિઓ વચ્ચે થાય છે, અને હવા દ્વારા થતું પરાગણ પરાગણના માધ્યમ સાથે સંબંધિત છે, પરાગણના પ્રકાર સાથે નહીં.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "એક વનસ્પતિમાં પરાગરજનું અંકુરણ થયા બાદ પરાગનલિકા વિકસિત થાય છે. નીચેના પૈકી કયું પરિબળ પરાગનલિકાના વિકાસને અટકાવી શકે છે?", "opts": ["પરાગાસન પર પૂરતું પ્રમાણમાં પાણી હાજર હોવું", "પરાગરજમાં અપૂરતું પ્રમાણમાં કાર્બોદિત હાજર હોવું", "ઉચ્ચ તાપમાન અને આર્દ્રતા", "પરાગાસન પર સક્રિય ઉત્સેચકોની હાજરી"], "ans": 1, "exp": "પરાગરજમાં અપૂરતું પ્રમાણમાં કાર્બોદિત હાજર હોવું તે પરાગનલિકાના વિકાસને અટકાવી શકે છે, કારણ કે કાર્બોદિત પરાગનલિકાના વિકાસ માટે આવશ્યક ઉર્જા પૂરી પાડે છે. પરાગાસન પર પૂરતું પ્રમાણમાં પાણી, ઉચ્ચ તાપમાન અને આર્દ્રતા, તેમજ સક્રિય ઉત્સેચકોની હાજરી પરાગનલિકાના વિકાસને પ્રોત્સાહન આપે છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયા જોડકામાં પરાગણના પ્રકાર અને તેના લક્ષણનો ખોટો સમાવેશ થયો છે?", "opts": ["હાઇડ્રોફિલી - પાણી દ્વારા પરાગરજનું સ્થાનાંતરણ, પરાગરજ ભીનું અને ચીકણું હોવું", "એન્ટોમોફિલી - કીટકો દ્વારા પરાગરજનું સ્થાનાંતરણ, પરાગરજ ચીકણું અને રંગીન હોવું", "એનિમોફિલી - પશુઓ દ્વારા પરાગરજનું સ્થાનાંતરણ, પરાગરજ હલકું અને સૂકું હોવું", "ઓર્નિથોફિલી - પક્ષીઓ દ્વારા પરાગરજનું સ્થાનાંતરણ, પરાગરજ ચીકણું અને રંગીન હોવું"], "ans": 2, "exp": "એનિમોફિલી (પશુઓ દ્વારા પરાગણ)માં પરાગરજ સામાન્ય રીતે ચીકણું અને રંગીન હોતું નથી, પરંતુ હલકું અને સૂકું હોવું જરૂરી નથી. પશુઓ દ્વારા પરાગણમાં પરાગરજ સામાન્ય રીતે ચીકણું અને રંગીન હોવું જોઈએ, જેથી તે પશુઓના શરીર પર ચોંટી રહે. હાઇડ્રોફિલી, એન્ટોમોફિલી, અને ઓર્નિથોફિલીના લક્ષણો સાચા છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "એક વનસ્પતિમાં પરાગણ બાદ ફલન થતું નથી. નીચેના પૈકી કયું કારણ આ માટે જવાબદાર હોઈ શકે છે?", "opts": ["પરાગરજ અને અંડકોષ વચ્ચે જનીન અસંગતતા", "પરાગાસન પર પૂરતું પ્રમાણમાં પાણી હાજર હોવું", "પરાગરજનું અંકુરણ થયું હોવું", "પરાગનલિકા વિકસિત થયી હોવી"], "ans": 0, "exp": "પરાગરજ અને અંડકોષ વચ્ચે જનીન અસંગતતા હોવાને કારણે ફલન થતું નથી. પરાગાસન પર પૂરતું પ્રમાણમાં પાણી, પરાગરજનું અંકુરણ, અને પરાગનલિકા વિકાસ એ ફલન માટે આવશ્યક પરિબળો છે, પરંતુ જનીન અસંગતતા ફલનને અટકાવી શકે છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન પરાગણ દરમિયાન પરાગરજના સ્થાનાંતરણ માટે સૌથી અસરકારક છે, જ્યારે વનસ્પતિ પવન પ્રધાન વિસ્તારમાં ઉગે છે?", "opts": ["પરાગરજનું પ્રમાણ વધારે હોવું", "પરાગરજ હલકું અને સૂકું હોવું", "પરાગરજ ચીકણું અને રંગીન હોવું", "પરાગરજ મોટા કદનું હોવું"], "ans": 1, "exp": "પવન પ્રધાન વિસ્તારમાં ઉગતી વનસ્પતિઓ માટે, પરાગરજ હલકું અને સૂકું હોવું સૌથી અસરકારક છે, કારણ કે તે પવન દ્વારા સરળતાથી વહન કરી શકાય છે. પરાગરજનું પ્રમાણ વધારે હોવું, ચીકણું અને રંગીન હોવું, અથવા મોટા કદનું હોવું એ પવન દ્વારા સ્થાનાંતરણ માટે અનુકૂળ નથી.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
