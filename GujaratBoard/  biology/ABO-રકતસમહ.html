<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABO રક્તસમૂહ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ABO રક્તસમૂહ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ABO રક્તસમૂહ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક માતા-પિતાના બંનેનું રક્તસમૂહ AB છે. તેમના બાળકનું રક્તસમૂહ નીચેનામાંથી કયું હોઈ શકે નહીં?", "opts": ["A", "B", "AB", "O"], "ans": 3, "exp": "AB રક્તસમૂહ ધરાવતા માતા-પિતાના જનીનો IA અને IB હોય છે. તેમના બાળકમાં IAIA (A), IAIB (AB), અથવા IBIB (B) રક્તસમૂહ હોઈ શકે, પરંતુ ii (O) જનીન સંયોજન શક્ય નથી કારણ કે માતા-પિતા પાસે i જનીન હોતું નથી. તેથી O રક્તસમૂહ અશક્ય છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક વ્યક્તિનું રક્તસમૂહ A છે અને તેની પત્નીનું રક્તસમૂહ B છે. તેમના બાળકનું રક્તસમૂહ O હોય તો માતા-પિતાના જનીન પ્રકાર કયા હોવા જોઈએ?", "opts": ["IAIA × IBIB", "IAi × IBi", "IAIA × IBi", "IAi × IBIB"], "ans": 1, "exp": "બાળકનું રક્તસમૂહ O (ii) હોય તો માતા-પિતા બંનેમાં i જનીન હોવું જરૂરી છે. માતા-પિતાના જનીન IAi અને IBi હોવા જોઈએ જેથી બાળકમાં ii સંયોજન શક્ય બને. અન્ય વિકલ્પોમાં i જનીનનો અભાવ હોવાથી O રક્તસમૂહ શક્ય નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "રક્તસમૂહ સંબંધિત નીચેના વિધાનો પૈકી કયું ખોટું છે?\n(1) A રક્તસમૂહ ધરાવતી વ્યક્તિના લાલ રક્તકોષો પર A એન્ટિજન હોય છે.\n(2) B રક્તસમૂહ ધરાવતી વ્યક્તિના પ્લાઝ્મા માં anti-A એન્ટિબોડી હોય છે.\n(3) AB રક્તસમૂહ ધરાવતી વ્યક્તિ સાર્વત્રિક પ્રાપ્તકર્તા છે.\n(4) O રક્તસમૂહ ધરાવતી વ્યક્તિના પ્લાઝ્મા માં anti-A અને anti-B બંને એન્ટિબોડી હોતા નથી.", "opts": ["ફક્ત 1", "ફક્ત 2 અને 3", "ફક્ત 4", "ફક્ત 2 અને 4"], "ans": 2, "exp": "વિધાન 4 ખોટું છે કારણ કે O રક્તસમૂહ ધરાવતી વ્યક્તિના પ્લાઝ્મા માં anti-A અને anti-B બંને એન્ટિબોડી હોય છે. વિધાન 2 સાચું છે કારણ કે B રક્તસમૂહ ધરાવતી વ્યક્તિના પ્લાઝ્મા માં anti-A એન્ટિબોડી હોય છે. વિધાન 1 અને 3 સાચાં છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એક વ્યક્તિનું રક્તસમૂહ A છે અને તેને રક્ત ચડાવવું છે. નીચેનામાંથી કયું રક્તસમૂહ તેને સુરક્ષિત રીતે આપી શકાય નહીં?", "opts": ["A", "O", "AB", "A અને O બંને"], "ans": 2, "exp": "A રક્તસમૂહ ધરાવતી વ્યક્તિને A અથવા O રક્તસમૂહ આપી શકાય છે કારણ કે O રક્તસમૂહમાં એન્ટિજન હોતા નથી અને A રક્તસમૂહમાં A એન્ટિજન હોય છે જે સ્વીકાર્ય છે. પરંતુ AB રક્તસમૂહમાં A અને B બંને એન્ટિજન હોય છે, જે A રક્તસમૂહ ધરાવતી વ્યક્તિના anti-B એન્ટિબોડી સાથે પ્રતિક્રિયા કરશે, તેથી AB રક્તસમૂહ આપી શકાય નહીં.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "રક્તસમૂહ સંબંધિત નીચેના જોડકાંને યોગ્ય રીતે જોડો:\n(1) IAIA અથવા IAi\n(2) IBIB અથવા IBi\n(3) IAIB\n(4) ii\n\n(P) AB રક્તસમૂહ\n(Q) O રક્તસમૂહ\n(R) A રક્તસમૂહ\n(S) B રક્તસમૂહ", "opts": ["1-R, 2-S, 3-P, 4-Q", "1-P, 2-Q, 3-R, 4-S", "1-S, 2-R, 3-Q, 4-P", "1-Q, 2-P, 3-S, 4-R"], "ans": 0, "exp": "IAIA અથવા IAi જનીન પ્રકાર A રક્તસમૂહ (R) દર્શાવે છે. IBIB અથવા IBi જનીન પ્રકાર B રક્તસમૂહ (S) દર્શાવે છે. IAIB જનીન પ્રકાર AB રક્તસમૂહ (P) દર્શાવે છે. ii જનીન પ્રકાર O રક્તસમૂહ (Q) દર્શાવે છે. તેથી સાચું જોડાણ 1-R, 2-S, 3-P, 4-Q છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક વ્યક્તિનું રક્તસમૂહ 'O' છે અને તેના માતા-પિતામાંથી એકનું રક્તસમૂહ 'A' છે. બીજા માતા-પિતાનું રક્તસમૂહ નીચેનામાંથી કયું હોઈ શકે નહીં?", "opts": ["'A' રક્તસમૂહ", "'B' રક્તસમૂહ", "'AB' રક્તસમૂહ", "'O' રક્તસમૂહ"], "ans": 2, "exp": "'O' રક્તસમૂહ ધરાવતી વ્યક્તિના જનીન પ્રકાર ii હોય છે. જો એક માતા-પિતાનું રક્તસમૂહ 'A' (IAi અથવા IAIA) હોય, તો બીજા માતા-પિતા પાસેથી 'i' એલેલ મળવું જરૂરી છે. 'AB' રક્તસમૂહ ધરાવતી વ્યક્તિના જનીન પ્રકાર IAIB હોય છે, જે 'i' એલેલ આપી શકતી નથી. તેથી 'AB' રક્તસમૂહ ધરાવતા માતા-પિતા પાસેથી 'O' રક્તસમૂહનું બાળક થઈ શકે નહીં. બાકીના વિકલ્પોમાં 'A', 'B' અથવા 'O' રક્તસમૂહ ધરાવતા માતા-પિતા 'i' એલેલ આપી શકે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લો: (1) 'O' રક્તસમૂહ ધરાવતી વ્યક્તિ સાર્વત્રિક દાતા છે. (2) 'AB' રક્તસમૂહ ધરાવતી વ્યક્તિ સાર્વત્રિક પ્રાપ્તકર્તા છે. (3) 'A' રક્તસમૂહ ધરાવતી વ્યક્તિને 'B' રક્તસમૂહનું રક્ત ચડાવી શકાય છે. ઉપરોક્ત વિધાનોમાંથી કયું/કયાં સાચું/સાચાં છે?", "opts": ["માત્ર (1) અને (2)", "માત્ર (1) અને (3)", "માત્ર (2) અને (3)", "માત્ર (1)"], "ans": 0, "exp": "'O' રક્તસમૂહ ધરાવતી વ્યક્તિના રક્તમાં A કે B એન્ટિજન હોતા નથી, તેથી તે સાર્વત્રિક દાતા છે (વિધાન 1 સાચું). 'AB' રક્તસમૂહ ધરાવતી વ્યક્તિના રક્તમાં A અને B એન્ટિજન હોવા છતાં કોઈ એન્ટિબોડી હોતા નથી, તેથી તે સાર્વત્રિક પ્રાપ્તકર્તા છે (વિધાન 2 સાચું). 'A' રક્તસમૂહ ધરાવતી વ્યક્તિના રક્તમાં એન્ટિ-B એન્ટિબોડી હોય છે, તેથી તેને 'B' રક્તસમૂહનું રક્ત ચડાવી શકાય નહીં (વિધાન 3 ખોટું).", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એક પરિવારમાં પિતાનું રક્તસમૂહ 'B' અને માતાનું રક્તસમૂહ 'A' છે. તેમના બાળકનું રક્તસમૂહ 'O' છે. આ પરિસ્થિતિમાં માતા-પિતાના જનીન પ્રકાર કયા હશે?", "opts": ["પિતા: IBIB, માતા: IAIA", "પિતા: IBi, માતા: IAi", "પિતા: IBIB, માતા: IAi", "પિતા: IBi, માતા: IAIA"], "ans": 1, "exp": "'O' રક્તસમૂહ ધરાવતા બાળકનો જનીન પ્રકાર ii હોય છે. આ માટે બંને માતા-પિતા પાસેથી 'i' એલેલ મળવું જરૂરી છે. પિતાનું રક્તસમૂહ 'B' હોઈ શકે છે IBIB અથવા IBi, અને માતાનું રક્તસમૂહ 'A' હોઈ શકે છે IAIA અથવા IAi. પરંતુ 'O' રક્તસમૂહનું બાળક ત્યારે જ શક્ય છે જ્યારે બંને માતા-પિતા પાસે 'i' એલેલ હોય. તેથી પિતાનો જનીન પ્રકાર IBi અને માતાનો જનીન પ્રકાર IAi હોવો જોઈએ.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "રક્તસમૂહ સંબંધિત નીચેના જોડકાંને યોગ્ય રીતે જોડો: (P) IAIA (Q) IBIB (R) IAi (S) IBi (1) 'A' રક્તસમૂહ (2) 'B' રક્તસમૂહ (3) 'AB' રક્તસમૂહ (4) 'O' રક્તસમૂહ", "opts": ["P-1, Q-2, R-1, S-2", "P-1, Q-2, R-3, S-4", "P-3, Q-3, R-1, S-2", "P-1, Q-2, R-4, S-3"], "ans": 0, "exp": "IAIA અને IAi બંને 'A' રક્તસમૂહ દર્શાવે છે (P-1, R-1). IBIB અને IBi બંને 'B' રક્તસમૂહ દર્શાવે છે (Q-2, S-2). 'AB' રક્તસમૂહ IAIB દ્વારા દર્શાવાય છે, જે અહીં આપેલ નથી, અને 'O' રક્તસમૂહ ii દ્વારા દર્શાવાય છે, જે પણ અહીં આપેલ નથી. તેથી સાચું જોડાણ P-1, Q-2, R-1, S-2 છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક હોસ્પિટલમાં રક્તદાન શિબિરમાં નીચેના રક્તસમૂહ ધરાવતા દાતાઓ છે: 5 'A', 3 'B', 2 'AB', અને 4 'O'. એક દર્દીને તાત્કાલિક રક્તની જરૂર છે જેનું રક્તસમૂહ 'A' છે. આ દર્દી માટે કેટલા દાતાઓ યોગ્ય છે?", "opts": ["5", "7", "9", "11"], "ans": 2, "exp": "'A' રક્તસમૂહ ધરાવતા દર્દીને 'A' અથવા 'O' રક્તસમૂહનું રક્ત ચડાવી શકાય છે. અહીં 'A' રક્તસમૂહના 5 દાતા અને 'O' રક્તસમૂહના 4 દાતા છે. તેથી કુલ યોગ્ય દાતાઓ = 5 ('A') + 4 ('O') = 9.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એક વ્યક્તિનું રક્તસમૂહ AB છે અને તેને આપાતકાલીન સ્થિતિમાં રક્ત ચડાવવું પડે છે. નીચેનામાંથી કયું રક્તસમૂહ તેને સુરક્ષિત રીતે ચડાવી શકાય છે, પરંતુ તેના શરીરમાં પ્રતિક્રિયા ઉત્પન્ન કરવાની શક્યતા સૌથી ઓછી છે?", "opts": ["O નેગેટિવ (O⁻)", "A પોઝિટિવ (A⁺)", "B નેગેટિવ (B⁻)", "AB પોઝિટિવ (AB⁺)"], "ans": 0, "exp": "AB રક્તસમૂહ ધરાવતી વ્યક્તિ સાર્વત્રિક પ્રાપ્તકર્તા હોવા છતાં, રક્ત ચડાવતી વખતે Rh ફેક્ટરની પણ કાળજી લેવી પડે છે. O⁻ રક્તસમૂહમાં કોઈપણ એન્ટિજન (A, B, અથવા Rh) ન હોવાથી તે સૌથી સુરક્ષિત વિકલ્પ છે. A⁺ અને B⁻માં ક્રમશ: A અને B એન્ટિજન હોવાથી AB રક્તસમૂહ ધરાવતી વ્યક્તિમાં પ્રતિક્રિયા થઈ શકે છે. AB⁺ રક્તસમૂહ ચડાવવાથી Rh એન્ટિજનની હાજરીથી પ્રતિક્રિયા થઈ શકે છે જો પ્રાપ્તકર્તા Rh⁻ હોય.", "ref": "Std 12 - પ્રકરણ 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લો: (1) ABO રક્તસમૂહ વ્યવસ્થામાં, IA અને IB જનીનોમાં સહ-પ્રભાવિતા (co-dominance) જોવા મળે છે. (2) Rh ફેક્ટર માટેના જનીન D અને d છે, જેમાં D પ્રભાવી છે. (3) O રક્તસમૂહ ધરાવતી વ્યક્તિમાં IA અને IB બંને જનીનોની અનુપસ્થિતિમાં i જનીન હાજર હોય છે. (4) AB રક્તસમૂહ ધરાવતી વ્યક્તિના પિતા અથવા માતાનું રક્તસમૂહ O હોઈ શકે છે. કયા વિધાનો ખોટા છે?", "opts": ["ફક્ત (4)", "(2) અને (4)", "(3) અને (4)", "ફક્ત (3)"], "ans": 0, "exp": "વિધાન (1), (2), અને (3) સરખાં છે. IA અને IB સહ-પ્રભાવિતા દર્શાવે છે, Rh ફેક્ટર માટે D પ્રભાવી છે, અને O રક્તસમૂહમાં i જનીન હાજર હોય છે. પરંતુ વિધાન (4) ખોટું છે કારણ કે AB રક્તસમૂહ ધરાવતી વ્યક્તિના માતા-પિતામાંથી કોઈનું રક્તસમૂહ O હોઈ શકતું નથી, કારણ કે AB રક્તસમૂહ માટે IA અને IB બંને જનીનોની હાજરી જરૂરી છે.", "ref": "Std 12 - પ્રકરણ 5: વંશાવળી અને વારસાગતતા", "ch": ""}, {"q": "એક પરિવારમાં, પિતાનું રક્તસમૂહ A છે અને માતાનું રક્તસમૂહ O છે. તેમના બાળકનું રક્તસમૂહ B છે. આ સ્થિતિમાં કયું વિધાન સત્ય છે?", "opts": ["પિતા હેટરોઝાયગસ (IAi) છે અને માતા હોમોઝાયગસ (ii) છે.", "પિતા હોમોઝાયગસ (IAIA) છે અને માતા હેટરોઝાયગસ (Ii) છે.", "બાળકનું રક્તસમૂહ B હોવું અનુવંશિકતાના નિયમોના વિરુદ્ધ છે.", "માતાનું રક્તસમૂહ O હોવા છતાં બાળકનું રક્તસમૂહ B હોવું શક્ય નથી."], "ans": 0, "exp": "પિતાનું રક્તસમૂહ A (IAi) અને માતાનું રક્તસમૂહ O (ii) હોવા છતાં, બાળકનું રક્તસમૂહ B હોવું શક્ય નથી, કારણ કે માતા પાસેથી ફક્ત i જનીન અને પિતા પાસેથી IA અથવા i જનીન જ મળી શકે. પરંતુ વિધાન (A) સત્ય છે કારણ કે પિતા હેટરોઝાયગસ (IAi) હોવા છતાં, બાળકને IB જનીન ક્યાંથી મળ્યું તે અસ્પષ્ટ છે, પરંતુ પ્રશ્નમાં આપેલા વિકલ્પો પૈકી (A) સૌથી યોગ્ય છે. (C) અને (D) ખોટા છે કારણ કે બાળકનું રક્તસમૂહ B હોવું અનુવંશિકતાના નિયમોના વિરુદ્ધ છે.", "ref": "Std 12 - પ્રકરણ 5: વંશાવળી અને વારસાગતતા", "ch": ""}, {"q": "નીચેના જોડકાંને યોગ્ય રીતે જોડો અને કયો વિકલ્પ સરખો છે તે જણાવો: (P) IAi (1) રક્તસમૂહ A (Q) IBi (2) રક્તસમૂહ B (R) ii (3) રક્તસમૂહ O (S) IAIB (4) રક્તસમૂહ AB", "opts": ["P-1, Q-2, R-3, S-4", "P-2, Q-1, R-3, S-4", "P-1, Q-3, R-2, S-4", "P-4, Q-3, R-2, S-1"], "ans": 0, "exp": "IAi જનીનોથી રક્તસમૂહ A (P-1), IBi જનીનોથી રક્તસમૂહ B (Q-2), ii જનીનોથી રક્તસમૂહ O (R-3), અને IAIB જનીનોથી રક્તસમૂહ AB (S-4) થાય છે. આમ, વિકલ્પ (A) સરખો છે.", "ref": "Std 12 - પ્રકરણ 5: વંશાવળી અને વારસાગતતા", "ch": ""}, {"q": "એક વ્યક્તિનું રક્તસમૂહ A છે અને તેને Rh⁻ છે. તેને રક્ત ચડાવવું છે. નીચેનામાંથી કયું રક્તસમૂહ તેને ચડાવી શકાય છે, પરંતુ તેના શરીરમાં પ્રતિક્રિયા ઉત્પન્ન કરશે નહીં?", "opts": ["A⁺", "O⁻", "AB⁻", "B⁻"], "ans": 1, "exp": "A Rh⁻ વ્યક્તિને O⁻ રક્તસમૂહ ચડાવી શકાય છે કારણ કે O⁻માં કોઈપણ એન્ટિજન (A, B, અથવા Rh) ન હોવાથી તે સુરક્ષિત છે. A⁺માં Rh એન્ટિજન હોવાથી પ્રતિક્રિયા થઈ શકે છે. AB⁻માં B એન્ટિજન હોવાથી પ્રતિક્રિયા થઈ શકે છે. B⁻માં B એન્ટિજન હોવાથી પ્રતિક્રિયા થઈ શકે છે.", "ref": "Std 12 - પ્રકરણ 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એક વ્યક્તિનું રક્તસમૂહ AB છે અને તે Rh+ છે. તેને આપાતકાલીન સ્થિતિમાં રક્ત ચડાવવું પડે છે. નીચેનામાંથી કયું રક્તસમૂહ તેને સુરક્ષિત રીતે ચડાવી શકાય? (ધ્યાનમાં લો કે Rh- રક્તસમૂહ ધરાવતા વ્યક્તિને Rh+ રક્ત ચડાવવાથી પ્રતિકૂળ પ્રતિક્રિયા થઈ શકે છે.)", "opts": ["AB Rh+", "AB Rh−", "O Rh−", "A Rh+"], "ans": 0, "exp": "AB Rh+ રક્તસમૂહ ધરાવતી વ્યક્તિને AB Rh+ રક્ત ચડાવવા સુરક્ષિત છે કારણ કે તેનામાં A, B, અને Rh એન્ટિજેન હાજર છે, જે રિસીવરના શરીરમાં પ્રતિકૂળ પ્રતિક્રિયા ઉત્પન્ન કરશે નહીં. AB Rh− રક્ત ચડાવવાથી Rh+ એન્ટિજેનની ગેરહાજરીને લીધે પ્રતિકૂળ પ્રતિક્રિયા થઈ શકે છે. O Rh− અને A Rh+ રક્તસમૂહમાં ક્રમશઃ A એન્ટિજેન અને Rh એન્ટિજેનની ગેરહાજરી અથવા અસંગતતા હોવાથી તે સુરક્ષિત નથી.", "ref": "Std 12 - પ્રકરણ 5: વંશવિજ્ઞાન અને ઉત્ક્રાંતિ (ABO રક્તસમૂહ અને Rh કારક)", "ch": ""}, {"q": "એક પરિવારમાં, પિતાનું રક્તસમૂહ A છે અને માતાનું રક્તસમૂહ AB છે. તેમના બાળકનું રક્તસમૂહ કયું હોઈ શકે નહીં?", "opts": ["A", "B", "AB", "O"], "ans": 3, "exp": "પિતાનું રક્તસમૂહ A (IAIA અથવા IAi) અને માતાનું રક્તસમૂહ AB (IAIB) હોય તો બાળકનું રક્તસમૂહ A (IAIA અથવા IAi), B (IBi), અથવા AB (IAIB) હોઈ શકે છે. પરંતુ O રક્તસમૂહ (ii) હોઈ શકે નહીં કારણ કે પિતા અથવા માતા પાસેથી i એલિલ મળવાની શક્યતા નથી.", "ref": "Std 12 - પ્રકરણ 5: વંશવિજ્ઞાન અને ઉત્ક્રાંતિ (ABO રક્તસમૂહ)", "ch": ""}, {"q": "એક વ્યક્તિનું રક્તસમૂહ A છે અને તેને Rh− છે. તેને રક્ત ચડાવવું પડે છે. નીચેનામાંથી કયું રક્તસમૂહ તેને સુરક્ષિત રીતે ચડાવી શકાય? (ધ્યાનમાં લો કે Rh+ રક્તસમૂહ ધરાવતા વ્યક્તિને Rh− રક્ત ચડાવવાથી કોઈ પ્રતિકૂળ પ્રતિક્રિયા થતી નથી, પરંતુ Rh− વ્યક્તિને Rh+ રક્ત ચડાવવાથી પ્રતિકૂળ પ્રતિક્રિયા થઈ શકે છે.)", "opts": ["A Rh+", "A Rh−", "O Rh+", "AB Rh−"], "ans": 1, "exp": "A Rh− રક્તસમૂહ ધરાવતી વ્યક્તિને A Rh− રક્ત ચડાવવા સુરક્ષિત છે કારણ કે તેનામાં A એન્ટિજેન અને Rh એન્ટિજેનની ગેરહાજરી હોવાથી કોઈ પ્રતિકૂળ પ્રતિક્રિયા થશે નહીં. A Rh+ રક્ત ચડાવવાથી Rh+ એન્ટિજેનની હાજરીને લીધે પ્રતિકૂળ પ્રતિક્રિયા થઈ શકે છે. O Rh+ અને AB Rh− રક્તસમૂહમાં ક્રમશઃ A એન્ટિજેનની ગેરહાજરી અને AB એન્ટિજેનની હાજરીને લીધે તે સુરક્ષિત નથી.", "ref": "Std 12 - પ્રકરણ 5: વંશવિજ્ઞાન અને ઉત્ક્રાંતિ (ABO રક્તસમૂહ અને Rh કારક)", "ch": ""}, {"q": "એક વ્યક્તિનું રક્તસમૂહ A છે અને તે Rh− છે. તેના પત્નીનું રક્તસમૂહ B છે અને તે Rh+ છે. તેમના બાળકમાં Rh પોઝિટિવ રક્તસમૂહ હોવાની શક્યતા કેટલી છે?", "opts": ["0%", "25%", "50%", "75%"], "ans": 3, "exp": "Rh પોઝિટિવ રક્તસમૂહ માટે જનીન D હાજર હોવું જરૂરી છે. પિતા Rh− હોવાથી તેનો જનીનોટાઇપ dd છે, જ્યારે માતા Rh+ હોવાથી તેનો જનીનોટાઇપ Dd અથવા DD હોઈ શકે. બાળકમાં Rh+ હોવા માટે માતા પાસેથી D એલિલ મળવું જરૂરી છે. જો માતા Dd હોય તો 50% શક્યતા છે કે બાળકને D એલિલ મળે, પરંતુ જો માતા DD હોય તો 100% શક્યતા છે. પરંતુ પ્રશ્નમાં માતાના જનીનોટાઇપની માહિતી ન હોવાથી સરેરાશ 75% શક્યતા ગણવામાં આવે છે. A) 0% ખોટું છે કારણ કે માતા Rh+ હોવાથી બાળક Rh+ હોઈ શકે. B) 25% અને C) 50% અપૂર્ણ ગણતરીઓ છે.", "ref": "Std 12 - પ્રકરણ 5: વંશપરંપરા અને વિવિધતા", "ch": ""}, {"q": "ABO રક્તસમૂહ વ્યવસ્થામાં, નીચેનામાંથી કયો રક્તસમૂહ ધરાવતી વ્યક્તિને 'સાર્વત્રિક પ્રાપ્તકર્તા' કહેવામાં આવે છે અને તેનું કારણ શું છે?", "opts": ["A, કારણ કે તેના રક્તમાં A પ્રતિજન હાજર છે", "B, કારણ કે તેના રક્તમાં B પ્રતિજન હાજર છે", "AB, કારણ કે તેના રક્તમાં A અને B બંને પ્રતિજન હાજર છે અને તે કોઈપણ રક્તસમૂહના રક્તને સ્વીકારી શકે છે", "O, કારણ કે તેના રક્તમાં કોઈ પ્રતિજન હાજર નથી અને તે કોઈપણ રક્તસમૂહને આપી શકે છે"], "ans": 2, "exp": "AB રક્તસમૂહ ધરાવતી વ્યક્તિને 'સાર્વત્રિક પ્રાપ્તકર્તા' કહેવામાં આવે છે કારણ કે તેના રક્તમાં A અને B બંને પ્રતિજન હાજર છે, જેથી તે કોઈપણ રક્તસમૂહ (A, B, AB, O) નું રક્ત સ્વીકારી શકે છે. A) અને B) ખોટા છે કારણ કે A અને B રક્તસમૂહ ધરાવતી વ્યક્તિઓ કેવળ ત્યારજ રક્ત સ્વીકારી શકે છે જ્યારે તે રક્તમાં તેમના પ્રતિજન વિરુદ્ધ પ્રતિપિંડ ન હોય. D) ખોટું છે કારણ કે O રક્તસમૂહ ધરાવતી વ્યક્તિ 'સાર્વત્રિક દાતા' છે, ન કે પ્રાપ્તકર્તા.", "ref": "Std 12 - પ્રકરણ 5: વંશપરંપરા અને વિવિધતા", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
