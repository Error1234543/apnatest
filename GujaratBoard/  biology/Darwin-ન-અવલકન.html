<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darwin ના અવલોકનો</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Darwin ના અવલોકનો</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Darwin ના અવલોકનો</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 19 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 19 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ડાર્વિનના અવલોકન મુજબ, કુદરતી પસંદગીની પ્રક્રિયામાં નીચેનામાંથી કયું પરિબળ સૌથી વધુ મહત્ત્વપૂર્ણ છે?", "opts": ["વસતિમાં વ્યક્તિગત ભિન્નતાઓની હાજરી", "સજીવોની પ્રજનન ક્ષમતા વધુ હોવી", "પર્યાવરણીય પરિબળો દ્વારા થતો સંઘર્ષ", "વારસાગત લક્ષણોનું સ્થિર પ્રસારણ"], "ans": 0, "exp": "ડાર્વિનના મતે, કુદરતી પસંદગી માટે વસતિમાં વ્યક્તિગત ભિન્નતાઓની હાજરી સૌથી મહત્ત્વપૂર્ણ છે કારણ કે આ ભિન્નતાઓ પર્યાવરણીય પરિબળો દ્વારા પસંદ થાય છે. વિકલ્પ B અને C પણ ડાર્વિનના સિદ્ધાંતના ભાગ છે, પરંતુ તે પ્રાથમિક પરિબળ નથી. વિકલ્પ D ખોટો છે કારણ કે વારસાગત લક્ષણો સ્થિર નથી હોતા અને તેમાં પરિવર્તન થઈ શકે છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના અવલોકન મુજબ, 'સર્વાઇવલ ઓફ ધ ફિટેસ્ટ' શબ્દનો અર્થ શું છે?", "opts": ["સૌથી મજબૂત સજીવ જ ટકી રહે છે", "જે સજીવ પર્યાવરણ સાથે સારી રીતે અનુકૂલન સાધે છે તે ટકી રહે છે", "સૌથી વધુ પ્રજનન કરનાર સજીવ ટકી રહે છે", "સૌથી વધુ ખોરાક મેળવનાર સજીવ ટકી રહે છે"], "ans": 1, "exp": "'સર્વાઇવલ ઓફ ધ ફિટેસ્ટ'નો અર્થ એ છે કે જે સજીવ પર્યાવરણ સાથે સારી રીતે અનુકૂલન સાધે છે તે જ ટકી રહે છે. વિકલ્પ A ખોટો છે કારણ કે મજબૂતાઈ માત્ર શારીરિક નથી હોતી. વિકલ્પ C અને D પણ ખોટા છે કારણ કે પ્રજનન ક્ષમતા કે ખોરાક મેળવવાની ક્ષમતા માત્ર ટકી રહેવા માટે પૂરતી નથી.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના અવલોકનોમાં 'અતિ ઉત્પાદન' (Overproduction) નું મહત્ત્વ શું છે?", "opts": ["તેનાથી સજીવોની સંખ્યા વધે છે અને પર્યાવરણ પર દબાણ વધે છે", "તેનાથી સજીવોની પ્રજાતિઓમાં વિવિધતા વધે છે", "તેનાથી સજીવો વચ્ચેનો સંઘર્ષ ઘટે છે", "તેનાથી વારસાગત લક્ષણોનું પ્રસારણ ઝડપી બને છે"], "ans": 0, "exp": "ડાર્વિનના મતે, અતિ ઉત્પાદનથી સજીવોની સંખ્યા વધે છે, જેના કારણે પર્યાવરણ પર દબાણ વધે છે અને સજીવો વચ્ચે સંઘર્ષ થાય છે. વિકલ્પ B ખોટો છે કારણ કે અતિ ઉત્પાદન વિવિધતા વધારતું નથી. વિકલ્પ C ખોટો છે કારણ કે સંઘર્ષ ઘટતો નથી, વધે છે. વિકલ્પ D ખોટો છે કારણ કે વારસાગત લક્ષણોનું પ્રસારણ અતિ ઉત્પાદન સાથે સીધું સંબંધિત નથી.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના અવલોકનોમાં 'વ્યક્તિગત ભિન્નતા'નું મહત્ત્વ શું છે? નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["વ્યક્તિગત ભિન્નતાઓ વારસાગત હોય છે", "વ્યક્તિગત ભિન્નતાઓ પર્યાવરણીય પરિબળો દ્વારા પસંદ થાય છે", "વ્યક્તિગત ભિન્નતાઓ માત્ર પર્યાવરણીય પ્રભાવથી ઉદ્ભવે છે", "વ્યક્તિગત ભિન્નતાઓ ઉત્ક્રાંતિની પ્રક્રિયામાં મહત્ત્વપૂર્ણ ભૂમિકા ભજવે છે"], "ans": 2, "exp": "વ્યક્તિગત ભિન્નતાઓ માત્ર પર્યાવરણીય પ્રભાવથી ઉદ્ભવતી નથી, પરંતુ તે આનુવંશિક પણ હોય છે. વિકલ્પ A, B અને D સાચાં છે કારણ કે વ્યક્તિગત ભિન્નતાઓ વારસાગત હોય છે, પર્યાવરણ દ્વારા પસંદ થાય છે અને ઉત્ક્રાંતિ માટે મહત્ત્વપૂર્ણ છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના અવલોકનોમાં 'કુદરતી પસંદગી' અને 'કૃત્રિમ પસંદગી' વચ્ચેનો મુખ્ય તફાવત શું છે?", "opts": ["કુદરતી પસંદગી પર્યાવરણ દ્વારા થાય છે, જ્યારે કૃત્રિમ પસંદગી માનવ દ્વારા થાય છે", "કુદરતી પસંદગી માત્ર વનસ્પતિઓમાં થાય છે, જ્યારે કૃત્રિમ પસંદગી પ્રાણીઓમાં થાય છે", "કુદરતી પસંદગી ઝડપી હોય છે, જ્યારે કૃત્રિમ પસંદગી ધીમી હોય છે", "કુદરતી પસંદગી વારસાગત લક્ષણોને અસર કરતી નથી, જ્યારે કૃત્રિમ પસંદગી કરે છે"], "ans": 0, "exp": "કુદરતી પસંદગી પર્યાવરણ દ્વારા થાય છે, જ્યારે કૃત્રિમ પસંદગી માનવ દ્વારા થાય છે. વિકલ્પ B ખોટો છે કારણ કે બંને પ્રકારની પસંદગી વનસ્પતિઓ અને પ્રાણીઓ બંનેમાં થઈ શકે છે. વિકલ્પ C ખોટો છે કારણ કે કુદરતી પસંદગી ધીમી હોય છે. વિકલ્પ D ખોટો છે કારણ કે બંને પ્રકારની પસંદગી વારસાગત લક્ષણોને અસર કરે છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના અવલોકન અનુસાર, ગેલાપાગોસ ટાપુઓ પરના ફિંચ પક્ષીઓના ચાંચના આકારમાં જોવા મળતી વિવિધતાનું મુખ્ય કારણ કયું છે?", "opts": ["ટાપુઓ પર ઉપલબ્ધ ખોરાકના પ્રકારમાં ભિન્નતા અને કુદરતી પસંદગી", "પક્ષીઓના જનીનમાં સ્વયંસ્ફૂર્ત મ્યુટેશન થવું", "ટાપુઓની જલવાયુ પરિસ્થિતિમાં અચાનક થયેલા ફેરફારો", "પક્ષીઓના પ્રજનન દરમિયાન થતી કૃત્રિમ પસંદગી"], "ans": 0, "exp": "ડાર્વિનના અવલોકન અનુસાર, ગેલાપાગોસ ટાપુઓ પરના ફિંચ પક્ષીઓના ચાંચના આકારમાં વિવિધતા ખોરાકના પ્રકાર (જેમ કે બીજ, કીટકો વગેરે) અનુસાર કુદરતી પસંદગી દ્વારા વિકસિત થઈ છે. આથી વિકલ્પ A સાચો છે. વિકલ્પ B ખોટો છે કારણ કે મ્યુટેશન તો કુદરતી પસંદગીનું કારણ નહીં પરંતુ કાચો માલ છે. વિકલ્પ C ખોટો છે કારણ કે જલવાયુ પરિસ્થિતિમાં ફેરફારો તાત્કાલિક અસર કરતાં નથી, પરંતુ લાંબા ગાળાની પ્રક્રિયા છે. વિકલ્પ D ખોટો છે કારણ કે કૃત્રિમ પસંદગી માનવી દ્વારા થાય છે, જ્યારે ગેલાપાગોસમાં કુદરતી પસંદગી કામ કરે છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના અવલોકન મુજબ, 'સમજૂતી માટેની લડાઈ' (Struggle for Existence) ની સંકલ્પના કયા પરિબળને લગતી નથી?", "opts": ["એક જ પ્રજાતિના સભ્યો વચ્ચેનો સ્પર્ધા", "ભિન્ન પ્રજાતિઓ વચ્ચેનો ખોરાક માટેનો સ્પર્ધા", "પર્યાવરણીય પરિબળો જેવા કે તાપમાન, પાણી વગેરે સાથેનું અનુકૂલન", "જનીનમાં થતી સ્વયંસ્ફૂર્ત મ્યુટેશન"], "ans": 3, "exp": "'સમજૂતી માટેની લડાઈ' એ કુદરતી પસંદગીની પ્રક્રિયામાં સ્પર્ધા અને અનુકૂલનને લગતી સંકલ્પના છે. વિકલ્પ A, B, અને C આ સંકલ્પના સાથે સંકળાયેલા છે. વિકલ્પ D ખોટો છે કારણ કે મ્યુટેશન એ કુદરતી પસંદગીનું કારણ નહીં પરંતુ કાચો માલ છે, અને તે 'સમજૂતી માટેની લડાઈ' ની સંકલ્પનાને લગતું નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના અવલોકન અનુસાર, નીચેનામાંથી કયું વિધાન 'વિકિરણશીલ ઉત્ક્રાંતિ' (Adaptive Radiation) નું ઉદાહરણ નથી?", "opts": ["ગેલાપાગોસ ટાપુઓ પરના ફિંચ પક્ષીઓના વિવિધ ચાંચના આકારો", "ઓસ્ટ્રેલિયામાં કંગારૂના વિવિધ પ્રકારો", "મેડાગાસ્કરમાં લેમરના વિવિધ પ્રકારો", "એક જ ટાપુ પર રહેતા સરીસૃપોના રંગમાં ફેરફાર"], "ans": 3, "exp": "વિકિરણશીલ ઉત્ક્રાંતિ એટલે એક સમાન પૂર્વજથી વિવિધ પર્યાવરણીય પરિસ્થિતિઓમાં રહેતી પ્રજાતિઓનું વિકાસ. વિકલ્પ A, B, અને C આનું ઉદાહરણ છે. વિકલ્પ D ખોટો છે કારણ કે એક જ ટાપુ પર રહેતા સરીસૃપોના રંગમાં ફેરફાર એ વિકિરણશીલ ઉત્ક્રાંતિ નહીં પરંતુ કુદરતી પસંદગીનું સ્થાનિક ઉદાહરણ છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના અવલોકન અનુસાર, નીચેનામાંથી કયું વિધાન 'સહ-ઉત્ક્રાંતિ' (Co-evolution) નું સૌથી યોગ્ય ઉદાહરણ છે?", "opts": ["ફૂલ અને પરાગરજ કીટક વચ્ચેનો સહ-અનુકૂલન", "ગેલાપાગોસ ટાપુઓ પરના કાચબાના કવચના આકારમાં ફેરફાર", "એક જ પ્રજાતિના સભ્યો વચ્ચેનો સ્પર્ધા", "જલવાયુ પરિવર્તનને લીધે પક્ષીઓના પ્રવાસમાં ફેરફાર"], "ans": 0, "exp": "સહ-ઉત્ક્રાંતિ એટલે બે ભિન્ન પ્રજાતિઓ વચ્ચેનો પરસ્પર લાભદાયી અનુકૂલન. વિકલ્પ A સાચો છે કારણ કે ફૂલ અને પરાગરજ કીટક એકબીજા સાથે અનુકૂલિત થયા છે. વિકલ્પ B, C, અને D સહ-ઉત્ક્રાંતિના ઉદાહરણો નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના અવલોકન અનુસાર, નીચેનામાંથી કયું વિધાન 'અવશેષી અંગો' (Vestigial Organs) નું ઉદાહરણ નથી?", "opts": ["માનવીના પૂંછડીનો હાડકો (Coccyx)", "માનવીના કાનની મસલ્સ (Auricular Muscles)", "માનવીના અપેન્ડિક્સ (Appendix)", "માનવીનું હૃદય (Heart)"], "ans": 3, "exp": "અવશેષી અંગો એટલે એવા અંગો જે પૂર્વજોમાં ઉપયોગી હતા પરંતુ હાલમાં કોઈ કાર્ય નથી કરતાં. વિકલ્પ A, B, અને C અવશેષી અંગોના ઉદાહરણો છે. વિકલ્પ D ખોટો છે કારણ કે હૃદય એ માનવી માટે અત્યંત મહત્ત્વપૂર્ણ અંગ છે અને અવશેષી અંગ નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના અવલોકન અનુસાર, ગેલાપાગોસ ટાપુઓ પરના કચ્છુઓ (Tortoises) ના કવચના આકારમાં જોવા મળતી ભિન્નતાનું મુખ્ય કારણ કયું હશે?", "opts": ["ટાપુઓ પર ઉપલબ્ધ ખોરાકના પ્રકારમાં ભિન્નતા", "ટાપુઓની જમીનની રચનામાં ભિન્નતા", "ટાપુઓ પરના શિકારીઓની હાજરીમાં ભિન્નતા", "ટાપુઓ પરના તાપમાનમાં ભિન્નતા"], "ans": 0, "exp": "ડાર્વિનના અવલોકન અનુસાર, ગેલાપાગોસ ટાપુઓ પરના કચ્છુઓના કવચના આકારમાં ભિન્નતા મુખ્યત્વે ટાપુઓ પર ઉપલબ્ધ ખોરાકના પ્રકારમાં ભિન્નતાને કારણે હતી. કવચનો આકાર ખોરાકના સ્રોત સુધી પહોંચવા માટે અનુકૂલન કરે છે. બાકીના વિકલ્પો (B, C, D) આ ભિન્નતાનું મુખ્ય કારણ નથી, કારણ કે કવચનો આકાર ખોરાક સાથે સીધો સંબંધ ધરાવે છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના અવલોકન અનુસાર, 'પર્યાવરણીય દબાણ' (Environmental Pressure) ની સંકલ્પના કયા ઉદાહરણ દ્વારા સૌથી યોગ્ય રીતે સમજાવી શકાય?", "opts": ["ગિરના જંગલમાં રહેતા સિંહોના શિકારની પદ્ધતિમાં ફેરફાર", "અંધારી ગુફામાં રહેતી મચ્છરની આંખોનું લોપ પામવું", "પાણીની અછત વખતે વનસ્પતિઓના મૂળના વિકાસમાં વધારો", "ઉચ્ચ તાપમાન વાળા પ્રદેશમાં રહેતા પ્રાણીઓના શરીરના કદમાં ઘટાડો"], "ans": 2, "exp": "પર્યાવરણીય દબાણ હેઠળ, પાણીની અછત વખતે વનસ્પતિઓના મૂળના વિકાસમાં વધારો થાય છે, જેથી તેઓ પાણી શોધી શકે. આ ડાર્વિનના અવલોકન અનુસાર કુદરતી પસંદગી દ્વારા થતું અનુકૂલન છે. બાકીના વિકલ્પો (A, B, D) પણ પર્યાવરણીય દબાણના ઉદાહરણો છે, પરંતુ પાણીની અછત અને મૂળના વિકાસનો સંબંધ સૌથી સ્પષ્ટ છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના અવલોકન અનુસાર, 'સહ-ઉત્ક્રાંતિ' (Co-evolution) નું ઉદાહરણ કયું છે જ્યાં બે જીવો એકબીજા પર આધાર રાખે છે અને પરસ્પર લાભ લે છે?", "opts": ["મધમાખી અને ફૂલો વચ્ચેનો સંબંધ", "સિંહ અને હરણ વચ્ચેનો શિકાર-શિકારી સંબંધ", "કીટક અને વનસ્પતિ વચ્ચેનો પરોપજીવી સંબંધ", "માનવ અને કૂતરા વચ્ચેનો સંબંધ"], "ans": 0, "exp": "મધમાખી અને ફૂલો વચ્ચેનો સંબંધ સહ-ઉત્ક્રાંતિનું સૌથી યોગ્ય ઉદાહરણ છે, કારણ કે મધમાખી ફૂલોમાંથી મધ એકત્ર કરે છે અને પરાગનયનમાં મદદ કરે છે, જ્યારે ફૂલો મધમાખીને ખોરાક પૂરો પાડે છે. બાકીના વિકલ્પો (B, C, D) પરસ્પર લાભના સંબંધો નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના અવલોકન અનુસાર, 'અવશેષી અંગો' (Vestigial Organs) નું ઉદાહરણ કયું છે જેમાં અંગનું કોઈ કાર્ય નથી પરંતુ તે પૂર્વજોમાં ઉપયોગી હતું?", "opts": ["માનવના અપેન્ડિક્સ (Appendix)", "માનવના હૃદય", "માનવના ફેફસા", "માનવના મગજ"], "ans": 0, "exp": "માનવના અપેન્ડિક્સ (Appendix) એક અવશેષી અંગ છે, જે પૂર્વજોમાં પાચન તંત્રમાં ઉપયોગી હતું, પરંતુ હાલમાં તેનું કોઈ મહત્ત્વનું કાર્ય નથી. બાકીના વિકલ્પો (B, C, D) મહત્ત્વપૂર્ણ અંગો છે અને અવશેષી અંગો નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના અવલોકન અનુસાર, 'વિકિરણશીલ ઉત્ક્રાંતિ' (Adaptive Radiation) નું ઉદાહરણ કયું છે જ્યાં એક જ પૂર્વજથી વિવિધ પ્રકારના જીવો ઉત્પન્ન થાય છે?", "opts": ["ગેલાપાગોસ ટાપુઓ પરના ફિંચ પક્ષીઓ", "ભારતમાં રહેતા વાઘ અને સિંહ", "આફ્રિકામાં રહેતા હાથી અને ગેન્ડા", "ઓસ્ટ્રેલિયામાં રહેતા કેંગારૂ અને કોાલા"], "ans": 0, "exp": "ગેલાપાગોસ ટાપુઓ પરના ફિંચ પક્ષીઓ 'વિકિરણશીલ ઉત્ક્રાંતિ' નું સૌથી યોગ્ય ઉદાહરણ છે, કારણ કે તેઓ એક જ પૂર્વજથી વિવિધ પ્રકારના ચાંચના આકાર સાથે ઉત્પન્ન થયા છે, જે ટાપુઓ પરના વિવિધ પર્યાવરણીય પરિબળો સાથે અનુકૂલન કરે છે. બાકીના વિકલ્પો (B, C, D) વિવિધ પૂર્વજોથી ઉત્પન્ન થયેલા જીવો છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના અવલોકન અનુસાર, ગેલાપાગોસ ટાપુઓ પરના ફિંચ પક્ષીઓમાં ચાંચના આકારની ભિન્નતાનું મુખ્ય કારણ કયું છે?", "opts": ["કુદરતી પસંદગી દ્વારા ખોરાકના સ્રોત પ્રમાણે અનુકૂલન", "જનીન મ્યુટેશન દ્વારા અચાનક થયેલા ફેરફારો", "ટાપુઓની ભૌગોલિક અલગતાને કારણે જાતિઓ વચ્ચેનો સંઘર્ષ", "માનવી દ્વારા કૃત્રિમ રીતે પસંદ કરેલી લાક્ષણિકતાઓ"], "ans": 0, "exp": "ડાર્વિનના અવલોકન અનુસાર, ગેલાપાગોસ ટાપુઓ પરના ફિંચ પક્ષીઓમાં ચાંચના આકારની ભિન્નતા કુદરતી પસંદગી દ્વારા ખોરાકના સ્રોત પ્રમાણે અનુકૂલનને કારણે થાય છે. આ પક્ષીઓના ચાંચના આકારમાં ભિન્નતા તેમના ખોરાક (બીજ, કીટકો વગેરે) ના પ્રકાર પ્રમાણે વિકસિત થાય છે, જે કુદરતી પસંદગીનું ઉદાહરણ છે. બાકીના વિકલ્પો ખોટા છે: B) જનીન મ્યુટેશન તો ફેરફારનું કારણ હોઈ શકે પરંતુ ડાર્વિનના અવલોકનમાં મુખ્યત્વે કુદરતી પસંદગી પર ભાર મૂકવામાં આવ્યો છે. C) ભૌગોલિક અલગતા તો જાતિઓના વિકાસમાં મદદ કરે છે પરંતુ ચાંચના આકારનું મુખ્ય કારણ ખોરાકનો પ્રકાર છે. D) માનવી દ્વારા કૃત્રિમ પસંદગી થતી નથી, ડાર્વિનના અવલોકન કુદરતી પસંદગી પર આધારિત છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના અવલોકન અનુસાર, નીચેનામાંથી કયું વિધાન 'કુદરતી પસંદગી' ની સંકલ્પના સાથે સંપૂર્ણ રીતે બંધબેસતું નથી?", "opts": ["જીવો તેમના પર્યાવરણ સાથે અનુકૂલન પામે છે", "ફિટેસ્ટ જીવો જીવિત રહે છે અને પ્રજનન કરે છે", "જીવોમાં થતી મ્યુટેશન કુદરતી પસંદગી દ્વારા નક્કી થાય છે", "કુદરતી પસંદગી દ્વારા જાતિઓમાં ધીરે ધીરે ફેરફાર થાય છે"], "ans": 2, "exp": "ડાર્વિનના અવલોકન અનુસાર, 'કુદરતી પસંદગી' ની સંકલ્પના સાથે સંપૂર્ણ રીતે બંધબેસતું નથી તે વિધાન છે કે 'જીવોમાં થતી મ્યુટેશન કુદરતી પસંદગી દ્વારા નક્કી થાય છે'. મ્યુટેશન અચાનક અને યાદૃચ્છિક રીતે થાય છે, કુદરતી પસંદગી તો તે મ્યુટેશનને પસંદ કરે છે કે કાઢી નાખે છે. બાકીના વિકલ્પો સંપૂર્ણ રીતે બંધબેસે છે: A) જીવો તેમના પર્યાવરણ સાથે અનુકૂલન પામે છે, B) ફિટેસ્ટ જીવો જીવિત રહે છે અને પ્રજનન કરે છે, D) કુદરતી પસંદગી દ્વારા જાતિઓમાં ધીરે ધીરે ફેરફાર થાય છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના અવલોકન અનુસાર, ગેલાપાગોસ ટાપુઓ પરના ફિંચ પક્ષીઓની ચાંચના આકારની ભિન્નતાનું મુખ્ય કારણ કયું હોવું જોઈએ, જ્યારે તેની સાથે સંકળાયેલી 'જનીન વૈવિધ્યતા' અને 'પર્યાવરણીય દબાણ' ની ભૂમિકા ધ્યાનમાં લેવામાં આવે?", "opts": ["ચાંચના આકારમાં થતી યાદૃચ્છિક પરિવર્તનશીલતા (Random Mutation) અને ખોરાકની ઉપલબ્ધતાનું પ્રાદેશિક ભિન્નતા", "ફિંચ પક્ષીઓની ચાંચનો આકાર તેમના પૂર્વજોમાંથી સીધો વારસામાં મળેલો હતો અને તેમાં કોઈ પરિવર્તન થયું નથી", "ટાપુઓ પરના તાપમાન અને ભેજના સ્તરમાં થતી મોસમી ફેરફારો", "ફિંચ પક્ષીઓની ચાંચનો આકાર તેમની પ્રજનન ક્ષમતા સાથે સીધો સંબંધ ધરાવે છે"], "ans": 0, "exp": "ડાર્વિનના અવલોકન અનુસાર, ગેલાપાગોસ ટાપુઓ પરના ફિંચ પક્ષીઓની ચાંચના આકારની ભિન્નતા મુખ્યત્વે યાદૃચ્છિક જનીન પરિવર્તન (મ્યુટેશન) અને ખોરાકની ઉપલબ્ધતાને આધારે કુદરતી પસંદગી દ્વારા થાય છે. આમ, વિકલ્પ A સૌથી યોગ્ય છે. વિકલ્પ B ખોટો છે કારણ કે ચાંચના આકારમાં પરિવર્તન થયું છે અને તે વારસાગત છે. વિકલ્પ C અંશતઃ સાચો લાગે છે પરંતુ તાપમાન અને ભેજનો સીધો સંબંધ ચાંચના આકાર સાથે નથી. વિકલ્પ D ખોટો છે કારણ કે ચાંચનો આકાર પ્રજનન ક્ષમતા સાથે નહીં પણ ખોરાકની ઉપલબ્ધતા સાથે સંબંધ ધરાવે છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાર્વિનના અવલોકન અનુસાર, 'સમજૂતી માટેની લડાઈ' (Struggle for Existence) ની સંકલ્પના કયા પરિબળ દ્વારા સૌથી વધુ પ્રભાવિત થાય છે, જ્યારે બે જાતિઓ એક જ પર્યાવરણમાં રહે છે અને સમાન સંસાધનો માટે સ્પર્ધા કરે છે?", "opts": ["અતિ ઉત્પાદન (Overproduction) ના કારણે વસ્તીમાં વધારો થવો", "કુદરતી પસંદગી (Natural Selection) દ્વારા શ્રેષ્ઠ અનુકૂલન ધરાવતી જાતિઓનું ટકી રહેવું", "અંતર-જાતીય સ્પર્ધા (Interspecific Competition) જેમાં બે જાતિઓ વચ્ચે ખોરાક અથવા આવાસ માટે હોવી", "વ્યક્તિગત ભિન્નતા (Individual Variation) ના કારણે જાતિની અંદર જુદા જુદા લક્ષણો ધરાવતા જીવો હોવા"], "ans": 2, "exp": "સમજૂતી માટેની લડાઈમાં અંતર-જાતીય સ્પર્ધા (Interspecific Competition) એ મુખ્ય પરિબળ છે, જ્યારે બે જાતિઓ એક જ પર્યાવરણમાં સમાન સંસાધનો માટે સ્પર્ધા કરે છે. A) અતિ ઉત્પાદન એ વસ્તીના વધારાને લગતું છે, પરંતુ સ્પર્ધાનું મુખ્ય કારણ નથી. B) કુદરતી પસંદગી એ સ્પર્ધાનું પરિણામ છે, મુખ્ય કારણ નહીં. D) વ્યક્તિગત ભિન્નતા જાતિની અંદરની ભિન્નતાને લગતું છે, પરંતુ અંતર-જાતીય સ્પર્ધા નહીં.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}];

    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
