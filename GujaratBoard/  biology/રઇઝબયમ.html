<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>રાઇઝોબિયમ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>રાઇઝોબિયમ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">રાઇઝોબિયમ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 16 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 16 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "રાઇઝોબિયમ બેક્ટેરિયા અને શિમ્બી કુળના છોડ વચ્ચેનું સહજીવન કયા પ્રકારનું ગણવામાં આવે છે?", "opts": ["પરોપજીવી (Parasitism)", "સહભોજિતા (Commensalism)", "પરસ્પરવાદ (Mutualism)", "અંતઃપરોપજીવી (Endoparasitism)"], "ans": 2, "exp": "રાઇઝોબિયમ બેક્ટેરિયા અને શિમ્બી કુળના છોડ વચ્ચેનું સહજીવન પરસ્પરવાદ (Mutualism) ગણાય છે કારણ કે બંને સજીવોને લાભ થાય છે: બેક્ટેરિયાને છોડ તરફથી કાર્બોદિત મળે છે અને છોડને બેક્ટેરિયા તરફથી નાઇટ્રોજન મળે છે. પરોપજીવીમાં એકને લાભ અને બીજાને નુકસાન થાય છે, સહભોજિતામાં એકને લાભ અને બીજાને કોઈ અસર થતી નથી, જ્યારે અંતઃપરોપજીવી એ પરોપજીવીનો એક પ્રકાર છે જેમાં પરોપજીવી યજમાનના શરીરની અંદર રહે છે.", "ref": "Std 11 - પ્રકરણ 10: સૂક્ષ્મજીવોની દુનિયા", "ch": ""}, {"q": "રાઇઝોબિયમ બેક્ટેરિયા દ્વારા નાઇટ્રોજન સ્થાપન માટે જરૂરી ઉત્સેચક કયું છે, જે ઓક્સિજનની હાજરીમાં નિષ્ક્રિય થઈ જાય છે?", "opts": ["નાઇટ્રોજનેઝ (Nitrogenase)", "નાઇટ્રેટ રિડક્ટેઝ (Nitrate reductase)", "લેગહિમોગ્લોબિન (Leghemoglobin)", "એમાઇલેઝ (Amylase)"], "ans": 0, "exp": "નાઇટ્રોજન સ્થાપન માટે જરૂરી ઉત્સેચક નાઇટ્રોજનેઝ છે, જે ઓક્સિજનની હાજરીમાં નિષ્ક્રિય થઈ જાય છે. નાઇટ્રેટ રિડક્ટેઝ નાઇટ્રેટના રિડક્શનમાં ભાગ લે છે, લેગહિમોગ્લોબિન ઓક્સિજનને બાંધી રાખીને નાઇટ્રોજનેઝને સુરક્ષિત રાખે છે, અને એમાઇલેઝ કાર્બોહાઇડ્રેટના પાચનમાં ભાગ લે છે.", "ref": "Std 11 - પ્રકરણ 12: ખનીજ પોષણ", "ch": ""}, {"q": "રાઇઝોબિયમ બેક્ટેરિયા દ્વારા નાઇટ્રોજન સ્થાપનની પ્રક્રિયામાં લેગહિમોગ્લોબિનનું મુખ્ય કાર્ય શું છે?", "opts": ["નાઇટ્રોજનનું એમોનિયામાં રૂપાંતરણ કરવું", "રાઇઝોબિયમ કોષોને કાર્બોદિત પૂરા પાડવા", "નાઇટ્રોજનેઝ ઉત્સેચકને ઓક્સિજનથી સુરક્ષિત રાખવું", "છોડના મૂળમાં નાઇટ્રેટનું શોષણ વધારવું"], "ans": 2, "exp": "લેગહિમોગ્લોબિનનું મુખ્ય કાર્ય નાઇટ્રોજનેઝ ઉત્સેચકને ઓક્સિજનથી સુરક્ષિત રાખવાનું છે, કારણ કે નાઇટ્રોજનેઝ ઓક્સિજનની હાજરીમાં નિષ્ક્રિય થઈ જાય છે. નાઇટ્રોજનનું એમોનિયામાં રૂપાંતરણ નાઇટ્રોજનેઝ દ્વારા થાય છે, રાઇઝોબિયમ કોષોને કાર્બોદિત છોડ પૂરા પાડે છે, અને નાઇટ્રેટનું શોષણ છોડના મૂળ દ્વારા થાય છે.", "ref": "Std 11 - પ્રકરણ 12: ખનીજ પોષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો છોડ રાઇઝોબિયમ બેક્ટેરિયા સાથે સહજીવન ધરાવતો નથી, તેમ છતાં નાઇટ્રોજન સ્થાપન કરે છે?", "opts": ["વટાણા (Pea)", "અઝોલા (Azolla)", "મગફળી (Groundnut)", "સોયાબીન (Soybean)"], "ans": 0, "exp": "અઝોલા એ એક જળચર ફર્ન છે જે એનાબીના (Anabaena) નામના સાયનોબેક્ટેરિયા સાથે સહજીવન ધરાવે છે અને નાઇટ્રોજન સ્થાપન કરે છે. વટાણા, મગફળી અને સોયાબીન શિમ્બી કુળના છોડ છે જે રાઇઝોબિયમ સાથે સહજીવન ધરાવે છે.", "ref": "Std 11 - પ્રકરણ 12: ખનીજ પોષણ", "ch": ""}, {"q": "એક સંશોધકને એક નવી જાતિની શિમ્બી કુળની વનસ્પતિ મળી છે જેના મૂળમાં ગાંઠો જોવા મળે છે, પરંતુ આ ગાંઠોમાં રાઇઝોબિયમ બેક્ટેરિયા હાજર નથી. આ પરિસ્થિતિ માટે નીચેનામાંથી કયું સૌથી વધુ સંભવિત કારણ હોઈ શકે?", "opts": ["આ વનસ્પતિના મૂળમાં ફ્રેન્કિયા બેક્ટેરિયા હાજર છે જે નાઇટ્રોજન સ્થાપન કરે છે", "આ વનસ્પતિના મૂળમાં માયકોરાઇઝા ફૂગ હાજર છે જે નાઇટ્રોજન સ્થાપન કરે છે", "આ વનસ્પતિના મૂળમાં એઝોટોબેક્ટર બેક્ટેરિયા હાજર છે જે નાઇટ્રોજન સ્થાપન કરે છે", "આ વનસ્પતિના મૂળમાં સ્યુડોમોનાસ બેક્ટેરિયા હાજર છે જે નાઇટ્રોજન સ્થાપન કરે છે"], "ans": 0, "exp": "સાચો જવાબ વિકલ્પ A છે કારણ કે ફ્રેન્કિયા બેક્ટેરિયા પણ શિમ્બી કુળ સિવાયની કેટલીક વનસ્પતિઓ (જેમ કે એલ્નસ, કેઝ્યુરિના)ના મૂળમાં ગાંઠો બનાવીને નાઇટ્રોજન સ્થાપન કરે છે. આ બેક્ટેરિયા રાઇઝોબિયમથી અલગ છે પરંતુ સમાન કાર્ય કરે છે. વિકલ્પ B ખોટો છે કારણ કે માયકોરાઇઝા ફૂગ નાઇટ્રોજન સ્થાપન કરતી નથી, તે ફોસ્ફરસનું શોષણ વધારે છે. વિકલ્પ C અને D ખોટા છે કારણ કે એઝોટોબેક્ટર અને સ્યુડોમોનાસ મુક્તજીવી બેક્ટેરિયા છે જે મૂળમાં ગાંઠો બનાવતા નથી.", "ref": "Std 11 - પ્રકરણ 12: ખનીજ પોષણ", "ch": ""}, {"q": "રાઇઝોબિયમ બેક્ટેરિયા દ્વારા નાઇટ્રોજન સ્થાપન પ્રક્રિયા દરમિયાન નાઇટ્રોજનેઝ ઉત્સેચકની સક્રિયતા પર કયા પદાર્થનો અવરોધક પ્રભાવ પડે છે?", "opts": ["હાઇડ્રોજન", "એમોનિયા", "નાઇટ્રેટ", "ઓક્સિજન"], "ans": 2, "exp": "નાઇટ્રોજનેઝ ઉત્સેચકની સક્રિયતા પર નાઇટ્રેટનો અવરોધક પ્રભાવ પડે છે. હાઇડ્રોજન અને એમોનિયા નાઇટ્રોજન સ્થાપનની ઉપજ છે, પરંતુ તેઓ ઉત્સેચકની સક્રિયતાને અવરોધતાં નથી. ઓક્સિજન લેગહિમોગ્લોબિન દ્વારા બંધાયેલો હોય છે, પરંતુ તે ઉત્સેચકની સક્રિયતાને અવરોધતો નથી, પરંતુ નાઇટ્રોજનેઝ ઉત્સેચક ઓક્સિજન-સંવેદનશીલ હોય છે. નાઇટ્રેટ નાઇટ્રોજન સ્થાપન પ્રક્રિયાને દબાણ કરે છે, જેને ફીડબેક ઇન્હિબિશન કહેવાય છે.", "ref": "Std 12 - અધ્યાય 11: છોડમાં ખનિજ પોષણ", "ch": ""}, {"q": "રાઇઝોબિયમ બેક્ટેરિયા દ્વારા નાઇટ્રોજન સ્થાપન માટે કયા હોર્મોનની ઉપસ્થિતિ મૂળગ્રંથિઓના વિકાસને પ્રોત્સાહન આપે છે?", "opts": ["ઓક્સિન", "જિબ્બેરેલિન", "સાયટોકાઇનિન", "એબ્સિસિક એસિડ"], "ans": 2, "exp": "સાયટોકાઇનિન હોર્મોન મૂળગ્રંથિઓના વિકાસને પ્રોત્સાહન આપે છે, જે રાઇઝોબિયમ બેક્ટેરિયા માટે આશ્રયસ્થાન તરીકે કામ કરે છે. ઓક્સિન અને જિબ્બેરેલિન મૂળના વિકાસમાં ભૂમિકા ભજવે છે, પરંતુ મૂળગ્રંથિઓના વિકાસમાં નહીં. એબ્સિસિક એસિડ વિકાસને અવરોધે છે.", "ref": "Std 12 - અધ્યાય 15: છોડમાં વિકાસ અને વૃદ્ધિ", "ch": ""}, {"q": "રાઇઝોબિયમ બેક્ટેરિયા અને શિમ્બી કુળના છોડ વચ્ચેના સહજીવનમાં, બેક્ટેરિયા દ્વારા ઉત્પન્ન થતું એમોનિયા છોડ દ્વારા કયા યૌગિકમાં રૂપાંતરિત થાય છે?", "opts": ["યુરિયા", "ગ્લુટામિક એસિડ", "એસ્પાર્ટિક એસિડ", "એમોનિયમ નાઇટ્રેટ"], "ans": 1, "exp": "બેક્ટેરિયા દ્વારા ઉત્પન્ન થતું એમોનિયા છોડ દ્વારા ગ્લુટામિક એસિડમાં રૂપાંતરિત થાય છે, જે પછી અન્ય એમિનો એસિડના સંશ્લેષણમાં વપરાય છે. યુરિયા અને એમોનિયમ નાઇટ્રેટ એમોનિયાનું રૂપાંતરણ નથી, પરંતુ એમોનિયાનું ઉત્સર્જન અથવા સંગ્રહણ છે. એસ્પાર્ટિક એસિડ પણ એમિનો એસિડ છે, પરંતુ એમોનિયાનું પ્રથમ રૂપાંતરણ ગ્લુટામિક એસિડમાં થાય છે.", "ref": "Std 12 - અધ્યાય 11: છોડમાં ખનિજ પોષણ", "ch": ""}, {"q": "એક પ્રયોગમાં, શિમ્બી કુળના છોડને રાઇઝોબિયમ બેક્ટેરિયા સાથે સંવર્ધિત કરવામાં આવ્યા હતા, પરંતુ મૂળગ્રંથિઓનો વિકાસ થયો ન હતો. આ પરિસ્થિતિ માટે નીચેનામાંથી કયું કારણ સૌથી વધુ સંભવિત છે?", "opts": ["છોડમાં ફ્લેવોનોઇડ્સનું ઉત્પાદન અપૂરતું હતું", "રાઇઝોબિયમ બેક્ટેરિયામાં નાઇટ્રોજનેઝ ઉત્સેચકની ગેરહાજરી હતી", "છોડના મૂળમાં લેગહિમોગ્લોબિનનું અતિશય ઉત્પાદન થયું હતું", "બેક્ટેરિયામાં નોડ ફેક્ટર જનીનનું પરિવર્તન થયું હતું"], "ans": 3, "exp": "સાચો જવાબ: D) બેક્ટેરિયામાં નોડ ફેક્ટર જનીનનું પરિવર્તન થયું હતું.\n\nકારણ: રાઇઝોબિયમ બેક્ટેરિયા અને શિમ્બી કુળના છોડ વચ્ચે સહજીવનની શરૂઆત માટે નોડ ફેક્ટર (Nod factor) જનીન જવાબદાર છે. આ જનીનમાં પરિવર્તન થવાથી બેક્ટેરિયા છોડના મૂળને ઓળખી શકતા નથી, જેના કારણે મૂળગ્રંથિઓનો વિકાસ થતો નથી.\n\nA) ખોટું છે કારણ કે ફ્લેવોનોઇડ્સ છોડ દ્વારા ઉત્પન્ન થાય છે અને તે બેક્ટેરિયાને આકર્ષવા માટે જરૂરી છે, પરંતુ તે મૂળગ્રંથિ વિકાસની પ્રાથમિક પ્રેરણા નથી.\nB) ખોટું છે કારણ કે નાઇટ્રોજનેઝ ઉત્સેચક નાઇટ્રોજન સ્થાપન માટે જરૂરી છે, પરંતુ તે મૂળગ્રંથિ વિકાસ સાથે સીધો સંબંધ ધરાવતું નથી.\nC) ખોટું છે કારણ કે લેગહિમોગ્લોબિન નાઇટ્રોજનેઝ ઉત્સેચકને ઓક્સિજનથી સુરક્ષિત રાખે છે, પરંતુ તે મૂળગ્રંથિ વિકાસને અવરોધતું નથી.", "ref": "Std 11 - પ્રકરણ 10: વનસ્પતિઓમાં ખનીજ પોષણ", "ch": ""}, {"q": "રાઇઝોબિયમ બેક્ટેરિયા દ્વારા નાઇટ્રોજન સ્થાપનની પ્રક્રિયામાં, નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["નાઇટ્રોજનેઝ ઉત્સેચક એમોનિયા (NH₃) નું ઉત્પાદન કરે છે, જે પછી ગ્લુટામીનમાં રૂપાંતરિત થાય છે", "લેગહિમોગ્લોબિન ઓક્સિજનને નાઇટ્રોજનેઝ ઉત્સેચકથી દૂર રાખે છે, પરંતુ તેનું સીધું સંશ્લેષણ બેક્ટેરિયા દ્વારા થાય છે", "નાઇટ્રોજન સ્થાપન માટે જરૂરી ઊર્જા ATP સ્વરૂપે મળે છે, જે છોડના શ્વસન દ્વારા પ્રાપ્ત થાય છે", "રાઇઝોબિયમ બેક્ટેરિયા દ્વારા સ્થાપિત નાઇટ્રોજન છોડને એમિનો એસિડ અને ન્યુક્લિક એસિડના સંશ્લેષણ માટે ઉપલબ્ધ થાય છે"], "ans": 1, "exp": "સાચો જવાબ: B) લેગહિમોગ્લોબિન ઓક્સિજનને નાઇટ્રોજનેઝ ઉત્સેચકથી દૂર રાખે છે, પરંતુ તેનું સીધું સંશ્લેષણ બેક્ટેરિયા દ્વારા થાય છે.\n\nકારણ: લેગહિમોગ્લોબિનનું સંશ્લેષણ બેક્ટેરિયા અને છોડ બંનેના સહયોગથી થાય છે. બેક્ટેરિયા હીમ ભાગનું ઉત્પાદન કરે છે, જ્યારે છોડ ગ્લોબિન પ્રોટીનનું ઉત્પાદન કરે છે. આથી આ વિધાન ખોટું છે.\n\nA) સાચું છે કારણ કે નાઇટ્રોજનેઝ ઉત્સેચક નાઇટ્રોજનને એમોનિયામાં રૂપાંતરિત કરે છે, જે પછી ગ્લુટામીનમાં ફેરવાય છે.\nC) સાચું છે કારણ કે નાઇટ્રોજન સ્થાપન માટે જરૂરી ATP છોડના શ્વસન દ્વારા પ્રાપ્ત થાય છે.\nD) સાચું છે કારણ કે રાઇઝોબિયમ દ્વારા સ્થાપિત નાઇટ્રોજન છોડને એમિનો એસિડ અને ન્યુક્લિક એસિડના સંશ્લેષણ માટે ઉપયોગી બને છે.", "ref": "Std 12 - પ્રકરણ 10: સૂક્ષ્મજીવો: મનુષ્યના મિત્રો", "ch": ""}, {"q": "રાઇઝોબિયમ અને શિમ્બી કુળના છોડ વચ્ચેના સહજીવનમાં, નાઇટ્રોજન સ્થાપન માટે કયા પદાર્થનો વહન મૂળગ્રંથિઓ તરફ થાય છે?", "opts": ["સુક્રોઝ", "ગ્લુકોઝ", "મેલિક એસિડ", "એસ્પાર્ટિક એસિડ"], "ans": 2, "exp": "રાઇઝોબિયમ બેક્ટેરિયા દ્વારા નાઇટ્રોજન સ્થાપન પ્રક્રિયા દરમિયાન, છોડ દ્વારા મૂળગ્રંથિઓ તરફ મેલિક એસિડનો વહન થાય છે, જે બેક્ટેરિયા માટે કાર્બન સ્રોત તરીકે કામ કરે છે. સુક્રોઝ અને ગ્લુકોઝ છોડમાં વહન પામતા કાર્બોદિત છે, પરંતુ મૂળગ્રંથિઓમાં મેલિક એસિડ જ સીધો ઉપયોગ થાય છે. એસ્પાર્ટિક એસિડ નાઇટ્રોજન સ્થાપન સાથે સીધો સંબંધ ધરાવતું નથી.", "ref": "Std 12 - અધ્યાય 12: ખનીજ પોષણ", "ch": ""}, {"q": "રાઇઝોબિયમ બેક્ટેરિયા દ્વારા નાઇટ્રોજન સ્થાપન પ્રક્રિયામાં, નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["નાઇટ્રોજનેઝ ઉત્સેચક ઓક્સિજન-સંવેદનશીલ હોય છે.", "લેગહિમોગ્લોબિન ઓક્સિજનને બાંધીને નાઇટ્રોજનેઝને રક્ષણ આપે છે.", "નાઇટ્રોજન સ્થાપન માટે હાઇડ્રોજન ગેસ જરૂરી છે.", "નાઇટ્રોજન સ્થાપન પ્રક્રિયા ATP નો ઉપયોગ કરે છે."], "ans": 2, "exp": "નાઇટ્રોજન સ્થાપન પ્રક્રિયા માટે હાઇડ્રોજન ગેસ જરૂરી નથી. નાઇટ્રોજનેઝ ઉત્સેચક ઓક્સિજન-સંવેદનશીલ હોય છે (A સત્ય), લેગહિમોગ્લોબિન ઓક્સિજનને બાંધીને નાઇટ્રોજનેઝને રક્ષણ આપે છે (B સત્ય), અને પ્રક્રિયા ATP નો ઉપયોગ કરે છે (D સત્ય). હાઇડ્રોજન ગેસ નાઇટ્રોજન સ્થાપન સાથે સીધો સંબંધ ધરાવતું નથી.", "ref": "Std 12 - અધ્યાય 12: ખનીજ પોષણ", "ch": ""}, {"q": "રાઇઝોબિયમ બેક્ટેરિયા દ્વારા નાઇટ્રોજન સ્થાપન દરમિયાન, મૂળગ્રંથિઓમાં ઓક્સિજનની સાંદ્રતા નિયંત્રિત કરવા માટે લેગહિમોગ્લોબિન સાથે કયો પદાર્થ સહ-ક્રિયાશીલ હોય છે, જે નાઇટ્રોજનેઝ ઉત્સેચકની ક્રિયાને અવરોધે છે?", "opts": ["ફ્લેવોડોક્સિન", "હીમોગ્લોબિન", "સાયટોક્રોમ", "માયોગ્લોબિન"], "ans": 0, "exp": "લેગહિમોગ્લોબિન સાથે ફ્લેવોડોક્સિન સહ-ક્રિયાશીલ હોય છે, જે મૂળગ્રંથિઓમાં ઓક્સિજનની સાંદ્રતા નિયંત્રિત કરે છે અને નાઇટ્રોજનેઝ ઉત્સેચકની ક્રિયાને અવરોધે છે. હીમોગ્લોબિન, સાયટોક્રોમ અને માયોગ્લોબિન આ પ્રક્રિયામાં સહભાગી નથી. ફ્લેવોડોક્સિન એક ઇલેક્ટ્રોન વાહક પ્રોટીન છે જે ઓક્સિજનની અસરને નિયંત્રિત કરવામાં મદદ કરે છે.", "ref": "Std 12 - અધ્યાય 11: વનસ્પતિ શારીર અને ક્રિયાવિજ્ઞાન (પ્રકરણ: ખનીજ પોષણ)", "ch": ""}, {"q": "રાઇઝોબિયમ અને શિમ્બી કુળના છોડ વચ્ચેના સહજીવનમાં, મૂળગ્રંથિઓના વિકાસ માટે કયો સંકેત અણુ (સિગ્નલ મોલેક્યુલ) જવાબદાર છે?", "opts": ["ઓક્સિન", "જિબરેલિન", "ફ્લેવોનોઇડ્સ", "ઇથિલીન"], "ans": 2, "exp": "રાઇઝોબિયમ બેક્ટેરિયા અને શિમ્બી કુળના છોડ વચ્ચેના સહજીવનમાં, છોડ દ્વારા સ્રાવવામાં આવતા ફ્લેવોનોઇડ્સ નામના ટો છે કારણ કે ખૂબ ઓછું pH બેક્ટેરિયાની વૃદ્ધિ અને ઉત્સેચકની ક્રિયાને અવરોધે છે. વિકલ્પ D ખોટો છે કારણ કે મોલિબ્ડેનમ નાઇટ્રોજનેઝ ઉત્સેચકનો આવશ્યક ઘટક છે, તેની ઉણપ સીધી નાઇટ્રોજન સ્થાપનને અસર કરે છે.", "ref": "Std 12 - પ્રકરણ 10: સૂક્ષ્મજીવો માનવ કલ્યાણમાં", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
