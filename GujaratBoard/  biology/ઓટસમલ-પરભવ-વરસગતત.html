<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ઓટોસોમલ પ્રભાવી વારસાગતતા</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ઓટોસોમલ પ્રભાવી વારસાગતતા</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ઓટોસોમલ પ્રભાવી વારસાગતતા</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક દંપતીને બે બાળકો છે, જેમાં એક બાળકમાં ઓટોસોમલ પ્રભાવી રોગ જોવા મળે છે જ્યારે બીજું બાળક સામાન્ય છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["માતા-પિતામાંથી ઓછામાં ઓછું એક વ્યક્તિ રોગગ્રસ્ત હોવું જોઈએ", "રોગગ્રસ્ત બાળકને રોગ માટેના જનીનની એક જ પ્રતિકૃતિ મળી હશે", "જો માતા-પિતા બંને સામાન્ય હોય તો રોગગ્રસ્ત બાળકનું જન્મવું અશક્ય છે", "આ રોગની અભિવ્યક્તિ માટે બંને જનીન પ્રતિકૃતિઓની જરૂર પડે છે"], "ans": 3, "exp": "ઓટોસોમલ પ્રભાવી વારસાગતતામાં રોગ માટે એક જ પ્રભાવી જનીન પ્રતિકૃતિ પૂરતી છે (વિકલ્પ B સાચું). માતા-પિતામાંથી ઓછામાં ઓછું એક રોગગ્રસ્ત હોવું જોઈએ (વિકલ્પ A સાચું). જો બંને માતા-પિતા સામાન્ય હોય તો રોગગ્રસ્ત બાળકનું જન્મવું અશક્ય છે (વિકલ્પ C સાચું). વિકલ્પ D ખોટો છે કારણ કે ઓટોસોમલ પ્રભાવી રોગ માટે બંને પ્રતિકૃતિઓની જરૂર હોતી નથી - તે પ્રતિસાદી વારસાગતતાની લાક્ષણિકતા છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "હંટિંગ્ટન રોગ ઓટોસોમલ પ્રભાવી રીતે વારસામાં મળે છે. એક રોગગ્રસ્ત પુરુષ (Hh) અને સામાન્ય સ્ત્રી (hh)ના સંતાનોમાં આ રોગની સંભાવના કેટલી હશે?", "opts": ["0%", "25%", "50%", "100%"], "ans": 2, "exp": "હંટિંગ્ટન રોગ ઓટોસોમલ પ્રભાવી રોગ છે. રોગગ્રસ્ત પુરુષ (Hh) અને સામાન્ય સ્ત્રી (hh)ના સંતાનોમાં H જનીન મળવાની સંભાવના 50% છે (Hh જનીન પ્રકાર). તેથી 50% સંતાનો રોગગ્રસ્ત હશે. વિકલ્પ A ખોટો છે કારણ કે રોગની સંભાવના છે. વિકલ્પ B પ્રતિસાદી વારસાગતતા માટે સાચો છે. વિકલ્પ D ખોટો છે કારણ કે બધા સંતાનો રોગગ્રસ્ત નહીં થાય.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "નીચેનામાંથી કયો રોગ ઓટોસોમલ પ્રભાવી વારસાગતતાનું ઉદાહરણ નથી?", "opts": ["હંટિંગ્ટન રોગ", "માર્ફન સિન્ડ્રોમ", "સિકલ સેલ એનીમિયા", "અકોન્ડ્રોપ્લાસિયા"], "ans": 2, "exp": "સિકલ સેલ એનીમિયા ઓટોસોમલ પ્રતિસાદી વારસાગતતા દ્વારા વારસામાં મળે છે, જ્યારે હંટિંગ્ટન રોગ, માર્ફન સિન્ડ્રોમ અને અકોન્ડ્રોપ્લાસિયા ઓટોસોમલ પ્રભાવી વારસાગતતા દર્શાવે છે. તેથી વિકલ્પ C ખોટો છે. અન્ય વિકલ્પો સાચા ઓટોસોમલ પ્રભાવી રોગો છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક ઓટોસોમલ પ્રભાવી રોગ માટે વિષમયુગ્મી (Hh) વ્યક્તિ રોગગ્રસ્ત છે. જો આ વ્યક્તિનો જીવનસાથી પણ વિષમયુગ્મી (Hh) હોય, તો તેમના સંતાનોમાં રોગ ન થવાની સંભાવના કેટલી હશે?", "opts": ["0%", "25%", "50%", "75%"], "ans": 1, "exp": "બંને માતા-પિતા વિષમયુગ્મી (Hh) હોવાથી, સંતાનોના જનીન પ્રકારોનું પ્રમાણ HH:Hh:hh = 1:2:1 હશે. તેથી 25% સંતાનો સામાન્ય (hh) હશે. વિકલ્પ A ખોટો છે કારણ કે રોગ ન થવાની સંભાવના છે. વિકલ્પ C અને D ખોટા છે કારણ કે તે યોગ્ય સંભાવના દર્શાવતા નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "ઓટોસોમલ પ્રભાવી વારસાગતતામાં નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["રોગગ્રસ્ત વ્યક્તિના દરેક સંતાનને રોગ થવાની સંભાવના 50% હોય છે", "રોગ પેઢીઓમાં સતત જોવા મળે છે (વર્ટિકલ ટ્રાન્સમિશન)", "સ્ત્રીઓ અને પુરુષોને રોગ થવાની સંભાવના સમાન હોય છે", "રોગગ્રસ્ત વ્યક્તિ હંમેશા સમયુગ્મી પ્રભાવી (HH) હોય છે"], "ans": 3, "exp": "ઓટોસોમલ પ્રભાવી વારસાગતતામાં રોગગ્રસ્ત વ્યક્તિ વિષમયુગ્મી (Hh) અથવા સમયુગ્મી પ્રભાવી (HH) હોઈ શકે છે, પરંતુ સામાન્ય રીતે વિષમયુગ્મી હોય છે. તેથી વિકલ્પ D ખોટું છે. અન્ય વિકલ્પો ઓટોસોમલ પ્રભાવી વારસાગતતાની લાક્ષણિકતાઓ દર્શાવે છે: વિકલ્પ A (50% સંભાવના), B (વર્ટિકલ ટ્રાન્સમિશન), અને C (સ્ત્રી-પુરુષમાં સમાન સંભાવના).", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક ઓટોસોમલ પ્રભાવી રોગ ધરાવતી વિષમયુગ્મી (Hh) માતા અને સામાન્ય પિતા (hh)ના સંતાનોમાં નીચેનામાંથી કયું પરિણામ શક્ય નથી?", "opts": ["બધા સંતાનો રોગગ્રસ્ત હશે", "50% સંતાનો રોગગ્રસ્ત અને 50% સામાન્ય હશે", "એક પણ સંતાન રોગગ્રસ્ત નહીં હોય", "75% સંતાનો રોગગ્રસ્ત અને 25% સામાન્ય હશે"], "ans": 0, "exp": "ઓટોસોમલ પ્રભાવી વારસાગતતામાં વિષમયુગ્મી (Hh) માતા અને સામાન્ય પિતા (hh)ના સંતાનોમાં 50% રોગગ્રસ્ત (Hh) અને 50% સામાન્ય (hh) થવાની સંભાવના હોય છે. બધા સંતાનો રોગગ્રસ્ત થવાની સંભાવના શક્ય નથી કારણ કે પિતા પાસે રોગનું જનીન નથી (hh). વિકલ્પ B સાચો છે, જ્યારે વિકલ્પ A, C અને D ખોટા છે કારણ કે તેઓ સંભાવનાના નિયમોનું ઉલ્લંઘન કરે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઓટોસોમલ પ્રભાવી વારસાગતતાના સંદર્ભમાં ખોટું છે?", "opts": ["રોગગ્રસ્ત વ્યક્તિ હંમેશા વિષમયુગ્મી (Hh) હોય છે", "રોગગ્રસ્ત વ્યક્તિના સંતાનોમાં રોગની સંભાવના 50% હોય છે", "રોગ પેઢીઓમાં સતત જોવા મળે છે", "સ્ત્રી અને પુરુષ બંનેમાં રોગ સમાન રીતે જોવા મળે છે"], "ans": 0, "exp": "ઓટોસોમલ પ્રભાવી વારસાગતતામાં રોગગ્રસ્ત વ્યક્તિ વિષમયુગ્મી (Hh) અથવા સમયુગ્મી પ્રભાવી (HH) હોઈ શકે છે. વિધાન A ખોટું છે કારણ કે HH વ્યક્તિ પણ રોગગ્રસ્ત હોઈ શકે છે. બાકીના વિધાનો સાચા છે: રોગગ્રસ્ત વ્યક્તિના સંતાનોમાં રોગની સંભાવના 50% હોય છે (જો Hh હોય), રોગ પેઢીઓમાં સતત જોવા મળે છે, અને સ્ત્રી-પુરુષ બંનેમાં સમાન રીતે જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક ઓટોસોમલ પ્રભાવી રોગ માટે જો એક સમયુગ્મી પ્રભાવી (HH) વ્યક્તિ અને એક સામાન્ય (hh) વ્યક્તિના લગ્ન થાય, તો તેમના સંતાનોમાં નીચેનામાંથી કયું પરિણામ જોવા મળશે?", "opts": ["બધા સંતાનો રોગગ્રસ્ત હશે", "50% સંતાનો રોગગ્રસ્ત અને 50% સામાન્ય હશે", "બધા સંતાનો સામાન્ય હશે", "25% સંતાનો રોગગ્રસ્ત અને 75% સામાન્ય હશે"], "ans": 0, "exp": "સમયુગ્મી પ્રભાવી (HH) વ્યક્તિ અને સામાન્ય (hh) વ્યક્તિના સંતાનો બધા વિષમયુગ્મી (Hh) હશે, જે રોગગ્રસ્ત હશે કારણ કે ઓટોસોમલ પ્રભાવી રોગમાં એક જ પ્રભાવી જનીન (H) રોગ માટે પૂરતું છે. તેથી વિકલ્પ A સાચો છે. બાકીના વિકલ્પો ખોટા છે કારણ કે તેઓ આ વારસાગતતાના નિયમોનું પાલન કરતા નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "ઓટોસોમલ પ્રભાવી વારસાગતતામાં નીચેનામાંથી કયું ઉદાહરણ અપવાદરૂપ ગણી શકાય?", "opts": ["હંટિંગ્ટન રોગ", "માર્ફન સિન્ડ્રોમ", "સિકલ સેલ એનીમિયા", "અકોન્ડ્રોપ્લાસિયા"], "ans": 2, "exp": "સિકલ સેલ એનીમિયા ઓટોસોમલ પ્ર recessિવ વારસાગતતા દ્વારા વારસામાં મળે છે, જ્યારે બાકીના રોગો ઓટોસોમલ પ્રભાવી વારસાગતતાના ઉદાહરણો છે. તેથી વિકલ્પ C અપવાદરૂપ છે. હંટિંગ્ટન રોગ, માર્ફન સિન્ડ્રોમ અને અકોન્ડ્રોપ્લાસિયા ઓટોસોમલ પ્રભાવી રોગો છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક ઓટોસોમલ પ્રભાવી રોગ માટે જો એક વિષમયુગ્મી (Hh) વ્યક્તિ અને એક સમયુગ્મી પ્રભાવી (HH) વ્યક્તિના લગ્ન થાય, તો તેમના સંતાનોમાં રોગની સંભાવના કેટલી હશે?", "opts": ["25%", "50%", "75%", "100%"], "ans": 3, "exp": "વિષમયુગ્મી (Hh) અને સમયુગ્મી પ્રભાવી (HH) વ્યક્તિના સંતાનોમાં બે શક્ય જનીન પ્રકારો હશે: HH અને Hh. બંને જનીન પ્રકારોમાં ઓછામાં ઓછું એક પ્રભાવી જનીન (H) હાજર હશે, જે રોગ માટે પૂરતું છે. તેથી 100% સંતાનો રોગગ્રસ્ત હશે. વિકલ્પ D સાચો છે, જ્યારે બાકીના વિકલ્પો ખોટા છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક કુટુંબમાં ઓટોસોમલ પ્રભાવી રોગ ધરાવતી વિષમયુગ્મી (Hh) સ્ત્રી અને સામાન્ય પુરુષ (hh)ના સંતાનમાં રોગ દેખાય છે. જો આ સંતાનને એક સામાન્ય વ્યક્તિ (hh) સાથે લગ્ન કરાવવામાં આવે, તો તેમના સંતાનોમાં રોગ દેખાવાની શક્યતા કેટલી હશે?", "opts": ["0%", "25%", "50%", "100%"], "ans": 2, "exp": "વિષમયુગ્મી (Hh) સંતાન અને સામાન્ય (hh) વ્યક્તિના લગ્નથી સંતાનોમાં જનીન પ્રકાર Hh અથવા hh હશે. Hh સંતાનો રોગગ્રસ્ત હશે, જ્યારે hh સામાન્ય હશે. આમ, 50% સંતાનોમાં રોગ દેખાવાની શક્યતા રહે છે. A) 0% ખોટું છે કારણ કે Hh સંતાનો રોગગ્રસ્ત હશે. B) 25% ખોટું છે કારણ કે પેનેટ સ્ક્વેર મુજબ 50% શક્યતા છે. D) 100% ખોટું છે કારણ કે સંપૂર્ણ સંતાનો રોગગ્રસ્ત નથી.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "નીચેનામાંથી કયો રોગ ઓટોસોમલ પ્રભાવી વારસાગતતાનું ઉદાહરણ છે, જ્યાં રોગના લક્ષણો વય સાથે પ્રગટ થાય છે અને તેને 'અંતર્ગત પેનેટ્રન્સ' (Incomplete Penetrance) ગણવામાં આવે છે?", "opts": ["સિકલ સેલ એનીમિયા", "હંટિંગ્ટન રોગ", "ફેનિલકેટોન્યુરિયા", "અચોન્ડ્રોપ્લેસિયા"], "ans": 1, "exp": "હંટિંગ્ટન રોગ ઓટોસોમલ પ્રભાવી વારસાગતતાનું ઉદાહરણ છે, જ્યાં લક્ષણો વય સાથે પ્રગટ થાય છે અને તે અંતર્ગત પેનેટ્રન્સ દર્શાવે છે. A) સિકલ સેલ એનીમિયા ઓટોસોમલ અપ્રભાવી છે. C) ફેનિલકેટોન્યુરિયા પણ ઓટોસોમલ અપ્રભાવી છે. D) અચોન્ડ્રોપ્લેસિયા ઓટોસોમલ પ્રભાવી છે, પરંતુ તે અંતર્ગત પેનેટ્રન્સ દર્શાવતું નથી.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક ઓટોસોમલ પ્રભાવી રોગ માટે, જો એક વિષમયુગ્મી (Hh) પુરુષ અને એક વિષમયુગ્મી (Hh) સ્ત્રીના લગ્નથી જન્મેલા સંતાનોમાં રોગગ્રસ્ત ન હોવાનું પ્રમાણ કેટલું હશે?", "opts": ["0%", "25%", "50%", "75%"], "ans": 1, "exp": "વિષમયુગ્મી (Hh) પુરુષ અને સ્ત્રીના લગ્નથી સંતાનોમાં જનીન પ્રકાર HH, Hh, Hh, hh હશે. અહીં, hh સંતાનો માત્ર સામાન્ય હશે, જે 25% છે. A) 0% ખોટું છે કારણ કે hh સંતાનો સામાન્ય હશે. C) 50% ખોટું છે કારણ કે 50% સંતાનો Hh હશે, જે રોગગ્રસ્ત હશે. D) 75% ખોટું છે કારણ કે 75% સંતાનો રોગગ્રસ્ત હશે.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક ઓટોસોમલ પ્રભાવી રોગ માટે, જો એક સમયુગ્મી પ્રભાવી (HH) વ્યક્તિ અને એક સામાન્ય (hh) વ્યક્તિના લગ્નથી જન્મેલા સંતાનોમાં રોગગ્રસ્ત ન હોવાનું પ્રમાણ કેટલું હશે?", "opts": ["0%", "25%", "50%", "100%"], "ans": 0, "exp": "સમયુગ્મી પ્રભાવી (HH) વ્યક્તિ અને સામાન્ય (hh) વ્યક્તિના લગ્નથી સંતાનોમાં જનીન પ્રકાર Hh હશે, જે રોગગ્રસ્ત હશે. આથી, સંતાનોમાં રોગગ્રસ્ત ન હોવાનું પ્રમાણ 0% હશે. B) 25%, C) 50%, અને D) 100% ખોટા છે કારણ કે સંપૂર્ણ સંતાનો રોગગ્રસ્ત હશે.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક કુટુંબમાં, ઓટોસોમલ પ્રભાવી વારસાગતતાથી થતો અચાનક મૃત્યુનો રોગ (Sudden Death Syndrome) જોવા મળે છે. જો એક રોગગ્રસ્ત પુરુષ (Hh) અને એક સામાન્ય સ્ત્રી (hh)ના સંતાનમાં રોગના લક્ષણો દેખાય નહીં, તો નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["આ રોગમાં પૂર્ણ પ્રભાવિતા (Complete Penetrance) જોવા મળે છે", "આ રોગમાં અપૂર્ણ પ્રભાવિતા (Incomplete Penetrance) જોવા મળે છે", "રોગગ્રસ્ત પુરુષમાં જનીનની અભિવ્યક્તિ થઈ નથી, પરંતુ તે વાહક છે", "સામાન્ય સ્ત્રીમાં રોગ માટેનો પ્રભાવી એલિલ અચાનક મ્યુટેશન દ્વારા ઉત્પન્ન થયો છે"], "ans": 1, "exp": "સાચો જવાબ B છે. અપૂર્ણ પ્રભાવિતા (Incomplete Penetrance) એવી પરિસ્થિતિ છે જ્યાં રોગ માટેનો પ્રભાવી જનીન હાજર હોવા છતાં તેના લક્ષણો દેખાતા નથી. અહીં, રોગગ્રસ્ત પુરુષ (Hh) પાસે પ્રભાવી એલિલ હોવા છતાં તેના સંતાનમાં લક્ષણો દેખાતા નથી, જે અપૂર્ણ પ્રભાવિતાનું લક્ષણ છે. A ખોટું છે કારણ કે પૂર્ણ પ્રભાવિતામાં રોગના લક્ષણો હંમેશા દેખાય છે. C ખોટું છે કારણ કે રોગગ્રસ્ત પુરુષમાં જનીનની અભિવ્યક્તિ થઈ છે (તેઓ રોગગ્રસ્ત છે), પરંતુ સંતાનમાં નથી. D ખોટું છે કારણ કે સામાન્ય સ્ત્રી (hh) પાસે રોગ માટેનો પ્રભાવી એલિલ નથી, અને અચાનક મ્યુટેશનનો ઉલ્લેખ અહીં લાગુ પડતો નથી.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને વિકાસ", "ch": ""}, {"q": "એક કુટુંબમાં ઓટોસોમલ પ્રભાવી વારસાગતતાથી થતો રોગ ધરાવતી વિષમયુગ્મી (Hh) માતા અને રોગગ્રસ્ત પિતા (Hh)ના સંતાનમાં રોગ ન હોવાની શક્યતા કેટલી છે?", "opts": ["0%", "25%", "50%", "75%"], "ans": 1, "exp": "વિષમયુગ્મી (Hh) માતા અને પિતા બંનેમાં રોગનો પ્રભાવી એલિલ (H) અને સામાન્ય એલિલ (h) હોય છે. સંતાનમાં રોગ ન હોવા માટે તેને સામાન્ય જનીનોટાઇપ (hh) મળવો જોઈએ. Punnett square મુજબ, Hh x Hh ક્રોસમાં 25% શક્યતા hh જનીનોટાઇપની હોય છે, જેમાં રોગ નથી. અહીં, A) 0% ખોટું છે કારણ કે રોગ વિના સંતાનની શક્યતા છે. C) 50% ખોટું છે કારણ કે તે HH અથવા Hh જનીનોટાઇપ ધરાવતાં સંતાનોની શક્યતા છે. D) 75% ખોટું છે કારણ કે તે રોગગ્રસ્ત સંતાનોની કુલ શક્યતા છે.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને વિકાસ", "ch": ""}, {"q": "એક કુટુંબમાં, ઓટોસોમલ પ્રભાવી વારસાગતતાથી થતો રોગ ધરાવતી સમયુગ્મી પ્રભાવી (HH) સ્ત્રી અને સામાન્ય પુરુષ (hh)ના સંતાનમાં રોગની શક્યતા કેટલી છે?", "opts": ["0%", "25%", "50%", "100%"], "ans": 3, "exp": "સમયુગ્મી પ્રભાવી (HH) સ્ત્રી અને સામાન્ય પુરુષ (hh)ના સંતાનમાં, બધા જ સંતાનોને Hh જનીનોટાઇપ મળે છે, જે રોગગ્રસ્ત હોય છે. તેથી રોગની શક્યતા 100% છે. A) 0%, B) 25%, અને C) 50% ખોટા છે કારણ કે બધા જ સંતાનો રોગગ્રસ્ત હશે.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને વિકાસ", "ch": ""}, {"q": "એક કુટુંબમાં, ઓટોસોમલ પ્રભાવી વારસાગતતાથી થતો રોગ ધરાવતી વિષમયુગ્મી (Hh) સ્ત્રી અને સામાન્ય પુરુષ (hh)ના સંતાનમાં રોગના લક્ષણો પ્રગટ થવાની શક્યતા કેટલી છે, જો પિતા અને માતા બંનેમાં જનીનની આનુવંશિક પેનેટ્રન્સ 80% હોય?", "opts": ["40%", "50%", "80%", "100%"], "ans": 0, "exp": "વિષમયુગ્મી (Hh) માતા પાસેથી સંતાનને રોગી જનીન (H) મળવાની શક્યતા 50% છે. પેનેટ્રન્સ 80% હોવાથી, રોગી જનીન ધરાવતા સંતાનમાં લક્ષણો પ્રગટ થવાની શક્યતા 80% છે. આથી, કુલ શક્યતા = 50% (જનીન મળવાની) × 80% (પેનેટ્રન્સ) = 40%. બાકીના વિકલ્પો ખોટા છે કારણ કે તેઓ પેનેટ્રન્સ અને જનીન વિતરણના ગુણાકારને ધ્યાનમાં લેતા નથી.", "ref": "Std 12 - Chapter 5: વારસાગતતા અને વિકાસ (Anuvanshikta va Vikas)", "ch": ""}, {"q": "નીચેનામાંથી કયું ઉદાહરણ ઓટોસોમલ પ્રભાવી વારસાગતતાના સંદર્ભમાં ખોટું છે, જ્યાં જનીનની અભિવ્યક્તિ પર પર્યાવરણીય પરિબળોનો પ્રભાવ જોવા મળે છે?", "opts": ["પોલિડેક્ટીલી (Polydactyly) - વધારાની આંગળીઓ કે પગના આંગળા", "માર્ફન સિન્ડ્રોમ (Marfan Syndrome) - સંયોજક પેશીને અસર કરતો રોગ", "ફિનાઇલકીટોન્યુરિયા (Phenylketonuria) - ફિનાઇલએલેનાઇન ચયાપચયની ખામી", "અચોન્ડ્રોપ્લેસિયા (Achondroplasia) - વામનતા"], "ans": 2, "exp": "ફિનાઇલકીટોન્યુરિયા (PKU) એ ઓટોસોમલ પ્રચ્છન્ન વારસાગતતા દ્વારા થતો રોગ છે, જેમાં ફિનાઇલએલેનાઇન ચયાપચયની ખામી જોવા મળે છે અને તેની અભિવ્યક્તિ પર પર્યાવરણીય પરિબળો (ખોરાક) નો પ્રભાવ હોય છે (વિકલ્પ C). બાકીના વિકલ્પો ઓટોસોમલ પ્રભાવી વારસાગતતાના ઉદાહરણો છે: પોલિડેક્ટીલી (A), માર્ફન સિન્ડ્રોમ (B), અને અચોન્ડ્રોપ્લેસિયા (D). આ રોગોમાં પર્યાવરણીય પરિબળોનો પ્રભાવ ઓછો જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક કુટુંબમાં, ઓટોસોમલ પ્રભાવી વારસાગતતાથી થતો અચાનક હૃદય અટકવાનો રોગ (Long QT Syndrome) ધરાવતી વિષમયુગ્મી (Hh) સ્ત્રી અને સામાન્ય પુરુષ (hh)ના સંતાનમાં રોગની શક્યતા કેટલી હશે, જો રોગનો જનીન પેનેટ્રન્સ 80% હોય?", "opts": ["0%", "20%", "40%", "80%"], "ans": 2, "exp": "વિષમયુગ્મી (Hh) સ્ત્રી અને સામાન્ય પુરુષ (hh)ના સંતાનમાં રોગનો જનીન (H) મળવાની શક્યતા 50% હોય છે. પરંતુ પેનેટ્રન્સ 80% હોવાથી, રોગના લક્ષણો દેખાય તેની શક્યતા 50% (જનીન મળવાની શક્યતા) × 80% (પેનેટ્રન્સ) = 40% થાય છે. A) 0% ખોટું છે કારણ કે સંતાનમાં જનીન મળવાની શક્યતા છે. B) 20% ખોટું છે કારણ કે પેનેટ્રન્સ 80% હોવાથી 50% × 80% = 40% થાય છે. D) 80% ખોટું છે કારણ કે જનીન મળવાની શક્યતા 50% જ છે, પેનેટ્રન્સ 80% હોવા છતાં પણ સંતાનમાં રોગ દેખાય તેની શક્યતા 40% જ થાય છે.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને વિકાસ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
