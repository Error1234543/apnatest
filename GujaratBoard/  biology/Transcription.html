<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transcription</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Transcription</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Transcription</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 19 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 19 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ટ્રાન્સક્રિપ્શન દરમિયાન RNA પોલિમરેઝ એ ડી.એન.એ. ની કઈ દિશામાં વાંચન કરે છે?", "opts": ["3' → 5' દિશામાં", "5' → 3' દિશામાં", "બંને દિશામાં એકસરખું", "ફક્ત ટેલોમિયર પ્રદેશમાં"], "ans": 0, "exp": "RNA પોલિમરેઝ એ ડી.એન.એ. ની 3' → 5' દિશામાં વાંચન કરે છે કારણ કે તે ટેમ્પલેટ સ્ટ્રેન્ડ પર 3' → 5' દિશામાં ચાલે છે અને mRNA ની 5' → 3' દિશામાં સિંથેસિસ કરે છે. બાકીના વિકલ્પો ખોટા છે: B) 5' → 3' એ RNA સિંથેસિસની દિશા છે, નહીં વાંચનની; C) બંને દિશામાં વાંચન થતું નથી; D) ટેલોમિયર પ્રદેશ સાથે ટ્રાન્સક્રિપ્શનનો સીધો સંબંધ નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "યુકેરિયોટિક ટ્રાન્સક્રિપ્શનમાં, કયા RNA પોલિમરેઝ એ rRNA જનીનનો ટ્રાન્સક્રિપ્શન કરે છે?", "opts": ["RNA પોલિમરેઝ I", "RNA પોલિમરેઝ II", "RNA પોલિમરેઝ III", "RNA પોલિમરેઝ I અને III બંને"], "ans": 0, "exp": "RNA પોલિમરેઝ I એ 28S, 18S, અને 5.8S rRNA નો ટ્રાન્સક્રિપ્શન કરે છે. RNA પોલિમરેઝ II mRNA નો, RNA પોલિમરેઝ III 5S rRNA અને tRNA નો ટ્રાન્સક્રિપ્શન કરે છે. D) ખોટું છે કારણ કે RNA પોલિમરેઝ III ફક્ત 5S rRNA અને tRNA નો ટ્રાન્સક્રિપ્શન કરે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "ટ્રાન્સક્રિપ્શન દરમિયાન, કયો ઉત્સેચક ટર્મિનેશન સિગ્નલને ઓળખીને ટ્રાન્સક્રિપ્શન રોકે છે?", "opts": ["હેલિકેઝ", "ટોપોઇઝોમેરેઝ", "રોહો પ્રોટીન", "ટર્મિનેશન ફેક્ટર (રો પ્રોટીન)"], "ans": 3, "exp": "ટર્મિનેશન ફેક્ટર (રો પ્રોટીન) ટ્રાન્સક્રિપ્શન ટર્મિનેશન સિગ્નલને ઓળખીને RNA પોલિમરેઝને રોકે છે. હેલિકેઝ ડી.એન.એ. ને અનવાઇન્ડ કરે છે, ટોપોઇઝોમેરેઝ ડી.એન.એ. ની સુપરકોઇલિંગને નિયંત્રે છે, અને રોહો પ્રોટીન ટ્રાન્સલેશનમાં ભાગ લે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "પ્રોકેરિયોટ્સમાં, ટ્રાન્સક્રિપ્શન અને ટ્રાન્સલેશન ક્યાં થાય છે?", "opts": ["કોષકેન્દ્રમાં", "સાયટોપ્લાઝમમાં", "કોષકેન્દ્ર અને સાયટોપ્લાઝમ બંનેમાં", "માઈટોકોન્ડ્રિયામાં"], "ans": 1, "exp": "પ્રોકેરિયોટ્સમાં કોષકેન્દ્ર નથી હોતું, તેથી ટ્રાન્સક્રિપ્શન અને ટ્રાન્સલેશન બંને સાયટોપ્લાઝમમાં થાય છે. A) ખોટું છે કારણ કે પ્રોકેરિયોટ્સમાં કોષકેન્દ્ર નથી; C) ખોટું છે કારણ કે કોષકેન્દ્ર નથી; D) ખોટું છે કારણ કે માઈટોકોન્ડ્રિયામાં ટ્રાન્સક્રિપ્શન થતું નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "ટ્રાન્સક્રિપ્શન દરમિયાન, કયા પ્રકારના RNA ની સિંથેસિસ માટે પ્રમોટર પ્રદેશમાં TATA બોક્સ જરૂરી છે?", "opts": ["rRNA", "tRNA", "mRNA", "snRNA"], "ans": 2, "exp": "TATA બોક્સ એ RNA પોલિમરેઝ II દ્વારા mRNA ની સિંથેસિસ માટે જરૂરી પ્રમોટર પ્રદેશ છે. rRNA, tRNA, અને snRNA ની સિંથેસિસ માટે અલગ પ્રમોટર પ્રદેશો અને RNA પોલિમરેઝ વપરાય છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "યુકેરિયોટિક કોષમાં, ટ્રાન્સક્રિપ્શન દરમિયાન RNA પોલિમરેઝ II દ્વારા સિંથેસ થતાં mRNA ની પ્રક્રિયા પૂર્ણ થયા પછી, કયો પ્રોટીન પરિવાર ટ્રાન્સક્રિપ્શન પોસ્ટ-ટ્રાન્સક્રિપ્શનલ મોડિફિકેશનમાં મહત્વની ભૂમિકા ભજવે છે?", "opts": ["હિસ્ટોન પ્રોટીન", "સ્નઆરપી (snRNP) કણિકાઓ", "રાઇબોઝોમલ પ્રોટીન", "ટોપોઇઝોમરેઝ ઉત્સેચક"], "ans": 1, "exp": "સ્નઆરપી (snRNP) કણિકાઓ ટ્રાન્સક્રિપ્શન પછીના mRNA પ્રોસેસિંગમાં મહત્વની ભૂમિકા ભજવે છે, જેમ કે સ્પ્લાઇસિંગ. હિસ્ટોન પ્રોટીન DNA પેકેજિંગ સાથે સંબંધિત છે, રાઇબોઝોમલ પ્રોટીન ટ્રાન્સલેશનમાં ભાગ લે છે, અને ટોપોઇઝોમરેઝ ઉત્સેચક DNA ની ટોપોલોજીને નિયંત્રિત કરે છે.", "ref": "Std 12 - Chapter 6: જનીન અભિવ્યક્તિ અને નિયમન", "ch": ""}, {"q": "પ્રોકેરિયોટ્સમાં, ટ્રાન્સક્રિપ્શન દરમિયાન, સિગ્મા ફેક્ટરની ભૂમિકા શું છે?", "opts": ["DNA ની ડબલ હેલિક્સને ખોલવા", "RNA પોલિમરેઝને પ્રમોટર પ્રદેશને ઓળખવામાં મદદ કરવી", "ટર્મિનેશન સિગ્નલને ઓળખવું", "RNA ની લંબાઈને નિયંત્રિત કરવી"], "ans": 1, "exp": "સિગ્મા ફેક્ટર RNA પોલિમરેઝને પ્રમોટર પ્રદેશને ઓળખવામાં મદદ કરે છે, જેથી ટ્રાન્સક્રિપ્શનની શરૂઆત થઈ શકે. DNA ની ડબલ હેલિક્સને ખોલવા, ટર્મિનેશન સિગ્નલને ઓળખવા, અને RNA ની લંબાઈને નિયંત્રિત કરવા એ સિગ્મા ફેક્ટરની ભૂમિકા નથી.", "ref": "Std 12 - Chapter 6: જનીન અભિવ્યક્તિ અને નિયમન", "ch": ""}, {"q": "યુકેરિયોટિક કોષમાં, ટ્રાન્સક્રિપ્શન દરમિયાન, કયા RNA પોલિમરેઝ દ્વારા 5S rRNA ની સિંથેસિસ થાય છે?", "opts": ["RNA પોલિમરેઝ I", "RNA પોલિમરેઝ II", "RNA પોલિમરેઝ III", "RNA પોલિમરેઝ I અને III"], "ans": 2, "exp": "RNA પોલિમરેઝ III દ્વારા 5S rRNA ની સિંથેસિસ થાય છે. RNA પોલિમરેઝ I દ્વારા 28S, 18S, અને 5.8S rRNA ની સિંથેસિસ થાય છે, જ્યારે RNA પોલિમરેઝ II દ્વારા mRNA ની સિંથેસિસ થાય છે.", "ref": "Std 12 - Chapter 6: જનીન અભિવ્યક્તિ અને નિયમન", "ch": ""}, {"q": "ટ્રાન્સક્રિપ્શન દરમિયાન, કયા ઉત્સેચક દ્વારા RNA ની સિંથેસિસની દિશા 5' થી 3' હોય છે?", "opts": ["DNA પોલિમરેઝ", "RNA પોલિમરેઝ", "લાઇગેઝ", "હેલિકેઝ"], "ans": 1, "exp": "RNA પોલિમરેઝ દ્વારા RNA ની સિંથેસિસની દિશા 5' થી 3' હોય છે. DNA પોલિમરેઝ DNA ની સિંથેસિસ કરે છે, લાઇગેઝ DNA ના ટુકડાઓને જોડે છે, અને હેલિકેઝ DNA ની ડબલ હેલિક્સને ખોલે છે.", "ref": "Std 12 - Chapter 6: જનીન અભિવ્યક્તિ અને નિયમન", "ch": ""}, {"q": "એક સંશોધક યુકેરિયોટિક કોષમાં ટ્રાન્સક્રિપ્શનનો અભ્યાસ કરી રહ્યો છે. તેણે નોંધ્યું કે એક વિશિષ્ટ જનીનના ટ્રાન્સક્રિપ્શન દરમિયાન, પ્રાથમિક ટ્રાન્સક્રિપ્ટ (primary transcript) ની લંબાઈ 1200 ન્યુક્લિઓટાઇડ્સ છે, પરંતુ પરિપક્વ mRNA માત્ર 800 ન્યુક્લિઓટાઇડ્સ ધરાવે છે. આ ઘટના માટે નીચેનામાંથી કયું સૌથી યોગ્ય સમજૂતી છે? વધુમાં, આ પ્રક્રિયા કયા કોષીય અંગકમાં થાય છે?", "opts": ["સ્પ્લાઇસિંગ દ્વારા ઇન્ટ્રોન દૂર થવાથી અને આ પ્રક્રિયા કોષકેન્દ્રમાં થાય છે", "RNA એડિટિંગ દ્વારા ન્યુક્લિઓટાઇડ્સમાં ફેરફાર થવાથી અને આ પ્રક્રિયા રિબોઝોમમાં થાય છે", "5' કેપિંગ અને 3' પોલિએડિનાઇલેશન દ્વારા RNA ની લંબાઈ ઘટવાથી અને આ પ્રક્રિયા કોષરસમાં થાય છે", "ટ્રાન્સક્રિપ્શન દરમિયાન RNA પોલિમરેઝની ભૂલને કારણે ન્યુક્લિઓટાઇડ્સ છૂટી જવાથી અને આ પ્રક્રિયા કોષકેન્દ્રમાં થાય છે"], "ans": 0, "exp": "સાચો જવાબ વિકલ્પ A છે. યુકેરિયોટિક કોષોમાં, પ્રાથમિક ટ્રાન્સક્રિપ્ટ (pre-mRNA) માં ઇન્ટ્રોન (બિન-કોડિંગ પ્રદેશો) હોય છે, જે સ્પ્લાઇસિંગ પ્રક્રિયા દ્વારા દૂર કરવામાં આવે છે. આથી પરિપક્વ mRNA ની લંબાઈ પ્રાથમિક ટ્રાન્સક્રિપ્ટ કરતાં ઓછી હોય છે. આ પ્રક્રિયા કોષકેન્દ્રમાં થાય છે, કારણ કે સ્પ્લાઇસોઝોમ્સ કોષકેન્દ્રમાં જ કાર્ય કરે છે.\n\nવિકલ્પ B ખોટો છે કારણ કે RNA એડિટિંગ દ્વારા ન્યુક્લિઓટાઇડ્સમાં ફેરફાર થાય છે, પરંતુ તે સામાન્ય રીતે RNA ની લંબાઈમાં મોટો ઘટાડો કરતું નથી. વધુમાં, આ પ્રક્રિયા રિબોઝોમમાં થતી નથી.\n\nવિકલ્પ C ખોટો છે કારણ કે 5' કેપિંગ અને 3' પોલિએડિનાઇલેશન RNA ની લંબાઈ ઘટાડતા નથી, પરંતુ તે RNA ને સ્થિરતા અને રક્ષણ આપે છે. આ પ્રક્રિયા કોષરસમાં થતી નથી.\n\nવિકલ્પ D ખોટો છે કારણ કે ટ્રાન્સક્રિપ્શન દરમિયાન RNA પોલિમરેઝની ભૂલને કારણે ન્યુક્લિઓટાઇડ્સ છૂટી જવાની ઘટના ખૂબ જ દુર્લભ છે અને તે RNA ની લંબાઈમાં નોંધપાત્ર ઘટાડો કરતી નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ભિન્નતાના આણ્વિક આધાર", "ch": ""}, {"q": "યુકેરિયોટિક કોષમાં, ટ્રાન્સક્રિપ્શન દરમિયાન RNA પોલિમરેઝ I દ્વારા સિંથેસ થતાં RNA નો પ્રકાર કયો છે?", "opts": ["mRNA", "tRNA", "28S rRNA, 18S rRNA અને 5.8S rRNA", "snRNA"], "ans": 2, "exp": "RNA પોલિમરેઝ I યુકેરિયોટિક કોષમાં rDNA જનીનના ટ્રાન્સક્રિપ્શન દ્વારા 28S rRNA, 18S rRNA અને 5.8S rRNA ની સિંથેસ કરે છે. mRNA ની સિંથેસ RNA પોલિમરેઝ II દ્વારા થાય છે, tRNA ની સિંથેસ RNA પોલિમરેઝ III દ્વારા થાય છે, અને snRNA ની સિંથેસ પણ RNA પોલિમરેઝ II અથવા III દ્વારા થાય છે.", "ref": "Std 12 - અધ્યાય 6: જૈવ-અણુ (Molecular Basis of Inheritance)", "ch": ""}, {"q": "ટ્રાન્સક્રિપ્શન દરમિયાન, પ્રોકેરિયોટ્સમાં, કયા ઉત્સેચક દ્વારા ટ્રાન્સક્રિપ્શનની શરૂઆત થાય છે અને તેના માટે કયા પ્રકારના પ્રમોટરની જરૂર પડે છે?", "opts": ["RNA પોલિમરેઝ + સિગ્મા ફેક્ટર, -10 અને -35 પ્રદેશ", "RNA પોલિમરેઝ I, TATA બોક્સ", "DNA પોલિમરેઝ, ઓરિજિન ઓફ રેપ્લિકેશન", "હેલિકેઝ, ઉર્જા માટે ATP"], "ans": 0, "exp": "પ્રોકેરિયોટ્સમાં, RNA પોલિમરેઝ અને સિગ્મા ફેક્ટર મળીને હોલોએન્ઝાઇમ બનાવે છે, જે -10 (પ્રિબનૉવ બોક્સ) અને -35 પ્રદેશને ઓળખીને ટ્રાન્સક્રિપ્શનની શરૂઆત કરે છે. RNA પોલિમરેઝ I યુકેરિયોટિક કોષમાં rRNA ની સિંથેસ કરે છે, DNA પોલિમરેઝ રેપ્લિકેશનમાં ભાગ લે છે, અને હેલિકેઝ DNA ને અનવાઇન્ડ કરે છે.", "ref": "Std 12 - અધ્યાય 6: જૈવ-અણુ (Molecular Basis of Inheritance)", "ch": ""}, {"q": "ટ્રાન્સક્રિપ્શન દરમિયાન, કયા RNA નો ઉત્પાદન થતો નથી અને તેના કારણે કોષમાં કયા કામ માટે તે જરૂરી નથી?", "opts": ["mRNA, પ્રોટીન સિંથેસ માટે", "rRNA, રાઇબોઝોમની રચના માટે", "tRNA, એમિનો એસિડ વહન માટે", "siRNA, જનીન નિયંત્રણ માટે"], "ans": 3, "exp": "siRNA (small interfering RNA) ટ્રાન્સક્રિપ્શન દ્વારા સિંથેસ થતું નથી, પરંતુ તે RNA ઇન્ટરફેરન્સ પધ્ધતિ દ્વારા ઉત્પન્ન થાય છે અને જનીન નિયંત્રણમાં ભાગ લે છે. mRNA, rRNA, અને tRNA એ ટ્રાન્સક્રિપ્શન દ્વારા સિંથેસ થતાં RNA ના પ્રકારો છે અને તેઓ ક્રમશઃ પ્રોટીન સિંથેસ, રાઇબોઝોમની રચના, અને એમિનો એસિડ વહન માટે જરૂરી છે.", "ref": "Std 12 - અધ્યાય 6: જૈવ-અણુ (Molecular Basis of Inheritance)", "ch": ""}, {"q": "યુકેરિયોટિક કોષમાં ટ્રાન્સક્રિપ્શન દરમિયાન, નીચેનામાંથી કયું વિધાન ખોટું છે? (અપવાદ આધારિત પ્રશ્ન)", "opts": ["RNA પોલિમરેઝ II દ્વારા સિંથેસ થતું પ્રાથમિક ટ્રાન્સક્રિપ્ટ (pre-mRNA) ઇન્ટ્રોન ધરાવે છે.", "ટ્રાન્સક્રિપ્શન ફેક્ટર TFIID એ TATA બોક્સ સાથે જોડાય છે અને RNA પોલિમરેઝ II ને પ્રમોટર પ્રદેશ પર લાવે છે.", "RNA પોલિમરેઝ III દ્વારા સિંથેસ થતું tRNA પ્રાથમિક ટ્રાન્સક્રિપ્ટ સ્પ્લાઇસિંગ વગર સીધું કાર્યરત થાય છે.", "RNA પોલિમરેઝ I દ્વારા સિંથેસ થતું rRNA પ્રાથમિક ટ્રાન્સક્રિપ્ટ પ્રોસેસિંગ બાદ 18S, 5.8S અને 28S rRNA માં વિભાજિત થાય છે."], "ans": 2, "exp": "સાચો જવાબ C છે કારણ કે RNA પોલિમરેઝ III દ્વારા સિંથેસ થતું tRNA પ્રાથમિક ટ્રાન્સક્રિપ્ટ પણ પ્રોસેસિંગમાંથી પસાર થાય છે, જેમાં 5' અને 3' છેડાનું ક્લિવેજ તેમજ ઇન્ટ્રોન દૂર કરવાની પ્રક્રિયા (જો હાજર હોય તો) સામેલ છે. આથી તે સીધું કાર્યરત થતું નથી. વિકલ્પ A, B અને D યોગ્ય છે કારણ કે: A) pre-mRNA ઇન્ટ્રોન ધરાવે છે જે સ્પ્લાઇસિંગ દ્વારા દૂર થાય છે. B) TFIID એ TATA બોક્સ સાથે જોડાઈને RNA પોલિમરેઝ II ને પ્રમોટર પર લાવે છે. D) RNA પોલિમરેઝ I દ્વારા સિંથેસ થતું rRNA પ્રોસેસિંગ બાદ વિભાજિત થાય છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ (જનીન અભિવ્યક્તિ)", "ch": ""}, {"q": "એક સંશોધકે યુકેરિયોટિક કોષમાં ટ્રાન્સક્રિપ્શનનો અભ્યાસ કરતાં જણાયું કે, એક જનીનના પ્રમોટર પ્રદેશમાં મ્યુટેશન થવાથી RNA પોલિમરેઝ II નું બાઇન્ડિંગ અવરોધાય છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું પરિણામ સંભવિત નથી? (મલ્ટી-કન્સેપ્ટ પ્રશ્ન)", "opts": ["આ જનીન દ્વારા કોડ થતું mRNA ઉત્પન્ન થશે નહીં, જેના કારણે તેના પ્રોટીનનું સંશ્લેષણ અટકી જશે.", "આ જનીનના ટ્રાન્સક્રિપ્શન માટે જવાબદાર ટ્રાન્સક્રિપ્શન ફેક્ટર TFIID નું TATA બોક્સ સાથેનું બાઇન્ડિંગ અસરગ્રસ્ત થશે.", "RNA પોલિમરેઝ I દ્વારા આ જનીનનું ટ્રાન્સક્રિપ્શન ચાલુ રહેશે કારણ કે તે પ્રમોટર પ્રદેશથી સ્વતંત્ર છે.", "આ જનીનના ઇન્ટ્રોન-એક્ઝોન સ્પ્લાઇસિંગમાં ખલેલ પડશે કારણ કે પ્રાથમિક ટ્રાન્સક્રિપ્ટનું નિર્માણ જ નહીં થાય."], "ans": 2, "exp": "સાચો જવાબ C છે કારણ કે RNA પોલિમરેઝ I અને RNA પોલિમરેઝ II એ અલગ-અલગ પ્રકારના જનીનોનું ટ્રાન્સક્રિપ્શન કરે છે. RNA પોલિમરેઝ I માત્ર rRNA જનીનોનું ટ્રાન્સક્રિપ્શન કરે છે, જ્યારે RNA પોલિમરેઝ II mRNA જનીનોનું ટ્રાન્સક્રિપ્શન કરે છે. આથી RNA પોલિમરેઝ I આ જનીનનું ટ્રાન્સક્રિપ્શન કરી શકશે નહીં. વિકલ્પ A, B અને D યોગ્ય છે કારણ કે: A) mRNA ઉત્પન્ન નહીં થાય અને પ્રોટીન સંશ્લેષણ અટકી જશે. B) TFIID નું TATA બોક્સ સાથે બાઇન્ડિંગ અસરગ્રસ્ત થશે. D) પ્રાથમિક ટ્રાન્સક્રિપ્ટ નિર્માણ નહીં થાય તો સ્પ્લાઇસિંગ પણ નહીં થાય.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ (જનીન અભિવ્યક્તિ અને નિયંત્રણ)", "ch": ""}, {"q": "ટ્રાન્સક્રિપ્શન દરમિયાન, યુકેરિયોટિક કોષમાં નીચેનામાંથી કયું RNA પ્રોસેસિંગનું પગલું પ્રોકેરિયોટ્સમાં જોવા મળતું નથી?", "opts": ["5' કેપિંગ", "પોલિએડિનાઇલેશન", "સ્પ્લાઇસિંગ", "ઉપરોક્ત તમામ"], "ans": 3, "exp": "યુકેરિયોટ્સમાં 5' કેપિંગ, પોલિએડિનાઇલેશન અને સ્પ્લાઇસિંગ એ પ્રી-mRNA પ્રોસેસિંગના મુખ્ય પગલાં છે, જે પ્રોકેરિયોટ્સમાં જોવા મળતા નથી કારણ કે પ્રોકેરિયોટ્સમાં mRNA પ્રોસેસિંગની જરૂર હોતી નથી અને ટ્રાન્સક્રિપ્શન અને ટ્રાન્સલેશન એકસાથે થાય છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક પ્રયોગમાં, સંશોધકે યુકેરિયોટિક કોષમાં RNA પોલિમરેઝ II ને અવરોધિત કરતું ઝેર ઉમેર્યું. આ પરિસ્થિતિમાં નીચેનામાંથી કયું પરિણામ સંભવિત નથી?", "opts": ["mRNA ની સિંથેસિસ બંધ થશે.", "tRNA ની સિંથેસિસ અસરગ્રસ્ત થશે.", "rRNA ની સિંથેસિસ અસરગ્રસ્ત થશે નહીં.", "પ્રોટીન સંશ્લેષણ બંધ થશે."], "ans": 1, "exp": "RNA પોલિમરેઝ II ને અવરોધિત કરવાથી mRNA ની સિંથેસિસ બંધ થશે, જે પ્રોટીન સંશ્લેષણને અસર કરશે. tRNA ની સિંથેસિસ RNA પોલિમરેઝ III દ્વારા થાય છે, તેથી તે અસરગ્રસ્ત થશે નહીં. rRNA ની સિંથેસિસ RNA પોલિમરેઝ I દ્વારા થાય છે, તેથી તે પણ અસરગ્રસ્ત થશે નહીં. આમ, tRNA ની સિંથેસિસ અસરગ્રસ્ત થશે એ વિધાન ખોટું છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "ટ્રાન્સક્રિપ્શન દરમિયાન, નીચેનામાંથી કયું વિધાન યુકેરિયોટ્સ અને પ્રોકેરિયોટ્સ બંનેમાં સાચું નથી?", "opts": ["RNA પોલિમરેઝ એ DNA ના ટેમ્પલેટ સ્ટ્રેન્ડને 3' થી 5' દિશામાં વાંચે છે.", "RNA ની સિંથેસિસ 5' થી 3' દિશામાં થાય છે.", "ટ્રાન્સક્રિપ્શનની શરૂઆત માટે પ્રમોટર પ્રદેશ જરૂરી છે.", "ટ્રાન્સક્રિપ્શન દરમિયાન, RNA પોલિમરેઝ એ DNA ના બંને સ્ટ્રેન્ડને ટેમ્પલેટ તરીકે ઉપયોગ કરે છે."], "ans": 3, "exp": "ટ્રાન્સક્રિપ્શન દરમિયાન, RNA પોલિમરેઝ માત્ર DNA ના એક સ્ટ્રેન્ડને (ટેમ્પલેટ સ્ટ્રેન્ડ) 3' થી 5' દિશામાં વાંચે છે અને RNA ની સિંથેસિસ 5' થી 3' દિશામાં થાય છે. પ્રમોટર પ્રદેશ બંનેમાં જરૂરી છે. પરંતુ RNA પોલિમરેઝ ક્યારેય બંને સ્ટ્રેન્ડને ટેમ્પલેટ તરીકે ઉપયોગ કરતું નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "યુકેરિયોટિક કોષમાં ટ્રાન્સક્રિપ્શનની પ્રક્રિયા દરમિયાન, નીચેનામાંથી કયું વિધાન ખોટું છે? (અપવાદ આધારિત પ્રશ્ન)", "opts": ["RNA પોલિમરેઝ II દ્વારા સિંથેસ થતું પ્રાથમિક ટ્રાન્સક્રિપ્ટ (pre-mRNA) ઇન્ટ્રોન ધરાવે છે.", "ટ્રાન્સક્રિપ્શનની પ્રક્રિયા કોષકેન્દ્રમાં થાય છે, પરંતુ પ્રોકેરિયોટ્સમાં તે સાયટોપ્લાઝમમાં થાય છે.", "RNA પોલિમરેઝ III દ્વારા સિંથેસ થતું tRNA પ્રાથમિક ટ્રાન્સક્રિપ્ટ ઇન્ટ્રોન ધરાવતું નથી.", "યુકેરિયોટ્સમાં ટ્રાન્સક્રિપ્શન પૂર્ણ થયા બાદ mRNA નું 5' કેપિંગ અને 3' પોલી-એ ટેઇલિંગ થાય છે."], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. RNA પોલિમરેઝ III દ્વારા સિંથેસ થતું tRNA પ્રાથમિક ટ્રાન્સક્રિપ્ટ પણ ઇન્ટ્રોન ધરાવે છે, જે પછીથી સ્પ્લાઇસિંગ દ્વારા દૂર કરવામાં આવે છે. આથી આ વિધાન ખોટું છે. વિકલ્પ A: RNA પોલિમરેઝ II દ્વારા સિંથેસ થતું pre-mRNA ઇન્ટ્રોન ધરાવે છે, જે સાચું છે. વિકલ્પ B: યુકેરિયોટ્સમાં ટ્રાન્સક્રિપ્શન કોષકેન્દ્રમાં થાય છે અને પ્રોકેરિયોટ્સમાં સાયટોપ્લાઝમમાં થાય છે, જે સાચું છે. વિકલ્પ D: યુકેરિયોટ્સમાં mRNA નું 5' કેપિંગ અને 3' પોલી-એ ટેઇલિંગ થાય છે, જે પણ સાચું છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}];

  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
