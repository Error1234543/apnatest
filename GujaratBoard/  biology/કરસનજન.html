<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>કાર્સિનોજન</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>કાર્સિનોજન</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">કાર્સિનોજન</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "નીચેના પૈકી કયું સંયોજન કાર્સિનોજનિક ગણાય છે પરંતુ તેનો ઉપયોગ ખાદ્યપદાર્થોમાં પ્રિઝર્વેટિવ તરીકે થાય છે?", "opts": ["બેન્ઝોપાયરીન", "સોડિયમ નાઇટ્રાઇટ", "એસ્બેસ્ટોસ", "વિનાઇલ ક્લોરાઇડ"], "ans": 1, "exp": "સોડિયમ નાઇટ્રાઇટ ખાદ્યપદાર્થોમાં પ્રિઝર્વેટિવ તરીકે વપરાય છે, પરંતુ તે નાઇટ્રોસેમિનમાં રૂપાંતરિત થઈને કાર્સિનોજનિક અસર દર્શાવી શકે છે. બેન્ઝોપાયરીન અને વિનાઇલ ક્લોરાઇડ ઔદ્યોગિક કાર્સિનોજન છે, જ્યારે એસ્બેસ્ટોસ શ્વસનતંત્ર માટે હાનિકારક છે પરંતુ ખાદ્યપદાર્થોમાં વપરાતું નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "કાર્સિનોજનની અસરથી કોષમાં થતા પરિવર્તનને લગતું નીચેનું વિધાન વાંચો: 'કાર્સિનોજન DNA ના બેઝ જોડાણમાં ફેરફાર કરીને મ્યુટેશન પ્રેરે છે.' આ વિધાન માટે નીચેનામાંથી કયું ઉદાહરણ યોગ્ય નથી?", "opts": ["યુવી કિરણો થાઇમિન ડાઇમર બનાવે છે", "બેન્ઝિન DNA ના ગ્વાનિન સાથે સહસંયોજક બંધ બનાવે છે", "આલ્કોહોલ સીધું DNA ના બેઝ જોડાણમાં ફેરફાર કરે છે", "આફ્લાટોક્સિન ગ્વાનિન સાથે જોડાઈને DNA ને નુકસાન પહોંચાડે છે"], "ans": 2, "exp": "આલ્કોહોલ સીધું DNA ના બેઝ જોડાણમાં ફેરફાર કરતું નથી, પરંતુ તેના મેટાબોલાઇટ એસિટાલ્ડિહાઇડ દ્વારા DNA ને નુકસાન પહોંચાડે છે. બાકીના વિકલ્પોમાં દર્શાવેલ કાર્સિનોજન સીધા DNA સાથે પ્રક્રિયા કરીને મ્યુટેશન પ્રેરે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેના પૈકી કયું કાર્સિનોજન માનવ શરીરમાં પ્રવેશ્યા પછી સક્રિય બને છે અને તેનું કાર્સિનોજનિક સ્વરૂપ પ્રાપ્ત કરે છે?", "opts": ["આર્સેનિક", "પોલિસાયક્લિક એરોમેટિક હાઇડ્રોકાર્બન (PAH)", "નિકલ", "ક્રોમિયમ"], "ans": 1, "exp": "પોલિસાયક્લિક એરોમેટિક હાઇડ્રોકાર્બન (PAH) શરીરમાં પ્રવેશ્યા પછી યકૃતના ઉત્સેચકો દ્વારા મેટાબોલાઇઝ થઈને સક્રિય કાર્સિનોજનિક સ્વરૂપમાં રૂપાંતરિત થાય છે. બાકીના વિકલ્પોમાં દર્શાવેલ તત્ત્વો સીધા કાર્સિનોજનિક અસર દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "કાર્સિનોજનની અસરથી કોષમાં થતા ફેરફારોને લગતા નીચેના જોડકાંને યોગ્ય રીતે જોડો:\n(1) ફિઝિકલ કાર્સિનોજન\n(2) કેમિકલ કાર્સિનોજન\n(3) બાયોલોજિકલ કાર્સિનોજન\n\n(a) હ્યુમન પેપિલોમા વાઇરસ (HPV)\n(b) આયોનાઇઝિંગ રેડિયેશન\n(c) નાઇટ્રોસેમિન", "opts": ["1-b, 2-c, 3-a", "1-a, 2-b, 3-c", "1-c, 2-a, 3-b", "1-b, 2-a, 3-c"], "ans": 0, "exp": "ફિઝિકલ કાર્સિનોજનમાં આયોનાઇઝિંગ રેડિયેશન (b), કેમિકલ કાર્સિનોજનમાં નાઇટ્રોસેમિન (c), અને બાયોલોજિકલ કાર્સિનોજનમાં હ્યુમન પેપિલોમા વાઇરસ (HPV) (a) નો સમાવેશ થાય છે. આ જોડાણ યોગ્ય રીતે દર્શાવે છે કે કયું કાર્સિનોજન કયા પ્રકારનું છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેના પૈકી કયું કાર્સિનોજન માનવ શરીરમાં પ્રોટો-ઓન્કોજીનને ઓન્કોજીનમાં રૂપાંતરિત કરવામાં મુખ્ય ભૂમિકા ભજવે છે, પરંતુ તે પોતે સીધું DNA ને નુકસાન પહોંચાડતું નથી?", "opts": ["બેન્ઝોપાયરીન", "એસ્બેસ્ટોસ", "ક્રોનિક ઇન્ફ્લેમેશન પ્રેરતા એજન્ટ્સ", "આફ્લાટોક્સિન B1"], "ans": 2, "exp": "ક્રોનિક ઇન્ફ્લેમેશન પ્રેરતા એજન્ટ્સ સીધું DNA ને નુકસાન પહોંચાડતા નથી, પરંતુ તેઓ સતત સોજો અને કોષીય પ્રસાર પ્રેરે છે, જે પ્રોટો-ઓન્કોજીનને ઓન્કોજીનમાં રૂપાંતરિત કરવામાં મદદરૂપ થાય છે. બાકીના વિકલ્પોમાં દર્શાવેલ કાર્સિનોજન સીધા DNA ને નુકસાન પહોંચાડે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેના પૈકી કયું કાર્સિનોજન માનવ શરીરમાં પ્રવેશ્યા બાદ પ્રત્યક્ષ રીતે DNA સાથે જોડાઈને મ્યુટાજેનેસિસ પ્રેરતું નથી, પરંતુ કોષીય સંકેતન માર્ગોને અસર કરીને અસામાન્ય કોષવિભાજનને પ્રેરે છે?", "opts": ["બેન્ઝીન (Benzene)", "એસ્બેસ્ટોસ (Asbestos)", "આફ્લાટોક્સિન B1 (Aflatoxin B1)", "આર્સેનિક (Arsenic)"], "ans": 3, "exp": "આર્સેનિક પ્રત્યક્ષ રીતે DNA સાથે જોડાઈને મ્યુટેશન પ્રેરતું નથી, પરંતુ તે કોષીય સંકેતન માર્ગો (જેમ કે MAP kinase માર્ગ)ને અસર કરીને અસામાન્ય કોષવિભાજનને પ્રેરે છે. બેન્ઝીન અને આફ્લાટોક્સિન B1 પ્રત્યક્ષ રીતે DNA સાથે જોડાઈને મ્યુટેશન પ્રેરે છે, જ્યારે એસ્બેસ્ટોસ ભૌતિક રીતે કોષને નુકસાન પહોંચાડે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "કાર્સિનોજનની અસરથી કોષમાં થતા ફેરફારો અંગેનું નીચેનું વિધાન વાંચો: 'કાર્સિનોજનના સંપર્કમાં આવ્યા બાદ કોષમાં p53 જનીનનું કાર્ય નિષ્ક્રિય થાય છે.' આ વિધાન સાથે સંકળાયેલું નીચેનું કારણ કયું સાચું છે?", "opts": ["p53 જનીન એપોપ્ટોસિસને પ્રેરે છે, જે કાર્સિનોજનની અસરથી નિષ્ક્રિય થવાથી કોષ મૃત્યુ પામતો નથી.", "p53 જનીન DNA સમારકામમાં મદદ કરે છે, જે નિષ્ક્રિય થવાથી DNA નુકસાન સુધારાતું નથી.", "p53 જનીન કોષચક્રને અટકાવે છે, જે નિષ્ક્રિય થવાથી અસામાન્ય કોષવિભાજન થાય છે.", "ઉપરોક્ત તમામ કારણો સાચાં છે."], "ans": 3, "exp": "p53 જનીન કોષચક્રને અટકાવવા, DNA સમારકામ અને એપોપ્ટોસિસમાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે. કાર્સિનોજનની અસરથી p53 નિષ્ક્રિય થવાથી આ તમામ કાર્યો ખોરવાય છે, જેનાથી કૅન્સરનું જોખમ વધે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેના પૈકી કયું કાર્સિનોજન માનવ શરીરમાં પ્રવેશ્યા બાદ યકૃતમાં ચયાપચય પામીને વધુ ઝેરી મધ્યવર્તી સંયોજનમાં રૂપાંતરિત થાય છે, જે DNA સાથે જોડાઈને મ્યુટેશન પ્રેરે છે?", "opts": ["નિકોટિન (Nicotine)", "પોલિસાયક્લિક એરોમેટિક હાઇડ્રોકાર્બન (PAH)", "વિનાઇલ ક્લોરાઇડ (Vinyl chloride)", "ફોર્માલ્ડિહાઇડ (Formaldehyde)"], "ans": 2, "exp": "વિનાઇલ ક્લોરાઇડ યકૃતમાં ચયાપચય પામીને ઝેરી ઇપોક્સાઇડમાં રૂપાંતરિત થાય છે, જે DNA સાથે જોડાઈને મ્યુટેશન પ્રેરે છે. નિકોટિન પ્રત્યક્ષ કાર્સિનોજન નથી, PAH અને ફોર્માલ્ડિહાઇડ પ્રત્યક્ષ રીતે DNA ને નુકસાન પહોંચાડે છે પરંતુ યકૃતમાં ચયાપચય પામતા નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "કાર્સિનોજનની અસરથી કોષમાં થતા ફેરફારો અંગે નીચેના જોડકાંને યોગ્ય રીતે જોડો:\n(1) બેન્ઝોપાયરીન (Benzo[a]pyrene) → (P) DNA એડક્ટનું નિર્માણ\n(2) આયનાઇઝિંગ રેડિયેશન → (Q) ક્રોમોસોમલ અસ્થિરતા\n(3) હ્યુમન પેપિલોમા વાઇરસ (HPV) → (R) p53 નિષ્ક્રિયતા\n(4) આર્સેનિક → (S) ઓક્સિડેટિવ સ્ટ્રેસ", "opts": ["1-P, 2-Q, 3-R, 4-S", "1-Q, 2-P, 3-S, 4-R", "1-P, 2-S, 3-Q, 4-R", "1-S, 2-Q, 3-R, 4-P"], "ans": 0, "exp": "બેન્ઝોપાયરીન DNA એડક્ટ બનાવે છે (1-P), આયનાઇઝિંગ રેડિયેશન ક્રોમોસોમલ અસ્થિરતા પ્રેરે છે (2-Q), HPV p53 નિષ્ક્રિય કરે છે (3-R), અને આર્સેનિક ઓક્સિડેટિવ સ્ટ્રેસ પ્રેરે છે (4-S). આ જોડકાં યોગ્ય રીતે જોડાયેલાં છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેના પૈકી કયું કાર્સિનોજન માનવ શરીરમાં પ્રવેશ્યા બાદ પ્રતિરક્ષાતંત્રને નબળું પાડીને પરોક્ષ રીતે કૅન્સરનું જોખમ વધારે છે, પરંતુ પ્રત્યક્ષ રીતે DNA ને નુકસાન પહોંચાડતું નથી?", "opts": ["યુરેનિયમ (Uranium)", "એઇડ્સ વાઇરસ (HIV)", "બેન્ઝીન (Benzene)", "નાઇટ્રોસેમાઇન (Nitrosamine)"], "ans": 1, "exp": "એઇડ્સ વાઇરસ (HIV) પ્રતિરક્ષાતંત્રને નબળું પાડે છે, જેનાથી શરીરમાં કૅન્સરકારક કોષોને નાશ કરવાની ક્ષમતા ઘટે છે. યુરેનિયમ, બેન્ઝીન અને નાઇટ્રોસેમાઇન પ્રત્યક્ષ રીતે DNA ને નુકસાન પહોંચાડે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેના પૈકી કયું કાર્સિનોજન મુખ્યત્વે યકૃત કોષોના DNA ને નુકસાન પહોંચાડીને હેપેટોસેલ્યુલર કાર્સિનોમા તરફ દોરી જાય છે, પરંતુ તેનો સંપર્ક થવાને કારણે પ્રથમ તબક્કામાં કોષમાં ઓક્સીડેટીવ તણાવ ઉત્પન્ન થાય છે?", "opts": ["બેન્ઝોપાયરિન", "એફલાટોક્સિન B1", "વિનાઇલ ક્લોરાઇડ", "આર્સેનિક"], "ans": 1, "exp": "એફલાટોક્સિન B1 યકૃતમાં ચયાપચય પામીને એફલાટોક્સિન-8,9-એપોક્સાઇડમાં રૂપાંતરિત થાય છે, જે DNA સાથે જોડાઈને યકૃત કોષોના જનીનમાં પરિવર્તન કરે છે, પરિણામે હેપેટોસેલ્યુલર કાર્સિનોમા થાય છે. પ્રથમ તબક્કામાં તે ઓક્સીડેટીવ તણાવ ઉત્પન્ન કરે છે. બેન્ઝોપાયરિન ફેફસાના કોષોને અસર કરે છે, વિનાઇલ ક્લોરાઇડ યકૃત એન્જાઇમ્સ દ્વારા ચયાપચય પામીને ક્લોરોઇથિલીનમાં રૂપાંતરિત થાય છે પરંતુ તે મુખ્યત્વે યકૃત એન્જાઇમ્સને નુકસાન પહોંચાડે છે, જ્યારે આર્સેનિક રક્તવાહિનીઓ અને ચામડીને અસર કરે છે.", "ref": "Std 12 - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "કાર્સિનોજનના સંપર્કમાં આવ્યા બાદ કોષમાં થતા નીચેના ફેરફારોમાં કયો ફેરફાર સૌથી પહેલા થાય છે?", "opts": ["ઓન્કોજીનની સક્રિયતા", "DNA ની મરામત પ્રણાલીનું નિષ્ક્રિય થવું", "કોષચક્રની નિયંત્રણ પ્રણાલીનું વિઘટન", "એપોપ્ટોસિસની પ્રક્રિયાનું નિષ્ક્રિય થવું"], "ans": 1, "exp": "કાર્સિનોજનના સંપર્કમાં આવ્યા બાદ સૌપ્રથમ DNA ની મરામત પ્રણાલી નિષ્ક્રિય થાય છે, જેના કારણે DNA ને થતું નુકસાન સુધારાઈ શકતું નથી. ઓન્કોજીનની સક્રિયતા, કોષચક્રની નિયંત્રણ પ્રણાલીનું વિઘટન અને એપોપ્ટોસિસની પ્રક્રિયાનું નિષ્ક્રિય થવું આ પછીના તબક્કામાં થાય છે.", "ref": "Std 12 - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેના પૈકી કયું કાર્સિનોજન માનવ શરીરમાં પ્રવેશ્યા બાદ કોષની એપોપ્ટોસિસ પ્રક્રિયાને રોકીને કોષના અસાધારણ વૃદ્ધિને પ્રોત્સાહન આપે છે?", "opts": ["એસ્બેસ્ટોસ", "બેન્ઝીન", "હેક્સાવેલેન્ટ ક્રોમિયમ", "ક્લોરોફોર્મ"], "ans": 1, "exp": "બેન્ઝીન કોષની એપોપ્ટોસિસ પ્રક્રિયાને રોકીને કોષના અસાધારણ વૃદ્ધિને પ્રોત્સાહન આપે છે, જેના કારણે લ્યુકેમિયા જેવા કૅન્સર થાય છે. એસ્બેસ્ટોસ ફેફસાના કોષોને નુકસાન પહોંચાડે છે, હેક્સાવેલેન્ટ ક્રોમિયમ ફેફસાના કૅન્સરને પ્રેરે છે, જ્યારે ક્લોરોફોર્મ યકૃત અને મગજને અસર કરે છે.", "ref": "Std 12 - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લઈને સાચો વિકલ્પ પસંદ કરો:\n(1) કેટલાક કાર્સિનોજન પ્રત્યક્ષ રીતે DNA સાથે પ્રક્રિયા કરીને મ્યુટેશન પ્રેરે છે.\n(2) કેટલાક કાર્સિનોજન શરીરમાં ચયાપચય પામીને વધુ સક્રિય મેટાબોલાઇટ્સમાં રૂપાંતરિત થાય છે, જે DNA ને નુકસાન પહોંચાડે છે.\n(3) બધા જ કાર્સિનોજન માનવ શરીરમાં પ્રવેશ્યા બાદ તરત જ ઓન્કોજીનને સક્રિય કરે છે.\n(4) કેટલાક કાર્સિનોજન કોષની સ્વયં-વિનાશ (એપોપ્ટોસિસ) પ્રક્રિયાને અવરોધે છે, જેનાથી અસામાન્ય કોષોનું નિર્માણ થાય છે.", "opts": ["વિધાન (1), (2) અને (4) સાચાં છે, પરંતુ (3) ખોટું છે", "વિધાન (1) અને (3) સાચાં છે, પરંતુ (2) અને (4) ખોટાં છે", "વિધાન (2) અને (3) સાચાં છે, પરંતુ (1) અને (4) ખોટાં છે", "વિધાન (1), (2), (3) અને (4) બધાં જ સાચાં છે"], "ans": 0, "exp": "વિધાન (1) સાચું છે કારણ કે કેટલાક કાર્સિનોજન (જેમ કે આલ્કાઇલેટિંગ એજન્ટ્સ) પ્રત્યક્ષ રીતે DNA સાથે પ્રક્રિયા કરીને મ્યુટેશન પ્રેરે છે. વિધાન (2) પણ સાચું છે કારણ કે કેટલાક કાર્સિનોજન (જેમ કે બેન્ઝોપાયરીન) યકૃતમાં ચયાપચય પામીને વધુ સક્રિય મેટાબોલાઇટ્સમાં રૂપાંતરિત થાય છે, જે DNA ને નુકસાન પહોંચાડે છે. વિધાન (3) ખોટું છે કારણ કે બધા કાર્સિનોજન તરત જ ઓન્કોજીનને સક્રિય કરતા નથી; કેટલાક પરોક્ષ રીતે અસર કરે છે. વિધાન (4) સાચું છે કારણ કે કેટલાક કાર્સિનોજન એપોપ્ટોસિસ પ્રક્રિયાને અવરોધે છે, જેનાથી અસામાન્ય કોષોનું નિર્માણ થાય છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેના પૈકી કયું સંયોજન કાર્સિનોજન તરીકે ઓળખાય છે પરંતુ તેનો ઉપયોગ કેટલાક ઔષધીય ઉત્પાદનોમાં થાય છે અને તેનું મુખ્ય કાર્ય કોષમાં ઓક્સિડેટીવ તણાવ ઘટાડવાનું છે?", "opts": ["એસ્પિરિન (Aspirin)", "પેરાસીટામોલ (Paracetamol)", "એસ્કોર્બિક એસિડ (Ascorbic Acid)", "આર્સેનિક ટ્રાયોક્સાઇડ (Arsenic Trioxide)"], "ans": 3, "exp": "સાચો જવાબ: D) આર્સેનિક ટ્રાયોક્સાઇડ. આર્સેનિક ટ્રાયોક્સાઇડ એક જાણીતું કાર્સિનોજન છે, પરંતુ તેનો ઉપયોગ કેટલાક લ્યુકેમિયા (રક્તકણોના કેન્સર) ના ઈલાજમાં થાય છે. તે કોષમાં ઓક્સિડેટીવ તણાવ વધારીને કેન્સર કોષોનો નાશ કરે છે. A) એસ્પિરિન અને B) પેરાસીટામોલ કાર્સિનોજન નથી, તેમનું કાર્ય દુખાવો અને તાવ ઘટાડવાનું છે. C) એસ્કોર્બિક એસિડ (વિટામિન C) એક એન્ટીઓક્સિડન્ટ છે જે ઓક્સિડેટીવ તણાવ ઘટાડે છે અને તે કાર્સિનોજન નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેના પૈકી કયું કાર્સિનોજન માનવ શરીરમાં પ્રવેશ્યા બાદ DNA ની દુરુસ્તી તંત્રને અવરોધીને મ્યુટેશનને પ્રોત્સાહન આપે છે, પરંતુ તે સીધું જ DNA ને નુકસાન પહોંચાડતું નથી?", "opts": ["બેન્ઝોપાયરિન", "એફલેટોક્સિન B1", "નાઇટ્રોસોમીન", "આર્સેનિક"], "ans": 3, "exp": "આર્સેનિક (D) DNA ની દુરુસ્તી તંત્રને અવરોધીને મ્યુટેશનને પ્રોત્સાહન આપે છે, પરંતુ તે સીધું જ DNA ને નુકસાન પહોંચાડતું નથી. બેન્ઝોપાયરિન (A) અને એફલેટોક્સિન B1 (B) સીધું જ DNA સાથે પ્રતિક્રિયા કરીને નુકસાન પહોંચાડે છે. નાઇટ્રોસોમીન (C) પણ DNA ને સીધું જ નુકસાન પહોંચાડે છે.", "ref": "Std 12 - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેના પૈકી કયું કાર્સિનોજન માનવ શરીરમાં પ્રવેશ્યા બાદ કોષકેન્દ્રમાં રહેલા હિસ્ટોન પ્રોટીન સાથે પ્રક્રિયા કરીને વર્ણસૂત્રીય બંધારણમાં ફેરફાર લાવે છે, જેના પરિણામે જનીન અભિવ્યક્તિ નિયંત્રણમાં ખલેલ પડે છે?", "opts": ["બેન્ઝીન", "એસ્બેસ્ટોસ", "નિકલ કાર્બોનિલ", "આર્સેનિક"], "ans": 2, "exp": "નિકલ કાર્બોનિલ કાર્સિનોજન તરીકે ઓળખાય છે જે કોષકેન્દ્રમાં હિસ્ટોન પ્રોટીન સાથે પ્રક્રિયા કરીને વર્ણસૂત્રીય બંધારણમાં ફેરફાર લાવે છે. આ ફેરફારથી જનીન અભિવ્યક્તિ નિયંત્રણમાં ખલેલ પડે છે અને કોષનું અનિયંત્રિત વિભાજન થાય છે. બેન્ઝીન મુખ્યત્વે DNA સાથે સીધી પ્રક્રિયા કરે છે, એસ્બેસ્ટોસ શારીરિક નુકસાન પહોંચાડે છે અને આર્સેનિક મુખ્યત્વે ઓક્સિડેટિવ તણાવ ઉત્પન્ન કરે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "કાર્સિનોજનની અસરથી કોષમાં થતા ફેરફારો અંગે નીચેના વિધાનો ધ્યાનમાં લઈને સાચો વિકલ્પ પસંદ કરો:\n(1) કાર્સિનોજનના સંપર્કમાં આવ્યા બાદ કોષમાં p53 જનીનની અભિવ્યક્તિ ઘટે છે.\n(2) કાર્સિનો રે બેન્ઝોપાયરીન (A), એફલાટોક્સિન B1 (C), અને વિનાઇલ ક્લોરાઇડ (D) મુખ્યત્વે કોષકેન્દ્રીય DNA ને નુકસાન પહોંચાડે છે. આર્સેનિકની અસર મિટોકોન્ડ્રિયા પર વધુ પ્રબળ હોય છે, જ્યારે અન્ય વિકલ્પો કોષકેન્દ્રીય DNA ને નુકસાન પહોંચાડીને કાર્સિનોજેનિક અસર દર્શાવે છે.", "ref": "Std 12 - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
