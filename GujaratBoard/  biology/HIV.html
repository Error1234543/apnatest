<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIV</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>HIV</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">HIV</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "HIV વાઇરસના જીવનચક્રમાં, રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચકનું મુખ્ય કાર્ય શું છે?", "opts": ["વાઇરલ RNA ને DNA માં રૂપાંતરિત કરવું", "વાઇરલ DNA ને RNA માં રૂપાંતરિત કરવું", "મેજબાન કોષના DNA ને તોડી નાખવું", "વાઇરલ પ્રોટીનનું સંશ્લેષણ કરવું"], "ans": 0, "exp": "રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચક HIV ના RNA જીનોમને ડબલ-સ્ટ્રેન્ડેડ DNA માં રૂપાંતરિત કરે છે, જે પછી મેજબાન કોષના DNA માં એકીકૃત થાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) રિવર્સ ટ્રાન્સક્રિપ્ટેઝ RNA ને DNA માં રૂપાંતરિત કરે છે, DNA ને RNA માં નહીં. C) રિવર્સ ટ્રાન્સક્રિપ્ટેઝ મેજબાન DNA ને તોડતું નથી. D) પ્રોટીન સંશ્લેષણ રાઇબોઝોમ દ્વારા થાય છે, રિવર્સ ટ્રાન્સક્રિપ્ટેઝ દ્વારા નહીં.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV સંક્રમણ દરમિયાન, CD4+ T કોષોની સંખ્યામાં ઘટાડો થવાનું મુખ્ય કારણ શું છે?", "opts": ["HIV વાઇરસ CD4+ T કોષોને સીધા જ મારી નાખે છે", "HIV વાઇરસ CD4+ T કોષોને સંક્રમિત કરે છે અને તેમની પ્રતિરક્ષા ક્ષમતાને નબળી પાડે છે", "HIV વાઇરસ CD4+ T કોષોને બદલે B કોષોને સંક્રમિત કરે છે", "HIV વાઇરસ CD4+ T કોષોને કોઈ અસર કરતું નથી"], "ans": 1, "exp": "HIV વાઇરસ CD4+ T કોષોને સંક્રમિત કરે છે અને તેમની પ્રતિરક્ષા ક્ષમતાને નબળી પાડે છે, જેના કારણે તેમની સંખ્યામાં ઘટાડો થાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: A) HIV સીધા જ CD4+ T કોષોને મારી નાખતું નથી, પરંતુ તેમની કામગીરીને અસર કરે છે. C) HIV મુખ્યત્વે CD4+ T કોષોને સંક્રમિત કરે છે, B કોષોને નહીં. D) HIV CD4+ T કોષોને અસર કરે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV સંક્રમણના કયા તબક્કે વાઇરલ લોડ સૌથી વધારે હોય છે?", "opts": ["પ્રાથમિક સંક્રમણ તબક્કો", "ક્લિનિકલ લેટન્ટ તબક્કો", "એડ્સ તબક્કો", "સંક્રમણ પછીના પહેલા 2-4 અઠવાડિયા"], "ans": 3, "exp": "HIV સંક્રમણ પછીના પહેલા 2-4 અઠવાડિયામાં વાઇરલ લોડ સૌથી વધારે હોય છે, કારણ કે વાઇરસ ઝડપથી પોતાને ગુણાકાર કરે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: A) પ્રાથમિક સંક્રમણ તબક્કામાં વાઇરલ લોડ વધે છે, પરંતુ પહેલા 2-4 અઠવાડિયા સૌથી વધારે હોય છે. B) ક્લિનિકલ લેટન્ટ તબક્કામાં વાઇરલ લોડ ઓછો હોય છે. C) એડ્સ તબક્કામાં વાઇરલ લોડ વધે છે, પરંતુ પહેલા તબક્કા જેટલો નહીં.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV વાઇરસના કયા જીન મેજબાન કોષના પ્રતિરક્ષા તંત્રને ચાલાકી દ્વારા બચાવે છે?", "opts": ["gag જીન", "pol જીન", "env જીન", "nef જીન"], "ans": 3, "exp": "nef જીન મેજબાન કોષના પ્રતિરક્ષા તંત્રને ચાલાકી દ્વારા બચાવે છે, જેના કારણે વાઇરસની ઓળખ થતી નથી. બાકીના વિકલ્પો ખોટા છે કારણ કે: A) gag જીન વાઇરલ કેપ્સિડ પ્રોટીન માટે કોડ કરે છે. B) pol જીન રિવર્સ ટ્રાન્સક્રિપ્ટેઝ, ઇન્ટિગ્રેઝ અને પ્રોટીએઝ માટે કોડ કરે છે. C) env જીન વાઇરલ એન્વેલપ પ્રોટીન માટે કોડ કરે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV સંક્રમણના નિદાન માટે કયો પરીક્ષણ પદ્ધતિ સૌથી વિશ્વસનીય છે?", "opts": ["ELISA", "વેસ્ટર્ન બ્લોટ", "PCR", "રેપિડ ટેસ્ટ"], "ans": 2, "exp": "PCR (પોલિમરેઝ ચેઇન રિએક્શન) પદ્ધતિ HIV સંક્રમણના નિદાન માટે સૌથી વિશ્વસનીય છે, કારણ કે તે વાઇરલ RNA અથવા DNA ની હાજરી શોધી શકે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: A) ELISA એ એક સ્ક્રીનિંગ ટેસ્ટ છે, પરંતુ તે નક્કર નિદાન માટે પૂરતો નથી. B) વેસ્ટર્ન બ્લોટ એ એક કન્ફર્મેટરી ટેસ્ટ છે, પરંતુ PCR જેટલો સંવેદનશીલ નથી. D) રેપિડ ટેસ્ટ ઝડપી પરિણામ આપે છે, પરંતુ તે નક્કર નિદાન માટે પૂરતો નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV વાઇરસમાં, gp120 અને gp41 પ્રોટીનનું મુખ્ય કાર્ય શું છે અને તે કયા જીન દ્વારા કોડ થાય છે?", "opts": ["વાઇરસને મેજબાન કોષની સપાટી સાથે જોડવામાં મદદ કરે છે અને તે env જીન દ્વારા કોડ થાય છે.", "વાઇરસના કોષકેન્દ્રમાં પ્રવેશવા માટે જરૂરી છે અને તે gag જીન દ્વારા કોડ થાય છે.", "રિવર્સ ટ્રાન્સક્રિપ્ટેઝની ક્રિયામાં મદદ કરે છે અને તે pol જીન દ્વારા કોડ થાય છે.", "વાઇરસના કેપ્સિડ બનાવવામાં મદદ કરે છે અને તે nef જીન દ્વારા કોડ થાય છે."], "ans": 0, "exp": "gp120 અને gp41 પ્રોટીન HIV વાઇરસની સપાટી પર સ્થિત હોય છે અને મેજબાન કોષની સપાટી સાથે જોડાણ કરવામાં મદદ કરે છે. આ પ્રોટીન env જીન દ્વારા કોડ થાય છે. બાકીના વિકલ્પો અયોગ્ય છે કારણ કે: B) gag જીન કેપ્સિડ પ્રોટીન માટે કોડ કરે છે, C) pol જીન રિવર્સ ટ્રાન્સક્રિપ્ટેઝ માટે કોડ કરે છે, અને D) nef જીન વાઇરસની પુનરાવર્તન ક્ષમતામાં મદદ કરે છે.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV સંક્રમણ દરમિયાન, કયા પ્રકારના કોષો પર વાઇરસનો પ્રભાવ સૌથી પહેલા જોવા મળે છે અને તે કયા રિસેપ્ટર દ્વારા જોડાય છે?", "opts": ["B કોષો, CD19 રિસેપ્ટર દ્વારા", "CD4+ T કોષો, CCR5 રિસેપ્ટર દ્વારા", "મેક્રોફેજ, CD8 રિસેપ્ટર દ્વારા", "ન્યૂટ્રોફિલ, CXCR4 રિસેપ્ટર દ્વારા"], "ans": 1, "exp": "HIV વાઇરસ સૌપ્રથમ CD4+ T કોષો પર પ્રભાવ પાડે છે અને તે CCR5 રિસેપ્ટર દ્વારા જોડાય છે. બાકીના વિકલ્પો અયોગ્ય છે કારણ કે: A) B કોષો પર HIVનો પ્રભાવ સૌપ્રથમ જોવા મળતો નથી, C) મેક્રોફેજ પર પ્રભાવ પાડે છે પરંતુ CD8 રિસેપ્ટર દ્વારા નહીં, અને D) ન્યૂટ્રોફિલ પર HIVનો પ્રભાવ જોવા મળતો નથી.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV સંક્રમણ દરમિયાન, કયા ઉત્સેચક દ્વારા વાઇરલ RNA ને DNAમાં રૂપાંતરિત કરવામાં આવે છે અને તે કયા જીન દ્વારા કોડ થાય છે?", "opts": ["DNA પોલિમરેઝ, pol જીન દ્વારા", "રિવર્સ ટ્રાન્સક્રિપ્ટેઝ, gag જીન દ્વારા", "રિવર્સ ટ્રાન્સક્રિપ્ટેઝ, pol જીન દ્વારા", "RNA પોલિમરેઝ, env જીન દ્વારા"], "ans": 2, "exp": "HIV સંક્રમણ દરમિયાન, રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચક દ્વારા વાઇરલ RNA ને DNAમાં રૂપાંતરિત કરવામાં આવે છે અને તે pol જીન દ્વારા કોડ થાય છે. બાકીના વિકલ્પો અયોગ્ય છે કારણ કે: A) DNA પોલિમરેઝ pol જીન દ્વારા કોડ થાય છે પરંતુ તે RNA ને DNAમાં રૂપાંતરિત કરતું નથી, B) રિવર્સ ટ્રાન્સક્રિપ્ટેઝ gag જીન દ્વારા કોડ થતું નથી, અને D) RNA પોલિમરેઝ env જીન દ્વારા કોડ થતું નથી.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV સંક્રમણના કયા તબક્કે વાઇરસ મેજબાન કોષમાં લેટન્ટ (નિષ્ક્રિય) અવસ્થામાં રહે છે અને કયા પ્રોટીનની હાજરીમાં તે સક્રિય થાય છે?", "opts": ["એક્યુટ તબક્કે, Tat પ્રોટીનની હાજરીમાં", "ક્રોનિક તબક્કે, Rev પ્રોટીનની હાજરીમાં", "લેટન્ટ તબક્કે, Tat પ્રોટીનની હાજરીમાં", "એડ્સ તબક્કે, Nef પ્રોટીનની હાજરીમાં"], "ans": 2, "exp": "HIV સંક્રમણના લેટન્ટ તબક્કે વાઇરસ મેજબાન કોષમાં નિષ્ક્રિય અવસ્થામાં રહે છે અને Tat પ્રોટીનની હાજરીમાં તે સક્રિય થાય છે. બાકીના વિકલ્પો અયોગ્ય છે કારણ કે: A) એક્યુટ તબક્કે વાઇરસ સક્રિય હોય છે, B) ક્રોનિક તબક્કે વાઇરસ સક્રિય હોય છે અને Rev પ્રોટીન વાઇરલ mRNA ને કોષકેન્દ્ર બહાર કાઢવામાં મદદ કરે છે, અને D) એડ્સ તબક્કે વાઇરસ સક્રિય હોય છે અને Nef પ્રોટીન વાઇરસની પુનરાવર્તન ક્ષમતામાં મદદ કરે છે.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV સંક્રમણના નિદાન માટે કયો પરીક્ષણ પદ્ધતિ વાઇરલ લોડ નક્કી કરવા માટે વપરાય છે અને તે કયા તબક્કે સૌથી અસરકારક છે?", "opts": ["ELISA, એક્યુટ તબક્કે", "PCR, લેટન્ટ તબક્કે", "વેસ્ટર્ન બ્લોટ, ક્રોનિક તબક્કે", "RT-PCR, એક્યુટ તબક્કે"], "ans": 3, "exp": "HIV સંક્રમણના નિદાન માટે RT-PCR પરીક્ષણ પદ્ધતિ વાઇરલ લોડ નક્કી કરવા માટે વપરાય છે અને તે એક્યુટ તબક્કે સૌથી અસરકારક છે. બાકીના વિકલ્પો અયોગ્ય છે કારણ કે: A) ELISA એન્ટિબોડીનું પૃથક્કરણ કરે છે પરંતુ વાઇરલ લોડ નક્કી કરતું નથી, B) PCR લેટન્ટ તબક્કે વાઇરલ લોડ નક્કી કરવા માટે અસરકારક નથી, અને C) વેસ્ટર્ન બ્લોટ એન્ટિબોડીનું પૃથક્કરણ કરે છે પરંતુ વાઇરલ લોડ નક્કી કરતું નથી.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV વાઇરસમાં, 'vpr' જીનનું મુખ્ય કાર્ય શું છે?", "opts": ["વાઇરસના રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચકની ક્રિયાશીલતા વધારવી", "મેજબાન કોષના કોષચક્રને G2/M તબક્કે અટકાવી, વાઇરલ પ્રજનનને અનુકૂળ બનાવવું", "વાઇરસના કેપ્સિડ પ્રોટીનની રચનામાં મદદ કરવી", "CD4+ T કોષોની સપાટી પરના રિસેપ્ટર સાથે જોડાણ કરવું"], "ans": 1, "exp": "vpr જીનનું મુખ્ય કાર્ય મેજબાન કોષના કોષચક્રને G2/M તબક્કે અટકાવવાનું છે, જેથી વાઇરલ પ્રજનન માટે અનુકૂળ વાતાવરણ ઉભું થાય. A વિકલ્પ રિવર્સ ટ્રાન્સક્રિપ્ટેઝ સાથે સંબંધિત નથી, C વિકલ્પ કેપ્સિડ પ્રોટીન (gag જીન) સાથે સંબંધિત છે, અને D વિકલ્પ gp120 પ્રોટીનના કાર્યને દર્શાવે છે.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV સંક્રમણ દરમિયાન, 'Nef' પ્રોટીન કયા પગલાં દ્વારા મેજબાન કોષની પ્રતિરક્ષા વ્યવસ્થાને નબળી પાડે છે?", "opts": ["MHC-I અણુઓની સપાટી પરની હાજરી ઘટાડી, સાયટોટોક્સિક T કોષો દ્વારા ઓળખણને અટકાવે છે", "CD4 રિસેપ્ટરની સંખ્યા વધારી, વાઇરસના પ્રવેશને સરળ બનાવે છે", "રિવર્સ ટ્રાન્સક્રિપ્ટેઝની ક્રિયાશીલતા વધારી, વાઇરલ DNA ની રચના વેગવાન બનાવે છે", "કોષના કોષકેન્દ્રમાં પ્રવેશી, વાઇરલ જીનોમને સીધું એકીકૃત કરે છે"], "ans": 0, "exp": "Nef પ્રોટીન MHC-I અણુઓની સપાટી પરની હાજરી ઘટાડે છે, જેથી સાયટોટોક્સિક T કોષો દ્વારા સંક્રમિત કોષોની ઓળખણ અટકાવાય છે. B વિકલ્પ CD4 રિસેપ્ટર સાથે સંબંધિત નથી, C વિકલ્પ રિવર્સ ટ્રાન્સક્રિપ્ટેઝ સાથે સંબંધિત છે, અને D વિકલ્પ એકીકરણ પ્રક્રિયા (integrase ઉત્સેચક) સાથે સંબંધિત છે.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV સંક્રમણ દરમિયાન, 'Tat' પ્રોટીન કયા પગલાં દ્વારા વાઇરલ ટ્રાન્સક્રિપ્શનને વેગવાન બનાવે છે?", "opts": ["વાઇરલ LTR પ્રદેશ સાથે જોડાઈ, RNA પોલિમરેઝ II ની ક્રિયાશીલતા વધારે છે", "મેજબાન કોષના DNA ને તોડી, વાઇરલ જીનોમને એકીકૃત કરે છે", "CD4+ T કોષોની સપાટી પરના રિસેપ્ટરને બ્લોક કરે છે", "વાઇરસના કેપ્સિડને તોડી, વાઇરલ RNA ને મુક્ત કરે છે"], "ans": 0, "exp": "Tat પ્રોટીન વાઇરલ LTR (Long Terminal Repeat) પ્રદેશ સાથે જોડાઈ, RNA પોલિમરેઝ II ની ક્રિયાશીલતા વધારે છે, જેથી વાઇરલ ટ્રાન્સક્રિપ્શન વેગવાન બને. B વિકલ્પ એકીકરણ પ્રક્રિયા (integrase) સાથે સંબંધિત છે, C વિકલ્પ gp120 પ્રોટીનના કાર્યને દર્શાવે છે, અને D વિકલ્પ વાઇરસના પ્રવેશ પ્રક્રિયા સાથે સંબંધિત છે.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV સંક્રમણ દરમિયાન, 'Vpu' પ્રોટીનનું મુખ્ય કાર્ય કયું છે?", "opts": ["વાઇરસના પ્રવેશ દરમિયાન, કોષના ઝરીમાં (membrane) ફેરફાર કરવો", "CD4 રિસેપ્ટરને યુબિક્વિટિનેશન દ્વારા તોડી, વાઇરસના પ્રવેશને સરળ બનાવવો", "વાઇરલ RNA ને DNAમાં રૂપાંતરિત કરવો", "મેજબાન કોષના કોષકેન્દ્રમાં પ્રવેશી, વાઇરલ જીનોમને એકીકૃત કરવો"], "ans": 1, "exp": "Vpu પ્રોટીન CD4 રિસેપ્ટરને યુબિક્વિટિનેશન દ્વારા તોડે છે, જેથી વાઇરસના પ્રવેશને સરળ બનાવે. A વિકલ્પ Vpu નું કાર્ય નથી, C વિકલ્પ રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચક સાથે સંબંધિત છે, અને D વિકલ્પ એકીકરણ પ્રક્રિયા (integrase) સાથે સંબંધિત છે.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV સંક્રમણ દરમિયાન, 'Rev' પ્રોટીન કયા પગલાં દ્વારા વાઇરલ જીનના વ્યવસ્થિત વ્યક્તીકરણને નિયંત્રિત કરે છે?", "opts": ["વાઇરલ mRNA ને કોષકેન્દ્રથી બહાર કાઢી, પ્રોટીન સંશ્લેષણને સરળ બનાવે છે", "વાઇરલ DNA ને કોષકેન્દ્રમાં એકીકૃત કરે છે", "રિવર્સ ટ્રાન્સક્રિપ્ટેઝની ક્રિયાશીલતા વધારે છે", "CD4+ T કોષોની સપાટી પરના રિસેપ્ટર સાથે જોડાણ કરે છે"], "ans": 0, "exp": "Rev પ્રોટીન વાઇરલ mRNA ને કોષકેન્દ્રથી બહાર કાઢે છે, જેથી પ્રોટીન સંશ્લેષણ સરળ બને. B વિકલ્પ એકીકરણ પ્રક્રિયા (integrase) સાથે સંબંધિત છે, C વિકલ્પ રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચક સાથે સંબંધિત છે, અને D વિકલ્પ gp120 પ્રોટીનના કાર્યને દર્શાવે છે.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV સંક્રમણ દરમિયાન, 'Vif' પ્રોટીન કયા મેજબાન પ્રોટીનને નિષ્ક્રિય કરવા માટે જવાબદાર છે, જેનાથી વાઇરસનું રિપ્લિકેશન સરળ બને છે?", "opts": ["APOBEC3G", "CCR5", "CXCR4", "CD4"], "ans": 0, "exp": "'Vif' પ્રોટીન APOBEC3G નામના મેજબાન પ્રોટીનને નિષ્ક્રિય કરે છે, જે HIVના RNAને મ્યુટેશન દ્વારા નષ્ટ કરવાનો પ્રયાસ કરે છે. CCR5 અને CXCR4 કો-રિસેપ્ટર છે, જ્યારે CD4 મુખ્ય રિસેપ્ટર છે. આમ, A સરળ જવાબ છે.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV સંક્રમણ દરમિયાન, કયા પ્રકારના એન્ટીબોડી સૌપ્રથમ ઉત્પન્ન થાય છે અને તે કયા તબક્કે જોવા મળે છે?", "opts": ["IgM, પ્રાથમિક સંક્રમણ તબક્કે", "IgG, ક્લિનિકલ લેટન્ટ તબક્કે", "IgA, એડ્સ તબક્કે", "IgE, સંક્રમણના અંતિમ તબક્કે"], "ans": 0, "exp": "HIV સંક્રમણ દરમિયાન, IgM એન્ટીબોડી સૌપ્રથમ ઉત્પન્ન થાય છે અને તે પ્રાથમિક સંક્રમણ તબક્કે (એક્યુટ રિટ્રોવાયરલ સિન્ડ્રોમ) જોવા મળે છે. IgG પછીથી ઉત્પન્ન થાય છે, જ્યારે IgA અને IgE HIV સંક્રમણ સાથે સીધો સંબંધ ધરાવતા નથી.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV વાઇરસમાં, 'env' જીન કયા પ્રોટીનને કોડ કરે છે, જે વાઇરસને મેજબાન કોષમાં પ્રવેશવા માટે મદદ કરે છે?", "opts": ["gp120 અને gp41", "p24 અને p17", "Tat અને Rev", "Vpr અને Nef"], "ans": 0, "exp": "'env' જીન gp120 અને gp41 પ્રોટીનને કોડ કરે છે, જે વાઇરસને મેજબાન કોષમાં બંધન અને પ્રવેશવા માટે જરૂરી છે. p24 અને p17 કેપ્સિડ પ્રોટીન છે, જ્યારે Tat, Rev, Vpr, અને Nef નિયામક પ્રોટીન છે.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV સંક્રમણ દરમિયાન, કયા સાયટોકાઇનનો સ્તર વધવાને કારણે કેશેક્સિયા (વજન ઘટાડો) જોવા મળે છે?", "opts": ["TNF-α", "IL-2", "IFN-γ", "IL-4"], "ans": 0, "exp": "TNF-α (ટ્યુમર નેક્રોસિસ ફેક્ટર-આલ્ફા) નો સ્તર વધવાને કારણે કેશેક્સિયા (વજન ઘટાડો) જોવા મળે છે, જે HIV સંક્રમણના અંતિમ તબક્કામાં સામાન્ય લક્ષણ છે. IL-2, IFN-γ, અને IL-4 અન્ય સાયટોકાઇન છે, પરંતુ તે કેશેક્સિયા સાથે સીધો સંબંધ ધરાવતા નથી.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV સંક્રમણ દરમિયાન, કયા જીનના મ્યુટેશનને કારણે વાઇરસ CCR5 કો-રિસેપ્ટરનો ઉપયોગ કરવા અસમર્થ બને છે?", "opts": ["CCR5-Δ32", "CXCR4-Δ32", "CD4-Δ32", "APOBEC3G-Δ32"], "ans": 0, "exp": "CCR5-Δ32 મ્યુટેશનને કારણે CCR5 કો-રિસેપ્ટરનો અભાવ થાય છે, જેનાથી HIV વાઇરસ આ કો-રિસેપ્ટરનો ઉપયોગ કરવા અસમર્થ બને છે. CXCR4, CD4, અને APOBEC3G સાથે આ મ્યુટેશન સંબંધિત નથી.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
