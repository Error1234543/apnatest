<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>એકસંકરી સંકરણ (Monohybrid Cross)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>એકસંકરી સંકરણ (Monohybrid Cross)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">એકસંકરી સંકરણ (Monohybrid Cross)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "મેન્ડલના એકસંકરી સંકરણના પ્રયોગમાં, F₂ પેઢીમાં ફિનોટાઇપિક ગુણોત્તર ૩:૧ મળે છે. જો F₁ પેઢીના સજીવોને પોતાને જ સ્વ-પરાગનયન કરાવવામાં આવે, તો નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["F₂ પેઢીમાં સંપૂર્ણ પ્રભાવી ગુણ ધરાવતા સજીવોની સંખ્યા ૭૫% હશે.", "F₂ પેઢીમાં પ્રભાવી અને અપ્રભાવી ગુણ ધરાવતા સજીવોનું ગુણોત્તર ૩:૧ રહેશે.", "F₂ પેઢીમાં શુદ્ધ પ્રભાવી સજીવોની સંખ્યા ૫૦% હશે.", "F₂ પેઢીમાં હેટરોઝાયગસ સજીવોની સંખ્યા ૫૦% હશે."], "ans": 2, "exp": "F₂ પેઢીમાં શુદ્ધ પ્રભાવી (AA) સજીવોની સંખ્યા 25% હશે, નહીં કે 50%. F₁ પેઢી હેટરોઝાયગસ (Aa) હોવાથી સ્વ-પરાગનયનથી F₂ પેઢીમાં AA (25%), Aa (50%), અને aa (25%) ગુણોત્તર મળે છે. વિકલ્પ A (75% પ્રભાવી) અને B (3:1 ગુણોત્તર) સત્ય છે. વિકલ્પ D પણ સત્ય છે કારણ કે હેટરોઝાયગસ (Aa) સજીવો 50% હશે. વિકલ્પ C ખોટો છે કારણ કે શુદ્ધ પ્રભાવી સજીવો માત્ર 25% હશે.", "ref": "Std 12 - અધ્યાય ૫: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "એકસંકરી સંકરણમાં, જો પ્રભાવી જનીન (A) અને અપ્રભાવી જનીન (a) વચ્ચે અપૂર્ણ પ્રભાવિતા (incomplete dominance) જોવા મળે, તો F₁ પેઢીમાં કયો ફિનોટાઇપ જોવા મળશે?", "opts": ["માત્ર પ્રભાવી ગુણ ધરાવતો ફિનોટાઇપ", "માત્ર અપ્રભાવી ગુણ ધરાવતો ફિનોટાઇપ", "પ્રભાવી અને અપ્રભાવી ગુણનો મિશ્ર ફિનોટાઇપ", "પ્રભાવી અથવા અપ્રભાવી ગુણ ધરાવતો ફિનોટાઇપ, પરંતુ મિશ્ર નહીં"], "ans": 2, "exp": "અપૂર્ણ પ્રભાવિતામાં, હેટરોઝાયગસ (Aa) સજીવો પ્રભાવી અને અપ્રભાવી ગુણનો મિશ્ર ફિનોટાઇપ દર્શાવે છે. ઉદાહરણ તરીકે, લાલ અને સફેદ ફૂલવાળા પૌધાના સંકરણથી ગુલાબી ફૂલવાળા પૌધા મળે છે. વિકલ્પ A અને B ખોટા છે કારણ કે F₁ પેઢી શુદ્ધ પ્રભાવી અથવા અપ્રભાવી નથી. વિકલ્પ D ખોટો છે કારણ કે અપૂર્ણ પ્રભાવિતામાં મિશ્ર ફિનોટાઇપ જોવા મળે છે.", "ref": "Std 12 - અધ્યાય ૫: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "મેન્ડલના એકસંકરી સંકરણના પ્રયોગમાં, જો F₁ પેઢીના સજીવને અપ્રભાવી શુદ્ધ જનીનવાળા સજીવ સાથે સંકરણ કરાવવામાં આવે, તો F₂ પેઢીમાં કયું ગુણોત્તર મળશે?", "opts": ["૧:૧", "૩:૧", "૨:૧", "૧:૨:૧"], "ans": 0, "exp": "F₁ પેઢી હેટરોઝાયગસ (Aa) હોવાથી, જ્યારે તેને અપ્રભાવી શુદ્ધ (aa) સજીવ સાથે સંકરણ કરાવવામાં આવે, ત્યારે ટેસ્ટ ક્રોસ થાય છે. ટેસ્ટ ક્રોસમાં F₂ પેઢીમાં પ્રભાવી (Aa) અને અપ્રભાવી (aa) સજીવોનું ગુણોત્તર ૧:૧ મળે છે. વિકલ્પ B, C, અને D અનુક્રમે મોનોહાઇબ્રિડ ક્રોસ, બાયહાઇબ્રિડ ક્રોસ, અને જનીનોટાઇપિક ગુણોત્તર માટે છે.", "ref": "Std 12 - અધ્યાય ૫: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "મેન્ડલના એકસંકરી સંકરણના પ્રયોગમાં, જો F₁ પેઢીના સજીવને પ્રભાવી શુદ્ધ જનીનવાળા સજીવ સાથે સંકરણ કરાવવામાં આવે, તો F₂ પેઢીમાં કયું ગુણોત્તર મળશે?", "opts": ["૧:૧", "૧:૦", "૨:૧", "૩:૧"], "ans": 1, "exp": "F₁ પેઢી હેટરોઝાયગસ (Aa) હોવાથી, જ્યારે તેને પ્રભાવી શુદ્ધ (AA) સજીવ સાથે સંકરણ કરાવવામાં આવે, તો બધા સંતતિઓ પ્રભાવી ગુણ ધરાવશે (Aa અથવા AA). આથી F₂ પેઢીમાં માત્ર પ્રભાવી ગુણ ધરાવતા સજીવો મળશે, જેથી ગુણોત્તર ૧:૦ (સંપૂર્ણ પ્રભાવી) મળે છે. વિકલ્પ A, C, અને D અનુક્રમે ટેસ્ટ ક્રોસ, બાયહાઇબ્રિડ ક્રોસ, અને મોનોહાઇબ્રિડ ક્રોસ માટે છે.", "ref": "Std 12 - અધ્યાય ૫: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "એકસંકરી સંકરણમાં, જ્યારે બે શુદ્ધ જનીનવાળા પિતૃ (AA અને aa) ના સંકરણથી F1 પેઢી (Aa) મળે છે, ત્યારબાદ F1 ને F1 સાથે સંકરણ કરવાથી F2 પેઢીમાં જનીનપ્રકારનું ગુણોત્તર કયું મળે છે, જો અપ્રભાવી જનીન (a) ની હાજરીથી લિંગ-સંબંધિત લક્ષણ પ્રગટ થાય છે?", "opts": ["1:2:1 (AA : Aa : aa)", "1:1 (Aa : aa)", "3:1 (A_ : aa)", "1:1:1:1 (Aa : AA : aa : aa)"], "ans": 0, "exp": "એકસંકરી સંકરણમાં F1 (Aa) ને F1 સાથે સંકરણ કરવાથી F2 પેઢીમાં જનીનપ્રકારનું ગુણોત્તર 1:2:1 (AA : Aa : aa) મળે છે. અહીં, લિંગ-સંબંધિત લક્ષણનો ઉલ્લેખ ભ્રામક છે, કારણ કે એકસંકરી સંકરણમાં લિંગ-સંબંધિત લક્ષણોનો સમાવેશ થતો નથી. પરંતુ પ્રશ્નમાં જનીનપ્રકારનું ગુણોત્તર પૂછવામાં આવ્યું છે, જે મેન્ડલના નિયમ અનુસાર 1:2:1 હોય છે. બાકીના વિકલ્પો અશુદ્ધ છે: B) 1:1 ફિનોટાઇપિક ગુણોત્તર છે જ્યારે અપૂર્ણ પ્રભાવીતા હોય, C) 3:1 ફિનોટાઇપિક ગુણોત્તર છે, અને D) 1:1:1:1 બે જનીનના સંકરણ માટે લાગુ પડે છે.", "ref": "Std 12 - અધ્યાય ૫: વંશવેલા અને વિકાસ (અનુવંશિકતા અને ઉત્ક્રાંતિ)", "ch": ""}, {"q": "એકસંકરી સંકરણમાં, જો F1 પેઢીના સજીવને અપ્રભાવી હોમોઝાયગસ (aa) સજીવ સાથે સંકરણ કરવામાં આવે, તો F2 પેઢીમાં ફિનોટાઇપિક ગુણોત્તર કયું હશે, જ્યારે પ્રભાવી જનીન (A) અપૂર્ણ પ્રભાવી હોવાને લીધે હેટરોઝાયગસ (Aa) નું ફિનોટાઇપ મધ્યવર્તી હોય?", "opts": ["૧:૧", "૨:૧", "૧:૨:૧", "૩:૧"], "ans": 0, "exp": "પ્રભાવી જનીન (A) અપૂર્ણ પ્રભાવી હોવાને લીધે હેટરોઝાયગસ (Aa) નું ફિનોટાઇપ મધ્યવર્તી હોય છે. F1 પેઢીના સજીવ (Aa) અને અપ્રભાવી હોમોઝાયગસ (aa) વચ્ચેના સંકરણમાં, F2 પેઢીમાં જનીનપ્રકારો Aa અને aa મળે છે. ફિનોટાઇપિક રીતે, Aa મધ્યવર્તી અને aa અપ્રભાવી ફિનોટાઇપ દર્શાવે છે, પરિણામે ગુણોત્તર ૧:૧ મળે છે. બાકીના વિકલ્પો (B, C, D) અપૂર્ણ પ્રભાવી સંકરણના કિસ્સામાં લાગુ પડતા નથી.", "ref": "Std 12 - અધ્યાય ૩: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "મેન્ડલના એકસંકરી સંકરણના પ્રયોગમાં, જો પિતૃ પેઢીના બંને જીવો હેટરોઝાયગસ (Aa) હોય, તો F1 પેઢીમાં જનીનપ્રકાર અને ફિનોટાઇપિક ગુણોત્તર કયું હશે?", "opts": ["જનીનપ્રકાર: ૧:૨:૧, ફિનોટાઇપિક: ૩:૧", "જનીનપ્રકાર: ૧:૧, ફિનોટાઇપિક: ૧:૧", "જનીનપ્રકાર: ૩:૧, ફિનોટાઇપિક: ૧:૨:૧", "જનીનપ્રકાર: ૨:૧, ફિનોટાઇપિક: ૧:૧"], "ans": 0, "exp": "જ્યારે બંને પિતૃ હેટરોઝાયગસ (Aa) હોય, ત્યારે F1 પેઢીમાં જનીનપ્રકારનું ગુણોત્તર ૧ AA : ૨ Aa : ૧ aa હોય છે. ફિનોટાઇપિક રીતે, પ્રભાવી જનીન (A) ધરાવતા જીવો (AA અને Aa) એકસરખા દેખાય છે, જ્યારે અપ્રભાવી જનીન (aa) ધરાવતા જીવો અલગ દેખાય છે, પરિણામે ફિનોટાઇપિક ગુણોત્તર ૩:૧ મળે છે. બાકીના વિકલ્પો (B, C, D) આ કિસ્સામાં લાગુ પડતા નથી.", "ref": "Std 12 - અધ્યાય ૩: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "મેન્ડલના એકસંકરી સંકરણના પ્રયોગમાં, જો F1 પેઢીના સજીવને અજાણ્યા જનીનપ્રકારના સજીવ સાથે સંકરણ કરવામાં આવે અને F2 પેઢીમાં ફિનોટાઇપિક ગુણોત્તર ૧:૧ મળે, તો અજાણ્યા સજીવનો જનીનપ્રકાર કયો હશે?", "opts": ["AA", "Aa", "aa", "AA અથવા aa"], "ans": 1, "exp": "F1 પેઢીના સજીવ (Aa) અને અજાણ્યા સજીવ વચ્ચેના સંકરણમાં, જો F2 પેઢીમાં ફિનોટાઇપિક ગુણોત્તર ૧:૧ મળે, તો અજાણ્યા સજીવનો જનીનપ્રકાર હેટરોઝાયગસ (Aa) હોવો જોઈએ. કારણ કે Aa × Aa સંકરણમાં, ફિનોટાઇપિક ગુણોત્તર ૩:૧ મળે છે, પરંતુ જો અજાણ્યા સજીવનો જનીનપ્રકાર aa હોય, તો F2 પેઢીમાં ફિનોટાઇપિક ગુણોત્તર ૧:૧ મળે. પરંતુ પ્રશ્નમાં F1 પેઢીના સજીવ (Aa) સાથે સંકરણ કરવામાં આવે છે, જેથી અજાણ્યા સજીવનો જનીનપ્રકાર Aa હોવો જોઈએ. વિકલ્પ A, C, અને D આ કિસ્સામાં લાગુ પડતા નથી.", "ref": "Std 12 - અધ્યાય ૩: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "એકસંકરી સંકરણમાં, જો પિતૃ પેઢીના બંને જીવો શુદ્ધ પ્રભાવી (AA) અને શુદ્ધ અપ્રભાવી (aa) હોય, તો F1 પેઢીના સજીવનું જનીનપ્રકાર અને ફિનોટાઇપ કયું હશે?", "opts": ["જનીનપ્રકાર: Aa, ફિનોટાઇપ: પ્રભાવી", "જનીનપ્રકાર: AA, ફિનોટાઇપ: પ્રભાવી", "જનીનપ્રકાર: aa, ફિનોટાઇપ: અપ્રભાવી", "જનીનપ્રકાર: Aa, ફિનોટાઇપ: મધ્યવર્તી"], "ans": 0, "exp": "પિતૃ પેઢીના બંને જીવો શુદ્ધ પ્રભાવી (AA) અને શુદ્ધ અપ્રભાવી (aa) હોવાને લીધે, F1 પેઢીના સજીવનું જનીનપ્રકાર હેટરોઝાયગસ (Aa) હશે. ફિનોટાઇપિક રીતે, પ્રભાવી જનીન (A) અપ્રભાવી જનીન (a) પર પ્રભાવી હોવાને લીધે, F1 પેઢીના સજીવ પ્રભાવી ફિનોટાઇપ દર્શાવશે. વિકલ્પ B અને C અપૂર્ણ છે કારણ કે તેઓ ફક્ત એક જ પિતૃના લક્ષણો દર્શાવે છે, જ્યારે વિકલ્પ D અપૂર્ણ પ્રભાવીના કિસ્સામાં લાગુ પડે છે.", "ref": "Std 12 - અધ્યાય ૩: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "એકસંકરી સંકરણના પ્રયોગમાં, જો એક પિતૃ શુદ્ધ પ્રભાવી (AA) અને બીજો પિતૃ હેટરોઝાયગસ (Aa) હોય, તો તેમના સંતતિમાં જનીનપ્રકાર (genotype) નો ગુણોત્તર કયો મળશે? પરંતુ અહીં એક વિશેષ પરિસ્થિતિ ધ્યાનમાં લો કે પ્રભાવી જનીન (A) ની અભિવ્યક્તિ પર્યાવરણીય પરિબળો દ્વારા પ્રભાવિત થાય છે અને તેના કારણે કેટલાક હેટરોઝાયગસ (Aa) સજીવો અપ્રભાવી લક્ષણ દર્શાવે છે.", "opts": ["૧:૧ (AA:Aa) અને બધા સંતતિઓ પ્રભાવી લક્ષણ દર્શાવશે", "૧:૧ (AA:Aa) પરંતુ કેટલાક Aa સંતતિઓ અપ્રભાવી લક્ષણ દર્શાવી શકે છે", "૨:૧ (AA:Aa) અને બધા સંતતિઓ પ્રભાવી લક્ષણ દર્શાવશે", "૧:૨:૧ (AA:Aa:aa) અને કેટલાક Aa સંતતિઓ અપ્રભાવી લક્ષણ દર્શાવી શકે છે"], "ans": 1, "exp": "આ પ્રશ્નમાં પિતૃ પેઢી AA × Aa નું સંકરણ છે, જેના કારણે સંતતિમાં જનીનપ્રકારનો ગુણોત્તર ૧:૧ (AA:Aa) મળે છે. પરંતુ પ્રશ્નમાં આપેલ વિશેષ પરિસ્થિતિ મુજબ, પર્યાવરણીય પરિબળોના કારણે કેટલાક હેટરોઝાયગસ (Aa) સજીવો અપ્રભાવી લક્ષણ દર્શાવી શકે છે. તેથી વિકલ્પ B સાચો છે. વિકલ્પ A ખોટો છે કારણ કે બધા સંતતિઓ પ્રભાવી લક્ષણ દર્શાવશે નહીં. વિકલ્પ C ખોટો છે કારણ કે જનીનપ્રકારનો ગુણોત્તર ૨:૧ નથી. વિકલ્પ D ખોટો છે કારણ કે aa જનીનપ્રકાર ધરાવતી સંતતિ ઉત્પન્ન થશે નહીં.", "ref": "Std 12 - પ્રકરણ ૫: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "મેન્ડલના એકસંકરી સંકરણના પ્રયોગમાં, જો F₂ પેઢીમાં મળતા સજીવોના જનીનપ્રકારનું વિશ્લેષણ કરવામાં આવે, તો નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["F₂ પેઢીમાં ૧:૨:૧ નો જનીનપ્રકાર ગુણોત્તર મળે છે.", "F₂ પેઢીમાં ૨૫% સજીવો શુદ્ધ પ્રભાવી (AA) હોય છે.", "F₂ પેઢીમાં ૫૦% સજીવો હેટરોઝાયગસ (Aa) હોય છે, જે બંને લક્ષણો દર્શાવે છે.", "F₂ પેઢીમાં ૨૫% સજીવો શુદ્ધ અપ્રભાવી (aa) હોય છે."], "ans": 2, "exp": "વિકલ્પ C ખોટો છે કારણ કે હેટરોઝાયગસ (Aa) સજીવો માત્ર પ્રભાવી લક્ષણ જ દર્શાવે છે, બંને લક્ષણો નહીં. મેન્ડલના નિયમ મુજબ, F₂ પેઢીમાં જનીનપ્રકાર ગુણોત્તર ૧:૨:૧ (AA:Aa:aa) મળે છે, જેમાં ૨૫% AA, ૫૦% Aa અને ૨૫% aa હોય છે. Aa સજીવો માત્ર પ્રભાવી લક્ષણ દર્શાવે છે, અપ્રભાવી લક્ષણ દબાયેલું રહે છે.", "ref": "Std 12 - પ્રકરણ ૫: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "એકસંકરી સંકરણના પ્રયોગમાં, જો પિતૃ પેઢીના એક સજીવનો જનીનપ્રકાર AA હોય અને બીજા સજીવનો જનીનપ્રકાર અજ્ઞાત હોય, પરંતુ F₁ પેઢીમાં બધા સજીવો પ્રભાવી લક્ષણ દર્શાવે, તો નીચેનામાંથી કયો નિષ્કર્ષ સાચો છે?", "opts": ["અજ્ઞાત પિતૃ શુદ્ધ અપ્રભાવી (aa) હોવો જોઈએ.", "અજ્ઞાત પિતૃ હેટરોઝાયગસ (Aa) હોવો જોઈએ.", "અજ્ઞાત પિતૃ શુદ્ધ પ્રભાવી (AA) અથવા હેટરોઝાયગસ (Aa) હોઈ શકે છે.", "અજ્ઞાત પિતૃ શુદ્ધ પ્રભાવી (AA) જ હોવો જોઈએ."], "ans": 3, "exp": "વિકલ્પ D સાચો છે કારણ કે જો F₁ પેઢીમાં બધા સજીવો પ્રભાવી લક્ષણ દર્શાવે, તો અજ્ઞાત પિતૃ શુદ્ધ પ્રભાવી (AA) જ હોવો જોઈએ. જો અજ્ઞાત પિતૃ હેટરોઝાયગસ (Aa) હોત, તો F₁ પેઢીમાં અપ્રભાવી લક્ષણ ધરાવતા સજીવો પણ મળતા. વિકલ્પ A અને B ખોટા છે કારણ કે તેનાથી F₁ પેઢીમાં અપ્રભાવી લક્ષણ દેખાત.", "ref": "Std 12 - પ્રકરણ ૫: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "એકસંકરી સંકરણના પ્રયોગમાં, જો F₁ પેઢીના હેટરોઝાયગસ (Aa) સજીવનું સ્વફલન કરવામાં આવે, તો F₂ પેઢીમાં મળતા સજીવોના જનીનપ્રકારનું વિશ્લેષણ કરતાં, નીચેનામાંથી કયું વિધાન અપવાદરૂપ છે?", "opts": ["F₂ પેઢીમાં ૨૫% સજીવો શુદ્ધ પ્રભાવી (AA) હોય છે.", "F₂ પેઢીમાં ૫૦% સજીવો હેટરોઝાયગસ (Aa) હોય છે.", "F₂ પેઢીમાં ૨૫% સજીવો શુદ્ધ અપ્રભાવી (aa) હોય છે, જે અપ્રભાવી લક્ષણ દર્શાવે છે.", "F₂ પેઢીમાં ૧૦૦% સજીવો પ્રભાવી લક્ષણ દર્શાવે છે."], "ans": 3, "exp": "વિકલ્પ D અપવાદરૂપ છે કારણ કે F₂ પેઢીમાં માત્ર ૭૫% સજીવો પ્રભાવી લક્ષણ દર્શાવે છે (AA અને Aa), જ્યારે ૨૫% સજીવો અપ્રભાવી લક્ષણ (aa) દર્શાવે છે. બાકીના વિકલ્પો મેન્ડલના નિયમ મુજબ સાચા છે.", "ref": "Std 12 - પ્રકરણ ૫: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "એકસંકરી સંકરણના પ્રયોગમાં, જો પિતૃ પેઢીના બંને સજીવો હેટરોઝાયગસ (Aa) હોય, તો તેમના સંતતિમાં નીચેનામાંથી કયો ગુણોત્તર મળવાની સંભાવના નથી?", "opts": ["ફિનોટાઇપિક ગુણોત્તર ૩:૧", "જનીનપ્રકાર ગુણોત્તર ૧:૨:૧", "ફિનોટાઇપિક ગુણોત્તર ૧:૨:૧", "૨૫% સજીવો શુદ્ધ અપ્રભાવી (aa)"], "ans": 2, "exp": "વિકલ્પ C ખોટો છે કારણ કે હેટરોઝાયગસ (Aa) પિતૃઓના સંકરણથી ફિનોટાઇપિક ગુણોત્તર ૩:૧ મળે છે, ૧:૨:૧ નહીં. ૧:૨:૧ ગુણોત્તર જનીનપ્રકાર માટે હોય છે, ફિનોટાઇપ માટે નહીં. બાકીના વિકલ્પો મેન્ડલના નિયમ મુજબ સાચા છે.", "ref": "Std 12 - પ્રકરણ ૫: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "એકસંકરી સંકરણના પ્રયોગમાં, જો F₁ પેઢીના સજીવને અપ્રભાવી શુદ્ધ જનીનવાળા સજીવ (aa) સાથે સંકરણ કરવામાં આવે અને પરિણામે મળતા સંતતિમાં ૫૦% પ્રભાવી અને ૫૦% અપ્રભાવી લક્ષણ દર્શાવતા સજીવો મળે, તો F₁ પેઢીના સજીવનો જનીનપ્રકાર શું હશે?", "opts": ["શુદ્ધ પ્રભાવી (AA)", "હેટરોઝાયગસ (Aa)", "શુદ્ધ અપ્રભાવી (aa)", "ઉપરોક્તમાંથી કોઈ નહીં"], "ans": 1, "exp": "વિકલ્પ B સાચો છે કારણ કે જો F₁ પેઢીનો સજીવ હેટરોઝાયગસ (Aa) હોય, તો તેનું અપ્રભાવી શુદ્ધ જનીનવાળા સજીવ (aa) સાથે સંકરણ કરતાં ૫૦% પ્રભાવી (Aa) અને ૫૦% અપ્રભાવી (aa) સજીવો મળે. જો F₁ પેઢીનો સજીવ શુદ્ધ પ્રભાવી (AA) હોત, તો બધા સંતતિ પ્રભાવી લક્ષણ દર્શાવતા હોત. વિકલ્પ A અને C ખોટા છે કારણ કે તેનાથી અપેક્ષિત પરિણામ ન મળે.", "ref": "Std 12 - પ્રકરણ ૫: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "એકસંકરી સંકરણના પ્રયોગમાં, જો પિતૃ પેઢીના બંને જીવો હેટરોઝાયગસ (Aa) હોય અને તેમના સંતાનોમાં (F1) ફિનોટાઇપિક ગુણોત્તર ૧:૨:૧ (પ્રભાવી:મિશ્ર:અપ્રભાવી) મળે, તો આ કયા પ્રકારનું પ્રભાવીતા દર્શાવે છે?", "opts": ["પૂર્ણ પ્રભાવીતા", "અપૂર્ણ પ્રભાવીતા", "સહ-પ્રભાવીતા", "બહુ-જનીનીય પ્રભાવીતા"], "ans": 1, "exp": "અપૂર્ણ પ્રભાવીતામાં, હેટરોઝાયગસ જીવો (Aa) મિશ્ર ફિનોટાઇપ દર્શાવે છે, જેથી F1 પેઢીમાં ૧:૨:૧ ગુણોત્તર મળે છે. પૂર્ણ પ્રભાવીતામાં ફક્ત ૩:૧ ગુણોત્તર મળે (A), સહ-પ્રભાવીતામાં બંને જનીનના પ્રભાવ સ્પષ્ટ દેખાય (ઉદા. AB રક્ત જૂથ), અને બહુ-જનીનીય પ્રભાવીતામાં એકથી વધુ જનીન સંકળાયેલા હોય છે.", "ref": "Std 12 - અધ્યાય ૫: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એકસંકરી સંકરણમાં, જો પિતૃ પેઢીના એક જીવનો જનીનપ્રકાર AA હોય અને બીજો જીવ Aa હોય, તો F1 પેઢીમાં કેટલા ટકા સજીવો હેટરોઝાયગસ (Aa) હશે?", "opts": ["૦%", "૫૦%", "૭૫%", "૧૦૦%"], "ans": 1, "exp": "AA (શુદ્ધ પ્રભાવી) અને Aa (હેટરોઝાયગસ) વચ્ચેના સંકરણમાં, ગેમેટ્સ A અને A (AA થી) તેમજ A અને a (Aa થી) ઉત્પન્ન થાય છે. સંકરણના સંભવિત સંયોજનો AA અને Aa હોય છે, જેમાં ૫૦% સજીવો હેટરોઝાયગસ (Aa) હશે. ૦%, ૭૫%, અને ૧૦૦% એ અશક્ય ગણતરીઓ છે.", "ref": "Std 12 - અધ્યાય ૫: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એકસંકરી સંકરણમાં, જો F1 પેઢીના સજીવને અજાણ્યા જનીનપ્રકારના સજીવ સાથે સંકરણ કરવામાં આવે અને સંતાનોમાં પ્રભાવી:અપ્રભાવી ગુણોત્તર ૧:૧ મળે, તો અજાણ્યા સજીવનો જનીનપ્રકાર કયો હશે?", "opts": ["AA", "Aa", "aa", "AA અથવા aa"], "ans": 2, "exp": "જો સંતાનોમાં ૧:૧ ગુણોત્તર મળે, તો અજાણ્યા સજીવનો જનીનપ્રકાર હેટરોઝાયગસ (Aa) હોવો જોઈએ, કારણ કે F1 (Aa) સાથે સંકરણ કરતાં, Aa × aa = ૧:૧ (Aa:aa) મળે. AA અથવા aa સાથે સંકરણ કરતાં ૧:૧ ગુણોત્તર મળતું નથી.", "ref": "Std 12 - અધ્યાય ૫: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એકસંકરી સંકરણના પ્રયોગમાં, જો પિતૃ પેઢીના બંને જીવો શુદ્ધ પ્રભાવી (AA) અને શુદ્ધ અપ્રભાવી (aa) હોય, તો F2 પેઢીમાં કેટલા ટકા સજીવો શુદ્ધ જનીનપ્રકાર ધરાવશે?", "opts": ["૨૫%", "૫૦%", "૭૫%", "૧૦૦%"], "ans": 1, "exp": "F1 પેઢીના બધા સજીવો હેટરોઝાયગસ (Aa) હશે. F1 નું સ્વફલન કરતાં F2 પેઢીમાં જનીનપ્રકારનું ગુણોત્તર ૧:૨:૧ (AA:Aa:aa) મળે છે. શુદ્ધ જનીનપ્રકાર (AA અને aa) નું પ્રમાણ ૨૫% + ૨૫% = ૫૦% થાય છે. ૨૫%, ૭૫%, અને ૧૦૦% એ અશક્ય ગણતરીઓ છે.", "ref": "Std 12 - અધ્યાય ૫: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એકસંકરી સંકરણમાં, જો પિતૃ પેઢીના બંને જીવો હેટરોઝાયગસ (Aa) હોય અને તેમના સંતાનોમાં (F1) ફિનોટાઇપિક ગુણોત્તર ૩:૧ મળે, તો આ કયા પ્રકારનું સંકરણ દર્શાવે છે?", "opts": ["ટેસ્ટ ક્રોસ", "બેક ક્રોસ", "સ્વફલન", "ડાયહાઇબ્રિડ ક્રોસ"], "ans": 2, "exp": "જ્યારે બંને પિતૃ હેટરોઝાયગસ (Aa) હોય અને તેમનું સ્વફલન કરવામાં આવે, ત્યારે F1 પેઢીમાં ૩:૧ ફિનોટાઇપિક ગુણોત્તર મળે છે. ટેસ્ટ ક્રોસ (Aa × aa) અને બેક ક્રોસ (F1 × પિતૃ)માં ૧:૧ ગુણોત્તર મળે, જ્યારે ડાયહાઇબ્રિડ ક્રોસ બે જનીનની સંકરણ સાથે સંકળાયેલ છે.", "ref": "Std 12 - અધ્યાય ૫: અનુવંશિકતા અને ભિન્નતા", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
