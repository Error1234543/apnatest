<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ખોરાક શૃંખલા</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ખોરાક શૃંખલા</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ખોરાક શૃંખલા</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 38 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 38 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક જળીય પરિસ્થિતિકી તંત્રમાં ખોરાક શૃંખલા નીચે મુજબ છે: ફાયટોપ્લાંકટન → ઝૂપ્લાંકટન → નાની માછલી → મોટી માછલી → મગર. આ શૃંખલામાં તૃતીય ઉપભોક્તા કોણ છે?", "opts": ["ઝૂપ્લાંકટન", "નાની માછલી", "મોટી માછલી", "મગર"], "ans": 2, "exp": "ખોરાક શૃંખલામાં ઉત્પાદક (ફાયટોપ્લાંકટન) પછી પ્રાથમિક ઉપભોક્તા (ઝૂપ્લાંકટન), દ્વિતીય ઉપભોક્તા (નાની માછલી), તૃતીય ઉપભોક્તા (મોટી માછલી) અને ચતુર્થ ઉપભોક્તા (મગર) હોય છે. તેથી તૃતીય ઉપભોક્તા મોટી માછલી છે. ઝૂપ્લાંકટન પ્રાથમિક ઉપભોક્તા છે, નાની માછલી દ્વિતીય ઉપભોક્તા છે અને મગર ચતુર્થ ઉપભોક્તા છે.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લો:\n(1) ડેટ્રિટસ ખોરાક શૃંખલામાં ઉર્જાનો પ્રવાહ સૂર્યપ્રકાશથી શરૂ થાય છે.\n(2) ગ્રેઝિંગ ખોરાક શૃંખલામાં ઉર્જાનો પ્રવાહ મૃત કાર્બનિક પદાર્થોથી શરૂ થાય છે.\nઆમાંથી કયું/કયા વિધાન/વિધાનો સાચું/સાચાં છે?", "opts": ["માત્ર 1", "માત્ર 2", "1 અને 2 બંને", "એક પણ નહીં"], "ans": 3, "exp": "ડેટ્રિટસ ખોરાક શૃંખલામાં ઉર્જાનો પ્રવાહ મૃત કાર્બનિક પદાર્થોથી શરૂ થાય છે, જ્યારે ગ્રેઝિંગ ખોરાક શૃંખલામાં ઉર્જાનો પ્રવાહ સૂર્યપ્રકાશથી શરૂ થાય છે. તેથી બંને વિધાનો ખોટાં છે.", "ref": "Std 11 - પ્રકરણ 14: પર્યાવરણ અને પર્યાવરણીય સમસ્યાઓ", "ch": ""}, {"q": "એક જંગલમાં ખોરાક શૃંખલા આ મુજબ છે: ઘાસ → હરણ → વાઘ → સિંહ. જો આ શૃંખલામાં હરણની સંખ્યા અચાનક ઘટી જાય તો નીચેનામાંથી કયું પરિણામ સંભવિત નથી?", "opts": ["ઘાસની સંખ્યામાં વધારો થશે", "વાઘની સંખ્યામાં ઘટાડો થશે", "સિંહની સંખ્યામાં વધારો થશે", "પરિસ્થિતિકીય સંતુલન ખોરવાશે"], "ans": 0, "exp": "હરણની સંખ્યા ઘટવાથી ઘાસની સંખ્યા વધશે (કારણ કે હરણ ઓછા ઘાસ ખાશે), વાઘની સંખ્યા ઘટશે (ખોરાકની અછતને કારણે), અને પરિસ્થિતિકીય સંતુલન ખોરવાશે. પરંતુ સિંહની સંખ્યામાં વધારો થવો સંભવિત નથી કારણ કે વાઘની સંખ્યા ઘટવાથી સિંહને પણ ખોરાકની અછતનો સામનો કરવો પડશે.", "ref": "Std 12 - પ્રકરણ 13: સજીવો અને વસ્તી", "ch": ""}, {"q": "ખોરાક શૃંખલામાં '10% નિયમ' શું દર્શાવે છે?", "opts": ["દરેક પોષક સ્તરે ઉર્જાનું 10% જ ઉપલા સ્તરે સ્થાનાંતરિત થાય છે", "દરેક પોષક સ્તરે જૈવભારનું 10% જ ઉપલા સ્તરે સ્થાનાંતરિત થાય છે", "દરેક પોષક સ્તરે ઉર્જાનું 90% જ ઉપલા સ્તરે સ્થાનાંતરિત થાય છે", "દરેક પોષક સ્તરે જૈવભારનું 90% જ ઉપલા સ્તરે સ્થાનાંતરિત થાય છે"], "ans": 0, "exp": "ખોરાક શૃંખલામાં '10% નિયમ' અનુસાર, દરેક પોષક સ્તરે ઉર્જાનું માત્ર 10% જ ઉપલા સ્તરે સ્થાનાંતરિત થાય છે, બાકીનું 90% ઉર્જા શ્વસન, ઉષ્મા અને અન્ય કાર્યો માટે વપરાય છે. જૈવભાર માટે આ નિયમ સીધો લાગુ પડતો નથી.", "ref": "Std 11 - પ્રકરણ 14: પર્યાવરણ અને પર્યાવરણીય સમસ્યાઓ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન ખોરાક જાળ (ફૂડ વેબ) માટે સાચું નથી?", "opts": ["ખોરાક જાળમાં એક જ પ્રજાતિ એક કરતાં વધુ પોષક સ્તરે હોઈ શકે છે", "ખોરાક જાળમાં ઉર્જાનો પ્રવાહ એકદિશીય હોય છે", "ખોરાક જાળમાં એક કરતાં વધુ ખોરાક શૃંખલાઓ એકબીજા સાથે જોડાયેલી હોય છે", "ખોરાક જાળમાં પોષક તત્ત્વોનું ચક્રીય પરિવહન થાય છે"], "ans": 0, "exp": "ખોરાક જાળમાં ઉર્જાનો પ્રવાહ એકદિશીય નહીં, પરંતુ જટિલ અને બહુદિશીય હોય છે કારણ કે એક જ પ્રજાતિ અનેક પોષક સ્તરે હોઈ શકે છે. બાકીના વિધાનો સાચાં છે: એક પ્રજાતિ અનેક સ્તરે હોઈ શકે, અનેક શૃંખલાઓ જોડાયેલી હોય, અને પોષક તત્ત્વોનું ચક્રીય પરિવહન થાય છે.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લો: (1) ડેટ્રિટસ ખોરાક શૃંખલામાં ઉર્જાનો પ્રવાહ મૃત કાર્બનિક પદાર્થોથી શરૂ થાય છે. (2) ગ્રેઝિંગ ખોરાક શૃંખલામાં ઉર્જાનો પ્રવાહ ઉત્પાદકોથી શરૂ થાય છે. (3) ડેટ્રિટસ ખોરાક શૃંખલા ગ્રેઝિંગ ખોરાક શૃંખલા કરતાં વધુ કાર્યક્ષમ હોય છે. ઉપરોક્ત વિધાનોમાંથી કયું/કયા વિધાન ખોટું/ખોટાં છે?", "opts": ["માત્ર (1)", "માત્ર (3)", "(1) અને (2)", "(2) અને (3)"], "ans": 1, "exp": "વિધાન (1) અને (2) સાચાં છે કારણ કે ડેટ્રિટસ ખોરાક શૃંખલામાં ઉર્જાનો પ્રવાહ મૃત કાર્બનિક પદાર્થોથી શરૂ થાય છે, જ્યારે ગ્રેઝિંગ ખોરાક શૃંખલામાં ઉત્પાદકોથી શરૂ થાય છે. વિધાન (3) ખોટું છે કારણ કે ડેટ્રિટસ ખોરાક શૃંખલા ગ્રેઝિંગ ખોરાક શૃંખલા કરતાં ઓછી કાર્યક્ષમ હોય છે, કારણ કે તેમાં ઉર્જાનું નુકસાન વધુ થાય છે. આથી વિકલ્પ B સાચો છે.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "એક જંગલમાં ખોરાક શૃંખલા આ મુજબ છે: ઘાસ → તીડ → દેડકો → સાપ → ગરુડ. જો આ શૃંખલામાં દેડકાની સંખ્યામાં અચાનક ઘટાડો થાય, તો નીચેનામાંથી કયું પરિણામ સંભવિત નથી?", "opts": ["તીડની સંખ્યામાં વધારો થશે", "સાપની સંખ્યામાં ઘટાડો થશે", "ગરુડની સંખ્યામાં વધારો થશે", "ઘાસની સંખ્યામાં ઘટાડો થશે"], "ans": 2, "exp": "દેડકાની સંખ્યામાં ઘટાડો થતાં તીડની સંખ્યા વધશે (કારણ કે દેડકો તીડનો શિકાર કરે છે), જેના કારણે ઘાસની સંખ્યામાં ઘટાડો થશે. સાપની સંખ્યામાં ઘટાડો થશે કારણ કે તેમનો ખોરાક (દેડકો) ઓછો થશે. ગરુડની સંખ્યામાં વધારો થવો સંભવિત નથી કારણ કે તેમનો ખોરાક (સાપ) પણ ઘટશે. આથી વિકલ્પ C સાચો છે.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "ખોરાક શૃંખલામાં '10% નિયમ' સંદર્ભે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["ઉર્જાનું માત્ર 10% જ એક પોષક સ્તરથી બીજા પોષક સ્તરમાં સ્થાનાંતરિત થાય છે", "બાકીની 90% ઉર્જા શ્વસન, ઉષ્મા અને અન્ય કાર્યો માટે વપરાય છે", "આ નિયમ દર્શાવે છે કે ખોરાક શૃંખલામાં ઉર્જાનું સંપૂર્ણ સ્થાનાંતરણ થાય છે", "આ નિયમને કારણે ખોરાક શૃંખલામાં પોષક સ્તરોની સંખ્યા મર્યાદિત હોય છે"], "ans": 2, "exp": "વિધાન C ખોટું છે કારણ કે '10% નિયમ' દર્શાવે છે કે ઉર્જાનું માત્ર 10% જ એક પોષક સ્તરથી બીજા પોષક સ્તરમાં સ્થાનાંતરિત થાય છે, સંપૂર્ણ સ્થાનાંતરણ થતું નથી. અન્ય વિધાનો સાચાં છે. આથી વિકલ્પ C સાચો છે.", "ref": "Std 11 - પ્રકરણ 14: પર્યાવરણ અને સજીવો", "ch": ""}, {"q": "નીચેના પૈકી કયું ઉદાહરણ ખોરાક શૃંખલામાં 'ઓમનિવોર' (સર્વભક્ષી) સજીવનું નથી?", "opts": ["માનવ", "રીંછ", "સિંહ", "કાગડો"], "ans": 2, "exp": "સિંહ એક માંસાહારી (carnivore) સજીવ છે, જે માત્ર માંસ ખાય છે. માનવ, રીંછ અને કાગડો ઓમનિવોર છે, જે વનસ્પતિ અને પ્રાણીઓ બંને ખાય છે. આથી વિકલ્પ C સાચો છે.", "ref": "Std 11 - પ્રકરણ 14: પર્યાવરણ અને સજીવો", "ch": ""}, {"q": "એક જળીય પરિસ્થિતિકી તંત્રમાં નીચેની ખોરાક શૃંખલા જોવા મળે છે: ફાયટોપ્લાંકટન → ઝૂપ્લાંકટન → મચ્છરના લાર્વા → મચ્છર → કેપલર (Capeller). આ શૃંખલામાં કયા સજીવને 'ટર્શિયરી કન્ઝ્યૂમર' (તૃતીય ઉપભોક્તા) ગણવામાં આવે છે?", "opts": ["ફાયટોપ્લાંકટન", "ઝૂપ્લાંકટન", "મચ્છરના લાર્વા", "કેપલર"], "ans": 3, "exp": "ટર્શિયરી કન્ઝ્યૂમર એટલે તૃતીય ઉપભોક્તા, જે ખોરાક શૃંખલામાં ત્રીજા ક્રમે આવે છે અને પ્રાથમિક અને દ્વિતીય ઉપભોક્તાને ખાય છે. આ શૃંખલામાં: 1) ફાયટોપ્લાંકટન (પ્રોડ્યુસર), 2) ઝૂપ્લાંકટન (પ્રાથમિક ઉપભોક્તા), 3) મચ્છરના લાર્વા (દ્વિતીય ઉપભોક્તા), 4) મચ્છર (તૃતીય ઉપભોક્તા), 5) કેપલર (ચતુર્થ ઉપભોક્તા). પરંતુ પ્રશ્નમાં કેપલરને મચ્છર ખાય છે, એટલે કેપલર તૃતીય ઉપભોક્તા નથી પરંતુ ચતુર્થ છે. પરંતુ વિકલ્પોમાં કેપલર જ તૃતીય ઉપભોક્તા તરીકે ગણાય છે કારણ કે મચ્છરને ખાય છે. અહીં મચ્છર તૃતીય ઉપભોક્તા છે પરંતુ વિકલ્પોમાં નથી. એટલે કેપલરને તૃતીય ઉપભોક્તા ગણવામાં આવે છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "ખોરાક શૃંખલામાં 'ટર્ટિયરી કન્ઝ્યૂમર' તરીકે ઓળખાતા સજીવની ભૂમિકા કયા પર્યાવરણીય સ્તર સાથે સંકળાયેલી છે?", "opts": ["પ્રથમ પોષક સ્તર (પ્રોડ્યુસર)", "બીજા પોષક સ્તર (પ્રાથમિક ઉપભોક્તા)", "ત્રીજા પોષક સ્તર (દ્વિતીયક ઉપભોક્તા)", "ચોથા પોષક સ્તર (તૃતીયક ઉપભોક્તા)"], "ans": 3, "exp": "ટર્ટિયરી કન્ઝ્યૂમર એટલે તૃતીયક ઉપભોક્તા, જે ખોરાક શૃંખલાના ચોથા પોષક સ્તર પર આવે છે. પ્રોડ્યુસર (A) પ્રથમ સ્તર છે, પ્રાથમિક ઉપભોક્તા (B) બીજા સ્તર છે, અને દ્વિતીયક ઉપભોક્તા (C) ત્રીજા સ્તર છે. ટર્ટિયરી કન્ઝ્યૂમર (દા.ત. ગરૂડ) ચોથા સ્તર પર હોય છે, જે દ્વિતીયક ઉપભોક્તાને ખાય છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણ અને પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "ખોરાક શૃંખલામાં 'ડેટ્રિટિવોર' સજીવોની ભૂમિકા કયા ઉર્જા પ્રવાહના સિદ્ધાંત સાથે સંકળાયેલી નથી?", "opts": ["ઉર્જાનો એકદિશાત્મક પ્રવાહ", "ઉર્જાનો બહુસ્તરીય હસ્તાંતરણ", "ઉર્જાનો ચક્રીય પ્રવાહ", "ઉર્જાનું ઉત્સર્જન તરીકે નુકસાન"], "ans": 2, "exp": "ડેટ્રિટિવોર (દા.ત. કીડી, કૃમિ) મૃત કાર્બનિક પદાર્થોનું વિઘટન કરે છે, જે ઉર્જાનો એકદિશાત્મક પ્રવાહ (A), બહુસ્તરીય હસ્તાંતરણ (B), અને ઉત્સર્જન રૂપે નુકસાન (D) દર્શાવે છે. પરંતુ ઉર્જાનો ચક્રીય પ્રવાહ (C) ખોરાક શૃંખલામાં થતો નથી, કારણ કે ઉર્જા એકદિશાત્મક હોય છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણ અને પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "નીચેની ખોરાક શૃંખલામાં કયા સજીવને 'એપેક્સ પ્રિડેટર' કહેવામાં આવે છે? ઘાસ → કીડી → દેડકો → સાપ → ગરૂડ", "opts": ["કીડી", "દેડકો", "સાપ", "ગરૂડ"], "ans": 3, "exp": "એપેક્સ પ્રિડેટર એ ખોરાક શૃંખલાના શિખર પરનો શિકારી હોય છે, જેના પર કોઈ શિકારી નથી. આ શૃંખલામાં ગરૂડ (D) એપેક્સ પ્રિડેટર છે, કારણ કે તે સાપને ખાય છે અને તેના પર કોઈ શિકારી નથી. કીડી (A), દેડકો (B), અને સાપ (C) તેના પહેલાના સજીવો છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણ અને પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "ખોરાક શૃંખલામાં 'પેરાસાઇટ' સજીવોની ભૂમિકા કયા પોષક સ્તર સાથે સંકળાયેલી નથી?", "opts": ["પ્રાથમિક ઉપભોક્તા", "દ્વિતીયક ઉપભોક્તા", "તૃતીયક ઉપભોક્તા", "પ્રોડ્યુસર"], "ans": 3, "exp": "પેરાસાઇટ (પરોપજીવી) સજીવો જેવા કે જીવાણુઓ અથવા કૃમિ કોઈપણ પોષક સ્તર પર હાજર હોઈ શકે છે, પરંતુ તે પ્રોડ્યુસર (D) નથી, કારણ કે પ્રોડ્યુસર (દા.ત. છોડ) સ્વયં પોષી હોય છે. પેરાસાઇટ પ્રાથમિક (A), દ્વિતીયક (B), અથવા તૃતીયક (C) ઉપભોક્તા પર આશ્રિત હોઈ શકે છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણ અને પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "ખોરાક શૃંખલામાં 'બાયોમેગ્નિફિકેશન'ની ઘટના કયા પર્યાવરણીય પ્રદૂષક સાથે સૌથી વધુ સંકળાયેલી છે?", "opts": ["કાર્બન ડાયોક્સાઇડ", "DDT (ડી.ડી.ટી.)", "ઓક્સિજન", "નાઇટ્રોજન"], "ans": 1, "exp": "બાયોમેગ્નિફિકેશન એ ખોરાક શૃંખલામાં રસાયણિક પદાર્થોનું સાંદ્રણ વધવાની પ્રક્રિયા છે. DDT (B) એ એક જીવનાશક છે જે ખોરાક શૃંખલામાં ઉચ્ચ સ્તરે પહોંચીને શિકારીઓમાં સાંદ્રણ વધારે છે. કાર્બન ડાયોક્સાઇડ (A), ઓક્સિજન (C), અને નાઇટ્રોજન (D) બાયોમેગ્નિફિકેશન સાથે સંકળાયેલા નથી.", "ref": "Std 12 - Chapter 16: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "ખોરાક શૃંખલામાં 'કીટોપ્લાંકટન'ની ભૂમિકા કયા પોષક સ્તર પર આધારિત છે, જ્યારે તે ફાયટોપ્લાંકટન ખાય છે અને મોટા મત્સ્ય દ્વારા ખવાય છે?", "opts": ["પ્રથમ પોષક સ્તર (પ્રોડ્યુસર)", "દ્વિતીય પોષક સ્તર (પ્રાથમિક ઉપભોક્તા)", "તૃતીય પોષક સ્તર (દ્વિતીયક ઉપભોક્તા)", "ચતુર્થ પોષક સ્તર (ટર્ટિયરી ઉપભોક્તા)"], "ans": 1, "exp": "કીટોપ્લાંકટન ફાયટોપ્લાંકટન (પ્રોડ્યુસર) ખાય છે, જેથી તે પ્રાથમિક ઉપભોક્તા (દ્વિતીય પોષક સ્તર) ગણાય છે. મોટા મત્સ્ય તેને ખાય છે, પરંતુ તેની ભૂમિકા પ્રાથમિક ઉપભોક્તા તરીકે રહે છે. A) ખોટું છે કારણ કે પ્રોડ્યુસર ફાયટોપ્લાંકટન છે. C) અને D) ખોટાં છે કારણ કે કીટોપ્લાંકટન દ્વિતીયક અથવા ટર્ટિયરી ઉપભોક્તા નથી.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને તેના ઘટકો", "ch": ""}, {"q": "ખોરાક શૃંખલામાં 'બાયોએક્યુમ્યુલેશન' અને 'બાયોમેગ્નિફિકેશન' વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["બાયોએક્યુમ્યુલેશનમાં પ્રદૂષકોની સાંદ્રતા સજીવના જીવનકાળ દરમિયાન વધે છે, જ્યારે બાયોમેગ્નિફિકેશનમાં તે ખોરાક શૃંખલાના સ્તર સાથે વધે છે.", "બાયોએક્યુમ્યુલેશન ખોરાક શૃંખલાના સ્તર સાથે સંબંધિત છે, જ્યારે બાયોમેગ્નિફિકેશન સજીવના જીવનકાળ સાથે સંબંધિત છે.", "બાયોએક્યુમ્યુલેશન અને બાયોમેગ્નિફિકેશન એકબીજાના પર્યાયવાચી શબ્દો છે.", "બાયોએક્યુમ્યુલેશન ફક્ત જળીય પરિસ્થિતિકી તંત્રમાં જોવા મળે છે, જ્યારે બાયોમેગ્નિફિકેશન ફક્ત સ્થળીય પરિસ્થિતિકી તંત્રમાં જોવા મળે છે."], "ans": 0, "exp": "બાયોએક્યુમ્યુલેશનમાં પ્રદૂષકોની સાંદ્રતા સજીવના જીવનકાળ દરમિયાન વધે છે (ઉદા. મત્સ્યમાં પારોનું સંગ્રહ), જ્યારે બાયોમેગ્નિફિકેશનમાં પ્રદૂષકોની સાંદ્રતા ખોરાક શૃંખલાના ઉચ્ચ સ્તરે જાય ત્યારે વધે છે (ઉદા. ટોચના શિકારીમાં DDTની સાંદ્રતા). B) ખોટું છે કારણ કે બાયોમેગ્નિફિકેશન ખોરાક શૃંખલાના સ્તર સાથે સંબંધિત છે. C) ખોટું છે કારણ કે તે બે ભિન્ન ઘટનાઓ છે. D) ખોટું છે કારણ કે બંને ઘટનાઓ જળીય અને સ્થળીય પરિસ્થિતિકી તંત્રમાં જોવા મળે છે.", "ref": "Std 12 - Chapter 16: પર્યાવરણીય સમસ્યાઓ", "ch": ""}, {"q": "નીચેની ખોરાક શૃંખલામાં કયો સજીવ 'ડેટ્રિટિવોર' નથી? ઘાસ → કીડી → દેડકો → સર્પ → ગરૂડ", "opts": ["કીડી", "દેડકો", "સર્પ", "ગરૂડ"], "ans": 0, "exp": "ડેટ્રિટિવોર સજીવો મૃત કાર્બનિક પદાર્થો પર આધારિત હોય છે. આ શૃંખલામાં કોઈપણ સજીવ ડેટ્રિટિવોર નથી, પરંતુ કીડી (A) મૃત પદાર્થો ખાઈ શકે છે, પરંતુ આ શૃંખલામાં તે જીવંત ઘાસ ખાય છે, જેથી તે પ્રાથમિક ઉપભોક્તા છે. B), C), અને D) શિકારી છે, જેઓ જીવંત પ્રાણીઓ ખાય છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને તેના ઘટકો", "ch": ""}, {"q": "ખોરાક શૃંખલામાં 'એનર્જી પાયરામિડ' અને 'બાયોમાસ પાયરામિડ' વચ્ચેનો તફાવત કયો છે?", "opts": ["એનર્જી પાયરામિડ હંમેશા સીધો હોય છે, જ્યારે બાયોમાસ પાયરામિડ ક્યારેક ઉલટો હોઈ શકે છે.", "બાયોમાસ પાયરામિડ હંમેશા સીધો હોય છે, જ્યારે એનર્જી પાયરામિડ ક્યારેક ઉલટો હોઈ શકે છે.", "એનર્જી પાયરામિડ અને બાયોમાસ પાયરામિડ હંમેશા સીધા હોય છે.", "એનર્જી પાયરામિડ અને બાયોમાસ પાયરામિડ હંમેશા ઉલટા હોય છે."], "ans": 0, "exp": "એનર્જી પાયરામિડ હંમેશા સીધો હોય છે કારણ કે ઉર્જાનો પ્રવાહ એક દિશામાં જ હોય છે (10% નિયમ). બાયોમાસ પાયરામિડ ક્યારેક ઉલટો હોઈ શકે છે, ઉદા. વૃક્ષ પર આધારિત ખોરાક શૃંખલામાં, જ્યાં પ્રોડ્યુસર (વૃક્ષ)નો બાયોમાસ પ્રાથમિક ઉપભોક્તા (કીડી) કરતાં વધુ હોય છે. B), C), અને D) ખોટાં છે કારણ કે તે એનર્જી પાયરામિડની લાક્ષણિકતાને ચૂકી જાય છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને તેના ઘટકો", "ch": ""}, {"q": "એક જળીય પરિસ્થિતિકી તંત્રમાં નીચે મુજબની ખોરાક શૃંખલા જોવા મળે છે: ફાયટોપ્લાંકટન → ઝૂપ્લાંકટન → નાની માછલી → મોટી માછલી → મગર. આ શૃંખલામાં 'બાયોમેગ્નિફિકેશન'ની ઘટના માટે નીચેનામાંથી કયું વિધાન અપવાદરૂપ ગણી શકાય?", "opts": ["મગરમાં પારો (mercury)નું પ્રમાણ ફાયટોપ્લાંકટન કરતાં 10,000 ગણું વધારે જોવા મળે છે", "ઝૂપ્લાંકટનમાં DDTનું પ્રમાણ નાની માછલી કરતાં ઓછું હોય છે કારણ કે ઝૂપ્લાંકટન સ્વયંપોષી છે", "મોટી માછલીમાં PCBનું પ્રમાણ નાની માછલી કરતાં વધારે હોય છે પરંતુ તેનું પ્રમાણ મગરમાં સૌથી વધારે નથી", "ફાયટોપ્લાંકટનમાં ભારે ધાતુઓનું પ્રમાણ શૂન્ય હોય છે કારણ કે તે પ્રકાશસંશ્લેષણ દ્વારા ખોરાક બનાવે છે"], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B છે. બાયોમેગ્નિફિકેશનની ઘટનામાં દરેક ઉચ્ચ પોષક સ્તરે પ્રદૂષકોનું પ્રમાણ વધતું જાય છે. ઝૂપ્લાંકટન વિષમપોષી (હેટરોટ્રોફ) છે, સ્વયંપોષી નહીં, તેથી તેમાં DDTનું પ્રમાણ નાની માછલી કરતાં ઓછું ન હોઈ શકે. વિકલ્પ A, C અને D બાયોમેગ્નિફિકેશનના સિદ્ધાંત સાથે સુસંગત છે. વિકલ્પ Aમાં મગરમાં પારાનું પ્રમાણ વધારે હોવું સાચું છે. વિકલ્પ Cમાં PCBનું પ્રમાણ મગરમાં સૌથી વધારે હોવું જોઈએ, પરંતુ તે અપવાદ નથી. વિકલ્પ Dમાં ફાયટોપ્લાંકટનમાં ભારે ધાતુઓનું પ્રમાણ શૂન્ય ન પણ હોય, પરંતુ તે અપવાદ નથી.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "એક જંગલની ખોરાક શૃંખલામાં નીચેની પરિસ્થિતિ જોવા મળે છે: ઘાસ → કીડી → દેડકો → સાપ → ગરૂડ. આ શૃંખલામાં કયો સજીવ 'ટર્ટિયરી કન્ઝ્યૂમર' અને 'ક્વોટરનરી કન્ઝ્યૂમર' વચ્ચેનો સંક્રમણકાળીન સજીવ ગણી શકાય?", "opts": ["કીડી", "દેડકો", "સાપ", "ગરૂડ"], "ans": 2, "exp": "સાપ એ ટર્ટિયરી કન્ઝ્યૂમર (તૃતીય ઉપભોક્તા) છે કારણ કે તે દેડકો (દ્વિતીય ઉપભોક્તા) ખાય છે, જ્યારે ગરૂડ ક્વોટરનરી કન્ઝ્યૂમર (ચતુર્થ ઉપભોક્તા) છે કારણ કે તે સાપ ખાય છે. આમ, સાપ એ બંને વચ્ચેનો સંક્રમણકાળીન સજીવ છે. કીડી પ્રાથમિક ઉપભોક્તા છે, દેડકો દ્વિતીય ઉપભોક્તા છે, અને ગરૂડ ચરમ શિકારી છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "ખોરાક શૃંખલામાં 'બાયોમેગ્નિફિકેશન'ની ઘટના કયા પ્રદૂષકમાં સૌથી વધુ જોવા મળે છે, જ્યાં તેનો સાંદ્રતા સજીવના શરીરમાં પોષક સ્તર અનુસાર વધતી જાય છે?", "opts": ["કાર્બન ડાયોક્સાઇડ", "DDT (ડિક્લોરોડિફિનાઇલટ્રાઇક્લોરોઇથેન)", "ઓક્સિજન", "નાઇટ્રોજન"], "ans": 1, "exp": "DDT એ એક જંતુનાશક છે જે ખોરાક શૃંખલામાં બાયોમેગ્નિફિકેશન દર્શાવે છે, જ્યાં તેની સાંદ્રતા ઉચ્ચ પોષક સ્તરના સજીવોમાં (જેવા કે ચરમ શિકારીઓ) વધુ હોય છે. કાર્બન ડાયોક્સાઇડ, ઓક્સિજન અને નાઇટ્રોજન એવા પ્રદૂષકો નથી જે બાયોમેગ્નિફિકેશન દર્શાવે.", "ref": "Std 12 - Chapter 16: પર્યાવરણીય સમસ્યાઓ", "ch": ""}, {"q": "નીચેની ખોરાક શૃંખલામાં કયો સજીવ 'ડેટ્રિટિવોર' નથી, પરંતુ તે ડેટ્રિટસ ખોરાક શૃંખલામાં મહત્વની ભૂમિકા ભજવે છે? મૃત પર્ણ → કીડી → ફૂગ → જીવાણુ", "opts": ["કીડી", "ફૂગ", "જીવાણુ", "મૃત પર્ણ"], "ans": 1, "exp": "ફૂગ એ ડિકોમ્પોઝર (વિઘટક) છે, જે ડેટ્રિટસ ખોરાક શૃંખલામાં મહત્વની ભૂમિકા ભજવે છે, પરંતુ તે 'ડેટ્રિટિવોર' નથી. કીડી અને જીવાણુ ડેટ્રિટિવોર છે, જ્યારે મૃત પર્ણ એ ડેટ્રિટસ છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "એક જળીય ખોરાક શૃંખલામાં નીચેની પરિસ્થિતિ જોવા મળે છે: ફાયટોપ્લાંકટન → ઝૂપ્લાંકટન → મચ્છલી → ડોલ્ફિન. આ શૃંખલામાં કયો સજીવ 'ક્વોટરનરી કન્ઝ્યૂમર' તરીકે ઓળખાય છે અને તેના પોષક સ્તર પર કેટલી ટકા ઉર્જા પહોંચે છે (10% નિયમ અનુસાર)?", "opts": ["ડોલ્ફિન, 0.01%", "મચ્છલી, 0.1%", "ઝૂપ્લાંકટન, 1%", "ફાયટોપ્લાંકટન, 10%"], "ans": 0, "exp": "ડોલ્ફિન આ શૃંખલાનો સર્વોચ્ચ શિકારી (એપેક્સ પ્રિડેટર) છે અને ક્વોટરનરી કન્ઝ્યૂમર તરીકે ઓળખાય છે. 10% નિયમ અનુસાર, ઉર્જાનો પ્રવાહ દરેક પોષક સ્તરે 10% ઘટે છે. ફાયટોપ્લાંકટન (પ્રથમ પોષક સ્તર) પાસે 100% ઉર્જા હોય, તો ડોલ્ફિન (ચોથા પોષક સ્તરે) પાસે 10^-4 (0.01%) ઉર્જા પહોંચે. મચ્છલી ત્રીજા સ્તરે છે (0.1%), ઝૂપ્લાંકટન બીજા સ્તરે છે (1%), અને ફાયટોપ્લાંકટન પ્રથમ સ્તરે છે (100%).", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "એક જંગલના પરિસ્થિતિકી તંત્રમાં નીચેની ખોરાક શૃંખલા જોવા મળે છે: લીલ → ગોકળગાય → દેડકો → સાપ. આ શૃંખલામાં 'સાપ'ને 'એપેક્સ પ્રિડેટર' તરીકે ઓળખવામાં આવે છે, પરંતુ નીચેનામાંથી કયું વિધાન આ સંદર્ભમાં ખોટું છે?", "opts": ["સાપને કોઈ કુદરતી શિકારી ન હોવાથી તે 'એપેક્સ પ્રિડેટર' કહેવાય છે", "આ શૃંખલામાં સાપને 'ટર્ટિયરી કન્ઝ્યૂમર' તરીકે ઓળખવામાં આવે છે", "સાપની વસ્તી પર નિયંત્રણ રાખવા માટે આ શૃંખલામાં તેના ઉપર કોઈ સજીવ હોવો જરૂરી નથી", "સાપને 'એપેક્સ પ્રિડેટર' તરીકે ઓળખવા માટે તેનું સ્થાન ખોરાક શૃંખલાના સૌથી ઉપરના સ્તરે હોવું જરૂરી છે"], "ans": 2, "exp": "સાપને 'એપેક્સ પ્રિડેટર' તરીકે ઓળખવામાં આવે છે કારણ કે તેને કોઈ કુદરતી શિકારી હોતો નથી અને તે ખોરાક શૃંખલાના સૌથી ઉપરના સ્તરે હોય છે. વિકલ્પ A, B અને D સાચા છે. પરંતુ વિકલ્પ C ખોટો છે કારણ કે પરિસ્થિતિકી તંત્રમાં દરેક સજીવની વસ્તી પર કોઈને કોઈ રીતે નિયંત્રણ હોય છે, જેમ કે રોગ, હવામાન પરિવર્તન અથવા માનવ પ્રવૃત્તિઓ. 'એપેક્સ પ્રિડેટર' હોવા છતાં તેની વસ્તી પર પરોક્ષ રીતે નિયંત્રણ હોઈ શકે છે.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "નીચેના પૈકી કયું ઉદાહરણ ખોરાક શૃંખલામાં 'સ્કેવેન્જર' (મૃતભક્ષી) સજીવનું નથી, પરંતુ તે 'ડેટ્રિટિવોર' સજીવનું છે?", "opts": ["ગીધ", "કાગડો", "કીડી", "શિયાળ"], "ans": 2, "exp": "ગીધ, કાગડો અને શિયાળ 'સ્કેવેન્જર' (મૃતભક્ષી) સજીવો છે કારણ કે તેઓ મૃત પ્રાણીઓનું ભક્ષણ કરે છે. જ્યારે કીડી 'ડેટ્રિટિવોર' સજીવ છે કારણ કે તે મૃત કાર્બનિક પદાર્થોનું વિઘટન કરીને પોષક તત્ત્વો પરત પર્યાવરણમાં મુક્ત કરે છે. તેથી વિકલ્પ C સાચો છે.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "એક જંગલના પરિસ્થિતિકી તંત્રમાં ખોરાક શૃંખલા નીચે મુજબ છે: ઘાસ → હરણ → વાઘ. જો આ પરિસ્થિતિકી તંત્રમાં 'ડીડીટી' (DDT) જેવા અવિઘટનીય પ્રદૂષકનું પ્રમાણ વધે, તો નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["વાઘમાં ડીડીટીનું પ્રમાણ હરણ કરતાં વધુ હશે", "ઘાસમાં ડીડીટીનું પ્રમાણ વાઘ કરતાં ઓછું હશે", "ડીડીટીનું પ્રમાણ ખોરાક શૃંખલાના દરેક પોષક સ્તરે સમાન રહેશે", "હરણમાં ડીડીટીનું પ્રમાણ ઘાસ કરતાં વધુ હશે, પરંતુ વાઘ કરતાં ઓછું હશે"], "ans": 2, "exp": "ડીડીટી જેવા અવિઘટનીય પ્રદૂષકો બાયોમેગ્નિફિકેશનની પ્રક્રિયા દ્વારા ખોરાક શૃંખલાના ઉચ્ચ પોષક સ્તરે સંચિત થાય છે. તેથી વાઘમાં ડીડીટીનું પ્રમાણ સૌથી વધુ અને ઘાસમાં સૌથી ઓછું હશે. વિકલ્પ C ખોટો છે કારણ કે તે દર્શાવે છે કે પ્રદૂષકનું પ્રમાણ બધા સ્તરે સમાન રહે છે, જે બાયોમેગ્નિફિકેશનના સિદ્ધાંત વિરુદ્ધ છે. બાકીના વિકલ્પો બાયોમેગ્નિફિકેશનના સિદ્ધાંત સાથે સુસંગત છે.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "ખોરાક શૃંખલામાં 'બાયોમેગ્નિફિકેશન'ની ઘટના કયા પ્રદૂષક સાથે સૌથી વધુ સંકળાયેલી છે, જ્યાં તેની સાંદ્રતા પોષક સ્તર સાથે વધે છે?", "opts": ["કાર્બન ડાયોક્સાઇડ", "ડીડીટી (DDT)", "ઓક્સિજન", "નાઇટ્રોજન"], "ans": 1, "exp": "બાયોમેગ્નિફિકેશનમાં, પ્રદૂષકની સાંદ્રતા પોષક સ્તર સાથે વધે છે. ડીડીટી (DDT) એક જીવનાશક છે જે ખોરાક શૃંખલામાં ઉચ્ચ પોષક સ્તરે પહોંચતાં તેની સાંદ્રતા વધે છે, જેને બાયોમેગ્નિફિકેશન કહેવાય છે. કાર્બન ડાયોક્સાઇડ, ઓક્સિજન, અને નાઇટ્રોજન આ ઘટના સાથે સંકળાયેલા નથી.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "એક જંગલના પરિસ્થિતિકી તંત્રમાં ખોરાક શૃંખલા નીચે મુજબ છે: લીલ → કીડી → દેડકો → સાપ → ગરૂડ. આ શૃંખલામાં કયા સજીવમાં બાયોએક્યુમ્યુલેશન અને બાયોમેગ્નિફિકેશન બંને ઘટનાઓ જોવા મળે છે?", "opts": ["લીલ - તે પ્રાથમિક ઉત્પાદક છે અને પ્રદૂષકો જમા કરતી નથી", "કીડી - તે પ્રાથમિક કન્ઝ્યૂમર છે અને પ્રદૂષકોની નીચી સાંદ્રતા ધરાવે છે", "ગરૂડ - તે એપેક્સ પ્રિડેટર છે અને ઉચ્ચ પોષક સ્તરે પ્રદૂષકોની સાંદ્રતા વધુ હોય છે", "સાપ - તે તૃતીયક કન્ઝ્યૂમર છે અને પ્રદૂષકોની મધ્યમ સાંદ્રતા ધરાવે છે"], "ans": 2, "exp": "ગરૂડ એપેક્સ પ્રિડેટર છે અને ઉચ્ચ પોષક સ્તરે હોવાથી બાયોએક્યુમ્યુલેશન (પ્રદૂષકોનું સંગ્રહણ) અને બાયોમેગ્નિફિકેશન (પોષક સ્તર સાથે પ્રદૂષકોની સાંદ્રતામાં વૃદ્ધિ) બંને ઘટનાઓ જોવા મળે છે. લીલ પ્રદૂષકો જમા કરતી નથી, કીડી અને સાપમાં પ્રદૂષકોની સાંદ્રતા નીચી અથવા મધ્યમ હોય છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "નીચેના પૈકી કયું ઉદાહરણ ખોરાક શૃંખલામાં 'કીસ્ટોન પ્રજાતિ' (Keystone Species)નું નથી, પરંતુ તે પરિસ્થિતિકી તંત્રમાં મહત્ત્વપૂર્ણ ભૂમિકા ભજવે છે?", "opts": ["દરિયાઈ ઓટર (Sea Otter) જે દરિયાઈ અર્ચિનની વસ્તીને નિયંત્રિત કરે છે.", "વાઘ જે હરણની વસ્તીને નિયંત્રિત કરી જંગલની વનસ્પતિનું સંતુલન જાળવે છે.", "કીડી જે મૃત કાર્બનિક પદાર્થોનું વિઘટન કરી પોષક તત્ત્વોનું પુનઃચક્રીયકરણ કરે છે.", "હાથી જે જંગલમાં વૃક્ષોને નુકસાન પહોંચાડી ઘાસના મેદાનોનું નિર્માણ કરે છે."], "ans": 2, "exp": "કીડી 'કીસ્ટોન પ્રજાતિ' નથી કારણ કે તે મુખ્યત્વે વિઘટક તરીકે કાર્ય કરે છે અને પરિસ્થિતિકી તંત્રમાં પોષક તત્ત્વોના પુનઃચક્રીયકરણમાં મદદ કરે છે, પરંતુ તે પરિસ્થિતિકી તંત્રના માળખાને સીધી રીતે નિયંત્રિત કરતી નથી. અન્ય વિકલ્પો કીસ્ટોન પ્રજાતિઓના ઉદાહરણો છે કારણ કે તેઓ પરિસ્થિતિકી તંત્રના સંતુલન અને માળખાને નિયંત્રિત કરે છે.", "ref": "Std 12 - પ્રકરણ 13: સજીવો અને વસ્તી", "ch": ""}, {"q": "ખોરાક શૃંખલામાં 'પ્રાથમિક ઉત્પાદક' તરીકે ઓળખાતા સજીવો દ્વારા સંપાદિત ઉર્જાનો સ્રોત કયો હોય છે, જ્યારે તે સજીવો પાણીની અંદર રહેતા હોય છે અને પ્રકાશસંશ્લેષણ કરતા નથી?", "opts": ["સૂર્યપ્રકાશ", "રાસાયણિક ઉર્જા (કેમોસિનથેસિસ)", "મૃત કાર્બનિક પદાર્થો", "અન્ય સજીવો દ્વારા ઉત્સર્જિત કાર્બન ડાયોક્સાઇડ"], "ans": 1, "exp": "પ્રાથમિક ઉત્પાદકો જે પાણીની અંદર રહેતા હોય અને પ્રકાશસંશ્લેષણ કરતા નથી તે કેમોસિનથેટિક બેક્ટેરિયા હોય છે, જે રાસાયણિક ઉર્જા (જેમ કે હાઇડ્રોજન સલ્ફાઇડ)નો ઉપયોગ કરીને કાર્બનિક પદાર્થોનું નિર્માણ કરે છે. સૂર્યપ્રકાશ (A) ફોટોસિનથેસિસ માટે જરૂરી છે, મૃત કાર્બનિક પદાર્થો (C) ડેટ્રિટિવોર માટે છે, અને CO2 (D) પ્રકાશસંશ્લેષણ માટે કચ્છો પદાર્થ છે, પરંતુ ઉર્જાનો સ્રોત નથી.", "ref": "Std 12 - અધ્યાય 14: પર્યાવરણ અને તેના સંબંધિત મુદ્દાઓ", "ch": ""}, {"q": "ખોરાક શૃંખલામાં 'સેકન્ડરી કન્ઝ્યૂમર' તરીકે ઓળખાતા સજીવોની પોષક સ્તર પર કયા પ્રકારના સજીવોની સંખ્યા સૌથી ઓછી હોય છે, જ્યારે તે સજીવો એપેક્સ પ્રિડેટર તરીકે પણ કામ કરે છે?", "opts": ["શાકાહારી", "માંસાહારી", "સર્વભક્ષી", "પરોપજીવી"], "ans": 1, "exp": "એપેક્સ પ્રિડેટર સેકન્ડરી અથવા ટર્ટિયરી કન્ઝ્યૂમર હોય છે અને તે માંસાહારી (B) હોય છે. શાકાહારી (A) પ્રાથમિક કન્ઝ્યૂમર હોય છે, સર્વભક્ષી (C) મિશ્ર આહાર લે છે, અને પરોપજીવી (D) પોષક સ્તરમાં અલગ ગણાય છે. એપેક્સ પ્રિડેટર માંસાહારી જ હોય છે અને તેની સંખ્યા સૌથી ઓછી હોય છે.", "ref": "Std 12 - અધ્યાય 14: પર્યાવરણ અને તેના સંબંધિત મુદ્દાઓ", "ch": ""}, {"q": "ખોરાક શૃંખલામાં 'ડેટ્રિટસ ખોરાક શૃંખલા' અને 'ગ્રેઝીંગ ખોરાક શૃંખલા' વચ્ચેનો મુખ્ય તફાવત કયો છે, જ્યારે બંનેમાં ઉર્જાનો પ્રવાહ એક જ દિશામાં થાય છે?", "opts": ["ડેટ્રિટસ ખોરાક શૃંખલામાં ઉર્જાનો સ્રોત સૂર્યપ્રકાશ હોય છે", "ગ્રેઝીંગ ખોરાક શૃંખલામાં ઉર્જાનો સ્રોત મૃત કાર્બનિક પદાર્થો હોય છે", "ડેટ્રિટસ ખોરાક શૃંખલામાં ઉર્જાનો સ્રોત મૃત કાર્બનિક પદાર્થો હોય છે", "ગ્રેઝીંગ ખોરાક શૃંખલામાં ઉર્જાનો પ્રવાહ બે દિશામાં થાય છે"], "ans": 2, "exp": "ડેટ્રિટસ ખોરાક શૃંખલામાં ઉર્જાનો સ્રોત મૃત કાર્બનિક પદાર્થો (C) હોય છે, જ્યારે ગ્રેઝીંગ ખોરાક શૃંખલામાં ઉર્જાનો સ્રોત સૂર્યપ્રકાશ હોય છે. A અને B ખોટા છે કારણ કે તે ઉલટા વિધાનો છે. D ખોટું છે કારણ કે ઉર્જાનો પ્રવાહ હંમેશા એક દિશામાં જ થાય છે.", "ref": "Std 12 - અધ્યાય 14: પર્યાવરણ અને તેના સંબંધિત મુદ્દાઓ", "ch": ""}, {"q": "ખોરાક શૃંખલામાં 'કીસ્ટોન પ્રજાતિ' (Keystone Species)ની ભૂમિકા કયા પર્યાવરણીય તંત્રમાં સૌથી વધુ મહત્વની હોય છે, જ્યારે તે પ્રજાતિની હાજરી અથવા ગેરહાજરી પરિસ્થિતિકી તંત્રની રચનાને મહત્વપૂર્ણ રીતે અસર કરે છે?", "opts": ["મરુભૂમિ", "વરસાદી જંગલ", "કોરલ રીફ", "ટુંડ્રા"], "ans": 2, "exp": "કોરલ રીફ (C)માં કીસ્ટોન પ્રજાતિઓ (જેમ કે સી ઓટર)ની ભૂમિકા સૌથી મહત્વની હોય છે કારણ કે તે પરિસ્થિતિકી તંત્રની રચનાને સંતુલિત રાખે છે. મરુભૂમિ (A), વરસાદી જંગલ (B), અને ટુંડ્રા (D)માં કીસ્ટોન પ્રજાતિઓની અસર ઓછી જોવા મળે છે.", "ref": "Std 12 - અધ્યાય 15: જૈવ વિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "એક જંગલની ખોરાક શૃંખલામાં નીચેની પરિસ્થિતિ જોવા મળે છે: લીલ → કીડી → દેડકો → સાપ → ગરૂડ. આ શૃંખલામાં કયો સજીવ 'ક્વેટરનરી કન્ઝ્યૂમર' તરીકે ઓળખાય છે?", "opts": ["કીડી", "દેડકો", "સાપ", "ગરૂડ"], "ans": 3, "exp": "ગરૂડ આ શૃંખલાનો સર્વોચ્ચ શિકારી (એપેક્સ પ્રિડેટર) છે, જે 'ક્વેટરનરી કન્ઝ્યૂમર' તરીકે ઓળખાય છે. કીડી પ્રાથમિક કન્ઝ્યૂમર, દેડકો સેકન્ડરી કન્ઝ્યૂમર, અને સાપ ટર્ટિયરી કન્ઝ્યૂમર છે. ગરૂડ ચોથા સ્તરે આહાર લે છે, તેથી તે ક્વેટરનરી કન્ઝ્યૂમર છે.", "ref": "Std 12 - અધ્યાય 14: પર્યાવરણ અને પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લો: (1) ડેટ્રિટસ ખોરાક શૃંખલામાં, ઉર્જાનો પ્રવાહ મૃત કાર્બનિક પદાર્થોથી શરૂ થાય છે. (2) ગ્રેઝીંગ ખોરાક શૃંખલામાં, ઉર્જાનો પ્રવાહ સૂર્યપ્રકાશથી શરૂ થાય છે. (3) ડેટ્રિટસ ખોરાક શૃંખલામાં, ડેટ્રિટિવોર સજીવો દ્વારા ઉર્જાનો પ્રવાહ સીધો જ પ્રાથમિક ઉત્પાદક તરફ વહે છે. (4) ગ્રેઝીંગ ખોરાક શૃંખલામાં, પ્રાથમિક ઉત્પાદકો દ્વારા સંપાદિત ઉર્જા સૂર્યપ્રકાશમાંથી મળે છે. ઉપરોક્ત વિધાનો પૈકી કયા વિધાનો સાચાં છે?", "opts": ["(1), (2) અને (4)", "(1), (2) અને (3)", "(2), (3) અને (4)", "(1), (3) અને (4)"], "ans": 0, "exp": "ડેટ્રિટસ ખોરાક શૃંખલામાં ઉર્જાનો પ્રવાહ મૃત કાર્બનિક પદાર્થોથી શરૂ થાય છે (1 સાચું). ગ્રેઝીંગ ખોરાક શૃંખલામાં ઉર્જાનો પ્રવાહ સૂર્યપ્રકાશથી શરૂ થાય છે (2 સાચું). ડેટ્રિટિવોર સજીવો દ્વારા ઉર્જાનો પ્રવાહ પ્રાથમિક ઉત્પાદક તરફ વહેતો નથી, પરંતુ મૃત પદાર્થોના વિઘટન દ્વારા ઉર્જા મુક્ત થાય છે (3 ખોટું). ગ્રેઝીંગ ખોરાક શૃંખલામાં પ્રાથમિક ઉત્પાદકો દ્વારા સંપાદિત ઉર્જા સૂર્યપ્રકાશમાંથી મળે છે (4 સાચું). આમ, (1), (2) અને (4) સાચાં છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણ અને પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન ખોરાક શૃંખલામાં 'કીસ્ટોન પ્રજાતિ' (Keystone Species) માટે સાચું નથી?", "opts": ["તે પરિસ્થિતિકી તંત્રની રચના અને કાર્યમાં મહત્વની ભૂમિકા ભજવે છે.", "તેની હાજરી અથવા અનુપસ્થિતિથી પરિસ્થિતિકી તંત્રમાં મહત્વપૂર્ણ ફેરફાર થાય છે.", "તે હંમેશા ખોરાક શૃંખલાના ટોચના શિકારી (એપેક્સ પ્રિડેટર) હોય છે.", "તે પરિસ્થિતિકી તંત્રમાં જૈવવિવિધતાને ટકાવી રાખવામાં મદદ કરે છે."], "ans": 2, "exp": "કીસ્ટોન પ્રજાતિ પરિસ્થિતિકી તંત્રની રચના અને કાર્યમાં મહત્વની ભૂમિકા ભજવે છે (A સાચું). તેની હાજરી અથવા અનુપસ્થિતિથી પરિસ્થિતિકી તંત્રમાં મહત્વપૂર્ણ ફેરફાર થાય છે (B સાચું). તે હંમેશા ખોરાક શૃંખલાના ટોચના શિકારી (એપેક્સ પ્રિડેટર) હોતી નથી, ઉદાહરણ તરીકે, સી ઓટર (Sea Otter) કીસ્ટોન પ્રજાતિ છે પરંતુ એપેક્સ પ્રિડેટર નથી (C ખોટું). તે પરિસ્થિતિકી તંત્રમાં જૈવવિવિધતાને ટકાવી રાખવામાં મદદ કરે છે (D સાચું).", "ref": "Std 12 - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "ખોરાક શૃંખલામાં 'એપેક્સ પ્રિડેટર' તરીકે ઓળખાતા સજીવની ભૂમિકા કયા પર્યાવરણીય સ્તર સાથે સંકળાયેલી છે?", "opts": ["પ્રાથમિક ઉત્પાદક", "પ્રાથમિક ઉપભોક્તા", "તૃતીયક ઉપભોક્તા", "ડેટ્રિટિવોર"], "ans": 2, "exp": "એપેક્સ પ્રિડેટર એ ખોરાક શૃંખલામાં સર્વોચ્ચ શિકારી હોય છે, જે તૃતીયક ઉપભોક્તા તરીકે ઓળખાય છે. પ્રાથમિક ઉત્પાદક (ઉદા. ઘાસ), પ્રાથમિક ઉપભોક્તા (ઉદા. હરણ), અને ડેટ્રિટિવોર (ઉદા. કીડી) એપેક્સ પ્રિડેટર નથી.", "ref": "Std 12 - Chapter 14: પર્યાવરણ અને તેના સંરક્ષણ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
