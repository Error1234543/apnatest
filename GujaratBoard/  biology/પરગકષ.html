<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પરાગકોષ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>પરાગકોષ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">પરાગકોષ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એકસદની વનસ્પતિમાં પરાગરજનું નિર્માણ કયા પ્રકારના કોષવિભાજન દ્વારા થાય છે?", "opts": ["સમભાજન (મિટોસિસ)", "અર્ધસૂત્રીભાજન (મિયોસિસ)", "અસમભાજન (અમિટોસિસ)", "સમભાજન અને અર્ધસૂત્રીભાજન બંને"], "ans": 1, "exp": "પરાગરજનું નિર્માણ પરાગાશયમાં થતું અર્ધસૂત્રીભાજન (મિયોસિસ) દ્વારા થાય છે, જેના પરિણામે હેપ્લોઇડ પરાગકોષો ઉત્પન્ન થાય છે. સમભાજન (મિટોસિસ) દ્વારા દ્વિતીય કોષકેન્દ્રીય કોષોનું નિર્માણ થાય છે, પરંતુ પ્રાથમિક પરાગકોષો અર્ધસૂત્રીભાજનથી જ બને છે. અસમભાજન વનસ્પતિમાં ભાગ્યે જ જોવા મળે છે અને તે પરાગરજના નિર્માણમાં સંકળાયેલ નથી.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "પરાગરજની દીવાલમાં સ્પોરોપોલેનિન નામનું દ્રવ્ય જોવા મળે છે. આ દ્રવ્યનું મુખ્ય કાર્ય શું છે?", "opts": ["પરાગરજને પોષણ પૂરું પાડવું", "પરાગરજને યાંત્રિક અને પર્યાવરણીય નુકસાનથી રક્ષણ આપવું", "પરાગરજનું પરાગવાહિનીમાં વહન સરળ બનાવવું", "પરાગરજના કોષકેન્દ્રનું વિભાજન પ્રેરવું"], "ans": 1, "exp": "સ્પોરોપોલેનિન એ અત્યંત પ્રતિરોધક દ્રવ્ય છે જે પરાગરજની દીવાલમાં જોવા મળે છે. તે પરાગરજને યાંત્રિક ઈજા, ઉચ્ચ તાપમાન, અલ્ટ્રાવાયોલેટ કિરણો અને રાસાયણિક પદાર્થોથી રક્ષણ આપે છે. તે પોષણ કે પરાગવાહિનીમાં વહનમાં સીધી ભૂમિકા ભજવતું નથી, ન તો તે કોષકેન્દ્રના વિભાજનને પ્રેરે છે.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન પરાગરજ માટે અયોગ્ય છે?", "opts": ["પરાગરજમાં બે કોષકેન્દ્રો હોય છે: વાનસ્પતિક કોષકેન્દ્ર અને જનન કોષકેન્દ્ર", "કેટલીક વનસ્પતિઓમાં પરાગરજ ત્રિકોષીય અવસ્થામાં પરાગાશયમાંથી મુક્ત થાય છે", "પરાગરજની દીવાલ બે સ્તરોની બનેલી હોય છે: બાહ્ય એક્સાઇન અને આંતરિક ઇન્ટાઇન", "પરાગરજનું કદ અને આકાર હંમેશા એક જ પ્રજાતિમાં સમાન હોય છે"], "ans": 3, "exp": "પરાગરજનું કદ અને આકાર એક જ પ્રજાતિમાં પણ ભિન્ન હોઈ શકે છે, જે પર્યાવરણીય પરિબળો અને આનુવંશિક ભિન્નતાને આધિન હોય છે. અન્ય તમામ વિધાનો સાચાં છે: પરાગરજમાં સામાન્ય રીતે બે કોષકેન્દ્રો હોય છે, કેટલીક વનસ્પતિઓમાં તે ત્રિકોષીય અવસ્થામાં મુક્ત થાય છે, અને તેની દીવાલ બે સ્તરોની બનેલી હોય છે.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "એક વનસ્પતિમાં પરાગરજનું પરાગાશયમાંથી પરાગાસન સુધીનું વહન કયા પ્રકારનું પ્રજનન છે? નીચેના પૈકી યોગ્ય જોડકું પસંદ કરો:", "opts": ["સ્વપરાગનયન - સ્વફલન", "પરપરાગનયન - પરફલન", "સ્વપરાગનયન - પરફલન", "પરપરાગનયન - સ્વફલન"], "ans": 1, "exp": "પરાગરજનું પરાગાશયમાંથી તે જ પુષ્પના પરાગાસન સુધીનું વહન સ્વપરાગનયન કહેવાય છે, અને તેના પરિણામે થતું ફલન સ્વફલન કહેવાય છે. પરપરાગનયનમાં પરાગરજ અન્ય પુષ્પના પરાગાસન પર જાય છે અને તેના પરિણામે પરફલન થાય છે. અહીં વિકલ્પ B અને D માં પ્રકારોની જોડી અયોગ્ય છે.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "પરાગરજની જીવિતતા (viability) નીચેના પૈકી કયા પરિબળથી સૌથી વધુ પ્રભાવિત થાય છે?", "opts": ["પ્રકાશની તીવ્રતા", "હવામાં કાર્બન ડાયોક્સાઇડનું પ્રમાણ", "તાપમાન અને ભેજનું પ્રમાણ", "જમીનમાં ખનીજ તત્ત્વોનું પ્રમાણ"], "ans": 2, "exp": "પરાગરજની જીવિતતા મુખ્યત્વે તાપમાન અને ભેજના પ્રમાણથી પ્રભાવિત થાય છે. ઉચ્ચ તાપમાન અને નીચો ભેજ પરાગરજને નુકસાન પહોંચાડી શકે છે, જ્યારે યોગ્ય તાપમાન અને ભેજ તેની જીવિતતા લંબાવે છે. પ્રકાશની તીવ્રતા, કાર્બન ડાયોક્સાઇડનું પ્રમાણ અને જમીનમાં ખનીજ તત્ત્વો પરાગરજની જીવિતતા પર પ્રત્યક્ષ અસર કરતા નથી.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "એક દ્વિસદની વનસ્પતિમાં પરાગકોષ (pollen grain) ના પરિપક્વન દરમિયાન કયા પ્રકારનું કોષકેન્દ્ર વિભાજન જોવા મળતું નથી?", "opts": ["સમભાજન (Mitosis)", "અર્ધસૂત્રીભાજન (Meiosis)", "અસમભાજન (Asymmetric mitosis)", "અંત:કોષકેન્દ્રીય વિભાજન (Endomitosis)"], "ans": 1, "exp": "પરાગકોષનું નિર્માણ અર્ધસૂત્રીભાજન દ્વારા થાય છે, પરંતુ પરાગકોષના પરિપક્વન દરમિયાન માત્ર સમભાજન (mitosis) જ થાય છે. અર્ધસૂત્રીભાજન માત્ર પરાગમાતૃકોષમાં થાય છે, પરાગકોષમાં નહીં. અસમભાજન પરાગકોષના વાનસ્પતિક અને જનનકોષમાં વિભાજન માટે જરૂરી છે, જ્યારે અંત:કોષકેન્દ્રીય વિભાજન કોષકેન્દ્રના વિભાજન વગર DNA ની પ્રતિકૃતિ માટે જોવા મળે છે, જે પરાગકોષમાં સામાન્ય નથી.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "પરાગકોષની દીવાલમાં જોવા મળતા સ્પોરોપોલેનિનનું સંશ્લેષણ મુખ્યત્વે કયા કોષીય અંગિકા દ્વારા થાય છે?", "opts": ["અંતઃપ્લાસ્મીય જાળીદાર રચના (Endoplasmic reticulum)", "ગોલ્ગી કાય (Golgi apparatus)", "રાઇબોઝોમ (Ribosome)", "તૈલોદ્રવ્ય કણો (Plastids)"], "ans": 3, "exp": "સ્પોરોપોલેનિનનું સંશ્લેષણ તૈલોદ્રવ્ય કણો (પ્લાસ્ટિડ્સ) દ્વારા થાય છે, કારણ કે તે એક પ્રકારનું કારોટિનોઇડ પોલિમર છે જે લિપિડ આધારિત દ્રવ્ય છે. અંતઃપ્લાસ્મીય જાળીદાર રચના પ્રોટીન સંશ્લેષણમાં, ગોલ્ગી કાય સ્રાવી પ્રક્રિયામાં અને રાઇબોઝોમ પ્રોટીન સંશ્લેષણમાં ભાગ લે છે, પરંતુ સ્પોરોપોલેનિનના સંશ્લેષણમાં નહીં.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન પરાગકોષના વાનસ્પતિક કોષ (vegetative cell) માટે ખોટું છે?", "opts": ["તેનું કોષકેન્દ્ર મોટું અને ગોળાકાર હોય છે.", "તે પરાગનલિકાના વિકાસ માટે જવાબદાર છે.", "તેનું કોષરસ ઘટ્ટ અને વધુ કોષીય અંગિકાઓ ધરાવે છે.", "તે અર્ધસૂત્રીભાજન દ્વારા બે શુક્રકોષોમાં વિભાજિત થાય છે."], "ans": 3, "exp": "વાનસ્પતિક કોષ પરાગનલિકાના વિકાસ માટે જવાબદાર છે અને તેનું કોષકેન્દ્ર મોટું અને ગોળાકાર હોય છે. તેનું કોષરસ ઘટ્ટ હોય છે અને તેમાં વધુ કોષીય અંગિકાઓ જોવા મળે છે. પરંતુ તે અર્ધસૂત્રીભાજન દ્વારા વિભાજિત થતો નથી - તે સમભાજન દ્વારા જનનકોષમાંથી ઉત્પન્ન થાય છે અને પછી વિભાજિત થતો નથી. શુક્રકોષોનું નિર્માણ જનનકોષના સમભાજન દ્વારા થાય છે.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "એક વનસ્પતિમાં પરાગકોષના જનનકોષ (generative cell) નું વિભાજન કયા સ્થાને થાય છે?", "opts": ["પરાગાશયમાં જ", "પરાગાસન પર અંકુરણ બાદ", "પરાગનલિકામાં વિકાસ દરમિયાન", "અંડકોષમાં પ્રવેશ બાદ"], "ans": 2, "exp": "પરાગકોષનો જનનકોષ પરાગનલિકામાં વિકાસ દરમિયાન સમભાજન દ્વારા બે શુક્રકોષોમાં વિભાજિત થાય છે. પરાગાશયમાં માત્ર પરાગકોષનું નિર્માણ થાય છે, પરાગાસન પર અંકુરણ બાદ પરાગનલિકા વિકસે છે અને તેમાં જ જનનકોષનું વિભાજન થાય છે. અંડકોષમાં પ્રવેશ બાદ વિભાજન થતું નથી.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયું પરાગકોષની લાક્ષણિકતા નથી, પરંતુ બીજાંડ (ovule) ની લાક્ષણિકતા છે?", "opts": ["બે કોષકેન્દ્ર ધરાવતી રચના", "અંડકોષ અને સહાયક કોષો ધરાવતું", "સ્પોરોપોલેનિન ધરાવતી દીવાલ", "એક જનનકોષ અને એક વાનસ્પતિક કોષ ધરાવતું"], "ans": 1, "exp": "પરાગકોષ બે કોષકેન્દ્ર (જનનકોષ અને વાનસ્પતિક કોષ) ધરાવે છે અને સ્પોરોપોલેનિન ધરાવતી દીવાલ ધરાવે છે. જ્યારે બીજાંડમાં અંડકોષ અને સહાયક કોષો (સિનર્જિડ્સ અને એન્ટિપોડલ કોષો) જોવા મળે છે. આમ, વિકલ્પ B બીજાંડની લાક્ષણિકતા છે, પરાગકોષની નહીં.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "એક દ્વિસદની વનસ્પતિમાં પરાગકોષના વાનસ્પતિક કોષ (vegetative cell) ના કોષરસમાં નીચેના પૈકી કયું દ્રવ્ય પ્રમાણમાં વધુ પ્રમાણમાં જોવા મળે છે, જે પરાગનલિકાના વિકાસ માટે જરૂરી ઉર્જા પૂરી પાડે છે?", "opts": ["સ્ટાર્ચ (કાર્બોદિત)", "લિપિડ (ચરબી)", "પ્રોટીન (આલ્બ્યુમિનોઇડ્સ)", "ન્યુક્લિક એસિડ (DNA-આરએનએ)"], "ans": 1, "exp": "પરાગકોષના વાનસ્પતિક કોષના કોષરસમાં લિપિડ (ચરબી) નું પ્રમાણ વધુ હોય છે, કારણ કે લિપિડ ઉર્જાનો સંગ્રહ કરવા માટે વધુ કાર્યક્ષમ છે અને પરાગનલિકાના વિકાસ માટે જરૂરી ઉર્જા પૂરી પાડે છે. સ્ટાર્ચ પણ ઉર્જાનો સંગ્રહ કરે છે, પરંતુ તે લિપિડની સરખામણીએ ઓછું પ્રમાણમાં હોય છે. પ્રોટીન અને ન્યુક્લિક એસિડ મુખ્યત્વે કોષીય કાર્યો અને આનુવંશિકતા માટે જવાબદાર હોય છે, ઉર્જા પૂરી પાડવા માટે નહીં.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "પરાગકોષના જનનકોષ (generative cell) નું વિભાજન પરાગનલિકામાં થાય છે, પરંતુ કેટલીક વનસ્પતિઓમાં આ વિભાજન પરાગાશયમાં જ થઈ જાય છે. નીચેના પૈકી કઈ વનસ્પતિમાં પરાગકોષ ત્રિકોષીય (3-celled) સ્વરૂપે મુક્ત થાય છે?", "opts": ["ઘઉં (Triticum aestivum)", "મકાઈ (Zea mays)", "બટાટા (Solanum tuberosum)", "સૂર્યમુખી (Helianthus annuus)"], "ans": 0, "exp": "ઘઉં (Triticum aestivum) એ એક એવી વનસ્પતિ છે જેમાં પરાગકોષ ત્રિકોષીય સ્વરૂપે મુક્ત થાય છે, કારણ કે તેના પરાગકોષમાં જનનકોષનું વિભાજન પરાગાશયમાં જ થઈ જાય છે. મકાઈ, બટાટા અને સૂર્યમુખીમાં પરાગકોષ દ્વિકોષીય (2-celled) સ્વરૂપે મુક્ત થાય છે અને જનનકોષનું વિભાજન પરાગનલિકામાં થાય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "પરાગકોષની દીવાલમાં બહારની સ્તરને એક્સાઇન (exine) કહે છે, જેમાં સ્પોરોપોલેનિન નામનું દ્રવ્ય હોય છે. નીચેના પૈકી કયું વિધાન સ્પોરોપોલેનિન માટે ખોટું છે?", "opts": ["તે રાસાયણિક રીતે ખૂબ જ સ્થિર અને અવિઘટનીય છે.", "તેનું સંશ્લેષણ ટેપેટમ કોષો દ્વારા થાય છે.", "તે પ્રકાશસંશ્લેષણ માટે જરૂરી ઉર્જા પૂરી પાડે છે.", "તે પરાગકોષને યુવી કિરણો અને સૂક્ષ્મજીવાણુઓથી રક્ષણ આપે છે."], "ans": 2, "exp": "સ્પોરોપોલેનિન એ રાસાયણિક રીતે ખૂબ જ સ્થિર અને અવિઘટનીય દ્રવ્ય છે, જેનું સંશ્લેષણ ટેપેટમ કોષો દ્વારા થાય છે અને તે પરાગકોષને યુવી કિરણો તથા સૂક્ષ્મજીવાણુઓથી રક્ષણ આપે છે. પરંતુ તે પ્રકાશસંશ્લેષણ માટે ઉર્જા પૂરી પાડતું નથી, કારણ કે તે એક રચનાત્મક દ્રવ્ય છે, ઉર્જા સંગ્રહ કરતું નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "એક વનસ્પતિમાં પરાગકોષના વાનસ્પતિક કોષ (vegetative cell) નું મુખ્ય કાર્ય પરાગનલિકાનું નિર્માણ અને વિકાસ કરવાનું છે. આ કોષમાં નીચેના પૈકી કયું લક્ષણ જોવા મળતું નથી?", "opts": ["મોટું કોષકેન્દ્ર અને વધુ કોષરસ ધરાવે છે.", "તેમાં મોટી સંખ્યામાં રાઇબોઝોમ્સ અને મિટોકોન્ડ્રિયા હોય છે.", "તેનું કોષકેન્દ્ર હંમેશા હેપ્લોઇડ (n) હોય છે.", "તેનું વિભાજન મિટોસિસ દ્વારા થઈને નવા કોષો બનાવે છે."], "ans": 3, "exp": "વાનસ્પતિક કોષનું મુખ્ય કાર્ય પરાગનલિકાનું નિર્માણ અને વિકાસ કરવાનું છે. તેમાં મોટું કોષકેન્દ્ર, વધુ કોષરસ, રાઇબોઝોમ્સ અને મિટોકોન્ડ્રિયા હોય છે. તેનું કોષકેન્દ્ર હેપ્લોઇડ (n) હોય છે, પરંતુ તેનું વિભાજન મિટોસિસ દ્વારા થતું નથી, કારણ કે તે એક પરિપક્વ કોષ છે જે વિભાજન પામતો નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "પરાગકોષની જીવિતતા (viability) વિવિધ વનસ્પતિઓમાં અલગ-અલગ હોય છે. નીચેના પૈકી કઈ વનસ્પતિમાં પરાગકોષની જીવિતતા સૌથી ઓછી હોય છે અને તે માત્ર થોડાક કલાકો સુધી જ જીવિત રહે છે?", "opts": ["ગુલાબ (Rosa spp.)", "ઘઉં (Triticum aestivum)", "ડાંગર (Oryza sativa)", "વટાણા (Pisum sativum)"], "ans": 2, "exp": "ડાંગર (Oryza sativa) માં પરાગકોષની જીવિતતા ખૂબ જ ઓછી હોય છે અને તે માત્ર 30 મિનિટથી 1 કલાક સુધી જ જીવિત રહે છે. ગુલાબ, ઘઉં અને વટાણામાં પરાગકોષની જીવિતતા થોડાક કલાકોથી લઈને થોડાક દિવસો સુધીની હોઈ શકે છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કઈ વનસ્પતિમાં પરાગકોષના જનનકોષ (generative cell) નું વિભાજન પરાગાશયમાં જ થઈ જાય છે, જે એક અપવાદરૂપ ઘટના છે?", "opts": ["મકાઈ (Zea mays)", "ઘઉં (Triticum aestivum)", "બટાટા (Solanum tuberosum)", "રાઈ (Brassica campestris)"], "ans": 0, "exp": "સામાન્ય રીતે પરાગકોષના જનનકોષનું વિભાજન પરાગનલિકામાં થાય છે, પરંતુ મકાઈ (Zea mays) માં આ વિભાજન પરાગાશયમાં જ થઈ જાય છે, જે એક અપવાદરૂપ ઘટના છે. બાકીની વનસ્પતિઓમાં આ વિભાજન પરાગનલિકામાં થાય છે.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "પરાગકોષની દીવાલમાં જોવા મળતી એક્સાઇન (exine) સ્તરમાં સ્પોરોપોલેનિન ઉપરાંત નીચેના પૈકી કયું દ્રવ્ય પણ જોવા મળે છે, જે પરાગરજને યાંત્રિક મજબૂતાઈ આપે છે?", "opts": ["સેલ્યુલોઝ", "પેક્ટિન", "લિગ્નિન", "ક્યુટિન"], "ans": 3, "exp": "પરાગકોષની એક્સાઇન સ્તરમાં સ્પોરોપોલેનિન ઉપરાંત ક્યુટિન નામનું દ્રવ્ય પણ જોવા મળે છે, જે પરાગરજને યાંત્રિક મજબૂતાઈ અને પર્યાવરણીય પરિબળો સામે રક્ષણ આપે છે. સેલ્યુલોઝ અને પેક્ટિન મુખ્યત્વે કોષદીવાલમાં જોવા મળે છે, જ્યારે લિગ્નિન લાકડાંના કોષોમાં જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન પરાગકોષના વિકાસ માટે ખોટું છે, જે એક અપવાદરૂપ પરિસ્થિતિ દર્શાવે છે?", "opts": ["કેટલીક વનસ્પતિઓમાં પરાગકોષ ત્રિકોષીય (3-celled) અવસ્થામાં પરાગાશયમાંથી મુક્ત થાય છે.", "સામાન્ય રીતે પરાગકોષ દ્વિકોષીય (2-celled) અવસ્થામાં પરાગાશયમાંથી મુક્ત થાય છે.", "પરાગકોષના વાનસ્પતિક કોષનું કોષકેન્દ્ર હંમેશા સક્રિય હોય છે અને પરાગનલિકાના વિકાસ માટે જવાબદાર હોય છે.", "કેટલીક વનસ્પતિઓમાં પરાગકોષ એકકોષીય (1-celled) અવસ્થામાં પરાગાશયમાંથી મુક્ત થાય છે."], "ans": 3, "exp": "સામાન્ય રીતે પરાગકોષ દ્વિકોષીય અવસ્થામાં પરાગાશયમાંથી મુક્ત થાય છે, જેમાં એક વાનસ્પતિક કોષ અને એક જનનકોષ હોય છે. કેટલીક વનસ્પતિઓમાં પરાગકોષ ત્રિકોષીય અવસ્થામાં મુક્ત થાય છે, જેમાં જનનકોષનું વિભાજન થઈ ગયું હોય છે. પરંતુ પરાગકોષ એકકોષીય અવસ્થામાં મુક્ત થતો નથી, જે ખોટું વિધાન છે.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "એક દ્વિસદની વનસ્પતિમાં પરાગકોષના વિકાસ દરમિયાન જનનકોષ (generative cell) નું વિભાજન પરાગનલિકામાં થાય છે, પરંતુ કેટલીક વનસ્પતિઓમાં આ વિભાજન પરાગાશયમાં જ થઈ જાય છે. નીચેના પૈકી કઈ વનસ્પતિ આ અપવાદ દર્શાવે છે?", "opts": ["ઘઉં (Triticum aestivum)", "મકાઈ (Zea mays)", "બટાટા (Solanum tuberosum)", "મગફળી (Arachis hypogaea)"], "ans": 1, "exp": "મકાઈ (Zea mays) એ એક અપવાદરૂપ વનસ્પતિ છે જેમાં પરાગકોષના જનનકોષનું વિભાજન પરાગાશયમાં જ થઈ જાય છે, જ્યારે સામાન્ય રીતે આ વિભાજન પરાગનલિકામાં થાય છે. ઘઉં, બટાટા અને મગફળીમાં આ વિભાજન પરાગનલિકામાં થાય છે. આ અપવાદ મકાઈની પ્રજનન પ્રક્રિયાની વિશિષ્ટતા દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "એક દ્વિસદની વનસ્પતિમાં પરાગકોષના પરિપક્વન બાદ જોવા મળતી નીચેની લાક્ષણિકતાઓ પૈકી કઈ એક અપવાદરૂપ છે, જે સામાન્ય રીતે અન્ય વનસ્પતિઓમાં જોવા મળતી નથી?", "opts": ["પરાગકોષમાં બે કોષકેન્દ્ર (વાનસ્પતિક અને જનનકોષ) જોવા મળે છે", "પરાગકોષની દીવાલમાં એક્સાઇન સ્તરમાં સ્પોરોપોલેનિનનું પ્રમાણ વધુ હોય છે", "પરાગકોષના જનનકોષનું વિભાજન પરાગાશયમાં જ થઈ જાય છે અને પરાગકોષ ત્રિકોષીય સ્વરૂપે મુક્ત થાય છે", "પરાગકોષના વાનસ્પતિક કોષમાં મોટી માત્રામાં સંગ્રહિત કાર્બોદિત પદાર્થો જોવા મળે છે"], "ans": 2, "exp": "સામાન્ય રીતે દ્વિસદની વનસ્પતિઓમાં પરાગકોષ દ્વિકોષીય સ્વરૂપે મુક્ત થાય છે, જેમાં જનનકોષનું વિભાજન પરાગનલિકામાં થાય છે. પરંતુ કેટલીક અપવાદરૂપ વનસ્પતિઓ જેમ કે ઘઉં, ડાંગર અને એસ્ટરેસી કુળની વનસ્પતિઓમાં જનનકોષનું વિભાજન પરાગાશયમાં જ થઈ જાય છે અને પરાગકોષ ત્રિકોષીય સ્વરૂપે મુક્ત થાય છે. આથી વિકલ્પ C અપવાદરૂપ છે. વિકલ્પ A, B અને D સામાન્ય લાક્ષણિકતાઓ છે જે મોટાભાગની વનસ્પતિઓમાં જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
