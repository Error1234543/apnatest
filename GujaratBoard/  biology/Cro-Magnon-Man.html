<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cro-Magnon Man</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Cro-Magnon Man</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Cro-Magnon Man</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ક્રો-મેગ્નન મનુષ્ય વિશે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["તેઓ હોમો સેપિયન્સની પ્રજાતિમાં આવે છે.", "તેમના મગજનું કદ આધુનિક મનુષ્ય કરતાં નાનું હતું.", "તેઓ કલાત્મક અને સાંસ્કૃતિક કૌશલ્ય ધરાવતા હતા.", "તેઓ યુરોપમાં પેદા થયા હતા."], "ans": 1, "exp": "ક્રો-મેગ્નન મનુષ્ય હોમો સેપિયન્સની પ્રજાતિમાં આવે છે (A સત્ય). તેમના મગજનું કદ આધુનિક મનુષ્ય જેટલું જ હતું, એટલે કે લગભગ 1400-1600 ઘન સેન્ટીમીટર (B ખોટું). તેઓ કલાત્મક અને સાંસ્કૃતિક કૌશલ્ય ધરાવતા હતા, જેમ કે ગુફા ચિત્રો અને શણગારની વસ્તુઓ (C સત્ય). તેઓ યુરોપમાં પેદા થયા હતા અને લગભગ 40,000 વર્ષ પહેલાં અસ્તિત્વમાં હતા (D સત્ય).", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ક્રો-મેગ્નન મનુષ્યના અવશેષો પ્રથમ ક્યાં શોધાયા હતા?", "opts": ["જર્મનીની નિયાન્ડર ખીણમાં", "ફ્રાન્સની ક્રો-મેગ્નન ગુફામાં", "સ્પેનની આલ્ટામિરા ગુફામાં", "ઇંગ્લેન્ડની પિલ્ટડાઉન ખાણમાં"], "ans": 1, "exp": "ક્રો-મેગ્નન મનુષ્યના અવશેષો પ્રથમ 1868માં ફ્રાન્સની ક્રો-મેગ્નન ગુફામાં શોધાયા હતા (B સત્ય). જર્મનીની નિયાન્ડર ખીણમાં નિયાન્ડરથલ મનુષ્યના અવશેષો શોધાયા હતા (A ખોટું). સ્પેનની આલ્ટામિરા ગુફા તેની કલાત્મક ચિત્રો માટે જાણીતી છે, પરંતુ ક્રો-મેગ્નનના પ્રથમ અવશેષો ત્યાં શોધાયા નહોતા (C ખોટું). ઇંગ્લેન્ડની પિલ્ટડાઉન ખાણમાં પિલ્ટડાઉન મનુષ્યના અવશેષો શોધાયા હતા (D ખોટું).", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ક્રો-મેગ્નન મનુષ્યના સાંસ્કૃતિક લક્ષણો પૈકી કયું એક એવું છે જે તેમને પૂર્વજો કરતાં અલગ પાડે છે?", "opts": ["અગ્નિનો ઉપયોગ", "શિકાર માટે હથિયારોનો ઉપયોગ", "કલાત્મક અભિવ્યક્તિ અને સંકેતોનો ઉપયોગ", "ગુફામાં રહેવું"], "ans": 2, "exp": "ક્રો-મેગ્નન મનુષ્ય કલાત્મક અભિવ્યક્તિ અને સંકેતોનો ઉપયોગ કરતા હતા, જેમ કે ગુફા ચિત્રો અને શણગારની વસ્તુઓ, જે તેમને પૂર્વજો કરતાં અલગ પાડે છે (C સત્ય). અગ્નિનો ઉપયોગ (A) અને શિકાર માટે હથિયારોનો ઉપયોગ (B) પૂર્વજો પણ કરતા હતા. ગુફામાં રહેવું (D) પણ પૂર્વજો કરતા હતા, પરંતુ ક્રો-મેગ્નન મનુષ્યની કલાત્મકતા તેમની વિશેષતા હતી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ક્રો-મેગ્નન મનુષ્ય અને નિયાન્ડરથલ મનુષ્ય વચ્ચેનો મુખ્ય તફાવત કયો હતો?", "opts": ["ક્રો-મેગ્નન મનુષ્યનો મગજ નાનો હતો", "ક્રો-મેગ્નન મનુષ્ય પાસે સંકુચિત હનુમાન જડબા હતા", "નિયાન્ડરથલ મનુષ્ય કલાત્મક હતા", "ક્રો-મેગ્નન મનુષ્ય પાસે ઉચ્ચ કપાલ ગુંબજ હતો"], "ans": 3, "exp": "ક્રો-મેગ્નન મનુષ્ય પાસે ઉચ્ચ કપાલ ગુંબજ હતો, જે તેમને નિયાન્ડરથલ મનુષ્ય કરતાં અલગ પાડે છે (D સત્ય). ક્રો-મેગ્નન મનુષ્યનો મગજ નિયાન્ડરથલ કરતાં મોટો હતો (A ખોટું). ક્રો-મેગ્નન મનુષ્ય પાસે સંકુચિત હનુમાન જડબા નહોતા, પરંતુ નિયાન્ડરથલ પાસે હતા (B ખોટું). નિયાન્ડરથલ મનુષ્ય કલાત્મક નહોતા, પરંતુ ક્રો-મેગ્નન મનુષ્ય હતા (C ખોટું).", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ક્રો-મેગ્નન મનુષ્યના અસ્તિત્વનો સમયગાળો કયો હતો?", "opts": ["લગભગ 1,00,000 થી 40,000 વર્ષ પહેલાં", "લગભગ 40,000 થી 10,000 વર્ષ પહેલાં", "લગભગ 2,00,000 થી 1,00,000 વર્ષ પહેલાં", "લગભગ 10,000 થી 5,000 વર્ષ પહેલાં"], "ans": 1, "exp": "ક્રો-મેગ્નન મનુષ્ય લગભગ 40,000 થી 10,000 વર્ષ પહેલાં અસ્તિત્વમાં હતા (B સત્ય). લગભગ 1,00,000 થી 40,000 વર્ષ પહેલાં નિયાન્ડરથલ મનુષ્ય અસ્તિત્વમાં હતા (A ખોટું). લગભગ 2,00,000 થી 1,00,000 વર્ષ પહેલાં હોમો ઇરેક્ટસ અસ્તિત્વમાં હતા (C ખોટું). લગભગ 10,000 થી 5,000 વર્ષ પહેલાં આધુનિક મનુષ્યના વિકાસના તબક્કા હતા (D ખોટું).", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ક્રો-મેગ્નન મનુષ્યના શારીરિક લક્ષણો પૈકી કયું એક એવું છે જે તેમને આધુનિક મનુષ્ય (Homo sapiens sapiens) જેવા બનાવે છે, પરંતુ નિયાન્ડરથલ મનુષ્યમાં અલગ પડે છે?", "opts": ["મોટું અને લંબગોળ કપાલ", "ચપટી નાક અને પહોળું ચહેરું", "ઉચ્ચ કપાલ ગુંબજ (high cranial vault) અને નાનું જડબું", "મજબૂત હાડકાં અને ટૂંકા હાથ"], "ans": 2, "exp": "ક્રો-મેગ્નન મનુષ્યમાં ઉચ્ચ કપાલ ગુંબજ (high cranial vault) અને નાનું જડબું હોવાને કારણે તેઓ આધુનિક મનુષ્ય જેવા દેખાતા હતા. નિયાન્ડરથલ મનુષ્યમાં કપાલ લંબગોળ અને જડબું મોટું હોવાને કારણે તેઓ અલગ પડે છે. A) મોટું અને લંબગોળ કપાલ નિયાન્ડરથલનું લક્ષણ છે. B) ચપટી નાક અને પહોળું ચહેરું ક્રો-મેગ્નનમાં નહીં પણ પૂર્વજો જેવા લક્ષણો છે. D) મજબૂત હાડકાં અને ટૂંકા હાથ નિયાન્ડરથલનું લક્ષણ છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ક્રો-મેગ્નન મનુષ્યના સાંસ્કૃતિક વિકાસમાં નીચેનામાંથી કયું એક એવું પુરાવો છે જે તેમની કલાત્મક પ્રતિભા અને પ્રતીકાત્મક વિચારસરણી દર્શાવે છે?", "opts": ["પથ્થરના હથિયારોનો ઉપયોગ", "ગુફાઓમાં ચિત્રો અને શિલ્પોની રચના", "આગનો ઉપયોગ ખોરાક પકવવા માટે", "પ્રાણીઓના ચામડાનો ઉપયોગ કપડાં બનાવવા માટે"], "ans": 1, "exp": "ક્રો-મેગ્નન મનુષ્ય ગુફાઓમાં ચિત્રો અને શિલ્પોની રચના કરતા હતા, જે તેમની કલાત્મક પ્રતિભા અને પ્રતીકાત્મક વિચારસરણી દર્શાવે છે. A) પથ્થરના હથિયારોનો ઉપયોગ પૂર્વજો પણ કરતા હતા. C) આગનો ઉપયોગ ખોરાક પકવવા માટે પણ પૂર્વજો કરતા હતા. D) પ્રાણીઓના ચામડાનો ઉપયોગ કપડાં બનાવવા માટે પણ પૂર્વજો કરતા હતા.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ક્રો-મેગ્નન મનુષ્ય અને આધુનિક મનુષ્ય (Homo sapiens sapiens) વચ્ચેનો મુખ્ય જનીનિક તફાવત કયો હતો?", "opts": ["ક્રો-મેગ્નન મનુષ્યમાં DNAની સંખ્યા ઓછી હતી", "ક્રો-મેગ્નન મનુષ્યમાં મિટોકોન્ડ્રિયલ DNAમાં તફાવત હતો", "ક્રો-મેગ્નન મનુષ્યમાં Y-વર્ણસૂત્ર (Y-chromosome) અલગ હતું", "ક્રો-મેગ્નન મનુષ્યમાં X-વર્ણસૂત્ર (X-chromosome) અલગ હતું"], "ans": 1, "exp": "ક્રો-મેગ્નન મનુષ્ય અને આધુનિક મનુષ્ય વચ્ચે મિટોકોન્ડ્રિયલ DNAમાં તફાવત હોવાનું શોધાયું છે, જે તેમની જનીનિક અલગતા દર્શાવે છે. A) DNAની સંખ્યા બંનેમાં સરખી હોય છે. C) Y-વર્ણસૂત્રમાં કોઈ મહત્વપૂર્ણ તફાવત નથી. D) X-વર્ણસૂત્રમાં કોઈ મહત્વપૂર્ણ તફાવત નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ક્રો-મેગ્નન મનુષ્યના અવશેષોની શોધ સાથે જોડાયેલા નીચેનામાંથી કયા સ્થળે તેમના સાંસ્કૃતિક અવશેષો પણ મળ્યા હતા?", "opts": ["નિયાન્ડર ખીણ (Germany)", "ક્રો-મેગ્નન (France)", "જાવા (Indonesia)", "પેકિંગ (China)"], "ans": 1, "exp": "ક્રો-મેગ્નન મનુષ્યના અવશેષો પ્રથમ ફ્રાન્સના ક્રો-મેગ્નન સ્થળે શોધાયા હતા, જ્યાં તેમના સાંસ્કૃતિક અવશેષો પણ મળ્યા હતા. A) નિયાન્ડર ખીણમાં નિયાન્ડરથલ મનુષ્યના અવશેષો મળ્યા હતા. C) જાવામાં જાવા મનુષ્યના અવશેષો મળ્યા હતા. D) પેકિંગમાં પેકિંગ મનુષ્યના અવશેષો મળ્યા હતા.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ક્રો-મેગ્નન મનુષ્યના અસ્તિત્વ દરમિયાન કયા હવામાન પરિવર્તનને કારણે તેમના સાંસ્કૃતિક વિકાસમાં મહત્વપૂર્ણ ફેરફાર થયા હતા?", "opts": ["હિમયુગ (Ice Age)નો અંત", "મહા ઉષ્ણકાળ (Great Warming)", "વરસાદી કાળનો પ્રારંભ", "રણના વિકાસનો સમયગાળો"], "ans": 0, "exp": "ક્રો-મેગ્નન મનુષ્યના અસ્તિત્વ દરમિયાન હિમયુગ (Ice Age)નો અંત થયો હતો, જેને કારણે હવામાનમાં થયેલા ફેરફારોએ તેમના સાંસ્કૃતિક વિકાસમાં મહત્વપૂર્ણ ભૂમિકા ભજવી હતી. B) મહા ઉષ્ણકાળ ક્રો-મેગ્નન મનુષ્યના સમયગાળાથી પહેલા થયો હતો. C) વરસાદી કાળનો પ્રારંભ ક્રો-મેગ્નન મનુષ્યના સમયગાળા પછી થયો હતો. D) રણના વિકાસનો સમયગાળો ક્રો-મેગ્નન મનુષ્યના સમયગાળાથી અલગ હતો.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ક્રો-મેગ્નન મનુષ્યના કંકાળમાં જોવા મળતા નીચેનામાંથી કયું લક્ષણ તેમને નિયાન્ડરથલથી અલગ પાડે છે, પરંતુ આધુનિક મનુષ્ય સાથે સમાન છે?", "opts": ["મજબૂત હાડકાં અને સ્નાયુબદ્ધ શરીર", "ચપટી નાક અને ઉચી કપાળ", "નાનું મસ્તિષ્ક કદ (ક્રેનિયલ કેપેસિટી)", "અગ્રભાગે ઊંડો દાંતનો જડબો"], "ans": 1, "exp": "ક્રો-મેગ્નન મનુષ્યમાં ચપટી નાક અને ઉચી કપાળ જેવા લક્ષણો જોવા મળે છે, જે આધુનિક મનુષ્ય (Homo sapiens sapiens) સાથે મળતા આવે છે. નિયાન્ડરથલમાં મજબૂત હાડકાં અને સ્નાયુબદ્ધ શરીર (A) જોવા મળે છે, પરંતુ આ લક્ષણ ક્રો-મેગ્નનમાં ઓછું પ્રબળ છે. નાનું મસ્તિષ્ક કદ (C) નિયાન્ડરથલનું લક્ષણ છે, જ્યારે ક્રો-મેગ્નનનું મસ્તિષ્ક કદ આધુનિક મનુષ્ય જેવું જ છે. અગ્રભાગે ઊંડો દાંતનો જડબો (D) નિયાન્ડરથલ અને પૂર્વજોનું લક્ષણ છે, ક્રો-મેગ્નનમાં આ લક્ષણ ઓછું જોવા મળે છે.", "ref": "Std 12 - અધ્યાય 7: મનુષ્યની ઉત્ક્રાંતિ અને વિવિધતા", "ch": ""}, {"q": "ક્રો-મેગ્નન મનુષ્યના સાંસ્કૃતિક વિકાસમાં નીચેનામાંથી કયું પુરાવો તેમની કલાત્મક પ્રવૃત્તિઓનું સૌથી મજબૂત સૂચક છે?", "opts": ["હાડકાંના હથિયારોનો ઉપયોગ", "ગુફામાં ચિત્રકામ અને શિલ્પકામ", "આગનો ઉપયોગ ખોરાક પકવવા માટે", "પ્રાણીઓના ચામડાનો ઉપયોગ કપડાં બનાવવા માટે"], "ans": 1, "exp": "ક્રો-મેગ્નન મનુષ્ય માટે ગુફામાં ચિત્રકામ અને શિલ્પકામ (B) એ કલાત્મક પ્રવૃત્તિઓનું સૌથી મજબૂત પુરાવો છે, જે તેમની સાંસ્કૃતિક પ્રગતિ દર્શાવે છે. હાડકાંના હથિયારો (A) અને આગનો ઉપયોગ (C) તો પૂર્વજો જેવા કે નિયાન્ડરથલમાં પણ જોવા મળે છે. પ્રાણીઓના ચામડાનો ઉપયોગ (D) પણ પૂર્વજોમાં જોવા મળે છે, પરંતુ તે કલાત્મક પ્રવૃત્તિ નથી.", "ref": "Std 12 - અધ્યાય 7: મનુષ્યની ઉત્ક્રાંતિ અને વિવિધતા", "ch": ""}, {"q": "ક્રો-મેગ્નન મનુષ્યના જીવનશૈલી વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["તેઓ શિકારી અને સંગ્રાહક હતા", "તેઓ સ્થાયી વસવાટ કરતા હતા", "તેઓ સમાજિક જૂથોમાં રહેતા હતા", "તેઓ પ્રાણીઓના ચામડાનો ઉપયોગ કરતા હતા"], "ans": 1, "exp": "ક્રો-મેગ્નન મનુષ્ય શિકારી અને સંગ્રાહક (A) હતા, સમાજિક જૂથોમાં રહેતા (C) અને પ્રાણીઓના ચામડાનો ઉપયોગ કરતા (D). પરંતુ તેઓ સ્થાયી વસવાટ કરતા નહોતા, તેઓ ખાનાબદોશ જીવનશૈલી જીવતા હતા, જે તેમને નિયાન્ડરથલથી અલગ પાડે છે.", "ref": "Std 12 - અધ્યાય 7: મનુષ્યની ઉત્ક્રાંતિ અને વિવિધતા", "ch": ""}, {"q": "ક્રો-મેગ્નન મનુષ્ય અને આધુનિક મનુષ્ય વચ્ચે જનીનિક સમાનતા વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["ક્રો-મેગ્નન મનુષ્ય આધુનિક મનુષ્યના પૂર્વજ નથી", "ક્રો-મેગ્નન મનુષ્ય અને આધુનિક મનુષ્ય વચ્ચે 100% જનીનિક સમાનતા છે", "ક્રો-મેગ્નન મનુષ્ય અને આધુનિક મનુષ્ય વચ્ચે 95%થી ઓછી જનીનિક સમાનતા છે", "ક્રો-મેગ્નન મનુષ્ય આધુનિક યુરોપિયન મનુષ્યના પૂર્વજ છે"], "ans": 3, "exp": "ક્રો-મેગ્નન મનુષ્ય આધુનિક યુરોપિયન મનુષ્યના પૂર્વજ ગણવામાં આવે છે (D). ક્રો-મેગ્નન મનુષ્ય આધુનિક મનુષ્યના પૂર્વજ છે (A ખોટું). ક્રો-મેગ્નન અને આધુનિક મનુષ્ય વચ્ચે 95%થી વધુ જનીનિક સમાનતા છે, પરંતુ 100% નહીં (B ખોટું). 95%થી ઓછી સમાનતા (C) પણ ખોટું છે, કારણ કે વાસ્તવિક સમાનતા 95%થી વધુ છે.", "ref": "Std 12 - અધ્યાય 7: મનુષ્યની ઉત્ક્રાંતિ અને વિવિધતા", "ch": ""}, {"q": "ક્રો-મેગ્નન મનુષ્યના અસ્તિત્વ દરમિયાન નીચેનામાંથી કયું હવામાન પરિવર્તન તેમના સાંસ્કૃતિક વિકાસમાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે?", "opts": ["હિમયુગનો અંત અને હવામાનમાં ગરમીનો આગમન", "હિમયુગની શરૂઆત અને હવામાનમાં ઠંડીનો આગમન", "વરસાદી હવામાનનો આગમન", "રણપ્રદેશનો વિકાસ"], "ans": 0, "exp": "ક્રો-મેગ્નન મનુષ્યના અસ્તિત્વ દરમિયાન હિમયુગનો અંત અને હવામાનમાં ગરમીનો આગમન (A) થયો હતો, જેને કારણે તેમના સાંસ્કૃતિક વિકાસમાં મહત્વપૂર્ણ ફેરફાર થયા હતા. હિમયુગની શરૂઆત (B) નિયાન્ડરથલના સમયગાળા સાથે સંકળાયેલ છે. વરસાદી હવામાન (C) અને રણપ્રદેશનો વિકાસ (D) ક્રો-મેગ્નન મનુષ્યના સમયગાળા સાથે સીધું સંકળાયેલ નથી.", "ref": "Std 12 - અધ્યાય 7: મનુષ્યની ઉત્ક્રાંતિ અને વિવિધતા", "ch": ""}, {"q": "ક્રો-મેગ્નન મનુષ્યના કપાલની રચના વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["તેમના કપાલમાં ઉચ્ચ કપાલ ગુંબજ (high cranial vault) હતો, જે મગજના કદમાં વૃદ્ધિ દર્શાવે છે.", "તેમના કપાલમાં ભૌંહિક કપાલ (supraorbital ridges) ખૂબ જ પ્રબળ હતા, જે નિયાન્ડરથલ જેવા હતા.", "તેમના કપાલમાં ચહેરાનો ભાગ આગળ નીકળેલો હતો, જે આધુનિક મનુષ્યથી વિપરિત હતો.", "તેમના કપાલમાં કાનના ખૂણા (mastoid process) ખૂબ જ નાના હતા, જે તેમની મસલ્સની કમજોરી દર્શાવે છે."], "ans": 0, "exp": "ક્રો-મેગ્નન મનુષ્યના કપાલમાં ઉચ્ચ કપાલ ગુંબજ હતો, જે મગજના કદમાં વૃદ્ધિ દર્શાવે છે. આ લક્ષણ તેમને આધુનિક મનુષ્ય જેવા બનાવે છે. ભૌંહિક કપાલ (B) નિયાન્ડરથલમાં જોવા મળતા હતા, પરંતુ ક્રો-મેગ્નનમાં તે ઓછા પ્રબળ હતા. ચહેરાનો ભાગ (C) ક્રો-મેગ્નનમાં પાછળ હોવાને કારણે આધુનિક મનુષ્ય જેવો હતો. કાનના ખૂણા (D) ક્રો-મેગ્નનમાં સ્પષ્ટ અને વિકસિત હતા, જે મસલ્સની મજબૂતાઈ દર્શાવે છે.", "ref": "Std 12 - અધ્યાય 7: મનુષ્યની ઉત્ક્રાંતિ અને વિવિધતા", "ch": ""}, {"q": "ક્રો-મેગ્નન મનુષ્ય અને નિયાન્ડરથલ મનુષ્ય વચ્ચેના જનીનિક સંબંધ વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["ક્રો-મેગ્નન મનુષ્ય અને નિયાન્ડરથલ વચ્ચે કોઈ જનીનિક સમાનતા નહોતી.", "ક્રો-મેગ્નન મનુષ્યમાં નિયાન્ડરથલના જનીનોની હાજરી મળી આવી છે, જે તેમના વંશીય મિશ્રણનું સૂચન કરે છે.", "ક્રો-મેગ્નન મનુષ્ય અને નિયાન્ડરથલ વચ્ચે જનીનિક સમાનતા માત્ર 1% હતી.", "ક્રો-મેગ્નન મનુષ્ય નિયાન્ડરથલના સીધા વંશજ હતા."], "ans": 1, "exp": "ક્રો-મેગ્નન મનુષ્યમાં નિયાન્ડરથલના જનીનોની હાજરી મળી આવી છે, જે તેમના વંશીય મિશ્રણનું સૂચન કરે છે. ક્રો-મેગ્નન અને નિયાન્ડરથલ વચ્ચે જનીનિક સમાનતા (A) અને (C) ખોટી છે કારણ કે તેમની વચ્ચે કેટલાક જનીનિક સમાનતા જોવા મળી છે. ક્રો-મેગ્નન નિયાન્ડરથલના સીધા વંશજ નહોતા (D), પરંતુ તેમના વચ્ચે વંશીય મિશ્રણ થયું હતું.", "ref": "Std 12 - અધ્યાય 7: મનુષ્યની ઉત્ક્રાંતિ અને વિવિધતા", "ch": ""}, {"q": "ક્રો-મેગ્નન મનુષ્યના શારીરિક લક્ષણો પૈકી નીચેનામાંથી કયું લક્ષણ તેમને આધુનિક મનુષ્યથી અલગ પાડે છે?", "opts": ["ઉચ્ચ કપાલ ગુંબજ", "ચહેરાનો ભાગ પાછળ હોવો", "જડબાના હાડકાનો આકાર", "દાંતની રચના અને કદ"], "ans": 2, "exp": "ક્રો-મેગ્નન મનુષ્યના જડબાના હાડકાનો આકાર આધુનિક મનુષ્યથી થોડો અલગ હતો, જે તેમને અલગ પાડે છે. ઉચ્ચ કપાલ ગુંબજ (A) અને ચહેરાનો ભાગ પાછળ હોવો (B) આધુનિક મનુષ્ય જેવા લક્ષણો છે. દાંતની રચના અને કદ (D) પણ આધુનિક મનુષ્ય જેવા હતા.", "ref": "Std 12 - અધ્યાય 7: મનુષ્યની ઉત્ક્રાંતિ અને વિવિધતા", "ch": ""}, {"q": "ક્રો-મેગ્નન મનુષ્યના ઉત્ક્રાંતિ અને સાંસ્કૃતિક વિકાસના સંદર્ભમાં નીચેનાં વિધાનો ધ્યાનમાં લો: \n(1) ક્રો-મેગ્નન મનુષ્યના અવશેષો યુરોપ ઉપરાંત આફ્રિકા અને એશિયામાં પણ મળી આવ્યા છે. \n(2) તેમના દ્વારા બનાવવામાં આવેલાં ઓજારો મુખ્યત્વે હાડકાં અને પથ્થરમાંથી બનાવવામાં આવતાં હતાં. \n(3) ક્રો-મેગ્નન મનુષ્યના સાંસ્કૃતિક વિકાસમાં ગુફા ચિત્રો અને શિલ્પકલાનું મહત્વપૂર્ણ યોગદાન હતું. \n(4) તેમના મગજનું કદ આધુનિક મનુષ્ય કરતાં લગભગ 10% વધારે હતું. \nઉપરોક્ત વિધાનોમાંથી કયાં વિધાનો સત્ય છે?", "opts": ["ફક્ત 1, 2 અને 3", "ફક્ત 2, 3 અને 4", "ફક્ત 1, 3 અને 4", "ફક્ત 1, 2 અને 4"], "ans": 0, "exp": "વિધાન (1) સત્ય છે કારણ કે ક્રો-મેગ્નન મનુષ્યના અવશેષો યુરોપ ઉપરાંત આફ્રિકા અને એશિયામાં પણ મળી આવ્યા છે. વિધાન (2) સત્ય છે કારણ કે તેમના ઓજારો મુખ્યત્વે હાડકાં અને પથ્થરમાંથી બનાવવામાં આવતાં હતાં. વિધાન (3) સત્ય છે કારણ કે તેમના સાંસ્કૃતિક વિકાસમાં ગુફા ચિત્રો અને શિલ્પકલાનું મહત્વપૂર્ણ યોગદાન હતું. વિધાન (4) ખોટું છે કારણ કે ક્રો-મેગ્નન મનુષ્યનું મગજનું કદ આધુનિક મનુષ્ય જેટલું જ હતું, વધારે નહોતું.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ક્રો-મેગ્નન મનુષ્યના ઉત્ક્રાંતિ અને જીવનશૈલીના સંદર્ભમાં નીચેનાં વિધાનોમાંથી કયું એક અપવાદરૂપ છે? \n(નોંધ: અહીં 'અપવાદરૂપ' એટલે કે બાકીનાં ત્રણ વિધાનો સામાન્ય લક્ષણો દર્શાવે છે, જ્યારે એક વિધાન અલગ લક્ષણ દર્શાવે છે.)", "opts": ["ક્રો-મેગ્નન મનુષ્યના કપાલની રચના આધુનિક મનુષ્ય જેવી જ હતી, જેમાં ઊંચું કપાળ અને નાનું ભ્રમરધન હતું.", "તેમના દ્વારા ઉપયોગમાં લેવાતાં ઓજારો મુખ્યત્વે અશ્મિભૂત લાકડામાંથી બનાવવામાં આવતાં હતાં.", "તેમના સાંસ્કૃતિક વિકાસમાં ગુફા ચિત્રો અને શિલ્પકલા મહત્વપૂર્ણ ભાગ ભજવતાં હતાં.", "તેમના અવશેષો યુરોપ ઉપરાંત આફ્રિકા અને એશિયામાં પણ મળી આવ્યા છે."], "ans": 1, "exp": "વિકલ્પ (B) અપવાદરૂપ છે કારણ કે ક્રો-મેગ્નન મનુષ્યના ઓજારો મુખ્યત્વે હાડકાં અને પથ્થરમાંથી બનાવવામાં આવતાં હતાં, અશ્મિભૂત લાકડામાંથી નહીં. બાકીના વિકલ્પો સામાન્ય લક્ષણો દર્શાવે છે: વિકલ્પ (A) તેમની કપાલ રચના વિશે સાચું છે, વિકલ્પ (C) તેમના સાંસ્કૃતિક વિકાસ વિશે સાચું છે, અને વિકલ્પ (D) તેમના અવશેષોના સ્થળ વિશે સાચું છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
