<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પ્રભાવી (Dominant) અને અપ્રભાવી (Recessive) લક્ષણો</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>પ્રભાવી (Dominant) અને અપ્રભાવી (Recessive) લક્ષણો</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">પ્રભાવી (Dominant) અને અપ્રભાવી (Recessive) લક્ષણો</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક સંકરણ પ્રયોગમાં, લાલ ફૂલ ધરાવતું વટાણાનું છોડ (RR) અને સફેદ ફૂલ ધરાવતું છોડ (rr) વચ્ચે સંકરણ કરાવવામાં આવે છે. F₂ પેઢીમાં મળતા છોડમાંથી એક સફેદ ફૂલ ધરાવતું છોડ પસંદ કરી તેનું સ્વફલન કરાવવામાં આવે છે. આ સ્વફલનથી મળતી સંતતિમાં લાલ અને સફેદ ફૂલોનું પ્રમાણ કેટલું હશે?", "opts": ["બધા જ સફેદ ફૂલો", "૩ લાલ : ૧ સફેદ", "૧ લાલ : ૧ સફેદ", "૧ લાલ : ૩ સફેદ"], "ans": 0, "exp": "F₂ પેઢીમાં સફેદ ફૂલ ધરાવતું છોડ અપ્રભાવી સમયુગ્મી (rr) હશે. તેનું સ્વફલન કરાવતાં બધી જ સંતતિ અપ્રભાવી સમયુગ્મી (rr) હશે, તેથી બધા જ છોડ સફેદ ફૂલો ધરાવશે. લાલ ફૂલ માટે પ્રભાવી જનીન (R) હાજર ન હોવાથી લાલ ફૂલો ઉત્પન્ન થશે નહીં.", "ref": "Std 12 - પ્રકરણ ૫: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "મેન્ડલના નિયમોમાં અપવાદરૂપ કિસ્સો કયો છે જેમાં પ્રભાવી અને અપ્રભાવી લક્ષણોનું પ્રમાણ ૩:૧ નથી મળતું?", "opts": ["અપૂર્ણ પ્રભુતા (Incomplete Dominance)", "સહપ્રભુતા (Co-dominance)", "બહુજનીનિક વારસો (Polygenic Inheritance)", "ઉપરોક્ત તમામ"], "ans": 3, "exp": "મેન્ડલના નિયમો મુજબ પ્રભાવી અને અપ્રભાવી લક્ષણોનું પ્રમાણ ૩:૧ હોય છે, પરંતુ અપૂર્ણ પ્રભુતા, સહપ્રભુતા અને બહુજનીનિક વારસામાં આ પ્રમાણ બદલાય છે. ઉદાહરણ તરીકે, અપૂર્ણ પ્રભુતામાં F₂ પેઢીમાં ૧:૨:૧ પ્રમાણ મળે છે, જ્યારે સહપ્રભુતામાં બંને લક્ષણો એકસાથે દેખાય છે.", "ref": "Std 12 - પ્રકરણ ૫: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક પ્રયોગમાં, કાળા રંગનું ગિનિ પિગ (BB) અને સફેદ રંગનું ગિનિ પિગ (bb) વચ્ચે સંકરણ કરાવતાં F₁ પેઢીમાં બધા જ છોડ ભૂરા રંગના મળે છે. આ ઘટનાનું કારણ શું હોઈ શકે?", "opts": ["પ્રભાવી જનીનનું અપ્રભાવી જનીન પર પ્રભુત્વ", "અપૂર્ણ પ્રભુતા (Incomplete Dominance)", "સહપ્રભુતા (Co-dominance)", "બહુજનીનિક વારસો (Polygenic Inheritance)"], "ans": 1, "exp": "અહીં F₁ પેઢીમાં મધ્યવર્તી લક્ષણ (ભૂરો રંગ) મળે છે, જે અપૂર્ણ પ્રભુતાનું ઉદાહરણ છે. પ્રભાવી જનીન (B) અને અપ્રભાવી જનીન (b) વચ્ચે સંપૂર્ણ પ્રભુતા ન હોવાથી મિશ્ર લક્ષણ ઉત્પન્ન થાય છે. સહપ્રભુતામાં બંને લક્ષણો એકસાથે દેખાય છે, જ્યારે બહુજનીનિક વારસામાં એકથી વધુ જનીનો લક્ષણને અસર કરે છે.", "ref": "Std 12 - પ્રકરણ ૫: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "માનવમાં ABO રુધિરજૂથ વારસો કયા પ્રકારનો છે?", "opts": ["પ્રભાવી-અપ્રભાવી વારસો", "અપૂર્ણ પ્રભુતા", "સહપ્રભુતા", "બહુજનીનિક વારસો"], "ans": 2, "exp": "ABO રુધિરજૂથમાં Iᴬ અને Iᴮ જનીનો સહપ્રભાવી છે, જ્યારે i જનીન અપ્રભાવી છે. જ્યારે Iᴬ અને Iᴮ બંને હાજર હોય ત્યારે AB રુધિરજૂથ ઉત્પન્ન થાય છે, જે બંને જનીનોની સહપ્રભુતા દર્શાવે છે. પ્રભાવી-અપ્રભાવી વારસામાં એક જનીન બીજા પર પ્રભુત્વ ધરાવે છે, જે અહીં લાગુ પડતું નથી.", "ref": "Std 12 - પ્રકરણ ૫: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક સ્ત્રી અને પુરુષ બંનેના માતા-પિતા સામાન્ય દૃષ્ટિ ધરાવતા હતા, પરંતુ બંને રંગઅંધતા (Colour Blindness) માટે વાહક છે. તેમના પુત્રને રંગઅંધતા થવાની સંભાવના કેટલી છે?", "opts": ["૦%", "૨૫%", "૫૦%", "૧૦૦%"], "ans": 2, "exp": "રંગઅંધતા X-સંલગ્ન અપ્રભાવી લક્ષણ છે. સ્ત્રી વાહક (XᶜX) અને પુરુષ સામાન્ય (XY) હોય તો તેમના પુત્રને રંગઅંધતા થવાની સંભાવના ૫૦% છે, કારણ કે પુત્રને માતા તરફથી X-રંગસૂત્ર મળે છે. જો માતા વાહક હોય તો પુત્રને Xᶜ મળવાની સંભાવના ૫૦% છે. પિતા તરફથી Y-રંગસૂત્ર મળતું હોવાથી પિતાનો કોઈ પ્રભાવ નથી.", "ref": "Std 12 - પ્રકરણ ૫: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "મેન્ડલના પ્રયોગોમાં, જ્યારે બે વિપરીત પ્રભાવી લક્ષણો ધરાવતા સ્વરૂપોને સંકરિત કરવામાં આવે છે, ત્યારે F1 પેઢીમાં કયું લક્ષણ પ્રગટ થાય છે અને શા માટે?", "opts": ["બંને લક્ષણો સમાન પ્રમાણમાં પ્રગટ થાય છે, કારણ કે તે સહ-પ્રભાવી (co-dominant) હોય છે.", "એક લક્ષણ પ્રગટ થાય છે, કારણ કે પ્રભાવી લક્ષણ અપ્રભાવી લક્ષણ પર પૂર્ણપણે પ્રભાવ શાલી હોય છે.", "બંને લક્ષણોના મિશ્રણથી નવું લક્ષણ પ્રગટ થાય છે, કારણ કે તે અપૂર્ણ પ્રભાવી (incomplete dominance) હોય છે.", "કોઈપણ લક્ષણ પ્રગટ થતું નથી, કારણ કે તે અપ્રભાવી લક્ષણો હોય છે."], "ans": 1, "exp": "પ્રભાવી લક્ષણ અપ્રભાવી લક્ષણ પર પૂર્ણપણે પ્રભાવ શાલી હોય છે, જેથી F1 પેઢીમાં ફક્ત પ્રભાવી લક્ષણ જ પ્રગટ થાય છે. વિકલ્પ A સહ-પ્રભાવીના કિસ્સામાં લાગુ પડે છે, જ્યારે વિકલ્પ C અપૂર્ણ પ્રભાવીના કિસ્સામાં લાગુ પડે છે. વિકલ્પ D ખોટો છે કારણ કે પ્રભાવી લક્ષણ હંમેશા પ્રગટ થાય છે.", "ref": "Std 12 - પ્રકરણ 5: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "માનવમાં, રક્ત હીમોફિલિયા (Hemophilia) કયા પ્રકારનું લક્ષણ છે અને તે કયા વર્ણસૂત્ર દ્વારા વહન પામે છે?", "opts": ["પ્રભાવી લક્ષણ, X વર્ણસૂત્ર દ્વારા", "અપ્રભાવી લક્ષણ, X વર્ણસૂત્ર દ્વારા", "પ્રભાવી લક્ષણ, Y વર્ણસૂત્ર દ્વારા", "અપ્રભાવી લક્ષણ, Y વર્ણસૂત્ર દ્વારા"], "ans": 1, "exp": "રક્ત હીમોફિલિયા એક અપ્રભાવી લક્ષણ છે જે X વર્ણસૂત્ર દ્વારા વહન પામે છે. વિકલ્પ A ખોટો છે કારણ કે તે પ્રભાવી નથી. વિકલ્પ C અને D ખોટા છે કારણ કે Y વર્ણસૂત્ર દ્વારા વહન પામતું નથી.", "ref": "Std 12 - પ્રકરણ 5: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "એક વટાણાના છોડમાં, પીળા બીજ (Y) અને હરિયા બીજ (y) માટેના જનીનો ધરાવતું વટાણાનું છોડ (Yy) સફેદ ફૂલ ધરાવતું વટાણાનું છોડ (yy) સાથે સંકરિત કરવામાં આવે છે. F1 પેઢીમાં કયા પ્રમાણમાં પીળા અને હરિયા બીજ ધરાવતા છોડ મળશે?", "opts": ["1:1", "3:1", "1:2:1", "2:1"], "ans": 0, "exp": "Yy અને yy વચ્ચેના સંકરણમાં, F1 પેઢીમાં Yy અને yy જનીનરચના ધરાવતા છોડ 1:1 પ્રમાણમાં મળશે, જેમાં Yy પીળા બીજ ધરાવશે અને yy હરિયા બીજ ધરાવશે. વિકલ્પ B, C, અને D આ કિસ્સામાં લાગુ પડતાં નથી.", "ref": "Std 12 - પ્રકરણ 5: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "માનવમાં, રંગ અંધત્વ (Color blindness) કયા પ્રકારનું લક્ષણ છે અને તે કયા વર્ણસૂત્ર સાથે સંકળાયેલું છે?", "opts": ["પ્રભાવી લક્ષણ, X વર્ણસૂત્ર", "અપ્રભાવી લક્ષણ, X વર્ણસૂત્ર", "પ્રભાવી લક્ષણ, Y વર્ણસૂત્ર", "અપ્રભાવી લક્ષણ, Y વર્ણસૂત્ર"], "ans": 1, "exp": "રંગ અંધત્વ એક અપ્રભાવી લક્ષણ છે જે X વર્ણસૂત્ર સાથે સંકળાયેલું છે. વિકલ્પ A ખોટો છે કારણ કે તે પ્રભાવી નથી. વિકલ્પ C અને D ખોટા છે કારણ કે Y વર્ણસૂત્ર સાથે સંકળાયેલું નથી.", "ref": "Std 12 - પ્રકરણ 5: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "એક પ્રયોગમાં, લાલ ફૂલ ધરાવતું વટાણાનું છોડ (Rr) અને સફેદ ફૂલ ધરાવતું વટાણાનું છોડ (rr)ને સંકરિત કરવામાં આવે છે. F1 પેઢીમાં કયા પ્રકારના ફૂલ મળશે અને તેનું પ્રમાણ કેટલું હશે?", "opts": ["બધા લાલ ફૂલ, 100%", "બધા ગુલાબી ફૂલ, 100%", "લાલ અને સફેદ ફૂલ, 1:1", "લાલ અને ગુલાબી ફૂલ, 3:1"], "ans": 0, "exp": "Rr અને rr વચ્ચેના સંકરણમાં, F1 પેઢીમાં Rr જનીનરચના ધરાવતા છોડ મળશે, જેમાં લાલ ફૂલ પ્રભાવી હોવાથી બધા છોડ લાલ ફૂલ ધરાવશે. વિકલ્પ B, C, અને D આ કિસ્સામાં લાગુ પડતાં નથી.", "ref": "Std 12 - પ્રકરણ 5: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "વટાણાના છોડમાં, પીળા બીજ (Y) અને હરિયા બીજ (y) માટેના જનીનો ઉપરાંત, ગોળ બીજ (R) અને કાટલા બીજ (r) માટેના જનીનો પણ હાજર છે. જ્યારે YyRr × yyrr સંકરણ કરવામાં આવે, ત્યારે F1 પેઢીમાં કેટલા પ્રકારના ફીનોટાઇપ્સ મળશે?", "opts": ["2", "4", "8", "16"], "ans": 1, "exp": "YyRr × yyrr સંકરણમાં, Yy × yy અને Rr × rr એમ બે સ્વતંત્ર સંકરણો છે. Yy × yy માં 2 ફીનોટાઇપ્સ (પીળા અને હરિયા) અને Rr × rr માં 2 ફીનોટાઇપ્સ (ગોળ અને કાટલા) મળે છે. મેન્ડલના સ્વતંત્ર વિતરણના નિયમ મુજબ, આ બંને લક્ષણો સ્વતંત્ર રીતે વિતરિત થાય છે, પરિણામે 2 × 2 = 4 ફીનોટાઇપ્સ મળે છે. A) 2 અને C) 8, D) 16 એ સ્વતંત્ર વિતરણના નિયમની ગણતરીની ખોટી સમજણ દર્શાવે છે.", "ref": "Std 12 - અધ્યાય 5: વંશવિજ્ઞાન અને વિકાસ", "ch": ""}, {"q": "માનવમાં, એક દંપતીને ત્રણ સંતાનો છે: બે દીકરીઓ સામાન્ય દૃષ્ટિ ધરાવે છે અને એક દીકરો રંગ અંધત્વથી પીડાય છે. જો દીકરો રંગ અંધત્વનું વાહક ન હોય, તો માતાના જનીનપ્રકાર (genotype) શું હશે?", "opts": ["X^C X^C", "X^C X^c", "X^c X^c", "X^C Y"], "ans": 1, "exp": "રંગ અંધત્વ X-લિંક્ડ અપ્રભાવી લક્ષણ છે. દીકરો રંગ અંધત્વથી પીડાય છે, પરંતુ વાહક નથી, એટલે તેનો જનીનપ્રકાર X^c Y હશે. માતા પાસેથી તેને X^c વારસામાં મળ્યું હોવું જોઈએ, પરંતુ માતા સામાન્ય દૃષ્ટિ ધરાવે છે, એટલે તે વાહક (X^C X^c) હશે. A) X^C X^C માતા વાહક નથી, C) X^c X^c માતા રંગ અંધત્વથી પીડાતી હોત, D) X^C Y પુરુષ જનીનપ્રકાર છે.", "ref": "Std 12 - અધ્યાય 5: વંશવિજ્ઞાન અને વિકાસ", "ch": ""}, {"q": "એક વટાણાના છોડમાં, લાલ ફૂલ (R) પ્રભાવી છે અને સફેદ ફૂલ (r) અપ્રભાવી છે. જ્યારે લાલ ફૂલ ધરાવતું છોડ (Rr) અને સફેદ ફૂલ ધરાવતું છોડ (rr) સંકરિત કરવામાં આવે, ત્યારે F1 પેઢીમાં લાલ ફૂલ ધરાવતા છોડનું પ્રમાણ કેટલું હશે?", "opts": ["25%", "50%", "75%", "100%"], "ans": 1, "exp": "Rr × rr સંકરણમાં, F1 પેઢીમાં જનીનપ્રકારો Rr અને rr એમ 50%-50% પ્રમાણમાં મળે છે. Rr લાલ ફૂલ ધરાવે છે (પ્રભાવી લક્ષણ), જ્યારે rr સફેદ ફૂલ ધરાવે છે. પરિણામે, 50% છોડ લાલ ફૂલ ધરાવશે. A) 25%, C) 75%, D) 100% એ ખોટી ગણતરીઓ છે.", "ref": "Std 12 - અધ્યાય 5: વંશવિજ્ઞાન અને વિકાસ", "ch": ""}, {"q": "માનવમાં, હીમોફિલિયા (Hemophilia) એ X-લિંક્ડ અપ્રભાવી લક્ષણ છે. એક સામાન્ય પુરુષ (X^H Y) અને એક વાહક સ્ત્રી (X^H X^h) ના સંતાનમાં હીમોફિલિયાથી પીડાતા દીકરાનું પ્રમાણ કેટલું હશે?", "opts": ["0%", "25%", "50%", "100%"], "ans": 1, "exp": "X^H Y (પુરુષ) અને X^H X^h (સ્ત્રી) ના સંતાનમાં, દીકરાઓ માટે શક્ય જનીનપ્રકારો X^H Y અને X^h Y છે. X^h Y દીકરો હીમોફિલિયાથી પીડાતો હશે. આ પ્રમાણ 25% (1/4) છે, કારણ કે દીકરો હોવાની શક્યતા 50% છે અને તેને X^h મળવાની શક્યતા 50% છે. A) 0% ખોટું છે કારણ કે શક્યતા છે, C) 50% અને D) 100% ખોટી ગણતરીઓ છે.", "ref": "Std 12 - અધ્યાય 5: વંશવિજ્ઞાન અને વિકાસ", "ch": ""}, {"q": "વટાણાના છોડમાં, ઉંચાઈ માટે ટળ (T) પ્રભાવી છે અને નીચા (t) અપ્રભાવી છે. એક ઉંચા છોડ (Tt) અને એક નીચા છોડ (tt) ના સંકરણથી મળતા બીજની F1 પેઢીમાં ઉંચા છોડનું પ્રમાણ કેટલું હશે?", "opts": ["0%", "25%", "50%", "75%"], "ans": 2, "exp": "Tt × tt સંકરણમાં, F1 પેઢીમાં જનીનપ્રકારો Tt અને tt એમ 50%-50% પ્રમાણમાં મળે છે. Tt ઉંચા છોડ ધરાવે છે (પ્રભાવી લક્ષણ), જ્યારે tt નીચા છોડ ધરાવે છે. પરિણામે, 50% છોડ ઉંચા હશે. A) 0%, B) 25%, D) 75% એ ખોટી ગણતરીઓ છે.", "ref": "Std 12 - અધ્યાય 5: વંશવિજ્ઞાન અને વિકાસ", "ch": ""}, {"q": "માનવમાં, એક દંપતીના ત્રણ સંતાનોમાં, બે દીકરીઓ સામાન્ય દૃષ્ટિ ધરાવે છે અને એક દીકરો રંગ અંધત્વથી પીડિત છે. જો માતા સામાન્ય દૃષ્ટિ ધરાવતી હોય, તો પિતાનો જનીનોટાઇપ શોધો.", "opts": ["X^C X^c", "X^C Y", "X^c Y", "X^C X^C"], "ans": 2, "exp": "રંગ અંધત્વ X-લિંક્ડ અપ્રભાવી લક્ષણ છે. દીકરો રંગ અંધત્વથી પીડિત હોવાથી તેનો જનીનોટાઇપ X^c Y હશે. માતા સામાન્ય દૃષ્ટિ ધરાવે છે, પરંતુ તે પિતા પાસેથી X^c જનીન લઈ શકે છે. આથી પિતાનો જનીનોટાઇપ X^c Y હોવો જરૂરી છે. A) અને D) માતા માટેના જનીનોટાઇપ છે, B) પિતા સામાન્ય હોત તો સંતાનોમાં રોગ ન હોત.", "ref": "Std 12 - અધ્યાય 5: વંશવેલા અને વિકાસ (લિંગ-સંલગ્ન વારસાગતતા)", "ch": ""}, {"q": "વટાણાના છોડમાં, લાલ ફૂલ (R) પ્રભાવી છે અને સફેદ ફૂલ (r) અપ્રભાવી છે. જ્યારે લાલ ફૂલ ધરાવતું છોડ (Rr) અને સફેદ ફૂલ ધરાવતું છોડ (rr) સંકરિત કરવામાં આવે, ત્યારે F1 પેઢીમાં લાલ ફૂલ ધરાવતા છોડનું પ્રમાણ કેટલું હશે?", "opts": ["25%", "50%", "75%", "100%"], "ans": 1, "exp": "Rr × rr સંકરણમાં, F1 પેઢીમાં જનીનોટાઇપ Rr અને rr મળે છે. Rr લાલ ફૂલ ધરાવે છે (પ્રભાવી લક્ષણ), જ્યારે rr સફેદ ફૂલ ધરાવે છે. આથી લાલ ફૂલ ધરાવતા છોડનું પ્રમાણ 50% હશે. A) 25% અને C) 75% અયોગ્ય છે કારણ કે તે સંકરણના ફળસ્વરૂપને ગણતરીમાં લેતા નથી. D) 100% ખોટું છે કારણ કે અપ્રભાવી લક્ષણ પણ વ્યક્ત થાય છે.", "ref": "Std 12 - અધ્યાય 5: વંશવેલા અને વિકાસ (મેન્ડલના પ્રયોગો)", "ch": ""}, {"q": "એક પ્રયોગમાં, એક વટાણાના છોડમાં લાલ ફૂલ (R) પ્રભાવી અને સફેદ ફૂલ (r) અપ્રભાવી છે. જો એક વિષમયુગ્મી લાલ ફૂલ ધરાવતું છોડ (Rr) અને એક સફેદ ફૂલ ધરાવતું છોડ (rr) વચ્ચે સંકરણ કરવામાં આવે, તો F₁ પેઢીમાં કયું પરિણામ મળવાની સંભાવના નથી?", "opts": ["50% છોડ લાલ ફૂલ ધરાવશે અને 50% છોડ સફેદ ફૂલ ધરાવશે", "બધા જ છોડ લાલ ફૂલ ધરાવશે", "બધા જ છોડ વિષમયુગ્મી હશે", "50% છોડ વિષમયુગ્મી હશે અને 50% છોડ સમયુગ્મી અપ્રભાવી હશે"], "ans": 1, "exp": "આ પ્રશ્નમાં, વિષમયુગ્મી લાલ ફૂલ ધરાવતું છોડ (Rr) અને સમયુગ્મી અપ્રભાવી સફેદ ફૂલ ધરાવતું છોડ (rr) વચ્ચે સંકરણ થાય છે. આ સંકરણમાં, F₁ પેઢીમાં 50% છોડ લાલ ફૂલ (Rr) અને 50% છોડ સફેદ ફૂલ (rr) ધરાવશે. તેથી, બધા જ છોડ લાલ ફૂલ ધરાવશે એ વિકલ્પ ખોટો છે. વિકલ્પ A, C અને D સાચા પરિણામો દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "માનવમાં, એક દંપતીના બંને સભ્યો વિષમયુગ્મી છે અને એક અપ્રભાવી જનીન (a) માટે વાહક છે જે એક ગંભીર રોગનું કારણ બને છે. આ દંપતીને ત્રણ સંતાનો છે. આ ત્રણ સંતાનોમાંથી ઓછામાં ઓછું એક સંતાન રોગગ્રસ્ત હોવાની સંભાવના કેટલી છે?", "opts": ["1/4", "3/4", "27/64", "37/64"], "ans": 3, "exp": "આ દંપતી વિષમયુગ્મી (Aa) હોવાથી, દરેક સંતાનને રોગગ્રસ્ત (aa) થવાની સંભાવના 1/4 છે. તેથી, દરેક સંતાન સામાન્ય (AA અથવા Aa) હોવાની સંભાવના 3/4 છે. ત્રણ સંતાનો બધા જ સામાન્ય હોવાની સંભાવના (3/4)³ = 27/64 છે. તેથી, ઓછામાં ઓછું એક સંતાન રોગગ્રસ્ત હોવાની સંભાવના 1 - 27/64 = 37/64 છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક પ્રયોગમાં, એક છોડમાં લાલ ફૂલ (R) પ્રભાવી છે અને સફેદ ફૂલ (r) અપ્રભાવી છે. જો એક વિષમયુગ્મી લાલ ફૂલ ધરાવતું છોડ (Rr) સ્વફલન પામે, તો F₂ પેઢીમાં કયું પરિણામ મેન્ડલના નિયમોનું ઉલ્લંઘન કરે છે?", "opts": ["લાલ ફૂલ અને સફેદ ફૂલનું પ્રમાણ 3:1 છે", "બધા જ છોડ લાલ ફૂલ ધરાવે છે", "લાલ ફૂલ અને સફેદ ફૂલનું પ્રમાણ 1:1 છે", "25% છોડ સમયુગ્મી પ્રભાવી, 50% વિષમયુગ્મી અને 25% સમયુગ્મી અપ્રભાવી છે"], "ans": 2, "exp": "મેન્ડલના નિયમો અનુસાર, વિષમયુગ્મી લાલ ફૂલ ધરાવતું છોડ (Rr) સ્વફલન પામે ત્યારે F₂ પેઢીમાં લાલ ફૂલ અને સફેદ ફૂલનું પ્રમાણ 3:1 હોવું જોઈએ. વિકલ્પ A અને D આ નિયમનું પાલન કરે છે. વિકલ્પ B ખોટો છે કારણ કે બધા જ છોડ લાલ ફૂલ ધરાવતા નથી. વિકલ્પ C પણ ખોટો છે કારણ કે તે 1:1 પ્રમાણ દર્શાવે છે, જે મેન્ડલના નિયમોનું ઉલ્લંઘન કરે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
