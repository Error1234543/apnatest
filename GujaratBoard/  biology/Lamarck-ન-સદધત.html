<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lamarck ના સિદ્ધાંત</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Lamarck ના સિદ્ધાંત</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Lamarck ના સિદ્ધાંત</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "લેમાર્કના સિદ્ધાંત અનુસાર, જીવોના અંગોનો વિકાસ કયા સિદ્ધાંત પર આધારિત છે?", "opts": ["ઉપયોગ અને અનુપયોગના સિદ્ધાંત પર", "પ્રાકૃતિક પસંદગીના સિદ્ધાંત પર", "જનીનના મ્યુટેશન પર", "પ્રજનન દરમિયાન થતી ક્રોમોઝોમલ વિનિમય પર"], "ans": 0, "exp": "લેમાર્કના સિદ્ધાંત અનુસાર, જીવોના અંગોનો વિકાસ 'ઉપયોગ અને અનુપયોગના સિદ્ધાંત' પર આધારિત છે, જેમાં ઉપયોગમાં લેવાતા અંગો વિકસે છે અને અનુપયોગમાં લેવાતા અંગો ક્ષીણ થાય છે. પ્રાકૃતિક પસંદગી ડાર્વિનના સિદ્ધાંત સાથે સંબંધિત છે, જનીનના મ્યુટેશન અને ક્રોમોઝોમલ વિનિમય આધુનિક અનુવંશિકતાના સિદ્ધાંતો છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કના સિદ્ધાંતમાં 'સમપ્રજનન' (Inheritance of Acquired Characters) નો અર્થ શું છે?", "opts": ["જીવ દ્વારા જીવનકાળ દરમિયાન મેળવેલા લક્ષણો પીઢી દર પીઢી પસાર થાય છે", "માતા-પિતા પાસેથી સંતાનોને જનીન દ્વારા લક્ષણો મળે છે", "પ્રાકૃતિક પસંદગી દ્વારા ફાયદાકારક લક્ષણોનો વિકાસ થાય છે", "મ્યુટેશન દ્વારા નવા લક્ષણો ઉત્પન્ન થાય છે"], "ans": 0, "exp": "લેમાર્કના સિદ્ધાંત અનુસાર, જીવ દ્વારા જીવનકાળ દરમિયાન મેળવેલા લક્ષણો (જેમ કે ગરદન લાંબી કરવા માટેના પ્રયત્નો) પીઢી દર પીઢી પસાર થાય છે, જેને 'સમપ્રજનન' કહેવાય છે. બાકીના વિકલ્પો ડાર્વિનના સિદ્ધાંત અથવા આધુનિક અનુવંશિકતાના સિદ્ધાંતો સાથે સંબંધિત છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કના સિદ્ધાંતની કઈ ખામીને કારણે તે આજે સ્વીકાર્ય નથી?", "opts": ["તે જનીનના આધારે લક્ષણોના વહનની વ્યાખ્યા આપતો નથી", "તે પ્રાકૃતિક પસંદગીની વ્યાખ્યા કરતો નથી", "તે ફોસિલના અભ્યાસ પર આધારિત નથી", "તે કૃત્રિમ પસંદગીની વ્યાખ્યા કરતો નથી"], "ans": 0, "exp": "લેમાર્કના સિદ્ધાંતની મુખ્ય ખામી એ છે કે તે જનીનના આધારે લક્ષણોના વહનની વ્યાખ્યા આપતો નથી. આધુનિક વિજ્ઞાન અનુસાર, મેળવેલા લક્ષણો જનીન દ્વારા વહન પામતા નથી, પરંતુ લેમાર્કનો સિદ્ધાંત આ તથ્યને ધ્યાનમાં લેતો નથી. બાકીના વિકલ્પો સિદ્ધાંતની અન્ય પાસાઓ છે પરંતુ મુખ્ય ખામી નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કના સિદ્ધાંત અનુસાર, જીરાફની લાંબી ગરદનનો વિકાસ કેવી રીતે થયો હોવાનું માનવામાં આવે છે?", "opts": ["જીરાફે ઝાડની પાનખરી પહોંચવા માટે ગરદન લાંબી કરવા માટે પ્રયત્ન કર્યો, જે પીઢી દર પીઢી પસાર થયો", "પ્રાકૃતિક પસંદગી દ્વારા લાંબી ગરદનવાળા જીરાફો જીવિત રહ્યા", "જીરાફમાં ગરદન લાંબી કરવા માટે જનીન મ્યુટેશન થયું", "જીરાફે પોતાની ગરદનને કૃત્રિમ રીતે લાંબી કરી"], "ans": 0, "exp": "લેમાર્કના સિદ્ધાંત અનુસાર, જીરાફે ઝાડની પાનખરી પહોંચવા માટે ગરદન લાંબી કરવા માટે પ્રયત્ન કર્યો, અને આ મેળવેલું લક્ષણ પીઢી દર પીઢી પસાર થયું, જેથી ગરદન લાંબી થતી ગઈ. બાકીના વિકલ્પો ડાર્વિનના સિદ્ધાંત અથવા આધુનિક વિજ્ઞાન સાથે સંબંધિત છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કના સિદ્ધાંત અને ડાર્વિનના સિદ્ધાંત વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["લેમાર્ક સિદ્ધાંત મેળવેલા લક્ષણોના વહન પર ભાર મૂકે છે, જ્યારે ડાર્વિન પ્રાકૃતિક પસંદગી પર ભાર મૂકે છે", "લેમાર્ક સિદ્ધાંત જનીન પર આધારિત છે, જ્યારે ડાર્વિન સિદ્ધાંત ઉપયોગ અને અનુપયોગ પર આધારિત છે", "લેમાર્ક સિદ્ધાંત ફોસિલ અભ્યાસ પર આધારિત છે, જ્યારે ડાર્વિન સિદ્ધાંત કૃત્રિમ પસંદગી પર આધારિત છે", "લેમાર્ક સિદ્ધાંત કેવળ જીવવિજ્ઞાન પર આધારિત છે, જ્યારે ડાર્વિન સિદ્ધાંત રસાયણશાસ્ત્ર પર આધારિત છે"], "ans": 0, "exp": "લેમાર્કના સિદ્ધાંત અને ડાર્વિનના સિદ્ધાંત વચ્ચેનો મુખ્ય તફાવત એ છે કે લેમાર્ક સિદ્ધાંત મેળવેલા લક્ષણોના વહન (સમપ્રજનન) પર ભાર મૂકે છે, જ્યારે ડાર્વિન પ્રાકૃતિક પસંદગી પર ભાર મૂકે છે. બાકીના વિકલ્પો સિદ્ધાંતોના ગેરમાર્ગે વર્ણન કરે છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કના સિદ્ધાંત અનુસાર, જો એક જીવ સતત પાણીના વાતાવરણમાં રહે અને તેના ફેફસાંનો ઉપયોગ ન કરે, તો લાંબા ગાળામાં શું થશે?", "opts": ["ફેફસાંનો કદમાં વિકાસ થશે કારણ કે તેનો ઉપયોગ ન થવાથી તે વધુ મજબૂત બનશે.", "ફેફસાં ધીરે ધીરે ક્ષીણ થશે અને અંતે લુપ્ત થઈ જશે કારણ કે 'ઉપયોગ અને અઉપયોગનો નિયમ' અનુસાર અંગોનો વિકાસ અથવા ક્ષય થાય છે.", "ફેફસાંનો આકાર બદલાશે અને તે પાણી શ્વસન માટે અનુકૂળ બનશે.", "ફેફસાં પર કોઈ અસર થશે નહીં કારણ કે અનુવંશિકતા માત્ર જનીન પર આધારિત છે."], "ans": 1, "exp": "લેમાર્કના 'ઉપયોગ અને અઉપયોગના નિયમ' અનુસાર, જો કોઈ અંગનો ઉપયોગ ન થાય તો તે ક્ષીણ થાય છે અને અંતે લુપ્ત થઈ જાય છે. અહીં ફેફસાંનો ઉપયોગ ન થવાથી તે ક્ષીણ થશે. વિકલ્પ A લેમાર્કના સિદ્ધાંતના વિપરિત છે, વિકલ્પ C અસંગત છે કારણ કે લેમાર્કે આકારમાં ફેરફારની વાત નથી કરી, અને વિકલ્પ D ડાર્વિનના સિદ્ધાંતને અનુસરે છે, લેમાર્કના નહીં.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કના સિદ્ધાંત અનુસાર, જીવોમાં થતી ઉત્ક્રાંતિનો મુખ્ય ચાલક બળ કયું છે?", "opts": ["પ્રાકૃતિક પસંદગી", "અંગોના ઉપયોગ અને અઉપયોગ દ્વારા થતી પરિવર્તનશીલતા", "જનીન મ્યુટેશન", "જનસંખ્યામાં થતો જનીન વહન"], "ans": 1, "exp": "લેમાર્કના સિદ્ધાંત અનુસાર, ઉત્ક્રાંતિનો મુખ્ય ચાલક બળ અંગોના ઉપયોગ અને અઉપયોગ દ્વારા થતી પરિવર્તનશીલતા છે. પ્રાકૃતિક પસંદગી (A) ડાર્વિનના સિદ્ધાંતનો ભાગ છે, જનીન મ્યુટેશન (C) અને જનીન વહન (D) આધુનિક ઉત્ક્રાંતિ સિદ્ધાંતના ભાગ છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કના સિદ્ધાંત અનુસાર, જો એક જીવ સતત ઉચ્ચ તાપમાનના વાતાવરણમાં રહે, તો તેની ત્વચા કેવી રીતે અનુકૂળ થશે?", "opts": ["ત્વચા પાતળી થશે જેથી શરીરમાંથી ઉષ્ણતા ઓછી બહાર નીકળે.", "ત્વચા જાડી થશે જેથી શરીરને ઉચ્ચ તાપમાનથી બચાવી શકે.", "ત્વચાનો રંગ બદલાશે જેથી તે વાતાવરણ સાથે મિશ્રિત થઈ જાય.", "ત્વચા પર કોઈ ફેરફાર થશે નહીં કારણ કે તાપમાનનો અંગોના વિકાસ પર કોઈ પ્રભાવ પડતો નથી."], "ans": 1, "exp": "લેમાર્કના સિદ્ધાંત અનુસાર, જીવોના અંગો તેના વાતાવરણ સાથે અનુકૂળ થાય છે. ઉચ્ચ તાપમાનમાં ત્વચા જાડી થવી એ અંગના ઉપયોગ દ્વારા થતો ફેરફાર છે. વિકલ્પ A અને C લેમાર્કના સિદ્ધાંતને અનુસરતા નથી, અને વિકલ્પ D સંપૂર્ણપણે ખોટો છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કના સિદ્ધાંત અનુસાર, નીચેના પૈકી કયું કથન ખોટું છે?", "opts": ["જીવોના અંગોનો વિકાસ તેના ઉપયોગ પર આધારિત છે.", "અર્જિત લક્ષણો પેઢી દર પેઢી પસાર થાય છે.", "ઉત્ક્રાંતિનો મુખ્ય હેતુ પ્રજાતિના અસ્તિત્વ માટે સંર્ષ છે.", "જીવોના અંગોનો ક્ષય તેના અઉપયોગને કારણે થાય છે."], "ans": 2, "exp": "લેમાર્કના સિદ્ધાંત અનુસાર, ઉત્ક્રાંતિનો મુખ્ય હેતુ પ્રજાતિના અસ્તિત્વ માટે સંર્ષ નથી, પરંતુ અંગોના ઉપયોગ અને અઉપયોગ દ્વારા થતી પરિવર્તનશીલતા છે. વિકલ્પ A, B, અને D લેમાર્કના સિદ્ધાંતને અનુસરે છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કના સિદ્ધાંત અનુસાર, નીચેના પૈકી કયું ઉદાહરણ 'સમપ્રજનન' (Inheritance of Acquired Characters) ને સૌથી યોગ્ય રીતે દર્શાવે છે?", "opts": ["એક વ્યક્તિ જે સતત વજન ઉચકે છે તેના બાળકોને મજબૂત હાથ પ્રાપ્ત થશે.", "એક વ્યક્તિ જે સતત ધૂમ્રપાન કરે છે તેના બાળકોને ફેફસાંના રોગ થવાની શક્યતા વધુ હશે.", "એક વ્યક્તિ જે સતત સૂર્યપ્રકાશમાં કામ કરે છે તેની ત્વચા કાળી પડશે અને તેના બાળકોને પણ કાળી ત્વચા પ્રાપ્ત થશે.", "એક વ્યક્તિ જે સતત અભ્યાસ કરે છે તેના બાળકોને ઉચ્ચ બુદ્ધિ પ્રાપ્ત થશે."], "ans": 2, "exp": "લેમાર્કના સિદ્ધાંત અનુસાર, 'સમપ્રજનન' એટલે અર્જિત લક્ષણો પેઢી દર પેઢી પસાર થાય છે. વિકલ્પ Cમાં, સૂર્યપ્રકાશમાં કામ કરવાથી ત્વચા કાળી પડવી એ અર્જિત લક્ષણ છે અને લેમાર્ક અનુસાર, આ લક્ષણ બાળકોને પણ પ્રાપ્ત થશે. વિકલ્પ A, B, અને D લેમાર્કના સિદ્ધાંતને સંપૂર્ણપણે અનુસરતા નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કના સિદ્ધાંત અનુસાર, જો એક જીવ સતત અંધારામાં રહે તો તેની આંખોના અંગો પર શું અસર થશે અને આ પરિવર્તન તેની સંતતિમાં કેવી રીતે પ્રસારિત થશે?", "opts": ["આંખોનો વિકાસ થશે અને આ લક્ષણ સંતતિમાં પ્રસારિત થશે કારણ કે જીવે આ લક્ષણ મેળવ્યું છે.", "આંખોનો ક્ષય થશે અને આ લક્ષણ સંતતિમાં પ્રસારિત થશે કારણ કે જીવે આ લક્ષણ ગુમાવ્યું છે.", "આંખોનો ક્ષય થશે પરંતુ આ લક્ષણ સંતતિમાં પ્રસારિત થશે નહીં કારણ કે લેમાર્કના સિદ્ધાંત અનુસાર મેળવેલા લક્ષણો પ્રસારિત થતાં નથી.", "આંખોનો વિકાસ થશે પરંતુ આ લક્ષણ સંતતિમાં પ્રસારિત થશે નહીં કારણ કે લેમાર્કના સિદ્ધાંત અનુસાર મેળવેલા લક્ષણો પ્રસારિત થતાં નથી."], "ans": 1, "exp": "લેમાર્કના સિદ્ધાંત અનુસાર, જીવોના અંગોનો વિકાસ અથવા ક્ષય તેના વાતાવરણ અનુસાર થાય છે અને આ મેળવેલા લક્ષણો સંતતિમાં પ્રસારિત થાય છે. અંધારામાં રહેતા જીવની આંખોનો ક્ષય થશે અને આ લક્ષણ સંતતિમાં પ્રસારિત થશે. વિકલ્પ A ખોટો છે કારણ કે અંધારામાં આંખોનો વિકાસ નહીં થાય. વિકલ્પ C અને D ખોટા છે કારણ કે લેમાર્કના સિદ્ધાંત અનુસાર મેળવેલા લક્ષણો પ્રસારિત થાય છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કના સિદ્ધાંત અનુસાર, નીચેના પૈકી કયું કથન 'વપરાશ અને અવપરાશ' (Use and Disuse) ના સિદ્ધાંતને સૌથી સારી રીતે વર્ણવે છે?", "opts": ["જીવોના અંગોનો વિકાસ તેના વપરાશ પર આધારિત છે, પરંતુ અવપરાશથી અંગોનો ક્ષય થતો નથી.", "જીવોના અંગોનો વિકાસ અને ક્ષય તેના વપરાશ અને અવપરાશ પર આધારિત છે.", "જીવોના અંગોનો વિકાસ તેના વાતાવરણ પર આધારિત છે, પરંતુ વપરાશ અને અવપરાશનો તેના પર કોઈ પ્રભાવ પડતો નથી.", "જીવોના અંગોનો વિકાસ તેના જનીન પર આધારિત છે, વપરાશ અને અવપરાશનો તેના પર કોઈ પ્રભાવ પડતો નથી."], "ans": 1, "exp": "લેમાર્કના સિદ્ધાંત અનુસાર, જીવોના અંગોનો વિકાસ અને ક્ષય તેના વપરાશ અને અવપરાશ પર આધારિત છે. વિકલ્પ A ખોટો છે કારણ કે અવપરાશથી અંગોનો ક્ષય થાય છે. વિકલ્પ C અને D ખોટા છે કારણ કે લેમાર્કના સિદ્ધાંત અનુસાર વપરાશ અને અવપરાશનો અંગોના વિકાસ અને ક્ષય પર પ્રભાવ પડે છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કના સિદ્ધાંત અનુસાર, જીવોમાં 'અનુકૂલન' (Adaptation) ની પ્રક્રિયા કયા બે સિદ્ધાંતો પર આધારિત છે, પરંતુ આ સિદ્ધાંતોની સૌથી મોટી મર્યાદા કયા તથ્ય દ્વારા સ્પષ્ટ થાય છે?", "opts": ["વપરાશ અને અવપરાશ, સમપ્રજનન; પરંતુ જનીનમાં થતી પરિવર્તનશીલતા (Mutability) ને આ સિદ્ધાંત સમજાવી શકતો નથી", "પ્રાકૃતિક પસંદગી, જનીન વહન; પરંતુ લેમાર્કે જનીનના અસ્તિત્વ વિશે જાણ કરેલ નહોતી", "ઉત્ક્રાંતિનો દર, પર્યાવરણીય દબાણ; પરંતુ આ સિદ્ધાંત જીવનચક્રની લાંબી અવધિને ધ્યાનમાં લેતો નથી", "પ્રજનન દર, અનુવંશિકતા; પરંતુ લેમાર્કના સિદ્ધાંતમાં પ્રજનન કોષોની ભૂમિકા સ્પષ્ટ નથી"], "ans": 0, "exp": "લેમાર્કના સિદ્ધાંતના મુખ્ય સિદ્ધાંતો 'વપરાશ અને અવપરાશ' (Use and Disuse) તેમજ 'સમપ્રજનન' (Inheritance of Acquired Characters) છે. પરંતુ આ સિદ્ધાંત જનીનમાં થતી પરિવર્તનશીલતાને સમજાવી શકતો નથી, કારણ કે લેમાર્કને જનીન વિશે જાણ નહોતી. બાકીના વિકલ્પો લેમાર્કના સિદ્ધાંત સાથે સંપૂર્ણ રીતે બંધબેસતા નથી અથવા અસંગત છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "લેમાર્કના ઉત્ક્રાંતિ સિદ્ધાંત અનુસાર, નીચેના પૈકી કયું ઉદાહરણ 'સમપ્રજનન' (Inheritance of Acquired Characters) ના સિદ્ધાંતને સંપૂર્ણપણે ખોટું પાડે છે, પરંતુ આધુનિક આનુવંશિકતા (Modern Genetics) ના સંદર્ભમાં આંશિક સમર્થન મેળવે છે?", "opts": ["ઉંદરોની પૂંછડી કાપવાથી તેમની સંતતિમાં ટૂંકી પૂંછડીવાળા ઉંદરો જન્મે છે.", "વજન ઉંચકવાના કસરતથી વિકસિત સ્નાયુઓ માતા-પિતાના બાળકોમાં આનુવંશિક રીતે પ્રાપ્ત થાય છે.", "કેટલાક જીવાણુઓમાં એન્ટિબાયોટિક પ્રતિરોધકતા (Antibiotic Resistance) નો વિકાસ પર્યાવરણીય દબાણને કારણે થાય છે, જે સંતતિમાં આનુવંશિક રીતે પ્રસરે છે.", "અંધારામાં રહેતા પ્રાણીઓની આંખો નાની થઈ જાય છે અને આ લક્ષણ તેમની સંતતિમાં પણ જોવા મળે છે."], "ans": 2, "exp": "લેમાર્કના સિદ્ધાંત અનુસાર, પર્યાવરણીય પ્રભાવથી પ્રાપ્ત થયેલા લક્ષણો આનુવંશિક રીતે સંતતિમાં પ્રસરે છે. પરંતુ વિકલ્પ (C) માં જણાવેલ એન્ટિબાયોટિક પ્રતિરોધકતા જીવાણુઓમાં DNA પરિવર્તન (Mutation) ને કારણે થાય છે, જે આનુવંશિક છે અને સંતતિમાં પ્રસરે છે. આમ, આ ઉદાહરણ લેમાર્કના સિદ્ધાંતને સંપૂર્ણપણે ખોટું પાડે છે, પરંતુ આધુનિક આનુવંશિકતા (જેમાં પરિવર્તન આનુવંશિક હોય છે) ને આંશિક સમર્થન આપે છે. બાકીના વિકલ્પો લેમાર્કના સિદ્ધાંતને સમર્થન આપે છે, પરંતુ વાસ્તવિકતામાં ખોટા છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કના સિદ્ધાંત અનુસાર, 'વપરાશ અને અવપરાશ' (Use and Disuse) ના નિયમને આધારે નીચેના પૈકી કયું કથન ખોટું છે, જે આધુનિક જીવવિજ્ઞાન (Modern Biology) ના સંદર્ભમાં પણ અસંગત છે?", "opts": ["સતત દોડતા પ્રાણીઓના પગના સ્નાયુઓ મજબૂત બને છે અને આ લક્ષણ તેમની સંતતિમાં પ્રસરે છે.", "અંધારામાં રહેતા પ્રાણીઓની આંખો નાની થઈ જાય છે કારણ કે તેનો ઉપયોગ ઓછો થાય છે.", "સતત તરતા માછલીઓના ફિન્સ મજબૂત બને છે અને આ લક્ષણ તેમની સંતતિમાં આનુવંશિક રીતે પ્રસરે છે.", "જો કોઈ પ્રાણીના દાંતનો ઉપયોગ ન કરવામાં આવે, તો તેની સંતતિમાં દાંત નાના થઈ જાય અથવા ગાયબ થઈ જાય છે."], "ans": 3, "exp": "લેમાર્કના સિદ્ધાંત અનુસાર, 'વપરાશ અને અવપરાશ' ના નિયમ મુજબ, જે અંગોનો ઉપયોગ વધુ થાય છે તે મજબૂત બને છે અને જેનો ઉપયોગ ઓછો થાય છે તે નબળા પડે છે અથવા ગાયબ થાય છે. આ લક્ષણો આનુવંશિક રીતે સંતતિમાં પ્રસરે છે. પરંતુ વિકલ્પ (D) ખોટો છે કારણ કે દાંતનો વિકાસ અને કદ આનુવંશિક જનીનો (Genes) દ્વારા નિયંત્રિત થાય છે, નહીં કે ઉપયોગ કે અવપરાશથી. આધુનિક જીવવિજ્ઞાનમાં પણ આ કથન અસંગત છે. બાકીના વિકલ્પો લેમાર્કના સિદ્ધાંતને સમર્થન આપે છે, પરંતુ વાસ્તવિકતામાં આંશિક રીતે જ સ્વીકાર્ય છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કના સિદ્ધાંત અનુસાર, જો એક જાતિના જીવો સતત પથરાળ જમીન પર રહે અને તેમના શરીરના નીચેના ભાગમાં ઘર્ષણ થતું રહે, તો લાંબા ગાળામાં શું થશે?", "opts": ["તેમના શરીરના નીચેના ભાગમાં ચામડી જાડી થશે અને આ લક્ષણ પેઢીદરપેઢી પસાર થશે", "તેમના શરીરના નીચેના ભાગમાં ચામડી પાતળી થશે પરંતુ આ લક્ષણ પેઢીદરપેઢી પસાર થશે નહીં", "તેમના શરીરના નીચેના ભાગમાં ચામડી જાડી થશે પરંતુ આ લક્ષણ ફક્ત તે જીવના જીવનકાળ દરમિયાન જ રહેશે", "તેમના શરીરના નીચેના ભાગમાં કોઈ ફેરફાર થશે નહીં કારણ કે ઘર્ષણ એ વારસાગત લક્ષણ નથી"], "ans": 0, "exp": "લેમાર્કના સિદ્ધાંત અનુસાર, 'વપરાશ અને અવપરાશ' ના નિયમ મુજબ, શરીરના જે ભાગનો સતત ઉપયોગ થાય છે તે વિકસિત થાય છે અને આ લક્ષણ 'સમપ્રજનન' દ્વારા પેઢીદરપેઢી પસાર થાય છે. અહીં, ઘર્ષણને કારણે ચામડી જાડી થશે અને આ લક્ષણ વારસાગત હશે. બાકીના વિકલ્પો ખોટા છે કારણ કે લેમાર્કના સિદ્ધાંતમાં મેળવેલા લક્ષણો વારસાગત હોવાનું માનવામાં આવે છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કના સિદ્ધાંત અનુસાર, નીચેના પૈકી કયું કથન 'અંતર્ગત પ્રવૃત્તિ' (Inner Vital Force) ની સંકલ્પનાને સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["જીવોમાં ઉત્ક્રાંતિ માટે બાહ્ય પરિબળો જવાબદાર છે", "જીવોમાં ઉત્ક્રાંતિ માટે અંતર્ગત શક્તિ જવાબદાર છે જે તેમને વધુ જટિલ બનાવે છે", "જીવોમાં ઉત્ક્રાંતિ માટે પ્રાકૃતિક પસંદગી જવાબદાર છે", "જીવોમાં ઉત્ક્રાંતિ માટે જનીનમાં થતી બદલાવ જવાબદાર છે"], "ans": 1, "exp": "લેમાર્કના સિદ્ધાંત અનુસાર, જીવોમાં ઉત્ક્રાંતિ માટે 'અંતર્ગત પ્રવૃત્તિ' (Inner Vital Force) જવાબદાર છે, જે જીવોને વધુ જટિલ અને ઉન્નત બનાવે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે બાહ્ય પરિબળો, પ્રાકૃતિક પસંદગી અને જનીન બદલાવ લેમાર્કના સિદ્ધાંતના ભાગ નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કના સિદ્ધાંત અનુસાર, જો એક જીવ સતત ઉંચાઈ પર રહે અને હવામાં ઓક્સિજન ઓછી હોય, તો લાંબા ગાળામાં તેના શ્વસન અંગમાં શું ફેરફાર થશે?", "opts": ["શ્વસન અંગોનો કદ ઘટશે કારણ કે ઓક્સિજનની જરૂરિયાત ઓછી થશે", "શ્વસન અંગોનો કદ વધશે અને આ લક્ષણ પેઢીદરપેઢી પસાર થશે", "શ્વસન અંગોનો કદ વધશે પરંતુ આ લક્ષણ ફક્ત તે જીવના જીવનકાળ દરમિયાન જ રહેશે", "શ્વસન અંગોનો કદ પર કોઈ અસર થશે નહીં"], "ans": 1, "exp": "લેમાર્કના સિદ્ધાંત અનુસાર, જો જીવ સતત ઓછી ઓક્સિજન વાળા વાતાવરણમાં રહે, તો તેના શ્વસન અંગોનો વિકાસ થશે (વપરાશના નિયમ અનુસાર) અને આ લક્ષણ 'સમપ્રજનન' દ્વારા પેઢીદરપેઢી પસાર થશે. બાકીના વિકલ્પો ખોટા છે કારણ કે લેમાર્કના સિદ્ધાંતમાં મેળવેલા લક્ષણો વારસાગત હોવાનું માનવામાં આવે છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કના સિદ્ધાંત અનુસાર, નીચેના પૈકી કયું ઉદાહરણ 'વપરાશ અને અવપરાશ' (Use and Disuse) ના નિયમને સૌથી યોગ્ય રીતે દર્શાવે છે?", "opts": ["ગિરગિટની ચામડીનો રંગ પરિવર્તન", "કેળના પાનનો વિકાસ", "મનુષ્યના અપેન્ડિક્સનો કદ ઘટવો", "જીરાફની લાંબી ગરદન"], "ans": 2, "exp": "લેમાર્કના સિદ્ધાંત અનુસાર, 'વપરાશ અને અવપરાશ' ના નિયમ મુજબ, શરીરના જે ભાગનો ઉપયોગ ન થાય તે ક્ષીણ થાય છે. મનુષ્યના અપેન્ડિક્સનો કદ ઘટવો એ આ નિયમને દર્શાવે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે ગિરગિટની ચામડીનો રંગ પરિવર્તન, કેળના પાનનો વિકાસ અને જીરાફની લાંબી ગરદન એ 'વપરાશ' ના નિયમને દર્શાવે છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેમાર્કના સિદ્ધાંત અનુસાર, જો એક જાતિના સસ્તન પ્રાણી સતત પાણી હેઠળ રહે અને તેની ત્વચા પર કાટમાળ (algae) ઉગવા લાગે, તો લાંબા ગાળે તેની શરીરરચનામાં કયો ફેરફાર થવાની શક્યતા છે, જ્યારે તેના વંશજોને પણ આ લક્ષણ અનુવંશિક રીતે મળે?", "opts": ["ત્વચા પર કાટમાળના સંપર્કને કારણે ત્વચા મોટી અને જાડી બનશે", "ત્વચા પર કાટમાળના સંપર્કને કારણે ત્વચા પાતળી અને પારદર્શક બનશે", "ત્વચા પર કાટમાળના સંપર્કને કારણે ત્વચા હરિતદ્રવ્ય (chlorophyll) ધરાવતી બનશે", "ત્વચા પર કાટમાળના સંપર્કને કારણે ત્વચા પર કવચ જેવી રચના વિકસિત થશે"], "ans": 2, "exp": "લેમાર્કના સિદ્ધાંત અનુસાર, 'વપરાશ અને અવપરાશ' (Use and Disuse) અને 'સમપ્રજનન' (Inheritance of Acquired Characters) ના નિયમ મુજબ, જો એક જીવ સતત કોઈ વિશિષ્ટ પરિસ્થિતિમાં રહે તો તેના શરીરમાં થતા ફેરફારો તેના વંશજોને પણ અનુવંશિક રીતે મળે. અહીં, કાટમાળ (algae) ના સંપર્કને કારણે ત્વચા હરિતદ્રવ્ય (chlorophyll) ધરાવતી બનશે, કારણ કે કાટમાળમાં હરિતદ્રવ્ય હોય છે અને લેમાર્કના સિદ્ધાંત અનુસાર, આ લક્ષણ વંશજોને પણ મળશે. બાકીના વિકલ્પો (A, B, D) લેમાર્કના સિદ્ધાંત સાથે સુસંગત નથી, કારણ કે તે ત્વચાના ભૌતિક ફેરફારો દર્શાવે છે, પરંતુ હરિતદ્રવ્યનો વિકાસ ઉત્ક્રાંતિની દ્રષ્ટિએ વધુ મહત્વપૂર્ણ છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}];

  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
