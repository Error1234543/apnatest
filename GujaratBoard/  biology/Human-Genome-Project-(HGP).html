<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Genome Project (HGP)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Human Genome Project (HGP)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Human Genome Project (HGP)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "હ્યુમન જીનોમ પ્રોજેક્ટ (HGP) દરમિયાન કયા વર્ષે પ્રથમ વખત માનવીના સંપૂર્ણ જીનોમનું ડ્રાફ્ટ સીક્વેન્સ પ્રકાશિત કરવામાં આવ્યું હતું?", "opts": ["૧૯૯૦", "૨૦૦૦", "૨૦૦૧", "૨૦૦૩"], "ans": 2, "exp": "હ્યુમન જીનોમ પ્રોજેક્ટ (HGP) નું પ્રથમ ડ્રાફ્ટ સીક્વેન્સ ફેબ્રુઆરી ૨૦૦૧ માં પ્રકાશિત કરવામાં આવ્યું હતું. ૧૯૯૦ માં પ્રોજેક્ટની શરૂઆત થઈ હતી, ૨૦ી૦ માં કામ ચાલુ હતું, અને ૨૦ી૩ માં પ્રોજેક્ટ પૂર્ણ થયું હતું. આથી સૌથી યોગ્ય ઉત્તર ૨૦ી૧ છે.", "ref": "Std 12 - Chapter 6: જીનોમિક્સ અને હ્યુમન જીનોમ પ્રોજેક્ટ", "ch": ""}, {"q": "HGP દ્વારા શોધાયેલા માનવ જીનોમમાં કેટલા ટકા ભાગ એવા છે જે કોડિંગ ક્ષેત્ર (coding regions) ધરાવે છે?", "opts": ["લગભગ ૨%", "લગભગ ૧૦%", "લગભગ ૨૫%", "લગભગ ૫૦%"], "ans": 0, "exp": "HGP દ્વારા શોધાયું કે માનવ જીનોમમાં લગભગ ૨% ભાગ જ કોડિંગ ક્ષેત્ર (exons) ધરાવે છે. બાકીનો ભાગ નોન-કોડિંગ (introns, regulatory sequences, etc.) છે. ૧૦%, ૨૫%, અને ૫૦% એ અતિશયોક્તિ છે.", "ref": "Std 12 - Chapter 6: જીનોમિક્સ અને હ્યુમન જીનોમ પ્રોજેક્ટ", "ch": ""}, {"q": "HGP દરમિયાન વપરાતી સીક્વેન્સિંગ પદ્ધતિ કઈ હતી, જેને 'Shotgun Sequencing' તરીકે પણ ઓળખવામાં આવે છે?", "opts": ["સેન્ગર સીક્વેન્સિંગ", "PCR (Polymerase Chain Reaction)", "ગેલ ઇલેક્ટ્રોફોરેસિસ", "બ્લોટિંગ ટેકનિક"], "ans": 0, "exp": "HGP દરમિયાન 'Shotgun Sequencing' પદ્ધતિ તરીકે સેન્ગર સીક્વેન્સિંગનો ઉપયોગ થયો હતો. PCR, ગેલ ઇલેક્ટ્રોફોરેસિસ, અને બ્લોટિંગ ટેકનિક એ સીક્વેન્સિંગ માટે નહીં પરંતુ અન્ય પ્રયોગશાળા ટેકનિક્સ માટે વપરાય છે.", "ref": "Std 12 - Chapter 6: જીનોમિક્સ અને હ્યુમન જીનોમ પ્રોજેક્ટ", "ch": ""}, {"q": "HGP ના મુખ્ય ઉદ્દેશ્યોમાંથી કયો ઉદ્દેશ્ય નહોતો?", "opts": ["માનવ જીનોમનું સંપૂર્ણ સીક્વેન્સ શોધવું", "માનવ જીનોમમાં રહેલા જીનની સંખ્યા નક્કી કરવી", "માનવ જીનોમના કોડિંગ અને નોન-કોડિંગ ભાગોની ઓળખ કરવી", "માનવ જીનોમમાં નવાં જીન ઉમેરવાં"], "ans": 3, "exp": "HGP ના મુખ્ય ઉદ્દેશ્યો માનવ જીનોમનું સીક્વેન્સ શોધવું, જીનની સંખ્યા નક્કી કરવી, અને કોડિંગ/નોન-કોડિંગ ભાગોની ઓળખ કરવી હતા. માનવ જીનોમમાં નવાં જીન ઉમેરવાં એ HGP નો ઉદ્દેશ્ય નહોતો.", "ref": "Std 12 - Chapter 6: જીનોમિક્સ અને હ્યુમન જીનોમ પ્રોજેક્ટ", "ch": ""}, {"q": "HGP દ્વારા શોધાયેલા માનવ જીનોમમાં કેટલા જીન હોવાનો અંદાજ મૂકવામાં આવ્યો હતો?", "opts": ["લગભગ ૨૦,૦૦૦", "લગભગ ૩૦,૦૦૦", "લગભગ ૫૦,૦૦૦", "લગભગ ૧,૦૦,૦૦૦"], "ans": 1, "exp": "HGP દ્વારા માનવ જીનોમમાં લગભગ ૩૦,૦૦૦ જીન હોવાનો અંદાજ મૂકવામાં આવ્યો હતો. ૨૦,૦ીી, ૫ી,ીીી, અને ૧,ીી,ીીી એ અયોગ્ય અંદાજો છે.", "ref": "Std 12 - Chapter 6: જીનોમિક્સ અને હ્યુમન જીનોમ પ્રોજેક્ટ", "ch": ""}, {"q": "હ્યુમન જીનોમ પ્રોજેક્ટ (HGP) દરમિયાન, કયા જીવના જીનોમનો અભ્યાસ માનવ જીનોમ સાથે સરખામણી કરવા માટે કરવામાં આવ્યો હતો, જેનાથી ઉત્ક્રાંતિ અંગેની મહત્વપૂર્ણ માહિતી મળી હતી?", "opts": ["ઇ. કોલાઈ (Escherichia coli)", "મક્કા (Zea mays)", "મસ્ટી (Mus musculus - મૌસ)", "ડ્રોસોફિલા (Drosophila melanogaster)"], "ans": 2, "exp": "હ્યુમન જીનોમ પ્રોજેક્ટમાં માનવ જીનોમની સરખામણી મસ્ટી (Mus musculus)ના જીનોમ સાથે કરવામાં આવી હતી, કારણ કે મસ્ટી માનવ સાથે અનુવંશિકતામાં ઘણી સમાનતાઓ ધરાવે છે. ઇ. કોલાઈ બેક્ટેરિયા છે, મક્કા વનસ્પતિ છે, અને ડ્રોસોફિલા એક ફળમખી છે, જે માનવ સાથે ઓછી સમાનતા ધરાવે છે. મસ્ટીનો ઉપયોગ ઉત્ક્રાંતિ અને રોગોના અભ્યાસમાં થાય છે.", "ref": "Std 12 - Chapter 6: મોલેક્યુલર બાયોલોજી અને બાયોટેકનોલોજી", "ch": ""}, {"q": "HGP દરમિયાન, કયા પ્રકારના DNA ના ભાગોને 'જંક DNA' તરીકે ઓળખવામાં આવ્યા હતા, પરંતુ પાછળથી તેમની કાર્યક્ષમતા શોધાઈ હતી?", "opts": ["એક્ઝોન (Exons)", "ઇન્ટ્રોન (Introns)", "રિપિટેડ સીક્વેન્સ (Repeated Sequences)", "ટેલોમિયર (Telomeres)"], "ans": 2, "exp": "HGP દરમિયાન, રિપિટેડ સીક્વેન્સ (પુનરાવર્તિત અનુક્રમો)ને પ્રારંભમાં 'જંક DNA' તરીકે ગણવામાં આવ્યા હતા, પરંતુ પાછળથી શોધાયું કે આ ભાગો જીન નિયંત્રણ, કોષીય પ્રક્રિયાઓ અને જીનોમિક સ્થિરતામાં મહત્વની ભૂમિકા ભજવે છે. એક્ઝોન કોડિંગ ભાગો છે, ઇન્ટ્રોન નોન-કોડિંગ ભાગો છે પરંતુ તેઓ mRNA પ્રોસેસિંગમાં મહત્વના છે, અને ટેલોમિયર વર્ણસૂત્રના અંતે સ્થિત છે અને કોષીય વૃદ્ધિ સાથે સંબંધિત છે.", "ref": "Std 12 - Chapter 6: મોલેક્યુલર બાયોલોજી અને બાયોટેકનોલોજી", "ch": ""}, {"q": "HGP દ્વારા શોધાયેલા માનવ જીનોમમાં, કયા પ્રકારના જીનોમાં સૌથી વધુ પ્રમાણમાં 'સિંગલ ન્યુક્લિયોટાઇડ પોલિમોર્ફિઝમ (SNP)' જોવા મળ્યા હતા?", "opts": ["હાઉસકીપિંગ જીન (Housekeeping Genes)", "રોગ સંબંધિત જીન (Disease-associated Genes)", "પ્રતિરક્ષા સંબંધિત જીન (Immune-related Genes)", "ઉત્ક્રાંતિ સંબંધિત જીન (Evolution-related Genes)"], "ans": 1, "exp": "HGP દરમિયાન, રોગ સંબંધિત જીનોમાં સૌથી વધુ પ્રમાણમાં 'સિંગલ ન્યુક્લિયોટાઇડ પોલિમોર્ફિઝમ (SNP)' જોવા મળ્યા હતા. SNP એ માનવ જીનોમમાં સૌથી સામાન્ય પ્રકારનો જીનેટિક વેરિયેશન છે, જે રોગોના વિકાસ અને દવાઓ પ્રત્યેની પ્રતિક્રિયામાં મહત્વની ભૂમિકા ભજવે છે. હાઉસકીપિંગ જીન, પ્રતિરક્ષા સંબંધિત જીન અને ઉત્ક્રાંતિ સંબંધિત જીનોમાં SNP નું પ્રમાણ ઓછું હોય છે.", "ref": "Std 12 - Chapter 6: મોલેક્યુલર બાયોલોજી અને બાયોટેકનોલોજી", "ch": ""}, {"q": "HGP ના પરિણામે, કયા રોગના જીનની શોધ થઈ હતી, જેના કારણે માનવમાં સિકલ સેલ એનિમિયા થાય છે?", "opts": ["HBB જીન (Hemoglobin Beta)", "CFTR જીન (Cystic Fibrosis Transmembrane Conductance Regulator)", "BRCA1 જીન (Breast Cancer 1)", "TP53 જીન (Tumor Protein p53)"], "ans": 0, "exp": "HGP ના પરિણામે, HBB જીન (હિમોગ્લોબિન બીટા) ની શોધ થઈ હતી, જેના મ્યુટેશનના કારણે સિકલ સેલ એનિમિયા થાય છે. CFTR જીન સિસ્ટિક ફાઇબ્રોસિસ સાથે સંબંધિત છે, BRCA1 જીન સ્તન કર્કરોગ સાથે સંબંધિત છે, અને TP53 જીન કર્કરોગ સાથે સંબંધિત છે.", "ref": "Std 12 - Chapter 6: મોલેક્યુલર બાયોલોજી અને બાયોટેકનોલોજી", "ch": ""}, {"q": "HGP દરમિયાન, કયા તંત્રના અભ્યાસ માટે જીનોમિક માહિતીનો ઉપયોગ કરવામાં આવ્યો હતો, જેનાથી માનવમાં વર્તણૂક અને મગજના વિકાસ અંગેની માહિતી મળી હતી?", "opts": ["પરિવહન તંત્ર (Circulatory System)", "શ્વસન તંત્ર (Respiratory System)", "ચેતાતંત્ર (Nervous System)", "ઉત્સર્જન તંત્ર (Excretory System)"], "ans": 2, "exp": "HGP દરમિયાન, ચેતાતંત્ર (Nervous System) ના અભ્યાસ માટે જીનોમિક માહિતીનો ઉપયોગ કરવામાં આવ્યો હતો, કારણ કે માનવ મગજ અને વર્તણૂક સાથે સંબંધિત જીનોમાં વૈવિધ્ય શોધવામાં આવ્યું હતું. પરિવહન તંત્ર, શ્વસન તંત્ર અને ઉત્સર્જન તંત્ર સાથે સંબંધિત જીનોમિક માહિતીનો ઉપયોગ આટલો વ્યાપક નહોતો.", "ref": "Std 12 - Chapter 6: મોલેક્યુલર બાયોલોજી અને બાયોટેકનોલોજી", "ch": ""}, {"q": "હ્યુમન જીનોમ પ્રોજેક્ટ (HGP) દરમિયાન, માનવ જીનોમમાં શોધાયેલા 'સિંગલ ન્યુક્લિયોટાઇડ પોલિમોર્ફિઝમ (SNP)' ની સૌથી મહત્વની ભૂમિકા કયા ક્ષેત્રમાં જોવા મળી હતી?", "opts": ["માનવીના ઉત્ક્રાંતિ અભ્યાસમાં વંશાવળી નક્કી કરવા", "રોગોના જીનની ઓળખ અને વ્યક્તિગત ચિકિત્સા (Personalized Medicine) માં", "કૃષિ પાકોના ઉત્પાદનમાં વૃદ્ધિ કરવા", "પ્રાણીઓના જીનોમના તુલનાત્મક અભ્યાસમાં"], "ans": 1, "exp": "સિંગલ ન્યુક્લિયોટાઇડ પોલિમોર્ફિઝમ (SNP) એ માનવ જીનોમમાં સૌથી સામાન્ય પ્રકારનો જીનેટિક વેરિયેશન છે. HGP દ્વારા શોધાયેલા SNP નો સૌથી મહત્વનો ઉપયોગ રોગોના જીનની ઓળખ અને વ્યક્તિગત ચિકિત્સા (Personalized Medicine) માં થયો હતો, જેમાં રોગના જોખમ અને દવાના પ્રતિભાવને આધારે ચિકિત્સા આપવામાં આવે છે. A) વંશાવળી અભ્યાસમાં SNP ઉપયોગી છે, પરંતુ તે HGP નો મુખ્ય ફોકસ નહોતો. C) કૃષિ ક્ષેત્રે SNP નો ઉપયોગ થાય છે, પરંતુ તે HGP નો મુખ્ય ઉદ્દેશ નહોતો. D) પ્રાણીઓના જીનોમના અભ્યાસમાં SNP ઉપયોગી છે, પરંતુ HGP માનવ જીનોમ પર કેન્દ્રિત હતું.", "ref": "Std 12 - Chapter 6: મોલેક્યુલર બાયોલોજી અને જીનેટિક ઇજનેરિંગ", "ch": ""}, {"q": "HGP દરમિયાન, માનવ જીનોમમાં 'ટેલોમિયર' ની લંબાઈ અને તેની ભૂમિકા અંગે કયું વિધાન સત્ય છે?", "opts": ["ટેલોમિયરની લંબાઈ કોષવિભાજન દરમિયાન વધે છે અને તે કોષના આયુષ્યને વધારે છે", "ટેલોમિયરની લંબાઈ કોષવિભાજન દરમિયાન ઘટે છે અને તે કોષના વૃદ્ધત્વ સાથે સંબંધિત છે", "ટેલોમિયરની લંબાઈ કોષવિભાજન દરમિયાન અચળ રહે છે અને તે કોષના કદને નિયંત્રિત કરે છે", "ટેલોમિયરની લંબાઈ કોષવિભાજન દરમિયાન બદલાતી નથી અને તે કોષના પ્રકારને નક્કી કરે છે"], "ans": 1, "exp": "ટેલોમિયર એ વર્ણસૂત્રના અંતે સ્થિત રિપિટેટિવ DNA અનુક્રમ છે, જે કોષવિભાજન દરમિયાન ઘટે છે. ટેલોમિયરની લંબાઈ ઘટવાથી કોષનું વૃદ્ધત્વ થાય છે અને અંતે કોષ મૃત્યુ પામે છે. A) ટેલોમિયરની લંબાઈ કોષવિભાજન દરમિયાન ઘટે છે, વધતી નથી. C) ટેલોમિયરની લંબાઈ અચળ રહેતી નથી. D) ટેલોમિયરની લંબાઈ કોષના પ્રકારને નક્કી કરતી નથી.", "ref": "Std 12 - Chapter 4: કોષ ચક્ર અને કોષવિભાજન", "ch": ""}, {"q": "HGP દ્વારા શોધાયેલા માનવ જીનોમમાં, 'ઇન્ટ્રોન' અને 'એક્સોન' ની ભૂમિકા અંગે કયું વિધાન ખોટું છે?", "opts": ["ઇન્ટ્રોન એ નોન-કોડિંગ DNA છે જે mRNA માંથી કાપી નાખવામાં આવે છે", "એક્સોન એ કોડિંગ DNA છે જે mRNA માં રહે છે અને પ્રોટીન સંશ્લેષણમાં ભાગ લે છે", "ઇન્ટ્રોન એ કોડિંગ DNA છે જે પ્રોટીન સંશ્લેષણમાં ભાગ લે છે", "ઇન્ટ્રોન અને એક્સોન બંને જીનના સંરચનાત્મક ભાગ છે"], "ans": 2, "exp": "ઇન્ટ્રોન એ નોન-કોડિંગ DNA છે જે mRNA માંથી કાપી નાખવામાં આવે છે, જ્યારે એક્સોન એ કોડિંગ DNA છે જે mRNA માં રહે છે અને પ્રોટીન સંશ્લેષણમાં ભાગ લે છે. A) અને B) સત્ય છે. C) ખોટું છે કારણ કે ઇન્ટ્રોન કોડિંગ DNA નથી. D) સત્ય છે કારણ કે ઇન્ટ્રોન અને એક્સોન બંને જીનના સંરચનાત્મક ભાગ છે.", "ref": "Std 12 - Chapter 6: મોલેક્યુલર બાયોલોજી અને જીનેટિક ઇજનેરિંગ", "ch": ""}, {"q": "HGP દરમિયાન, માનવ જીનોમમાં 'રિપિટેટિવ DNA' ની ભૂમિકા અંગે કયું વિધાન સત્ય નથી?", "opts": ["રિપિટેટિવ DNA એ જીનોમની સ્થિરતા માટે મહત્વપૂર્ણ છે", "રિપિટેટિવ DNA એ પ્રોટીન કોડિંગ કરતું નથી", "રિપિટેટિવ DNA એ કોષવિભાજન દરમિયાન વર્ણસૂત્રની યોગ્ય વિતરણમાં મદદ કરે છે", "રિપિટેટિવ DNA એ માનવ જીનોમના 100% ભાગને કવર કરે છે"], "ans": 3, "exp": "રિપિટેટિવ DNA એ જીનોમની સ્થિરતા માટે મહત્વપૂર્ણ છે અને તે પ્રોટીન કોડિંગ કરતું નથી. તે કોષવિભાજન દરમિયાન વર્ણસૂત્રની યોગ્ય વિતરણમાં મદદ કરે છે. પરંતુ રિપિટેટિવ DNA માનવ જીનોમના 100% ભાગને કવર કરતું નથી, તે માત્ર એક ભાગ છે. A), B), અને C) સત્ય છે, જ્યારે D) ખોટું છે.", "ref": "Std 12 - Chapter 6: મોલેક્યુલર બાયોલોજી અને જીનેટિક ઇજનેરિંગ", "ch": ""}, {"q": "HGP દરમિયાન, માનવ જીનોમમાં 'જીન ફેમિલી' ની ઓળખ કયા ઉદ્દેશ્ય માટે મહત્વપૂર્ણ હતી?", "opts": ["માનવી અને અન્ય પ્રાણીઓ વચ્ચેના ઉત્ક્રાંતિક સંબંધોને સમજવા", "માનવ જીનોમમાં રહેલા જીનની સંખ્યા નક્કી કરવા", "માનવ જીનોમમાં રહેલા જીનની કાર્યપદ્ધતિ સમજવા", "માનવ જીનોમમાં રહેલા જીનની લંબાઈ નક્કી કરવા"], "ans": 0, "exp": "જીન ફેમિલી એ એવા જીન છે જે એકબીજા સાથે સમાનતા ધરાવે છે અને સામાન્ય વંશાવળી ધરાવે છે. HGP દરમિયાન, જીન ફેમિલીની ઓળખ માનવી અને અન્ય પ્રાણીઓ વચ્ચેના ઉત્ક્રાંતિક સંબંધોને સમજવા માટે મહત્વપૂર્ણ હતી. B), C), અને D) પણ મહત્વપૂર્ણ છે, પરંતુ A) એ સૌથી મહત્વપૂર્ણ ઉદ્દેશ્ય હતો.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "હ્યુમન જીનોમ પ્રોજેક્ટ (HGP) દરમિયાન, 'હેપ્લોટાઇપ' ની ઓળખ કયા હેતુ માટે મહત્વપૂર્ણ હતી?", "opts": ["માનવીના વંશવેલા અને રોગોના આનુવંશિક જોખમોનો અભ્યાસ કરવા", "પ્રોટીન સીક્વેન્સિંગ માટે નવી પદ્ધતિઓ વિકસાવવા", "કોષના વિભાજન દરમિયાન વર્ણસૂત્રોની ગતિવિધિનો અભ્યાસ કરવા", "DNA ની દ્વિગુણિત પ્રક્રિયાને નિયંત્રિત કરવા"], "ans": 0, "exp": "હેપ્લોટાઇપની ઓળખ માનવીના વંશવેલા અને રોગોના આનુવંશિક જોખમોનો અભ્યાસ કરવા માટે મહત્વપૂર્ણ હતી, કારણ કે હેપ્લોટાઇપ્સ જીનોમિક વિસ્તારોના સંકલિત રૂપે હોય છે જે આનુવંશિકતા અને રોગ પ્રતિકારકતામાં ભૂમિકા ભજવે છે. બાકીના વિકલ્પો HGP ના મુખ્ય ઉદ્દેશ્યો સાથે સંકળાયેલા નથી: B) પ્રોટીન સીક્વેન્સિંગ HGP નો મુખ્ય ભાગ નહોતો, C) કોષવિભાજનનો અભ્યાસ HGP ના દાયરામાં નહોતો, D) DNA દ્વિગુણિત પ્રક્રિયા HGP નો મુખ્ય ફોકસ નહોતો.", "ref": "Std 12 - Chapter 10: જીનોમિક્સ અને હ્યુમન જીનોમ પ્રોજેક્ટ", "ch": ""}, {"q": "HGP દરમિયાન, 'કોપી નંબર વેરિએશન (CNV)' ની શોધે કયા ક્ષેત્રમાં નવી સમજણ પૂરી પાડી?", "opts": ["જીનની અભિવ્યક્તિને નિયંત્રિત કરતી પ્રક્રિયાઓ", "માનવીના જીનોમમાં જીનની સંખ્યામાં થતી વ્યક્તિગત ભિન્નતા", "DNA ની માર્ફોલોજી અને તેની ત્રિપરિમાણીય રચના", "RNA ની પ્રક્રિયા અને તેના પ્રકારો"], "ans": 1, "exp": "કોપી નંબર વેરિએશન (CNV) એ માનવીના જીનોમમાં જીનની સંખ્યામાં થતી વ્યક્તિગત ભિન્નતા દર્શાવે છે, જે આનુવંશિક રોગો અને લક્ષણો સાથે સંકળાયેલી હોય છે. A) જીન અભિવ્યક્તિ નિયંત્રણ CNV સાથે સીધો સંકળાયેલ નથી, C) DNA માર્ફોલોજી HGP નો મુખ્ય ફોકસ નહોતો, D) RNA પ્રક્રિયા HGP ના મુખ્ય અભ્યાસ વિષયમાં સમાવિષ્ટ નહોતી.", "ref": "Std 12 - Chapter 10: જીનોમિક્સ અને હ્યુમન જીનોમ પ્રોજેક્ટ", "ch": ""}, {"q": "HGP દરમિયાન, 'મેટાજીનોમિક્સ' નો ઉપયોગ કયા હેતુ માટે થયો હતો?", "opts": ["માનવીના આંતરડામાં રહેલા સૂક્ષ્મજીવોના જીનોમનો અભ્યાસ કરવા", "માનવીના મગજના વિકાસનો અભ્યાસ કરવા", "પ્રોટીન સંશ્લેષણની પ્રક્રિયાને સમજવા", "કોષના ચયાપચયને નિયંત્રિત કરવા"], "ans": 0, "exp": "મેટાજીનોમિક્સનો ઉપયોગ માનવીના આંતરડામાં રહેલા સૂક્ષ્મજીવોના જીનોમનો અભ્યાસ કરવા માટે થયો હતો, જે માનવ સ્વાસ્થ્ય અને રોગો સાથે સંકળાયેલા છે. B) મગજના વિકાસનો અભ્યાસ મેટાજીનોમિક્સ સાથે સંકળાયેલ નથી, C) પ્રોટીન સંશ્લેષણ HGP નો મુખ્ય ભાગ નહોતો, D) કોષના ચયાપચયને નિયંત્રિત કરવા મેટાજીનોમિક્સનો હેતુ નહોતો.", "ref": "Std 12 - Chapter 10: જીનોમિક્સ અને હ્યુમન જીનોમ પ્રોજેક્ટ", "ch": ""}, {"q": "HGP દરમિયાન, 'એપ   }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
