<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>સ્ત્રી પ્રજનન તંત્ર</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>સ્ત્રી પ્રજનન તંત્ર</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">સ્ત્રી પ્રજનન તંત્ર</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "સ્ત્રી પ્રજનન તંત્રમાં ગ્રાફિયન પુટિકા (Graafian follicle)ના ફાટ્યા બાદ કયો બદલાવ થાય છે જે પ્રોજેસ્ટેરોનના સ્ત્રાવ માટે જવાબદાર છે?", "opts": ["કોર્પસ લ્યુટિયમ (Corpus luteum)નું નિર્માણ", "પ્રાથમિક પુટિકા (Primary follicle)નું નિર્માણ", "એન્ડોમેટ્રિયમનું વિઘટન", "ઈસ્ટ્રોજનનું સ્ત્રાવ વધવું"], "ans": 0, "exp": "ગ્રાફિયન પુટિકા ફાટ્યા બાદ તેમાંથી કોર્પસ લ્યુટિયમ બને છે, જે પ્રોજેસ્ટેરોનનો સ્ત્રાવ કરે છે. પ્રાથમિક પુટિકા અંડપિંડમાં પહેલેથી જ હોય છે, એન્ડોમેટ્રિયમનું વિઘટન ઋતુચક્રના અંતમાં થાય છે અને ઈસ્ટ્રોજનનો સ્ત્રાવ ગ્રાફિયન પુટિકા દ્વારા થાય છે, કોર્પસ લ્યુટિયમ દ્વારા નહીં.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "સ્ત્રી પ્રજનન તંત્રમાં ફેલોપિયન નલિકા (Fallopian tube)ના કયા ભાગમાં ફલીકરણ (Fertilization) સામાન્ય રીતે થાય છે?", "opts": ["ઇન્ફંડિબ્યુલમ (Infundibulum)", "એમ્પુલા (Ampulla)", "ઇસ્થમસ (Isthmus)", "ઇન્ટ્રામ્યુરલ ભાગ (Intramural part)"], "ans": 0, "exp": "ફલીકરણ સામાન્ય રીતે ફેલોપિયન નલિકાના એમ્પુલા વિસ્તારમાં થાય છે, કારણ કે આ ભાગમાં શુક્રકોષ અને અંડકોષનું મિલન સરળતાથી થઈ શકે છે. ઇન્ફંડિબ્યુલમ અંડપિંડની નજીક હોય છે પરંતુ ફલીકરણ માટે યોગ્ય નથી, ઇસ્થમસ અને ઇન્ટ્રામ્યુરલ ભાગ ગર્ભાશયની નજીક હોય છે જ્યાં ફલીકરણ શક્ય નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન સ્ત્રી પ્રજનન તંત્રના સંદર્ભમાં ખોટું છે?", "opts": ["ગર્ભાશયનું અંતઃઆવરણ (Endometrium) ઋતુચક્ર દરમિયાન જાડું થાય છે", "કોર્પસ લ્યુટિયમ ગર્ભધારણ ન થાય તો લગભગ 10-12 દિવસમાં વિઘટિત થાય છે", "પ્રાથમિક પુટિકા (Primary follicle)માં એક કરતાં વધુ અંડકોષ હોઈ શકે છે", "ફેલોપિયન નલિકામાં સિલિયા (Cilia) અંડકોષને ગર્ભાશય તરફ ધકેલવામાં મદદ કરે છે"], "ans": 2, "exp": "પ્રાથમિક પુટિકામાં માત્ર એક જ અંડકોષ હોય છે, એક કરતાં વધુ અંડકોષ હોવું શક્ય નથી. બાકીના વિધાનો સાચાં છે: એન્ડોમેટ્રિયમ ઋતુચક્રમાં જાડું થાય છે, કોર્પસ લ્યુટિયમ ગર્ભધારણ ન થાય તો વિઘટિત થાય છે, અને ફેલોપિયન નલિકાના સિલિયા અંડકોષને ગર્ભાશય તરફ ધકેલે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "સ્ત્રી પ્રજનન તંત્રમાં 'મેનોપોઝ' (Menopause) દરમિયાન કયા હોર્મોનનું સ્તર નોંધપાત્ર રીતે ઘટે છે?", "opts": ["ફોલિકલ સ્ટિમ્યુલેટિંગ હોર્મોન (FSH) અને લ્યુટિનાઇઝિંગ હોર્મોન (LH)", "ઈસ્ટ્રોજન અને પ્રોજેસ્ટેરોન", "પ્રોલેક્ટિન અને ઓક્સિટોસિન", "થાઇરોક્સિન અને કોર્ટિસોલ"], "ans": 1, "exp": "મેનોપોઝ દરમિયાન અંડપિંડની ક્રિયાશીલતા ઘટતાં ઈસ્ટ્રોજન અને પ્રોજેસ્ટેરોનનું સ્તર નોંધપાત્ર રીતે ઘટે છે. FSH અને LHનું સ્તર વધે છે કારણ કે પિટ્યુટરી ગ્રંથિ અંડપિંડને ઉત્તેજિત કરવાનો પ્રયાસ કરે છે. પ્રોલેક્ટિન, ઓક્સિટોસિન, થાઇરોક્સિન અને કોર્ટિસોલનું સ્તર મેનોપોઝ સાથે સીધો સંબંધ ધરાવતું નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "સ્ત્રી પ્રજનન તંત્રમાં ગર્ભાશયના અંતઃઆવરણ (Endometrium)નું કાર્ય શું છે? નીચેના પૈકી કયું વિધાન અપૂર્ણ અથવા ખોટું છે?", "opts": ["ગર્ભધારણ દરમિયાન ગર્ભને પોષણ પૂરું પાડવું", "ઋતુચક્ર દરમિયાન વિઘટન પામી રક્તસ્ત્રાવ થવો", "ફલિતાંડ (Zygote)ને ગર્ભાશયની દિવાલ સાથે જોડાવામાં મદદ કરવી", "શુક્રકોષને અંડકોષ સુધી પહોંચવામાં મદદ કરવી"], "ans": 3, "exp": "ગર્ભાશયનું અંતઃઆવરણ ગર્ભને પોષણ પૂરું પાડે છે, ઋતુચક્રમાં વિઘટન પામે છે અને ફલિતાંડને જોડાવામાં મદદ કરે છે. પરંતુ શુક્રકોષને અંડકોષ સુધી પહોંચવામાં મદદ કરવાનું કાર્ય ફેલોપિયન નલિકાનું છે, ગર્ભાશયના અંતઃઆવરણનું નહીં. આથી આ વિધાન ખોટું છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "સ્ત્રી પ્રજનન તંત્રમાં, કોરપસ લ્યુટિયમ (Corpus luteum) દ્વારા સ્રાવવામાં આવતા હોર્મોનની યાદી પૈકી કયો હોર્મોન ગર્ભાવસ્થા દરમ્યાન ગર્ભાશયના અંતઃઆવરણને જાળવી રાખવા માટે જવાબદાર નથી?", "opts": ["પ્રોજેસ્ટેરોન", "ઇસ્ટ્રોજન", "રિલેક્સિન", "હ્યુમન કોરિયોનિક ગોનેડોટ્રોપિન (hCG)"], "ans": 3, "exp": "કોરપસ લ્યુટિયમ પ્રોજેસ્ટેરોન અને ઇસ્ટ્રોજન સ્રાવે છે, જે ગર્ભાશયના અંતઃઆવરણને જાળવી રાખે છે. રિલેક્સિન ગર્ભાવસ્થા દરમ્યાન પેલ્વિક લિગામેન્ટ્સને શિથિલ કરવા માટે સ્રાવવામાં આવે છે. hCG ગર્ભાવસ્થાના પ્રારંભિક તબક્કામાં પ્લેસેન્ટા દ્વારા સ્રાવવામાં આવે છે, પરંતુ કોરપસ લ્યુટિયમ દ્વારા નહીં. આથી, hCG કોરપસ લ્યુટિયમ દ્વારા સ્રાવાતો હોર્મોન નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "સ્ત્રી પ્રજનન તંત્રમાં, નીચેના પૈકી કયું વિધાન 'ઓવ્યુલેશન' (Ovulation) વિશે ખોટું છે?", "opts": ["ઓવ્યુલેશન દરમ્યાન ગ્રાફિયન પુટિકા ફાટી જાય છે અને ડિંબ અંડાશયમાંથી બહાર નીકળે છે.", "ઓવ્યુલેશન સામાન્ય રીતે માસિક ચક્રના 14મા દિવસે થાય છે.", "ઓવ્યુલેશન પહેલા LH (Luteinizing Hormone)નો સ્તર અચાનક વધે છે.", "ઓવ્યુલેશન પછી, ડિંબ ફેલોપિયન નલિકામાં 24 કલાક સુધી જીવિત રહે છે."], "ans": 1, "exp": "ઓવ્યુલેશન સામાન્ય રીતે માસિક ચક્રના 14મા દિવસે થાય છે તે વિધાન સંપૂર્ણ સત્ય નથી, કારણ કે માસિક ચક્રની લંબાઈ વ્યક્તિગત રીતે બદલાય છે. ઓવ્યુલેશન સામાન્ય રીતે માસિક ચક્રના મધ્યમાં થાય છે, પરંતુ તે 14મા દિવસે જરૂરી નથી. બાકીના વિધાનો સત્ય છે: ગ્રાફિયન પુટિકા ફાટી જાય છે, LHનો સ્તર અચાનક વધે છે, અને ડિંબ 24 કલાક સુધી જીવિત રહે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "સ્ત્રી પ્રજનન તંત્રમાં, નીચેના પૈકી કયો હોર્મોન 'પિટ્યુટરી ગ્રંથિ' (Pituitary Gland) દ્વારા સ્રાવવામાં આવતો નથી?", "opts": ["FSH (Follicle Stimulating Hormone)", "LH (Luteinizing Hormone)", "ઇસ્ટ્રોજન", "પ્રોલેક્ટિન"], "ans": 2, "exp": "FSH, LH, અને પ્રોલેક્ટિન પિટ્યુટરી ગ્રંથિ દ્વારા સ્રાવવામાં આવે છે. ઇસ્ટ્રોજન અંડાશય દ્વારા સ્રાવવામાં આવે છે, આથી તે પિટ્યુટરી ગ્રંથિ દ્વારા સ્રાવાતો હોર્મોન નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "સ્ત્રી પ્રજનન તંત્રમાં, ગર્ભાવસ્થા દરમ્યાન નીચેના પૈકી કયો હોર્મોન પ્લેસેન્ટા (Placenta) દ્વારા સ્રાવવામાં આવતો નથી?", "opts": ["હ્યુમન કોરિયોનિક ગોનેડોટ્રોપિન (hCG)", "હ્યુમન પ્લેસેન્ટલ લેક્ટોજન (hPL)", "પ્રોજેસ્ટેરોન", "ઓક્સિટોસિન"], "ans": 3, "exp": "hCG, hPL, અને પ્રોજેસ્ટેરોન પ્લેસેન્ટા દ્વારા સ્રાવવામાં આવે છે. ઓક્સિટોસિન હાયપોથેલામસ દ્વારા સ્રાવવામાં આવે છે અને પિટ્યુટરી ગ્રંથિ દ્વારા સંગ્રહવામાં આવે છે, આથી તે પ્લેસેન્ટા દ્વારા સ્રાવાતો હોર્મોન નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "સ્ત્રી પ્રજનન તંત્રમાં, નીચેના પૈકી કયું વિધાન 'મેનસ્ટ્રુઅલ સાયકલ' (Menstrual Cycle) વિશે સત્ય નથી?", "opts": ["મેનસ્ટ્રુઅલ સાયકલ દરમ્યાન, ફોલિક્યુલર ફેઝમાં FSHનો સ્તર વધે છે.", "મેનસ્ટ્રુઅલ સાયકલ દરમ્યાન, લ્યુટિયલ ફેઝમાં પ્રોજેસ્ટેરોનનો સ્તર ઓછો હોય છે.", "મેનસ્ટ્રુઅલ સાયકલ દરમ્યાન, મેનસ્ટ્રુએશન ફેઝમાં અંતઃઆવરણનું શેડન થાય છે.", "મેનસ્ટ્રુઅલ સાયકલ દરમ્યાન, ઓવ્યુલેશન પહેલા LHનો સ્તર અચાનક વધે છે."], "ans": 1, "exp": "લ્યુટિયલ ફેઝ દરમ્યાન પ્રોજેસ્ટેરોનનો સ્તર ઉચ્ચ હોય છે, નહીં કે ઓછો. ફોલિક્યુલર ફેઝમાં FSHનો સ્તર વધે છે, મેનસ્ટ્રુએશન ફેઝમાં અંતઃઆવરણનું શેડન થાય છે, અને ઓવ્યુલેશન પહેલા LHનો સ્તર અચાનક વધે છે, આ બધા વિધાનો સત્ય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "સ્ત્રી પ્રજનન તંત્રમાં, 'કોરપસ એલ્બિકન્સ' (Corpus albicans) ની રચના ક્યારે થાય છે?", "opts": ["ફલીકરણ પછી તરત જ", "ગર્ભાવસ્થા દરમ્યાન કોરપસ લ્યુટિયમના કાયમી સ્વરૂપ તરીકે", "મેનસ્ટ્રુઅલ સાયકલના લ્યુટિયલ ફેઝ દરમ્યાન કોરપસ લ્યુટિયમના વિઘટન પછી", "ઓવ્યુલેશન પહેલાં ગ્રાફિયન પુટિકાના વિઘટન પછી"], "ans": 2, "exp": "કોરપસ એલ્બિકન્સ કોરપસ લ્યુટિયમના વિઘટન પછી બને છે, જે મેનસ્ટ્રુઅલ સાયકલના લ્યુટિયલ ફેઝ દરમ્યાન થાય છે. A) ફલીકરણ પછી કોરપસ લ્યુટિયમ બને છે, નહીં કે કોરપસ એલ્બિકન્સ. B) ગર્ભાવસ્થા દરમ્યાન કોરપસ લ્યુટિયમ કાયમી રહે છે, પરંતુ કોરપસ એલ્બિકન્સ નથી બનતું. D) ઓવ્યુલેશન પહેલાં ગ્રાફિયન પુટિકા વિઘટિત થતું નથી, પરંતુ ફાટીને અંડકોષ મુક્ત કરે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "સ્ત્રી પ્રજનન તંત્રમાં, 'હાયમેન' (Hymen) વિશે નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["તે યોનિમાર્ગના પ્રવેશદ્વાર પર સ્થિત થર થરનો પડદો છે.", "તે મહિલાના કૌમાર્યનું ચિહ્ન છે અને પ્રથમ સંભોગ દરમ્યાન ફાટી જાય છે.", "તે એપિથેલિયલ પેશીનું બનેલું છે અને રક્તવાહિનીઓ ધરાવે છે.", "તે ગર્ભાશયના અંતઃસ્તરનો એક ભાગ છે."], "ans": 3, "exp": "હાયમેન યોનિમાર્ગના પ્રવેશદ્વાર પર સ્થિત થર થરનો પડદો છે, એપિથેલિયલ પેશીનો બનેલો છે અને રક્તવાહિનીઓ ધરાવે છે. તે મહિલાના કૌમાર્યનું ચિહ્ન ગણવામાં આવે છે. પરંતુ તે ગર્ભાશયના અંતઃસ્તરનો ભાગ નથી, પરંતુ યોનિમાર્ગનો ભાગ છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "સ્ત્રી પ્રજનન તંત્રમાં, 'પ્રોલેક્ટિન' હોર્મોનની ક્રિયા વિશે નીચેના પૈકી કયું વિધાન સાચું છે?", "opts": ["તે ફક્ત ગર્ભાવસ્થા દરમ્યાન જ સ્રાવાય છે.", "તે સ્તનગ્રંથિઓમાં દૂધ ઉત્પાદનને પ્રેરે છે અને ઓવ્યુલેશનને અટકાવે છે.", "તે પિટ્યુટરી ગ્રંથિ દ્વારા સ્રાવાય છે અને ફક્ત પુરૂષોમાં જ કામ કરે છે.", "તે અંડાશયમાં અંડકોષના પરિપક્વતાને પ્રેરે છે."], "ans": 1, "exp": "પ્રોલેક્ટિન પિટ્યુટરી ગ્રંથિ દ્વારા સ્રાવાય છે અને સ્તનગ્રંથિઓમાં દૂધ ઉત્પાદનને પ્રેરે છે. તે ઓવ્યુલેશનને અટકાવે છે, જેથી ગર્ભાવસ્થા દરમ્યાન નવા અંડકોષ ઉત્પન્ન ન થાય. A) તે ગર્ભાવસ્થા ઉપરાંત સ્તનપાન દરમ્યાન પણ સ્રાવાય છે. C) તે સ્ત્રી અને પુરૂષ બંનેમાં કામ કરે છે, પરંતુ સ્ત્રીમાં તેનું મહત્વ વધુ છે. D) અંડકોષના પરિપક્વતાને FSH અને LH હોર્મોન પ્રેરે છે, પ્રોલેક્ટિન નહીં.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "સ્ત્રી પ્રજનન તંત્રમાં, 'પ્લેસેન્ટા' (Placenta) ની ભૂમિકા વિશે નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["તે ગર્ભસ્થ શિશુ અને માતા વચ્ચે પોષક તત્ત્વો અને વાયુઓનો વિનિમય કરે છે.", "તે hCG (Human Chorionic Gonadotropin) હોર્મોન ઉત્પન્ન કરે છે, જે ગર્ભાવસ્થાનું સંકેત આપે છે.", "તે ગર્ભસ્થ શિશુના ઉત્સર્જન પદાર્થોને માતાના રક્તમાં પસાર કરે છે.", "તે ગર્ભસ્થ શિશુને રોગપ્રતિકારક શક્તિ પ્રદાન કરે છે, પરંતુ માતાના રક્ત કોષો ગર્ભસ્થ શિશુમાં પહોંચતા નથી."], "ans": 2, "exp": "પ્લેસેન્ટા ગર્ભસ્થ શિશુ અને માતા વચ્ચે પોષક તત્ત્વો, વાયુઓ અને કચરા પદાર્થોનો વિનિમય કરે છે, પરંતુ ગર્ભસ્થ શિશુના ઉત્સર્જન પદાર્થો માતાના રક્તમાં પસાર થતા નથી. A) સાચું છે, B) hCG હોર્મોન પ્લેસેન્ટા દ્વારા ઉત્પન્ન થાય છે, D) પ્લેસેન્ટા ગર્ભસ્થ શિશુને રોગપ્રતિકારક શક્તિ પ્રદાન કરે છે, પરંતુ માતાના રક્ત કોષો ગર્ભસ્થ શિશુમાં પહોંચતા નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "સ્ત્રી પ્રજનન તંત્રમાં, 'મેનોપોઝ' પછી નીચેના પૈકી કયો બદલાવ થતો નથી?", "opts": ["અંડાશયમાં અંડકોષનું ઉત્પાદન બંધ થઈ જાય છે.", "એસ્ટ્રોજન અને પ્રોજેસ્ટેરોન હોર્મોનના સ્તરમાં ઘટાડો થાય છે.", "ગર્ભાશયનું અંતઃઆવરણ (Endometrium) પાતળું થઈ જાય છે.", "ફેલોપિયન નલિકાઓનું કદ વધી જાય છે."], "ans": 3, "exp": "મેનોપોઝ પછી અંડાશયમાં અંડકોષનું ઉત્પાદન બંધ થઈ જાય છે, એસ્ટ્રોજન અને પ્રોજેસ્ટેરોન હોર્મોનના સ્તરમાં ઘટાડો થાય છે, અને ગર્ભાશયનું અંતઃઆવરણ પાતળું થઈ જાય છે. પરંતુ ફેલોપિયન નલિકાઓનું કદ વધતું નથી, ઉલટું તે સંકોચાઈ જાય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "સ્ત્રી પ્રજનન તંત્રમાં, 'કોરપસ લ્યુટિયમ'નું અવસાન let userAns={},curIdx=0;

function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){

  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';

  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
