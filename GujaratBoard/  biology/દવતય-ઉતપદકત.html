<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>દ્વિતીય ઉત્પાદકતા</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>દ્વિતીય ઉત્પાદકતા</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">દ્વિતીય ઉત્પાદકતા</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 41 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 41 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "દ્વિતીય ઉત્પાદકતામાં, જ્યારે પ્રાથમિક ઉત્પાદકો દ્વારા ઉત્પન્ન થયેલા કાર્બનિક પદાર્થોનું રૂપાંતર થાય છે, ત્યારે નીચેનામાંથી કયો પ્રક્રિયા-પથ સૌથી ઓછો ઊર્જા નુકશાન સાથે સંબંધિત છે?", "opts": ["શ્વસન (Respiration)", "કિણ્વન (Fermentation)", "પ્રકાશસંશ્લેષણ (Photosynthesis)", "અમીનોએસિડના સંશ્લેષણ (Amino acid synthesis)"], "ans": 1, "exp": "કિણ્વન (Fermentation) પ્રક્રિયામાં ઊર્જા નુકશાન સૌથી ઓછું થાય છે કારણ કે તે અપૂર્ણ ઓક્સિડેશન પ્રક્રિયા છે જેમાં ગ્લૂકોઝનો પાયરુવિક એસિડમાં વિયોજન થાય છે અને માત્ર 2 ATP ઉત્પન્ન થાય છે. શ્વસનમાં પૂર્ણ ઓક્સિડેશન થાય છે અને 36-38 ATP ઉત્પન્ન થાય છે, પરંતુ ઊર્જા નુકશાન વધુ થાય છે. પ્રકાશસંશ્લેષણ અને અમીનોએસિડ સંશ્લેષણમાં ઊર્જા નુકશાન વધુ થાય છે કારણ કે તે જટિલ બાયોસિન્થેટિક પ્રક્રિયાઓ છે.", "ref": "Std 12 - અધ્યાય 14: પોષણ અને ઉત્પાદકતા", "ch": ""}, {"q": "દ્વિતીય ઉત્પાદકતામાં, જ્યારે એક જીવ સ્વયં પ્રાથમિક ઉત્પાદક તરીકે કામ કરતો નથી પરંતુ અન્ય જીવો દ્વારા ઉત્પન્ન થયેલા કાર્બનિક પદાર્થોનો ઉપયોગ કરે છે, ત્યારે તેને શું કહેવાય છે?", "opts": ["સ્વયંપોષી (Autotroph)", "પરપોષી (Heterotroph)", "સહજીવી (Symbiont)", "મૃતોપજીવી (Saprotroph)"], "ans": 1, "exp": "પરપોષી (Heterotroph) જીવો એવા જીવો છે જે સ્વયં ખોરાક ઉત્પન્ન કરતા નથી પરંતુ અન્ય જીવો દ્વારા ઉત્પન્ન થયેલા કાર્બનિક પદાર્થોનો ઉપયોગ કરે છે. સ્વયંપોષી જીવો પ્રાથમિક ઉત્પાદકો છે, સહજીવી જીવો પરસ્પર લાભ માટેના સંબંધમાં જીવે છે, અને મૃતોપજીવી જીવો મૃત કાર્બનિક પદાર્થો પર આધારિત છે.", "ref": "Std 12 - અધ્યાય 14: પોષણ અને ઉત્પાદકતા", "ch": ""}, {"q": "દ્વિતીય ઉત્પાદકતામાં, નીચેનામાંથી કયો જીવ દ્વિતીય ઉત્પાદક તરીકે વર્ગીકૃત થતો નથી?", "opts": ["ગાય (Cow)", "બકરી (Goat)", "હરિયાળ શેવાળ (Green Algae)", "કીડી (Ant)"], "ans": 2, "exp": "હરિયાળ શેવાળ (Green Algae) પ્રાથમિક ઉત્પાદક છે કારણ કે તે પ્રકાશસંશ્લેષણ દ્વારા સ્વયં ખોરાક ઉત્પન્ન કરે છે. ગાય, બકરી, અને કીડી દ્વિતીય ઉત્પાદકો છે કારણ કે તેઓ અન્ય જીવો દ્વારા ઉત્પન્ન થયેલા કાર્બનિક પદાર્થોનો ઉપયોગ કરે છે.", "ref": "Std 12 - અધ્યાય 14: પોષણ અને ઉત્પાદકતા", "ch": ""}, {"q": "દ્વિતીય ઉત્પાદકતામાં, જ્યારે એક જીવ અન્ય જીવના મૃત અવશેષો પર આધારિત હોય છે, ત્યારે તેને શું કહેવાય છે?", "opts": ["શાકાહારી (Herbivore)", "માંસાહારી (Carnivore)", "મૃતોપજીવી (Saprotroph)", "પરોપજીવી (Parasite)"], "ans": 2, "exp": "મૃતોપજીવી (Saprotroph) જીવો એવા જીવો છે જે મૃત કાર્બનિક પદાર્થો પર આધારિત હોય છે અને તેનું વિયોજન કરે છે. શાકાહારી જીવો છોડ પર આધારિત હોય છે, માંસાહારી જીવો અન્ય પ્રાણીઓ પર આધારિત હોય છે, અને પરોપજીવી જીવો જીવંત હોસ્ટ પર આધારિત હોય છે.", "ref": "Std 12 - અધ્યાય 14: પોષણ અને ઉત્પાદકતા", "ch": ""}, {"q": "દ્વિતીય ઉત્પાદકતામાં, નીચેનામાંથી કયો પ્રક્રિયા-પથ દ્વિતીય ઉત્પાદકો દ્વારા ઊર્જા મેળવવા માટે સૌથી વધુ વપરાતો છે?", "opts": ["પ્રકાશસંશ્લેષણ (Photosynthesis)", "શ્વસન (Respiration)", "કિણ્વન (Fermentation)", "પ્રોટીન સંશ્લેષણ (Protein Synthesis)"], "ans": 1, "exp": "શ્વસન (Respiration) પ્રક્રિયા દ્વિતીય ઉત્પાદકો દ્વારા ઊર્જા મેળવવા માટે સૌથી વધુ વપરાતી પ્રક્રિયા છે કારણ કે તે કાર્બનિક પદાર્થોનું પૂર્ણ ઓક્સિડેશન કરે છે અને વધુ ATP ઉત્પન્ન કરે છે. પ્રકાશસંશ્લેષણ પ્રાથમિક ઉત્પાદકો દ્વારા વપરાતી પ્રક્રિયા છે, કિણ્વન અપૂર્ણ ઓક્સિડેશન છે, અને પ્રોટીન સંશ્લેષણ એ બાયોસિન્થેટિક પ્રક્રિયા છે.", "ref": "Std 12 - અધ્યાય 14: પોષણ અને ઉત્પાદકતા", "ch": ""}, {"q": "દ્વિતીય ઉત્પાદકતામાં, જ્યારે એક જીવ અન્ય જીવના જીવંત પેશીઓ પર આધાર રાખીને પોષણ મેળવે છે, ત્યારે તેને કયા પ્રકારના પોષણ તરીકે ઓળખવામાં આવે છે?", "opts": ["મૃતોપજીવી (Saprophytic)", "પરોપજીવી (Parasitic)", "સહજીવી (Symbiotic)", "સ્વયંપોષી (Autotrophic)"], "ans": 1, "exp": "પરોપજીવી (Parasitic) પોષણમાં જીવ જીવંત પેશીઓ પર આધાર રાખે છે. મૃતોપજીવી (A) મૃત અવશેષો પર આધાર રાખે છે, સહજીવી (C) પરસ્પર લાભદાયી સંબંધ છે, અને સ્વયંપોષી (D) સ્વયં ખોરાક બનાવે છે. દ્વિતીય ઉત્પાદકતામાં પરોપજીવી જીવો દ્વિતીય ઉત્પાદક તરીકે વર્ગીકૃત થાય છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયો જીવ દ્વિતીય ઉત્પાદક તરીકે વર્ગીકૃત થતો નથી, કારણ કે તે પ્રાથમિક ઉત્પાદક તરીકે પણ કામ કરે છે?", "opts": ["શેવાળ (Algae)", "કવક (Fungi)", "જીવાણુ (Bacteria)", "પ્રાણી (Animal)"], "ans": 0, "exp": "શેવાળ (Algae) પ્રાથમિક ઉત્પાદક છે કારણ કે તે પ્રકાશસંશ્લેષણ દ્વારા ખોરાક બનાવે છે. કવક (B), જીવાણુ (C), અને પ્રાણી (D) દ્વિતીય ઉત્પાદક તરીકે વર્ગીકૃત થઈ શકે છે, કારણ કે તેઓ અન્ય જીવો પર આધાર રાખે છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "દ્વિતીય ઉત્પાદકતામાં, જ્યારે એક જીવ અન્ય જીવના મૃત અવશેષોને તોડીને પોષક તત્વો મેળવે છે, ત્યારે તે પ્રક્રિયાને શું કહેવાય છે?", "opts": ["પ્રકાશસંશ્લેષણ", "શ્વસન", "વિઘટન (Decomposition)", "ઉત્સર્જન"], "ans": 2, "exp": "વિઘટન (Decomposition) પ્રક્રિયામાં જીવ મૃત અવશેષોને તોડીને પોષક તત્વો મેળવે છે. પ્રકાશસંશ્લેષણ (A) અને શ્વસન (B) પ્રાથમિક ઉત્પાદકો સાથે સંબંધિત છે, જ્યારે ઉત્સર્જન (D) કચરાને બાહ્ય કરવાની પ્રક્રિયા છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "દ્વિતીય ઉત્પાદકતામાં, નીચેનામાંથી કયો જીવ સહજીવી સંબંધ દર્શાવે છે જ્યાં બંને જીવોને લાભ થાય છે?", "opts": ["ટીક (Tick) અને મનુષ્ય", "લાયકન (Lichen)", "કવક અને વૃક્ષની મૂળ", "એસ્કેરિસ (Ascaris) અને મનુષ્ય"], "ans": 2, "exp": "કવક અને વૃક્ષની મૂળ વચ્ચેનો સંબંધ સહજીવી છે, જ્યાં બંને જીવોને લાભ થાય છે (માયકોરાઇઝા). ટીક (A) અને એસ્કેરિસ (D) પરોપજીવી છે, જ્યારે લાયકન (B) શેવાળ અને કવકનો સહજીવી સંબંધ છે, પરંતુ તે દ્વિતીય ઉત્પાદક તરીકે વર્ગીકૃત થતો નથી.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "દ્વિતીય ઉત્પાદકતામાં, જ્યારે એક જીવ અન્ય જીવના મૃત કોષીય પદાર્થોનું વિઘટન કરીને ઊર્જા મેળવે છે, ત્યારે તેને કયા પ્રકારની દ્વિતીય ઉત્પાદકતા ગણવામાં આવે છે?", "opts": ["પરોપજીવી દ્વિતીય ઉત્પાદકતા", "મૃતોપજીવી દ્વિતીય ઉત્પાદકતા", "સહજીવી દ્વિતીય ઉત્પાદકતા", "સ્વયંપોષી દ્વિતીય ઉત્પાદકતા"], "ans": 1, "exp": "મૃતોપજીવી દ્વિતીય ઉત્પાદકતા (B) સચોટ છે, કારણ કે મૃત કોષીય પદાર્થોનું વિઘટન કરનારા જીવો (જેમ કે બેક્ટરિયા અને ફૂગ) મૃતોપજીવી તરીકે ઓળખાય છે. પરોપજીવી (A) જીવંત જીવ પર આધાર રાખે છે, સહજીવી (C) બંને જીવોને લાભ થાય છે, અને સ્વયંપોષી (D) પ્રાથમિક ઉત્પાદકો છે, જેઓ સ્વયં ખોરાક બનાવે છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "દ્વિતીય ઉત્પાદકતામાં, નીચેનામાંથી કયો જીવ મૃતોપજીવી તરીકે વર્ગીકૃત થાય છે?", "opts": ["અમીબા", "યીસ્ટ", "મશરૂમ", "પરવાલ"], "ans": 2, "exp": "મશરૂમ (કવક) મૃત કાર્બનિક પદાર્થોનું વિઘટન કરીને પોષણ મેળવે છે, જેથી તે મૃતોપજીવી છે. અમીબા અને પરવાલ સજીવ પોષણ ધરાવે છે, જ્યારે યીસ્ટ પરોપજીવી અથવા મૃતોપજીવી હોઈ શકે, પરંતુ મશરૂમ સ્પષ્ટ મૃતોપજીવી ઉદાહરણ છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન દ્વિતીય ઉત્પાદકતા માટે અયોગ્ય છે, કારણ કે તે પ્રક્રિયા પ્રાથમિક ઉત્પાદકો સાથે સંકળાયેલી છે?", "opts": ["પ્રકાશસંશ્લેષણ દ્વારા કાર્બનિક પદાર્થોનું સંશ્લેષણ", "વિઘટકો દ્વારા કાર્બનિક પદાર્થોનું વિઘટન કરીને ઊર્જા મુક્ત કરવી", "પરોપજીવીઓ દ્વારા યજમાનના શરીરમાંથી પોષક તત્વોનું શોષણ", "મૃતોપજીવીઓ દ્વારા મૃત કાર્બનિક પદાર્થોનું પાચન કરીને ઊર્જા મેળવવી"], "ans": 0, "exp": "પ્રકાશસંશ્લેષણ એ પ્રાથમિક ઉત્પાદકો (હરિત વનસ્પતિઓ અને સાયનોબેક્ટેરિયા) દ્વારા થતી પ્રક્રિયા છે, જે દ્વિતીય ઉત્પાદકતા સાથે સંકળાયેલી નથી. દ્વિતીય ઉત્પાદકતા એ વિઘટકો, પરોપજીવીઓ અને મૃતોપજીવીઓ જેવા વિષમપોષીઓ દ્વારા કાર્બનિક પદાર્થોના ઉપયોગ સાથે સંબંધિત છે. બાકીના વિકલ્પો દ્વિતીય ઉત્પાદકોની પ્રવૃત્તિઓ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ અને ઉકેલો", "ch": ""}, {"q": "એક જંગલના પરિસ્થિતિક તંત્રમાં, નીચેના પૈકી કયો જીવ દ્વિતીય ઉત્પાદક તરીકે કાર્ય કરતો નથી, તેમ છતાં તે પરિસ્થિતિક તંત્રમાં ઊર્જા પ્રવાહમાં મહત્ત્વપૂર્ણ ભૂમિકા ભજવે છે?", "opts": ["ફૂગ જે મૃત વનસ્પતિ પદાર્થોનું વિઘટન કરે છે", "કીટકો જે જીવંત વનસ્પતિઓનું ભક્ષણ કરે છે", "બેક્ટેરિયા જે મૃત પ્રાણીઓના શરીરનું વિઘટન કરે છે", "વનસ્પતિમાં રહેતા નાઇટ્રોજન સ્થાપક બેક્ટેરિયા"], "ans": 3, "exp": "નાઇટ્રોજન સ્થાપક બેક્ટેરિયા વનસ્પતિઓ સાથે સહજીવી સંબંધ ધરાવે છે અને વાતાવરણીય નાઇટ્રોજનનું સ્થાપન કરીને વનસ્પતિઓને નાઇટ્રોજન પૂરું પાડે છે. આ બેક્ટેરિયા દ્વિતીય ઉત્પાદકો નથી કારણ કે તેઓ કાર્બનિક પદાર્થોનું વિઘટન કરીને ઊર્જા મેળવતા નથી, પરંતુ તેઓ પરિસ્થિતિક તંત્રમાં પોષક તત્વોના ચક્રમાં મહત્ત્વપૂર્ણ ભૂમિકા ભજવે છે. બાકીના વિકલ્પો દ્વિતીય ઉત્પાદકોના ઉદાહરણો છે.", "ref": "Std 12 - પ્રકરણ 12: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લો અને સાચો વિકલ્પ પસંદ કરો:\n(1) દ્વિતીય ઉત્પાદકતા એ પ્રાથમિક ઉત્પાદકો દ્વારા ઉત્પન્ન થયેલા કાર્બનિક પદાર્થોના ઉપયોગ દ્વારા થાય છે.\n(2) દ્વિતીય ઉત્પાદકો પ્રકાશસંશ્લેષણ દ્વારા પોતાનો ખોરાક બનાવી શકે છે.\n(3) દ્વિતીય ઉત્પાદકતા પરિસ્થિતિક તંત્રમાં ઊર્જા પ્રવાહના બીજા સ્તરે થાય છે.\n(4) દ્વિતીય ઉત્પાદકો માત્ર મૃત કાર્બનિક પદાર્થો પર જ આધાર રાખે છે.", "opts": ["વિધાન 1 અને 3 સાચાં છે", "વિધાન 1, 2 અને 3 સાચાં છે", "વિધાન 2 અને 4 સાચાં છે", "માત્ર વિધાન 1 સાચું છે"], "ans": 0, "exp": "વિધાન 1 સાચું છે કારણ કે દ્વિતીય ઉત્પાદકતા પ્રાથમિક ઉત્પાદકો દ્વારા ઉત્પન્ન થયેલા કાર્બનિક પદાર્થોના ઉપયોગ સાથે સંબંધિત છે. વિધાન 3 પણ સાચું છે કારણ કે દ્વિતીય ઉત્પાદકતા ઊર્જા પ્રવાહના બીજા સ્તરે થાય છે. વિધાન 2 ખોટું છે કારણ કે દ્વિતીય ઉત્પાદકો પ્રકાશસંશ્લેષણ કરી શકતા નથી. વિધાન 4 ખોટું છે કારણ કે દ્વિતીય ઉત્પાદકો માત્ર મૃત પદાર્થો પર જ નહીં, પરંતુ જીવંત પેશીઓ પર પણ આધાર રાખી શકે છે (દા.ત. પરોપજીવીઓ).", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ અને ઉકેલો", "ch": ""}, {"q": "એક તળાવના પરિસ્થિતિક તંત્રમાં, નીચેના પૈકી કયો સંબંધ દ્વિતીય ઉત્પાદકતા સાથે સીધો સંબંધિત નથી, તેમ છતાં તે પરિસ્થિતિક તંત્રની સ્થિરતા માટે જરૂરી છે?", "opts": ["ફૂગ અને મૃત માછલીઓ વચ્ચેનો મૃતોપજીવી સંબંધ", "જળચર વનસ્પતિઓ અને નાઇટ્રોજન સ્થાપક બેક્ટેરિયા વચ્ચેનો સહજીવી સંબંધ", "મચ્છરના લાર્વા અને માછલીઓ વચ્ચેનો પરભક્ષી સંબંધ", "બેક્ટેરિયા અને મૃત વનસ્પતિ પદાર્થો વચ્ચેનો વિઘટન સંબંધ"], "ans": 1, "exp": "જળચર વનસ્પતિઓ અને નાઇટ્રોજન સ્થાપક બેક્ટેરિયા વચ્ચેનો સહજીવી સંબંધ દ્વિતીય ઉત્પાદકતા સાથે સીધો સંબંધિત નથી. આ સંબંધ પ્રાથમિક ઉત્પાદકતા અને પોષક તત્વોના ચક્ર સાથે સંબંધિત છે, જે પરિસ્થિતિક તંત્રની સ્થિરતા માટે જરૂરી છે. બાકીના વિકલ્પો દ્વિતીય ઉત્પાદકતા સાથે સીધા સંબંધિત છે: મૃતોપજીવી, પરભક્ષી અને વિઘટન સંબંધો દ્વિતીય ઉત્પાદકોની પ્રવૃત્તિઓ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 13: પર્યાવરણ અને પરિસ્થિતિક તંત્ર", "ch": ""}, {"q": "જ્યારે એક દ્વિતીય ઉત્પાદક મૃત કોષીય પદાર્થોનું વિઘટન કરીને પોષક તત્વો મેળવે છે, ત્યારે તેને કયા પ્રકારના પોષણ તંત્ર તરીકે ઓળખવામાં આવે છે?", "opts": ["મૃતોપજીવી (Saprophytic)", "પરોપજીવી (Parasitic)", "સહજીવી (Symbiotic)", "સ્વપોષી (Autotrophic)"], "ans": 0, "exp": "સાચો વિકલ્પ A) મૃતોપજીવી છે, કારણ કે દ્વિતીય ઉત્પાદકો જ્યારે મૃત કોષીય પદાર્થોનું વિઘટન કરીને પોષક તત્વો મેળવે છે ત્યારે તેને મૃતોપજીવી પોષણ તંત્ર કહેવામાં આવે છે. B) પરોપજીવી એ જીવંત જીવ પર આધારિત હોય છે, C) સહજીવી એ બંને જીવોને લાભ કરતો સંબંધ છે, અને D) સ્વપોષી એ પ્રાથમિક ઉત્પાદકો જેવા જીવો માટે વપરાતો શબ્દ છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયો જીવ દ્વિતીય ઉત્પાદક તરીકે વર્ગીકૃત થાય છે, કારણ કે તે મૃત કોષીય પદાર્થોનું વિઘટન કરીને પોષક તત્વો મેળવે છે?", "opts": ["હરિયાળ શેવાળ (Green Algae)", "ફૂગ (Fungi)", "વનસ્પતિ (Plants)", "પ્રાણી (Animals)"], "ans": 1, "exp": "સાચો વિકલ્પ B) ફૂગ છે, કારણ કે ફૂગ મૃત કોષીય પદાર્થોનું વિઘટન કરીને પોષક તત્વો મેળવે છે, જે તેને દ્વિતીય ઉત્પાદક બનાવે છે. A) હરિયાળ શેવાળ પ્રાથમિક ઉત્પાદક છે, C) વનસ્પતિ પ્રાથમિક ઉત્પાદક છે, અને D) પ્રાણી દ્વિતીય ઉત્પાદક તરીકે વર્ગીકૃત થઈ શકે છે, પરંતુ તે મૃત કોષીય પદાર્થોનું વિઘટન કરતું નથી.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર", "ch": ""}, {"q": "જ્યારે એક દ્વિતીય ઉત્પાદક મૃત જૈવિક પદાર્થોનું વિઘટન કરીને ઊર્જા મેળવે છે, ત્યારે નીચેનામાંથી કયો પ્રક્રિયા-પથ સૌથી યોગ્ય રીતે તેની ઊર્જા મેળવવાની પદ્ધતિ વર્ણવે છે, જ્યાં તે ઓક્સિજનની હાજરીમાં કાર્ય કરે છે?", "opts": ["કિણ્વન (Fermentation)", "વાયરહીન શ્વસન (Anaerobic respiration)", "વાયુયુક્ત શ્વસન (Aerobic respiration)", "પ્રકાશસંશ્લેષણ (Photosynthesis)"], "ans": 2, "exp": "દ્વિતીય ઉત્પાદકો (જેમ કે વિઘટકો) મૃત જૈવિક પદાર્થોનું વિઘટન કરીને ઊર્જા મેળવે છે. ઓક્સિજનની હાજરીમાં, તેઓ વાયુયુક્ત શ્વસન (Aerobic respiration) દ્વારા ઊર્જા મેળવે છે, જેમાં ગ્લુકોઝનું પૂર્ણ ઓક્સિડેશન થાય છે અને વધુ ATP ઉત્પન્ન થાય છે. કિણ્વન અને વાયરહીન શ્વસન ઓક્સિજનની ગેરહાજરીમાં થાય છે, જ્યારે પ્રકાશસંશ્લેષણ પ્રાથમિક ઉત્પાદકો દ્વારા થાય છે, ન કે દ્વિતીય ઉત્પાદકો દ્વારા.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર (Ecosystem)", "ch": ""}, {"q": "એક પરિસ્થિતિક તંત્રમાં, દ્વિતીય ઉત્પાદકોની ભૂમિકા નીચેનામાંથી કયા પ્રક્રિયા દ્વારા સૌથી યોગ્ય રીતે વર્ણવી શકાય છે?", "opts": ["કાર્બન ડાયોક્સાઇડ અને પાણીનો ઉપયોગ કરીને કાર્બોદિત પદાર્થોનું નિર્માણ", "મૃત જૈવિક પદાર્થોનું વિઘટન કરીને પોષક તત્વોને પર્યાવરણમાં પુનઃચક્રિત કરવું", "સૂર્યપ્રકાશનો ઉપયોગ કરીને ઓક્સિજન ઉત્પન્ન કરવું", "પ્રાણીઓમાં પ્રોટીનનું સંશ્લેષણ કરવું"], "ans": 1, "exp": "દ્વિતીય ઉત્પાદકો (જેમ કે વિઘટકો) મૃત જૈવિક પદાર્થોનું વિઘટન કરીને પોષક તત્વોને પર્યાવરણમાં પુનઃચક્રિત કરે છે, જેથી તેનાથી પ્રાથમિક ઉત્પાદકોને પોષક તત્વો મળી રહે. કાર્બન ડાયોક્સાઇડ અને પાણીનો ઉપયોગ કરીને કાર્બોદિત પદાર્થોનું નિર્માણ પ્રાથમિક ઉત્પાદકો દ્વારા થાય છે, જ્યારે સૂર્યપ્રકાશનો ઉપયોગ કરીને ઓક્સિજન ઉત્પન્ન કરવું પણ પ્રાથમિક ઉત્પાદકોની ભૂમિકા છે. પ્રોટીનનું સંશ્લેષણ પ્રાણીઓમાં થાય છે, પરંતુ તે દ્વિતીય ઉત્પાદકતાની મુખ્ય ભૂમિકા નથી.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર (Ecosystem)", "ch": ""}, {"q": "જ્યારે એક જીવ દ્વિતીય ઉત્પાદક તરીકે કાર્ય કરે છે, ત્યારે તેની ઊર્જા મેળવવાની પ્રક્રિયામાં નીચેનામાંથી કયું પગલું સૌથી અગત્યનું છે, જ્યારે તે મૃત જૈવિક પદાર્થોનું વિઘટન કરે છે?", "opts": ["કાર્બનિક પદાર્થોનું યાંત્રિક વિભાજન", "ઉત્સેચકો દ્વારા જટિલ કાર્બનિક પદાર્થોનું સરળ પદાર્થોમાં રૂપાંતર", "પ્રકાશસંશ્લેષણ દ્વારા કાર્બનિક પદાર્થોનું નિર્માણ", "શ્વસન દ્વારા ઊર્જાનું સંગ્રહણ"], "ans": 1, "exp": "દ્વિતીય ઉત્પાદકો (જેવા કે વિઘટકો) મૃત જૈવિક પદાર્થોનું વિઘટન કરવા માટે ઉત્સેચકોનો ઉપયોગ કરે છે, જે જટિલ કાર્બનિક પદાર્થોને સરળ પદાર્થોમાં રૂપાંતરિત કરે છે. આ પ્રક્રિયા દ્વારા તેઓ પોષક તત્વો અને ઊર્જા મેળવે છે. વિકલ્પ A યાંત્રિક વિભાજન મહત્વનું નથી, કારણ કે વિઘટન મુખ્યત્વે રાસાયણિક પ્રક્રિયા છે. વિકલ્પ C પ્રાથમિક ઉત્પાદકો સાથે સંબંધિત છે, ન કે દ્વિતીય ઉત્પાદકો સાથે. વિકલ્પ D શ્વસન દ્વારા ઊર્જા મેળવવી એ દ્વિતીય ઉત્પાદકોની પ્રક્રિયાનો એક ભાગ છે, પરંતુ મુખ્ય પગલું ઉત્સેચકો દ્વારા રૂપાંતર છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર", "ch": ""}, {"q": "જંગલના પરિસ્થિતિક તંત્રમાં, નીચેનામાંથી કયો જીવ દ્વિતીય ઉત્પાદક તરીકે કાર્ય કરતો નથી, કારણ કે તે પ્રાથમિક ઉત્પાદક તરીકે પણ કામ કરે છે?", "opts": ["શેવાળ (Algae)", "બેક્ટેરિયા (Bacteria)", "ફૂગ (Fungi)", "પ્રોટોઝોઆ (Protozoa)"], "ans": 0, "exp": "શેવાળ (Algae) પ્રકાશસંશ્લેષણ દ્વારા પોતાનું ખોરાક સ્વયં ઉત્પન્ન કરે છે, જેથી તે પ્રાથમિક ઉત્પાદક છે. બેક્ટેરિયા, ફૂગ અને પ્રોટોઝોઆ મૃત અથવા જીવંત જૈવિક પદાર્થો પર આધારિત હોય છે, જેથી તેઓ દ્વિતીય ઉત્પાદક તરીકે વર્ગીકૃત થાય છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયો જીવ સહજીવી સંબંધ દર્શાવે છે જ્યાં એક જીવ દ્વિતીય ઉત્પાદક તરીકે કાર્ય કરે છે અને બીજો જીવ પ્રાથમિક ઉત્પાદક તરીકે કાર્ય કરે છે?", "opts": ["લાઇકેન (Lichen)", "અમીબા (Amoeba)", "પરજીવી કૃમિ (Parasitic Worm)", "મશરૂમ (Mushroom)"], "ans": 0, "exp": "લાઇકેનમાં શેવાળ (પ્રાથમિક ઉત્પાદક) અને ફૂગ (દ્વિતીય ઉત્પાદક) વચ્ચે સહજીવી સંબંધ હોય છે. અમીબા, પરજીવી કૃમિ અને મશરૂમ એ દ્વિતીય ઉત્પાદકો છે, પરંતુ તેઓ સહજીવી સંબંધ દર્શાવતા નથી.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન દ્વિતીય ઉત્પાદકતા માટે અયોગ્ય છે, કારણ કે તે પ્રાથમિક ઉત્પાદકતાનું લક્ષણ છે?", "opts": ["તે મૃત જૈવિક પદાર્થો પર આધારિત હોય છે", "તે પ્રકાશસંશ્લેષણ દ્વારા ઊર્જા મેળવે છે", "તે અન્ય જીવોના પોષક તત્વોનું રૂપાંતર કરે છે", "તે સજીવ કોષીય પદાર્થોનું વિઘટન કરે છે"], "ans": 1, "exp": "પ્રકાશસંશ્લેષણ દ્વારા ઊર્જા મેળવવી એ પ્રાથમિક ઉત્પાદકોનું લક્ષણ છે. દ્વિતીય ઉત્પાદકો મૃત અથવા જીવંત જૈવિક પદાર્થો પર આધારિત હોય છે, પોષક તત્વોનું રૂપાંતર કરે છે, અને સજીવ કોષીય પદાર્થોનું વિઘટન કરે છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર", "ch": ""}, {"q": "એક તળાવના પરિસ્થિતિક તંત્રમાં, નીચેનામાંથી કયો જીવ દ્વિતીય ઉત્પાદક તરીકે કાર્ય કરે છે અને પાણીની ગુણવત્તા સુધારવામાં મહત્વની ભૂમિકા ભજવે છે?", "opts": ["પ્લવક (Plankton)", "મત્સ્ય (Fish)", "બેક્ટેરિયા (Bacteria)", "જલકુંભી (Lotus)"], "ans": 2, "exp": "બેક્ટેરિયા મૃત જૈવિક પદાર્થોનું વિઘટન કરીને પોષક તત્વો મેળવે છે અને પાણીની ગુણવત્તા સુધારવામાં મદદ કરે છે. પ્લવક પ્રાથમિક ઉત્પાદકો છે, મત્સ્ય તૃતીય ઉત્પાદકો છે, અને જલકુંભી પ્રાથમિક ઉત્પાદક છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર", "ch": ""}, {"q": "જંગલના પરિસ્થિતિક તંત્રમાં, એક જીવ મૃત વનસ્પતિ પદાર્થોનું વિઘટન કરીને પોષક તત્વો મેળવે છે, પરંતુ તેને પ્રકાશસંશ્લેષણની ક્ષમતા પણ હોય છે. આ જીવને દ્વિતીય ઉત્પાદક તરીકે વર્ગીકૃત કરવા માટે નીચેનામાંથી કયું વિધાન સૌથી યોગ્ય કારણ છે?", "opts": ["તે મૃત જૈવિક પદાર્થો પર આધારિત હોવાથી તે મૃતોપજીવી છે અને દ્વિતીય ઉત્પાદક ગણાય", "તે પ્રકાશસંશ્લેષણ કરી શકે છે, પરંતુ મૃત પદાર્થોનું વિઘટન કરવાનું તેનું પ્રાથમિક કાર્ય હોવાથી તે દ્વિતીય ઉત્પાદક છે", "તે પ્રકાશસંશ્લેષણ કરે છે, તેથી તે પ્રાથમિક ઉત્પાદક છે અને દ્વિતીય ઉત્પાદક ગણી શકાતો નથી", "તે મૃત પદાર્થોનું વિઘટન કરે છે, પરંતુ પ્રકાશસંશ્લેષણ પણ કરે છે, તેથી તે પ્રાથમિક અને દ્વિતીય ઉત્પાદક બંને છે"], "ans": 2, "exp": "સાચો વિકલ્પ C છે. જીવ પ્રકાશસંશ્લેષણ કરી શકે છે, તેથી તે પ્રાથમિક ઉત્પાદક છે. દ્વિતીય ઉત્પાદકો એવા જીવો છે જે સ્વયં પ્રાથમિક ઉત્પાદક નથી અને અન્ય જીવો દ્વારા ઉત્પન્ન થયેલા કાર્બનિક પદાર્થો પર આધારિત હોય છે. અહીં, પ્રકાશસંશ્લેષણની ક્ષમતા ધરાવતો જીવ પ્રાથમિક ઉત્પાદક ગણાય, ભલે તે મૃત પદાર્થોનું વિઘટન પણ કરતો હોય. A ગળતર છે કારણ કે મૃતોપજીવી હોવા છતાં, પ્રાથમિક ઉત્પાદકતાની ક્ષમતા ધરાવતો જીવ દ્વિતીય ઉત્પાદક ગણી શકાતો નથી. B ગળતર છે કારણ કે પ્રાથમિક ઉત્પાદકતાની ક્ષમતા ધરાવતો જીવ દ્વિતીય ઉત્પાદક ગણી શકાતો નથી, ભલે તે મૃત પદાર્થોનું વિઘટન કરતો હોય. D ગળતર છે કારણ કે એક જીવ એકસાથે પ્રાથમિક અને દ્વિતીય ઉત્પાદક ગણી શકાતો નથી.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર અને પર્યાવરણ", "ch": ""}, {"q": "નીચેનામાંથી કયો જીવ દ્વિતીય ઉત્પાદક તરીકે વર્ગીકૃત થાય છે, પરંતુ તેનું મુખ્ય કાર્ય અન્ય જીવોના મૃત અવશેષોનું વિઘટન કરવું છે અને તે પોષક તત્વોને મુક્ત કરે છે?", "opts": ["સિંહ", "ગાય", "કીડી", "કવક અને બેક્ટેરિયા"], "ans": 3, "exp": "કવક અને બેક્ટેરિયા દ્વિતીય ઉત્પાદક તરીકે વર્ગીકૃત થાય છે કારણ કે તે મૃત જૈવિક પદાર્થોનું વિઘટન કરીને પોષક તત્વો મેળવે છે અને પોષક ચક્રમાં પોષક તત્વોની પુનઃપ્રાપ્તિ કરે છે. સિંહ અને ગાય પ્રાથમિક અથવા દ્વિતીય ઉપભોક્તા છે, જ્યારે કીડી મૃતોપજીવી તરીકે કાર્ય કરે છે પરંતુ તેનું મુખ્ય કાર્ય વિઘટન નથી.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર", "ch": ""}, {"q": "એક પરિસ્થિતિક તંત્રમાં, દ્વિતીય ઉત્પાદકો દ્વારા નીચેનામાંથી કયા પ્રક્રિયા દ્વારા ઊર્જા મેળવવામાં આવે છે, જ્યારે તે મૃત જૈવિક પદાર્થોનું વિઘટન કરે છે?", "opts": ["પ્રકાશસંશ્લેષણ", "શ્વસન", "કિણ્વન (Fermentation)", "ઉત્સેચકીય વિઘટન"], "ans": 3, "exp": "દ્વિતીય ઉત્પાદકો મૃત જૈવિક પદાર્થોનું વિઘટન ઉત્સેચકીય પ્રક્રિયા દ્વારા કરે છે, જેમાં ઉત્સેચકોની મદદથી જટિલ કાર્બનિક પદાર્થોને સરળ પદાર્થોમાં તોડવામાં આવે છે. પ્રકાશસંશ્લેષણ પ્રાથમિક ઉત્પાદકો દ્વારા થાય છે, શ્વસન ઊર્જા મેળવવા માટેની પ્રક્રિયા છે પરંતુ તે વિઘટન નથી, અને કિણ્વન એક અપૂર્ણ શ્વસન પ્રક્રિયા છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન દ્વિતીય ઉત્પાદકતા માટે સંપૂર્ણપણે અયોગ્ય છે?", "opts": ["દ્વિતીય ઉત્પાદકો પ્રાથમિક ઉત્પાદકો દ્વારા ઉત્પન્ન થયેલા કાર્બનિક પદાર્થોનો ઉપયોગ કરે છે", "દ્વિતીય ઉત્પાદકો મૃત જૈવિક પદાર્થોનું વિઘટન કરીને ઊર્જા મેળવે છે", "દ્વિતીય ઉત્પાદકો પ્રકાશસંશ્લેષણ દ્વારા સ્વયં ખોરાક ઉત્પન્ન કરે છે", "દ્વિતીય ઉત્પાદકો સહજીવી અથવા પરોપજીવી સંબંધ દ્વારા પોષક તત્વો મેળવે છે"], "ans": 2, "exp": "સાચો વિકલ્પ C છે, કારણ કે દ્વિતીય ઉત્પાદકો પ્રકાશસંશ્લેષણ દ્વારા સ્વયં ખોરાક ઉત્પન્ન કરતા નથી. પ્રકાશસંશ્લેષણ પ્રાથમિક ઉત્પાદકો (જેવા કે વનસ્પતિ)ની લાક્ષણિકતા છે. A સાચું છે કારણ કે દ્વિતીય ઉત્પાદકો પ્રાથમિક ઉત્પાદકો દ્વારા ઉત્પન્ન થયેલા કાર્બનિક પદાર્થોનો ઉપયોગ કરે છે. B સાચું છે કારણ કે મૃતોપજીવી દ્વિતીય ઉત્પાદકો મૃત જૈવિક પદાર્થોનું વિઘટન કરીને ઊર્જા મેળવે છે. D સાચું છે કારણ કે કેટલાક દ્વિતીય ઉત્પાદકો સહજીવી અથવા પરોપજીવી સંબંધ દ્વારા પોષક તત્વો મેળવે છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર", "ch": ""}, {"q": "એક પરિસ્થિતિક તંત્રમાં, નીચેનામાંથી કયો જીવ દ્વિતીય ઉત્પાદક તરીકે કાર્ય કરે છે, પરંતુ તેનું મુખ્ય કાર્ય પોષક ચક્રમાં નથી?", "opts": ["વિઘટક બેક્ટેરિયા", "કવક જે મૃત કાચબોનું વિઘટન કરે છે", "પરોપજીવી કીટક જે પ્રાણીઓના રક્ત ચૂસે છે", "શિકારી પ્રાણી જે અન્ય પ્રાણીઓનો શિકાર કરે છે"], "ans": 3, "exp": "સાચો વિકલ્પ D છે, કારણ કે શિકારી પ્રાણી દ્વિતીય ઉત્પાદક તરીકે કાર્ય કરે છે, પરંતુ તેનું મુખ્ય કાર્ય પોષક ચક્રમાં નથી. તે ઊર્જા હસ્તાંતરણમાં મહત્વની ભૂમિકા ભજવે છે. A ગળતર છે કારણ કે વિઘટક બેક્ટેરિયા મૃત જૈવિક પદાર્થોનું વિઘટન કરે છે, જે પોષક ચક્રમાં મહત્વની ભૂમિકા ભજવે છે. B ગળતર છે કારણ કે કવક જે મૃત કાચબોનું વિઘટન કરે છે તે પણ પોષક ચક્રમાં મહત્વની ભૂમિકા ભજવે છે. C ગળતર છે કારણ કે પરોપજીવી કીટક દ્વિતીય ઉત્પાદક તરીકે વર્ગીકૃત થતું નથી, કારણ કે તે પ્રાથમિક ઉત્પાદક પર આધારિત નથી.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર", "ch": ""}, {"q": "એક પરિસ્થિતિક તંત્રમાં, જ્યારે એક જીવ મૃત જૈવિક પદાર્થોનું વિઘટન કરીને પોષક તત્વો મેળવે છે, પરંતુ તે સીધા જ પ્રાથમિક ઉત્પાદકો પર આધાર રાખતો નથી, ત્યારે તેની ભૂમિકા નીચેનામાંથી કયા સિદ્ધાંત દ્વારા સૌથી યોગ્ય રીતે સમજાવી શકાય છે?", "opts": ["તે મૃતોપજીવી છે અને દ્વિતીય ઉત્પાદકતા દર્શાવે છે, કારણ કે તે મૃત કાર્બનિક પદાર્થોનું વિઘટન કરીને ઊર્જા મેળવે છે.", "તે પરોપજીવી છે અને દ્વિતીય ઉત્પાદકતા દર્શાવતો નથી, કારણ કે તે જીવંત જીવ પર આધાર રાખે છે.", "તે સહજીવી છે અને દ્વિતીય ઉત્પાદકતા દર્શાવે છે, કારણ કે તે બીજા જીવ સાથે પરસ્પર લાભદાયી સંબંધ ધરાવે છે.", "તે પ્રાથમિક ઉત્પાદક છે, કારણ કે તે પોતે પ્રકાશસંશ્લેષણ દ્વારા ઊર્જા ઉત્પન્ન કરે છે."], "ans": 0, "exp": "વિકલ્પ A સાચો છે, કારણ કે મૃતોપજીવી જીવો (જેમ કે બેક્ટેરિયા અને ફંગી) મૃત કાર્બનિક પદાર્થોનું વિઘટન કરીને પોષક તત્વો અને ઊર્જા મેળવે છે, જે દ્વિતીય ઉત્પાદકતાનું લક્ષણ છે. વિકલ્પ B ખોટો છે, કારણ કે પરોપજીવી જીવો જીવંત જીવ પર આધાર રાખે છે, જ્યારે દ્વિતીય ઉત્પાદકતા મૃત પદાર્થો પર આધાર રાખે છે. વિકલ્પ C ખોટો છે, કારણ કે સહજીવી સંબંધમાં બંને જીવોને લાભ થાય છે, પરંતુ તે દ્વિતીય ઉત્પાદકતાનું લક્ષણ નથી. વિકલ્પ D ખોટો છે, કારણ કે પ્રાથમિક ઉત્પાદકો પ્રકાશસંશ્લેષણ દ્વારા પોતે ઊર્જા ઉત્પન્ન કરે છે, જ્યારે દ્વિતીય ઉત્પાદકો અન્ય જીવો પર આધાર રાખે છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર અને પર્યાવરણ", "ch": ""}, {"q": "એક પરિસ્થિતિક તંત્રમાં, જ્યારે એક દ્વિતીય ઉત્પાદક મૃત જૈવિક પદાર્થોનું વિઘટન કરીને ઊર્જા મેળવે છે, ત્યારે નીચેના પૈકી કઈ પ્રક્રિયા સૌથી ઓછી સંભવિત છે?", "opts": ["કાર્બન ડાયોક્સાઇડ અને પાણીનું નિર્માણ", "પ્રકાશસંશ્લેષણ દ્વારા ગ્લુકોઝનું ઉત્પાદન", "ખનીજ તત્વોનું મુક્ત થવું", "ઉત્સેચકો દ્વારા કાર્બનિક પદાર્થોનું વિઘટન"], "ans": 1, "exp": "દ્વિતીય ઉત્પાદકો પ્રકાશસંશ્લેષણ દ્વારા ગ્લુકોઝનું ઉત્પાદન કરતા નથી, કારણ કે તેઓ પ્રાથમિક ઉત્પાદકો નથી. અન્ય વિકલ્પો દ્વિતીય ઉત્પાદકોની પ્રક્રિયાઓ સાથે સુસંગત છે: કાર્બન ડાયોક્સાઇડ અને પાણીનું નિર્માણ, ખનીજ તત્વોનું મુક્ત થવું, અને ઉત્સેચકો દ્વારા કાર્બનિક પદાર્થોનું વિઘટન.", "ref": "Std 12 - પ્રકરણ 14: પરિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "નીચેનામાંથી કયું ઉદાહરણ દ્વિતીય ઉત્પાદકતા માટે અપવાદરૂપ છે, કારણ કે તેમાં જીવ પોતે પ્રકાશસંશ્લેષણ કરતો નથી પરંતુ અન્ય જીવંત જીવો પર આધાર રાખે છે?", "opts": ["લાઇકેન (Lichen)માં ફૂગ અને લીલ વચ્ચેનો સહજીવી સંબંધ", "પરોપજીવી કૃમિ (Parasitic worms) જે યજમાનના શરીરમાંથી પોષણ મેળવે છે", "મૃતોપજીવી બેક્ટેરિયા (Saprophytic bacteria) જે મૃત કાર્બનિક પદાર્થોનું વિઘટન કરે છે", "ફૂગ (Fungi) જે મૃત વનસ્પતિ પદાર્થોનું વિઘટન કરે છે"], "ans": 1, "exp": "પરોપજીવી કૃમિ દ્વિતીય ઉત્પાદકતા માટે અપવાદરૂપ છે કારણ કે તે જીવંત યજમાન પર આધાર રાખે છે, જ્યારે દ્વિતીય ઉત્પાદકતા સામાન્ય રીતે મૃત કાર્બનિક પદાર્થોના ઉપયોગ સાથે સંકળાયેલી હોય છે. લાઇકેનમાં ફૂગ અને લીલ વચ્ચેનો સંબંધ સહજીવી છે, જ્યારે મૃતોપજીવી બેક્ટેરિયા અને ફૂગ મૃત કાર્બનિક પદાર્થોનું વિઘટન કરે છે, જે દ્વિતીય ઉત્પાદકતાનું લાક્ષણિક ઉદાહરણ છે.", "ref": "Std 12 - પ્રકરણ 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "એક તળાવના પરિસ્થિતિક તંત્રમાં, નીચેના પૈકી કયો જીવ દ્વિતીય ઉત્પાદક તરીકે કાર્ય કરે છે, પરંતુ તેનું મુખ્ય કાર્ય પ્રાથમિક ઉત્પાદકો સાથે સહજીવી સંબંધમાં નથી?", "opts": ["ઝૂપ્લાંકટન (Zooplankton) જે ફાયટોપ્લાંકટનનું સેવન કરે છે", "સાયનોબેક્ટેરિયા (Cyanobacteria) જે પ્રકાશસંશ્લેષણ કરે છે", "ફૂગ (Fungi) જે મૃત જૈવિક પદાર્થોનું વિઘટન કરે છે", "કેટલાક પ્રકારના બેક્ટેરિયા જે નાઇટ્રોજન સ્થાપન કરે છે"], "ans": 0, "exp": "સાચો જવાબ વિકલ્પ A છે. ઝૂપ્લાંકટન ફાયટોપ્લાંકટનનું સેવન કરીને દ્વિતીય ઉત્પાદક તરીકે કાર્ય કરે છે, પરંતુ તેનું મુખ્ય કાર્ય પ્રાથમિક ઉત્પાદકો સાથે સહજીવી સંબંધમાં નથી. સાયનોબેક્ટેરિયા પ્રકાશસંશ્લેષણ કરીને પ્રાથમિક ઉત્પાદક તરીકે કાર્ય કરે છે. ફૂગ અને બેક્ટેરિયા વિઘટન અને નાઇટ્રોજન સ્થાપન દ્વારા દ્વિતીય ઉત્પાદકતામાં ફાળો આપે છે, પરંતુ તેમનું મુખ્ય કાર્ય સહજીવી સંબંધમાં નથી.", "ref": "Std 12 - પ્રકરણ 14: પરિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "દ્વિતીય ઉત્પાદકતામાં, નીચેનામાંથી કયો સંબંધ સહજીવી નથી, પરંતુ પરોપજીવી છે?", "opts": ["લાઇકેનમાં શેવાળ અને ફંગી વચ્ચેનો સંબંધ", "ટીપણમાં વનસ્પતિ અને જીવાણુ વચ્ચેનો સંબંધ", "કસ્ટોડિયનમાં મનુષ્ય અને એન્ટામીબા વચ્ચેનો સંબંધ", "મીઠમાં વનસ્પતિ અને ફંગી વચ્ચેનો સંબંધ"], "ans": 2, "exp": "કસ્ટોડિયનમાં મનુષ્ય અને એન્ટામીબા વચ્ચેનો સંબંધ (C) પરોપજીવી છે, કારણ કે એન્ટામીબા મનુષ્યના આંતરડામાં રહીને તેના પોષક તત્વોનો ઉપયોગ કરે છે, પરંતુ મનુષ્યને કોઈ લાભ થતો નથી. લાઇકેન (A), ટીપણ (B), અને મીઠ (D) સહજીવી સંબંધના ઉદાહરણો છે, જ્યાં બંને જીવોને લાભ થાય છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર", "ch": ""}, {"q": "દ્વિતીય ઉત્પાદકતામાં, નીચેનામાંથી કયો પ્રક્રિયા-પથ સૌથી ઓછો કાર્યક્ષમ છે, કારણ કે તે ઊર્જાનું સૌથી વધુ નુકસાન કરે છે?", "opts": ["શ્વસન", "કિટનાશક પદાર્થોનું વિઘટન", "મૃત જૈવિક પદાર્થોનું વિઘટન", "પ્રકાશસંશ્લેષણ"], "ans": 2, "exp": "મૃત જૈવિક પદાર્થોનું વિઘટન (C) સૌથી ઓછો કાર્યક્ષમ પ્રક્રિયા-પથ છે કારણ કે તે ઊર્જાનું સૌથી વધુ નુકસાન કરે છે. શ્વસન (A) અને કિટનાશક પદાર્થોનું વિઘટન (B) પણ ઊર્જા મુક્ત કરે છે, પરંતુ તે મૃત જૈવિક પદાર્થોના વિઘટન કરતાં વધુ કાર્યક્ષમ છે. પ્રકાશસંશ્લેષણ (D) પ્રાથમિક ઉત્પાદકતાનું લક્ષણ છે અને તે ઊર્જાનું નુકસાન કરતું નથી.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર", "ch": ""}, {"q": "એક પરિસ્થિતિક તંત્રમાં, જ્યારે કોઈ જીવ મૃત જૈવિક પદાર્થોનું વિઘટન કરીને ઊર્જા મેળવે છે, પરંતુ તે જીવ સહજીવી સંબંધમાં પણ ભાગ લે છે, તો તેને નીચેનામાંથી કયા વર્ગમાં સૌથી યોગ્ય રીતે ગણવો જોઈએ?", "opts": ["મૃતોપજીવી (Saprophyte)", "પરોપજીવી (Parasite)", "સહજીવી વિઘટક (Symbiotic Decomposer)", "મિશ્ર પોષણ ધરાવતો દ્વિતીય ઉત્પાદક (Mixotrophic Secondary Producer)"], "ans": 3, "exp": "સહી જવાબ D છે. મિશ્ર પોષણ ધરાવતો દ્વિતીય ઉત્પાદક એવો જીવ છે જે મૃત જૈવિક પદાર્થોનું વિઘટન કરીને ઊર્જા મેળવે છે (મૃતોપજીવી જેવું) અને સાથે જ સહજીવી સંબંધમાં પણ ભાગ લે છે. A) મૃતોપજીવી ફક્ત મૃત પદાર્થો પર આધારિત હોય છે, પરંતુ સહજીવી સંબંધ ધરાવતો નથી. B) પરોપજીવી જીવંત હોસ્ટ પર આધારિત હોય છે, મૃત પદાર્થો પર નહીં. C) સહજીવી વિઘટક એવો શબ્દ નથી જે GSEB પાઠ્યપુસ્તકમાં વ્યાખ્યાયિત થયેલો હોય, અને તે ફક્ત વિઘટન પર ભાર મૂકે છે, સહજીવી સંબંધ પર નહીં.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર અને પર્યાવરણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન દ્વિતીય ઉત્પાદકતા માટે અપવાદરૂપ છે, કારણ કે તેમાં જીવ સીધા જ પ્રાથમિક ઉત્પાદક પર આધાર રાખતો નથી, પરંતુ ત્રીજા સ્તરના ઉપભોક્તા તરીકે કાર્ય કરે છે?", "opts": ["શેરડી ખાતા કીટકો", "વાઘ જે હરણ ખાય છે", "કવક જે મૃત પર્ણોનું વિઘટન કરે છે", "જીવાણુ જે મૃત કોષીય પદાર્થોનું વિઘટન કરે છે"], "ans": 1, "exp": "શેરડી ખાતા કીટકો (A) પ્રાથમિક ઉપભોક્તા છે, જ્યારે કવક (C) અને જીવાણુ (D) મૃતોપજીવી છે, જે દ્વિતીય ઉત્પાદકતાનું ઉદાહરણ છે. વાઘ (B) ત્રીજા સ્તરનો ઉપભોક્તા છે, જે સીધા જ પ્રાથમિક ઉત્પાદક પર આધાર રાખતો નથી, પરંતુ હરણ (દ્વિતીય ઉપભોક્તા) ખાય છે, જે દ્વિતીય ઉત્પાદકતાનું અપવાદરૂપ ઉદાહરણ છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર અને પર્યાવરણ", "ch": ""}, {"q": "એક પરિસ્થિતિક તંત્રમાં, નીચેનામાંથી કયો સંબંધ દ્વિતીય ઉત્પાદકતા સાથે સીધો સંબંધ ધરાવતો નથી, પરંતુ તે સહજીવી સંબંધ છે?", "opts": ["ફંગી અને વૃક્ષની મૂળમાં રહેતા માયકોરાઇઝા", "બેક્ટેરિયા અને મૃત વનસ્પતિ પદાર્થો", "કેળ અને વૃક્ષ", "કીટકભક્ષી વનસ્પતિ અને કીટક"], "ans": 0, "exp": "માયકોરાઇઝા (ફંગી અને વૃક્ષની મૂળ) સહજીવી સંબંધ છે, જ્યાં બંને જીવોને લાભ થાય છે, પરંતુ તે દ્વિતીય ઉત્પાદકતા સાથે સીધો સંબંધ ધરાવતો નથી. બાકીના વિકલ્પો (બેક્ટેરિયા અને મૃત વનસ્પતિ, કેળ અને વૃક્ષ, કીટકભક્ષી વનસ્પતિ અને કીટક) દ્વિતીય ઉત્પાદકતા સાથે સંબંધિત છે.", "ref": "Std 12 - Chapter 14: પરિસ્થિતિક તંત્ર અને પર્યાવરણ", "ch": ""}, {"q": "નીચેનામાંથી કયો પ્રક્રિયા-પથ દ્વિતીય ઉત્પાદકો દ્વારા ઊર્જા મેળવવા માટે સૌથી ઓછો કાર્યક્ષમ છે, કારણ કે તે ઓછી ઊર્જા ઉત્પન્ન કરે છે?", "opts": ["એરોબિક શ્વસન", "એનેરોબિક શ્વસન", "કિટનસ (Fermentation)", "પ્રકાશસંશ્લેષણ"], "ans": 2, "exp": "કિટનસ (Fermentation) પ્રક્રિયા દ્વિતીય ઉત્પાદકો દ્વારા ઊર્જા મેળવવા માટે સૌથી ઓછો કાર્યક્ષમ છે કારણ કે તે ઓછી ઊર્જા (2 ATP) ઉત્પન્ન કરે છે. એરોબિક શ્વસન (38 ATP) અને એનેરોબિક શ્વસન (2-4 ATP) વધુ કાર્યક્ષમ છે. પ્રકાશસંશ્લેષણ પ્રાથમિક ઉત્પાદકો દ્વારા થાય છે, દ્વિતીય ઉત્પાદકો દ્વારા નહીં.", "ref": "Std 11 - Chapter 10: શ્વસન અને ઊર્જા ઉત્પાદન", "ch": ""}, {"q": "નીચેનામાંથી કયો સંબંધ દ્વિતીય ઉત્પાદકતા સાથે સીધો સંબંધ ધરાવતો નથી, કારણ કે તે પ્રાથમિક ઉત્પાદકતા ત let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
