<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNA અને RNA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>DNA અને RNA</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">DNA અને RNA</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક સંશોધકને એક વાઇરસમાં એક-સૂત્રીય ન્યુક્લિક એસિડ મળ્યું જે થાઇમિન ધરાવતું નથી, પરંતુ યુરેસિલ ધરાવે છે. આ વાઇરસમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["આ વાઇરસનો આનુવંશિક પદાર્થ RNA છે", "આ વાઇરસમાં પ્રતિકૃતિ માટે RNA આધારિત RNA પોલિમરેઝ ઉત્સેચક જરૂરી છે", "આ વાઇરસના જનીનોમાંથી mRNAનું સંક્રમણ કોષકેન્દ્રમાં થાય છે", "આ વાઇરસના RNAમાં રિબોઝ શર્કરા હાજર છે"], "ans": 2, "exp": "સાચો જવાબ C છે. વાઇરસમાં કોષકેન્દ્ર હોતું નથી, તેથી mRNAનું સંક્રમણ કોષકેન્દ્રમાં થતું નથી. વાઇરસ કોષમાં પ્રવેશીને તેના યંત્રોનો ઉપયોગ કરે છે. A સાચું છે કારણ કે થાઇમિન ન હોવાથી અને યુરેસિલ હોવાથી તે RNA છે. B સાચું છે કારણ કે RNA વાઇરસમાં RNA આધારિત RNA પોલિમરેઝ ઉત્સેચક પ્રતિકૃતિ માટે જરૂરી છે. D સાચું છે કારણ કે RNAમાં રિબોઝ શર્કરા હોય છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક પ્રયોગમાં, બેક્ટેરિયાના DNAને RNA પોલિમરેઝ ઉત્સેચક સાથે મિશ્ર કરતાં, નવું RNA સંશ્લેષિત થાય છે. જો આ પ્રક્રિયામાં રિફામ્પિસિન ઉમેરવામાં આવે તો RNA સંશ્લેષણ અટકી જાય છે. આ અવલોકન પરથી નીચેનામાંથી કયું તારણ ખોટું છે?", "opts": ["રિફામ્પિસિન RNA પોલિમરેઝ ઉત્સેચકને અવરોધે છે", "RNA પોલિમરેઝ ઉત્સેચક DNAને ટેમ્પલેટ તરીકે ઉપયોગ કરે છે", "આ પ્રક્રિયામાં RNAનું સંશ્લેષણ 5'→3' દિશામાં થાય છે", "રિફામ્પિસિન DNAના ટેમ્પલેટ સૂત્રને બદલી નાખે છે"], "ans": 3, "exp": "સાચો જવાબ D છે. રિફામ્પિસિન RNA પોલિમરેઝ ઉત્સેચકને અવરોધે છે, DNAના ટેમ્પલેટ સૂત્રને બદલતું નથી. A સાચું છે કારણ કે રિફામ્પિસિન RNA પોલિમરેઝને અવરોધે છે. B સાચું છે કારણ કે RNA પોલિમરેઝ DNAને ટેમ્પલેટ તરીકે ઉપયોગ કરે છે. C સાચું છે કારણ કે RNA સંશ્લેષણ હંમેશા 5'→3' દિશામાં થાય છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન DNA અને RNA બંને માટે સાચું નથી?", "opts": ["બંને ન્યુક્લિયોટાઇડ્સના પોલિમર છે", "બંનેમાં ફોસ્ફોડાયએસ્ટર બંધ હોય છે", "બંને કોષકેન્દ્રમાં જોવા મળે છે", "બંને પ્રોટીન સંશ્લેષણમાં ભાગ લે છે"], "ans": 2, "exp": "સાચો જવાબ C છે. RNA કોષકેન્દ્ર ઉપરાંત કોષરસમાં પણ જોવા મળે છે, જ્યારે DNA મુખ્યત્વે કોષકેન્દ્રમાં હોય છે. A સાચું છે કારણ કે બંને ન્યુક્લિયોટાઇડ્સના પોલિમર છે. B સાચું છે કારણ કે બંનેમાં ફોસ્ફોડાયએસ્ટર બંધ હોય છે. D સાચું છે કારણ કે DNA જનીન સંકેત આપે છે અને RNA પ્રોટીન સંશ્લેષણમાં ભાગ લે છે.", "ref": "Std 11 - પ્રકરણ 8: કોષ: જીવનનો એકમ", "ch": ""}, {"q": "એક પ્રયોગમાં, એક જનીનના બે અલગ-અલગ mRNA ટ્રાન્સક્રિપ્ટ મળ્યા જે એક જ પ્રોટીનનું કોડિંગ કરે છે, પરંતુ તેમની લંબાઈ અલગ-અલગ છે. આ ઘટનાનું શક્ય કારણ શું હોઈ શકે?", "opts": ["વૈકલ્પિક સ્પ્લાઇસિંગ", "DNAનું મ્યુટેશન", "RNAનું રાસાયણિક ફેરફાર", "પ્રતિકૃતિ દરમિયાન ભૂલ"], "ans": 0, "exp": "સાચો જવાબ A છે. વૈકલ્પિક સ્પ્લાઇસિંગને કારણે એક જ જનીનમાંથી અલગ-અલગ mRNA ટ્રાન્સક્રિપ્ટ બની શકે છે જે એક જ પ્રોટીનનું કોડિંગ કરે છે. B ખોટું છે કારણ કે DNA મ્યુટેશનથી પ્રોટીન બદલાઈ શકે છે. C ખોટું છે કારણ કે RNAનું રાસાયણિક ફેરફાર પ્રોટીન બદલી શકે છે. D ખોટું છે કારણ કે પ્રતિકૃતિ દરમિયાન ભૂલથી DNA બદલાઈ શકે છે, પરંતુ mRNAની લંબાઈ પર અસર ન પડે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક કોષમાં DNAનું પ્રમાણ 2pg છે. જો આ કોષમાંથી RNAનું અલગીકરણ કરવામાં આવે અને તેનું પ્રમાણ માપવામાં આવે તો નીચેનામાંથી કયું પરિણામ શક્ય નથી?", "opts": ["RNAનું પ્રમાણ 0.5pg છે", "RNAનું પ્રમાણ 2pg છે", "RNAનું પ્રમાણ 4pg છે", "RNAનું પ્રમાણ 1pg છે"], "ans": 1, "exp": "સાચો જવાબ B છે. DNAનું પ્રમાણ 2pg છે, પરંતુ RNAનું પ્રમાણ DNA કરતાં વધુ કે ઓછું હોઈ શકે છે, કારણ કે RNAનું સંશ્લેષણ અને અધોગતિ સતત થતી રહે છે. RNAનું પ્રમાણ DNA જેટલું બરાબર (2pg) હોવું શક્ય નથી કારણ કે RNAનું સંશ્લેષણ DNA પર આધારિત છે, પરંતુ તેનું પ્રમાણ અલગ હોય છે. A, C અને D શક્ય છે કારણ કે RNAનું પ્રમાણ વધઘટ થતું રહે છે.", "ref": "Std 11 - પ્રકરણ 8: કોષ: જીવનનો એકમ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન DNA અને RNA વચ્ચેના તફાવતને લગતું સાચું નથી?", "opts": ["DNAમાં શર્કરા ડિઓક્સીરિબોઝ હોય છે જ્યારે RNAમાં રિબોઝ હોય છે.", "DNAમાં થાઇમિન (T) હોય છે જ્યારે RNAમાં યુરેસિલ (U) હોય છે.", "DNA દ્વિ-સૂત્રીય હોય છે જ્યારે RNA એક-સૂત્રીય હોય છે.", "DNA અને RNA બંનેમાં ફોસ્ફોડાયેસ્ટર બંધો હોય છે પરંતુ DNAમાં તે હંમેશા 3’-5’ દિશામાં જ હોય છે."], "ans": 3, "exp": "વિકલ્પ D ખોટો છે કારણ કે DNA અને RNA બંનેમાં ફોસ્ફોડાયેસ્ટર બંધો 5’-3’ દિશામાં બને છે, પરંતુ તેની દિશા નક્કી કરવા માટે ન્યુક્લિયોટાઇડ્સની ગોઠવણી જવાબદાર હોય છે. વિકલ્પ A, B, અને C સાચા છે કારણ કે તે DNA અને RNA વચ્ચેના મૂળભૂત તફાવતો દર્શાવે છે: શર્કરા, નાઇટ્રોજનસ યુક્ત બેઇઝ, અને સૂત્રની સંખ્યા.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિકાસ", "ch": ""}, {"q": "એક કોષમાં, mRNAનું અનુવાદન (Translation) ક્યાં થાય છે અને તેના માટે કયા અણુઓ જરૂરી છે?", "opts": ["કોષકેન્દ્રમાં, DNA પોલિમરેઝ અને RNA પોલિમરેઝ", "રાઇબોઝોમ પર, mRNA, tRNA, અને રાઇબોઝોમલ RNA (rRNA)", "સાયટોપ્લાઝમમાં, DNA અને RNA પોલિમરેઝ", "ગોલ્ગી કોષમાં, tRNA અને rRNA"], "ans": 1, "exp": "વિકલ્પ B સાચો છે કારણ કે અનુવાદન (Translation) પ્રક્રિયા રાઇબોઝોમ પર થાય છે અને તેના માટે mRNA (સંદેશાવાહક RNA), tRNA (વહન કરતું RNA), અને rRNA (રાઇબોઝોમલ RNA) જરૂરી હોય છે. વિકલ્પ A ખોટો છે કારણ કે અનુવાદન કોષકેન્દ્રમાં થતું નથી અને DNA પોલિમરેઝ તેના માટે જરૂરી નથી. વિકલ્પ C ખોટો છે કારણ કે અનુવાદન સાયટોપ્લાઝમમાં થતું નથી અને DNA તેના માટે જરૂરી નથી. વિકલ્પ D ખોટો છે કારણ કે અનુવાદન ગોલ્ગી કોષમાં થતું નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિકાસ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન RNAના પ્રકારો અને તેમના કાર્યો વિશે સાચું નથી?", "opts": ["mRNA જનીનની માહિતીને કોષકેન્દ્રથી રાઇબોઝોમ સુધી લઈ જાય છે.", "tRNA અમીનો એસિડને રાઇબોઝોમ પર લાવે છે અને mRNA પરના કોડોન સાથે જોડાય છે.", "rRNA પ્રોટીન સંશ્લેષણમાં ભાગ લે છે અને રાઇબોઝોમનું બંધારણ બનાવે છે.", "siRNA (Small Interfering RNA) DNAનું અનુલેખન (Transcription) વધારે કરવા માટે જવાબદાર હોય છે."], "ans": 3, "exp": "વિકલ્પ D ખોટો છે કારણ કે siRNA (Small Interfering RNA) જનીનની અભિવ્યક્તિને દબાવવા (Silencing) માટે જવાબદાર હોય છે, ન કે અનુલેખન વધારે કરવા માટે. વિકલ્પ A, B, અને C સાચા છે કારણ કે તે RNAના પ્રકારો અને તેમના કાર્યો વિશે સાચી માહિતી આપે છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિકાસ", "ch": ""}, {"q": "DNAના ડબલ હેલિક્સ મોડેલમાં, નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["ડબલ હેલિક્સમાં બે સૂત્રો એકબીજા સાથે એન્ટીપેરલલ હોય છે.", "એડિનિન (A) હંમેશા થાઇમિન (T) સાથે હાઇડ્રોજન બંધ દ્વારા જોડાય છે.", "ગુઆનિન (G) અને સાયટોસિન (C) વચ્ચે ત્રણ હાઇડ્રોજન બંધ હોય છે.", "ડબલ હેલિક્સની સ્થિરતા ફક્ત હાઇડ્રોજન બંધો પર આધારિત હોય છે."], "ans": 3, "exp": "વિકલ્પ D ખોટો છે કારણ કે ડબલ હેલિક્સની સ્થિરતા હાઇડ્રોજન બંધો ઉપરાંત હાઇડ્રોફોબિક ઇન્ટરેક્શન અને વાન ડર વાલ્સ બળો પર પણ આધારિત હોય છે. વિકલ્પ A, B, અને C સાચા છે કારણ કે તે DNAના ડબલ હેલિક્સ મોડેલના મૂળભૂત ગુણધર્મો દર્શાવે છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિકાસ", "ch": ""}, {"q": "એક પ્રયોગમાં, એક RNA અણુને ઉચ્ચ તાપમાને ગરમ કરવામાં આવ્યો અને પછી ઠંડો કરવામાં આવ્યો. નીચેનામાંથી કયું પરિણામ સૌથી વધુ સંભવિત છે?", "opts": ["RNA અણુ પૂર્ણપણે વિઘટિત થઈ જશે.", "RNA અણુ તેની મૂળ રચના પુનઃપ્રાપ્ત કરશે.", "RNA અણુ એક નવી, સ્થિર રચના બનાવશે.", "RNA અણુ ડબલ હેલિક્સ રચના બનાવશે."], "ans": 2, "exp": "વિકલ્પ C સાચો છે કારણ કે RNA અણુ ઉચ્ચ તાપમાને ગરમ કરવામાં આવે ત્યારે તેની રચના ખૂલી જાય છે, પરંતુ ઠંડો કરતાં તે એક નવી, સ્થિર રચના બનાવી શકે છે. વિકલ્પ A ખોટો છે કારણ કે RNA અણુ પૂર્ણપણે વિઘટિત થતું નથી. વિકલ્પ B ખોટો છે કારણ કે RNA તેની મૂળ રચના પુનઃપ્રાપ્ત કરતું નથી. વિકલ્પ D ખોટો છે કારણ કે RNA ડબલ હેલિક્સ રચના બનાવતું નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિકાસ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન tRNA વિશે સાચું છે, પરંતુ તેના કાર્ય સાથે સંકળાયેલ નથી?", "opts": ["tRNAમાં એન્ટિકોડન હોય છે જે mRNA પરના કોડોન સાથે જોડાય છે.", "tRNA એમિનો એસિડને રાઇબોઝોમ પર લાવે છે.", "tRNAમાં 3' ટર્મિનલ પર CCA સિક્વન્સ હોય છે જ્યાં એમિનો એસિડ જોડાય છે.", "tRNA DNA રેપ્લિકેશનમાં સીધો ભાગ ભજવે છે."], "ans": 3, "exp": "વિકલ્પ D ખોટો છે કારણ કે tRNAનો સીધો કોઈ ભાગ DNA રેપ્લિકેશનમાં નથી. tRNAનો મુખ્ય ભાગ પ્રોટીન સિંથેસિસમાં એમિનો એસિડને રાઇબોઝોમ પર લાવવાનો છે. વિકલ્પ A, B, અને C બધા tRNAના કાર્ય અને રચનાથી સંકળાયેલા સાચા વિધાનો છે. Aમાં એન્ટિકોડન mRNA સાથે જોડાય છે, Bમાં એમિનો એસિડને રાઇબોઝોમ પર લાવે છે, અને Cમાં CCA સિક્વન્સ એમિનો એસિડ જોડાણ માટે જરૂરી છે.", "ref": "Std 12 - અધ્યાય 6: જૈવ અણુઓ અને જીવનની ઉત્પત્તિ", "ch": ""}, {"q": "એક કોષમાં, જો DNA પોલિમરેઝ ઉત્સેચકને અવરોધવામાં આવે, તો નીચેનામાંથી કયી પ્રક્રિયા સૌથી વધુ અસરગ્રસ્ત થશે?", "opts": ["ટ્રાન્સક્રિપ્શન", "ટ્રાન્સલેશન", "DNA રેપ્લિકેશન", "RNA પ્રોસેસિંગ"], "ans": 2, "exp": "DNA પોલિમરેઝ ઉત્સેચક DNA રેપ્લિકેશન માટે જરૂરી છે, જેમાં DNAની નકલ બનાવવામાં આવે છે. આ ઉત્સેચકના અવરોધથી DNA રેપ્લિકેશન પ્રક્રિયા સંપૂર્ણ રીતે અટકી જશે. ટ્રાન્સક્રિપ્શન (A) માટે RNA પોલિમરેઝ, ટ્રાન્સલેશન (B) માટે રાઇબોઝોમ, અને RNA પ્રોસેસિંગ (D) માટે અન્ય ઉત્સેચકો જરૂરી હોય છે, જેથી તે પ્રક્રિયાઓ પર સીધી અસર થશે નહીં.", "ref": "Std 12 - અધ્યાય 6: જૈવ અણુઓ અને જીવનની ઉત્પત્તિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન RNA વાયરસ વિશે સાચું નથી?", "opts": ["કેટલાક RNA વાયરસમાં રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચક હોય છે.", "RNA વાયરસમાં DNA હોતું નથી.", "RNA વાયરસમાં જનીનીય માહિતી RNA રૂપમાં જ હોય છે.", "બધા RNA વાયરસમાં ડબલ-સ્ટ્રેન્ડેડ RNA હોય છે."], "ans": 3, "exp": "વિકલ્પ D ખોટો છે કારણ કે બધા RNA વાયરસમાં ડબલ-સ્ટ્રેન્ડેડ RNA નથી હોતું. કેટલાક RNA વાયરસ સિંગલ-સ્ટ્રેન્ડેડ હોય છે. વિકલ્પ A સાચો છે કારણ કે રેટ્રોવાયરસ જેવા RNA વાયરસમાં રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચક હોય છે. વિકલ્પ B અને C પણ સાચા છે કારણ કે RNA વાયરસમાં DNA હોતું નથી અને જનીનીય માહિતી RNA રૂપમાં જ હોય છે.", "ref": "Std 12 - અધ્યાય 6: જૈવ અણુઓ અને જીવનની ઉત્પત્તિ", "ch": ""}, {"q": "એક પ્રયોગમાં, એક RNA અણુને ડિગ્રેડિંગ ઉત્સેચક સાથે સારવાર આપવામાં આવી અને પછી તેનું વિશ્લેષણ કરવામાં આવ્યું. નીચેનામાંથી કયું પરિણામ આ પ્રયોગનું સૌથી સંભવિત પરિણામ હશે?", "opts": ["RNA અણુ પૂર્ણપણે તૂટી જશે અને ન્યુક્લિયોટાઇડમાં પરિવર્તિત થશે.", "RNA અણુના ફોસ્ફોડાયેસ્ટર બંધો તૂટશે અને ન્યુક્લિયોસાઇડમાં પરિવર્તિત થશે.", "RNA અણુના શર્કરા અને ફોસ્ફેટ ગ્રુપ વચ્ચેના બંધો તૂટશે અને ન્યુક્લિયોબેઝ રિલીઝ થશે.", "RNA અણુના ન્યુક્લિયોબેઝ વચ્ચેના હાઇડ્રોજન બંધો તૂટશે અને ડબલ હેલિક્સ બનશે."], "ans": 0, "exp": "ડિગ્રેડિંગ ઉત્સેચક (જેમ કે RNases) RNA અણુના ફોસ્ફોડાયેસ્ટર બંધોને તોડીને ન્યુક્લિયોટાઇડમાં પરિવર્તિત કરે છે. વિકલ્પ A સાચો છે કારણ કે RNA અણુ પૂર્ણપણે તૂટી જશે અને ન્યુક્લિયોટાઇડમાં પરિવર્તિત થશે. વિકલ્પ B ખોટો છે કારણ કે ન્યુક્લિયોસાઇડમાં પરિવર્તન માટે શર્કરા અને બેઝ વચ્ચેના બંધો તૂટવા જરૂરી છે, જે ડિગ્રેડિંગ ઉત્સેચક દ્વારા થતું નથી. વિકલ્પ C ખોટો છે કારણ કે શર્કરા અને ફોસ્ફેટ ગ્રુપ વચ્ચેના બંધો તૂટવા માટે વિશિષ્ટ ઉત્સેચક જરૂરી છે. વિકલ્પ D ખોટો છે કારણ કે RNA સામાન્ય રીતે સિંગલ-સ્ટ્રેન્ડેડ હોય છે અને ડબલ હેલિક્સ બનવું શક્ય નથી.", "ref": "Std 12 - અધ્યાય 6: જૈવ અણુઓ અને જીવનની ઉત્પત્તિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન DNA અને RNA વચ્ચેના સંરચનાત્મક તફાવતને લગતું સાચું નથી?", "opts": ["DNAમાં ડિઓક્સીરાઇબોઝ શર્કરા હોય છે જ્યારે RNAમાં રાઇબોઝ શર્કરા હોય છે.", "DNAમાં થાઇમિન હોય છે જ્યારે RNAમાં યુરેસિલ હોય છે.", "DNA ડબલ-સ્ટ્રેન્ડેડ હોય છે જ્યારે RNA સિંગલ-સ્ટ્રેન્ડેડ હોય છે.", "DNAમાં ફોસ્ફોડાયેસ્ટર બંધો 3'-5' દિશામાં હોય છે જ્યારે RNAમાં 5'-3' દિશામાં હોય છે."], "ans": 3, "exp": "વિકલ્પ D ખોટો છે કારણ કે DNA અને RNA બંનેમાં ફોસ્ફોડાયેસ્ટર બંધો 5'-3' દિશામાં જ હોય છે. વિકલ્પ A, B, અને C સાચા છે કારણ કે તે DNA અને RNA વચ્ચેના સંરચનાત્મક તફાવતો દર્શાવે છે: DNAમાં ડિઓક્સીરાઇબોઝ શર્કરા અને થાઇમિન હોય છે, જ્યારે RNAમાં રાઇબોઝ શર્કરા અને યુરેસિલ હોય છે, અને DNA ડબલ-સ્ટ્રેન્ડેડ હોય છે જ્યારે RNA સિંગલ-સ્ટ્રેન્ડેડ હોય છે.", "ref": "Std 12 - અધ્યાય 6: જૈવ અણુઓ અને જીવનની ઉત્પત્તિ", "ch": ""}, {"q": "એક કોષમાં, DNA રેપ્લિકેશન દરમિયાન, જો ટેમ્પલેટ સ્ટ્રેન્ડ પર 5’-ATGC-3’ ક્રમ હોય, તો નવી સિંથેસ થતી સ્ટ્રેન્ડ પર કયો ક્રમ મળશે?", "opts": ["5’-TACG-3’", "5’-GCAT-3’", "3’-TACG-5’", "3’-GCAT-5’"], "ans": 1, "exp": "DNA રેપ્લિકેશન એ સેમી-કન્ઝર્વેટિવ પ્રક્રિયા છે જેમાં નવી સ્ટ્રેન્ડ ટેમ્પલેટ સ્ટ્રેન્ડની પૂરક (કોમ્પ્લિમેન્ટરી) હોય છે. ટેમ્પલેટ સ્ટ્રેન્ડ 5’-ATGC-3’ હોવાથી, નવી સ્ટ્રેન્ડ 3’-TACG-5’ થશે, પરંતુ પ્રશ્નમાં નવી સ્ટ્રેન્ડનો ક્રમ 5’ થી 3’ દિશામાં મંગાવ્યો છે. આથી 3’-TACG-5’ ને 5’-GCAT-3’ (રિવર્સ કોમ્પ્લિમેન્ટ) તરીકે લખાય. A) ખોટું છે કારણ કે તે ટેમ્પલેટ જેવું જ છે. C) અને D) ખોટા છે કારણ કે તે 5’ થી 3’ દિશામાં નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક આનુવંશિકતા", "ch": ""}, {"q": "એક કોષમાં, જો RNA પોલિમરેઝ II ઉત્સેચકને અવરોધવામાં આવે, તો નીચેનામાંથી કયી પ્રક્રિયા અટકી જશે?", "opts": ["DNA રેપ્લિકેશન", "mRNA સિંથેસ (ટ્રાન્સક્રિપ્શન)", "tRNA સિંથેસ", "rRNA સિંથેસ"], "ans": 1, "exp": "RNA પોલિમરેઝ II મુખ્યત્વે mRNA (મેસેન્જર RNA) ની સિંથેસ માટે જવાબદાર છે. DNA રેપ્લિકેશન માટે DNA પોલિમરેઝ જવાબદાર છે (A ખોટું). tRNA અને rRNAની સિંથેસ માટે ક્રમશઃ RNA પોલિમરેઝ III અને I જવાબદાર છે (C અને D ખોટા).", "ref": "Std 12 - અધ્યાય 6: આણ્વિક આનુવંશિકતા", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન DNA અને RNA વચ્ચેના રાસાયણિક તફાવતને લગતું સાચું નથી?", "opts": ["DNAમાં ડિઓક્સીરિબોઝ શર્કરા હોય છે જ્યારે RNAમાં રિબોઝ શર્કરા હોય છે.", "DNAમાં થાઇમિન (T) હોય છે જ્યારે RNAમાં યુરેસિલ (U) હોય છે.", "DNAમાં ફોસ્ફોડાયેસ્ટર બંધ હોય છે જ્યારે RNAમાં પેપ્ટાઇડ બંધ હોય છે.", "DNA ડબલ-સ્ટ્રેન્ડેડ હોય છે જ્યારે RNA સામાન્ય રીતે સિંગલ-સ્ટ્રેન્ડેડ હોય છે."], "ans": 2, "exp": "DNA અને RNA બંનેમાં ફોસ્ફોડાયેસ્ટર બંધ હોય છે. પેપ્ટાઇડ બંધ પ્રોટીનમાં જોવા મળે છે. A), B), અને D) વિધાનો સાચા છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક આનુવંશિકતા", "ch": ""}, {"q": "એક પ્રયોગમાં, એક RNA અણુને અલ્કલાઇન સોલ્યુશન સાથે સારવાર આપવામાં આવી અને પછી તેનું વિશ્લેષણ કરવામાં આવ્યું. નીચેનામાંથી કયો પરિણામ અપેક્ષિત છે?", "opts": ["RNA અણુ ટૂટી જશે કારણ કે અલ્કલાઇન સોલ્યુશન ફોસ્ફોડાયેસ્ટર બંધ તોડે છે.", "RNA અણુ સ્થિર રહેશે કારણ કે અલ્કલાઇન સોલ્યુશન RNAને અસર કરતું નથી.", "RNA અણુ હાઇડ્રોલાઇઝ થશે અને ન્યુક્લિયોટાઇડ્સમાં વિભાજિત થશે.", "RNA અણુ ડબલ-સ્ટ્રેન્ડેડ બનશે."], "ans": 2, "exp": "અલ્કલાઇન સોલ્યુશન (ઉદા. NaOH) RNAના ફોસ્ફોડાયેસ્ટર બંધને તોડી શકે છે, જેના કારણે RNA હાઇડ્રોલાઇઝ થઈને ન્યુક્લિયોટાઇડ્સમાં વિભાજિત થાય છે. A) ખોટું છે કારણ કે ફોસ્ફોડાયેસ્ટર બંધ તૂટવાને કારણે RNA ટૂટી જશે, પરંતુ તે હાઇડ્રોલાઇસિસ દ્વારા થાય છે. B) ખોટું છે કારણ કે અલ્કલાઇન સોલ્યુશન RNAને અસર કરે છે. D) ખોટું છે કારણ કે RNA સામાન્ય રીતે સિંગલ-સ્ટ્રેન્ડેડ હોય છે અને અલ્કલાઇન સોલ્યુશન તેને ડબલ-સ્ટ્રેન્ડેડ બનાવતું નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક આનુવંશિકતા", "ch": ""}, {"q": "એક કોષમાં, જો DNAના એક સ્ટ્રેન્ડ પર 5’-TACGGATTC-3’ ક્રમ હોય, તો તેના પૂરક RNA સ્ટ્રેન્ડનો ક્રમ કયો હશે, જ્યારે તે mRNA તરીકે કાર્ય કરે છે અને અનુવાદન (Translation) દરમિયાન રાઇબોઝોમ પર બંધાય છે?", "opts": ["5’-AUGCCUAGG-3’", "3’-AUGCCUAGG-5’", "5’-AUGCCUAAG-3’", "3’-UACGGAUUC-5’"], "ans": 0, "exp": "DNAના ટેમ્પલેટ સ્ટ્રેન્ડ પર 5’-TACGGATTC-3’ ક્રમ હોય ત્યારે, RNA પોલિમરેઝ દ્વારા ટ્રાન્સક્રિપ્શન દરમિયાન, પૂરક RNA સ્ટ્રેન્ડ 3’-AUGCCUAAG-5’ બનશે. પરંતુ mRNA અનુવાદન દરમિયાન રાઇબોઝોમ પર 5’ થી 3’ દિશામાં બંધાય છે, તેથી તેનો ક્રમ 5’-AUGCCUAAG-3’ થશે. વિકલ્પ A (5’-AUGCCUAGG-3’) ખોટો છે કારણ કે 'T' ને 'U' માં બદલવામાં આવે છે પરંતુ 'G' અને 'A' નો ક્રમ યોગ્ય નથી. વિકલ્પ B (3’-AUGCCUAGG-5’) ખોટો છે કારણ કે mRNA હંમેશા 5’ થી 3’ દિશામાં લખાય છે. વિકલ્પ C (5’-AUGCCUAAG-3’) ખોટો છે કારણ કે 'G' અને 'A' નો ક્રમ યોગ્ય નથી. વિકલ્પ D (3’-UACGGAUUC-5’) ખોટો છે કારણ કે તે DNAના ટેમ્પલેટ સ્ટ્રેન્ડનો પૂરક RNA ક્રમ છે પરંતુ તે 3’ થી 5’ દિશામાં છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
