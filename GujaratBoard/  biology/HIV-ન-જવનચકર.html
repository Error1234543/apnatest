<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIV નો જીવનચક્ર</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>HIV નો જીવનચક્ર</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">HIV નો જીવનચક્ર</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એચઆઇવી વાઇરસના જીવનચક્રમાં, નીચેના પૈકી કયો તબક્કો વાઇરસના આનુવંશિક દ્રવ્યને યજમાન કોષના DNAમાં સંકલિત કરવા માટે જવાબદાર છે?", "opts": ["રિવર્સ ટ્રાન્સક્રિપ્શન", "ઇન્ટિગ્રેશન", "પ્રોટીએઝ ક્લીવેજ", "બડિંગ"], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B) ઇન્ટિગ્રેશન છે. એચઆઇવીના જીવનચક્રમાં, રિવર્સ ટ્રાન્સક્રિપ્શન દ્વારા વાઇરલ RNAમાંથી DNA બને છે, પરંતુ આ DNAને યજમાન કોષના DNAમાં સંકલિત કરવા માટે ઇન્ટિગ્રેઝ ઉત્સેચક જવાબદાર છે. રિવર્સ ટ્રાન્સક્રિપ્શન માત્ર RNAને DNAમાં રૂપાંતરિત કરે છે, સંકલન નહીં. પ્રોટીએઝ ક્લીવેજ વાઇરલ પ્રોટીનને પરિપક્વ બનાવે છે, જ્યારે બડિંગ વાઇરસના નવા કણોને કોષમાંથી બહાર કાઢે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એચઆઇવી વાઇરસના જીવનચક્રમાં, 'પ્રોવાયરસ' તરીકે ઓળખાતા તબક્કામાં નીચેનામાંથી શું સાચું છે?", "opts": ["વાઇરલ RNA યજમાન કોષના કોષકેન્દ્રમાં પ્રવેશે છે.", "વાઇરલ DNA યજમાન કોષના DNAમાં સંકલિત થાય છે અને નિષ્ક્રિય રહે છે.", "વાઇરલ પ્રોટીનનું સંસ્લેષણ રિબોઝોમ પર થાય છે.", "વાઇરસ કોષમાંથી બહાર નીકળે છે અને નવા કોષોને ચેપ લગાડે છે."], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B) વાઇરલ DNA યજમાન કોષના DNAમાં સંકલિત થાય છે અને નિષ્ક્રિય રહે છે. પ્રોવાયરસ તબક્કામાં, વાઇરલ DNA યજમાનના DNAમાં સંકલિત થાય છે અને લાંબા સમય સુધી નિષ્ક્રિય રહી શકે છે. વિકલ્પ A ખોટો છે કારણ કે વાઇરલ RNA સીધું કોષકેન્દ્રમાં પ્રવેશતું નથી, તે પહેલા DNAમાં રૂપાંતરિત થાય છે. વિકલ્પ C અને D પ્રોવાયરસ તબક્કા પછીના તબક્કાઓ છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એચઆઇવી વાઇરસના જીવનચક્રમાં, રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચકની ભૂમિકા શું છે અને તેની ક્રિયા માટે કયું વિધાન ખોટું છે?", "opts": ["તે વાઇરલ RNAને DNAમાં રૂપાંતરિત કરે છે.", "તે યજમાન કોષના DNAને RNAમાં રૂપાંતરિત કરે છે.", "તેની ક્રિયા દરમિયાન DNA-RNA હાઇબ્રિડ બને છે.", "તે વાઇરલ જીનોમના પ્રતિકૃતિ માટે જરૂરી છે."], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B) તે યજમાન કોષના DNAને RNAમાં રૂપાંતરિત કરે છે. રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચક વાઇરલ RNAને DNAમાં રૂપાંતરિત કરે છે, યજમાન DNAને નહીં. વિકલ્પ A, C અને D સાચા છે કારણ કે રિવર્સ ટ્રાન્સક્રિપ્ટેઝ વાઇરલ RNAને DNAમાં રૂપાંતરિત કરે છે, તેની ક્રિયા દરમિયાન DNA-RNA હાઇબ્રિડ બને છે, અને તે વાઇરલ જીનોમના પ્રતિકૃતિ માટે જરૂરી છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એચઆઇવી વાઇરસના જીવનચક્રમાં, નીચેના પૈકી કયો તબક્કો વાઇરસના પરિપક્વતા માટે જરૂરી છે, પરંતુ તે યજમાન કોષના કોષકેન્દ્રમાં થતો નથી?", "opts": ["રિવર્સ ટ્રાન્સક્રિપ્શન", "ઇન્ટિગ્રેશન", "પ્રોટીએઝ ક્લીવેજ", "ટ્રાન્સક્રિપ્શન"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C) પ્રોટીએઝ ક્લીવેજ છે. પ્રોટીએઝ ઉત્સેચક વાઇરલ પ્રોટીનને કાપીને પરિપક્વ બનાવે છે, જે કોષકેન્દ્રની બહાર સાયટોપ્લાઝમમાં થાય છે. રિવર્સ ટ્રાન્સક્રિપ્શન અને ઇન્ટિગ્રેશન કોષકેન્દ્રમાં થાય છે, જ્યારે ટ્રાન્સક્રિપ્શન પણ કોષકેન્દ્રમાં થાય છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એચઆઇવી વાઇરસના જીવનચક્રમાં, જો રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચકની ક્રિયા અટકાવવામાં આવે, તો નીચેનામાંથી કયો તબક્કો સીધો પ્રભાવિત થશે નહીં?", "opts": ["વાઇરલ RNAનું DNAમાં રૂપાંતરણ", "પ્રોવાયરસનું નિર્માણ", "વાઇરલ પ્રોટીનનું સંસ્લેષણ", "વાઇરલ જીનોમનું યજમાન DNAમાં સંકલન"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C) વાઇરલ પ્રોટીનનું સંસ્લેષણ છે. રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચક વાઇરલ RNAને DNAમાં રૂપાંતરિત કરે છે, તેથી તેની ક્રિયા અટકાવવાથી વાઇરલ RNAનું DNAમાં રૂપાંતરણ (A), પ્રોવાયરસનું નિર્માણ (B), અને વાઇરલ જીનોમનું સંકલન (D) પ્રભાવિત થશે. પરંતુ વાઇરલ પ્રોટીનનું સંસ્લેષણ ટ્રાન્સક્રિપ્શન અને ટ્રાન્સલેશન પર આધારિત છે, જે રિવર્સ ટ્રાન્સક્રિપ્શન પછી થાય છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એચઆઇવી વાઇરસના જીવનચક્ર દરમિયાન, 'ટેટ' (Tat) પ્રોટીનની ભૂમિકા શું છે?", "opts": ["તે વાઇરલ RNA ની પ્રતિકૃતિને અટકાવે છે", "તે યજમાન કોષના કોષકેન્દ્રમાં પ્રવેશવા માટે વાઇરસને મદદ કરે છે", "તે વાઇરલ જીનના પ્રસરણને વેગ આપે છે અને ટ્રાન્સક્રિપ્શનને ઉત્તેજિત કરે છે", "તે વાઇરસના કેપ્સિડ બનાવવામાં મદદ કરે છે"], "ans": 2, "exp": "ટેટ (Tat) પ્રોટીન એચઆઇવી જીવનચક્રમાં ટ્રાન્સ-અક્ટિવેટર તરીકે કામ કરે છે, જે વાઇરલ જીનના પ્રસરણને વેગ આપે છે અને ટ્રાન્સક્રિપ્શનને ઉત્તેજિત કરે છે. A) ખોટું છે કારણ કે ટેટ પ્રતિકૃતિને અટકાવતું નથી, ઉલટાનું તેને પ્રોત્સાહન આપે છે. B) ખોટું છે કારણ કે યજમાન કોષના કોષકેન્દ્રમાં પ્રવેશવા માટે રિવર્સ ટ્રાન્સક્રિપ્ટેઝ અને અન્ય ક્રિયાવિધિ જવાબદાર છે. D) ખોટું છે કારણ કે કેપ્સિડ બનાવવા માટે ગેગ પ્રોટીન જવાબદાર છે.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એચઆઇવી વાઇરસના જીવનચક્ર દરમિયાન, 'રેવ' (Rev) પ્રોટીનની ક્રિયા શું છે?", "opts": ["તે વાઇરલ RNA ને DNA માં રૂપાંતરિત કરે છે", "તે અપરિપક્વ વાઇરલ RNA ને કોષકેન્દ્રથી કોષરસમાં પરિવહન કરવામાં મદદ કરે છે", "તે વાઇરસના કોષને લીસીંગ કરવામાં મદદ કરે છે", "તે યજમાન કોષના પ્રતિરક્ષાતંત્રને નિષ્ક્રિય કરે છે"], "ans": 1, "exp": "રેવ (Rev) પ્રોટીન અપરિપક્વ વાઇરલ RNA ને કોષકેન્દ્રથી કોષરસમાં પરિવહન કરવામાં મદદ કરે છે, જેથી વાઇરલ પ્રોટીનનું સંશ્લેષણ થઈ શકે. A) ખોટું છે કારણ કે RNA ને DNA માં રૂપાંતરિત કરવાનું કામ રિવર્સ ટ્રાન્સક્રિપ્ટેઝ કરે છે. C) ખોટું છે કારણ કે કોષને લીસીંગ કરવાનું કામ વાઇરસના અન્ય તંત્ર દ્વારા થાય છે. D) ખોટું છે કારણ કે યજમાન કોષના પ્રતિરક્ષાતંત્રને નિષ્ક્રિય કરવાનું કામ એચઆઇવીના અન્ય પ્રોટીન જેવા કે Nef દ્વારા થાય છે.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એચઆઇવી વાઇરસના જીવનચક્રમાં, 'વિફ' (Vif) પ્રોટીનની ભૂમિકા કઈ છે?", "opts": ["તે યજમાન કોષના APOBEC3G ઉત્સેચકને નિષ્ક્રિય કરે છે, જે વાઇરલ DNA ને હાઇપરમ્યુટેટ કરે છે", "તે વાઇરસના કેપ્સિડને યજમાન કોષમાં પ્રવેશવા માટે મદદ કરે છે", "તે વાઇરલ RNA ને યજમાન કોષના વર્ણસૂત્રમાં એકીકૃત કરે છે", "તે વાઇરસના પ્રોટીનને યજમાન કોષના કોષકેન્દ્રમાં પ્રવેશવા દે છે"], "ans": 0, "exp": "વિફ (Vif) પ્રોટીન યજમાન કોષના APOBEC3G ઉત્સેચકને નિષ્ક્રિય કરે છે, જે વાઇરલ DNA ને હાઇપરમ્યુટેટ કરવાનો પ્રયાસ કરે છે. B) ખોટું છે કારણ કે કેપ્સિડને પ્રવેશવા માટે મદદ કરવાનું કામ અન્ય પ્રોટીન જેવા કે CA દ્વારા થાય છે. C) ખોટું છે કારણ કે વાઇરલ RNA ને યજમાન કોષના વર્ણસૂત્રમાં એકીકૃત કરવાનું કામ ઇન્ટિગ્રેઝ ઉત્સેચક દ્વારા થાય છે. D) ખોટું છે કારણ કે વાઇરસના પ્રોટીનને કોષકેન્દ્રમાં પ્રવેશવા દેવાનું કામ અન્ય ક્રિયાવિધિ દ્વારા થાય છે.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એચઆઇવી વાઇરસના જીવનચક્રમાં, 'નેફ' (Nef) પ્રોટીનની ક્રિયા કઈ છે?", "opts": ["તે યજમાન કોષના CD4 રિસેપ્ટરની સાંદ્રતા ઘટાડે છે અને પ્રતિરક્ષાતંત્રને નબળું પાડે છે", "તે વાઇરલ RNA ને DNA માં રૂપાંતરિત કરે છે", "તે વાઇરસના કેપ્સિડને બનાવવામાં મદદ કરે છે", "તે વાઇરસના પ્રોટીનને યજમાન કોષના કોષકેન્દ્રમાં પ્રવેશવા દે છે"], "ans": 0, "exp": "નેફ (Nef) પ્રોટીન યજમાન કોષના CD4 રિસેપ્ટરની સાંદ્રતા ઘટાડે છે, જે પ્રતિરક્ષાતંત્રને નબળું પાડે છે. B) ખોટું છે કારણ કે RNA ને DNA માં રૂપાંતરિત કરવાનું કામ રિવર્સ ટ્રાન્સક્રિપ્ટેઝ કરે છે. C) ખોટું છે કારણ કે કેપ્સિડ બનાવવા માટે ગેગ પ્રોટીન જવાબદાર છે. D) ખોટું છે કારણ કે વાઇરસના પ્રોટીનને કોષકેન્દ્રમાં પ્રવેશવા દેવાનું કામ અન્ય ક્રિયાવિધિ દ્વારા થાય છે.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એચઆઇવી વાઇરસના જીવનચક્ર દરમિયાન, 'વપ્ર' (Vpr) પ્રોટીનની ભૂમિકા કઈ છે?", "opts": ["તે વાઇરલ DNA ને યજમાન કોષના કોષકેન્દ્રમાં પ્રવેશવા માટે મદદ કરે છે", "તે યજમાન કોષના કોષચક્રને અટકાવે છે અને વાઇરસના પ્રસરણને વેગ આપે છે", "તે વાઇરસના કેપ્સિડને બનાવવામાં મદદ કરે છે", "તે વાઇરલ RNA ને યજમાન કોષના વર્ણસૂત્રમાં એકીકૃત કરે છે"], "ans": 1, "exp": "વપ્ર (Vpr) પ્રોટીન યજમાન કોષના કોષચક્રને અટકાવે છે અને વાઇરસના પ્રસરણને વેગ આપે છે. A) ખોટું છે કારણ કે વાઇરલ DNA ને કોષકેન્દ્રમાં પ્રવેશવા માટે મદદ કરવાનું કામ અન્ય પ્રોટીન દ્વારા થાય છે. C) ખોટું છે કારણ કે કેપ્સિડ બનાવવા માટે ગેગ પ્રોટીન જવાબદાર છે. D) ખોટું છે કારણ કે વાઇરલ RNA ને યજમાન કોષના વર્ણસૂત્રમાં એકીકૃત કરવાનું કામ ઇન્ટિગ્રેઝ ઉત્સેચક દ્વારા થાય છે.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એચઆઇવી વાઇરસના જીવનચક્ર દરમિયાન, 'એન્ટીસેન્સ RNA' નું નિર્માણ કયા તબક્કે થાય છે અને તેની ભૂમિકા શું છે?", "opts": ["રિવર્સ ટ્રાન્સક્રિપ્શન પહેલા, વાઇરલ RNA ને સુરક્ષિત રાખવા માટે", "રિવર્સ ટ્રાન્સક્રિપ્શન દરમિયાન, DNA નું સંશ્લેષણ કરવા માટે", "પ્રોવાયરસ તબક્કે, યજમાન કોષના કોષકેન્દ્રમાં એકીકરણ પૂર્વે", "વાઇરસના પરિપક્વતા દરમિયાન, નવા વાઇરસ કણોના નિર્માણ માટે"], "ans": 1, "exp": "રિવર્સ ટ્રાન્સક્રિપ્શન દરમિયાન, રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચક દ્વારા વાઇરલ RNA ને DNA માં રૂપાંતરિત કરવામાં આવે છે, જેમાં 'એન્ટીસેન્સ RNA' નું નિર્માણ થાય છે. આ તબક્કે DNA નું સંશ્લેષણ થાય છે. A) રિવર્સ ટ્રાન્સક્રિપ્શન પહેલા એન્ટીસેન્સ RNA નું નિર્માણ થતું નથી. C) પ્રોવાયરસ તબક્કે એન્ટીસેન્સ RNA નું નિર્માણ થતું નથી, પરંતુ DNA નું એકીકરણ થાય છે. D) પરિપક્વતા દરમિયાન એન્ટીસેન્સ RNA ની ભૂમિકા નથી.", "ref": "Std 12 - અધ્યાય 10: માનવ તંત્ર અને રોગો (HIV જીવનચક્ર)", "ch": ""}, {"q": "એચઆઇવી વાઇરસના જીવનચક્રમાં, 'gag' જીન દ્વારા કયા પ્રોટીનનું નિર્માણ થાય છે અને તેની ભૂમિકા શું છે?", "opts": ["રિવર્સ ટ્રાન્સક્રિપ્ટેઝ, વાઇરલ RNA ને DNA માં રૂપાંતરિત કરવા માટે", "કેપ્સિડ પ્રોટીન (p24), વાઇરસના કોર નું નિર્માણ કરવા માટે", "એનવેલપ પ્રોટીન (gp120), યજમાન કોષમાં પ્રવેશવા માટે", "ટેટ પ્રોટીન, વાઇરલ જીન અભિવ્યક્તિ નિયંત્રણ માટે"], "ans": 1, "exp": "'gag' જીન દ્વારા કેપ્સિડ પ્રોટીન (p24) નું નિર્માણ થાય છે, જે વાઇરસના કોર નું નિર્માણ કરે છે. A) રિવર્સ ટ્રાન્સક્રિપ્ટેઝ 'pol' જીન દ્વારા નિર્માણ થાય છે. C) એનવેલપ પ્રોટીન (gp120) 'env' જીન દ્વારા નિર્માણ થાય છે. D) ટેટ પ્રોટીન 'tat' જીન દ્વારા નિર્માણ થાય છે.", "ref": "Std 12 - અધ્યાય 10: માનવ તંત્ર અને રોગો (HIV જીવનચક્ર)", "ch": ""}, {"q": "એચઆઇવી વાઇરસના જીવનચક્રમાં, 'env' જીન દ્વારા નિર્માણ પામતા પ્રોટીનની ભૂમિકા કઈ છે?", "opts": ["વાઇરસના કોષકેન્દ્રમાં પ્રવેશવા માટે જરૂરી", "યજમાન કોષની સપાટી પરના રિસેપ્ટર સાથે જોડાવા અને વાઇરસને યજમાન કોષમાં પ્રવેશ કરાવવા માટે", "વાઇરલ RNA ને સુરક્ષિત રાખવા માટે", "વાઇરસના પરિપક્વતા દરમિયાન, નવા વાઇરસ કણોના નિર્માણ માટે"], "ans": 1, "exp": "'env' જીન દ્વારા એનવેલપ પ્રોટીન (gp120 અને gp41) નું નિર્માણ થાય છે, જે યજમાન કોષની સપાટી પરના રિસેપ્ટર (CD4) સાથે જોડાઈને વાઇરસને યજમાન કોષમાં પ્રવેશ કરાવે છે. A) વાઇરસના કોષકેન્દ્રમાં પ્રવેશવા માટે 'env' જીન જવાબદાર નથી. C) વાઇરલ RNA ને સુરક્ષિત રાખવા માટે 'gag' જીન જવાબદાર છે. D) પરિપક્વતા દરમિયાન 'gag' અને 'pol' જીન જવાબદાર છે.", "ref": "Std 12 - અધ્યાય 10: માનવ તંત્ર અને રોગો (HIV જીવનચક્ર)", "ch": ""}, {"q": "એચઆઇવી વાઇરસના જીવનચક્રમાં, 'પ્રોવાયરસ' તબક્કે નીચેનામાંથી કયું કથન ખોટું છે?", "opts": ["પ્રોવાયરસ યજમાન કોષના કોષકેન્દ્રમાં એકીકૃત થાય છે", "પ્રોવાયરસ વાઇરલ DNA નું રૂપ છે, જે યજમાન કોષના જીનોમ સાથે જોડાયેલું હોય છે", "પ્રોવાયરસ તબક્કે વાઇરસ સક્રિય રીતે નવા કણોનું નિર્માણ કરે છે", "પ્રોવાયરસ તબક્કે વાઇરસ નિષ્ક્રિય રહે છે અને યજમાન કોષની સાથે વિભાજન પામે છે"], "ans": 2, "exp": "પ્રોવાયરસ તબક્કે વાઇરસ નિષ્ક્રિય રહે છે અને યજમાન કોષની સાથે વિભાજન પામે છે, પરંતુ સક્રિય રીતે નવા કણોનું નિર્માણ કરતું નથી. A) પ્રોવાયરસ યજમાન કોષના કોષકેન્દ્રમાં એકીકૃત થાય છે. B) પ્રોવાયરસ વાઇરલ DNA નું રૂપ છે, જે યજમાન કોષના જીનોમ સાથે જોડાયેલું હોય છે. D) પ્રોવાયરસ તબક્કે વાઇરસ નિષ્ક્રિય રહે છે અને યજમાન કોષની સાથે વિભાજન પામે છે.", "ref": "Std 12 - અધ્યાય 10: માનવ તંત્ર અને રોગો (HIV જીવનચક્ર)", "ch": ""}, {"q": "એચઆઇવી વાઇરસના જીવનચક્ર દરમિયાન, 'વાઇરલ લોડ' નું મહત્તમ સ્તર કયા તબક્કે જોવા મળે છે?", "opts": ["પ્રોવાયરસ તબક્કે, યજમાન કોષમાં એકીકરણ પછી", "રિવર્સ ટ્રાન્સક્રિપ્શન દરમિયાન, DNA સંશ્લેષણ પૂર્વે", "વાઇરસના પરિપક્વતા અને મુક્ત થવા દરમિયાન", "યજમાન કોષમાં પ્રવેશ દરમિયાન, એનવેલપ અને કોષીય ઝિલ્લીના સંલયન પછી"], "ans": 2, "exp": "વાઇરલ લોડ નું મહત્તમ સ્તર વાઇરસના પરિપક્વતા અને મુક્ત થવા દરમિયાન જોવા મળે છે, જ્યારે નવા વાઇરસ કણોનું નિર્માણ થાય છે. A) પ્રોવાયરસ તબક્કે વાઇરલ લોડ નીચું હોય છે. B) રિવર્સ ટ્રાન્સક્રિપ્શન દરમિયાન વાઇરલ લોડ વધતું નથી. D) યજમાન કોષમાં પ્રવેશ દરમિયાન વાઇરલ લોડ વધતું નથી.", "ref": "Std 12 - અધ્યાય 10: માનવ તંત્ર અને રોગો (HIV જીવનચક્ર)", "ch": ""}, {"q": "એચઆઇવી વાઇરસના જીવનચક્ર દરમિયાન, 'ઇન્ટિગ્રેઝ' ઉત્સેચકની ક્રિયા માટે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["ઇન્ટિગ્રેઝ ઉત્સેચક વાઇરલ DNA ને યજમાન કોષના DNA માં સંકલિત કરે છે", "ઇન્ટિગ્રેઝ ઉત્સેચકની ક્રિયા માટે Mg²⁺ આયન જરૂરી છે", "ઇન્ટિગ્રેઝ ઉત્સેચક વાઇરલ RNA ને સીધું યજમાન DNA માં જોડે છે", "ઇન્ટિગ્રેઝ ઉત્સેચકની ક્રિયા દ્વારા પ્રોવાયરસનું નિર્માણ થાય છે"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. ઇન્ટિગ્રેઝ ઉત્સેચક વાઇરલ DNA ને યજમાન કોષના DNA માં સંકલિત કરે છે, પરંતુ તે વાઇરલ RNA ને સીધું જોડતું નથી. વાઇરલ RNA નું રિવર્સ ટ્રાન્સક્રિપ્શન દ્વારા DNA માં રૂપાંતરણ થયા બાદ જ ઇન્ટિગ્રેઝ કાર્ય કરે છે. વિકલ્પ A, B અને D ઇન્ટિગ્રેઝની સાચી ક્રિયા અને જરૂરિયાતોનું વર્ણન કરે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એચઆઇવી વાઇરસના જીવનચક્રમાં, 'સ્પ્લાઇસિંગ' પ્રક્રિયા દરમિયાન નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["સ્પ્લાઇસિંગ દ્વારા વાઇરલ mRNA ના વિવિધ આઇસોફોર્મ્સ બને છે", "સ્પ્લાઇસિંગ પ્રક્રિયા યજમાન કોષના સ્પ્લાઇસોઝોમ દ્વારા થાય છે", "સ્પ્લાઇસિંગ દ્વારા વાઇરલ DNA ના વિવિધ ભાગો જોડાય છે", "સ્પ્લાઇસિંગ પ્રક્રિયા વાઇરલ પ્રોટીનના નિર્માણ માટે જરૂરી છે"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. સ્પ્લાઇસિંગ પ્રક્રિયા વાઇરલ RNA પર થાય છે, DNA પર નહીં. આ પ્રક્રિયા દ્વારા વાઇરલ mRNA ના વિવિધ આઇસોફોર્મ્સ બને છે જે વિવિધ વાઇરલ પ્રોટીનના નિર્માણ માટે જરૂરી છે. વિકલ્પ A, B અને D સ્પ્લાઇસિંગની સાચી ક્રિયા અને ભૂમિકાનું વર્ણન કરે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એચઆઇવી વાઇરસના જીવનચક્રમાં, 'પ્રોટીઝ' ઉત્સેચકની ક્રિયા માટે નીચેનામાંથી કયું વિધાન અયોગ્ય છે?", "opts": ["પ્રોટીઝ ઉત્સેચક વાઇરલ પોલીપ્રોટીનને વ્યક્તિગત કાર્યાત્મક પ્રોટીનમાં વિભાજિત કરે છે", "પ્રોટીઝ ઉત્સેચકની ક્રિયા વાઇરસના પરિપક્વતા માટે જરૂરી છે", "પ્રોટીઝ ઉત્સેચક વાઇરલ RNA ના નિર્માણમાં મદદ કરે છે", "પ્રોટીઝ ઉત્સેચકની ક્રિયા વાઇરસના બહાર નીકળવા (બડિંગ) પહેલાં થાય છે"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. પ્રોટીઝ ઉત્સેચક વાઇરલ પોલીપ્રોટીનને વ્યક્તિગત કાર્યાત્મક પ્રોટીનમાં વિભાજિત કરે છે, પરંતુ તે વાઇરલ RNA ના નિર્માણમાં સીધી ભૂમિકા ભજવતું નથી. વિકલ્પ A, B અને D પ્રોટીઝ ઉત્સેચકની સાચી ક્રિયા અને મહત્વનું વર્ણન કરે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એચઆઇવી વાઇરસના જીવનચક્ર દરમિયાન, નીચેનામાંથી કયું પ્રોટીન યજમાન કોષના CD4 રીસેપ્ટર સાથે સીધો સંપર્ક કરે છે?", "opts": ["gp120", "gp41", "p24", "p17"], "ans": 0, "exp": "સાચો જવાબ વિકલ્પ A છે. gp120 પ્રોટીન એચઆઇવી વાઇરસનું બાહ્ય ગ્લાયકોપ્રોટીન છે જે યજમાન કોષના CD4 રીસેપ્ટર સાથે સીધો સંપર્ક કરે છે. gp41 પ્રોટીન વાઇરસના કોષમાં પ્રવેશ માટે જરૂરી છે પરંતુ તે CD4 સાથે સીધો સંપર્ક કરતું નથી. p24 અને p17 પ્રોટીન વાઇરસના કેપ્સિડ અને મેટ્રિક્સના નિર્માણમાં ભાગ ભજવે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એચઆઇવી વાઇરસના જીવનચક્રમાં, 'એપોપ્ટોસિસ' ને અટકાવવા માટે વાઇરસ દ્વારા નીચેનામાંથી કયું પ્રોટીન ઉત્પન્ન થાય છે?", "opts": ["નેફ (Nef)", "વપ્ર (Vpr)", "વિફ (Vif)", "ટેટ (Tat)"], "ans": 0, "exp": "સાચો જવાબ વિકલ્પ A છે. નેફ (Nef) પ્રોટીન એચઆઇવી વાઇરસ દ્વારા ઉત્પન્ન થાય છે જે યજમાન કોષમાં એપોપ્ટોસિસ (પ્રોગ્રામ્ડ કોષ મૃત્યુ) ને અટકાવવામાં મદદ કરે છે. આ પ્રોટીન CD4 અને MHC-I અણુઓના અવનતિ દ્વારા પણ પ્રતિરક્ષા પ્રતિભાવને નબળો પાડે છે. વપ્ર (Vpr) કોષચક્રને અટકાવે છે, વિફ (Vif) એપોબેક-3 ને નિષ્ક્રિય કરે છે, અને ટેટ (Tat) વાઇરલ ટ્રાન્સક્રિપ્શનને વધારે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
