<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codon</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Codon</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Codon</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "કોઈ એક જનીનમાં 'UAA' કોડોન આગળ આવે છે, તો તેની શા માટે અસર થશે?", "opts": ["પ્રોટીન સંશ્લેષણમાં અટકાવ પડશે કેમ કે તે સ્ટોપ કોડોન છે", "પ્રોટીન સંશ્લેષણમાં અમીનો એસિડ મેથિયોનિન ઉમેરાશે", "પ્રોટીન સંશ્લેષણની ગતિ વધશે કેમ કે તે સ્ટાર્ટ કોડોન છે", "પ્રોટીન સંશ્લેષણમાં તફાવત પડશે નહીં કેમ કે તે નિષ્ક્રિય કોડોન છે"], "ans": 0, "exp": "UAA એ સ્ટોપ કોડોન છે, જે પ્રોટીન સંશ્લેષણને અટકાવે છે. A વિકલ્પ સાચો છે કેમ કે સ્ટોપ કોડોન (UAA, UAG, UGA) રાઇબોઝોમને પ્રોટીન બનાવવાનું બંધ કરાવે છે. B વિકલ્પ ખોટો છે કેમ કે મેથિયોનિન સ્ટાર્ટ કોડોન (AUG) સાથે જોડાય છે. C વિકલ્પ ખોટો છે કેમ કે UAA સ્ટાર્ટ કોડોન નથી. D વિકલ્પ ખોટો છે કેમ કે UAA નિષ્ક્રિય નથી, પરંતુ સક્રિય સ્ટોપ સિગ્નલ છે.", "ref": "Std 12 - અધ્યાય 6: આનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "મનુષ્યમાં મ્યુટેશન દરમિયાન જો કોડોન 'GCC' બદલાઈને 'GCA' થાય, તો શું પરિણામ થશે?", "opts": ["પ્રોટીનની પ્રાથમિક રચનામાં કોઈ ફેરફાર થશે નહીં કેમ કે બંને કોડોન એલાનિન માટે કોડ કરે છે", "પ્રોટીનમાં એમિનો એસિડ વાલિન ઉમેરાશે", "પ્રોટીન સંશ્લેષણ અટકી જશે કેમ કે તે નોનસેન્સ મ્યુટેશન છે", "પ્રોટીનની રચના પૂર્ણપણે બદલાઈ જશે કેમ કે તે ફ્રેમશિફ્ટ મ્યુટેશન છે"], "ans": 0, "exp": "GCC અને GCA બંને કોડોન એલાનિન (Ala) માટે કોડ કરે છે. આથી, આ મ્યુટેશન સાયલન્ટ મ્યુટેશન છે, જે પ્રોટીનની પ્રાથમિક રચનામાં કોઈ ફેરફાર કરતું નથી. A વિકલ્પ સાચો છે. B વિકલ્પ ખોટો છે કેમ કે વાલિન (Val) માટેના કોડોન GTN છે. C વિકલ્પ ખોટો છે કેમ કે સ્ટોપ કોડોન નથી. D વિકલ્પ ખોટો છે કેમ કે ફ્રેમશિફ્ટ મ્યુટેશનમાં ન્યુક્લિયોટાઇડની સંખ્યામાં ફેરફાર થાય છે, જે અહીં નથી.", "ref": "Std 12 - અધ્યાય 6: આનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "નીચેના પૈકી કયો કોડોન સ્ટાર્ટ કોડોન તરીકે ઓળખાય છે અને પ્રોટીન સંશ્લેષણની શરૂઆત કરે છે?", "opts": ["UAA", "UAG", "AUG", "UGA"], "ans": 2, "exp": "AUG એ સ્ટાર્ટ કોડોન છે, જે પ્રોટીન સંશ્લેષણની શરૂઆત કરે છે અને મેથિયોનિન (Met) એમિનો એસિડ માટે કોડ કરે છે. A, B, અને D વિકલ્પો સ્ટોપ કોડોન છે, જે પ્રોટીન સંશ્લેષણને અટકાવે છે.", "ref": "Std 12 - અધ્યાય 6: આનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "જો એક mRNA અણુ પર કોડોન 'AUC' આવે, તો તેના માટે કયો એન્ટીકોડોન tRNA પર હશે?", "opts": ["UAG", "TAG", "GAT", "UAU"], "ans": 0, "exp": "mRNA પરના કોડોન 'AUC' માટે tRNA પરનો એન્ટીકોડોન તેની પૂરક રચના હશે. AUC નો પૂરક એન્ટીકોડોન UAG છે. B વિકલ્પ ખોટો છે કેમ કે TAG એ DNA માટે પૂરક હશે. C વિકલ્પ ખોટો છે કેમ કે GAT એ AUC નો પૂરક નથી. D વિકલ્પ ખોટો છે કેમ કે UAU એ AUC નો પૂરક નથી.", "ref": "Std 12 - અધ્યાય 6: આનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન કોડોનની વિશિષ્ટતાઓ વિશે સાચું નથી?", "opts": ["કોડોન ત્રણ ન્યુક્લિયોટાઇડના બનેલા હોય છે", "કોડોન mRNA પર આવેલા હોય છે", "કોડોન પ્રોટીન સંશ્લેષણ માટે જરૂરી એમિનો એસિડ નક્કી કરે છે", "કોડોન DNA પર આવેલા હોય છે અને પ્રોટીન સંશ્લેષણમાં ભાગ લે છે"], "ans": 3, "exp": "A, B, અને C વિકલ્પો સાચા છે કેમ કે કોડોન ત્રણ ન્યુક્લિયોટાઇડના બનેલા હોય છે, mRNA પર આવેલા હોય છે, અને એમિનો એસિડ નક્કી કરે છે. D વિકલ્પ ખોટો છે કેમ કે કોડોન DNA પર આવેલા નથી, પરંતુ mRNA પર આવેલા હોય છે અને પ્રોટીન સંશ્લેષણમાં ભાગ લે છે.", "ref": "Std 12 - અધ્યાય 6: આનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "જો એક mRNA અણુ પર કોડોન 'AGU' આવે, તો તે કયા એમિનો એસિડને કોડ કરશે અને તે કયા ટાઇપનો કોડોન ગણાય છે?", "opts": ["સેરીન, સ્ટોપ કોડોન", "સેરીન, સ્ટાર્ટ કોડોન", "સેરીન, સેન્સ કોડોન", "ટાયરોસીન, નોન-સેન્સ કોડોન"], "ans": 2, "exp": "'AGU' કોડોન સેરીન (Serine) એમિનો એસિડને કોડ કરે છે. તે સેન્સ કોડોન છે કારણ કે તે એક એમિનો એસિડને કોડ કરે છે. સ્ટોપ કોડોન (UAA, UAG, UGA) પ્રોટીન સંશ્લેષણને અટકાવે છે, સ્ટાર્ટ કોડોન (AUG) પ્રોટીન સંશ્લેષણની શરૂઆત કરે છે, અને નોન-સેન્સ કોડોન કોઈ એમિનો એસિડને કોડ કરતું નથી. 'AGU' એ સેન્સ કોડોન છે કારણ કે તે સેરીનને કોડ કરે છે.", "ref": "Std 12 - Chapter 6: જૈવ અણુઓ અને જીવનની ઉત્પત્તિ (Molecular Basis of Life)", "ch": ""}, {"q": "નીચેના પૈકી કયો કોડોન 'વોબલ હાઇપોથેસિસ' નું ઉદાહરણ છે?", "opts": ["UUU અને UUC બંને ફિનાઇલએલેનિનને કોડ કરે છે", "GUU અને GUC બંને વેલીનને કોડ કરે છે", "UAC અને UAA બંને ટાયરોસીનને કોડ કરે છે", "GGU, GGC, GGA, અને GGG બધા ગ્લાઇસીનને કોડ કરે છે"], "ans": 3, "exp": "'વોબલ હાઇપોથેસિસ' અનુસાર, tRNA અણુના એન્ટીકોડોન લૂપમાં પહેલા બે ન્યુક્લિયોટાઇડ્સ સખત જોડાણ ધરાવે છે, જ્યારે ત્રીજો ન્યુક્લિયોટાઇડ લવચીક હોવાનું મનાય છે. GGU, GGC, GGA, અને GGG બધા ગ્લાઇસીનને કોડ કરે છે, જે વોબલ હાઇપોથેસિસનું સ્પષ્ટ ઉદાહરણ છે. અન્ય વિકલ્પો એક જ એમિનો એસિડને કોડ કરતા કોડોનના જૂથો છે, પરંતુ તેઓ વોબલ હાઇપોથેસિસનું સ્પષ્ટ ઉદાહરણ નથી.", "ref": "Std 12 - Chapter 6: જૈવ અણુઓ અને જીવનની ઉત્પત્તિ (Molecular Basis of Life)", "ch": ""}, {"q": "જો એક mRNA અણુ પર કોડોન 'UGA' આવે, તો તે કયા પ્રકારનો કોડોન ગણાય છે અને તેનું કામ શું છે?", "opts": ["સ્ટાર્ટ કોડોન, પ્રોટીન સંશ્લેષણની શરૂઆત કરે છે", "સ્ટોપ કોડોન, પ્રોટીન સંશ્લેષણને અટકાવે છે", "સેન્સ કોડોન, એમિનો એસિડને કોડ કરે છે", "નોન-સેન્સ કોડોન, કોઈ એમિનો એસિડને કોડ કરતું નથી"], "ans": 1, "exp": "'UGA' એક સ્ટોપ કોડોન છે, જે પ્રોટીન સંશ્લેષણને અટકાવે છે. સ્ટાર્ટ કોડોન (AUG) પ્રોટીન સંશ્લેષણની શરૂઆત કરે છે, સેન્સ કોડોન એમિનો એસિડને કોડ કરે છે, અને નોન-સેન્સ કોડોન કોઈ એમિનો એસિડને કોડ કરતું નથી. 'UGA' સ્ટોપ કોડોન છે, જે પ્રોટીન સંશ્લેષણને અટકાવે છે.", "ref": "Std 12 - Chapter 6: જૈવ અણુઓ અને જીવનની ઉત્પત્તિ (Molecular Basis of Life)", "ch": ""}, {"q": "નીચેના પૈકી કયો કોડોન 'સાયલન્ટ મ્યુટેશન'નું ઉદાહરણ છે?", "opts": ["GCC → GCA (બંને એલેનિનને કોડ કરે છે)", "GAA → GTA (ગ્લુટામિક એસિડ → વેલીન)", "UAA → UAG (બંને સ્ટોપ કોડોન)", "AUG → UGA (મેથિયોનિન → સ્ટોપ કોડોન)"], "ans": 0, "exp": "'સાયલન્ટ મ્યુટેશન' એવી પરિવર્તન છે જેમાં કોડોન બદલાય છે, પરંતુ તે જ એમિનો એસિડને કોડ કરે છે. GCC અને GCA બંને એલેનિનને કોડ કરે છે, તેથી તે સાયલન્ટ મ્યુટેશનનું ઉદાહરણ છે. અન્ય વિકલ્પો એમિનો એસિડ અથવા સ્ટોપ કોડોનમાં ફેરફાર કરે છે, જે સાયલન્ટ મ્યુટેશન નથી.", "ref": "Std 12 - Chapter 6: જૈવ અણુઓ અને જીવનની ઉત્પત્તિ (Molecular Basis of Life)", "ch": ""}, {"q": "જો એક mRNA અણુ પર કોડોન 'AUG' આવે, તો તે કયા એમિનો એસિડને કોડ કરશે અને તે કયા ટાઇપનો કોડોન ગણાય છે?", "opts": ["મેથિયોનિન, સ્ટાર્ટ કોડોન", "મેથિયોનિન, સ્ટોપ કોડોન", "ફિનાઇલએલેનિન, સ્ટાર્ટ કોડોન", "ટાયરોસીન, સેન્સ કોડોન"], "ans": 0, "exp": "'AUG' કોડોન મેથિયોનિન એમિનો એસિડને કોડ કરે છે અને તે સ્ટાર્ટ કોડોન તરીકે ઓળખાય છે કારણ કે તે પ્રોટીન સંશ્લેષણની શરૂઆત કરે છે. સ્ટોપ કોડોન (UAA, UAG, UGA) પ્રોટીન સંશ્લેષણને અટકાવે છે, અને સેન્સ કોડોન એમિનો એસિડને કોડ કરે છે. 'AUG' એ સ્ટાર્ટ કોડોન છે અને મેથિયોનિનને કોડ કરે છે.", "ref": "Std 12 - Chapter 6: જૈવ અણુઓ અને જીવનની ઉત્પત્તિ (Molecular Basis of Life)", "ch": ""}, {"q": "જો એક mRNA અણુ પર કોડોન 'CUU' અને 'CUC' બંને એમિનો એસિડ 'લ્યુસીન' માટે કોડ કરે, તો આ કોડોનની કઈ વિશેષતા દર્શાવે છે?", "opts": ["કોડોનની અસરકારકતા (Efficiency of codon)", "કોડોનની બહુવિધતા (Degeneracy of codon)", "કોડોનની વિશિષ્ટતા (Specificity of codon)", "કોડોનની સાર્વત્રિકતા (Universality of codon)"], "ans": 1, "exp": "કોડોન 'CUU' અને 'CUC' બંને 'લ્યુસીન' એમિનો એસિડ માટે કોડ કરે છે, જે કોડોનની બહુવિધતાનું ઉદાહરણ છે. બહુવિધતા એટલે એક જ એમિનો એસિડ માટે એકથી વધારે કોડોન હોવું. અસરકારકતા કોડોનની ગતિ સાથે સંબંધિત છે, વિશિષ્ટતા એટલે એક કોડોન ફક્ત એક જ એમિનો એસિડ માટે કોડ કરે, અને સાર્વત્રિકતા એટલે તમામ જીવોમાં કોડોનની સમાન અર્થઘટન પ્રણાલી.", "ref": "Std 12 - Chapter 6: જૈવ અણુઓ અને જનીન અભિવ્યક્તિ (Molecular Basis of Inheritance)", "ch": ""}, {"q": "જો એક mRNA અણુ પર કોડોન 'GGG' આવે, તો તે કયા એમિનો એસિડ માટે કોડ કરશે અને આ કોડોનની કઈ વિશેષતા છે?", "opts": ["ગ્લાઇસીન, સ્ટોપ કોડોન", "પ્રોલીન, સ્ટાર્ટ કોડોન", "ગ્લાઇસીન, અંતિમ કોડોન (Non-sense codon)", "ગ્લાઇસીન, સંપૂર્ણ કોડોન (Complete codon)"], "ans": 3, "exp": "'GGG' કોડોન 'ગ્લાઇસીન' એમિનો એસિડ માટે કોડ કરે છે. આ કોડોન સંપૂર્ણ કોડોન છે, કારણ કે તે એક એમિનો એસિડ માટે કોડ કરે છે. સ્ટોપ કોડોન (UAA, UAG, UGA) પ્રોટીન સંશ્લેષણને અટકાવે છે, સ્ટાર્ટ કોડોન (AUG) પ્રોટીન સંશ્લેષણની શરૂઆત કરે છે, અને અંતિમ કોડોન (Non-sense codon) પ્રોટીન સંશ્લેષણને અટકાવે છે.", "ref": "Std 12 - Chapter 6: જૈવ અણુઓ અને જનીન અભિવ્યક્તિ (Molecular Basis of Inheritance)", "ch": ""}, {"q": "નીચેના પૈકી કયો કોડોન 'સ્ટોપ કોડોન' તરીકે ઓળખાય છે અને પ્રોટીન સંશ્લેષણને અટકાવે છે?", "opts": ["UAA", "AUG", "CGU", "CAU"], "ans": 0, "exp": "'UAA' કોડોન સ્ટોપ કોડોન છે, જે પ્રોટીન સંશ્લેષણને અટકાવે છે. 'AUG' સ્ટાર્ટ કોડોન છે, 'CGU' અને 'CAU' કોડોન ક્રમશઃ 'અર્જિનિન' અને 'હિસ્ટિડિન' એમિનો એસિડ માટે કોડ કરે છે.", "ref": "Std 12 - Chapter 6: જૈવ અણુઓ અને જનીન અભિવ્યક્તિ (Molecular Basis of Inheritance)", "ch": ""}, {"q": "જો એક mRNA અણુ પર કોડોન 'AUC' આવે, તો તે કયા એમિનો એસિડ માટે કોડ કરશે અને આ કોડોનની કઈ વિશેષતા છે?", "opts": ["આઇસોલ્યુસીન, સ્ટાર્ટ કોડોન", "લ્યુસીન, સ્ટોપ કોડોન", "આઇસોલ્યુસીન, સંપૂર્ણ કોડોન", "મિથાયોનિન, સ્ટાર્ટ કોડોન"], "ans": 2, "exp": "'AUC' કોડોન 'આઇસોલ્યુસીન' એમિનો એસિડ માટે કોડ કરે છે. આ કોડોન સંપૂર્ણ કોડોન છે, કારણ કે તે એક એમિનો એસિડ માટે કોડ કરે છે. 'AUG' સ્ટાર્ટ કોડોન છે, જે 'મિથાયોનિન' માટે કોડ કરે છે, અને સ્ટોપ કોડોન (UAA, UAG, UGA) પ્રોટીન સંશ્લેષણને અટકાવે છે.", "ref": "Std 12 - Chapter 6: જૈવ અણુઓ અને જનીન અભિવ્યક્તિ (Molecular Basis of Inheritance)", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન કોડોનની 'વોબલ હાઇપોથેસિસ' વિશે સાચું છે?", "opts": ["કોડોન અને એન્ટીકોડોન વચ્ચેના બંધનમાં પહેલા બે ન્યુક્લિયોટાઇડ્સ સખત બંધન ધરાવે છે.", "કોડોન અને એન્ટીકોડોન વચ્ચેના બંધનમાં ત્રીજા ન્યુક્લિયોટાઇડમાં છૂટછાટ હોય છે.", "કોડોન અને એન્ટીકોડોન વચ્ચેના બંધનમાં તમામ ત્રણ ન્યુક્લિયોટાઇડ્સ સખત બંધન ધરાવે છે.", "કોડોન અને એન્ટીકોડોન વચ્ચેના બંધનમાં ફક્ત પહેલો ન્યુક્લિયોટાઇડ સખત બંધન ધરાવે છે."], "ans": 1, "exp": "વોબલ હાઇપોથેસિસ અનુસાર, કોડોન અને એન્ટીકોડોન વચ્ચેના બંધનમાં ત્રીજા ન્યુક્લિયોટાઇડમાં છૂટછાટ હોય છે, જેના કારણે એક જ એન્ટીકોડોન એકથી વધારે કોડોન સાથે જોડાઈ શકે છે. પહેલા બે ન્યુક્લિયોટાઇડ્સ સખત બંધન ધરાવે છે, પરંતુ ત્રીજા ન્યુક્લિયોટાઇડમાં છૂટછાટ હોવાથી, એક એન્ટીકોડોન વિવિધ કોડોન સાથે જોડાઈ શકે છે.", "ref": "Std 12 - Chapter 6: જૈવ અણુઓ અને જનીન અભિવ્યક્તિ (Molecular Basis of Inheritance)", "ch": ""}, {"q": "જો એક mRNA અણુ પર કોડોન 'UUU' અને 'UUC' બંને એમિનો એસિડ ફેનાઇલઅલેનિન માટે કોડ કરે છે, તો આ કોડોનની કયી વિશેષતા દર્શાવે છે?", "opts": ["કોડોનની અસરકારકતા (Efficiency)", "કોડોનની અતિવ્યાપ્તિ (Overlapping)", "કોડોનની બહુવિધતા (Degeneracy)", "કોડોનની સાર્વત્રિકતા (Universality)"], "ans": 2, "exp": "કોડોનની બહુવિધતા (Degeneracy) એટલે એક જ એમિનો એસિડ માટે એકથી વધારે કોડોન હોવા. 'UUU' અને 'UUC' બંને ફેનાઇલઅલેનિન માટે કોડ કરે છે, જેથી આ બ r Basis of Life)", "ch": ""}, {"q": "જો એક mRNA અણુ પર કોડોન 'AUA' આવે, તો તે કયા એમિનો એસિડ માટે કોડ કરે છે અને તે કયા પ્રકારનો કોડોન છે?", "opts": ["આઇસોલ્યુસિન (Isoleucine), સ્ટાર્ટ કોડોન", "ટાઇરોસિન (Tyrosine), સ્ટોપ કોડોન", "આઇસોલ્યુસિન (Isoleucine), સેન્સ કોડોન", "મેથિયોનિન (Methionine), સ્ટાર્ટ કોડોન"], "ans": 2, "exp": "'AUA' કોડોન આઇસોલ્યુસિન (Isoleucine) એમિનો એસિડ માટે કોડ કરે છે અને તે સેન્સ કોડોન છે. A) ખોટું છે કારણ કે 'AUA' સ્ટાર્ટ કોડોન નથી, B) ખોટું છે કારણ કે 'AUA' ટાઇરોસિન માટે કોડ કરતું નથી અને સ્ટોપ કોડોન પણ નથી, D) ખોટું છે કારણ કે 'AUA' મેથિયોનિન માટે કોડ કરતું નથી અને સ્ટાર્ટ કોડોન પણ નથી.", "ref": "Std 12 - Chapter 6: જૈવિક અણુઓ અને જીવનની ઉત્પત્તિ (Molecular Basis of Life)", "ch": ""}];

  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
