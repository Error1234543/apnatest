<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>જનક કોષ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>જનક કોષ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">જનક કોષ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "જનક કોષમાં કયા પ્રકારના કોષવિભાજન દ્વારા પુત્રી કોષોનું નિર્માણ થાય છે, જેમાં જનીનીય વૈવિધ્ય સર્જાય છે?", "opts": ["સમાનરૂપ કોષવિભાજન (Mitosis)", "અસમાનરૂપ કોષવિભાજન (Meiosis)", "અર્ધીકરણ (Binary Fission)", "બહુકોષીય કોષવિભાજન (Multiple Fission)"], "ans": 1, "exp": "જનક કોષ (Germ Cell)માં અસમાનરૂપ કોષવિભાજન (Meiosis) દ્વારા પુત્રી કોષોનું નિર્માણ થાય છે, જેમાં જનીનીય વૈવિધ્ય સર્જાય છે. સમાનરૂપ કોષવિભાજન (Mitosis) દ્વારા સરખા કોષો ઉત્પન્ન થાય છે, અર્ધીકરણ અને બહુકોષીય કોષવિભાજન એકકોષીય સજીવોમાં જોવા મળે છે.", "ref": "Std 12 - અધ્યાય 1: પ્રજનન", "ch": ""}, {"q": "માનવમાં શુક્રાણુના જનક કોષમાં કયા વર્ણસૂત્રની સંખ્યા હોય છે?", "opts": ["23", "46", "22", "44"], "ans": 1, "exp": "માનવમાં શુક્રાણુના જનક કોષ (Primary Spermatocyte)માં 46 વર્ણસૂત્રો હોય છે, કારણ કે તે દ્વિગુણિત (Diploid) કોષ છે. 23 વર્ણસૂત્રો હપ્લોઇડ (Haploid) કોષમાં જોવા મળે છે, જેમ કે શુક્રાણુ અથવા અંડકોષમાં. 22 અને 44 એ અસંગત સંખ્યાઓ છે.", "ref": "Std 12 - અધ્યાય 3: માનવ પ્રજનન", "ch": ""}, {"q": "જનક કોષમાં કયા અવસ્થામાં DNAનું પ્રતિકૃતીકરણ (Replication) થાય છે?", "opts": ["પ્રોફેઝ (Prophase)", "મેટાફેઝ (Metaphase)", "ઇન્ટરફેઝ (Interphase)", "એનાફેઝ (Anaphase)"], "ans": 2, "exp": "જનક કોષમાં DNAનું પ્રતિકૃતીકરણ ઇન્ટરફેઝ (Interphase) અવસ્થામાં થાય છે, જેમાં કોષ તૈયારી કરે છે. પ્રોફેઝ, મેટાફેઝ, અને એનાફેઝ એ કોષવિભાજનની અલગ અવસ્થાઓ છે, જેમાં DNAનું પ્રતિકૃતીકરણ થતું નથી.", "ref": "Std 12 - અધ્યાય 4: કોષ ચક્ર અને કોષવિભાજન", "ch": ""}, {"q": "માદા જનક કોષ (Oogonium)માં કયા પ્રકારના કોષવિભાજન દ્વારા પ્રાથમિક અંડકોષ (Primary Oocyte)નું નિર્માણ થાય છે?", "opts": ["અસમાનરૂપ કોષવિભાજન-I (Meiosis-I)", "સમાનરૂપ કોષવિભાજન (Mitosis)", "અસમાનરૂપ કોષવિભાજન-II (Meiosis-II)", "અર્ધીકરણ (Binary Fission)"], "ans": 1, "exp": "માદા જનક કોષ (Oogonium)માં સમાનરૂપ કોષવિભાજન (Mitosis) દ્વારા પ્રાથમિક અંડકોષ (Primary Oocyte)નું નિર્માણ થાય છે. અસમાનરૂપ કોષવિભાજન-I અને II અંડકોષના પરિપક્વન દરમિયાન થાય છે, જ્યારે અર્ધીકરણ એકકોષીય સજીવોમાં જોવા મળે છે.", "ref": "Std 12 - અધ્યાય 3: માનવ પ્રજનન", "ch": ""}, {"q": "નર જનક કોષમાં કયા હોર્મોનનું સ્રાવ થવાથી શુક્રાણુના નિર્માણમાં વૃદ્ધિ થાય છે?", "opts": ["ઇન્સ્યુલિન (Insulin)", "ટેસ્ટોસ્ટેરોન (Testosterone)", "એડ્રિનેલિન (Adrenaline)", "થાયરોક્સિન (Thyroxine)"], "ans": 1, "exp": "નર જનક કોષમાં ટેસ્ટોસ્ટેરોન (Testosterone) હોર્મોનનું સ્રાવ થવાથી શુક્રાણુના નિર્માણમાં વૃદ્ધિ થાય છે. ઇન્સ્યુલિન, એડ્રિનેલિન, અને થાયરોક્સિન એ અલગ અલગ શારીરિક પ્રક્રિયાઓમાં ભાગ લે છે, પરંતુ શુક્રાણુના નિર્માણ સાથે સીધો સંબંધ ધરાવતા નથી.", "ref": "Std 12 - અધ્યાય 3: માનવ પ્રજનન", "ch": ""}, {"q": "જનક કોષોમાં કયા પ્રકારના કોષવિભાજન દરમિયાન ક્રોસિંગ ઓવર (Crossing Over) થાય છે, જે અનુવંશિકતામાં વિવિધતા લાવે છે?", "opts": ["સમસૂત્રી કોષવિભાજન (Mitosis)", "અર્ધસૂત્રી કોષવિભાજન-I (Meiosis-I)", "અર્ધસૂત્રી કોષવિભાજન-II (Meiosis-II)", "અમીટોસિસ (Amitosis)"], "ans": 1, "exp": "ક્રોસિંગ ઓવર અર્ધસૂત્રી કોષવિભાજન-I (Meiosis-I)ની પ્રોફેઝ-૧ અવસ્થામાં થાય છે, જ્યારે સમજાત વર્ણસૂત્રો જોડાયેલા હોય છે. સમસૂત્રી કોષવિભાજનમાં ક્રોસિંગ ઓવર થતું નથી, અર્ધસૂત્રી કોષવિભાજન-IIમાં ક્રોસિંગ ઓવર થતું નથી કારણ કે તે સમજાત વર્ણસૂત્રોના વિભાજનની પ્રક્રિયા છે, અને અમીટોસિસમાં કોષકેન્દ્રનું વિભાજન થતું નથી. અર્ધસૂત્રી કોષવિભાજન-I એ જનક કોષોમાં વિવિધતા લાવવા માટે મહત્વપૂર્ણ છે.", "ref": "Std 12 - અધ્યાય 1: પ્રજનનમાં સંકલિત પ્રક્રિયાઓ", "ch": ""}, {"q": "માનવમાં શુક્રાણુના જનક કોષ (Spermatogonium)માં કયા અવસ્થામાં કોષકેન્દ્રનું કદ વધે છે અને DNAનું પ્રમાણ દુગણું થાય છે?", "opts": ["G1 અવસ્થા", "S અવસ્થા", "G2 અવસ્થા", "M અવસ્થા"], "ans": 1, "exp": "S અવસ્થા (Synthesis Phase)માં DNAનું પ્રતિકૃતીકરણ થાય છે, જેમાં DNAનું પ્રમાણ દુગણું થાય છે. G1 અવસ્થામાં કોષનું કદ વધે છે પરંતુ DNAનું પ્રમાણ સ્થિર રહે છે. G2 અવસ્થામાં કોષ પ્રોટીન અને અન્ય જરૂરી પદાર્થોનું સંશ્લેષણ કરે છે, પરંતુ DNAનું પ્રમાણ બદલાતું નથી. M અવસ્થામાં કોષવિભાજન થાય છે, પરંતુ DNAનું પ્રમાણ પહેલેથી જ દુગણું હોય છે.", "ref": "Std 12 - અધ્યાય 1: પ્રજનનમાં સંકલિત પ્રક્રિયાઓ", "ch": ""}, {"q": "માદા જનક કોષ (Oogonium)માં કયા હોર્મોનનું સ્રાવ થવાથી પ્રાથમિક અંડકોષ (Primary Oocyte)નું નિર્માણ થાય છે?", "opts": ["ફોલિકલ સ્ટિમ્યુલેટિંગ હોર્મોન (FSH)", "લ્યુટિનાઇઝિંગ હોર્મોન (LH)", "ઇસ્ટ્રોજન", "પ્રોજેસ્ટેરોન"], "ans": 0, "exp": "ફોલિકલ સ્ટિમ્યુલેટિંગ હોર્મોન (FSH) માદા જનક કોષના વિકાસને પ્રેરે છે અને પ્રાથમિક અંડકોષના નિર્માણમાં મદદ કરે છે. લ્યુટિનાઇઝિંગ હોર્મોન (LH) અંડપિંડમાં ઓવ્યુલેશનને પ્રેરે છે. ઇસ્ટ્રોજન અને પ્રોજેસ્ટેરોન અંડાશયના વિકાસ અને ગર્ભાશયની તૈયારીમાં મદદ કરે છે, પરંતુ પ્રાથમિક અંડકોષના નિર્માણમાં નહીં.", "ref": "Std 12 - અધ્યાય 3: માનવ પ્રજનન", "ch": ""}, {"q": "જનક કોષોમાં કયા પ્રકારના કોષવિભાજન દરમિયાન સિસ્ટર ક્રોમેટિડ્સ અલગ થાય છે?", "opts": ["સમસૂત્રી કોષવિભાજન (Mitosis)", "અર્ધસૂત્રી કોષવિભાજન-I (Meiosis-I)", "અર્ધસૂત્રી કોષવિભાજન-II (Meiosis-II)", "અમીટોસિસ (Amitosis)"], "ans": 2, "exp": "અર્ધસૂત્રી કોષવિભાજન-II (Meiosis-II) દરમિયાન સિસ્ટર ક્રોમેટિડ્સ અલગ થાય છે, જ્યારે સમસૂત્રી કોષવિભાજનમાં સિસ્ટર ક્રોમેટિડ્સ અલગ થાય છે પરંતુ તે જનક કોષોમાં નહીં. અર્ધસૂત્રી કોષવિભાજન-Iમાં સમજાત વર્ણસૂત્રો અલગ થાય છે, અને અમીટોસિસમાં કોષકેન્દ્રનું વિભાજન થતું નથી.", "ref": "Std 12 - અધ્યાય 1: પ્રજનનમાં સંકલિત પ્રક્રિયાઓ", "ch": ""}, {"q": "માનવમાં શુક્રાણુના જનક કોષમાં કયા અવસ્થામાં કોષનું કદ વધે છે અને પ્રોટીનનું સંશ્લેષણ થાય છે?", "opts": ["G1 અવસ્થા", "S અવસ્થા", "G2 અવસ્થા", "M અવસ્થા"], "ans": 2, "exp": "G2 અવસ્થામાં કોષનું કદ વધે છે અને પ્રોટીનનું સંશ્લેષણ થાય છે, જે કોષવિભાજન માટે તૈયારી કરે છે. G1 અવસ્થામાં કોષનું કદ વધે છે પરંતુ પ્રોટીનનું સંશ્લેષણ મર્યાદિત હોય છે. S અવસ્થામાં DNAનું પ્રતિકૃતીકરણ થાય છે. M અવસ્થામાં કોષવિભાજન થાય છે.", "ref": "Std 12 - અધ્યાય 1: પ્રજનનમાં સંકલિત પ્રક્રિયાઓ", "ch": ""}, {"q": "માદા જનક કોષ (Oogonium)માં કયા કોષવિભાજન દરમિયાન સેકન્ડરી અંડકોષ (Secondary Oocyte) અને પ્રથમ ધ્રુવીય કોષ (First Polar Body)નું નિર્માણ થાય છે?", "opts": ["સમસૂત્રી કોષવિભાજન (Mitosis)", "અર્ધસૂત્રી કોષવિભાજન I (Meiosis I)", "અર્ધસૂત્રી કોષવિભાજન II (Meiosis II)", "અમિતોસિસ (Amitosis)"], "ans": 1, "exp": "અર્ધસૂત્રી કોષવિભાજન I (Meiosis I) દરમિયાન માદા જનક કોષ (Oogonium)માં પ્રાથમિક અંડકોષ (Primary Oocyte) વહેંચાઈને સેકન્ડરી અંડકોષ (Secondary Oocyte) અને પ્રથમ ધ્રુવીય કોષ (First Polar Body)નું નિર્માણ થાય છે. સમસૂત્રી કોષવિભાજન (Mitosis) અને અમિતોસિસ (Amitosis) આ પ્રક્રિયામાં સામેલ નથી. અર્ધસૂત્રી કોષવિભાજન II (Meiosis II)માં સેકન્ડરી અંડકોષ વહેંચાઈને અંડકોષ (Ovum) અને બીજો ધ્રુવીય કોષ બનાવે છે.", "ref": "Std 12 - અધ્યાય 1: પ્રજનનમાં જનક કોષોની ભૂમિકા", "ch": ""}, {"q": "શુક્રાણુના જનક કોષ (Spermatogonium)માં કયા હોર્મોનની ઉણપથી શુક્રાણુના નિર્માણમાં અડચણ ઉત્પન્ન થાય છે?", "opts": ["ટેસ્ટોસ્ટેરોન (Testosterone)", "ઇન્સ્યુલિન (Insulin)", "એડ્રિનેલિન (Adrenaline)", "થાયરોક્સિન (Thyroxine)"], "ans": 0, "exp": "ટેસ્ટોસ્ટેરોન (Testosterone) હોર્મોનની ઉણપથી શુક્રાણુના નિર્માણમાં અડચણ ઉત્પન્ન થાય છે. ઇન્સ્યુલિન (Insulin), એડ્રિનેલિન (Adrenaline), અને થાયરોક્સિન (Thyroxine) શુક્રાણુના નિર્માણ સાથે સીધો સંબંધ ધરાવતા નથી.", "ref": "Std 12 - અધ્યાય 1: પ્રજનનમાં હોર્મોનની ભૂમિકા", "ch": ""}, {"q": "માદા જનક કોષ (Oogonium)માં કયા કોષવિભાજન દરમિયાન ક્રોસિંગ ઓવર (Crossing Over) થાય છે, જેમાં જનીની વૈવિધ્યતા (Genetic Diversity) વૃદ્ધિ પામે છે?", "opts": ["સમસૂત્રી કોષવિભાજન (Mitosis)", "અર્ધસૂત્રી કોષવિભાજન I (Meiosis I)", "અર્ધસૂત્રી કોષવિભાજન II (Meiosis II)", "અમિતોસિસ (Amitosis)"], "ans": 1, "exp": "અર્ધસૂત્રી કોષવિભાજન I (Meiosis I) દરમિયાન ક્રોસિંગ ઓવર (Crossing Over) થાય છે, જેમાં જનીની વૈવિધ્યતા (Genetic Diversity) વૃદ્ધિ પામે છે. સમસૂત્રી કોષવિભાજન (Mitosis) અને અમિતોસિસ (Amitosis)માં ક્રોસિંગ ઓવર થતું નથી. અર્ધસૂત્રી કોષવિભાજન II (Meiosis II)માં સિસ્ટર ક્રોમેટિડ્સ અલગ થાય છે, પરંતુ ક્રોસિંગ ઓવર થતું નથી.", "ref": "Std 12 - અધ્યાય 1: પ્રજનનમાં જનક કોષોની ભૂમિકા", "ch": ""}, {"q": "માનવમાં શુક્રાણુના જનક કોષ (Spermatogonium)માં કયા કોષવિભાજન દરમિયાન સાયટોકાઇનેસિસ (Cytokinesis) અસમાન રીતે થાય છે, જેથી એક મોટો કોષ અને એક નાનો કોષ બને છે?", "opts": ["સમાનવિભાજન (Mitosis)", "અર્ધીકરણ I (Meiosis I)", "અર્ધીકરણ II (Meiosis II)", "એમિઓટિક વિભાજન (Amitotic division)"], "ans": 2, "exp": "સાયટોકાઇનેસિસ અસમાન રીતે થવાનું કારણ અર્ધીકરણ II (Meiosis II) દરમિયાન થાય છે, જેમાં સેકન્ડરી શુક્રાણુકોષ (Secondary Spermatocyte) વિભાજિત થઈને બે સરખા શુક્રાણુકોષો (Spermatids) બને છે, પરંતુ પ્રશ્નમાં ઉલ્લેખિત પરિસ્થિતિ અર્ધીકરણ I (Meiosis I) દરમિયાન થતી નથી. અર્ધીકરણ I દરમિયાન કોષવિભાજન સમાન રીતે થાય છે, જ્યારે અર્ધીકરણ II દરમિયાન સાયટોકાઇનેસિસ અસમાન રીતે થઈ શકે છે. સમાનવિભાજન અને એમિઓટિક વિભાજનમાં આ પ્રક્રિયા થતી નથી.", "ref": "Std 12 - Chapter 3: માનવ પ્રજનન (Human Reproduction)", "ch": ""}, {"q": "માદા જનક કોષ (Oogonium)માં કયા કોષવિભાજન દરમિયાન પ્રથમ ધ્રુવીય કણ (First Polar Body)નું નિર્માણ થાય છે?", "opts": ["સમાનવિભાજન (Mitosis)", "અર્ધીકરણ I (Meiosis I)", "અર્ધીકરણ II (Meiosis II)", "એમિઓટિક વિભાજન (Amitotic division)"], "ans": 1, "exp": "પ્રથમ ધ્રુવીય કણ (First Polar Body)નું નિર્માણ અર્ધીકરણ I (Meiosis I) દરમિયાન થાય છે, જેમાં પ્રાથમિક અંડકોષ (Primary Oocyte) વિભાજિત થઈને સેકન્ડરી અંડકોષ (Secondary Oocyte) અને પ્રથમ ધ્રુવીય કણ બને છે. સમાનવિભાજન અને એમિઓટિક વિભાજનમાં આ પ્રક્રિયા થતી નથી, જ્યારે અર્ધીકરણ II દરમિયાન દ્વિતીય ધ્રુવીય કણ (Second Polar Body)નું નિર્માણ થાય છે.", "ref": "Std 12 - Chapter 3: માનવ પ્રજનન (Human Reproduction)", "ch": ""}, {"q": "શુક્રાણુના જનક કોષ (Spermatogonium)માં કયા હોર્મોનની અસર હેઠળ શુક્રાણુના નિર્માણ દરમિયાન સર્ટોલી કોષો (Sertoli Cells) દ્વારા પોષણ પૂરું પાડવામાં આવે છે?", "opts": ["ટેસ્ટોસ્ટેરોન", "FSH (ફોલિકલ સ્ટિમ્યુલેટિંગ હોર્મોન)", "LH (લ્યુટિનાઇઝિંગ હોર્મોન)", "પ્રોલેક્ટિન"], "ans": 1, "exp": "FSH (ફોલિકલ સ્ટિમ્યુલેટિંગ હોર્મોન) સર્ટોલી કોષોને પ્રેરે છે જે શુક્રાણુના વિકાસ માટે પોષણ પૂરું પાડે છે. ટેસ્ટોસ્ટેરોન શુક્રાણુના નિર્માણ માટે જરૂરી છે પરંતુ સર્ટોલી કોષોને પ્રેરતું નથી. LH લેયડિગ કોષોને પ્રેરે છે, અને પ્રોલેક્ટિન સ્તનપાન સાથે સંબંધિત છે.", "ref": "Std 12 - અધ્યાય 1: પ્રજનનમાં સમાવિષ્ટ પાસાં", "ch": ""}, {"q": "શુક્રાણુના જનક કોષ (Spermatogonium)માં કયા કોષવિભાજન દરમિયાન સાયટોકાઇનેસિસ (Cytokinesis) અસમાન રીતે થાય છે, જેથી એક મોટો કોષ અને એક નાનો કોષ બને છે?", "opts": ["મિયોસિસ-I", "મિયોસિસ-II", "મિટોસિસ", "એમિટોસિસ"], "ans": 0, "exp": "શુક્રાણુના જનક કોષમાં મિયોસિસ-I દરમિયાન સાયટોકાઇનેસિસ અસમાન રીતે થાય છે, જેથી એક મોટો સેકન્ડરી શુક્રાણુ કોષ અને એક નાનો કોષ (પ્રથમ ધ્રુવીય કણ) બને છે. મિયોસિસ-IIમાં સાયટોકાઇનેસિસ સમાન રીતે થાય છે, અને મિટોસિસ અને એમિટોસિસ અહીં લાગુ પડતી નથી.", "ref": "Std 12 - અધ્યાય 1: પ્રજનનમાં સમાવિષ્ટ પાસાં", "ch": ""}, {"q": "માનવમાં શુક્રાણુના જનક કોષ (સ્પર્મેટોગોનિયમ)માં નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["સ્પર્મેટોગોનિયમમાં 46 વર્ણસૂત્રો હોય છે, જેમાંથી 44 સ્વયંલિંગી અને 2 લિંગી વર્ણસૂત્રો હોય છે.", "પ્રાથમિક શુક્રકોષ (પ્રાઇમરી સ્પર્મેટોસાઇટ)માં DNAનું પ્રતિકૃતીકરણ થયા બાદ વર્ણસૂત્રોની સંખ્યા 46 જ રહે છે, પરંતુ DNAનું પ્રમાણ બમણું થાય છે.", "દ્વિતીયક શુક્રકોષ (સેકન્ડરી સ્પર્મેટોસાઇટ)માં 23 વર્ણસૂત્રો હોય છે, જે દરેક બેવડા (ડિપ્લોઇડ) સ્વરૂપે હોય છે.", "શુક્રાણુ (સ્પર્મેટિડ)માં 23 વર્ણસૂત્રો હોય છે, જે એકકીય (હેપ્લોઇડ) સ્વરૂપે હોય છે."], "ans": 2, "exp": "સ્પર્મેટોગોનિયમમાં 46 વર્ણસૂત્રો હોય છે, જે ડિપ્લોઇડ હોય છે. પ્રાથમિક શુક્રકોષમાં DNAનું પ્રતિકૃતીકરણ થયા બાદ વર્ણસૂત્રોની સંખ્યા 46 જ રહે છે, પરંતુ DNAનું પ્રમાણ બમણું થાય છે, જે સાચું છે. દ્વિતીયક શુક્રકોષમાં 23 વર્ણસૂત્રો હોય છે, પરંતુ તે હેપ્લોઇડ હોય છે, બેવડા (ડિપ્લોઇડ) નહીં. આથી વિકલ્પ C ખોટું છે. શુક્રાણુમાં 23 વર્ણસૂત્રો હોય છે, જે હેપ્લોઇડ હોય છે, જે સાચું છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયો કોષ જનક કોષ તરીકે કાર્ય કરતો નથી?", "opts": ["સ્પર્મેટોગોનિયમ (શુક્રાણુનો જનક કોષ)", "ઓઓગોનિયમ (અંડકોષનો જનક કોષ)", "મેરિસ્ટેમેટિક કોષ (વનસ્પતિમાં વૃદ્ધિ માટે જવાબદાર કોષ)", "એરિથ્રોબ્લાસ્ટ (લાલ રક્તકણોનો પૂર્વગામી કોષ)"], "ans": 3, "exp": "સ્પર્મેટોગોનિયમ અને ઓઓગોનિયમ પ્રજનન કોષોના જનક કોષો છે. મેરિસ્ટેમેટિક કોષ વનસ્પતિમાં વૃદ્ધિ માટે જવાબદાર છે અને તે પણ જનક કોષ તરીકે કાર્ય કરે છે. એરિથ્રોબ્લાસ્ટ લાલ રક્તકણોના નિર્માણમાં ભાગ લે છે, પરંતુ તેને જનક કોષ તરીકે ગણવામાં આવતો નથી, કારણ કે તે પ્રજનન કોષોનું નિર્માણ કરતો નથી.", "ref": "Std 11 - પ્રકરણ 6: કોષ: જીવનનો એકમ, Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "માનવમાં શુક્રાણુના જનક કોષ (સ્પર્મેટોગોનિયમ)ના સંદર્ભમાં નીચેના વિધાનો ધ્યાનમાં લો:\n1. સ્પર્મેટોગોનિયમમાં માઇટોકોન્ડ્રિયાની સંખ્યા વધુ હોય છે, કારણ કે તેને શુક્રાણુના નિર્માણ માટે વધુ ઊર્જાની જરૂર હોય છે.\n2. સ્પર્મેટોગોનિયમમાં સેન્ટ્રીઓલ્સ હાજર હોય છે, જે શુક્રાણુના ફ્લેજેલમના નિર્માણમાં મદદ કરે છે.\n3. સ્પર્મેટોગોનિયમમાં ગોલ્ગી કાય હાજર નથી હોતી, કારણ કે શુક્રાણુમાં એક્રોસોમનું નિર્માણ પાછળથી થાય છે.\nઉપરોક્ત વિધાનોમાંથી કયું/કયા વિધાન/વિધાનો સાચું/સાચાં છે?", "opts": ["માત્ર 1 અને 2", "માત્ર 2", "માત્ર 2 અને 3", "1, 2 અને 3"], "ans": 1, "exp": "સ્પર્મેટોગોનિયમમાં માઇટોકોન્ડ્રિયાની સંખ્યા વધુ હોય છે, કારણ કે શુક્રાણુના નિર્માણ માટે વધુ ઊર્જાની જરૂર હોય છે, જે સાચું છે. સ્પર્મેટોગોનિયમમાં સેન્ટ્રીઓલ્સ હાજર હોય છે, જે શુક્રાણુના ફ્લેજેલમના નિર્માણમાં મદદ કરે છે, જે પણ સાચું છે. પરંતુ સ્પર્મેટોગોનિયમમાં ગોલ્ગી કાય હાજર હોય છે, જે પાછળથી એક્રોસોમના નિર્માણમાં ભાગ લે છે, તેથી વિધાન 3 ખોટું છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
