<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>રોગપ્રતિકારક શક્તિ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>રોગપ્રતિકારક શક્તિ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">રોગપ્રતિકારક શક્તિ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "જ્યારે એન્ટીજન પ્રથમ વખત શરીરમાં પ્રવેશે છે ત્યારે બનતાં એન્ટીબોડીના પ્રકાર અને તેની પ્રતિક્રિયા વેગ અંગે નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["પ્રાથમિક પ્રતિક્રિયામાં IgM એન્ટીબોડી બને છે અને તેની સાંદ્રતા ધીમે ધીમે વધે છે.", "પ્રાથમિક પ્રતિક્રિયામાં IgG એન્ટીબોડી તરત જ ઉચ્ચ સાંદ્રતામાં બને છે.", "પ્રાથમિક પ્રતિક્રિયામાં IgA એન્ટીબોડી બને છે અને તે તરત જ મહત્તમ સ્તરે પહોંચે છે.", "પ્રાથમિક પ્રતિક્રિયામાં કોઈ એન્ટીબોડી બનતી નથી, ફક્ત મેમરી કોષ જ બને છે."], "ans": 0, "exp": "પ્રાથમિક પ્રતિક્રિયામાં, શરીર પ્રથમ વખત એન્ટીજનનો સામનો કરે છે ત્યારે IgM એન્ટીબોડી બને છે અને તેની સાંદ્રતા ધીમે ધીમે વધે છે. IgG એન્ટીબોડી દ્વિતીય પ્રતિક્રિયામાં જ ઉચ્ચ સાંદ્રતામાં બને છે. IgA એન્ટીબોડી મુખ્યત્વે શ્લેષ્મલ પડમાં કામ કરે છે અને પ્રાથમિક પ્રતિક્રિયામાં તરત જ મહત્તમ સ્તરે પહોંચતી નથી. મેમરી કોષ તો બને છે, પરંતુ એન્ટીબોડી પણ બને છે.", "ref": "Std 12 - પ્રકરણ 8: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}, {"q": "નીચેનામાંથી કયું કોષીય મધ્યસ્થી પ્રતિક્રિયાનું ઉદાહરણ નથી?", "opts": ["મેક્રોફેજ દ્વારા બેક્ટેરિયાનું ભક્ષણ", "T-કોષ દ્વારા સાયટોકાઇનનું સ્રાવ", "B-કોષ દ્વારા એન્ટીબોડીનું ઉત્પાદન", "નેચરલ કિલર કોષ દ્વારા કર્કરોગી કોષનું નાશ"], "ans": 2, "exp": "B-કોષ દ્વારા એન્ટીબોડીનું ઉત્પાદન એ કોષીય મધ્યસ્થી પ્રતિક્રિયા નથી, પરંતુ હ્યુમોરલ મધ્યસ્થી પ્રતિક્રિયાનો ભાગ છે. મેક્રોફેજ દ્વારા ભક્ષણ, T-કોષ દ્વારા સાયટોકાઇનનું સ્રાવ અને નેચરલ કિલર કોષ દ્વારા કર્કરોગી કોષનું નાશ એ બધું કોષીય મધ્યસ્થી પ્રતિક્રિયાનાં ઉદાહરણો છે.", "ref": "Std 12 - પ્રકરણ 8: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}, {"q": "એક વ્યક્તિએ HIV સંક્રમણ થયું છે. નીચેનામાંથી કયું વિધાન તેના અંગત પ્રતિકારક તંત્ર અંગે સત્ય નથી?", "opts": ["CD4+ T-કોષની સંખ્યા ઘટે છે.", "મેમરી B-કોષની સંખ્યા વધે છે.", "એડ્સના અંતિમ તબક્કામાં ઓપર્ચ્યુનિસ્ટિક ઇન્ફેક્શન થાય છે.", "HIV વાયરસ CD4+ T-કોષને સીધું જ અસર કરે છે."], "ans": 1, "exp": "HIV સંક્રમણમાં CD4+ T-કોષની સંખ્યા ઘટે છે, જેના કારણે પ્રતિકારક તંત્ર નબળું પડે છે. એડ્સના અંતિમ તબક્કામાં ઓપર્ચ્યુનિસ્ટિક ઇન્ફેક્શન થાય છે અને HIV વાયરસ CD4+ T-કોષને સીધું જ અસર કરે છે. પરંતુ મેમરી B-કોષની સંખ્યા વધતી નથી, ઉલટે પ્રતિકારક તંત્ર નબળું પડવાથી તેની સંખ્યામાં ઘટાડો થાય છે.", "ref": "Std 12 - પ્રકરણ 8: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}, {"q": "નીચેનામાંથી કયું જોડકું યોગ્ય રીતે જોડાયેલું નથી?", "opts": ["ઇન્ટરફેરોન - વાયરસ વિરોધી પ્રોટીન", "ઇમ્યુનોગ્લોબ્યુલિન - એન્ટીબોડી", "હિસ્ટામિન - પ્રતિકારક કોષોની સક્રિયતા વધારે છે", "લાઇસોઝાઇમ - બેક્ટેરિયાના કોષભિત્તકનું વિઘટન કરે છે"], "ans": 2, "exp": "હિસ્ટામિન એ પ્રતિકારક કોષોની સક્રિયતા વધારતું નથી, પરંતુ એલર્જી પ્રતિક્રિયામાં ભાગ લે છે અને રક્તવાહિનીઓને ફેલાવે છે. ઇન્ટરફેરોન વાયરસ વિરોધી પ્રોટીન છે, ઇમ્યુનોગ્લોબ્યુલિન એન્ટીબોડી છે અને લાઇસોઝાઇમ બેક્ટેરિયાના કોષભિત્તકનું વિઘટન કરે છે.", "ref": "Std 12 - પ્રકરણ 8: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}, {"q": "એક વ્યક્તિએ પહેલા જીવંત, નબળા પડેલા પોલિયો વાયરસનો ડોઝ લીધો છે. હવે જ્યારે તેને વાઇલ્ડ પોલિયો વાયરસનો સામનો કરવો પડે છે, ત્યારે તેની પ્રતિક્રિયા અંગે નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["પ્રાથમિક પ્રતિક્રિયા થશે અને IgM એન્ટીબોડી બનશે.", "દ્વિતીય પ્રતિક્રિયા થશે અને IgG એન્ટીબોડી બનશે.", "કોઈ પ્રતિક્રિયા થશે નહીં કારણ કે વાયરસ નબળો પડેલો હતો.", "ફક્ત કોષીય મધ્યસ્થી પ્રતિક્રિયા જ થશે, હ્યુમોરલ પ્રતિક્રિયા થશે નહીં."], "ans": 1, "exp": "પહેલા જીવંત, નબળા પડેલા પોલિયો વાયરસનો ડોઝ લીધા પછી, શરીરમાં મેમરી કોષ બન્યા હશે. જ્યારે વાઇલ્ડ પોલિયો વાયરસનો સામનો કરવો પડે છે, ત્યારે દ્વિતીય પ્રતિક્રિયા થશે અને IgG એન્ટીબોડી બનશે. પ્રાથમિક પ્રતિક્રિયા ફક્ત પ્રથમ વખત એન્ટીજનનો સામનો થાય ત્યારે જ થાય છે. કોષીય મધ્યસ્થી પ્રતિક્રિયા સાથે હ્યુમોરલ પ્રતિક્રિયા પણ થાય છે.", "ref": "Std 12 - પ્રકરણ 8: મનુષ્યમાં રોગપ્રતિકારકતા", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઇન્ટરફેરોન વિશે ખોટું છે?", "opts": ["તે વાયરલ સંક્રમણ વખતે સ્રાવાય છે અને આસપાસના કોષોને સંરક્ષણ આપે છે.", "તે એન્ટીબોડીની જેમ એન્ટીજન સાથે જોડાઈને તેને નિષ્ક્રિય કરે છે.", "તે કોષીય પ્રતિકારકતામાં મહત્વની ભૂમિકા ભજવે છે.", "તે વાયરસના પ્રસરણને અટકાવવામાં મદદરૂપ થાય છે."], "ans": 1, "exp": "ઇન્ટરફેરોન એ સાયટોકાઇન છે જે વાયરલ સંક્રમણ વખતે સ્રાવાય છે અને આસપાસના કોષોને સંરક્ષણ આપે છે (A યોગ્ય). તે કોષીય પ્રતિકારકતામાં મહત્વની ભૂમિકા ભજવે છે (C યોગ્ય) અને વાયરસના પ્રસરણને અટકાવવામાં મદદરૂપ થાય છે (D યોગ્ય). પરંતુ તે એન્ટીબોડીની જેમ એન્ટીજન સાથે જોડાઈને તેને નિષ્ક્રિય કરતું નથી (B ખોટું).", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એક વ્યક્તિએ ઓટોઇમ્યુન રોગ ધરાવે છે. નીચેનામાંથી કયું વિધાન આ સ્થિતિ માટે સૌથી યોગ્ય રીતે લાગુ પડે છે?", "opts": ["શરીરમાં એન્ટીજનની અછત હોવાથી પ્રતિકારક તંત્ર નબળું પડે છે.", "પ્રતિકારક તંત્ર શરીરના પોતાના કોષો અને પેશીઓ પર હુમલો કરે છે.", "એન્ટીબોડીની ઉત્પત્તિ થતી નથી, પરિણામે સંક્રમણ સામે લડવાની ક્ષમતા ઘટે છે.", "T-કોષોની સંખ્યા અતિશય વધી જવાથી કોષીય પ્રતિકારકતા વધે છે."], "ans": 1, "exp": "ઓટોઇમ્યુન રોગમાં પ્રતિકારક તંત્ર શરીરના પોતાના કોષો અને પેશીઓ પર હુમલો કરે છે (B યોગ્ય). એન્ટીજનની અછત (A) અથવા એન્ટીબોડીની ઉત્પત્તિ ન થવી (C) એ ઓટોઇમ્યુન રોગનું કારણ નથી. T-કોષોની સંખ્યા વધવી (D) એ ઓટોઇમ્યુન રોગનું લક્ષણ નથી, પરંતુ તે અન્ય સ્થિતિઓમાં જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેનામાંથી કયું જોડકું પ્રતિકારક તંત્રના કોષ અને તેની ભૂમિકા વિશે યોગ્ય રીતે જોડાયેલું નથી?", "opts": ["B-કોષો - એન્ટીબોડીનું ઉત્પાદન", "T-હેલ્પર કોષો - સાયટોકાઇનનું સ્રાવણ અને B-કોષોને ઉત્તેજિત કરવા", "મેક્રોફેજ - એન્ટીજન પ્રસ્તુત કરનાર કોષ (APC) તરીકે કામ કરવું", "ન્યુટ્રોફિલ - એન્ટીબોડીનું ઉત્પાદન અને સાયટોટોક્સિક ટી-કોષોને ઉત્તેજિત કરવા"], "ans": 3, "exp": "B-કોષો એન્ટીબોડીનું ઉત્પાદન કરે છે (A યોગ્ય). T-હેલ્પર કોષો સાયટોકાઇનનું સ્રાવણ કરે છે અને B-કોષોને ઉત્તેજિત કરે છે (B યોગ્ય). મેક્રોફેજ એન્ટીજન પ્રસ્તુત કરનાર કોષ (APC) તરીકે કામ કરે છે (C યોગ્ય). ન્યુટ્રોફિલ એ ફેગોસાઇટોસિસ દ્વારા રોગજનકોને નષ્ટ કરે છે, એન્ટીબોડીનું ઉત્પાદન કરતું નથી અથવા સાયટોટોક્સિક ટી-કોષોને ઉત્તેજિત કરતું નથી (D ખોટું).", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એક વ્યક્તિએ પ્રથમ વખત કોઈ એન્ટીજન સાથે સંપર્કમાં આવે છે. નીચેનામાંથી કયું વિધાન પ્રાથમિક પ્રતિકારક પ્રતિક્રિયા વિશે ખોટું છે?", "opts": ["પ્રાથમિક પ્રતિક્રિયામાં IgM એન્ટીબોડી પહેલા ઉત્પન્ન થાય છે.", "પ્રાથમિક પ્રતિક્રિયા દરમિયાન મેમરી B-કોષો બને છે.", "પ્રાથમિક પ્રતિક્રિયા દરમિયાન એન્ટીબોડીનું સ્તર તરત જ ઉચ્ચ સ્તરે પહોંચે છે.", "પ્રાથમિક પ્રતિક્રિયા દરમિયાન T-કોષો અને B-કોષો વચ્ચે સહયોગ થાય છે."], "ans": 2, "exp": "પ્રાથમિક પ્રતિક્રિયામાં IgM એન્ટીબોડી પહેલા ઉત્પન્ન થાય છે (A યોગ્ય). મેમરી B-કોષો બને છે (B યોગ્ય) અને T-કોષો અને B-કોષો વચ્ચે સહયોગ થાય છે (D યોગ્ય). પરંતુ પ્રાથમિક પ્રતિક્રિયા દરમિયાન એન્ટીબોડીનું સ્તર તરત જ ઉચ્ચ સ્તરે પહોંચતું નથી, પરંતુ ધીમે ધીમે વધે છે (C ખોટું).", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન કોષીય મધ્યસ્થી પ્રતિકારકતા (Cell-Mediated Immunity) વિશે સત્ય નથી?", "opts": ["તે મુખ્યત્વે T-કોષો દ્વારા હાથ ધરવામાં આવે છે.", "તે વાયરસથી સંક્રમિત કોષો, કૅન્સર કોષો અને ટ્રાન્સપ્લાન્ટેડ અંગોને નષ્ટ કરવામાં મદદરૂપ થાય છે.", "તે એન્ટીબોડીના ઉત્પાદન દ્વારા કામ કરે છે.", "તે ટ્યુબરક્યુલોસિસ અને લેપ્રોસી જેવા રોગો સામે રક્ષણ આપે છે."], "ans": 2, "exp": "કોષીય મધ્યસ્થી પ્રતિકારકતા મુખ્યત્વે T-કોષો દ્વારા હાથ ધરવામાં આવે છે (A યોગ્ય). તે વાયરસથી સંક્રમિત કોષો, કૅન્સર કોષો અને ટ્રાન્સપ્લાન્ટેડ અંગોને નષ્ટ કરવામાં મદદરૂપ થાય છે (B યોગ્ય) અને ટ્યુબરક્યુલોસિસ અને લેપ્રોસી જેવા રોગો સામે રક્ષણ આપે છે (D યોગ્ય). પરંતુ તે એન્ટીબોડીના ઉત્પાદન દ્વારા કામ કરતી નથી (C ખોટું), એન્ટીબોડી મધ્યસ્થી પ્રતિકારકતાનું લક્ષણ છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ટી-લિમ્ફોસાઇટ્સની ભૂમિકા વિશે સત્ય નથી?", "opts": ["સહાયક ટી-કોષ (Helper T-cells) B-કોષોને એન્ટીબોડી ઉત્પન્ન કરવા માટે પ્રેરિત કરે છે.", "સાયટોટોક્સિક ટી-કોષ (Cytotoxic T-cells) એન્ટીજન ધરાવતા કોષોને નષ્ટ કરે છે.", "ટી-કોષો એન્ટીજનને સીધા જ ઓળખી શકે છે અને એન્ટીબોડી ઉત્પન્ન કરે છે.", "મેમરી ટી-કોષો ભવિષ્યમાં એન્ટીજન સાથે ઝડપથી પ્રતિક્રિયા આપવા માટે ટકી રહે છે."], "ans": 2, "exp": "ટી-કોષો એન્ટીજનને સીધા જ ઓળખી શકતા નથી, પરંતુ એન્ટીજન પ્રસ્તુત કરનારા કોષો (APCs) દ્વારા પ્રસ્તુત થયેલ એન્ટીજનને ઓળખે છે. એન્ટીબોડી ઉત્પન્ન કરવાની ક્ષમતા B-કોષોની છે, ટી-કોષોની નહીં. A, B, અને D વિધાનો ટી-કોષોની ભૂમિકા વિશે સત્ય છે.", "ref": "Std 12 - Chapter 10: રોગપ્રતિકારક શક્તિ", "ch": ""}, {"q": "એક વ્યક્તિમાં ઓટોઇમ્યુન રોગ જોવા મળે છે. નીચેનામાંથી કયું જોડકું આ રોગની સ્થિતિ સાથે સુસંગત નથી?", "opts": ["રૂમેટોઇડ આર્થરાઇટિસ - સાંધાઓની સોજો", "ટાઇપ 1 ડાયાબિટીસ - ઇન્સ્યુલિન ઉત્પાદક કોષો પર હુમલો", "મલ્ટિપલ સ્ક્લેરોસિસ - મજ્જાતંતુ પર હુમલો", "હેમોફિલિયા - રક્ત ગંઠાવવાની પ્રક્રિયા પર અસર"], "ans": 3, "exp": "હેમોફિલિયા ઓટોઇમ્યુન રોગ નથી, પરંતુ અનુવંશિક રક્ત ગંઠાવવાની ખામી છે. રૂમેટોઇડ આર્થરાઇટિસ, ટાઇપ 1 ડાયાબિટીસ, અને મલ્ટિપલ સ્ક્લેરોસિસ ઓટોઇમ્યુન રોગો છે જેમાં પ્રતિકારક તંત્ર શરીરના સ્વના પેશીઓ પર હુમલો કરે છે.", "ref": "Std 12 - Chapter 10: રોગપ્રતિકારક શક્તિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પ્રતિકારક તંત્રના પ્રાથમિક અને દ્વિતીય પ્રતિક્રિયા વિશે ખોટું છે?", "opts": ["પ્રાથમિક પ્રતિક્રિયામાં IgM એન્ટીબોડી પ્રધાન રીતે ઉત્પન્ન થાય છે.", "દ્વિતીય પ્રતિક્રિયામાં IgG એન્ટીબોડીની માત્રા વધુ હોય છે.", "પ્રાથમિક પ્રતિક્રિયા દ્વિતીય પ્રતિક્રિયા કરતાં ઝડપી અને મજબૂત હોય છે.", "મેમરી B-કોષો દ્વિતીય પ્રતિક્રિયામાં ભાગ લે છે."], "ans": 2, "exp": "પ્રાથમિક પ્રતિક્રિયા દ્વિતીય પ્રતિક્રિયા કરતાં ધીમી અને નબળી હોય છે. પ્રાથમિક પ્રતિક્રિયામાં IgM એન્ટીબોડી પ્રધાન રીતે ઉત્પન્ન થાય છે, જ્યારે દ્વિતીય પ્રતિક્રિયામાં IgG એન્ટીબોડીની માત્રા વધુ હોય છે. મેમરી B-કોષો દ્વિતીય પ્રતિક્રિયામાં ભાગ લે છે.", "ref": "Std 12 - Chapter 10: રોગપ્રતિકારક શક્તિ", "ch": ""}, {"q": "નીચેનામાંથી કયું જોડકું એન્ટીજન અને તેના પ્રકાર વિશે યોગ્ય રીતે જોડાયેલું નથી?", "opts": ["પોલેન - બહારવર્તી એન્ટીજન", "વાયરસ - અંદરવર્તી એન્ટીજન", "બેક્ટેરિયા - બહારવર્તી એન્ટીજન", "કૅન્સર કોષ - સ્વ-એન્ટીજન"], "ans": 1, "exp": "વાયરસને બહારવર્તી એન્ટીજન ગણવામાં આવે છે, કારણ કે તે કોષના બહારથી પ્રવેશે છે. પોલેન, બેક્ટેરિયા અને કૅન્સર કોષોના જોડકાં યોગ્ય છે.", "ref": "Std 12 - Chapter 10: રોગપ્રતિકારક શક્તિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઇમ્યુનોગ્લોબ્યુલિન (Ig) વિશે ખોટું છે?", "opts": ["IgA શ્લેષ્મલ સપાટી પર હાજર હોય છે અને સ્રાવી પ્રતિકારકતામાં ભાગ લે છે.", "IgE એલર્જી પ્રતિક્રિયામાં ભાગ લે છે.", "IgD B-કોષોની સપાટી પર હાજર હોય છે અને એન્ટીજન ઓળખવામાં મદદ કરે છે.", "IgM પ્રાથમિક પ્રતિક્રિયામાં ઉત્પન્ન થતું નથી."], "ans": 3, "exp": "IgM પ્રાથમિક પ્રતિક્રિયામાં પ્રધાન રીતે ઉત્પન્ન થાય છે. IgA, IgE, અને IgD ની ભૂમિકાઓ યોગ્ય રીતે વર્ણવી છે.", "ref": "Std 12 - Chapter 10: રોગપ્રતિકારક શક્તિ", "ch": ""}, {"q": "એક વ્યક્તિમાં રોગપ્રતિકારક શક્તિની દ્વિતીય પ્રતિક્રિયા દરમિયાન, નીચેનામાંથી કયું વિધાન IgG એન્ટીબોડી વિશે ખોટું છે?", "opts": ["IgG એન્ટીબોડી પ્લેસેન્ટા દ્વારા ભ્રૂણમાં પસાર થઈ શકે છે.", "IgG એન્ટીબોડી મુખ્યત્વે પ્રાથમિક પ્રતિક્રિયા દરમિયાન ઉત્પન્ન થાય છે.", "IgG એન્ટીબોડી બેક્ટેરિયા અને વાયરસને નિષ્ક્રિય કરવા માટે જવાબદાર છે.", "IgG એન્ટીબોડી રક્તપ્લાઝમામાં સૌથી વધુ પ્રમાણમાં જોવા મળે છે."], "ans": 1, "exp": "IgG એન્ટીબોડી મુખ્યત્વે દ્વિતીય પ્રતિક્રિયા દરમિયાન ઉત્પન્ન થાય છે, પ્રાથમિક પ્રતિક્રિયા દરમિયાન IgM એન્ટીબોડી ઉત્પન્ન થાય છે. IgG પ્લેસેન્ટા દ્વારા ભ્રૂણમાં પસાર થઈ શકે છે, બેક્ટેરિયા અને વાયરસને નિષ્ક્રિય કરવા માટે જવાબદાર છે, અને રક્તપ્લાઝમામાં સૌથી વધુ પ્રમાણમાં જોવા મળે છે. તેથી, વિધાન B ખોટું છે.", "ref": "Std 12 - Chapter 10: રોગપ્રતિકારક શક્તિ", "ch": ""}, {"q": "નીચેનામાંથી કયું જોડકું રોગપ્રતિકારક શક્તિના કોષ અને તેની ભૂમિકા વિશે યોગ્ય રીતે જોડાયેલું નથી?", "opts": ["B-લિમ્ફોસાઇટ્સ - એન્ટીબોડી ઉત્પન્ન કરવી", "T-હેલ્પર કોષ - સાયટોકાઇન ઉત્પન્ન કરવી", "ન્યૂટ્રોફિલ્સ - એન્ટીજન પ્રસ્તુત કરવી", "મેક્રોફેજ - એન્ટીજનને ફેગોસાઇટોસિસ દ્વારા નષ્ટ કરવી"], "ans": 2, "exp": "ન્યૂટ્રોફિલ્સ એન્ટીજન પ્રસ્તુત કરવા માટે જવાબદાર નથી, તે મુખ્યત્વે બેક્ટેરિયા અને ફંગીને નષ્ટ કરવા માટે જવાબદાર છે. B-લિમ્ફોસાઇટ્સ એન્ટીબોડી ઉત્પન્ન કરે છે, T-હેલ્પર કોષ સાયટોકાઇન ઉત્પન્ન કરે છે, અને મેક્રોફેજ એન્ટીજનને ફેગોસાઇટોસિસ દ્વારા નષ્ટ કરે છે. તેથી, જોડકું C ખોટું છે.", "ref": "Std 12 - Chapter 10: રોગપ્રતિકારક શક્તિ", "ch": ""}, {"q": "એક વ્યક્તિમાં ઓટોઇમ્યુન રોગ જોવા મળે છે. નીચેનામાંથી કયું વિધાન આ રોગની સ્થિતિ વિશે ખોટું છે?", "opts": ["શરીરના સ્વયં પ્રોટીન વિરુદ્ધ એન્ટીબોડી ઉત્પન્ન થાય છે.", "રોગપ્રતિકારક તંત્ર સ્વયં કોષો પર હુમલો કરે છે.", "આ રોગમાં, T-સપ્રેસર કોષોની સંખ્યા વધી જાય છે.", "રૂમેટોઇડ આર્થરાઇટિસ એ ઓટોઇમ્યુન રોગનું ઉદાહરણ છે."], "ans": 2, "exp": "ઓટોઇમ્યુન રોગમાં, T-સપ્રેસર કોષોની સંખ્યા ઘટી જાય છે, જેના કારણે રોગપ્રતિકારક તંત્ર સ્વયં કોષો પર હુમલો કરે છે. શરીરના સ્વયં પ્રોટીન વિરુદ્ધ એન્ટીબોડી ઉત્પન્ન થાય છે, અને રૂમેટોઇડ આર્થરાઇટિસ એ ઓટોઇમ્યુન રોગનું ઉદાહરણ છે. તેથી, વિધાન C ખોટું છે.", "ref": "Std 12 - Chapter 10: રોગપ્રતિકારક શક્તિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઇન્ટરલ્યુકિન (Interleukin) વિશે ખોટું છે?", "opts": ["ઇન્ટરલ્યુકિન સાયટોકાઇનના એક પ્રકાર છે.", "ઇન્ટરલ્યુકિન-2 (IL-2) T-લિમ્ફોસાઇટ્સની વૃદ્ધિ અને પ્રસરણને ઉત્તેજિત કરે છે.", "ઇન્ટરલ્યુકિન મુખ્યત્વે મેક્રોફેજ દ્વારા ઉત્પન્ન થાય છે.", "ઇન્ટરલ્યુકિન રોગપ્રતિકારક પ્રતિક્રિયામાં મહત્વની ભૂમિકા ભજવે છે."], "ans": 2, "exp": "ઇન્ટરલ્યુકિન મુખ્યત્વે T-લિમ્ફોસાઇટ્સ, મેક્રોફેજ, અને અન્ય કોષો દ્વારા ઉત્પન્ન થાય છે, પરંતુ મુખ્ય સ્રોત T-લિમ્ફોસાઇટ્સ છે. ઇન્ટરલ્યુકિન સાયટોકાઇનના એક પ્રકાર છે, IL-2 T-લિમ્ફોસાઇટ્સની વૃદ્ધિને ઉત્તેજિત કરે છે, અને તે રોગપ્રતિકારક પ્રતિક્રિયામાં મહત્વની ભૂમિકા ભજવે છે. તેથી, વિધાન C ખોટું છે.", "ref": "Std 12 - Chapter 10: રોગપ્રતિકારક શક્તિ", "ch": ""}, {"q": "એક વ્યક્તિને ક્ષય રોગ (ટ્યુબરક્યુલોસિસ) થયો છે. આ રોગમાં મુખ્યત્વે કોષીય મધ્યસ્થી પ્રતિકારકતા (Cell-Mediated Immunity) સક્રિય થાય છે. નીચેનામાંથી કયું વિધાન આ પ્રતિક્રિયા દરમિયાન થતી ઘટનાઓનું ખોટું વર્ણન કરે છે?", "opts": ["સંવેદનશીલ થયેલા ટી-લિમ્ફોસાઇટ્સ મેક્રોફેજને સક્રિય કરે છે, જે બેક્ટેરિયાનો નાશ કરે છે", "સાયટોટોક્સિક ટી-કોષો (Cytotoxic T-Cells) સીધા જ બેક્ટેરિયાને ઓળખીને તેનો નાશ કરે છે", "ટી-હેલ્પર કોષો (T-Helper Cells) સાયટોકાઇન ઉત્પન્ન કરે છે, જે મેક્રોફેજની ફેગોસાઇટોસિસ ક્ષમતા વધારે છે", "ગ્રાન્યુલોમા નિર્માણ થાય છે, જેમાં સક્રિય મેક્રોફેજ અને ટી-કોષો બેક્ટેરિયાને ઘેરે છે"], "ans": 1, "exp": "સાયટોટોક્સિક ટી-કોષો (Cytotoxic T-Cells) મુખ્યત્વે વાઇરસથી સંક્રમિત કોષો અને કૅન્સર કોષોનો નાશ કરે છે, બેક્ટેરિયાનો નહીં. ક્ષય રોગમાં બેક્ટેરિયા મેક્રોફેજની અંદર જીવિત રહે છે, તેથી સાયટોટોક્સિક ટી-કોષો સીધા બેક્ટેરિયાને ઓળખી શકતા નથી. બાકીના વિકલ્પો ક્ષય રોગમાં થતી કોષીય મધ્યસ્થી પ્રતિક્રિયાના સાચા વર્ણન છે: ટી-લિમ્ફોસાઇટ્સ મેક્રોફેજને સક્રિય કરે છે (A), ટી-હેલ્પર કોષો સાયટોકાઇન ઉત્પન્ન કરે છે (C), અને ગ્રાન્યુલોમા નિર્માણ થાય છે (D).", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
