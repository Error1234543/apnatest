<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પર્યાવરણીય પિરામિડ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>પર્યાવરણીય પિરામિડ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">પર્યાવરણીય પિરામિડ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 45 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 45 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "પર્યાવરણીય પિરામિડમાં ઉર્જા પિરામિડ અને જૈવવસ્તુ પિરામિડ વચ્ચેનો મુખ્ય તફાવત શો છે?", "opts": ["ઉર્જા પિરામિડ હંમેશા સીધો હોય છે જ્યારે જૈવવસ્તુ પિરામિડ ક્યારેક ઉલટો હોઈ શકે છે", "જૈવવસ્તુ પિરામિડ ઉર્જા પિરામિડ કરતાં વધુ સચોટ માહિતી આપે છે", "ઉર્જા પિરામિડમાં પ્રાથમિક ઉત્પાદકોની ઉર્જા સૌથી ઓછી હોય છે", "જૈવવસ્તુ પિરામિડમાં ઉર્જાનું માપન કિલોજ્યુલમાં થાય છે"], "ans": 0, "exp": "ઉર્જા પિરામિડ હંમેશા સીધો હોય છે કારણ કે ઉર્જાનું સ્તર ઉપરના સ્તર તરફ જતાં ઘટતું જાય છે. જૈવવસ્તુ પિરામિડમાં, જો પ્રાથમિક ઉત્પાદકો (જેવા કે વૃક્ષો) ખૂબ જ મોટા હોય અને ઉપભોક્તા (જેવા કે કીટકો) નાના હોય, તો પિરામિડ ઉલટો દેખાઈ શકે છે. બાકીના વિકલ્પો અસત્ય છે: જૈવવસ્તુ પિરામિડ ઉર્જા પિરામિડ કરતાં ઓછી સચોટ માહિતી આપે છે, ઉર્જા પિરામિડમાં પ્રાથમિક ઉત્પાદકોની ઉર્જા સૌથી વધુ હોય છે, અને જૈવવસ્તુ પિરામિડમાં ઉર્જાનું માપન થતું નથી.", "ref": "Std 12 - અધ્યાય 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "એક પારિસ્થિતિક તંત્રમાં, જો પ્રાથમિક ઉત્પાદકોના જૈવવસ્તુ 1000 kg છે અને તૃતીય ઉપભોક્તાઓના જૈવવસ્તુ 10 kg છે, તો ઉર્જા હસ્તાંતરણની કાર્યક્ષમતા શું હશે? (ધારો કે ઉર્જા હસ્તાંતરણ દરમિયાન 90% ઉર્જા ગુમાવાય છે)", "opts": ["0.1%", "1%", "10%", "0.01%"], "ans": 1, "exp": "પ્રાથમિક ઉત્પાદકોથી તૃતીય ઉપભોક્તા સુધી ઉર્જા હસ્તાંતરણના ત્રણ સ્તરો છે (પ્રાથમિક → દ્વિતીય → તૃતીય). દરેક સ્તરે 90% ઉર્જા ગુમાવાય છે, એટલે કે 10% ઉર્જા આગળના સ્તરમાં હસ્તાંતરિત થાય છે. આથી, તૃતીય ઉપભોક્તા સુધી પહોંચતી ઉર્જા = 1000 kg × (10/100)^3 = 1 kg. પરંતુ પ્રશ્નમાં તૃતીય ઉપભોક્તાઓના જૈવવસ્તુ 10 kg આપવામાં આવ્યું છે, જે 1% કાર્યક્ષમતા સૂચવે છે. બાકીના વિકલ્પો ગણતરીમાં બંધબેસતા નથી.", "ref": "Std 12 - અધ્યાય 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "પર્યાવરણીય પિરામિડમાં, કયા પ્રકારના પિરામિડમાં સંકલિત જૈવવસ્તુના એકમોનો ઉપયોગ થાય છે?", "opts": ["ઉર્જા પિરામિડ", "સંખ્યા પિરામિડ", "જૈવવસ્તુ પિરામિડ", "પોષક પિરામિડ"], "ans": 2, "exp": "જૈવવસ્તુ પિરામિડમાં સંકલિત જૈવવસ્તુના એકમો (જેવા કે kg/m² અથવા g/m²)નો ઉપયોગ થાય છે. ઉર્જા પિરામિડમાં ઉર્જાના એકમો (જેવા કે kJ/m²/વર્ષ)નો ઉપયોગ થાય છે, સંખ્યા પિરામિડમાં જીવોની સંખ્યાનો ઉપયોગ થાય છે, અને પોષક પિરામિડ એ પારિસ્થિતિક તંત્રમાં પોષક તત્ત્વોના વિતરણને દર્શાવે છે.", "ref": "Std 12 - અધ્યાય 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન પિરામિડ ઓફ નંબર્સ (સંખ્યા પિરામિડ) વિશે સાચું નથી?", "opts": ["તે પારિસ્થિતિક તંત્રમાં જીવોની સંખ્યા દર્શાવે છે", "તે હંમેશા સીધો હોય છે", "તે એક જ પ્રજાતિના જીવોની સંખ્યા દર્શાવી શકે છે", "તે વૃક્ષ જેવા મોટા જીવો માટે ઉલટો હોઈ શકે છે"], "ans": 1, "exp": "સંખ્યા પિરામિડ હંમેશા સીધો હોતો નથી. ઉદાહરણ તરીકે, જો એક વૃક્ષ પર હજારો કીટકો આશ્રય લે છે, તો સંખ્યા પિરામિડ ઉલટો દેખાઈ શકે છે. બાકીના વિકલ્પો સાચા છે: તે જીવોની સંખ્યા દર્શાવે છે, તે એક જ પ્રજાતિની સંખ્યા દર્શાવી શકે છે, અને મોટા જીવો માટે ઉલટો હોઈ શકે છે.", "ref": "Std 12 - અધ્યાય 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "એક પારિસ્થિતિક તંત્રમાં, જો પ્રાથમિક ઉત્પાદકોના જૈવવસ્તુ 5000 kg છે અને દ્વિતીય ઉપભોક્તાઓના જૈવવસ્તુ 50 kg છે, તો ઉર્જા હસ્તાંતરણની ટકાવારી કેટલી હશે? (ધારો કે ઉર્જા હસ્તાંતરણ દરમિયાન 80% ઉર્જા ગુમાવાય છે)", "opts": ["0.2%", "2%", "20%", "0.02%"], "ans": 1, "exp": "પ્રાથમિક ઉત્પાદકોથી દ્વિતીય ઉપભોક્તા સુધી ઉર્જા હસ્તાંતરણના બે સ્તરો છે (પ્રાથમિક → પ્રાથમિક ઉપભોક્તા → દ્વિતીય ઉપભોક્તા). દરેક સ્તરે 80% ઉર્જા ગુમાવાય છે, એટલે કે 20% ઉર્જા આગળના સ્તરમાં હસ્તાંતરિત થાય છે. આથી, દ્વિતીય ઉપભોક્તા સુધી પહોંચતી ઉર્જા = 5000 kg × (20/100)^2 = 200 kg. પરંતુ પ્રશ્નમાં દ્વિતીય ઉપભોક્તાઓના જૈવવસ્તુ 50 kg આપવામાં આવ્યું છે, જે 1% ઉર્જા હસ્તાંતરણ સૂચવે છે. પરંતુ 20% હસ્તાંતરણ દર વચ્ચે, 50 kg = 5000 × (20/100)^2 × (x/100) = 2% ટકાવારી સૂચવે છે. બાકીના વિકલ્પો ગણતરીમાં બંધબેસતા નથી.", "ref": "Std 12 - અધ્યાય 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "પર્યાવરણીય પિરામિડમાં, જો એક પારિસ્થિતિક તંત્રમાં પરભક્ષી (ટર્શિયરી કન્ઝ્યુમર)ની સંખ્યા પ્રાથમિક ઉત્પાદકો કરતાં વધારે હોય, તો કયો પિરામિડ ઉલટાવી શકાય છે?", "opts": ["ઉર્જા પિરામિડ", "જૈવવસ્તુ પિરામિડ", "સંખ્યા પિરામિડ", "ઉર્જા અને જૈવવસ્તુ બંને પિરામિડ"], "ans": 2, "exp": "સંખ્યા પિરામિડ (પિરામિડ ઓફ નંબર્સ)માં, જો પરભક્ષી (ટર્શિયરી કન્ઝ્યુમર)ની સંખ્યા પ્રાથમિક ઉત્પાદકો કરતાં વધારે હોય, તો પિરામિડ ઉલટાવી શકાય છે. ઉદાહરણ તરીકે, એક વૃક્ષ પર હજારો જીવડા (પરભક્ષી) રહેતા હોય છે, જ્યારે વૃક્ષ (પ્રાથમિક ઉત્પાદક) એક જ હોય છે. ઉર્જા પિરામિડ અને જૈવવસ્તુ પિરામિડ કદી ઉલટાવી શકાતા નથી, કારણ કે ઉર્જા અને જૈવવસ્તુનો પ્રવાહ હંમેશા પ્રાથમિક ઉત્પાદકોથી શરૂ થઈને ઉપરની તરફ જતો રહે છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "નીચેના પૈકી કયા પારિસ્થિતિક તંત્રમાં જૈવવસ્તુ પિરામિડ અને ઉર્જા પિરામિડ બંને સરખા દેખાય છે?", "opts": ["જંગલ પારિસ્થિતિક તંત્ર", "તળાવ પારિસ્થિતિક તંત્ર", "મરુસ્થળ પારિસ્થિતિક તંત્ર", "ઘાસના મેદાન પારિસ્થિતિક તંત્ર"], "ans": 1, "exp": "તળાવ પારિસ્થિતિક તંત્રમાં, જૈવવસ્તુ પિરામિડ અને ઉર્જા પિરામિડ બંને સરખા દેખાય છે, કારણ કે તળાવમાં પ્રાથમિક ઉત્પાદકો (ફાયટોપ્લેંકટન)ની જૈવવસ્તુ અને ઉર્જા બંને ઓછી હોય છે, જ્યારે ઉપભોક્તાઓ (ઝૂપ્લેંકટન, મછલી)ની જૈવવસ્તુ અને ઉર્જા વધારે હોય છે. જંગલ, મરુસ્થળ અને ઘાસના મેદાન પારિસ્થિતિક તંત્રમાં, જૈવવસ્તુ પિરામિડ અને ઉર્જા પિરામિડ સરખા દેખાતા નથી.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "પર્યાવરણીય પિરામિડમાં, જો એક પારિસ્થિતિક તંત્રમાં પ્રાથમિક ઉત્પાદકોની ઉર્જા 10,000 kJ છે, તો તૃતીય ઉપભોક્તા (ટર્શિયરી કન્ઝ્યુમર) સુધી પહોંચતી ઉર્જા લગભગ કેટલી હશે? (10% ઉર્જા હસ્તાંતરણ કાયદો ધ્યાનમાં લો)", "opts": ["10 kJ", "100 kJ", "1,000 kJ", "10,000 kJ"], "ans": 0, "exp": "10% ઉર્જા હસ્તાંતરણ કાયદા મુજબ, પ્રત્યેક પોષણ સ્તરે માત્ર 10% ઉર્જા જ આગળના સ્તરે હસ્તાંતરિત થાય છે. પ્રાથમિક ઉત્પાદકો (10,000 kJ) → પ્રાથમિક ઉપભોક્તા (1,000 kJ) → દ્વિતીય ઉપભોક્તા (100 kJ) → તૃતીય ઉપભોક્તા (10 kJ). આમ, તૃતીય ઉપભોક્તા સુધી પહોંચતી ઉર્જા લગભગ 10 kJ હશે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન પિરામિડ ઓફ બાયોમાસ (જૈવવસ્તુ પિરામિડ) વિશે સાચું છે?", "opts": ["જૈવવસ્તુ પિરામિડ હંમેશા સીધો હોય છે.", "જૈવવસ્તુ પિરામિડમાં ઉર્જાનું માપન થાય છે.", "જૈવવસ્તુ પિરામિડમાં, પ્રાથમિક ઉત્પાદકોની જૈવવસ્તુ સૌથી ઓછી હોય છે.", "જૈવવસ્તુ પિરામિડમાં, ઉપભોક્તાઓની જૈવવસ્તુ પ્રાથમિક ઉત્પાદકો કરતાં ઓછી હોય છે."], "ans": 3, "exp": "જૈવવસ્તુ પિરામિડમાં, ઉપભોક્તાઓની જૈવવસ્તુ પ્રાથમિક ઉત્પાદકો કરતાં ઓછી હોય છે, કારણ કે ઉર્જા અને જૈવવસ્તુનો પ્રવાહ પ્રાથમિક ઉત્પાદકોથી શરૂ થઈને ઉપરની તરફ જતો રહે છે. જૈવવસ્તુ પિરામિડ હંમેશા સીધો નથી હોતો (ઉદાહરણ તરીકે, તળાવ પારિસ્થિતિક તંત્રમાં), અને તેમાં ઉર્જાનું માપન થતું નથી. પ્રાથમિક ઉત્પાદકોની જૈવવસ્તુ સૌથી વધારે હોય છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "પર્યાવરણીય પિરામિડમાં, કયા પ્રકારના પિરામિડમાં ઉર્જાનું માપન kJ/m²/વર્ષમાં થાય છે?", "opts": ["પિરામિડ ઓફ નંબર્સ", "પિરામિડ ઓફ બાયોમાસ", "પિરામિડ ઓફ એનર્જી", "પિરામિડ ઓફ પ્રોડક્ટિવિટી"], "ans": 2, "exp": "પિરામિડ ઓફ એનર્જી (ઉર્જા પિરામિડ)માં ઉર્જાનું માપન kJ/m²/વર્ષમાં થાય છે. આ પિરામિડમાં પ્રત્યેક પોષણ સ્તરે ઉપલબ્ધ ઉર્જાનું પ્રમાણ દર્શાવવામાં આવે છે. પિરામિડ ઓફ નંબર્સમાં જીવોની સંખ્યા, પિરામિડ ઓફ બાયોમાસમાં જૈવવસ્તુનું પ્રમાણ, અને પિરામિડ ઓફ પ્રોડક્ટિવિટીમાં ઉત્પાદકતાનું પ્રમાણ દર્શાવવામાં આવે છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "પર્યાવરણીય પિરામિડમાં, જ્યારે એક જલીય પારિસ્થિતિક તંત્રમાં ફાયટોપ્લાંકટન (પ્રાથમિક ઉત્પાદક)ની સંખ્યા ઓછી હોય પરંતુ જૈવવસ્તુ પ્રમાણમાં વધારે હોય, ત્યારે કયો પિરામિડ ઉલટાવી શકાય છે?", "opts": ["ઉર્જા પિરામિડ", "સંખ્યા પિરામિડ", "જૈવવસ્તુ પિરામિડ", "ઉર્જા અને જૈવવસ્તુ બંને પિરામિડ"], "ans": 1, "exp": "જલીય પારિસ્થિતિક તંત્રમાં ફાયટોપ્લાંકટનની સંખ્યા ઓછી હોવા છતાં જૈવવસ્તુ વધારે હોય છે, કારણ કે તે અતિ સૂક્ષ્મ હોય છે. આ કારણે સંખ્યા પિરામિડ ઉલટાવી શકાય છે, જ્યારે ઉર્જા અને જૈવવસ્તુ પિરામિડ સામાન્ય રીતે સીધા જ રહે છે. ઉર્જા પિરામિડ કદી ઉલટાવી શકાતો નથી, કારણ કે ઉર્જાનો પ્રવાહ એકદિશાત્મક હોય છે. જૈવવસ્તુ પિરામિડ પણ સામાન્ય રીતે સીધો જ રહે છે, કારણ કે જૈવવસ્તુનું પ્રમાણ પ્રાથમિક ઉત્પાદકોમાં સૌથી વધારે હોય છે.", "ref": "Std 12 - અધ્યાય 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "નીચેના પૈકી કયા પારિસ્થિતિક તંત્રમાં જૈવવસ્તુ પિરામિડ ઉલટાવી શકાય છે?", "opts": ["ઘાસના મેદાનમાં હરણ અને સિંહ", "વરખના જંગલમાં વૃક્ષો, કીટક અને પક્ષી", "તળાવમાં ફાયટોપ્લાંકટન, ઝૂપ્લંકટન અને મત્સ્ય", "મરુભૂમિમાં ઝાડી, કીટક અને સાપ"], "ans": 2, "exp": "તળાવ જેવા જલીય પારિસ્થિતિક તંત્રમાં ફાયટોપ્લાંક મેશા સીધો જ હોય છે, કારણ કે ઉર્જાનું સ્તર નીચેના સ્તરથી ઉપરના સ્તર તરફ જતાં ઘટે છે.", "જૈવવસ્તુ પિરામિડમાં, પ્રાથમિક ઉત્પાદકોનું જૈવવસ્તુ હંમેશા સૌથી વધારે હોય છે.", "સંખ્યા પિરામિડમાં, પ્રાથમિક ઉત્પાદકોની સંખ્યા હંમેશા સૌથી વધારે હોય છે.", "જલીય પારિસ્થિતિક તંત્રમાં, જૈવવસ્તુ પિરામિડ ઉલટાયેલો હોઈ શકે છે, પરંતુ ઉર્જા પિરામિડ કદી ઉલટાયેલો હોતો નથી."], "ans": 2, "exp": "વિકલ્પ C ખોટો છે કારણ કે સંખ્યા પિરામિડમાં પ્રાથમિક ઉત્પાદકોની સંખ્યા હંમેશા સૌથી વધારે હોતી નથી. ઉદાહરણ તરીકે, જલીય પારિસ્થિતિક તંત્રમાં ફાયટોપ્લાંકટન (પ્રાથમિક ઉત્પાદક)ની સંખ્યા ઝૂપ્લાંકટન (પ્રાથમિક ઉપભોક્તા) કરતાં ઓછી હોઈ શકે છે. વિકલ્પ A સાચો છે કારણ કે ઉર્જા પિરામિડ હંમેશા સીધો જ હોય છે. વિકલ્પ B સાચો છે કારણ કે પ્રાથમિક ઉત્પાદકોનું જૈવવસ્તુ હંમેશા સૌથી વધારે હોય છે. વિકલ્પ D સાચો છે કારણ કે ઉર્જા પિરામિડ કદી ઉલટાયેલો હોતો નથી.", "ref": "Std 12 - અધ્યાય 14: પારિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "એક પારિસ્થિતિક તંત્રમાં, જો પ્રાથમિક ઉત્પાદકોનું જૈવવસ્તુ 1000 kg છે અને દ્વિતીય ઉપભોક્તાઓનું જૈવવસ્તુ 100 kg છે, તો તૃતીય ઉપભોક્તાઓનું જૈવવસ્તુ કેટલું હશે? (10% ઉર્જા હસ્તાંતરણ નિયમ ધ્યાનમાં લેતા)", "opts": ["10 kg", "100 kg", "1 kg", "50 kg"], "ans": 0, "exp": "10% ઉર્જા હસ્તાંતરણ નિયમ અનુસાર, દરેક પોષણ સ્તર પર મેળવેલી ઉર્જાનો માત્ર 10% જ ભાગ આગળના પોષણ સ્તરમાં હસ્તાંતરિત થાય છે. પ્રાથમિક ઉત્પાદકોનું જૈવવસ્તુ 1000 kg છે, તો પ્રાથમિક ઉપભોક્તાઓ (દ્વિતીય)નું જૈવવસ્તુ 100 kg છે (10% of 1000). ત્યારબાદ તૃતીય ઉપભોક્તાઓનું જૈવવસ્તુ 10% of 100 = 10 kg હશે. વિકલ્પ B, C, અને D ખોટા છે કારણ કે તેઓ 10% નિયમને અનુરૂપ નથી.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "નીચેના પૈકી કયું પારિસ્થિતિક તંત્રમાં જૈવવસ્તુ પિરામિડ ઉલટાવી શકાય છે?", "opts": ["ઘાસના મેદાન", "જંગલ", "તળાવ", "મરુભૂમિ"], "ans": 2, "exp": "જલીય પારિસ્થિતિક તંત્ર (જેમ કે તળાવ)માં, ફાયટોપ્લાંકટન (પ્રાથમિક ઉત્પાદક)નું જૈવવસ્તુ ઝૂપ્લાંકટન (પ્રાથમિક ઉપભોક્તા) કરતાં ઓછું હોઈ શકે છે, પરંતુ ઝૂપ્લાંકટનનું જૈવવસ્તુ વધુ હોઈ શકે છે. આથી જૈવવસ્તુ પિરામિડ ઉલટાવી શકાય છે. ઘાસના મેદાન, જંગલ, અને મરુભૂમિમાં જૈવવસ્તુ પિરામિડ સામાન્ય રીતે ઉલટાવી શકાતો નથી.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "એક જંગલના પારિસ્થિતિક તંત્રમાં, જો વૃક્ષો (પ્રાથમિક ઉત્પાદકો)ની સંખ્યા ઓછી હોય પરંતુ તેમનું જૈવવસ્તુ વધારે હોય, અને તેના પર આધારિત તૃતીય ઉપભોક્તાઓની સંખ્યા પ્રાથમિક ઉપભોક્તાઓ કરતાં વધારે હોય, તો નીચેના પૈકી કયું વિધાન આ પરિસ્થિતિ માટે સાચું છે?", "opts": ["આ પારિસ્થિતિક તંત્રમાં સંખ્યા પિરામિડ અને જૈવવસ્તુ પિરામિડ બંને સીધા હશે.", "આ પારિસ્થિતિક તંત્રમાં સંખ્યા પિરામિડ ઉલટાવી શકાય છે, પરંતુ જૈવવસ્તુ પિરામિડ સીધો રહેશે.", "આ પારિસ્થિતિક તંત્રમાં જૈવવસ્તુ પિરામિડ ઉલટાવી શકાય છે, પરંતુ સંખ્યા પિરામિડ સીધો રહેશે.", "આ પારિસ્થિતિક તંત્રમાં સંખ્યા પિરામિડ અને જૈવવસ્તુ પિરામિડ બંને ઉલટાવી શકાય છે."], "ans": 1, "exp": "આ પ્રશ્નમાં, વૃક્ષોની સંખ્યા ઓછી હોવા છતાં તેમનું જૈવવસ્તુ વધારે છે, જે જૈવવસ્તુ પિરામિડને સીધો બનાવે છે. પરંતુ તૃતીય ઉપભોક્તાઓની સંખ્યા પ્રાથમિક ઉપભોક્તાઓ કરતાં વધારે હોવાથી સંખ્યા પિરામિડ ઉલટાવી શકાય છે. તેથી વિકલ્પ B સાચો છે. વિકલ્પ A ખોટો છે કારણ કે સંખ્યા પિરામિડ ઉલટાવી શકાય છે. વિકલ્પ C ખોટો છે કારણ કે જૈવવસ્તુ પિરામિડ ઉલટાવી શકાતો નથી. વિકલ્પ D ખોટો છે કારણ કે બંને પિરામિડ ઉલટાવી શકાતા નથી.", "ref": "Std 12 - પ્રકરણ 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "એક જલીય પારિસ્થિતિક તંત્રમાં, ફાયટોપ્લાંકટન (પ્રાથમિક ઉત્પાદક)ની સંખ્યા ઝૂપ્લાંકટન (પ્રાથમિક ઉપભોક્તા) કરતાં ઓછી હોય છે, પરંતુ ફાયટોપ્લાંકટનનું જૈવવસ્તુ ઝૂપ્લાંકટન કરતાં વધારે હોય છે. આ પરિસ્થિતિમાં નીચેના પૈકી કયું વિધાન સાચું નથી?", "opts": ["સંખ્યા પિરામિડ ઉલટાવી શકાય છે.", "જૈવવસ્તુ પિરામિડ સીધો રહેશે.", "ઉર્જા પિરામિડ હંમેશા સીધો રહેશે.", "સંખ્યા પિરામિડ અને જૈવવસ્તુ પિરામિડ બંને ઉલટાવી શકાય છે."], "ans": 3, "exp": "આ પરિસ્થિતિમાં, સંખ્યા પિરામિડ ઉલટાવી શકાય છે કારણ કે ફાયટોપ્લાંકટનની સંખ્યા ઓછી છે. જૈવવસ્તુ પિરામિડ સીધો રહેશે કારણ કે ફાયટોપ્લાંકટનનું જૈવવસ્તુ વધારે છે. ઉર્જા પિરામિડ હંમેશા સીધો રહે છે કારણ કે ઉર્જા એક દિશામાં વહે છે. તેથી વિકલ્પ D ખોટો છે કારણ કે બંને પિરામિડ ઉલટાવી શકાતા નથી.", "ref": "Std 12 - પ્રકરણ 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "એક જલીય પારિસ્થિતિક તંત્રમાં ફાયટોપ્લાંકટન (પ્રાથમિક ઉત્પાદક)ની સંખ્યા ઝૂપ્લાંકટન (પ્રાથમિક ઉપભોક્તા) કરતાં ઓછી હોય છે, પરંતુ તેમનું જૈવવસ્તુ ઝૂપ્લાંકટન કરતાં વધુ હોય છે. આ પરિસ્થિતિમાં નીચેના પૈકી કયું વિધાન સાચું છે?", "opts": ["આ પારિસ્થિતિક તંત્રમાં સંખ્યા પિરામિડ અને જૈવવસ્તુ પિરામિડ બંને ઉલટાવેલા હોય છે.", "આ પારિસ્થિતિક તંત્રમાં સંખ્યા પિરામિડ ઉલટાવેલો હોય છે, પરંતુ જૈવવસ્તુ પિરામિડ સામાન્ય હોય છે.", "આ પારિસ્થિતિક તંત્રમાં સંખ્યા પિરામિડ સામાન્ય હોય છે, પરંતુ જૈવવસ્તુ પિરામિડ ઉલટાવેલો હોય છે.", "આ પારિસ્થિતિક તંત્રમાં ઉર્જા પિરામિડ હંમેશા સામાન્ય હોય છે, પરંતુ સંખ્યા અને જૈવવસ્તુ પિરામિડ અલગ-અલગ હોઈ શકે છે."], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B છે. જલીય પારિસ્થિતિક તંત્રમાં ફાયટોપ્લાંકટનની સંખ્યા ઓછી હોવાથી સંખ્યા પિરામિડ ઉલટાવેલો બને છે (કારણ કે ઉપભોક્તાની સંખ્યા વધુ હોય છે). પરંતુ ફાયટોપ્લાંકટનનું જૈવવસ્તુ ઝૂપ્લાંકટન કરતાં વધુ હોવાથી જૈવવસ્તુ પિરામિડ સામાન્ય રહે છે. વિકલ્પ A ખોટો છે કારણ કે જૈવવસ્તુ પિરામિડ ઉલટાવેલો નથી. વિકલ્પ C ખોટો છે કારણ કે સંખ્યા પિરામિડ ઉલટાવેલો છે, સામાન્ય નથી. વિકલ્પ D ખોટો છે કારણ કે ઉર્જા પિરામિડ હંમેશા સામાન્ય હોય છે, પરંતુ આ પ્રશ્નમાં સંખ્યા અને જૈવવસ્તુ પિરામિડની ચર્ચા છે, જે અલગ-અલગ હોઈ શકે છે, પરંતુ આ વિધાન સંપૂર્ણ રીતે સાચું નથી.", "ref": "Std 12 - પ્રકરણ 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "એક જલીય પારિસ્થિતિક તંત્રમાં, જ્યારે ફાયટોપ્લાંકટન (પ્રાથમિક ઉત્પાદક)નું જૈવવસ્તુ ઝૂપ્લાંકટન (પ્રાથમિક ઉપભોક્તા) કરતાં ઓછું હોય છે, ત્યારે કયા પ્રકારના પર્યાવરણીય પિરામિડમાં ઉલટાવો જોવા મળે છે?", "opts": ["ઉર્જા પિરામિડ", "જૈવવસ્તુ પિરામિડ", "સંખ્યા પિરામિડ", "ઉર્જા અને જૈવવસ્તુ પિરામિડ બંને"], "ans": 1, "exp": "જલીય પારિસ્થિતિક તંત્રમાં ફાયટોપ્લાંકટનનું જૈવવસ્તુ ઝૂપ્લાંકટન કરતાં ઓછું હોવા છતાં, ઝૂપ્લાંકટનની સંખ્યા ઓછી હોય છે. જૈવવસ્તુ પિરામિડમાં, પ્રાથમિક ઉત્પાદકો (ફાયટોપ્લાંકટન)નું જૈવવસ્તુ પ્રાથમિક ઉપભોક્તા (ઝૂપ્લાંકટન) કરતાં ઓછું હોવાથી પિરામિડ ઉલટાવી શકાય છે. ઉર્જા પિરામિડ ક્યારેય ઉલટાવી શકાતો નથી કારણ કે ઉર્જાનો પ્રવાહ એકદિશાત્મક હોય છે. સંખ્યા પિરામિડમાં પણ ઉલટાવો શક્ય છે, પરંતુ પ્રશ્નમાં જૈવવસ્તુના સંદર્ભમાં પૂછવામાં આવ્યું છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર અને પર્યાવરણ", "ch": ""}, {"q": "એક પારિસ્થિતિક તંત્રમાં, જો પ્રાથમિક ઉત્પાદકોનું જૈવવસ્તુ 5000 kg છે અને દ્વિતીય ઉપભોક્તા (માંસાહારી)નું જૈવવસ્તુ 50 kg છે, તો કયા પ્રકારના પર્યાવરણીય પિરામિડમાં આ ડેટા સૌથી યોગ્ય રીતે દર્શાવી શકાય છે?", "opts": ["ઉર્જા પિરામિડ", "જૈવવસ્તુ પિરામિડ", "સંખ્યા પિરામિડ", "ઉર્જા અને જૈવવસ્તુ પિરામિડ બંને"], "ans": 1, "exp": "જૈવવસ્તુ પિરામિડમાં, પ્રત્યેક પોષણ સ્તર પર જૈવવસ્તુની માત્રા દર્શાવવામાં આવે છે. પ્રાથમિક ઉત્પાદકોનું જૈવવસ્તુ 5000 kg અને દ્વિતીય ઉપભોક્તાનું જૈવવસ્તુ 50 kg હોવા છતાં, જૈવવસ્તુ પિરામિડમાં આ ડેટા સ્પષ્ટપણે દર્શાવી શકાય છે. ઉર્જા પિરામિડમાં ઉર્જાનું માપન થાય છે, જ્યારે સંખ્યા પિરામિડમાં જીવોની સંખ્યા દર્શાવવામાં આવે છે. વિકલ્પ D ખોટો છે કારણ કે ઉર્જા પિરામિડમાં જૈવવસ્તુના ડેટાને સીધો સંબંધ નથી.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર અને પર્યાવરણ", "ch": ""}, {"q": "એક પારિસ્થિતિક તંત્રમાં, જો પ્રાથમિક ઉત્પાદકોની ઉર્જા 10,000 kJ/m²/વર્ષ છે અને તૃતીય ઉપભોક્તાઓની ઉર્જા 10 kJ/m²/વર્ષ છે. આ પરિસ્થિતિમાં નીચેના પૈકી કયું વિધાન સાચું નથી?", "opts": ["આ પારિસ્થિતિક તંત્રમાં ઉર્જા પિરામિડ હંમેશા સીધો જ રહે છે.", "આ પારિસ્થિતિક તંત્રમાં દરેક પોષક સ્તરે ઉર્જાનું નુકસાન લગભગ 90% થાય છે.", "આ પારિસ્થિતિક તંત્રમાં જૈવવસ્તુ પિરામિડ ઉલટાવી શકાય છે.", "આ પારિસ્થિતિક તંત્રમાં સંખ્યા પિરામિડ ઉલટાવી શકાય નહીં."], "ans": 3, "exp": "ઉર્જા પિરામિડ હંમેશા સીધો જ રહે છે કારણ કે ઉર્જાનું પ્રવાહ એક દિશામાં જ થાય છે અને દરેક પોષક સ્તરે ઉર્જાનું નુકસાન લગભગ 90% થાય છે. જૈવવસ્તુ પિરામિડ જલીય પારિસ્થિતિક તંત્રમાં ઉલટાવી શકાય છે, પરંતુ આ પ્રશ્નમાં તેનો ઉલ્લેખ નથી. સંખ્યા પિરામિડ કેટલાક પારિસ્થિતિક તંત્રોમાં ઉલટાવી શકાય છે, તેથી વિકલ્પ D ખોટો છે.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "એક જંગલના પારિસ્થિતિક તંત્રમાં વૃક્ષો (પ્રાથમિક ઉત્પાદકો)ની સંખ્યા ઓછી છે, પરંતુ તેમનું જૈવવસ્તુ ખૂબ જ વધારે છે. આ પરિસ્થિતિમાં નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["આ પારિસ્થિતિક તંત્રમાં સંખ્યા પિરામિડ ઉલટાવી શકાય છે કારણ કે પ્રાથમિક ઉપભોક્તાઓની સંખ્યા વધુ હોય છે.", "આ પારિસ્થિતિક તંત્રમાં જૈવવસ્તુ પિરામિડ હંમેશા સીધો જ રહે છે કારણ કે વૃક્ષોનું જૈવવસ્તુ વધુ હોય છે.", "આ પારિસ્થિતિક તંત્રમાં ઉર્જા પિરામિડ અને જૈવવસ્તુ પિરામિડ બંને સીધા રહે છે.", "આ પારિસ્થિતિક તંત્રમાં સંખ્યા પિરામિડ ઉલટાવી શકાય છે, પરંતુ ઉર્જા પિરામિડ ક્યારેય ઉલટાવી શકાતો નથી."], "ans": 0, "exp": "જંગલના પારિસ્થિતિક તંત્રમાં વૃક્ષોની સંખ્યા ઓછી હોવા છતાં તેમનું જૈવવસ્તુ વધુ હોવાથી સંખ્યા પિરામિડ ઉલટાવી શકાય છે, પરંતુ આ વિધાનમાં કહેવામાં આવ્યું છે કે સંખ્યા પિરામિડ ઉલટાવી શકાય છે કારણ કે પ્રાથમિક ઉપભોક્તાઓની સંખ્યા વધુ હોય છે, જે ખોટું છે. સંખ્યા પિરામિડ ઉલટાવી શકાય છે કારણ કે પ્રાથમિક ઉત્પાદકોની સંખ્યા ઓછી હોય છે. બાકીના વિધાનો સાચાં છે: જૈવવસ્તુ પિરામિડ સીધો રહે છે, ઉર્જા પિરામિડ સીધો રહે છે અને ઉર્જા પિરામિડ ક્યારેય ઉલટાવી શકાતો નથી.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "એક પારિસ્થિતિક તંત્રમાં, પ્રાથમિક ઉત્પાદકોનું જૈવવસ્તુ 2000 kg છે અને દ્વિતીય ઉપભોક્તાઓનું જૈવવસ્તુ 3000 kg છે. આ સ્થિતિમાં કયું વિધાન સાચું છે?", "opts": ["ઉર્જા પિરામિડ ઉલટાવી શકાય છે", "જૈવવસ્તુ પિરામિડ ઉલટાવી શકાય છે", "સંખ્યા પિરામિડ હંમેશા સીધું જ હોય છે", "ઉર્જા અને જૈવવસ્તુ પિરામિડ બંને ઉલટાવી શકાય છે"], "ans": 1, "exp": "જૈવવસ્તુ પિરામિડમાં, જો દ્વિતીય ઉપભોક્તાઓનું જૈવવસ્તુ પ્રાથમિક ઉત્પાદકો કરતાં વધુ હોય, તો પિરામિડ ઉલટાવી શકાય છે. ઉર્જા પિરામિડ હંમેશા સીધું જ હોય છે કારણ કે ઉર્જાનું સ્થાનાંતરણ એક દિશામાં થાય છે અને તેનો કોઈ ભાગ પાછો વળતો નથી. સંખ્યા પિરામિડ પણ ઉલટાવી શકાય છે, પરંતુ તે હંમેશા સીધું જ હોય છે એવું કહેવું ખોટું છે. તેથી, ફક્ત જૈવવસ્તુ પિરામિડ જ ઉલટાવી શકાય છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર અને પર્યાવરણ", "ch": ""}, {"q": "એક પારિસ્થિતિક તંત્રમાં, પ્રાથમિક ઉત્પાદકોની ઉર્જા 10,000 kJ/m²/વર્ષ છે અને તૃતીય ઉપભોક્તાઓની ઉર્જા 10 kJ/m²/વર્ષ છે. આ સ્થિતિમાં કયું વિધાન સાચું નથી?", "opts": ["ઉર્જા પિરામિડ સીધું જ હોય છે", "જૈવવસ્તુ પિરામિડ ઉલટાવી શકાય છે", "ઉર્જાનું સ્થાનાંતરણ 10% ના દરે થાય છે", "તૃતીય ઉપભોક્તાઓનું જૈવવસ્તુ પ્રાથમિક ઉત્પાદકો કરતાં ઓછું હોઈ શકે છે"], "ans": 2, "exp": "ઉર્જાનું સ્થાનાંતરણ સામાન્ય રીતે 10% ના દરે થતું નથી, પરંતુ તે 1% થી 20% સુધીના દરે થઈ શકે છે. ઉર્જા પિરામિડ હંમેશા સીધું જ હોય છે કારણ કે ઉર્જાનું સ્થાનાંતરણ એક દિશામાં થાય છે. જૈવવસ્તુ પિરામિડ ઉલટાવી શકાય છે, અને તૃતીય ઉપભોક્તાઓનું જૈવવસ્તુ પ્રાથમિક ઉત્પાદકો કરતાં ઓછું હોઈ શકે છે. તેથી, વિધાન C ખોટું છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિક તંત્ર અને પર્યાવરણ", "ch": ""}, {"q": "નીચેના પૈકી કયું ઉદાહરણ પર્યાવરણીય પિરામિડના અપવાદને દર્શાવે છે, જ્યાં સંખ્યા પિરામિડ ઉલટાવી શકાય છે પરંતુ જૈવવસ્તુ પિરામિડ સીધો રહે છે?", "opts": ["એક જંગલનું પારિસ્થિતિક તંત્ર જ્યાં વૃક્ષો (પ્રાથમિક ઉત્પાદકો)ની સંખ્યા ઓછી છે પરંતુ તેમનું જૈવવસ્તુ વધુ છે.", "એક ઘાસના મેદાનનું પારિસ્થિતિક તંત્ર જ્યાં ઘાસ (પ્રાથમિક ઉત્પાદકો)ની સંખ્યા વધુ છે અને તેમનું જૈવવસ્તુ પણ વધુ છે.", "એક જલીય પારિસ્થિતિક તંત્ર જ્યાં ફાયટોપ્લાંકટન (પ્રાથમિક ઉત્પાદકો)ની સંખ્યા ઓછી છે પરંતુ ઝૂપ્લાંકટન (પ્રાથમિક ઉપભોક્તા)ની સંખ્યા વધુ છે.", "એક પરોપજીવી ખોરાક શૃંખલા જ્યાં એક વૃક્ષ પર હજારો કીટકો (પ્રાથમિક ઉપભોક્તા) રહે છે."], "ans": 3, "exp": "સાચો જવાબ વિકલ્પ D છે. પરોપજીવી ખોરાક શૃંખલામાં એક વૃક્ષ (પ્રાથમિક ઉત્પાદક) પર હજારો કીટકો (પ્રાથમિક ઉપભોક્તા) રહે છે, જેના કારણે સંખ્યા પિરામિડ ઉલટાવી શકાય છે. પરંતુ વૃક્ષનું જૈવવસ્તુ કીટકો કરતાં વધુ હોવાથી જૈવવસ્તુ પિરામિડ સીધો રહે છે. વિકલ્પ A ખોટો છે કારણ કે તેમાં સંખ્યા પિરામિડ ઉલટાવી શકાય નહીં. વિકલ્પ B ખોટો છે કારણ કે તેમાં સંખ્યા અને જૈવવસ્તુ બંને પિરામિડ સીધા રહે છે. વિકલ્પ C ખોટો છે કારણ કે તેમાં જૈવવસ્તુ પિરામિડ પણ ઉલટાવી શકાય છે.", "ref": "Std 12 - પ્રકરણ 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "એક પારિસ્થિતિક તંત્રમાં પ્રાથમિક ઉત્પાદકોની ઉર્જા 20,000 kJ/m²/વર્ષ છે. જો દ્વિતીય ઉપભોક્તાઓની ઉર્જા 200 kJ/m²/વર્ષ હોય, તો આ પરિસ્થિતિમાં નીચેના પૈકી કયું વિધાન સાચું નથી?", "opts": ["ઉર્જા પિરામિડ હંમેશા સીધો રહેશે કારણ કે ઉર્જાનું પ્રમાણ ટ્રોફિક સ્તરે ઘટતું જાય છે.", "જો આ પારિસ્થિતિક તંત્ર જલીય હોય, તો જૈવવસ્તુ પિરામિડ ઉલટાવી શકાય છે પરંતુ ઉર્જા પિરામિડ નહીં.", "આ પારિસ્થિતિક તંત્રમાં સંખ્યા પિરામિડ ઉલટાવી શકાય છે જો પ્રાથમિક ઉત્પાદકોની સંખ્યા ઓછી હોય અને દ્વિતીય ઉપભોક્તાઓની સંખ્યા વધુ હોય.", "ઉર્જા પિરામિડ ઉલટાવી શકાય છે જો દ્વિતીય ઉપભોક્તાઓની ઉર્જા પ્રાથમિક ઉત્પાદકો કરતાં વધુ હોય."], "ans": 3, "exp": "સાચો જવાબ વિકલ્પ D છે. ઉર્જા પિરામિડ ક્યારેય ઉલટાવી શકાતો નથી કારણ કે ઉર્જાનું પ્રમાણ ટ્રોફિક સ્તરે ઘટતું જાય છે અને ઉર્જાનું નુકસાન થતું રહે છે. વિકલ્પ A સાચું છે કારણ કે ઉર્જા પિરામિડ હંમેશા સીધો રહે છે. વિકલ્પ B સાચું છે કારણ કે જલીય પારિસ્થિતિક તંત્રમાં જૈવવસ્તુ પિરામિડ ઉલટાવી શકાય છે પરંતુ ઉર્જા પિરામિડ નહીં. વિકલ્પ C સાચું છે કારણ કે સંખ્યા પિરામિડ ઉલટાવી શકાય છે જો પ્રાથમિક ઉત્પાદકોની સંખ્યા ઓછી હોય અને ઉપભોક્તાઓની સંખ્યા વધુ હોય.", "ref": "Std 12 - પ્રકરણ 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "નીચેના પૈકી કયા પારિસ્થિતિક તંત્રમાં સંખ્યા પિરામિડ અને જૈવવસ્તુ પિરામિડ બંને ઉલટાવી શકાય છે?", "opts": ["ઘાસના મેદાનના પારિસ્થિતિક તંત્ર", "જંગલના પારિસ્થિતિક તંત્ર", "તળાવના પારિસ્થિતિક તંત્ર", "મરુભૂમિના પારિસ્થિતિક તંત્ર"], "ans": 2, "exp": "તળાવના પારિસ્થિતિક તંત્રમાં, ફાયટોપ્લાંકટન (પ્રાથમિક ઉત્પાદક)ની સંખ્યા ઓછી હોવા છતાં, તેમનું જૈવવસ્તુ ઓછું હોય છે, જ્યારે ઝૂપ્લાંકટન (પ્રાથમિક ઉપભોક્તા)ની સંખ્યા અને જૈવવસ્તુ બંને વધારે હોઈ શકે છે. આથી, સંખ્યા પિરામિડ અને જૈવવસ્તુ પિરામિડ બંને ઉલટાવી શકાય છે. ઘાસના મેદાન, જંગલ, અને મરુભૂમિના પારિસ્થિતિક તંત્રમાં આ સ્થિતિ દર્શાવી શકાતી નથી, જેથી વિકલ્પ A, B, અને D ખોટા છે.", "ref": "Std 12 - અધ્યાય 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "એક પારિસ્થિતિક તંત્રમાં, પ્રાથમિક ઉત્પાદકોનું જૈવવસ્તુ 1000 kg છે અને દ્વિતીય ઉપભોક્તાઓનું જૈવવસ્તુ 1500 kg છે. તૃતીય ઉપભોક્તાઓનું જૈવવસ્તુ 500 kg છે. આ સ્થિતિમાં કયો પિરામિડ સરખો રહેશે?", "opts": ["ઉર્જા પિરામિડ", "જૈવવસ્તુ પિરામિડ", "સંખ્યા પિરામિડ", "કોઈપણ પિરામિડ સરખો રહેશે નહીં"], "ans": 0, "exp": "ઉર્જા પિરામિડ કદી ઉલટાવી શકાતો નથી અને તે હંમેશા સરખો રહે છે કારણ કે ઉર્જાનું સંક્રમણ એક દિશામાં થાય છે અને 10% નિયમ અનુસાર ઘટે છે. જૈવવસ્તુ પિરામિડ અને સંખ્યા પિરામિડ આ સ્થિતિમાં ઉલટાવી શકાય છે, જેથી વિકલ્પ B, C, અને D ખોટા છે.", "ref": "Std 12 - અધ્યાય 14: પારિસ્થિતિક તંત્ર", "ch": ""}, {"q": "નીચેના વિધાનોને ધ્યાનમાં લો: \n(1) પર્યાવરણીય પિરામિડમાં, ઉર્જા પિરામિડ હંમેશા સીધો જ રહે છે કારણ કે ઉર્જાનું વહન ઉત્પાદકથી ઉપભોક્તા તરફ function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;

  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';

  }).join('');

}

  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
