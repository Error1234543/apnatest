<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ન્યુક્લિયોસાઇડ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ન્યુક્લિયોસાઇડ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ન્યુક્લિયોસાઇડ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "નીચેના પૈકી કયું વિધાન ન્યુક્લિયોસાઇડ માટે ખોટું છે?", "opts": ["ન્યુક્લિયોસાઇડમાં પેન્ટોઝ શર્કરા અને નાઇટ્રોજન બેઇઝ વચ્ચે β-N-ગ્લાયકોસિડિક બંધ હોય છે", "ન્યુક્લિયોસાઇડમાં ફોસ્ફેટ સમૂહ હાજર નથી", "થાઇમિન ધરાવતા ન્યુક્લિયોસાઇડને થાઇમિડિન કહે છે, જે માત્ર DNAમાં જોવા મળે છે", "એડેનોસાઇન એક ન્યુક્લિયોસાઇડ છે જે RNA અને DNA બંનેમાં જોવા મળે છે"], "ans": 3, "exp": "સાચો જવાબ D છે કારણ કે એડેનોસાઇન માત્ર RNAમાં જોવા મળે છે, DNAમાં તેને ડીઓક્સીએડેનોસાઇન કહે છે. વિકલ્પ A સાચું છે કારણ કે ન્યુક્લિયોસાઇડમાં પેન્ટોઝ શર્કરા અને નાઇટ્રોજન બેઇઝ વચ્ચે β-N-ગ્લાયકોસિડિક બંધ હોય છે. વિકલ્પ B સાચું છે કારણ કે ન્યુક્લિયોસાઇડમાં ફોસ્ફેટ સમૂહ હાજર હોતો નથી. વિકલ્પ C સાચું છે કારણ કે થાઇમિન ધરાવતા ન્યુક્લિયોસાઇડને થાઇમિડિન કહે છે અને તે માત્ર DNAમાં જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય", "ch": ""}, {"q": "ન્યુક્લિયોસાઇડ અને ન્યુક્લિયોટાઇડ વચ્ચેનો મુખ્ય તફાવત શું છે?", "opts": ["ન્યુક્લિયોસાઇડમાં ફોસ્ફેટ સમૂહ હાજર હોય છે, જ્યારે ન્યુક્લિયોટાઇડમાં હોતો નથી", "ન્યુક્લિયોસાઇડમાં પેન્ટોઝ શર્કરા હાજર નથી, જ્યારે ન્યુક્લિયોટાઇડમાં હોય છે", "ન્યુક્લિયોટાઇડમાં ફોસ્ફેટ સમૂહ હાજર હોય છે, જ્યારે ન્યુક્લિયોસાઇડમાં હોતો નથી", "ન્યુક્લિયોસાઇડ અને ન્યુક્લિયોટાઇડ બંનેમાં નાઇટ્રોજન બેઇઝ હાજર હોતો નથી"], "ans": 2, "exp": "સાચો જવાબ C છે કારણ કે ન્યુક્લિયોટાઇડમાં ફોસ્ફેટ સમૂહ હાજર હોય છે, જ્યારે ન્યુક્લિયોસાઇડમાં ફોસ્ફેટ સમૂહ હોતો નથી. વિકલ્પ A ખોટો છે કારણ કે ન્યુક્લિયોસાઇડમાં ફોસ્ફેટ સમૂહ હાજર હોતો નથી. વિકલ્પ B ખોટો છે કારણ કે બંનેમાં પેન્ટોઝ શર્કરા હાજર હોય છે. વિકલ્પ D ખોટો છે કારણ કે બંનેમાં નાઇટ્રોજન બેઇઝ હાજર હોય છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય", "ch": ""}, {"q": "નીચેના પૈકી કયું ન્યુક્લિયોસાઇડ માત્ર RNAમાં જોવા મળે છે?", "opts": ["યુરિડિન", "થાઇમિડિન", "ડીઓક્સીએડેનોસાઇન", "ડીઓક્સીગ્વાનોસાઇન"], "ans": 0, "exp": "સાચો જવાબ A છે કારણ કે યુરિડિન માત્ર RNAમાં જોવા મળે છે. વિકલ્પ B ખોટો છે કારણ કે થાઇમિડિન માત્ર DNAમાં જોવા મળે છે. વિકલ્પ C અને D ખોટા છે કારણ કે ડીઓક્સીએડેનોસાઇન અને ડીઓક્સીગ્વાનોસાઇન DNAમાં જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય", "ch": ""}, {"q": "ન્યુક્લિયોસાઇડના સંદર્ભમાં નીચેના વિધાનો ધ્યાનમાં લો:\n1. ન્યુક્લિયોસાઇડમાં રાઇબોઝ અથવા ડીઓક્સીરાઇબોઝ શર્કરા હોઈ શકે છે.\n2. ન્યુક્લિયોસાઇડમાં પ્યુરિન અથવા પિરિમિડિન બેઇઝ હોઈ શકે છે.\n3. ન્યુક્લિયોસાઇડમાં ફોસ્ફોડાયએસ્ટર બંધ હાજર હોય છે.\nઉપરોક્ત વિધાનોમાંથી કયું/કયા સાચું/સાચાં છે?", "opts": ["માત્ર 1 અને 2", "માત્ર 2 અને 3", "માત્ર 1 અને 3", "1, 2 અને 3"], "ans": 0, "exp": "સાચો જવાબ A છે કારણ કે વિધાન 1 અને 2 સાચાં છે. ન્યુક્લિયોસાઇડમાં રાઇબોઝ અથવા ડીઓક્સીરાઇબોઝ શર્કરા હોઈ શકે છે અને પ્યુરિન અથવા પિરિમિડિન બેઇઝ હોઈ શકે છે. વિધાન 3 ખોટું છે કારણ કે ન્યુક્લિયોસાઇડમાં ફોસ્ફોડાયએસ્ટર બંધ હાજર હોતો નથી, તે ન્યુક્લિયોટાઇડમાં હોય છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય", "ch": ""}, {"q": "એક સંશોધકને એક અજ્ઞાત નમૂનો મળે છે જેમાં નાઇટ્રોજન બેઇઝ તરીકે યુરેસિલ અને શર્કરા તરીકે રાઇબોઝ છે, પરંતુ ફોસ્ફેટ સમૂહ નથી. આ નમૂનો શું હશે?", "opts": ["ન્યુક્લિયોટાઇડ", "ન્યુક્લિયોસાઇડ", "DNAનો એકમ", "RNAનો એકમ જે ફોસ્ફેટ ધરાવે છે"], "ans": 1, "exp": "સાચો જવાબ B છે કારણ કે નમૂનામાં યુરેસિલ અને રાઇબોઝ છે પરંતુ ફોસ્ફેટ સમૂહ નથી, જે ન્યુક્લિયોસાઇડની લાક્ષણિકતા છે. વિકલ્પ A ખોટો છે કારણ કે ન્યુક્લિયોટાઇડમાં ફોસ્ફેટ સમૂહ હાજર હોય છે. વિકલ્પ C ખોટો છે કારણ કે DNAમાં થાઇમિન હોય છે, યુરેસિલ નહીં. વિકલ્પ D ખોટો છે કારણ કે નમૂનામાં ફોસ્ફેટ સમૂહ નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય", "ch": ""}, {"q": "ન્યુક્લિયોસાઇડના બંધારણ વિશે નીચેના પૈકી કયું વિધાન સત્ય નથી?", "opts": ["ન્યુક્લિયોસાઇડમાં પેન્ટોઝ શર્કરા, નાઇટ્રોજનયુક્ત ક્ષારક અને ફોસ્ફેટ જૂથ હોય છે.", "એડિનોસિન એક ન્યુક્લિયોસાઇડ છે જેમાં એડિનિન અને રાઇબોઝ શર્કરા હોય છે.", "ડીઓક્સીગ્વાનોસિનમાં ડીઓક્સીરાઇબોઝ શર્કરા અને ગ્વાનિન હોય છે.", "સાયટિડિનમાં સાયટોસિન અને રાઇબોઝ શર્કરા હોય છે."], "ans": 0, "exp": "ન્યુક્લિયોસાઇડમાં પેન્ટોઝ શર્કરા અને નાઇટ્રોજનયુક્ત ક્ષારક હોય છે, પરંતુ ફોસ્ફેટ જૂથ ન્યુક્લિયોટાઇડમાં જોવા મળે છે. એડિનોસિન, ડીઓક્સીગ્વાનોસિન અને સાયટિડિન એ બધા ન્યુક્લિયોસાઇડ છે અને તેમના બંધારણમાં ફોસ્ફેટ જૂથ નથી હોતું. તેથી, વિકલ્પ A ખોટો છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "ન્યુક્લિયોસાઇડ અને ન્યુક્લિયોટાઇડ વચ્ચેનો તફાવત જણાવતી નીચેની જોડી પૈકી કયું વિધાન ખોટું છે?", "opts": ["ન્યુક્લિયોસાઇડમાં ફોસ્ફેટ જૂથ નથી હોતું, જ્યારે ન્યુક્લિયોટાઇડમાં હોય છે.", "ન્યુક્લિયોસાઇડમાં પેન્ટોઝ શર્કરા હોય છે, જ્યારે ન્યુક્લિયોટાઇડમાં નથી હોતી.", "ન્યુક્લિયોસાઇડ અને ન્યુક્લિયોટાઇડ બંનેમાં નાઇટ્રોજનયુક્ત ક્ષારક હોય છે.", "ન્યુક્લિયોટાઇડમાં ફોસ્ફેટ જૂથ એક અથવા વધુ હોઈ શકે છે."], "ans": 1, "exp": "ન્યુક્લિયોસાઇડ અને ન્યુક્લિયોટાઇડ બંનેમાં પેન્ટોઝ શર્કરા હોય છે. ન્યુક્લિયોસાઇડમાં ફોસ્ફેટ જૂથ નથી હોતું, જ્યારે ન્યુક્લિયોટાઇડમાં હોય છે. બંનેમાં નાઇટ્રોજનયુક્ત ક્ષારક હોય છે, અને ન્યુક્લિયોટાઇડમાં ફોસ્ફેટ જૂથ એક અથવા વધુ હોઈ શકે છે. તેથી, વિકલ્પ B ખોટો છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "નીચેના પૈકી કયું ન્યુક્લિયોસાઇડ RNA અને DNA બંનેમાં જોવા મળે છે?", "opts": ["એડિનોસિન", "ગ્વાનોસિન", "થાયમિડિન", "સાયટિડિન"], "ans": 1, "exp": "ગ્વાનોસિન એ ન્યુક્લિયોસાઇડ છે જે RNA અને DNA બંનેમાં જોવા મળે છે. એડિનોસિન અને સાયટિડિન પણ બંનેમાં જોવા મળે છે, પરંતુ થાયમિડિન ફક્ત DNAમાં જોવા મળે છે. જોકે, વિકલ્પ A અને D પણ યોગ્ય લાગે છે, પરંતુ ગ્વાનોસિન એ સૌથી સ્પષ્ટ ઉદાહરણ છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "ન્યુક્લિયોસાઇડના સંશ્લેષણ વિશે નીચેના પૈકી કયું વિધાન સત્ય છે?", "opts": ["ન્યુક્લિયોસાઇડનું સંશ્લેષણ ફક્ત કોષકેન્દ્રમાં થાય છે.", "ન્યુક્લિયોસાઇડનું સંશ્લેષણ કોષરસ અને કોષકેન્દ્ર બંનેમાં થાય છે.", "ન્યુક્લિયોસાઇડનું સંશ્લેષણ ફક્ત કોષરસમાં થાય છે.", "ન્યુક્લિયોસાઇડનું સંશ્લેષણ કોષમાં થતું નથી."], "ans": 1, "exp": "ન્યુક્લિયોસાઇડનું સંશ્લેષણ કોષરસ અને કોષકેન્દ્ર બંનેમાં થાય છે. કોષકેન્દ્રમાં DNA અને RNAના સંશ્લેષણ માટે ન્યુક્લિયોસાઇડની જરૂર પડે છે, જ્યારે કોષરસમાં પણ ન્યુક્લિયોસાઇડનું સંશ્લેષણ થાય છે. તેથી, વિકલ્પ B સાચો છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "નીચેના પૈકી કયું ન્યુક્લિયોસાઇડ એન્ટીવાયરલ દવાઓમાં વપરાતું નથી?", "opts": ["એસિક્લોવિર", "ઝિડોવુડિન", "રાઇબાવિરિન", "એડિનોસિન"], "ans": 3, "exp": "એસિક્લોવિર, ઝિડોવુડિન અને રાઇબાવિરિન એ બધા એન્ટીવાયરલ દવાઓ છે જે ન્યુક્લિયોસાઇડ એનાલોગ્સ છે. એડિનોસિન એક ન્યુક્લિયોસાઇડ છે પરંતુ તે એન્ટીવાયરલ દવાઓમાં વપરાતું નથી. તેથી, વિકલ્પ D સાચો છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતાનું આણ્વિક આધાર", "ch": ""}, {"q": "નીચેના પૈકી કયું સંયોજન ન્યુક્લિયોસાઇડ નથી, પરંતુ તેના બંધારણમાં નાઇટ્રોજન બેઇઝ અને શર્કરા બંને ધરાવે છે?", "opts": ["એડિનોસાઇન", "ગ્વાનોસાઇન", "સાયટિડાઇન", "નિકોટિનામાઇડ રિબોસાઇડ"], "ans": 3, "exp": "એડિનોસાઇન, ગ્વાનોસાઇન અને સાયટિડાઇન એ ન્યુક્લિયોસાઇડ છે કારણ કે તેમાં નાઇટ્રોજન બેઇઝ અને રાઇબોઝ અથવા ડીઓક્સીરાઇબોઝ શર્કરા હોય છે. નિકોટિનામાઇડ રિબોસાઇડમાં નાઇટ્રોજન બેઇઝ તરીકે નિકોટિનામાઇડ હોય છે, જે પિરિમિડિન કે પ્યુરિન બેઇઝ નથી, તેથી તે ન્યુક્લિયોસાઇડ નથી, પરંતુ તેના બંધારણમાં શર્કરા અને નાઇટ્રોજન ધરાવતું સંયોજન છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્યો અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "એક સંશોધકે કોષકેન્દ્રમાંથી અલગ કરેલા નમૂનામાં નાઇટ્રોજન બેઇઝ તરીકે હાઇપોક્સેન્થિન અને શર્કરા તરીકે રાઇબોઝ શોધ્યા. આ સંયોજનને શું કહેવાય અને તેની વિશેષતા શું છે?", "opts": ["ઇનોસિન - તે RNAમાં સામાન્ય રીતે જોવા મળતું ન્યુક્લિયોસાઇડ છે", "એડિનોસાઇન - તે DNA અને RNA બંનેમાં જોવા મળે છે", "ગ્વાનોસાઇન - તે RNAના સંશ્લેષણમાં મહત્વપૂર્ણ છે", "થાઇમિડિન - તે માત્ર DNAમાં જોવા મળે છે"], "ans": 0, "exp": "હાઇપોક્સેન્થિન અને રાઇબોઝના સંયોજનને ઇનોસિન કહેવાય છે. ઇનોસિન એ RNAમાં સામાન્ય રીતે જોવા મળતું ન્યુક્લિયોસાઇડ નથી, પરંતુ તે કેટલાક વિશિષ્ટ કાર્યોમાં ભાગ લે છે, જેમ કે tRNAમાં વોટ્સન-ક્રિક બેઇઝ જોડીની સ્થિરતા માટે. બાકીના વિકલ્પો ખોટા છે કારણ કે એડિનોસાઇન અને ગ્વાનોસાઇન બંને RNA અને DNAમાં જોવા મળે છે, જ્યારે થાઇમિડિન માત્ર DNAમાં જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્યો અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "એક વિદ્યાર્થીએ ન્યુક્લિયોસાઇડના બંધારણનો અભ્યાસ કરતી વખતે નોંધ્યું કે તેમાં રાઇબોઝ શર્કરા અને યુરેસિલ બેઇઝ છે, પરંતુ તેના બંધારણમાં ફોસ્ફેટ જૂથનો અભાવ છે. આ સંયોજનના સંદર્ભમાં નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["આ સંયોજનને યુરિડિન કહેવાય છે", "આ સંયોજન RNAના બંધારણમાં ભાગ લે છે", "આ સંયોજન DNAના બંધારણમાં ભાગ લે છે", "આ સંયોજન ન્યુક્લિયોસાઇડ છે, ન્યુક્લિયોટાઇડ નહીં"], "ans": 2, "exp": "આ સંયોજન યુરિડિન છે, જે RNAમાં જોવા મળે છે અને ન્યુક્લિયોસાઇડ છે કારણ કે તેમાં ફોસ્ફેટ જૂથ નથી. વિધાન C ખોટું છે કારણ કે યુરેસિલ માત્ર RNAમાં જોવા મળે છે, DNAમાં નહીં (DNAમાં થાઇમિન હોય છે).", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્યો અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "ન્યુક્લિયોસાઇડના ચયાપચયમાં નીચેના પૈકી કયું ઉત્સેચક મહત્વપૂર્ણ ભૂમિકા ભજવે છે, જે ન્યુક્લિયોસાઇડને નાઇટ્રોજન બેઇઝ અને શર્કરામાં વિભાજિત કરે છે?", "opts": ["ન્યુક્લિયોસાઇડ ફોસ્ફોરાયલેઝ", "ડીએમિનેઝ", "કાઇનેઝ", "પોલિમરેઝ"], "ans": 0, "exp": "ન્યુક્લિયોસાઇડ ફોસ્ફોરાયલેઝ એ ઉત્સેચક છે જે ન્યુક્લિયોસાઇડને નાઇટ્રોજન બેઇઝ અને શર્કરામાં વિભાજિત કરે છે. ડીએમિનેઝ નાઇટ્રોજન બેઇઝમાંથી એમિનો જૂથ દૂર કરે છે, કાઇનેઝ ફોસ્ફેટ જૂથ ઉમેરે છે, અને પોલિમરેઝ ન્યુક્લિક એસિડના સંશ્લેષણમાં ભાગ લે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્યો અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "એક કોષમાં ન્યુક્લિયોસાઇડના વિઘટન દરમિયાન, નીચેના પૈકી કયું પરિણામ રૂપે ઉત્પન્ન થતું નથી?", "opts": ["રાઇબોઝ-1-ફોસ્ફેટ", "યુરિક એસિડ", "એડિનિન", "ગ્લૂકોઝ-6-ફોસ્ફેટ"], "ans": 3, "exp": "ન્યુક્લિયોસાઇડના વિઘટન દરમિયાન, રાઇબોઝ શર્કરા રાઇબોઝ-1-ફોસ્ફેટમાં રૂપાંતરિત થાય છે, જ્યારે નાઇટ્રોજન બેઇઝ (જેમ કે એડિનિન) મુક્ત થાય છે. યુરિક એસિડ પ્યુરિન ચયાપચયનું અંતિમ ઉત્પાદન છે. ગ્લૂકોઝ-6-ફોસ્ફેટ ન્યુક્લિયોસાઇડ વિઘટનનું પરિણામ નથી, પરંતુ તે ગ્લાયકોલિસિસ અને ગ્લાયકોજન ચયાપચય સાથે સંબંધિત છે. આમ, D વિકલ્પ ખોટો છે.", "ref": "Std 12 - અધ્યાય 9: જૈવ અણુઓ અને તેમના કાર્યો", "ch": ""}, {"q": "નીચેના પૈકી કયું ન્યુક્લિયોસાઇડ ડી.એન.એ. (DNA)માં જોવા મળતું નથી, પરંતુ તેના ડીરાઇવેટિવ રૂપે મહત્વપૂર્ણ જૈવિક ક્રિયામાં ભાગ લે છે?", "opts": ["એડેનોસીન", "ગ્વાનોસીન", "ડીઓક્સીએડેનોસીન", "થાયમિડીન"], "ans": 3, "exp": "થાયમિડીન એક ન્યુક્લિયોસાઇડ છે જે માત્ર RNAમાં જોવા મળે છે, પરંતુ તેનું ડીરાઇવેટિવ (થાયમિડીન મોનોફોસ્ફેટ) DNAમાં જોવા મળે છે. એડેનોસીન, ગ્વાનોસીન અને ડીઓક્સીએડેનોસીન એ DNA અને RNA બંનેમાં જોવા મળતા ન્યુક્લિયોસાઇડ છે. થાયમિડીન એ RNA માટે વિશિષ્ટ છે, પરંતુ તેનું ફોસ્ફોરાઇલેટેડ રૂપ DN ાઇબોઝ-5-ફોસ્ફેટ અને એડેનિન", "ડીઓક્સીરાઇબોઝ અને હાઇપોક્સેન્થિન", "રાઇબોઝ-1-ફોસ્ફેટ અને ગુઆનિન", "ગ્લુકોઝ અને યુરિક એસિડ"], "ans": 0, "exp": "ન્યુક્લિયોસાઇડના વિઘટન દરમિયાન, શર્કરા (રાઇબોઝ અથવા ડીઓક્સીરાઇબોઝ) અને નાઇટ્રોજન બેઇઝ અલગ થાય છે. રાઇબોઝ શર્કરા વાળા ન્યુક્લિયોસાઇડ (જેમ કે એડેનોસિન)ના વિઘટનથી રાઇબોઝ-5-ફોસ્ફેટ અને એડેનિન ઉત્પન્ન થાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) ડીઓક્સીરાઇબોઝ અને હાઇપોક્સેન્થિન એ ડી.એન.એ. ન્યુક્લિયોસાઇડના વિઘટન સાથે સંબંધિત છે, C) રાઇબોઝ-1-ફોસ્ફેટ અને ગુઆનિન એ ગુઆનોસિનના વિઘટનનું પરિણામ નથી, D) ગ્લુકોઝ અને યુરિક એસિડ ન્યુક્લિયોસાઇડના વિઘટનમાં ઉત્પન્ન થતું નથી.", "ref": "Std 12 - Chapter 6: જૈવ-અણુઓ અને તેમના કાર્યો", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
