<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rh પરિબળ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Rh પરિબળ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Rh પરિબળ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "Rh પરિબળની શોધ કયા વૈજ્ઞાનિકે કરી હતી અને તે કયા પ્રયોગ દરમ્યાન શોધાયું હતું?", "opts": ["લેન્ડસ્ટેઇનર અને વીનરે, માનવ રક્તના અભ્યાસ દરમ્યાન", "કાર્લ લેન્ડસ્ટેઇનરે, રીસસ વાનરના રક્તના અભ્યાસ દરમ્યાન", "એલેક્સાન્ડર વીનરે, માનવ અને રીસસ વાનરના રક્તના તુલનાત્મક અભ્યાસ દરમ્યાન", "લેન્ડસ્ટેઇનર અને વીનરે, રીસસ વાનરના રક્તના અભ્યાસ દરમ્યાન"], "ans": 3, "exp": "Rh પરિબળની શોધ લેન્ડસ્ટેઇનર અને વીનરે ૧૯૪૦માં રીસસ વાનર (Rhesus monkey)ના રક્તના અભ્યાસ દરમ્યાન કરી હતી. A વિકલ્પ ખોટો છે કારણ કે શોધ માનવ રક્તના અભ્યાસ દરમ્યાન થઈ નહોતી. B વિકલ્પ અધૂરો છે કારણ કે શોધ ફક્ત લેન્ડસ્ટેઇનરે એકલા કરી નહોતી. C વિકલ્પ ખોટો છે કારણ કે શોધ માનવ અને રીસસ વાનરના તુલનાત્મક અભ્યાસ દરમ્યાન થઈ નહોતી.", "ref": "Std 12 - Chapter 10: અનુવંશિકતા અને વંશપરંપરાગત રોગો", "ch": ""}, {"q": "Rh-નેગેટિવ વ્યક્તિમાં Rh-પોઝિટિવ રક્ત ચડાવવાથી કયા પ્રકારની પ્રતિક્રિયા થાય છે અને તેનું કારણ શું છે?", "opts": ["હેમોલાઇસિસ, કારણ કે Rh-નેગેટિવ વ્યક્તિમાં Rh એન્ટિજન વિરુદ્ધ એન્ટિબોડી બનાવવામાં આવે છે", "એલર્જી, કારણ કે Rh એન્ટિજન વિરુદ્ધ IgE એન્ટિબોડી બનાવવામાં આવે છે", "ગંભીર એનાફિલેક્સિસ, કારણ કે Rh એન્ટિજન વિરુદ્ધ IgG એન્ટિબોડી તાત્કાલિક બનાવવામાં આવે છે", "કોઈ પ્રતિક્રિયા થતી નથી, કારણ કે Rh એન્ટિજન માનવ શરીરમાં પ્રતિક્રિયા ઉત્પન્ન કરતું નથી"], "ans": 0, "exp": "Rh-નેગેટિવ વ્યક્તિમાં Rh-પોઝિટિવ રક્ત ચડાવવાથી હેમોલાઇસિસ થાય છે, કારણ કે Rh-નેગેટિવ વ્યક્તિમાં Rh એન્ટિજન વિરુદ્ધ એન્ટિબોડી (IgG) બનાવવામાં આવે છે, જે પછીથી Rh-પોઝિટિવ રક્ત કણોને નષ્ટ કરે છે. B વિકલ્પ ખોટો છે કારણ કે એલર્જી માટે IgE એન્ટિબોડી જવાબદાર હોય છે, પરંતુ Rh એન્ટિજન વિરુદ્ધ IgG એન્ટિબોડી બનાવવામાં આવે છે. C વિકલ્પ ખોટો છે કારણ કે એનાફિલેક્સિસ તાત્કાલિક પ્રતિક્રિયા નથી, પરંતુ હેમોલાઇસિસ ધીમે ધીમે થાય છે. D વિકલ્પ ખોટો છે કારણ કે Rh એન્ટિજન પ્રતિક્રિયા ઉત્પન્ન કરે છે.", "ref": "Std 12 - Chapter 10: અનુવંશિકતા અને વંશપરંપરાગત રોગો", "ch": ""}, {"q": "Rh પરિબળની અનુવંશિકતા કયા પ્રકારની છે અને તે કયા વર્ણસૂત્ર પર આવેલું છે?", "opts": ["સહપ્રભાવી, વર્ણસૂત્ર ૧ પર", "પ્રભાવી, વર્ણસૂત્ર ૪ પર", "અપ્રભાવી, વર્ણસૂત્ર ૯ પર", "સહપ્રભાવી, વર્ણસૂત્ર ૧૯ પર"], "ans": 1, "exp": "Rh પરિબળની અનુવંશિકતા પ્રભાવી (Dominant) છે અને તે વર્ણસૂત્ર ૪ (Chromosome 4) પર આવેલું છે. A વિકલ્પ ખોટો છે કારણ કે Rh પરિબળ સહપ્રભાવી (Co-dominant) નથી. C વિકલ્પ ખોટો છે કારણ કે Rh પરિબળ અપ્રભાવી (Recessive) નથી અને વર્ણસૂત્ર ૯ પર આવેલું નથી. D વિકલ્પ ખોટો છે કારણ કે Rh પરિબળ વર્ણસૂત્ર ૧૯ પર આવેલું નથી.", "ref": "Std 12 - Chapter 10: અનુવંશિકતા અને વંશપરંપરાગત રોગો", "ch": ""}, {"q": "Rh-નેગેટિવ માતાના ગર્ભમાં Rh-પોઝિટિવ ભ્રૂણ હોવાને કારણે કયો રોગ થઈ શકે છે અને તે કયા સમયગાળા દરમ્યાન થાય છે?", "opts": ["હીમોફિલિયા, જન્મ પછી", "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસ, ગર્ભાવસ્થા દરમ્યાન અથવા જન્મ પછી", "થેલેસેમિયા, ગર્ભાવસ્થા દરમ્યાન", "સિકલ સેલ એનિમિયા, જન્મ પછી"], "ans": 1, "exp": "Rh-નેગેટિવ માતાના ગર્ભમાં Rh-પોઝિટિવ ભ્રૂણ હોવાને કારણે એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસ (Erythroblastosis fetalis) થઈ શકે છે, જે ગર્ભાવસ્થા દરમ્યાન અથવા જન્મ પછી થાય છે. A વિકલ્પ ખોટો છે કારણ કે હીમોફિલિયા Rh પરિબળ સાથે સંબંધિત નથી. C વિકલ્પ ખોટો છે કારણ કે થેલેસેમિયા Rh પરિબળ સાથે સંબંધિત નથી. D વિકલ્પ ખોટો છે કારણ કે સિકલ સેલ એનિમિયા Rh પરિબળ સાથે સંબંધિત નથી.", "ref": "Std 12 - Chapter 10: અનુવંશિકતા અને વંશપરંપરાગત રોગો", "ch": ""}, {"q": "Rh એન્ટિજન કયા પ્રકારનું પ્રોટીન છે અને તે કોષના કયા ભાગમાં આવેલું છે?", "opts": ["ગ્લાયકોપ્રોટીન, કોષના કોષકલા પર", "લિપોપ્રોટીન, કોષના કોષકેન્દ્ર પર", "ગ્લાયકોપ્રોટીન, કોષના કોષરસમાં", "લિપિડ, કોષના કોષકલા પર"], "ans": 0, "exp": "Rh એન્ટિજન એક ગ્લાયકોપ્રોટીન (Glycoprotein) છે અને તે કોષના કોષકલા (Cell membrane) પર આવેલું છે. B વિકલ્પ ખોટો છે કારણ કે Rh એન્ટિજન લિપોપ્રોટીન નથી અને કોષકેન્દ્ર પર આવેલું નથી. C વિકલ્પ ખોટો છે કારણ કે Rh એન્ટિજન કોષરસમાં આવેલું નથી. D વિકલ્પ ખોટો છે કારણ કે Rh એન્ટિજન લિપિડ નથી.", "ref": "Std 12 - Chapter 10: અનુવંશિકતા અને વંશપરંપરાગત રોગો", "ch": ""}, {"q": "Rh પરિબળની પ્રતિક્રિયામાં, Rh-નેગેટિવ વ્યક્તિના રક્તમાં પ્રથમ વખત Rh-પોઝિટિવ રક્ત ચડાવવાથી કયું પદાર્થ સર્જાય છે, જે પછીથી દ્વિતીય સંસર્ગ દરમ્યાન પ્રતિક્રિયા તીવ્ર બનાવે છે?", "opts": ["Rh એન્ટિજન", "IgM પ્રકારના એન્ટિબોડી", "IgG પ્રકારના એન્ટિબોડી", "કોમ્પ્લિમેન્ટ પ્રોટીન"], "ans": 1, "exp": "Rh-નેગેટિવ વ્યક્તિના રક્તમાં પ્રથમ વખત Rh-પોઝિટિવ રક્ત ચડાવવાથી IgM પ્રકારના એન્ટિબોડી સર્જાય છે. આ એન્ટિબોડી પ્રાથમિક પ્રતિક્રિયા તરીકે કામ કરે છે, પરંતુ દ્વિતીય સંસર્ગ દરમ્યાન IgG પ્રકારના એન્ટિબોડી સર્જાય છે, જે તીવ્ર પ્રતિક્રિયા માટે જવાબદાર હોય છે. IgM એન્ટિબોડી પ્રથમ પ્રતિક્રિયામાં બનતા હોવાથી બરાબર જવાબ છે. IgG એન્ટિબોડી દ્વિતીય પ્રતિક્રિયામાં બનતા હોવાથી, IgA અથવા કોમ્પ્લિમેન્ટ પ્રોટીન અહીં પ્રસ્તુત પ્રશ્નમાં લાગુ પડતા નથી.", "ref": "Std 12 - Chapter 10: મનુષ્યમાં પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "Rh અસંગતતા ધરાવતા નવજાત શિશુમાં હિમોલાઇટિક રોગ થવાનું મુખ્ય કારણ કયું છે?", "opts": ["માતાના IgM એન્ટિબોડી ભ્રૂણના રક્તમાં પસાર થવા", "માતાના IgG એન્ટિબોડી ભ્રૂણના રક્તમાં પસાર થવા અને Rh એન્ટિજન સાથે પ્રતિક્રિયા કરવા", "ભ્રૂણના Rh એન્ટિજન માતાના રક્તમાં પસાર થવા", "માતાના કોમ્પ્લિમેન્ટ પ્રોટીન ભ્રૂણના રક્તમાં પસાર થવા"], "ans": 1, "exp": "Rh અસંગતતા ધરાવતા નવજાત શિશુમાં હિમોલાઇટિક રોગ થવાનું મુખ્ય કારણ માતાના IgG એન્ટિબોડી ભ્રૂણના રક્તમાં પસાર થવું છે. આ IgG એન્ટિબોડી ભ્રૂણના Rh એન્ટિજન સાથે પ્રતિક્રિયા કરે છે, જેના કારણે રક્ત કોષોનો નાશ થાય છે. IgM એન્ટિબોડી પ્લેસેન્ટા દ્વારા પસાર થતાં નથી, જ્યારે કોમ્પ્લિમેન્ટ પ્રોટીન અહીં પ્રાથમિક કારણ નથી.", "ref": "Std 12 - Chapter 10: મનુષ્યમાં પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "Rh પરિબળની અનુવંશિકતામાં, જો પિતા Rh-પોઝિટિવ (Dd) અને માતા Rh-નેગેટિવ (dd) હોય, તો તેમના સંતાનમાં Rh-પોઝિટિવ હોવાની સંભાવના કેટલી છે?", "opts": ["25%", "50%", "75%", "100%"], "ans": 1, "exp": "પિતા Rh-પોઝિટિવ (Dd) અને માતા Rh-નેગેટિવ (dd) હોય ત્યારે, સંતાનમાં Rh-પોઝિટિવ હોવાની સંભાવના 50% છે. પિતા પાસે D અથવા d જનીન હોઈ શકે, જ્યારે માતા પાસે ફક્ત d જનીન હોય છે. આથી, સંતાનમાં Dd (Rh-પોઝિટિવ) અથવા dd (Rh-નેગેટિવ) જનીન સંયોજન હોઈ શકે, જે 50% સંભાવના દર્શાવે છે.", "ref": "Std 12 - Chapter 3: અનુવંશિકતા અને વૈવિધ્યતાનાં સિદ્ધાંતો", "ch": ""}, {"q": "Rh એન્ટિજનની હાજરી અથવા ગેરહાજરી નક્કી કરવા માટે કયો પરીક્ષણ પદ્ધતિ વપરાય છે?", "opts": ["એલીસા (ELISA)", "કૂમ્બ્સ ટેસ્ટ (Coombs Test)", "વેસ્ટરન બ્લોટ (Western Blot)", "પોલીમરેઝ ચેઇન રિએક્શન (PCR)"], "ans": 1, "exp": "Rh એન્ટિજનની હાજરી અથવા ગેરહાજરી નક્કી કરવા માટે કૂમ્બ્સ ટેસ્ટ (Coombs Test) વપરાય છે. આ પરીક્ષણ Rh એન્ટિબોડી શોધવા માટે વપરાય છે, જે Rh એન્ટિજન સાથે પ્રતિક્રિયા કરે છે. એલીસા, વેસ્ટરન બ્લોટ, અને PCR અન્ય પ્રકારના પરીક્ષણો છે, જે અહીં લાગુ પડતા નથી.", "ref": "Std 12 - Chapter 10: મનુષ્યમાં પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "Rh-નેગેટિવ વ્યક્તિને Rh-પોઝિટિવ રક્ત ચડાવવા પર, પ્રથમ વખત કોઈ પ્રતિક્રિયા દેખાતી નથી, પરંતુ દ્વિતીય વખતે તીવ્ર પ્રતિક્રિયા થાય છે. આનું કારણ કયું છે?", "opts": ["પ્રથમ વખતે IgG એન્ટિબોડી બનતા નથી, પરંતુ દ્વિતીય વખતે બને છે", "પ્રથમ વખતે IgM એન્ટિબોડી બને છે, જે દ્વિતીય વખતે IgG એન્ટિબોડી બનવાનું કારણ બને છે", "પ્રથમ વખતે કોમ્પ્લિમેન્ટ પ્રોટીન સક્રિય થતું નથી, પરંતુ દ્વિતીય વખતે થાય છે", "પ્રથમ વખતે Rh એન્ટિજન નાશ પામે છે, જ્યારે દ્વિતીય વખતે તે સંગ્રહિત રહે છે"], "ans": 1, "exp": "પ્રથમ વખત Rh-પોઝિટિવ રક્ત ચડાવવાથી IgM એન્ટિબોડી બને છે, જે પ્રાથમિક પ્રતિક્રિયા તરીકે કામ કરે છે. દ્વિતીય વખતે, આ IgM એન્ટિબોડીના કારણે IgG એન્ટિબોડી બને છે, જે તીવ્ર પ્રતિક્રિયા માટે જવાબદાર હોય છે. આથી, પ્રથમ વખતે IgM એન્ટિબોડી બનવા અને દ્વિતીય વખતે IgG એન્ટિબોડી બનવાનું કારણ છે. કોમ્પ્લિમેન્ટ પ્રોટીન અથવા Rh એન્ટિજનનો નાશ અહીં લાગુ પડતા નથી.", "ref": "Std 12 - Chapter 10: મનુષ્યમાં પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "Rh પરિબળની અનુવંશિકતામાં, જો પિતા અને માતા બંને Rh-પોઝિટિવ (Dd) હોય, તો તેમના સંતાનમાં Rh-નેગેટિવ (dd) જન્યુક્રમ થવાની શક્યતા કેટલી છે?", "opts": ["0%", "25%", "50%", "75%"], "ans": 1, "exp": "પિતા અને માતા બંને Rh-પોઝિટિવ (Dd) હોય તો તેમના ગેમેટ્સમાં D અને d એલિલ્સ હાજર રહેશે. સંતાનમાં dd જન્યુક્રમ થવા માટે બંને ગેમેટ્સમાં d એલિલ હોવો જરૂરી છે. Punnett square મુજબ, Dd x Dd ક્રોસમાં 25% સંતાનો dd (Rh-નેગેટિવ) હશે. A) 0% ખોટું છે કારણ કે dd જન્યુક્રમ શક્ય છે. C) 50% ખોટું છે કારણ કે તે DD અથવા Dd માટેની શક્યતા છે. D) 75% ખોટું છે કારણ કે તે D_ (Rh-પોઝિટિવ) માટેની શક્યતા છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતા", "ch": ""}, {"q": "Rh અસંગતતાને કારણે થતો હિમોલાઇટિક રોગ નવજાત શિશુમાં કયા અંગ પર સૌથી વધુ અસર કરે છે?", "opts": ["યકૃત (Liver)", "મગજ (Brain)", "હૃદય (Heart)", "મજ્જા (Bone Marrow)"], "ans": 0, "exp": "Rh અસંગતતાને કારણે માતાના રક્તમાંથી Rh એન્ટિબોડીઝ ભ્રૂણના રક્તમાં પ્રવેશ કરે છે અને ભ્રૂણના લાલ રક્તકણોનો નાશ કરે છે, જેના કારણે હિમોલાઇસિસ થાય છે. આ હિમોલાઇસિસના કારણે બિલિરુબિનનું પ્રમાણ વધે છે, જે યકૃત (Liver) પર સૌથી વધુ અસર કરે છે અને જૌન્ડિસ થાય છે. B) મગજ પર અસર થાય છે, પરંતુ તે પ્રથમ નહીં. C) હૃદય પર અસર થાય છે, પરંતુ તે મુખ્ય નહીં. D) મજ્જા પર અસર થાય છે, પરંતુ તે પ્રાથમિક નહીં.", "ref": "Std 12 - અધ્યાય 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "Rh પરિબળની પ્રતિક્રિયામાં, Rh-નેગેટિવ વ્યક્તિના રક્તમાં Rh-પોઝિટિવ રક્ત ચડાવવાથી બનતી એન્ટિબોડી કયા પ્રકારની છે?", "opts": ["IgA", "IgM", "IgG", "IgE"], "ans": 2, "exp": "Rh-નેગેટિવ વ્યક્તિના રક્તમાં Rh-પોઝિટિવ રક્ત ચડાવવાથી પ્રથમ વખત IgM એન્ટિબોડી બને છે, પરંતુ પુનરાવર્તિત સંપર્ક પર IgG એન્ટિબોડી બને છે, જે પ્લેસેન્ટા દ્વારા ભ્રૂણમાં પસાર થઈ શકે છે. A) IgA મ્યુકોસલ સપાટી પર કામ કરે છે. B) IgM પ્રથમ પ્રતિક્રિયામાં બને છે, પરંતુ તે પ્લેસેન્ટા દ્વારા પસાર થતી નથી. D) IgE એલર્જી પ્રતિક્રિયામાં ભાગ લે છે.", "ref": "Std 12 - અધ્યાય 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "Rh એન્ટિજનની હાજરી નક્કી કરવા માટે કયો પરીક્ષણ પદ્ધતિ વપરાય છે, જેમાં Rh-પોઝિટિવ રક્તના લાલ રક્તકણો સાથે પ્રતિદ્રવ્ય (Anti-Rh serum) મિશ્રિત કરવામાં આવે છે?", "opts": ["ELISA", "Agglutination Test", "PCR", "Western Blot"], "ans": 1, "exp": "Rh એન્ટિજનની હાજરી નક્કી કરવા માટે Agglutination Test વપરાય છે. આ પરીક્ષણમાં, Rh-પોઝિટિવ રક્તના લાલ રક્તકણો સાથે પ્રતિદ્રવ્ય (Anti-Rh serum) મિશ્રિત કરવામાં આવે છે. જો Rh એન્ટિજન હાજર હોય, તો લાલ રક્તકણો એકબીજા સાથે ચોંટી જાય છે (agglutination). A) ELISA એ એન્ટિજન અથવા એન્ટિબોડીના પૃથક્કરણ માટે વપરાય છે. C) PCR DNAના પ્રવર્ધન માટે વપરાય છે. D) Western Blot પ્રોટીનના પૃથક્કરણ માટે વપરાય છે.", "ref": "Std 12 - અધ્યાય 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એક Rh-નેગેટિવ (dd) માતાને પ્રથમ ગર્ભાવસ્થા દરમિયાન Rh-પોઝિટિવ (Dd) ભ્રૂણ હતું, પરંતુ તેને કોઈ પ્રતિકૂળ અસર થઈ ન હતી. બીજી ગર્ભાવસ્થા દરમિયાન ફરીથી Rh-પોઝિટિવ (DD) ભ્રૂણ હોવાને કારણે નવજાત શિશુમાં હિમોલાઇટિક રોગ થયો. આ પરિસ્થિતિમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["પ્રથમ ગર્ભાવસ્થા દરમિયાન માતાના રુધિરમાં IgM પ્રકારની એન્ટિ-D એન્ટિબોડી ઉત્પન્ન થઈ હતી, જે પ્લેસેન્ટા પાર કરી શકતી નથી.", "બીજી ગર્ભાવસ્થા દરમિયાન માતાના રુધિરમાં IgG પ્રકારની એન્ટિ-D એન્ટિબોડી ઉત્પન્ન થઈ, જે પ્લેસેન્ટા પાર કરી ભ્રૂણના રક્તકોષોનો નાશ કરે છે.", "પ્રથમ ગર્ભાવસ્થા દરમિયાન માતાના રુધિરમાં એન્ટિ-D એન્ટિબોડીનું પ્રમાણ ખૂબ ઓછું હતું, તેથી કોઈ પ્રતિકૂળ અસર થઈ ન હતી.", "બીજી ગર્ભાવસ્થા દરમિયાન માતાના રુધિરમાં IgM પ્રકારની એન્ટિ-D એન્ટિબોડીનું પ્રમાણ વધી જાય છે, જે પ્લેસેન્ટા પાર કરી ભ્રૂણના રક્તકોષોનો નાશ કરે છે."], "ans": 3, "exp": "સાચો જવાબ વિકલ્પ D છે, કારણ કે બીજી ગર્ભાવસ્થા દરમિયાન માતાના રુધિરમાં IgG પ્રકારની એન્ટિ-D એન્ટિબોડી ઉત્પન્ન થાય છે, IgM નહીં. IgM એન્ટિબોડી પ્લેસેન્ટા પાર કરી શકતી નથી, જ્યારે IgG એન્ટિબોડી પ્લેસેન્ટા પાર કરી શકે છે અને ભ્રૂણના રક્તકોષોનો નાશ કરે છે. વિકલ્પ A, B અને C સાચાં વિધાનો છે, કારણ કે પ્રથમ ગર્ભાવસ્થા દરમિયાન IgM એન્ટિબોડી ઉત્પન્ન થાય છે જે પ્લેસેન્ટા પાર કરી શકતી નથી, અને બીજી ગર્ભાવસ્થા દરમિયાન IgG એન્ટિબોડી ઉત્પન્ન થાય છે જે હાનિકારક હોય છે.", "ref": "Std 12 - પ્રકરણ 5: વારસાગત્તા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "Rh અસંગતતાને કારણે થતો હિમોલાઇટિક રોગ નવજાત શિશુમાં કયા અંગમાં સૌથી વધુ અસર થાય છે?", "opts": ["યકૃત (Liver)", "મગજ (Brain)", "ફેફસાં (Lungs)", "વૃક્ક (Kidney)"], "ans": 0, "exp": "Rh અસંગતતાને કારણે થતો હિમોલાઇટિક રોગ નવજાત શિશુમાં લોહીના કોષોનો નાશ થાય છે, જેના કારણે બિલિરુબિનનું પ્રમાણ વધે છે. આ બિલિરુબિન યકૃત (Liver) દ્વારા પ્રક્રિયા કરવામાં આવે છે, પરંતુ વધુ પ્રમાણમાં હોવાથી યકૃત પર સૌથી વધુ ભાર પડે છે. આથી યકૃત સૌથી વધુ અસરગ્રસ્ત થાય છે. બાકીના વિકલ્પો (B, C, D) અયોગ્ય છે કારણ કે તેઓ આ રોગના મુખ્ય લક્ષણો સાથે સંકળાયેલા નથી.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિવિધતા", "ch": ""}, {"q": "Rh-પોઝિટિવ વ્યક્તિમાં Rh એન્ટિજનની હાજરી નક્કી કરવા માટે કોનો ઉપયોગ થાય છે, જ્યારે એન્ટિબોડી-મેડિયેટેડ એગ્લુટિનેશન પરીક્ષણ કરવામાં આવે છે?", "opts": ["એન્ટી-D એન્ટીબોડી", "એન્ટી-A એન્ટીબોડી", "એન્ટી-B એન્ટીબોડી", "એન્ટી-O એન્ટીબોડી"], "ans": 0, "exp": "Rh-પોઝિટિવ વ્યક્તિમાં Rh એન્ટિજન (D એન્ટિજન)ની હાજરી નક્કી કરવા માટે એન્ટી-D એન્ટીબોડીનો ઉપયોગ થાય છે. એન્ટી-D એન્ટીબોડી Rh એન્ટિજન સાથે જોડાઈને એગ્લુટિનેશન પ્રતિક્રિયા કરે છે, જે Rh-પોઝિટિવ રક્તની પુષ્ટિ કરે છે. એન્ટી-A, એન્ટી-B, અને એન્ટી-O એન્ટીબોડી અનુક્રમે A, B, અને O રક્ત ગ્રુપની પુષ્ટિ માટે વપરાય છે, Rh એન્ટિજન સાથે સંબંધિત નથી.", "ref": "Std 12 - અધ્યાય 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "Rh-નેગેટિવ માતાના ગર્ભમાં Rh-પોઝિટિવ ભ્રૂણ હોવાને લીધે થતી હિમોલાઇટિક બિમારીમાં, નવજાત શિશુના રક્તમાં કયા પદાર્થનું સ્તર અસાધારણ રીતે વધી જાય છે?", "opts": ["બિલિરુબિન", "હિમોગ્લોબિન", "ગ્લુકોઝ", "યુરિયા"], "ans": 0, "exp": "Rh-નેગેટિવ માતાના ગર્ભમાં Rh-પોઝિટિવ ભ્રૂણ હોવાને લીધે થતી હિમોલાઇટિક બિમારીમાં, માતાના એન્ટી-D એન્ટીબોડી ભ્રૂણના Rh-પોઝિટિવ રક્તકણોને તોડી નાખે છે, જેના કારણે હિમોગ્લોબિનનું વિઘટન થાય છે. આ વિઘટન દરમ્યાન બિલિરુબિનનું સ્તર અસાધારણ રીતે વધી જાય છે, જે નવજાત શિશુમાં પીળિયા (જૌન્ડિસ)નું કારણ બને છે. હિમોગ્લોબિન, ગ્લુકોઝ, અને યુરિયાનું સ્તર આ પ્રક્રિયામાં સીધું સંબંધિત નથી.", "ref": "Std 12 - અધ્યાય 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "Rh-નેગેટિવ વ્યક્તિને પ્રથમ વખત Rh-પોઝિટિવ રક્ત ચડાવવામાં આવે ત્યારે કોઈ પ્રતિક્રિયા દેખાતી નથી, પરંતુ બીજી વખત ચડાવવામાં આવે ત્યારે ગંભીર પ્રતિક્રિયા થાય છે. આનું મુખ્ય કારણ કયું છે?", "opts": ["પ્રથમ વખત એન્ટિજનને ઓળખીને એન્ટિબોડી બનાવવા માટે સમય લાગે છે, જે બીજી વખત તરત પ્રતિક્રિયા કરે છે", "પ્રથમ વખત રક્ત ચડાવવાથી એન્ટિજન નાશ પામે છે", "બીજી વખત ચડાવવામાં આવતું રક્ત વધુ પ્રમાણમાં હોય છે", "પ્રથમ વખત ચડાવવામાં આવતું રક્ત Rh-નેગેટિવ હોય છે"], "ans": 0, "exp": "Rh-નેગેટિવ વ્યક્તિને પ્રથમ વખત Rh-પોઝિટિવ રક્ત ચડાવવામાં આવે ત્યારે, તેમના પ્રતિરક્ષાતંત્રને Rh એન્ટિજનને ઓળખવા અને એન્ટી-D એન્ટિબોડી બનાવવા માટે સમય લાગે છે. આ એન્ટિબોડી બીજી વખત Rh-પોઝિટિવ રક્ત ચડાવવામાં આવે ત્યારે તરત જ પ્રતિક્રિયા કરે છે, જે ગંભીર એલર્જિક પ્રતિક્રિયા તરફ દોરી જાય છે. અન્ય વિકલ્પો આ પ્રક્રિયાના યથાર્થ ક   for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
