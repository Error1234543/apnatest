<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ન્યુક્લિયોટાઇડની રચના</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ન્યુક્લિયોટાઇડની રચના</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ન્યુક્લિયોટાઇડની રચના</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "નાઇટ્રોજન બેઇઝ, પેન્ટોઝ શર્કરા અને ફોસ્ફેટ સમૂહના સંયોજનથી બનતા ન્યુક્લિયોટાઇડમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["પિરિમિડિન બેઇઝમાં સાયટોસિન, થાઇમિન અને યુરેસિલનો સમાવેશ થાય છે, જે એક રિંગ ધરાવે છે", "પ્યુરિન બેઇઝમાં એડેનીન અને ગ્વાનિનનો સમાવેશ થાય છે, જે બે રિંગ ધરાવે છે", "DNAમાં પેન્ટોઝ શર્કરા ડીઓક્સિરાઇબોઝ હોય છે, જ્યારે RNAમાં રાઇબોઝ હોય છે", "ન્યુક્લિયોટાઇડમાં ફોસ્ફેટ સમૂહ હંમેશા શર્કરાના 5' કાર્બન સાથે જોડાયેલો હોય છે"], "ans": 3, "exp": "સાચો જવાબ D છે કારણ કે ન્યુક્લિયોટાઇડમાં ફોસ્ફેટ સમૂહ શર્કરાના 5' કાર્બન સાથે જોડાય છે, પરંતુ 'હંમેશા' શબ્દ ખોટો છે કારણ કે ન્યુક્લિયોટાઇડમાં ફોસ્ફેટ સમૂહ 5' કાર્બન ઉપરાંત અન્ય સ્થાને પણ જોડાઈ શકે છે (જેમ કે 3' કાર્બન). A, B અને C વિધાનો સાચાં છે કારણ કે પિરિમિડિન અને પ્યુરિન બેઇઝની રચના અને શર્કરાનો પ્રકાર DNA-RNAમાં યોગ્ય રીતે વર્ણવેલ છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "ન્યુક્લિયોટાઇડની રચનામાં ફોસ્ફોડાઇએસ્ટર બંધ કયા બે ઘટકો વચ્ચે રચાય છે?", "opts": ["બે નાઇટ્રોજન બેઇઝ વચ્ચે", "નાઇટ્રોજન બેઇઝ અને પેન્ટોઝ શર્કરા વચ્ચે", "પેન્ટોઝ શર્કરાના 3' કાર્બન અને બીજા ન્યુક્લિયોટાઇડના 5' ફોસ્ફેટ વચ્ચે", "ફોસ્ફેટ સમૂહ અને નાઇટ્રોજન બેઇઝ વચ્ચે"], "ans": 2, "exp": "સાચો જવાબ C છે કારણ કે ફોસ્ફોડાઇએસ્ટર બંધ પેન્ટોઝ શર્કરાના 3' કાર્બન અને બીજા ન્યુક્લિયોટાઇડના 5' ફોસ્ફેટ વચ્ચે રચાય છે. A ખોટું છે કારણ કે નાઇટ્રોજન બેઇઝ વચ્ચે હાઇડ્રોજન બંધ રચાય છે, ફોસ્ફોડાઇએસ્ટર નહીં. B ખોટું છે કારણ કે નાઇટ્રોજન બેઇઝ અને શર્કરા વચ્ચે N-ગ્લાયકોસિડિક બંધ રચાય છે. D ખોટું છે કારણ કે ફોસ્ફેટ અને નાઇટ્રોજન બેઇઝ વચ્ચે કોઈ બંધ રચાતો નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "ન્યુક્લિયોટાઇડના સંદર્ભમાં નીચેનામાંથી કયું વિધાન અપવાદરૂપ છે?", "opts": ["DNAમાં થાઇમિન હોય છે, જ્યારે RNAમાં યુરેસિલ હોય છે", "પ્યુરિન બેઇઝ હંમેશા બે રિંગ ધરાવે છે", "RNAમાં રાઇબોઝ શર્કરા હોય છે, જે 2' કાર્બન પર હાઇડ્રોક્સિલ સમૂહ ધરાવે છે", "ન્યુક્લિયોટાઇડમાં ફોસ્ફેટ સમૂહ હંમેશા એક જ હોય છે"], "ans": 3, "exp": "સાચો જવાબ D છે કારણ કે ન્યુક્લિયોટાઇડમાં ફોસ્ફેટ સમૂહ એક કરતાં વધુ હોઈ શકે છે (જેમ કે ADP અને ATPમાં). A સાચું છે કારણ કે DNAમાં થાઇમિન અને RNAમાં યુરેસિલ હોય છે. B સાચું છે કારણ કે પ્યુરિન બેઇઝ હંમેશા બે રિંગ ધરાવે છે. C સાચું છે કારણ કે RNAમાં રાઇબોઝ શર્કરા 2' કાર્બન પર હાઇડ્રોક્સિલ સમૂહ ધરાવે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "ન્યુક્લિયોટાઇડની રચનામાં નાઇટ્રોજન બેઇઝ અને પેન્ટોઝ શર્કરા વચ્ચે કયો બંધ રચાય છે?", "opts": ["ફોસ્ફોડાઇએસ્ટર બંધ", "પેપ્ટાઇડ બંધ", "N-ગ્લાયકોસિડિક બંધ", "હાઇડ્રોજન બંધ"], "ans": 2, "exp": "સાચો જવાબ C છે કારણ કે નાઇટ્રોજન બેઇઝ અને પેન્ટોઝ શર્કરા વચ્ચે N-ગ્લાયકોસિડિક બંધ રચાય છે. A ખોટું છે કારણ કે ફોસ્ફોડાઇએસ્ટર બંધ શર્કરા અને ફોસ્ફેટ વચ્ચે રચાય છે. B ખોટું છે કારણ કે પેપ્ટાઇડ બંધ એમિનો એસિડ વચ્ચે રચાય છે. D ખોટું છે કારણ કે હાઇડ્રોજન બંધ બે નાઇટ્રોજન બેઇઝ વચ્ચે રચાય છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "ન્યુક્લિક એસિડમાં ન્યુક્લિયોટાઇડની શૃંખલા કયા પ્રકારના બંધથી જોડાયેલી હોય છે અને તેની દિશા કઈ હોય છે?", "opts": ["હાઇડ્રોજન બંધથી, 3' → 5' દિશામાં", "ફોસ્ફોડાઇએસ્ટર બંધથી, 5' → 3' દિશામાં", "પેપ્ટાઇડ બંધથી, N-ટર્મિનસથી C-ટર્મિનસ તરફ", "ડાયસલ્ફાઇડ બંધથી, રેન્ડમ દિશામાં"], "ans": 1, "exp": "સાચો જવાબ B છે કારણ કે ન્યુક્લિક એસિડમાં ન્યુક્લિયોટાઇડ ફોસ્ફોડાઇએસ્ટર બંધથી જોડાય છે અને તેની દિશા 5' → 3' હોય છે. A ખોટું છે કારણ કે હાઇડ્રોજન બંધ બે શૃંખલા વચ્ચે રચાય છે, ન્યુક્લિયોટાઇડની શૃંખલા માટે નહીં. C ખોટું છે કારણ કે પેપ્ટાઇડ બંધ પ્રોટીનમાં હોય છે. D ખોટું છે કારણ કે ડાયસલ્ફાઇડ બંધ પ્રોટીનમાં સિસ્ટીન એમિનો એસિડ વચ્ચે રચાય છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "ન્યુક્લિયોટાઇડની રચનામાં પેન્ટોઝ શર્કરા તરીકે રાઇબોઝ અને ડિઓક્સીરાઇબોઝ વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["રાઇબોઝમાં 2' કર્બન પર હાઇડ્રોક્સિલ સમૂહ હોય છે જ્યારે ડિઓક્સીરાઇબોઝમાં હાઇડ્રોજન હોય છે", "રાઇબોઝમાં 3' કર્બન પર હાઇડ્રોક્સિલ સમૂહ હોય છે જ્યારે ડિઓક્સીરાઇબોઝમાં ફોસ્ફેટ સમૂહ હોય છે", "રાઇબોઝમાં 5' કર્બન પર ફોસ્ફેટ સમૂહ હોય છે જ્યારે ડિઓક્સીરાઇબોઝમાં હાઇડ્રોક્સિલ સમૂહ હોય છે", "રાઇબોઝમાં 1' કર્બન પર નાઇટ્રોજન બેઇઝ જોડાયેલું હોય છે જ્યારે ડિઓક્સીરાઇબોઝમાં તે જોડાયેલું નથી"], "ans": 0, "exp": "રાઇબોઝ અને ડિઓક્સીરાઇબોઝ વચ્ચેનો મુખ્ય તફાવત એ છે કે રાઇબોઝમાં 2' કર્બન પર હાઇડ્રોક્સિલ સમૂહ (-OH) હોય છે, જ્યારે ડિઓક્સીરાઇબોઝમાં 2' કર્બન પર હાઇડ્રોજન (-H) હોય છે. આ તફાવતને કારણે ડિઓક્સીરાઇબોઝમાં એક ઓક્સિજન અણુ ઓછો હોય છે. બાકીના વિકલ્પો અયોગ્ય છે કારણ કે 3' કર્બન પર હમેશા હાઇડ્રોક્સિલ સમૂહ હોય છે, 5' કર્બન પર ફોસ્ફેટ સમૂહ ન્યુક્લિયોટાઇડની રચનામાં જોડાય છે, અને 1' કર્બન પર નાઇટ્રોજન બેઇઝ હમેશા જોડાયેલું હોય છે.", "ref": "Std 12 - અધ્યાય 6: જૈવ અણુઓ અને તેની રચના", "ch": ""}, {"q": "ન્યુક્લિયોટાઇડની રચનામાં નાઇટ્રોજન બેઇઝ તરીકે પ્યુરિન અને પિરિમિડિન વચ્ચેનો તફાવત કયો છે?", "opts": ["પ્યુરિનમાં બે વલયો હોય છે જ્યારે પિરિમિડિનમાં એક વલય હોય છે", "પ્યુરિનમાં એક વલય હોય છે જ્યારે પિરિમિડિનમાં બે વલયો હોય છે", "પ્યુરિન અને પિરિમિડિન બંનેમાં બે વલયો હોય છે", "પ્યુરિન અને પિરિમિડિન બંનેમાં એક વલય હોય છે"], "ans": 0, "exp": "પ્યુરિન નાઇટ્રોજન બેઇઝ (જેમ કે એડેનિન અને ગ્વાનિન)માં બે વલયો હોય છે, જ્યારે પિરિમિડિન નાઇટ્રોજન બેઇઝ (જેમ કે સાયટોસિન, થાયમિન, અને યુરેસિલ)માં એક વલય હોય છે. આ રચનાત્મક તફાવતને કારણે તેમની જૈવિક ક્રિયાઓ અને બંધન ક્ષમતામાં તફાવત પડે છે. બાકીના વિકલ્પો અયોગ્ય છે કારણ કે તેઓ વલયોની સંખ્યાને લગતા ચોક્કસ તથ્યોને ખોટી રીતે રજૂ કરે છે.", "ref": "Std 12 - અધ્યાય 6: જૈવ અણુઓ અને તેની રચના", "ch": ""}, {"q": "ન્યુક્લિયોટાઇડની રચનામાં ફોસ્ફેટ સમૂહનો મુખ્ય કાર્ય કયો છે?", "opts": ["ન્યુક્લિયોટાઇડને ઉર્જા પ્રદાન કરવી", "ન્યુક્લિયોટાઇડને પાણીમાં દ્રાવ્ય બનાવવું", "ન્યુક્લિયોટાઇડની શૃંખલામાં ન્યુક્લિયોટાઇડો વચ્ચે ફોસ્ફોડાઇએસ્ટર બંધ રચવો", "ન્યુક્લિયોટાઇડને નાઇટ્રોજન બેઇઝ સાથે જોડવું"], "ans": 2, "exp": "ફોસ્ફેટ સમૂહનો મુખ્ય કાર્ય ન્યુક્લિયોટાઇડની શૃંખલામાં ન્યુક્લિયોટાઇડો વચ્ચે ફોસ્ફોડાઇએસ્ટર બંધ રચવો છે. આ બંધ ન્યુક્લિક એસિડની રચનામાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે. ઉર્જા પ્રદાન કરવી (A) અને પાણીમાં દ્રાવ્ય બનાવવું (B) એ ફોસ્ફેટ સમૂહના ગૌણ કાર્યો છે, જ્યારે નાઇટ્રોજન બેઇઝ સાથે જોડવું (D) એ પેન્ટોઝ શર્કરાનો કાર્ય છે.", "ref": "Std 12 - અધ્યાય 6: જૈવ અણુઓ અને તેની રચના", "ch": ""}, {"q": "ન્યુક્લિયોટાઇડની રચનામાં નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["પ્યુરિન નાઇટ્રોજન બેઇઝમાં એડેનિન અને ગ્વાનિનનો સમાવેશ થાય છે", "પિરિમિડિન નાઇટ્રોજન બેઇઝમાં સાયટોસિન, થાયમિન અને યુરેસિલનો સમાવેશ થાય છે", "ડિઓક્સીરાઇબોઝ શર્કરા DNAમાં જોવા મળે છે જ્યારે રાઇબોઝ શર્કરા RNAમાં જોવા મળે છે", "ન્યુક્લિયોટાઇડમાં ફોસ્ફેટ સમૂહ હમેશા 3' કર્બન પર જોડાયેલો હોય છે"], "ans": 3, "exp": "વિકલ્પ D અસત્ય છે કારણ કે ન્યુક્લિયોટાઇડમાં ફોસ્ફેટ સમૂહ 5' કર્બન પર જોડાયેલો હોય છે, નહીં કે 3' કર્બન પર. 3' કર્બન પર હાઇડ્રોક્સિલ સમૂહ હોય છે જે ફોસ્ફોડાઇએસ્ટર બંધ રચનમાં ભાગ લે છે. બાકીના વિકલ્પો સત્ય છે: પ્યુરિનમાં એડેનિન અને ગ્વાનિન, પિરિમિડિનમાં સાયટોસિન, થાયમિન અને યુરેસિલ, અને ડિઓક્સીરાઇબોઝ DNAમાં જ્યારે રાઇબોઝ RNAમાં જોવા મળે છે.", "ref": "Std 12 - અધ્યાય 6: જૈવ અણુઓ અને તેની રચના", "ch": ""}, {"q": "ન્યુક્લિયોટાઇડની રચનામાં નીચેનામાંથી કયું સંયોજન ન્યુક્લિયોટાઇડનો એક ઘટક નથી?", "opts": ["રાઇબોઝ", "ડિઓક્સીરાઇબોઝ", "ગ્લુકોઝ", "ફોસ્ફેટ"], "ans": 2, "exp": "ગ્લુકોઝ (C) ન્યુક્લિયોટાઇડનો ઘટક નથી. ન્યુક્લિયોટાઇડના ઘટકો પેન્ટોઝ શર્કરા (રાઇબોઝ અથવા ડિઓક્સીરાઇબોઝ), નાઇટ્રોજન બેઇઝ, અને ફોસ્ફેટ સમૂહ છે. ગ્લુકોઝ એક હેક્સોઝ શર્કરા છે જે ન્યુક્લિયોટાઇડની રચનામાં સમાવિષ્ટ નથી. બાકીના વિકલ્પો (A, B, D) ન્યુક્લિયોટાઇડના ઘટકો છે.", "ref": "Std 12 - અધ્યાય 6: જૈવ અણુઓ અને તેની રચના", "ch": ""}, {"q": "ન્યુક્લિયોટાઇડની રચનામાં, જ્યારે એડિનિન (A) પ્યુરિન બેઇઝ સાથે ડિઓક્સીરાઇબોઝ શર્કરા જોડાય છે, ત્યારે બનતું સંયોજન કયું ગણાય છે?", "opts": ["એડિનોઝિન", "એડિનિન ન્યુક્લિયોસાઇડ", "ડિઓક્સીએડિનોઝિન મોનોફોસ્ફેટ (dAMP)", "એડિનિન ન્યુક્લિયોટાઇડ"], "ans": 2, "exp": "એડિનિન પ્યુરિન બેઇઝ સાથે ડિઓક્સીરાઇબોઝ શર્કરા જોડાય ત્યારે એડિનોઝિન ન્યુક્લિયોસાઇડ બને છે. જ્યારે આ ન્યુક્લિયોસાઇડમાં ફોસ્ફેટ સમૂહ જોડાય ત્યારે તે ડિઓક્સીએડિનોઝિન મોનોફોસ્ફેટ (dAMP) બને છે, જે એક પૂર્ણ ન્યુક્લિયોટાઇડ છે. વિકલ્પ A અને B અપૂર્ણ છે કારણ કે તેમાં ફોસ્ફેટ સમૂહનો સમાવેશ થતો નથી. વિકલ્પ D અસ્પષ્ટ છે કારણ કે તે ફોસ્ફેટ સમૂહની હાજરી સ્પષ્ટ કરતો નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિકાસ", "ch": ""}, {"q": "ન્યુક્લિયોટાઇડની રચનામાં, નાઇટ્રોજન બેઇઝ અને પેન્ટોઝ શર્કરા વચ્ચેનો બંધ કયા પ્રકારનો હોય છે અને તે કયા કાર્બન પર આબંધિત હોય છે?", "opts": ["ગ્લાયકોસિડિક બંધ, 1' કાર્બન", "પેપ્ટાઇડ બંધ, 2' કાર્બન", "ફોસ્ફોડાઇએસ્ટર બંધ, 5' કાર્બન", "હાઇડ્રોજન બંધ, 3' કાર્બન"], "ans": 0, "exp": "નાઇટ્રોજન બેઇઝ અને પેન્ટોઝ શર્કરા વચ્ચે ગ્લાયકોસિડિક બંધ રચાય છે, અને તે શર્કરાના 1' કાર્બન પર આબંધિત હોય છે. પેપ્ટાઇડ બંધ પ્રોટીનમાં જોવા મળે છે, ફોસ્ફોડાઇએસ્ટર બંધ ન્યુક્લિયોટાઇડની શૃંખલામાં જોડાણ માટે હોય છે, અને હાઇડ્રોજન બંધ DNAની ડબલ હેલિક્સ રચનામાં જોવા મળે છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિકાસ", "ch": ""}, {"q": "ન્યુક્લિયોટાઇડની રચનામાં, ફોસ્ફેટ સમૂહ કયા કાર્બન સાથે જોડાયેલો હોય છે અને તે કયા બંધ દ્વારા જોડાય છે?", "opts": ["3' કાર્બન, ફોસ્ફોડાઇએસ્ટર બંધ", "5' કાર્બન, ફોસ્ફોડાઇએસ્ટર બંધ", "2' કાર્બન, ગ્લાયકોસિડિક બંધ", "1' કાર્બન, પેપ્ટાઇડ બંધ"], "ans": 1, "exp": "ફોસ્ફેટ સમૂહ 5' કાર્બન સાથે ફોસ્ફોડાઇએસ્ટર બંધ દ્વારા જોડાયેલો હોય છે. 3' કાર્બન પણ ફોસ્ફોડાઇએસ્ટર બંધ દ્વારા જોડાઈ શકે છે, પરંતુ પ્રશ્નમાં 5' કાર્બનનો ઉલ્લેખ છે જે ન્યુક્લિયોટાઇડની શૃંખલામાં મહત્વનો ભાગ ભજવે છે. ગ્લાયકોસિડિક બંધ અને પેપ્ટાઇડ બંધ અહીં લાગુ પડતા નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિકાસ", "ch": ""}, {"q": "ન્યુક્લિયોટાઇડની રચનામાં, નીચેનામાંથી કયું સંયોજન ન્યુક્લિયોટાઇડનો એક ઘટક નથી, પરંતુ તે ન્યુક્લિક એસિડની રચનામાં મહત્વનો ભાગ ભજવે છે?", "opts": ["રાઇબોઝ", "ડિઓક્સીરાઇબોઝ", "ગ્લુકોઝ", "ફોસ્ફેટ"], "ans": 2, "exp": "ગ્લુકોઝ ન્યુક્લિયોટાઇડનો ઘટક નથી. ન્યુક્લિયોટાઇડમાં રાઇબોઝ અથવા ડિઓક્સીરાઇબોઝ પેન્ટોઝ શર્કરા તરીકે હોય છે, અને ફોસ્ફેટ સમૂહ પણ હોય છે. ગ્લુકોઝ એક હેક્સોઝ શર્કરા છે જે ન્યુક્લિયોટાઇડમાં સમાવિષ્ટ થતી નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિકાસ", "ch": ""}, {"q": "ન્યુક્લિયોટાઇડની રચનામાં, જ્યારે થાયમિન (T) પિરિમિડિન બેઇઝ સાથે ડિઓક્સીરાઇબોઝ શર્કરા જોડાય છે, ત્યારે બનતું સંયોજન કયું છે અને તે કયા ન્યુક્લિક એસિડમાં જોવા મળે છે?", "opts": ["થાયમિડિન, RNA", "થાયમિડિન, DNA", "થાયમિન ન્યુક્લિયોસાઇડ, DNA", "થાયમિન ન્યુક્લિયોટાઇડ, RNA"], "ans": 1, "exp": "થાયમિન (T) પિરિમિડિન બેઇઝ સાથે ડિઓક્સીરાઇબોઝ શર્કરા જોડાય ત્યારે થાયમિડિન ન્યુક્લિયોસાઇડ બને છે, અને તે DNAમાં જોવા મળે છે. RNAમાં થાયમિનની જગ્યાએ યુરેસિલ (U) હોય છે. વિકલ્પ A ખોટો છે કારણ કે થાયમિન RNAમાં જોવા મળતો નથી. વિકલ્પ C અને D અપૂર્ણ અથવા અસ્પષ્ટ છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિકાસ", "ch": ""}, {"q": "ન્યુક્લિયોટાઇડની રચનામાં, જ્યારે ગ્વાનિન (G) પ્યુરિન બેઇઝ સાથે રાઇબોઝ શર્કરા જોડાય છે, ત્યારે બનતું સંયોજન કયા પ્રકારનું ન્યુક્લિયોટાઇડ ગણવામાં આવે છે?", "opts": ["ડિઓક્સીરાઇબોન્યુક્લિયોટાઇડ", "રાઇબોન્યુક્લિયોટાઇડ", "ન્યુક્લિયોસાઇડ મોનોફોસ્ફેટ", "ન્યુક્લિયોસાઇડ ડાઇફોસ્ફેટ"], "ans": 1, "exp": "ગ્વાનિન (G) પ્યુરિન બેઇઝ સાથે રાઇબોઝ શર્કરા જોડાય ત્યારે બનતું સંયોજન 'રાઇબોન્યુક્લિયોટાઇડ' ગણવામાં આવે છે, કારણ કે રાઇબોઝ શર્કરા RNAમાં જોવા મળે છે. A) ડિઓક્સીરાઇબોન્યુક્લિયોટાઇડ ખોટું છે કારણ કે ડિઓક્સીરાઇબોઝ શર્કરા DNAમાં જોવા મળે છે. C) ન્યુક્લિયોસાઇડ મોનોફોસ્ફેટ ખોટું છે કારણ કે ગ્વાનિન + રાઇબોઝ એ ન્યુક્લિયોસાઇડ છે, પરંતુ ફોસ્ફેટ સમૂહ જોડાય ત્યારે તે ન્યુક્લિયોટાઇડ બને છે. D) ન્યુક્લિયોસાઇડ ડાઇફોસ્ફેટ ખોટું છે કારણ કે અહીં ફક્ત એક ફોસ્ફેટ સમૂહ જોડાયેલો છે.", "ref": "Std 12 - અધ્યાય 6: ન્યુક્લિક એસિડ", "ch": ""}, {"q": "ન્યુક્લિયોટાઇડની રચનામાં, નાઇટ્રોજન બેઇઝ તરીકે યુરેસિલ (U) કયા પ્રકારના ન્યુક્લિયોટાઇડમાં જોવા મળે છે?", "opts": ["DNA અને RNA બંનેમાં", "ફક્ત DNAમાં", "ફક્ત RNAમાં", "ફક્ત mRNAમાં"], "ans": 2, "exp": "યુરેસિલ (U) પિરિમિડિન બેઇઝ ફક્ત RNAમાં જોવા મળે છે, કારણ કે DNAમાં થાયમિન (T) તેનું સ્થાન લે છે. A) ખોટું છે કારણ કે યુરેસિલ DNAમાં જોવા મળતું નથી. B) ખોટું છે કારણ કે યુરેસિલ DNAમાં હાજર નથી. D) ખોટું છે કારણ કે યુરેસિલ mRNA સિવાયના RNA પ્રકારોમાં પણ જોવા મળે છે.", "ref": "Std 12 - અધ્યાય 6: ન્યુક્લિક એસિડ", "ch": ""}, {"q": "ન્યુક્લિયોટાઇડની રચનામાં, ફોસ્ફોડાઇએસ્ટર બંધ કયા કાર્બન પરમાણુ વચ્ચે રચાય છે?", "opts": ["3' અને 5' કાર્બન", "2' અને 3' કાર્બન", "1' અને 5' કાર્બન", "2' અને 5' કાર્બન"], "ans": 0, "exp": "ફોસ્ફોડાઇએસ્ટર બંધ 3' કાર્બન અને 5' કાર્બન વચ્ચે રચાય છે, જે ન્યુક્લિયોટાઇડની શૃંખલાને જોડે છે. B) ખોટું છે કારણ કે 2' કાર્બન પર હાઇડ્રોક્સિલ સમૂહ હોય છે (રાઇબોઝમાં) અથવા હાઇડ્રોજન (ડિઓક્સીરાઇબોઝમાં). C) ખોટું છે કારણ કે 1' કાર્બન નાઇટ્રોજન બેઇઝ સાથે જોડાયેલો હોય છે. D) ખોટું છે કારણ કે 2' અને 5' કાર્બન વચ્ચે ફોસ્ફોડાઇએસ્ટર બંધ રચાતો નથી.", "ref": "Std 12 - અધ્યાય 6: ન્યુક્લિક એસિડ", "ch": ""}, {"q": "ન્યુક્લિયોટાઇડની રચનામાં, જ્યારે સાયટોસિન (C) પિરિમિડિન બેઇઝ સાથે રાઇબોઝ શર્કરા જોડાય છે, ત્યારે બનતું સંયોજન કયા પ્રકારનું ન્યુક્લિયોસાઇડ કહેવાય છે?", "opts": ["એડેનોસિન", "ગ્વાનોસિન", "સાયટિડિન", "થાયમિડિન"], "ans": 2, "exp": "સાયટોસિન (C) પિરિમિડિન બેઇઝ સાથે રાઇબોઝ શર્કરા જોડાય ત્યારે બનતું સંયોજન 'સાયટિડિન' કહેવાય છે. A) એડેનોસિન એડિનિન (A) સાથે રાઇબોઝ શર્કરા જોડાય ત્યારે બને છે. B) ગ્વાનોસિન ગ્વાનિન (G) સાથે રાઇબોઝ શર્કરા જોડાય ત્યારે બને છે. D) થાયમિડિન થાયમિન (T) સાથે ડિઓક્સીરાઇબોઝ શર્કરા જોડાય ત્યારે બને છે.", "ref": "Std 12 - અધ્યાય 6: ન્યુક્લિક એસિડ", "ch": ""}, {"q": "ન્યુક્લિયોટાઇડની રચનામાં, નાઇટ્રોજન બેઇઝના સંદર્ભમાં નીચેનામાંથી કયું વિધાન અસત્ય છે, જે ન્યુક્લિક એસિડની વિશિષ્ટતા અને કાર્યમાં મહત્ત્વપૂર્ણ ભૂમિકા ભજવે છે?", "opts": ["પ્યુરિન બેઇઝમાં બે વલય (રિંગ) ધરાવતી રચના હોય છે, જ્યારે પિરિમિડિન બેઇઝમાં એક વલય ધરાવતી રચના હોય છે.", "એડિનિન અને ગ્વાનિન એ પ્યુરિન બેઇઝ છે, જે DNA અને RNA બંનેમાં જોવા મળે છે, જ્યારે થાયમિન માત્ર DNAમાં અને યુરેસિલ માત્ર RNAમાં જોવા મળે છે.", "નાઇટ્રોજન બેઇઝમાં કાર્બન અને નાઇટ્રોજન પરમાણુઓની ગોઠવણી એવી રીતે થયેલી હોય છે કે તે હાઇડ્રોજન બંધ બનાવી શકે છે, જે ન્યુક્લિક એસિડની દ્વિ-સૂત્રીય રચના માટે જવાબદાર છે.", "પિરિમિડિન બેઇઝમાં કાર્બનિક વલયમાં નાઇટ્રોજન પરમાણુઓની સંખ્યા પ્યુરિન બેઇઝ કરતાં વધુ હોય છે, જેના કારણે પિરિમિડિન બેઇઝ વધુ સ્થિર હોય છે અને ઉત્સેચકો દ્વારા સરળતાથી વિઘટિત થતા નથી."], "ans": 3, "exp": "સાચો જવાબ વિકલ્પ D છે. પિરિમિડિન બેઇઝમાં એક વલય (રિંગ) હોય છે જેમાં બે નાઇટ્રોજન પરમાણુઓ હોય છે, જ્યારે પ્યુરિન બેઇઝમાં બે વલય હોય છે જેમાં ચાર નાઇટ્રોજન પરમાણુઓ હોય છે. તેથી પિરિમિડિન બેઇઝમાં નાઇટ્રોજન પરમાણુઓની સંખ્યા પ્યુરિન બેઇઝ કરતાં ઓછી હોય છે, નહીં કે વધુ. આથી વિકલ્પ D અસત્ય છે.\n\nવિકલ્પ A: પ્યુરિન બેઇઝમાં બે વલય અને પિરિમિડિન બેઇઝમાં એક વલય હોય છે, જે સાચું છે.\n\nવિકલ્પ B: એડિનિન અને ગ્વાનિન DNA અને RNA બંનેમાં હોય છે, જ્યારે થાયમિન માત્ર DNAમાં અને યુરેસિલ માત્ર RNAમાં હોય છે, જે સાચું છે.\n\nવિકલ્પ C: નાઇટ્રોજન બેઇઝ હાઇડ્રોજન બંધ બનાવી શકે છે, જે ન્યુક્લિક એસિડની દ્વિ-સૂત્રીય રચના માટે જવાબદાર છે, જે સાચું છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્યો અને જનીન અભિવ્યક્તિ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
