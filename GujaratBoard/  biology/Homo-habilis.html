<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homo habilis</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Homo habilis</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Homo habilis</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "હોમો હેબિલિસના સબંધમાં નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["તે પહેલો હોમિનિન હતો જે પથ્થરના હથિયારો બનાવતો હતો.", "તેના મગજનો કદ આશરે 500-800 ઘન સેન્ટિમીટર હતો.", "તે પ્લીસ્ટોસીન યુગ દરમિયાન અસ્તિત્વમાં હતો.", "તે સૌપ્રથમ દ્વિપાદી (Bipedal) પ્રાણી હતો."], "ans": 3, "exp": "હોમો હેબિલિસ પહેલો હોમિનિન નહોતો જે દ્વિપાદી હતો. ઓસ્ટ્રેલોપિથેકસ જેવા પૂર્વજો પહેલાથી જ દ્વિપાદી હતા. હોમો હેબિલિસ પથ્થરના હથિયારો બનાવવા માટે જાણીતો છે (A સત્ય), તેના મગજનો કદ 500-800 ઘન સેન્ટિમીટર હતો (B સત્ય), અને તે પ્લીસ્ટોસીન યુગ દરમિયાન અસ્તિત્વમાં હતો (C સત્ય).", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો હેબિલિસના શારીરિક લક્ષણો પૈકી કયું લક્ષણ તેને ઓસ્ટ્રેલોપિથેકસ કરતાં વધુ વિકસિત બનાવે છે?", "opts": ["લાંબી બાહ્ય જડબા", "નાનું ચહેરું અને ઓછી જડબા", "મોટા દાંત અને જાડી જડબા", "નાનું મગજ"], "ans": 1, "exp": "હોમો હેબિલિસમાં ઓસ્ટ્રેલોપિથેકસ કરતાં નાનું ચહેરું અને ઓછી જડબા હતી, જે તેને વધુ વિકસિત બનાવે છે. લાંબી બાહ્ય જડબા (A), મોટા દાંત અને જાડી જડબા (C), અને નાનું મગજ (D) એ ઓસ્ટ્રેલોપિથેકસના લક્ષણો હતા.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો હેબિલિસના સંસ્કૃતિ સબંધી કયું વિધાન યોગ્ય છે?", "opts": ["તે લોખંડના હથિયારો બનાવતો હતો.", "તે પથ્થરના હથિયારો બનાવવા માટે ઓલ્ડોવન ટેક્નોલોજીનો ઉપયોગ કરતો હતો.", "તે કૃષિ કરતો હતો.", "તે લિખિત ભાષા વિકસાવી હતી."], "ans": 1, "exp": "હોમો હેબિલિસ પથ્થરના હથિયારો બનાવવા માટે ઓલ્ડોવન ટેક્નોલોજીનો ઉપયોગ કરતો હતો. લોખંડના હથિયારો (A) તેના સમયગાળામાં અસ્તિત્વમાં નહોતા, કૃષિ (C) અને લિખિત ભાષા (D) પણ તેના સમયગાળામાં વિકસિત નહોતી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો હેબિલિસના અવશેષો સૌપ્રથમ ક્યાં શોધાયા હતા?", "opts": ["દક્ષિણ આફ્રિકા", "પૂર્વ આફ્રિકા (ઓલ્ડુવાઈ ગોર્જ, ટાંઝાનિયા)", "યુરોપ", "એશિયા"], "ans": 1, "exp": "હોમો હેબિલિસના અવશેષો સૌપ્રથમ પૂર્વ આફ્રિકામાં ઓલ્ડુવાઈ ગોર્જ, ટાંઝાનિયામાં શોધાયા હતા. દક્ષિણ આફ્રિકા (A), યુરોપ (C), અને એશિયા (D) એ અન્ય સ્થળો છે જ્યાં હોમિનિન અવશેષો શોધાયા છે, પરંતુ હોમો હેબિલિસના પ્રથમ અવશેષો ઓલ્ડુવાઈ ગોર્જમાં શોધાયા હતા.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો હેબિલિસ અને હોમો ઇરેક્ટસ વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["હોમો હેબિલિસ પથ્થરના હથિયારો બનાવતો નહોતો.", "હોમો ઇરેક્ટસનો મગજનો કદ હોમો હેબિલિસ કરતાં મોટો હતો.", "હોમો હેબિલિસ દ્વિપાદી હતો જ્યારે હોમો ઇરેક્ટસ નહોતો.", "હોમો ઇરેક્ટસ પહેલો હોમિનિન હતો જે આગનો ઉપયોગ કરતો હતો."], "ans": 2, "exp": "હોમો ઇરેક્ટસનો મગજનો કદ હોમો હેબિલિસ કરતાં મોટો હતો. હોમો હેબિલિસ પથ્થરના હથિયારો બનાવતો હતો (A ખોટું), બંને દ્વિપાદી હતા (C ખોટું), અને હોમો ઇરેક્ટસ પહેલો હોમિનિન હતો જે આગનો ઉપયોગ કરતો હતો (D સત્ય છે પરંતુ પ્રશ્ન મુખ્ય તફાવત પૂછે છે, જે મગજનો કદ છે).", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો હેબિલિસના મગજની ક્ષમતા સરેરાશ કેટલી હોવાનું મનાય છે અને તેના આધારે તેને કયા નામથી પણ ઓળખવામાં આવે છે?", "opts": ["500-600 સી.સી., 'હેબિલ મેન'", "600-700 સી.સી., 'ટૂલ મેકર'", "700-800 સી.સી., 'હેન્ડી મેન'", "800-900 સી.સી., 'સ્માર્ટ મેન'"], "ans": 2, "exp": "હોમો હેબિલિસના મગજની ક્ષમતા સરેરાશ 700-800 સી.સી. હોવાનું મનાય છે. તેને 'હેન્ડી મેન' નામથી પણ ઓળખવામાં આવે છે કારણ કે તે પહેલી વખત હાથવર્તી હથિયારો બનાવવા માટે જાણીતો હતો. A) 500-600 સી.સી. ખૂબ ઓછી ક્ષમતા છે અને ઓસ્ટ્રેલોપિથેકસ જેવા પૂર્વજો સાથે સંકળાયેલ છે. B) 600-700 સી.સી. પણ ઓછી ક્ષમતા છે અને 'ટૂલ મેકર' એ સામાન્ય નામ નથી. D) 800-900 સી.સી. વધુ ક્ષમતા છે અને હોમો ઇરેક્ટસ સાથે સંકળાયેલ છે, 'સ્માર્ટ મેન' એ અયોગ્ય નામ છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો હેબિલિસના જડબા (જૉ) વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["તેના જડબા ઓસ્ટ્રેલોપિથેકસ કરતાં વધુ બહાર નીકળતા હતા", "તેના જડબા હોમો ઇરેક્ટસ જેવા જ હતા", "તેના જડબા ઓછા પ્રબળ હતા અને ચહેરા વધુ સપાટ હતો", "તેના જડબા સંપૂર્ણ રીતે ગાયબ હતા"], "ans": 2, "exp": "હોમો હેબિલિસના જડબા ઓસ્ટ્રેલોપિથેકસ કરતાં ઓછા પ્રબળ હતા અને ચહેરો વધુ સપાટ હતો, જે મનુષ્ય જાતિની ઉત્ક્રાંતિમાં એક મહત્વપૂર્ણ પગલું હતું. A) ઓસ્ટ્રેલોપિથેકસ કરતાં વધુ બહાર નીકળતા જડબા એ ખોટું છે, કારણ કે હોમો હેબિલિસમાં જડબા ઓછા પ્રબળ હતા. B) હોમો ઇરેક્ટસના જડબા વધુ વિકસિત હતા, તેથી આ વિધાન ખોટું છે. D) જડબા સંપૂર્ણ રીતે ગાયબ નહોતા, તેથી આ વિધાન પણ ખોટું છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો હેબિલિસના અવશેષો સૌપ્રથમ ક્યાં અને ક્યારે શોધાયા હતા?", "opts": ["ઇથિયોપિયા, 1959", "ટાંઝાનિયા, 1960", "કેન્યા, 1964", "દક્ષિણ આફ્રિકા, 1948"], "ans": 2, "exp": "હોમો હેબિલિસના અવશેષો સૌપ્રથમ કેન્યાના ઓલ્ડુવાઈ ગોર્જમાં 1964માં લૂઈસ અને મેરી લીકી દ્વારા શોધાયા હતા. A) ઇથિયોપિયામાં 1959માં શોધાયેલા અવશેષો ઓસ્ટ્રેલોપિથેકસ સાથે સંકળાયેલા હતા. B) ટાંઝાનિયામાં 1960માં શોધાયેલા અવશેષો પણ ઓસ્ટ્રેલોપિથેકસ સાથે સંકળાયેલા હતા. D) દક્ષિણ આફ્રિકામાં 1948માં શોધાયેલા અવશેષો પણ ઓસ્ટ્રેલોપિથેકસ સાથે સંકળાયેલા હતા.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો હેબિલિસના સંસ્કૃતિક વિકાસ વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["તે પહેલી વખત હાથવર્તી હથિયારો બનાવવા માટે જાણીતો હતો", "તે અગ્નિનો ઉપયોગ કરતો હતો", "તે શિકાર માટે સહકાર્ય કરતો હતો", "તે ગુફાઓમાં રહેતો હતો"], "ans": 1, "exp": "હોમો હેબિલિસ અગ્નિનો ઉપયોગ કરતો નહોતો, તે પાછળથી હોમો ઇરેક્ટસ દ્વારા શરૂ કરવામાં આવ્યો હતો. A) હોમો હેબિલિસ પહેલી વખત હાથવર્તી હથિયારો બનાવવા માટે જાણીતો હતો, જે સત્ય છે. C) શિકાર માટે સહકાર્ય કરવું એ પણ સત્ય છે. D) ગુફાઓમાં રહેવું એ પણ સત્ય છે, પરંતુ તે પાછળથીના મનુષ્ય પૂર્વજો સાથે વધુ સંકળાયેલું છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો હેબિલિસ અને ઓસ્ટ્રેલોપિથેકસ વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["હોમો હેબિલિસમાં મગજની ક્ષમતા ઓછી હતી", "હોમો હેબિલિસમાં હાથવર્તી હથિયારો બનાવવાની ક્ષમતા હતી", "ઓસ્ટ્રેલોપિથેકસમાં બોલી શકવાની ક્ષમતા હતી", "ઓસ્ટ્રેલોપિથેકસમાં દ્વિપાદી ચાલવાની ક્ષમતા હતી"], "ans": 1, "exp": "હોમો હેબિલિસ અને ઓસ્ટ્રેલોપિથેકસ વચ્ચેનો મુખ્ય તફાવત એ છે કે હોમો હેબિલિસમાં હાથવર્તી હથિયારો બનાવવાની ક્ષમતા હતી, જે ઓસ્ટ્રેલોપિથેકસમાં નહોતી. A) હોમો હેબિલિસમાં મગજની ક્ષમતા ઓસ્ટ્રેલોપિથેકસ કરતાં વધુ હતી, તેથી આ વિધાન ખોટું છે. C) બોલી શકવાની ક્ષમતા હોમો હેબિલિસમાં પણ નહોતી, તેથી આ વિધાન ખોટું છે. D) દ્વિપાદી ચાલવાની ક્ષમતા ઓસ્ટ્રેલોપિથેકસમાં પણ હતી, તેથી આ વિધાન ખોટું છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો હેબિલિસના સંસ્કૃતિક અવશેષો પૈકી 'ઓલ્ડુવાઈ ગોર્જ'માં મળેલા પથ્થરના હથિયારોની વિશેષતા કઈ હતી?", "opts": ["તેઓ પહેલીવાર દ્વિપક્ષીય (બાયફેશિયલ) કોરડા પથ્થરના હથિયારો હતા, જેનો ઉપયોગ શિકાર અને માંસ કાપવા માટે થતો હતો.", "તેઓ એકપક્ષીય (યુનિફેશિયલ) કોરડા હતા અને માત્ર વનસ્પતિ કાપવા માટે વાપરાતા હતા.", "તેઓ લાકડાના હથિયારો હતા, જેને પથ્થરની ધાર સાથે જોડીને બનાવવામાં આવતા હતા.", "તેઓ કુદરતી રીતે તૂટેલા પથ્થર હતા, જેનો કોઈ પણ પ્રકારનો ઉપયોગ થતો નહોતો."], "ans": 0, "exp": "હોમો હેબિલિસ દ્વારા બનાવવામાં આવેલા પથ્થરના હથિયારો 'ઓલ્ડુવાઈ ગોર્જ'માં મળેલા હતા, જે દ્વિપક્ષીય (બાયફેશિયલ) કોરડા હતા. આ હથિયારોનો ઉપયોગ શિકાર અને માંસ કાપવા માટે થતો હતો. ઓપશન B ખોટો છે કારણ કે ઓલ્ડુવાઈ હથિયારો એકપક્ષીય નહોતા. ઓપશન C ખોટો છે કારણ કે હોમો હેબિલિસ લાકડાના હથિયારો બનાવતો નહોતો. ઓપશન D ખોટો છે કારણ કે આ હથિયારો કુદરતી રીતે તૂટેલા નહોતા, પરંતુ માનવી દ્વારા તૈયાર કરેલા હતા.", "ref": "Std 12 - અધ્યાય 7: માનવ ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો હેબિલિસના અસ્તિત્વ કાળ દરમિયાન કયા જીવાશ્મ પ્રાણીના અવશેષો સાથે તેના અવશેષો સૌથી વધુ સાંકળાયેલા મળ્યા છે?", "opts": ["મેમથ", "સેબર-ટૂથ ટાઇગર", "ઓસ્ટ્રેલોપિથેકસ", "પ્લાયસ્ટોસીન યુગના ઘોડા"], "ans": 3, "exp": "હોમો હેબિલિસના અવશેષો પ્લાયસ્ટોસીન યુગના ઘોડા જેવા પ્રાણીઓના અવશેષો સાથે મળ્યા છે, જે દર્શાવે છે કે તે સમયે આ પ્રાણીઓ સાથે તેનો સંપર્ક હતો. મેમથ (A) અને સેબર-ટૂથ ટાઇગર (B) પ્લાયસ્ટોસીન યુગમાં હાજર હતા, પરંતુ હોમો હેબિલિસ સાથે તેમના અવશેષો એટલા સાંકળાયેલા નથી. ઓસ્ટ્રેલોપિથેકસ (C) હોમો હેબિલિસ કરતાં પહેલાના યુગના હતા, તેથી તેમના અવશેષો સાથે સીધો સંપર્ક નહીં મળે.", "ref": "Std 12 - અધ્યાય 7: માનવ ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો હેબિલિસના મગજની રચના વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["તેના મગજમાં બ્રોકા ક્ષેત્ર (ભાષા સાથે સંકળાયેલ) વિકસિત નહોતું.", "તેના મગજમાં પ્રીફ્રન્ટલ કોર્ટેક્સ (યોજના અને નિર્ણય લેવા સાથે સંકળાયેલ) સપાટી પર વધુ વિકસિત હતો.", "તેના મગજમાં સેરેબેલમ (સંતુલન અને હલનચલન સાથે સંકળાયેલ) અત્યંત નાનું હતું.", "તેના મગજમાં હિપોકેમ્પસ (સ્મૃતિ સાથે સંકળાયેલ) પૂર્ણપણે અલગ પડેલો હતો."], "ans": 1, "exp": "હોમો હેબિલિસના મગજમાં પ્રીફ્રન્ટલ કોર્ટેક્સ વધુ વિકસિત હતો, જે યોજના અને નિર્ણય લેવા સાથે સંકળાયેલ છે. બ્રોકા ક્ષેત્ર (A) હોમો હેબિલિસમાં અંશતઃ વિકસિત હોવાનું મનાય છે, પરંતુ તે પૂર્ણપણે વિકસિત નહોતું. સેરેબેલમ (C) અને હિપોકેમ્પસ (D) તેના મગજમાં હાજર હતા, પરંતુ તેમની રચના અત્યંત નાની અથવા અલગ પડેલી નહોતી.", "ref": "Std 12 - અધ્યાય 7: માનવ ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો હેબિલિસના અવશેષોની શોધ સાથે સંકળાયેલા નીચેનામાંથી કયા શોધકે 'ઝાંજીબાર' (Zinj) નામનો ઉપનામ આપ્યો હતો?", "opts": ["લુઈસ લીકી", "રિચર્ડ લીકી", "ડોનાલ્ડ જોહાન્સન", "યુજીન ડુબોઇસ"], "ans": 0, "exp": "લુઈસ લીકીએ 1959માં ઓલ્ડુવાઈ ગોર્જમાં હોમો હેબિલિસના અવશેષો શોધ્યા હતા અને તેમણે આ પ્રજાતિને 'ઝાંજીબાર' (Zinj) નામનો ઉપનામ આપ્યો હતો. રિચર્ડ લીકી (B) તેમના પુત્ર હતા અને પછીથી શોધમાં યોગદાન આપ્યું હતું. ડોનાલ્ડ જોહાન્સન (C) અને યુજીન ડુબોઇસ (D) અન્ય પ્રજાતિઓ સાથે સંકળાયેલા હતા.", "ref": "Std 12 - અધ્યાય 7: માનવ ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો હેબિલિસના આહાર વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["તે મુખ્યત્વે શાકાહારી હતો અને ફળો, બી, અને વનસ્પતિ ખાતો હતો.", "તે શિકાર કરતો હતો અને માંસ ખાતો હતો, પરંતુ તેનો મુખ્ય આહાર વનસ્પતિ પર આધારિત હતો.", "તે 'સ્કેવેન્જિંગ' (મૃત પ્રાણીઓના માંસનો ઉપયોગ) કરતો હતો.", "તે અગ્નિનો ઉપયોગ કરતો હતો અને પકવેલો આહાર ખાતો હતો."], "ans": 3, "exp": "હોમો હેબિલિસ અગ્નિનો ઉપયોગ કરતો નહોતો, તેથી તે પકવેલો આહાર ખાતો નહોતો. તે મુખ્યત્વે શાકાહારી હતો (A), શિકાર અને સ્કેવેન્જિંગ (B અને C) પણ કરતો હતો. અગ્નિનો ઉપયોગ હોમો ઇરેક્ટસ સાથે સંકળાયેલો છે.", "ref": "Std 12 - અધ્યાય 7: માનવ ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો હેબિલિસના સંસ્કૃતિક વિકાસમાં 'ઓલ્ડુવાઈ સંસ્કૃતિ'ના સબંધમાં નીચેનામાંથી કયું વિધાન અયોગ્ય છે?", "opts": ["ઓલ્ડુવાઈ સંસ્કૃતિમાં પથ્થરના હથિયારો બનાવવા માટે કોયલા (Pebble) તકનીકનો ઉપયોગ થતો હતો.", "ઓલ્ડુવાઈ સંસ્કૃતિમાં હાથવળ (Hand axe) જેવા સુસંગઠિત હથિયારોનો વિકાસ થયો હતો.", "ઓલ્ડુવાઈ સંસ્કૃતિ હોમો હેબિલિસ સાથે સંકળાયેલી છે અને તે પ્લીસ્ટોસીન યુગ દરમિયાન વિકસી હતી.", "ઓલ્ડુવાઈ સંસ્કૃતિમાં મૃત દેહોને દફનાવવાની પ્રથા જોવા મળે છે."], "ans": 3, "exp": "હોમો હેબિલિસ સાથે સંકળાયેલી ઓલ્ડુવાઈ સંસ્કૃતિમાં પથ્થરના હથિયારો બનાવવા માટે કોયલા તકનીક (A) અને હાથવળ જેવા હથિયારો (B)નો ઉપયોગ થતો હતો, અને તે પ્લીસ્ટોસીન યુગ દરમિયાન વિકસી હતી (C). પરંતુ મૃત દેહોને દફનાવવાની પ્રથા હોમો હેબિલિસમાં જોવા મળતી નથી, તે પાછળથી હોમો સેપિયન્સમાં વિકસી હતી. આથી D વિધાન અયોગ્ય છે.", "ref": "Std 12 - અધ્યાય 7: માનવ ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો હેબિલિસના શારીરિક લક્ષણો પૈકી કયું લક્ષણ તેને હોમો ઇરેક્ટસ કરતાં અલગ પાડે છે?", "opts": ["મગજની ક્ષમતા સરેરાશ 600-700 ઘન સેન્ટિમીટર હતી.", "જડબા (જૉ) પહોળા અને બહારની તરફ નીકળતા હતા.", "શરીરનું કદ હોમો ઇરેક્ટસ કરતાં મોટું હતું.", "હાથની આંગળીઓ લાંબી અને વળાંકદાર હતી."], "ans": 2, "exp": "હોમો હેબિલિસની મગજની ક્ષમતા સરેરાશ 600-700 ઘન સેન્ટિમીટર હતી (A), જડબા પહોળા અને બહારની તરફ નીકળતા હતા (B), અને હાથની આંગળીઓ લાંબી અને વળાંકદાર હતી (D) — આ તમામ લક્ષણો હોમો હેબિલિસમાં જોવા મળે છે. પરંતુ શરીરનું કદ હોમો ઇરેક્ટસ કરતાં મોટું હોવું (C) ખોટું છે, કારણ કે હોમો ઇરેક્ટસનું શરીર હોમો હેબિલિસ કરતાં મોટું અને મજબૂત હતું.", "ref": "Std 12 - અધ્યાય 7: માનવ ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો હેબિલિસના અવશેષો સાથે સંકળાયેલા 'ઓલ્ડુવાઈ ગોર્જ' વિસ્તારમાં નીચેનામાંથી કયા પ્રાણીના અવશેષો મળ્યા નથી?", "opts": ["ડાયનોથેરિયમ (Deinotherium)", "હિપ્પોરાયન (Hipporyon)", "સ્મિલોડોન (Smilodon)", "પેરાથેરિયમ (Paratherium)"], "ans": 2, "exp": "ઓલ્ડુવાઈ ગોર્જમાં હોમો હેબિલિસના અવશેષો સાથે ડાયનોથેરિયમ (A), હિપ્પોરાયન (B), અને પેરાથેરિયમ (D) જેવા પ્રાણીઓના અવશેષો મળ્યા છે. પરંતુ સ્મિલોડોન (C) એ નવી દુનિયા (અમેરિકા)નું પ્રાણી છે અને ઓલ્ડુવાઈ ગોર્જમાં તેના અવશેષો મળ્યા નથી.", "ref": "Std 12 - અધ્યાય 7: માનવ ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો હેબિલિસના આહાર વિશે નીચેનામાંથી કયું સંયોજન અયોગ્ય છે?", "opts": ["તે મુખ્યત્વે શાકાહારી હતો અને ફળો, બી, અને વનસ્પતિ ખાતો હતો.", "તે માંસાહારી પણ હતો અને શિકાર કરતા પ્રાણીઓનું માંસ ખાતો હતો.", "તે અવશેષો પરથી મળેલા પુરાવાઓ અનુસાર, હાડકાં પરના નિશાનો દર્શાવે છે કે તે માંસ કાપતો અને ખાતો હતો.", "તે અગ્નિનો ઉપયોગ કરતો હતો અને પકવેલો આહાર લેતો હતો."], "ans": 3, "exp": "હોમો હેબિલિસ શાકાહારી (A) અને માંસાહારી (B) બંને હતો, અને હાડકાં પરના નિશાનો દર્શાવે છે કે તે માંસ કાપતો અને ખાતો હતો (C). પરંતુ અગ્નિનો ઉપયોગ કરવાની અને પકવેલો આહાર લેવાની પ્રથા હોમો ઇરેક્ટસ સાથે સંકળાયેલી છે, હોમો હેબિલિસમાં તેના પુરાવા મળતા નથી. આથી D અયોગ્ય છે.", "ref": "Std 12 - અધ્યાય 7: માનવ ઉત્ક્રાંતિ", "ch": ""}, {"q": "હોમો હેબિલિસના ઉત્ક્રાંતિક ઇતિહાસમાં નીચેનામાંથી કયું વિધાન સૌથી અયોગ્ય છે?", "opts": ["હોમો હેબિલિસને 'હેબિલ મેન' અથવા 'હેન્ડી મેન' તરીકે પણ ઓળખવામાં આવે છે.", "હોમો હેબિલિસ એ પહેલો માનવ જાતિ હતો જે પથ્થરના હથિયારો બનાવતો હતો.", "હોમો હેબિલિસ એ ઓસ્ટ્રેલોપિથેકસથી સીધો ઉત્ક્રાંત થયો હતો અને તેના પૂર્વજ નથી.", "હોમો હેબિલિસના અવશેષો આફ્રિકાના વિવિધ સ્થળોએ મળ્યા છે, જેમ કે ટાંઝાનિયા, કેન્યા, અને ઇથિયોપિયા."], "ans": 2, "exp": "હોમો હેબિલિસને 'હેન્ડી મેન' તરીકે ઓળખવામાં આવે છે (A), તે પહેલો માનવ જાતિ હતો જે પથ્થરના હથિયારો બનાવતો હતો (B), અને તેના અવશેષો આફ્રિકાના વિવિધ સ્થળોએ મળ્યા છે (D). પરંતુ હોમો હેબિલિસ એ ઓસ્ટ્રેલોપિથેકસથી સીધો ઉત્ક્રાંત થયો નહોતો, પરંતુ તે ઓસ્ટ્રેલોપિથેકસ અને હોમો વચ્ચેનો સંક્રમણકાળીન જૂથ હતો. આથી C વિધાન અયોગ્ય છે.", "ref": "Std 12 - અધ્યાય 7: માનવ ઉત્ક્રાંતિ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
