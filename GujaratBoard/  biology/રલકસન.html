<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>રિલેક્સિન</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>રિલેક્સિન</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">રિલેક્સિન</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "સસ્તન પ્રાણીઓમાં ગર્ભાવસ્થા દરમિયાન રિલેક્સિન હોર્મોનનું મુખ્ય કાર્ય શું છે?", "opts": ["ગર્ભાશયના સ્નાયુઓને સંકોચન માટે તૈયાર કરવા", "ગર્ભાશયના સ્નાયુઓને શિથિલ કરીને ગર્ભના વિકાસ માટે જગ્યા બનાવવી", "અંડાશયમાંથી ઇસ્ટ્રોજનના સ્ત્રાવને ઉત્તેજિત કરવું", "ગર્ભાશયની અંતઃત્વચાને જાડી બનાવી ગર્ભના સ્થાપનમાં મદદ કરવી"], "ans": 1, "exp": "રિલેક્સિન હોર્મોન ગર્ભાવસ્થા દરમિયાન ગર્ભાશયના સ્નાયુઓને શિથિલ કરીને ગર્ભના વિકાસ માટે જરૂરી જગ્યા બનાવવામાં મદદ કરે છે. વિકલ્પ A ખોટો છે કારણ કે રિલેક્સિન સંકોચનને પ્રેરિત કરતું નથી, તે શિથિલતા પ્રેરે છે. વિકલ્પ C ખોટો છે કારણ કે રિલેક્સિન ઇસ્ટ્રોજનના સ્ત્રાવને સીધું ઉત્તેજિત કરતું નથી. વિકલ્પ D ખોટો છે કારણ કે ગર્ભાશયની અંતઃત્વચાને જાડી બનાવવાનું કાર્ય પ્રોજેસ્ટેરોનનું છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન તંત્ર", "ch": ""}, {"q": "રિલેક્સિન હોર્મોનના સ્ત્રાવ માટે કયું અંગ મુખ્યત્વે જવાબદાર છે?", "opts": ["અંડાશય (Ovary)", "પીળું પિંડ (Corpus luteum)", "ગર્ભાશય (Uterus)", "પ્લેસેન્ટા (Placenta)"], "ans": 3, "exp": "ગર્ભાવસ્થા દરમિયાન રિલેક્સિન હોર્મોનનો સ્ત્રાવ મુખ્યત્વે પ્લેસેન્ટા દ્વારા થાય છે. વિકલ્પ A ખોટો છે કારણ કે અંડાશય રિલેક્સિનનો મુખ્ય સ્ત્રાવકર્તા નથી. વિકલ્પ B ખોટો છે કારણ કે પીળું પિંડ પ્રોજેસ્ટેરોનનો સ્ત્રાવ કરે છે, રિલેક્સિનનો નહીં. વિકલ્પ C ખોટો છે કારણ કે ગર્ભાશય રિલેક્સિનનો સ્ત્રાવ કરતું નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન રિલેક્સિન હોર્મોન માટે ખોટું છે?", "opts": ["તે ગર્ભાશયના સ્નાયુઓને શિથિલ કરે છે.", "તે પેલ્વિક અસ્થિઓના સાંધાઓને ઢીલા બનાવે છે.", "તે માત્ર સ્ત્રીઓમાં જ ઉત્પન્ન થાય છે.", "તે પ્રસૂતિ દરમિયાન સર્વિક્સના વિસ્તરણમાં મદદ કરે છે."], "ans": 2, "exp": "રિલેક્સિન હોર્મોન માત્ર સ્ત્રીઓમાં જ નહીં, પરંતુ પુરુષોમાં પણ ઉત્પન્ન થાય છે (જોકે ઓછી માત્રામાં). વિકલ્પ A, B અને D સાચાં છે કારણ કે રિલેક્સિન ગર્ભાશયના સ્નાયુઓને શિથિલ કરે છે, પેલ્વિક સાંધાઓને ઢીલા બનાવે છે અને પ્રસૂતિ દરમિયાન સર્વિક્સના વિસ્તરણમાં મદદ કરે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન તંત્ર", "ch": ""}, {"q": "રિલેક્સિન હોર્મોનના સંદર્ભમાં નીચેનામાંથી ક ્લેસેન્ટા (નાળ)નું ક્ષીમોન સ્ત્રાવી ક્ષમતામાં ઘટાડો થવો", "ગર્ભાશયના સ્નાયુઓમાં રિલેક્સિન રિસેપ્ટરની સંખ્યામાં ઘટાડો થવો", "હાઇપોથેલેમસ દ્વારા રિલેક્સિન ઉત્પાદન બંધ થવું", "એસ્ટ્રોજન અને પ્રોજેસ્ટેરોન હોર્મોનના સ્તરમાં અચાનક વધારો થવો"], "ans": 0, "exp": "રિલેક્સિન હોર્મોન મુખ્યત્વે પ્લેસેન્ટા (નાળ) દ્વારા સ્ત્રાવાય છે. ગર્ભાવસ્થાના અંતિમ તબક્કે પ્લેસેન્ટા ક્ષીણ થતું હોવાથી તેની હોર્મોન સ્ત્રાવી ક્ષમતા ઘટે છે, જેથી રિલેક્સિનનું સ્તર ઘટી જાય છે. વિકલ્પ B ખોટો છે કારણ કે રિલેક્સિન રિસેપ્ટરની સંખ્યામાં ઘટાડો થવો એ મુખ્ય કારણ નથી. વિકલ્પ C ખોટો છે કારણ કે રિલેક્સિનનું ઉત્પાદન મુખ્યત્વે પ્લેસેન્ટા દ્વારા થાય છે, હાઇપોથેલેમસ દ્વારા નહીં. વિકલ્પ D ખોટો છે કારણ કે એસ્ટ્રોજન અને પ્રોજેસ્ટેરોનના સ્તરમાં વધારો થવાથી રિલેક્સિનનું સ્તર ઘટતું નથી, ઉલટાનું તેને પ્રભાવિત કરતું નથી.", "ref": "Std 12 - પ્રકરણ ૩: માનવ પ્રજનન", "ch": ""}, {"q": "ગર્ભાવસ્થા દરમિયાન રિલેક્સિન હોર્મોનનો સ્ત્રાવ કરતી કોરિયોનિક ગોનાડોટ્રોપિન (hCG) સાથેનો સંબંધ કયો છે?", "opts": ["hCG રિલેક્સિનના સ્ત્રાવને અવરોધે છે, જેથી ગર્ભાશયની સ્નાયુઓમાં સંકોચન વધે", "hCG રિલેક્સિનના સ્ત્રાવને પ્રેરે છે, જેથી પેલ્વિક લિગામેન્ટ્સમાં ઢીલાશ વધે", "hCG અને રિલેક્સિન વચ્ચે કોઈ સંબંધ નથી, કારણ કે રિલેક્સિન ફક્ત પીટ્યુટરી ગ્રંથિથી સ્ત્રાવ પામે છે", "hCG રિલેક્સિનના સ્ત્રાવને નિયંત્રિત કરે છે, પરંતુ ફક્ત પ્રથમ ત્રિમાસિક દરમિયાન જ"], "ans": 1, "exp": "રિલેક્સિન હોર્મોનનો સ્ત્રાવ ગર્ભાવસ્થા દરમિયાન મુખ્યત્વે કોરિયોનિક ગોનાડોટ્રોપિન (hCG) દ્વારા પ્રેરાય છે, જેથી પેલ્વિક લિગામેન્ટ્સ અને ગર્ભાશયની સ્નાયુઓમાં ઢીલાશ વધે, પ્રસૂતિ માટે તૈયારી થાય. વિકલ્પ A ખોટો છે કારણ કે hCG રિલેક્સિનને અવરોધતું નથી. વિકલ્પ C ખોટો છે કારણ કે રિલેક્સિન કોરપસ લ્યુટિયમ અને ડેસિડ્યુઆથી સ્ત્રાવ પામે છે, ન કે ફક્ત પીટ્યુટરી ગ્રંથિથી. વિકલ્પ D અપૂર્ણ છે કારણ કે hCG રિલેક્સિનના સ્ત્રાવને ગર્ભાવસ્થા દરમિયાન સતત પ્રભાવિત કરે છે, ફક્ત પ્રથમ ત્રિમાસિક સુધી મર્યાદિત નથી.", "ref": "Std 12 - પ્રકરણ 3: મનુષ્યમાં પ્રજનન", "ch": ""}, {"q": "રિલેક્સિન હોર્મોનના સંદર્ભમાં નીચેનામાંથી કયું વિધાન અપવાદરૂપ છે, જ્યારે ગર્ભાવસ્થા દરમિયાન તેનું સ્તર સૌથી ઉચ્ચ હોય છે?", "opts": ["ગર્ભાશયની ગ્રીવા (સર્વિક્સ)માં કોલેજન તંતુઓનું વિઘટન થાય છે", "પેલ્વિક સિમ્ફિસિસમાં કેલ્શિયમનું જમા થાય છે", "ગર્ભાશયની સ્નાયુઓમાં સંકોચન શક્તિ ઘટે છે", "શરીરમાં પ્રોજેસ્ટેરોન હોર્મોનના સ્તરમાં વધારો થાય છે"], "ans": 1, "exp": "રિલેક્સિન હોર્મોન ગર્ભાવસ્થા દરમિયાન પેલ્વિક સિમ્ફિસિસમાં કોલેજન તંતુઓનું વિઘટન કરે છે, જેથી ઢીલાશ વધે અને પ્રસૂતિ સરળ બને. વિકલ્પ B અપવાદરૂપ છે કારણ કે રિલેક્સિન કેલ્શિયમનું જમા થવા દેતું નથી, ઉલટાનું તે કોલેજનના વિઘટનને પ્રેરે છે. વિકલ્પ A, C, અને D સાચા છે કારણ કે રિલેક્સિન ગ્રીવા ઢીલી કરે છે, ગર્ભાશયની સ્નાયુઓની સંકોચન શક્તિ ઘટાડે છે, અને પ્રોજેસ્ટેરોન સાથે સહકાર્ય કરે છે.", "ref": "Std 12 - પ્રકરણ 3: મનુષ્યમાં પ્રજનન", "ch": ""}, {"q": "રિલેક્સિન હોર્મોનના કૃત્ય સંબંધી નીચેનામાંથી કયું જોડકું સાચું નથી?", "opts": ["રિલેક્સિન : પેલ્વિક લિગામેન્ટ્સમાં ઢીલાશ - પ્રસૂતિ સરળતા", "રિલેક્સિન : ગર્ભાશયની સ્નાયુઓમાં સંકોચન - પ્રસૂતિ વેદના વધારો", "રિલેક્સિન : કોલેજન તંતુઓનું વિઘટન - ગ્રીવા ઢીલી થવી", "રિલેક્સિન : પ્રોજેસ્ટેરોન સાથે સહકાર્ય - ગર્ભાવસ્થા જાળવણી"], "ans": 1, "exp": "રિલેક્સિન હોર્મોન ગર્ભાશયની સ્નાયુઓમાં સંકોચન ઘટાડે છે, પ્રસૂતિ વેદના ઘટાડે છે, ન કે વધારે છે. વિકલ્પ A, C, અને D સાચા છે કારણ કે રિલેક્સિન પેલ્વિક લિગામેન્ટ્સમાં ઢીલાશ લાવે છે, કોલેજન તંતુઓનું વિઘટન કરે છે, અને પ્રોજેસ્ટેરોન સાથે સહકાર્ય કરે છે.", "ref": "Std 12 - પ્રકરણ 3: મનુષ્યમાં પ્રજનન", "ch": ""}, {"q": "ગર્ભાવસ્થા દરમિયાન રિલેક્સિન હોર્મોનના સ્તરમાં અચાનક ઘટાડો થવાથી નીચેનામાંથી કયું પરિણામ સંભવિત છે?", "opts": ["પ્રસૂતિ પહેલાં ગર્ભાશયની સ્નાયુઓમાં અતિ સંકોચન થવું", "પેલ્વિક લિગામેન્ટ્સમાં કોલેજન તંતુઓનું વધુ જમા થવું", "ગર્ભાવસ્થા દરમિયાન ગર્ભાશયની ગ્રીવા સંપૂર્ણપણે બંધ રહેવી", "શરીરમાં પ્રોજેસ્ટેરોન હોર્મોનનું સ્તર અચાનક ઘટવું"], "ans": 0, "exp": "રિલેક્સિન હોર્મોનના સ્તરમાં અચાનક ઘટાડો થવાથી ગર્ભાશયની સ્નાયુઓમાં સંકોચન વધી શકે છે, જેથી પ્રસૂતિ પહેલાં અતિ સંકોચન (પ્રી-ટર્મ લેબર) થઈ શકે. વિકલ્પ B ખોટો છે કારણ કે રિલેક્સિનના અભાવે કોલેજન તંતુઓનું જમા થવું ઘટે છે. વિકલ્પ C ખોટો છે કારણ કે ગ્રીવા બંધ રહેવી એ રિલેક્સિનના અભાવનું પરિણામ નથી. વિકલ્પ D ખોટો છે કારણ કે પ્રોજેસ્ટેરોનનું સ્તર રિલેક્સિન પર નિર્ભર નથી.", "ref": "Std 12 - પ્રકરણ 3: મનુષ્યમાં પ્રજનન", "ch": ""}, {"q": "ગર્ભાવસ્થા દરમિયાન રિલેક્સિન હોર્મોનના સ્ત્રાવમાં નીચેનામાંથી કયો પરિબળ સીધો ભાગ ભજવતો નથી, પરંતુ અપ્રત્યક્ષ રીતે અસર કરે છે?", "opts": ["કોરિયોનિક ગોનાડોટ્રોપિન (hCG)નું સ્તર", "પ્રોજેસ્ટેરોન હોર્મોનનું સ્તર", "ગર્ભાશયની પેશીઓમાં રક્તપુરવઠાનો દર", "ગર્ભમાં ભ્રૂણના વિકાસની અવસ્થા"], "ans": 2, "exp": "રિલેક્સિન હોર્મોનના સ્ત્રાવ પર કોરિયોનિક ગોનાડોટ્રોપિન (hCG) અને પ્રોજેસ્ટેરોન હોર્મોન સીધી અસર કરે છે, જ્યારે ભ્રૂણના વિકાસની અવસ્થા અપ્રત્યક્ષ રીતે અસર કરે છે. ગર્ભાશયની પેશીઓમાં રક્તપુરવઠાનો દર રિલેક્સિનના સ્ત્રાવ સાથે સીધો સંબંધ ધરાવતો નથી, પરંતુ તે ગર્ભાશયની પેશીઓના વિકાસ અને કાર્યમાં ભાગ ભજવે છે. આથી, વિકલ્પ C સાચો જવાબ છે.", "ref": "Std 12 - પ્રકરણ ૩: મનુષ્યમાં પ્રજનન", "ch": ""}, {"q": "ગર્ભાવસ્થા દરમિયાન રિલેક્સિન હોર્મોનનું સ્તર વધવાના કારણે પેલ્વિક લિગામેન્ટ્સમાં થતી ફેરફારની સૌથી યોગ્ય વૈજ્ઞાનિક વ્યાખ્યા કયી છે?", "opts": ["કોલેજન તંતુઓનું વિઘટન અને ઇલાસ્ટિન તંતુઓનું સંકોચન", "કોલેજન તંતુઓનું પુનર્ગઠન અને ઇલાસ્ટિન તંતુઓનું વિસ્તરણ", "કોલેજન તંતુઓનું સંકોચન અને ઇલાસ્ટિન તંતુઓનું વિઘટન", "કોલેજન અને ઇલાસ્ટિન તંતુઓનું સંપૂર્ણ વિઘટન"], "ans": 1, "exp": "રિલેક્સિન હોર્મોન પેલ્વિક લિગામેન્ટ્સમાં કોલેજન તંતુઓનું પુનર્ગઠન (remodeling) અને ઇલાસ્ટિન તંતુઓનું વિસ્તરણ કરાવે છે, જેથી પ્રસૂતિ દરમિયાન પેલ્વિસનું વિસ્તરણ સરળ બને. વિકલ્પ A, C, અને D ખોટા છે કારણ કે રિલેક્સિન કોલેજન અથવા ઇલાસ્ટિનનું સંપૂર્ણ વિઘટન કરતું નથી, ને સંકોચન કરતું નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "રિલેક્સિન હોર્મોનના સંશ્લેષણ અને સ્ત્રાવમાં નીચેનામાંથી કયો પરિબળ સીધો ભાગ ભજવતો નથી?", "opts": ["પ્રોજેસ્ટેરોનનું સ્તર", "hCG (હ્યુમન કોરિયોનિક ગોનાડોટ્રોપિન)", "એસ્ટ્રોજનનું સ્તર", "ઓક્સીટોસિનનું સ્તર"], "ans": 3, "exp": "રિલેક્સિન હોર્મોનના સંશ્લેષણ અને સ્ત્રાવ પર પ્રોજેસ્ટેરોન, hCG, અને એસ્ટ્રોજનનો સીધો પ્રભાવ પડે છે. ઓક્સીટોસિન, જ્યારે પ્રસૂતિ દરમિયાન મહત્વનું હોય છે, રિલેક્સિનના સ્ત્રાવ પર સીધો પ્રભાવ ધરાવતું નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "ગર્ભાવસ્થા દરમિયાન રિલેક્સિન હોર્મોનનું સ્તર વધવાથી પેલ્વિક હાડકાંના જોડાણોમાં થતી ઢીલાશ સાથે નીચેનામાંથી કયું જૈવરાસાયણિક પરિવર્તન સીધું સંબંધિત નથી?", "opts": ["કોલેજન તંતુઓની વ્યવસ્થામાં ફેરફાર", "ગ્લાયકોપ્રોટીનના સંશ્લેષણમાં વધારો", "હાયાલ્યુરોનિક એસિડના સાંદ્રતામાં ઘટાડો", "ઇલાસ્ટિન તંતુઓના વિઘટનમાં વધારો"], "ans": 2, "exp": "રિલેક્સિન હોર્મોન પેલ્વિક લિગામેન્ટ્સ અને હાડકાંના જોડાણોમાં ઢીલાશ લાવવા માટે કોલેજન તંતુઓની વ્યવસ્થામાં ફેરફાર કરે છે (A સાચું). ગ્લાયકોપ્રોટીનના સંશ્લેષણમાં વધારો (B) અને ઇલાસ્ટિન તંતુઓના વિઘટનમાં વધારો (D) પણ આ પ્રક્રિયામાં યોગદાન આપે છે. પરંતુ હાયાલ્યુરોનિક એસિડના સાંદ્રતામાં ઘટાડો (C) રિલેક્સિનના કૃત્ય સાથે સીધો સંબંધ ધરાવતો નથી, કારણ કે રિલેક્સિન હાયાલ્યુરોનિક એસિડના સ્તરને વધારે છે, જે પેશીની લવચીકતા વધારે છે.", "ref": "Std 12 - પ્રકરણ ૩: માનવ પ્રજનન", "ch": ""}, {"q": "રિલેક્સિન હોર્મોનના સંદર્ભમાં નીચેનામાંથી કયું જોડકું અપવાદરૂપ છે, જ્યારે ગર્ભાવસ્થા દરમિયાન તેના સ્ત્રાવ અને કાર્યને ધ્યાનમાં લેવામાં આવે?", "opts": ["કોરિયોનિક ગોનાડોટ્રોપિન (hCG) - રિલેક્સિન હોર્મોનના સ્ત્રાવને પ્રેરે છે.", "પ્રોજેસ્ટેરોન - રિલેક્સિન હોર્મોનના સ્ત્રાવને અવરોધે છે.", "ઇસ્ટ્રોજન - રિલેક્સિન હોર્મોનના સ્ત્રાવને વધારે છે.", "ઓક્સિટોસિન - રિલેક્સિન હોર્મોનના સ્ત્રાવ સાથે સીધો સંબંધ ધરાવતું નથી."], "ans": 1, "exp": "કોરિયોનિક ગોનાડોટ્રોપિન (hCG) રિલેક્સિન હોર્મોનના સ્ત્રાવને પ્રેરે છે (A સાચું). ઇસ્ટ્રોજન રિલેક્સિન હોર્મોનના સ્ત્રાવને વધારે છે (C સાચું). ઓક્સિટોસિન રિલેક્સિન હોર્મોનના સ્ત્રાવ સાથે સીધો સંબંધ ધરાવતું નથી (D સાચું). પ્રોજેસ્ટેરોન રિલેક્સિન હોર્મોનના સ્ત્રાવને અવરોધતું નથી, ઉલટાનું તે રિલેક્સિનના સ્ત્રાવને ટેકો આપે છે (B ખોટું).", "ref": "Std 12 - પ્રકરણ ૩: માનવ પ્રજનન", "ch": ""}, {"q": "ગર્ભાવસ્થા દરમિયાન રિલેક્સિન હોર્મોનના સ્ત્રાવ સાથે નીચેનામાંથી કયું જોડકું અસંગત છે, જ્યારે તે પેલ્વિક લિગામેન્ટ્સની ઢીલાશ સાથે સીધો સંબંધ ધરાવે છે?", "opts": ["કોરપસ લ્યુટિયમ દ્વારા સ્ત્રાવ થવો અને પીટ્યુટરી ગ્રંથિ દ્વારા નિયંત્રણ", "હ્યુમન કોરિયોનિક ગોનાડોટ્રોપિન (hCG) દ્વારા ઉત્તેજન મળવું અને પ્લેસેન્ટા દ્વારા સ્ત્રાવ થવો", "એસ્ટ્રોજન અને પ્રોજેસ્ટેરોનના સ્તરમાં વધારો થવો અને રિલેક્સિન જનીનની અભિવ્યક્તિ વધવી", "એડ્રિનલ કોર્ટેક્સ દ્વારા સ્ત્રાવ થવો અને ગર્ભાશયના સ્નાયુઓની સક્રિયતા ઘટાડવી"], "ans": 3, "exp": "રિલેક્સિન હોર્મોન મુખ્યત્વે કોરપસ લ્યુટિયમ અને પ્લેસેન્ટા દ્વારા સ્ત્રાવ થાય છે, જેમાં hCG દ્વારા ઉત્તેજન મળે છે. એસ્ટ્રોજન અને પ્રોજેસ્ટેરોનના સ્તરમાં વધારો થવાથી રિલેક્સિન જનીનની અભિવ્યક્તિ વધે છે, જે પેલ્વિક લિગામેન્ટ્સની ઢીલાશ માટે જવાબદાર છે. એડ્રિનલ કોર્ટેક્સ દ્વારા રિલેક્સિનનો સ્ત્રાવ થતો નથી, અને ગર્ભાશયના સ્નાયુઓની સક્રિયતા ઘટાડવું તે રિલેક્સિનનું મુખ્ય કાર્ય નથી. આમ, વિકલ્પ D અસંગત છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
