<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNAની રચના</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>DNAની રચના</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">DNAની રચના</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "DNA ની દ્વિપાઠી રચનામાં, કયા બેઇઝ પેઅર વચ્ચે હાઇડ્રોજન બંધની સંખ્યા સૌથી ઓછી હોય છે?", "opts": ["એડેનિન અને થાયમિન", "સાયટોસિન અને ગ્વાનિન", "એડેનિન અને ગ્વાનિન", "થાયમિન અને સાયટોસિન"], "ans": 0, "exp": "એડેનિન અને થાયમિન વચ્ચે ફક્ત બે હાઇડ્રોજન બંધ હોય છે, જ્યારે સાયટોસિન અને ગ્વાનિન વચ્ચે ત્રણ હાઇડ્રોજન બંધ હોય છે. બાકીના વિકલ્પો (C અને D) અયોગ્ય બેઇઝ પેઅર છે, કારણ કે DNAમાં એડેનિન ફક્ત થાયમિન સાથે અને સાયટોસિન ફક્ત ગ્વાનિન સાથે જોડાય છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની શર્કરા-ફોસ્ફેટ કંકાલમાં કયા કાર્બન પર ફોસ્ફેટ જૂથ જોડાયેલું હોય છે?", "opts": ["1' કાર્બન", "2' કાર્બન", "3' કાર્બન", "5' કાર્બન"], "ans": 3, "exp": "DNA ની શર્કરા-ફોસ્ફેટ કંકાલમાં ફોસ્ફેટ જૂથ 5' કાર્બન પર જોડાયેલું હોય છે. 1' કાર્બન પર નાઇટ્રોજન બેઇઝ જોડાયેલું હોય છે, જ્યારે 2' કાર્બન પર હાઇડ્રોક્સિલ જૂથ હોય છે (DNAમાં 2'-H હોય છે). 3' કાર્બન પર પણ હાઇડ્રોક્સિલ જૂથ હોય છે, પરંતુ ફોસ્ફેટ જૂથ 5' કાર્બન સાથે જોડાય છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "જો DNA ના એક સ્ટ્રેન્ડમાં એડેનિનનું પ્રમાણ 30% હોય, તો તે જ સ્ટ્રેન્ડમાં થાયમિનનું પ્રમાણ કેટલું હશે?", "opts": ["20%", "30%", "40%", "70%"], "ans": 1, "exp": "DNA ના એક સ્ટ્રેન્ડમાં એડેનિન અને થાયમિનનું પ્રમાણ સમાન હોતું નથી. પરંતુ, ચાર્ગાફના નિયમ મુજબ, પૂરક સ્ટ્રેન્ડમાં એડેનિનનું પ્રમાણ થાયમિન જેટલું હોય છે. જો એક સ્ટ્રેન્ડમાં એડેનિન 30% હોય, તો પૂરક સ્ટ્રેન્ડમાં થાયમિન 30% હશે, પરંતુ પ્રશ્ન એક જ સ્ટ્રેન્ડ વિશે છે, જ્યાં એડેનિન અને થાયમિનનું પ્રમાણ સ્વતંત્ર હોય છે. પરંતુ, એક જ સ્ટ્રેન્ડમાં એડેનિન અને થાયમિનનું પ્રમાણ સમાન હોતું નથી, પરંતુ ચાર્ગાફના નિયમ મુજબ, A+T = 50% અને G+C = 50% હોય છે. જો A = 30% હોય, તો T = 20% હશે (કારણ કે A+T=50%). પરંતુ પ્રશ્નમાં એક સ્ટ્રેન્ડમાં A=30% આપેલ છે, તો Tનું પ્રમાણ 20% હશે. પરંતુ વિકલ્પ A (20%) યોગ્ય જવાબ છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની રચનામાં, કયા અણુને 'અનુવંશિકતાનું આણ્વિક આધાર' કહેવામાં આવે છે?", "opts": ["પ્રોટીન", "RNA", "DNA", "કાર્બોદિત"], "ans": 2, "exp": "DNA ને 'અનુવંશિકતાનું આણ્વિક આધાર' કહેવામાં આવે છે, કારણ કે તે જનીન માહિતીનું સંગ્રહણ અને હસ્તાંતરણ કરે છે. પ્રોટીન (A) જૈવિક ક્રિયાઓમાં સામેલ હોય છે, પરંતુ અનુવંશિક માહિતી ધરાવતું નથી. RNA (B) પ્રોટીન સંશ્લેષણમાં મદદ કરે છે, પરંતુ તે અનુવંશિક માહિતીનું મુખ્ય વાહક નથી. કાર્બોદિત (D) ઊર્જાનું સંગ્રહણ કરે છે, પરંતુ અનુવંશિકતામાં ભાગ ભજવતું નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની દ્વિપાઠી રચનામાં, જો એક સ્ટ્રેન્ડમાં ગુઆનિનનું પ્રમાણ 20% હોય, તો તે જ સ્ટ્રેન્ડમાં સાયટોસિનનું પ્રમાણ કેટલું હશે? (ધારો કે DNA પૂર્ણપણે દ્વિપાઠી અને સ્થિર છે)", "opts": ["20%", "30%", "40%", "50%"], "ans": 0, "exp": "ચાર્ગાફના નિયમ મુજબ, DNA ની દ્વિપાઠી રચનામાં, એડેનિન (A) હંમેશા થાયમિન (T) સાથે અને ગુઆનિન (G) હંમેશા સાયટોસિન (C) સાથે જોડાયેલા હોય છે. આથી, એક સ્ટ્રેન્ડમાં G નું પ્રમાણ C ના પ્રમાણ જેટલું જ હોય છે. આથી, જો G નું પ્રમાણ 20% હોય, તો C નું પ્રમાણ પણ 20% જ હશે. બાકીના વિકલ્પો (30%, 40%, 50%) ચાર્ગાફના નિયમના ઉલ્લંઘન કરે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની દ્વિપાઠી રચનામાં, પ્યુરિન બેઇઝ અને પિરિમિડિન બેઇઝ વચ્ચે કયો તફાવત સાચો છે?", "opts": ["પ્યુરિન બેઇઝમાં બે વલયો હોય છે જ્યારે પિરિમિડિન બેઇઝમાં એક વલય હોય છે", "પ્યુરિન બેઇઝમાં નાઇટ્રોજનના બે અણુઓ હોય છે જ્યારે પિરિમિડિન બેઇઝમાં ચાર નાઇટ્રોજન અણુઓ હોય છે", "પ્યુરિન બેઇઝ ફક્ત RNAમાં જોવા મળે છે જ્યારે પિરિમિડિન બેઇઝ ફક્ત DNAમાં જોવા મળે છે", "પ્યુરિન બેઇઝ હંમેશા ફોસ્ફેટ જૂથ સાથે જોડાયેલા હોય છે જ્યારે પિરિમિડિન બેઇઝ શર્કરા સાથે જોડાયેલા હોય છે"], "ans": 0, "exp": "પ્યુરિન બેઇઝ (એડેનિન અને ગુઆનિન)માં બે વલયો હોય છે જ્યારે પિરિમિડિન બેઇઝ (સાયટોસિન, થાયમિન, યુરેસિલ)માં એક વલય હોય છે. ઓપ્શન B ખોટું છે કારણ કે પ્યુરિન બેઇઝમાં ચાર નાઇટ્રોજન અણુઓ હોય છે જ્યારે પિરિમિડિન બેઇઝમાં બે નાઇટ્રોજન અણુઓ હોય છે. ઓપ્શન C ખોટું છે કારણ કે પ્યુરિન અને પિરિમિડિન બંને DNA અને RNAમાં જોવા મળે છે (યુરેસિલ સિવાય). ઓપ્શન D ખોટું છે કારણ કે બેઇઝ શર્કરા સાથે જોડાયેલા હોય છે, ફોસ્ફેટ જૂથ શર્કરા સાથે જોડાયેલું હોય છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની રચનામાં, કયા બેઇઝ પેઅર વચ્ચે હાઇડ્રોજન બંધની સંખ્યા સૌથી ઓછી હોય છે?", "opts": ["એડેનિન-થાયમિન", "ગુઆનિન-સાયટોસિન", "એડેનિન-સાયટોસિન", "ગુઆનિન-થાયમિન"], "ans": 0, "exp": "એડેનિન-થાયમિન વચ્ચે બે હાઇડ્રોજન બંધ હોય છે, જ્યારે ગુઆનિન-સાયટોસિન વચ્ચે ત્રણ હાઇડ્રોજન બંધ હોય છે. એડેનિન-સાયટોસિન અને ગુઆનિન-થાયમિન વચ્ચે હાઇડ્રોજન બંધ બનતા નથી કારણ કે તે બેઇઝ પેઅર DNAની દ્વિપાઠી રચનામાં સ્વાભાવિક રીતે જોડાયેલા નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની રચનામાં, કયા અણુને 'જનીનનું સ્થાન' કહેવામાં આવે છે?", "opts": ["ન્યુક્લિઓટાઇડ", "ન્યુક્લિઓસોમ", "ન્યુક્લિઓસાઇડ", "ન્યુક્લિઓટાઇડની ક્રમવાર ગોઠવણી"], "ans": 3, "exp": "જનીનનું સ્થાન DNA ની ન્યુક્લિઓટાઇડની ક્રમવાર ગોઠવણી છે. ન્યુક્લિઓટાઇડ DNA ની રચનાની મૂળભૂત એકમ છે, પરંતુ જનીનનું સ્થાન ન્યુક્લિઓટાઇડની ક્રમવાર ગોઠવણી છે. ન્યુક્લિઓસોમ અને ન્યુક્લિઓસાઇડ જનીનના સ્થાન સાથે સીધા સંબંધિત નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની રચનામાં, કયા બેઇઝને 'મેથાઇલેટેડ બેઇઝ' તરીકે ઓળખવામાં આવે છે?", "opts": ["એડેનિન", "થાયમિન", "સાયટોસિન", "ગુઆનિન"], "ans": 2, "exp": "સાયટોસિનને મેથાઇલેટેડ બેઇઝ તરીકે ઓળખવામાં આવે છે કારણ કે તે મેથાઇલ જૂથ સાથે જોડાઈ શકે છે. એડેનિન, થાયમિન અને ગુઆનિનને મેથાઇલેટેડ બેઇઝ તરીકે ઓળખવામાં આવતા નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની રચનામાં, કયા અણુને 'અનુવંશિકતાનું સંકેત' કહેવામાં આવે છે?", "opts": ["ન્યુક્લિઓટાઇડ", "જનીન", "ક્રોમોસોમ", "પ્રોટીન"], "ans": 1, "exp": "જનીનને 'અનુવંશિકતાનું સંકેત' કહેવામાં આવે છે કારણ કે તે અનુવંશિક લક્ષણોના વહન માટે જવાબદાર હોય છે. ન્યુક્લિઓટાઇડ DNA ની રચનાની મૂળભૂત એકમ છે, ક્રોમોસોમ DNA નું સંગઠિત સ્વરૂપ છે, અને પ્રોટીન જનીનના વ્યક્તીકરણ માટે જવાબદાર હોય છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની દ્વિપાઠી રચનામાં, જો એક સ્ટ્રેન્ડમાં સાયટોસિનનું પ્રમાણ 18% હોય, તો તે જ સ્ટ્રેન્ડમાં થાયમિનનું પ્રમાણ કેટલું હશે?", "opts": ["32%", "18%", "34%", "28%"], "ans": 0, "exp": "ચાર્ગાફના નિયમ મુજબ, DNA માં પ્યુરિન (A+G) અને પિરિમિડિન (C+T) નું પ્રમાણ સરખું હોય છે. જો C = 18%, તો A+G = 50% - (C+T) = 50% - (18% + T). પરંતુ A+G = C+T હોવાથી, C+T = 50% થાય. આથી T = 50% - 18% = 32%. બાકીના વિકલ્પો (B, C, D) ચાર્ગાફના નિયમને અનુરૂપ નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની રચનામાં, કયા અણુને 'અનુવંશિક સંકેતનો વાહક' કહેવામાં આવે છે અને તે કયા પ્રકારનો અણુ છે?", "opts": ["RNA, પ્રોટીન", "mRNA, કાર્બોદિત", "tRNA, લિપિડ", "DNA, ન્યુક્લિક એસિડ"], "ans": 3, "exp": "DNA એ અનુવંશિક સંકેતનો વાહક છે અને તે ન્યુક્લિક એસિડ પ્રકારનો અણુ છે. RNA પણ ન્યુક્લિક એસિડ છે, પરંતુ તે DNA જેવો સ્થાયી નથી. mRNA અને tRNA એ RNA ના પ્રકાર છે, પરંતુ તે પ્રોટીન સંશ્લેષણમાં મદદ કરે છે, અનુવંશિકતાનો વાહક નથી. કાર્બોદિત અને લિપિડ એ અનુવંશિક સંકેતના વાહક નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની દ્વિપાઠી રચનામાં, જો એક સ્ટ્રેન્ડમાં એડેનિન અને થાયમિનનું પ્રમાણ અનુક્રમે 22% અને 28% હોય, તો ગુઆનિન અને સાયટોસિનનું પ્રમાણ કેટલું હશે?", "opts": ["G = 25%, C = 25%", "G = 20%, C = 30%", "G = 22%, C = 28%", "G = 30%, C = 20%"], "ans": 1, "exp": "ચાર્ગાફના નિયમ મુજબ, A = T અને G = C. અહીં A = 22% અને T = 28% આપેલ છે, પરંતુ A અને T નું પ્રમાણ સરખું હોવું જોઈએ. આથી આ ડેટા વિરોધાભાસી છે, પરંતુ જો A+T = 50% માનીએ તો G+C = 50% થાય. જો G = 20% હોય, તો C = 30% થાય (વિકલ્પ B). બાકીના વિકલ્પો ચાર્ગાફના નિયમને અનુરૂપ નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની રચનામાં, કયા બેઇઝને 'કેટાબોલિઝમમાં ભૂમિકા ભજવતો બેઇઝ' કહેવામાં આવે છે અને તે કયા પ્રકારનો બેઇઝ છે?", "opts": ["એડેનિન, પ્યુરિન", "ગુઆનિન, પ્યુરિન", "થાયમિન, પિરિમિડિન", "સાયટોસિન, પિરિમિડિન"], "ans": 1, "exp": "ગુઆનિન એ પ્યુરિન પ્રકારનો બેઇઝ છે અને તે કેટાબોલિઝમમાં ભૂમિકા ભજવે છે, ખાસ કરીને GTP (ગુઆનોસિન ટ્રાઇફોસ્ફેટ) રૂપે. એડેનિન પણ પ્યુરિન છે, પરંતુ તે ATP (એડેનોસિન ટ્રાઇફોસ્ફેટ) રૂપે ઊર્જા વહનમાં ભૂમિકા ભજવે છે. થાયમિન અને સાયટોસિન પિરિમિડિન બેઇઝ છે, પરંતુ તે કેટાબોલિઝમમાં ગુઆનિન જેવી ભૂમિકા ભજવતા નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની દ્વિપાઠી રચનામાં, જો એક સ્ટ્રેન્ડમાં 5-મેથાઇલસાયટોસિન (5mC) ની હાજરી જોવા મળે, તો નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["તે સ્ટ્રેન્ડમાં એડેનિન (A) નું પ્રમાણ ઘટશે કારણ કે 5mC થાયમિન (T) સાથે જોડાય છે.", "તે સ્ટ્રેન્ડમાં ગુઆનિન (G) નું પ્રમાણ વધશે કારણ કે 5mC હંમેશા ગુઆનિન (G) સાથે જોડાય છે.", "તે સ્ટ્રેન્ડમાં સાયટોસિન (C) નું પ્રમાણ ઘટશે કારણ કે 5mC એ સાયટોસિનનું મેથાઇલેટેડ રૂપ છે અને તે ગુઆનિન (G) સાથે જોડાય છે.", "તે સ્ટ્રેન્ડમાં થાયમિન (T) નું પ્રમાણ વધશે કારણ કે 5mC એડેનિન (A) સાથે જોડાય છે."], "ans": 2, "exp": "5-મેથાઇલસાયટોસિન (5mC) એ સાયટોસિનનું મેથાઇલેટેડ રૂપ છે અને DNA માં તે હંમેશા ગુઆનિન (G) સાથે હાઇડ્રોજન બંધ દ્વારા જોડાય છે. આથી, જો 5mC હાજર હોય, તો સાયટોસિન (C) નું પ્રમાણ ઘટશે કારણ કે 5mC એ સાયટોસિનનો જ એક ભાગ છે. બાકીના વિકલ્પો ખોટા છે: A) 5mC થાયમિન સાથે જોડાતું નથી, B) 5mC ગુઆનિન સાથે જોડાય છે પરંતુ ગુઆનિનનું પ્રમાણ વધતું નથી, D) 5mC એડેનિન સાથે જોડાતું નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની દ્વિપાઠી રચનામાં, જો એક સ્ટ્રેન્ડમાં 5-બ્રોમોયુરેસિલ (5BU) ની હાજરી જોવા મળે, તો તેના કારણે કયો પરિવર્તન (મ્યુટેશન) સૌથી વધુ સંભાવિત છે?", "opts": ["ટ્રાન્ઝિશન (Transition) - એડેનિન (A) થી ગુઆનિન (G) અથવા ઉલટું", "ટ્રાન્સવર્ઝન (Transversion) - પ્યુરિન થી પિરિમિડિન અથવા ઉલટું", "ટ્રાન્ઝિશન (Transition) - સાયટોસિન (C) થી થાયમિન (T) અથવા ઉલટું", "ફ્રેમશિફ્ટ (Frameshift) - ન્યુક્લિયોટાઇડની ઉમેરણ અથવા કાઢણ"], "ans": 0, "exp": "5-બ્રોમોયુરેસિલ (5BU) એ થાયમિનનો એનાલોગ છે, જે DNA રેપ્લિકેશન દરમિયાન થાયમિન (T) ની જગ્યાએ ભૂલથી જોડાઈ શકે છે. તે સામાન્ય રીતે એડેનિન (A) સાથે જોડાય છે, પરંતુ કેટલીક વખત ગુઆનિન (G) સાથે પણ જોડાઈ શકે છે, જે ટ્રાન્ઝિશન મ્યુટેશન તરફ દોરી જાય છે. ટ્રાન્સવર્ઝન (B) અને ફ્રેમશિફ્ટ (D) 5BU ના કારણે થતાં નથી. સાયટોસિન (C) અને થાયમિન વચ્ચેનો ટ્રાન્ઝિશન 5BU ના કારણે થતો નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની રચનામાં, કયા બેઇઝ પેઅરમાં હાઇડ્રોજન બંધની સંખ્યા અને તેની સ્થિરતા વચ્ચેનો સંબંધ અન્ય બેઇઝ પેઅર કરતાં ભિન્ન છે?", "opts": ["એડેનિન-થાયમિન (A-T)", "ગુઆનિન-સાયટોસિન (G-C)", "એડેનિન-સાયટોસિન (A-C)", "ગુઆનિન-થાયમિન (G-T)"], "ans": 1, "exp": "ગુઆનિન-સાયટોસિન (G-C) બેઇઝ પેઅરમાં ત્રણ હાઇડ્રોજન બંધ હોય છે, જે તેને એડેનિન-થાયમિન (A-T) કરતાં વધુ સ્થિર બનાવે છે. A-T પેઅરમાં ફક્ત બે હાઇડ્રોજન બંધ હોય છે. A-C (C) અને G-T (D) બેઇઝ પેઅર DNA ની સામાન્ય રચનામાં જોવા મળતા નથી, તેથી તે અસંગત છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની રચનામાં, કયા અણુને 'અનુવંશિક સંકેતનો સંરક્ષક' કહી શકાય, કારણ કે તે DNA ની સ્થિરતામાં મહત્વની ભૂમિકા ભજવે છે?", "opts": ["હિસ્ટોન પ્રોટીન", "RNA પોલિમરેઝ", "DNA પોલિમરેઝ", "ટોપોઆઇસોમરેઝ"], "ans": 0, "exp": "હિસ્ટોન પ્રોટીન DNA ની સ્થિરતામાં મહત્વની ભૂમિકા ભજવે છે, કારણ કે તે DNA ને ન્યુક્લિયોસોમમાં ગોઠવવામાં મદદ કરે છે, જે DNA ને નુકસાનથી બચાવે છે. RNA પોલિમરેઝ (B) અને DNA પોલિમરેઝ (C) DNA ની પ્રતિકૃતિ અને પ્રસરણમાં સંલગ્ન છે, પરંતુ સ્થિરતામાં નહીં. ટોપોઆઇસોમરેઝ (D) DNA ની ટોપોલોજીને નિયંત્રિત કરે છે, પરંતુ તેને 'સંરક્ષક' કહી શકાય નહીં.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની દ્વિપાઠી રચનામાં, જો એક સ્ટ્રેન્ડમાં 5-હાઇડ્રોક્સીમેથાઇલસાયટોસિન (5hmC) ની હાજરી જોવા મળે, તો તેના વિશે કયું વિધાન સત્ય છે?", "opts": ["તે DNA મેથાઇલેશનનો એક પ્રકાર છે અને જનીન અભિવ્યક્તિને પ્રોત્સાહન આપે છે.", "તે DNA ડિમેથાઇલેશનનો સંકેત છે અને જનીન અભિવ્યક્તિને અવરોધે છે.", "તે DNA ની સ્થિરતામાં વધારો કરે છે અને મ્યુટેશનને રોકે છે.", "તે RNA ટ્રાન્સક્રિપ્શનને પ્રભાવિત કરતું નથી અને ફક્ત પ્રોકેરિયોટ્સમાં જોવા મળે છે."], "ans": 0, "exp": "5-હાઇડ્રોક્સીમેથાઇલસાયટોસિન (5hmC) એ DNA મેથાઇલેશનનો એક પ્રકાર છે, જે જનીન અભિવ્યક્તિને પ્રોત્સાહન આપે છે. તે મેથાઇલસાયટોસિન (5mC) નું ઓક્સિડેશન છે અને જનીન નિયંત્રણમાં મહત્વની ભૂમિકા ભજવે છે. વિકલ્પ B ખોટો છે કારણ કે 5hmC ડિમેથાઇલેશનનો સંકેત નથી, વિકલ્પ C ખોટો છે કારણ કે તે DNA ની સ્થિરતામાં વધારો કરતું નથી, અને વિકલ્પ D ખોટો છે કારણ કે તે યુકેરિયોટ્સમાં પણ જોવા મળે છે અને RNA ટ્રાન્સક્રિપ્શનને પ્રભાવિત કરે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની રચનામાં, જો એક સ્ટ્રેન્ડમાં એડેનિન, થાયમિન, ગુઆનિન અને સાયટોસિનનું પ્રમાણ અનુક્રમે 25%, 25%, 20%, 30% હોય, તો તે DNA વિશે કયું વિધાન સત્ય નથી?", "opts": ["તે DNA ની દ્વિપાઠી રચના ચાર્લ્સ ચાર્ગાફના નિયમનું પાલન કરતી નથી.", "તે DNA ની લંબાઈમાં પ્યુરિન અને પિરિમિડિન બેઇઝની સંખ્યા સરખી હશે.", "તે DNA ની રચનામાં એડેનિન અને થાયમિન વચ્ચેના હાઇડ્રોજન બંધની સંખ્યા ગુઆનિન અને સાયટોસિન કરતાં ઓછી હશે.", "તે DNA ની રચનામાં કુલ પ્યુરિન બેઇઝનું પ્રમાણ 45% હશે."], "ans": 1, "exp": "ચાર્લ્સ ચાર્ગાફના નિયમ મુજબ, DNA ની દ્વિપાઠી રચનામાં એડેનિન = થાયમિન અને ગુઆનિન = સાયટોસિન હોવું જોઈએ. આપેલ પ્રમાણ મુજબ, એડેનિન (25%) અને થાયમિન (25%) સરખા છે, પરંતુ ગુઆનિન (20%) અને સાયટોસિન (30%) સરખા નથી, જેથી તે ચાર્ગાફના નિયમનું પાલન કરતી નથી (વિકલ્પ A સત્ય છે). વિકલ્પ B ખોટો છે કારણ કે પ્યુરિન (એડેનિન + ગુઆનિન = 45%) અને પિરિમિડિન (થાયમિન + સાયટોસિન = 55%)ની સંખ્યા સરખી નથી. વિકલ્પ C સત્ય છે કારણ કે એડેનિન-થાયમિન વચ્ચે 2 હાઇડ્રોજન બંધ હોય છે જ્યારે ગુઆનિન-સાયટોસિન વચ્ચે 3 હાઇડ્રોજન બંધ હોય છે. વિકલ્પ D સત્ય છે કારણ કે કુલ પ્યુરિન બેઇઝનું પ્રમાણ 25% + 20% = 45% છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
