<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>જન્મજાત રોગપ્રતિકારકતા</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>જન્મજાત રોગપ્રતિકારકતા</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">જન્મજાત રોગપ્રતિકારકતા</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "માનવ શરીરમાં જન્મજાત રોગપ્રતિકારકતાના ભાગરૂપે નીચેનામાંથી કયો કોષ સૂક્ષ્મજીવોને ફાગોસાઇટોસિસ દ્વારા નાશ કરે છે, પરંતુ તે એન્ટિજન પ્રસ્તુત કરતો નથી?", "opts": ["ન્યુટ્રોફિલ કોષ", "મેક્રોફેજ કોષ", "ડેન્ડ્રિટિક કોષ", "બેસોફિલ કોષ"], "ans": 0, "exp": "ન્યુટ્રોફિલ કોષો જન્મજાત રોગપ્રતિકારકતામાં મુખ્ય ફાગોસાઇટિક કોષો છે જે સૂક્ષ્મજીવોને ગળી જાય છે અને નાશ કરે છે, પરંતુ તેઓ એન્ટિજન પ્રસ્તુત કરતા નથી. મેક્રોફેજ અને ડેન્ડ્રિટિક કોષો એન્ટિજન પ્રસ્તુત કરે છે, જ્યારે બેસોફિલ કોષો એલર્જિક પ્રતિક્રિયામાં ભાગ લે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "જન્મજાત રોગપ્રતિકારકતામાં 'પૂરક તંત્ર' (Complement System) વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["તે લોહીમાં રહેલા પ્રોટીનનો સમૂહ છે જે સૂક્ષ્મજીવોને સીધા નાશ કરવામાં મદદ કરે છે", "તે એન્ટિબોડીની હાજરી વગર પણ સક્રિય થઈ શકે છે", "તે ફક્ત અનુકૂલિત રોગપ્રતિકારકતામાં જ કાર્ય કરે છે", "તે સૂક્ષ્મજીવો પર છિદ્રો બનાવીને તેમને નષ્ટ કરે છે"], "ans": 2, "exp": "પૂરક તંત્ર જન્મજાત અને અનુકૂલિત બંને રોગપ્રતિકારકતામાં કાર્ય કરે છે. તે એન્ટિબોડીની હાજરી વગર પણ સક્રિય થઈ શકે છે અને સૂક્ષ્મજીવોને સીધા નાશ કરવામાં મદદ કરે છે. વિકલ્પ C ખોટું છે કારણ કે તે માત્ર અનુકૂલિત રોગપ્રતિકારકતામાં જ કાર્ય કરતું નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેનામાંથી કયો પદાર્થ જન્મજાત રોગપ્રતિકારકતામાં સૂક્ષ્મજીવોના વિરુદ્ધ પ્રતિક્રિયા કરતો નથી?", "opts": ["લાઇસોઝાઇમ", "ઇન્ટરફેરોન", "ઇમ્યુનોગ્લોબ્યુલિન G (IgG)", "ડિફેન્સિન"], "ans": 2, "exp": "ઇમ્યુનોગ્લોબ્યુલિન G (IgG) અનુકૂલિત રોગપ્રતિકારકતાનો ભાગ છે અને તે એન્ટિબોડી તરીકે કાર્ય કરે છે. લાઇસોઝાઇમ, ઇન્ટરફેરોન અને ડિફેન્સિન જન્મજાત રોગપ્રતિકારકતામાં સૂક્ષ્મજીવોના વિરુદ્ધ પ્રતિક્રિયા કરે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "જન્મજાત રોગપ્રતિકારકતામાં TLRs (Toll-like Receptors) વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["TLRs પટલ-બંધ ગ્લાયકોપ્રોટીન રીસેપ્ટર્સ છે", "TLRs ફક્ત બેક્ટેરિયાના એન્ટિજનને ઓળખે છે", "TLRs સક્રિય થવાથી સાયટોકાઇન ઉત્પાદન વધે છે", "TLRs વાઇરસ, બેક્ટેરિયા અને ફૂગના પૅટર્ન ઓળખે છે"], "ans": 1, "exp": "TLRs માત્ર બેક્ટેરિયાના એન્ટિજનને જ નહીં, પરંતુ વાઇરસ, ફૂગ અને અન્ય સૂક્ષ્મજીવોના પૅટર્ન પણ ઓળખે છે. તેઓ પટલ-બંધ ગ્લાયકોપ્રોટીન રીસેપ્ટર્સ છે અને સક્રિય થવાથી સાયટોકાઇન ઉત્પાદન વધે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "જન્મજાત રોગપ્રતિકારકતામાં NK કોષો (Natural Killer Cells) વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["NK કોષો વાઇરસથી સંક્રમિત કોષો અને કૅન્સર કોષોને મારી નાખે છે", "NK કોષો એન્ટિબોડી-આધારિત સેલ્યુલર સાયટોટોક્સિસિટી (ADCC) દ્વારા કાર્ય કરે છે", "NK કોષો MHC-I અણુની હાજરીને ઓળખીને કોષોને મારી નાખે છે", "NK કોષો જન્મજાત રોગપ્રતિકારકતાનો ભાગ છે"], "ans": 2, "exp": "NK કોષો MHC-I અણુની ગેરહાજરીને ઓળખીને કોષોને મારી નાખે છે, નહીં કે તેની હાજરીને. તેઓ વાઇરસથી સંક્રમિત કોષો અને કૅન્સર કોષોને મારી નાખે છે, ADCC દ્વારા કાર્ય કરે છે અને જન્મજાત રોગપ્રતિકારકતાનો ભાગ છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેનામાંથી કયો કોષ જન્મજાત રોગપ્રતિકારકતામાં સીધો વાઇરસથી સંક્રમિત કોષોને ઓળખીને નાશ કરે છે, પરંતુ તેને ફાગોસાઇટોસિસની ક્રિયા કરવાની ક્ષમતા હોતી નથી?", "opts": ["મેક્રોફેજ", "ન્યુટ્રોફિલ", "NK કોષ", "ડેન્ડ્રિટિક કોષ"], "ans": 2, "exp": "NK (Natural Killer) કોષો જન્મજાત રોગપ્રતિકારકતામાં વાઇરસથી સંક્રમિત કોષોને ઓળખીને એપોપ્ટોસિસ દ્વારા નાશ કરે છે, પરંતુ તેમનામાં ફાગોસાઇટોસિસની ક્ષમતા હોતી નથી. મેક્રોફેજ અને ન્યુટ્રોફિલ ફાગોસાઇટોસિસ દ્વારા સૂક્ષ્મજીવોનો નાશ કરે છે, જ્યારે ડેન્ડ્રિટિક કોષો પ્રતિરક્ષા પ્રતિક્રિયા શરૂ કરવામાં મદદ કરે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "જન્મજાત રોગપ્રતિકારકતામાં 'ઇન્ટરફેરોન' (Interferon) વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["ઇન્ટરફેરોન વાઇરસના પ્રસરણને અટકાવે છે.", "ઇન્ટરફેરોન માત્ર વાઇરસથી સંક્રમિત કોષો દ્વારા ઉત્પન્ન થાય છે.", "ઇન્ટરફેરોન અન્ય કોષોને વાઇરસ પ્રતિરોધક બનાવવામાં મદદ કરે છે.", "ઇન્ટરફેરોન બેક્ટેરિયા સામે પણ સીધી અસર કરે છે."], "ans": 3, "exp": "ઇન્ટરફેરોન વાઇરસથી સંક્રમિત કોષો દ્વારા ઉત્પન્ન થાય છે અને તે અન્ય કોષોને વાઇરસ પ્રતિરોધક બનાવવામાં મદદ કરે છે, પરંતુ તે બેક્ટેરિયા સામે સીધી અસર કરતું નથી. ઇન્ટરફેરોનનું મુખ્ય કાર્ય વાઇરસના પ્રસરણને અટકાવવાનું છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન જન્મજાત રોગપ્રતિકારકતામાં 'પૂરક તંત્ર' (Complement System)ની ક્રિયાવિધિ માટે ખોટું છે?", "opts": ["પૂરક તંત્રના પ્રોટીન સૂક્ષ્મજીવો પર MAC (Membrane Attack Complex) બનાવીને તેમનો નાશ કરે છે.", "પૂરક તંત્રના પ્રોટીન ફાગોસાઇટોસિસને પ્રોત્સાહન આપે છે.", "પૂરક તંત્રના પ્રોટીન એન્ટિબોડીની હાજરી વગર પણ સક્રિય થઈ શકે છે.", "પૂરક તંત્રના પ્રોટીન માત્ર અનુકૂલિત રોગપ્રતિકારકતામાં જ કાર્ય કરે છે."], "ans": 3, "exp": "પૂરક તંત્રના પ્રોટીન જન્મજાત રોગપ્રતિકારકતામાં એન્ટિબોડીની હાજરી વગર પણ સક્રિય થઈ શકે છે અને સૂક્ષ્મજીવોનો નાશ કરે છે. તે MAC બનાવીને સૂક્ષ્મજીવોનો નાશ કરે છે અને ફાગોસાઇટોસિસને પ્રોત્સાહન આપે છે. તે અનુકૂલિત રોગપ્રતિકારકતામાં પણ કાર્ય કરે છે, પરંતુ માત્ર તેમાં જ નહીં.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "જન્મજાત રોગપ્રતિકારકતામાં 'ઇન્ફ્લેમેશન' (સોજો)ની પ્રક્રિયા વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["ઇન્ફ્લેમેશન દરમિયાન રક્તવાહિનીઓનું પહોળું થવું અને પ્રવાહીનું સ્રાવ થવું એ મુખ્ય લક્ષણ છે.", "ઇન્ફ્લેમેશનમાં હિસ્ટામાઇન અને પ્રોસ્ટાગ્લાન્ડિન જેવા મધ્યસ્થીઓ મહત્ત્વનો ભાગ ભજવે છે.", "ઇન્ફ્લેમેશનની પ્રક્રિયા માત્ર અનુકૂલિત રોગપ્રતિકારકતામાં જ થાય છે.", "ઇન્ફ્લેમેશન દરમિયાન ફાગોસાઇટિક કોષો સંક્રમણના સ્થળે એકઠા થાય છે."], "ans": 2, "exp": "ઇન્ફ્લેમેશન (સોજો) જન્મજાત રોગપ્રતિકારકતાનો એક મહત્ત્વનો ભાગ છે, જેમાં રક્તવાહિનીઓનું પહોળું થવું, પ્રવાહીનું સ્રાવ થવું અને ફાગોસાઇટિક કોષોનું સંક્રમણના સ્થળે એકઠા થવું જેવી પ્રક્રિયાઓ થાય છે. હિસ્ટામાઇન અને પ્રોસ્ટાગ્લાન્ડિન જેવા મધ્યસ્થીઓ આ પ્રક્રિયામાં મહત્ત્વનો ભાગ ભજવે છે. ઇન્ફ્લેમેશન અનુકૂલિત રોગપ્રતિકારકતામાં પણ થઈ શકે છે, પરંતુ તે માત્ર તેમાં જ મર્યાદિત નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "માનવ શરીરમાં જન્મજાત રોગપ્રતિકારકતાના એક ભાગ તરીકે 'ડેફેન્સિન' (Defensins) નામના પેપ્ટાઇડ્સ કાર્ય કરે છે. નીચેનામાંથી કયું વિધાન આ પેપ્ટાઇડ્સની ક્રિયાવિધિ અને લાક્ષણિકતાઓ માટે ખોટું છે?", "opts": ["ડેફેન્સિન સૂક્ષ્મજીવોની કોષપટલમાં છિદ્રો ઉત્પન્ન કરીને તેમને નાશ કરે છે", "આ પેપ્ટાઇડ્સ મુખ્યત્વે ન્યુટ્રોફિલ્સ અને એપિથેલિયલ કોષો દ્વારા સ્રાવિત થાય છે", "ડેફેન્સિન વાઇરસના કોષકેન્દ્રમાં પ્રવેશીને તેમના DNA અથવા RNAનું સીધું વિઘટન કરે છે", "આ પેપ્ટાઇડ્સ બેક્ટેરિયા, ફૂગ અને કેટલાક વાઇરસ સામે અસરકારક હોય છે"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. ડેફેન્સિન એ એન્ટિમાઇક્રોબાયલ પેપ્ટાઇડ્સ છે જે સૂક્ષ્મજીવોની કોષપટલમાં છિદ્રો ઉત્પન્ન કરીને તેમને નાશ કરે છે, પરંતુ તેઓ વાઇરસના કોષકેન્દ્રમાં પ્રવેશીને DNA અથવા RNAનું સીધું વિઘટન કરતા નથી. વિકલ્પ A, B અને D ડેફેન્સિનની સાચી લાક્ષણિકતાઓ અને કાર્યપદ્ધતિ દર્શાવે છે, જ્યારે વિકલ્પ C ખોટી માહિતી આપે છે કારણ કે ડેફેન્સિન વાઇરસના આનુવંશિક દ્રવ્યને સીધું નુકસાન પહોંચાડતા નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો (જન્મજાત રોગપ્રતિકારકતા)", "ch": ""}, {"q": "જન્મજાત રોગપ્રતિકારકતામાં, નીચેનામાંથી કયો પદાર્થ સૂક્ષ્મજીવોની કોષભિત્તિને તોડીને તેને નિષ્ક્રિય કરે છે, પરંતુ તેની ક્રિયા માટે કેલ્શિયમ આયનની હાજરી અનિવાર્ય છે?", "opts": ["લાઇસોઝાઇમ", "પૂરક પ્રોટીન C3b", "ડેફેન્સિન", "લેક્ટોફેરિન"], "ans": 1, "exp": "પૂરક પ્રોટીન C3b સૂક્ષ્મજીવોની કોષભિત્તિને તોડીને તેને નિષ્ક્રિય કરે છે અને તેની ક્રિયા માટે કેલ્શિયમ આયનની હાજરી અનિવાર્ય છે. લાઇસોઝાઇમ કોષભિત્તિને તોડે છે પરંતુ કેલ્શિયમ આયનની આશ્રયકતા નથી. ડેફેન્સિન અને લેક્ટોફેરિન સૂક્ષ્મજીવોને મારવા માટે અન્ય મેકેનિઝમ વાપરે છે.", "ref": "Std 12 - Chapter 10: માનવ રોગપ્રતિકારક તંત્ર", "ch": ""}, {"q": "જન્મજાત રોગપ્રતિકારકતામાં, નીચેનામાંથી કયો કોષ સૂક્ષ્મજીવોને ઓળખીને સાયટોકાઇન્સ ઉત્પન્ન કરે છે, પરંતુ ફાગોસાઇટોસિસ કરતો નથી?", "opts": ["ન્યૂટ્રોફિલ", "મોનોસાઇટ", "ડેન્ડ્રિટિક કોષ", "બેસોફિલ"], "ans": 3, "exp": "બેસોફિલ કોષ સૂક્ષ્મજીવોને ઓળખીને સાયટોકાઇન્સ ઉત્પન્ન કરે છે, પરંતુ તે ફાગોસાઇટોસિસ કરતો નથી. ન્યૂટ્રોફિલ, મોનોસાઇટ અને ડેન્ડ્રિટિક કોષ ફાગોસાઇટોસિસ કરે છે.", "ref": "Std 12 - Chapter 10: માનવ રોગપ્રતિકારક તંત્ર", "ch": ""}, {"q": "જન્મજાત રોગપ્રતિકારકતામાં, નીચેનામાંથી કયું વિધાન 'મૅક્રોફેજ' વિશે ખોટું છે?", "opts": ["તે સૂક્ષ્મજીવોને ફાગોસાઇટોસિસ દ્વારા નાશ કરે છે", "તે એન્ટિજન પ્રસ્તુત કરવાની ક્ષમતા ધરાવે છે", "તે ઇન્ટરફેરોન ઉત્પન્ન કરે છે", "તે કોષીય રોગપ્રતિકારકતામાં ભાગ લે છે"], "ans": 2, "exp": "મૅક્રોફેજ સૂક્ષ્મજીવોને ફાગોસાઇટોસિસ દ્વારા નાશ કરે છે, એન્ટિજન પ્રસ્તુત કરે છે અને કોષીય રોગપ્રતિકારકતામાં ભાગ લે છે, પરંતુ ઇન્ટરફેરોન ઉત્પન્ન કરતો નથી. ઇન્ટરફેરોન વાઇરસ દ્વારા સંક્રમિત કોષો દ્વારા ઉત્પન્ન થાય છે.", "ref": "Std 12 - Chapter 10: માનવ રોગપ્રતિકારક તંત્ર", "ch": ""}, {"q": "જન્મજાત રોગપ્રતિકારકતામાં, નીચેનામાંથી કયું વિધાન 'નેચરલ કિલર (NK) કોષ' વિશે સાચું છે?", "opts": ["તે સૂક્ષ્મજીવોને ફાગોસાઇટોસિસ દ્વારા નાશ કરે છે", "તે વાઇરસ દ્વારા સંક્રમિત કોષોને અને કૅન્સર કોષોને નાશ કરે છે", "તે એન્ટિબોડી ઉત્પન્ન કરે છે", "તે એન્ટિજન પ્રસ્તુત કરે છે"], "ans": 1, "exp": "નેચરલ કિલર (NK) કોષ વાઇરસ દ્વારા સંક્રમિત કોષોને અને કૅન્સર કોષોને નાશ કરે છે. તે ફાગોસાઇટોસિસ કરતો નથી, એન્ટિબોડી ઉત્પન્ન કરતો નથી, અને એન્ટિજન પ્રસ્તુત કરતો નથી.", "ref": "Std 12 - Chapter 10: માનવ રોગપ્રતિકારક તંત્ર", "ch": ""}, {"q": "જન્મજાત રોગપ્રતિકારકતામાં, નીચેનામાંથી કયું સંયોજન સૂક્ષ્મજીવોની કોષભિત્તિમાં લાઇપોપોલિસેકેરાઇડ (LPS) ની હાજરીને ઓળખીને પૂરક તંત્ર (Complement System) અને ફાગોસાઇટોસિસને પ્રેરિત કરે છે, પરંતુ તે સીધું જ એન્ટિબોડી ઉત્પન્ન કરતું નથી?", "opts": ["ટોલ-લાઇક રિસેપ્ટર 4 (TLR-4)", "ઇમ્યુનોગ્લોબ્યુલિન M (IgM)", "ઇન્ટરલ્યુકિન-1 (IL-1)", "લાઇસોઝાઇમ"], "ans": 0, "exp": "ટોલ-લાઇક રિસેપ્ટર 4 (TLR-4) જન્મજાત રોગપ્રતિકારકતાના ભાગરૂપે સૂક્ષ્મજીવોની કોષભિત્તિમાં લાઇપોપોલિસેકેરાઇડ (LPS) ની હાજરી ઓળખે છે અને પૂરક તંત્ર (Complement System) અને ફાગોસાઇટોસિસને પ્રેરિત કરે છે. ઇમ્યુનોગ્લોબ્યુલિન M (IgM) અર્જિત રોગપ્રતિકારકતાનો ભાગ છે અને એન્ટિબોડી છે, જ્યારે ઇન્ટરલ્યુકિન-1 (IL-1) સાયટોકાઇન છે જે સોજો પ્રક્રિયામાં ભાગ લે છે. લાઇસોઝાઇમ એ એન્ટિમાઇક્રોબાયલ પેપ્ટાઇડ છે જે સૂક્ષ્મજીવોની કોષભિત્તિને તોડી નાખે છે, પરંતુ તે LPS ની ઓળખ કરતું નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ રોગપ્રતિકારક તંત્ર", "ch": ""}, {"q": "જન્મજાત રોગપ્રતિકારકતામાં, 'લેક્ટિન પાથવે' (Lectin Pathway) ની શરૂઆત કયા પદાર્થ દ્વારા થાય છે, જે સૂક્ષ્મજીવની કોષભિત્તિ પરના કાર્બોદિતને ઓળખે છે?", "opts": ["મૅનોઝ-બાઇન્ડિંગ લેક્ટિન (MBL)", "C1q પ્રોટીન", "ફાઇબ્રિનોજન", "ઇમ્યુનોગ્લોબ્યુલિન M (IgM)"], "ans": 0, "exp": "લેક્ટિન પાથવેની શરૂઆત મૅનોઝ-બાઇન્ડિંગ લેક્ટિન (MBL) દ્વારા થાય છે, જે સૂક્ષ્મજીવની કોષભિત્તિ પરના મૅનોઝ શર્કરાને ઓળખે છે. C1q પ્રોટીન ક્લાસિકલ પાથવે સાથે સંબંધિત છે, ફાઇબ્રિનોજન રક્ત ગંઠાવા સાથે સંબંધિત છે, અને IgM એ અર્જિત રોગપ્રતિકારકતાનો ભાગ છે.", "ref": "Std 12 - Chapter 10: માનવ રોગપ્રતિકારકતા અને શરીરની સુરક્ષા", "ch": ""}, {"q": "જન્મજાત રોગપ્રતિકારકતામાં, નીચેનામાંથી કયો કોષ 'અનુવંશિક રીતે નક્કી કરેલા પેટર્ન ઓળખનાર રિસેપ્ટર્સ' (PRRs) ધરાવતો નથી?", "opts": ["ન્યુટ્રોફિલ્સ", "મૅક્રોફેજ", "ડેન્ડ્રિટિક કોષ", "T-લિમ્ફોસાઇટ"], "ans": 3, "exp": "T-લિમ્ફોસાઇટ્સ અર્જિત રોગપ્રતિકારકતાનો ભાગ છે અને PRRs ધરાવતા નથી. ન્યુટ્રોફિલ્સ, મૅક્રોફેજ અને ડેન્ડ્રિટિક કોષો જન્મજાત રોગપ્રતિકારકતાનો ભાગ છે અને PRRs ધરાવે છે.", "ref": "Std 12 - Chapter 10: માનવ રોગપ્રતિકારકતા અને શરીરની સુરક્ષા", "ch": ""}, {"q": "જન્મજાત રોગપ્રતિકારકતામાં, 'ઇન્ટરલ્યુકિન-1 (IL-1)' ની ભૂમિકા વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["તે સોજો (ઇન્ફ્લેમેશન) ની પ્રક્રિયામાં ભાગ લે છે.", "તે તાપમાન વધારવામાં ભૂમિકા ભજવે છે.", "તે સીધો જ સૂક્ષ્મજીવોને નાશ કરે છે.", "તે લ્યુકોસાઇટ્સને સંક્રમણ સ્થળે આકર્ષે છે."], "ans": 2, "exp": "ઇન્ટરલ્યુકિન-1 (IL-1) સોજો, તાપમાન વધારવા અને લ્યુકોસાઇટ્સને આકર્ષવામાં ભૂમિકા ભજવે છે, પરંતુ તે સીધો જ સૂક્ષ્મજીવોને નાશ કરતું નથી. સૂક્ષ્મજીવોને નાશ કરવાની ક્રિયા મુખ્યત્વે ફાગોસાઇટોસિસ અથવા પૂરક તંત્ર દ્વારા થાય છે.", "ref": "Std 12 - Chapter 10: માનવ રોગપ્રતિકારકતા અને શરીરની સુરક્ષા", "ch": ""}, {"q": "જન્મજાત રોગપ્રતિકારકતામાં, 'સાયટોકાઇન સ્ટોર્મ' ની સ્થિતિમાં નીચેનામાંથી કયું પરિણામ થતું નથી?", "opts": ["શરીરમાં ગંભીર સોજો થવો", "રક્તવાહિનીઓની પારગમ્યતા વધવી", "અંગોનું કાયમી નુકસાન થવું", "એન્ટીબોડીનું ઉત્પાદન વધવું"], "ans": 3, "exp": "સાયટોકાઇન સ્ટોર્મમાં શરીરમાં ગંભીર સોજો, રક્તવાહિનીઓની પારગમ્યતા વધવી અને અંગોનું નુકસાન થાય છે, પરંતુ એન્ટીબોડીનું ઉત્પાદન અર્જિત રોગપ્રતિકારકતાનો ભાગ છે અને સાયટોકાઇન સ્ટોર્મ સાથે સીધો સંબંધ ધરાવતું નથી.", "ref": "Std 12 - Chapter 10: માનવ રોગપ્રતિકારકતા અને શરીરની સુરક્ષા", "ch": ""}, {"q": "જન્મજાત રોગપ્રતિકારકતામાં, 'ટોલ-લાઇક રિસેપ્ટર્સ (TLRs)' ની ક્રિયાવિધિ વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["TLRs ફક્ત વાઇરસને ઓળખે છે.", "TLRs કોષની અંદર સ્થિત છે અને ફક્ત ઇન્ટ્રાસેલ્યુલર પેથોજેન્સને ઓળખે છે.", "TLRs કોષની બહાર અને અંદર બંને સ્થાને સ્થિત હોઈ શકે છે અને વિવિધ PAMPsને ઓળખે છે.", "TLRs ફક્ત બેક્ટેરિયાને ઓળખે છે અને ફાગોસાઇટોસિસમાં ભાગ લેતા નથી."], "ans": 2, "exp": "TLRs કોષની બહાર અને અંદર બંને સ્થાને સ્થિત હોઈ શકે છે અને વિવિધ પેથોજેન-સંબંધિત આણ્વિક પેટર્ન્સ (PAMPs) જેવા કે લિપોપોલિસેકેરાઇડ્સ, વાઇરલ RNA/DNA, અને બેક્ટેરિયલ પ્રોટીનને ઓળખે છે. તેઓ ફાગોસાઇટોસિસ અને સાયટોકાઇન ઉત્પાદનમાં ભૂમિકા ભજવે છે.", "ref": "Std 12 - Chapter 10: માનવ રોગપ્રતિકારકતા અને શરીરની સુરક્ષા", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
