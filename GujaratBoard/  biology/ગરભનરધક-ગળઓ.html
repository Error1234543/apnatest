<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ગર્ભનિરોધક ગોળીઓ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ગર્ભનિરોધક ગોળીઓ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ગર્ભનિરોધક ગોળીઓ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ગર્ભનિરોધક ગોળીઓમાં રહેલા સિન્થેટિક પ્રોજેસ્ટેરોન અને ઇસ્ટ્રોજન હોર્મોનનો મુખ્ય હેતુ શું છે?", "opts": ["ગર્ભાશયની દીવાલને પાતળી કરવી અને ઓવ્યુલેશનને અટકાવવું", "ગર્ભાશયના મ્યુકસને ઘટ્ટ કરવો અને શુક્રાણુઓની હલનચલનને સરળ બનાવવી", "પિટ્યુટરી ગ્રંથિમાંથી FSH અને LH નું સ્રાવ વધારવું", "એન્ડોમેટ્રિયમને મજબૂત કરવું અને ગર્ભધારણની શક્યતા વધારવી"], "ans": 0, "exp": "ગર્ભનિરોધક ગોળીઓમાં રહેલા સિન્થેટિક હોર્મોન (પ્રોજેસ્ટેરોન અને ઇસ્ટ્રોજન)નો મુખ્ય હેતુ ઓવ્યુલેશનને અટકાવવું અને ગર્ભાશયની દીવાલને પાતળી કરવી છે, જેથી ગર્ભધારણ થઈ શકતું નથી. બાકીના વિકલ્પો ખોટા છે: B) મ્યુકસ ઘટ્ટ થવાથી શુક્રાણુઓની હલનચલન અટકે છે, C) FSH અને LH નું સ્રાવ ઘટે છે, D) એન્ડોમેટ્રિયમ પાતળું થવાથી ગર્ભધારણની શક્યતા ઘટે છે.", "ref": "Std 12 - પ્રકરણ 4: માનવ પ્રજનન", "ch": ""}, {"q": "ગર્ભનિરોધક ગોળીઓ લેવાથી કયું પાર્શ્વ પરિણામ સૌથી વધુ જોવા મળે છે?", "opts": ["હૃદયના ધબકારા વધવા", "રક્તમાં ગ્લુકોઝનું પ્રમાણ ઘટવું", "થ્રોમ્બોસિસ (રક્ત ગંઠાઈ જવું)નો ખતરો વધવો", "હાડકાંની મજબૂતાઈ વધવી"], "ans": 2, "exp": "ગર્ભનિરોધક ગોળીઓ લેવાથી થ્રોમ્બોસિસ (રક્ત ગંઠાઈ જવું)નો ખતરો વધે છે, કારણ કે ઇસ્ટ્રોજન હોર્મોન રક્તના થક્કર બનાવવામાં ભૂમિકા ભજવે છે. A) હૃદયના ધબકારા વધવા એ સામાન્ય પાર્શ્વ પરિણામ નથી, B) રક્તમાં ગ્લુકોઝનું પ્રમાણ ઘટવું એ ખોટું છે (ઇસ્ટ્રોજન ગ્લુકોઝના સ્તરને અસર કરે છે પરંતુ ઘટાડે નથી), D) હાડકાંની મજબૂતાઈ ઘટે છે, નહીં કે વધે.", "ref": "Std 12 - પ્રકરણ 4: માનવ પ્રજનન", "ch": ""}, {"q": "ગર્ભનિરોધક ગોળીઓ લેતી સ્ત્રીને અચાનક ગર્ભવતી થાય છે, તો કયું કારણ સૌથી વધુ સંભવિત છે?", "opts": ["ગોળીઓને યોગ્ય સમયે ન લેવી", "ગોળીઓ સાથે એન્ટીબાયોટિક્સ લેવાથી હોર્મોનનું શોષણ ઘટવું", "ગોળીઓની ડોઝ ઓછી હોવી", "ઉપરોક્ત તમામ"], "ans": 3, "exp": "ગર્ભનિરોધક ગોળીઓની અસરકારકતા ઘટવાનાં કારણો પૈકી ગોળીઓને યોગ્ય સમયે ન લેવી, એન્ટીબાયોટિક્સ લેવાથી હોર્મોનનું શોષણ ઘટવું, અને ડોઝ ઓછી હોવી એ તમામ સંભવિત કારણો છે. આથી D) ઉપરોક્ત તમામ સૌથી યોગ્ય વિકલ્પ છે.", "ref": "Std 12 - પ્રકરણ 4: માનવ પ્રજનન", "ch": ""}, {"q": "ગર્ભનિરોધક ગોળીઓમાં રહેલા હોર્મોનનો પ્રભાવ કયા અંગ પર સૌથી ઓછો હોય છે?", "opts": ["અંડાશય (Ovary)", "ગર્ભાશય (Uterus)", "પિટ્યુટરી ગ્રંથિ (Pituitary Gland)", "યકૃત (Liver)"], "ans": 3, "exp": "ગર્ભનિરોધક ગોળીઓમાં રહેલા હોર્મોનનો પ્રભાવ અંડાશય, ગર્ભાશય, અને પિટ્યુટરી ગ્રંથિ પર સીધો જ હોય છે, પરંતુ યકૃત પર તેનો પ્રભાવ અપ્રત્યક્ષ અને ઓછો હોય છે. યકૃત હોર્મોનના ચયાપચયમાં ભૂમિકા ભજવે છે, પરંતુ તેનો સીધો લક્ષ્ય અંગ નથી.", "ref": "Std 12 - પ્રકરણ 4: માનવ પ્રજનન", "ch": ""}, {"q": "ગર્ભનિરોધક ગોળીઓ લેવાથી કયું હોર્મોનનું સ્તર સૌથી વધુ અસર પામે છે?", "opts": ["પ્રોલેક્ટિન", "FSH અને LH", "થાયરોક્સિન", "ઇન્સ્યુલિન"], "ans": 1, "exp": "ગર્ભનિરોધક ગોળીઓમાં રહેલા સિન્થેટિક હોર્મોન (પ્રોજેસ્ટેરોન અને ઇસ્ટ્રોજન) પિટ્યુટરી ગ્રંથિમાંથી FSH અને LH નું સ્રાવ ઘટાડે છે, જેથી ઓવ્યુલેશન અટકાવી શકાય. પ્રોલેક્ટિન, થાયરોક્સિન, અને ઇન્સ્યુલિન પર તેનો સીધો પ્રભાવ ઓછો હોય છે.", "ref": "Std 12 - પ્રકરણ 4: માનવ પ્રજનન", "ch": ""}, {"q": "ગર્ભનિરોધક ગોળીઓ લેવાથી અંડાશયમાં અંડપીંડના પકવણને રોકવા પાછળનું મુખ્ય કારણ કયું છે?", "opts": ["FSH અને LH હોર્મોનના સ્રાવમાં ઘટાડો થવો", "પ્રોજેસ્ટેરોનનું સ્તર અચાનક વધી જવું", "ઇસ્ટ્રોજનનું સ્તર ઓછું થઈ જવું", "અંડવાહિનીમાં શ્લેષ્મના સ્રાવમાં વધારો થવો"], "ans": 0, "exp": "ગર્ભનિરોધક ગોળીઓમાં રહેલા સિન્થેટિક હોર્મોન (પ્રોજેસ્ટેરોન અને ઇસ્ટ્રોજન) પિટ્યુટરી ગ્રંથિમાંથી FSH (ફોલિકલ સ્ટિમ્યુલેટિંગ હોર્મોન) અને LH (લ્યુટિનાઇઝિંગ હોર્મોન)ના સ્રાવને દબાવે છે. FSH અને LHના ઓછા સ્રાવને કારણે અંડાશયમાં અંડપીંડનું પકવણ થતું નથી, જેથી ઓવ્યુલેશન (અંડોત્સર્ગ) થતો નથી. બાકીના વિકલ્પો: B) પ્રોજેસ્ટેરોનનું સ્તર વધે છે, પરંતુ તે અંડપીંડના પકવણને રોકવા માટે FSH/LHના ઘટાડાને કારણે થાય છે, મુખ્ય કારણ નથી. C) ઇસ્ટ્રોજનનું સ્તર ઘટતું નથી, ઉલટાનું ગોળીઓમાં ઇસ્ટ્રોજન હોય છે. D) અંડવાહિનીમાં શ્લેષ્મના સ્રાવમાં વધારો થાય છે, પરંતુ તે અંડપીંડના પકવણને રોકવા માટે જવાબદાર નથી.", "ref": "Std 12 - પ્રકરણ ૪: પ્રજનનમાં મનુષ્ય", "ch": ""}, {"q": "ગર્ભનિરોધક ગોળીઓ લેવાથી ગર્ભાશયની અંદરની અસ્તર (એન્ડોમેટ્રિયમ) પર શું અસર થાય છે?", "opts": ["એન્ડોમેટ્રિયમનું જાડું થવું અને રક્તવાહિનીઓનો વિકાસ વધવો", "એન્ડોમેટ્રિયમ પાતળું રહેવું અને રક્તપૂરવઠો ઓછો થવો", "એન્ડોમેટ્રિયમમાં કોષવિભાજનનો દર વધવો", "એન્ડોમેટ્રિયમમાં સ્નાયુ કોષોની સંખ્યામાં વધારો થવો"], "ans": 1, "exp": "ગર્ભનિરોધક ગોળીઓમાં રહેલા પ્રોજેસ્ટેરોનને કારણે એન્ડોમેટ્રિયમ (ગર્ભાશયની અંદરની અસ્તર) પાતળું રહે છે અને રક્તપૂરવઠો ઓછો થાય છે. આને કારણે ગર્ભધારણ થયું હોત તો પણ ગર્ભનું અસ્તિત્વ ટકી શકતું નથી. બાકીના વિકલ્પો: A) એન્ડોમેટ્રિયમ જાડું થવું અને રક્તવાહિનીઓનો વિકાસ વધવો તે ગર્ભધારણ દરમિયાન થાય છે, ગર્ભનિરોધક ગોળીઓના કારણે નહીં. C) કોષવિભાજનનો દર ઘટે છે, વધતો નથી. D) સ્નાયુ કોષોની સંખ્યામાં કોઈ ખાસ ફેરફાર થતો નથી.", "ref": "Std 12 - પ્રકરણ ૄ: પ્રજનનમાં મનુષ્ય", "ch": ""}, {"q": "ગર્ભનિરોધક ગોળીઓ લેવાથી સ્તનપાન કરાવતી માતાના દૂધ પર કયો પ્રભાવ જોવા મળે છે?", "opts": ["દૂધનું પ્રમાણ વધે છે અને તે પૌષ્ટિક બને છે", "દૂધનું પ્રમાણ ઘટે છે અને તેના પૌષ્ટિક મૂલ્યમાં ફેરફાર થતો નથી", "દૂધમાં પ્રોટીનની માત્રા અચાનક વધી જાય છે", "દૂધમાં કાર્બોદિતની માત્રા ઘટી જાય છે"], "ans": 1, "exp": "ગર્ભનિરોધક ગોળીઓ લેવાથી સ્તનપાન કરાવતી માતાના દૂધનું પ્રમાણ ઘટી શકે છે, પરંતુ દૂધના પૌષ્ટિક મૂલ્ય પર કોઈ ખાસ અસર થતી નથી. આ હોર્મોનલ ફેરફારને કારણે થાય છે. બાકીના વિકલ્પો: A) દૂધનું પ્રમાણ ઘટે છે, વધતું નથી. C) દૂધમાં પ્રોટીનની માત્રામાં કોઈ અચાનક વધારો થતો નથી. D) કાર્બોદિતની માત્રામાં કોઈ ખાસ ફેરફાર થતો નથી.", "ref": "Std 12 - પ્રકરણ ૄ: પ્રજનનમાં મનુષ્ય", "ch": ""}, {"q": "ગર્ભનિરોધક ગોળીઓ લેવાથી કયા હોર્મોનના સ્તરમાં સૌથી ઓછો ફેરફાર જોવા મળે છે?", "opts": ["પ્રોલેક્ટિન", "ઓક્સિટોસિન", "થાયરોક્સિન", "ઇન્સ્યુલિન"], "ans": 2, "exp": "ગર્ભનિરોધક ગોળીઓ મુખ્યત્વે પ્રજનન સંબંધી હોર્મોન (FSH, LH, પ્રોજેસ્ટેરોન, ઇસ્ટ્રોજન) પર અસર કરે છે. થાયરોક્સિન (થાયરોઇડ હોર્મોન) પ્રજનન સાથે સીધો સંબંધ ધરાવતું નથી, તેથી તેના સ્તર પર સૌથી ઓછી અસર જોવા મળે છે. બાકીના વિકલ્પો: A) પ્રોલેક્ટિન પર અમુક અંશે અસર થાય છે, ખાસ કરીને સ્તનપાન દરમિયાન. B) ઓક્સિટોસિન પર પણ હળવી અસર થઈ શકે છે. D) ઇન્સ્યુલિન પર અમુક કિસ્સાઓમાં અસર થઈ શકે છે, પરંતુ તે થાયરોક્સિન કરતાં વધુ હોય છે.", "ref": "Std 12 - પ્રકરણ ૄ: પ્રજનનમાં મનુષ્ય અને હોર્મોનલ સંતુલન", "ch": ""}, {"q": "ગર્ભનિરોધક ગોળીઓ લેવાથી કયા રોગનો ખતરો થોડો વધી શકે છે?", "opts": ["મધુમેહ (ડાયાબિટીસ)", "હૃદયરોગ", "કોળા (અસ્થમા)", "પાર્કિન્સન રોગ"], "ans": 1, "exp": "ગર્ભનિરોધક ગોળીઓ લેવાથી હૃદયરોગ (ખાસ કરીને રક્તના ગંઠાઈ જવાના ખતરા) થોડો વધી શકે છે, કારણ કે તે રક્તમાં કોલેસ્ટરોલના સ્તર અને રક્તના ગંઠાઈ જવાના જોખમને અસર કરે છે. બાકીના વિકલ્પો: A) મધુમેહ પર અમુક અંશે અસર થઈ શકે, પરંતુ તે હૃદયરોગ જેટલું સ્પષ્ટ નથી. C) કોળા (અસ્થમા) પર કોઈ સીધી અસર જોવા મળતી નથી. D) પાર્કિન્સન રોગ સાથે ગર્ભનિરોધક ગોળીઓનો કોઈ સીધો સંબંધ નથી.", "ref": "Std 12 - પ્રકરણ ૄ: પ્રજનનમાં મનુષ્ય અને સ્વાસ્થ્ય", "ch": ""}, {"q": "ગર્ભનિરોધક ગોળીઓ લેવાથી અંડપીંડના પકવણને રોકવામાં કયા હોર્મોનની ભૂમિકા સૌથી નિર્ણાયક છે, પરંતુ તેનું સ્તર સીધું જ ગર્ભનિરોધક ગોળીઓ દ્વારા અસર પામતું નથી?", "opts": ["ફોલિકલ સ્ટિમ્યુલેટિંગ હોર્મોન (FSH)", "લ્યુટિનાઇઝિંગ હોર્મોન (LH)", "પ્રોલેક્ટિન", "પ્રોજેસ્ટેરોન"], "ans": 0, "exp": "ફોલિકલ સ્ટિમ્યુલેટિંગ હોર્મોન (FSH) અંડપીંડના પકવણ માટે જરૂરી છે, પરંતુ ગર્ભનિરોધક ગોળીઓ સીધી રીતે FSH ને અસર કરતી નથી. તેના બદલે, તે ઇસ્ટ્રોજન અને પ્રોજેસ્ટેરોન દ્વારા હાઇપોથેલામસ અને પિટ્યુટરી ગ્રંથિ પર અસર કરે છે, જે FSH અને LH ના સ્રાવને ઘટાડે છે. લ્યુટિનાઇઝિંગ હોર્મોન (LH) નું સ્તર સીધું જ ગર્ભનિરોધક ગોળીઓ દ્વારા ઘટાડવામાં આવે છે, જ્યારે પ્રોલેક્ટિન અને પ્રોજેસ્ટેરોનનું સ્તર ગર્ભનિરોધક ગોળીઓ દ્વારા સીધી અસર પામે છે.", "ref": "Std 12 - પ્રકરણ ૩: માનવ પ્રજનન", "ch": ""}, {"q": "ગર્ભનિરોધક ગોળીઓ લેવાથી કયા હોર્મોનના સ્તરમાં વધારો થવાને કારણે સ્તનપાન કરાવતી માતાની દૂધ ઉત્પાદન પર નકારાત્મક અસર પડી શકે છે?", "opts": ["ઇસ્ટ્રોજન", "પ્રોજેસ્ટેરોન", "પ્રોલેક્ટિન", "ઓક્સિટોસિન"], "ans": 0, "exp": "ગર્ભનિરોધક ગોળીઓમાં રહેલા ઇસ્ટ્રોજન હોર્મોનના સ્તરમાં વધારો થવાને કારણે પ્રોલેક્ટિન હોર્મોનનું સ્તર ઘટે છે, જે સ્તનપાન કરાવતી માતાની દૂધ ઉત્પાદન પર નકારાત્મક અસર કરે છે. પ્રોજેસ્ટેરોન અને ઓક્સિટોસિન હોર્મોનનું સ્તર ગર્ભનિરોધક ગોળીઓ દ્વારા સીધી અસર પામતું નથી, જ્યારે પ્રોલેક્ટિનનું સ્તર ઇસ્ટ્રોજનના કારણે ઘટે છે.", "ref": "Std 12 - પ્રકરણ ૩: માનવ પ્રજનન", "ch": ""}, {"q": "ગર્ભનિરોધક ગોળીઓ લેવાથી કયા અંગમાં રક્તના થક્કર બનવાનો ખતરો થોડો વધી શકે છે, જેનો સીધો સંબંધ હોર્મોનલ અસંતુલન સાથે છે?", "opts": ["હૃદય", "ફેફસાં", "યકૃત", "મગજ"], "ans": 3, "exp": "ગર્ભનિરોધક ગોળીઓ લેવાથી મગજમાં રક્તના થક્કર બનવાનો ખતરો થોડો વધી શકે છે, જે હોર્મોનલ અસંતુલનના કારણે થાય છે. હૃદય, ફેફસાં અને યકૃતમાં રક્તના થક્કર બનવાનો ખતરો ગર્ભનિરોધક ગોળીઓના સીધા સંબંધમાં નથી.", "ref": "Std 12 - પ્રકરણ ૩: માનવ પ્રજનન", "ch": ""}, {"q": "ગર્ભનિરોધક ગોળીઓ લેવાથી કયા રોગનો ખતરો થોડો વધી શકે છે, જેનો સીધો સંબંધ હોર્મોનલ અસંતુલન અને રક્તવાહિનીઓની સમસ્યાઓ સાથે છે?", "opts": ["મધુમેહ", "ઉચ્ચ રક્તચાપ", "અસ્થમા", "કૉલેસ્ટરોલ"], "ans": 1, "exp": "ગર્ભનિરોધક ગોળીઓ લેવાથી ઉચ્ચ રક્તચાપનો ખતરો થોડો વધી શકે છે, જે હોર્મોનલ અસંતુલન અને રક્તવાહિનીઓની સમસ્યાઓ સાથે સીધો સંબંધ ધરાવે છે. મધુમેહ, અસ્થમા અને કૉલેસ્ટરોલના ખતરા ગર્ભનિરોધક ગોળીઓના સીધા સંબંધમાં નથી.", "ref": "Std 12 - પ્રકરણ ૩: માનવ પ્રજનન", "ch": ""}, {"q": "એક સ્ત્રી નિયમિત રીતે સંયુક્ત મૌખિક ગર્ભનિરોધક ગોળીઓ (combined oral contraceptive pills) લઈ રહી છે. તેને અચાનક ઉબકા, ઉલટી અને સ્તનમાં દુખાવાની ફરિયાદ થાય છે. આ લક્ષણો માટે નીચેનામાંથી કયું કારણ સૌથી વધુ સંભવિત છે અને તેની સાથે કયું વિધાન ખોટું છે?", "opts": ["ગોળીઓમાં રહેલા ઇસ્ટ્રોજન હોર્મોનના ઊંચા પ્રમાણને કારણે આ લક્ષણો જોવા મળે છે, પરંતુ આ ગોળીઓ લેવાથી થાઇરોઇડ હોર્મોનના સ્તરમાં નોંધપાત્ર ફેરફાર થતો નથી.", "ગોળીઓમાં રહેલા પ્રોજેસ્ટેરોન હોર્મોનના કારણે આ લક્ષણો ઉદ્ભવે છે, અને આ ગોળીઓ લેવાથી કોર્ટિસોલ હોર્મોનનું સ્તર પણ નોંધપાત્ર રીતે વધી જાય છે.", "ગોળીઓમાં રહેલા ઇસ્ટ્રોજન હોર્મોનના કારણે આ લક્ષણો જોવા મળે છે, અને આ ગોળીઓ લેવાથી પ્રોલેક્ટિન હોર્મોનનું સ્તર વધી જાય છે જે સ્તનપાન પર અસર કરે છે.", "ગોળીઓમાં રહેલા પ્રોજેસ્ટેરોન હોર્મોનના કારણે આ લક્ષણો ઉદ્ભવે છે, પરંતુ આ ગોળીઓ લેવાથી ઇન્સ્યુલિન પ્રતિકારકતા (insulin resistance) વધતી નથી."], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B છે. સંયુક્ત મૌખિક ગર્ભનિરોધક ગોળીઓમાં રહેલા ઇસ્ટ્રોજન હોર્મોનના ઊંચા પ્રમાણને કારણે ઉબકા, ઉલટી અને સ્તનમાં દુખાવો જેવા લક્ષણો જોવા મળે છે, નહીં કે પ્રોજેસ્ટેરોનને કારણે. વિકલ્પ Bમાં બીજું વિધાન પણ ખોટું છે કારણ કે આ ગોળીઓ લેવાથી કોર્ટિસોલ હોર્મોનના સ્તરમાં નોંધપાત્ર ફેરફાર થતો નથી. વિકલ્પ Aમાં બીજું વિધાન સાચું છે કારણ કે થાઇરોઇડ હોર્મોનના સ્તરમા   document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
