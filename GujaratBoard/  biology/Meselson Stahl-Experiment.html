<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meselson–Stahl Experiment</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Meselson–Stahl Experiment</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Meselson–Stahl Experiment</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 19 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 19 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "મેસેલસન-સ્ટહલ પ્રયોગમાં, N-15 અને N-14 આઇસોટોપનો ઉપયોગ કરવામાં આવ્યો હતો. જો પ્રયોગ દરમિયાન બેક્ટરિયાને પહેલા N-15 મીડિયામાં ઉછેરવામાં આવે અને પછી N-14 મીડિયામાં સ્થાનાંતરિત કરવામાં આવે, તો બીજી પેઢી પછી DNAના બે સ્ટ્રેન્ડમાંથી કેટલા સ્ટ્રેન્ડ પૂરેપૂરા N-14 ધરાવશે?", "opts": ["0", "1", "2", "3"], "ans": 1, "exp": "મેસેલસન-સ્ટહલ પ્રયોગ અર્ધ-રૂપાંતરિત DNA પ્રતિકૃતિની પુષ્ટિ કરે છે. પહેલી પેઢીમાં, DNA અર્ધ-ભારી (N-15 અને N-14) હોય છે. બીજી પેઢીમાં, એક સ્ટ્રેન્ડ N-15 ધરાવે છે અને બીજો સ્ટ્રેન્ડ N-14 ધરાવે છે. આથી, બીજી પેઢી પછી ફક્ત એક સ્ટ્રેન્ડ પૂરેપૂરો N-14 ધરાવશે. A) 0 ખોટું છે કારણ કે એક સ્ટ્રેન્ડ તો N-14 ધરાવે જ છે. C) 2 અને D) 3 ખોટાં છે કારણ કે બે સ્ટ્રેન્ડમાંથી એક N-15 ધરાવે છે.", "ref": "Std 12 - અધ્યાય 6: આનુવંશિકતા અને વિકાસ (વિભાગ: DNA પ્રતિકૃતિ)", "ch": ""}, {"q": "મેસેલસન-સ્ટહલ પ્રયોગમાં, સેઝન્ટ્રિફ્યુગેશન પછી DNAના બેન્ડની સ્થિતિ કઈ રીતે નક્કી કરે છે કે DNA પ્રતિકૃતિ અર્ધ-રૂપાંતરિત છે?", "opts": ["હલકો DNA (N-14) ઉપર રહે છે અને ભારી DNA (N-15) નીચે રહે છે", "હલકો DNA (N-14) અને ભારી DNA (N-15) મિશ્રિત થાય છે", "હલકો DNA (N-14) અને ભારી DNA (N-15) વચ્ચે એક બેન્ડ જોવા મળે છે", "હલકો DNA (N-14) નીચે રહે છે અને ભારી DNA (N-15) ઉપર રહે છે"], "ans": 0, "exp": "સેઝન્ટ્રિફ્યુગેશન દરમિયાન, હલકો DNA (N-14) ઉપર રહે છે અને ભારી DNA (N-15) નીચે રહે છે. અર્ધ-રૂપાંતરિત પ્રતિકૃતિને લીધે, પહેલી પેઢીમાં એક મિશ્ર બેન્ડ (N-15 અને N-14) જોવા મળે છે, પરંતુ બીજી પેઢીમાં હલકો અને ભારી DNA અલગ બેન્ડ તરીકે જોવા મળે છે. B) ખોટું છે કારણ કે મિશ્રણ થતું નથી. C) ખોટું છે કારણ કે એક બેન્ડ નહીં પણ બે અલગ બેન્ડ જોવા મળે છે. D) ખોટું છે કારણ કે હલકો DNA ઉપર રહે છે.", "ref": "Std 12 - અધ્યાય 6: આનુવંશિકતા અને વિકાસ (વિભાગ: DNA પ્રતિકૃતિ)", "ch": ""}, {"q": "મેસેલસન-સ્ટહલ પ્રયોગમાં, જો બેક્ટરિયાને N-15 મીડિયામાં એક પેઢી સુધી ઉછેરવામાં આવે અને પછી N-14 મીડિયામાં ત્રણ પેઢી સુધી ઉછેરવામાં આવે, તો કુલ કેટલા DNA અણુઓ પૂરેપૂરા N-14 ધરાવશે?", "opts": ["2", "4", "6", "8"], "ans": 3, "exp": "પહેલી પેઢી પછી, બધા DNA અણુઓ અર્ધ-ભારી (N-15 અને N-14) હોય છે. બીજી પેઢી પછી, 2 DNA અણુઓ અર્ધ-ભારી અને 2 હલકા (N-14) હોય છે. ત્રીજી પેઢી પછી, 2 અર્ધ-ભારી અને 6 હલકા (N-14) DNA અણુઓ હોય છે. આથી, કુલ 6 DNA અણુઓ પૂરેપૂરા N-14 ધરાવશે. A), B), અને C) ખોટાં છે કારણ કે તેઓ યોગ્ય ગણતરી ધરાવતાં નથી.", "ref": "Std 12 - અધ્યાય 6: આનુવંશિકતા અને વિકાસ (વિભાગ: DNA પ્રતિકૃતિ)", "ch": ""}, {"q": "મેસેલસન-સ્ટહલ પ્રયોગમાં, DNA પ્રતિકૃતિની કઈ પદ્ધતિની પુષ્ટિ થાય છે?", "opts": ["રૂઢિગત (Conservative)", "અર્ધ-રૂપાંતરિત (Semi-conservative)", "વિક્ષેપક (Dispersive)", "રેખીય (Linear)"], "ans": 1, "exp": "મેસેલસન-સ્ટહલ પ્રયોગ દ્વારા અર્ધ-રૂપાંતરિત DNA પ્રતિકૃતિની પુષ્ટિ થાય છે, જેમાં દરેક નવા DNA અણુમાં એક જૂનો સ્ટ્રેન્ડ અને એક નવો સ્ટ્રેન્ડ હોય છે. A) રૂઢિગત પદ્ધતિમાં, જૂના DNA અણુઓ જાળવી રાખવામાં આવે છે અને નવા DNA અણુઓ પૂરેપૂરા નવા હોય છે, જે પ્રયોગના પરિણામો સાથે મેળ ખાતું નથી. C) વિક્ષેપક પદ્ધતિમાં, જૂના અને નવા DNA સ્ટ્રેન્ડ મિશ્રિત થાય છે, જે પ્રયોગમાં જોવા મળતું નથી. D) રેખીય પદ્ધતિ DNA પ્રતિકૃતિની પદ્ધતિ નથી.", "ref": "Std 12 - અધ્યાય 6: આનુવંશિકતા અને વિકાસ (વિભાગ: DNA પ્રતિકૃતિ)", "ch": ""}, {"q": "મેસેલસન-સ્ટહલ પ્રયોગમાં, સેઝન્ટ્રિફ્યુગેશન ટ્યુબમાં CsCl (સીઝિયમ ક્લોરાઇડ) નો ઉપયોગ શા માટે કરવામાં આવે છે?", "opts": ["DNA ને વિભાજિત કરવા માટે", "DNA ની સાંદ્રતા વડે વર્ગીકરણ કરવા માટે", "DNA ને રંગીન બનાવવા માટે", "DNA ને તોડવા માટે"], "ans": 1, "exp": "CsCl (સીઝિયમ ક્લોરાઇડ) નો ઉપયોગ સેઝન્ટ્રિફ્યુગેશન દરમિયાન DNA ની સાંદ્રતા વડે વર્ગીકરણ કરવા માટે કરવામાં આવે છે. આ પદ્ધતિ દ્વારા, ભારી DNA (N-15) અને હલકો DNA (N-14) અલગ બેન્ડ તરીકે જોવા મળે છે. A) ખોટું છે કારણ કે DNA ને વિભાજિત કરવા માટે અન્ય પદ્ધતિઓ વપરાય છે. C) ખોટું છે કારણ કે CsCl DNA ને રંગીન બનાવતું નથી. D) ખોટું છે કારણ કે CsCl DNA ને તોડતું નથી.", "ref": "Std 12 - અધ્યાય 6: આનુવંશિકતા અને વિકાસ (વિભાગ: DNA પ્રતિકૃતિ)", "ch": ""}, {"q": "મેસેલસન-સ્ટહલ પ્રયોગમાં, જો બેક્ટરિયાને N-15 મીડિયામાં બે પેઢી સુધી ઉછેરવામાં આવે અને પછી N-14 મીડિયામાં ત્રણ પેઢી સુધી ઉછેરવામાં આવે, તો સેઝન્ટ્રિફ્યુગેશન પછી કેટલા બેન્ડ જોવા મળશે?", "opts": ["એક બેન્ડ (હલકો)", "બે બેન્ડ (મધ્યમ અને હલકો)", "ત્રણ બેન્ડ (ભારે, મધ્યમ અને હલકો)", "ચાર બેન્ડ (ભારે, મધ્યમ-1, મધ્યમ-2 અને હલકો)"], "ans": 1, "exp": "બેક્ટરિયાને N-15 મીડિયામાં બે પેઢી સુધી ઉછેરવા પર તેનું DNA પૂર્ણપણે N-15 લેબલ થાય છે. પછી N-14 મીડિયામાં ત્રણ પેઢી સુધી ઉછેરવા પર, પ્રથમ પેઢીમાં DNA અર્ધ-સંરક્ષણ પદ્ધતિથી પ્રતિકૃતિ પામે છે, જેથી મધ્યમ ઘનતાવાળો બેન્ડ બને છે. બીજી પેઢીમાં, અડધા DNA અણુઓ હલકા (N-14) અને અડધા મધ્યમ (N-15-N-14) બને છે. ત્રીજી પેઢીમાં, 75% DNA હલકો (N-14) અને 25% મધ્યમ (N-15-N-14) બને છે. પરિણામે, સેઝન્ટ્રિફ્યુગેશન પછી ફક્ત બે બેન્ડ (મધ્યમ અને હલકો) જોવા મળે છે. A) એક બેન્ડ ખોટું છે કારણ કે હજુ મધ્યમ ઘનતાવાળા DNA અણુઓ હાજર છે. C) ત્રણ બેન્ડ ખોટું છે કારણ કે ભારે બેન્ડ (N-15) ત્રણ પેઢી પછી ગાયબ થઈ જાય છે. D) ચાર બેન્ડ ખોટું છે કારણ કે એવી કોઈ પદ્ધતિ નથી જેમાં ચાર અલગ ઘનતાવાળા બેન્ડ બને.", "ref": "Std 12 - પ્રકરણ 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "મેસેલસન-સ્ટહલ પ્રયોગમાં, જો DNA પ્રતિકૃતિ અર્ધ-સંરક્ષણ પદ્ધતિથી થતી ન હોત, તો સેઝન્ટ્રિફ્યુગેશન પછી કયો પરિણામ જોવા મળત?", "opts": ["ફક્ત હલકો બેન્ડ (N-14)", "ફક્ત ભારે બેન્ડ (N-15)", "બે બેન્ડ (ભારે અને હલકો)", "એક જ બેન્ડ (મધ્યમ ઘનતા)"], "ans": 2, "exp": "જો DNA પ્રતિકૃતિ અર્ધ-સંરક્ષણ પદ્ધતિથી ન થતી હોત, તો તે સંપૂર્ણ રૂપે વિખંડન પામત (conservative). આ સ્થિતિમાં, મૂળ DNA (N-15) અને નવા બનેલા DNA (N-14) અલગ અલગ બેન્ડ તરીકે જોવા મળતા. પરિણામે, સેઝન્ટ્રિફ્યુગેશન પછી બે અલગ બેન્ડ (ભારે અને હલકો) જોવા મળતા. A) ફક્ત હલકો બેન્ડ ખોટું છે કારણ કે મૂળ DNA હજુ ભારે રહે છે. B) ફક્ત ભારે બેન્ડ ખોટું છે કારણ કે નવા DNA હલકા હોત. D) એક જ બેન્ડ ખોટું છે કારણ કે વિખંડન પદ્ધતિમાં બે અલગ ઘનતાવાળા DNA અણુઓ હાજર રહે છે.", "ref": "Std 12 - પ્રકરણ 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "મેસેલસન-સ્ટહલ પ્રયોગમાં, CsCl ગ્રેડિયન્ટમાં DNAના બેન્ડની સ્થિતિ કયા પરિબળ પર આધાર રાખે છે?", "opts": ["DNAની લંબાઈ", "DNAની ઘનતા", "DNAની સાંકળની સંખ્યા", "DNAમાં એડિનિન અને થાયમિનનો ગુણોત્તર"], "ans": 1, "exp": "CsCl ગ્રેડિયન્ટમાં DNAના બેન્ડની સ્થિતિ તેની ઘનતા પર આધાર રાખે છે. N-15 લેબલ થયેલા DNAની ઘનતા N-14 લેબલ થયેલા DNA કરતાં વધુ હોય છે, જેથી તે ગ્રેડિયન્ટમાં નીચે સ્થિત થાય છે. A) DNAની લંબાઈ ખોટું છે કારણ કે લંબાઈ બેન્ડની સ્થિતિ નક્કી કરતી નથી. C) DNAની સાંકળની સંખ્યા ખોટું છે કારણ કે બેક્ટરિયલ DNA દ્વિ-સાંકળવાળું હોય છે, પરંતુ તે બેન્ડની સ્થિતિ પર અસર કરતું નથી. D) એડિનિન અને થાયમિનનો ગુણોત્તર ખોટું છે કારણ કે તે ઘનતામાં ફેરફાર કરતું નથી.", "ref": "Std 12 - પ્રકરણ 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "મેસેલસન-સ્ટહલ પ્રયોગ દ્વારા કયા સિદ્ધાંતની પુષ્ટિ થતી નથી?", "opts": ["DNA પ્રતિકૃતિ અર્ધ-સંરક્ષણ પદ્ધતિથી થાય છે", "DNA દ્વિ-સાંકળવાળું હોય છે", "જનીન માહિતી DNAમાં સંગ્રહિત થાય છે", "DNA પ્રતિકૃતિ વખતે હાઇડ્રોજન બંધ તૂટે છે"], "ans": 2, "exp": "મેસેલસન-સ્ટહલ પ્રયોગ દ્વારા DNA પ્રતિકૃતિની અર્ધ-સંરક્ષણ પદ્ધતિની પુષ્ટિ થાય છે (A). પ્રયોગમાં DNA દ્વિ-સાંકળવાળું હોવાનું ધારણા રૂપે સ્વીકારવામાં આવ્યું હતું (B). પ્રતિકૃતિ વખતે હાઇડ્રોજન બંધ તૂટવાની જરૂરિયાત પ્રયોગના પરિણામોમાંથી સ્પષ્ટ થાય છે (D). પરંતુ જનીન માહિતી DNAમાં સંગ્રહિત થાય છે એ સિદ્ધાંત હર્ષી-ચેઝ પ્રયોગ દ્વારા પુષ્ટિ પામ્યું હતું, મેસેલસન-સ્ટહલ પ્રયોગ દ્વારા નહીં (C).", "ref": "Std 12 - પ્રકરણ 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "મેસેલસન-સ્ટહલ પ્રયોગમાં, જો બેક્ટેરિયાને N-15 ધરાવતા માધ્યમમાંથી N-14 ધરાવતા માધ્યમમાં ત્રીજી પેઢી સુધી ઉછેરવામાં આવે, તો સેઝન્ટ્રિફ્યુગેશન પછી DNAના બેન્ડની સંખ્યા અને તેમની સાપેક્ષ તીવ્રતા કેવી હશે? (ધારો કે DNA પ્રતિકૃતિ અર્ધ-સંરક્ષણ પદ્ધતિથી થાય છે.)", "opts": ["એક બેન્ડ, માત્ર N-14/N-14 DNA", "બે બેન્ડ, N-14/N-14 અને N-15/N-14 DNA સમાન તીવ્રતાથી", "બે બેન્ડ, N-14/N-14 DNA (75%) અને N-15/N-14 DNA (25%)", "ત્રણ બેન્ડ, N-14/N-14, N-15/N-14 અને N-15/N-15 DNA અલગ તીવ્રતાથી"], "ans": 2, "exp": "અર્ધ-સંરક્ષણ પદ્ધતિ મુજબ, ત્રીજી પેઢીમાં DNAના અણુઓમાં 75% અણુઓ સંપૂર્ણપણે હલકા (N-14/N-14) હશે અને 25% અણુઓ હાઇબ્રિડ (N-15/N-14) હશે. આથી બે બેન્ડ મળશે જેમાં N-14/N-14 બેન્ડની તીવ્રતા વધુ હશે. વિકલ્પ A ખોટો છે કારણ કે હાઇબ્રિડ DNA હજુ પણ હાજર હશે. વિકલ્પ B ખોટો છે કારણ કે બંને બેન્ડની તીવ્રતા સમાન નહીં હોય. વિકલ્પ D ખોટો છે કારણ કે N-15/N-15 DNA ત્રીજી પેઢીમાં હાજર નહીં હોય.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક્તાનો આણ્વિક આધાર", "ch": ""}, {"q": "મેસેલસન-સ્ટહલ પ્રયોગમાં, જો બેક્ટરિયાને N-15 યુક્ત માધ્યમમાં ત્રણ પેઢી સુધી ઉછેરવામાં આવે અને પછી N-14 યુક્ત માધ્યમમાં એક પેઢી સુધી ઉછેરવામાં આવે, તો સેંટ્રિફ્યુગેશન પછી કેટલા પ્રકારના DNA બેન્ડ જોવા મળશે?", "opts": ["એક જ પ્રકારનો બેન્ડ (હલકો)", "બે પ્રકારના બેન્ડ (મધ્યમ અને હલકો)", "ત્રણ પ્રકારના બેન્ડ (ભારે, મધ્યમ અને હલકો)", "ચાર પ્રકારના બેન્ડ (ભારે, મધ્યમ-ભારે, મધ્યમ-હલકો અને હલકો)"], "ans": 2, "exp": "ત્રણ પેઢી સુધી N-15 માધ્યમમાં ઉછેર્યા પછી બેક્ટરિયાનું DNA પૂર્ણપણે ભારે (N-15-N-15) હશે. પછી N-14 માધ્યમમાં એક પેઢી ઉછેરવા પર, DNA અર્ધ-સંરક્ષણ પદ્ધતિથી પ્રતિકૃતિ પામશે, જેથી ભારે-હલકો (N-15-N-14) અને હલકો (N-14-N-14) DNA ઉત્પન્ન થશે. પરંતુ ત્રણ પેઢી પહેલાંના N-15 યુક્ત DNA ના અવશેષો પણ હાજર રહેશે, જેથી ભારે (N-15-N-15), મધ્યમ (N-15-N-14) અને હલકો (N-14-N-14) એમ ત્રણ પ્રકારના બેન્ડ જોવા મળશે. A) ખોટું છે કારણ કે એક જ બેન્ડ નહીં મળે. B) ખોટું છે કારણ કે બે બેન્ડ નહીં મળે. D) ખોટું છે કારણ કે ચાર બેન્ડ નહીં મળે.", "ref": "Std 12 - પ્રકરણ 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "મેસેલસન-સ્ટહલ પ્રયોગમાં, જો DNA પ્રતિકૃતિ સંપૂર્ણ રૂપે રૂઢિગત (conservative) પદ્ધતિથી થતી હોત, તો સેંટ્રિફ્યુગેશન પછી કયા પ્રકારના બેન્ડ જોવા મળતા?", "opts": ["ફક્ત હલકો (N-14-N-14) બેન્ડ", "ફક્ત ભારે (N-15-N-15) બેન્ડ", "ભારે (N-15-N-15) અને હલકો (N-14-N-14) બેન્ડ", "ફક્ત મધ્યમ (N-15-N-14) બેન્ડ"], "ans": 2, "exp": "રૂઢિગત પદ્ધતિમાં, મૂળ DNA અખંડ રહે છે અને નવું DNA નવી સાંકળો સાથે બને છે. જો બેક્ટરિયાને N-15 માધ્યમમાંથી N-14 માધ્યમમાં ઉછેરવામાં આવે, તો મૂળ ભારે DNA (N-15-N-15) અને નવું હલકું DNA (N-14-N-14) અલગ અલગ બેન્ડ તરીકે જોવા મળશે. A) ખોટું છે કારણ કે ભારે DNA પણ હાજર રહેશે. B) ખોટું છે કારણ કે હલકું DNA પણ હાજર રહેશે. D) ખોટું છે કારણ કે મધ્યમ બેન્ડ રૂઢિગત પદ્ધતિમાં બનતો નથી.", "ref": "Std 12 - પ્રકરણ 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "મેસેલસન-સ્ટહલ પ્રયોગમાં, CsCl ગ્રેડિયન્ટમાં DNA ના બેન્ડની સ્થિતિ નક્કી કરવા માટે કયો સિદ્ધાંત ઉપયોગી છે?", "opts": ["વિકિરણ શોષણ (Absorption spectroscopy)", "ઘનતા (Density) આધારિત અલગીકરણ", "વિદ્યુત ક્ષેત્ર આધારિત અલગીકરણ", "રાસાયણિક પ્રક્રિયા દ્વારા અલગીકરણ"], "ans": 1, "exp": "CsCl ગ્રેડિયન્ટમાં DNA ના બેન્ડની સ્થિતિ તેના ઘનતા (Density) પર આધાર રાખે છે. N-15 યુક્ત DNA નું ઘનતા N-14 યુક્ત DNA કરતાં વધારે હોવાથી, તે ગ્રેડિયન્ટમાં નીચે સ્થાન પામે છે. A) ખોટું છે કારણ કે વિકિરણ શોષણનો ઉપયોગ થતો નથી. C) ખોટું છે કારણ કે વિદ્યુત ક્ષેત્રનો ઉપયોગ થતો નથી. D) ખોટું છે કારણ કે રાસાયણિક પ્રક્રિયા દ્વારા અલગીકરણ થતું નથી.", "ref": "Std 12 - પ્રકરણ 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "મેસેલસન-સ્ટહલ પ્રયોગમાં, જો DNA પ્રતિકૃતિ સંપૂર્ણ રૂપે વિકિરણશીલ (dispersive) પદ્ધતિથી થતી હોત, તો બેક્ટરિયાને N-15 માધ્યમમાં એક પેઢી સુધી ઉછેર્યા પછી N-14 માધ્યમમાં એક પેઢી સુધી ઉછેર્યા પછી CsCl ગ્રેડિયન્ટમાં કેટલા બેન્ડ જોવા મળતા?", "opts": ["એક બેન્ડ, જેમાં DNAની ઘનતા N-15 અને N-14 ની મિશ્ર ઘનતાની હોય છે", "બે બેન્ડ, એક N-15 ની ઘનતાવાળો અને એક N-14 ની ઘનતાવાળો", "એક બેન્ડ, જેમાં DNAની ઘનતા N-15 અને N-14 ની સરેરાશ ઘનતાની હોય છે", "ત્રણ બેન્ડ, જેમાં એક N-15, એક મિશ્ર અને એક N-14 ની ઘનતાવાળો હોય છે"], "ans": 2, "exp": "જો DNA પ્રતિકૃતિ સંપૂર્ણ રૂપે વિકિરણશીલ (dispersive) પદ્ધતિથી થતી હોત, તો પ્રત્યેક નવી DNA અણુમાં N-15 અને N-14 ના મિશ્રણની સરેરાશ ઘનતા હોત. પરિણામે, CsCl ગ્રેડિયન્ટમાં એક જ બેન્ડ જોવા મળત, જેમાં DNAની ઘનતા N-15 અને N-14 ની સરેરાશ ઘનતાની હોત. વિકલ્પ A ખોટો છે કારણ કે તે અર્ધ-સંરક્ષણ પદ્ધતિને દર્શાવે છે. વિકલ્પ B અને D ખોટા છે કારણ કે તેઓ વિકિરણશીલ પદ્ધતિને અનુરૂપ નથી.", "ref": "Std 12 - અધ્યાય 6: વંશવિજ્ઞાનના આણ્વિક આધાર", "ch": ""}, {"q": "મેસેલસન-સ્ટહલ પ્રયોગમાં, જો બેક્ટરિયાને પ્રથમ N-15 યુક્ત માધ્યમમાં એક પેઢી સુધી ઉછેરવામાં આવે અને પછી N-14 યુક્ત માધ્યમમાં બીજી પેઢી સુધી ઉછેરવામાં આવે, તો સેઝન્ટ્રિફ્યુગેશન પછી CsCl ગ્રેડિયન્ટમાં કેટલા બેન્ડ જોવા મળે અને તેની ઘનતા કેવી હશે?", "opts": ["એક બેન્ડ, જેમાં DNAની ઘનતા N-15 અને N-14 ની મધ્યવર્તી હશે", "બે બેન્ડ, એક N-15 ની ઘનતાવાળો અને બીજો N-14 ની ઘનતાવાળો", "એક બેન્ડ, જેમાં DNAની ઘનતા સંપૂર્ણપણે N-14 જેવી હશે", "ત્રણ બેન્ડ, જેમાં એક N-15, એક N-14, અને એક મિશ્ર ઘનતાવાળો હશે"], "ans": 0, "exp": "મેસેલસન-સ્ટહલ પ્રયોગમાં, બેક્ટરિયાને પ્રથમ N-15 માધ્યમમાં એક પેઢી સુધી ઉછેરવામાં આવે ત્યારે તેનું DNA સંપૂર્ણપણે N-15 યુક્ત થાય છે. પછી જ્યારે તેને N-14 માધ્યમમાં બીજી પેઢી સુધી ઉછેરવામાં આવે છે, ત્યારે DNAની પ્રતિકૃતિ અર્ધ-સંરક્ષણ પદ્ધતિથી થાય છે, જેથી પ્રત્યેક નવું DNA અણુ એક N-15 વાળી અને એક N-14 વાળી સાંકળ ધરાવે છે. આથી, સેઝન્ટ્રિફ્યુગેશન પછી CsCl ગ્રેડિયન્ટમાં એક જ બેન્ડ જોવા મળે છે, જેમાં DNAની ઘનતા N-15 અને N-14 ની મધ્યવર્તી હશે. વિકલ્પ B, C, અને D ખોટા છે કારણ કે તે અર્ધ-સંરક્ષણ પદ્ધતિની સમજણ વગરના છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "મેસેલસન-સ્ટહલ પ્રયોગમાં, જો DNA પ્રતિકૃતિ વખતે N-15 ના સ્થાને N-13 આઇસોટોપનો ઉપયોગ કરવામાં આવે, તો શું થશે?", "opts": ["પ્રયોગના પરિણામમાં કોઈ ફરક પડશે નહીં, કારણ કે N-13 અને N-15 બંને ભારે આઇસોટોપ છે", "CsCl ગ્રેડિયન્ટમાં બેન્ડની સ્થિતિ બદલાશે, કારણ કે N-13 નું ઘનતા N-15 કરતાં ઓછું છે", "પ્રયોગ અસફળ થશે, કારણ કે N-13 રેડિયોએક્ટિવ છે", "DNA પ્રતિકૃતિ અટકી જશે, કારણ કે N-13 જૈવિક રીતે અસ્વીકાર્ય છે"], "ans": 1, "exp": "N-13 નું ઘનતા N-15 કરતાં ઓછું હોવાથી, CsCl ગ્રેડિયન્ટમાં બેન્ડની સ્થિતિ બદલાશે. A) ખોટું છે કારણ કે N-13 અને N-15 ના ઘનતામાં તફાવત છે. C) ખોટું છે કારણ કે N-13 રેડિયોએક્ટિવ નથી. D) ખોટું છે કારણ કે N-13 જૈવિક રીતે સ્વીકાર્ય છે અને DNA પ્રતિકૃતિ અટકશે નહીં.", "ref": "Std 12 - અધ્યાય 6: DNA પ્રતિકૃતિ અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "મેસેલસન-સ્ટહલ પ્રયોગમાં, જો DNA પ્રતિકૃતિ વખતે ઉત્સેચક DNA પોલિમરેઝની ક્રિયા અવરોધાય, તો સેંટ્રિફ્યુગેશન પછી કયો પરિણામ જોવા મળશે?", "opts": ["ફક્ત ભારે બેન્ડ (N-15-N-15) જોવા મળશે", "ફક્ત હલક બેન્ડ (N-14-N-14) જોવા મળશે", "ભારે અને હલક બેન્ડ બંને જોવા મળશે, પરંતુ મધ્યમ બેન્ડ નહીં", "કોઈ બેન્ડ જોવા મળશે નહીં"], "ans": 0, "exp": "DNA પોલિમરેઝની ક્રિયા અવરોધાય તો નવું DNA સંશ્લેષણ થશે નહીં, આથી મૂળ ભારે DNA (N-15-N-15) જ રહેશે. B) ખોટું છે કારણ કે હલક DNA બનશે નહીં. C) ખોટું છે કારણ કે હલક DNA બનશે નહીં. D) ખોટું છે કારણ કે ભારે DNA તો હાજર જ રહેશે.", "ref": "Std 12 - અધ્યાય 6: DNA પ્રતિકૃતિ અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "મેસેલસન-સ્ટહલ પ્રયોગમાં, જો બેક્ટેરિયાને N-15 યુક્ત માધ્યમમાંથી N-14 યુક્ત માધ્યમમાં સ્થાનાંતરિત કર્યા       '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
