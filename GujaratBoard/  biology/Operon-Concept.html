<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operon Concept</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Operon Concept</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Operon Concept</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "લેક ઓપેરોનમાં, કયા પદાર્થની હાજરી લેકટોઝના ચયાપચયને અવરોધે છે અને ઓપેરોનને નિષ્ક્રિય કરે છે?", "opts": ["લેકટોઝ", "ગ્લુકોઝ", "આલોલેક્ટોઝ", "સાયક્લિક એએમપી (cAMP)"], "ans": 1, "exp": "ગ્લુકોઝની હાજરી લેક ઓપેરોનને નિષ્ક્રિય કરે છે કારણ કે તે કેટાબોલાઇટ રિપ્રેશન દ્વારા કેપ (CAP) પ્રોટીનની ક્રિયાને અવરોધે છે. લેકટોઝ એ ઇન્ડ્યુસર છે જે ઓપેરોનને સક્રિય કરે છે, આલોલેક્ટોઝ એ રિપ્રેસર પ્રોટીનને બાંધીને ઓપેરોનને સક્રિય કરે છે, અને સાયક્લિક એએમપી (cAMP) કેપ પ્રોટીનને સક્રિય કરે છે. તેથી, ગ્લુકોઝ એ યોગ્ય જવાબ છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિકાસ (જનીન નિયંત્રણ)", "ch": ""}, {"q": "ટ્રિપ્ટોફેન ઓપેરોનમાં, કયા પ્રોટીનને ટ્રિપ્ટોફેનની હાજરીમાં સક્રિય કરવામાં આવે છે જે ઓપેરોનને અવરોધે છે?", "opts": ["રિપ્રેસર પ્રોટીન", "ઓપરેટર પ્રોટીન", "પ્રમોટર પ્રોટીન", "કોરિપ્રેસર પ્રોટીન"], "ans": 0, "exp": "ટ્રિપ્ટોફેન ઓપેરોનમાં, રિપ્રેસર પ્રોટીન ટ્રિપ્ટોફેનની હાજરીમાં સક્રિય થાય છે અને ઓપરેટર સ્થળ સાથે જોડાઈને ઓપેરોનને અવરોધે છે. ઓપરેટર અને પ્રમોટર પ્રોટીન એ ઓપેરોનના ભાગો છે પરંતુ તે રિપ્રેશનમાં સીધી ભૂમિકા ભજવતી નથી. કોરિપ્રેસર પ્રોટીન એ અહીં લાગુ પડતું નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિકાસ (જનીન નિયંત્રણ)", "ch": ""}, {"q": "લેક ઓપેરોનમાં, કયા પદાર્થની હાજરી કેપ (CAP) પ્રોટીનને સક્રિય કરે છે, જે ઓપેરોનની પ્રસ્તુતિને વધારે છે?", "opts": ["લેકટોઝ", "ગ્લુકોઝ", "સાયક્લિક એએમપી (cAMP)", "આલોલેક્ટોઝ"], "ans": 2, "exp": "સાયક્લિક એએમપી (cAMP) કેપ (CAP) પ્રોટીનને સક્રિય કરે છે, જે ઓપેરોનની પ્રસ્તુતિને વધારે છે. લેકટોઝ અને આલોલેક્ટોઝ ઇન્ડ્યુસર તરીકે કામ કરે છે, જ્યારે ગ્લુકોઝ કેટાબોલાઇટ રિપ્રેશન દ્વારા ઓપેરોનને નિષ્ક્રિય કરે છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિકાસ (જનીન નિયંત્રણ)", "ch": ""}, {"q": "ઓપેરોનમાં, કયા ભાગને RNA પોલિમરેઝ જોડાઈને પ્રસ્તુતિ શરૂ કરે છે?", "opts": ["ઓપરેટર", "પ્રમોટર", "રિગ્યુલેટર જીન", "સ્ટ્રક્ચરલ જીન"], "ans": 1, "exp": "RNA પોલિમરેઝ પ્રમોટર ભાગ સાથે જોડાઈને પ્રસ્તુતિ શરૂ કરે છે. ઓપરેટર એ રિપ્રેસર પ્રોટીનનું બાંધણ સ્થળ છે, રિગ્યુલેટર જીન રિપ્રેસર પ્રોટીનનું ઉત્પાદન કરે છે, અને સ્ટ્રક્ચરલ જીન એ એનઝાઇમના ઉત્પાદન માટે જવાબદાર છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિકાસ (જનીન નિયંત્રણ)", "ch": ""}, {"q": "લેક ઓપેરોનમાં, કયા જીનનું ઉત્પાદન લેકટોઝના ચયાપચય માટે જરૂરી ઉત્સેચકોનું નિયંત્રણ કરે છે?", "opts": ["લેકZ", "લેકY", "લેકA", "લેકI"], "ans": 3, "exp": "લેકI જીન રિપ્રેસર પ્રોટીનનું ઉત્પાદન કરે છે, જે લેક ઓપેરોનને નિયંત્રિત કરે છે. લેકZ, લેકY, અને લેકA જીન લેકટોઝના ચયાપચય માટે જરૂરી ઉત્સેચકોનું ઉત્પાદન કરે છે, પરંતુ તે ઓપેરોનના નિયંત્રણમાં સીધી ભૂમિકા ભજવતી નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિકાસ (જનીન નિયંત્રણ)", "ch": ""}, {"q": "લેક ઓપેરોનમાં, જ્યારે ગ્લુકોઝ અને લેક્ટોઝ બંને હાજર હોય ત્યારે કયું પરિબળ ઓપેરોનની પ્રવર્તમાનતા સૌથી વધુ અવરોધે છે?", "opts": ["લેક રિપ્રેસર પ્રોટીનની સક્રિયતા", "cAMPની ઓછી સાંદ્રતા", "કેપ (CAP) પ્રોટીનની અભાવે", "લેકટોઝ મેટાબોલિઝમ માટેના ઉત્સેચકોની અતિરિક્ત ઉત્પત્તિ"], "ans": 1, "exp": "ગ્લુકોઝની હાજરીમાં, એડિનોસિન મોનોફોસ્ફેટ (cAMP)નું સ્તર ઓછું થાય છે, જે કેપ (CAP) પ્રોટીનને સક્રિય કરવા માટે જરૂરી છે. cAMPની ઓછી સાંદ્રતાને લીધે, CAP પ્રોટીન સક્રિય થતું નથી, જેથી લેક ઓપેરોનની પ્રવર્તમાનતા અવરોધાય છે. લેક રિપ્રેસર પ્રોટીન લેક્ટોઝની હાજરીમાં નિષ્ક્રિય થાય છે, તેથી A યોગ્ય નથી. CAP પ્રોટીનની અભાવે ઓપેરોનની પ્રવર્તમાનતા અવરોધાય, પરંતુ cAMPની ઓછી સાંદ્રતા એ મુખ્ય કારણ છે, તેથી C અપૂર્ણ છે. D વિકલ્પ ઓપેરોનની પ્રવર્તમાનતાને અવરોધતું નથી, પરંતુ તેનું પરિણામ છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "ટ્રિપ્ટોફેન ઓપેરોનમાં, અટેન્યુએશન (attenuation) પ્રક્રિયા ક્યારે થતી નથી?", "opts": ["જ્યારે ટ્રિપ્ટોફેનની સાંદ્રતા ઓછી હોય", "જ્યારે ટ્રિપ્ટોફેનની સાંદ્રતા ઉચ્ચ હોય", "જ્યારે રાઇબોઝોમ લીડર પેપ્ટાઇડના ટ્રિપ્ટોફેન સમૃદ્ધ કોડોન પર અટકી જાય", "જ્યારે ટ્રાન્સક્રિપ્શન અને ટ્રાન્સલેશન એકસાથે થતું ન હોય"], "ans": 0, "exp": "ટ્રિપ્ટોફેન ઓપેરોનમાં અટેન્યુએશન એ ટ્રિપ્ટોફેનની ઉચ્ચ સાંદ્રતાને લીધે થતી પ્રક્રિયા છે. જ્યારે ટ્રિપ્ટોફેન ઓછું હોય, ત્યારે લીડર પેપ્ટાઇડનું સંપૂર્ણ સંશ્લેષણ થતું નથી, જેથી અટેન્યુએશન થતું નથી. B વિકલ્પમાં ટ્રિપ્ટોફેન ઉચ્ચ હોય ત્યારે અટેન્યુએશન થાય છે, તેથી ખોટું છે. C વિકલ્પ અટેન્યુએશનની પ્રક્રિયાનું વર્ણન કરે છે, પરંતુ પ્રશ્ન ક્યારે થતી નથી તેનું છે. D વિકલ્પ પ્રોકેરિયોટ્સમાં ટ્રાન્સક્રિપ્શન અને ટ્રાન્સલેશન એકસાથે થાય છે, પરંતુ અટેન્યુએશનની પ્રક્રિયા સાથે સીધો સંબંધ નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "લેક ઓપેરોનમાં, Z, Y, અને A જીનના ઉત્પાદનો અનુક્રમે કયા ઉત્સેચકોનું નિર્માણ કરે છે?", "opts": ["β-ગેલેક્ટોઝિડેઝ, લેક્ટોઝ પર્મિયેઝ, થાયોગેલેક્ટોઝ ટ્રાન્સએસિલેઝ", "β-ગેલેક્ટોઝિડેઝ, લેક્ટોઝ ટ્રાન્સપોર્ટર, થાયોગેલેક્ટોઝ આયસોમેરેઝ", "લેક્ટેઝ, પર્મિયેઝ, ટ્રાન્સએસિલેઝ", "ગેલેક્ટોઝિડેઝ, લેક્ટોઝ ડિહાઇડ્રોજિનેઝ, આયસોમેરેઝ"], "ans": 0, "exp": "લેક ઓપેરોનમાં, Z જીન β-ગેલેક્ટોઝિડેઝ ઉત્સેચકનું નિર્માણ કરે છે, જે લેક્ટોઝને ગ્લુકોઝ અને ગેલેક્ટોઝમાં તોડે છે. Y જીન લેક્ટોઝ પર્મિયેઝ ઉત્સેચકનું નિર્માણ કરે છે, જે કોષમાં લેક્ટોઝના પ્રવેશને સહાય કરે છે. A જીન થાયોગેલેક્ટોઝ ટ્રાન્સએસિલેઝ ઉત્સેચકનું નિર્માણ કરે છે, જે થાયોગેલેક્ટોઝને એસિટાઇલેટ કરે છે. B, C, અને D વિકલ્પોમાં ઉત્સેચકોના નામ અયોગ્ય અથવા અપૂર્ણ છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "ઓપેરોનમાં, કયા ભાગને 'રેગ્યુલેટરી જીન' કહેવામાં આવે છે અને તેનું મુખ્ય કાર્ય શું છે?", "opts": ["પ્રમોટર - RNA પોલિમરેઝને બાંધવા માટે જગ્યા પૂરી પાડે છે", "ઓપરેટર - રિપ્રેસર પ્રોટીનને બાંધવા માટે જગ્યા પૂરી પાડે છે", "રિપ્રેસર જીન - રિપ્રેસર પ્રોટીનનું સંશ્લેષણ કરે છે જે ઓપરેટરને બાંધી શકે છે", "સ્ટ્રક્ચરલ જીન - ઉત્સેચકો અથવા પ્રોટીનનું સંશ્લેષણ કરે છે"], "ans": 2, "exp": "રેગ્યુલેટરી જીન એ રિપ્રેસર જીન છે, જે રિપ્રેસર પ્રોટીનનું સંશ્લેષણ કરે છે. આ રિપ્રેસર પ્રોટીન ઓપરેટરને બાંધીને ઓપેરોનની પ્રવર્તમાનતાને નિયંત્રિત કરે છે. A વિકલ્પ પ્રમોટરનું કાર્ય વર્ણવે છે, જે રેગ્યુલેટરી જીન નથી. B વિકલ્પ ઓપરેટરનું કાર્ય વર્ણવે છે, જે રેગ્યુલેટરી જીન નથી. D વિકલ્પ સ્ટ્રક્ચરલ જીનનું કાર્ય વર્ણવે છે, જે રેગ્યુલેટરી જીન નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "ટ્રિપ્ટોફેન ઓપેરોનમાં, અટેન્યુએટર સેગમેન્ટમાં કયા કોડોનની હાજરી અટેન્યુએશનને પ્રભાવિત કરે છે?", "opts": ["1 અને 2 ટ્રિપ્ટોફેન કોડોન", "3 અને 4 ટ્રિપ્ટોફેન કોડોન", "1, 2, અને 3 ટ્રિપ્ટોફેન કોડોન", "2, 3, અને 4 ટ્રિપ્ટોફેન કોડોન"], "ans": 1, "exp": "ટ્રિપ્ટોફેન ઓપેરોનના અટેન્યુએટર સેગમેન્ટમાં, લીડર પેપ્ટાઇડમાં 2 ટ્રિપ્ટોફેન કોડોન હોય છે, પરંતુ અટેન્યુએશન પ્રક્રિયા માટે 3 અને 4 કોડોનની હાજરી મહત્વપૂર્ણ છે. જ્યારે ટ્રિપ્ટોફેનની સાંદ્રતા ઉચ્ચ હોય, ત્યારે રાઇબોઝોમ આ કોડોન પર અટકી જાય છે, જેથી અટેન્યુએશન થાય છે. A, C, અને D વિકલ્પોમાં કોડોનની સંખ્યા અયોગ્ય છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "લેક ઓપેરોનના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન ખોટું છે?\n1. લેક ઓપેરોનમાં CAP પ્રોટીનની સક્રિયતા માટે cAMP જરૂરી છે.\n2. લેક ઓપેરોનના નિયંત્રણમાં, રિપ્રેસર પ્રોટીન લેક્ટોઝ સાથે જોડાઈને નિષ્ક્રિય બને છે.\n3. જ્યારે ગ્લુકોઝ અને લેક્ટોઝ બંને હાજર હોય ત્યારે, લેક ઓપેરોન સંપૂર્ણ રીતે સક્રિય થાય છે.\n4. લેક ઓપેરોનના નિયમનમાં, CAP પ્રોટીન પ્રમોટર સાથે જોડાઈને RNA પોલિમરેઝની પ્રસ્તુતિને વધારે છે.", "opts": ["વિધાન 1 અને 2 ખોટાં છે", "વિધાન 3 ખોટું છે", "વિધાન 2 અને 4 ખોટાં છે", "વિધાન 1, 3 અને 4 ખોટાં છે"], "ans": 1, "exp": "વિધાન 3 ખોટું છે કારણ કે જ્યારે ગ્લુકોઝ અને લેક્ટોઝ બંને હાજર હોય ત્યારે, ગ્લુકોઝની હાજરીને કારણે cAMPનું સ્તર ઘટે છે, જે CAP પ્રોટીનને નિષ્ક્રિય કરે છે. આથી લેક ઓપેરોન સંપૂર્ણ રીતે સક્રિય થતું નથી. બાકીના વિધાનો સાચાં છે: વિધાન 1માં cAMPની હાજરી CAP પ્રોટીનને સક્રિય કરે છે, વિધાન 2માં રિપ્રેસર પ્રોટીન લેક્ટોઝ સાથે જોડાઈને નિષ્ક્રિય બને છે, અને વિધાન 4માં CAP પ્રોટીન RNA પોલિમરેઝની પ્રસ્તુતિને વધારે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "ટ્રિપ્ટોફેન ઓપેરોનમાં અટેન્યુએશન (attenuation) પ્રક્રિયા માટે નીચેનામાંથી કયું પરિબળ જવાબદાર નથી?", "opts": ["ટ્રિપ્ટોફેનની હાજરી", "રિબોઝોમની હિલચાલ", "લીડર પેપ્ટાઇડનું સંશ્લેષણ", "CAP પ્રોટીનની સક્રિયતા"], "ans": 3, "exp": "ટ્રિપ્ટોફેન ઓપેરોનમાં અટેન્યુએશન પ્રક્રિયા માટે CAP પ્રોટીનની સક્રિયતા જવાબદાર નથી. અટેન્યુએશન ટ્રિપ્ટોફેનની હાજરી (A), રિબોઝોમની હિલચાલ (B), અને લીડર પેપ્ટાઇડના સંશ્લેષણ (C) પર આધારિત છે. CAP પ્રોટીન લેક ઓપેરોનના નિયમનમાં ભાગ ભજવે છે, ટ્રિપ્ટોફેન ઓપેરોનમાં નહીં.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું ઓપેરોનનું ઉદાહરણ નથી જે પ્રોકેરિયોટ્સમાં જોવા મળે છે?", "opts": ["લેક ઓપેરોન", "ટ્રિપ્ટોફેન ઓપેરોન", "હિસ્ટિડિન ઓપેરોન", "ગ્લુકોઝ ઓપેરોન"], "ans": 3, "exp": "ગ્લુકોઝ ઓપેરોન એ પ્રોકેરિયોટ્સમાં જોવા મળતું ઓપેરોન નથી. લેક ઓપેરોન (A), ટ્રિપ્ટોફેન ઓપેરોન (B), અને હિસ્ટિડિન ઓપેરોન (C) પ્રોકેરિયોટ્સમાં જોવા મળતા ઓપેરોનના ઉદાહરણો છે. ગ્લુકોઝના ચયાપચયનું નિયમન લેક ઓપેરોન અને CAP પ્રોટીન દ્વારા થાય છે, પરંતુ તેને 'ગ્લુકોઝ ઓપેરોન' તરીકે ઓળખવામાં આવતું નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેક ઓપેરોનના સંદર્ભમાં, જ્યારે માધ્યમમાં લેક્ટોઝ હાજર હોય અને ગ્લુકોઝ ગેરહાજર હોય ત્યારે નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["રિપ્રેસર પ્રોટીન નિષ્ક્રિય થાય છે", "CAP પ્રોટીન સક્રિય થાય છે", "RNA પોલિમરેઝ પ્રમોટર સાથે મજબૂત રીતે જોડાય છે", "Z, Y, અને A જીનનું ટ્રાન્સક્રિપ્શન થતું નથી"], "ans": 3, "exp": "વિધાન D ખોટું છે કારણ કે જ્યારે લેક્ટોઝ હાજર હોય અને ગ્લુકોઝ ગેરહાજર હોય ત્યારે, રિપ્રેસર પ્રોટીન નિષ્ક્રિય થાય છે (A સાચું), CAP પ્રોટીન સક્રિય થાય છે (B સાચું), અને RNA પોલિમરેઝ પ્રમોટર સાથે મજબૂત રીતે જોડાઈને Z, Y, અને A જીનનું ટ્રાન્સક્રિપ્શન શરૂ કરે છે (C સાચું). આથી Z, Y, અને A જીનનું ટ્રાન્સક્રિપ્શન થાય છે, નહીં કે થતું નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "ટ્રિપ્ટોફેન ઓપેરોનમાં અટેન્યુએટર સેગમેન્ટના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન ખોટું છે?\n1. અટેન્યુએટર સેગમેન્ટમાં ટ્રિપ્ટોફેન કોડોનની હાજરી અટેન્યુએશનને પ્રભાવિત કરે છે.\n2. અટેન્યુએટર સેગમેન્ટમાં રિબોઝોમની હિલચાલ ટ્રાન્સક્રિપ્શનની ગતિને અસર કરે છે.\n3. અટેન્યુએટર સેગમેન્ટમાં CAP પ્રોટીનની હાજરી જરૂરી છે.\n4. અટેન્યુએટર સેગમેન્ટમાં લીડર પેપ્ટાઇડનું સંશ્લેષણ થાય છે.", "opts": ["વિધાન 1 અને 2 ખોટાં છે", "વિધાન 3 ખોટું છે", "વિધાન 2 અને 4 ખોટાં છે", "વિધાન 1, 3 અને 4 ખોટાં છે"], "ans": 1, "exp": "વિધાન 3 ખોટું છે કારણ કે અટેન્યુએટર સેગમેન્ટમાં CAP પ્રોટીનની હાજરી જરૂરી નથી. CAP પ્રોટીન લેક ઓપેરોનના નિયમનમાં ભાગ ભજવે છે, ટ્રિપ્ટોફેન ઓપેરોનમાં નહીં. બાકીના વિધાનો સાચાં છે: વિધાન 1માં ટ્રિપ્ટોફેન કોડોનની હાજરી અટેન્યુએશનને પ્રભાવિત કરે છે, વિધાન 2માં રિબોઝોમની હિલચાલ ટ્રાન્સક્રિપ્શનની ગતિને અસર કરે છે, અને વિધાન 4માં લીડર પેપ્ટાઇડનું સંશ્લેષણ થાય છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "લેક ઓપેરોનમાં, જ્યારે કેપ (CAP) પ્રોટીન cAMP સાથે જોડાય છે, ત્યારે તે ક્યાં બંધાય છે અને તેનો શું પ્રભાવ પડે છે?", "opts": ["ઓપેરેટર સ્થાને બંધાય છે અને RNA પોલિમરેઝની બંધન ક્ષમતા ઘટાડે છે", "પ્રમોટર સ્થાને બંધાય છે અને RNA પોલિમરેઝની બંધન ક્ષમતા વધારે છે", "રેગ્યુલેટરી જીન પર બંધાય છે અને લેક રિપ્રેસરની સક્રિયતા વધારે છે", "સ્ટ્રક્ચરલ જીન પર બંધાય છે અને ટ્રાન્સક્રિપ્શનને સીધું જ અવરોધે છે"], "ans": 1, "exp": "કેપ (CAP) પ્રોટીન cAMP સાથે જોડાઈને પ્રમોટર સ્થાને બંધાય છે, જે RNA પોલિમરેઝની બંધન ક્ષમતા વધારે છે અને ટ્રાન્સક્રિપ્શનને પ્રોત્સાહન આપે છે. A ખોટું છે કારણ કે ઓપેરેટર સ્થાને લેક રિપ્રેસર બંધાય છે, ન કે CAP. C ખોટું છે કારણ કે CAP રેગ્યુલેટરી જીન પર બંધાય નથી, અને D ખોટું છે કારણ કે CAP સ્ટ્રક્ચરલ જીન પર બંધાય નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "ટ્રિપ્ટોફેન ઓપેરોનમાં, અટેન્યુએશન પ્રક્રિયા દરમિયાન, રાઇબોઝોમ ક્યાં સ્થિત હોય છે જ્યારે અટેન્યુએટર સેગમેન્ટનું ટ્રાન્સલેશન થઈ રહ્યું હોય છે?", "opts": ["લીડર પેપ્ટાઇડના સંપૂર્ણ સિંથેસિસ પછી", "લીડર પેપ્ટાઇડના પ્રથમ 14 એમિનો એસિડના સિંથેસિસ દરમિયાન", "ઓપેરોનના સ્ટ્રક્ચરલ જીનના ટ્રાન્સલેશન દરમિયાન", "ટ્રાન્સક્રિપ્શન ટર્મિનેશન સાઇટ પર"], "ans": 1, "exp": "ટ્રિપ્ટોફેન ઓપેરોનમાં, અટેન્યુએશન પ્રક્રિયા દરમિયાન રાઇબોઝોમ લીડર પેપ્ટાઇડના પ્રથમ 14 એમિનો એસિડના સિંથેસિસ દરમિયાન અટેન્યુએટર સેગમેન્ટ પર સ્થિત હોય છે. A ખોટું છે કારણ કે લીડર પેપ્ટાઇડનું સંપૂર્ણ સિંથેસિસ થતું નથી, C ખોટું છે કારણ કે સ્ટ્રક્ચરલ જીનનું ટ્રાન્સલેશન પછી થાય છે, અને D ખોટું છે કારણ કે ટ્રાન્સક્રિપ્શન ટર્મિનેશન સાઇટ પર રાઇબોઝોમ સ્થિત નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "લેક ઓપેરોનમાં, જ્યારે ગ્લુકોઝની હાજરી હોય અને લેક્ટોઝ ગેરહાજર હોય, ત્યારે કયા પદાર્થની સાંદ્રતા ઓછી હોય છે?", "opts": ["cAMP", "લેક રિપ્રેસર", "RNA પોલિમરેઝ", "કેપ (CAP) પ્રોટીન"], "ans": 0, "exp": "ગ્લુકોઝની હાજરીમાં, cAMPની સાંદ્રતા ઓછી હોય છે કારણ કે ગ્લુકોઝ અડેનિલ સાયક્લેઝ ઉત્સેચકને અવરોધે છે, જે cAMPનું સિંથેસિસ કરે છે. B ખોટું છે કારણ કે લેક રિપ્રેસરની સાંદ્રતા ગ્લુકોઝ પર આધારિત નથી, C ખોટું છે કારણ કે RNA પોલિમરેઝની સાંદ્રતા સ્થિર રહે છે, અને D ખોટું છે કારણ કે CAP પ્રોટીનની સાંદ્રતા પણ સ્થિર રહે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "ટ્રિપ્ટોફેન ઓપેરોનમાં, અટેન્યુએશન પ્રક્રિયા ક્યારે થતી નથી જ્યારે ટ્રિપ્ટોફેનની સાંદ્રતા ઓછી હોય છે?", "opts": ["જ્યારે રાઇબોઝોમ અટેન્યુએટર સેગમેન્ટના 1 અને 2 કોડોન વચ્ચે અટકી જાય છે", "જ્યારે લીડર પેપ્ટાઇડના સિંથેસિસ દરમિયાન ટ્રિપ્ટોફેનની અછત હોય છે", "જ્યારે RNA પોલિમરેઝ અટેન્યુએટર સેગમેન્ટને ટ્રાન્સક્રાઇબ કરતું નથી", "જ્યારે ટ્રિપ્ટોફેન ઓપેરોનના રિપ્રેસર પ્રોટીન સક્રિય હોય છે"], "ans": 1, "exp": "ટ્રિપ્ટોફેનની ઓછી સાંદ્રતામાં, લીડર પેપ્ટાઇડના સિંથેસિસ દરમિયાન ટ્રિપ્ટોફેનની અછત હોવાથી રાઇબોઝોમ અટેન્યુએટર સેગમેન્ટના 1 અને 2 કોડોન વચ્ચે અટકી જતું નથી, જેના કારણે અટેન્યુએશન થતી નથી. A ખોટું છે કારણ કે રાઇબોઝોમ અટકી જવાથી અટેન્યુએશન થાય છે, C ખોટું છે કારણ કે RNA પોલિમરેઝ અટેન્યુએટર સેગમેન્ટને ટ્રાન્સક્રાઇબ કરતું જ હોય છે, અને D ખોટું છે કારણ કે રિપ્રેસર પ્રોટીનની સક્રિયતા અટેન્યુએશન પર અસર કરતી નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "લેક ઓપેરોનમાં, નીચેનામાંથી કયું વિધાન સત્ય છે જ્યારે માધ્યમમાં ગ્લુકોઝ અને લેક્ટોઝ બંને હાજર હોય છે?", "opts": ["લેક ઓપેરોન પૂરેપૂરું સક્રિય હોય છે", "cAMPની સાંદ્રતા ઉચ્ચ હોય છે અને CAP-cAMP કોમ્પ્લેક્સ પ્રમોટર સાથે જોડાય છે", "લેક રિપ્રેસર લેક્ટોઝ સાથે જોડાય છે અને ઓપેરેટરને છોડી દે છે", "લેક ઓપેરોન નિષ્ક્રિય હોય છે કારણ કે ગ્લુકોઝની હાજરી cAMPની સાંદ્રતા ઘટાડે છે"], "ans": 3, "exp": "ગ્લુકોઝ અને લેક્ટોઝ બંને હાજર હોવાથી, ગ્લુકોઝ cAMPની સાંદ્રતા ઘટાડે છે, જેના કારણે CAP-cAMP કોમ્પ્લેક્સ બનતું નથી અને લેક ઓપેરોન નિષ્ક્રિય રહે છે. A ખોટું છે કારણ કે લેક ઓપેરોન સક્રિય નથી, B ખોટું છે કારણ કે cAMPની સાંદ્રતા ઓછી હોય છે, અને C ખોટું છે કારણ કે લેક રિપ્રેસર લેક્ટોઝ સાથે જોડાય છે પરંતુ ગ્લુકોઝની અસરને કારણે ઓપેરોન નિષ્ક્રિય રહે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
