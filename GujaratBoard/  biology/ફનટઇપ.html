<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ફિનોટાઇપ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ફિનોટાઇપ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ફિનોટાઇપ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ફિનોટાઇપની વ્યાખ્યા કરતી વખતે નીચેનામાંથી કયું વિધાન સૌથી યોગ્ય છે?", "opts": ["જનીનની રચના અને ક્રમ દર્શાવતું લક્ષણ", "પર્યાવરણીય પરિબળો દ્વારા પ્રભાવિત થતું દૃશ્યમાન લક્ષણ", "DNAમાં થતાં મ્યુટેશન દ્વારા નક્કી થતું લક્ષણ", "કોષકેન્દ્રમાં સ્થિત જનીનનું સ્થાનિક લક્ષણ"], "ans": 1, "exp": "ફિનોટાઇપ એ વ્યક્તિના દૃશ્યમાન લક્ષણોનો સમાવેશ કરે છે, જે જનીન અને પર્યાવરણ બંનેથી પ્રભાવિત થાય છે. A) જનીનની રચના અને ક્રમ જનોટાઇપને દર્શાવે છે, ન કે ફિનોટાઇપને. C) મ્યુટેશન જનોટાઇપમાં ફેરફાર લાવે છે, પરંતુ ફિનોટાઇપ પર્યાવરણીય પરિબળો દ્વારા પણ પ્રભાવિત થાય છે. D) જનીન કોષકેન્દ્રમાં સ્થિત હોય છે, પરંતુ ફિનોટાઇપ માત્ર જનીન પર આધારિત નથી.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક જોડી જમણી જનીન ધરાવતાં વ્યક્તિઓમાં ફિનોટાઇપની ભિન્નતા જોવા મળે છે. આ ભિન્નતાનું સૌથી સંભવિત કારણ કયું હોઈ શકે?", "opts": ["જનીનની અભિવ્યક્તિ પર પર્યાવરણીય પરિબળોનો પ્રભાવ", "જનીનમાં થયેલું મ્યુટેશન", "વર્ણસૂત્રની સંખ્યામાં ફેરફાર", "પ્રોટીન સંશ્લેષણમાં ઉત્સેચકની અનુપસ્થિતિ"], "ans": 0, "exp": "એક જોડી જમણી જનીન ધરાવતાં વ્યક્તિઓમાં ફિનોટાઇપની ભિન્નતા પર્યાવરણીય પરિબળોને કારણે થઈ શકે છે, જેમ કે તાપમાન, પોષણ અથવા પ્રકાશ. B) મ્યુટેશન જનીનમાં ફેરફાર લાવે છે, પરંતુ અહીં જનીન જમણી છે. C) વર્ણસૂત્રની સંખ્યામાં ફેરફાર ફિનોટાઇપને પ્રભાવિત કરે છે, પરંતુ આ કિસ્સામાં અપેક્ષિત નથી. D) ઉત્સેચકની અનુપસ્થિતિ પ્રોટીન સંશ્લેષણને અસર કરે છે, પરંતુ આ ફિનોટાઇપની ભિન્નતાનું મુખ્ય કારણ નથી.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "નીચેનામાંથી કયું ઉદાહરણ ફિનોટાઇપની પ્લાસ્ટિસિટી દર્શાવે છે?", "opts": ["મનુષ્યમાં રક્ત વર્ગ O અથવા A હોવું", "ઉંદરના પૂંછડાનો રંગ", "પર્ણધારી વનસ્પતિમાં પર્ણની આકારમાં પર્યાવરણ અનુસાર થતો ફેરફાર", "મનુષ્યમાં આંખનો રંગ"], "ans": 2, "exp": "ફિનોટાઇપની પ્લાસ્ટિસિટી એટલે પર્યાવરણ અનુસાર ફિનોટાઇપમાં થતો ફેરફાર. C) પર્ણધારી વનસ્પતિમાં પર્ણની આકારમાં પર્યાવરણ અનુસાર થતો ફેરફાર આનું ઉદાહરણ છે. A) રક્ત વર્ગ જનીન દ્વારા નક્કી થાય છે. B) ઉંદરના પૂંછડાનો રંગ જનીન દ્વારા નક્કી થાય છે. D) આંખનો રંગ પણ જનીન દ્વારા નક્કી થાય છે.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "જો એક વનસ્પતિમાં પ્રકાશસંશ્લેષણની ક્રિયા પર્યાવરણીય પરિબળોને કારણે ઘટે છે, તો આ ફિનોટાઇપ પર કેવી અસર થશે?", "opts": ["વનસ્પતિનું વૃદ્ધિ દર ઘટશે", "વનસ્પતિના પર્ણનો રંગ બદલાશે", "વનસ્પતિના ફૂલોની સંખ્યા વધશે", "વનસ્પતિના મૂળની લંબાઈ વધશે"], "ans": 0, "exp": "પ્રકાશસંશ્લેષણની ક્રિયા ઘટવાથી વનસ્પતિને ઓછી ઊર્જા મળશે, જેના કારણે વૃદ્ધિ દર ઘટશે. B) પર્ણનો રંગ બદલાવા માટે પ્રકાશસંશ્લેષણની ક્રિયા સીધી રીતે જવાબદાર નથી. C) ફૂલોની સંખ્યા વધવા માટે પ્રકાશસંશ્લેષણની ક્રિયા ઘટવાથી ઊર્જા ઓછી થશે, જેના કારણે ફૂલોની સંખ્યા ઘટશે. D) મૂળની લંબાઈ વધવા માટે પણ ઊર્જા જરૂરી છે, જે પ્રકાશસંશ્લેષણ ઘટવાથી મર્યાદિત થશે.", "ref": "Std 11 - અધ્યાય 13: વનસ્પતિમાં પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ફિનોટાઇપ અને જનોટાઇપ વચ્ચેનો તફાવત સૌથી સ્પષ્ટ રીતે દર્શાવે છે?", "opts": ["ફિનોટાઇપ જનીન દ્વારા નક્કી થાય છે, જ્યારે જનોટાઇપ પર્યાવરણ દ્વારા નક્કી થાય છે", "જનોટાઇપ જનીનની રચના દર્શાવે છે, જ્યારે ફિનોટાઇપ દૃશ્યમાન લક્ષણો દર્શાવે છે", "ફિનોટાઇપ અને જનોટાઇપ બંને જનીન દ્વારા નક્કી થાય છે", "જનોટાઇપ પર્યાવરણ દ્વારા પ્રભાવિત થાય છે, જ્યારે ફિનોટાઇપ જનીન દ્વારા પ્રભાવિત થાય છે"], "ans": 1, "exp": "જનોટાઇપ એ જનીનની રચના દર્શાવે છે, જ્યારે ફિનોટાઇપ એ દૃશ્યમાન લક્ષણો દર્શાવે છે, જે જનીન અને પર્યાવરણ બંનેથી પ્રભાવિત થાય છે. A) ફિનોટાઇપ જનીન અને પર્યાવરણ બંનેથી પ્રભાવિત થાય છે, જનોટાઇપ માત્ર જનીન દ્વારા નક્કી થાય છે. C) ફિનોટાઇપ પર્યાવરણ દ્વારા પણ પ્રભાવિત થાય છે. D) જનોટાઇપ પર્યાવરણ દ્વારા પ્રભાવિત થતું નથી.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક જોડી સમયોજિત જનીન (alleles) ધરાવતી વનસ્પતિમાં, ફિનોટાઇપમાં ફરક પડે છે જ્યારે તેને અલગ-અલગ તાપમાને ઉગાડવામાં આવે છે. આ ઘટનાને કયા શબ્દ વડે સૌથી યોગ્ય રીતે વર્ણવી શકાય?", "opts": ["જનોટાઇપિક લક્ષણોની અભિવ્યક્તિ", "પર્યાવરણીય પ્રેરિત ફિનોટાઇપિક પ્લાસ્ટિસિટી", "મ્યુટેશન દ્વારા થતી જનીનિક ભિન્નતા", "પ્રભાવી જનીનની અભિવ્યક્તિ"], "ans": 1, "exp": "ફિનોટાઇપિક પ્લાસ્ટિસિટી એ પર્યાવરણીય પરિબળોને કારણે એક જ જનોટાઇપ ધરાવતી વ્યક્તિઓમાં ફિનોટાઇપમાં થતો ફરક છે. અહીં, તાપમાનના ફેરફારને કારણે ફિનોટાઇપ બદલાય છે, જે પ્લાસ્ટિસિટીનું ઉદાહરણ છે. A) જનોટાઇપિક લક્ષણોની અભિવ્યક્તિ એ ફિનોટાઇપના પરિવર્તનને સમજાવતું નથી. C) મ્યુટેશન એ જનીનિક ભિન્નતાનું કારણ છે, પરંતુ અહીં જનીનમાં કોઈ ફેરફાર થયો નથી. D) પ્રભાવી જનીનની અભિવ્યક્તિ એ જનીનિક નિયંત્રણ હેઠળના ફિનોટાઇપને સમજાવે છે, પરંતુ અહીં પર્યાવરણીય પરિબળો કામ કરે છે.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "નીચેનામાંથી કયું ઉદાહરણ ફિનોટાઇપની અભિવ્યક્તિમાં જનીન અને પર્યાવરણ વચ્ચેના પરસ્પર ક્રિયાનું સૌથી સ્પષ્ટ દર્શાવે છે?", "opts": ["મનુષ્યમાં રક્ત વર્ગ (A, B, AB, O)", "હિમાલયન ખરગોશમાં ફરના રંગમાં ઋતુ પ્રમાણે થતો ફેરફાર", "મટરના છોડમાં લાંબી અથવા ટૂંકી ડાળીઓનું લક્ષણ", "મનુષ્યમાં આંખનો રંગ"], "ans": 1, "exp": "હિમાલયન ખરગોશમાં ફરના રંગમાં ઋતુ પ્રમાણે થતો ફેરફાર એ જનીન અને પર્યાવરણ (તાપમાન) વચ્ચેના પરસ્પર ક્રિયાનું ઉદાહરણ છે. A) રક્ત વર્ગ પૂર્ણપણે જનીન દ્વારા નિયંત્રિત થાય છે. C) મટરના છોડમાં ડાળીઓની લંબાઈ એ મેન્ડેલિયન અનુવંશિકતાનું ઉદાહરણ છે. D) આંખનો રંગ પણ મુખ્યત્વે જનીન દ્વારા નિયંત્રિત થાય છે.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક વનસ્પતિમાં, પ્રકાશસંશ્લેષણની ક્રિયા માટે જરૂરી ઉત્સેચકની માત્રા તેના જનીન દ્વારા નિયંત્રિત થાય છે, પરંતુ પ્રકાશની તીવ્રતા તેની અસરકારકતાને અસર કરે છે. આ કિસ્સામાં, ફિનોટાઇપ કયા પરિબળ દ્વારા નક્કી થાય છે?", "opts": ["ફક્ત જનીન દ્વારા", "ફક્ત પર્યાવરણ દ્વારા", "જનીન અને પર્યાવરણ બંને દ્વારા", "ફક્ત ઉત્સેચકની માત્રા દ્વારા"], "ans": 2, "exp": "ફિનોટાઇપ એ જનીન અને પર્યાવરણ બંનેથી પ્રભાવિત થાય છે. અહીં, ઉત્સેચકની માત્રા જનીન દ્વારા નિયંત્રિત થાય છે, પરંતુ પ્રકાશની તીવ્રતા (પર્યાવરણીય પરિબળ) તેની અસરકારકતાને અસર કરે છે. A) ફક્ત જનીન એ અપૂર્ણ છે કારણ કે પર્યાવરણ પણ ભૂમિકા ભજવે છે. B) ફક્ત પર્યાવરણ એ અપૂર્ણ છે કારણ કે જનીન પણ મહત્વનું છે. D) ઉત્સેચકની માત્રા જનીન દ્વારા નિયંત્રિત થાય છે, પરંતુ ફિનોટાઇપ પર્યાવરણીય પરિબળો દ્વારા પણ પ્રભાવિત થાય છે.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ફિનોટાઇપ અને જનોટાઇપ વચ્ચેના સંબંધને સૌથી સચોટ રીતે વર્ણવે છે?", "opts": ["જનોટાઇપ એ ફિનોટાઇપનું પરિણામ છે.", "ફિનોટાઇપ એ જનોટાઇપ અને પર્યાવરણ વચ્ચેનો સરવાળો છે.", "જનોટાઇપ અને ફિનોટાઇપ વચ્ચે કોઈ સંબંધ નથી.", "ફિનોટાઇપ એ ફક્ત પર્યાવરણ દ્વારા નક્કી થાય છે."], "ans": 1, "exp": "ફિનોટાઇપ એ જનોટાઇપ (જનીનિક રચના) અને પર્યાવરણ (બાહ્ય પરિબળો) બંનેથી પ્રભાવિત થાય છે. A) ઉલટું છે: જનોટાઇપ એ ફિનોટાઇપનું કારણ નથી, પરંતુ ફિનોટાઇપ જનોટાઇપ અને પર્યાવરણ પર આધારિત છે. C) જનોટાઇપ અને ફિનોટાઇપ વચ્ચે ઘનિષ્ઠ સંબંધ છે. D) ફિનોટાઇપ ફક્ત પર્યાવરણ દ્વારા નક્કી થતું નથી, જનીન પણ મહત્વનું છે.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક જોડી સમયોજિત જનીન ધરાવતી વ્યક્તિઓમાં, ફિનોટાઇપમાં ભિન્નતા જોવા મળે છે જ્યારે તેઓ અલગ-અલગ પોષક તત્વો સાથે ઉછરે છે. આ ઘટનાને કયા શબ્દ વડે વર્ણવી શકાય?", "opts": ["જનીનિક ભિન્નતા", "ફિનોટાઇપિક પ્લાસ્ટિસિટી", "મ્યુટેશન", "પ્રભાવી જનીનની અભિવ્યક્તિ"], "ans": 1, "exp": "ફિનોટાઇપિક પ્લાસ્ટિસિટી એ એક જ જનોટાઇપ ધરાવતી વ્યક્તિઓમાં પર્યાવરણીય પરિબળો (અહીં પોષક તત્વો)ને કારણે ફિનોટાઇપમાં થતો ફરક છે. A) જનીનિક ભિન્નતા એ જનીનમાં ફેરફારને કારણે થાય છે, પરંતુ અહીં જનીન સમાન છે. C) મ્યુટેશન એ જનીનિક ફેરફાર છે, જે અહીં થયો નથી. D) પ્રભાવી જનીનની અભિવ્યક્તિ એ જનીનિક નિયંત્રણ હેઠળના ફિનોટાઇપને સમજાવે છે, પરંતુ અહીં પર્યાવરણીય પરિબળો કામ કરે છે.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક જનીનની અભિવ્યક્તિમાં, જ્યારે બે વિવિધ પર્યાવરણીય પરિબળો એકસાથે અસર કરે છે, ત્યારે ફિનોટાઇપમાં જોવા મળતી ભિન્નતાને કયા સિદ્ધાંત દ્વારા સૌથી યોગ્ય રીતે સમજાવી શકાય?", "opts": ["મેન્ડેલનું પ્રભુત્વ સિદ્ધાંત", "પોલીજીનિક અનુવંશિકતા", "જનીન-પર્યાવરણ પરસ્પર ક્રિયા (GxE)", "સહ-પ્રભુત્વ"], "ans": 2, "exp": "સહી જવાબ C) જનીન-પર્યાવરણ પરસ્પર ક્રિયા (GxE) છે. ફિનોટાઇપ પર જનીન અને પર્યાવરણ બંનેમાંથી એકસાથે અસર થાય છે, જ્યારે બે વિવિધ પર્યાવરણીય પરિબળો એકસાથે કામ કરે ત્યારે ફિનોટાઇપમાં ભિન્નતા જોવા મળે છે. A) મેન્ડેલનું પ્રભુત્વ સિદ્ધાંત ફક્ત જનીનની અભિવ્યક્તિ પર ધ્યાન કેન્દ્રિત કરે છે, B) પોલીજીનિક અનુવંશિકતા એકથી વધુ જનીનની અસર દર્શાવે છે, અને D) સહ-પ્રભુત્વ બંને એલિલની અભિવ્યક્તિ દર્શાવે છે, પરંતુ પર્યાવરણીય અસરને ધ્યાનમાં લેતું નથી.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "નીચેનામાંથી કયું ઉદાહરણ ફિનોટાઇપની અભિવ્યક્તિમાં એપીજીનેટિક નિયંત્રણ દર્શાવે છે?", "opts": ["મધમાખીઓમાં રાણી અને કામદાર મધમાખીની રચના", "મનુષ્યમાં રક્ત વર્ગ A, B, AB અને O", "મટરના છોડમાં લાંબી અને ટૂંકી ઊંચાઈ", "મકાઈમાં પીળા અને રાતા દાણા"], "ans": 0, "exp": "સહી જવાબ A) મધમાખીઓમાં રાણી અને કામદાર મધમાખીની રચના છે. એપીજીનેટિક નિયંત્રણમાં, જનીનની અભિવ્યક્તિ પર્યાવરણીય પરિબળો દ્વારા બદલાઈ શકે છે, જેમ કે મધમાખીઓમાં આહાર (રોયલ જેલી) રાણી અને કામદાર મધમાખીની રચનાને નક્કી કરે છે. B) રક્ત વર્ગ મેન્ડેલીયન અનુવંશિકતાનું ઉદાહરણ છે, C) મટરના છોડની ઊંચાઈ મેન્ડેલના પ્રયોગો દ્વારા સમજાવવામાં આવે છે, અને D) મકાઈમાં દાણાનો રંગ સહ-પ્રભુત્વ દર્શાવે છે.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક વનસ્પતિમાં, જ્યારે તાપમાનમાં ઘટાડો થાય છે, ત્યારે તેના પર્ણોનો આકાર બદલાય છે. આ ફિનોટાઇપિક પરિવર્તનને કયા શબ્દ દ્વારા ઓળખવામાં આવે છે?", "opts": ["મ્યુટેશન", "ફિનોકોપી", "એપીજીનેટિક વેરિયેશન", "જનીન ડ્રિફ્ટ"], "ans": 1, "exp": "સહી જવાબ B) ફિનોકોપી છે. ફિનોકોપી એ પર્યાવરણીય પરિબળોને કારણે થતું ફિનોટાઇપિક પરિવર્તન છે, જે જનીનમાં કોઈ ફેરફાર વિના થાય છે. A) મ્યુટેશન જનીનમાં કાયમી ફેરફાર છે, C) એપીજીનેટિક વેરિયેશન જનીનની અભિવ્યક્તિમાં પર્યાવરણીય અસર દર્શાવે છે, પરંતુ ફિનોકોપી જેવું તાત્કાલિક પરિવર્તન નથી, અને D) જનીન ડ્રિફ્ટ એ જનીન ફ્રીક્વન્સીમાં યાદૃચ્છિક ફેરફાર છે.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ફિનોટાઇપિક પ્લાસ્ટિસિટીના સિદ્ધાંતને સૌથી સચોટ રીતે વર્ણવે છે?", "opts": ["એક જ જનીનના બે એલિલ્સ વચ્ચેની ભિન્નતા", "એક જ જનોટાઇપ ધરાવતી વ્યક્તિઓમાં પર્યાવરણને અનુરૂપ ફિનોટાઇપમાં થતો ફેરફાર", "જનીનની અભિવ્યક્તિમાં થતો કાયમી ફેરફાર", "બે વિવિધ જનોટાઇપ ધરાવતી વ્યક્તિઓ વચ્ચેની ફિનોટાઇપિક સમાનતા"], "ans": 1, "exp": "સહી જવાબ B) એક જ જનોટાઇપ ધરાવતી વ્યક્તિઓમાં પર્યાવરણને અનુરૂપ ફિનોટાઇપમાં થતો ફેરફાર છે. ફિનોટાઇપિક પ્લાસ્ટિસિટી એટલે એક જ જનોટાઇપ ધરાવતી વ્યક્તિઓમાં પર્યાવરણના ફેરફારને અનુરૂપ ફિનોટાઇપમાં થતો ફેરફાર. A) એક જ જનીનના બે એલિલ્સ વચ્ચેની ભિન્નતા એ એલિલિક ભિન્નતા છે, C) જનીનની અભિવ્યક્તિમાં થતો કાયમી ફેરફાર મ્યુટેશન છે, અને D) બે વિવિધ જનોટાઇપ ધરાવતી વ્યક્તિઓ વચ્ચેની ફિનોટાઇપિક સમાનતા એ કોઈ પ્લાસ્ટિસિટી નથી.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક પ્રાણીમાં, જ્યારે તેને ઉચ્ચ તાપમાનના પર્યાવરણમાં મૂકવામાં આવે છે, ત્યારે તેના શરીરનો રંગ ગાઢ બને છે. આ ફિનોટાઇપિક પરિવર્તનને કયા પરિબળ દ્વારા નિયંત્રિત કરવામાં આવે છે?", "opts": ["જનીન", "હોર્મોન", "પર્યાવરણ", "ઉત્સેચક"], "ans": 2, "exp": "સહી જવાબ C) પર્યાવરણ છે. આ કિસ્સામાં, ઉચ્ચ તાપમાન એ પર્યાવરણીય પરિબળ છે જે શરીરના રંગમાં ફેરફાર લાવે છે. A) જનીન ફિનોટાઇપને નિયંત્રિત કરે છે, પરંતુ અહીં ફેરફાર તાત્કાલિક અને પર્યાવરણીય છે, B) હોર્મોન શરીરની આંતરિક ક્રિયાઓને નિયંત્રિત કરે છે, પરંતુ અહીં પર્યાવરણીય અસર છે, અને D) ઉત્સેચક રાસાયણિક ક્રિયાઓને વેગ આપે છે, પરંતુ ફિનોટાઇપિક પરિવર્તન માટે જવાબદાર નથી.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક વનસ્પતિમાં, જનીન A અને B ધરાવતી હોય અને પર્યાવરણીય પરિબળો જેવા કે તાપમાન અને પ્રકાશની તીવ્રતા બદલાય ત્યારે, ફિનોટાઇપમાં જોવા મળતી ભિન્નતાનું મુખ્ય કારણ કયું હશે?", "opts": ["જનીન A અને B વચ્ચેની પરસ્પર ક્રિયા", "પર્યાવરણીય પરિબળો દ્વારા જનીન અભિવ્યક્તિમાં થતો ફેરફાર", "વનસ્પતિમાં DNAની સ્થિરતા", "વનસ્પતિમાં ઉત્સેચકની માત્રામાં થતો સ્થાયી ઘટાડો"], "ans": 1, "exp": "ફિનોટાઇપમાં ભિન્નતા પર્યાવરણીય પરિબળો દ્વારા જનીન અભિવ્યક્તિમાં થતા ફેરફારને કારણે થાય છે. જનીન A અને B વચ્ચેની પરસ્પર ક્રિયા (A) ફિનોટાઇપને અસર કરે છે, પરંતુ પ્રશ્નમાં પર્યાવરણીય પરિબળોનો ઉલ્લેખ છે. DNAની સ્થિરતા (C) અને ઉત્સેચકની સ્થાયી ઘટાડો (D) ફિનોટાઇપમાં સ્થાયી ફેરફાર કરે છે, પરંતુ પર્યાવરણીય પરિબળો અસ્થાયી ફેરફાર કરે છે.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક પ્રાણીમાં, જ્યારે તેને અંધારામાં રાખવામાં આવે છે, ત્યારે તેના આંખના રંગમાં ફેરફાર થાય છે. આ ફેરફાર કયા પ્રકારનો ફિનોટાઇપિક ફેરફાર છે?", "opts": ["જનોટાઇપિક ફેરફાર", "અસ્થાયી ફિનોટાઇપિક ફેરફાર", "સ્થાયી ફિનોટાઇપિક ફેરફાર", "મ્યુટેશન દ્વારા થતો ફેરફાર"], "ans": 1, "exp": "પર્યાવરણીય પરિબળો (અંધારું)ને કારણે થતો ફેરફાર અસ્થાયી ફિનોટાઇપિક ફેરફાર છે. જનોટાઇપિક ફેરફાર (A) જનીનમાં થાય છે, સ્થાયી ફિનોટાઇપિક ફેરફાર (C) સ્થાયી હોય છે, અને મ્યુટેશન (D) DNAમાં સ્થાયી ફેરફાર કરે છે.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક વ્યક્તિમાં, જનીન H અને L ધરાવતી હોય, પરંતુ ફિનોટાઇપમાં ફક્ત જનીન Hની અભિવ્યક્તિ જોવા મળે છે. આ કયા સિદ્ધાંત દ્વારા સમજાવી શકાય છે?", "opts": ["સહપ્રભાવિતા (Co-dominance)", "પ્રભાવિતા (Dominance)", "અપૂર્ણ પ્રભાવિતા (Incomplete dominance)", "એપીજીનેટિક નિયંત્રણ"], "ans": 1, "exp": "જનીન H પ્રભાવી (Dominant) છે અને જનીન L અપ્રભાવી (Recessive) છે, તેથી ફક્ત Hની અભિવ્યક્તિ જોવા મળે છે. સહપ્રભાવિતા (A)માં બંને જનીનની અભિવ્યક્તિ જોવા મળે છે, અપૂર્ણ પ્રભાવિતા (C)માં મિશ્ર અભિવ્યક્તિ જોવા મળે છે, અને એપીજીનેટિક નિયંત્રણ (D) જનીન અભિવ્યક્તિમાં રાસાયણિક ફેરફાર દ્વારા થાય છે.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક વનસ્પતિમાં, જ્યારે તાપમાન 10°C થી 30°C સુધી વધે છે, ત્યારે તેના પર્ણોનો આકાર ગોળાકારથી લાંબો અને પાતળો બને છે. આ ફેરફાર કયા પ્રકારનો ફિનોટાઇપિક ફેરફાર છે?", "opts": ["જનોટાઇપિક પ્લાસ્ટિસિટી", "ફિનોટાઇપિક પ્લાસ્ટિસિટી", "મ્યુટેશન", "જનીન ડ્રિફ્ટ"], "ans": 1, "exp": "પર્યાવરણીય પરિબળ (તાપમાન)ને કારણે થતો ફેરફાર ફિનોટાઇપિક પ્લાસ્ટિસિટી છે. જનોટાઇપિક પ્લાસ્ટિસિટી (A) જનીનમાં થાય છે, મ્યુટેશન (C) DNAમાં સ્થાયી ફેરફાર કરે છે, અને જનીન ડ્રિફ્ટ (D) વસતિમાં જનીનની આવર્તનમાં ફેરફાર કરે છે.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક પ્રાણીમાં, જનીન X અને Y ધરાવતી હોય, પરંતુ ફિનોટાઇપમાં ફક્ત જનીન Xની અભિવ્યક્તિ જોવા મળે છે. જો પર્યાવરણીય પરિબળો બદલાય તો જનીન Yની અભિવ્યક્તિ પણ જોવા મળે છે. આ કયા સિદ્ધાંત દ્વારા સમજાવી શકાય છે?", "opts": ["પ્રભાવિતા (Dominance)", "પેનેટ્રેન્સ (Penetrance)", "એક્સપ્રેશન (Expressivity)", "એપીજીનેટિક નિયંત્રણ"], "ans": 2, "exp": "એક્સપ્રેશન (Expressivity) એ જનીનની અભિવ્યક્તિમાં થતી ભિન્નતા છે, જે પર્યાવરણીય પરિબળો દ્વારા અસર પામે છે. પ્રભાવિતા (A)માં ફક્ત પ્રભાવી જનીનની અભિવ્યક્તિ જોવા મળે છે, પેનેટ્રેન્સ (B) એ જનીનની અભિવ્યક્તિની ટકાવારી છે, અને એપીજીનેટિક નિયંત્રણ (D) જનીન અભિવ્યક્તિમાં રાસાયણિક ફેરફાર દ્વારા થાય છે.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને ભિન્નતા", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
