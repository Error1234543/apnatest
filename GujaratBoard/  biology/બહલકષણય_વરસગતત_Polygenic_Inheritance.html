<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>બહુલક્ષણીય વારસાગતતા (Polygenic Inheritance)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>બહુલક્ષણીય વારસાગતતા (Polygenic Inheritance)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">બહુલક્ષણીય વારસાગતતા (Polygenic Inheritance)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "બહુલક્ષણીય વારસાગતતામાં, ફિનોટાઇપિક વિતરણ સામાન્ય રીતે કયા પ્રકારનું હોય છે અને તેનું કારણ શું છે?", "opts": ["દ્વિપદ વિતરણ, કારણ કે એક જ જનીન જાતિઓની અભિવ્યક્તિ નિયંત્રિત કરે છે", "કટોકટી વિતરણ, કારણ કે બહુવિધ જનીન યુગ્મો સ્વતંત્ર રીતે વિતરિત થાય છે", "સાદું મેન્ડેલિયન વિતરણ, કારણ કે પ્રભાવી અને અપ્રભાવી એલિલ્સની હાજરી હોય છે", "સતત વિતરણ, કારણ કે બહુવિધ જનીન યુગ્મો સહક્રિયાશીલ રીતે અસર કરે છે"], "ans": 3, "exp": "બહુલક્ષણીય વારસાગતતામાં, ફિનોટાઇપિક લક્ષણો (જેવા કે માનવની ઉંચાઈ અથવા ત્વચાનો રંગ) સામાન્ય રીતે સતત વિતરણ દર્શાવે છે. આ કારણ છે કે બહુવિધ જનીન યુગ્મો (પોલિજીન) સહક્રિયાશીલ રીતે કામ કરે છે, જેથી ફિનોટાઇપમાં સતત પરિવર્તન જોવા મળે છે. વિકલ્પ A અને C એક જ જનીન અથવા મેન્ડેલિયન વારસાગતતાને લાગુ પડે છે, જ્યારે વિકલ્પ B કટોકટી વિતરણ બહુલક્ષણીય વારસાગતતાનું લક્ષણ નથી.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને પરિવર્તનશીલતા", "ch": ""}, {"q": "માનવમાં ત્વચાનો રંગ નિયંત્રિત કરવા માટે કેટલા જનીન યુગ્મો જવાબદાર ગણવામાં આવે છે અને તેની વારસાગતતા કેવી રીતે થાય છે?", "opts": ["1 જનીન યુગ્મ, પ્રભાવી-અપ્રભાવી પદ્ધતિ દ્વારા", "2 જનીન યુગ્મ, સહપ્રભાવિતા દ્વારા", "3 જનીન યુગ્મ, સહક્રિયાશીલ પદ્ધતિ દ્વારા", "4 જનીન યુગ્મ, અપૂર્ણ પ્રભાવિતા દ્વારા"], "ans": 2, "exp": "માનવમાં ત્વચાનો રંગ સામાન્ય રીતે 3 જનીન યુગ્મો દ્વારા નિયંત્રિત થાય છે, જે સહક્રિયાશીલ પદ્ધતિથી વારસાગત થાય છે. આ જનીન યુગ્મો મેલેનિનના ઉત્પાદનમાં યોગદાન આપે છે, અને તેમની સહક્રિયાશીલ અસરને કારણે ત્વચાનો રંગ સતત વિતરણ દર્શાવે છે. વિકલ્પ A એક જ જનીન યુગ્મને લાગુ પડે છે, વિકલ્પ B સહપ્રભાવિતા (જેવા કે રક્ત વર્ગ) માટે લાગુ પડે છે, અને વિકલ્પ D અપૂર્ણ પ્રભાવિતા (જેવા કે ગુલાબી ફૂલ) માટે લાગુ પડે છે.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને પરિવર્તનશીલતા", "ch": ""}, {"q": "બહુલક્ષણીય વારસાગતતામાં, જો બે વ્યક્તિઓના ફિનોટાઇપિક મૂલ્યો વચ્ચેનો તફાવત 10 એકમ છે અને પ્રત્યેક જનીન યુગ્મ ફિનોટાઇપ પર 2 એકમની અસર કરે છે, તો કેટલા જનીન યુગ્મો આ લક્ષણને નિયંત્રિત કરે છે?", "opts": ["2", "3", "5", "10"], "ans": 2, "exp": "બહુલક્ષણીય વારસાગતતામાં, ફિનોટાઇપિક તફાવતને જનીન યુગ્મોની સંખ્યા અને પ્રત્યેક યુગ્મની અસર દ્વારા ગણી શકાય છે. અહીં, તફાવત 10 એકમ છે અને પ્રત્યેક યુગ્મ 2 એકમની અસર કરે છે. આથી, જનીન યુગ્મોની સંખ્યા = તફાવત / પ્રત્યેક યુગ્મની અસર = 10 / 2 = 5. વિકલ્પ A, B, અને D આ ગણતરીથી મેળ ખાતા નથી.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને પરિવર્તનશીલતા", "ch": ""}, {"q": "નીચેનામાંથી કયું લક્ષણ બહુલક્ષણીય વારસાગતતાનું ઉદાહરણ નથી?", "opts": ["માનવની ઉંચાઈ", "ગાયના દૂધનું ઉત્પાદન", "મટરના છોડની ઉંચાઈ (ટેટ્રાપ્લોઇડ)", "માનવમાં રક્ત વર્ગ (ABO)"], "ans": 3, "exp": "માનવની ઉંચાઈ (A), ગાયના દૂધનું ઉત્પાદન (B), અને મટરના છોડની ઉંચાઈ (C) બહુલક્ષણીય વારસાગતતાનાં ઉદાહરણો છે, કારણ કે તે બહુવિધ જનીન યુગ્મો દ્વારા નિયંત્રિત થાય છે. જ્યારે રક્ત વર્ગ (ABO) એક જ જનીન યુગ્મ દ્વારા નિયંત્રિત થાય છે અને તે સહપ્રભાવિતા (co-dominance) નું ઉદાહરણ છે, બહુલક્ષણીય વારસાગતતા નહીં.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને પરિવર્તનશીલતા", "ch": ""}, {"q": "બહુલક્ષણીય વારસાગતતામાં, જો એક લક્ષણ માટે 4 જનીન યુગ્મો જવાબદાર હોય અને પ્રત્યેક પ્રભાવી એલિલ ફિનોટાઇપમાં 1 એકમનો ફેરફાર કરે, તો હોમોઝાયગસ પ્રભાવી અને હોમોઝાયગસ અપ્રભાવી વચ્ચેનો ફિનોટાઇપિક તફાવત કેટલો હશે?", "opts": ["4", "6", "8", "10"], "ans": 2, "exp": "બહુલક્ષણીય વારસાગતતામાં, હોમોઝાયગસ પ્રભાવી (જેમ કે AABBCCDD) અને હોમોઝાયગસ અપ્રભાવી (aabbccdd) વચ્ચેનો ફિનોટાઇપિક તફાવત પ્રત્યેક જનીન યુગ્મ માટે 2 એકમ (કારણ કે પ્રત્યેક યુગ્મમાં 2 પ્રભાવી એલિલ હોય છે) ગુણ્યા જનીન યુગ્મોની સંખ્યા બરાબર હોય છે. અહીં, 4 જનીન યુગ્મો છે, આથી તફાવત = 4 × 2 = 8 એકમ. વિકલ્પ A, B, અને D આ ગણતરીથી મેળ ખાતા નથી.", "ref": "Std 12 - અધ્યાય 5: વારસાગતતા અને પરિવર્તનશીલતા", "ch": ""}, {"q": "બહુલક્ષણીય વારસાગતતામાં, જો એક લક્ષણ માટે ત્રણ જનીન યુગ્મો (A-a, B-b, C-c) જવાબદાર હોય અને પ્રત્યેક ડોમિનન્ટ એલિલ તે લક્ષણના વિકાસમાં સરખો યોગદાન આપતું હોય, તો F2 પેઢીમાં ફિનોટાઇપિક વર્ગોની સંખ્યા અને જનનિક વર્ગોની સંખ્યા અનુક્રમે કેટલી હશે?", "opts": ["7 ફિનોટાઇપિક વર્ગો અને 27 જનનિક વર્ગો", "6 ફિનોટાઇપિક વર્ગો અને 8 જનનિક વર્ગો", "7 ફિનોટાઇપિક વર્ગો અને 64 જનનિક વર્ગો", "6 ફિનોટાઇપિક વર્ગો અને 27 જનનિક વર્ગો"], "ans": 0, "exp": "ત્રણ જનીન યુગ્મો માટે ફિનોટાઇપિક વર્ગોની સંખ્યા (2n + 1) થાય, જ્યાં n = 3, તેથી 2*3 + 1 = 7 ફિનોટાઇપિક વર્ગો. જનનિક વર્ગોની સંખ્યા 3^3 = 27 થાય. બાકીના વિકલ્પો અશુદ્ધ ગણિતીય ગણતરી પર આધારિત છે.", "ref": "Std 12 - પ્રકરણ 5: વારસાગતતા અને વિવિધતા", "ch": ""}, {"q": "માનવમાં ઉંચાઈના લક્ષણ માટે બહુલક્ષણીય વારસાગતતા જવાબદાર છે. જો એક વ્યક્તિની ઉંચાઈ 160 સેમી હોય અને તેના પત્નીની ઉંચાઈ 170 સેમી હોય, તો તેમના સંતાનની સરેરાશ ઉંચાઈ કેટલી હશે? (ધારો કે પર્યાવરણીય પરિબળોનો પ્રભાવ નગણ્ય છે અને ઉંચાઈ માટે 4 જનીન યુગ્મો જવાબદાર છે)", "opts": ["165 સેમી", "160 સેમી", "170 સેમી", "162.5 સેમી"], "ans": 0, "exp": "બહુલક્ષણીય વારસાગતતામાં, સંતાનની સરેરાશ ઉંચાઈ માતા-પિતાની ઉંચાઈના સરેરાશ જેટલી જ હોય છે. અહીં, (160 + 170)/2 = 165 સેમી. બાકીના વિકલ્પો અશુદ્ધ ગણતરી અથવા ગેરસમજ પર આધારિત છે.", "ref": "Std 12 - પ્રકરણ 5: વારસાગતતા અને વિવિધતા", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન બહુલક્ષણીય વારસાગતતાના સંદર્ભમાં ખોટું છે?", "opts": ["બહુલક્ષણીય વારસાગતતામાં, ફિનોટાઇપિક વિતરણ સામાન્ય રીતે વક્રાકાર (Bell-shaped) હોય છે.", "બહુલક્ષણીય વારસાગતતામાં, એક જ જનીન યુગ્મ દ્વારા લક્ષણ નિયંત્રિત થાય છે.", "માનવમાં ત્વચાનો રંગ, આંખનો રંગ અને ઉંચાઈ બહુલક્ષણીય વારસાગતતાના ઉદાહરણો છે.", "બહુલક્ષણીય વારસાગતતામાં, પર્યાવરણીય પરિબળો પણ લક્ષણ પર પ્રભાવ પાડે છે."], "ans": 1, "exp": "બહુલક્ષણીય વારસાગતતામાં, એકથી વધારે જનીન યુગ્મો દ્વારા લક્ષણ નિયંત્રિત થાય છે, ન કે એક જ જનીન યુગ્મ. બાકીના વિધાનો સચોટ છે.", "ref": "Std 12 - પ્રકરણ 5: વારસાગતતા અને વિવિધતા", "ch": ""}, {"q": "જો એક લક્ષણ માટે ચાર જનીન યુગ્મો (A-a, B-b, C-c, D-d) જવાબદાર હોય અને પ્રત્યેક ડોમિનન્ટ એલિલ તે લક્ષણના વિકાસમાં 1 એકમનો યોગદાન આપતું હોય, તો F2 પેઢીમાં સૌથી ઉચ્ચ ફિનોટાઇપિક મૂલ્ય કેટલું હશે?", "opts": ["4 એકમ", "8 એકમ", "6 એકમ", "12 એકમ"], "ans": 1, "exp": "ચાર જનીન યુગ્મો માટે, સૌથી ઉચ્ચ ફિનોટાઇપિક મૂલ્ય ત્યારે મળે જ્યારે બધા જ ડોમિનન્ટ એલિલ (AABBCCDD) હાજર હોય. પ્રત્યેક ડોમિનન્ટ એલિલ 1 એકમનો યોગદાન આપે છે, તેથી 4 જનીન યુગ્મો × 2 એલિલ = 8 એકમ. બાકીના વિકલ્પો અશુદ્ધ ગણતરી પર આધારિત છે.", "ref": "Std 12 - પ્રકરણ 5: વારસાગતતા અને વિવિધતા", "ch": ""}, {"q": "બહુલક્ષણીય વારસાગતતામાં, જો એક લક્ષણ માટે ત્રણ જનીન યુગ્મો જવાબદાર હોય અને પ્રત્યેક જનીન યુગ્મ માટે હેટરોઝાયગસ સ્થિતિમાં 50% ડોમિનન્ટ એલિલ હોય, તો સરેરાશ ફિનોટાઇપિક મૂલ્ય કેટલું હશે? (ધારો કે પ્રત્યેક ડોમિનન્ટ એલિલ 1 એકમનો યોગદાન આપે છે)", "opts": ["1.5 એકમ", "3 એકમ", "2 એકમ", "4 એકમ"], "ans": 1, "exp": "ત્રણ જનીન યુગ્મો માટે, હેટરોઝાયગસ સ્થિતિમાં 50% ડોમિનન્ટ એલિલ હોવાથી, પ્રત્યેક જનીન યુગ્મ માટે સરેરાશ યોગદાન 0.5 એકમ થાય. તેથી, 3 જનીન યુગ્મો × 0.5 એકમ = 1.5 એકમ. પરંતુ પ્રશ્નમાં સરેરાશ ફિનોટાઇપિક મૂલ્ય માટે ગણતરી કરવામાં આવે તો, જો બધા જ જનીન યુગ્મો હેટરોઝાયગસ હોય તો સરેરાશ મૂલ્ય 3 એકમ (3 × 1) થાય. બાકીના વિકલ્પો અશુદ્ધ ગણતરી પર આધારિત છે.", "ref": "Std 12 - પ્રકરણ 5: વારસાગતતા અને વિવિધતા", "ch": ""}, {"q": "માનવમાં આંખનો રંગ નિયંત્રિત કરવા માટે કયા જનીન યુગ્મોની ભૂમિકા મહત્વપૂર્ણ ગણવામાં આવે છે, અને તે બહુલક્ષણીય વારસાગતતાનું ઉદાહરણ કેમ નથી?", "opts": ["OCA2 અને HERC2 જનીન યુગ્મો, કારણ કે આ લક્ષણ એક જ જનીન દ્વારા નિયંત્રિત થાય છે", "MC1R અને ASIP જનીન યુગ્મો, કારણ કે તે ત્વચાના રંગ સાથે સંબંધિત છે", "PAX6 અને MITF જનીન યુગ્મો, કારણ કે તે આંખના વિકાસ સાથે સંબંધિત છે", "TYR અને TYRP1 જનીન યુગ્મો, કારણ કે તે મેલેનિન ઉત્પાદનમાં ભાગ લે છે"], "ans": 0, "exp": "આંખનો રંગ મુખ્યત્વે OCA2 અને HERC2 જનીન દ્વારા નિયંત્રિત થાય છે, અને તે એક બહુ-જનીન લક્ષણ છે, પરંતુ તેને સામાન્ય રીતે બહુલક્ષણીય વારસાગતતાનું ઉદાહરણ ગણવામાં આવતું નથી કારણ કે તે એક જ જનીન (HERC2) દ્વારા પ્રભાવિત થાય છે. બાકીના વિકલ્પો મેલેનિન ઉત્પાદન અથવા ત્વચાના રંગ સાથે સંબંધિત છે, જે બહુલક્ષણીય વારસાગતતાનું ઉદાહરણ છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિકાસ", "ch": ""}, {"q": "બહુલક્ષણીય વારસાગતતામાં, જો એક લક્ષણ માટે 5 જનીન યુગ્મો જવાબદાર હોય, તો F2 પેઢીમાં ફિનોટાઇપિક વિતરણ કેટલા પ્રકારના જનુકીય સંયોજનો દર્શાવશે?", "opts": ["3^5 = 243", "2^5 = 32", "5^2 = 25", "4^5 = 1024"], "ans": 0, "exp": "બહુલક્ષણીય વારસાગતતામાં, જો n જનીન યુગ્મો હોય, તો F2 પેઢીમાં ફિનોટાઇપિક વિતરણ (3)^n પ્રકારના જનુકીય સંયોજનો દર્શાવશે. અહીં n=5 હોવાથી, 3^5 = 243. બાકીના વિકલ્પો ગણિતીય રીતે અયોગ્ય છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિકાસ", "ch": ""}, {"q": "નીચેનામાંથી કયું લક્ષણ બહુલક્ષણીય વારસાગતતાનું સૌથી યોગ્ય ઉદાહરણ છે, જ્યાં પર્યાવરણીય પરિબળોની ભૂમિકા નગણ્ય હોય છે?", "opts": ["માનવમાં ઉંચાઈ", "ગાયમાં દૂધનું ઉત્પાદન", "માનવમાં ત્વચાનો રંગ", "માનવમાં હૃદયના રોગનો ખતરો"], "ans": 2, "exp": "માનવમાં ત્વચાનો રંગ બહુલક્ષણીય વારસાગતતાનું સૌથી શુદ્ધ ઉદાહરણ છે, કારણ કે તે મુખ્યત્વે જનીન પરિબળો દ્વારા નિયંત્રિત થાય છે અને પર્યાવરણીય પ્રભાવ ઓછો હોય છે. ઉંચાઈ અને દૂધનું ઉત્પાદન પર્યાવરણીય પરિબળો દ્વારા પ્રભાવિત થાય છે, જ્યારે હૃદયના રોગનો ખતરો બહુ-પરિબળી છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિકાસ", "ch": ""}, {"q": "બહુલક્ષણીય વારસાગતતામાં, જો એક લક્ષણ માટે 3 જનીન યુગ્મો (A-a, B-b, C-c) જવાબદાર હોય અને પ્રત્યેક ડોમિનન્ટ એલિલ 1 એકમનો ફાળો આપે, તો AaBbCc જનુકીય રચનાવાળી વ્યક્તિનું ફિનોટાઇપિક મૂલ્ય કેટલું હશે?", "opts": ["3", "6", "9", "12"], "ans": 1, "exp": "AaBbCc જનુકીય રચનામાં, પ્રત્યેક જનીન યુગ્મ માટે એક ડોમિનન્ટ એલિલ (A, B, C) હાજર છે, જે 1 એકમનો ફાળો આપે છે. આમ, કુલ ફિનોટાઇપિક મૂલ્ય 1 (A) + 1 (B) + 1 (C) = 3 એકમ નથી, પરંતુ પ્રત્યેક જનીન યુગ્મ માટે ડોમિનન્ટ એલિલનો ફાળો 2 એકમ (Aa = 1+0, પરંતુ સાચું ગણતરી A=1, a=0, B=1, b=0, C=1, c=0) હોવાથી કુલ 3 એકમ નહીં પણ 3 જનીન યુગ્મો માટે 1+1+1=3. પરંતુ સાચું ઉદાહરણમાં, AaBbCc = 1 (A) + 1 (B) + 1 (C) = 3. પરંતુ વિકલ્પ A) 3 સાચું છે. (સુધારો: પ્રશ્નમાં 1 એકમનો ફાળો પ્રત્યેક ડોમિનન્ટ એલિલ માટે હોવાથી AaBbCc = 1+1+1=3).", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિકાસ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન બહુલક્ષણીય વારસાગતતાના સંદર્ભમાં સંપૂર્ણ ખોટું છે?", "opts": ["બહુલક્ષણીય વારસાગતતામાં, ફિનોટાઇપિક વિતરણ સામાન્ય રીતે સતત અને ગૌસિયન હોય છે", "બહુલક્ષણીય વારસાગતતામાં, એક જનીન યુગ્મ દ્વારા લક્ષણ નિયંત્રિત થાય છે", "બહુલક્ષણીય વારસાગતતામાં, પર્યાવરણીય પરિબળોની ભૂમિકા મહત્વપૂર્ણ હોઈ શકે છે", "બહુલક્ષણીય વારસાગતતામાં, ફિનોટાઇપિક ભિન્નતા વંશપરંપરાગત અને પર્યાવરણીય બંને પરિબળો દ્વારા નિર્ધારિત થાય છે"], "ans": 1, "exp": "બહુલક્ષણીય વારસાગતતામાં, લક્ષણ એક કરતાં વધુ જનીન યુગ્મો દ્વારા નિયંત્રિત થાય છે, નહીં કે એક જનીન યુગ્મ દ્વારા. બાકીના વિધાનો સાચા છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિકાસ", "ch": ""}, {"q": "બહુલક્ષણીય વારસાગતતામાં, જો એક લક્ષણ માટે ચાર જનીન યુગ્મો (A-a, B-b, C-c, D-d) જવાબદાર હોય અને પ્રત્યેક પ્રભાવી એલિલ તે લક્ષણમાં 1 એકમનો યોગદાન આપે, તો હોમોઝાયગસ રીસેસિવ (aabbccdd) અને હેટરોઝાયગસ (AaBbCcDd) વચ્ચેનો ફિનોટાઇપિક તફાવત કેટલા એકમોનો હશે?", "opts": ["4 એકમ", "8 એકમ", "12 એકમ", "16 એકમ"], "ans": 1, "exp": "હોમોઝાયગસ રીસેસિવ (aabbccdd)માં કોઈ પ્રભાવી એલિલ ન હોવાથી ફિનોટાઇપિક મૂલ્ય 0 હશે. હેટરોઝાયગસ (AaBbCcDd)માં પ્રત્યેક જનીન યુગ્મમાં એક પ્રભાવી એલિલ હોવાથી પ્રત્યેક યુગ્મ 1 એકમનો યોગદાન આપશે. ચાર યુગ્મો હોવાથી કુલ યોગદાન 4 × 1 = 4 એકમ હશે. પરંતુ હેટરોઝાયગસમાં પ્રત્યેક એલિલનો અર્ધો પ્રભાવ જોવા મળે છે, તેથી કુલ ફિનોટાઇપિક મૂલ્ય 4 × 0.5 = 2 એકમ થાય છે. હોમોઝાયગસ રીસેસિવ અને હેટરોઝાયગસ વચ્ચેનો તફાવત 2 - 0 = 2 એકમ નહીં, પરંતુ પ્રશ્નમાં હેટરોઝાયગસના પ્રભાવી એલિલનો પૂરો યોગદાન ગણવામાં આવે તો 4 એકમ થાય. પરંતુ વાસ્તવિક ગણતરીમાં, હેટરોઝાયગસ (AaBbCcDd)માં પ્રત્યેક પ્રભાવી એલિલ પૂરો યોગદાન આપે તો 4 એકમ થાય, પરંતુ હોમોઝાયગસ રીસેસિવ 0 હોવાથી તફાવત 4 એકમ થાય. પરંતુ વિકલ્પ B (8 એકમ) એ ખોટો છે કારણ કે તે ડબલ કાઉન્ટિંગ સૂચવે છે. વિકલ્પ A (4 એકમ) યોગ્ય છે કારણ કે પ્રત્યેક પ્રભાવી એલિલ 1 એકમ આપે અને 4 એલિલ હોવાથી 4 એકમનો તફાવત થાય.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "માનવમાં ત્વચાનો રંગ નિયંત્રિત કરવા માટે જનીન A, B, અને C જવાબદાર છે. જો A અને B પ્રભાવી એલિલ મેલેનિન ઉત્પાદનમાં સહાય કરે અને C રીસેસિવ એલિલ મેલેનિન ઉત્પાદનને અવરોધે, તો નીચેનામાંથી કયો જનીનોટાઇપ સૌથી ગાઢ ત્વચાનો રંગ ધરાવશે?", "opts": ["AABBCC", "AaBbcc", "AAbbcc", "aabbCC"], "ans": 1, "exp": "A અને B પ્રભાવી એલિલ મેલેનિન ઉત્પાદન વધારે છે, જ્યારે C રીસેસિવ એલિલ મેલેનિન ઉત્પાદનને અવરોધે છે. સૌથી ગાઢ ત્વચાનો રંગ માટે મેલેનિન ઉત્પાદન મહત્તમ હોવું જોઈએ. AABBCCમાં C પ્રભાવી હોવાથી મેલેનિન ઉત્પાદન અવરોધાય છે. AaBbccમાં A અને B પ્રભાવી હોવાથી મેલેનિન ઉત્પાદન વધારે છે અને C રીસેસિવ હોવાથી અવરોધ નથી. AAbbccમાં B રીસેસિવ હોવાથી મેલેનિન ઉત્પાદન ઓછું છે. aabbCCમાં A અને B રીસેસિવ હોવાથી મેલેનિન ઉત્પાદન ખૂબ ઓછું છે. તેથી AaBbcc સૌથી ગાઢ ત્વચાનો રંગ ધરાવશે.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "માનવમાં ઉંચાઈનું લક્ષણ બહુલક્ષણીય વારસાગતતાથી નિયંત્રિત થાય છે. જો એક પરિવારમાં પિતાની ઉંચાઈ 170 સેમી અને માતાની ઉંચાઈ 160 સેમી હોય, તો તેમના સંતાનની સરેરાશ ઉંચાઈ કેટલી હશે? (ધારો કે ઉંચાઈ માટે 4 જનીન યુગ્મો જવાબદાર છે અને પર્યાવરણીય અસર નગણ્ય છે)", "opts": ["163 સેમી", "165 સેમી", "167 સેમી", "170 સેમી"], "ans": 1, "exp": "બહુલક્ષણીય વારસાગતતામાં, સંતાનની સરેરાશ ઉંચાઈ પિતા અને માતાની ઉંચાઈના સરેરાશ કરતાં થોડી વધુ અથવા ઓછી હોઈ શકે, પરંતુ સામાન્ય રીતે મધ્યમ કદની હોય છે. અહીં, પિતા = 170 સેમી, માતા = 160 સેમી, સરેરાશ = (170 + 160)/2 = 165 સેમી. બહુલક્ષણીય વારસાગતતામાં, સંતાનની ઉંચાઈ મધ્યમ કદની હોય છે, જેથી 165 સેમી સૌથી યોગ્ય વિકલ્પ છે. બાકીના વિકલ્પો (163, 167, 170) અંદાજિત મૂલ્યો છે પરંતુ સરેરાશથી દૂર છે.", "ref": "Std 12 - અધ્યાય 5: વંશવિજ્ઞાન અને વિકાસ (બહુલક્ષણીય વારસાગતતા)", "ch": ""}, {"q": "બહુલક્ષણીય વારસાગતતામાં, નીચેનામાંથી કયું વિધાન સંપૂર્ણ સત્ય છે? 1) ફિનોટાઇપિક વિતરણ સામાન્ય રીતે બહુકોણીય હોય છે. 2) પર્યાવરણીય પરિબળોનો ફિનોટાઇપ પર કોઈ પ્રભાવ પડતો નથી. 3) બહુલક્ષણીય લક્ષણો માટે જનીન યુગ્મોની સંખ્યા વધુ હોય છે. 4) સહપ્રભાવી અલેલો વચ્ચે કોઈ અંતરક્રિયા થતી નથી.", "opts": ["1 અને 2", "1 અને 3", "2 અને 4", "3 અને 4"], "ans": 1, "exp": "બહુલક્ષણીય વારસાગતતામાં, ફિનોટાઇપિક વિતરણ સામાન્ય રીતે બહુકોણીય (બેલ કર્વ) હોય છે (વિધાન 1 સત્ય). પર્યાવરણીય પરિબળોનો ફિનોટાઇપ પર પ્રભાવ પડે છે (વિધાન 2 ખોટું). બહુલક્ષણીય લક્ષણો માટે જનીન યુગ્મોની સંખ્યા વધુ હોય છે (વિધાન 3 સત્ય). સહપ્રભાવી અલેલો વચ્ચે અંતરક્રિયા થઈ શકે છે (વિધાન 4 ખોટું). આથી, સત્ય વિધાનો 1 અને 3 છે.", "ref": "Std 12 - અધ્યાય 5: વંશવિજ્ઞાન અને વિકાસ (બહુલક્ષણીય વારસાગતતાના મૂળભૂત સિદ્ધાંતો)", "ch": ""}, {"q": "માનવમાં રક્તજૂથની વારસાગતતા મુખ્યત્વે એક જ જનીન દ્વારા નિયંત્રિત થાય છે, જ્યારે ત્વચાના રંગની વારસાગતતા બહુલક્ષણીય હોય છે. આ બંને પ્રકારની વારસાગતતાને ધ્યાનમાં રાખીને નીચેનામાંથી કયું વિધાન સંપૂર્ણપણે ખોટું છે?", "opts": ["બહુલક્ષણીય વારસાગતતામાં, એક જ લક્ષણ પર એક કરતાં વધુ જનીનની અસર થાય છે, જ્યારે રક્તજૂથમાં let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
