<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>આનુવંશિક વૈવિધ્ય</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>આનુવંશિક વૈવિધ્ય</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">આનુવંશિક વૈવિધ્ય</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "જ્યારે બે જુદી જુદી પ્રજાતિઓના સજીવો વચ્ચે સંકરણ થાય છે ત્યારે ઉત્પન્ન થતી સંતતિમાં આનુવંશિક વૈવિધ્યનું મુખ્ય કારણ કયું હોય છે?", "opts": ["જનીનના સ્વતંત્ર વિતરણનો નિયમ", "વર્ણસૂત્રોની અસમાન્ય સંગઠન (Unequal crossing over)", "પ્રજાતિઓ વચ્ચેના જનીન સંકરણ (Inter-specific hybridization)", "મ્યુટેશન દરમાં અચાનક વધારો"], "ans": 2, "exp": "સંશોધન: પ્રજાતિઓ વચ્ચેના સંકરણ (Inter-specific hybridization) દ્વારા જુદી જુદી પ્રજાતિઓના જનીનો એકબીજા સાથે મિશ્રિત થાય છે, જેનાથી નવી સંતતિમાં આનુવંશિક વૈવિધ્ય ઉત્પન્ન થાય છે. A) સ્વતંત્ર વિતરણનો નિયમ એક જ પ્રજાતિમાં જનીનોના વિતરણ સાથે સંબંધિત છે. B) અસમાન્ય સંગઠન એ વર્ણસૂત્રીય પરિવર્તન છે, પરંતુ તે પ્રજાતિઓ વચ્ચેના સંકરણનું મુખ્ય કારણ નથી. D) મ્યુટેશન દરમાં વધારો વૈવિધ્ય લાવી શકે, પરંતુ તે પ્રજાતિઓ વચ્ચેના સંકરણ જેવું સીધું કારણ નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક જ પેશીમાં બે જુદા જનીનોમાં થયેલા મ્યુટેશન પૈકી કયા કિસ્સામાં આનુવંશિક વૈવિધ્ય સૌથી ઓછું પ્રભાવિત થશે?", "opts": ["બંને મ્યુટેશન નિષ્ક્રિય (Silent mutation) પ્રકારના હોય", "એક મ્યુટેશન નિષ્ક્રિય અને બીજું મિસસેન્સ (Missense) હોય", "બંને મ્યુટેશન નોન્સેન્સ (Nonsense) પ્રકારના હોય", "એક મ્યુટેશન ફ્રેમશિફ્ટ (Frameshift) અને બીજું મિસસેન્સ હોય"], "ans": 0, "exp": "સંશોધન: નિષ્ક્રિય મ્યુટેશન (Silent mutation)માં DNA ક્રમમાં ફેરફાર થાય છે પરંતુ પ્રોટીનની અમીનો એસિડ ક્રમમાં કોઈ ફેરફાર થતો નથી, આથી આનુવંશિક વૈવિધ્ય પર તેનો પ્રભાવ સૌથી ઓછો હોય છે. B) મિસસેન્સ મ્યુટેશન પ્રોટીનની રચનામાં ફેરફાર કરે છે. C) નોન્સેન્સ મ્યુટેશન પ્રોટીનને અવસાન કરે છે. D) ફ્રેમશિફ્ટ મ્યુટેશન પ્રોટીનની રચનામાં મોટા પાયે ફેરફાર કરે છે.", "ref": "Std 12 - અધ્યાય 6: આનુવંશિકતા અને પરિવર્તન", "ch": ""}, {"q": "જ્યારે એક જ પ્રજાતિમાં બે જુદી આબોહવા પરિસ્થિતિઓમાં રહેતી વસતિઓ વચ્ચે જનીન વહન થાય છે, ત્યારે ઉત્પન્ન થતી આનુવંશિક વૈવિધ્ય કયા પરિબળ દ્વારા સૌથી વધુ પ્રભાવિત થશે?", "opts": ["જનીન વહન (Gene flow)", "પ્રાકૃતિક પસંદગી (Natural selection)", "જનીનિક વહેંચણી (Genetic drift)", "મ્યુટેશન દર (Mutation rate)"], "ans": 1, "exp": "સંશોધન: પ્રાકૃતિક પસંદગી (Natural selection) જુદી જુદી આબોહવા પરિસ્થિતિઓમાં જુદા જુદા જનીનોને પસંદ કરે છે, જેનાથી વસતિઓ વચ્ચે જનીન વહન થયા પછી પણ આનુવંશિક વૈવિધ્ય પ્રભાવિત થાય છે. A) જનીન વહન વસતિઓ વચ્ચે જનીનોનું વહન કરે છે પરંતુ તે વૈવિધ્યનું મુખ્ય કારણ નથી. C) જનીનિક વહેંચણી નાની વસતિમાં જનીન આવર્તનમાં અચાનક ફેરફાર કરે છે. D) મ્યુટેશન દર વૈવિધ્ય લાવી શકે પરંતુ તે પ્રાકૃતિક પસંદગી જેટલું પ્રભાવી નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક જીવમાં થયેલા મ્યુટેશન દ્વારા ઉત્પન્ન થતી નવી એલિલ (allele) એ જીવની ફિટનેસ ઘટાડે છે. આ કિસ્સામાં, આ મ્યુટેશન કયા પ્રકારનું ગણવામાં આવશે?", "opts": ["તટસ્થ મ્યુટેશન (Neutral mutation)", "હાનિકારક મ્યુટેશન (Deleterious mutation)", "લાભદાયી મ્યુટેશન (Beneficial mutation)", "નિષ્ક્રિય મ્યુટેશન (Silent mutation)"], "ans": 1, "exp": "સંશોધન: હાનિકારક મ્યુટેશન (Deleterious mutation) એ જીવની ફિટનેસ ઘટાડે છે. A) તટસ્થ મ્યુટેશન ફિટનેસ પર કોઈ પ્રભાવ પાડતું નથી. C) લાભદાયી મ્યુટેશન ફિટનેસ વધારે છે. D) નિષ્ક્રિય મ્યુટેશન પ્રોટીનની રચનામાં કોઈ ફેરફાર કરતું નથી.", "ref": "Std 12 - અધ્યાય 6: આનુવંશિકતા અને પરિવર્તન", "ch": ""}, {"q": "એક વસતિમાં જનીનિક વૈવિધ્ય ઘટવાનું મુખ્ય કારણ કયું હોઈ શકે છે?", "opts": ["વસતિનું કદ વધવું", "જનીન વહનમાં વધારો", "જનીનિક વહેંચણી (Genetic drift)", "પ્રાકૃતિક પસંદગી દ્વારા હેટરોઝાયગસ એલિલની પસંદગી"], "ans": 2, "exp": "સંશોધન: જનીનિક વહેંચણી (Genetic drift) નાની વસતિમાં જનીન આવર્તનમાં અચાનક ફેરફાર કરે છે, જેનાથી જનીનિક વૈવિધ્ય ઘટી શકે છે. A) વસતિનું કદ વધવાથી વૈવિધ્ય ઘટતું નથી. B) જનીન વહન વૈવિધ્ય વધારે છે. D) પ્રાકૃતિક પસંદગી હેટરોઝાયગસ એલિલની પસંદગી કરે તો વૈવિધ્ય ઘટી શકે, પરંતુ તે જનીનિક વહેંચણી જેટલું સીધું કારણ નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "આનુવંશિક વૈવિધ્યના સંદર્ભમાં, 'બોટલનેક ઇફેક્ટ' (Bottleneck Effect) ની પરિણામે કયું પરિવર્તન થાય છે?", "opts": ["વસતિમાં જનીનિક વૈવિધ્યમાં તાત્કાલિક વધારો થાય છે.", "વસતિમાં જનીનિક વૈવિધ્યમાં કાયમી ઘટાડો થાય છે.", "વસતિમાં નવા જનીનોની ઉત્પત્તિ થાય છે.", "વસતિમાં ફીનોટાઇપિક વૈવિધ્યમાં વધારો થાય છે."], "ans": 1, "exp": "બોટલનેક ઇફેક્ટ એટલે જ્યારે વસતિનો એક મોટો ભાગ અચાનક નાશ પામે છે અને બચેલા થોડા સજીવોમાંથી નવી વસતિ ઉત્પન્ન થાય છે. આથી જનીનિક વૈવિધ્યમાં કાયમી ઘટાડો થાય છે કારણ કે બચેલા સજીવો પાસે મૂળ વસતિ કરતાં ઓછા જનીનિક વૈવિધ્ય હોય છે. A) ખોટું છે કારણ કે વૈવિધ્યમાં વધારો નહીં પણ ઘટાડો થાય. C) ખોટું છે કારણ કે નવા જનીનોની ઉત્પત્તિ મ્યુટેશન દ્વારા થાય, બોટલનેક ઇફેક્ટ દ્વારા નહીં. D) ખોટું છે કારણ કે ફીનોટાઇપિક વૈવિધ્ય જનીનિક વૈવિધ્ય પર આધારિત હોય છે, જે ઘટે છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "જ્યારે એક જ વસતિમાં બે જુદા જુથો વચ્ચે પ્રજનન થતું નથી, ત્યારે કયું પરિણામ થાય છે?", "opts": ["જનીનિક વૈવિધ્યમાં વધારો થાય છે.", "જનીનિક વૈવિધ્યમાં ઘટાડો થાય છે અને વસતિ વંશીય રીતે અલગ પડે છે.", "વસતિમાં નવા પ્રકારના જનીનો ઉત્પન્ન થાય છે.", "વસતિમાં ફીનોટાઇપિક એકસમાનતા વધે છે."], "ans": 1, "exp": "જ્યારે એક જ વસતિમાં બે જુદા જુથો વચ્ચે પ્રજનન થતું નથી, ત્યારે જનીનિક વૈવિધ્ય ઘટે છે અને આ જુથો વંશીય રીતે અલગ પડે છે, જેને 'જનીનિક ડ્રિફ્ટ' કહેવાય છે. A) ખોટું છે કારણ કે પ્રજનનના અભાવે વૈવિધ્ય ઘટે છે. C) ખોટું છે કારણ કે નવા જનીનો મ્યુટેશન દ્વારા ઉત્પન્ન થાય છે. D) ખોટું છે કારણ કે ફીનોટાઇપિક એકસમાનતા વધે છે પરંતુ મુખ્ય પરિણામ જનીનિક વૈવિધ્યમાં ઘટાડો અને વંશીય અલગતા છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "આનુવંશિક વૈવિધ્યના સંદર્ભમાં, 'ફાઉન્ડર ઇફેક્ટ' (Founder Effect) ની પરિણામે કયું પરિવર્તન થાય છે?", "opts": ["નવી વસતિમાં જનીનિક વૈવિધ્ય મૂળ વસતિ કરતાં વધુ હોય છે.", "નવી વસતિમાં જનીનિક વૈવિધ્ય મૂળ વસતિ કરતાં ઓછું હોય છે.", "નવી વસતિમાં જનીનિક વૈવિધ્ય મૂળ વસતિ જેવું જ હોય છે.", "નવી વસતિમાં જનીનિક વૈવિધ્યમાં કોઈ ફેરફાર થતો નથી."], "ans": 1, "exp": "ફાઉન્ડર ઇફેક્ટ એટલે જ્યારે થોડા સજીવો મૂળ વસતિમાંથી અલગ થઈને નવી વસતિ સ્થાપે છે. આ નવી વસતિમાં જનીનિક વૈવિધ્ય મૂળ વસતિ કરતાં ઓછું હોય છે કારણ કે થોડા સજીવો પાસે મૂળ વસતિના તમામ જનીનો ન હોય. A) ખોટું છે કારણ કે વૈવિધ્ય વધતું નથી. C) અને D) ખોટા છે કારણ કે નવી વસતિ મૂળ વસતિના થોડા સજીવો પર આધારિત હોય છે, જેના કારણે વૈવિધ્ય ઓછું હોય છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક વસતિમાં જનીનિક વૈવિધ્ય ઘટવાનું કારણ કયું હોઈ શકે છે જ્યારે વસતિનો આકાર ખૂબ જ નાનો હોય છે?", "opts": ["જનીનિક ડ્રિફ્ટ", "પ્રાકૃતિક પસંદગી", "મ્યુટેશન", "જનીનિક પુનરાવર્તન"], "ans": 0, "exp": "જ્યારે વસતિનો આકાર ખૂબ જ નાનો હોય છે, ત્યારે જનીનિક ડ્રિફ્ટ (Genetic Drift) નામનું પરિબળ જનીનિક વૈવિધ્ય ઘટાડે છે. જનીનિક ડ્રિફ્ટ એ યાદચ્છિક પરિવર્તન છે જે નાની વસતિમાં જનીનિક આવર્તનને બદલે છે. B) ખોટું છે કારણ કે પ્રાકૃતિક પસંદગી વૈવિધ્ય ઘટાડતી નથી, પરંતુ ચોક્કસ લક્ષણોને પ્રોત્સાહન આપે છે. C) ખોટું છે કારણ કે મ્યુટેશન વૈવિધ્ય વધારે છે. D) ખોટું છે કારણ કે જનીનિક પુનરાવર્તન વૈવિધ્ય ઘટાડતું નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક વસતિમાં જનીનિક વૈવિધ્ય જાળવવા માટે કયું પરિબળ મહત્વનું છે?", "opts": ["આંતરપ્રજનન (Inbreeding)", "બહિર્પ્રજનન (Outbreeding)", "પ્રાકૃતિક પસંદગી", "જનીનિક ડ્રિફ્ટ"], "ans": 1, "exp": "બહિર્પ્રજનન (Outbreeding) એ જનીનિક વૈવિધ્ય જાળવવા માટે મહત્વનું પરિબળ છે કારણ કે તે વસતિમાં જુદા જુદા જનીનોના મિશ્રણને પ્રોત્સાહન આપે છે. A) ખોટું છે કારણ કે આંતરપ્રજનન વૈવિધ્ય ઘટાડે છે. C) ખોટું છે કારણ કે પ્રાકૃતિક પસંદગી ચોક્કસ લક્ષણોને પ્રોત્સાહન આપે છે, પરંતુ વૈવિધ્ય જાળવતી નથી. D) ખોટું છે કારણ કે જનીનિક ડ્રિફ્ટ વૈવિધ્ય ઘટાડે છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક વસતિમાં જનીનિક વૈવિધ્યનું મૂલ્યાંકન કરવા માટે કયો સૂત્ર વાપરવામાં આવે છે, જેમાં એલિલની આવૃત્તિ અને હેટરોઝાયગસિટી ધ્યાનમાં લેવામાં આવે છે?", "opts": ["હાર્ડી-વાઇનબર્ગ સૂત્ર (p² + 2pq + q² = 1)", "શેનન-વીવર ઇન્ડેક્સ (H = -Σ pi ln pi)", "ક્રોમોઝોમલ પોલિમોર્ફિઝમ ઇન્ડેક્સ (CPI)", "જનીનિક ડ્રિફ્ટનો વેરિયન્સ (σ² = pq/2N)"], "ans": 1, "exp": "શેનન-વીવર ઇન્ડેક્સ (H = -Σ pi ln pi) એ જનીનિક વૈવિધ્યનું મૂલ્યાંકન કરવા માટે વાપરવામાં આવે છે, જેમાં એલિલની આવૃત્તિ (pi) અને હેટરોઝાયગસિટી ધ્યાનમાં લેવામાં આવે છે. હાર્ડી-વાઇનબર્ગ સૂત્ર જનીનિક સંતુલન દર્શાવે છે, ક્રોમોઝોમલ પોલિમોર્ફિઝમ ઇન્ડેક્સ ક્રોમોઝોમલ વૈવિધ્ય માપે છે, અને જનીનિક ડ્રિફ્ટનો વેરિયન્સ વસતિના કદ સાથે સંબંધિત છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ અને આનુવંશિક વૈવિધ્ય", "ch": ""}, {"q": "જ્યારે એક વસતિમાં જનીનિક વૈવિધ્ય અચાનક ઘટી જાય છે અને વસતિનો કદ ખૂબ જ ઓછો થઈ જાય છે, ત્યારે કયો ઘટનાક્રમ બને છે જેમાં વસતિ પુનઃસ્થાપિત થાય છે પરંતુ જનીનિક વૈવિધ્ય ઓછું રહે છે?", "opts": ["ફાઉન્ડર ઇફેક્ટ", "બોટલનેક ઇફેક્ટ", "જનીનિક ડ્રિફ્ટ", "નેચરલ સિલેક્શન"], "ans": 1, "exp": "બોટલનેક ઇફેક્ટમાં વસતિનો કદ અચાનક ઘટી જાય છે (ઉદા. પ્રાકૃતિક આફત પછી), અને જ્યારે વસતિ પુનઃસ્થાપિત થાય છે ત્યારે જનીનિક વૈવિધ્ય ઓછું રહે છે કારણ કે થોડા જ સજીવો બચી જાય છે. ફાઉન્ડર ઇફેક્ટ નવી વસતિની સ્થાપના સાથે સંબંધિત છે, જનીનિક ડ્રિફ્ટ એ અચાનક જનીનિક પરિવર્તન છે, અને નેચરલ સિલેક્શન એ વાતાવરણીય દબાણ હેઠળ અનુકૂળણ સાથે સંબંધિત છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ અને આનુવંશિક વૈવિધ્ય", "ch": ""}, {"q": "એક વસતિમાં જનીનિક વૈવિધ્ય જાળવવા માટે કયું પરિબળ મહત્વનું નથી, પરંતુ તે વસતિના કદને અસર કરે છે?", "opts": ["મ્યુટેશન", "જનીનિક ડ્રિફ્ટ", "પ્રજનનની પસંદગી", "વસતિનો કદ"], "ans": 3, "exp": "વસતિનો કદ એ જનીનિક વૈવિધ્ય જાળવવા માટેનું પરિબળ નથી, પરંતુ તે જનીનિક ડ્રિફ્ટને અસર કરે છે (ઓછો કદ = વધુ ડ્રિફ્ટ). મ્યુટેશન, જનીનિક ડ્રિફ્ટ, અને પ્રજનનની પસંદગી એ જનીનિક વૈવિધ્ય જાળવવા માટેના મહત્વના પરિબળો છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ અને આનુવંશિક વૈવિધ્ય", "ch": ""}, {"q": "જ્યારે એક વસતિમાં બે જુદા જુથો વચ્ચે પ્રજનન થતું નથી, ત્યારે કયો ઘટનાક્રમ થાય છે જેમાં વસતિ વૈવિધ્યમાં વિભાજન થાય છે?", "opts": ["જનીનિક ડ્રિફ્ટ", "સ્પેશિયેશન", "હાઇબ્રિડાઇઝેશન", "મ્યુટેશન"], "ans": 1, "exp": "સ્પેશિયેશન એ પ્રક્રિયા છે જ્યારે એક વસતિમાં બે જુદા જુથો વચ્ચે પ્રજનન થતું નથી અને તેઓ અલગ પ્રજાતિઓમાં વિકસે છે, જેમાં વસતિ વૈવિધ્યમાં વિભાજન થાય છે. જનીનિક ડ્રિફ્ટ એ અચાનક જનીનિક પરિવર્તન છે, હાઇબ્રિડાઇઝેશન એ સંકરણ છે, અને મ્યુટેશન એ જનીનમાં થતો પરિવર્તન છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ અને આનુવંશિક વૈવિધ્ય", "ch": ""}, {"q": "એક અલગ થયેલી ટાપુ પર રહેતી વસતિમાં, મૂળ વસતિ કરતાં કેટલાક જનીનિક લક્ષણોની આવર્તનમાં અચાનક વધારો જોવા મળે છે. આ ઘટનાને કયા પરિબળ દ્વારા સૌથી યોગ્ય રીતે સમજાવી શકાય?", "opts": ["પ્રાકૃતિક પસંદગી (Natural Selection)", "જનીનિક વહન (Gene Flow)", "ફાઉન્ડર ઇફેક્ટ (Founder Effect)", "મ્યુટેશન દરમાં વધારો (Increased Mutation Rate)"], "ans": 2, "exp": "સરળ ઉત્તર: C) ફાઉન્ડર ઇફેક્ટ છે. કારણ કે ફાઉન્ડર ઇફેક્ટ એટલે જ્યારે થોડી સંખ્યામાં સજીવો નવી વસતિ સ્થાપે છે, ત્યારે મૂળ વસતિ કરતાં કેટલાક જનીનિક લક્ષણોની આવર્તનમાં અચાનક ફેરફાર થાય છે. A) પ્રાકૃતિક પસંદગી વસતિના પર્યાવરણ અનુકૂલન સાથે સંબંધિત છે, પરંતુ અહીં અચાનક આવર્તનમાં ફેરફાર થયો છે, જે ફાઉન્ડર ઇફેક્ટનું લક્ષણ છે. B) જનીનિક વહન એ વસતિઓ વચ્ચે જનીનના આદાન-પ્રદાનને લગતું છે, પરંતુ અહીં વસતિ અલગ પડેલી છે, તેથી જનીનિક વહન શક્ય નથી. D) મ્યુટેશન દરમાં વધારો એ ધીમી પ્રક્રિયા છે અને અચાનક આવર્તનમાં ફેરફાર કરતું નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "જ્યારે એક વસતિમાં 'હાર્ડી-વાઇનબર્ગ સંતુલન' (Hardy-Weinberg equilibrium) ના નિયમો પાળવામાં આવે છે, ત્યારે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["વસતિમાં મ્યુટેશન દર શૂન્ય હોય છે", "વસતિમાં જનીનિક વહન (gene flow) થતું નથી", "વસતિનો કદ અમર્યાદિત હોય છે", "વસતિમાં પ્રાકૃતિક પસંદગી (natural selection) સક્રિય હોય છે"], "ans": 3, "exp": "હાર્ડી-વાઇનબર્ગ સંતુલનના નિયમો અનુસાર, વસતિમાં મ્યુટેશન દર શૂન્ય (A), જનીનિક વહન ન હોય (B), વસતિનો કદ અમર્યાદિત હોય (C), અને યાદચ્છિક સંવરણ (random mating) થતું હોય. પ્રાકૃતિક પસંદગી (D) સક્રિય હોવી એ સંતુલન માટે અવરોધરૂપ છે, કારણ કે તે એલિલની આવૃત્તિઓમાં ફેરફાર લાવે છે. તેથી D સત્ય નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક વસતિમાં 'જનીનિક વહન' (gene flow) ની અસરો વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["તે વસતિઓ વચ્ચે જનીનિક વૈવિધ્ય વધારે છે", "તે નવી એલિલની રજૂઆત કરે છે", "તે વસતિઓને એકબીજાથી અલગ પાડે છે", "તે પ્રજાતિની ઉત્ક્રાંતિને પ્રભાવિત કરે છે"], "ans": 2, "exp": "જનીનિક વહન (gene flow) એ વસતિઓ વચ્ચે જનીનિક સામગ્રીના આદાન-પ્રદાન દ્વારા વૈવિધ્ય વધારે છે (A), નવી એલિલ લાવે છે (B), અને ઉત્ક્રાંતિને પ્રભાવિત કરે છે (D). પરંતુ તે વસતિઓને અલગ પાડતું નથી (C), ઉલટાનું તે વસતિઓ વચ્ચે એકીકરણ તરફ દોરી જાય છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક વસતિમાં 'મ્યુટેશન' અને 'પ્રાકૃતિક પસંદગી' વચ્ચેનો સંબંધ નીચેનામાંથી કયો યોગ્ય રીતે વર્ણવે છે?", "opts": ["મ્યુટેશન પ્રાકૃતિક પસંદગી માટે કાચો માલ પૂ   document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
