<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>બાહ્ય સંરક્ષણ (Ex-situ Conservation)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>બાહ્ય સંરક્ષણ (Ex-situ Conservation)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">બાહ્ય સંરક્ષણ (Ex-situ Conservation)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "બાહ્ય સંરક્ષણ પદ્ધતિઓમાંથી કયી પદ્ધતિ વનસ્પતિ પ્રજાતિઓના જીવિત કોષોના સંગ્રહ માટે વપરાય છે, પરંતુ તે પદ્ધતિમાં કોષવિભાજન થતું નથી?", "opts": ["બીજ બેંક", "પેશી સંવર્ધન", "ક્રાયોપ્રિઝર્વેશન", "જીન બેંક"], "ans": 2, "exp": "ક્રાયોપ્રિઝર્વેશન પદ્ધતિમાં વનસ્પતિના કોષો અથવા પેશીઓને અતિ નીચા તાપમાને (-196°C) સંગ્રહવામાં આવે છે, જ્યાં કોષવિભાજન થતું નથી પરંતુ કોષો જીવિત રહે છે. બીજ બેંકમાં બીજનો સંગ્રહ કરવામાં આવે છે, પેશી સંવર્ધનમાં કોષવિભાજન થાય છે, અને જીન બેંકમાં જનીન સંરક્ષણ કરવામાં આવે છે.", "ref": "Std 12 - અધ્યાય 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "બાહ્ય સંરક્ષણમાં વપરાતી કયી પદ્ધતિમાં વનસ્પતિના અંગજન્ય પ્રચલન (vegetative propagation) દ્વારા નવી વનસ્પતિઓ ઉગાડવામાં આવે છે?", "opts": ["બોટેનિકલ ગાર્ડન", "ક્રાયોપ્રિઝર્વેશન", "બીજ બેંક", "જીન બેંક"], "ans": 0, "exp": "બોટેનિકલ ગાર્ડનમાં વનસ્પતિઓના જીવિત નમૂનાઓ રાખીને તેમના અંગજન્ય પ્રચલન દ્વારા નવી વનસ્પતિઓ ઉગાડવામાં આવે છે. ક્રાયોપ્રિઝર્વેશન, બીજ બેંક અને જીન બેંકમાં વનસ્પતિના કોષો, બીજ અથવા જનીનનો સંગ્રહ કરવામાં આવે છે, પરંતુ અંગજન્ય પ્રચલન થતું નથી.", "ref": "Std 12 - અધ્યાય 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "બાહ્ય સંરક્ષણની કયી પદ્ધતિમાં વનસ્પતિના જીનની સંગ્રહિત કોપી રાખવામાં આવે છે, પરંતુ તે પદ્ધતિમાં વનસ્પતિના જીવિત કોષો રાખવામાં આવતા નથી?", "opts": ["બીજ બેંક", "પેશી સંવર્ધન", "જીન બેંક", "બોટેનિકલ ગાર્ડન"], "ans": 2, "exp": "જીન બેંકમાં વનસ્પતિના જીનની સંગ્રહિત કોપી રાખવામાં આવે છે, પરંતુ તે પદ્ધતિમાં જીવિત કોષો રાખવામાં આવતા નથી. બીજ બેંકમાં બીજ, પેશી સંવર્ધનમાં કોષો, અને બોટેનિકલ ગાર્ડનમાં જીવિત વનસ્પતિઓ રાખવામાં આવે છે.", "ref": "Std 12 - અધ્યાય 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "બાહ્ય સંરક્ષણની કયી પદ્ધતિમાં વનસ્પતિના કોષો અથવા પેશીઓને કૃત્રિમ માધ્યમમાં ઉગાડવામાં આવે છે, જેથી તેના વંશવેલા વિકસિત થઈ શકે?", "opts": ["ક્રાયોપ્રિઝર્વેશન", "બીજ બેંક", "પેશી સંવર્ધન", "જીન બેંક"], "ans": 2, "exp": "પેશી સંવર્ધન પદ્ધતિમાં વનસ્પતિના કોષો અથવા પેશીઓને કૃત્રિમ માધ્યમમાં ઉગાડવામાં આવે છે, જેથી તેના વંશવેલા વિકસિત થઈ શકે. ક્રાયોપ્રિઝર્વેશનમાં કોષોને અતિ નીચા તાપમાને સંગ્રહવામાં આવે છે, બીજ બેંકમાં બીજનો સંગ્રહ કરવામાં આવે છે, અને જીન બેંકમાં જનીન સંગ્રહિત કરવામાં આવે છે.", "ref": "Std 12 - અધ્યાય 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "બાહ્ય સંરક્ષણની કયી પદ્ધતિ સૌથી લાંબા ગાળા સુધી વનસ્પતિના જીવિત કોષોના સંગ્રહ માટે ઉપયોગી છે?", "opts": ["બીજ બેંક", "પેશી સંવર્ધન", "ક્રાયોપ્રિઝર્વેશન", "બોટેનિકલ ગાર્ડન"], "ans": 2, "exp": "ક્રાયોપ્રિઝર્વેશન પદ્ધતિમાં વનસ્પતિના કોષો અથવા પેશીઓને અતિ નીચા તાપમાને (-196°C) સંગ્રહવામાં આવે છે, જેથી તે લાંબા ગાળા સુધી જીવિત રહી શકે. બીજ બેંક, પેશી સંવર્ધન અને બોટેનિકલ ગાર્ડન પદ્ધતિઓ લાંબા ગાળા સુધી સંગ્રહ માટે એટલી કુશળ નથી.", "ref": "Std 12 - અધ્યાય 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "બાહ્ય સંરક્ષણમાં, 'જીન બેંક' અને 'કોષ સંગ્રહાલય' વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["જીન બેંકમાં ફક્ત DNAના નમૂનાઓ સંગ્રહવામાં આવે છે, જ્યારે કોષ સંગ્રહાલયમાં જીવિત કોષો અથવા પેશીઓ સંગ્રહવામાં આવે છે.", "જીન બેંકમાં જીવિત કોષો સંગ્રહવામાં આવે છે, જ્યારે કોષ સંગ્રહાલયમાં ફક્ત બીજ સંગ્રહવામાં આવે છે.", "જીન બેંક અને કોષ સંગ્રહાલય બંનેમાં ફક્ત મૃત પેશીઓ જ સંગ્રહવામાં આવે છે.", "જીન બેંકમાં ફક્ત પ્રાણીઓના જીન સંગ્રહવામાં આવે છે, જ્યારે કોષ સંગ્રહાલયમાં ફક્ત વનસ્પતિઓના કોષ સંગ્રહવામાં આવે છે."], "ans": 0, "exp": "જીન બેંકમાં ફક્ત અનુવંશિક સામગ્રી (DNA)ના નમૂનાઓ સંગ્રહવામાં આવે છે, જ્યારે કોષ સંગ્રહાલયમાં જીવિત કોષો અથવા પેશીઓને કૃત્રિમ પરિસ્થિતિમાં જીવંત રાખવામાં આવે છે. વિકલ્પ B ખોટો છે કારણ કે કોષ સંગ્રહાલયમાં બીજ નહીં પરંતુ કોષો અથવા પેશીઓ સંગ્રહવામાં આવે છે. વિકલ્પ C ખોટો છે કારણ કે બંનેમાં મૃત પેશીઓ સંગ્રહવામાં આવતી નથી. વિકલ્પ D ખોટો છે કારણ કે જીન બેંક અને કોષ સંગ્રહાલય બંનેમાં વનસ્પતિઓ અને પ્રાણીઓ બંનેમાંથી સામગ્રી સંગ્રહી શકાય છે.", "ref": "Std 12 - Chapter 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "બાહ્ય સંરક્ષણની કયી પદ્ધતિમાં વનસ્પતિના બીજને લાંબા ગાળા સુધી સંગ્રહ કરવા માટે નીચા તાપમાન અને ઓછી આર્દ્રતા વાળી પરિસ્થિતિ પૂરી પાડવામાં આવે છે?", "opts": ["કોષ સંગ્રહાલય", "જીન બેંક", "બીજ બેંક", "બોટેનિકલ ગાર્ડન"], "ans": 2, "exp": "બીજ બેંકમાં બીજને લાંબા ગાળા સુધી સંગ્રહ કરવા માટે નીચા તાપમાન (આશરે -20°C) અને ઓછી આર્દ્રતા વાળી પરિસ્થિતિ પૂરી પાડવામાં આવે છે, જેથી બીજની જીવિતતા જાળવી રાખી શકાય. કોષ સંગ્રહાલય (A)માં જીવિત કોષો સંગ્રહવામાં આવે છે, જીન બેંક (B)માં DNA સંગ્રહવામાં આવે છે, અને બોટેનિકલ ગાર્ડન (D)માં જીવિત વનસ્પતિઓ ઉગાડવામાં આવે છે.", "ref": "Std 12 - Chapter 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "બાહ્ય સંરક્ષણમાં, 'ક્રાયોપ્રિઝર્વેશન' પદ્ધતિમાં કયા તાપમાને સંગ્રહ કરવામાં આવે છે?", "opts": ["-10°C", "0°C", "-196°C", "4°C"], "ans": 2, "exp": "ક્રાયોપ્રિઝર્વેશન પદ્ધતિમાં, કોષો અથવા પેશીઓને દ્રવ્ય નાઇટ્રોજન (-196°C)ના તાપમાને સંગ્રહ કરવામાં આવે છે, જેથી તેમની ચયાપચય ક્રિયાઓ થંભી જાય અને લાંબા ગાળા સુધી જીવિત રહી શકે. -10°C (A) અને 0°C (B) એટલું નીચું તાપમાન નથી કે ચયાપચય ક્રિયાઓ પૂર્ણપણે થંભી જાય, જ્યારે 4°C (D) તો ફ્રિજમાં સંગ્રહ કરવા માટેનું તાપમાન છે.", "ref": "Std 12 - Chapter 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "બાહ્ય સંરક્ષણની કયી પદ્ધતિમાં વનસ્પતિના અંગજન્ય પ્રચલન દ્વારા નવી વનસ્પતિઓ ઉત્પન્ન કરવામાં આવે છે, પરંતુ તે પદ્ધતિ મુખ્યત્વે લુપ્ત પ્રજાતિઓના સંરક્ષણ માટે વપરાતી નથી?", "opts": ["પેશી સંવર્ધન", "કોષ સંગ્રહાલય", "બોટેનિકલ ગાર્ડન", "જીન બેંક"], "ans": 2, "exp": "બોટેનિકલ ગાર્ડનમાં વનસ્પતિઓને ઉગાડીને તેમના અંગજન્ય પ્રચલન દ્વારા નવી વનસ્પતિઓ ઉત્પન્ન કરવામાં આવે છે, પરંતુ આ પદ્ધતિ મુખ્યત્વે લુપ્ત પ્રજાતિઓના સંરક્ષણ માટે વપરાતી નથી, કારણ કે તે મોટા પાયે અને લાંબા ગાળા સુધી સંગ્રહ માટે યોગ્ય નથી. પેશી સંવર્ધન (A) અને કોષ સંગ્રહાલય (B) લુપ્ત પ્રજાતિઓના સંરક્ષણ માટે વપરાતી પદ્ધતિઓ છે, જ્યારે જીન બેંક (D)માં ફક્ત અનુવંશિક સામગ્રી સંગ્રહવામાં આવે છે.", "ref": "Std 12 - Chapter 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "બાહ્ય સંરક્ષણમાં, 'ઇન વિટ્રો ફર્ટિલાઇઝેશન' પદ્ધતિનો ઉપયોગ મુખ્યત્વે કયા હેતુ માટે થાય છે?", "opts": ["વનસ્પતિઓના બીજને લાંબા ગાળા સુધી સંગ્રહ કરવા", "લુપ્ત પ્રજાતિઓના પ્રાણીઓના જીન સંગ્રહ કરવા", "લુપ્ત પ્રજાતિઓના પ્રાણીઓના ભ્રૂણ અથવા ગેમેટ્સને સંગ્રહ કરવા અને નવી પ્રજાતિઓ ઉત્પન્ન કરવા", "વનસ્પતિઓના કોષોને કૃત્રિમ માધ્યમમાં ઉગાડવા"], "ans": 2, "exp": "ઇન વિટ્રો ફર્ટિલાઇઝેશન પદ્ધતિનો ઉપયોગ મુખ્યત્વે લુપ્ત પ્રજાતિઓના પ્રાણીઓના ભ્રૂણ અથવા ગેમેટ્સને સંગ્રહ કરવા અને કૃત્રિમ રીતે ફલિત કરવા માટે થાય છે, જેથી નવી પ્રજાતિઓ ઉત્પન્ન કરી શકાય. વિકલ્પ A અને D વનસ્પતિઓ સાથે સંબંધિત છે, જ્યારે વિકલ્પ Bમાં ફક્ત જીન સંગ્રહ કરવા વાત કરવામાં આવી છે, જે આ પદ્ધતિનો મુખ્ય હેતુ નથી.", "ref": "Std 12 - Chapter 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "બાહ્ય સંરક્ષણ પદ્ધતિઓમાં, 'સીડ બેંક' અને 'પોલન બેંક' વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["સીડ બેંકમાં બીજ સંગ્રહવામાં આવે છે, જ્યારે પોલન બેંકમાં પરાગરજ સંગ્રહવામાં આવે છે", "સીડ બેંકમાં પરાગરજ સંગ્રહવામાં આવે છે, જ્યારે પોલન બેંકમાં બીજ સંગ્રહવામાં આવે છે", "સીડ બેંકમાં કોષો સંગ્રહવામાં આવે છે, જ્યારે પોલન બેંકમાં પેશીઓ સંગ્રહવામાં આવે છે", "સીડ બેંક અને પોલન બેંક બંનેમાં જીન સંગ્રહવામાં આવે છે"], "ans": 0, "exp": "સીડ બેંકમાં વનસ્પતિના બીજને લાંબા ગાળા સુધી સંગ્રહ કરવામાં આવે છે, જ્યારે પોલન બેંકમાં પરાગરજ (પોલન) સંગ્રહવામાં આવે છે. આમ, વિકલ્પ A સાચો છે. વિકલ્પ B ગલત છે કારણ કે તે સીડ બેંક અને પોલન બેંકની ભૂમિકાઓને ઉલટાવે છે. વિકલ્પ C અને D ગલત છે કારણ કે તેઓ સીડ બેંક અને પોલન બેંકની સચોટ વ્યાખ્યા આપતા નથી.", "ref": "Std 12 - Chapter 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "બાહ્ય સંરક્ષણમાં, 'ટીશ્યુ કલ્ચર' પદ્ધતિમાં કયા હોર્મોનનો ઉપયોગ વનસ્પતિના કોષોના વિકાસ માટે થાય છે?", "opts": ["ઓક્સિન અને સાયટોકાઈનિન", "જિબ્રેલિન અને એબ્સિસિક એસિડ", "ઇથિલીન અને સાયટોકાઈનિન", "ઓક્સિન અને ઇથિલીન"], "ans": 0, "exp": "ટીશ્યુ કલ્ચર પદ્ધતિમાં વનસ્પતિના કોષોના વિકાસ માટે ઓક્સિન અને સાયટોકાઈનિન હોર્મોનનો ઉપયોગ થાય છે. ઓક્સિન કોષવિભાજનને પ્રોત્સાહન આપે છે, જ્યારે સાયટોકાઈનિન કોષવિભાજન અને વિકાસને નિયંત્રિત કરે છે. વિકલ્પ B, C, અને D ગલત છે કારણ કે તેમાં અયોગ્ય હોર્મોનના સંયોજનો આપવામાં આવ્યા છે.", "ref": "Std 12 - Chapter 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "બાહ્ય સંરક્ષણની કયી પદ્ધતિમાં વનસ્પતિના જીનને કૃત્રિમ રીતે સંગ્રહિત કરવામાં આવે છે અને તેને પુનઃસ્થાપિત કરવા માટે જૈવ પ્રૌદ્યોગિકીનો ઉપયોગ થાય છે?", "opts": ["જીન બેંક", "કોષ સંગ્રહાલય", "સીડ બેંક", "પોલન બેંક"], "ans": 0, "exp": "જીન બેંકમાં વનસ્પતિના જીનને કૃત્રિમ   document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
