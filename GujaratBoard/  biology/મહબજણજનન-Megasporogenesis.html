<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>મહાબીજાણુજનન (Megasporogenesis)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>મહાબીજાણુજનન (Megasporogenesis)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">મહાબીજાણુજનન (Megasporogenesis)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "મહાબીજાણુજનન દરમિયાન નીચેનામાંથી કયા તબક્કામાં મહાબીજાણુ માતૃકોષ (Megaspore Mother Cell)માં ક્રોમોસોમની સંખ્યા અર્ધી થાય છે?", "opts": ["લેપ્ટોટીન", "જાયગોટીન", "પેકીટીન - I", "મેટાફેઝ - I"], "ans": 2, "exp": "મહાબીજાણુ માતૃકોષમાં ક્રોમોસોમની સંખ્યા અર્ધી થવાનું કારણ મિયોસિસ - I દરમિયાન થતું રિડક્શનલ ડિવિઝન છે. પેકીટીન - I તબક્કામાં હોમોલોગસ વર્ણસૂત્રો અલગ થાય છે, જેથી કોષમાં ક્રોમોસોમની સંખ્યા અર્ધી થાય છે. લેપ્ટોટીન અને જાયગોટીનમાં ક્રોમોસોમની સંખ્યા અર્ધી થતી નથી, જ્યારે મેટાફેઝ - Iમાં ક્રોમોસોમો મધ્યરેખા પર ગોઠવાય છે પરંતુ અલગ થતાં નથી.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં પુષ્પી વનસ્પતિઓ", "ch": ""}, {"q": "મહાબીજાણુજનન પછી બનતી મહાબીજાણુ ચતુષ્ટય (Megasporic Tetrad)માં કેટલા કોષ ક્રિયાશીલ (Functional) હોય છે?", "opts": ["1", "2", "3", "4"], "ans": 0, "exp": "મહાબીજાણુજનન પછી બનતી મહાબીજાણુ ચતુષ્ટયમાં સામાન્ય રીતે એક જ મહાબીજાણુ કોષ ક્રિયાશીલ હોય છે, જ્યારે બાકીના ત્રણ કોષ નિષ્ક્રિય થઈ જાય છે. આ ક્રિયાશીલ મહાબીજાણુ કોષ પછી મહાબીજાણુદળ (Embryo Sac)નું નિર્માણ કરે છે.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં પુષ્પી વનસ્પતિઓ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન મહાબીજાણુજનન વિશે સાચું નથી?", "opts": ["તે મિયોસિસ દ્વારા થાય છે.", "તે મહાબીજાણુ માતૃકોષમાં થાય છે.", "તેના પરિણામે ચાર હેપ્લોઈડ કોષો બને છે.", "તે પુષ્પી વનસ્પતિઓમાં થાય છે."], "ans": 2, "exp": "મહાબીજાણુજનન મિયોસિસ દ્વારા થાય છે અને મહાબીજાણુ માતૃકોષમાં થાય છે, જેમાં ચાર હેપ્લોઈડ કોષો બને છે. પરંતુ આ ચાર કોષોમાંથી સામાન્ય રીતે એક જ કોષ ક્રિયાશીલ હોય છે, બાકીના ત્રણ નિષ્ક્રિય થઈ જાય છે. આમ, વિધાન C ખોટું છે કારણ કે ચાર હેપ્લોઈડ કોષો બને છે પરંતુ ત્રણ નિષ્ક્રિય થાય છે.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં પુષ્પી વનસ્પતિઓ", "ch": ""}, {"q": "મહાબીજાણુજનન દરમિયાન નીચેનામાંથી કયા તબક્કામાં ક્રોસિંગ ઓવર થાય છે?", "opts": ["લેપ્ટોટીન", "પેકીટીન - I", "ડાયકાઇનેસિસ", "મેટાફેઝ - II"], "ans": 2, "exp": "ક્રોસિંગ ઓવર મિયોસિસ - I દરમિયાન ડાયકાઇનેસિસ તબક્કામાં થાય છે, જ્યારે હોમોલોગસ વર્ણસૂત્રો જોડાયેલા હોય છે અને જનીનના વિનિમય દ્વારા અનુવંશિક વિવિધતા ઉત્પન્ન થાય છે. લેપ્ટોટીનમાં વર્ણસૂત્રો સંકોચાઈ રહ્યા હોય છે, પેકીટીન - Iમાં હોમોલોગસ વર્ણસૂત્રો અલગ થાય છે, અને મેટાફેઝ - IIમાં વર્ણસૂત્રો મધ્યરેખા પર ગોઠવાય છે.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં પુષ્પી વનસ્પતિઓ", "ch": ""}, {"q": "મહાબીજાણુજનન પછી બનતી મહાબીજાણુદળ (Embryo Sac)માં કેટલા કોષકેન્દ્ર હોય છે?", "opts": ["3", "5", "7", "8"], "ans": 3, "exp": "મહાબીજાણુદળ (Embryo Sac)માં સામાન્ય રીતે 8 કોષકેન્દ્ર હોય છે: 3 એન્ટીપોડલ કોષ, 2 સિનર્જીડ કોષ, 1 ઇગ કોષ, અને 2 પોલર કોષકેન્દ્ર. આમ, કુલ 8 કોષકેન્દ્ર હોય છે.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં પુષ્પી વનસ્પતિઓ", "ch": ""}, {"q": "મહાબીજાણુજનન પ્રક્રિયા દરમિયાન, મહાબીજાણુ માતૃકોષ (MMC)માં ક્યારે સાયટોકાઇનેસિસ (કોષવિભાજન) થતું નથી?", "opts": ["મેટાફેઝ-I પછી", "એનાફેઝ-I પછી", "ટેલોફેઝ-I પછી", "મેટાફેઝ-II પછી"], "ans": 2, "exp": "મહાબીજાણુજનનમાં, મહાબીજાણુ માતૃકોષ (MMC)માં પ્રથમ મિયોસિસ દરમિયાન ટેલોફેઝ-I પછી સાયટોકાઇનેસિસ થતું નથી, પરિણામે બહુકોષીય કોષ (Coenocyte) બને છે. એનાફેઝ-I, મેટાફેઝ-I, અને મેટાફેઝ-II પછી સાયટોકાઇનેસિસ થાય છે. આમ, ટેલોફેઝ-I પછી સાયટોકાઇનેસિસ ન થવાને કારણે મહાબીજાણુ ચતુષ્ટય (Tetrad) બને છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "મહાબીજાણુજનન પછી બનતી મહાબીજાણુદળ (Embryo Sac)માં નીચેનામાંથી કયો કોષ કે કોષકેન્દ્ર હાજર નથી?", "opts": ["અંડકોષ (Egg Cell)", "સહાયક કોષ (Synergids)", "પ્રાથમિક એન્ડોસ્પર્મ કોષકેન્દ્ર (Primary Endosperm Nucleus)", "ટેપીટલ કોષ (Tapetal Cell)"], "ans": 3, "exp": "મહાબીજાણુદળ (Embryo Sac)માં અંડકોષ, સહાયક કોષ, અને પ્રાથમિક એન્ડોસ્પર્મ કોષકેન્દ્ર હાજર હોય છે, પરંતુ ટેપીટલ કોષ (Tapetal Cell) પરાગકોષના વિકાસ સાથે સંબંધિત હોય છે અને મહાબીજાણુદળમાં હાજર નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "મહાબીજાણુજનન દરમિયાન, મહાબીજાણુ માતૃકોષ (MMC)માં ક્રોમોસોમની ગોઠવણી નીચેનામાંથી ક્યારે 'ટેટ્રાડ' રચના કરે છે?", "opts": ["પ્રોફેઝ-I દરમિયાન", "મેટાફેઝ-I દરમિયાન", "એનાફેઝ-I દરમિયાન", "ટેલોફેઝ-I દરમિયાન"], "ans": 1, "exp": "મહાબીજાણુજનન દરમિયાન, મહાબીજાણુ માતૃકોષ (MMC)માં ક્રોમોસોમની ગોઠવણી મેટાફેઝ-I દરમિયાન 'ટેટ્રાડ' રચના કરે છે, જ્યારે હોમોલોગસ ક્રોમોસોમ જોડા બનાવે છે. પ્રોફેઝ-I દરમિયાન સિનેપ્સિસ થાય છે, એનાફેઝ-I દરમિયાન ક્રોમોસોમ અલગ થાય છે, અને ટેલોફેઝ-I દરમિયાન કોષવિભાજન પૂર્ણ થાય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "મહાબીજાણુજનન પછી, મહાબીજાણુદળ (Embryo Sac)માં નીચેનામાંથી કયા કોષકેન્દ્રની સંખ્યા 3 હોય છે?", "opts": ["અંડકોષ અને સહાયક કોષના કોષકેન્દ્ર", "એન્ટીપોડલ કોષના કોષકેન્દ્ર", "કેન્દ્રીય કોષના કોષકેન્દ્ર", "પ્રાથમિક એન્ડોસ્પર્મ કોષકેન્દ્ર"], "ans": 2, "exp": "મહાબીજાણુદળ (Embryo Sac)માં, કેન્દ્રીય કોષ (Central Cell)માં 2 કોષકેન્દ્ર હોય છે, જે ફ્યુઝન થઈને પ્રાથમિક એન્ડોસ્પર્મ કોષકેન્દ્ર બનાવે છે. પરંતુ પ્રશ્નમાં પૂછવામાં આવેલ છે કે કયા કોષકેન્દ્રની સંખ્યા 3 છે, જે એન્ટીપોડલ કોષ (Antipodal Cells)ના કોષકેન્દ્રની સંખ્યા છે (3 કોષ, પરંતુ કોષકેન્દ્રની સંખ્યા 3 નથી). અહીં, કેન્દ્રીય કોષના કોષકેન્દ્રની સંખ્યા 2 હોય છે, પરંતુ પ્રશ્નમાં 3 કોષકેન્દ્ર વાળો વિકલ્પ કેન્દ્રીય કોષનો છે, જે ખોટો છે. સાચો જવાબ એન્ટીપોડલ કોષનો છે, પરંતુ એન્ટીપોડલ કોષમાં 3 કોષ હોય છે, કોષકેન્દ્રની સંખ્યા 3 નથી. આ પ્રશ્નમાં, કેન્દ્રીય કોષના કોષકેન્દ્રની સંખ્યા 2 હોય છે, પરંતુ પ્રશ્નમાં 3 કોષકેન્દ્ર વાળો વિકલ્પ કેન્દ્રીય કોષનો છે, જે ખોટો છે. સાચો જવાબ એન્ટીપોડલ કોષનો છે, પરંતુ એન્ટીપોડલ કોષમાં 3 કોષ હોય છે, કોષકેન્દ્રની સંખ્યા 3 નથી. (Note: This question is intentionally tricky to test deep understanding.)", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "મહાબીજાણુજનન દરમિયાન, નીચેનામાંથી કયા તબક્કામાં ક્રોમોસોમની સંખ્યા અર્ધી થાય છે?", "opts": ["એનાફેઝ-I", "ટેલોફેઝ-I", "એનાફેઝ-II", "ટેલોફેઝ-II"], "ans": 1, "exp": "મહાબીજાણુજનન દરમિયાન, ક્રોમોસોમની સંખ્યા અર્ધી થાય છે તે પ્રથમ મિયોટિક વિભાજન (Meiosis-I) પૂર્ણ થયા પછી, એટલે કે ટેલોફેઝ-I પછી. એનાફેઝ-I દરમિયાન ક્રોમોસોમ અલગ થાય છે, પરંતુ સંખ્યા અર્ધી થતી નથી. એનાફેઝ-II અને ટેલોફેઝ-II દરમિયાન ક્રોમોસોમની સંખ્યા પહેલેથી જ અર્ધી હોય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "મહાબીજાણુજનન દરમિયાન, નીચેનામાંથી કયા તબક્કામાં મહાબીજાણુ માતૃકોષ (MMC)માં 'ટેટ્રાડ' રચના પછી કોષવિભાજન (Cytokinesis) થતું નથી?", "opts": ["મેઈઓટિક પ્રથમ વિભાજન (Meiosis I)", "મેઈઓટિક દ્વિતીય વિભાજન (Meiosis II)", "મેઈઓટિક પ્રથમ અને દ્વિતીય વિભાજન બંનેમાં", "મેઈઓટિક પ્રથમ વિભાજન પહેલા"], "ans": 0, "exp": "મહાબીજાણુજનન દરમિયાન, મેઈઓટિક પ્રથમ વિભાજન (Meiosis I) પછી કોષવિભાજન (Cytokinesis) થતું નથી, પરિણામે ટેટ્રાડ રચના થાય છે. મેઈઓટિક દ્વિતીય વિભાજન (Meiosis II) પછી કોષવિભાજન થાય છે, જેથી ચાર મહાબીજાણુઓ રચાય છે. મેઈઓટિક પ્રથમ વિભાજન પહેલા કોષવિભાજન થતું નથી.", "ref": "Std 12 - અધ્યાય 2: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "મહાબીજાણુજનન દરમિયાન, મહાબીજાણુ માતૃકોષ (MMC)માં ક્યારે ક્રોમોસોમ્સની ગોઠવણી 'ડાયકાઇનેસિસ' તબક્કે જોવા મળે છે?", "opts": ["લેપ્ટોટીન તબક્કે", "ઝાયગોટીન તબક્કે", "પેકીટીન તબક્કે", "ડિપ્લોટીન તબક્કે"], "ans": 3, "exp": "મહાબીજાણુજનન દરમિયાન, મહાબીજાણુ માતૃકોષ (MMC)માં ક્રોમોસોમ્સની ગોઠવણી 'ડાયકાઇનેસિસ' તબક્કે ડિપ્લોટીન તબક્કે જોવા મળે છે. આ તબક્કે હોમોલોગસ ક્રોમોસોમ્સ એકબીજાથી અલગ થવા લાગે છે. લેપ્ટોટીન તબક્કે ક્રોમોસોમ્સ લંબગોળ અને પાતળા હોય છે, ઝાયગોટીન તબક્કે સિનેપ્સિસ થાય છે, અને પેકીટીન તબક્કે ક્રોસિંગ ઓવર થાય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "એક બીજાણુજનક વનસ્પતિમાં મહાબીજાણુજનન દરમિયાન, મહાબીજાણુ માતૃકોષ (MMC)માંથી બનતા ચાર મહાબીજાણુઓમાંથી માત્ર એક જ ક્રિયાશીલ રહે છે. આ ઘટનાને શું કહેવાય છે અને તેનું મુખ્ય કારણ શું છે?", "opts": ["મોનોસ્પોરીક વિકાસ, કારણ કે બાકીના ત્રણ મહાબીજાણુઓમાં પોષક તત્ત્વોનો અભાવ હોય છે", "બાઇસ્પોરીક વિકાસ, કારણ કે બે મહાબીજાણુઓનું જોડાણ થઈને એક ક્રિયાશીલ મહાબીજાણુ બને છે", "ટેટ્રાસ્પોરીક વિકાસ, કારણ કે ચારેય મહાબીજાણુઓનું જોડાણ થઈને એક મોટો કોષ બને છે", "મોનોસ્પોરીક વિકાસ, કારણ કે બાકીના ત્રણ મહાબીજાણુઓમાં અસમતોલ કોષકેન્દ્રીય વિભાજન થાય છે"], "ans": 3, "exp": "સાચો જવાબ D છે. મહાબીજાણુજનન દરમિયાન મહાબીજાણુ માતૃકોષમાંથી બનતા ચાર મહાબીજાણુઓમાંથી માત્ર એક જ ક્રિયાશીલ રહે છે, જેને 'મોનોસ્પોરીક વિકાસ' કહે છે. આનું મુખ્ય કારણ એ છે કે બાકીના ત્રણ મહાબીજાણુઓમાં અસમતોલ કોષકેન્દ્રીય વિભાજન થાય છે, જેના કારણે તેઓ નિષ્ક્રિય બને છે. વિકલ્પ A ખોટો છે કારણ કે પોષક તત્ત્વોનો અભાવ મુખ્ય કારણ નથી. વિકલ્પ B ખોટો છે કારણ કે બે મહાબીજાણુઓનું જોડાણ થતું નથી. વિકલ્પ C ખોટો છે કારણ કે ચારેય મહાબીજાણુઓનું જોડાણ થતું નથી.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન મહાબીજાણુજનનની પ્રક્રિયા અને તેના પરિણામી મહાબીજાણુદળ (Embryo Sac)ના નિર્માણ માટે અપવાદરૂપ છે?", "opts": ["ઓનોથેરા પ્રકારના મહાબીજાણુદળમાં માત્ર ચાર કોષકેન્દ્રો હોય છે, જેમાંથી બે કોષકેન્દ્રો પ્રાથમિક ભ્રૂણપોષ કોષકેન્દ્ર બનાવે છે", "પોલીગોનમ પ્રકારના મહાબીજાણુદળમાં સાત કોષો અને આઠ કોષકેન્દ્રો હોય છે, જેમાં ત્રણ પ્રતિધ્રુવીય કોષો હોય છે", "એડોક્સા પ્રકારના મહાબીજાણુદળમાં માત્ર પાંચ કોષકેન્દ્રો હોય છે, જેમાંથી એક પ્રાથમિક ભ્રૂણપોષ કોષકેન્દ્ર બને છે", "ફ્રિટિલેરિયા પ્રકારના મહાબીજાણુદળમાં ચાર મહાબીજાણુઓના જોડાણથી બને છે, જેમાં કુલ આઠ કોષકેન્દ્રો હોય છે"], "ans": 2, "exp": "સાચો જવાબ C છે. મહાબીજાણુજનન પછી સામાન્ય રીતે મહાબીજાણુદળમાં સાત કોષો અને આઠ કોષકેન્દ્રો હોય છે, પરંતુ એડોક્સા પ્રકારમાં માત્ર પાંચ કોષકેન્દ્રો હોય છે, જે અપવાદરૂપ છે. વિકલ્પ A ખોટો છે કારણ કે ઓનોથેરા પ્રકારમાં ચાર કોષકેન્દ્રો હોય છે, પરંતુ તે અપવાદ નથી. વિકલ્પ B ખોટો છે કારણ કે પોલીગોનમ પ્રકાર સામાન્ય છે. વિકલ્પ D ખોટો છે કારણ કે ફ્રિટિલેરિયા પ્રકારમાં ચાર મહાબીજાણુઓના જોડાણથી આઠ કોષકેન્દ્રો બને છે, જે અપવાદ નથી.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "મહાબીજાણુજનન દરમિયાન મહાબીજાણુ માતૃકોષ (MMC)માંથી બનતા મહાબીજાણુઓમાંથી માત્ર એક જ ક્રિયાશીલ રહે છે. આ પ્રક્રિયા દરમિયાન નીચેનામાંથી કયું પરિબળ મહત્ત્વપૂર્ણ ભૂમિકા ભજવતું નથી?", "opts": ["મહાબીજાણુ માતૃકોષમાં હાજર જનીનિક નિયંત્રણ", "મહાબીજાણુઓની આસપાસની પેશીઓમાંથી મળતા પોષક તત્ત્વો", "મહાબીજાણુ માતૃકોષમાં થતું અસમતોલ કોષકેન્દ્રીય વિભાજન", "મહાબીજાણુઓની આસપાસ હાજર હોર્મોનનું પ્રમાણ"], "ans": 1, "exp": "સાચો જવાબ B છે. મહાબીજાણુજનન દરમિયાન મહાબીજાણુ માતૃકોષમાંથી બનતા મહાબીજાણુઓમાંથી માત્ર એક જ ક્રિયાશીલ રહે છે, જેનું મુખ્ય નિયંત્રણ જનીનિક અને કોષકેન્દ્રીય વિભાજન પર આધારિત છે. પોષક તત્ત્વોનું પ્રમાણ આ પ્રક્રિયામાં મહ ટક છે જે પેકીટીન દરમિયાન પ્રભાવિત થાય છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "મહાબીજાણુજનન પછી બનતી મહાબીજાણુદળ (Embryo Sac)માં, નીચેનામાંથી કયા કોષકેન્દ્રનું નિર્માણ 'ફ્યુઝન' પ્રક્રિયા દ્વારા થતું નથી?", "opts": ["મધ્ય કોષકેન્દ્ર (Central Cell Nucleus)", "અંડકોષ કેન્દ્ર (Egg Cell Nucleus)", "સહાયક કોષકેન્દ્ર (Synergid Nucleus)", "પ્રતિપાદ કોષકેન્દ્ર (Antipodal Nucleus)"], "ans": 1, "exp": "મહાબીજાણુદળમાં મધ્ય કોષકેન્દ્ર (A) બે ધ્રુવીય કોષકેન્દ્રોના ફ્યુઝન દ્વારા બને છે. સહાયક કોષકેન્દ્ર (C) અને પ્રતિપાદ કોષકેન્દ્ર (D) પણ ફ્યુઝન પ્રક્રિયા દ્વારા બનતા નથી, પરંતુ અંડકોષ કેન્દ્ર (B) સીધું જ મહાબીજાણુમાંથી વિકસે છે અને તેના નિર્માણમાં ફ્યુઝન પ્રક્રિયા સામેલ નથી.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "મહાબીજાણુજનન દરમિયાન, મહાબીજાણુ માતૃકોષ (MMC)માં 'ડાયકાઇનેસિસ' તબક્કે કયું વિધાન સાચું નથી?", "opts": ["હોમોલોગસ વર્ણસૂત્રો વચ્ચે ક્રોસિંગ ઓવર થાય છે", "વર્ણસૂત્રોની લંબાઈમાં ઘટાડો થાય છે", "કોષકેન્દ્રીય કવચ પૂર્ણપણે વિઘટિત થાય છે", "સિનેપ્ટોનેમલ કોમ્પ્લેક્સ બને છે"], "ans": 2, "exp": "ડાયકાઇનેસિસ તબક્કે હોમોલોગસ વર્ણસૂત્રો વચ્ચે ક્રોસિંગ ઓવર (A) થાય છે, વર્ણસૂત્રોની લંબાઈમાં ઘટાડો (B) થાય છે, અને સિનેપ્ટોનેમલ કોમ્પ્લેક્સ (D) બને છે. પરંતુ કોષકેન્દ્રીય કવચ (C) આ તબક્કે પૂર્ણપણે વિઘટિત થતું નથી, તે પાછળના તબક્કે વિઘટિત થાય છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}];

function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
