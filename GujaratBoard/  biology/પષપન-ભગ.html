<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પુષ્પના ભાગો</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>પુષ્પના ભાગો</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">પુષ્પના ભાગો</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "પુષ્પમાં પુષ્પાસન (receptacle) ની ભૂમિકા વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["તે પુષ્પના સૌથી બાહ્ય સ્તર તરીકે કેલિક્સ (calyx) નું રક્ષણ કરે છે.", "તે પુષ્પના સભાવી અંગો (essential organs) ને ધરાવે છે અને પુષ્પના અન્ય ભાગોને જોડે છે.", "તે ફળના વિકાસમાં કોઈ ભૂમિકા ભજવતું નથી.", "તે ફક્ત પુષ્પના રંગમાં ફાળો આપે છે."], "ans": 1, "exp": "પુષ્પાસન (receptacle) એ પુષ્પનો આધાર ભાગ છે જે પુષ્પના સભાવી અંગો (stamens, pistil) અને અસભાવી અંગો (petals, sepals) ને ધરાવે છે. તે પુષ્પના અન્ય ભાગોને જોડે છે અને ફળના વિકાસમાં પણ મહત્વની ભૂમિકા ભજવે છે. વિકલ્પ A ખોટો છે કારણ કે કેલિક્સનું રક્ષણ પુષ્પાસન નહીં પરંતુ સેપલ્સ (sepals) દ્વારા થાય છે. વિકલ્પ C ખોટો છે કારણ કે પુષ્પાસન ફળના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે. વિકલ્પ D ખોટો છે કારણ કે પુષ્પાસન રંગમાં ફાળો આપતું નથી.", "ref": "Std 11 - પ્રકરણ 3: પુષ્પી વનસ્પતિની રચના", "ch": ""}, {"q": "નીચેનામાંથી કયું પુષ્પનું ભાગ એવું છે જે સીધું જ ફળમાં પરિવર્તિત થાય છે?", "opts": ["પુંકેસર (stamen)", "અંડક (ovary)", "પુષ્પદળ (petal)", "બીજાંડ (ovule)"], "ans": 1, "exp": "અંડક (ovary) એ પુષ્પનો એવો ભાગ છે જે સીધું જ ફળમાં પરિવર્તિત થાય છે. પુંકેસર (stamen) પુરુષ પ્રજનન અંગ છે અને ફળના વિકાસમાં સીધી ભૂમિકા ભજવતું નથી. પુષ્પદળ (petal) પુષ્પના રંગ અને આકર્ષણમાં મહત્વની ભૂમિકા ભજવે છે પરંતુ ફળમાં પરિવર્તિત થતું નથી. બીજાંડ (ovule) બીજમાં પરિવર્તિત થાય છે, ફળમાં નહીં.", "ref": "Std 11 - પ્રકરણ 3: પુષ્પી વનસ્પતિની રચના", "ch": ""}, {"q": "પુષ્પમાં 'ડબલ ફર્ટિલાઇઝેશન' (દ્વિ-ફલન) ની પ્રક્રિયામાં કયા ભાગો સામેલ હોય છે?", "opts": ["એક પુરુષ ગેમીટ અને એક સ્ત્રી ગેમીટ", "બે પુરુષ ગેમીટ અને એક સ્ત્રી ગેમીટ", "એક પુરુષ ગેમીટ અને બે સ્ત્રી ગેમીટ", "બે પુરુષ ગેમીટ અને બે સ્ત્રી ગેમીટ"], "ans": 1, "exp": "ડબલ ફર્ટિલાઇઝેશન (દ્વિ-ફલન) એ અંગીયોસ્પર્મ્સ (આવૃતબીજી) વનસ્પતિઓની વિશિષ્ટ લાક્ષણિકતા છે. આ પ્રક્રિયામાં, એક પુરુષ ગેમીટ (sperm cell) બીજાંડ (ovule) ના અંડકોષ (egg cell) સાથે જોડાઈને ભ્રૂણ (embryo) બનાવે છે, જ્યારે બીજો પુરુષ ગેમીટ સેકન્ડરી ન્યુક્લિયસ (secondary nucleus) સાથે જોડાઈને એન્ડોસ્પર્મ (endosperm) બનાવે છે. આમ, બે પુરુષ ગેમીટ અને એક સ્ત્રી ગેમીટ (અંડકોષ) સામેલ હોય છે. અન્ય વિકલ્પો આ પ્રક્રિયાને યોગ્ય રીતે વર્ણવતા નથી.", "ref": "Std 11 - પ્રકરણ 3: પુષ્પી વનસ્પતિની રચના", "ch": ""}, {"q": "નીચેનામાંથી કયું પુષ્પનું ભાગ એવું છે જે પુષ્પના રંગ અને સુગંધ માટે જવાબદાર છે?", "opts": ["કેલિક્સ (calyx)", "કોરોલા (corolla)", "એન્ડ્રોઇસિયમ (androecium)", "ગાયનોસિયમ (gynoecium)"], "ans": 1, "exp": "કોરોલા (corolla) એ પુષ્પના પુષ્પદળો (petals) નું સમૂહ છે જે પુષ્પના રંગ અને સુગંધ માટે જવાબદાર છે. કેલિક્સ (calyx) એ સેપલ્સ (sepals) નું સમૂહ છે જે પુષ્પનું રક્ષણ કરે છે. એન્ડ્રોઇસિયમ (androecium) એ પુંકેસરો (stamens) નું સમૂહ છે જે પુરુષ પ્રજનન અંગો છે. ગાયનોસિયમ (gynoecium) એ સ્ત્રી પ્રજનન અંગો છે.", "ref": "Std 11 - પ્રકરણ 3: પુષ્પી વનસ્પતિની રચના", "ch": ""}, {"q": "પુષ્પમાં 'થેલામસ' (thalamus) ની ભૂમિકા વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["તે પુષ્પના અંગોને ધરાવે છે.", "તે પુષ્પના આધાર ભાગ તરીકે કામ કરે છે.", "તે ફળના વિકાસમાં સીધી ભૂમિકા ભજવે છે.", "તે પુષ્પના રંગ માટે જવાબદાર છે."], "ans": 3, "exp": "થેલામસ (thalamus) એ પુષ્પાસન (receptacle) નું જ અલગ નામ છે, જે પુષ્પના અંગોને ધરાવે છે અને પુષ્પના આધાર ભાગ તરીકે કામ કરે છે. તે ફળના વિકાસમાં પણ મહત્વની ભૂમિકા ભજવે છે. પરંતુ તે પુષ્પના રંગ માટે જવાબદાર નથી, રંગ માટે કોરોલા (corolla) જવાબદાર છે. આથી વિકલ્પ D ખોટો છે.", "ref": "Std 11 - પ્રકરણ 3: પુષ્પી વનસ્પતિની રચના", "ch": ""}, {"q": "પુષ્પમાં 'એન્ડ્રોઇસિયમ' (પુંકેસર સમૂહ) ની રચના વિશે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["તે પુષ્પના ત્રીજા વર્તુળમાં આવેલો હોય છે અને સ્ટેમેનના બનેલો હોય છે.", "દરેક સ્ટેમેનમાં એન્થર અને ફિલામેન્ટ એમ બે ભાગ હોય છે.", "એન્થરમાં પોલન કોષો ઉત્પન્ન થાય છે, જે હેપ્લોઇડ હોય છે.", "ફિલામેન્ટ એ એન્ડ્રોઇસિયમનો સૌથી લાંબો ભાગ હોય છે અને તે પોલન કોષોનું વહન કરે છે."], "ans": 3, "exp": "વિકલ્પ D ખોટો છે કારણ કે ફિલામેન્ટ એ એન્ડ્રોઇસિયમનો ભાગ છે જે એન્થરને ટેકો આપે છે, પરંતુ તે પોલન કોષોનું વહન કરતો નથી. પોલન કોષો એન્થરમાં ઉત્પન્ન થાય છે અને પવન અથવા જંતુઓ દ્વારા વહન પામે છે. વિકલ્પ A, B, અને C સત્ય છે: એન્ડ્રોઇસિયમ ત્રીજા વર્તુળમાં હોય છે, સ્ટેમેન એન્થર અને ફિલામેન્ટના બનેલો હોય છે, અને એન્થરમાં હેપ્લોઇડ પોલન કોષો ઉત્પન્ન થાય છે.", "ref": "Std 11 - પ્રકરણ 3: પુષ્પી વનસ્પતિઓમાં પ્રજનન", "ch": ""}, {"q": "પુષ્પમાં 'ગાયનોઇસિયમ' (સ્ત્રીકેસર સમૂહ) ની રચનામાં નીચેનામાંથી કયો ભાગ સીધો જ ફળમાં પરિવર્તિત થતો નથી?", "opts": ["અંડાશય (Ovary)", "અંડક (Ovule)", "કલંક (Stigma)", "અંડવાહિની (Style)"], "ans": 2, "exp": "કલંક (Stigma) એ ગાયનોઇસિયમનો ભાગ છે જે પોલન કણો ગ્રહણ કરે છે, પરંતુ તે સીધો જ ફળમાં પરિવર્તિત થતો નથી. અંડાશય (Ovary) ફળમાં પરિવર્તિત થાય છે, અંડક (Ovule) બીજમાં પરિવર્તિત થાય છે, અને અંડવાહિની (Style) ફળના ભાગ તરીકે રહે છે. તેથી, વિકલ્પ C ખોટો છે.", "ref": "Std 11 - પ્રકરણ 3: પુષ્પી વનસ્પતિઓમાં પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું પુષ્પનું ભાગ એવું છે જે પુષ્પના પરાગસંયોગ પ્રક્રિયામાં સીધી રીતે સામેલ નથી?", "opts": ["પુંકેસર (Stamen)", "સ્ત્રીકેસર (Pistil)", "પુષ્પદળ (Petal)", "પરાગકણ (Pollen grain)"], "ans": 2, "exp": "પુષ્પદળ (Petal) એ પુષ્પનો ભાગ છે જે પરાગસંયોગ પ્રક્રિયામાં સીધી રીતે સામેલ નથી. તેનો મુખ્ય ઉદ્દેશ પુષ્પને આકર્ષક બનાવવો અને પરાગકણોને આકર્ષવા માટે જંતુઓને આકર્ષવાનો હોય છે. પુંકેસર (Stamen) પરાગકણો ઉત્પન્ન કરે છે, સ્ત્રીકેસર (Pistil) પરાગકણો ગ્રહણ કરે છે, અને પરાગકણ (Pollen grain) સીધો જ પરાગસંયોગમાં સામેલ હોય છે.", "ref": "Std 11 - પ્રકરણ 3: પુષ્પી વનસ્પતિઓમાં પ્રજનન", "ch": ""}, {"q": "પુષ્પમાં 'પેરિયાન્થ' (Perianth) ની રચના વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["તે ફક્ત પુષ્પદળો (Petals) ના બનેલો હોય છે.", "તે ફક્ત બાહ્યદળો (Sepals) ના બનેલો હોય છે.", "તે બાહ્યદળો અને પુષ્પદળો બંનેથી બનેલો હોય છે.", "તે પુષ્પાસન (Receptacle) ના ભાગ તરીકે ગણવામાં આવે છે."], "ans": 2, "exp": "પેરિયાન્થ એ પુષ્પનો ભાગ છે જે બાહ્યદળો (Sepals) અને પુષ્પદળો (Petals) બંનેથી બનેલો હોય છે. વિકલ્પ A અને B ખોટા છે કારણ કે પેરિયાન્થ ફક્ત એક જ પ્રકારના ભાગથી બનેલો નથી. વિકલ્પ D ખોટો છે કારણ કે પેરિયાન્થ પુષ્પાસનનો ભાગ નથી, પરંતુ તે પુષ્પના બાહ્ય ભાગો છે.", "ref": "Std 11 - પ્રકરણ 3: પુષ્પી વનસ્પતિઓમાં પ્રજનન", "ch": ""}, {"q": "એક વિદ્યાર્થીએ એક પુષ્પનું નિરીક્ષણ કરતાં જણાયું કે તે પુષ્પમાં પુંકેસર અને સ્ત્રીકેસર બંને હાજર છે, પરંતુ તે પુષ્પમાં 'પરિપત્રીય સંમિતિ' (actinomorphic symmetry) ને બદલે 'એકતરફી સંમિતિ' (zygomorphic symmetry) જોવા મળે છે. આ પુષ્પમાં નીચેનામાંથી કયો ભાગ એવો હોવાની શક્યતા સૌથી વધુ છે જે આ પ્રકારની સંમિતિ માટે જવાબદાર હોય?", "opts": ["વજ્રપત્રો (sepals) ની સંખ્યા અસમાન હોવી", "દલપત્રો (petals) ની રચના અસમાન અને એકબાજુ વળેલી હોવી", "પુંકેસરો (stamens) ની લંબાઈ અલગ-અલગ હોવી", "સ્ત્રીકેસર (pistil) ની સ્થિતિ પુષ્પના કેન્દ્રથી ખસેલી હોવી"], "ans": 1, "exp": "આ પ્રશ્નમાં પુષ્પની સંમિતિ (symmetry) ના ખ્યાલ પર આધારિત છે. 'એકતરફી સંમિતિ' (zygomorphic symmetry) ધરાવતા પુષ્પોમાં સામાન્ય રીતે દલપત્રો (petals) ની રચના અસમાન અને એકબાજુ વળેલી હોય છે, જે પુષ્પને એક જ દિશામાં વહેંચી શકાય તેવું બનાવે છે. ઉદાહરણ તરીકે, વટાણાના પુષ્પમાં આ લક્ષણ જોવા મળે છે. વિકલ્પ A ખોટો છે કારણ કે વજ્રપત્રો (sepals) ની સંખ્યા અસમાન હોવી એ સંમિતિને પ્રભાવિત કરતી નથી. વિકલ્પ C ખોટો છે કારણ કે પુંકેસરોની લંબાઈ અલગ-અલગ હોવી એ સંમિતિને પ્રભાવિત કરતી નથી, તે ફક્ત પરાગનયનમાં મદદરૂપ થાય છે. વિકલ્પ D ખોટો છે કારણ કે સ્ત્રીકેસરની સ્થિતિ પુષ્પના કેન્દ્રથી ખસેલી હોવી એ સંમિતિને પ્રભાવિત કરતી નથી, તે ફક્ત પ્રજનનમાં ભૂમિકા ભજવે છે. તેથી સાચો જવાબ વિકલ્પ B છે.", "ref": "Std 11 - પ્રકરણ 4: પુષ્પીય વનસ્પતિઓની બાહ્યાકારવિજ્ઞાન (Morphology of Flowering Plants)", "ch": ""}, {"q": "પુષ્પમાં 'એપીકલ કલાઈન' (epicalyx) ની હાજરી કયા પુષ્પમાં જોવા મળે છે અને તેનો મુખ્ય હેતુ શો છે?", "opts": ["ગુલાબમાં, પુષ્પને આકર્ષક બનાવવા માટે", "કપાસમાં, પુષ્પાસનની રક્ષા કરવા માટે", "સૂર્યમુખીમાં, પરાગકણોને આકર્ષવા માટે", "જાસૂદમાં, ફળના વિકાસમાં મદદ કરવા માટે"], "ans": 1, "exp": "એપીકલ કલાઈન (epicalyx) કપાસના પુષ્પમાં જોવા મળે છે, જે પુષ્પાસનની રક્ષા કરવા માટે હોય છે. ગુલાબમાં એપીકલ કલાઈન હાજર નથી, સૂર્યમુખીમાં તેનો ઉપયોગ પરાગકણોને આકર્ષવા માટે થતો નથી, અને જાસૂદમાં તે ફળના વિકાસ સાથે સીધો સંબંધ ધરાવતું નથી. કપાસમાં એપીકલ કલાઈન પુષ્પાસનને બાહ્ય હાનિથી બચાવે છે.", "ref": "Std 11 - અધ્યાય 3: પુષ્પની રચના અને કાર્ય", "ch": ""}, {"q": "પુષ્પમાં 'સિનકાર્પી' (syncarpous) અને 'એપોકાર્પી' (apocarpous) ગાયનોઇસિયમ વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["સિનકાર્પીમાં સ્ત્રીકેસરો અલગ હોય છે, જ્યારે એપોકાર્પીમાં જોડાયેલા હોય છે", "સિનકાર્પીમાં સ્ત્રીકેસરો જોડાયેલા હોય છે, જ્યારે એપોકાર્પીમાં અલગ હોય છે", "સિનકાર્પીમાં ફળ એક જ હોય છે, જ્યારે એપોકાર્પીમાં બહુવિધ ફળો હોય છે", "સિનકાર્પીમાં પરાગકણો સ્ત્રીકેસર પર પડે છે, જ્યારે એપોકાર્પીમાં નહીં"], "ans": 1, "exp": "સિનકાર્પી (syncarpous) ગાયનોઇસિયમમાં સ્ત્રીકેસરો જોડાયેલા હોય છે, જ્યારે એપોકાર્પી (apocarpous) ગાયનોઇસિયમમાં સ્ત્રીકેસરો અલગ હોય છે. વિકલ્પ A ઉલટો છે, વિકલ્પ C અને D અસત્ય છે કારણ કે ફળની સંખ્યા અને પરાગકણોના પડવાનો સંબંધ ગાયનોઇસિયમની રચના સાથે નથી.", "ref": "Std 11 - અધ્યાય 3: પુષ્પની રચના અને કાર્ય", "ch": ""}, {"q": "પુષ્પમાં 'પોલીનેશન' (પરાગસંયોગ) દરમિયાન, કયા ભાગ દ્વારા પરાગકણો સ્ત્રીકેસર પર પહોંચે છે?", "opts": ["પુંકેસરના ફિલામેન્ટ દ્વારા", "પરાગકોષના ટ્યુબ દ્વારા", "પુષ્પાસન દ્વારા", "પાંખડી દ્વારા"], "ans": 1, "exp": "પરાગસંયોગ દરમિયાન, પરાગકણો પરાગકોષના ટ્યુબ દ્વારા સ્ત્રીકેસર પર પહોંચે છે. પુંકેસરના ફિલામેન્ટ પરાગકણો ધરાવે છે પરંતુ તેને સ્ત્રીકેસર પર પહોંચાડતું નથી. પુષ્પાસન અને પાંખડી પરાગસંયોગમાં સીધી ભૂમિકા ભજવતી નથી.", "ref": "Std 11 - અધ્યાય 3: પુષ્પની રચના અને કાર્ય", "ch": ""}, {"q": "પુષ્પમાં 'ડાયકોટિલીડન' (દ્વિદળી) પુષ્પોની તુલનામાં 'મોનોકોટિલીડન' (એકદળી) પુષ્પોની કઈ વિશેષતા છે?", "opts": ["મોનોકોટિલીડન પુષ્પોમાં પુંકેસરની સંખ્યા 3 અથવા 6 હોય છે", "મોનોકોટિલીડન પુષ્પોમાં પાંખડીઓની સંખ્યા 4 અથવા 5 હોય છે", "મોનોકોટિલીડન પુષ્પોમાં સ્ત્રીકેસરની સંખ્યા 2 હોય છે", "મોનોકોટિલીડન પુષ્પોમાં પુષ્પાસન અસમમિત હોય છે"], "ans": 0, "exp": "મોનોકોટિલીડન (એકદળી) પુષ્પોમાં પુંકેસરની સંખ્યા સામાન્ય રીતે 3 અથવા 6 હોય છે, જ્યારે દ્વિદળી પુષ્પોમાં તે 4, 5 અથવા 10 હોય છે. વિકલ્પ B, C, અને D મોનોકોટિલીડન પુષ્પોની વિશેષતા નથી.", "ref": "Std 11 - અધ્યાય 3: પુષ્પની રચના અને કાર્ય", "ch": ""}, {"q": "પુષ્પમાં 'હાયપોગાયનસ' (hypogynous) પુષ્પની તુલનામાં 'એપીગાયનસ' (epigynous) પુષ્પની કઈ વિશેષતા છે?", "opts": ["હાયપોગાયનસ પુષ્પમાં પુષ્પાસન ઉચું હોય છે, જ્યારે એપીગાયનસ પુષ્પમાં પુષ્પાસન નીચું હોય છે", "હાયપોગાયનસ પુષ્પમાં સ્ત્રીકેસર પુષ્પાસનની ઉપર હોય છે, જ્યારે એપીગાયનસ પુષ્પમાં સ્ત્રીકેસર પુષ્પાસનની નીચે હોય છે", "હાયપોગાયનસ પુષ્પમાં પુંકેસર અને પાંખડીઓ સ્ત્રીકેસરની ઉપર હોય છે, જ્યારે એપીગાયનસ પુષ્પમાં તે સ્ત્રીકેસરની નીચે હોય છે", "હાયપોગાયનસ પુષ્પમાં ફળ પુષ્પાસન સાથે જોડાયેલું હોય છે, જ્યારે એપીગાયનસ પુષ્પમાં ફળ પુષ્પાસનથી અલગ હોય છે"], "ans": 2, "exp": "હાયપોગાયનસ પુષ્પમાં પુંકેસર અને પાંખડીઓ સ્ત્રીકેસરની ઉપર હોય છે, જ્યારે એપીગાયનસ પુષ્પમાં તે સ્ત્રીકેસરની નીચે હોય છે. વિકલ્પ A, B, અને D અસત્ય છે કારણ કે હાયપોગાયનસ અને એપીગાયનસ પુષ્પોની રચના અને ફળના જોડાણ સાથે સંબંધિત નથી.", "ref": "Std 11 - અધ્યાય 3: પુષ્પની રચના અને કાર્ય", "ch": ""}, {"q": "પુષ્પમાં 'એન્ડ્રોફોર' (androphore) ની હાજરી કયા પુષ્પકુળમાં જોવા મળે છે અને તેનો મુખ્ય હેતુ શો છે?", "opts": ["મલ્વેસી (Malvaceae) કુળમાં, પુંકેસરોને ઉંચે રાખવા માટે", "ફેબેસી (Fabaceae) કુળમાં, સ્ત્રીકેસરની રક્ષા માટે", "લિલિયેસી (Liliaceae) કુળમાં, પરાગકણોનું ઉત્પાદન વધારવા માટે", "સોલેનેસી (Solanaceae) કુળમાં, પુષ્પને આકર્ષક બનાવવા માટે"], "ans": 0, "exp": "એન્ડ્રોફોર મલ્વેસી કુળના પુષ્પોમાં જોવા મળે છે, જ્યાં તે પુંકેસરોને ઉંચે રાખીને સ્ત્રીકેસરથી દૂર રાખે છે, જેથી સ્વ-પરાગસંયોગ ટાળી શકાય. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) ફેબેસી કુળમાં એન્ડ્રોફોર નથી હોતું, C) લિલિયેસી કુળમાં એન્ડ્રોફોર નથી હોતું, અને D) સોલેનેસી કુળમાં એન્ડ્રોફોર નથી હોતું.", "ref": "Std 11 - પ્રકરણ 7: પુષ્પી વનસ્પતિશાસ્ત્ર (Morphology of Flowering Plants)", "ch": ""}, {"q": "પુષ્પમાં 'ક્લીસ્ટોગેમી' (cleistogamy) ની પ્રક્રિયા કયા પુષ્પમાં જોવા મળે છે અને તેનો મુખ્ય ફાયદો શો છે?", "opts": ["કોમેલીના (Commelina) માં, સ્વ-પરાગસંયોગ દ્વારા બીજનું નિષેચન સુનિશ્ચિત કરવા", "હિબિસ્કસ (Hibiscus) માં, પરાગકણોનું સંગ્રહણ કરવા", "મરીગોલ્ડ (Marigold) માં, પુષ્પને રંગીન બનાવવા", "જાસ્મિન (Jasminum) માં, સુગંધ વધારવા"], "ans": 0, "exp": "ક્લીસ્ટોગેમી કોમેલીના (Commelina) પુષ્પમાં જોવા મળે છે, જ્યાં પુષ્પ બંધ રહે છે અને સ્વ-પરાગસંયોગ દ્વારા બીજનું નિષેચન થાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) હિબિસ્કસમાં ક્લીસ્ટોગેમી નથી, C) મરીગોલ્ડમાં ક્લીસ્ટોગેમી નથી, અને D) જાસ્મિનમાં ક્લીસ્ટોગેમી નથી.", "ref": "Std 11 - પ્રકરણ 7: પુષ્પી વનસ્પતિશાસ્ત્ર (Morphology of Flowering Plants)", "ch": ""}, {"q": "પુષ્પમાં 'સાયનોમોરફી' (cyanomorphy) ની વિશેષતા કયા પુષ્પમાં જોવા મળે છે અને તેનો મુખ્ય હેતુ શો છે?", "opts": ["સલ્વિયા (Salvia) માં, પરાગકણોને સ્ત્રીકેસર પર સીધા જ પહોંચાડવા", "ઓર્કિડ (Orchid) માં, કીટકોને આકર્ષવા", "સનફ્લાવર (Sunflower) માં, પરાગકણોનું ઉત્પાદન વધારવા", "રોઝ (Rose) માં, પુષ્પને સુંદર બનાવવા"], "ans": 0, "exp": "સાયનોમોરફી સલ્વિયા (Salvia) પુષ્પમાં જોવા મળે છે, જ્યાં પુંકેસર અને સ્ત્રીકેસરની રચના એવી હોય છે કે પરાગકણો સીધા જ સ્ત્રીકેસર પર પહોંચે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) ઓર્કિડમાં સાયનોમોરફી નથી, C) સનફ્લાવરમાં સાયનોમોરફી નથી, અને D) રોઝમાં સાયનોમોરફી નથી.", "ref": "Std 11 - પ્રકરણ 7: પુષ્પી વનસ્પતિશાસ્ત્ર (Morphology of Flowering Plants)", "ch": ""}, {"q": "પુષ્પમાં 'પેપિલિયોનેસી' (Papilionaceae) કુળના પુષ્પની વિશેષ રચના કયી છે?", "opts": ["પાંખડીઓની રચના 'વેક્સિલમ', 'એલા', અને 'કીલ' તરીકે ઓળખાય છે", "પુંકેસરોની સંખ્યા 5 હોય છે", "સ્ત્રીકેસરની લંબાઈ પુંકેસર કરતાં લાંબી હોય છે", "પુષ્પાસન (receptacle) પર પુષ્પભાગોની ગોઠવણી સ્પાયરલ હોય છે"], "ans": 0, "exp": "પેપિલિયોનેસી કુળના પુષ્પમાં પાંખડીઓની રચના 'વેક્સિલમ' (ધ્વજ), 'એલા' (પાંખ), અને 'કીલ' (નાવ) તરીકે ઓળખાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) પુંકેસરોની સંખ્યા 10 (દીવેલ) હોય છે, C) સ્ત્રીકેસરની લંબાઈ પુંકેસર કરતાં લાંબી નથી હોતી, અને D) પુષ્પભાગોની ગોઠવણી સ્પાયરલ નથી હોતી.", "ref": "Std 11 - પ્રકરણ 7: પુષ્પી વનસ્પતિશાસ્ત્ર (Morphology of Flowering Plants)", "ch": ""}, {"q": "પુષ્પમાં 'એક્ટિનોમોરફિક' (actinomorphic) અને 'ઝાયગોમોરફિક' (zygomorphic) પુષ્પ વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["એક્ટિનોમોરફિક પુષ્પમાં, પુષ્પને કોઈપણ તળપદી રેખા દ્વારા બે સરખા ભાગમાં વહેંચી શકાય છે, જ્યારે ઝાયગોમોરફિક પુષ્પમાં માત્ર એક જ તળપદી રેખા દ્વારા વહેંચી શકાય છે", "એક્ટિનોમોરફિક પુષ્પમાં પાંખડીઓની સંખ્યા 5 હોય છે, જ્યારે ઝાયગોમોરફિક પુષ્પમાં 4 હોય છે", "એક્ટિનોમોરફિક પુષ્પમાં પુંકેસરોની સંખ્યા 10 હોય છે, જ્યારે ઝાયગોમોરફિક પુષ્પમાં 5 હોય છે", "એક્ટિનોમોરફિક પુષ્પમાં સ્ત્રીકેસરની લંબાઈ પુંકેસર કરતાં let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
