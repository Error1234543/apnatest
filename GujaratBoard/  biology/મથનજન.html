<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>મિથેનોજન.</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>મિથેનોજન.</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">મિથેનોજન.</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "મિથેનોજન બેક્ટેરિયા દ્વારા મિથેન ઉત્પન્ન થવાની પ્રક્રિયામાં નીચેનામાંથી કયો પદાર્થ મુખ્ય સબસ્ટ્રેટ તરીકે વપરાય છે?", "opts": ["ગ્લુકોઝ", "એસિટેટ", "નાઇટ્રેટ", "સલ્ફેટ"], "ans": 1, "exp": "મિથેનોજન બેક્ટેરિયા એસિટેટ (અસેટિક એસિડ), હાઇડ્રોજન, અને કાર્બન ડાયોક્સાઇડ જેવા સબસ્ટ્રેટ્સનો ઉપયોગ કરીને મિથેન ઉત્પન્ન કરે છે. એસિટેટ એ મિથેન ઉત્પાદન માટેનો મુખ્ય સબસ્ટ્રેટ છે. ગ્લુકોઝ, નાઇટ્રેટ, અને સલ્ફેટ મિથેનોજન પ્રક્રિયામાં મુખ્ય સબસ્ટ્રેટ નથી.", "ref": "Std 12 - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "ch": ""}, {"q": "મિથેનોજન બેક્ટેરિયા નીચેનામાંથી કયા વાતાવરણમાં સૌથી વધુ સક્રિય હોય છે?", "opts": ["ઓક્સિજનયુક્ત વાતાવરણ", "નાઇટ્રોજનયુક્ત વાતાવરણ", "એનરોબિક (ઓક્સિજનરહિત) વાતાવરણ", "કાર્બન ડાયોક્સાઇડયુક્ત વાતાવરણ"], "ans": 2, "exp": "મિથેનોજન બેક્ટેરિયા એનરોબિક (ઓક્સિજનરહિત) વાતાવરણમાં જ સક્રિય હોય છે, કારણ કે ઓક્સિજનની હાજરીમાં તેની ક્રિયાશીલતા અટકી જાય છે. ઓક્સિજનયુક્ત, નાઇટ્રોજનયુક્ત, અને કાર્બન ડાયોક્સાઇડયુક્ત વાતાવરણમાં આ બેક્ટેરિયા સક્રિય નથી.", "ref": "Std 12 - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "ch": ""}, {"q": "મિથેનોજન બેક્ટેરિયા નીચેનામાંથી કયા સ્થાને સૌથી વધુ પ્રમાણમાં જોવા મળે છે?", "opts": ["વરસાદી જંગલોની જમીન", "ગાયના પાચનતંત્રમાં", "સમુદ્રની સપાટી પર", "રણપ્રદેશની જમીન"], "ans": 1, "exp": "મિથેનોજન બેક્ટેરિયા ગાયના પાચનતંત્રમાં (રૂમેનમાં) સૌથી વધુ પ્રમાણમાં જોવા મળે છે, કારણ કે ત્યાં એનરોબિક વાતાવરણ અને સબસ્ટ્રેટની ઉપલબ્ધતા રહેલી છે. વરસાદી જંગલો, સમુદ્રની સપાટી, અને રણપ્રદેશની જમીનમાં આ બેક્ટેરિયા ઓછા પ્રમાણમાં જોવા મળે છે.", "ref": "Std 12 - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "ch": ""}, {"q": "મિથેનોજન બેક્ટેરિયા દ્વારા મિથેન ઉત્પન્ન થવાની પ્રક્રિયામાં, નીચેનામાંથી કયો પદાર્થ સીધો સબસ્ટ્રેટ તરીકે વાપરાતો નથી, પરંતુ અંતિમ ઉત્પાદન તરીકે મળે છે?", "opts": ["કાર્બન ડાયોક્સાઇડ (CO₂)", "એસિટેટ (CH₃COO⁻)", "હાઇડ્રોજન (H₂)", "મિથેન (CH₄)"], "ans": 3, "exp": "મિથેનોજન બેક્ટેરિયા દ્વારા મિથેન ઉત્પન્ન થવાની પ્રક્રિયામાં, CO₂, એસિટેટ, અને H₂ સબસ્ટ્રેટ તરીકે વાપરાય છે. મિથેન (CH₄) અંતિમ ઉત્પાદન છે, સબસ્ટ્રેટ નથી. A, B, અને C સબસ્ટ્રેટ છે, જ્યારે D ઉત્પાદન છે.", "ref": "Std 12 - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "ch": ""}, {"q": "મિથેનોજન બેક્ટેરિયા નીચેનામાંથી કયા જીવવિજ્ઞાનીય ચક્રમાં મહત્વની ભૂમિકા ભજવે છે, જ્યાં તેઓ એનેરોબિક પરિસ્થિતિમાં કાર્બનિક પદાર્થોનું વિઘટન કરે છે?", "opts": ["નાઇટ્રોજન ચક્ર", "કાર્બન ચક્ર", "ઓક્સિજન ચક્ર", "સલ્ફર ચક્ર"], "ans": 1, "exp": "મિથેનોજન બેક્ટેરિયા કાર્બન ચક્રમાં મહત્વની ભૂમિકા ભજવે છે, કારણ કે તેઓ એનેરોબિક પરિસ્થિતિમાં કાર્બનિક પદાર્થોનું વિઘટન કરી મિથેન ઉત્પન્ન કરે છે. A (નાઇટ્રોજન ચક્ર), C (ઓક્સિજન ચક્ર), અને D (સલ્ફર ચક્ર) સાથે મિથેનોજન બેક્ટેરિયાની સીધી સંબંધિતતા નથી.", "ref": "Std 12 - Chapter 14: પર્યાવરણ અને તેના સંરક્ષણ", "ch": ""}, {"q": "મિથેનોજન બેક્ટેરિયા નીચેનામાંથી કયા જીવવિજ્ઞાનીય ચક્રમાં સીધો સહભાગી નથી, પરંતુ પરોક્ષ રીતે અસર કરે છે?", "opts": ["કાર્બન ચક્ર", "નાઇટ્રોજન ચક્ર", "સલ્ફર ચક્ર", "ઓક્સિજન ચક્ર"], "ans": 1, "exp": "મિથેનોજન બેક્ટેરિયા કાર્બન ચક્રમાં સીધો સહભાગી છે, કારણ કે તેઓ મિથેન (CH4) ઉત્પન્ન કરે છે, જે કાર્બન ચક્રનો ભાગ છે. સલ્ફર ચક્ર અને ઓક્સિજન ચક્રમાં તેઓ પરોક્ષ રીતે અસર કરી શકે છે, પરંતુ નાઇટ્રોજન ચક્રમાં તેઓ સીધો સહભાગી નથી.", "ref": "Std 12 - Chapter 14: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "ch": ""}, {"q": "મિથેનોજન બેક્ટેરિયા નીચેનામાંથી કયા વાતાવરણીય પરિબળ દ્વારા સૌથી ઓછા પ્રભાવિત થાય છે?", "opts": ["તાપમાન", "pH", "ઓક્સિજનની હાજરી", "દબાણ"], "ans": 3, "exp": "મિથેનોજન બેક્ટેરિયા તાપમાન, pH, અને ઓક્સિજનની હાજરી દ્વારા ખૂબ પ્રભાવિત થાય છે, કારણ કે તેઓ સ્ટ્રિક્ટ એનેરોબિક છે. દબાણ આ બેક્ટેરિયા માટે ઓછું મહત્વનું પરિબળ છે, ખાસ કરીને જ્યારે તેઓ જળાશયો અથવા મીઠાના ક્ષેત્રોમાં જોવા મળે છે.", "ref": "Std 12 - Chapter 14: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન મિથેનોજન આર્કિયા માટે ખોટું છે, જે તેમને અન્ય આર્કિયા અને બેક્ટેરિયાથી અલગ પાડે છે?", "opts": ["મિથેનોજન આર્કિયા તેમના કોષદીવાલમાં સ્યુડોપેપ્ટિડોગ્લાયકેન ધરાવે છે, જે બેક્ટેરિયાના પેપ્ટિડોગ્લાયકેનથી રાસાયણિક રીતે અલગ હોય છે.", "મિથેનોજન આર્કિયા તેમના મિથેનોજેનેસિસ માટે Coenzyme M અને Coenzyme F420 જેવા વિશિષ્ટ સહકારકોનો ઉપયોગ કરે છે, જે અન્ય આર્કિયા કે બેક્ટેરિયામાં જોવા મળતા નથી.", "મિથેનોજન આર્કિયા ઓક્સિજનની હાજરીમાં પણ જીવિત રહી શકે છે અને મિથેન ઉત્પન્ન કરી શકે છે, કારણ કે તેઓ ફેકલ્ટેટિવ એનએરોબ છે.", "મિથેનોજન આર્કિયાના રાઇબોસોમલ આરએનએ (rRNA) અનુક્રમો અન્ય આર્કિયા અને બેક્ટેરિયાથી અલગ હોય છે, જે તેમને આણ્વિક વર્ગીકરણમાં અલગ સ્થાન આપે છે."], "ans": 2, "exp": "મિથેનોજન આર્કિયા સખત એનએરોબિક સૂક્ષ્મજીવો છે અને ઓક્સિજનની હાજરીમાં જીવિત રહી શકતા નથી. તેઓ ફરજિયાત એનએરોબ છે, ફેકલ્ટેટિવ નહીં. વિકલ્પ A, B અને D મિથેનોજનની વિશિષ્ટ લાક્ષણિકતાઓનું સાચું વર્ણન કરે છે: તેમનો કોષદીવાલ સ્યુડોપેપ્ટિડોગ્લાયકેનથી બનેલો હોય છે, તેઓ વિશિષ્ટ સહકારકોનો ઉપયોગ કરે છે, અને તેમના rRNA અનુક્રમો અનન્ય હોય છે. તેથી વિકલ્પ C ખોટું છે.", "ref": "Std 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ", "ch": ""}, {"q": "મિથેનોજન આર્કિયા દ્વારા મિથેનોજેનેસિસની પ્રક્રિયામાં, નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["મિથેનોજનેસિસ દરમિયાન, CO₂ અને H₂ ની પ્રક્રિયાથી મિથેન ઉત્પન્ન થાય છે, જેમાં ઇલેક્ટ્રોન દાતા તરીકે H₂ કાર્ય કરે છે.", "મિથેનોજનેસિસની પ્રક્રિયામાં મિથાઇલ-કોએન્ઝાઇમ M રિડક્ટેઝ (MCR) ઉત્સેચક મુખ્ય ભૂમિકા ભજવે છે, જે અંતિમ પગલામાં મિથેન ઉત્પન્ન કરે છે.", "મિથેનોજનેસિસ દરમિયાન, એસિટેટનો સીધો ઉપયોગ મુખ્ય સબસ્ટ્રેટ તરીકે થાય છે, જ્યારે CO₂ અને H₂ નો ઉપયોગ ગૌણ સ્ત્રોત તરીકે થાય છે.", "મિથેનોજનેસિસની પ્રક્રિયા દરમિયાન ATP સિન્થેસિસ કેમિઓસ્મોટિક યંત્રણા દ્વારા થાય છે, જેમાં પ્રોટોન ગ્રેડિયન્ટનો ઉપયોગ થાય છે."], "ans": 2, "exp": "મિથેનોજનેસિસમાં મુખ્ય સબસ્ટ્રેટ તરીકે CO₂ અને H₂ નો ઉપયોગ થાય છે, જ્યારે એસિટેટનો ઉપયોગ કેટલાક મિથેનોજન દ્વારા થઈ શકે છે, પરંતુ તે મુખ્ય સબસ્ટ્રેટ નથી. મિથેનોજનેસિસની પ્રક્રિયામાં મિથાઇલ-કોએન્ઝાઇમ M રિડક્ટેઝ (MCR) ઉત્સેચક અંતિમ પગલામાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે. વિકલ્પ A, B અને D સાચાં વિધાનો છે, જ્યારે વિકલ્પ C ખોટું છે કારણ કે એસિટેટ મુખ્ય સબસ્ટ્રેટ નથી.", "ref": "Std 12 - પ્રકરણ 10: માનવ કલ્યાણમાં સૂક્ષ્મજીવો", "ch": ""}, {"q": "નીચેના પૈકી કયું ઉદાહરણ મિથેનોજન આર્કિયા અને તેમના જીવનચક્ર સાથે સીધી રીતે સંકળાયેલ નથી, તેમ છતાં ઘણીવાર મિથેન ઉત્પાદન સાથે જોડાય છે?", "opts": ["ગાયના રુમેનમાં મિથેન ઉત્પાદન, જ્યાં મિથેનોજન આર્કિયા સેલ્યુલોઝના પાચનમાં મદદ કરે છે.", "ભીના જમીનના વિસ્તારોમાં મિથેન ઉત્સર્જન, જ્યાં મિથેનોજન આર્કિયા કાર્બનિક પદાર્થોનું વિઘટન કરે છે.", "બાયોગેસ પ્લાન્ટમાં મિથેન ઉત્પાદન, જ્યાં મિથેનોજન આર્કિયા કાર્બનિક કચરાનું વિઘટન કરી મિથેન ઉત્પન્ન કરે છે.", "જ્વાળામુખીના વિસ્ફોટ દરમિયાન મિથેનનું ઉત્સર્જન, જ્યાં ઉચ્ચ તાપમાન અને દબાણને કારણે મિથેન ઉત્પન્ન થાય છે."], "ans": 3, "exp": "જ્વાળામુખીના વિસ્ફોટ દરમિયાન મિથેનનું ઉત્સર્જન મિથેનોજન આર્કિયાની પ્રવૃત્તિને કારણે થતું નથી. મિથેનનું ઉત્પાદન અહીં ભૌગોલિક પ્રક્રિયાઓને કારણે થાય છે, જ્યારે વિકલ્પ A, B અને C મિથેનોજન આર્કિયાની પ્રવૃત્તિ સાથે સીધી રીતે સંકળાયેલ છે: ગાયના રુમેનમાં સેલ્યુલોઝનું પાચન, ભીના જમીનમાં કાર્બનિક પદાર્થોનું વિઘટન, અને બાયોગેસ પ્લાન્ટમાં મિથેન ઉત્પાદન.", "ref": "Std 12 - પ્રકરણ 10: માનવ કલ્યાણમાં સૂક્ષ્મજીવો", "ch": ""}, {"q": "મિથેનોજન આર્કિયા દ્વારા મિથેન ઉત્પાદનની પ્રક્રિયામાં, CO₂ નું રિડક્શન થઈને મિથેન બને છે. આ પ્રક્રિયામાં નીચેનામાંથી કયો ઉત્સેચક સીધો સહભાગી નથી, પરંતુ તેની ગેરહાજરીમાં પ્રક્રિયા અટકી જાય છે?", "opts": ["મિથાઈલ-કો-એન્ઝાઇમ M રિડક્ટેઝ (MCR)", "હાઇડ્રોજીનેઝ (Hydrogenase)", "કાર્બન મોનોક્સાઇડ ડિહાઇડ્રોજીનેઝ (CODH)", "ફોર્મેટ ડિહાઇડ્રોજીનેઝ (FDH)"], "ans": 3, "exp": "મિથેનોજનેસિસમાં મુખ્ય ઉત્સેચક મિથાઈલ-કો-એન્ઝાઇમ M રિડક્ટેઝ (MCR) છે, જે મિથેનના નિર્માણ માટે જવાબદાર છે. હાઇડ્રોજીનેઝ અને કાર્બન મોનોક્સાઇડ ડિહાઇડ્રોજીનેઝ (CODH) પણ આ પ્રક્રિયામાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે, કારણ કે તેઓ ઇલેક્ટ્રોન દાતા તરીકે કાર્ય કરે છે. જ્યારે ફોર્મેટ ડિહાઇડ્રોજીનેઝ (FDH) મિથેનોજનેસિસમાં સીધો સહભાગી નથી, પરંતુ તેની ગેરહાજરીમાં ફોર્મેટનું વિઘટન અટકી જાય છે, જે પરોક્ષ રીતે પ્રક્રિયાને અસર કરે છે. તેથી સાચો જવાબ D છે.", "ref": "Std 12 - પ્રકરણ 10: માઇક્રોબ્સ ઇન હ્યુમન વેલ્ફેર (ગુજરાતી આવૃત્તિ)", "ch": ""}, {"q": "મિથેનોજન આર્કિયા નીચેનામાંથી કયા પ્રકારના કોષીય શ્વસન સાથે સંકળાયેલા છે, જે તેમને અન્ય આર્કિયા અને બેક્ટેરિયાથી અલગ પાડે છે?", "opts": ["ઓક્સિજન આધારિત શ્વસન (Aerobic respiration)", "નાઈટ્રેટ આધારિત શ્વસન (Nitrate respiration)", "કાર્બન ડાયોક્સાઇડ આધારિત શ્વસન (CO₂ respiration)", "સલ્ફેટ આધારિત શ્વસન (Sulfate respiration)"], "ans": 2, "exp": "મિથેનોજન આર્કિયા કાર્બન ડાયોક્સાઇડ (CO₂) નું રિડક્શન કરીને મિથેન ઉત્પન્ન કરે છે, જેને કાર્બન ડાયોક્સાઇડ આધારિત શ્વસન કહેવાય છે. આ પ્રક્રિયા એનારોબિક હોય છે અને તેમાં ઓક્સિજન, નાઈટ્રેટ કે સલ્ફેટનો ઉપયોગ થતો નથી. તેથી સાચો જવાબ C છે.", "ref": "Std 11 - પ્રકરણ 14: શ્વસન અને ગેસ વિનિમય (ગુજરાતી આવૃત્તિ)", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન મિથેનોજન આર્કિયાની વિશિષ્ટ કોષદીવાલની રચના વિશે ખોટું છે?", "opts": ["તેમની કોષદીવાલમાં પેપ્ટિડોગ્લાયકેન હાજર નથી.", "તેમની કોષદીવાલ સ્યુડોપેપ્ટિડોગ્લાયકેન (Pseudopeptidoglycan) ધરાવે છે.", "તેમની કોષદીવાલ લિપોપોલિસેકેરાઇડ્સ (LPS) ધરાવે છે.", "તેમની કોષદીવાલ પ્રોટીન અને ગ્લાયકોપ્રોટીનથી બનેલી હોય છે."], "ans": 2, "exp": "મિથેનોજન આર્કિયાની કોષદીવાલમાં પેપ્ટિડોગ્લાયકેન હાજર નથી, પરંતુ તેઓ સ્યુડોપેપ્ટિડોગ્લાયકેન ધરાવે છે. તેમની કોષદીવાલ પ્રોટીન અને ગ્લાયકોપ્રોટીનથી બનેલી હોય છે. લિપોપોલિસેકેરાઇડ્સ (LPS) ગ્રામ-નેગેટિવ બેક્ટેરિયાની કોષદીવાલમાં જોવા મળે છે, આર્કિયામાં નહીં. તેથી સાચો જવાબ C છે.", "ref": "Std 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ (ગુજરાતી આવૃત્તિ)", "ch": ""}, {"q": "મિથેનોજન આર્કિયા દ્વારા મિથેન ઉત્પાદનની પ્રક્રિયામાં, નીચેનામાંથી કયું સંયોજન ઇલેક્ટ્રોન દાતા તરીકે કાર્ય કરતું નથી, પરંતુ તેની હાજરી પ્રક્રિયાને પ્રેરિત કરે છે?", "opts": ["હાઇડ્રોજન (H₂)", "ફોર્મેટ (HCOO⁻)", "એસિટેટ (CH₃COO⁻)", "મિથેનોલ (CH₃OH)"], "ans": 3, "exp": "મિથેનોજનેસિસમાં હાઇડ્રોજન (H₂), ફોર્મેટ (HCOO⁻) અને એસિટેટ (CH₃COO⁻) ઇલેક્ટ્રોન દાતા તરીકે કાર્ય કરે છે. મિથેનોલ (CH₃OH) સીધો ઇલેક્ટ્રોન દાતા નથી, પરંતુ તેની હાજરી પ્રક્રિયાને પ્રેરિત કરે છે કારણ કે તે મિથેનોજનેસિસના મધ્યવર્તી તરીકે કાર્ય કરે છે. તેથી સાચો જવાબ D છે.", "ref": "Std 12 - પ્રકરણ 10: માઇક્રોબ્સ ઇન હ્યુમન વેલ્ફેર (ગુજરાતી આવૃત્તિ)", "ch": ""}, {"q": "મિથેનોજન આર્કિયા નીચેનામાંથી કયા પ્રકારના જીવનચક્રમાં સીધી રીતે સહભાગી નથી, પરંતુ તેમની પ્રવૃત્તિ તેને પરોક્ષ રીતે પ્રભાવિત કરે છે?", "opts": ["કાર્બન ચક્ર (Carbon cycle)", "નાઈટ્રોજન ચક્ર (Nitrogen cycle)", "સલ્ફર ચક્ર (Sulfur cycle)", "ફોસ્ફરસ ચક્ર (Phosphorus cycle)"], "ans": 1, "exp": "મિથેનોજન આર્કિયા કાર્બન ચક્રમાં સીધી રીતે સહભાગી છે કારણ કે તેઓ કાર્બન ડાયોક્સાઇડનું રિડક્શન કરીને મિથેન ઉત્પન્ન કરે છે. નાઈટ્રોજન ચક્રમાં તેઓ સીધી રીતે સહભાગી નથી, પરંતુ તેમની પ્રવૃત્તિ જમીન અને પાણીના રાસાયણિક સંઘટનને પ્રભાવિત કરીને પરોક્ષ રીતે નાઈટ્રોજન ચક્રને અસર કરે છે. સલ્ફર અને ફોસ્ફરસ ચક્રમાં તેમની કોઈ સીધી કે પરોક્ષ ભૂમિકા નથી. તેથી સાચો જવાબ B છે.", "ref": "Std 11 - પ્રકરણ 14: પર્યાવરણીય રસાયણશાસ્ત્ર (ગુજરાતી આવૃત્તિ)", "ch": ""}, {"q": "મિથેનોજન આર્કિયામાં નીચેનામાંથી કયું વિશિષ્ટ ઉત્સેચક સંકુલ મિથેનોજેનેસિસની પ્રક્રિયામાં CO₂ નું રિડક્શન કરીને મિથેન ઉત્પન્ન કરવામાં સીધી ભૂમિકા ભજવે છે?", "opts": ["મિથાઈલ-કોએન્ઝાઇમ M રિડક્ટેઝ (MCR)", "નાઇટ્રોજનેઝ", "હાઇડ્રોજનેઝ", "રુબિસ્કો"], "ans": 0, "exp": "મિથાઈલ-કોએન્ઝાઇમ M રિડક્ટેઝ (MCR) એ મિથેનોજન આર્કિયામાં મિથેનોજેનેસિસની અંતિમ પ્રક્રિયામાં સીધી ભૂમિકા ભજવતું મુખ્ય ઉત્સેચક છે, જે CO₂ નું રિડક્શન કરીને મિથેન ઉત્પન્ન કરે છે. નાઇટ્રોજનેઝ નાઇટ્રોજન ફિક્સેશનમાં, હાઇડ્રોજનેઝ હાઇડ્રોજન ચયાપચયમાં અને રુબિસ્કો પ્રકાશસંશ્લેષણમાં ભાગ લે છે, જે મિથેનોજનેસિસ સાથે સંકળાયેલા નથી.", "ref": "Std 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ", "ch": ""}, {"q": "મિથેનોજન આર્કિયાની કોષદીવાલમાં નીચેનામાંથી કયું વિશિષ્ટ સંયોજન જોવા મળે છે, જે તેમને અન્ય આર્કિયા અને બેક્ટેરિયાથી અલગ પાડે છે?", "opts": ["સ્યુડોપેપ્ટિડોગ્લાયકેન", "લિપોપોલિસેકેરાઇડ", "ટેઇકોઇક એસિડ", "સેલ્યુલોઝ"], "ans": 0, "exp": "મિથેનોજન આર્કિયાની કોષદીવાલમાં સ્યુડોપેપ્ટિડોગ્લાયકેન જોવા મળે છે, જે તેમને અન્ય આર્કિયા અને બેક્ટેરિયાથી અલગ પાડે છે. લિપોપોલિસેકેરાઇડ ગ્રામ-નેગેટિવ બેક્ટેરિયામાં, ટેઇકોઇક એસિડ ગ્રામ-પોઝિટિવ બેક્ટેરિયામાં અને સેલ્યુલોઝ વનસ્પતિ કોષોમાં જોવા મળે છે.", "ref": "Std 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન મિથેનોજન આર્કિયાની ઉર્જા ચયાપચયની પ્રક્રિયા માટે ખોટું છે, જે તેમને અન્ય અજારક સૂક્ષ્મજીવોથી અલગ પાડે છે?", "opts": ["તેઓ ATP ઉત્પાદન માટે સબસ્ટ્રેટ-સ્તરીય ફોસ્ફોરાયલેશન પર સંપૂર્ણપણે નિર્ભર છે.", "તેઓ ઇલેક્ટ્રોન પરિવહન શૃંખલા દ્વારા પ્રોટોન ગ્રેડિયન્ટનો ઉપયોગ કરીને ATP ઉત્પન્ન કરે છે.", "તેઓ મિથેનોજેનેસિસ દરમિયાન CO₂ નું રિડક્શન કરવા માટે H ્ટેરિયાથી અલગ પાડે છે અને મિથેન ઉત્પાદનની પ્રક્રિયામાં સહાયક ભૂમિકા ભજવે છે"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. મિથેનોજન આર્કિયામાં વિશિષ્ટ કોએન્ઝાઇમ M (CoM) હોય છે, જે મિથેનોજેનેસિસની પ્રક્રિયામાં CO₂ નું રિડક્શન કરીને મિથેન ઉત્પન્ન કરવામાં મુખ્ય ભૂમિકા ભજવે છે. આ કોએન્ઝાઇમ માત્ર મિથેનોજન આર્કિયામાં જ જોવા મળે છે અને અન્ય કોઈ સજીવમાં નથી હોતું. વિકલ્પ A ખોટો છે કારણ કે સ્યુડોમ્યુરિન અન્ય આર્કિયામાં પણ જોવા મળે છે અને તે મિથેનોજેનેસિસ માટે સીધું જવાબદાર નથી. વિકલ્પ B ખોટો છે કારણ કે ઇથર-લિંક્ડ લિપિડ અન્ય આર્કિયામાં પણ હોય છે અને તે મિથેનોજેનેસિસ માટે સીધું જવાબદાર નથી. વિકલ્પ D ખોટો છે કારણ કે મિથેનોજન આર્કિયાની કોષદીવાલમાં સેલ્યુલોઝ હોતું નથી.", "ref": "Std 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
