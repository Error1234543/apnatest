<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>સહપ્રભાવીપણું (Codominance)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>સહપ્રભાવીપણું (Codominance)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">સહપ્રભાવીપણું (Codominance)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "માનવ રક્તજૂથ પ્રણાલીમાં AB રક્તજૂથનું નિર્માણ કયા પ્રકારના આનુવંશિક સિદ્ધાંતને અનુસરે છે?", "opts": ["અપૂર્ણ પ્રભુતા (Incomplete dominance)", "સહપ્રભાવીપણું (Codominance)", "બહુવૈકલ્પિક જનીન (Multiple alleles)", "બહુજનીનિક વારસો (Polygenic inheritance)"], "ans": 1, "exp": "AB રક્તજૂથમાં IA અને IB બંને એલેલ્સ સંપૂર્ણ રીતે અભિવ્યક્ત થાય છે, જે સહપ્રભાવીપણાનું ઉદાહરણ છે. અપૂર્ણ પ્રભુતામાં મિશ્ર લક્ષણ જોવા મળે છે, બહુવૈકલ્પિક જનીન એક કરતાં વધુ એલેલ્સની હાજરી દર્શાવે છે પરંતુ તે સહપ્રભાવીપણું સમજાવતું નથી, અને બહુજનીનિક વારસો એક લક્ષણ પર ઘણાં જનીનોની અસર દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "સહપ્રભાવીપણું અને અપૂર્ણ પ્રભુતા વચ્ચેનો મુખ્ય તફાવત શું છે?", "opts": ["સહપ્રભાવીપણામાં બંને એલેલ્સ સંપૂર્ણ રીતે અભિવ્યક્ત થાય છે, જ્યારે અપૂર્ણ પ્રભુતામાં મિશ્ર લક્ષણ જોવા મળે છે.", "સહપ્રભાવીપણું માત્ર વનસ્પતિઓમાં જોવા મળે છે, જ્યારે અપૂર્ણ પ્રભુતા પ્રાણીઓમાં જોવા મળે છે.", "સહપ્રભાવીપણામાં F₂ પેઢીમાં 1:2:1 ગુણોત્તર મળતો નથી, જ્યારે અપૂર્ણ પ્રભુતામાં મળે છે.", "સહપ્રભાવીપણું પર્યાવરણીય પરિબળોથી પ્રભાવિત થાય છે, જ્યારે અપૂર્ણ પ્રભુતા આનુવંશિક હોય છે."], "ans": 0, "exp": "સહપ્રભાવીપણામાં બંને એલેલ્સ સંપૂર્ણ રીતે અભિવ્યક્ત થાય છે (દા.ત. AB રક્તજૂથ), જ્યારે અપૂર્ણ પ્રભુતામાં વિષમયુગ્મી સ્થિતિમાં મિશ્ર લક્ષણ જોવા મળે છે (દા.ત. ગુલાબી ફૂલ). બાકીના વિકલ્પો વૈજ્ઞાનિક રીતે ખોટા છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "નીચેનામાંથી કયું ઉદાહરણ સહપ્રભાવીપણાનું નથી?", "opts": ["માનવમાં AB રક્તજૂથ", "ગાયમાં રોઆન રંગ (Roan coat color)", "સ્નેપડ્રેગનમાં ગુલાબી ફૂલ", "ચિકનમાં કાળા-સફેદ પીછાં"], "ans": 2, "exp": "સ્નેપડ્રેગનમાં ગુલાબી ફૂલ અપૂર્ણ પ્રભુતાનું ઉદાહરણ છે, જ્યાં વિષમયુગ્મી સ્થિતિમાં મિશ્ર લક્ષણ જોવા મળે છે. બાકીના વિકલ્પો સહપ્રભાવીપણાના ઉદાહરણો છે જ્યાં બંને એલેલ્સ સંપૂર્ણ રીતે અભિવ્યક્ત થાય છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "સહપ્રભાવીપણાના કિસ્સામાં, વિષમયુગ્મી સ્થિતિ (heterozygous condition)માં ફિનોટાઇપ શું દર્શાવે છે?", "opts": ["માત્ર એક એલેલનું લક્ષણ", "બંને એલેલ્સના લક્ષણોનું મિશ્રણ", "બંને એલેલ્સના લક્ષણો સ્વતંત્ર રીતે અને સંપૂર્ણપણે અભિવ્યક્ત થાય છે", "કોઈ પણ એલેલનું લક્ષણ દર્શાવતું નથી"], "ans": 2, "exp": "સહપ્રભાવીપણામાં વિષમયુગ્મી સ્થિતિમાં બંને એલેલ્સના લક્ષણો સ્વતંત્ર રીતે અને સંપૂર્ણપણે અભિવ્યક્ત થાય છે. ઉદાહરણ તરીકે, AB રક્તજૂથમાં IA અને IB બંને એલેલ્સના પ્રોટીન સપાટી પર હાજર હોય છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક પ્રયોગમાં, કાળા અને સફેદ રંગના ચિકન વચ્ચે સંકરણ કરાવતાં F₁ પેઢીમાં બધાં જ ચિકન કાળા-સફેદ પીછાંવાળા મળે છે. આ પરિણામનું કારણ શું હોઈ શકે?", "opts": ["અપૂર્ણ પ્રભુતા", "સહપ્રભાવીપણું", "બહુવૈકલ્પિક જનીન", "લિંગ-સંકળાયેલ વારસો"], "ans": 1, "exp": "કાળા-સફેદ પીછાંવાળા ચિકન સહપ્રભાવીપણાનું ઉદાહરણ છે, જ્યાં બંને એલેલ્સ સંપૂર્ણ રીતે અભિવ્યક્ત થાય છે. અપૂર્ણ પ્રભુતામાં મિશ્ર રંગ (દા.ત. ભૂરા) જોવા મળે, બહુવૈકલ્પિક જનીન એક કરતાં વધુ એલેલ્સની હાજરી દર્શાવે, અને લિંગ-સંકળાયેલ વારસો લિંગ વર્ણસૂત્રો સાથે સંબંધિત હોય છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "મનુષ્યમાં, MN રક્તજૂથ પ્રણાલીમાં M અને N એલિલ્સ વચ્ચે કયો આનુવંશિક સિદ્ધાંત જોવા મળે છે, જ્યારે એલિલ્સ બંને પોતપોતાના પ્રભાવને પૂરેપૂરો દર્શાવે છે?", "opts": ["અપૂર્ણ પ્રભુતા", "સહપ્રભાવીપણું", "પ્રભુતા-પ્રચ્છન્નતા", "બહુ-એલિલી પ્રભુતા"], "ans": 1, "exp": "સહપ્રભાવીપણું એવી સ્થિતિ છે જ્યારે બે એલિલ્સ વિષમયુગ્મી અવસ્થામાં પોતપોતાના પ્રભાવને પૂરેપૂરો દર્શાવે છે. MN રક્તજૂથ પ્રણાલીમાં, M અને N એલિલ્સ સહપ્રભાવી હોય છે, જેથી વિષમયુગ્મી વ્યક્તિમાં બંને પ્રોટીન (M અને N) સપાટી પર દેખાય છે. અપૂર્ણ પ્રભુતા (A)માં મિશ્ર ફિનોટાઇપ જોવા મળે છે, પ્રભુતા-પ્રચ્છન્નતા (C)માં એક એલિલ પ્રભાવી હોય છે, અને બહુ-એલિલી પ્રભુતા (D) એ બહુ-એલિલી પ્રણાલીનો ભાગ છે પરંતુ સહપ્રભાવીપણું નથી.", "ref": "Std 12 - અધ્યાય 5: આનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "એક જીવમાં, જ્યારે બે વિપરિત એલિલ્સ વિષમયુગ્મી અવસ્થામાં હોવા છતાં બંને પોતપોતાના લક્ષણો દર્શાવે છે, ત્યારે તેને શું કહેવાય છે?", "opts": ["એપીસ્ટેસીસ", "પ્લીયોટ્રોપી", "સહપ્રભાવીપણું", "પોલિજીની"], "ans": 2, "exp": "સહપ્રભાવીપણું એવી સ્થિતિ છે જ્યારે બે એલિલ્સ વિષમયુગ્મી અવસ્થામાં બંને પોતપોતાના લક્ષણો દર્શાવે છે. એપીસ્ટેસીસ (A) એ એક જીન દ્વારા બીજા જીનના પ્રભાવને અવરોધવાની પ્રક્રિયા છે. પ્લીયોટ્રોપી (B) એ એક જીનના બહુવિધ પ્રભાવો છે. પોલિજીની (D) એ બહુવિધ જીન દ્વારા એક જ લક્ષણ પર પ્રભાવ છે.", "ref": "Std 12 - અધ્યાય 5: આનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "નીચેનામાંથી કયું ઉદાહરણ સહપ્રભાવીપણાનું સૌથી યોગ્ય ઉદાહરણ છે જ્યાં ફિનોટાઇપમાં બંને એલિલ્સનો પ્રભાવ સ્પષ્ટ દેખાય છે?", "opts": ["મટરના છોડમાં લાંબી અને ટૂંકી ઊંચાઈ", "ગાયના રંગમાં કાળા અને ભૂરા રંગના મિશ્રણથી ખાકી રંગ", "મનુષ્યમાં AB રક્તજૂથ", "મકાઈમાં પીળા અને સફેદ દાણાના મિશ્રણથી પીળા રંગ"], "ans": 2, "exp": "AB રક્તજૂથ (C) સહપ્રભાવીપણાનું સ્પષ્ટ ઉદાહરણ છે, જ્યાં A અને B એલિલ્સ બંને પોતપોતાના એન્ટિજન (A અને B) દર્શાવે છે. મટરના છોડમાં લાંબી અને ટૂંકી ઊંચાઈ (A) પ્રભુતા-પ્રચ્છન્નતાનું ઉદાહરણ છે. ગાયના રંગમાં ખાકી રંગ (B) અપૂર્ણ પ્રભુતાનું ઉદાહરણ છે. મકાઈમાં પીળા રંગ (D) પ્રભુતાનું ઉદાહરણ છે.", "ref": "Std 12 - અધ્યાય 5: આનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "જ્યારે બે સહપ્રભાવી એલિલ્સ વિષમયુગ્મી અવસ્થામાં હોય ત્યારે ફિનોટાઇપિક પ્રમાણ કયું હોય છે?", "opts": ["1:2:1", "3:1", "1:1:1", "1:1"], "ans": 0, "exp": "સહપ્રભાવીપણામાં, વિષમયુગ્મી અવસ્થામાં બંને એલિલ્સ પોતપોતાના લક્ષણો દર્શાવે છે, જેથી ફિનોટાઇપિક પ્રમાણ 1 (પહેલા એલિલનું લક્ષણ) : 2 (વિષમયુગ્મી, બંને લક્ષણો) : 1 (બીજા એલિલનું લક્ષણ) હોય છે. 3:1 (B) પ્રભુતા-પ્રચ્છન્નતાનું પ્રમાણ છે. 1:1:1 (C) અને 1:1 (D) સહપ્રભાવીપણાનું પ્રમાણ નથી.", "ref": "Std 12 - અધ્યાય 5: આનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન સહપ્રભાવીપણા વિશે ખોટું છે?", "opts": ["સહપ્રભાવીપણામાં, બંને એલિલ્સ પોતપોતાના પ્રભાવને પૂરેપૂરો દર્શાવે છે.", "સહપ્રભાવીપણામાં, વિષમયુગ્મી અવસ્થામાં ફિનોટાઇપ મિશ્ર હોય છે.", "MN રક્તજૂથ પ્રણાલી સહપ્રભાવીપણાનું ઉદાહરણ છે.", "સહપ્રભાવીપણામાં, જનીન પ્રમાણ 1:2:1 હોય છે."], "ans": 1, "exp": "સહપ્રભાવીપણામાં, વિષમયુગ્મી અવસ્થામાં ફિનોટાઇપ મિશ્ર નથી હોતો, પરંતુ બંને એલિલ્સના લક્ષણો સ્પષ્ટ દેખાય છે (A સત્ય). MN રક્તજૂથ પ્રણાલી (C) અને જનીન પ્રમાણ 1:2:1 (D) સહપ્રભાવીપણાનું સત્ય વિધાન છે. મિશ્ર ફિનોટાઇપ (B) અપૂર્ણ પ્રભુતાનું લક્ષણ છે.", "ref": "Std 12 - અધ્યાય 5: આનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "ગાયના રંગના આનુવંશિક અભ્યાસમાં, કાળા (B) અને લાલ (R) રંગના વરસાદી ગાય વચ્ચે સંકરણ કરાવતાં F1 પેઢીમાં રોજી (roan) રંગ દેખાય છે. જો F1 ગાયને કાળા વરસાદી સાથે સંકરણ કરાવવામાં આવે, તો F2 પેઢીમાં કયા ફિનોટાઇપિક ગુણોત્તરની અપેક્ષા રાખી શકાય?", "opts": ["1 કાળો : 1 રોજી", "1 લાલ : 1 રોજી", "1 કાળો : 1 લાલ : 1 રોજી", "1 કાળો : 1 રોજી : 1 લાલ : 1 સફેદ"], "ans": 0, "exp": "સહપ્રભાવીપણામાં, B અને R એલિલ્સ વિષમયુગ્મી (BR) અવસ્થામાં રોજી રંગ દર્શાવે છે. F1 (BR)ને કાળા (BB) સાથે સંકરણ કરતાં, F2માં BB (કાળો) અને BR (રોજી) ફિનોટાઇપ મળે છે, જેથી ગુણોત્તર 1:1 થાય. બાકીના વિકલ્પો અયોગ્ય છે કારણ કે લાલ રંગ માટે R એલિલની જરૂર હોય છે, જે અહીં હાજર નથી.", "ref": "Std 12 - અધ્યાય 5: આનુવંશિકતા અને વૈવિધ્યતા", "ch": ""}, {"q": "મનુષ્યમાં, AB રક્તજૂથ ધરાવતા વ્યક્તિના માતાપિતા કયા રક્તજૂથ ધરાવી શકે તેની શક્યતા વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["માતા A અને પિતા B", "માતા AB અને પિતા O", "માતા A અને પિતા AB", "માતા B અને પિતા AB"], "ans": 1, "exp": "AB રક્તજૂથ સહપ્રભાવીપણાનું ઉદાહરણ છે, જ્યાં IA અને IB એલિલ્સ બંને પ્રભાવી હોય છે. AB રક્તજૂથ ધરાવતા બાળકના માતાપિતામાં ઓછામાં ઓછું એક IA અથવા IB એલિલ હોવું જરૂરી છે. વિકલ્પ B ખોટો છે કારણ કે O રક્તજૂથ (ii) ધરાવતા પિતા પાસેથી IA અથવા IB એલિલ મળી શકતું નથી.", "ref": "Std 12 - અધ્યાય 5: આનુવંશિકતા અને વૈવિધ્યતા", "ch": ""}, {"q": "નીચેનામાંથી કયું જીવંત ઉદાહરણ સહપ્રભાવીપણાનું નથી, પરંતુ તે અપૂર્ણ પ્રભુતાનું ઉદાહરણ છે?", "opts": ["મનુષ્યમાં MN રક્તજૂથ પ્રણાલી", "ગાયમાં રોજી રંગ", "સ્નેપડ્રેગન (Snapdragon)ના ફૂલનો રંગ", "મનુષ્યમાં AB રક્તજૂથ પ્રણાલી"], "ans": 2, "exp": "સ્નેપડ્રેગનના ફૂલનો રંગ અપૂર્ણ પ્રભુતાનું ઉદાહરણ છે, જ્યાં વિષમયુગ્મી અવસ્થામાં ગુલાબી રંગ (લાલ અને સફેદના મિશ્રણ) દેખાય છે. બાકીના વિકલ્પો સહપ્રભાવીપણાનાં ઉદાહરણો છે, જ્યાં બંને એલિલ્સ પોતપોતાના લક્ષણો દર્શાવે છે.", "ref": "Std 12 - અધ્યાય 5: આનુવંશિકતા અને વૈવિધ્યતા", "ch": ""}, {"q": "એક પ્રયોગશાળામાં, વિદ્યાર્થીએ એક જાતિના પૌધામાં ફૂલના રંગ માટેના જનીનનો અભ્યાસ કર્યો. તેને જણાયું કે લાલ (R) અને સફેદ (r) ફૂલવાળા પૌધાને સંકરણ કરતાં F1 પેઢીમાં ગુલાબી ફૂલ દેખાય છે. જો આ જનીન સહપ્રભાવી હોત, તો F1 પેઢીમાં કયો ફિનોટાઇપ દેખાત?", "opts": ["લાલ અને સફેદ પટ્ટા વાળા ફૂલ", "ગુલાબી ફૂલ", "લાલ ફૂલ", "સફેદ ફૂલ"], "ans": 0, "exp": "સહપ્રભાવીપણામાં, વિષમયુગ્મી અવસ્થામાં બંને એલિલ્સ પોતપોતાના લક્ષણો દર્શાવે છે. અહીં, R અને r એલિલ્સ હોવા છતાં, ફિનોટાઇપમાં લાલ અને સફેદ પટ્ટા વાળા ફૂલ દેખાય છે. ગુલાબી રંગ અપૂર્ણ પ્રભુતાનું લક્ષણ છે, જ્યારે લાલ અથવા સફેદ ફૂલ પૂર્ણ પ્રભુતાનું લક્ષણ છે.", "ref": "Std 12 - અધ્યાય 5: આનુવંશિકતા અને વૈવિધ્યતા", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન સહપ્રભાવીપણા વિશે સત્ય નથી?", "opts": ["સહપ્રભાવીપણામાં, વિષમયુગ્મી અવસ્થામાં બંને એલિલ્સ પોતપોતાના લક્ષણો દર્શાવે છે.", "સહપ્રભાવીપણામાં, સજાતીય અવસ્થામાં માત્ર એક જ લક્ષણ દર્શાવે છે.", "સહપ્રભાવીપણામાં, F2 પેઢીમાં ફિનોટાઇપિક ગુણોત્તર 1:2:1 હોય છે.", "સહપ્રભાવીપણામાં, એલિલ્સ વચ્ચે પ્રભુતાની ડિગ્રી હોય છે."], "ans": 3, "exp": "સહપ્રભાવીપણામાં, બંને એલિલ્સ સરખી પ્રભુતા ધરાવે છે, જેથી વિષમયુગ્મી અવસ્થામાં બંને લક્ષણો દર્શાવે છે. વિકલ્પ D ખોટો છે કારણ કે સહપ્રભાવીપણામાં એલિલ્સ વચ્ચે પ્રભુતાની ડિગ્રી હોતી નથી. બાકીના વિકલ્પો સહપ્રભાવીપણાના લક્ષણો છે.", "ref": "Std 12 - અધ્યાય 5: આનુવંશિકતા અને વૈવિધ્યતા", "ch": ""}, {"q": "એક જાતિના પૌધામાં, લાલ ફૂલ (RR) અને સફેદ ફૂલ (rr) વચ્ચે સંકરણ કરાવતાં F1 પેઢીમાં ગુલાબી ફૂલ પ્રાપ્ત થાય છે. જો આ પૌધામાં સહપ્રભાવીપણું હોય તો F1 પેઢીનું ફિનોટાઇપ શું હશે?", "opts": ["લાલ અને સફેદ ચટ્ટા વાળા ફૂલ", "ગુલાબી ફૂલ", "લાલ ફૂલ", "સફેદ ફૂલ"], "ans": 0, "exp": "સહપ્રભાવીપણામાં, વિષમયુગ્મી (Rr) અવસ્થામાં બંને એલિલ્સ પોતપોતાના લક્ષણો દર્શાવે છે. આથી F1 પેઢીમાં લાલ અને સફેદ ચટ્ટા વાળા ફૂલ પ્રાપ્ત થશે. ગુલાબી ફૂલ અપૂર્ણ પ્રભુતાનું લક્ષણ છે, જ્યારે લાલ અથવા સફેદ ફૂલ પૂર્ણ પ્રભુતાનું લક્ષણ છે.", "ref": "Std 12 - અધ્યાય 5: આનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "એક પ્રયોગમાં, કાળા (B) અને લાલ (R) રંગના ગાય વચ્ચે સંકરણ કરાવતાં F1 પેઢીમાં કાળા અને લાલ ચટ્ટા વાળા ગાય પ્રાપ્ત થાય છે. જો આ ગાયને સફેદ (W) રંગના ગાય સાથે સંકરણ કરાવવામાં આવે, તો F1 પેઢીનું ફિનોટાઇપ શું હશે? (ધારો કે W એલિલ B અને R પર પ્રભાવી છે)", "opts": ["કાળા અને લાલ ચટ્ટા વાળા ગાય", "સફેદ ગાય", "કાળા ગાય", "લાલ ગાય"], "ans": 1, "exp": "જ્યારે સહપ્રભાવી એલિલ્સ (B અને R) સાથે પ્રભાવી એલિલ (W) સંકરણ કરવામાં આવે, ત્યારે W એલિલ B અને R પર પ્રભાવી હોવાથી F1 પેઢીમાં સફેદ ગાય પ્રાપ્ત થશે. બાકીના વિકલ્પો સહપ્રભાવીપણાનું લક્ષણ દર્શાવતા નથી.", "ref": "Std 12 - અધ્યાય 5: આનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "એક પ્રયોગમાં, લાલ ફૂલવાળા (RR) અને સફેદ ફૂલવાળા (rr) પૌધાને સંકરણ કરાવતાં F1 પેઢીમાં ગુલાબી ફૂલ જોવા મળે છે. જ્યારે F1 પેઢીને આત્મપરાગણ કરાવવામાં આવે ત્યારે F2 પેઢીમાં કયું ફિનોટાઇપિક પ્રમાણ અપેક્ષિત છે?", "opts": ["1:2:1 (લાલ:ગુલાબી:સફેદ)", "3:1 (લાલ:સફેદ)", "1:1 (લાલ:સફેદ)", "9:3:3:1"], "ans": 0, "exp": "આ કિસ્સામાં, લાલ અને સફેદ રંગના એલિલ્સ અપૂર્ણ પ્રભુતા દર્શાવે છે, જ્યાં વિષમયુગ્મી (Rr) અવસ્થામાં ગુલાબી રંગ જોવા મળે છે. F2 પેઢીમાં ફિનોટાઇપિક પ્રમાણ 1:2:1 (લાલ:ગુલાબી:સફેદ) હોય છે. B વિકલ્પ પૂર્ણ પ્રભુતાનું પ્રમાણ છે. C વિકલ્પ સહપ્રભાવીપણાનું પ્રમાણ નથી. D વિકલ્પ ડાયહાઇબ્રિડ ક્રોસનું પ્રમાણ છે.", "ref": "Std 12 - અધ્યાય 5: આનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "એક પ્રયોગમાં, એક જાતિના પશુમાં રૂંવાટીના રંગ માટે બે એલિલ્સ જવાબદાર છે: કાળો રંગ (B) અને સફેદ રંગ (W). જ્યારે વિષમયુગ્મી (BW) સ્થિતિ ધરાવતા પ્રાણીઓનું સંકરણ કરાવવામાં આવે છે, ત્યારે F₂ પેઢીમાં ફિનોટાઇપિક પ્રમાણ ૧:૨:૧ મળે છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["આ ઉદાહરણ સહપ્રભાવીપણાનું છે, જેમાં બંને એલિલ્સ સમાન રીતે અભિવ્યક્ત થાય છે.", "F₂ પેઢીમાં કાળા અને સફેદ રંગના પ્રાણીઓનું પ્રમાણ સમાન હોય છે.", "વિષમયુગ્મી સ્થિતિમાં પ્રાણીઓનું રૂંવાટી કાળા અને સફેદ રંગનું મિશ્રણ દર્શાવે છે, જેને 'રોન' (Roan) કહે છે.", "આ ઉદાહરણ અપૂર્ણ પ્રભુતાનું છે, જેમાં વિષમયુગ્મી સ્થિતિમાં એક નવો મધ્યવર્તી રંગ ઉત્પન્ન થાય છે."], "ans": 3, "exp": "આ પ્રશ્નમાં સહપ્રભાવીપણાનું ઉદાહરણ આપવામાં આવ્યું છે, જેમાં વિષમયુગ્મી સ્થિતિમાં બંને એલિલ્સ સમાન રીતે અભિવ્યક્ત થાય છે અને રૂંવાટી કાળા-સફેદ મિશ્રણ (રોન) દર્શાવે છે. F₂ પેઢીમાં ફિનોટાઇપિક પ્રમાણ ૧:૨:૧ હોય છે, જેમાં કાળા અને સફેદ રંગના પ્રાણીઓનું પ્રમાણ સમાન હોય છે. વિકલ્પ D ખોટો છે કારણ કે અપૂર્ણ પ્રભુતામાં વિષમયુગ્મી સ્થિતિમાં મધ્યવર્તી રંગ ઉત્પન્ન થાય છે, જ્યારે અહીં બંને એલિલ્સ સ્વતંત્ર રીતે અભિવ્યક્ત થાય છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક સંશોધકને એક નવી જાતિના પક્ષીના પીંછાના રંગ માટે બે એલિલ્સ (A₁ અને A₂) મળ્યા. જ્યારે વિષમયુગ્મી (A₁A₂) પક્ષીઓનું અવલોકન કરવામાં આવ્યું, ત્યારે તેમના પીંછા પર બંને એલિલ્સના લક્ષણો સ્વતંત્ર રીતે દેખાયા. જો કે, આ પક્ષીઓના DNA વિશ્લેષણમાં જાણવા મળ્યું કે A₂ એલિલ એક ઉત્સેચકનું ઉત્પાદન કરે છે જે A₁ એલિલ દ્વારા ઉત્પાદિત રંજકદ્રવ્યને આંશિક રીતે અવરોધે છે. આ પરિસ્થિતિને નીચેનામાંથી કયા આનુવંશિક સિદ્ધાંત હેઠળ વર્ગીકૃત કરી શકાય?", "opts": ["સંપૂર્ણ સહપ્રભાવીપણું, કારણ કે બંને એલિલ્સના લક્ષણો સ્વતંત્ર રીતે દેખાય છે.", "અપૂર્ણ પ્રભુતા, કારણ કે A₂ એલિલ A₁ ના રંજકદ્રવ્યને અવરોધે છે.", "સહપ્રભાવીપણું સાથે આંતરિક જનીનિક આંતરક્રિયા, કારણ કે બંને એલિલ્સ સ્વતંત્ર રીતે અભિવ્યક્ત થાય છે પરંતુ એક એલિલ બીજાના ઉત્પાદનને અસર કરે છે.", "બહુવૈકલ્પિક એલિલ્સ, કારણ કે એક જ લક્ષણ માટે બે કરતાં વધુ એલિલ્સ જવાબદાર છે."], "ans": 2, "exp": "આ ઉદાહરણમાં બંને એલિલ્સ સ્વતંત્ર રીતે અભિવ્યક્ત થાય છે, જે સહપ્રભાવીપણાનું લક્ષણ છે. પરંતુ A₂ એલિલ A₁ દ્વારા ઉત્પાદિત રંજકદ્રવ્યને આંશિક રીતે અવરોધે છે, જે અપૂર્ણ પ્રભુતાના લક્ષણને પણ દર્શાવે છે. આથી આ પરિસ્થિતિને સહપ્રભાવીપણું સાથે આંતરિક જનીનિક આંતરક્રિયા તરીકે વર્ગીકૃત કરી શકાય. વિકલ્પ A અને B અપૂર્ણ છે કારણ કે તેઓ આંતરિક આંતરક્રિયાને ધ્યાનમાં લેતા નથી. વિકલ્પ D ખોટો છે કારણ કે અહીં બહુવૈકલ્પિક એલિલ્સની વાત નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}];

      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
