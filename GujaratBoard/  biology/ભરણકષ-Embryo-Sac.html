<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ભ્રૂણકોષ (Embryo Sac)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ભ્રૂણકોષ (Embryo Sac)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ભ્રૂણકોષ (Embryo Sac)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ભ્રૂણકોષમાં અંડકોષ (egg cell) અને કયા બે સહાયક કોષોની વચ્ચે સ્થિતિ હોય છે?", "opts": ["સિનર્જીડ કોષો અને એન્ટીપોડલ કોષો", "પોલર કોષકેન્દ્રો અને એન્ટીપોડલ કોષો", "સિનર્જીડ કોષો અને પોલર કોષકેન્દ્રો", "એન્ટીપોડલ કોષો અને સેકન્ડરી કોષકેન્દ્ર"], "ans": 0, "exp": "ભ્રૂણકોષમાં અંડકોષ (egg cell) સિનર્જીડ કોષો અને એન્ટીપોડલ કોષોની વચ્ચે સ્થિત હોય છે. સિનર્જીડ કોષો અંડકોષની બાજુમાં અને એન્ટીપોડલ કોષો વિરુદ્ધ બાજુમાં હોય છે. પોલર કોષકેન્દ્રો ભ્રૂણકોષના મધ્ય ભાગમાં સ્થિત હોય છે, જ્યારે સેકન્ડરી કોષકેન્દ્ર ભ્રૂણકોષનો ભાગ નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "ભ્રૂણકોષના વિકાસ દરમિયાન, મેગાસ્પોર મધ્યસ્થી કોષ (megaspore mother cell) વડે કેટલા હેપ્લોઇડ કોષોનું નિર્માણ થાય છે?", "opts": ["2", "4", "8", "1"], "ans": 1, "exp": "મેગાસ્પોર મધ્યસ્થી કોષ (megaspore mother cell) મિયોસિસ દ્વારા વિભાજિત થઈ 4 હેપ્લોઇડ મેગાસ્પોરનું નિર્માણ કરે છે, પરંતુ તે પૈકી માત્ર એક જ મેગાસ્પોર વિકસિત થઈ ભ્રૂણકોષ બનાવે છે. બાકીના ત્રણ મેગાસ્પોર નષ્ટ થઈ જાય છે. આથી, 4 હેપ્લોઇડ કોષોનું નિર્માણ થાય છે, પરંતુ માત્ર એક જ વિકસિત થાય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "ભ્રૂણકોષમાં સિનર્જીડ કોષોની ભૂમિકા શું છે?", "opts": ["અંડકોષને પોષણ પૂરું પાડવું", "પરાગનલિકાને આકર્ષવી અને તેના વિકાસમાં મદદ કરવી", "એન્ટીપોડલ કોષોને નિયંત્રિત કરવા", "ભ્રૂણકોષની રચનામાં સહાય કરવી"], "ans": 1, "exp": "સિનર્જીડ કોષો પરાગનલિકાને આકર્ષવી અને તેના વિકાસમાં મદદ કરે છે. તેઓ પરાગનલિકાના વિકાસ માટે જરૂરી પોષક તત્વો અને સંકેતો પૂરા પાડે છે. અંડકોષને પોષણ પૂરું પાડવું એ પોલર કોષકેન્દ્રોની ભૂમિકા છે, જ્યારે એન્ટીપોડલ કોષો ભ્રૂણકોષના વિકાસમાં સહાય કરે છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "ભ્રૂણકોષમાં એન્ટીપોડલ કોષોની સંખ્યા કેટલી હોય છે?", "opts": ["1", "2", "3", "4"], "ans": 2, "exp": "ભ્રૂણકોષમાં એન્ટીપોડલ કોષોની સંખ્યા 3 હોય છે. આ કોષો અંડકોષની વિરુદ્ધ બાજુમાં સ્થિત હોય છે અને ભ્રૂણકોષના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે. સિનર્જીડ કોષોની સંખ્યા 2 હોય છે, જ્યારે પોલર કોષકેન્દ્રોની સંખ્યા 2 હોય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "ભ્રૂણકોષના વિકાસ દરમિયાન, કયા કોષોનું નિર્માણ થતું નથી?", "opts": ["સિનર્જીડ કોષો", "એન્ટીપોડલ કોષો", "પોલર કોષકેન્દ્રો", "પ્રાથમિક એન્ડોસ્પર્મ કોષકેન્દ્ર"], "ans": 3, "exp": "ભ્રૂણકોષના વિકાસ દરમિયાન, પ્રાથમિક એન્ડોસ્પર્મ કોષકેન્દ્રનું નિર્માણ થતું નથી. પ્રાથમિક એન્ડોસ્પર્મ કોષકેન્દ્ર દ્વિગુણિત થઈ સેકન્ડરી એન્ડોસ્પર્મ કોષકેન્દ્ર બનાવે છે, જે પછી ત્રિપ્લોઇડ એન્ડોસ્પર્મ બનાવે છે. સિનર્જીડ કોષો, એન્ટીપોડલ કોષો અને પોલર કોષકેન્દ્રો ભ્રૂણકોષના અભિન્ન ભાગ છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "ભ્રૂણકોષના વિકાસ દરમિયાન, મેગાગેમીટોફાઇટ (megagametophyte)માં કયા કોષોનું કોષકેન્દ્ર વહેંચાયેલું (binucleate) હોય છે?", "opts": ["એન્ટીપોડલ કોષો", "સિનર્જીડ કોષો", "મધ્યસ્થી કોષ (central cell)", "અંડકોષ (egg cell)"], "ans": 2, "exp": "ભ્રૂણકોષના વિકાસ દરમિયાન, મધ્યસ્થી કોષ (central cell)નું કોષકેન્દ્ર વહેંચાયેલું (binucleate) હોય છે, જે બે પોલર ન્યુક્લિયી ધરાવે છે. એન્ટીપોડલ કોષો અને સિનર્જીડ કોષો એકકેદ્રી (uninucleate) હોય છે, જ્યારે અંડકોષ પણ એકકેદ્રી હોય છે. મધ્યસ્થી કોષનું બિન્યુક્લિયેટ સ્વરૂપ ભ્રૂણકોષના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "ભ્રૂણકોષમાં, નિષેચન (fertilization) પછી મધ્યસ્થી કોષ (central cell)નું કયા પદાર્થમાં રૂપાંતર થાય છે?", "opts": ["ભ્રૂણ (embryo)", "એન્ડોસ્પર્મ (endosperm)", "સીડ કોટ (seed coat)", "ફળભિત્તિ (pericarp)"], "ans": 1, "exp": "નિષેચન પછી, મધ્યસ્થી કોષ (central cell) એન્ડોસ્પર્મ (endosperm)માં રૂપાંતર પામે છે, જે ભ્રૂણને પોષણ પૂરું પાડે છે. ભ્રૂણ અંડકોષ અને શુક્રકોષના સંયોગથી બને છે, જ્યારે સીડ કોટ અને ફળભિત્તિ અન્ય પેશીઓમાંથી વિકસે છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "ભ્રૂણકોષના વિકાસ દરમિયાન, કયા કોષોનું કોષકેન્દ્ર નાશ પામે છે અથવા અદૃશ્ય થાય છે?", "opts": ["સિનર્જીડ કોષો", "એન્ટીપોડલ કોષો", "અંડકોષ (egg cell)", "મધ્યસ્થી કોષ (central cell)"], "ans": 1, "exp": "ભ્રૂણકોષના વિકાસ દરમિયાન, એન્ટીપોડલ કોષોનું કોષકેન્દ્ર નાશ પામે છે અથવા અદૃશ્ય થાય છે. સિનર્જીડ કોષો, અંડકોષ, અને મધ્યસ્થી કોષ તેમના કોષકેન્દ્રોને જાળવી રાખે છે, જે ભ્રૂણકોષના કાર્યમાં મહત્વની ભૂમિકા ભજવે છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "ભ્રૂણકોષમાં, કયા કોષો નિષેચન (fertilization) દરમિયાન શુક્રકોષને આકર્ષિત કરવામાં મદદ કરે છે?", "opts": ["એન્ટીપોડલ કોષો", "સિનર્જીડ કોષો", "મધ્યસ્થી કોષ (central cell)", "અંડકોષ (egg cell)"], "ans": 1, "exp": "સિનર્જીડ કોષો નિષેચન દરમિયાન શુક્રકોષને આકર્ષિત કરવામાં મદદ કરે છે. તેઓ અંડકોષ તરફ શુક્રકોષને માર્ગદર્શન આપે છે. એન્ટીપોડલ કોષો અને મધ્યસ્થી કોષની આમાં કોઈ ભૂમિકા નથી, જ્યારે અંડકોષ શુક્રકોષ સાથે સંયોગ પામે છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "એક વિશિષ્ટ આવૃત બીજધારી વનસ્પતિમાં ભ્રૂણકોષ (embryo sac)ના વિકાસ દરમિયાન નીચેના પૈકી કયું અપવાદરૂપ લક્ષણ જોવા મળે છે? (નોંધ: આ વનસ્પતિમાં સામાન્ય 8-કોષીય ભ્રૂણકોષ નિર્માણ પામતો નથી.)", "opts": ["મેગાસ્પોર મધ્યસ્થી કોષ (megaspore mother cell)માંથી માત્ર એક જ હેપ્લોઇડ મેગાસ્પોર નિર્માણ પામે છે, જે ત્રણ વખત વિભાજન પામીને 7-કોષીય ભ્રૂણકોષ બનાવે છે.", "ભ્રૂણકોષમાં માત્ર એક જ સિનર્જીડ કોષ (synergid cell) નિર્માણ પામે છે અને બાકીના બધા કોષો દ્વિકોષકેન્દ્રીય (binucleate) હોય છે.", "મધ્યસ્થી કોષ (central cell)માં માત્ર એક જ ધ્રુવીય કોષકેન્દ્ર (polar nucleus) હોય છે અને બીજું કોષકેન્દ્ર નિર્માણ પામતું નથી, જેના કારણે ત્રિકોષકેન્દ્રીય અંત:સ્પર્મ (triploid endosperm) બનતો નથી.", "ભ્રૂણકોષમાં એન્ટીપોડલ કોષો (antipodal cells) સંપૂર્ણપણે ગેરહાજર હોય છે અને તેમના સ્થાને વધારાના અંડકોષો (egg cells) નિર્માણ પામે છે."], "ans": 2, "exp": "સાચો વિકલ્પ C છે. સામાન્ય રીતે આવૃત બીજધારી વનસ્પતિઓમાં ભ્રૂણકોષનો વિકાસ 8-કોષીય અને 7-કોષકેન્દ્રીય હોય છે, જેમાં મધ્યસ્થી કોષમાં બે ધ્રુવીય કોષકેન્દ્રો હોય છે. પરંતુ અમુક અપવાદરૂપ વનસ્પતિઓ જેમ કે *પેન્થીરમ*માં મધ્યસ્થી કોષમાં માત્ર એક જ ધ્રુવીય કોષકેન્દ્ર હોય છે, જેના કારણે નિષેચન બાદ ત્રિકોષકેન્દ્રીય અંત:સ્પર્મ બનતો નથી. આ એક અપવાદરૂપ લક્ષણ છે.\n\nA વિકલ્પ ખોટો છે કારણ કે સામાન્ય રીતે એક મેગાસ્પોર ત્રણ વખત વિભાજન પામીને 8-કોષકેન્દ્રીય ભ્રૂણકોષ બનાવે છે, 7-કોષીય નહીં.\nB વિકલ્પ ખોટો છે કારણ કે સિનર્જીડ કોષો હંમેશા બે હોય છે અને બધા કોષો દ્વિકોષકેન્દ્રીય હોતા નથી.\nD વિકલ્પ ખોટો છે કારણ કે એન્ટીપોડલ કોષો ગેરહાજર હોઈ શકે પરંતુ તેમના સ્થાને વધારાના અંડકોષો નિર્માણ પામતા નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "ભ્રૂણકોષના વિકાસ દરમિયાન, મેગાસ્પોર મધ્યસ્થી કોષ (MMC)ના પ્રથમ અરીસી વિભાજન પછી કયા કોષમાં સૌથી વધુ સાયટોપ્લાઝમ જોવા મળે છે?", "opts": ["ફ્યુનિક્યુલસ કોષ", "મેગાસ્પોર કોષ જે અંડકોષ તરફ વિકસે છે", "મેગાસ્પોર કોષ જે એન્ટીપોડલ કોષો તરફ વિકસે છે", "મેગાસ્પોર કોષ જે સિનર્જીડ કોષો તરફ વિકસે છે"], "ans": 1, "exp": "મેગાસ્પોર મધ્યસ્થી કોષ (MMC)ના પ્રથમ અરીસી વિભાજન પછી, અંડકોષ તરફ વિકસતા મેગાસ્પોર કોષમાં સૌથી વધુ સાયટોપ્લાઝમ જોવા મળે છે, કારણ કે આ કોષ ભવિષ્યમાં અંડકોષ અને સહાયક કોષોનું નિર્માણ કરે છે, જેમાં ઉર્જા અને પોષક તત્વોની વધુ જરૂરિયાત હોય છે. ફ્યુનિક્યુલસ કોષ (A) ભ્રૂણકોષનો ભાગ નથી. એન્ટીપોડલ કોષો (C) અને સિનર્જીડ કોષો (D) તરફ વિકસતા મેગાસ્પોર કોષોમાં સાયટોપ્લાઝમની માત્રા ઓછી હોય છે.", "ref": "Std 12 - અધ્યાય 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "ભ્રૂણકોષમાં, નિષેચન પછી એન્ટીપોડલ કોષોનું કયું કાર્ય સૌથી મહત્વપૂર્ણ ગણવામાં આવે છે?", "opts": ["ભ્રૂણપોષણ (endosperm)ના વિકાસમાં મદદ કરવી", "અંડકોષના સંરક્ષણ માટે પોષક તત્વો પૂરા પાડવા", "નિષેચન દરમિયાન શુક્રકોષને આકર્ષિત કરવા", "ભ્રૂણકોષના વિકાસ દરમિયાન ઉત્સેચકોનું સ્રાવ કરવું"], "ans": 0, "exp": "એન્ટીપોડલ કોષો નિષેચન પછી ભ્રૂણપોષણ (endosperm)ના વિકાસમાં મદદ કરે છે. આ કોષો ભ્રૂણકોષના વિકાસ દરમિયાન પોષક તત્વો અને હોર્મોનનું સ્રાવ કરે છે, જે ભ્રૂણપોષણના વિકાસ માટે જરૂરી હોય છે. અંડકોષના સંરક્ષણ માટે પોષક તત્વો પૂરા પાડવું (B) સિનર્જીડ કોષોનું કાર્ય છે. શુક્રકોષને આકર્ષિત કરવું (C) સિનર્જીડ કોષોનું જ કાર્ય છે. ઉત્સેચકોનું સ્રાવ કરવું (D) એન્ટીપોડલ કોષોનું મુખ્ય કાર્ય નથી.", "ref": "Std 12 - અધ્યાય 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "ભ્રૂણકોષના વિકાસ દરમિયાન, કયા કોષોનું કોષકેન્દ્ર વહેંચાયેલું (binucleate) હોય છે અને પછી ત્રિપ્લોઇડ (3n) બને છે?", "opts": ["અંડકોષ અને સિનર્જીડ કોષો", "મધ્યસ્થી કોષ (central cell)", "એન્ટીપોડલ કોષો", "ફ્યુનિક્યુલસ કોષ"], "ans": 1, "exp": "ભ્રૂણકોષના વિકાસ દરમિયાન, મધ્યસ્થી કોષ (central cell)નું કોષકેન્દ્ર વહેંચાયેલું (binucleate) હોય છે. નિષેચન પછી, આ કોષમાં શુક્રકોષનું કોષકેન્દ્ર પ્રવેશ કરે છે, જેથી તે ત્રિપ્લોઇડ (3n) બને છે અને ભ્રૂણપોષણ (endosperm)ના વિકાસમાં મદદ કરે છે. અંડકોષ અને સિનર્જીડ કોષો (A) હેપ્લોઇડ (n) હોય છે. એન્ટીપોડલ કોષો (C) અને ફ્યુનિક્યુલસ કોષ (D) પણ હેપ્લોઇડ (n) હોય છે.", "ref": "Std 12 - અધ્યાય 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "ભ્રૂણકોષમાં, નિષેચન દરમિયાન શુક્રકોષ કયા કોષો વચ્ચે પ્રવેશ કરે છે?", "opts": ["સિનર્જીડ કોષો અને અંડકોષ", "એન્ટીપોડલ કોષો અને મધ્યસ્થી કોષ", "ફ્યુનિક્યુલસ અને અંડકોષ", "સિનર્જીડ કોષો અને મધ્યસ્થી કોષ"], "ans": 0, "exp": "નિષેચન દરમિયાન, શુક્રકોષ સિનર્જીડ કોષો અને અંડકોષ વચ્ચે પ્રવેશ કરે છે. સિનર્જીડ કોષો શુક્રકોષને આકર્ષિત કરવામાં મદદ કરે છે, અને અંડકોષ સાથે નિષેચન થાય છે. એન્ટીપોડલ કોષો અને મધ્યસ્થી કોષ (B) વચ્ચે શુક્રકોષ પ્રવેશતો નથી. ફ્યુનિક્યુલસ અને અંડકોષ (C) વચ્ચે શુક્રકોષ પ્રવેશતો નથી. સિનર્જીડ કોષો અને મધ્યસ્થી કોષ (D) વચ્ચે પણ શુક્રકોષ પ્રવેશતો નથી.", "ref": "Std 12 - અધ્યાય 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "ભ્રૂણકોષના વિકાસ દરમિયાન, મેગાસ્પોર મધ્યસ્થી કોષ (MMC)ના વિભાજન પછી બનતા ચાર મેગાસ્પોરમાંથી સામાન્ય રીતે કયો મેગાસ્પોર અસ્તિત્વમાં રહે છે અને ભ્રૂણકોષનું નિર્માણ કરે છે?", "opts": ["મધ્યમાં આવેલો મેગાસ્પોર", "અંડાશય તરફનો મેગાસ્પોર", "બીજાંડ તરફનો મેગાસ્પોર", "સૌથી મોટો મેગાસ્પોર"], "ans": 2, "exp": "ભ્રૂણકોષના વિકાસ દરમિયાન, મેગાસ્પોર મધ્યસ્થી કોષ (MMC)ના અરીસી વિભાજન પછી ચાર હેપ્લોઇડ મેગાસ્પોર બને છે, પરંતુ સામાન્ય રીતે બીજાંડ (micropyle) તરફનો મેગાસ્પોર જ અસ્તિત્વમાં રહે છે અને ભ્રૂણકોષનું નિર્માણ કરે છે. આ મેગાસ્પોર ત્રણ વખત મિટોટિક વિભાજન પામીને ૮ કોષો ધરાવતા ભ્રૂણકોષનું નિર્માણ કરે છે. અહીં, બીજાંડ તરફનો મેગાસ્પોર (C) સાચો છે. અ) મધ્યમાં આવેલો મેગાસ્પોર, બ) અંડાશય તરફનો મેગાસ્પોર, અને ડ) સૌથી મોટો મેગાસ્પોર એ તમામ અસત્ય છે કારણ કે તે મેગાસ્પોર સામાન્ય રીતે નાશ પામે છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "ભ્રૂણકોષમાં, નિષેચન પછી એન્ટીપોડલ કોષોનું કયું કાર્ય સૌથી અસરકારક રીતે થાય છે?", "opts": ["તેઓ ભ્રૂણકોષના વિકાસ દરમિયાન પોષણ પૂરું પાડે છે.", "તેઓ નિષેચન દરમિયાન શુક્રકોષને આકર્ષિત કરવામાં મદદ કરે છે.", "તેઓ નિષેચન પછી નાશ પામે છે, કારણ કે તેમની ભૂમિકા પૂર્ણ થઈ ગઈ હોય છે.", "તેઓ ભ્રૂણકોષના વિકાસ દરમિયાન હોર્મોન ઉત્પન્ન કરે છે."], "ans": 2, "exp": "એન્ટીપોડલ કોષો નિષેચન પછી નાશ પામે છે, કારણ કે તેમની ભૂમિકા (જેમ કે પોષણ પૂરું પાડવું અથવા શુક્રકોષને આકર્ષિત કરવું) નિષેચન દરમિયાન પૂર્ણ થઈ ગઈ હોય છે. વિકલ્પ A અને B એ નિષેચન પહેલાંની ભૂમિકા છે, જ્યારે વિકલ્પ D એ અસત્ય છે કારણ કે એન્ટીપોડલ કોષો હોર્મોન ઉત્પન્ન કરતા નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "એક વિશિષ્ટ આવૃત બીજધારી વનસ્પતિમાં ભ્રૂણકોષના વિકાસ દરમિયાન, મેગાસ્પોર મધ્યસ્થી કોષ (MMC)ના વિભાજનથી ઉત્પન્ન થતા ચાર મેગાસ્પોરમાંથી માત્ર એક જ કાર્યરત રહે છે, જ્યારે બાકીના ત્રણ નાશ પામે છે. આ પ્રક્રિયાને શું કહે છે?", "opts": ["મોનોસ્પોરીક વિકાસ (Monosporic development)", "બાઇસ્પોરીક વિકાસ (Bisporic development)", "ટેટ્રાસ્પોરીક વિકાસ (Tetrasporic development)", "પોલિસ્પોરીક વિકાસ (Polysporic development)"], "ans": 0, "exp": "મોનોસ્પોરીક વિકાસમાં માત્ર એક મેગાસ્પોર કાર્યરત રહે છે અને બાકીના ત્રણ નાશ પામે છે, જે મોટાભાગની આવૃત બીજધારી વનસ્પતિઓમાં જોવા મળે છે. બાઇસ્પોરીક વિકાસમાં બે મેગાસ્પોર કાર્યરત રહે છે, ટેટ્રાસ્પોરીક વિકાસમાં ચારેય મેગાસ્પોર કાર્યરત રહે છે, જ્યારે પોલિસ્પોરીક વિકાસ એવો શબ્દ નથી જે ભ્રૂણકોષના વિકાસ માટે વપરાય છે.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "ભ્રૂણકોષના વિકાસ દરમિયાન, મધ્યસ્થી કોષ (central cell)માં બે ધ્રુવીય કોષકેન્દ્રો (polar nuclei)નું સંયોજન થઈને એક દ્વિકોષકેન્દ્રીય કોષ (secondary nucleus) બને છે. આ પ્રક્રિયા કયા તબક્કે થાય છે?", "opts": ["મેગાસ્પોર મધ્યસ્થી કોષ (MMC)ના વિભાજન પહેલાં", "મેગાગેમીટોફાઇટના વિકાસ દરમિયાન, પરંતુ નિષેચન પહેલાં", "નિષેચન પછી તરત જ", "ભ્રૂણના વિકાસ દરમિયાન"], "ans": 1, "exp": "મધ્યસ્થી કોષમાં બે ધ્રુવીય કોષકેન્દ્રોનું સંયોજન મેગાગેમીટોફાઇટના વિકાસ દરમિયાન થાય છે, પરંતુ નિષેચન પહેલાં. નિષેચન પછી આ દ્વિકોષકેન્દ્રીય કોષ શુક્રકોષ સાથે જોડાઈને ત્રિકોષકેન્દ્રીય પ્રાથમિક ભ્રૂણપોષ કોષ (primary endosperm nucleus) બનાવે છે. MMCના વિભાજન પહેલાં આ પ્રક્રિયા થતી નથી, અને ભ્રૂણના વિકાસ દરમિયાન પણ નહીં.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન ભ્રૂણકોષના વિકાસ માટે ખોટું છે? (અપવાદરૂપ કિસ્સા ધ્યાનમાં લો)", "opts": ["મોટાભાગની આવૃત બીજધારી વનસ્પતિઓમાં ભ્રૂણકોષનો વિકાસ મોનોસ્પોરીક હોય છે.", "કેટલીક વનસ્પતિઓમાં ભ્રૂણકોષનો વિકાસ બાઇસ્પોરીક અથવા ટેટ્રાસ્પોરીક હોઈ શકે છે.", "ભ્રૂણકોષમાં હંમેશા સાત કોષો અને આઠ કોષકેન્દ્રો હોય છે.", "કેટલીક વનસ્પતિઓમાં ભ્રૂણકોષમાં એન્ટીપોડલ કોષોની સંખ્યા ત્રણ કરતાં વધુ હોઈ શકે છે."], "ans": 2, "exp": "મોટાભાગની આવૃત બીજધારી વનસ્પતિઓમાં ભ્રૂણકોષ સાત કોષો અને આઠ કોષકેન્દ્રો ધરાવે છે, પરંતુ આ હંમેશા સાચું નથી. કેટલીક વનસ્પતિઓમાં એન્ટીપોડલ કોષોની સંખ્યા વધુ હોઈ શકે છે અથવા ભ્રૂણકોષનો વિકાસ અલગ રીતે થઈ શકે છે. મોનોસ્પોરીક, બાઇસ્પોરીક અને ટેટ્રાસ્પોરીક વિકાસના કિસ્સા સાચા છે.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "એક વિશિષ્ટ આવૃત બીજધારી વનસ્પતિના ભ્રૂણકોષ (embryo sac)માં નીચેના પૈકી કયું લક્ષણ અપવાદરૂપ ગણી શકાય, જે સામાન્ય રીતે મોટાભાગની આવૃત બીજધારી વનસ્પતિઓમાં જોવા મળતું નથી?", "opts": ["ભ્રૂણકોષમાં અંડકોષ (egg cell)ની સાથે બે સહાયક કોષો (synergids) અને ત્રણ એન્ટીપોડલ કોષો (antipodal cells) હાજર હોય છે.", "ભ્રૂણકોષના વિકાસ દરમિયાન, મધ્યસ્થી કોષ (central cell)માં બે ધ્રુવીય કોષકેન્દ્રો (polar nuclei)નું સંમિલન થઈને દ્વિકોષકેન્દ્રીય (secondary nucleus) બને છે.", "ભ્રૂણકોષમાં માત્ર એક જ અંડકોષ (egg cell) હાજર હોય છે, પરંતુ કેટલીક વનસ્પતિઓમાં બે અંડકોષો (egg cells) જોવા મળે છે જે નિષેચન પામી શકે છે.", "ભ્રૂણકોષના વિકાસ દરમિયાન, મેગાસ્પોર મધ્યસ્થી કોષ (megaspore mother cell)ના અર્ધીકરણ વિભાજન (meiosis) બાદ ચાર હેપ્લોઇડ મેગાસ્પોર બને છે, જેમાંથી માત્ર એક જ સક્રિય રહે છે."], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. સામાન્ય રીતે ભ્રૂણકોષમાં માત્ર એક જ અંડકોષ (egg cell) હાજર હોય છે, જે નિષેચન પામીને ભ્રૂણનું નિર્માણ કરે છે. પરંતુ અપવાદરૂપ કિસ્સામાં, કેટલીક વનસ્પતિઓ જેમ કે *Plumbago* અને *Fritillaria*માં બે અંડકોષો જોવા મળે છે, જે નિષેચન પામી શકે છે. આ લક્ષણ અપવાદરૂપ ગણાય છે કારણ કે મોટાભાગની આવૃત બીજધારી વનસ્પતિઓમાં માત્ર એક જ અંડકોષ હોય છે.\n\nવિકલ્પ A ખોટો છે કારણ કે ભ્રૂણકોષમાં અંડકોષની સાથે બે સહાયક કોષો અને ત્રણ એન્ટીપોડલ કોષો હાજર હોય છે, જે સામાન્ય લક્ષણ છે.\n\nવિકલ્પ B ખોટો છે કારણ કે મધ્યસ્થી કોષમાં બે ધ્રુવીય કોષકેન્દ્રોનું સંમિલન થઈને દ્વિકોષકેન્દ્રીય બને છે, જે સામાન્ય પ્રક્રિયા છે.\n\nવિકલ્પ D ખોટો છે કારણ કે મેગાસ્પોર મધ્યસ્થી કોષના અર્ધીકરણ વિભાજન બાદ ચાર હેપ્લોઇડ મેગાસ્પોર બને છે, જેમાંથી માત્ર એક જ સક્રિય રહે છે, જે સામાન્ય પ્રક્રિયા છે.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
