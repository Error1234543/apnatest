<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>રોગકારક સૂક્ષ્મજીવો</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>રોગકારક સૂક્ષ્મજીવો</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">રોગકારક સૂક્ષ્મજીવો</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક વિદ્યાર્થીએ નોંધ્યું કે કેટલાક સૂક્ષ્મજીવો માનવ શરીરમાં પ્રવેશ્યા બાદ તરત જ રોગના લક્ષણો ઉત્પન્ન કરતા નથી, પરંતુ લાંબા સમય સુધી નિષ્ક્રિય રહે છે. આ પ્રકારના સૂક્ષ્મજીવોને કયા વર્ગમાં મૂકી શકાય?", "opts": ["પ્રાયોન (Prion) કારકો", "સુપ્તાવસ્થા દર્શાવતા વાઇરસ", "ફેકલ્ટેટિવ અજારક બેક્ટેરિયા", "ઑબ્લિગેટ પરોપજીવી પ્રજીવ"], "ans": 1, "exp": "સુપ્તાવસ્થા દર્શાવતા વાઇરસ (જેમ કે હર્પિસ વાઇરસ) શરીરમાં પ્રવેશ્યા બાદ તરત રોગ ઉત્પન્ન કરતા નથી, પરંતુ ચોક્કસ પરિસ્થિતિમાં સક્રિય થાય છે. પ્રાયોન પ્રોટીન છે, બેક્ટેરિયા અને પ્રજીવ તરત રોગ ઉત્પન્ન કરે છે અથવા સુપ્તતા દર્શાવતા નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એક રોગકારક બેક્ટેરિયા જે માનવ આંતરડામાં રહીને વિટામિન Kનું સંશ્લેષણ કરે છે, પરંતુ અમુક પરિસ્થિતિમાં રોગકારક બની શકે છે. આ બેક્ટેરિયાનું નામ અને તેની લાક્ષણિકતા કઈ છે?", "opts": ["*Escherichia coli* - ફેકલ્ટેટિવ અજારક", "*Salmonella typhi* - ઑબ્લિગેટ અજારક", "*Clostridium tetani* - ઑબ્લિગેટ અજારક", "*Mycobacterium tuberculosis* - ફેકલ્ટેટિવ અજારક"], "ans": 0, "exp": "*Escherichia coli* માનવ આંતરડામાં વિટામિન Kનું સંશ્લેષણ કરે છે અને સામાન્ય રીતે હાનિકારક નથી, પરંતુ અમુક પરિસ્થિતિમાં રોગકારક બની શકે છે. તે ફેકલ્ટેટિવ અજારક છે. અન્ય વિકલ્પો ખોટા છે કારણ કે *Salmonella* અને *Clostridium* હંમેશા રોગકારક છે, જ્યારે *Mycobacterium* ફેકલ્ટેટિવ નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેના પૈકી કયો સૂક્ષ્મજીવ પ્રતિરક્ષાતંત્રને છેતરીને લાંબા સમય સુધી શરીરમાં જીવિત રહી શકે છે અને તેની સપાટી પરના પ્રોટીનમાં સતત ફેરફાર કરે છે?", "opts": ["*Plasmodium falciparum* (મલેરિયા પરોપજીવી)", "*HIV* (એઇડ્સ વાઇરસ)", "*Trypanosoma brucei* (નિદ્રારોગ પરોપજીવી)", "*Candida albicans* (ફૂગ)"], "ans": 2, "exp": "*Trypanosoma brucei* તેની સપાટી પરના વેરિયન્ટ સરફેસ ગ્લાયકોપ્રોટીન (VSG)માં સતત ફેરફાર કરીને પ્રતિરક્ષાતંત્રને છેતરે છે. *Plasmodium* પણ પ્રતિરક્ષા છેતરે છે, પરંતુ VSG ફેરફાર *Trypanosoma*ની વિશિષ્ટતા છે. *HIV* પ્રતિરક્ષા કોષોને નષ્ટ કરે છે, જ્યારે *Candida* ફૂગ છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એક રોગકારક સૂક્ષ્મજીવ જેનો આનુવંશિક દ્રવ્ય DNA અને RNA બંને નથી, પરંતુ પ્રોટીનથી બનેલો છે. આ સૂક્ષ્મજીવ કયા રોગ માટે જવાબદાર છે?", "opts": ["ક્રૂટ્ઝફેલ્ડ-જેકોબ રોગ (CJD)", "ડેન્ગ્યુ તાવ", "ક્ષય રોગ", "કોલેરા"], "ans": 0, "exp": "પ્રાયોન માત્ર પ્રોટીનથી બનેલા હોય છે અને ક્રૂટ્ઝફેલ્ડ-જેકોબ રોગ (CJD) માટે જવાબદાર છે. ડેન્ગ્યુ વાઇરસ (RNA), ક્ષય બેક્ટેરિયા (DNA), અને કોલેરા બેક્ટેરિયા (DNA) છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એક રોગકારક ફૂગ જે માનવ ત્વચા પર ચેપ લગાડે છે અને કેરાટિન પ્રોટીનનું પાચન કરે છે. આ ફૂગ કયા રોગ માટે જવાબદાર છે અને તેની લાક્ષણિકતા શું છે?", "opts": ["*Trichophyton* - દાદર (Ringworm), કેરાટિનોલિટિક ઉત્સેચકો ધરાવે છે", "*Aspergillus* - ફેફસાંનો ચેપ, સેલ્યુલેઝ ઉત્સેચકો ધરાવે છે", "*Candida* - મુખનો ચેપ, લિપેઝ ઉત્સેચકો ધરાવે છે", "*Cryptococcus* - મગજનો ચેપ, પ્રોટીએઝ ઉત્સેચકો ધરાવે છે"], "ans": 0, "exp": "*Trichophyton* ફૂગ દાદર (Ringworm) માટે જવાબદાર છે અને કેરાટિનોલિટિક ઉત્સેચકો ધરાવે છે જે કેરાટિન પ્રોટીનનું પાચન કરે છે. *Aspergillus* ફેફસાંનો ચેપ લગાડે છે પરંતુ સેલ્યુલેઝ ઉત્સેચકો ધરાવતું નથી. *Candida* અને *Cryptococcus* અન્ય ઉત્સેચકો ધરાવે છે.", "ref": "Std 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ", "ch": ""}, {"q": "નીચેના પૈકી કયો રોગકારક સૂક્ષ્મજીવ પ્રતિકૂળ પરિસ્થિતિમાં સ્પોર (endospore) બનાવીને પોતાનું અસ્તિત્વ ટકાવી રાખે છે, પરંતુ આ સ્પોર પ્રજનન માટે નથી?", "opts": ["ક્લોસ્ટ્રિડિયમ ટિટેની (Clostridium tetani)", "એસ્પરજિલસ ફ્યુમિગેટસ (Aspergillus fumigatus)", "પ્લાઝ્મોડિયમ વાઇવેક્સ (Plasmodium vivax)", "ટ્રેપોનેમા પેલિડમ (Treponema pallidum)"], "ans": 0, "exp": "ક્લોસ્ટ્રિડિયમ ટિટેની બેક્ટેરિયા પ્રતિકૂળ પરિસ્થિતિમાં એન્ડોસ્પોર બનાવે છે, જે માત્ર અસ્તિત્વ ટકાવવા માટે હોય છે, પ્રજનન માટે નહીં. એસ્પરજિલસ ફૂગમાં સ્પોર પ્રજનન માટે હોય છે. પ્લાઝ્મોડિયમ પ્રજનન માટે વિવિધ તબક્કાઓ ધરાવે છે, પરંતુ એન્ડોસ્પોર બનાવતું નથી. ટ્રેપોનેમા પેલિડમ સ્પોર બનાવતું નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એક રોગકારક સૂક્ષ્મજીવ જે માનવ શરીરમાં પ્રવેશ્યા બાદ તેના કોષકેન્દ્રમાં રહીને પોતાનું પ્રજનન કરે છે, પરંતુ તે વાઇરસ નથી. આ સૂક્ષ્મજીવ કયો હોઈ શકે?", "opts": ["માયકોબેક્ટેરિયમ ટ્યુબરક્યુલોસિસ (Mycobacterium tuberculosis)", "પ્લાઝ્મોડિયમ ફાલ્સીપેરમ (Plasmodium falciparum)", "એન્ટામીબા હિસ્ટોલિટિકા (Entamoeba histolytica)", "રિકેટ્સિયા પ્રોવાઝેકી (Rickettsia prowazekii)"], "ans": 1, "exp": "પ્લાઝ્મોડિયમ ફાલ્સીપેરમ પ્રજીવ છે જે માનવ યકૃત અને લાલ રક્તકણોમાં પ્રવેશીને તેના કોષકેન્દ્રમાં પ્રજનન કરે છે. માયકોબેક્ટેરિયમ અને રિકેટ્સિયા પ્રોકેરિયોટિક કોષો છે, જેમાં કોષકેન્દ્ર હોતું નથી. એન્ટામીબા હિસ્ટોલિટિકા પણ યુકેરિયોટિક છે, પરંતુ તે કોષકેન્દ્રમાં પ્રજનન કરતું નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેના પૈકી કયો રોગકારક સૂક્ષ્મજીવ એવો છે જે માનવ શરીરમાં પ્રવેશ્યા બાદ તેના DNAને માનવ કોષના DNAમાં સંકલિત કરી દે છે, પરંતુ તે વાઇરસ નથી?", "opts": ["હેલિકોબેક્ટર પાયલોરી (Helicobacter pylori)", "એગ્રોબેક્ટેરિયમ ટ્યુમેફેસિયન્સ (Agrobacterium tumefaciens)", "સ્ટ્રેપ્ટોકોકસ ન્યુમોનિયા (Streptococcus pneumoniae)", "ઉપરોક્તમાંથી એક પણ નહીં"], "ans": 3, "exp": "માનવ કોષના DNAમાં DNA સંકલિત કરવાની ક્ષમતા માત્ર વાઇરસમાં જોવા મળે છે. બેક્ટેરિયા જેવા કે એગ્રોબેક્ટેરિયમ ટ્યુમેફેસિયન્સ વનસ્પતિ કોષોમાં DNA સંકલિત કરે છે, પરંતુ માનવ કોષોમાં નહીં. બાકીના વિકલ્પો માનવ કોષોમાં DNA સંકલિત કરતા નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો, Std 11 - પ્રકરણ 6: કોષ: જીવનનો એકમ", "ch": ""}, {"q": "એક રોગકારક સૂક્ષ્મજીવ જે માનવ શરીરમાં પ્રવેશીને પ્રતિરક્ષાતંત્રની પ્રાથમિક પ્રતિક્રિયા (primary immune response)ને ટાળવા માટે પોતાના સપાટી પરના પ્રોટીનમાં નિયમિત ફેરફાર કરે છે, તે નીચેના પૈકી કયા વર્ગનો છે અને આ પ્રક્રિયાને શું કહે છે?", "opts": ["વાઇરસ – એન્ટિજેનિક ડ્રિફ્ટ (Antigenic drift)", "બેક્ટેરિયા – ફેઝ વેરિયેશન (Phase variation)", "પ્રોટોઝોઆ – એન્ટિજેનિક વેરિયેશન (Antigenic variation)", "ફૂગ – ગ્લાયકોપ્રોટીન મોડ્યુલેશન (Glycoprotein modulation)"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. *ટ્રાયપેનોસોમા* જેવા પ્રોટોઝોઆ રોગકારકો તેમના સપાટી પરના વેરિયન્ટ સરફેસ ગ્લાયકોપ્રોટીન (VSG)માં નિયમિત ફેરફાર કરીને પ્રતિરક્ષાતંત્રને છેતરે છે, જેને *એન્ટિજેનિક વેરિયેશન* કહે છે. વિકલ્પ A ખોટો છે કારણ કે વાઇરસમાં એન્ટિજેનિક ડ્રિફ્ટ મ્યુટેશનને કારણે થાય છે, નહીં કે સક્રિય પ્રોટીન ફેરફારથી. વિકલ્પ B ખોટો છે કારણ કે બેક્ટેરિયામાં ફેઝ વેરિયેશન જનીન અભિવ્યક્તિના ચાલુ-બંધ થવાથી થાય છે, પરંતુ તે એટલી ઝડપી અને વ્યવસ્થિત નથી જેટલી પ્રોટોઝોઆમાં જોવા મળે છે. વિકલ્પ D ખોટો છે કારણ કે ફૂગમાં આવી સક્રિય પ્રોટીન ફેરફાર પ્રક્રિયા જોવા મળતી નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એક રોગકારક સૂક્ષ્મજીવ જે માનવ શરીરમાં પ્રવેશીને યજમાન કોષના રાઇબોઝોમ સાથે જોડાઈને યજમાનના પ્રોટીન સંશ્લેષણને અવરોધે છે, પરંતુ પોતાનું પ્રોટીન સંશ્લેષણ ચાલુ રાખે છે. આ સૂક્ષ્મજીવ નીચેના પૈકી કયા વર્ગનો હોઈ શકે અને આ ક્રિયા માટે જવાબદાર ઝેરનું નામ શું છે?", "opts": ["બેક્ટેરિયા – ડિફ્થેરિયા ટોક્સિન (Diphtheria toxin)", "વાઇરસ – રિબોન્યુક્લીઝ (Ribonuclease)", "પ્રોટોઝોઆ – સાયટોટોક્સિન (Cytotoxin)", "ફૂગ – એફ્લાટોક્સિન (Aflatoxin)"], "ans": 0, "exp": "સાચો જવાબ વિકલ્પ A છે. *કોરિનેબેક્ટેરિયમ ડિફ્થેરિયા* બેક્ટેરિયા ડિફ્થેરિયા ટોક્સિન ઉત્પન્ન કરે છે, જે યજમાન કોષના રાઇબોઝોમના EF-2 (Elongation Factor 2)ને નિષ્ક્રિય કરીને પ્રોટીન સંશ્લેષણ અટકાવે છે, પરંતુ પોતાનું પ્રોટીન સંશ્લેષણ ચાલુ રાખે છે. વિકલ્પ B ખોટો છે કારણ કે વાઇરસ પોતાનું પ્રોટીન સંશ્લેષણ યજમાનના રાઇબોઝોમ પર આધારિત હોય છે અને રિબોન્યુક્લીઝ જેવું ઝેર ઉત્પન્ન કરતા નથી. વિકલ્પ C ખોટો છે કારણ કે પ્રોટોઝોઆમાં આવી ચોક્કસ રાઇબોઝોમ અવરોધક ઝેર પ્રક્રિયા જોવા મળતી નથી. વિકલ્પ D ખોટો છે કારણ કે એફ્લાટોક્સિન ફૂગ દ્વારા ઉત્પન્ન થતું ઝેર છે, જે યકૃતને નુકસાન પહોંચાડે છે, પરંતુ રાઇબોઝોમ સાથે સીધી પ્રક્રિયા કરતું નથી.", "ref": "Std 12 - પ્રકરણ 10: માનવ કલ્યાણમાં સૂક્ષ્મજીવો", "ch": ""}, {"q": "નીચેના પૈકી કયો રોગકારક સૂક્ષ્મજીવ એવો છે જે યજમાન કોષના કોષકેન્દ્રમાં પ્રવેશ્યા વગર પણ પોતાનું આનુવંશિક દ્રવ્ય યજમાન કોષના DNAમાં સંકલિત કરી શકે છે?", "opts": ["ઇન્ફલુએન્ઝા વાઇરસ (Influenza virus)", "હ્યુમન ઇમ્યુનોડેફિસિયન્સી વાઇરસ (HIV)", "હેપેટાઇટિસ B વાઇરસ (HBV)", "ટોબેકો મોઝેઇક વાઇરસ (TMV)"], "ans": 2, "exp": "હેપેટાઇટિસ B વાઇરસ (HBV) એ એક DNA વાઇરસ છે જે યજમાન કોષના કોષકેન્દ્રમાં પ્રવેશ્યા વગર પણ પોતાનું આંશિક રીતે દ્વિસૂત્રી DNA યજમાન કોષના DNAમાં સંકલિત કરી શકે છે. HIV એ RNA વાઇરસ છે જે રિવર્સ ટ્રાન્સક્રિપ્શન દ્વારા DNA બનાવીને યજમાન DNAમાં સંકલિત થાય છે, પરંતુ તે કોષકેન્દ્રમાં પ્રવેશે છે. ઇન્ફલુએન્ઝા વાઇરસ અને TMV કોષકેન્દ્રમાં પ્રવેશતા નથી અને યજમાન DNAમાં સંકલિત થતા નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેના પૈકી કયો રોગકારક સૂક્ષ્મજીવ એવો છે જે પ્રતિરક્ષાતંત્રની મેમરી કોષો (memory cells) ને સક્રિય કર્યા વગર વારંવાર ચેપ લગાડી શકે છે?", "opts": ["*સ્ટ્રેપ્ટોકોકસ ન્યુમોનિયા* (Streptococcus pneumoniae)", "*પ્લાઝ્મોડિયમ વિવેક્સ* (Plasmodium vivax)", "*હર્પિસ સિમ્પ્લેક્સ વાઇરસ* (Herpes simplex virus)", "*માયકોબેક્ટેરિયમ લેપ્રે* (Mycobacterium leprae)"], "ans": 1, "exp": "*પ્લાઝ્મોડિયમ વિવેક્સ* મેલેરિયાનું કારણ બને છે અને તે પ્રતિરક્ષાતંત્રની મેમરી કોષોને સક્રિય કર્યા વગર વારંવાર ચેપ લગાડી શકે છે કારણ કે તેના એન્ટિજેન્સમાં વારંવાર પરિવર્તન થાય છે. *સ્ટ્રેપ્ટોકોકસ ન્યુમોનિયા* પણ એન્ટિજેનિક પરિવર્તન દર્શાવે છે, પરંતુ તે મેમરી કોષોને સક્રિય કરે છે. *હર્પિસ વાઇરસ* અને *માયકોબેક્ટેરિયમ લેપ્રે* મેમરી કોષોને સક્રિય કરે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેના પૈકી કયો રોગકારક સૂક્ષ્મજીવ એવો છે જે યજમાન કોષના લાઇસોઝોમ સાથે જોડાઈને પોતાનું અસ્તિત્વ ટકાવી રાખે છે અને લાઇસોઝોમલ ઉત્સેચકો સામે પ્રતિરોધકતા દર્શાવે છે?", "opts": ["*લેજિયોનેલા ન્યુમોફિલા* (Legionella pneumophila)", "*વિબ્રિયો કોલેરા* (Vibrio cholerae)", "*એન્ટામીબા હિસ્ટોલિટિકા* (Entamoeba histolytica)", "*એસ્ચેરિચિયા કોલી* (Escherichia coli)"], "ans": 0, "exp": "*લેજિયોનેલા ન્યુમોફિલા* એક અંતઃકોષીય બેક્ટેરિયા છે જે યજમાન કોષના લાઇસોઝોમ સાથે જોડાઈને પોતાનું અસ્તિત્વ ટકાવી રાખે છે અને લાઇસોઝોમલ ઉત્સેચકો સામે પ્રતિરોધકતા દર્શાવે છે. *વિબ્રિયો કોલેરા* અને *એસ્ચેરિચિયા કોલી* લાઇસોઝોમ સાથે જોડાતા નથી. *એન્ટામીબા હિસ્ટોલિટિકા* લાઇસોઝોમનો નાશ કરે છે પરંતુ તેની સાથે જોડાઈને અસ્તિત્વ ટકાવતું નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેનામાંથી કયો રોગકારક સૂક્ષ્મજીવ એવો છે જે યજમાન કોષના એન્ડોપ્લાઝમિક રેટિક્યુલમ (ER) સાથે સંકળાઈને પોતાના પ્રોટીનનું સંશ્લેષણ કરે છે, પરંતુ તેના માટે યજમાન કોષના રાઇબોઝોમનો ઉપયોગ કરતો નથી?", "opts": ["*Plasmodium falciparum* (મેલેરિયા પરોપજીવી), કારણ કે તે યજમાન કોષના ER સાથે સંકળાઈને પોતાના પ્રોટીન બનાવે છે.", "*Mycobacterium tuberculosis* (ક્ષય રોગના બેક્ટેરિયા), કારણ કે તે યજમાન કોષના ERમાં પ્રવેશીને પ્રોટીન સંશ્લેષણ કરે છે.", "*Influenza virus* (ફ્લૂ વાઇરસ), કારણ કે તે યજમાન કોષના ERનો ઉપયોગ કરીને પોતાના પ્રોટીન બનાવે છે, પરંતુ રાઇબોઝોમનો ઉપયોગ કરતો નથી.", "*Candida albicans* (ફૂગ), કારણ કે તે યજમાન કોષના ERમાં પ્રવેશીને પોતાના ઉત્સેચકોનું સંશ્લેષણ કરે છે."], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. *Influenza virus* યજમાન કોષના એન્ડોપ્લાઝમિક રેટિક્યુલમ (ER) સાથે સંકળાઈને પોતાના પ્રોટીનનું સંશ્લેષણ કરે છે, પરંતુ તે યજમાન કોષના રાઇબોઝોમનો સીધો ઉપયોગ કરતો નથી. વાઇરસ પોતાના mRNAને યજમાન કોષના રાઇબોઝોમ પર અનુવાદિત કરાવે છે, પરંતુ ER સાથે સંકળાઈને પ્રોટીનનું ફોલ્ડિંગ અને પ્રક્રિયા કરે છે. વિકલ્પ A ખોટો છે કારણ કે *Plasmodium* યજમાન કોષના ER સાથે સંકળાઈને પ્રોટીન બનાવતું નથી. વિકલ્પ B ખોટો છે કારણ કે *Mycobacterium* યજમાન કોષના ERમાં પ્રવેશતું નથી. વિકલ્પ D ખોટો છે કારણ કે *Candida* યજમાન કોષના ERમાં પ્રવેશીને પ્રોટીન સંશ્લેષણ કરતી નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેનામાંથી કયો રોગકારક સૂક્ષ્મજીવ યજમાન કોષના માઇટોકોન્ડ્રિયામાં પ્રવેશીને તેની શ્વસન ક્રિયાને અવરોધે છે, પરંતુ તેની પોતાની જરૂરિયાત માટે ATPનું સંશ્લેષણ કરવા સક્ષમ હોય છે?", "opts": ["માઇકોપ્લાઝમા ટ્યુબરક્યુલોસિસ", "ટોક્સોપ્લાઝમા ગોન્ડી", "ક્લેમાઇડિયા ટ્રેકોમેટિસ", "રિકેટ્સિયા પ્રોવાઝેકી"], "ans": 3, "exp": "રિકેટ્સિયા પ્રોવાઝેકી (Rickettsia prowazekii) એ યજમાન કોષના માઇટોકોન્ડ્રિયામાં પ્રવેશે છે અને તેની શ્વસન ક્રિયાને અવરોધે છે. આ સૂક્ષ્મજીવ પોતાની જરૂરિયાત માટે ATPનું સંશ્લેષણ કરવા સક્ષમ હોય છે, કારણ કે તેના પાસે પોતાના ઉત્સેચકો અને જનીનો હોય છે જે ATP સંશ્લેષણમાં મદદ કરે છે. માઇકોપ્લાઝમા ટ્યુબરક્યુલોસિસ (A) યજમાન કોષના કોષરસમાં રહે છે અને માઇટોકોન્ડ્રિયાને અસર કરતું નથી. ટોક્સોપ્લાઝમા ગોન્ડી (B) યજમાન કોષના કોષરસમાં રહે છે અને માઇટોકોન્ડ્રિયાને અવરોધતું નથી. ક્લેમાઇડિયા ટ્રેકોમેટિસ (C) પણ યજમાન કોષના કોષરસમાં રહે છે અને માઇટોકોન્ડ્રિયાને અસર કરતું નથી.", "ref": "Std 12 - અધ્યાય 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "ch": ""}, {"q": "નીચેનામાંથી કયો રોગકારક સૂક્ષ્મજીવ એવો છે જે યજમાન કોષના ગોલ્ગી ઉપકરણને અવરોધીને પ્રોટીન સંશ્લેષણને અસર કરે છે?", "opts": ["માયકોપ્લાઝમા ટ્યુબરક્યુલોસિસ", "શિગેલા ડાયસેન્ટરીયે", "ક્લોસ્ટ્રિડિયમ ટેટાની", "કોરોનાવાયરસ"], "ans": 3, "exp": "કોરોનાવાયરસ યજમાન કોષના ગોલ્ગી ઉપકરણને અવરોધે છે, જેના કારણે પ્રોટીન સંશ્લેષણ અને પરિવહન પ્રક્રિયા ખોરવાય છે. માયકોપ્લાઝમા ટ્યુબરક્યુલોસિસ ફેફસાંને અસર કરે છે, શિગેલા ડાયસેન્ટરીયે આંતરડાને અસર કરે છે, અને ક્લોસ્ટ્રિડિયમ ટેટાની તંત્રિકાતંત્રને અસર કરે છે.", "ref": "Std 12 - અધ્યાય 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેનામાંથી કયો રોગકારક સૂક્ષ્મજીવ એવો છે જે યજમાન કોષના સાયટોપ્લાઝમમાં રહીને પોતાનું DNA સંશ્લેષણ કરે છે અને યજમાન કોષના ઉત્સેચકોનો ઉપયોગ કરે છે?", "opts": ["હેપેટાઇટિસ B વાયરસ", "એચ.આય.વી.", "ક્લેમાઇડિયા ટ્રેકોમેટિસ", "પ્લાઝમોડિયમ વાયવેક્સ"], "ans": 1, "exp": "એચ.આય.વી. (HIV) યજમાન કોષના સાયટોપ્લાઝમમાં રહીને પોતાનું DNA સંશ્લેષણ કરે છે અને યજમાન કોષના ઉત્સેચકોનો ઉપયોગ કરે છે. હેપેટાઇટિસ B વાયરસ યકૃતને અસર કરે છે, ક્લેમાઇડિયા ટ્રેકોમેટિસ લૈંગિક રોગ કરે છે, અને પ્લાઝમોડિયમ વાયવેક્સ મલેરિયા કરે છે.", "ref": "Std 12 - અધ્યાય 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેનામાંથી કયો રોગકારક સૂક્ષ્મજીવ એવો છે જે યજમાન કોષના કોષરસપટલ (plasma membrane)ને ભેદીને અંદર પ્રવેશે છે અને પોતાનું આનુવંશિક દ્રવ્ય સીધું યજમાન કોષના કોષકેન્દ્રમાં મોકલે છે?", "opts": ["એડિનોવાયરસ", "હર્પીસ સિમ્પ્લેક્સ વાયરસ", "ઇન્ફ્લુએન્ઝા વાયરસ", "બેક્ટરીયોફેજ"], "ans": 0, "exp": "એડિનોવાયરસ યજમાન કોષના કોષરસપટલને ભેદીને અંદર પ્રવેશે છે અને પોતાનું આનુવંશિક દ્રવ્ય સીધું યજમાન કોષના કોષકેન્દ્રમાં મોકલે છે. હર્પીસ સિમ્પ્લેક્સ વાયરસ અને ઇન્ફ્લુએન્ઝા વાયરસ અન્ય મેકેનિઝમ દ્વારા પ્રવેશ કરે છે, જ્યારે બેક્ટરીયોફેજ બેક્ટેરિયાને જ અસર કરે છે.", "ref": "Std 12 - અધ્યાય 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેનામાંથી કયો રોગકારક સૂક્ષ્મજીવ એવો છે જે યજમાન કોષના માઇટોકોન્ડ્રિયામાં પ્રવેશીને તેની શ્વસન ક્રિયાને અવરોધે છે અને એટીપી (ATP) ઉત્પાદનને ઘટાડે છે?", "opts": ["સાલ્મોનેલા ટાયફી", "માયકોબેક્ટેરિયમ લેપ્રે", "ટોક્સોપ્લાઝમા ગોન્ડી", "રાઇનોવાયરસ"], "ans": 2, "exp": "ટોક્સોપ્લાઝમા ગોન્ડી યજમાન કોષના માઇટોકોન્ડ્રિયામાં પ્રવેશીને શ્વસન ક્રિયાને અવરોધે છે અને એટીપી (ATP) ઉત્પાદનને ઘટાડે છે. સાલ્મોનેલા ટાયફી આંતરડાને અસર કરે છે, માયકોબેક્ટેરિયમ લેપ્રે કોઢ રોગ કરે છે, અને રાઇનોવાયરસ શ્વસનતંત્રને અસર કરે છે.", "ref": "Std 12 - અધ્યાય 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એક રોગકારક સૂક્ષ્મજીવ માનવ શરીરમાં પ્રવેશીને યજમાન કોષના DNA પ્રતિકૃતિની પ્રક્રિયામાં સીધો હસ્તક્ષેપ કરે છે, જેના કારણે યજમાન કોષના વર્ણસૂત્રોમાં ફેરફાર થાય છે. આ પ્રકારની ક્રિયાવિધિ દર્શાવતો સૂક્ષ્મજીવ નીચેનામાંથી કયો છે?", "opts": ["હર્પિસ સિમ્પ્લેક્સ વાઇરસ (HSV-1)", "હ્યુમન પેપિલોમા વાઇરસ (HPV)", "માયકોબેક્ટેરિયમ ટ્યુબરક્યુલોસિસ", "પ્લાઝ્મોડિયમ ફેલ્સિપેરમ"], "ans": 1, "exp": "સાચો જવાબ B) હ્યુમન પેપિલોમા વાઇરસ (HPV) છે. HPV યજમાન કોષના DNA પ્રતિકૃતિની પ્રક્રિયામાં સીધો હસ્તક્ષેપ કરીને વર્ણસૂત્રોમાં ફેરફાર કરે છે, જેના કારણે કોષનું અનિયંત્રિત વિભાજન થાય છે અને કેન્સરનું જોખમ વધે છે. A) હર્પિસ સિમ્પ્લેક્સ વાઇરસ (HSV-1) યજમાન કોષના DNA પ્રતિકૃતિમાં સીધો હસ્તક્ષેપ કરતો નથી, પરંતુ તેના પ્રોટીન દ્વારા કોષચક્રને અસર કરે છે. C) માયકોબેક્ટેરિયમ ટ્યુબરક્યુલોસિસ બેક્ટેરિયા છે અને તે યજમાન કોષના DNA સાથે સીધો હસ્તક્ષેપ કરતું નથી. D) પ્લાઝ્મોડિયમ ફેલ્સિપેરમ પ્રજીવ છે અને તે યજમાન કોષના DNA પ્રતિકૃતિમાં સીધો હસ્તક્ષેપ કરતું નથી, પરંતુ લાલ રક્તકણોને અસર કરે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}];

  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
