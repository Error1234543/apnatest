<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પ્રતિપાદ કોષો (Antipodals)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>પ્રતિપાદ કોષો (Antipodals)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">પ્રતિપાદ કોષો (Antipodals)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "અનુવંશિક અભ્યાસ દરમિયાન, પ્રતિપાદ કોષોની સંખ્યા અને તેમની ભૂમિકા વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["પ્રતિપાદ કોષો સામાન્ય રીતે 3 હોય છે અને તેઓ ભ્રૂણપોષણના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે.", "પ્રતિપાદ કોષો સામાન્ય રીતે 2 હોય છે અને તેઓ બીજાંડકોષના વિકાસમાં સહાય કરે છે.", "પ્રતિપાદ કોષો સામાન્ય રીતે 5 હોય છે અને તેઓ ફલિતાંડના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે.", "પ્રતિપાદ કોષો સામાન્ય રીતે 1 હોય છે અને તેઓ બીજાંડકોષના સંગ્રહમાં મદદ કરે છે."], "ans": 0, "exp": "પ્રતિપાદ કોષો (Antipodals) સામાન્ય રીતે 3 હોય છે અને તેઓ ભ્રૂણપોષણના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે. બીજાંડકોષના વિકાસમાં સહાય કરવા માટે 2 કોષો (સહાયક કોષો) હોય છે, પરંતુ પ્રતિપાદ કોષોની સંખ્યા 3 હોય છે. ફલિતાંડના વિકાસમાં પ્રતિપાદ કોષોની ભૂમિકા મર્યાદિત છે. બીજાંડકોષના સંગ્રહમાં પ્રતિપાદ કોષોની કોઈ ભૂમિકા નથી.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "પ્રતિપાદ કોષોની કઈ વિશેષતા તેમને અન્ય કોષોથી અલગ પાડે છે?", "opts": ["તેઓ સૌથી મોટા કોષો હોય છે અને તેમનામાં કોષકેન્દ્ર હાજર નથી.", "તેઓ સૌથી નાના કોષો હોય છે અને તેમનામાં વર્ણસૂત્રોની સંખ્યા ઓછી હોય છે.", "તેઓ ભ્રૂણકોષના વિકાસ દરમિયાન નાશ પામે છે અને તેમની ભૂમિકા અજ્ઞાત છે.", "તેઓ ફક્ત પ્રકાશસંશ્લેષણ માટે જવાબદાર હોય છે અને તેમનામાં હરિતદ્રવ્ય હોય છે."], "ans": 2, "exp": "પ્રતિપાદ કોષો ભ્રૂણકોષના વિકાસ દરમિયાન નાશ પામે છે અને તેમની ભૂમિકા અજ્ઞાત છે. તેઓ સૌથી મોટા અથવા નાના કોષો નથી, અને તેમનામાં કોષકેન્દ્ર હાજર હોય છે. તેઓ પ્રકાશસંશ્લેષણ માટે જવાબદાર નથી અને તેમનામાં હરિતદ્રવ્ય હાજર નથી.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પ્રતિપાદ કોષો અને સહાયક કોષો વચ્ચેનો તફાવત સ્પષ્ટ કરે છે?", "opts": ["પ્રતિપાદ કોષો ભ્રૂણપોષણના વિકાસમાં મદદ કરે છે, જ્યારે સહાયક કોષો બીજાંડકોષના વિકાસમાં મદદ કરે છે.", "પ્રતિપાદ કોષો અને સહાયક કોષો બંને ભ્રૂણપોષણના વિકાસમાં મદદ કરે છે.", "પ્રતિપાદ કોષો બીજાંડકોષના વિકાસમાં મદદ કરે છે, જ્યારે સહાયક કોષો ભ્રૂણપોષણના વિકાસમાં મદદ કરે છે.", "પ્રતિપાદ કોષો અને સહાયક કોષો બંને બીજાંડકોષના વિકાસમાં મદદ કરે છે."], "ans": 0, "exp": "પ્રતિપાદ કોષો ભ્રૂણપોષણના વિકાસમાં મદદ કરે છે, જ્યારે સહાયક કોષો બીજાંડકોષના વિકાસમાં મદદ કરે છે. બંને કોષોની ભૂમિકા અલગ અલગ છે અને તેઓ એકબીજા સાથે સંકળાયેલા નથી.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "પ્રતિપાદ કોષોની ભૂમિકા વિશે નીચેનામાંથી કયું વિધાન સૌથી યોગ્ય છે?", "opts": ["તેઓ ફલિતાંડના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે અને તેમની ગેરહાજરીમાં ફલિતાંડ વિકસિત થતું નથી.", "તેઓ ભ્રૂણપોષણના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે, પરંતુ તેમની ગેરહાજરીમાં ભ્રૂણપોષણ વિકસિત થઈ શકે છે.", "તેઓ બીજાંડકોષના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે અને તેમની ગેરહાજરીમાં બીજાંડકોષ વિકસિત થતું નથી.", "તેઓ ફક્ત પેશીના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે અને તેમની ગેરહાજરીમાં પેશી વિકસિત થતી નથી."], "ans": 1, "exp": "પ્રતિપાદ કોષો ભ્રૂણપોષણના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે, પરંતુ તેમની ગેરહાજરીમાં ભ્રૂણપોષણ વિકસિત થઈ શકે છે. તેઓ ફલિતાંડ અથવા બીજાંડકોષના વિકાસમાં મહત્વની ભૂમિકા ભજવતા નથી. તેઓ પેશીના વિકાસમાં પણ મહત્વની ભૂમિકા ભજવતા નથી.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પ્રતિપાદ કોષોની સંખ્યા અને તેમની જીવનચક્રીય ભૂમિકા વિશે સત્ય નથી?", "opts": ["પ્રતિપાદ કોષો સામાન્ય રીતે 3 હોય છે અને તેઓ ભ્રૂણકોષના વિકાસ દરમિયાન નાશ પામે છે.", "પ્રતિપાદ કોષોની સંખ્યા વનસ્પતિ પ્રજાતિ અનુસાર બદલાઈ શકે છે, પરંતુ સામાન્ય રીતે 3 હોય છે.", "પ્રતિપાદ કોષો ભ્રૂણપોષણના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે અને તેમની ગેરહાજરીમાં ભ્રૂણપોષણ વિકસિત થતું નથી.", "પ્રતિપાદ કોષોની ભૂમિકા અજ્ઞાત છે અને તેઓ ભ્રૂણકોષના વિકાસ દરમિયાન નાશ પામે છે."], "ans": 2, "exp": "પ્રતિપાદ કોષો ભ્રૂણપોષણના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે, પરંતુ તેમની ગેરહાજરીમાં ભ્રૂણપોષણ વિકસિત થઈ શકે છે. તેથી, વિધાન C સત્ય નથી. બાકીના વિધાનો સત્ય છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "અંગીકૃત બીજાંડ (embryo sac)માં પ્રતિપાદ કોષોની સંખ્યા અને તેમની સ્થિતિ વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["ત્રણ પ્રતિપાદ કોષો બીજાંડકોષના ચેપી છેડે (chalazal end) સ્થિત હોય છે અને તેઓ હેપ્લોઇડ હોય છે.", "બે પ્રતિપાદ કોષો મધ્ય કોષ ( સુધી જીવિત રહે છે. બાકીના વિકલ્પો સત્ય છે: B) પ્રતિપાદ કોષો બીજાંડકોષના વિકાસ દરમિયાન સક્રિય રહે છે. C) કેટલીક વનસ્પતિઓમાં પ્રતિપાદ કોષોની કોષરસમાં રંગદ્રવ્ય હાજર હોય છે. D) પ્રતિપાદ કોષો હેપ્લોઇડ હોય છે અને તેમની કોષવિભાજન ક્ષમતા નહીવત હોય છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "પ્રતિપાદ કોષો અને સહાયક કોષો વચ્ચેનો તફાવત નીચેનામાંથી કયો સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["પ્રતિપાદ કોષો હેપ્લોઇડ હોય છે જ્યારે સહાયક કોષો ડિપ્લોઇડ હોય છે.", "પ્રતિપાદ કોષો બીજાંડકોષના ચેપી છેડે સ્થિત હોય છે જ્યારે સહાયક કોષો મૈક્રોપાઇલ છેડે સ્થિત હોય છે.", "પ્રતિપાદ કોષો નિષેચન પછી વિઘટિત થાય છે જ્યારે સહાયક કોષો નિષેચન પહેલા વિઘટિત થાય છે.", "પ્રતિપાદ કોષો પોષક તત્ત્વોનું સંગ્રહણ કરે છે જ્યારે સહાયક કોષો ઉત્સેચકોનું સ્રાવણ કરે છે."], "ans": 1, "exp": "પ્રતિપાદ કોષો બીજાંડકોષના ચેપી છેડે (chalazal end) સ્થિત હોય છે જ્યારે સહાયક કોષો મૈક્રોપાઇલ છેડે સ્થિત હોય છે. બાકીના વિકલ્પો ખોટા છે: A) પ્રતિપાદ કોષો અને સહાયક કોષો બંને હેપ્લોઇડ હોય છે. C) પ્રતિપાદ કોષો અને સહાયક કોષો બંને નિષેચન પછી વિઘટિત થાય છે. D) પોષક તત્ત્વોનું સંગ્રહણ અને ઉત્સેચકોનું સ્રાવણ બંને કોષો દ્વારા થાય છે, પરંતુ પ્રતિપાદ કોષો મુખ્યત્વે ઉત્સેચકોનું સ્રાવણ કરે છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પ્રતિપાદ કોષોની ક્રિયાશીલતા અને તેમની ભૂમિકા વિશે સૌથી અચોક્કસ છે?", "opts": ["પ્રતિપાદ કોષો બીજાંડકોષમાં પોષક તત્ત્વોના વિતરણમાં મદદ કરે છે.", "પ્રતિપાદ કોષો નિષેચન પછી ભ્રૂણપોષના વિકાસમાં સહાય કરે છે.", "પ્રતિપાદ કોષો બીજાંડકોષના વિકાસ દરમિયાન અન્ય કોષોના વિઘટનમાં મદદ કરે છે.", "પ્રતિપાદ કોષોની સ્થિતિ અને સંખ્યા વનસ્પતિ પ્રજાતિ અનુસાર બદલાય છે."], "ans": 1, "exp": "પ્રતિપાદ કોષોની ભ્રૂણપોષના વિકાસમાં કોઈ સીધી ભૂમિકા નથી. ભ્રૂણપોષનો વિકાસ મુખ્યત્વે મધ્ય કોષ (central cell) અને નિષેચન પછીના ક્રિયાક્રમો દ્વારા થાય છે. બાકીના વિકલ્પો સત્ય છે: A) પ્રતિપાદ કોષો પોષક તત્ત્વોના વિતરણમાં મદદ કરે છે. C) પ્રતિપાદ કોષો અન્ય કોષોના વિઘટનમાં મદદ કરે છે. D) પ્રતિપાદ કોષોની સ્થિતિ અને સંખ્યા નિયત હોય છે (ત્રણ, ચેપી છેડે), પરંતુ કેટલીક અપવાદરૂપ સ્થિતિઓમાં ફેરફાર થઈ શકે છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "અંગીકૃત બીજાંડ (embryo sac)માં પ્રતિપાદ કોષોની કઈ વિશેષતા તેમને અન્ય કોષોથી અલગ પાડે છે, જ્યારે બીજાંડકોષ (egg cell) અને કેંદ્રીય કોષો (central cell)ની તુલનામાં?", "opts": ["તેઓ સૌથી મોટા કદના હોય છે અને બહુકોષીય રચના ધરાવે છે", "તેઓ ત્રણ સંખ્યામાં હોય છે અને બીજાંડકોષની નજીક સ્થિત હોય છે", "તેઓ કોષરસમાં સક્રિય ઉત્સેચકો ધરાવે છે અને પોષણ પૂરું પાડવામાં મદદ કરે છે", "તેઓ વર્ણસૂત્રી રીતે નિષ્ક્રિય હોય છે અને ફક્ત યાંત્રિક ટેકો પૂરો પાડે છે"], "ans": 2, "exp": "પ્રતિપાદ કોષો (antipodals) અંગીકૃત બીજાંડમાં ત્રણ સંખ્યામાં હોય છે અને કોષરસમાં સક્રિય ઉત્સેચકો ધરાવે છે, જે પોષણ પૂરું પાડવામાં મદદ કરે છે. વિકલ્પ A ખોટો છે કારણ કે તેઓ સૌથી મોટા કદના નથી, વિકલ્પ B ખોટો છે કારણ કે તેઓ બીજાંડકોષની નજીક નથી હોતા, અને વિકલ્પ D ખોટો છે કારણ કે તેઓ વર્ણસૂત્રી રીતે નિષ્ક્રિય નથી હોતા.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "અંગીકૃત બીજાંડમાં પ્રતિપાદ કોષો અને સહાયક કોષો વચ્ચેનો તફાવત નીચેનામાંથી કયો સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["પ્રતિપાદ કોષો ત્રણ સંખ્યામાં હોય છે જ્યારે સહાયક કોષો બે સંખ્યામાં હોય છે", "પ્રતિપાદ કોષો બીજાંડકોષની નજીક હોય છે જ્યારે સહાયક કોષો કેંદ્રીય કોષોની નજીક હોય છે", "પ્રતિપાદ કોષો પોષણ પૂરું પાડે છે જ્યારે સહાયક કોષો ફલનમાં મદદ કરે છે", "પ્રતિપાદ કોષો અને સહાયક કોષો બંને ફલન પછી નાશ પામે છે"], "ans": 0, "exp": "પ્રતિપાદ કોષો ત્રણ સંખ્યામાં હોય છે જ્યારે સહાયક કોષો (synergids) બે સંખ્યામાં હોય છે. વિકલ્પ B ખોટો છે કારણ કે સહાયક કોષો બીજાંડકોષની નજીક હોય છે, વિકલ્પ C ખોટો છે કારણ કે સહાયક કોષો પણ પોષણ પૂરું પાડે છે, અને વિકલ્પ D ખોટો છે કારણ કે ફક્ત પ્રતિપાદ કોષો અને સહાયક કોષો ફલન પછી નાશ પામે છે, પરંતુ કેંદ્રીય કોષો નહીં.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "અંગીકૃત બીજાંડ (embryo sac)માં પ્રતિપાદ કોષોની હાજરી અને તેમની ક્રિયાશીલતા સંબંધિત નીચેનામાંથી કયું વિધાન અપવાદરૂપ ગણી શકાય?", "opts": ["મોટાભાગની આવૃત બીજધારી વનસ્પતિઓમાં પ્રતિપાદ કોષો ત્રણ સંખ્યામાં જોવા મળે છે.", "કેટલીક વનસ્પતિઓ જેમ કે *પોએસી* કુળની વનસ્પતિઓમાં પ્રતિપાદ કોષોની સંખ્યા બદલાઈ શકે છે અથવા તેઓ સંપૂર્ણપણે ગેરહાજર હોઈ શકે છે.", "પ્રતિપાદ કોષો હંમેશા કોષકેન્દ્ર ધરાવે છે અને તેઓ ફલન પછી પણ લાંબા સમય સુધી જીવંત રહે છે.", "પ્રતિપાદ કોષોનો વિકાસ અને તેમની ક્રિયાશીલતા વનસ્પતિની પ્રજનન પ્રક્રિયામાં પરોક્ષ રીતે મદદરૂપ થાય છે."], "ans": 2, "exp": "વિકલ્પ C અપવાદરૂપ છે કારણ કે પ્રતિપાદ કોષો હંમેશા કોષકેન્દ્ર ધરાવતા નથી અને ફલન પહેલાં જ નાશ પામે છે. મોટાભાગની આવૃત બીજધારી વનસ્પતિઓમાં પ્રતિપાદ કોષો ત્રણ સંખ્યામાં હોય છે (વિકલ્પ A સાચું), પરંતુ કેટલીક વનસ્પતિઓમાં તેમની સંખ્યા બદલાઈ શકે છે અથવા ગેરહાજર હોઈ શકે છે (વિકલ્પ B સાચું). પ્રતિપાદ કોષો પ્રજનન પ્રક્રિયામાં પરોક્ષ રીતે મદદરૂપ થાય છે (વિકલ્પ D સાચું), પરંતુ તેઓ ફલન પછી જીવંત રહેતા નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "નીચેના વિધાનોને ધ્યાનમાં લઈને પ્રતિપાદ કોષોની ભૂમિકા સંબંધિત યોગ્ય તારણ પસંદ કરો:\n\n(1) પ્રતિપાદ કોષો અંગીકૃત બીજાંડના ચેલાઝા છેડે સ્થિત હોય છે.\n(2) પ્રતિપાદ કોષો પોષક તત્ત્વોના સંગ્રહ અને પરિવહનમાં સહાયક હોય છે.\n(3) પ્રતિપાદ કોષો ફલન પછી તરત જ નાશ પામે છે અને તેથી તેઓ ફલિતાંડના વિકાસમાં સીધી ભૂમિકા ભજવતા નથી.\n(4) પ્રતિપાદ કોષો હંમેશા દ્વિકોષકેન્દ્રીય (binucleate) હોય છે અને તેઓ સહાયક કોષો સાથે સંકળાયેલા હોય છે.", "opts": ["વિધાન 1, 2 અને 3 સાચાં છે, પરંતુ વિધાન 4 ખોટું છે.", "વિધાન 1 અને 3 સાચાં છે, પરંતુ વિધાન 2 અને 4 ખોટાં છે.", "વિધાન 2 અને 4 સાચાં છે, પરંતુ વિધાન 1 અને 3 ખોટાં છે.", "વિધાન 1, 2, 3 અને 4 બધાં જ સાચાં છે."], "ans": 0, "exp": "વિધાન 1, 2 અને 3 સાચાં છે કારણ કે પ્રતિપાદ કોષો ચેલાઝા છેડે સ્થિત હોય છે, પોષક તત્ત્વોના પરિવહનમાં મદદ કરે છે અને ફલન પછી નાશ પામે છે. વિધાન 4 ખોટું છે કારણ કે પ્રતિપાદ કોષો હંમેશા દ્વિકોષકેન્દ્રીય હોતા નથી અને તેઓ સહાયક કોષો સાથે સંકળાયેલા હોતા નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "એક સંશોધક અંગીકૃત બીજાંડના કોષોનું અવલોકન કરી રહ્યો છે. તેણે નોંધ્યું કે પ્રતિપાદ કોષોની સંખ્યા ત્રણ કરતાં ઓછી છે અને તેમાંથી એક કોષમાં બે કોષકેન્દ્રો જોવા મળે છે. આ અવલોકનના સંદર્ભમાં નીચેનામાંથી કયું તારણ સૌથી યોગ્ય ગણી શકાય?", "opts": ["આ અવલોકન સામાન્ય છે કારણ કે પ્રતિપાદ કોષો હંમેશા ત્રણ સંખ્યામાં હોતા નથી અને તેઓ દ્વિકોષકેન્દ્રીય હોઈ શકે છે.", "આ અવલોકન અસામાન્ય છે કારણ કે પ્રતિપાદ કોષો હંમેશા ત્રણ સંખ્યામાં હોય છે અને તેઓ એકકોષકેન્દ્રીય હોય છે.", "આ અવલોકન અપવાદરૂપ છે કારણ કે પ્રતિપાદ કોષોની સંખ્યા ત્રણ કરતાં ઓછી હોઈ શકે છે, પરંતુ તેઓ દ્વિકોષકેન્દ્રીય હોતા નથી.", "આ અવલોકન ખોટું છે કારણ કે પ્રતિપાદ કોષો હંમેશા ત્રણ સંખ્યામાં હોય છે અને તેઓ દ્વિકોષકેન્દ્રીય હોતા નથી."], "ans": 2, "exp": "વિકલ્પ C સૌથી યોગ્ય છે કારણ કે પ્રતિપાદ કોષોની સંખ્યા ત્રણ કરતાં ઓછી હોઈ શકે છે (અપવાદરૂપ કિસ્સાઓમાં), પરંતુ તેઓ સામાન્ય રીતે એકકોષકેન્દ્રીય હોય છે. તેથી, દ્વિકોષકેન્દ્રીય પ્રતિપાદ કોષનું અવલોકન અસામાન્ય ગણી શકાય. વિકલ્પ A ખોટો છે કારણ કે પ્રતિપાદ કોષો સામાન્ય રીતે દ્વિકોષકેન્દ્રીય હોતા નથી. વિકલ્પ B અને D ખોટાં છે કારણ કે પ્રતિપાદ કોષો હંમેશા ત્રણ સંખ્યામાં હોતા નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "અંગીકૃત બીજાંડ (embryo sac)માં પ્રતિપાદ કોષોની ક્રિયાશીલતા વિશે નીચેનામાંથી કયું વિધાન સૌથી યોગ્ય રીતે સ્પષ્ટ કરે છે કે તેઓ ક્યારે વિરલપણે જીવિત રહે છે?", "opts": ["તેઓ ફક્ત ફલન પહેલાં જીવિત રહે છે અને ફલન પછી તરત જ નાશ પામે છે.", "તેઓ ફલન પછી પણ કેટલાક દિવસો સુધી જીવિત રહી શકે છે, પરંતુ તેમની કોઈ જાણીતી ક્રિયાશીલતા નથી.", "તેઓ ફલન પહેલાં અને પછી બંને સમયે ક્રિયાશીલ રહે છે, પરંતુ તેમની ભૂમિકા અજ્ઞાત છે.", "તેઓ ફક્ત અંગીકૃત બીજાંડના વિકાસ દરમિયાન જીવિત રહે છે અને ફલન પહેલાં જ નાશ પામે છે."], "ans": 3, "exp": "પ્રતિપાદ કોષો અંગીકૃત બીજાંડના વિકાસ દરમિયાન જીવિત રહે છે અને ફલન પહેલાં જ નાશ પામે છે. તેઓ ફલન પછી જીવિત રહેતા નથી, અને તેમની કોઈ જાણીતી ક્રિયાશીલતા ફલન પછી નથી. વિકલ્પ A, B, અને C ખોટા છે કારણ કે તેઓ પ્રતિપાદ કોષોની જીવિત અવસ્થા અને ક્રિયાશીલતા વિશે અચોક્કસ માહિતી આપે છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પ્રતિપાદ કોષોની અનન્ય વૈશિષ્ટ્યતા વિશે સત્ય છે, જે તેમને અન્ય કોષોથી અલગ પાડે છે?", "opts": ["તેઓ અંગીકૃત બીજાંડમાં સૌથી મોટા કોષ ""}, {"q": "અંગીકૃત બીજાંડ (embryo sac)માં પ્રતિપાદ કોષોની ભૂમિકા વિશે નીચેનામાંથી કયું વિધાન સૌથી કટોકટીની સ્થિતિમાં યોગ્ય છે, જ્યારે બીજાંડકોષ (egg cell) નિષેચન પામે છે?", "opts": ["પ્રતિપાદ કોષો તરત જ નાશ પામે છે કારણ કે તેમની ભૂમિકા નિષેચન પહેલાં પૂર્ણ થઈ જાય છે.", "પ્રતિપાદ કોષો નિષેચન પછી પણ જીવિત રહે છે અને ભ્રૂણપોષણ (endosperm) નિર્માણમાં મદદ કરે છે.", "પ્રતિપાદ કોષો નિષેચન પહેલાં જ નાશ પામે છે અને તેમની કોઈ જીવનચક્રીય ભૂમિકા હોતી નથી.", "પ્રતિપાદ કોષો નિષેચન પછી ભ્રૂણના વિકાસમાં સક્રિય ભૂમિકા ભજવે છે અને પોષણ પુરું પાડે છે."], "ans": 0, "exp": "પ્રતિપાદ કોષોની ભૂમિકા નિષેચન પહેલાં પૂર્ણ થઈ જાય છે. તેઓ અંગીકૃત બીજાંડમાં સહાયક કોષો તરીકે કામ કરે છે અને નિષેચન પછી તરત જ નાશ પામે છે. વિકલ્પ B, C, અને D ખોટા છે કારણ કે પ્રતિપાદ કોષો નિષેચન પછી જીવિત રહેતા નથી અથવા ભ્રૂણપોષણ અથવા ભ્રૂણ વિકાસમાં સક્રિય ભૂમિકા ભજવતા નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
