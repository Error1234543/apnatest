<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પ્રતિદ્રવ્યો (Antibodies)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>પ્રતિદ્રવ્યો (Antibodies)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">પ્રતિદ્રવ્યો (Antibodies)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "પ્રતિદ્રવ્યના હૈટરોફિલિક ભાગને કયા નામથી ઓળખવામાં આવે છે અને તેનું મુખ્ય કાર્ય શું છે?", "opts": ["ફેબ ભાગ, એન્ટિજન સાથે જોડાણ કરવું", "Fc ભાગ, મેક્રોફેજ સાથે જોડાણ કરવું", "વેરિયેબલ રીજન, એન્ટિજનની ઓળખ કરવી", "કોન્સ્ટન્ટ રીજન, કોમ્પ્લિમેન્ટ સિસ્ટમને સક્રિય કરવી"], "ans": 1, "exp": "Fc ભાગ (ક્રિસ્ટલાઇઝેબલ ફ્રેગમેન્ટ) પ્રતિદ્રવ્યનો હૈટરોફિલિક ભાગ છે, જે મેક્રોફેજ, ન્યૂટ્રોફિલ્સ અને કોમ્પ્લિમેન્ટ સિસ્ટમ સાથે જોડાઈને ઇમ્યુન રિસ્પોન્સમાં મદદ કરે છે. A વિકલ્પ ખોટો છે કારણ કે ફેબ ભાગ એ એન્ટિજન બાઇન્ડિંગ સાઇટ છે, પરંતુ તે હૈટરોફિલિક નથી. C વિકલ્પ ખોટો છે કારણ કે વેરિયેબલ રીજન એન્ટિજનની ઓળખ કરે છે, પરંતુ તે હૈડ્રોફોબિક છે. D વિકલ્પ ખોટો છે કારણ કે કોન્સ્ટન્ટ રીજન Fc ભાગનો જ એક ભાગ છે, પરંતુ તે હૈટરોફિલિક છે અને કોમ્પ્લિમેન્ટ સિસ્ટમને સક્રિય કરે છે, પરંતુ પ્રશ્નમાં Fc ભાગનું મુખ્ય કાર્ય પૂછવામાં આવ્યું છે.", "ref": "Std 12 - પ્રકરણ 10: પ્રતિરક્ષાતંત્ર", "ch": ""}, {"q": "IgE પ્રતિદ્રવ્યના સંદર્ભમાં નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["તે જળવિષાણુ વિરોધી પ્રતિદ્રવ્ય છે અને મસ્ત કોષો સાથે જોડાય છે", "તે એલર્જી પ્રતિક્રિયામાં ભાગ લે છે અને મસ્ત કોષો સાથે જોડાય છે", "તે ગર્ભમાં પ્લેસેન્ટા દ્વારા પસાર થાય છે અને ભ્રૂણની રક્ષા કરે છે", "તે દૂધ દ્વારા શિશુને પસાર થાય છે અને પાચનતંત્રની રક્ષા કરે છે"], "ans": 1, "exp": "IgE પ્રતિદ્રવ્ય એલર્જી પ્રતિક્રિયામાં મહત્વની ભૂમિકા ભજવે છે અને મસ્ત કોષો સાથે જોડાઈને હિસ્ટામિન નિકાલમાં મદદ કરે છે. A ખોટું છે કારણ કે IgE જળવિષાણુ વિરોધી નથી. C ખોટું છે કારણ કે IgG ગર્ભમાં પ્લેસેન્ટા દ્વારા પસાર થાય છે. D ખોટું છે કારણ કે IgA દૂધ દ્વારા શિશુને પસાર થાય છે.", "ref": "Std 12 - પ્રકરણ 10: પ્રતિરક્ષાતંત્ર", "ch": ""}, {"q": "પ્રતિદ્રવ્યના ઉત્પાદન દરમિયાન કયા કોષમાં V(D)J રિકોમ્બિનેશન થાય છે?", "opts": ["T-લસિકાકોષ", "B-લસિકાકોષ", "મેક્રોફેજ", "ન્યૂટ્રોફિલ"], "ans": 1, "exp": "V(D)J રિકોમ્બિનેશન B-લસિકાકોષમાં થાય છે, જે પ્રતિદ્રવ્યના વૈવિધ્યસભર ઉત્પાદન માટે જવાબદાર છે. A ખોટું છે કારણ કે T-લસિકાકોષમાં પ્રતિદ્રવ્ય ઉત્પન્ન થતું નથી. C અને D ખોટા છે કારણ કે મેક્રોફેજ અને ન્યૂટ્રોફિલ પ્રતિદ્રવ્ય ઉત્પાદનમાં સીધો ભાગ લેતા નથી.", "ref": "Std 12 - પ્રકરણ 10: પ્રતિરક્ષાતંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું પ્રતિદ્રવ્ય મનુષ્યમાં સૌથી પહેલા ઇમ્યુન રિસ્પોન્સ દરમિયાન ઉત્પન્ન થાય છે?", "opts": ["IgG", "IgM", "IgA", "IgD"], "ans": 1, "exp": "IgM પ્રાથમિક ઇમ્યુન રિસ્પોન્સ દરમિયાન સૌપ્રથમ ઉત્પન્ન થાય છે અને તે પેન્ટામેરિક સ્વરૂપમાં હોય છે. A ખોટું છે કારણ કે IgG દ્વિતીય ઇમ્યુન રિસ્પોન્સ દરમિયાન વધુ પ્રમાણમાં ઉત્પન્ન થાય છે. C અને D ખોટા છે કારણ કે IgA અને IgD પ્રાથમિક રિસ્પોન્સમાં મુખ્ય ભૂમિકા ભજવતા નથી.", "ref": "Std 12 - પ્રકરણ 10: પ્રતિરક્ષાતંત્ર", "ch": ""}, {"q": "પ્રતિદ્રવ્યના કયા વર્ગને 'સિક્રેટરી ઇમ્યુનોગ્લોબ્યુલિન' તરીકે ઓળખવામાં આવે છે અને તે ક્યાં મુખ્યત્વે મળી આવે છે?", "opts": ["IgG, રક્તપ્લાઝમા", "IgA, લાળ, આંસુ, દૂધ", "IgM, લસિકા", "IgE, ચામડી"], "ans": 1, "exp": "IgAને 'સિક્રેટરી ઇમ્યુનોગ્લોબ્યુલિન' તરીકે ઓળખવામાં આવે છે અને તે લાળ, આંસુ, દૂધ જેવા શારીરિક દ્રવ્યોમાં મળી આવે છે, જે શ્લેષ્મલ પડદાની રક્ષા કરે છે. A ખોટું છે કારણ કે IgG રક્તપ્લાઝમામાં મળી આવે છે, પરંતુ તે સિક્રેટરી નથી. C ખોટું છે કારણ કે IgM લસિકામાં મળી આવે છે, પરંતુ તે સિક્રેટરી નથી. D ખોટું છે કારણ કે IgE ચામડીમાં મળી આવે છે, પરંતુ તે સિક્રેટરી નથી.", "ref": "Std 12 - પ્રકરણ 10: પ્રતિરક્ષાતંત્ર", "ch": ""}, {"q": "જ્યારે એક જ એન્ટિજેન સાથે બે વખત સંપર્ક થાય ત્યારે પ્રતિદ્રવ્ય ઉત્પાદનમાં કયો ફેરફાર જોવા મળે છે?", "opts": ["પ્રાથમિક રિસ્પોન્સ કરતાં દ્વિતીય રિસ્પોન્સમાં IgM પ્રતિદ્રવ્યનું પ્રમાણ વધુ હોય છે.", "દ્વિતીય રિસ્પોન્સમાં IgG પ્રતિદ્રવ્યનું પ્રમાણ ઝડપથી વધે છે અને લાંબો સમય ટકી રહે છે.", "પ્રાથમિક અને દ્વિતીય રિસ્પોન્સમાં પ્રતિદ્રવ્યના વર્ગમાં કોઈ ફેરફાર થતો નથી.", "દ્વિતીય રિસ્પોન્સમાં માત્ર IgA પ્રતિદ્રવ્ય જ ઉત્પન્ન થાય છે."], "ans": 1, "exp": "દ્વિતીય ઇમ્યુન રિસ્પોન્સ (સેકન્ડરી ઇમ્યુન રિસ્પોન્સ)માં મેમરી B કોષો સક્રિય થઈ IgG પ્રતિદ્રવ્યનું ઝડપથી અને મોટા પ્રમાણમાં ઉત્પાદન કરે છે, જે લાંબો સમય ટકી રહે છે. પ્રાથમિક રિસ્પોન્સમાં મુખ્યત્વે IgM પ્રતિદ્રવ્ય ઉત્પન્ન થાય છે. વિકલ્પ A ખોટો છે કારણ કે દ્વિતીય રિસ્પોન્સમાં IgM કરતાં IgG વધુ હોય છે. વિકલ્પ C ખોટો છે કારણ કે પ્રતિદ્રવ્યના વર્ગમાં ફેરફાર થાય છે. વિકલ્પ D ખોટો છે કારણ કે દ્વિતીય રિસ્પોન્સમાં માત્ર IgA જ ઉત્પન્ન થતું નથી.", "ref": "Std 12 - અધ્યાય 8: મનુષ્યમાં પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પ્રતિદ્રવ્યની 'એવિડિટી' (Avidity) વિશે સત્ય છે?", "opts": ["એવિડિટી એ એક જ એપિટોપ સાથે પ્રતિદ્રવ્યની બંધન શક્તિ છે.", "એવિડિટી એ પ્રતિદ્રવ્યના મોનોવેલેન્ટ બંધનની શક્તિ છે.", "એવિડિટી એ પ્રતિદ્રવ્યના બહુવિધ બંધન સ્થાનો દ્વારા એન્ટિજેન સાથે થતી કુલ બંધન શક્તિ છે.", "એવિડિટી એ પ્રતિદ્રવ્યના આઈસોટાઇપ પર આધાર રાખતી નથી."], "ans": 2, "exp": "એવિડિટી એ પ્રતિદ્રવ્યના બહુવિધ બંધન સ્થાનો (પોલીવેલેન્ટ) દ્વારા એન્ટિજેન સાથે થતી કુલ બંધન શક્તિ છે. વિકલ્પ A અને B ખોટા છે કારણ કે તેઓ એવિડિટીને એફિનિટી (એક જ એપિટોપ સાથેની બંધન શક્તિ) સાથે ગૂંચવી દે છે. વિકલ્પ D ખોટો છે કારણ કે એવિડિટી પ્રતિદ્રવ્યના આઈસોટાઇપ (જેમ કે IgM, IgG) પર આધાર રાખે છે, કારણ કે IgM પાંચ બંધન સ્થાનો ધરાવે છે જ્યારે IgG બે ધરાવે છે.", "ref": "Std 12 - અધ્યાય 8: મનુષ્યમાં પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું પ્રતિદ્રવ્ય એન્ટિજેન-એન્ટિબોડી કોમ્પ્લેક્સને ફેગોસાઈટોસિસ માટે ચિહ્નિત કરવા માટે સક્ષમ નથી?", "opts": ["IgG", "IgM", "IgA", "IgE"], "ans": 3, "exp": "IgE પ્રતિદ્રવ્ય એલર્જી અને પરોપજીવી વિરોધી પ્રતિક્રિયાઓમાં મુખ્ય ભૂમિકા ભજવે છે, પરંતુ તે એન્ટિજેન-એન્ટિબોડી કોમ્પ્લેક્સને ફેગોસાઈટોસિસ માટે ચિહ્નિત કરતું નથી. IgG અને IgM ઓપ્સોનિન તરીકે કામ કરે છે અને ફેગોસાઈટોસિસને પ્રોત્સાહન આપે છે. IgA મ્યુકોસલ સપાટી પર કામ કરે છે પરંતુ ઓપ્સોનિન તરીકે કામ કરતું નથી.", "ref": "Std 12 - અધ્યાય 8: મનુષ્યમાં પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "જ્યારે એક પ્રતિદ્રવ્ય એન્ટિજેન સાથે બંધન કરે છે, ત્યારે નીચેનામાંથી કયો ફેરફાર પ્રતિદ્રવ્યની સંરચનામાં થતો નથી?", "opts": ["પ્રતિદ્રવ્યના વેરિયેબલ પ્રદેશમાં રૂપાંતરણ", "પ્રતિદ્રવ્યના કોન્સ્ટન્ટ પ્રદેશમાં રૂપાંતરણ", "પ્રતિદ્રવ્યના હિંજ પ્રદેશમાં લવચીકતા", "પ્રતિદ્રવ્યના એપિટોપ સાથે બંધન બાદ કોન્ફોર્મેશનલ બદલાવ"], "ans": 1, "exp": "પ્રતિદ્રવ્ય એન્ટિજેન સાથે બંધન કરતી વખતે, વેરિયેબલ પ્રદેશ (A) અને હિંજ પ્રદેશ (C)માં લવચીકતા તેમજ એપિટોપ સાથે બંધન બાદ કોન્ફોર્મેશનલ બદલાવ (D) થાય છે. પરંતુ કોન્સ્ટન્ટ પ્રદેશ (B)માં કોઈ રૂપાંતરણ થતું નથી, કારણ કે તે પ્રતિદ્રવ્યના સ્થિર ભાગ છે જે એન્ટિજેન બંધનમાં સીધો ભાગ લેતો નથી.", "ref": "Std 12 - અધ્યાય 8: મનુષ્યમાં પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન 'પ્રતિદ્રવ્ય-મધ્યસ્થી કોષવિઘટન' (Antibody-Mediated Cytotoxicity) વિશે સત્ય નથી?", "opts": ["આ પ્રક્રિયામાં પ્રતિદ્રવ્ય એન્ટિજેન ધરાવતા કોષને ચિહ્નિત કરે છે.", "આ પ્રક્રિયામાં કોમ્પ્લિમેન્ટ સિસ્ટમ સક્રિય થાય છે.", "આ પ્રક્રિયામાં NK કોષો સીધી રીતે લક્ષ્ય કોષને મારી નાખે છે.", "આ પ્રક્રિયામાં પ્રતિદ્રવ્ય કોષની સપાટી પરના એન્ટિજેન સાથે બંધન કરે છે."], "ans": 2, "exp": "પ્રતિદ્રવ્ય-મધ્યસ્થી કોષવિઘટનમાં, પ્રતિદ્રવ્ય એન્ટિજેન ધરાવતા કોષને ચિહ્નિત કરે છે (A), કોમ્પ્લિમેન્ટ સિસ્ટમ સક્રિય થાય છે (B), અને પ્રતિદ્રવ્ય કોષની સપાટી પરના એન્ટિજેન સાથે બંધન કરે છે (D). પરંતુ NK કોષો એડી (ADCC - Antibody-Dependent Cellular Cytotoxicity) દ્વારા કામ કરે છે, જ્યાં પ્રતિદ્રવ્ય લક્ષ્ય કોષને ચિહ્નિત કરે છે અને NK કોષો તેને મારી નાખે છે, પરંતુ સીધી રીતે મારી નાખતા નથી (C ખોટું છે).", "ref": "Std 12 - અધ્યાય 8: મનુષ્યમાં પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું પ્રતિદ્રવ્ય એન્ટિજેન સાથે બંધન પછી કોમ્પ્લિમેન્ટ સિસ્ટમને સક્રિય કરવા માટે સક્ષમ નથી?", "opts": ["IgG", "IgM", "IgA", "IgD"], "ans": 3, "exp": "IgD પ્રતિદ્રવ્ય એન્ટિજેન સાથે બંધન કરે છે પરંતુ કોમ્પ્લિમેન્ટ સિસ્ટમને સક્રિય કરવા માટે સક્ષમ નથી. IgG અને IgM કોમ્પ્લિમેન્ટ સિસ્ટમને સક્રિય કરે છે, જ્યારે IgA મુખ્યત્વે મ્યુકોસલ સપાટી પર કામ કરે છે. IgD મુખ્યત્વે B-કોષની સપાટી પર રહે છે અને એન્ટિજેન બંધન પછી કોમ્પ્લિમેન્ટ સક્રિયતા માટે જવાબદાર નથી.", "ref": "Std 12 - Chapter 10: પ્રતિરક્ષાતંત્ર (Immune System)", "ch": ""}, {"q": "નીચેનામાંથી કયું પ્રતિદ્રવ્ય મનુષ્યમાં સૌથી ઓછું પ્રમાણમાં હાજર હોય છે?", "opts": ["IgG", "IgM", "IgE", "IgA"], "ans": 2, "exp": "IgE પ્રતિદ્રવ્ય મનુષ્યમાં સૌથી ઓછું પ્રમાણમાં હાજર હોય છે. IgG (A) સૌથી વધુ પ્રમાણમાં હોય છે, IgM (B) અને IgA (D) પણ IgE કરતાં વધુ પ્રમાણમાં હોય છે.", "ref": "Std 12 - Chapter 10: પ્રતિરક્ષાતંત્ર (Immune System)", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પ્રતિદ્રવ્યની 'અવિશિષ્ટતા' (Non-specificity) વિશે સત્ય છે?", "opts": ["પ્રતિદ્રવ્ય એક જ એન્ટિજેન સાથે બંધન કરે છે", "પ્રતિદ્રવ્ય વિવિધ એન્ટિજેન સાથે બંધન કરે છે", "પ્રતિદ્રવ્ય એન્ટિજેન સાથે બંધન કરતું નથી", "પ્રતિદ્રવ્ય ફક્ત પ્રોટીન એન્ટિજેન સાથે બંધન કરે છે"], "ans": 1, "exp": "પ્રતિદ્રવ્યની અવિશિષ્ટતા (Non-specificity) એટલે કે તે વિવિધ એન્ટિજેન સાથે બંધન કરે છે (B). પ્રતિદ્રવ્ય એક જ એન્ટિજેન સાથે બંધન કરે છે (A) એ વિશિષ્ટતા (Specificity) છે. પ્રતિદ્રવ્ય એન્ટિજેન સાથે બંધન કરતું નથી (C) અને ફક્ત પ્રોટીન એન્ટિજેન સાથે બંધન કરે છે (D) એ બંને ખોટા છે.", "ref": "Std 12 - Chapter 10: પ્રતિરક્ષાતંત્ર (Immune System)", "ch": ""}, {"q": "જ્યારે એક વ્યક્તિને રક્ત અપાય છે ત્યારે, નીચેનામાંથી કયું પ્રતિદ્રવ્ય ABO રક્ત વર્ગ પ્રણાલીમાં હિમોલાઇસિસ માટે જવાબદાર છે અને તે કેવી રીતે કાર્ય કરે છે?", "opts": ["IgM પ્રતિદ્રવ્ય, જે એન્ટિજેન સાથે બંધન બાદ કોમ્પ્લિમેન્ટ સિસ્ટમને સક્રિય કરે છે અને રક્ત કોષોનું વિઘટન કરે છે.", "IgG પ્રતિદ્રવ્ય, જે એન્ટિજેન સાથે બંધન બાદ ફેગોસાઈટોસિસ દ્વારા રક્ત કોષોને નષ્ટ કરે છે.", "IgA પ્રતિદ્રવ્ય, જે એન્ટિજેન સાથે બંધન બાદ મ્યુકોસલ સપાટી પર હિમોલાઇસિસ કરે છે.", "IgE પ્રતિદ્રવ્ય, જે એન્ટિજેન સાથે બંધન બાદ માસ્ટ કોષોને સક્રિય કરે છે અને હિમોલાઇસિસ કરે છે."], "ans": 0, "exp": "IgM પ્રતિદ્રવ્ય ABO રક્ત વર્ગ પ્રણાલીમાં હિમોલાઇસિસ માટે જવાબદાર છે. તે એન્ટિજેન સાથે બંધન બાદ કોમ્પ્લિમેન્ટ સિસ્ટમને સક્રિય કરે છે, જે રક્ત કોષોનું વિઘટન કરે છે. IgG પ્રતિદ્રવ્ય ફેગોસાઈટોસિસ દ્વારા કાર્ય કરે છે, પરંતુ ABO અસંગતતામાં તે પ્રાથમિક રીતે જવાબદાર નથી. IgA મ્યુકોસલ સપાટી પર કાર્ય કરે છે, જ્યારે IgE એલર્જી પ્રતિક્રિયાઓમાં સક્રિય થાય છે.", "ref": "Std 12 - પ્રકરણ 10: પ્રતિરક્ષાતંત્ર અને માનવ આરોગ્ય", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પ્રતિદ્રવ્યની 'ક્રોસ-રિએક્ટિવિટી' (Cross-reactivity) વિશે સત્ય છે?", "opts": ["પ્રતિદ્રવ્ય એક જ એન્ટિજેન સાથે બંધન કરે છે અને અન્ય એન્ટિજેન સાથે કોઈ પ્રતિક્રિયા આપતું નથી.", "પ્રતિદ્રવ્ય એવા એન્ટિજેન સાથે પણ બંધન કરે છે જેની રચના મૂળ એન્ટિજેન જેવી હોય, પરંતુ સંપૂર્ણ રીતે સરખી ન હોય.", "પ્રતિદ્રવ્ય ફક્ત પ્રોટીન એન્ટિજેન સાથે જ બંધન કરે છે, કાર્બોહાઇડ્રેટ એન્ટિજેન સાથે નહીં.", "પ્રતિદ્રવ્યની ક્રોસ-રિએક્ટિવિટી તેની એવિડિટી પર આધાર રાખતી નથી."], "ans": 1, "exp": "પ્રતિદ્રવ્યની ક્રોસ-રિએક્ટિવિટી એટલે કે તે એવા એન્ટિજેન સાથે પણ બંધન કરે છે જેની રચના મૂળ એન્ટિજેન જેવી હોય, પરંતુ સંપૂર્ણ રીતે સરખી ન હોય. આ ઘણા બધા એન્ટિજેનમાં સામ્યતા હોવાને કારણે થાય છે. વિકલ્પ A ખોટો છે કારણ કે પ્રતિદ્રવ્ય એકથી વધારે એન્ટિજેન સાથે પ્રતિક્રિયા આપી શકે છે. વિકલ્પ C ખોટો છે કારણ કે પ્રતિદ્રવ્ય પ્રોટીન અને કાર્બોહાઇડ્રેટ એન્ટિજેન બંને સાથે બંધન કરી શકે છે. વિકલ્પ D ખોટો છે કારણ કે ક્રોસ-રિએક્ટિવિટી એવિડિટી પર આધાર રાખે છે.", "ref": "Std 12 - પ્રકરણ 10: પ્રતિરક્ષાતંત્ર અને માનવ આરોગ્ય", "ch": ""}, {"q": "નીચેનામાંથી કયું પ્રતિદ્રવ્ય માતાના દૂધ દ્વારા નવજાત શિશુને પસાર થઈ શકે છે અને તેનું મુખ્ય કાર્ય આંતરડામાં રોગકારકોને નિષ્ક્રિય કરવાનું છે?", "opts": ["IgG", "IgA", "IgM", "IgD"], "ans": 1, "exp": "IgA પ્રતિદ્રવ્યને 'સિક્રેટરી ઇમ્યુનોગ્લોબ્યુલિન' તરીકે ઓળખવામાં આવે છે અને તે માતાના દૂધ દ્વારા નવજાત શિશુને પસાર થાય છે. તે આંતરડામાં રોગકારકોને નિષ્ક્રિય કરવામાં મદદ કરે છે. IgG પણ પ્લેસેન્ટા દ્વારા પસાર થાય છે, પરંતુ તે દૂધ દ્વારા નહીં. IgM અને IgD આ કાર્ય માટે જવાબદાર નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એક દર્દીને એલર્જિક પ્રતિક્રિયા થાય છે. નીચેનામાંથી કયું પ્રતિદ્રવ્ય મસ્ટ કોષો અને બેસોફિલ્સ સાથે જોડાઈને હિસ્ટામાઇન મુક્ત કરવામાં મુખ્ય ભૂમિકા ભજવે છે?", "opts": ["IgG", "IgE", "IgA", "IgM"], "ans": 1, "exp": "IgE પ્રતિદ્રવ્ય એલર્જિક પ્રતિક્રિયાઓમાં મુખ્ય ભૂમિકા ભજવે છે. તે મસ્ટ કોષો અને બેસોફિલ્સ સાથે જોડાઈને હિસ્ટામાઇન મુક્ત કરે છે, જે એલર્જીના લક્ષણોનું કારણ બને છે. IgG, IgA અને IgM આ પ્રક્રિયામાં સીધી રીતે સામેલ નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પ્રતિદ્રવ્યની 'આઇસોટાઇપ સ્વિચિંગ' (Isotype Switching) પ્રક્રિયા વિશે અસત્ય છે?", "opts": ["આ પ્રક્રિયા દરમિયાન પ્રતિદ્રવ્યના વર્ગમાં ફેરફાર થાય છે, પરંતુ એન્ટિજેન વિશિષ્ટતા બદલાતી નથી.", "આ પ્રક્રિયા માટે T-સહાયક કોષો અને સાયટોકાઇન્સની જરૂર પડે છે.", "IgM થી IgG અથવા IgA માં સ્વિચિંગ થઈ શકે છે, પરંતુ IgD માં નહીં.", "આ પ્રક્રિયા દરમિયાન પ્રતિદ્રવ્યના હળવા શૃંખલાના જનીનો ફરીથી ગોઠવાય છે."], "ans": 3, "exp": "આઇસોટાઇપ સ્વિચિંગ દરમિયાન પ્રતિદ્રવ્યના ભારે શૃંખલાના જનીનો ફરીથી ગોઠવાય છે, હળવા શૃંખલાના જનીનો નહીં. આ પ્રક્રિયા દરમિયાન એન્ટિજેન વિશિષ્ટતા બદલાતી નથી, અને તે T-સહાયક કોષો અને સાયટોકાઇન્સની મદદથી થાય છે. IgM થી IgG અથવા IgA માં સ્વિચિંગ થઈ શકે છે, પરંતુ IgD માં નહીં.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એક પ્રયોગમાં, વૈજ્ઞાનિકોએ જોયું કે એક પ્રતિદ્રવ્ય એક કરતાં વધુ એન્ટિજેન સાથે બંધન કરી શકે છે, જોકે તેની વિશિષ્ટતા એક જ એન્ટિજેન માટે છે. આ ઘટનાને શું કહેવાય છે?", "opts": ["પોલીક્લોનલ પ્રતિદ્રવ્ય પ્રતિક્રિયા", "ક્રોસ-રિએક્ટિવિટી", "મલ્ટિવેલન્સી", "એવિડિટી"], "ans": 2, "exp": "ક્રોસ-રિએક્ટિવિટી એ ઘટના છે જેમાં એક પ્રતિદ્રવ્ય એક કરતાં વધુ એન્ટિજેન સાથે બંધન કરી શકે છે, કારણ કે એન્ટિજેન્સમાં સમાન એપિટોપ્સ હોય છે. પોલીક્લોનલ પ્રતિદ્રવ્ય પ્રતિક્રિયા એ વિવિધ પ્રતિદ્રવ્યોનું મિશ્રણ છે. મલ્ટિવેલન્સી એ પ્રતિદ્રવ્યની એક કરતાં વધુ એન્ટિજેન સાથે બંધન કરવાની ક્ષમતા છે, પરંતુ તે એક જ પ્રકારના એન્ટિજેન માટે હોય છે. એવિડિટી એ પ્રતિદ્રવ્યની એકંદર બંધન શક્તિ છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેનામાંથી કયું પ્રતિદ્રવ્ય પ્લેસેન્ટા દ્વારા માતાથી ગર્ભમાં પસાર થઈ શકે છે અને નવજાત શિશુને નિષ્ક્રિય રોગપ્રતિકારકતા પ્રદાન કરે છે?", "opts": ["IgM", "IgG", "IgA", "IgE"], "ans": 1, "exp": "IgG પ્રતિદ્રવ્ય પ્લેસેન્ટા દ્વારા માતાથી ગર્ભમાં પસાર થઈ શકે છે અને નવજાત શિશુને નિષ્ક્રિય રોગપ્રતિકારકતા પ્રદાન કરે છે. IgM, IgA અને IgE આ કાર્ય માટે સક્ષમ નથી, કારણ કે તેમનું આણ્વીય કદ મોટું હોય છે અને પ્લેસેન્ટા દ્વારા પસાર થઈ શકતા નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}];

  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
