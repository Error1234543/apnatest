<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gene Flow</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Gene Flow</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Gene Flow</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "જનીન પ્રવાહ (Gene Flow) ની સૌથી મહત્વની ભૂમિકા ક્યાં જોવા મળે છે?", "opts": ["એક જ જાતિમાં થતી ઉત્ક્રાંતિ (Evolution within a species)", "વિવિધ જાતિઓ વચ્ચે થતી જનીનની અદલાબદલી (Gene exchange between different species)", "એક જ પોપ્યુલેશનમાં થતી જનીનની ફેરબદલ (Gene exchange within a population)", "પ્રકાશસંશ્લેષણ દરમ્યાન થતી જનીનની હલનચલન (Gene movement during photosynthesis)"], "ans": 1, "exp": "જનીન પ્રવાહ એ જનીનની અદલાબદલી છે જે વિવિધ જાતિઓ અથવા પોપ્યુલેશન વચ્ચે થાય છે. આથી, વિકલ્પ B સૌથી યોગ્ય છે. વિકલ્પ A એક જ જાતિમાં થતી ઉત્ક્રાંતિ વિશે છે, જે જનીન પ્રવાહ નથી. વિકલ્પ C એક જ પોપ્યુલેશનમાં થતી જનીનની ફેરબદલ વિશે છે, જે જનીન પ્રવાહ નથી. વિકલ્પ D પ્રકાશસંશ્લેષણ સાથે સંબંધિત છે, જે જનીન પ્રવાહ સાથે કોઈ સંબંધ ધરાવતો નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "જનીન પ્રવાહ દ્વારા કયા પરિબળને લીધે નવી જનીનિક વૈવિધ્યતા ઉત્પન્ન થાય છે?", "opts": ["મ્યુટેશન (Mutation)", "પ્રાકૃતિક પસંદગી (Natural Selection)", "જનીનની હલનચલન (Gene Migration)", "જનીનિક વહન (Genetic Drift)"], "ans": 2, "exp": "જનીન પ્રવાહ (Gene Flow) એ જનીનની હલનચલન દ્વારા થાય છે, જે નવી જનીનિક વૈવિધ્યતા ઉત્પન્ન કરે છે. વિકલ્પ A મ્યુટેશન વિશે છે, જે જનીન પ્રવાહ નથી. વિકલ્પ B પ્રાકૃતિક પસંદગી વિશે છે, જે જનીન પ્રવાહ નથી. વિકલ્પ D જનીનિક વહન વિશે છે, જે જનીન પ્રવાહ નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "જનીન પ્રવાહ ક્યારે ઘટે છે જ્યારે બે પોપ્યુલેશન વચ્ચે ભૌગોલિક અવરોધ હોય છે?", "opts": ["જ્યારે બંને પોપ્યુલેશન એકબીજાથી દૂર હોય છે", "જ્યારે બંને પોપ્યુલેશન એકબીજા સાથે સંપર્કમાં હોય છે", "જ્યારે બંને પોપ્યુલેશન એક જ સ્થળે હોય છે", "જ્યારે બંને પોપ્યુલેશન એકબીજાથી અલગ થઈ ગયા હોય છે"], "ans": 3, "exp": "જનીન પ્રવાહ ઘટે છે જ્યારે બે પોપ્યુલેશન વચ્ચે ભૌગોલિક અવરોધ હોય છે અને તેઓ એકબીજાથી અલગ થઈ ગયા હોય છે. વિકલ્પ A અને B સંપર્ક વિશે છે, જે જનીન પ્રવાહ વધારે છે. વિકલ્પ C એક જ સ્થળે હોવું જનીન પ્રવાહ વધારે છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "જનીન પ્રવાહ દ્વારા કયા પરિણામ સર્જાય છે?", "opts": ["પોપ્યુલેશનમાં જનીનિક સમાનતા વધે છે", "પોપ્યુલેશનમાં જનીનિક વૈવિધ્યતા ઘટે છે", "પોપ્યુલેશનમાં જનીનિક વૈવિધ્યતા વધે છે", "પોપ્યુલેશનમાં જનીનિક સ્થિરતા રહે છે"], "ans": 2, "exp": "જનીન પ્રવાહ દ્વારા પોપ્યુલેશનમાં જનીનિક વૈવિધ્યતા વધે છે, કારણ કે નવા જનીનની અદલાબદલી થાય છે. વિકલ્પ A અને B જનીન પ્રવાહના વિરોધી પરિણામ દર્શાવે છે. વિકલ્પ D જનીન પ્રવાહના પરિણામને સঠીક રીતે દર્શાવતો નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "જનીન પ્રવાહ અને જનીનિક વહન (Genetic Drift) વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["જનીન પ્રવાહ પોપ્યુલેશનની આકાર પર આધારિત છે, જ્યારે જનીનિક વહન નહીં", "જનીન પ્રવાહ યાદચ્છિક છે, જ્યારે જનીનિક વહન નિયોજિત છે", "જનીન પ્રવાહ પોપ્યુલેશન વચ્ચે થાય છે, જ્યારે જનીનિક વહન એક જ પોપ્યુલેશનમાં થાય છે", "જનીન પ્રવાહ અને જનીનિક વહન બંને એક જ પોપ્યુલેશનમાં થાય છે"], "ans": 2, "exp": "જનીન પ્રવાહ પોપ્યુલેશન વચ્ચે થાય છે, જ્યારે જનીનિક વહન એક જ પોપ્યુલેશનમાં થાય છે. વિકલ્પ A અને B જનીન પ્રવાહ અને જનીનિક વહનના ગુણધર્મોને ખોટી રીતે દર્શાવે છે. વિકલ્પ D જનીન પ્રવાહ અને જનીનિક વહનના સ્થળ વિશે ખોટી માહિતી આપે છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "જનીન પ્રવાહ દરમિયાન, જ્યારે એક પોપ્યુલેશનમાંથી બીજા પોપ્યુલેશનમાં જનીનનું સ્થળાંતર થાય છે, ત્યારે નીચેનામાંથી કયું પરિણામ સૌથી ઓછું સંભવિત છે?", "opts": ["નવી જનીનિક સંરચનાઓનું સર્જન થવું", "પોપ્યુલેશનમાં જનીનિક વૈવિધ્યતામાં ઘટાડો થવો", "પોપ્યુલેશનમાં હોમોઝાઇગસ વ્યક્તિઓની સંખ્યામાં વધારો થવો", "પોપ્યુલેશનમાં એલિલની આવૃત્તિમાં ફેરફાર થવો"], "ans": 1, "exp": "જનીન પ્રવાહ દરમિયાન, નવા જનીનોના આગમનથી જનીનિક વૈવિધ્યતામાં વધારો થાય છે, એલિલની આવૃત્તિમાં ફેરફાર થાય છે અને નવી જનીનિક સંરચનાઓ સર્જાય છે. હોમોઝાઇગસ વ્યક્તિઓની સંખ્યામાં વધારો થવો એ જનીનિક વહન (Genetic Drift) અથવા ઇનબ્રીડિંગનું પરિણામ હોઈ શકે, પરંતુ જનીન પ્રવાહમાં આ ઓછું સંભવિત છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "જનીન પ્રવાહને લગતા નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["તે પોપ્યુલેશન વચ્ચેના ભૌગોલિક અંતરને કારણે ઘટે છે", "તે હંમેશા પોપ્યુલેશનમાં જનીનિક વૈવિધ્યતામાં વધારો કરે છે", "તે એકદિશાત્મક (Unidirectional) અથવા દ્વિદિશાત્મક (Bidirectional) હોઈ શકે છે", "તે પ્રાણીઓ અને વનસ્પતિઓ બંનેમાં જોવા મળે છે"], "ans": 1, "exp": "જનીન પ્રવાહ પોપ્યુલેશનમાં જનીનિક વૈવિધ્યતામાં વધારો કરે છે, પરંતુ તે હંમેશા એવું કરતું નથી. ઉદાહરણ તરીકે, જ્યારે એક પોપ્યુલેશનમાંથી બીજા પોપ્યુલેશનમાં ફક્ત કેટલાક જનીનોનું સ્થળાંતર થાય છે, ત્યારે તે પોપ્યુલેશનમાં જનીનિક વૈવિધ્યતામાં ઘટાડો પણ થઈ શકે છે. બાકીના વિધાનો સત્ય છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "નીચેનામાંથી કયું કિસ્સામાં જનીન પ્રવાહનું પ્રમાણ સૌથી ઓછું હશે?", "opts": ["એક જ પ્રજાતિના બે પોપ્યુલેશન વચ્ચે પર્વત જેવો ભૌગોલિક અવરોધ હોય", "એક જ પ્રજાતિના બે પોપ્યુલેશન વચ્ચે નદી હોય, પરંતુ પ્રાણીઓ તરી શકે છે", "એક જ પ્રજાતિના બે પોપ્યુલેશન વચ્ચે ખેતર હોય, જ્યાં પ્રાણીઓ સરળતાથી ફરી શકે છે", "એક જ પ્રજાતિના બે પોપ્યુલેશન વચ્ચે રસ્તો હોય, પરંતુ પ્રાણીઓ રસ્તો ઓળંગી શકે છે"], "ans": 0, "exp": "પર્વત જેવો ભૌગોલિક અવરોધ જનીન પ્રવાહને સૌથી વધુ અટકાવે છે, કારણ કે પ્રાણીઓ અથવા વનસ્પતિઓ માટે આ અવરોધ ઓળંગવો મુશ્કેલ હોય છે. બાકીના કિસ્સાઓમાં, પ્રાણીઓ અથવા વનસ્પતિઓ માટે એક પોપ્યુલેશનમાંથી બીજા પોપ્યુલેશનમાં જવું સરળ હોય છે, જેથી જનીન પ્રવાહ વધુ હશે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "જનીન પ્રવાહ અને પ્રાકૃતિક પસંદગી (Natural Selection) વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["જનીન પ્રવાહ પોપ્યુલેશનમાં જનીનિક વૈવિધ્યતામાં ફેરફાર લાવે છે, જ્યારે પ્રાકૃતિક પસંદગી જનીનિક વૈવિધ્યતાને સ્થિર કરે છે", "જનીન પ્રવાહ એક પોપ્યુલેશનમાંથી બીજા પોપ્યુલેશનમાં જનીનોનું સ્થળાંતર કરે છે, જ્યારે પ્રાકૃતિક પસંદગી પોપ્યુલેશનમાં જનીનિક રચનાને બદલે છે", "જનીન પ્રવાહ હંમેશા પોપ્યુલેશનમાં ફાયદાકારક જનીનો લાવે છે, જ્યારે પ્રાકૃતિક પસંદગી હાનિકારક જનીનોને દૂર કરે છે", "જનીન પ્રવાહ અને પ્રાકૃતિક પસંદગી બંને પોપ્યુલેશનમાં જનીનિક વૈવિધ્યતામાં વધારો કરે છે"], "ans": 1, "exp": "જનીન પ્રવાહ એક પોપ્યુલેશનમાંથી બીજા પોપ્યુલેશનમાં જનીનોનું સ્થળાંતર કરે છે, જ્યારે પ્રાકૃતિક પસંદગી પોપ્યુલેશનમાં જનીનિક રચનાને બદલે છે. બાકીના વિધાનો અંશતઃ સત્ય અથવા અસત્ય છે. ઉદાહરણ તરીકે, જનીન પ્રવાહ હંમેશા ફાયદાકારક જનીનો લાવતું નથી, અને પ્રાકૃતિક પસંદગી હાનિકારક જનીનોને દૂર કરે છે પરંતુ જનીનિક વૈવિધ્યતામાં ઘટાડો પણ થઈ શકે છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "નીચેનામાંથી કયું કિસ્સામાં જનીન પ્રવાહનું પ્રમાણ સૌથી વધુ હશે?", "opts": ["એક જ પ્રજાતિના બે પોપ્યુલેશન વચ્ચે મહાસાગર હોય", "એક જ પ્રજાતિના બે પોપ્યુલેશન વચ્ચે જંગલ હોય, જ્યાં પ્રાણીઓ સરળતાથી ફરી શકે છે", "એક જ પ્રજાતિના બે પોપ્યુલેશન વચ્ચે રણ હોય", "એક જ પ્રજાતિના બે પોપ્યુલેશન વચ્ચે પર્વત હોય"], "ans": 1, "exp": "જંગલમાં પ્રાણીઓ સરળતાથી ફરી શકે છે, જેથી જનીન પ્રવાહનું પ્રમાણ સૌથી વધુ હશે. મહાસાગર, રણ અથવા પર્વત જેવા ભૌગોલિક અવરોધો જનીન પ્રવાહને ઘટાડે છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "જનીન પ્રવાહ દરમિયાન, જ્યારે એક જાતિના બે પોપ્યુલેશન વચ્ચે જનીનનું સ્થળાંતર થાય છે, ત્યારે નીચેનામાંથી કયું પરિણામ અપેક્ષિત નથી?", "opts": ["પોપ્યુલેશનમાં જનીનિક વૈવિધ્યતા વધે છે", "પોપ્યુલેશનમાં હોમોઝાયગસ વ્યક્તિઓની સંખ્યા વધે છે", "પોપ્યુલેશનમાં નવી એલિલની ભરતી થાય છે", "પોપ્યુલેશનમાં જનીનિક સંતુલનમાં ફેરફાર થાય છે"], "ans": 1, "exp": "જનીન પ્રવાહ દરમિયાન, નવી એલિલની ભરતી થવાથી જનીનિક વૈવિધ્યતા વધે છે (A), જનીનિક સંતુલનમાં ફેરફાર થાય છે (D), અને નવી એલિલની ભરતી થાય છે (C). પરંતુ હોમોઝાયગસ વ્યક્તિઓની સંખ્યા વધવી એ જનીન પ્રવાહનું અપેક્ષિત પરિણામ નથી, કારણ કે જનીન પ્રવાહ હેટરોઝાયગોસિટી વધારે છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયા કિસ્સામાં જનીન પ્રવાહનું પ્રમાણ સૌથી ઓછું હશે જ્યારે બે પોપ્યુલેશન વચ્ચે ભૌગોલિક અંતર ઓછું હોય પરંતુ અન્ય પરિબળો હાજર હોય?", "opts": ["પોપ્યુલેશનમાં પ્રજનન દર ઓછો હોય", "પોપ્યુલેશનમાં જનીનિક વૈવિધ્યતા ઓછી હોય", "પોપ્યુલેશન વચ્ચે સાંસ્કૃતિક અવરોધ હોય", "પોપ્યુલેશનમાં મુખ્યત્વે અલૈંગિક પ્રજનન થતું હોય"], "ans": 3, "exp": "જનીન પ્રવાહ માટે લૈંગિક પ્રજનન જરૂરી છે, કારણ કે તે જનીનના સ્થળાંતરને સક્રિય કરે છે. અલૈંગિક પ્રજનનમાં જનીનનું સ્થળાંતર થતું નથી, તેથી જનીન પ્રવાહનું પ્રમાણ સૌથી ઓછું હશે (D). બાકીના વિકલ્પો (A, B, C) જનીન પ્રવાહને અસર કરે છે, પરંતુ અલૈંગિક પ્રજનન એ સૌથી મહત્વપૂર્ણ પરિબળ છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "એક પોપ્યુલેશનમાં જનીન પ્રવાહ દ્વારા નવી એલિલની ભરતી થાય છે, પરંતુ તે પોપ્યુલેશનમાં હોમોઝાયગસ વ્યક્તિઓની સંખ્યા ઘટે છે. આનું મુખ્ય કારણ કયું છે?", "opts": ["નવી એલિલ હેટરોઝાયગસ અવસ્થામાં હાજર હોય છે", "પ્રાકૃતિક પસંદગી દ્વારા હોમોઝાયગસ વ્યક્તિઓ દૂર થાય છે", "જનીનિક વહન દ્વારા હોમોઝાયગસ વ્યક્તિઓની સંખ્યા ઘટે છે", "પોપ્યુલેશનમાં મ્યુટેશન દર વધે છે"], "ans": 0, "exp": "જનીન પ્રવાહ દરમિયાન, નવી એલિલ હેટરોઝાયગસ અવસ્થામાં હાજર હોય છે, જેના કારણે હોમોઝાયગસ વ્યક્તિઓની સંખ્યા ઘટે છે (A). બાકીના વિકલ્પો (B, C, D) જનીન પ્રવાહ સાથે સીધા સંબંધ ધરાવતા નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન જનીન પ્રવાહ વિશે ખોટું છે?", "opts": ["જનીન પ્રવાહ પોપ્યુલેશન વચ્ચે જનીનિક વૈવિધ્યતા વધારે છે", "જનીન પ્રવાહ પોપ્યુલેશનમાં હોમોઝાયગસ વ્યક્તિઓની સંખ્યા વધારે છે", "જનીન પ્રવાહ પોપ્યુલેશનમાં નવી એલિલની ભરતી કરે છે", "જનીન પ્રવાહ પોપ્યુલેશનમાં જનીનિક સંતુલન બદલી શકે છે"], "ans": 1, "exp": "જનીન પ્રવાહ પોપ્યુલેશનમાં હોમોઝાયગસ વ્યક્તિઓની સંખ્યા વધારતો નથી, ઉલટાનું તે હેટરોઝાયગસ વ્યક્તિઓની સંખ્યા વધારે છે (B ખોટું છે). બાકીના વિધાનો (A, C, D) જનીન પ્રવાહ વિશે સત્ય છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "જનીન પ્રવાહ દરમિયાન, એક પોપ્યુલેશનમાંથી બીજા પોપ્યુલેશનમાં સ્થળાંતર પામતા જીવો દ્વારા લાવવામાં આવતા એલિલની આવૃત્તિ પર કયા પરિબળનો સૌથી વધુ પ્રભાવ પડે છે?", "opts": ["સ્થળાંતર કરતા જીવોની સંખ્યા અને તેમની જનીનિક રચના", "પોપ્યુલેશનનું કદ અને તેની જનીનિક વૈવિધ્યતા", "ભૌગોલિક અંતર અને પર્યાવરણીય પરિસ્થિતિઓ", "પ્રાકૃતિક પસંદગી અને જનીનિક વહન"], "ans": 0, "exp": "જનીન પ્રવાહમાં એલિલની આવૃત્તિ પર સૌથી વધુ પ્રભાવ સ્થળાંતર કરતા જીવોની સંખ્યા અને તેમની જનીનિક રચના (એલિલની આવૃત્તિ)નો પડે છે. સ્થળાંતર કરતા જીવો જ્યારે નવા પોપ્યુલેશનમાં જનીન લાવે છે, ત્યારે તેમની જનીનિક રચના નવા પોપ્યુલેશનની જનીનિક રચનામાં ફેરફાર કરે છે. બાકીના વિકલ્પો: B) પોપ્યુલેશનનું કદ અને વૈવિધ્યતા જનીન પ્રવાહના પરિણામને અસર કરે છે, પરંતુ એલિલની આવૃત્તિ પર સીધો પ્રભાવ નથી. C) ભૌગો  "ch": ""}, {"q": "એક અલગ થયેલા દ્વીપ પર વસતી એક જાતિના પોપ્યુલેશનમાં, હવે પહેલાં ક્યારેક મુખ્ય ભૂમિથી આવેલા થોડાક પ્રાણીઓ દ્વારા નવા એલિલની ભરતી થાય છે. આ કિસ્સામાં જનીન પ્રવાહનો કયો અસરકારક પરિણામ જોવા મળશે?", "opts": ["પોપ્યુલેશનમાં જનીનિક વૈવિધ્યતા ઘટશે કારણ કે નવા એલિલ અસ્થિર હશે", "પોપ્યુલેશનમાં જનીનિક વૈવિધ્યતા વધશે અને લાંબા ગાળે ઉત્ક્રાંતિની દિશામાં ફેરફાર થઈ શકે", "પોપ્યુલેશનમાં પ્રાકૃતિક પસંદગીની અસર ખતમ થશે", "પોપ્યુલેશનમાં જનીનિક વહન (ડ્રિફ્ટ) ની અસર વધુ પ્રબળ બનશે"], "ans": 1, "exp": "બરાબર જવાબ B છે. જનીન પ્રવાહ દ્વારા નવા એલિલની ભરતી થવાથી પોપ્યુલેશનમાં જનીનિક વૈવિધ્યતા વધે છે, જે લાંબા ગાળે ઉત્ક્રાંતિની દિશામાં ફેરફાર લાવી શકે છે. A ખોટું છે કારણ કે નવા એલિલ અસ્થિર હોવા છતાં પણ તેઓ વૈવિધ્યતા વધારે છે. C ખોટું છે કારણ કે પ્રાકૃતિક પસંદગીની અસર જનીન પ્રવાહથી ખતમ થતી નથી. D ખોટું છે કારણ કે જનીનિક વહન (ડ્રિફ્ટ) ની અસર પોપ્યુલેશનના કદ પર નિર્ભર રહે છે, જનીન પ્રવાહથી તે પ્રભાવિત થતી નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
