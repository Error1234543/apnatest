<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પેનિસિલિન</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>પેનિસિલિન</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">પેનિસિલિન</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "પેનિસિલિનની શોધ કરનાર એલેક્ઝાન્ડર ફ્લેમિંગે તેનું નિરીક્ષણ કયા સૂક્ષ્મજીવના વિકાસને અવરોધતા કર્યું હતું?", "opts": ["*Staphylococcus aureus* નામના બેક્ટેરિયા", "*Penicillium notatum* નામની ફૂગ", "*Escherichia coli* નામના બેક્ટેરિયા", "*Aspergillus niger* નામની ફૂગ"], "ans": 0, "exp": "*Staphylococcus aureus* બેક્ટેરિયાના વિકાસને અવરોધતા ફ્લેમિંગે પેનિસિલિનની શોધ કરી હતી. વિકલ્પ B ખોટો છે કારણ કે *Penicillium notatum* એ પેનિસિલિન ઉત્પન્ન કરતી ફૂગ છે, તેનો વિકાસ અવરોધાતો નથી. વિકલ્પ C અને D ખોટા છે કારણ કે આ સૂક્ષ્મજીવો પેનિસિલિનની શોધ સાથે સીધા સંકળાયેલા નથી.", "ref": "Std 12 - પ્રકરણ 10: માનવ કલ્યાણમાં સૂક્ષ્મજીવો", "ch": ""}, {"q": "પેનિસિલિનની ક્રિયાવિધિ કયા પ્રકારની છે?", "opts": ["બેક્ટેરિયાના કોષદીવાલના સંશ્લેષણને અવરોધે છે", "બેક્ટેરિયાના પ્રોટીન સંશ્લેષણને અવરોધે છે", "બેક્ટેરિયાના DNA પ્રતિકૃતિને અવરોધે છે", "બેક્ટેરિયાના શ્વસન ઉત્સેચકોને અવરોધે છે"], "ans": 0, "exp": "પેનિસિલિન બેક્ટેરિયાના કોષદીવાલના સંશ્લેષણને અવરોધે છે, જેના કારણે બેક્ટેરિયા ફૂટી જાય છે. વિકલ્પ B ખોટો છે કારણ કે તે ટેટ્રાસાયક્લિન જેવા એન્ટિબાયોટિક્સની ક્રિયાવિધિ છે. વિકલ્પ C અને D ખોટા છે કારણ કે પેનિસિલિન આ પ્રક્રિયાઓને અસર કરતું નથી.", "ref": "Std 12 - પ્રકરણ 10: માનવ કલ્યાણમાં સૂક્ષ્મજીવો", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પેનિસિલિન માટે ખોટું છે?", "opts": ["તે ગ્રામ-નેગેટિવ બેક્ટેરિયા સામે વધુ અસરકારક છે", "તે બીટા-લેક્ટામ એન્ટિબાયોટિક્સના વર્ગમાં આવે છે", "તે કુદરતી રીતે ફૂગ દ્વારા ઉત્પન્ન થાય છે", "તે બેક્ટેરિયાના કોષદીવાલના સંશ્લેષણને અવરોધે છે"], "ans": 0, "exp": "પેનિસિલિન ગ્રામ-પોઝિટિવ બેક્ટેરિયા સામે વધુ અસરકારક છે, ગ્રામ-નેગેટિવ બેક્ટેરિયા સામે નહીં. વિકલ્પ B, C અને D સાચાં છે કારણ કે પેનિસિલિન બીટા-લેક્ટામ એન્ટિબાયોટિક્સમાં આવે છે, ફૂગ દ્વારા ઉત્પન્ન થાય છે અને કોષદીવાલના સંશ્લેષણને અવરોધે છે.", "ref": "Std 12 - પ્રકરણ 10: માનવ કલ્યાણમાં સૂક્ષ્મજીવો", "ch": ""}, {"q": "પેનિસિલિન પ્રત્યે પ્રતિકારકતા વિકસાવતા બેક્ટેરિયામાં કયો ઉત્સેચક મુખ્ય ભૂમિકા ભજવે છે?", "opts": ["બીટા-લેક્ટામેઝ", "પેનિસિલિનેઝ", "A અને B બંને", "લાઇસોઝાઇમ"], "ans": 2, "exp": "બેક્ટેરિયા બીટા-લેક્ટામેઝ અથવા પેનિસિલિનેઝ ઉત્સેચક ઉત્પન્ન કરીને પેનિસિલિનને નિષ્ક્રિય કરે છે, જેના કારણે પ્રતિકારકતા વિકસે છે. વિકલ્પ A અને B બંને સાચાં છે કારણ કે બીટા-લેક્ટામેઝ અને પેનિસિલિનેઝ એક જ ઉત્સેચકના જુદાં નામ છે. વિકલ્પ D ખોટો છે કારણ કે લાઇસોઝાઇમ માનવ પ્રતિરક્ષાતંત્રમાં જોવા મળે છે, બેક્ટેરિયામાં નહીં.", "ref": "Std 12 - પ્રકરણ 10: માનવ કલ્યાણમાં સૂક્ષ્મજીવો", "ch": ""}, {"q": "પેનિસિલિનની શોધ બાદ તેના વ્યાવસાયિક ઉત્પાદન માટે કયા વૈજ્ઞાનિકોએ મહત્ત્વપૂર્ણ યોગદાન આપ્યું હતું?", "opts": ["હાવર્ડ ફ્લોરી અને અર્ન્સ્ટ ચેઇન", "રોબર્ટ કોચ અને લૂઇ પાશ્ચર", "જેમ્સ વોટસન અને ફ્રાન્સિસ ક્રિક", "પૌલ એર્લિચ અને એલેક્ઝાન્ડર ફ્લેમિંગ"], "ans": 0, "exp": "હાવર્ડ ફ્લોરી અને અર્ન્સ્ટ ચેઇને પેનિસિલિનના શુદ્ધીકરણ અને વ્યાવસાયિક ઉત્પાદન માટે મહત્ત્વપૂર્ણ યોગદાન આપ્યું હતું. વિકલ્પ B ખોટો છે કારણ કે કોચ અને પાશ્ચર બેક્ટેરિયોલોજીના પિતા ગણાય છે, પરંતુ પેનિસિલિન સાથે સીધા સંકળાયેલા નથી. વિકલ્પ C ખોટો છે કારણ કે વોટસન અને ક્રિક DNAની રચના શોધી હતી. વિકલ્પ D ખોટો છે કારણ કે એર્લિચ સલ્ફા દવાઓ સાથે સંકળાયેલા હતા.", "ref": "Std 12 - પ્રકરણ 10: માનવ કલ્યાણમાં સૂક્ષ્મજીવો", "ch": ""}, {"q": "પેનિસિલિનની રાસાયણિક રચનામાં કયો વલય સમાવિષ્ટ હોય છે, જે તેની એન્ટિબાયોટિક ક્રિયાને જવાબદાર ગણવામાં આવે છે?", "opts": ["બેન્ઝીન વલય", "થાયાઝોલ વલય", "બીટા-લેક્ટમ વલય", "પિરિડીન વલય"], "ans": 2, "exp": "પેનિસિલિનની રાસાયણિક રચનામાં બીટા-લેક્ટમ વલય હોય છે, જે તેની એન્ટિબાયોટિક ક્રિયાને જવાબદાર ગણવામાં આવે છે. બીટા-લેક્ટમ વલય બેક્ટેરિયાની કોષભિત્તિના પેપ્ટિડોગ્લાયકન સંશ્લેષણને અવરોધે છે. બેન્ઝીન વલય (A) પેનિસિલિનમાં હાજર નથી. થાયાઝોલ વલય (B) પેનિસિલિનમાં હાજર નથી, પરંતુ તે પેનિસિલિન જેવા એન્ટિબાયોટિક્સમાં જોવા મળે છે. પિરિડીન વલય (D) પણ પેનિસિલિનની રચનામાં સમાવિષ્ટ નથી.", "ref": "Std 12 - Chapter 15: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "ch": ""}, {"q": "પેનિસિલિન G અને પેનિસિલિન V વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["પેનિસિલિન G ઓરલ રીતે લેવા યોગ્ય છે જ્યારે પેનિસિલિન V ઇન્જેક્શન દ્વારા આપવામાં આવે છે", "પેનિસિલિન V ઓરલ રીતે લેવા યોગ્ય છે જ્યારે પેનિસિલિન G ઇન્જેક્શન દ્વારા આપવામાં આવે છે", "પેનિસિલિન G અને પેનિસિલિન V બંને ઓરલ રીતે લેવા યોગ્ય છે", "પેનિસિલિન G અને પેનિસિલિન V બંને ઇન્જેક્શન દ્વારા આપવામાં આવે છે"], "ans": 1, "exp": "પેનિસિલિન V ઓરલ રીતે લેવા યોગ્ય છે કારણ કે તે એસિડ-પ્રતિરોધક છે અને પાચનતંત્રમાં ટકી રહે છે, જ્યારે પેનિસિલિન G એસિડ-સંવેદનશીલ છે અને ઇન્જેક્શન દ્વારા આપવામાં આવે છે. વિકલ્પ A, C, અને D ખોટા છે કારણ કે તેઓ પેનિસિલિન G અને V ની આપવાની પદ્ધતિને યોગ્ય રીતે વર્ણવતા નથી.", "ref": "Std 12 - Chapter 15: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "ch": ""}, {"q": "પેનિસિલિન એલર્જી ધરાવતા દર્દીને કયું એન્ટિબાયોટિક આપવું સલાહભર્યું છે?", "opts": ["એમોક્સિસિલિન", "સેફાલોસ્પોરિન", "ટેટ્રાસાયક્લિન", "જેન્ટામાઇસિન"], "ans": 2, "exp": "પેનિસિલિન એલર્જી ધરાવતા દર્દીને ટેટ્રાસાયક્લિન આપવું સલાહભર્યું છે કારણ કે તે પેનિસિલિન કુટુંબ સાથે કોઈ રાસાયણિક સાદૃશ્ય ધરાવતું નથી. એમોક્સિસિલિન (A) પેનિસિલિન કુટુંબનું જ છે, તેથી તે એલર્જી પેદા કરી શકે છે. સેફાલોસ્પોરિન (B) પેનિસિલિન સાથે કેટલાક રાસાયણિક સાદૃશ્ય ધરાવે છે, તેથી તે એલર્જી પેદા કરી શકે છે. જેન્ટામાઇસિન (D) એમિનોગ્લાયકોસાઇડ કુટુંબનું છે, પરંતુ તે પેનિસિલિન એલર્જી ધરાવતા દર્દીઓમાં પણ કેટલીક વખત એલર્જી પેદા કરી શકે છે.", "ref": "Std 12 - Chapter 15: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "ch": ""}, {"q": "પેનિસિલિનના ઉત્પાદન દરમિયાન કયા સૂક્ષ્મજીવનો ઉપયોગ થાય છે?", "opts": ["Aspergillus niger", "Penicillium chrysogenum", "Saccharomyces cerevisiae", "Escherichia coli"], "ans": 1, "exp": "પેનિસિલિનના ઉત્પાદન દરમિયાન Penicillium chrysogenum નામના ફૂગનો ઉપયોગ થાય છે. Aspergillus niger (A) સાઇટ્રિક એસિડ ઉત્પાદન માટે વપરાય છે. Saccharomyces cerevisiae (C) બિયર અને બ્રેડ ઉત્પાદન માટે વપરાય છે. Escherichia coli (D) જીવવિજ્ઞાન અને જનીન અભ્યાસમાં વપરાય છે, પરંતુ પેનિસિલિન ઉત્પાદન માટે નહીં.", "ref": "Std 12 - Chapter 15: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "ch": ""}, {"q": "પેનિસિલિનની ક્રિયા કયા બેક્ટેરિયલ ઉત્સેચકને અવરોધે છે, જે પેપ્ટિડોગ્લાયકન સંશ્લેષણમાં મહત્ત્વપૂર્ણ ભૂમિકા ભજવે છે?", "opts": ["DNA પોલિમરેઝ", "RNA પોલિમરેઝ", "ટ્રાન્સપેપ્ટિડેઝ", "એટીપેઝ"], "ans": 2, "exp": "પેનિસિલિન ટ્રાન્સપેપ્ટિડેઝ ઉત્સેચકને અવરોધે છે, જે પેપ્ટિડોગ્લાયકન સંશ્લેષણમાં મહત્ત્વપૂર્ણ ભૂમિકા ભજવે છે. DNA પોલિમરેઝ (A) અને RNA પોલિમરેઝ (B) અનુક્રમે DNA અને RNA સંશ્લેષણમાં મહત્ત્વપૂર્ણ છે. એટીપેઝ (D) ATP ને ADP અને ફોસ્ફેટમાં તોડીને ઉર્જા મુક્ત કરે છે, પરંતુ પેપ્ટિડોગ્લાયકન સંશ્લેષણ સાથે સંબંધિત નથી.", "ref": "Std 12 - Chapter 15: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "ch": ""}, {"q": "પેનિસિલિનના બીટા-લેક્ટમ વલયને તોડી નાખવા માટે બેક્ટેરિયા દ્વારા ઉત્પન્ન થતો ઉત્સેચક કયો છે, જે પેનિસિલિન પ્રતિરોધકતામાં મુખ્ય ભૂમિકા ભજવે છે?", "opts": ["પેનિસિલિનેઝ", "બીટા-લેક્ટામેઝ", "ટ્રાન્સપેપ્ટિડેઝ", "ડી-એલેનિન કાર્બોક્સિપેપ્ટિડેઝ"], "ans": 1, "exp": "બીટા-લેક્ટામેઝ ઉત્સેચક બીટા-લેક્ટમ વલયને તોડી નાખે છે, જે પેનિસિલિનની એન્ટિબાયોટિક ક્રિયાને નિષ્ક્રિય કરે છે. પેનિસિલિનેઝ નામનો ઉત્સેચક અસ્તિત્વમાં નથી. ટ્રાન્સપેપ્ટિડેઝ અને ડી-એલેનિન કાર્બોક્સિપેપ્ટિડેઝ પેપ્ટિડોગ્લાયકન સંશ્લેષણમાં ભાગ લે છે, પરંતુ બીટા-લેક્ટમ વલયને તોડતા નથી.", "ref": "Std 12 - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "ch": ""}, {"q": "પેનિસિલિનની ક્રિયા કયા બેક્ટેરિયલ કોષઘટક પર અસર કરે છે, જેના કારણે બેક્ટેરિયાનો કોષ ફૂલી જાય છે અને ફાટી જાય છે?", "opts": ["કોષરસપટલ", "કોષદીવાલ", "વર્ણસૂત્ર", "રાઇબોઝોમ"], "ans": 1, "exp": "પેનિસિલિન પેપ્ટિડોગ્લાયકન સંશ્લેષણને અવરોધે છે, જે કોષદીવાલના મુખ્ય ઘટક છે. આથી કોષદીવાલ નબળી પડે છે અને હાઈપોટોનિક વાતાવરણમાં કોષ ફૂલીને ફાટી જાય છે. કોષરસપટલ, વર્ણસૂત્ર, અને રાઇબોઝોમ પર પેનિસિલિનની કોઈ અસર થતી નથી.", "ref": "Std 12 - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "ch": ""}, {"q": "નીચેનામાંથી કયું પેનિસિલિનનું ડેરિવેટિવ નથી, પરંતુ તેની ક્રિયાવિધિ પેનિસિલિન જેવી જ છે?", "opts": ["એમ્પિસિલિન", "સેફાલોસ્પોરિન", "ક્લોવ્યુલેનિક એસિડ", "પેનિસિલિન G"], "ans": 1, "exp": "સેફાલોસ્પોરિન બીટા-લેક્ટમ એન્ટિબાયોટિક્સના કુટુંબનું છે, પરંતુ તે પેનિસિલિનનું ડેરિવેટિવ નથી. એમ્પિસિલિન, ક્લોવ્યુલેનિક એસિડ, અને પેનિસિલિન G પેનિસિલિનના ડેરિવેટિવ્સ છે.", "ref": "Std 12 - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "ch": ""}, {"q": "પેનિસિલિન પ્રત્યે પ્રતિકારકતા ધરાવતા બેક્ટેરિયામાં કયો જનીન સૌથી વધુ સામાન્ય રીતે મળી આવે છે, જે બીટા-લેક્ટામેઝ ઉત્સેચકનું ઉત્પાદન કરે છે?", "opts": ["blaTEM", "mecA", "vanA", "gyrA"], "ans": 0, "exp": "blaTEM જનીન બીટા-લેક્ટામેઝ ઉત્સેચકનું ઉત્પાદન કરે છે, જે પેનિસિલિનને નિષ્ક્રિય કરે છે. mecA જનીન મેથિસિલિન પ્રતિરોધકતા સાથે સંબંધિત છે, vanA જનીન વેનકોમાયસિન પ્રતિરોધકતા સાથે સંબંધિત છે, અને gyrA જનીન ફ્લોરોક્વિનોલોન પ્રતિરોધકતા સાથે સંબંધિત છે.", "ref": "Std 12 - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "ch": ""}, {"q": "પેનિસિલિનના ઉત્પાદન દરમિયાન કયા પોષક તત્ત્વની ઉણપથી પેનિસિલિનના ઉત્પાદનમાં ઘટાડો થાય છે?", "opts": ["ગ્લુકોઝ", "નાઇટ્રોજન", "ફોસ્ફરસ", "સલ્ફર"], "ans": 3, "exp": "સલ્ફર પેનિસિલિનના ઉત્પાદન માટે આવશ્યક છે, કારણ કે પેનિસિલિનની રચનામાં સલ્ફર સમાવિષ્ટ હોય છે. ગ્લુકોઝ, નાઇટ્રોજન, અને ફોસ્ફરસ પણ મહત્ત્વપૂર્ણ છે, પરંતુ સલ્ફરની ઉણપથી પેનિસિલિનના ઉત્પાદન પર સૌથી વધુ અસર થાય છે.", "ref": "Std 12 - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "ch": ""}, {"q": "પેનિસિલિનની એન્ટિબાયોટિક ક્રિયા બેક્ટેરિયાના કયા કોષઘટકના સંશ્લેષણને અવરોધે છે, જેના કારણે બેક્ટેરિયાનું કોષભિત્તિ કમજોર બને છે?", "opts": ["લિપિડ", "પ્રોટીન", "પેપ્ટિડોગ્લાયકન", "કાર્બોદિત"], "ans": 2, "exp": "પેનિસિલિન બેક્ટેરિયાના પેપ્ટિડોગ્લાયકન સંશ્લેષણને અવરોધે છે, જે કોષભિત્તિનું મુખ્ય ઘટક છે. લિપિડ, પ્રોટીન અને કાર્બોદિત કોષભિત્તિના અન્ય ઘટકો છે, પરંતુ પેનિસિલિન તેમના સંશ્લેષણને અવરોધતું નથી.", "ref": "Std 12 - પ્રકરણ 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "ch": ""}, {"q": "પેનિસિલિન પ્રત્યે એલર્જી ધરાવતા દર્દીને કયું એન્ટિબાયોટિક આપવું સલાહભર્યું છે, જે પેનિસિલિન જેવી જ ક્રિયાવિધિ ધરાવે છે પરંતુ રાસાયણિક રચનામાં ભિન્ન છે?", "opts": ["સેફાલોસ્પોરિન", "વેનકોમાયસિન", "એરિથ્રોમાયસિન", "ટેટ્રાસાયક્લિન"], "ans": 1, "exp": "વેનકોમાયસિન પેનિસિલિન જેવી ક્રિયાવિધિ ધરાવે છે (કોષભિત્તિ સંશ્લેષણને અવરોધે છે) પરંતુ રાસાયણિક રચનામાં ભિન્ન છે, જેથી પેનિસિલિન એલર્જી ધરાવતા દર્દી માટે સલાહભર્યું છે. સેફાલોસ્પોરિન પેનિસિલિન જેવી રચના ધરાવે છે, જ્યારે એરિથ્રોમાયસિન અને ટેટ્રાસાયક્લિન ભિન્ન ક્રિયાવિધિ ધરાવે છે.", "ref": "Std 12 - પ્રકરણ 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "ch": ""}, {"q": "પેનિસિલિનની એન્ટિબાયોટિક ક્રિયા કયા બેક્ટેરિયલ કોષચક્રના તબક્કે સૌથી   document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
