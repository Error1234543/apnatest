<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પરાગાશય</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>પરાગાશય</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">પરાગાશય</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "પરાગાશયમાં પરાગરજના વિકાસ દરમિયાન કયા કોષી ક્રિયા પગલામાં કોષકેન્દ્રનું વિભાજન થતું નથી?", "opts": ["પરાગમાતૃકોષમાંથી દ્વિઅરેણી કોષ તરફ", "દ્વિઅરેણી કોષમાંથી ચતુષ્કોષી પરાગાશય તરફ", "ચતુષ્કોષી પરાગાશયમાંથી પરિપક્વ પરાગરજ તરફ", "પરાગનળીના વિકાસ દરમિયાન"], "ans": 2, "exp": "પરાગાશયમાં પરાગરજના વિકાસ દરમિયાન, ચતુષ્કોષી પરાગાશયથી પરિપક્વ પરાગરજ તરફના પગલામાં કોષકેન્દ્રનું વિભાજન થતું નથી. આ પગલામાં મિટોસિસ વિભાજન થાય છે, પરંતુ કોષકેન્દ્રનું વિભાજન થતું નથી. બાકીના વિકલ્પોમાં કોષકેન્દ્રનું વિભાજન થાય છે: A) પરાગમાતૃકોષમાંથી દ્વિઅરેણી કોષ તરફ મિઓસિસ I દરમિયાન, B) દ્વિઅરેણી કોષમાંથી ચતુષ્કોષી પરાગાશય તરફ મિઓસિસ II દરમિયાન, D) પરાગનળીના વિકાસ દરમિયાન મિટોસિસ દરમિયાન કોષકેન્દ્રનું વિભાજન થાય છે.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં પુષ્પી વનસ્પતિઓ", "ch": ""}, {"q": "પરાગાશયની ભિત્તિમાં કયા પેશીનો સૌથી આંતરિક સ્તર હોય છે, જે પરાગરજના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે?", "opts": ["બાહ્યત્વચા", "મધ્યત્વચા", "અંતઃત્વચા", "વાસ્ક્યુલર પેશી"], "ans": 2, "exp": "પરાગાશયની ભિત્તિમાં અંતઃત્વચા (Tapetum) સૌથી આંતરિક સ્તર હોય છે, જે પરાગરજના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે. અંતઃત્વચા પરાગરજને પોષણ પૂરું પાડે છે અને ઉત્સેચકોનું સ્રાવણ કરે છે. બાકીના વિકલ્પો: A) બાહ્યત્વચા બાહ્ય સ્તર છે, B) મધ્યત્વચા મધ્ય સ્તર છે, D) વાસ્ક્યુલર પેશી પોષણ વહન કરે છે પરંતુ આંતરિક સ્તર નથી.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં પુષ્પી વનસ્પતિઓ", "ch": ""}, {"q": "પરાગાશયમાં પરાગરજના વિકાસ દરમિયાન કયા પગલામાં DNAની પ્રતિકૃતિ (Replication) થતી નથી?", "opts": ["પરાગમાતૃકોષમાં", "દ્વિઅરેણી કોષમાં", "એકરેણી કોષમાં", "પરિપક્વ પરાગરજમાં"], "ans": 3, "exp": "પરિપક્વ પરાગરજમાં DNAની પ્રતિકૃતિ થતી નથી, કારણ કે પરિપક્વ પરાગરજ હાપ્લોઇડ (n) હોય છે અને તેના કોષકેન્દ્રમાં DNAની પ્રતિકૃતિ થતી નથી. બાકીના વિકલ્પો: A) પરાગમાતૃકોષમાં (2n) મિઓસિસ પહેલા DNA પ્રતિકૃતિ થાય છે, B) દ્વિઅરેણી કોષમાં (2n) મિઓસિસ II પહેલા DNA પ્રતિકૃતિ થાય છે, C) એકરેણી કોષમાં (n) મિટોસિસ પહેલા DNA પ્રતિકૃતિ થાય છે.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં પુષ્પી વનસ્પતિઓ", "ch": ""}, {"q": "પરાગાશયમાં પરાગરજના વિકાસ દરમિયાન કયા ઉત્સેચકની ક્રિયા દ્વારા કોષભિત્તિનું નિર્માણ થાય છે?", "opts": ["એમાઇલેઝ", "સેલ્યુલેઝ", "કેટલેઝ", "કોલેસ્ટરોલ"], "ans": 1, "exp": "પરાગાશયમાં પરાગરજના વિકાસ દરમિયાન સેલ્યુલેઝ ઉત્સેચકની ક્રિયા દ્વારા કોષભિત્તિનું નિર્માણ થાય છે. સેલ્યુલેઝ કોષભિત્તિના નિર્માણમાં મદદ કરે છે. બાકીના વિકલ્પો: A) એમાઇલેઝ કાર્બોદિતના પાચનમાં મદદ કરે છે, C) કેટલેઝ હાઇડ્રોજન પેરોક્સાઇડને પાણી અને ઓક્સિજનમાં તોડે છે, D) કોલેસ્ટરોલ લિપિડ છે, ઉત્સેચક નથી.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં પુષ્પી વનસ્પતિઓ", "ch": ""}, {"q": "પરાગાશયમાં પરાગરજના વિકાસ દરમિયાન કયા હોર્મોનની અસર હેઠળ પરાગનળીનો વિકાસ થાય છે?", "opts": ["ઓક્સિન", "જિબરેલિન", "સાયટોકાઇનિન", "એબ્સિસિક એસિડ"], "ans": 1, "exp": "પરાગાશયમાં પરાગરજના વિકાસ દરમિયાન જિબરેલિન હોર્મોનની અસર હેઠળ પરાગનળીનો વિકાસ થાય છે. જિબરેલિન પરાગનળીના વિકાસને પ્રોત્સાહન આપે છે. બાકીના વિકલ્પો: A) ઓક્સિન વૃદ્ધિ અને વિકાસમાં મદદ કરે છે, C) સાયટોકાઇનિન કોષ વિભાજનને પ્રોત્સાહન આપે છે, D) એબ્સિસિક એસિડ વૃદ્ધિને અવરોધે છે.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં પુષ્પી વનસ્પતિઓ", "ch": ""}, {"q": "પરાગાશયમાં પરાગરજના વિકાસ દરમિયાન, કયા પગલામાં સાયટોકાઇનેસિસ (કોષદ્રવ્ય વિભાજન) થતું નથી, પરંતુ કોષકેન્દ્રનું વિભાજન થાય છે?", "opts": ["મેગાસ્પોર જનન કોષમાં", "માઇક્રોસ્પોર મદર સેલમાં", "જનન કોષમાં", "વેજિટેટિવ કોષમાં"], "ans": 2, "exp": "જનન કોષમાં કોષકેન્દ્રનું વિભાજન થાય છે, પરંતુ સાયટોકાઇનેસિસ થતું નથી, જેથી બે શુક્રાણુ કોષોનું નિર્માણ થાય છે. મેગાસ્પોર જનન કોષ (A) મહિલા ગેમેટોફાઇટ સાથે સંબંધિત છે, માઇક્રોસ્પોર મદર સેલ (B)માં સાયટોકાઇનેસિસ થાય છે, અને વેજિટેટિવ કોષ (D)માં કોષકેન્દ્રનું વિભાજન થતું નથી.", "ref": "Std 12 - અધ્યાય 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "પરાગાશયની ભિત્તિમાં કયા પેશીનો સ્તર પરાગરજના પક્વ થવાના સમયે પચવામાં આવે છે અને પરાગરજને પોષણ પૂરું પાડે છે?", "opts": ["એપિડર્મિસ", "એન્ડોથેસિયમ", "મધ્ય પરત (Middle Layer)", "ટેપીટમ"], "ans": 3, "exp": "ટેપીટમ (D) પરાગાશયની ભિત્તિમાં સૌથી આંતરિક સ્તર છે, જે પરાગરજના વિકાસ દરમિયાન પચવામાં આવે છે અને પરાગરજને પોષણ પૂરું પાડે છે. એપિડર્મિસ (A) બાહ્ય સ્તર છે, એન્ડોથેસિયમ (B) પરાગાશયની ભિત્તિમાં હાજર હોય છે પરંતુ પચાતું નથી, અને મધ્ય પરત (C) પણ પચાતી નથી.", "ref": "Std 12 - અધ્યાય 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "પરાગાશયમાં પરાગરજના વિકાસ દરમિયાન, કયા પગલામાં કોષકેન્દ્રનું કદ વધારે છે પરંતુ DNA પ્રતિકૃતિ થતી નથી?", "opts": ["પ્રથમ મિટોટિક વિભાજન પહેલા", "પ્રથમ મિટોટિક વિભાજન પછી", "દ્વિતીય મિટોટિક વિભાજન પહેલા", "દ્વિતીય મિટોટિક વિભાજન પછી"], "ans": 1, "exp": "પ્રથમ મિટોટિક વિભાજન પછી (B), કોષકેન્દ્રનું કદ વધારે છે પરંતુ DNA પ્રતિકૃતિ થતી નથી. પ્રથમ મિટોટિક વિભાજન પહેલા (A) અને દ્વિતીય મિટોટિક વિભાજન પહેલા (C) DNA પ્રતિકૃતિ થાય છે. દ્વિતીય મિટોટિક વિભાજન પછી (D) કોષકેન્દ્રનું કદ વધતું નથી.", "ref": "Std 12 - અધ્યાય 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "પરાગાશયમાં પરાગરજના વિકાસ દરમિયાન, કયા ઉત્સેચકની ક્રિયા દ્વારા કોષભિત્તિનું નિર્માણ થતું નથી, પરંતુ કોષદ્રવ્યમાં ગ્લાયકોપ્રોટીનનું સંશ્લેષણ થાય છે?", "opts": ["સેલ્યુલેઝ", "પેક્ટિનેઝ", "કાયટિનેઝ", "ગ્લાયકોઝાઇડેઝ"], "ans": 3, "exp": "ગ્લાયકોઝાઇડેઝ (D) ઉત્સેચક કોષદ્રવ્યમાં ગ્લાયકોપ્રોટીનનું સંશ્લેષણ કરે છે, પરંતુ કોષભિત્તિનું નિર્માણ કરતું નથી. સેલ્યુલેઝ (A) અને પેક્ટિનેઝ (B) કોષભિત્તિના ઘટકોનું વિઘટન કરે છે, જ્યારે કાયટિનેઝ (C) કાયટિનનું વિઘટન કરે છે.", "ref": "Std 12 - અધ્યાય 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "પરાગાશયમાં પરાગરજના વિકાસ દરમિયાન, કયા હોર્મોનની અસર હેઠળ પરાગનળીનો વિકાસ થતો નથી, પરંતુ પરાગાશયના ફૂલમાં પક્વતા પ્રેરે છે?", "opts": ["ઓક્સિન", "જિબરેલિન", "સાયટોકાઇનિન", "એબ્સિસિક એસિડ"], "ans": 2, "exp": "સાયટોકાઇનિન (C) પરાગાશયના ફૂલમાં પક્વતા પ્રેરે છે, પરંતુ પરાગનળીના વિકાસમાં સીધી અસર કરતું નથી. ઓક્સિન (A) અને જિબરેલિન (B) પરાગનળીના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે, જ્યારે એબ્સિસિક એસિડ (D) વિકાસને અવરોધે છે.", "ref": "Std 12 - અધ્યાય 2: પુષ્પી વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "પરાગાશયમાં પરાગરજના વિકાસ દરમિયાન, કયા પગલામાં માઇક્રોસ્પોર મધર સેલ (MMC) નું પ્રથમ મિટોટિક વિભાજન થાય છે, જેમાં કોષકેન્દ્રનું વિભાજન થાય છે પરંતુ કોષદ્રવ્યનું વિભાજન થતું નથી?", "opts": ["મેગાસ્પોર જનન કોષના નિર્માણ દરમિયાન", "પરાગરજ મધર કોષ (PMC) ના નિર્માણ દરમિયાન", "ટેટ્રાડ નિર્માણ દરમિયાન", "પરાગરજના પક્વ થવાના અંતિમ પગલામાં"], "ans": 1, "exp": "પરાગરજ મધર કોષ (PMC) ના નિર્માણ દરમિયાન પ્રથમ મિટોટિક વિભાજન થાય છે, જેમાં કોષકેન્દ્રનું વિભાજન થાય છે પરંતુ કોષદ્રવ્યનું વિભાજન થતું નથી, જેથી ટેટ્રાડ નિર્માણ પહેલાંના પગલામાં આ ઘટના જોવા મળે છે. મેગાસ્પોર જનન કોષ (A) મહિલા પ્રજનન સાથે સંબંધિત છે, ટેટ્રાડ નિર્માણ (C) પછીના પગલામાં કોષદ્રવ્યનું વિભાજન થાય છે, અને પરાગરજના પક્વ થવાના અંતિમ પગલામાં (D) કોષદ્રવ્યનું વિભાજન થાય છે.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં પુષ્પી વનસ્પતિઓ", "ch": ""}, {"q": "પરાગાશયની ભિત્તિમાં કયા પેશીનો સ્તર પરાગરજના વિકાસ દરમિયાન પોષણ પૂરું પાડે છે અને પરાગરજના પક્વ થયા પછી નાશ પામે છે?", "opts": ["એપિડર્મિસ", "એન્ડોથેસિયમ", "મધ્ય પરત (Middle Layer)", "ટેપીટમ"], "ans": 3, "exp": "ટેપીટમ પેશી પરાગાશયની ભિત્તિમાં સૌથી આંતરિક સ્તર હોય છે અને પરાગરજના વિકાસ દરમિયાન પોષણ પૂરું પાડે છે. પરાગરજ પક્વ થયા પછી આ પેશી નાશ પામે છે. એપિડર્મિસ (A) બાહ્ય સ્તર છે, એન્ડોથેસિયમ (B) પરાગાશયની ભિત્તિનું સ્તર છે પરંતુ પોષણ સાથે સંબંધિત નથી, અને મધ્ય પરત (C) પણ પોષણ પૂરું પાડતી નથી.", "ref": "Std 12 - પ્રકરણ 2: લૈંગિક પ્રજનનમાં પુષ્પી વનસ્પતિઓ", "ch": ""}, {"q": "પરાગાશયમાં પરાગરજના નિર્માણ દરમિયાન, નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["માઇક્રોસ્પોર મધર સેલ (MMC) મિયોસિસ-I દ્વારા બે કોષોમાં વિભાજિત થાય છે, જે દરેક ડિપ્લોઇડ હોય છે.", "માઇક્રોસ્પોર ટેટ્રાડ મિયોસિસ-II પૂર્ણ થયા બાદ રચાય છે, જે ચાર હેપ્લોઇડ માઇક્રોસ્પોર ધરાવે છે.", "પરાગરજની દીવાલનું નિર્માણ કેલોઝ ઉત્સેચકની ક્રિયા દ્વારા થાય છે, જે પછીથી પચી જાય છે.", "પરાગરજના વિકાસ દરમિયાન, ટેપેટમ પેશી પોષક તત્ત્વો પૂરા પાડે છે અને તે પછીથી અવશોષિત થઈ જાય છે."], "ans": 0, "exp": "માઇક્રોસ્પોર મધર સેલ (MMC) મિયોસિસ-I દ્વારા બે હેપ્લોઇડ કોષોમાં વિભાજિત થાય છે, ડિપ્લોઇડ નહીં. તેથી વિકલ્પ A ખોટું છે. વિકલ્પ B, C અને D સાચાં છે કારણ કે મિયોસિસ-II પછી ટેટ્રાડ રચાય છે, કેલોઝ ઉત્સેચક દીવાલ નિર્માણમાં મદદ કરે છે અને ટેપેટમ પોષણ પૂરું પાડે છે.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "પરાગાશયની રચના અને કાર્ય સંબંધિત નીચેનાં વિધાનોમાંથી કયું વિધાન અપવાદરૂપ છે?", "opts": ["પરાગાશયની દીવાલમાં એન્ડોથેસિયમ સ્તર પરાગરજના વિસર્જનમાં મદદ કરે છે.", "ટેપેટમ સ્તર પરાગરજના વિકાસ માટે પોષક તત્ત્વો પૂરા પાડે છે અને તે સ્ત્રાવી પેશી તરીકે કાર્ય કરે છે.", "પરાગાશયમાં માઇક્રોસ્પોર મધર સેલ (MMC) માત્ર મિયોસિસ દ્વારા વિભાજિત થાય છે, મિટોસિસ દ્વારા નહીં.", "પરાગરજની દીવાલમાં એક્સાઇન અને ઇન્ટાઇન સ્તરો હોય છે, જેમાં એક્સાઇન સ્પોરોપોલેનિનથી બનેલું હોય છે."], "ans": 2, "exp": "માઇક્રોસ્પોર મધર સેલ (MMC) માત્ર મિયોસિસ દ્વારા વિભાજિત થાય છે, પરંતુ મિયોસિસ પછી રચાયેલા માઇક્રોસ્પોર મિટોસિસ દ્વારા વિભાજિત થઈને પરાગરજનું નિર્માણ કરે છે. તેથી વિકલ્પ C અપવાદરૂપ છે. અન્ય વિકલ્પો સાચાં છે કારણ કે એન્ડોથેસિયમ વિસર્જનમાં મદદ કરે છે, ટેપેટમ પોષણ પૂરું પાડે છે અને એક્સાઇન સ્પોરોપોલેનિનથી બનેલું હોય છે.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "પરાગાશયમાં પરાગરજના વિકાસ દરમિયાન, નીચેનામાંથી કયું પરિવર્તન યોગ્ય રીતે જોડાયેલું નથી?", "opts": ["માઇક્રોસ્પોર મધર સેલ (MMC) → મિયોસિસ-I → ડાયાડ (બે કોષો)", "ડાયાડ → મિયોસિસ-II → ટેટ્રાડ (ચાર માઇક્રોસ્પોર)", "ટેટ્રાડ → કેલોઝ દીવાલનું પચન → મુક્ત માઇક્રોસ્પોર", "માઇક્રોસ્પોર → મિટોસિસ → પરાગરજ (બે કોષીય)"], "ans": 3, "exp": "માઇક્રોસ્પોર મિટોસિસ દ્વારા વિભાજિત થઈને દ્વિકોષીય પરાગરજ બનાવે છે, પરંતુ આ પ્રક્રિયામાં બે કોષો રચાય છે: વાનસ્પતિક કોષ અને જનન કોષ. વિકલ્પ D યોગ્ય રીતે વર્ણવતું નથી કે પરાગરજ બે કોષીય હોય છે. અન્ય વિકલ્પો સાચાં છે કારણ કે MMC મિયોસિસ-I દ્વારા ડાયાડમાં, પછી મિયોસિસ-II દ્વારા ટેટ્રાડમાં અને કેલોઝ દીવાલ પચીને મુક્ત માઇક્રોસ્પોર બને છે.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "પરાગાશયમાં પરાગરજના વિકાસ દરમિયાન, માઇક્રોસ્પોર મધર સેલ (MMC) ના વિભાજન પછી બનતી ચાર કોષોમાંથી કયા કોષનો નાશ થાય છે?", "opts": ["માઇક્રોસ્પોર ટેટ્રાડમાંથી એક જ કોષ", "માઇક્રોસ્પોર ટેટ્રાડમાંથી ત્રણ કોષ", "માઇક્રોસ્પોર ટેટ્રાડમાંથી બે કોષ", "માઇક્રોસ્પોર ટેટ્રાડમાંથી કોઈપણ કોષ નહીં"], "ans": 1, "exp": "માઇક્રોસ્પોર મધર સેલ (MMC) નું મિયોસિસ વિભાજન થતાં ચાર હેપ્લોઈડ ભાજન સમભાજી જેવું હોય છે", "સમભાજી વિભાજન (Mitosis) દ્વારા બે દ્વિકીય કોષોનું નિર્માણ થાય છે, જે પછી અર્ધસૂત્રીભાજનથી વિભાજિત થાય છે"], "ans": 1, "exp": "પરાગાશયમાં પરાગરજના નિર્માણ દરમિયાન માઇક્રોસ્પોર મધર સેલ (MMC) અર્ધસૂત્રીભાજન (Meiosis) દ્વારા વિભાજિત થઈ ચાર એકકીય કોષોનું નિર્માણ કરે છે. આ પ્રક્રિયામાં પ્રથમ વિભાજનમાં ક્રોસિંગ ઓવર થાય છે અને દ્વિતીય વિભાજન પણ અર્ધસૂત્રીભાજનનું જ હોય છે. વિકલ્પ A ખોટો છે કારણ કે સમભાજી વિભાજનથી એકકીય કોષોનું નિર્માણ થતું નથી. વિકલ્પ C ખોટો છે કારણ કે દ્વિતીય વિભાજન સમભાજી જેવું હોતું નથી. વિકલ્પ D ખોટો છે કારણ કે MMC અર્ધસૂત્રીભાજનથી સીધા જ ચાર એકકીય કોષો બનાવે છે, બે દ્વિકીય કોષોનું નિર્માણ થતું નથી.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "પરાગાશયની રચનામાં જોવા મળતી 'ટેપેટમ' પેશી વિશે નીચેનાં વિધાનોમાંથી કયું વિધાન અપવાદરૂપ છે?", "opts": ["ટેપેટમ પેશી પરાગરજના વિકાસ દરમિયાન પોષક તત્ત્વો પૂરા પાડે છે અને તેનું વિઘટન થતું નથી", "ટેપેટમ પેશી પરાગરજના બાહ્ય આવરણ (Exine) ના નિર્માણમાં મદદ કરે છે", "કેટલીક વનસ્પતિઓમાં ટેપેટમ પેશીના કોષો બહુકોષકેન્દ્રીય (Multinucleate) બની શકે છે", "ટેપેટમ પેશી પરાગરજના વિકાસ દરમિયાન ઉત્સેચકો અને હોર્મોન્સનો સ્ત્રાવ કરે છે"], "ans": 0, "exp": "ટેપેટમ પેશી પરાગરજના વિકાસ દરમિયાન પોષક તત્ત્વો પૂરા પાડે છે, પરંતુ તેનું વિઘટન થાય છે અને તે પૂર્ણ થયા બાદ નાશ પામે છે. આથી વિકલ્પ A અપવાદરૂપ છે. વિકલ્પ B, C અને D સાચાં છે કારણ કે ટેપેટમ પેશી પરાગરજના બાહ્ય આવરણના નિર્માણમાં મદદ કરે છે, કેટલીક વનસ્પતિઓમાં બહુકોષકેન્દ્રીય બની શકે છે અને ઉત્સેચકો તથા હોર્મોન્સનો સ્ત્રાવ કરે છે.", "ref": "Std 12 - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}];

  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
