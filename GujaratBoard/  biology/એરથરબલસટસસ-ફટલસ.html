<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસમાં ગર્ભમાં રહેલા ભ્રૂણના લોહીમાં હિમોગ્લોબિનનું પ્રમાણ અતિશય ઘટી જવાનું મુખ્ય કારણ કયું છે?", "opts": ["Rh+ પિતા પાસેથી વારસામાં મળેલા Rh એન્ટિજનને કારણે માતાના પ્રતિરક્ષા તંત્ર દ્વારા એન્ટિબોડીનું નિર્માણ થવું", "માતાના Rh- લોહીમાં પિતા પાસેથી મળેલા Rh+ એન્ટિજન વિરુદ્ધ IgG પ્રકારના એન્ટિબોડી બનવા અને તે ભ્રૂણના લાલ રક્તકણોને નષ્ટ કરવા", "ભ્રૂણમાં હિમોગ્લોબિન સિંથેસ માટે જરૂરી આયર્નનું અભાવ હોવું", "માતાના લોહીમાં હિમોલાઇટિક ટોક્સિનની હાજરી હોવી"], "ans": 1, "exp": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસ Rh અસંગતતાને કારણે થાય છે, જ્યારે Rh- માતા અને Rh+ પિતા હોય. પ્રથમ ગર્ભધારણ દરમિયાન, Rh+ ભ્રૂણના લાલ રક્તકણો માતાના લોહીમાં પ્રવેશે ત્યારે માતાના પ્રતિરક્ષા તંત્રમાં Rh એન્ટિજન વિરુદ્ધ IgG એન્ટિબોડી બને છે. બીજા ગર્ભધારણ દરમિયાન, આ IgG એન્ટિબોડી પ્લેસેન્ટા દ્વારા ભ્રૂણમાં પહોંચે છે અને ભ્રૂણના Rh+ લાલ રક્તકણોને નષ્ટ કરે છે, જેના કારણે હિમોગ્લોબિનનું પ્રમાણ ઘટે છે. વિકલ્પ A અધૂરો છે કારણ કે તે એન્ટિબોડીના પ્રકાર અને તેની અસર વર્ણવતો નથી. વિકલ્પ C અને D આ રોગના મુખ્ય કારણ સાથે સંબંધિત નથી.", "ref": "Std 12 - પ્રકરણ 5: માનવ પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસના કિસ્સામાં, નવજાત શિશુમાં કયા લક્ષણો જોવા મળે છે?", "opts": ["ત્વચા અને આંખોનું પીળાપણું, યકૃત અને પ્લીહાનું મોટું હોવું, હિમોગ્લોબિનનું નીચું પ્રમાણ", "લોહીમાં શર્કરાનું પ્રમાણ વધવું, મૂત્રમાં ગ્લુકોઝ હાજર હોવું", "હાડકાંની નબળાઈ અને વિકૃતિઓ, કેલ્શિયમનું અભાવ", "લોહીમાં પ્લેટલેટ્સનું પ્રમાણ અતિશય વધવું, રક્તસ્રાવની સમસ્યાઓ"], "ans": 0, "exp": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસમાં, ભ્રૂણના લાલ રક્તકણોનું વિઘટન થવાથી બિલિરુબિનનું પ્રમાણ વધે છે, જેના કારણે ત્વચા અને આંખોનું પીળાપણું (જૌન્ડિસ) થાય છે. યકૃત અને પ્લીહા ભ્રૂણના લાલ રક્તકણોના નિર્માણને વેગ આપવા માટે મોટા થાય છે. હિમોગ્લોબિનનું પ્રમાણ ઘટવાને કારણે એનિમિયા થાય છે. વિકલ્પ B, C, અને D આ રોગના લક્ષણો સાથે સંબંધિત નથી.", "ref": "Std 12 - પ્રકરણ 5: માનવ પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસને રોકવા માટે કયું પગલું સૌથી અસરકારક છે?", "opts": ["ગર્ભાવસ્થા દરમિયાન માતાને આયર્નની ગોળીઓ આપવી", "પ્રસૂતિ પછી તરત જ Rh- માતાને Rh એન્ટી-D ઇમ્યુનોગ્લોબ્યુલિન (Rhogam) ઇંજેક્શન આપવું", "ગર્ભાવસ્થા દરમિયાન માતાને વિટામિન K આપવું", "નવજાત શિશુને તરત જ રક્તાધાન કરવું"], "ans": 1, "exp": "Rh- માતા અને Rh+ ભ્રૂણના કિસ્સામાં, પ્રસૂતિ દરમિયાન અથવા ગર્ભપાત પછી, Rh+ લોહી માતાના લોહીમાં પ્રવેશી શકે છે, જેના કારણે માતાના પ્રતિરક્ષા તંત્રમાં Rh એન્ટિબોડી બને છે. Rh એન્ટી-D ઇમ્યુનોગ્લોબ્યુલિન (Rhogam) ઇંજેક્શન આપવાથી માતાના પ્રતિરક્ષા તંત્રને Rh+ લાલ રક્તકણો વિરુદ્ધ એન્ટિબોડી બનાવતા અટકાવી શકાય છે. વિકલ્પ A, C, અને D આ સમસ્યાને રોકવામાં અસરકારક નથી.", "ref": "Std 12 - પ્રકરણ 5: માનવ પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસમાં, ભ્રૂણના લોહીમાં કયા પ્રકારના એન્ટિબોડી હાજર હોય છે, જે લાલ રક્તકણોને નષ્ટ કરે છે?", "opts": ["IgM", "IgA", "IgG", "IgE"], "ans": 2, "exp": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસમાં, માતાના પ્રતિરક્ષા તંત્ર દ્વારા ઉત્પન્ન થતા IgG પ્રકારના એન્ટિબોડી પ્લેસેન્ટા દ્વારા ભ્રૂણમાં પહોંચે છે અને ભ્રૂણના Rh+ લાલ રક્તકણોને નષ્ટ કરે છે. IgG એન્ટિબોડી પ્લેસેન્ટાને પાર કરી શકે છે, જ્યારે IgM, IgA, અને IgE એન્ટિબોડી પ્લેસેન્ટાને પાર કરી શકતા નથી.", "ref": "Std 12 - પ્રકરણ 5: માનવ પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસના કિસ્સામાં, નવજાત શિશુમાં કયા પરીક્ષણ દ્વારા રોગની પુષ્ટિ થઈ શકે છે?", "opts": ["લોહીમાં ગ્લુકોઝનું પ્રમાણ માપવું", "કોમ્બ્સ ટેસ્ટ (Coombs Test)", "લોહીમાં કેલ્શિયમનું પ્રમાણ માપવું", "લોહીમાં યુરિયાનું પ્રમાણ માપવું"], "ans": 1, "exp": "કોમ્બ્સ ટેસ્ટ (Coombs Test) એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસની પુષ્ટિ કરવા માટે વપરાતું એક મહત્વપૂર્ણ પરીક્ષણ છે. આ પરીક્ષણ દ્વારા લાલ રક્તકણો પર એન્ટિબોડીની હાજરી શોધી શકાય છે, જે આ રોગના કિસ્સામાં હાજર હોય છે. વિકલ્પ A, C, અને D આ રોગની પુષ્ટિ કરવા માટે ઉપયોગી નથી.", "ref": "Std 12 - પ્રકરણ 5: માનવ પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસમાં, Rh-નેગેટિવ માતાના શરીરમાં Rh-પોઝિટિવ ભ્રૂણના લોહીથી કયા પ્રકારના પ્રતિદ્રવ્ય (એન્ટિબોડી) ઉત્પન્ન થાય છે, જે ભવિષ્યના ગર્ભધારણ દરમિયાન સમસ્યા ઉભી કરે છે?", "opts": ["IgG પ્રતિદ્રવ્ય, જે પ્લેસેન્ટા દ્વારા ભ્રૂણમાં પસાર થઈ શકે છે", "IgM પ્રતિદ્રવ્ય, જે પ્લેસેન્ટા દ્વારા ભ્રૂણમાં પસાર થઈ શકતું નથી", "IgA પ્રતિદ્રવ્ય, જે શ્લેષ્મલ તંત્ર દ્વારા સ્રાવ પામે છે", "IgE પ્રતિદ્રવ્ય, જે એલર્જી પ્રતિક્રિયામાં ભાગ લે છે"], "ans": 0, "exp": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસમાં Rh-નેગેટિવ માતાના શરીરમાં Rh-પોઝિટિવ ભ્રૂણના લોહીથી IgG પ્રતિદ્રવ્ય ઉત્પન્ન થાય છે. IgG પ્રતિદ્રવ્ય પ્લેસેન્ટા દ્વારા ભ્રૂણમાં પસાર થઈ શકે છે, જે ભ્રૂણના લાલ રક્તકણોને નષ્ટ કરે છે. IgM પ્રતિદ્રવ્ય પ્લેસેન્ટા દ્વારા પસાર થઈ શકતું નથી, IgA શ્લેષ્મલ તંત્ર સાથે સંબંધિત છે, અને IgE એલર્જી પ્રતિક્રિયામાં ભાગ લે છે.", "ref": "Std 12 - Chapter 10: માનવ પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસના કિસ્સામાં, ભ્રૂણના લોહીમાં હિમોલાઇસિસ થવાનું મુખ્ય કારણ કયું છે?", "opts": ["માતાના IgG પ્રતિદ્રવ્ય ભ્રૂણના Rh-પોઝિટિવ લાલ રક્તકણો સાથે જોડાઈને તેમને નષ્ટ કરે છે", "ભ્રૂણના પોતાના પ્રતિરક્ષા તંત્ર દ્વારા લાલ રક્તકણો પર હુમલો થાય છે", "માતાના લોહીમાં હિમોગ્લોબિનનું પ્રમાણ ઘટી જવાને લીધે ભ્રૂણના લોહીમાં હિમોલાઇસિસ થાય છે", "પ્લેસેન્ટા દ્વારા ઓક્સિજનના અભાવને લીધે ભ્રૂણના લાલ રક્તકણો નષ્ટ થાય છે"], "ans": 0, "exp": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસમાં, માતાના IgG પ્રતિદ્રવ્ય ભ્રૂણના Rh-પોઝિટિવ લાલ રક્તકણો સાથે જોડાઈને તેમને નષ્ટ કરે છે, જે હિમોલાઇસિસ તરફ દોરી જાય છે. ભ્રૂણનું પોતાનું પ્રતિરક્ષા તંત્ર આ પ્રક્રિયામાં ભાગ લેતું નથી. માતાના લોહીમાં હિમોગ્લોબિનનું પ્રમાણ ઘટવું અથવા ઓક્સિજનનો અભાવ હિમોલાઇસિસનું મુખ્ય કારણ નથી.", "ref": "Std 12 - Chapter 10: માનવ પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસના રોગી નવજાત શિશુમાં કયા હોર્મોનનું સ્તર અસાધારણ રીતે વધી જાય છે, જે પીળિયા (જૌન્ડિસ)નું કારણ બને છે?", "opts": ["બિલિરુબિન", "હિમોગ્લોબિન", "ઇરિથ્રોપોઇટિન", "થાયરોક્સિન"], "ans": 0, "exp": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસમાં, લાલ રક્તકણોના વિનાશને લીધે બિલિરુબિનનું સ્તર વધી જાય છે, જે પીળિયા (જૌન્ડિસ)નું કારણ બને છે. હિમોગ્લોબિનનું પ્રમાણ ઘટે છે, ઇરિથ્રોપોઇટિન લાલ રક્તકણોના ઉત્પાદનને ઉત્તેજે છે, અને થાયરોક્સિન ચયાપચય સાથે સંબંધિત છે.", "ref": "Std 12 - Chapter 10: માનવ પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસના કિસ્સામાં, નવજાત શિશુને કયા પ્રકારના રક્ત અદલાબદલી (બ્લડ ટ્રાન્સફ્યુઝન)ની જરૂર પડી શકે છે?", "opts": ["Rh-નેગેટિવ અને O-નેગેટિવ રક્ત", "Rh-પોઝિટિવ અને A-પોઝિટિવ રક્ત", "Rh-નેગેટિવ અને AB-પોઝિટિવ રક્ત", "Rh-પોઝિટિવ અને B-નેગેટિવ રક્ત"], "ans": 0, "exp": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસના કિસ્સામાં, નવજાત શિશુને Rh-નેગેટિવ અને O-નેગેટિવ રક્તની જરૂર પડે છે, કારણ કે આ રક્તમાં Rh એન્ટિજન હાજર નથી, જે નવજાત શિશુના લાલ રક્તકણોને નષ્ટ કરશે નહીં. અન્ય વિકલ્પો Rh-પોઝિટિવ અથવા અયોગ્ય રક્ત જૂથ ધરાવે છે, જે સમસ્યા ઉભી કરી શકે છે.", "ref": "Std 12 - Chapter 10: માનવ પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસના કિસ્સામાં, માતાના શરીરમાં Rh પ્રતિદ્રવ્ય (એન્ટિબોડી) ઉત્પન્ન થવાનું મુખ્ય કારણ કયું છે?", "opts": ["માતાના શરીરમાં Rh-પોઝિટિવ લોહીના સંપર્કથી પ્રતિરક્ષા તંત્ર સક્રિય થાય છે", "ભ્રૂણના લોહીમાં હિમોગ્લોબિનનું પ્રમાણ ઘટી જવાને લીધે પ્રતિદ્રવ્ય ઉત્પન્ન થાય છે", "માતાના શરીરમાં પોષક તત્ત્વોની ઉણપને લીધે પ્રતિદ્રવ્ય ઉત્પન્ન થાય છે", "પ્લેસેન્ટા દ્વારા ઓક્સિજનના અભાવને લીધે પ્રતિદ્રવ્ય ઉત્પન્ન થાય છે"], "ans": 0, "exp": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસમાં, માતાના શરીરમાં Rh-પોઝિટિવ લોહીના સંપર્કથી પ્રતિરક્ષા તંત્ર સક્રિય થાય છે, જે Rh પ્રતિદ્રવ્ય (એન્ટિબોડી) ઉત્પન્ન કરે છે. હિમોગ્લોબિનનું પ્રમાણ ઘટવું, પોષક તત્ત્વોની ઉણપ અથવા ઓક્સિજનનો અભાવ પ્રતિદ્રવ્ય ઉત્પન્ન થવાનું કારણ નથી.", "ref": "Std 12 - Chapter 10: માનવ પ્રતિરક્ષા તંત્ર", "ch": ""}, {"q": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસના કિસ્સામાં, Rh-નેગેટિવ માતાના શરીરમાં Rh-પોઝિટિવ ભ્રૂણના લોહીથી પ્રતિદ્રવ્ય (એન્ટિબોડી) ઉત્પન્ન થવાનું મુખ્ય કારણ કયું છે?", "opts": ["માતાના લોહીમાં Rh એન્ટિજનની હાજરી", "ભ્રૂણના લોહીમાંથી Rh એન્ટિજન માતાના લોહીમાં પ્રવેશવું", "માતાના લોહીમાં IgM પ્રતિદ્રવ્યની હાજરી", "ભ્રૂણના લોહીમાં IgG પ્રતિદ્રવ્યની હાજરી"], "ans": 1, "exp": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસમાં, Rh-નેગેટિવ માતાના શરીરમાં Rh-પોઝિટિવ ભ્રૂણના લોહીમાંથી Rh એન્ટિજન માતાના લોહીમાં પ્રવેશે છે, જેના કારણે માતાના પ્રતિરક્ષાતંત્ર દ્વારા Rh પ્રતિદ્રવ્ય (IgG) ઉત્પન્ન થાય છે. A) ખોટું છે કારણ કે માતા Rh-નેગેટિવ હોવાથી તેના લોહીમાં Rh એન્ટિજન હાજર નથી. C) ખોટું છે કારણ કે IgM પ્રતિદ્રવ્ય ભ્રૂણના લોહીમાં પ્રવેશી શકતું નથી. D) ખોટું છે કારણ કે ભ્રૂણના લોહીમાં IgG પ્રતિદ્રવ્ય હાજર નથી, પરંતુ માતાના લોહીમાં ઉત્પન્ન થાય છે.", "ref": "Std 12 - અંગ્રેજી મધ્યમ: Biology - Chapter 5: Human Health and Disease (મનુષ્યના આરોગ્ય અને રોગો)", "ch": ""}, {"q": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસના કિસ્સામાં, નવજાત શિશુમાં કયા અંગ પર સૌથી વધુ અસર થાય છે?", "opts": ["યકૃત (Liver)", "મગજ (Brain)", "પ્લીહા (Spleen)", "કિડની (Kidney)"], "ans": 0, "exp": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસમાં, લાલ રક્તકણોના વિઘટન (હિમોલાઇસિસ)ને કારણે બિલિરુબિનનું પ્રમાણ વધે છે, જે યકૃત (Liver) પર સૌથી વધુ અસર કરે છે. યકૃત બિલિરુબિનને પ્રક્રિયા કરવામાં અસમર્થ થાય છે, જેના કારણે પીળિયા (Jaundice) થાય છે. B) મગજ પર અસર થાય છે, પરંતુ તે પ્રાથમિક નથી. C) પ્લીહા પર અસર થાય છે, પરંતુ તે યકૃત જેટલી ગંભીર નથી. D) કિડની પર અસર થતી નથી.", "ref": "Std 12 - અંગ્રેજી મધ્યમ: Biology - Chapter 5: Human Health and Disease (મનુષ્યના આરોગ્ય અને રોગો)", "ch": ""}, {"q": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસના કિસ્સામાં, નવજાત શિશુમાં કયા પ્રકારના હિમોગ્લોબિનનું પ્રમાણ વધારે હોય છે?", "opts": ["HbA (Hemoglobin A)", "HbF (Hemoglobin F)", "HbA2 (Hemoglobin A2)", "HbS (Hemoglobin S)"], "ans": 1, "exp": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસમાં, ભ્રૂણના લોહીમાં હિમોલાઇસિસ થવાને કારણે, શરીર HbF (Fetal Hemoglobin)નું ઉત્પાદન વધારે કરે છે, જે ભ્રૂણના વિકાસ દરમિયાન હાજર હોય છે. A) HbA વયસ્કોમાં હાજર હોય છે. C) HbA2 વયસ્કોમાં થોડું પ્રમાણમાં હાજર હોય છે. D) HbS સિકલ સેલ એનિમિયામાં હાજર હોય છે.", "ref": "Std 12 - અંગ્રેજી મધ્યમ: Biology - Chapter 5: Human Health and Disease (મનુષ્યના આરોગ્ય અને રોગો)", "ch": ""}, {"q": "એક Rh-નેગેટિવ માતાને પ્રથમ ગર્ભાવસ્થામાં Rh-પોઝિટિવ ભ્રૂણ હતો, પરંતુ તેને એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસ થયો ન હતો. જો તેની બીજી ગર્ભાવસ્થામાં ફરીથી Rh-પોઝિટિવ ભ્રૂણ હોય, તો નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["બીજી ગર્ભાવસ્થામાં માતાના શરીરમાં IgG પ્રકારના એન્ટિ-Rh એન્ટિબોડીનું પ્રમાણ વધી જાય છે, જે પ્લેસેન્ટા પાર કરી શકે છે.", "પ્રથમ ગર્ભાવસ્થા દરમિયાન માતાના શરીરમાં IgM પ્રકારના એન્ટિ-Rh એન્ટિબોડી ઉત્પન્ન થયા હતા, જે પ્લેસેન્ટા પાર કરી શકતા નથી.", "બીજી ગર્ભાવસ્થામાં ભ્રૂણના લોહીમાં હિમોલાઇસિસ થવાનું મુખ્ય કારણ IgG એન્ટિબોડી છે, જે પ્રથમ ગર્ભાવસ્થા દરમિયાન ઉત્પન્ન થયા હતા.", "પ્રથમ ગર્ભાવસ્થા દરમિયાન માતાને એન્ટિ-Rh(D) ઇમ્યુનોગ્લોબ્યુલિન આપવામાં આવ્યું ન હતું, તેથી બીજી ગર્ભાવસ્થામાં એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસ થવાની શક્યતા વધી જાય છે."], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે કારણ કે IgG પ્રકારના એન્ટિ-Rh એન્ટિબોડી પ્રથમ ગર્ભાવસ્થા દરમિયાન ઉત્પન્ન થતા નથી, પરંતુ બીજી ગર્ભાવસ્થા દરમિયાન ઉત્પન્ન થાય છે. પ્રથમ ગર્ભાવસ્થામાં IgM પ્રકારના એન્ટિબોડી ઉત્પન્ન થાય છે, જે પ્લેસેન્ટા પાર કરી શકતા નથી. તેથી, પ્રથમ ગર્ભાવસ્થામાં એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસ થતો નથી. બીજી ગર્ભાવસ્થામાં IgG એન્ટિબોડી ઉત્પન્ન થાય છે, જે પ્લેસેન્ટા પાર કરી ભ્રૂણના લોહીમાં હિમોલાઇસિસનું કારણ બને છે. વિકલ્પ A, B અને D સાચાં છે.", "ref": "Std 12 - પ્રકરણ 5: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસના કિસ્સામાં, નવજાત શિશુમાં જોવા મળતી 'હાઇડ્રોપ્સ ફીટાલિસ' સ્થિતિ માટે નીચેનામાંથી કયું કારણ જવાબદાર નથી?", "opts": ["ભ્રૂણના લોહીમાં હિમોગ્લોબિનનું પ્રમાણ ઘટી જવાને કારણે એનિમિયા થાય છે.", "ભ્રૂણના યકૃત અને બરોળમાં લાલ રક્તકણોનો વધુ પડતો નાશ થવાથી હિપેટોસ્પ્લિનોમેગાલી થાય છે.", "ભ્રૂણના શરીરમાં બિલિરૂબિનનું પ્રમાણ વધી જવાથી કમળો થાય છે, જે હાઇડ્રોપ્સ ફીટાલિસનું મુખ્ય કારણ છે.", "ભ્રૂણના હૃદય પર વધુ પડતું દબાણ આવવાથી હૃદયની નિષ્ફળતા થાય છે, જેના કારણે શરીરમાં પ્રવાહી જમા થાય છે."], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે કારણ કે હાઇડ્રોપ્સ ફીટાલિસનું મુખ્ય કારણ બિલિરૂબિનનું વધુ પ્રમાણ નથી, પરંતુ એનિમિયા અને હૃદયની નિષ્ફળતા છે. એનિમિયાને કારણે ભ્રૂણના શરીરમાં ઓક્સિજનનું પ્રમાણ ઘટી જાય છે, જેના કારણે હૃદય પર વધુ દબાણ આવે છે અને હૃદયની નિષ્ફળતા થાય છે. આ સ્થિતિમાં શરીરમાં પ્રવાહી જમા થાય છે, જેને હાઇડ્રોપ્સ ફીટાલિસ કહે છે. વિકલ્પ A, B અને D હાઇડ્રોપ્સ ફીટાલિસના કારણો સાથે સુસંગત છે.", "ref": "Std 12 - પ્રકરણ 5: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસના કિસ્સામાં, નવજાત શિશુમાં 'કર્નિક્ટેરસ' (જૌનીસ) જોવા મળે છે. આ સ્થિતિ કયા પદાર્થના વધારાના સ્તરને કારણે ઉત્પન્ન થાય છે?", "opts": ["બિલિરુબિન", "હિમોગ્લોબિન", "યુરિયા", "ગ્લુકોઝ"], "ans": 0, "exp": "સીધો જવાબ A છે. એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસમાં લાલ રક્તકણોના વિનાશને કારણે બિલિરુબિનનું સ્તર વધે છે, જેના કારણે 'કર્નિક્ટેરસ' (જૌનીસ) ઉત્પન્ન થાય છે. B ખોટું છે કારણ કે હિમોગ્લોબિનનું સ્તર ઘટે છે. C ખોટું છે કારણ કે યુરિયા કિડનીની ખરાબી સાથે સંબંધિત છે. D ખોટું છે કારણ કે ગ્લુકોઝનું સ્તર ડાયાબિટીસ સાથે સંબંધિત છે.", "ref": "Std 12 - અંગ્રેજી મધ્યમ: Chapter 10: Human Health and Disease (ગુજરાતી મધ્યમ: મનુષ્ય સ્વાસ્થ્ય અને રોગો)", "ch": ""}, {"q": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસના કિસ્સામાં, નવજાત શિશુને Rh-નેગેટિવ રક્ત ચઢાવવામાં આવે છે. આ પગલાનું મુખ્ય ઉદ્દેશ્ય કયું છે?", "opts": ["ભ્રૂણના લાલ રક્તકણોને Rh એન્ટિજન વિરુદ્ધ લડવા માટે પ્રતિદ્રવ્ય પૂરા પાડવા", "માતાના શરીરમાંથી Rh પ્રતિદ્રવ્યને દૂર કરવા", "ભ્રૂણના લોહીમાં હિમોલાઇસિસને રોકવા અને લાલ રક્તકણોની સંખ્યા વધારવા", "ભ્રૂણના શરીરમાં હિમોગ્લોબિનનું સ્તર ઘટાડવા"], "ans": 2, "exp": "સીધો જવાબ C છે. Rh-નેગેટિવ રક્ત ચઢાવવાનું મુખ્ય ઉદ્દેશ્ય ભ્રૂણના લોહીમાં હિમોલાઇસિસને રોકવા અને લાલ રક્તકણોની સંખ્યા વધારવા છે. A ખોટું છે કારણ કે Rh-નેગેટિવ રક્તમાં Rh એન્ટિજન વિરુદ્ધ પ્રતિદ્રવ્ય હાજર નથી. B ખોટું છે કારણ કે રક્ત ચઢાવવાનું ઉદ્દેશ્ય માતાના શરીરમાંથી પ્રતિદ્રવ્ય દૂર કરવાનું નથી. D ખોટું છે કારણ કે હિમોગ્લોબિનનું સ્તર ઘટાડવાનું ઉદ્દેશ્ય નથી, પરંતુ વધારવાનું છે.", "ref": "Std 12 - અંગ્રેજી મધ્યમ: Chapter 10: Human Health and Disease (ગુજરાતી મધ્યમ: મનુષ્ય સ્વાસ્થ્ય અને રોગો)", "ch": ""}, {"q": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસના કિસ્સામાં, નવજાત શિશુમાં 'હાઇપરબિલિરુબિનેમિયા' જોવા મળે છે. આ સ્થિતિ કયા અંગ પર અસર કરે છે?", "opts": ["કિડની", "યકૃત", "મગજ", "હૃદય"], "ans": 2, "exp": "સીધો જવાબ C છે. 'હાઇપરબિલિરુબિનેમિયા' (બિલિરુબિનનું વધુ પ્રમાણ) મગજ પર અસર કરે છે, જેના કારણે 'કર્નિક્ટેરસ' (જૌનીસ) ઉત્પન્ન થાય છે. A ખોટું છે કારણ કે કિડની પર અસર થતી નથી. B ખોટું છે કારણ કે યકૃત બિલિરુબિનનું ઉત્પાદન કરે છે, પરંતુ તેની અસર મગજ પર થાય છે. D ખોટું છે કારણ કે હૃદય પર અસર થતી નથી.", "ref": "Std 12 - અંગ્રેજી મધ્યમ: Chapter 10: Human Health and Disease (ગુજરાતી મધ્યમ: મનુષ્ય સ્વાસ્થ્ય અને રોગો)", "ch": ""}, {"q": "એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસના કિસ્સામાં, નવજાત શિશુમાં 'એડીમા' (સોજો) જોવા મળે છે. આ સ્થિતિ કયા કારણસર ઉત્પન્ન થાય છે?", "opts": ["લોહીમાં હિમોગ્લોબિનનું પ્રમાણ વધવાને કારણે", "લોહીમાં પ્રોટીનનું પ્રમાણ ઘટવાને કારણે", "લોહીમાં ગ્લુકોઝનું પ્રમાણ વધવાને કારણે", "લોહીમાં કેલ્શિયમનું પ્રમાણ ઘટવાને કારણે"], "ans": 1, "exp": "સીધો જવાબ B છે. એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસમાં લાલ રક્તકણોના વિનાશને કારણે લોહીમાં પ્રોટીનનું પ્રમાણ ઘટે છે, જેના કારણે 'એડીમા' (સોજો) ઉત્પન્ન થાય છે. A ખોટું છે કારણ કે હિમોગ્લોબિનનું પ્રમાણ ઘટે છે. C ખોટું છે કારણ કે ગ્લુકોઝનું પ્રમાણ વધવાને કારણે એડીમા ઉત્પન્ન થતું નથી. D ખોટું છે કારણ કે કેલ્શિયમનું પ્રમાણ ઘટવાને કારણે એડીમા ઉત્પન્ન થતું નથી.", "ref": "Std 12 - અંગ્રેજી મધ્યમ: Chapter 10: Human Health and Disease (ગુજરાતી મધ્યમ: મનુષ્ય સ્વાસ્થ્ય અને રોગો)", "ch": ""}, {"q": "એક Rh-નેગેટિવ માતાને બીજી ગર્ભાવસ્થા દરમિયાન Rh-પોઝિટિવ ભ્રૂણ છે. પ્રથમ ગર્ભાવસ્થા દરમિયાન તેને એન્ટિ-Rh(D) ઇમ્યુનોગ્લોબ્યુલિન (RhIG) આપવામાં આવ્યું ન હતું. આ પરિસ્થિતિમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["માતાના શરીરમાં IgG પ્રકારના એન્ટિબોડી ઉત્પન્ન થઈ શકે છે જે પ્લેસેન્ટા પસાર કરી શકે છે", "ભ્રૂણના લોહીમાં હિમોલાઇસિસ થવાનું મુખ્ય કારણ માતાના IgM પ્રકારના એન્ટિબોડી છે", "નવજાત શિશુમાં એનિમિયા અને હાઇપરબિલિરુબિનેમિયા જોવા મળી શકે છે", "આ સ્થિતિને રોકવા માટે બીજી ગર્ભાવસ્થા પહેલાં અથવા દરમિયાન RhIG આપી શકાય છે"], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B છે. એરિથ્રોબ્લાસ્ટોસિસ ફીટાલિસમાં માતાના શરીરમાં IgG પ્રકારના એન્ટિબોડી ઉત્પન્ન થાય છે, જે પ્લેસેન્ટા પસાર કરી શકે છે અને ભ્રૂણના લાલ રક્તકોષોને નષ્ટ કરે છે. IgM પ્રકારના એન્ટિબોડી પ્લેસેન્ટા પસાર કરી શકતા નથી, તેથી તેઓ હિમોલાઇસિસ માટે જવાબદાર નથી. વિકલ્પ A, C અને D સાચાં વિધાનો છે. RhIG આપવાથી માતાના શરીરમાં એન્ટિબોડી ઉત્પન્ન થતાં અટકાવી શકાય છે.", "ref": "Std 12 - પ્રકરણ 5: પ્રતિરક્ષા અને માનવ સ્વાસ્થ્ય", "ch": ""}];

document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
