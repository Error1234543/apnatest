<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>જૈવિક ઘટકો</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>જૈવિક ઘટકો</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">જૈવિક ઘટકો</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 34 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 34 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "જૈવિક ઘટકોની વાતાવરણ સાથેની પરસ્પર ક્રિયામાં નીચેનામાંથી કયો ઘટક 'પ્રાથમિક ઉત્પાદક' તરીકે ઓળખાય છે, જેમાં તે સૂર્યપ્રકાશનો ઉપયોગ કરીને કાર્બન ડાયોક્સાઇડ અને પાણીમાંથી કાર્બોદિતોનું સંશ્લેષણ કરે છે?", "opts": ["પ્રાણીઓ", "બેક્ટેરિયા", "હરિત કણ ધરાવતા છોડ અને શેવાળ", "કવક"], "ans": 2, "exp": "હરિત કણ (ક્લોરોપ્લાસ્ટ) ધરાવતા છોડ અને શેવાળ પ્રકાશસંશ્લેષણ દ્વારા સૂર્યપ્રકાશનો ઉપયોગ કરીને કાર્બન ડાયોક્સાઇડ અને પાણીમાંથી કાર્બોદિતો (ગ્લુકોઝ)નું સંશ્લેષણ કરે છે, જેથી તેઓને 'પ્રાથમિક ઉત્પાદક' કહેવાય છે. પ્રાણીઓ, બેક્ટેરિયા અને કવક પ્રાથમિક ઉત્પાદક નથી, કારણ કે તેઓ પોતાનું ખોરાક સ્વયં બનાવી શકતા નથી.", "ref": "Std 11 - અધ્યાય 13: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "જૈવિક ઘટકોમાં ઉત્સેચકોની ભૂમિકા વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["ઉત્સેચકો જૈવિક પ્રતિક્રિયાઓની સક્રિયણ ઊર્જા ઘટાડે છે.", "ઉત્સેચકો પ્રતિક્રિયા પછી અછૂતા રહે છે.", "ઉત્સેચકો તાપમાન અને pH ના ફેરફારથી અસરગ્રસ્ત થતાં નથી.", "ઉત્સેચકો સબસ્ટ્રેટ સાથે વિશિષ્ટ રીતે જોડાય છે."], "ans": 2, "exp": "ઉત્સેચકો તાપમાન અને pH ના ફેરફારથી અસરગ્રસ્ત થાય છે, કારણ કે તેઓ પ્રોટીન હોય છે અને ઉચ્ચ તાપમાન અથવા અસામાન્ય pH પર તેઓનું ડીનેચરલાઇઝેશન થઈ શકે છે. બાકીના વિધાનો સાચાં છે: ઉત્સેચકો સક્રિયણ ઊર્જા ઘટાડે છે, પ્રતિક્રિયા પછી અછૂતા રહે છે, અને સબસ્ટ્રેટ સાથે વિશિષ્ટ રીતે જોડાય છે.", "ref": "Std 11 - અધ્યાય 9: જૈવિક અણુઓ અને ઉત્સેચકો", "ch": ""}, {"q": "નીચેનામાંથી કયો જૈવિક ઘટક 'અનુવંશિકતાનું વાહક' માનવામાં આવે છે અને તે કોષકેન્દ્રમાં સ્થિત હોય છે?", "opts": ["RNA", "પ્રોટીન", "DNA", "કાર્બોદિત"], "ans": 2, "exp": "DNA (ડી.એન.એ.) અનુવંશિકતાનું વાહક છે અને તે કોષકેન્દ્રમાં સ્થિત હોય છે. RNA, પ્રોટીન અને કાર્બોદિત અનુવંશિકતાનું વાહક નથી. RNA ક્યારેક જનીન વાહક તરીકે કામ કરે છે, પરંતુ પ્રાથમિક રીતે DNA જ અનુવંશિક માહિતીનું વહન કરે છે.", "ref": "Std 12 - અધ્યાય 3: અનુવંશિકતા અને વિકાસ", "ch": ""}, {"q": "જૈવિક ઘટકોમાં, નીચેનામાંથી કયો ઘટક 'ઉત્સર્જન' પ્રક્રિયામાં મુખ્ય ભૂમિકા ભજવે છે અને તે કિડની દ્વારા થાય છે?", "opts": ["યુરિયા", "ગ્લુકોઝ", "ઓક્સિજન", "કાર્બન ડાયોક્સાઇડ"], "ans": 0, "exp": "યુરિયા ઉત્સર્જન પ્રક્રિયાનો એક મુખ્ય પદાર્થ છે, જે કિડની દ્વારા શરીરમાંથી બહાર કાઢવામાં આવે છે. ગ્લુકોઝ શરીરનું ઊર્જા સ્રોત છે, ઓક્સિજન શ્વસનમાં વપરાય છે, અને કાર્બન ડાયોક્સાઇડ ફેફસાં દ્વારા બહાર કાઢવામાં આવે છે.", "ref": "Std 11 - અધ્યાય 19: ઉત્સર્જન અને ઉત્સર્જન તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયો જૈવિક ઘટક 'હોર્મોન' નથી, પરંતુ તે શરીરમાં રાસાયણિક સંદેશાવાહક તરીકે કામ કરે છે?", "opts": ["ઇન્સ્યુલિન", "એડ્રિનેલિન", "ન્યુરોટ્રાન્સમિટર", "થાયરોક્સિન"], "ans": 2, "exp": "ન્યુરોટ્રાન્સમિટર (જેમ કે એસિટાઇલકોલિન) શરીરમાં રાસાયણિક સંદેશાવાહક તરીકે કામ કરે છે, પરંતુ તે હોર્મોન નથી. ઇન્સ્યુલિન, એડ્રિનેલિન અને થાયરોક્સિન હોર્મોન છે, જે અંતઃસ્રાવી ગ્રંથિઓ દ્વારા સ્રાવવામાં આવે છે.", "ref": "Std 11 - અધ્યાય 22: રાસાયણિક સમન્વય અને એકીકરણ", "ch": ""}, {"q": "જૈવિક ઘટકોની પરસ્પર ક્રિયામાં, નીચેનામાંથી કયો ઘટક 'પ્રતિરક્ષાતંત્ર'ની ક્રિયામાં સીધી ભૂમિકા ભજવતો નથી, પરંતુ તેની હાજરીથી અન્ય ઘટકોની પ્રતિક્રિયા પ્રભાવિત થાય છે?", "opts": ["પ્રોટીન (એન્ટીબોડી)", "DNA (જનીન)", "હોર્મોન (કોર્ટિસોલ)", "વર્ણસૂત્ર (લ્યુકોસાઇટ્સની રચનામાં)"], "ans": 1, "exp": "પ્રતિરક્ષાતંત્રમાં સીધી ભૂમિકા ભજવતા ઘટકો એન્ટીબોડી (પ્રોટીન) અને લ્યુકોસાઇટ્સ (વર્ણસૂત્રો દ્વારા નિયંત્રિત) છે. હોર્મોન જેવા કે કોર્ટિસોલ પ્રતિરક્ષા પ્રતિક્રિયાને નિયંત્રિત કરે છે, પરંતુ DNA (જનીન) સીધી ભૂમિકા ભજવતું નથી, પરંતુ તે એન્ટીબોડી અને લ્યુકોસાઇટ્સની રચનાને નિયંત્રિત કરે છે. આથી, DNA સીધી ભૂમિકા વગરની પરોક્ષ ભૂમિકા ભજવે છે.", "ref": "Std 12 - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેનામાંથી કયો જૈવિક ઘટક 'પ્રકાશસંશ્લેષણ' અને 'શ્વસન' બંને પ્રક્રિયામાં સક્રિય ભૂમિકા ભજવે છે, પરંતુ તેની ભૂમિકા બંને પ્રક્રિયામાં જુદી જુદી છે?", "opts": ["ક્લોરોફિલ", "ઉત્સેચક (રુબિસ્કો)", "કાર્બોદિત (ગ્લુકોઝ)", "DNA"], "ans": 1, "exp": "રુબિસ્કો ઉત્સેચક પ્રકાશસંશ્લેષણમાં CO2 ફિક્સેશનમાં ભૂમિકા ભજવે છે, જ્યારે શ્વસનમાં તે કર્બન ચક્રમાં ભૂમિકા ભજવતું નથી. ક્લોરોફિલ ફક્ત પ્રકાશસંશ્લેષણમાં જ ભૂમિકા ભજવે છે. ગ્લુકોઝ શ્વસનમાં ઊર્જા સ્રોત છે, પરંતુ પ્રકાશસંશ્લેષણમાં તે ઉત્પાદન છે. DNA બંને પ્રક્રિયામાં સીધી ભૂમિકા ભજવતું નથી.", "ref": "Std 11 - Chapter 13: પ્રકાશસંશ્લેષણ અને શ્વસન", "ch": ""}, {"q": "જૈવિક ઘટકોની પરસ્પર ક્રિયામાં, નીચેનામાંથી કયો ઘટક 'ઉત્ક્રાંતિ'ની પ્રક્રિયામાં સીધી ભૂમિકા ભજવે છે, પરંતુ તે 'પ્રજનન' પ્રક્રિયામાં સીધી ભૂમિકા ભજવતો નથી?", "opts": ["જનીન (મ્યુટેશન દ્વારા)", "હોર્મોન (પ્રજનન હોર્મોન)", "ઉત્સેચક (DNA પોલિમરેઝ)", "પ્રોટીન (ગેમેટ રચનામાં)"], "ans": 0, "exp": "જનીન (DNAમાં) મ્યુટેશન દ્વારા ઉત્ક્રાંતિમાં સીધી ભૂમિકા ભજવે છે, પરંતુ પ્રજનન પ્રક્રિયામાં તે પરોક્ષ રીતે ભૂમિકા ભજવે છે. હોર્મોન, ઉત્સેચક અને પ્રોટીન પ્રજનન પ્રક્રિયામાં સીધી ભૂમિકા ભજવે છે.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયો જૈવિક ઘટક 'પરિવહન' પ્રક્રિયામાં સક્રિય ભૂમિકા ભજવે છે, પરંતુ તે 'ઉત્સર્જન' પ્રક્રિયામાં સીધી ભૂમિકા ભજવતો નથી?", "opts": ["હીમોગ્લોબિન", "યુરિયા", "નેફ્રોન", "લસિકા"], "ans": 0, "exp": "હીમોગ્લોબિન રક્ત દ્વારા ઓક્સિજનના પરિવહનમાં ભૂમિકા ભજવે છે, પરંતુ ઉત્સર્જન પ્રક્રિયામાં સીધી ભૂમિકા ભજવતું નથી. યુરિયા અને નેફ્રોન ઉત્સર્જન પ્રક્રિયામાં સીધી ભૂમિકા ભજવે છે, જ્યારે લસિકા પરિવહન અને ઉત્સર્જન બંનેમાં ભૂમિકા ભજવે છે.", "ref": "Std 11 - Chapter 18: શરીરમાં પરિવહન", "ch": ""}, {"q": "જૈવિક ઘટકોની પરસ્પર ક્રિયામાં, નીચેનામાંથી કયો ઘટક 'ચેતાતંત્ર' અને 'હોર્મોન' બંને પ્રણાલીઓ દ્વારા નિયંત્રિત થાય છે, પરંતુ તેની રચના મુખ્યત્વે 'પેશી' દ્વારા થતી નથી?", "opts": ["ઇન્સ્યુલિન", "એડ્રિનેલિન", "ગ્લાયકોજન", "એસિટાઇલકોલિન"], "ans": 2, "exp": "ગ્લાયકોજનની રચના યકૃત અને સ્નાયુઓમાં થાય છે, જે ચેતાતંત્ર અને હોર્મોન (જેવા કે ઇન્સ્યુલિન અને ગ્લુકેગોન) દ્વારા નિયંત્રિત થાય છે. ઇન્સ્યુલિન અને એડ્રિનેલિન હોર્મોન છે, જ્યારે એસિટાઇલકોલિન ચેતાતંત્રનો સંદેશાવાહક છે. આથી, ગ્લાયકોજન જ પેશી દ્વારા રચના થતી નથી (યકૃત એ પેશી નથી, પરંતુ અંગ છે).", "ref": "Std 11 - Chapter 20: સંકલન અને નિયંત્રણ", "ch": ""}, {"q": "જૈવિક ઘટકોની ક્રિયાશીલતામાં, નીચેનામાંથી કયો ઘટક 'પ્રજનન' પ્રક્રિયામાં સીધી ભૂમિકા ભજવતો નથી, પરંતુ તે 'ઉત્ક્રાંતિ'ની દિશામાં પરોક્ષ રીતે યોગદાન આપે છે?", "opts": ["DNA", "હોર્મોન", "ઉત્સેચક", "વર્ણસૂત્ર"], "ans": 2, "exp": "ઉત્સેચક (C) પ્રજનન પ્રક્રિયામાં સીધી ભૂમિકા ભજવતો નથી, પરંતુ તે જૈવરાસાયણિક પ્રક્રિયાઓને ગતિશીલ બનાવીને ઉત્ક્રાંતિ માટેના જનીનીય ફેરફારોને સહજ બનાવે છે. DNA (A) અને વર્ણસૂત્ર (D) પ્રજનન અને અનુવંશિકતામાં સીધી ભૂમિકા ભજવે છે, જ્યારે હોર્મોન (B) પ્રજનન પ્રક્રિયાને નિયંત્રિત કરે છે.", "ref": "Std 12 - અધ્યાય 3: અનુવંશિકતા અને ફેરફાર", "ch": ""}, {"q": "નીચેનામાંથી કયો જૈવિક ઘટક 'પ્રકાશસંશ્લેષણ' દરમિયાન ઉત્પન્ન થતો પ્રાથમિક કાર્બોદિત નથી, પરંતુ તે શ્વસન પ્રક્રિયામાં મુખ્ય ઇંધણ તરીકે વપરાય છે?", "opts": ["ગ્લુકોઝ", "સ્ટાર્ચ", "સેલ્યુલોઝ", "ફ્રુક્ટોઝ"], "ans": 0, "exp": "ગ્લુકોઝ (A) પ્રકાશસંશ્લેષણ દરમિયાન ઉત્પન્ન થતો પ્રાથમિક કાર્બોદિત નથી, પરંતુ તે શ્વસન પ્રક્રિયામાં મુખ્ય ઇંધણ તરીકે વપરાય છે. સ્ટાર્ચ (B) અને સેલ્યુલોઝ (C) પ્રકાશસંશ્લેષણના ઉત્પાદનો છે, જ્યારે ફ્રુક્ટોઝ (D) પણ પ્રકાશસંશ્લેષણમાં ઉત્પન્ન થાય છે.", "ref": "Std 11 - અધ્યાય 13: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "નીચેનામાંથી કયો જૈવિક ઘટક 'ચેતાતંત્ર' અને 'હોર્મોન' બંને પ્રણાલીઓ દ્વારા નિયંત્રિત થતો નથી, પરંતુ તે 'પેશી' સ્તરે સ્વાયત્ત રીતે કામ કરે છે?", "opts": ["હૃદય", "ફુફ્ફુસ", "આંતરડા", "યકૃત"], "ans": 1, "exp": "ફુફ્ફુસ (B) ચેતાતંત્ર અને હોર્મોન દ્વારા નિયંત્રિત થતું નથી, પરંતુ તે પેશી સ્તરે સ્વાયત્ત રીતે શ્વસન પ્રક્રિયા હાથ ધરે છે. હૃદય (A) ચેતાતંત્ર અને હોર્મોન દ્વારા, આંતરડા (C) ચેતાતંત્ર અને હોર્મોન દ્વારા, અને યકૃત (D) હોર્મોન અને ચેતાતંત્ર દ્વારા નિયંત્રિત થાય છે.", "ref": "Std 12 - અધ્યાય 7: શ્વસન અને પરિવહન", "ch": ""}, {"q": "જૈવિક ઘટકોની ક્રિયાશીલતામાં, નીચેનામાંથી કયો ઘટક 'પ્રોટીન' સંશ્લેષણમાં સીધી ભૂમિકા ભજવતો નથી, પરંતુ તે 'જનીન'ની અભિવ્યક્તિમાં મદદ કરે છે?", "opts": ["DNA", "RNA", "રાઇબોઝોમ", "ઉત્સેચક"], "ans": 3, "exp": "ઉત્સેચક (D) પ્રોટીન સંશ્લેષણમાં સીધી ભૂમિકા ભજવતો નથી, પરંતુ તે જનીનની અભિવ્યક્તિમાં મદદ કરે છે. DNA (A) જનીનની માહિતી ધરાવે છે, RNA (B) માહિતીનું વહન કરે છે, અને રાઇબોઝોમ (C) પ્રોટીન સંશ્લેષણનું સ્થળ છે.", "ref": "Std 12 - અધ્યાય 4: કોષ અને આણ્વિક જૈવશાસ્ત્ર", "ch": ""}, {"q": "સજીવોમાં જોવા મળતા નીચેના પૈકી કયો જૈવિક ઘટક 'ઉત્સેચક' તરીકે કાર્ય કરવા ઉપરાંત, કોષમાં 'અનુવંશિક માહિતી'નું વહન પણ કરે છે અને તેનું બંધારણ ન્યુક્લિઓટાઇડ્સનું બનેલું હોય છે?", "opts": ["DNA", "RNA", "પ્રોટીન", "કાર્બોદિત"], "ans": 1, "exp": "સાચો જવાબ B) RNA છે. RNA (રાઇબોન્યુક્લિક એસિડ) ઉત્સેચક તરીકે કાર્ય કરી શકે છે (દા.ત. રાઇબોઝાઇમ્સ) અને તે અનુવંશિક માહિતીનું વહન પણ કરે છે (દા.ત. mRNA). તેનું બંધારણ ન્યુક્લિઓટાઇડ્સનું બનેલું હોય છે. DNA માત્ર અનુવંશિક માહિતીનું વહન કરે છે, ઉત્સેચક તરીકે કાર્ય કરતું નથી. પ્રોટીન ઉત્સેચક તરીકે કાર્ય કરે છે, પરંતુ તેનું બંધારણ એમિનો એસિડનું હોય છે, ન્યુક્લિઓટાઇડ્સનું નહીં. કાર્બોદિત ઉત્સેચક કે અનુવંશિક માહિતીનું વહન કરતું નથી.", "ref": "Std 11 - પ્રકરણ 9: જૈવિક અણુઓ", "ch": ""}, {"q": "સજીવોમાં જોવા મળતા જૈવિક ઘટકો પૈકી, નીચેનામાંથી કયો ઘટક 'ઉત્સેચક' તરીકે કાર્ય કરવા ઉપરાંત 'અનુવંશિક માહિતી'નું વહન પણ કરે છે, પરંતુ તે કોષકેન્દ્રમાં મુખ્યત્વે જોવા મળતો નથી?", "opts": ["DNA", "RNA", "પ્રોટીન", "કાર્બોદિત"], "ans": 1, "exp": "RNA (રાઇબોન્યુક્લિક એસિડ) ઉત્સેચક તરીકે કાર્ય કરે છે (દા.ત. રાઇબોઝાઇમ્સ) અને તે અનુવંશિક માહિતીનું વહન પણ કરે છે (દા.ત. mRNA). DNA મુખ્યત્વે કોષકેન્દ્રમાં જોવા મળે છે અને તે ઉત્સેચક તરીકે કાર્ય કરતું નથી. પ્રોટીન ઉત્સેચક તરીકે કાર્ય કરે છે, પરંતુ અનુવંશિક માહિતીનું વહન કરતું નથી. કાર્બોદિત આ બંને કાર્યોમાં સક્રિય નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયો જૈવિક ઘટક 'પ્રકાશસંશ્લેષણ' પ્રક્રિયામાં સીધી ભૂમિકા ભજવે છે, પરંતુ તે 'શ્વસન' પ્રક્રિયામાં સક્રિય નથી અને તે કોષીય અંગ નથી?", "opts": ["ક્લોરોફિલ", "મિટોકોન્ડ્રિયા", "રિબોઝોમ", "ATP"], "ans": 0, "exp": "ક્લોરોફિલ પ્રકાશસંશ્લેષણમાં પ્રકાશ ઊર્જાનું શોષણ કરે છે, પરંતુ તે શ્વસન પ્રક્રિયામાં સક્રિય નથી અને તે કોષીય અંગ નથી. મિટોકોન્ડ્રિયા શ્વસનમાં સક્રિય છે. રિબોઝોમ પ્રોટીન સંશ્લેષણમાં ભાગ લે છે. ATP એ ઊર્જા વાહક અણુ છે, પરંતુ તે કોઈ પ્રક્રિયામાં સીધી ભૂમિકા ભજવતું નથી.", "ref": "Std 11 - પ્રકરણ 13: પ્રકાશસંશ્લેષણ અને શ્વસન", "ch": ""}, {"q": "સજીવોમાં જોવા મળતા જૈવિક ઘટકો પૈકી, નીચેનામાંથી કયો ઘટક 'પ્રતિરક્ષાતંત્ર'ની ક્રિયામાં સીધી ભૂમિકા ભજવે છે, પરંતુ તે 'હોર્મોન' તરીકે કાર્ય કરતો નથી અને તેનું સંશ્લેષણ કોષકેન્દ્રમાં થતું નથી?", "opts": ["ઇમ્યુનોગ્લોબ્યુલિન", "ઇન્સ્યુલિન", "એડ્રીનાલિન", "થાઇરોક્સિન"], "ans": 0, "exp": "ઇમ્યુનોગ્લોબ્યુલિન (એન્ટિબોડી) પ્રતિરક્ષાતંત્રમાં સીધી ભૂમિકા ભજવે છે, પરંતુ તે હોર્મોન નથી અને તેનું સંશ્લેષણ કોષકેન્દ્રમાં થતું નથી. ઇન્સ્યુલિન, એડ્રીનાલિન અને થાઇરોક્સિન હોર્મોન છે અને તેમનું સંશ્લેષણ કોષકેન્દ્રમાં થતું નથી, પરંતુ તેઓ પ્રતિરક્ષાતંત્રમાં સીધી ભૂમિકા ભજવતા નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેનામાંથી કયો જૈવિક ઘટક 'પ્રોટીન સંશ્લેષણ'માં સીધી ભૂમિકા ભજવે છે, પરંતુ તે 'ઉત્સેચક' તરીકે કાર્ય કરતો નથી અને તે કોષકેન્દ્રમાં જોવા મળતો નથી?", "opts": ["tRNA", "રિબોઝોમ", "mRNA", "એમિનો એસિડ"], "ans": 0, "exp": "tRNA (ટ્રાન્સફર RNA) પ્રોટીન સંશ્લેષણમાં એમિનો એસિડનું વહન કરે છે, પરંતુ તે ઉત્સેચક તરીકે કાર્ય કરતું નથી અને તે કોષકેન્દ્રમાં જોવા મળતું નથી. રિબોઝોમ પ્રોટીન સંશ્લેષણમાં સક્રિય છે, પરંતુ તે ઉત્સેચક નથી. mRNA પ્રોટીન સંશ્લેષણમાં ભાગ લે છે, પરંતુ તે ઉત્સેચક નથી. એમિનો એસિડ પ્રોટીનના બિલ્ડિંગ બ્લોક્સ છે, પરંતુ તે ઉત્સેચક નથી.", "ref": "Std 11 - પ્રકરણ 6: કોષ: જીવનનો એકમ", "ch": ""}, {"q": "નીચેનામાંથી કયો જૈવિક ઘટક 'વર્ણસૂત્ર'માં હાજર રહે છે, પરંતુ તે 'જનીન'ના વાહક તરીકે કોષકેન્દ્ર બહાર પણ કાર્ય કરે છે અને તેનો સીધો સંબંધ 'પ્રોટીન સંશ્લેષણ' સાથે છે?", "opts": ["DNA", "RNA", "કાર્બોદિત", "હોર્મોન"], "ans": 1, "exp": "બ) RNA એ સચોટ જવાબ છે કારણ કે RNA વર્ણસૂત્રમાં હાજર રહે છે અને કોષકેન્દ્ર બહાર (સાયટોપ્લાઝમમાં) પણ જનીનના વાહક તરીકે કાર્ય કરે છે. તે mRNA, tRNA અને rRNA રૂપે પ્રોટીન સંશ્લેષણમાં સીધી ભૂમિકા ભજવે છે. A) DNA ફક્ત કોષકેન્દ્રમાં જનીન વાહક તરીકે કાર્ય કરે છે અને પ્રોટીન સંશ્લેષણમાં સીધી ભૂમિકા ભજવતું નથી. C) કાર્બોદિત એ ઉર્જાનો સ્રોત છે અને જનીન વાહક તરીકે કાર્ય કરતું નથી. D) હોર્મોન રાસાયણિક સંદેશાવાહક છે અને પ્રોટીન સંશ્લેષણ સાથે સીધો સંબંધ ધરાવતું નથી.", "ref": "Std 12 - અધ્યાય 3: જનીન અને વર્ણસૂત્ર", "ch": ""}, {"q": "સજીવોમાં, નીચેનામાંથી કયો જૈવિક ઘટક 'વર્ણસૂત્ર'માં હાજર રહે છે, પરંતુ તે 'પ્રકાશસંશ્લેષણ' પ્રક્રિયામાં સીધી ભૂમિકા ભજવતો નથી, જ્યારે તે 'શ્વસન' પ્રક્રિયામાં અગત્યનો ભાગ ભજવે છે?", "opts": ["DNA", "RNA", "ક્લોરોફિલ", "સાયટોક્રોમ"], "ans": 3, "exp": "સાયટોક્રોમ (D) મિટોકોન્ડ્રિયામાં હાજર રહે છે અને શ્વસન પ્રક્રિયામાં ઇલેક્ટ્રોન વાહક તરીકે કાર્ય કરે છે. DNA (A) અને RNA (B) વર્ણસૂત્રમાં હાજર રહે છે, પરંતુ તે પ્રકાશસંશ્લેષણમાં સીધી ભૂમિકા ભજવતા નથી, પરંતુ શ્વસનમાં પણ સીધી ભૂમિકા ભજવતા નથી. ક્લોરોફિલ (C) પ્રકાશસંશ્લેષણમાં સીધી ભૂમિકા ભજવે છે, પરંતુ વર્ણસૂત્રમાં હાજર રહેતું નથી.", "ref": "Std 12 - Chapter 3: વંશવેલા અને જીવનની વૈવિધ્યતા", "ch": ""}, {"q": "નીચેનામાંથી કયો જૈવિક ઘટક 'પ્રજનન' પ્રક્રિયામાં સીધી ભૂમિકા ભજવે છે, પરંતુ તે 'ઉત્ક્રાંતિ'ની પ્રક્રિયામાં અગત્યનો ભાગ ભજવતો નથી?", "opts": ["જનીન", "હોર્મોન", "ઉત્સેચક", "વર્ણસૂત્ર"], "ans": 1, "exp": "હોર્મોન (B) પ્રજનન પ્રક્રિયામાં સીધી ભૂમિકા ભજવે છે, પરંતુ તે ઉત્ક્રાંતિની પ્રક્રિયામાં અગત્યનો ભાગ ભજવતો નથી. જનીન (A), ઉત્સેચક (C), અને વર્ણસૂત્ર (D) ઉત્ક્રાંતિની પ્રક્રિયામાં અગત્યનો ભાગ ભજવે છે.", "ref": "Std 12 - Chapter 5: જનીન અને વર્ણસૂત્ર", "ch": ""}, {"q": "સજીવોમાં, નીચેનામાંથી કયો જૈવિક ઘટક 'પ્રતિરક્ષાતંત્ર'ની ક્રિયામાં સીધી ભૂમિકા ભજવે છે, પરંતુ તે 'પ્રકાશસંશ્લેષણ' અથવા 'શ્વસન' પ્રક્રિયામાં કોઈ ભૂમિકા ભજવતો નથી?", "opts": ["એન્ટીબોડી", "ક્લોરોફિલ", "સાયટોક્રોમ", "DNA"], "ans": 0, "exp": "એન્ટીબોડી (A) પ્રતિરક્ષાતંત્રની ક્રિયામાં સીધી ભૂમિકા ભજવે છે, પરંતુ તે પ્રકાશસંશ્લેષણ અથવા શ્વસન પ્રક્રિયામાં કોઈ ભૂમિકા ભજવતી નથી. ક્લોરોફિલ (B) પ્રકાશસંશ્લેષણમાં, સાયટોક્રોમ (C) શ્વસનમાં, અને DNA (D) અનુવંશિકતામાં ભૂમિકા ભજવે છે.", "ref": "Std 12 - Chapter 8: માનવીના શરીરમાં રક્ષણાત્મક યંત્રણા", "ch": ""}, {"q": "સજીવોમાં, નીચેનામાંથી કયો જૈવિક ઘટક 'પ્રોટીન સંશ્લેષણ'માં સીધી ભૂમિકા ભજવે છે, પરંતુ તે 'વર્ણસૂત્ર'માં હાજર રહેતો નથી?", "opts": ["DNA", "RNA", "રાઇબોઝોમ", "જનીન"], "ans": 2, "exp": "રાઇબોઝોમ (C) પ્રોટીન સંશ્લેષણમાં સીધી ભૂમિકા ભજવે છે, પરંતુ તે વર્ણસૂત્રમાં હાજર રહેતું નથી. DNA (A), RNA (B), અને જનીન (D) વર્ણસૂત્રમાં હાજર રહે છે.", "ref": "Std 12 - Chapter 4: કોષ અને કોષીય ક્રિયાવિધિ", "ch": ""}, {"q": "સજીવોમાં જોવા મળતા જૈવિક ઘટકો પૈકી, નીચેનામાંથી કયો ઘટક 'વર્ણસૂત્ર'માં હાજર રહે છે, પરંતુ તે 'પ્રકાશસંશ્લેષણ' પ્રક્રિયામાં સીધી ભૂમિકા ભજવતો નથી, તથા તે 'અનુવંશિકતા'ના વાહક તરીકે પણ કાર્ય કરતો નથી?", "opts": ["DNA", "RNA", "હિસ્ટોન પ્રોટીન", "ક્લોરોફિલ"], "ans": 2, "exp": "હિસ્ટોન પ્રોટીન વર્ણસૂત્રમાં હાજર રહે છે અને તે વર્ણસૂત્રની રચનામાં મદદ કરે છે, પરંતુ તે પ્રકાશસંશ્લેષણ પ્રક્રિયામાં સીધી ભૂમિકા ભજવતો નથી. તથા, તે અનુવંશિકતાનું વાહક પણ નથી (અનુવંશિકતાનું વાહક DNA છે). DNA (A) અનુવંશિકતાનું વાહક છે, RNA (B) પ્રોટીન સંશ્લેષણમાં ભૂમિકા ભજવે છે, જ્યારે ક્લોરોફિલ (D) પ્રકાશસંશ્લેષણમાં સીધી ભૂમિકા ભજવે છે.", "ref": "Std 12 - Chapter 3: વારસાગમન અને જનીનિકતા", "ch": ""}, {"q": "સજીવોમાં, નીચેનામાંથી કયો જૈવિક ઘટક 'ઉત્ક્રાંતિ'ની પ્રક્રિયામાં સીધી ભૂમિકા ભજવે છે, પરંતુ તે 'પ્રકાશસંશ્લેષણ' અથવા 'શ્વસન' પ્રક્રિયામાં સક્રિય ભૂમિકા ભજવતો નથી?", "opts": ["મ્યુટેશન", "ક્લોરોપ્લાસ્ટ", "મિટોકોન્ડ્રિયા", "રાઇબોઝોમ"], "ans": 0, "exp": "મ્યુટેશન (A) ઉત્ક્રાંતિની પ્રક્રિયામાં સીધી ભૂમિકા ભજવે છે, પરંતુ તે પ્રકાશસંશ્લેષણ અથવા શ્વસન પ્રક્રિયામાં સક્રિય ભૂમિકા ભજવતો નથી. ક્લોરોપ્લાસ્ટ (B) પ્રકાશસંશ્લેષણમાં, મિટોકોન્ડ્રિયા (C) શ્વસનમાં, અને રાઇબોઝોમ (D) પ્રોટીન સંશ્લેષણમાં ભૂમિકા ભજવે છે, પરંતુ ઉત્ક્રાંતિ પ્રક્રિયામાં સીધી ભૂમિકા ભજવતા નથી.", "ref": "Std 12 - Chapter 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયો જૈવિક ઘટક 'પ્રતિરક્ષાતંત્ર'ની ક્રિયામાં સીધી ભૂમિકા ભજવે છે, પરંતુ તે પ્રોટીન નથી અને તેનું બંધારણ કાર્બોદિતથી બનેલું હોય છે?", "opts": ["એન્ટિબોડી", "લિમ્ફોકાઇન", "ગ્લાયકોપ્રોટીન રીસેપ્ટર", "પેપ્ટિડોગ્લાયકેન"], "ans": 3, "exp": "સાચો જવાબ D) પેપ્ટિડોગ્લાયકેન છે. પેપ્ટિડોગ્લાયકેન બેક્ટેરિયાની કોષદીવાલનું મુખ્ય ઘટક છે, જે પ્રતિરક્ષાતંત્ર દ્વારા ઓળખાય છે અને તેના વિરુદ્ધ પ્રતિક્રિયા ઉત્પન્ન કરે છે. તે પ્રોટીન નથી અને તેનું બંધારણ કાર્બોદિત અને પેપ્ટાઇડથી બનેલું હોય છે. એન્ટિબોડી અને લિમ્ફોકાઇન પ્રોટીન છે, જ્યારે ગ્લાયકોપ્રોટીન રીસેપ્ટર પ્રોટીન અને કાર્બોદિત બંને ધરાવે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેનામાંથી કયો જૈવિક ઘટક 'ઉત્ક્રાંતિ'ની પ્રક્રિયામાં સીધી ભૂમિકા ભજવે છે, પરંતુ તે 'જનીન' નથી?", "opts": ["વર્ણસૂત્રીય ડીએનએ", "ટ્રાન્સપોઝેબલ તત્વો (Transposable Elements)", "મ્યુટેજનિક રસાયણો", "રાઇબોઝોમલ આરએનએ જનીન"], "ans": 2, "exp": "ટ્રાન્સપોઝેબલ તત્વો (Transposable Elements) ઉત્ક્રાંતિની પ્રક્રિયામાં સીધી ભૂમિકા ભજવે છે કારણ કે તે જનીનોમાં ફેરફાર લાવી નવી જનીનિક વિવિધતા ઉત્પન્ન કરે છે, પરંતુ તે પોતે જનીન નથી. વર્ણસૂત્રીય ડીએનએ જનીનો ધરાવે છે. મ્યુટેજનિક રસાયણો ઉત્ક્રાંતિને પ્રભાવિત કરે છે, પરંતુ તે જૈવિક ઘટક નથી. રાઇબોઝોમલ આરએનએ જનીન જનીનિક ઘટક છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "સજીવોમાં, નીચેનામાંથી કયો જૈવિક ઘટક 'પ્રજનન' પ્રક્રિયામાં સીધી ભૂમિકા ભજવે છે, પરંતુ તે 'હોર્મોન' નથી અને 'વર્ણસૂત્ર'માં હાજર રહેતો નથી?", "opts": ["ટેસ્ટોસ્ટેરોન", "ફોલિકલ સ્ટિમ્યુલેટિંગ હોર્મોન (FSH)", "પ્રોસ્ટાગ્લાન્ડિન", "સ્પર્મેટોઝૂનનું એક્રોસોમલ ઉત્સેચક"], "ans": 3, "exp": "સ્પર્મેટોઝૂનનું એક્રોસોમલ ઉત્સેચક પ્રજનન પ્રક્રિયામાં સીધી ભૂમિકા ભજવે છે કારણ કે તે શુક્રાણુને અંડકોષમાં પ્રવેશવામાં મદદ કરે છે. આ ઉત્સેચક હોર્મોન નથી અને વર્ણસૂત્રમાં હાજર હોતું નથી. ટેસ્ટોસ્ટેરોન અને FSH હોર્મોન છે. પ્રોસ્ટાગ્લાન્ડિન હોર્મોન જેવું કાર્ય કરે છે અને પ્રજનનમાં પરોક્ષ ભૂમિકા ભજવે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયો જૈવિક ઘટક 'પ્રકાશસંશ્લેષણ' પ્રક્રિયામાં સક્રિય છે, પરંતુ તે 'ક્લોરોફિલ' નથી અને તે 'કાર્બોદિત'નું સંશ્લેષણ કરવામાં સહાયક છે?", "opts": ["ફેરેડોક્સિન", "સાયટોક્રોમ", "પ્લાસ્ટોક્વિનોન", "નિકોટિનામાઇડ એડેનાઇન ડાયન્યુક્લિઓટાઇડ ફોસ્ફેટ (NADP+)"], "ans": 3, "exp": "NADP+ પ્રકાશસંશ્લેષણની પ્રક્રિયામાં ઇલેક્ટ્રોન અને પ્રોટોન સ્વીકારીને NADPHમાં રૂપાંતરિત થાય છે, જે કાર્બોદિત સંશ્લેષણમાં ઉપયોગી છે. ફેરેડોક્સિન, સાયટોક્રોમ અને પ્લાસ્ટોક્વિનોન ઇલેક્ટ્રોન વાહક તરીકે કાર્ય કરે છે, પરંતુ તેઓ સીધા કાર્બોદિત સંશ્લેષણમાં ભાગ લેતા નથી. NADP+ એ પ્રકાશસંશ્લેષણમાં મુખ્ય ભૂમિકા ભજવતો ઘટક છે, જે ક્લોરોફિલ નથી.", "ref": "Std 11 - પ્રકરણ 13: પ્રકાશસંશ્લેષણ અને શ્વસન", "ch": ""}, {"q": "સજીવોમાં, નીચેનામાંથી કયો જૈવિક ઘટક 'વર્ણસૂત્ર'માં હાજર છે, પરંતુ તે 'જનીન' નથી અને તે 'અનુવંશિકતા'માં પરોક્ષ ભૂમિકા ભજવે છે?", "opts": ["હિસ્ટોન પ્રોટીન", "ટેલોમિયર", "સેન્ટ્રોમિયર", "રિબોઝોમલ આરએનએ જનીન"], let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
