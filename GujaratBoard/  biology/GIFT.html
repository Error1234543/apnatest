<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIFT</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>GIFT</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">GIFT</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ગેમેટ ઇન્ટ્રાફેલોપિયન ટ્રાન્સફર (GIFT) પદ્ધતિમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["GIFT પદ્ધતિમાં અંડકોષ અને શુક્રકોષને સ્ત્રીના ફેલોપિયન નલિકામાં સીધા દાખલ કરવામાં આવે છે", "GIFT પદ્ધતિ માટે ઇન વિટ્રો ફર્ટિલાઇઝેશન (IVF) જરૂરી નથી કારણ કે ફલન શરીરની અંદર થાય છે", "GIFT પદ્ધતિમાં ફલિતાંડનું નિરીક્ષણ અને સંવર્ધન પ્રયોગશાળામાં કરવામાં આવે છે", "GIFT પદ્ધતિનો ઉપયોગ એવા દંપતીઓ માટે થાય છે જેમને અંડવાહિની અવરોધ અથવા અજ્ઞાત કારણોસર વંધ્યત્વ હોય"], "ans": 2, "exp": "GIFT પદ્ધતિમાં ફલન શરીરની અંદર ફેલોપિયન નલિકામાં થાય છે, તેથી ફલિતાંડનું નિરીક્ષણ અને સંવર્ધન પ્રયોગશાળામાં થતું નથી. આ કાર્ય IVFમાં થાય છે. વિકલ્પ A, B અને D સાચાં છે કારણ કે GIFTમાં અંડકોષ અને શુક્રકોષ સીધા ફેલોપિયન નલિકામાં દાખલ કરવામાં આવે છે, IVFની જરૂર નથી અને તે અંડવાહિની અવરોધ કે અજ્ઞાત વંધ્યત્વ માટે ઉપયોગી છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન અને પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "GIFT પદ્ધતિ અને IVF વચ્ચેનો મુખ્ય તફાવત શું છે?", "opts": ["GIFTમાં ફલન શરીરની બહાર થાય છે જ્યારે IVFમાં શરીરની અંદર થાય છે", "GIFTમાં ફલિતાંડનું સંવર્ધન પ્રયોગશાળામાં થાય છે જ્યારે IVFમાં શરીરની અંદર થાય છે", "GIFTમાં ફલન શરીરની અંદર ફેલોપિયન નલિકામાં થાય છે જ્યારે IVFમાં પ્રયોગશાળામાં થાય છે", "GIFT પદ્ધતિ માત્ર પુરુષ વંધ્યત્વ માટે છે જ્યારે IVF માત્ર સ્ત્રી વંધ્યત્વ માટે છે"], "ans": 2, "exp": "GIFT પદ્ધતિમાં અંડકોષ અને શુક્રકોષને ફેલોપિયન નલિકામાં દાખલ કરવામાં આવે છે જ્યાં ફલન શરીરની અંદર થાય છે. જ્યારે IVFમાં ફલન પ્રયોગશાળામાં થાય છે અને પછી ફલિતાંડને ગર્ભાશયમાં સ્થાપિત કરવામાં આવે છે. વિકલ્પ A, B અને D ખોટાં છે કારણ કે તેઓ GIFT અને IVFની પ્રક્રિયાને ઉલટાવે છે અથવા મર્યાદિત કરે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન અને પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "નીચેનામાંથી કયું GIFT પદ્ધતિ માટે યોગ્ય ઉમેદવાર નથી?", "opts": ["અંડવાહિની અવરોધ ધરાવતી સ્ત્રી", "અજ્ઞાત વંધ્યત્વ ધરાવતું દંપતી", "શુક્રકોષની સંખ્યા અત્યંત ઓછી હોય તેવો પુરુષ", "અંડકોષ ઉત્પાદન ન થતું હોય તેવી સ્ત્રી"], "ans": 3, "exp": "GIFT પદ્ધતિ માટે ઓછામાં ઓછા એક કાર્યરત અંડવાહિની અને યોગ્ય શુક્રકોષની જરૂર હોય છે. જો પુરુષમાં શુક્રકોષની સંખ્યા અત્યંત ઓછી હોય તો IVF અથવા ICSI વધુ યોગ્ય છે. વિકલ્પ A, B અને D યોગ્ય છે કારણ કે અંડવાહિની અવરોધ, અજ્ઞાત વંધ્યત્વ અને અંડકોષ ઉત્પાદનની સમસ્યા ધરાવતી સ્ત્રીઓ માટે GIFT ઉપયોગી છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન અને પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "GIFT પદ્ધતિ દરમિયાન નીચેનામાંથી કયું પગલું સાચા ક્રમમાં નથી?", "opts": ["અંડકોષનું અલ્ટ્રાસાઉન્ડ માર્ગદર્શન હેઠળ સંગ્રહણ", "શુક્રકોષનું શુક્રાણુ પ્રવાહીમાંથી અલગીકરણ", "ફલિતાંડનું પ્રયોગશાળામાં સંવર્ધન", "અંડકોષ અને શુક્રકોષનું ફેલોપિયન નલિકામાં દાખલ કરવું"], "ans": 2, "exp": "GIFT પદ્ધતિમાં ફલિતાંડનું સંવર્ધન પ્રયોગશાળામાં થતું નથી. ફલન શરીરની અંદર ફેલોપિયન નલિકામાં થાય છે. વિકલ્પ A, B અને D સાચાં છે કારણ કે તેમાં અંડકોષનું સંગ્રહણ, શુક્રકોષનું અલગીકરણ અને બંનેનું ફેલોપિયન નલિકામાં દાખલ કરવું સામેલ છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન અને પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "GIFT પદ્ધતિના સંદર્ભમાં નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["GIFT પદ્ધતિ માટે ઓછામાં ઓછી એક કાર્યરત અંડવાહિની જરૂરી છે", "GIFT પદ્ધતિમાં ગર્ભાધાનની સફળતા દર IVF કરતાં વધુ હોય છે", "GIFT પદ્ધતિમાં ફલનની પ્રક્રિયા કુદરતી રીતે થાય છે", "GIFT પદ્ધતિનો ઉપયોગ ધાર્મિક કે નૈતિક કારણોસર IVFનો વિરોધ કરતા દંપતીઓ માટે થઈ શકે છે"], "ans": 1, "exp": "GIFT પદ્ધતિમાં ગર્ભાધાનની સફળતા દર IVF કરતાં વધુ હોવાનું સામાન્ય રીતે સાચું નથી. IVFમાં સફળતા દર વધુ હોય છે કારણ કે ફલનનું નિરીક્ષણ અને નિયંત્રણ પ્રયોગશાળામાં થાય છે. વિકલ્પ A, C અને D સાચાં છે કારણ કે GIFT માટે એક કાર્યરત અંડવાહિની જરૂરી છે, ફલન કુદરતી રીતે થાય છે અને ધાર્મિક કે નૈતિક કારણોસર તેનો ઉપયોગ થઈ શકે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન અને પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "ગેમેટ ઇન્ટ્રાફેલોપિયન ટ્રાન્સફર (GIFT) પદ્ધતિમાં, ફેલોપિયન નલિકામાં સીધા જ શું દાખલ કરવામાં આવે છે?", "opts": ["ફલિતાંડ (Zygote)", "ગર્ભાશયના અંતઃસ્તરના કોષો (Endometrial cells)", "શુક્રકોષ અને અંડકોષનું મિશ્રણ (Mixture of sperm and ovum)", "ફક્ત શુક્રકોષ (Only sperm)"], "ans": 2, "exp": "GIFT પદ્ધતિમાં ફેલોપિયન નલિકામાં શુક્રકોષ અને અંડકોષનું મિશ્રણ દાખલ કરવામાં આવે છે, જેથી ફલન શરીરની અંદર જ થાય. ફલિતાંડ (Zygote) દાખલ કરવામાં આવતું નથી, કારણ કે તે IVF પદ્ધતિમાં કરવામાં આવે છે. ગર્ભાશયના અંતઃસ્તરના કોષો અથવા ફક્ત શુક્રકોષ દાખલ કરવાથી ગર્ભધારણ થતું નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન અને પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "GIFT પદ્ધતિ માટે યોગ્ય ઉમેદવારની પસંદગીમાં નીચેનામાંથી કયું પરિબળ સૌથી મહત્વપૂર્ણ છે?", "opts": ["પુરુષમાં શુક્રકોષની સંખ્યા સામાન્ય હોવી જોઈએ", "સ્ત્રીમાં ઓછામાં ઓછી એક કાર્યરત ફેલોપિયન નલિકા હોવી જોઈએ", "સ્ત્રીમાં અંડાશયમાંથી અંડકોષ મુક્ત થવો જોઈએ નહીં", "પુરુષમાં ટેસ્ટોસ્ટેરોનનું સ્તર સામાન્ય હોવું જોઈએ"], "ans": 1, "exp": "GIFT પદ્ધતિ માટે સ્ત્રીમાં ઓછામાં ઓછી એક કાર્યરત ફેલોપિયન નલિકા હોવી જરૂરી છે, કારણ કે ફલન ફેલોપિયન નલિકામાં થાય છે. જો બંને નલિકાઓ બંધ હોય તો GIFT પદ્ધતિ અસરકારક નથી. પુરુષમાં શુક્રકોષની સંખ્યા સામાન્ય હોવી જોઈએ, પરંતુ તે મુખ્ય પરિબળ નથી. સ્ત્રીમાં અંડકોષ મુક્ત થવો જરૂરી છે, અને પુરુષમાં ટેસ્ટોસ્ટેરોનનું સ્તર પ્રજનન ક્ષમતા પર અસર કરે છે, પરંતુ તે પ્રાથમિક પરિબળ નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન અને પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "GIFT પદ્ધતિ દરમિયાન, જો શુક્રકોષ અને અંડકોષનું મિશ્રણ ફેલોપિયન નલિકામાં દાખલ કર્યા પછી ફલન ન થાય, તો શું થાય છે?", "opts": ["મિશ્રણ ગર્ભાશયમાં જાય છે અને ત્યાં ફલન થાય છે", "અંડકોષ અને શુક્રકોષ શરીરમાંથી ઉત્સર્જિત થાય છે", "મિશ્રણ ફેલોપિયન નલિકામાં જ રહે છે અને કુદરતી રીતે શરીરમાં શોષાઈ જાય છે", "ફરીથી સર્જિકલ હસ્તક્ષેપ કરીને મિશ્રણ બહાર કાઢવામાં આવે છે"], "ans": 2, "exp": "જો ફલન ન થાય, તો શુક્રકોષ અને અંડકોષનું મિશ્રણ ફેલોપિયન નલિકામાં જ રહે છે અને કુદરતી રીતે શરીરમાં શોષાઈ જાય છે. ફલન ગર્ભાશયમાં થતું નથી, અને શરીરમાંથી ઉત્સર્જન થતું નથી. ફરીથી સર્જિકલ હસ્તક્ષેપ કરવાની જરૂર નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન અને પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "GIFT પદ્ધતિના સંદર્ભમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["આ પદ્ધતિ IVF કરતાં વધુ કુદરતી ગર્ભધારણની નકલ કરે છે", "આ પદ્ધતિમાં ફલન શરીરની બહાર લેબોરેટરીમાં થાય છે", "આ પદ્ધતિ માટે સ્ત્રીમાં ઓછામાં ઓછી એક કાર્યરત ફેલોપિયન નલિકા હોવી જરૂરી છે", "આ પદ્ધતિમાં શુક્રકોષ અને અંડકોષનું મિશ્રણ લેપ્રોસ્કોપી દ્વારા દાખલ કરવામાં આવે છે"], "ans": 1, "exp": "GIFT પદ્ધતિમાં ફલન શરીરની અંદર ફેલોપિયન નલિકામાં થાય છે, લેબોરેટરીમાં નહીં. તેથી વિકલ્પ B ખોટું છે. બાકીના વિકલ્પો સાચા છે: GIFT પદ્ધતિ કુદરતી ગર્ભધારણની નકલ કરે છે, એક કાર્યરત ફેલોપિયન નલિકા જરૂરી છે, અને લેપ્રોસ્કોપી દ્વારા મિશ્રણ દાખલ કરવામાં આવે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન અને પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "GIFT પદ્ધતિનો ઉપયોગ કરતી વખતે, જો સ્ત્રીને એન્ડોમેટ્રિઓસિસ (Endometriosis) હોય, તો નીચેનામાંથી કયું પરિણામ સંભવિત છે?", "opts": ["ગર્ભધારણની સંભાવના વધી જાય છે", "ફેલોપિયન નલિકામાં અવરોધ થવાની સંભાવના વધે છે", "શુક્રકોષની ગતિશીલતા વધી જાય છે", "અંડાશયમાંથી અંડકોષ મુક્ત થવાની પ્રક્રિયા સુધરે છે"], "ans": 1, "exp": "એન્ડોમેટ્રિઓસિસમાં ગર્ભાશયના અંતઃસ્તરના કોષો ગર્ભાશયની બહાર વધે છે, જે ફેલોપિયન નલિકામાં અવરોધ અથવા સોજો પેદા કરી શકે છે. આથી ગર્ભધારણની સંભાવના ઘટે છે. શુક્રકોષની ગતિશીલતા અથવા અંડકોષ મુક્ત થવાની પ્રક્રિયા પર સીધી અસર થતી નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન અને પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "GIFT પદ્ધતિમાં, ફલન ક્યાં થાય છે?", "opts": ["લેબોરેટરીમાં ઇન્ક્યુબેટરમાં", "ગર્ભાશયમાં", "ફેલોપિયન નલિકાના એમ્પુલા ભાગમાં", "અંડાશયમાં"], "ans": 2, "exp": "GIFT પદ્ધતિમાં, શુક્રકોષ અને અંડકોષને ફેલોપિયન નલિકાના એમ્પુલા ભાગમાં દાખલ કરવામાં આવે છે, જ્યાં પ્રાકૃતિક રીતે ફલન થાય છે. A ખોટું છે કારણ કે GIFTમાં લેબમાં ફલન થતું નથી (IVFમાં થાય છે). B ખોટું છે કારણ કે ગર્ભાશયમાં ફલન થતું નથી. D ખોટું છે કારણ કે અંડાશયમાં ફલન થતું નથી.", "ref": "Std 12 - પ્રકરણ ૩: માનવ પ્રજનન", "ch": ""}, {"q": "GIFT પદ્ધતિમાં, નીચેનામાંથી કયું કૌટુંબિક ઇતિહાસનું પરિબળ ઉમેદવારની પસંદગીમાં મહત્વનું નથી?", "opts": ["માતા અથવા પિતામાં અંડનલિકા અથવા શુક્રનલિકાનો અભાવ", "કૌટુંબિક ઇતિહાસમાં ડાયાબિટીસ", "માતા અથવા પિતામાં પ્રજનનસંબંધી કૅન્સર", "કૌટુંબિક ઇતિહાસમાં પુનરાવર્તિત ગર્ભપાત"], "ans": 1, "exp": "GIFT પદ્ધતિમાં, અંડનલિકા/શુક્રનલિકાનો અભાવ (A), પ્રજનનસંબંધી કૅન્સર (C), અને પુનરાવર્તિત ગર્ભપાત (D) જેવા કૌટુંબિક ઇતિહાસના પરિબળો મહત્વના છે કારણ કે તે પ્રજનન ક્ષમતાને અસર કરે છે. ડાયાબિટીસ (B) પ્રજનન ક્ષમતાને સીધી અસર કરતું નથી, તેથી તે મહત્વનું નથી.", "ref": "Std 12 - પ્રકરણ ૩: માનવ પ્રજનન", "ch": ""}, {"q": "GIFT પદ્ધતિમાં, નીચેનામાંથી કયું તબીબી પરીક્ષણ આવશ્યક નથી?", "opts": ["સ્ત્રીના અંડાશયની ક્ષમતા ચકાસવા માટે FSH સ્તરનું પરીક્ષણ", "પુરુષના શુક્રકોષની ગુણવત્તા ચકાસવા માટે સેમિન એનાલિસિસ", "સ્ત્રીના રક્તમાં હિમોગ્લોબિન સ્તરનું પરીક્ષણ", "ફેલોપિયન નલિકાની પસારગમ્યતા ચકાસવા માટે હિસ્ટેરોસેલ્પિંગોગ્રામ (HSG)"], "ans": 2, "exp": "GIFT પદ્ધતિમાં, FSH સ્તર (A), સેમિન એનાલિસિસ (B), અને HSG (D) જેવા પરીક્ષણો આવશ્યક છે કારણ કે તે પ્રજનન ક્ષમતાને સીધી અસર કરે છે. હિમોગ્લોબિન સ્તર (C) પ્રજનન ક્ષમતાને સીધી અસર કરતું નથી, તેથી તે આવશ્યક નથી.", "ref": "Std 12 - પ્રકરણ ૩: માનવ પ્રજનન", "ch": ""}, {"q": "GIFT પદ્ધતિમાં, નીચેનામાંથી કયું જોખમ સૌથી ઓછું છે?", "opts": ["બહુગર્ભતા (Multiple pregnancy)", "એક્ટોપિક ગર્ભધારણ (Ectopic pregnancy)", "ગર્ભપાત", "અંડાશયનું ઓવર-સ્ટિમ્યુલેશન સિન્ડ્રોમ (OHSS)"], "ans": 3, "exp": "GIFT પદ્ધતિમાં, અંડાશયનું ઓવર-સ્ટિમ્યુલેશન સિન્ડ્રોમ (OHSS) (D) સૌથી ઓછું જોખમ છે કારણ કે GIFTમાં અંડાશયને ઉત્તેજિત કરવા માટે ઓછા હોર્મોનનો ઉપયોગ થાય છે. બહુગર્ભતા (A), એક્ટોપિક ગર્ભધારણ (B), અને ગર્ભપાત (C) જેવા જોખમો GIFTમાં વધુ સામાન્ય છે.", "ref": "Std 12 - પ્રકરણ ૩: માનવ પ્રજનન", "ch": ""}, {"q": "ગેમેટ ઇન્ટ્રાફેલોપિયન ટ્રાન્સફર (GIFT) પદ્ધતિમાં, જો સ્ત્રીના ફેલોપિયન નલિકામાં શુક્રકોષ અને અંડકોષનું મિશ્રણ દાખલ કર્યા પછી, ફલન થવાને બદલે અંડકોષનું પરિપક્વન અધૂરું રહે છે, તો નીચેનામાંથી કયું કારણ સૌથી સંભવિત છે?", "opts": ["ફેલોપિયન નલિકામાં હોર્મોનલ અસંતુલન (પ્રોજેસ્ટેરોનની ઉણપ)", "શુક્રકોષની ગતિશીલતામાં ઘટાડો", "અંડકોષના કોષકેન્દ્રમાં વર્ણસૂત્રીય વિકૃતિ (ઉદા. ડાઉન સિન્ડ્રોમ)", "ફેલોપિયન નલિકામાં pH સ્તરમાં અચાનક વધારો"], "ans": 0, "exp": "સાચો જવાબ A છે. ફેલોપિયન નલિકામાં પ્રોજેસ્ટેરોનની ઉણપને કારણે અંડકોષનું પરિપક્વન અધૂરું રહી શકે છે, કારણ કે પ્રોજેસ્ટેરોન અંડકોષના પરિપક્વન અને ફલન માટે આવશ્યક હોર્મોન છે. B ખોટું છે કારણ કે શુક્રકોષની ગતિશીલતામાં ઘટાડો ફલનને અસર કરશે, પરંતુ અંડકોષના પરિપક્વનને નહીં. C ખોટું છે કારણ કે વર્ણસૂત્રીય વિકૃતિ અંડકોષના પરિપક્વનને અસર કરશે નહીં, પરંતુ ફલિત અંડકોષના વિકાસને અસર કરશે. D ખોટું છે કારણ કે pH સ્તરમાં અચાનક વધારો શુક્રકોષની ગતિશીલતાને અસર કરશે, પરંતુ અંડકોષના પરિપક્વનને નહીં.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "GIFT પદ્ધતિમાં, જો સ્ત્રીને પોલીસિસ્ટિક ઓવેરિયન સિન્ડ્રોમ (PCOS) હોય, તો નીચેનામાંથી કયું પગલું અગાઉથી લેવું જરૂરી છે?", "opts": ["ઓવ્યુલેશન ઇન્ડક્શન માટે ક્લોમિફીન સિટ્રેટનો ઉપયોગ", "ફેલોપિયન નલિકાની સર્જિકલ સુધારણા", "ઇન વિટ્રો ફર્ટિલાઇઝેશન (IVF) તરફ વળવું", "હોર્મોનલ થેરાપી દ્વારા એન્ડોમેટ્રિયલ લાઇનિંગ વધારવી"], "ans": 0, "exp": "PCOS ધરાવતી સ્ત્રીમાં ઓવ્યુલેશન ઇન્ડક્શન માટે ક્લોમિફીન સિટ્રેટ (A)નો ઉપયોગ કરવો જરૂરી છે, કારણ કે PCOSમાં ઓવ્યુલેશન નિયમિત નથી થતું. ફેલોપિયન નલિકાની સર્જિકલ સુધારણા (B) ફક્ત નલિકામાં અવરોધ હોય ત્યારે જરૂરી છે. IVF (C) GIFTનો વિકલ્પ છે, પરંતુ પ્રથમ પસંદગી નથી. હોર્મોનલ થેરાપી (D) એન્ડોમેટ્રિયલ લાઇનિંગ સુધારે છે, પરંતુ PCOS માટે પ્રાથમિક ઉપાય નથી.", "ref": "Std 12 - પ્રકરણ 3: મનુષ્યમાં પ્રજનન", "ch": ""}, {"q": "GIFT પદ્ધતિમાં, ફલન પછી ભ્રૂણનું વિકાસ ક્યાં થાય છે?", "opts": ["ફેલોપિયન નલિકામાં", "ગર્ભાશયમાં", "ઓવરીમાં", "સર્વિક્સમાં"], "ans": 1, "exp": "GIFT પદ્ધતિમાં ફલન ફેલોપિયન નલિકામાં (A) થાય છે, પરંતુ ભ્રૂણનું વિકાસ ગર્ભાશયમાં (B) થાય છે. ઓવરી (C) અને સર્વિક્સ (D) ભ્રૂણના વિકાસ માટે યોગ્ય સ્થળ નથી.", "ref": "Std 12 - પ્રકરણ 3: મનુષ્યમાં પ્રજનન", "ch": ""}, {"q": "GIFT પદ્ધતિમાં, નીચેનામાંથી કયું જોખમ સૌથી વધુ સંભવિત છે જો સ્ત્રીને પહેલાંથી જ ટ્યુબલ ડિસીઝ હોય?", "opts": ["બહુગર્ભતા (Multiple pregnancy)", "એક્ટોપિક ગર્ભધારણ (Ectopic pregnancy)", "ગર્ભપાત", "જન્મજાત વિકૃતિઓ"], "ans": 1, "exp": "ટ્યુબલ ડિસીઝ ધરાવતી સ્ત્રીમાં GIFT પદ્ધતિ દરમિયાન એક્ટોપિક ગર્ભધારણ (B)નું જોખમ સૌથી વધુ હોય છે, કારણ કે ફલિત અંડકોષ ફેલોપિયન નલિકામાં અટકી શકે છે. બહુગર્ભતા (A) GIFTમાં સંભવિત છે, પરંતુ ટ્યુબલ ડિસીઝ સાથે સીધું સંબંધિત નથી. ગર્ભપાત (C) અને જન્મજાત વિકૃતિઓ (D) સામાન્ય જોખમો છે, પરંતુ ટ્યુબલ ડિસીઝ સાથે વિશેષ સંબંધ ધરાવતાં નથી.", "ref": "Std 12 - પ્રકરણ 3: મનુષ્યમાં પ્રજનન", "ch": ""}, {"q": "GIFT પદ્ધતિમાં, let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
