<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNA પ્રતિકૃતિના એન્ઝાઇમ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>DNA પ્રતિકૃતિના એન્ઝાઇમ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">DNA પ્રતિકૃતિના એન્ઝાઇમ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "DNA પ્રતિકૃતિ દરમિયાન, DNA પોલિમરેઝ-III ઉત્સેચક વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["તે પ્રાઇમરના 3'-OH છેડા પરથી ન્યુક્લિઓટાઇડ ઉમેરવાનું કાર્ય કરે છે.", "તે 5'→3' દિશામાં નવો DNA સ્ટ્રેન્ડ સંશ્લેષિત કરે છે.", "તે 3'→5' એક્સોન્યુક્લિએઝ પ્રવૃત્તિ ધરાવે છે જે પ્રૂફરીડિંગ માટે જવાબદાર છે.", "તે પ્રાઇમર સંશ્લેષણ માટે RNA ન્યુક્લિઓટાઇડનો ઉપયોગ કરી શકે છે."], "ans": 3, "exp": "સાચો જવાબ D છે. DNA પોલિમરેઝ-III પ્રાઇમર સંશ્લેષણ કરી શકતું નથી. પ્રાઇમર સંશ્લેષણ માટે પ્રાઇમેઝ ઉત્સેચક જવાબદાર છે, જે RNA ન્યુક્લિઓટાઇડનો ઉપયોગ કરે છે. વિકલ્પ A, B અને C DNA પોલિમરેઝ-III ની સાચી લાક્ષણિકતાઓ છે. DNA પોલિમરેઝ-III 5'→3' દિશામાં DNA સંશ્લેષણ કરે છે અને 3'→5' એક્સોન્યુક્લિએઝ પ્રવૃત્તિ દ્વારા પ્રૂફરીડિંગ કરે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય અને આનુવંશિકતા", "ch": ""}, {"q": "DNA પ્રતિકૃતિ દરમિયાન ઓકાઝાકી ટુકડાઓના નિર્માણમાં નીચેનામાંથી કયો ઉત્સેચક સીધો સંકળાયેલ નથી?", "opts": ["DNA લાઇગેઝ", "DNA પોલિમરેઝ-I", "હેલિકેઝ", "ટોપોઆઇસોમરેઝ-II"], "ans": 3, "exp": "સાચો જવાબ D છે. ટોપોઆઇસોમરેઝ-II DNA ના સુપરકોઇલિંગને દૂર કરવા માટે જવાબદાર છે, પરંતુ તે ઓકાઝાકી ટુકડાઓના નિર્માણમાં સીધી રીતે સંકળાયેલ નથી. DNA લાઇગેઝ ઓકાઝાકી ટુકડાઓને જોડે છે, DNA પોલિમરેઝ-I RNA પ્રાઇમરને દૂર કરી DNA થી બદલે છે, અને હેલિકેઝ DNA ને અલગ કરે છે જે ઓકાઝાકી ટુકડાઓના નિર્માણ માટે જરૂરી છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય અને આનુવંશિકતા", "ch": ""}, {"q": "નીચેના વિધાનોને ધ્યાનમાં લો: \n1. DNA પોલિમરેઝ-III માત્ર લેગિંગ સ્ટ્રેન્ડ પર જ કાર્ય કરે છે.\n2. DNA લાઇગેઝ ATP નો ઉપયોગ કરીને ફોસ્ફોડાઇએસ્ટર બોન્ડ બનાવે છે.\n3. સિંગલ-સ્ટ્રેન્ડ બાઇન્ડિંગ પ્રોટીન DNA ને ન્યુક્લિએઝના હુમલાથી બચાવે છે.\nઉપરોક્ત વિધાનોમાંથી કયું/કયા સાચું/સાચાં છે?", "opts": ["માત્ર 1 અને 2", "માત્ર 2 અને 3", "માત્ર 1 અને 3", "માત્ર 2"], "ans": 1, "exp": "સાચો જવાબ B છે. વિધાન 2 અને 3 સાચાં છે. DNA પોલિમરેઝ-III લેડિંગ અને લેગિંગ બંને સ્ટ્રેન્ડ પર કાર્ય કરે છે, તેથી વિધાન 1 ખોટું છે. DNA લાઇગેઝ ATP નો ઉપયોગ કરી ફોસ્ફોડાઇએસ્ટર બોન્ડ બનાવે છે, અને સિંગલ-સ્ટ્રેન્ડ બાઇન્ડિંગ પ્રોટીન DNA ને ન્યુક્લિએઝના હુમલાથી બચાવે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય અને આનુવંશિકતા", "ch": ""}, {"q": "DNA પ્રતિકૃતિ દરમિયાન, નીચેનામાંથી કયો ઉત્સેચક DNA ના બંને સ્ટ્રેન્ડને એકસાથે જોડાયેલા રાખવાનું કાર્ય કરે છે?", "opts": ["હેલિકેઝ", "ટોપોઆઇસોમરેઝ-I", "DNA ગાયરેઝ", "ઉપરોક્તમાંથી કોઈ નહીં"], "ans": 2, "exp": "સાચો જવાબ C છે. DNA ગાયરેઝ (ટોપોઆઇસોમરેઝ-II નો એક પ્રકાર) DNA ના સુપરકોઇલિંગને દૂર કરી બંને સ્ટ્રેન્ડને એકસાથે જોડાયેલા રાખવામાં મદદ કરે છે. હેલિકેઝ DNA ને અલગ કરે છે, ટોપોઆઇસોમરેઝ-I માત્ર એક સ્ટ્રેન્ડને કાપે છે, અને વિકલ્પ D ખોટો છે કારણ કે DNA ગાયરેઝ આ કાર્ય કરે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય અને આનુવંશિકતા", "ch": ""}, {"q": "DNA પ્રતિકૃતિ દરમિયાન પ્રાઇમર દૂર કરવા માટે જવાબદાર ઉત્સેચક વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["તે 5'→3' એક્સોન્યુક્લિએઝ પ્રવૃત્તિ ધરાવે છે.", "તે RNA પ્રાઇમરને દૂર કરી DNA થી બદલે છે.", "તે DNA પોલિમરેઝ-III ની મદદથી કાર્ય કરે છે.", "તે પ્રોકેરિયોટ્સમાં DNA પોલિમરેઝ-I તરીકે ઓળખાય છે."], "ans": 2, "exp": "સાચો જવાબ C છે. પ્રાઇમર દૂર કરવા માટે જવાબદાર ઉત્સેચક DNA પોલિમરેઝ-I છે, જે એકલું જ RNA પ્રાઇમરને દૂર કરી DNA થી બદલે છે. DNA પોલિમરેઝ-III પ્રાઇમર દૂર કરવામાં સીધી રીતે સંકળાયેલ નથી. વિકલ્પ A, B અને D DNA પોલિમરેઝ-I ની સાચી લાક્ષણિકતાઓ છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય અને આનુવંશિકતા", "ch": ""}, {"q": "DNA પ્રતિકૃતિ દરમિયાન, હેલિકેઝ ઉત્સેચકની ક્રિયા વિશે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["તે DNA ના ડબલ હેલિક્સને અલગ પાડીને સિંગલ સ્ટ્રેન્ડ બનાવે છે.", "તે ATP ની હાઇડ્રોલિસિસ દ્વારા ઉર્જા મેળવે છે.", "તે RNA પ્રાઇમરની જરૂર વગર જ કામ કરે છે.", "તે સિંગલ-સ્ટ્રેન્ડ બાઇન્ડિંગ પ્રોટીન સાથે સહકાર્ય કરે છે."], "ans": 2, "exp": "હેલિકેઝ ઉત્સેચક DNA ના ડબલ હેલિક્સને અલગ પાડવા માટે ATP ની ઉર્જા વાપરે છે (B સત્ય). તે સિંગલ-સ્ટ્રેન્ડ બાઇન્ડિંગ પ્રોટીન સાથે સહકાર્ય કરે છે જેથી અલગ પડેલા સ્ટ્રેન્ડ્સ પુન:જોડાઈ ન જાય (D સત્ય). પરંતુ તેના કામકાજ માટે RNA પ્રાઇમરની જરૂર પડતી નથી, પરંતુ પ્રતિકૃતિ પ્રક્રિયામાં પ્રાઇમરની જરૂર પડે છે, જે હેલિકેઝની ક્રિયા સાથે સીધો સંબંધ ધરાવતો નથી. આથી C ખોટું છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA પ્રતિકૃતિ દરમિયાન, નીચેનામાંથી કયો ઉત્સેચક 3’ → 5’ એક્સોન્યુક્લિયેઝ ક્રિયાશીલતા ધરાવે છે?", "opts": ["DNA પોલિમરેઝ-I", "DNA પોલિમરેઝ-II", "લિગેઝ", "ટોપોઈઝોમેરેઝ"], "ans": 0, "exp": "DNA પોલિમરેઝ-I ની 3’ → 5’ એક્સોન્યુક્લિયેઝ ક્રિયાશીલતા તેને પ્રૂફરીડિંગ કરવા માટે મદદ કરે છે, જેથી ખોટા ન્યુક્લિયોટાઇડને દૂર કરી શકાય. DNA પોલિમરેઝ-II ની આ ક્રિયાશીલતા નથી (B ખોટું). લિગેઝ DNA ટુકડાઓને જોડવા કામ કરે છે (C ખોટું). ટોપોઈઝોમેરેઝ DNA ની સુપરકોઇલિંગને દૂર કરે છે (D ખોટું).", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA પ્રતિકૃતિ દરમિયાન, નીચેનામાંથી કયો ઉત્સેચક DNA ના સ્ટ્રેન્ડને કાપીને અને પુન:જોડીને ટોપોલોજિકલ તણાવ દૂર કરે છે?", "opts": ["હેલિકેઝ", "ટોપોઈઝોમેરેઝ-I", "પ્રાઇમેઝ", "DNA પોલિમરેઝ-III"], "ans": 1, "exp": "ટોપોઈઝોમેરેઝ-I ઉત્સેચક DNA ના સ્ટ્રેન્ડને કાપીને અને પુન:જોડીને સુપરકોઇલિંગ દૂર કરે છે, જેથી હેલિકેઝને DNA ને અલગ પાડવામાં સરળતા રહે. હેલિકેઝ DNA ને અલગ પાડે છે પરંતુ કાપી શકતું નથી (A ખોટું). પ્રાઇમેઝ RNA પ્રાઇમર બનાવે છે (C ખોટું). DNA પોલિમરેઝ-III DNA ની પ્રતિકૃતિ કરે છે (D ખોટું).", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA પ્રતિકૃતિ દરમિયાન, નીચેનામાંથી કયો ઉત્સેચક ઓકાઝાકી ટુકડાઓને જોડવા માટે જવાબદાર નથી?", "opts": ["DNA પોલિમરેઝ-I", "DNA લિગેઝ", "હેલિકેઝ", "RNA પ્રાઇમેઝ"], "ans": 2, "exp": "હેલિકેઝ ઉત્સેચક DNA ના ડબલ હેલિક્સને અલગ પાડવા માટે જવાબદાર છે, ઓકાઝાકી ટુકડાઓને જોડવા માટે નહીં. DNA પોલિમરેઝ-I ઓકાઝાકી ટુકડાઓમાં RNA પ્રાઇમરને દૂર કરે છે અને ખાલી જગ્યા પૂરે છે (A સત્ય). DNA લિગેઝ ઓકાઝાકી ટુકડાઓને જોડે છે (B સત્ય). RNA પ્રાઇમેઝ પ્રાઇમર બનાવે છે (D સત્ય).", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA પ્રતિકૃતિ દરમિયાન, નીચેનામાંથી કયો ઉત્સેચક લેગિંગ સ્ટ્રેન્ડ પર કામ કરતો નથી?", "opts": ["DNA પોલિમરેઝ-III", "DNA પોલિમરેઝ-I", "હેલિકેઝ", "ટોપોઈઝોમેરેઝ"], "ans": 0, "exp": "DNA પોલિમરેઝ-III લીડિંગ સ્ટ્રેન્ડ પર કામ કરે છે, જ્યારે લેગિંગ સ્ટ્રેન્ડ પર DNA પોલિમરેઝ-I કામ કરે છે (B સત્ય). હેલિકેઝ અને ટોપોઈઝોમેરેઝ બંને સ્ટ્રેન્ડ પર કામ કરે છે (C અને D સત્ય). આથી A ખોટું છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA પ્રતિકૃતિ દરમિયાન, નીચેનામાંથી કયો ઉત્સેચક 5’ → 3’ પોલિમરેઝ ક્રિયાશીલતા અને 3’ → 5’ એક્સોન્યુક્લિયેઝ ક્રિયાશીલતા બંને ધરાવે છે?", "opts": ["DNA પોલિમરેઝ-I", "DNA પોલિમરેઝ-II", "DNA પોલિમરેઝ-III", "પ્રાઇમેઝ"], "ans": 0, "exp": "DNA પોલિમરેઝ-I ની 5’ → 3’ પોલિમરેઝ ક્રિયાશીલતા અને 3’ → 5’ એક્સોન્યુક્લિયેઝ ક્રિયાશીલતા બંને હોય છે. DNA પોલિમરેઝ-II અને III માત્ર 5’ → 3’ પોલિમરેઝ ક્રિયાશીલતા ધરાવે છે, જ્યારે પ્રાઇમેઝ માત્ર RNA પ્રાઇમરનું સંશ્લેષણ કરે છે.", "ref": "Std 12 - અધ્યાય 6: વંશવિધાનના આણ્વિક આધાર", "ch": ""}, {"q": "DNA પ્રતિકૃતિ દરમિયાન, નીચેનામાંથી કયો ઉત્સેચક DNA ના ડબલ સ્ટ્રેન્ડને એકલ સ્ટ્રેન્ડમાં ફેરવવા માટે જવાબદાર છે?", "opts": ["ટોપોઇસોમેરેઝ", "હેલિકેઝ", "સિંગલ-સ્ટ્રેન્ડ બાઇન્ડિંગ પ્રોટીન (SSB)", "DNA લાઇગેઝ"], "ans": 1, "exp": "હેલિકેઝ ઉત્સેચક DNA ના ડબલ સ્ટ્રેન્ડને એકલ સ્ટ્રેન્ડમાં ફેરવવા માટે જવાબદાર છે. ટોપોઇસોમેરેઝ DNA ના સુપરકોઇલિંગને દૂર કરે છે, SSB પ્રોટીન એકલ સ્ટ્રેન્ડને સ્થિર રાખે છે, અને DNA લાઇગેઝ ઓકાઝાકી ટુકડાઓને જોડે છે.", "ref": "Std 12 - અધ્યાય 6: વંશવિધાનના આણ્વિક આધાર", "ch": ""}, {"q": "DNA પ્રતિકૃતિ દરમિયાન, નીચેનામાંથી કયો ઉત્સેચક RNA પ્રાઇમરનું સંશ્લેષણ કરે છે?", "opts": ["DNA પોલિમરેઝ-I", "DNA પોલિમરેઝ-III", "પ્રાઇમેઝ", "હેલિકેઝ"], "ans": 2, "exp": "પ્રાઇમેઝ ઉત્સેચક DNA પ્રતિકૃતિ દરમિયાન RNA પ્રાઇમરનું સંશ્લેષણ કરે છે. DNA પોલિમરેઝ-I અને III DNA નું સંશ્લેષણ કરે છે, જ્યારે હેલિકેઝ DNA ના સ્ટ્રેન્ડને અલગ કરે છે.", "ref": "Std 12 - અધ્યાય 6: વંશવિધાનના આણ્વિક આધાર", "ch": ""}, {"q": "DNA પ્રતિકૃતિ દરમિયાન, નીચેનામાંથી કયો ઉત્સેચક DNA ના સુપરકોઇલિંગને દૂર કરવા માટે જવાબદાર છે?", "opts": ["ટોપોઇસોમેરેઝ", "હેલિકેઝ", "સિંગલ-સ્ટ્રેન્ડ બાઇન્ડિંગ પ્રોટીન (SSB)", "DNA લાઇગેઝ"], "ans": 0, "exp": "ટોપોઇસોમેરેઝ ઉત્સેચક DNA ના સુપરકોઇલિંગને દૂર કરવા માટે જવાબદાર છે. હેલિકેઝ DNA ના સ્ટ્રેન્ડને અલગ કરે છે, SSB પ્રોટીન એકલ સ્ટ્રેન્ડને સ્થિર રાખે છે, અને DNA લાઇગેઝ ઓકાઝાકી ટુકડાઓને જોડે છે.", "ref": "Std 12 - અધ્યાય 6: વંશવિધાનના આણ્વિક આધાર", "ch": ""}, {"q": "DNA પ્રતિકૃતિ દરમિયાન, નીચેનામાંથી કયો ઉત્સેચક DNA ના નવા સંશ્લેષિત સ્ટ્રેન્ડમાં ખોટા ન્યુક્લિઓટાઇડને દૂર કરીને સાચા ન્યુક્લિઓટાઇડને જોડવાની ક્ષમતા ધરાવે છે, પરંતુ આ ક્રિયા માત્ર લેગિંગ સ્ટ્રેન્ડ પર જ થાય છે અને લીડિંગ સ્ટ્રેન્ડ પર થતી નથી?", "opts": ["DNA પોલિમરેઝ-I", "DNA પોલિમરેઝ-III", "લાઇગેઝ", "ટોપોઆઇસોમરેઝ-I"], "ans": 0, "exp": "DNA પોલિમરેઝ-I ઉત્સેચક 3’ → 5’ એક્સોન્યુક્લિયેઝ ક્રિયાશીલતા ધરાવે છે, જે ખોટા ન્યુક્લિઓટાઇડને દૂર કરીને સાચા ન્યુક્લિઓટાઇડને જોડવાની ક્ષમતા આપે છે. આ ક્રિયા પ્રૂફરીડિંગ તરીકે ઓળખાય છે. જોકે, આ પ્રક્રિયા લેગિંગ સ્ટ્રેન્ડ પર વધુ સક્રિય હોય છે કારણ કે ઓકાઝાકી ટુકડાઓના નિર્માણ દરમિયાન વધુ ભૂલો થવાની સંભાવના રહે છે. DNA પોલિમરેઝ-III પણ પ્રૂફરીડિંગ ક્ષમતા ધરાવે છે, પરંતુ તે બંને સ્ટ્રેન્ડ પર સક્રિય હોય છે. લાઇગેઝ અને ટોપોઆઇસોમરેઝ-I આ પ્રકારની ક્રિયામાં સંકળાયેલા નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય અને આનુવંશિકતા", "ch": ""}, {"q": "DNA પ્રતિકૃતિ દરમિયાન, નીચેનામાંથી કયો ઉત્સેચક એવી વિશિષ્ટતા ધરાવે છે કે તે માત્ર એક જ દિશામાં (5’ → 3’) કાર્ય કરી શકે છે, પરંતુ તેની પાસે પ્રૂફરીડિંગ ક્ષમતા નથી?", "opts": ["DNA પોલિમરેઝ-I", "DNA પોલિમરેઝ-III", "પ્રાઇમેઝ", "લાઇગેઝ"], "ans": 2, "exp": "સાચો જવાબ C) પ્રાઇમેઝ છે. પ્રાઇમેઝ ઉત્સેચક RNA પ્રાઇમરનું સંશ્લેષણ 5’ → 3’ દિશામાં કરે છે, પરંતુ તેની પાસે પ્રૂફરીડિંગ ક્ષમતા (3’ → 5’ એક્સોન્યુક્લિયેઝ ક્રિયાશીલતા) હોતી નથી. DNA પોલિમરેઝ-I અને III બંને પ્રૂફરીડિંગ ક્ષમતા ધરાવે છે, જ્યારે લાઇગેઝ ઉત્સેચક પ્રાઇમર સંશ્લેષણ સાથે સંકળાયેલ નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય અને આનુવંશિકતા", "ch": ""}, {"q": "નીચેના વિધાનોને ધ્યાનમાં લો: \n1. DNA પોલિમરેઝ-III ઉત્સેચક માત્ર લેગિંગ સ્ટ્રેન્ડ પર જ કાર્ય કરે છે.\n2. DNA પોલિમરેઝ-I ઉત્સેચક RNA પ્રાઇમરને દૂર કરીને તેની જગ્યાએ DNA ન્યુક્લિયોટાઇડ્સ ઉમેરે છે.\n3. લાઇગેઝ ઉત્સેચક ઓકાઝાકી ટુકડાઓને જોડવા માટે ATP નો ઉપયોગ કરે છે.\nઉપરોક્ત વિધાનોમાંથી કયું/કયા વિધાન/વિધાનો સત્ય છે?", "opts": ["માત્ર 1 અને 2", "માત્ર 2 અને 3", "માત્ર 1 અને 3", "1, 2 અને 3"], "ans": 1, "exp": "સાચો જવાબ B) માત્ર 2 અને 3 છે. વિધાન 1 ખોટું છે કારણ કે DNA પોલિમરેઝ-III લેગિંગ અને લીડિંગ બંને સ્ટ્રેન્ડ પર કાર્ય કરે છે. વિધાન 2 સાચું છે કારણ કે DNA પોલિમરેઝ-I RNA પ્રાઇમરને દૂર કરીને DNA ન્યુક્લિયોટાઇડ્સ ઉમેરે છે. વિધાન 3 પણ સાચું છે કારણ કે લાઇગેઝ ઉત્સેચક ઓકાઝાકી ટુકડાઓને જોડવા માટે ATP નો ઉપયોગ કરે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય અને આનુવંશિકતા", "ch": ""}, {"q": "DNA પ્રતિકૃતિ દરમિયાન, નીચેનામાંથી કયો ઉત્સેચક *એકમાત્ર* એવો છે જે 3’ → 5’ દિશામાં DNA સંશ્લેષણ કરી શકે છે?", "opts": ["DNA પોલિમરેઝ-I", "DNA પોલિમરેઝ-III", "ટોપોઆઇસોમરેઝ-I", "રિવર્સ ટ્રાન્સક્રિપ્ટેઝ"], "ans": 3, "exp": "સાચો જવાબ D) રિવર્સ ટ્રાન્સક્રિપ્ટેઝ છે, કારણ કે આ ઉત્સેચક RNA ટેમ્પલેટ પરથી 3’ → 5’ દિશામાં DNA સંશ્લેષણ કરી શકે છે, જે અન્ય DNA પોલિમરેઝ ઉત્સેચકોથી અલગ છે. DNA પોલિમરેઝ-I અને III બંને 5’ → 3’ દિશામાં જ કામ કરે છે. ટોપોઆઇસોમરેઝ-I DNA ના સુપરકોઇલિંગને દૂર કરે છે, પરંતુ તે DNA સંશ્લેષણ કરતું નથી. રિવર્સ ટ્રાન્સક્રિપ્ટેઝ એ એકમાત્ર ઉત્સેચક છે જે 3’ → 5’ દિશામાં DNA સંશ્લેષણ કરી શકે છે, જે વાઇરસમાં જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય અને આનુવંશિકતા", "ch": ""}, {"q": "DNA પ્રતિકૃતિ દરમિયાન, નીચેનામાંથી કયો ઉત્સેચક *સીધો* DNA ના નવા સંશ્લેષિત સ્ટ્રેન્ડમાં ખોટા ન્યુક્લિઓટાઇડને દૂર કરી શકે છે, પરંતુ તેની પ્રાથમિક ભૂમિકા પ્રાઇમર દૂર કરવાની નથી?", "opts": ["DNA પોલિમરેઝ-I", "DNA લાઇગેઝ", "DNA પોલિમરેઝ-III", "પ્રાઇમેઝ"], "ans": 2, "exp": "સાચો જવાબ C) DNA પોલિમરેઝ-III છે, કારણ કે આ ઉત્સેચકમાં 3’ → 5’ એક્સોન્યુક્લિયેઝ ક્રિયાશીલતા હોય છે, જે ખોટા ન્યુક્લિઓટાઇડને દૂર કરી શકે છે. DNA પોલિમરેઝ-I પણ આ ક્રિયા કરી શકે છે, પરંતુ તેની પ્રાથમિક ભૂમિકા પ્રાઇમર દૂર કરવાની છે. DNA લાઇગેઝ ઓકાઝાકી ટુકડાઓને જોડે છે, જ્યારે પ્રાઇમેઝ RNA પ્રાઇમરનું સંશ્લેષણ કરે છે. તેથી DNA પોલિમરેઝ-III એ સાચો જવાબ છે, કારણ કે તેની પ્રાથમિક ભૂમિકા પ્રાઇમર દૂર કરવાની નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય અને આનુવંશિકતા", "ch": ""}, {"q": "નીચેના વિધાનોને ધ્યાનમાં લો: \n1. DNA પ્રતિકૃતિ દરમિયાન, ટોપોઆઇસોમરેઝ-II ઉત્સેચક DNA ના ડબલ સ્ટ્રેન્ડને કાપીને સુપરકોઇલિંગ દૂર કરે છે. \n2. DNA ગાયરેઝ એ પ્રોકેરિયોટ્સમાં જોવા મળતું ટોપોઆઇસોમરેઝ-II છે. \n3. ટોપોઆઇસોમરેઝ-I ઉત્સેચક DNA ના એક સ્ટ્રેન્ડને કાપીને સુપરકોઇલિંગ દૂર કરે છે, પરંતુ ATP નો ઉપયોગ કરતું નથી. \nઉપરોક્ત વિધાનોમાંથી કયું/કયાં વિધાન/વિધાનો સત્ય છે?", "opts": ["માત્ર 1 અને 2", "માત્ર 2 અને 3", "માત્ર 1 અને 3", "1, 2 અને 3"], "ans": 3, "exp": "સાચો જવાબ D) 1, 2 અને 3 છે. વિધાન 1 સત્ય છે કારણ કે ટોપોઆઇસોમરેઝ-II DNA ના ડબલ સ્ટ્રેન્ડને કાપીને સુપરકોઇલિંગ દૂર કરે છે. વિધાન 2 પણ સત્ય છે કારણ કે DNA ગાયરેઝ એ પ્રોકેરિયોટ્સમાં જોવા મળતું ટોપોઆઇસોમરેઝ-II છે. વિધાન 3 પણ સત્ય છે કારણ કે ટોપોઆઇસોમરેઝ-I DNA ના એક સ્ટ્રેન્ડને કાપીને સુપરકોઇલિંગ દૂર કરે છે અને તે ATP નો ઉપયોગ કરતું નથી. તેથી તમામ વિધાનો સત્ય છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય અને આનુવંશિકતા", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
