<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>આંતરિક સંરક્ષણ (In-situ Conservation)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>આંતરિક સંરક્ષણ (In-situ Conservation)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">આંતરિક સંરક્ષણ (In-situ Conservation)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ગુજરાતમાં આવેલું 'નારાયણ સરોવર અભયારણ્ય' કયા પ્રકારના આંતરિક સંરક્ષણનું ઉદાહરણ છે?", "opts": ["રાષ્ટ્રીય ઉદ્યાન (National Park)", "જૈવાવરણ આરક્ષિત ક્ષેત્ર (Biosphere Reserve)", "સમુદાય આરક્ષિત ક્ષેત્ર (Community Reserve)", "વન્યજીવ અભયારણ્ય (Wildlife Sanctuary)"], "ans": 3, "exp": "'નારાયણ સરોવર અભયારણ્ય' ગુજરાતમાં આવેલું વન્યજીવ અભયારણ્ય છે, જે આંતરિક સંરક્ષણનો એક પ્રકાર છે. રાષ્ટ્રીય ઉદ્યાનમાં માનવ પ્રવૃત્તિઓ પર વધુ પ્રતિબંધ હોય છે, જ્યારે અભયારણ્યમાં મર્યાદિત માનવ પ્રવૃત્તિઓની છૂટ હોય છે. જૈવાવરણ આરક્ષિત ક્ષેત્ર અને સમુદાય આરક્ષિત ક્ષેત્ર એ અલગ પ્રકારના સંરક્ષણ મોડેલ છે, જે અહીં લાગુ પડતા નથી.", "ref": "Std 12 - પ્રકરણ 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન આંતરિક સંરક્ષણ (In-situ Conservation) માટે ખોટું છે?", "opts": ["આ પદ્ધતિમાં જૈવિક પ્રજાતિઓને તેમના કુદરતી નિવાસસ્થાનમાં જ સંરક્ષિત કરવામાં આવે છે", "આ પદ્ધતિમાં જનીનિક વિવિધતા જળવાઈ રહે છે", "આ પદ્ધતિમાં માનવ પ્રવૃત્તિઓ પર સંપૂર્ણ પ્રતિબંધ હોય છે", "રાષ્ટ્રીય ઉદ્યાનો અને અભયારણ્યો આ પદ્ધતિના ઉદાહરણ છે"], "ans": 2, "exp": "આંતરિક સંરક્ષણમાં માનવ પ્રવૃત્તિઓ પર સંપૂર્ણ પ્રતિબંધ હોતો નથી, પરંતુ તેને નિયંત્રિત કરવામાં આવે છે. રાષ્ટ્રીય ઉદ્યાનોમાં પ્રતિબંધ વધુ કડક હોય છે, જ્યારે અભયારણ્યોમાં મર્યાદિત પ્રવૃત્તિઓની છૂટ હોય છે. બાકીના વિકલ્પો આંતરિક સંરક્ષણની સાચી લાક્ષણિકતાઓ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "'સુંદરવન બાયોસ્ફિયર રિઝર્વ'માં કયા પ્રકારનું આંતરિક સંરક્ષણ જોવા મળે છે?", "opts": ["માત્ર રાષ્ટ્રીય ઉદ્યાન", "માત્ર વન્યજીવ અભયારણ્ય", "રાષ્ટ્રીય ઉદ્યાન અને વન્યજીવ અભયારણ્ય બંને", "જૈવાવરણ આરક્ષિત ક્ષેત્ર, રાષ્ટ્રીય ઉદ્યાન અને વન્યજીવ અભયારણ્યનું સંયોજન"], "ans": 3, "exp": "સુંદરવન બાયોસ્ફિયર રિઝર્વમાં જૈવાવરણ આરક્ષિત ક્ષેત્ર, રાષ્ટ્રીય ઉદ્યાન અને વન્યજીવ અભયારણ્ય ત્રણેય પ્રકારના આંતરિક સંરક્ષણ જોવા મળે છે. આ એક મલ્ટી-લેયર સંરક્ષણ મોડેલ છે, જે જૈવવિવિધતાના સંરક્ષણ માટે વધુ અસરકારક છે.", "ref": "Std 12 - પ્રકરણ 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "આંતરિક સંરક્ષણના સંદર્ભમાં 'કોર ઝોન' શું દર્શાવે છે?", "opts": ["જ્યાં માનવ પ્રવૃત્તિઓ પર સૌથી ઓછો પ્રતિબંધ હોય છે", "જ્યાં માનવ પ્રવૃત્તિઓ પર સંપૂર્ણ પ્રતિબંધ હોય છે અને જૈવવિવિધતા સંપૂર્ણ સુરક્ષિત હોય છે", "જ્યાં માત્ર સંશોધન અને શિક્ષણ માટે પ્રવેશ મળે છે", "જ્યાં સ્થાનિક સમુદાયોને રહેવાની છૂટ હોય છે"], "ans": 1, "exp": "'કોર ઝોન' એ આંતરિક સંરક્ષણનું સૌથી સંવેદનશીલ ક્ષેત્ર છે, જ્યાં માનવ પ્રવૃત્તિઓ પર સંપૂર્ણ પ્રતિબંધ હોય છે અને જૈવવિવિધતા સંપૂર્ણ રીતે સુરક્ષિત રાખવામાં આવે છે. બફર ઝોનમાં મર્યાદિત પ્રવૃત્તિઓની છૂટ હોય છે, જ્યારે ટ્રાન્ઝિશન ઝોનમાં માનવ વસવાટ અને પ્રવૃત્તિઓને મંજૂરી હોય છે.", "ref": "Std 12 - પ્રકરણ 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "નીચેનામાંથી કયું આંતરિક સંરક્ષણનું ઉદાહરણ નથી?", "opts": ["ગીર રાષ્ટ્રીય ઉદ્યાન", "નંદનકાનન પ્રાણીસંગ્રહાલય", "કચ્છનું જૈવાવરણ આરક્ષિત ક્ષેત્ર", "વેળાવદર કાળિયાર રાષ્ટ્રીય ઉદ્યાન"], "ans": 1, "exp": "નંદનકાનન પ્રાણીસંગ્રહાલય એ બાહ્ય સંરક્ષણ (Ex-situ Conservation)નું ઉદાહરણ છે, જ્યાં પ્રાણીઓને તેમના કુદરતી નિવાસસ્થાનથી દૂર રાખીને સંરક્ષિત કરવામાં આવે છે. બાકીના વિકલ્પો આંતરિક સંરક્ષણના ઉદાહરણો છે, જ્યાં પ્રજાતિઓને તેમના કુદરતી નિવાસસ્થાનમાં જ સંરક્ષિત કરવામાં આવે છે.", "ref": "Std 12 - પ્રકરણ 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "ગુજરાતના 'કચ્છના રણ'માં આવેલું 'ઇન્ડિયન વાઇલ્ડ એસ' (Indian Wild Ass)નું સંરક્ષણ કરવા માટે કયા પ્રકારનું આંતરિક સંરક્ષણ પધ્ધતિ અપનાવવામાં આવે છે, જ્યાં પ્રાણીઓને તેમના નૈસર્ગિક વાતાવરણમાં જ રક્ષણ આપવામાં આવે છે?", "opts": ["રાષ્ટ્રીય ઉદ્યાન (National Park)", "અભયારણ્ય (Wildlife Sanctuary)", "બાયોસ્ફિયર રિઝર્વ (Biosphere Reserve)", "જીવવૈવિધ્ય સંરક્ષણ ક્ષેત્ર (Biodiversity Heritage Site)"], "ans": 1, "exp": "ઇન્ડિયન વાઇલ્ડ એસનું સંરક્ષણ 'કચ્છના રણ'માં 'અભયારણ્ય' (Wildlife Sanctuary) તરીકે કરવામાં આવે છે, જ્યાં પ્રાણીઓને તેમના નૈસર્ગિક વાતાવરણમાં જ રક્ષણ આપવામાં આવે છે. રાષ્ટ્રીય ઉદ્યાન (A) એ સખ્ત સંરક્ષણ ક્ષેત્ર છે, પરંતુ ઇન્ડિયન વાઇલ્ડ એસ માટે અભયારણ્ય જ ઘોષિત કરવામાં આવ્યું છે. બાયોસ્ફિયર રિઝર્વ (C) એ વ્યાપક ક્ષેત્ર છે જ્યાં મનુષ્ય અને પ્રકૃતિના સહ-અસ્તિત્વ પર ભાર મૂકવામાં આવે છે, પરંતુ ઇન્ડિયન વાઇલ્ડ એસ માટે અભયારણ્ય જ પ્રાથમિક સંરક્ષણ ક્ષેત્ર છે. જીવવૈવિધ્ય સંરક્ષણ ક્ષેત્ર (D) એ સ્થાનિક સમુદાયો દ્વારા સંરક્ષિત ક્ષેત્ર છે, જે અહીં લાગુ પડતું નથી.", "ref": "Std 12 - Chapter 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન 'બાયોસ્ફિયર રિઝર્વ'ના સંદર્ભમાં ખોટું છે?", "opts": ["તે ત્રણ ઝોનમાં વિભાજિત હોય છે: કોર, બફર અને ટ્રાન્ઝિશન.", "કોર ઝોનમાં મનુષ્યની કોઈપણ પ્રવૃત્તિ પર પ્રતિબંધ હોય છે.", "બફર ઝોનમાં સીમિત વૈજ્ઞાનિક સંશોધન અને શિક્ષણ પ્રવૃત્તિઓની પરવાનગી હોય છે.", "ટ્રાન્ઝિશન ઝોનમાં વ્યાપારિક કૃષિ અને ઉદ્યોગોની સ્થાપના કરવા માટે પૂર્ણ સ્વાતંત્ર્ય હોય છે."], "ans": 3, "exp": "બાયોસ્ફિયર રિઝર્વના ટ્રાન્ઝિશન ઝોનમાં વ્યાપારિક કૃષિ અને ઉદ્યોગોની સ્થાપના માટે પૂર્ણ સ્વાતંત્ર્ય હોતું નથી. આ ઝોનમાં સ્થાનિક સમુદાયોની પ્રવૃત્તિઓને પ્રોત્સાહન આપવામાં આવે છે, પરંતુ તેને નિયંત્રિત અને ટકાઉ રીતે કરવામાં આવે છે. કોર ઝોન (B)માં મનુષ્યની કોઈપણ પ્રવૃત્તિ પર પ્રતિબંધ હોય છે, બફર ઝોન (C)માં સીમિત વૈજ્ઞાનિક અને શિક્ષણ પ્રવૃત્તિઓની પરવાનગી હોય છે, અને બાયોસ્ફિયર રિઝર્વ ત્રણ ઝોનમાં વિભાજિત હોય છે (A).", "ref": "Std 12 - Chapter 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "ગુજરાતમાં આવેલું 'મરીન નેશનલ પાર્ક' (Marine National Park) કયા પ્રકારના આંતરિક સંરક્ષણનું ઉદાહરણ છે, જ્યાં સમુદ્રી જૈવવૈવિધ્યનું રક્ષણ કરવામાં આવે છે?", "opts": ["રાષ્ટ્રીય ઉદ્યાન (National Park)", "અભયારણ્ય (Wildlife Sanctuary)", "બાયોસ્ફિયર રિઝર્વ (Biosphere Reserve)", "રામસર સાઇટ (Ramsar Site)"], "ans": 0, "exp": "'મરીન નેશનલ પાર્ક' એ રાષ્ટ્રીય ઉદ્યાન (National Park) છે, જ્યાં સમુદ્રી જૈવવૈવિધ્યનું રક્ષણ કરવામાં આવે છે. અભયારણ્ય (B) એ સંરક્ષણનું બીજું સ્વરૂપ છે, પરંતુ મરીન નેશનલ પાર્કને રાષ્ટ્રીય ઉદ્યાન તરીકે ઘોષિત કરવામાં આવ્યું છે. બાયોસ્ફિયર રિઝર્વ (C) અને રામસર સાઇટ (D) એ અલગ પ્રકારના સંરક્ષણ ક્ષેત્રો છે, જે અહીં લાગુ પડતાં નથી.", "ref": "Std 12 - Chapter 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન 'રાષ્ટ્રીય ઉદ્યાન' અને 'અભયારણ્ય' વચ્ચેના તફાવતને સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["રાષ્ટ્રીય ઉદ્યાનમાં પ્રાણીઓના શિકાર પર પ્રતિબંધ હોય છે, જ્યારે અભયારણ્યમાં સીમિત શિકારની પરવાનગી હોય છે.", "રાષ્ટ્રીય ઉદ્યાનમાં મનુષ્યની કોઈપણ પ્રવૃત્તિ પર પ્રતિબંધ હોય છે, જ્યારે અભયારણ્યમાં સ્થાનિક સમુદાયોની પ્રવૃત્તિઓને પરવાનગી હોય છે.", "રાષ્ટ્રીય ઉદ્યાન અને અભયારણ્ય વચ્ચે કોઈ તફાવત નથી, બંનેમાં પ્રાણીઓ અને વનસ્પતિઓનું સંરક્ષણ કરવામાં આવે છે.", "રાષ્ટ્રીય ઉદ્યાનમાં ફક્ત વનસ્પતિઓનું સંરક્ષણ કરવામાં આવે છે, જ્યારે અભયારણ્યમાં ફક્ત પ્રાણીઓનું સંરક્ષણ કરવામાં આવે છે."], "ans": 1, "exp": "રાષ્ટ્રીય ઉદ્યાનમાં મનુષ્યની કોઈપણ પ્રવૃત્તિ પર પ્રતિબંધ હોય છે, જ્યારે અભયારણ્યમાં સ્થાનિક સમુદાયોની પ્રવૃત્તિઓને પરવાનગી હોય છે. રાષ્ટ્રીય ઉદ્યાનમાં પ્રાણીઓના શિકાર પર પ્રતિબંધ હોય છે (A), પરંતુ અભયારણ્યમાં પણ શિકાર પર પ્રતિબંધ હોય છે, ફરક એ છે કે અભયારણ્યમાં સ્થાનિક સમુદાયોની પ્રવૃત્તિઓને પરવાનગી હોય છે. વિકલ્પ (C) ખોટો છે કારણ કે બંનેમાં તફાવત હોય છે. વિકલ્પ (D) ખોટો છે કારણ કે બંનેમાં પ્રાણીઓ અને વનસ્પતિઓનું સંરક્ષણ કરવામાં આવે છે.", "ref": "Std 12 - Chapter 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "ગુજરાતમાં આવેલું 'વાંસદા રાષ્ટ્રીય ઉદ્યાન' કયા પ્રકારના આંતરિક સંરક્ષણનું ઉદાહરણ છે, જ્યાં વન્ય જીવો અને વનસ્પતિઓનું સંરક્ષણ કરવામાં આવે છે?", "opts": ["બાયોસ્ફિયર રિઝર્વ (Biosphere Reserve)", "રાષ્ટ્રીય ઉદ્યાન (National Park)", "અભયારણ્ય (Wildlife Sanctuary)", "જીવવૈવિધ્ય સંરક્ષણ ક્ષેત્ર (Biodiversity Heritage Site)"], "ans": 1, "exp": "'વાંસદા રાષ્ટ્રીય ઉદ્યાન' એ રાષ્ટ્રીય ઉદ્યાન (National Park) છે, જ્યાં વન્ય જીવો અને વનસ્પતિઓનું સંરક્ષણ કરવામાં આવે છે. બાયોસ્ફિયર રિઝર્વ (A) એ વ્યાપક ક્ષેત્ર છે, જ્યારે અભયારણ્ય (C) એ સંરક્ષણનું બીજું સ્વરૂપ છે. જીવવૈવિધ્ય સંરક્ષણ ક્ષેત્ર (D) એ સ્થાનિક સમુદાયો દ્વારા સંરક્ષિત ક્ષેત્ર છે, જે અહીં લાગુ પડતું નથી.", "ref": "Std 12 - Chapter 15: જૈવ વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "ગુજરાતના 'મીઠાપુર ખરાબી' (Mithapur) ખાતે આવેલું 'મરીન નેશનલ પાર્ક'માં કયા જીવવિજ્ઞાનીય ક્ષેત્રને આંતરિક સંરક્ષણ હેઠળ રાખવામાં આવે છે, જે અન્ય રાષ્ટ્રીય ઉદ્યાનોમાં સામાન્ય રીતે જોવા મળતું નથી?", "opts": ["મેનગ્રોવ વનસ્પતિ અને કોરલ રીફ્સ", "શુષ્ક પર્ણપાતી જંગલો અને ઘાસના મેદાનો", "ઉષ્ણકટિબંધીય વર્ષાવન અને સદાબહાર જંગલો", "અલ્પાઇન પર્ણપાતી વનસ્પતિ અને ટુંડ્રા પ્રદેશ"], "ans": 0, "exp": "મરીન નેશનલ પાર્ક મુખ્યત્વે સમુદ્રી જૈવવિવિધતાનું સંરક્ષણ કરે છે, જેમાં મેનગ્રોવ વનસ્પતિ અને કોરલ રીફ્સનો સમાવેશ થાય છે. શુષ્ક પર્ણપાતી જંગલો (B) સામાન્ય રીતે સ્થળીય રાષ્ટ્રીય ઉદ્યાનોમાં જોવા મળે છે, જ્યારે ઉષ્ણકટિબંધીય વર્ષાવન (C) અને અલ્પાઇન વનસ્પતિ (D) મરીન પાર્કના પર્યાવરણમાં અસંભવ છે.", "ref": "Std 12 - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "આંતરિક સંરક્ષણના સંદર્ભમાં, 'જૈવમંડળ રિઝર્વ'ની 'બફર ઝોન'માં કયું કૃત્ય અનુમાનિત રીતે પરવાનગી આપવામાં આવે છે, જે 'કોર ઝોન'માં પ્રતિબંધિત છે?", "opts": ["વૈજ્ઞાનિક સંશોધન અને નિરીક્ષણ", "મર્યાદિત પર્યટન અને પરંપરાગત કૃષિ", "વન્યજીવોનું શિકાર અને વનવિભાગીય લાકડાનું કાપણી", "નવા ઉદ્યોગોની સ્થાપના અને શહેરી વિકાસ"], "ans": 1, "exp": "બફર ઝોનમાં મર્યાદિત પર્યટન અને પરંપરાગત કૃષિની પરવાનગી આપવામાં આવે છે, જ્યારે કોર ઝોનમાં કોઈપણ માનવીય હસ્તક્ષેપ પ્રતિબંધિત છે. વૈજ્ઞાનિક સંશોધન (A) કોર ઝોનમાં પણ થઈ શકે છે, શિકાર અને લાકડાનું કાપણી (C) તો કોઈપણ ઝોનમાં પ્રતિબંધિત છે, અને ઉદ્યોગો (D) બફર ઝોનમાં પણ મનાઈ છે.", "ref": "Std 12 - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "ગુજરાતમાં આવેલું 'વેલાવદર રાષ્ટ્રીય ઉદ્યાન' કયા અસાધારણ વન્યજીવના આંતરિક સંરક્ષણ માટે પ્રસિદ્ધ છે, જેના માટે આ ઉદ્યાનને 'યુનેસ્કો બાયોસ્ફિયર રિઝર્વ' તરીકે પણ ઓળખવામાં આવે છે?", "opts": ["એશિયાટિક સિંહ", "ઇન્ડિયન વાઇલ્ડ એસ", "કાળિયાર (Blackbuck)", "ગીધ (Vulture)"], "ans": 0, "exp": "વેલાવદર રાષ્ટ્રીય ઉદ્યાન એશિયાટિક સિંહના સંરક્ષણ માટે પ્રસિદ્ધ છે, જે ગુજરાતનું રાજ્ય પ્રાણી છે અને આ ઉદ્યાનને યુનેસ્કો દ્વારા બાયોસ્ફિયર રિઝર્વ તરીકે માન્યતા આપવામાં આવી છે. ઇન્ડિયન વાઇલ્ડ એસ (B) કચ્છના રણમાં જોવા મળે છે, કાળિયાર (C) વેલાવદરમાં પણ જોવા મળે છે પરંતુ મુખ્ય ઉદ્દેશ્ય સિંહનું સંરક્ષણ છે, અને ગીધ (D) માટે અલગ સંરક્ષણ પ્રયાસો ચાલે છે.", "ref": "Std 12 - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "આંતરિક સંરક્ષણના સંદર્ભમાં, 'રામસર સાઇટ' અને 'બાયોસ્ફિયર રિઝર્વ' વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["રામસર સાઇટ ફક્ત જળચર જૈવવિવિધતાનું સંરક્ષણ કરે છે, જ્યારે બાયોસ્ફિયર રિઝર્વ સ્થળીય અને જળીય બંનેનું સંરક્ષણ કરે છે", "રામસર સાઇટ અંતરરાષ્ટ્રીય સ્તરે માન્યતા પ્રાપ્ત છે, જ્યારે બાયોસ્ફિયર રિઝર્વ ફક્ત રાષ્ટ્રીય સ્તરે માન્યતા પ્રાપ્ત છે", "રામસર સાઇટમાં માનવીય ક્રિયાકલાપો પર પૂર્ણ પ્રતિબંધ છે, જ્યારે બાયોસ્ફિયર રિઝર્વમાં મર્યાદિત ક્રિયાકલાપોની પરવાનગી છે", "રામસર સાઇટ ફક્ત પક્ષીઓના સંરક્ષણ માટે છે, જ્યારે બાયોસ્ફિયર રિઝર્વ સસ્તન પ્રાણીઓ માટે છે"], "ans": 0, "exp": "રામસર સાઇટનો મુખ્ય ઉદ્દેશ્ય જળચર જૈવવિવિધતાનું સંરક્ષણ છે, જ્યારે બાયોસ્ફિયર રિઝર્વ સ્થળીય અને જળીય બંને પર્યાવરણનું સંરક્ષણ કરે છે. રામસર સાઇટ અને બાયોસ્ફિયર રિઝર્વ બંને અંતરરાષ્ટ્રીય માન્યતા ધરાવે છે (B ખોટું), માનવીય ક્રિયાકલાપો પરના પ્રતિબંધો બંનેમાં અલગ-અલગ હોય છે (C અપૂર્ણ), અને રામસર સાઇટ ફક્ત પક્ષીઓ માટે નથી (D ખોટું).", "ref": "Std 12 - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "ગુજરાતમાં આવેલું 'પોરબંદર પક્ષી અભયારણ્ય' કયા પ્રકારના આંતરિક સંરક્ષણનું ઉદાહરણ છે, જ્યાં મુખ્યત્વે કયા પ્રકારના પક્ષીઓનું સંરક્ષણ કરવામાં આવે છે?", "opts": ["સ્થળીય પક્ષીઓ અને શિકારી પક્ષીઓ", "જળચર પક્ષીઓ અને પ્રવાસી પક્ષીઓ", "રાત્રિચર પક્ષીઓ અને ગુફામાં રહેતા પક્ષીઓ", "પર્વતીય પક્ષીઓ અને ઉચ્ચ ઉંચાઈએ રહેતા પક્ષીઓ"], "ans": 1, "exp": "પોરબંદર પક્ષી અભયારણ્ય મુખ્યત્વે જળચર અને પ્રવાસી પક્ષીઓના સંરક્ષણ માટે જાણીતું છે, જેમાં ઘણા પ્રવાસી પક્ષીઓ શિયાળામાં આશ્રય લે છે. સ્થળીય પક્ષીઓ (A), રાત્રિચર પક્ષીઓ (C), અને પર્વતીય પક્ષીઓ (D) આ અભયારણ્યના મુખ્ય લક્ષ્ય નથી.", "ref": "Std 12 - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન 'જૈવમંડળ રિઝર્વ'ની 'ટ્રાન્ઝિશન ઝોન' વિશે ખોટું છે?", "opts": ["આ ઝોનમાં કૃષિ અને અન્ય આર્થિક ક્રિયાઓની પરવાનગી આપવામાં આવે છે.", "આ ઝોનમાં વૈજ્ઞાનિક સંશોધન અને શિક્ષણ ક્રિયાઓ થાય છે.", "આ ઝોનમાં સ્થાનિક સમુદાયોની સક્રિય ભાગીદારી હોય છે.", "આ ઝોનમાં વન્યજીવોનું સંપૂર્ણ રક્ષણ કરવામાં આવે છે."], "ans": 3, "exp": "ટ્રાન્ઝિશન ઝોનમાં વન્યજીવોનું સંપૂર્ણ રક્ષણ કરવામાં આવતું નથી. આ ઝોનમાં કૃષિ, આર્થિક ક્રિયાઓ, વૈજ્ઞાનિક સંશોધન અને સ્થાનિક સમુદાયોની સક્રિય ભાગીદારી હોય છે. સંપૂર્ણ રક્ષણ કોર ઝોનમાં થાય છે.", "ref": "Std 12 - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન 'રામસર સાઇટ' અને 'જૈવમંડળ રિઝર્વ' વચ્ચેના તફાવતને સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["રામસર સાઇટ ફક્ત ભીની જમીનના સંરક્ષણ માટે હોય છે, જ્યારે જૈવમંડળ રિઝર્વ વન્યજીવો અને વનસ્પતિઓનું સંરક્ષણ કરે છે.", "રામસર સાઇટમાં સ્થાનિક સમુદાયોની ભૂમિકા નહીંવત્ હોય છે, જ્યારે જૈવમંડળ રિઝર્વમાં સ્થાનિક સમુદાયોની ભૂમિકા મહત્વપૂર્ણ હોય છે.", "રામસર સાઇટ અંતરરાષ્ટ્રીય સ્તરે ઓળખાય છે, જ્યારે જૈવમંડળ રિઝર્વ રાષ્ટ્રીય સ્તરે ઓળખાય છે.", "રામસર સાઇટમાં કોર ઝોન, બફર ઝોન અને ટ્રાન્ઝિશન ઝોન હોય છે, જ્યારે જૈવમંડળ રિઝર્વમાં આવી વ્યવસ્થા નથી."], "ans": 0, "exp": "રામસર સાઇટ ફક્ત ભીની જમીન (wetlands)ના સંરક્ષણ માટે અંતરરાષ્ટ્રીય સ્તરે ઓળખાય છે, જ્યારે જૈવમંડળ રિઝર્વ વન્યજીવો, વનસ્પતિઓ અને જૈવવિવિધતાનું સંરક્ષણ કરે છે. રામસર સાઇટમાં કોર, બફર અને ટ્રાન્ઝિશન ઝોન નથી હોતાં, જ્યારે જૈવમંડળ રિઝર્વમાં આવી વ્યવસ્થા હોય છે.", "ref": "Std 12 - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "ch": ""}, {"q": "ગુજરાતના 'વેલાવદર રાષ્ટ્રીય ઉદ્યાન'માં આંતરિક સંરક્ષણ હેઠળ સંરક્ષિત થતી 'એશિયાટિક સિંહ'ની વસતી માટે નીચેનામાંથી કયું વિધાન સૌથી યોગ્ય રીતે લાગુ પડે છે?", "opts": ["આ વસતી 'કોર ઝોન'માં રહે છે જ્યાં માનવીની પ્રવૃત્તિઓ પર પૂર્ણપણે પ્રતિબંધ છે અને પ્રાકૃતિક પસંદગી દ્વારા ઉત્ક્રાંતિ થાય છે.", "આ વસતી 'બફર ઝોન'માં રહે છે જ્યાં મર્યાદિત પર્યટન અને સંશોધન કામગીરીની પરવાનગી આપવામાં આવે છે.", "આ વસતી 'ટ્રાન્ઝિશન ઝોન'માં રહે છે જ્યાં સ્થાનિક સમુદાયો સાથે સહ-વ્યવસ્થાપન થાય છે.", "આ વસતી 'રામસર સાઇટ' હેઠળ સંરક્ષિત છે જ્યાં ઓછા પાણીવાળા ભીના ક્ષેત્રોનું સંરક્ષણ થાય છે."], "ans": 0, "exp": "વેલાવદર રાષ્ટ્રીય ઉદ્યાનમાં 'એશિયાટિક સિંહ'ની વસતી 'કોર ઝોન'માં રહે છે, જ્યાં માનવીની પ્રવૃત્તિઓ પર પૂર્ણપણે પ્રતિબંધ હોય છે અને પ્રાકૃતિક પસંદગી દ્વારા ઉત્ક્રાંતિ થાય છે. બફર ઝોનમાં મર્યાદિત પ્રવૃત્તિઓની પરવાનગી હોય છે, ટ્રાન્ઝિશન ઝોનમાં સ્થાનિક સમુદાયો સાથે સહ-વ્યવસ્થાપન થાય છે, જ્યારે રામસર સાઇટ ઓછા પાણીવાળા ભીના ક્ષેત્રોના સંરક્ષણ સાથે સંબંધિત છે.", "ref": "Std 12 - અધ્યાય 15: જૈવ-વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "ગુજરાતમાં 'કચ્છના રણ'માં આવેલા 'ઇન્ડિયન વાઇલ્ડ એસ'ના આંતરિક સંરક્ષણ માટે નીચેનામાંથી કયું કૃત્ય 'જૈવમંડળ રિઝર્વ'ની 'ટ્રાન્ઝિશન ઝોન'માં અનુમાનિત રીતે પરવાનગી આપવામાં આવે છે?", "opts": ["વન્યજીવોનું શિકાર કરવું", "સ્થાનિક સમુદાયો દ્વારા પરંપરાગત કૃષિ અને પશુપાલન", "ઉદ્યોગિક કામગીરી અને ખાણકામ", "વન્યજીવોના પ્રજનન માટે કૃત્રિમ વાતાવરણ ઉભું કરવું"], "ans": 1, "exp": "'જૈવમંડળ રિઝર્વ'ની 'ટ્રાન્ઝિશન ઝોન'માં સ્થાનિક સમુદાયો દ્વારા પરંપરાગત કૃષિ અને પશુપાલન જેવી કામગીરીની પરવાનગી આપવામાં આવે છે. શિકાર કરવું, ઉદ્યોગિક કામગીરી અને કૃત્રિમ વાતાવરણ ઉભું કરવું એવી પ્રવૃત્તિઓ અનુમાનિત રીતે પ્રતિબંધિત હોય છે.", "ref": "Std 12 - અધ્યાય 15: જૈવ-વૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન 'રાષ્ટ્રીય ઉદ્યાન' અને 'જૈવમંડળ રિઝર્વ' વચ્ચેના તફાવતને સૌથી યોગ્ય રીતે દર્શાવે છે?", "opts": ["રાષ્ટ્રીય ઉદ્યાનમાં માત્ર વન્યજીવોનું સંરક્ષણ થાય છે જ્યારે જૈવમંડળ રિઝર્વમાં માત્ર વનસ્પતિઓનું સંરક્ષણ થાય છે.", "રાષ્ટ્રીય ઉદ્યાનમાં માનવીની પ્રવૃત્તિઓ પર પૂર્ણપણે પ્રતિબંધ હોય છે જ્યારે જૈવમંડળ રિઝર્વમાં ત્રણ ઝોન (કોર, બફર, ટ્રાન્ઝિશન) હોય છે જ્યાં વિવિધ પ્રકારની પ્રવૃત્તિઓની પરવાનગી આપવામાં આવે છે.", "રાષ્ટ્રીય ઉદ્યાનમાં સ્થાનિક સમુદાયોની ભાગીદારી હોય છે જ્યારે જૈવમંડળ રિઝર્વમાં સ્થાનિક સમુદાયોની ભાગીદારી નથી.", "રાષ્ટ્રીય ઉદ્યાન અને જૈવમંડળ રિઝર્વ વચ્ચે કોઈ તફાવત નથી, બંનેમાં એકસરખી પ્રવૃત્તિઓની પરવાનગી આપવામાં આવે છે."], "ans": 1, "exp": "રાષ્ટ્રીય ઉદ્યાનમાં માનવીની પ્રવૃત્તિઓ પર પૂર્ણપણે પ્રતિબંધ હોય છે જ્યારે જૈવમંડળ રિઝર્વમાં ત્રણ ઝોન (કોર, બફર, ટ્રાન્ઝિશન) હોય છે જ્યાં વિવિધ પ્રકારની પ્રવૃત્તિઓની પરવાનગી આપવામાં આવે છે. રાષ્ટ્રીય ઉદ્યાનમાં વન્યજીવો અને વનસ્પતિઓ બંનેમાંનું સંરક્ષણ થાય છે, જૈવમંડળ રિઝર્વમાં સ્થાનિક સમુદાયોની ભાગીદારી હોય છે, અને બંનેમાં તફાવત છે.", "ref": "Std 12 - અધ્યાય 15: જૈવ-વૈવિધ્ય અને સંરક્ષણ", "ch": ""}];

function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
