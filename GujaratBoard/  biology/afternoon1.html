<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>દારૂ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>દારૂ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">દારૂ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક વિદ્યાર્થીએ દારૂના સેવનથી થતી અસરોનો અભ્યાસ કર્યો અને નોંધ્યું કે દારૂના સતત સેવનથી યકૃતના કોષોમાં ચરબીનું પ્રમાણ વધે છે. આ ઘટનાને શું કહે છે?", "opts": ["સ્ટીટોસિસ", "સિરોસિસ", "હિપેટાઇટિસ", "ફાઇબ્રોસિસ"], "ans": 0, "exp": "સ્ટીટોસિસ એ યકૃતના કોષોમાં ચરબીનું અસામાન્ય સંચય છે, જે દારૂના સેવનથી થાય છે. સિરોસિસમાં યકૃતના કોષોનું કાયમી નુકસાન થાય છે, હિપેટાઇટિસ એ યકૃતની બળતરા છે, અને ફાઇબ્રોસિસમાં યકૃતમાં ડાઘ પેશી બને છે. દારૂના પ્રારંભિક તબક્કામાં સ્ટીટોસિસ જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "દારૂનું વધુ પડતું સેવન કરવાથી મગજના કયા ભાગ પર સૌથી વધુ અસર થાય છે, જેના કારણે સંતુલન અને સંકલનમાં ખલેલ પડે છે?", "opts": ["મગજનો બહારનો પડ (સેરેબ્રલ કોર્ટેક્સ)", "લઘુમગજ (સેરેબેલમ)", "થેલેમસ", "હાઇપોથેલેમસ"], "ans": 1, "exp": "લઘુમગજ (સેરેબેલમ) શરીરનું સંતુલન અને સ્નાયુઓનું સંકલન જાળવવામાં મુખ્ય ભૂમિકા ભજવે છે. દારૂનું સેવન લઘુમગજની કાર્યક્ષમતા ઘટાડે છે, જેના કારણે ચાલવામાં અને હલનચલનમાં મુશ્કેલી થાય છે. સેરેબ્રલ કોર્ટેક્સ વિચાર અને નિર્ણય લેવામાં, થેલેમસ સંવેદનાઓના પ્રસારણમાં અને હાઇપોથેલેમસ શરીરના આંતરિક વાતાવરણના નિયંત્રણમાં મદદ કરે છે.", "ref": "Std 11 - પ્રકરણ 21: ચેતાકોષો અને ચેતાતંત્ર", "ch": ""}, {"q": "દારૂના સેવનથી શરીરમાં કયા ઉત્સેચકની ક્રિયાશીલતા વધે છે, જે દારૂના ચયાપચયમાં મુખ્ય ભૂમિકા ભજવે છે?", "opts": ["લેક્ટેટ ડિહાઇડ્રોજનેઝ", "આલ્કોહોલ ડિહાઇડ્રોજનેઝ", "એમાઇલેઝ", "લાઇપેઝ"], "ans": 1, "exp": "આલ્કોહોલ ડિહાઇડ્રોજનેઝ એ મુખ્ય ઉત્સેચક છે જે દારૂ (ઇથેનોલ)ને એસિટાલ્ડીહાઇડમાં રૂપાંતરિત કરે છે. લેક્ટેટ ડિહાઇડ્રોજનેઝ લેક્ટિક એસિડના ચયાપચયમાં, એમાઇલેઝ કાર્બોહાઇડ્રેટ્સના પાચનમાં અને લાઇપેઝ ચરબીના પાચનમાં ભાગ લે છે.", "ref": "Std 12 - પ્રકરણ 9: જૈવિક અણુઓ અને ઉત્સેચકો", "ch": ""}, {"q": "દારૂનું સેવન કરવાથી શરીરમાં કયા વિટામિનની ઉણપ સૌથી વધુ જોવા મળે છે, જેના કારણે ચેતાતંત્રને નુકસાન થઈ શકે છે?", "opts": ["વિટામિન A", "વિટામિન B1 (થાઇમિન)", "વિટામિન C", "વિટામિન D"], "ans": 1, "exp": "વિટામિન B1 (થાઇમિન)ની ઉણપ દારૂના સેવનથી સામાન્ય રીતે જોવા મળે છે, જેના કારણે વર્નિકે-કોર્સાકોફ સિન્ડ્રોમ થઈ શકે છે, જે ચેતાતંત્રને ગંભીર નુકસાન પહોંચાડે છે. વિટામિન A આંખના સ્વાસ્થ્ય માટે, વિટામિન C રોગપ્રતિકારક શક્તિ માટે અને વિટામિન D હાડકાંના સ્વાસ્થ્ય માટે જરૂરી છે.", "ref": "Std 12 - પ્રકરણ 10: માનવ કલ્યાણમાં સૂક્ષ્મજીવો", "ch": ""}, {"q": "દારૂનું વધુ પડતું સેવન કરવાથી કયા અંગમાં 'મેલોરી બોડીઝ' નામના પ્રોટીન સંચય જોવા મળે છે, જે તેની કાર્યક્ષમતા ઘટાડે છે?", "opts": ["મગજ", "હૃદય", "યકૃત", "કિડની"], "ans": 2, "exp": "મેલોરી બોડીઝ એ યકૃતના કોષોમાં જોવા મળતા પ્રોટીનના અસામાન્ય સંચય છે, જે દારૂના વધુ પડતા સેવનથી થાય છે. આ યકૃતના કોષોને નુકસાન પહોંચાડે છે અને સિરોસિસ તરફ દોરી જાય છે. મગજ, હૃદય અને કિડનીમાં આવા પ્રોટીન સંચય સામાન્ય રીતે જોવા મળતા નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "દારૂના દીર્ઘકાલીન સેવનથી યકૃતમાં થતી ફેટી લિવરની સ્થિતિમાં, કયા કાર્બોદિત ચયાપચય માર્ગમાં વિક્ષેપ થાય છે, જેના કારણે વસા (ફેટ)નું સંગ્રહણ વધે છે?", "opts": ["ગ્લાયકોલિસિસ", "ગ્લુકોનિયોજેનેસિસ", "ક્રેબ્સ ચક્ર", "પેન્ટોઝ ફોસ્ફેટ માર્ગ"], "ans": 1, "exp": "દારૂના ચયાપચયથી એસિટલ-કોએ (Acetyl-CoA)નું પ્રમાણ વધે છે, જે ગ્લુકોનિયોજેનેસિસ માર્ગને અવરોધે છે. આના કારણે ગ્લુકોઝનું સંગઠન ઘટે છે અને વસા (ફેટ)નું સંગ્રહણ વધે છે, જે ફેટી લિવર તરફ દોરી જાય છે. ગ્લાયકોલિસિસ (A), ક્રેબ્સ ચક્ર (C), અને પેન્ટોઝ ફોસ્ફેટ માર્ગ (D) દારૂના ચયાપચયથી સીધી અસર પામતા નથી.", "ref": "Std 12 - Chapter 16: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "દારૂના સેવનથી મગજમાં ગાબા (GABA) રિસેપ્ટર્સની ક્રિયાશીલતામાં થતો ફેરફાર કયા ન્યુરોટ્રાન્સમિટરની અસરને વધારે છે, જેના કારણે શાંતિ અને નિષ્ક્રિયતા અનુભવાય છે?", "opts": ["ડોપામીન", "સેરોટોનિન", "ગ્લુટામેટ", "એસિટિલકોલીન"], "ans": 0, "exp": "દારૂ ગાબા (GABA) રિસેપ્ટર્સની ક્રિયાશીલતા વધારે છે, જેના કારણે ક્લોરાઇડ આયનના પ્રવાહમાં વધારો થાય છે અને ન્યુરોનની ઉત્તેજના ઘટે છે. આ પ્રક્રિયા ડોપામીન (A)ની અસરને વધારે છે, જે શાંતિ અને નિષ્ક્રિયતાનું કારણ બને છે. સેરોટોનિન (B), ગ્લુટામેટ (C), અને એસિટિલકોલીન (D)ની અસર દારૂના સેવનથી સીધી રીતે વધતી નથી.", "ref": "Std 12 - Chapter 21: ચેતાતંત્ર અને તેની ક્રિયા", "ch": ""}, {"q": "દારૂના વધુ પડતા સેવનથી શરીરમાં કયા હોર્મોનના સ્તરમાં ઘટાડો થાય છે, જેના કારણે પુરુષોમાં સેક્સ હોર્મોનની અસંતુલન અને સ્ત્રીઓમાં મેનોપોઝ જેવી લક્ષણો દેખાય છે?", "opts": ["ઇન્સ્યુલિન", "ટેસ્ટોસ્ટેરોન", "થાયરોક્સિન", "કોર્ટિસોલ"], "ans": 1, "exp": "દારૂના દીર્ઘકાલીન સેવનથી ટેસ્ટોસ્ટેરોન (B)ના સ્તરમાં ઘટાડો થાય છે, જેના કારણે પુરુષોમાં સેક્સ હોર્મોનની અસંતુલન અને સ્ત્રીઓમાં મેનોપોઝ જેવી લક્ષણો દેખાય છે. ઇન્સ્યુલિન (A), થાયરોક્સિન (C), અને કોર્ટિસોલ (D)ના સ્તરમાં દારૂના સેવનથી સીધી અસર પડતી નથી.", "ref": "Std 12 - Chapter 22: હોર્મોનલ સંકલન અને એન્ડોક્રાઇન ગ્લેન્ડ્સ", "ch": ""}, {"q": "દારૂના ચયાપચય દરમિયાન ઉત્પન્ન થતો એસિટલડિહાઇડ કયા પ્રોટીન સાથે પ્રક્રિયા કરે છે, જેના કારણે કોષના સાયટોસ્કેલેટનમાં વિક્ષેપ ઉભો થાય છે અને યકૃત કોષોની ક્ષતિ થાય છે?", "opts": ["ટ્યુબ્યુલિન", "એક્ટિન", "માયોસિન", "કેરેટિન"], "ans": 0, "exp": "એસિટલડિહાઇડ ટ્યુબ્યુલિન (A) પ્રોટીન સાથે પ્રક્રિયા કરે છે, જેના કારણે કોષના સાયટોસ્કેલેટનમાં વિક્ષેપ ઉભો થાય છે અને યકૃત કોષોની ક્ષતિ થાય છે. એક્ટિન (B), માયોસિન (C), અને કેરેટિન (D) એસિટલડિહાઇડ સાથે પ્રક્રિયા કરતા નથી.", "ref": "Std 12 - Chapter 16: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "દારૂના સેવનથી શરીરમાં કયા વિટામિનની ઉણપ થવાથી 'વર્નિકે-કોર્સાકોફ સિન્ડ્રોમ' નામની ન્યુરોલોજિકલ સ્થિતિ ઉભી થાય છે, જેમાં સ્મરણશક્તિ અને સંકલનમાં ખલેલ પડે છે?", "opts": ["વિટામિન A", "વિટામિન B1 (થાયમીન)", "વિટામિન C", "વિટામિન D"], "ans": 1, "exp": "'વર્નિકે-કોર્સાકોફ સિન્ડ્રોમ' વિટામિન B1 (થાયમીન) (B)ની ઉણપથી થાય છે, જે દારૂના સેવનથી શરીરમાં ઘટે છે. આ સ્થિતિમાં સ્મરણશક્તિ અને સંકલનમાં ખલેલ પડે છે. વિટામિન A (A), વિટામિન C (C), અને વિટામિન D (D)ની ઉણપથી આ સ્થિતિ ઉભી થતી નથી.", "ref": "Std 12 - Chapter 16: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "દારૂના દીર્ઘકાલીન સેવનથી યકૃતમાં થતી ફાઇબ્રોસિસમાં, કયા કોષોની સક્રિયતા વધીને કોલેજનના ઉત્પાદનમાં વધારો થાય છે?", "opts": ["હેપેટોસાઇટ્સ", "ક્યુપ્ફર કોષો", "સ્ટેલેટ કોષો", "એન્ડોથેલિયલ કોષો"], "ans": 2, "exp": "સ્ટેલેટ કોષો (Stellate cells) યકૃતમાં સંવેદનશીલ કોષો છે જે ફાઇબ્રોજેનિક પ્રક્રિયામાં મુખ્ય ભૂમિકા ભજવે છે. દારૂના દીર્ઘકાલીન સેવનથી આ કોષો સક્રિય થઈને કોલેજનનું ઉત્પાદન વધારે છે, જે ફાઇબ્રોસિસ તરફ દોરી જાય છે. હેપેટોસાઇટ્સ યકૃતના મુખ્ય કોષો છે પરંતુ તેઓ કોલેજન ઉત્પન્ન કરતા નથી. ક્યુપ્ફર કોષો મેક્રોફેજની ભૂમિકા ભજવે છે, જ્યારે એન્ડોથેલિયલ કોષો રક્તવાહિનીઓની અંદરની પરત છે.", "ref": "Std 12 - Chapter 16: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "દારૂના ચયાપચય દરમિયાન એસિટલડિહાઇડનું ઓક્સીડેશન એસિટેટમાં થાય છે, આ પ્રક્રિયામાં કયો કોફેક્ટર સહભાગી થાય છે?", "opts": ["NAD+", "FAD", "NADP+", "CoA"], "ans": 0, "exp": "એસિટલડિહાઇડ ડિહાઇડ્રોજિનેઝ ઉત્સેચક દ્વારા એસિટલડિહાઇડનું એસિટેટમાં ઓક્સીડેશન થાય છે, જેમાં NAD+ કોફેક્ટર તરીકે કામ કરે છે અને NAD+ નું ઘટન (Reduction) થઈને NADH બને છે. FAD અને NADP+ આ પ્રક્રિયામાં સહભાગી નથી, જ્યારે CoA એસિટેટને એસિટાઇલ-CoAમાં રૂપાંતરિત કરવામાં સહાય કરે છે પરંતુ ઓક્સીડેશન પ્રક્રિયામાં નહીં.", "ref": "Std 12 - Chapter 9: ચયાપચય", "ch": ""}, {"q": "દારૂના સેવનથી મગજમાં ડોપામિનના સ્તરમાં થતો વધારો કયા ન્યુરોટ્રાન્સમિટર સિસ્ટમની અસરને વધુ પ્રબળ બનાવે છે?", "opts": ["સેરોટોનિન", "ગ્લુટામેટ", "એસિટાઇલકોલિન", "એન્કેફાલિન"], "ans": 0, "exp": "દારૂના સેવનથી ડોપામિનના સ્તરમાં વધારો થાય છે, જે મગજના રિવોર્ડ પાથવેમાં સેરોટોનિન સિસ્ટમની અસરને વધુ પ્રબળ બનાવે છે. ગ્લુટામેટ એક ઉત્તેજક ન્યુરોટ્રાન્સમિટર છે, એસિટાઇલકોલિન મેમરી અને મસલ કન્ટ્રોલમાં મહત્વનો છે, જ્યારે એન્કેફાલિન દર્દ નિયંત્રણમાં ભૂમિકા ભજવે છે.", "ref": "Std 12 - Chapter 21: ચેતાતંત્ર અને તેની ક્રિયા", "ch": ""}, {"q": "દારૂના દીર્ઘકાલીન સેવનથી યકૃતમાં થતી સ્ટીટોહેપેટાઇટિસમાં, કયા જનીનની અભિવ્યક્તિમાં વધારો થવાથી લિપિડ ચયાપચય અસંતુલિત થાય છે?", "opts": ["TNF-α", "IL-6", "PPAR-α", "CYP2E1"], "ans": 3, "exp": "CYP2E1 જનીન યકૃતમાં દારૂના ચયાપચયમાં મુખ્ય ભૂમિકા ભજવે છે. દારૂના દીર્ઘકાલીન સેવનથી આ જનીનની અભિવ્યક્તિમાં વધારો થાય છે, જે લિપિડ ચયાપચયને અસર કરે છે અને સ્ટીટોહેપેટાઇટિસ તરફ દોરી જાય છે. TNF-α અને IL-6 પ્રોઇન્ફ્લેમેટરી સાયટોકાઇન્સ છે, જ્યારે PPAR-α લિપિડ ચયાપચયના નિયમનમાં ભૂમિકા ભજવે છે પરંતુ સ્ટીટોહેપેટાઇટિસમાં મુખ્ય કારણ નથી.", "ref": "Std 12 - Chapter 16: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "દારૂના સેવનથી શરીરમાં થતી ઓક્સીડેટિવ તણાવની અસરને રોકવા માટે કયા એન્ટીઓક્સીડન્ટ ઉત્સેચકની ક્રિયાશીલતામાં ઘટાડો થાય છે?", "opts": ["સુપરઓક્સાઇડ ડિસ્મ્યુટેઝ (SOD)", "કેટાલેઝ", "ગ્લુટાથિયોન પેરોક્સિડેઝ", "ગ્લુટાથિયોન રિડક્ટેઝ"], "ans": 2, "exp": "દારૂના સેવનથી શરીરમાં ઓક્સીડેટિવ તણાવ વધે છે, જે ગ્લુટાથિયોન પેરોક્સિડેઝ ઉત્સેચકની ક્રિયાશીલતામાં ઘટાડો કરે છે. આ ઉત્સેચક હાઇડ્રોજન પેરોક્સાઇડને પાણીમાં રૂપાંતરિત કરવામાં મહત્વનો છે. સુપરઓક્સાઇડ ડિસ્મ્યુટેઝ (SOD) સુપરઓક્સાઇડ રેડિકલ્સને ડિસ્મ્યુટ કરે છે, કેટાલેઝ હાઇડ્રોજન પેરોક્સાઇડને પાણી અને ઓક્સિજનમાં તોડે છે, જ્યારે ગ્લુટાથિયોન રિડક્ટેઝ ગ્લુટાથિયોનને તેની ઘટનાવસ્થામાં પુનઃસ્થાપિત કરે છે.", "ref": "Std 12 - Chapter 9: ચયાપચય", "ch": ""}, {"q": "દારૂના દીર્ઘકાલીન સેવનથી યકૃતમાં થતી સાયટોક્રોમ P450 2E1 (CYP2E1) ઉત્સેચકની અભિવ્યક્તિમાં વધારો થવાથી કયા પદાર્થનો ચયાપચય વધુ વેગવંતી બને છે, જેના કારણે ઓક્સીડેટિવ તણાવમાં વધારો થાય છે?", "opts": ["એસિટલડિહાઇડ", "ઇથેનોલ", "એસિટેટ", "ગ્લુકોઝ"], "ans": 1, "exp": "સાયટોક્રોમ P450 2E1 (CYP2E1) ઉત્સેચક ઇથેનોલ (દારૂ)ના ચયાપચયમાં મુખ્ય ભૂમિકા ભજવે છે. દારૂના દીર્ઘકાલીન સેવનથી આ ઉત્સેચકની અભિવ્યક્તિ વધે છે, જેના કારણે ઇથેનોલનો ચયાપચય વધુ વેગવંતી બને છે અને એસિટલડિહાઇડ જેવા વિષાક્ત પદાર્થોનું ઉત્પાદન વધે છે, જે ઓક્સીડેટિવ તણાવમાં વધારો કરે છે. એસિટલડિહાઇડ (A) તો CYP2E1 દ્વારા ઉત્પન્ન થાય છે, પરંતુ પ્રશ્ન ઇથેનોલના ચયાપચય વિશે છે. એસિટેટ (C) અને ગ્લુકોઝ (D) આ પ્રક્રિયામાં સીધી રીતે સંડોવાયેલા નથી.", "ref": "Std 12 - Chapter 16: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "દારૂના સેવનથી મગજમાં થતી ન્યુરોજેનેસિસ (નવા ન્યુરોનની રચના) પર કયા હોર્મોનની અસર ઘટવાથી મગજના હિપોકેમ્પસ ભાગમાં સ્મૃતિ અને શીખવાની ક્ષમતામાં ઘટાડો થાય છે?", "opts": ["કોર્ટિસોલ", "બ્રેઇન-ડેરિવ્ડ ન્યુરોટ્રોફિક ફેક્ટર (BDNF)", "ઇન્સ્યુલિન", "થાયરોક્સિન"], "ans": 1, "exp": "દારૂના સેવનથી મગજમાં બ્રેઇન-ડેરિવ્ડ ન્યુરોટ્રોફિક ફેક્ટર (BDNF) ના સ્તરમાં ઘટાડો થાય છે, જે ન્યુરોજેનેસિસ માટે જરૂરી છે. આના કારણે હિપોકેમ્પસમાં નવા ન્યુરોનની રચના ઘટે છે, જે સ્મૃતિ અને શીખવાની ક્ષમતાને અસર કરે છે. કોર્ટિસોલ (A) તણાવ હોર્મોન છે અને તેની અસર વિરુદ્ધ દિશામાં હોય છે. ઇન્સ્યુલિન (C) અને થાયરોક્સિન (D) ન્યુરોજેનેસિસ સાથે સીધા સંબંધ ધરાવતા નથી.", "ref": "Std 12 - Chapter 21: ચેતાતંત્ર અને રસાયણિક સંકેતવહન", "ch": ""}, {"q": "દારૂના ચયાપચય દરમિયાન ઉત્પન્ન થતો એસિટલડિહાઇડ કયા કોષીય ઘટક સાથે પ્રક્રિયા કરે છે, જેના કારણે પ્રોટીનની કાર્યક્ષમતામાં ઘટાડો અને કોષીય ક્ષતિ થાય છે?", "opts": ["DNA", "RNA", "લિપિડ", "પ્રોટીનની -SH (થાયોલ) જૂથ"], "ans": 3, "exp": "એસિટલડિહાઇડ પ્રોટીનની -SH (થાયોલ) જૂથ સાથે પ્રક્રિયા કરે છે, જેના કારણે પ્રોટીનની કાર્યક્ષમતામાં ઘટાડો અને કોષીય ક્ષતિ થાય છે. આ પ્રક્રિયા પ્રોટીનની સંરચનામાં ફેરફાર કરે છે અને તેની ક્રિયાશીલતાને અસર કરે છે. DNA (A), RNA (B), અને લિપિડ (C) સાથે એસિટલડિહાઇડની પ્રક્રિયા ઓછી સીધી અસર કરે છે.", "ref": "Std 12 - Chapter 16: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "દારૂના દીર્ઘકાલીન સેવનથી યકૃતમાં થતી માઇટોકોન્ડ્રિયલ ડિસફંક્શનમાં, કયા ઉત્સેચકના ક્રિયાશીલ સ્વરૂપમાં ઘટાડો થવાથી એટીપી (ATP) ઉત્પાદનમાં ઘટાડો થાય છે?", "opts": ["સાયટોક્રોમ ઓક્સિડેઝ", "લેક્ટેટ ડિહાઇડ્રોજિનેઝ", "એલ્કોહોલ ડિહાઇડ્રોજિનેઝ", "ગ્લુકોઝ-6-ફોસ્ફેટેઝ"], "ans": 0, "exp": "માઇટોકોન્ડ્રિયલ ડિસફંક્શનમાં સાયટોક્રોમ ઓક્સિડેઝ ઉત્સેચકના ક્રિયાશીલ સ્વરૂપમાં ઘટાડો થાય છે, જે ઇલેક્ટ્રોન ટ્રાન્સપોર્ટ ચેઇનની અંતિમ પ્રક્રિયા છે અને એટીપી (ATP) ઉત્પાદન માટે જરૂરી છે. લેક્ટેટ ડિહાઇડ્રોજિનેઝ (B) ગ્લાયકોલિસિસ સાથે સંબંધિત છે, એલ્કોહોલ ડિહાઇડ્રોજિનેઝ (C) દારૂના ચયાપચયમાં સંડોવાયેલ છે, અને ગ્લુકોઝ-6-ફોસ્ફેટેઝ (D) ગ્લુકોઝ ચયાપચયમાં ભૂમિકા ભજવે છે.", "ref": "Std 12 - Chapter 14: શ્વસન અને ઉર્જા ચયાપચય", "ch": ""}, {"q": "દારૂના સેવનથી શરીરમાં થતી ઇમ્યુન સિસ્ટમની નબળાઈમાં, કયા પ્રતિરક્ષા કોષોની સંખ્યામાં ઘટાડો થવાથી સંક્રમણ પ્રત્યે સંવેદનશીલતા વધે છે?", "opts": ["ટી-લિમ્ફોસાઇટ્સ", "રેડ બ્લડ સેલ્સ", "પ્લેટલેટ્સ", "ન્યૂટ્રોફિલ્સ"], "ans": 0, "exp": "દારૂના સેવનથી ટી-લિમ્ફોસાઇટ્સ (T-લિમ્ફોસાઇટ્સ)ની સંખ્યામાં ઘટાડો થાય છે, જે ઇમ્યુન સિસ્ટમની કાર્યક્ષમતાને અસર કરે છે અને સંક્રમણ પ્રત્યે સંવેદનશીલતા વધારે છે. રેડ બ્લડ સેલ્સ (B) અને પ્લેટલેટ્સ (C) પ્રતિરક્ષા સાથે સીધા સંબંધ ધરાવતા નથી, જ્યારે ન્યૂટ્રોફિલ્સ (D) ઇનેટ ઇમ્યુનિટીમાં ભૂમિકા ભજવે છે, પરંતુ ટી-લિમ્ફોસાઇટ્સ એડેપ્ટિવ ઇમ્યુનિટી માટે મહત્વપૂર્ણ છે.", "ref": "Std 12 - Chapter 15: પ્રતિરક્ષાતંત્ર અને રોગપ્રતિકારક શક્તિ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
