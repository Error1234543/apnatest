<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recombination</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Recombination</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Recombination</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "હોમોલોગસ ક્રોમોઝોમ્સ વચ્ચે ક્રોસિંગ ઓવર દરમિયાન કયા ઉત્સેચકની ભૂમિકા મહત્વપૂર્ણ હોય છે?", "opts": ["DNA પોલિમરેઝ", "રેકોમ્બિનેઝ", "હેલિકેઝ", "લાયગેઝ"], "ans": 1, "exp": "રેકોમ્બિનેઝ ઉત્સેચક હોમોલોગસ ક્રોમોઝોમ્સ વચ્ચે ક્રોસિંગ ઓવર દરમિયાન DNAના સ્ટ્રેન્ડ્સને તોડીને અને જોડીને રિકોમ્બિનેશનને સહાય કરે છે. DNA પોલિમરેઝ DNAની નકલ કરવામાં મદદ કરે છે, હેલિકેઝ DNAને અનવાઇન્ડ કરે છે, અને લાયગેઝ DNAના સ્ટ્રેન્ડ્સને જોડે છે પરંતુ ક્રોસિંગ ઓવરમાં નહીં.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "જનીન રિકોમ્બિનેશન દરમિયાન કયા તબક્કે ક્રોસિંગ ઓવર થાય છે?", "opts": ["પ્રોફેઝ I", "મેટાફેઝ I", "એનાફેઝ I", "ટેલોફેઝ I"], "ans": 0, "exp": "ક્રોસિંગ ઓવર મિયોસિસના પ્રોફેઝ I તબક્કે, ખાસ કરીને પેકીટીન સબ-તબક્કે થાય છે. મેટાફેઝ I, એનાફેઝ I, અને ટેલોફેઝ I દરમિયાન ક્રોસિંગ ઓવર થતું નથી.", "ref": "Std 12 - અધ્યાય 4: કોષ વિભાજન", "ch": ""}, {"q": "રિકોમ્બિનેશનની ક્રિયાવિધિમાં કયા પ્રકારના DNA નુકસાનને દૂર કરવા માટે મિસમેચ રિપેર થાય છે?", "opts": ["ડબલ-સ્ટ્રેન્ડ બ્રેક", "સિંગલ-સ્ટ્રેન્ડ બ્રેક", "ઓક્સિડેટિવ ડેમેજ", "એલ્કલીન ડેમેજ"], "ans": 0, "exp": "રિકોમ્બિનેશન દરમિયાન ડબલ-સ્ટ્રેન્ડ બ્રેક થાય છે, જેને મિસમેચ રિપેર દ્વારા દૂર કરવામાં આવે છે. સિંગલ-સ્ટ્રેન્ડ બ્રેક, ઓક્સિડેટિવ ડેમેજ, અને એલ્કલીન ડેમેજ રિકોમ્બિનેશન સાથે સીધા સંબંધિત નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક આનુવંશિકતા", "ch": ""}, {"q": "કયા પ્રકારના રિકોમ્બિનેશનમાં બેક્ટેરિયામાં હોરિઝોન્ટલ જીન ટ્રાન્સફર શામેલ હોય છે?", "opts": ["હોમોલોગસ રિકોમ્બિનેશન", "સાઇટ-સ્પેસિફિક રિકોમ્બિનેશન", "ટ્રાન્સપોઝિશન", "કોન્જ્યુગેશન"], "ans": 3, "exp": "કોન્જ્યુગેશન દરમિયાન બેક્ટેરિયામાં હોરિઝોન્ટલ જીન ટ્રાન્સફર થાય છે, જ્યાં એક બેક્ટેરિયમથી બીજામાં જીન ટ્રાન્સફર થાય છે. હોમોલોગસ રિકોમ્બિનેશન, સાઇટ-સ્પેસિફિક રિકોમ્બિનેશન, અને ટ્રાન્સપોઝિશન બેક્ટેરિયલ હોરિઝોન્ટલ જીન ટ્રાન્સફર સાથે સીધા સંબંધિત નથી.", "ref": "Std 12 - અધ્યાય 7: જીવનના વિકાસનો ઇતિહાસ", "ch": ""}, {"q": "રિકોમ્બિનેશન દરમિયાન કયા પ્રોટીન કોમ્પ્લેક્સ દ્વારા હોમોલોગસ ક્રોમોઝોમ્સની જોડી બનાવવામાં આવે છે?", "opts": ["કોહેસિન", "સિનેપ્ટોનેમલ કોમ્પ્લેક્સ", "કાઇનેટોકોર", "સેન્ટ્રોમિયર"], "ans": 1, "exp": "સિનેપ્ટોનેમલ કોમ્પ્લેક્સ હોમોલોગસ ક્રોમોઝોમ્સની જોડી બનાવવામાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે, જે ક્રોસિંગ ઓવરને સહાય કરે છે. કોહેસિન ક્રોમોઝોમ્સને એકસાથે બાંધી રાખે છે, કાઇનેટોકોર ક્રોમોઝોમ્સના હલનચલનમાં મદદ કરે છે, અને સેન્ટ્રોમિયર ક્રોમોઝોમ્સના વિભાજનમાં મદદ કરે છે.", "ref": "Std 12 - અધ્યાય 4: કોષ વિભાજન", "ch": ""}, {"q": "યુકેરિયોટિક કોષોમાં હોમોલોગસ રિકોમ્બિનેશન દરમિયાન, કયા પ્રોટીન કોમ્પ્લેક્સ દ્વારા ડબલ-સ્ટ્રેન્ડ બ્રેક (DSB) ની શરૂઆત થાય છે અને તેની મરામતમાં મદદ કરે છે?", "opts": ["રિકોમ્બિનેઝ (RecA)", "સ્પોઇલેજ (Spo11)", "રેડૅક્ટેઝ (Rad51)", "કોહેસિન (Cohesin)"], "ans": 1, "exp": "સ્પોઇલેજ (Spo11) ઉત્સેચક હોમોલોગસ રિકોમ્બિનેશન દરમિયાન ડબલ-સ્ટ્રેન્ડ બ્રેક (DSB) ની શરૂઆત કરે છે. રિકોમ્બિનેઝ (RecA) પ્રોકેરિયોટ્સમાં જોવા મળે છે, રેડૅક્ટેઝ (Rad51) DSB ની મરામતમાં મદદ કરે છે પરંતુ શરૂઆત કરતું નથી, અને કોહેસિન ક્રોમોઝોમ્સની જોડી બનાવવામાં મદદ કરે છે પરંતુ DSB શરૂ કરતું નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વિકાસ (વિભાગ: જનીન રિકોમ્બિનેશન)", "ch": ""}, {"q": "બેક્ટેરિયામાં, કયા પ્રકારના રિકોમ્બિનેશન દરમિયાન F+ કોષ દ્વારા F- કોષને પ્લાસ્મિડ ટ્રાન્સફર થાય છે?", "opts": ["ટ્રાન્સડક્શન", "કોન્જ્યુગેશન", "ટ્રાન્સફોર્મેશન", "ટ્રાન્સપોઝિશન"], "ans": 1, "exp": "કોન્જ્યુગેશન દરમિયાન F+ કોષ દ્વારા F- કોષને પ્લાસ્મિડ (F-પ્લાસ્મિડ) ટ્રાન્સફર થાય છે. ટ્રાન્સડક્શન બેક્ટેરિયોફેજ દ્વારા DNA ટ્રાન્સફર છે, ટ્રાન્સફોર્મેશન મૃત બેક્ટેરિયા દ્વારા DNA ગ્રહણ કરવું છે, અને ટ્રાન્સપોઝિશન જીનના સ્થાનાંતરણ સાથે સંબંધિત છે.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વિકાસ (વિભાગ: બેક્ટેરિયલ રિકોમ્બિનેશન)", "ch": ""}, {"q": "હોમોલોગસ રિકોમ્બિનેશન દરમિયાન, કયા તબક્કે 'હોલિડે જંકશન' બને છે?", "opts": ["ડબલ-સ્ટ્રેન્ડ બ્રેક (DSB) ની શરૂઆત પહેલાં", "સિંગલ-સ્ટ્રેન્ડ ઇન્વેઝન પછી", "ક્રોસિંગ ઓવર પૂર્ણ થયા પછી", "મિસમેચ રિપેર દરમિયાન"], "ans": 1, "exp": "હોલિડે જંકશન સિંગલ-સ્ટ્રેન્ડ ઇન્વેઝન પછી બને છે, જ્યારે એક સ્ટ્રેન્ડ હોમોલોગસ ક્રોમોઝોમમાં પ્રવેશ કરે છે અને ડબલ-સ્ટ્રેન્ડ ડીએનએ સાથે જોડાય છે. DSB પહેલાં, ક્રોસિંગ ઓવર પૂર્ણ થયા પછી, અથવા મિસમેચ રિપેર દરમિયાન હોલિડે જંકશન બનતું નથી.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વિકાસ (વિભાગ: હોમોલોગસ રિકોમ્બિનેશન)", "ch": ""}, {"q": "કયા પ્રકારના રિકોમ્બિનેશનમાં, રિકોમ્બિનેશન હોટસ્પોટ્સ (Recombination Hotspots) ની ભૂમિકા મહત્વપૂર્ણ હોય છે?", "opts": ["સાઇટ-સ્પેસિફિક રિકોમ્બિનેશન", "હોમોલોગસ રિકોમ્બિનેશન", "ટ્રાન્સપોઝિશન", "ઇલિજિટિમેટ રિકોમ્બિનેશન"], "ans": 1, "exp": "હોમોલોગસ રિકોમ્બિનેશનમાં રિકોમ્બિનેશન હોટસ્પોટ્સ મહત્વપૂર્ણ ભૂમિકા ભજવે છે, જ્યાં ક્રોસિંગ ઓવરની શક્યતા વધુ હોય છે. સાઇટ-સ્પેસિફિક રિકોમ્બિનેશન સ્પષ્ટ સ્થાનો પર થાય છે, ટ્રાન્સપોઝિશન જીનના સ્થાનાંતરણ સાથે સંબંધિત છે, અને ઇલિજિટિમેટ રિકોમ્બિનેશન હોમોલોજી વગર થાય છે.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વિકાસ (વિભાગ: હોમોલોગસ રિકોમ્બિનેશન)", "ch": ""}, {"q": "રિકોમ્બિનેશન દરમિયાન, કયા પ્રોટીન કોમ્પ્લેક્સ દ્વારા 'સિનેપ્ટોનેમલ કોમ્પ્લેક્સ' નું નિર્માણ થાય છે, જે હોમોલોગસ ક્રોમોઝોમ્સની જોડી બનાવવામાં મદદ કરે છે?", "opts": ["રિકોમ્બિનેઝ (RecA)", "સ્પોઇલેજ (Spo11)", "કોહેસિન અને કોન્ડેન્સિન", "રેડૅક્ટેઝ (Rad51)"], "ans": 2, "exp": "સિનેપ્ટોનેમલ કોમ્પ્લેક્સનું નિર્માણ કોહેસિન અને કોન્ડેન્સિન પ્રોટીન કોમ્પ્લેક્સ દ્વારા થાય છે, જે હોમોલોગસ ક્રોમોઝોમ્સની જોડી બનાવવામાં મદદ કરે છે. રિકોમ્બિનેઝ (RecA) અને રેડૅક્ટેઝ (Rad51) DSB મરામતમાં મદદ કરે છે, જ્યારે સ્પોઇલેજ (Spo11) DSB ની શરૂઆત કરે છે.", "ref": "Std 12 - અધ્યાય 5: વંશાવળી અને વિકાસ (વિભાગ: હોમોલોગસ રિકોમ્બિનેશન)", "ch": ""}, {"q": "હોમોલોગસ રિકોમ્બિનેશન દરમિયાન, 'ડબલ-સ્ટ્રેન્ડ બ્રેક (DSB)' ની મારફતે કયા પ્રોટીન કોમ્પ્લેક્સ દ્વારા DNA ની કટોકટી સંકેતન (signaling) થાય છે અને તે પછી કયા ઉત્સેચક દ્વારા DSB ની મારફતે 3' OH સરળ અંતો તૈયાર થાય છે?", "opts": ["ATM/ATR કોમ્પ્લેક્સ અને SPO11 ઉત્સેચક", "MRX કોમ્પ્લેક્સ અને SPO11 ઉત્સેચક", "ATM/ATR કોમ્પ્લેક્સ અને MRE11-RAD50-XRS2 ઉત્સેચક", "SCF કોમ્પ્લેક્સ અને RAD51 ઉત્સેચક"], "ans": 2, "exp": "ATM/ATR કોમ્પ્લેક્સ DNA ની કટોકટી સંકેતન માટે જવાબદાર હોય છે, જ્યારે MRE11-RAD50-XRS2 (MRX કોમ્પ્લેક્સ) ઉત્સેચક દ્વારા DSB ની મારફતે 3' OH સરળ અંતો તૈયાર થાય છે. A વિકલ્પમાં SPO11 ઉત્સેચક DSB નું નિર્માણ કરે છે પરંતુ 3' OH અંતો તૈયાર કરતું નથી. B વિકલ્પમાં MRX કોમ્પ્લેક્સ સંકેતન કરતું નથી. D વિકલ્પમાં SCF કોમ્પ્લેક્સ અને RAD51 રિકોમ્બિનેશનમાં ભાગ લે છે પરંતુ DSB ની મારફતે સંકેતન અથવા 3' OH અંતો તૈયાર કરતું નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "બેક્ટેરિયામાં, કોન્યુગેશન દરમિયાન F+ કોષ દ્વારા F- કોષને પ્લાસ્મિડ ટ્રાન્સફર કરવા માટે કયા જનીનની હાજરી અનિવાર્ય હોય છે અને તે જનીન કયા ઓપેરોનનો ભાગ હોય છે?", "opts": ["tra જનીન, F-પ્લાસ્મિડ ઓપેરોન", "oriT જનીન, tra ઓપેરોન", "tra જનીન, tra ઓપેરોન", "oriV જનીન, F-પ્લાસ્મિડ ઓપેરોન"], "ans": 2, "exp": "બેક્ટેરિયામાં કોન્યુગેશન દરમિયાન F+ કોષ દ્વારા F- કોષને પ્લાસ્મિડ ટ્રાન્સફર કરવા માટે tra જનીનની હાજરી અનિવાર્ય હોય છે, અને તે tra ઓપેરોનનો ભાગ હોય છે. oriT જનીન ટ્રાન્સફરના પ્રારંભ બિંદુ તરીકે કામ કરે છે પરંતુ tra ઓપેરોનનો ભાગ નથી. oriV જનીન રેપ્લિકેશનના પ્રારંભ બિંદુ તરીકે કામ કરે છે. A અને D વિકલ્પો અયોગ્ય ઓપેરોન સાથે જોડાયેલા છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "હોમોલોગસ રિકોમ્બિનેશન દરમિયાન, 'હોલિડે જંકશન' ની રચના પછી કયા પ્રોટીન દ્વારા ડી-લૂપ (D-loop) નું સ્થિરીકરણ થાય છે અને તે પછી કયા ઉત્સેચક દ્વારા ડી-લૂપ ની મારફતે DNA સિંથેસિસ થાય છે?", "opts": ["RPA અને DNA પોલિમરેઝ I", "RAD51 અને DNA પોલિમરેઝ III", "RPA અને DNA પોલિમરેઝ III", "RAD52 અને DNA પોલિમરેઝ I"], "ans": 2, "exp": "હોલિડે જંકશન પછી RPA પ્રોટીન દ્વારા ડી-લૂપ (D-loop) નું સ્થિરીકરણ થાય છે, અને તે પછી DNA પોલિમરેઝ III દ્વારા DNA સિંથેસિસ થાય છે. RAD51 ડી-લૂપ નું નિર્માણ કરે છે પરંતુ સ્થિરીકરણ કરતું નથી. DNA પોલિમરેઝ I ડી-લૂપ ની મારફતે DNA સિંથેસિસ કરતું નથી. RAD52 હોમોલોગસ રિકોમ્બિનેશનમાં ભાગ લે છે પરંતુ ડી-લૂપ સ્થિરીકરણ અથવા DNA સિંથેસિસ સાથે સીધો સંબંધ ધરાવતું નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "રિકોમ્બિનેશન દરમિયાન, કયા પ્રકારના રિકોમ્બિનેશનમાં 'સાઇટ-સ્પેસિફિક રિકોમ્બિનેશન' થાય છે અને તે માટે કયા ઉત્સેચકની જરૂર પડે છે?", "opts": ["હોમોલોગસ રિકોમ્બિનેશન, SPO11", "ટ્રાન્સપોઝિશન, ટ્રાન્સપોઝેઝ", "સાઇટ-સ્પેસિફિક રિકોમ્બિનેશન, ઇન્ટિગ્રેઝ", "નોન-હોમોલોગસ એન્ડ જોઈનિંગ, DNA લિગેઝ"], "ans": 2, "exp": "સાઇટ-સ્પેસિફિક રિકોમ્બિનેશન તેના નામ અનુસાર જ સ્પષ્ટ સ્થાને થાય છે, અને તે માટે ઇન્ટિગ્રેઝ ઉત્સેચકની જરૂર પડે છે. હોમોલોગસ રિકોમ્બિનેશનમાં SPO11 ઉત્સેચકની ભૂમિકા હોય છે, પરંતુ તે સાઇટ-સ્પેસિફિક નથી. ટ્રાન્સપોઝિશનમાં ટ્રાન્સપોઝેઝ ઉત્સેચકની ભૂમિકા હોય છે, પરંતુ તે સાઇટ-સ્પેસિફિક રિકોમ્બિનેશન નથી. નોન-હોમોલોગસ એન્ડ જોઈનિંગમાં DNA લિગેઝની ભૂમિકા હોય છે, પરંતુ તે સાઇટ-સ્પેસિફિક રિકોમ્બિનેશન નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "યુકેરિયોટિક કોષોમાં, હોમોલોગસ રિકોમ્બિનેશન દરમિયાન, કયા પ્રોટીન કોમ્પ્લેક્સ દ્વારા 'સિનેપ્ટોનેમલ કોમ્પ્લેક્સ' નું નિર્માણ થાય છે અને તે કયા તબક્કે થાય છે?", "opts": ["SCF કોમ્પ્લેક્સ, લેપ્ટોટીન", "કોહેસિન કોમ્પ્લેક્સ, ઝાયગોટીન", "કોન્ડેન્સિન કોમ્પ્લેક્સ, પેકીટીન", "રિકોમ્બિનેશન નોડ્યુલ કોમ્પ્લેક્સ, ડિપ્લોટીન"], "ans": 1, "exp": "યુકેરિયોટિક કોષોમાં, હોમોલોગસ રિકોમ્બિનેશન દરમિયાન, કોહેસિન કોમ્પ્લેક્સ દ્વારા 'સિનેપ્ટોનેમલ કોમ્પ્લેક્સ' નું નિર્માણ થાય છે અને તે ઝાયગોટીન તબક્કે થાય છે. SCF કોમ્પ્લેક્સ રિકોમ્બિનેશન સાથે સીધો સંબંધ ધરાવતું નથી. કોન્ડેન્સિન કોમ્પ્લેક્સ વર્ણસૂત્રના કોન્ડેન્સેશનમાં ભાગ લે છે. રિકોમ્બિનેશન નોડ્યુલ કોમ્પ્લેક્સ રિકોમ્બિનેશનમાં ભાગ લે છે પરંતુ સિનેપ્ટોનેમલ કોમ્પ્લેક્સ નું નિર્માણ કરતું નથી.", "ref": "Std 12 - અધ્યાય 4: કોષ ચક્ર અને કોષ વિભાજન", "ch": ""}, {"q": "બેક્ટેરિયામાં, કયા પ્રકારના રિકોમ્બિનેશન દરમિયાન 'રિકોમ્બિનેશન હોટસ્પોટ્સ' ની ભૂમિકા સૌથી મહત્વપૂર્ણ હોય છે, જ્યાં ડીએનએની ખાસ જગ્યાઓ પર રિકોમ્બિનેશનની શક્યતા વધુ હોય છે?", "opts": ["હોમોલોગસ રિકોમ્બિનેશન", "સાઇટ-સ્પેસિફિક રિકોમ્બિનેશન", "ટ્રાન્સપોઝિશનલ રિકોમ્બિનેશન", "ઇલેજિટિમેટ રિકોમ્બિનેશન"], "ans": 1, "exp": "સાઇટ-સ્પેસિફિક રિકોમ્બિનેશન દરમિયાન 'રિકોમ્બિનેશન હોટસ્પોટ્સ' ની ભૂમિકા મહત્વપૂર્ણ હોય છે, કારણ કે આ પ્રકારના રિકોમ્બિનેશનમાં ડીએનએની ખાસ જગ્યાઓ (હોટસ્પોટ્સ) પર રિકોમ્બિનેશન થાય છે. હોમોલોગસ રિકોમ્બિનેશનમાં હોટસ્પોટ્સની ભૂમિકા ઓછી હોય છે, જ્યારે ટ્રાન્સપોઝિશનલ અને ઇલેજિટિમેટ રિકોમ્બિનેશનમાં હોટસ્પોટ્સની ભૂમિકા નગણ્ય હોય છે.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "યુકેરિયોટિક કોષોમાં, હોમોલોગસ રિકોમ્બિનેશન દરમિયાન, 'સિનેપ્ટોનેમલ કોમ્પ્લેક્સ' નું નિર્માણ કયા તબક્કે થાય છે અને તેનું મુખ્ય કાર્ય શું છે?", "opts": ["લેપ્ટોટીન તબક્કે, હોમોલોગસ વર્ણસૂત્રોની જોડી બનાવવા માટે", "ઝાયગોટીન તબક્કે, ક્રોસિંગ ઓવર માટેની તૈયારી કરવા માટે", "પેકીટીન તબક્કે, કાયમી ક્રોસિંગ ઓવર થવા માટે", "ડાયપ્લોટીન તબક્કે, વર્ણસૂત્રોની અદલાબદલી કરવા માટે"], "ans": 1, "exp": "'સિનેપ્ટોનેમલ કોમ્પ્લેક્સ' નું નિર્માણ ઝાયગોટીન તબક્કે થાય છે અને તેનું મુખ્ય કાર્ય ક્રોસિંગ ઓવર માટેની તૈયારી કરવા માટે હોય છે. લેપ્ટોટીન તબક્કે વર્ણસૂત્રોનું કન્ડેન્સેશન થાય છે, જ્યારે પેકીટીન તબક્કે કાયમી ક્રોસિંગ ઓવર થાય છે અને ડાયપ્લોટીન તબક્કે વર્ણસૂત્રોની અદલાબદલી થાય છે.", "ref": "Std 12 - અધ્યાય 4: કોષ ચક્ર અને કોષ વિભાજન", "ch": ""}, {"q": "રિકોમ્બિનેશન દરમિયાન, કયા પ્રોટીન દ્વારા 'હોલિડે જંકશન' ની રચના પછી ડી-લૂપ નું સ્થાનાંતરણ થાય છે, જેથી રિકોમ્બિનેશનની પ્રક્રિયા પૂર્ણ થઈ શકે?", "opts": ["રેડ51", "રુવએબી", "રુવસી", "રેડ54"], "ans": 2, "exp": "'હોલિડે જંકશન' ની રચના પછી, રુવસી પ્રોટીન દ્વારા ડી-લૂપ નું સ્થાનાંતરણ થાય છે, જેથી રિકોમ્બિનેશનની પ્રક્રિયા પૂર્ણ થઈ શકે. રેડ51 ડીએનએ સાથે બાઇન્ડ થાય છે, રુવએબી હેલિકેઝ એન્ઝાઇમ છે, અને રેડ54 ડીએનએને સ્થાનાંતરિત કરવામાં મદદ કરે છે.", "ref": "Std 12 - અધ્યાય 5: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "હોમોલોગસ રિકોમ્બિનેશન દરમિયાન, જ્યારે ડબલ-સ્ટ્રેન્ડ બ્રેક (DSB) થાય છે, ત્યારે કયા પ્રોટીન કોમ્પ્લેક્સ દ્વારા DNA ની સરખામણી અને જોડાણ કરવામાં આવે છે, પરંતુ તે સિવાય, કયા ઉત્સેચક દ્વારા 3' ઓવરહેંગ્સ નું સંરક્ષણ થાય છે?", "opts": ["RecBCD કોમ્પ્લેક્સ અને DNA પોલિમરેઝ I", "Spo11 અને RuvABC કોમ્પ્લેક્સ", "MRX કોમ્પ્લેક્સ અને Exonuclease 5'-3'", "Rad51 અને DNA લાઇગેઝ"], "ans": 2, "exp": "હોમોલોગસ રિકોમ્બિનેશન દરમિયાન, MRX કોમ્પ્લેક્સ (Mre11-Rad50-Xrs2) દ્વારા ડબલ-સ્ટ્રેન્ડ બ્રેક (DSB) ની પહેલી પ્રક્રિયા થાય છે, જ્યારે Exonuclease 5'-3' દ્વારા 3' ઓવરહેંગ્સ નું સંરક્ષણ થાય છે. RecBCD કોમ્પ્લેક્સ બેક્ટેરિયામાં કામ કરે છે, Spo11 DSB નું નિર્માણ કરે છે પ function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
