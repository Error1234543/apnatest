<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>લિંગ નિર્ધારણ (Sex Determination)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>લિંગ નિર્ધારણ (Sex Determination)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">લિંગ નિર્ધારણ (Sex Determination)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "માનવમાં લિંગ નિર્ધારણ માટે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["માતાના અંડકોષમાં હંમેશા X વર્ણસૂત્ર હોય છે.", "પિતાના શુક્રકોષમાં X અથવા Y વર્ણસૂત્ર હોઈ શકે છે.", "જો શુક્રકોષ Y વર્ણસૂત્ર ધરાવતો હોય તો સંતાન છોકરો થશે.", "માતા અને પિતા બંને પાસેથી X વર્ણસૂત્ર મળે તો સંતાન છોકરી થશે, પરંતુ તે જનીનિક રીતે અસામાન્ય હશે."], "ans": 3, "exp": "વિકલ્પ D ખોટો છે કારણ કે માતા અને પિતા બંનેમાંથી X વર્ણસૂત્ર મળવાથી સંતાન છોકરી (XX) બને છે, જે જનીનિક રીતે સામાન્ય છે. બાકીના વિકલ્પો સાચા છે: માતાના અંડકોષમાં હંમેશા X વર્ણસૂત્ર હોય છે, પિતાના શુક્રકોષમાં X અથવા Y વર્ણસૂત્ર હોઈ શકે છે, અને Y વર્ણસૂત્ર ધરાવતો શુક્રકોષ છોકરા (XY)નું નિર્માણ કરે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "નીચેના પૈકી કયા સજીવમાં લિંગ નિર્ધારણ માટે 'ZW-ZZ' પદ્ધતિ જોવા મળે છે?", "opts": ["માનવ", "ડ્રોસોફિલા (ફળમાખી)", "મરઘી", "મધમાખી"], "ans": 2, "exp": "મરઘીમાં લિંગ નિર્ધારણ માટે 'ZW-ZZ' પદ્ધતિ જોવા મળે છે, જેમાં માદા ZW અને નર ZZ વર્ણસૂત્રો ધરાવે છે. માનવમાં 'XY-XX' પદ્ધતિ, ડ્રોસોફિલામાં પણ 'XY-XX' પદ્ધતિ અને મધમાખીમાં હેપ્લોડિપ્લોઇડી પદ્ધતિ જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "અસર્શન (A): મધમાખીમાં નર મધમાખી હેપ્લોઇડ હોય છે.\nકારણ (R): મધમાખીમાં લિંગ નિર્ધારણ હેપ્લોડિપ્લોઇડી પદ્ધતિ દ્વારા થાય છે, જેમાં ફલિત અંડકોષમાંથી માદા અને અફલિત અંડકોષમાંથી નર વિકસે છે.", "opts": ["A અને R બંને સાચાં છે અને R એ A નું સાચું કારણ છે.", "A અને R બંને સાચાં છે, પરંતુ R એ A નું સાચું કારણ નથી.", "A સાચું છે, પરંતુ R ખોટું છે.", "A ખોટું છે, પરંતુ R સાચું છે."], "ans": 0, "exp": "અસર્શન (A) અને કારણ (R) બંને સાચાં છે. મધમાખીમાં હેપ્લોડિપ્લોઇડી પદ્ધતિ દ્વારા લિંગ નિર્ધારણ થાય છે, જેમાં ફલિત અંડકોષમાંથી માદા (ડિપ્લોઇડ) અને અફલિત અંડકોષમાંથી નર (હેપ્લોઇડ) વિકસે છે. આથી R એ A નું સાચું કારણ છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "એક દંપતીને ત્રણ છોકરીઓ છે અને હવે ચોથું સંતાન ગર્ભમાં છે. આ સંતાન છોકરો થવાની સંભાવના કેટલી છે?", "opts": ["0%", "25%", "50%", "100%"], "ans": 2, "exp": "દરેક ગર્ભધારણમાં છોકરો કે છોકરી થવાની સંભાવના 50% હોય છે, કારણ કે પિતાના શુક્રકોષમાં X અથવા Y વર્ણસૂત્ર હોઈ શકે છે. અગાઉના સંતાનોનું લિંગ આ સંભાવનાને અસર કરતું નથી. આથી સાચો જવાબ 50% છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "નીચેના પૈકી કયા સજીવમાં લિંગ નિર્ધારણ પર્યાવરણીય પરિબળો દ્વારા પ્રભાવિત થાય છે?", "opts": ["કાચબો", "માનવ", "ડ્રોસોફિલા", "મરઘી"], "ans": 0, "exp": "કાચબામાં લિંગ નિર્ધારણ પર્યાવરણીય તાપમાન દ્વારા પ્રભાવિત થાય છે. ઊંચા તાપમાને માદા અને નીચા તાપમાને નર વિકસે છે. માનવ, ડ્રોસોફિલા અને મરઘીમાં લિંગ નિર્ધારણ વર્ણસૂત્રીય પદ્ધતિ દ્વારા થાય છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "માનવમાં, SRY જીન કયા વર્ણસૂત્ર પર સ્થિત છે અને તેનું મુખ્ય કાર્ય શું છે?", "opts": ["X વર્ણસૂત્ર પર સ્થિત છે અને તે સ્ત્રી લિંગના વિકાસને પ્રેરે છે.", "Y વર્ણસૂત્ર પર સ્થિત છે અને તે પુરુષ લિંગના વિકાસને પ્રેરે છે.", "X અને Y બંને વર્ણસૂત્ર પર સ્થિત છે અને તે લિંગ નિર્ધારણમાં ભાગ લેતું નથી.", "Y વર્ણસૂત્ર પર સ્થિત છે અને તે સ્ત્રી લિંગના વિકાસને અટકાવે છે."], "ans": 1, "exp": "SRY જીન Y વર્ણસૂત્ર પર સ્થિત છે અને તે પુરુષ લિંગના વિકાસને પ્રેરે છે. આ જીન ટેસ્ટોસ્ટેરોન હોર્મોનના ઉત્પાદનને પ્રેરે છે, જે પુરુષ લક્ષણોના વિકાસ માટે જવાબદાર છે. વિકલ્પ A ખોટો છે કારણ કે SRY જીન X વર્ણસૂત્ર પર સ્થિત નથી અને સ્ત્રી લિંગના વિકાસને પ્રેરતું નથી. વિકલ્પ C ખોટો છે કારણ કે SRY જીન ફક્ત Y વર્ણસૂત્ર પર જ સ્થિત છે અને લિંગ નિર્ધારણમાં મહત્વની ભૂમિકા ભજવે છે. વિકલ્પ D ખોટો છે કારણ કે SRY જીન સ્ત્રી લિંગના વિકાસને અટકાવતું નથી, પરંતુ પુરુષ લિંગના વિકાસને પ્રેરે છે.", "ref": "Std 12 - પ્રકરણ 5: વંશવેલા અને ઉત્ક્રાંતિ (વર્ણસૂત્રીય આનુવંશિકતા)", "ch": ""}, {"q": "મધમાખીમાં, નર મધમાખી (ડ્રોન) કેવી રીતે ઉત્પન્ન થાય છે?", "opts": ["અપરિણીત રાણી દ્વારા મુક્ત અંડકોષના વિકાસ દ્વારા.", "પરિણીત રાણી દ્વારા નિષેચિત અંડકોષના વિકાસ દ્વારા.", "કામદાર મધમાખી દ્વારા મુક્ત અંડકોષના વિકાસ દ્વારા.", "રાણી અને નર મધમાખીના સંયોગ દ્વારા."], "ans": 0, "exp": "મધમાખીમાં, નર મધમાખી (ડ્રોન) અપરિણીત રાણી દ્વારા મુક્ત અંડકોષના વિકાસ દ્વારા ઉત્પન્ન થાય છે. આ પ્રક્રિયા હેપ્લોઇડી તરફ દોરી જાય છે, જેમાં નર મધમાખીને ફક્ત માતૃજન્ય વર્ણસૂત્રો મળે છે. વિકલ્પ B ખોટો છે કારણ કે પરિણીત રાણી દ્વારા નિષેચિત અંડકોષના વિકાસ દ્વારા માદા મધમાખી ઉત્પન્ન થાય છે. વિકલ્પ C ખોટો છે કારણ કે કામદાર મધમાખી અંડકોષ મૂકતી નથી. વિકલ્પ D ખોટો છે કારણ કે રાણી અને નર મધમાખીના સંયોગ દ્વારા માદા મધમાખી ઉત્પન્ન થાય છે.", "ref": "Std 12 - પ્રકરણ 5: વંશવેલા અને ઉત્ક્રાંતિ (લિંગ નિર્ધારણ)", "ch": ""}, {"q": "નીચેના પૈકી કયા સજીવમાં લિંગ નિર્ધારણ 'XO' પદ્ધતિ દ્વારા થાય છે?", "opts": ["ડ્રોસોફિલા", "ગ્રાસહોપર", "માનવ", "કુતરો"], "ans": 1, "exp": "ગ્રાસહોપરમાં લિંગ નિર્ધારણ 'XO' પદ્ધતિ દ્વારા થાય છે, જેમાં નરમાં ફક્ત એક X વર્ણસૂત્ર હોય છે અને માદામાં બે X વર્ણસૂત્રો હોય છે. વિકલ્પ A ખોટો છે કારણ કે ડ્રોસોફિલામાં 'XY' પદ્ધતિ દ્વારા લિંગ નિર્ધારણ થાય છે. વિકલ્પ C અને D ખોટા છે કારણ કે માનવ અને કુતરામાં પણ 'XY' પદ્ધતિ દ્વારા લિંગ નિર્ધારણ થાય છે.", "ref": "Std 12 - પ્રકરણ 5: વંશવેલા અને ઉત્ક્રાંતિ (લિંગ નિર્ધારણ)", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન લિંગ-સંકળિત જનીન (Sex-linked gene) વિશે સાચું નથી?", "opts": ["લિંગ-સંકળિત જનીન X અથવા Y વર્ણસૂત્ર પર સ્થિત હોય છે.", "Y-સંકળિત જનીન ફક્ત પુરુષોમાં જ વારસાગત થાય છે.", "X-સંકળિત જનીન ફક્ત સ્ત્રીઓમાં જ વારસાગત થાય છે.", "હિમોફિલિયા X-સંકળિત રોગ છે."], "ans": 2, "exp": "X-સંકળિત જનીન ફક્ત સ્ત્રીઓમાં જ વારસાગત થાય છે તે વિધાન ખોટું છે. X-સંકળિત જનીન પુરુષ અને સ્ત્રી બંનેમાં વારસાગત થઈ શકે છે, પરંતુ પુરુષોમાં તે વધુ પ્રભાવી હોય છે કારણ કે તેમની પાસે ફક્ત એક X વર્ણસૂત્ર હોય છે. વિકલ્પ A સાચો છે કારણ કે લિંગ-સંકળિત જનીન X અથવા Y વર્ણસૂત્ર પર સ્થિત હોય છે. વિકલ્પ B સાચો છે કારણ કે Y-સંકળિત જનીન ફક્ત પુરુષોમાં જ વારસાગત થાય છે. વિકલ્પ D સાચો છે કારણ કે હિમોફિલિયા X-સંકળિત રોગ છે.", "ref": "Std 12 - પ્રકરણ 5: વંશવેલા અને ઉત્ક્રાંતિ (લિંગ-સંકળિત આનુવંશિકતા)", "ch": ""}, {"q": "નીચેના પૈકી કયા સજીવમાં લિંગ નિર્ધારણ તાપમાન પર આધાર રાખે છે?", "opts": ["માનવ", "કાચબા", "મધમાખી", "ડ્રોસોફિલા"], "ans": 1, "exp": "કાચબામાં લિંગ નિર્ધારણ તાપમાન પર આધાર રાખે છે. અમુક પ્રજાતિઓમાં, અંડા જેમ જેમ વિકસે છે, તાપમાનના આધારે નર અથવા માદા વિકસે છે. વિકલ્પ A ખોટો છે કારણ કે માનવમાં લિંગ નિર્ધારણ XY પદ્ધતિ દ્વારા થાય છે. વિકલ્પ C ખોટો છે કારણ કે મધમાખીમાં લિંગ નિર્ધારણ હેપ્લોઇડી-ડિપ્લોઇડી પદ્ધતિ દ્વારા થાય છે. વિકલ્પ D ખોટો છે કારણ કે ડ્રોસોફિલામાં લિંગ નિર્ધારણ XY પદ્ધતિ દ્વારા થાય છે.", "ref": "Std 12 - પ્રકરણ 5: વંશવેલા અને ઉત્ક્રાંતિ (પર્યાવરણીય લિંગ નિર્ધારણ)", "ch": ""}, {"q": "માનવમાં, કયા જનીનની હાજરી અથવા ગેરહાજરીને કારણે સ્ત્રી અને પુરુષ વચ્ચે લિંગ નિર્ધારણ થાય છે, પરંતુ તે જનીન સ્ત્રીના વર્ણસૂત્ર પર હાજર નથી?", "opts": ["TDF જનીન", "SRY જનીન", "DAX1 જનીન", "SOX9 જનીન"], "ans": 1, "exp": "SRY જનીન (Sex-determining Region Y) Y વર્ણસૂત્ર પર સ્થિત છે અને તે પુરુષ લિંગ નિર્ધારણ માટે જવાબદાર છે. TDF (Testis-Determining Factor) એ SRY જનીનનું જ બીજું નામ છે, પરંતુ પ્રશ્નમાં જણાવ્યા મુજબ તે સ્ત્રીના વર્ણસૂત્ર પર હાજર નથી, જેથી A અને B બંને સાચા લાગે છે, પરંતુ TDF એ SRY નું જ પ્રતિનિધિત્વ કરે છે. DAX1 અને SOX9 જનીન લિંગ નિર્ધારણમાં ભાગ લે છે, પરંતુ DAX1 સ્ત્રી લિંગ વિકાસ સાથે સંકળાયેલ છે અને X વર્ણસૂત્ર પર હાજર છે, જ્યારે SOX9 એ SRY દ્વારા પ્રેરિત થાય છે અને Y વર્ણસૂત્ર પર નથી. શ્રેષ્ઠ અને સ્પષ્ટ જવાબ SRY જનીન છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિકાસ (લિંગ નિર્ધારણ)", "ch": ""}, {"q": "નીચેના પૈકી કયા સજીવમાં લિંગ નિર્ધારણ માટે 'XX-XY' પદ્ધતિ અપનાવવામાં આવે છે, પરંતુ તેના Y વર્ણસૂત્ર પર SRY જનીન હાજર નથી?", "opts": ["મનુષ્ય", "ચિમપાંજી", "ડ્રોસોફિલા", "કેળ"], "ans": 3, "exp": "કેળ (Platypus)માં લિંગ નિર્ધારણ XX-XY પદ્ધતિ દ્વારા થાય છે, પરંતુ તેના Y વર્ણસૂત્ર પર SRY જનીન હાજર નથી. મનુષ્ય, ચિમપાંજી અને ડ્રોસોફિલામાં Y વર્ણસૂત્ર પર SRY જનીન હાજર હોય છે, જે પુરુષ લિંગ નિર્ધારણ માટે જવાબદાર છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિકાસ (લિંગ નિર્ધારણ)", "ch": ""}, {"q": "એક સજીવમાં, નર અને માદા વચ્ચે વર્ણસૂત્રોની સંખ્યામાં તફાવત નથી, પરંતુ લિંગ નિર્ધારણ માટે જવાબદાર જનીન ઓટોસોમલ વર્ણસૂત્ર પર સ્થિત છે. આ પૈકી કયા સજીવની લાક્ષણિકતા છે?", "opts": ["મધમાખી", "પોપટ", "કેળ", "કેળવણી (C. elegans)"], "ans": 3, "exp": "કેળવણી (C. elegans)માં લિંગ નિર્ધારણ ઓટોસોમલ વર્ણસૂત્ર પર સ્થિત જનીન દ્વારા થાય છે. નર અને માદા વચ્ચે વર્ણસૂત્રોની સંખ્યામાં તફાવત નથી (બંને 2n હોય છે). મધમાખીમાં હેપ્લોઇડ-ડિપ્લોઇડ પદ્ધતિ, પોપટમાં ZW-ZZ પદ્ધતિ, અને કેળમાં XX-XY પદ્ધતિ જોવા મળે છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિકાસ (લિંગ નિર્ધારણ)", "ch": ""}, {"q": "માનવમાં, કયા હોર્મોનની અસંતુલનને કારણે લિંગ વિકાસમાં વિકૃતિ ઉત્પન્ન થાય છે, જેમાં વ્યક્તિ જનનેત્રીય રચનાઓમાં અસ્પષ્ટતા ધરાવે છે?", "opts": ["ટેસ્ટોસ્ટેરોન અને ઇસ્ટ્રોજન", "ઇન્સ્યુલિન અને ગ્લુકેગોન", "એડ્રિનેલિન અને નોરએડ્રિનેલિન", "થાયરોક્સિન અને કેલ્સિટોનિન"], "ans": 0, "exp": "ટેસ્ટોસ્ટેરોન (પુરુષ હોર્મોન) અને ઇસ્ટ્રોજન (સ્ત્રી હોર્મોન)ની અસંતુલનને કારણે લિંગ વિકાસમાં વિકૃતિ ઉત્પન્ન થાય છે, જેમાં વ્યક્તિ જનનેત્રીય રચનાઓમાં અસ્પષ્ટતા (Intersex) ધરાવે છે. ઇન્સ્યુલિન અને ગ્લુકેગોન, એડ્રિનેલિન અને નોરએડ્રિનેલિન, થાયરોક્સિન અને કેલ્સિટોનિન એ લિંગ વિકાસ સાથે સીધો સંબંધ ધરાવતા નથી.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિકાસ (લિંગ નિર્ધારણ અને હોર્મોનલ પ્રભાવ)", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન લિંગ-સંકળિત વિકાર (Sex-linked disorder) વિશે સાચું નથી?", "opts": ["હિમોફિલિયા A એ X-સંકળિત રીસેસિવ વિકાર છે.", "કલર બ્લાઇન્ડનેસ (રંગ અંધત્વ) Y-સંકળિત વિકાર છે.", "ડ્યુચેન મસ્ક્યુલર ડિસ્ટ્રોફી એ X-સંકળિત રીસેસિવ વિકાર છે.", "હિમોફિલિયા B એ X-સંકળિત રીસેસિવ વિકાર છે."], "ans": 1, "exp": "કલર બ્લાઇન્ડનેસ (રંગ અંધત્વ) X-સંકળિત રીસેસિવ વિકાર છે, Y-સંકળિત નથી. હિમોફિલિયા A અને B બંને X-સંકળિત રીસેસિવ વિકાર છે. ડ્યુચેન મસ્ક્યુલર ડિસ્ટ્રોફી પણ X-સંકળિત રીસેસિવ વિકાર છે. આમ, B વિધાન ખોટું છે.", "ref": "Std 12 - અધ્યાય 5: વંશપરંપરા અને વિકાસ (લિંગ-સંકળિત વિકાર)", "ch": ""}, {"q": "એક સજીવમાં, નરમાં 16 વર્ણસૂત્રો અને માદામાં 18 વર્ણસૂત્રો જોવા મળે છે. આ સજીવમાં લિંગ નિર્ધારણની કઈ પદ્ધતિ હોવાની શક્યતા સૌથી વધુ છે?", "opts": ["XX-XY પદ્ધતિ", "ZW-ZZ પદ્ધતિ", "XO પદ્ધતિ", "હેપ્લોઇડ-ડિપ્લોઇડ પદ્ધતિ"], "ans": 2, "exp": "આ સજીવમાં નરમાં માદા કરતાં બે વર્ણસૂત્રો ઓછા છે, જે XO પદ્ધતિની લાક્ષણિકતા છે. આ પદ્ધતિમાં નરમાં એક X વર્ણસૂત્ર હોય છે જ્યારે માદામાં બે X વર્ણસૂત્રો હોય છે. XX-XY પદ્ધતિમાં નર અને માદામાં વર્ણસૂત્રોની સંખ્યા સમાન હોય છે, ZW-ZZ પદ્ધતિમાં માદામાં ZW અને નરમાં ZZ હોય છે, અને હેપ્લોઇડ-ડિપ્લોઇડ પદ્ધતિમાં વર્ણસૂત્રોની સંખ્યામાં મોટો તફાવત હોય છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "અસર્શન (A): કેટલાક સરીસૃપોમાં લિંગ નિર્ધારણ તાપમાન આધારિત હોય છે.\nકારણ (R): ઈન્ક્યુબેશન દરમિયાન ઈંડાના તાપમાનમાં ફેરફાર ઉત્સેચકોની પ્રવૃત્તિને અસર કરે છે, જે લિંગ નિર્ધારણમાં ભૂમિકા ભજવે છે.", "opts": ["A અને R બંને સાચાં છે અને R એ Aની સાચી સમજૂતી છે.", "A અને R બંને સાચાં છે પરંતુ R એ Aની સાચી સમજૂતી નથી.", "A સાચું છે પરંતુ R ખોટું છે.", "A ખોટું છે પરંતુ R સાચું છે."], "ans": 0, "exp": "કેટલાક સરીસૃપોમાં લિંગ નિર્ધારણ તાપમાન આધારિત હોય છે, જે અસર્શન (A) સાચું છે. કારણ (R) પણ સાચું છે કારણ કે ઈન્ક્યુબેશન દરમિયાન તાપમાનમાં ફેરફાર ઉત્સેચકોની પ્રવૃત્તિને અસર કરે છે, જે લિંગ નિર્ધારણમાં મહત્ત્વપૂર્ણ ભૂમિકા ભજવે છે. આથી R એ Aની સાચી સમજૂતી છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "નીચેના પૈકી કયા સજીવમાં લિંગ નિર્ધારણ માટે 'ZO-ZZ' પદ્ધતિ જોવા મળે છે?", "opts": ["મનુષ્ય", "મરઘી", "કેટલાક પતંગિયા", "મધમાખી"], "ans": 2, "exp": "કેટલાક પતંગિયામાં 'ZO-ZZ' પદ્ધતિ જોવા મળે છે, જેમાં માદામાં ZO અને નરમાં ZZ વર્ણસૂત્રો હોય છે. મનુષ્યમાં XX-XY, મરઘીમાં ZW-ZZ, અને મધમાખીમાં હેપ્લોઇડ-ડિપ્લોઇડ પદ્ધતિ જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "માનવમાં, જો એક સ્ત્રીના પિતા હિમોફિલિયા (રુધિરસ્રાવ રોગ)થી પીડાતા હોય, તો તે સ્ત્રીના પુત્રને આ રોગ થવાની સંભાવના કેટલી છે? (ધારો કે તેની માતા આ રોગ માટે વાહક નથી.)", "opts": ["0%", "25%", "50%", "100%"], "ans": 2, "exp": "હિમોફિલિયા X-સંકળાયેલ રોગ છે. સ્ત્રીના પિતા હિમોફિલિયાથી પીડાતા હોવાથી તેની એક X વર્ણસૂત્ર ખામીયુક્ત હશે. આથી તે સ્ત્રી વાહક હશે (X^H X^h). તેના પુત્રને આ રોગ થવાની સંભાવના 50% છે કારણ કે તેને માતા પાસેથી ખામીયુક્ત X અથવા સામાન્ય X વર્ણસૂત્ર મળી શકે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "એક પ્રયોગમાં, વૈજ્ઞાનિકોએ જોયું કે એક પ્રકારના માછલીમાં, નર માછલીને માદા માછલીમાં રૂપાંતરિત કરી શકાય છે જો તેને ચોક્કસ હોર્મોન આપવામાં આવે. આ ઘટનાને શું કહેવાય છે?", "opts": ["લિંગ પરિવર્તન (Sex Reversal)", "લિંગ નિર્ધારણ (Sex Determination)", "લિંગ ભેદભાવ (Sex Differentiation)", "લિંગ સંક્રમણ (Sex Transition)"], "ans": 0, "exp": "આ ઘટનાને લિંગ પરિવર્તન (Sex Reversal) કહેવાય છે, જેમાં હોર્મોનની અસરને કારણે નર માછલી માદામાં રૂપાંતરિત થાય છે. લિંગ નિર્ધારણ વર્ણસૂત્રો દ્વારા થાય છે, લિંગ ભેદભાવ વિકાસ દરમિયાન થતી પ્રક્રિયા છે, અને લિંગ સંક્રમણ એવો શબ્દ નથી જે આ સંદર્ભમાં વપરાય છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
