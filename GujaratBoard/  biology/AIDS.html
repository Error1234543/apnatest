<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIDS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>AIDS</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">AIDS</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એઇડ્સ (AIDS) ના દર્દીમાં નીચેનામાંથી કયું કોષ સૌથી વધુ પ્રમાણમાં નાશ પામે છે?", "opts": ["ન્યુટ્રોફિલ્સ (Neutrophils)", "બી-લિમ્ફોસાઇટ્સ (B-Lymphocytes)", "સીડી4+ ટી-લિમ્ફોસાઇટ્સ (CD4+ T-Lymphocytes)", "મોનોસાઇટ્સ (Monocytes)"], "ans": 2, "exp": "એઇડ્સ (AIDS) એ HIV વાઇરસને કારણે થાય છે, જે મુખ્યત્વે સીડી4+ ટી-લિમ્ફોસાઇટ્સને નષ્ટ કરે છે. આ કોષો પ્રતિરક્ષાતંત્રમાં મહત્ત્વની ભૂમિકા ભજવે છે. ન્યુટ્રોફિલ્સ અને મોનોસાઇટ્સ પર HIVનો પ્રભાવ ઓછો હોય છે, જ્યારે બી-લિમ્ફોસાઇટ્સ પરોક્ષ રીતે અસર પામે છે પરંતુ સીધો નાશ થતો નથી. તેથી સાચો જવાબ સીડી4+ ટી-લિમ્ફોસાઇટ્સ છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV વાઇરસના જીવનચક્રમાં 'પ્રોવાયરસ' તરીકે ઓળખાતા તબક્કામાં નીચેનામાંથી શું સાચું છે?", "opts": ["વાઇરલ DNA યજમાન કોષના DNAમાં સંકલિત થાય છે", "વાઇરલ RNAનું પ્રોટીનમાં રૂપાંતરણ થાય છે", "વાઇરસ કોષમાંથી બહાર નીકળે છે અને નવા કોષોને ચેપ લગાડે છે", "વાઇરલ DNAનું RNAમાં ટ્રાન્સક્રિપ્શન થાય છે"], "ans": 0, "exp": "HIV વાઇરસના જીવનચક્રમાં પ્રોવાયરસ તબક્કો એ છે જ્યારે વાઇરલ DNA યજમાન કોષના DNAમાં સંકલિત થાય છે. આ તબક્કે વાઇરસ નિષ્ક્રિય રહે છે અને યજમાન કોષના વિભાજન સાથે પ્રસરે છે. વિકલ્પ B અને D અનુક્રમે ટ્રાન્સલેશન અને ટ્રાન્સક્રિપ્શનના તબક્કાનું વર્ણન કરે છે, જ્યારે વિકલ્પ C વાઇરસના બહાર નીકળવાના તબક્કાનું વર્ણન કરે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એઇડ્સના નિદાન માટે ELISA ટેસ્ટનો ઉપયોગ થાય છે. આ ટેસ્ટમાં શું શોધવામાં આવે છે?", "opts": ["HIV વાઇરસના કેપ્સિડ પ્રોટીન", "HIV વિરુદ્ધના એન્ટિબોડીઝ", "યજમાન કોષના સીડી4+ કોષોની સંખ્યા", "વાઇરલ RNAની હાજરી"], "ans": 1, "exp": "ELISA (Enzyme-Linked Immunosorbent Assay) ટેસ્ટમાં HIV વિરુદ્ધ શરીરમાં ઉત્પન્ન થયેલા એન્ટિબોડીઝની હાજરી શોધવામાં આવે છે. આ ટેસ્ટ વાઇરસના પ્રત્યક્ષ શોધ માટે નથી, પરંતુ શરીરની પ્રતિક્રિયા માપે છે. વિકલ્પ A અને D પ્રત્યક્ષ વાઇરલ ઘટકોની શોધ માટે છે, જે PCR જેવા ટેસ્ટમાં થાય છે, જ્યારે વિકલ્પ C ફ્લો સાયટોમેટ્રી દ્વારા માપવામાં આવે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન HIVના પ્રસારણ માટે ખોટું છે?", "opts": ["HIV ચેપગ્રસ્ત માતાથી બાળકમાં ગર્ભાવસ્થા દરમિયાન પ્રસરી શકે છે", "HIV ચેપગ્રસ્ત વ્યક્તિ સાથે હાથ મિલાવવાથી પ્રસરે છે", "HIV ચેપગ્રસ્ત સોયના ઉપયોગથી પ્રસરે છે", "HIV ચેપગ્રસ્ત વ્યક્તિ સાથે અસુરક્ષિત જાતીય સંબંધથી પ્રસરે છે"], "ans": 1, "exp": "HIV ચેપગ્રસ્ત વ્યક્તિ સાથે હાથ મિલાવવાથી, આલિંગન કરવાથી અથવા સામાન્ય સંપર્કથી પ્રસરતું નથી. HIVનું પ્રસારણ ચેપગ્રસ્ત રક્ત, વીર્ય, યોનિદ્રવ્ય અથવા માતાના દૂધ દ્વારા થાય છે. વિકલ્પ A, C અને D સાચા પ્રસારણ માર્ગોનું વર્ણન કરે છે, જ્યારે વિકલ્પ B ખોટું છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એઇડ્સના દર્દીમાં 'ઓપર્ચ્યુનિસ્ટિક ઇન્ફેક્શન' થવાનું મુખ્ય કારણ શું છે?", "opts": ["HIV વાઇરસ સીધો રોગકારક સૂક્ષ્મજીવોને સક્રિય કરે છે", "પ્રતિરક્ષાતંત્રની નબળાઈને કારણે સામાન્ય સૂક્ષ્મજીવો રોગકારક બને છે", "દર્દીના શરીરમાં એન્ટિબાયોટિક્સ પ્રતિરોધકતા વિકસે છે", "HIV વાઇરસના પ્રોટીન શરીરના કોષોને નષ્ટ કરે છે"], "ans": 1, "exp": "એઇડ્સના દર્દીમાં ઓપર્ચ્યુનિસ્ટિક ઇન્ફેક્શનનું મુખ્ય કારણ પ્રતિરક્ષાતંત્રની નબળાઈ છે, જેને કારણે સામાન્ય રીતે નુકસાન ન પહોંચાડતા સૂક્ષ્મજીવો પણ રોગકારક બની જાય છે. HIV વાઇરસ સીધો રોગકારક સૂક્ષ્મજીવોને સક્રિય કરતો નથી (વિકલ્પ A ખોટું), ન તો એન્ટિબાયોટિક્સ પ્રતિરોધકતા વિકસે છે (વિકલ્પ C ખોટું). વિકલ્પ D HIVની ક્રિયાવિધિનું અંશતઃ વર્ણન કરે છે, પરંતુ ઓપર્ચ્યુનિસ્ટિક ઇન્ફેક્શનનું મુખ્ય કારણ નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એઇડ્સના દર્દીમાં જોવા મળતી 'કાપોસી સાર્કોમા' નામની ગાંઠનું મુખ્ય કારણ શું છે?", "opts": ["હ્યુમન પેપિલોમા વાઇરસ (HPV) નો ચેપ", "હ્યુમન હર્પિસ વાઇરસ-8 (HHV-8) નો ચેપ", "એપ્સ્ટિન-બાર વાઇરસ (EBV) નો ચેપ", "સાયટોમેગાલો વાઇરસ (CMV) નો ચેપ"], "ans": 1, "exp": "કાપોસી સાર્કોમા એ હ્યુમન હર્પિસ વાઇરસ-8 (HHV-8) ના ચેપને કારણે થતી ગાંઠ છે, જે એઇડ્સના દર્દીઓમાં સામાન્ય રીતે જોવા મળે છે કારણ કે તેમનું પ્રતિરક્ષાતંત્ર નબળું પડી ગયું હોય છે. HPV ગર્ભાશયના કેન્સર સાથે, EBV મોનોન્યુક્લિયોસિસ સાથે અને CMV આંખના ચેપ સાથે સંકળાયેલ છે, પરંતુ કાપોસી સાર્કોમા સાથે નહીં.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV વાઇરસના જીવનચક્રમાં 'રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચક' ની ભૂમિકા શું છે? નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["તે વાઇરલ RNA ને DNA માં રૂપાંતરિત કરે છે.", "તે વાઇરલ DNA ને યજમાન કોષના DNA માં સંકલિત કરવામાં મદદ કરે છે.", "તે યજમાન કોષના રિબોઝોમ પર વાઇરલ પ્રોટીનના સંશ્લેષણ માટે જવાબદાર છે.", "તે વાઇરસના પ્રતિકૃતિ માટે જરૂરી ઉત્સેચક છે."], "ans": 2, "exp": "રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચક વાઇરલ RNA ને DNA માં રૂપાંતરિત કરે છે, જે પછી યજમાન કોષના DNA માં સંકલિત થાય છે. તે પ્રોટીન સંશ્લેષણ માટે સીધો જવાબદાર નથી - પ્રોટીન સંશ્લેષણ રિબોઝોમ દ્વારા થાય છે. તેથી વિકલ્પ C ખોટું છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એઇડ્સના દર્દીઓમાં 'પ્રગતિશીલ બહુકેન્દ્રીય લ્યુકોએન્સેફાલોપથી' (PML) નામનો રોગ થાય છે. આ રોગનું મુખ્ય કારણ શું છે?", "opts": ["જ્હોન કનિંગહામ વાઇરસ (JCV) નો ચેપ", "માયકોબેક્ટેરિયમ ટ્યુબરક્યુલોસિસ બેક્ટેરિયાનો ચેપ", "ક્રિપ્ટોકોકસ નિયોફોર્મન્સ ફૂગનો ચેપ", "ટોક્સોપ્લાઝ્મા ગોન્ડી પ્રજીવનો ચેપ"], "ans": 0, "exp": "પ્રગતિશીલ બહુકેન્દ્રીય લ્યુકોએન્સેફાલોપથી (PML) જ્હોન કનિંગહામ વાઇરસ (JCV) ના ચેપને કારણે થાય છે, જે એઇડ્સના દર્દીઓમાં મગજના સફેદ દ્રવ્યને નુકસાન પહોંચાડે છે. અન્ય વિકલ્પો અન્ય ઓપર્ચ્યુનિસ્ટિક ઇન્ફેક્શન સાથે સંકળાયેલ છે, પરંતુ PML સાથે નહીં.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV વાઇરસના પ્રસારણ માટે નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["HIV સંક્રમિત માતા દ્વારા સ્તનપાન દ્વારા બાળકમાં પ્રસારિત થઈ શકે છે.", "HIV સંક્રમિત વ્યક્તિ સાથે હાથ મિલાવવાથી વાઇરસ પ્રસારિત થઈ શકે છે.", "HIV સંક્રમિત વ્યક્તિના લોહીના સંપર્ક દ્વારા પ્રસારિત થઈ શકે છે.", "HIV સંક્રમિત વ્યક્તિ સાથે અસુરક્ષિત જાતીય સંબંધ દ્વારા પ્રસારિત થઈ શકે છે."], "ans": 1, "exp": "HIV કેઝ્યુઅલ સંપર્ક જેમ કે હાથ મિલાવવાથી, આલિંગન કરવાથી અથવા ભોજન વહેંચવાથી પ્રસારિત થતો નથી. તે લોહી, સ્તનપાન, અસુરક્ષિત જાતીય સંબંધ અને સંક્રમિત સોયના ઉપયોગ દ્વારા પ્રસારિત થાય છે. તેથી વિકલ્પ B ખોટું છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એઇડ્સના દર્દીઓમાં 'એન્ટિરેટ્રોવાઇરલ થેરાપી' (ART) નો ઉપયોગ થાય છે. આ ઉપચાર વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["ART વાઇરસના પ્રતિકૃતિને અટકાવીને વાઇરલ લોડ ઘટાડે છે.", "ART દ્વારા HIV ને સંપૂર્ણપણે શરીરમાંથી દૂર કરી શકાય છે.", "ART દર્દીના પ્રતિરક્ષાતંત્રને મજબૂત બનાવવામાં મદદ કરે છે.", "ART ની અસરકારકતા માટે દવાઓનું નિયમિત સેવન જરૂરી છે."], "ans": 1, "exp": "એન્ટિરેટ્રોવાઇરલ થેરાપી (ART) HIV ના પ્રતિકૃતિને અટકાવે છે અને વાઇરલ લોડ ઘટાડે છે, પરંતુ તે HIV ને સંપૂર્ણપણે શરીરમાંથી દૂર કરી શકતી નથી. તે દર્દીના પ્રતિરક્ષાતંત્રને મજબૂત બનાવે છે અને દવાઓનું નિયમિત સેવન જરૂરી છે. તેથી વિકલ્પ B ખોટું છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV વાઇરસ દ્વારા સંક્રમિત વ્યક્તિમાં 'વાયરલ લોડ' નક્કી કરવા માટે નીચેનામાંથી કયો ટેસ્ટ સૌથી વધુ વિશ્વસનીય ગણાય છે?", "opts": ["ELISA ટેસ્ટ", "વેસ્ટર્ન બ્લોટ ટેસ્ટ", "PCR (પોલિમરેઝ ચેઇન રિએક્શન) ટેસ્ટ", "CD4 કાઉન્ટ ટેસ્ટ"], "ans": 2, "exp": "PCR ટેસ્ટ HIVના RNAની માત્રા નક્કી કરે છે, જે 'વાયરલ લોડ' નું સીધું માપન છે. ELISA અને વેસ્ટર્ન બ્લોટ ટેસ્ટ એન્ટીબોડી શોધે છે, ન કે વાઇરસની માત્રા. CD4 કાઉન્ટ ટેસ્ટ રોગપ્રતિકારક કોષોની સંખ્યા માપે છે, વાયરલ લોડ નહીં.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV વાઇરસના જીવનચક્ર દરમિયાન 'ટેટ' (Tat) પ્રોટીનની ભૂમિકા શું છે?", "opts": ["વાઇરલ DNA નું કોષકેન્દ્રમાં એકીકરણ કરવું", "વાઇરલ જીનના પ્રસરણને વેગ આપવો", "કોષની પળી પર વાઇરસના પ્રવેશદ્વાર તૈયાર કરવો", "વાઇરસના કવચને તોડીને તેને સક્રિય કરવો"], "ans": 1, "exp": "'ટેટ' પ્રોટીન વાઇરલ જીનના પ્રસરણને વેગ આપે છે, જે વાઇરસના પ્રજનન માટે આવશ્યક છે. વિકલ્પ A રિવર્સ ટ્રાન્સક્રિપ્ટેઝ અને ઇન્ટિગ્રેઝ ઉત્સેચકની ભૂમિકા છે. વિકલ્પ C અને D HIV જીવનચક્રના ભાગ નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એઇડ્સના દર્દીમાં 'માયકોબેક્ટેરિયમ એવિયમ કોમ્પ્લેક્સ' (MAC) નામનો સંક્રમણ થવાનું મુખ્ય કારણ કયું છે?", "opts": ["CD4 કોષોની સંખ્યા 200 થી ઓછી હોવી", "B-કોષોની ક્રિયાશીલતા ઝડપથી ઘટવી", "ન્યૂટ્રોફિલ્સની સંખ્યામાં અચાનક વધારો થવો", "થાયમસ ગ્રંથિમાં હોર્મોનના ઉત્પાદનમાં ઘટાડો થવો"], "ans": 0, "exp": "MAC સંક્રમણ એઇડ્સના દર્દીમાં ત્યારે થાય છે જ્યારે CD4 કોષોની સંખ્યા 200 થી ઓછી હોય છે, જે રોગપ્રતિકારક શક્તિને ખૂબ જ નબળી પાડે છે. B-કોષો, ન્યૂટ્રોફિલ્સ, અને થાયમસ ગ્રંથિની સમસ્યાઓ MAC સંક્રમણ સાથે સીધી રીતે સંબંધિત નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV વાઇરસના 'gp120' પ્રોટીન વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["તે વાઇરસને CD4 કોષો સાથે જોડવામાં મદદ કરે છે", "તે વાઇરસના કવચનો એક ભાગ છે", "તે રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચકની ક્રિયામાં સહાય કરે છે", "તે વાઇરસની પ્રવેશ ક્ષમતામાં મહત્વની ભૂમિકા ભજવે છે"], "ans": 2, "exp": "gp120 પ્રોટીન વાઇરસને CD4 કોષો સાથે જોડવામાં અને પ્રવેશમાં મદદ કરે છે, પરંતુ તે રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચકની ક્રિયામાં કોઈ ભૂમિકા ભજવતું નથી. રિવર્સ ટ્રાન્સક્રિપ્ટેઝ એ અલગ ઉત્સેચક છે જે વાઇરલ RNA ને DNA માં રૂપાંતરિત કરે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એઇડ્સના દર્દીમાં 'સાયટોમેગાલોવાયરસ' (CMV) દ્વારા થતો રેટિનાઇટિસ નીચેનામાંથી કયા અંગને અસર કરે છે?", "opts": ["ફેફસાં", "આંખ", "યકૃત", "મગજ"], "ans": 1, "exp": "CMV રેટિનાઇટિસ આંખના રેટિનાને અસર કરે છે, જે દૃષ્ટિ હાનિ તરફ દોરી શકે છે. ફેફસાં, યકૃત, અને મગજ પર CMV ની અસર થઈ શકે છે, પરંતુ રેટિનાઇટિસ ખાસ કરીને આંખને અસર કરે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV વાઇરસ દ્વારા સંક્રમિત વ્યક્તિમાં 'વાયરલ સપ્રેશન' (Viral Suppression) હાંસલ કરવા માટે ART (એન્ટિરેટ્રોવાઇરલ થેરાપી) દરમિયાન નીચેનામાંથી કયું પગલું સૌથી અગત્યનું છે?", "opts": ["CD4 કોષોની સંખ્યા 200 થી ઓછી થાય ત્યારે તરત જ ઉપચાર શરૂ કરવો", "વાયરલ લોડને 200 કોપી/મિલી થી ઓછો કરવો અને તે સ્તરે ટકાવવો", "HIV વાઇરસના સંપૂર્ણ ઉન્મૂલન (Eradication) માટે ઉચ્ચ માત્રામાં દવાઓ લેવી", "રોગપ્રતિકારક શક્તિ વધારવા માટે ઇમ્યુનોમોડ્યુલેટર દવાઓ સાથે ART લેવી"], "ans": 1, "exp": "ART ઉપચારનો મુખ્ય ઉદ્દેશ વાયરલ લોડને 200 કોપી/મિલી થી ઓછો કરવો અને તે સ્તરે ટકાવવો છે, જેથી વાઇરસનું પ્રસારણ અને રોગની પ્રગતિ અટકાવી શકાય. CD4 કોષોની સંખ્યા 200 થી ઓછી થાય ત્યારે ઉપચાર શરૂ કરવો એ સંપૂર્ણપણે ખોટું નથી, પરંતુ વાયરલ સપ્રેશન એ મુખ્ય લક્ષ્ય છે. HIV વાઇરસનું સંપૂર્ણ ઉન્મૂલન શક્ય નથી, અને ઇમ્યુનોમોડ્યુલેટર દવાઓ ARTનો ભાગ નથી.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV વાઇરસના 'Nef' પ્રોટીન વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["તે વાઇરસના પ્રવેશ દરમિયાન કોષના સપાટી પરના CD4 રિસેપ્ટર સાથે જોડાય છે", "તે કોષની અંદર વાઇરસના પ્રજનનને વેગ આપે છે અને ઇમ્યુન સિસ્ટમને નબળી પાડે છે", "તે રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચકની ક્રિયાને અવરોધે છે", "તે વાઇરસના કેપ્સિડને તોડીને જીનોમને મુક્ત કરે છે"], "ans": 1, "exp": "'Nef' પ્રોટીન HIV વાઇરસ દ્વારા ઉત્પન્ન થતું પ્રોટીન છે જે કોષની અંદર વાઇરસના પ્રજનનને વેગ આપે છે અને ઇમ્યુન સિસ્ટમને નબળી પાડે છે. CD4 રિસેપ્ટર સાથે જોડાવું એ 'gp120' પ્રોટીનની ભૂમિકા છે. રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચકની ક્રિયા અવરોધવી એ 'AZT' જેવી દવાઓની ભૂમિકા છે. કેપ્સિડને તોડવું એ 'વાઇરલ પ્રોટીએઝ' ઉત્સેચકની ભૂમિકા છે.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એઇડ્સના દર્દીમાં 'ક્રિપ્ટોકોકલ મેનિનજાઇટિસ' નામનો રોગ થવાનું મુખ્ય કારણ કયું છે?", "opts": ["HIV વાઇરસ દ્વારા સીધી રીતે મગજને સંક્રમિત કરવું", "ઇમ્યુન સિસ્ટમની નબળાઈને લીધે 'ક્રિપ્ટોકોકસ નિયોફોર્મન્સ' નામના ફંગસ દ્વારા સંક્રમણ થવું", "CD8 કોષોની સંખ્યામાં અચાનક વધારો થવો", "એન્ટિબોડીના ઉત્પાદનમાં અચાનક વધારો થવો"], "ans": 1, "exp": "'ક્રિપ્ટોકોકલ મેનિનજાઇટિસ' એ 'ક્રિપ્ટોકોકસ નિયોફોર્મન્સ' નામના ફંગસ દ્વારા થતો રોગ છે, જે ઇમ્યુન સિસ્ટમની નબળાઈને લીધે એઇડ્સના દર્દીમાં જોવા મળે છે. HIV વાઇરસ સીધી રીતે મગજને સંક્રમિત કરતું નથી. CD8 કોષોની સંખ્યામાં વધારો અથવા એન્ટિબોડીના ઉત્પાદનમાં વધારો એ ઇમ્યુન સિસ્ટમની નબળાઈનું કારણ નથી.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "HIV વાઇરસના જીવનચક્ર દરમિયાન 'Vpr' પ્રોટીનની ભૂમિકા શું છે?", "opts": ["તે વાઇરસના DNAને કોષકેન્દ્રમાં પ્રવેશ કરાવવામાં મદદ કરે છે", "તે કોષની વૃદ્ધિને અટકાવે છે અને વાઇરસના પ્રજનનને વેગ આપે છે", "તે વાઇરસના RNAને DNAમાં રૂપાંતરિત કરે છે", "તે કોષની સપાટી પરના રિસેપ્ટર સાથે જોડાય છે"], "ans": 1, "exp": "'Vpr' પ્રોટીન કોષની વૃદ્ધિને અટકાવે છે અને વાઇરસના પ્રજનનને વેગ આપે છે. વાઇરસના DNAને કોષકેન્દ્રમાં પ્રવેશ કરાવવામાં 'Vpr' ની ભૂમિકા નહીંવત છે, તે કામ 'Matrix' પ્રોટીન અને 'Integrase' ઉત્સેચક કરે છે. RNAને DNAમાં રૂપાંતરિત કરવું એ 'રિવર્સ ટ્રાન્સક્રિપ્ટેઝ' ઉત્સેચકની ભૂમિકા છે. કોષની સપાટી પરના રિસેપ્ટર સાથે જોડાવું એ 'gp120' પ્રોટીનની ભૂમિકા છે.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એઇડ્સના દર્દીમાં 'પ્રોગ્રેસિવ મલ્ટિફોકલ લ્યુકોએન્સેફેલોપથી' (PML) નામનો રોગ થવાનું કારણ કયો વાઇરસ છે?", "opts": ["સાયટોમેગાલોવાયરસ (CMV)", "જે.સી. વાઇરસ (JC Virus)", "હર્પીસ સિમ્પ્લેક્સ વાઇરસ (HSV)", "એપ્સ્ટાઇન-બાર વાઇરસ (EBV)"], "ans": 1, "exp": "'પ્રોગ્રેસિવ મલ્ટિફોકલ લ્યુકોએન્સેફેલોપથી' (PML) એ 'જે.સી. વાઇરસ' (JC Virus) દ્વારા થતો રોગ છે, જે ઇમ્યુન સિસ્ટમની નબળાઈને લીધે એઇડ્સના દર્દીમાં જોવા મળે છે. સાયટોમેગાલોવાયરસ (CMV) રેટિનાઇટિસનું કારણ છે, હર્પીસ સિમ્પ્લેક્સ વાઇરસ (HSV) મુખ્યત્વે ત્વચા અને શ્લેષ્મલ તંત્રને અસર કરે છે, અને એપ્સ્ટાઇન-બાર વાઇરસ (EBV) લિમ્ફોમા અને અન્ય કેંસરનું કારણ બને છે.", "ref": "Std 12 - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
