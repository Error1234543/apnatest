<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>તમાકુ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>તમાકુ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">તમાકુ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "તમાકુના ધૂમાડામાં રહેલા કયા રસાયણના કારણે ફેફસાંના કોષોના DNAમાં પરિવર્તન થઈ શકે છે, જે કર્કરોગ (કૅન્સર) તરફ દોરી શકે છે?", "opts": ["નિકોટીન", "કાર્બન મોનોક્સાઇડ", "બેંઝોપાયરિન", "ટાર (ટાર પદાર્થો)"], "ans": 3, "exp": "તમાકુના ધૂમાડામાં રહેલા ટાર (ટાર પદાર્થો) ફેફસાંના કોષોના DNA સાથે પ્રતિક્રિયા કરે છે અને તેના પરિવર્તન (મ્યુટેશન) તરફ દોરી શકે છે, જે કર્કરોગનો ખતરો વધારે છે. નિકોટીન વ્યસન કરે છે પરંતુ સીધા DNA નુકસાન કરતું નથી. કાર્બન મોનોક્સાઇડ રક્તમાં ઓક્સિજનના વહનને અસર કરે છે. બેંઝોપાયરિન પણ કર્કરોગજનક છે, પરંતુ ટાર વધુ સીધી અસર કરે છે.", "ref": "Std 12 - Chapter 7: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "તમાકુના સેવનથી ચેતાતંત્ર પર કયો પ્રભાવ થાય છે, જેના કારણે વ્યક્તિને તણાવમાં રાહત અનુભવાય છે?", "opts": ["નિકોટીન એડ્રિનાલિનના સ્રાવને ઉત્તેજે છે", "નિકોટીન ડોપામીનના સ્રાવને ઉત્તેજે છે", "કાર્બન મોનોક્સાઇડ મગજના કોષોને નિષ્ક્રિય કરે છે", "ટાર મગજની પેશીઓને સંકોચે છે"], "ans": 1, "exp": "નિકોટીન ડોપામીન હોર્મોનના સ્રાવને ઉત્તેજે છે, જે તણાવમાં રાહત અને આનંદની લાગણી ઉત્પન્ન કરે છે. એડ્રિનાલિન તણાવ હોર્મોન છે અને તેનું સ્રાવ વધારાથી તણાવ વધે છે. કાર્બન મોનોક્સાઇડ અને ટાર મગજ પર સીધી અસર કરતા નથી, પરંતુ શરીરના અન્ય ભાગોને નુકસાન પહોંચાડે છે.", "ref": "Std 12 - Chapter 7: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "તમાકુના ધૂમાડામાં રહેલા કયા રસાયણના કારણે રક્તમાં હીમોગ્લોબિનની ઓક્સિજન વહન ક્ષમતા ઘટે છે?", "opts": ["નિકોટીન", "કાર્બન મોનોક્સાઇડ", "ટાર", "અમોનિયા"], "ans": 1, "exp": "કાર્બન મોનોક્સાઇડ હીમોગ્લોબિન સાથે જોડાઈને કાર્બોક્સીહીમોગ્લોબિન બનાવે છે, જેના કારણે રક્તની ઓક્સિજન વહન ક્ષમતા ઘટે છે. નિકોટીન, ટાર અને અમોનિયા આ પ્રક્રિયામાં સીધી અસર કરતા નથી.", "ref": "Std 12 - Chapter 7: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "તમાકુના લાંબા ગાળાના સેવનથી કયા અંગ પર સૌથી વધુ નકારાત્મક અસર થાય છે, જેના કારણે શ્વસન તંત્રના રોગો થાય છે?", "opts": ["હૃદય", "યકૃત", "ફેફસાં", "મગજ"], "ans": 2, "exp": "તમાકુના લાંબા ગાળાના સેવનથી ફેફસાં પર સૌથી વધુ નકારાત્મક અસર થાય છે, જેના કારણે શ્વસન તંત્રના રોગો જેવા કે ક્રોનિક બ્રોન્કાઇટિસ, એમ્ફિસેમા અને ફેફસાંનો કર્કરોગ થાય છે. હૃદય, યકૃત અને મગજ પર પણ અસર થાય છે, પરંતુ ફેફસાં સૌથી વધુ પ્રભાવિત થાય છે.", "ref": "Std 12 - Chapter 7: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "તમાકુના સેવનથી કયા હોર્મોનના સ્રાવ પર અસર થાય છે, જેના કારણે વ્યક્તિને ભૂખ લાગવી બંધ થાય છે?", "opts": ["ઇન્સ્યુલિન", "લેપ્ટિન", "નિકોટીન એસિટાઇલકોલિન રિસેપ્ટરને ઉત્તેજે છે, જે ભૂખને દબાવે છે", "એડ્રિનાલિન"], "ans": 2, "exp": "નિકોટીન એસિટાઇલકોલિન રિસેપ્ટરને ઉત્તેજે છે, જેના કારણે ભૂખ દબાય છે. ઇન્સ્યુલિન રક્તમાં ગ્લુકોઝના સ્તરને નિયંત્રિત કરે છે, લેપ્ટિન ભૂખને દબાવે છે પરંતુ તે તમાકુ સાથે સીધો સંબંધ ધરાવતું નથી, અને એડ્રિનાલિન તણાવ હોર્મોન છે.", "ref": "Std 12 - Chapter 7: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "તમાકુના પાનમાં રહેલા કયા અલ્કેલોઈડના કારણે તેના સેવનથી મગજમાં ડોપામાઇનના સ્રાવમાં વધારો થાય છે, જેના કારણે વ્યક્તિને આનંદની અનુભૂતિ થાય છે?", "opts": ["કોફીન", "નિકોટિન", "મોર્ફિન", "કોકેઇન"], "ans": 1, "exp": "નિકોટિન એ તમાકુના પાનમાં રહેલો મુખ્ય અલ્કેલોઈડ છે, જે મગજમાં ડોપામાઇનના સ્રાવને ઉત્તેજિત કરે છે, જેના કારણે વ્યક્તિને આનંદની અનુભૂતિ થાય છે. કોફીન, મોર્ફિન અને કોકેઇન એ તમાકુ સાથે સંકળાયેલા નથી. કોફીન કોફી અને ચહામાં જોવા મળે છે, મોર્ફિન અફીણમાંથી મેળવવામાં આવે છે, અને કોકેઇન કોકા પાનમાંથી મેળવવામાં આવે છે.", "ref": "Std 12 - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "તમાકુના ધૂમાડામાં રહેલા કયા રસાયણના કારણે શ્વસનતંત્રની પેશીઓમાં ક્રોનિક ઇન્ફ્લેમેશન થાય છે, જેના કારણે બ્રોન્કાઇટિસ જેવા રોગો થાય છે?", "opts": ["કાર્બન મોનોક્સાઇડ", "ટાર", "ફોર્મલડિહાઇડ", "બેન્ઝપાયરિન"], "ans": 2, "exp": "ફોર્મલડિહાઇડ એ તમાકુના ધૂમાડામાં રહેલો એક રસાયણ છે, જે શ્વસનતંત્રની પેશીઓમાં ક્રોનિક ઇન્ફ્લેમેશનનું કારણ બને છે, જેના કારણે બ્રોન્કાઇટિસ જેવા રોગો થાય છે. કાર્બન મોનોક્સાઇડ રક્તમાં હીમોગ્લોબિનની ઓક્સિજન વહન ક્ષમતા ઘટાડે છે, ટાર ફેફસાંના કોષોના DNAમાં પરિવર્તન કરે છે, અને બેન્ઝપાયરિન કર્કરોગજનક છે.", "ref": "Std 12 - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "તમાકુના સેવનથી કયા અંગ પર અસર થાય છે, જેના કારણે વ્યક્તિને હૃદયરોગનો ખતરો વધે છે?", "opts": ["ફેફસાં", "યકૃત", "હૃદય", "મગજ"], "ans": 2, "exp": "તમાકુના સેવનથી હૃદય પર અસર થાય છે, જેના કારણે વ્યક્તિને હૃદયરોગનો ખતરો વધે છે. તમાકુના ધૂમાડામાં રહેલા રસાયણો હૃદયની રક્તવાહિનીઓને નુકસાન પહોંચાડે છે, જેના કારણે હૃદયરોગ થાય છે. ફેફસાં, યકૃત અને મગજ પર પણ અસર થાય છે, પરંતુ હૃદયરોગનો ખતરો સૌથી વધુ હૃદય પર અસર કરે છે.", "ref": "Std 12 - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "તમાકુના ધૂમાડામાં રહેલા કયા રસાયણના કારણે ગર્ભવતી મહિલાઓમાં ગર્ભના વિકાસ પર નકારાત્મક અસર થાય છે?", "opts": ["નિકોટિન", "કાર્બન ડાયોક્સાઇડ", "કાર્બન મોનોક્સાઇડ", "અમોનિયા"], "ans": 2, "exp": "કાર્બન મોનોક્સાઇડ એ તમાકુના ધૂમાડામાં રહેલો એક રસાયણ છે, જે ગર્ભવતી મહિલાઓમાં ગર્ભના વિકાસ પર નકારાત્મક અસર કરે છે. તે રક્તમાં હીમોગ્લોબિન સાથે જોડાઈને ઓક્સિજનના વહનને અટકાવે છે, જેના કારણે ગર્ભને પૂરતો ઓક્સિજન મળતો નથી. નિકોટિન, કાર્બન ડાયોક્સાઇડ અને અમોનિયા પણ નુકસાનકારક છે, પરંતુ કાર્બન મોનોક્સાઇડની અસર સૌથી ગંભીર છે.", "ref": "Std 12 - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "તમાકુના ધૂમાડામાં રહેલા બેન્ઝોપાયરિન અને નિકોટિન બંનેના સંયોજિત પ્રભાવથી કયા જનીનના મ્યુટેશનની શક્યતા સૌથી વધુ હોય છે, જેના કારણે કોષચક્ર નિયંત્રણમાં ખલેલ પડે છે?", "opts": ["p53 ટ્યુમર સપ્રેસર જનીન", "BRCA1 જનીન", "CFTR જનીન", "હીમોગ્લોબિન બીટા-ગ્લોબિન જનીન"], "ans": 0, "exp": "બેન્ઝોપાયરિન (કાર્સિનોજેન) અને નિકોટિન (કોષવિભાજનને ઉત્તેજિત કરનાર)ના સંયોજિત પ્રભાવથી p53 ટ્યુમર સપ્રેસર જનીનમાં મ્યુટેશન થવાની શક્યતા સૌથી વધુ હોય છે, જે કોષચક્રને નિયંત્રિત કરે છે અને કૅન્સરના વિકાસને અટકાવે છે. BRCA1 કૅન્સર સપ્રેસર છે પરંતુ મુખ્યત્વે સ્તન કૅન્સર સાથે સંબંધિત છે. CFTR મ્યુકોવિસિડોસિસ સાથે અને હીમોગ્લોબિન બીટા-ગ્લોબિન એનિમિયા સાથે સંબંધિત છે, તમાકુ સાથે નહીં.", "ref": "Std 12 - Chapter 8: અનુવંશિકતા અને ઉત્ક્રાંતિ (વિશેષ રસાયણજન્ય મ્યુટેશન)", "ch": ""}, {"q": "તમાકુના છોડમાં નિકોટિનનું સંશ્લેષણ મુખ્યત્વે કયા અંગમાં થાય છે અને તેના માટે જવાબદાર ઉત્સેચક કયો છે?", "opts": ["મૂળમાં, નિકોટિન સિન્થેઝ", "પર્ણોમાં, ટ્રિપ્ટોફેન ડિકાર્બોક્સિલેઝ", "મૂળમાં, ઓર્નિથિન ડિકાર્બોક્સિલેઝ", "પ્રકાંડમાં, ફેનીલએલેનિન એમોનિયા-લાયેઝ"], "ans": 2, "exp": "તમાકુના છોડમાં નિકોટિનનું સંશ્લેષણ મુખ્યત્વે મૂળમાં થાય છે અને તેના માટે ઓર્નિથિન ડિકાર્બોક્સિલેઝ ઉત્સેચક જવાબદાર છે. નિકોટિન સિન્થેઝ ઉત્સેચક વાસ્તવમાં અસ્તિત્વમાં નથી, ટ્રિપ્ટોફેન ડિકાર્બોક્સિલેઝ સેરોટોનિનના સંશ્લેષણમાં ભાગ લે છે, અને ફેનીલએલેનિન એમોનિયા-લાયેઝ ફિનોલિક સંયોજનોના સંશ્લેષણમાં ભાગ લે છે.", "ref": "Std 12 - પ્રકરણ 9: વનસ્પતિઓમાં ખનીજ પોષણ અને નાઇટ્રોજન ચયાપચય", "ch": ""}, {"q": "તમાકુના ધૂમાડામાં રહેલા 'ટાર'માં કયું રાસાયણિક સંયોજન હાજર નથી, જે સામાન્ય રીતે કોષોમાં ઓક્સિડેટિવ તણાવ વધારવા માટે જવાબદાર છે?", "opts": ["બેન્ઝોપાયરિન", "ફોર્માલ્ડિહાઇડ", "હાઇડ્રોજન પેરોક્સાઇડ", "નાઇટ્રોસેમાઇન"], "ans": 2, "exp": "તમાકુના ધૂમાડામાં રહેલા 'ટાર'માં હાઇડ્રોજન પેરોક્સાઇડ હાજર નથી. બેન્ઝોપાયરિન, ફોર્માલ્ડિહાઇડ અને નાઇટ્રોસેમાઇન ટારમાં હાજર હોય છે અને તે ઓક્સિડેટિવ તણાવ વધારવામાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે. હાઇડ્રોજન પેરોક્સાઇડ સામાન્ય રીતે કોષીય ચયાપચયની આડપેદાશ તરીકે ઉત્પન્ન થાય છે, પરંતુ તે ટારનો ઘટક નથી.", "ref": "Std 11 - પ્રકરણ 14: પર્યાવરણીય રસાયણશાસ્ત્ર", "ch": ""}, {"q": "તમાકુના સેવનથી શરીરના પ્રતિરક્ષાતંત્ર પર થતી અસરોમાંથી કઈ અસર સાચી નથી?", "opts": ["મેક્રોફેજની ફેગોસાઇટોસિસ ક્ષમતા ઘટે છે", "લિમ્ફોસાઇટ્સની સંખ્યામાં વધારો થાય છે", "નેચરલ કિલર કોષોની પ્રવૃત્તિમાં ઘટાડો થાય છે", "ઇમ્યુનોગ્લોબ્યુલિન A (IgA)નું સ્તર ઘટે છે"], "ans": 1, "exp": "તમાકુના સેવનથી લિમ્ફોસાઇટ્સની સંખ્યામાં વધારો થતો નથી. વાસ્તવમાં, તમાકુના સેવનથી લિમ્ફોસાઇટ્સની પ્રવૃત્તિમાં ઘટાડો થાય છે. અન્ય વિકલ્પો સાચા છે: મેક્રોફેજની ફેગોસાઇટોસિસ ક્ષમતા ઘટે છે, નેચરલ કિલર કોષોની પ્રવૃત્તિમાં ઘટાડો થાય છે, અને IgAનું સ્તર ઘટે છે.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "તમાકુના છોડમાં નિકોટિનનું પરિવહન કયા પ્રકારની પેશી દ્વારા થાય છે અને તેનો મુખ્ય સંગ્રહ સ્થાન કયું છે?", "opts": ["જલવાહિની, મૂળના કોષરસમાં", "અન્નવાહિની, પર્ણોના વેક્યુઓલમાં", "જલવાહિની, પ્રકાંડના વેસ્ક્યુલર બંડલમાં", "અન્નવાહિની, મૂળના વેક્યુઓલમાં"], "ans": 1, "exp": "તમાકુના છોડમાં નિકોટિનનું પરિવહન અન્નવાહિની દ્વારા થાય છે અને તેનો મુખ્ય સંગ્રહ પર્ણોના વેક્યુઓલમાં થાય છે. નિકોટિન એક આલ્કલોઇડ છે જેનો પરિવહન ફ્લોએમ (અન્નવાહિની) દ્વારા થાય છે, અને તે મુખ્યત્વે પર્ણોમાં સંગ્રહિત થાય છે.", "ref": "Std 11 - પ્રકરણ 6: વનસ્પતિઓમાં પરિવહન", "ch": ""}, {"q": "તમાકુના ધૂમાડામાં રહેલા એક રસાયણના કારણે કોષોમાં DNA મેથિલેશન પેટર્નમાં ફેરફાર થાય છે, જેના પરિણામે જનીન અભિવ્યક્તિ પર અસર થાય છે. આ રસાયણ કયું છે અને તે કયા પ્રકારનું એપિજેનેટિક ફેરફાર કરે છે?", "opts": ["બેન્ઝોપાયરિન, હાઇપોમેથિલેશન", "આર્સેનિક, હાઇપરમેથિલેશન", "નિકોટિન, હિસ્ટોન એસિટાઇલેશન", "કેડમિયમ, DNA હાઇપરમેથિલેશન"], "ans": 3, "exp": "તમાકુના ધૂમાડામાં રહેલા કેડમિયમના કારણે DNA હાઇપરમેથિલેશન થાય છે, જે એક પ્રકારનો એપિજેનેટિક ફેરફાર છે. બેન્ઝોપાયરિન મ્યુટાજેનિક છે પરંતુ તે મુખ્યત્વે હાઇપોમેથિલેશન સાથે સંકળાયેલ નથી. આર્સેનિક તમાકુના ધૂમાડામાં હાજર નથી અને નિકોટિન મુખ્યત્વે હિસ્ટોન એસિટાઇલેશનને અસર કરે છે, DNA મેથિલેશનને નહીં.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "ch": ""}, {"q": "તમાકુના ધૂમાડામાં રહેલા કયા રસાયણના કારણે કોષના માઇટોકોન્ડ્રિયામાં શ્વસનની ક્રિયામાં અવરોધ ઉત્પન્ન થાય છે, જેના પરિણામે ATPનું ઉત્પાદન ઘટે છે?", "opts": ["કાર્બન મોનોક્સાઇડ", "નિકોટિન", "સાયનાઇડ", "ફોર્માલ્ડિહાઇડ"], "ans": 2, "exp": "સાયનાઇડ માઇટોકોન્ડ્રિયામાં સાયટોક્રોમ સી ઓક્સિડેઝ ઉત્સેચકને અવરોધે છે, જેના કારણે ઇલેક્ટ્રોન ટ્રાન્સપોર્ટ ચેઇનમાં અવરોધ ઉત્પન્ન થાય છે અને ATPનું ઉત્પાદન ઘટે છે. કાર્બન મોનોક્સાઇડ હીમોગ્લોબિન સાથે જોડાઈને ઓક્સિજન વહનને અસર કરે છે, નિકોટિન ચેતાતંત્રને ઉત્તેજિત કરે છે, અને ફોર્માલ્ડિહાઇડ DNA અને પ્રોટીન સાથે પ્રતિક્રિયા કરે છે પરંતુ માઇટોકોન્ડ્રિયલ શ્વસનને સીધી અસર કરતું નથી.", "ref": "Std 12 - Chapter 7: શ્વસન અને ઉર્જા ઉત્પાદન", "ch": ""}, {"q": "તમાકુના સેવનથી કયા જનીનના મ્યુટેશનના કારણે ફેફસાંના કોષોમાં અંકુશરહિત કોષવિભાજન થાય છે, જે કર્કરોગના વિકાસ તરફ દોરી જાય છે?", "opts": ["p53", "BRCA1", "CFTR", "HbA"], "ans": 0, "exp": "p53 જનીન એક ટ્યુમર સપ્રેસર જનીન છે, જે કોષચક્રને નિયંત્રિત કરે છે. તમાકુના ધૂમાડામાં રહેલા કર્સિનોજેનિક રસાયણો p53 જનીનમાં મ્યુટેશન ઉત્પન્ન કરે છે, જેના કારણે કોષવિભાજન અંકુશરહિત થાય છે અને કર્કરોગનો વિકાસ થાય છે. BRCA1 સ્તન કર્કરોગ સાથે સંબંધિત છે, CFTR સિસ્ટિક ફાઇબ્રોસિસ સાથે સંબંધિત છે, અને HbA હીમોગ્લોબિન સાથે સંબંધિત છે.", "ref": "Std 12 - Chapter 4: કોષચક્ર અને કોષવિભાજન", "ch": ""}, {"q": "તમાકુના ધૂમાડામાં રહેલા કયા રસાયણના કારણે રક્તવાહિનીઓમાં એથેરોસ્ક્લેરોસિસ થાય છે, જેના પરિણામે હૃદયરોગનો ખતરો વધે છે?", "opts": ["નિકોટિન", "કાર્બન મોનોક્સાઇડ", "એસિટાલ્ડિહાઇડ", "બેન્ઝોપાયરિન"], "ans": 3, "exp": "બેન્ઝોપાયરિન રક્તવાહિનીઓની દીવાલને નુકસાન પહોંચાડે છે અને એથેરોસ્ક્લેરોસિસના વિકાસને પ્રોત્સાહન આપે છે, જેના પરિણામે હૃદયરોગનો ખતરો વધે છે. નિકોટિન રક્તવાહિનીઓને સંકોચે છે, કાર્બન મોનોક્સાઇડ ઓક્સિજન વહનને અસર કરે છે, અને એસિટાલ્ડિહાઇડ યકૃતને નુકસાન પહોંચાડે છે.", "ref": "Std 12 - Chapter 18: શરીર અને સ્વાસ્થ્ય", "ch": ""}, {"q": "તમાકુના સેવનથી કયા હોર્મોનના સ્તરમાં ઘટાડો થાય છે, જેના કારણે વ્યક્તિને ચિંતા અને તણાવનો અનુભવ થાય છે?", "opts": ["એડ્રિનાલિન", "સેરોટોનિન", "ઇન્સ્યુલિન", "થાયરોક્સિન"], "ans": 1, "exp": "તમાકુના સેવનથી મગજમાં સેરોટોનિનના સ્તરમાં ઘટાડો થાય છે, જેના કારણે વ્યક્તિને ચિંતા અને તણાવનો અનુભવ થાય છે. એડ્રિનાલિન તણાવ હોર્મોન છે જેનું સ્તર વધે છે, ઇન્સ્યુલિન રક્તમાં ગ્લુકોઝના સ્તરને નિયંત્રિત કરે છે, અને થાયરોક્સિન ચયાપચયને નિયંત્રિત કરે છે.", "ref": "Std 12 - Chapter 22: ચેતાતંત્ર અને હોર્મોનલ સંકલન", "ch": ""}, {"q": "તમાકુના ધૂમાડામાં રહેલા કયા રસાયણના કારણે કોષના સાયટોપ્લાઝમમાં રિએક્ટિવ ઓક્સિજન સ્પીશીઝ (ROS)નું ઉત્પાદન વધે છે, જેના પરિણામે ઓક્સિડેટિવ તણાવ થાય છે?", "opts": ["નિકોટિન", "ટાર", "કાર્બન મોનોક્સાઇડ", "હાઇડ્રોજન પેરોક્સાઇડ"], "ans": 1, "exp": "ટાર કોષના સાયટોપ્લાઝમમાં રિએક્ટિવ ઓક્સિજન સ્પીશીઝ (ROS)નું ઉત્પાદન વધારે છે, જેના પરિણામે ઓક્સિડેટિવ તણાવ થાય છે અને કોષને નુકસાન પહોંચાડે છે. નિકોટિન ચેતાતંત્રને ઉત્તેજિત કરે છે, કાર્બન મોનોક્સાઇડ ઓક્સિજન વહનને અસર કરે છે, અને હાઇડ્રોજન પેરોક્સાઇડ એક ROS છે પરંતુ તે તમાકુના ધૂમાડામાં મુખ્ય રસાયણ નથી.", "ref": "Std 12 - Chapter 7: શ્વસન અને ઉર્જા ઉત્પાદન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
