<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ગર્ભાવસ્થા</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ગર્ભાવસ્થા</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ગર્ભાવસ્થા</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ગર્ભાવસ્થા દરમિયાન માતાના રુધિરમાંથી ગર્ભના રુધિરમાં ઑક્સિજનનું વહન કયા ભાગ દ્વારા થાય છે?", "opts": ["ગર્ભનાળની શિરાઓ દ્વારા", "ગર્ભનાળની ધમનીઓ દ્વારા", "જરાયુના વિલ્લી દ્વારા", "ગર્ભાશયની દીવાલ દ્વારા"], "ans": 2, "exp": "સાચો જવાબ: C) જરાયુના વિલ્લી દ્વારા. ગર્ભાવસ્થા દરમિયાન માતાના રુધિરમાંથી ઑક્સિજન અને પોષક તત્ત્વો ગર્ભના રુધિરમાં જરાયુના વિલ્લી (chorionic villi) દ્વારા પ્રસરણ પામે છે. ગર્ભનાળની શિરાઓ (A) ગર્ભથી માતા તરફ રુધિર લઈ જાય છે, જ્યારે ગર્ભનાળની ધમનીઓ (B) માતાથી ગર્ભ તરફ ઓછું ઑક્સિજનયુક્ત રુધિર લઈ જાય છે. ગર્ભાશયની દીવાલ (D) માત્ર ભૌતિક આધાર પૂરો પાડે છે, તે વાયુઓનું વહન કરતી નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "ગર્ભાવસ્થાના પ્રથમ ત્રિમાસિક ગાળામાં કયું હોર્મોન ગર્ભાશયની દીવાલને જાળવવામાં મુખ્ય ભૂમિકા ભજવે છે?", "opts": ["પ્રોજેસ્ટેરોન", "એસ્ટ્રોજન", "હ્યુમન કોરિઓનિક ગોનાડોટ્રોપિન (hCG)", "ઓક્સિટોસિન"], "ans": 2, "exp": "સાચો જવાબ: C) હ્યુમન કોરિઓનિક ગોનાડોટ્રોપિન (hCG). ગર્ભાવસ્થાના પ્રથમ ત્રિમાસિક ગાળામાં hCG હોર્મોન ગર્ભાશયની દીવાલ (endometrium)ને જાળવી રાખવામાં અને કોર્પસ લ્યુટિયમને પ્રોજેસ્ટેરોન ઉત્પન્ન કરવા પ્રેરિત કરવામાં મુખ્ય ભૂમિકા ભજવે છે. પ્રોજેસ્ટેરોન (A) અને એસ્ટ્રોજન (B) પણ મહત્ત્વના છે, પરંતુ પ્રથમ ત્રિમાસિકમાં hCG વધુ નિર્ણાયક છે. ઓક્સિટોસિન (D) પ્રસૂતિ દરમિયાન ગર્ભાશયના સંકોચન માટે જવાબદાર છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "ગર્ભાવસ્થા દરમિયાન માતાના શરીરમાં કયું પરિવર્તન સામાન્ય રીતે જોવા મળતું નથી?", "opts": ["રુધિરનું કદ વધવું", "હૃદયના ધબકારાનો દર વધવો", "શ્વસન દરમાં ઘટાડો", "કિડની દ્વારા વધુ પ્રમાણમાં પાણીનું ઉત્સર્જન"], "ans": 2, "exp": "સાચો જવાબ: C) શ્વસન દરમાં ઘટાડો. ગર્ભાવસ્થા દરમિયાન માતાના શરીરમાં રુધિરનું કદ વધે છે (A), હૃદયના ધબકારાનો દર વધે છે (B), અને કિડની દ્વારા વધુ પાણીનું ઉત્સર્જન થાય છે (D), પરંતુ શ્વસન દર સામાન્ય રીતે વધે છે, ઘટતો નથી. આનું કારણ ગર્ભ માટે વધારાના ઑક્સિજનની જરૂરિયાત છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "ગર્ભાવસ્થા દરમિયાન ગર્ભના વિકાસ માટે જરૂરી આયર્ન અને કેલ્શિયમ જેવા ખનિજોનું શોષણ કયા અંગમાં થાય છે?", "opts": ["જઠર", "નાના આંતરડા", "મોટા આંતરડા", "યકૃત"], "ans": 1, "exp": "સાચો જવાબ: B) નાના આંતરડા. ગર્ભાવસ્થા દરમિયાન આયર્ન અને કેલ્શિયમ જેવા ખનિજોનું શોષણ મુખ્યત્વે નાના આંતરડામાં થાય છે. જઠર (A) ખોરાકનું પાચન કરે છે, પરંતુ શોષણ કરતું નથી. મોટા આંતરડા (C) મુખ્યત્વે પાણીનું શોષણ કરે છે, જ્યારે યકૃત (D) પોષક તત્ત્વોનો સંગ્રહ અને ચયાપચય કરે છે, પરંતુ શોષણ કરતું નથી.", "ref": "Std 11 - પ્રકરણ 16: પાચન અને શોષણ", "ch": ""}, {"q": "ગર્ભાવસ્થાના અંતિમ તબક્કામાં ગર્ભનું માથું નીચેની તરફ ગર્ભાશયમાં ગોઠવાય છે. આ સ્થિતિને શું કહે છે?", "opts": ["બ્રીચ સ્થિતિ", "સેફાલિક પ્રેઝન્ટેશન", "ટ્રાન્સવર્સ લાઇ", "ઓબ્લિક લાઇ"], "ans": 1, "exp": "સાચો જવાબ: B) સેફાલિક પ્રેઝન્ટેશન. ગર્ભાવસ્થાના અંતિમ તબક્કામાં ગર્ભનું માથું નીચેની તરફ ગોઠવાય છે, જેને સેફાલિક પ્રેઝન્ટેશન કહે છે. આ સામાન્ય સ્થિતિ છે જે પ્રસૂતિને સરળ બનાવે છે. બ્રીચ સ્થિતિ (A)માં ગર્ભનું નિતંબ નીચેની તરફ હોય છે. ટ્રાન્સવર્સ લાઇ (C) અને ઓબ્લિક લાઇ (D)માં ગર્ભ આડો અથવા ત્રાંસો ગોઠવાયેલો હોય છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "ગર્ભાવસ્થા દરમિયાન માતાના શરીરમાં 'હ્યુમન પ્લેસેન્ટલ લેક્ટોજેન' (hPL) હોર્મોનનું મુખ્ય કાર્ય શું છે?", "opts": ["ગર્ભાશયના સ્નાયુઓને સંકોચન માટે તૈયાર કરવા", "માતાના રુધિરમાં ગ્લુકોઝનું પ્રમાણ વધારી ગર્ભને પોષણ પૂરું પાડવું", "ગર્ભના હૃદયના ધબકારા નિયંત્રિત કરવા", "માતાના શરીરમાં પ્રોલેક્ટિન હોર્મોનનું ઉત્પાદન ઘટાડવું"], "ans": 1, "exp": "'હ્યુમન પ્લેસેન્ટલ લેક્ટોજેન' (hPL) હોર્મોન માતાના રુધિરમાં ગ્લુકોઝનું પ્રમાણ વધારીને ગર્ભને વધુ ઊર્જા પૂરી પાડે છે, જે ગર્ભના વિકાસ માટે જરૂરી છે. વિકલ્પ A ખોટો છે કારણ કે ગર્ભાશયના સંકોચન માટે ઑક્સિટોસિન હોર્મોન જવાબદાર છે. વિકલ્પ C ખોટો છે કારણ કે ગર્ભના હૃદયના ધબકારા નિયંત્રિત કરવા માટે કોઈ ચોક્કસ હોર્મોન નથી. વિકલ્પ D ખોટો છે કારણ કે hPL પ્રોલેક્ટિનના ઉત્પાદનને અસર કરતું નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન અને પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "ગર્ભાવસ્થા દરમિયાન 'એમ્નિઓટિક પ્રવાહી' (Amniotic Fluid) નું મુખ્ય કાર્ય શું નથી?", "opts": ["ગર્ભને યાંત્રિક આંચકા સામે રક્ષણ આપવું", "ગર્ભના શ્વસન માટે ઑક્સિજન પૂરો પાડવો", "ગર્ભના શરીરનું તાપમાન જાળવવું", "ગર્ભની હલનચલન માટે યોગ્ય વાતાવરણ પૂરું પાડવું"], "ans": 1, "exp": "'એમ્નિઓટિક પ્રવાહી' ગર્ભને યાંત્રિક આંચકા સામે રક્ષણ આપે છે, તાપમાન જાળવે છે અને હલનચલન માટે યોગ્ય વાતાવરણ પૂરું પાડે છે, પરંતુ તે ગર્ભના શ્વસન માટે ઑક્સિજન પૂરો પાડતું નથી. ગર્ભને ઑક્સિજન પ્લેસેન્ટા દ્વારા માતાના રુધિરમાંથી મળે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન અને પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "ગર્ભાવસ્થાના દરમિયાન માતાના શરીરમાં 'રિલેક્સિન' હોર્મોનનું મુખ્ય કાર્ય શું છે?", "opts": ["ગર્ભાશયના સ્નાયુઓને સંકોચન માટે ઉત્તેજિત કરવા", "પેલ્વિક અસ્થિઓ અને સાંધાઓને ઢીલા કરી પ્રસૂતિ માટે તૈયાર કરવા", "માતાના રુધિરમાં કેલ્શિયમનું પ્રમાણ વધારવું", "ગર્ભના મગજના વિકાસને પ્રોત્સાહન આપવું"], "ans": 1, "exp": "'રિલેક્સિન' હોર્મોન પેલ્વિક અસ્થિઓ અને સાંધાઓને ઢીલા કરીને પ્રસૂતિ માટે તૈયાર કરે છે, જેથી બાળકનું જન્મ સરળ બને. વિકલ્પ A ખોટો છે કારણ કે ગર્ભાશયના સંકોચન માટે ઑક્સિટોસિન જવાબદાર છે. વિકલ્પ C અને D ખોટા છે કારણ કે રિલેક્સિન આ કાર્યો સાથે સંકળાયેલું નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન અને પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "ગર્ભાવસ્થા દરમિયાન 'કોલોસ્ટ્રમ' (Colostrum) નું મહત્ત્વ શું છે?", "opts": ["તે ગર્ભના વિકાસ માટે જરૂરી પ્રોટીન પૂરું પાડે છે", "તે નવજાત શિશુને પ્રથમ રોગપ્રતિકારક શક્તિ પૂરી પાડે છે", "તે માતાના શરીરમાં હોર્મોનનું સંતુલન જાળવે છે", "તે ગર્ભાશયના સંકોચનને પ્રોત્સાહન આપે છે"], "ans": 1, "exp": "'કોલોસ્ટ્રમ' એ પ્રસૂતિ પછી માતાના સ્તનમાંથી નીકળતું પ્રથમ દૂધ છે, જેમાં એન્ટિબૉડીઝ અને પોષક તત્ત્વો હોય છે જે નવજાત શિશુને પ્રથમ રોગપ્રતિકારક શક્તિ પૂરી પાડે છે. વિકલ્પ A ખોટો છે કારણ કે ગર્ભના વિકાસ માટે પોષણ પ્લેસેન્ટા દ્વારા મળે છે. વિકલ્પ C અને D ખોટા છે કારણ કે કોલોસ્ટ્રમ આ કાર્યો સાથે સંકળાયેલું નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન અને પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "ગર્ભાવસ્થા દરમિયાન 'પ્રિક્લેમ્પસિયા' (Preeclampsia) નામની સ્થિતિનું મુખ્ય લક્ષણ શું છે?", "opts": ["માતાના રુધિરમાં હિમોગ્લોબિનનું પ્રમાણ વધી જવું", "માતાના રુધિરમાં ઊંચું રુધિરદાબ અને પ્રોટીન્યુરિયા (પેશાબમાં પ્રોટીન)", "ગર્ભાશયના સ્નાયુઓનું અતિશય સંકોચન", "ગર્ભના હૃદયના ધબકારા અચાનક બંધ થઈ જવા"], "ans": 1, "exp": "'પ્રિક્લેમ્પસિયા' એ ગર્ભાવસ્થા દરમિયાન થતી ગંભીર સ્થિતિ છે, જેમાં માતાના રુધિરમાં ઊંચું રુધિરદાબ અને પેશાબમાં પ્રોટીન (પ્રોટીન્યુરિયા) જોવા મળે છે. વિકલ્પ A ખોટો છે કારણ કે હિમોગ્લોબિનનું પ્રમાણ ઘટે છે. વિકલ્પ C અને D ખોટા છે કારણ કે આ લક્ષણો પ્રિક્લેમ્પસિયા સાથે સંકળાયેલા નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન અને પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "ગર્ભાવસ્થા દરમિયાન 'કોરિયોનિક વિલી' (Chorionic Villi) ની રચના અને કાર્ય વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["કોરિયોનિક વિલી ગર્ભાશયની દીવાલમાં ધંધુકાયેલા રહે છે અને માતા-ગર્ભ વચ્ચે પોષક તત્ત્વો અને કચરાનું વહન કરે છે.", "કોરિયોનિક વિલીમાં રુધિરવાહિનીઓ હાજર હોય છે જેમાં માતાનું રુધિર વહે છે.", "કોરિયોનિક વિલી ગર્ભના રુધિરવાહિની તંત્ર સાથે જોડાયેલા હોય છે અને ગર્ભના રુધિરને ઑક્સિજન અને પોષક તત્ત્વો પૂરા પાડે છે.", "કોરિયોનિક વિલી ગર્ભાશયની દીવાલ સાથે જોડાઈને પ્લેસેન્ટા (નાળ) ની રચના કરે છે."], "ans": 1, "exp": "કોરિયોનિક વિલી ગર્ભના ભાગ છે, જેમાં ગર્ભનું રુધિર વહે છે, માતાનું રુધિર નહીં. માતાનું રુધિર પ્લેસેન્ટલ રક્તસ્રાવી (Placental Sinusoids) માં વહે છે. અહીં, કોરિયોનિક વિલી માતાના રુધિર સાથે પોષક તત્ત્વો અને કચરાનું વહન કરે છે, પરંતુ માતાનું રુધિર કોરિયોનિક વિલીની અંદર વહેતું નથી. બાકીના વિધાનો સાચા છે: કોરિયોનિક વિલી ગર્ભાશયની દીવાલમાં ધંધુકાયેલા રહે છે, ગર્ભના રુધિરને પોષક તત્ત્વો પૂરા પાડે છે, અને પ્લેસેન્ટા ની રચનામાં ભાગ ભજવે છે.", "ref": "Std 12 - પ્રકરણ ૩: માનવ પ્રજનન", "ch": ""}, {"q": "ગર્ભાવસ્થા દરમિયાન 'પ્લેસેન્ટા' (નાળ) ની રચના અને કાર્ય વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["પ્લેસેન્ટા માત્ર ગર્ભના વિકાસ માટે જરૂરી પોષક તત્ત્વો પૂરા પાડે છે, પરંતુ હોર્મોનનું ઉત્પાદન કરતું નથી.", "પ્લેસેન્ટા ગર્ભાવસ્થાના પ્રથમ ત્રિમાસિક ગાળામાં જ રચાય છે અને ગર્ભાવસ્થા દરમિયાન તેનું કદ સતત ઘટતું જાય છે.", "પ્લેસેન્ટા ગર્ભ અને માતા વચ્ચે હોર્મોન, પોષક તત્ત્વો, અને કચરાનું વહન કરે છે, પરંતુ રોગજનક સૂક્ષ્મજીવોને અટકાવે છે.", "પ્લેસેન્ટા ગર્ભાશયની દીવાલ સાથે જોડાયેલા હોય છે અને ગર્ભના વિકાસ માટે જરૂરી ઑક્સિજન અને કાર્બન ડાયોક્સાઇડનું વહન કરે છે."], "ans": 3, "exp": "પ્લેસેન્ટા ગર્ભાશયની દીવાલ સાથે જોડાયેલા હોય છે અને ગર્ભના વિકાસ માટે જરૂરી ઑક્સિજન અને કાર્બન ડાયોક્સાઇડનું વહન કરે છે. પ્લેસેન્ટા હોર્મોનનું ઉત્પાદન પણ કરે છે (જેમ કે hCG, hPL, પ્રોજેસ્ટેરોન, ઇસ્ટ્રોજન), ગર્ભાવસ્થા દરમિયાન તેનું કદ વધતું જાય છે, અને તે રોગજનક સૂક્ષ્મજીવોને અટકાવતું નથી (કેટલાક સૂક્ષ્મજીવો પ્લેસેન્ટા દ્વારા પસાર થઈ શકે છે).", "ref": "Std 12 - પ્રકરણ ૩: માનવ પ્રજનન", "ch": ""}, {"q": "ગર્ભાવસ્થા દરમિયાન 'એમ્નિયોન' (Amnion) અને 'કોરિયોન' (Chorion) ની ભૂમિકા વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["એમ્નિયોન ગર્ભને યાંત્રિક આઘાતથી બચાવે છે અને એમ્નિઓટિક પ્રવાહી દ્વારા તાપમાન નિયંત્રણ કરે છે.", "કોરિયોન કોરિયોનિક વિલી ધરાવે છે જે પ્લેસેન્ટા ની રચનામાં મદદ કરે છે.", "એમ્નિયોન અને કોરિયોન બંને ગર્ભના વિકાસ માટે જરૂરી પોષક તત્ત્વોનું ઉત્પાદન કરે છે.", "કોરિયોન ગર્ભાશયની દીવાલ સાથે જોડાયેલા હોય છે અને ગર્ભના રક્ષણમાં મદદ કરે છે."], "ans": 2, "exp": "એમ્નિયોન અને કોરિયોન ગર્ભના રક્ષણ અને વિકાસમાં મહત્વની ભૂમિકા ભજવે છે, પરંતુ તેઓ પોષક તત્ત્વોનું ઉત્પાદન કરતા નથી. એમ્નિયોન ગર્ભને યાંત્રિક આઘાતથી બચાવે છે અને એમ્નિઓટિક પ્રવાહી દ્વારા તાપમાન નિયંત્રણ કરે છે, જ્યારે કોરિયોન કોરિયોનિક વિલી ધરાવે છે જે પ્લેસેન્ટા ની રચનામાં મદદ કરે છે અને ગર્ભાશયની દીવાલ સાથે જોડાયેલા હોય છે.", "ref": "Std 12 - પ્રકરણ ૩: માનવ પ્રજનન", "ch": ""}, {"q": "ગર્ભાવસ્થા દરમિયાન 'પ્રોજેસ્ટેરોન' હોર્મોનની ભૂમિકા વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["પ્રોજેસ્ટેરોન ગર્ભાશયની દીવાલને પાતળી કરે છે જેથી ગર્ભનું સરળતાથી નિકાલ થઈ શકે.", "પ્રોજેસ્ટેરોન ગર્ભાશયની દીવાલને જાડી કરે છે અને ગર્ભના વિકાસ માટે અનુકૂળ વાતાવરણ પૂરું પાડે છે.", "પ્રોજેસ્ટેરોન માત્ર ગર્ભાવસ્થાના પ્રથમ ત્રિમાસિક ગાળામાં જ ઉત્પન્ન થાય છે અને પછી તેનું ઉત્પાદન બંધ થઈ જાય છે.", "પ્રોજેસ્ટેરોન ગર્ભના લિંગ નક્કી કરવામાં મહત્વની ભૂમિકા ભજવે છે."], "ans": 1, "exp": "પ્રોજેસ્ટેરોન ગર્ભાશયની દીવાલને જાડી કરે છે અને ગર્ભના વિકાસ માટે અનુકૂળ વાતાવરણ પૂરું પાડે છે. તે ગર્ભાવસ્થા દરમિયાન સતત ઉત્પન્ન થતું રહે છે અને ગર્ભના લિંગ નક્કી કરવામાં કોઈ ભૂમિકા ભજવતું નથી. ગર્ભાશયની દીવાલને પાતળી કરવી અને ગર્ભના નિકાલમાં સહાય કરવી એ ઓક્સિટોસિન હોર્મોનની ભૂમિકા છે.", "ref": "Std 12 - પ્રકરણ ૩: માનવ પ્રજનન", "ch": ""}, {"q": "ગર્ભાવસ્થા દરમિયાન 'હ્યુમન કોરિયોનિક ગોનેડોટ્રોપિન' (hCG) હોર્મોન વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["hCG હોર્મોન ગર્ભાવસ્થાના પ્રારંભિક તબક્કામાં કોરિયોન દ્વારા ઉત્પન્ન થાય છે.", "hCG હોર્મોન પીટ્યુટરી ગ્રંથિને પ્રોજેસ્ટેરોન ઉત્પન્ન કરવા માટે ઉત્તેજિત કરે છે.", "hCG હોર્મોન ગર્ભાવસ્થાના પરીક્ષણ (પ્રેગ્નન્સી ટેસ્ટ) માં શોધી શકાય છે.", "hCG હોર્મોન ગર્ભાશયની દીવાલને જાળવવામાં મદદ કરે છે અને કોર્પસ લ્યુટિયમને તોડાતું અટકાવે છે."], "ans": 1, "exp": "hCG હોર્મોન કોરિયોન દ્વારા ઉત્પન્ન થાય છે અને તે કોર્પસ લ્યુટિયમને પ્રોજેસ્ટેરોન ઉત્પન્ન કરવા માટે ઉત્તેજિત કરે છે, ગર્ભાશયની દીવાલને જાળવવામાં મદદ કરે છે, અને ગર્ભાવસ્થાના પરીક્ષણમાં શોધી શકાય છે. પરંતુ તે પીટ્યુટરી ગ્રંથિને પ્રોજેસ્ટેરોન ઉત્પન્ન કરવા માટે ઉત્તેજિત કરતું નથી.", "ref": "Std 12 - પ્રકરણ ૩: માનવ પ્રજનન", "ch": ""}, {"q": "ગર્ભાવસ્થા દરમિયાન 'પ્લેસેન્ટલ બેરિયર' (નાળની અવરોધક ક્ષમતા) ની મર્યાદા વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["તે સંપૂર્ણ રીતે વાયરસ અને બેક્ટેરિયાને ગર્ભમાં જવા દેતી નથી.", "તે માતાના રુધિર અને ગર્ભના રુધિર વચ્ચે સીધો સંપર્ક બનાવે છે.", "તે કેટલાક દવાઓ, આલ્કોહોલ અને નિકોટિનને ગર્ભમાં પહોંચવા દે છે.", "તે ગર્ભના વિકાસ માટે જરૂરી તમામ પોષક તત્વોને સંપૂર્ણ રીતે અટકાવે છે."], "ans": 2, "exp": "પ્લેસેન્ટલ બેરિયર માતાના અને ગર્ભના રુધિર વચ્ચે અવરોધ તરીકે કાર્ય કરે છે, પરંતુ તે સંપૂર્ણ રીતે અપારગમ્ય નથી. તે કેટલાક હાનિકારક પદાર્થો જેવા કે દવાઓ, આલ્કોહોલ અને નિકોટિનને ગર્ભમાં પહોંચવા દે છે, જે ગર્ભના વિકાસને અસર કરી શકે છે. વિકલ્પ A ખોટો છે કારણ કે કેટલાક વાયરસ (જેમ કે રુબેલા) અને બેક્ટેરિયા પ્લેસેન્ટાને પાર કરી શકે છે. વિકલ્પ B ખોટો છે કારણ કે માતા અને ગર્ભના રુધિર વચ્ચે સીધો સંપર્ક હોતો નથી. વિકલ્પ D ખોટો છે કારણ કે પ્લેસેન્ટા ગર્ભના વિકાસ માટે જરૂરી પોષક તત્વોને પહોંચાડે છે, તેને અટકાવતી નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન", "ch": ""}, {"q": "ગર્ભાવસ્થા દરમિયાન 'ફીટલ હીમોગ્લોબિન' (HbF) વિશે નીચેનામાંથી કયું વિધાન સાચું નથી? let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
