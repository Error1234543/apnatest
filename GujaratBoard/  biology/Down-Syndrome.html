<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Down Syndrome</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Down Syndrome</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Down Syndrome</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ડાઉન સિન્ડ્રોમ વ્યક્તિમાં કયા વર્ણસૂત્રની ત્રણ પ્રતો હોવાનું મુખ્ય લક્ષણ છે?", "opts": ["વર્ણસૂત્ર ૧૩", "વર્ણસૂત્ર ૧૮", "વર્ણસૂત્ર ૨૧", "વર્ણસૂત્ર X"], "ans": 2, "exp": "ડાઉન સિન્ડ્રોમ (ટ્રાઇસોમી ૨૧)માં વર્ણસૂત્ર ૨૧ની ત્રણ પ્રતો (ટ્રાઇસોમી) હોવાનું મુખ્ય કારણ છે. વર્ણસૂત્ર ૧૩ (પાટૌ સિન્ડ્રોમ), ૧૮ (એડવર્ડ્સ સિન્ડ્રોમ), અને X (ટ્રાઇપ્લ-X સિન્ડ્રોમ)ના ટ્રાઇસોમી અલગ રોગો છે, જે ડાઉન સિન્ડ્રોમ સાથે સંકળાયેલા નથી.", "ref": "Std 12 - Chapter 5: વંશવિજ્ઞાન અને વિકાસ (Genetics and Evolution)", "ch": ""}, {"q": "ડાઉન સિન્ડ્રોમ ધરાવતી વ્યક્તિમાં નીચેનામાંથી કયું લક્ષણ સામાન્ય રીતે જોવા મળતું નથી?", "opts": ["નીચે પડતી પોપટી", "મોટા જીભ", "ઉંચી કદની વ્યક્તિ", "આંખના ખૂણા ઉપર તરફ ઢળતા"], "ans": 2, "exp": "ડાઉન સિન્ડ્રોમ ધરાવતી વ્યક્તિઓ સામાન્ય રીતે નીચે પડતી પોપટી, મોટી જીભ, અને આંખના ખૂણા ઉપર તરફ ઢળતા જેવા શારીરિક લક્ષણો ધરાવે છે. પરંતુ તેઓ સામાન્ય રીતે નાના કદના હોવાનું લક્ષણ ધરાવે છે, ઉંચી કદની વ્યક્તિ હોવું એ સામાન્ય લક્ષણ નથી.", "ref": "Std 12 - Chapter 5: વંશવિજ્ઞાન અને વિકાસ (Genetics and Evolution)", "ch": ""}, {"q": "ડાઉન સિન્ડ્રોમનું કારણ કયા પ્રકારની ઉત્ક્રાંતિક ભૂલ છે?", "opts": ["વર્ણસૂત્રીય ઉત્ક્રાંતિ (Chromosomal mutation)", "જનીન ઉત્ક્રાંતિ (Gene mutation)", "બિંદુ ઉત્ક્રાંતિ (Point mutation)", "ફ્રેમશિફ્ટ ઉત્ક્રાંતિ (Frameshift mutation)"], "ans": 0, "exp": "ડાઉન સિન્ડ્રોમ વર્ણસૂત્રીય ઉત્ક્રાંતિ (ટ્રાઇસોમી ૨૧)ને કારણે થાય છે, જેમાં વર્ણસૂત્ર ૨૧ની એક અતિરિક્ત પ્રત હાજર હોય છે. જનીન, બિંદુ, અને ફ્રેમશિફ્ટ ઉત્ક્રાંતિઓ જનીન સ્તરે થતી ભૂલો છે, જે ડાઉન સિન્ડ્રોમ સાથે સંકળાયેલી નથી.", "ref": "Std 12 - Chapter 5: વંશવિજ્ઞાન અને વિકાસ (Genetics and Evolution)", "ch": ""}, {"q": "ડાઉન સિન્ડ્રોમ ધરાવતી મહિલાના સંતાનમાં ડાઉન સિન્ડ્રોમ થવાની શક્યતા કેટલી છે?", "opts": ["૧૦૦%", "૫૦%", "૨૫%", "૩૩-૫૦%"], "ans": 3, "exp": "ડાઉન સિન્ડ્રોમ ધરાવતી મહિલા (ટ્રાઇસોમી ૨૧)ના સંતાનમાં ડાઉન સિન્ડ્રોમ થવાની શક્યતા લગભગ ૩૩-૫૦% હોય છે, કારણ કે અંડકોષમાં વર્ણસૂત્ર ૨૧ની અતિરિક્ત પ્રત હોવાનું કારણ સંતાનમાં ટ્રાઇસોમી ૨૧ની શક્યતા વધારે છે. ૧૦૦%, ૫૦%, અને ૨૫% એ અચોક્કસ અંદાજ છે.", "ref": "Std 12 - Chapter 5: વંશવિજ્ઞાન અને વિકાસ (Genetics and Evolution)", "ch": ""}, {"q": "ડાઉન સિન્ડ્રોમના નિદાન માટે નીચેનામાંથી કયી પદ્ધતિ સૌથી વિશ્વસનીય છે?", "opts": ["અલ્ટ્રાસાઉન્ડ સ્કેનિંગ", "એમનિયોસેન્ટેસિસ", "રક્ત પરીક્ષણ", "X-રે"], "ans": 1, "exp": "ડાઉન સિન્ડ્રોમના નિદાન માટે એમનિયોસેન્ટેસિસ સૌથી વિશ્વસનીય પદ્ધતિ છે, કારણ કે તે વર્ણસૂત્રીય રચનાનું સીધું પરીક્ષણ કરે છે. અલ્ટ્રાસાઉન્ડ સ્કેનિંગ, રક્ત પરીક્ષણ, અને X-રે એ અપ્રત્યક્ષ પદ્ધતિઓ છે, જે નિદાન માટે પૂરતી વિશ્વસનીય નથી.", "ref": "Std 12 - Chapter 5: વંશવિજ્ઞાન અને વિકાસ (Genetics and Evolution)", "ch": ""}, {"q": "ડાઉન સિન્ડ્રોમમાં, વર્ણસૂત્રી અસામાન્યતાનું મુખ્ય કારણ કયું છે, જ્યારે તે મોસેઇકિઝમ (mosaicism) સ્વરૂપે પ્રગટ થાય છે?", "opts": ["વર્ણસૂત્ર ૨૧નું પૂર્ણ ત્રિગુણિતીકરણ (trisomy)", "વર્ણસૂત્ર ૨૧નું અપૂર્ણ અથવા આંશિક ત્રિગુણિતીકરણ", "કોષવિભાજન દરમિયાન વર્ણસૂત્ર ૨૧નું અસમાન વિતરણ (non-disjunction)", "વર્ણસૂત્ર ૨૧ અને વર્ણસૂત્ર ૧૮ વચ્ચે ટ્રાન્સલોકેશન"], "ans": 2, "exp": "ડાઉન સિન્ડ્રોમનું મોસેઇકિઝમ સ્વરૂપ કોષવિભાજન દરમિયાન વર્ણસૂત્ર ૨૧ના અસમાન વિતરણ (non-disjunction)ને કારણે થાય છે, જ્યાં કેટલાક કોષોમાં ૪૬ વર્ણસૂત્રો અને કેટલાકમાં ૪૭ વર્ણસૂત્રો હોવાનું જોવા મળે છે. વિકલ્પ A અને B પૂર્ણ અથવા આંશિક ત્રિગુણિતીકરણને દર્શાવે છે, જે મોસેઇકિઝમ નથી. વિકલ્પ D ટ્રાન્સલોકેશન ડાઉન સિન્ડ્રોમને દર્શાવે છે, જે મોસેઇકિઝમ નથી.", "ref": "Std 12 - અધ્યાય ૫: વંશપરંપરા અને વિકાસ (વર્ણસૂત્રી અસામાન્યતાઓ)", "ch": ""}, {"q": "ડાઉન સિન્ડ્રોમ ધરાવતી વ્યક્તિમાં, નીચેનામાંથી કયું હૃદય સંબંધી દોષ સૌથી સામાન્ય રીતે જોવા મળે છે?", "opts": ["વાલ્વ્યુલર સ્ટેનોસિસ (Valve stenosis)", "એટ્રિયલ સેપ્ટલ ડિફેક્ટ (ASD)", "વેન્ટ્રિક્યુલર સેપ્ટલ ડિફેક્ટ (VSD)", "એટ્રિયોવેન્ટ્રિક્યુલર સેપ્ટલ ડિફેક્ટ (AVSD)"], "ans": 3, "exp": "ડાઉન સિન્ડ્રોમ ધરાવતી વ્યક્તિમાં એટ્રિયોવેન્ટ્રિક્યુલર સેપ્ટલ ડિફેક્ટ (AVSD) સૌથી સામાન્ય હૃદય સંબંધી દોષ છે. વિકલ્પ A, B, અને C પણ હૃદય સંબંધી દોષો છે, પરંતુ ડાઉન સિન્ડ્રોમમાં AVSD સૌથી વધુ જોવા મળે છે.", "ref": "Std 12 - અધ્યાય ૫: વંશપરંપરા અને વિકાસ (ડાઉન સિન્ડ્રોમના લક્ષણો)", "ch": ""}, {"q": "ડાઉન સિન્ડ્રોમના કિસ્સામાં, નીચેનામાંથી કયું જનીન (gene) વર્ણસૂત્ર ૨૧ પર સ્થિત છે અને તેના ત્રિગુણિતીકરણને કારણે ડાઉન સિન્ડ્રોમના લક્ષણો પ્રગટ થાય છે?", "opts": ["APP (Amyloid Precursor Protein)", "DYRK1A (Dual-specificity tyrosine phosphorylation-regulated kinase 1A)", "SOD1 (Superoxide Dismutase 1)", "CFTR (Cystic Fibrosis Transmembrane Conductance Regulator)"], "ans": 1, "exp": "DYRK1A જનીન વર્ણસૂત્ર ૨૧ પર સ્થિત છે અને તેના ત્રિગુણિતીકરણને કારણે ડાઉન સિન્ડ્રોમના લક્ષણો પ્રગટ થાય છે. APP જનીન પણ વર્ણસૂત્ર ૨૧ પર છે, પરંતુ તે અલ્ઝાઇમર રોગ સાથે સંબંધિત છે. SOD1 વર્ણસૂત્ર ૨૧ પર નથી, અને CFTR વર્ણસૂત્ર ૭ પર છે.", "ref": "Std 12 - અધ્યાય ૫: વંશપરંપરા અને વિકાસ (જનીન અને વર્ણસૂત્રી અસામાન્યતાઓ)", "ch": ""}, {"q": "ડાઉન સિન્ડ્રોમ ધરાવતી વ્યક્તિમાં, નીચેનામાંથી કયું ચેતાતંત્ર સંબંધી લક્ષણ સામાન્ય રીતે જોવા મળતું નથી?", "opts": ["મધ્યમથી ગંભીર બૌદ્ધિક અપંગતા", "સ્નાયુની નબળાઈ (Hypotonia)", "અતિશય ચંચળતા (Hyperactivity)", "પાર્કિનસન રોગ (Parkinson’s disease)"], "ans": 3, "exp": "ડાઉન સિન્ડ્રોમ ધરાવતી વ્યક્તિમાં મધ્યમથી ગંભીર બૌદ્ધિક અપંગતા, સ્નાયુની નબળાઈ, અને અતિશય ચંચળતા સામાન્ય લક્ષણો છે. પાર્કિનસન રોગ ડાઉન સિન્ડ્રોમ સાથે સંબંધિત નથી.", "ref": "Std 12 - અધ્યાય ૫: વંશપરંપરા અને વિકાસ (ડાઉન સિન્ડ્રોમના ચેતાતંત્ર સંબંધી લક્ષણો)", "ch": ""}, {"q": "ડાઉન સિન્ડ્રોમના નિદાન માટે, નીચેનામાંથી કયી પદ્ધતિ ગર્ભાવસ્થા દરમિયાન કરવામાં આવે છે અને તે સૌથી અચૂક છે?", "opts": ["અલ્ટ્રાસાઉન્ડ (Ultrasound)", "એમ્નિયોસેન્ટેસિસ (Amniocentesis)", "કોરિયોનિક વિલસ સેમ્પલિંગ (CVS)", "મેટરનલ સીરમ સ્ક્રીનિંગ (Maternal Serum Screening)"], "ans": 1, "exp": "એમ્નિયોસેન્ટેસિસ (Amniocentesis) ગર્ભાવસ્થા દરમિયાન કરવામાં આવતી સૌથી અચૂક પદ્ધતિ છે, જેમાં ગર્ભાશયમાંથી એમ્નિયોટિક દ્રવનું નમૂનો લેવામાં આવે છે અને વર્ણસૂત્રી અસામાન્યતાઓની ચકાસણી કરવામાં આવે છે. અલ્ટ્રાસાઉન્ડ અને મેટરનલ સીરમ સ્ક્રીનિંગ સ્ક્રીનિંગ પદ્ધતિઓ છે, જ્યારે CVS પણ અચૂક છે, પરંતુ એમ્નિયોસેન્ટેસિસ કરતાં ઓછી સામાન્ય રીતે વાપરવામાં આવે છે.", "ref": "Std 12 - અધ્યાય ૫: વંશપરંપરા અને વિકાસ (ડાઉન સિન્ડ્રોમનું નિદાન)", "ch": ""}, {"q": "ડાઉન સિન્ડ્રોમમાં, વર્ણસૂત્ર ૨૧ની ત્રણ પ્રતો હોવાને કારણે નીચેનામાંથી કયું જનીનનું અતિ-અભિવ્યક્તિ (over-expression) થાય છે, જે બૌદ્ધિક અપંગતાને પ્રભાવિત કરે છે?", "opts": ["APP (Amyloid Precursor Protein)", "SOD1 (Superoxide Dismutase 1)", "DYRK1A (Dual-specificity Tyrosine Phosphorylation-regulated Kinase 1A)", "CFTR (Cystic Fibrosis Transmembrane Conductance Regulator)"], "ans": 2, "exp": "ડાઉન સિન્ડ્રોમમાં વર્ણસૂત્ર ૨૧ની ત્રણ પ્રતો હોવાને કારણે DYRK1A જનીનનું અતિ-અભિવ્યક્તિ થાય છે, જે મગજના વિકાસ અને બૌદ્ધિક ક્ષમતાને અસર કરે છે. APP જનીન પણ વર્ણસૂત્ર ૨૧ પર છે, પરંતુ તે અલ્ઝાઇમર રોગ સાથે વધુ સંબંધિત છે. SOD1 વર્ણસૂત્ર ૨૧ પર નથી, તે વર્ણસૂત્ર ૨૧ નહીં પરંતુ વર્ણસૂત્ર ૨૧ ની બહાર છે. CFTR વર્ણસૂત્ર ૭ પર સ્થિત છે, જે સિસ્ટિક ફાઇબ્રોસિસ સાથે સંબંધિત છે.", "ref": "Std 12 - Chapter 5: અનુવંશિકતા અને વિકાસ (Heredity and Development)", "ch": ""}, {"q": "ડાઉન સિન્ડ્રોમ ધરાવતી વ્યક્તિમાં, નીચેનામાંથી કયું લક્ષણ મોસેઇક ડાઉન સિન્ડ્રોમ (Mosaic Down Syndrome) માટે વિશિષ્ટ છે?", "opts": ["સંપૂર્ણ બૌદ્ધિક અપંગતા", "કેટલાક કોષોમાં વર્ણસૂત્ર ૨૧ની બે પ્રતો અને કેટલાકમાં ત્રણ પ્રતો હોવી", "હૃદય સંબંધી દોષનો અભાવ", "શારીરિક વિકાસમાં કોઈ અસર ન હોવી"], "ans": 1, "exp": "મોસેઇક ડાઉન સિન્ડ્રોમમાં, કેટલાક કોષોમાં વર્ણસૂત્ર ૨૧ની બે પ્રતો અને કેટલાકમાં ત્રણ પ્રતો હોવાનું લક્ષણ છે. સંપૂર્ણ બૌદ્ધિક અપંગતા, હૃદય સંબંધી દોષનો અભાવ, અને શારીરિક વિકાસમાં કોઈ અસર ન હોવી એ મોસેઇક ડાઉન સિન્ડ્રોમ માટે વિશિષ્ટ લક્ષણ નથી.", "ref": "Std 12 - Chapter 5: અનુવંશિકતા અને વિકાસ (Heredity and Development)", "ch": ""}, {"q": "ડાઉન સિન્ડ્રોમ ધરાવતી વ્યક્તિમાં, નીચેનામાંથી કયું હોર્મોનનું સ્તર સામાન્ય રીતે ઓછું જોવા મળે છે, જે વિકાસ અને ચયાપચયને અસર કરે છે?", "opts": ["થાયરોક્સિન (Thyroxine)", "ઇન્સ્યુલિન (Insulin)", "એડ્રિનેલિન (Adrenaline)", "ટેસ્ટોસ્ટેરોન (Testosterone)"], "ans": 0, "exp": "ડાઉન સિન્ડ્રોમ ધરાવતી વ્યક્તિમાં થાયરોક્સિન હોર્મોનનું સ્તર સામાન્ય રીતે ઓછું જોવા મળે છે, જે વિકાસ અને ચયાપચયને અસર કરે છે. ઇન્સ્યુલિન, એડ્રિનેલિન, અને ટેસ્ટોસ્ટેરોનના સ્તરો સામાન્ય રીતે ડાઉન સિન્ડ્રોમ સાથે સંબંધિત નથી.", "ref": "Std 12 - Chapter 8: શરીરમાં સંકલન અને નિયંત્રણ (Coordination and Control in the Body)", "ch": ""}, {"q": "ડાઉન સિન્ડ્રોમ ધરાવતી વ્યક્તિમાં, નીચેનામાંથી કયું લક્ષણ સૌથી ઓછું સામાન્ય રીતે જોવા મળે છે?", "opts": ["નીચું કાનનું સ્થાન", "મોટી જીભ", "આંખના પોપચાનું સફેદ ધબ્બો (Brushfield spots)", "લાંબા હાથ અને પગ"], "ans": 3, "exp": "ડાઉન સિન્ડ્રોમ ધરાવતી વ્યક્તિમાં લાંબા હાથ અને પગ એ સૌથી ઓછું સામાન્ય લક્ષણ છે. નીચું કાનનું સ્થાન, મોટી જીભ, અને આંખના પોપચાનું સફેદ ધબ્બો (Brushfield spots) એ સામાન્ય લક્ષણો છે.", "ref": "Std 12 - Chapter 5: અનુવંશિકતા અને વિકાસ (Heredity and Development)", "ch": ""}, {"q": "ડાઉન સિન્ડ્રોમના કિસ્સામાં, નીચેનામાંથી કયું કોષીય પ્રક્રિયાને અસર કરે છે, જે વર્ણસૂત્રી અસામાન્યતાને કારણે થાય છે?", "opts": ["પ્રકાશસંશ્લેષણ", "કોષવિભાજન (Cell Division)", "શ્વસન", "ઉત્સર્જન"], "ans": 1, "exp": "ડાઉન સિન્ડ્રોમમાં વર્ણસૂત્રી અસામાન્યતા (ટ્રાઇસોમી ૨૧) કોષવિભાજન પ્રક્રિયાને અસર કરે છે, જેના કારણે કોષોમાં વર્ણસૂત્રની અસમાન વિતરણ થાય છે. પ્રકાશસંશ્લેષણ, શ્વસન, અને ઉત્સર્જન પ્રક્રિયાઓ વર્ણસૂત્રી અસામાન્યતાને કારણે સીધી અસર થતી નથી.", "ref": "Std 12 - Chapter 4: કોષ અને કોષવિભાજન (Cell and Cell Division)", "ch": ""}, {"q": "ડાઉન સિન્ડ્રોમ ધરાવતી વ્યક્તિમાં, વર્ણસૂત્ર ૨૧ની ત્રણ પ્રતો હોવાને કારણે નીચેનામાંથી કયું પ્રોટીનનું અસંતુલિત ઉત્પાદન થાય છે, જે મગજના વિકાસને અસર કરે છે?", "opts": ["એમીલોઇડ પ્રિકર્સર પ્રોટીન (APP)", "સુપરઓક્સાઇડ ડિસમ્યુટેઝ (SOD1)", "કોલાજન પ્રકાર VI (COL6A1)", "ઇન્સ્યુલિન જેવું વૃદ્ધિ પરિબળ (IGF-1)"], "ans": 1, "exp": "સુપરઓક્સાઇડ ડિસમ્યુટેઝ (SOD1) જનીન વર્ણસૂત્ર ૨૧ પર સ્થિત છે અને ડાઉન સિન્ડ્રોમમાં તેની ત્રણ પ્રતોને કારણે તેનું અતિ-ઉત્પાદન થાય છે, જે ઓક્સિડેટિવ તણાવ વધારી મગજના વિકાસને અસર કરે છે. એમીલોઇડ પ્રિકર્સર પ્રોટીન (APP) પણ વર્ણસૂત્ર ૨૧ પર છે, પરંતુ તેનું અસંતુલિત ઉત્પાદન મુખ્યત્વે અલ્ઝાઇમર રોગ સાથે સંબંધિત છે. કોલાજન પ્રકાર VI અને IGF-1 ડાઉન સિન્ડ્રોમમાં મહત્વપૂર્ણ નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ડાઉન સિન્ડ્રોમના મોસેઇક સ્વરૂપ (Mosaic Down Syndrome) માટે ખોટું છે?", "opts": ["મોસેઇક ડાઉન સિન્ડ્રોમમાં, કેટલાક કોષોમાં વર્ણસૂત્ર ૨૧ની ત્રણ પ્રતો હોય છે, જ્યારે અન્ય કોષોમાં સામાન્ય બે પ્રતો હોય છે.", "મોસેઇક ડાઉન સિન્ડ્રોમ ધરાવતી વ્યક્તિમાં લક્ષણોની તીવ્રતા સામાન્ય ડાઉન સિન્ડ્રોમ કરતાં ઓછી હોઈ શકે છે.", "મોસેઇક ડાઉન સિન્ડ્રોમનું કારણ ફક્ત માતાના અંડકોષમાં થતી નોન-ડિસજંક્શન ભૂલ છે.", "મોસેઇક ડાઉન સિન્ડ્રોમનું નિદાન કોષીય સ્તરે વર્ણસૂત્ર વિશ્લેષણ દ્વારા થાય છે."], "ans": 2, "exp": "મોસેઇક ડાઉન સિન્ડ્રોમનું કારણ ફક્ત માતાના અંડકોષમાં થતી નોન-ડિસજંક્શન ભૂલ નથી, પરંતુ તે ગર્ભના વિકાસ દરમિયાન કોષવિભાજનમાં થતી ભૂલને કારણે પણ થઈ શકે છે. અન્ય તમામ વિધાનો સાચાં છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાઉન સિન્ડ્રોમ ધરાવતી વ્યક્તિમાં થાઇરોઇડ હોર્મોનનું સ્તર સામાન્ય રીતે ઓછું જોવા મળે છે. આ સ્થિતિને શું કહેવાય છે અને તેનું મુખ્ય કારણ શું છે?", "opts": ["હાઇપોથાઇરોડિઝમ - થાઇરોઇડ ગ્રંથિની અપૂરતી કામગીરી", "હાઇપરથાઇરોડિઝમ - થાઇરોઇડ ગ્રંથિની અતિશય કામગીરી", "હાઇપોપેરાથાઇરોડિઝમ - પેરાથાઇરોઇડ ગ્રંથિની અપૂરતી કામગીરી", "હાઇપરપેરાથાઇરોડિઝમ - પેરાથાઇરોઇડ ગ્રંથિની અતિશય કામગીરી"], "ans": 0, "exp": "ડાઉન સિન્ડ્રોમ ધરાવતી વ્યક્તિમાં હાઇપોથાઇરોડિઝમ સામાન્ય રીતે જોવા મળે છે, જે થાઇરોઇડ ગ્રંથિની અપૂરતી કામગીરીને કારણે થાય છે. આ સ્થિતિમાં થાઇરોઇડ હોર્મોનનું સ્તર ઓછું હોય છે. અન્ય વિકલ્પો ખોટાં છે કારણ કે તેઓ અલગ અલગ હોર્મોન ગ્રંથિઓ અને સ્થિતિઓ સાથે સંબંધિત છે.", "ref": "Std 12 - પ્રકરણ 11: માનવ શરીરની રચના અને કાર્યપદ્ધતિ", "ch": ""}, {"q": "ડાઉન સિન્ડ્રોમ ધરાવતી વ્યક્તિમાં, નીચેનામાંથી કયું લક્ષણ મગજના વિકાસ સાથે સીધો સંબંધ ધરાવતું નથી, પરંતુ શારીરિક વિકાસને અસર કરે છે?", "opts": ["બૌદ્ધિક અક્ષમતા (Intellectual disability)", "હૃદય સંબંધી દોષ (Congenital heart defects)", "નબળી સ્નાયુ તાણ (Hypotonia)", "નાની આંખો અને ચપટું નાક (Facial features)"], "ans": 1, "exp": "હૃદય સંબંધી દોષ ડાઉન સિન્ડ્રોમમાં સામાન્ય છે, પરંતુ તે મગજના વિકાસ સાથે સીધો સંબંધ ધરાવતું નથી. તે શારીરિક વિકાસને અસર કરે છે. અન્ય વિકલ્પો મગજના વિકાસ અથવા ચેતાતંત્ર સાથે સીધો સંબંધ ધરાવે છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "ડાઉન સિન્ડ્રોમના નિદાન માટે કરવામાં આવતી 'ક્વાડ્રપલ સ્ક્રીનિંગ ટેસ્ટ'માં નીચેનામાંથી કયું પદાર્થનું માપન કરવામાં આવતું નથી?", "opts": ["આલ્ફા-ફીટોપ્રોટીન (AFP)", "હ્યુમન કોરિઓનિક ગોનાડોટ્રોપિન (hCG)", "ઇન્હિબિન-A", "થાઇરોક્સિન (T4)"], "ans": 3, "exp": "ક્વાડ્રપલ સ્ક્રીનિંગ ટેસ્ટમાં આલ્ફા-ફીટોપ્રોટીન (AFP), હ્યુમન કોરિઓનિક ગોનાડોટ્રોપિન (hCG), ઇન્હિબિન-A અને એસ્ટ્રિઓલનું માપન કરવામાં આવે છે. થાઇરોક્સિન (T4) આ ટેસ્ટમાં માપવામાં આવતું નથી.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
