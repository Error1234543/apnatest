<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ફળની રચના</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ફળની રચના</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ફળની રચના</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ફળની રચનામાં નીચેના પૈકી કયો ભાગ સીધો ભાગ લેતો નથી, પરંતુ ફળના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે?", "opts": ["અંડાશયની દીવાલ", "બીજાંડકોષ", "પુંકેસરની પરાગકણ", "અંડકોષ"], "ans": 2, "exp": "ફળની રચનામાં અંડાશય (Ovary) સીધો ભાગ લે છે, જેમાં અંડાશયની દીવાલ (A) ફળભિત્તિ બને છે, બીજાંડકોષ (B) બીજમાં વિકસે છે, અને અંડકોષ (D) બીજમાં ફેરફાર પામે છે. પરંતુ પુંકેસરની પરાગકણ (C) ફળની રચનામાં સીધો ભાગ લેતી નથી, પરંતુ પરાગીકરણ દ્વારા બીજાંડકોષના નિષેચનમાં મદદ કરે છે, જેથી ફળનો વિકાસ થાય છે.", "ref": "Std 12 - પ્રકરણ ૨: પુષ્પી વનસ્પતિઓમાં પ્રજનન", "ch": ""}, {"q": "જો એક ફળમાં બહુવિધ બીજ હાજર હોય અને તે ફળ અંડાશયના એક જ કોથળીમાંથી વિકસે છે, તો તે ફળને કયા પ્રકારમાં વર્ગીકૃત કરવામાં આવે છે?", "opts": ["સરળ ફળ", "સંયુક્ત ફળ", "સમૂહ ફળ", "કૂટ ફળ"], "ans": 0, "exp": "સરળ ફળ (A) એક જ અંડાશયમાંથી વિકસે છે અને તે એક અથવા બહુવિધ બીજ ધરાવી શકે છે. સંયુક્ત ફળ (B) બહુવિધ અંડાશયોના એક જ પુષ્પમાંથી વિકસે છે. સમૂહ ફળ (C) પુષ્પસમૂહમાંથી વિકસે છે, જ્યારે કૂટ ફળ (D) બહુવિધ પુષ્પોના અંડાશયોના એકીકરણથી બને છે. આથી, એક જ કોથળીમાંથી વિકસતું બહુબીજીય ફળ સરળ ફળ ગણાય છે.", "ref": "Std 12 - પ્રકરણ ૨: પુષ્પી વનસ્પતિઓમાં પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન ફળના વિકાસ દરમિયાન થતી હોર્મોનલ ક્રિયાઓ વિશે સાચું નથી?", "opts": ["ઓક્સિન ફળના વિકાસને પ્રોત્સાહન આપે છે.", "જિબરેલિન બીજની સુપ્તાવસ્થાને તોડવામાં મદદ કરે છે.", "સાયટોકાઇનિન ફળના પકવણને વેગ આપે છે.", "એથિલીન ફળના પકવણને પ્રભાવિત કરે છે."], "ans": 2, "exp": "ઓક્સિન (A) ફળના વિકાસને પ્રોત્સાહન આપે છે, જિબરેલિન (B) બીજની સુપ્તાવસ્થાને તોડવામાં મદદ કરે છે, અને એથિલીન (D) ફળના પકવણને પ્રભાવિત કરે છે. સાયટોકાઇનિન (C) મુખ્યત્વે કોષવિભાજનને પ્રોત્સાહન આપે છે, પરંતુ ફળના પકવણમાં સીધો ભાગ લેતું નથી.", "ref": "Std 12 - પ્રકરણ ૪: વનસ્પતિ વૃદ્ધિ અને વિકાસ", "ch": ""}, {"q": "ફળની રચનામાં નીચેના પૈકી કયો ભાગ 'ફળભિત્તિ' તરીકે ઓળખાય છે?", "opts": ["અંડાશયની બાહ્ય ત્વચા", "અંડાશયની દીવાલ", "બીજાંડકોષની આસપાસની પેશી", "અંડકોષની આસપાસની પેશી"], "ans": 1, "exp": "ફળભિત્તિ (Pericarp) અંડાશયની દીવાલ (B) માંથી વિકસે છે. અંડાશયની બાહ્ય ત્વચા (A) ફળની બાહ્ય સપાટી બને છે, જ્યારે બીજાંડકોષ (C) અને અંડકોષ (D)ની આસપાસની પેશી બીજના વિકાસમાં ભાગ લે છે, પરંતુ ફળભિત્તિ નથી.", "ref": "Std 12 - પ્રકરણ ૨: પુષ્પી વનસ્પતિઓમાં પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયું ફળ 'અસત્ય ફળ' (Pseudocarp) તરીકે ઓળખાય છે, જેમાં ફળના વિકાસમાં અંડાશય સિવાયના ભાગો પણ સામેલ હોય છે?", "opts": ["ટમેટું", "સફરજન", "કેળું", "ડાંગર"], "ans": 1, "exp": "સફરજન (B) એક અસત્ય ફળ છે, જેમાં ફળના વિકાસમાં અંડાશય સિવાય પુષ્પાસન (Thalamus) પણ સામેલ હોય છે. ટમેટું (A) અને ડાંગર (D) સત્ય ફળ છે, જ્યારે કેળું (C) બીજવિહીન ફળ છે, પરંતુ તે અસત્ય ફળ નથી.", "ref": "Std 12 - પ્રકરણ ૨: પુષ્પી વનસ્પતિઓમાં પ્રજનન", "ch": ""}, {"q": "ફળની રચના દરમિયાન, જ્યારે અંડકોષમાં ફલિતાંડ (endosperm) બને છે, ત્યારે નીચેના પૈકી કયો હોર્મોન મુખ્ય ભૂમિકા ભજવે છે?", "opts": ["ઓક્સિન (Auxin)", "જિબ્બેરેલિન (Gibberellin)", "સાયટોકાઇનિન (Cytokinin)", "એબ્સિસિક એસિડ (Abscisic Acid)"], "ans": 1, "exp": "ફલિતાંડ (endosperm) ની રચનામાં જિબ્બેરેલિન (Gibberellin) મુખ્ય ભૂમિકા ભજવે છે, કારણ કે તે કોષવિભાજન અને વૃદ્ધિને ઉત્તેજે છે. ઓક્સિન ફળના વિકાસ અને વૃદ્ધિ માટે જવાબદાર છે, પરંતુ ફલિતાંડની રચનામાં નહીં. સાયટોકાઇનિન કોષવિભાજનને ઉત્તેજે છે, પરંતુ ફલિતાંડની રચનામાં તેની ભૂમિકા મર્યાદિત છે. એબ્સિસિક એસિડ વૃદ્ધિ અવરોધક તરીકે કામ કરે છે, તેથી તે ફલિતાંડની રચનામાં ભૂમિકા ભજવતું નથી.", "ref": "Std 12 - પ્રકરણ ૨: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયું ફળ 'સમગ્ર ફળ' (Aggregate Fruit) નું ઉદાહરણ છે, જેમાં એક જ પુષ્પમાં બહુવિધ અંડાશયો વિકસે છે?", "opts": ["કેળું", "સ્ટ્રોબેરી", "અંજીર", "કોબીજ"], "ans": 1, "exp": "સ્ટ્રોબેરી એક 'સમગ્ર ફળ' (Aggregate Fruit) છે, જેમાં એક જ પુષ્પમાં બહુવિધ અંડાશયો વિકસે છે અને તે એકસાથે જોડાઈને ફળ બનાવે છે. કેળું એક 'સરળ ફળ' છે, જેમાં એક જ અંડાશય વિકસે છે. અંજીર એક 'સંયુક્ત ફળ' (Composite Fruit) છે, જેમાં બહુવિધ પુષ્પો એકસાથે જોડાઈને ફળ બનાવે છે. કોબીજ એક શાકભાજી છે અને તે ફળ નથી.", "ref": "Std 12 - પ્રકરણ ૨: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "ફળની રચના દરમિયાન, અંડાશયની દીવાલમાંથી વિકસતી 'ફળભિત્તિ' ના ત્રણ સ્તરો પૈકી કયું સ્તર બાહ્ય સ્તર તરીકે ઓળખાય છે?", "opts": ["એપિકાર્પ (Exocarp)", "મેસોકાર્પ (Mesocarp)", "એન્ડોકાર્પ (Endocarp)", "પેરિકાર્પ (Pericarp)"], "ans": 0, "exp": "ફળભિત્તિના ત્રણ સ્તરો પૈકી 'એપિકાર્પ' (Exocarp) બાહ્ય સ્તર તરીકે ઓળખાય છે. મેસોકાર્પ (Mesocarp) મધ્ય સ્તર છે, જ્યારે એન્ડોકાર્પ (Endocarp) આંતરિક સ્તર છે. પેરિકાર્પ (Pericarp) એ ફળભિત્તિના તમામ ત્રણ સ્તરોનો સમાવેશ કરતો શબ્દ છે.", "ref": "Std 12 - પ્રકરણ ૨: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન ફળના વિકાસ દરમિયાન થતી 'પાર્થેનોકાર્પી' (Parthenocarpy) પ્રક્રિયા વિશે સાચું છે?", "opts": ["ફળનો વિકાસ પરાગરજના સંપર્ક વિના થાય છે, પરંતુ બીજ વિકસે છે.", "ફળનો વિકાસ પરાગરજના સંપર્ક વિના થાય છે અને બીજ વિકસતું નથી.", "ફળનો વિકાસ પરાગરજના સંપર્ક સાથે થાય છે, પરંતુ બીજ વિકસતું નથી.", "ફળનો વિકાસ પરાગરજના સંપર્ક સાથે થાય છે અને બીજ વિકસે છે."], "ans": 1, "exp": "પાર્થેનોકાર્પી (Parthenocarpy) એ એક પ્રક્રિયા છે જેમાં ફળનો વિકાસ પરાગરજના સંપર્ક વિના થાય છે અને બીજ વિકસતું નથી. આ પ્રક્રિયામાં ફળ અંડકોષના ફલન વિના વિકસે છે. બાકીના વિકલ્પો આ પ્રક્રિયાને યોગ્ય રીતે વર્ણવતા નથી.", "ref": "Std 12 - પ્રકરણ ૨: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "ફળની રચનામાં, જ્યારે અંડાશયની રચના 'સૂપરિયર ઓવરી' (Superior Ovary) હોય છે, ત્યારે ફળને કયા પ્રકારનું ફળ કહેવાય છે?", "opts": ["એપોકાર્પસ (Apocarpous)", "સિંકાર્પસ (Syncarpous)", "હાયપોજિનસ (Hypogynous)", "એપિજિનસ (Epigynous)"], "ans": 2, "exp": "જ્યારે અંડાશયની રચના 'સૂપરિયર ઓવરી' (Superior Ovary) હોય છે, ત્યારે ફળને 'હાયપોજિનસ' (Hypogynous) ફળ કહેવાય છે. એપોકાર્પસ અને સિંકાર્પસ અંડાશયની રચના સાથે સંબંધિત છે, જ્યારે એપિજિનસ ફળમાં અંડાશય 'ઇન્ફીરિયર ઓવરી' (Inferior Ovary) હોય છે.", "ref": "Std 12 - પ્રકરણ ૨: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયું ફળ 'સાયકોનસ' (Syconus) પ્રકારનું ફળ છે, જેમાં ફૂલોની એક જ સમૂહમાંથી એક જ ફળ બને છે અને તેના આંતરિક ભાગમાં નાના-નાના ફળો જોવા મળે છે?", "opts": ["અંજીર (Fig)", "સફરજન (Apple)", "સ્ટ્રોબેરી (Strawberry)", "કેળું (Banana)"], "ans": 0, "exp": "'સાયકોનસ' પ્રકારનું ફળ એ અંજીર છે, જેમાં એક જ ફૂલોના સમૂહમાંથી એક જ ફળ બને છે અને તેના આંતરિક ભાગમાં નાના-નાના ફળો (એકિન) જોવા મળે છે. સફરજન 'પોમ' પ્રકારનું ફળ છે, સ્ટ્રોબેરી 'સમગ્ર ફળ' છે અને કેળું 'બેરીફ્રૂટ' છે. તેથી અંજીર જ સાચો વિકલ્પ છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "ફળની રચનામાં, 'એપોકાર્પસ' (Apocarpous) અંડાશય ધરાવતી વનસ્પતિઓમાં નીચેના પૈકી કયું વિધાન સાચું છે?", "opts": ["એક જ અંડાશયમાંથી એકથી વધુ ફળો બને છે, જે 'સમગ્ર ફળ' તરીકે ઓળખાય છે.", "એક જ અંડાશયમાંથી માત્ર એક જ ફળ બને છે, જે 'સાદું ફળ' કહેવાય છે.", "અંડાશયના બહુવિધ કાર્પેલ્સ એકબીજા સાથે જોડાયેલા હોવાથી એક જ ફળ બને છે.", "ફળની રચના વગર બીજનું નિર્માણ થાય છે, જેને 'પાર્થેનોકાર્પી' કહે છે."], "ans": 0, "exp": "'એપોકાર્પસ' અંડાશય ધરાવતી વનસ્પતિઓમાં દરેક કાર્પેલ અલગ હોય છે, તેથી એક જ અંડાશયમાંથી એકથી વધુ ફળો બને છે, જે 'સમગ્ર ફળ' તરીકે ઓળખાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે 'સાદું ફળ' એક જ કાર્પેલમાંથી બને છે, બહુવિધ કાર્પેલ્સ જોડાયેલા હોય તો 'સિંકાર્પસ' કહેવાય છે, અને પાર્થેનોકાર્પીમાં ફલન વગર ફળ બને છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયું ફળ 'ડ્રૂપ' (Drupe) પ્રકારનું નથી, તેમ છતાં તેની રચનામાં સખત 'એન્ડોકાર્પ' (Endocarp) જોવા મળે છે?", "opts": ["નાળિયેર (Coconut)", "આલૂ (Plum)", "કેરી (Mango)", "અખરોટ (Walnut)"], "ans": 3, "exp": "'ડ્રૂપ' પ્રકારના ફળોમાં સખત એન્ડોકાર્પ હોય છે, જેમ કે નાળિયેર, આલૂ અને કેરી. પરંતુ અખરોટ 'નટ' પ્રકારનું ફળ છે, જેમાં સખત છાલ હોય છે પરંતુ તે ડ્રૂપ નથી. તેથી અખરોટ સાચો જવાબ છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "ફળની રચનામાં, 'પેરિકાર્પ' (Pericarp) ના ત્રણ સ્તરો પૈકી 'મેસોકાર્પ' (Mesocarp) નું મુખ્ય કાર્ય શું છે?", "opts": ["બીજને યાંત્રિક રક્ષણ આપવું.", "ફળના પોષક તત્ત્વોનો સંગ્રહ અને પરિવહન કરવું.", "ફળને પક્ષીઓ અને પ્રાણીઓ દ્વારા ફેલાવવામાં મદદ કરવી.", "ફળના વિકાસ દરમિયાન હોર્મોનનું ઉત્પાદન કરવું."], "ans": 1, "exp": "'મેસોકાર્પ' એ પેરિકાર્પનો મધ્યમ સ્તર છે, જે મુખ્યત્વે ફળના પોષક તત્ત્વોનો સંગ્રહ અને પરિવહન કરે છે. બીજને રક્ષણ આપવાનું કાર્ય 'એન્ડોકાર્પ'નું છે, ફળના ફેલાવામાં મદદ કરવાનું કાર્ય 'એક્સોકાર્પ' અથવા સમગ્ર ફળનું હોઈ શકે, અને હોર્મોનનું ઉત્પાદન મેસોકાર્પનું મુખ્ય કાર્ય નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન 'સ્ટ્રોબિલસ' (Strobilus) અને 'ફળ' વચ્ચેનો સંબંધ યોગ્ય રીતે વર્ણવે છે?", "opts": ["સ્ટ્રોબિલસ એ અનાવૃત બીજધારી વનસ્પતિઓમાં જોવા મળતું ફળ છે.", "સ્ટ્રોબિલસ એ ફળ નથી, પરંતુ તે બીજધારી વનસ્પતિઓમાં બીજ ઉત્પન્ન કરતું અંગ છે.", "સ્ટ્રોબિલસ અને ફળ બંને એક જ પ્રકારની રચના છે, માત્ર નામ અલગ છે.", "સ્ટ્રોબિલસ એ આવૃત બીજધારી વનસ્પતિઓમાં જોવા મળતું ફળ છે."], "ans": 1, "exp": "'સ્ટ્રોબિલસ' એ અનાવૃત બીજધારી વનસ્પતિઓ (જેમ કે પાઈન) માં જોવા મળતું બીજ ઉત્પન્ન કરતું અંગ છે, તે ફળ નથી. ફળ માત્ર આવૃત બીજધારી વનસ્પતિઓમાં જ જોવા મળે છે. તેથી વિકલ્પ B સાચો છે.", "ref": "Std 11 - પ્રકરણ 3: વનસ્પતિ સૃષ્ટિ", "ch": ""}, {"q": "એક વનસ્પતિમાં ફૂલના અંડાશયમાંથી ફળ વિકસે છે, પરંતુ તે ફળમાં બીજ હોતું નથી. આ પ્રક્રિયા માટે નીચેના પૈકી કયું કારણ સૌથી વધુ યોગ્ય છે?", "opts": ["અંડકોષનું ફલન થયા વગર અંડાશયનો વિકાસ થયો છે (પાર્થેનોકાર્પી).", "ફલિતાંડનું સંપૂર્ણ રીતે વિઘટન થઈ ગયું છે.", "અંડાશયમાં અંડકોષ જ ન હતો.", "ફળના વિકાસ દરમિયાન બીજનું નિર્માણ અટકી ગયું છે."], "ans": 0, "exp": "પાર્થેનોકાર્પી એ એવી પ્રક્રિયા છે જેમાં અંડકોષનું ફલન થયા વગર અંડાશયમાંથી ફળ વિકસે છે, તેથી બીજનું નિર્માણ થતું નથી. વિકલ્પ B ખોટો છે કારણ કે ફલિતાંડનું વિઘટન થવાથી બીજ ન બને, પરંતુ આ પ્રક્રિયા પાર્થેનોકાર્પી નથી. વિકલ્પ C ખોટો છે કારણ કે અંડકોષ ન હોવાને કારણે ફલન શક્ય નથી, પરંતુ આ સ્થિતિ કુદરતી રીતે ભાગ્યે જ જોવા મળે છે. વિકલ્પ D ખોટો છે કારણ કે બીજનું નિર્માણ અટકવું એ પાર્થેનોકાર્પીનું કારણ નથી, પરંતુ તેનું પરિણામ છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "નીચેના પૈકી કયું ફળ 'સમગ્ર ફળ' (Aggregate Fruit) નથી, તેમ છતાં તેની રચનામાં એક જ ફૂલના બહુવિધ અંડાશયો ભાગ લે છે?", "opts": ["સ્ટ્રોબેરી", "રાસબેરી", "સીતાફળ", "કાજુ"], "ans": 3, "exp": "કાજુ એ 'સમગ્ર ફળ' નથી, કારણ કે તે એક જ અંડાશયમાંથી વિકસે છે. સ્ટ્રોબેરી, રાસબેરી અને સીતાફળ એ 'સમગ્ર ફળ' છે, જેમાં એક જ ફૂલના બહુવિધ અંડાશયો ભાગ લે છે. કાજુ એ 'ડ્રૂપ' પ્રકારનું ફળ છે, જેમાં એક જ અંડાશયમાંથી ફળ વિકસે છે.", "ref": "Std 11 - પ્રકરણ 5: વનસ્પતિઓનું આકારવિજ્ઞાન", "ch": ""}, {"q": "ફળની રચનામાં, 'પેરિકાર્પ' (Pericarp) ના ત્રણ સ્તરો પૈકી 'એન્ડોકાર્પ' (Endocarp) નું મુખ્ય કાર્ય શું છે?", "opts": ["ફળને યાંત્રિક આધાર પૂરો પાડવો.", "બીજને સુરક્ષિત રાખવું અને તેના વિકાસમાં મદદ કરવી.", "ફળના પોષક તત્ત્વોનું પરિવહન કરવું.", "ફળને રંગ અને સુગંધ આપવી."], "ans": 1, "exp": "'એન્ડોકાર્પ' એ પેરિકાર્પનો સૌથી અંદરનો સ્તર છે, જે બીજને સુરક્ષિત રાખે છે અને તેના વિકાસમાં મદદ કરે છે. વિકલ્પ A ખોટો છે કારણ કે યાંત્રિક આધાર મુખ્યત્વે 'એક્ઝોકાર્પ' અને 'મેસોકાર્પ' પૂરો પાડે છે. વિકલ્પ C ખોટો છે કારણ કે પોષક તત્ત્વોનું પરિવહન મુખ્યત્વે વાહક પેશીઓ દ્વારા થાય છે. વિકલ્પ D ખોટો છે કારણ કે રંગ અને સુગંધ મુખ્યત્વે 'એક્ઝોકાર્પ' અને 'મેસોકાર્પ' સાથે સંબંધિત છે.", "ref": "Std 11 - પ્રકરણ 5: વનસ્પતિઓનું આકારવિજ્ઞાન", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન 'સાયકોનસ' (Syconus) પ્રકારના ફળ માટે ખોટું છે?", "opts": ["આ પ્રકારનું ફળ એક જ ફૂલના અંડાશયમાંથી વિકસે છે.", "આ પ્રકારના ફળમાં ફૂલોની એક જાળીદાર રચના હોય છે.", "અંજીર આ પ્રકારના ફળનું ઉદાહરણ છે.", "આ પ્રકારના ફળમાં બહુવિધ નાના ફળો એકસાથે જોડાયેલા હોય છે."], "ans": 0, "exp": "'સાયકોનસ' પ્રકારનું ફળ એક જ ફૂલમાંથી નહીં, પરંતુ ફૂલોની એક જાળીદાર રચનામાંથી વિકસે છે. અંજીર આ પ્રકારના ફળનું ઉદાહરણ છે, જેમાં બહુવિધ નાના ફળો એકસાથે જોડાયેલા હોય છે. તેથી વિકલ્પ A ખોટું છે, જ્યારે અન્ય વિકલ્પો સાચાં છે.", "ref": "Std 11 - પ્રકરણ 5: વનસ્પતિઓનું આકારવિજ્ઞાન", "ch": ""}, {"q": "ફળની રચનામાં, જો એક ફળમાં બહુવિધ બીજ હાજર હોય અને તે ફળ અંડાશયના એક જ કાર્પેલમાંથી વિકસ્યું હોય, તો નીચેના પૈકી કયું વિધાન સાચું છે?", "opts": ["આ ફળ 'સમગ્ર ફળ' (Aggregate Fruit) છે.", "આ ફળમાં 'એપોકાર્પસ' (Apocarpous) અંડાશય હશે.", "આ ફળમાં 'સિંકાર્પસ' (Syncarpous) અંડાશય હશે.", "આ ફળ 'સાયકોનસ' (Syconus) પ્રકારનું હશે."], "ans": 2, "exp": "જો ફળ અંડાશયના એક જ કાર્પેલમાંથી વિકસ્યું હોય અને તેમાં બહુવિધ બીજ હોય, તો તે 'સિંકાર્પસ' અંડાશય ધરાવતું ફળ હશે, જેમાં બહુવિધ કાર્પેલ્સ એકબીજા સાથે જોડાયેલા હોય છે. વિકલ્પ A ખોટો છે કારણ કે 'સમગ્ર ફળ' એક જ ફૂલના બહુવિધ અંડાશયોમાંથી વિકસે છે. વિકલ્પ B ખોટો છે કારણ કે 'એપોકાર્પસ' અંડાશયમાં કાર્પેલ્સ અલગ હોય છે. વિકલ્પ D ખોટો છે કારણ કે 'સાયકોનસ' ફળ ફૂલોની જાળીદાર રચનામાંથી વિકસે છે.", "ref": "Std 11 - પ્રકરણ 5: વનસ્પતિઓનું આકારવિજ્ઞાન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
