<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turner Syndrome</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Turner Syndrome</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Turner Syndrome</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ટર્નર સિન્ડ્રોમ ધરાવતી સ્ત્રીમાં નીચેના પૈકી કયું લક્ષણ જોવા મળતું નથી?", "opts": ["ગર્ભાશયનું અલ્પવિકસિત હોવું", "સ્તનગ્રંથિઓનો અપૂરતો વિકાસ", "બે X વર્ણસૂત્રોની હાજરી છતાં અંડકોષનું નિર્માણ ન થવું", "હૃદય અને મૂત્રપિંડ સંબંધિત જન્મજાત ખામીઓ"], "ans": 2, "exp": "ટર્નર સિન્ડ્રોમમાં એક X વર્ણસૂત્રની ગેરહાજરી હોય છે (45,X), તેથી બે X વર્ણસૂત્રો હોવાની વાત જ ખોટી છે. બાકીના વિકલ્પો ટર્નર સિન્ડ્રોમના સામાન્ય લક્ષણો છે: ગર્ભાશય અલ્પવિકસિત, સ્તનગ્રંથિઓનો અપૂરતો વિકાસ અને હૃદય-મૂત્રપિંડની ખામીઓ જોવા મળે છે. GSEB Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો મુજબ.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "ટર્નર સિન્ડ્રોમની સ્થિતિમાં નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["આ સિન્ડ્રોમ ફક્ત સ્ત્રીઓમાં જ જોવા મળે છે", "અસરગ્રસ્ત વ્યક્તિમાં વંધ્યત્વનું પ્રમાણ વધુ હોય છે", "કોષકેન્દ્રમાં 46 વર્ણસૂત્રો હાજર હોય છે જેમાં એક X વર્ણસૂત્ર ખૂટે છે", "વૃદ્ધિ હોર્મોન ઉપચારથી ઊંચાઈમાં સુધારો થઈ શકે છે"], "ans": 2, "exp": "ટર્નર સિન્ડ્રોમમાં કોષકેન્દ્રમાં 45 વર્ણસૂત્રો હોય છે (44+X), 46 નહીં. બાકીના વિધાનો સાચાં છે: આ સિન્ડ્રોમ ફક્ત સ્ત્રીઓમાં જોવા મળે છે, વંધ્યત્વનું પ્રમાણ વધુ હોય છે અને વૃદ્ધિ હોર્મોન ઉપચારથી ઊંચાઈમાં સુધારો થઈ શકે છે. GSEB Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો મુજબ.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "ટર્નર સિન્ડ્રોમ અને ક્લાઈનફેલ્ટર સિન્ડ્રોમ વચ્ચેનો મુખ્ય તફાવત શું છે?", "opts": ["ટર્નર સિન્ડ્રોમમાં વંશીય ભિન્નતા જોવા મળે છે જ્યારે ક્લાઈનફેલ્ટરમાં નહીં", "ટર્નર સિન્ડ્રોમ ફક્ત સ્ત્રીઓમાં જોવા મળે છે જ્યારે ક્લાઈનફેલ્ટર ફક્ત પુરુષોમાં", "ટર્નર સિન્ડ્રોમમાં વર્ણસૂત્રોની સંખ્યા 45 હોય છે જ્યારે ક્લાઈનફેલ્ટરમાં 47", "ટર્નર સિન્ડ્રોમમાં માનસિક મંદતા જોવા મળે છે જ્યારે ક્લાઈનફેલ્ટરમાં નહીં"], "ans": 2, "exp": "ટર્નર સિન્ડ્રોમમાં વર્ણસૂત્રોની સંખ્યા 45 (44+X) હોય છે, જ્યારે ક્લાઈનફેલ્ટર સિન્ડ્રોમમાં 47 (44+XXY) હોય છે. બાકીના વિકલ્પો ખોટા છે: બંનેમાં વંશીય ભિન્નતા જોવા મળે છે, ટર્નર ફક્ત સ્ત્રીઓમાં અને ક્લાઈનફેલ્ટર ફક્ત પુરુષોમાં જોવા મળે છે પરંતુ આ પ્રશ્નનો મુખ્ય તફાવત નથી, અને માનસિક મંદતા બંનેમાં જોવા મળી શકે છે. GSEB Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો મુજબ.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "ટર્નર સિન્ડ્રોમ ધરાવતી વ્યક્તિમાં નીચેના પૈકી કયું પરિવર્તન જોવા મળતું નથી?", "opts": ["લસિકાવાહિનીઓનું સાંકડું થવું (Lymphedema)", "ગરદનની પાછળની ચામડીનો વધારો (Webbed neck)", "અંડપિંડનું સંપૂર્ણ અભાવ (Gonadal dysgenesis)", "શુક્રપિંડનું અલ્પવિકસિત હોવું (Testicular atrophy)"], "ans": 3, "exp": "ટર્નર સિન્ડ્રોમ ધરાવતી વ્યક્તિમાં અંડપિંડ (Ovary) નું અલ્પવિકાસ અથવા અભાવ જોવા મળે છે, શુક્રપિંડ નહીં. બાકીના વિકલ્પો સાચાં છે: લસિકાવાહિનીઓનું સાંકડું થવું, ગરદનની પાછળની ચામડીનો વધારો અને અંડપિંડનું સંપૂર્ણ અભાવ જોવા મળે છે. GSEB Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો મુજબ.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "ટર્નર સિન્ડ્રોમના નિદાન માટે નીચેના પૈકી કઈ તકનીકનો ઉપયોગ થતો નથી?", "opts": ["કોષકેન્દ્રીય વર્ણસૂત્ર વિશ્લેષણ (Karyotyping)", "અલ્ટ્રાસાઉન્ડ ઇમેજિંગ", "DNA ફિંગરપ્રિન્ટિંગ", "હોર્મોન સ્તરનું પરીક્ષણ (FSH, LH)"], "ans": 2, "exp": "ટર્નર સિન્ડ્રોમના નિદાન માટે DNA ફિંગરપ્રિન્ટિંગનો ઉપયોગ થતો નથી, કારણ કે આ સિન્ડ્રોમ વર્ણસૂત્રીય ખામીને કારણે થાય છે, જનીનિક અનુક્રમમાં નહીં. બાકીની તકનીકોનો ઉપયોગ થાય છે: કોષકેન્દ્રીય વર્ણસૂત્ર વિશ્લેષણ, અલ્ટ્રાસાઉન્ડ ઇમેજિંગ અને હોર્મોન સ્તરનું પરીક્ષણ. GSEB Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો મુજબ.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "ch": ""}, {"q": "ટર્નર સિન્ડ્રોમ ધરાવતી સ્ત્રીમાં કયા હોર્મોનના સ્તરમાં અસાધારણ ઘટાડો જોવા મળે છે, જેના કારણે દ્વિતીય લૈંગિક લક્ષણોનો વિકાસ થતો નથી?", "opts": ["થાયરોક્સિન", "ઇન્સ્યુલિન", "એસ્ટ્રોજન", "એડ્રિનેલિન"], "ans": 2, "exp": "ટર્નર સિન્ડ્રોમમાં, અંડાશયનો વિકાસ અપૂર્ણ થવાને કારણે એસ્ટ્રોજન હોર્મોનનું ઉત્પાદન ઘટે છે, જેના કારણે દ્વિતીય લૈંગિક લક્ષણો (જેવા કે સ્તનોનો વિકાસ, માસિક ચક્રની શરૂઆત) જોવા મળતા નથી. થાયરોક્સિન અંડાશય સાથે સંબંધિત નથી, ઇન્સ્યુલિન રક્તમાં ગ્લુકોઝના સ્તરને નિયંત્રિત કરે છે, અને એડ્રિનેલિન તણાવ પ્રતિભાવ સાથે સંબંધિત છે. આમ, એસ્ટ્રોજન જ સીધો સંબંધ ધરાવે છે.", "ref": "Std 12 - Chapter 5: વંશપરંપરા અને વિકાસ (Anuvanshikta aur Vikas)", "ch": ""}, {"q": "ટર્નર સિન્ડ્રોમ ધરાવતી વ્યક્તિમાં કયા વર્ણસૂત્રની ગેરહાજરી જોવા મળે છે, જેના કારણે તેની લાક્ષણિકતાઓ ઉદ્ભવે છે?", "opts": ["21મું વર્ણસૂત્ર", "X વર્ણસૂત્ર", "Y વર્ણસૂત્ર", "1મું વર્ણસૂત્ર"], "ans": 1, "exp": "ટર્નર સિન્ડ્રોમમાં, સ્ત્રીમાં એક X વર્ણસૂત્રની ગેરહાજરી (45,X) જોવા મળે છે. આ સ્થિતિમાં, વ્યક્તિ પાસે માત્ર એક X વર્ણસૂત્ર હોય છે, જેના કારણે લૈંગિક અને શારીરિક વિકાસ પર અસર પડે છે. 21મું વર્ણસૂત્ર ડાઉન સિન્ડ્રોમ સાથે, Y વર્ણસૂત્ર પુરુષ લિંગ નિર્ધારણ સાથે, અને 1લું વર્ણસૂત્ર અન્ય રોગો સાથે સંબંધિત છે.", "ref": "Std 12 - Chapter 5: વંશપરંપરા અને વિકાસ (Anuvanshikta aur Vikas)", "ch": ""}, {"q": "ટર્નર સિન્ડ્રોમ ધરાવતી સ્ત્રીમાં નીચેના પૈકી કયું કાર્ડિયાક (હૃદય સંબંધી) લક્ષણ સામાન્ય રીતે જોવા મળે છે?", "opts": ["હૃદયના દાઢીના વાલ્વમાં દોષ", "હૃદયની દિવાલમાં છિદ્ર (VSD)", "કોઆર્ક્ટેશન ઓફ ધ એઓર્ટા (આર્ટાનું સંકોચન)", "હૃદયના કપાટમાં સંપૂર્ણ અવરોધ"], "ans": 2, "exp": "ટર્નર સિન્ડ્રોમ ધરાવતી સ્ત્રીઓમાં કોઆર્ક્ટેશન ઓફ ધ એઓર્ટા (આર્ટાનું સંકોચન) સામાન્ય રીતે જોવા મળે છે, જે હૃદયના મહાધમનીમાં રક્તપ્રવાહને અસર કરે છે. હૃદયના દાઢીના વાલ્વમાં દોષ, હૃદયની દિવાલમાં છિદ્ર (VSD), અને હૃદયના કપાટમાં સંપૂર્ણ અવરોધ આ સિન્ડ્રોમ સાથે સામાન્ય રીતે સંબંધિત નથી.", "ref": "Std 12 - Chapter 5: વંશપરંપરા અને વિકાસ (Anuvanshikta aur Vikas)", "ch": ""}, {"q": "ટર્નર સિન્ડ્રોમ ધરાવતી વ્યક્તિમાં નીચેના પૈકી કયું ન્યુરોલોજિકલ (ચેતાતંત્ર સંબંધી) લક્ષણ સામાન્ય રીતે જોવા મળતું નથી?", "opts": ["શીખવાની અશક્તિ", "સ્પેશિયલ ઓરિએન્ટેશનમાં અશક્તિ", "મોટર સ્કિલ્સમાં અશક્તિ", "સંપૂર્ણ સ્મૃતિ ગુમાવવી"], "ans": 3, "exp": "ટર્નર સિન્ડ્રોમ ધરાવતી વ્યક્તિઓમાં શીખવાની અશક્તિ, સ્પેશિયલ ઓરિએન્ટેશનમાં અશક્તિ, અને મોટર સ્કિલ્સમાં અશક્તિ જેવા ન્યુરોલોજિકલ લક્ષણો જોવા મળી શકે છે. પરંતુ સંપૂર્ણ સ્મૃતિ ગુમાવવી આ સિન્ડ્રોમનું સામાન્ય લક્ષણ નથી.", "ref": "Std 12 - Chapter 5: વંશપરંપરા અને વિકાસ (Anuvanshikta aur Vikas)", "ch": ""}, {"q": "ટર્નર સિન્ડ્રોમ ધરાવતી સ્ત્રીમાં નીચેના પૈકી કયું એન્ડોક્રાઇન (અંતઃસ્રાવી) વિકાર સામાન્ય રીતે જોવા મળે છે?", "opts": ["ડાયાબિટીસ મેલિટસ", "હાયપોથાયરોઇડિઝમ", "હાયપરપેરાથાયરોઇડિઝમ", "કુશિંગ સિન્ડ્રોમ"], "ans": 1, "exp": "ટર્નર સિન્ડ્રોમ ધરાવતી સ્ત્રીઓમાં હાયપોથાયરોઇડિઝમ (થાયરોઇડ હોર્મોનની ઉણપ) સામાન્ય રીતે જોવા મળે છે, જે થાયરોઇડ ગ્રંથિની અપૂર્ણ ક્રિયાશીલતાને કારણે થાય છે. ડાયાબિટીસ મેલિટસ, હાયપરપેરાથાયરોઇડિઝમ, અને કુશિંગ સિન્ડ્રોમ આ સિન્ડ્રોમ સાથે સામાન્ય રીતે સંબંધિત નથી.", "ref": "Std 12 - Chapter 5: વંશપરંપરા અને વિકાસ (Anuvanshikta aur Vikas)", "ch": ""}, {"q": "ટર્નર સિન્ડ્રોમ ધરાવતી સ્ત્રીમાં કોષવિભાજન દરમિયાન કયા તબક્કે વર્ણસૂત્રીય અસાધારણતા સૌથી વધુ સ્પષ્ટપણે જોવા મળે છે?", "opts": ["મેટાફેઝ - I", "એનાફેઝ - I", "મેટાફેઝ - II", "ટેલોફેઝ - II"], "ans": 1, "exp": "ટર્નર સિન્ડ્રોમમાં X વર્ણસૂત્રની ગેરહાજરી હોવાથી એનાફેઝ - I દરમિયાન વર્ણસૂત્રોનું વિભાજન અસમાન થાય છે, જે સ્પષ્ટપણે જોવા મળે છે. મેટાફેઝ - I, મેટાફેઝ - II અને ટેલોફેઝ - II દરમિયાન આ અસાધારણતા એટલી સ્પષ્ટ નથી.", "ref": "Std 12 - Chapter 4: કોષવિભાજન અને વારસાગત રોગો", "ch": ""}, {"q": "ટર્નર સિન્ડ્રોમ ધરાવતી વ્યક્તિમાં નીચેના પૈકી કયું જનીન-સંબંધિત પરિવર્તન સૌથી વધુ સામાન્ય છે?", "opts": ["SHOX જનીનનું હેપ્લોઇન્સફિસિયન્સી", "SRY જનીનનું ડુપ્લિકેશન", "BRCA1 જનીનનું મ્યુટેશન", "CFTR જનીનનું ડિલીશન"], "ans": 0, "exp": "ટર્નર સિન્ડ્રોમમાં SHOX (Short Stature Homeobox) જનીનનું હેપ્લોઇન્સફિસિયન્સી (એક જ કોપી હોવી) સૌથી સામાન્ય છે, જે લંબાઈમાં ઘટાડો તરફ દોરી જાય છે. SRY જનીન Y વર્ણસૂત્ર પર આવેલું છે અને ટર્નર સિન્ડ્રોમમાં Y વર્ણસૂત્ર હાજર નથી. BRCA1 અને CFTR જનીન ટર્નર સિન્ડ્રોમ સાથે સીધો સંબંધ ધરાવતા નથી.", "ref": "Std 12 - Chapter 5: અનુવંશિકતા અને વિકારો", "ch": ""}, {"q": "ટર્નર સિન્ડ્રોમ ધરાવતી વ્યક્તિમાં નીચેના પૈકી કયું ક્લિનિકલ લક્ષણ સૌથી ઓછું જોવા મળે છે?", "opts": ["કાનની અસાધારણ રચના", "ગળામાં વેબિંગ (Webbed neck)", "હાથ અને પગની સોજો", "આંખોની પોપચી (Ptosis)"], "ans": 3, "exp": "ટર્નર સિન્ડ્રોમમાં કાનની અસાધારણ રચના, ગળામાં વેબિંગ અને હાથ-પગની સોજો સામાન્ય લક્ષણો છે, પરંતુ આંખોની પોપચી (Ptosis) સૌથી ઓછું જોવા મળે છે.", "ref": "Std 12 - Chapter 4: કોષવિભાજન અને વારસાગત રોગો", "ch": ""}, {"q": "ટર્નર સિન્ડ્રોમ ધરાવતી સ્ત્રીમાં નીચેના પૈકી કયું કોષીય પરિવર્તન સૌથી વધુ સામાન્ય છે?", "opts": ["લ્યુકોસાઇટ્સની સંખ્યામાં વધારો", "લાલ રક્તકણોની સંખ્યામાં ઘટાડો", "રક્તમાં ગ્લુકોઝનું ઉચ્ચ સ્તર", "લસિકા કોષોની ક્રિયાશીલતામાં ઘટાડો"], "ans": 1, "exp": "ટર્નર સિન્ડ્રોમમાં લાલ રક્તકણોની સંખ્યામાં ઘટાડો (એનીમિયા) સૌથી સામાન્ય કોષીય પરિવર્તન છે. લ્યુકોસાઇટ્સની સંખ્યામાં વધારો, રક્તમાં ગ્લુકોઝનું ઉચ્ચ સ્તર અને લસિકા કોષોની ક્રિયાશીલતામાં ઘટાડો ઓછા સામાન્ય છે.", "ref": "Std 12 - Chapter 7: રક્ત અને રક્ત સંબંધી વિકારો", "ch": ""}, {"q": "એક 16 વર્ષીય કિશોરીને ટૂંકી ઊંચાઈ, ગરદનની પાછળની ત્વચામાં વધારાનો ભાગ (વેબ્ડ નેક) અને પ્રાથમિક એમેનોરિયા (પ્રથમ માસિક સ્રાવનો અભાવ) જેવા લક્ષણો જોવા મળે છે. તેના કોષકેન્દ્રીય વિશ્લેષણમાં 45,XO કારીયોટાઇપ જોવા મળ્યો છે. આ સ્થિતિમાં નીચેના પૈકી કયું વિધાન અપવાદરૂપ ગણી શકાય?", "opts": ["આ સ્થિતિમાં અંડપિંડનો અપૂર્ણ વિકાસ (સ્ટ્રીક ગોનેડ્સ) જોવા મળે છે, જે એસ્ટ્રોજન હોર્મોનના ઉત્પાદનમાં ઘટાડો કરે છે", "ટર્નર સિન્ડ્રોમ ધરાવતી મોટાભાગની સ્ત્રીઓમાં બૌદ્ધિક ક્ષમતા સામાન્ય હોય છે, પરંતુ અમુક કિસ્સામાં અવકાશીય જ્ઞાન (સ્પેશિયલ કોગ્નિશન) સંબંધિત સમસ્યાઓ જોવા મળી શકે છે", "આ સ્થિતિમાં હૃદયની ડાબી બાજુની ખોડ (જેમ કે કોઆર્ક્ટેશન ઓફ એઓર્ટા) સામાન્ય રીતે જોવા મળતી નથી, પરંતુ જમણી બાજુની ખોડ વધુ પ્રમાણમાં જોવા મળે છે", "ટર્નર સિન્ડ્રોમ ધરાવતી સ્ત્રીઓમાં થાઇરોઇડ ગ્રંથિ સંબંધિત વિકારો (જેમ કે હાઇપોથાઇરોઇડિઝમ)નું પ્રમાણ સામાન્ય વસ્તી કરતાં વધુ હોય છે"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. ટર્નર સિન્ડ્રોમમાં હૃદયની ડાબી બાજુની ખોડ (જેમ કે કોઆર્ક્ટેશન ઓફ એઓર્ટા) સામાન્ય રીતે જોવા મળે છે, જ્યારે જમણી બાજુની ખોડ ખૂબ જ ઓછી જોવા મળે છે. આ વિધાન અપવાદરૂપ છે કારણ કે તે સાચી પરિસ્થિતિને ઉલટાવે છે.\n\nવિકલ્પ A: ટર્નર સિન્ડ્રોમમાં અંડપિંડનો અપૂર્ણ વિકાસ (સ્ટ્રીક ગોનેડ્સ) સામાન્ય છે, જે એસ્ટ્રોજન હોર્મોનના ઉત્પાદનમાં ઘટાડો કરે છે. આ વિધાન સાચું છે.\n\nવિકલ્પ B: ટર્નર સિન્ડ્રોમ ધરાવતી મોટાભાગની સ્ત્રીઓમાં બૌદ્ધિક ક્ષમતા સામાન્ય હોય છે, પરંતુ અવકા   }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
