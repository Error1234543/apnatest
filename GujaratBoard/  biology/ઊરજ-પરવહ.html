<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ઊર્જા પ્રવાહ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ઊર્જા પ્રવાહ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ઊર્જા પ્રવાહ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 39 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 39 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "પર્યાવરણીય પિરામિડમાં ઉર્જા પ્રવાહની દિશા કઈ રીતે નક્કી કરવામાં આવે છે?", "opts": ["ઉત્પાદકોથી ઉપભોક્તા તરફ અને પછી વિઘટક તરફ", "વિઘટકોથી ઉત્પાદક તરફ અને પછી ઉપભોક્તા તરફ", "ઉપભોક્તાથી ઉત્પાદક તરફ અને પછી વિઘટક તરફ", "ઉત્પાદક, ઉપભોક્તા અને વિઘટક વચ્ચે દ્વિદિશાત્મક"], "ans": 0, "exp": "ઉર્જા પ્રવાહ હંમેશા ઉત્પાદકોથી (પ્રથમ પોષક સ્તર) ઉપભોક્તા તરફ અને પછી વિઘટક તરફ વહે છે. વિઘટકો ઉર્જાને પુનઃચક્રિત કરતા નથી પરંતુ તેનો ઉપયોગ કરે છે. બાકીના વિકલ્પો ઉર્જા પ્રવાહની દિશા વિશે ખોટી સમજૂતી આપે છે.", "ref": "Std 12 - અધ્યાય 14: પર્યાવરણ અને તેના ઘટકો", "ch": ""}, {"q": "જો એક પોષક સ્તરમાં 10,000 J ઉર્જા ઉપલબ્ધ હોય, તો આગળના પોષક સ્તરમાં કેટલી ઉર્જા પ્રાપ્ત થશે? (10% નિયમ ધ્યાનમાં લેતા)", "opts": ["1000 J", "100 J", "10000 J", "10 J"], "ans": 0, "exp": "10% નિયમ મુજબ, એક પોષક સ્તરથી બીજા પોષક સ્તરમાં માત્ર 10% ઉર્જા જ પ્રસારિત થાય છે. આથી 10,000 J માંથી 10% એટલે 1000 J ઉર્જા પ્રાપ્ત થશે. બાકીના વિકલ્પો ગણતરીની ખોટી સમજૂતી આપે છે.", "ref": "Std 12 - અધ્યાય 14: પર્યાવરણ અને તેના ઘટકો", "ch": ""}, {"q": "નીચેનામાંથી કયો ઘટક ઉર્જા પ્રવાહમાં સૌથી ઓછો યોગદાન આપે છે?", "opts": ["ઉત્પાદક", "પ્રાથમિક ઉપભોક્તા", "દ્વિતીય ઉપભોક્તા", "વિઘટક"], "ans": 3, "exp": "વિઘટકો ઉર્જા પ્રવાહમાં સૌથી ઓછો યોગદાન આપે છે કારણ કે તેઓ મૃત કચરાને તોડીને ઉર્જા મુક્ત કરે છે, પરંતુ આ ઉર્જા પોષક સ્તરોમાં પ્રસારિત થતી નથી. ઉત્પાદક, પ્રાથમિક અને દ્વિતીય ઉપભોક્તા ઉર્જા પ્રવાહમાં મહત્વની ભૂમિકા ભજવે છે.", "ref": "Std 12 - અધ્યાય 14: પર્યાવરણ અને તેના ઘટકો", "ch": ""}, {"q": "ઉર્જા પ્રવાહના સંદર્ભમાં, 'લિંકેજ લોસ' શું દર્શાવે છે?", "opts": ["એક પોષક સ્તરથી બીજા પોષક સ્તરમાં પ્રસારિત થતી ઉર્જા", "ઉર્જાનો તે વાતાવરણમાં ખોવાઈ જવો", "ઉર્જાનો તે કોષીય શ્વસન દ્વારા વપરાશ", "ઉર્જાનો તે અકુશળતાપૂર્વક વહન થવો"], "ans": 1, "exp": "'લિંકેજ લોસ' એ ઉર્જાનો તે વાતાવરણમાં ખોવાઈ જવાનો ભાગ દર્શાવે છે, જે એક પોષક સ્તરથી બીજા પોષક સ્તરમાં પ્રસારિત થતી નથી. બાકીના વિકલ્પો લિંકેજ લોસની ખોટી વ્યાખ્યા આપે છે.", "ref": "Std 12 - અધ્યાય 14: પર્યાવરણ અને તેના ઘટકો", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઉર્જા પ્રવાહ વિશે સાચું નથી?", "opts": ["ઉર્જા પ્રવાહ એકદિશાત્મક હોય છે", "ઉર્જા પ્રવાહ પોષક સ્તરોમાંથી પસાર થતો નથી", "ઉર્જા પ્રવાહમાં 10% નિયમ લાગુ પડે છે", "ઉર્જા પ્રવાહ વિઘટકો દ્વારા પુનઃચક્રિત થાય છે"], "ans": 3, "exp": "ઉર્જા પ્રવાહ વિઘટકો દ્વારા પુનઃચક્રિત થતો નથી, પરંતુ વિઘટકો મૃત કચરાને તોડીને ઉર્જા મુક્ત કરે છે. બાકીના વિધાનો ઉર્જા પ્રવાહ વિશે સાચા છે.", "ref": "Std 12 - અધ્યાય 14: પર્યાવરણ અને તેના ઘટકો", "ch": ""}, {"q": "પર્યાવરણીય તંત્રમાં ઉર્જા પ્રવાહની દક્ષતા નક્કી કરતી સૌથી મહત્વની પરિબળ કયું છે, જ્યારે ઉત્પાદક સ્તરથી પ્રાથમિક ઉપભોક્તા સ્તર સુધી ઉર્જા સ્થાનાંતરિત થાય છે?", "opts": ["ઉત્પાદકો દ્વારા શ્વસન દરમ્યાન ઉર્જાનો વપરાશ", "ઉપભોક્તાઓ દ્વારા અપચય ક્રિયામાં ઉર્જાનો વપરાશ", "ઉત્પાદક અને ઉપભોક્તા વચ્ચેના પોષક તત્વોની ઉપલબ્ધતા", "પર્યાવરણમાં તાપમાન અને પ્રકાશની તીવ્રતામાં ફેરફાર"], "ans": 0, "exp": "સાચો જવાબ A છે. ઉત્પાદક સ્તરથી પ્રાથમિક ઉપભોક્તા સ્તર સુધી ઉર્જા પ્રવાહની દક્ષતા મુખ્યત્વે ઉત્પાદકો (જેવા કે છોડ) દ્વારા શ્વસન ક્રિયા દરમ્યાન થતી ઉર્જાના વપરાશ પર આધાર રાખે છે. શ્વસન દરમ્યાન ઉર્જાનો મોટો ભાગ ઉષ્મા રૂપે વપરાઈ જાય છે, જે ઉર્જા પ્રવાહની દક્ષતાને ઘટાડે છે. B ગળતર છે કારણ કે અપચય ક્રિયા ઉપભોક્તા સ્તરે થાય છે, પરંતુ ઉર્જા પ્રવાહની દક્ષતા ઉત્પાદક સ્તરે શ્વસન દરમ્યાન થતી ઉર્જા હાનિ પર વધુ આધાર રાખે છે. C અને D અસંબદ્ધ છે કારણ કે પોષક તત્વોની ઉપલબ્ધતા અને પર્યાવરણીય પરિબળો ઉર્જા પ્રવાહની દક્ષતાને સીધી રીતે અસર કરતા નથી.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને ઉર્જા પ્રવાહ", "ch": ""}, {"q": "જો એક પર્યાવરણીય તંત્રમાં ઉત્પાદક સ્તરે 100,000 J ઉર્જા ઉપલબ્ધ હોય, તો તૃતીયક ઉપભોક્તા સ્તર સુધી પહોંચતી ઉર્જા કેટલી હશે? (ધારો કે ઉર્જા સ્થાનાંતરણની દક્ષતા 10% છે)", "opts": ["10 J", "100 J", "1,000 J", "10,000 J"], "ans": 1, "exp": "સાચો જવાબ B છે. ઉર્જા પ્રવાહમાં, દરેક પોષક સ્તરે ફક્ત 10% ઉર્જા જ આગળના સ્તરે સ્થાનાંતરિત થાય છે. ઉત્પાદક સ્તરે 100,000 J ઉર્જા હોય, તો પ્રાથમિક ઉપભોક્તા સ્તરે 10,000 J (10% of 100,000), દ્વિતીયક ઉપભોક્તા સ્તરે 1,000 J (10% of 10,000), અને તૃતીયક ઉપભોક્તા સ્તરે 100 J (10% of 1,000) ઉર્જા પહોંચે છે. A, C, અને D ગળતર છે કારણ કે તેઓ ઉર્જા સ્થાનાંતરણની દક્ષતાને ધ્યાનમાં લેતા નથી.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને ઉર્જા પ્રવાહ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઉર્જા પ્રવાહ વિશે સાચું છે, જ્યારે પર્યાવરણીય તંત્રમાં સજીવો વચ્ચે ઉર્જા સ્થાનાંતરિત થાય છે?", "opts": ["ઉર્જા પ્રવાહ દ્વિદિશાત્મક (bidirectional) હોય છે", "ઉર્જા પ્રવાહ એકદિશાત્મક (unidirectional) હોય છે", "ઉર્જા પ્રવાહ ચક્રીય (cyclic) હોય છે", "ઉર્જા પ્રવાહ સ્થિર (static) હોય છે"], "ans": 1, "exp": "સાચો જવાબ B છે. પર્યાવરણીય તંત્રમાં ઉર્જા પ્રવાહ હમેશા એકદિશાત્મક હોય છે, એટલે કે ઉર્જા ઉત્પાદક સ્તરથી ઉપભોક્તા સ્તર તરફ જ વહે છે અને પાછી વળતી નથી. A ગળતર છે કારણ કે ઉર્જા પ્રવાહ દ્વિદિશાત્મક નથી. C ગળતર છે કારણ કે ઉર્જા પ્રવાહ ચક્રીય નથી, તે એકદિશાત્મક છે. D ગળતર છે કારણ કે ઉર્જા પ્રવાહ સ્થિર નથી, તે સતત વહેતો રહે છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને ઉર્જા પ્રવાહ", "ch": ""}, {"q": "પર્યાવરણીય તંત્રમાં ઉર્જા પ્રવાહની દક્ષતા ઘટાડતું મુખ્ય કારણ કયું છે?", "opts": ["ઉત્પાદકો દ્વારા પ્રકાશસંશ્લેષણ ક્રિયા દરમ્યાન ઉર્જાનો વપરાશ", "ઉપભોક્તાઓ દ્વારા શ્વસન ક્રિયા દરમ્યાન ઉર્જાનો વપરાશ", "ઉત્પાદક અને ઉપભોક્તા વચ્ચેના પોષક તત્વોની અપૂરતી ઉપલબ્ધતા", "પર્યાવરણમાં ઉર્જાનો ઉષ્મા રૂપે વપરાશ"], "ans": 3, "exp": "સાચો જવાબ D છે. પર્યાવરણીય તંત્રમાં ઉર્જા પ્રવાહની દક્ષતા ઘટાડતું મુખ્ય કારણ ઉર્જાનો ઉષ્મા રૂપે વપરાશ છે. ઉર્જા સતત ઉષ્મા રૂપે વપરાઈ જાય છે, જે ઉર્જા પ્રવાહની દક્ષતાને ઘટાડે છે. A અને B ગળતર છે કારણ કે પ્રકાશસંશ્લેષણ અને શ્વસન ક્રિયા દરમ્યાન ઉર્જાનો વપરાશ થાય છે, પરંતુ ઉર્જા પ્રવાહની દક્ષતા ઘટાડતું મુખ્ય કારણ ઉર્જાનો ઉષ્મા રૂપે વપરાશ છે. C ગળતર છે કારણ કે પોષક તત્વોની અપૂરતી ઉપલબ્ધતા ઉર્જા પ્રવાહની દક્ષતાને સીધી રીતે અસર કરતી નથી.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને ઉર્જા પ્રવાહ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઉર્જા પ્રવાહ અને પોષક સ્તરો વિશે સાચું નથી?", "opts": ["ઉત્પાદક સ્તરે ઉર્જા પ્રવાહ સૌથી વધુ હોય છે", "ઉર્જા પ્રવાહ દરેક પોષક સ્તરે 100% દક્ષતા સાથે સ્થાનાંતરિત થાય છે", "ઉર્જા પ્રવાહ એકદિશાત્મક હોય છે", "ઉર્જા પ્રવાહ પોષક સ્તરો વચ્ચે સ્થાનાંતરિત થતો નથી"], "ans": 1, "exp": "સાચો જવાબ B છે. ઉર્જા પ્રવાહ દરેક પોષક સ્તરે 100% દક્ષતા સાથે સ્થાનાંતરિત થતો નથી, પરંતુ ફક્ત 10% જ ઉર્જા આગળના સ્તરે પહોંચે છે. A સાચું છે કારણ કે ઉત્પાદક સ્તરે ઉર્જા પ્રવાહ સૌથી વધુ હોય છે. C સાચું છે કારણ કે ઉર્જા પ્રવાહ એકદિશાત્મક હોય છે. D ગળતર છે કારણ કે ઉર્જા પ્રવાહ પોષક સ્તરો વચ્ચે સ્થાનાંતરિત થાય છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને ઉર્જા પ્રવાહ", "ch": ""}, {"q": "પર્યાવરણીય તંત્રમાં ઉર્જા પ્રવાહ દરમિયાન, જ્યારે એક પોષક સ્તરથી બીજા પોષક સ્તરમાં ઉર્જા સ્થાનાંતરિત થાય છે, ત્યારે નીચેનામાંથી કયો ઘટક ઉર્જાના નુકશાન માટે જવાબદાર નથી?", "opts": ["શ્વસન દરમિયાન ઉત્સર્જિત થતી ઉર્જા", "અપચયિત (અપચ્ય) પદાર્થોમાં રહેલી ઉર્જા", "ઉત્સર્જન દરમિયાન બહાર ફેંકાયેલી ઉર્જા", "પ્રકાશસંશ્લેષણ દરમિયાન શોષાયેલી સૂર્યપ્રકાશની ઉર્જા"], "ans": 3, "exp": "પ્રકાશસંશ્લેષણ દરમિયાન શોષાયેલી સૂર્યપ્રકાશની ઉર્જા ઉત્પાદક સ્તર (પ્રથમ પોષક સ્તર) દ્વારા જ ઉર્જા સંગ્રહણ માટે વપરાય છે, પરંતુ તે ઉર્જા સ્થાનાંતરણ દરમિયાન નુકશાન માટે જવાબદાર નથી. શ્વસન (A), અપચયિત પદાર્થો (B), અને ઉત્સર્જન (C) એ ઉર્જા નુકશાનના મુખ્ય સ્રોતો છે. પ્રકાશસંશ્લેષણ (D) ઉર્જા પ્રવાહનો આધાર છે, નુકશાનનો નહીં.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને ઉર્જા પ્રવાહ", "ch": ""}, {"q": "એક પર્યાવરણીય તંત્રમાં, જો ઉત્પાદક સ્તરે 50,000 J ઉર્જા ઉપલબ્ધ હોય, તો તૃતીય પોષક સ્તર (શિકારી) સુધી પહોંચતી ઉર્જા લગભગ કેટલી હશે? (10% નિયમ ધ્યાનમાં લો)", "opts": ["500 J", "50 J", "5 J", "0.5 J"], "ans": 1, "exp": "10% નિયમ મુજબ, દરેક પોષક સ્તરમાં મેળવેલી ઉર્જાનો ફક્ત 10% જ આગળના પોષક સ્તરમાં સ્થાનાંતરિત થાય છે. ઉત્પાદક સ્તરે 50,000 J → પ્રાથમિક ઉપભોક્તા (પ્રથમ પોષક સ્તર): 5,000 J → દ્વિતીય ઉપભોક્તા (દ્વિતીય પોષક સ્તર): 500 J → તૃતીય ઉપભોક્તા (તૃતીય પોષક સ્તર): 50 J. આમ, તૃતીય પોષક સ્તર સુધી 50 J ઉર્જા પહોંચે છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને ઉર્જા પ્રવાહ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઉર્જા પ્રવાહ અને પોષક સ્તરો વિશે અસત્ય છે?", "opts": ["ઉર્જા પ્રવાહ પિરામિડ હંમેશા સીધો હોય છે.", "ઉર્જા પ્રવાહ પિરામિડમાં, ઉત્પાદક સ્તર સૌથી નીચે હોય છે.", "ઉર્જા પ્રવાહ પિરામિડમાં, શિખર શિકારી સ્તર સૌથી ઉપર હોય છે.", "ઉર્જા પ્રવાહ પિરામિડમાં, દરેક પોષક સ્તરની ઉર્જા સમાન હોય છે."], "ans": 3, "exp": "ઉર્જા પ્રવાહ પિરામિડમાં, દરેક પોષક સ્તરની ઉર્જા સમાન નથી હોતી (D). ઉર્જા પ્રવાહ પિરામિડ હંમેશા સીધો હોય છે (A), ઉત્પાદક સ્તર સૌથી નીચે હોય છે (B), અને શિખર શિકારી સ્તર સૌથી ઉપર હોય છે (C). દરેક પોષક સ્તરની ઉર્જા આગળના સ્તર કરતાં ઓછી હોય છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને ઉર્જા પ્રવાહ", "ch": ""}, {"q": "એક જળીય પર્યાવરણીય તંત્રમાં, ઉત્પાદકો દ્વારા સ્થિર કરવામાં આવેલી સૌર ઊર્જાનો માત્ર 10% જ પ્રાથમિક ઉપભોક્તાઓ સુધી પહોંચે છે. આ ઘટનાનું મુખ્ય કારણ શું છે, જે ઉર્જા પ્રવાહની દક્ષતાને સીધી અસર કરે છે અને તેની સાથે કયો અપવાદ જોડાયેલો છે?", "opts": ["ઉત્પાદકો દ્વારા શ્વસનમાં વપરાતી ઊર્જા અને પ્રકાશસંશ્લેષણની અપૂર્ણ કાર્યક્ષમતા, પરંતુ ડેટ્રિટસ આહાર શૃંખલામાં આ નિયમ લાગુ પડતો નથી", "પ્રાથમિક ઉપભોક્તાઓની પાચન ક્ષમતામાં અપૂર્ણતા અને ઉત્સેચકોની ઉણપ, પરંતુ જળીય તંત્રોમાં આ નિયમ લાગુ પડતો નથી", "ઉત્પાદકો દ્વારા ઉત્સર્જનમાં ગુમાવાતી ઊર્જા અને હોર્મોનલ અસંતુલન, પરંતુ સ્થલીય તંત્રોમાં આ નિયમ લાગુ પડતો નથી", "પ્રકાશસંશ્લેષણ દરમિયાન કાર્બન ડાયોક્સાઇડના શોષણમાં અપૂર્ણતા અને વાતાવરણીય પરિસ્થિતિઓ, પરંતુ કૃત્રિમ પર્યાવરણીય તંત્રોમાં આ નિયમ લાગુ પડતો નથી"], "ans": 0, "exp": "સાચો જવાબ વિકલ્પ A છે કારણ કે ઉર્જા પ્રવાહની દક્ષતા મુખ્યત્વે ઉત્પાદકો દ્વારા શ્વસનમાં વપરાતી ઊર્જા અને પ્રકાશસંશ્લેષણની અપૂર્ણ કાર્યક્ષમતાને કારણે ઘટે છે. ડેટ્રિટસ આહાર શૃંખલામાં ઉર્જા પ્રવાહ સીધો ઉત્પાદકોથી શરૂ થતો ન હોવાથી આ નિયમ લાગુ પડતો નથી. અન્ય વિકલ્પોમાં આપેલા કારણો જેવા કે પાચન ક્ષમતા, ઉત્સર્જનમાં ગુમાવાતી ઊર્જા કે કાર્બન ડાયોક્સાઇડનું શોષણ ઉર્જા પ્રવાહની દક્ષતાને સીધી રીતે અસર કરતા નથી.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય તંત્ર", "ch": ""}, {"q": "એક પર્યાવરણીય તંત્રમાં, ઉર્જા પ્રવાહ દરમિયાન નીચેનામાંથી કયું વિધાન અપવાદરૂપ છે, જે સામાન્ય નિયમોથી વિપરીત છે અને તેનું કારણ શું છે? (નોંધ: આ પ્રશ્નમાં બહુવિધ ખ્યાલોનું સંયોજન કરવામાં આવ્યું છે)", "opts": ["કેટલાક ઊંડા સમુદ્રી પર્યાવરણીય તંત્રોમાં રાસાયણિક સંશ્લેષણ કરતા બેક્ટેરિયા ઉત્પાદકો તરીકે કાર્ય કરે છે, જે સૌર ઊર્જા પર આધારિત નથી", "કેટલાક પરોપજીવીઓ તેમના યજમાનના શરીરમાંથી સીધી ઊર્જા મેળવે છે, જે પોષક સ્તરોના નિયમને અનુસરે છે", "કેટલાક સ્થલીય તંત્રોમાં, તૃતીય ઉપભોક્તાઓ પ્રાથમિક ઉપભોક્તાઓ કરતાં વધુ ઊર્જા મેળવે છે, જે ઉર્જા પ્રવાહના 10% નિયમને અનુસરે છે", "કેટલાક જળીય તંત્રોમાં, ઉત્પાદકો કરતાં પ્રાથમિક ઉપભોક્તાઓની સંખ્યા ઓછી હોય છે, જે પર્યાવરણીય પિરામિડના નિયમને અનુસરે છે"], "ans": 0, "exp": "સાચો જવાબ વિકલ્પ A છે કારણ કે ઊંડા સમુદ્રી પર્યાવરણીય તંત્રોમાં રાસાયણિક સંશ્લેષણ કરતા બેક્ટેરિયા ઉત્પાદકો તરીકે કાર્ય કરે છે, જે સૌર ઊર્જા પર આધારિત ન હોવાથી ઉર્જા પ્રવાહના સામાન્ય નિયમોથી અલગ પડે છે. અન્ય વિકલ્પોમાં આપેલા કિસ્સાઓ જેવા કે પરોપજીવીઓનો ઊર્જા મેળવવો, તૃતીય ઉપભોક્તાઓની ઊર્જા મેળવવાની ક્ષમતા કે જળીય તંત્રોમાં પોષક સ્તરોની સંખ્યા સામાન્ય નિયમોને અનુસરે છે.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય તંત્ર", "ch": ""}, {"q": "પર્યાવરણીય તંત્રમાં ઉર્જા પ્રવાહ દરમિયાન, જો એક પોષક સ્તરમાં 5000 J ઉર્જા ઉપલબ્ધ હોય અને આગળના પોષક સ્તરમાં માત્ર 250 J ઉર્જા પહોંચે, તો ઉર્જા હાનિનું મુખ્ય કારણ કયું હશે?", "opts": ["શ્વસન દરમ્યાન ઉર્જા ઉત્સર્જન", "અપઘટનકર્તાઓ દ્વારા ઉર્જા વપરાશ", "પોષક સ્તરો વચ્ચેના પરિવહન દરમ્યાન ઉર્જા નુકશાન", "સૂર્યપ્રકાશની અછતને લીધે ઉત્પાદનમાં ઘટાડો"], "ans": 0, "exp": "શ્વસન દરમ્યાન ઉર્જા ઉત્સર્જન એ ઉર્જા હાનિનું મુખ્ય કારણ છે, કારણ કે સજીવો તેમની જીવન પ્રક્રિયાઓ માટે ઉર્જાનો ઉપયોગ કરે છે અને ઉર્જા ઉષ્મા રૂપે બહાર ફેંકાય છે. અપઘટનકર્તાઓ દ્વારા ઉર્જા વપરાશ પણ થાય છે, પરંતુ તે મુખ્ય કારણ નથી. પોષક સ્તરો વચ્ચેના પરિવહન દરમ્યાન ઉર્જા નુકશાન નગણ્ય હોય છે, અને સૂર્યપ્રકાશની અછત ઉત્પાદનને અસર કરે છે, પરંતુ ઉર્જા પ્રવાહના સીધા નુકશાન સાથે સંબંધિત નથી.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર", "ch": ""}, {"q": "એક જળીય પર્યાવરણીય તંત્રમાં, જો ફાઇટોપ્લાંકટન (ઉત્પાદક) દ્વારા સ્થિર કરવામાં આવેલી સૌર ઉર્જાનો માત્ર 1% જ ઝૂપ્લાંકટન (પ્રાથમિક ઉપભોક્તા) સુધી પહોંચે, તો આ ઉર્જા હાનિનું મુખ્ય કારણ કયું હશે?", "opts": ["ફાઇટોપ્લાંકટન દ્વારા શ્વસન દરમ્યાન ઉર્જા વપરાશ", "ઝૂપ્લાંકટન દ્વારા અપૂરતો આહાર ગ્રહણ", "જળીય વાતાવરણમાં પ્રકાશનું અપવર્તન અને શોષણ", "ફાઇટોપ્લાંકટન અને ઝૂપ્લાંકટન વચ્ચેના અંતરને લીધે ઉર્જા નુકશાન"], "ans": 0, "exp": "ફાઇટોપ્લાંકટન દ્વારા શ્વસન દરમ્યાન ઉર્જા વપરાશ એ મુખ્ય કારણ છે, કારણ કે ઉત્પાદકો તેમની જીવન પ્રક્રિયાઓ માટે ઉર્જાનો ઉપયોગ કરે છે અને ઉર્જા ઉષ્મા રૂપે બહાર ફેંકાય છે. ઝૂપ્લાંકટન દ્વારા અપૂરતો આહાર ગ્રહણ, જળીય વાતાવરણમાં પ્રકાશનું અપવર્તન અને શોષણ, અને અંતરને લીધે ઉર્જા નુકશાન પણ થાય છે, પરંતુ તે મુખ્ય કારણ નથી.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર", "ch": ""}, {"q": "એક પર્યાવરણીય તંત્રમાં, જો ઉત્પાદક સ્તરે 1,00,000 J ઉર્જા ઉપલબ્ધ હોય, તો તૃતીયક ઉપભોક્તા સ્તરે કેટલી ઉર્જા પહોંચશે? (ધારો કે ઉર્જા પ્રવાહની કુશળતા 10% છે)", "opts": ["10 J", "100 J", "1,000 J", "10,000 J"], "ans": 1, "exp": "ઉત્પાદક સ્તરે 1,00,000 J ઉર્જા ઉપલબ્ધ હોવાને લીધે, પ્રાથમિક ઉપભોક્તા સ્તરે 10% ઉર્જા પહોંચશે (10,000 J), દ્વિતીયક ઉપભોક્તા સ્તરે 10% ઉર્જા પહોંચશે (1,000 J), અને તૃતીયક ઉપભોક્તા સ્તરે 10% ઉર્જા પહોંચશે (100 J). આમ, તૃતીયક ઉપભોક્તા સ્તરે 100 J ઉર્જા પહોંચશે.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઉર્જા પ્રવાહ અને પોષક સ્તરો વિશે અસાધારણ અપવાદરૂપ છે, જે સામાન્ય રીતે પર્યાવરણીય તંત્રમાં જોવા મળતું નથી?", "opts": ["ઉત્પાદક સ્તરથી પ્રાથમિક ઉપભોક્તા સ્તર સુધી ઉર્જા પ્રવાહની દક્ષતા 10% થી ઓછી હોય છે", "તૃતીયક ઉપભોક્તા સ્તરે ઉર્જા પ્રવાહની દક્ષતા પ્રાથમિક ઉપભોક્તા સ્તર કરતાં વધુ હોય છે", "ઉર્જા પ્રવાહ એકદિશાત્મક હોય છે અને પોષક સ્તરો વચ્ચે પાછળની દિશામાં વહેતો નથી", "ઉત્પાદક સ્તરે સ્થિર કરેલી ઉર્જાનો માત્ર 1% જેટલો ભાગ શીર્ષ પ્રિમારી કર્ણિવોર સુધી પહોંચે છે"], "ans": 1, "exp": "સામાન્ય રીતે, ઉર્જા પ્રવાહની દક્ષતા પોષક સ્તરો સાથે ઘટતી જાય છે, કારણ કે ઉર્જા હાનિ થતી રહે છે. તૃતીયક ઉપભોક્તા સ્તરે દક્ષતા પ્રાથમિક ઉપભોક્તા સ્તર કરતાં વધુ હોવું એ અસાધારણ અને અશક્ય છે, કારણ કે ઉર્જા હાનિની પ્રક્રિયા દરેક સ્તરે થાય છે. બાકીના વિધાનો સામાન્ય રીતે પર્યાવરણીય તંત્રમાં જોવા મળે છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને ઉર્જા પ્રવાહ", "ch": ""}, {"q": "એક જટિલ ખાદ્યજાળમાં, જો તૃતીયક ઉપભોક્તા (tertiary consumer) ને મળતી ઉર્જામાંથી માત્ર 10% ઉર્જા ચતુર્થક ઉપભોક્તા (quaternary consumer) સુધી પહોંચતી હોય, તો નીચેનામાંથી કયું વિધાન આ પરિસ્થિતિ માટે અપવાદરૂપ ગણી શકાય? (નોંધ: સામાન્ય ઉર્જા પ્રવાહના નિયમો ધ્યાનમાં લો.)", "opts": ["આ પરિસ્થિતિમાં ઉર્જા પ્રવાહની દક્ષતા અપેક્ષિત કરતાં વધુ છે, કારણ કે સામાન્ય રીતે માત્ર 5-8% ઉર્જા જ આગળના પોષક સ્તર સુધી પહોંચે છે.", "આ પરિસ્થિતિ માત્ર ઠંડા પ્રદેશોના પર્યાવરણીય તંત્રમાં જ શક્ય છે, જ્યાં ચયાપચય દર ધીમો હોય છે અને ઉર્જા નુકસાન ઓછું થાય છે.", "આ પરિસ્થિતિ માત્ર જળીય પર્યાવરણીય તંત્રમાં જ શક્ય છે, જ્યાં ઉર્જા પ્રવાહની દક્ષતા જમીન પરના તંત્ર કરતાં વધુ હોય છે.", "આ પરિસ્થિતિ માત્ર કૃત્રિમ પર્યાવરણીય તંત્ર (જેમ કે પ્રયોગશાળામાં ઉગાડેલા સજીવો) માં જ શક્ય છે, જ્યાં બાહ્ય ઉર્જા સ્ત્રોત ઉમેરવામાં આવે છે."], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. સામાન્ય રીતે, ઉર્જા પ્રવાહની દક્ષતા પોષક સ્તરોમાં 10% ના નિયમ મુજબ હોય છે, પરંતુ જળીય પર્યાવરણીય તંત્રમાં ઉર્જા પ્રવાહની દક્ષતા જમીન પરના તંત્ર કરતાં ઓછી હોય છે, કારણ કે જળીય સજીવોમાં ઉર્જા નુકસાન વધુ થાય છે (જેમ કે શ્વસન દરમિયાન ગરમીનું નુકસાન). તેથી, 10% ઉર્જા ચતુર્થક ઉપભોક્તા સુધી પહોંચવી એ જળીય તંત્ર માટે અપવાદરૂપ નથી, પરંતુ સામાન્ય નિયમ મુજબ જ છે. વિકલ્પ A ખોટો છે કારણ કે 10% ઉર્જા પ્રવાહ સામાન્ય નિયમ મુજબ જ છે. વિકલ્પ B ખોટો છે કારણ કે ઠંડા પ્રદેશોમાં ચયાપચય દર ધીમો હોવા છતાં ઉર્જા પ્રવાહની દક્ષતા વધુ હોતી નથી. વિકલ્પ D ખોટો છે કારણ કે કૃત્રિમ તંત્રમાં બાહ્ય ઉર્જા ઉમેરવાથી ઉર્જા પ્રવાહની દક્ષતા વધી શકે છે, પરંતુ આ પરિસ્થિતિ કુદરતી તંત્રમાં પણ શક્ય છે.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય તંત્રમાં ઉર્જા પ્રવાહ", "ch": ""}, {"q": "જળીય પર્યાવરણીય તંત્રમાં, ફાઇટોપ્લાંકટનથી ઝૂપ્લાંકટન સુધીના ઉર્જા પ્રવાહ દરમિયાન, નીચેનામાંથી કયો ઘટક ઉર્જા ગુમાવવાનું મુખ્ય કારણ બને છે, જ્યારે તાપમાન અત્યંત નીચું હોય?", "opts": ["શ્વસન દરમાં વધારો થવો", "ઉત્સર્જન દરમાં ઘટાડો થવો", "ઉત્સેચક ક્રિયાઓની ધીમી પડવી", "પ્રકાશસંશ્લેષણ દરમાં વધારો થવો"], "ans": 2, "exp": "અત્યંત નીચા તાપમાને, ઉત્સેચક ક્રિયાઓ ધીમી પડે છે, જેના કારણે ઉર્જા પ્રવાહની કાર્યક્ષમતા ઘટે છે. શ્વસન દર ઘટે છે (A ખોટું), ઉત્સર્જન દર પણ ઘટે છે પરંતુ તે ઉર્જા ગુમાવવાનું મુખ્ય કારણ નથી (B ખોટું). પ્રકાશસંશ્લેષણ દર ઘટે છે, વધતો નથી (D ખોટું).", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને ઉર્જા પ્રવાહ", "ch": ""}, {"q": "એક પર્યાવરણીય તંત્રમાં, જ્યારે ઉત્પાદક સ્તરથી પ્રાથમિક ઉપભોક્તા સ્તર સુધી ઉર્જા પ્રવાહ થાય છે, ત્યારે નીચેનામાંથી કયો અપવાદરૂપ પરિબળ ઉર્જા હસ્તાંતરણની દક્ષતા વધારી શકે છે?", "opts": ["ખાદ્ય સાંકળની લંબાઈ વધારવી", "ઉપભોક્તાઓની ચયાપચય ક્રિયા ધીમી પડવી", "ઉત્પાદકોની જૈવભાર વૃદ્ધિ દર વધારવી", "પર્યાવરણમાં ઓક્સિજનની માત્રા ઘટાડવી"], "ans": 2, "exp": "ઉત્પાદકોની જૈવભાર વૃદ્ધિ દર વધારવાથી વધુ ઉર્જા પ્રાથમિક ઉપભોક્તાઓને હસ્તાંતરિત થઈ શકે છે. ખાદ્ય સાંકળની લંબાઈ વધારવાથી ઉર્જા ગુમાવવાનું પ્રમાણ વધે (A ખોટું). ચયાપચય ક્રિયા ધીમી પડવાથી ઉર્જા ગુમાવવાનું પ્રમાણ વધે (B ખોટું). ઓક્સિજનની માત્રા ઘટાડવાથી શ્વસન ક્રિયા અસરગ્રસ્ત થાય (D ખોટું).", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને ઉર્જા પ્રવાહ", "ch": ""}, {"q": "એક જટિલ ખાદ્યજાળમાં, જ્યારે તૃતીયક ઉપભોક્તા (tertiary consumer) ને મળતી ઉર્જામાંથી માત્ર 5% ઉર્જા જ ચતુર્થક ઉપભોક્તા (quaternary consumer) સુધી પહોંચે છે, ત્યારે નીચેનામાંથી કયું કારણ સૌથી ઓછું યોગદાન આપે છે?", "opts": ["શારીરિક ક્રિયાઓ દરમિયાન ઉર્જા ગુમાવવી", "અપચય (indigestible) પદાર્થોનું ઉત્સર્જન", "તાપમાન નિયમન માટે ઉર્જા વાપરવી", "પ્રકાશસંશ્લેષણ દરમાં ઘટાડો થવો"], "ans": 3, "exp": "તૃતીયક ઉપભોક્તા દ્વારા ઉર્જા ગુમાવવાનું મુખ્ય કારણ શારીરિક ક્રિયાઓ (A), અપચય પદાર્થોનું ઉત્સર્જન (B), અને તાપમાન નિયમન (C) છે. પ્રકાશસંશ્લેષણ દરમાં ઘટાડો થવો (D) તૃતીયક ઉપભોક્તા માટે લાગુ પડતો નથી, કારણ કે તેઓ ઉત્પાદક નથી.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને ઉર્જા પ્રવાહ", "ch": ""}, {"q": "પર્યાવરણીય તંત્રમાં, જ્યારે ઉત્પાદક સ્તરથી તૃતીયક ઉપભોક્તા સ્તર સુધી ઉર્જા પ્રવાહ થાય છે, ત્યારે નીચેનામાંથી કયો ઘટક ઉર્જાના સૌથી મોટા નુકશાન માટે જવાબદાર નથી?", "opts": ["શ્વસન દરમ્યાન ઉર્જાનો વ્યય", "અપચયિત પદાર્થો દ્વારા ઉર્જાનો નિકાલ", "એક પોષક સ્તરથી બીજા પોષક સ્તરમાં ઉર્જાનો સ્થળાંતર", "પ્રકાશસંશ્લેષણ દરમ્યાન સૌર ઉર્જાનું શોષણ"], "ans": 3, "exp": "સી) એક પોષક સ્તરથી બીજા પોષક સ્તરમાં ઉર્જાનો સ્થળાંતર એ ઉર્જા નુકશાનનું મુખ્ય કારણ છે, કારણ કે દરેક સ્થળાંતર દરમ્યાન લગભગ 90% ઉર્જા ગુમાવાય છે. એ) શ્વસન દરમ્યાન ઉર્જાનો વ્યય અને બી) અપચયિત પદાર્થો દ્વારા ઉર્જાનો નિકાલ પણ ઉર્જા નુકશાનના મહત્વપૂર્ણ ઘટકો છે. ડી) પ્રકાશસંશ્લેષણ દરમ્યાન સૌર ઉર્જાનું શોષણ ઉત્પાદક સ્તર દ્વારા ઉર્જા મેળવવાનો માર્ગ છે, ઉર્જા નુકશાનનું કારણ નથી.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને તેના ઘટકો", "ch": ""}, {"q": "એક જટિલ ખાદ્યજાળ ધરાવતા પર્યાવરણીય તંત્રમાં, જો તૃતીયક ઉપભોક્તા (tertiary consumer) ને મળતી ઉર્જામાંથી માત્ર 10% ઉર્જા ચતુર્થક ઉપભોક્તા (quaternary consumer) સુધી પહોંચતી હોય, તો નીચેનામાંથી કયું વિધાન આ ઘટના માટે અપવાદરૂપ ગણી શકાય?", "opts": ["આ ઉર્જા પ્રવાહ દરમિયાન ઉષ્મા સ્વરૂપે ઉર્જાનો વ્યય થાય છે, જે ઉષ્માગતિશાસ્ત્રના બીજા નિયમનું પાલન કરે છે", "કેટલાક ચતુર્થક ઉપભોક્તાઓમાં ઉર્જાનું સંગ્રહણ વધુ કાર્યક્ષમ હોય છે, જેના કારણે 10% કરતાં વધુ ઉર્જા પ્રાપ્ત થઈ શકે છે", "જો તૃતીયક ઉપભોક્તા અને ચતુર્થક ઉપભોક્તા વચ્ચે પરોપજીવી સંબંધ હોય, તો ઉર્જા પ્રવાહની કાર્યક્ષમતા 10% કરતાં નોંધપાત્ર રીતે ઘટી શકે છે", "જળીય પર્યાવરણીય તંત્રમાં, ફાઇટોપ્લાંકટનથી ઝૂપ્લાંકટન સુધીના ઉર્જા પ્રવાહ દરમિયાન પણ આ જ પ્રમાણમાં ઉર્જા વ્યય થાય છે"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. સામાન્ય રીતે ઉર્જા પ્રવાહ દરમિયાન 10% નિયમ લાગુ પડે છે, પરંતુ પરોપજીવી સંબંધોમાં પરોપજીવી (parasite) પોતાના યજમાન (host) ની ઉર્જાનો મોટો ભાગ ઉપયોગમાં લે છે, જેના કારણે ઉર્જા પ્રવાહની કાર્યક્ષમતા 10% કરતાં ઘણી ઓછી થઈ શકે છે. આ એક અપવાદરૂપ પરિસ્થિતિ છે. વિકલ્પ A ઉષ્માગતિશાસ્ત્રના નિયમનું સામાન્ય પાલન દર્શાવે છે, જે અપવાદ નથી. વિકલ્પ B માં ઉર્જા સંગ્રહણની કાર્યક્ષમતા વધુ હોવાની વાત સાચી છે, પરંતુ તે અપવાદરૂપ નથી, કારણ કે કેટલાક સજીવોમાં ઉર્જા સંગ્રહણ વધુ કાર્યક્ષમ હોઈ શકે છે. વિકલ્પ D માં જળીય પર્યાવરણીય તંત્રમાં ઉર્જા પ્રવાહનું સામાન્ય વર્ણન છે, જે અપવાદ નથી.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય તંત્રમાં ઉર્જા પ્રવાહ", "ch": ""}, {"q": "એક પર્યાવરણીય તંત્રમાં, જ્યારે ઉત્પાદક સ્તરથી તૃતીયક ઉપભોક્તા સ્તર સુધી ઉર્જા પ્રવાહ થાય છે, ત્યારે નીચેનામાંથી કયો ઘટક ઉર્જાના નુકશાન માટે સૌથી ઓછો જવાબદાર છે?", "opts": ["શ્વસન દ્વારા ઉર્જાનો વ્યય", "અપચયિત પદાર્થોના ઉત્સર્જન દ્વારા ઉર્જાનો વ્યય", "ઉત્પાદક સ્તરમાં સ્થિર ન થયેલી સૌર ઊર્જા", "પોષક સ્તરમાં સ્થાનાંતરિત ન થયેલી ઉર્જા"], "ans": 1, "exp": "ઉત્પાદક સ્તરથી તૃતીયક ઉપભોક્તા સ્તર સુધી ઉર્જા પ્રવાહ દરમિયાન, અપચયિત પદાર્થોના ઉત્સર્જન દ્વારા ઉર્જાનો વ્યય (B) સૌથી ઓછો જવાબદાર છે. શ્વસન (A), ઉત્પાદક સ્તરમાં સ્થિર ન થયેલી સૌર ઊર્જા (C), અને પોષક સ્તરમાં સ્થાનાંતરિત ન થયેલી ઉર્જા (D) એ ઉર્જાના નુકશાનના મુખ્ય કારણો છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને તેના ઘટકો", "ch": ""}, {"q": "એક પર્યાવરણીય તંત્રમાં, ઉત્પાદક સ્તરથી તૃતીયક ઉપભોક્તા સ્તર સુધી ઉર્જા પ્રવાહ દરમિયાન, જો 10% ઉર્જા પ્રસારણ દક્ષતા ધરાવતા તંત્રમાં, તૃતીયક ઉપભોક્તા સ્તરે પહોંચતી ઉર્જા 100 J હોય, તો ઉત્પાદક સ્તરે કેટલી ઉર્જા હોવી જોઈએ?", "opts": ["10,000 J", "1,000 J", "100,000 J", "1,00,000 J"], "ans": 0, "exp": "તૃતીયક ઉપભોક્તા સ્તરે 100 J ઉર્જા પહોંચે છે, અને દરેક સ્તરે 10% ઉર્જા પ્રસારણ દક્ષતા છે. તો પ્રાથમિક ઉપભોક્તા સ્તરે 100 / 0.1 = 1,000 J, દ્વિતીયક ઉપભોક્તા સ્તરે 1,000 / 0.1 = 10,000 J, અને ઉત્પાદક સ્તરે 10,000 / 0.1 = 100,000 J ઉર્જા હોવી જોઈએ. પરંતુ પ્રશ્નમાં 10% દક્ષતા ધરાવતા તંત્રમાં તૃતીયક ઉપભોક્તા સ્તરે 100 J પહોંચે તો ઉત્પાદક સ્તરે 10,000 J હોવી જોઈએ (A સાચું). B, C, D ગણતરીમાં ખોટા છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને ઉર્જા પ્રવાહ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઉર્જા પ્રવાહ વિશે અસાધારણ અપવાદરૂપ છે, જ્યારે પર્યાવરણીય તંત્રમાં સજીવો વચ્ચે ઉર્જા પ્રસારણ થાય છે?", "opts": ["ઉર્જા પ્રવાહ એકદિશાત્મક હોય છે", "ઉર્જા પ્રવાહ દરમિયાન કેટલીક ઉર્જા ઉષ્મા રૂપે નષ્ટ થાય છે", "ઉર્જા પ્રવાહ દરમિયાન ઉર્જા સંગ્રહિત થઈ શકે છે", "ઉર્જા પ્રવાહ દરમિયાન ઉર્જા નવી રચના પામી શકે છે"], "ans": 3, "exp": "ઉર્જા પ્રવાહ હંમેશા એકદિશાત્મક હોય છે (A સાચું), ઉર્જા ઉષ્મા રૂપે નષ્ટ થાય છે (B સાચું), ઉર્જા સંગ્રહિત થઈ શકે છે (C સાચું), પરંતુ ઉર્જા નવી રચના પામી શકતી નથી (D અસાધારણ અપવાદરૂપ અને ખોટું).", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને ઉર્જા પ્રવાહ", "ch": ""}, {"q": "પર્યાવરણીય તંત્રમાં ઉર્જા પ્રવાહ દરમિયાન, જો એક પોષક સ્તરથી બીજા પોષક સ્તરમાં ઉર્જા સ્થાનાંતરણની દક્ષતા 20% હોય, તો નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["80% ઉર્જા શ્વસન દ્વારા વપરાય છે", "20% ઉર્જા અવશોષિત પદાર્થો રૂપે બહાર ફેંકાય છે", "80% ઉર્જા ઉષ્મા રૂપે નુકશાન થાય છે અને શ્વસન દ્વારા વપરાય છે", "20% ઉર્જા પ્રકાશસંશ્લેષણ દ્વારા સ્થિર કરવામાં આવે છે"], "ans": 2, "exp": "ઉર્જા સ્થાનાંતરણની દક્ષતા 20% હોવાનું એટલે કે 80% ઉર્જા ઉષ્મા રૂપે નુકશાન થાય છે અને શ્વસન ક્રિયા દ્વારા વપરાય છે. A) 80% ઉર્જા ફક્ત શ્વસન દ્વારા વપરાતી નથી, પરંતુ ઉષ્મા રૂપે પણ નુકશાન થાય છે. B) અવશોષિત પદાર્થો રૂપે બહાર ફેંકાતી ઉર્જા 20% નહીં, પરંતુ ઓછી હોય છે. D) પ્રકાશસંશ્લેષણ દ્વારા ઉર્જા સ્થિર કરવી એ ઉત્પાદક સ્તરની ક્રિયા છે, પોષક સ્તરો વચ્ચેના સ્થાનાંતરણની નહીં.", "ref": "Std 12 - Chapter 14: ઉર્જા પ્રવાહ અને પોષક સ્તરો", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઉર્જા પ્રવાહ વિશે અપવાદરૂપ છે, જ્યારે પર્યાવરણીય તંત્રમાં સજીવો વચ્ચે ઉર્જા સ્થાનાંતરણ થાય છે?", "opts": ["ઉર્જા પ્રવાહ એકદિશાત્મક હોય છે", "ઉર્જા પ્રવાહ દરમિયાન ઉષ્મા રૂપે નુકશાન થાય છે", "ઉર્જા પ્રવાહની દક્ષતા 100% હોઈ શકે છે", "ઉર્જા પ્રવાહ પોષક સ્તરો વચ્ચે થાય છે"], "ans": 2, "exp": "ઉર્જા પ્રવાહની દક્ષતા કદી પણ 100% હોતી નથી, કારણ કે ઉર્જા સ્થાનાંતરણ દરમિયાન હંમેશા ઉષ્મા રૂપે નુકશાન થાય છે. A) ઉર્જા પ્રવાહ હંમેશા એકદિશાત્મક હોય છે, એટલે કે ઉત્પાદકથી ઉપભોક્તા તરફ. B) ઉર્જા પ્રવાહ દરમિયાન ઉષ્મા રૂપે નુકશાન થવું એ સામાન્ય છે. D) ઉર્જા પ્રવાહ પોષક સ્તરો વચ્ચે થાય છે એ સાચું છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્રમાં ઉર્જા પ્રવાહ", "ch": ""}, {"q": "એક જળીય પર્યાવરણીય તંત્રમાં, ફાઇટોપ્લાંકટનથી ઝૂપ્લાંકટન સુધીના ઉર્જા પ્રવાહ દરમિયાન, નીચેનામાંથી કયો ઘટક ઉર્જા પ્રવાહની દક્ષતા વધારવામાં સૌથી ઓછો ફાળો આપે છે, જે અપવાદરૂપ છે?", "opts": ["ફાઇટોપ્લાંકટન દ્વારા પ્રકાશસંશ્લેષણની ક્રિયા દરમિયાન થતું ઉર્જાનું સ્થિરીકરણ", "ઝૂપ્લાંકટન દ્વારા ફાઇટોપ્લાંકટનના પાચન દરમિયાન ઉત્સેચકોની ક્રિયાશીલતા", "ફાઇટોપ્લાંકટન અને ઝૂપ્લાંકટન વચ્ચેના પોષક સ્તરમાં ઉર્જા સંગ્રહ માટે કાર્બોદિતનું સંશ્લેષણ", "ફાઇટોપ્લાંકટનના કોષોમાંથી ઝૂપ્લાંકટનના કોષોમાં ઉર્જાનું સીધું વિદ્યુતીય પ્રસારણ"], "ans": 3, "exp": "સાચો જવાબ વિકલ્પ D છે કારણ કે ઉર્જા પ્રવાહ દરમિયાન ઉર્જાનું સીધું વિદ્યુતીય પ્રસારણ ક્યારેય થતું નથી. ઉર્જા હંમેશા રાસાયણિક સ્વરૂપે (જેમ કે કાર્બોદિત, પ્રોટીન) એક પોષક સ્તરથી બીજામાં પ્રસારિત થાય છે. વિકલ્પ A, B અને C ઉર્જા પ્રવાહની સામાન્ય પ્રક્રિયાઓ છે અને તેથી અપવાદરૂપ નથી.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય તંત્ર", "ch": ""}, {"q": "એક પર્યાવરણીય તંત્રમાં, જો ઉત્પાદક સ્તરથી તૃતીયક ઉપભોક્તા સ્તર સુધી ઉર્જા પ્રવાહ દરમિયાન, નીચેનામાંથી કયું વિધાન ઉર્જા પ્રવાહની દિશા અને કાર્યક્ષમતા વિશે અસાધારણ અપવાદરૂપ છે?", "opts": ["ઉર્જા પ્રવાહ હંમેશા એકદિશીય હોય છે અને ઉત્પાદકથી ઉપભોક્તા તરફ જ પ્રવાહિત થાય છે", "ઉર્જા પ્રવાહ દરમિયાન દરેક પોષક સ્તરે ઉર્જાનો એક ભાગ ઉષ્મા સ્વરૂપે ગુમાવાય છે", "તૃતીયક ઉપભોક્તા સ્તરે પહોંચતી ઉર્જા ઉત્પાદક સ્તરની સરખામણીએ ખૂબ જ ઓછી હોય છે", "ઉર્જા પ્રવાહ દરમિયાન, તૃતીયક ઉપભોક્તા સ્તરની ઉર્જા ફરીથી ઉત્પાદક સ્તરમાં પરત આવી શકે છે"], "ans": 3, "exp": "સાચો જવાબ વિકલ્પ D છે કારણ કે ઉર્જા પ્રવાહ હંમેશા એકદિશીય હોય છે અને ક્યારેય ઉત્પાદક સ્તરમાં પરત આવતી નથી. ઉર્જા પ્રવાહ દરમિયાન ગુમાવાતી ઉર્જા ઉષ્મા સ્વરૂપે પર્યાવરણમાં વિખેરાઈ જાય છે. વિકલ્પ A, B અને C ઉર્જા પ્રવાહના સામાન્ય નિયમોનું પાલન કરે છે અને તેથી અપવાદરૂપ નથી.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય તંત્ર", "ch": ""}, {"q": "એક જટિલ ખાદ્યજાળમાં, જો તૃતીયક ઉપભોક્તાને મળતી ઉર્જામાંથી માત્ર 5% ઉર્જા જ બચી રહે છે, તો નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["ઉર્જા પ્રવાહની દક્ષતા 5% છે", "ઉર્જા પ્રવાહની દક્ષતા 95% છે", "ઉર્જા પ્રવાહની દક્ષતા 20% છે", "ઉર્જા પ્રવાહની દક્ષતા 10% છે"], "ans": 0, "exp": "જો તૃતીયક ઉપભોક્તાને મળતી ઉર્જામાંથી માત્ર 5% ઉર્જા બચી રહે છે, તો ઉર્જા પ્રવાહની દક્ષતા 5% છે (A). બાકીની ઉર્જા શ્વસન, અપચય પદાર્થો અને અન્ય ક્રિયાઓ દ્વારા વ્યય થાય છે. 95% (B), 20% (C), અને 10% (D) વિધાનો અસત્ય છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને ઉર્જા પ્રવાહ", "ch": ""}, {"q": "પર્યાવરણીય તંત્રમાં ઉર્જા પ્રવાહ દરમ્યાન, નીચેનામાંથી કયું વિધાન અપવાદરૂપ છે?", "opts": ["ઉર્જા પ્રવાહ એકદિશીય હોય છે", "ઉર્જા પ્રવાહ ચક્રીય હોય છે", "ઉર્જા પ્રવાહ પોષક સ્તરો વચ્ચે થાય છે", "ઉર્જા પ્રવાહ દરમ્યાન ઉર્જાનું નુકશાન થાય છે"], "ans": 1, "exp": "ઉર્જા પ્રવાહ અપવાદરૂપે ચક્રીય હોય છે (B) કારણ કે સામાન્ય રીતે ઉર્જા પ્રવાહ એકદિશીય હોય છે (A). ઉર્જા પ્રવાહ પોષક સ્તરો વચ્ચે થાય છે (C) અને ઉર્જાનું નુકશાન થાય છે (D), જે સામાન્ય વિધાનો છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને ઉર્જા પ્રવાહ", "ch": ""}, {"q": "એક જળીય પર્યાવરણીય તંત્રમાં, ફાઇટોપ્લાંકટન (ઉત્પાદક) થી ઝૂપ્લાંકટન (પ્રાથમિક ઉપભોક્તા) સુધીના ઉર્જા પ્રવાહ દરમિયાન, નીચેનામાંથી કયું વિધાન અપવાદરૂપ છે, જે સામાન્ય ઉર્જા પ્રવાહના નિયમોથી વિપરીત છે?", "opts": ["ફાઇટોપ્લાંકટન દ્વારા સ્થિર કરવામાં આવેલી ઉર્જામાંથી માત્ર 10% ઉર્જા ઝૂપ્લાંકટનને પ્રાપ્ત થાય છે.", "ઝૂપ્લાંકટન દ્વારા ગ્રહણ કરવામાં આવેલી ઉર્જામાંથી મોટાભાગની ઉર્જા શ્વસન દરમિયાન ઉષ્મા સ્વરૂપે વ્યય થાય છે.", "ફાઇટોપ્લાંકટન દ્વારા સ્થિર કરવામાં આવેલી ઉર્જામાંથી 50% કરતાં વધુ ઉર્જા ઝૂપ્લાંકટનને પ્રાપ્ત થાય છે.", "ઝૂપ્લાંકટન દ્વારા ગ્રહણ કરવામાં આવેલી ઉર્જામાંથી અમુક ભાગ અપાચિત ખોરાકના સ્વરૂપે વ્યય થાય છે."], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. સામાન્ય રીતે, ઉર્જા પ્રવાહના લિન્ડેમેનના 10% નિયમ મુજબ, એક પોષક સ્તરથી બીજા પોષક સ્તરમાં માત્ર 10% ઉર્જા પ્રસારિત થાય છે. તેથી, ફાઇટોપ્લાંકટનથી ઝૂપ્લાંકટન સુધી 50% કરતાં વધુ ઉર્જા પ્રસારિત થવી એ અપવાદરૂપ છે અને સામાન્ય નિયમોથી વિપરીત છે. અન્ય વિકલ્પો સામાન્ય ઉર્જા પ્રવાહના નિયમોને અનુરૂપ છે.", "ref": "Std 12 - પ્રકરણ 14: પર્યાવરણીય તંત્રમાં ઉર્જા પ્રવાહ", "ch": ""}, {"q": "એક જટિલ ખાદ્યજાળમાં, જ્યારે તૃતીયક ઉપભોક્તાને મળતી ઉર્જામાંથી માત્ર 5% ઉર્જા જ આગળના પોષક સ્તરમાં પ્રસારિત થાય છે, તો નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["આ ઘટના લિંકેજ લોસને કારણે થાય છે, જ્યાં ઉર્જા ઉષ્મા રૂપે ગુમાવાય છે", "આ ઘટના ઉર્જા પ્રવાહની દક્ષતામાં વધારો દર્શાવે છે", "આ ઘટના પોષક સ્તરો વચ્ચેના ઉર્જા પ્રવાહના 10% નિયમનો અપવાદ છે", "આ ઘટના ફક્ત સૂકા પર્યાવરણીય તંત્રમાં જોવા મળે છે"], "ans": 2, "exp": "સામાન્ય રીતે, ઉર્જા પ્રવાહના 10% નિયમ મુજબ એક પોષક સ્તરથી બીજા પોષક સ્તરમાં માત્ર 10% ઉર્જા પ્રસારિત થાય છે. પરંતુ કેટલાક અપવાદરૂપ પરિસ્થિતિઓમાં, જેમ કે જટિલ ખાદ્યજાળમાં, આ ટકાવારી 5% સુધી ઘટી શકે છે. લિંકેજ લોસ ઉર્જા નુકશાનનું એક કારણ છે, પરંતુ તે 10% નિયમનો અપવાદ નથી. ઉર્જા પ્રવાહની દક્ષતા ઘટાડે છે, નહીં કે વધારે. આ ઘટના ફક્ત સૂકા પર્યાવરણીય તંત્રમાં જ નહીં, પરંતુ જળીય તંત્રમાં પણ જોવા મળી શકે છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને તેના ઘટકો", "ch": ""}, {"q": "પર્યાવરણીય તંત્રમાં ઉર્જા પ્રવાહ દરમિયાન, નીચેનામાંથી કયું વિધાન અપવાદરૂપ છે?", "opts": ["ઉર્જા પ્રવાહ એકદિશાત્મક હોય છે", "ઉર્જા પ્રવાહ પોષક સ્તરો વચ્ચે 10% નિયમ અનુસાર થાય છે", "ઉર્જા પ્રવાહ ચક્રીય હોઈ શકે છે", "ઉર્જા પ્રવાહ દરમિયાન ઉષ્મા રૂપે નુકશાન થાય છે"], "ans": 2, "exp": "ઉર્જા પ્રવાહ હંમેશા એકદિશાત્મક હોય છે, એટલે કે ઉત્પાદકથી ઉપભોક્તા તરફ વહે છે. 10% નિયમ મુજબ, એક પોષક સ્તરથી બીજા પોષક સ્તરમાં માત્ર 10% ઉર્જા પ્રસારિત થાય છે. ઉર્જા પ્રવાહ દરમિયાન ઉષ્મા રૂપે નુકશાન થાય છે. પરંતુ ઉર્જા પ્રવાહ ક્યારેય ચક્રીય નથી હોતો, એટલે કે તે અપવાદરૂપ વિધાન છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર અને તેના ઘટકો", "ch": ""}, {"q": "જળીય પર્યાવરણીય તંત્રમાં, ફાઇટોપ્લાંકટન (ઉત્પાદક) થી ઝૂપ્લાંકટન (પ્રાથમિક ઉપભોક્તા) સુધીના ઉર્જા પ્રવાહ દરમ્યાન, નીચેનામાંથી કયો ઘટક ઉર્જાના નુકશાનમાં સૌથી ઓછો યોગદાન આપે છે?", "opts": ["શારીરિક ક્રિયાઓ દરમ્યાન ઉર્જાનો વપરાશ", "અપચયિત પદાર્થોના ઉત્સર્જન દ્વારા ઉર્જાનો નુકશાન", "પ્રકાશસંશ્લેષણ દરમ્યાન ઉર્જાનો વપરાશ", "ઉષ્મા રૂપે ઉર્જાનો વ્યય"], "ans": 2, "exp": "પ્રકાશસંશ્લેષણ દરમ્યાન ઉર્જાનો વપરાશ ફાઇટોપ્લાંકટન દ્વારા થાય છે, પરંતુ તે ઉર્જાનું સ્થિરીકરણ છે, ન કે નુકશાન. શારીરિક ક્રિયાઓ (A), અપચયિત પદાર્થોના ઉત્સર્જન (B), અને ઉષ્મા રૂપે વ્યય (D) ઉર્જાના નુકશાનના મુખ્ય કારણો છે.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર", "ch": ""}, {"q": "એક જટિલ ખાદ્યજાળમાં, તૃતીયક ઉપભોક્તાને મળતી ઉર્જામાંથી માત્ર 5% ઉર્જા જ આગળના પોષક સ્તરમાં પ્રસારિત થાય છે. આ પરિસ્થિતિમાં, નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["ઉર્જા પ્રવાહની દક્ષતા 5% છે, જે સરેરાશ 10% કરતાં ઓછી છે", "ઉર્જા પ્રવાહની દક્ષતા 50% છે, કારણ કે તૃતીયક ઉપભોક્તા દ્વારા ઉર્જાનો ઉપયોગ ઓછો થાય છે", "ઉર્જા પ્રવાહની દક્ષતા 20% છે, કારણ કે આ એક અપવાદરૂપ પરિસ્થિતિ છે", "ઉર્જા પ્રવાહની દક્ષતા 5% છે, કારણ કે તૃતીયક ઉપભોક્તા દ્વારા ઉર્જાનો ઉપયોગ શ્વસન અને ઉત્સર્જનમાં થાય છે"], "ans": 3, "exp": "તૃતીયક ઉપભોક્તાને મળતી ઉર્જામાંથી માત્ર 5% ઉર્જા આગળ પ્રસારિત થાય છે, જે દર્શાવે છે કે બાકીની ઉર્જા શ્વસન, ઉત્સર્જન, અને અન્ય જૈવિક ક્રિયાઓમાં વપરાઈ જાય છે. સરેરાશ ઉર્જા પ્રવાહની દક્ષતા 10% હોય છે, પરંતુ અહીં 5% હોવું શક્ય છે (A અંશતઃ સાચું પરંતુ અપૂર્ણ). B અને C ખોટા છે કારણ કે 50% અને 20% દક્ષતા અહીં લાગુ પડતી નથી.", "ref": "Std 12 - Chapter 14: પર્યાવરણીય તંત્ર", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
