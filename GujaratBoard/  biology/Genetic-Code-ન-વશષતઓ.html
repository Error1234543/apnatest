<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genetic Code ની વિશેષતાઓ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Genetic Code ની વિશેષતાઓ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Genetic Code ની વિશેષતાઓ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "જનીન કોડની નીચેનામાંથી કયી વિશેષતા તેને 'સાર્વત્રિક' (Universal) બનાવે છે?", "opts": ["તે તમામ જીવજંતુઓમાં એકસરખો હોય છે, સિવાય કેટલાક મિટોકોન્ડ્રિયલ કોડનના અપવાદો", "તે ફક્ત પ્રોકેરિયોટ્સમાં જોવા મળે છે, યુકેરિયોટ્સમાં અલગ હોય છે", "તે ફક્ત પ્રોટીન સંશ્લેષણ માટે જ વપરાય છે, RNA સંશ્લેષણ માટે નહીં", "તે કોડનના ત્રીજા બેઝ પર આધાર રાખે છે, જેને 'વોબલ બેઝ' કહેવાય છે"], "ans": 0, "exp": "જનીન કોડ સાર્વત્રિક છે કારણ કે તે તમામ જીવજંતુઓમાં લગભગ એકસરખો હોય છે, સિવાય કેટલાક મિટોકોન્ડ્રિયલ જનીન કોડમાં જોવા મળતા અપવાદો. બાકીના વિકલ્પો ખોટા છે: B) જનીન કોડ યુકેરિયોટ્સ અને પ્રોકેરિયોટ્સ બંનેમાં સમાન હોય છે. C) જનીન કોડ પ્રોટીન સંશ્લેષણ માટે વપરાય છે, પરંતુ RNA સંશ્લેષણ માટે પણ તે મહત્વનો ભાગ ભજવે છે. D) વોબલ બેઝ કોડની લવચીકતા દર્શાવે છે, પરંતુ સાર્વત્રિકતાનું કારણ નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "જનીન કોડની 'અનુક્રમણિકા' (Commaless) વિશેષતાનો અર્થ શું છે?", "opts": ["કોડન વચ્ચે કોઈ વિરામ ચિહ્ન નથી, અને તે સતત વાંચવામાં આવે છે", "કોડન વચ્ચે વિશિષ્ટ વિરામ ચિહ્ન હોય છે, જે mRNA પર જોવા મળે છે", "કોડનની લંબાઈ હંમેશા ૨ ન્યુક્લિઓટાઇડની હોય છે", "કોડનની વાંચણી હંમેશા ૫' થી ૩' દિશામાં થાય છે, પરંતુ વિરામ ચિહ્ન હોય છે"], "ans": 0, "exp": "જનીન કોડ અનુક્રમણિકા છે કારણ કે તે કોડન વચ્ચે કોઈ વિરામ ચિહ્ન વગર સતત વાંચવામાં આવે છે. B) ખોટું છે કારણ કે કોડન વચ્ચે કોઈ વિરામ ચિહ્ન નથી. C) ખોટું છે કારણ કે કોડનની લંબાઈ હંમેશા ૩ ન્યુક્લિઓટાઇડની હોય છે. D) ખોટું છે કારણ કે કોડનની વાંચણી ૫' થી ૩' દિશામાં થાય છે, પરંતુ વિરામ ચિહ્ન નથી હોતું.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "જનીન કોડની 'લવચીકતા' (Flexibility) ની વિશેષતાનો સૌથી યોગ્ય ઉદાહરણ કયું છે?", "opts": ["એક જ એમિનો એસિડ માટે એક કરતાં વધારે કોડન હોય છે", "એક જ કોડન વિવિધ એમિનો એસિડ માટે કોડ કરે છે", "કોડનની વાંચણી ૩' થી ૫' દિશામાં થાય છે", "કોડનની લંબાઈ ૨ ન્યુક્લિઓટાઇડની હોય છે"], "ans": 0, "exp": "જનીન કોડની લવચીકતા એટલે કે એક જ એમિનો એસિડ માટે એક કરતાં વધારે કોડન હોય છે, જેને 'ડિજનરેસી' કહેવાય છે. B) ખોટું છે કારણ કે એક કોડન ફક્ત એક જ એમિનો એસિડ માટે કોડ કરે છે. C) ખોટું છે કારણ કે કોડનની વાંચણી હંમેશા ૫' થી ૩' દિશામાં થાય છે. D) ખોટું છે કારણ કે કોડનની લંબાઈ હંમેશા ૩ ન્યુક્લિઓટાઇડની હોય છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "જનીન કોડમાં 'વોબલ હાઇપોથેસિસ' (Wobble Hypothesis) નો સિદ્ધાંત શાને લગતો છે?", "opts": ["tRNA ના એન્ટીકોડન લૂપમાં પહેલા બેઝની લવચીકતા", "mRNA ના કોડન અને tRNA ના એન્ટીકોડન વચ્ચેના ત્રીજા બેઝના જોડાણની લવચીકતા", "DNA ની ડબલ હેલિક્સ સ્ટ્રક્ચરમાં બેઝ જોડાણની લવચીકતા", "rRNA ની સેકન્ડરી સ્ટ્રક્ચરમાં બેઝ જોડાણની લવચીકતા"], "ans": 1, "exp": "વોબલ હાઇપોથેસિસ mRNA ના કોડન અને tRNA ના એન્ટીકોડન વચ્ચેના ત્રીજા બેઝના જોડાણની લવચીકતાને દર્શાવે છે, જેના કારણે એક જ tRNA વિવિધ કોડન સાથે જોડાઈ શકે છે. A) ખોટું છે કારણ કે એન્ટીકોડન લૂપમાં પહેલા બેઝની લવચીકતા નથી. C) ખોટું છે કારણ કે DNA ની ડબલ હેલિક્સ સ્ટ્રક્ચરમાં બેઝ જોડાણ સખત નિયમો દ્વારા નક્કી થાય છે. D) ખોટું છે કારણ કે rRNA ની સેકન્ડરી સ્ટ્રક્ચરમાં બેઝ જોડાણની લવચીકતા વોબલ હાઇપોથેસિસ સાથે સંબંધિત નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "જનીન કોડની નીચેનામાંથી કયી વિશેષતા તેને 'અતિવ્યાપી' (Overlapping) ન બનાવે છે?", "opts": ["કોડન હંમેશા ૩ ન્યુક્લિઓટાઇડનો બનેલો હોય છે અને તે એકબીજા સાથે ઓવરલેપ થતો નથી", "કોડનની વાંચણી એક જ ફ્રેમમાં થાય છે, અને તે ફ્રેમશિફ્ટ થતો નથી", "એક જ ન્યુક્લિઓટાઇડ વિવિધ કોડનમાં સામેલ હોય છે", "કોડનની વાંચણી ૫' થી ૩' દિશામાં થાય છે"], "ans": 2, "exp": "જનીન કોડ અતિવ્યાપી નથી કારણ કે એક જ ન્યુક્લિઓટાઇડ વિવિધ કોડનમાં સામેલ હોતો નથી. A) સાચું છે કારણ કે કોડન હંમેશા ૩ ન્યુક્લિઓટાઇડનો બનેલો હોય છે અને ઓવરલેપ થતો નથી. B) સાચું છે કારણ કે કોડનની વાંચણી એક જ ફ્રેમમાં થાય છે. D) સાચું છે કારણ કે કોડનની વાંચણી ૫' થી ૩' દિશામાં થાય છે, પરંતુ આ અતિવ્યાપી ન હોવાનું કારણ નથી.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિવિધતા", "ch": ""}, {"q": "જનીન કોડની 'ડિજનરેટ' (Degenerate) વિશેષતાને લગતા નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["એક જ એમિનો એસિડ માટે એક જ કોડોન હોય છે.", "એક જ એમિનો એસિડ માટે બહુવિધ કોડોન હોઈ શકે છે.", "એક જ કોડોન બહુવિધ એમિનો એસિડ માટે કોડ કરે છે.", "કોડોનની સંખ્યા એમિનો એસિડની સંખ્યા જેટલી જ હોય છે."], "ans": 1, "exp": "ડિજનરેટ કોડનો અર્થ એ છે કે એક જ એમિનો એસિડ માટે બહુવિધ કોડોન હોઈ શકે છે. ઉદાહરણ તરીકે, લ્યુસીન માટે UUA, UUG, CUU, CUC, CUA, અને CUG કોડોન હોય છે. વિકલ્પ A ખોટો છે કારણ કે ડિજનરેટ કોડ એક જ એમિનો એસિડ માટે એક જ કોડોન નથી. વિકલ્પ C ખોટો છે કારણ કે એક કોડોન ફક્ત એક જ એમિનો એસિડ માટે કોડ કરે છે. વિકલ્પ D ખોટો છે કારણ કે કોડોનની સંખ્યા (64) એમિનો એસિડની સંખ્યા (20) કરતાં વધારે છે.", "ref": "Std 12 - અધ્યાય 6: આનુવંશિકતાનો આણ્વિક આધાર", "ch": ""}, {"q": "જનીન કોડની 'સંખ્યાબંધતા' (Redundancy) અને 'ડિજનરેટ' વિશેષતાઓ વચ્ચેનો તફાવત કયો છે?", "opts": ["સંખ્યાબંધતા એટલે એક જ કોડોન બહુવિધ એમિનો એસિડ માટે કોડ કરે, જ્યારે ડિજનરેટ એટલે એક જ એમિનો એસિડ માટે બહુવિધ કોડોન.", "સંખ્યાબંધતા એટલે એક જ એમિનો એસિડ માટે બહુવિધ કોડોન, જ્યારે ડિજનરેટ એટલે કોડોનની સંખ્યા એમિનો એસિડ કરતાં ઓછી હોય.", "સંખ્યાબંધતા અને ડિજનરેટ એ જ વિશેષતા છે, ફરક ફક્ત નામમાં છે.", "સંખ્યાબંધતા એટલે કોડોનની સંખ્યા એમિનો એસિડ કરતાં વધારે હોય, જ્યારે ડિજનરેટ એટલે એક જ કોડોન એક જ એમિનો એસિડ માટે કોડ કરે."], "ans": 0, "exp": "સંખ્યાબંધતા એટલે એક જ કોડોન બહુવિધ એમિનો એસિડ માટે કોડ કરે (જે કોઈપણ જીવમાં જોવા મળતું નથી, પરંતુ સૈદ્ધાંતિક રીતે શક્ય છે), જ્યારે ડિજનરેટ એટલે એક જ એમિનો એસિડ માટે બહુવિધ કોડોન હોઈ શકે. વિકલ્પ B ખોટો છે કારણ કે સંખ્યાબંધતા અને ડિજનરેટ વચ્ચેનો તફાવત સ્પષ્ટ નથી. વિકલ્પ C ખોટો છે કારણ કે બંને વિશેષતાઓ અલગ છે. વિકલ્પ D ખોટો છે કારણ કે ડિજનરેટનો અર્થ એક જ એમિનો એસિડ માટે બહુવિધ કોડોન છે, ન કે એક જ કોડોન એક જ એમિનો એસિડ માટે કોડ કરે.", "ref": "Std 12 - અધ્યાય 6: આનુવંશિકતાનો આણ્વિક આધાર", "ch": ""}, {"q": "જનીન કોડની 'વોબલ હાઇપોથેસિસ' ની સીધી અસર નીચેનામાંથી કયા પર જોવા મળે છે?", "opts": ["DNA ની દ્વિગુણન પ્રક્રિયા", "mRNA અને tRNA વચ્ચેની જોડાણ પ્રક્રિયા", "પ્રોટીનની દ્વિતીય સંરચના", "રાઇબોઝોમની સંરચના"], "ans": 1, "exp": "વોબલ હાઇપોથેસિસ mRNA અને tRNA વચ્ચેની જોડાણ પ્રક્રિયા પર અસર કરે છે, જ્યાં tRNA ના એન્ટીકોડોન લવચીક રીતે mRNA ના કોડોન સાથે જોડાઈ શકે છે. વિકલ્પ A ખોટો છે કારણ કે DNA ની દ્વિગુણન પ્રક્રિયા વોબલ હાઇપોથેસિસ સાથે સીધો સંબંધ ધરાવતો નથી. વિકલ્પ C ખોટો છે કારણ કે પ્રોટીનની દ્વિતીય સંરચના વોબલ હાઇપોથેસિસ પર આધારિત નથી. વિકલ્પ D ખોટો છે કારણ કે રાઇબોઝોમની સંરચના વોબલ હાઇપોથેસિસ સાથે સીધો સંબંધ ધરાવતી નથી.", "ref": "Std 12 - અધ્યાય 6: આનુવંશિકતાનો આણ્વિક આધાર", "ch": ""}, {"q": "જનીન કોડની 'અતિવ્યાપી ન હોવાની' (Non-overlapping) વિશેષતાનો અર્થ શું છે?", "opts": ["એક કોડોનનો ઉપયોગ એક જ વખત થઈ શકે છે.", "કોડોન એકબીજા સાથે ઓવરલેપ થતા નથી, અને પ્રત્યેક ન્યુક્લિયોટાઇડ ફક્ત એક જ કોડોનમાં સામેલ હોય છે.", "કોડોન એકબીજા સાથે ઓવરલેપ થાય છે, પરંતુ ફક્ત પ્રોકેરિયોટ્સમાં જ.", "કોડોનની લંબાઈ હંમેશા 3 ન્યુક્લિયોટાઇડની હોય છે, પરંતુ તે ઓવરલેપ થઈ શકે છે."], "ans": 1, "exp": "અતિવ્યાપી ન હોવાની વિશેષતાનો અર્થ એ છે કે કોડોન એકબીજા સાથે ઓવરલેપ થતા નથી, અને પ્રત્યેક ન્યુક્લિયોટાઇડ ફક્ત એક જ કોડોનમાં સામેલ હોય છે. વિકલ્પ A ખોટો છે કારણ કે એક કોડોનનો ઉપયોગ એક જ વખત થઈ શકે એ અતિવ્યાપી ન હોવાની વિશેષતાનો અર્થ નથી. વિકલ્પ C ખોટો છે કારણ કે કોડોન એકબીજા સાથે ઓવરલેપ થતા નથી, એ સાર્વત્રિક છે. વિકલ્પ D ખોટો છે કારણ કે કોડોનની લંબાઈ હંમેશા 3 ન્યુક્લિયોટાઇડની હોય છે, પરંતુ તે ઓવરલેપ થતું નથી.", "ref": "Std 12 - અધ્યાય 6: આનુવંશિકતાનો આણ્વિક આધાર", "ch": ""}, {"q": "જનીન કોડની 'સાર્વત્રિકતા' (Universality) ની અપવાદરૂપ સ્થિતિ નીચેનામાંથી ક્યાં જોવા મળે છે?", "opts": ["મનુષ્ય અને ચિમ્પાન્ઝીના જનીન કોડમાં", "માઇટોકોન્ડ્રિયલ DNA ના જનીન કોડમાં", "બેક્ટરિયા અને વાઇરસના જનીન કોડમાં", "પ્લાન્ટ અને એનિમલના જનીન કોડમાં"], "ans": 1, "exp": "જનીન કોડની સાર્વત્રિકતાનો અપવાદ માઇટોકોન્ડ્રિયલ DNA ના જનીન કોડમાં જોવા મળે છે, જ્યાં કેટલાક કોડોન ભિન્ન અર્થ ધરાવે છે. ઉદાહરણ તરીકે, UGA કોડોન માઇટોકોન્ડ્રિયલ DNAમાં ટ્રિપ્ટોફેન માટે કોડ કરે છે, જ્યારે સાયટોપ્લાઝમિક કોડમાં તે સ્ટોપ કોડોન છે. વિકલ્પ A, C, અને D ખોટા છે કારણ કે તેમાં જનીન કોડ સાર્વત્રિક જ છે.", "ref": "Std 12 - અધ્યાય 6: આનુવંશિકતાનો આણ્વિક આધાર", "ch": ""}, {"q": "જનીન કોડની 'સંખ્યાબંધતા' (Redundancy) વિશેષતાને લગતા નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["એક જ એમિનો એસિડ માટે એકથી વધારે કોડોન હોઈ શકે છે.", "આ વિશેષતા કોડને ત્રુટિ સહિષ્ણુતા (Error tolerance) પ્રદાન કરે છે.", "મિથાયોનિન અને ટ્રિપ્ટોફેન સિવાયના બધા જ એમિનો એસિડ માટે બહુવિધ કોડોન હોય છે.", "આ વિશેષતા કોડની 'ડિજનરેટ' વિશેષતાને સીધી રીતે વિરોધે છે."], "ans": 3, "exp": "સંખ્યાબંધતા (Redundancy) અને ડિજનરેટ (Degenerate) વિશેષતાઓ એકબીજાની પર્યાયવાચી છે, ન કે વિરોધી. બંનેનો અર્થ એક જ એમિનો એસિડ માટે બહુવિધ કોડોન હોય છે. A, B, અને C વિધાનો સંખ્યાબંધતાને યોગ્ય રીતે વર્ણવે છે, પરંતુ D ખોટું છે કારણ કે આ બંને વિશેષતાઓ એક જ ઘટનાને દર્શાવે છે.", "ref": "Std 12 - અધ્યાય 6: જનીન અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "જનીન કોડમાં 'સ્ટોપ કોડોન' (Stop Codon) ની ભૂમિકા નીચેનામાંથી કઈ નથી?", "opts": ["પ્રોટીન સંશ્લેષણના અંતને સૂચવવું.", "રિબોઝોમને પોલિપેપ્ટાઇડ શૃંખલાથી અલગ થવાનો સંકેત આપવો.", "એમિનોએસિલ-ટીઆરએનએ ને રિબોઝોમની A સાઇટ પર બાંધવું.", "પ્રોટીન સંશ્લેષણ દરમિયાન શૃંખલા વૃદ્ધિને રોકવી."], "ans": 2, "exp": "સ્ટોપ કોડોન (UAA, UAG, UGA) પ્રોટીન સંશ્લેષણના અંતને સૂચવે છે, રિબોઝોમને અલગ થવાનો સંકેત આપે છે, અને શૃંખલા વૃદ્ધિને રોકે છે. પરંતુ તે એમિનોએસિલ-ટીઆરએનએ ને રિબોઝોમની A સાઇટ પર બાંધતું નથી, કારણ કે સ્ટોપ કોડોન માટે કોઈ ટીઆરએનએ નથી.", "ref": "Std 12 - અધ્યાય 6: જનીન અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "જનીન કોડની 'અતિવ્યાપી ન હોવાની' (Non-overlapping) વિશેષતાને લગતા નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["એક કોડોન એક જ એમિનો એસિડ માટે કોડ કરે છે.", "કોડોનની વાચા (Reading frame) નક્કી હોય છે.", "એક ન્યુક્લિયોટાઇડ એકથી વધારે કોડોનમાં સમાવિષ્ટ થઈ શકે છે.", "આ વિશેષતા કોડને સ્પષ્ટ અને અસરકારક બનાવે છે."], "ans": 2, "exp": "અતિવ્યાપી ન હોવાની વિશેષતાનો અર્થ એ છે કે એક ન્યુક્લિયોટાઇડ ફક્ત એક જ કોડોનમાં સમાવિષ્ટ થાય છે. A, B, અને D વિધાનો સત્ય છે, પરંતુ C ખોટું છે કારણ કે અતિવ્યાપી ન હોવાની વિશેષતાને લીધે એક ન્યુક્લિયોટાઇડ એકથી વધારે કોડોનમાં સમાવિષ્ટ થતું નથી.", "ref": "Std 12 - અધ્યાય 6: જનીન અને જનીન અભિવ્યક્તિ", "ch": ""}, {"q": "જનીન કોડની 'અતિચલણસમ' (Ambiguous) વિશેષતાને લગતા નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["એક જ કોડોન વિવિધ એમિનો એસિડ માટે કોડ કરી શકે છે.", "એક જ એમિનો એસિડ માટે એકથી વધારે કોડોન હોઈ શકે છે.", "કોડોન વચ્ચે કોઈ વિરામ ચિહ્ન નથી, પરંતુ તે અતિવ્યાપી છે.", "કોડોનની વ્યાખ્યા mRNA ની 5' થી 3' દિશામાં જ થાય છે."], "ans": 0, "exp": "જનીન કોડ 'અતિચલણસમ' (Ambiguous) નથી, પરંતુ અહીં પ્રશ્ન તેની વિશેષતાને લગતો છે. સત્ય વિધાન એ છે કે એક જ કોડોન એક જ એમિનો એસિડ માટે કોડ કરે છે, પરંતુ જો કોઈ મ્યુટેશન થાય તો તે વિવિધ એમિનો એસિડ માટે કોડ કરી શકે (જે અતિચલણસમતાનું ઉદાહરણ છે). ઓપ્શન B 'ડિજનરેટ' વિશેષતાને વર્ણવે છે, ઓપ્શન C 'અનુક્રમણિકા' અને 'અતિવ્યાપી' વિશે છે, અને ઓપ્શન D કોડની દિશા વિશે છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "જનીન કોડમાં 'સ્ટાર્ટ કોડોન' (AUG) અને 'સ્ટોપ કોડોન' (UAA, UAG, UGA) ની ભૂમિકાને લગતા નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["AUG કોડોન હંમેશા મિથાયોનિન (Met) એમિનો એસિડ માટે કોડ કરે છે.", "UAA, UAG, અને UGA કોડોન પ્રોટીન સંશ્લેષણને સમાપ્ત કરે છે.", "સ્ટોપ કોડોન માટે કોઈ tRNA નથી, પરંતુ રિલીઝ ફેક્ટર તેની ઓળખ કરે છે.", "સ્ટાર્ટ કોડોન પ્રોટીન સંશ્લેષણની શરૂઆત કરે છે, પરંતુ તે પ્રોટીનના અંતમાં પણ હોઈ શકે છે."], "ans": 3, "exp": "સ્ટાર્ટ કોડોન (AUG) પ્રોટીન સંશ્લેષણની શરૂઆત કરે છે અને હંમેશા મિથાયોનિન (Met) માટે કોડ કરે છે, પરંતુ તે પ્રોટીનના અંતમાં નથી હોતું. ઓપ્શન D ખોટું છે કારણ કે સ્ટાર્ટ કોડોન ફક્ત શરૂઆતમાં જ હોય છે. ઓપ્શન A, B, અને C સત્ય છે.", "ref": "Std 12 - અધ્યાય 6: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "ch": ""}, {"q": "જનીન કોડની 'ડિજનરેટ' અને 'સંખ્યાબંધતા' વિશેષતાઓ વચ્ચેનો મૂળભૂત તફાવત કયો છે?", "opts": ["ડિજનરેટ કોડમાં એક જ કોડોન બહુવિધ એમિનો એસિડ માટે કોડ કરે છે, જ્યારે સંખ્યાબંધતામાં એક જ એમિનો એસિડ માટે બહુવિધ કોડોન હાજર હોય છે.", "ડિજનરેટ કોડમાં એક જ એમિનો એસિડ માટે બહુવિધ કોડોન હાજર હોય છે, જ્યારે સંખ્યાબંધતામાં કોડોનની સંખ્યા એમિનો એસિડ કરતાં ઓછી હોય છે.", "ડિજનરેટ કોડમાં કોડોનની સંખ્યા એમિનો એસિડ કરતાં ઓછી હોય છે, જ્યારે સંખ્યાબંધતામાં એક જ કોડોન બહુવિધ એમિનો એસિડ માટે કોડ કરે છે.", "ડિજનરેટ અને સંખ્યાબંધતા એ જ એક વિશેષતા છે, પરંતુ ભિન્ન નામે ઓળખાય છે."], "ans": 0, "exp": "A) યોગ્ય છે કારણ કે ડિજનરેટ કોડમાં એક જ કોડોન બહુવિધ એમિનો એસિડ માટે કોડ કરે છે (જે જનીન કોડમાં થતું નથી), જ્યારે સંખ્યાબંધતામાં એક જ એમિનો એસિડ માટે બહુવિધ કોડોન હાજર હોય છે. B) ખોટું છે કારણ કે ડિજનરેટ અને સંખ્યાબંધતા વચ્ચેનો તફાવત કોડોન અને એમિનો એસિડ વચ્ચેનો સંબંધ છે. C) ખોટું છે કારણ કે કોડોનની સંખ્યા એમિનો એસિડ કરતાં વધારે હોય છે. D) ખોટું છે કારણ કે ડિજનરેટ અને સંખ્યાબંધતા ભિન્ન વિશેષતાઓ છે.", "ref": "Std 12 - અધ્યાય 6: આનુવંશિકતાનો આણ્વિક આધાર", "ch": ""}, {"q": "જનીન કોડમાં 'સ્ટોપ કોડોન' (UAA, UAG, UGA) ની ભૂમિકા નીચેનામાંથી કઈ નથી?", "opts": ["પ્રોટીન સંશ્લેષણની સમાપ્તિ કરવી.", "રિબોઝોમને mRNA પરથી અલગ કરવું.", "પોલિપેપ્ટાઇડ શૃંખલાને લંબાવવી.", "પ્રોટીન સંશ્લેષણ દરમિયાન ત્રણ-ન્યુક્લિયોટાઇડ કોડોન તરીકે કામ કરવું."], "ans": 2, "exp": "C) યોગ્ય છે કારણ કે સ્ટોપ કોડોન પ્રોટીન સંશ્લેષણની સમાપ્તિ કરે છે, પોલિપેપ્ટાઇડ શૃંખલાને લંબાવતું નથી. A) ખોટું છે કારણ કે સ્ટોપ કોડોન પ્રોટીન સંશ્લેષણની સમાપ્તિ કરે છે. B) ખોટું છે કારણ કે સ્ટોપ કોડોન રિબોઝોમને mRNA પરથી અલગ કરે છે. D) ખોટું છે કારણ કે સ્ટોપ કોડોન ત્રણ-ન્યુક્લિયોટાઇડ કોડોન તરીકે કામ કરે છે.", "ref": "Std 12 - અધ્યાય 6: આનુવંશિકતાનો આણ્વિક આધાર", "ch": ""}, {"q": "જનીન કોડની 'સંખ્યાબંધતા' (Redundancy) અને 'ડિજનરેટ' (Degenerate) વિશેષતાઓને લગતા નીચેનામાંથી કયું વિધાન સૌથી યોગ્ય રીતે સમજાવે છે કે કેટલાક એમિનો એસિડ માટે એક કરતાં વધુ કોડોન હાજર છે, પરંતુ તે કોડોનના પ્રથમ બે ન્યુક્લિયોટાઇડ્સ સમાન હોય છે?", "opts": ["આ વિશેષતા 'વોબલ હાઇપોથેસિસ' દ્વારા સમજાવી શકાય છે, જેમાં ત્રીજા ન્યુક્લિયોટાઇડમાં લવચીકતા હોય છે.", "આ વિશેષતા 'સાર્વત્રિકતા' દ્વારા સમજાવી શકાય છે, જેમાં તમામ જીવો એકસરખા કોડોન વાપરે છે.", "આ વિશેષતા 'અતિવ્યાપી ન હોવાની' દ્વારા સમજાવી શકાય છે, જેમાં કોડોન એકબીજા સાથે ઓવરલેપ થતાં નથી.", "આ વિશેષતા 'અનુક્રમણિકા' દ્વારા સમજાવી શકાય છે, જેમાં કોડોન વચ્ચે કોઈ વિરામ ચિહ્નો નથી."], "ans": 0, "exp": "વિકલ્પ A સહી છે કારણ કે 'વોબલ હાઇપોથેસિસ' એ જણાવે છે કે કોડોનના ત્રીજા ન્યુક્લિયોટાઇડમાં લવચીકતા હોય છે, જેથી એક કરતાં વધુ કોડોન એક જ એમિનો એસિડ માટે કોડ કરી શકે છે. વિકલ્પ B ખોટો છે કારણ કે 'સાર્વત્રિકતા' એ કોડોનના સમાન અર્થને લગતી વિશેષતા છે. વિકલ્પ C ખોટો છે કારણ કે 'અતિવ્યાપી ન હોવાની' વિશેષતા કોડોનના ઓવરલેપ ન થવાને લગતી છે. વિકલ્પ D ખોટો છે કારણ કે 'અનુક્રમણિકા' વિશેષતા કોડોન વચ્ચે વિરામ ચિહ્નો ન હોવાને લગતી છે.", "ref": "Std 12 - અધ્યાય 6: આનુવંશિકતાનો આણ્વિક આધાર", "ch": ""}, {"q": "જનીન કોડમાં 'UAA', 'UAG', અને 'UGA' કોડોનને લગતા નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["આ કોડોન પ્રોટીન સંશ્લેષણ દરમિયાન શૃંખલા વિરામ (Termination) નું કામ કરે છે.", "આ કોડોનને 'સ્ટોપ કોડોન' કહેવામાં આવે છે કારણ કે તે એમિનો એસિડ માટે કોડ કરતાં નથી.", "આ કોડોન mRNA પર હાજર હોય છે અને tRNA દ્વારા ઓળખાય છે.", "આ કોડોન પ્રોટીન સંશ્લેષણ દરમિયાન રિબોઝોમને સિગ્નલ આપે છે કે પોલિપેપ્ટાઇડ શૃંખલા પૂર્ણ થઈ ગઈ છે."], "ans": 2, "exp": "વિકલ્પ C ખોટો છે કારણ કે 'સ્ટોપ કોડોન' (UAA, UAG, UGA) માટે કોઈ tRNA હાજર નથી. વિકલ્પ A, B, અને D સહી છે કારણ કે આ કોડોન પ્રોટીન સંશ્લેષણ દરમિયાન શૃંખલા વિરામનું કામ કરે છે અને રિબોઝોમને સિગ્નલ આપે છે.", "ref": "Std 12 - અધ્યાય 6: આનુવંશિકતાનો આણ્વિક આધાર", "ch": ""}, {"q": "જનીન કોડની વિશેષતાઓને આધારે નીચેનામાંથી કયું વિધાન ખોટું છે?\n(1) મિથિયોનાઇન માટે માત્ર એક જ કોડોન (AUG) અસ્તિત્વ ધરાવે છે, જે સ્ટાર્ટ કોડોન તરીકે પણ કાર્ય કરે છે.\n(2) ટ્રિપ્ટોફેન માટે માત્ર એક જ કોડોન (UGG) અસ્તિત્વ ધરાવે છે, જે જનીન કોડની 'ડિજનરેટ' વિશેષતાનો અપવાદ છે.\n(3) સેલેનોસિસ્ટીન એમિનો એસિડ માટેનો કોડોન (UGA) સામાન્ય રીતે સ્ટોપ કોડોન તરીકે ઓળખાય છે, પરંતુ કેટલાક સજીવોમાં તેનો ઉપયોગ એમિનો એસિડ કોડિંગ માટે થાય છે.\n(4) જનીન કોડની 'સંખ્યાબંધતા' (Redundancy) ની વિશેષતા અનુસાર, એક જ એમિનો એસિડ માટે એક કરતાં વધુ કોડોન હોઈ શકે છે, પરંતુ દરેક કોડોન માત્ર એક જ એમિનો એસિડનું કોડિંગ કરે છે.", "opts": ["વિધાન (1) અને (2) ખોટાં છે", "વિધાન (3) ખોટું છે", "વિધાન (4) ખોટું છે", "બધાં જ વિધાનો સાચાં છે"], "ans": 3, "exp": "વિધાન (4) ખોટું છે કારણ કે જનીન કોડની 'અતિચલણસમતા' (Ambiguity) ન હોવાની વિશેષતા અનુસાર, એક કોડોન માત્ર એક જ એમિનો એસિડનું કોડિંગ કરે છે, પરંતુ 'સંખ્યાબંધતા' (Redundancy) ની વિશેષતા અનુસાર એક એમિનો એસિડ માટે એક કરતાં વધુ કોડોન હોઈ શકે છે. આમ, વિધાન (4) માં 'પરંતુ દરેક કોડોન માત્ર એક જ એમિનો એસિડનું કોડિંગ કરે છે' એ ભાગ સાચો છે, પરંતુ 'સંખ્યાબંધતા' ની વ્યાખ્યા અધૂરી રીતે રજૂ થઈ છે. બાકીના વિધાનો (1), (2), અને (3) સાચાં છે: મિથિયોનાઇન અને ટ્રિપ્ટોફેન માટે માત્ર એક જ કોડોન છે, અને સેલેનોસિસ્ટીન માટે UGA કોડોનનો અપવાદરૂપ ઉપયોગ થાય છે.", "ref": "Std 12 - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતાના આણ્વિક આધાર", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
