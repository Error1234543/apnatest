<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>લઘુબીજાણુજનન (Microsporogenesis)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>લઘુબીજાણુજનન (Microsporogenesis)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">લઘુબીજાણુજનન (Microsporogenesis)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક પુષ્પીય વનસ્પતિમાં લઘુબીજાણુજનન દરમિયાન લઘુબીજાણુધાનીની દીવાલના સૌથી બહારના સ્તરને શું કહે છે, જેનું કાર્ય લઘુબીજાણુઓના પ્રસરણમાં મદદ કરવાનું છે?", "opts": ["ટેપિટમ (Tapetum)", "એન્ડોથેસિયમ (Endothecium)", "મધ્યસ્તર (Middle layer)", "એપિડર્મિસ (Epidermis)"], "ans": 1, "exp": "સાચો જવાબ: B) એન્ડોથેસિયમ. લઘુબીજાણુધાનીની દીવાલમાં સૌથી બહારનું સ્તર એન્ડોથેસિયમ કહેવાય છે, જે લઘુબીજાણુઓના પ્રસરણમાં મદદ કરે છે. ટેપિટમ (A) પોષક પદાર્થો પૂરા પાડે છે, મધ્યસ્તર (C) કામચલાઉ સ્તર છે, અને એપિડર્મિસ (D) રક્ષણાત્મક સ્તર છે, પરંતુ પ્રસરણમાં મદદ કરતું નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "લઘુબીજાણુજનન દરમિયાન લઘુબીજાણુધાનીના કયા કોષો અર્ધીકરણ (Meiosis) પામીને લઘુબીજાણુઓ ઉત્પન્ન કરે છે?", "opts": ["આર્કિસ્પોરિયલ કોષો (Archesporial cells)", "પ્રાથમિક લઘુબીજાણુજનક કોષો (Primary sporogenous cells)", "લઘુબીજાણુજનક કોષો (Microspore mother cells)", "ટેપિટલ કોષો (Tapetal cells)"], "ans": 2, "exp": "સાચો જવાબ: C) લઘુબીજાણુજનક કોષો. લઘુબીજાણુજનન દરમિયાન લઘુબીજાણુજનક કોષો (Microspore mother cells) અર્ધીકરણ પામીને લઘુબીજાણુઓ ઉત્પન્ન કરે છે. આર્કિસ્પોરિયલ કોષો (A) પ્રાથમિક કોષો છે, પ્રાથમિક લઘુબીજાણુજનક કોષો (B) વિભાજન પામીને લઘુબીજાણુજનક કોષો બને છે, અને ટેપિટલ કોષો (D) પોષક પદાર્થો પૂરા પાડે છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "લઘુબીજાણુજનન દરમિયાન લઘુબીજાણુઓના નિર્માણ પછી કયું પરિવર્તન થાય છે જેનાથી પરાગરજ (Pollen grain) બને છે?", "opts": ["લઘુબીજાણુનું સીધું જ પરાગરજમાં રૂપાંતરણ", "લઘુબીજાણુનું સમવિભાજન (Mitosis) પામીને જનનકોષ અને નલિકાકોષમાં વિભાજન", "લઘુબીજાણુનું અર્ધીકરણ (Meiosis) પામીને ચાર નવા કોષોનું નિર્માણ", "લઘુબીજાણુનું ટેપિટમ સાથે સંમિલન"], "ans": 1, "exp": "સાચો જવાબ: B) લઘુબીજાણુનું સમવિભાજન પામીને જનનકોષ અને નલિકાકોષમાં વિભાજન. લઘુબીજાણુજનન પછી લઘુબીજાણુ સમવિભાજન પામીને જનનકોષ અને નલિકાકોષમાં વિભાજિત થાય છે, જે પરાગરજ બનાવે છે. અર્ધીકરણ (C) લઘુબીજાણુજનન દરમિયાન થાય છે, સીધું રૂપાંતરણ (A) થતું નથી, અને ટેપિટમ સાથે સંમિલન (D) અશક્ય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન લઘુબીજાણુજનન માટે ખોટું છે?", "opts": ["લઘુબીજાણુધાનીના લઘુબીજાણુજનક કોષો અર્ધીકરણ પામે છે", "લઘુબીજાણુઓ એકકોષીય અને હેપ્લોઇડ હોય છે", "લઘુબીજાણુઓનું નિર્માણ સમવિભાજન દ્વારા થાય છે", "લઘુબીજાણુઓના નિર્માણ પછી પરાગરજ બને છે"], "ans": 2, "exp": "સાચો જવાબ: C) લઘુબીજાણુઓનું નિર્માણ સમવિભાજન દ્વારા થાય છે. લઘુબીજાણુઓનું નિર્માણ અર્ધીકરણ (Meiosis) દ્વારા થાય છે, સમવિભાજન (Mitosis) દ્વારા નહીં. બાકીના વિધાનો સાચાં છે: લઘુબીજાણુજનક કોષો અર્ધીકરણ પામે છે (A), લઘુબીજાણુઓ હેપ્લોઇડ હોય છે (B), અને લઘુબીજાણુઓ પરાગરજમાં રૂપાંતરિત થાય છે (D).", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "લઘુબીજાણુધાનીમાં ટેપિટમનું મુખ્ય કાર્ય શું છે?", "opts": ["લઘુબીજાણુઓનું યાંત્રિક રક્ષણ પૂરું પાડવું", "લઘુબીજાણુઓના વિકાસ માટે પોષક પદાર્થો પૂરા પાડવા", "લઘુબીજાણુઓનું પ્રસરણ કરવું", "લઘુબીજાણુઓનું અર્ધીકરણ પ્રેરિત કરવું"], "ans": 1, "exp": "સાચો જવાબ: B) લઘુબીજાણુઓના વિકાસ માટે પોષક પદાર્થો પૂરા પાડવા. ટેપિટમ લઘુબીજાણુઓના વિકાસ માટે જરૂરી પોષક પદાર્થો અને ઉત્સેચકો પૂરા પાડે છે. યાંત્રિક રક્ષણ (A) એન્ડોથેસિયમ અને એપિડર્મિસનું કાર્ય છે, પ્રસરણ (C) એન્ડોથેસિયમનું કાર્ય છે, અને અર્ધીકરણ પ્રેરિત કરવું (D) ટેપિટમનું કાર્ય નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "એકદળી વનસ્પતિમાં લઘુબીજાણુજનન દરમિયાન લઘુબીજાણુઓની ગોઠવણી સામાન્ય રીતે કેવી હોય છે?", "opts": ["એકાકી (Monad)", "ચતુષ્ક (Tetrad) - ટેટ્રાહેડ્રલ ગોઠવણી", "ચતુષ્ક (Tetrad) - રેખીય ગોઠવણી", "ચતુષ્ક (Tetrad) - સમચતુર્ભુજ ગોઠવણી"], "ans": 2, "exp": "સામાન્ય રીતે દ્વિદળી વનસ્પતિઓમાં લઘુબીજાણુઓ ટેટ્રાહેડ્રલ ગોઠવણીમાં ગોઠવાય છે, પરંતુ એકદળી વનસ્પતિઓમાં લઘુબીજાણુઓ રેખીય ગોઠવણીમાં ગોઠવાય છે. આ એક મહત્વપૂર્ણ અપવાદ છે જે લઘુબીજાણુજનનની પ્રક્રિયામાં જોવા મળે છે. વિકલ્પ A ખોટો છે કારણ કે લઘુબીજાણુઓ એકલા નહીં, પરંતુ ચતુષ્ક સ્વરૂપે ઉત્પન્ન થાય છે. વિકલ્પ B અને D દ્વિદળી વનસ્પતિઓ માટે સાચા છે, પરંતુ એકદળી માટે નહીં.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "લઘુબીજાણુજનન દરમિયાન લઘુબીજાણુધાનીમાં કયા ઉત્સેચકની હાજરી લઘુબીજાણુઓના છૂટા પડવામાં મદદરૂપ થાય છે?", "opts": ["એમાયલેઝ", "કેલેઝ", "પેક્ટિનેઝ", "લિપેઝ"], "ans": 1, "exp": "લઘુબીજાણુઓના ચતુષ્કમાંથી છૂટા પડવા માટે કેલેઝ ઉત્સેચક જવાબદાર છે, જે કેલોઝ દીવાલને વિઘટિત કરે છે. વિકલ્પ A (એમાયલેઝ) કાર્બોહાઇડ્રેટ્સના વિઘટન માટે, વિકલ્પ C (પેક્ટિનેઝ) પેક્ટિનના વિઘટન માટે અને વિકલ્પ D (લિપેઝ) લિપિડના વિઘટન માટે જવાબદાર છે, જે લઘુબીજાણુઓના છૂટા પડવામાં સીધી ભૂમિકા ભજવતા નથી.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન લઘુબીજાણુજનનની પ્રક્રિયા માટે સાચું નથી?", "opts": ["લઘુબીજાણુધાનીના સ્પોરોજનસ કોષો અર્ધીકરણ પામીને લઘુબીજાણુઓ ઉત્પન્ન કરે છે.", "લઘુબીજાણુઓના નિર્માણ પછી તેઓ એકબીજા સાથે જોડાયેલા રહે છે અને પરાગરજ બને છે.", "ટેપિટમ પોષક પદાર્થો પૂરા પાડીને લઘુબીજાણુઓના વિકાસમાં મદદ કરે છે.", "લઘુબીજાણુઓના નિર્માણ દરમિયાન કેલોઝ દીવાલનું નિર્માણ થાય છે."], "ans": 1, "exp": "લઘુબીજાણુઓના નિર્માણ પછી તેઓ એકબીજાથી છૂટા પડે છે અને પછીથી પરાગરજમાં રૂપાંતરિત થાય છે, તેઓ જોડાયેલા રહેતા નથી. વિકલ્પ A, C અને D સાચાં વિધાનો છે કારણ કે સ્પોરોજનસ કોષો અર્ધીકરણ પામે છે, ટેપિટમ પોષક પૂરા પાડે છે અને કેલોઝ દીવાલનું નિર્માણ થાય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "લઘુબીજાણુજનન દરમિયાન લઘુબીજાણુઓના વિકાસમાં કયા હોર્મોનની ભૂમિકા મહત્વપૂર્ણ માનવામાં આવે છે?", "opts": ["ઑક્ઝિન", "જીબરેલિન", "સાયટોકાઇનિન", "ઇથિલિન"], "ans": 2, "exp": "સાયટોકાઇનિન હોર્મોન લઘુબીજાણુઓના વિકાસ અને વિભાજનમાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે. વિકલ્પ A (ઑક્ઝિન) કોષવૃદ્ધિ અને વિભેદનમાં, વિકલ્પ B (જીબરેલિન) તણખલાના વિકાસમાં અને વિકલ્પ D (ઇથિલિન) ફળ પરિપક્વતામાં મુખ્ય ભૂમિકા ભજવે છે, પરંતુ લઘુબીજાણુઓના વિકાસમાં નહીં.", "ref": "Std 12 - પ્રકરણ 6: વનસ્પતિઓમાં વૃદ્ધિ અને વિકાસ", "ch": ""}, {"q": "એક દ્વિદળી વનસ્પતિના પુંકેસરમાં લઘુબીજાણુજનનની પ્રક્રિયા દરમિયાન નીચેનામાંથી કયું પરિવર્તન લઘુબીજાણુ ચતુષ્ક (Microspore tetrad) ના નિર્માણ પછી તરત જ થતું નથી?", "opts": ["લઘુબીજાણુઓના કોષકેન્દ્રનું એકવાર વિભાજન થઈને વાનસ્પતિક અને જનનકોષનું નિર્માણ", "લઘુબીજાણુઓની દીવાલમાં સ્પોરોપોલેનિનનું નિક્ષેપણ થઈને પરાગરજની દીવાલનું નિર્માણ", "લઘુબીજાણુઓના કોષરસમાં સ્ટાર્ચ અને લિપિડ કણોનો સંચય થઈને પોષક તત્વોનો ભંડાર", "લઘુબીજાણુઓના કોષકેન્દ્રમાં DNAનું પ્રતિકૃતિકરણ થઈને ચાર ગણું DNAનું પ્રમાણ"], "ans": 3, "exp": "સાચો જવાબ વિકલ્પ D છે. લઘુબીજાણુ ચતુષ્કના નિર્માણ પછી તરત જ લઘુબીજાણુઓના કોષકેન્દ્રમાં DNAનું પ્રતિકૃતિકરણ થતું નથી, કારણ કે આ તબક્કે કોષકેન્દ્રનું વિભાજન (મિટોસિસ) થઈને વાનસ્પતિક અને જનનકોષ બને છે. વિકલ્પ A ખોટો નથી, કારણ કે આ પરિવર્તન તરત જ થાય છે. વિકલ્પ B પણ સાચું છે, કારણ કે સ્પોરોપોલેનિનનું નિક્ષેપણ પરાગરજની દીવાલ બનાવવામાં મદદરૂપ થાય છે. વિકલ્પ C પણ સાચું છે, કારણ કે પોષક તત્વોનો સંચય લઘુબીજાણુઓના વિકાસ માટે જરૂરી છે. વિકલ્પ D ખોટો છે, કારણ કે DNAનું પ્રતિકૃતિકરણ લઘુબીજાણુ ચતુષ્કના નિર્માણ પહેલાં અર્ધીકરણ (Meiosis) દરમિયાન થઈ ચૂક્યું હોય છે.", "ref": "Std 12 - પ્રકરણ 2: પુષ્પીય વનસ્પતિઓમાં લિંગી પ્રજનન", "ch": ""}, {"q": "લઘુબીજાણુજનન દરમિયાન, લઘુબીજાણુધાનીમાં ટેપિટમ કોષો દ્વારા સ્રાવાતા પદાર્થો પૈકી કયો પદાર્થ લઘુબીજાણુઓની દીવાલના વિકાસમાં સીધી ભૂમિકા ભજવે છે?", "opts": ["કેટિન", "સ્પોરોપોલેનિન", "ઓક્સિન", "જિબરેલિન"], "ans": 1, "exp": "ટેપિટમ કોષો દ્વારા સ્રાવાતા સ્પોરોપોલેનિન લઘુબીજાણુઓની દીવાલના વિકાસમાં સીધી ભૂમિકા ભજવે છે. કેટિન, ઓક્સિન અને જિબરેલિન હોર્મોન છે જે વનસ્પતિના વૃદ્ધિ અને વિકાસમાં ભૂમિકા ભજવે છે, પરંતુ લઘુબીજાણુઓની દીવાલના વિકાસમાં સીધી ભૂમિકા નથી ભજવતા.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "લઘુબીજાણુજનન દરમિયાન, લઘુબીજાણુધાનીમાં કયા તબક્કે લઘુબીજાણુ મધ્યસ્થ કોષ (Microspore Mother Cell) અર્ધીકરણ પામે છે?", "opts": ["લેપ્ટોટીન", "જાયગોટીન", "પેકીટીન", "ડાયકાઇનેશિસ"], "ans": 3, "exp": "લઘુબીજાણુ મધ્યસ્થ કોષ ડાયકાઇનેશિસ તબક્કે અર્ધીકરણ પામે છે. લેપ્ટોટીન, જાયગોટીન અને પેકીટીન અર્ધીકરણના તબક્કાઓ છે, પરંતુ લઘુબીજાણુ મધ્યસ્થ કોષનું અર્ધીકરણ ડાયકાઇનેશિસ તબક્કે થાય છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "લઘુબીજાણુજનન દરમિયાન, લઘુબીજાણુધાનીમાં કયા કોષોના વિભાજનથી લઘુબીજાણુ ચતુષ્ક (Tetrad) બને છે?", "opts": ["પરાગરજ કોષ", "લઘુબીજાણુ મધ્યસ્થ કોષ", "ટેપિટમ કોષ", "એન્ડોથીલિયમ કોષ"], "ans": 1, "exp": "લઘુબીજાણુ મધ્યસ્થ કોષના અર્ધીકરણ વિભાજનથી લઘુબીજાણુ ચતુષ્ક બને છે. પરાગરજ કોષ, ટેપિટમ કોષ અને એન્ડોથીલિયમ કોષ લઘુબીજાણુજનન દરમિયાન અન્ય ભૂમિકા ભજવે છે, પરંતુ લઘુબીજાણુ ચતુષ્કનું નિર્માણ લઘુબીજાણુ મધ્યસ્થ કોષના વિભાજનથી થાય છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "લઘુબીજાણુજનન દરમિયાન, લઘુબીજાણુધાનીમાં કયા કોષોના કોષરસી વિભાજનથી હાપ્લોઈડ લઘુબીજાણુઓ ઉત્પન્ન થાય છે?", "opts": ["પ્રાથમિક પરાગરજ કોષ", "દ્વિતીયક પરાગરજ કોષ", "લઘુબીજાણુ મધ્યસ્થ કોષ", "જનન કોષ"], "ans": 2, "exp": "લઘુબીજાણુ મધ્યસ્થ કોષના કોષરસી વિભાજનથી હાપ્લોઈડ લઘુબીજાણુઓ ઉત્પન્ન થાય છે. પ્રાથમિક પરાગરજ કોષ, દ્વિતીયક પરાગરજ કોષ અને જનન કોષ લઘુબીજાણુજનન દરમિયાન અન્ય તબક્કાઓમાં ભૂમિકા ભજવે છે, પરંતુ હાપ્લોઈડ લઘુબીજાણુઓનું નિર્માણ લઘુબીજાણુ મધ્યસ્થ કોષના કોષરસી વિભાજનથી થાય છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "લઘુબીજાણુજનન દરમિયાન, લઘુબીજાણુધાનીમાં કયા કોષોના કોષરસમાં સંગ્રહ પામેલા ખોરાકી પદાર્થો લઘુબીજાણુઓના વિકાસ માટે ઉપયોગી થાય છે?", "opts": ["ટેપિટમ કોષ", "એન્ડોથીલિયમ કોષ", "મધ્ય સ્તરના કોષ", "લઘુબીજાણુ મધ્યસ્થ કોષ"], "ans": 0, "exp": "ટેપિટમ કોષોના કોષરસમાં સંગ્રહ પામેલા ખોરાકી પદાર્થો લઘુબીજાણુઓના વિકાસ માટે ઉપયોગી થાય છે. એન્ડોથીલિયમ કોષ, મધ્ય સ્તરના કોષ અને લઘુબીજાણુ મધ્યસ્થ કોષ લઘુબીજાણુજનન દરમિયાન અન્ય ભૂમિકા ભજવે છે, પરંતુ ખોરાકી પદાર્થોનો સંગ્રહ ટેપિટમ કોષોમાં થાય છે.", "ref": "Std 12 - પ્રકરણ 2: વનસ્પતિમાં લૈંગિક પ્રજનન", "ch": ""}, {"q": "લઘુબીજાણુજનન દરમિયાન, લઘુબીજાણુ મધ્યસ્થ કોષ (Microspore Mother Cell) નું અર્ધીકરણ વિભાજન કયા તબક્કે થાય છે?", "opts": ["લેપ્ટોટીન", "ઝાયગોટીન", "પેકીટીન", "ડાયકાઇનેસિસ"], "ans": 3, "exp": "લઘુબીજાણુ મધ્યસ્થ કોષનું અર્ધીકરણ વિભાજન ડાયકાઇનેસિસ તબક્કે થાય છે, જ્યારે વર્ણસૂત્રો સંપૂર્ણ રીતે જોડાયેલા હોય છે. લેપ્ટોટીન (A) અને ઝાયગોટીન (B) અર્ધીકરણના પ્રારંભિક તબક્કા છે, જ્યારે પેકીટીન (C) અર્ધીકરણ I ના અંતિમ તબક્કાનો ભાગ છે.", "ref": "Std 12 - અધ્યાય 2: વનસ્પતિમાં પ્રજનન", "ch": ""}, {"q": "લઘુબીજાણુજનન દરમિય let userAns={},curIdx=0;

function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}

  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
