<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZIFT</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ZIFT</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ZIFT</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ZIFT (ઝાયગોટ ઇન્ટ્રાફેલોપિયન ટ્રાન્સફર) પદ્ધતિમાં, શુક્રાણુ અને અંડકોષના ફલન પછી ક્યાં તબક્કે ભ્રૂણને સ્ત્રીના ફેલોપિયન નળીમાં મૂકવામાં આવે છે?", "opts": ["૮-કોષીય અવસ્થા (મોરુલા)", "બ્લાસ્ટોસિસ્ટ અવસ્થા", "૨-કોષીય અવસ્થા (ઝાયગોટ)", "ગેસ્ટ્રુલા અવસ્થા"], "ans": 2, "exp": "ZIFT પદ્ધતિમાં, ફલન લેબોરેટરીમાં થાય છે અને તરત જ ૨-કોષીય અવસ્થા (ઝાયગોટ)ને સ્ત્રીના ફેલોપિયન નળીમાં મૂકવામાં આવે છે. મોરુલા (A) અને બ્લાસ્ટોસિસ્ટ (B) અવસ્થા IUI અથવા IVF પછી ગર્ભાશયમાં મૂકવામાં આવે છે. ગેસ્ટ્રુલા (D) અવસ્થા તો ભ્રૂણવિકાસના પછીના તબક્કે આવે છે, જે ZIFT માટે યોગ્ય નથી.", "ref": "Std 12 - પ્રકરણ ૪: જનન તથા વિકાસ (Reproduction and Development)", "ch": ""}, {"q": "ZIFT અને GIFT વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["ZIFTમાં ફલન લેબમાં થાય છે, જ્યારે GIFTમાં ફલન શરીરની અંદર થાય છે.", "ZIFTમાં ભ્રૂણને ગર્ભાશયમાં મૂકવામાં આવે છે, જ્યારે GIFTમાં ફેલોપિયન નળીમાં મૂકવામાં આવે છે.", "ZIFT માટે હોર્મોનલ ઇન્જેક્શનની જરૂર નથી, જ્યારે GIFT માટે જરૂરી છે.", "ZIFTમાં સ્ત્રીના અંડકોષનો ઉપયોગ થતો નથી."], "ans": 0, "exp": "ZIFT (ઝાયગોટ ઇન્ટ્રાફેલોપિયન ટ્રાન્સફર)માં ફલન લેબોરેટરીમાં થાય છે અને ઝાયગોટને ફેલોપિયન નળીમાં મૂકવામાં આવે છે, જ્યારે GIFT (ગેમીટ ઇન્ટ્રાફેલોપિયન ટ્રાન્સફર)માં શુક્રાણુ અને અંડકોષને ફેલોપિયન નળીમાં મૂકીને ફલન શરીરની અંદર થવા દેવામાં આવે છે. બાકીના વિકલ્પો (B, C, D) ખોટા છે કારણ કે ZIFTમાં ભ્રૂણને ફેલોપિયન નળીમાં જ મૂકવામાં આવે છે, હોર્મોનલ ઇન્જેક્શનની જરૂર રહે છે, અને સ્ત્રીના અંડકોષનો ઉપયોગ થાય છે.", "ref": "Std 12 - પ્રકરણ ૪: જનન તથા વિકાસ", "ch": ""}, {"q": "ZIFT પદ્ધતિમાં, નીચેનામાંથી કયો તબક્કો સૌથી વધુ નિર્ણાયક છે?", "opts": ["અંડકોષનું સંગ્રહણ", "શુક્રાણુ અને અંડકોષનું લેબમાં ફલન", "ઝાયગોટનું ફેલોપિયન નળીમાં સફળ ટ્રાન્સફર", "ભ્રૂણના વિકાસ માટે હોર્મોનલ સપોર્ટ"], "ans": 2, "exp": "ZIFT પદ્ધતિમાં સૌથી નિર્ણાયક તબક્કો એ છે કે ઝાયગોટનું ફેલોપિયન નળીમાં સફળ ટ્રાન્સફર (C). અંડકોષનું સંગ્રહણ (A) અને ફલન (B) પણ મહત્વના છે, પરંતુ ટ્રાન્સફર વિના ભ્રૂણ વિકાસ પામી શકતું નથી. હોર્મોનલ સપોર્ટ (D) તો ગર્ભધારણ પછી પણ જરૂરી છે, પરંતુ તે ટ્રાન્સફર જેટલું નિર્ણાયક નથી.", "ref": "Std 12 - પ્રકરણ ૪: જનન તથા વિકાસ", "ch": ""}, {"q": "ZIFT પદ્ધતિમાં, નીચેનામાંથી કયું કામ ગેરલાભદાયી છે?", "opts": ["ફલન પછી ઝાયગોટને તરત જ ફેલોપિયન નળીમાં મૂકવું", "અંડકોષને IVF પહેલા કૃત્રિમ રીતે પક્વ કરવું", "શુક્રાણુને કેપેસિટેશન માટે તૈયાર કરવું", "ભ્રૂણને ગર્ભાશયમાં મૂકવું"], "ans": 3, "exp": "ZIFT પદ્ધતિમાં, ઝાયગોટને ફેલોપિયન નળીમાં મૂકવામાં આવે છે, ગર્ભાશયમાં નહીં (D). ફલન પછી ઝાયગોટને તરત જ ફેલોપિયન નળીમાં મૂકવું (A) યોગ્ય છે. અંડકોષને IVF પહેલા કૃત્રિમ રીતે પક્વ કરવું (B) અને શુક્રાણુને કેપેસિટેશન માટે તૈયાર કરવું (C) એ બંને યોગ્ય પગલાં છે.", "ref": "Std 12 - પ્રકરણ ૪: જનન તથા વિકાસ", "ch": ""}, {"q": "ZIFT પદ્ધતિમાં, નીચેનામાંથી કયો પરિબળ ભ્રૂણના સફળ ઇમ્પ્લાન્ટેશનને અસર કરતો નથી?", "opts": ["ફેલોપિયન નળીની લંબાઈ", "સ્ત્રીની ઉંમર", "ઝાયગોટની ગુણવત્તા", "હોર્મોનલ સંતુલન"], "ans": 0, "exp": "ZIFT પદ્ધતિમાં, ફેલોપિયન નળીની લંબાઈ (A) ભ્રૂણના સફળ ઇમ્પ્લાન્ટેશનને અસર કરતી નથી. સ્ત્રીની ઉંમર (B), ઝાયગોટની ગુણવત્તા (C), અને હોર્મોનલ સંતુલન (D) એ બધા ઇમ્પ્લાન્ટેશનને અસર કરે છે.", "ref": "Std 12 - પ્રકરણ ૪: જનન તથા વિકાસ", "ch": ""}, {"q": "ZIFT પદ્ધતિમાં, ફલિત અંડકોષ (ઝાયગોટ)ને સ્ત્રીના શરીરમાં ક્યાં સ્થાને પ્રત્યારોપિત કરવામાં આવે છે?", "opts": ["ગર્ભાશય (Uterus)", "ફેલોપિયન ટ્યુબ (Fallopian Tube)", "યોનિ (Vagina)", "અંડાશય (Ovary)"], "ans": 1, "exp": "ZIFT (ઝાયગોટ ઇન્ટ્રાફેલોપિયન ટ્રાન્સફર) પદ્ધતિમાં, ફલિત અંડકોષ (ઝાયગોટ)ને સ્ત્રીના ફેલોપિયન ટ્યુબમાં પ્રત્યારોપિત કરવામાં આવે છે, જેથી તે પ્રાકૃતિક રીતે ગર્ભાશય તરફ આગળ વધી શકે. ગર્ભાશય (A)માં પ્રત્યારોપણ IUI અથવા IVF-ET પદ્ધતિઓમાં થાય છે. યોનિ (C) અને અંડાશય (D) અયોગ્ય સ્થાનો છે, કારણ કે ત્યાં ભ્રૂણનું વિકાસ થઈ શકતું નથી.", "ref": "Std 12 - પ્રકરણ 4: માનવ પ્રજનન", "ch": ""}, {"q": "ZIFT પદ્ધતિમાં, નીચેનામાંથી કયો તબક્કો લેબોરેટરીમાં કરવામાં આવતો નથી?", "opts": ["શુક્રાણુ અને અંડકોષનું ફલન", "ઝાયગોટનું ફેલોપિયન ટ્યુબમાં પ્રત્યારોપણ", "ભ્રૂણના કોષવિભાજનની નિગરાણી", "અંડકોષનું પરિપક્વીકરણ"], "ans": 1, "exp": "ZIFT પદ્ધતિમાં, શુક્રાણુ અને અંડકોષનું ફલન (A) લેબોરેટરીમાં થાય છે, અને ભ્રૂણના કોષવિભાજનની નિગરાણી (C) પણ લેબમાં કરવામાં આવે છે. અંડકોષનું પરિપક્વીકરણ (D) સ્ત્રીના શરીરમાં જ થાય છે. પરંતુ ઝાયગોટનું ફેલોપિયન ટ્યુબમાં પ્રત્યારોપણ (B) લેબોરેટરીમાં નહીં, પરંતુ સ્ત્રીના શરીરમાં કરવામાં આવે છે.", "ref": "Std 12 - પ્રકરણ 4: માનવ પ્રજનન", "ch": ""}, {"q": "ZIFT પદ્ધતિમાં, નીચેનામાંથી કયો પરિબળ ભ્રૂણના વિકાસને અસર કરતો નથી?", "opts": ["સ્ત્રીના ફેલોપિયન ટ્યુબની સ્વસ્થતા", "શુક્રાણુની ગતિશીલતા", "લેબોરેટરીમાં વાપરવામાં આવતી સંવર્ધન માધ્યમની ગુણવત્તા", "સ્ત્રીના રક્તમાં હીમોગ્લોબિનનું પ્રમાણ"], "ans": 3, "exp": "ZIFT પદ્ધતિમાં, ફેલોપિયન ટ્યુબની સ્વસ્થતા (A) ભ્રૂણના ઇમ્પ્લાન્ટેશન અને વિકાસ માટે મહત્વપૂર્ણ છે. શુક્રાણુની ગતિશીલતા (B) ફલન માટે જરૂરી છે, અને સંવર્ધન માધ્યમની ગુણવત્તા (C) લેબમાં ભ્રૂણના વિકાસને અસર કરે છે. પરંતુ સ્ત્રીના રક્તમાં હીમોગ્લોબિનનું પ્રમાણ (D) ભ્રૂણના વિકાસને સીધી અસર કરતું નથી.", "ref": "Std 12 - પ્રકરણ 4: માનવ પ્રજનન", "ch": ""}, {"q": "ZIFT અને IVF-ET પદ્ધતિઓ વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["ZIFTમાં ફલન લેબમાં થાય છે, જ્યારે IVF-ETમાં ફલન શરીરમાં થાય છે", "ZIFTમાં ઝાયગોટને ફેલોપિયન ટ્યુબમાં પ્રત્યારોપિત કરવામાં આવે છે, જ્યારે IVF-ETમાં ગર્ભાશયમાં પ્રત્યારોપિત કરવામાં આવે છે", "ZIFTમાં અંડકોષને સીધું ગર્ભાશયમાં પ્રત્યારોપિત કરવામાં આવે છે, જ્યારે IVF-ETમાં ફેલોપિયન ટ્યુબમાં પ્રત્યારોપિત કરવામાં આવે છે", "ZIFTમાં શુક્રાણુને સીધું ફેલોપિયન ટ્યુબમાં ઇન્જેક્ટ કરવામાં આવે છે, જ્યારે IVF-ETમાં ગર્ભાશયમાં ઇન્જેક્ટ કરવામાં આવે છે"], "ans": 1, "exp": "ZIFT અને IVF-ET બંનેમાં ફલન લેબોરેટરીમાં જ થાય છે, પરંતુ ZIFTમાં ઝાયગોટને ફેલોપિયન ટ્યુબમાં પ્રત્યારોપિત કરવામાં આવે છે, જ્યારે IVF-ETમાં ભ્રૂણને ગર્ભાશયમાં પ્રત્યારોપિત કરવામાં આવે છે. વિકલ્પ (A) ખોટો છે કારણ કે બંનેમાં ફલન લેબમાં થાય છે. વિકલ્પ (C) અને (D) પણ ખોટા છે કારણ કે તેઓ ZIFT અને IVF-ETની પદ્ધતિને યોગ્ય રીતે વર્ણવતા નથી.", "ref": "Std 12 - પ્રકરણ 4: માનવ પ્રજનન", "ch": ""}, {"q": "ZIFT પદ્ધતિમાં, નીચેનામાંથી કયો તબક્કો સૌથી વધુ તકનીકી કુશળતાની માગે છે?", "opts": ["અંડકોષનું સંગ્રહણ", "શુક્રાણુ અને અંડકોષનું ફલન", "ઝાયગોટનું ફેલોપિયન ટ્યુબમાં પ્રત્યારોપણ", "ભ્રૂણના વિકાસની નિગરાણી"], "ans": 2, "exp": "ZIFT પદ્ધતિમાં, ઝાયગોટનું ફેલોપિયન ટ્યુબમાં પ્રત્યારોપણ (C) સૌથી વધુ તકનીકી કુશળતાની માગે છે, કારણ કે તેને સૂક્ષ્મ શસ્ત્રક્રિયા અને સચોટ સ્થાનની જરૂર પડે છે. અંડકોષનું સંગ્રહણ (A) અને શુક્રાણુ અને અંડકોષનું ફલન (B) પણ તકનીકી કુશળતા માગે છે, પરંતુ તે પ્રત્યારોપણ જેટલું જટિલ નથી. ભ્રૂણના વિકાસની નિગરાણી (D) મહત્વપૂર્ણ છે, પરંતુ તે પ્રત્યારોપણ જેટલી કુશળતા માગતી નથી.", "ref": "Std 12 - પ્રકરણ 4: માનવ પ્રજનન", "ch": ""}, {"q": "ZIFT પદ્ધતિમાં, ફલન પછી ઝાયગોટને ફેલોપિયન ટ્યુબમાં પ્રત્યારોપિત કરવા પહેલા, નીચેનામાંથી કયો તબક્કો અનિવાર્ય રીતે કરવો પડે છે?", "opts": ["ઝાયગોટને ૨-૪ કોષીય ભ્રૂણ (મોરુલા) તબક્કા સુધી વિકસિત કરવો", "ઝાયગોટને બ્લાસ્ટોસિસ્ટ તબક્કા સુધી વિકસિત કરવો", "ઝાયગોટને સીધો જ ફેલોપિયન ટ્યુબમાં પ્રત્યારોપિત કરવો", "ઝાયગોટને કૃત્રિમ માધ્યમમાં ૨૪ કલાક સુધી રાખવો"], "ans": 0, "exp": "ZIFT પદ્ધતિમાં, ફલન પછી ઝાયગોટને ફેલોપિયન ટ્યુબમાં પ્રત્યારોપિત કરવા પહેલા તેને ૨-૪ કોષીય ભ્રૂણ (મોરુલા) તબક્કા સુધી વિકસિત કરવો અનિવાર્ય છે. આ તબક્કે ભ્રૂણ ફેલોપિયન ટ્યુબમાં સફળતાપૂર્વક ઇમ્પ્લાન્ટ થઈ શકે છે. વિકલ્પ B ખોટો છે કારણ કે બ્લાસ્ટોસિસ્ટ તબક્કો ZIFT માટે નહીં પરંતુ IVF-ET પદ્ધતિમાં મહત્વનો છે. વિકલ્પ C ખોટો છે કારણ કે સીધો પ્રત્યારોપણ ભ્રૂણના વિકાસને અસર કરે છે. વિકલ્પ D ખોટો છે કારણ કે ૨૪ કલાક પૂરતા નથી, મોરુલા તબક્કા સુધી વિકાસ જરૂરી છે.", "ref": "Std 12 - પ્રકરણ ૪: જનન તથા વિકાસ (જનીન અભ્યાસ)", "ch": ""}, {"q": "ZIFT પદ્ધતિમાં, નીચેનામાંથી કયો પરિબળ ભ્રૂણના ઇમ્પ્લાન્ટેશનને અસર કરતો નથી, પરંતુ ભ્રૂણના પોષણને અસર કરે છે?", "opts": ["ફેલોપિયન ટ્યુબની સ્નાયુકોષીય ગતિવિધિ", "એન્ડોમેટ્રિયમની જાડાઈ", "પ્રોજેસ્ટેરોન હોર્મોનનું સ્તર", "માના રક્તમાં ગ્લુકોઝનું સ્તર"], "ans": 3, "exp": "ZIFT પદ્ધતિમાં, માના રક્તમાં ગ્લુકોઝનું સ્તર ભ્રૂણના પોષણને અસર કરે છે, પરંતુ ઇમ્પ્લાન્ટેશનને નહીં. વિકલ્પ A, B, અને C ઇમ્પ્લાન્ટેશનને અસર કરે છે કારણ કે ફેલોપિયન ટ્યુબની ગતિવિધિ, એન્ડોમેટ્રિયમની જાડાઈ, અને પ્રોજેસ્ટેરોન હોર્મોન ઇમ્પ્લાન્ટેશન માટે મહત્વના છે.", "ref": "Std 12 - પ્રકરણ ૪: જનન તથા વિકાસ (જનીન અભ્યાસ)", "ch": ""}, {"q": "ZIFT પદ્ધતિમાં, નીચેનામાંથી કયો પરિબળ ભ્રૂણના વિકાસને સૌથી વધુ અસર કરે છે?", "opts": ["ફેલોપિયન ટ્યુબની લંબાઈ", "માના શરીરમાં ઓક્સિજનનું સ્તર", "લેબોરેટરીમાં વિકાસ દરમિયાન તાપમાન", "માના શરીરમાં કેલ્શિયમનું સ્તર"], "ans": 2, "exp": "ZIFT પદ્ધતિમાં, લેબોરેટરીમાં વિકાસ દરમિયાન તાપમાન ભ્રૂણના વિકાસને સૌથી વધુ અસર કરે છે. વિકલ્પ A, B, અને D ભ્રૂણના વિકાસને અસર કરે છે, પરંતુ તાપમાન સૌથી નિર્ણાયક છે.", "ref": "Std 12 - પ્રકરણ ૪: જનન તથા વિકાસ (જનીન અભ્યાસ)", "ch": ""}, {"q": "ZIFT પદ્ધતિમાં, ફલિત અંડકોષ (ઝાયગોટ)ને ફેલોપિયન ટ્યુબમાં પ્રત્યારોપિત કરતા પહેલા, નીચેનામાંથી કયો તબક્કો અવશ્ય કરવો જરૂરી છે, જેથી ભ્રૂણના વિકાસમાં અડચણ ઉત્પન્ન ન થાય?", "opts": ["ઝાયગોટને 2-4 કોષીય અવસ્થા સુધી વિકસાવવો", "ઝાયગોટને તરત જ ફેલોપિયન ટ્યુબમાં મૂકી દેવો", "ઝાયગોટને કૃત્રિમ માધ્યમમાં 72 કલાક સુધી રાખવો", "ઝાયગોટને બ્લાસ્ટોસિસ્ટ અવસ્થા સુધી વિકસાવવો"], "ans": 0, "exp": "ZIFT પદ્ધતિમાં, ઝાયગોટને ફેલોપિયન ટ્યુબમાં પ્રત્યારોપિત કરતા પહેલા તેને 2-4 કોષીય અવસ્થા (ક્લીવેજ સ્ટેજ) સુધી વિકસાવવો જરૂરી છે, કારણ કે આ અવસ્થામાં ભ્રૂણ ફેલોપિયન ટ્યુબની પરિસ્થિતિઓ સાથે સરળતાથી અનુકૂળન કરી શકે છે. વિકલ્પ B ખોટો છે કારણ કે તરત જ મૂકવાથી ભ્રૂણના વિકાસમાં અડચણ ઉત્પન્ન થઈ શકે. વિકલ્પ C ખોટો છે કારણ કે 72 કલાક સુધી રાખવાથી ભ્રૂણની વિકાસ અવસ્થા વધુ આગળ વધી જાય છે, જે ફેલોપિયન ટ્યુબ માટે અનુકૂળ નથી. વિકલ્પ D ખોટો છે કારણ કે બ્લાસ્ટોસિસ્ટ અવસ્થા ગર્ભાશય માટે યોગ્ય છે, ફેલોપિયન ટ્યુબ માટે નહીં.", "ref": "Std 12 - પ્રકરણ 4: જનન તંત્ર અને પ્રજનન", "ch": ""}, {"q": "એક દંપતીને પ્રજનન સંબંધિત સમસ્યા છે જેમાં સ્ત્રીના ફેલોપિયન ટ્યુબમાં અવરોધ છે, પરંતુ અંડાશયમાંથી અંડકોષ મુક્ત થઈ શકે છે. આ દંપતી માટે ZIFT (ઝાયગોટ ઇન્ટ્રાફેલોપિયન ટ્રાન્સફર) પદ્ધતિનો ઉપયોગ કરવાનું નક્કી કરવામાં આવે છે. આ કિસ્સામાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["ZIFT પદ્ધતિમાં, ફલન પ્રક્રિયા લેબોરેટરીમાં કરવામાં આવે છે અને પછી ઝાયગોટને ફેલોપિયન ટ્યુબમાં પ્રત્યારોપિત કરવામાં આવે છે.", "આ પદ્ધતિમાં, અંડકોષ અને શુક્રાણુને સીધા ફેલોપિયન ટ્યુબમાં મૂકવામાં આવે છે જ્યાં ફલન થાય છે.", "ZIFT પદ્ધતિમાં, ઝાયગોટને ફેલોપિયન ટ્યુબના એમ્પ્યુલા ભાગમાં પ્રત્યારોપિત કરવામાં આવે છે.", "આ પદ્ધતિનો ઉપયોગ ત્યારે થાય છે જ્યારે સ્ત્રીના ફેલોપિયન ટ્યુબમાં આંશિક અવરોધ હોય પરંતુ અંડકોષનું વહન શક્ય હોય."], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B છે કારણ કે ZIFT પદ્ધતિમાં ફલન લેબોરેટરીમાં કરવામાં આવે છે, પછી ઝાયગોટને ફેલોપિયન ટ્યુબમાં પ્રત્યારોપિત કરવામાં આવે છે. વિકલ્પ B ખોટો છે કારણ કે તેમાં વર્ણવેલ પ્રક્રિયા GIFT (ગેમેટ ઇન્ટ્રાફેલોપિયન ટ્રાન્સફર) પદ્ધતિની છે, જેમાં અંડકોષ અને શુક્રાણુને સીધા ફેલોપિયન ટ્યુબમાં મૂકવામાં આવે છે. વિકલ્પ A, C અને D ZIFT પદ્ધતિના સાચા પાસાઓનું વર્ણન કરે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન અને પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "ઝાયગોટ ઇન્ટ્રાફેલોપિયન ટ્રાન્સફર (ZIFT) પદ્ધતિમાં, ફલિત અંડકોષ (ઝાયગોટ)ને ફેલોપિયન ટ્યુબના કયા ભાગમાં પ્રત્યારોપિત કરવામાં આવે છે જેથી તેનું સફળ ઇમ્પ્લાન્ટેશન થઈ શકે?", "opts": ["ઇન્ફન્ડિબ્યુલમ (Infundibulum)", "એમ્પુલા (Ampulla)", "ઇસ્થમસ (Isthmus)", "ઇન્ટરસ્ટિશિયલ ભાગ (Interstitial part)"], "ans": 2, "exp": "ZIFT પદ્ધતિમાં, ઝાયગોટને ફેલોપિયન ટ્યુબના ઇસ્થમસ (Isthmus) ભાગમાં પ્રત્યારોપિત કરવામાં આવે છે કારણ કે આ ભાગ ગર્ભાશયની નજીક હોય છે અને ભ્રૂણના સફળ ઇમ્પ્લાન્ટેશન માટે યોગ્ય વાતાવરણ પૂરું પાડે છે. ઇન્ફન્ડિબ્યુલમ અને એમ્પુલા ફલન માટે યોગ્ય છે, પરંતુ ઇમ્પ્લાન્ટેશન માટે નહીં. ઇન્ટરસ્ટિશિયલ ભાગ ગર્ભાશયની દીવાલમાં હોય છે, જે ZIFT માટે યોગ્ય નથી.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન અને પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "ZIFT પદ્ધતિમાં, જો ફલિત અંડકોષ (ઝાયગોટ)ને ફેલોપિયન ટ્યુબના એમ્પુલા ભાગમાં પ્રત્યારોપિત કરવામાં આવે, તો નીચેનામાંથી કયું પરિણામ સંભવિત છે?", "opts": ["ભ્રૂણનું સફળ ઇમ્પ્લાન્ટેશન થશે કારણ કે એમ્પુલા ફલન માટે યોગ્ય છે.", "ભ્રૂણનું ઇમ્પ્લાન્ટેશન નિષ્ફળ જશે કારણ કે એમ્પુલા ગર્ભાશયથી દૂર છે.", "ભ્રૂણનું વિકાસ અટકી જશે કારણ કે એમ્પુલામાં પોષક તત્ત્વોની અછત છે.", "ભ્રૂણ ફેલોપિયન ટ્યુબમાં જ રહી જશે અને એક્ટોપિક ગર્ભાવસ્થા થશે."], "ans": 1, "exp": "ZIFT પદ્ધતિમાં, ઝાયગોટને એમ્પુલા ભાગમાં પ્રત્યારોપિત કરવાથી ઇમ્પ્લાન્ટેશન નિષ્ફળ જાય છે કારણ કે એમ્પુલા ગર્ભાશયથી દૂર છે અને ભ્રૂણને ગર્ભાશય સુધી પહોંચવામાં મુશ્કેલી પડે છે. આ ભાગ ફલન માટે યોગ્ય છે, પરંતુ ઇમ્પ્લાન્ટેશન માટે નહીં. એક્ટોપિક ગર્ભાવસ્થા થવાની સંભાવના ઓછી છે ક સાચા પાસાઓ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 3: માનવ પ્રજનન અને પ્રજનન સ્વાસ્થ્ય", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
