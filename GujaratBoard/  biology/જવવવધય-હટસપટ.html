<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>જૈવવૈવિધ્ય હોટસ્પોટ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>જૈવવૈવિધ્ય હોટસ્પોટ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">જૈવવૈવિધ્ય હોટસ્પોટ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "નીચેના પૈકી કયું વિધાન જૈવવૈવિધ્ય હોટસ્પોટ માટે ખોટું છે?", "opts": ["હોટસ્પોટ વિસ્તારમાં ઓછામાં ઓછી 1500 સ્થાનિક વનસ્પતિ પ્રજાતિઓ હોવી જોઈએ.", "હોટસ્પોટ વિસ્તારમાં મૂળ વનસ્પતિ આવરણનો 70% થી વધુ નાશ થયો હોવો જોઈએ.", "પશ્ચિમ ઘાટ અને શ્રીલંકા એક જ હોટસ્પોટ તરીકે ગણવામાં આવે છે.", "ભારતમાં માત્ર પૂર્વ હિમાલય અને પશ્ચિમ ઘાટ બંને જૈવવૈવિધ્ય હોટસ્પોટ છે."], "ans": 3, "exp": "સાચો જવાબ D છે કારણ કે ભારતમાં ચાર જૈવવૈવિધ્ય હોટસ્પોટ છે: પશ્ચિમ ઘાટ, પૂર્વ હિમાલય, ઇન્ડો-બર્મા અને સુંદાલેન્ડ. વિકલ્પ A, B અને C સાચા છે કારણ કે હોટસ્પોટની વ્યાખ્યા મુજબ ઓછામાં ઓછી 1500 સ્થાનિક વનસ્પતિ પ્રજાતિઓ અને 70% થી વધુ વનસ્પતિ આવરણનો નાશ થયો હોવો જોઈએ. પશ્ચિમ ઘાટ અને શ્રીલંકા એક જ હોટસ્પોટ તરીકે ગણવામાં આવે છે.", "ref": "Std 12 - પ્રકરણ 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "જૈવવૈવિધ્ય હોટસ્પોટની ઓળખ માટે નીચેના પૈકી કયું માપદંડ સૌથી વધુ મહત્વપૂર્ણ છે?", "opts": ["વિસ્તારમાં પ્રાણીઓની પ્રજાતિઓની સંખ્યા", "વિસ્તારમાં સ્થાનિક વનસ્પતિ પ્રજાતિઓની સંખ્યા", "વિસ્તારનું કુલ ભૌગોલિક ક્ષેત્રફળ", "વિસ્તારમાં માનવ વસ્તીની ઘનતા"], "ans": 1, "exp": "સાચો જવાબ B છે કારણ કે જૈવવૈવિધ્ય હોટસ્પોટની ઓળખ માટે સૌથી મહત્વપૂર્ણ માપદંડ વિસ્તારમાં સ્થાનિક વનસ્પતિ પ્રજાતિઓની સંખ્યા છે. ઓછામાં ઓછી 1500 સ્થાનિક વનસ્પતિ પ્રજાતિઓ હોવી જોઈએ. વિકલ્પ A, C અને D હોટસ્પોટની વ્યાખ્યામાં મુખ્ય માપદંડ નથી.", "ref": "Std 12 - પ્રકરણ 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "નીચેના પૈકી કયો વિસ્તાર જૈવવૈવિધ્ય હોટસ્પોટ નથી, પરંતુ તેમાં ઉચ્ચ જૈવવૈવિધ્ય જોવા મળે છે?", "opts": ["અંદમાન અને નિકોબાર દ્વીપસમૂહ", "સુંદરવન", "થાર રણ", "પૂર્વ ઘાટ"], "ans": 2, "exp": "સાચો જવાબ C છે કારણ કે થાર રણ જૈવવૈવિધ્ય હોટસ્પોટ નથી, જ્યારે અંદમાન અને નિકોબાર દ્વીપસમૂહ (સુંદાલેન્ડ હોટસ્પોટનો ભાગ), સુંદરવન (ઇન્ડો-બર્મા હોટસ્પોટનો ભાગ) અને પૂર્વ ઘાટ (પશ્ચિમ ઘાટ હોટસ્પોટનો ભાગ નહીં, પરંતુ ઉચ્ચ જૈવવૈવિધ્ય ધરાવે છે) માં ઉચ્ચ જૈવવૈવિધ્ય જોવા મળે છે. થાર રણમાં જૈવવૈવિધ્ય ઓછું છે અને તે હોટસ્પોટ નથી.", "ref": "Std 12 - પ્રકરણ 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "જૈવવૈવિધ્ય હોટસ્પોટ વિસ્તારોમાં સંરક્ષણ માટે નીચેના પૈકી કયું પગલું સૌથી અસરકારક નથી?", "opts": ["સ્થાનિક પ્રજાતિઓના સંરક્ષણ માટે અભયારણ્યો અને રાષ્ટ્રીય ઉદ્યાનોની સ્થાપના", "વિદેશી પ્રજાતિઓના પ્રવેશ પર પ્રતિબંધ", "સ્થાનિક લોકોને જૈવવૈવિધ્ય સંરક્ષણમાં સહભાગી બનાવવા", "હોટસ્પોટ વિસ્તારોમાં ઔદ્યોગિક વિકાસને પ્રોત્સાહન"], "ans": 3, "exp": "સાચો જવાબ D છે કારણ કે હોટસ્પોટ વિસ્તારોમાં ઔદ્યોગિક વિકાસને પ્રોત્સાહન આપવાથી જૈવવૈવિધ્યને નુકસાન થાય છે અને તે સંરક્ષણ માટે અસરકારક પગલું નથી. વિકલ્પ A, B અને C જૈવવૈવિધ્ય સંરક્ષણ માટે અસરકારક પગલાં છે.", "ref": "Std 12 - પ્રકરણ 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન જૈવવૈવિધ્ય હોટસ્પોટ અને એન્ડેમિક પ્રજાતિઓ વચ્ચેના સંબંધ માટે ખોટું છે?", "opts": ["હોટસ્પોટ વિસ્તારોમાં એન્ડેમિક પ્રજાતિઓની સંખ્યા વધુ હોય છે.", "એન્ડેમિક પ્રજાતિઓ માત્ર હોટસ્પોટ વિસ્તારોમાં જ જોવા મળે છે.", "હોટસ્પોટ વિસ્તારોમાં એન્ડેમિક પ્રજાતિઓનું સંરક્ષણ મહત્વપૂર્ણ છે.", "હોટસ્પોટની વ્યાખ્યામાં એન્ડેમિક વનસ્પતિ પ્રજાતિઓનો સમાવેશ થાય છે."], "ans": 1, "exp": "સાચો જવાબ B છે કારણ કે એન્ડેમિક પ્રજાતિઓ માત્ર હોટસ્પોટ વિસ્તારોમાં જ જોવા મળે છે એ વિધાન ખોટું છે. એન્ડેમિક પ્રજાતિઓ અન્ય વિસ્તારોમાં પણ જોવા મળી શકે છે, પરંતુ હોટસ્પોટ વિસ્તારોમાં તેમની સંખ્યા વધુ હોય છે. વિકલ્પ A, C અને D સાચા છે કારણ કે હોટસ્પોટમાં એન્ડેમિક પ્રજાતિઓનું પ્રમાણ વધુ હોય છે અને તેમનું સંરક્ષણ મહત્વપૂર્ણ છે.", "ref": "Std 12 - પ્રકરણ 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "હિમાલય અને પશ્ચિમ ઘાટ એ બંને જૈવવૈવિધ્ય હોટસ્પોટ છે. આ બંને હોટસ્પોટ વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["હિમાલયમાં એન્ડેમિક પ્રજાતિઓની સંખ્યા પશ્ચિમ ઘાટ કરતાં ઓછી છે", "પશ્ચિમ ઘાટમાં વનસ્પતિ અને પ્રાણી પ્રજાતિઓની વિવિધતા હિમાલય કરતાં ઓછી છે", "હિમાલયમાં ઉચ્ચ પર્વતીય પ્રદેશો હોવાથી ત્યાંની પ્રજાતિઓ તાપમાન અને દબાણના ફેરફારોને અનુકૂળ થઈ શકી છે, જ્યારે પશ્ચિમ ઘાટમાં ઉષ્ણકટિબંધીય જંગલો છે", "પશ્ચિમ ઘાટમાં માત્ર વનસ્પતિ પ્રજાતિઓ જ એન્ડેમિક છે, જ્યારે હિમાલયમાં પ્રાણી પ્રજાતિઓ એન્ડેમિક છે"], "ans": 2, "exp": "હિમાલય અને પશ્ચિમ ઘાટ બંને જૈવવૈવિધ્ય હોટસ્પોટ છે, પરંતુ તેમની ભૌગોલિક અને જલવાયુ પરિસ્થિતિઓ ભિન્ન છે. હિમાલયમાં ઉચ્ચ પર્વતીય પ્રદેશો હોવાથી ત્યાંની પ્રજાતિઓ તાપમાન અને વાતાવરણીય દબાણના ફેરફારોને અનુકૂળ થઈ શકી છે, જ્યારે પશ્ચિમ ઘાટમાં ઉષ્ણકટિબંધીય જંગલો અને મોન્સૂન જલવાયુ હોવાથી ત્યાંની પ્રજાતિઓ આ પરિસ્થિતિઓને અનુકૂળ થઈ છે. વિકલ્પ A ખોટો છે કારણ કે હિમાલયમાં એન્ડેમિક પ્રજાતિઓની સંખ્યા પશ્ચિમ ઘાટ કરતાં વધુ છે. વિકલ્પ B ખોટો છે કારણ કે પશ્ચિમ ઘાટમાં વનસ્પતિ અને પ્રાણી પ્રજાતિઓની વિવિધતા હિમાલય કરતાં વધુ છે. વિકલ્પ D ખોટો છે કારણ કે બંને હોટસ્પોટમાં વનસ્પતિ અને પ્રાણી પ્રજાતિઓ એન્ડેમિક છે.", "ref": "Std 12 - અધ્યાય 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "એક જૈવવૈવિધ્ય હોટસ્પોટમાં 1500 થી વધુ એન્ડેમિક વનસ્પતિ પ્રજાતિઓ છે અને તેનો 70% ક્ષેત્ર વનાચ્છાદન ધરાવે છે. આ હોટસ્પોટ કયો હોવાની શક્યતા છે?", "opts": ["સુંડાલેન્ડ", "મેડાગાસ્કર", "કેપ ફ્લોરલ કિંગડમ", "પશ્ચિમ ઘાટ"], "ans": 0, "exp": "સુંડાલેન્ડ હોટસ્પોટમાં 1500 થી વધુ એન્ડેમિક વનસ્પતિ પ્રજાતિઓ છે અને તેનો મોટો ભાગ વનાચ્છાદન ધરાવે છે. મેડાગાસ્કરમાં એન્ડેમિક પ્રજાતિઓની સંખ્યા વધુ છે, પરંતુ તેનો ક્ષેત્ર ઓછો છે. કેપ ફ્લોરલ કિંગડમમાં એન્ડેમિક પ્રજાતિઓની સંખ્યા ઓછી છે. પશ્ચિમ ઘાટમાં એન્ડેમિક પ્રજાતિઓની સંખ્યા 1500 થી ઓછી છે.", "ref": "Std 12 - અધ્યાય 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "જૈવવૈવિધ્ય હોટસ્પોટની ઓળખ માટે નીચેના પૈકી કયું સંયોજન યોગ્ય નથી?", "opts": ["ઉચ્ચ પ્રજાતિ વિવિધતા અને ઉચ્ચ એન્ડેમિઝમ", "મનુષ્યની ગતિવિધિઓ દ્વારા ગંભીર ધમકી", "કુદરતી સંસાધનોની પ્રચુરતા અને આર્થિક વિકાસ", "પ્રાચીન ભૌગોલિક ઇતિહાસ અને જટિલ પર્યાવરણીય પરિસ્થિતિઓ"], "ans": 2, "exp": "જૈવવૈવિધ્ય હોટસ્પોટની ઓળખ માટે ઉચ્ચ પ્રજાતિ વિવિધતા, ઉચ્ચ એન્ડેમિઝમ, મનુષ્યની ગતિવિધિઓ દ્વારા ગંભીર ધમકી, અને પ્રાચીન ભૌગોલિક ઇતિહાસ જેવા માપદંડો મહત્વપૂર્ણ છે. કુદરતી સંસાધનોની પ્રચુરતા અને આર્થિક વિકાસ એ હોટસ્પોટની ઓળખ માટેના માપદંડ નથી, પરંતુ તે સંરક્ષણ માટે પડકાર રજૂ કરે છે.", "ref": "Std 12 - અધ્યાય 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "નીચેના પૈકી કયો હોટસ્પોટ તેની એન્ડેમિક પ્રજાતિઓ માટે જાણીતો છે, જેમાં મોટાભાગની પ્રજાતિઓ એવી છે જે ક્યારેય અન્ય કોઈ પણ સ્થળે જોવા મળી નથી?", "opts": ["કેપ ફ્લોરલ કિંગડમ", "અટલાન્ટિક ફોરેસ્ટ", "મેડાગાસ્કર", "ન્યૂ કેલેડોનિયા"], "ans": 3, "exp": "ન્યૂ કેલેડોનિયા એ એક એવો હોટસ્પોટ છે જ્યાં મોટાભાગની એન્ડેમિક પ્રજાતિઓ એવી છે કે જે ક્યારેય અન્ય કોઈ પણ સ્થળે જોવા મળી નથી. કેપ ફ્લોરલ કિંગડમ, અટલાન્ટિક ફોરેસ્ટ, અને મેડાગાસ્કર પણ એન્ડેમિક પ્રજાતિઓ માટે જાણીતા છે, પરંતુ ન્યૂ કેલેડોનિયામાં એન્ડેમિઝમનો દર સૌથી ઉચ્ચ છે.", "ref": "Std 12 - અધ્યાય 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "જૈવવૈવિધ્ય હોટસ્પોટમાં સંરક્ષણ માટે નીચેના પૈકી કયું પગલું સૌથી અસરકારક છે, પરંતુ તેને અમલમાં મૂકવા માટે સૌથી મુશ્કેલ છે?", "opts": ["રાષ્ટ્રીય ઉદ્યાનો અને અભયારણ્યોની સ્થાપના", "સ્થાનિક સમુદાયોને સંરક્ષણ પ્રવૃત્તિઓમાં સામેલ કરવા", "આંતરરાષ્ટ્રીય સંરક્ષણ નીતિઓ અને કરારો પર હસ્તાક્ષર કરવા", "હોટસ્પોટ વિસ્તારોમાં વસતીના દબાણને નિયંત્રિત કરવા"], "ans": 3, "exp": "હોટસ્પોટ વિસ્તારોમાં વસતીના દબાણને નિયંત્રિત કરવા એ સૌથી અસરકારક પગલું છે, પરંતુ તેને અમલમાં મૂકવા માટે સૌથી મુશ્કેલ છે કારણ કે તે સ્થાનિક આર્થિક અને સામાજિક પરિબળો સાથે સંબંધિત છે. રાષ્ટ્રીય ઉદ્યાનો અને અભયારણ્યોની સ્થાપના, સ્થાનિક સમુદાયોને સામેલ કરવા, અને આંતરરાષ્ટ્રીય નીતિઓ પર હસ્તાક્ષર કરવા એ સરળતાથી અમલમાં મૂકી શકાય છે.", "ref": "Std 12 - અધ્યાય 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "પશ્ચિમ ઘાટ હોટસ્પોટમાં જોવા મળતી 'નીલગિરી તહેર' (Nilgiri Tahr) પ્રજાતિ વિશે નીચેના પૈકી કયું વિધાન સત્ય છે?", "opts": ["તે એક એન્ડેમિક સસ્તન પ્રજાતિ છે અને IUCN રેડ લિસ્ટમાં 'લુપ્તિપ્રાય' (Endangered) ગણવામાં આવે છે.", "તે એક પરભક્ષી પ્રાણી છે અને પશ્ચિમ ઘાટના ઉચ્ચ પર્વતીય પ્રદેશોમાં જોવા મળે છે.", "તે એક સરીસૃપ પ્રજાતિ છે અને મુખ્યત્વે વૃક્ષો પર રહે છે.", "તે એક સ્થાનિક પક્ષી પ્રજાતિ છે અને તેની સંખ્યા સતત વધી રહી છે."], "ans": 0, "exp": "નીલગિરી તહેર (Nilgiri Tahr) પશ્ચિમ ઘાટમાં જોવા મળતી એક એન્ડેમિક સસ્તન પ્રજાતિ છે અને IUCN રેડ લિસ્ટમાં 'લુપ્તિપ્રાય' (Endangered) ગણવામાં આવે છે. તે શાકાહારી છે અને ઉચ્ચ પર્વતીય ઘાસના મેદાનોમાં રહે છે. વિકલ્પ B ખોટો છે કારણ કે તે પરભક્ષી નથી. વિકલ્પ C ખોટો છે કારણ કે તે સરીસૃપ નથી, અને વિકલ્પ D ખોટો છે કારણ કે તે પક્ષી નથી અને તેની સંખ્યા ઘટી રહી છે.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "હિમાલય હોટસ્પોટમાં જોવા મળતી 'રેડ પાંડા' પ્રજાતિ વિશે નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["તે હિમાલયના પર્વતીય જંગલોમાં જોવા મળે છે અને તે એક શાકાહારી પ્રાણી છે.", "તે IUCN રેડ લિસ્ટમાં 'લુપ્તિપ્રાય' (Endangered) ગણવામાં આવે છે.", "તે એક સસ્તન પ્રજાતિ છે અને તેની ત્વચા લાલ અને કાળી રંગની હોય છે.", "તે એક સ્થાનિક મત્સ્ય પ્રજાતિ છે અને નદીઓમાં જોવા મળે છે."], "ans": 3, "exp": "રેડ પાંડા હિમાલયના પર્વતીય જંગલોમાં જોવા મળતી એક શાકાહારી સસ્તન પ્રજાતિ છે અને IUCN રેડ લિસ્ટમાં 'લુપ્તિપ્રાય' (Endangered) ગણવામાં આવે છે. તેની ત્વચા લાલ અને કાળી રંગની હોય છે. વિકલ્પ D ખોટો છે કારણ કે રેડ પાંડા મત્સ્ય પ્રજાતિ નથી, તે સસ્તન છે.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "નીચેના પૈકી કયો હોટસ્પોટ તેની એન્ડેમિક વનસ્પતિ પ્રજાતિઓ માટે જાણીતો છે, જેમાં મોટાભાગની પ્રજાતિઓ એકલી આ હોટસ્પોટમાં જ જોવા મળે છે?", "opts": ["સુંડાલેન્ડ", "મેડાગાસ્કર", "કેલિફોર્નિયા ફ્લોરિસ્ટિક પ્રોવિન્સ", "પશ્ચિમ ઘાટ"], "ans": 2, "exp": "કેલિફોર્નિયા ફ્લોરિસ્ટિક પ્રોવિન્સ તેની એન્ડેમિક વનસ્પતિ પ્રજાતિઓ માટે જાણીતો છે, જેમાં મોટાભાગની પ્રજાતિઓ એકલી આ હોટસ્પોટમાં જ જોવા મળે છે. સુંડાલેન્ડ, મેડાગાસ્કર અને પશ્ચિમ ઘાટ પણ એન્ડેમિક પ્રજાતિઓ ધરાવે છે, પરંતુ કેલિફોર્નિયા ફ્લોરિસ્ટિક પ્રોવિન્સમાં એન્ડેમિઝમનું પ્રમાણ ખૂબ જ ઉચ્ચ છે.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન જૈવવૈવિધ્ય હોટસ્પોટના 'સંપૂર્ણ નુકસાનના જોખમ' (threat of complete loss)ના માપદંડ સાથે સુસંગત નથી?", "opts": ["હોટસ્પોટ વિસ્તારમાં મૂળ વનસ્પતિ આવરણના 70% કે તેથી વધુનો નાશ થયો હોવો જોઈએ.", "હોટસ્પોટ વિસ્તારમાં માનવ પ્રવૃત્તિઓને કારણે પ્રાકૃતિક નિવાસસ્થાનોનું સતત વિઘટન થતું રહેવું જોઈએ.", "હોટસ્પોટ વિસ્તારમાં ઓછામાં ઓછી 1500 સ્થાનિક (એન્ડેમિક) વનસ્પતિ પ્રજાતિઓ હોવી જોઈએ, પછી ભલે તેનું મૂળ આવરણ સંપૂર્ણ નષ્ટ થયું હોય.", "હોટસ્પોટ વિસ્તારમાં પ્રાકૃતિક નિવાસસ્થાનોનું વિઘટન એટલું ગંભીર હોવું જોઈએ કે તેના કારણે સ્થાનિક પ્રજાતિઓના લુપ્ત થવાનું જોખમ ઉભું થાય."], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. જૈવવૈવિધ્ય હોટસ્પોટની ઓળખ માટે બે મુખ્ય માપદંડ છે: (1) ઓછામાં ઓછી 1500 સ્થાનિક વનસ્પતિ પ્રજાતિઓ હોવી જોઈએ, અને (2) મૂળ વનસ્પતિ આવરણના 70% કે તેથી વધુનો નાશ થયો હોવો જોઈએ. વિકલ્પ C ખોટો છે કારણ કે માત્ર સ્થાનિક પ્રજાતિઓની સંખ્યા હોવી પૂરતી નથી, મૂળ આવરણના નુકસાનનું પ્રમાણ પણ મહત્વપૂર્ણ છે. વિકલ્પ A, B અને D હોટસ્પોટના 'સંપૂર્ણ નુકસાનના જોખમ'ના માપદંડ સાથે સુસંગત છે.", "ref": "Std 12 - પ્રકરણ 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "ભારતના બે મુખ્ય જૈવવૈવિધ્ય હોટસ્પોટ - પશ્ચિમ ઘાટ અને હિમાલય - ના સંદર્ભમાં નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["પશ્ચિમ ઘાટ હોટસ્પોટ તેની ઉચ્ચ એન્ડેમિક ઉભયજીવી પ્રજાતિઓ માટે જાણીતો છે, જ્યારે હિમાલય હોટસ્પોટ તેની ઉચ્ચ એન્ડેમિક સસ્તન પ્રજાતિઓ માટે જાણીતો છે.", "પશ્ચિમ ઘાટ હોટસ્પોટમાં મુખ્યત્વે ઉષ્ણકટિબંધીય વરસાદી જંગલો જોવા મળે છે, જ્યારે હિમાલય હોટસ્પોટમાં ઉષ્ણકટિબંધીયથી લઈને આલ્પાઈન વનસ્પતિ સુધીની વિવિધતા જોવા મળે છે.", "પશ્ચિમ ઘાટ હોટસ્પોટમાં જોવા મળતી એન્ડેમિક પ્રજાતિઓની સંખ્યા હિમાલય હોટસ્પોટ કરતાં વધુ છે, પરંતુ હિમાલય હોટસ્પોટનું ક્ષેત્રફળ વધુ છે.", "પશ્ચિમ ઘાટ હોટસ્પોટમાં કૃષિ અને વનનાબૂદી મુખ્ય ખતરા છે, જ્યારે હિમાલય હોટસ્પોટમાં આબોહવા પરિવર્તન અને જમીનના ઉપયોગમાં ફેરફાર મુખ્ય ખતરા છે."], "ans": 0, "exp": "સાચો જવાબ વિકલ્પ A છે. પશ્ચિમ ઘાટ હોટસ્પોટ તેની ઉચ્ચ એન્ડેમિક ઉભયજીવી પ્રજાતિઓ માટે ખરેખર જાણીતો છે, પરંતુ હિમાલય હોટસ્પોટ તેની ઉચ્ચ એન્ડેમિક વનસ્પતિ પ્રજાતિઓ માટે વધુ જાણીતો છે, નહીં કે સસ્તન પ્રજાતિઓ માટે. વિકલ્પ B, C અને D સાચાં છે: પશ્ચિમ ઘાટમાં ઉષ્ણકટિબંધીય વરસાદી જંગલો અને હિમાલયમાં વિવિધ વનસ્પતિ પ્રકારો જોવા મળે છે; પશ્ચિમ ઘાટમાં એન્ડેમિક પ્રજાતિઓ વધુ છે પરંતુ ક્ષેત્રફળ ઓછું છે; અને બંને હોટસ્પોટમાં અલગ-અલગ ખતરાઓ છે.", "ref": "Std 12 - પ્રકરણ 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "પશ્ચિમ ઘાટ હોટસ્પોટમાં જોવા મળતી 'મલબાર મહાભૂજ' (Malabar Pied Hornbill) પ્રજાતિ વિશે નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["તે એક એન્ડેમિક પ્રજાતિ છે જે કેવળ પશ્ચિમ ઘાટના વરસાદી જંગલોમાં જોવા મળે છે.", "તેની ખોરાકની આદતો મુખ્યત્વે ફળાહારી હોય છે અને તે વૃક્ષોની કોથળીઓમાં રહે છે.", "આ પ્રજાતિ IUCN રેડ લિસ્ટમાં 'લુપ્તપ્રાય' (Vulnerable) વર્ગમાં મૂકવામાં આવી છે.", "તે પશ્ચિમ ઘાટના શુષ્ક પાનખર જંગલોમાં સૌથી વધુ પ્રમાણમાં જોવા મળે છે."], "ans": 3, "exp": "મલબાર મહાભૂજ (Malabar Pied Hornbill) એક એન્ડેમિક પ્રજાતિ છે જે પશ્ચિમ ઘાટના વરસાદી જંગલોમાં જોવા મળે છે (A સત્ય). તે ફળાહારી હોય છે અને વૃક્ષોની કોથળીઓમાં રહે છે (B સત્ય). IUCN દ્વારા તેને 'લુપ્તપ્રાય' વર્ગમાં મૂકવામાં આવી છે (C સત્ય). પરંતુ તે શુષ્ક પાનખર જંગલોમાં નહીં, પરંતુ વરસાદી જંગલોમાં જોવા મળે છે, તેથી D ખોટું છે.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "હિમાલય હોટસ્પોટમાં જોવા મળતી 'હિમાલયન મોનલ' (Himalayan Monal) પ્રજાતિ વિશે નીચેના પૈકી કયું વિધાન સત્ય નથી?", "opts": ["તે ભારતનું રાષ્ટ્રીય પક્ષી છે.", "તે ઉચ્ચ પર્વતીય વિસ્તારોમાં 2400 થી 4500 મીટરની ઉંચાઈએ જોવા મળે છે.", "તેની શારીરિક લાક્ષણિકતાઓમાં રંગબેરંગી પીછા અને ચમકદાર પીળા રંગનો કંઠ હોય છે.", "આ પ્રજાતિ IUCN રેડ લિસ્ટમાં 'લુપ્તપ્રાય' (Vulnerable) વર્ગમાં મૂકવામાં આવી છે."], "ans": 0, "exp": "હિમાલયન મોનલ ભારતનું રાષ્ટ્રીય પક્ષી નથી (ભારતનું રાષ્ટ્રીય પક્ષી મોર છે), તેથી A ખોટું છે. તે ઉચ્ચ પર્વતીય વિસ્તારોમાં 2400 થી 4500 મીટરની ઉંચાઈએ જોવા મળે છે (B સત્ય). તેની પીછા રંગબેરંગી અને કંઠ પીળો હોય છે (C સત્ય). IUCN દ્વારા તેને 'લુપ્તપ્રાય' વર્ગમાં મૂકવામાં આવી છે (D સત્ય).", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "નીચેના પૈકી કયો હોટસ્પોટ એવા વિસ્તાર માટે જાણીતો છે જ્યાં એન્ડેમિક પ્રજાતિઓની ટકાવારી સૌથી ઓછી છે, પરંતુ કુલ જૈવવૈવિધ્ય સૌથી વધુ છે?", "opts": ["પશ્ચિમ ઘાટ", "હિમાલય", "ઇન્ડો-બર્મા", "સુંડાલેન્ડ"], "ans": 2, "exp": "ઇન્ડો-બર્મા હોટસ્પોટ એવા વિસ્તાર માટે જાણીતો છે જ્યાં એન્ડેમિક પ્રજાતિઓની ટકાવારી સૌથી ઓછી છે (લગભગ 7-10%), પરંતુ કુલ જૈવવૈવિધ્ય (પ્રજાતિઓની સંખ્યા) સૌથી વધુ છે. પશ્ચિમ ઘાટ (A) અને હિમાલય (B)માં એન્ડેમિક પ્રજાતિઓની ટકાવારી ઉચ્ચ છે. સુંડાલેન્ડ (D)માં એન્ડેમિક પ્રજાતિઓની ટકાવારી મધ્યમ છે.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "ભારતના પશ્ચિમ ઘાટ હોટસ્પોટમાં જોવા મળતી 'કાણી કાચબો' (Cane Turtle) પ્રજાતિ વિશે નીચેના પૈકી કયું વિધાન સત્ય છે?", "opts": ["તે એક સમુદ્રી કાચબો છે જે પશ્ચિમ ઘાટના કિનારેથી દૂર જોવા મળે છે.", "તે મીઠા પાણીના જળાશયોમાં જોવા મળે છે અને IUCN દ્વારા 'લુપ્તપ્રાય' વર્ગમાં મૂકવામાં આવી છે.", "તે એક એન્ડેમિક પ્રજાતિ છે જે કેવળ પશ્ચિમ ઘાટના વરસાદી જંગલોમાં જોવા મળે છે.", "તેની આબાદી મુખ્યત્વે હિમાલયના પર્વતીય પ્રદેશોમાં કેન્દ્રિત છે."], "ans": 1, "exp": "કાણી કાચબો (Cane Turtle) મીઠા પાણીના જળાશયોમાં જોવા મળે છે અને IUCN દ્વારા 'લુપ્તપ્રાય' વર્ગમાં મૂકવામાં આવી છે (B સત્ય). તે સમુદ્રી કાચબો નથી (A ખોટું). તે એન્ડેમિક પ્રજાતિ નથી, પરંતુ પશ્ચિમ ઘાટ સહિત ભારતના વિવિધ ભાગોમાં જોવા મળે છે (C ખોટું). તેની આબાદી હિમાલયમાં કેન્દ્રિત નથી (D ખોટું).", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}, {"q": "પશ્ચિમ ઘાટ હોટસ્પોટમાં જોવા મળતી 'મહારાષ્ટ્ર કાચબો' (Maharashtra Forest Cane Turtle - *Indotestudo travancorica*) પ્રજાતિ વિશે નીચેના પૈકી કયું વિધાન સંપૂર્ણ ખોટું છે?", "opts": ["આ પ્રજાતિ IUCN રેડ લિસ્ટમાં 'સંકટગ્રસ્ત' (Endangered) વર્ગમાં મૂકવામાં આવી છે.", "તે મુખ્યત્વે પશ્ચિમ ઘાટના નીચા પર્વતીય જંગલો અને નદી કિનારાના વિસ્તારોમાં જોવા મળે છે.", "આ કાચબાની પીઠ પરના કવચનો રંગ સામાન્ય રીતે કાળો અથવા ગાઢ ભૂરો હોય છે, જ્યારે પેટનો ભાગ પીળો હોય છે.", "આ પ્રજાતિ હિમાલય હોટસ્પોટમાં પણ સ્થાનિક રીતે જોવા મળે છે, પરંતુ ત્યાં તેની સંખ્યા ખૂબ જ ઓછી છે."], "ans": 3, "exp": "વિકલ્પ D ખોટો છે કારણ કે 'મહારાષ્ટ્ર કાચબો' (*Indotestudo travancorica*) ફક્ત પશ્ચિમ ઘાટ હોટસ્પોટમાં જ એન્ડેમિક છે અને હિમાલય હોટસ્પોટમાં જોવા મળતી નથી. વિકલ્પ A સાચો છે કારણ કે IUCN દ્વારા આ પ્રજાતિને 'સંકટગ્રસ્ત' વર્ગમાં મૂકવામાં આવી છે. વિકલ્પ B સાચો છે કારણ કે તે પશ્ચિમ ઘાટના નીચા પર્વતીય જંગલો અને નદી કિનારાના વિસ્તારોમાં જોવા મળે છે. વિકલ્પ C સાચો છે કારણ કે આ કાચબાની પીઠ પરના કવચનો રંગ સામાન્ય રીતે કાળો અથવા ગાઢ ભૂરો અને પેટનો ભાગ પીળો હોય છે.", "ref": "Std 12 - Chapter 15: જૈવવૈવિધ્ય અને સંરક્ષણ", "ch": ""}];

  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';

  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
