<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Australopithecus</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Australopithecus</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Australopithecus</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ઑસ્ટ્રેલોપિથેકસ પ્રજાતિના અવશેષો મુખ્યત્વે કયા ખંડમાંથી મળી આવ્યા છે?", "opts": ["એશિયા", "આફ્રિકા", "યુરોપ", "ઉત્તર અમેરિકા"], "ans": 1, "exp": "ઑસ્ટ્રેલોપિથેકસ પ્રજાતિના અવશેષો મુખ્યત્વે આફ્રિકા ખંડમાંથી મળી આવ્યા છે, ખાસ કરીને દક્ષિણ અને પૂર્વ આફ્રિકાના પ્રદેશોમાં. એશિયા, યુરોપ અને ઉત્તર અમેરિકામાં આ પ્રજાતિના અવશેષો મળ્યા નથી. આ પ્રજાતિ માનવ ઉત્ક્રાંતિના પ્રારંભિક તબક્કાનું પ્રતિનિધિત્વ કરે છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ઑસ્ટ્રેલોપિથેકસ અને હોમો પ્રજાતિ વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["ઑસ્ટ્રેલોપિથેકસમાં મગજનું કદ મોટું હતું", "ઑસ્ટ્રેલોપિથેકસમાં હાથ અને પગની રચના વૃક્ષારોહણ માટે અનુકૂળ હતી", "ઑસ્ટ્રેલોપિથેકસમાં સાધન બનાવવાની ક્ષમતા હતી", "ઑસ્ટ્રેલોપિથેકસ સંપૂર્ણપણે દ્વિપાદી ન હતા"], "ans": 1, "exp": "ઑસ્ટ્રેલોપિથેકસ પ્રજાતિમાં હાથ અને પગની રચના વૃક્ષારોહણ માટે અનુકૂળ હતી, જ્યારે હોમો પ્રજાતિમાં મગજનું કદ મોટું હતું અને તેઓ વધુ સારી રીતે દ્વિપાદી હતા. ઑસ્ટ્રેલોપિથેકસમાં સાધન બનાવવાની ક્ષમતા મર્યાદિત હતી અને તેઓ સંપૂર્ણપણે દ્વિપાદી ન હતા તેવું માનવામાં આવતું નથી.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઑસ્ટ્રેલોપિથેકસ આફરેન્સિસ માટે ખોટું છે?", "opts": ["તેનું મગજનું કદ આધુનિક મનુષ્યના મગજના કદના લગભગ એક તૃતીયાંશ હતું", "તેના દાંતની રચના ફળાહારી અને માંસાહારી બંને માટે અનુકૂળ હતી", "તેના અવશેષો સૌપ્રથમ ઇથિયોપિયામાંથી મળી આવ્યા હતા", "તે સંપૂર્ણપણે જમીન પર રહેતા હતા અને વૃક્ષારોહણ કરતા ન હતા"], "ans": 3, "exp": "ઑસ્ટ્રેલોપિથેકસ આફરેન્સિસ સંપૂર્ણપણે જમીન પર રહેતા ન હતા અને તેમની શારીરિક રચના વૃક્ષારોહણ માટે પણ અનુકૂળ હતી. તેમનું મગજનું કદ આધુનિક મનુષ્યના મગજના કદના લગભગ એક તૃતીયાંશ હતું, દાંતની રચના મિશ્ર આહાર માટે અનુકૂળ હતી, અને તેમના અવશેષો સૌપ્રથમ ઇથિયોપિયામાંથી મળી આવ્યા હતા.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ઑસ્ટ્રેલોપિથેકસ પ્રજાતિના સંદર્ભમાં 'લ્યુસી' નામના અવશેષનું મહત્વ શું છે?", "opts": ["તે ઑસ્ટ્રેલોપિથેકસ પ્રજાતિનો સૌથી જૂનો અવશેષ છે", "તે સૌથી સંપૂર્ણ અને સારી રીતે સચવાયેલો ઑસ્ટ્રેલોપિથેકસ અવશેષ છે", "તે ઑસ્ટ્રેલોપિથેકસ અને હોમો પ્રજાતિ વચ્ચેની કડી દર્શાવે છે", "તે ઑસ્ટ્રેલોપિથેકસ પ્રજાતિના સાધન બનાવવાના પુરાવા આપે છે"], "ans": 1, "exp": "'લ્યુસી' નામનો અવશેષ ઑસ્ટ્રેલોપિથેકસ આફરેન્સિસ પ્રજાતિનો સૌથી સંપૂર્ણ અને સારી રીતે સચવાયેલો અવશેષ છે, જે ઇથિયોપિયામાંથી મળી આવ્યો હતો. તે ઑસ્ટ્રેલોપિથેકસ પ્રજાતિની શારીરિક રચના અને ઉત્ક્રાંતિ વિશે મહત્વપૂર્ણ માહિતી પૂરી પાડે છે. તે સૌથી જૂનો અવશેષ નથી, ન તો તે સાધન બનાવવાના પુરાવા આપે છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ઑસ્ટ્રેલોપિથેકસ પ્રજાતિના સંદર્ભમાં નીચેનામાંથી કયું વિધાન યોગ્ય નથી?", "opts": ["તેમનું શરીર આંશિક રીતે વાળથી ઢંકાયેલું હતું", "તેમનું મગજનું કદ આધુનિક ચિમ્પાન્ઝી કરતાં થોડું મોટું હતું", "તેઓ સંપૂર્ણપણે દ્વિપાદી હતા અને તેમની કરોડરજ્જુ આધુનિક મનુષ્ય જેવી હતી", "તેમના અવશેષો દક્ષિણ આફ્રિકા અને પૂર્વ આફ્રિકામાંથી મળી આવ્યા છે"], "ans": 2, "exp": "ઑસ્ટ્રેલોપિથેકસ પ્રજાતિ સંપૂર્ણપણે દ્વિપાદી ન હતા અને તેમની કરોડરજ્જુ આધુનિક મનુષ્ય જેવી ન હતી. તેમનું શરીર આંશિક રીતે વાળથી ઢંકાયેલું હતું, મગજનું કદ આધુનિક ચિમ્પાન્ઝી કરતાં થોડું મોટું હતું, અને તેમના અવશેષો દક્ષિણ આફ્રિકા અને પૂર્વ આફ્રિકામાંથી મળી આવ્યા છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ઑસ્ટ્રેલોપિથેકસ પ્રજાતિમાં 'રોબસ્ટ' અને 'ગ્રેસાઇલ' જૂથો વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["રોબસ્ટ જૂથમાં કપાળની હાડકાંની વચ્ચે એક મજબૂત કટિબંધ હાજર છે, જ્યારે ગ્રેસાઇલ જૂથમાં તે અનુપસ્થિત છે.", "રોબસ્ટ જૂથમાં દાંતની રચના સરળ અને નાની હોય છે, જ્યારે ગ્રેસાઇલ જૂથમાં દાંત મોટા અને જાડા હોય છે.", "રોબસ્ટ જૂથમાં મગજની ક્ષમતા ગ્રેસાઇલ જૂથ કરતાં વધુ હોય છે.", "રોબસ્ટ જૂથમાં હાથની રચના ગ્રેસાઇલ જૂથ કરતાં વધુ આધુનિક હોય છે."], "ans": 0, "exp": "રોબસ્ટ જૂથ (ઉદા. ઑસ્ટ્રેલોપિથેકસ રોબસ્ટસ)માં કપાળની હાડકાંની વચ્ચે એક મજબૂત કટિબંધ (સેજિટલ ક્રેસ્ટ) હાજર હોય છે, જે જબડાના સ્નાયુઓને ટેકો આપે છે. ગ્રેસાઇલ જૂથ (ઉદા. ઑસ્ટ્રેલોપિથેકસ આફરેન્સિસ)માં આ કટિબંધ અનુપસ્થિત હોય છે. બાકીના વિકલ્પો ખોટા છે: રોબસ્ટ જૂથમાં દાંત મોટા અને જાડા હોય છે (B ખોટું), મગજની ક્ષમતા ગ્રેસાઇલ જૂથ કરતાં ઓછી હોય છે (C ખોટું), અને હાથની રચના બંનેમાં સરખી જ પ્રાથમિક અવસ્થામાં હોય છે (D ખોટું).", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ઑસ્ટ્રેલોપિથેકસ પ્રજાતિમાં 'બાઇપેડલિઝમ' (દ્વિપાદ ચાલવું) નું સૌથી મહત્વનું પુરાવો કયો છે?", "opts": ["ફેમર (મડદની હાડકું) ની રચના અને લંબાઈ", "કપાળની હાડકાંની જાડાઈ", "દાંતની આકાર અને કદ", "મગજની ખોપરીની ક્ષમતા"], "ans": 0, "exp": "ફેમર (મડદની હાડકું) ની રચના અને લંબાઈ એ બાઇપેડલિઝમનો સૌથી મહત્વનો પુરાવો છે, કારણ કે તે ચાલવાના સ્થાન અને શરીરના વજનને ટેકો આપવા માટે અનુકૂલિત હોય છે. કપાળની હાડકાંની જાડાઈ (B) દાંતની આકાર અને કદ (C), અને મગજની ખોપરીની ક્ષમતા (D) એ બાઇપેડલિઝમના સીધા પુરાવા નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઑસ્ટ્રેલોપિથેકસ પ્રજાતિના 'સેગિટલ ક્રેસ્ટ' વિશે ખરું છે?", "opts": ["તે મગજની ખોપરીના પાછળના ભાગમાં આવેલો હોય છે અને જબડાના સ્નાયુઓને ટેકો આપે છે.", "તે કપાળની હાડકાંની વચ્ચે આવેલો હોય છે અને મગજની ક્ષમતાને વધારે છે.", "તે હાથની હાડકાંમાં આવેલો હોય છે અને ચપળતા વધારે છે.", "તે પગની હાડકાંમાં આવેલો હોય છે અને ચાલવાની ગતિને ટેકો આપે છે."], "ans": 0, "exp": "સેગિટલ ક્રેસ્ટ મગજની ખોપરીના પાછળના ભાગમાં આવેલો હોય છે અને જબડાના સ્નાયુઓને ટેકો આપે છે, જે રોબસ્ટ જૂથમાં જોવા મળે છે. બાકીના વિકલ્પો ખોટા છે: તે કપાળની હાડકાંની વચ્ચે નથી (B ખોટું), હાથ અથવા પગની હાડકાંમાં નથી (C અને D ખોટા).", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ઑસ્ટ્રેલોપિથેકસ પ્રજાતિમાં 'લ્યુસી' (AL 288-1) ના અવશેષોની શોધ કયા વૈજ્ઞાનિક દ્વારા કરવામાં આવી હતી?", "opts": ["ડોનાલ્ડ જોહાન્સન", "લુઈસ લીકી", "રિચર્ડ લીકી", "રેમન્ડ ડાર્ટ"], "ans": 0, "exp": "'લ્યુસી' ના અવશેષોની શોધ ડોનાલ્ડ જોહાન્સન દ્વારા 1974માં ઇથિયોપિયામાં કરવામાં આવી હતી. લુઈસ લીકી (B) અને રિચર્ડ લીકી (C) એ અન્ય મહત્વના વૈજ્ઞાનિકો છે, પરંતુ તેમણે લ્યુસીની શોધ કરી નથી. રેમન્ડ ડાર્ટ (D) એ ઑસ્ટ્રેલોપિથેકસ આફ્રિકાનસની શોધ કરી હતી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઑસ્ટ્રેલોપિથેકસ પ્રજાતિના 'ડાયટ' (આહાર) વિશે ખરું નથી?", "opts": ["રોબસ્ટ જૂથમાં મોટા અને જાડા દાંત હોવાથી તેઓ કઠણ અને રુખા આહાર ખાતા હતા.", "ગ્રેસાઇલ જૂથમાં દાંતની રચના સરળ હોવાથી તેઓ ફળો અને નરમ વનસ્પતિ ખાતા હતા.", "ઑસ્ટ્રેલોપિથેકસ પ્રજાતિ મુખ્યત્વે માંસાહારી હતી.", "તેમના દાંતની રચના એવી હતી કે તેઓ બહુવિધ પ્રકારના આહાર ખાઈ શકતા હતા."], "ans": 2, "exp": "ઑસ્ટ્રેલોપિથેકસ પ્રજાતિ મુખ્યત્વે શાકાહારી અથવા સર્વાહારી હતી, માંસાહારી નહોતી (C ખોટું). રોબસ્ટ જૂથમાં મોટા અને જાડા દાંત હોવાથી તેઓ કઠણ અને રુખા આહાર ખાતા હતા (A ખરું), ગ્રેસાઇલ જૂથમાં દાંતની રચના સરળ હોવાથી તેઓ ફળો અને નરમ વનસ્પતિ ખાતા હતા (B ખરું), અને તેમના દાંતની રચના બહુવિધ પ્રકારના આહાર માટે અનુકૂલિત હતી (D ખરું).", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ઑસ્ટ્રેલોપિથેકસ પ્રજાતિના અવશેષોના અભ્યાસ પરથી જાણવા મળ્યું છે કે તેમના મગજનું કદ આશરે કેટલું હતું?", "opts": ["૩૦૦ થી ૩૫૦ ઘન સે.મી.", "૩૭૫ થી ૫૫૦ ઘન સે.મી.", "૫૦૦ થી ૭૦૦ ઘન સે.મી.", "૭૦૦ થી ૯૦૦ ઘન સે.મી."], "ans": 1, "exp": "ઑસ્ટ્રેલોપિથેકસ પ્રજાતિના મગજનું કદ આશરે ૩૭૫ થી ૫૫૦ ઘન સે.મી. હતું, જે આધુનિક મનુષ્યના મગજના કદ (૧૩૦૦-૧૪૦૦ ઘન સે.મી.) કરતાં નોંધપાત્ર રીતે નાનું હતું. વિકલ્પ A ખૂબ નાનું છે, જ્યારે વિકલ્પ C અને D આધુનિક મનુષ્યના મગજના કદની નજીક છે, જે ઑસ્ટ્રેલોપિથેકસ માટે અયોગ્ય છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ઑસ્ટ્રેલોપિથેકસ પ્રજાતિના સંદર્ભમાં 'ટૉરસ' (Torus) શબ્દ કયા શારીરિક લક્ષણ સાથે સંબંધિત છે?", "opts": ["ખોપરીના પાછળના ભાગમાં આવેલો ઊંચો ભાગ", "જડબાના હાડકામાં આવેલો બહારની તરફનો ઊપસેલો ભાગ", "હાથના હાડકામાં આવેલો સાંધાનો ભાગ", "પગના તળિયામાં આવેલો વળાંક"], "ans": 1, "exp": "'ટૉરસ' શબ્દ ઑસ્ટ્રેલોપિથેકસ પ્રજાતિના જડબાના હાડકામાં આવેલા બહારની તરફના ઊપસેલા ભાગ સાથે સંબંધિત છે, જે તેમના મજબૂત ચાવવાના સ્નાયુઓને આધાર આપતો હતો. વિકલ્પ A ખોપરીના 'સેગિટલ ક્રેસ્ટ' સાથે સંબંધિત છે, જ્યારે વિકલ્પ C અને D અસંગત છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઑસ્ટ્રેલોપિથેકસ પ્રજાતિના 'લોકોમોશન' (સ્થળાંતરણ) વિશે ખોટું છે?", "opts": ["તેઓ સંપૂર્ણપણે દ્વિપાદ (બાઇપેડલ) હતા અને વૃક્ષારોહણ કરતા ન હતા.", "તેમના પગના હાડકાંની રચના દ્વિપાદ ચાલવાની ક્ષમતા દર્શાવે છે.", "તેમના હાથના હાડકાંની લંબાઈ અને રચના વૃક્ષારોહણની ક્ષમતા દર્શાવે છે.", "તેમના શરીરનું કેન્દ્રબિંદુ આધુનિક મનુષ્ય કરતાં અલગ હતું."], "ans": 0, "exp": "ઑસ્ટ્રેલોપિથેકસ પ્રજાતિ સંપૂર્ણપણે દ્વિપાદ ન હતી અને તેમની હાડકાંની રચના દર્શાવે છે કે તેઓ વૃક્ષારોહણ પણ કરતા હતા. વિકલ્પ B, C અને D સાચાં છે કારણ કે તેમના પગ અને હાથના હાડકાં તેમજ શરીરના કેન્દ્રબિંદુમાં તફાવત જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ઑસ્ટ્રેલોપિથેકસ પ્રજાતિના સંદર્ભમાં 'લેટેરલ કન્ડાઇલ' (Lateral Condyle) નું મહત્વ શું છે?", "opts": ["તે ખોપરીના પાયામાં આવેલો ભાગ છે જે મગજના કદ સાથે સંબંધિત છે.", "તે જાંઘના હાડકા (ફીમર) નો ભાગ છે જે દ્વિપાદ ચાલવામાં મહત્વનો છે.", "તે કરોડરજ્જુનો ભાગ છે જે વૃક્ષારોહણમાં મદદ કરે છે.", "તે હાથના કાંડાના હાડકાનો ભાગ છે જે હથિયાર બનાવવામાં ઉપયોગી હતો."], "ans": 1, "exp": "'લેટેરલ કન્ડાઇલ' જાંઘના હાડકા (ફીમર) નો ભાગ છે જે દ્વિપાદ ચાલવામાં મહત્વનો છે. તે ઘૂંટણના સાંધાની સ્થિરતા અને ચાલવાની ક્ષમતા માટે જરૂરી છે. ઑસ્ટ્રેલોપિથેકસ પ્રજાતિમાં આ ભાગની રચના દ્વિપાદ ચાલવાની ક્ષમતા દર્શાવે છે. વિકલ્પ A, C અને D અસંગત છે.", "ref": "Std 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "ch": ""}, {"q": "ઑસ્ટ્રેલોપિથેકસ પ્રજાતિમાં 'પ્રોગ્નેથિઝમ' (Prognathism) નું લક્ષણ કયા અંગ સાથે સંબંધિત છે અને તેનું કયું કારણ મનાય છે?", "opts": ["કપાળનો ભાગ, મગજના કદમાં ઘટાડો", "જડબાનો આગળ નીકળેલો ભાગ, મજબૂત જડબા માટેની જરૂરિયાત", "નાકનો ભાગ, શ્વસન તંત્રની જટિલતા", "કાનનો ભાગ, શ્રવણ ક્ષમતામાં સુધારો"], "ans": 1, "exp": "પ્રોગ્નેથિઝમ એ જડબાનો આગળ નીકળેલો ભાગ છે, જે ઑસ્ટ્રેલોપિથેકસમાં મજબૂત જડબા અને ભારે ચહેરાના હાડકાં માટેની જરૂરિયાતને કારણે જોવા મળે છે. A) કપાળનો ભાગ મગજના કદ સાથે સંબંધિત નથી, પરંતુ મગજનું કદ ઑસ્ટ્રેલોપિથેકસમાં નાનું હોવા છતાં કપાળ પાછળ હટેલો હોય છે. C) નાકનો ભાગ શ્વસન તંત્ર સાથે સંબંધિત નથી, અને પ્રોગ્નેથિઝમ નાક સાથે સંબંધિત નથી. D) કાનનો ભાગ શ્રવણ ક્ષમતાથી સંબંધિત નથી, અને પ્રોગ્નેથિઝમ કાન સાથે કોઈ સંબંધ ધરાવતું નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ઑસ્ટ્રેલોપિથેકસ પ્રજાતિમાં 'પ્રોસિમલ ફેમર' (Proximal Femur) ના અભ્યાસ પરથી કયો નિર્ણય કાઢી શકાય છે, જે દ્વિપાદ ચાલવાના પુરાવા તરીકે ગણાય છે?", "opts": ["ફેમરની લંબાઈ અને વજનનો ગુણોત્તર દર્શાવે છે કે તે ચાલવાની શૈલી વાનર જેવી હતી.", "ફેમરની ગરદન (Neck) નો કોણ (Angle of Neck) મનુષ્ય જેવો ઓછો હોય છે, જે સીધા ચાલવાનું સૂચન કરે છે.", "ફેમરના હેડની આકારમાં વાનર જેવી ગોળાકાર રચના જોવા મળે છે, જે ઝાડ પર ચડવાનું સૂચન કરે છે.", "ફેમરની અંદરની રચના (Medullary Cavity) પાતળી હોય છે, જે દોડવાની ક્ષમતાનું સૂચન કરે છે."], "ans": 1, "exp": "ફેમરની ગરદનનો કોણ (Angle of Neck) મનુષ્યમાં ઓછો (લગભગ 125°) હોય છે, જે સીધા ચાલવાનું સૂચન કરે છે. ઑસ્ટ્રેલોપિથેકસમાં આ કોણ મનુષ્ય જેવો જોવા મળે છે, જે દ્વિપાદ ચાલવાનું પુરાવો છે. A) વાનર જેવી ચાલવાની શૈલી ખોટું છે કારણ કે ઑસ્ટ્રેલોપિથેકસમાં ફેમરની રચના મનુષ્ય જેવી હતી. C) ફેમરના હેડનો આકાર મનુષ્ય જેવો ગોળાકાર નહીં પણ અંડાકાર હોય છે, જે સીધા ચાલવાનું સૂચન કરે છે. D) ફેમરની અંદરની રચના પાતળી હોવાનું દોડવાની ક્ષમતાનું સૂચન કરતું નથી, પરંતુ તે ચાલવાની શક્તિ સાથે સંબંધિત છે.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ઑસ્ટ્રેલોપિથેકસ પ્રજાતિમાં 'સેગિટલ ક્રેસ્ટ' (Sagittal Crest) ની હાજરી કયા અંગના વિકાસ સાથે સંબંધિત છે?", "opts": ["મગજનું કદ વધારવું", "જડબાના સ્નાયુઓને મજબૂત આધાર પૂરો પાડવો", "કાનની હાડકાંની રચનામાં ફેરફાર", "નાકની હાડકાંની રચનામાં સુધારો"], "ans": 1, "exp": "સેગિટલ ક્રેસ્ટ જડબાના સ્નાયુઓ (Masseter Muscles) ને મજબૂત આધાર પૂરો પાડે છે, જે ભારે ખોરાક ચાવવાની ક્ષમતા સાથે સંબંધિત છે. A) મગજનું કદ વધારવું સેગિટલ ક્રેસ્ટ સાથે સંબંધિત નથી. C) કાનની હાડકાંની રચના અને D) નાકની હાડકાંની રચના સેગિટલ ક્રેસ્ટ સાથે કોઈ સંબંધ ધરાવતી નથી.", "ref": "Std 12 - અધ્યાય 7: ઉત્ક્રાંતિ (Evolution)", "ch": ""}, {"q": "ઑસ્ટ્રેલોપિથેકસ પ્રજાતિમાં 'ટૉરસ' (Torus) નું લક્ષણ કયા અંગ સાથે સંબંધિત છે અને તેનું કયું કાર્ય છે?", "opts": ["કપાલની પાછળનો ભાગ, મગજને સુરક્ષા પૂરી પાડવી", "જડબાનો આગળનો ભાગ, ભારે ખોરાક ચાવવાની ક્ષમતા વધારવી", "ખભાના હાડકાં, હાથની હલનચલન ક્ષમતા વધારવી", "પગના હાડકાં, ચાલવાની સ્થિરતા વધારવી"], "ans": 1, "exp": "ટૉરસ જડબાનો આગળનો ભાગ છે, જે ભારે ખોરાક ચાવવાની ક્ષમતા વધારવા માટે વિકસિત થયો છે. A) કપાલની પાછળનો ભાગ ટૉરસ નથી. C) ખભાના હાડકાં અને D) પગના હાડકાં ટૉરસ સાથે સંબંધિત નથી.", "ref": "Std 12 - અ       '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
