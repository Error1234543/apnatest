<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IUCD</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>IUCD</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">IUCD</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "IUCD ની સૌથી સામાન્ય દુષ્પરિણામોમાં કયું એક અસાધારણ છે?", "opts": ["અતિપ્રવાહ (Menorrhagia)", "પીડાદાયક માસિક ચક્ર (Dysmenorrhea)", "ગર્ભાશયમાં છિદ્ર પડવું (Uterine perforation)", "યોનિમાર્ગમાં રક્તસ્રાવ (Vaginal bleeding)"], "ans": 2, "exp": "IUCD ની દુષ્પરિણામોમાં અતિપ્રવાહ, પીડાદાયક માસિક ચક્ર અને યોનિમાર્ગમાં રક્તસ્રાવ સામાન્ય છે, પરંતુ ગર્ભાશયમાં છિદ્ર પડવું અત્યંત અસાધારણ (1/1000 કેસ) છે. આ IUCD ની ગંભીર જટિલતા છે જે શસ્ત્રક્રિયા દ્વારા દૂર કરવી પડે છે.", "ref": "Std 12 - પ્રકરણ 4: જનન અને જનનસ્વાસ્થ્ય", "ch": ""}, {"q": "કોપર-T IUCD કેવી રીતે ગર્ભનિરોધક ક્રિયા કરે છે?", "opts": ["ગર્ભાશયના લાઇનિંગને પાતળું કરીને", "શુક્રાણુઓની ગતિશીલતા ઘટાડીને અને અંડાનું નિષેચન અટકાવીને", "હોર્મોન સ્રાવ દ્વારા ઓવ્યુલેશન અટકાવીને", "ગર્ભાશયના મુખને બંધ કરીને"], "ans": 1, "exp": "કોપર-T IUCD કોપર આયન સ્રાવે છે જે શુક્રાણુઓની ગતિશીલતા ઘટાડે છે અને અંડાનું નિષેચન અટકાવે છે. તે ગર્ભાશયના લાઇનિંગને પાતળું કરતું નથી (હોર્મોનલ IUCD જેવું), હોર્મોન સ્રાવ કરતું નથી, અને ગર્ભાશયના મુખને બંધ કરતું નથી.", "ref": "Std 12 - પ્રકરણ 4: જનન અને જનનસ્વાસ્થ્ય", "ch": ""}, {"q": "હોર્મોનલ IUCD (જેમ કે મિરેના) ની ક્રિયાવિધિમાં કયો હોર્મોન મુખ્ય ભૂમિકા ભજવે છે?", "opts": ["એસ્ટ્રોજન", "પ્રોજેસ્ટેરોન", "પ્રોલેક્ટિન", "ટેસ્ટોસ્ટેરોન"], "ans": 1, "exp": "હોર્મોનલ IUCD (જેમ કે મિરેના) પ્રોજેસ્ટેરોન હોર્મોન સ્રાવે છે, જે ગર્ભાશયના લાઇનિંગને પાતળું કરે છે અને મ્યુકસને ઘટ્ટ બનાવે છે, જેથી શુક્રાણુઓ અંડાને ભેગા થઈ શકતા નથી. એસ્ટ્રોજન, પ્રોલેક્ટિન અને ટેસ્ટોસ્ટેરોન આ IUCD ની ક્રિયાવિધિમાં સીધી ભૂમિકા ભજવતા નથી.", "ref": "Std 12 - પ્રકરણ 4: જનન અને જનનસ્વાસ્થ્ય", "ch": ""}, {"q": "IUCD ની સફળતા દર કેટલી છે જો તે યોગ્ય રીતે મૂકવામાં આવે અને સ્થાનિક સ્થિતિમાં રહે?", "opts": ["70-80%", "85-90%", "95-99%", "100%"], "ans": 2, "exp": "IUCD ની સફળતા દર 95-99% સુધીની હોય છે જો તે યોગ્ય રીતે મૂકવામાં આવે અને સ્થાનિક સ્થિતિમાં રહે. 70-80% અને 85-90% એ નીચી અંદાજ છે, જ્યારે 100% સફળતા અશક્ય છે કારણ કે કોઈ પણ ગર્ભનિરોધક પદ્ધતિ પૂર્ણપણે અચૂક નથી.", "ref": "Std 12 - પ્રકરણ 4: જનન અને જનનસ્વાસ્થ્ય", "ch": ""}, {"q": "IUCD મૂક્યા પછી ક્યારે ગર્ભધારણની શક્યતા પુનઃસ્થાપિત થાય છે?", "opts": ["IUCD કાઢી નાખ્યા પછી તરત જ", "IUCD કાઢી નાખ્યા પછી 1 મહિના પછી", "IUCD કાઢી નાખ્યા પછી 3 મહિના પછી", "IUCD કાઢી નાખ્યા પછી 6 મહિના પછી"], "ans": 0, "exp": "IUCD કાઢી નાખ્યા પછી ગર્ભધારણની શક્યતા તરત જ પુનઃસ્થાપિત થાય છે. IUCD ની અસર અસ્થાયી હોય છે અને તે કાઢી નાખ્યા પછી શરીરની પ્રજનન ક્ષમતા પૂર્વવત્ થાય છે. 1, 3 અથવા 6 મહિનાની રાહ જોવી પડે એવું કોઈ વૈજ્ઞાનિક આધાર નથી.", "ref": "Std 12 - પ્રકરણ 4: જનન અને જનનસ્વાસ્થ્ય", "ch": ""}, {"q": "IUCD ની મૂકણ પ્રક્રિયા દરમિયાન કયું પરિબળ ગર્ભાશયના પેરિટોનિયમમાં કોપર આયનના સાંદ્રતા સ્તરને સૌથી વધુ પ્રભાવિત કરે છે?", "opts": ["IUCD ની આકાર અને કદ", "ગર્ભાશય ગ્રીવાના કદ અને આકાર", "ગર્ભાશયમાં રહેલી શ્લેષ્મલ સ્તરની જાડાઈ", "રક્તપ્રવાહની માત્રા અને ગર્ભાશયની સ્ફીતિ"], "ans": 3, "exp": "IUCD મૂક્યા પછી કોપર આયનના સાંદ્રતા સ્તરને રક્તપ્રવાહ અને ગર્ભાશયની સ્ફીતિ સૌથી વધુ પ્રભાવિત કરે છે, કારણ કે આયનોનો વહન અને વિતરણ રક્તપ્રવાહ અને ગર્ભાશયની સ્થિતિ પર આધારિત હોય છે. A) IUCD ની આકાર અને કદ ફક્ત યાંત્રિક અવરોધ તરીકે કામ કરે છે. B) ગર્ભાશય ગ્રીવાના કદ અને આકાર IUCD ની સ્થિતિને પ્રભાવિત કરે છે, પરંતુ આયનના સાંદ્રતા સ્તરને નહીં. C) શ્લેષ્મલ સ્તરની જાડાઈ આયનના શોષણને થોડું પ્રભાવિત કરે છે, પરંતુ મુખ્ય પરિબળ નથી.", "ref": "Std 12 - પ્રકરણ 4: પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "હોર્મોનલ IUCD (જેમ કે મિરેના) ની લાંબા ગાળાની વાપરથી કયું પાર્શ્વ પ્રભાવ સૌથી વધુ જોવા મળે છે?", "opts": ["અતિશય રક્તસ્રાવ", "અસમયે માસિક ચક્રનું બંધ થવું", "ગર્ભાશયમાં સોજો", "વજનમાં વધારો"], "ans": 1, "exp": "હોર્મોનલ IUCD ની લાંબા ગાળાની વાપરથી અસમયે માસિક ચક્રનું બંધ થવું (એમેનોરિયા) સૌથી સામાન્ય પાર્શ્વ પ્રભાવ છે, કારણ કે પ્રોજેસ્ટેરોન હોર્મોન ગર્ભાશયની અસ્તરને પાતળું કરે છે. A) અતિશય રક્તસ્રાવ સામાન્ય રીતે પ્રથમ કેટલાક મહિનાઓમાં જોવા મળે છે, પરંતુ લાંબા ગાળામાં નહીં. C) ગર્ભાશયમાં સોજો IUCD ની મૂકણ પ્રક્રિયા પછી થોડા સમય માટે જોવા મળે છે, પરંતુ લાંબા ગાળાનું પાર્શ્વ પ્રભાવ નથી. D) વજનમાં વધારો કેટલાક સ્ત્રીઓમાં જોવા મળે છે, પરંતુ તે સૌથી સામાન્ય પાર્શ્વ પ્રભાવ નથી.", "ref": "Std 12 - પ્રકરણ 4: પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "IUCD ની ક્રિયાવિધિમાં કયું પગલું ગર્ભનિરોધક અસર માટે સૌથી નિર્ણાયક છે?", "opts": ["શુક્રાણુઓની ગતિશીલતામાં ઘટાડો", "અંડકોષની ફલનક્ષમતામાં ઘટાડો", "ગર્ભાશયની અસ્તરમાં રાસાયણિક પરિવર્તન", "શુક્રાણુઓ અને અંડકોષ વચ્ચેના ભૌતિક અવરોધની રચના"], "ans": 2, "exp": "IUCD ની ક્રિયાવિધિમાં ગર્ભાશયની અસ્તરમાં રાસાયણિક પરિવર્તન સૌથી નિર્ણાયક પગલું છે, કારણ કે તે અંડકોષના ઇમ્પ્લાન્ટેશનને અટકાવે છે. A) શુક્રાણુઓની ગતિશીલતામાં ઘટાડો કોપર IUCD ની અસર છે, પરંતુ તે મુખ્ય પગલું નથી. B) અંડકોષની ફલનક્ષમતામાં ઘટાડો IUCD ની અસર નથી. D) ભૌતિક અવરોધ IUCD ની મૂળભૂત ક્રિયાવિધિ નથી, પરંતુ તે એક પૂરક અસર છે.", "ref": "Std 12 - પ્રકરણ 4: પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "IUCD ની મૂકણ પ્રક્રિયા પછી કયા સમયગાળામાં સ્ત્રીને સૌથી વધુ સંવેદનશીલતા અનુભવાય છે?", "opts": ["પ્રથમ 24 કલાક", "પ્રથમ 7 દિવસ", "પ્રથમ 1 મહિનો", "પ્રથમ 3 મહિના"], "ans": 0, "exp": "IUCD ની મૂકણ પ્રક્રિયા પછી સ્ત્રીને સૌથી વધુ સંવેદનશીલતા પ્રથમ 24 કલાક દરમિયાન અનુભવાય છે, કારણ કે શરીરને IUCD ની હાજરીને અનુકૂળ થવામાં સમય લાગે છે. B) પ્રથમ 7 દિવસ દરમિયાન સંવેદનશીલતા ઘટતી જાય છે. C) પ્રથમ 1 મહિનામાં સંવેદનશીલતા ઘણી હદે ઘટી જાય છે. D) પ્રથમ 3 મહિનામાં સંવેદનશીલતા લગભગ સમાપ્ત થઈ જાય છે.", "ref": "Std 12 - પ્રકરણ 4: પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "કોપર-T IUCD ની ક્રિયાવિધિમાં કયું રાસાયણિક તત્ત્વ શુક્રાણુઓની ગતિશીલતાને ઘટાડવા માટે જવાબદાર છે?", "opts": ["કોપર આયન (Cu²⁺)", "જસત આયન (Zn²⁺)", "લોખંડ આયન (Fe²⁺)", "મેગ્નેશિયમ આયન (Mg²⁺)"], "ans": 0, "exp": "કોપર-T IUCD ની ક્રિયાવિધિમાં કોપર આયન (Cu²⁺) શુક્રાણુઓની ગતિશીલતાને ઘટાડવા માટે જવાબદાર છે, કારણ કે કોપર આયન શુક્રાણુઓની પેશીને નુકસાન પહોંચાડે છે અને તેમની ગતિશીલતા ઘટાડે છે. B) જસત આયન, C) લોખંડ આયન, અને D) મેગ્નેશિયમ આયન કોપર-T IUCD ની ક્રિયાવિધિમાં સંકળાયેલા નથી.", "ref": "Std 12 - પ્રકરણ 4: પ્રજનન સ્વાસ્થ્ય", "ch": ""}, {"q": "IUCD ની મૂકણ પ્રક્રિયા દરમિયાન ગર્ભાશયના એન્ડોમેટ્રિયમમાં થતી સ્થાનિક પ્રતિક્રિયામાં કયો સાયટોકાઈન મુખ્ય ભૂમિકા ભજવે છે, જે શુક્રાણુઓની ગતિશીલતા અને જીવનકાળને અસર કરે છે?", "opts": ["ઇન્ટરલ્યુકિન-6 (IL-6)", "ટ્યુમર નેક્રોસિસ ફેક્ટર-આલ્ફા (TNF-α)", "ઇન્ટરફેરોન-ગામા (IFN-γ)", "પ્રોસ્ટાગ્લેન્ડિન E2 (PGE2)"], "ans": 3, "exp": "IUCD મૂકણ બાદ એન્ડોમેટ્રિયમમાં પ્રોસ્ટાગ્લેન્ડિન E2 (PGE2) નું સ્રાવ વધે છે, જે સ્થાનિક પ્રતિક્રિયા તરીકે શુક્રાણુઓની ગતિશીલતા અને જીવનકાળને ઘટાડે છે. IL-6, TNF-α, અને IFN-γ એ પ્રતિરક્ષા પ્રતિક્રિયામાં ભાગ લે છે, પરંતુ IUCD ની ક્રિયાવિધિમાં PGE2 ની ભૂમિકા સૌથી નિર્ણાયક છે.", "ref": "Std 12 - પ્રકરણ 4: પ્રજનન તંત્ર", "ch": ""}, {"q": "કોપર-T IUCD ની ગર્ભનિરોધક અસરમાં કયો બાયોકેમિકલ મેકેનિઝમ શુક્રાણુઓની કેપેસિટેશન પ્રક્રિયાને અટકાવે છે?", "opts": ["કોપર આયનો દ્વારા એસિટાઇલકોલિનેસ્ટરેઝ ઉત્સેચકની ક્રિયાને અવરોધવી", "કોપર આયનો દ્વારા શુક્રાણુઓની પ્લાઝ્મા ઝિલ્લી પરના કેલ્શિયમ ચેનલ્સને બ્લોક કરવા", "કોપર આયનો દ્વારા શુક્રાણુઓની મિટોકોન્ડ્રિયલ શ્વસન ક્રિયાને અવરોધવી", "કોપર આયનો દ્વારા શુક્રાણુઓની DNA ને નુકસાન પહોંચાડવી"], "ans": 1, "exp": "કોપર-T IUCD ની ક્રિયાવિધિમાં કોપર આયનો શુક્રાણુઓની પ્લાઝ્મા ઝિલ્લી પરના કેલ્શિયમ ચેનલ્સને બ્લોક કરે છે, જે કેપેસિટેશન પ્રક્રિયાને અટકાવે છે. એસિટાઇલકોલિનેસ્ટરેઝ, મિટોકોન્ડ્રિયલ શ્વસન, અને DNA નુકસાન એ IUCD ની પ્રાથમિક ક્રિયાવિધિ નથી.", "ref": "Std 12 - પ્રકરણ 4: પ્રજનન તંત્ર", "ch": ""}, {"q": "IUCD ની મૂકણ બાદ સ્ત્રીમાં થતી એન્ડોમેટ્રિયલ હિપરપ્લાસિયા ની સ્થિતિમાં કયો હોર્મોન સ્તર અસાધારણ રીતે વધેલો જોવા મળે છે?", "opts": ["એસ્ટ્રોજન", "પ્રોજેસ્ટેરોન", "ફોલિકલ-સ્ટિમ્યુલેટિંગ હોર્મોન (FSH)", "લ્યુટિનાઇઝિંગ હોર્મોન (LH)"], "ans": 0, "exp": "IUCD ની મૂકણ બાદ એન્ડોમેટ્રિયલ હિપરપ્લાસિયા એસ્ટ્રોજનના વધેલા સ્તર સાથે સંબંધિત છે. પ્રોજેસ્ટેરોન, FSH, અને LH ના સ્તરો એન્ડોમેટ્રિયલ હિપરપ્લાસિયા સાથે સીધા સંબંધિત નથી.", "ref": "Std 12 - પ્રકરણ 4: પ્રજનન તંત્ર", "ch": ""}, {"q": "IUCD ની લાંબા ગાળાની વાપરથી ગર્ભાશયના એન્ડોમેટ્રિયમમાં થતી સ્થાનિક જળવાયુક્ત પ્રતિક્રિયામાં કયો કોષ પ્રકાર સૌથી વધુ પ્રભાવિત થાય છે?", "opts": ["એપિથેલિયલ કોષો", "સ્ટ્રોમલ કોષો", "મેક્રોફેજ", "લિમ્ફોસાઇટ્સ"], "ans": 2, "exp": "IUCD ની લાંબા ગાળાની વાપરથી એન્ડોમેટ્રિયમમાં મેક્રોફેજની સંખ્યામાં વધારો થાય છે, જે સ્થાનિક જળવાયુક્ત પ્રતિક્રિયામાં મુખ્ય ભૂમિકા ભજવે છે. એપિથેલિયલ કોષો, સ્ટ્રોમલ કોષો, અને લિમ્ફોસાઇટ્સ એ પ્રતિક્રિયામાં ઓછા પ્રભાવિત થાય છે.", "ref": "Std 12 - પ્રકરણ 4: પ્રજનન તંત્ર", "ch": ""}, {"q": "IUCD ની મૂકણ પ્રક્રિયા દરમિયાન ગર્ભાશયના પેરિટોનિયમમાં કોપર આયનની સાંદ્રતા વધારવા માટે કયો પરિબળ સૌથી નિર્ણાયક છે?", "opts": ["IUCD નું કદ", "IUCD ની સપાટીનું ક્ષેત્રફળ", "ગર્ભાશયના pH સ્તર", "સ્ત્રીની ઉંમર"], "ans": 1, "exp": "IUCD ની સપાટીનું ક્ષેત્રફળ કોપર આયનના સ્રાવને નિયંત્રિત કરે છે, જે ગર્ભાશયના પેરિટોનિયમમાં તેની સાંદ્રતાને અસર કરે છે. IUCD નું કદ, ગર્ભાશયનો pH, અને સ્ત્રીની ઉંમર એ કોપર આયનની સાંદ્રતાને સીધી અસર કરતા નથી.", "ref": "Std 12 - પ્રકરણ 4: પ્રજનન તંત્ર", "ch": ""}, {"q": "IUCD મૂક્યા બાદ ગર્ભાશયમાં થતી સ્થાનિક જળવાયુક્ત પ્રતિક્રિયામાં કયો સાયટોકાઈન શુક્રાણુઓની ગતિશીલતાને ઘટાડવા અને તેમની કેપેસિટેશન પ્રક્રિયાને અટકાવવા માટે જવાબદાર છે?", "opts": ["ઇન્ટરલ્યુકિન-6 (IL-6)", "ટ્યુમર નેક્રોસિસ ફેક્ટર-અલ્ફા (TNF-α)", "પ્રોસ્ટાગ્લેન્ડિન E2 (PGE2)", "ઇન્ટરફેરોન-ગામા (IFN-γ)"], "ans": 2, "exp": "IUCD મૂક્યા બાદ ગર્ભાશયમાં પ્રોસ્ટાગ્લેન્ડિન E2 (PGE2) ની સાંદ્રતા વધે છે, જે શુક્રાણુઓની ગતિશીલતાને ઘટાડે છે અને કેપેસિટેશન પ્રક્રિયાને અટકાવે છે. IL-6 અને TNF-α મુખ્યત્વે જળવાયુક્ત પ્રતિક્રિયામાં સામેલ હોય છે, પરંતુ શુક્રાણુઓની કેપેસિટેશન પર અસર કરતું નથી. IFN-γ મુખ્યત્વે ઇમ્યુન પ્રતિક્રિયામાં ભૂમિકા ભજવે છે, પરંતુ IUCD ની ક્રિયાવિધિમાં નહીં.", "ref": "Std 12 - પ્રકરણ ૩: મનુષ્યમાં પ્રજનન", "ch": ""}, {"q": "કોપર-T IUCD ની ગર્ભનિરોધક અસરમાં કયો બાયોકેમિકલ મેકેનિઝમ ગર્ભાશયના એન્ડોમેટ્રિયમમાં શુક્રાણુઓની ઉર્જા ઉત્પાદન પ્રક્રિયાને અટકાવે છે?", "opts": ["ગ્લાયકોલિસિસની અટકાવણી", "ઓક્સિડેટિવ ફોસ્ફોરાઇલેશનની અટકાવણી", "કોપર આયન દ્વારા એટીપેઝ એન્ઝાઈમની અટકાવણી", "માઇટોકોન્ડ્રિયલ ડીએનએ ની નુકસાન"], "ans": 2, "exp": "કોપર-T IUCDમાં કોપર આયન શુક્રાણુઓની એટીપેઝ એન્ઝાઈમની ક્રિયાને અટકાવે છે, જેના કારણે શુક્રાણુઓની ઉર્જા ઉત્પાદન પ્રક્રિયા (ATP સિંથેસિસ) અટકાવાય છે. ગ્લાયકોલિસિસ અને ઓક્સિડેટિવ ફોસ્ફોરાઇલેશન પર કોપર આયનની સીધી અસર નથી. માઇટોકોન્ડ્રિયલ ડીએનએ નુકસાન પણ IUCD ની ક્રિયાવિધિમાં મુખ્ય ભૂમિકા ભજવતું નથી.", "ref": "Std 12 - પ્રકરણ ૩: મનુષ્યમાં પ્રજનન", "ch": ""}, {"q": "IUCD મૂક્યા બાદ સ્ત્રીમાં થતી એન્ડોમેટ્રિયલ હાઇપરપ્લાસિયા ની સ્થિતિમાં કયો હોર્મોન સ્તર વધારે પ્રમાણમાં જોવા મળે છે?", "opts": ["એસ્ટ્રોજન", "પ્રોજેસ્ટેરોન", "ફોલિકલ સ્ટિમ્યુલેટિંગ હોર્મોન (FSH)", "લ્યુટિનાઇઝિંગ હોર્મોન (LH)"], "ans": 0, "exp": "IUCD મૂક્યા બાદ એન્ડોમેટ્રિયલ હાઇપરપ્લાસિયા મુખ્યત્વે એસ્ટ્રોજનના વધારાના સ્તરને કારણે થાય છે. પ્રોજેસ્ટેરોન, FSH, અને LH ના સ્તરમાં અસાધારણ વધારો એન્ડોમેટ્રિયલ હાઇપરપ્લાસિયા સાથે સીધો સંબંધ ધરાવતો નથી.", "ref": "Std 12 - પ્રકરણ ૩: મનુષ્યમાં પ્રજનન", "ch": ""}, {"q": "હોર્મોનલ IUCD (જેમ કે મિરેના) ની લાંબા ગાળાની વાપરથી ગર્ભાશયના એન્ડોમેટ્રિયમમાં થતી સ્થાનિક પ્રતિક્રિયામાં કયો સાયટોકાઈન સ્ત્રાવ વધે છે, જે એન્ડોમેટ્રિયલ ગ્લેન્ડ્સની ક્રિયાને અટકાવે છે?", "opts": ["ઇન્ટરલ્યુકિન-1 (IL-1)", "ટ્રાન્સફોર્મિંગ ગ્રોથ ફેક્ટર-બીટા (TGF-β)", "વાસ્ક્યુલર એન્ડોથેલિયલ ગ્રોથ ફેક્ટર (VEGF)", "પ્લેટલેટ-ડેરિવ્ડ ગ્રોથ ફેક્ટર (PDGF)"], "ans": 1, "exp": "હોર્મોનલ IUCD ની લાંબા ગાળાની વાપરથી ટ્રાન્સફોર્મિંગ ગ્રોથ ફેક્ટર-બીટા (TGF-β) નો સ્ત્રાવ વધે છે, જે એન્ડોમેટ્રિયલ ગ્લેન્ડ્સની ક્રિયાને અટકાવે છે. IL-1, VEGF, અને PDGF એન્ડોમેટ્રિયલ પ્રતિક્રિયામાં સામેલ હોઈ શકે, પરંતુ TGF-β એ જ મુખ્ય સાયટોકાઈન છે જે ગ્લેન્ડ્સની ક્રિયાને અટકાવે છે.", "ref": "Std 12 - પ્રકરણ ૩: મનુષ્યમાં પ્રજનન", "ch": ""}, {"q": "IUCD ની મૂકણ બાદ ગર્ભાશયમાં થતી સ્થાનિક જળવાયુક્ત પ્રતિક્રિયામાં કયો સાયટોકાઈન શુક્રાણુઓની કેપેસિટેશન પ્રક્રિયાને અટકાવે છે અને એન્ડોમેટ્રિયમની સ્થિતિમાં ફેરફાર કરે છે?", "opts": ["ઇન્ટરલ્યુકિન-6 (IL-6)", "ટ્યુમર નેક્રોસિસ ફેક્ટર-અલ્ફા (TNF-α)", "પ્રોસ્ટાગ્લેન્ડિન E2 (PGE2)", "ઇન્ટરફેરોન-ગામા (IFN-γ)"], "ans": 1, "exp": "IUCD મૂકણ બાદ ગર્ભાશયમાં થતી સ્થાનિક જળવાયુક્ત પ્રતિક્રિયામાં ટ્યુમર નેક્રોસિસ ફેક્ટર-અલ્ફા (TNF-α) શુક્રાણુઓની કેપેસિટેશન પ્રક્રિયાને અટકાવે છે અને એન્ડોમેટ્રિયમની સ્થિતિમાં ફેરફાર કરે છે. IL-6 અને IFN-γ મુખ્યત્વે પ્રતિરક્ષા પ્રતિક્રિયામાં ભૂમિકા ભજવે છે, જ્યારે PGE2 ગર્ભાશયના સંકોચનમાં ભૂમિકા ભજવે છે પરંતુ કેપેસિટેશન અટકાવતું નથી.", "ref": "Std 12 - પ્રકરણ 4: પ્રજનન તંત્ર અને જનન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
