<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helicase</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>Helicase</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">Helicase</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>

const questions=[{"q": "DNA પ્રતિકૃતિ દરમિયાન હેલિકેઝ ઉત્સેચકનું મુખ્ય કાર્ય શું છે?", "opts": ["DNA ની ડબલ હેલિક્સને વિખોલીને સિંગલ સ્ટ્રેન્ડમાં ફેરવવું", "DNA ની સિંગલ સ્ટ્રેન્ડને ડબલ હેલિક્સમાં ફેરવવું", "RNA પ્રાઇમરની રચના કરવી", "DNA પોલિમરેઝને સક્રિય કરવું"], "ans": 0, "exp": "હેલિકેઝ ઉત્સેચકનું મુખ્ય કાર્ય DNA ની ડબલ હેલિક્સને વિખોલીને સિંગલ સ્ટ્રેન્ડમાં ફેરવવું છે, જેથી DNA પ્રતિકૃતિ સરળતાથી થઈ શકે. બાકીના વિકલ્પો અયોગ્ય છે કારણ કે: B) હેલિકેઝ DNA ને સિંગલ સ્ટ્રેન્ડમાંથી ડબલ હેલિક્સમાં ફેરવતું નથી, C) RNA પ્રાઇમરની રચના પ્રાઇમેઝ ઉત્સેચક દ્વારા થાય છે, D) DNA પોલિમરેઝને સક્રિય કરવું હેલિકેઝનું કાર્ય નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "હેલિકેઝ ઉત્સેચકની ક્રિયા માટે કયા પારિભાષિક શબ્દનો ઉપયોગ થાય છે જ્યારે તે DNA ને વિખોલે છે?", "opts": ["ટોપોઇઝોમેરેઝ ક્રિયા", "હેલિકેઝ ક્રિયા", "ડીનેટ્યુરેશન", "રિપ્લિકેશન ફોર્કની રચના"], "ans": 3, "exp": "હેલિકેઝ ઉત્સેચક DNA ને વિખોલતી વખતે રિપ્લિકેશન ફોર્કની રચના કરે છે, જે DNA પ્રતિકૃતિ માટે જરૂરી છે. A) ટોપોઇઝોમેરેઝ ક્રિયા DNA ની ટોપોલોજીને બદલવા માટે જવાબદાર છે, B) હેલિકેઝ ક્રિયા એ સામાન્ય શબ્દ છે પરંતુ રિપ્લિકેશન ફોર્કની રચના એ વધુ સ્પષ્ટ પારિભાષિક શબ્દ છે, C) ડીનેટ્યુરેશન પ્રોટીનના સ્વરૂપને બદલવા સાથે સંબંધિત છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "હેલિકેઝ ઉત્સેચકની ક્રિયા માટે કયા ઉર્જા સ્ત્રોતની જરૂર પડે છે?", "opts": ["ATP", "GTP", "CTP", "UTP"], "ans": 0, "exp": "હેલિકેઝ ઉત્સેચકની ક્રિયા માટે ATP ઉર્જા સ્ત્રોત તરીકે વપરાય છે. બાકીના વિકલ્પો અયોગ્ય છે કારણ કે: B) GTP RNA સંશ્લેષણ અને પ્રોટીન સંશ્લેષણમાં વપરાય છે, C) CTP લિપિડ સંશ્લેષણમાં વપરાય છે, D) UTP RNA સંશ્લેષણમાં વપરાય છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "હેલિકેઝ ઉત્સેચકની ક્રિયા દરમિયાન કયા પ્રકારના બંધન તૂટે છે?", "opts": ["હાઇડ્રોજન બંધન", "પેપ્ટાઇડ બંધન", "આયોનિક બંધન", "કોવેલન્ટ બંધન"], "ans": 0, "exp": "હેલિકેઝ ઉત્સેચક DNA ની ડબલ હેલિક્સને વિખોલતી વખતે હાઇડ્રોજન બંધન તોડે છે, જે DNA ની બે સ્ટ્રેન્ડને જોડી રાખે છે. બાકીના વિકલ્પો અયોગ્ય છે કારણ કે: B) પેપ્ટાઇડ બંધન પ્રોટીનમાં જોવા મળે છે, C) આયોનિક બંધન આયન વચ્ચેના આકર્ષણ સાથે સંબંધિત છે, D) કોવેલન્ટ બંધન DNA ની સ્ટ્રેન્ડમાં જોડાણ માટે જવાબદાર છે પરંતુ હેલિકેઝ દ્વારા તોડાતું નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "હેલિકેઝ ઉત્સેચકની ક્રિયા દરમિયાન કયા પ્રોટીન દ્વારા સિંગલ સ્ટ્રેન્ડ DNA ને સ્થિર રાખવામાં આવે છે?", "opts": ["SSB પ્રોટીન", "ટોપોઇઝોમેરેઝ", "DNA પોલિમરેઝ", "લાઇગેઝ"], "ans": 0, "exp": "SSB પ્રોટીન (Single Strand Binding Protein) હેલિકેઝ દ્વારા વિખોલાયેલા સિંગલ સ્ટ્રેન્ડ DNA ને સ્થિર રાખે છે અને તેને પુન:જોડાઈ જવાથી અટકાવે છે. બાકીના વિકલ્પો અયોગ્ય છે કારણ કે: B) ટોપોઇઝોમેરેઝ DNA ની ટોપોલોજીને બદલવા માટે જવાબદાર છે, C) DNA પોલિમરેઝ DNA ની પ્રતિકૃતિ કરે છે, D) લાઇગેઝ DNA ની સ્ટ્રેન્ડને જોડે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA પ્રતિકૃતિ દરમિયાન હેલિકેઝ ઉત્સેચક દ્વારા બનાવવામાં આવેલા રીલેક્સેશન સ્ટ્રેસને દૂર કરવા માટે કયું ઉત્સેચક જવાબદાર હોય છે?", "opts": ["ટોપોઇસોમેરેઝ", "લાઇગેઝ", "પ્રાઇમેઝ", "DNA પોલિમરેઝ"], "ans": 0, "exp": "હેલિકેઝ ઉત્સેચક DNA ના ડબલ હેલિક્સને અલગ પાડતી વખતે રીલેક્સેશન સ્ટ્રેસ (તણાવ) ઉત્પન્ન કરે છે. આ સ્ટ્રેસને દૂર કરવા માટે ટોપોઇસોમેરેઝ ઉત્સેચક જવાબદાર હોય છે, જે DNA ના સુપરકોઇલને કાપીને અને પુનઃજોડીને સ્ટ્રેસ ઘટાડે છે. લાઇગેઝ DNA ના ટુકડાઓને જોડે છે, પ્રાઇમેઝ RNA પ્રાઇમર બનાવે છે, અને DNA પોલિમરેઝ DNA ની પ્રતિકૃતિ કરે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન", "ch": ""}, {"q": "હેલિકેઝ ઉત્સેચકની ક્રિયા દરમિયાન કયા પ્રકારના DNA ક્ષતિગ્રસ્ત થઈ શકે છે જો ઉત્સેચકની ક્રિયા અટકી જાય?", "opts": ["સિંગલ-સ્ટ્રેન્ડ બ્રેક", "ડબલ-સ્ટ્રેન્ડ બ્રેક", "ઓક્સીડેટિવ ડેમેજ", "એલ્કલીન ડિપ્યુરિનેશન"], "ans": 0, "exp": "હેલિકેઝ ઉત્સેચકની ક્રિયા અટકી જવાથી DNA ના ડબલ હેલિક્સને અલગ પાડવાની પ્રક્રિયા અધૂરી રહે છે, જેના કારણે સિંગલ-સ્ટ્રેન્ડ બ્રેક થઈ શકે છે. ડબલ-સ્ટ્રેન્ડ બ્રેક, ઓક્સીડેટિવ ડેમેજ, અને એલ્કલીન ડિપ્યુરિનેશન એ હેલિકેઝની ક્રિયા સાથે સીધા સંબંધિત નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન", "ch": ""}, {"q": "હેલિકેઝ ઉત્સેચકની ક્રિયા માટે કયા આયનની હાજરી અનિવાર્ય છે?", "opts": ["Mg²⁺", "Ca²⁺", "Fe²⁺", "Zn²⁺"], "ans": 0, "exp": "હેલિકેઝ ઉત્સેચકની ક્રિયા માટે Mg²⁺ આયનની હાજરી અનિવાર્ય છે, કારણ કે તે ATP ના હાઇડ્રોલિસિસમાં મદદ કરે છે, જે હેલિકેઝની ક્રિયા માટે ઉર્જા પૂરી પાડે છે. Ca²⁺, Fe²⁺, અને Zn²⁺ આ ક્રિયામાં સીધો ભાગ ભજવતા નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન", "ch": ""}, {"q": "હેલિકેઝ ઉત્સેચકની ક્રિયા દરમિયાન કયા પ્રકારના DNA બંધનને તોડવામાં આવે છે?", "opts": ["હાઇડ્રોજન બંધન", "પેપ્ટાઇડ બંધન", "ફોસ્ફોડાયેસ્ટર બંધન", "ડિસલ્ફાઇડ બંધન"], "ans": 0, "exp": "હેલિકેઝ ઉત્સેચક DNA ના ડબલ હેલિક્સને અલગ પાડવા માટે હાઇડ્રોજન બંધનને તોડે છે, જે DNA ના બે સ્ટ્રેન્ડને એકબીજા સાથે જોડી રાખે છે. પેપ્ટાઇડ બંધન પ્રોટીનમાં જોવા મળે છે, ફોસ્ફોડાયેસ્ટર બંધન DNA ના બેકબોનમાં હોય છે, અને ડિસલ્ફાઇડ બંધન પ્રોટીનની ત્રિજીવી રચનામાં જોવા મળે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન", "ch": ""}, {"q": "હેલિકેઝ ઉત્સેચકની ક્રિયા દરમિયાન કયા પ્રોટીન દ્વારા સિંગલ-સ્ટ્રેન્ડ DNA ને સ્થિર રાખવામાં આવે છે, જેથી તે પુનઃજોડાઈ ન જાય?", "opts": ["SSBP (Single-Strand Binding Protein)", "હિસ્ટોન", "કોહેસિન", "કોન્ડેન્સિન"], "ans": 0, "exp": "હેલિકેઝ ઉત્સેચક દ્વારા અલગ પડેલા સિંગલ-સ્ટ્રેન્ડ DNA ને સ્થિર રાખવા માટે SSBP (Single-Strand Binding Protein) જવાબદાર હોય છે, જે સિંગલ-સ્ટ્રેન્ડને પુનઃજોડાઈ જવાનું અટકાવે છે. હિસ્ટોન DNA ને ન્યુક્લિયોસોમમાં ગોઠવે છે, કોહેસિન ક્રોમોસોમને એકબીજા સાથે જોડી રાખે છે, અને કોન્ડેન્સિન ક્રોમોસોમને ઘનીભૂત કરે છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન", "ch": ""}, {"q": "DNA પ્રતિકૃતિ દરમિયાન હેલિકેઝ ઉત્સેચક દ્વારા ઉત્પન્ન થતી સિંગલ-સ્ટ્રેન્ડ DNA ની સ્થિરતા માટે કયું પ્રોટીન જવાબદાર નથી?", "opts": ["SSBP (Single-Strand Binding Protein)", "ટોપોઇઝોમેરેઝ", "DNA પોલિમરેઝ I", "હેલિકેઝ સહ-કારક પ્રોટીન (Helicase co-factor)"], "ans": 2, "exp": "SSBP (A) સિંગલ-સ્ટ્રેન્ડ DNA ને સ્થિર રાખે છે. ટોપોઇઝોમેરેઝ (B) સુપરકોઇલિંગને દૂર કરે છે. હેલિકેઝ સહ-કારક પ્રોટીન (D) હેલિકેઝની ક્રિયામાં મદદ કરે છે. DNA પોલિમરેઝ I (C) પ્રતિકૃતિ દરમિયાન પ્રાઇમરને દૂર કરે છે અને ગેપ ફિલ કરે છે, પરંતુ સિંગલ-સ્ટ્રેન્ડ સ્થિરતામાં સીધી ભૂમિકા ભજવતું નથી.", "ref": "Std 12 - Chapter 6: આણ્વિક જનીનશાસ્ત્ર (Molecular Genetics)", "ch": ""}, {"q": "હેલિકેઝ ઉત્સેચકની ક્રિયા દરમિયાન કયા પરિબળને લીધે DNA ની ડબલ હેલિક્સ સ્ટ્રક્ચરમાં તણાવ (stress) ઉત્પન્ન થાય છે?", "opts": ["હાઇડ્રોજન બંધનનું તૂટવું", "સુપરકોઇલિંગ (સુપરકોઇલ) ની રચના", "ફોસ્ફોડાયેસ્ટર બંધનનું તૂટવું", "આરએનએ પ્રાઇમરની હાજરી"], "ans": 1, "exp": "હેલિકેઝ ઉત્સેચક DNA ની ડબલ હેલિક્સને અલગ કરે છે, જેથી સુપરકોઇલિંગ (B) ઉત્પન્ન થાય છે, જે તણાવનું કારણ બને છે. હાઇડ્રોજન બંધન (A) તૂટે છે પરંતુ તણાવનું સીધું કારણ નથી. ફોસ્ફોડાયેસ્ટર બંધન (C) હેલિકેઝ દ્વારા તૂટતું નથી. આરએનએ પ્રાઇમર (D) પ્રતિકૃતિની શરૂઆત માટે જરૂરી છે, પરંતુ તણાવ સાથે સીધો સંબંધ ધરાવતું નથી.", "ref": "Std 12 - Chapter 6: આણ્વિક જનીનશાસ્ત્ર (Molecular Genetics)", "ch": ""}, {"q": "હેલિકેઝ ઉત્સેચકની ક્રિયા દરમિયાન કયા પ્રકારના DNA નુક્લિયોટાઇડ ક્રમ (sequence) પર તેની ક્રિયા સૌથી ઓછી અસરકારક થાય છે?", "opts": ["G-C સંવર્ધિત (rich) ક્ષેત્ર", "A-T સંવર્ધિત ક્ષેત્ર", "પુનરાવર્તિત (repetitive) ક્ષેત્ર", "પેલિન્ડ્રોમિક ક્ષેત્ર"], "ans": 0, "exp": "G-C સંવર્ધિત ક્ષેત્રોમાં (A) ત્રણ હાઇડ્રોજન બંધન હોવાથી હેલિકેઝ માટે તેને અલગ કરવું મુશ્કેલ બને છે, જેથી ક્રિયા ઓછી અસરકારક થાય છે. A-T સંવર્ધિત ક્ષેત્રોમાં (B) બે હાઇડ્રોજન બંધન હોવાથી અલગ કરવું સરળ બને છે. પુનરાવર્તિત (C) અને પેલિન્ડ્રોમિક (D) ક્ષેત્રોમાં હેલિકેઝની ક્રિયા સરળતાથી થઈ શકે છે.", "ref": "Std 12 - Chapter 6: આણ્વિક જનીનશાસ્ત્ર (Molecular Genetics)", "ch": ""}, {"q": "હેલિકેઝ ઉત્સેચકની ક્રિયા દરમિયાન કયા પ્રકારના ઉર્જા સ્ત્રોતનો ઉપયોગ થતો નથી?", "opts": ["ATP નું હાઇડ્રોલિસિસ", "GTP નું હાઇડ્રોલિસિસ", "DNA ની ફોસ્ફેટ જૂથો વચ્ચેની ઉર્જા", "Mg²⁺ આયનની હાજરી દ્વારા સહાય"], "ans": 2, "exp": "હેલિકેઝ ઉત્સેચક ATP (A) અથવા GTP (B) નું હાઇડ્રોલિસિસ કરે છે જેથી ઉર્જા મેળવે છે. Mg²⁺ આયન (D) હેલિકેઝની ક્રિયા માટે અનિવાર્ય છે. DNA ની ફોસ્ફેટ જૂથો વચ્ચેની ઉર્જા (C) હેલિકેઝ દ્વારા ઉપયોગમાં લેવાતી નથી.", "ref": "Std 12 - Chapter 6: આણ્વિક જનીનશાસ્ત્ર (Molecular Genetics)", "ch": ""}, {"q": "DNA પ્રતિકૃતિ દરમિયાન હેલિકેઝ ઉત્સેચક દ્વારા બનાવવામાં આવતા રીપ્લિકેશન ફોર્કની દિશા અને ગતિ વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["હેલિકેઝ ઉત્સેચક એટપેઝ-અસરગ્રસ્ત (ATP-dependent) રીતે 5’ → 3’ દિશામાં ગતિ કરે છે અને રીપ્લિકેશન ફોર્કને અગ્રગામી (leading) અને પશ્ચગામી (lagging) સ્ટ્રેન્ડમાં વહેંચે છે.", "હેલિકેઝ ઉત્સેચક 3’ → 5’ દિશામાં ગતિ કરે છે અને રીપ્લિકેશન ફોર્કની રચના દરમિયાન DNA ની ડબલ હેલિક્સને વળી જવા દે છે.", "હેલિકેઝ ઉત્સેચક દ્વારા રીપ્લિકેશન ફોર્કની ગતિ એટપેઝની હાજરીથી સ્વતંત્ર હોય છે અને તે ફક્ત સિંગલ-સ્ટ્રેન્ડ બાઇન્ડિંગ પ્રોટીન (SSB) ની હાજરીથી નિયંત્રિત થાય છે.", "હેલિકેઝ ઉત્સેચક રીપ્લિકેશન ફોર્કની રચના દરમિયાન DNA ની ડબલ હેલિક્સને તોડી નાખે છે અને તેને સંપૂર્ણપણે સિંગલ-સ્ટ્રેન્ડમાં રૂપાંતરિત કરે છે."], "ans": 0, "exp": "હેલિકેઝ ઉત્સેચક એટપેઝ-અસરગ્રસ્ત (ATP-dependent) રીતે કામ કરે છે અને તે 5’ → 3’ દિશામાં ગતિ કરે છે, જેથી રીપ્લિકેશન ફોર્કની રચના થાય છે અને અગ્રગામી (leading) અને પશ્ચગામી (lagging) સ્ટ્રેન્ડમાં વહેંચાય છે. વિકલ્પ B ખોટો છે કારણ કે હેલિકેઝ 3’ → 5’ દિશામાં ગતિ કરતું નથી. વિકલ્પ C ખોટો છે કારણ કે હેલિકેઝની ક્રિયા એટપેઝ પર આધારિત હોય છે. વિકલ્પ D ખોટો છે કારણ કે હેલિકેઝ DNA ની ડબલ હેલિક્સને સંપૂર્ણપણે તોડી નાખતું નથી, પરંતુ તેને અલગ પાડે છે.", "ref": "Std 12 - Chapter 6: વંશવેલા અને જૈવ-તકનીકી (Molecular Basis of Inheritance)", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન હેલિકેઝ ઉત્સેચકની ક્રિયા માટે ખોટું છે?", "opts": ["હેલિકેઝ ઉત્સેચક DNA ની ડબલ હેલિક્સ સ્ટ્રક્ચરને અલગ કરવા માટે ATP નો જળવિભાજન કરે છે.", "હેલિકેઝ ઉત્સેચકની ક્રિયા દરમિયાન DNA ના બંને સ્ટ્રેન્ડ એકસાથે અલગ થાય છે.", "હેલિકેઝ ઉત્સેચકની ક્રિયા માટે Mg²⁺ આયનની હાજરી જરૂરી છે.", "હેલિકેઝ ઉત્સેચક DNA ના સિંગલ-સ્ટ્રેન્ડ વિસ્તારોમાં પણ સક્રિય રહી શકે છે."], "ans": 3, "exp": "હેલિકેઝ ઉત્સેચક માત્ર ડબલ-સ્ટ્રેન્ડ DNA ને અલગ કરવા માટે સક્રિય હોય છે, સિંગલ-સ્ટ્રેન્ડ DNA પર તેની ક્રિયા થતી નથી. વિકલ્પ A, B અને C માં આપેલી માહિતી સાચી છે કારણ કે હેલિકેઝ ATP નો ઉપયોગ કરીને DNA ને અલગ કરે છે, તેની ક્રિયા માટે Mg²⁺ આયન જરૂરી છે અને તે ડબલ હેલિક્સના બંને સ્ટ્રેન્ડને એકસાથે અલગ કરે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "હેલિકેઝ ઉત્સેચકની ક્રિયા દરમિયાન DNA ની ડબલ હેલિક્સ સ્ટ્રક્ચરમાં કયા પ્રકારનો તણાવ ઉત્પન્ન થાય છે અને તેને દૂર કરવા માટે કયું ઉત્સેચક જવાબદાર છે?", "opts": ["સુપરકોઇલિંગ તણાવ, ટોપોઆઇસોમરેઝ", "હાઇડ્રોજન બોન્ડ તણાવ, લાઇગેઝ", "ફોસ્ફોડાઇએસ્ટર બોન્ડ તણાવ, પ્રાઇમેઝ", "વાન ડર વાલ્સ બોન્ડ તણાવ, પોલિમરેઝ"], "ans": 0, "exp": "હેલિકેઝ ઉત્સેચકની ક્રિયા દરમિયાન DNA ની ડબલ હેલિક્સ સ્ટ્રક્ચરમાં સુપરકોઇલિંગ તણાવ ઉત્પન્ન થાય છે, જેને દૂર કરવા માટે ટોપોઆઇસોમરેઝ ઉત્સેચક જવાબદાર છે. અન્ય વિકલ્પો ખોટા છે કારણ કે લાઇગેઝ હાઇડ્રોજન બોન્ડ સાથે સંકળાયેલ નથી, પ્રાઇમેઝ ફોસ્ફોડાઇએસ્ટર બોન્ડ સાથે સંકળાયેલ નથી અને વાન ડર વાલ્સ બોન્ડ તણાવ DNA પ્રતિકૃતિ સાથે સીધો સંબંધિત નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેના પૈકી કયું હેલિકેઝ ઉત્સેચકનું લક્ષણ નથી?", "opts": ["તે DNA ની ડબલ હેલિક્સને 5'→3' દિશામાં ખોલે છે.", "તે ATP નો ઉપયોગ કરીને ઉર્જા મેળવે છે.", "તે પ્રોકેરિયોટ્સ અને યુકેરિયોટ્સ બંનેમાં જોવા મળે છે.", "તે RNA પ્રાઇમરના સંશ્લેષણમાં સીધી રીતે ભાગ લે છે."], "ans": 3, "exp": "હેલિકેઝ ઉત્સેચક RNA પ્રાઇમરના સંશ્લેષણમાં સીધી રીતે ભાગ લેતું નથી. આ કાર્ય પ્રાઇમેઝ ઉત્સેચક દ્વારા કરવામાં આવે છે. વિકલ્પ A, B અને C માં આપેલી માહિતી સાચી છે કારણ કે હેલિકેઝ DNA ને 5'→3' દિશામાં ખોલે છે, ATP નો ઉપયોગ કરે છે અને પ્રોકેરિયોટ્સ તેમજ યુકેરિયોટ્સમાં જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "હેલિકેઝ ઉત્સેચકની ક્રિયા દરમિયાન DNA ના કયા ભાગમાં તેની પ્રાથમિક ક્રિયા થાય છે અને તેની ક્રિયા માટે કયું પરિબળ જરૂરી નથી?", "opts": ["ઓરિજિન ઓફ રેપ્લિકેશન, GTP", "ટેલોમેરિક વિસ્તાર, ATP", "પ્રમોટર પ્રદેશ, Mg²⁺", "સેન્ટ્રોમિયર વિસ્તાર, NAD⁺"], "ans": 0, "exp": "હેલિકેઝ ઉત્સેચકની પ્રાથમિક ક્રિયા ઓરિજિન ઓફ રેપ્લિકેશન પર થાય છે અને તેની ક્રિયા માટે GTP જરૂરી નથી. હેલિકેઝ ATP નો ઉપયોગ કરે છે, GTP નો નહીં. અન્ય વિકલ્પો ખોટા છે કારણ કે હેલિકેઝ ટેલોમેરિક વિસ્તાર, પ્રમોટર પ્રદેશ કે સેન્ટ્રોમિયર વિસ્તારમાં પ્રાથમિક ક્રિયા કરતું નથી.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લઈને સાચો વિકલ્પ પસંદ કરો:\n(1) હેલિકેઝ ઉત્સેચક DNA ની ડબલ હેલિક્સને ખોલવા માટે હાઇડ્રોજન બોન્ડ તોડે છે.\n(2) હેલિકેઝ ઉત્સેચકની ક્રિયા દરમિયાન DNA ના બંને સ્ટ્રેન્ડ એકસાથે અલગ થાય છે.\n(3) હેલિકેઝ ઉત્સેચકની ક્રિયા માટે Ca²⁺ આયન જરૂરી છે.\n(4) હેલિકેઝ ઉત્સેચક DNA પ્રતિકૃતિ દરમિયાન રીપ્લિકેશન ફોર્ક બનાવે છે.", "opts": ["વિધાન 1, 2 અને 4 સાચાં છે.", "વિધાન 1, 3 અને 4 સાચાં છે.", "વિધાન 2, 3 અને 4 સાચાં છે.", "વિધાન 1, 2, 3 અને 4 સાચાં છે."], "ans": 0, "exp": "વિધાન 1, 2 અને 4 સાચાં છે કારણ કે હેલિકેઝ હાઇડ્રોજન બોન્ડ તોડે છે, બંને સ્ટ્રેન્ડ એકસાથે અલગ કરે છે અને રીપ્લિકેશન ફોર્ક બનાવે છે. વિધાન 3 ખોટું છે કારણ કે હેલિકેઝની ક્રિયા માટે Mg²⁺ આયન જરૂરી છે, Ca²⁺ નહીં.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
