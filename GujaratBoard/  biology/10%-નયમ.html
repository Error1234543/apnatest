<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10% નિયમ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>10% નિયમ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">10% નિયમ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 38 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 38 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "જ્યારે કોષમાં ઉર્જા વપરાશ ૧૦% નિયમ અનુસાર થાય છે, ત્યારે કયા પદાર્થનો ઉત્પાદન દર સૌથી વધુ પ્રભાવિત થાય છે?", "opts": ["ગ્લૂકોઝ", "ATP", "લેક્ટિક એસિડ", "પાયરૂવિક એસિડ"], "ans": 1, "exp": "૧૦% નિયમ મુજબ, ઉર્જા સ્તરોમાં ૧૦% જેટલી ઉર્જા જ એક સ્તરથી બીજા સ્તરમાં સ્થાનાંતરિત થાય છે. ATP ઉર્જાનું વાહક છે અને શ્વસન ક્રિયા દરમિયાન તેનો ઉત્પાદન દર સૌથી વધુ પ્રભાવિત થાય છે. ગ્લૂકોઝ, લેક્ટિક એસિડ અને પાયરૂવિક એસિડ એ ઉર્જા સ્રોત અથવા મધ્યવર્તી ઉત્પાદનો છે, પરંતુ ATP ઉર્જા વહનમાં મુખ્ય ભૂમિકા ભજવે છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "પ્રકાશસંશ્લેષણ દરમિયાન ઉત્પન્ન થતી ઉર્જાનો ૧૦% ભાગ જ પછીના ટ્રોફિક સ્તરે સ્થાનાંતરિત થાય છે. આમાં કયો પગલો સૌથી વધુ ઉર્જા ગુમાવે છે?", "opts": ["પ્રકાશ ઉર્જાનું રાસાયણિક ઉર્જામાં રૂપાંતર", "શ્વસન દરમિયાન ઉર્જાનો વ્યય", "પોષક તત્ત્વોનું શોષણ", "કોષીય શ્વસન દરમિયાન ઉષ્મા ઉત્પન્ન થવી"], "ans": 3, "exp": "પ્રકાશસંશ્લેષણ દરમિયાન ઉત્પન્ન થતી ઉર્જાનો મોટો ભાગ કોષીય શ્વસન દરમિયાન ઉષ્મા રૂપે ગુમાવવામાં આવે છે. પ્રકાશ ઉર્જાનું રાસાયણિક ઉર્જામાં રૂપાંતર (A) અને શ્વસન દરમિયાન ઉર્જાનો વ્યય (B) પણ ઉર્જા ગુમાવે છે, પરંતુ ઉષ્મા ઉત્પન્ન થવી (D) સૌથી મોટો ઉર્જા વ્યય છે. પોષક તત્ત્વોનું શોષણ (C) ઉર્જા વ્યયનો મુખ્ય સ્રોત નથી.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "જ્યારે એક પોષક સ્તરથી બીજા પોષક સ્તરે ઉર્જા સ્થાનાંતરિત થાય છે, ત્યારે ૧૦% નિયમ અનુસાર કયા પરિબળને કારણે ઉર્જા ગુમાવવામાં આવે છે?", "opts": ["કોષીય શ્વસન દરમિયાન ઉષ્મા ઉત્પન્ન થવી", "પોષક તત્ત્વોનું અપૂર્ણ પાચન", "પ્રકાશસંશ્લેષણ દરમિયાન ઓક્સિજન ઉત્પન્ન થવી", "ઉત્સર્જન દરમિયાન પાણીનો વ્યય"], "ans": 0, "exp": "કોષીય શ્વસન દરમિયાન ઉષ્મા ઉત્પન્ન થવી એ ૧૦% નિયમ અનુસાર ઉર્જા ગુમાવવાનો મુખ્ય કારણ છે. પોષક તત્ત્વોનું અપૂર્ણ પાચન (B), પ્રકાશસંશ્લેષણ દરમિયાન ઓક્સિજન ઉત્પન્ન થવી (C) અને ઉત્સર્જન દરમિયાન પાણીનો વ્યય (D) પણ ઉર્જા ગુમાવે છે, પરંતુ ઉષ્મા ઉત્પન્ન થવી સૌથી મહત્વપૂર્ણ છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "એક પારિસ્થિતિકી તંત્રમાં, ઉત્પાદકો દ્વારા શોષાયેલી સૂર્યપ્ર રિસ્થિતિકી તંત્રમાં, ફાયટોપ્લાંકટન (ઉત્પાદકો) દ્વારા સંગ્રહિત સૌર ઉર્જાનો માત્ર ૧૦% ભાગ પ્રાથમિક ઉપભોક્તા (ઝૂપ્લાંકટન)માં સ્થાનાંતરિત થાય છે. આ નિયમના અપવાદરૂપ કયું વિધાન સાચું છે?", "opts": ["ઊંડા સમુદ્રના હાઇડ્રોથર્મલ વેન્ટ્સ પાસે રહેતા કીમોસિન્થેટિક બેક્ટેરિયા દ્વારા ઉત્પાદિત ઉર્જાનું સ્થાનાંતરણ ૧૦% કરતાં વધુ હોઈ શકે છે.", "જ્યારે ઝૂપ્લાંકટન ફાયટોપ્લાંકટનનું સેવન કરે છે, ત્યારે ઉર્જાનું સ્થાનાંતરણ હંમેશા ૧૦% કરતાં ઓછું હોય છે કારણ કે પાચન દરમિયાન ઉર્જા ગુમાવાય છે.", "ફાયટોપ્લાંકટન દ્વારા શોષાયેલી સૌર ઉર્જાનો ૯૦% ભાગ પ્રકાશસંશ્લેષણની પ્રક્રિયામાં વપરાય છે અને માત્ર ૧૦% જ બાયોમાસમાં રૂપાંતરિત થાય છે.", "જ્યારે ઝૂપ્લાંકટન મૃત ફાયટોપ્લાંકટનનું વિઘટન કરે છે, ત્યારે ઉર્જાનું સ્થાનાંતરણ ૧૦% નિયમને અનુસરે છે કારણ કે વિઘટનકર્તાઓ દ્વારા ઉર્જા ગ્રહણ થાય છે."], "ans": 0, "exp": "સાચો જવાબ વિકલ્પ A છે. સામાન્ય રીતે, પારિસ્થિતિકી તંત્રમાં ઉર્જા સ્થાનાંતરણ ૧૦% નિયમને અનુસરે છે, પરંતુ ઊંડા સમુદ્રના હાઇડ્રોથર્મલ વેન્ટ્સ પાસે રહેતા કીમોસિન્થેટિક બેક્ટેરિયા સૂર્યપ્રકાશ પર આધારિત નથી હોતા. તેઓ રાસાયણિક ઉર્જાનો ઉપયોગ કરીને કાર્બનિક પદાર્થોનું ઉત્પાદન કરે છે, અને આ પ્રક્રિયામાં ઉર્જાનું સ્થાનાંતરણ ૧૦% કરતાં વધુ કાર્યક્ષમ હોઈ શકે છે. વિકલ્પ B ખોટો છે કારણ કે પાચન દરમિયાન ઉર્જા ગુમાવાય છે, પરંતુ આ નિયમનો અપવાદ નથી. વિકલ્પ C ખોટો છે કારણ કે પ્રકાશસંશ્લેષણમાં શોષાયેલી ઉર્જાનો મોટો ભાગ બાયોમાસમાં રૂપાંતરિત થાય છે, પરંતુ આ ૧૦% નિયમ સાથે સંબંધિત નથી. વિકલ્પ D ખોટો છે કારણ કે વિઘટનકર્તાઓ દ્વારા ઉર્જા ગ્રહણ થાય છે, પરંતુ આ પ્રક્રિયા ૧૦% નિયમને અનુસરતી નથી.", "ref": "Std 12 - પ્રકરણ 14: પારિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "પારિસ્થિતિકી તંત્રમાં, જ્યારે તૃતીયક ઉપભોક્તા (ટર્શિયરી કન્ઝ્યુમર) દ્વારા ગ્રહણ કરાયેલી ઉર્જાનો ૧૦% ભાગ ચતુર્થ કોષ્ઠી (ક્વોટરનરી લેવલ) સુધી પહોંચે છે, ત્યારે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["ઉર્જાનો મોટાભાગનો ભાગ શ્વસન દરમિયાન ઉષ્મા રૂપે બહાર ફેંકાય છે", "અપઘટન (ડિકમ્પોઝિશન) પ્રક્રિયા દરમિયાન ઉર્જાનો કોઈ ભાગ સ્થાનાંતરિત થતો નથી", "ઉર્જાનો કેટલાક ભાગ અપઘટકો (ડિકમ્પોઝર) દ્વારા વપરાય છે", "ઉર્જાનો કેટલાક ભાગ અવશેષ રૂપે મૃત્યુ પામે છે"], "ans": 1, "exp": "વિકલ્પ B ખોટો છે કારણ કે અપઘટન પ્રક્રિયા દરમિયાન ઉર્જાનો કેટલાક ભાગ અપઘટકો (ડિકમ્પોઝર) દ્વારા વપરાય છે અને કેટલાક ભાગ પારિસ્થિતિકી તંત્રમાં પુનઃચક્રિત થાય છે. ઉર્જાનો ૧૦% નિયમ મુજબ, એક ટ્રોફિક સ્તરથી બીજા ટ્રોફિક સ્તરમાં માત્ર ૧૦% ઉર્જા સ્થાનાંતરિત થાય છે, બાકીની ઉર્જા ઉષ્મા રૂપે બહાર ફેંકાય છે અથવા અપઘટન પ્રક્રિયામાં વપરાય છે. વિકલ્પ A, C, અને D સત્ય છે કારણ કે ઉર્જાનો મોટાભાગનો ભાગ શ્વસન દરમિયાન ઉષ્મા રૂપે બહાર ફેંકાય છે, અપઘટકો દ્વારા વપરાય છે, અને અવશેષ રૂપે મૃત્યુ પામે છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિકી (Ecology)", "ch": ""}, {"q": "એક પારિસ્થિતિકી તંત્રમાં, જ્યારે ઉત્પાદકો (પ્રોડ્યુસર) દ્વારા સંગ્રહિત સૌર ઉર્જાનો ૧૦% ભાગ પ્રાથમિક ઉપભોક્તા (પ્રાઇમરી કન્ઝ્યુમર) સુધી પહોંચે છે, ત્યારે નીચેનામાંથી કયું કથન ૧૦% નિયમનું ઉદાહરણ નથી?", "opts": ["શાકાહારી પ્રાણીઓ દ્વારા ગ્રહણ કરાયેલી ઉર્જાનો ૧૦% ભાગ માંસાહારી પ્રાણીઓ સુધી પહોંચે છે", "ઉત્પાદકો દ્વારા ઉત્પન્ન થતી ઉર્જાનો ૯૦% ભાગ શ્વસન અને અન્ય ક્રિયાઓ દરમિયાન ખર્ચાય છે", "મૃતજીવી (ડિટ્રીટિવોર) દ્વારા વિઘટન પામતા કાર્બનિક પદાર્થમાંથી મુક્ત થતી ઉર્જાનો ૧૦% ભાગ જ પારિસ્થિતિકી તંત્રમાં રહે છે", "ઉત્પાદકો દ્વારા શોષાયેલી સૂર્યપ્રકાશ ઉર્જાનો ૫૦% ભાગ પ્રકાશસંશ્લેષણ દરમિયાન કાર્બોદિત રૂપે સંગ્રહિત થાય છે"], "ans": 3, "exp": "વિકલ્પ D ખોટો છે કારણ કે ઉત્પાદકો દ્વારા શોષાયેલી સૂર્યપ્રકાશ ઉર્જાનો માત્ર ૧-૨% ભાગ પ્રકાશસંશ્લેષણ દરમિયાન કાર્બોદિત રૂપે સંગ્રહિત થાય છે, ૫૦% નહીં. ૧૦% નિયમ મુજબ, એક ટ્રોફિક સ્તરથી બીજા ટ્રોફિક સ્તરમાં માત્ર ૧૦% ઉર્જા સ્થાનાંતરિત થાય છે. વિકલ્પ A, B, અને C સત્ય છે કારણ કે તેઓ ૧૦% નિયમના ઉદાહરણો છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિકી (Ecology)", "ch": ""}, {"q": "નીચેનામાંથી કયું પારિસ્થિતિકી તંત્રમાં ઉર્જા સ્થાનાંતરણ દરમિયાન ૧૦% નિયમનું અપવાદ (Exception) ગણી શકાય?", "opts": ["જ્યારે ઉર્જા ઉત્પાદકોથી પ્રાથમિક ઉપભોક્તા સુધી સ્થાનાંતરિત થાય છે", "જ્યારે ઉર્જા પ્રાથમિક ઉપભોક્તાથી દ્વિતીયક ઉપભોક્તા સુધી સ્થાનાંતરિત થાય છે", "જ્યારે ઉર્જા મૃતજીવી (ડિટ્રીટિવોર) દ્વારા વિઘટન પામતા કાર્બનિક પદાર્થમાંથી મુક્ત થાય છે", "જ્યારે ઉર્જા એક જ ટ્રોફિક સ્તરમાં રહેલા જીવો વચ્ચે સ્થાનાંતરિત થાય છે"], "ans": 3, "exp": "વિકલ્પ D સહી છે કારણ કે જ્યારે ઉર્જા એક જ ટ્રોફિક સ્તરમાં રહેલા જીવો વચ્ચે સ્થાનાંતરિત થાય છે (ઉદાહરણ તરીકે, એક જ પ્રજાતિના પ્રાણીઓ વચ્ચે), ત્યારે ૧૦% નિયમ લાગુ પડતો નથી. ૧૦% નિયમ ફક્ત એક ટ્રોફિક સ્તરથી બીજા ટ્રોફિક સ્તરમાં ઉર્જા સ્થાનાંતરણ દરમિયાન લાગુ પડે છે. વિકલ્પ A, B, અને C ૧૦% નિયમના સામાન્ય ઉદાહરણો છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિકી (Ecology)", "ch": ""}, {"q": "એક પારિસ્થિતિકી તંત્રમાં, જ્યારે ઉત્પાદકો દ્વારા સંગ્રહિત ઉર્જાનો ૧૦% ભાગ પ્રાથમિક ઉપભોક્તા સુધી પહોંચે છે, ત્યારે નીચેનામાંથી કયું કથન ૧૦% નિયમની સીધી પરિણામ નથી?", "opts": ["પારિસ્થિતિકી તંત્રમાં ખોરાક શૃંખલાની લંબાઈ મર્યાદિત હોય છે", "ઉર્જા પિરામિડ હંમેશા સીધો હોય છે", "ઉત્પાદકોની સંખ્યા પ્રાથમિક ઉપભોક્તા કરતાં ઓછી હોય છે", "ઉર્જાનો મોટાભાગનો ભાગ ઉષ્મા રૂપે બહાર ફેંકાય છે"], "ans": 2, "exp": "વિકલ્પ C ખોટો છે કારણ કે ઉત્પાદકોની સંખ્યા પ્રાથમિક ઉપભોક્તા કરતાં વધુ હોય છે, નહીં કે ઓછી. ૧૦% નિયમની સીધી પરિણામે ખોરાક શૃંખલાની લંબાઈ મર્યાદિત હોય છે (વિકલ્પ A), ઉર્જા પિરામિડ હંમેશા સીધો હોય છે (વિકલ્પ B), અને ઉર્જાનો મોટાભાગનો ભાગ ઉષ્મા રૂપે બહાર ફેંકાય છે (વિકલ્પ D).", "ref": "Std 12 - Chapter 14: પારિસ્થિતિકી (Ecology)", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ૧૦% નિયમ અને ઉર્જા પિરામિડ બંને સાથે સંબંધિત છે?", "opts": ["ઉર્જા પિરામિડમાં, પ્રત્યેક ટ્રોફિક સ્તરની ઉર્જા પાછલા ટ્રોફિક સ્તરની ઉર્જા કરતાં ૧૦% હોય છે", "ઉર્જા પિરામિડમાં, પ્રત્યેક ટ્રોફિક સ્તરની ઉર્જા પાછલા ટ્રોફિક સ્તરની ઉર્જા કરતાં ૯૦% હોય છે", "ઉર્જા પિરામિડમાં, પ્રત્યેક ટ્રોફિક સ્તરની ઉર્જા પાછલા ટ્રોફિક સ્તરની ઉર્જા કરતાં ૫૦% હોય છે", "ઉર્જા પિરામિડમાં, પ્રત્યેક ટ્રોફિક સ્તરની ઉર્જા પાછલા ટ્રોફિક સ્તરની ઉર્જા કરતાં સમાન હોય છે"], "ans": 0, "exp": "વિકલ્પ A સહી છે કારણ કે ૧૦% નિયમ અનુસાર, એક ટ્રોફિક સ્તરથી બીજા ટ્રોફિક સ્તરમાં માત્ર ૧૦% ઉર્જા સ્થાનાંતરિત થાય છે. ઉર્જા પિરામિડમાં, પ્રત્યેક ટ્રોફિક સ્તરની ઉર્જા પાછલા ટ્રોફિક સ્તરની ઉર્જા કરતાં ૧૦% હોય છે. વિકલ્પ B, C, અને D ખોટા છે કારણ કે તેઓ ૧૦% નિયમ સાથે સુસંગત નથી.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિકી (Ecology)", "ch": ""}, {"q": "પારિસ્થિતિકી તંત્રમાં, જ્યારે ઉત્પાદકો દ્વારા સંગ્રહિત ઉર્જાનો ૧૦% ભાગ પ્રાથમિક ઉપભોક્તા સુધી પહોંચે છે, ત્યારે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["ઉર્જાનો મોટાભાગનો ભાગ શ્વસન દરમિયાન ઉત્સર્જિત થાય છે.", "ઉર્જાનો કેટલાક ભાગ અપઘટન (ડિકમ્પોઝિશન) દરમિયાન ગુમાવાય છે.", "ઉર્જાનો સંપૂર્ણ ભાગ પ્રાથમિક ઉપભોક્તા દ્વારા શોષાય છે.", "ઉર્જાનો કેટલાક ભાગ અશોષિત રૂપે પર્યાવરણમાં પરત ફરે છે."], "ans": 2, "exp": "વિકલ્પ C) ખોટો છે કારણ કે પ્રાથમિક ઉપભોક્તા દ્વારા ઉર્જાનો સંપૂર્ણ ભાગ શોષાતો નથી. ઉર્જાનો મોટાભાગનો ભાગ શ્વસન, અપઘટન, અશોષિત પદાર્થો અને અન્ય ક્રિયાઓ દરમિયાન ગુમાવાય છે. વિકલ્પ A) સત્ય છે કારણ કે શ્વસન દરમિયાન ઉર્જાનો મોટો ભાગ ઉત્સર્જિત થાય છે. વિકલ્પ B) સત્ય છે કારણ કે અપઘટન દરમિયાન પણ ઉર્જા ગુમાવાય છે. વિકલ્પ D) સત્ય છે કારણ કે અશોષિત પદાર્થો પર્યાવરણમાં પરત ફરે છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "નીચેનામાંથી કયું પારિસ્થિતિકી તંત્રમાં ૧૦% નિયમનું અપવાદ ગણી શકાય છે?", "opts": ["જંગલ પારિસ્થિતિકી તંત્ર", "તળાવ પારિસ્થિતિકી તંત્ર", "કૃત્રિમ તળાવ (એક્વેરિયમ) પારિસ્થિતિકી તંત્ર", "મરુસ્થળ પારિસ્થિતિકી તંત્ર"], "ans": 2, "exp": "વિકલ્પ C) કૃત્રિમ તળાવ (એક્વેરિયમ) પારિસ્થિતિકી તંત્ર ૧૦% નિયમનું અપવાદ ગણી શકાય છે કારણ કે તે કૃત્રિમ રીતે નિયંત્રિત હોય છે અને ઉર્જા સ્થાનાંતરણની કુદરતી પ્રક્રિયા અહીં લાગુ પડતી નથી. વિકલ્પ A), B), અને D) કુદરતી પારિસ્થિતિકી તંત્રો છે જ્યાં ૧૦% નિયમ લાગુ પડે છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "એક પારિસ્થિતિકી તંત્રમાં, જ્યારે ઉત્પાદકો દ્વારા સંગ્રહિત સૌર ઉર્જાનો ૧૦% ભાગ પ્રાથમિક ઉપભોક્તા સુધી પહોંચે છે, ત્યારે નીચેનામાંથી કયું વિધાન ૧૦% નિયમની સીધી અસર દર્શાવતું નથી?", "opts": ["ઉર્જા પિરામિડની રચના થાય છે.", "જૈવ વિવિધતા ઘટે છે.", "ટ્રોફિક સ્તરોની સંખ્યા મર્યાદિત રહે છે.", "ઉર્જાનો વિતરણ અસમાન થાય છે."], "ans": 1, "exp": "વિકલ્પ B) જૈવ વિવિધતા ઘટે છે, તે ૧૦% નિયમની સીધી અસર દર્શાવતું નથી. ૧૦% નિયમની સીધી અસર ઉર્જા પિરામિડ (A), ટ્રોફિક સ્તરોની મર્યાદા (C), અને ઉર્જાના અસમાન વિતરણ (D) પર થાય છે. જૈવ વિવિધતા ઘટવી તે અન્ય પરિબળો જેવા કે આવાસ વિનાશ, પ્રદૂષણ વગેરે પર નિર્ભર કરે છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "પારિસ્થિતિકી તંત્રમાં, જ્યારે એક ટ્રોફિક સ્તરથી બીજા ટ્રોફિક સ્તરમાં ઉર્જા સ્થાનાંતરણ થાય છે, ત્યારે ૧૦% નિયમ લાગુ પડે છે. પરંતુ નીચેનામાંથી કયા પરિસ્થિતિમાં આ નિયમનો વ્યવહારિક અમલ થતો નથી?", "opts": ["જ્યારે ઉત્પાદકો (પ્રોડ્યુસર) દ્વારા સંગ્રહિત સૌર ઉર્જા પ્રાથમિક ઉપભોક્તા સુધી પહોંચે છે", "જ્યારે મૃતજીવી (ડિટ્રીટિવોર) દ્વારા કાર્બનિક પદાર્થનું વિઘટન થાય છે અને ઉર્જા મુક્ત થાય છે", "જ્યારે શાકાહારી પ્રાણીઓ (હર્બિવોર) દ્વારા ખાધેલી વનસ્પતિ ઉર્જા માંસાહારી પ્રાણીઓ (કાર્નિવોર) સુધી પહોંચે છે", "જ્યારે કૃત્રિમ પારિસ્થિતિકી તંત્ર (જેવા કે હાઇડ્રોપોનિક્સ)માં ઉત્પાદકો દ્વારા ઉર્જા સંગ્રહ થાય છે"], "ans": 1, "exp": "૧૦% નિયમ મુખ્યત્વે જીવંત ટ્રોફિક સ્તરો વચ્ચેના ઉર્જા સ્થાનાંતરણને લાગુ પડે છે. મૃતજીવી (ડિટ્રીટિવોર) દ્વારા થતું વિઘટન એક અજૈવિક પ્રક્રિયા છે, જેમાં ઉર્જા સ્થાનાંતરણનો દર ૧૦% નિયમથી ભિન્ન હોય છે. આમ, વિકલ્પ B સહી છે. વિકલ્પ A, C, અને Dમાં જીવંત ટ્રોફિક સ્તરો વચ્ચે ઉર્જા સ્થાનાંતરણ થાય છે, જેમાં ૧૦% નિયમ લાગુ પડે છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિકી તંત્ર અને પર્યાવરણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ૧૦% નિયમ અને ઉર્જા પિરામિડ બંનેના સિદ્ધાંતોને સાચી રીતે સમજાવે છે?", "opts": ["ઉર્જા પિરામિડમાં, પ્રત્યેક ટ્રોફિક સ્તરની ઉર્જા પાછલા ટ્રોફિક સ્તરની ૧૦% હોય છે, પરંતુ આ નિયમ મૃતજીવી ટ્રોફિક સ્તર માટે લાગુ પડતો નથી", "૧૦% નિયમ મુજબ, ઉર્જા સ્થાનાંતરણ દરમિયાન ૯૦% ઉર્જા નુકસાન થાય છે, પરંતુ ઉર્જા પિરામિડમાં આ નુકસાન દર્શાવવામાં આવતું નથી", "ઉર્જા પિરામિડ અને ૧૦% નિયમ બંને એવું સૂચવે છે કે પ્રત્યેક ટ્રોફિક સ્તરમાં ઉર્જાનું પ્રમાણ સમાન રહે છે", "૧૦% નિયમ અને ઉર્જા પિરામિડ બંને એવું દર્શાવે છે કે ઉત્પાદકો દ્વારા સંગ્રહિત ઉર્જાનો ૫૦% ભાગ પ્રાથમિક ઉપભોક્તા સુધી પહોંચે છે"], "ans": 0, "exp": "વિકલ્પ A સાચો છે કારણ કે ઉર્જા પિરામિડ અને ૧૦% નિયમ બંને એવું સૂચવે છે કે પ્રત્યેક ટ્રોફિક સ્તરમાં મેળવેલી ઉર્જાનો માત્ર ૧૦% ભાગ પાછલા ટ્રોફિક સ્તરને સ્થાનાંતરિત થાય છે. પરંતુ મૃતજીવી ટ્રોફિક સ્તર માટે આ નિયમ લાગુ પડતો નથી, કારણ કે તેઓ મૃત કાર્બનિક પદાર્થ પર આધારિત હોય છે. વિકલ્પ B ખોટો છે કારણ કે ઉર્જા પિરામિડમાં ઉર્જા નુકસાન દર્શાવવામાં આવે છે. વિકલ્પ C ખોટો છે કારણ કે ઉર્જા પિરામિડમાં ઉર્જાનું પ્રમાણ પ્રત્યેક ટ્રોફિક સ્તરમાં ઘટતું જાય છે. વિકલ્પ D ખોટો છે કારણ કે ૧૦% નિયમ મુજબ માત્ર ૧૦% ઉર્જા જ સ્થાનાંતરિત થાય છે, ૫૦% નહીં.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિકી તંત્ર અને પર્યાવરણ", "ch": ""}, {"q": "એક જળીય પારિસ્થિતિકી તંત્રમાં ફાયટોપ્લાંકટનથી ઝૂપ્લાંકટન તરફ ઉર્જા સ્થાનાંતરણ દરમિયાન ૧૦% નિયમ લાગુ પડે છે. આ નિયમનું પાલન ન થવાનું મુખ્ય કારણ કયું હોઈ શકે?", "opts": ["ઝૂપ્લાંકટનની વધુ પડતી વસ્તી ઘનતા", "ફાયટોપ્લાંકટનમાં પ્રકાશસંશ્લેષણની ક્ષમતા અચાનક ઘટી જવી", "ઝૂપ્લાંકટન દ્વારા ફાયટોપ્લાંકટનનું અપૂર્ણ પાચન અને ઉર્જાનું ઉષ્મામાં રૂપાંતર", "પાણીમાં ઓગળેલા ઓક્સિજનનું પ્રમાણ વધી જવું"], "ans": 2, "exp": "૧૦% નિયમ મુજબ, એક ટ્રોફિક સ્તરથી બીજા સ્તરે માત્ર ૧૦% ઉર્જા જ સ્થાનાંતરિત થાય છે, કારણ કે બાકીની ઉર્જા શ્વસન, ઉષ્મા અને અપૂર્ણ પાચન દરમિયાન ગુમાવાય છે. અહીં વિકલ્પ Cમાં ઝૂપ્લાંકટન દ્વારા ફાયટોપ્લાંકટનનું અપૂર્ણ પાચન અને ઉર્જાનું ઉષ્મામાં રૂપાંતર થવાનું કારણ આપવામાં આવ્યું છે, જે ૧૦% નિયમનું પાલન ન થવાનું મુખ્ય કારણ છે. બાકીના વિકલ્પો આ નિયમ સાથે સીધો સંબંધ ધરાવતા નથી.", "ref": "Std 12 - પ્રકરણ 14: પારિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "એક પારિસ્થિતિકી તંત્રમાં, જો ઉત્પાદકો દ્વારા સંગ્રહિત ઉર્જા ૫૦૦૦ કિલોકેલરી હોય, તો તૃતીયક ઉપભોક્તા (ટર્શિયરી કન્ઝ્યુમર)ને કેટલી ઉર્જા ઉપલબ્ધ થશે? (૧૦% નિયમ ધ્યાનમાં લો)", "opts": ["૫૦ કિલોકેલરી", "૫ કિલોકેલરી", "૦.૫ કિલોકેલરી", "૦.૦૫ કિલોકેલરી"], "ans": 1, "exp": "૧૦% નિયમ મુજબ, દરેક ટ્રોફિક સ્તરે માત્ર ૧૦% ઉર્જા જ આગળના સ્તરે સ્થાનાંતરિત થાય છે. અહીં ઉત્પાદકોથી પ્રાથમિક ઉપભોક્તા: ૫૦૦૦ × ૧૦% = ૫૦૦ કિલોકેલરી, પ્રાથમિકથી દ્વિતીયક ઉપભોક્તા: ૫૦૦ × ૧૦% = ૫૦ કિલોકેલરી, અને દ્વિતીયકથી તૃતીયક ઉપભોક્તા: ૫૦ × ૧૦% = ૫ કિલોકેલરી. તેથી સાચો જવાબ વિકલ્પ B છે.", "ref": "Std 12 - પ્રકરણ 14: પારિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું ઉદાહરણ ૧૦% નિયમનું અપવાદ ગણી શકાય?", "opts": ["એક જંગલમાં વૃક્ષોથી હરણ તરફ ઉર્જા સ્થાનાંતરણ", "એક તળાવમાં ફાયટોપ્લાંકટનથી માછલી તરફ ઉર્જા સ્થાનાંતરણ", "એક ખેતરમાં ઘાસથી ગાય તરફ ઉર્જા સ્થાનાંતરણ", ય છે.\n\nવિકલ્પ B, C અને D ખોટા છે કારણ કે આ તમામ ઉદાહરણોમાં સૂર્યપ્રકાશ આધારિત ઉર્જા સ્થાનાંતરણ થાય છે, જેમાં ૧૦% નિયમ લાગુ પડે છે. આ તંત્રોમાં ઉર્જા સ્થાનાંતરણનો દર સામાન્ય રીતે ૧૦% જેટલો જ રહે છે.", "ref": "Std 12 - પ્રકરણ 14: પારિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "પારિસ્થિતિકી તંત્રમાં, જ્યારે મૃતજીવી (ડિટ્રીટિવોર) દ્વારા કાર્બનિક પદાર્થનું વિઘટન થાય છે, ત્યારે ૧૦% નિયમ લાગુ પડતો નથી. આનું મુખ્ય કારણ કયું છે?", "opts": ["મૃતજીવી દ્વારા ઉર્જા સીધી રીતે સંગ્રહિત થતી નથી, પરંતુ વિઘટન પ્રક્રિયામાં ઉર્જા ઉત્સર્જિત થાય છે.", "મૃતજીવી દ્વારા ઉર્જા સ્થાનાંતરણ દરમિયાન ૨૦% ઉર્જા નુકસાન થાય છે.", "મૃતજીવી દ્વારા ઉર્જા સ્થાનાંતરણ દરમિયાન ૫% ઉર્જા નુકસાન થાય છે.", "મૃતજીવી દ્વારા ઉર્જા સ્થાનાંતરણ દરમિયાન ૧૦% ઉર્જા સંગ્રહિત થાય છે."], "ans": 0, "exp": "મૃતજીવી (ડિટ્રીટિવોર) દ્વારા કાર્બનિક પદાર્થનું વિઘટન થતાં ઉર્જા સીધી રીતે સંગ્રહિત થતી નથી, પરંતુ વિઘટન પ્રક્રિયામાં ઉર્જા ઉત્સર્જિત થાય છે. આથી ૧૦% નિયમ લાગુ પડતો નથી. બાકીના વિકલ્પો (B, C, D) ૧૦% નિયમના અપવાદ તરીકે યોગ્ય નથી, કારણ કે મૃતજીવી દ્વારા ઉર્જા સ્થાનાંતરણ દરમિયાન ઉર્જા સંગ્રહણ અથવા નુકસાનનો દર ૧૦% નિયમ અનુસાર નક્કી થતો નથી.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ૧૦% નિયમ અને ઉર્જા પિરામિડ બંનેમાં સમાન રીતે લાગુ પડતું નથી?", "opts": ["ઉર્જા એક ટ્રોફિક સ્તરથી બીજા ટ્રોફિક સ્તરમાં સ્થાનાંતરિત થતી વખતે ૯૦% ઉર્જા નુકશાન થાય છે.", "ઉત્પાદકો (પ્રોડ્યુસર) સ્તરે સૌથી વધુ ઉર્જા ઉપલબ્ધ હોય છે.", "મૃતજીવી (ડિટ્રીટિવોર) દ્વારા ઉર્જા સ્થાનાંતરણ ૧૦% નિયમ અનુસાર થતું નથી.", "ઉર્જા પિરામિડ હંમેશા સીધો જ હોય છે."], "ans": 2, "exp": "મૃતજીવી (ડિટ્રીટિવોર) દ્વારા ઉર્જા સ્થાનાંતરણ ૧૦% નિયમનું અપવાદ છે, કારણ કે તેઓ મૃત કાર્બનિક પદાર્થનું વિઘટન કરે છે અને ઉર્જાનું સ્થાનાંતરણ અલગ રીતે થાય છે. બાકીના વિધાનો ૧૦% નિયમ અને ઉર્જા પિરામિડ બંનેમાં લાગુ પડે છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિકી (Ecology)", "ch": ""}, {"q": "નીચેનામાંથી કયું ઉદાહરણ ૧૦% નિયમનું અપવાદ નથી?", "opts": ["પરજીવી અને યજમાન વચ્ચે ઉર્જા સ્થાનાંતરણ", "ફાયટોપ્લાંકટનથી ઝૂપ્લાંકટન તરફ ઉર્જા સ્થાનાંતરણ", "મૃતજીવી (ડિટ્રીટિવોર) દ્વારા કાર્બનિક પદાર્થનું વિઘટન", "સહજીવન (સિમ્બાયોસિસ) વચ્ચે ઉર્જા સ્થાનાંતરણ"], "ans": 1, "exp": "ફાયટોપ્લાંકટનથી ઝૂપ્લાંકટન તરફ ઉર્જા સ્થાનાંતરણ ૧૦% નિયમ અનુસાર જ થાય છે. પરજીવી અને યજમાન, મૃતજીવી દ્વારા વિઘટન, અને સહજીવન વચ્ચે ઉર્જા સ્થાનાંતરણ ૧૦% નિયમના અપવાદ ગણી શકાય છે.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિકી (Ecology)", "ch": ""}, {"q": "એક જળીય પારિસ્થિતિકી તંત્રમાં, ફાયટોપ્લાંકટનથી ઝૂપ્લાંકટન તરફ ઉર્જા સ્થાનાંતરણ દરમિયાન ૧૦% નિયમ લાગુ પડે છે. આ નિયમનું પાલન ન થવાનું મુખ્ય કારણ શું હોઈ શકે?", "opts": ["ઝૂપ્લાંકટનની વધુ પડતી વસ્તી", "ફાયટોપ્લાંકટનની ઉર્જા સંગ્રહ ક્ષમતામાં ઘટાડો", "ઝૂપ્લાંકટન દ્વારા ફાયટોપ્લાંકટનનું અપૂર્ણ પાચન", "પાણીમાં ઓગળેલા ઓક્સિજનનું પ્રમાણ વધુ હોવું"], "ans": 2, "exp": "૧૦% નિયમ મુજબ, ઉર્જાનું સ્થાનાંતરણ અપૂર્ણ પાચન, શ્વસન અને ઉષ્માના રૂપમાં ઉર્જા ગુમાવવાને કારણે માત્ર ૧૦% જ થાય છે. ઝૂપ્લાંકટન દ્વારા ફાયટોપ્લાંકટનનું અપૂર્ણ પાચન થવાને કારણે ઉર્જાનું સ્થાનાંતરણ ઓછું થાય છે, જે આ નિયમનું પાલન ન થવાનું મુખ્ય કારણ છે. અન્ય વિકલ્પો આ નિયમ સાથે સીધો સંબંધ ધરાવતા નથી.", "ref": "Std 12 - પ્રકરણ 14: પારિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું ઉદાહરણ ૧૦% નિયમનું અપવાદ ગણી શકાય છે, જ્યાં ઉર્જા સ્થાનાંતરણ ૧૦% કરતાં વધુ હોઈ શકે છે?", "opts": ["વન પારિસ્થિતિકી તંત્રમાં વૃક્ષોથી હરણ તરફ ઉર્જા સ્થાનાંતરણ", "જળીય પારિસ્થિતિકી તંત્રમાં ફાયટોપ્લાંકટનથી માછલીઓ તરફ ઉર્જા સ્થાનાંતરણ", "પરોપજીવી (પેરાસાઇટ) અને યજમાન વચ્ચે ઉર્જા સ્થાનાંતરણ", "ઘાસના મેદાનમાં ઘાસથી તીડ તરફ ઉર્જા સ્થાનાંતરણ"], "ans": 2, "exp": "પરોપજીવી અને યજમાન વચ્ચે ઉર્જા સ્થાનાંતરણમાં, પરોપજીવી યજમાનના શરીરમાંથી સીધી ઉર્જા મેળવે છે, જેના કારણે ઉર્જા ગુમાવવાનું પ્રમાણ ઓછું હોય છે. આથી આ ઉદાહરણ ૧૦% નિયમનું અપવાદ ગણી શકાય છે. અન્ય વિકલ્પોમાં ઉર્જા સ્થાનાંતરણ ૧૦% કરતાં ઓછું જ થાય છે.", "ref": "Std 12 - પ્રકરણ 14: પારિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ૧૦% નિયમ અને ઉર્જા પિરામિડ બંનેના અપવાદને યોગ્ય રીતે સમજાવે છે, જ્યાં ઉર્જા સ્થાનાંતરણનો દર અપેક્ષા કરતાં વધુ હોય છે?", "opts": ["જ્યારે મૃતજીવીઓ (ડિટ્રીટિવોર) દ્વારા કાર્બનિક પદાર્થનું વિઘટન ખૂબ ઝડપી થાય છે અને ઉર્જા મુક્ત થાય છે", "જ્યારે એક ટ્રોફિક સ્તરના સજીવો બીજા ટ્રોફિક સ્તરના સજીવોને સંપૂર્ણપણે પચાવી શકે છે અને ઉર્જાનું નુકસાન ઓછું થાય છે", "જ્યારે પારિસ્થિતિકી તંત્રમાં પોષક તત્ત્વોની અછત હોય અને ઉત્પાદકોની સંખ્યા ઘટી જાય છે", "જ્યારે ઉચ્ચ ટ્રોફિક સ્તરના સજીવોની સંખ્યા ખૂબ વધારે હોય અને તેઓ વધુ ઉર્જા વાપરે છે"], "ans": 1, "exp": "૧૦% નિયમ મુજબ, ઉર્જા સ્થાનાંતરણ દરમિયાન માત્ર ૧૦% ઉર્જા જ પછીના ટ્રોફિક સ્તરે પહોંચે છે. પરંતુ જ્યારે એક ટ્રોફિક સ્તરના સજીવો બીજા ટ્રોફિક સ્તરના સજીવોને સંપૂર્ણપણે પચાવી શકે છે, ત્યારે ઉર્જાનું નુકસાન ઓછું થાય છે અને ઉર્જા સ્થાનાંતરણનો દર ૧૦% કરતાં વધુ હોઈ શકે છે. આ ઉર્જા પિરામિડના સિદ્ધાંતનો પણ અપવાદ છે. બાકીના વિકલ્પોમાં ઉર્જા સ્થાનાંતરણમાં વધુ નુકસાન થાય છે અથવા ઉત્પાદકતા ઘટે છે, જે ૧૦% નિયમને અનુરૂપ છે.", "ref": "Std 12 - પ્રકરણ 14: પારિસ્થિતિકી તંત્ર", "ch": ""}, {"q": "પારિસ્થિતિકી તંત્રમાં, જ્યારે કેટલાક સજીવો વચ્ચે પરજીવી-યજમાન સંબંધ હોય છે, ત્યારે ઉર્જા સ્થાનાંતરણના સંદર્ભમાં ૧૦% નિયમ કયા પરિબળને લીધે અપવાદરૂપ બને છે?", "opts": ["પરજીવી દ્વારા યજમાનના શરીરમાંથી સીધી રીતે પોષક તત્ત્વોનું શોષણ થવાથી ઉર્જા નુકસાન ઓછું થાય છે", "યજમાન દ્વારા પરજીવીને ઉર્જા સ્થાનાંતરણ માટે ૯૦% ઉર્જા વપરાય છે", "પરજીવી અને યજમાન વચ્ચે ઉર્જા સ્થાનાંતરણ માટે ૫૦% કુશળતા હોય છે", "પરજીવી દ્વારા ઉત્પન્ન થતી ઉર્જા યજમાનમાં પાછી વહેંચાય છે"], "ans": 0, "exp": "પરજીવી-યજમાન સંબંધમાં, પરજીવી સીધી રીતે યજમાનના શરીરમાંથી પોષક તત્ત્વો શોષે છે, જેથી ઉર્જા સ્થાનાંતરણ દરમિયાન થતું નુકસાન (જેવા કે શ્વસન, ઉત્સર્જન વગેરે) ઓછું થાય છે. આને લીધે ૧૦% નિયમ અહીં લાગુ પડતો નથી, કારણ કે ઉર્જા સ્થાનાંતરણની કુશળતા વધુ હોય છે. બાકીના વિકલ્પો અયોગ્ય છે: B) ૯૦% ઉર્જા વપરાતી નથી, C) ૫૦% કુશળતા ૧૦% નિયમનો ભાગ નથી, D) ઉર્જા પાછી વહેંચાય તે ૧૦% નિયમનું લક્ષણ નથી.", "ref": "Std 12 - Chapter 14: પારિસ્થિતિકી અને પર્યાવરણ", "ch": ""}, {"q": "પારિસ્થિતિકી તંત્રમાં, જ્યારે પરજીવી અને યજમાન વચ્ચે ઉર્જા સ્થાનાંતરણ થાય છે, ત્યારે ૧૦% નિયમની સરખામણીમાં શું અવલોકન થાય છે?", "opts": ["પરજીવી દ્વારા ગ્રહણ કરાયેલી ઉર્જાનો ૧૦% ભાગ યજમાનમાં સ્થાનાંતરિત થાય છે", "યજમાન દ્વારા ગ્રહણ કરાય     let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
