<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ક્લેઈસેન સંક્ષેપણ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ક્લેઈસેન સંક્ષેપણ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ક્લેઈસેન સંક્ષેપણ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ક્લેઇસેન સંક્ષેપણ દરમિયાન બનતી મુખ્ય ઉત્પાદન કયું છે, જેનો ઉપયોગ પાછળથી ગ્લુકોઝ સંશ્લેષણમાં થાય છે?", "opts": ["3-ફોસ્ફોગ્લિસરિક એસિડ", "રાઇબ્યુલોઝ-1,5-બાયસ્ફોસ્ફેટ", "ગ્લિસરાલ્ડિહાઇડ-3-ફોસ્ફેટ", "ફ્રક્ટોઝ-6-ફોસ્ફેટ"], "ans": 0, "exp": "ક્લેઇસેન સંક્ષેપણમાં CO₂ ની ફિક્સેશન પછી પ્રથમ સ્થિર ઉત્પાદન 3-ફોસ્ફોગ્લિસરિક એસિડ (3-PGA) છે, જે પાછળથી ગ્લિસરાલ્ડિહાઇડ-3-ફોસ્ફેટ (G3P) માં રૂપાંતરિત થાય છે અને ગ્લુકોઝ સંશ્લેષણમાં વપરાય છે. રાઇબ્યુલોઝ-1,5-બાયસ્ફોસ્ફેટ (RuBP) CO₂ નું સ્વીકારક છે, પરંતુ સીધું ઉત્પાદન નથી. ગ્લિસરાલ્ડિહાઇડ-3-ફોસ્ફેટ અને ફ્રક્ટોઝ-6-ફોસ્ફેટ પાછળના તબક્કામાં બનતા ઉત્પાદનો છે, પરંતુ મુખ્ય પ્રાથમિક ઉત્પાદન 3-PGA છે.", "ref": "Std 12 - અધ્યાય 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "ક્લેઇસેન સંક્ષેપણમાં રૂબિસ્કો ઉત્સેચકની ભૂમિકા શું છે?", "opts": ["તે RuBP ને CO₂ સાથે જોડીને 3-PGA બનાવે છે", "તે O₂ સાથે પ્રતિક્રિયા કરી ફોટોશ્વસનને પ્રોત્સાહન આપે છે", "તે ATP નું સંશ્લેષણ કરે છે", "તે NADP+ ને NADPH માં રૂપાંતરિત કરે છે"], "ans": 0, "exp": "રૂબિસ્કો (RuBisCO) ઉત્સેચક ક્લેઇસેન સંક્ષેપણમાં CO₂ ની ફિક્સેશન માટે જવાબદાર છે, જ્યાં તે RuBP (રાઇબ્યુલોઝ-1,5-બાયસ્ફોસ્ફેટ) સાથે CO₂ ને જોડીને 3-ફોસ્ફોગ્લિસરિક એસિડ (3-PGA) બનાવે છે. O₂ સાથેની પ્રતિક્રિયા (ફોટોશ્વસન) રૂબિસ્કોની દ્વિતીય ભૂમિકા છે, પરંતુ મુખ્ય ક્રિયા CO₂ ફિક્સેશન છે. ATP અને NADPH નું સંશ્લેષણ પ્રકાશી તબક્કામાં થાય છે, રૂબિસ્કો દ્વારા નહીં.", "ref": "Std 12 - અધ્યાય 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "ક્લેઇસેન સંક્ષેપણ દરમિયાન, નીચેનામાંથી કયું પગલું ATP નો ઉપયોગ કરતું નથી?", "opts": ["3-PGA નું 1,3-બાયસ્ફોસ્ફોગ્લિસરિક એસિડમાં રૂપાંતર", "RuBP નું પુનર્જનન", "G3P નું ગ્લુકોઝમાં રૂપાંતર", "CO₂ ની RuBP સાથે ફિક્સેશન"], "ans": 3, "exp": "CO₂ ની RuBP સાથે ફિક્સેશન રૂબિસ્કો ઉત્સેચક દ્વારા થાય છે અને તે ATP નો ઉપયોગ કરતું નથી. 3-PGA નું 1,3-બાયસ્ફોસ્ફોગ્લિસરિક એસિડમાં રૂપાંતર અને RuBP નું પુનર્જનન એ ATP-આધારિત પગલાં છે. G3P નું ગ્લુકોઝમાં રૂપાંતર પણ ATP નો ઉપયોગ કરે છે, પરંતુ તે ક્લેઇસેન સંક્ષેપણનો ભાગ નથી, પરંતુ કેલ્વિન ચક્ર પછીનો તબક્કો છે.", "ref": "Std 12 - અધ્યાય 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "ક્લેઇસેન સંક્ષેપણમાં, નીચેનામાંથી કયું કથન ખોટું છે?", "opts": ["રૂબિસ્કો એ પૃથ્વી પર સૌથી વધુ પ્રમાણમાં હાજર ઉત્સેચક છે", "ક્લેઇસેન સંક્ષેપણમાં CO₂ ની ફિક્સેશન માટે RuBP ની જરૂર પડે છે", "ક્લેઇસેન સંક્ષેપણ દરમિયાન NADP+ નું NADPH માં રૂપાંતર થાય છે", "ક્લેઇસેન સંક્ષેપણ પ્રકાશી તબક્કામાં થાય છે"], "ans": 3, "exp": "ક્લેઇસેન સંક્ષેપણ (કેલ્વિન ચક્ર) અંધકારી તબક્કામાં થાય છે, પ્રકાશી તબક્કામાં નહીં. રૂબિસ્કો એ પૃથ્વી પર સૌથી વધુ પ્રમાણમાં હાજર ઉત્સેચક છે અને CO₂ ની ફિક્સેશન માટે RuBP ની જરૂર પડે છે. NADP+ નું NADPH માં રૂપાંતર પ્રકાશી તબક્કામાં થાય છે, પરંતુ ક્લેઇસેન સંક્ષેપણમાં તેનો ઉપયોગ થાય છે.", "ref": "Std 12 - અધ્યાય 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "ક્લેઇસેન સંક્ષેપણમાં, નીચેનામાંથી કયું પદાર્થ RuBP નું પુનર્જનન કરવા માટે જરૂરી છે?", "opts": ["ATP અને NADP+", "ATP અને NADPH", "ADP અને NADP+", "ADP અને NADPH"], "ans": 1, "exp": "RuBP નું પુનર્જનન કરવા માટે ATP અને NADPH ની જરૂર પડે છે. ATP RuBP ને ફોસ્ફોરાઇલેટ કરે છે, જ્યારે NADPH રિડક્શન માટે ઇલેક્ટ્રોન દાન કરે છે. ADP અને NADP+ એ ઉત્પાદનો છે, પુનર્જનન માટે જરૂરી નથી.", "ref": "Std 12 - અધ્યાય 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "ક્લેઇસેન સંક્ષેપણ દરમિયાન, 3-ફોસ્ફોગ્લિસરિક એસિડ (3-PGA) નું ફોસ્ફોગ્લિસરાલ્ડિહાઇડ (G3P) માં રૂપાંતરણ કરવા માટે નીચેનામાંથી કયા પદાર્થની જરૂર પડે છે?", "opts": ["NADPH અને ATP", "NADP+ અને ADP", "FADH2 અને GTP", "H2O અને O2"], "ans": 0, "exp": "3-PGA નું G3P માં રૂપાંતરણ કરવા માટે NADPH અને ATP ની જરૂર પડે છે. NADPH રિડક્શન માટે ઇલેક્ટ્રોન દાતા તરીકે કામ કરે છે, જ્યારે ATP ફોસ્ફેટ જૂથ જોડવા માટે ઉર્જા પૂરી પાડે છે. NADP+ અને ADP ઉત્પાદન તરીકે બનતા હોવાથી ખોટા છે. FADH2 અને GTP ક્લેઇસેન સંક્ષેપણમાં ભાગ લેતા નથી. H2O અને O2 પ્રકાશસંશ્લેષણના પ્રકાશી પગલામાં વપરાતા હોવાથી અહીં લાગુ પડતા નથી.", "ref": "Std 12 - પ્રકરણ 13: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "ક્લેઇસેન સંક્ષેપણમાં, RuBP (રિબ્યુલોઝ-1,5-બાઇસ્ફોસ્ફેટ) નું કાર્બોક્સિલેશન કરવા માટે CO2 ની સાથે જોડાણ કરે છે, પરંતુ કેટલીક વખત O2 ની સાથે જોડાણ કરે છે. આ ઘટનાને શું કહેવાય છે?", "opts": ["ફોટોરેસ્પિરેશન", "કેલ્વિન ચક્ર", "C4 પથ", "કેમ પથ"], "ans": 0, "exp": "RuBP નું O2 ની સાથે જોડાણ થવાને ફોટોરેસ્પિરેશન કહેવાય છે, જેમાં RuBP ઓક્સિજનેઝ (Rubisco) ઉત્સેચક દ્વારા O2 ની સાથે પ્રક્રિયા કરે છે. કેલ્વિન ચક્ર ક્લેઇસેન સંક્ષેપણનો મુખ્ય પથ છે, પરંતુ તે CO2 નો ઉપયોગ કરે છે. C4 પથ અને કેમ પથ અલગ પ્રકારના પ્રકાશસંશ્લેષણ પથ છે, જેમાં RuBP નું O2 ની સાથે જોડાણ થતું નથી.", "ref": "Std 12 - પ્રકરણ 13: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "ક્લેઇસેન સંક્ષેપણ દરમિયાન, નીચેનામાંથી કયું પદાર્થ સૌપ્રથમ સ્થિર CO2 નું સ્વરૂપ છે?", "opts": ["3-ફોસ્ફોગ્લિસરિક એસિડ (3-PGA)", "રિબ્યુલોઝ-1,5-બાઇસ્ફોસ્ફેટ (RuBP)", "ફોસ્ફોગ્લિસરાલ્ડિહાઇડ (G3P)", "ગ્લુકોઝ"], "ans": 0, "exp": "ક્લેઇસેન સંક્ષેપણ દરમિયાન, CO2 સૌપ્રથમ RuBP ની સાથે જોડાઈને 3-ફોસ્ફોગ્લિસરિક એસિડ (3-PGA) બનાવે છે, જે સ્થિર CO2 નું સ્વરૂપ છે. RuBP CO2 નું સ્વરૂપ નથી, પરંતુ તે CO2 ની સાથે પ્રક્રિયા કરે છે. G3P અને ગ્લુકોઝ પાછળથી બનતા ઉત્પાદનો છે.", "ref": "Std 12 - પ્રકરણ 13: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "ક્લેઇસેન સંક્ષેપણમાં, નીચેનામાંથી કયું કથન સત્ય છે જ્યારે RuBP નું પુનર્જનન થાય છે?", "opts": ["RuBP નું પુનર્જનન ATP અને NADPH નો ઉપયોગ કરે છે", "RuBP નું પુનર્જનન ફક્ત ATP નો ઉપયોગ કરે છે", "RuBP નું પુનર્જનન ફક્ત NADPH નો ઉપયોગ કરે છે", "RuBP નું પુનર્જનન CO2 નો ઉપયોગ કરે છે"], "ans": 0, "exp": "RuBP નું પુનર્જનન કરવા માટે ATP અને NADPH બંનેની જરૂર પડે છે. ATP RuBP ને ફોસ્ફોરાઇલેટ કરવા માટે ઉર્જા પૂરી પાડે છે, જ્યારે NADPH રિડક્શન માટે ઇલેક્ટ્રોન દાતા તરીકે કામ કરે છે. ફક્ત ATP અથવા ફક્ત NADPH પૂરતા નથી. CO2 RuBP નું પુનર્જનનમાં ભાગ લેતું નથી.", "ref": "Std 12 - પ્રકરણ 13: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "ક્લેઇસેન સંક્ષેપણ દરમિયાન, નીચેનામાંથી કયું પગલું પ્રકાશી પગલા (લાઇટ રિએક્શન) પર આધાર રાખે છે?", "opts": ["RuBP નું કાર્બોક્સિલેશન", "3-PGA નું G3P માં રૂપાંતરણ", "G3P નું RuBP માં રૂપાંતરણ", "RuBP નું પુનર્જનન"], "ans": 1, "exp": "3-PGA નું G3P માં રૂપાંતરણ પ્રકાશી પગલા પર આધાર રાખે છે, કારણ કે તેને NADPH અને ATP ની જરૂર પડે છે, જે પ્રકાશી પગલા દરમિયાન બનતા હોવાથી. RuBP નું કાર્બોક્સિલેશન પ્રકાશી પગલા પર આધાર રાખતું નથી. G3P નું RuBP માં રૂપાંતરણ અને RuBP નું પુનર્જનન પણ પ્રકાશી પગલા પર આધાર રાખતા નથી, પરંતુ તે ક્લેઇસેન સંક્ષેપણના અંતર્ગત પગલાં છે.", "ref": "Std 12 - પ્રકરણ 13: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "ક્લેઇસેન સંક્ષેપણ દરમિયાન, જ્યારે O₂ ની સાંદ્રતા ખૂબ જ વધી જાય છે, ત્યારે RuBP નું કયું રૂપાંતરણ થાય છે, જે પ્રકાશસંશ્લેષણની કાર્યક્ષમતાને ઘટાડે છે?", "opts": ["RuBP નું કાર્બોક્સિલેશન થાય છે અને 3-PGA બને છે", "RuBP નું ઓક્સિજનેશન થાય છે અને ફોટોરેસ્પિરેશન શરૂ થાય છે", "RuBP નું હાઇડ્રોલિસિસ થાય છે અને ગ્લુકોઝ બને છે", "RuBP નું ડિકાર્બોક્સિલેશન થાય છે અને પાયરૂવિક એસિડ બને છે"], "ans": 1, "exp": "ફોટોરેસ્પિરેશન દરમિયાન, RuBP ઓક્સિજનેશન પામે છે, જે RuBP ઓક્સિજનેઝ (Rubisco ની ઓક્સિજનેઝ ક્રિયા) દ્વારા થાય છે, પરિણામે ફોસ્ફોગ્લિકોલિક એસિડ બને છે. આ પ્રક્રિયા પ્રકાશસંશ્લેષણની કાર્યક્ષમતાને ઘટાડે છે. A) ખોટું છે કારણ કે કાર્બોક્સિલેશન CO₂ ની હાજરીમાં થાય છે, O₂ ની નહીં. C) અને D) ખોટાં છે કારણ કે RuBP નું હાઇડ્રોલિસિસ અથવા ડિકાર્બોક્સિલેશન ક્લેઇસેન સંક્ષેપણમાં બનતું નથી.", "ref": "Std 12 - અધ્યાય 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "ક્લેઇસેન સંક્ષેપણમાં, નીચેનામાંથી કયું કથન RuBP કાર્બોક્સિલેઝ/ઓક્સિજનેઝ (Rubisco) ઉત્સેચકની દ્વિઅર્થી પ્રકૃતિને સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["તે ફક્ત કાર્બોક્સિલેશન જ કરે છે અને O₂ સાથે કોઈ પ્રક્રિયા કરતું નથી", "તે CO₂ અને O₂ બંને સાથે પ્રક્રિયા કરે છે, પરંતુ CO₂ સાથે તેની સક્રિયતા વધુ હોય છે", "તે ફક્ત O₂ સાથે જ પ્રક્રિયા કરે છે અને CO₂ સાથે કોઈ પ્રક્રિયા કરતું નથી", "તે CO₂ અને O₂ બંને સાથે સરખી સક્રિયતા ધરાવે છે"], "ans": 1, "exp": "Rubisco ઉત્સેચક CO₂ અને O₂ બંને સાથે પ્રક્રિયા કરે છે, પરંતુ તે CO₂ સાથે વધુ સક્રિય હોય છે (કાર્બોક્સિલેશન). જ્યારે O₂ ની સાંદ્રતા વધી જાય છે, ત્યારે ઓક્સિજનેશન થાય છે, જે ફોટોરેસ્પિરેશન તરફ દોરી જાય છે. A) અને C) ખોટાં છે કારણ કે Rubisco બંને ગેસ સાથે પ્રક્રિયા કરે છે. D) ખોટું છે કારણ કે તેની સક્રિયતા CO₂ પ્રત્યે વધુ હોય છે.", "ref": "Std 12 - અધ્યાય 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "ક્લેઇસેન સંક્ષેપણ દરમિયાન, જ્યારે 3-PGA નું G3P માં રૂપાંતરણ થાય છે, ત્યારે નીચેનામાંથી કયા પદાર્થોનો ઉપયોગ થતો નથી?", "opts": ["ATP અને NADPH", "NADP+ અને Pi", "ATP અને NADP+", "NADPH અને Pi"], "ans": 2, "exp": "3-PGA નું G3P માં રૂપાંતરણ માટે ATP અને NADPH નો ઉપયોગ થાય છે. NADP+ અને Pi આ પ્રક્રિયાના ઉપઉત્પાદનો છે, જ્યારે ATP અને NADP+ (C) અથવા NADPH અને Pi (D) અંશતઃ સાચાં છે, પરંતુ ATP અને NADP+ (C) એકસાથે ઉપયોગમાં લેવાતા નથી. A) સાચું છે પરંતુ પ્રશ્નમાં પૂછવામાં આવ્યું છે કે કયા પદાર્થોનો ઉપયોગ થતો નથી, તેથી C) સાચો જવાબ છે.", "ref": "Std 12 - અધ્યાય 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "ક્લેઇસેન સંક્ષેપણમાં, RuBP નું પુનર્જનન કરવા માટે નીચેનામાંથી કયું પગલું ATP નો ઉપયોગ કરે છે?", "opts": ["3-PGA નું 1,3-બાઇસ્ફોસ્ફોગ્લિસરિક એસિડ (1,3-BPG) માં રૂપાંતરણ", "G3P નું RuBP માં રૂપાંતરણ", "1,3-BPG નું G3P માં રૂપાંતરણ", "RuBP નું CO₂ સાથે કાર્બોક્સિલેશન"], "ans": 1, "exp": "RuBP નું પુનર્જનન કરવા માટે G3P નું RuBP માં રૂપાંતરણ થાય છે, જેમાં ATP નો ઉપયોગ થાય છે. A) અને C) ખોટાં છે કારણ કે તેમાં ATP નો ઉપયોગ થતો નથી (Aમાં ATP નો ઉપયોગ થાય છે, પરંતુ તે RuBP પુનર્જનન નહીં). D) ખોટું છે કારણ કે RuBP નું કાર્બોક્સિલેશન CO₂ સાથે થાય છે, પરંતુ તે પુનર્જનન નહીં.", "ref": "Std 12 - અધ્યાય 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "ક્લેઇસેન સંક્ષેપણ દરમિયાન, જો કોઈ પેશીમાં CO₂ ની સાંદ્રતા ખૂબ જ ઓછી હોય અને O₂ ની સાંદ્રતા ખૂબ જ વધુ હોય, તો નીચેનામાંથી કયું પરિણામ થશે?", "opts": ["પ્રકાશસંશ્લેષણની ગતિ વધશે", "ફોટોરેસ્પિરેશનની ગતિ વધશે અને પ્રકાશસંશ્લેષણની ગતિ ઘટશે", "પ્રકાશસંશ્લેષણ અને ફોટોરેસ્પિરેશન બંનેની ગતિ સમાન રહેશે", "પ્રકાશસંશ્લેષણ બંધ થઈ જશે અને ફોટોરેસ્પિરેશન પણ બંધ થઈ જશે"], "ans": 1, "exp": "જ્યારે CO₂ ની સાંદ્રતા ઓછી હોય અને O₂ ની સાંદ્રતા વધુ હોય, ત્યારે Rubisco ઉત્સેચક O₂ સાથે પ્રક્રિયા કરે છે, જે ફોટોરેસ્પિરેશન તરફ દોરી જાય છે. આથી પ્રકાશસંશ્લેષણની ગતિ ઘટે છે અને ફોટોરેસ્પિરેશનની ગતિ વધે છે. A) ખોટું છે કારણ કે પ્રકાશસંશ્લેષણની ગતિ ઘટશે. C) ખોટું છે કારણ કે બંનેની ગતિ સમાન રહેતી નથી. D) ખોટું છે કારણ કે પ્રકાશસંશ્લેષણ અને ફોટોરેસ્પિરેશન બંને ચાલુ રહેશે, પરંતુ પ્રકાશસંશ્લેષણની ગતિ ઘટશે.", "ref": "Std 12 - અધ્યાય 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "ક્લેઇસેન સંક્ષેપણ દરમિયાન, જ્યારે O2 ની સાંદ્રતા CO2 કરતાં ખૂબ જ વધી જાય છે, ત્યારે રૂબિસ્કો ઉત્સેચક દ્વારા કયો પ્રક્રિયા પથ અગ્રતા મેળવે છે અને તેનું પરિણામ કયું પદાર્થ બને છે?", "opts": ["ફોટોરેસ્પિરેશન, ફોસ્ફોગ્લિકોલેટ", "કાર્બોક્સિલેશન, 3-ફોસ્ફોગ્લિસરિક એસિડ", "ઓક્સિડેશન, રિબ્યુલોઝ-5-ફોસ્ફેટ", "હાઇડ્રોલિસિસ, ગ્લિસરાલ્ડિહાઇડ-3-ફોસ્ફેટ"], "ans": 0, "exp": "રૂબિસ્કો ઉત્સેચકની દ્વિઅર્થી પ્રકૃતિને લીધે, O2 ની ઉચ્ચ સાંદ્રતામાં ફોટોરેસ્પિરેશન પ્રક્રિયા અગ્રતા મેળવે છે, જેમાં રૂબિસ્કો O2 સાથે પ્રક્રિયા કરી ફોસ્ફોગ્લિકોલેટ બનાવે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) કાર્બોક્સિલેશન CO2 ની ઉચ્ચ સાંદ્રતામાં થાય છે, C) ઓક્સિડેશન રૂબિસ્કોની પ્રાથમિક પ્રક્રિયા નથી, D) હાઇડ્રોલિસિસ ક્લેઇસેન સંક્ષેપણમાં થતું નથી.", "ref": "Std 12 - અધ્યાય 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "ક્લેઇસેન સંક્ષેપણ દરમિયાન, નીચેનામાંથી કયું કથન સત્ય નથી જ્યારે CO2 ની સાંદ્રતા ખૂબ જ ઓછી હોય છે?", "opts": ["રૂબિસ્કો ઉત્સેચકની કાર્બોક્સિલેઝ ક્રિયા ઘટે છે", "ફોટોરેસ્પિરેશનની પ્રક્રિયા વધે છે", "RuBP નું પુનર્જનન થવાનું બંધ થાય છે", "3-PGA ની ઉત્પત્તિ ઘટે છે"], "ans": 2, "exp": "CO2 ની ઓછી સાંદ્રતામાં રૂબિસ્કોની કાર્બોક્સિલેઝ ક્રિયા ઘટે છે અને ફોટોરેસ્પિરેશન વધે છે, પરંતુ RuBP નું પુનર્જનન થવાનું બંધ થતું નથી. તે ચાલુ રહે છે, પરંતુ ધીમું પડે છે. બાકીના વિકલ્પો સત્ય છે: A) કાર્બોક્સિલેઝ ક્રિયા ઘટે છે, B) ફોટોરેસ્પિરેશન વધે છે, D) 3-PGA ની ઉત્પત્તિ ઘટે છે.", "ref": "Std 12 - અધ્યાય 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "ક્લેઇસેન સંક્ષેપણમાં, નીચેનામાંથી કયું પગલું પ્રકાશી પગલા (લાઇટ રિએક્શન) પર આધારિત નથી?", "opts": ["RuBP નું કાર્બોક્સિલેશન", "3-PGA નું 1,3-BPG માં રૂપાંતરણ", "1,3-BPG નું G3P માં રૂપાંતરણ", "G3P નું RuBP માં રૂપાંતરણ"], "ans": 0, "exp": "RuBP નું કાર્બોક્સિલેશન રૂબિસ્કો ઉત્સેચક દ્વારા થાય છે, જે પ્રકાશી પગલા પર આધારિત નથી. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) 3-PGA નું 1,3-BPG માં રૂપાંતરણ ATP નો ઉપયોગ કરે છે, જે પ્રકાશી પગલા દ્વારા ઉત્પન્ન થાય છે, C) 1,3-BPG નું G3P માં રૂપાંતરણ NADPH નો ઉપયોગ કરે છે, જે પ્રકાશી પગલા દ્વારા ઉત્પન્ન થાય છે, D) G3P નું RuBP માં રૂપાંતરણ ATP નો ઉપયોગ કરે છે, જે પ્રકાશી પગલા દ્વારા ઉત્પન્ન થાય છે.", "ref": "Std 12 - અધ્યાય 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "ક્લેઇસેન સંક્ષેપણ દરમિયાન, જ્યારે 6 અણુ CO2 સ્થિર થાય છે, ત્યારે નીચેનામાંથી કેટલા અણુ G3P બને છે અને તે પૈકી કેટલા અણુ ગ્લુકોઝ બનાવવા માટે વાપરવામાં આવે છે?", "opts": ["6 અણુ G3P, 2 અણુ ગ્લુકોઝ બનાવવા માટે વાપરવામાં આવે છે", "12 અણુ G3P, 6 અણુ ગ્લુકોઝ બનાવવા માટે વાપરવામાં આવે છે", "6 અણુ G3P, 1 અણુ ગ્લુકોઝ બનાવવા માટે વાપરવામાં આવે છે", "12 અણુ G3P, 2 અણુ ગ્લુકોઝ બનાવવા માટે વાપરવામાં આવે છે"], "ans": 3, "exp": "6 અણુ CO2 સ્થિર થતાં 12 અણુ G3P બને છે, જેમાંથી 2 અણુ G3P ગ્લુકોઝ બનાવવા માટે વાપરવામાં આવે છે અને બાકીના 10 અણુ RuBP નું પુનર્જનન કરવા માટે વાપરવામાં આવે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: A) 6 અણુ G3P પૂરતા નથી, B) 6 અણુ ગ્લુકોઝ બનાવવા માટે 12 અણુ G3P પૂરતા નથી, C) 1 અણુ ગ્લુકોઝ બનાવવા માટે 2 અણુ G3P જરૂરી છે.", "ref": "Std 12 - અધ્યાય 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "ક્લેઇસેન સંક્ષેપણ દરમિયાન નીચેનામાંથી કયું પરિબળ RuBP કાર્બોક્સિલેઝ/ઓક્સિજનેઝ (Rubisco) ઉત્સેચકની ઓક્સિજનેઝ પ્રવૃત્તિને પ્રોત્સાહન આપે છે, પરંતુ તેની કાર્બોક્સિલેઝ પ્રવૃત્તિને અવરોધે છે અને પરિણામે પ્રકાશશ્વસન (Photorespiration) ની શરૂઆત કરે છે?", "opts": ["કોષમાં CO₂ ની સાંદ્રતા વધારે હોવી અને O₂ ની સાંદ્રતા ઓછી હોવી", "કોષમાં O₂ ની સાંદ્રતા વધારે હોવી અને CO₂ ની સાંદ્રતા ઓછી હોવી", "કોષમાં Mg²⁺ આયનની સાંદ્રતા વધારે હોવી અને pH મૂલ્ય 8.0 કરતાં વધારે હોવું", "કોષમાં NADPH અને ATP ની સાંદ્રતા વધારે હોવી અને પ્રકાશની તીવ્રતા વધારે હોવી"], "ans": 1, "exp": "સાચો જવાબ વિકલ્પ B છે. RuBP કાર્બોક્સિલેઝ/ઓક્સિજનેઝ (Rubisco) ઉત્સેચકની ઓક્સિજનેઝ પ્રવૃત્તિ ત્યારે વધે છે જ્યારે કોષમાં O₂ ની સાંદ્રતા વધારે હોય અને CO₂ ની સાંદ્રતા ઓછી હોય. આ પરિસ્થિતિમાં, Rubisco ઉત્સેચક O₂ ને RuBP સાથે જોડે છે, જેના પરિણામે ફોટોશ્વસન (Photorespiration) શરૂ થાય છે અને કાર્બન ફિક્સેશનની કાર્યક્ષમતા ઘટે છે.\n\nવિકલ્પ A ખોટો છે કારણ કે CO₂ ની વધારે સાંદ્રતા Rubisco ની કાર્બોક્સિલેઝ પ્રવૃત્તિને પ્રોત્સાહન આપે છે અને ઓક્સિજનેઝ પ્રવૃત્તિને અવરોધે છે.\n\nવિકલ્પ C ખોટો છે કારણ કે Mg²⁺ આયન અને pH મૂલ્ય 8.0 કરતાં વધારે હોવું Rubisco ની કાર્બોક્સિલેઝ પ્રવૃત્તિ માટે અનુકૂળ પરિસ્થિતિ છે, નહીં કે ઓક્સિજનેઝ પ્રવૃત્તિ માટે.\n\nવિકલ્પ D ખોટો છે કારણ કે NADPH અને ATP ની વધારે સાંદ્રતા તેમજ પ્રકાશની તીવ્રતા પ્રકાશસંશ્લેષણની પ્રક્રિયાને પ્રોત્સાહન આપે છે, પરંતુ તે સીધી રીતે Rubisco ની ઓક્સિજનેઝ પ્રવૃત્તિને પ્રભાવિત કરતા નથી.", "ref": "Std 11 - પ્રકરણ 13: પ્રકાશસંશ્લેષણ અને શ્વસન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
