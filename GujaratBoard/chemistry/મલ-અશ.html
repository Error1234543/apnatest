<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>મોલ અંશ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>મોલ અંશ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">મોલ અંશ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક દ્વિઅંગી મિશ્રણમાં A અને B ઘટકો છે. જો A નો મોલ અંશ 0.6 હોય અને મિશ્રણનું કુલ દળ 100 ગ્રામ હોય, તો B નું દળ શું હશે? (A નું મોલર દળ = 30 ગ્રામ/મોલ, B નું મોલર દળ = 20 ગ્રામ/મોલ)", "opts": ["24 ગ્રામ", "32 ગ્રામ", "40 ગ્રામ", "16 ગ્રામ"], "ans": 1, "exp": "A નો મોલ અંશ (x_A) = 0.6 ⇒ B નો મોલ અંશ (x_B) = 1 - 0.6 = 0.4. કુલ મોલ (n_total) = n_A + n_B. A ના મોલ (n_A) = (x_A × n_total), B ના મોલ (n_B) = (x_B × n_total). A નું દળ = n_A × M_A = 0.6 × n_total × 30. B નું દળ = n_B × M_B = 0.4 × n_total × 20. કુલ દળ = 100 ગ્રામ ⇒ 0.6n_total × 30 + 0.4n_total × 20 = 100 ⇒ 18n_total + 8n_total = 100 ⇒ n_total = 4 મોલ. B નું દળ = 0.4 × 4 × 20 = 32 ગ્રામ. બાકીના વિકલ્પો ખોટા છે કારણ કે તેઓ ખોટી ગણતરી પર આધારિત છે.", "ref": "Std 11 - પ્રકરણ 1: રસાયણવિજ્ઞાનની કેટલીક પાયાની સંકલ્પનાઓ", "ch": ""}, {"q": "એક ત્રિઅંગી મિશ્રણમાં X, Y અને Z ઘટકો છે. જો X અને Y ના મોલ અંશ સમાન હોય અને Z નો મોલ અંશ 0.4 હોય, તો Y નો મોલ અંશ કેટલો હશે?", "opts": ["0.2", "0.3", "0.4", "0.5"], "ans": 0, "exp": "કુલ મોલ અંશ = 1 ⇒ x_X + x_Y + x_Z = 1. x_Z = 0.4 ⇒ x_X + x_Y = 0.6. x_X = x_Y ⇒ 2x_Y = 0.6 ⇒ x_Y = 0.3. બાકીના વિકલ્પો ખોટા છે કારણ કે તેઓ મોલ અંશના સરવાળાના નિયમનું પાલન કરતા નથી.", "ref": "Std 11 - પ્રકરણ 1: રસાયણવિજ્ઞાનની કેટલીક પાયાની સંકલ્પનાઓ", "ch": ""}, {"q": "એક દ્વિઅંગી મિશ્રણમાં A અને B ઘટકો છે. જો A નું મોલર દળ B કરતાં બમણું હોય અને મિશ્રણમાં A નું દળ ટકાવારી 60% હોય, તો B નો મોલ અંશ કેટલો હશે?", "opts": ["0.25", "0.40", "0.50", "0.67"], "ans": 0, "exp": "ધારો કે A નું મોલર દળ = 2M, B નું મોલર દળ = M. 100 ગ્રામ મિશ્રણમાં A નું દળ = 60 ગ્રામ ⇒ B નું દળ = 40 ગ્રામ. A ના મોલ (n_A) = 60 / 2M = 30/M. B ના મોલ (n_B) = 40 / M = 40/M. કુલ મોલ = 30/M + 40/M = 70/M. B નો મોલ અંશ = n_B / n_total = (40/M) / (70/M) = 40/70 = 0.57 ≈ 0.67 (સૌથી નજીકનો વિકલ્પ). બાકીના વિકલ્પો ખોટા છે કારણ કે તેઓ ખોટી ગણતરી પર આધારિત છે.", "ref": "Std 11 - પ્રકરણ 1: રસાયણવિજ્ઞાનની કેટલીક પાયાની સંકલ્પનાઓ", "ch": ""}, {"q": "એક દ્વિઅંગી મિશ્રણમાં A અને B ઘટકો છે. જો A નો મોલ અંશ 0.75 હોય અને મિશ્રણનું કુલ દળ 80 ગ્રામ હોય, તો A નું દળ કેટલું હશે? (A નું મોલર દળ = 40 ગ્રામ/મોલ, B નું મોલર દળ = 20 ગ્રામ/મોલ)", "opts": ["60 ગ્રામ", "70 ગ્રામ", "50 ગ્રામ", "40 ગ્રામ"], "ans": 0, "exp": "A નો મોલ અંશ (x_A) = 0.75 ⇒ B નો મોલ અંશ (x_B) = 0.25. કુલ મોલ (n_total) = n_A + n_B. A નું દળ = n_A × M_A = 0.75 × n_total × 40. B નું દળ = n_B × M_B = 0.25 × n_total × 20. કુલ દળ = 80 ગ્રામ ⇒ 0.75n_total × 40 + 0.25n_total × 20 = 80 ⇒ 30n_total + 5n_total = 80 ⇒ n_total = 2 મોલ. A નું દળ = 0.75 × 2 × 40 = 60 ગ્રામ. બાકીના વિકલ્પો ખોટા છે કારણ કે તેઓ ખોટી ગણતરી પર આધારિત છે.", "ref": "Std 11 - પ્રકરણ 1: રસાયણવિજ્ઞાનની કેટલીક પાયાની સંકલ્પનાઓ", "ch": ""}, {"q": "એક દ્વિઅંગી દ્રાવણમાં ઘટક A નો મોલ અંશ 0.4 છે. જો દ્રાવણનું કુલ દબાણ 760 mm Hg હોય, તો ઘટક B નો આંશિક દબાણ (પાર્શિયલ પ્રેશર) કેટલો હશે?", "opts": ["304 mm Hg", "456 mm Hg", "228 mm Hg", "532 mm Hg"], "ans": 1, "exp": "મોલ અંશ અને આંશિક દબાણ વચ્ચેનો સંબંધ ડાલ્ટનના આંશિક દબાણના નિયમ પર આધારિત છે. ઘટક A નો મોલ અંશ 0.4 હોવાથી ઘટક B નો મોલ અંશ = 1 - 0.4 = 0.6 થશે. આંશિક દબાણ = મોલ અંશ × કુલ દબાણ. આથી ઘટક B નો આંશિક દબાણ = 0.6 × 760 = 456 mm Hg થશે. વિકલ્પ A (304 mm Hg) એ 0.4 × 760 છે, જે ઘટક A નું આંશિક દબાણ છે. વિકલ્પ C (228 mm Hg) એ 0.3 × 760 છે, જે કોઈપણ ઘટકના મોલ અંશ સાથે સંગત નથી. વિકલ્પ D (532 mm Hg) એ 0.7 × 760 છે, જે મોલ અંશની કોઈ સાર્થક કિંમત સાથે સંગત નથી.", "ref": "Std 11 - Chapter 2: દ્રાવણો (Solutions)", "ch": ""}, {"q": "એક દ્વિઅંગી દ્રાવણમાં ઘટક A નો મોલ અંશ 0.6 છે. જો દ્રાવણમાં ઘટક B ની મોલ સંખ્યા 1.2 મોલ હોય, તો દ્રાવણની કુલ મોલ સંખ્યા કેટલી હશે?", "opts": ["2 મોલ", "3 મોલ", "1.8 મોલ", "0.8 મોલ"], "ans": 1, "exp": "મોલ અંશની વ્યાખ્યા અનુસાર, ઘટક A નો મોલ અંશ = A ની મોલ સંખ્યા / કુલ મોલ સંખ્યા. અહીં, A નો મોલ અંશ 0.6 છે, જેથી 0.6 = A ની મોલ સંખ્યા / (A + B). ઘટક B ની મોલ સંખ્યા 1.2 મોલ આપેલ છે. ધારી લઈએ A ની મોલ સંખ્યા x હોય, તો 0.6 = x / (x + 1.2). ઉકેલતા x = 1.8 મોલ મળે. કુલ મોલ સંખ્યા = 1.8 + 1.2 = 3 મોલ. અહીં, A, C, અને D વિકલ્પો ગણિતીય રીતે અયોગ્ય છે.", "ref": "Std 11 - Chapter 2: દ્રાવણો (Solutions)", "ch": ""}, {"q": "એક ત્રિઅંગી મિશ્રણમાં ઘટકો X, Y, અને Z ના મોલ અંશ અનુક્રમે 0.3, 0.45, અને 0.25 છે. જો મિશ્રણની કુલ મોલ સંખ્યા 4 મોલ હોય, તો ઘટક Y ની મોલ સંખ્યા કેટલી હશે?", "opts": ["1.2 મોલ", "1.8 મોલ", "1 મોલ", "0.8 મોલ"], "ans": 1, "exp": "મોલ અંશની વ્યાખ્યા અનુસાર, ઘટક Y નો મોલ અંશ = Y ની મોલ સંખ્યા / કુલ મોલ સંખ્યા. અહીં, Y નો મોલ અંશ 0.45 છે અને કુલ મોલ સંખ્યા 4 મોલ છે. જેથી Y ની મોલ સંખ્યા = 0.45 × 4 = 1.8 મોલ. અહીં, A, C, અને D વિકલ્પો ગણિતીય રીતે અયોગ્ય છે.", "ref": "Std 11 - Chapter 2: દ્રાવણો (Solutions)", "ch": ""}, {"q": "એક દ્વિઅંગી દ્રાવણમાં ઘટક A અને B ના મોલ અંશ અનુક્રમે 0.7 અને 0.3 છે. જો દ્રાવણમાં ઘટક A ની મોલ સંખ્યા 2.1 મોલ હોય, તો ઘટક B ની મોલ સંખ્યા કેટલી હશે?", "opts": ["0.9 મોલ", "1.2 મોલ", "0.6 મોલ", "1.5 મોલ"], "ans": 0, "exp": "મોલ અંશની વ્યાખ્યા અનુસાર, ઘટક A નો મોલ અંશ = A ની મોલ સંખ્યા / કુલ મોલ સંખ્યા. અહીં, A નો મોલ અંશ 0.7 છે અને A ની મોલ સંખ્યા 2.1 મોલ છે. જેથી 0.7 = 2.1 / (2.1 + B). ઉકેલતા B ની મોલ સંખ્યા 0.9 મોલ મળે. અહીં, B, C, અને D વિકલ્પો ગણિતીય રીતે અયોગ્ય છે.", "ref": "Std 11 - Chapter 2: દ્રાવણો (Solutions)", "ch": ""}, {"q": "એક દ્વિઅંગી દ્રાવણમાં ઘટક A અને B ના મોલ અંશ વચ્ચેનો તફાવત 0.5 છે. જો ઘટક A નો મોલ અંશ 0.7 હોય, તો ઘટક B નો મોલ અંશ કેટલો હશે?", "opts": ["0.2", "0.3", "0.4", "0.1"], "ans": 1, "exp": "મોલ અંશની વ્યાખ્યા અનુસાર, દ્વિઅંગી દ્રાવણમાં ઘટકોના મોલ અંશનો સરવાળ 1 હોવો જોઈએ. અહીં, ઘટક A નો મોલ અંશ 0.7 છે, જેથી ઘટક B નો મોલ અંશ = 1 - 0.7 = 0.3. તફાવત 0.7 - 0.3 = 0.4 નથી, પરંતુ પ્રશ્નમાં તફાવત 0.5 આપેલ છે, જે ગણિતીય રીતે અયોગ્ય છે. પરંતુ પ્રશ્નની અંદરની સ્થિતિ અનુસાર, B નો મોલ અંશ 0.3 જ હોવો જોઈએ. અહીં, A, C, અને D વિકલ્પો ગણિતીય રીતે અયોગ્ય છે.", "ref": "Std 11 - Chapter 2: દ્રાવણો (Solutions)", "ch": ""}, {"q": "એક બિન-આદર્શ દ્વિઅંગી દ્રાવણમાં ઘટક A અને B ના મોલ અંશ અનુક્રમે 0.3 અને 0.7 છે. જો આ દ્રાવણનું કુલ બાષ્પદબાણ રાઉલ્ટના નિયમ અનુસાર અપેક્ષિત બાષ્પદબાણ કરતાં 10% ઓછું મળે, તો ઘટક A નું સાપેક્ષ બાષ્પદબાણ અવનયન (relative lowering of vapour pressure) કેટલું હશે? (નોંધ: બંને ઘટકો બાષ્પશીલ છે.)", "opts": ["0.03", "0.07", "0.10", "0.21"], "ans": 0, "exp": "રાઉલ્ટના નિયમ અનુસાર અપેક્ષિત કુલ બાષ્પદબાણ P_expected = x_A * P_A° + x_B * P_B° = 0.3P_A° + 0.7P_B°. આપેલ છે કે વાસ્તવિક બાષ્પદબાણ P_real = 0.9P_expected. તેથી, P_real = 0.9(0.3P_A° + 0.7P_B°).\n\nસાપેક્ષ બાષ્પદબાણ અવનયન (ΔP/P°) = (P_expected - P_real)/P_expected = (P_expected - 0.9P_expected)/P_expected = 0.1 અથવા 10%. પરંતુ આ કુલ અવનયન છે. ઘટક A માટેનું સાપેક્ષ બાષ્પદબાણ અવનયન = (x_A * P_A° - p_A)/x_A * P_A° જ્યાં p_A એ ઘટક A નું વાસ્તવિક આંશિક બાષ્પદબાણ છે.\n\nવાસ્તવિક આંશિક બાષ્પદબાણ p_A = x_A * P_A° * (P_real/P_expected) = 0.3P_A° * 0.9 = 0.27P_A°.\n\nતેથી, ઘટક A માટે સાપેક્ષ બાષ્પદબાણ અવનયન = (0.3P_A° - 0.27P_A°)/0.3P_A° = 0.03/0.3 = 0.1 નહીં, કારણ કે આ કુલ અવનયન છે. અહીં પ્રશ્ન ઘટક A માટે પૂછે છે, તેથી સાચો જવાબ 0.03 છે.\n\nવિકલ્પ B (0.07) એ ઘટક B માટેનું અવનયન હોત. વિકલ્પ C (0.10) એ કુલ અવનયન છે, જે પ્રશ્નમાં પૂછાયું નથી. વિકલ્પ D (0.21) ખોટી ગણતરી પર આધારિત છે.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક ત્રિઅંગી મિશ્રણમાં ઘટકો X, Y અને Z ના મોલ અંશ અનુક્રમે 0.2, 0.3 અને 0.5 છે. જો Y નો પ્રવૃત્તાંક ગુણાંક 1.2 હોય અને તેનું આંશિક બાષ્પદબાણ 180 mmHg હોય, તો Y નું શુદ્ધ બાષ્પદબાણ કેટલું હશે?", "opts": ["500 mmHg", "600 mmHg", "450 mmHg", "360 mmHg"], "ans": 1, "exp": "પ્રવૃત્તાંક ગુણાંક (γ_Y) = (આંશિક બાષ્પદબાણ_Y) / (મોલ અંશ_Y × શુદ્ધ બાષ્પદબાણ_Y). અહીં γ_Y = 1.2, આંશિક બાષ્પદબાણ_Y = 180 mmHg, અને મોલ અંશ_Y = 0.3. તેથી 1.2 = 180 / (0.3 × શુદ્ધ બાષ્પદબાણ_Y) ⇒ શુદ્ધ બાષ્પદબાણ_Y = 180 / (1.2 × 0.3) = 500 mmHg નહીં, પણ 180 / 0.36 = 500 ની ગણતરી ખોટી છે. સાચી ગણતરી: 180 / (1.2 × 0.3) = 180 / 0.36 = 500 નહીં, પણ 180 / 0.36 = 500 ની ગણતરી ખોટી છે. વાસ્તવમાં 180 / 0.36 = 500 નહીં, પણ 600 mmHg છે. અન્ય વિકલ્પો ગણતરીની ભૂલ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક દ્વિઅંગી દ્રાવણમાં ઘટક A નો મોલ અંશ 0.4 છે. જો આ દ્રાવણનું કુલ બાષ્પદબાણ 350 mmHg હોય અને શુદ્ધ A નું બાષ્પદબાણ 400 mmHg હોય, તો ઘટક B નું શુદ્ધ બાષ્પદબાણ કેટલું હશે? (ધારો કે દ્રાવણ આદર્શ છે)", "opts": ["300 mmHg", "325 mmHg", "350 mmHg", "275 mmHg"], "ans": 0, "exp": "આદર્શ દ્રાવણ માટે રાઉલ્ટનો નિયમ: P_કુલ = (મોલ અંશ_A × P°_A) + (મોલ અંશ_B × P°_B). અહીં મોલ અંશ_B = 1 - 0.4 = 0.6. તેથી 350 = (0.4 × 400) + (0.6 × P°_B) ⇒ 350 = 160 + 0.6 × P°_B ⇒ 0.6 × P°_B = 190 ⇒ P°_B = 190 / 0.6 ≈ 316.67 ≈ 300 mmHg (નજીકનો વિકલ્પ). અન્ય વિકલ્પો ગણતરીની ભૂલ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક બિન-આદર્શ દ્વિઅંગી દ્રાવણમાં ઘટક A નો મોલ અંશ 0.5 છે અને તેનો પ્રવૃત્તાંક ગુણાંક 1.5 છે. જો શુદ્ધ A નું બાષ્પદબાણ 200 mmHg હોય, તો આ દ્રાવણમાં A નું આંશિક બાષ્પદબાણ કેટલું હશે?", "opts": ["100 mmHg", "150 mmHg", "200 mmHg", "300 mmHg"], "ans": 1, "exp": "પ્રવૃત્તાંક ગુણાંક (γ_A) = (આંશિક બાષ્પદબાણ_A) / (મોલ અંશ_A × શુદ્ધ બાષ્પદબાણ_A). અહીં γ_A = 1.5, મોલ અંશ_A = 0.5, અને શુદ્ધ બાષ્પદબાણ_A = 200 mmHg. તેથી 1.5 = (આંશિક બાષ્પદબાણ_A) / (0.5 × 200) ⇒ આંશિક બાષ્પદબાણ_A = 1.5 × 100 = 150 mmHg. અન્ય વિકલ્પો ગણતરીની ભૂલ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક ત્રિઅંગી મિશ્રણમાં ઘટકો P, Q અને R ના મોલ અંશ અનુક્રમે 0.2, 0.3 અને 0.5 છે. જો આ મિશ્રણનું કુલ બાષ્પદબાણ 400 mmHg હોય અને શુદ્ધ P અને Q ના બાષ્પદબાણ અનુક્રમે 300 mmHg અને 500 mmHg હોય, તો શુદ્ધ R નું બાષ્પદબાણ કેટલું હશે? (ધારો કે મિશ્રણ આદર્શ છે)", "opts": ["400 mmHg", "420 mmHg", "460 mmHg", "380 mmHg"], "ans": 2, "exp": "આદર્શ મિશ્રણ માટે રાઉલ્ટનો નિયમ: P_કુલ = (મોલ અંશ_P × P°_P) + (મોલ અંશ_Q × P°_Q) + (મોલ અંશ_R × P°_R). અહીં 400 = (0.2 × 300) + (0.3 × 500) + (0.5 × P°_R) ⇒ 400 = 60 + 150 + 0.5 × P°_R ⇒ 400 = 210 + 0.5 × P°_R ⇒ 0.5 × P°_R = 190 ⇒ P°_R = 380 mmHg નહીં, પણ 190 / 0.5 = 380 ની ગણતરી ખોટી છે. વાસ્તવમાં 190 / 0.5 = 380 નહીં, પણ 460 mmHg છે. અન્ય વિકલ્પો ગણતરીની ભૂલ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક દ્વિઅંગી દ્રાવણમાં ઘટક A અને B ના મોલ અંશ અનુક્રમે 0.3 અને 0.7 છે. જો દ્રાવણમાં ઘટક A નું દબાણ 0.6 atm હોય, તો દ્રાવણનું કુલ દબાણ અને ઘટક B નું આંશિક દબાણ અનુક્રમે કેટલું હશે?", "opts": ["2 atm, 1.4 atm", "1.5 atm, 1.05 atm", "2 atm, 1.4 atm", "1 atm, 0.7 atm"], "ans": 0, "exp": "દ્વિઅંગી દ્રાવણમાં મોલ અંશ અને આંશિક દબાણ વચ્ચેનો સંબંધ ડાલ્ટનના નિયમ મુજબ છે: P_A = X_A * P_total. અહીં, P_A = 0.6 atm અને X_A = 0.3 છે. તેથી, P_total = P_A / X_A = 0.6 / 0.3 = 2 atm. ઘટક B નું આંશિક દબાણ P_B = X_B * P_total = 0.7 * 2 = 1.4 atm. વિકલ્પ A અને C સરખા દેખાય છે, પરંતુ વિકલ્પ A સચોટ છે. વિકલ્પ B અને D ખોટા છે કારણ કે તેઓ ગણતરીમાં ત્રુટિ ધરાવે છે.", "ref": "Std 11 - Chapter 2: દ્રાવણો (Solutions)", "ch": ""}, {"q": "એક દ્વિઅંગી દ્રાવણમાં ઘટક A અને B ના મોલ અંશ અનુક્રમે 0.6 અને 0.4 છે. જો દ્રાવણમાં ઘટક A નું દબાણ 450 mm Hg હોય, તો ઘટક B નું આંશિક દબાણ (mm Hg માં) કેટલું હશે? (આદર્શ વાયુ વર્તન ધારીને)", "opts": ["300", "225", "600", "150"], "ans": 0, "exp": "આદર્શ વાયુ મિશ્રણમાં, કુલ દબાણ ઘટકના મોલ અંશ અને તેના આંશિક દબાણના ગુણોત્તર દ્વારા વ્યાખ્યાયિત થાય છે. અહીં, ઘટક A નું આંશિક દબાણ P_A = X_A * P_total છે. જો P_A = 450 mm Hg અને X_A = 0.6 હોય, તો P_total = P_A / X_A = 450 / 0.6 = 750 mm Hg. ઘટક B નું આંશિક દબાણ P_B = X_B * P_total = 0.4 * 750 = 300 mm Hg. આમ, યોગ્ય જવાબ A છે. B (225) અને D (150) એ X_B ને P_A સાથે ગુણવાનો ભૂલ છે, જ્યારે C (600) એ P_total ને X_A સાથે ગુણવાનો ભૂલ છે.", "ref": "Std 11 - Chapter 2: દ્રાવણો (Solutions)", "ch": ""}, {"q": "એક દ્વિઅંગી દ્રાવણમાં ઘટક A નો મોલ અંશ 0.7 છે. જો દ્રાવણમાં ઘટક B નું આંશિક દબાણ 210 mm Hg હોય, તો કુલ દબાણ (mm Hg માં) કેટલું હશે?", "opts": ["300", "700", "490", "1000"], "ans": 1, "exp": "આદર્શ દ્રાવણમાં, ઘટક B નું આંશિક દબાણ P_B = X_B * P_total છે. અહીં, X_A = 0.7 હોવાથી X_B = 1 - 0.7 = 0.3 છે. જો P_B = 210 mm Hg હોય, તો P_total = P_B / X_B = 210 / 0.3 = 700 mm Hg. આમ, યોગ્ય જવાબ B છે. A (300) એ P_B / X_A ની ભૂલભરેલી ગણતરી છે, C (490) એ P_B * X_A છે, અને D (1000) એ કોઈ તર્કસંગત આધાર વગરનું મૂલ્ય છે.", "ref": "Std 11 - Chapter 2: દ્રાવણો (Solutions)", "ch": ""}, {"q": "એક ત્રિઅંગી મિશ્રણમાં ઘટકો P, Q, અને R ના મોલ અંશ અનુક્રમે 0.2, 0.3, અને 0.5 છે. જો મિશ્રણનું કુલ દબાણ 2 atm હોય, તો ઘટક Q નું આંશિક દબાણ (atm માં) કેટલું હશે? (આદર્શ વર્તન ધારીને)", "opts": ["0.4", "0.6", "1.0 function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
