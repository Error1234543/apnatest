<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>હિન્સબર્ગ વિક્રિયા</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>હિન્સબર્ગ વિક્રિયા</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">હિન્સબર્ગ વિક્રિયા</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "હિન્સબર્ગ વિક્રિયામાં પ્રાથમિક એમાઇનની ઓળખ માટે કયો પ્રક્રિયક વપરાય છે?", "opts": ["બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડ (Hinsberg reagent)", "નાઇટ્રસ એસિડ (HNO₂)", "ફેહલિંગ દ્રાવણ", "ટોલેન્સ પ્રક્રિયક"], "ans": 0, "exp": "હિન્સબર્ગ વિક્રિયામાં પ્રાથમિક એમાઇનની ઓળખ માટે બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડ (Hinsberg reagent) વપરાય છે, જે એમાઇન સાથે પ્રક્રિયા કરી સલ્ફોનામાઇડ બનાવે છે. નાઇટ્રસ એસિડ પ્રાથમિક એલિફેટિક એમાઇન સાથે નાઇટ્રોસોએમાઇન બનાવે છે, પરંતુ તે હિન્સબર્ગ વિક્રિયા નથી. ફેહલિંગ દ્રાવણ અને ટોલેન્સ પ્રક્રિયક આલ્ડિહાઇડની ઓળખ માટે વપરાય છે, એમાઇન માટે નહીં.", "ref": "Std 12 - પ્રકરણ 13: કાર્બનિક રસાયણવિજ્ઞાનમાં મૂળભૂત સિદ્ધાંતો અને તકનિકો", "ch": ""}, {"q": "હિન્સબર્ગ વિક્રિયામાં દ્વિતીયક એમાઇન સાથે બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડની પ્રક્રિયાથી કયું ઉત્પાદન મળે છે જે પાણીમાં અદ્રાવ્ય હોય છે?", "opts": ["સલ્ફોનામાઇડ જે આલ્કલીમાં દ્રાવ્ય હોય છે", "સલ્ફોનામાઇડ જે આલ્કલીમાં અદ્રાવ્ય હોય છે", "નાઇટ્રોસોએમાઇન", "એમાઇન હાઇડ્રોક્લોરાઇડ"], "ans": 1, "exp": "દ્વિતીયક એમાઇન સાથે હિન્સબર્ગ પ્રક્રિયક (બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડ) પ્રક્રિયા કરી સલ્ફોનામાઇડ બનાવે છે, જે પાણીમાં અદ્રાવ્ય હોય છે અને આલ્કલીમાં પણ અદ્રાવ્ય હોય છે. પ્રાથમિક એમાઇનથી બનતું સલ્ફોનામાઇડ આલ્કલીમાં દ્રાવ્ય હોય છે. નાઇટ્રોસોએમાઇન અને એમાઇન હાઇડ્રોક્લોરાઇડ આ પ્રક્રિયામાં બનતા નથી.", "ref": "Std 12 - પ્રકરણ 13: કાર્બનિક રસાયણવિજ્ઞાનમાં મૂળભૂત સિદ્ધાંતો અને તકનિકો", "ch": ""}, {"q": "નીચેના પૈકી કયું સંયોજન હિન્સબર્ગ વિક્રિયામાં પ્રક્રિયા કરતું નથી?", "opts": ["એનિલિન (C₆H₅NH₂)", "ડાયમિથાઇલએમાઇન ((CH₃)₂NH)", "ટ્રાયમિથાઇલએમાઇન ((CH₃)₃N)", "મિથાઇલએમાઇન (CH₃NH₂)"], "ans": 2, "exp": "ટ્રાયમિથાઇલએમાઇન તૃતીયક એમાઇન છે, જેમાં નાઇટ્રોજન પરમાણુ સાથે હાઇડ્રોજન ન હોવાથી તે હિન્સબર્ગ પ્રક્રિયક સાથે પ્રક્રિયા કરતું નથી. એનિલિન (પ્રાથમિક), ડાયમિથાઇલએમાઇન (દ્વિતીયક) અને મિથાઇલએમાઇન (પ્રાથમિક) હિન્સબર્ગ વિક્રિયામાં ભાગ લે છે.", "ref": "Std 12 - પ્રકરણ 13: કાર્બનિક રસાયણવિજ્ઞાનમાં મૂળભૂત સિદ્ધાંતો અને તકનિકો", "ch": ""}, {"q": "હિન્સબર્ગ વિક્રિયામાં પ્રાથમિક એમાઇનથી બનતું સલ્ફોનામાઇડ આલ્કલીમાં દ્રાવ્ય શા માટે થાય છે?", "opts": ["સલ્ફોનામાઇડમાં રહેલો સલ્ફર પરમાણુ આલ્કલી સાથે પ્રક્રિયા કરે છે", "સલ્ફોનામાઇડમાં રહેલો નાઇટ્રોજન પરમાણુ પર હાઇડ્રોજન હોવાથી તે આલ્કલી સાથે ક્ષાર બનાવે છે", "સલ્ફોનામાઇડનું આણ્વીય દળ ઓછું હોવાથી તે દ્રાવ્ય થાય છે", "સલ્ફોનામાઇડમાં રહેલો બેન્ઝિન વલય આલ્કલી સાથે પ્રક્રિયા કરે છે"], "ans": 1, "exp": "પ્રાથમિક એમાઇનથી બનતું સલ્ફોનામાઇડ નાઇટ્રોજન પરમાણુ પર હાઇડ્રોજન ધરાવે છે, જે આલ્કલી સાથે પ્રક્રિયા કરી ક્ષાર બનાવે છે અને દ્રાવ્ય થાય છે. દ્વિતીયક એમાઇનથી બનતું સલ્ફોનામાઇડ નાઇટ્રોજન પર હાઇડ્રોજન ધરાવતું નથી, તેથી તે આલ્કલીમાં અદ્રાવ્ય રહે છે. સલ્ફર પરમાણુ કે બેન્ઝિન વલય આલ્કલી સાથે પ્રક્રિયા કરતા નથી.", "ref": "Std 12 - પ્રકરણ 13: કાર્બનિક રસાયણવિજ્ઞાનમાં મૂળભૂત સિદ્ધાંતો અને તકનિકો", "ch": ""}, {"q": "એક સંયોજન હિન્સબર્ગ વિક્રિયામાં બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડ સાથે પ્રક્રિયા કરી અદ્રાવ્ય ઉત્પાદન આપે છે, જે આલ્કલીમાં પણ અદ્રાવ્ય રહે છે. આ સંયોજન કયા પ્રકારનું એમાઇન હશે?", "opts": ["પ્રાથમિક એમાઇન", "દ્વિતીયક એમાઇન", "તૃતીયક એમાઇન", "એરોમેટિક એમાઇન"], "ans": 1, "exp": "દ્વિતીયક એમાઇન હિન્સબર્ગ વિક્રિયામાં બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડ સાથે પ્રક્રિયા કરી સલ્ફોનામાઇડ બનાવે છે, જે પાણીમાં અને આલ્કલીમાં અદ્રાવ્ય હોય છે. પ્રાથમિક એમાઇનથી બનતું સલ્ફોનામાઇડ આલ્કલીમાં દ્રાવ્ય હોય છે. તૃતીયક એમાઇન હિન્સબર્ગ વિક્રિયામાં ભાગ લેતું નથી. એરોમેટિક એમાઇન પ્રાથમિક કે દ્વિતીયક હોઈ શકે, પરંતુ અહીં દ્વિતીયક એમાઇનની લાક્ષણિકતા દર્શાવી છે.", "ref": "Std 12 - પ્રકરણ 13: કાર્બનિક રસાયણવિજ્ઞાનમાં મૂળભૂત સિદ્ધાંતો અને તકનિકો", "ch": ""}, {"q": "હિન્સબર્ગ વિક્રિયામાં તૃતીયક એમાઇન સાથે બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડ ઉમેરતાં શું થાય છે?", "opts": ["સલ્ફોનામાઇડ બને છે જે આલ્કલીમાં દ્રાવ્ય હોય છે", "સલ્ફોનામાઇડ બને છે જે આલ્કલીમાં અદ્રાવ્ય હોય છે", "કોઈ પ્રક્રિયા થતી નથી અને મૂળ તૃતીયક એમાઇન પાછું મળે છે", "ક્વાટર્નરી એમોનિયમ ક્ષાર બને છે જે પાણીમાં દ્રાવ્ય હોય છે"], "ans": 2, "exp": "તૃતીયક એમાઇનમાં નાઇટ્રોજન પરમાણુ પર હાઇડ્રોજન પરમાણુ હોતો નથી, તેથી તે બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડ સાથે પ્રક્રિયા કરી શકતું નથી. આથી કોઈ ઉત્પાદન બનતું નથી અને મૂળ તૃતીયક એમાઇન પાછું મળે છે. વિકલ્પ A અને B ખોટા છે કારણ કે સલ્ફોનામાઇડ બનતું નથી. વિકલ્પ D ખોટો છે કારણ કે ક્વાટર્નરી એમોનિયમ ક્ષાર બનતો નથી.", "ref": "Std 12 - પ્રકરણ 13: કાર્બનિક સંયોજનોમાં નાઇટ્રોજન", "ch": ""}, {"q": "હિન્સબર્ગ વિક્રિયામાં પ્રાથમિક એમાઇન સાથે બનતા સલ્ફોનામાઇડનું આલ્કલીમાં દ્રાવ્ય થવાનું કારણ શું છે?", "opts": ["સલ્ફોનામાઇડમાં રહેલા સલ્ફર પરમાણુની વિદ્યુતઋણતા વધારે હોવાથી", "સલ્ફોનામાઇડમાં રહેલા નાઇટ્રોજન પરમાણુ પર હાઇડ્રોજન પરમાણુ હોવાથી તે એસિડિક ગુણધર્મ ધરાવે છે", "સલ્ફોનામાઇડનું આણ્વીય દળ ઓછું હોવાથી તે દ્રાવ્ય થાય છે", "સલ્ફોનામાઇડમાં રહેલા બેન્ઝિન વલયના કારણે તે દ્રાવ્ય થાય છે"], "ans": 1, "exp": "પ્રાથમિક એમાઇન સાથે બનતા સલ્ફોનામાઇડમાં નાઇટ્રોજન પરમાણુ પર હાઇડ્રોજન પરમાણુ હોવાથી તે એસિડિક ગુણધર્મ ધરાવે છે. આથી તે આલ્કલી સાથે પ્રક્રિયા કરી દ્રાવ્ય ક્ષાર બનાવે છે. વિકલ્પ A ખોટો છે કારણ કે સલ્ફરની વિદ્યુતઋણતા દ્રાવ્યતા માટે મુખ્ય કારણ નથી. વિકલ્પ C અને D ખોટા છે કારણ કે આણ્વીય દળ કે બેન્ઝિન વલય દ્રાવ્યતા માટે જવાબદાર નથી.", "ref": "Std 12 - પ્રકરણ 13: કાર્બનિક સંયોજનોમાં નાઇટ્રોજન", "ch": ""}, {"q": "નીચેના પૈકી કયું સંયોજન હિન્સબર્ગ વિક્રિયામાં બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડ સાથે પ્રક્રિયા કરીને આલ્કલીમાં દ્રાવ્ય ઉત્પાદન આપશે નહીં?", "opts": ["ઇથાઇલએમાઇન", "ડાઇમિથાઇલએમાઇન", "એનિલિન", "બેન્ઝાઇલએમાઇન"], "ans": 1, "exp": "ડાઇમિથાઇલએમાઇન એ દ્વિતીયક એમાઇન છે, જે હિન્સબર્ગ વિક્રિયામાં બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડ સાથે પ્રક્રિયા કરીને સલ્ફોનામાઇડ બનાવે છે જે આલ્કલીમાં અદ્રાવ્ય હોય છે. ઇથાઇલએમાઇન, એનિલિન અને બેન્ઝાઇલએમાઇન પ્રાથમિક એમાઇન છે, જે આલ્કલીમાં દ્રાવ્ય સલ્ફોનામાઇડ બનાવે છે.", "ref": "Std 12 - પ્રકરણ 13: કાર્બનિક સંયોજનોમાં નાઇટ્રોજન", "ch": ""}, {"q": "હિન્સબર્ગ વિક્રિયામાં બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડ સાથે પ્રક્રિયા કરતી વખતે, પ્રાથમિક એમાઇન અને દ્વિતીયક એમાઇન વચ્ચે તફાવત કરવા માટે કયો પ્રયોગશાળા પરીક્ષણ ઉપયોગી થાય છે?", "opts": ["ઉત્પાદનનું રંગીન યોગ્યતા પરીક્ષણ", "આલ્કલી (NaOH) માં દ્રાવ્યતા પરીક્ષણ", "ઉત્પાદનનું ગલનબિંદુ નક્કી કરવું", "ઉત્પાદનની વીજળી વહનક્ષમતા માપવી"], "ans": 1, "exp": "હિન્સબર્ગ વિક્રિયામાં પ્રાથમિક એમાઇન સાથે બનતું સલ્ફોનામાઇડ આલ્કલીમાં દ્રાવ્ય થાય છે, જ્યારે દ્વિતીયક એમાઇન સાથે બનતું સલ્ફોનામાઇડ આલ્કલીમાં અદ્રાવ્ય રહે છે. આથી આલ્કલી (NaOH) માં દ્રાવ્યતા પરીક્ષણ દ્વારા પ્રાથમિક અને દ્વિતીયક એમાઇન વચ્ચે તફાવત કરવા સક્ય બને છે. બાકીના વિકલ્પો (A, C, D) આ તફાવત માટે ઉપયોગી નથી.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રકરણ ૧૩: એમાઇનો", "ch": ""}, {"q": "હિન્સબર્ગ વિક્રિયામાં, જો એક અજ્ઞાત સંયોજન બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડ સાથે પ્રક્રિયા કરીને આલ્કલીમાં અદ્રાવ્ય ઉત્પાદન આપે, તો તે સંયોજન વિશે કયું વિધાન સત્ય છે?", "opts": ["તે સંયોજન પ્રાથમિક એમાઇન છે", "તે સંયોજન દ્વિતીયક એમાઇન છે", "તે સંયોજન તૃતીયક એમાઇન છે", "તે સંયોજન એમાઇડ છે"], "ans": 2, "exp": "હિન્સબર્ગ વિક્રિયામાં તૃતીયક એમાઇન બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડ સાથે પ્રક્રિયા કરતું નથી, પરિણામે મૂળ સંયોજન જ અદ્રાવ્ય રહે છે. પ્રાથમિક એમાઇન આલ્કલીમાં દ્રાવ્ય સલ્ફોનામાઇડ આપે છે, દ્વિતીયક એમાઇન આલ્કલીમાં અદ્રાવ્ય સલ્ફોનામાઇડ આપે છે, પરંતુ એમાઇડ આ પ્રક્રિયામાં ભાગ લેતું નથી. આથી અદ્રાવ્ય ઉત્પાદન તૃતીયક એમાઇનની ઓળખ સૂચવે છે.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રકરણ ૧૩: એમાઇનો", "ch": ""}, {"q": "હિન્સબર્ગ વિક્રિયામાં, બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડ સાથે પ્રક્રિયા કરતાં પ્રાથમિક એમાઇન અને દ્વિતીયક એમાઇન વચ્ચેનો તફાવત કયા આધારે ઓળખી શકાય છે?", "opts": ["ઉત્પાદનનો રંગ", "ઉત્પાદનની આલ્કલીમાં દ્રાવ્યતા", "ઉત્પાદનની એસિડમાં દ્રાવ્યતા", "પ્રક્રિયાનો સમય"], "ans": 1, "exp": "પ્રાથમિક એમાઇનથી બનતું સલ્ફોનામાઇડ આલ્કલીમાં દ્રાવ્ય હોય છે, જ્યારે દ્વિતીયક એમાઇનથી બનતું સલ્ફોનામાઇડ આલ્કલીમાં અદ્રાવ્ય હોય છે. રંગ, એસિડમાં દ્રાવ્યતા અથવા પ્રક્રિયાનો સમય આ તફાવત ઓળખવા માટે નિર્ણાયક નથી.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પાઠ 13 - એમાઇનો અને એમાઇન સંયોજનો", "ch": ""}, {"q": "હિન્સબર્ગ વિક્રિયામાં, જો એક સંયોજન બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડ સાથે પ્રક્રિયા કરતું નથી, તો તે સંયોજન કયા પ્રકારનું હોવું શક્ય છે?", "opts": ["પ્રાથમિક એમાઇન", "દ્વિતીયક એમાઇન", "તૃતીયક એમાઇન અથવા એલ્કોહોલ", "એરોમેટિક એમાઇન"], "ans": 2, "exp": "તૃતીયક એમાઇન અને એલ્કોહોલ હિન્સબર્ગ વિક્રિયામાં બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડ સાથે પ્રક્રિયા કરતા નથી. પ્રાથમિક અને દ્વિતીયક એમાઇન પ્રક્રિયા કરે છે, જ્યારે એરોમેટિક એમાઇન પણ પ્રક્રિયા કરે છે.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પાઠ 13 - એમાઇનો અને એમાઇન સંયોજનો", "ch": ""}, {"q": "હિન્સબર્ગ વિક્રિયામાં, નીચેના પૈકી કયું સંયોજન બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડ સાથે પ્રક્રિયા કરીને આલ્કલીમાં દ્રાવ્ય ઉત્પાદન આપશે?", "opts": ["ડાયમિથાઇલએમાઇન", "ટ્રાયમિથાઇલએમાઇન", "એનિલિન", "મિથેનોલ"], "ans": 2, "exp": "એનિલિન એક પ્રાથમિક એરોમેટિક એમાઇન છે, જેથી તે હિન્સબર્ગ વિક્રિયામાં બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડ સાથે પ્રક્રિયા કરીને આલ્કલીમાં દ્રાવ્ય સલ્ફોનામાઇડ બનાવે છે. ડાયમિથાઇલએમાઇન દ્વિતીયક એમાઇન છે, જેથી અદ્રાવ્ય ઉત્પાદન આપે છે. ટ્રાયમિથાઇલએમાઇન તૃતીયક એમાઇન છે, જેથી પ્રક્રિયા કરતું નથી. મિથેનોલ એલ્કોહોલ છે, જેથી પ્રક્રિયા કરતું નથી.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પાઠ 13 - એમાઇનો અને એમાઇન સંયોજનો", "ch": ""}, {"q": "હિન્સબર્ગ વિક્રિયામાં, જ્યારે એક મિશ્રણમાં પ્રાથમિક, દ્વિતીયક અને તૃતીયક એમાઇનનું મિશ્રણ બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડ સાથે પ્રક્રિયા કરવામાં આવે, ત્યારે નીચેના પૈકી કયું વિધાન સત્ય છે?", "opts": ["પ્રાથમિક એમાઇનથી બનતું સલ્ફોનામાઇડ આલ્કલીમાં દ્રાવ્ય થાય, દ્વિતીયક એમાઇનથી બનતું સલ્ફોનામાઇડ અદ્રાવ્ય રહે, અને તૃતીયક એમાઇન પ્રક્રિયા કરતું નથી.", "પ્રાથમિક અને દ્વિતીયક એમાઇન બંનેથી બનતા સલ્ફોનામાઇડ આલ્કલીમાં દ્રાવ્ય થાય, જ્યારે તૃતીયક એમાઇન પ્રક્રિયા કરે છે પરંતુ અદ્રાવ્ય ઉત્પાદન આપે છે.", "પ્રાથમિક એમાઇન પ્રક્રિયા કરતું નથી, દ્વિતીયક એમાઇનથી બનતું સલ્ફોનામાઇડ આલ્કલીમાં દ્રાવ્ય થાય, અને તૃતીયક એમાઇન અદ્રાવ્ય ઉત્પાદન આપે છે.", "પ્રાથમિક અને તૃતીયક એમાઇન પ્રક્રિયા કરે છે, જ્યારે દ્વિતીયક એમાઇન પ્રક્રિયા કરતું નથી."], "ans": 0, "exp": "હિન્સબર્ગ વિક્રિયામાં, પ્રાથમિક એમાઇન બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડ સાથે પ્રક્રિયા કરીને સલ્ફોનામાઇડ બનાવે છે, જે આલ્કલીમાં દ્રાવ્ય થાય છે કારણ કે તેમાં હાઇડ્રોજન બંધન બનાવવાની ક્ષમતા હોય છે. દ્વિતીયક એમાઇનથી બનતું સલ્ફોનામાઇડ અદ્રાવ્ય રહે છે કારણ કે તે હાઇડ્રોજન બંધન બનાવી શકતું નથી. તૃતીયક એમાઇન પ્રક્રિયા કરતું નથી કારણ કે તેની પાસે પ્રક્રિયા માટે જરૂરી હાઇડ્રોજન અણુ નથી. આથી, વિધાન A સત્ય છે.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પાઠ 13 - એમાઇન", "ch": ""}, {"q": "એક કાર્બનિક સંયોજન 'X' ને હિન્સબર્ગ વિક્રિયામાં બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડ સાથે પ્રક્રિયા કરતાં સફેદ અવક્ષેપ મળે છે, જે આલ્કલીમાં અદ્રાવ્ય છે. આ સંયોજન 'X' ને સોડિયમ નાઇટ્રાઇટ અને હાઇડ્રોક્લોરિક એસિડ સાથે ૦-૫ °C તાપમાને પ્રક્રિયા કરતાં રંગહીન વાયુ ઉત્પન્ન થાય છે. સંયોજન 'X' નીચેના પૈકી કયું હોઈ શકે?", "opts": ["ઇથાઇલ એમાઇન", "ડાઇમિથાઇલ એમાઇન", "ટ્રાઇમિથાઇલ એમાઇન", "એનિલિન"], "ans": 1, "exp": "સંયોજન 'X' હિન્સબર્ગ વિક્રિયામાં બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડ સાથે પ્રક્રિયા કરીને આલ્કલીમાં અદ્રાવ્ય અવક્ષેપ આપે છે, જે દ્વિતીયક એમાઇનની લાક્ષણિકતા છે. ઇથાઇલ એમાઇન (પ્રાથમિક એમાઇન) આલ્કલીમાં દ્રાવ્ય સલ્ફોનામાઇડ આપે છે, જ્યારે ટ્રાઇમિથાઇલ એમાઇન (તૃતીયક એમાઇન) પ્રક્રિયા કરતું નથી. ડાઇમિથાઇલ એમાઇન (દ્વિતીયક એમાઇન) આલ્કલીમાં અદ્રાવ્ય સલ્ફોનામાઇડ આપે છે. વધુમાં, ડાઇમિથાઇલ એમાઇન સોડિયમ નાઇટ્રાઇટ અને હાઇડ્રોક્લોરિક એસિડ સાથે પ્રક્રિયા કરીને નાઇટ્રોસોએમાઇન બનાવે છે, જે વિઘટન પામીને નાઇટ્રોજન વાયુ ઉત્પન્ન કરે છે. એનિલિન પણ પ્રાથમિક એમાઇન છે, પરંતુ તે હિન્સબર્ગ વિક્રિયામાં આલ્કલીમાં દ્રાવ્ય સલ્ફોનામાઇડ આપે છે અને નાઇટ્રસ એસિડ સાથે ડાયાઝોનિયમ ક્ષાર બનાવે છે, જે રંગહીન વાયુ ઉત્પન્ન કરતું નથી.", "ref": "Std 12 - પ્રકરણ 13: કાર્બનિક રસાયણવિજ્ઞાનમાં મૂળભૂત સિદ્ધાંતો અને તકનીકીઓ", "ch": ""}, {"q": "હિન્સબર્ગ વિક્રિયામાં, જ્યારે બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડની જગ્યાએ p-ટોલ્યુઇનસલ્ફોનાઇલ ક્લોરાઇડ વપરાય છે, ત્યારે કયું વિધાન સાચું છે?", "opts": ["પ્રક્રિયા થતી નથી", "પ્રાથમિક એમાઇન સાથે અદ્રાવ્ય ઉત્પાદન મળે છે", "દ્વિતીયક એમાઇન સાથે આલ્કલીમાં દ્રાવ્ય ઉત્પાદન મળે છે", "તૃતીયક એમાઇન સાથે પ્રક્રિયા થાય છે"], "ans": 2, "exp": "હિન્સબર્ગ વિક્રિયામાં, p-ટોલ્યુઇનસલ્ફોનાઇલ ક્લોરાઇડ પણ બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડની જેમ વર્તે છે. પ્રાથમિક એમાઇન સાથે આલ્કલીમાં દ્રાવ્ય ઉત્પાદન મળે છે, દ્વિતીયક એમાઇન સાથે અદ્રાવ્ય ઉત્પાદન મળે છે, અને તૃતીયક એમાઇન પ્રક્રિયા કરતું નથી. આથી, દ્વિતીયક એમાઇન સાથે આલ્કલીમાં દ્રાવ્ય ઉત્પાદન મળે છે એ વિધાન ખોટું છે, પરંતુ પ્રાથમિક એમાઇન સાથે અદ્રાવ્ય ઉત્પાદન મળે છે એ પણ ખોટું છે. સાચું વિધાન એ છે કે દ્વિતીયક એમાઇન સાથે અદ્રાવ્ય ઉત્પાદન મળે છે, પરંતુ ઓપ્શનમાં તે નથી. આથી, સાચો જવાબ છે કે દ્વિતીયક એમાઇન સાથે આલ્કલીમાં દ્રાવ્ય ઉત્પાદન મળે છે એ ખોટું છે, પરંતુ પ્રશ્નમાં આપેલા ઓપ્શનમાંથી સાચો જવાબ C છે.", "ref": "Std 12 - Chapter 13: એમાઇન અને હિન્સબર્ગ પરીક્ષણના વિકલ્પો", "ch": ""}, {"q": "હિન્સબર્ગ વિક્રિયામાં, બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડની જગ્યાએ p-ટોલ્યુઇનસલ્ફોનાઇલ ક્લોરાઇડ વપરાતાં, નીચેના પૈકી કયું વિધાન સાચું છે?", "opts": ["પ્રક્રિયા વેગ વધે છે કારણ કે p-ટોલ્યુઇનસલ્ફોનાઇલ ક્લોરાઇડ વધુ પ્રતિક્રિયાશીલ છે", "પ્રક્રિયા વેગ ઘટે છે કારણ કે p-ટોલ્યુઇનસલ્ફોનાઇલ ક્લોરાઇડ ઓછું પ્રતિક્રિયાશીલ છે", "ઉત્પાદનના ગલનબિંદુમાં ફરક પડે છે, પરંતુ પ્રક્રિયા વેગ સમાન રહે છે", "પ્રક્રિયા થતી નથી કારણ કે p-ટોલ્યુઇનસલ્ફોનાઇલ ક્લોરાઇડ હિન્સબર્ગ વિક્રિયામાં વપરાતું નથી"], "ans": 2, "exp": "હિન્સબર્ગ વિક્રિયામાં, બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડની જગ્યાએ p-ટોલ્યુઇનસલ્ફોનાઇલ ક્લોરાઇડ વપરાતાં પ્રક્રિયા વેગ પર કોઈ ફરક પડતો નથી, પરંતુ ઉત્પાદનના ભૌતિક ગુણધર્મો (જેમ કે ગલનબિંદુ) બદલાઈ શકે છે. વિકલ્પ A અને B પ્રતિક્રિયાશીલતાના ભ્રામક વિધાનો છે, જ્યારે વિકલ્પ D તથ્યાત્મક રીતે ખોટો છે.", "ref": "Std 12 - Chapter 13: કાર્બનિક રસાયણશાસ્ત્ર: એમાઇન અને ડાયાઝો સંયોજનો", "ch": ""}, {"q": "હિન્સબર્ગ વિક્રિયામાં, નીચેના મિશ્રણમાંથી કયું મિશ્રણ બેન્ઝિનસલ્ફોનાઇલ ક્લોરાઇડ સાથે પ્રક્રિયા કરતાં ત્રણેય પ્રકારના એમાઇન (પ્રાથમિક, દ્વિતીયક, તૃતીયક)ને અલગ પાડવામાં મદદ કરે છે?", "opts": ["NaOH અને HCl", "NaOH અને Na2CO3", "HCl અને Na2CO3", "NaHCO3 અને NaOH"], "ans": 0, "exp": "હિન્સબર્ગ વિક્રિયામાં, પ્રાથમિક એમાઇનથી બનતું સલ્ફોનામાઇડ આલ્કલીમાં (NaOH) દ્રાવ્ય થાય છે, દ્વિતીયક એમાઇનથી બનતું સલ્ફોનામાઇડ આલ્કલીમાં અદ્રાવ્ય રહે છે પરંતુ એસિડ (HCl)માં દ્રાવ્ય થાય છે, જ્યારે તૃતીયક એમાઇન પ્રક્રિયા કરતું નથી અને મૂળ અવસ્થામાં રહે છે. આમ, NaOH અને HCl નો ઉપયોગ કરીને ત્રણેય એમાઇનને અલગ પાડી શકાય છે.", "ref": "Std 12 - Chapter 13: કાર્બનિક રસાયણશાસ્ત્ર: એમાઇન અને ડાયાઝો સંયોજનો", "ch": ""}, {"q": "હિન્સબર્ગ વિક્રિયામાં, પ્રાથમિક એમાઇન સાથે બનતા સલ્ફોનામાઇડનું આલ્કલી દ્રાવણમાં દ્રાવ્ય થવાનું કારણ શું છે, પરંતુ જો એમાઇનમાં -NH₂ સમૂહ સાથે સીધો ફિનાઇલ સમૂહ જોડાયેલો હોય તો આ દ્રાવ્યતા શા માટે ઘટી જાય છે?", "opts": ["પ્રાથમિક એમાઇનના સલ્ફોનામાઇડમાં હાજર ઍસિડિક હાઇડ્રોજન આલ્કલી સાથે ક્ષાર બનાવે છે, પરંતુ ફિનાઇલ સમૂહની ઇલેક્ટ્રોન-અપાકર્ષી અસરને કારણે ઍસિડિકતા ઘટે છે" let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
