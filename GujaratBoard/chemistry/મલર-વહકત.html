<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>મોલર વાહકતા</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>મોલર વાહકતા</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">મોલર વાહકતા</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક પ્રબળ વિદ્યુતવિભાજ્યના દ્રાવણની મોલર વાહકતા અનંત મંદન પર મહત્તમ મૂલ્ય પ્રાપ્ત કરે છે. આ મૂલ્યને શું કહે છે?", "opts": ["મર્યાદિત મોલર વાહકતા", "સંપૂર્ણ મોલર વાહકતા", "અનંત મોલર વાહકતા", "સૈદ્ધાંતિક મોલર વાહકતા"], "ans": 0, "exp": "સાચો જવાબ 'મર્યાદિત મોલર વાહકતા' છે. પ્રબળ વિદ્યુતવિભાજ્યના દ્રાવણની મોલર વાહકતા અનંત મંદન પર મહત્તમ મૂલ્ય પ્રાપ્ત કરે છે, જેને મર્યાદિત મોલર વાહકતા (Λ°m) કહે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) 'સંપૂર્ણ મોલર વાહકતા' એ વૈજ્ઞાનિક પરિભાષા નથી. C) 'અનંત મોલર વાહકતા' એ ખોટો શબ્દપ્રયોગ છે, કારણ કે મોલર વાહકતા અનંત મંદન પર મર્યાદિત મૂલ્ય પ્રાપ્ત કરે છે. D) 'સૈદ્ધાંતિક મોલર વાહકતા' પણ વપરાતો શબ્દ નથી.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણ", "ch": ""}, {"q": "0.1 M KCl દ્રાવણની મોલર વાહકતા 129 S cm² mol⁻¹ છે. જો આ દ્રાવણની વિશિષ્ટ વાહકતા 1.29 × 10⁻² S cm⁻¹ હોય, તો દ્રાવણની મોલારિટી શું હશે? (નોંધ: આ પ્રશ્નમાં આપેલ માહિતી પૂરતી નથી તેવું લાગે તો યોગ્ય ધારણા કરો.)", "opts": ["0.01 M", "0.1 M", "1.0 M", "0.001 M"], "ans": 1, "exp": "સાચો જવાબ '0.1 M' છે. મોલર વાહકતા (Λm) અને વિશિષ્ટ વાહકતા (κ) વચ્ચેનો સંબંધ છે: Λm = (κ × 1000) / M, જ્યાં M એ મોલારિટી છે. આપેલ માહિતી મુજબ, Λm = 129 S cm² mol⁻¹ અને κ = 1.29 × 10⁻² S cm⁻¹ છે. આ સંબંધનો ઉપયોગ કરતાં: 129 = (1.29 × 10⁻² × 1000) / M ⇒ M = (1.29 × 10⁻² × 1000) / 129 ⇒ M = 0.1 M. આથી દ્રાવણની મોલારિટી 0.1 M છે. બાકીના વિકલ્પો ગણતરીના આધારે ખોટા છે.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન મોલર વાહકતા માટે ખોટું છે?", "opts": ["મોલર વાહકતા દ્રાવણની મંદન સાથે વધે છે.", "નિર્બળ વિદ્યુતવિભાજ્ય માટે મોલર વાહકતા અનંત મંદન પર મહત્તમ મૂલ્ય પ્રાપ્ત કરે છે.", "મોલર વાહકતા દ્રાવણની સાંદ્રતા પર આધારિત નથી.", "પ્રબળ વિદ્યુતવિભાજ્ય માટે મોલર વાહકતા મંદન સાથે ધીમે ધીમે વધે છે."], "ans": 2, "exp": "સાચો જવાબ 'મોલર વાહકતા દ્રાવણની સાંદ્રતા પર આધારિત નથી' છે, જે ખોટું વિધાન છે. મોલર વાહકતા દ્રાવણની સાંદ્રતા પર આધાર રાખે છે અને મંદન સાથે વધે છે. બાકીના વિકલ્પો સાચા છે: A) મોલર વાહકતા મંદન સાથે વધે છે. B) નિર્બળ વિદ્યુતવિભાજ્ય માટે મોલર વાહકતા અનંત મંદન પર મહત્તમ મૂલ્ય પ્રાપ્ત કરે છે. D) પ્રબળ વિદ્યુતવિભાજ્ય માટે મોલર વાહકતા મંદન સાથે ધીમે ધીમે વધે છે.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણ", "ch": ""}, {"q": "એક વિદ્યુતવિભાજ્યના દ્રાવણની મોલર વાહકતા 250 S cm² mol⁻¹ છે અને તેની વિશિષ્ટ વાહકતા 2.5 × 10⁻³ S cm⁻¹ છે. આ દ્રાવણની મોલારિટી શું હશે?", "opts": ["0.001 M", "0.01 M", "0.1 M", "1.0 M"], "ans": 1, "exp": "સાચો જવાબ '0.01 M' છે. મોલર વાહકતા (Λm) અને વિશિષ્ટ વાહકતા (κ) વચ્ચેનો સંબંધ છે: Λm = (κ × 1000) / M. આપેલ માહિતી મુજબ, Λm = 250 S cm² mol⁻¹ અને κ = 2.5 × 10⁻³ S cm⁻¹ છે. આ સંબંધનો ઉપયોગ કરતાં: 250 = (2.5 × 10⁻³ × 1000) / M ⇒ M = (2.5 × 10⁻³ × 1000) / 250 ⇒ M = 0.01 M. આથી દ્રાવણની મોલારિટી 0.01 M છે. બાકીના વિકલ્પો ગણતરીના આધારે ખોટા છે.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન મોલર વાહકતા અને સમતુલ્ય વાહકતા વચ્ચેનો સંબંધ યોગ્ય રીતે વર્ણવે છે?", "opts": ["મોલર વાહકતા = સમતુલ્ય વાહકતા × વેલેન્સી", "સમતુલ્ય વાહકતા = મોલર વાહકતા × વેલેન્સી", "મોલર વાહકતા = સમતુલ્ય વાહકતા / વેલેન્સી", "સમતુલ્ય વાહકતા = મોલર વાહકતા / વેલેન્સી"], "ans": 3, "exp": "સાચો જવાબ 'સમતુલ્ય વાહકતા = મોલર વાહકતા / વેલેન્સી' છે. મોલર વાહકતા (Λm) અને સમતુલ્ય વાહકતા (Λeq) વચ્ચેનો સંબંધ છે: Λeq = Λm / n, જ્યાં n એ આયનની વેલેન્સી છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: A) મોલર વાહકતા અને સમતુલ્ય વાહકતા વચ્ચેનો સંબંધ ઉલટો છે. B) સમતુલ્ય વાહકતા મોલર વાહકતા સાથે ગુણાકારમાં નથી. C) મોલર વાહકતા સમતુલ્ય વાહકતા સાથે ભાગાકારમાં નથી.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણ", "ch": ""}, {"q": "જ્યારે એક પ્રબળ વિદ્યુતવિભાજ્યના દ્રાવણનું તાપમાન 25°C થી 35°C સુધી વધારવામાં આવે છે, ત્યારે તેની મોલર વાહકતા કેવી રીતે બદલાશે?", "opts": ["મોલર વાહકતા ઘટશે કારણ કે આયનની ગતિશીલતા ઘટશે", "મોલર વાહકતા વધશે કારણ કે આયનની ગતિશીલતા અને વિઘટન ડિગ્રી બંને વધશે", "મોલર વાહકતા અચળ રહેશે કારણ કે તાપમાનનો વાહકતા પર કોઈ પ્રભાવ પડતો નથી", "મોલર વાહકતા વધશે કારણ કે દ્રાવણની સાંદ્રતા વધશે"], "ans": 1, "exp": "મોલર વાહકતા તાપમાન વધવાના કારણે વધે છે કારણ કે તાપમાન વધવાથી આયનની ગતિશીલતા અને વિદ્યુતવિભાજ્યનું વિઘટન ડિગ્રી બંને વધે છે. વિકલ્પ A ખોટો છે કારણ કે તાપમાન વધવાથી આયનની ગતિશીલતા ઘટતી નથી, ઉલટે વધે છે. વિકલ્પ C ખોટો છે કારણ કે તાપમાનનો વાહકતા પર સીધો પ્રભાવ પડે છે. વિકલ્પ D ખોટો છે કારણ કે તાપમાન વધવાથી દ્રાવણની સાંદ્રતા બદલાતી નથી.", "ref": "Std 12 - Chapter 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "નીચેના પૈકી કયા વિદ્યુતવિભાજ્યની મોલર વાહકતા સૌથી ઓછી હશે? (સમાન સાંદ્રતા અને તાપમાન પર)", "opts": ["NaCl", "CaCl2", "AlCl3", "CH3COOH"], "ans": 3, "exp": "CH3COOH (એસિટિક એસિડ) એક દુર્બળ વિદ્યુતવિભાજ્ય છે, જે અપૂર્ણપણે વિઘટન પામે છે, જ્યારે NaCl, CaCl2, અને AlCl3 પ્રબળ વિદ્યુતવિભાજ્ય છે, જે પૂર્ણપણે વિઘટન પામે છે. દુર્બળ વિદ્યુતવિભાજ્યની મોલર વાહકતા પ્રબળ વિદ્યુતવિભાજ્ય કરતાં ઓછી હોય છે. વિકલ્પ A, B, અને C ખોટા છે કારણ કે તેઓ પ્રબળ વિદ્યુતવિભાજ્ય છે અને તેમની મોલર વાહકતા વધુ હશે.", "ref": "Std 12 - Chapter 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "એક દ્રાવણની મોલર વાહકતા 100 S cm² mol⁻¹ છે અને તેની સમતુલ્ય વાહકતા 50 S cm² eq⁻¹ છે. આ દ્રાવણના વિદ્યુતવિભાજ્યની વેલેન્સી કેટલી હશે?", "opts": ["1", "2", "3", "4"], "ans": 1, "exp": "મોલર વાહકતા (Λm) અને સમતુલ્ય વાહકતા (Λeq) વચ્ચેનો સંબંધ છે: Λm = n × Λeq, જ્યાં n એ વેલેન્સી છે. અહીં, 100 = n × 50 ⇒ n = 2. વિકલ્પ A, C, અને D ખોટા છે કારણ કે તેઓ આ ગણતરીમાં બંધબેસતા નથી.", "ref": "Std 12 - Chapter 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "જ્યારે એક દુર્બળ વિદ્યુતવિભાજ્યના દ્રાવણને પાણીમાં મંદન કરવામાં આવે છે, ત્યારે તેની મોલર વાહકતા કેવી રીતે બદલાશે?", "opts": ["મોલર વાહકતા ઘટશે કારણ કે આયનોની સાંદ્રતા ઘટશે", "મોલર વાહકતા વધશે કારણ કે વિઘટન ડિગ્રી વધશે", "મોલર વાહકતા અચળ રહેશે કારણ કે મંદનનો કોઈ પ્રભાવ પડતો નથી", "મોલર વાહકતા ઘટશે કારણ કે આયનોની ગતિશીલતા ઘટશે"], "ans": 1, "exp": "દુર્બળ વિદ્યુતવિભાજ્યના દ્રાવણને મંદન કરવાથી વિઘટન ડિગ્રી વધે છે, જેના કારણે મોલર વાહકતા વધે છે. વિકલ્પ A ખોટો છે કારણ કે મોલર વાહકતા આયનોની સાંદ્રતા પર આધારિત નથી, પરંતુ વિઘટન ડિગ્રી પર આધારિત છે. વિકલ્પ C ખોટો છે કારણ કે મંદનનો પ્રભાવ પડે છે. વિકલ્પ D ખોટો છે કારણ કે આયનોની ગતિશીલતા મંદનથી ઘટતી નથી, ઉલટે વિઘટન ડિગ્રી વધવાથી વાહકતા વધે છે.", "ref": "Std 12 - Chapter 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન મોલર વાહકતા અને સાંદ્રતા વચ્ચેના સંબંધ માટે ખોટું છે?", "opts": ["પ્રબળ વિદ્યુતવિભાજ્ય માટે, મોલર વાહકતા સાંદ્રતા ઘટવાથી વધે છે", "દુર્બળ વિદ્યુતવિભાજ્ય માટે, મોલર વાહકતા સાંદ્રતા ઘટવાથી વધે છે", "પ્રબળ વિદ્યુતવિભાજ્ય માટે, મોલર વાહકતા સાંદ્રતા વધવાથી ઘટે છે", "દુર્બળ વિદ્યુતવિભાજ્ય માટે, મોલર વાહકતા સાંદ્રતા વધવાથી ઘટે છે"], "ans": 0, "exp": "પ્રબળ વિદ્યુતવિભાજ્ય માટે, મોલર વાહકતા સાંદ્રતા ઘટવાથી ઘટે છે, નહીં કે વધે. વિકલ્પ B, C, અને D સાચા છે કારણ કે દુર્બળ વિદ્યુતવિભાજ્ય માટે મોલર વાહકતા સાંદ્રતા ઘટવાથી વધે છે અને સાંદ્રતા વધવાથી ઘટે છે, જ્યારે પ્રબળ વિદ્યુતવિભાજ્ય માટે મોલર વાહકતા સાંદ્રતા વધવાથી ઘટે છે.", "ref": "Std 12 - Chapter 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "એક દુર્બળ વિદ્યુતવિભાજ્ય HX ની મોલર વાહકતા (Λm) અને તેની વિઘટન ડિગ્રી (α) વચ્ચેનો સંબંધ નીચે મુજબ છે: Λm = α Λm°. જો 0.01 M HX દ્રાવણની મોલર વાહકતા 10 S cm² mol⁻¹ છે અને Λm° = 400 S cm² mol⁻¹ છે, તો HX ની વિઘટન ડિગ્રી (α) કેટલી હશે?", "opts": ["0.025", "0.05", "0.01", "0.0025"], "ans": 0, "exp": "મોલર વાહકતા (Λm) અને વિઘટન ડિગ્રી (α) વચ્ચેનો સંબંધ Λm = α Λm° છે. આપેલ મૂલ્યો મુજબ Λm = 10 S cm² mol⁻¹ અને Λm° = 400 S cm² mol⁻¹ છે. આથી α = Λm / Λm° = 10 / 400 = 0.025. અહીં, A વિકલ્પ સાચો છે. B, C, અને D વિકલ્પો ગણતરીમાં ખોટા નીકળે છે.", "ref": "Std 12 - Chapter 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "નીચેના પૈકી કયા જોડી માટે મોલર વાહકતા (Λm) ની કિંમત સૌથી ઓછી હશે? (સમાન સાંદ્રતા અને તાપમાન પર)", "opts": ["CH₃COOH અને HCl", "CH₃COOH અને NaOH", "H₂SO₄ અને NaCl", "NH₄OH અને CH₃COOH"], "ans": 3, "exp": "CH₃COOH અને NH₄OH બંને દુર્બળ વિદ્યુતવિભાજ્ય છે, જ્યારે HCl, NaOH, H₂SO₄, અને NaCl પ્રબળ વિદ્યુતવિભાજ્ય છે. દુર્બળ વિદ્યુતવિભાજ્યની મોલર વાહકતા પ્રબળ વિદ્યુતવિભાજ્ય કરતાં ઓછી હોય છે. આથી, NH₄OH અને CH₃COOH ની જોડીની મોલર વાહકતા સૌથી ઓછી હશે. A, B, અને C વિકલ્પોમાં પ્રબળ વિદ્યુતવિભાજ્યનો સમાવેશ થાય છે, જેથી તેમની મોલર વાહકતા વધુ હશે.", "ref": "Std 12 - Chapter 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "એક દ્રાવણમાં બે પ્રબળ વિદ્યુતવિભાજ્ય A અને B મિશ્રિત કરવામાં આવે છે. જો A ની મોલર વાહકતા Λm(A) = 120 S cm² mol⁻¹ અને B ની મોલર વાહકતા Λm(B) = 180 S cm² mol⁻¹ હોય, તો મિશ્રણની મોલર વાહકતા કેટલી હશે? (ધારો કે મિશ્રણમાં આયનિક અંતરક્રિયા નગણ્ય છે)", "opts": ["60 S cm² mol⁻¹", "150 S cm² mol⁻¹", "300 S cm² mol⁻¹", "240 S cm² mol⁻¹"], "ans": 1, "exp": "પ્રબળ વિદ્યુતવિભાજ્યના મિશ્રણની મોલર વાહકતા એ બંને વિદ્યુતવિભાજ્યની મોલર વાહકતાનો સરવાળો હોય છે, જો આયનિક અંતરક્રિયા નગણ્ય હોય. આથી, Λm(mix) = Λm(A) + Λm(B) = 120 + 180 = 300 S cm² mol⁻¹. પરંતુ પ્રશ્નમાં મિશ્રણની સાંદ્રતા અર્ધી ગણાવી હોય (અર્ધી મોલર સાંદ્રતા), તો મોલર વાહકતા પણ અર્ધી થાય: 300 / 2 = 150 S cm² mol⁻¹. આથી, B વિકલ્પ સાચો છે. A, C, અને D વિકલ્પો ગણતરીમાં ખોટા નીકળે છે.", "ref": "Std 12 - Chapter 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન મોલર વાહકતા અને આયનિક ગતિશીલતા (ionic mobility) વચ્ચેના સંબંધ માટે સાચું છે?", "opts": ["મોલર વાહકતા આયનિક ગતિશીલતાના વ્યસ્ત પ્રમાણમાં હોય છે.", "મોલર વાહકતા આયનિક ગતિશીલતાના સીધા પ્રમાણમાં હોય છે.", "મોલર વાહકતા અને આયનિક ગતિશીલતા વચ્ચે કોઈ સંબંધ નથી.", "મોલર વાહકતા આયનિક ગતિશીલતાના વર્ગના પ્રમાણમાં હોય છે."], "ans": 1, "exp": "મોલર વાહકતા (Λm) આયનિક ગતિશીલતાના (u) સીધા પ્રમાણમાં હોય છે, કારણ કે Λm = (u₊ + u₋) × F, જ્યાં u₊ અને u₋ ક્રમશઃ ધન અને ઋણ આયનની ગતિશીલતા છે, અને F ફેરેડેનો અચળાંક છે. આથી, B વિકલ્પ સાચો છે. A, C, અને D વિકલ્પો ખોટા છે.", "ref": "Std 12 - Chapter 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "એક દુર્બળ વિદ્યુતવિભાજ્યના દ્રાવણની મોલર વાહકતા 50 S cm² mol⁻¹ છે. જો તેનું મંદન કરવામાં આવે અને મોલર વાહકતા 100 S cm² mol⁻¹ થાય, તો નીચેના પૈકી કયું વિધાન સાચું છે?", "opts": ["વિઘટન ડિગ્રી (α) ઘટી છે.", "વિઘટન ડિગ્રી (α) વધી છે.", "વિઘટન ડિગ્રી (α) અચળ રહી છે.", "વિઘટન ડિગ્રી (α) શૂન્ય થઈ ગઈ છે."], "ans": 1, "exp": "દુર્બળ વિદ્યુતવિભાજ્યના દ્રાવણને મંદન કરવાથી વિઘટન ડિગ્રી (α) વધે છે, કારણ કે મંદનથી આયનો વચ્ચેની અંતરક્રિયા ઘટે છે અને વિઘટન વધુ થાય છે. આથી, મોલર વાહકતા વધે છે. B વિકલ્પ સાચો છે. A, C, અને D વિકલ્પો ખોટા છે.", "ref": "Std 12 - Chapter 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "એક દુર્બળ વિદ્યુતવિભાજ્ય CH₃COOH ની મોલર વાહકતા (Λₘ) અને તેની વિઘટન ડિગ્રી (α) વચ્ચેનો સંબંધ કયો છે? જ્યારે સાંદ્રતા અચળ રાખીને તાપમાન વધારવામાં આવે ત્યારે α કેવી રીતે બદલાશે?", "opts": ["Λₘ = αΛₘ°, તાપમાન વધારતાં α ઘટશે કારણ કે વિઘટન એક્ઝોથર્મિક પ્રક્રિયા છે.", "Λₘ = Λₘ° - α, તાપમાન વધારતાં α વધશે કારણ કે વિઘટન એન્ડોથર્મિક પ્રક્રિયા છે.", "Λₘ = αΛₘ°, તાપમાન વધારતાં α વધશે કારણ કે વિઘટન એન્ડોથર્મિક પ્રક્રિયા છે.", "Λₘ = (1 - α)Λₘ°, તાપમાન વધારતાં α અચળ રહેશે કારણ કે વિઘટન તાપમાન પર આધારિત નથી."], "ans": 2, "exp": "દુર્બળ વિદ્યુતવિભાજ્ય માટે મોલર વાહકતા (Λₘ) અને વિઘટન ડિગ્રી (α) વચ્ચેનો સંબંધ Λₘ = αΛₘ° છે, જ્યાં Λₘ° મહત્તમ મોલર વાહકતા છે. વિઘટન પ્રક્રિયા એન્ડોથર્મિક હોવાથી તાપમાન વધારતાં સંતુલન દિશા વિઘટન તરફ વળે છે, જેથી α વધે છે. વિકલ્પ A ખોટો છે કારણ કે વિઘટન એન્ડોથર્મિક છે, નહીં કે એક્ઝોથર્મિક. વિકલ્પ B ખોટો છે કારણ કે સંબંધ Λₘ = Λₘ° - α નથી. વિકલ્પ D ખોટો છે કારણ કે વિઘટન તાપમાન પર આધારિત છે અને α અચળ રહેતું નથી.", "ref": "Std 12 - Chapter 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "નીચેના પૈકી કયા વિદ્યુતવિભાજ્ય જોડી માટે મોલર વાહકતા (Λₘ) ની કિંમત સૌથી ઓછી હશે? (સમાન સાંદ્રતા અને તાપમાન પર)", "opts": ["CH₃COONa અને NaCl", "CH₃COOH અને HCl", "CH₃COOH અને CH₃COONa", "HCl અને NaOH"], "ans": 2, "exp": "CH₃COOH દુર્બળ એસિડ છે, જ્યારે CH₃COONa પ્રબળ વિદ્યુતવિભાજ્ય છે. દુર્બળ વિદ્યુતવિભાજ્યની મોલર વાહકતા ઓછી હોવાથી CH₃COOH અને CH₃COONa જોડીની Λₘ સૌથી ઓછી હશે. વિકલ્પ A, B, અને D માં પ્રબળ વિદ્યુતવિભાજ્યોનો સમાવેશ થાય છે, જેથી તેમની Λₘ વધુ હશે.", "ref": "Std 12 - Chapter 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "એક દ્રાવણમાં બે પ્રબળ વિદ્યુતવિભાજ્ય NaCl અને KNO₃ મિશ્રિત કરવામાં આવે છે. જો તેમની સાંદ્રતા સમાન હોય, તો મિશ્રણની મોલર વાહકતા (Λₘ) કેવી રીતે બદલાશે?", "opts": ["Λₘ વધશે કારણ કે આયનોની ગતિશીલતા વધશે.", "Λₘ ઘટશે કારણ કે આયનો વચ્ચે આંતરક્રિયા વધશે.", "Λₘ અચળ રહેશે કારણ કે બંને પ્રબળ વિદ્યુતવિભાજ્ય છે.", "Λₘ ની કિંમત NaCl અથવા KNO₃ ની Λₘ ની સરેરાશ હશે."], "ans": 3, "exp": "પ્રબળ વિદ્યુતવિભાજ્યોના મિશ્રણ માટે મોલર વાહકતા (Λₘ) એ મિશ્રણમાં રહેલા વિદ્યુતવિભાજ્યોની Λₘ ની સરેરાશ હશે. આયનોની ગતિશીલતા અથવા આંતરક્રિયા પર કોઈ અસર થતી નથી કારણ કે પ્રબળ વિદ્યુતવિભાજ્યો પૂર્ણપણે વિઘટિત થાય છે. વિકલ્પ A અને B ખોટા છે કારણ કે આયનોની ગતિશીલતા અથવા આંતરક્રિયા પર કોઈ અસર થતી નથી. વિકલ્પ C ખોટો છે કારણ કે Λₘ અચળ રહેતી નથી, પરંતુ સરેરાશ હશે.", "ref": "Std 12 - Chapter 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન મોલર વાહકતા (Λₘ) અને આયનિક ગતિશીલતા (u) વચ્ચેના સંબંધ માટે ખોટું છે?", "opts": ["Λₘ = F (u₊ + u₋), જ્યાં F ફેરેડે અચળાંક છે.", "આયનિક ગતિશીલતા તાપમાન વધારતાં વધે છે.", "આયનિક ગતિશીલતા સાંદ્રતા વધારતાં વધે છે.", "Λₘ ની કિંમત આયનોની ગતિશીલતા પર આધારિત છે."], "ans": 2, "exp": "મોલર વાહકતા (Λₘ) અને આયનિક ગતિશીલતા (u) વચ્ચેનો સંબંધ Λₘ = F (u₊ + u₋) છે, જ્યાં F ફેરેડે અચળાંક છે. આયનિક ગતિશીલતા તાપમાન વધારતાં વધે છે, પરંતુ સાંદ્રતા વધારતાં ઘટે છે કારણ કે આયનો વચ્ચેની આંતરક્રિયા વધે છે. વિકલ્પ C ખોટો છે કારણ કે આયનિક ગતિશીલતા સાંદ્રતા વધારતાં ઘટે છે, નહીં કે વધે.", "ref": "Std 12 - Chapter 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "એક દુર્બળ વિદ્યુતવિભાજ્ય HX ની મોલર વાહકતા (Λₘ) 50 S cm² mol⁻¹ છે. જો તેની વિઘટન ડિગ્રી (α) 0.2 હોય, તો તેની મહત્તમ મોલર વાહકતા (Λₘ°) કેટલી હશે?", "opts": ["10 S cm² mol⁻¹", "250 S cm² mol⁻¹", "50 S cm² mol⁻¹", "100 S cm² mol⁻¹"], "ans": 1, "exp": "દુર્બળ વિદ્યુતવિભાજ્ય માટે Λₘ = αΛₘ° છે. આપેલ મૂલ્ય મુજબ Λₘ = 50 S cm² mol⁻¹ અને α = 0.2 છે. તેથી, Λₘ° = Λₘ / α = 50 / 0.2 = 250 S cm² mol⁻¹. વિકલ્પ A, C, અને D ખોટા છે કારણ કે તેમની ગણતરી સાચી નથી.", "ref": "Std 12 - Chapter 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
