<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ઉત્પ્રેરક ગુણધર્મો</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ઉત્પ્રેરક ગુણધર્મો</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ઉત્પ્રેરક ગુણધર્મો</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક ઉત્સેચક તેના પ્રક્રિયક સાથે જોડાયા બાદ તેની સક્રિયતા ગુમાવે છે, પરંતુ તે જ ઉત્સેચક બીજા પ્રક્રિયક સાથે જોડાઈને ક્રિયા કરી શકે છે. આ ઘટનાને શું કહે છે?", "opts": ["સ્પર્ધાત્મક નિગ્રહણ (Competitive Inhibition)", "બિન-સ્પર્ધાત્મક નિગ્રહણ (Non-competitive Inhibition)", "ઉત્સેચકનો પુનઃઉપયોગ (Enzyme Reusability)", "ઉત્સેચકની વિશિષ્ટતા (Enzyme Specificity)"], "ans": 0, "exp": "સ્પર્ધાત્મક નિગ્રહણમાં એક અવરોધક પ્રક્રિયક સાથે સ્પર્ધા કરીને ઉત્સેચકની સક્રિય સ્થાન પર જોડાય છે, જેના કારણે ઉત્સેચક તેના મૂળ પ્રક્રિયક સાથે ક્રિયા કરી શકતો નથી, પરંતુ બીજા પ્રક્રિયક સાથે ક્રિયા કરી શકે છે. બિન-સ્પર્ધાત્મક નિગ્રહણમાં અવરોધક ઉત્સેચકના બિન-સક્રિય સ્થાન પર જોડાય છે, જે ઉત્સેચકની સક્રિયતા સંપૂર્ણપણે ઘટાડે છે. ઉત્સેચકનો પુનઃઉપયોગ અને વિશિષ્ટતા આ ઘટનાનું યોગ્ય વર્ણન નથી. GSEB Std 12 - પ્રકરણ 9: ઉત્સેચકો", "ref": "GSEB Std 12 - પ્રકરણ 9: ઉત્સેચકો", "ch": ""}, {"q": "એક ઉત્સેચકની સક્રિયતા pH 7 પર મહત્તમ છે, પરંતુ pH 4 અને pH 10 પર તેની સક્રિયતા ઘટે છે. આ ઘટના માટે નીચેનામાંથી કયું કારણ જવાબદાર નથી?", "opts": ["ઉત્સેચકના એમિનો એસિડના આયનીકરણમાં ફેરફાર", "ઉત્સેચકના ત્રિપરિમાણીય બંધારણમાં ફેરફાર", "ઉત્સેચક અને પ્રક્રિયક વચ્ચેના હાઇડ્રોજન બંધમાં ફેરફાર", "ઉત્સેચકના સક્રિય સ્થાન પર ધાતુ આયનની હાજરી"], "ans": 3, "exp": "pH ફેરફારથી ઉત્સેચકના એમિનો એસિડના આયનીકરણમાં ફેરફાર થાય છે, જે ઉત્સેચકના ત્રિપરિમાણીય બંધારણ અને હાઇડ્રોજન બંધને અસર કરે છે. આથી ઉત્સેચકની સક્રિયતા ઘટે છે. પરંતુ ધાતુ આયનની હાજરી સામાન્ય રીતે pH ફેરફાર સાથે સીધી રીતે સંબંધિત નથી. GSEB Std 12 - પ્રકરણ 9: ઉત્સેચકો", "ref": "GSEB Std 12 - પ્રકરણ 9: ઉત્સેચકો", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઉત્સેચકના 'લૉક અને કી' મોડેલ માટે ખોટું છે?", "opts": ["ઉત્સેચક અને પ્રક્રિયકનું બંધારણ એકબીજા સાથે ચોક્કસ રીતે બંધબેસતું હોવું જોઈએ", "ઉત્સેચકનું સક્રિય સ્થાન પ્રક્રિયકના આકારને અનુરૂપ બદલાઈ શકે છે", "આ મોડેલ ઉત્સેચકની વિશિષ્ટતાનું વર્ણન કરે છે", "પ્રક્રિયક ઉત્સેચકના સક્રિય સ્થાન પર ચોક્કસ રીતે જોડાય છે"], "ans": 1, "exp": "'લૉક અને કી' મોડેલમાં ઉત્સેચકનું સક્રિય સ્થાન પ્રક્રિયકના આકારને અનુરૂપ નિશ્ચિત હોય છે અને બદલાતું નથી. 'ઇન્ડ્યુસ્ડ ફિટ' મોડેલમાં ઉત્સેચકનું સક્રિય સ્થાન પ્રક્રિયકના આકારને અનુરૂપ બદલાઈ શકે છે. GSEB Std 12 - પ્રકરણ 9: ઉત્સેચકો", "ref": "GSEB Std 12 - પ્રકરણ 9: ઉત્સેચકો", "ch": ""}, {"q": "એક ઉત્સેચકની સક્રિયતા તાપમાન વધતા વધે છે, પરંતુ 40°C પછી તેની સક્રિયતા ઝડપથી ઘટે છે. આ ઘટના માટે નીચેનામાંથી કયું કારણ જવાબદાર છે?", "opts": ["ઉત્સેચકના પ્રોટીનનું વિકૃતિકરણ (Denaturation)", "ઉત્સેચક અને પ્રક્રિયક વચ્ચેની અથડામણમાં વધારો", "ઉત્સેચકના સક્રિય સ્થાન પર પ્રક્રિયકની સાંદ્રતામાં ઘટાડો", "ઉત્સેચકના સહકારકોનું નિષ્ક્રિયકરણ"], "ans": 0, "exp": "તાપમાન વધતા ઉત્સેચકની સક્રિયતા વધે છે કારણ કે અણુઓની ગતિશક્તિ વધે છે, પરંતુ 40°C પછી ઉત્સેચકના પ્રોટીનનું વિકૃતિકરણ થાય છે, જેના કારણે તેનું ત્રિપરિમાણીય બંધારણ બગડે છે અને સક્રિયતા ઘટે છે. બાકીના વિકલ્પો આ ઘટનાનું યોગ્ય વર્ણન નથી. GSEB Std 12 - પ્રકરણ 9: ઉત્સેચકો", "ref": "GSEB Std 12 - પ્રકરણ 9: ઉત્સેચકો", "ch": ""}, {"q": "નીચેનામાંથી કયો પદાર્થ ઉત્સેચકનો સહકારક (Cofactor) નથી?", "opts": ["Zn²⁺ આયન", "NAD⁺", "એમિનો એસિડ", "FAD"], "ans": 2, "exp": "Zn²⁺ આયન, NAD⁺ અને FAD ઉત્સેચકના સહકારકો છે, જે ઉત્સેચકની સક્રિયતા માટે જરૂરી છે. એમિનો એસિડ ઉત્સેચકના બંધારણીય એકમો છે, પરંતુ તે સહકારક નથી. GSEB Std 12 - પ્રકરણ 9: ઉત્સેચકો", "ref": "GSEB Std 12 - પ્રકરણ 9: ઉત્સેચકો", "ch": ""}, {"q": "એક ઉત્પ્રેરક જે પોતાની પ્રક્રિયા દરમિયાન રાસાયણિક રીતે બદલાઈ જાય છે, પરંતુ પ્રક્રિયાના અંતે મૂળ સ્વરૂપમાં પાછો ફરે છે, તેને શું કહેવાય?", "opts": ["ઉત્સેચક (Enzyme)", "જૈવ ઉત્પ્રેરક (Biocatalyst)", "સમઉત્પ્રેરક (Homogeneous catalyst)", "વિષમઉત્પ્રેરક (Heterogeneous catalyst)"], "ans": 1, "exp": "સાચો જવાબ B) જૈવ ઉત્પ્રેરક છે. ઉત્સેચકો પ્રોટીન આધારિત જૈવ ઉત્પ્રેરકો છે જે પ્રક્રિયા દરમિયાન રાસાયણિક રીતે બદલાતા નથી અને પ્રક્રિયાના અંતે મૂળ સ્વરૂપમાં પાછા ફરે છે. સમઉત્પ્રેરક અને વિષમઉત્પ્રેરક ભૌતિક અવસ્થાના આધારે વર્ગીકરણ છે, જ્યારે ઉત્સેચક એ જૈવિક ઉત્પ્રેરક છે જે પ્રોટીન છે. તેથી A, C અને D ખોટા છે કારણ કે તેઓ ઉત્પ્રેરકના પ્રકાર અથવા ભૌતિક સ્વરૂપને દર્શાવે છે, પરંતુ પ્રશ્નમાં વર્ણવેલ ગુણધર્મ જૈવ ઉત્પ્રેરકનો છે.", "ref": "Std 11 - પ્રકરણ 9: જૈવ અણુઓ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઉત્પ્રેરકના 'ઉત્પ્રેરકીય ઝેર' (Catalytic poison) માટે ખોટું છે?", "opts": ["તે ઉત્પ્રેરકની સપાટી પર અવશોષિત થઈને તેની સક્રિયતા ઘટાડે છે", "તે ઉત્પ્રેરક સાથે રાસાયણિક સંયોજન બનાવીને તેને નિષ્ક્રિય કરે છે", "તે ઉત્પ્રેરકની સક્રિયતા વધારવામાં મદદ કરે છે", "તે ઉત્પ્રેરકના સક્રિય સ્થાનને અવરોધે છે"], "ans": 2, "exp": "સાચો જવાબ C) છે કારણ કે ઉત્પ્રેરકીય ઝેર ઉત્પ્રેરકની સક્રિયતા વધારતા નથી, પરંતુ તેને ઘટાડે છે અથવા નિષ્ક્રિય કરે છે. A, B અને D સાચા છે કારણ કે ઉત્પ્રેરકીય ઝેર ઉત્પ્રેરકની સપાટી પર અવશોષિત થઈને, રાસાયણિક સંયોજન બનાવીને અથવા સક્રિય સ્થાનને અવરોધીને તેની સક્રિયતા ઘટાડે છે.", "ref": "Std 12 - પ્રકરણ 5: પૃષ્ઠ રસાયણશાસ્ત્ર", "ch": ""}, {"q": "એક ઉત્સેચક જે પ્રોટીનનું પેપ્ટાઇડ બંધ તોડીને એમિનો એસિડમાં વિઘટન કરે છે, તેને શું કહેવાય? પરંતુ આ ઉત્સેચક પોતે પ્રોટીન નથી.", "opts": ["પ્રોટીએઝ (Protease)", "પેપ્ટિડેઝ (Peptidase)", "રિબોઝાઇમ (Ribozymes)", "લાઇપેઝ (Lipase)"], "ans": 2, "exp": "સાચો જવાબ C) રિબોઝાઇમ છે. રિબોઝાઇમ એ RNA આધારિત ઉત્સેચક છે જે પ્રોટીનનું પેપ્ટાઇડ બંધ તોડી શકે છે, પરંતુ તે પોતે પ્રોટીન નથી. પ્રોટીએઝ અને પેપ્ટિડેઝ પ્રોટીન આધારિત ઉત્સેચકો છે, જ્યારે લાઇપેઝ ચરબીનું વિઘટન કરે છે. તેથી A, B અને D ખોટા છે કારણ કે તેઓ પ્રોટીન આધારિત ઉત્સેચકો છે અથવા બિલકુલ અલગ પ્રકારના ઉત્સેચકો છે.", "ref": "Std 12 - પ્રકરણ 9: જૈવ અણુઓ", "ch": ""}, {"q": "નીચેનામાંથી કયું ઉત્પ્રેરકનું લક્ષણ નથી?", "opts": ["તે પ્રક્રિયાના સંતુલનને બદલે છે", "તે પ્રક્રિયાની સક્રિયકરણ ઊર્જા ઘટાડે છે", "તે પ્રક્રિયાના વેગને વધારે છે", "તે પ્રક્રિયાના અંતે રાસાયણિક રીતે અપરિવર્તિત રહે છે"], "ans": 0, "exp": "સાચો જવાબ A) છે કારણ કે ઉત્પ્રેરક પ્રક્રિયાના સંતુલનને બદલતા નથી, પરંતુ માત્ર પ્રક્રિયાના વેગને વધારે છે. B, C અને D સાચા છે કારણ કે ઉત્પ્રેરક સક્રિયકરણ ઊર્જા ઘટાડે છે, પ્રક્રિયાના વેગને વધારે છે અને પ્રક્રિયાના અંતે રાસાયણિક રીતે અપરિવર્તિત રહે છે.", "ref": "Std 11 - પ્રકરણ 5: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક ઉત્સેચક જે પાણીના અણુનો ઉપયોગ કરીને મોટા અણુઓને નાના અણુઓમાં તોડે છે, તેને શું કહેવાય? પરંતુ આ પ્રક્રિયા ઊર્જા મુક્ત કરતી નથી.", "opts": ["લાઇઝ (Lyase)", "હાઇડ્રોલેઝ (Hydrolase)", "લાઇગેઝ (Ligase)", "ઓક્સિડોરિડક્ટેઝ (Oxidoreductase)"], "ans": 1, "exp": "સાચો જવાબ B) હાઇડ્રોલેઝ છે. હાઇડ્રોલેઝ ઉત્સેચકો પાણીના અણુનો ઉપયોગ કરીને મોટા અણુઓને નાના અણુઓમાં તોડે છે, પરંતુ આ પ્રક્રિયા ઊર્જા મુક્ત કરતી નથી. લાઇઝ બિન-જળવિભાજનીય તોડવાની પ્રક્રિયા કરે છે, લાઇગેઝ બંધ બનાવે છે અને ઓક્સિડોરિડક્ટેઝ ઓક્સિડેશન-રિડક્શન પ્રક્રિયાઓને ઉત્પ્રેરિત કરે છે. તેથી A, C અને D ખોટા છે કારણ કે તેઓ અલગ પ્રકારની ઉત્સેચકીય પ્રક્રિયાઓ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 9: જૈવ અણુઓ", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્સેચક તેના પ્રક્રિયક સાથે જોડાયા પછી તેના સક્રિય સ્થાન પર રાસાયણિક ફેરફાર કરે છે, પરંતુ તેની ઉત્સેચકીય ક્રિયા પૂર્ણ થયા પછી મૂળ અવસ્થામાં પાછો ફરે છે?", "opts": ["કેટલેઝ (Catalase)", "હેક્સોકિનેઝ (Hexokinase)", "કાયમોટ્રિપ્સિન (Chymotrypsin)", "રિબોન્યુક્લિયેઝ (Ribonuclease)"], "ans": 2, "exp": "કાયમોટ્રિપ્સિન એક સીરિન પ્રોટીએઝ છે જે પ્રક્રિયક સાથે જોડાયા પછી તેના સક્રિય સ્થાન પર રાસાયણિક ફેરફાર કરે છે (એસિલ-એન્ઝાઇમ મધ્યવર્તી બનાવે છે), પરંતુ પ્રક્રિયા પૂર્ણ થયા પછી મૂળ અવસ્થામાં પાછો ફરે છે. કેટલેઝ, હેક્સોકિનેઝ અને રિબોન્યુક્લિયેઝમાં આવો મધ્યવર્તી તબક્કો નથી.", "ref": "Std 12 - Chapter 3: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "જો એક ઉત્સેચકની સક્રિયતા નીચેના પૈકી કયા પરિબળ દ્વારા અસર પામતી નથી, તો તે ઉત્સેચક કયા પ્રકારનો હોવો જોઈએ?", "opts": ["તાપમાન", "pH", "પ્રકાશની તીવ્રતા", "સબસ્ટ્રેટની સાંદ્રતા"], "ans": 2, "exp": "પ્રકાશની તીવ્રતા ફક્ત પ્રકાશ-નિર્ભર ઉત્સેચકો (જેમ કે રુબિસ્કો) માટે અસરકારક હોય છે. તાપમાન, pH અને સબસ્ટ્રેટની સાંદ્રતા બધા જ ઉત્સેચકોની સક્રિયતાને અસર કરે છે.", "ref": "Std 12 - Chapter 3: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "એક ઉત્સેચકની સક્રિયતા નીચેના પૈકી કયા કિસ્સામાં શૂન્ય થઈ જાય છે, પરંતુ ઉત્સેચકની રચના નષ્ટ થતી નથી?", "opts": ["ઉચ્ચ તાપમાને ગરમ કરવા પર", "ઉત્સેચકીય ઝેર (Catalytic poison)ની હાજરીમાં", "pH 2 પર", "સબસ્ટ્રેટની અતિરિક્ત સાંદ્રતામાં"], "ans": 1, "exp": "ઉત્સેચકીય ઝેર (જેમ કે સાયનાઇડ અથવા આર્સેનિક) ઉત્સેચકના સક્રિય સ્થાન સાથે કાયમી રીતે જોડાઈ જાય છે, જેનાથી સક્રિયતા શૂન્ય થઈ જાય છે, પરંતુ ઉત્સેચકની રચના નષ્ટ થતી નથી. ઉચ્ચ તાપમાને ઉત્સેચકનો નાશ થાય છે, pH 2 પર ઉત્સેચક ડીનેચર થઈ જાય છે, અને સબસ્ટ્રેટની અતિરિક્ત સાંદ્રતામાં સક્રિયતા ઘટે છે પરંતુ શૂન્ય થતી નથી.", "ref": "Std 12 - Chapter 3: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઉત્પ્રેરકના 'સક્રિય સ્થાન' (Active site) અને 'અલોસ્ટેરિક સ્થાન' (Allosteric site) વચ્ચેના તફાવતને સૌથી યોગ્ય રીતે વર્ણવે છે?", "opts": ["સક્રિય સ્થાન પ્રક્રિયક સાથે જોડાય છે, જ્યારે અલોસ્ટેરિક સ્થાન ઉત્પ્રેરકની સક્રિયતાને નિયંત્રિત કરે છે", "સક્રિય સ્થાન અને અલોસ્ટેરિક સ્થાન બંને પ્રક્રિયક સાથે જોડાય છે, પરંતુ અલોસ્ટેરિક સ્થાન પ્રક્રિયકને બદલી શકે છે", "સક્રિય સ્થાન ઉત્પ્રેરકની સક્રિયતાને નિયંત્રિત કરે છે, જ્યારે અલોસ્ટેરિક સ્થાન પ્રક્રિયક સાથે જોડાય છે", "સક્રિય સ્થાન અને અલોસ્ટેરિક સ્થાન એકબીજા સાથે સમાન છે અને બંને પ્રક્રિયક સાથે જોડાય છે"], "ans": 0, "exp": "સક્રિય સ્થાન (Active site) ઉત્પ્રેરકનું તે ભાગ છે જ્યાં પ્રક્રિયક (Substrate) જોડાય છે અને રાસાયણિક પ્રક્રિયા થાય છે. અલોસ્ટેરિક સ્થાન (Allosteric site) ઉત્પ્રેરકનું બીજું સ્થાન છે જ્યાં નિયંત્રક અણુઓ (Regulatory molecules) જોડાય છે અને ઉત્પ્રેરકની સક્રિયતાને નિયંત્રિત કરે છે. વિકલ્પ A સૌથી યોગ્ય વર્ણન આપે છે. વિકલ્પ B ખોટો છે કારણ કે અલોસ્ટેરિક સ્થાન પ્રક્રિયક સાથે જોડાતું નથી. વિકલ્પ C ખોટો છે કારણ કે સક્રિય સ્થાન પ્રક્રિયક સાથે જોડાય છે, ન કે સક્રિયતાને નિયંત્રિત કરે છે. વિકલ્પ D ખોટો છે કારણ કે બંને સ્થાનો વિવિધ કાર્યો ધરાવે છે અને સમાન નથી.", "ref": "Std 12 - Chapter 4: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "એક ઉત્પ્રેરકની સક્રિયતા નીચેના પૈકી કયા કિસ્સામાં 'ફીડબેક નિષેધ' (Feedback inhibition) દ્વારા ઘટે છે?", "opts": ["જ્યારે પ્રક્રિયકની સાંદ્રતા ખૂબ ઓછી હોય છે", "જ્યારે ઉત્પાદનની સાંદ્રતા ખૂબ વધારે હોય છે", "જ્યારે તાપમાન ખૂબ નીચું હોય છે", "જ્યારે pH ખૂબ અમ્લીય હોય છે"], "ans": 1, "exp": "ફીડબેક નિષેધ (Feedback inhibition) એ એક નિયંત્રણ યંત્ર છે જ્યાં ઉત્પાદન (Product) ઉત્પ્રેરકની સક્રિયતાને નિષ્ક્રિય કરે છે જ્યારે તેની સાંદ્રતા વધારે હોય છે. આ રીતે, કોષ ઉત્પાદનની અતિરેકને રોકે છે. વિકલ્પ B સાચો છે. વિકલ્પ A ખોટો છે કારણ કે પ્રક્રિયકની ઓછી સાંદ્રતા ઉત્પ્રેરકની સક્રિયતાને ઘટાડે છે, પરંતુ તે ફીડબેક નિષેધ નથી. વિકલ્પ C અને D ખોટા છે કારણ કે તાપમાન અને pH ઉત્પ્રેરકની સક્રિયતાને અસર કરે છે, પરંતુ તે ફીડબેક નિષેધ નથી.", "ref": "Std 12 - Chapter 4: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઉત્પ્રેરકના 'અલોસ્ટેરિક નિયંત્રણ' (Allosteric regulation) વિશે સંપૂર્ણ સાચું છે?", "opts": ["અલોસ્ટેરિક સ્થાન પર બંધાયેલા નિયામક અણુ સક્રિય સ્થાનની આકારમાં ફેરફાર કરે છે, જેથી ઉત્પ્રેરકની સક્રિયતા બદલાય છે.", "અલોસ્ટેરિક નિયંત્રણમાં ઉત્પ્રેરકની સક્રિયતા ફક્ત વર્ધન જ થાય છે, ઘટાડો થતો નથી.", "અલોસ્ટેરિક સ્થાન અને સક્રિય સ્થાન હંમેશા એકબીજાથી સંપૂર્ણ અલગ હોય છે અને કોઈપણ પરસ્પર ક્રિયા ધરાવતા નથી.", "અલોસ્ટેરિક નિયંત્રણ ફક્ત ઉત્પ્રેરકની સક્રિયતા ઘટાડવા માટે જ ઉપયોગી છે, વર્ધન માટે નહીં."], "ans": 0, "exp": "વિકલ્પ A સાચો છે કારણ કે અલોસ્ટેરિક નિયંત્રણમાં નિયામક અણુ અલોસ્ટેરિક સ્થાન પર બંધાય છે, જે સક્રિય સ્થાનની આકારમાં ફેરફાર કરે છે અને ઉત્પ્રેરકની સક્રિયતા બદલે છે. વિકલ્પ B ખોટો છે કારણ કે અલોસ્ટેરિક નિયંત્રણમાં સક્રિયતા વર્ધન અથવા ઘટાડો બંને થઈ શકે છે. વિકલ્પ C ખોટો છે કારણ કે અલોસ્ટેરિક સ્થાન અને સક્રિય સ્થાન પરસ્પર ક્રિયા ધરાવી શકે છે. વિકલ્પ D ખોટો છે કારણ કે અલોસ્ટેરિક નિયંત્રણ સક્રિયતા વર્ધન અથવા ઘટાડા બંને માટે ઉપયોગી છે.", "ref": "Std 12 - અધ્યાય 9: ઉત્પ્રેરકો અને વેગવર્ધકો", "ch": ""}, {"q": "એક ઉત્પ્રેરક તેના પ્રક્રિયક સાથે જોડાયા પછી તેની સક્રિયતા ગુમાવે છે, પરંતુ નીચેનામાંથી કયું કારણ આ માટે જવાબદાર નથી?", "opts": ["ઉત્પ્રેરકનું ડીનેચરલાઇઝેશન (Denaturation) થવું", "ઉત્પ્રેરકના સક્રિય સ્થાન પર ધાતુ આયનની હાજરી", "ઉત્પ્રેરક પર ઉચ્ચ તાપમાનની અસર", "ઉત્પ્રેરક પર pH ની અતિશય આમ્લીય અથવા ક્ષારીય અસર"], "ans": 1, "exp": "વિકલ્પ B સાચો છે કારણ કે ઉત્પ્રેરકના સક્રિય સ્થાન પર ધાતુ આયનની હાજરી ઉત્પ્રેરકની સક્રિયતા વધારે છે, ગુમાવતી નથી. વિકલ્પ A, C, અને D ખોટા છે કારણ કે ડીનેચરલાઇઝેશન, ઉચ્ચ તાપમાન, અને અતિશય pH ઉત્પ્રેરકની સક્રિયતા ગુમાવવા માટે જવાબદાર છે.", "ref": "Std 12 - અધ્યાય 9: ઉત્પ્રેરકો અને વેગવર્ધકો", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઉત્પ્રેરકના 'કોફેક્ટર' (Cofactor) અને 'કોએન્ઝાઇમ' (Coenzyme) વિશે સાચું છે?", "opts": ["કોફેક્ટર હંમેશા પ્રોટીન હોય છે, જ્યારે કોએન્ઝાઇમ હંમેશા વસા-દ્રાવ્ય હોય છે.", "કોફેક્ટર અજૈવિક પદાર્થ હોઈ શકે છે, જ્યારે કોએન્ઝાઇમ હંમેશા જૈવિક પદાર્થ હોય છે.", "કોએન્ઝાઇમ અને કોફેક્ટર બંને ઉત્પ્રેરકની સક્રિયતા ઘટાડે છે.", "કોફેક્ટર અને કોએન્ઝાઇમ બંને ઉત્પ્રેરક સાથે સ્થાયી રીતે જોડાયેલા હોય છે."], "ans": 1, "exp": "વિકલ્પ B સાચો છે કારણ કે કોફેક્ટર અજૈવિક પદાર્થ (જેમ કે ધાતુ આયન) હોઈ શકે છે, જ્યારે કોએન્ઝાઇમ હંમેશા જૈવિક પદાર્થ (જેમ કે વિટામિન) હોય છે. વિકલ્પ A ખોટો છે કારણ કે કોફેક્ટર પ્રોટીન નથી હોતું. વિકલ્પ C ખોટો છે કારણ કે કોએન્ઝાઇમ અને કોફેક્ટર ઉત્પ્રેરકની સક્રિયતા વધારે છે. વિકલ્પ D ખોટો છે કારણ કે કોફેક્ટર અને કોએન્ઝાઇમ ઉત્પ્રેરક સાથે અસ્થાયી રીતે જોડાયેલા હોઈ શકે છે.", "ref": "Std 12 - અધ્યાય 9: ઉત્પ્રેરકો અને વેગવર્ધકો", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઉત્પ્રેરકના 'વર્ણનાત્મક નિષ્ક્રિયકરણ' (Competitive inhibition) વિશે ખોટું છે?", "opts": ["નિષ્ક્રિયકરણકર્તા અણુ ઉત્પ્રેરકના સક્રિય સ્થાન પર બંધાય છે", "નિષ્ક્રિયકરણકર્તા અણુ પ્રક્રિયક સાથે રાસાયણિક રીતે સમાન હોય છે", "નિષ્ક્રિયકરણકર્તા અણુની સાંદ્રતા વધારવાથી ઉત્પ્રેરકની સક્રિયતા ઘટે છે", "નિષ્ક્રિયકરણકર્તા અણુ ઉત્પ્રેરકના અલોસ્ટેરિક સ્થાન પર બંધાય છે"], "ans": 3, "exp": "વિકલ્પ D ખોટો છે કારણ કે વર્ણનાત્મક નિષ્ક્રિયકરણમાં નિષ્ક્રિયકરણકર્તા અણુ ઉત્પ્રેરકના સક્રિય સ્થાન પર બંધાય છે, અલોસ્ટેરિક સ્થાન પર નહીં. વિકલ્પ A, B, અને C સાચા છે કારણ કે નિષ્ક્રિયકરણકર્તા અણુ સક્રિય સ્થાન પર બંધાય છે, પ્રક્રિયક સાથે સમાન હોય છે, અને તેની સાંદ્રતા વધારવાથી ઉત્પ્રેરકની સક્રિયતા ઘટે છે.", "ref": "Std 12 - અધ્યાય 9: ઉત્પ્રેરકો અને વેગવર્ધકો", "ch": ""}, {"q": "એક ઉત્સેચકની સક્રિયતા પર અસર કરતા પરિબળોના સંદર્ભમાં નીચેનામાંથી કયું વિધાન અપવાદરૂપ છે?", "opts": ["ઉત્સેચકની સક્રિયતા તેના પ્રક્રિયકની સાંદ્રતા વધતા વધે છે, પરંતુ એક નિશ્ચિત સાંદ્રતા પછી સક્રિયતા અચળ રહે છે.", "ઉત્સેચકની સક્રિયતા તાપમાન વધતા વધે છે, પરંતુ 60°C થી વધુ તાપમાને ઉત્સેચક કાયમી રીતે નિષ્ક્રિય થઈ જાય છે.", "ઉત્સેચકની સક્રિયતા pH ના ફેરફારથી અસર પામે છે, પરંતુ કેટલાક ઉત્સેચકો અત્યંત ઍસિડિક કે બેઝિક માધ્યમમાં પણ સક્રિય રહે છે.", "ઉત્સેચકની સક્રિયતા પર દબાણનો કોઈ પ્રભાવ પડતો નથી, કારણ કે ઉત્સેચકો પ્રવાહી માધ્યમમાં કાર્ય કરે છે."], "ans": 3, "exp": "સાચો જવાબ વિકલ્પ D છે. ઉત્સેચકની સક્રિયતા પર દબાણનો પ્રભાવ પડી શકે છે, ખાસ કરીને જ્યારે પ્રક્રિયામાં વાયુમય પ્રક્રિયકો અથવા નીપજો સામેલ હોય. ઉદાહરણ તરીકે, ઊંચા દબાણે કેટલાક ઉત્સેચકોની સક્રિયતા ઘટી શકે છે અથવા તેમનું બંધારણ બદલાઈ શકે છે. વિકલ્પ A, B અને C સાચા છે કારણ કે ઉત્સેચકની સક્રિયતા પ્રક્રિયકની સાંદ્રતા, તાપમાન અને pH પર આધારિત હોય છે, પરંતુ કેટલાક ઉત્સેચકો અપવાદરૂપ પરિસ્થિતિઓમાં પણ કાર્ય કરે છે.", "ref": "Std 11 - પ્રકરણ 9: જૈવ અણુઓ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
