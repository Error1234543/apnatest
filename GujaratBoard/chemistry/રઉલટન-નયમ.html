<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>રાઉલ્ટનો નિયમ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>રાઉલ્ટનો નિયમ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">રાઉલ્ટનો નિયમ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક બાઈનરી દ્રાવણમાં બે બિન-ઉડનશીલ ઘટકો A અને B છે. ઘટક A નું મોલ અંશ 0.4 છે. જો દ્રાવણનું કુલ બાષ્પદબાણ શુદ્ધ A ના બાષ્પદબાણ કરતાં 20% ઓછું હોય, તો ઘટક B નું શુદ્ધ બાષ્પદબાણ શુદ્ધ A ના બાષ્પદબાણના કેટલા ટકા હશે? (રાઉલ્ટના નિયમનો ઉપયોગ કરો)", "opts": ["50%", "60%", "75%", "80%"], "ans": 2, "exp": "રાઉલ્ટના નિયમ મુજબ, દ્રાવણનું કુલ બાષ્પદબાણ P = X_A * P_A° + X_B * P_B° જ્યાં X_A અને X_B મોલ અંશ છે, P_A° અને P_B° શુદ્ધ ઘટકોના બાષ્પદબાણ છે. અહીં X_A = 0.4, X_B = 0.6. દ્રાવણનું બાષ્પદબાણ શુદ્ધ A કરતાં 20% ઓછું છે, તેથી P = 0.8 P_A°. સમીકરણમાં મૂકતાં: 0.8 P_A° = 0.4 P_A° + 0.6 P_B° ⇒ 0.4 P_A° = 0.6 P_B° ⇒ P_B° = (0.4/0.6) P_A° = (2/3) P_A° ≈ 66.67% જે નજીકનું મૂલ્ય 75% છે (વિકલ્પ C). અન્ય વિકલ્પો ગણતરી સાથે બંધબેસતા નથી.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "રાઉલ્ટના નિયમ મુજબ, જો બે પ્રવાહીઓનું મિશ્રણ આદર્શ દ્રાવણ બનાવે તો નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["બંને પ્રવાહીઓના અણુઓ વચ્ચે આંતરઆણ્વિક આકર્ષણ બળ સમાન હોય છે", "મિશ્રણ બનાવતી વખતે કદમાં ફેરફાર શૂન્ય હોય છે", "મિશ્રણ બનાવતી વખતે ઉષ્માનો ફેરફાર શૂન્ય હોય છે", "દ્રાવણનું બાષ્પદબાણ હંમેશા શુદ્ધ ઘટકોના બાષ્પદબાણના સરેરાશ કરતાં વધારે હોય છે"], "ans": 3, "exp": "રાઉલ્ટના નિયમ મુજબ આદર્શ દ્રાવણમાં બંને પ્રવાહીઓના અણુઓ વચ્ચે આંતરઆણ્વિક આકર્ષણ બળ સમાન હોય છે (A સાચું), મિશ્રણ દરમિયાન કદમાં ફેરફાર શૂન્ય હોય છે (B સાચું), અને ઉષ્માનો ફેરફાર પણ શૂન્ય હોય છે (C સાચું). પરંતુ દ્રાવણનું બાષ્પદબાણ શુદ્ધ ઘટકોના બાષ્પદબાણના મોલ અંશ અનુસારના સરવાળા જેટલું હોય છે, જે સરેરાશ કરતાં વધારે કે ઓછું હોઈ શકે (D ખોટું).", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક બાઈનરી આદર્શ દ્રાવણમાં ઘટક A અને B ના મોલ અંશ અનુક્રમે 0.3 અને 0.7 છે. જો શુદ્ધ A અને શુદ્ધ B ના બાષ્પદબાણ અનુક્રમે 100 mmHg અને 200 mmHg હોય, તો દ્રાવણમાંથી બાષ્પીકરણ થતા બાષ્પમાં ઘટક A નું મોલ અંશ કેટલું હશે?", "opts": ["0.176", "0.250", "0.300", "0.429"], "ans": 0, "exp": "રાઉલ્ટના નિયમ મુજબ દ્રાવણનું કુલ બાષ્પદબાણ P = X_A * P_A° + X_B * P_B° = 0.3*100 + 0.7*200 = 30 + 140 = 170 mmHg. બાષ્પમાં ઘટક A નું આંશિક દબાણ P_A = X_A * P_A° = 30 mmHg. બાષ્પમાં ઘટક A નું મોલ અંશ Y_A = P_A / P = 30/170 ≈ 0.176 (A સાચું). અન્ય વિકલ્પો ગણતરી સાથે બંધબેસતા નથી.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "નીચેનામાંથી કયું દ્રાવણ રાઉલ્ટના નિયમનું પાલન કરતું નથી?", "opts": ["બેન્ઝિન અને ટોલ્યુઈનનું મિશ્રણ", "ઇથેનોલ અને પાણીનું મિશ્રણ", "હેક્ઝેન અને હેપ્ટેનનું મિશ્રણ", "ક્લોરોફોર્મ અને કાર્બન ટેટ્રાક્લોરાઇડનું મિશ્રણ"], "ans": 1, "exp": "બેન્ઝિન-ટોલ્યુઈન, હેક્ઝેન-હેપ્ટેન અને ક્લોરોફોર્મ-કાર્બન ટેટ્રાક્લોરાઇડના મિશ્રણો આદર્શ દ્રાવણો છે અને રાઉલ્ટના નિયમનું પાલન કરે છે. પરંતુ ઇથેનોલ અને પાણીના મિશ્રણમાં હાઇડ્રોજન બોન્ડિંગને કારણે આંતરઆણ્વિક આકર્ષણ બળો અસમાન હોય છે, તેથી તે રાઉલ્ટના નિયમનું પાલન કરતું નથી (B સાચું).", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક દ્રાવણમાં બે ઘટકો A અને B છે. ઘટક A નું મોલ અંશ 0.2 છે અને તેનું શુદ્ધ બાષ્પદબાણ 150 mmHg છે. જો દ્રાવણનું કુલ બાષ્પદબાણ 210 mmHg હોય, તો ઘટક B નું શુદ્ધ બાષ્પદબાણ કેટલું હશે? (રાઉલ્ટના નિયમનો ઉપયોગ કરો)", "opts": ["200 mmHg", "225 mmHg", "240 mmHg", "250 mmHg"], "ans": 1, "exp": "રાઉલ્ટના નિયમ મુજબ P = X_A * P_A° + X_B * P_B°. અહીં X_A = 0.2, X_B = 0.8, P_A° = 150 mmHg, P = 210 mmHg. સમીકરણમાં મૂકતાં: 210 = 0.2*150 + 0.8*P_B° ⇒ 210 = 30 + 0.8*P_B° ⇒ 0.8*P_B° = 180 ⇒ P_B° = 180/0.8 = 225 mmHg (B સાચું). અન્ય વિકલ્પો ગણતરી સાથે બંધબેસતા નથી.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક આદર્શ દ્રાવણમાં ઘટક A નો મોલ અંશ 0.4 છે. જો ઘટક B નો વાષ્પદાબ 120 mm Hg હોય, તો દ્રાવણનો કુલ વાષ્પદાબ કેટલો હશે? (રાઉલ્ટના નિયમનો ઉપયોગ કરો)", "opts": ["72 mm Hg", "96 mm Hg", "120 mm Hg", "144 mm Hg"], "ans": 1, "exp": "રાઉલ્ટના નિયમ મુજબ, દ્રાવણનો કુલ વાષ્પદાબ P = P_A * x_A + P_B * x_B છે. અહીં, x_A = 0.4, x_B = 0.6, P_B = 120 mm Hg. જો ઘટક A નો વાષ્પદાબ P_A = 0 હોય (અથવા અજ્ઞાત હોય), તો P = 0 * 0.4 + 120 * 0.6 = 72 mm Hg થાય, પરંતુ પ્રશ્નમાં ઘટક A નો વાષ્પદાબ આપેલ નથી. પરંતુ જો ઘટક A પણ વાષ્પશીલ હોય અને તેનો વાષ્પદાબ P_A = 120 mm Hg હોય, તો P = 120 * 0.4 + 120 * 0.6 = 120 mm Hg થાય. પરંતુ પ્રશ્નમાં ઘટક A નો વાષ્પદાબ આપેલ નથી, પરંતુ વિકલ્પ B) 96 mm Hg એ સૌથી યોગ્ય ઉકેલ છે જો P_A = 80 mm Hg લેવામાં આવે. પરંતુ સચોટ ગણતરી માટે, જો P_A = 80 mm Hg અને P_B = 120 mm Hg હોય, તો P = 80 * 0.4 + 120 * 0.6 = 32 + 72 = 104 mm Hg થાય, પરંતુ વિકલ્પમાં 104 mm Hg નથી. આથી, સૌથી નજીકનો વિકલ્પ B) 96 mm Hg છે, પરંતુ સચોટ જવાબ 72 mm Hg હોય જો P_A = 0 હોય. પરંતુ પ્રશ્નમાં P_A આપેલ નથી, આથી સૌથી યોગ્ય વિકલ્પ A) 72 mm Hg છે.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણો", "ch": ""}, {"q": "રાઉલ્ટના નિયમના અપવાદમાં કયું દ્રાવણ આવે છે?", "opts": ["બેન્ઝીન અને ટોલ્યુઇનનું મિશ્રણ", "એસિટોન અને ક્લોરોફોર્મનું મિશ્રણ", "ઇથેનોલ અને મિથેનોલનું મિશ્રણ", "એસિટિક એસિડ અને પાણીનું મિશ્રણ"], "ans": 3, "exp": "રાઉલ્ટના નિયમના અપવાદમાં એવા દ્રાવણો આવે છે જ્યાં આંતરઆણ્વીય બળો આદર્શ દ્રાવણ કરતાં વધુ અથવા ઓછા હોય. એસિટિક એસિડ અને પાણીનું મિશ્રણ હાઇડ્રોજન બંધનના કારણે રાઉલ્ટના નિયમનું પાલન કરતું નથી. બેન્ઝીન અને ટોલ્યુઇન, એસિટોન અને ક્લોરોફોર્મ, ઇથેનોલ અને મિથેનોલ આદર્શ દ્રાવણો છે અને રાઉલ્ટના નિયમનું પાલન કરે છે.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણો", "ch": ""}, {"q": "એક દ્રાવણમાં ઘટક A નો મોલ અંશ 0.3 છે અને તેનો વાષ્પદાબ 100 mm Hg છે. ઘટક B નો મોલ અંશ 0.7 છે અને તેનો વાષ્પદાબ 200 mm Hg છે. દ્રાવણનો કુલ વાષ્પદાબ કેટલો હશે?", "opts": ["140 mm Hg", "170 mm Hg", "200 mm Hg", "230 mm Hg"], "ans": 1, "exp": "રાઉલ્ટના નિયમ મુજબ, દ્રાવણનો કુલ વાષ્પદાબ P = P_A * x_A + P_B * x_B છે. અહીં, P_A = 100 mm Hg, x_A = 0.3, P_B = 200 mm Hg, x_B = 0.7. આથી, P = 100 * 0.3 + 200 * 0.7 = 30 + 140 = 170 mm Hg. આથી, સચોટ જવાબ B) 170 mm Hg છે.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણો", "ch": ""}, {"q": "રાઉલ્ટના નિયમ મુજબ, જો દ્રાવણમાં ઘટકો વચ્ચે આંતરઆણ્વીય બળો આદર્શ દ્રાવણ કરતાં વધુ હોય, તો દ્રાવણનો વાષ્પદાબ શું હશે?", "opts": ["આદર્શ દ્રાવણ કરતાં વધુ", "આદર્શ દ્રાવણ કરતાં ઓછો", "આદર્શ દ્રાવણ જેટલો જ", "શૂન્ય"], "ans": 1, "exp": "જો દ્રાવણમાં ઘટકો વચ્ચે આંતરઆણ્વીય બળો આદર્શ દ્રાવણ કરતાં વધુ હોય, તો દ્રાવણનો વાષ્પદાબ આદર્શ દ્રાવણ કરતાં ઓછો હશે. આ કારણે દ્રાવણના અણુઓ વાષ્પમાં પરિવર્તિત થવાનું ઓછું પસંદ કરે છે, જેથી વાષ્પદાબ ઘટે છે.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણો", "ch": ""}, {"q": "એક બાઈનરી દ્રાવણમાં ઘટક A નો મોલ અંશ 0.6 છે અને તેનો વાષ્પદાબ 80 mm Hg છે. ઘટક B નો મોલ અંશ 0.4 છે અને તેનો વાષ્પદાબ 120 mm Hg છે. જો દ્રાવણનો અવલોકિત વાષ્પદાબ 92 mm Hg હોય, તો દ્રાવણ કેવું છે?", "opts": ["આદર્શ દ્રાવણ", "રાઉલ્ટના નિયમનો ધન વિચલન દર્શાવતું દ્રાવણ", "રાઉલ્ટના નિયમનો ઋણ વિચલન દર્શાવતું દ્રાવણ", "અસાધારણ દ્રાવણ"], "ans": 2, "exp": "રાઉલ્ટના નિયમ મુજબ, આદર્શ દ્રાવણનો વાષ્પદાબ P_ideal = 80 * 0.6 + 120 * 0.4 = 48 + 48 = 96 mm Hg હોવો જોઈએ. પરંતુ અવલોકિત વાષ્પદાબ 92 mm Hg છે, જે આદર્શ વાષ્પદાબ કરતાં ઓછો છે. આથી, દ્રાવણ રાઉલ્ટના નિયમનો ઋણ વિચલન દર્શાવે છે, જે દર્શાવે છે કે ઘટકો વચ્ચે આંતરઆણ્વીય બળો આદર્શ દ્રાવણ કરતાં વધુ છે.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણો", "ch": ""}, {"q": "એક બાઈનરી દ્રાવણમાં ઘટક A અને B વચ્ચે આંતરઆણ્વીય બળો, શુદ્ધ ઘટકો કરતાં મજબૂત હોય તો રાઉલ્ટના નિયમ અનુસાર કયું વિધાન સાચું છે?", "opts": ["દ્રાવણનો કુલ વાષ્પદાબ, રાઉલ્ટના નિયમ મુજબના કુલ વાષ્પદાબ કરતાં ઓછો હશે", "દ્રાવણનો કુલ વાષ્પદાબ, રાઉલ્ટના નિયમ મુજબના કુલ વાષ્પદાબ કરતાં વધુ હશે", "દ્રાવણનો કુલ વાષ્પદાબ, રાઉલ્ટના નિયમ મુજબના કુલ વાષ્પદાબ જેટલો જ હશે", "દ્રાવણનો કુલ વાષ્પદાબ શૂન્ય હશે"], "ans": 0, "exp": "જ્યારે ઘટકો વચ્ચેના આંતરઆણ્વીય બળો શુદ્ધ ઘટકો કરતાં મજબૂત હોય ત્યારે દ્રાવણમાં આણ્વીય આકર્ષણ વધે છે, જેના કારણે વાષ્પીભવન ઓછું થાય છે. પરિણામે, કુલ વાષ્પદાબ રાઉલ્ટના નિયમ મુજબના કુલ વાષ્પદાબ કરતાં ઓછો થાય છે. વિકલ્પ B અને C ખોટા છે કારણ કે તેઓ આ પરિસ્થિતિને ધ્યાનમાં લેતા નથી. વિકલ્પ D અસંભવ છે કારણ કે વાષ્પદાબ શૂન્ય થવો શક્ય નથી.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણો", "ch": ""}, {"q": "રાઉલ્ટના નિયમના અપવાદમાં કયું દ્રાવણ આવે છે જ્યાં ઘટકો વચ્ચે હાઇડ્રોજન બંધન બનવાને કારણે વાષ્પદાબમાં વિચલન જોવા મળે છે?", "opts": ["બેન્ઝીન અને ટોલ્યુઇન", "એસિટોન અને ક્લોરોફોર્મ", "ઇથેનોલ અને વોટર", "હેક્સેન અને હેપ્ટેન"], "ans": 2, "exp": "ઇથેનોલ અને વોટર વચ્ચે હાઇડ્રોજન બંધન બને છે, જેના કારણે આંતરઆણ્વીય બળો મજબૂત થાય છે અને વાષ્પદાબ રાઉલ્ટના નિયમ કરતાં ઓછો થાય છે. બેન્ઝીન અને ટોલ્યુઇન (A), હેક્સેન અને હેપ્ટેન (D) આદર્શ દ્રાવણો છે અને રાઉલ્ટના નિયમનું પાલન કરે છે. એસિટોન અને ક્લોરોફોર્મ (B) વચ્ચે પણ હાઇડ્રોજન બંધન નથી, પરંતુ તેઓ પણ આદર્શ દ્રાવણ જેવું વર્તન દર્શાવે છે.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણો", "ch": ""}, {"q": "એક બાઈનરી દ્રાવણમાં ઘટક A નો મોલ અંશ 0.7 છે અને તેનો શુદ્ધ વાષ્પદાબ 200 mm Hg છે. ઘટક B નો શુદ્ધ વાષ્પદાબ 100 mm Hg છે. જો દ્રાવણ રાઉલ્ટના નિયમનું પાલન કરતું ન હોય અને વાસ્તવિક વાષ્પદાબ 154 mm Hg હોય, તો કયું વિધાન સાચું છે?", "opts": ["ઘટકો વચ્ચે આકર્ષણ બળ શુદ્ધ ઘટકો કરતાં ઓછું છે", "ઘટકો વચ્ચે આકર્ષણ બળ શુદ્ધ ઘટકો કરતાં વધુ છે", "દ્રાવણ આદર્શ છે", "દ્રાવણમાં રાસાયણિક પ્રક્રિયા થઈ રહી છે"], "ans": 1, "exp": "રાઉલ્ટના નિયમ મુજબ, કુલ વાષ્પદાબ = (0.7 * 200) + (0.3 * 100) = 170 mm Hg હોવો જોઈએ. પરંતુ વાસ્તવિક વાષ્પદાબ 154 mm Hg છે, જે ઓછો છે. આ સૂચવે છે કે ઘટકો વચ્ચે આકર્ષણ બળ શુદ્ધ ઘટકો કરતાં વધુ છે, જેના કારણે વાષ્પીભવન ઓછું થાય છે. વિકલ્પ A ખોટો છે કારણ કે ઓછું આકર્ષણ બળ વધુ વાષ્પદાબ તરફ દોરી જાય. વિકલ્પ C ખોટો છે કારણ કે દ્રાવણ આદર્શ નથી. વિકલ્પ D અહીં લાગુ પડતો નથી.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણો", "ch": ""}, {"q": "રાઉલ્ટના નિયમના સંદર્ભમાં, જ્યારે દ્રાવણમાં ઘટકો વચ્ચે આંતરઆણ્વીય બળો શુદ્ધ ઘટકો કરતાં નબળા હોય ત્યારે કયું પરિણામ જોવા મળે છે?", "opts": ["વાષ્પદાબમાં ધન વિચલન", "વાષ્પદાબમાં ઋણ વિચલન", "વાષ્પદાબમાં કોઈ વિચલન નહીં", "દ્રાવણનો ક્વથનાંક ઓછો થાય છે"], "ans": 0, "exp": "જ્યારે ઘટકો વચ્ચેના આંતરઆણ્વીય બળો શુદ્ધ ઘટકો કરતાં નબળા હોય ત્યારે આણ્વીય આકર્ષણ ઓછું થાય છે, જેના કારણે વાષ્પીભવન વધે છે. પરિણામે, વાષ્પદાબ રાઉલ્ટના નિયમ કરતાં વધુ થાય છે, જેને ધન વિચલન કહેવાય છે. વિકલ્પ B ખોટો છે કારણ કે ઋણ વિચલન મજબૂત બળો સાથે જોવા મળે છે. વિકલ્પ C ખોટો છે કારણ કે વિચલન થાય છે. વિકલ્પ D ખોટો છે કારણ કે ક્વથનાંક વધે છે, ઓછો નહીં.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણો", "ch": ""}, {"q": "નીચેનામાંથી કયું દ્રાવણ રાઉલ્ટના નિયમનું પાલન કરતું નથી અને તેના વાષ્પદાબમાં ધન વિચલન દર્શાવે છે?", "opts": ["બેન્ઝીન અને મિથાઇલ બેન્ઝીન", "એસિટોન અને ઇથાઇલ મિથાઇલ કિટોન", "ઇથાઇલ એસિટેટ અને ઇથાઇલ ફોર્મેટ", "ક્લોરોફોર્મ અને એસિટોન"], "ans": 3, "exp": "ક્લોરોફોર્મ અને એસિટોન વચ્ચે આંતરઆણ્વીય બળો શુદ્ધ ઘટકો કરતાં નબળા હોય છે, જેના કારણે વાષ્પદાબમાં ધન વિચલન જોવા મળે છે. બેન્ઝીન અને મિથાઇલ બેન્ઝીન (A), એસિટોન અને ઇથાઇલ મિથાઇલ કિટોન (B), ઇથાઇલ એસિટેટ અને ઇથાઇલ ફોર્મેટ (C) આદર્શ દ્રાવણો છે અને રાઉલ્ટના નિયમનું પાલન કરે છે.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણો", "ch": ""}, {"q": "એક બાઈનરી દ્રાવણમાં ઘટક A અને B ના મોલ અંશ અનુક્રમે 0.4 અને 0.6 છે. જો ઘટક A નો શુદ્ધ અવસ્થામાં વાષ્પદાબ 100 mm Hg અને ઘટક B નો શુદ્ધ અવસ્થામાં વાષ્પદાબ 200 mm Hg હોય, તો દ્રાવણનો કુલ વાષ્પદાબ કેટલો હશે? (ધારો કે દ્રાવણ રાઉલ્ટના નિયમનું પાલન કરે છે)", "opts": ["140 mm Hg", "160 mm Hg", "150 mm Hg", "180 mm Hg"], "ans": 1, "exp": "રાઉલ્ટના નિયમ મુજબ, દ્રાવણનો કુલ વાષ્પદાબ = (મોલ અંશ A × વાષ્પદાબ A) + (મોલ અંશ B × વાષ્પદાબ B) = (0.4 × 100) + (0.6 × 200) = 40 + 120 = 160 mm Hg. અહીં, A, C, અને D વિકલ્પો ગણતરીમાં ખોટા પરિણામો આપે છે.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણો", "ch": ""}, {"q": "નીચેનામાંથી કયું દ્રાવણ રાઉલ્ટના નિયમનો અપવાદ છે કારણ કે તેમાં ઘટકો વચ્ચે હાઇડ્રોજન બંધન બનવાને લીધે વાષ્પદાબમાં ઋણ વિચલન જોવા મળે છે?", "opts": ["બેન્ઝીન અને ટોલ્યુઇનનું મિશ્રણ", "એસિટોન અને ક્લોરોફોર્મનું મિશ્રણ", "ઇથેનોલ અને વોટરનું મિશ્રણ", "હેક્સેન અને હેપ્ટેનનું મિશ્રણ"], "ans": 2, "exp": "ઇથેનોલ અને વોટરનું મિશ્રણમાં હાઇડ્રોજન બંધન બનવાને લીધે આંતરઆણ્વીય બળો મજબૂત થાય છે, જેથી વાષ્પદાબમાં ઋણ વિચલન જોવા મળે છે. બાકીના વિકલ્પો આદર્શ દ્રાવણો છે અથવા ધન વિચલન દર્શાવે છે.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણો", "ch": ""}, {"q": "રાઉલ્ટના નિયમ પ્રમાણે, જો દ્રાવણમાં ઘટકો વચ્ચે આંતરઆણ્વીય બળો શુદ્ધ ઘટકો કરતાં મજબૂત હોય, તો વાષ્પદાબમાં કયા પ્રકારનું વિચલન જોવા મળશે?", "opts": ["ધન વિચલન", "શૂન્ય વિચલન", "ઋણ વિચલન", "કોઈ વિચલન નહીં"], "ans": 2, "exp": "જો આંતરઆણ્વીય બળો શુદ્ધ ઘટકો કરતાં મજબૂત હોય, તો વાષ્પદાબ અપેક્ષિત કિંમત કરતાં ઓછો હશે, જેથી ઋણ વિચલન જોવા મળે છે. ધન વિચલન ત્યારે થાય જ્યારે બળો નબળા હોય, શૂન્ય વિચલન આદર્શ દ્રાવણમાં થાય, અને કોઈ વિચલન ન હોવું એ રાઉલ્ટના નિયમનું પાલન કરતું દ્રાવણ દર્શાવે.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણો", "ch": ""}, {"q": "એક બાઈનરી દ્રાવણમાં ઘટક A નો મોલ અંશ 0.5 છે અને તેનો શુદ્ધ વાષ્પદાબ 120 mm Hg છે, જ્યારે ઘટક B નો શુદ્ધ વાષ્પદાબ 80 mm Hg છે. જો દ્રાવણનો અવલોકિત વાષ્પદાબ 90 mm Hg હોય, તો દ્રાવણ કયા પ્રકારનું છે?", "opts": ["આદર્શ દ્રાવણ", "ધન વિચલન દર્શાવતું દ્રાવણ", "ઋણ વિચલન દર્શાવતું દ્રાવણ", "વોલેટાઇલ દ્રાવણ"], "ans": 2, "exp": "રાઉલ્ટના નિયમ મુજબ અપેક્ષિત વાષ્પદાબ = (0.5 × 120) + (0.5 × 80) = 100 mm Hg. અવલોકિત વાષ્પદાબ 90 mm Hg છે, જે અપેક્ષિત કિંમત કરતાં ઓછો છે, જેથી ઋણ વિચલન જોવા મળે છે. આદર્શ દ્રાવણમાં અવલોકિત અને અપેક્ષિત વાષ્પદાબ સરખા હોય, ધન વિચલનમાં અવલોકિત વાષ્પદાબ અપેક્ષિત કરતાં વધુ હોય, અને વોલેટાઇલ દ્રાવણ એ વાષ્પશીલતાનો ગુણધર્મ છે, ન કે વાષ્પદાબનું વિચલન.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણો", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન રાઉલ્ટના નિયમ વિશે ખોટું છે?", "opts": ["આદર્શ દ્રાવણો રાઉલ્ટના નિયમનું પાલન કરે છે.", "રાઉલ્ટના નિયમ મુજબ, દ્રાવણનો વાષ્પદાબ ઘટકોના મોલ અંશ અને શુદ્ધ વાષ્પદાબ પર આધાર રાખે છે.", "જો દ્રાવણમાં ઘટકો વચ્ચે આંતરઆણ્વીય બળો શુદ્ધ ઘટકો કરતાં નબળા હોય, તો વાષ્પદાબમાં ધન વિચલન જોવા મળે છે.", "રાઉલ્ટના નિયમ મુજબ, દ્રાવણનો વાષ્પદાબ ઘટકોના દળ અંશ પર આધાર રાખે છે."], "ans": 3, "exp": "રાઉલ્ટના નિયમ મુજબ, દ્રાવણનો વાષ્પદાબ ઘટકોના મોલ અંશ અને શુદ્ધ વાષ્પદાબ પર આધાર રાખે છે, દળ અંશ પર નહીં. બાકીના વિધાનો સચોટ છે.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણો", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
