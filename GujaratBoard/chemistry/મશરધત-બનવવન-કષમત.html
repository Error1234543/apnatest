<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>મિશ્રધાતુ બનાવવાની ક્ષમતા</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>મિશ્રધાતુ બનાવવાની ક્ષમતા</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">મિશ્રધાતુ બનાવવાની ક્ષમતા</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ધાતુઓની મિશ્રધાતુ બનાવવાની ક્ષમતા માટે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["મિશ્રધાતુ બનાવવા માટે ધાતુઓના પરમાણુ કદમાં વધુ તફાવત હોવો જોઈએ", "મિશ્રધાતુ બનાવતી વખતે ધાતુઓની સ્ફટિક રચના સમાન હોવી જોઈએ", "મિશ્રધાતુ બનાવવા માટે ધાતુઓની વિદ્યુતઋણતા લગભગ સમાન હોવી જોઈએ", "મિશ્રધાતુમાં ધાતુઓના ગલનબિંદુમાં મોટો તફાવત હોવો જોઈએ નહીં"], "ans": 3, "exp": "સાચો જવાબ D છે. મિશ્રધાતુ બનાવવા માટે ધાતુઓના ગલનબિંદુમાં મોટો તફાવત હોવો જોઈએ નહીં એ વિધાન ખોટું છે, કારણ કે મિશ્રધાતુ બનાવવા માટે ધાતુઓના ગલનબિંદુ લગભગ સમાન હોવા જોઈએ જેથી તેઓ એકસાથે પીગળી શકે. વિકલ્પ A ખોટો છે કારણ કે પરમાણુ કદમાં વધુ તફાવત મિશ્રધાતુ બનાવવામાં અવરોધરૂપ બને છે. વિકલ્પ B સાચું છે કારણ કે સમાન સ્ફટિક રચના મિશ્રધાતુ બનાવવામાં મદદરૂપ થાય છે. વિકલ્પ C સાચું છે કારણ કે વિદ્યુતઋણતામાં વધુ તફાવત મિશ્રધાતુ બનાવવામાં અવરોધ પેદા કરે છે.", "ref": "Std 12 - પ્રકરણ 7: ધાતુઓનું રસાયણવિજ્ઞાન", "ch": ""}, {"q": "નીચેનામાંથી કઈ મિશ્રધાતુમાં તાંબુ (Cu) મુખ્ય ઘટક તરીકે હાજર નથી?", "opts": ["પિત્તળ", "કાંસું", "જર્મન સિલ્વર", "સ્ટેનલેસ સ્ટીલ"], "ans": 3, "exp": "સાચો જવાબ D છે. સ્ટેનલેસ સ્ટીલમાં તાંબુ મુખ્ય ઘટક તરીકે હાજર નથી, તે મુખ્યત્વે લોખંડ (Fe), ક્રોમિયમ (Cr) અને નિકલ (Ni)નું મિશ્રણ છે. વિકલ્પ A (પિત્તળ)માં તાંબુ અને જસત હોય છે. વિકલ્પ B (કાંસું)માં તાંબુ અને ટિન હોય છે. વિકલ્પ C (જર્મન સિલ્વર)માં તાંબુ, નિકલ અને જસત હોય છે.", "ref": "Std 12 - પ્રકરણ 7: ધાતુઓનું રસાયણવિજ્ઞાન", "ch": ""}, {"q": "મિશ્રધાતુ બનાવવાની ક્ષમતા માટે નીચેનામાંથી કયું પરિબળ સૌથી ઓછું મહત્વનું છે?", "opts": ["ધાતુઓની સ્ફટિક રચના", "ધાતુઓની વિદ્યુત વાહકતા", "ધાતુઓના પરમાણુ કદ", "ધાતુઓની વિદ્યુતઋણતા"], "ans": 1, "exp": "સાચો જવાબ B છે. મિશ્રધાતુ બનાવવામાં ધાતુઓની વિદ્યુત વાહકતા સૌથી ઓછું મહત્વનું પરિબળ છે. મિશ્રધાતુ બનાવવા માટે સ્ફટિક રચના (A), પરમાણુ કદ (C) અને વિદ્યુતઋણતા (D) વધુ મહત્વપૂર્ણ પરિબળો છે. વિદ્યુત વાહકતા મિશ્રધાતુની ભૌતિક ગુણધર્મોને અસર કરે છે, પરંતુ તે મિશ્રધાતુ બનાવવાની ક્ષમતાને સીધી રીતે અસર કરતી નથી.", "ref": "Std 12 - પ્રકરણ 7: ધાતુઓનું રસાયણવિજ્ઞાન", "ch": ""}, {"q": "નીચેનામાંથી કઈ મિશ્રધાતુ અપવાદરૂપ છે કારણ કે તે બે અધાતુઓનું મિશ્રણ છે?", "opts": ["અમલગમ", "સોલ્ડર", "ગ્રેફાઇટ-કોપર મિશ્રણ", "ડ્યુરાલ્યુમિન"], "ans": 2, "exp": "સાચો જવાબ C છે. ગ્રેફાઇટ-કોપર મિશ્રણ અપવાદરૂપ છે કારણ કે ગ્રેફાઇટ અધાતુ છે અને કોપર ધાતુ છે, પરંતુ આ મિશ્રણમાં બંને અધાતુ અને ધાતુ છે. વિકલ્પ A (અમલગમ) પારો અને અન્ય ધાતુઓનું મિશ્રણ છે. વિકલ્પ B (સોલ્ડર) ટિન અને સીસાનું મિશ્રણ છે. વિકલ્પ D (ડ્યુરાલ્યુમિન) એલ્યુમિનિયમ અને તાંબાનું મિશ્રણ છે. જોકે, સામાન્ય રીતે મિશ્રધાતુ બે કે વધુ ધાતુઓનું મિશ્રણ હોય છે, પરંતુ કેટલાક કિસ્સાઓમાં અધાતુ પણ મિશ્રણમાં હોઈ શકે છે.", "ref": "Std 12 - પ્રકરણ 7: ધાતુઓનું રસાયણવિજ્ઞાન", "ch": ""}, {"q": "મિશ્રધાતુ બનાવવાની ક્ષમતા માટે નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["મિશ્રધાતુ બનાવવાથી ધાતુઓની કઠિનતા વધે છે", "મિશ્રધાતુ બનાવવાથી ધાતુઓની વિદ્યુત વાહકતા વધે છે", "મિશ્રધાતુ બનાવવાથી ધાતુઓનું કાટ પ્રતિકારક બળ વધે છે", "મિશ્રધાતુ બનાવવાથી ધાતુઓનું ગલનબિંદુ ઘટી શકે છે"], "ans": 1, "exp": "સાચો જવાબ B છે. મિશ્રધાતુ બનાવવાથી ધાતુઓની વિદ્યુત વાહકતા વધતી નથી, તે ઘટી શકે છે. વિકલ્પ A સાચું છે કારણ કે મિશ્રધાતુ બનાવવાથી કઠિનતા વધે છે. વિકલ્પ C સાચું છે કારણ કે મિશ્રધાતુ બનાવવાથી કાટ પ્રતિકારક બળ વધે છે. વિકલ્પ D સાચું છે કારણ કે મિશ્રધાતુ બનાવવાથી ગલનબિંદુ ઘટી શકે છે.", "ref": "Std 12 - પ્રકરણ 7: ધાતુઓનું રસાયણવિજ્ઞાન", "ch": ""}, {"q": "નીચેનામાંથી કઈ મિશ્રધાતુની રચનામાં સ્ફટિકીય બંધારણમાં અંતરાલીય સ્થાન (interstitial sites) પર કાર્બન પરમાણુઓ ગોઠવાયેલા હોય છે, જે તેની કઠિનતા અને મજબૂતાઈમાં નોંધપાત્ર વધારો કરે છે?", "opts": ["પિત્તળ (Brass)", "કાંસું (Bronze)", "સ્ટેનલેસ સ્ટીલ (Stainless Steel)", "સ્ટીલ (Steel)"], "ans": 3, "exp": "સ્ટીલમાં લોખંડના સ્ફટિકીય બંધારણમાં કાર્બન પરમાણુઓ અંતરાલીય સ્થાન પર ગોઠવાય છે, જે તેની કઠિનતા અને મજબૂતાઈમાં વધારો કરે છે. પિત્તળ અને કાંસું એ તાંબા આધારિત મિશ્રધાતુઓ છે જ્યાં મુખ્યત્વે પ્રતિસ્થાપન (substitutional) પ્રકારનું મિશ્રણ થાય છે. સ્ટેનલેસ સ્ટીલમાં કાર્બનનું પ્રમાણ ઓછું હોય છે અને તેમાં ક્રોમિયમ ઉમેરવામાં આવે છે, પરંતુ તેની મુખ્ય લાક્ષણિકતા કાર્બનના અંતરાલીય સ્થાન પર આધારિત નથી.", "ref": "Std 12 - પ્રકરણ 7: ધાતુઓનું રસાયણવિજ્ઞાન", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લો અને સાચો વિકલ્પ પસંદ કરો:\n(1) મિશ્રધાતુ બનાવવાથી ધાતુની વિદ્યુતવાહકતા ઘટે છે કારણ કે અશુદ્ધિઓ ઇલેક્ટ્રોનના પ્રવાહમાં અવરોધ ઉભો કરે છે.\n(2) અમુક મિશ્રધાતુઓ જેમ કે નિક્રોમ (Nichrome) ઊંચા તાપમાને ઓક્સિડેશન સામે પ્રતિરોધકતા દર્શાવે છે, જે તેને હીટિંગ એલિમેન્ટ્સમાં ઉપયોગી બનાવે છે.\n(3) મિશ્રધાતુ બનાવવાથી ધાતુનું ગલનબિંદુ હંમેશા વધે છે કારણ કે નવા બંધ રચાય છે.", "opts": ["માત્ર (1) અને (2) સાચાં છે", "માત્ર (2) અને (3) સાચાં છે", "માત્ર (1) અને (3) સાચાં છે", "ત્રણેય સાચાં છે"], "ans": 0, "exp": "વિધાન (1) સાચું છે કારણ કે મિશ્રધાતુમાં અશુદ્ધિઓ ઇલેક્ટ્રોનના પ્રવાહમાં અવરોધ ઉભો કરે છે, જે વિદ્યુતવાહકતા ઘટાડે છે. વિધાન (2) પણ સાચું છે કારણ કે નિક્રોમ જેવી મિશ્રધાતુઓ ઊંચા તાપમાને ઓક્સિડેશન સામે પ્રતિરોધકતા દર્શાવે છે. વિધાન (3) ખોટું છે કારણ કે મિશ્રધાતુ બનાવવાથી ગલનબિંદુ ઘટી પણ શકે છે (દા.ત. સોલ્ડર).", "ref": "Std 12 - પ્રકરણ 7: ધાતુઓનું રસાયણવિજ્ઞાન", "ch": ""}, {"q": "નીચેનામાંથી કઈ મિશ્રધાતુની રચનામાં એક ઘટક ધાતુ નથી, પરંતુ તેની લાક્ષણિકતાઓ ધાતુઓ જેવી જ છે અને તેનો ઉપયોગ ઔદ્યોગિક રીતે મહત્વપૂર્ણ છે?", "opts": ["અમાલ્ગમ (Amalgam)", "સોલ્ડર (Solder)", "ડ્યુરાલ્યુમિન (Duralumin)", "ફેરોસિલિકોન (Ferrosilicon)"], "ans": 3, "exp": "ફેરોસિલિકોનમાં સિલિકોન એક અધાતુ છે, પરંતુ તેની લાક્ષણિકતાઓ ધાતુઓ જેવી જ છે અને તેનો ઉપયોગ સ્ટીલ ઉદ્યોગમાં ડીઓક્સિડાઇઝર તરીકે થાય છે. અમાલ્ગમમાં પારો (ધાતુ), સોલ્ડરમાં ટિન અને લેડ (બંને ધાતુઓ), અને ડ્યુરાલ્યુમિનમાં તાંબું અને મેગ્નેશિયમ (બંને ધાતુઓ) હોય છે.", "ref": "Std 12 - પ્રકરણ 7: ધાતુઓનું રસાયણવિજ્ઞાન", "ch": ""}, {"q": "એક ધાતુ 'X' ને કાર્બન સાથે મિશ્ર કરીને મિશ્રધાતુ બનાવવામાં આવે છે. આ મિશ્રધાતુની કઠિનતા વધારવા માટે કાર્બનનું પ્રમાણ 0.2% થી વધારીને 1.5% કરવામાં આવે છે. જો કે, કાર્બનનું પ્રમાણ 2.0% કરતાં વધુ કરવામાં આવે તો મિશ્રધાતુ બરડ બની જાય છે. અહીં ધાતુ 'X' નીચેનામાંથી કઈ હોઈ શકે?", "opts": ["તાંબું (Copper)", "લોખંડ (Iron)", "ઍલ્યુમિનિયમ (Aluminium)", "સોનું (Gold)"], "ans": 1, "exp": "લોખંડમાં કાર્બન ઉમેરવાથી સ્ટીલ બને છે, જેમાં કાર્બનનું પ્રમાણ વધારવાથી કઠિનતા વધે છે, પરંતુ 2.0% કરતાં વધુ કાર્બન ઉમેરવાથી તે બરડ બને છે (કાસ્ટ આયર્ન). તાંબું, ઍલ્યુમિનિયમ અને સોનું સાથે કાર્બન ઉમેરવાથી આવી લાક્ષણિકતાઓ જોવા મળતી નથી.", "ref": "Std 12 - પ્રકરણ 7: ધાતુઓનું રસાયણવિજ્ઞાન", "ch": ""}, {"q": "નીચેના જોડકાં ધ્યાનમાં લો અને સાચો વિકલ્પ પસંદ કરો:\n(1) પિત્તળ (Brass) - તાંબું અને ઝિંક\n(2) જર્મન સિલ્વર (German Silver) - તાંબું, નિકલ અને ઝિંક\n(3) ગનમેટલ (Gunmetal) - તાંબું, ટિન અને લેડ\n(4) સોલ્ડર (Solder) - ટિન અને એન્ટિમની", "opts": ["માત્ર (1) અને (2) સાચાં છે", "માત્ર (2) અને (3) સાચાં છે", "માત્ર (1), (2) અને (3) સાચાં છે", "ત્રણેય (1), (2), (3) અને (4) સાચાં છે"], "ans": 2, "exp": "જોડકાં (1), (2) અને (3) સાચાં છે. પિત્તળમાં તાંબું અને ઝિંક, જર્મન સિલ્વરમાં તાંબું, નિકલ અને ઝિંક, અને ગનમેટલમાં તાંબું, ટિન અને લેડ હોય છે. જોડકું (4) ખોટું છે કારણ કે સોલ્ડરમાં સામાન્ય રીતે ટિન અને લેડ હોય છે, એન્ટિમની નહીં.", "ref": "Std 12 - પ્રકરણ 7: ધાતુઓનું રસાયણવિજ્ઞાન", "ch": ""}, {"q": "નીચેનામાંથી કઈ મિશ્રધાતુની રચનામાં ધાતુ અને અધાતુ બંનેનો સમાવેશ થાય છે, પરંતુ તેની લાક્ષણિકતાઓ પૂરેપૂરી ધાતુ જેવી હોય છે?", "opts": ["સ્ટીલ (Steel)", "પિત્તળ (Brass)", "કાંસું (Bronze)", "ડ્યુરાલ્યુમિન (Duralumin)"], "ans": 0, "exp": "સ્ટીલ (Steel) એ લોખંડ (Fe) અને કાર્બન (C) નું મિશ્રણ છે, જેમાં કાર્બન અધાતુ છે. પરંતુ સ્ટીલની લાક્ષણિકતાઓ (જેવી કે કઠિનતા, તાકાત, અને ચુંબકીય ગુણધર્મો) પૂરેપૂરી ધાતુ જેવી હોય છે. પિત્તળ (Brass) એ તાંબુ (Cu) અને જસત (Zn) નું મિશ્રણ છે, જેમાં બંને ધાતુઓ છે. કાંસું (Bronze) એ તાંબુ (Cu) અને કલાઈ (Sn) નું મિશ્રણ છે, જેમાં બંને ધાતુઓ છે. ડ્યુરાલ્યુમિન (Duralumin) એ એલ્યુમિનિયમ (Al), તાંબુ (Cu), મેગ્નેશિયમ (Mg), અને મેંગેનીઝ (Mn) નું મિશ્રણ છે, જેમાં બધી જ ધાતુઓ છે. આથી, સ્ટીલ એ એકમાત્ર વિકલ્પ છે જેમાં અધાતુ (કાર્બન)નો સમાવેશ થાય છે.", "ref": "Std 12 - Chapter 1: ધાતુશાસ્ત્ર (Metallurgy)", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન મિશ્રધાતુની રચના અને તેની ક્ષમતા વિશે ખોટું છે?", "opts": ["મિશ્રધાતુની રચના માટે ધાતુઓની પરમાણુ ત્રિજ્યા નજીકની હોવી જરૂરી છે.", "મિશ્રધાતુ બનાવવા માટે ધાતુઓની વીજભારિતા (electronegativity)માં મોટો તફાવત હોવો જોઈએ.", "મિશ્રધાતુની કઠિનતા તેના ઘટક ધાતુઓ કરતાં વધુ હોય છે.", "મિશ્રધાતુની રચનામાં અંતરાલીય સ્થાનો પર નાના પરમાણુઓ (જેવા કે કાર્બન) બેસી શકે છે."], "ans": 1, "exp": "મિશ્રધાતુ બનાવવા માટે ધાતુઓની વીજભારિતામાં મોટો તફાવત હોવો જરૂરી નથી. ઉલટાનું, વીજભારિતામાં ઓછો તફાવત હોવો જરૂરી છે, કારણ કે તે ધાતુઓ વચ્ચે સજાતીય મિશ્રણ (homogeneous mixture) બનાવવામાં મદદ કરે છે. પરમાણુ ત્રિજ્યા નજીકની હોવી (A), કઠિનતા વધુ હોવી (C), અને અંતરાલીય સ્થાનો પર નાના પરમાણુઓ બેસી શકવા (D) એ બધા સાચા વિધાનો છે.", "ref": "Std 12 - Chapter 1: ધાતુશાસ્ત્ર (Metallurgy)", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન મિશ્રધાતુની ક્ષમતા વિશે સાચું નથી?", "opts": ["મિશ્રધાતુની રચના માટે ધાતુઓની સ્ફટિકીય બંધારણ સરખું હોવું જરૂરી છે.", "મિશ્રધાતુની રચનામાં ધાતુઓની પરમાણુ ત્રિજ્યા 15% કરતાં ઓછા તફાવત સાથે હોવી જોઈએ.", "મિશ્રધાતુની રચના માટે ધાતુઓની વીજભારિતામાં મોટો તફાવત હોવો જરૂરી છે.", "મિશ્રધાતુની રચનામાં ધાતુઓની વેલેન્સી (valence) સરખી હોવી જરૂરી નથી."], "ans": 2, "exp": "મિશ્રધાતુની રચના માટે ધાતુઓની વીજભારિતામાં મોટો તફાવત હોવો જરૂરી નથી. ઉલટાનું, વીજભારિતામાં ઓછો તફાવત હોવો જરૂરી છે, કારણ કે તે ધાતુઓ વચ્ચે સજાતીય મિશ્રણ બનાવવામાં મદદ કરે છે. સ્ફટિકીય બંધારણ સરખું હોવું (A), પરમાણુ ત્રિજ્યા 15% કરતાં ઓછા તફાવત સાથે હોવી (B), અને વેલેન્સી સરખી હોવી જરૂરી નથી (D) એ બધા સાચા વિધાનો છે.", "ref": "Std 12 - Chapter 1: ધાતુશાસ્ત્ર (Metallurgy)", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લઈને સાચો વિકલ્પ પસંદ કરો:\n(1) મિશ્રધાતુ બનાવવાની ક્ષમતા મુખ્યત્વે ધાતુઓના પરમાણ્વીય ત્રિજ્યાના તફાવત પર આધારિત છે.\n(2) અંતરાલીય મિશ્રધાતુમાં નાના પરમાણુઓ મોટા પરમાણુઓના સ્ફટિકીય બંધારણના ખાલી સ્થાનોમાં ગોઠવાય છે.\n(3) સ્થાનાંતરીય મિશ્રધાતુમાં બંને ઘટક ધાતુઓના પરમાણુઓ એકબીજાના સ્થાને ગોઠવાય છે, પરંતુ આ માટે તેમની વિદ્યુતઋણતા સમાન હોવી જરૂરી છે.\n(4) મિશ્રધાતુ બનાવવાથી ધાતુની વિદ્યુતવાહકતા હંમેશા ઘટે છે.", "opts": ["વિધાન (1), (2) અને (3) સાચાં છે, પરંતુ (4) ખોટું છે.", "વિધાન (1) અને (2) સાચાં છે, પરંતુ (3) અને (4) ખોટાં છે.", "વિધાન (2) અને (4) સાચાં છે, પરંતુ (1) અને (3) ખોટાં છે.", "વિધાન (1), (3) અને (4) સાચાં છે, પરંતુ (2) ખોટું છે."], "ans": 1, "exp": "વિધાન (1) સાચું છે કારણ કે મિશ્રધાતુ બનાવવાની ક્ષમતા ધાતુઓના પરમાણ્વીય ત્રિજ્યાના તફાવત પર આધારિત છે. વિધાન (2) પણ સાચું છે કારણ કે અંતરાલીય મિશ્રધાતુમાં નાના પરમાણુઓ (જેમ કે કાર્બન) મોટા પરમાણુઓના સ્ફટિકીય બંધારણના ખાલી સ્થાનોમાં ગોઠવાય છે. વિધાન (3) ખોટું છે કારણ કે સ્થાનાંતરીય મિશ્રધાતુ માટે વિદ્યુતઋણતા સમાન હોવી જરૂરી નથી, પરંતુ પરમાણ્વીય ત્રિજ્યા સમાન હોવી જરૂરી છે. વિધાન (4) ખોટું છે કારણ કે મિશ્રધાતુ બનાવવાથી વિદ્યુતવાહકતા હંમેશા ઘટતી નથી, કેટલીક મિશ્રધાતુઓમાં તે વધી પણ શકે છે (દા.ત. કેટલીક કોપર મિશ્રધાતુઓ).", "ref": "Std 12 - પ્રકરણ 7: ધાતુઓનું રસાયણવિજ્ઞાન", "ch": ""}, {"q": "નીચેનામાંથી કઈ મિશ્રધાતુની રચના અને તેની લાક્ષણિકતાઓ માટેનું કારણ અલગ છે? (અપવાદરૂપ કિસ્સો)", "opts": ["સ્ટીલ (Steel) - કાર્બન અંતરાલીય સ્થાનોમાં ગોઠવાય છે.", "પિત્તળ (Brass) - તાંબુ અને જસતના પરમાણુઓ સ્થાનાંતરીય રીતે ગોઠવાય છે.", "કાંસું (Bronze) - તાંબુ અને ટિનના પરમાણુઓ સ્થાનાંતરીય રીતે ગોઠવાય છે.", "અમાલ્ગમ (Amalgam) - પારો અન્ય ધાતુઓ સાથે રાસાયણિક સંયોજન બનાવે છે."], "ans": 3, "exp": "સ્ટીલ, પિત્તળ અને કાંસું એ સ્થાનાંતરીય અથવા અંતરાલીય મિશ્રધાતુઓ છે, જ્યાં પરમાણુઓ ભૌતિક રીતે ગોઠવાય છે. જ્યારે અમાલ્ગમમાં પારો અન્ય ધાતુઓ સાથે રાસાયણિક સંયોજન બનાવે છે, જે તેને અલગ બનાવે છે. આથી અમાલ્ગમ એ અપવાદરૂપ કિસ્સો છે કારણ કે તે રાસાયણિક બંધન દ્વારા બને છે, નહીં કે માત્ર ભૌતિક ગોઠવણી દ્વારા.", "ref": "Std 12 - પ્રકરણ 7: ધાતુઓનું રસાયણવિજ્ઞાન", "ch": ""}, {"q": "નીચેનામાંથી કઈ મિશ્રધાતુની રચનામાં એક ઘટક તરીકે મર્ક્યુરી (Hg)નો સમાવેશ થાય છે, જે સામાન્ય તાપમાને પ્રવાહી સ્વરૂપે હોય છે?", "opts": ["સ્ટેનલેસ સ્ટીલ", "એમલગમ", "બ્રોન્ઝ", "ડ્યુરાલ્યુમિન"], "ans": 1, "exp": "એમલગમ એ મર્ક્યુરી (Hg) અને અન્ય ધાતુઓ (જેમ કે ચાંદી, ટિન અથવા ઝિંક)નું મિશ્રણ છે. મર્ક્યુરી સામાન્ય તાપમાને પ્રવાહી સ્વરૂપે હોય છે, તેથી તે મિશ્રધાતુમાં પ્રવાહી ઘટક તરીકે હાજર હોય છે. સ્ટેનલેસ સ્ટીલમાં આયર્ન, ક્રોમિયમ અને નિકલ હોય છે; બ્રોન્ઝમાં તાંબુ અને ટિન હોય છે; ડ્યુરાલ્યુમિનમાં એલ્યુમિનિયમ અને કોપર હોય છે, જેમાં મર્ક્યુરી હાજર નથી.", "ref": "Std 12 - પ્રકરણ 6: ધાતુઓ અને અધાતુઓના સામાન્ય ગુણધર્મો", "ch": ""}, {"q": "નીચેનામાંથી કઈ મિશ્રધાતુની રચનામાં કાર્બનનું પ્રમાણ સૌથી વધુ હોય છે, જે તેને ખૂબ જ કઠિન અને બરડ બનાવે છે?", "opts": ["પિત્તળ (Brass)", "કાંસું (Bronze)", "સ્ટીલ", "કાસ્ટ આયર્ન"], "ans": 3, "exp": "કાસ્ટ આયર્નમાં કાર્બનનું પ્રમાણ સૌથી વધુ (2% થી 4%) હોય છે, જે તેને ખૂબ જ કઠિન અને બરડ બનાવે છે. સ્ટીલમાં કાર્બનનું પ્રમાણ ઓછું (0.2% થી 2.1%) હોય છે. પિત્તળ અને કાંસામાં કાર્બન હાજર હોતો નથી, તેમાં અનુક્રમે તાંબુ-ઝિંક અને તાંબુ-ટિન હોય છે.", "ref": "Std 12 - પ્રકરણ 6: ધાતુઓ અને અધાતુઓના સામાન્ય ગુણધર્મો", "ch": ""}, {"q": "નીચેના જોડકાં ધ્યાનમાં લો અને સાચો વિકલ્પ પસંદ કરો:\n(1) નિક્રોમ - ઉચ્ચ પ્રતિરોધકતા\n(2) ગનમેટલ - તાંબુ અને ઝિંક\n(3) સોલ્ડર - નીચું ગલનબિંદુ\n(4) ડ્યુરાલ્યુમિન - હલકું વજન અને મજબૂતાઈ", "opts": ["માત્ર (1) અને (3) સાચાં છે", "માત્ર (1), (3) અને (4) સાચાં છે", "માત્ર (2) અને (4) સાચાં છે", "માત્ર (1), (2) અને (3) સાચાં છે"], "ans": 1, "exp": "જોડકું (1) સાચું છે કારણ કે નિક્રોમ ઉચ્ચ પ્રતિરોધકતા ધરાવે છે. જોડકું (3) સાચું છે કારણ કે સોલ્ડરનું ગલનબિંદુ નીચું હોય છે. જોડકું (4) સાચું છે કારણ કે ડ્યુરાલ્યુમિન હલકું વજન અને મજબૂતાઈ ધરાવે છે. જોડકું (2) ખોટું છે કારણ કે ગનમેટલમાં તાંબુ અને ટિન હોય છે, ઝિંક નહીં.", "ref": "Std 12 - પ્રકરણ 6: ધાતુઓ અને અધાતુઓના સામાન્ય ગુણધર્મો", "ch": ""}, {"q": "એક ધાતુ 'M' ને કાર્બન સાથે મિશ્ર કરીને મિશ્રધાતુ બનાવવામાં આવે છે. આ મિશ્રધાતુની કઠિનતા વધે છે, પરંતુ તેની વિદ્યુતવાહકતા ઘટે છે. નીચેનામાંથી કઈ ધાતુ 'M' હોઈ શકે છે?", "opts": ["તાંબુ (Cu)", "લોખંડ (Fe)", "ઝિંક (Zn)", "એલ્યુમિનિયમ (Al)"], "ans": 1, "exp": "લોખંડ (Fe) ને કાર્બન સાથે મિશ્ર કરીને સ્ટીલ બનાવવામાં આવે છે, જેની કઠિનતા વધે છે પરંતુ વિદ્યુતવાહકતા ઘટે છે. તાંબુ, ઝિંક અને એલ્યુમિનિયમને કાર્બન સાથે મિશ્ર કરવાથી આવા ગુણધર્મો મળતા નથી. સ્ટીલ એ લોખંડ અને કાર્બનનું મિશ્રણ છે, જે આ લક્ષણો દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 6: ધાતુઓ અને અધાતુઓના સામાન્ય ગુણધર્મો", "ch": ""}, {"q": "નીચેના પૈકી કઈ મિશ્રધાતુની રચનામાં એક ઘટક તરીકે સિલિકોન (Si)નો સમાવેશ થાય છે, જે સામાન્ય રીતે અધાતુ તરીકે વર્ગીકૃત થાય છે, પરંતુ મિશ્રધાતુમાં તે ધાતુ જેવી વર્તણૂક દર્શાવે છે અને તેની વિદ્યુતવાહકતા વધારે છે?", "opts": ["સ્ટેનલેસ સ્ટીલ (Stainless Steel)", "સિલુમિન (Silumin)", "બ્રોન્ઝ (Bronze)", "ડ્યુરાલ્યુમિન (Duralumin)"], "ans": 1, "exp": "સિલુમિન (Silumin) એ એલ્યુમિનિયમ (Al) અને સિલિકોન (Si)ની મિશ્રધાતુ છે. સિલિકોન અધાતુ હોવા છતાં, આ મિશ્રધાતુમાં તે ધાતુ જેવી વર્તણૂક દર્શાવે છે અને મિશ્રધાતુની મજબૂતાઈ તેમજ વિદ્યુતવાહકતા વધારે છે. સ્ટેનલેસ સ્ટીલમાં ક્રોમિયમ (Cr) અને નિકલ (Ni) હોય છે, બ્રોન્ઝમાં તાંબુ (Cu) અને ટિન (Sn) હોય છે, જ્યારે ડ્યુરાલ્યુમિનમાં તાંબુ (Cu) અને મેંગેનીઝ (Mn) હોય છે. આથી વિકલ્પ B સાચો છે.", "ref": "Std 12 - પ્રકરણ 7: ધાતુઓ અને અધાતુઓના ગુણધર્મો અને ઉપયોગો", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
