<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>સ્ફટિક ક્ષેત્ર સિદ્ધાંત (CFT)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>સ્ફટિક ક્ષેત્ર સિદ્ધાંત (CFT)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">સ્ફટિક ક્ષેત્ર સિદ્ધાંત (CFT)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક d⁶ આયન ઓક્ટાહેડ્રલ સંકીર્ણમાં નિર્બળ ક્ષેત્ર લિગેન્ડની હાજરીમાં કયો ઇલેક્ટ્રોનીય રચના ધરાવે છે?", "opts": ["t₂g⁴ eg²", "t₂g⁵ eg¹", "t₂g³ eg³", "t₂g⁶ eg⁰"], "ans": 2, "exp": "નિર્બળ ક્ષેત્ર લિગેન્ડમાં ક્રિસ્ટલ ફિલ્ડ સ્પ્લિટિંગ એનર્જી (Δ₀) ઓછી હોય છે, તેથી ઇલેક્ટ્રોન યુગ્મીકરણને બદલે eg ઓર્બિટલમાં પ્રવેશે છે. d⁶ આયન માટે, હુંડના નિયમ મુજબ t₂g³ eg³ રચના મળે છે. વિકલ્પ A અને B માં યુગ્મીકરણ વધારે છે જે નિર્બળ ક્ષેત્ર માટે યોગ્ય નથી, જ્યારે D માં બધા ઇલેક્ટ્રોન યુગ્મિત છે જે પ્રબળ ક્ષેત્રમાં જ શક્ય છે.", "ref": "Std 12 - પ્રકરણ 9: સવર્ગ સંયોજનો", "ch": ""}, {"q": "નીચેના પૈકી કયું સંકીર્ણ [CoF₆]³⁻ ની ચુંબકીય પ્રકૃતિ અને રંગ સમજાવવા માટે સ્ફટિક ક્ષેત્ર સિદ્ધાંતનો ઉપયોગ કરે છે?", "opts": ["તે પ્રતિચુંબકીય અને રંગવિહીન છે", "તે અનુચુંબકીય અને વાદળી રંગનું છે", "તે અનુચુંબકીય અને ગુલાબી રંગનું છે", "તે પ્રતિચુંબકીય અને લીલા રંગનું છે"], "ans": 1, "exp": "[CoF₆]³⁻ માં Co³⁺ (d⁶) નિર્બળ ક્ષેત્ર લિગેન્ડ F⁻ ની હાજરીમાં t₂g⁴ eg² રચના ધરાવે છે, જેમાં ચાર અયુગ્મિત ઇલેક્ટ્રોન હોય છે તેથી તે અનુચુંબકીય છે. d-d સંક્રમણને કારણે તે વાદળી રંગ દર્શાવે છે. વિકલ્પ A અને D પ્રતિચુંબકીયતા દર્શાવે છે જે ખોટું છે, જ્યારે C ગુલાબી રંગ Co²⁺ ના સંકીર્ણો માટે લાક્ષણિક છે.", "ref": "Std 12 - પ્રકરણ 9: સવર્ગ સંયોજનો", "ch": ""}, {"q": "સ્ફટિક ક્ષેત્ર સિદ્ધાંત મુજબ, [Ti(H₂O)₆]³⁺ નો રંગ જાંબલી કેમ દેખાય છે?", "opts": ["તે લીલા પ્રકાશનું શોષણ કરીને તેની પૂરક તરંગલંબાઈનું ઉત્સર્જન કરે છે", "તે પીળા પ્રકાશનું શોષણ કરીને જાંબલી રંગ ઉત્પન્ન કરે છે", "તે લાલ પ્રકાશનું શોષણ કરીને જાંબલી રંગ દર્શાવે છે", "તે વાદળી પ્રકાશનું શોષણ કરીને તેની પૂરક તરંગલંબાઈ દર્શાવે છે"], "ans": 3, "exp": "[Ti(H₂O)₆]³⁺ માં Ti³⁺ (d¹) t₂g¹ eg⁰ રચના ધરાવે છે. તે લીલા-પીળા પ્રકાશ (≈500 nm) નું શોષણ કરીને t₂g → eg સંક્રમણ કરે છે, જેની પૂરક તરંગલંબાઈ જાંબલી રંગ (≈400 nm) છે. વિકલ્પ A લીલા પ્રકાશના શોષણથી લાલ રંગ મળે, B પીળા પ્રકાશના શોષણથી વાદળી રંગ મળે, અને C લાલ પ્રકાશના શોષણથી લીલો રંગ મળે જે ખોટા છે.", "ref": "Std 12 - પ્રકરણ 9: સવર્ગ સંયોજનો", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન સ્ફટિક ક્ષેત્ર સિદ્ધાંતની મર્યાદા દર્શાવે છે?", "opts": ["તે સંકીર્ણ સંયોજનોના ચુંબકીય ગુણધર્મો સમજાવી શકતું નથી", "તે લિગેન્ડ અને ધાતુ આયન વચ્ચેના સહસંયોજક બંધનને સમજાવી શકતું નથી", "તે માત્ર ઓક્ટાહેડ્રલ સંકીર્ણો માટે જ લાગુ પડે છે", "તે સંકીર્ણ સંયોજનોના રંગ સમજાવી શકતું નથી"], "ans": 1, "exp": "સ્ફટિક ક્ષેત્ર સિદ્ધાંત માત્ર આયનીય આંતરક્રિયાઓને ધ્યાનમાં લે છે અને લિગેન્ડ-ધાતુ વચ્ચેના સહસંયોજક બંધનને સમજાવી શકતું નથી. વિકલ્પ A ખોટું છે કારણ કે તે ચુંબકીય ગુણધર્મો સમજાવી શકે છે, C ખોટું છે કારણ કે તે ચતુલકીય અને સમતલીય સંકીર્ણો માટે પણ લાગુ પડે છે, અને D ખોટું છે કારણ કે તે રંગ સમજાવવામાં સક્ષમ છે.", "ref": "Std 12 - પ્રકરણ 9: સવર્ગ સંયોજનો", "ch": ""}, {"q": "એક d⁴ આયન પ્રબળ ક્ષેત્ર લિગેન્ડ ધરાવતા ઓક્ટાહેડ્રલ સંકીર્ણમાં કઈ ઇલેક્ટ્રોનીય રચના ધરાવે છે અને તેની ચુંબકીય પ્રકૃતિ શું હશે?", "opts": ["t₂g⁴ eg⁰, પ્રતિચુંબકીય", "t₂g³ eg¹, અનુચુંબકીય", "t₂g⁴ eg⁰, અનુચુંબકીય", "t₂g² eg², અનુચુંબકીય"], "ans": 0, "exp": "પ્રબળ ક્ષેત્ર લિગેન્ડમાં Δ₀ વધારે હોય છે, તેથી ઇલેક્ટ્રોન યુગ્મીકરણ પસંદ કરે છે. d⁴ આયન માટે t₂g⁴ eg⁰ રચના મળે છે જેમાં બધા ઇલેક્ટ્રોન યુગ્મિત હોય છે, તેથી તે પ્રતિચુંબકીય છે. વિકલ્પ B અને D માં અયુગ્મિત ઇલેક્ટ્રોન છે જે પ્રબળ ક્ષેત્ર માટે યોગ્ય નથી, જ્યારે C માં રચના સાચી છે પણ ચુંબકીય પ્રકૃતિ ખોટી છે.", "ref": "Std 12 - પ્રકરણ 9: સવર્ગ સંયોજનો", "ch": ""}, {"q": "સ્ફટિક ક્ષેત્ર સિદ્ધાંત અનુસાર, [Co(NH3)6]3+ સંકીર્ણમાં કોબાલ્ટ આયનની d-ઇલેક્ટ્રોનની વિતરણ રચના કઈ હશે, જ્યારે NH3 પ્રબળ ક્ષેત્ર લિગેન્ડ હોવાનું જાણીતું છે?", "opts": ["t2g^6 eg^0", "t2g^4 eg^2", "t2g^5 eg^1", "t2g^3 eg^3"], "ans": 0, "exp": "પ્રબળ ક્ષેત્ર લિગેન્ડ (NH3) હોવાથી, d-ઇલેક્ટ્રોનો નીચા ઉર્જા સ્તરના t2g ઓર્બિટલમાં જોડી બનાવીને ભરાય છે. Co3+ આયનમાં 6 d-ઇલેક્ટ્રોન હોવાથી, તમામ ઇલેક્ટ્રોનો t2g ઓર્બિટલમાં ભરાય છે, જેથી રચના t2g^6 eg^0 થાય છે. બાકીના વિકલ્પો (B, C, D) અપૂર્ણ જોડી વિતરણ અથવા ઉચ્ચ ઉર્જા સ્તરના eg ઓર્બિટલમાં ઇલેક્ટ્રોનની હાજરી દર્શાવે છે, જે પ્રબળ ક્ષેત્ર લિગેન્ડ માટે યોગ્ય નથી.", "ref": "Std 12 - Chapter 9: સંકીર્ણ યોજનાઓ (Co-ordination Compounds)", "ch": ""}, {"q": "સ્ફટિક ક્ષેત્ર સિદ્ધાંત મુજબ, નીચેના પૈકી કયું સંકીર્ણ અચુંબકીય (Diamagnetic) હશે?", "opts": ["[Fe(CN)6]4−", "[FeF6]3−", "[CoF6]3−", "[NiCl4]2−"], "ans": 0, "exp": "[Fe(CN)6]4− સંકીર્ણમાં Fe2+ આયન હોવાથી 6 d-ઇલેક્ટ્રોન છે. CN− પ્રબળ ક્ષેત્ર લિગેન્ડ હોવાથી, તમામ ઇલેક્ટ્રોનો જોડી બનાવીને t2g ઓર્બિટલમાં ભરાય છે (t2g^6 eg^0), જેથી કોઈ અયુગ્મ ઇલેક્ટ્રોન રહેતા નથી અને સંકીર્ણ અચુંબકીય બને છે. બાકીના વિકલ્પો (B, C, D) નીરબળ ક્ષેત્ર લિગેન્ડ અથવા અયુગ્મ ઇલેક્ટ્રોન ધરાવે છે, જેથી તેઓ ચુંબકીય હશે.", "ref": "Std 12 - Chapter 9: સંકીર્ણ યોજનાઓ (Co-ordination Compounds)", "ch": ""}, {"q": "સ્ફટિક ક્ષેત્ર સિદ્ધાંત અનુસાર, [Cr(H2O)6]3+ સંકીર્ણનો રંગ કયા કારણે ઉત્પન્ન થાય છે?", "opts": ["d-d સંક્રમણ (t2g → eg)", "σ → σ* સંક્રમણ", "π → π* સંક્રમણ", "લિગેન્ડથી ધાતુ આયન તરફ ચાર્જ ટ્રાન્સફર"], "ans": 0, "exp": "[Cr(H2O)6]3+ સંકીર્ણમાં Cr3+ આયનમાં 3 d-ઇલેક્ટ્રોન છે. H2O નીરબળ ક્ષેત્ર લિગેન્ડ હોવાથી, ઇલેક્ટ્રોનો t2g ઓર્બિટલમાં ભરાય છે. પ્રકાશ શોષણ થતાં, ઇલેક્ટ્રોન t2g ઓર્બિટલથી eg ઓર્બિટલમાં ઉત્તેજિત થાય છે (d-d સંક્રમણ), જેથી રંગ ઉત્પન્ન થાય છે. બાકીના વિકલ્પો (B, C, D) સંકીર્ણના રંગ માટે યોગ્ય કારણ નથી.", "ref": "Std 12 - Chapter 9: સંકીર્ણ યોજનાઓ (Co-ordination Compounds)", "ch": ""}, {"q": "સ્ફટિક ક્ષેત્ર સિદ્ધાંત મુજબ, નીચેના પૈકી કયું વિધાન [Ni(CN)4]2− સંકીર્ણ માટે સાચું છે?", "opts": ["તે ચતુષ્ફલકીય (Tetrahedral) રચના ધરાવે છે અને ચુંબકીય છે.", "તે ચતુષ્ફલકીય રચના ધરાવે છે અને અચુંબકીય છે.", "તે ચોરસ સમતલીય (Square Planar) રચના ધરાવે છે અને અચુંબકીય છે.", "તે ચોરસ સમતલીય રચના ધરાવે છે અને ચુંબકીય છે."], "ans": 2, "exp": "[Ni(CN)4]2− સંકીર્ણમાં Ni2+ આયન હોવાથી 8 d-ઇલેક્ટ્રોન છે. CN− પ્રબળ ક્ષેત્ર લિગેન્ડ હોવાથી, સંકીર્ણ ચોરસ સમતલીય (Square Planar) રચના ધરાવે છે અને તમામ ઇલેક્ટ્રોનો જોડી બનાવીને ભરાય છે, જેથી તે અચુંબકીય બને છે. વિકલ્પ A અને B ચતુષ્ફલકીય રચના દર્શાવે છે, જે આ સંકીર્ણ માટે યોગ્ય નથી. વિકલ્પ D ચુંબકીય હોવાનું દર્શાવે છે, જે ખોટું છે.", "ref": "Std 12 - Chapter 9: સંકીર્ણ યોજનાઓ (Co-ordination Compounds)", "ch": ""}, {"q": "સ્ફટિક ક્ષેત્ર સિદ્ધાંત અનુસાર, [MnCl4]2− સંકીર્ણની ચુંબકીય પ્રકૃતિ કઈ હશે?", "opts": ["અચુંબકીય (Diamagnetic)", "અનુચુંબકીય (Paramagnetic) અને 5 અયુગ્મ ઇલેક્ટ્રોન ધરાવે છે.", "અનુચુંબકીય (Paramagnetic) અને 3 અયુગ્મ ઇલેક્ટ્રોન ધરાવે છે.", "અનુચુંબકીય (Paramagnetic) અને 1 અયુગ્મ ઇલેક્ટ્રોન ધરાવે છે."], "ans": 1, "exp": "[MnCl4]2− સંકીર્ણમાં Mn2+ આયન હોવાથી 5 d-ઇલેક્ટ્રોન છે. Cl− નીરબળ ક્ષેત્ર લિગેન્ડ હોવાથી, સંકીર્ણ ચતુષ્ફલકીય રચના ધરાવે છે અને તમામ 5 ઇલેક્ટ્રોન અયુગ્મ રહે છે, જેથી તે અનુચુંબકીય (Paramagnetic) બને છે અને 5 અયુગ્મ ઇલેક્ટ્રોન ધરાવે છે. બાકીના વિકલ્પો (A, C, D) અયુગ્મ ઇલેક્ટ્રોનની સંખ્યા અથવા ચુંબકીય પ્રકૃતિ બાબતે ખોટા છે.", "ref": "Std 12 - Chapter 9: સંકીર્ણ યોજનાઓ (Co-ordination Compounds)", "ch": ""}, {"q": "સ્ફટિક ક્ષેત્ર સિદ્ધાંત (CFT) અનુસાર, [Fe(CN)₆]⁴⁻ અને [Fe(H₂O)₆]²⁺ સંકીર્ણોમાં આયર્ન આયનની d-ઇલેક્ટ્રોન વિતરણ રચના અનુક્રમે કઈ હશે? (Fe નો પરમાણુ ક્રમાંક = 26)", "opts": ["t₂g⁶eg⁰, t₂g⁴eg²", "t₂g⁵eg¹, t₂g⁴eg²", "t₂g⁶eg⁰, t₂g⁵eg¹", "t₂g⁴eg², t₂g⁶eg⁰"], "ans": 0, "exp": "[Fe(CN)₆]⁴⁻ સંકીર્ણમાં CN⁻ પ્રબળ ક્ષેત્ર લિગેન્ડ હોવાથી d⁶ ઇલેક્ટ્રોનનું વિતરણ t₂g⁶eg⁰ થશે (નિમ્ન સ્પિન). [Fe(H₂O)₆]²⁺ સંકીર્ણમાં H₂O નિર્બળ ક્ષેત્ર લિગેન્ડ હોવાથી d⁶ ઇલેક્ટ્રોનનું વિતરણ t₂g⁴eg² થશે (ઉચ્ચ સ્પિન). વિકલ્પ A આ વિતરણને સાચું દર્શાવે છે. અન્ય વિકલ્પો ખોટા વિતરણ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 9: સવર્ગ સંયોજનો", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન સ્ફટિક ક્ષેત્ર સિદ્ધાંતની મર્યાદા નથી, પરંતુ તેની વિશેષતા છે?", "opts": ["તે સંકીર્ણ સંયોજનોના ચુંબકીય ગુણધર્મો સમજાવી શકતું નથી.", "તે માત્ર આયનીય સંકીર્ણો માટે જ લાગુ પડે છે, સહસંયોજક સંકીર્ણો માટે નહીં.", "તે સંકીર્ણ સંયોજનોના રંગ અને ચુંબકીય ગુણધર્મોનું સ્પષ્ટીકરણ આપે છે.", "તે લિગેન્ડ અને ધાતુ આયન વચ્ચેના π-બંધનને સમજાવી શકતું નથી."], "ans": 2, "exp": "સ્ફટિક ક્ષેત્ર સિદ્ધાંત સંકીર્ણ સંયોજનોના રંગ અને ચુંબકીય ગુણધર્મોનું સ્પષ્ટીકરણ આપવામાં સક્ષમ છે, જે તેની વિશેષતા છે. વિકલ્પ C આ વિશેષતાને દર્શાવે છે. અન્ય વિકલ્પો સિદ્ધાંતની મર્યાદાઓ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 9: સવર્ગ સંયોજનો", "ch": ""}, {"q": "સ્ફટિક ક્ષેત્ર સિદ્ધાંત અનુસાર, [CoCl₄]²⁻ સંકીર્ણમાં કોબાલ્ટ આયનની d-ઇલેક્ટ્રોન વિતરણ રચના કઈ હશે અને તેની ભૂમિતિ કઈ હશે? (Co નો પરમાણુ ક્રમાંક = 27)", "opts": ["t₂g⁵eg², ચતુષ્કોણીય", "e⁴t₂³, ચતુષ્કોણીય", "t₂g⁶eg¹, અષ્ટફલકીય", "e³t₂⁴, ચતુષ્કોણીય"], "ans": 1, "exp": "[CoCl₄]²⁻ સંકીર્ણમાં Co²⁺ આયન d⁷ રચના ધરાવે છે અને Cl⁻ નિર્બળ ક્ષેત્ર લિગેન્ડ હોવાથી ચતુષ્કોણીય ભૂમિતિ ધરાવે છે. ચતુષ્કોણીય ક્ષેત્રમાં d-ઇલેક્ટ્રોનનું વિતરણ e⁴t₂³ થશે. વિકલ્પ B આ વિતરણ અને ભૂમિતિને સાચું દર્શાવે છે. અન્ય વિકલ્પો ખોટા વિતરણ અથવા ભૂમિતિ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 9: સવર્ગ સંયોજનો", "ch": ""}, {"q": "નીચેના પૈકી કયું સંકીર્ણ સ્ફટિક ક્ષેત્ર સિદ્ધાંત અનુસાર અપેક્ષિત રંગ દર્શાવતું નથી?", "opts": ["[Cu(NH₃)₄]²⁺ - ઘેરો વાદળી", "[Ni(CN)₄]²⁻ - રંગવિહીન", "[Cr(H₂O)₆]³⁺ - જાંબલી", "[Mn(H₂O)₆]²⁺ - ગુલાબી"], "ans": 1, "exp": "[Ni(CN)₄]²⁻ સંકીર્ણમાં Ni²⁺ આયન d⁸ રચના ધરાવે છે અને CN⁻ પ્રબળ ક્ષેત્ર લિગેન્ડ હોવાથી તે ચતુષ્કોણીય સમતલીય ભૂમિતિ ધરાવે છે. આ સંકીર્ણમાં d-d સંક્રમણ શક્ય ન હોવાથી તે રંગવિહીન હોવું જોઈએ, પરંતુ વાસ્તવમાં તે પીળો રંગ દર્શાવે છે, જે સ્ફટિક ક્ષેત્ર સિદ્ધાંતથી સમજાવી શકાતું નથી. અન્ય વિકલ્પો અપેક્ષિત રંગ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 9: સવર્ગ સંયોજનો", "ch": ""}, {"q": "સ્ફટિક ક્ષેત્ર સિદ્ધાંત અનુસાર, [V(H₂O)₆]³⁺ સંકીર્ણમાં વેનેડિયમ આયનની d-ઇલેક્ટ્રોન વિતરણ રચના t₂g²eg⁰ છે. આ સંકીર્ણનો રંગ કયા કારણે ઉત્પન્ન થાય છે અને તેની ચુંબકીય પ્રકૃતિ કઈ હશે? (V નો પરમાણુ ક્રમાંક = 23)", "opts": ["d-d સંક્રમણ, અનુચુંબકીય", "લિગેન્ડથી ધાતુ ચાર્જ ટ્રાન્સફર, અનુચુંબકીય", "d-d સંક્રમણ, અચુંબકીય", "ધાતુથી લિગેન્ડ ચાર્જ ટ્રાન્સફર, અચુંબકીય"], "ans": 0, "exp": "[V(H₂O)₆]³⁺ સંકીર્ણમાં V³⁺ આયન d² રચના ધરાવે છે અને t₂g²eg⁰ વિતરણ હોવાથી તેમાં બે અયુગ્મિત ઇલેક્ટ્રોન હાજર છે, જે તેને અનુચુંબકીય બનાવે છે. આ સંકીર્ણનો રંગ d-d સંક્રમણને કારણે ઉત્પન્ન થાય છે. વિકલ્પ A આ બંને બાબતોને સાચું દર્શાવે છે. અન્ય વિકલ્પો ખોટી માહિતી આપે છે.", "ref": "Std 12 - પ્રકરણ 9: સવર્ગ સંયોજનો", "ch": ""}, {"q": "સ્ફટિક ક્ષેત્ર સિદ્ધાંત અનુસાર, [CoF6]3− અને [Co(NH3)6]3+ સંકીર્ણોમાં કોબાલ્ટ આયનની d-ઇલેક્ટ્રોન રચના અનુક્રમે કઈ હશે?", "opts": ["t2g6eg0 અને t2g4eg2", "t2g4eg2 અને t2g6eg0", "t2g5eg1 અને t2g6eg0", "t2g6eg0 અને t2g5eg1"], "ans": 1, "exp": "સ્ફટિક ક્ષેત્ર સિદ્ધાંત મુજબ, F− નિર્બળ ક્ષેત્ર લિગેન્ડ છે, જ્યારે NH3 પ્રબળ ક્ષેત્ર લિગેન્ડ છે. [CoF6]3−માં Co3+ (d6) ની રચના t2g4eg2 (ઉચ્ચ સ્પિન) હશે, જ્યારે [Co(NH3)6]3+માં રચના t2g6eg0 (નીચ સ્પિન) હશે. અહીં, A, C, અને D વિકલ્પો લિગેન્ડની પ્રકૃતિ અને ઇલેક્ટ્રોન વિતરણની અચોક્કસ સમજ દર્શાવે છે.", "ref": "Std 12 - Chapter 9: સંકીર્ણ યોગિકો અને વર્ગીકરણ", "ch": ""}, {"q": "સ્ફટિક ક્ષેત્ર સિદ્ધાંત અનુસાર, નીચેના પૈકી કયું સંકીર્ણ ટેટ્રાહેડ્રલ જ્યોમેટ્રી ધરાવે છે અને પરમાણુ ક્રમ 23 ધરાવે છે?", "opts": ["[Cr(NH3)6]3+", "[MnCl4]2−", "[Fe(CN)6]4−", "[CoF6]3−"], "ans": 1, "exp": "[MnCl4]2− સંકીર્ણ ટેટ્રાહેડ્રલ જ્યોમેટ્રી ધરાવે છે અને Mn2+ આયનનો પરમાણુ ક્રમ 25 છે, પરંતુ Cl− લિગેન્ડ નિર્બળ હોવાથી તે ટેટ્રાહેડ્રલ રચના બનાવે છે. બાકીના સંકીર્ણો ઓક્ટાહેડ્રલ છે. A, C, અને D વિકલ્પો ઓક્ટાહેડ્રલ જ્યોમેટ્રી ધરાવે છે.", "ref": "Std 12 - Chapter 9: સંકીર્ણ યોગિકો અને વર્ગીકરણ", "ch": ""}, {"q": "સ્ફટિક ક્ષેત્ર સિદ્ધાંત અનુસાર, નીચેના પૈકી કયું વિધાન [NiCl4]2− સંકીર્ણ માટે સાચું નથી?", "opts": ["તે ટેટ્રાહેડ્રલ જ્યોમેટ્રી ધરાવે છે", "તે પરમાણુ ક્રમ 28 ધરાવે છે", "તે અચુંબકીય છે", "તે નીલો રંગ ધરાવે છે"], "ans": 2, "exp": "[NiCl4]2− સંકીર્ણ ટેટ્રાહેડ્રલ જ્યોમેટ્રી ધરાવે છે, Ni2+નો પરમાણુ ક્રમ 28 છે, અને તે નીલો રંગ ધરાવે છે. પરંતુ તે ચુંબકીય છે (2 અયુગ્મિત ઇલેક્ટ્રોન), અચુંબકીય નથી. A, B, અને D વિધાનો સાચા છે.", "ref": "Std 12 - Chapter 9: સંકીર્ણ યોગિકો અને વર્ગીકરણ", "ch": ""}, {"q": "સ્ફટિક ક્ષેત્ર સિદ્ધાંત અનુસાર, નીચેના પૈકી કયું સંકીર્ણ d2sp3 સંકરણ ધરાવે છે અને અચુંબકીય છે?", "opts": ["[Co(NH3)6]3+", "[Fe(CN)6]4−", "[Cr(CO)6]", "[Ni(CN)4]2−"], "ans": 0, "exp": "[Co(NH3)6]3+ સંકીર્ણ d2sp3 સંકરણ ધરાવે છે અને અચુંબકીય છે, કારણ કે Co3+ (d6) ની ઇલેક્ટ્રોન રચના t2g6eg0 છે. બાકીના સંકીર્ણો અચુંબકીય નથી અથવા ભિન્ન સંકરણ ધરાવે છે. B, C, અને D વિકલ્પો અચુંબકીય નથી અથવા ભિન્ન સંકરણ ધરાવે છે.", "ref": "Std 12 - Chapter 9: સંકીર્ણ યોગિકો અને વર્ગીકરણ", "ch": ""}, {"q": "સ્ફટિક ક્ષેત્ર સિદ્ધાંત અનુસાર, નીચેના પૈકી કયું સંકીર્ણ સૌથી વધુ સ્થિર હશે?", "opts": ["[CoF6]3−", "[Co(NH3)6]3+", "[Co(H2O)6]3+", "[Co(CN)6]3−"], "ans": 3, "exp": "સ્ફટિક ક્ષેત્ર સિદ્ધાંત અનુસાર, સ્થિરતા લિગેન્ડની પ્રબળતા પર આધારિત છે. CN− સૌથી પ્રબળ ક્ષેત્ર લિગેન્ડ છે, જેથી [Co(CN)6]3− સૌથી વધુ સ્થિર હશે. A, B, અને C વિકલ્પો નિર્બળ લિગેન્ડ ધરાવે છે, જેથી ઓછા સ્થિર છે.", "ref": "Std 12 - Chapter 9: સંકીર્ણ યોગિકો અને વર્ગીકરણ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
