<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ઇંધણ કોષ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ઇંધણ કોષ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ઇંધણ કોષ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક ઇંધણ કોષમાં હાઇડ્રોજન અને ઓક્સિજન વચ્ચેની પ્રક્રિયા દરમિયાન નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["આ પ્રક્રિયા વિદ્યુતરાસાયણિક છે અને તેમાં ઇલેક્ટ્રોનનું વહન થાય છે", "કેથોડ પર ઓક્સિજનનું રિડક્શન થઈ પાણી બને છે", "એનોડ પર હાઇડ્રોજનનું ઓક્સિડેશન થઈ પ્રોટોન અને ઇલેક્ટ્રોન છૂટા પડે છે", "આ પ્રક્રિયામાં ઉત્પન્ન થતી ઉષ્મા સીધી વિદ્યુત ઊર્જામાં રૂપાંતરિત થાય છે"], "ans": 3, "exp": "સાચો જવાબ D છે. ઇંધણ કોષમાં ઉત્પન્ન થતી ઉષ્મા સીધી વિદ્યુત ઊર્જામાં રૂપાંતરિત થતી નથી, પરંતુ વિદ્યુતરાસાયણિક પ્રક્રિયા દ્વારા રાસાયણિક ઊર્જા સીધી વિદ્યુત ઊર્જામાં ફેરવાય છે. A, B અને C વિધાનો સાચાં છે કારણ કે ઇંધણ કોષમાં ઇલેક્ટ્રોનનું વહન થાય છે, કેથોડ પર ઓક્સિજનનું રિડક્શન થાય છે અને એનોડ પર હાઇડ્રોજનનું ઓક્સિડેશન થાય છે.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણ", "ch": ""}, {"q": "ઇંધણ કોષમાં ઉપયોગમાં લેવાતા વિદ્યુતવિભાજ્ય (electrolyte) માટે નીચેના પૈકી કયું લક્ષણ જરૂરી નથી?", "opts": ["તે પ્રોટોનનું વહન કરી શકે તેવું હોવું જોઈએ", "તે ઉચ્ચ તાપમાને સ્થિર હોવું જોઈએ", "તે ઇલેક્ટ્રોનનું વહન કરી શકે તેવું હોવું જોઈએ", "તે રાસાયણિક રીતે નિષ્ક્રિય હોવું જોઈએ"], "ans": 2, "exp": "સાચો જવાબ C છે. ઇંધણ કોષમાં વિદ્યુતવિભાજ્ય ઇલેક્ટ્રોનનું વહન કરી શકે તેવું હોવું જરૂરી નથી, કારણ કે ઇલેક્ટ્રોન બાહ્ય પરિપથમાંથી વહે છે. વિદ્યુતવિભાજ્ય માત્ર પ્રોટોનનું વહન કરે છે. A, B અને D લક્ષણો જરૂરી છે કારણ કે પ્રોટોનનું વહન, ઉચ્ચ તાપમાને સ્થિરતા અને રાસાયણિક નિષ્ક્રિયતા ઇંધણ કોષની કાર્યક્ષમતા માટે મહત્વપૂર્ણ છે.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણ", "ch": ""}, {"q": "એક પ્રોટોન-વિનિમય પટલ (PEM) ઇંધણ કોષમાં નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["PEM કોષમાં પ્લેટિનમ ઉત્પ્રેરક તરીકે ઉપયોગમાં લેવાય છે", "PEM કોષ 100°Cથી નીચા તાપમાને કાર્ય કરે છે", "PEM કોષમાં પાણીની વરાળ ઉત્પન્ન થાય છે જેને દૂર કરવી જરૂરી છે", "PEM કોષમાં કાર્બન ડાયોક્સાઇડ ઉત્પન્ન થાય છે જે પર્યાવરણ માટે હાનિકારક છે"], "ans": 3, "exp": "સાચો જવાબ D છે. PEM ઇંધણ કોષમાં કાર્બન ડાયોક્સાઇડ ઉત્પન્ન થતો નથી, કારણ કે તેમાં હાઇડ્રોજન અને ઓક્સિજન વચ્ચે પ્રક્રિયા થાય છે જેમાં માત્ર પાણી ઉત્પન્ન થાય છે. A, B અને C વિધાનો સાચાં છે કારણ કે PEM કોષમાં પ્લેટિનમ ઉત્પ્રેરક તરીકે વપરાય છે, તે નીચા તાપમાને કાર્ય કરે છે અને તેમાં પાણીની વરાળ ઉત્પન્ન થાય છે જેને દૂર કરવી પડે છે.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણ", "ch": ""}, {"q": "ઇંધણ કોષની કાર્યક્ષમતા વધારવા માટે નીચેના પૈકી કયું પગલું અસરકારક નથી?", "opts": ["ઉત્પ્રેરકની સપાટીનું ક્ષેત્રફળ વધારવું", "વિદ્યુતવિભાજ્યની જાડાઈ વધારવી", "કાર્યકારી તાપમાનમાં વધારો કરવો", "હાઇડ્રોજન અને ઓક્સિજનના દબાણમાં વધારો કરવો"], "ans": 1, "exp": "સાચો જવાબ B છે. વિદ્યુતવિભાજ્યની જાડાઈ વધારવાથી પ્રોટોનના વહનમાં અવરોધ વધે છે, જે ઇંધણ કોષની કાર્યક્ષમતા ઘટાડે છે. A, C અને D પગલાં અસરકારક છે કારણ કે ઉત્પ્રેરકની સપાટી વધારવાથી પ્રક્રિયા દર વધે છે, તાપમાન વધારવાથી પ્રક્રિયા ઝડપી બને છે અને દબાણ વધારવાથી પ્રક્રિયકોની સાંદ્રતા વધે છે.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણ", "ch": ""}, {"q": "એક આલ્કલાઇન ઇંધણ કોષ (AFC)માં નીચેના પૈકી કયું વિધાન સાચું નથી?", "opts": ["AFCમાં પોટેશિયમ હાઇડ્રોક્સાઇડ (KOH) વિદ્યુતવિભાજ્ય તરીકે ઉપયોગમાં લેવાય છે", "AFCમાં કાર્બન ડાયોક્સાઇડની હાજરી કોષની કાર્યક્ષમતા ઘટાડે છે", "AFCમાં હાઇડ્રોજન અને ઓક્સિજન વચ્ચેની પ્રક્રિયા દરમિયાન પાણી ઉત્પન્ન થાય છે", "AFCમાં પ્લેટિનમ ઉત્પ્રેરક તરીકે ઉપયોગમાં લેવાય છે અને તે ખૂબ જ સસ્તું છે"], "ans": 3, "exp": "સાચો જવાબ D છે. AFCમાં પ્લેટિનમ ઉત્પ્રેરક તરીકે વપરાય છે, પરંતુ તે ખૂબ જ મોંઘું છે, સસ્તું નથી. A, B અને C વિધાનો સાચાં છે કારણ કે AFCમાં KOH વિદ્યુતવિભાજ્ય તરીકે વપરાય છે, કાર્બન ડાયોક્સાઇડની હાજરી કોષની કાર્યક્ષમતા ઘટાડે છે અને પ્રક્રિયા દરમિયાન પાણી ઉત્પન્ન થાય છે.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણ", "ch": ""}, {"q": "એક ઇંધણ કોષમાં હાઇડ્રોજનનું ઓક્સિડેશન એનોડ પર થાય છે અને ઇલેક્ટ્રોન બહારના પરિપથમાંથી પસાર થાય છે. આ પ્રક્રિયા દરમિયાન નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["એનોડ પર હાઇડ્રોજન અણુઓનું પ્રોટોન અને ઇલેક્ટ્રોનમાં વિભાજન થાય છે.", "પ્રોટોન વિદ્યુતવિભાજ્ય દ્વારા કેથોડ તરફ ગતિ કરે છે.", "ઇલેક્ટ્રોન બાહ્ય પરિપથમાંથી પસાર થઈને કેથોડ પર પહોંચે છે અને ઓક્સિજનનું રિડક્શન કરે છે.", "કેથોડ પર પ્રોટોન અને ઇલેક્ટ્રોનનું સંયોજન થઈને હાઇડ્રોજન વાયુ ઉત્પન્ન થાય છે."], "ans": 3, "exp": "સાચો જવાબ D છે કારણ કે કેથોડ પર પ્રોટોન, ઇલેક્ટ્રોન અને ઓક્સિજનનું સંયોજન થઈને પાણી (H₂O) ઉત્પન્ન થાય છે, હાઇડ્રોજન વાયુ નહીં. વિકલ્પ A, B અને C ઇંધણ કોષની સાચી કાર્યપદ્ધતિ દર્શાવે છે. વિકલ્પ D ખોટો છે કારણ કે હાઇડ્રોજન વાયુનું ઉત્પાદન કેથોડ પર થતું નથી.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણવિજ્ઞાન", "ch": ""}, {"q": "એક સોલિડ ઓક્સાઇડ ઇંધણ કોષ (SOFC)માં નીચેના પૈકી કયું વિધાન સાચું નથી?", "opts": ["SOFC ઊંચા તાપમાને (800-1000°C) કાર્ય કરે છે.", "SOFCમાં વિદ્યુતવિભાજ્ય તરીકે સિરામિક પદાર્થ (જેમ કે YSZ) વપરાય છે.", "SOFCમાં હાઇડ્રોજન અને ઓક્સિજન વચ્ચેની પ્રક્રિયા દરમિયાન કાર્બન ડાયોક્સાઇડ ઉત્પન્ન થાય છે.", "SOFCની કાર્યક્ષમતા અન્ય ઇંધણ કોષો કરતાં વધુ હોય છે."], "ans": 2, "exp": "સાચો જવાબ C છે કારણ કે SOFCમાં હાઇડ્રોજન અને ઓક્સિજન વચ્ચેની પ્રક્રિયા દરમિયાન પાણી (H₂O) ઉત્પન્ન થાય છે, કાર્બન ડાયોક્સાઇડ નહીં. જો ઇંધણ તરીકે હાઇડ્રોકાર્બન વપરાય તો જ CO₂ ઉત્પન્ન થાય છે. વિકલ્પ A, B અને D SOFCના સાચા લક્ષણો દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણવિજ્ઞાન", "ch": ""}, {"q": "ઇંધણ કોષની કાર્યક્ષમતા પર નીચેના પૈકી કયા પરિબળનો સૌથી ઓછો પ્રભાવ પડે છે?", "opts": ["વિદ્યુતવિભાજ્યની વાહકતા", "ઇંધણ કોષનું કાર્યકારી તાપમાન", "ઇલેક્ટ્રોડની સપાટીનું ક્ષેત્રફળ", "ઇંધણ કોષના બાહ્ય પરિપથનો રંગ"], "ans": 3, "exp": "સાચો જવાબ D છે કારણ કે ઇંધણ કોષના બાહ્ય પરિપથનો રંગ તેની કાર્યક્ષમતા પર કોઈ અસર કરતો નથી. વિકલ્પ A, B અને C ઇંધણ કોષની કાર્યક્ષમતા પર સીધી અસર કરે છે. વિદ્યુતવિભાજ્યની વાહકતા, કાર્યકારી તાપમાન અને ઇલેક્ટ્રોડનું ક્ષેત્રફળ પ્રક્રિયા દર અને ઊર્જા રૂપાંતરણને પ્રભાવિત કરે છે.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણવિજ્ઞાન", "ch": ""}, {"q": "એક ડાયરેક્ટ મિથેનોલ ઇંધણ કોષ (DMFC)માં નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["DMFCમાં મિથેનોલનું સીધું ઓક્સિડેશન થાય છે.", "DMFCમાં વિદ્યુતવિભાજ્ય તરીકે પ્રોટોન-વિનિમય પટલ (PEM) વપરાય છે.", "DMFCમાં કાર્બન મોનોક્સાઇડ (CO) મુખ્ય ઉપપેદાશ તરીકે ઉત્પન્ન થાય છે.", "DMFCની કાર્યક્ષમતા હાઇડ્રોજન ઇંધણ કોષ કરતાં ઓછી હોય છે."], "ans": 2, "exp": "સાચો જવાબ C છે કારણ કે DMFCમાં મુખ્ય ઉપપેદાશ તરીકે કાર્બન ડાયોક્સાઇડ (CO₂) અને પાણી (H₂O) ઉત્પન્ન થાય છે, કાર્બન મોનોક્સાઇડ (CO) નહીં. વિકલ્પ A, B અને D DMFCના સાચા લક્ષણો દર્શાવે છે. CO સામાન્ય રીતે હાઇડ્રોકાર્બનના અપૂર્ણ દહનમાં ઉત્પન્ન થાય છે, DMFCમાં નહીં.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણવિજ્ઞાન", "ch": ""}, {"q": "ઇંધણ કોષમાં 'પોલેરાઇઝેશન' (polarization) નામની ઘટના માટે નીચેના પૈકી કયું કારણ જવાબદાર નથી?", "opts": ["ઇલેક્ટ્રોડ પર પ્રક્રિયકોની સાંદ્રતામાં ઘટાડો", "ઇલેક્ટ્રોડની સપાટી પર ઉત્પાદનોનું સંચય", "વિદ્યુતવિભાજ્યની વાહકતામાં વધારો", "ઇલેક્ટ્રોડની સપાટી પર ઉત્સેચકીય પ્રક્રિયાનો ધીમો દર"], "ans": 2, "exp": "સાચો જવાબ C છે કારણ કે વિદ્યુતવિભાજ્યની વાહકતામાં વધારો ઇંધણ કોષની કાર્યક્ષમતા વધારે છે, પોલેરાઇઝેશનનું કારણ નથી. પોલેરાઇઝેશન માટે જવાબદાર કારણોમાં પ્રક્રિયકોની સાંદ્રતામાં ઘટાડો (A), ઉત્પાદનોનું સંચય (B) અને ઉત્સેચકીય પ્રક્રિયાનો ધીમો દર (D) સામેલ છે.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણવિજ્ઞાન", "ch": ""}, {"q": "ઇંધણ કોષમાં વપરાતા ઉત્સેચક તરીકે પ્લેટિનમ (Pt) નો ઉપયોગ કયા પ્રક્રિયામાં થાય છે?", "opts": ["હાઇડ્રોજન ગેસનું ઓક્સિડેશન", "ઓક્સિજન ગેસનું રિડક્શન", "હાઇડ્રોજન અને ઓક્સિજન વચ્ચેની પ્રક્રિયામાં ઇલેક્ટ્રોન વહન", "વિદ્યુતવિભાજ્યમાં આયનની ગતિ વધારવા"], "ans": 1, "exp": "પ્લેટિનમ (Pt) ઉત્સેચક તરીકે ઇંધણ કોષમાં ઓક્સિજન ગેસના રિડક્શન પ્રક્રિયામાં ઉપયોગી છે. હાઇડ્રોજનનું ઓક્સિડેશન સામાન્ય રીતે પ્લેટિનમ અથવા પેલેડિયમ જેવા ઉત્સેચકો દ્વારા થાય છે, પરંતુ ઓક્સિજનના રિડક્શન માટે પ્લેટિનમ વધુ અસરકારક છે. ઇલેક્ટ્રોન વહન અને આયનની ગતિ માટે ઉત્સેચકની જરૂરિયાત નથી, પરંતુ વિદ્યુતવિભાજ્યની ગુણવત્તા અને પટલની સંરચના મહત્વની ભૂમિકા ભજવે છે.", "ref": "Std 12 - Chapter 13: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "સોલિડ ઓક્સાઇડ ઇંધણ કોષ (SOFC)માં વિદ્યુતવિભાજ્ય તરીકે કયો પદાર્થ વપરાય છે?", "opts": ["સલ્ફ્યુરિક એસિડ (H₂SO₄)", "પોટેશિયમ હાઇડ્રોક્સાઇડ (KOH)", "ઝિર્કોનિયા (ZrO₂) અને યટ્રિયા (Y₂O₃) નું મિશ્રણ", "ફોસ્ફોરિક એસિડ (H₃PO₄)"], "ans": 2, "exp": "SOFCમાં વિદ્યુતવિભાજ્ય તરીકે ઝિર્કોનિયા (ZrO₂) અને યટ્રિયા (Y₂O₃) નું મિશ્રણ વપરાય છે, જે ઉચ્ચ તાપમાને ઓક્સાઇડ આયન (O²⁻) નું વહન સક્ષમ બનાવે છે. સલ્ફ્યુરિક એસિડ, પોટેશિયમ હાઇડ્રોક્સાઇડ, અને ફોસ્ફોરિક એસિડ એ લિક્વિડ વિદ્યુતવિભાજ્ય છે, જે SOFCમાં વપરાતા નથી.", "ref": "Std 12 - Chapter 13: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "ડાયરેક્ટ મિથેનોલ ઇંધણ કોષ (DMFC)માં મિથેનોલનું ઓક્સિડેશન થવાની પ્રક્રિયામાં કયો ઉપ-ઉત્પાદ (by-product) બને છે?", "opts": ["કાર્બન ડાયોક્સાઇડ (CO₂)", "કાર્બન મોનોક્સાઇડ (CO)", "પાણી (H₂O)", "મિથેન (CH₄)"], "ans": 0, "exp": "DMFCમાં મિથેનોલનું ઓક્સિડેશન થતાં કાર્બન ડાયોક્સાઇડ (CO₂) ઉપ-ઉત્પાદ તરીકે બને છે. કાર્બન મોનોક્સાઇડ (CO) એ અપૂર્ણ દહનનો ઉપ-ઉત્પાદ છે, જ્યારે પાણી અને મિથેન એ મિથેનોલના ઓક્સિડેશનમાં બનતા નથી.", "ref": "Std 12 - Chapter 13: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "ઇંધણ કોષમાં 'ક્રોસ-ઓવર' (cross-over) નામની ઘટના કયા કારણે થાય છે?", "opts": ["હાઇડ્રોજન ગેસનું ઓક્સિજન ચેમ્બરમાં લીક થવું", "ઓક્સિજન ગેસનું હાઇડ્રોજન ચેમ્બરમાં લીક થવું", "ઇલેક્ટ્રોનનું પટલમાંથી પસાર થવું", "વિદ્યુતવિભાજ્યમાં આયનની અસંતુલિત ગતિ"], "ans": 0, "exp": "'ક્રોસ-ઓવર' ઘટના હાઇડ્રોજન ગેસના ઓક્સિજન ચેમ્બરમાં લીક થવાને કારણે થાય છે, જે ઇંધણ કોષની કાર્યક્ષમતાને ઘટાડે છે. ઓક્સિજન ગેસનું હાઇડ્રોજન ચેમ્બરમાં લીક થવું એ ક્રોસ-ઓવર નથી, પરંતુ તે પણ કાર્યક્ષમતાને અસર કરે છે. ઇલેક્ટ્રોન અને આયનની ગતિ એ ક્રોસ-ઓવર સાથે સંકળાયેલ નથી.", "ref": "Std 12 - Chapter 13: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "ઇંધણ કોષમાં 'પોલેરાઇઝેશન' ઘટના દૂર કરવા માટે નીચેના પૈકી કયું પગલું લેવામાં આવે છે?", "opts": ["ઉત્સેચકની માત્રા વધારવી", "વિદ્યુતવિભાજ્યની સાંદ્રતા ઘટાડવી", "કોષમાં હવા પુરવઠો વધારવો", "કોષમાં ઓક્સિડાઇઝિંગ એજન્ટ ઉમેરવું"], "ans": 3, "exp": "પોલેરાઇઝેશન ઘટના દૂર કરવા માટે કોષમાં ઓક્સિડાઇઝિંગ એજન્ટ (જેમ કે ઓક્સિજન) ઉમેરવામાં આવે છે, જે ઇલેક્ટ્રોડ પરના પ્રક્રિયાને સુધારે છે. ઉત્સેચકની માત્રા વધારવી, વિદ્યુતવિભાજ્યની સાંદ્રતા ઘટાડવી, અને હવા પુરવઠો વધારવો એ પોલેરાઇઝેશનને દૂર કરવા માટે અસરકારક પગલાં નથી.", "ref": "Std 12 - Chapter 13: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "ઇંધણ કોષમાં 'પોઇઝનિંગ' (poisoning) નામની ઘટનામાં કયો પદાર્થ પ્લેટિનમ ઉત્સેચકની સક્રિયતા ઘટાડે છે, જેથી કોષની કાર્યક્ષમતા ઓછી થાય છે?", "opts": ["કાર્બન મોનોક્સાઇડ (CO)", "ઓક્સિજન (O₂)", "હાઇડ્રોજન (H₂)", "પાણી (H₂O)"], "ans": 0, "exp": "પ્લેટિનમ ઉત્સેચકની સક્રિયતા કાર્બન મોનોક્સાઇડ (CO) દ્વારા ઘટે છે, કારણ કે CO પ્લેટિનમની સપાટી પર શોષાઈ જાય છે અને હાઇડ્રોજનના ઓક્સિડેશન પ્રક્રિયાને અવરોધે છે. ઓક્સિજન, હાઇડ્રોજન અને પાણી આ પ્રક્રિયાને અવરોધતા નથી, ઉલટાનું હાઇડ્રોજન અને ઓક્સિજન તો પ્રક્રિયામાં ભાગ લે છે.", "ref": "Std 12 - રસાયણવિજ્ઞાન: અધ્યાય 3 - વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "સોલિડ ઓક્સાઇડ ઇંધણ કોષ (SOFC)માં વિદ્યુતવિભાજ્ય તરીકે વપરાતા પદાર્થની વિશિષ્ટતા કયી છે?", "opts": ["તે ઓક્સિજન આયન (O²⁻) નું વહન કરે છે", "તે હાઇડ્રોજન આયન (H⁺) નું વહન કરે છે", "તે ઇલેક્ટ્રોન (e⁻) નું વહન કરે છે", "તે સોડિયમ આયન (Na⁺) નું વહન કરે છે"], "ans": 0, "exp": "SOFCમાં વિદ્યુતવિભાજ્ય તરીકે વપરાતો પદાર્થ (જેમ કે યટ્રિયા-સ્થિર જિર્કોનિયા) ઓક્સિજન આયન (O²⁻) નું વહન કરે છે. હાઇડ્રોજન આયન, ઇલેક્ટ્રોન અથવા સોડિયમ આયનનું વહન આ પ્રકારના કોષમાં થતું નથી.", "ref": "Std 12 - રસાયણવિજ્ઞાન: અધ્યાય 3 - વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "ડાયરેક્ટ મિથેનોલ ઇંધણ કોષ (DMFC)માં મિથેનોલનું ઓક્સિડેશન થતાં કયો ઉપ-ઉત્પાદ (by-product) ઉત્પન્ન થાય છે, જે કોષની કાર્યક્ષમતા ઘટાડે છે?", "opts": ["કાર્બન ડાયોક્સાઇડ (CO₂)", "કાર્બન મોનોક્સાઇડ (CO)", "ફોર્મિક એસિડ (HCOOH)", "મિથેન (CH₄)"], "ans": 2, "exp": "DMFCમાં મિથેનોલનું ઓક્સિડેશન થતાં ફોર્મિક એસિડ (HCOOH) ઉપ-ઉત્પાદ તરીકે ઉત્પન્ન થાય છે, જે કોષની કાર્યક્ષમતા ઘટાડે છે. કાર્બન ડાયોક્સાઇડ અને કાર્બન મોનોક્સાઇડ પણ ઉત્પન્ન થઈ શકે, પરંતુ ફોર્મિક એસિડ સૌથી મહત્વપૂર્ણ ઉપ-ઉત્પાદ છે. મિથેન ઉત્પન્ન થતું નથી.", "ref": "Std 12 - રસાયણવિજ્ઞાન: અધ્યાય 3 - વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "ઇંધણ કોષમાં 'ક્રોસ-ઓવર' (cross-over) નામની ઘટનામાં કયો પદાર્થ એનોડથી કેથોડ તરફ વહન પામે છે, જેથી કોષની કાર્યક્ષમતા ઘટે છે?", "opts": ["હાઇડ્રોજન (H₂)", "મિથેનોલ (CH₃OH)", "ઓક્સિજન (O₂)", "પાણી (H₂O)"], "ans": 1, "exp": "DMFC જેવા ઇંધણ કોષમાં મિથેનોલ એનોડથી કેથોડ તરફ વહન પામે છે, જેને 'ક્રોસ-ઓવર' કહેવાય છે. આ ઘટનાથી કેથોડ પર અપેક્ષિત પ્રક્રિયા વિક્ષેપ પામે છે અને કોષની કાર્યક્ષમતા ઘટે છે. હાઇડ્રોજન, ઓક્સિજન અથવા પાણીનું આ પ્રકારે વહન થતું નથી.", "ref": "Std 12 - રસાયણવિજ્ઞાન: અધ્યાય 3 - વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "એક પ્રોટોન-વિનિમય પટલ ઇંધણ કોષ (PEMFC)માં નીચેના પૈકી કયું વિધાન સાચું નથી, પરંતુ તે સોલિડ ઓક્સાઇડ ઇંધણ કોષ (SOFC) માટે સાચું હોઈ શકે છે?", "opts": ["આ કોષમાં કાર્યકારી તાપમાન 80°C થી 100°C ની વચ્ચે હોય છે", "આ કોષમાં વિદ્યુતવિભાજ્ય તરીકે સિરામિક પદાર્થનો ઉપયોગ થાય છે જે ઉચ્ચ તાપમાને ઓક્સાઇડ આયનોનું વહન કરે છે", "આ કોષમાં પ્લેટિનમ ઉત્સેચકનો ઉપયોગ એનોડ અને કેથોડ બંને પર થાય છે", "આ કોષમાં પાણી ઉત્પન્ન થાય છે જે પ્રવાહી સ્વરૂપે બહાર નીકળે છે"], "ans": 1, "exp": "વિકલ્પ B એ PEMFC માટે ખોટું છે કારણ કે PEMFCમાં વિદ્યુતવિભાજ્ય તરીકે પોલિમર પટલ (જેમ કે નાફિયન) વપરાય છે, જે પ્રોટોનનું વહન કરે છે, નહીં કે ઓક્સાઇડ આયનોનું. આ લક્ષણ સોલિડ ઓક્સાઇડ ઇંધણ કોષ (SOFC) માટે સાચું છે, જેમાં સિરામિક વિદ્યુતવિભાજ્ય ઉચ્ચ તાપમાને ઓક્સાઇડ આયનોનું વહન કરે છે. વિકલ્પ A, C અને D PEMFC માટે સાચાં છે: PEMFCનું કાર્યકારી તાપમાન 80°C થી 100°C હોય છે, પ્લેટિનમ ઉત્સેચકનો ઉપયોગ બંને ઇલેક્ટ્રોડ પર થાય છે, અને પાણી પ્રવાહી સ્વરૂપે બહાર નીકળે છે.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણશાસ્ત્ર અને ઇંધણ કોષ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
