<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>એમાઇનના એસિડિક/બેઝિક ગુણધર્મો</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>એમાઇનના એસિડિક/બેઝિક ગુણધર્મો</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">એમાઇનના એસિડિક/બેઝિક ગુણધર્મો</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એમાઇન સમૂહમાંથી કયું એમાઇન એસિડિક ગુણધર્મ દર્શાવતું નથી, પરંતુ બેઝિક ગુણધર્મ દર્શાવે છે?", "opts": ["ગ્લાઇસિન", "એલાનિન", "લાઇસિન", "વેલિન"], "ans": 2, "exp": "લાઇસિન એમાઇનમાં બેઝિક R-સમૂહ (NH2) હોવાથી બેઝિક ગુણધર્મ દર્શાવે છે. ગ્લાઇસિન, એલાનિન અને વેલિન એમાઇનના R-સમૂહમાં કોઈ ચાર્જ ન હોવાથી તટસ્થ ગુણધર્મ દર્શાવે છે. લાઇસિન એમાઇનનો pH > 7 હોવાથી બેઝિક ગણાય છે.", "ref": "Std 12 - પ્રકરણ 14: જૈવ-અણુઓ (બાયોમોલેક્યુલ્સ)", "ch": ""}, {"q": "એમાઇન એસિડના આયનિક સ્વરૂપમાં, કયા pH પર એમાઇનનો નેટ ચાર્જ શૂન્ય હોય છે?", "opts": ["pH 1", "pH 7", "આયસોઇલેક્ટ્રિક પોઈન્ટ (pI)", "pH 14"], "ans": 2, "exp": "એમાઇનનો નેટ ચાર્જ શૂન્ય તેના આયસોઇલેક્ટ્રિક પોઈન્ટ (pI) પર હોય છે, જ્યાં એમાઇનના એસિડિક અને બેઝિક સમૂહોનું આયનિક સંતુલન શૂન્ય ચાર્જ આપે છે. pH 1, 7, અને 14 પર ચાર્જ શૂન્ય નથી હોતો.", "ref": "Std 12 - પ્રકરણ 14: જૈવ-અણુઓ (બાયોમોલેક્યુલ્સ)", "ch": ""}, {"q": "એમાઇન એસિડના બેઝિક ગુણધર્મ માટે જવાબદાર સમૂહ કયો છે?", "opts": ["કાર્બોક્સિલિક એસિડ સમૂહ (-COOH)", "એમાઇન સમૂહ (-NH2)", "હાઇડ્રોક્સિલ સમૂહ (-OH)", "થાયોલ સમૂહ (-SH)"], "ans": 1, "exp": "એમાઇન એસિડમાં એમાઇન સમૂહ (-NH2) બેઝિક ગુણધર્મ દર્શાવે છે કારણ કે તે પ્રોટોન (H+) ગ્રહણ કરી શકે છે. કાર્બોક્સિલિક એસિડ સમૂહ (-COOH) એસિડિક ગુણધર્મ દર્શાવે છે, જ્યારે હાઇડ્રોક્સિલ અને થાયોલ સમૂહો તટસ્થ અથવા હળવા એસિડિક ગુણધર્મ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 14: જૈવ-અણુઓ (બાયોમોલેક્યુલ્સ)", "ch": ""}, {"q": "નીચેનામાંથી કયું એમાઇન એસિડ એસિડિક અને બેઝિક બંને ગુણધર્મો દર્શાવે છે?", "opts": ["ગ્લુટેમિક એસિડ", "એસ્પાર્ટિક એસિડ", "હિસ્ટિડિન", "પ્રોલિન"], "ans": 2, "exp": "હિસ્ટિડિન એમાઇનમાં ઇમિડેઝોલ રિંગ હોવાથી તે એસિડિક અને બેઝિક બંને ગુણધર્મો દર્શાવે છે. ગ્લુટેમિક એસિડ અને એસ્પાર્ટિક એસિડ ફક્ત એસિડિક ગુણધર્મ દર્શાવે છે, જ્યારે પ્રોલિન તટસ્થ ગુણધર્મ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 14: જૈવ-અણુઓ (બાયોમોલેક્યુલ્સ)", "ch": ""}, {"q": "એમાઇન એસિડના આયનિક સ્વરૂપમાં, કયા એમાઇન એસિડનો આયસોઇલેક્ટ્રિક પોઈન્ટ (pI) સૌથી ઓછો હોય છે?", "opts": ["લાઇસિન", "ગ્લાઇસિન", "એસ્પાર્ટિક એસિડ", "એલાનિન"], "ans": 2, "exp": "એસ્પાર્ટિક એસિડમાં બે કાર્બોક્સિલિક એસિડ સમૂહ હોવાથી તેનો આયસોઇલેક્ટ્રિક પોઈન્ટ (pI) સૌથી ઓછો (લગભગ 2.77) હોય છે. લાઇસિન બેઝિક એમાઇન હોવાથી તેનો pI ઉચ્ચ (લગભગ 9.74) હોય છે, જ્યારે ગ્લાઇસિન અને એલાનિન તટસ્થ એમાઇન હોવાથી તેમનો pI મધ્યમ (લગભગ 6) હોય છે.", "ref": "Std 12 - પ્રકરણ 14: જૈવ-અણુઓ (બાયોમોલેક્યુલ્સ)", "ch": ""}, {"q": "નીચેના પૈકી કયું એમાઇન એસિડ એસિડિક માધ્યમમાં પ્રોટોન ગુમાવવાને બદલે પ્રોટોન મેળવવાની વધુ વૃત્તિ ધરાવે છે, પરંતુ તેનું કારણ એમાઇન સમૂહની બેઝિકતા નહીં, પરંતુ તેની આણ્વિક રચનામાં રહેલા અન્ય વિશિષ્ટ સમૂહ સાથે સંબંધિત છે?", "opts": ["લાઇસિન", "આર્જિનાઇન", "હિસ્ટિડિન", "એસ્પાર્ટિક એસિડ"], "ans": 2, "exp": "હિસ્ટિડિનમાં ઇમિડાઝોલ રિંગ હાજર છે, જે pH 6-7ની આસપાસ પ્રોટોન મેળવી શકે છે. આ પ્રક્રિયા એમાઇન સમૂહની બેઝિકતાને કારણે નહીં, પરંતુ ઇમિડાઝોલ રિંગના વિશિષ્ટ બંધારણને કારણે થાય છે. લાઇસિન અને આર્જિનાઇનમાં એમાઇન સમૂહની બેઝિકતા પ્રબળ હોય છે, જ્યારે એસ્પાર્ટિક એસિડ એસિડિક ગુણધર્મ ધરાવે છે અને પ્રોટોન ગુમાવવાની વૃત્તિ ધરાવે છે.", "ref": "Std 12 - પ્રકરણ 14: બાયોમોલેક્યુલ્સ", "ch": ""}, {"q": "એક એમાઇન એસિડનું દ્વિધ્રુવીય આયન (zwitterion) સ્વરૂપ pH 9.7 પર છે. જો આ એમાઇન એસિડનું દ્રાવણ pH 2 પર લાવવામાં આવે, તો નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["એમાઇન એસિડનું કાર્બોક્સિલ સમૂહ પ્રોટોનયુક્ત થશે", "એમાઇન એસિડનું એમાઇન સમૂહ પ્રોટોનયુક્ત થશે", "એમાઇન એસિડનો નેટ ચાર્જ ધન (+) હશે", "એમાઇન એસિડનું દ્વિધ્રુવીય આયન સ્વરૂપ સંપૂર્ણપણે અદૃશ્ય થઈ જશે"], "ans": 3, "exp": "pH 2 પર એમાઇન એસિડનો નેટ ચાર્જ ધન (+) હશે કારણ કે કાર્બોક્સિલ સમૂહ પ્રોટોનયુક્ત થશે અને એમાઇન સમૂહ પણ પ્રોટોનયુક્ત રહેશે. પરંતુ વિધાન D ખોટું છે કારણ કે દ્વિધ્રુવીય આયન સ્વરૂપ સંપૂર્ણપણે અદૃશ્ય થતું નથી, માત્ર તેનું પ્રમાણ ઘટે છે. બાકીના તમામ વિધાનો સાચાં છે.", "ref": "Std 12 - પ્રકરણ 14: બાયોમોલેક્યુલ્સ", "ch": ""}, {"q": "નીચેના પૈકી કયું એમાઇન એસિડ એસિડિક માધ્યમમાં પણ તેના આયસોઇલેક્ટ્રિક બિંદુ (pI) કરતાં નીચા pH પર નકારાત્મક ચાર્જ ધરાવી શકે છે?", "opts": ["ગ્લુટામિક એસિડ", "સિસ્ટીન", "ટાયરોસિન", "પ્રોલિન"], "ans": 2, "exp": "સિસ્ટીનમાં થાયોલ (-SH) સમૂહ હાજર છે, જે ખૂબ જ નબળો એસિડ છે અને pH 8-9ની આસપાસ ડિપ્રોટોનેટ થઈ શકે છે. આથી, એસિડિક માધ્યમમાં પણ તેના pI કરતાં નીચા pH પર થોડો નકારાત્મક ચાર્જ ધરાવી શકે છે. ગ્લુટામિક એસિડ એસિડિક છે પરંતુ તેનો pI નીચો હોય છે, ટાયરોસિન અને પ્રોલિનમાં આવા ગુણધર્મો જોવા મળતા નથી.", "ref": "Std 12 - પ્રકરણ 14: બાયોમોલેક્યુલ્સ", "ch": ""}, {"q": "એક પ્રયોગમાં, એમાઇન એસિડનું દ્રાવણ pH 7 પર તટસ્થ છે. જો આ એમાઇન એસિડનું આયસોઇલેક્ટ્રિક બિંદુ (pI) 6.0 હોય, તો નીચેના પૈકી કયું વિધાન સાચું છે?", "opts": ["આ એમાઇન એસિડમાં એક કરતાં વધુ એમાઇન સમૂહ હાજર છે", "આ એમાઇન એસિડમાં એક કરતાં વધુ કાર્બોક્સિલ સમૂહ હાજર છે", "આ એમાઇન એસિડમાં એક એમાઇન અને એક કાર્બોક્સિલ સમૂહ સિવાય અન્ય આયનીય સમૂહ હાજર છે", "આ એમાઇન એસિડનું pI મૂલ્ય ખોટું માપવામાં આવ્યું છે"], "ans": 2, "exp": "જો એમાઇન એસિડનું pI 6.0 છે અને pH 7 પર તટસ્થ છે, તો તેનો અર્થ એ છે કે તેના બંધારણમાં એક એમાઇન અને એક કાર્બોક્સિલ સમૂહ સિવાય અન્ય આયનીય સમૂહ હાજર છે (જેમ કે હિસ્ટિડિનમાં ઇમિડાઝોલ રિંગ). આથી, વિધાન C સાચું છે. બાકીના વિધાનો આ પરિસ્થિતિને સમજાવી શકતા નથી.", "ref": "Std 12 - પ્રકરણ 14: બાયોમોલેક્યુલ્સ", "ch": ""}, {"q": "નીચેના પૈકી કયું એમાઇન એસિડ એસિડિક માધ્યમમાં પ્રોટોન મેળવવા માટે સૌથી ઓછી વૃત્તિ ધરાવે છે, પરંતુ તેનું કારણ એમાઇન સમૂહની નબળી બેઝિકતા નહીં, પરંતુ તેની આણ્વિક રચનામાં રહેલા ચક્રીય બંધારણ સાથે સંબંધિત છે?", "opts": ["લાઇસિન", "પ્રોલિન", "આર્જિનાઇન", "હિસ્ટિડિન"], "ans": 1, "exp": "પ્રોલિનમાં એમાઇન સમૂહ ચક્રીય બંધારણનો ભાગ છે, જેના કારણે તેની બેઝિકતા ઘટે છે અને તે પ્રોટોન મેળવવા માટે ઓછી વૃત્તિ ધરાવે છે. લાઇસિન અને આર્જિનાઇનમાં એમાઇન સમૂહની બેઝિકતા પ્રબળ હોય છે, જ્યારે હિસ્ટિડિનમાં ઇમિડાઝોલ રિંગ હાજર છે જે પ્રોટોન મેળવી શકે છે.", "ref": "Std 12 - પ્રકરણ 14: બાયોમોલેક્યુલ્સ", "ch": ""}, {"q": "એમાઇન એસિડના આયસોઇલેક્ટ્રિક પોઈન્ટ (pI) ની ગણતરી માટે નીચેના પૈકી કયો સૂત્ર યોગ્ય છે, જ્યારે એમાઇન એસિડમાં બે આયનીકરણ યોગ્ય pKa મૂલ્યો pKa1 અને pKa2 હોય છે?", "opts": ["pI = (pKa1 + pKa2) / 2", "pI = pKa1 + pKa2", "pI = (pKa1 - pKa2) / 2", "pI = pKa1 * pKa2"], "ans": 0, "exp": "એમાઇન એસિડના આયસોઇલેક્ટ્રિક પોઈન્ટ (pI) ની ગણતરી માટે સૂત્ર pI = (pKa1 + pKa2) / 2 યોગ્ય છે, જ્યારે એમાઇન એસિડમાં બે આયનીકરણ યોગ્ય pKa મૂલ્યો હોય છે. બાકીના વિકલ્પો ગણિતીય રીતે અયોગ્ય છે અથવા એમાઇન એસિડના ગુણધર્મો સાથે સુસંગત નથી.", "ref": "Std 12 - Chapter 9: જૈવ અણુઓ અને પ્રોટીન", "ch": ""}, {"q": "નીચેના પૈકી કયું એમાઇન એસિડ એસિડિક માધ્યમમાં તેના કર્બોક્સિલ સમૂહ દ્વારા પ્રોટોન દાન કરવા સક્ષમ નથી, પરંતુ બેઝિક માધ્યમમાં તેના એમાઇન સમૂહ દ્વારા પ્રોટોન સ્વીકારવા સક્ષમ છે?", "opts": ["ગ્લાઇસીન", "લાઇસીન", "એસ્પાર્ટિક એસિડ", "ગ્લુટામિક એસિડ"], "ans": 1, "exp": "લાઇસીન એ એમાઇન એસિડ છે જે એસિડિક માધ્યમમાં તેના કર્બોક્સિલ સમૂહ દ્વારા પ્રોટોન દાન કરવા સક્ષમ નથી, પરંતુ બેઝિક માધ્યમમાં તેના એમાઇન સમૂહ દ્વારા પ્રોટોન સ્વીકારવા સક્ષમ છે. ગ્લાઇસીન, એસ્પાર્ટિક એસિડ, અને ગ્લુટામિક એસિડ એસિડિક ગુણધર્મો દર્શાવે છે.", "ref": "Std 12 - Chapter 9: જૈવ અણુઓ અને પ્રોટીન", "ch": ""}, {"q": "એમાઇન એસિડના દ્વિધ્રુવીય આયન (zwitterion) સ્વરૂપમાં, કયા એમાઇન એસિડનો નેટ ચાર્જ pH 7 પર શૂન્ય હોય છે, પરંતુ pH 2 પર ધન હોય છે?", "opts": ["એલાનીન", "વેલીન", "લાઇસીન", "એસ્પાર્ટિક એસિડ"], "ans": 2, "exp": "લાઇસીન એ એમાઇન એસિડ છે જેનું દ્વિધ્રુવીય આયન સ્વરૂપ pH 7 પર નેટ ચાર્જ શૂન્ય હોય છે, પરંતુ pH 2 પર ધન હોય છે. એલાનીન અને વેલીનના pI મૂલ્યો pH 7 નજીક હોય છે, જ્યારે એસ્પાર્ટિક એસિડ એસિડિક ગુણધર્મો દર્શાવે છે.", "ref": "Std 12 - Chapter 9: જૈવ અણુઓ અને પ્રોટીન", "ch": ""}, {"q": "નીચેના પૈકી કયું એમાઇન એસિડ એસિડિક માધ્યમમાં તેના આયસોઇલેક્ટ્રિક પોઈન્ટ (pI) કરતાં ઓછા pH પર આયનિત થાય છે?", "opts": ["ગ્લાઇસીન", "એસ્પાર્ટિક એસિડ", "લાઇસીન", "હિસ્ટીડીન"], "ans": 1, "exp": "એસ્પાર્ટિક એસિડ એ એમાઇન એસિડ છે જે એસિડિક માધ્યમમાં તેના આયસોઇલેક્ટ્રિક પોઈન્ટ (pI) કરતાં ઓછા pH પર આયનિત થાય છે. ગ્લાઇસીન, લાઇસીન, અને હિસ્ટીડીનના pI મૂલ્યો એસિડિક માધ્યમમાં આયનિત થવા માટે યોગ્ય નથી.", "ref": "Std 12 - Chapter 9: જૈવ અણુઓ અને પ્રોટીન", "ch": ""}, {"q": "એક એમાઇન એસિડનું દ્રાવણ pH 6 પર તટસ્થ છે. જો આ એમાઇન એસિડનું pKa1 = 2.3 અને pKa2 = 9.7 હોય, તો તેનું આયસોઇલેક્ટ્રિક પોઈન્ટ (pI) કેટલું હશે?", "opts": ["6.0", "5.0", "7.0", "8.0"], "ans": 0, "exp": "એમાઇન એસિડના આયસોઇલેક્ટ્રિક પોઈન્ટ (pI) ની ગણતરી માટે સૂત્ર pI = (pKa1 + pKa2) / 2 વાપરવામાં આવે છે. અહીં, pKa1 = 2.3 અને pKa2 = 9.7 હોય, તો pI = (2.3 + 9.7) / 2 = 6.0. બાકીના વિકલ્પો ગણિતીય રીતે અયોગ્ય છે.", "ref": "Std 12 - Chapter 9: જૈવ અણુઓ અને પ્રોટીન", "ch": ""}, {"q": "એક એમાઇન એસિડનું pKa1 = 2.2 અને pKa2 = 9.4 છે. જો આ એમાઇન એસિડને pH 4.0 વાળા દ્રાવણમાં મૂકવામાં આવે, તો તેનું પ્રબળ સ્વરૂપ કયું હશે?", "opts": ["+NH3-CH(R)-COOH", "+NH3-CH(R)-COO-", "NH2-CH(R)-COOH", "NH2-CH(R)-COO-"], "ans": 0, "exp": "pH 4.0 એ pKa1 (2.2) કરતાં વધારે પરંતુ pKa2 (9.4) કરતાં ઓછો છે. આ સ્થિતિમાં, કર્બોક્સિલ સમૂહ (COOH) આંશિક રીતે આયનિત થાય છે, જ્યારે એમાઇન સમૂહ (+NH3) પૂર્ણ રીતે પ્રોટોનેટેડ રહે છે. આથી, પ્રબળ સ્વરૂપ +NH3-CH(R)-COOH હશે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) pH 4.0 પર COO- સંપૂર્ણ રીતે આયનિત નથી, C) NH2 સમૂહ પ્રોટોનેટેડ હોવો જોઈએ, D) બંને સમૂહો આંશિક આયનિત નથી.", "ref": "Std 12 - Chapter 14: જૈવ અણુઓ અને પોલિમર (Biomolecules and Polymers)", "ch": ""}, {"q": "નીચેનામાંથી કયું એમાઇન એસિડ એસિડિક માધ્યમમાં તેના આયસોઇલેક્ટ્રિક બિંદુ (pI) કરતાં વધુ ધન ચાર્જ ધરાવે છે?", "opts": ["ગ્લાઇસીન (pI = 6.0)", "લાઇસીન (pI = 9.7)", "એસ્પાર્ટિક એસિડ (pI = 2.8)", "વેલીન (pI = 6.0)"], "ans": 1, "exp": "લાઇસીન એ બેઝિક એમાઇન એસિડ છે, જેનું pI 9.7 છે. એસિડિક માધ્યમમાં (pH < pI), લાઇસીન તેના આયસોઇલેક્ટ્રિક બિંદુ કરતાં વધુ પ્રોટોનેટેડ થાય છે, જેથી તે ધન ચાર્જ ધરાવે છે. ગ્લાઇસીન અને વેલીન તટસ્થ એમાઇન એસિડ છે, જ્યારે એસ્પાર્ટિક એસિડ એસિડિક છે, જે એસિડિક માધ્યમમાં ઋણ ચાર્જ ધરાવે છે.", "ref": "Std 12 - Chapter 14: જૈવ અણુઓ અને પોલિમર (Biomolecules and Polymers)", "ch": ""}, {"q": "એક એમાઇન એસિડનું દ્વિધ્રુવીય આયન (zwitterion) સ્વરૂપ pH 6.0 પર છે. જો આ એમાઇન એસિડનું pKa1 = 2.3 અને pKa2 = 9.7 હોય, તો તેનું નેટ ચાર્જ pH 1.0 પર કયું હશે?", "opts": ["+1", "0", "-1", "+2"], "ans": 0, "exp": "pH 1.0 એ pKa1 (2.3) કરતાં ઓછો છે, જેથી કર્બોક્સિલ સમૂહ (COOH) પ્રોટોનેટેડ રહે છે અને એમાઇન સમૂહ (+NH3) પણ પ્રોટોનેટેડ રહે છે. આથી, નેટ ચાર્જ +1 હશે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) pH 1.0 પર દ્વિધ્રુવીય આયન સ્વરૂપ નથી, C) ઋણ ચાર્જ નથી, D) +2 ચાર્જ નથી.", "ref": "Std 12 - Chapter 14: જૈવ અણુઓ અને પોલિમર (Biomolecules and Polymers)", "ch": ""}, {"q": "નીચેનામાંથી કયું એમાઇન એસિડ એસિડિક માધ્યમમાં તેના કર્બોક્સિલ સમૂહ દ્વારા પ્રોટોન ગુમાવવા માટે સૌથી ઓછી પ્રવૃત્તિ ધરાવે છે?", "opts": ["એલાનીન (pKa1 = 2.3)", "ગ્લુટામિક એસિડ (pKa1 = 2.2)", "લ્યુસીન (pKa1 = 2.4)", "એસ્પાર્ટિક એસિડ (pKa1 = 2.0)"], "ans": 2, "exp": "લ્યુસીનનું pKa1 મૂલ્ય 2.4 છે, જે સૌથી વધારે છે. pKa1 મૂલ્ય જેટલું વધારે હોય, એટલી ઓછી પ્રવૃત્તિ કર્બોક્સિલ સમૂહ દ્વારા પ્રોટોન ગુમાવવા માટે હોય છે. એલાનીન, ગ્લુટામિક એસિડ, અને એસ્પાર્ટિક એસિડના pKa1 મૂલ્યો અનુક્રમે 2.3, 2.2, અને 2.0 છે, જે લ્યુસીન કરતાં ઓછા છે.", "ref": "Std 12 - Chapter 14: જૈવ અણુઓ અને પોલિમર (Biomolecules and Polymers)", "ch": ""}, {"q": "એક એમાઇન એસિડનું દ્રાવણ pH 7 પર તટસ્થ છે. જો આ એમાઇન એસિડનું pKa1 = 3.0 અને pKa2 = 8.0 હોય, તો તેનું નેટ ચાર્જ pH 10 પર કયું હશે?", "opts": ["+1", "0", "-1", "+2"], "ans": 2, "exp": "pH 10 એ pKa2 (8.0) કરતાં વધારે છે, જેથી એમાઇન સમૂહ (NH2) ડીપ્રોટોનેટેડ થાય છે અને કર્બોક્સિલ સમૂહ (COO-) પણ ડીપ્રોટોનેટેડ રહે છે. આથી, નેટ ચાર્જ -1 હશે. બાકીના વિકલ્પો ખોટા છે કારણ કે: A) ધન ચાર્જ નથી, B) તટસ્થ ચાર્જ નથી, D) +2 ચાર્જ નથી.", "ref": "Std 12 - Chapter 14: જૈવ અણુઓ અને પોલિમર (Biomolecules and Polymers)", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
