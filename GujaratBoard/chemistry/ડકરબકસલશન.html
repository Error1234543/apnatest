<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ડિકાર્બોક્સિલેશન</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ડિકાર્બોક્સિલેશન</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ડિકાર્બોક્સિલેશન</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "નીચેના પૈકી કયા પ્રક્રિયામાં ડિકાર્બોક્સિલેશન ઉત્સેચકની સહાય વિના સ્વયંભૂ થાય છે?", "opts": ["પાયરુવેટનું એસિટાઇલ CoAમાં રૂપાંતરણ", "સાયટ્રિક એસિડ ચક્રમાં આઇસોસાયટ્રેટનું α-કિટોગ્લુટારેટમાં રૂપાંતરણ", "એમિનો એસિડનું ઓક્સિડેટિવ ડિકાર્બોક્સિલેશન", "ક્રેબ્સ ચક્રમાં સક્સિનાઇલ CoAનું સક્સિનેટમાં રૂપાંતરણ"], "ans": 3, "exp": "સક્સિનાઇલ CoAનું સક્સિનેટમાં રૂપાંતરણ થાય છે ત્યારે સક્સિનાઇલ CoA સિન્થેટેઝ ઉત્સેચકની મદદથી થાય છે, પરંતુ આ પ્રક્રિયામાં CO₂ મુક્ત થતું નથી. તેથી આ પ્રક્રિયા ડિકાર્બોક્સિલેશન નથી. બાકીની ત્રણ પ્રક્રિયાઓમાં ડિકાર્બોક્સિલેશન ઉત્સેચકોની સહાયથી થાય છે. પાયરુવેટ ડિહાઇડ્રોજીનેઝ, આઇસોસાયટ્રેટ ડિહાઇડ્રોજીનેઝ અને એમિનો એસિડ ડિકાર્બોક્સિલેઝ ઉત્સેચકો ડિકાર્બોક્સિલેશન માટે જવાબદાર છે.", "ref": "Std 11 - પ્રકરણ 14: શ્વસન અને ઊર્જા વિનિમય", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લો અને સાચો વિકલ્પ પસંદ કરો:\n(1) ડિકાર્બોક્સિલેશન પ્રક્રિયા હંમેશા ઓક્સિડેટિવ હોય છે.\n(2) કેટલાક બેક્ટેરિયામાં ડિકાર્બોક્સિલેશનથી એમિનો એસિડમાંથી બાયોજેનિક એમાઇન ઉત્પન્ન થાય છે.\n(3) કોષીય શ્વસનમાં ડિકાર્બોક્સિલેશન માત્ર મિટોકોન્ડ્રિયામાં થાય છે.", "opts": ["માત્ર (1) સાચું છે", "માત્ર (2) સાચું છે", "(1) અને (2) સાચાં છે", "(2) અને (3) સાચાં છે"], "ans": 1, "exp": "વિધાન (1) ખોટું છે કારણ કે ડિકાર્બોક્સિલેશન ઓક્સિડેટિવ અથવા નોન-ઓક્સિડેટિવ હોઈ શકે છે. વિધાન (2) સાચું છે કારણ કે કેટલાક બેક્ટેરિયામાં ડિકાર્બોક્સિલેશનથી એમિનો એસિડમાંથી બાયોજેનિક એમાઇન (જેમ કે હિસ્ટામાઇન) ઉત્પન્ન થાય છે. વિધાન (3) ખોટું છે કારણ કે ડિકાર્બોક્સિલેશન સાયટોપ્લાઝમમાં પણ થઈ શકે છે (જેમ કે ગ્લાયકોલિસિસમાં પાયરુવેટનું રૂપાંતરણ).", "ref": "Std 12 - પ્રકરણ 9: જૈવિક અણુઓ અને ઉત્સેચકો", "ch": ""}, {"q": "કોષીય શ્વસન દરમિયાન નીચેના પૈકી કયા સંયોજનનું ડિકાર્બોક્સિલેશન થતું નથી?", "opts": ["પાયરુવેટ", "આઇસોસાયટ્રેટ", "સક્સિનાઇલ CoA", "α-કિટોગ્લુટારેટ"], "ans": 2, "exp": "સક્સિનાઇલ CoAનું સક્સિનેટમાં રૂપાંતરણ થાય છે ત્યારે CO₂ મુક્ત થતું નથી, તેથી આ ડિકાર્બોક્સિલેશન નથી. બાકીના ત્રણ સંયોજનો (પાયરુવેટ, આઇસોસાયટ્રેટ અને α-કિટોગ્લુટારેટ) ડિકાર્બોક્સિલેશન પ્રક્રિયામાં ભાગ લે છે અને CO₂ મુક્ત કરે છે.", "ref": "Std 11 - પ્રકરણ 14: શ્વસન અને ઊર્જા વિનિમય", "ch": ""}, {"q": "એક વિદ્યાર્થીએ કોષીય શ્વસનના પ્રયોગમાં નોંધ્યું કે કોઈ એક ચોક્કસ ઉત્સેચકની ગેરહાજરીમાં પાયરુવેટનું ડિકાર્બોક્સિલેશન થતું નથી, પરંતુ લેક્ટિક એસિડનું નિર્માણ થાય છે. આ ઉત્સેચક કયો હોઈ શકે?", "opts": ["પાયરુવેટ ડિહાઇડ્રોજીનેઝ", "લેક્ટેટ ડિહાઇડ્રોજીનેઝ", "આલ્કોહોલ ડિહાઇડ્રોજીનેઝ", "આઇસોસાયટ્રેટ ડિહાઇડ્રોજીનેઝ"], "ans": 0, "exp": "પાયરુવેટ ડિહાઇડ્રોજીનેઝ ઉત્સેચક પાયરુવેટનું એસિટાઇલ CoAમાં ડિકાર્બોક્સિલેશન કરે છે. આ ઉત્સેચકની ગેરહાજરીમાં પાયરુવેટનું ડિકાર્બોક્સિલેશન થતું નથી અને તે લેક્ટેટ ડિહાઇડ્રોજીનેઝ દ્વારા લેક્ટિક એસિડમાં રૂપાંતરિત થાય છે. બાકીના ઉત્સેચકો આ પ્રક્રિયામાં સીધી રીતે સંકળાયેલા નથી.", "ref": "Std 12 - પ્રકરણ 14: શ્વસન અને ઊર્જા વિનિમય", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન ડિકાર્બોક્સિલેશન પ્રક્રિયા માટે ખોટું છે?", "opts": ["ડિકાર્બોક્સિલેશન પ્રક્રિયા દરમિયાન કાર્બન ડાયોક્સાઇડ (CO₂) મુક્ત થાય છે", "ડિકાર્બોક્સિલેશન પ્રક્રિયા માત્ર પ્રોકેરિયોટિક કોષોમાં જ થાય છે", "કેટલાક એમિનો એસિડનું ડિકાર્બોક્સિલેશન બાયોજેનિક એમાઇન ઉત્પન્ન કરે છે", "કોષીય શ્વસનમાં ડિકાર્બોક્સિલેશન ઊર્જા મુક્ત કરવામાં મદદ કરે છે"], "ans": 1, "exp": "વિધાન (B) ખોટું છે કારણ કે ડિકાર્બોક્સિલેશન પ્રક્રિયા પ્રોકેરિયોટિક અને યુકેરિયોટિક બંને પ્રકારના કોષોમાં થાય છે. બાકીના વિધાનો સાચાં છે: ડિકાર્બોક્સિલેશન દરમિયાન CO₂ મુક્ત થાય છે, કેટલાક એમિનો એસિડનું ડિકાર્બોક્સિલેશન બાયોજેનિક એમાઇન ઉત્પન્ન કરે છે, અને કોષીય શ્વસનમાં ડિકાર્બોક્સિલેશન ઊર્જા મુક્ત કરવામાં મદદ કરે છે.", "ref": "Std 12 - પ્રકરણ 9: જૈવિક અણુઓ અને ઉત્સેચકો", "ch": ""}, {"q": "ક્રેબ્સ ચક્ર દરમ્યાન, આલ્ફા-કીટોગ્લુટારેટનું ડિકાર્બોક્સિલેશન કયા ઉત્સેચક દ્વારા કેટાલાઇઝ થાય છે અને તેની સાથે કયું કોફેક્ટર જોડાયેલું હોય છે?", "opts": ["આલ્ફા-કીટોગ્લુટારેટ ડિહાઇડ્રોજીનેઝ - NAD+", "આઇસોસાઇટ્રેટ ડિહાઇડ્રોજીનેઝ - FAD", "સક્સિનેટ ડિહાઇડ્રોજીનેઝ - NAD+", "મેલેટ ડિહાઇડ્રોજીનેઝ - FAD"], "ans": 0, "exp": "ક્રેબ્સ ચક્રમાં આલ્ફા-કીટોગ્લુટારેટનું ડિકાર્બોક્સિલેશન આલ્ફા-કીટોગ્લુટારેટ ડિહાઇડ્રોજીનેઝ ઉત્સેચક દ્વારા થાય છે, જેમાં NAD+ કોફેક્ટર તરીકે કામ કરે છે. આ પ્રક્રિયામાં આલ્ફા-કીટોગ્લુટારેટનું સક્સિનાઇલ-CoAમાં રૂપાંતર થાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે આઇસોસાઇટ્રેટ ડિહાઇડ્રોજીનેઝ આઇસોસાઇટ્રેટને આલ્ફા-કીટોગ્લુટારેટમાં રૂપાંતર કરે છે, સક્સિનેટ ડિહાઇડ્રોજીનેઝ સક્સિનેટને ફ્યુમરેટમાં રૂપાંતર કરે છે, અને મેલેટ ડિહાઇડ્રોજીનેઝ મેલેટને ઓક્ઝેલોએસિટેટમાં રૂપાંતર કરે છે.", "ref": "Std 12 - Chapter 14: શ્વસન", "ch": ""}, {"q": "ડિકાર્બોક્સિલેશન પ્રક્રિયા દરમ્યાન કયા ઉત્પાદનમાં CO2 મુક્ત થતું નથી?", "opts": ["પાયરૂવિક એસિડ", "આઇસોસાઇટ્રિક એસિડ", "ઓક્ઝેલોએસિટિક એસિડ", "આલ્ફા-કીટોગ્લુટારિક એસિડ"], "ans": 2, "exp": "ઓક્ઝેલોએસિટિક એસિડમાં ડિકાર્બોક્સિલેશન થતું નથી કારણ કે તે ક્રેબ્સ ચક્રમાં સીધું જ ઓક્ઝેલોએસિટેટ તરીકે જોડાય છે અને તેનું ડિકાર્બોક્સિલેશન થતું નથી. પાયરૂવિક એસિડ, આઇસોસાઇટ્રિક એસિડ, અને આલ્ફા-કીટોગ્લુટારિક એસિડમાં ડિકાર્બોક્સિલેશન થાય છે અને CO2 મુક્ત થાય છે.", "ref": "Std 12 - Chapter 14: શ્વસન", "ch": ""}, {"q": "નીચેના પૈકી કયું સંયોજન ડિકાર્બોક્સિલેશન પામતું નથી પરંતુ તેના બદલે ડિહાઇડ્રોજીનેશન પામે છે?", "opts": ["પાયરૂવિક એસિડ", "સક્સિનિક એસિડ", "મેલિક એસિડ", "આલ્ફા-કીટોગ્લુટારિક એસિડ"], "ans": 1, "exp": "સક્સિનિક એસિડ ક્રેબ્સ ચક્રમાં ડિહાઇડ્રોજીનેશન પામે છે અને ફ્યુમરિક એસિડમાં રૂપાંતર પામે છે, પરંતુ તેનું ડિકાર્બોક્સિલેશન થતું નથી. પાયરૂવિક એસિડ, મેલિક એસિડ, અને આલ્ફા-કીટોગ્લુટારિક એસિડનું ડિકાર્બોક્સિલેશન થાય છે.", "ref": "Std 12 - Chapter 14: શ્વસન", "ch": ""}, {"q": "ડિકાર્બોક્સિલેશન પ્રક્રિયા દરમ્યાન કયા ઉત્સેચકની ક્રિયા વિના ક્રેબ્સ ચક્ર અટકી જાય છે?", "opts": ["હેક્સોકાઇનેઝ", "આલ્ફા-કીટોગ્લુટારેટ ડિહાઇડ્રોજીનેઝ", "લેક્ટેટ ડિહાઇડ્રોજીનેઝ", "પાયરૂવેટ કાઇનેઝ"], "ans": 1, "exp": "આલ્ફા-કીટોગ્લુટારેટ ડિહાઇડ્રોજીનેઝ ક્રેબ્સ ચક્રમાં આલ્ફા-કીટોગ્લુટારેટનું ડિકાર્બોક્સિલેશન કરે છે. જો આ ઉત્સેચકની ક્રિયા અટકી જાય તો ક્રેબ્સ ચક્ર અટકી જાય છે. હેક્સોકાઇનેઝ ગ્લાયકોલાઇસિસમાં, લેક્ટેટ ડિહાઇડ્રોજીનેઝ એનેરોબિક શ્વસનમાં, અને પાયરૂવેટ કાઇનેઝ ગ્લાયકોલાઇસિસમાં કામ કરે છે.", "ref": "Std 12 - Chapter 14: શ્વસન", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન ડિકાર્બોક્સિલેશન પ્રક્રિયા માટે સાચું નથી?", "opts": ["ડિકાર્બોક્સિલેશન પ્રક્રિયામાં કાર્બન ડાયોક્સાઇડ મુક્ત થાય છે", "પાયરૂવિક એસિડનું ડિકાર્બોક્સિલેશન માઇટોકોન્ડ્રિયામાં થાય છે", "ડિકાર્બોક્સિલેશન પ્રક્રિયા દરમ્યાન હાઇડ્રોજન પણ મુક્ત થાય છે", "ઓક્ઝેલોએસિટિક એસિડનું ડિકાર્બોક્સિલેશન ક્રેબ્સ ચક્રમાં થાય છે"], "ans": 3, "exp": "ઓક્ઝેલોએસિટિક એસિડનું ડિકાર્બોક્સિલેશન ક્રેબ્સ ચક્રમાં થતું નથી. ડિકાર્બોક્સિલેશન પ્રક્રિયામાં કાર્બન ડાયોક્સાઇડ મુક્ત થાય છે, પાયરૂવિક એસિડનું ડિકાર્બોક્સિલેશન માઇટોકોન્ડ્રિયામાં થાય છે, અને ડિકાર્બોક્સિલેશન પ્રક્રિયા દરમ્યાન હાઇડ્રોજન પણ મુક્ત થાય છે.", "ref": "Std 12 - Chapter 14: શ્વસન", "ch": ""}, {"q": "ક્રેબ્સ ચક્રમાં આઇસોસિટ્રેટનું α-કીટોગ્લુટારેટમાં રૂપાંતરણ દરમિયાન ડિકાર્બોક્સિલેશનની સાથે સાથે કયું અન્ય મહત્વનું પરિવર્તન થાય છે?", "opts": ["NAD⁺ નું NADH + H⁺ માં રિડક્શન", "FAD નું FADH₂ માં રિડક્શન", "GTP નું GDP માં હાઇડ્રોલિસિસ", "ATP નું ADP માં ફોસ્ફોરાયલેશન"], "ans": 0, "exp": "આઇસોસિટ્રેટ ડિહાઇડ્રોજીનેઝ ઉત્સેચક દ્વારા આઇસોસિટ્રેટનું α-કીટોગ્લુટારેટમાં રૂપાંતરણ થાય છે, જેમાં ડિકાર્બોક્સિલેશન સાથે NAD⁺ નું NADH + H⁺ માં રિડક્શન થાય છે. FAD નું રિડક્શન સુક્સિનેટ ડિહાઇડ્રોજીનેઝ દ્વારા થાય છે, GTP નું સિંથેસિસ સુક્સિનાઇલ-CoA સિન્થેટેઝ દ્વારા થાય છે, અને ATP નું ફોસ્ફોરાયલેશન આ પ્રક્રિયામાં સીધું સંકળાયેલું નથી.", "ref": "Std 11 - પ્રકરણ 14: શ્વસન અને ઊર્જા વિનિમય", "ch": ""}, {"q": "નીચેના પૈકી કયું સંયોજન ડિકાર્બોક્સિલેશન પ્રક્રિયામાં સીધું ભાગ લેતું નથી, પરંતુ તેના ડિકાર્બોક્સિલેશન માટે પહેલા એક અન્ય પ્રક્રિયામાંથી પસાર થવું પડે છે?", "opts": ["પાયરૂવેટ", "મેલેટ", "સિટ્રેટ", "ઓક્ઝેલોએસિટેટ"], "ans": 2, "exp": "સિટ્રેટ સીધું ડિકાર્બોક્સિલેશન પામતું નથી. તે પહેલા એકોનિટેઝ ઉત્સેચક દ્વારા આઇસોસિટ્રેટમાં રૂપાંતરિત થાય છે, જે પછી ડિકાર્બોક્સિલેશન પામે છે. પાયરૂવેટ, મેલેટ અને ઓક્ઝેલોએસિટેટ સીધા અથવા પરોક્ષ રીતે ડિકાર્બોક્સિલેશન સાથે સંકળાયેલા છે.", "ref": "Std 11 - પ્રકરણ 14: શ્વસન અને ઊર્જા વિનિમય", "ch": ""}, {"q": "ડિકાર્બોક્સિલેશન પ્રક્રિયામાં CO₂ મુક્ત થવાની સાથે સાથે કયા પ્રકારની ઊર્જા મુક્ત થાય છે જેનો ઉપયોગ કોષમાં અન્ય પ્રક્રિયાઓ માટે થાય છે?", "opts": ["પ્રકાશ ઊર્જા", "રાસાયણિક બંધન ઊર્જા (મુક્ત ઊર્જા - ΔG)", "ઉષ્મા ઊર્જા", "વિદ્યુત ઊર્જા"], "ans": 1, "exp": "ડિકાર્બોક્સિલેશન પ્રક્રિયા દરમિયાન કાર્બન-કાર્બન બંધ તૂટવાથી રાસાયણિક બંધન ઊર્જા (મુક્ત ઊર્જા - ΔG) મુક્ત થાય છે, જેનો ઉપયોગ કોષમાં ATP સિંથેસિસ જેવી અન્ય પ્રક્રિયાઓ માટે થાય છે. પ્રકાશ ઊર્જા પ્રકાશસંશ્લેષણમાં સંકળાયેલી છે, ઉષ્મા ઊર્જા બિનઉપયોગી છે, અને વિદ્યુત ઊર્જા કોષીય શ્વસનમાં સીધી સંકળાયેલી નથી.", "ref": "Std 11 - પ્રકરણ 14: શ્વસન અને ઊર્જા વિનિમય", "ch": ""}, {"q": "એક પ્રયોગમાં, કોષીય શ્વસન દરમિયાન ડિકાર્બોક્સિલેશન પ્રક્રિયા અટકાવવા માટે એક ચોક્કસ અવરોધક ઉમેરવામાં આવ્યો. આ અવરોધકની અસરથી કયું સંયોજન કોષમાં સંચિત થવાની શક્યતા સૌથી વધુ છે?", "opts": ["પાયરૂવેટ", "આલ્ફા-કીટોગ્લુટારેટ", "સુક્સિનાઇલ-CoA", "આઇસોસિટ્રેટ"], "ans": 3, "exp": "જો ડિકાર્બોક્સિલેશન પ્રક્રિયા અટકાવવામાં આવે, તો આઇસોસિટ્રેટનું α-કીટોગ્લુટારેટમાં રૂપાંતરણ અટકી જશે, જેના કારણે આઇસોસિટ્રેટ કોષમાં સંચિત થશે. પાયરૂવેટ ડિકાર્બોક્સિલેશન પહેલાનું સંયોજન છે, જ્યારે α-કીટોગ્લુટારેટ અને સુક્સિનાઇલ-CoA ડિકાર્બોક્સિલેશન પછીના તબક્કામાં આવે છે.", "ref": "Std 11 - પ્રકરણ 14: શ્વસન અને ઊર્જા વિનિમય", "ch": ""}, {"q": "એક સંશોધકે કોષીય શ્વસનના પ્રયોગ દરમિયાન નોંધ્યું કે, કોઈ એક ચોક્કસ સંયોજનના ડિકાર્બોક્સિલેશન દરમિયાન CO₂ મુક્ત થાય છે પરંતુ તેની સાથે NADH ઉત્પન્ન થતું નથી. આ પરિસ્થિતિમાં નીચેના પૈકી કયું સંયોજન ડિકાર્બોક્સિલેશન પામ્યું હશે?", "opts": ["પાયરુવેટ", "આલ્ફા-કીટોગ્લુટારેટ", "આઇસોસિટ્રેટ", "મેલેટ"], "ans": 3, "exp": "સાચો જવાબ D) મેલેટ છે. કારણ કે મેલેટનું ડિકાર્બોક્સિલેશન ઓક્ઝેલોએસિટેટમાં રૂપાંતરણ દરમિયાન CO₂ મુક્ત થાય છે, પરંતુ આ પ્રક્રિયામાં NADH ઉત્પન્ન થતું નથી. તેના બદલે NAD⁺ નું રિડક્શન થઈ NADH બને છે, પરંતુ મૂળભૂત રીતે મેલેટનું ડિકાર્બોક્સિલેશન NADH ઉત્પાદન સાથે સંકળાયેલું નથી. બાકીના વિકલ્પો ખોટા છે કારણ કે: A) પાયરુવેટનું ડિકાર્બોક્સિલેશન એસિટાઇલ-CoAમાં થાય છે અને તેની સાથે NADH ઉત્પન્ન થાય છે. B) આલ્ફા-કીટોગ્લુટારેટનું ડિકાર્બોક્સિલેશન સક્સિનાઇલ-CoAમાં થાય છે અને NADH ઉત્પન્ન થાય છે. C) આઇસોસિટ્રેટનું ડિકાર્બોક્સિલેશન α-કીટોગ્લુટારેટમાં થાય છે અને NADH ઉત્પન્ન થાય છે.", "ref": "Std 12 - પ્રકરણ 14: શ્વસન અને ઊર્જા ચયાપચય", "ch": ""}, {"q": "ક્     if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
