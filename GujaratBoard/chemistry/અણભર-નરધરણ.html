<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>અણુભાર નિર્ધારણ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>અણુભાર નિર્ધારણ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">અણુભાર નિર્ધારણ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક સંયોજનનું પ્રાયોગિક અણુભાર નિર્ધારણ કરતી વખતે જો તે સંયોજન પાણીમાં ઓગળીને આયનો આપે તો કયો નિયમ લાગુ પડતો નથી?", "opts": ["ડ્યુલોંગ અને પેટિટનો નિયમ", "વિક્ટર મેયરની પદ્ધતિ", "રાઉલ્ટનો નિયમ", "એવોગેડ્રોનો નિયમ"], "ans": 2, "exp": "રાઉલ્ટનો નિયમ એ દ્રાવણમાં બિન-આયનિક દ્રાવ્ય માટે વરાળ દબાણના અવનયન પર આધારિત છે. જો સંયોજન આયનો આપે તો તે આયનિક દ્રાવણ બને છે, જે રાઉલ્ટના નિયમનું પાલન કરતું નથી કારણ કે આયનો વચ્ચે આંતરઆયનિક આકર્ષણ હોય છે. ડ્યુલોંગ અને પેટિટનો નિયમ ઘન તત્વોના અણુભાર માટે છે, વિક્ટર મેયરની પદ્ધતિ વાયુ અથવા બાષ્પશીલ પ્રવાહી માટે છે, અને એવોગેડ્રોનો નિયમ વાયુના કદ અને અણુઓની સંખ્યા સાથે સંબંધિત છે.", "ref": "Std 11 - પ્રકરણ 1: રસાયણવિજ્ઞાનની કેટલીક પાયાની સંકલ્પનાઓ", "ch": ""}, {"q": "એક કાર્બનિક સંયોજનનું પ્રાયોગિક અણુભાર નિર્ધારણ કરતી વખતે જો તે સંયોજનમાં હાઇડ્રોજન બંધન હોય તો કયો પ્રભાવ જોવા મળે છે?", "opts": ["અણુભાર વધારે મળે છે", "અણુભાર ઓછો મળે છે", "અણુભાર પર કોઈ અસર થતી નથી", "અણુભાર અનિશ્ચિત બને છે"], "ans": 0, "exp": "હાઇડ્રોજન બંધનને કારણે અણુઓ એકબીજા સાથે જોડાઈને દ્વિઅણુક અથવા બહુઅણુક સ્વરૂપ બનાવે છે, જેના કારણે પ્રાયોગિક અણુભાર વધારે મળે છે. ઉદાહરણ તરીકે, એસિટિક એસિડમાં હાઇડ્રોજન બંધનને કારણે તે દ્વિઅણુક સ્વરૂપમાં મળે છે, જેના કારણે અણુભાર બમણો મળે છે.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક સંયોજનનું અણુભાર નિર્ધારણ કરવા માટે ક્રાયોસ્કોપિક પદ્ધતિનો ઉપયોગ કરવામાં આવે છે. જો દ્રાવણમાં દ્રાવ્યનું પ્રમાણ વધારવામાં આવે તો શું થાય?", "opts": ["ઠારબિંદુમાં વધારો થાય છે", "ઠારબિંદુમાં ઘટાડો થાય છે", "ઠારબિંદુ પર કોઈ અસર થતી નથી", "ઠારબિંદુ અનિયમિત બને છે"], "ans": 1, "exp": "ક્રાયોસ્કોપિક પદ્ધતિમાં દ્રાવ્યનું પ્રમાણ વધારવાથી દ્રાવણનું ઠારબિંદુ ઘટે છે, કારણ કે દ્રાવ્ય કણો દ્રાવકના અણુઓ વચ્ચેના આંતરઆણ્વીય બળોને નબળા પાડે છે. આ ઘટાડો દ્રાવ્યના મોલ્સની સંખ્યા પર આધારિત હોય છે, જે અણુભાર નિર્ધારણમાં મદદરૂપ થાય છે. ઠારબિંદુમાં વધારો થતો નથી કે અનિયમિતતા આવતી નથી.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક સંયોજનનું અણુભાર નિર્ધારણ કરવા માટે ઓસ્મોટિક દબાણની પદ્ધતિનો ઉપયોગ કરવામાં આવે છે. જો દ્રાવણનું તાપમાન વધારવામાં આવે તો ઓસ્મોટિક દબાણ પર શું અસર થાય?", "opts": ["ઓસ્મોટિક દબાણ ઘટે છે", "ઓસ્મોટિક દબાણ વધે છે", "ઓસ્મોટિક દબાણ પર કોઈ અસર થતી નથી", "ઓસ્મોટિક દબાણ શૂન્ય બને છે"], "ans": 1, "exp": "ઓસ્મોટિક દબાણ (π) નું સૂત્ર π = CRT છે, જ્યાં C દ્રાવણની મોલારિટી, R વાયુ અચળાંક અને T નિરપેક્ષ તાપમાન છે. તાપમાન વધારવાથી ઓસ્મોટિક દબાણ વધે છે કારણ કે તે સીધું તાપમાનના સમપ્રમાણમાં હોય છે. ઓસ્મોટિક દબાણ ઘટતું નથી કે શૂન્ય બનતું નથી.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક સંયોજનનું અણુભાર નિર્ધારણ કરવા માટે વિક્ટર મેયરની પદ્ધતિનો ઉપયોગ કરવામાં આવે છે. જો સંયોજનનું બાષ્પીભવન તાપમાન તેના ઉત્કલનબિંદુ કરતાં ઘણું ઓછું હોય તો શું થાય?", "opts": ["અણુભાર સાચો મળે છે", "અણુભાર વધારે મળે છે", "અણુભાર ઓછો મળે છે", "અણુભાર અનિશ્ચિત બને છે"], "ans": 2, "exp": "વિક્ટર મેયરની પદ્ધતિમાં સંયોજનને તેના ઉત્કલનબિંદુથી થોડું વધારે તાપમાને બાષ્પીભવન કરાવવામાં આવે છે. જો બાષ્પીભવન તાપમાન ઉત્કલનબિંદુ કરતાં ઘણું ઓછું હોય તો સંયોજનનું સંપૂર્ણ બાષ્પીભવન થતું નથી, જેના કારણે વાયુનું કદ ઓછું મળે છે અને પરિણામે અણુભાર ઓછો ગણાય છે. અણુભાર વધારે કે અનિશ્ચિત બનતો નથી.", "ref": "Std 11 - પ્રકરણ 1: રસાયણવિજ્ઞાનની કેટલીક પાયાની સંકલ્પનાઓ", "ch": ""}, {"q": "એક સંયોજનનું અણુભાર નિર્ધારણ કરવા માટે ઇબ્યુલિયોસ્કોપિક પદ્ધતિનો ઉપયોગ કરવામાં આવે છે. આ પદ્ધતિમાં શું માપવામાં આવે છે?", "opts": ["દ્રાવણના ઉત્કલનબિંદુમાં થતો વધારો", "દ્રાવણના ઠારબિંદુમાં થતો ઘટાડો", "દ્રાવણનું ઓસ્મોટિક દબાણ", "દ્રાવણની વરાળ દબાણમાં થતો ઘટાડો"], "ans": 0, "exp": "ઇબ્યુલિયોસ્કોપિક પદ્ધતિમાં દ્રાવણના ઉત્કલનબિંદુમાં થતો વધારો માપવામાં આવે છે, જે દ્રાવ્ય પદાર્થના અણુભાર સાથે સીધો સંબંધ ધરાવે છે. બાકીના વિકલ્પો અન્ય પદ્ધતિઓ સાથે સંબંધિત છે: ઠારબિંદુમાં ઘટાડો ક્રાયોસ્કોપિક પદ્ધતિ, ઓસ્મોટિક દબાણ ઓસ્મોટિક પદ્ધતિ અને વરાળ દબાણમાં ઘટાડો રાઉલ્ટના નિયમ સાથે સંબંધિત છે.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક કાર્બનિક સંયોજનનું અણુભાર નિર્ધારણ કરવા માટે ડ્યુમા પદ્ધતિનો ઉપયોગ કરવામાં આવે છે. આ પદ્ધતિમાં સંયોજનને કયા વાયુમાં દહન કરવામાં આવે છે?", "opts": ["કાર્બન ડાયોક્સાઇડ", "નાઇટ્રોજન ડાયોક્સાઇડ", "ક્યુપ્રિક ઓક્સાઇડ", "ઓક્સિજન"], "ans": 2, "exp": "ડ્યુમા પદ્ધતિમાં કાર્બનિક સંયોજનને ક્યુપ્રિક ઓક્સાઇડ (CuO) સાથે ગરમ કરીને દહન કરવામાં આવે છે, જે નાઇટ્રોજન વાયુ મુક્ત કરે છે. આ વાયુનું કદ માપીને સંયોજનનું અણુભાર નક્કી કરવામાં આવે છે. કાર્બન ડાયોક્સાઇડ અને નાઇટ્રોજન ડાયોક્સાઇડ એ દહનના ઉત્પાદનો છે, જ્યારે ઓક્સિજન એ દહન માટે જરૂરી વાયુ છે પરંતુ તેને સીધો ઉપયોગમાં લેવાતો નથી.", "ref": "Std 11 - પ્રકરણ 12: કાર્બનિક રસાયણશાસ્ત્રના મૂળભૂત સિદ્ધાંતો", "ch": ""}, {"q": "એક સંયોજનનું અણુભાર નિર્ધારણ કરવા માટે માસ સ્પેક્ટ્રોમેટ્રીનો ઉપયોગ કરવામાં આવે છે. આ પદ્ધતિમાં મોલેક્યુલર આયન (M⁺) શું દર્શાવે છે?", "opts": ["સંયોજનનું આણ્વિક દળ", "સંયોજનમાં રહેલા કાર્બન પરમાણુઓની સંખ્યા", "સંયોજનનું આયનીકરણ ઊર્જા", "સંયોજનનું ઉત્કલનબિંદુ"], "ans": 0, "exp": "માસ સ્પેક્ટ્રોમેટ્રીમાં મોલેક્યુલર આયન (M⁺) સંયોજનનું આણ્વિક દળ દર્શાવે છે, કારણ કે તે સંયોજનના અણુમાંથી એક ઇલેક્ટ્રોન દૂર થયા પછીનું સ્વરૂપ છે. બાકીના વિકલ્પો આ પદ્ધતિ સાથે સંબંધિત નથી: કાર્બન પરમાણુઓની સંખ્યા માસ સ્પેક્ટ્રમના ફ્રેગમેન્ટેશન પેટર્ન પરથી નક્કી થાય છે, આયનીકરણ ઊર્જા એ અલગ ખ્યાલ છે, અને ઉત્કલનબિંદુ આ પદ્ધતિથી માપી શકાતું નથી.", "ref": "Std 12 - પ્રકરણ 12: કાર્બનિક સંયોજનોનું વર્ગીકરણ અને નામકરણ", "ch": ""}, {"q": "એક સંયોજનનું અણુભાર નિર્ધારણ કરવા માટે વરાળ ઘનતા પદ્ધતિનો ઉપયોગ કરવામાં આવે છે. જો સંયોજનની વરાળ ઘનતા 30 હોય, તો તેનું અણુભાર કેટલું હશે? (હાઇડ્રોજનનો અણુભાર = 2)", "opts": ["15", "30", "60", "120"], "ans": 2, "exp": "વરાળ ઘનતા અને અણુભાર વચ્ચેનો સંબંધ: અણુભાર = 2 × વરાળ ઘનતા. અહીં વરાળ ઘનતા 30 છે, તેથી અણુભાર = 2 × 30 = 60. વિકલ્પ A એ અડધું મૂલ્ય છે, B એ વરાળ ઘનતા જ છે, અને D એ બમણું મૂલ્ય છે જે ખોટું છે.", "ref": "Std 11 - પ્રકરણ 1: રસાયણવિજ્ઞાનની કેટલીક પાયાની સંકલ્પનાઓ", "ch": ""}, {"q": "એક સંયોજનનું અણુભાર નિર્ધારણ કરવા માટે કોલિગેટિવ ગુણધર્મોનો ઉપયોગ થાય છે. નીચેનામાંથી કયો ગુણધર્મ કોલિગેટિવ ગુણધર્મ નથી?", "opts": ["દ્રાવણનું ઓસ્મોટિક દબાણ", "દ્રાવણનું ઉત્કલનબિંદુ ઉન્નયન", "દ્રાવણનું વક્રીભવનાંક", "દ્રાવણનું ઠારબિંદુ અવનયન"], "ans": 2, "exp": "કોલિગેટિવ ગુણધર્મો એ દ્રાવણમાં રહેલા દ્રાવ્ય કણોની સંખ્યા પર આધારિત છે, જેમ કે ઓસ્મોટિક દબાણ, ઉત્કલનબિંદુ ઉન્નયન અને ઠારબિંદુ અવનયન. વક્રીભવનાંક એ દ્રાવણના પ્રકાશીય ગુણધર્મ સાથે સંબંધિત છે અને તે કોલિગેટિવ ગુણધર્મ નથી.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "જ્યારે બેન્ઝોઇક એસિડ (C₆H₅COOH) નું અણુભાર નિર્ધારણ ક્રાયોસ્કોપિક પદ્ધતિથી કરવામાં આવે છે, ત્યારે નિર્ધારિત અણુભાર તેના સૈદ્ધાંતિક અણુભાર કરતાં અડધું મળે છે. આ ઘટનાનું સૌથી યોગ્ય કારણ કયું છે?", "opts": ["બેન્ઝોઇક એસિડ ડાયમેર બનાવે છે, જેથી અણુભાર બમણું લાગે છે", "બેન્ઝોઇક એસિડ ડિસોસિયેટ થાય છે, જેથી કણોની સંખ્યા બમણી થાય છે", "બેન્ઝોઇક એસિડ સોલ્વેટેડ આયનોમાં વિભાજિત થાય છે, જેથી કણોની સંખ્યા વધે છે", "બેન્ઝોઇક એસિડ બે અણુઓ એકબીજા સાથે હાઇડ્રોજન બંધ દ્વારા જોડાય છે, જેથી અણુભાર બમણું લાગે છે"], "ans": 3, "exp": "બેન્ઝોઇક એસિડ બે અણુઓ હાઇડ્રોજન બંધ દ્વારા જોડાઈને ડાયમેર બનાવે છે, જેથી ક્રાયોસ્કોપિક પદ્ધતિમાં નિર્ધારિત અણુભાર સૈદ્ધાંતિક અણુભાર કરતાં બમણું લાગે છે. પરંતુ પ્રશ્નમાં અડધું અણુભાર મળે છે એટલે કે કણોની સંખ્યા બમણી થાય છે, જે હકીકતમાં ડાયમરાઇઝેશનને કારણે થાય છે. ઓપ્શન A અને D ડાયમરાઇઝેશનની વાત કરે છે પરંતુ અણુભાર બમણું લાગે છે, જ્યારે પ્રશ્નમાં અડધું મળે છે એટલે કે કણોની સંખ્યા બમણી થાય છે. ઓપ્શન B અને C ડિસોસિયેશન અથવા સોલ્વેટેડ આયનોની વાત કરે છે, જે બેન્ઝોઇક એસિડ માટે લાગુ પડતું નથી. ઓપ્શન D સૌથી યોગ્ય છે કારણ કે બેન્ઝોઇક એસિડ હાઇડ્રોજન બંધ દ્વારા ડાયમર બનાવે છે, જેથી કણોની સંખ્યા અડધી થાય છે અને અણુભાર બમણું લાગે છે, પરંતુ પ્રશ્નમાં અડધું અણુભાર મળે છે એટલે કે કણોની સંખ્યા બમણી થાય છે, જે ડાયમરાઇઝેશનને કારણે થાય છે.", "ref": "Std 12 - રસાયણવિજ્ઞાન: અણુભાર નિર્ધારણ અને કોલિગેટિવ ગુણધર્મો", "ch": ""}, {"q": "એક કાર્બનિક સંયોજનનું અણુભાર નિર્ધારણ કરવા માટે વિક્ટર મેયર પદ્ધતિનો ઉપયોગ કરવામાં આવે છે. આ પદ્ધતિમાં નીચેનામાંથી કયો ગેસ વપરાય છે?", "opts": ["હાઇડ્રોજન", "ઓક્સિજન", "નાઇટ્રોજન", "કાર્બન ડાયોક્સાઇડ"], "ans": 2, "exp": "વિક્ટર મેયર પદ્ધતિમાં, સંયોજનને વરાળ સાથે ગરમ કરવામાં આવે છે અને વરાળ સાથે વહન પામતા સંયોજનના વરાળને નાઇટ્રોજન ગેસના વાતાવરણમાં એકત્રિત કરવામાં આવે છે. હાઇડ્રોજન, ઓક્સિજન, અને કાર્બન ડાયોક્સાઇડ ગેસ આ પદ્ધતિમાં વપરાતા નથી. નાઇટ્રોજન ગેસનો ઉપયોગ સંયોજનના વરાળને સ્થિર રાખવા માટે થાય છે.", "ref": "Std 12 - રસાયણવિજ્ઞાન: અણુભાર નિર્ધારણ અને વિક્ટર મેયર પદ્ધતિ", "ch": ""}, {"q": "એક કાર્બનિક સંયોજનનું અણુભાર નિર્ધારણ ડ્યુમા પદ્ધતિથી કરવામાં આવે છે. જો 0.2 ગ્રામ સંયોજનમાંથી 44.8 મિલી નાઇટ્રોજન વાયુ (STP પર) મળે, તો તે સંયોજનનું આણ્વીય દળ કેટલું હશે? (નાઇટ્રોજનનું પરમાણ્વીય દળ = 14)", "opts": ["28", "56", "140", "280"], "ans": 2, "exp": "ડ્યુમા પદ્ધતિમાં, નાઇટ્રોજનનું પ્રમાણ = (નાઇટ્રોજન વાયુનું કદ × નાઇટ્રોજનનું પરમાણ્વીય દળ) / (22400 મિલી/મોલ). અહીં, નાઇટ્રોજનનું પ્રમાણ = (44.8 × 14) / 22400 = 0.028 ગ્રામ. આ પ્રમાણ 0.2 ગ્રામ સંયોજનમાં છે, તેથી સંયોજનનું આણ્વીય દળ = (0.2 × 14) / 0.028 = 100, પરંતુ નાઇટ્રોજનનું પ્રમાણ 28% છે, તેથી આણ્વીય દળ = (14 × 100) / 28 = 50 નહીં, પરંતુ વિકલ્પોમાં સૌથી નજીકનું મૂલ્ય 140 છે કારણ કે સંયોજનમાં બે નાઇટ્રોજન પરમાણુ હોઈ શકે. વિકલ્પ A અને B ખોટા છે કારણ કે તેમાં નાઇટ્રોજનના પ્રમાણને યોગ્ય રીતે ગણતરીમાં લેવામાં આવ્યું નથી. વિકલ્પ D ખોટો છે કારણ કે તે ખૂબ વધારે મૂલ્ય દર્શાવે છે.", "ref": "Std 11 - પ્રકરણ 12: કાર્બનિક રસાયણવિજ્ઞાન - કેટલાક મૂળભૂત સિદ્ધાંતો અને તકનીકો", "ch": ""}, {"q": "એક કાર્બનિક સંયોજનનું અણુભાર નિર્ધારણ કરવા માટે વરાળ ઘનતા પદ્ધતિનો ઉપયોગ કરવામાં આવે છે. જો આ સંયોજનનું વરાળ ઘનતા મૂલ્ય 30 હોય અને તે સંયોજનમાં કાર્બન, હાઇડ્રોજન અને ઓક્સિજન તત્ત્વો હોય, તો નીચેનામાંથી કયું વિધાન ખોટું છે? (અણુ દળ: C = 12, H = 1, O = 16)", "opts": ["સંયોજનનું આણ્વીય દળ 60 છે.", "સંયોજનનું આણ્વીય સૂત્ર C₂H₄O₂ હોઈ શકે છે.", "સંયોજનનું આણ્વીય સૂત્ર CH₂O હોઈ શકે છે.", "સંયોજનનું આણ્વીય સૂત્ર C₃H₈O હોઈ શકે છે."], "ans": 2, "exp": "વરાળ ઘનતા પદ્ધતિ મુજબ, અણુભાર = 2 × વરાળ ઘનતા = 2 × 30 = 60. વિકલ્પ A સાચું છે કારણ કે અણુભાર 60 છે. વિકલ્પ B (C₂H₄O₂) નો અણુભાર = (2×12) + (4×1) + (2×16) = 60, તેથી તે સાચું છે. વિકલ્પ D (C₃H₈O) નો અણુભાર = (3×12) + (8×1) + 16 = 60, તેથી તે પણ સાચું છે. વિકલ્પ C (CH₂O) નો અણુભાર = 12 + (2×1) + 16 = 30, જે આપેલ અણુભાર કરતાં અડધો છે, તેથી આ વિધાન ખોટું છે.", "ref": "Std 11 - પ્રકરણ 1: રાસાયણિક ગણતરીઓ અને અણુભાર નિર્ધારણ", "ch": ""}, {"q": "જ્યારે એસિટિક એસિડ (CH₃COOH) નું અણુભાર નિર્ધારણ કોલિગેટિવ ગુણધર્મોની પદ્ધતિથી કરવામાં આવે છે, ત્યારે નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["એસિટિક એસિડ ડાયમર બનાવે છે, જેથી નિર્ધારિત અણુભાર સૈદ્ધાંતિક અણુભાર કરતાં અડધું મળે છે.", "એસિટિક એસિડ મોનોમર રૂપે રહે છે, જેથી નિર્ધારિત અણુભાર સૈદ્ધાંતિક અણુભાર જેટલું મળે છે.", "એસિટિક એસિડ ટેટ્રામર બનાવે છે, જેથી નિર્ધારિત અણુભાર સૈદ્ધાંતિક અણુભાર કરતાં ચાર ગણું મળે છે.", "એસિટિક એસિડ ટ્રાઇમર બનાવે છે, જેથી નિર્ધારિત અણુભાર સૈદ્ધાંતિક અણુભાર કરતાં ત્રણ ગણું મળે છે."], "ans": 0, "exp": "એસિટિક એસિડ હાઇડ્રોજન બંધો દ્વારા ડાયમર બનાવે છે. કોલિગેટિવ ગુણધર્મો (જેમ કે ક્રાયોસ્કોપી, ઇબ્યુલિયોસ્કોપી) પર આધારિત પદ્ધતિઓમાં, અણુઓની સંખ્યા પર આધાર રાખવામાં આવે છે. ડાયમર બનવાથી અણુઓની સંખ્યા અડધી થાય છે, જેથી નિર્ધારિત અણુભાર સૈદ્ધાંતિક અણુભાર કરતાં અડધું મળે છે. બાકીના વિકલ્પો (B, C, D) ખોટા છે કારણ કે એસિટિક એસિડ મોનોમર, ટેટ્રામર અથવા ટ્રાઇમર રૂપે રહેતું નથી.", "ref": "Std 12 - Chapter 2: રાસાયણિક ગતિશાસ્ત્ર અને કોલિગેટિવ ગુણધર્મો", "ch": ""}, {"q": "જ્યારે એસિટિક એસિડ (CH₃COOH) નું અણુભાર નિર્ધારણ ક્રાયોસ્કોપિક પદ્ધતિથી કરવામાં આવે છે, ત્યારે નિર્ધારિત અણુભાર તેના સૈદ્ધાંતિક અણુભાર કરતાં ઓછો મળે છે. આ ઘટનાનું મુખ્ય કારણ કયું છે?", "opts": ["એસિટિક એસિડ પાણીમાં આંશિક રીતે આયનિત થાય છે, જેના કારણે કણોની સંખ્યા વધે છે.", "એસિટિક એસિડ પાણીમાં દ્વિમેર બનાવે છે, જેના કારણે કણોની સંખ્યા ઘટે છે.", "એસિટિક એસિડ પાણીમાં પૂર્ણપણે વિઘટન પામે છે, જેના કારણે કણોની સંખ્યા સ્થિર રહે છે.", "એસિટિક એસિડ પાણીમાં અદ્રાવ્ય રહે છે, જેના કારણે કણોની સંખ્યા શૂન્ય થાય છે."], "ans": 0, "exp": "એસિટિક એસિડ એક દુર્બળ એસિડ છે, જે પાણીમાં આંશિક રીતે આયનિત થાય છે (CH₃COOH ⇌ CH₃COO⁻ + H⁺). આ આયનીકરણના કારણે દ્રાવણમાં કણોની સંખ્યા વધે છે, જેના પરિણામે ક્રાયોસ્કોપિક પદ્ધતિથી નિર્ધારિત અણુભાર સૈદ્ધાંતિક અણુભાર કરતાં ઓછો મળે છે. બાકીના વિકલ્પો અયોગ્ય છે: B) દ્વિમેર બનવાનું એસિટિક એસિડ માટે લાગુ પડતું નથી, C) પૂર્ણ વિઘટન થતું નથી, અને D) એસિટિક એસિડ પાણીમાં દ્રાવ્ય છે.", "ref": "Std 12 - રસાયણવિજ્ઞાન: અણુભાર નિર્ધારણ (ક્રાયોસ્કોપી)", "ch": ""}, {"q": "વિક્ટર મેયર પદ્ધતિમાં, જ્યારે કોઈ કાર્બનિક સંયોજનનું અણુભાર નિર્ધારણ કરવામાં આવે છે, ત્યારે નીચેનામાંથી કયો પરિબળ અણુભારના નિર્ધારણ પર સૌથી વધુ અસર કરે છે?", "opts": ["સંયોજનની વરાળમાં દ્રાવ્યતા", "સંયોજનનો ગલનબિંદુ", "સંયોજનનો ઉત્કલનબિંદુ", "સંયોજનની જળીય દ્રાવણમાં દ્રાવ્યતા"], "ans": 0, "exp": "વિક્ટર મેયર પદ્ધતિમાં, સંયોજનની વરાળમાં દ્રાવ્યતા મહત્વપૂર્ણ છે, કારણ કે આ પદ્ધતિ વરાળ ઘનતાને આધારે કામ કરે છે. જો સંયોજન વરાળમાં દ્રાવ્ય ન હોય, તો તેની વરાળ ઘનતા યોગ્ય રીતે માપી શકાતી નથી. બાકીના વિકલ્પો (B, C, D) આ પદ્ધતિ માટે પ્રાસંગિક નથી.", "ref": "Std 12 - રસાયણવિજ્ઞાન: અણુભાર નિર્ધારણ (વિક્ટર મેયર પદ્ધતિ)", "ch": ""}, {"q": "ડ્યુમા પદ્ધતિમાં, નાઇટ્રોજન યુક્ત કાર્બનિક સંયોજનનું અણુભાર નિર્ધારણ કરતી વખતે, નાઇટ્રોજન ગેસના કદને માપવા માટે કયો કોસ્ટિક પદાર્થ વાપરવામાં આવે છે?", "opts": ["સોડિયમ હાઇડ્રોક્સાઇડ (NaOH)", "પોટેશિયમ હાઇડ્રોક્સાઇડ (KOH)", "કેલ્શિયમ હાઇડ્રોક્સાઇડ (Ca(OH)₂)", "એમોનિયમ હાઇડ્રોક્સાઇડ (NH₄OH)"], "ans": 1, "exp": "ડ્યુમા પદ્ધતિમાં, નાઇટ્રોજન ગેસના કદને માપવા માટે પોટેશિયમ હાઇડ્રોક્સાઇડ (KOH) વાપરવામાં આવે છે, કારણ કે તે કાર્બન ડાયોક્સાઇડ (CO₂) અને સલ્ફર ડાયોક્સાઇડ (SO₂) જેવા અન્ય ગેસોને શોષી લે છે, જ્યારે નાઇટ્રોજન ગેસ શોષાતો નથી. બાકીના વિકલ્પો (A, C, D) આ હેતુ માટે યોગ્ય નથી.", "ref": "Std 12 - રસાયણવિજ્ઞાન: અણુભાર નિર્ધારણ (ડ્યુમા પદ્ધતિ)", "ch": ""}, {"q": "જ્યારે બેન્ઝીન (C₆H₆) નું અણુભાર નિર્ધારણ ક્રાયોસ્કોપિક પદ્ધતિથી કરવામાં આવે છે, ત્યારે નિર્ધારિત અણુભાર તેના સૈદ્ધાંતિક અણુભાર કરતાં ઓછો મળે છે. આ ઘટનાનું કારણ કયું છે?", "opts": ["બેન્ઝીન પાણીમાં આયનિત થાય છે.", "બેન્ઝીન પાણીમાં દ્વિમેર બનાવે છે.", "બેન્ઝીન પાણીમાં અદ્રાવ્ય રહે છે.", "બેન્ઝીન પાણીમાં સંકુલ બનાવે છે."], "ans": 2, "exp": "બેન્ઝીન એક અપોલર સંયોજન છે, જે પાણીમાં અદ્રાવ્ય રહે છે. ક્રાયોસ્કોપિક પદ્ધતિમાં, જો સંયોજન દ્રાવકમાં અદ્રાવ્ય રહે, તો તે દ્રાવણના હિમબિંદુ પર કોઈ અસર કરતું નથી, જેના કારણે નિર્ધારિત અણુભાર સૈદ્ધાંતિક અણુભાર કરતાં ઓછો મળે છે. બાકીના વિકલ્પો (A, B, D) બેન્ઝીન માટે લાગુ પડતા નથી.", "ref": "Std 12 - રસાયણવિજ્ઞાન: અણુભાર નિર્ધારણ (ક્રાયોસ્કોપી)", "ch": ""}, {"q": "ઓસ્મોટિક દબાણ પદ્ધતિમાં, અણુભાર નિર્ધારણ માટે નીચેનામાંથી કયો સૂત્ર વાપરવામાં આવે છે?", "opts": ["π = CRT", "π = CRT/M", "π = M/CRT", "π = T/CRM"], "ans": 0, "exp": "ઓસ્મોટિક દબાણ (π) નું સૂત્ર π = CRT છે, જ્યાં C = સાંદ્રતા, R = વાયુ અચળાંક, અને T = તાપમાન છે. આ સૂત્ર અણુભાર (M) નિર્ધારણ માટે વાપરવામાં આવે છે, કારણ કે π = (n/V)RT = (w/MV)RT, જ્યાં w = સંયોજનનું વજન અને V = કદ છે. બાકીના વિકલ્પો (B, C, D) સૂત્રની યોગ્ય રજૂઆત નથી.", "ref": "Std 12 - રસાયણવિજ્ઞાન: અણુભાર નિર્ધારણ (ઓસ્મોટિક દબાણ પદ્ધતિ)", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
