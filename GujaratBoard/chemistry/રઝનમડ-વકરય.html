<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>રોઝેનમંડ વિક્રિયા</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>રોઝેનમંડ વિક્રિયા</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">રોઝેનમંડ વિક્રિયા</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "રોઝેનમંડ વિક્રિયામાં CO₂ નું સ્થિરીકરણ કરતો પ્રથમ સ્થાયી સંયોજન કયું છે?", "opts": ["3-ફોસ્ફોગ્લિસરિક એસિડ (3-PGA)", "ઓક્ઝેલો એસિટિક એસિડ (OAA)", "રિબ્યુલોઝ-1,5-બાયફોસ્ફેટ (RuBP)", "ફોસ્ફોઇનોલ પાયરૂવિક એસિડ (PEP)"], "ans": 0, "exp": "રોઝેનમંડ વિક્રિયામાં CO₂ નું સ્થિરીકરણ RuBP સાથે થઈને 3-ફોસ્ફોગ્લિસરિક એસિડ (3-PGA) બને છે, જે પ્રથમ સ્થાયી સંયોજન છે. OAA એ C₄ વનસ્પતિઓમાં પ્રથમ સ્થાયી સંયોજન છે, RuBP એ CO₂ ગ્રાહક છે, અને PEP એ C₄ ચક્રમાં CO₂ ગ્રાહક છે.", "ref": "Std 11 - પ્રકરણ 13: પ્રકાશસંશ્લેષણમાં વનસ્પતિઓમાં ખોરાકનું ઉત્પાદન", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન રોઝેનમંડ વિક્રિયાના સંદર્ભમાં ખોટું છે?", "opts": ["આ વિક્રિયા કોષના સ્ટ્રોમામાં થાય છે.", "RuBP કાર્બોક્સિલેઝ ઉત્સેચક આ વિક્રિયામાં CO₂ નું સ્થિરીકરણ કરે છે.", "પ્રકાશ આ વિક્રિયા માટે જરૂરી છે કારણ કે તેમાં ATP અને NADPH નો ઉપયોગ થાય છે.", "આ વિક્રિયામાં CO₂ નું સ્થિરીકરણ થઈને ગ્લુકોઝનું સીધું નિર્માણ થાય છે."], "ans": 3, "exp": "રોઝેનમંડ વિક્રિયામાં CO₂ નું સ્થિરીકરણ થઈને 3-PGA બને છે, જે પછી ગ્લુકોઝમાં રૂપાંતરિત થાય છે, પરંતુ ગ્લુકોઝનું સીધું નિર્માણ થતું નથી. બાકીના વિધાનો સાચાં છે: વિક્રિયા સ્ટ્રોમામાં થાય છે, RuBP કાર્બોક્સિલેઝ ઉત્સેચક CO₂ નું સ્થિરીકરણ કરે છે, અને પ્રકાશ આધારિત પ્રક્રિયામાં ઉત્પન્ન થતા ATP અને NADPH નો ઉપયોગ થાય છે.", "ref": "Std 11 - પ્રકરણ 13: પ્રકાશસંશ્લેષણમાં વનસ્પતિઓમાં ખોરાકનું ઉત્પાદન", "ch": ""}, {"q": "રોઝેનમંડ વિક્રિયામાં RuBP નું પુનઃનિર્માણ કયા ચક્ર દ્વારા થાય છે?", "opts": ["ક્રેબ્સ ચક્ર", "કેલ્વિન ચક્ર", "C₄ ચક્ર", "ગ્લાયકોલિસીસ"], "ans": 1, "exp": "રોઝેનમંડ વિક્રિયા કેલ્વિન ચક્રનો ભાગ છે, જેમાં RuBP નું પુનઃનિર્માણ થાય છે. ક્રેબ્સ ચક્ર શ્વસન સાથે સંબંધિત છે, C₄ ચક્ર એ C₄ વનસ્પતિઓમાં CO₂ નું સ્થિરીકરણ કરે છે, અને ગ્લાયકોલિસીસ ગ્લુકોઝના વિઘટન સાથે સંબંધિત છે.", "ref": "Std 11 - પ્રકરણ 13: પ્રકાશસંશ્લેષણમાં વનસ્પતિઓમાં ખોરાકનું ઉત્પાદન", "ch": ""}, {"q": "રોઝેનમંડ વિક્રિયામાં CO₂ નું સ્થિરીકરણ થતાં બનતા 3-PGA નું રિડક્શન કયા સંયોજનો દ્વારા થાય છે?", "opts": ["ATP અને FADH₂", "ATP અને NADPH", "NADH અને FADH₂", "GTP અને NADPH"], "ans": 1, "exp": "રોઝેનમંડ વિક્રિયામાં 3-PGA નું રિડક્શન ATP અને NADPH દ્વારા થાય છે, જે પ્રકાશ આધારિત પ્રક્રિયામાં ઉત્પન્ન થાય છે. FADH₂ અને NADH શ્વસનમાં ઇલેક્ટ્રોન વાહક તરીકે કામ કરે છે, જ્યારે GTP પ્રોટીન સંશ્લેષણમાં ઉપયોગી છે.", "ref": "Std 11 - પ્રકરણ 13: પ્રકાશસંશ્લેષણમાં વનસ્પતિઓમાં ખોરાકનું ઉત્પાદન", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન રોઝેનમંડ વિક્રિયા અને C₄ ચક્ર વચ્ચેનો મુખ્ય તફાવત દર્શાવે છે?", "opts": ["રોઝેનમંડ વિક્રિયા માત્ર રાત્રે થાય છે, જ્યારે C₄ ચક્ર દિવસે થાય છે.", "રોઝેનમંડ વિક્રિયામાં CO₂ નું સ્થિરીકરણ RuBP દ્વારા થાય છે, જ્યારે C₄ ચક્રમાં PEP દ્વારા થાય છે.", "રોઝેનમંડ વિક્રિયા કોષકેન્દ્રમાં થાય છે, જ્યારે C₄ ચક્ર કોષરસમાં થાય છે.", "રોઝેનમંડ વિક્રિયામાં ગ્લુકોઝનું સીધું નિર્માણ થાય છે, જ્યારે C₄ ચક્રમાં માત્ર પાયરૂવિક એસિડ બને છે."], "ans": 1, "exp": "રોઝેનમંડ વિક્રિયામાં CO₂ નું સ્થિરીકરણ RuBP સાથે થઈને 3-PGA બને છે, જ્યારે C₄ ચક્રમાં CO₂ નું સ્થિરીકરણ PEP સાથે થઈને OAA બને છે. રોઝેનમંડ વિક્રિયા દિવસે સ્ટ્રોમામાં થાય છે, અને ગ્લુકોઝનું સીધું નિર્માણ થતું નથી. બંને વિક્રિયાઓ કોષરસમાં થાય છે, કોષકેન્દ્રમાં નહીં.", "ref": "Std 11 - પ્રકરણ 13: પ્રકાશસંશ્લેષણમાં વનસ્પતિઓમાં ખોરાકનું ઉત્પાદન", "ch": ""}, {"q": "રોઝેનમંડ વિક્રિયામાં 3-ફોસ્ફોગ્લિસરેટ (3-PGA) નું રિડક્શન થઈને કયું સંયોજન બને છે, જે પછીથી ગ્લુકોઝના સંશ્લેષણમાં ઉપયોગી બને છે?", "opts": ["ગ્લિસરાલ્ડિહાઇડ-3-ફોસ્ફેટ (G3P)", "રિબ્યુલોઝ-1,5-બિસફોસ્ફેટ (RuBP)", "ફ્રુક્ટોઝ-6-ફોસ્ફેટ", "ગ્લુકોઝ-6-ફોસ્ફેટ"], "ans": 0, "exp": "3-ફોસ્ફોગ્લિસરેટ (3-PGA) નું રિડક્શન થઈને ગ્લિસરાલ્ડિહાઇડ-3-ફોસ્ફેટ (G3P) બને છે, જે રોઝેનમંડ વિક્રિયાનું મુખ્ય ઉત્પાદન છે અને ગ્લુકોઝના સંશ્લેષણમાં ઉપયોગી છે. RuBP એ CO₂ નું સ્થિરીકરણ કરતું સંયોજન છે, જ્યારે ફ્રુક્ટોઝ-6-ફોસ્ફેટ અને ગ્લુકોઝ-6-ફોસ્ફેટ એ ગ્લુકોઝ સંશ્લેષણના પછીના તબક્કામાં બનતા સંયોજનો છે.", "ref": "Std 11 - પ્રકરણ 13: પ્રકાશસંશ્લેષણમાં કાર્બનનું સ્થિરીકરણ", "ch": ""}, {"q": "રોઝેનમંડ વિક્રિયામાં ATP અને NADPH નો ઉપયોગ કયા તબક્કામાં થાય છે?", "opts": ["કાર્બોક્સિલેશન તબક્કામાં", "રિડક્શન તબક્કામાં", "પુનઃનિર્માણ તબક્કામાં", "B અને C બંને તબક્કામાં"], "ans": 3, "exp": "રોઝેનમંડ વિક્રિયામાં ATP અને NADPH નો ઉપયોગ રિડક્શન તબક્કામાં (3-PGA નું G3P માં રૂપાંતરણ) અને પુનઃનિર્માણ તબક્કામાં (RuBP નું પુનઃનિર્માણ) થાય છે. કાર્બોક્સિલેશન તબક્કામાં ATP કે NADPH નો ઉપયોગ થતો નથી.", "ref": "Std 11 - પ્રકરણ 13: પ્રકાશસંશ્લેષણમાં કાર્બનનું સ્થિરીકરણ", "ch": ""}, {"q": "રોઝેનમંડ વિક્રિયામાં CO₂ નું સ્થિરીકરણ થતાં બનતા 6 અણુ 3-PGA માંથી કેટલા અણુ ગ્લુકોઝના સંશ્લેષણમાં ઉપયોગી બને છે?", "opts": ["1 અણુ", "2 અણુ", "6 અણુ", "એક પણ નહીં"], "ans": 0, "exp": "રોઝેનમંડ વિક્રિયામાં 6 અણુ 3-PGA બને છે, જેમાંથી 1 અણુ ગ્લુકોઝના સંશ્લેષણમાં ઉપયોગી બને છે, જ્યારે બાકીના 5 અણુ RuBP ના પુનઃનિર્માણમાં વપરાય છે. આ પ્રક્રિયા ચક્રીય હોવાથી ગ્લુકોઝનું સંશ્લેષણ સતત ચાલુ રહે છે.", "ref": "Std 11 - પ્રકરણ 13: પ્રકાશસંશ્લેષણમાં કાર્બનનું સ્થિરીકરણ", "ch": ""}, {"q": "રોઝેનમંડ વિક્રિયામાં RuBP કાર્બોક્સિલેઝ/ઓક્સિજનેઝ (Rubisco) ઉત્સેચકની ભૂમિકા શું છે? (મલ્ટી-કોન્સેપ્ટ)", "opts": ["માત્ર CO₂ નું સ્થિરીકરણ કરે છે.", "CO₂ અને O₂ બંનેનું સ્થિરીકરણ કરે છે, પરંતુ CO₂ ને પ્રાથમિકતા આપે છે.", "માત્ર O₂ નું સ્થિરીકરણ કરીને ફોટોઓક્સિડેશનને પ્રેરિત કરે છે.", "ATP નું ADP માં રૂપાંતરણ કરે છે."], "ans": 1, "exp": "Rubisco ઉત્સેચક CO₂ અને O₂ બંનેનું સ્થિરીકરણ કરી શકે છે, પરંતુ સામાન્ય પરિસ્થિતિમાં તે CO₂ ને પ્રાથમિકતા આપે છે. જ્યારે O₂ નું સ્થિરીકરણ થાય છે ત્યારે ફોટોઓક્સિડેશન થાય છે, જે વનસ્પતિ માટે નુકસાનકારક છે. Rubisco ATP નું ADP માં રૂપાંતરણ કરતું નથી.", "ref": "Std 11 - પ્રકરણ 13: પ્રકાશસંશ્લેષણમાં કાર્બનનું સ્થિરીકરણ", "ch": ""}, {"q": "રોઝેનમંડ વિક્રિયામાં, જો O₂ ની સાંદ્રતા અતિશય વધી જાય તો RuBP નું કયું રૂપ બનશે અને તે કયા ચક્ર તરફ દોરી જશે?", "opts": ["RuBP ઓક્સિજનેશન થઈ 2-ફોસ્ફોગ્લાયકોલેટ બનશે અને ફોટોરેસ્પિરેશન ચક્ર તરફ દોરી જશે", "RuBP કાર્બોક્સિલેશન થઈ 3-PGA બનશે અને કેલ્વિન ચક્ર તરફ દોરી જશે", "RuBP હાઇડ્રોલાઇસિસ થઈ ગ્લિસરાલ્ડિહાઇડ-3-ફોસ્ફેટ બનશે અને પેન્ટોઝ ફોસ્ફેટ પાથવે તરફ દોરી જશે", "RuBP ડિકાર્બોક્સિલેશન થઈ પાયરૂવેટ બનશે અને ગ્લાયોક્સિલેટ ચક્ર તરફ દોરી જશે"], "ans": 0, "exp": "RuBP ઓક્સિજનેઝ (Rubisco) ઉત્સેચક O₂ ની ઉચ્ચ સાંદ્રતામાં RuBP નું ઓક્સિજનેશન કરે છે, જેથી 2-ફોસ્ફોગ્લાયકોલેટ બને છે અને ફોટોરેસ્પિરેશન ચક્ર શરૂ થાય છે. વિકલ્પ B ખોટો છે કારણ કે કાર્બોક્સિલેશન CO₂ ની હાજરીમાં થાય છે, O₂ ની નહીં. વિકલ્પ C અને D ખોટા છે કારણ કે RuBP નું હાઇડ્રોલાઇસિસ અથવા ડિકાર્બોક્સિલેશન રોઝેનમંડ વિક્રિયા અથવા Rubisco ની ક્રિયામાં થતું નથી.", "ref": "Std 12 - પ્રકરણ 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "રોઝેનમંડ વિક્રિયામાં, RuBP (રિબ્યુલોઝ-1,5-બાયફોસ્ફેટ) નું ઓક્સિજનેશન થવાને લીધે કયું સંયોજન બને છે, જે પ્રકાશશ્વસન (ફોટોરેસ્પિરેશન) નું કારણ બને છે?", "opts": ["3-ફોસ્ફોગ્લિસરેટ (3-PGA)", "2-ફોસ્ફોગ્લાઇકોલેટ (2-PG)", "ગ્લાઇસીન (Glycine)", "સર્બિટોલ (Sorbitol)"], "ans": 1, "exp": "રોઝેનમંડ વિક્રિયામાં RuBP નું ઓક્સિજનેશન RuBisCO ઉત્સેચક દ્વારા થાય છે, જ્યારે O2 ની સાંદ્રતા વધી જાય છે. આ પ્રક્રિયામાં 2-ફોસ્ફોગ્લાઇકોલેટ (2-PG) બને છે, જે પ્રકાશશ્વસનનું કારણ બને છે. 3-PGA (A) CO2 ના સ્થિરીકરણ દરમિયાન બને છે, ગ્લાઇસીન (C) પ્રકાશશ્વસનના પગલામાં પછી બને છે, અને સર્બિટોલ (D) એક શર્કરા અલ્કોહોલ છે જે આ પ્રક્રિયામાં સંબંધિત નથી.", "ref": "Std 12 - પ્રકરણ 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "રોઝેનમંડ વિક્રિયાના કેલ્વિન ચક્રમાં, કયા તબક્કામાં ATP નો ઉપયોગ થતો નથી?", "opts": ["CO2 નું સ્થિરીકરણ (કાર્બોક્સિલેશન)", "3-PGA નું રિડક્શન", "RuBP નું પુનઃનિર્માણ", "G3P નું ગ્લુકોઝમાં રૂપાંતર"], "ans": 0, "exp": "CO2 નું સ્થિરીકરણ (કાર્બોક્સિલેશન) RuBisCO દ્વારા થાય છે અને આ તબક્કામાં ATP નો ઉપયોગ થતો નથી. 3-PGA નું રિડક્શન (B) અને RuBP નું પુનઃનિર્માણ (C) માટે ATP ની જરૂર પડે છે. G3P નું ગ્લુકોઝમાં રૂપાંતર (D) પણ ATP નો ઉપયોગ કરે છે, પરંતુ તે કેલ્વિન ચક્રનો ભાગ નથી.", "ref": "Std 12 - પ્રકરણ 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "રોઝેનમંડ વિક્રિયામાં, નીચેના પૈકી કયું વિધાન RuBisCO ઉત્સેચકની દ્વિઅર્થી પ્રકૃતિ (Dual Nature) વિશે સાચું છે?", "opts": ["તે ફક્ત કાર્બોક્સિલેઝ તરીકે કામ કરે છે", "તે ફક્ત ઓક્સિજનેઝ તરીકે કામ કરે છે", "તે કાર્બોક્સિલેઝ અને ઓક્સિજનેઝ બંને તરીકે કામ કરે છે", "તે હાઇડ્રોલેઝ તરીકે કામ કરે છે"], "ans": 2, "exp": "RuBisCO ઉત્સેચકની દ્વિઅર્થી પ્રકૃતિ એ છે કે તે કાર્બોક્સિલેઝ (CO2 નું સ્થિરીકરણ) અને ઓક્સિજનેઝ (O2 સાથે પ્રક્રિયા) બંને તરીકે કામ કરે છે. આથી (C) સાચું છે. (A) અને (B) અધૂરા છે, જ્યારે (D) ખોટું છે કારણ કે RuBisCO હાઇડ્રોલેઝ તરીકે કામ કરતું નથી.", "ref": "Std 12 - પ્રકરણ 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "રોઝેનમંડ વિક્રિયામાં, કેલ્વિન ચક્રના એક ચક્ર દરમિયાન, કેટલા ATP અણુઓનો ઉપયોગ થાય છે?", "opts": ["1", "2", "3", "4"], "ans": 2, "exp": "કેલ્વિન ચક્રના એક ચક્ર દરમિયાન, 3 ATP અણુઓનો ઉપયોગ થાય છે: 2 ATP RuBP નું પુનઃનિર્માણ માટે અને 1 ATP 3-PGA નું રિડક્શન માટે. આથી (C) સાચું છે. (A), (B), અને (D) ખોટા છે.", "ref": "Std 12 - પ્રકરણ 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "રોઝેનમંડ વિક્રિયામાં, નીચેના પૈકી કયું સંયોજન કેલ્વિન ચક્રનું પ્રથમ સ્થાયી ઉત્પાદન છે, જે વનસ્પતિ કોષમાંથી બહાર કાઢી શકાય છે?", "opts": ["RuBP", "3-PGA", "G3P (ગ્લિસરાલ્ડિહાઇડ-3-ફોસ્ફેટ)", "ગ્લુકોઝ"], "ans": 2, "exp": "કેલ્વિન ચક્રનું પ્રથમ સ્થાયી ઉત્પાદન G3P (ગ્લિસરાલ્ડિહાઇડ-3-ફોસ્ફેટ) છે, જે વનસ્પતિ કોષમાંથી બહાર કાઢી શકાય છે. RuBP (A) ચક્રનો પ્રારંભિક સંયોજન છે, 3-PGA (B) અસ્થાયી ઉત્પાદન છે, અને ગ્લુકોઝ (D) પછીના તબક્કામાં બને છે. આથી (C) સાચું છે.", "ref": "Std 12 - પ્રકરણ 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "રોઝેનમંડ વિક્રિયામાં, RuBisCO ઉત્સેચક દ્વારા કયા બે પ્રક્રિયાઓની સ્પર્ધા થાય છે, અને તેના પરિણામે કયા બે મુખ્ય ઉત્પાદનો મળે છે?", "opts": ["કાર્બોક્સિલેશન અને ઓક્સિજનેશન; 3-PGA અને 2-PGA", "કાર્બોક્સિલેશન અને ડીકાર્બોક્સિલેશન; 3-PGA અને ગ્લાયકોલેટ", "કાર્બોક્સિલેશન અને ઓક્સિજનેશન; 3-PGA અને ગ્લાયકોલેટ", "ઓક્સિજનેશન અને હાઇડ્રોલિસિસ; 2-PGA અને ગ્લાયકોલેટ"], "ans": 2, "exp": "RuBisCO ઉત્સેચકની દ્વિઅર્થી પ્રકૃતિ હેઠળ, તે કાર્બોક્સિલેશન (CO2 સાથે પ્રક્રિયા) અને ઓક્સિજનેશન (O2 સાથે પ્રક્રિયા) બંને કરે છે. કાર્બોક્સિલેશનથી 3-PGA બને છે, જ્યારે ઓક્સિજનેશનથી ગ્લાયકોલેટ બને છે. વિકલ્પ Aમાં 2-PGA ખોટું છે કારણ કે તે ઓક્સિજનેશનનું ઉત્પાદન નથી. વિકલ્પ Bમાં ડીકાર્બોક્સિલેશન RuBisCO દ્વારા થતી પ્રક્રિયા નથી. વિકલ્પ Dમાં હાઇડ્રોલિસિસ અને 2-PGA અયથાર્થ છે.", "ref": "Std 12 - અધ્યાય 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "રોઝેનમંડ વિક્રિયામાં, જો CO2 ની સાંદ્રતા અતિશય ઓછી હોય અને O2 ની સાંદ્રતા અતિશય વધુ હોય, તો RuBP નું કયું પરિવર્તન થશે અને તેના પરિણામે કયા ચક્ર તરફ દોરી જશે?", "opts": ["RuBP નું કાર્બોક્સિલેશન થશે અને કેલ્વિન ચક્ર તરફ દોરી જશે", "RuBP નું ઓક્સિજનેશન થશે અને ફોટોરેસ્પિરેશન તરફ દોરી જશે", "RuBP નું હાઇડ્રોલિસિસ થશે અને ગ્લાયકોલેટ પથ તરફ દોરી જશે", "RuBP નું ડીકાર્બોક્સિલેશન થશે અને C4 ચક્ર તરફ દોરી જશે"], "ans": 1, "exp": "CO2 ની ઓછી અને O2 ની વધુ સાંદ્રતામાં, RuBisCO ઓક્સિજનેશન પ્રક્રિયા તરફ વળે છે, જેમાં RuBP નું ઓક્સિજનેશન થાય છે અને ફોટોરેસ્પિરેશન (પ્રકાશશ્વસન) ચક્ર તરફ દોરી જાય છે. વિકલ્પ A ખોટો છે કારણ કે ઓછી CO2 સાંદ્રતામાં કાર્બોક્સિલેશન થતું નથી. વિકલ્પ C અને Dમાં ઉલ્લેખિત પ્રક્રિયાઓ RuBisCO દ્વારા થતી નથી.", "ref": "Std 12 - અધ્યાય 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "રોઝેનમંડ વિક્રિયાના કેલ્વિન ચક્રમાં, નીચેના પૈકી કયું સંયોજન RuBP નું પુનઃનિર્માણ કરવા માટે જરૂરી નથી?", "opts": ["3-PGA", "G3P", "ATP", "NADPH"], "ans": 0, "exp": "RuBP નું પુનઃનિર્માણ G3P (ગ્લિસરાલ્ડિહાઇડ-3-ફોસ્ફેટ) થી થાય છે, જેમાં ATP નો ઉપયોગ થાય છે. NADPH નો ઉપયોગ 3-PGA નું રિડક્શન કરવા માટે થાય છે, પરંતુ RuBP નું પુનઃનિર્માણ માટે નથી. 3-PGA એ RuBP નું પુનઃનિર્માણ માટે જરૂરી સંયોજન નથી, પરંતુ તે ચક્રનું મધ્યવર્તી ઉત્પાદન છે. વિકલ્પ B, C, અને D RuBP નું પુનઃનિર્માણ માટે આંશિક રીતે જરૂરી છે.", "ref": "Std 12 - અધ્યાય 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "રોઝેનમંડ વિક્રિયામાં, નીચેના પૈકી કયું વિધાન ફોટોરેસ્પિરેશન (પ્રકાશશ્વસન) ની પ્રક્રિયા વિશે સાચું નથી?", "opts": ["ફોટોરેસ્પિરેશનમાં, RuBP નું ઓક્સિજનેશન થાય છે અને ગ્લાયકોલેટ બને છે", "ફોટોરેસ્પિરેશનમાં, ગ્લાયકોલેટ પેરોક્સિસોમમાં જાય છે અને ગ્લાયસિન અને સર્જિનમાં રૂપાંતરિત થાય છે", "ફોટોરેસ્પિરેશનમાં, CO2 મુક્ત થાય છે અને ATP નો ઉપયોગ થાય છે", "ફોટોરેસ્પિરેશનમાં, O2 નો ઉપયોગ થતો નથી"], "ans": 3, "exp": "ફોટોરેસ્પિરેશનમાં O2 નો ઉપયોગ થાય છે (RuBP નું ઓક્સિજનેશન માટે). વિકલ્પ A, B, અને C સાચા છે: ગ્લાયકોલેટ બને છે, તે પેરોક્સિસોમમાં ગ્લાયસિન અને સર્જિનમાં રૂપાંતરિત થાય છે, અને CO2 મુક્ત થાય છે જ્યારે ATP નો ઉપયોગ થાય છે. વિકલ્પ D ખોટો છે કારણ કે O2 નો ઉપયોગ થાય છે.", "ref": "Std 12 - અધ્યાય 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "રોઝેનમંડ વિક્રિયામાં, કેલ્વિન ચક્રના એક પૂર્ણ ચક્ર દરમિયાન, નીચેના પૈકી કયા સંયોજનનું નેટ ઉત્પાદન શૂન્ય હોય છે?", "opts": ["RuBP", "3-PGA", "G3P", "ATP"], "ans": 0, "exp": "કેલ્વિન ચક્રના એક પૂર્ણ ચક્ર દરમિયાન, RuBP નું નેટ ઉત્પાદન શૂન્ય હોય છે કારણ કે તે ચક્રની શરૂઆત અને અંતમાં સમાન પ્રમાણમાં હોય છે. 3-PGA અને G3P મધ્યવર્તી ઉત્પાદનો છે, જ્યારે ATP નો ઉપયોગ થાય છે અને તેનું નેટ ઉત્પાદન શૂન્ય નથી. વિકલ્પ B, C, અને D ખોટા છે કારણ કે તેમનું નેટ ઉત્પાદન શૂન્ય નથી.", "ref": "Std 12 - અધ્યાય 13: વનસ્પતિમાં શ્વસન અને પ્રકાશસંશ્લેષણ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
