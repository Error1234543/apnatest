<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>અનાદર્શ દ્રાવણ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>અનાદર્શ દ્રાવણ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">અનાદર્શ દ્રાવણ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક વિદ્યાર્થીએ બે પ્રવાહીઓ A અને B ને મિશ્ર કરતાં મળતું દ્રાવણ અપારદર્શક અને સ્થિર જણાયું. થોડા સમય બાદ તેમાંથી કણો નીચે બેસી ગયા. આ દ્રાવણને કયા પ્રકારનું દ્રાવણ કહી શકાય?", "opts": ["સાચું દ્રાવણ", "કલિલ દ્રાવણ", "નિલંબન (સસ્પેન્શન)", "અનાદર્શ દ્રાવણ"], "ans": 2, "exp": "આ દ્રાવણમાં કણોનું કદ મોટું હોવાથી તે નિલંબન (સસ્પેન્શન) છે. નિલંબનમાં કણો સમય જતાં નીચે બેસી જાય છે, જે આ કિસ્સામાં જોવા મળ્યું છે. સાચું દ્રાવણ પારદર્શક અને સ્થિર હોય છે, જ્યારે કલિલ દ્રાવણમાં કણો નાના હોવાથી તે અપારદર્શક પણ સ્થિર રહે છે. અનાદર્શ દ્રાવણ શબ્દ સામાન્ય રીતે કલિલ અને નિલંબન બંને માટે વપરાય છે, પરંતુ અહીં ચોક્કસ લક્ષણો નિલંબનને સૂચવે છે.", "ref": "Std 11 - પ્રકરણ 5: દ્રાવણોના ગુણધર્મો", "ch": ""}, {"q": "અનાદર્શ દ્રાવણના સંદર્ભમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["કલિલ દ્રાવણમાં કણોનું કદ 1 nm થી 1000 nm વચ્ચે હોય છે.", "નિલંબનમાં કણોનું કદ 1000 nm કરતાં વધુ હોય છે અને તેને નરી આંખે જોઈ શકાય છે.", "કલિલ દ્રાવણમાં ટિંડલ અસર જોવા મળતી નથી.", "અનાદર્શ દ્રાવણોમાં કણોનું વિતરણ અસમાન હોય છે."], "ans": 2, "exp": "કલિલ દ્રાવણમાં ટિંડલ અસર જોવા મળે છે, જે તેનું મુખ્ય લક્ષણ છે. આ અસરમાં પ્રકાશનું પ્રકીર્ણન થાય છે, જેના કારણે પ્રકાશનો માર્ગ દેખાય છે. બાકીના વિધાનો સાચાં છે: કલિલ કણોનું કદ 1 nm થી 1000 nm વચ્ચે હોય છે, નિલંબનમાં કણો મોટા હોય છે અને અનાદર્શ દ્રાવણોમાં કણોનું વિતરણ અસમાન હોય છે.", "ref": "Std 11 - પ્રકરણ 5: દ્રાવણોના ગુણધર્મો", "ch": ""}, {"q": "એક પ્રયોગમાં, દૂધને પાણીમાં મિશ્ર કરતાં મળતું દ્રાવણ કલિલ પ્રકારનું છે. આ દ્રાવણમાં નીચેનામાંથી કયું લક્ષણ જોવા મળશે નહીં?", "opts": ["ટિંડલ અસર", "બ્રાઉનિયન ગતિ", "વિદ્યુતવિભાજન", "કણોનું નીચે બેસી જવું"], "ans": 3, "exp": "કલિલ દ્રાવણમાં વિદ્યુતવિભાજન જોવા મળતું નથી કારણ કે કલિલ કણો પર વિદ્યુતભાર હોવા છતાં તે આયનો જેવા નાના કણો નથી હોતા. ટિંડલ અસર અને બ્રાઉનિયન ગતિ કલિલ દ્રાવણના મુખ્ય લક્ષણો છે. કણોનું નીચે બેસી જવું નિલંબનમાં જોવા મળે છે, કલિલમાં નહીં.", "ref": "Std 11 - પ્રકરણ 5: દ્રાવણોના ગુણધર્મો", "ch": ""}, {"q": "નીચેનામાંથી કયું દ્રાવણ અનાદર્શ દ્રાવણ નથી?", "opts": ["ખાંડનું પાણીમાં દ્રાવણ", "સ્ટાર્ચનું પાણીમાં દ્રાવણ", "રેતીનું પાણીમાં મિશ્રણ", "દૂધ"], "ans": 0, "exp": "ખાંડનું પાણીમાં દ્રાવણ સાચું દ્રાવણ છે, જેમાં કણોનું કદ 1 nm કરતાં નાનું હોય છે અને તે પારદર્શક હોય છે. સ્ટાર્ચનું દ્રાવણ કલિલ પ્રકારનું છે, રેતીનું મિશ્રણ નિલંબન છે, અને દૂધ પણ કલિલ દ્રાવણ છે. આ ત્રણેય અનાદર્શ દ્રાવણો છે.", "ref": "Std 11 - પ્રકરણ 5: દ્રાવણોના ગુણધર્મો", "ch": ""}, {"q": "એક વિદ્યાર્થીએ કલિલ દ્રાવણમાં વિદ્યુતપ્રવાહ પસાર કરતાં જોયું કે કણો એક ઇલેક્ટ્રોડ તરફ ગતિ કરે છે. આ ઘટનાને શું કહે છે અને તે કયા કારણે થાય છે?", "opts": ["વિદ્યુતઅપોહન, કણો પર વિદ્યુતભાર હોવાને કારણે", "બ્રાઉનિયન ગતિ, કણોનું અસ્તવ્યસ્ત હલનચલન", "ટિંડલ અસર, પ્રકાશનું પ્રકીર્ણન", "અવક્ષેપન, કણોનું નીચે બેસી જવું"], "ans": 0, "exp": "કલિલ કણો પર વિદ્યુતભાર હોવાથી, વિદ્યુતપ્રવાહ પસાર કરતાં તે એક ઇલેક્ટ્રોડ તરફ ગતિ કરે છે, જેને વિદ્યુતઅપોહન કહે છે. બ્રાઉનિયન ગતિ કણોનું અસ્તવ્યસ્ત હલનચલન છે, ટિંડલ અસર પ્રકાશના પ્રકીર્ણન સાથે સંબંધિત છે, અને અવક્ષેપન કણોનું નીચે બેસી જવું છે, જે આ ઘટના સાથે સંબંધિત નથી.", "ref": "Std 11 - પ્રકરણ 5: દ્રાવણોના ગુણધર્મો", "ch": ""}, {"q": "એક પ્રયોગમાં, 500 મિલી પાણીમાં 5 ગ્રામ સ્ટાર્ચ ઉમેરવામાં આવે છે. આ મિશ્રણને ગરમ કરતાં શું થશે અને તેનું પરિણામી દ્રાવણ કયા પ્રકારનું ગણી શકાય?", "opts": ["સ્ટાર્ચ સંપૂર્ણપણે ઓગળી જશે અને દ્રાવણ સાચું દ્રાવણ બનશે", "સ્ટાર્ચના કણો સૂક્ષ્મ રીતે વિખેરાઈ જશે અને કલિલ દ્રાવણ બનશે, જે અનાદર્શ દ્રાવણ છે", "સ્ટાર્ચના કણો તળિયે જમા થઈ જશે અને નિલંબન બનશે, જે અનાદર્શ દ્રાવણ નથી", "સ્ટાર્ચના કણો પ્રકાશનો માર્ગ અવરોધશે નહીં અને દ્રાવણ સાચું દ્રાવણ ગણાશે"], "ans": 1, "exp": "સ્ટાર્ચ પાણીમાં સંપૂર્ણપણે ઓગળતું નથી, પરંતુ ગરમ કરતાં તેના કણો સૂક્ષ્મ રીતે વિખેરાઈ જાય છે, જે ટિંડલ અસર દર્શાવે છે. આથી તે કલિલ દ્રાવણ બને છે, જે અનાદર્શ દ્રાવણનો એક પ્રકાર છે. વિકલ્પ A ખોટો છે કારણ કે સ્ટાર્ચ સંપૂર્ણપણે ઓગળતું નથી. વિકલ્પ C ખોટો છે કારણ કે નિલંબનમાં કણો તળિયે જમા થાય છે, જે અહીં થતું નથી. વિકલ્પ D ખોટો છે કારણ કે કલિલ દ્રાવણમાં પ્રકાશનો માર્ગ અવરોધાય છે (ટિંડલ અસર).", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન અનાદર્શ દ્રાવણ માટે ખોટું છે, પરંતુ સાચા દ્રાવણ માટે સાચું છે?", "opts": ["દ્રાવણના કણોનું કદ 1 nm કરતાં નાનું હોય છે", "દ્રાવણ સ્થાયી હોય છે અને કણો તળિયે જમા થતા નથી", "દ્રાવણમાં ટિંડલ અસર જોવા મળે છે", "દ્રાવણના કણો ફિલ્ટર પેપરમાંથી પસાર થઈ શકે છે"], "ans": 2, "exp": "અનાદર્શ દ્રાવણમાં ટિંડલ અસર જોવા મળે છે, જ્યારે સાચા દ્રાવણમાં ટિંડલ અસર જોવા મળતી નથી. વિકલ્પ A, B અને D સાચા દ્રાવણ માટે સાચાં છે, પરંતુ અનાદર્શ દ્રાવણ માટે ખોટાં નથી (કારણ કે કલિલ દ્રાવણમાં પણ કણો ફિલ્ટર પેપરમાંથી પસાર થઈ શકે છે અને સ્થાયી હોય છે).", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક વિદ્યાર્થીએ સલ્ફરના કણોને પાણીમાં મિશ્ર કરીને એક દ્રાવણ બનાવ્યું. આ દ્રાવણમાં ટિંડલ અસર જોવા મળે છે, પરંતુ કણો તળિયે જમા થતા નથી. આ દ્રાવણને કયા પ્રકારમાં વર્ગીકૃત કરી શકાય?", "opts": ["સાચું દ્રાવણ", "કલિલ દ્રાવણ (અનાદર્શ દ્રાવણ)", "નિલંબન (અનાદર્શ દ્રાવણ નહીં)", "સંતૃપ્ત દ્રાવણ"], "ans": 1, "exp": "ટિંડલ અસર દર્શાવતું અને કણો તળિયે જમા ન થતું દ્રાવણ કલિલ દ્રાવણ છે, જે અનાદર્શ દ્રાવણનો એક પ્રકાર છે. વિકલ્પ A ખોટો છે કારણ કે સાચા દ્રાવણમાં ટિંડલ અસર જોવા મળતી નથી. વિકલ્પ C ખોટો છે કારણ કે નિલંબનમાં કણો તળિયે જમા થાય છે. વિકલ્પ D ખોટો છે કારણ કે સંતૃપ્ત દ્રાવણ એ દ્રાવણની સ્થિતિ દર્શાવે છે, તેનો પ્રકાર નહીં.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક પ્રયોગમાં, ફેરિક હાઇડ્રોક્સાઇડ (Fe(OH)₃) ના કણોને પાણીમાં મિશ્ર કરતાં કલિલ દ્રાવણ બને છે. આ દ્રાવણમાં વિદ્યુતપ્રવાહ પસાર કરતાં શું થશે અને તે કયા ગુણધર્મને દર્શાવે છે?", "opts": ["કણો એક ઇલેક્ટ્રોડ તરફ ગતિ કરશે અને વિદ્યુતકણ સંચલન (Electrophoresis) દર્શાવશે", "કણો તટસ્થ રહેશે અને કોઈ ગતિ દર્શાવશે નહીં", "કણો તળિયે જમા થઈ જશે અને નિલંબન બનશે", "કણો સંપૂર્ણપણે ઓગળી જશે અને સાચું દ્રાવણ બનશે"], "ans": 0, "exp": "કલિલ દ્રાવણમાં વિદ્યુતપ્રવાહ પસાર કરતાં કણો એક ઇલેક્ટ્રોડ તરફ ગતિ કરે છે, જેને વિદ્યુતકણ સંચલન (Electrophoresis) કહે છે. આ અનાદર્શ દ્રાવણનો એક મહત્વપૂર્ણ ગુણધર્મ છે. વિકલ્પ B ખોટો છે કારણ કે કલિલ કણો વિદ્યુતભારિત હોય છે. વિકલ્પ C અને D ખોટાં છે કારણ કે કણો તળિયે જમા થતા નથી કે સંપૂર્ણપણે ઓગળતા નથી.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "નીચેનામાંથી કયું દ્રાવણ અનાદર્શ દ્રાવણ નથી, પરંતુ તેના ગુણધર્મો અનાદર્શ દ્રાવણ જેવા લાગે છે?", "opts": ["દૂધ (Milk)", "ધુમાડો (Smoke)", "ખાંડનું પાણીમાં દ્રાવણ", "સ્ટાર્ચનું પાણીમાં દ્રાવણ"], "ans": 2, "exp": "ખાંડનું પાણીમાં દ્રાવણ સાચું દ્રાવણ છે, કારણ કે ખાંડના અણુઓ સંપૂર્ણપણે ઓગળી જાય છે અને ટિંડલ અસર દર્શાવતા નથી. વિકલ્પ A, B અને D અનાદર્શ દ્રાવણના ઉદાહરણો છે (કલિલ દ્રાવણ). ખાસ કરીને વિકલ્પ C એ અપવાદ છે કારણ કે તે સાચું દ્રાવણ છે, પરંતુ વિદ્યાર્થીઓ તેને અનાદર્શ દ્રાવણ સમજી શકે છે.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક અનાદર્શ દ્રાવણમાં કણોનો આકાર અસમાન હોય અને તેના કણો વચ્ચેના અંતરમાં ફેરફાર થતો હોય, તો તેને કયા પ્રકારનું અનાદર્શ દ્રાવણ કહેવાય?", "opts": ["સોલ", "જેલ", "ઇમલ્શન", "ફીણ"], "ans": 1, "exp": "જેલ એ અનાદર્શ દ્રાવણનો એક પ્રકાર છે જેમાં કણોનો આકાર અસમાન હોય છે અને કણો વચ્ચેના અંતરમાં ફેરફાર થતો હોય છે. સોલમાં કણો સ્થિર હોય છે, ઇમલ્શન એ દ્રવમાં દ્રવના કણોનું મિશ્રણ હોય છે, અને ફીણ એ ગેસના કણોનું દ્રવમાં વિતરણ હોય છે.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણો", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન અનાદર્શ દ્રાવણના ટિંડલ પ્રભાવ વિશે સાચું નથી?", "opts": ["ટિંડલ પ્રભાવમાં પ્રકાશના કિરણો કણો દ્વારા પ્રકીર્ણ થાય છે.", "ટિંડલ પ્રભાવને કલિલ કણોની હાજરીથી ઓળખી શકાય છે.", "ટિંડલ પ્રભાવ સફેદ પ્રકાશમાં જ દેખાય છે, રંગીન પ્રકાશમાં નહીં.", "ટિંડલ પ્રભાવ અનાદર્શ દ્રાવણના કણોની અસમાનતા દર્શાવે છે."], "ans": 2, "exp": "ટિંડલ પ્રભાવ સફેદ પ્રકાશમાં તો દેખાય જ છે, પરંતુ રંગીન પ્રકાશમાં પણ દેખાય છે. આ પ્રભાવ કલિલ કણોની હાજરીથી થાય છે અને કણો દ્વારા પ્રકાશનું પ્રકીર્ણન દર્શાવે છે. વિકલ્પ C ખોટો છે કારણ કે ટિંડલ પ્રભાવ રંગીન પ્રકાશમાં પણ જોઈ શકાય છે.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણો", "ch": ""}, {"q": "એક અનાદર્શ દ્રાવણમાં કણોનો વ્યાસ 1 nm થી 1000 nm વચ્ચે હોય છે. આ દ્રાવણમાં કયા ગુણધર્મને લીધે તેને અનાદર્શ દ્રાવણ કહેવાય છે?", "opts": ["કણોનું આકાર સમાન હોય છે.", "કણોનું વિતરણ અસમાન હોય છે.", "કણોનો વ્યાસ 1 nm થી 1000 nm વચ્ચે હોય છે.", "કણો વચ્ચેના અંતરમાં ફેરફાર થતો નથી."], "ans": 2, "exp": "અનાદર્શ દ્રાવણમાં કણોનો વ્યાસ 1 nm થી 1000 nm વચ્ચે હોય છે, જે તેના મુખ્ય લક્ષણ છે. વિકલ્પ A, B, અને D ખોટા છે કારણ કે કણોનો આકાર અસમાન હોઈ શકે છે, વિતરણ અસમાન હોઈ શકે છે, અને કણો વચ્ચેના અંતરમાં ફેરફાર થઈ શકે છે.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણો", "ch": ""}, {"q": "એક અનાદર્શ દ્રાવણમાં કણોની ગતિને કયા પરિબળ દ્વારા અટકાવી શકાય છે?", "opts": ["તાપમાન વધારવું", "દ્રાવણમાં વિદ્યુતપ્રવાહ પસાર કરવો", "દ્રાવણને કેંદ્રાપસારક યંત્રમાં ફેરવવું", "દ્રાવણમાં ઉત્સેચક ઉમેરવો"], "ans": 2, "exp": "કેંદ્રાપસારક યંત્રમાં ફેરવવાથી કણોની ગતિ અટકાવી શકાય છે કારણ કે કણો દ્રાવણના તળિયે જમા થઈ જાય છે. તાપમાન વધારવું, વિદ્યુતપ્રવાહ પસાર કરવો, અને ઉત્સેચક ઉમેરવો એ કણોની ગતિને અટકાવી શકતું નથી.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણો", "ch": ""}, {"q": "એક અનાદર્શ દ્રાવણમાં કણોની ગતિને અટકાવવા માટે નીચેનામાંથી કયો પદાર્થ ઉમેરવામાં આવે તો તે ટિંડલ પ્રભાવને પણ દૂર કરશે?", "opts": ["સોડિયમ ક્લોરાઇડ (NaCl)", "પોટેશિયમ નાઇટ્રેટ (KNO₃)", "એલ્યુમિનિયમ હાઇડ્રોક્સાઇડ (Al(OH)₃)", "યુરિયા (CO(NH₂)₂)"], "ans": 2, "exp": "સાચો જવાબ C) એલ્યુમિનિયમ હાઇડ્રોક્સાઇડ (Al(OH)₃) છે. એલ્યુમિનિયમ હાઇડ્રોક્સાઇડ એક કલિલીય ઉત્પ્રેરક તરીકે કામ કરે છે અને અનાદર્શ દ્રાવણમાં કણોને એકત્રિત કરીને તેની ગતિ અટકાવે છે, જેથી ટિંડલ પ્રભાવ પણ દૂર થાય છે. A) સોડિયમ ક્લોરાઇડ અને B) પોટેશિયમ નાઇટ્રેટ વિદ્યુતવિભાજ્ય પદાર્થો છે, જે અનાદર્શ દ્રાવણમાં કણોની ગતિને અટકાવી શકતા નથી. D) યુરિયા એક અવિદ્યુતવિભાજ્ય પદાર્થ છે, જે અનાદર્શ દ્રાવણમાં કણોની ગતિને અટકાવી શકતો નથી.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણો", "ch": ""}, {"q": "એક પ્રયોગમાં, સોનાના કણોને પાણીમાં વિખેરતા મળતું કલિલ દ્રાવણ અનાદર્શ દ્રાવણ છે. આ દ્રાવણમાં નીચેનામાંથી કયો ગુણધર્મ જોવા મળતો નથી?", "opts": ["ટિંડલ પ્રભાવ દર્શાવે છે", "કણોનું અવસાદન થતું નથી", "કણોનું આણ્વિક કદ 1 nm કરતાં નાનું હોય છે", "કણોનું વિદ્યુતભારિત હોવું શક્ય છે"], "ans": 2, "exp": "અનાદર્શ દ્રાવણ (કલિલ દ્રાવણ)માં કણોનું આણ્વિક કદ 1 nm થી 1000 nm વચ્ચે હોય છે, તેથી 1 nm કરતાં નાનું હોવું શક્ય નથી. ટિંડલ પ્રભાવ કલિલ દ્રાવણનો વિશિષ્ટ ગુણધર્મ છે. કલિલ કણોનું અવસાદન સામાન્ય રીતે થતું નથી અને તેઓ વિદ્યુતભારિત હોઈ શકે છે.", "ref": "Std 12 - પ્રકરણ 5: પદાર્થોની અવસ્થાઓ અને દ્રાવણો", "ch": ""}, {"q": "એક વિદ્યાર્થીએ બે પ્રવાહીઓ X અને Y ને મિશ્ર કરતાં મળતું દ્રાવણ અનાદર્શ દ્રાવણ છે. આ દ્રાવણમાં નીચેનામાંથી કયું વિધાન ખોટું છે, પરંતુ સાચા દ્રાવણ માટે સાચું છે?", "opts": ["દ્રાવણમાં કણોનું અવલોકન માઇક્રોસ્કોપથી કરી શકાય છે", "દ્રાવણમાં કણોનું આણ્વિક કદ 1 nm કરતાં નાનું હોય છે", "દ્રાવણમાં કણોનું અવસાદન થતું નથી", "દ્રાવણમાં કણોનું વિભાજન સમાન હોય છે"], "ans": 1, "exp": "સાચા દ્રાવણમાં કણોનું આણ્વિક કદ 1 nm કરતાં નાનું હોય છે, જ્યારે અનાદર્શ દ્રાવણમાં કણોનું કદ 1 nm થી 1000 nm વચ્ચે હોય છે. અનાદર્શ દ્રાવણમાં કણોનું અવલોકન માઇક્રોસ્કોપથી થઈ શકે છે, અવસાદન થતું નથી અને કણોનું વિભાજન અસમાન હોય છે.", "ref": "Std 12 - પ્રકરણ 5: પદાર્થોની અવસ્થાઓ અને દ્રાવણો", "ch": ""}, {"q": "એક અનાદર્શ દ્રાવણમાં કણોનું અવસાદન થતું નથી, પરંતુ જો તેમાં વિદ્યુતપ્રવાહ પસાર કરવામાં આવે તો કણોનું અવસાદન થાય છે. આ ઘટનાને શું કહે છે?", "opts": ["ટિંડલ અસર", "ઇલેક્ટ્રોફોરેસીસ", "કોએગ્યુલેશન", "બ્રાઉનિયન ગતિ"], "ans": 2, "exp": "વિદ્યુતપ્રવાહ પસાર કરતાં અનાદર્શ દ્રાવણના કણોનું અવસાદન થવાની ઘટનાને કોએગ્યુલેશન કહે છે. ટિંડલ અસર પ્રકાશના પ્રકીર્ણન સાથે સંબંધિત છે, ઇલેક્ટ્રોફોરેસીસ કણોની ગતિ સાથે સંબંધિત છે, અને બ્રાઉનિયન ગતિ કણોની અનિયમિત ગતિ છે.", "ref": "Std 12 - પ્રકરણ 5: પદાર્થોની અવસ્થાઓ અને દ્રાવણો", "ch": ""}, {"q": "એક પ્રયોગમાં, ફેરિક ક્લોરાઇડ (FeCl₃) ના દ્રાવણમાં સોડિયમ હાઇડ્રોક્સાઇડ (NaOH) ઉમેરતાં લાલ-ભૂરા રંગનું અનાદર્શ દ્રાવણ મળે છે. આ દ્રાવણમાં કયો પદાર્થ ઉમેરતાં કણોનું અવસાદન સૌથી ઝડપથી થશે?", "opts": ["ગ્લુકોઝ", "સોડિયમ ક્લોરાઇડ (NaCl)", "એલ્યુમિનિયમ ક્લોરાઇડ (AlCl₃)", "પોટેશિયમ સલ્ફેટ (K₂SO₄)"], "ans": 2, "exp": "ફેરિક હાઇડ્રોક્સાઇડ (Fe(OH)₃) ના કલિલ દ્રાવણમાં અવસાદન માટે ઉચ્ચ વિદ્યુતભાર ધરાવતા આયનો જરૂરી છે. એલ્યુમિનિયમ ક્લોરાઇડ (AlCl₃)માં Al³⁺ આયન ઉચ્ચ વિદ્યુતભાર ધરાવે છે, જે કોએગ્યુલેશનને ઝડપી બનાવે છે. અન્ય વિકલ્પો નીચા વિદ્યુતભાર ધરાવતા આયનો ધરાવે છે.", "ref": "Std 12 - પ્રકરણ 5: પદાર્થોની અવસ્થાઓ અને દ્રાવણો", "ch": ""}, {"q": "એક અનાદર્શ દ્રાવણમાં કણોની સ્થિરતા માટે નીચેનામાંથી કયું પરિબળ સૌથી વધુ મહત્ત્વનું છે?", "opts": ["કણોનું કદ", "કણો પરનો વિદ્યુતભાર", "દ્રાવણનું તાપમાન", "દ્રાવકનું પ્રમાણ"], "ans": 1, "exp": "અનાદર્શ દ્રાવણમાં કણોની સ્થિરતા માટે કણો પરનો વિદ્યુતભાર સૌથી મહત્ત્વનું પરિબળ છે. વિદ્યુતભારિત કણો એકબીજાને અપાકર્ષે છે, જે અવસાદનને અટકાવે છે. કણોનું કદ, તાપમાન અને દ્રાવકનું પ્રમાણ પણ અસર કરે છે, પરંતુ વિદ્યુતભાર મુખ્ય પરિબળ છે.", "ref": "Std 12 - પ્રકરણ 5: પદાર્થોની અવસ્થાઓ અને દ્રાવણો", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
