<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ઉત્પ્રેરકની અસર</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ઉત્પ્રેરકની અસર</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ઉત્પ્રેરકની અસર</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "જ્યારે ઉત્સેચકની સક્રિય સ્થાને (active site) સબસ્ટ્રેટ બંધાય છે, ત્યારે નીચેનામાંથી કયું પરિવર્તન થતું નથી?", "opts": ["સબસ્ટ્રેટનું રાસાયણિક બંધ તૂટે છે", "ઉત્સેચકનું ત્રિપરિમાણીય સ્વરૂપ (3D structure) બદલાય છે", "સક્રિય સ્થાનનું આકાર સબસ્ટ્રેટને અનુરૂપ બને છે", "ઉત્સેચકનું વજન વધે છે"], "ans": 3, "exp": "ઉત્સેચક સબસ્ટ્રેટ સાથે બંધાય ત્યારે તેનું ત્રિપરિમાણીય સ્વરૂપ બદલાય છે (induced fit model), સબસ્ટ્રેટના બંધ તૂટે છે, અને સક્રિય સ્થાનનો આકાર અનુરૂપ બને છે. પરંતુ ઉત્સેચકનું વજન બદલાતું નથી, કારણ કે ઉત્સેચક પ્રક્રિયામાં ખર્ચાય નહીં. આમ, D વિકલ્પ યોગ્ય જવાબ છે.", "ref": "Std 12 - પ્રકરણ 9: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્સેચક તેના કોફેક્ટર (cofactor) વગર સક્રિય રહી શકતો નથી?", "opts": ["એમાઇલેઝ", "કેટલેઝ", "લેક્ટેઝ", "કાર્બોક્સિપેપ્ટિડેઝ"], "ans": 1, "exp": "કેટલેઝ ઉત્સેચક તેના કોફેક્ટર તરીકે લોહ (Fe)ની જરૂર પડે છે. એમાઇલેઝ, લેક્ટેઝ, અને કાર્બોક્સિપેપ્ટિડેઝ કોફેક્ટર વગર સક્રિય રહી શકે છે. આમ, B વિકલ્પ યોગ્ય જવાબ છે.", "ref": "Std 12 - પ્રકરણ 9: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "જો એક ઉત્સેચકની Km (Michaelis constant) ની કિંમત ઓછી હોય, તો તેનો અર્થ શું થાય છે?", "opts": ["ઉત્સેચકની સક્રિયતા ઓછી છે", "ઉત્સેચક અને સબસ્ટ્રેટ વચ્ચેનો બંધ મજબૂત છે", "ઉત્સેચકની સક્રિયતા વધુ છે અને તે સબસ્ટ્રેટ સાથે ઝડપથી બંધાય છે", "ઉત્સેચકની સ્થિરતા ઓછી છે"], "ans": 2, "exp": "Km ની ઓછી કિંમત એ સૂચવે છે કે ઉત્સેચકને સબસ્ટ્રેટ સાથે બંધાયા માટે ઓછી સાંદ્રતા જરૂરી છે, જે દર્શાવે છે કે ઉત્સેચકની સક્રિયતા વધુ છે અને તે સબસ્ટ્રેટ સાથે ઝડપથી બંધાય છે. A, B, અને D વિકલ્પો Km ની ઓછી કિંમત સાથે સંબંધિત નથી.", "ref": "Std 12 - પ્રકરણ 9: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્સેચક પ્રકાશસંશ્લેષણ પ્રક્રિયામાં ભાગ લેતો નથી?", "opts": ["રૂબિસ્કો (RuBisCO)", "પેપ્સિન", "એટીપી સિનથેઝ", "એનએડીપી+ રિડક્ટેઝ"], "ans": 1, "exp": "પેપ્સિન એક પાચક ઉત્સેચક છે જે પ્રોટીનના પાચનમાં ભાગ લે છે, જ્યારે રૂબિસ્કો, એટીપી સિનથેઝ, અને એનએડીપી+ રિડક્ટેઝ પ્રકાશસંશ્લેષણ પ્રક્રિયામાં ભાગ લે છે. આમ, B વિકલ્પ યોગ્ય જવાબ છે.", "ref": "Std 12 - પ્રકરણ 10: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "જ્યારે ઉત્સેચકની સક્રિયતા પર તાપમાનની અસરનો અભ્યાસ કરવામાં આવે છે, ત્યારે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["નીચા તાપમાને ઉત્સેચકની સક્રિયતા ઓછી હોય છે", "ઉત્તમ તાપમાને ઉત્સેચકની સક્રિયતા મહત્તમ હોય છે", "ઉચ્ચ તાપમાને ઉત્સેચકનું ડીનેચરલાઇઝેશન થાય છે", "ઉત્તમ તાપમાન પછી તાપમાન વધારતાં ઉત્સેચકની સક્રિયતા પુનઃસ્થાપિત થાય છે"], "ans": 3, "exp": "ઉત્તમ તાપમાન પછી તાપમાન વધારતાં ઉત્સેચકનું ડીનેચરલાઇઝેશન થાય છે અને તેની સક્રિયતા ખોવાઈ જાય છે, જે પુનઃસ્થાપિત થતી નથી. આમ, D વિકલ્પ ખોટો છે.", "ref": "Std 12 - પ્રકરણ 9: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "જ્યારે ઉત્સેચકની સક્રિયતા પર pHની અસરનો અભ્યાસ કરવામાં આવે છે, ત્યારે નીચેનામાંથી કયો ઉત્સેચક અતિ આમ્લીય (pH ~2) વાતાવરણમાં સૌથી વધુ સક્રિય રહે છે?", "opts": ["પેપ્સિન", "ટ્રિપ્સિન", "એમાઇલેઝ", "કેટલેઝ"], "ans": 0, "exp": "પેપ્સિન પેટના અતિ આમ્લીય વાતાવરણ (pH ~2)માં સક્રિય રહે છે, કારણ કે તે પેટીય રસમાં હાયડ્રોક્લોરિક એસિડની હાજરીમાં કામ કરે છે. ટ્રિપ્સિન આંતરડામાં આલ્કલાઇન વાતાવરણ (pH ~8)માં સક્રિય થાય છે. એમાઇલેઝ તટસ્થ અથવા હળવા આલ્કલાઇન વાતાવરણ (pH ~7)માં સક્રિય થાય છે. કેટલેઝ તટસ્થ વાતાવરણમાં સક્રિય થાય છે અને હાયડ્રોજન પેરોક્સાઇડને પાણી અને ઓક્સિજનમાં તોડે છે.", "ref": "Std 12 - પ્રકરણ 9: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્સેચક તેના સબસ્ટ્રેટ સાથે બંધાય તે પહેલાં તેની સંરચના બદલે છે (Induced Fit Model)?", "opts": ["હેક્સોકિનેઝ", "યુરિયેઝ", "કાર્બોક્સિપેપ્ટિડેઝ", "કેટલેઝ"], "ans": 0, "exp": "હેક્સોકિનેઝ ઉત્સેચક Induced Fit Modelનું ઉદાહરણ છે, જ્યાં સબસ્ટ્રેટ સાથે બંધાય તે પહેલાં ઉત્સેચકની સક્રિય સ્થાનેની સંરચના બદલાય છે. યુરિયેઝ, કાર્બોક્સિપેપ્ટિડેઝ, અને કેટલેઝ Lock and Key Model અનુસાર કામ કરે છે, જ્યાં સબસ્ટ્રેટ સીધું જ સક્રિય સ્થાને બંધાય છે.", "ref": "Std 12 - પ્રકરણ 9: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "જ્યારે ઉત્સેચકની સક્રિયતા પર ઉત્પ્રેરક (Inhibitor)ની અસરનો અભ્યાસ કરવામાં આવે છે, ત્યારે નીચેનામાંથી કયો ઉત્પ્રેરક ઉત્સેચકની સક્રિય સ્થાને સબસ્ટ્રેટ સાથે સ્પર્ધા કરે છે?", "opts": ["ગૈર-સ્પર્ધાત્મક ઉત્પ્રેરક", "સ્પર્ધાત્મક ઉત્પ્રેરક", "ફીડબેક ઉત્પ્રેરક", "એલોસ્ટેરિક ઉત્પ્રેરક"], "ans": 1, "exp": "સ્પર્ધાત્મક ઉત્પ્રેરક ઉત્સેચકની સક્રિય સ્થાને સબસ્ટ્રેટ સાથે સ્પર્ધા કરે છે અને સબસ્ટ્રેટને બંધાતું અટકાવે છે. ગૈર-સ્પર્ધાત્મક ઉત્પ્રેરક સક્રિય સ્થાને નહીં પરંતુ ઉત્સેચકના અન્ય ભાગ સાથે બંધાય છે અને ઉત્સેચકની સંરચના બદલીને તેની સક્રિયતા ઘટાડે છે. ફીડબેક ઉત્પ્રેરક અને એલોસ્ટેરિક ઉત્પ્રેરક ઉત્સેચકની સંરચના બદલીને કામ કરે છે, પરંતુ સ્પર્ધાત્મક રીતે નહીં.", "ref": "Std 12 - પ્રકરણ 9: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્સેચક તેના કોફેક્ટર (cofactor) તરીકે મેટલ આયન (Fe²⁺)ની જરૂર રાખે છે?", "opts": ["કેટલેઝ", "કાર્બોક્સિપેપ્ટિડેઝ", "એમાઇલેઝ", "લાઇપેઝ"], "ans": 0, "exp": "કેટલેઝ ઉત્સેચક તેના કોફેક્ટર તરીકે Fe²⁺ (લોહ આયન)ની જરૂર રાખે છે, જે હાયડ્રોજન પેરોક્સાઇડને પાણી અને ઓક્સિજનમાં તોડવામાં મદદ કરે છે. કાર્બોક્સિપેપ્ટિડેઝ, એમાઇલેઝ, અને લાઇપેઝને મેટલ આયનની જરૂર રહેતી નથી.", "ref": "Std 12 - પ્રકરણ 9: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "એક પ્રયોગમાં, ઉત્સેચકની સક્રિયતા પર અકાર્બનિક ફોસ્ફેટ (Pi)ની અસરનો અભ્યાસ કરવામાં આવ્યો. જ્યારે પ્રક્રિયામાં Pi ઉમેરવામાં આવ્યું, ત્યારે ઉત્સેચકની સક્રિયતા વધી ગઈ. આ પરિસ્થિતિમાં નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["Pi એ ઉત્સેચકનો સહકારક (cofactor) તરીકે કાર્ય કરે છે અને સક્રિય સ્થાનને સ્થિર કરે છે", "Pi એ ઉત્સેચકના એલોસ્ટેરિક સ્થાને બંધાઈને તેની સક્રિયતા વધારે છે", "Pi એ ઉત્સેચકના ઉત્પાદન સાથે જોડાઈને પ્રક્રિયાને આગળ ધપાવે છે (product removal effect)", "Pi એ ઉત્સેચકની પ્રતિક્રિયામાં સબસ્ટ્રેટ તરીકે કાર્ય કરે છે અને વધારાની ઊર્જા પ્રદાન કરે છે"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. અકાર્બનિક ફોસ્ફેટ (Pi) ઘણી ઉત્સેચકીય પ્રક્રિયાઓમાં ઉત્પાદન સાથે જોડાઈને તેને દૂર કરવામાં મદદ કરે છે, જે લ શેટેલિયરના સિદ્ધાંત અનુસાર પ્રક્રિયાને આગળ ધપાવે છે. આને 'product removal effect' કહે છે. ઉદાહરણ તરીકે, ગ્લાયકોલિસિસમાં ગ્લુકોઝ-6-ફોસ્ફેટના નિર્માણમાં Pi ભાગ લે છે અને પ્રક્રિયાને પ્રોત્સાહન આપે છે.\n\nA) ખોટું છે કારણ કે Pi સામાન્ય રીતે સહકારક તરીકે કાર્ય કરતું નથી.\nB) ખોટું છે કારણ કે Pi એલોસ્ટેરિક નિયમનકાર નથી.\nD) ખોટું છે કારણ કે Pi સબસ્ટ્રેટ તરીકે કાર્ય કરતું નથી અને ઊર્જા પ્રદાન કરતું નથી.", "ref": "Std 11 - પ્રકરણ 9: જૈવિક અણુઓ અને ઉત્સેચકો", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્પ્રેરક (Inhibitor) ઉત્સેચકની સક્રિય સ્થાને (active site) સબસ્ટ્રેટ સાથે સ્પર્ધા કર્યા વગર ઉત્સેચકની ક્રિયાને અવરોધે છે?", "opts": ["સ્પર્ધાત્મક ઉત્પ્રેરક (Competitive inhibitor)", "અસ્પર્ધાત્મક ઉત્પ્રેરક (Non-competitive inhibitor)", "અવરોધક ઉત્પ્રેરક (Irreversible inhibitor)", "મિશ્ર ઉત્પ્રેરક (Mixed inhibitor)"], "ans": 1, "exp": "અસ્પર્ધાત્મક ઉત્પ્રેરક (Non-competitive inhibitor) ઉત્સેચકની સક્રિય સ્થાને સબસ્ટ્રેટ સાથે સ્પર્ધા કર્યા વગર ઉત્સેચકની ક્રિયાને અવરોધે છે. તે ઉત્સેચકના અન્ય ભાગ સાથે બંધાય છે, જેનાથી ઉત્સેચકની સંરચના બદલાય છે અને તેની ક્રિયાશીલતા ઘટે છે. સ્પર્ધાત્મક ઉત્પ્રેરક સક્રિય સ્થાને સબસ્ટ્રેટ સાથે સ્પર્ધા કરે છે, અવરોધક ઉત્પ્રેરક કાયમી રીતે ઉત્સેચક સાથે બંધાય છે, અને મિશ્ર ઉત્પ્રેરક સક્રિય સ્થાને અને અન્ય સ્થાને બંને બંધાય શકે છે.", "ref": "Std 12 - Chapter 3: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "જ્યારે ઉત્સેચકની સક્રિયતા પર ઉત્પ્રેરકની અસરનો અભ્યાસ કરવામાં આવે છે, ત્યારે નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["સ્પર્ધાત્મક ઉત્પ્રેરકની હાજરીમાં Vmax અચળ રહે છે, પરંતુ Km વધે છે.", "અસ્પર્ધાત્મક ઉત્પ્રેરકની હાજરીમાં Vmax ઘટે છે, પરંતુ Km અચળ રહે છે.", "અવરોધક ઉત્પ્રેરકની હાજરીમાં ઉત્સેચકની ક્રિયા પૂર્ણપણે બંધ થઈ જાય છે.", "મિશ્ર ઉત્પ્રેરકની હાજરીમાં Km અને Vmax બંને ઘટે છે."], "ans": 3, "exp": "મિશ્ર ઉત્પ્રેરકની હાજરીમાં Km ઘટે છે પરંતુ Vmax અચળ રહે છે અથવા થોડું ઘટે છે. સ્પર્ધાત્મક ઉત્પ્રેરકની હાજરીમાં Vmax અચળ રહે છે, પરંતુ Km વધે છે. અસ્પર્ધાત્મક ઉત્પ્રેરકની હાજરીમાં Vmax ઘટે છે, પરંતુ Km અચળ રહે છે. અવરોધક ઉત્પ્રેરકની હાજરીમાં ઉત્સેચકની ક્રિયા પૂર્ણપણે બંધ થઈ જાય છે.", "ref": "Std 12 - Chapter 3: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્પ્રેરક ઉત્સેચકની ક્રિયાને અવરોધે છે પરંતુ ઉત્સેચક સાથે કાયમી રીતે બંધાય છે?", "opts": ["સ્પર્ધાત્મક ઉત્પ્રેરક (Competitive inhibitor)", "અસ્પર્ધાત્મક ઉત્પ્રેરક (Non-competitive inhibitor)", "અવરોધક ઉત્પ્રેરક (Irreversible inhibitor)", "મિશ્ર ઉત્પ્રેરક (Mixed inhibitor)"], "ans": 2, "exp": "અવરોધક ઉત્પ્રેરક (Irreversible inhibitor) ઉત્સેચકની ક્રિયાને અવરોધે છે અને ઉત્સેચક સાથે કાયમી રીતે બંધાય છે. સ્પર્ધાત્મક અને અસ્પર્ધાત્મક ઉત્પ્રેરકો ઉત્સેચક સાથે અસ્થાયી રીતે બંધાય છે, જ્યારે મિશ્ર ઉત્પ્રેરક સક્રિય સ્થાને અને અન્ય સ્થાને બંને બંધાય શકે છે.", "ref": "Std 12 - Chapter 3: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ઉત્પ્રેરકની અસર વિશે સાચું છે?", "opts": ["સ્પર્ધાત્મક ઉત્પ્રેરકની હાજરીમાં ઉત્સેચકની Km કિંમત ઘટે છે.", "અસ્પર્ધાત્મક ઉત્પ્રેરકની હાજરીમાં ઉત્સેચકની Vmax કિંમત વધે છે.", "અવરોધક ઉત્પ્રેરકની હાજરીમાં ઉત્સેચકની ક્રિયા પૂર્ણપણે બંધ થઈ જાય છે.", "મિશ્ર ઉત્પ્રેરકની હાજરીમાં ઉત્સેચકની Km અને Vmax બંને વધે છે."], "ans": 2, "exp": "અવરોધક ઉત્પ્રેરકની હાજરીમાં ઉત્સેચકની ક્રિયા પૂર્ણપણે બંધ થઈ જાય છે. સ્પર્ધાત્મક ઉત્પ્રેરકની હાજરીમાં Km કિંમત વધે છે, અસ્પર્ધાત્મક ઉત્પ્રેરકની હાજરીમાં Vmax કિંમત ઘટે છે, અને મિશ્ર ઉત્પ્રેરકની હાજરીમાં Km ઘટે છે પરંતુ Vmax અચળ રહે છે અથવા થોડું ઘટે છે.", "ref": "Std 12 - Chapter 3: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "એક ઉત્સેચકની ક્રિયા દરમિયાન, જ્યારે અકાર્બનિક આયન (જેમ કે Zn²⁺ અથવા Mg²⁺)ની હાજરીમાં ઉત્સેચકની સક્રિયતા વધે છે, ત્યારે નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["આ આયનો ઉત્સેચકના કોફેક્ટર તરીકે કામ કરે છે અને સક્રિય સ્થાનની રચનામાં ફેરફાર કરે છે.", "આ આયનો સબસ્ટ્રેટ સાથે સીધી રીતે બંધાય છે અને ઉત્સેચકની ક્રિયાને વેગ આપે છે.", "આ આયનો ઉત્સેચક-સબસ્ટ્રેટ કોમ્પ્લેક્સની સ્થિરતા વધારી શકે છે.", "આ આયનો ઉત્સેચકની સક્રિય સ્થાનની ત્રિપરિમાણીય રચનાને સુધારી શકે છે."], "ans": 1, "exp": "આપેલા પ્રશ્નમાં, અકાર્બનિક આયનો (જેમ કે Zn²⁺ અથવા Mg²⁺) ઉત્સેચકના કોફેક્ટર તરીકે કામ કરે છે અને સક્રિય સ્થાનની રચનામાં ફેરફાર કરે છે (A સાચું છે). તેઓ ઉત્સેચક-સબસ્ટ્રેટ કોમ્પ્લેક્સની સ્થિરતા પણ વધારી શકે છે (C સાચું છે) અને સક્રિય સ્થાનની ત્રિપરિમાણીય રચનાને સુધારી શકે છે (D સાચું છે). પરંતુ આ આયનો સબસ્ટ્રેટ સાથે સીધી રીતે બંધાય છે એવું વિધાન સાચું નથી, કારણ કે કોફેક્ટર ઉત્સેચક સાથે બંધાય છે, સબસ્ટ્રેટ સાથે નહીં.", "ref": "Std 12 - પ્રકરણ 9: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "જ્યારે એક ઉત્સેચક પર અસ્પર્ધાત્મક ઉત્પ્રેરક (non-competitive inhibitor)ની અસર થાય છે, ત્યારે નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["ઉત્સેચકની Vmax કિંમત ઘટે છે પરંતુ Km અપરિવર્તિત રહે છે.", "ઉત્સેચકની Km કિંમત ઘટે છે પરંતુ Vmax અપરિવર્તિત રહે છે.", "ઉત્સેચકની Vmax અને Km બંને કિંમતો ઘટે છે.", "ઉત્સેચકની Vmax કિંમત ઘટે છે અને Km કિંમત વધે છે."], "ans": 0, "exp": "અસ્પર્ધાત્મક ઉત્પ્રેરક ઉત્સેચકની સક્રિય સ્થાને બંધાય નહીં પરંતુ ઉત્સેચક-સબસ્ટ્રેટ કોમ્પ્લેક્સની સ્થિરતા ઘટાડે છે, જેથી Vmax ઘટે છે પરંતુ Km અપરિવર્તિત રહે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) Km ઘટવાને બદલે અપરિવર્તિત રહે છે, C) Km અપરિવર્તિત રહે છે, D) Km વધતો નથી.", "ref": "Std 12 - Chapter 3: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્પ્રેરક ઉત્સેચકની સક્રિય સ્થાને બંધાય નહીં પરંતુ ઉત્સેચકની સંરચનામાં ફેરફાર કરીને તેની ક્રિયા અવરોધે છે?", "opts": ["સ્પર્ધાત્મક ઉત્પ્રેરક (Competitive inhibitor)", "અસ્પર્ધાત્મક ઉત્પ્રેરક (Non-competitive inhibitor)", "અવરોધક ઉત્પ્રેરક (Irreversible inhibitor)", "સબસ્ટ્રેટ એનાલોગ (Substrate analog)"], "ans": 1, "exp": "અસ્પર્ધાત્મક ઉત્પ્રેરક ઉત્સેચકની સક્રિય સ્થાને બંધાય નહીં પરંતુ ઉત્સેચકની સંરચનામાં ફેરફાર કરીને તેની ક્રિયા અવરોધે છે. A) સ્પર્ધાત્મક ઉત્પ્રેરક સક્રિય સ્થાને સબસ્ટ્રેટ સાથે સ્પર્ધા કરે છે, C) અવરોધક ઉત્પ્રેરક કાયમી રીતે ઉત્સેચક સાથે બંધાય છે, D) સબસ્ટ્રેટ એનાલોગ સક્રિય સ્થાને બંધાય છે.", "ref": "Std 12 - Chapter 3: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "એક ઉત્સેચક પર અસર કરતા ઉત્પ્રેરકની હાજરીમાં, જ્યારે સબસ્ટ્રેટની સાંદ્રતા અતિશય વધારવામાં આવે છે, ત્યારે નીચેનામાંથી કયું પરિણામ જોવા મળે છે?", "opts": ["સ્પર્ધાત્મક ઉત્પ્રેરકની અસર ઓછી થાય છે.", "અસ્પર્ધાત્મક ઉત્પ્રેરકની અસર ઓછી થાય છે.", "સ્પર્ધાત્મક અને અસ્પર્ધાત્મક બંને ઉત્પ્રેરકની અસર ઓછી થાય છે.", "સ્પર્ધાત્મક અને અસ્પર્ધાત્મક બંને ઉત્પ્રેરકની અસર અપરિવર્તિત રહે છે."], "ans": 0, "exp": "સબસ્ટ્રેટની સાંદ્રતા અતિશય વધારવાથી સ્પર્ધાત્મક ઉત્પ્રેરકની અસર ઓછી થાય છે કારણ કે સબસ્ટ્રેટ સક્રિય સ્થાને બંધાય રહે છે. અસ્પર્ધાત્મક ઉત્પ્રેરકની અસર ઓછી થતી નથી કારણ કે તે સક્રિય સ્થાને બંધાય નહીં. C) અને D) ખોટા છે કારણ કે અસ્પર્ધાત્મક ઉત્પ્રેરકની અસર અપરિવર્તિત રહે છે.", "ref": "Std 12 - Chapter 3: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "નીચેનામાંથી કયો ઉત્પ્રેરક ઉત્સેચકની ક્રિયાને કાયમી રીતે અવરોધે છે અને ઉત્સેચક સાથે કોવેલન્ટ બંધ વડે જોડાય છે?", "opts": ["સ્પર્ધાત્મક ઉત્પ્રેરક (Competitive inhibitor)", "અસ્પર્ધાત્મક ઉત્પ્રેરક (Non-competitive inhibitor)", "અવરોધક ઉત્પ્રેરક (Irreversible inhibitor)", "મિશ્ર ઉત્પ્રેરક (Mixed inhibitor)"], "ans": 2, "exp": "અવરોધક ઉત્પ્રેરક ઉત્સેચકની ક્રિયાને કાયમી રીતે અવરોધે છે અને ઉત્સેચક સાથે કોવેલન્ટ બંધ વડે જોડાય છે. A) સ્પર્ધાત્મક ઉત્પ્રેરક અસ્થાયી રીતે બંધાય છે, B) અસ્પર્ધાત્મક ઉત્પ્રેરક કાયમી બંધ નથી બનાવતો, D) મિશ્ર ઉત્પ્રેરક સ્પર્ધાત્મક અને અસ્પર્ધાત્મક બંને લક્ષણો ધરાવે છે પરંતુ કાયમી નથી.", "ref": "Std 12 - Chapter 3: ઉત્સેચકો (Enzymes)", "ch": ""}, {"q": "જ્યારે એક ઉત્સેચક પર મિશ્ર ઉત્પ્રેરક (mixed inhibitor)ની અસર થાય છે, ત્યારે નીચેનામાંથી કયું પરિણામ જોવા મળે છે?", "opts": ["Vmax અને Km બંને ઘટે છે.", "Vmax ઘટે છે અને Km વધે છે.", "Vmax ઘટે છે અને Km ઘટે અથવા વધે (સબસ્ટ્રેટ પર આધાર રાખે).", "Vmax અપરિવર્તિત રહે છે અને Km ઘટે છે."], "ans": 2, "exp": "મિશ્ર ઉત્પ્રેરકની અસરમાં Vmax ઘટે છે અને Km ઘટે અથવા વધે છે, જે સબસ્ટ્રેટ પર આધાર રાખે છે. A) Km હંમેશા ઘટતો નથી, B) Km હંમેશા વધતો નથી, D) Vmax અપરિવર્તિત રહેતો નથી.", "ref": "Std 12 - Chapter 3: ઉત્સેચકો (Enzymes)", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
