<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ન્યુક્લિયોફિલિક અવેજી પ્રક્રિયાઓ (SN1 & SN2)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ન્યુક્લિયોફિલિક અવેજી પ્રક્રિયાઓ (SN1 & SN2)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ન્યુક્લિયોફિલિક અવેજી પ્રક્રિયાઓ (SN1 & SN2)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "નીચેના પૈકી કયો સબસ્ટ્રેટ SN2 પ્રક્રિયા માટે સૌથી ઓછો પ્રતિક્રિયાશીલ હશે?", "opts": ["CH3-Br", "(CH3)2CH-Br", "(CH3)3C-Br", "CH3-CH2-Br"], "ans": 2, "exp": "SN2 પ્રક્રિયામાં ન્યુક્લિયોફિલિક અવેજી સબસ્ટ્રેટ પરના કાર્બન પર પાછળથી હુમલો કરે છે. ત્રિપરમાણુક (tertiary) હેલાઇડ (CH3)3C-Brમાં સ્ટેરિક અવરોધ સૌથી વધારે હોવાથી ન્યુક્લિયોફાઇલ કાર્બન પર સરળતાથી પહોંચી શકતું નથી, જેથી તે SN2 પ્રક્રિયા માટે સૌથી ઓછો પ્રતિક્રિયાશીલ હશે. CH3-Br (A) પ્રાથમિક હેલાઇડ છે અને સ્ટેરિક અવરોધ નહિવત હોવાથી સૌથી વધારે પ્રતિક્રિયાશીલ છે. (CH3)2CH-Br (B) દ્વિતીયક હેલાઇડ છે, જે પ્રાથમિક કરતાં ઓછો પ્રતિક્રિયાશીલ છે, પરંતુ ત્રિપરમાણુક કરતાં વધારે પ્રતિક્રિયાશીલ છે. CH3-CH2-Br (D) પણ પ્રાથમિક હેલાઇડ છે અને પ્રતિક્રિયાશીલ છે.", "ref": "Std 12 - અભ્યાસક્રમ 12: હેલોએલ્કેન અને હેલોએરિન - ન્યુક્લિયોફિલિક અવેજી પ્રક્રિયાઓ", "ch": ""}, {"q": "જ્યારે (S)-2-બ્રોમોબ્યુટેનને OH⁻ ની હાજરીમાં પ્રક્રિયા કરવામાં આવે છે, ત્યારે SN2 પ્રક્રિયા દ્વારા બનતો ઉત્પાદ કયો હશે?", "opts": ["(R)-2-બ્યુટેનોલ", "(S)-2-બ્યુટેનોલ", "રેસેમિક મિશ્રણ", "(R) અને (S) બંને સમાન પ્રમાણમાં"], "ans": 0, "exp": "SN2 પ્રક્રિયામાં ન્યુક્લિયોફાઇલ હુમલો સબસ્ટ્રેટ પરના કાર્બન પર પાછળથી થાય છે, જેથી કાર્બનની જગ્યા પર વલન (inversion) થાય છે. (S)-2-બ્રોમોબ્યુટેનમાં કાર્બન (S) કોન્ફિગરેશન ધરાવે છે, પરંતુ SN2 પ્રક્રિયા પછી તે (R) કોન્ફિગરેશનમાં ફેરવાય છે. તેથી ઉત્પાદ (R)-2-બ્યુટેનોલ હશે. (B) ખોટું છે કેમ કે વલન થાય છે. (C) અને (D) ખોટા છે કેમ કે SN2 પ્રક્રિયામાં રેસેમિક મિશ્રણ બનતું નથી.", "ref": "Std 12 - અભ્યાસક્રમ 12: હેલોએલ્કેન અને હેલોએરિન - ન્યુક્લિયોફિલિક અવેજી પ્રક્રિયાઓ", "ch": ""}, {"q": "નીચેના પૈકી કયો કરણ SN1 પ્રક્રિયા માટે અનુકૂળ છે?", "opts": ["નીચા તાપમાન અને ન્યુક્લિયોફાઇલની નીચી સાંદ્રતા", "ઉચ્ચ તાપમાન અને ન્યુક્લિયોફાઇલની ઉચ્ચ સાંદ્રતા", "નીચા તાપમાન અને ન્યુક્લિયોફાઇલની ઉચ્ચ સાંદ્રતા", "ઉચ્ચ તાપમાન અને ન્યુક્લિયોફાઇલની નીચી સાંદ્રતા"], "ans": 3, "exp": "SN1 પ્રક્રિયા બે પગથિયામાં થાય છે: પહેલા કાર્બોકેટાયન મધ્યસ્થી બને છે અને પછી ન્યુક્લિયોફાઇલ હુમલો કરે છે. ઉચ્ચ તાપમાન કાર્બોકેટાયનના નિર્માણને પ્રોત્સાહન આપે છે, જ્યારે ન્યુક્લિયોફાઇલની નીચી સાંદ્રતા SN2 પ્રક્રિયાને અટકાવે છે (કેમ કે SN2 માટે ન્યુક્લિયોફાઇલની ઉચ્ચ સાંદ્રતા જરૂરી છે). તેથી (D) યોગ્ય કરણ છે. (A) અને (C) ખોટા છે કેમ કે નીચા તાપમાને કાર્બોકેટાયન બનવાની શક્યતા ઓછી છે. (B) ખોટું છે કેમ કે ઉચ્ચ ન્યુક્લિયોફાઇલ સાંદ્રતા SN2 પ્રક્રિયાને પ્રોત્સાહન આપે છે.", "ref": "Std 12 - અભ્યાસક્રમ 12: હેલોએલ્કેન અને હેલોએરિન - ન્યુક્લિયોફિલિક અવેજી પ્રક્રિયાઓ", "ch": ""}, {"q": "નીચેના પૈકી કયો સોલ્વેન્ટ SN1 પ્રક્રિયા માટે સૌથી અનુકૂળ છે?", "opts": ["ડાઇમિથાઇલ સલ્ફોક્સાઇડ (DMSO)", "એસિટોનિટ્રાઇલ (CH3CN)", "પાણી (H2O)", "ઇથેનોલ (CH3CH2OH)"], "ans": 3, "exp": "SN1 પ્રક્રિયામાં કાર્બોકેટાયન મધ્યસ્થી બને છે, જે પોલર પ્રોટિક સોલ્વેન્ટમાં સ્થિર રહે છે. ઇથેનોલ (CH3CH2OH) એક પોલર પ્રોટિક સોલ્વેન્ટ છે, જે કાર્બોકેટાયનને સ્થિર કરે છે અને SN1 પ્રક્રિયાને પ્રોત્સાહન આપે છે. DMSO (A) અને એસિટોનિટ્રાઇલ (B) પોલર એપ્રોટિક સોલ્વેન્ટ છે, જે SN2 પ્રક્રિયાને પ્રોત્સાહન આપે છે. પાણી (C) પણ પોલર પ્રોટિક છે, પરંતુ ઇથેનોલ કરતાં ઓછું અનુકૂળ છે કેમ કે તે કાર્બોકેટાયન સાથે પ્રતિક્રિયા કરી શકે છે.", "ref": "Std 12 - અભ્યાસક્રમ 12: હેલોએલ્કેન અને હેલોએરિન - ન્યુક્લિયોફિલિક અવેજી પ્રક્રિયાઓ", "ch": ""}, {"q": "નીચેના પૈકી કયો ક્રમ SN2 પ્રક્રિયાની પ્રતિક્રિયાશીલતાના ક્રમને યોગ્ય રીતે દર્શાવે છે? (સૌથી વધારે પ્રતિક્રિયાશીલથી સૌથી ઓછા પ્રતિક્રિયાશીલ સુધી)", "opts": ["CH3-X > (CH3)2CH-X > (CH3)3C-X", "(CH3)3C-X > (CH3)2CH-X > CH3-X", "(CH3)2CH-X > CH3-X > (CH3)3C-X", "CH3-X > (CH3)3C-X > (CH3)2CH-X"], "ans": 0, "exp": "SN2 પ્રક્રિયામાં સ્ટેરિક અવરોધ પ્રતિક્રિયાશીલતાને અસર કરે છે. પ્રાથમિક હેલાઇડ (CH3-X)માં સ્ટેરિક અવરોધ સૌથી ઓછો હોવાથી તે સૌથી વધારે પ્રતિક્રિયાશીલ છે. દ્વિતીયક હેલાઇડ (CH3)2CH-Xમાં સ્ટેરિક અવરોધ વધારે હોવાથી તે પ્રાથમિક કરતાં ઓછો પ્રતિક્રિયાશીલ છે. ત્રિપરમાણુક હેલાઇડ (CH3)3C-Xમાં સ્ટેરિક અવરોધ સૌથી વધારે હોવાથી તે સૌથી ઓછો પ્રતિક્રિયાશીલ છે. તેથી યોગ્ય ક્રમ CH3-X > (CH3)2CH-X > (CH3)3C-X છે. (B), (C), અને (D) ખોટા ક્રમ દર્શાવે છે.", "ref": "Std 12 - અભ્યાસક્રમ 12: હેલોએલ્કેન અને હેલોએરિન - ન્યુક્લિયોફિલિક અવેજી પ્રક્રિયાઓ", "ch": ""}, {"q": "નીચેના પૈકી કયા યૌગિકમાં SN1 પ્રક્રિયા દરમિયાન રેસેમીકરણ થશે નહીં?", "opts": ["(R)-2-ક્લોરોબ્યુટેન", "(S)-3-બ્રોમોહેક્સેન", "(R)-1-ક્લોરો-1-ફિનાઇલઇથેન", "(S)-2-આયોડોપ્રોપેન"], "ans": 2, "exp": "સી) (R)-1-ક્લોરો-1-ફિનાઇલઇથેનમાં ક્લોરિન સાથે જોડાયેલ કાર્બન પર ફિનાઇલ સમૂહ હાજર છે, જે કર્બોકેટાયન મધ્યવર્તીને સ્થિરતા આપે છે. પરંતુ આ કર્બોકેટાયન સંરચના સંમિત હોવાથી રેસેમીકરણ થતું નથી. ઉદાહરણ તરીકે, ફિનાઇલ સમૂહના કારણે કર્બોકેટાયન સપાટી સંમિત થાય છે, જેથી ન્યુક્લિયોફિલિક અટેક બંને બાજુથી સરખી રીતે થઈ શકે નહીં, પરિણામે રેસેમીકરણ થતું નથી. બાકીના વિકલ્પો (A, B, D)માં કર્બોકેટાયન મધ્યવર્તી અસંમિત હોવાથી રેસેમીકરણ થશે.", "ref": "Std 12 - અભ્યાસક્રમ 16: હેલોએલ્કેન અને હેલોએરિન - ન્યુક્લિયોફિલિક અવેજી પ્રક્રિયાઓ", "ch": ""}, {"q": "નીચેના પૈકી કયા કિસ્સામાં SN2 પ્રક્રિયાની ગતિ સબસ્ટ્રેટની સાંદ્રતા પર પ્રથમ ક્રમની આશ્રિત રહેશે?", "opts": ["ટર્શિયરી હેલાઇડ સાથે પાણી (H2O) પ્રક્રિયા", "પ્રાથમિક હેલાઇડ સાથે OH− પ્રક્રિયા", "દ્વિતીયક હેલાઇડ સાથે CH3OH પ્રક્રિયા", "ટર્શિયરી હેલાઇડ સાથે CH3OH પ્રક્રિયા"], "ans": 1, "exp": "બી) પ્રાથમિક હેલાઇડ સાથે OH− ની પ્રક્રિયા SN2 મેકેનિઝમ દ્વારા થાય છે, જેમાં પ્રક્રિયાની ગતિ સબસ્ટ્રેટ અને ન્યુક્લિયોફિલ બંનેપર આશ્રિત રહે છે, પરિણામે પ્રથમ ક્રમની ગતિ મળે છે. ટર્શિયરી હેલાઇડ (A, D) SN1 પ્રક્રિયા અનુસરે છે, જ્યારે દ્વિતીયક હેલાઇડ (C) બંને મેકેનિઝમ અનુસરી શકે છે, પરંતુ CH3OH જેવા ધ્રુવીય પ્રોટિક સોલ્વેન્ટમાં SN1 પ્રબળ હોય છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: હેલોએલ્કેન અને હેલોએરિન - ન્યુક્લિયોફિલિક અવેજી પ્રક્રિયાઓ", "ch": ""}, {"q": "નીચેના પૈકી કયા યૌગિકમાં SN1 પ્રક્રિયા દરમિયાન કર્બોકેટાયન પુનર્રચના થશે?", "opts": ["1-ક્લોરોપેન્ટેન", "2-ક્લોરોપેન્ટેન", "3-ક્લોરોપેન્ટેન", "2-ક્લોરો-2-મિથાઇલપ્રોપેન"], "ans": 2, "exp": "સી) 3-ક્લોરોપેન્ટેનમાં ક્લોરિન સાથે જોડાયેલ કાર્બન દ્વિતીયક છે અને તેની પાસે આલ્કાઇલ સમૂહની પુનર્રચના થઈ શકે તેવી સંરચના છે. જ્યારે ક્લોરિન નીકળી જાય છે, ત્યારે બનતા કર્બોકેટાયનમાં હાઇડ્રાઇડ શિફ્ટ અથવા મિથાઇલ શિફ્ટ થઈ શકે છે, જેથી પુનર્રચના થાય છે. બાકીના વિકલ્પો (A, B, D)માં પુનર્રચના શક્ય નથી અથવા સ્થિર કર્બોકેટાયન બને છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: હેલોએલ્કેન અને હેલોએરિન - ન્યુક્લિયોફિલિક અવેજી પ્રક્રિયાઓ", "ch": ""}, {"q": "નીચેના પૈકી કયા ન્યુક્લિયોફિલની SN2 પ્રક્રિયામાં સૌથી ઓછી પ્રતિક્રિયાશીલતા હશે?", "opts": ["CH3O−", "OH−", "NH3", "H2O"], "ans": 3, "exp": "ડ) H2O એ નબળો ન્યુક્લિયોફિલ છે અને તેની પ્રતિક્રિયાશીલતા ઓછી હોય છે. CH3O− (A) અને OH− (B) મજબૂત ન્યુક્લિયોફિલ છે, જ્યારે NH3 (C) મધ્યમ પ્રબળતાનો ન્યુક્લિયોફિલ છે. SN2 પ્રક્રિયામાં ન્યુક્લિયોફિલની પ્રબળતા જેટલી વધુ હોય, પ્રતિક્રિયાશીલતા એટલી વધુ હોય છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: હેલોએલ્કેન અને હેલોએરિન - ન્યુક્લિયોફિલિક અવેજી પ્રક્રિયાઓ", "ch": ""}, {"q": "નીચેના પૈકી કયા કિસ્સામાં SN1 અને SN2 પ્રક્રિયાની ગતિ સરખી હશે?", "opts": ["મિથાઇલ હેલાઇડ સાથે OH− પ્રક્રિયા", "ટર્શિયરી હેલાઇડ સાથે પાણી પ્રક્રિયા", "દ્વિતીયક હેલાઇડ સાથે CH3OH પ્રક્રિયા", "પ્રાથમિક હેલાઇડ સાથે NH3 પ્રક્રિયા"], "ans": 2, "exp": "સી) દ્વિતીયક હેલાઇડ સાથે CH3OH જેવા ધ્રુવીય પ્રોટિક સોલ્વેન્ટમાં SN1 અને SN2 બંને પ્રક્રિયા થઈ શકે છે, જેથી ગતિ લગભગ સરખી હોઈ શકે. મિથાઇલ હેલાઇડ (A) ફક્ત SN2 અનુસરે છે, ટર્શિયરી હેલાઇડ (B) ફક્ત SN1 અનુસરે છે, અને પ્રાથમિક હેલાઇડ (D) મુખ્યત્વે SN2 અનુસરે છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: હેલોએલ્કેન અને હેલોએરિન - ન્યુક્લિયોફિલિક અવેજી પ્રક્રિયાઓ", "ch": ""}, {"q": "નીચેના પૈકી કયા સંજોગોમાં SN1 પ્રક્રિયાની ગતિ ન્યુક્લિયોફિલની સાંદ્રતા પર આધારિત નથી, પરંતુ સબસ્ટ્રેટની સાંદ્રતા પર પ્રથમ ક્રમની હોય છે, તેમ છતાં પ્રક્રિયા મિશ્રિત ક્રમ દર્શાવે છે?", "opts": ["જ્યારે ન્યુક્લિયોફિલ નબળો હોય અને સોલ્વેન્ટ ધ્રુવીય પ્રોટિક હોય", "જ્યારે સબસ્ટ્રેટ તૃતીયક હોય અને ન્યુક્લિયોફિલ પ્રબળ હોય", "જ્યારે સોલ્વેન્ટ ધ્રુવીય એપ્રોટિક હોય અને ન્યુક્લિયોફિલ નબળો હોય", "જ્યારે સબસ્ટ્રેટ પ્રાથમિક હોય અને ન્યુક્લિયોફિલ પ્રબળ હોય"], "ans": 0, "exp": "SN1 પ્રક્રિયાની ગતિ માત્ર સબસ્ટ્રેટની સાંદ્રતા પર પ્રથમ ક્રમની હોય છે કારણ કે તેમાં કર્બોકેટાયન મધ્યવર્તી બને છે. ન્યુક્લિયોફિલની સાંદ્રતા ગતિને અસર કરતી નથી, પરંતુ જો ન્યુક્લિયોફિલ નબળો હોય અને સોલ્વેન્ટ ધ્રુવીય પ્રોટિક હોય તો સોલ્વેન્ટ પણ ન્યુક્લિયોફિલ તરીકે વર્તે છે, જેના કારણે મિશ્રિત ક્રમ દેખાય છે. બાકીના વિકલ્પોમાં SN1 પ્રક્રિયાની લાક્ષણિકતાઓનું પાલન થતું નથી.", "ref": "Std 12 - પ્રકરણ 10: હેલોએલ્કેન અને હેલોએરિન", "ch": ""}, {"q": "નીચેના પૈકી કયા સંયોજનમાં SN2 પ્રક્રિયા દરમિયાન વોલ્ડન વિપરીતતા (Walden Inversion) થશે નહીં?", "opts": ["(R)-2-ક્લોરોપ્રોપેન", "મિથાઇલ ક્લોરાઇડ", "નિયોપેન્ટાઇલ બ્રોમાઇડ", "(S)-2-આયોડોબ્યુટેન"], "ans": 2, "exp": "નિયોપેન્ટાઇલ બ્રોમાઇડમાં કાર્બન પર સ્ટેરિક અવરોધ ખૂબ જ વધારે હોય છે, જેના કારણે SN2 પ્રક્રિયા લગભગ અશક્ય બને છે. તેથી વોલ્ડન વિપરીતતા થતી નથી. બાકીના વિકલ્પોમાં SN2 પ્રક્રિયા થાય છે અને વોલ્ડન વિપરીતતા જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 10: હેલોએલ્કેન અને હેલોએરિન", "ch": ""}, {"q": "એક પ્રયોગમાં, 2-બ્રોમો-2-મિથાઇલપ્રોપેનને ઇથેનોલમાં OH⁻ સાથે પ્રક્રિયા કરવામાં આવે છે. આ પ્રક્રિયામાં નીચેના પૈકી કયું અવલોકન સાચું નથી?", "opts": ["પ્રક્રિયા SN1 પ્રકારની હશે અને રેસેમીકરણ થશે", "પ્રક્રિયાની ગતિ માત્ર સબસ્ટ્રેટની સાંદ્રતા પર આધારિત હશે", "પ્રક્રિયામાં કાર્બોકેટાયન મધ્યવર્તી બનશે અને પુનર્રચના થઈ શકે છે", "પ્રક્રિયા SN2 પ્રકારની હશે અને વોલ્ડન વિપરીતતા જોવા મળશે"], "ans": 3, "exp": "2-બ્રોમો-2-મિથાઇલપ્રોપેન તૃતીયક હેલાઇડ છે, જે SN1 પ્રક્રિયા માટે અનુકૂળ છે. તેમાં કાર્બોકેટાયન મધ્યવર્તી બને છે અને રેસેમીકરણ થાય છે. SN2 પ્રક્રિયા તૃતીયક હેલાઇડ માટે લગભગ અશક્ય છે, તેથી વોલ્ડન વિપરીતતા જોવા મળશે નહીં.", "ref": "Std 12 - પ્રકરણ 10: હેલોએલ્કેન અને હેલોએરિન", "ch": ""}, {"q": "નીચેના પૈકી કયા સંજોગોમાં SN1 અને SN2 પ્રક્રિયાની ગતિ એકસમાન હોઈ શકે છે?", "opts": ["જ્યારે સબસ્ટ્રેટ દ્વિતીયક હોય અને સોલ્વેન્ટ ધ્રુવીય એપ્રોટિક હોય", "જ્યારે સબસ્ટ્રેટ પ્રાથમિક હોય અને ન્યુક્લિયોફિલ નબળો હોય", "જ્યારે સબસ્ટ્રેટ તૃતીયક હોય અને ન્યુક્લિયોફિલ પ્રબળ હોય", "જ્યારે સબસ્ટ્રેટ મિથાઇલ હોય અને સોલ્વેન્ટ ધ્રુવીય પ્રોટિક હોય"], "ans": 0, "exp": "દ્વિતીયક સબસ્ટ્રેટમાં SN1 અને SN2 પ્રક્રિયાની સ્પર્ધા થઈ શકે છે. જો સોલ્વેન્ટ ધ્રુવીય એપ્રોટિક હોય તો SN2 પ્રક્રિયા પ્રભાવિત થાય છે, જ્યારે SN1 પ્રક્રિયા પણ થઈ શકે છે. આ સંજોગોમાં બંને પ્રક્રિયાની ગતિ એકસમાન હોઈ શકે છે. બાકીના વિકલ્પોમાં એક પ્રક્રિયા બીજી કરતાં વધુ પ્રભાવી હોય છે.", "ref": "Std 12 - પ્રકરણ 10: હેલોએલ્કેન અને હેલોએરિન", "ch": ""}, {"q": "એક પ્રયોગમાં, (S)-3-બ્રોમો-3-મિથાઇલહેક્ઝેનને મિથેનોલમાં ગરમ કરવામાં આવે છે. આ પ્રક્રિયામાં નીચેના પૈકી કયું અવલોકન ખોટું છે?", "opts": ["પ્રક્રિયા SN1 પ્રકારની હશે અને રેસેમીકરણ થશે", "પ્રક્રિયામાં કાર્બોકેટાયન મધ્યવર્તી બનશે અને હાઇડ્રાઇડ શિફ્ટ થઈ શકે છે", "પ્રક્રિયાની ગતિ ન્યુક્લિયોફિલની સાંદ્રતા પર આધારિત હશે", "પ્રક્રિયામાં મુખ્ય નીપજ તરીકે મિથાઇલ ઇથર મળશે"], "ans": 2, "exp": "(S)-3-બ્રોમો-3-મિથાઇલહેક્ઝેન તૃતીયક હેલાઇડ છે, જે SN1 પ્રક્રિયા માટે અનુકૂળ છે. SN1 પ્રક્રિયાની ગતિ માત્ર સબસ્ટ્રેટની સાંદ્રતા પર આધારિત હોય છે, ન્યુક્લિયોફિલની સાંદ્રતા પર નહીં. તેમાં કાર્બોકેટાયન મધ્યવર્તી બને છે, જે રેસેમીકરણ અને હાઇડ્રાઇડ શિફ્ટ દર્શાવી શકે છે. મિથેનોલ ધ્રુવીય પ્રોટિક સોલ્વેન્ટ છે, જે ન્યુક્લિયોફિલ તરીકે વર્તે છે અને મિથાઇલ ઇથર બનાવે છે.", "ref": "Std 12 - પ્રકરણ 10: હેલોએલ્કેન અને હેલોએરિન", "ch": ""}, {"q": "જ્યારે (R)-3-બ્રોમો-2,3-ડાયમિથાઇલપેન્ટેનને એસિટોનમાં પાણી સાથે ગરમ કરવામાં આવે છે, ત્યારે મુખ્ય ઉત્પાદન કયું હશે?", "opts": ["(R)-2,3-ડાયમિથાઇલપેન્ટેન-3-ઓલ", "(S)-2,3-ડાયમિથાઇલપેન્ટેન-3-ઓલ", "રેસેમિક મિશ્રણ (R અને S-2,3-ડાયમિથાઇલપેન્ટેન-3-ઓલ)", "2,3-ડાયમિથાઇલપેન્ટેન-2-ઓલ"], "ans": 2, "exp": "આ પ્રક્રિયામાં SN1 મેકેનિઝમ ચાલે છે કારણ કે ત્રિપરમાણુક કર્બન (3°) પર બ્રોમિન છે, જે કર્બોકેટાયનની રચના કરે છે. કર્બોકેટાયન સમતલીય હોવાથી ન્યુક્લિયોફિલ (પાણી) બંને બાજુએથી અટેક કરી શકે છે, પરિણામે રેસેમીકરણ થાય છે. વિકલ્પ A અને B માત્ર એક જ એનાન્ટિયોમર દર્શાવે છે, જે અશક્ય છે. વિકલ્પ Dમાં કર્બન શૃંખલામાં ફેરફાર થયો છે, જે આ પ્રક્રિયામાં શક્ય નથી.", "ref": "Std 12 - અભ્યાસક્રમ 16: હેલોએલ્કેન અને હેલોએરિન યૌગિકો", "ch": ""}, {"q": "નીચેના પૈકી કયા યૌગિકમાં SN2 પ્રક્રિયા દરમિયાન સૌથી ઓછી પ્રતિક્રિયાશીલતા હશે, જ્યારે ન્યુક્લિયોફિલ તરીકે CN− વાપરવામાં આવે?", "opts": ["CH3Br", "(CH3)2CHBr", "(CH3)3CBr", "CH3CH2Br"], "ans": 2, "exp": "SN2 પ્રક્રિયામાં, ત્રિપરમાણુક હેલાઇડ (CH3)3CBr સૌથી ઓછી પ્રતિક્રિયાશીલ હોય છે કારણ કે કર્બન પર સ્ટેરિક અવરોધ સૌથી વધારે હોય છે, જે ન્યુક્લિયોફિલને પાછળથી અટેક કરવામાં અડચણ ઉભી કરે છે. CH3Br (A) અને CH3CH2Br (D) પ્રાથમિક હેલાઇડ છે, જે SN2 માટે સૌથી અનુકૂળ છે. (CH3)2CHBr (B) દ્વિતીય હેલાઇડ છે, જે પ્રાથમિક કરતાં ઓછી પ્રતિક્રિયાશીલ છે, પરંતુ (CH3)3CBr કરતાં વધારે પ્રતિક્રિયાશીલ છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: હેલોએલ્કેન અને હેલોએરિન યૌગિકો", "ch": ""}, {"q": "નીચેના પૈકી કયા સંયોજનમાં SN2 પ્રક્રિયા દરમિયાન ન્યુક્લિયોફિલિક અવેજીની ગતિ સૌથી ઓછી હશે, જ્યારે ન્યુક્લિયોફિલ તરીકે OH− વાપરવામાં આવે?", "opts": ["CH3CH2Br", "(CH3)2CHBr", "(CH3)3CBr", "CH3Br"], "ans": 2, "exp": "(CH3)3CBr (ત્રિપરમાણુક હેલાઇડ)માં સ્ટેરિક અવરોધ સૌથી વધારે હોવાથી SN2 પ્રક્રિયા સૌથી મંદ ગતિએ ચાલે છે. CH3Br (D) અને CH3CH2Br (A) પ્રાથમિક હેલાઇડ છે, જે SN2 માટે સૌથી અનુકૂળ છે. (CH3)2CHBr (B) દ્વિતીય હેલાઇડ છે, જે પ્રાથમિક કરતાં ઓછી પ્રતિક્રિયાશીલ છે, પરંતુ (CH3)3CBr કરતાં વધારે પ્રતિક્રિયાશીલ છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: હેલોએલ્કેન અને હેલોએરિન યૌગિકો", "ch": ""}, {"q": "એક પ્રયોગમાં, (R)-2-બ્રોમોબ્યુટેનને ડાઇમિથાઇલ સલ્ફોક્સાઇડ (DMSO)માં સોડિયમ એઝાઇડ (NaN₃) સાથે પ્રક્રિયા કરવામાં આવે છે. આ પ્રક્રિયામાં મુખ્ય ઉત્પાદન તરીકે નીચેના પૈકી કયું સંયોજન મળશે અને તેની સ્ટીરિયોકેમિસ્ટ્રી કેવી હશે?", "opts": ["(S)-2-એઝાઇડોબ્યુટેન, વોલ્ડન વિપરીતતા સાથે", "(R)-2-એઝાઇડોબ્યુટેન, રેસેમીકરણ સાથે", "(S)-2-એઝાઇડોબ્યુટેન, રેસેમીકરણ સાથે", "(R)-2-એઝાઇડોબ્યુટેન, વોલ્ડન વિપરીતતા સાથે"], "ans": 0, "exp": "DMSO એક ધ્રુવીય એપ્રોટિક દ્રાવક છે, જે SN2 પ્રક્રિયાને અનુકૂળ છે. (R)-2-બ્રોમોબ્યુટેનમાં SN2 પ્રક્રિયા થતાં વોલ્ડન વિપરીતતા (Walden Inversion) થશે, જેના કારણે ઉત્પાદન (S)-2-એઝાઇડોબ્યુટેન મળશે. SN1 પ્રક્રિયામાં રેસેમીકરણ થાય છે, પરંતુ અહીં SN2 પ્રક્રિયા થતી હોવાથી રેસેમીકરણ નહીં થાય. તેથી વિકલ્પ A સાચો છે.", "ref": "Std 12 - પ્રકરણ 10: હેલોઆલ્કેન અને હેલોએરિન", "ch": ""}, {"q": "જ્યારે (R)-2-ઇયોડોબ્યુટેનને એસિટોનમાં સોડિયમ સાયનાઇડ (NaCN) સાથે પ્રક્રિયા કરવામાં આવે છે, ત્યારે નીચેના પૈકી કયું વિધાન સત્ય છે?", "opts": ["પ્રક્રિયા SN1 મેકેનિઝમ દ્વારા થશે અને ઉત્પાદન રેસેમિક મિશ્રણ હશે.", "પ્રક્રિયા SN2 મેકેનિઝમ દ્વારા થશે અને ઉત્પાદનમાં વોલ્ડન વિપરીતતા જોવા મળશે.", "પ્રક્રિયા SN1 મેકેનિઝમ દ્વારા થશે અને ઉત્પાદનમાં કોઈ રેસેમીકરણ થશે નહીં.", "પ્રક્રિયા SN2 મેકેનિઝમ દ્વારા થશે અને ઉત્પાદન રેસેમિક મિશ્રણ હશે."], "ans": 1, "exp": "સોડિયમ સાયનાઇડ (NaCN) એક મજબૂત ન્યુક્લિયોફિલ છે અને એસિટોન એક ધ્રુવીય એપ્રોટિક સોલ્વેન્ટ છે, જે SN2 પ્રક્રિયાને અનુકૂળ છે. (R)-2-ઇયોડોબ્યુટેન એક દ્વિતીય હેલાઇડ છે, પરંતુ SN2 પ્રક્રિયામાં વોલ્ડન વિપરીતતા થાય છે, જેમાં ન્યુક્લિયોફિલ હેલોજનને પાછળથી હુમલો કરે છે, પરિણામે કોન્ફિગરેશન વિપરીત થાય છે. A) SN1 પ્રક્રિયામાં રેસેમીકરણ થાય છે, પરંતુ અહીં SN2 પ્રક્રિયા થાય છે. C) SN1 પ્રક્રિયામાં રેસેમીકરણ થાય છે, પરંતુ અહીં SN2 પ્રક્રિયા થાય છે. D) SN2 પ્રક્રિયામાં રેસેમીકરણ થતું નથી, પરંતુ વોલ્ડન વિપરીતતા થાય છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: હેલોએલ્કેન અને હેલોએરિન - ન્યુક્લિયોફિલિક અવેજી પ્રક્રિયાઓ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
