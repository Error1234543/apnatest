<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>એલ્ડોલ સંક્ષેપણ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>એલ્ડોલ સંક્ષેપણ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">એલ્ડોલ સંક્ષેપણ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક કાર્બનિક સંયોજનમાં આલ્ડિહાઇડ અને કીટોન બંને સમૂહો હાજર હોય ત્યારે એલ્ડોલ સંક્ષેપણ પ્રક્રિયા માટે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["આલ્ડિહાઇડ સમૂહ ધરાવતા કાર્બન પરથી α-હાઇડ્રોજન દૂર થઈ કાર્બનાયન બને છે", "કીટોન સમૂહ ધરાવતા કાર્બન પરથી α-હાઇડ્રોજન દૂર થઈ કાર્બનાયન બને છે, પરંતુ તે ઓછું સક્રિય હોય છે", "આલ્ડિહાઇડ અને કીટોન બંનેના α-હાઇડ્રોજન ધરાવતા કાર્બન વચ્ચે સંક્ષેપણ થઈ β-હાઇડ્રોક્સી કાર્બોનિલ સંયોજન બને છે", "આ પ્રક્રિયા માત્ર આલ્કલાઇન માધ્યમમાં જ થાય છે અને તેમાં ઉત્સેચકની જરૂર પડે છે"], "ans": 3, "exp": "એલ્ડોલ સંક્ષેપણ પ્રક્રિયા એ રાસાયણિક પ્રક્રિયા છે જે આલ્કલાઇન માધ્યમમાં થાય છે, પરંતુ તેમાં ઉત્સેચકની જરૂર પડતી નથી. ઉત્સેચક જૈવિક પ્રક્રિયાઓમાં ભાગ લે છે, જ્યારે એલ્ડોલ સંક્ષેપણ રાસાયણિક પ્રક્રિયા છે. બાકીના વિકલ્પો સાચાં છે કારણ કે α-હાઇડ્રોજન ધરાવતા કાર્બન પરથી કાર્બનાયન બને છે અને સંક્ષેપણ થઈ β-હાઇડ્રોક્સી કાર્બોનિલ સંયોજન બને છે.", "ref": "Std 12 - પ્રકરણ 12: આલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "નીચેના સંયોજનોમાંથી કયું સંયોજન એલ્ડોલ સંક્ષેપણ પ્રક્રિયામાં ભાગ લઈ શકે નહીં? (આલ્ફા-હાઇડ્રોજનની ગેરહાજરીને કારણે)", "opts": ["ઇથેનાલ (CH₃CHO)", "પ્રોપેનાલ (CH₃CH₂CHO)", "બેન્ઝાલ્ડિહાઇડ (C₆H₅CHO)", "બ્યુટેન-2-ઓન (CH₃COCH₂CH₃)"], "ans": 2, "exp": "બેન્ઝાલ્ડિહાઇડમાં α-હાઇડ્રોજન હાજર નથી, તેથી તે એલ્ડોલ સંક્ષેપણ પ્રક્રિયામાં ભાગ લઈ શકતું નથી. બાકીના સંયોજનોમાં α-હાઇડ્રોજન હાજર છે, તેથી તેઓ આ પ્રક્રિયામાં ભાગ લઈ શકે છે.", "ref": "Std 12 - પ્રકરણ 12: આલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "એક વિદ્યાર્થીએ એસિટોન (CH₃COCH₃) અને બેન્ઝાલ્ડિહાઇડ (C₆H₅CHO)નું મિશ્રણ લઈ એલ્ડોલ સંક્ષેપણ પ્રક્રિયા કરાવી. આ પ્રક્રિયામાં નીચેનામાંથી કયું સંયોજન મુખ્ય ઉત્પાદ તરીકે મળે તેવી શક્યતા સૌથી વધુ છે?", "opts": ["4-ફિનાઇલબ્યુટેન-2-ઓન", "1-ફિનાઇલપેન્ટેન-3-ઓન", "4-હાઇડ્રોક્સી-4-ફિનાઇલબ્યુટેન-2-ઓન", "3-હાઇડ્રોક્સી-1-ફિનાઇલપેન્ટેન-1-ઓન"], "ans": 2, "exp": "એસિટોનમાંથી બનેલું કાર્બનાયન બેન્ઝાલ્ડિહાઇડના કાર્બોનિલ કાર્બન પર હુમલો કરે છે, જેના પરિણામે 4-હાઇડ્રોક્સી-4-ફિનાઇલબ્યુટેન-2-ઓન બને છે. આ સંયોજન સૌથી વધુ સ્થિર અને સંભવિત ઉત્પાદ છે. બાકીના વિકલ્પો આ પ્રક્રિયામાં મુખ્ય ઉત્પાદ તરીકે મળતા નથી.", "ref": "Std 12 - પ્રકરણ 12: આલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "એલ્ડોલ સંક્ષેપણ પ્રક્રિયામાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["આ પ્રક્રિયા માટે α-હાઇડ્રોજન ધરાવતા કાર્બોનિલ સંયોજનની જરૂર પડે છે", "પ્રક્રિયા દરમિયાન કાર્બન-કાર્બન બંધ બને છે", "આ પ્રક્રિયા એસિડિક માધ્યમમાં વધુ સારી રીતે થાય છે", "પ્રક્રિયા પછી β-હાઇડ્રોક્સી કાર્બોનિલ સંયોજન મળે છે"], "ans": 2, "exp": "એલ્ડોલ સંક્ષેપણ પ્રક્રિયા એસિડિક માધ્યમમાં થતી નથી, તે આલ્કલાઇન માધ્યમમાં થાય છે. બાકીના વિકલ્પો સાચાં છે કારણ કે α-હાઇડ્રોજન ધરાવતા કાર્બોનિલ સંયોજનની જરૂર પડે છે, કાર્બન-કાર્બન બંધ બને છે અને β-હાઇડ્રોક્સી કાર્બોનિલ સંયોજન મળે છે.", "ref": "Std 12 - પ્રકરણ 12: આલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "એક સંયોજનમાં બે આલ્ડિહાઇડ સમૂહો હાજર છે, પરંતુ માત્ર એક જ α-હાઇડ્રોજન ધરાવે છે. આ સંયોજન એલ્ડોલ સંક્ષેપણ પ્રક્રિયામાં કેવી રીતે વર્તશે?", "opts": ["માત્ર આંતરઆણ્વીય એલ્ડોલ સંક્ષેપણ થશે", "માત્ર આંતરઆણ્વિક એલ્ડોલ સંક્ષેપણ થશે", "આંતરઆણ્વીય અને આંતરઆણ્વિક બંને પ્રકારનું સંક્ષેપણ થઈ શકે છે", "આ સંયોજન એલ્ડોલ સંક્ષેપણ પ્રક્રિયામાં ભાગ લઈ શકશે નહીં"], "ans": 1, "exp": "જ્યારે સંયોજનમાં માત્ર એક α-હાઇડ્રોજન હોય ત્યારે આંતરઆણ્વીય એલ્ડોલ સંક્ષેપણ થાય છે, કારણ કે એક અણુમાંથી કાર્બનાયન બને છે અને બીજા અણુના કાર્બોનિલ કાર્બન પર હુમલો કરે છે. આંતરઆણ્વિક સંક્ષેપણ માટે ઓછામાં ઓછા બે α-હાઇડ્રોજન જરૂરી છે. તેથી માત્ર આંતરઆણ્વીય સંક્ષેપણ થશે.", "ref": "Std 12 - પ્રકરણ 12: આલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "એલ્ડોલ સંક્ષેપણ પ્રક્રિયામાં નીચેનામાંથી કયું સંયોજન આંતરઅણુ (intramolecular) એલ્ડોલ સંક્ષેપણ આપી શકે છે?", "opts": ["એસિટાલ્ડિહાઇડ (CH3CHO)", "પ્રોપેનાલ (CH3CH2CHO)", "૫-હેક્સેનડાયલ (OHC-(CH2)4-CHO)", "બેન્ઝાલ્ડિહાઇડ (C6H5CHO)"], "ans": 2, "exp": "૫-હેક્સેનડાયલ (OHC-(CH2)4-CHO)માં બે એલ્ડિહાઇડ સમૂહો વચ્ચે ચાર કાર્બન પરમાણુઓ હોય છે, જે આંતરઅણુ એલ્ડોલ સંક્ષેપણ માટે અનુકૂળ અંતર છે. એસિટાલ્ડિહાઇડ અને પ્રોપેનાલમાં માત્ર એક જ એલ્ડિહાઇડ સમૂહ હોવાથી આંતરઅણુ પ્રક્રિયા શક્ય નથી. બેન્ઝાલ્ડિહાઇડમાં α-હાઇડ્રોજનની અછત હોવાથી એલ્ડોલ સંક્ષેપણમાં ભાગ લઈ શકતું નથી.", "ref": "Std 12 - અભ્યાસક્રમ 16: કાર્બનિક રસાયણવિજ્ઞાન - એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "એલ્ડોલ સંક્ષેપણ પ્રક્રિયા દરમિયાન નીચેનામાંથી કયું ઉત્પાદન બનતું નથી?", "opts": ["β-હાઇડ્રોક્સી એલ્ડિહાઇડ", "α,β-અસંતૃપ્ત એલ્ડિહાઇડ", "β-હાઇડ્રોક્સી કીટોન", "α-હાઇડ્રોક્સી કીટોન"], "ans": 3, "exp": "એલ્ડોલ સંક્ષેપણમાં પ્રથમ β-હાઇડ્રોક્સી કાર્બનિલ સંયોજન (એલ્ડોલ) બને છે, જે પછી નિર્જલીકરણથી α,β-અસંતૃપ્ત કાર્બનિલ સંયોજનમાં રૂપાંતરિત થાય છે. આ પ્રક્રિયામાં α-હાઇડ્રોક્સી કીટોન બનતું નથી, કારણ કે હાઇડ્રોક્સી સમૂહ હંમેશા β-સ્થાને જ જોડાય છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: કાર્બનિક રસાયણવિજ્ઞાન - એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન એલ્ડોલ સંક્ષેપણ પ્રક્રિયા માટે સત્ય નથી?", "opts": ["એલ્ડોલ સંક્ષેપણમાં આલ્ફા-હાઇડ્રોજનની હાજરી જરૂરી છે.", "એલ્ડોલ સંક્ષેપણ ક્ષારકીય મધ્યમમાં થાય છે.", "એલ્ડોલ સંક્ષેપણમાં કાર્બોન-કાર્બન બંધ રચાય છે.", "એલ્ડોલ સંક્ષેપણમાં ફક્ત એલ્ડિહાઇડ જ ભાગ લઈ શકે છે, કીટોન નહીં."], "ans": 3, "exp": "એલ્ડોલ સંક્ષેપણમાં એલ્ડિહાઇડ અને કીટોન બંને ભાગ લઈ શકે છે, જો તેમની પાસે α-હાઇડ્રોજન હોય. આલ્ફા-હાઇડ્રોજનની હાજરી, ક્ષારકીય મધ્યમ અને કાર્બન-કાર્બન બંધની રચના એલ્ડોલ સંક્ષેપણની મુખ્ય લાક્ષણિકતાઓ છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: કાર્બનિક રસાયણવિજ્ઞાન - એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "એલ્ડોલ સંક્ષેપણ પ્રક્રિયામાં નીચેનામાંથી કયું સંયોજન ક્રોસ-એલ્ડોલ સંક્ષેપણ (cross-aldol condensation) માટે સૌથી યોગ્ય જોડી છે?", "opts": ["એસિટોન અને એસિટાલ્ડિહાઇડ", "ફોર્મલ્ડિહાઇડ અને એસિટોન", "બેન્ઝાલ્ડિહાઇડ અને એસિટોન", "એસિટાલ્ડિહાઇડ અને પ્રોપેનાલ"], "ans": 1, "exp": "ફોર્મલ્ડિહાઇડમાં કોઈ α-હાઇડ્રોજન નથી, પરંતુ એસિટોનમાં α-હાઇડ્રોજન છે. ક્રોસ-એલ્ડોલ સંક્ષેપણમાં, ફોર્મલ્ડિહાઇડ એનોલેટ આયન સાથે પ્રક્રિયા કરી શકે છે, જ્યારે એસિટોન એનોલેટ રચી શકે છે. બાકીની જોડીઓમાં બંને સંયોજનોમાં α-હાઇડ્રોજન હોવાથી અયોગ્ય ક્રોસ-એલ્ડોલ ઉત્પાદનો બને છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: કાર્બનિક રસાયણવિજ્ઞાન - એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "એલ્ડોલ સંક્ષેપણ પ્રક્રિયા દરમિયાન નિર્જલીકરણ પગલામાં નીચેનામાંથી કયું ઉત્પાદન બને છે જ્યારે એસિટાલ્ડિહાઇડનો ઉપયોગ થાય છે?", "opts": ["3-હાઇડ્રોક્સી બ્યુટેનાલ", "ક્રોટોનાલ્ડિહાઇડ (CH3CH=CHCHO)", "2-હાઇડ્રોક્સી બ્યુટેનાલ", "એસિટિક એસિડ"], "ans": 1, "exp": "એસિટાલ્ડિહાઇડના એલ્ડોલ સંક્ષેપણમાં પ્રથમ 3-હાઇડ્રોક્સી બ્યુટેનાલ (એલ્ડોલ) બને છે, જે પછી નિર્જલીકરણથી ક્રોટોનાલ્ડિહાઇડ (CH3CH=CHCHO)માં રૂપાંતરિત થાય છે. 2-હાઇડ્રોક્સી બ્યુટેનાલ અને એસિટિક એસિડ એલ્ડોલ સંક્ષેપણના ઉત્પાદનો નથી.", "ref": "Std 12 - અભ્યાસક્રમ 16: કાર્બનિક રસાયણવિજ્ઞાન - એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "નીચેનામાંથી કયું સંયોજન આંતરઅણુ એલ્ડોલ સંક્ષેપણ દ્વારા સાયક્લોહેક્સેન-1-ઓન બનાવી શકે છે?", "opts": ["હેક્ઝાનલ", "હેક્ઝાન-2,5-ડાયોન", "પેન્ટાન-2-ઓન", "બ્યુટાનલ"], "ans": 1, "exp": "હેક્ઝાન-2,5-ડાયોનમાં બે કીટોન સમૂહો વચ્ચે α-હાઇડ્રોજન હાજર હોય છે, જે આંતરઅણુ એલ્ડોલ સંક્ષેપણ દ્વારા સાયક્લોહેક્સેન-1-ઓન બનાવી શકે છે. હેક્ઝાનલમાં માત્ર એક આલ્ડિહાઇડ સમૂહ હોય છે, પેન્ટાન-2-ઓનમાં એક કીટોન સમૂહ હોય છે, અને બ્યુટાનલમાં એક આલ્ડિહાઇડ સમૂહ હોય છે, જે આંતરઅણુ એલ્ડોલ સંક્ષેપણ માટે યોગ્ય નથી.", "ref": "Std 12 - અભ્યાસક્રમ 16: કાર્બનિક રસાયણશાસ્ત્ર - એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "એલ્ડોલ સંક્ષેપણ પ્રક્રિયામાં નીચેનામાંથી કયું વિધાન સત્ય છે જ્યારે એસિટાલ્ડિહાઇડ અને ફોર્મલ્ડિહાઇડ વચ્ચે પ્રક્રિયા થાય છે?", "opts": ["માત્ર એસિટાલ્ડિહાઇડનું આત્મ-સંક્ષેપણ થાય છે", "ફોર્મલ્ડિહાઇડમાં α-હાઇડ્રોજન ન હોવાથી માત્ર ક્રોસ-એલ્ડોલ સંક્ષેપણ થાય છે", "બંને સંયોજનોમાં આત્મ-સંક્ષેપણ થાય છે", "કોઈ પ્રક્રિયા થતી નથી"], "ans": 1, "exp": "ફોર્મલ્ડિહાઇડમાં α-હાઇડ્રોજન નથી, જેથી તે એસિટાલ્ડિહાઇડ સાથે ક્રોસ-એલ્ડોલ સંક્ષેપણ દરમિયાન માત્ર એક જ ઉત્પાદન (પેન્ટ-2-ઇનલ) આપે છે. એસિટાલ્ડિહાઇડમાં α-હાઇડ્રોજન હાજર હોય છે, પરંતુ ફોર્મલ્ડિહાઇડની હાજરીમાં આત્મ-સંક્ષેપણ થતું નથી.", "ref": "Std 12 - અભ્યાસક્રમ 16: કાર્બનિક રસાયણશાસ્ત્ર - એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "નીચેનામાંથી કયું સંયોજન એલ્ડોલ સંક્ષેપણ પ્રક્રિયામાં ભાગ લઈ શકે નહીં, કારણ કે તેના પાસે α-હાઇડ્રોજન નથી?", "opts": ["એસિટોન", "બેન્ઝાલ્ડિહાઇડ", "એસિટાલ્ડિહાઇડ", "પ્રોપાયોનાલ્ડિહાઇડ"], "ans": 1, "exp": "બેન્ઝાલ્ડિહાઇડમાં α-હાઇડ્રોજન નથી, જેથી તે એલ્ડોલ સંક્ષેપણ પ્રક્રિયામાં ભાગ લઈ શકે નહીં. એસિટોન, એસિટાલ્ડિહાઇડ અને પ્રોપાયોનાલ્ડિહાઇડમાં α-હાઇડ્રોજન હાજર હોય છે, જેથી તેઓ એલ્ડોલ સંક્ષેપણ પ્રક્રિયામાં ભાગ લઈ શકે છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: કાર્બનિક રસાયણશાસ્ત્ર - એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "એલ્ડોલ સંક્ષેપણ પ્રક્રિયામાં નીચેનામાંથી કયું ઉત્પાદન બનતું નથી જ્યારે એસિટોન અને એસિટાલ્ડિહાઇડ વચ્ચે ક્રોસ-એલ્ડોલ સંક્ષેપણ થાય છે?", "opts": ["4-હાઇડ્રોક્સી-2-પેન્ટેન", "4-હાઇડ્રોક્સી-2-હેક્ઝેન", "3-હાઇડ્રોક્સી-2-બ્યુટેન", "3-હાઇડ્રોક્સી-2-મેથાઇલપેન્ટેન"], "ans": 2, "exp": "એસિટોન અને એસિટાલ્ડિહાઇડ વચ્ચે ક્રોસ-એલ્ડોલ સંક્ષેપણ દરમિયાન 4-હાઇડ્રોક્સી-2-પેન્ટેન બને છે. 4-હાઇડ્રોક્સી-2-હેક્ઝેન એસિટાલ્ડિહાઇડના આત્મ-સંક્ષેપણ દરમિયાન બને છે, 3-હાઇડ્રોક્સી-2-બ્યુટેન એસિટોનના આત્મ-સંક્ષેપણ દરમિયાન બને છે, અને 3-હાઇડ્રોક્સી-2-મેથાઇલપેન્ટેન એસિટોન અને પ્રોપાયોનાલ્ડિહાઇડ વચ્ચે ક્રોસ-એલ્ડોલ સંક્ષેપણ દરમિયાન બને છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: કાર્બનિક રસાયણશાસ્ત્ર - એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "નીચેના સંયોજનોમાંથી કયું સંયોજન એલ્ડોલ સંક્ષેપણ પ્રક્રિયા દરમિયાન સૌથી વધુ સ્થિર β-હાઇડ્રોક્સી કાર્બોનિલ સંયોજન ઉત્પન્ન કરશે, પરંતુ તેનું નિર્જલીકરણ થઈને α,β-અસંતૃપ્ત કાર્બોનિલ સંયોજન બનવાની સંભાવના સૌથી ઓછી હશે?", "opts": ["CH₃CHO (એસિટાલ્ડિહાઇડ)", "C₆H₅CHO (બેન્ઝાલ્ડિહાઇડ)", "(CH₃)₂CHCHO (આઇસોબ્યુટિરાલ્ડિહાઇડ)", "CH₃CH₂CHO (પ્રોપિયોનાલ્ડિહાઇડ)"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C) (CH₃)₂CHCHO (આઇસોબ્યુટિરાલ્ડિહાઇડ) છે. આ સંયોજનમાં α-હાઇડ્રોજન હાજર હોવાથી એલ્ડોલ સંક્ષેપણ પ્રક્રિયા થઈ શકે છે અને β-હાઇડ્રોક્સી કાર્બોનિલ સંયોજન ઉત્પન્ન થશે. પરંતુ આ સંયોજનમાં β-કાર્બન પર બે મિથાઇલ સમૂહો હોવાથી નિર્જલીકરણ દરમિયાન બનતું α,β-અસંતૃપ્ત કાર્બોનિલ સંયોજન સ્ટેરિક અવરોધને કારણે ઓછું સ્થિર હશે, તેથી નિર્જલીકરણની સંભાવના ઓછી હશે.\n\nવિકલ્પ A) એસિટાલ્ડિહાઇડમાં α-હાઇડ્રોજન હોવાથી એલ્ડોલ સંક્ષેપણ થશે અને નિર્જલીકરણ પણ સરળતાથી થશે.\n\nવિકલ્પ B) બેન્ઝાલ્ડિહાઇડમાં α-હાઇડ્રોજન ન હોવાથી એલ્ડોલ સંક્ષેપણ પ્રક્રિયા થઈ શકશે નહીં.\n\nવિકલ્પ D) પ્રોપિયોનાલ્ડિહાઇડમાં α-હાઇડ્રોજન હોવાથી એલ્ડોલ સંક્ષેપણ થશે અને નિર્જલીકરણ પણ સરળતાથી થશે.", "ref": "Std 12 - પ્રકરણ 12: આલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "નીચેનામાંથી કયું સંયોજન ક્લેઝન સંક્ષેપણ (Claisen condensation) નહીં પરંતુ એલ્ડોલ સંક્ષેપણ આપી શકે છે?", "opts": ["એસિટોન (CH₃COCH₃)", "એસિટિક એસિડ (CH₃COOH)", "એથાઇલ એસિટેટ (CH₃COOC₂H₅)", "બેન્ઝોફિનોન (C₆H₅COC₆H₅)"], "ans": 0, "exp": "એસિટોન (CH₃COCH₃) પાસે α-હાઇડ્રોજન હોવાથી એલ્ડોલ સંક્ષેપણ આપી શકે છે, પરંતુ ક્લેઝન સંક્ષેપણ માટે એસ્ટર સમૂહ જરૂરી હોય છે. એસિટિક એસિડ અને એથાઇલ એસિટેટ ક્લેઝન સંક્ષેપણ આપી શકે છે. બેન્ઝોફિનોન પાસે α-હાઇડ્રોજન ન હોવાથી એલ્ડોલ સંક્ષેપણ નથી આપી શકતું.", "ref": "Std 12 - Chapter 12: કાર્બનિક રસાયણશાસ્ત્ર - એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "એલ્ડોલ સંક્ષેપણ પ્રક્રિયામાં, જ્યારે ફોર્મલ્ડિહાઇડ (HCHO) અને એસિટોન (CH₃COCH₃) વચ્ચે પ્રક્રિયા થાય છે, ત્યારે નીચેનામાંથી કયું ઉત્પાદન બને છે?", "opts": ["CH₃CH(OH)CH₂CHO", "(CH₃)₂C(OH)CH₂CHO", "CH₂=CHCHO", "(CH₃)₂C=CHCHO"], "ans": 1, "exp": "ફોર્મલ્ડિહાઇડમાં કોઈ α-હાઇડ્રોજન ન હોવાથી, એસિટોનના α-હાઇડ્રોજન દ્વારા એલ્ડોલ સંક્ષેપણ થાય છે, જેમાં એસિટોનનો કાર્બન ફોર્મલ્ડિહાઇડના કાર્બોનીલ કાર્બન સાથે જોડાય છે. આથી ઉત્પાદન (CH₃)₂C(OH)CH₂CHO બને છે. બાકીના વિકલ્પો અશુદ્ધ સંરચનાઓ અથવા અપૂર્ણ પ્રક્રિયાના પરિણામો છે.", "ref": "Std 12 - Chapter 12: કાર્બનિક રસાયણશાસ્ત્ર - એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન એલ્ડોલ સંક્ષેપણ પ્રક્રિયા માટે ખોટું છે જ્યારે એસિટાલ્ડિહાઇડ (CH₃CHO) અને પ્રોપાયોનાલ્ડિહાઇડ (CH₃CH₂CHO) વચ્ચે ક્રોસ-એલ્ડોલ સંક્ષેપણ થાય છે?", "opts": ["એસિટાલ્ડિહાઇડના α-હાઇડ્રોજન પ્રોપાયોનાલ્ડિહાઇડના કાર્બોનીલ કાર્બન પર હુમલો કરે છે.", "પ્રોપાયોનાલ્ડિહાઇડના α-હાઇડ્રોજન એસિટાલ્ડિહાઇડના કાર્બોનીલ કાર્બન પર હુમલો કરે છે.", "ઉત્પાદન તરીકે CH₃CH(OH)CH₂CH₂CHO બને છે.", "ઉત્પાદન તરીકે CH₃CH=CHCH₂CHO બને છે."], "ans": 3, "exp": "ક્રોસ-એલ્ડોલ સંક્ષેપણમાં, એસિટાલ્ડિહાઇડના α-હાઇડ્રોજન પ્રોપાયોનાલ્ડિહાઇડના કાર્બોનીલ કાર્બન પર હુમલો કરે છે, જેથી ઉત્પાદન CH₃CH(OH)CH₂CH₂CHO બને છે. વિકલ્પ D મુજબનું ઉત્પાદન નિર્જલીકરણ પગલા પછી જ બનશે, પરંતુ પ્રશ્નમાં નિર્જલીકરણનો ઉલ્લેખ નથી.", "ref": "Std 12 - Chapter 12: કાર્બનિક રસાયણશાસ્ત્ર - એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "એલ્ડોલ સંક્ષેપણ પ્રક્રિયામાં, જ્યારે ૫-હેક્સેન-૨-ઓન (CH₃COCH₂CH₂CH=CH₂) આંતરઅણુ એલ્ડોલ સંક્ષેપણ આપે છે, ત્યારે નીચેનામાંથી કયું ઉત્પાદન બને છે?", "opts": ["૫-મેથિલસાયક્લોહેક્સ-૨-એન-ુ-ઓન", "૨-મેથિલસાયક્લોહેક્સ-૨-એન-ુ-ઓન", "સાયક્લોહેક્સ-૨-એન-ુ-ઓન", "૬-મેથિલસાયક્લોહેક્સ-૨-એન-ુ-ઓન"], "ans": 2, "exp": "૫-હેક્સેન-૨-ઓનમાં, કીટોન સમૂહ અને ડબલ બોન્ડ વચ્ચેના કાર્બન પર α-હાઇડ્રોજન હોવાથી, આંતરઅણુ એલ્ડોલ સંક્ષેપણ થાય છે, જેમાં ૬-કાર્બન વલય બને છે. પરિણામે સાયક્લોહેક્સ-૨-એન-ુ-ઓન બને છે. બાકીના વિકલ્પો અશુદ્ધ સંરચનાઓ છે.", "ref": "Std 12 - Chapter 12: કાર્બનિક રસાયણશાસ્ત્ર - એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "નીચેના પૈકી કયું સંયોજન એલ્ડોલ સંક્ષેપણ પ્રક્રિયામાં ભાગ લઈ શકે છે, પરંતુ તેની પ્રક્રિયા દરમિયાન નિર્જલીકરણ પગલું શક્ય નથી અને તેથી α,β-અસંતૃપ્ત કાર્બોનિલ સંયોજન ઉત્પન્ન થતું નથી?", "opts": ["ફિનાઇલ એસિટાલ્ડિહાઇડ (C₆H₅CH₂CHO)", "ટ્રાયમેથાઇલ એસિટાલ્ડિહાઇડ ((CH₃)₃CCHO)", "૩-મિથાઇલ બ્યુટેનાલ ((CH₃)₂CHCH₂CHO)", "૨-મિથાઇલ પ્રોપેનાલ ((CH₃)₂CHCHO)"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C) ૩-મિથાઇલ બ્યુટેનાલ ((CH₃)₂CHCH₂CHO) છે. આ સંયોજનમાં α-હાઇડ્રોજન હાજર છે, તેથી તે એલ્ડોલ સંક્ષેપણ પ્રક્રિયામાં ભાગ લઈ શકે છે. પરંતુ, નિર્જલીકરણ પગલું શક્ય નથી કારણ કે β-કાર્બન પર હાઇડ્રોજન હાજર નથી, જે નિર્જલીકરણ માટે જરૂરી છે. તેથી α,β-અસંતૃપ્ત કાર્બોનિલ સંયોજન બનતું નથી.\n\nવિકલ્પ A) ફિનાઇલ એસિટાલ્ડિહાઇડમાં α-હાઇડ્રોજન હાજર છે અને નિર્જલીકરણ શક્ય છે, તેથી તે α,β-અસંતૃપ્ત કાર્બોનિલ સંયોજન ઉત્પન્ન કરે છે.\n\nવિકલ્પ B) ટ્રાયમેથાઇલ એસિટાલ્ડિહાઇડમાં α-હાઇડ્રોજન હાજર નથી, તેથી તે એલ્ડોલ સંક્ષેપણ પ્રક્રિયામાં ભાગ લઈ શકતું નથી.\n\nવિકલ્પ D) ૨-મિથાઇલ પ્રોપેનાલમાં α-હાઇડ્રોજન હાજર નથી, તેથી તે પણ એલ્ડોલ સંક્ષેપણ પ્રક્રિયામાં ભાગ લઈ શકતું નથી.", "ref": "Std 12 - પ્રકરણ 12: આલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
