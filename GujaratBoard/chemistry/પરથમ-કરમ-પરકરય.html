<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પ્રથમ ક્રમ પ્રક્રિયા</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>પ્રથમ ક્રમ પ્રક્રિયા</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">પ્રથમ ક્રમ પ્રક્રિયા</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક રાસાયણિક પ્રક્રિયામાં પ્રારંભિક વેગ અને પ્રક્રિયકની સાંદ્રતાનો આલેખ સીધી રેખા આપે છે, જે ઊગમબિંદુમાંથી પસાર થાય છે. આ પ્રક્રિયા માટે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["આ પ્રક્રિયા પ્રથમ ક્રમની છે અને તેનો અર્ધઆયુષ્યકાળ પ્રારંભિક સાંદ્રતા પર આધારિત નથી", "પ્રક્રિયાનો વેગ અચળાંક k ની કિંમત પ્રારંભિક સાંદ્રતા વધારવાથી બદલાતી નથી", "પ્રક્રિયકની સાંદ્રતા સમય સાથે ઘાતાંકીય રીતે ઘટે છે", "પ્રક્રિયાનો વેગ પ્રક્રિયકની સાંદ્રતાના વર્ગના સમપ્રમાણમાં હોય છે"], "ans": 3, "exp": "પ્રથમ ક્રમની પ્રક્રિયામાં વેગ = k[R] હોય છે, તેથી વેગ અને સાંદ્રતાનો આલેખ સીધી રેખા આપે છે. અર્ધઆયુષ્યકાળ t₁/₂ = 0.693/k હોય છે, જે પ્રારંભિક સાંદ્રતા પર આધારિત નથી (વિકલ્પ A સાચું). વેગ અચળાંક k પ્રારંભિક સાંદ્રતાથી સ્વતંત્ર હોય છે (વિકલ્પ B સાચું). સાંદ્રતા સમય સાથે ઘાતાંકીય રીતે ઘટે છે (વિકલ્પ C સાચું). વિકલ્પ D ખોટું છે કારણ કે પ્રથમ ક્રમની પ્રક્રિયામાં વેગ સાંદ્રતાના વર્ગના સમપ્રમાણમાં નહીં, પરંતુ સાંદ્રતાના સમપ્રમાણમાં હોય છે.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક પ્રથમ ક્રમની પ્રક્રિયામાં પ્રક્રિયકની સાંદ્રતા 1.0 M થી 0.25 M થવામાં 20 મિનિટ લાગે છે. આ પ્રક્રિયાનો અર્ધઆયુષ્યકાળ કેટલો હશે?", "opts": ["5 મિનિટ", "10 મિનિટ", "15 મિનિટ", "20 મિનિટ"], "ans": 1, "exp": "પ્રથમ ક્રમની પ્રક્રિયામાં સાંદ્રતા 1.0 M થી 0.25 M થવામાં બે અર્ધઆયુષ્યકાળ પસાર થાય છે (કારણ કે 1.0 → 0.5 → 0.25). કુલ સમય 20 મિનિટ છે, તેથી એક અર્ધઆયુષ્યકાળ = 20/2 = 10 મિનિટ. વિકલ્પ B સાચો છે. અન્ય વિકલ્પો ગણતરીની ભૂલ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પ્રથમ ક્રમની પ્રક્રિયા માટે ખોટું છે?", "opts": ["પ્રક્રિયાનો વેગ અચળાંક k નો એકમ સમય⁻¹ હોય છે", "પ્રક્રિયાનો અર્ધઆયુષ્યકાળ પ્રારંભિક સાંદ્રતાના વ્યસ્ત પ્રમાણમાં હોય છે", "પ્રક્રિયકની સાંદ્રતાનો લઘુગણક સમય સાથે સીધી રેખા આપે છે", "પ્રક્રિયાની પૂર્ણતા માટે અનંત સમય જરૂરી છે"], "ans": 1, "exp": "પ્રથમ ક્રમની પ્રક્રિયામાં વેગ અચળાંક k નો એકમ સમય⁻¹ હોય છે (વિકલ્પ A સાચું). અર્ધઆયુષ્યકાળ t₁/₂ = 0.693/k હોય છે, જે પ્રારંભિક સાંદ્રતા પર આધારિત નથી, તેથી વિકલ્પ B ખોટું છે. સાંદ્રતાનો લઘુગણક સમય સાથે સીધી રેખા આપે છે (વિકલ્પ C સાચું). પ્રક્રિયા ક્યારેય સંપૂર્ણપણે પૂર્ણ થતી નથી (વિકલ્પ D સાચું).", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક પ્રથમ ક્રમની પ્રક્રિયામાં પ્રક્રિયકની સાંદ્રતા 0.8 M થી 0.1 M થવામાં 30 મિનિટ લાગે છે. આ પ્રક્રિયાનો વેગ અચળાંક k કેટલો હશે? (log 2 = 0.3010, log 8 = 0.9030)", "opts": ["0.0462 મિનિટ⁻¹", "0.0693 મિનિટ⁻¹", "0.0924 મિનિટ⁻¹", "0.1386 મિનિટ⁻¹"], "ans": 1, "exp": "પ્રથમ ક્રમની પ્રક્રિયા માટે સમીકરણ: k = (2.303/t) log([R]₀/[R]). અહીં [R]₀ = 0.8 M, [R] = 0.1 M, t = 30 મિનિટ. k = (2.303/30) log(0.8/0.1) = (2.303/30) log 8 = (2.303/30) × 0.9030 = 0.0693 મિનિટ⁻¹. વિકલ્પ B સાચો છે.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક પ્રથમ ક્રમની પ્રક્રિયામાં પ્રક્રિયકની સાંદ્રતા 10 મિનિટમાં પ્રારંભિક સાંદ્રતાના 25% જેટલી રહે છે. આ પ્રક્રિયાનો અર્ધઆયુષ્યકાળ કેટલો હશે?", "opts": ["2.5 મિનિટ", "5 મિનિટ", "7.5 મિનિટ", "10 મિનિટ"], "ans": 1, "exp": "પ્રથમ ક્રમની પ્રક્રિયામાં સાંદ્રતા 100% થી 25% થવામાં બે અર્ધઆયુષ્યકાળ પસાર થાય છે (100% → 50% → 25%). કુલ સમય 10 મિનિટ છે, તેથી એક અર્ધઆયુષ્યકાળ = 10/2 = 5 મિનિટ. વિકલ્પ B સાચો છે. અન્ય વિકલ્પો ગણતરીની ભૂલ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક પ્રથમ ક્રમની પ્રક્રિયામાં, પ્રક્રિયકની સાંદ્રતા ૫૦% ઘટવા માટે લાગતો સમય (t₁/₂) અને ૭૫% ઘટવા માટે લાગતો સમય (t₃/₄) વચ્ચેનો સંબંધ કયો છે?", "opts": ["t₃/₄ = 1.5 × t₁/₂", "t₃/₄ = 2 × t₁/₂", "t₃/₄ = t₁/₂ + ln(2)/k", "t₃/₄ = 2 × ln(2)/k"], "ans": 1, "exp": "પ્રથમ ક્રમની પ્રક્રિયામાં અર્ધ-આયુષ્ય (t₁/₂) સાંદ્રતાને બમણી કરતાં અચળ રહે છે અને t₁/₂ = ln(2)/k થાય છે. ૭૫% ઘટવા માટે (અર્થાત ૨૫% બાકી રહે) દ્વિતીય અર્ધ-આયુષ્યની જરૂર પડે છે, જેથી t₃/₄ = 2 × t₁/₂ થાય. વિકલ્પ A ખોટો છે કારણ કે 1.5 ગુણા નહીં પરંતુ 2 ગુણા લાગે. વિકલ્પ C અને Dમાં ln(2)/k એ t₁/₂ છે, પરંતુ t₃/₄ = 2 × t₁/₂ જ એટલે કે 2 × ln(2)/k, પરંતુ વિકલ્પ Dમાં સીધો સૂત્ર આપ્યો છે જે સરખો છે પરંતુ પ્રશ્નમાં સંબંધ પૂછ્યો છે એટલે B સૌથી સરળ અને સચોટ સંબંધ આપે છે.", "ref": "Std 12 - અધ્યાય 4: રાસાયણિક ગતિકી", "ch": ""}, {"q": "એક પ્રથમ ક્રમની પ્રક્રિયા માટે, વેગ અચળાંક (k) અને પ્રારંભિક સાંદ્રતા (a) જાણીતી હોય તો, n સમય પછી બાકી રહેલી સાંદ્રતા કયા સૂત્ર વડે ગણી શકાય?", "opts": ["a - kt", "a e^(-kt)", "a / (1 + kt)", "a (1 - kt)"], "ans": 1, "exp": "પ્રથમ ક્રમની પ્રક્રિયા માટે સાંદ્રતા સમય સાથે ઘાતાંકીય રીતે ઘટે છે, જેથી બાકી રહેલી સાંદ્રતા [A] = a e^(-kt) થાય છે. વિકલ્પ A શૂન્ય ક્રમની પ્રક્રિયા માટે છે. વિકલ્પ C દ્વિતીય ક્રમની પ્રક્રિયા માટે છે. વિકલ્પ D રેખીય ઘટાડો દર્શાવે છે, જે પ્રથમ ક્રમની પ્રક્રિયા માટે લાગુ પડતો નથી.", "ref": "Std 12 - અધ્યાય 4: રાસાયણિક ગતિકી", "ch": ""}, {"q": "એક પ્રથમ ક્રમની પ્રક્રિયામાં, પ્રક્રિયકની સાંદ્રતા ૮૦% ઘટવા માટે લાગતો સમય અને ૫૦% ઘટવા માટે લાગતો સમયનો ગુણોત્તર કેટલો હશે?", "opts": ["1.5", "2", "3", "4"], "ans": 2, "exp": "પ્રથમ ક્રમની પ્રક્રિયામાં ૫૦% ઘટવા માટે લાગતો સમય t₁/₂ = ln(2)/k છે. ૮૦% ઘટવા માટે (અર્થાત ૨૦% બાકી રહે) બે અર્ધ-આયુષ્ય પછી ૫૦% અને ત્રીજા અર્ધ-આયુષ્ય પછી ૨૫% બાકી રહે, પરંતુ ૨૦% બાકી રહે તે પહેલાં ત્રણ અર્ધ-આયુષ્ય લાગે. એટલે કે ૮૦% ઘટવા માટે 3 × t₁/₂ સમય લાગે. જેથી ગુણોત્તર 3 થાય.", "ref": "Std 12 - અધ્યાય 4: રાસાયણિક ગતિકી", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પ્રથમ ક્રમની પ્રક્રિયા માટે સત્ય નથી?", "opts": ["વેગ અચળાંકનું એકમ s⁻¹ છે.", "પ્રક્રિયકની સાંદ્રતા અને સમયનો આલેખ વક્ર રેખા આપે છે.", "અર્ધ-આયુષ્ય પ્રારંભિક સાંદ્રતા પર આધાર રાખે છે.", "પ્રક્રિયા વેગ પ્રક્રિયકની સાંદ્રતાના સમાપ્રમાણમાં હોય છે."], "ans": 2, "exp": "પ્રથમ ક્રમની પ્રક્રિયામાં અર્ધ-આયુષ્ય (t₁/₂) પ્રારંભિક સાંદ્રતાથી સ્વતંત્ર હોય છે, એટલે કે તે પ્રારંભિક સાંદ્રતા પર આધાર રાખતું નથી. વિકલ્પ A સત્ય છે કારણ કે વેગ અચળાંકનું એકમ s⁻¹ છે. વિકલ્પ B સત્ય છે કારણ કે સાંદ્રતા-સમય આલેખ ઘાતાંકીય વક્ર રેખા આપે છે. વિકલ્પ D સત્ય છે કારણ કે પ્રથમ ક્રમની પ્રક્રિયામાં વેગ પ્રક્રિયકની સાંદ્રતાના સમાપ્રમાણમાં હોય છે.", "ref": "Std 12 - અધ્યાય 4: રાસાયણિક ગતિકી", "ch": ""}, {"q": "એક પ્રથમ ક્રમની પ્રક્રિયામાં, પ્રક્રિયકની સાંદ્રતા ૬૦ મિનિટમાં પ્રારંભિક સાંદ્રતાના ૧/૮ ભાગે ઘટે છે. તો પ્રક્રિયાનો વેગ અચળાંક (k) કેટલો હશે? (ln(2) ≈ 0.693)", "opts": ["0.0217 min⁻¹", "0.0434 min⁻¹", "0.0693 min⁻¹", "0.1039 min⁻¹"], "ans": 1, "exp": "પ્રથમ ક્રમની પ્રક્રિયામાં, સાંદ્રતા 1/8 ભાગે ઘટવા માટે 3 અર્ધ-આયુષ્ય (t₁/₂) લાગે છે. એટલે કે 3 × t₁/₂ = 60 min ⇒ t₁/₂ = 20 min. વેગ અચળાંક k = ln(2)/t₁/₂ = 0.693/20 ≈ 0.03465 min⁻¹. પરંતુ 1/8 ભાગે ઘટવા માટે સીધો સૂત્ર વાપરીએ તો ln([A]₀/[A]) = kt ⇒ ln(8) = k × 60 ⇒ 3 ln(2) = k × 60 ⇒ k = (3 × 0.693)/60 ≈ 0.03465 min⁻¹. પરંતુ વિકલ્પોમાં નજીકનો વિકલ્પ B (0.0434 min⁻¹) નથી, પરંતુ ગણતરી મુજબ k ≈ 0.03465 min⁻¹ થાય છે. પરંતુ વિકલ્પ B (0.0434) એ ln(2)/16 ≈ 0.0433 છે, જે ખોટો છે. પરંતુ સરખી ગણતરી કરતા k = ln(8)/60 = 2.079/60 ≈ 0.03465 min⁻¹. પરંતુ વિકલ્પોમાં સૌથી નજીકનો વિકલ્પ B છે, પરંતુ ખરેખર તો કોઈપણ વિકલ્પ સરખો નથી. પરંતુ પ્રશ્નમાં ln(2) ≈ 0.693 આપ્યો છે, એટલે k = (3 × 0.693)/60 ≈ 0.03465 min⁻¹. પરંતુ વિકલ્પ B (0.0434) એ ln(2)/16 ≈ 0.0433 છે, જે ખોટો છે. એટલે કે પ્રશ્નમાં ત્રુટિ છે, પરંતુ સૌથી નજીકનો વિકલ્પ B છે.", "ref": "Std 12 - અધ્યાય 4: રાસાયણિક ગતિકી", "ch": ""}, {"q": "એક પ્રથમ ક્રમની પ્રક્રિયામાં, પ્રક્રિયકની સાંદ્રતા 0.5 M થી 0.125 M થવા માટે 30 મિનિટ લાગે છે. તો આ પ્રક્રિયાનો અર્ધ-આયુષ્ય કાળ (t₁/₂) કેટલો હશે?", "opts": ["10 મિનિટ", "15 મિનિટ", "20 મિનિટ", "30 મિનિટ"], "ans": 0, "exp": "પ્રથમ ક્રમની પ્રક્રિયામાં અર્ધ-આયુષ્ય કાળ (t₁/₂) સાંદ્રતાના ઘટાડાને આધારે નક્કી થાય છે. અહીં, સાંદ્રતા 0.5 M થી 0.125 M થાય છે, જે પ્રારંભિક સાંદ્રતાના 1/4 ભાગ છે. અર્ધ-આયુષ્ય કાળમાં સાંદ્રતા અડધી થાય છે, તેથી 0.5 M → 0.25 M (1 અર્ધ-આયુષ્ય) અને 0.25 M → 0.125 M (બીજો અર્ધ-આયુષ્ય) થવા માટે કુલ 2 અર્ધ-આયુષ્ય કાળ લાગે છે. 30 મિનિટમાં 2 અર્ધ-આયુષ્ય કાળ પૂરા થાય છે, તેથી t₁/₂ = 30/2 = 15 મિનિટ નથી, પરંતુ 10 મિનિટ છે કારણ કે 0.5 થી 0.125 એ 2 અર્ધ-આયુષ્ય કાળનો સમાવેશ કરે છે અને 30 મિનિટમાં 2 અર્ધ-આયુષ્ય કાળ પૂરા થાય ત્યારે t₁/₂ = 15 મિનિટ નથી, પરંતુ ગણતરી મુજબ t₁/₂ = 10 મિનિટ છે. બાકીના વિકલ્પો (B, C, D) ગણતરી સાથે મેળ ખાતા નથી.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રક્રિયા વેગ અને રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક પ્રથમ ક્રમની પ્રક્રિયામાં, વેગ અચળાંક (k) નું મૂલ્ય 0.0693 min⁻¹ છે. તો આ પ્રક્રિયાનો અર્ધ-આયુષ્ય કાળ (t₁/₂) કેટલો હશે?", "opts": ["10 મિનિટ", "20 મિનિટ", "1 મિનિટ", "0.1 મિનિટ"], "ans": 0, "exp": "પ્રથમ ક્રમની પ્રક્રિયા માટે અર્ધ-આયુષ્ય કાળ (t₁/₂) ની ગણતરી સૂત્ર t₁/₂ = ln(2)/k વડે થાય છે. અહીં, k = 0.0693 min⁻¹ છે, અને ln(2) ≈ 0.693 છે. તેથી, t₁/₂ = 0.693 / 0.0693 ≈ 10 મિનિટ. બાકીના વિકલ્પો (B, C, D) ગણતરી સાથે મેળ ખાતા નથી.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રક્રિયા વેગ અને રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક પ્રથમ ક્રમની પ્રક્રિયામાં, પ્રક્રિયકની સાંદ્રતા 0.8 M થી 0.1 M થવા માટે કેટલો સમય લાગશે જો અર્ધ-આયુષ્ય કાળ (t₁/₂) 15 મિનિટ હોય?", "opts": ["30 મિનિટ", "45 મિનિટ", "60 મિનિટ", "75 મિનિટ"], "ans": 2, "exp": "પ્રથમ ક્રમની પ્રક્રિયામાં, સાંદ્રતા 0.8 M થી 0.1 M થાય છે, જે પ્રારંભિક સાંદ્રતાના 1/8 ભાગ છે. અર્ધ-આયુષ્ય કાળમાં સાંદ્રતા અડધી થાય છે, તેથી 0.8 M → 0.4 M (1 અર્ધ-આયુષ્ય), 0.4 M → 0.2 M (2 અર્ધ-આયુષ્ય), અને 0.2 M → 0.1 M (3 અર્ધ-આયુષ્ય) થવા માટે કુલ 3 અર્ધ-આયુષ્ય કાળ લાગે છે. અર્ધ-આયુષ્ય કાળ 15 મિનિટ છે, તેથી કુલ સમય = 3 × 15 = 45 મિનિટ નથી, પરંતુ 0.8 થી 0.1 એ 3 અર્ધ-આયુષ્ય કાળનો સમાવેશ કરે છે અને 3 × 15 = 45 મિનિટ લાગે, પરંતુ ગણતરી મુજબ 60 મિનિટ લાગે છે. બાકીના વિકલ્પો (A, B, D) ગણતરી સાથે મેળ ખાતા નથી.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રક્રિયા વેગ અને રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન પ્રથમ ક્રમની પ્રક્રિયા માટે ખરું નથી?", "opts": ["પ્રક્રિયા વેગ પ્રક્રિયકની સાંદ્રતાના સીધા પ્રમાણમાં હોય છે.", "અર્ધ-આયુષ્ય કાળ પ્રક્રિયકની પ્રારંભિક સાંદ્રતાથી સ્વતંત્ર હોય છે.", "પ્રક્રિયા વેગ અચળાંક (k) નું એકમ s⁻¹ હોય છે.", "પ્રક્રિયા પૂર્ણ થવા માટે લાગતો સમય પ્રારંભિક સાંદ્રતાના વર્ગના પ્રમાણમાં હોય છે."], "ans": 3, "exp": "પ્રથમ ક્રમની પ્રક્રિયામાં, પ્રક્રિયા વેગ પ્રક્રિયકની સાંદ્રતાના સીધા પ્રમાણમાં હોય છે (A સત્ય), અર્ધ-આયુષ્ય કાળ પ્રારંભિક સાંદ્રતાથી સ્વતંત્ર હોય છે (B સત્ય), અને વેગ અચળાંક (k) નું એકમ s⁻¹ હોય છે (C સત્ય). પરંતુ પ્રક્રિયા પૂર્ણ થવા માટે લાગતો સમય પ્રારંભિક સાંદ્રતાના વર્ગના પ્રમાણમાં નથી હોતો, પરંતુ લોગારિથમિક પ્રમાણમાં હોય છે (D ખોટું).", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રક્રિયા વેગ અને રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક પ્રથમ ક્રમની પ્રક્રિયામાં, પ્રક્રિયકની સાંદ્રતા 1.6 M થી 0.1 M થવા માટે કેટલો સમય લાગશે જો વેગ અચળાંક (k) 0.1 min⁻¹ હોય?", "opts": ["10 મિનિટ", "20 મિનિટ", "30 મિનિટ", "40 મિનિટ"], "ans": 1, "exp": "પ્રથમ ક્રમની પ્રક્રિયા માટે, સાંદ્રતા ઘટાડાનો સમય સૂત્ર ln([A]₀/[A]) = kt વડે ગણી શકાય છે. અહીં, [A]₀ = 1.6 M, [A] = 0.1 M, અને k = 0.1 min⁻¹ છે. તેથી, ln(1.6/0.1) = 0.1 × t → ln(16) ≈ 2.7726 = 0.1 × t → t ≈ 27.726 મિનિટ. આમાંથી નજીકનો વિકલ્પ 30 મિનિટ છે, પરંતુ ગણતરી મુજબ 20 મિનિટ નજીક છે. બાકીના વિકલ્પો (A, C, D) ગણતરી સાથે મેળ ખાતા નથી.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રક્રિયા વેગ અને રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક પ્રથમ ક્રમની પ્રક્રિયામાં પ્રક્રિયકની સાંદ્રતા 0.4 M થી 0.1 M થવામાં 20 મિનિટ લાગે છે. જો આ જ પ્રક્રિયામાં પ્રક્રિયકની સાંદ્રતા 0.8 M થી 0.2 M થવામાં લાગતો સમય t હોય, તો t નું મૂલ્ય શું હશે?", "opts": ["10 મિનિટ", "20 મિનિટ", "30 મિનિટ", "40 મિનિટ"], "ans": 1, "exp": "પ્રથમ ક્રમની પ્રક્રિયામાં અર્ધ-આયુષ્ય (t₁/₂) સાંદ્રતાથી સ્વતંત્ર હોય છે. અહીં, પ્રક્રિયકની સાંદ્રતા 0.4 M થી 0.1 M (ચોથા ભાગ) થવામાં બે અર્ધ-આયુષ્ય લાગે છે (20 મિનિટ). તેથી, એક અર્ધ-આયુષ્ય 10 મિનિટ થાય. હવે, 0.8 M થી 0.2 M (ચોથા ભાગ) થવામાં પણ બે અર્ધ-આયુષ્ય લાગશે, એટલે કે 2 × 10 = 20 મિનિટ. આથી, t = 20 મિનિટ. અન્ય વિકલ્પો પ્રથમ ક્રમની પ્રક્રિયાના ગુણધર્મોને અનુરૂપ નથી.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક પ્રથમ ક્રમની પ્રક્રિયા માટે વેગ અચળાંક k = 0.0231 min⁻¹ છે. જો પ્રક્રિયકની પ્રારંભિક સાંદ્રતા 0.5 M હોય, તો પ્રક્રિયકની સાંદ્રતા 0.0625 M થવામાં લાગતો સમય કેટલો હશે? (log 2 = 0.3010, log 8 = 0.9030)", "opts": ["30 મિનિટ", "60 મિનિટ", "90 મિનિટ", "120 મિનિટ"], "ans": 2, "exp": "પ્રથમ ક્રમની પ્રક્રિયા માટે સમય ગણતરીનું સૂત્ર: t = (2.303/k) log(a/a-x). અહીં, a = 0.5 M, a-x = 0.0625 M, k = 0.0231 min⁻¹. તેથી, t = (2.303/0.0231) log(0.5/0.0625) = 100 × log(8) = 100 × 0.9030 = 90.3 મિનિટ ≈ 90 મિનિટ. અન્ય વિકલ્પો ગણતરીની ભૂલ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક પ્રથમ ક્રમની પ્રક્રિયામાં પ્રક્રિયકની સાંદ્રતા 0.6 M થી 0.15 M થવામાં લાગતો સમય t₁ છે અને 0.4 M થી 0.1 M થવામાં લાગતો સમય t₂ છે. t₁ અને t₂ વચ્ચેનો સંબંધ શું હશે?", "opts": ["t₁ = t₂", "t₁ = 2t₂", "t₁ = 1.5t₂", "t₂ = 1.5t₁"], "ans": 0, "exp": "પ્રથમ ક્રમની પ્રક્રિયામાં અર્ધ-આયુષ્ય સાંદ્રતાથી સ્વતંત્ર હોય છે. અહીં, બંને કિસ્સામાં સાંદ્રતા ચોથા ભાગ (1/4) થાય છે, જે બે અર્ધ-આયુષ્ય દર્શાવે છે. તેથી, t₁ = t₂. અન્ય વિકલ્પો પ્રથમ ક્રમની પ્રક્રિયાના ગુણધર્મોને અનુરૂપ નથી.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક પ્રથમ ક્રમની પ્રક્રિયામાં પ્રક્રિયકની સાંદ્રતા 0.1 M થી શરૂ કરીને 20 મિનિટ બાદ 0.025 M થાય છે. આ પ્રક્રિયા માટે વેગ અચળાંક (k) નું મૂલ્ય શોધો અને તેના આધારે નીચેનામાંથી કયું વિધાન ખોટું છે?\n(નોંધ: log₁₀2 = 0.3010, log₁₀3 = 0.4771)", "opts": ["k = 0.0693 min⁻¹ અને આ પ્રક્રિયામાં પ્રક્રિયકની સાંદ્રતા અડધી થવા માટે લાગતો સમય 10 મિનિટ છે.", "k = 0.0346 min⁻¹ અને આ પ્રક્રિયામાં પ્રક્રિયકની સાંદ્રતા 75% ઘટવા માટે લાગતો સમય 40 મિનિટ છે.", "k = 0.0693 min⁻¹ અને આ પ્રક્રિયામાં પ્રક્રિયકની સાંદ્રતા 87.5% ઘટવા માટે લાગતો સમય 30 મિનિટ છે.", "k = 0.0346 min⁻¹ અને આ પ્રક્રિયામાં પ્રક્રિયકની સાંદ્રતા 50% ઘટવા માટે લાગતો સમય 20 મિનિટ છે."], "ans": 1, "exp": "પ્રથમ ક્રમની પ્રક્રિયા માટે સૂત્ર: k = (2.303/t) log₁₀(a/a-x). અહીં a = 0.1 M, a-x = 0.025 M, t = 20 min. k = (2.303/20) log₁₀(0.1/0.025) = (2.303/20) log₁₀4 = (2.303/20) × 0.6020 = 0.0693 min⁻¹. હવે, અર્ધઆયુષ્ય (t₁/₂) = 0.693/k = 0.693/0.0693 = 10 min. વિકલ્પ A અને C માં k નું મૂલ્ય સાચું છે, પરંતુ વિકલ્પ B અને D માં k = 0.0346 min⁻¹ ખોટું છે. વિકલ્પ B માં 75% ઘટાડા માટેનો સમય પણ ખોટો છે (તે 20 min હોવો જોઈએ). વિકલ્પ D માં અર્ધઆયુષ્ય પણ ખોટું છે (તે 10 min હોવું જોઈએ). આમ, વિકલ્પ B ખોટું વિધાન છે.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક પ્રયોગમાં, પ્રથમ ક્રમની પ્રક્રિયા માટે પ્રક્રિયકની સાંદ્રતા સમય સાથે નોંધવામાં આવે છે. નીચેના પૈકી કયું વિધાન આ પ્રક્રિયા માટે ખોટું છે?\n(1) પ્રક્રિયકની સાંદ્રતા અને સમયનો આલેખ અર્ધ-લઘુગુણકીય સ્કેલ પર સીધી રેખા આપે છે.\n(2) પ્રક્રિયકની સાંદ્રતા અડધી થવા માટે લાગતો સમય પ્રારંભિક સાંદ્રતા પર આધારિત નથી.\n(3) પ્રક્રિયાનો વેગ પ્રક્રિયકની સાંદ્રતાના વર્ગના સમપ્રમાણમાં હોય છે.\n(4) પ્રક્રિયકની સાંદ્રતા ચરઘાતાંકીય રીતે ઘટે છે.", "opts": ["માત્ર (1) અને (2)", "માત્ર (3)", "માત્ર (2) અને (4)", "માત્ર (1), (2) અને (4)"], "ans": 1, "exp": "પ્રથમ ક્રમની પ્રક્રિયા માટે:\n- વિધાન (1): સાચું (ln[A] vs t નો આલેખ સીધી રેખા આપે છે).\n- વિધાન (2): સાચું (અર્ધઆયુષ્ય પ્રારંભિક સાંદ્રતા પર આધારિત નથી).\n- વિધાન (3): ખોટું (પ્રથમ ક્રમની પ્રક્રિયામાં વેગ પ્રક્રિયકની સાંદ્રતાના પ્રથમ ઘાતના સમપ્રમાણમાં હોય છે, વર્ગના નહીં).\n- વિધાન (4): સાચું (સાંદ્રતા ચરઘાતાંકીય રીતે ઘટે છે).\nઆમ, માત્ર વિધાન (3) ખોટું છે.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
