<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ફિશર એસ્ટરીફિકેશન</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ફિશર એસ્ટરીફિકેશન</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ફિશર એસ્ટરીફિકેશન</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયામાં, કયો ઉત્સેચક કાર્બોક્સિલિક એસિડ અને આલ્કોહોલ વચ્ચેની પ્રતિક્રિયાને ઉત્તેજિત કરે છે?", "opts": ["લાઇપેઝ", "એસ્ટરેઝ", "એમાઇલેઝ", "કેટલેઝ"], "ans": 0, "exp": "ફિશર એસ્ટરીફિકેશનમાં લાઇપેઝ ઉત્સેચક કાર્બોક્સિલિક એસિડ અને આલ્કોહોલ વચ્ચે એસ્ટર બંધ રચવામાં મદદ કરે છે. એસ્ટરેઝ એસ્ટરના જળવિભાજન માટે જવાબદાર છે, એમાઇલેઝ કાર્બોદિતના વિઘટનમાં કામ કરે છે, અને કેટલેઝ હાઇડ્રોજન પેરોક્સાઇડના વિઘટનમાં કામ કરે છે.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રકરણ ૧૨: એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયા માટે કયું કહેવું ખોટું છે?", "opts": ["તે એક સંતુલન પ્રક્રિયા છે.", "તે એસિડ ઉત્પ્રેરકની હાજરીમાં થાય છે.", "તે ઉષ્માશોષી પ્રક્રિયા છે.", "તે એસ્ટર અને પાણીનું ઉત્પાદન કરે છે."], "ans": 2, "exp": "ફિશર એસ્ટરીફિકેશન એક ઉષ્માક્ષેપી (exothermic) પ્રક્રિયા છે, ન કે ઉષ્માશોષી. તે સંતુલન પ્રક્રિયા છે, એસિડ ઉત્પ્રેરકની હાજરીમાં થાય છે, અને એસ્ટર અને પાણીનું ઉત્પાદન કરે છે.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રકરણ ૧૨: એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયામાં, કયો પરિબળ એસ્ટરના પ્રમાણને વધારી શકે છે?", "opts": ["પાણીનું પ્રમાણ વધારવું", "આલ્કોહોલનું પ્રમાણ વધારવું", "એસિડ ઉત્પ્રેરકનું પ્રમાણ ઘટાડવું", "તાપમાન ઘટાડવું"], "ans": 1, "exp": "ફિશર એસ્ટરીફિકેશન એક સંતુલન પ્રક્રિયા છે. લેખના ચલન (Le Chatelier's principle) અનુસાર, આલ્કોહોલનું પ્રમાણ વધારવાથી એસ્ટરના પ્રમાણમાં વધારો થાય છે. પાણીનું પ્રમાણ વધારવાથી, એસિડ ઉત્પ્રેરક ઘટાડવાથી, અને તાપમાન ઘટાડવાથી એસ્ટરના પ્રમાણમાં ઘટાડો થાય છે.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રકરણ ૭: સંતુલન", "ch": ""}, {"q": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયામાં, કયો આલ્કોહોલ સૌથી વધુ પ્રતિક્રિયાશીલ છે?", "opts": ["મિથેનોલ", "ઇથેનોલ", "ટર્શિયરી બ્યુટેનોલ", "પ્રાઇમરી બ્યુટેનોલ"], "ans": 0, "exp": "ફિશર એસ્ટરીફિકેશનમાં, પ્રાઇમરી આલ્કોહોલ (જેમ કે મિથેનોલ) સૌથી વધુ પ્રતિક્રિયાશીલ હોય છે કારણ કે તેની આસપાસ કોઈ સ્ટેરિક અવરોધ નથી. ટર્શિયરી બ્યુટેનોલ સૌથી ઓછો પ્રતિક્રિયાશીલ હોય છે કારણ કે સ્ટેરિક અવરોધના કારણે.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રકરણ ૧૨: એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયામાં, કયો એસિડ ઉત્પ્રેરક સૌથી વધુ ઉપયોગમાં લેવાય છે?", "opts": ["હાઇડ્રોક્લોરિક એસિડ", "સલ્ફ્યુરિક એસિડ", "નાઇટ્રિક એસિડ", "એસિટિક એસિડ"], "ans": 1, "exp": "ફિશર એસ્ટરીફિકેશનમાં, સલ્ફ્યુરિક એસિડ સૌથી વધુ ઉપયોગમાં લેવાય છે કારણ કે તે એક મજબૂત એસિડ ઉત્પ્રેરક છે અને પ્રક્રિયાને ઉત્તેજિત કરવા માટે યોગ્ય છે. હાઇડ્રોક્લોરિક એસિડ અને નાઇટ્રિક એસિડ પણ એસિડ ઉત્પ્રેરક તરીકે કામ કરે છે, પરંતુ સલ્ફ્યુરિક એસિડ વધુ સામાન્ય છે. એસિટિક એસિડ એક કાર્બોક્સિલિક એસિડ છે અને ઉત્પ્રેરક તરીકે કામ કરતું નથી.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રકરણ ૧૨: એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયામાં, જ્યારે એસિટિક એસિડ અને એથેનોલની પ્રતિક્રિયા થાય છે, ત્યારે નીચેનામાંથી કયો પદાર્થ બાયપ્રોડક્ટ તરીકે ઉત્પન્ન થાય છે?", "opts": ["જલ (H₂O)", "હાઇડ્રોજન ગેસ (H₂)", "કાર્બન ડાયોક્સાઇડ (CO₂)", "મિથેન (CH₄)"], "ans": 0, "exp": "ફિશર એસ્ટરીફિકેશન એ કોન્ડેન્સેશન પ્રક્રિયા છે, જેમાં કાર્બોક્સિલિક એસિડ અને આલ્કોહોલ વચ્ચે પ્રતિક્રિયા થઈ એસ્ટર અને જલ (H₂O) ઉત્પન્ન થાય છે. એસિટિક એસિડ અને એથેનોલની પ્રતિક્રિયામાં એથાઇલ એસિટેટ (એસ્ટર) અને જલ બાયપ્રોડક્ટ તરીકે મળે છે. હાઇડ્રોજન ગેસ, કાર્બન ડાયોક્સાઇડ, અને મિથેન આ પ્રક્રિયાના બાયપ્રોડક્ટ નથી.", "ref": "Std 12 - અભ્યાસક્રમ 16: કાર્બનિક રસાયણશાસ્ત્ર - એસ્ટર અને તેની પ્રક્રિયાઓ", "ch": ""}, {"q": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયામાં, નીચેનામાંથી કયો પરિબળ એસ્ટરના પ્રમાણને ઘટાડી શકે છે?", "opts": ["પ્રતિક્રિયામાં પાણીનો ઉમેરો", "ઉત્સેચકનો ઉપયોગ", "ઉચ્ચ તાપમાન", "એસિડ ઉત્પ્રેરકનો ઉપયોગ"], "ans": 0, "exp": "ફિશર એસ્ટરીફિકેશન એ સંતુલન પ્રક્રિયા છે. લેચાટેલિયરના સિદ્ધાંત અનુસાર, જ્યારે પ્રતિક્રિયામાં પાણીનો ઉમેરો કરવામાં આવે છે, ત્યારે સંતુલન એસ્ટરના હાઇડ્રોલિસિસ તરફ વળે છે, જેથી એસ્ટરના પ્રમાણમાં ઘટાડો થાય છે. ઉત્સેચક, ઉચ્ચ તાપમાન, અને એસિડ ઉત્પ્રેરકનો ઉપયોગ એસ્ટરના પ્રમાણને વધારી શકે છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: કાર્બનિક રસાયણશાસ્ત્ર - રાસાયણિક સંતુલન અને લેચાટેલિયરનો સિદ્ધાંત", "ch": ""}, {"q": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયામાં, નીચેનામાંથી કયો એસિડ એસ્ટરીફિકેશન માટે સૌથી ઓછો પ્રતિક્રિયાશીલ છે?", "opts": ["એસિટિક એસિડ (CH₃COOH)", "ફોર્મિક એસિડ (HCOOH)", "બેન્ઝોઇક એસિડ (C₆H₅COOH)", "ઓક્ઝેલિક એસિડ (COOH)₂"], "ans": 3, "exp": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયામાં, એસિડની પ્રતિક્રિયાશીલતા તેના કાર્બોક્સિલ સમૂહની સક્રિયતા પર આધારિત છે. ઓક્ઝેલિક એસિડ (COOH)₂માં બે કાર્બોક્સિલ સમૂહો હોવાથી, તેની સક્રિયતા ઓછી હોય છે અને તે એસ્ટરીફિકેશન માટે સૌથી ઓછો પ્રતિક્રિયાશીલ છે. એસિટિક એસિડ, ફોર્મિક એસિડ, અને બેન્ઝોઇક એસિડ વધુ પ્રતિક્રિયાશીલ છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: કાર્બનિક રસાયણશાસ્ત્ર - કાર્બોક્સિલિક એસિડ અને તેની પ્રક્રિયાઓ", "ch": ""}, {"q": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયામાં, નીચેનામાંથી કયો આલ્કોહોલ એસ્ટરીફિકેશન માટે સૌથી ઓછો પ્રતિક્રિયાશીલ છે?", "opts": ["મિથેનોલ (CH₃OH)", "એથેનોલ (C₂H₅OH)", "ટર્શિયરી બ્યુટેનોલ ((CH₃)₃COH)", "પ્રોપેનોલ (C₃H₇OH)"], "ans": 2, "exp": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયામાં, આલ્કોહોલની પ્રતિક્રિયાશીલતા તેની સ્ટેરિક હેંડરન્સ પર આધારિત છે. ટર્શિયરી બ્યુટેનોલ ((CH₃)₃COH)માં સ્ટેરિક હેંડરન્સ સૌથી વધુ હોવાથી, તે એસ્ટરીફિકેશન માટે સૌથી ઓછો પ્રતિક્રિયાશીલ છે. મિથેનોલ, એથેનોલ, અને પ્રોપેનોલ વધુ પ્રતિક્રિયાશીલ છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: કાર્બનિક રસાયણશાસ્ત્ર - આલ્કોહોલ અને તેની પ્રક્રિયાઓ", "ch": ""}, {"q": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયામાં, નીચેનામાંથી કયો ઉત્સેચક એસ્ટરની હાઇડ્રોલિસિસ પ્રક્રિયાને ઉત્તેજિત કરે છે?", "opts": ["લાઇપેઝ", "એમાઇલેઝ", "પ્રોટીએઝ", "કેટલેઝ"], "ans": 0, "exp": "લાઇપેઝ ઉત્સેચક એસ્ટરના હાઇડ્રોલિસિસને ઉત્તેજિત કરે છે, જેમાં એસ્ટર અને પાણીની પ્રતિક્રિયાથી કાર્બોક્સિલિક એસિડ અને આલ્કોહોલ ઉત્પન્ન થાય છે. એમાઇલેઝ કાર્બોદિતના હાઇડ્રોલિસિસને, પ્રોટીએઝ પ્રોટીનના હાઇડ્રોલિસિસને, અને કેટલેઝ હાઇડ્રોજન પેરોક્સાઇડના વિઘટનને ઉત્તેજિત કરે છે.", "ref": "Std 12 - અભ્યાસક્રમ 15: જૈવ-રસાયણશાસ્ત્ર - ઉત્સેચક અને તેની ક્રિયા", "ch": ""}, {"q": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયામાં, જો એસિટિક એસિડ અને ટર્શિયરી આલ્કોહોલ (જેવા કે 2-મિથાઇલ-2-પ્રોપેનોલ) વચ્ચે પ્રતિક્રિયા કરાવવામાં આવે, તો શું થશે?", "opts": ["એસ્ટર બનશે, પરંતુ પ્રતિક્રિયા ખૂબ ધીમી થશે.", "એસ્ટર બનશે નહીં, કારણ કે ટર્શિયરી આલ્કોહોલમાં સ્ટેરિક અવરોધ વધુ હોય છે.", "એસ્ટર બનશે, પરંતુ પ્રતિક્રિયા ઉલટી દિશામાં (હાઇડ્રોલિસિસ) વધુ પસંદ કરશે.", "એસ્ટર બનશે, પરંતુ પ્રતિક્રિયામાં ઉત્સેચકની જરૂર પડશે."], "ans": 1, "exp": "ટર્શિયરી આલ્કોહોલમાં, હાઇડ્રોક્સિલ સમૂહ સાથે જોડાયેલા કાર્બન પર ત્રણ આલ્કાઇલ સમૂહો હોય છે, જે સ્ટેરિક અવરોધ ઉભો કરે છે. આ કારણે ન્યુક્લિયોફિલિક એટેક થઈ શકતું નથી, અને એસ્ટર બનતું નથી. અ) ખોટું છે કારણ કે પ્રતિક્રિયા થતી જ નથી. સ) ખોટું છે કારણ કે પ્રતિક્રિયા જ થતી નથી, એટલે ઉલટી દિશાની વાત જ અસંગત છે. ડ) ખોટું છે કારણ કે ઉત્સેચકની હાજરીએ પણ સ્ટેરિક અવરોધ દૂર થતો નથી.", "ref": "Std 12 - અભ્યાસક્રમ: કાર્બનિક રસાયણશાસ્ત્ર - એસ્ટર અને તેમનું નિર્માણ", "ch": ""}, {"q": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયામાં, જો એસિટિક એસિડ અને એથેનોલની પ્રતિક્રિયા સંપૂર્ણ રીતે પાણી મુક્ત વાતાવરણમાં કરવામાં આવે, તો શું થશે?", "opts": ["પ્રતિક્રિયા સંપૂર્ણ રીતે એસ્ટર તરફ વળશે.", "પ્રતિક્રિયા સંતુલનમાં રહેશે, પરંતુ એસ્ટરનું પ્રમાણ વધશે.", "પ્રતિક્રિયા ઉલટી દિશામાં (હાઇડ્રોલિસિસ) વધુ પસંદ કરશે.", "પ્રતિક્રિયા થશે નહીં, કારણ કે પાણીની હાજરી જરૂરી છે."], "ans": 1, "exp": "ફિશર એસ્ટરીફિકેશન એક સંતુલન પ્રતિક્રિયા છે. પાણી મુક્ત વાતાવરણમાં, લેચ્છલના સિદ્ધાંત મુજબ, પાણીનું પ્રમાણ ઘટવાથી સંતુલન એસ્ટર તરફ વળશે, પરંતુ સંપૂર્ણ રીતે નહીં. અ) ખોટું છે કારણ કે પ્રતિક્રિયા સંપૂર્ણ રીતે એસ્ટર તરફ વળતી નથી. સ) ખોટું છે કારણ કે ઉલટી પ્રતિક્રિયા (હાઇડ્રોલિસિસ) પાણીની હાજરીમાં જ થાય છે. ડ) ખોટું છે કારણ કે પાણીની હાજરી પ્રતિક્રિયા માટે જરૂરી નથી, પરંતુ તે સંતુલનને અસર કરે છે.", "ref": "Std 12 - અભ્યાસક્રમ: કાર્બનિક રસાયણશાસ્ત્ર - સંતુલન અને લેચ્છલનો સિદ્ધાંત", "ch": ""}, {"q": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયામાં, નીચેનામાંથી કયો એસિડ, એથેનોલ સાથે પ્રતિક્રિયા કરતાં સૌથી ઓછો પ્રમાણમાં એસ્ટર બનાવશે?", "opts": ["એસિટિક એસિડ (CH₃COOH)", "ફોર્મિક એસિડ (HCOOH)", "બેન્ઝોઇક એસિડ (C₆H₅COOH)", "ઓક્ઝેલિક એસિડ (HOOC-COOH)"], "ans": 2, "exp": "બેન્ઝોઇક એસિડ એરોમેટિક એસિડ છે, અને એરોમેટિક યોગિકોની પ્રતિક્રિયાશીલતા એલિફેટિક યોગિકો કરતાં ઓછી હોય છે. એસિટિક એસિડ અને ફોર્મિક એસિડ એલિફેટિક એસિડ છે, જેઓ વધુ પ્રતિક્રિયાશીલ હોય છે. ઓક્ઝેલિક એસિડ ડાયકાર્બોક્સિલિક એસિડ છે, પરંતુ તે પણ એથેનોલ સાથે સરળતાથી એસ્ટર બનાવે છે. આથી, બેન્ઝોઇક એસિડ સૌથી ઓછો પ્રમાણમાં એસ્ટર બનાવશે.", "ref": "Std 12 - અભ્યાસક્રમ: કાર્બનિક રસાયણશાસ્ત્ર - કાર્બોક્સિલિક એસિડની પ્રતિક્રિયાશીલતા", "ch": ""}, {"q": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયામાં, જ્યારે બેન્ઝોઇક એસિડ અને મિથેનોલની પ્રતિક્રિયા થાય છે, ત્યારે નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["પ્રતિક્રિયા ઉષ્માશોષી (endothermic) હોય છે અને એસ્ટરનું પ્રમાણ સમય સાથે ઘટે છે.", "પ્રતિક્રિયા ઉષ્માક્ષેપી (exothermic) હોય છે અને સંતુલન અવસ્થામાં પાણીનું પ્રમાણ વધારવાથી એસ્ટરનું પ્રમાણ ઘટે છે.", "પ્રતિક્રિયા ઉષ્માશોષી હોય છે અને સંતુલન અવસ્થામાં એસિડ અથવા આલ્કોહોલનું પ્રમાણ વધારવાથી એસ્ટરનું પ્રમાણ વધે છે.", "પ્રતિક્રિયા ઉષ્માક્ષેપી હોય છે અને એસ્ટરનું પ્રમાણ તાપમાન વધારવાથી વધે છે."], "ans": 1, "exp": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયા ઉષ્માક્ષેપી (exothermic) હોય છે, જેમાં ઉષ્મા મુક્ત થાય છે. સંતુલન અવસ્થામાં, લેચ્છેલી પ્રક્રિયા (Le Chatelier’s principle) અનુસાર, પાણીનું પ્રમાણ વધારવાથી સંતુલન બાજુ એસ્ટરની હાઇડ્રોલિસિસ તરફ વળે છે, જેથી એસ્ટરનું પ્રમાણ ઘટે છે. વિકલ્પ A ખોટો છે કારણ કે પ્રક્રિયા ઉષ્માશોષી નથી. વિકલ્પ C ખોટો છે કારણ કે પ્રક્રિયા ઉષ્માશોષી નથી અને એસિડ અથવા આલ્કોહોલનું પ્રમાણ વધારવાથી એસ્ટરનું પ્રમાણ વધે છે, પરંતુ પ્રક્રિયા ઉષ્માક્ષેપી છે. વિકલ્પ D ખોટો છે કારણ કે તાપમાન વધારવાથી એસ્ટરનું પ્રમાણ ઘટે છે, કારણ કે પ્રક્રિયા ઉષ્માક્ષેપી છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: કાર્બોક્સિલિક એસિડ અને તેના વ્યુત્પન્ન", "ch": ""}, {"q": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયામાં, એસિટિક એસિડ અને 1-બ્યુટેનોલની પ્રતિક્રિયા દરમિયાન, નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["પ્રતિક્રિયા દરમિયાન પાણીનું નિર્માણ થાય છે", "પ્રતિક્રિયા ઉશ્કેરક તરીકે સલ્ફ્યુરિક એસિડ વાપરવામાં આવે છે", "ઉત્પન્ન થતો એસ્ટરનો સૂત્ર CH3COOCH2CH2CH2CH3 છે", "પ્રતિક્રિયા પૂર્ણ થયા પછી એસ્ટર પાણીમાં સરળતાથી દ્રાવ્ય થાય છે"], "ans": 3, "exp": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયામાં એસિટિક એસિડ અને 1-બ્યુટેનોલ વચ્ચેની પ્રતિક્રિયાથી બ્યુટાઇલ એસિટેટ (CH3COOCH2CH2CH2CH3) નિર્માણ થાય છે, જેમાં પાણી પણ મુક્ત થાય છે (A સત્ય). સલ્ફ્યુરિક એસિડ ઉશ્કેરક તરીકે વાપરવામાં આવે છે (B સત્ય). ઉત્પન્ન એસ્ટરનો સૂત્ર CH3COOCH2CH2CH2CH3 છે (C સત્ય). પરંતુ એસ્ટરો સામાન્ય રીતે પાણીમાં અદ્રાવ્ય હોય છે, તેથી D વિધાન ખોટું છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: કાર્બનિક રસાયણવિજ્ઞાન - એસ્ટર, એમાઇડ અને એસિડ હેલાઇડ", "ch": ""}, {"q": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયામાં, જ્યારે બેન્ઝોઇક એસિડ અને એથેનોલની પ્રતિક્રિયા કરવામાં આવે છે, ત્યારે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["પ્રતિક્રિયા દરમિયાન પાણીનું નિર્માણ થાય છે", "ઉત્પન્ન થતો એસ્ટરની ગંધ સુગંધિત હોય છે", "પ્રતિક્રિયા સંપૂર્ણ રીતે પૂર્ણ થાય છે કારણ કે બેન્ઝોઇક એસિડ એક મજબૂત એસિડ છે", "પ્રતિક્રિયામાં એસિડ ઉત્પ્રેરક તરીકે H₂SO₄ વાપરવામાં આવે છે"], "ans": 2, "exp": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયા સંતુલન પ્રક્રિયા છે, જેમાં પાણીનું નિર્માણ થાય છે (A સત્ય). બેન્ઝોઇક એસિડ અને એથેનોલના એસ્ટરની ગંધ સુગંધિત હોય છે (B સત્ય). પ્રતિક્રિયામાં એસિડ ઉત્પ્રેરક તરીકે H₂SO₄ વાપરવામાં આવે છે (D સત્ય). પરંતુ પ્રતિક્રિયા સંપૂર્ણ રીતે પૂર્ણ થતી નથી, કારણ કે તે સંતુલન પ્રક્રિયા છે અને બેન્ઝોઇક એસિડની મજબૂતતા પ્રતિક્રિયાને પૂર્ણ બનાવતી નથી (C ખોટું).", "ref": "Std 12 - Chapter 12: કાર્બોક્સિલિક એસિડ અને તેના વ્યુત્પન્ન", "ch": ""}, {"q": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયામાં, જ્યારે એસિટિક એસિડ અને 1-પ્રોપેનોલની પ્રતિક્રિયા થાય છે, ત્યારે નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["પ્રતિક્રિયા દરમિયાન એસિટિક એસિડના કાર્બોક્સિલ સમૂહમાંથી OH સમૂહ દૂર થાય છે", "પ્રતિક્રિયા દરમિયાન 1-પ્રોપેનોલના હાઇડ્રોક્સિલ સમૂહમાંથી H અણુ દૂર થાય છે", "પ્રતિક્રિયા દરમિયાન પાણીનું અણુ બને છે", "પ્રતિક્રિયા દરમિયાન એસિટિક એસિડનો કાર્બોક્સિલ સમૂહ તૂટી જાય છે"], "ans": 3, "exp": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયામાં, એસિટિક એસિડના કાર્બોક્સિલ સમૂહમાંથી OH સમૂહ દૂર થાય છે (A સત્ય). 1-પ્રોપેનોલના હાઇડ્રોક્સિલ સમૂહમાંથી H અણુ દૂર થાય છે (B સત્ય). પાણીનું અણુ બને છે (C સત્ય). પરંતુ એસિટિક એસિડનો કાર્બોક્સિલ સમૂહ તૂટતો નથી, પરંતુ એસ્ટર બનવાની પ્રક્રિયામાં ભાગ લે છે (D ખોટું).", "ref": "Std 12 - Chapter 12: કાર્બોક્સિલિક એસિડ અને તેના વ્યુત્પન્ન", "ch": ""}, {"q": "ફિશર એસ્ટરીફિકેશન પ્રક્રિયામાં, નીચેનામાંથી કયું સંયોજન એસ્ટરના નિર્માણ દરમિયાન let userAns={},curIdx=0;

function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}

function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}

  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
