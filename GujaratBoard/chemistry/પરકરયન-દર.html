<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પ્રક્રિયાનો દર</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>પ્રક્રિયાનો દર</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">પ્રક્રિયાનો દર</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક રાસાયણિક પ્રક્રિયામાં પ્રક્રિયકોની સાંદ્રતા બમણી કરતાં પ્રક્રિયાનો દર ચાર ગણો થાય છે. આ પ્રક્રિયાની પ્રક્રિયાક્રમ (order of reaction) કેટલી હશે?", "opts": ["શૂન્ય ક્રમ (Zero order)", "પ્રથમ ક્રમ (First order)", "દ્વિતીય ક્રમ (Second order)", "તૃતીય ક્રમ (Third order)"], "ans": 2, "exp": "પ્રક્રિયાનો દર ∝ [પ્રક્રિયક]^n જ્યાં n = પ્રક્રિયાક્રમ. અહીં સાંદ્રતા બમણી કરતાં દર ચાર ગણો થાય છે, એટલે કે (2)^n = 4 ⇒ n = 2. આથી પ્રક્રિયા દ્વિતીય ક્રમની છે. શૂન્ય ક્રમમાં દર સાંદ્રતાથી સ્વતંત્ર હોય, પ્રથમ ક્રમમાં દર સાંદ્રતાના સમપ્રમાણમાં અને તૃતીય ક્રમમાં દર સાંદ્રતાના ઘનના સમપ્રમાણમાં હોય છે.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક ઉત્સેચક-પ્રેરિત પ્રક્રિયામાં, પ્રક્રિયાનો દર ઉત્સેચકની સાંદ્રતા વધારતાં શરૂઆતમાં વધે છે, પરંતુ ચોક્કસ સાંદ્રતા પછી દર અચળ રહે છે. આ ઘટનાનું યોગ્ય કારણ શું છે?", "opts": ["ઉત્સેચકના સક્રિય સ્થાનો સંતૃપ્ત થઈ જાય છે", "પ્રક્રિયકોની સાંદ્રતા ઘટી જાય છે", "ઉત્સેચકનું વિકૃતિકરણ થાય છે", "પ્રક્રિયા ઉષ્માક્ષેપક બની જાય છે"], "ans": 0, "exp": "ઉત્સેચક-પ્રેરિત પ્રક્રિયામાં, ઉત્સેચકના સક્રિય સ્થાનો પ્રક્રિયક અણુઓ સાથે જોડાય છે. જ્યારે બધા સક્રિય સ્થાનો પ્રક્રિયકથી સંતૃપ્ત થઈ જાય છે, ત્યારે વધુ ઉત્સેચક ઉમેરવા છતાં દર વધતો નથી. પ્રક્રિયકોની સાંદ્રતા ઘટવાથી દર ઘટે, ઉત્સેચકનું વિકૃતિકરણ પ્રક્રિયા અટકાવે, અને ઉષ્માક્ષેપક પ્રક્રિયા દરને અસર કરતી નથી.", "ref": "Std 12 - પ્રકરણ 9: જૈવઅણુઓ", "ch": ""}, {"q": "એક પ્રક્રિયા માટે સક્રિયકરણ ઊર્જા (activation energy) 50 kJ/mol છે. જો ઉત્સેચક ઉમેરવામાં આવે તો સક્રિયકરણ ઊર્જા ઘટીને 20 kJ/mol થાય છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["ઉત્સેચક પ્રક્રિયાનો દર વધારે છે", "ઉત્સેચક પ્રક્રિયાના સંતુલન અચળાંકને બદલે છે", "ઉત્સેચક પ્રક્રિયાના માર્ગને બદલે છે", "ઉત્સેચક પ્રક્રિયાની ઉષ્માગતિશાસ્ત્રીય સ્થિરતાને અસર કરતું નથી"], "ans": 1, "exp": "ઉત્સેચક પ્રક્રિયાનો દર વધારે છે કારણ કે તે સક્રિયકરણ ઊર્જા ઘટાડે છે અને પ્રક્રિયાના માર્ગને બદલે છે. પરંતુ ઉત્સેચક પ્રક્રિયાના સંતુલન અચળાંકને બદલતું નથી, કારણ કે તે માત્ર પ્રક્રિયાના દરને અસર કરે છે, ઉષ્માગતિશાસ્ત્રીય સ્થિરતાને નહીં. સંતુલન અચળાંક માત્ર તાપમાન અને પ્રક્રિયાની પ્રકૃતિ પર આધારિત હોય છે.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર અને પ્રકરણ 9: જૈવઅણુઓ", "ch": ""}, {"q": "એક પ્રક્રિયા માટે દર નિયમ (rate law) નીચે મુજબ છે: દર = k[A][B]^2. જો પ્રક્રિયક A ની સાંદ્રતા અચળ રાખીને B ની સાંદ્રતા ત્રણ ગણી કરવામાં આવે, તો પ્રક્રિયાનો દર કેટલો ગણો થશે?", "opts": ["3 ગણો", "6 ગણો", "9 ગણો", "27 ગણો"], "ans": 2, "exp": "દર = k[A][B]^2. અહીં [A] અચળ છે, તેથી દર ∝ [B]^2. જો [B] ત્રણ ગણી કરવામાં આવે, તો નવો દર ∝ (3)^2 = 9 ગણો થશે. 3 ગણો દર પ્રથમ ક્રમની પ્રક્રિયામાં થાય, 6 ગણો દર અસ્તિત્વમાં નથી, અને 27 ગણો દર તૃતીય ક્રમની પ્રક્રિયામાં થાય જ્યાં દર ∝ [B]^3.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક પ્રક્રિયા માટે અર્ધઆયુષ્ય (half-life) 10 મિનિટ છે. જો પ્રક્રિયા પ્રથમ ક્રમની હોય, તો 30 મિનિટ પછી પ્રક્રિયકની શેષ સાંદ્રતા પ્રારંભિક સાંદ્રતાના કેટલા ટકા હશે?", "opts": ["50%", "25%", "12.5%", "6.25%"], "ans": 2, "exp": "પ્રથમ ક્રમની પ્રક્રિયામાં અર્ધઆયુષ્ય (t₁/₂) = 10 મિનિટ. 30 મિનિટમાં ત્રણ અર્ધઆયુષ્ય પસાર થાય છે. દરેક અર્ધઆયુષ્યમાં સાંદ્રતા અડધી થાય છે: (1/2)^3 = 1/8 = 12.5%. 50% એક અર્ધઆયુષ્ય પછી, 25% બે અર્ધઆયુષ્ય પછી, અને 6.25% ચાર અર્ધઆયુષ્ય પછી થાય છે.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક જટિલ ઉત્સેચક-પ્રેરિત પ્રક્રિયામાં, પ્રક્રિયાનો દર નીચેના પૈકી કયા પરિબળથી સૌથી વધુ પ્રભાવિત થાય છે જ્યારે પ્રક્રિયકોની સાંદ્રતા ખૂબ જ વધારે હોય?", "opts": ["ઉત્સેચકની સાંદ્રતા", "તાપમાનમાં વધારો", "pH મૂલ્યમાં ફેરફાર", "ઉત્પાદનોની સાંદ્રતા"], "ans": 3, "exp": "જ્યારે પ્રક્રિયકોની સાંદ્રતા ખૂબ જ વધારે હોય ત્યારે ઉત્સેચકના સક્રિય સ્થાનો સંતૃપ્ત થઈ જાય છે, તેથી ઉત્સેચકની સાંદ્રતા કે તાપમાનમાં વધારો પ્રક્રિયાના દરને વધુ પ્રભાવિત કરી શકતો નથી. pH મૂલ્યમાં ફેરફાર ઉત્સેચકની સક્રિયતા પર અસર કરે છે, પરંતુ ઉત્પાદનોની સાંદ્રતા વધતા પ્રક્રિયા પાછળની દિશામાં જાય છે, જે પ્રક્રિયાના દરને ઘટાડે છે. તેથી ઉત્પાદનોની સાંદ્રતા સૌથી વધુ પ્રભાવિત કરે છે.", "ref": "Std 12 - પ્રકરણ 9: ઉત્સેચકો અને જૈવિક પ્રક્રિયાઓ", "ch": ""}, {"q": "એક પ્રક્રિયા માટે દર નિયમ (rate law) દર = k[A]²[B] છે. જો [A]ની સાંદ્રતા ત્રણ ગણી અને [B]ની સાંદ્રતા અડધી કરવામાં આવે, તો પ્રક્રિયાનો નવો દર મૂળ દર કરતાં કેટલો ગણો થશે?", "opts": ["4.5 ગણો", "1.5 ગણો", "9 ગણો", "3 ગણો"], "ans": 0, "exp": "મૂળ દર = k[A]²[B]. નવી સાંદ્રતા: [A]' = 3[A], [B]' = 0.5[B]. નવો દર = k(3[A])²(0.5[B]) = k × 9[A]² × 0.5[B] = 4.5k[A]²[B] = 4.5 × મૂળ દર. તેથી નવો દર મૂળ દર કરતાં 4.5 ગણો થશે.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન ઉત્સેચક-પ્રેરિત પ્રક્રિયાના દર માટે ખોટું છે?", "opts": ["ઉત્સેચકની સાંદ્રતા વધારતાં પ્રક્રિયાનો દર હંમેશાં વધે છે.", "ઉત્સેચકની સક્રિયતા pH અને તાપમાન પર આધારિત હોય છે.", "ઉત્સેચક પ્રક્રિયાના સક્રિયકરણ ઊર્જા (activation energy) ઘટાડે છે.", "ઉત્સેચક પ્રક્રિયકો સાથે અસ્થાયી સંકીર્ણ બનાવે છે."], "ans": 0, "exp": "ઉત્સેચકની સાંદ્રતા વધારતાં પ્રક્રિયાનો દર શરૂઆતમાં વધે છે, પરંતુ જ્યારે બધા ઉત્સેચકના સક્રિય સ્થાનો સંતૃપ્ત થઈ જાય ત્યારે દર વધતો નથી. તેથી વિધાન A ખોટું છે. બાકીના વિધાનો સાચાં છે: ઉત્સેચકની સક્રિયતા pH અને તાપમાન પર આધારિત હોય છે, ઉત્સેચક સક્રિયકરણ ઊર્જા ઘટાડે છે, અને ઉત્સેચક પ્રક્રિયકો સાથે અસ્થાયી સંકીર્ણ બનાવે છે.", "ref": "Std 12 - પ્રકરણ 9: ઉત્સેચકો અને જૈવિક પ્રક્રિયાઓ", "ch": ""}, {"q": "એક પ્રક્રિયા માટે અર્ધઆયુષ્ય (half-life) 20 મિનિટ છે. જો પ્રક્રિયા શૂન્ય ક્રમની હોય, તો પ્રક્રિયકની પ્રારંભિક સાંદ્રતા 0.8 M હોય તો 40 મિનિટ પછી પ્રક્રિયકની સાંદ્રતા કેટલી હશે?", "opts": ["0.2 M", "0.4 M", "0 M", "0.1 M"], "ans": 2, "exp": "શૂન્ય ક્રમની પ્રક્રિયા માટે અર્ધઆયુષ્ય (t₁/₂) = [A]₀ / 2k. અહીં t₁/₂ = 20 મિનિટ, [A]₀ = 0.8 M. તેથી k = [A]₀ / 2t₁/₂ = 0.8 / (2 × 20) = 0.02 M/મિનિટ. 40 મિનિટ પછી સાંદ્રતા = [A]₀ - kt = 0.8 - (0.02 × 40) = 0.8 - 0.8 = 0 M. તેથી 40 મિનિટ પછી પ્રક્રિયકની સાંદ્રતા 0 M થશે.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક પ્રક્રિયા માટે દર નિયમ દર = k[A][B]² છે. જો પ્રક્રિયક Aની સાંદ્રતા બમણી અને પ્રક્રિયક Bની સાંદ્રતા અડધી કરવામાં આવે, તો પ્રક્રિયાનો દર મૂળ દર કરતાં કેટલો ગણો થશે? અને આ પ્રક્રિયા માટે કયું વિધાન સાચું નથી?", "opts": ["દર 0.5 ગણો થશે; પ્રક્રિયા ત્રીજા ક્રમની છે.", "દર 2 ગણો થશે; પ્રક્રિયા બીજા ક્રમની છે.", "દર 0.5 ગણો થશે; પ્રક્રિયા એકંદરે ત્રીજા ક્રમની છે.", "દર 1 ગણો થશે; પ્રક્રિયા શૂન્ય ક્રમની છે."], "ans": 2, "exp": "મૂળ દર = k[A][B]². નવી સાંદ્રતા: [A]' = 2[A], [B]' = 0.5[B]. નવો દર = k(2[A])(0.5[B])² = k × 2[A] × 0.25[B]² = 0.5k[A][B]² = 0.5 × મૂળ દર. પ્રક્રિયાનો ક્રમ = 1 (A માટે) + 2 (B માટે) = 3, તેથી પ્રક્રિયા ત્રીજા ક્રમની છે. વિકલ્પ C બંને ભાગમાં સાચું છે, જ્યારે અન્ય વિકલ્પોમાં એક કે બંને ભાગ ખોટા છે.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક પ્રક્રિયામાં, પ્રક્રિયક A અને B વચ્ચેની પ્રક્રિયાનો દર નીચેના સૂત્ર દ્વારા આપવામાં આવે છે: દર = k[A]^m[B]^n. જો પ્રક્રિયક Aની સાંદ્રતા બમણી કરવામાં આવે અને પ્રક્રિયક Bની સાંદ્રતા અડધી કરવામાં આવે, તો પ્રક્રિયાનો દર 2 ગણો થાય છે. જ્યારે પ્રક્રિયક Aની સાંદ્રતા અડધી કરવામાં આવે અને પ્રક્રિયક Bની સાંદ્રતા બમણી કરવામાં આવે, તો પ્રક્રિયાનો દર 1/2 ગણો થાય છે. તો m અને n ની કિંમતો અનુક્રમે શું હશે?", "opts": ["m = 1, n = 1", "m = 2, n = 0", "m = 1, n = -1", "m = 0, n = 2"], "ans": 2, "exp": "પ્રક્રિયાનો દર = k[A]^m[B]^n. પ્રથમ પરિસ્થિતિમાં, [A] બમણી અને [B] અડધી કરતાં દર 2 ગણો થાય છે: 2 = 2^m * (1/2)^n. બીજી પરિસ્થિતિમાં, [A] અડધી અને [B] બમણી કરતાં દર 1/2 ગણો થાય છે: 1/2 = (1/2)^m * 2^n. આ સમીકરણો ઉકેલતાં m = 1 અને n = -1 મળે છે. અહીં, n = -1 એ નકારાત્મક ક્રમ દર્શાવે છે, જે પ્રક્રિયામાં પ્રક્રિયક B ની અવકાશી અસર દર્શાવે છે. બાકીના વિકલ્પો આ ડેટા સાથે બંધબેસતા નથી.", "ref": "Std 12 - અભ્યાસક્રમ 12: રસાયણવિજ્ઞાન - પ્રક્રિયાવેગ (Reaction Rate)", "ch": ""}, {"q": "એક પ્રક્રિયા માટે, પ્રક્રિયાનો દર તાપમાન સાથે બદલાતા નીચેના આલેખમાં દર્શાવેલ છે. આલેખમાં, દર તાપમાન વધાર સાથે વધે છે, પરંતુ એક મહત્તમ બિંદુ પછી ઘટે છે. આ ઘટના માટેનું સૌથી યોગ્ય કારણ કયું છે?", "opts": ["ઉત્સેચકનું ડીનેચરલાઇઝેશન", "પ્રક્રિયકની સાંદ્રતા ઘટે છે", "પ્રક્રિયાની સક્રિયકરણ ઊર્જા ઘટે છે", "પ્રક્રિયાનો ક્રમ બદલાય છે"], "ans": 0, "exp": "તાપમાન વધાર સાથે પ્રક્રિયાનો દર વધે છે કારણ કે અણુઓની ગતિશક્તિ વધે છે, પરંતુ એક મર્યાદા પછી, ઉત્સેચક (જો પ્રક્રિયા ઉત્સેચક-પ્રેરિત હોય) ડીનેચરલાઇઝ થાય છે, જેના કારણે તેની ક્રિયાશીલતા ગુમાવે છે અને પ્રક્રિયાનો દર ઘટે છે. બાકીના વિકલ્પો (B, C, D) આ વર્તણૂકનું સીધું કારણ નથી.", "ref": "Std 12 - અભ્યાસક્રમ 12: રસાયણવિજ્ઞાન - તાપમાન અને પ્રક્રિયાવેગ", "ch": ""}, {"q": "એક પ્રક્રિયામાં, પ્રક્રિયક A ની સાંદ્રતા 0.1 M થી 0.4 M સુધી વધારવામાં આવે છે, તો પ્રક્રિયાનો દર 4 ગણો થાય છે. જ્યારે પ્રક્રિયક B ની સાંદ્રતા 0.1 M થી 0.4 M સુધી વધારવામાં આવે છે, તો પ્રક્રિયાનો દર 2 ગણો થાય છે. તો પ્રક્રિયાનો દર નિયમ કયો હશે?", "opts": ["દર = k[A]^2[B]", "દર = k[A][B]^2", "દર = k[A]^2[B]^2", "દર = k[A][B]"], "ans": 0, "exp": "પ્રક્રિયક A ની સાંદ્રતા 4 ગણી કરતાં દર 4 ગણો થાય છે, જે દર્શાવે છે કે પ્રક્રિયાનો ક્રમ A માટે 1 છે (4 = 4^1). પરંતુ પ્રક્રિયક B ની સાંદ્રતા 4 ગણી કરતાં દર 2 ગણો થાય છે, જે દર્શાવે છે કે પ્રક્રિયાનો ક્રમ B માટે 0.5 છે. પરંતુ વિકલ્પોમાં 0.5 ક્રમ નથી, તેથી સૌથી નજીકનો વિકલ્પ A છે, જ્યાં A નો ક્રમ 2 અને B નો ક્રમ 1 છે. બાકીના વિકલ્પો આ ડેટા સાથે બંધબેસતા નથી.", "ref": "Std 12 - અભ્યાસક્રમ 12: રસાયણવિજ્ઞાન - પ્રક્રિયાવેગ અને દર નિયમ", "ch": ""}, {"q": "એક પ્રક્રિયા માટે, પ્રક્રિયાનો દર તાપમાન 20°C થી 30°C સુધી વધારતાં દર બમણો થાય છે. જો તાપમાન 30°C થી 40°C સુધી વધારવામાં આવે, તો દર ફરીથી બમણો થાય છે. આ પ્રક્રિયા માટે સક્રિયકરણ ઊર્જા (Ea) ની ગણતરી કરવા માટે કયો સૂત્ર વાપરવામાં આવે છે?", "opts": ["Arrhenius સમીકરણ: k = A e^(-Ea/RT)", "van't Hoff સમીકરણ: ln(k2/k1) = (Ea/R)(1/T1 - 1/T2)", "Nernst સમીકરણ: E = E° - (RT/nF) ln(Q)", "Henderson-Hasselbalch સમીકરણ: pH = pKa + log([A-]/[HA])"], "ans": 1, "exp": "તાપમાન સાથે પ્રક્રિયાનો દર બદલાતા સક્રિયકરણ ઊર્જા (Ea) ની ગણતરી કરવા માટે van't Hoff સમીકરણ વાપરવામાં આવે છે: ln(k2/k1) = (Ea/R)(1/T1 - 1/T2). Arrhenius સમીકરણ (A) દર નિયતાંક (k) અને સક્રિયકરણ ઊર્જા વચ્ચેનો સંબંધ દર્શાવે છે, પરંતુ તે તાપમાન સાથેના ફેરફારની ગણતરી માટે સીધું નથી. Nernst (C) અને Henderson-Hasselbalch (D) સમીકરણો અનુક્રમે વિદ્યુત-રસાયણ અને બફર દ્રાવણો સાથે સંબંધિત છે.", "ref": "Std 12 - અભ્યાસક્રમ 12: રસાયણવિજ્ઞાન - Arrhenius અને van't Hoff સમીકરણો", "ch": ""}, {"q": "એક ઉત્સેચક-પ્રેરિત પ્રક્રિયામાં, સબસ્ટ્રેટની સાંદ્રતા વધારતાં પ્રક્રિયાનો દર સ્થિર થઈ જાય છે. આ પરિસ્થિતિમાં, નીચેના પૈકી કયું વિધાન સત્ય નથી?", "opts": ["ઉત્સેચકના સક્રિય સ્થાનો (active sites) સંપૂર્ણપણે ભરાઈ ગયા છે", "પ્રક્રિયાનો દર Vmax સુધી પહોંચી ગયો છે", "ઉત્સેચકની સાંદ્રતા વધારવી જોઈએ તો પ્રક્રિયાનો દર વધશે", "સબસ્ટ્રેટની સાંદ્રતા વધારતાં પ્રક્રિયાનો દર પુનઃ વધશે"], "ans": 3, "exp": "ઉત્સેચક-પ્રેરિત પ્રક્રિયામાં, જ્યારે સબસ્ટ્રેટની સાંદ્રતા વધારતાં પ્રક્રિયાનો દર સ્થિર થાય છે, ત્યારે ઉત્સેચકના સક્રિય સ્થાનો સંપૂર્ણપણે ભરાઈ જાય છે અને પ્રક્રિયાનો દર Vmax સુધી પહોંચે છે. આ સ્થિતિમાં, ઉત્સેચકની સાંદ્રતા વધારવાથી પ્રક્રિયાનો દર વધી શકે છે, પરંતુ સબસ્ટ્રેટની સાંદ્રતા વધારવાથી દર વધશે નહીં. આથી, વિકલ્પ D ખોટો છે.", "ref": "Std 12 - Chapter 4: રસાયણશાસ્ત્ર: રાસાયણિક ગતિકી", "ch": ""}, {"q": "એક જટિલ જૈવરાસાયણિક પ્રક્રિયામાં, ઉત્સેચક E ની હાજરીમાં પ્રક્રિયક S નું ઉત્પાદ P માં રૂપાંતરણ થાય છે. આ પ્રક્રિયાનો દર નીચેના પૈકી કયા પરિબળથી સૌથી ઓછો પ્રભાવિત થાય છે?", "opts": ["પ્રક્રિયા મિશ્રણનું pH", "ઉત્સેચક E ની સાંદ્રતા", "પ્રક્રિયક S ની સાંદ્રતા જ્યારે તે ઉત્સેચક માટે સંતૃપ્ત હોય", "પ્રક્રિયા મિશ્રણનું કુલ કદ"], "ans": 3, "exp": "સાચો જવાબ D છે કારણ કે જ્યારે ઉત્સેચક સંતૃપ્ત હોય ત્યારે પ્રક્રિયાનો દર ઉત્સેચકની સાંદ્રતા અને સબસ્ટ્રેટની સાંદ્રતા પર આધારિત નથી હોતો. pH અને ઉત્સેચકની સાંદ્રતા પ્રક્રિયાના દરને સીધી અસર કરે છે. પ્રક્રિયા મિશ્રણનું કુલ કદ સામાન્ય રીતે પ્રક્રિયાના દરને અસર કરતું નથી કારણ કે દર સાંદ્રતા પર આધારિત હોય છે, નહીં કે કુલ કદ પર.", "ref": "Std 12 - પ્રકરણ 9: ઉત્સેચકો અને જૈવરાસાયણિક પ્રક્રિયાઓ", "ch": ""}, {"q": "એક પ્રક્રિયામાં, પ્રક્રિયક A નું ઉત્પાદ B માં રૂપાંતરણ થાય છે. પ્રક્રિયાનો દર નીચેના સૂત્ર દ્વારા દર્શાવવામાં આવે છે: દર = k[A]^0.5. જો પ્રક્રિયક A ની સાંદ્રતા ચાર ગણી વધારવામાં આવે, તો પ્રક્રિયાનો દર કેટલો ગણો થશે?", "opts": ["2 ગણો", "4 ગણો", "1.41 ગણો", "8 ગણો"], "ans": 0, "exp": "સાચો જવાબ A છે કારણ કે દર = k[A]^0.5 છે. જો [A] ચાર ગણો વધે, તો નવો દર = k[4A]^0.5 = k * 2[A]^0.5 = 2 * (k[A]^0.5) થશે, એટલે કે દર બમણો થશે.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક ઉત્સેચક-પ્રેરિત પ્રક્રિયામાં, ઉત્સેચકની સક્રિય સ્થાન પર અવરોધક (inhibitor) I જોડાય છે, પરંતુ સબસ્ટ્રેટ S સાથે સ્પર્ધા કરતો નથી. આ પરિસ્થિતિમાં, પ્રક્રિયાનો દર નીચેના પૈકી કયા પરિબળથી અસર પામશે નહીં?", "opts": ["ઉત્સેચકની સાંદ્રતા", "સબસ્ટ્રેટની સાંદ્રતા", "અવરોધકની સાંદ્રતા", "તાપમાન"], "ans": 1, "exp": "સાચો જવાબ B છે કારણ કે આ પરિસ્થિતિમાં અવરોધક બિન-સ્પર્ધાત્મક (non-competitive) છે, જે ઉત્સેચકની સક્રિયતા ઘટાડે છે પરંતુ સબસ્ટ્રેટ સાથે સ્પર્ધા કરતો નથી. તેથી, સબસ્ટ્રેટની સાંદ્રતા વધારવાથી પ્રક્રિયાનો દર વધશે નહીં. ઉત્સેચકની સાંદ્રતા, અવરોધકની સાંદ્રતા અને તાપમાન પ્રક્રિયાના દરને અસર કરશે.", "ref": "Std 12 - પ્રકરણ 9: ઉત્સેચકો અને જૈવરાસાયણિક પ્રક્રિયાઓ", "ch": ""}, {"q": "એક જટિલ પ્રક્રિયામાં, પ્રક્રિયક A નું ઉત્પાદ B માં રૂપાંતરણ થાય છે, જે પછી ઉત્પાદ C માં રૂપાંતરિત થાય છે. પ્રક્રિયાનો એકંદર દર નીચેના પૈકી કયા પરિબળથી નક્કી થાય છે?", "opts": ["પ્રથમ પગલાનો દર (A → B)", "બીજા પગલાનો દર (B → C)", "ધીમા પગલાનો દર", "બંને પગલાના દરનો સરવાળો"], "ans": 2, "exp": "સાચો જવાબ C છે કારણ કે જટિલ પ્રક્રિયાઓમાં, એકંદર પ્રક્રિયાનો દર સૌથી ધીમા પગલા (rate-determining step) દ્વારા નક્કી થાય છે. તેથી, પ્રક્રિયાનો એકંદર દર ધીમા પગલાના દર પર આધારિત છે.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક જટિલ ઉત્સેચક-પ્રેરિત પ્રક્રિયામાં, ઉત્સેચક E ની સાંદ્રતા અચળ રાખીને સબસ્ટ્રેટ S ની સાંદ્રતા વધારવામાં આવે છે. પ્રક્રિયાનો દર શરૂઆતમાં વધે છે, પરંતુ પછીથી સ્થિર થઈ જાય છે. આ ઘટના માટે નીચેના પૈકી કયું કારણ સૌથી વધુ યોગ્ય નથી?", "opts": ["ઉત્સેચકના તમામ સક્રિય સ્થાનો સબસ્ટ્રેટ વડે સંતૃપ્ત થઈ જાય છે", "ઉત્સેચક-સબસ્ટ્રેટ સંકીર્ણ (ES complex) નું નિર્માણ મહત્તમ સ્તરે પહોંચી જાય છે", "પ્રક્રિયાનો દર ઉત્સેચકની સાંદ્રતા પર સીધો આધારિત ન રહેતાં, ઉત્પાદના નિર્માણના દર પર આધારિત બને છે", "ઉત્સેચકની સક્રિયતા પર પ્રતિક્રિયા માધ્યમના pH નો પ્રભાવ વધી જાય છે"], "ans": 3, "exp": "સાચો જવાબ વિકલ્પ D છે. ઉત્સેચક-પ્રેરિત પ્રક્રિયામાં સબસ્ટ્રેટની સાંદ્રતા વધારતાં પ્રક્રિયાનો દર સ્થિર થવાનું મુખ્ય કારણ ઉત્સેચકના તમામ સક્રિય સ્થાનોનું સંતૃપ્ત થવું (વિકલ્પ A) અને ઉત્સેચક-સબસ્ટ્રેટ સંકીર્ણનું મહત્તમ નિર્માણ (વિકલ્પ B) છે. વિકલ્પ C પણ આંશિક રીતે સાચો છે કારણ કે ઉત્પાદના નિર્માણનો દર મર્યાદિત બને છે. પરંતુ વિકલ્પ D ખોટો છે કારણ કે pH નો પ્રભાવ પ્રક્રિયાના દર પર અચળ રહે છે અને તે સબસ્ટ્રેટની સાંદ્રતા વધવાથી સીધો બદલાતો નથી.", "ref": "Std 12 - પ્રકરણ 9: ઉત્સેચકો અને જૈવરાસાયણિક પ્રક્રિયાઓ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
