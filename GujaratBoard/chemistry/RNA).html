<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>

<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "RNA ની બે મુખ્ય પ્રકારની શાખાઓમાંથી કયા પ્રકારમાં 'TψC' લૂપ (TψC loop) જોવા મળે છે?", "opts": ["mRNA (મેસેઞ્જર RNA)", "tRNA (ટ્રાન્સફર RNA)", "rRNA (રાઇબોઝોમલ RNA)", "snRNA (સ્મોલ ન્યુક્લિયર RNA)"], "ans": 1, "exp": "tRNA (ટ્રાન્સફર RNA) માં 'TψC' લૂપ જોવા મળે છે, જે તેની L-આકારની રચનાનો એક ભાગ છે અને એમિનો એસિડને રાઇબોઝોમ પર લાવવામાં મદદ કરે છે. mRNA, rRNA, અને snRNA માં આ લૂપ હાજર નથી.", "ref": "Std 12 - અધ્યાય 6: વંશવહનના આણ્વિક આધારો", "ch": ""}, {"q": "RNA પ્રક્રિયણ (RNA processing) દરમિયાન, કયા RNA પ્રકારમાં '5’ કેપિંગ' અને '3’ પોલી-એડેનિલેશન' બંને થાય છે?", "opts": ["rRNA", "tRNA", "mRNA", "miRNA"], "ans": 2, "exp": "mRNA (મેસેઞ્જર RNA) માં જ '5’ કેપિંગ' અને '3’ પોલી-એડેનિલેશન' બંને પ્રક્રિયાઓ થાય છે, જે RNA ની સ્થિરતા અને અનુવાદ (translation) માટે મહત્વપૂર્ણ છે. rRNA, tRNA, અને miRNA માં આ પ્રક્રિયાઓ થતી નથી.", "ref": "Std 12 - અધ્યાય 6: વંશવહનના આણ્વિક આધારો", "ch": ""}, {"q": "RNA વાયરસમાં, કયા ઉત્સેચકની હાજરીને કારણે RNA ની પ્રતિકૃતિ (replication) શક્ય બને છે?", "opts": ["RNA પોલિમરેઝ I", "RNA પોલિમરેઝ II", "RNA ડિપેન્ડન્ટ RNA પોલિમરેઝ", "DNA પોલિમરેઝ"], "ans": 2, "exp": "RNA વાયરસમાં, RNA ડિપેન્ડન્ટ RNA પોલિમરેઝ ઉત્સેચક હાજર હોય છે, જે RNA ની પ્રતિકૃતિ માટે જરૂરી છે. RNA પોલિમરેઝ I અને II યજમાન કોષમાં DNA થી RNA સંશ્લેષણ માટે વપરાય છે, જ્યારે DNA પોલિમરેઝ DNA ની પ્રતિકૃતિ માટે વપરાય છે.", "ref": "Std 12 - અધ્યાય 6: વંશવહનના આણ્વિક આધારો", "ch": ""}, {"q": "કયા RNA પ્રકારમાં 'ઇન્ટ્રોન' અને 'એક્સોન' ની હાજરી જોવા મળે છે, પરંતુ તેના પરિપક્વ સ્વરૂપમાં ઇન્ટ્રોન ગાયબ હોય છે?", "opts": ["rRNA", "tRNA", "mRNA", "snRNA"], "ans": 2, "exp": "mRNA (મેસેઞ્જર RNA) માં ઇન્ટ્રોન અને એક્સોન બંને હાજર હોય છે, પરંતુ પ્રક્રિયણ (splicing) પછી પરિપક્વ mRNA માં ફક્ત એક્સોન જ રહે છે. rRNA, tRNA, અને snRNA માં આ પ્રક્રિયા અલગ પડે છે.", "ref": "Std 12 - અધ્યાય 6: વંશવહનના આણ્વિક આધારો", "ch": ""}, {"q": "RNA ની દ્વિગુણી રચના (double-stranded RNA) કયા જીવમાં સામાન્ય રીતે જોવા મળે છે?", "opts": ["બેક્ટરિયા", "પશુ કોષ", "કેટલાક વાયરસ", "વનસ્પતિ કોષ"], "ans": 2, "exp": "દ્વિગુણી RNA (dsRNA) સામાન્ય રીતે કેટલાક વાયરસમાં જોવા મળે છે, જેમ કે રોટાવાયરસ. બેક્ટરિયા, પશુ કોષ, અને વનસ્પતિ કોષમાં સામાન્ય રીતે એકગુણી RNA (ssRNA) જોવા મળે છે.", "ref": "Std 12 - અધ્યાય 6: વંશવહનના આણ્વિક આધારો", "ch": ""}, {"q": "RNA ની સંરચનામાં, કયા ન્યુક્લિયોટાઇડમાં 'રાઇબોઝ' શર્કરાને બદલે 'ડિઓક્સીરાઇબોઝ' શર્કરા હાજર હોય છે, પરંતુ તેને પણ RNA ગણવામાં આવે છે?", "opts": ["tRNA ના 3’ ટર્મિનલ એમિનોએસિલેશન સ્થાને", "rRNA ના પેપ્ટિડાઇલ ટ્રાન્સફરેઝ સેંટરમાં", "mRNA ના 5’ કેપમાં", "snRNA ના સ્પ્લાઇસોસોમલ કોમ્પ્લેક્સમાં"], "ans": 0, "exp": "tRNA ના 3’ ટર્મિનલ એમિનોએસિલેશન સ્થાને 'રાઇબોઝ' શર્કરાને બદલે 'ડિઓક્સીરાઇબોઝ' શર્કરા હાજર હોય છે, પરંતુ તેને RNA ગણવામાં આવે છે કારણ કે તે tRNA ની કાર્યક્ષમતામાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે. બાકીના વિકલ્પો (rRNA, mRNA, snRNA)માં 'રાઇબોઝ' શર્કરા જ હાજર હોય છે.", "ref": "Std 12 - Chapter 6: આણ્વિક જનીનશાસ્ત્ર (Molecular Genetics)", "ch": ""}, {"q": "RNA ની સેકન્ડરી સંરચનામાં, કયા પ્રકારના RNA માં 'હેયરપિન લૂપ' (hairpin loop) ની રચના થાય છે અને તેનો મુખ્ય કાર્ય કયું છે?", "opts": ["mRNA માં, પ્રોટીન સંશ્લેષણ દરમિયાન રાઇબોઝોમની બંધારણીય સ્થિરતા માટે", "tRNA માં, એમિનો એસિડને પહોંચાડવા માટે તેની L-આકારની સંરચના બનાવવા", "rRNA માં, રાઇબોઝોમના સબયુનિટને જોડવા માટે", "snRNA માં, RNA સ્પ્લાઇસિંગ દરમિયાન ઇન્ટ્રોનને કાપવા માટે"], "ans": 1, "exp": "tRNA ની સેકન્ડરી સંરચનામાં 'હેયરપિન લૂપ' રચાય છે, જે તેની લાભદાયી L-આકારની સંરચના બનાવે છે. આ સંરચના એમિનો એસિડને રાઇબોઝોમ સુધી પહોંચાડવામાં મદદ કરે છે. mRNA, rRNA, અને snRNA માં આ પ્રકારની લૂપ સંરચના મુખ્યત્વે જોવા મળતી નથી અથવા તેનો ઉદ્દેશ્ય ભિન્ન હોય છે.", "ref": "Std 12 - Chapter 6: જૈવ અણુઓ અને જીવનની ઉત્ક્રાંતિ (RNA ની સંરચના અને કાર્ય)", "ch": ""}, {"q": "RNA વાયરસમાં, જ્યારે તેના જનીનોમાં મ્યુટેશન થાય છે ત્યારે કયા પ્રકારના RNA ની પ્રતિકૃતિ માટે 'RNA ડિપેન્ડન્ટ RNA પોલિમરેઝ' ઉત્સેચકની જરૂર પડે છે?", "opts": ["+ssRNA (પોઝિટિવ સિંગલ-સ્ટ્રેન્ડેડ RNA)", "-ssRNA (નેગેટિવ સિંગલ-સ્ટ્રેન્ડેડ RNA)", "dsRNA (ડબલ-સ્ટ્રેન્ડેડ RNA)", "mRNA (મેસેઞ્જર RNA)"], "ans": 1, "exp": "નેગેટિવ સિંગલ-સ્ટ્રેન્ડેડ RNA (-ssRNA) વાયરસમાં, RNA ડિપેન્ડન્ટ RNA પોલિમરેઝ ઉત્સેચકની જરૂર પડે છે કારણ કે હોસ્ટ કોષમાં આ RNA ની પ્રતિકૃતિ કરવા માટે આ ઉત્સેચક હાજર હોતું નથી. +ssRNA વાયરસ હોસ્ટ કોષના રાઇબોઝોમ દ્વારા સીધું જ પ્રોટીન સંશ્લેષણ કરાવી શકે છે, જ્યારે dsRNA વાયરસ માટે પણ આ ઉત્સેચક જરૂરી હોય છે પરંતુ પ્રશ્નમાં મ્યુટેશનની સ્થિતિમાં -ssRNA માટે તે અત્યંત મહત્વપૂર્ણ છે.", "ref": "Std 12 - Chapter 6: જૈવ અણુઓ અને જીવનની ઉત્ક્રાંતિ (RNA વાયરસ અને ઉત્સેચક)", "ch": ""}, {"q": "RNA પ્રક્રિયણ (processing) દરમિયાન, કયા RNA પ્રકારમાં 'પોલી-એડેનાઇલેશન' (polyadenylation) થાય છે અને તેનો મુખ્ય હેતુ શો છે?", "opts": ["tRNA, RNA ની સ્થિરતા વધારવા માટે", "rRNA, રાઇબોઝોમની રચનામાં મદદ કરવા માટે", "mRNA, mRNA ની અર્ધ-આયુષ્ય (half-life) વધારવા અને ન્યુક્લિયસથી સાયટોપ્લાઝમમાં પરિવહન સરળ કરવા માટે", "snRNA, RNA સ્પ્લાઇસિંગમાં ભાગ લેવા માટે"], "ans": 2, "exp": "mRNA ની પ્રક્રિયણ દરમિયાન 'પોલી-એડેનાઇલેશન' થાય છે, જેમાં mRNA ના 3’ છેડે એડેનિન ન્યુક્લિયોટાઇડની શૃંખલા ઉમેરાય છે. આ પ્રક્રિયા mRNA ની અર્ધ-આયુષ્ય વધારે છે અને તેને ન્યુક્લિયસથી સાયટોપ્લાઝમમાં પરિવહનમાં મદદ કરે છે. tRNA, rRNA, અને snRNA માં આ પ્રક્રિયા થતી નથી.", "ref": "Std 12 - Chapter 6: જૈવ અણુઓ અને જીવનની ઉત્ક્રાંતિ (RNA પ્રક્રિયણ)", "ch": ""}, {"q": "RNA ની ત્રિજી સંરચનામાં, કયા RNA પ્રકારની સંરચના 'ક્લોવરલીફ મોડેલ' (cloverleaf model) તરીકે ઓળખાય છે અને તેનું કાર્ય શું છે?", "opts": ["mRNA, પ્રોટીન સંશ્લેષણ માટે જનીન સંદેશાવ્યવહાર કરવા", "tRNA, એમિનો એસિડને રાઇબોઝોમ સુધી પહોંચાડવા અને એન્ટીકોડન દ્વારા mRNA ને ઓળખવા", "rRNA, રાઇબોઝોમની રચના અને પ્રોટીન સંશ્લેષણમાં ભાગ લેવા", "snRNA, RNA સ્પ્લાઇસિંગ અને જનીન નિયમનમાં ભાગ લેવા"], "ans": 1, "exp": "tRNA ની ત્રિજી સંરચના 'ક્લોવરલીફ મોડેલ' તરીકે ઓળખાય છે. આ સંરચનામાં, tRNA એમિનો એસિડને રાઇબોઝોમ સુધી પહોંચાડે છે અને તેના એન્ટીકોડન ભાગ દ્વારા mRNA પરના કોડોનને ઓળખે છે. mRNA, rRNA, અને snRNA ની સંરચના અને કાર્ય ભિન્ન હોય છે.", "ref": "Std 12 - Chapter 6: જૈવ અણુઓ અને જીવનની ઉત્ક્રાંતિ (RNA ની સંરચના અને કાર્ય)", "ch": ""}, {"q": "RNA ની ત્રિજી સંરચનામાં, tRNA નું 'એન્ટીકોડન લૂપ' કયા ન્યુક્લિયોટાઇડથી બનેલું હોય છે અને તેનું મુખ્ય કાર્ય શું છે?", "opts": ["7 ન્યુક્લિયોટાઇડથી બનેલું હોય છે અને તે mRNA પરના કોડોન સાથે જોડાઈને પ્રોટીન સંશ્લેષણમાં મદદ કરે છે.", "5 ન્યુક્લિયોટાઇડથી બનેલું હોય છે અને તે rRNA સાથે જોડાઈને રાઇબોઝોમની રચનામાં મદદ કરે છે.", "3 ન્યુક્લિયોટાઇડથી બનેલું હોય છે અને તે DNA ની પ્રતિકૃતિ દરમિયાન મદદ કરે છે.", "9 ન્યુક્લિયોટાઇડથી બનેલું હોય છે અને તે RNA પ્રક્રિયણ દરમિયાન ઇન્ટ્રોન કાપવામાં મદદ કરે છે."], "ans": 0, "exp": "tRNA નું 'એન્ટીકોડન લૂપ' 7 ન્યુક્લિયોટાઇડથી બનેલું હોય છે અને તે mRNA પરના કોડોન સાથે પૂરક જોડાણ બનાવીને પ્રોટીન સંશ્લેષણ દરમિયાન અમીનો એસિડને યોગ્ય સ્થાને મૂકે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) tRNA rRNA સાથે જોડાતું નથી, C) tRNA DNA પ્રતિકૃતિમાં ભાગ લેતું નથી, D) tRNA ઇન્ટ્રોન કાપવામાં ભાગ લેતું નથી.", "ref": "Std 12 - અધ્યાય 6: જૈવ અણુઓ અને પ્રોટીન સંશ્લેષણ", "ch": ""}, {"q": "RNA પ્રક્રિયણ દરમિયાન, કયા RNA પ્રકારમાં 'સ્પ્લાઇસોસોમ' ની ભૂમિકા મહત્વપૂર્ણ હોય છે અને તે કયા પદાર્થોને કાપીને જોડે છે?", "opts": ["mRNA માં, ઇન્ટ્રોન કાપીને એક્સોન જોડે છે.", "tRNA માં, એન્ટીકોડન લૂપ કાપીને D લૂપ જોડે છે.", "rRNA માં, પેપ્ટાઇડ બંધ કાપીને ન્યુક્લિયોટાઇડ જોડે છે.", "snRNA માં, કોડોન કાપીને એન્ટીકોડોન જોડે છે."], "ans": 0, "exp": "RNA પ્રક્રિયણ દરમિયાન, mRNA માં 'સ્પ્લાઇસોસોમ' ઇન્ટ્રોન કાપીને એક્સોન જોડે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) tRNA માં એન્ટીકોડન લૂપ કાપાતો નથી, C) rRNA માં પેપ્ટાઇડ બંધ કાપાતો નથી, D) snRNA માં કોડોન કાપાતો નથી.", "ref": "Std 12 - અધ્યાય 6: જૈવ અણુઓ અને પ્રોટીન સંશ્લેષણ", "ch": ""}, {"q": "નીચેના વિધાનો ધ્યાનમાં લો અને સાચો વિકલ્પ પસંદ કરો:\n\n(1) રાઇબોઝાઇમ્સ (Ribozymes) એ RNA ના એવા અણુઓ છે જે ઉત્સેચકીય પ્રવૃત્તિ દર્શાવે છે અને તે પ્રોટીન આધારિત ઉત્સેચકોની જેમ જ પ્રક્રિયાઓને ઉદ્દીપિત કરે છે.\n(2) રાઇબોઝાઇમ્સની શોધ બાદ એ સ્પષ્ટ થયું કે RNA માત્ર આનુવંશિક માહિતીના વાહક તરીકે જ નહીં, પરંતુ ઉત્સેચક તરીકે પણ કાર્ય કરી શકે છે.\n(3) રાઇબોઝાઇમ્સની પ્રવૃત્તિ માટે Mg²⁺ જેવા ધાતુ આયનોની હાજરી જરૂરી નથી.\n(4) રાઇબોઝાઇમ્સની પ્રવૃત્તિ માત્ર પ્રોકેરિયોટ્સમાં જ જોવા મળે છે, યુકેરિયોટ્સમાં નહીં.", "opts": ["વિધાન (1) અને (2) સાચાં છે, (3) અને (4) ખોટાં છે", "વિધાન (1), (2) અને (3) સાચાં છે, (4) ખોટું છે", "વિધાન (1), (2) અને (4) સાચાં છે, (3) ખોટું છે", "વિધાન (2) અને (3) સાચાં છે, (1) અને (4) ખોટાં છે"], "ans": 0, "exp": "વિધાન (1) અને (2) સાચાં છે કારણ કે રાઇબોઝાઇમ્સ RNA આધારિત ઉત્સેચકો છે જે ઉત્સેચકીય પ્રવૃત્તિ દર્શાવે છે અને આનુવંશિક માહિતીના વાહક તરીકે ઉપરાંત ઉત્સેચક તરીકે પણ કાર્ય કરે છે. વિધાન (3) ખોટું છે કારણ કે રાઇબોઝાઇમ્સની પ્રવૃત્તિ માટે Mg²⁺ જેવા ધાતુ આયનોની હાજરી જરૂરી છે. વિધાન (4) ખોટું છે કારણ કે રાઇબોઝાઇમ્સની પ્રવૃત્તિ પ્રોકેરિયોટ્સ તેમજ યુકેરિયોટ્સ બંનેમાં જોવા મળે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિના આણ્વિક આધારો", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન RNA ના 'રાઇબોસ્વિચ' (Riboswitch) માટે ખોટું છે?", "opts": ["રાઇબોસ્વિચ એ RNA ના એવા ભાગો છે જે ચોક્કસ નાના અણુઓ સાથે જોડાઈને જનીન અભિવ્યક્તિને નિયંત્રિત કરે છે", "રાઇબોસ્વિચની રચનામાં 'એપ્ટામર' અને 'એક્સપ્રેશન પ્લેટફોર્મ' નામના બે મુખ્ય ડોમેઇન હોય છે", "રાઇબોસ્વિચ માત્ર પ્રોકેરિયોટ્સમાં જ જોવા મળે છે અને યુકેરિયોટ્સમાં તેની હાજરી હજુ સુધી પુરવાર થઈ નથી", "રાઇબોસ્વિચની પ્રવૃત્તિ માટે કોઈ પ્રોટીનની જરૂરિયાત હોતી નથી, તે સ્વતંત્ર રીતે કાર્ય કરે છે"], "ans": 2, "exp": "વિકલ્પ C ખોટો છે કારણ કે રાઇબોસ્વિચ માત્ર પ્રોકેરિયોટ્સમાં જ નહીં, પરંતુ કેટલાક યુકેરિયોટ્સમાં પણ જોવા મળે છે. બાકીના વિકલ્પો સાચાં છે: રાઇબોસ્વિચ ચોક્કસ નાના અણુઓ સાથે જોડાઈને જનીન અભિવ્યક્તિને નિયંત્રિત કરે છે, તેમાં 'એપ્ટામર' અને 'એક્સપ્રેશન પ્લેટફોર્મ' ડોમેઇન હોય છે, અને તે પ્રોટીનની મદદ વગર સ્વતંત્ર રીતે કાર્ય કરે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિના આણ્વિક આધારો", "ch": ""}, {"q": "એક સંશોધકને એક અજાણ્યો RNA અણુ મળ્યો છે જે નીચેની લાક્ષણિકતાઓ ધરાવે છે:\n- તે એકલ-શૃંખલા ધરાવે છે પરંતુ કેટલાક વિસ્તારોમાં દ્વિગુણી રચના બનાવે છે.\n- તેમાં 'સ્યુડોયુરિડિન' (ψ) અને 'ડાઇહાઇડ્રોરિડિન' જેવા વિશિષ્ટ ન્યુક્લિયોસાઇડ્સ હાજર છે.\n- તેની લંબાઈ લગભગ 70-90 ન્યુક્લિયોટાઇડ્સની છે.\n- તે કોષકેન્દ્રમાંથી કોષરસમાં સ્થળાંતરિત થાય છે.\n\nઆ RNA નો સંભવિત પ્રકાર કયો હશે અને તેનું મુખ્ય કાર્ય શું હશે?", "opts": ["mRNA - પ્રોટીન સંશ્લેષણ માટે જનીનિક માહિતીનું વહન", "tRNA - એમિનો એસિડને રાઇબોસોમ સુધી પહોંચાડવું", "rRNA - રાઇબોસોમની રચના અને પ્રોટીન સંશ્લેષણમાં ઉત્સેચકીય ભૂમિકા", "snRNA - RNA સ્પ્લાઇસિંગમાં ભાગ લેવો"], "ans": 1, "exp": "આ RNA tRNA (ટ્રાન્સફર RNA) છે. tRNA ની લાક્ષણિકતાઓમાં એકલ-શૃંખલા પરંતુ દ્વિગુણી રચના (હેયરપિન લૂપ), 'સ્યુડોયુરિડિન' અને 'ડાઇહાઇડ્રોરિડિન' જેવા વિશિષ્ટ ન્યુક્લિયોસાઇડ્સ, 70-90 ન્યુક્લિયોટાઇડ્સની લંબાઈ, અને કોષકેન્દ્રમાંથી કોષરસમાં સ્થળાંતરનો સમાવેશ થાય છે. તેનું મુખ્ય કાર્ય એમિનો એસિડને રાઇબોસોમ સુધી પહોંચાડવાનું છે. બાકીના વિકલ્પો આ લાક્ષણિકતાઓ સાથે મેળ ખાતા નથી.", "ref": "Std 11 - પ્રકરણ 6: કોષ: જીવનનો એકમ, Std 12 - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિના આણ્વિક આધારો", "ch": ""}, {"q": "નીચેના પૈકી કયા RNA પ્રકારમાં 'રાઇબોઝ' શર્કરાને બદલે '2'-OH ગ્રુપ' ની જગ્યાએ '2'-F' (ફ્લોરિન) ગ્રુપ હાજર હોય છે, જે તેને ન્યુક્લિયેઝ વિરોધી બનાવે છે?", "opts": ["mRNA", "tRNA", "rRNA", "siRNA"], "ans": 3, "exp": "siRNA (small interfering RNA) માં કૃત્રિમ રીતે '2'-OH ગ્રુપને '2'-F' ગ્રુપથી બદલી શકાય છે, જે તેને ન્યુક્લિયેઝ એન્ઝાઇમ્સ વિરોધી બનાવે છે. mRNA, tRNA, અને rRNA માં આવી રાસાયણિક ફેરફારો સામાન્ય રીતે જોવા મળતા નથી.", "ref": "Std 12 - Chapter 6: આણ્વિક જનીનશાસ્ત્ર (Molecular Genetics)", "ch": ""}, {"q": "RNA વાયરસમાં, જ્યારે તેના જનીનોમાં 'ફ્રેમશિફ્ટ મ્યુટેશન' (frameshift mutation) થાય છે, ત્યારે કયા RNA પ્રકારમાં તેનો સૌથી વધુ પ્રભાવ પડે છે?", "opts": ["(+)ssRNA", "(-)ssRNA", "dsRNA", "mRNA"], "ans": 0, "exp": "(+)ssRNA (પોઝિટિવ સિંગલ-સ્ટ્રેન્ડેડ RNA) વાયરસમાં ફ્રેમશિફ્ટ મ્યુટેશનનો પ્રભાવ સૌથી વધુ પડે છે કારણ કે તે સીધા જ પ્રોટીન સંશ્લેષણમાં વપરાય છે. (-)ssRNA અને dsRNA વાયરસમાં પ્રથમ RNA ની પ્રતિકૃતિ બનાવવામાં આવે છે, જ્યારે mRNA એ કોષીય પ્રક્રિયાનો ભાગ છે.", "ref": "Std 12 - Chapter 7: વાયરસ અને બેક્ટેરિયા (Viruses and Bacteria)", "ch": ""}, {"q": "નીચેના પૈકી કયા RNA પ્રકારમાં 'સેલ્ફ-સ્પ્લાઇસિંગ' (self-splicing) ની ક્રિયા જોવા મળે છે, જે માટે કોઈ ઉત્સેચકની જરૂર પડતી નથી?", "opts": ["mRNA", "tRNA", "rRNA", "Group I અને Group II ઇન્ટ્રોન્સ"], "ans": 3, "exp": "Group I અને Group II ઇન્ટ્રોન્સમાં 'સેલ્ફ-સ્પ્લાઇસિંગ' ની ક્રિયા જોવા મળે છે, જે રાઇબોઝાઇમ (Ribozymes) ની ક્રિયા દ્વારા થાય છે. mRNA, tRNA, અને rRNA માં આવી ક્રિયા જોવા મળતી નથી.", "ref": "Std 12 - Chapter 6: આણ્વિક જનીનશાસ્ત્ર (Molecular Genetics)", "ch": ""}, {"q": "RNA ની સેકન્ડરી સંરચનામાં, કયા RNA પ્રકારમાં 'G-ક્વાડ્રપ્લેક્સ' (G-quadruplex) રચના જોવા મળે છે, જે ગુઆનિન બેઇઝના ચાર જૂથ દ્વારા બને છે?", "opts": ["mRNA", "tRNA", "rRNA", "Telomeric RNA"], "ans": 3, "exp": "Telomeric RNA માં 'G-ક્વાડ્રપ્લેક્સ' રચના જોવા મળે છે, જે ગુઆનિન બેઇઝના ચાર જૂથ દ્વારા બને છે. mRNA, tRNA, અને rRNA માં આવી રચના સામાન્ય રીતે જોવા મળતી નથી.", "ref": "Std 12 - Chapter 6: આણ્વિક જનીનશાસ્ત્ર (Molecular Genetics)", "ch": ""}, {"q": "RNA ની પ્રક્રિયામાં, કયા RNA પ્રકારમાં 'એડિટિંગ' (editing) ની ક્રિયા જોવા મળે છે, જેમાં RNA ની ન્યુક્લિયોટાઇડ ક્રમમાં ફેરફાર થાય છે?", "opts": ["mRNA", "tRNA", "rRNA", "snRNA"], "ans": 0, "exp": "mRNA માં 'RNA એડિટિંગ' ની ક્રિયા જોવા મળે છે, જેમાં RNA ની ન્યુક્લિયોટાઇડ ક્રમમાં ફેરફાર થાય છે. tRNA, rRNA, અને snRNA માં આવી ક્રિયા સામાન્ય રીતે જોવા મળતી નથી.", "ref": "Std 12 - Chapter 6: આણ્વિક જનીનશાસ્ત્ર (Molecular Genetics)", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
