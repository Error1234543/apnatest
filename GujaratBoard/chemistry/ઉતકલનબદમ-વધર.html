<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ઉત્કલનબિંદુમાં વધારો</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ઉત્કલનબિંદુમાં વધારો</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ઉત્કલનબિંદુમાં વધારો</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "જ્યારે કોષરસમાં સક્રિય ક્લોરાઇડ આયનનું પ્રમાણ વધે છે ત્યારે કોષના ઉત્કલનબિંદુમાં શું થાય છે?", "opts": ["ઉત્કલનબિંદુ ઘટે છે કારણ કે ક્લોરાઇડ આયન હાઇડ્રોફિલિક છે.", "ઉત્કલનબિંદુ વધે છે કારણ કે ક્લોરાઇડ આયન કોષરસને વધુ ધ્રુવીય બનાવે છે.", "ઉત્કલનબિંદુ પર કોઈ અસર થતી નથી કારણ કે ક્લોરાઇડ આયન નિષ્ક્રિય છે.", "ઉત્કલનબિંદુ ઘટે છે કારણ કે ક્લોરાઇડ આયન કોષરસમાં પાણીના પ્રમાણને ઘટાડે છે."], "ans": 1, "exp": "ક્લોરાઇડ આયન (Cl⁻) હાઇડ્રોફિલિક છે અને કોષરસને વધુ ધ્રુવીય બનાવે છે, જેના કારણે કોષમાં પાણીનું પ્રમાણ વધે છે. પાણીના પ્રમાણમાં વધારાથી કોષના ઉત્કલનબિંદુમાં વધારો થાય છે. વિકલ્પ A ખોટો છે કારણ કે ક્લોરાઇડ આયન હાઇડ્રોફિલિક હોવા છતાં ઉત્કલનબિંદુ ઘટતો નથી. વિકલ્પ C ખોટો છે કારણ કે ક્લોરાઇડ આયન કોષરસ પર અસર કરે છે. વિકલ્પ D ખોટો છે કારણ કે ક્લોરાઇડ આયન પાણીનું પ્રમાણ ઘટાડતું નથી, ઉલટાનું વધારે છે.", "ref": "Std 12 - પ્રકરણ 11: વનસ્પતિ શરીરક્રિયા (પાણી અને ખનીજ પોષણ)", "ch": ""}, {"q": "કોષરસમાં સુગરના સાંદ્રતામાં વધારો થવાથી ઉત્કલનબિંદુ પર શું અસર પડે છે?", "opts": ["ઉત્કલનબિંદુ ઘટે છે કારણ કે સુગર હાઇડ્રોફોબિક છે.", "ઉત્કલનબિંદુ વધે છે કારણ કે સુગર કોષરસને વધુ સાંદ્ર બનાવે છે.", "ઉત્કલનબિંદુ પર કોઈ ફેરફાર થતો નથી કારણ કે સુગર નિષ્ક્રિય છે.", "ઉત્કલનબિંદુ ઘટે છે કારણ કે સુગર કોષરસમાં પાણી સાથે જોડાઈ જાય છે."], "ans": 1, "exp": "સુગર (કાર્બોદિત) કોષરસને વધુ સાંદ્ર બનાવે છે, જેના કારણે કોષમાં પાણીનું પ્રમાણ ઘટે છે અને ઉત્કલનબિંદુ વધે છે. વિકલ્પ A ખોટો છે કારણ કે સુગર હાઇડ્રોફિલિક છે, હાઇડ્રોફોબિક નહીં. વિકલ્પ C ખોટો છે કારણ કે સુગર કોષરસ પર અસર કરે છે. વિકલ્પ D ખોટો છે કારણ કે સુગર પાણી સાથે જોડાઈને કોષરસને વધુ સાંદ્ર બનાવે છે, જે ઉત્કલનબિંદુ વધારે છે.", "ref": "Std 12 - પ્રકરણ 11: વનસ્પતિ શરીરક્રિયા (પાણી અને ખનીજ પોષણ)", "ch": ""}, {"q": "જ્યારે કોષમાં પ્રોટીનનું પ્રમાણ વધે છે ત્યારે ઉત્કલનબિંદુ પર શું અસર પડે છે?", "opts": ["ઉત્કલનબિંદુ ઘટે છે કારણ કે પ્રોટીન હાઇડ્રોફોબિક છે.", "ઉત્કલનબિંદુ વધે છે કારણ કે પ્રોટીન કોષરસને વધુ કોલોઇડલ બનાવે છે.", "ઉત્કલનબિંદુ પર કોઈ અસર થતી નથી કારણ કે પ્રોટીન નિષ્ક્રિય છે.", "ઉત્કલનબિંદુ ઘટે છે કારણ કે પ્રોટીન કોષરસમાં પાણીનું પ્રમાણ ઘટાડે છે."], "ans": 1, "exp": "પ્રોટીન કોષરસને વધુ કોલોઇડલ બનાવે છે, જેના કારણે કોષમાં પાણીનું પ્રમાણ ઘટે છે અને ઉત્કલનબિંદુ વધે છે. વિકલ્પ A ખોટો છે કારણ કે પ્રોટીન હાઇડ્રોફિલિક છે, હાઇડ્રોફોબિક નહીં. વિકલ્પ C ખોટો છે કારણ કે પ્રોટીન કોષરસ પર અસર કરે છે. વિકલ્પ D ખોટો છે કારણ કે પ્રોટીન પાણીનું પ્રમાણ ઘટાડે છે, પરંતુ તેના કારણે ઉત્કલનબિંદુ વધે છે, ઘટતો નથી.", "ref": "Std 12 - પ્રકરણ 11: વનસ્પતિ શરીરક્રિયા (પાણી અને ખનીજ પોષણ)", "ch": ""}, {"q": "કોષરસમાં કેલ્શિયમ આયનના પ્રમાણમાં વધારો થવાથી ઉત્કલનબિંદુ પર શું અસર પડે છે?", "opts": ["ઉત્કલનબિંદુ ઘટે છે કારણ કે કેલ્શિયમ આયન હાઇડ્રોફોબિક છે.", "ઉત્કલનબિંદુ વધે છે કારણ કે કેલ્શિયમ આયન કોષરસને વધુ સાંદ્ર બનાવે છે.", "ઉત્કલનબિંદુ પર કોઈ અસર થતી નથી કારણ કે કેલ્શિયમ આયન નિષ્ક્રિય છે.", "ઉત્કલનબિંદુ ઘટે છે કારણ કે કેલ્શિયમ આયન કોષરસમાં પાણી સાથે જોડાઈ જાય છે."], "ans": 1, "exp": "કેલ્શિયમ આયન (Ca²⁺) કોષરસને વધુ સાંદ્ર બનાવે છે, જેના કારણે કોષમાં પાણીનું પ્રમાણ ઘટે છે અને ઉત્કલનબિંદુ વધે છે. વિકલ્પ A ખોટો છે કારણ કે કેલ્શિયમ આયન હાઇડ્રોફિલિક છે, હાઇડ્રોફોબિક નહીં. વિકલ્પ C ખોટો છે કારણ કે કેલ્શિયમ આયન કોષરસ પર અસર કરે છે. વિકલ્પ D ખોટો છે કારણ કે કેલ્શિયમ આયન પાણી સાથે જોડાઈને કોષરસને વધુ સાંદ્ર બનાવે છે, જે ઉત્કલનબિંદુ વધારે છે.", "ref": "Std 12 - પ્રકરણ 11: વનસ્પતિ શરીરક્રિયા (પાણી અને ખનીજ પોષણ)", "ch": ""}, {"q": "જ્યારે કોષમાં ગ્લિસરોલનું પ્રમાણ વધે છે ત્યારે ઉત્કલનબિંદુ પર શું અસર પડે છે?", "opts": ["ઉત્કલનબિંદુ ઘટે છે કારણ કે ગ્લિસરોલ હાઇડ્રોફોબિક છે.", "ઉત્કલનબિંદુ વધે છે કારણ કે ગ્લિસરોલ કોષરસને વધુ સાંદ્ર બનાવે છે.", "ઉત્કલનબિંદુ પર કોઈ અસર થતી નથી કારણ કે ગ્લિસરોલ નિષ્ક્રિય છે.", "ઉત્કલનબિંદુ ઘટે છે કારણ કે ગ્લિસરોલ કોષરસમાં પાણી સાથે જોડાઈ જાય છે."], "ans": 1, "exp": "ગ્લિસરોલ કોષરસને વધુ સાંદ્ર બનાવે છે, જેના કારણે કોષમાં પાણીનું પ્રમાણ ઘટે છે અને ઉત્કલનબિંદુ વધે છે. વિકલ્પ A ખોટો છે કારણ કે ગ્લિસરોલ હાઇડ્રોફિલિક છે, હાઇડ્રોફોબિક નહીં. વિકલ્પ C ખોટો છે કારણ કે ગ્લિસરોલ કોષરસ પર અસર કરે છે. વિકલ્પ D ખોટો છે કારણ કે ગ્લિસરોલ પાણી સાથે જોડાઈને કોષરસને વધુ સાંદ્ર બનાવે છે, જે ઉત્કલનબિંદુ વધારે છે.", "ref": "Std 12 - પ્રકરણ 11: વનસ્પતિ શરીરક્રિયા (પાણી અને ખનીજ પોષણ)", "ch": ""}, {"q": "જ્યારે કોષરસમાં યુરિયા (CO(NH₂)₂) નું પ્રમાણ વધારવામાં આવે છે, ત્યારે ઉત્કલનબિંદુ પર કયો પ્રભાવ જોવા મળે છે?", "opts": ["ઉત્કલનબિંદુ ઘટે છે કારણ કે યુરિયા હાઇડ્રોફિલિક છે અને પાણીના અણુઓ સાથે હાઇડ્રોજન બંધ બનાવે છે.", "ઉત્કલનબિંદુ વધે છે કારણ કે યુરિયા કોષરસમાં આયનિક સાંદ્રતા વધારે છે.", "ઉત્કલનબિંદુ પર કોઈ ફેરફાર થતો નથી કારણ કે યુરિયા નિષ્ક્રિય પદાર્થ છે.", "ઉત્કલનબિંદુ ઘટે છે કારણ કે યુરિયા કોષરસની સ્થિરતા ઘટાડે છે."], "ans": 0, "exp": "યુરિયા હાઇડ્રોફિલિક પદાર્થ છે અને પાણીના અણુઓ સાથે હાઇડ્રોજન બંધ બનાવી શકે છે, જેથી પાણીના અણુઓની ગતિ ઘટે છે અને ઉત્કલનબિંદુ ઘટે છે. બાકીના વિકલ્પો ખોટા છે: B) યુરિયા આયનિક નથી, C) યુરિયા નિષ્ક્રિય નથી, D) યુરિયા સ્થિરતા ઘટાડતું નથી પરંતુ હાઇડ્રોજન બંધ દ્વારા અસર કરે છે.", "ref": "Std 12 - Chapter 2: કોષ અને કોષરચના", "ch": ""}, {"q": "કોષરસમાં મેગ્નેશિયમ ક્લોરાઇડ (MgCl₂) નું પ્રમાણ વધારવાથી ઉત્કલનબિંદુ પર કયો પ્રભાવ થાય છે?", "opts": ["ઉત્કલનબિંદુ ઘટે છે કારણ કે MgCl₂ પાણી સાથે હાઇડ્રોજન બંધ બનાવે છે.", "ઉત્કલનબિંદુ વધે છે કારણ કે MgCl₂ કોષરસમાં આયનિક સાંદ્રતા વધારે છે.", "ઉત્કલનબિંદુ પર કોઈ અસર થતી નથી કારણ કે MgCl₂ નિષ્ક્રિય છે.", "ઉત્કલનબિંદુ ઘટે છે કારણ કે MgCl₂ કોષરસની સ્થિરતા વધારે છે."], "ans": 1, "exp": "MgCl₂ આયનિક યોગિક છે અને કોષરસમાં આયનિક સાંદ્રતા વધારે છે, જેથી પાણીના અણુઓની ગતિ ઘટે છે અને ઉત્કલનબિંદુ વધે છે. બાકીના વિકલ્પો ખોટા છે: A) MgCl₂ હાઇડ્રોજન બંધ બનાવતું નથી, C) MgCl₂ નિષ્ક્રિય નથી, D) સ્થિરતા વધારવી એ ઉત્કલનબિંદુ ઘટાડવાનું કારણ નથી.", "ref": "Std 12 - Chapter 2: કોષ અને કોષરચના", "ch": ""}, {"q": "જ્યારે કોષરસમાં ગ્લુકોઝ અને સુક્રોઝના મિશ્રણનું પ્રમાણ વધારવામાં આવે છે, ત્યારે ઉત્કલનબિંદુ પર કયો પ્રભાવ જોવા મળે છે?", "opts": ["ઉત્કલનબિંદુ ઘટે છે કારણ કે ગ્લુકોઝ અને સુક્રોઝ બંને હાઇડ્રોફિલિક છે.", "ઉત્કલનબિંદુ વધે છે કારણ કે ગ્લુકોઝ અને સુક્રોઝ કોષરસમાં આયનિક સાંદ્રતા વધારે છે.", "ઉત્કલનબિંદુ પર કોઈ ફેરફાર થતો નથી કારણ કે ગ્લુકોઝ અને સુક્રોઝ નિષ્ક્રિય પદાર્થો છે.", "ઉત્કલનબિંદુ ઘટે છે કારણ કે ગ્લુકોઝ અને સુક્રોઝ કોષરસની સ્થિરતા ઘટાડે છે."], "ans": 0, "exp": "ગ્લુકોઝ અને સુક્રોઝ બંને હાઇડ્રોફિલિક કાર્બોદિત છે અને પાણીના અણુઓ સાથે હાઇડ્રોજન બંધ બનાવી શકે છે, જેથી પાણીના અણુઓની ગતિ ઘટે છે અને ઉત્કલનબિંદુ ઘટે છે. બાકીના વિકલ્પો ખોટા છે: B) ગ્લુકોઝ અને સુક્રોઝ આયનિક નથી, C) તે નિષ્ક્રિય નથી, D) સ્થિરતા ઘટાડવી એ ઉત્કલનબિંદુ ઘટાડવાનું કારણ નથી.", "ref": "Std 12 - Chapter 2: કોષ અને કોષરચના", "ch": ""}, {"q": "કોષરસમાં પોટેશિયમ નાઇટ્રેટ (KNO₃) નું પ્રમાણ વધારવાથી ઉત્કલનબિંદુ પર કયો પ્રભાવ થાય છે?", "opts": ["ઉત્કલનબિંદુ ઘટે છે કારણ કે KNO₃ પાણી સાથે હાઇડ્રોજન બંધ બનાવે છે.", "ઉત્કલનબિંદુ વધે છે કારણ કે KNO₃ કોષરસમાં આયનિક સાંદ્રતા વધારે છે.", "ઉત્કલનબિંદુ પર કોઈ અસર થતી નથી કારણ કે KNO₃ નિષ્ક્રિય છે.", "ઉત્કલનબિંદુ ઘટે છે કારણ કે KNO₃ કોષરસની સ્થિરતા વધારે છે."], "ans": 1, "exp": "KNO₃ આયનિક યોગિક છે અને કોષરસમાં આયનિક સાંદ્રતા વધારે છે, જેથી પાણીના અણુઓની ગતિ ઘટે છે અને ઉત્કલનબિંદુ વધે છે. બાકીના વિકલ્પો ખોટા છે: A) KNO₃ હાઇડ્રોજન બંધ બનાવતું નથી, C) KNO₃ નિષ્ક્રિય નથી, D) સ્થિરતા વધારવી એ ઉત્કલનબિંદુ ઘટાડવાનું કારણ નથી.", "ref": "Std 12 - Chapter 2: કોષ અને કોષરચના", "ch": ""}, {"q": "જ્યારે કોષરસમાં ઇથિલીન ગ્લાયકોલ (C₂H₆O₂) નું પ્રમાણ વધારવામાં આવે છે, ત્યારે ઉત્કલનબિંદુ પર કયો પ્રભાવ જોવા મળે છે?", "opts": ["ઉત્કલનબિંદુ ઘટે છે કારણ કે ઇથિલીન ગ્લાયકોલ હાઇડ્રોફોબિક છે.", "ઉત્કલનબિંદુ વધે છે કારણ કે ઇથિલીન ગ્લાયકોલ કોષરસમાં આયનિક સાંદ્રતા વધારે છે.", "ઉત્કલનબિંદુ ઘટે છે કારણ કે ઇથિલીન ગ્લાયકોલ હાઇડ્રોફિલિક છે અને પાણીના અણુઓ સાથે હાઇડ્રોજન બંધ બનાવે છે.", "ઉત્કલનબિંદુ પર કોઈ ફેરફાર થતો નથી કારણ કે ઇથિલીન ગ્લાયકોલ નિષ્ક્રિય પદાર્થ છે."], "ans": 2, "exp": "ઇથિલીન ગ્લાયકોલ હાઇડ્રોફિલિક પદાર્થ છે અને પાણીના અણુઓ સાથે હાઇડ્રોજન બંધ બનાવી શકે છે, જેથી પાણીના અણુઓની ગતિ ઘટે છે અને ઉત્કલનબિંદુ ઘટે છે. બાકીના વિકલ્પો ખોટા છે: A) ઇથિલીન ગ્લાયકોલ હાઇડ્રોફોબિક નથી, B) તે આયનિક નથી, D) તે નિષ્ક્રિય નથી.", "ref": "Std 12 - Chapter 2: કોષ અને કોષરચના", "ch": ""}, {"q": "જ્યારે કોષરસમાં સોડિયમ ક્લોરાઇડ (NaCl) અને કેલ્શિયમ ક્લોરાઇડ (CaCl2) ના સમપ્રમાણ મિશ્રણનો ઉમેરો કરવામાં આવે છે, ત્યારે ઉત્કલનબિંદુમાં થતો વધારો કયા ક્રમનો હશે?", "opts": ["NaCl ના એકલા ઉમેરા કરતાં ઓછો", "CaCl2 ના એકલા ઉમેરા કરતાં વધુ", "NaCl અને CaCl2 ના એકલા ઉમેરા કરતાં વધુ", "NaCl અને CaCl2 ના એકલા ઉમેરા કરતાં સરખો"], "ans": 2, "exp": "સોડિયમ ક્લોરાઇડ (NaCl) બે આયનો (Na+ અને Cl-) આપે છે, જ્યારે કેલ્શિયમ ક્લોરાઇડ (CaCl2) ત્રણ આયનો (Ca2+ અને 2Cl-) આપે છે. મિશ્રણમાં આયનની સંખ્યા વધવાને કારણે કોલિગેટિવ ગુણધર્મ (ઉત્કલનબિંદુમાં વધારો) વધુ પ્રભાવિત થાય છે. આથી મિશ્રણનો પ્રભાવ NaCl અથવા CaCl2 એકલા કરતાં વધુ હશે. A અને B ખોટા છે કારણ કે મિશ્રણનો પ્રભાવ એકલા કોઈપણ કરતાં ઓછો નહીં હોય. D ખોટો છે કારણ કે મિશ્રણનો પ્રભાવ સરખો નહીં હોય, પરંતુ વધુ હશે.", "ref": "Std 12 - અભ્યાસક્રમ 11: રસાયણવિજ્ઞાન (ભાગ-2) - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "કોષરસમાં ગ્લુકોઝ અને યુરિયાનું મિશ્રણ ઉમેરવામાં આવે છે. જો ગ્લુકોઝનું પ્રમાણ યુરિયા કરતાં દુપ્પટ હોય, તો ઉત્કલનબિંદુમાં થતો વધારો કયા પરિબળ પર આધાર રાખશે?", "opts": ["ગ્લુકોઝના મોલર દળ પર", "યુરિયાના મોલર દળ પર", "દ્રાવણમાં કુલ કણોની સંખ્યા પર", "દ્રાવણના તાપમાન પર"], "ans": 2, "exp": "ઉત્કલનબિંદુમાં વધારો કોલિગેટિવ ગુણધર્મ છે, જે દ્રાવણમાં કુલ કણોની સંખ્યા (મોલની સંખ્યા) પર આધાર રાખે છે, મોલર દળ પર નહીં. ગ્લુકોઝ અને યુરિયા બંને અ-વિદ્યુતવિભાજ્ય પદાર્થો છે, આથી તેમના મોલર દળ કરતાં તેમની મોલર સાંદ્રતા મહત્વની છે. A અને B ખોટા છે કારણ કે મોલર દળ પર આધાર રાખતું નથી. D ખોટો છે કારણ કે તાપમાન પર આધાર રાખતું નથી, પરંતુ કણોની સંખ્યા પર રાખે છે.", "ref": "Std 12 - અભ્યાસક્રમ 11: રસાયણવિજ્ઞાન (ભાગ-2) - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "જ્યારે કોષરસમાં સક્રિય પદાર્થ તરીકે મિથેનોલ (CH3OH) ઉમેરવામાં આવે છે, ત્યારે ઉત્કલનબિંદુમાં થતો વધારો કયા કિસ્સામાં સૌથી ઓછો હશે?", "opts": ["જ્યારે મિથેનોલનું પ્રમાણ 1% હોય", "જ્યારે મિથેનોલનું પ્રમાણ 5% હોય", "જ્યારે મિથેનોલનું પ્રમાણ 10% હોય", "જ્યારે મિથેનોલનું પ્રમાણ 0.1% હોય"], "ans": 3, "exp": "ઉત્કલનબિંદુમાં વધારો દ્રાવણમાં દ્રાવ્ય પદાર્થની સાંદ્રતા પર આધાર રાખે છે. જેમ સાંદ્રતા ઓછી હશે, તેમ ઉત્કલનબિંદુમાં વધારો ઓછો હશે. આથી 0.1% સાંદ્રતામાં વધારો સૌથી ઓછો હશે. A, B, અને C ખોટા છે કારણ કે તેમાં સાંદ્રતા વધુ હોવાથી ઉત્કલનબિંદુમાં વધારો વધુ હશે.", "ref": "Std 12 - અભ્યાસક્રમ 11: રસાયણવિજ્ઞાન (ભાગ-2) - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "કોષરસમાં ઉત્કલનબિંદુમાં વધારો કરવા માટે કયા પદાર્થનો ઉપયોગ સૌથી અસરકારક હશે જ્યારે તેની મોલલ સાંદ્રતા સરખી રાખવામાં આવે?", "opts": ["ગ્લુકોઝ (C6H12O6)", "સુક્રોઝ (C12H22O11)", "કેલ્શિયમ ક્લોરાઇડ (CaCl2)", "યુરિયા (CO(NH2)2)"], "ans": 2, "exp": "ઉત્કલનબિંદુમાં વધારો કોલિગેટિવ ગુણધર્મ છે, જે દ્રાવણમાં કણોની સંખ્યા પર આધાર રાખે છે. કેલ્શિયમ ક્લોરાઇડ (CaCl2) ત્રણ આયનો (Ca2+ અને 2Cl-) આપે છે, જ્યારે ગ્લુકોઝ, સુક્રોઝ, અને યુરિયા અ-વિદ્યુતવિભાજ્ય પદાર્થો છે અને એક કણ આપે છે. આથી CaCl2 સૌથી અસરકારક હશે. A, B, અને D ખોટા છે કારણ કે તેઓ ઓછા કણો આપે છે.", "ref": "Std 12 - અભ્યાસક્રમ 11: રસાયણવિજ્ઞાન (ભાગ-2) - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "જ્યારે કોષરસમાં પોટેશિયમ સલ્ફેટ (K2SO4) અને મેગ્નેશિયમ સલ્ફેટ (MgSO4) ના સમપ્રમાણ મિશ્રણનો ઉમેરો કરવામાં આવે છે, ત્યારે ઉત્કલનબિંદુમાં થતો વધારો કયા કિસ્સામાં સૌથી વધુ હશે?", "opts": ["જ્યારે મિશ્રણની મોલલ સાંદ્રતા 0.1 m હોય", "જ્યારે મિશ્રણની મોલલ સાંદ્રતા 0.5 m હોય", "જ્યારે મિશ્રણની મોલલ સાંદ્રતા 1.0 m હોય", "જ્યારે મિશ્રણની મોલલ સાંદ્રતા 0.01 m હોય"], "ans": 2, "exp": "ઉત્કલનબિંદુમાં વધારો દ્રાવણમાં કણોની સંખ્યા પર આધાર રાખે છે. જેમ મોલલ સાંદ્રતા વધુ હશે, તેમ કણોની સંખ્યા વધુ હશે અને ઉત્કલનબિંદુમાં વધારો પણ વધુ હશે. આથી 1.0 m સાંદ્રતામાં વધારો સૌથી વધુ હશે. A, B, અને D ખોટા છે કારણ કે તેમાં સાંદ્રતા ઓછી હોવાથી ઉત્કલનબિંદુમાં વધારો ઓછો હશે.", "ref": "Std 12 - અભ્યાસક્રમ 11: રસાયણવિજ્ઞાન (ભાગ-2) - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "જ્યારે કોષરસમાં સોડિયમ એસિટેટ (CH3COONa) અને કેલ્શિયમ એસિટેટ (Ca(CH3COO)2) ના સમપ્રમાણ મિશ્રણને ઉમેરવામાં આવે છે, ત્યારે ઉત્કલનબિંદુ પર કયો પ્રભાવ જોવા મળશે?", "opts": ["ઉત્કલનબિંદુમાં નોંધપાત્ર વધારો થશે, કારણ કે બંને ક્ષારો અયનીભવન પામે છે અને કણોની સંખ્યામાં વધારો થાય છે.", "ઉત્કલનબિંદુમાં ઘટાડો થશે, કારણ કે એસિટેટ આયન હાઇડ્રોજન બંધન તોડી શકે છે.", "ઉત્કલનબિંદુમાં કોઈ ફેરફાર થશે નહીં, કારણ કે એસિટેટ ક્ષારો ઉત્કલનબિંદુ પર અસર કરતા નથી.", "ઉત્કલનબિંદુમાં થોડો ઘટાડો થશે, કારણ કે સોડિયમ એસિટેટ અને કેલ્ function renderQ(){

  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';

}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
