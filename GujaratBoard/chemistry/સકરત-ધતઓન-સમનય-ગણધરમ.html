<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>સંક્રાંતિ ધાતુઓનાં સામાન્ય ગુણધર્મો</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>સંક્રાંતિ ધાતુઓનાં સામાન્ય ગુણધર્મો</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">સંક્રાંતિ ધાતુઓનાં સામાન્ય ગુણધર્મો</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 19 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 19 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "સંક્રાંતિ ધાતુઓના સંદર્ભમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["સંક્રાંતિ ધાતુઓ સામાન્ય રીતે રંગીન સંયોજનો બનાવે છે કારણ કે d-કક્ષકોમાં ઇલેક્ટ્રોનની ઉત્તેજના થાય છે.", "Zn, Cd અને Hg સંક્રાંતિ ધાતુઓ નથી કારણ કે તેમની d-કક્ષકો સંપૂર્ણ ભરાયેલી હોય છે.", "સંક્રાંતિ ધાતુઓ ઉચ્ચ ગલનબિંદુ અને ઉત્કલનબિંદુ ધરાવે છે કારણ કે તેમની ધાત્વીય બંધનમાં d-ઇલેક્ટ્રોનનો ફાળો હોય છે.", "સંક્રાંતિ ધાતુઓના આયનો સામાન્ય રીતે અનુચુંબકીય ગુણધર્મ દર્શાવે છે કારણ કે તેમની d-કક્ષકોમાં અયુગ્મિત ઇલેક્ટ્રોન હોય છે."], "ans": 1, "exp": "વિકલ્પ B ખોટો છે કારણ કે Zn, Cd અને Hg પણ સંક્રાંતિ ધાતુઓ તરીકે ગણવામાં આવે છે, પરંતુ તેમની d-કક્ષકો સંપૂર્ણ ભરાયેલી હોવાથી તેઓ વિશિષ્ટ ગુણધર્મો દર્શાવતા નથી. બાકીના વિકલ્પો સાચા છે: A) d-કક્ષકોમાં ઇલેક્ટ્રોનની ઉત્તેજનાથી રંગીન સંયોજનો બને છે. C) d-ઇલેક્ટ્રોનના કારણે ઉચ્ચ ગલનબિંદુ અને ઉત્કલનબિંદુ હોય છે. D) અયુગ્મિત ઇલેક્ટ્રોનના કારણે અનુચુંબકીય ગુણધર્મ દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 8: d- અને f-વિભાગના તત્ત્વો", "ch": ""}, {"q": "નીચેનામાંથી કયું તત્ત્વ સંક્રાંતિ ધાતુ નથી, પરંતુ તેના ગુણધર્મો સંક્રાંતિ ધાતુઓ જેવા છે?", "opts": ["Mn", "Zn", "Sc", "Cu"], "ans": 1, "exp": "Zn સંક્રાંતિ ધાતુ નથી કારણ કે તેની d-કક્ષક સંપૂર્ણ ભરાયેલી હોય છે, પરંતુ તેના કેટલાક ગુણધર્મો (જેમ કે સંકીર્ણ સંયોજનો બનાવવાની ક્ષમતા) સંક્રાંતિ ધાતુઓ જેવા હોય છે. બાકીના વિકલ્પો (Mn, Sc, Cu) સાચી સંક્રાંતિ ધાતુઓ છે.", "ref": "Std 12 - પ્રકરણ 8: d- અને f-વિભાગના તત્ત્વો", "ch": ""}, {"q": "સંક્રાંતિ ધાતુઓના સંદર્ભમાં નીચેનાં વિધાનો ધ્યાનમાં લો:\n1. સંક્રાંતિ ધાતુઓ ઉચ્ચ વિદ્યુતવાહકતા ધરાવે છે.\n2. સંક્રાંતિ ધાતુઓના આયનો સામાન્ય રીતે રંગહીન હોય છે.\n3. સંક્રાંતિ ધાતુઓ વિવિધ ઓક્સિડેશન અવસ્થાઓ દર્શાવે છે.\nઉપરોક્ત વિધાનોમાંથી કયાં સાચાં છે?", "opts": ["માત્ર 1 અને 2", "માત્ર 1 અને 3", "માત્ર 2 અને 3", "1, 2 અને 3"], "ans": 1, "exp": "વિધાન 1 અને 3 સાચાં છે: સંક્રાંતિ ધાતુઓ ઉચ્ચ વિદ્યુતવાહકતા ધરાવે છે અને વિવિધ ઓક્સિડેશન અવસ્થાઓ દર્શાવે છે. વિધાન 2 ખોટું છે કારણ કે સંક્રાંતિ ધાતુઓના આયનો સામાન્ય રીતે રંગીન હોય છે (d-d સંક્રમણને કારણે).", "ref": "Std 12 - પ્રકરણ 8: d- અને f-વિભાગના તત્ત્વો", "ch": ""}, {"q": "નીચેનામાંથી કયું સંયોજન સંક્રાંતિ ધાતુનું નથી, પરંતુ તેનો ઉપયોગ ઉદ્યોગોમાં ઉત્સેચક તરીકે થાય છે?", "opts": ["KMnO₄", "K₂Cr₂O₇", "ZnSO₄", "FeSO₄"], "ans": 2, "exp": "ZnSO₄ સંક્રાંતિ ધાતુ Znનું સંયોજન છે, પરંતુ Znની d-કક્ષક સંપૂર્ણ ભરાયેલી હોવાથી તે સંક્રાંતિ ધાતુના વિશિષ્ટ ગુણધર્મો દર્શાવતું નથી. તેમ છતાં, Znનો ઉપયોગ ઉદ્યોગોમાં ઉત્સેચક તરીકે થાય છે. બાકીના વિકલ્પો (KMnO₄, K₂Cr₂O₇, FeSO₄) સંક્રાંતિ ધાતુઓના સંયોજનો છે.", "ref": "Std 12 - પ્રકરણ 8: d- અને f-વિભાગના તત્ત્વો", "ch": ""}, {"q": "સંક્રાંતિ ધાતુઓના આયનોના રંગ વિશે નીચેનાં વિધાનો ધ્યાનમાં લો:\n1. [Ti(H₂O)₆]³⁺ જાંબલી રંગનો છે.\n2. [Cu(NH₃)₄]²⁺ ઘેરો વાદળી રંગનો છે.\n3. [Fe(CN)₆]⁴⁻ રંગહીન છે.\nઉપરોક્ત વિધાનોમાંથી કયું/કયાં ખોટું/ખોટાં છે?", "opts": ["માત્ર 1", "માત્ર 3", "1 અને 2", "2 અને 3"], "ans": 1, "exp": "વિધાન 3 ખોટું છે કારણ કે [Fe(CN)₆]⁴⁻ આયન આછો પીળો રંગ ધરાવે છે, રંગહીન નથી. વિધાન 1 અને 2 સાચાં છે: [Ti(H₂O)₆]³⁺ જાંબલી રંગનો અને [Cu(NH₃)₄]²⁺ ઘેરો વાદળી રંગનો હોય છે.", "ref": "Std 12 - પ્રકરણ 9: સવર્ગ સંયોજનો", "ch": ""}, {"q": "સંક્રાંતિ ધાતુઓના સંદર્ભમાં નીચેનાં વિધાનો ધ્યાનમાં લો: (1) Zn, Cd અને Hg ની પ્રથમ આયનીકરણ ઊર્જા અન્ય સંક્રાંતિ ધાતુઓ કરતાં વધુ હોય છે. (2) Zn, Cd અને Hg ની d-કક્ષામાં સંપૂર્ણ ભરાયેલી ઇલેક્ટ્રોન રચના હોવાથી તેમની ચુંબકીય પ્રકૃતિ અન્ય સંક્રાંતિ ધાતુઓ કરતાં અલગ હોય છે. (3) Zn, Cd અને Hg ની ઓક્સિડેશન અવસ્થા +2 સિવાય અન્ય અવસ્થાઓમાં જોવા મળતી નથી. ઉપરોક્ત વિધાનોમાંથી કયાં વિધાનો સાચાં છે?", "opts": ["ફક્ત (1) અને (2)", "ફક્ત (2) અને (3)", "ફક્ત (1) અને (3)", "(1), (2) અને (3)"], "ans": 3, "exp": "(1) સાચું છે કારણ કે Zn, Cd અને Hg ની d-કક્ષા સંપૂર્ણ ભરાયેલી હોવાથી તેમની પ્રથમ આયનીકરણ ઊર્જા વધુ હોય છે. (2) સાચું છે કારણ કે તેમની d-કક્ષામાં અયુગ્મિત ઇલેક્ટ્રોન ન હોવાથી તેઓ પ્રતિચુંબકીય હોય છે, જ્યારે અન્ય સંક્રાંતિ ધાતુઓ અનુચુંબકીય હોય છે. (3) સાચું છે કારણ કે Zn, Cd અને Hg ની d-કક્ષા સંપૂર્ણ ભરાયેલી હોવાથી તેમની ઓક્સિડેશન અવસ્થા માત્ર +2 જોવા મળે છે. અન્ય અવસ્થાઓમાં d-કક્ષામાંથી ઇલેક્ટ્રોન દૂર કરવા અત્યંત મુશ્કેલ હોય છે.", "ref": "Std 12 - પ્રકરણ 8: d અને f-વિભાગનાં તત્ત્વો", "ch": ""}, {"q": "નીચેનામાંથી કયું સંયોજન સંક્રાંતિ ધાતુનું નથી, પરંતુ તેના ગુણધર્મો સંક્રાંતિ ધાતુ સંયોજનો જેવા છે અને તેનો ઉપયોગ ઉદ્યોગોમાં ઉત્પ્રેરક તરીકે થાય છે?", "opts": ["TiCl₄", "V₂O₅", "AlCl₃", "MnO₂"], "ans": 2, "exp": "AlCl₃ એ સંક્રાંતિ ધાતુનું સંયોજન નથી, પરંતુ તે લુઇસ ઍસિડ તરીકે વર્તે છે અને ફ્રિડલ-ક્રાફ્ટ્સ પ્રક્રિયામાં ઉત્પ્રેરક તરીકે વપરાય છે, જે સંક્રાંતિ ધાતુ સંયોજનોના ઉત્પ્રેરક ગુણધર્મો જેવું છે. TiCl₄, V₂O₅ અને MnO₂ સંક્રાંતિ ધાતુઓના સંયોજનો છે અને ઉત્પ્રેરક તરીકે વપરાય છે.", "ref": "Std 12 - પ્રકરણ 8: d અને f-વિભાગનાં તત્ત્વો", "ch": ""}, {"q": "સંક્રાંતિ ધાતુઓની ઉચ્ચ ગલનબિંદુ અને ઉત્કલનબિંદુ માટે નીચેનામાંથી કયું કારણ જવાબદાર નથી?", "opts": ["ધાત્વીય બંધનની પ્રબળતા", "d-કક્ષામાં અયુગ્મિત ઇલેક્ટ્રોનની હાજરી", "સ્ફટિક રચનામાં નાના પરમાણુ કદ", "ઉચ્ચ આયનીકરણ ઊર્જા"], "ans": 3, "exp": "સંક્રાંતિ ધાતુઓની ઉચ્ચ ગલનબિંદુ અને ઉત્કલનબિંદુ માટે ધાત્વીય બંધનની પ્રબળતા (A), d-કક્ષામાં અયુગ્મિત ઇલેક્ટ્રોનની હાજરી (B) અને સ્ફટિક રચનામાં નાના પરમાણુ કદ (C) જવાબદાર છે. ઉચ્ચ આયનીકરણ ઊર્જા (D) ગલનબિંદુ અને ઉત્કલનબિંદુ સાથે સીધો સંબંધ ધરાવતી નથી.", "ref": "Std 12 - પ્રકરણ 8: d અને f-વિભાગનાં તત્ત્વો", "ch": ""}, {"q": "નીચેનામાંથી કયું તત્ત્વ સંક્રાંતિ ધાતુ નથી, પરંતુ તેના કેટલાક ગુણધર્મો સંક્રાંતિ ધાતુઓ જેવા છે, જેમ કે ચલ ઓક્સિડેશન અવસ્થા અને રંગીન સંયોજનો બનાવવાની ક્ષમતા?", "opts": ["Pb", "Sn", "Bi", "Sb"], "ans": 0, "exp": "Pb (સીસું) એ p-વિભાગનું તત્ત્વ છે, પરંતુ તે +2 અને +4 ઓક્સિડેશન અવસ્થા દર્શાવે છે અને તેના સંયોજનો રંગીન હોઈ શકે છે (જેમ કે PbO₂ કથ્થઈ રંગનો હોય છે), જે સંક્રાંતિ ધાતુઓના ગુણધર્મો જેવું છે. Sn, Bi અને Sb પણ p-વિભાગનાં તત્ત્વો છે, પરંતુ તેમના ગુણધર્મો સંક્રાંતિ ધાતુઓ જેવા નથી.", "ref": "Std 12 - પ્રકરણ 7: p-વિભાગનાં તત્ત્વો", "ch": ""}, {"q": "સંક્રાંતિ ધાતુઓના સંદર્ભમાં નીચેનાં વિધાનો ધ્યાનમાં લો અને સાચો વિકલ્પ પસંદ કરો:\n\n(1) Cr²⁺ આયન પ્રબળ રિડક્શનકર્તા તરીકે વર્તે છે, જ્યારે Cr³⁺ આયન સ્થિર છે અને તેનું રિડક્શન મુશ્કેલ છે.\n(2) Mn²⁺ આયનનું d⁵ ઇલેક્ટ્રોનીય રચના હોવાથી તે સ્થિર છે અને તેનું ઓક્સિડેશન Mn⁷⁺ સુધી સરળતાથી થાય છે.\n(3) Fe²⁺ આયનનું ઓક્સિડેશન Fe³⁺ માં સરળતાથી થાય છે, કારણ કે Fe³⁺ ની d⁵ ઇલેક્ટ્રોનીય રચના વધુ સ્થિર છે.\n(4) Cu⁺ આયનનું d¹⁰ ઇલેક્ટ્રોનીય રચના હોવાથી તે સ્થિર છે અને તેનું ઓક્સિડેશન Cu²⁺ માં મુશ્કેલ છે.\n\nનીચેનામાંથી કયો વિકલ્પ સાચો છે?", "opts": ["વિધાન (1), (2) અને (3) સાચાં છે, પરંતુ (4) ખોટું છે", "વિધાન (1), (3) અને (4) સાચાં છે, પરંતુ (2) ખોટું છે", "વિધાન (1) અને (3) સાચાં છે, પરંતુ (2) અને (4) ખોટાં છે", "વિધાન (2) અને (4) સાચાં છે, પરંતુ (1) અને (3) ખોટાં છે"], "ans": 2, "exp": "વિધાન (1) સાચું છે કારણ કે Cr²⁺ (d⁴) પ્રબળ રિડક્શનકર્તા છે અને Cr³⁺ (d³) વધુ સ્થિર છે. વિધાન (3) સાચું છે કારણ કે Fe²⁺ (d⁶) નું ઓક્સિડેશન Fe³⁺ (d⁵) માં સરળતાથી થાય છે, જે વધુ સ્થિર છે.\n\nવિધાન (2) ખોટું છે કારણ કે Mn²⁺ (d⁵) ખૂબ જ સ્થિર છે અને તેનું ઓક્સિડેશન Mn⁷⁺ સુધી મુશ્કેલ છે, કારણ કે ઉચ્ચ ઓક્સિડેશન અવસ્થા પ્રાપ્ત કરવા માટે વધુ ઊર્જાની જરૂર પડે છે.\n\nવિધાન (4) ખોટું છે કારણ કે Cu⁺ (d¹⁰) નું ઓક્સિડેશન Cu²⁺ (d⁹) માં થઈ શકે છે, કારણ કે Cu²⁺ ની જલીય દ્રાવણમાં વધુ સ્થિરતા છે.", "ref": "Std 12 - પ્રકરણ 8: d- અને f-વિભાગનાં તત્ત્વો", "ch": ""}, {"q": "સંક્રાંતિ ધાતુઓના સંદર્ભમાં નીચેનાં વિધાનો ધ્યાનમાં લો અને યોગ્ય વિકલ્પ પસંદ કરો:\n(1) Cr³⁺ અને Mn²⁺ બંને સમાન d-ઇલેક્ટ્રોન રચના ધરાવે છે.\n(2) [Co(NH₃)₆]³⁺ સંકીર્ણમાં Co નો ઑક્સિડેશન આંક +3 છે અને તે પ્રતિચુંબકીય છે.\n(3) Zn²⁺ અને Cu⁺ બંને રંગવિહીન છે કારણ કે તેમની d-ઇલેક્ટ્રોન રચના સંપૂર્ણ ભરાયેલી અથવા ખાલી છે.\n(4) V²⁺ અને Ti²⁺ બંને પ્રબળ રિડ્યુસિંગ એજન્ટ તરીકે વર્તે છે.", "opts": ["વિધાન (1), (2) અને (4) સાચાં છે, (3) ખોટું છે", "વિધાન (2), (3) અને (4) સાચાં છે, (1) ખોટું છે", "વિધાન (1), (3) અને (4) સાચાં છે, (2) ખોટું છે", "વિધાન (2) અને (4) સાચાં છે, (1) અને (3) ખોટાં છે"], "ans": 3, "exp": "વિધાન (1) ખોટું છે કારણ કે Cr³⁺ (d³) અને Mn²⁺ (d⁵)ની d-ઇલેક્ટ્રોન રચના અલગ છે. વિધાન (2) ખોટું છે કારણ કે [Co(NH₃)₆]³⁺માં Co³⁺ (d⁶) પ્રતિચુંબકીય નથી, પરંતુ નિર્બળ અનુચુંબકીય છે. વિધાન (3) ખોટું છે કારણ કે Cu⁺ (d¹⁰) રંગવિહીન છે, પરંતુ Zn²⁺ (d¹⁰) પણ રંગવિહીન છે, જે સાચું છે. વિધાન (4) સાચું છે કારણ કે V²⁺ અને Ti²⁺ બંને પ્રબળ રિડ્યુસિંગ એજન્ટ છે.", "ref": "Std 12 - પ્રકરણ 8: d- અને f-વિભાગના તત્ત્વો", "ch": ""}, {"q": "નીચેનામાંથી કયું સંયોજન સંક્રાંતિ ધાતુનું નથી, પરંતુ તેના ચુંબકીય ગુણધર્મો સંક્રાંતિ ધાતુ સંયોજનો જેવા છે?", "opts": ["MnO₂", "Fe₃O₄", "CrO₂", "VO₂"], "ans": 3, "exp": "VO₂ સંક્રાંતિ ધાતુ સંયોજન નથી, પરંતુ તે અર્ધવાહકથી ધાત્વિક સંક્રમણ દર્શાવે છે અને તેના ચુંબકીય ગુણધર્મો સંક્રાંતિ ધાતુ સંયોજનો જેવા છે. બાકીના વિકલ્પો (MnO₂, Fe₃O₄, CrO₂) સંક્રાંતિ ધાતુ સંયોજનો છે.", "ref": "Std 12 - પ્રકરણ 8: d- અને f-વિભાગના તત્ત્વો", "ch": ""}, {"q": "સંક્રાંતિ ધાતુઓના સંદર્ભમાં નીચેનામાંથી કયું વિધાન સાચું છે? (A) Sc3+ આયન રંગહીન છે કારણ કે તેની d-કક્ષામાં ઇલેક્ટ્રોન નથી. (B) Cu2+ આયન રંગીન છે કારણ કે તેની d-કક્ષામાં અયુગ્મિત ઇલેક્ટ્રોન છે. (C) Zn2+ આયન રંગીન છે કારણ કે તેની d-કક્ષા પૂર્ણ ભરેલી છે. (D) Ti4+ આયન રંગીન છે કારણ કે તેની d-કક્ષામાં ઇલેક્ટ્રોન વિતરણ અસમમિત છે.", "opts": ["Sc3+ આયન રંગહીન છે કારણ કે તેની d-કક્ષામાં ઇલેક્ટ્રોન નથી.", "Cu2+ આયન રંગીન છે કારણ કે તેની d-કક્ષામાં અયુગ્મિત ઇલેક્ટ્રોન છે.", "Zn2+ આયન રંગીન છે કારણ કે તેની d-કક્ષા પૂર્ણ ભરેલી છે.", "Ti4+ આયન રંગીન છે કારણ કે તેની d-કક્ષામાં ઇલેક્ટ્રોન વિતરણ અસમમિત છે."], "ans": 1, "exp": "Cu2+ આયન રંગીન છે કારણ કે તેની d-કક્ષામાં અયુગ્મિત ઇલેક્ટ્રોન હોવાથી d-d સંક્રમણ થાય છે, જે પ્રકાશ શોષણ તરંગલંબાઈમાં પરિવર્તન લાવે છે. Sc3+ આયન રંગહીન છે કારણ કે તેની d-કક્ષામાં ઇલેક્ટ્રોન નથી, પરંતુ વિકલ્પ A સાચો હોવા છતાં પ્રશ્નમાં સાચો વિકલ્પ B છે. Zn2+ આયન રંગહીન છે કારણ કે તેની d-કક્ષા પૂર્ણ ભરેલી છે, જેથી d-d સંક્રમણ થતું નથી. Ti4+ આયન પણ રંગહીન છે કારણ કે તેની d-કક્ષામાં ઇલેક્ટ્રોન નથી.", "ref": "Std 12 - અભ્યાસક્રમ 12: સંક્રાંતિ ધાતુઓ", "ch": ""}, {"q": "સંક્રાંતિ ધાતુઓના ચુંબકીય ગુણધર્મોના સંદર્ભમાં નીચેનામાંથી કયો વિકલ્પ ખોટો છે?", "opts": ["Fe3+ આયનમાં 5 અયુગ્મિત ઇલેક્ટ્રોન હોવાથી તે પ્રબળ પરાચુંબકીય છે.", "Mn2+ આયનમાં 5 અયુગ્મિત ઇલેક્ટ્રોન હોવાથી તે પ્રબળ પરાચુંબકીય છે.", "Co2+ આયનમાં 3 અયુગ્મિત ઇલેક્ટ્રોન હોવાથી તે પ્રબળ પરાચુંબકીય છે.", "Ni2+ આયનમાં 2 અયુગ્મિત ઇલેક્ટ્રોન હોવાથી તે પ્રબળ પરાચુંબકીય છે."], "ans": 3, "exp": "Ni2+ આયનમાં 2 અયુગ્મિત ઇલેક્ટ્રોન હોવા છતાં તે પ્રબળ પરાચુંબકીય નથી, પરંતુ અપેક્ષાકૃત ઓછું પરાચુંબકીય છે. Fe3+, Mn2+, અને Co2+ આયનો પ્રબળ પરાચુંબકીય છે કારણ કે તેમની પાસે અનુક્રમે 5, 5, અને 3 અયુગ્મિત ઇલેક્ટ્રોન છે, જે ચુંબકીય ક્ષણ વધારે કરે છે.", "ref": "Std 12 - અભ્યાસક્રમ 12: સંક્રાંતિ ધાતુઓ", "ch": ""}, {"q": "સંક્રાંતિ ધાતુઓના સંદર્ભમાં નીચેનામાંથી કયું વિધાન સાચું નથી? (A) સંક્રાંતિ ધાતુઓ તેમના ઉચ્ચ ઓક્સીડેશન અવસ્થામાં ઉત્સેચક તરીકે વર્તે છે. (B) સંક્રાંતિ ધાતુઓના કેટલાક સંયોજનો જટિલ આયનો બનાવે છે. (C) સંક્રાંતિ ધાતુઓના આયનો હંમેશા રંગીન હોય છે. (D) સંક્રાંતિ ધાતુઓમાં d-કક્ષા ઇલેક્ટ્રોન ભરવાની ક્ષમતા હોવાથી તેઓ રંગીન સંયોજનો બનાવે છે.", "opts": ["સંક્રાંતિ ધાતુઓ તેમના ઉચ્ચ ઓક્સીડેશન અવસ્થામાં ઉત્સેચક તરીકે વર્તે છે.", "સંક્રાંતિ ધાતુઓના કેટલાક સંયોજનો જટિલ આયનો બનાવે છે.", "સંક્રાંતિ ધાતુઓના આયનો હંમેશા રંગીન હોય છે.", "સંક્રાંતિ ધાતુઓમાં d-કક્ષા ઇલેક્ટ્રોન ભરવાની ક્ષમતા હોવાથી તેઓ રંગીન સંયોજનો બનાવે છે."], "ans": 2, "exp": "સંક્રાંતિ ધાતુઓના આયનો હંમેશા રંગીન હોતાં નથી. ઉદાહરણ તરીકે, Sc3+ અને Ti4+ આયનો રંગહીન હોય છે કારણ કે તેમની d-કક્ષામાં ઇલેક્ટ્રોન નથી અથવા પૂર્ણ ભરેલી છે. બાકીના વિધાનો સાચાં છે: સંક્રાંતિ ધાતુઓ ઉચ્ચ ઓક્સીડેશન અવસ્થામાં ઉત્સેચક તરીકે વર્તે છે, જટિલ આયનો બનાવે છે, અને d-કક્ષા ઇલેક્ટ્રોન ભરવાની ક્ષમતા હોવાથી રંગીન સંયોજનો બનાવે છે.", "ref": "Std 12 - અભ્યાસક્રમ 12: સંક્રાંતિ ધાતુઓ", "ch": ""}, {"q": "સંક્રાંતિ ધાતુઓના સંયોજનોના રંગ વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["[Ti(H2O)6]3+ જાંબલી રંગનો હોય છે", "[V(H2O)6]3+ લીલો રંગ ધરાવે છે", "[Cr(H2O)6]3+ જાંબલી રંગનો હોય છે", "[Fe(H2O)6]2+ હળવો લીલો રંગ ધરાવે છે"], "ans": 2, "exp": "[Cr(H2O)6]3+ વાયોલેટ (જાંબલી) રંગનો હોય છે, પરંતુ તેનો રંગ લીલો નથી. [Ti(H2O)6]3+ જાંબલી રંગનો હોય છે, [V(H2O)6]3+ લીલો રંગ ધરાવે છે, અને [Fe(H2O)6]2+ હળવો લીલો રંગ ધરાવે છે.", "ref": "Std 12 - અધ્યાય 7: d-બ્લોક તત્ત્વો", "ch": ""}, {"q": "સંક્રાંતિ ધાતુઓના સંકીર્ણ સંયોજનોમાં લિગેન્ડના કારણે ઉદ્ભવતી ક્રિસ્ટલ ફિલ્ડ સ્પ્લિટિંગ (Δ₀) ની માત્રા નક્કી કરવામાં નીચેનામાંથી કયો પરિબળ સૌથી ઓછી અસર કરે છે?", "     if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
