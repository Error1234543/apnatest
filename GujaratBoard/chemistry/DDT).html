<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDT)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>DDT)</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">DDT)</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "DDT નું રાસાયણિક નામ શું છે અને તે કયા જૂથ નું કીટનાશક છે?", "opts": ["ડાયક્લોરોડાયફિનાયલટ્રાયક્લોરોઇથેન, ઓર્ગેનોક્લોરિન", "ડાયમિથાયલડાયક્લોરોસાયલેન, ઓર્ગેનોફોસ્ફેટ", "ડાયક્લોરોડાયબેન્ઝોફ્યુરન, કાર્બામેટ", "ડાયક્લોરોડાયએસિટિક એસિડ, પાયરેથ્રોઇડ"], "ans": 0, "exp": "DDT નું પૂરું નામ ડાયક્લોરોડાયફિનાયલટ્રાયક્લોરોઇથેન છે અને તે ઓર્ગેનોક્લોરિન જૂથ નું કીટનાશક છે. ઓર્ગેનોફોસ્ફેટ, કાર્બામેટ અને પાયરેથ્રોઇડ એ DDT ના જૂથ નથી, તેથી બાકીના વિકલ્પો ખોટા છે.", "ref": "Std 12 - Chapter 16: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "DDT નો ઉપયોગ મુખ્યત્વે કયા રોગ ના નિયંત્રણ માટે થતો હતો?", "opts": ["મલેરિયા", "ડેંગ્યુ", "ચિકનગુનિયા", "એડ્સ"], "ans": 0, "exp": "DDT નો ઉપયોગ મુખ્યત્વે મલેરિયા ના નિયંત્રણ માટે થતો હતો કારણ કે તે મચ્છરો ના નાશ માટે અસરકારક છે. ડેંગ્યુ અને ચિકનગુનિયા પણ મચ્છરો દ્વારા ફેલાય છે, પરંતુ DDT નો ઉપયોગ મુખ્યત્વે મલેરિયા માટે જ થતો હતો. એડ્સ વાયરસ દ્વારા ફેલાય છે, તેથી તે DDT સાથે સંબંધિત નથી.", "ref": "Std 12 - Chapter 16: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "DDT ના બાયોએક્યુમ્યુલેશન ની પ્રક્રિયા કયા પર્યાવરણીય પરિબળ દ્વારા પ્રભાવિત થાય છે?", "opts": ["ખોરાક શૃંખલા માં સ્થાન", "તાપમાન", "પ્રકાશની તીવ્રતા", "હવાનું દબાણ"], "ans": 0, "exp": "DDT ના બાયોએક્યુમ્યુલેશન ની પ્રક્રિયા ખોરાક શૃંખલા માં સ્થાન દ્વારા પ્રભાવિત થાય છે. જેમ જેમ ખોરાક શૃંખલા માં સ્તર વધે છે, તેમ DDT નું સાંદ્રણ પણ વધે છે. તાપમાન, પ્રકાશની તીવ્રતા અને હવાનું દબાણ એ બાયોએક્યુમ્યુલેશન ની પ્રક્રિયા ને પ્રભાવિત કરતા નથી.", "ref": "Std 12 - Chapter 16: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "DDT ના ઉપયોગ ના કારણે કયા પક્ષી ની સંખ્યા માં ઘટાડો થયો હતો?", "opts": ["ગરૂડ", "કબૂતર", "મોર", "ચકલી"], "ans": 0, "exp": "DDT ના ઉપયોગ ના કારણે ગરૂડ ની સંખ્યા માં ઘટાડો થયો હતો કારણ કે DDT ના બાયોએક્યુમ્યુલેશન ના કારણે ગરૂડ ના ઇંડા ના છાલ ના પાતળા થવાના કારણે ઇંડા તૂટી જતાં હતાં. બાકીના પક્ષીઓ ની સંખ્યા માં DDT ના કારણે કોઈ ખાસ અસર જોવા મળી નથી.", "ref": "Std 12 - Chapter 16: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "DDT ના રાસાયણિક સૂત્ર માં કેટલા ક્લોરિન પરમાણુઓ હોય છે?", "opts": ["5", "4", "3", "6"], "ans": 0, "exp": "DDT નું રાસાયણિક સૂત્ર C14H9Cl5 છે, જેમાં 5 ક્લોરિન પરમાણુઓ હોય છે. તેથી વિકલ્પ A સાચો છે. બાકીના વિકલ્પો ખોટા છે કારણ કે તેઓ ક્લોરિન પરમાણુઓ ની સાચી સંખ્યા બતાવતા નથી.", "ref": "Std 12 - Chapter 16: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "DDT ના વપરાશ બાદ તે માનવ શરીરમાં કયા અંગમાં સૌથી વધુ સંગ્રહ પામે છે?", "opts": ["યકૃત (Liver)", "મગજ (Brain)", "ચરબી પેશી (Adipose Tissue)", "કિડની (Kidney)"], "ans": 2, "exp": "DDT હાઇડ્રોફોબિક (જળવિરોધી) હોવાથી તે ચરબી પેશીમાં સરળતાથી ઓગળી જાય છે અને ત્યાં લાંબા સમય સુધી સંગ્રહ પામે છે. યકૃત, મગજ અને કિડનીમાં તેની સાંદ્રતા ઓછી હોય છે કારણ કે આ અંગો ચરબીની તુલનામાં પાણીની માત્રા વધુ ધરાવે છે. DDT નું બાયોએક્યુમ્યુલેશન ચરબી યુક્ત પેશીઓમાં વધુ થાય છે.", "ref": "Std 12 - Chapter 16: પર્યાવરણીય મુદ્દાઓ (Environmental Issues)", "ch": ""}, {"q": "DDT ના વિઘટન દરમિયાન બનતા મુખ્ય મેટાબોલાઇટમાં કયો પદાર્થ સમાવિષ્ટ થાય છે, જે તેની ઝેરી અસરને લાંબા સમય સુધી ટકાવી રાખે છે?", "opts": ["DDE (ડિક્લોરોડિફિનાઇલડિક્લોરોઇથિલીન)", "DDD (ડિક્લોરોડિફિનાઇલડિક્લોરોઇથેન)", "DDT-O (DDT ઓક્સાઇડ)", "ક્લોરલ હાઇડ્રેટ"], "ans": 0, "exp": "DDT નું વિઘટન થતાં મુખ્યત્વે DDE (ડિક્લોરોડિફિનાઇલડિક્લોરોઇથિલીન) બને છે, જે DDT કરતાં ઓછું ઝેરી હોવા છતાં, તે પર્યાવરણમાં લાંબા સમય સુધી ટકી રહે છે અને બાયોએક્યુમ્યુલેશન દ્વારા ખોરાક સાંકળીમાં સંગ્રહ પામે છે. DDD અને DDT-O પણ મેટાબોલાઇટ્સ છે, પરંતુ DDE સૌથી સ્થિર અને પર્યાવરણીય દૃષ્ટિએ મહત્વપૂર્ણ છે. ક્લોરલ હાઇડ્રેટ DDT નું મેટાબોલાઇટ નથી.", "ref": "Std 12 - Chapter 16: પર્યાવરણીય મુદ્દાઓ (Environmental Issues)", "ch": ""}, {"q": "DDT ના ઉપયોગ નિષેધ બાદ કયા કીટકમાં DDT પ્રત્યે પ્રતિરોધકતા વિકસિત થઈ હતી, જેના કારણે તેના નિયંત્રણમાં અડચણ ઉભી થઈ?", "opts": ["મચ્છર (Mosquito - Anopheles)", "મકાઈનો રસ ચૂસનાર કીટક (Corn Borer)", "કપાસના કીડા (Bollworm)", "ઘરની મખી (Housefly - Musca domestica)"], "ans": 3, "exp": "DDT ના લાંબા ગાળાના ઉપયોગ બાદ ઘરની મખી (Musca domestica) માં DDT પ્રત્યે પ્રતિરોધકતા વિકસિત થઈ હતી. આ પ્રતિરોધકતા જનીનિક પરિવર્તન દ્વારા થઈ હતી, જેના કારણે DDT ની અસરકારકતા ઘટી હતી. મચ્છર, મકાઈનો રસ ચૂસનાર કીટક અને કપાસના કીડામાં પણ પ્રતિરોધકતા વિકસિત થઈ હતી, પરંતુ ઘરની મખી એ સૌથી પ્રખ્યાત કેસ છે.", "ref": "Std 12 - Chapter 16: પર્યાવરણીય મુદ્દાઓ (Environmental Issues)", "ch": ""}, {"q": "DDT ના પર્યાવરણીય પ્રદૂષણ ના સંદર્ભમાં, કયું પદાર્થ DDT ના સ્થિરતાને કારણે તેની ઝેરી અસરને વધારે છે?", "opts": ["ઓક્સિજન", "કાર્બન ડાયોક્સાઇડ", "સલ્ફર ડાયોક્સાઇડ", "ક્લોરિન"], "ans": 3, "exp": "DDT નું રાસાયણિક સૂત્ર C₁₄H₉Cl₅ છે, જેમાં ક્લોરિન પરમાણુઓની હાજરી તેને રાસાયણિક દૃષ્ટિએ સ્થિર બનાવે છે. ક્લોરિન પરમાણુઓ DDT ને ઓક્સિડેશન અને વિઘટન પ્રત્યે પ્રતિરોધક બનાવે છે, જેના કારણે તે પર્યાવરણમાં લાંબા સમય સુધી ટકી રહે છે. ઓક્સિજન, કાર્બન ડાયોક્સાઇડ અને સલ્ફર ડાયોક્સાઇડ DDT ની સ્થિરતાને પ્રભાવિત કરતા નથી.", "ref": "Std 12 - Chapter 16: પર્યાવરણીય મુદ્દાઓ (Environmental Issues)", "ch": ""}, {"q": "DDT ના ઉપયોગ થકી કયા જલચર પ્રાણીના અંડકોષમાં કવચની જાડાઈ ઘટી જવાના કારણે તેની પ્રજનન ક્ષમતા પર અસર થઈ હતી?", "opts": ["મગર (Crocodile)", "ડોલ્ફિન (Dolphin)", "બલ્ડ ઈગલ (Bald Eagle)", "સલામંડર (Salamander)"], "ans": 2, "exp": "DDT ના બાયોએક્યુમ્યુલેશન ના કારણે બલ્ડ ઈગલ (Bald Eagle) ના અંડકોષના કવચની જાડાઈ ઘટી જવાથી તેના અંડાઓ તૂટી જતાં, જેના કારણે તેની પ્રજનન ક્ષમતા પર ગંભીર અસર થઈ હતી. મગર, ડોલ્ફિન અને સલામંડર પર DDT ની આ પ્રકારની અસર નોંધાઈ નથી.", "ref": "Std 12 - Chapter 16: પર્યાવરણીય મુદ્દાઓ (Environmental Issues)", "ch": ""}, {"q": "DDT ના પર્યાવરણીય પ્રભાવ સંબંધી નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["DDT નું બાયોમેગ્નિફિકેશન ખોરાક શૃંખલામાં ઉચ્ચ સ્તરે થાય છે, જેમાં તેની સાંદ્રતા પ્રાથમિક ઉત્પાદકોથી શિકારી સુધી વધે છે.", "DDT નું વાતાવરણમાં ઉત્સર્જન થતાં તે તરત જ વાયુ અવસ્થામાં પરિવર્તિત થઈ જાય છે અને વરસાદી પાણી દ્વારા ધોઈ જાય છે.", "DDT ના લાંબા ગાળાના સંપર્કથી પક્ષીઓમાં કૅલ્શિયમ ચયાપચય પર અસર થાય છે, જેથી અંડાના કવચ પાતળા પડે છે.", "DDT ના વિઘટન માટે મુખ્યત્વે સૂર્યપ્રકાશ અને સૂક્ષ્મજીવોની ક્રિયા જવાબદાર છે, પરંતુ તે અત્યંત ધીમી ગતિએ થાય છે."], "ans": 1, "exp": "DDT વાતાવરણમાં ઉત્સર્જન થયા બાદ તે સરળતાથી વાયુ અવસ્થામાં પરિવર્તિત થતું નથી, ને વરસાદી પાણી દ્વારા ધોઈ જતું નથી. તે લિપિડ-દ્રાવ્ય હોવાથી જૈવિક પદાર્થોમાં સંગ્રહ પામે છે અને ખોરાક શૃંખલામાં બાયોમેગ્નિફિકેશન થાય છે. અંડાના કવચ પરની અસર અને ધીમું વિઘટન એ DDT ની વિશિષ્ટતાઓ છે.", "ref": "Std 12 - Chapter 16: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "DDT ના કીટનાશક ગુણધર્મો સંબંધી નીચેનામાંથી કયું વિધાન યોગ્ય નથી?", "opts": ["DDT નું કીટકોના સોડિયમ ચેનલ પર અવરોધક તરીકે કામ કરે છે, જેથી તંત્રિકા અવરોધ થાય છે.", "DDT નો પ્રભાવ કીટકોની ચેતાતંત્ર પર થાય છે, જેથી તેના શરીરમાં સ્ફંદનો થાય છે અને મૃત્યુ થાય છે.", "DDT નો ઉપયોગ મુખ્યત્વે મચ્છરોના નિયંત્રણ માટે થતો હતો, કારણ કે તે પાણીમાં સરળતાથી દ્રાવ્ય છે.", "DDT ની કીટનાશક ક્રિયા તેની લિપિડ-દ્રાવ્યતા અને સ્થિરતા પર આધારિત છે."], "ans": 2, "exp": "DDT પાણીમાં અદ્રાવ્ય છે, પરંતુ લિપિડમાં દ્રાવ્ય છે. તેની કીટનાશક ક્રિયા સોડિયમ ચેનલ પર અવરોધક તરીકે કામ કરવા અને ચેતાતંત્રને અસર કરવા પર આધારિત છે. પાણીમાં અદ્રાવ્ય હોવાથી તે મચ્છરોના લાર્વા નિયંત્રણ માટે પાણીની સપાટી પર છંટકાવ થતો હતો.", "ref": "Std 12 - Chapter 16: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "DDT ના પર્યાવરણીય પ્રદૂષણ સંબંધી નીચેનામાંથી કયું જોડકું યોગ્ય નથી?", "opts": ["DDT - લિપિડ-દ્રાવ્ય - જૈવિક સંગ્રહણ", "DDT - ક્લોરિનયુક્ત - સ્થિરતા", "DDT - પાણીમાં દ્રાવ્ય - ખોરાક શૃંખલામાં સરળ વહન", "DDT - સૂર્યપ્રકાશ દ્વારા વિઘટન - DDE અને DDD નું નિર્માણ"], "ans": 2, "exp": "DDT પાણીમાં અદ્રાવ્ય છે, પરંતુ લિપિડ-દ્રાવ્ય છે, જેના કારણે તે જૈવિક પદાર્થોમાં સંગ્રહ પામે છે. તે ક્લોરિનયુક્ત હોવાથી સ્થિર છે અને સૂર્યપ્રકાશ દ્વારા ધીમે ધીમે DDE અને DDDમાં વિઘટન પામે છે.", "ref": "Std 12 - Chapter 16: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "DDT ના માનવ સ્વાસ્થ્ય પરના પ્રભાવ સંબંધી નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["DDT ના લાંબા ગાળાના સંપર્કથી માનવમાં કૅન્સર, સ્તનપાન ના વિકારો અને પ્રજનન સમસ્યાઓ થઈ શકે છે.", "DDT માનવ શરીરમાં તરત જ વિઘટન પામે છે અને કોઈ હાનિકારક અસર કરતું નથી.", "DDT માનવ શરીરમાં કેવળ યકૃતમાં જ સંગ્રહ પામે છે અને અન્ય અંગોને અસર કરતું નથી.", "DDT નો પ્રભાવ માનવ શરીરમાં ફક્ત ત્વચા પર જ દેખાય છે અને આંતરિક અંગોને કોઈ અસર થતી નથી."], "ans": 0, "exp": "DDT ના લાંબા ગાળાના સંપર્કથી માનવમાં કૅન્સર, એન્ડોક્રાઇન વિકારો (હોર્મોનલ અસંતુલન) અને પ્રજનન સમસ્યાઓ થઈ શકે છે. તે માનવ શરીરમાં ચરબી પેશીઓમાં સંગ્રહ પામે છે અને વિવિધ અંગોને અસર કરે છે. તે તરત વિઘટન પામતું નથી અને ફક્ત ત્વચા અથવા યકૃત પર જ અસર કરતું નથી.", "ref": "Std 12 - Chapter 16: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "DDT ના વૈકલ્પિક કીટનાશક તરીકે ઉપયોગમાં લેવાતા નીચેનામાંથી કયા કીટનાશકમાં DDT જેવી જ બાયોએક્યુમ્યુલેશન અને સ્થિરતા ની સમસ્યા નથી?", "opts": ["એલ્ડ્રિન", "ડાયલ્ડ્રિન", "બાયોઇથેનોલ", "હેપ્ટાક્લોર"], "ans": 2, "exp": "બાયોઇથેનોલ એક જૈવિક કીટનાશક છે, જે DDT જેવી બાયોએક્યુમ્યુલેશન અને સ્થિરતા ધરાવતું નથી. એલ્ડ્રિન, ડાયલ્ડ્રિન અને હેપ્ટાક્લોર એ DDT જેવા જ ક્લોરિનયુક્ત કીટનાશકો છે, જે બાયોએક્યુમ્યુલેશન અને સ્થિરતા ધરાવે છે.", "ref": "Std 12 - Chapter 16: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "DDT ના પર્યાવરણીય સ્થિરતાને કારણે તેના વિઘટનમાં કયો જૈવરાસાયણિક માર્ગ મુખ્ય અવરોધ રચે છે?", "opts": ["ઓક્સિડેટિવ ડીક્લોરિનેશન દ્વારા DDE માં રૂપાંતર", "હાઇડ્રોલિટિક ક્લોરિનેશન દ્વારા DDD માં રૂપાંતર", "ફોટોલાઇસિસ દ્વારા CO₂ અને H₂O માં વિઘટન", "માઇક્રોબાયલ એરોબિક મેટાબોલિઝમ દ્વારા પૂર્ણ રૂપે વિઘટન"], "ans": 3, "exp": "DDT નું પર્યાવરણીય સ્થિરતા તેના મજબૂત કાર્બન-ક્લોરિન બંધો અને લિપિડ-દ્રાવ્ય સ્વભાવને કારણે છે, જે માઇક્રોબાયલ એરોબિક મેટાબોલિઝમ દ્વારા પૂર્ણ વિઘટનને અવરોધે છે. A અને B વિકલ્પો DDT ના અપૂર્ણ મેટાબોલિઝમના માર્ગો છે, પરંતુ તે પૂર્ણ વિઘટન નથી. C વિકલ્પ ફોટોલાઇસિસ દ્વારા વિઘટન સૂચવે છે, પરંતુ DDT ફોટોલાઇસિસ પ્રત્યે પ્રતિરોધક છે.", "ref": "Std 12 - Chapter 16: પર્યાવરણીય મુદ્દાઓ", "ch": ""}, {"q": "DDT ના બાયોમેગ્નિફિકેશન પ્રક્રિયામાં, કયા જલચર ક્રમમાં DDT ની સાંદ્રતા સૌથી ઓછી હોય છે?", "opts": ["ફાઇટોપ્લાંકટન", "ઝૂપ્લાંકટન", "મત્સ્યભક્ષી પક્ષી", "મત્સ્ય"], "ans": 0, "exp": "બાયોમેગ્નિફિકેશન પ્રક્રિયામાં, DDT ની સાંદ્રતા ખોરાક શૃંખલામાં નીચેથી ઉપર તરફ વધે છે. ફાઇટોપ્લાંકટન (A) સૌથી નીચેના સ્તરે હોય છે, જ્યાં DDT ની સાંદ્રતા સૌથી ઓછી હોય છે. ઝૂપ્લાંકટન (B), મત્સ્ય (D), અને મત્સ્યભક્ષી પક્ષી (C) ક્રમશઃ વધુ સાંદ્રતા ધરાવે છે.", "ref": "Std 12 - Chapter 16: પર્યાવરણીય મુદ્દાઓ", "c   }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
