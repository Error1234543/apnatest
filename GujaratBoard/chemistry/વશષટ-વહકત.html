<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>વિશિષ્ટ વાહકતા</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>વિશિષ્ટ વાહકતા</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">વિશિષ્ટ વાહકતા</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "વિશિષ્ટ વાહકતા ધરાવતી પેશીઓમાં કયા પ્રકારના કોષોના કોષરસમાં સક્રિય પરિવહન માટે ATP ની સૌથી વધુ જરૂર પડે છે?", "opts": ["જલવાહક કોષો (Xylem vessels)", "અન્નવાહક કોષો (Phloem sieve tubes)", "સહાયક કોષો (Companion cells)", "જલવાહક તંતુઓ (Xylem tracheids)"], "ans": 2, "exp": "સહાયક કોષો (Companion cells) અન્નવાહક કોષો (Phloem sieve tubes) સાથે સંકળાયેલા હોય છે અને સક્રિય પરિવહન માટે ATP નો ઉપયોગ કરે છે, જ્યારે જલવાહક કોષો અને તંતુઓ પાસીવ પરિવહન માટે જવાબદાર હોય છે. અન્નવાહક કોષો પાસે કોષકેન્દ્ર નથી, પરંતુ સહાયક કોષો તેમના માટે ATP પૂરું પાડે છે. જલવાહક કોષો અને તંતુઓમાં સક્રિય પરિવહન થતું નથી, તેથી A અને D ખોટા છે. અન્નવાહક કોષો પોતે ATP નો ઉપયોગ કરતા નથી, તેથી B ખોટું છે.", "ref": "Std 11 - અધ્યાય 11: વનસ્પતિમાં પરિવહન", "ch": ""}, {"q": "વિશિષ્ટ વાહકતા ધરાવતી પેશીઓમાં કયા પદાર્થનું પરિવહન સક્રિય પરિવહન દ્વારા થાય છે?", "opts": ["પાણી", "ખનીજ દ્રવ્યો", "સુક્રોઝ", "ઓક્સિજન"], "ans": 2, "exp": "સુક્રોઝ (Sucrose) નું પરિવહન અન્નવાહક કોષો (Phloem) દ્વારા સક્રિય પરિવહન દ્વારા થાય છે, જ્યારે પાણી અને ખનીજ દ્રવ્યો જલવાહક કોષો (Xylem) દ્વારા પાસીવ પરિવહન દ્વારા વહન પામે છે. ઓક્સિજન વાયુ રૂપે વહન પામે છે, તેથી તે સક્રિય પરિવહન દ્વારા વહન પામતું નથી. A, B, અને D ખોટા છે.", "ref": "Std 11 - અધ્યાય 11: વનસ્પતિમાં પરિવહન", "ch": ""}, {"q": "વિશિષ્ટ વાહકતા ધરાવતી પેશીઓમાં કયા હોર્મોનનું સૌથી વધુ પ્રમાણમાં ઉત્પાદન થાય છે જે સક્રિય પરિવહનને પ્રભાવિત કરે છે?", "opts": ["ઓક્સિન (Auxin)", "જિબ્રેલિન (Gibberellin)", "સાયટોકાઈનિન (Cytokinin)", "એબ્સિસિક એસિડ (Abscisic Acid)"], "ans": 0, "exp": "ઓક્સિન (Auxin) હોર્મોન સક્રિય પરિવહનને પ્રભાવિત કરે છે, ખાસ કરીને અન્નવાહક કોષો (Phloem) માં સુક્રોઝના વહનને નિયંત્રિત કરે છે. જિબ્રેલિન અને સાયટોકાઈનિન વૃદ્ધિ અને વિકાસ સાથે સંકળાયેલા છે, જ્યારે એબ્સિસિક એસિડ પાણીના તણાવ અને પર્ણપાત સાથે સંકળાયેલું છે. તેથી B, C, અને D ખોટા છે.", "ref": "Std 11 - અધ્યાય 15: વનસ્પતિ વૃદ્ધિ અને વિકાસ", "ch": ""}, {"q": "વિશિષ્ટ વાહકતા ધરાવતી પેશીઓમાં કયા પ્રકારના પ્રોટીન સક્રિય પરિવહનમાં મહત્વની ભૂમિકા ભજવે છે?", "opts": ["એમાયલેઝ (Amylase)", "પ્રોટીએઝ (Protease)", "H+-ATPase", "લાયપેઝ (Lipase)"], "ans": 2, "exp": "H+-ATPase પ્રોટીન સક્રિય પરિવહનમાં મહત્વની ભૂમિકા ભજવે છે, ખાસ કરીને પ્રોટોન (H+) ના સક્રિય પરિવહન માટે. એમાયલેઝ, પ્રોટીએઝ, અને લાયપેઝ પાચક ઉત્સેચકો છે, જે સક્રિય પરિવહન સાથે સંકળાયેલા નથી. તેથી A, B, અને D ખોટા છે.", "ref": "Std 11 - અધ્યાય 11: વનસ્પતિમાં પરિવહન", "ch": ""}, {"q": "વિશિષ્ટ વાહકતા ધરાવતી પેશીઓમાં કયા પ્રકારના કોષરચનાને કારણે અન્નવાહક કોષો (Phloem sieve tubes) માં સુક્રોઝનું પરિવહન સરળ બને છે?", "opts": ["કોષભિત્તિ (Cell wall) ની હાજરી", "સીવ પ્લેટ (Sieve plate) ની હાજરી", "કોષકેન્દ્ર (Nucleus) ની હાજરી", "ક્લોરોપ્લાસ્ટ (Chloroplast) ની હાજરી"], "ans": 1, "exp": "સીવ પ્લેટ (Sieve plate) ની હાજરીને કારણે અન્નવાહક કોષો (Phloem sieve tubes) માં સુક્રોઝનું પરિવહન સરળ બને છે, કારણ કે તે કોષો વચ્ચેના જોડાણને સરળ બનાવે છે. કોષભિત્તિ, કોષકેન્દ્ર, અને ક્લોરોપ્લાસ્ટ સુક્રોઝના પરિવહનમાં સીધી ભૂમિકા ભજવતા નથી. તેથી A, C, અને D ખોટા છે.", "ref": "Std 11 - અધ્યાય 11: વનસ્પતિમાં પરિવહન", "ch": ""}, {"q": "વિશિષ્ટ વાહકતા ધરાવતી પેશીઓમાં, જ્યારે જલીય દબાણ (Turgor pressure) ઘટે છે ત્યારે કયા પરિવહન પ્રક્રિયા પર સૌથી વધુ અસર થાય છે?", "opts": ["સક્રિય પરિવહન દ્વારા ગ્લુકોઝનું શોષણ", "સરળ વ્યાપન દ્વારા ઓક્સિજનનું વહન", "જલીય વહન દ્વારા પાણીનું પરિવહન", "સહાયક વહન દ્વારા સક્રિય પરિવહન"], "ans": 0, "exp": "સક્રિય પરિવહન માટે ATPની જરૂર પડે છે, જે જલીય દબાણ ઘટવાથી કોષની શક્તિ ઉત્પાદન ક્ષમતા પર અસર કરે છે, જેથી ગ્લુકોઝનું શોષણ અવરોધાય છે. સરળ વ્યાપન (B) દબાણ પર આધારિત નથી, જલીય વહન (C) જલીય દબાણ પર આધાર રાખે છે પરંતુ તે નિષ્ક્રિય છે, અને સહાયક વહન (D) સક્રિય પરિવહનનો એક ભાગ છે પરંતુ પ્રશ્નમાં સ્પષ્ટપણે ગ્લુકોઝનું શોષણ જ વધુ અસરગ્રસ્ત થાય છે.", "ref": "Std 11 - Chapter 11: વનસ્પતિમાં પરિવહન", "ch": ""}, {"q": "વિશિષ્ટ વાહકતા ધરાવતી પેશીઓમાં, કયા પદાર્થનું પરિવહન સક્રિય પરિવહન દ્વારા થતું નથી?", "opts": ["પોટેશિયમ આયન (K⁺)", "સુક્રોઝ", "એમિનો એસિડ", "કાર્બન ડાયોક્સાઇડ (CO₂)"], "ans": 3, "exp": "કાર્બન ડાયોક્સાઇડ (CO₂) વાયુ સ્વરૂપે હોવાથી તે સરળ વ્યાપન દ્વારા વહન પામે છે, જ્યારે પોટેશિયમ આયન (A), સુક્રોઝ (B), અને એમિનો એસિડ (C) સક્રિય પરિવહન દ્વારા વહન પામે છે.", "ref": "Std 11 - Chapter 11: વનસ્પતિમાં પરિવહન", "ch": ""}, {"q": "વિશિષ્ટ વાહકતા ધરાવતી પેશીઓમાં, કયા કોષરચનાને કારણે અન્નવાહક કોષો (Phloem sieve tube)માં સક્રિય પરિવહન માટેની ઉર્જા પૂરી પડે છે?", "opts": ["કોષરસમાં રહેલા માઇટોકોન્ડ્રિયા", "કોષરસમાં રહેલા રાઇબોઝોમ", "કોષરસમાં રહેલા ક્લોરોપ્લાસ્ટ", "કોષભિત્તિ પર રહેલા પ્રોટીન પંપ"], "ans": 0, "exp": "માઇટોકોન્ડ્રિયા ATP ઉત્પન્ન કરે છે, જે સક્રિય પરિવહન માટે જરૂરી ઉર્જા પૂરી પાડે છે. રાઇબોઝોમ (B) પ્રોટીન સંશ્લેષણમાં, ક્લોરોપ્લાસ્ટ (C) પ્રકાશસંશ્લેષણમાં, અને પ્રોટીન પંપ (D) પદાર્થોના વહનમાં મદદ કરે છે પરંતુ ઉર્જા ઉત્પન્ન કરતા નથી.", "ref": "Std 11 - Chapter 11: વનસ્પતિમાં પરિવહન", "ch": ""}, {"q": "વિશિષ્ટ વાહકતા ધરાવતી પેશીઓમાં, કયા હોર્મોનનું સ્રાવણ સક્રિય પરિવહન દ્વારા થતું નથી?", "opts": ["ઓક્સિન", "જિબરેલિન", "ઇથિલીન", "સાયટોકાઇનિન"], "ans": 2, "exp": "ઇથિલીન (C) વાયુ સ્વરૂપે હોવાથી તે સરળ વ્યાપન દ્વારા વહન પામે છે, જ્યારે ઓક્સિન (A), જિબરેલિન (B), અને સાયટોકાઇનિન (D) સક્રિય પરિવહન દ્વારા વહન પામે છે.", "ref": "Std 12 - Chapter 15: વનસ્પતિ હોર્મોન", "ch": ""}, {"q": "વિશિષ્ટ વાહકતા ધરાવતી પેશીઓમાં, કયા પ્રકારના પરિવહન પ્રક્રિયામાં કોષરસની સક્રિય ભૂમિકા હોતી નથી?", "opts": ["સક્રિય પરિવહન દ્વારા આયનનું શોષણ", "સહાયક વહન દ્વારા સુક્રોઝનું પરિવહન", "જલીય વહન દ્વારા પાણીનું પરિવહન", "સરળ વ્યાપન દ્વારા CO₂નું વહન"], "ans": 3, "exp": "સરળ વ્યાપન (D) નિષ્ક્રિય પ્રક્રિયા છે અને કોષરસની સક્રિય ભૂમિકા વગર થાય છે. સક્રિય પરિવહન (A), સહાયક વહન (B), અને જલીય વહન (C)માં કોષરસની સક્રિય ભૂમિકા હોતી નથી પરંતુ જલીય વહન નિષ્ક્રિય છે, પરંતુ પ્રશ્નમાં સરળ વ્યાપન જ સૌથી યોગ્ય ઉત્તર છે.", "ref": "Std 11 - Chapter 11: વનસ્પતિમાં પરિવહન", "ch": ""}, {"q": "અન્નવાહક (ફ્લોએમ) પેશીની વિશિષ્ટ વાહકતામાં, સુક્રોઝનું પરિવહન કયા સિદ્ધાંત પર આધારિત છે અને તે માટે કયા કોષો મુખ્ય ભૂમિકા ભજવે છે?", "opts": ["પ્રસરણ (Diffusion) સિદ્ધાંત પર, અન્નવાહક કોષો (Sieve tube elements) અને સાથી કોષો (Companion cells)", "દબાણ-પ્રવાહ સિદ્ધાંત (Pressure flow hypothesis) પર, અન્નવાહક કોષો અને ફ્લોએમ પેરેનકાઇમાના કોષો", "સક્રિય પરિવહન (Active transport) સિદ્ધાંત પર, સાથી કોષો અને ફ્લોએમ ફાઇબર કોષો", "કેપિલરી ક્રિયા (Capillary action) સિદ્ધાંત પર, જલવાહક (Xylem) અને અન્નવાહક કોષો"], "ans": 1, "exp": "સુક્રોઝનું પરિવહન અન્નવાહક પેશીમાં દબાણ-પ્રવાહ સિદ્ધાંત પર આધારિત છે, જેમાં અન્નવાહક કોષો (Sieve tube elements) અને સાથી કોષો (Companion cells) મુખ્ય ભૂમિકા ભજવે છે. અહીં, સુક્રોઝનું લોડિંગ અને અનલોડિંગ સક્રિય પરિવહન દ્વારા થાય છે, પરંતુ સંપૂર્ણ પરિવહન પ્રક્રિયા દબાણ-પ્રવાહ સિદ્ધાંત અનુસાર થાય છે. વિકલ્પ A, C, અને D અંશતઃ સત્ય છે પરંતુ પૂર્ણ સિદ્ધાંતને આવરી લેતા નથી.", "ref": "Std 11 - અધ્યાય 11: વનસ્પતિમાં પરિવહન", "ch": ""}, {"q": "જ્યારે અન્નવાહક કોષોમાં સુક્રોઝનું સાંદ્રણ વધારે હોય છે, ત્યારે કયા પદાર્થનું સક્રિય પરિવહન થવું જરૂરી બને છે અને તે માટે કયા પ્રોટીનની જરૂર પડે છે?", "opts": ["પોટેશિયમ આયન (K+), H+-ATPase પ્રોટીન", "સોડિયમ આયન (Na+), Na+/K+ પંપ પ્રોટીન", "કેલ્શિયમ આયન (Ca2+), Ca2+-ATPase પ્રોટીન", "મેગ્નેશિયમ આયન (Mg2+), Mg2+ ટ્રાન્સપોર્ટર પ્રોટીન"], "ans": 0, "exp": "સુક્રોઝના ઉચ્ચ સાંદ્રણ વખતે, પોટેશિયમ આયન (K+)નું સક્રિય પરિવહન થવું જરૂરી બને છે, જેથી કોષરસમાં સુક્રોઝનું લોડિંગ સરળ બને. આ માટે H+-ATPase પ્રોટીન જરૂરી છે, જે પ્રોટોન (H+)ને કોષ બહાર કાઢીને H+ ગ્રેડિયન્ટ બનાવે છે, જેના આધારે K+ અને સુક્રોઝનું પરિવહન થાય છે. વિકલ્પ B, C, અને Dમાં ઉલ્લેખિત આયન અને પ્રોટીન અન્નવાહક કોષોમાં સુક્રોઝ પરિવહન માટે મુખ્ય ભૂમિકા ભજવતા નથી.", "ref": "Std 11 - અધ્યાય 11: વનસ્પતિમાં પરિવહન", "ch": ""}, {"q": "વિશિષ્ટ વાહકતા ધરાવતી પેશીઓમાં, કયા કોષો સુક્રોઝનું લોડિંગ અને અનલોડિંગ માટે સક્રિય પરિવહન પ્રક્રિયામાં સીધી રીતે સામેલ નથી?", "opts": ["અન્નવાહક કોષો (Sieve tube elements)", "સાથી કોષો (Companion cells)", "ફ્લોએમ પેરેનકાઇમાના કોષો", "ફ્લોએમ ફાઇબર કોષો"], "ans": 3, "exp": "ફ્લોએમ ફાઇબર કોષો સુક્રોઝના પરિવહનમાં સક્રિય ભૂમિકા ભજવતા નથી. તે મુખ્યત્વે યાંત્રિક ટેકો પૂરો પાડે છે. અન્નવાહક કોષો, સાથી કોષો, અને ફ્લોએમ પેરેનકાઇમાના કોષો સુક્રોઝના લોડિંગ અને અનલોડિંગમાં સક્રિય ભૂમિકા ભજવે છે. વિકલ્પ A, B, અને C સુક્રોઝ પરિવહન સાથે સીધા જોડાયેલા છે.", "ref": "Std 11 - અધ્યાય 11: વનસ્પતિમાં પરિવહન", "ch": ""}, {"q": "દબાણ-પ્રવાહ સિદ્ધાંત અનુસાર, સુક્રોઝનું પરિવહન કયા ક્રમમાં થાય છે અને તે માટે કયા દબાણની જરૂર પડે છે?", "opts": ["ઉત્પાદક સ્થાન (Source) → સંગ્રહ સ્થાન (Sink), ઉચ્ચ જલીય દબાણ (High turgor pressure)", "સંગ્રહ સ્થાન (Sink) → ઉત્પાદક સ્થાન (Source), નીચું જલીય દબાણ (Low turgor pressure)", "ઉત્પાદક સ્થાન (Source) → સંગ્રહ સ્થાન (Sink), નીચું જલીય દબાણ (Low turgor pressure)", "સંગ્રહ સ્થાન (Sink) → ઉત્પાદક સ્થાન (Source), ઉચ્ચ જલીય દબાણ (High turgor pressure)"], "ans": 0, "exp": "દબાણ-પ્રવાહ સિદ્ધાંત અનુસાર, સુક્રોઝનું પરિવહન ઉત્પાદક સ્થાન (Source, જ્યાં સુક્રોઝ બને છે)થી સંગ્રહ સ્થાન (Sink, જ્યાં સુક્રોઝ વપરાય છે) તરફ થાય છે. આ માટે ઉત્પાદક સ્થાન પર ઉચ્ચ જલીય દબાણ (High turgor pressure) જરૂરી હોય છે, જે સુક્રોઝના લોડિંગને કારણે ઉત્પન્ન થાય છે. વિકલ્પ B, C, અને D ક્રમ અને દબાણની દ્રષ્ટિએ અયોગ્ય છે.", "ref": "Std 11 - અધ્યાય 11: વનસ્પતિમાં પરિવહન", "ch": ""}, {"q": "વિશિષ્ટ વાહકતા ધરાવતી પેશીઓમાં, કયા હોર્મોનનું સ્રાવણ અન્નવાહક કોષોના વિકાસ અને કાર્યમાં મહત્વની ભૂમિકા ભજવે છે, પરંતુ તેનું સક્રિય પરિવહન થતું નથી?", "opts": ["ઓક્સિન (Auxin)", "જિબ્બરેલિન (Gibberellin)", "સાયટોકાઇનિન (Cytokinin)", "એબ્સિસિક એસિડ (Abscisic acid)"], "ans": 2, "exp": "સાયટોકાઇનિન હોર્મોન અન્નવાહક કોષોના વિકાસ અને કાર્યમાં મહત્વની ભૂમિકા ભજવે છે, પરંતુ તેનું સક્રિય પરિવહન થતું નથી. ઓક્સિન અને જિબ્બરેલિન હોર્મોનનું સક્રિય પરિવહન થાય છે, જ્યારે એબ્સિસિક એસિડ મુખ્યત્વે પાણીના તણાવ અને કોષના બંધારણ સાથે સંબંધિત છે. વિકલ્પ A, B, અને D સક્રિય પરિવહન સાથે સંબંધિત છે.", "ref": "Std 11 - અધ્યાય 15: વનસ્પતિ વૃદ્ધિ અને વિકાસ", "ch": ""}, {"q": "દબાણ-પ્રવાહ સિદ્ધાંત અનુસાર, અન્નવાહક કોષોમાં સુક્રોઝનું પરિવહન કયા કોષરસીય ઘટક દ્વારા સક્રિય રીતે થાય છે, જ્યારે તેના સાંદ્રણમાં તફાવત હોય છે?", "opts": ["માઇટોકોન્ડ્રિયા દ્વારા ATP ની ઉત્પત્તિ અને પ્રોટોન પંપની સક્રિયતા", "કોષરસીય કંકાળ દ્વારા સુક્રોઝના અણુઓનું સીધું પરિવહન", "રાઇબોઝોમ દ્વારા પ્રોટીન સંશ્લેષણ અને સુક્રોઝના પરિવહનમાં મદદ", "ગોલ્ગી કોપર દ્વારા વેસિકલ્સના નિર્માણ અને સુક્રોઝના પરિવહનમાં ભૂમિકા"], "ans": 0, "exp": "દબાણ-પ્રવાહ સિદ્ધાંત અનુસાર, સુક્રોઝનું પરિવહન સક્રિય પરિવહન દ્વારા થાય છે, જેમાં માઇટોકોન્ડ્રિયા દ્વારા ATP ની ઉત્પત્તિ થાય છે અને પ્રોટોન પંપ સક્રિય થાય છે, જે સુક્રોઝના અણુઓને ઉચ્ચ સાંદ્રણવાળા કોષમાંથી નીચા સાંદ્રણવાળા કોષ તરફ ખસેડે છે. બાકીના વિકલ્પો કોષરસીય કંકાળ, રાઇબોઝોમ અને ગોલ્ગી કોપર સુક્રોઝના પરિવહનમાં સીધી ભૂમિકા ભજવતા નથી.", "ref": "Std 11 - અધ્યાય 11: વનસ્પતિમાં પરિવહન", "ch": ""}, {"q": "અન્નવાહક કોષોમાં સુક્રોઝનું લોડિંગ અને અનલોડિંગ કયા પ્રકારના પરિવહન તંત્ર દ્વારા થાય છે, જ્યારે કોષરસમાં ATP ની ઉપલબ્ધતા ઓછી હોય છે?", "opts": ["સહ-પરિવહન (Co-transport) દ્વારા H+ આયન સાથે", "સરળ વ્યાપન (Simple diffusion) દ્વારા", "સક્રિય પરિવહન (Active transport) દ્વારા સીધી ATP ની વપરાશ વગર", "એન્ડોસાઇટોસિસ દ્વારા વેસિકલ્સના નિર્માણ વગર"], "ans": 0, "exp": "અન્નવાહક કોષોમાં સુક્રોઝનું લોડિંગ અને અનલોડિંગ સહ-પરિવહન (Co-transport) દ્વારા થાય છે, જેમાં H+ આયન સાથે સુક્રોઝના અણુઓનું પરિવહન થાય છે. આ પ્રક્રિયા ATP ની ઓછી ઉપલબ્ધતામાં પણ થઈ શકે છે. સરળ વ્યાપન, સક્રિય પરિવહન (ATP વગર) અને એન્ડોસાઇટોસિસ આ પ્રક્રિયામાં યોગ્ય નથી.", "ref": "Std 11 - અધ્યાય 11: વનસ્પતિમાં પરિવહન", "ch": ""}, {"q": "જ્યારે અન્નવાહક કોષોમાં સુક્રોઝનું સાંદ્રણ ઉચ્ચ હોય છે, ત્યારે કયા પદાર્થનું સક્રિય પરિવહન થતું નથી, પરંતુ તેનું પરિવહન દબાણ-પ્રવાહ સિદ્ધાંત અનુસાર થાય છે?", "opts": ["પોટેશિયમ આયન (K+)", "ગ્લુકોઝ", "એમિનો એસિડ", "જળ (H2O)"], "ans": 3, "exp": "દબાણ-પ્રવાહ સિદ્ધાંત અનુસાર, જળ (H2O)નું પરિવહન સુક્રોઝના ઉચ્ચ સાંદ્રણવાળા કોષમાંથી નીચા સાંદ્રણવાળા કોષ તરફ થાય છે, પરંતુ તે સક્રિય પરિવહન દ્વારા થતું નથી. પોટેશિયમ આયન, ગ્લુકોઝ અને એમિનો એસિડનું સક્રિય પરિવહન થઈ શકે છે.", "ref": "Std 11 - અધ્યાય 11: વનસ્પતિમાં પરિવહન", "ch": ""}, {"q": "અન્નવાહક પેશી (ફ્લોએમ)માં વિશિષ્ટ વાહકતા માટે જવાબદાર મુખ્ય પરિવહન પ્રક્રિયા કઈ છે, પરંતુ નીચેના પૈકી કયા કિસ્સામાં આ પ્રક્રિયા અપવાદરૂપે અસરકારક રીતે કાર્ય કરતી નથી?", "opts": ["જ્યારે અન્નવાહક કોષોમાં સુક્રોઝનું સાંદ્રણ ખૂબ જ ઉચ્ચ હોય અને કોષરસીય દબાણ (Turgor pressure) વધારે હોય", "જ્યારે અન્નવાહક કોષોમાં ઓક્સિજનની ઉણપ હોય અને શ્વસન પ્રક્રિયા મંદ પડી જાય", "જ્યારે અન્નવાહક કોષોમાં પાણીનું પ્રમાણ વધારે હોય અને જલીય દબાણ (Hydrostatic pressure) વધી જાય", "જ્યારે અન્નવાહક કોષોમાં પ્રોટીન સંશ્લેષણની ક્રિયા સક્રિય હોય અને ઉત્સેચકોનું પ્રમાણ વધારે હોય"], "ans": 1, "exp": "અન્નવાહક પેશીમાં સુક્રોઝનું પરિવહન મુખ્યત્વે સક્રિય પરિવહન દ્વારા થાય છે, જે માટે ATPની જરૂર પડે છે. ATPનું ઉત્પાદન શ્વસન પ્રક્રિયા દ્વારા થાય છે. જ્યારે ઓક્સિજનની ઉણપ હોય ત્યારે શ્વસન પ્રક્રિયા મંદ પડી જાય છે, જેના કારણે ATPનું ઉત્પાદન ઘટી જાય છે અને સક્રિય પરિવહન પ્રક્રિયા અસરકારક રીતે કાર્ય કરી શકતી નથી. અન્ય વિકલ્પોમાં: A) સુક્રોઝનું ઉચ્ચ સાંદ્રણ અને વધારે કોષરસીય દબાણ સક્રિય પરિવહનને અવરોધતું નથી, C) પાણીનું વધારે પ્રમાણ અને જલીય દબાણ સક્રિય પરિવહનને અસર કરતું નથી, D) પ્રોટીન સંશ્લેષણ અને ઉત્સેચકોનું પ્રમાણ સક્રિય પરિવહનને પ્રોત્સાહન આપે છે.", "ref": "Std 11 - પ્રકરણ 11: વનસ્પતિઓમાં પરિવહન", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન અન્નવાહક પેશી (ફ્લોએમ)ની વિશિષ્ટ વાહકતા માટે અયોગ્ય છે, તેમ છતાં ઘણીવાર વિદ્યાર્થીઓ દ્વારા સાચું માનવામાં આવે છે?", "opts": ["અન્નવાહક કોષોમાં સુક્રોઝનું પરિવહન હંમેશા સક્રિય પરિવહન દ્વારા થાય છે, કારણ કે તેને ATPની જરૂર પડે છે", "અન્નવાહક કોષોમાં સુક્રોઝનું લોડિંગ અને અનલોડિંગ સહાયક કોષો (Companion cells) દ્વારા થાય છે", "અન્નવાહક કોષોમાં સુક્રોઝનું પરિવહન દબાણ-પ્રવાહ સિદ્ધાંત (Pressure-flow hypothesis) અનુસાર થાય છે, જે સંપૂર્ણપણે નિષ્ક્રિય પ્રક્રિયા છે", "અન્નવાહક કોષોમાં સુક્રોઝનું પરિવહન ઉચ્ચ સાંદ્રણથી નિમ્ન સાંદ્રણ તરફ થાય છે, પરંતુ તેને સક્રિય પરિવહનની જરૂર પડે છે"], "ans": 2, "exp": "દબાણ-પ્રવાહ સિદ્ધાંત અનુસાર, અન્નવાહક કોષોમાં સુક્રોઝનું પરિવહન મુખ્યત્વે નિષ્ક્રિય પ્રક્રિયા છે, પરંતુ સુક્રોઝનું લોડિંગ અને અનલોડિંગ સક્રિય પરિવહન દ્વારા થાય છે, જે માટે ATPની જરૂર પડે છે. તેથી આ સિદ્ધાંત સંપૂર્ણપણે નિષ્ક્રિય પ્રક્રિયા નથી. અન્ય વિકલ્પોમાં: A) સુક્રોઝનું પરિવહન મોટાભાગે સક્રિય પરિવહન દ્વારા થાય છે, જે સાચું છે, B) સહાયક કોષો સુક્રોઝના લોડિંગ અને અનલોડિંગમાં મદદ કરે છે, જે સાચું છે, D) સુક્રોઝનું પરિવહન ઉચ્ચ સાંદ્રણથી નિમ્ન સાંદ્રણ તરફ થાય છે, પરંતુ લોડિંગ માટે સક્રિય પરિવહન જરૂરી છે, જે સાચું છે.", "ref": "Std 11 - પ્રકરણ 11: વનસ્પતિઓમાં પરિવહન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
