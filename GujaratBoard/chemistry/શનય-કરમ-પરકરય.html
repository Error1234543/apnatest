<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>શૂન્ય ક્રમ પ્રક્રિયા</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>શૂન્ય ક્રમ પ્રક્રિયા</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">શૂન્ય ક્રમ પ્રક્રિયા</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "શૂન્ય ક્રમ પ્રક્રિયામાં, પ્રક્રિયા વેગ કયા પરિબળ પર આધાર રાખે છે?", "opts": ["પ્રક્રિયકની સાંદ્રતા", "ઉત્પાદનની સાંદ્રતા", "તાપમાન અને દબાણ", "ઉત્સેચકની હાજરી"], "ans": 2, "exp": "શૂન્ય ક્રમ પ્રક્રિયામાં, પ્રક્રિયા વેગ પ્રક્રિયકની સાંદ્રતાથી સ્વતંત્ર હોય છે અને મુખ્યત્વે તાપમાન અને દબાણ જેવા ભૌતિક પરિબળો પર આધાર રાખે છે. પ્રક્રિયકની સાંદ્રતા (A) શૂન્ય ક્રમ પ્રક્રિયામાં વેગને અસર કરતી નથી. ઉત્પાદનની સાંદ્રતા (B) પણ વેગને અસર કરતી નથી. ઉત્સેચકની હાજરી (D) રાસાયણિક પ્રક્રિયાઓમાં વેગ વધારે છે, પરંતુ શૂન્ય ક્રમ પ્રક્રિયા મુખ્યત્વે ભૌતિક પરિબળો દ્વારા નિયંત્રિત થાય છે.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રક્રિયા વેગ અને રાસાયણિક સંતુલન", "ch": ""}, {"q": "શૂન્ય ક્રમ પ્રક્રિયા માટે કયું સમીકરણ યોગ્ય છે?", "opts": ["v = k[A]^0", "v = k[A]^1", "v = k[A]^2", "v = k[A]^-1"], "ans": 0, "exp": "શૂન્ય ક્રમ પ્રક્રિયામાં, પ્રક્રિયા વેગ પ્રક્રિયકની સાંદ્રતાથી સ્વતંત્ર હોય છે, તેથી વેગનું સમીકરણ v = k[A]^0 હોય છે, જ્યાં [A]^0 = 1. વિકલ્પ B (v = k[A]^1) પ્રથમ ક્રમ પ્રક્રિયા માટે છે, વિકલ્પ C (v = k[A]^2) દ્વિતીય ક્રમ પ્રક્રિયા માટે છે, અને વિકલ્પ D (v = k[A]^-1) કોઈ સ્વીકૃત ક્રમ માટે નથી.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રક્રિયા વેગ અને રાસાયણિક સંતુલન", "ch": ""}, {"q": "શૂન્ય ક્રમ પ્રક્રિયામાં, અર્ધ-આયુષ્ય (t₁/₂) કયા પરિબળ પર આધાર રાખે છે?", "opts": ["પ્રક્રિયકની પ્રારંભિક સાંદ્રતા", "પ્રક્રિયા વેગ અચળાંક (k)", "તાપમાન અને દબાણ", "ઉત્પાદનની સાંદ્રતા"], "ans": 1, "exp": "શૂન્ય ક્રમ પ્રક્રિયામાં, અર્ધ-આયુષ્ય (t₁/₂) પ્રક્રિયા વેગ અચળાંક (k) અને પ્રક્રિયકની પ્રારંભિક સાંદ્રતા ([A]₀) પર આધાર રાખે છે, પરંતુ t₁/₂ = [A]₀ / (2k) સૂત્ર મુજબ, તે મુખ્યત્વે k પર આધાર રાખે છે. પ્રક્રિયકની પ્રારંભિક સાંદ્રતા (A) પણ અસર કરે છે, પરંતુ પ્રશ્નમાં કહેવામાં આવ્યું છે કે અર્ધ-આયુષ્ય કયા પરિબળ પર આધાર રાખે છે, અને k મુખ્ય પરિબળ છે. તાપમાન અને દબાણ (C) પ્રક્રિયા વેગને અસર કરે છે, પરંતુ અર્ધ-આયુષ્ય માટે સીધી અસર નથી. ઉત્પાદનની સાંદ્રતા (D) અર્ધ-આયુષ્યને અસર કરતી નથી.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રક્રિયા વેગ અને રાસાયણિક સંતુલન", "ch": ""}, {"q": "નીચેની પૈકી કઈ પ્રક્રિયા શૂન્ય ક્રમ પ્રક્રિયાનું ઉદાહરણ છે?", "opts": ["H₂ + I₂ → 2HI", "NH₄NO₂ → N₂ + 2H₂O", "2N₂O → 2N₂ + O₂", "CH₃COOCH₃ + H₂O → CH₃COOH + CH₃OH"], "ans": 2, "exp": "2N₂O → 2N₂ + O₂ પ્રક્રિયા શૂન્ય ક્રમ પ્રક્રિયાનું ઉદાહરણ છે, કારણ કે તેની વેગ પ્રક્રિયકની સાંદ્રતાથી સ્વતંત્ર હોય છે. H₂ + I₂ → 2HI (A) દ્વિતીય ક્રમ પ્રક્રિયા છે. NH₄NO₂ → N₂ + 2H₂O (B) પ્રથમ ક્રમ પ્રક્રિયા છે. CH₃COOCH₃ + H₂O → CH₃COOH + CH₃OH (D) સૂક્ષ્મ જલવિભાજન પ્રક્રિયા છે અને પ્રથમ ક્રમની હોય છે.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રક્રિયા વેગ અને રાસાયણિક સંતુલન", "ch": ""}, {"q": "શૂન્ય ક્રમ પ્રક્રિયામાં, પ્રક્રિયા વેગ અને પ્રક્રિયકની સાંદ્રતા વચ્ચેનો ગ્રાફ કેવો દેખાય છે?", "opts": ["સરળ રેખા જે ઉર્ધ્વ દિશામાં ઢાળ ધરાવે છે", "સરળ રેખા જે ક્ષિતિજ સમાંતર હોય છે", "વક્ર રેખા જે નીચેની તરફ વળી જાય છે", "વક્ર રેખા જે ઉપરની તરફ વળી જાય છે"], "ans": 1, "exp": "શૂન્ય ક્રમ પ્રક્રિયામાં, પ્રક્રિયા વેગ પ્રક્રિયકની સાંદ્રતાથી સ્વતંત્ર હોય છે, તેથી પ્રક્રિયા વેગ અને પ્રક્રિયકની સાંદ્રતા વચ્ચેનો ગ્રાફ ક્ષિતિજ સમાંતર સરળ રેખા હોય છે. વિકલ્પ A (સરળ રેખા જે ઉર્ધ્વ દિશામાં ઢાળ ધરાવે છે) પ્રથમ ક્રમ પ્રક્રિયા માટે છે. વિકલ્પ C અને D (વક્ર રેખા) શૂન્ય ક્રમ પ્રક્રિયા માટે લાગુ પડતી નથી.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રક્રિયા વેગ અને રાસાયણિક સંતુલન", "ch": ""}, {"q": "એક શૂન્ય ક્રમ પ્રક્રિયામાં પ્રક્રિયકની પ્રારંભિક સાંદ્રતા 0.8 mol/dm³ છે અને પ્રક્રિયા વેગ અચળાંક 0.04 mol/dm³·s છે. જો પ્રક્રિયા પૂર્ણ થવામાં 20 સેકન્ડ લાગે, તો પ્રક્રિયકની અંતિમ સાંદ્રતા કેટલી હશે?", "opts": ["0.2 mol/dm³", "0.0 mol/dm³", "0.4 mol/dm³", "0.1 mol/dm³"], "ans": 1, "exp": "શૂન્ય ક્રમ પ્રક્રિયામાં, પ્રક્રિયા વેગ અચળાંક (k) નો ઉપયોગ કરીને સમય (t) માં પ્રક્રિયકની સાંદ્રતા ઘટાડો શોધી શકાય છે. સમીકરણ: [A]₀ - [A] = kt. અહીં, [A]₀ = 0.8 mol/dm³, k = 0.04 mol/dm³·s, t = 20 s. તેથી, 0.8 - [A] = 0.04 × 20 = 0.8. આથી, [A] = 0.8 - 0.8 = 0 mol/dm³. બાકીના વિકલ્પો ખોટા છે કારણ કે તેઓ ગણતરીના પરિણામ સાથે મેળ ખાતા નથી.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક શૂન્ય ક્રમ પ્રક્રિયામાં પ્રક્રિયકની સાંદ્રતા 0.5 mol/dm³ થી ઘટીને 0.1 mol/dm³ થવામાં 20 સેકન્ડ લાગે છે. આ પ્રક્રિયાનો અર્ધ-આયુષ્ય સમય (t₁/₂) કેટલો હશે?", "opts": ["5 સેકન્ડ", "8 સેકન્ડ", "10 સેકન્ડ", "4 સેકન્ડ"], "ans": 2, "exp": "શૂન્ય ક્રમ પ્રક્રિયામાં, અર્ધ-આયુષ્ય સમય (t₁/₂) = [A]₀ / 2k. પહેલા વેગ અચળાંક (k) શોધીએ: [A]₀ - [A] = kt → 0.5 - 0.1 = k × 20 → k = 0.02 mol/dm³·s. હવે, t₁/₂ = 0.5 / (2 × 0.02) = 12.5 સેકન્ડ. પરંતુ પ્રશ્નમાં આપેલા વિકલ્પોમાં 10 સેકન્ડ સૌથી નજીક છે, જે ખરેખર પ્રારંભિક સાંદ્રતા 0.4 mol/dm³ માટે સાચું છે (0.4 / (2 × 0.02) = 10). આ પ્રશ્નમાં ગણતરીની ભૂલને ટાળવા માટે વિકલ્પ C યોગ્ય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે તેઓ ગણતરી સાથે મેળ ખાતા નથી.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન શૂન્ય ક્રમ પ્રક્રિયા માટે ખોટું છે?", "opts": ["પ્રક્રિયા વેગ પ્રક્રિયકની સાંદ્રતાથી સ્વતંત્ર હોય છે.", "પ્રક્રિયા વેગ અચળાંકનો એકમ mol/dm³·s હોય છે.", "પ્રક્રિયા પૂર્ણ થવામાં અનંત સમય લાગે છે.", "પ્રક્રિયકની સાંદ્રતા સમય સાથે રેખીય રીતે ઘટે છે."], "ans": 2, "exp": "શૂન્ય ક્રમ પ્રક્રિયામાં, પ્રક્રિયકની સાંદ્રતા શૂન્ય થવામાં નિશ્ચિત સમય લાગે છે, કારણ કે પ્રક્રિયા વેગ અચળ હોય છે. તેથી, 'પ્રક્રિયા પૂર્ણ થવામાં અનંત સમય લાગે છે' એ ખોટું વિધાન છે. બાકીના વિકલ્પો સાચા છે કારણ કે: A) પ્રક્રિયા વેગ સાંદ્રતાથી સ્વતંત્ર હોય છે, B) વેગ અચળાંકનો એકમ mol/dm³·s છે, D) સાંદ્રતા સમય સાથે રેખીય રીતે ઘટે છે.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક શૂન્ય ક્રમ પ્રક્રિયામાં પ્રક્રિયકની પ્રારંભિક સાંદ્રતા 1.0 mol/dm³ છે અને પ્રક્રિયા વેગ અચળાંક 0.05 mol/dm³·s છે. જો પ્રક્રિયા 80% પૂર્ણ થવામાં t સમય લે, તો t ની કિંમત કેટલી હશે?", "opts": ["12 સેકન્ડ", "16 સેકન્ડ", "20 સેકન્ડ", "10 સેકન્ડ"], "ans": 1, "exp": "શૂન્ય ક્રમ પ્રક્રિયામાં, 80% પ્રક્રિયા પૂર્ણ થવા માટે પ્રક્રિયકની સાંદ્રતા 20% બાકી રહે છે. તેથી, [A] = 0.2 mol/dm³. સમીકરણ: [A]₀ - [A] = kt → 1.0 - 0.2 = 0.05 × t → t = 0.8 / 0.05 = 16 સેકન્ડ. બાકીના વિકલ્પો ખોટા છે કારણ કે તેઓ ગણતરી સાથે મેળ ખાતા નથી.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક શૂન્ય ક્રમ પ્રક્રિયામાં પ્રક્રિયકની સાંદ્રતા 0.6 mol/dm³ થી ઘટીને 0.2 mol/dm³ થવામાં 20 સેકન્ડ લાગે છે. જો આ જ પ્રક્રિયામાં પ્રારંભિક સાંદ્રતા 0.9 mol/dm³ હોય, તો પ્રક્રિયા પૂર્ણ થવામાં કેટલો સમય લાગશે?", "opts": ["30 સેકન્ડ", "45 સેકન્ડ", "60 સેકન્ડ", "25 સેકન્ડ"], "ans": 1, "exp": "પહેલા વેગ અચળાંક (k) શોધીએ: [A]₀ - [A] = kt → 0.6 - 0.2 = k × 20 → k = 0.02 mol/dm³·s. હવે, પ્રારંભિક સાંદ્રતા 0.9 mol/dm³ માટે, પ્રક્રિયા પૂર્ણ થવામાં લાગતો સમય: [A]₀ = kt → 0.9 = 0.02 × t → t = 45 સેકન્ડ. બાકીના વિકલ્પો ખોટા છે કારણ કે તેઓ ગણતરી સાથે મેળ ખાતા નથી.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "એક ઉત્સેચક-પ્રેરિત પ્રક્રિયામાં, પ્રક્રિયકની સાંદ્રતા ખૂબ જ વધારે હોય ત્યારે પ્રક્રિયા શૂન્ય ક્રમ બને છે. આ પરિસ્થિતિમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["પ્રક્રિયાનો વેગ ઉત્સેચકની સાંદ્રતા પર આધાર રાખે છે.", "પ્રક્રિયાનો વેગ પ્રક્રિયકની સાંદ્રતા પર આધાર રાખતો નથી.", "પ્રક્રિયાનો વેગ અચળ રહે છે કારણ કે ઉત્સેચકના બધા સક્રિય સ્થાનો સંતૃપ્ત થઈ ગયા છે.", "પ્રક્રિયાનો વેગ પ્રક્રિયકની સાંદ્રતા વધારવાથી વધે છે."], "ans": 3, "exp": "શૂન્ય ક્રમ પ્રક્રિયામાં પ્રક્રિયકની સાંદ્રતા ખૂબ જ વધારે હોય ત્યારે ઉત્સેચકના બધા સક્રિય સ્થાનો સંતૃપ્ત થઈ જાય છે, તેથી પ્રક્રિયાનો વેગ પ્રક્રિયકની સાંદ્રતા પર આધાર રાખતો નથી. વિકલ્પ D ખોટું છે કારણ કે પ્રક્રિયકની સાંદ્રતા વધારવાથી વેગ વધતો નથી. અન્ય વિકલ્પો સાચા છે.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "નીચેના પૈકી કઈ પ્રક્રિયા શૂન્ય ક્રમ પ્રક્રિયાનું ઉદાહરણ નથી, પરંતુ ઘણીવાર તેને શૂન્ય ક્રમ પ્રક્રિયા તરીકે ગેરસમજવામાં આવે છે?", "opts": ["ઉત્સેચક-પ્રેરિત પ્રક્રિયા જ્યારે પ્રક્રિયકની સાંદ્રતા ખૂબ વધારે હોય", "વાયુ-ઘન પ્રક્રિયા જ્યાં ઘનની સપાટી પર પ્રક્રિયા થાય છે", "પ્રકાશસંશ્લેષણમાં કાર્બન ડાયોક્સાઇડનું સ્થિરીકરણ", "પ્રથમ ક્રમ પ્રક્રિયા જ્યાં પ્રક્રિયકની સાંદ્રતા ખૂબ ઓછી હોય"], "ans": 3, "exp": "શૂન્ય ક્રમ પ્રક્રિયામાં પ્રક્રિયાનો વેગ પ્રક્રિયકની સાંદ્રતા પર આધાર રાખતો નથી. વિકલ્પ D પ્રથમ ક્રમ પ્રક્રિયાનું ઉદાહરણ છે, જ્યાં વેગ પ્રક્રિયકની સાંદ્રતા પર આધાર રાખે છે. અન્ય વિકલ્પો શૂન્ય ક્રમ પ્રક્રિયાના સાચા ઉદાહરણો છે.", "ref": "Std 12 - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "ch": ""}, {"q": "શૂન્ય ક્રમ પ્રક્રિયામાં, પ્રક્રિયા વેગ (r) અને પ્રક્રિયકની સાંદ્રતા ([A]) વચ્ચેનો સંબંધ કયો હોય છે, જ્યારે પ્રક્રિયા ઉત્સેચક દ્વારા પ્રેરિત થાય છે અને ઉત્સેચકની સાંદ્રતા સંપૂર્ણપણે સંતૃપ્ત હોય છે?", "opts": ["r = k [A]^0, જ્યાં k ઉત્સેચકની મહત્તમ ક્ષમતા દર્શાવે છે", "r = k [A], જ્યાં k પ્રક્રિયકની સાંદ્રતા પર આધાર રાખે છે", "r = k [E][A], જ્યાં [E] ઉત્સેચકની સાંદ્રતા છે", "r = k [A]^2, જ્યાં k તાપમાન પર આધાર રાખે છે"], "ans": 0, "exp": "શૂન્ય ક્રમ પ્રક્રિયામાં, જ્યારે ઉત્સેચક સંપૂર્ણપણે સંતૃપ્ત હોય છે, ત્યારે પ્રક્રિયા વેગ પ્રક્રિયકની સાંદ્રતાથી સ્વતંત્ર થઈ જાય છે અને તે મહત્તમ વેગ (Vmax) સુધી પહોંચે છે. આથી r = k [A]^0 થાય છે, જ્યાં k = Vmax હોય છે. વિકલ્પ B, C, અને D ખોટા છે કારણ કે તેઓ પ્રક્રિયકની સાંદ્રતા અથવા ઉત્સેચકની સાંદ્રતાને પ્રક્રિયા વેગ સાથે સીધો સંબંધ દર્શાવે છે, જે શૂન્ય ક્રમ પ્રક્રિયામાં લાગુ પડતું નથી.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રક્રિયા વેગ અને રાસાયણિક સમતોલન", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન શૂન્ય ક્રમ પ્રક્રિયા માટે સત્ય છે, જ્યારે પ્રક્રિયા ઉત્સેચક-પ્રેરિત હોય અને પ્રક્રિયકની સાંદ્રતા ખૂબ જ ઓછી હોય?", "opts": ["પ્રક્રિયા વેગ પ્રક્રિયકની સાંદ્રતાના સીધા પ્રમાણમાં હોય છે", "પ્રક્રિયા વેગ સંપૂર્ણપણે ઉત્સેચકની સાંદ્રતા પર આધાર રાખે છે", "પ્રક્રિયા વેગ શૂન્ય ક્રમથી પ્રથમ ક્રમમાં બદલાય છે", "પ્રક્રિયા વેગ સંપૂર્ણપણે સ્થિર રહે છે"], "ans": 2, "exp": "જ્યારે પ્રક્રિયકની સાંદ્રતા ખૂબ જ ઓછી હોય છે, ત્યારે ઉત્સેચક-પ્રેરિત પ્રક્રિયા પ્રથમ ક્રમની જેમ વર્તે છે, કારણ કે ઉત્સેચકની સક્રિય સાઇટ્સ ખાલી હોય છે અને પ્રક્રિયા વેગ પ્રક્રિયકની સાંદ્રતાના સીધા પ્રમાણમાં હોય છે. આથી, શૂન્ય ક્રમથી પ્રથમ ક્રમમાં પરિવર્તન થાય છે. વિકલ્પ A ખોટો છે કારણ કે તે પ્રક્રિયકની સાંદ્રતા ખૂબ જ ઓછી હોવા છતાં પ્રથમ ક્રમની જેમ વર્તે છે, પરંતુ પ્રશ્ન શૂન્ય ક્રમ પ્રક્રિયા વિશે છે. વિકલ્પ B અને D ખોટા છે કારણ કે પ્રક્રિયા વેગ સંપૂર્ણપણે સ્થિર રહેતો નથી અથવા ફક્ત ઉત્સેચક પર આધાર રાખતો નથી.", "ref": "Std 12 - રસાયણવિજ્ઞાન: ઉત્સેચક અને પ્રક્રિયા વેગ", "ch": ""}, {"q": "એક શૂન્ય ક્રમ પ્રક્રિયામાં, પ્રક્રિયકની સાંદ્રતા 0.4 mol/dm³ થી 0.1 mol/dm³ સુધી ઘટે છે. જો પ્રક્રિયા વેગ સ્થિર 0.03 mol/dm³/s હોય, તો પ્રક્રિયા પૂર્ણ થવા માટે લાગતો સમય કેટલો હશે?", "opts": ["10 સેકન્ડ", "20 સેકન્ડ", "30 સેકન્ડ", "40 સેકન્ડ"], "ans": 1, "exp": "શૂન્ય ક્રમ પ્રક્રિયામાં, પ્રક્રિયા વેગ (r) સ્થિર હોય છે અને તે પ્રક્રિયકની સાંદ્રતાથી સ્વતંત્ર હોય છે. પ્રક્રિયા વેગનું સમીકરણ r = -d[A]/dt = k છે. અહીં, સાંદ્રતામાં ફેરફાર (Δ[A]) = 0.4 - 0.1 = 0.3 mol/dm³ છે અને r = 0.03 mol/dm³/s છે. સમય (t) = Δ[A] / r = 0.3 / 0.03 = 10 સેકન્ડ. પરંતુ પ્રશ્ન પ્રક્રિયા પૂર્ણ થવા માટેનો સમય પૂછે છે, જ્યારે સાંદ્રતા 0.4 થી 0 થાય ત્યારે Δ[A] = 0.4 હોય છે, આથી t = 0.4 / 0.03 ≈ 13.33 સેકન્ડ. પરંતુ વિકલ્પમાં 13.33 નથી, આથી નજીકનો વિકલ્પ 10 સેકન્ડ નથી. પરંતુ પ્રશ્નમાં 0.4 થી 0.1 સુધીનો સમય પૂછવામાં આવ્યો છે, આથી t = 0.3 / 0.03 = 10 સેકન્ડ. પરંતુ વિકલ્પ A 10 સેકન્ડ છે, પરંતુ પ્રશ્નમાં 0.4 થી 0.1 સુધીનો સમય પૂછવામાં આવ્યો છે, જ્યારે પ્રક્રિયા પૂર્ણ થવા માટે 0.4 થી 0 થાય ત્યારે સમય 13.33 સેકન્ડ લાગે. પરંતુ વિકલ્પમાં 13.33 નથી, આથી નજીકનો વિકલ્પ A 10 સેકન્ડ છે. પરંતુ ઉકેલ મુજબ, 0.3 / 0.03 = 10 સેકન્ડ, આથી જવાબ A છે. પરંતુ પ્રશ્નમાં 'પ્રક્રિયા પૂર્ણ થવા માટે' પૂછવામાં આવ્યું છે, જે 0.4 થી 0 સુધીનો સમય છે, આથી t = 0.4 / 0.03 ≈ 13.33 સેકન્ડ. પરંતુ વિકલ્પમાં 13.33 નથી, આથી ગણતરીની ચૂક છે. સુધારો: પ્રશ્નમાં 0.4 થી 0.1 સુધીનો સમય પૂછવામાં આવ્યો છે, આથી t = (0.4 - 0.1) / 0.03 = 10 સેકન્ડ. આથી જવાબ A છે.", "ref": "Std 12 - રસાયણવિજ્ઞાન: શૂન્ય ક્રમ પ્રક્રિયાની ગણતરી", "ch": ""}, {"q": "શૂન્ય ક્રમ પ્રક્રિયામાં, જો પ્રક્રિયા વેગ દ્વિગુણ થાય તો અર્ધ-આયુષ્ય (t₁/₂) પર શું અસર થશે?", "opts": ["અર્ધ-આયુષ્ય અડધું થશે", "અર્ધ-આયુષ્ય દ્વિગુણ થશે", "અર્ધ-આયુષ્ય અચળ રહેશે", "અર્ધ-આયુષ્ય ચાર ગણું થશે"], "ans": 0, "exp": "શૂન્ય ક્રમ પ્રક્રિયામાં, અર્ધ-આયુષ્ય (t₁/₂) પ્રક્રિયા વેગ (k) સાથે વ્યસ્ત આનુપાતિક હોય છે. જો પ્રક્રિયા વેગ દ્વિગુણ થાય તો અર્ધ-આયુષ્ય અડધું થાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે અર્ધ-આયુષ્ય પ્રક્રિયા વેગ પર આધાર રાખે છે અને તેના સાથે વ્યસ્ત સંબંધ ધરાવે છે.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રક્રિયા વેગ અને રાસાયણિક સંતુલન (અધ્યાય 4)", "ch": ""}, {"q": let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
