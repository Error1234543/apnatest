<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ન્યુક્લિક એસિડ (DNA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ન્યુક્લિક એસિડ (DNA</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ન્યુક્લિક એસિડ (DNA</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "DNA ની દ્વિગુણન પ્રક્રિયા દરમિયાન, કયા ઉત્સેચક દ્વારા RNA પ્રાઇમરની રચના થાય છે અને તે કયા દિશામાં વૃદ્ધિ પામે છે?", "opts": ["DNA પોલિમરેઝ I – 5’ → 3’ દિશામાં", "પ્રાઇમેઝ – 5’ → 3’ દિશામાં", "હેલિકેઝ – 3’ → 5’ દિશામાં", "લાઇગેઝ – 3’ → 5’ દિશામાં"], "ans": 1, "exp": "DNA દ્વિગુણન દરમિયાન, પ્રાઇમેઝ ઉત્સેચક દ્વારા RNA પ્રાઇમરની રચના થાય છે, જે 5’ → 3’ દિશામાં વૃદ્ધિ પામે છે. DNA પોલિમરેઝ I RNA પ્રાઇમરને દૂર કરે છે અને ખાલી જગ્યા ભરે છે, પરંતુ પ્રાઇમર બનાવતું નથી. હેલિકેઝ DNA ને અનવિંડ કરે છે, જ્યારે લાઇગેઝ DNA ટુકડાઓને જોડે છે. આમ, બાકીના વિકલ્પો અયોગ્ય છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન", "ch": ""}, {"q": "જો DNA ના એક સ્ટ્રેન્ડમાં ન્યુક્લિયોટાઇડ ક્રમ 5’-ATGC-3’ હોય, તો તેના પૂરક સ્ટ્રેન્ડનો ક્રમ કયો હશે અને તે કયા બંધ દ્વારા જોડાયેલા હશે?", "opts": ["5’-TACG-3’ – હાઇડ્રોજન બંધ", "3’-GCAT-5’ – ફોસ્ફોડાયેસ્ટર બંધ", "3’-TACG-5’ – હાઇડ્રોજન બંધ", "5’-GCAT-3’ – પેપ્ટાઇડ બંધ"], "ans": 2, "exp": "DNA ના પૂરક સ્ટ્રેન્ડનો ક્રમ 3’-TACG-5’ હશે, કારણ કે એડિનિન (A) થાયમિન (T) સાથે અને ગ્વાનિન (G) સાયટોસિન (C) સાથે જોડાય છે. આ બંધો હાઇડ્રોજન બંધ દ્વારા રચાય છે. ફોસ્ફોડાયેસ્ટર બંધ DNA ના સ્ટ્રેન્ડમાં ન્યુક્લિયોટાઇડને જોડે છે, જ્યારે પેપ્ટાઇડ બંધ પ્રોટીનમાં એમિનો એસિડને જોડે છે. આમ, વિકલ્પ C સચોટ છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન", "ch": ""}, {"q": "DNA ની દ્વિગુણન પ્રક્રિયામાં, કયો ઉત્સેચક DNA ને સુપરકોઇલ્ડ સ્વરૂપમાં રાખવા માટે જવાબદાર છે?", "opts": ["ટોપોઇસોમેરેઝ", "હેલિકેઝ", "DNA પોલિમરેઝ III", "સિંગલ-સ્ટ્રેન્ડ બાઇન્ડિંગ પ્રોટીન"], "ans": 0, "exp": "ટોપોઇસોમેરેઝ ઉત્સેચક DNA ની સુપરકોઇલિંગને નિયંત્રિત કરે છે અને તેને સુપરકોઇલ્ડ સ્વરૂપમાં રાખવા માટે જવાબદાર છે. હેલિકેઝ DNA ને અનવિંડ કરે છે, DNA પોલિમરેઝ III નવો DNA સ્ટ્રેન્ડ બનાવે છે, અને સિંગલ-સ્ટ્રેન્ડ બાઇન્ડિંગ પ્રોટીન અવિભાજિત DNA સ્ટ્રેન્ડને સ્થિર રાખે છે. આમ, વિકલ્પ A સચોટ છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન", "ch": ""}, {"q": "DNA ની રચનામાં, કયા પુરીન બેઇઝ સાથે પાયરિમિડિન બેઇઝ જોડાય છે અને તે કેટલા હાઇડ્રોજન બંધ દ્વારા જોડાય છે?", "opts": ["એડિનિન – થાયમિન – 2 હાઇડ્રોજન બંધ", "ગ્વાનિન – સાયટોસિન – 2 હાઇડ્રોજન બંધ", "એડિનિન – સાયટોસિન – 3 હાઇડ્રોજન બંધ", "ગ્વાનિન – થાયમિન – 3 હાઇડ્રોજન બંધ"], "ans": 0, "exp": "DNA ની રચનામાં, એડિનિન (પુરીન) થાયમિન (પાયરિમિડિન) સાથે 2 હાઇડ્રોજન બંધ દ્વારા જોડાય છે. ગ્વાનિન (પુરીન) સાયટોસિન (પાયરિમિડિન) સાથે 3 હાઇડ્રોજન બંધ દ્વારા જોડાય છે. આમ, વિકલ્પ A સચોટ છે, જ્યારે બાકીના વિકલ્પો અયોગ્ય છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન", "ch": ""}, {"q": "DNA ની મ્યુટેશન દરમિયાન, જો એક ન્યુક્લિયોટાઇડ ઉમેરાય અથવા કાઢી નાખાય, તો તેને શું કહેવાય અને તેનો શો પ્રભાવ પડે છે?", "opts": ["પોઈન્ટ મ્યુટેશન – એક જ એમિનો એસિડમાં ફેરફાર", "ફ્રેમશિફ્ટ મ્યુટેશન – પ્રોટીનની રચનામાં મોટો ફેરફાર", "ડિલીશન મ્યુટેશન – પ્રોટીનની લંબાઈમાં ઘટાડો", "ઇન્સર્શન મ્યુટેશન – પ્રોટીનની લંબાઈમાં વધારો"], "ans": 1, "exp": "જો DNA ના ક્રમમાં એક ન્યુક્લિયોટાઇડ ઉમેરાય અથવા કાઢી નાખાય, તો તેને ફ્રેમશિફ્ટ મ્યુટેશન કહેવાય છે, જેના કારણે પ્રોટીનની રચનામાં મોટો ફેરફાર થાય છે. પોઈન્ટ મ્યુટેશનમાં એક જ ન્યુક્લિયોટાઇડમાં ફેરફાર થાય છે, જે એક જ એમિનો એસિડમાં ફેરફાર કરે છે. ડિલીશન અને ઇન્સર્શન મ્યુટેશન પ્રોટીનની લંબાઈમાં ઘટાડો અથવા વધારો કરે છે, પરંતુ ફ્રેમશિફ્ટ મ્યુટેશનનો પ્રભાવ વધુ ગંભીર હોય છે. આમ, વિકલ્પ B સચોટ છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન", "ch": ""}, {"q": "DNA ની દ્વિગુણન પ્રક્રિયા દરમિયાન, લીડિંગ સ્ટ્રેન્ડ અને લેગિંગ સ્ટ્રેન્ડ વચ્ચેનો મુખ્ય તફાવત કયો છે?", "opts": ["લીડિંગ સ્ટ્રેન્ડ 5’ થી 3’ દિશામાં સિંથેસ થાય છે, જ્યારે લેગિંગ સ્ટ્રેન્ડ 3’ થી 5’ દિશામાં સિંથેસ થાય છે.", "લીડિંગ સ્ટ્રેન્ડ પર DNA પોલિમરેઝ I ની જરૂર પડે છે, જ્યારે લેગિંગ સ્ટ્રેન્ડ પર DNA પોલિમરેઝ III ની જરૂર પડે છે.", "લીડિંગ સ્ટ્રેન્ડ સતત સિંથેસ થાય છે, જ્યારે લેગિંગ સ્ટ્રેન્ડ ઓકાઝાકી ફ્રેગમેન્ટ્સના રૂપમાં સિંથેસ થાય છે.", "લીડિંગ સ્ટ્રેન્ડ પર પ્રાઇમરની જરૂર પડતી નથી, જ્યારે લેગિંગ સ્ટ્રેન્ડ પર પ્રાઇમરની જરૂર પડે છે."], "ans": 2, "exp": "લીડિંગ સ્ટ્રેન્ડ સતત સિંથેસ થાય છે કારણ કે તે 3’ થી 5’ દિશામાં ટેમ્પલેટ તરીકે વાપરવામાં આવે છે, જ્યારે લેગિંગ સ્ટ્રેન્ડ 5’ થી 3’ દિશામાં ટેમ્પલેટ તરીકે વાપરવામાં આવે છે, જેના કારણે તે ઓકાઝાકી ફ્રેગમેન્ટ્સના રૂપમાં સિંથેસ થાય છે. A વિકલ્પ ખોટો છે કારણ કે બંને સ્ટ્રેન્ડ 5’ થી 3’ દિશામાં સિંથેસ થાય છે. B વિકલ્પ ખોટો છે કારણ કે DNA પોલિમરેઝ III બંને સ્ટ્રેન્ડ માટે જરૂરી છે. D વિકલ્પ ખોટો છે કારણ કે બંને સ્ટ્રેન્ડ માટે પ્રાઇમરની જરૂર પડે છે.", "ref": "Std 12 - Chapter 6: આણ્વિક આનુવંશિકતા", "ch": ""}, {"q": "DNA ની રચનામાં, કયા બેઇઝ જૂથ સાથે શર્કરા અને ફોસ્ફેટ જૂથ જોડાયેલા હોય છે?", "opts": ["પુરીન બેઇઝ સાથે શર્કરા અને ફોસ્ફેટ જૂથ જોડાયેલા હોય છે.", "પાયરિમિડિન બેઇઝ સાથે શર્કરા અને ફોસ્ફેટ જૂથ જોડાયેલા હોય છે.", "ન્યુક્લિયોટાઇડમાં શર્કરા અને ફોસ્ફેટ જૂથ બેઇઝ સાથે જોડાયેલા હોય છે.", "શર્કરા અને ફોસ્ફેટ જૂથ ન્યુક્લિયોસાઇડ સાથે જોડાયેલા હોય છે."], "ans": 3, "exp": "ન્યુક્લિયોટાઇડમાં શર્કરા (ડિઓક્સીરાઇબોઝ) અને ફોસ્ફેટ જૂથ ન્યુક્લિયોસાઇડ સાથે જોડાયેલા હોય છે, જે બેઇઝ (પુરીન અથવા પાયરિમિડિન) અને શર્કરાનું બનેલું હોય છે. A અને B વિકલ્પ ખોટા છે કારણ કે શર્કરા અને ફોસ્ફેટ જૂથ બેઇઝ સાથે સીધા જ જોડાયેલા નથી. C વિકલ્પ ખોટો છે કારણ કે ન્યુક્લિયોટાઇડમાં શર્કરા અને ફોસ્ફેટ જૂથ ન્યુક્લિયોસાઇડ સાથે જોડાયેલા હોય છે, નહીં કે બેઇઝ સાથે.", "ref": "Std 12 - Chapter 6: આણ્વિક આનુવંશિકતા", "ch": ""}, {"q": "DNA ની દ્વિગુણન પ્રક્રિયા દરમિયાન, કયા ઉત્સેચક દ્વારા DNA ના સુપરકોઇલ્ડ સ્વરૂપને રિલેક્સ કરવામાં આવે છે?", "opts": ["હેલિકેઝ", "ટોપોઇસોમેરેઝ", "DNA પોલિમરેઝ I", "લાઇગેઝ"], "ans": 1, "exp": "ટોપોઇસોમેરેઝ ઉત્સેચક દ્વારા DNA ના સુપરકોઇલ્ડ સ્વરૂપને રિલેક્સ કરવામાં આવે છે, જે DNA ની દ્વિગુણન પ્રક્રિયા દરમિયાન તણાવને દૂર કરે છે. હેલિકેઝ DNA ના ડબલ હેલિક્સને ખોલે છે, પરંતુ સુપરકોઇલિંગને રિલેક્સ કરતું નથી. DNA પોલિમરેઝ I ઓકાઝાકી ફ્રેગમેન્ટ્સને જોડે છે, જ્યારે લાઇગેઝ DNA ના ટુકડાઓને જોડે છે.", "ref": "Std 12 - Chapter 6: આણ્વિક આનુવંશિકતા", "ch": ""}, {"q": "DNA ની મ્યુટેશન દરમિયાન, જો એક ન્યુક્લિયોટાઇડ બદલાય છે, તો તેને શું કહેવાય છે?", "opts": ["ડિલીશન", "ઇન્સર્શન", "પોઈન્ટ મ્યુટેશન", "ફ્રેમશિફ્ટ મ્યુટેશન"], "ans": 2, "exp": "જો એક ન્યુક્લિયોટાઇડ બદલાય છે, તો તેને પોઈન્ટ મ્યુટેશન કહેવાય છે. ડિલીશનમાં એક ન્યુક્લિયોટાઇડ કાઢી નાખવામાં આવે છે, ઇન્સર્શનમાં એક ન્યુક્લિયોટાઇડ ઉમેરવામાં આવે છે, જ્યારે ફ્રેમશિફ્ટ મ્યુટેશનમાં ન્યુક્લિયોટાઇડની સંખ્યામાં ફેરફાર થવાથી વાંચન ફ્રેમ બદલાય છે.", "ref": "Std 12 - Chapter 6: આણ્વિક આનુવંશિકતા", "ch": ""}, {"q": "DNA ની રચનામાં, કયા બેઇઝ જોડી વચ્ચે ત્રણ હાઇડ્રોજન બંધો હોય છે?", "opts": ["એડેનિન અને થાયમિન", "સાયટોસિન અને ગ્વાનિન", "એડેનિન અને ગ્વાનિન", "થાયમિન અને સાયટોસિન"], "ans": 1, "exp": "સાયટોસિન અને ગ્વાનિન વચ્ચે ત્રણ હાઇડ્રોજન બંધો હોય છે, જ્યારે એડેનિન અને થાયમિન વચ્ચે બે હાઇડ્રોજન બંધો હોય છે. A, C, અને D વિકલ્પ ખોટા છે કારણ કે તેમાં ત્રણ હાઇડ્રોજન બંધો નથી.", "ref": "Std 12 - Chapter 6: આણ્વિક આનુવંશિકતા", "ch": ""}, {"q": "DNA ની દ્વિગુણન પ્રક્રિયા દરમિયાન, ટેલોમિયર પ્રદેશમાં કયા ઉત્સેચક દ્વારા ટેલોમિયરની લંબાઈ જાળવી રાખવામાં આવે છે?", "opts": ["DNA પોલિમરેઝ I", "ટેલોમરેઝ", "હેલિકેઝ", "લાઇગેઝ"], "ans": 1, "exp": "ટેલોમરેઝ ઉત્સેચક ટેલોમિયર પ્રદેશમાં ટેલોમિયરની લંબાઈ જાળવી રાખવા માટે જરૂરી હોય છે. DNA પોલિમરેઝ I DNA ની દ્વિગુણન પ્રક્રિયામાં ભાગ લે છે, પરંતુ ટેલોમિયરની લંબાઈ જાળવી રાખવા માટે નહીં. હેલિકેઝ DNA ને અનવાઇન્ડ કરવા માટે જવાબદાર હોય છે, જ્યારે લાઇગેઝ DNA ના ટુકડાઓને જોડવા માટે જવાબદાર હોય છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની રચનામાં, કયા ન્યુક્લિયોટાઇડમાં થાયમિન બેઇઝ નથી હોતું?", "opts": ["RNA", "DNA", "ATP", "NAD"], "ans": 0, "exp": "RNA માં થાયમિન બેઇઝ નથી હોતું, તેના બદલે યુરેસિલ બેઇઝ હોય છે. DNA માં થાયમિન બેઇઝ હોય છે. ATP અને NAD ન્યુક્લિયોટાઇડ છે, પરંતુ તેઓમાં થાયમિન બેઇઝ નથી હોતું, પરંતુ આ પ્રશ્નમાં RNA એ સૌથી યોગ્ય જવાબ છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની દ્વિગુણન પ્રક્રિયા દરમિયાન, કયા ઉત્સેચક દ્વારા ઓકાઝાકી ફ્રેગમેન્ટ્સ ની રચના થાય છે?", "opts": ["DNA પોલિમરેઝ I", "DNA પોલિમરેઝ III", "હેલિકેઝ", "પ્રાઇમેઝ"], "ans": 1, "exp": "DNA પોલિમરેઝ III દ્વારા લેગિંગ સ્ટ્રેન્ડ પર ઓકાઝાકી ફ્રેગમેન્ટ્સ ની રચના થાય છે. DNA પોલિમરેઝ I ઓકાઝાકી ફ્રેગમેન્ટ્સ ને જોડવા અને RNA પ્રાઇમરને દૂર કરવા માટે જવાબદાર હોય છે. હેલિકેઝ DNA ને અનવાઇન્ડ કરવા માટે જવાબદાર હોય છે, જ્યારે પ્રાઇમેઝ RNA પ્રાઇમરની રચના કરવા માટે જવાબદાર હોય છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની મ્યુટેશન દરમિયાન, જો એક ન્યુક્લિયોટાઇડનું સ્થાન બદલાય છે, પરંતુ પ્રોટીનની રચના પર કોઈ અસર થતી નથી, તો તેને શું કહેવાય છે?", "opts": ["નિશ્ચલ મ્યુટેશન", "સંરચનાત્મક મ્યુટેશન", "ફ્રેમશિફ્ટ મ્યુટેશન", "મિસસેન્સ મ્યુટેશન"], "ans": 0, "exp": "નિશ્ચલ મ્યુટેશન એવી મ્યુટેશન છે જેમાં ન્યુક્લિયોટાઇડનું સ્થાન બદલાય છે, પરંતુ પ્રોટીનની રચના પર કોઈ અસર થતી નથી. સંરચનાત્મક મ્યુટેશન એ વર્ણસૂત્રની રચનામાં ફેરફાર છે. ફ્રેમશિફ્ટ મ્યુટેશન એવી મ્યુટેશન છે જેમાં ન્યુક્લિયોટાઇડ ઉમેરાય અથવા કાઢી નાખાય છે, જેથી પ્રોટીનની રચના બદલાય છે. મિસસેન્સ મ્યુટેશન એવી મ્યુટેશન છે જેમાં એક એમિનો એસિડ બદલાય છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની રચનામાં, કયા બેઇઝ જોડી વચ્ચે દ્વિ-હાઇડ્રોજન બંધો હોય છે?", "opts": ["એડિનિન અને થાયમિન", "ગ્વાનિન અને સાયટોસિન", "એડિનિન અને સાયટોસિન", "ગ્વાનિન અને થાયમિન"], "ans": 0, "exp": "એડિનિન અને થાયમિન વચ્ચે દ્વિ-હાઇડ્રોજન બંધો હોય છે. ગ્વાનિન અને સાયટોસિન વચ્ચે ત્રણ હાઇડ્રોજન બંધો હોય છે. એડિનિન અને સાયટોસિન, ગ્વાનિન અને થાયમિન વચ્ચે કોઈ હાઇડ્રોજન બંધો નથી હોતા.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "DNA ની દ્વિગુણન પ્રક્રિયા દરમિયાન, જો ટોપોઇઝોમેરેઝ ઉત્સેચક નિષ્ક્રિય થાય, તો કયું પરિણામ થશે?", "opts": ["DNA નું દ્વિગુણન સંપૂર્ણ રીતે અટકી જશે", "DNA ના સુપરકોઇલ્ડ સ્વરૂપમાં તણાવ વધશે અને દ્વિગુણન ધીમું પડશે", "ઓકાઝાકી ફ્રેગમેન્ટ્સની રચના થશે નહીં", "RNA પ્રાઇમરની રચના અટકી જશે"], "ans": 1, "exp": "ટોપોઇઝોમેરેઝ ઉત્સેચક DNA ના સુપરકોઇલ્ડ સ્વરૂપને નિયંત્રિત કરે છે. જો તે નિષ્ક્રિય થાય, તો DNA ના દ્વિગુણન દરમિયાન સુપરકોઇલિંગના તણાવને કારણે પ્રક્રિયા ધીમી પડશે. A) ખોટું છે કારણ કે દ્વિગુણન સંપૂર્ણ અટકતું નથી, પરંતુ ધીમું પડે છે. C) ખોટું છે કારણ કે ઓકાઝાકી ફ્રેગમેન્ટ્સની રચના DNA પોલિમરેઝ દ્વારા થાય છે, ટોપોઇઝોમેરેઝ દ્વારા નહીં. D) ખોટું છે કારણ કે RNA પ્રાઇમરની રચના પ્રાઇમેઝ ઉત્સેચક દ્વારા થાય છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન", "ch": ""}, {"q": "DNA ની રચનામાં, જો એક સ્ટ્રેન્ડમાં 5’-ATGCGT-3’ ક્રમ હોય, તો તેના પૂરક સ્ટ્રેન્ડમાં કયો ક્રમ હશે, જો તે RNA મોલેક્યુલ હોય?", "opts": ["5’-TACGCA-3’", "3’-UACGCA-5’", "5’-UACGCA-3’", "3’-TACGCA-5’"], "ans": 2, "exp": "RNA મોલેક્યુલમાં, થાયમિન (T) ની જગ્યાએ યુરેસિલ (U) હોય છે. DNA ના પૂરક સ્ટ્રેન્ડમાં 3’-TACGCA-5’ ક્રમ હશે, પરંતુ RNA માટે, T ની જગ્યાએ U આવશે, જેથી ક્રમ 5’-UACGCA-3’ થશે. A) ખોટું છે કારણ કે તે DNA પૂરક સ્ટ્રેન્ડ છે. B) ખોટું છે કારણ કે દિશા 3’ થી 5’ છે, પરંતુ RNA નો ક્રમ 5’ થી 3’ હોવો જોઈએ. D) ખોટું છે કારણ કે તે DNA પૂરક સ્ટ્રેન્ડ છે અને દિશા પણ ખોટી છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન", "ch": ""}, {"q": "DNA ની મ્યુટેશન દરમિયાન, જો એક ન્યુક્લિયોટાઇડનો ક્રમ બદલાય છે અને તેના કારણે કોડોન UAA બને છે, તો કયું પરિણામ થશે?", "opts": ["પ્રોટીનની લંબાઈ વધશે", "પ્રોટીનની લંબાઈ ઘટશે", "પ્રોટીનનું સંપૂર્ણ સંશ્લેષણ અટકી જશે", "પ્રોટીનમાં એક એમિનો એસિડ બદલાશે"], "ans": 2, "exp": "UAA એ સ્ટોપ કોડોન છે, જે પ્રોટીન સંશ્લેષણને અટકાવે છે. જો મ્યુટેશનના કારણે UAA કોડોન બને, તો પ્રોટીનનું સંપૂર્ણ સંશ્લેષણ અટકી જશે. A) ખોટું છે કારણ કે સ્ટોપ કોડોન પ્રોટીનની લંબાઈ વધારશે નહીં. B) ખોટું છે કારણ કે સ્ટોપ કોડોન પ્રોટીનની લંબાઈ ઘટાડશે નહીં, પરંતુ સંપૂર્ણ સંશ્લેષણ અટકાવશે. D) ખોટું છે કારણ કે સ્ટોપ કોડોન એમિનો એસિડ બદલશે નહીં, પરંતુ સંશ્લેષણ અટકાવશે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન", "ch": ""}, {"q": "DNA ની દ્વિગુણન પ્રક્રિયા દરમિયાન, લેગિંગ સ્ટ્રેન્ડ પર કયા ઉત્સેચકની ક્રિયા સૌથી મહત્વપૂર્ણ છે?", "opts": ["હેલિકેઝ", "DNA પોલિમરેઝ I", "DNA પોલિમરેઝ III", "લાઇગેઝ"], "ans": 2, "exp": "લેગિંગ સ્ટ્રેન્ડ પર, DNA પોલિમરેઝ III ઓકાઝાકી ફ્રેગમેન્ટ્સની રચના કરે છે. હેલિકેઝ DNA ને અનવાઇન્ડ કરે છે, પરંતુ તે લેગિંગ સ્ટ્રેન્ડ પર સીધી ક્રિયા કરતું નથી. DNA પોલિમરેઝ I RNA પ્રાઇમરને દૂર કરે છે અને ખાલી જગ્યા ભરે છે, પરંતુ તે લેગિંગ સ્ટ્રેન્ડ પરની મુખ્ય ક્રિયા નથી. લાઇગેઝ ઓકાઝાકી ફ્રેગમેન્ટ્સને જોડે છે, પરંતુ તે મુખ્ય ક્રિયા નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન", "ch": ""}, {"q": "DNA ની રચનામાં, જો એક ન્યુક્લિયોટાઇડમાં ડી-ઓક્સીરાઇબોઝ શર્કરા ની જગ્યાએ રાઇબોઝ શર્કરા હોય, તો તે કયા મોલેક્યુલનો ભાગ હશે?", "opts": ["DNA", "RNA", "ATP", "NAD"], "ans": 1, "exp": "RNA મોલેક્યુલમાં, શર્કરા તરીકે રાઇબોઝ હોય છે, જ્યારે DNA મોલેક્યુલમાં ડી-ઓક્સીરાઇબોઝ હોય છે. ATP અને NAD મોલેક્યુલમાં પણ રાઇબોઝ શર્કરા હોય છે, પરંતુ તે ન્યુક્લિયોટાઇડ નથી. A) ખોટું છે કારણ કે DNA માં ડી-ઓક્સીરાઇબોઝ શર્કરા હોય છે. C) ખોટું છે કારણ કે ATP એ ન્યુક્લિયોટાઇડ નથી, પરંતુ એડિનોસિન ટ્રાઇફોસ્ફેટ છે. D) ખોટું છે કારણ કે NAD એ ન્યુક્લિયોટાઇડ નથી, પરંતુ નિકોટિનેમાઇડ એડિનિન ડાયન્યુક્લિયોટાઇડ છે.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક જીવવિજ્ઞાન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
