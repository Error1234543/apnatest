<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>બનાવવાની પદ્ધતિઓ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>બનાવવાની પદ્ધતિઓ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">બનાવવાની પદ્ધતિઓ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "જ્યારે કોષમાં ગ્લુકોઝની ઉણપ હોય ત્યારે યકૃતમાં ગ્લાયકોજનના વિઘટન દ્વારા ગ્લુકોઝ મુક્ત કરવા માટે કયો હોર્મોન જવાબદાર હોય છે અને તે કયા અંગ દ્વારા સ્રાવાય છે?", "opts": ["ઇન્સ્યુલિન - અગ્ન્યાશય", "ગ્લુકેગોન - અગ્ન્યાશય", "એડ્રિનેલિન - અધિવૃક્ક ગ્રંથિ", "થાયરોક્સિન - થાયરોઈડ ગ્રંથિ"], "ans": 1, "exp": "ગ્લુકેગોન હોર્મોન અગ્ન્યાશયના અલ્ફા કોષો દ્વારા સ્રાવાય છે અને તે યકૃતમાં ગ્લાયકોજનના વિઘટનને ઉત્તેજિત કરી ગ્લુકોઝ મુક્ત કરે છે. ઇન્સ્યુલિન ગ્લુકોઝના સંગ્રહણને ઉત્તેજિત કરે છે, એડ્રિનેલિન અસાધારણ પરિસ્થિતિમાં ગ્લુકોઝ મુક્ત કરે છે, અને થાયરોક્સિન ચયાપચય દરને નિયંત્રિત કરે છે પરંતુ ગ્લાયકોજન વિઘટનમાં સીધો ભાગ ભજવતું નથી.", "ref": "Std 12 - Chapter 16: શરીરમાં રસાયણિક સંકલન અને નિયંત્રણ", "ch": ""}, {"q": "પ્રકાશસંશ્લેષણ દરમિયાન ક્લોરોપ્લાસ્ટમાં થતી પ્રક્રિયામાં કયો પદાર્થ પ્રથમ બનાવવામાં આવે છે અને તે કયા ચક્ર દ્વારા બનાવવામાં આવે છે?", "opts": ["ગ્લુકોઝ - કેલ્વિન ચક્ર", "3-ફોસ્ફોગ્લિસેરિક એસિડ - કેલ્વિન ચક્ર", "રાઇબ્યુલોઝ 1,5-બાયસ્ફોસ્ફેટ - કેલ્વિન ચક્ર", "સ્ટાર્ચ - ક્રેબ્સ ચક્ર"], "ans": 1, "exp": "પ્રકાશસંશ્લેષણના અંધકારી તબક્કામાં કેલ્વિન ચક્ર દ્વારા પ્રથમ 3-ફોસ્ફોગ્લિસેરિક એસિડ (3-PGA) બનાવવામાં આવે છે. ગ્લુકોઝ અને સ્ટાર્ચ પછીના તબક્કામાં બનાવવામાં આવે છે, જ્યારે રાઇબ્યુલોઝ 1,5-બાયસ્ફોસ્ફેટ કેલ્વિન ચક્રનું પ્રારંભિક પદાર્થ છે પરંતુ પ્રથમ ઉત્પાદન નથી. ક્રેબ્સ ચક્ર શ્વસન સાથે સંબંધિત છે.", "ref": "Std 11 - Chapter 13: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "કોષમાં પ્રોટીન બનાવવાની પદ્ધતિમાં, mRNA પરના કોડોનને ઓળખવા અને અમિનો એસિડ લાવવા માટે કયો RNA જવાબદાર હોય છે?", "opts": ["rRNA", "tRNA", "mRNA", "snRNA"], "ans": 1, "exp": "tRNA (ટ્રાન્સફર RNA) mRNA પરના કોડોનને ઓળખે છે અને તેના એન્ટિકોડોન દ્વારા અમિનો એસિડને રાઇબોઝોમ પર લાવે છે. rRNA રાઇબોઝોમનું બંધારણ બનાવે છે, mRNA જનીન સંદેશો વહન કરે છે, અને snRNA RNA પ્રોસેસિંગમાં ભાગ ભજવે છે.", "ref": "Std 12 - Chapter 6: જનીન અભિવ્યક્તિ અને નિયંત્રણ", "ch": ""}, {"q": "યુરિયા ચક્ર દરમિયાન, યકૃતમાં એમોનિયાનું યુરિયામાં રૂપાંતર કરવા માટે કયા ચક્રનો ઉપયોગ થાય છે અને તે કયા ઉત્સેચક દ્વારા ઉત્પ્રેરિત થાય છે?", "opts": ["ઓર્નિથિન ચક્ર - યુરિયેઝ", "ક્રેબ્સ ચક્ર - એટીપેઝ", "ઓર્નિથિન ચક્ર - કાર્બામોઈલ ફોસ્ફેટ સિંથેટેઝ", "કોરી ચક્ર - ટ્રાન્સએમિનેઝ"], "ans": 2, "exp": "યુરિયા ચક્ર (ઓર્નિથિન ચક્ર) દરમિયાન, એમોનિયાનું યુરિયામાં રૂપાંતર કરવા માટે કાર્બામોઈલ ફોસ્ફેટ સિંથેટેઝ ઉત્સેચક જવાબદાર હોય છે. યુરિયેઝ યુરિયાનું વિઘટન કરે છે, એટીપેઝ ATP બનાવે છે, અને ટ્રાન્સએમિનેઝ અમિનો એસિડના રૂપાંતરણમાં ભાગ ભજવે છે.", "ref": "Std 12 - Chapter 19: ઉત્સર્જન અને ઉત્સર્જન તંત્ર", "ch": ""}, {"q": "કોષવિભાજન દરમિયાન, વર્ણસૂત્રોની પ્રતિકૃતિ બનાવવા માટે કયો ઉત્સેચક જવાબદાર હોય છે અને તે કયા તબક્કામાં સક્રિય થાય છે?", "opts": ["DNA પોલિમરેઝ - S તબક્કો", "RNA પોલિમરેઝ - G1 તબક્કો", "હેલિકેઝ - M તબક્કો", "લાઇગેઝ - G2 તબક્કો"], "ans": 0, "exp": "DNA પોલિમરેઝ ઉત્સેચક DNAની પ્રતિકૃતિ બનાવવા માટે જવાબદાર હોય છે અને તે કોષચક્રના S તબક્કામાં સક્રિય થાય છે. RNA પોલિમરેઝ RNA સંશ્લેષણમાં ભાગ ભજવે છે, હેલિકેઝ DNAને અનવાઇન્ડ કરે છે, અને લાઇગેઝ DNA ટુકડાઓને જોડે છે.", "ref": "Std 12 - Chapter 4: કોષ ચક્ર અને કોષવિભાજન", "ch": ""}, {"q": "જીવન ચક્ર દરમિયાન, કયા પદાર્થનું સંશ્લેષણ થાય છે જે કોષના વૃદ્ધિ અને વિભાજન માટે આવશ્યક છે, પરંતુ તેનું નિર્માણ મુખ્યત્વે કોષકેન્દ્ર બહાર થાય છે?", "opts": ["DNA", "RNA", "પ્રોટીન", "કાર્બોદિત"], "ans": 2, "exp": "કોષના વૃદ્ધિ અને વિભાજન માટે પ્રોટીનનું સંશ્લેષણ આવશ્યક છે. પ્રોટીનનું નિર્માણ મુખ્યત્વે રાઇબોઝોમ પર થાય છે, જે કોષકેન્દ્ર બહાર સાયટોપ્લાઝમમાં સ્થિત હોય છે. DNA અને RNAનું નિર્માણ કોષકેન્દ્રમાં થાય છે, જ્યારે કાર્બોદિતનું સંશ્લેષણ પ્રકાશસંશ્લેષણ અથવા અન્ય ચયાપચય પ્રક્રિયાઓ દ્વારા થાય છે.", "ref": "Std 11 - Chapter 8: કોષ અને કોષવિભાજન", "ch": ""}, {"q": "કયા હોર્મોનનું સંશ્લેષણ અગ્ર પિટ્યુટરી ગ્રંથિમાં થાય છે અને તે વૃદ્ધિને પ્રોત્સાહન આપે છે, પરંતુ તેનું નિયમન હાઇપોથેલેમસ દ્વારા થાય છે?", "opts": ["ઇન્સ્યુલિન", "વૃદ્ધિ હોર્મોન (GH)", "થાયરોક્સિન", "એડ્રિનેલિન"], "ans": 1, "exp": "વૃદ્ધિ હોર્મોન (GH)નું સંશ્લેષણ અગ્ર પિટ્યુટરી ગ્રંથિમાં થાય છે અને તે વૃદ્ધિને પ્રોત્સાહન આપે છે. તેનું નિયમન હાઇપોથેલેમસ દ્વારા થાય છે. ઇન્સ્યુલિન પેંક્રિયાસમાં, થાયરોક્સિન થાયરોઇડ ગ્રંથિમાં, અને એડ્રિનેલિન એડ્રિનલ ગ્રંથિમાં બનાવવામાં આવે છે.", "ref": "Std 12 - Chapter 10: હોર્મોન અને સંકલન", "ch": ""}, {"q": "કયા પદાર્થનું સંશ્લેષણ કોષમાં થાય છે જે ઉર્જા સંગ્રહ માટે વપરાય છે, પરંતુ તેનું વિઘટન ગ્લુકોઝની ઉણપ વખતે થાય છે?", "opts": ["સ્ટાર્ચ", "ગ્લાયકોજન", "સેલ્યુલોઝ", "લિપિડ"], "ans": 1, "exp": "ગ્લાયકોજનનું સંશ્લેષણ કોષમાં થાય છે અને તે ઉર્જા સંગ્રહ માટે વપરાય છે. ગ્લુકોઝની ઉણપ વખતે, ગ્લાયકોજનનું વિઘટન થાય છે અને ગ્લુકોઝ મુક્ત થાય છે. સ્ટાર્ચ અને સેલ્યુલોઝ વનસ્પતિઓમાં જોવા મળે છે, જ્યારે લિપિડ ઉર્જા સંગ્રહ માટે વપરાય છે પરંતુ તેનું વિઘટન ગ્લાયકોજન જેવી રીતે થતું નથી.", "ref": "Std 11 - Chapter 9: ચયાપચય", "ch": ""}, {"q": "કયા ઉત્સેચકનું સંશ્લેષણ કોષકેન્દ્રમાં થાય છે અને તે DNAની પ્રતિકૃતિ બનાવવા માટે જવાબદાર હોય છે?", "opts": ["RNA પોલિમરેઝ", "DNA પોલિમરેઝ", "હેલિકેઝ", "લાયગેઝ"], "ans": 1, "exp": "DNA પોલિમરેઝનું સંશ્લેષણ કોષકેન્દ્રમાં થાય છે અને તે DNAની પ્રતિકૃતિ બનાવવા માટે જવાબદાર હોય છે. RNA પોલિમરેઝ RNAનું સંશ્લેષણ કરે છે, હેલિકેઝ DNAને અણુમાં ખોલે છે, અને લાયગેઝ DNAના ટુકડાઓને જોડે છે.", "ref": "Std 12 - Chapter 3: જનીન અને વંશપરંપરાગતતા", "ch": ""}, {"q": "કયા પદાર્થનું સંશ્લેષણ કોષમાં થાય છે જે કોષના રક્ષણ અને સંરક્ષણ માટે આવશ્યક છે, પરંતુ તેનું નિર્માણ એન્ડોપ્લાઝમિક રેટિક્યુલમમાં થાય છે?", "opts": ["પ્રોટીન", "લિપિડ", "કાર્બોદિત", "ન્યુક્લિક એસિડ"], "ans": 1, "exp": "લિપિડનું સંશ્લેષણ કોષમાં થાય છે અને તે કોષના રક્ષણ અને સંરક્ષણ માટે આવશ્યક છે. લિપિડનું નિર્માણ એન્ડોપ્લાઝમિક રેટિક્યુલમમાં થાય છે. પ્રોટીનનું નિર્માણ રાઇબોઝોમ પર, કાર્બોદિતનું સંશ્લેષણ ક્લોરોપ્લાસ્ટ અથવા અન્ય સ્થળે, અને ન્યુક્લિક એસિડનું નિર્માણ કોષકેન્દ્રમાં થાય છે.", "ref": "Std 11 - Chapter 7: કોષના ઘટકો અને તેમના કાર્યો", "ch": ""}, {"q": "કોષમાં લિપિડના સંશ્લેષણ માટે કયા અંગિકમાં સૌથી વધુ પ્રક્રિયા થાય છે અને તે માટે કયો આધાર પદાર્થ જરૂરી હોય છે?", "opts": ["સંરચનાત્મક ગોલ્ગી ઉપકરણ અને એસિટાઇલ-CoA", "સૂક્ષ્મકણિકાઓ અને ગ્લિસરોલ", "માઇટોકોન્ડ્રિયા અને પાયરુવિક એસિડ", "લાઇસોસોમ અને ફોસ્ફોલિપિડ"], "ans": 1, "exp": "લિપિડનું સંશ્લેષણ મુખ્યત્વે સૂક્ષ્મકણિકાઓ (Endoplasmic Reticulum)માં થાય છે, જ્યાં એસિટાઇલ-CoA અને ગ્લિસરોલ જેવા આધાર પદાર્થોનો ઉપયોગ થાય છે. A) ગોલ્ગી ઉપકરણ લિપિડના સંગ્રહ અને પરિવહનમાં મદદ કરે છે, પરંતુ સંશ્લેષણ માટે નહીં. C) માઇટોકોન્ડ્રિયા ઉર્જા ઉત્પાદન માટે જવાબદાર છે, પાયરુવિક એસિડ શ્વસનમાં વપરાય છે. D) લાઇસોસોમ પાચન માટે જવાબદાર છે, ફોસ્ફોલિપિડ લિપિડનો એક પ્રકાર છે, પરંતુ સંશ્લેષણ સૂક્ષ્મકણિકામાં થાય છે.", "ref": "Std 11 - અધ્યાય 8: કોષ અને તેના અંગિકો", "ch": ""}, {"q": "DNAની પ્રતિકૃતિ દરમિયાન, કયો ઉત્સેચક પ્રાઇમરનું સંશ્લેષણ કરે છે અને તે કયા દિશામાં કામ કરે છે?", "opts": ["DNA પોલિમરેઝ I, 5' → 3' દિશામાં", "પ્રાઇમેઝ, 5' → 3' દિશામાં", "હેલિકેઝ, 3' → 5' દિશામાં", "લાઇગેઝ, 3' → 5' દિશામાં"], "ans": 1, "exp": "પ્રાઇમરનું સંશ્લેષણ પ્રાઇમેઝ ઉત્સેચક દ્વારા થાય છે અને તે હમેશા 5' → 3' દિશામાં કામ કરે છે. A) DNA પોલિમરેઝ I પ્રાઇમરને દૂર કરે છે અને ખાલી જગ્યાને ભરે છે, પરંતુ પ્રાઇમર બનાવતું નથી. C) હેલિકેઝ DNAને અનવાઇન્ડ કરે છે, પરંતુ પ્રાઇમર બનાવતું નથી અને તેની દિશા અલગ છે. D) લાઇગેઝ DNAના ટુકડાઓને જોડે છે, પરંતુ પ્રાઇમર બનાવતું નથી.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક આનુવંશિકતા", "ch": ""}, {"q": "કોષમાં પ્રોટીનના સંશ્લેષણ દરમિયાન, કયા અણુની ઉણપથી પોલિપેપ્ટાઇડ શૃંખલાનું સંશ્લેષણ અટકી જાય છે અને કયા તબક્કે તે થાય છે?", "opts": ["tRNAની ઉણપ, ટ્રાન્સલેશનના એલોંગેશન તબક્કે", "mRNAની ઉણપ, ટ્રાન્સલેશનના ઇનિશિયેશન તબક્કે", "rRNAની ઉણપ, ટ્રાન્સલેશનના ટર્મિનેશન તબક્કે", "અમિનો એસિડની ઉણપ, ટ્રાન્સક્રિપ્શનના તબક્કે"], "ans": 0, "exp": "tRNAની ઉણપથી ટ્રાન્સલેશનના એલોંગેશન તબક્કે અમિનો એસિડ લાવવા માટે અટકી જાય છે, જેથી પોલિપેપ્ટાઇડ શૃંખલાનું સંશ્લેષણ અટકી જાય છે. B) mRNAની ઉણપ ઇનિશિયેશન તબક્કે અટકાવે છે, પરંતુ પ્રશ્ન એલોંગેશન વિશે છે. C) rRNA રાઇબોસોમના બનાવટ માટે જરૂરી છે, પરંતુ તેની ઉણપ ટર્મિનેશન તબક્કે અસર કરતી નથી. D) અમિનો એસિડની ઉણપ ટ્રાન્સલેશનને અસર કરે છે, પરંતુ ટ્રાન્સક્રિપ્શન તબક્કે નહીં.", "ref": "Std 12 - અધ્યાય 6: આણ્વિક આનુવંશિકતા", "ch": ""}, {"q": "કોષમાં ક્લોરોફિલના સંશ્લેષણ માટે કયા પદાર્થની અને કયા અંગિકની જરૂર પડે છે?", "opts": ["મેગ્નેશિયમ અને રાઇબોસોમ", "લોહતત્વ અને માઇટોકોન્ડ્રિયા", "મેગ્નેશિયમ અને ક્લોરોપ્લાસ્ટ", "કેલ્શિયમ અને ગોલ્ગી ઉપકરણ"], "ans": 2, "exp": "ક્લોરોફિલનું સંશ્લેષણ ક્લોરોપ્લાસ્ટમાં થાય છે અને તે માટે મેગ્નેશિયમ જરૂરી છે. A) રાઇબોસોમ પ્રોટીન સંશ્લેષણ માટે જવાબદાર છે, ક્લોરોફિલ માટે નહીં. B) લોહતત્વ હીમોગ્લોબિન જેવા પદાર્થો માટે જરૂરી છે, માઇટોકોન્ડ્રિયા ઉર્જા ઉત્પાદન માટે છે. D) કેલ્શિયમ કોષની દીવાલ અને સિગ્નલિંગ માટે જરૂરી છે, ગોલ્ગી ઉપકરણ લિપિડ અને પ્રોટીનના પરિવહન માટે છે.", "ref": "Std 11 - અધ્યાય 13: પ્રકાશસંશ્લેષણ", "ch": ""}, {"q": "યકૃતમાં ગ્લુકોઝથી ગ્લાયકોજનના સંશ્લેષણ માટે કયા હોર્મોનની અને કયા ઉત્સેચકની જરૂર પડે છે?", "opts": ["ઇન્સ્યુલિન અને ગ્લાયકોજન સિંથેઝ", "ગ્લુકેગોન અને ગ્લાયકોજન ફોસ્ફરિલેઝ", "એડ્રિનેલિન અને ગ્લાયકોજન સિંથેઝ", "કોર્ટિઝોલ અને ગ્લાયકોજન ફોસ્ફરિલેઝ"], "ans": 0, "exp": "ગ્લુકોઝથી ગ્લાયકોજનના સંશ્લેષણ માટે ઇન્સ્યુલિન હોર્મોન અને ગ્લાયકોજન સિંથેઝ ઉત્સેચકની જરૂર પડે છે. B) ગ્લુકેગોન અને ગ્લાયકોજન ફોસ્ફરિલેઝ ગ્લાયકોજનના વિઘટન માટે જવાબદાર છે. C) એડ્રિનેલિન ગ્લાયકોજનના વિઘટનને પ્રોત્સાહન આપે છે. D) કોર્ટિઝોલ ગ્લુકોનિયોજેનેસિસને પ્રોત્સાહન આપે છે, પરંતુ ગ્લાયકોજન સંશ્લેષણ માટે નહીં.", "ref": "Std 12 - અધ્યાય 16: જૈવિક પ્રક્રિયાઓમાં વહન અને ઉત્સર્જન", "ch": ""}, {"q": "કોષમાં લિપિડના સંશ્લેષણ દરમિયાન, એસિટાઇલ-CoA ની ભૂમિકા શું છે અને તે કયા અંગિકમાં સૌથી વધુ સક્રિય હોય છે?", "opts": ["એસિટાઇલ-CoA લિપિડના સંશ્લેષણ માટે કાચો માલ છે અને તે માઇટોકોન્ડ્રિયામાં સૌથી વધુ સક્રિય હોય છે.", "એસિટાઇલ-CoA ફેટી એસિડના સંશ્લેષણ માટે પ્રારંભિક પદાર્થ છે અને તે સાયટોપ્લાઝમમાં સક્રિય હોય છે.", "એસિટાઇલ-CoA કોલેસ્ટરોલના સંશ્લેષણ માટે જરૂરી છે અને તે એન્ડોપ્લાઝમિક રેટિક્યુલમમાં સક્રિય હોય છે.", "એસિટાઇલ-CoA ગ્લુકોઝના સંશ્લેષણ માટે વપરાય છે અને તે ગોલ્ગી કોપરમાં સક્રિય હોય છે."], "ans": 1, "exp": "એસિટાઇલ-CoA ફેટી એસિડના સંશ્લેષણ માટે પ્રારંભિક પદાર્થ છે અને તે સાયટોપ્લાઝમમાં સક્રિય હોય છે. માઇટોકોન્ડ્રિયામાં એસિટાઇલ-CoA નું ઉત્પાદન થાય છે, પરંતુ લિપિડ સંશ્લેષણ સાયટોપ્લાઝમમાં થાય છે. કોલેસ્ટરોલનું સંશ્લેષણ એન્ડોપ્લાઝમિક રેટિક્યુલમમાં થાય છે, પરંતુ એસિટાઇલ-CoA તે માટે પણ જરૂરી છે, પરંતુ પ્રશ્ન લિપિડ સંશ્લેષણ પર કેન્દ્રિત છે. ગોલ્ગી કોપર લિપિડ સંશ્લેષણ સાથે સીધો સંબંધ ધરાવતું નથી.", "ref": "Std 12 - Chapter 8: કોષ અને કોષીય પ્રક્રિયાઓ", "ch": ""}, {"q": "કોષમાં DNA ની પ્રતિકૃતિ દરમિયાન, કયો ઉત્સેચક પ્રાઇમરનું સંશ્લેષણ કરે છે અને તે કયા દિશામાં કામ કરે છે?", "opts": ["DNA પોલિમરેઝ I, 5' થી 3' દિશામાં", "પ્રાઇમેઝ, 5' થી 3' દિશામાં", "હેલિકેઝ, 3' થી 5' દિશામાં", "લાઇગેઝ, 3' થી 5' દિશામાં"], "ans": 1, "exp": "DNA ની પ્રતિકૃતિ દરમિયાન, પ્રાઇમેઝ ઉત્સેચક પ્રાઇમરનું સંશ્લેષણ કરે છે અને તે 5' થી 3' દિશામાં કામ કરે છે. DNA પોલિમરેઝ I પ્રાઇમરને દૂર કરે છે અને ખાલી જગ્યાને ભરે છે, પરંતુ તે પ્રાઇમરનું સંશ્લેષણ કરતું નથી. હેલિકેઝ DNA ની ડબલ હેલિક્સને ખોલે છે, પરંતુ તે પ્રાઇમરનું સંશ્લેષણ કરતું નથી. લાઇગેઝ DNA ની શૃંખલાઓને જોડે છે, પરંતુ તે પ્રાઇમરનું સંશ્લેષણ કરતું નથી.", "ref": "Std 12 - Chapter 6: આણ્વિક જનીનશાસ્ત્ર", "ch": ""}, {"q": "કોષમાં હિમોગ્લોબિનના સંશ્લેષણ માટે નીચેનામાંથી કયો પદાર્થ અનિવાર્ય છે, પરંતુ તેનું સંશ્લેષણ કોષમાં થતું નથી?", "opts": ["ગ્લોબિન પ્રોટીન", "હીમ જૂથ (Heme group)", "આયર્ન (Fe²⁺)", "વિટામિન B₁₂"], "ans": 2, "exp": "હિમોગ્લોબિનનું સંશ્લેષણ લાલ રક્તકણોમાં થાય છે, જેમાં ગ્લોબિન પ્રોટીન કોષમાં જ સંશ્લેષિત થાય છે. હીમ જૂથનું સંશ્લેષણ પણ કોષમાં થાય છે, પરંતુ આયર્ન (Fe²⁺) કોષ બહારથી મેળવે છે અને તેનું સંશ્લેષણ કોષમાં થતું નથી. વિટામિન B₁₂ હિમોગ્લોબિનના સંશ્લેષણ માટે જરૂરી છે, પરંતુ તે પણ કોષ બહારથી મેળવે છે. જોકે, આયર્ન એ હિમોગ્લોબિનના હીમ જૂથનો મુખ્ય ઘટક છે અને તેનું સંશ્લેષણ કોષમાં થતું નથી.", "ref": "Std 11 - પ્રકરણ 16: પાચન અને શોષણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન કોષમાં કોલેસ્ટેરોલના સંશ્લેષણ માટે ખોટું છે?", "opts": ["કોલેસ્ટેરોલનું સંશ્લેષણ મુખ્યત્વે યકૃતના કોષોમાં થાય છે.", "કોલેસ્ટેરોલના સંશ્લેષણ માટે HMG-CoA રિડક્ટેઝ ઉત્સેચક જરૂરી છે.", "કોલેસ્ટેરોલનું સંશ્લેષણ કોષકેન્દ્રમાં થાય છે.", "કોલેસ્ટેરોલના સંશ્લેષણ માટે એસિટાઇલ-CoA જરૂરી છે."], "ans": 2, "exp": "કોલેસ્ટેરોલનું સંશ્લેષણ કોષના સાઇટોપ્લાઝમ અને એન્ડોપ્લાઝમિક રેટિક્યુલમમાં થાય છે, કોષકેન્દ્રમાં નહીં. HMG-CoA રિડક્ટેઝ ઉત્સેચક કોલેસ્ટેરોલના સંશ્લેષણમાં મુખ્ય ભૂમિકા ભજવે છે અને એસિટાઇલ-CoA તેનો મુખ્ય પૂર્વગ છે. યકૃતના કોષોમાં કોલેસ્ટેરોલનું સંશ્લેષણ સૌથી વધુ થાય છે.", "ref": "Std 12 - પ્રકરણ 9: જૈવ અણુઓ", "ch": ""}, {"q": "કોષમાં ન્યુક્લિઓટાઇડના સંશ્લેષણ માટે નીચેનામાંથી કયો પદાર્થ સીધો પૂર્વગ તરીકે વપરાતો નથી?", "opts": ["રિબોઝ-5-ફોસ્ફેટ", "એમિનો એસિડ (ગ્લુટામિન)", "કાર્બન ડાયોક્સાઇડ (CO₂)", "ગ્લાયસીન"], "ans": 2, "exp": "ન્યુક્લિઓટાઇડના સંશ્લેષણમાં રિબોઝ-5-ફોસ્ફેટ (પેન્ટોઝ ફોસ્ફેટ પાથવેથી), ગ્લુટામિન (એમિનો એસિડ) અને ગ્લાયસીન સીધા પૂર્વગ તરીકે વપરાય છે. કાર્બન ડાયોક્સાઇડ (CO₂) ન્યુક્લિઓટાઇડના સંશ્લેષણમાં સીધો પૂર્વગ તરીકે વપરાતો નથી, પરંતુ તે અન્ય ચયાપચયિક પ્રક્રિયાઓમાં ભાગ લે છે.", "ref": "Std 12 - પ્રકરણ 6: આનુવંશિક દ્રવ્ય અને જનીન અભિવ્યક્તિ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
