<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>નામકરણ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>નામકરણ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">નામકરણ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક સંશોધકે નવી જાતિના બેક્ટેરિયાનું નામ *Escherichia coli* var. *gujaratensis* આપ્યું. આ નામકરણ પદ્ધતિના સંદર્ભમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["*Escherichia* એ જીનસનું નામ છે અને તે હંમેશા મોટા અક્ષરથી શરૂ થાય છે", "*coli* એ પ્રજાતિનું નામ છે અને તે નાના અક્ષરથી લખાય છે", "*var.* એ વિવિધતા દર્શાવે છે અને તેને ત્રિપદી નામકરણ કહેવાય છે", "આ નામકરણ આંતરરાષ્ટ્રીય વનસ્પતિ નામકરણ સંહિતા (ICBN) મુજબ યોગ્ય છે"], "ans": 3, "exp": "સાચો જવાબ D છે. બેક્ટેરિયાના નામકરણ માટે આંતરરાષ્ટ્રીય પ્રોકેરિયોટિક નામકરણ સંહિતા (ICNP) લાગુ પડે છે, ICBN નહીં. ICBN વનસ્પતિઓ માટે છે. A, B અને C વિધાનો સાચાં છે કારણ કે જીનસનું નામ મોટા અક્ષરથી, પ્રજાતિનું નામ નાના અક્ષરથી લખાય છે અને *var.* વિવિધતા દર્શાવે છે, જે ત્રિપદી નામકરણનો ભાગ છે.", "ref": "Std 11 - પ્રકરણ 1: જીવવિજ્ઞાનમાં જીવંત વિશ્વ", "ch": ""}, {"q": "નીચેના પૈકી કયું નામકરણ યોગ્ય નથી અને શા માટે?\n1. *Felis domesticus*\n2. *Mangifera indica* Linn.\n3. *Homo sapiens* L.\n4. *Canis lupus* var. *familiaris*", "opts": ["1, કારણ કે પ્રજાતિનું નામ મોટા અક્ષરથી લખાયું છે", "2, કારણ કે લેખકનું નામ પૂરું લખવું જોઈએ", "3, કારણ કે લેખકનું નામ માત્ર પ્રથમ અક્ષરથી દર્શાવાયું છે", "4, કારણ કે વિવિધતા દર્શાવવા *ssp.* વપરાય છે, *var.* નહીં"], "ans": 0, "exp": "સાચો જવાબ A છે. પ્રજાતિનું નામ હંમેશા નાના અક્ષરથી લખાય છે, તેથી *Felis domesticus* ખોટું છે. 2માં *Linn.* એ લિનિયસનું સંક્ષિપ્ત રૂપ છે જે યોગ્ય છે. 3માં *L.* પણ લિનિયસનું સંક્ષિપ્ત રૂપ છે જે માન્ય છે. 4માં *var.* વિવિધતા દર્શાવવા યોગ્ય છે, *ssp.* ઉપજાતિ માટે વપરાય છે.", "ref": "Std 11 - પ્રકરણ 1: જીવવિજ્ઞાનમાં જીવંત વિશ્વ", "ch": ""}, {"q": "એક વિદ્યાર્થીએ નવી જાતિના ફૂગનું નામ *Aspergillus niger* var. *albus* આપ્યું. આ નામકરણ સંદર્ભે નીચેનાં વિધાનોમાંથી કયું સાચું નથી?", "opts": ["*Aspergillus* એ જીનસનું નામ છે અને તે યોગ્ય રીતે મોટા અક્ષરથી લખાયું છે", "*niger* એ પ્રજાતિનું નામ છે અને તે યોગ્ય રીતે નાના અક્ષરથી લખાયું છે", "*var. albus* એ વિવિધતા દર્શાવે છે અને તેને દ્વિપદી નામકરણ કહેવાય છે", "આ નામકરણ આંતરરાષ્ટ્રીય વનસ્પતિ નામકરણ સંહિતા (ICBN) મુજબ યોગ્ય છે"], "ans": 2, "exp": "સાચો જવાબ C છે. *var. albus* વિવિધતા દર્શાવે છે, પરંતુ આ ત્રિપદી નામકરણ છે, દ્વિપદી નહીં. દ્વિપદી નામકરણમાં માત્ર જીનસ અને પ્રજાતિનું નામ હોય છે. A, B અને D વિધાનો સાચાં છે કારણ કે જીનસનું નામ મોટા અક્ષરથી, પ્રજાતિનું નામ નાના અક્ષરથી લખાય છે અને ફૂગ માટે ICBN લાગુ પડે છે.", "ref": "Std 11 - પ્રકરણ 1: જીવવિજ્ઞાનમાં જીવંત વિશ્વ", "ch": ""}, {"q": "નીચેના પૈકી કયું ઉદાહરણ આંતરરાષ્ટ્રીય પ્રાણી નામકરણ સંહિતા (ICZN) મુજબ યોગ્ય નથી?", "opts": ["*Panthera leo* (Linnaeus, 1758)", "*Rana tigrina* Daudin, 1802", "*Gallus gallus domesticus*", "*Apis mellifera* L."], "ans": 2, "exp": "સાચો જવાબ C છે. *Gallus gallus domesticus* એ ત્રિપદી નામકરણ છે, જે પ્રાણીઓ માટે સામાન્ય રીતે માન્ય નથી. પ્રાણીઓ માટે દ્વિપદી નામકરણ જ માન્ય છે. Aમાં લેખક અને વર્ષ યોગ્ય રીતે દર્શાવ્યા છે. Bમાં લેખક અને વર્ષ યોગ્ય છે. Dમાં *L.* લિનિયસનું સંક્ષિપ્ત રૂપ યોગ્ય છે.", "ref": "Std 11 - પ્રકરણ 1: જીવવિજ્ઞાનમાં જીવંત વિશ્વ", "ch": ""}, {"q": "એક સંશોધકે નવી જાતિના વાઇરસનું નામ *Influenza A virus* subtype *H1N1* આપ્યું. આ નામકરણ સંદર્ભે નીચેનાં વિધાનોમાંથી કયું ખોટું છે?", "opts": ["વાઇરસના નામકરણ માટે આંતરરાષ્ટ્રીય વાઇરસ વર્ગીકરણ સમિતિ (ICTV)ના નિયમો લાગુ પડે છે", "*Influenza A virus* એ જીનસ અને પ્રજાતિનું સંયુક્ત નામ છે", "*H1N1* એ સબટાઇપ દર્શાવે છે અને તેને ત્રિપદી નામકરણ કહેવાય છે", "વાઇરસના નામકરણમાં દ્વિપદી નામકરણ પદ્ધતિ લાગુ પડતી નથી"], "ans": 2, "exp": "સાચો જવાબ C છે. *H1N1* એ સબટાઇપ દર્શાવે છે, પરંતુ તેને ત્રિપદી નામકરણ ન કહી શકાય. વાઇરસના નામકરણમાં દ્વિપદી કે ત્રિપદી નામકરણ પદ્ધતિ લાગુ પડતી નથી. A સાચું છે કારણ કે ICTV વાઇરસના નામકરણ માટે જવાબદાર છે. Bમાં *Influenza A virus* એ વર્ગીકરણનું એક સ્તર છે, જીનસ-પ્રજાતિ નહીં. D સાચું છે કારણ કે વાઇરસ માટે દ્વિપદી નામકરણ લાગુ પડતું નથી.", "ref": "Std 12 - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "ch": ""}, {"q": "એક સંશોધકે નવી જાતિના છોડનું નામ *Mangifera indica* L. var. *kesarensis* આપ્યું છે. આ નામકરણમાં નીચેનામાંથી કયો ભાગ આંતરરાષ્ટ્રીય વનસ્પતિ નામકરણ સંહિતા (ICBN) મુજબ અયોગ્ય છે?", "opts": ["*Mangifera indica* L.", "var. *kesarensis*", "લેખકનું નામ 'L.'", "જાતિ અને જાતિવિભેદ વચ્ચેનો સંબંધ"], "ans": 2, "exp": "આ નામકરણમાં 'L.' (લિનિયસ) લેખકનું નામ યોગ્ય રીતે લખાયું છે, પરંતુ ICBN મુજબ જો જાતિવિભેદ (variety) આપવામાં આવે તો તેનું નામ પણ લેટિનમાં હોવું જોઈએ અને તેના પછી લેખકનું નામ આવવું જોઈએ. અહીં *kesarensis* લેટિન નામ છે, પરંતુ લેખકનું નામ જાતિવિભેદ પછી મૂકવું જોઈએ (દા.ત. var. *kesarensis* Smith). તેથી 'L.' લેખકનું નામ અયોગ્ય સ્થાને છે. બાકીના વિકલ્પો યોગ્ય છે કારણ કે *Mangifera indica* યોગ્ય જાતિનું નામ છે, var. *kesarensis* જાતિવિભેદ દર્શાવે છે, અને જાતિ-જાતિવિભેદ સંબંધ પણ યોગ્ય છે.", "ref": "Std 11 - પ્રકરણ 1: જીવવિજ્ઞાનમાં જીવંત વિશ્વ", "ch": ""}, {"q": "નીચેના પૈકી કયું નામકરણ આંતરરાષ્ટ્રીય વનસ્પતિ નામકરણ સંહિતા (ICBN) મુજબ અપવાદરૂપ છે?", "opts": ["*Zea mays* L.", "*Triticum aestivum* emend. Fiori & Paol.", "*Solanum tuberosum* L. subsp. *andigenum* (Juz. & Bukasov) Hawkes", "*Oryza sativa* var. *indica* (Desv.) Kato"], "ans": 1, "exp": "*Triticum aestivum* emend. Fiori & Paol. એ ICBN મુજબ અપવાદરૂપ છે કારણ કે 'emend.' (emendavit) શબ્દનો ઉપયોગ નામમાં સુધારો દર્શાવવા માટે થાય છે, જે સામાન્ય રીતે નામકરણમાં ઉપયોગમાં લેવાતો નથી. બાકીના વિકલ્પો યોગ્ય છે: *Zea mays* L. યોગ્ય લેખક નામ સાથે છે, *Solanum tuberosum* subsp. *andigenum* યોગ્ય ઉપજાતિ દર્શાવે છે, અને *Oryza sativa* var. *indica* યોગ્ય જાતિવિભેદ દર્શાવે છે.", "ref": "Std 11 - પ્રકરણ 1: જીવવિજ્ઞાનમાં જીવંત વિશ્વ", "ch": ""}, {"q": "એક સંશોધકે નવી જાતિના પ્રાણીનું નામ *Panthera leo persica* (Meyer, 1826) આપ્યું છે. આ નામકરણમાં નીચેનામાંથી કયો નિયમ આંતરરાષ્ટ્રીય પ્રાણી નામકરણ સંહિતા (ICZN) મુજબ ભંગ થયો છે?", "opts": ["લેખકનું નામ અને વર્ષ કૌંસમાં મૂકવું", "ઉપજાતિનું નામ જાતિના નામ પછી લખવું", "લેટિનમાં નામ લખવું", "ઉપજાતિનું નામ નાનું અક્ષરથી શરૂ કરવું"], "ans": 3, "exp": "ICZN મુજબ પ્રાણીઓના વૈજ્ઞાનિક નામ લેટિનમાં હોવા જોઈએ, પરંતુ અહીં કોઈ ભંગ નથી કારણ કે *Panthera leo persica* લેટિનમાં છે. વાસ્તવિક ભંગ એ છે કે ઉપજાતિનું નામ નાનું અક્ષરથી શરૂ થવું જોઈએ નહીં, તે મોટું અક્ષરથી શરૂ થવું જોઈએ (દા.ત. *Panthera leo Persica*). લેખકનું નામ અને વર્ષ કૌંસમાં મૂકવું યોગ્ય છે, ઉપજાતિનું નામ જાતિ પછી લખવું યોગ્ય છે, અને લેટિનમાં નામ લખવું પણ યોગ્ય છે.", "ref": "Std 11 - પ્રકરણ 1: જીવવિજ્ઞાનમાં જીવંત વિશ્વ", "ch": ""}, {"q": "નીચેના પૈકી કયું નામકરણ વનસ્પતિ અને પ્રાણીઓ બંને માટે અલગ-અલગ નિયમો ધરાવે છે?", "opts": ["જાતિનું નામ મોટું અક્ષરથી શરૂ કરવું", "લેટિનમાં નામ લખવું", "લેખકનું નામ નામ પછી લખવું", "ઉપજાતિનું નામ જાતિ પછી લખવું"], "ans": 2, "exp": "લેટિનમાં નામ લખવું એ વનસ્પતિ અને પ્રાણીઓ બંને માટે સામાન્ય નિયમ છે, પરંતુ લેખકનું નામ લખવાની રીત અલગ છે: વનસ્પતિઓમાં લેખકનું નામ સંપૂર્ણ લખાય છે (દા.ત. L. for Linnaeus), જ્યારે પ્રાણીઓમાં લેખકનું નામ અને વર્ષ કૌંસમાં લખાય છે (દા.ત. (Meyer, 1826)). બાકીના વિકલ્પો બંને માટે સમાન છે: જાતિનું નામ મોટું અક્ષરથી શરૂ થાય છે, ઉપજાતિનું નામ જાતિ પછી લખાય છે.", "ref": "Std 11 - પ્રકરણ 1: જીવવિજ્ઞાનમાં જીવંત વિશ્વ", "ch": ""}, {"q": "એક સંશોધકે નવી જાતિના ફૂગનું નામ *Agaricus bisporus* (J.E. Lange) Imbach આપ્યું છે. આ નામકરણમાં કૌંસનો ઉપયોગ શું દર્શાવે છે?", "opts": ["આ ફૂગનું નામ પહેલા બીજા લેખકે આપ્યું હતું", "આ ફૂગની જાતિ બદલાઈ છે", "આ ફૂગનું નામ અપૂર્ણ છે", "આ ફૂગનું નામ અમાન્ય છે"], "ans": 0, "exp": "કૌંસનો ઉપયોગ દર્શાવે છે કે આ જાતિનું નામ પહેલા બીજા લેખકે આપ્યું હતું (J.E. Lange), પરંતુ પછીથી Imbach દ્વારા તેને સુધારવામાં આવ્યું અથવા ફરીથી વર્ગીકૃત કરવામાં આવ્યું. આ ICBN ના નિયમ મુજબ છે, જ્યાં મૂળ લેખકનું નામ કૌંસમાં અને સુધારનાર લેખકનું નામ કૌંસ બહાર લખાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે કૌંસ જાતિ બદલાઈ હોવાનું કે નામ અપૂર્ણ/અમાન્ય હોવાનું દર્શાવતા નથી.", "ref": "Std 11 - પ્રકરણ 1: જીવવિજ્ઞાનમાં જીવંત વિશ્વ", "ch": ""}, {"q": "એક સંશોધકે નવી જાતિના સાયનોબેક્ટેરિયાનું નામ *Nostoc muscorum* var. *aquaticus* આપ્યું છે. આ નામકરણમાં કયો ભૂલ છે?", "opts": ["વર્ણસૂત્રી નામમાં 'var.' નો ઉપયોગ થવો જોઈએ નહીં, કારણ કે સાયનોબેક્ટેરિયા પ્રોકેરિયોટ છે.", "જાતિનું નામ *muscorum* લેટિન ભાષામાં નહીં હોવાથી અયોગ્ય છે.", "જાતિનું નામ *Nostoc* અને *muscorum* બંને ઇટાલિકમાં લખાયા હોવા જોઈએ.", "ઉપનામ (*aquaticus*) નું પ્રથમ અક્ષર મોટું હોવું જોઈએ."], "ans": 0, "exp": "સાયનોબેક્ટેરિયા પ્રોકેરિયોટિક સજીવ છે, જેમાં વર્ણસૂત્રો હાજર નથી. આથી 'var.' (વેરાયટી) નો ઉપયોગ અયોગ્ય છે, કારણ કે વેરાયટીનો ઉપયોગ ફક્ત યુકેરિયોટિક સજીવો માટે થાય છે. બાકીના વિકલ્પો ખોટા છે: B) *muscorum* લેટિન ભાષાનું શબ્દ છે, C) બંને નામ ઇટાલિકમાં લખાયા છે (યોગ્ય), D) ઉપનામનું પ્રથમ અક્ષર નાનું લખાય છે (યોગ્ય).", "ref": "Std 11 - અધ્યાય 1: સજીવોમાં વિવિધતા", "ch": ""}, {"q": "એક સંશોધકે નવી જાતિના ફૂગનું નામ *Penicillium chrysogenum* f. sp. *notatum* આપ્યું છે. આ નામકરણમાં કયો ભૂલ છે?", "opts": ["'f. sp.' નો ઉપયોગ ફૂગ માટે થતો નથી, ફક્ત બેક્ટેરિયા માટે થાય છે.", "જાતિનું નામ *chrysogenum* અને ઉપજાતિ *notatum* બંને ઇટાલિકમાં લખાયા હોવા જોઈએ.", "'f. sp.' નો ઉપયોગ ફૂગ માટે યોગ્ય છે, પરંતુ તેને ઇટાલિકમાં લખવું જોઈએ.", "ઉપજાતિનું નામ *notatum* નું પ્રથમ અક્ષર મોટું હોવું જોઈએ."], "ans": 0, "exp": "'f. sp.' (forma specialis) નો ઉપયોગ ફૂગ માટે થતો નથી, તે ફક્ત બેક્ટેરિયા અને કેટલાક સજીવો માટે થાય છે. ફૂગ માટે 'var.' અથવા 'subsp.' નો ઉપયોગ થાય છે. બાકીના વિકલ્પો ખોટા છે: B) બંને નામ ઇટાલિકમાં લખાયા છે (યોગ્ય), C) 'f. sp.' ઇટાલિકમાં લખવું જોઈએ નહીં, D) ઉપજાતિનું નામ નાનું લખાય છે (યોગ્ય).", "ref": "Std 11 - અધ્યાય 2: વનસ્પતિ જગત", "ch": ""}, {"q": "નીચેના પૈકી કયું નામકરણ આંતરરાષ્ટ્રીય નિયમો મુજબ અયોગ્ય છે, કારણ કે તે નામ પહેલાથી જ અસ્તિત્વમાં છે?", "opts": ["*Escherichia coli* (Migula, 1895) Castellani and Chalmers, 1919", "*Saccharomyces cerevisiae* Meyen ex E.C. Hansen, 1883", "*Staphylococcus aureus* Rosenbach, 1884", "*Bacillus subtilis* (Ehrenberg, 1835) Cohn, 1872"], "ans": 3, "exp": "*Bacillus subtilis* નામ પહેલાથી જ *Bacillus* જાતિમાં અસ્તિત્વમાં છે, અને તેનો ઉપયોગ પુનરાવર્તિત થયો છે. બાકીના વિકલ્પો યોગ્ય છે: A) *Escherichia coli* યોગ્ય નામકરણ છે, B) *Saccharomyces cerevisiae* યોગ્ય નામકરણ છે, C) *Staphylococcus aureus* યોગ્ય નામકરણ છે.", "ref": "Std 11 - અધ્યાય 1: સજીવોમાં વિવિધતા", "ch": ""}, {"q": "એક સંશોધકે નવી જાતિના પ્રાણીનું નામ *Felis catus* Linnaeus, 1758 આપ્યું છે. આ નામકરણમાં કયો ભૂલ છે?", "opts": ["*Felis catus* નામ પહેલાથી જ *Felis silvestris catus* તરીકે અસ્તિત્વમાં છે.", "નામમાં વર્ષ લખવું જોઈએ નહીં, કારણ કે તે અપૂર્ણ છે.", "જાતિનું નામ *catus* નું પ્રથમ અક્ષર મોટું હોવું જોઈએ.", "*Felis* અને *catus* બંને ઇટાલિકમાં લખાયા હોવા જોઈએ નહીં."], "ans": 0, "exp": "*Felis catus* નામ પહેલાથી જ *Felis silvestris catus* તરીકે અસ્તિત્વમાં છે, જે ICZN મુજબ અયોગ્ય છે. બાકીના વિકલ્પો ખોટા છે: B) વર્ષ લખવું યોગ્ય છે, C) જાતિનું નામ નાનું લખાય છે (યોગ્ય), D) બંને નામ ઇટાલિકમાં લખાયા છે (યોગ્ય).", "ref": "Std 11 - અધ્યાય 1: સજીવોમાં વિવિધતા", "ch": ""}, {"q": "એક સંશોધકે નવી જાતિના સસ્તન પ્રાણીનું નામ *Rattus norvegicus* subsp. *ahmedabadensis* નોંધાવ્યું છે. આ નામકરણ સંબંધિત નીચેના પૈકી કયું વિધાન સત્ય છે?", "opts": ["આ નામ ICZN મુજબ યોગ્ય છે, કારણ કે ઉપજાતિનું નામ લેટિન ભાષામાં લખાયેલું છે અને તે મુખ્ય જાતિના નામ પછી 'subsp.' સૂચવવામાં આવ્યું છે.", "આ નામ અયોગ્ય છે, કારણ કે ઉપજાતિના નામમાં સ્થાનિક નામ 'ahmedabadensis' વાપરવામાં આવ્યું છે, જે ICZN નિયમો પ્રમાણે મનાઈ છે.", "આ નામ અયોગ્ય છે, કારણ કે ઉપજાતિના નામ પહેલા 'var.' લખવું જરૂરી છે, 'subsp.' નહીં.", "આ નામ યોગ્ય છે, પરંતુ તેને *Rattus norvegicus ahmedabadensis* તરીકે લખવું જોઈએ, 'subsp.' વગર."], "ans": 0, "exp": "ICZN (આંતરરાષ્ટ્રીય પ્રાણી નામકરણ સંહિતા) મુજબ, ઉપજાતિના નામ માટે 'subsp.' અથવા 'sssp.' નો ઉપયોગ થઈ શકે છે, અને તે લેટિન ભાષામાં હોવું જરૂરી છે. 'ahmedabadensis' લેટિન ભાષાના નિયમો અનુસાર બનાવેલું સ્થાનિક નામ છે, જે મંજૂર છે. 'var.'નો ઉપયોગ વનસ્પતિઓ માટે થાય છે, પ્રાણીઓ માટે નહીં. 'subsp.' વગર લખવું પણ મંજૂર છે, પરંતુ પ્રશ્નમાં આપેલું નામ પૂરતું યોગ્ય છે. તેથી, વિકલ્પ A સત્ય છે.", "ref": "Std 11 - પ્રકરણ 1: જીવવિજ્ઞાનમાં નામકરણ અને વર્ગીકરણ", "ch": ""}, {"q": "એક સંશોધકે નવી જાતિના સાયનોબેક્ટેરિયાનું નામ *Oscillatoria* sp. *nov.* 'Gujarat-2023' આપ્યું છે. આ નામકરણમાં કયો ભૂલ છે?", "opts": ["જાતિનું નામ લેટિન ભાષામાં ન હોવું", "'sp. nov.' ની જગ્યાએ 'var.' વાપરવું જોઈતું હતું", "નામમાં વર્ષ અને સ્થળનો ઉલ્લેખ કરવો અયોગ્ય છે", "સાયનોબેક્ટેરિયા માટે ICBN નહીં પરંતુ ICNP નિયમો લાગુ પડે છે"], "ans": 3, "exp": "સાયનોબેક્ટેરિયા (બ્લૂ-ગ્રીન એલ્ગી) માટે આંતરરાષ્ટ્રીય નામકરણ નિયમો ICBN ( let userAns={},curIdx=0;

function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
