<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ધનાત્મક અને ઋણાત્મક વિચલન</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ધનાત્મક અને ઋણાત્મક વિચલન</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ધનાત્મક અને ઋણાત્મક વિચલન</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "જ્યારે કોષમાં ગ્લૂકોઝનું ઓક્સિડેશન થાય છે ત્યારે કયા વિટામિનની ઉણપથી પાયરૂવેટનું ઋણાત્મક વિચલન થાય છે અને લેક્ટિક એસિડ બને છે?", "opts": ["વિટામિન A", "વિટામિન B1 (થાયમિન)", "વિટામિન C", "વિટામિન D"], "ans": 1, "exp": "વિટામિન B1 (થાયમિન) પાયરૂવેટ ડિહાઇડ્રોજીનેઝ ઉત્સેચકનો સહ-ઉત્સેચક છે. તેની ઉણપથી પાયરૂવેટનું ઋણાત્મક વિચલન થાય છે અને લેક્ટિક એસિડ બને છે. વિટામિન A, C, અને D આ પ્રક્રિયામાં સીધી ભૂમિકા ભજવતાં નથી.", "ref": "Std 12 - અધ્યાય 9: શ્વસન અને ઉર્જા ઉત્પાદન", "ch": ""}, {"q": "ધનાત્મક વિચલનમાં કયો પદાર્થ સાયટોક્રોમ C ની સાથે સીધો સંબંધ ધરાવે છે?", "opts": ["NAD+", "FAD", "ATP", "ઓક્સિજન"], "ans": 3, "exp": "ધનાત્મક વિચલન (એરોબિક શ્વસન)માં ઓક્સિજન સાયટોક્રોમ C નો ઇલેક્ટ્રોન ગ્રહીતા છે. NAD+, FAD, અને ATP આ પ્રક્રિયામાં ભાગ લે છે પરંતુ સાયટોક્રોમ C સાથે સીધો સંબંધ ઓક્સિજનનો જ છે.", "ref": "Std 12 - અધ્યાય 9: શ્વસન અને ઉર્જા ઉત્પાદન", "ch": ""}, {"q": "ઋણાત્મક વિચલન દરમિયાન કયા પદાર્થનું સંકેતન થાય છે જે કોષને એનરોબિક પરિસ્થિતિમાં જીવિત રાખવામાં મદદ કરે છે?", "opts": ["પાયરૂવેટ", "એસિટાઇલ CoA", "લેક્ટિક એસિડ", "સિટ્રિક એસિડ"], "ans": 2, "exp": "ઋણાત્મક વિચલન (એનરોબિક શ્વસન) દરમિયાન પાયરૂવેટ લેક્ટિક એસિડમાં રૂપાંતરિત થાય છે, જે કોષને એનરોબિક પરિસ્થિતિમાં જીવિત રાખવામાં મદદ કરે છે. પાયરૂવેટ, એસિટાઇલ CoA, અને સિટ્રિક એસિડ આ પ્રક્રિયાના અન્ય તબક્કાઓ સાથે સંબંધિત છે.", "ref": "Std 12 - અધ્યાય 9: શ્વસન અને ઉર્જા ઉત્પાદન", "ch": ""}, {"q": "ધનાત્મક વિચલનમાં ક્રેબ્સ ચક્ર દરમિયાન કયા પદાર્થનું ઓક્સિડેશન થાય છે જે ATP નું ઉત્પાદન કરે છે?", "opts": ["ગ્લૂકોઝ", "પાયરૂવેટ", "એસિટાઇલ CoA", "લેક્ટિક એસિડ"], "ans": 2, "exp": "ધનાત્મક વિચલનમાં ક્રેબ્સ ચક્ર દરમિયાન એસિટાઇલ CoA નું ઓક્સિડેશન થાય છે, જે ATP નું ઉત્પાદન કરે છે. ગ્લૂકોઝ અને પાયરૂવેટ આ પહેલાના તબક્કામાં ભાગ લે છે, જ્યારે લેક્ટિક એસિડ ઋણાત્મક વિચલનનો ભાગ છે.", "ref": "Std 12 - અધ્યાય 9: શ્વસન અને ઉર્જા ઉત્પાદન", "ch": ""}, {"q": "જ્યારે કોષમાં ઓક્સિજનની ઉણપ હોય છે ત્યારે કયા પદાર્થનું સંકેતન થાય છે જે કોષને ઉર્જા પૂરી પાડે છે?", "opts": ["ATP", "NAD+", "લેક્ટિક એસિડ", "પાયરૂવેટ"], "ans": 0, "exp": "ઓક્સિજનની ઉણપમાં કોષ ઋણાત્મક વિચલન દ્વારા લેક્ટિક એસિડ બનાવે છે, પરંતુ ઉર્જા ATP રૂપે જ પૂરી પાડે છે. NAD+ અને પાયરૂવેટ આ પ્રક્રિયાના મધ્યવર્તી પદાર્થો છે, પરંતુ સીધી ઉર્જા ATP જ પૂરી પાડે છે.", "ref": "Std 12 - અધ્યાય 9: શ્વસન અને ઉર્જા ઉત્પાદન", "ch": ""}, {"q": "શ્વસન દરમિયાન ધનાત્મક વિચલનના અંતિમ ચરણમાં, કયા પદાર્થનું ઓક્સિડેશન થાય છે જે સાયટોક્રોમ C ની સાથે સંબંધિત નથી પરંતુ ઇલેક્ટ્રોન વહન શૃંખલામાં મહત્વની ભૂમિકા ભજવે છે?", "opts": ["NAD+", "FADH₂", "ગ્લૂકોઝ", "પાયરૂવેટ"], "ans": 1, "exp": "ધનાત્મક વિચલનના અંતિમ ચરણમાં, FADH₂ નું ઓક્સિડેશન થાય છે જે ઇલેક્ટ્રોન વહન શૃંખલામાં ઇલેક્ટ્રોન દાતા તરીકે કામ કરે છે. NAD+ પણ ઇલેક્ટ્રોન વહન શૃંખલામાં ભાગ લે છે પરંતુ તે સાયટોક્રોમ C સાથે સીધો સંબંધ ધરાવતું નથી. ગ્લૂકોઝ અને પાયરૂવેટ તો ક્રેબ્સ ચક્ર પહેલાંના ચરણોમાં ઓક્સિડેશન પામે છે.", "ref": "Std 12 - Chapter 14: શ્વસન", "ch": ""}, {"q": "ઋણાત્મક વિચલન દરમિયાન, કયા પદાર્થનું સંકેતન થાય છે જે કોષને એનરોબિક પરિસ્થિતિમાં ATP ની ઉત્પત્તિ માટે મદદરૂપ થાય છે, પરંતુ તે પાયરૂવેટનું સીધું પરિણામ નથી?", "opts": ["લેક્ટિક એસિડ", "ઇથેનોલ", "એસિટલ-CoA", "સક્સિનિક એસિડ"], "ans": 2, "exp": "ઋણાત્મક વિચલન દરમિયાન, એસિટલ-CoA નું સંકેતન થાય છે જે ક્રેબ્સ ચક્રમાં પ્રવેશે છે અને ATP ની ઉત્પત્તિમાં મદદરૂપ થાય છે. લેક્ટિક એસિડ અને ઇથેનોલ તો એનરોબિક શ્વસનના અંતિમ ઉત્પાદનો છે, જ્યારે સક્સિનિક એસિડ ક્રેબ્સ ચક્રનો એક પદાર્થ છે પરંતુ તે ઋણાત્મક વિચલન સાથે સીધો સંબંધ ધરાવતું નથી.", "ref": "Std 12 - Chapter 14: શ્વસન", "ch": ""}, {"q": "ધનાત્મક વિચલન દરમિયાન, ક્રેબ્સ ચક્રમાં કયા પદાર્થનું ઓક્સિડેશન થાય છે જે ATP ની સૌથી વધુ ઉત્પત્તિ કરે છે, પરંતુ તે સીધું ઇલેક્ટ્રોન વહન શૃંખલામાં ભાગ લેતું નથી?", "opts": ["સાયટ્રેટ", "આલ્ફા-કીટોગ્લૂટારેટ", "મેલેટ", "ઓક્ઝલોએસિટેટ"], "ans": 1, "exp": "ક્રેબ્સ ચક્રમાં આલ્ફા-કીટોગ્લૂટારેટનું ઓક્સિડેશન થાય છે જે ATP ની સૌથી વધુ ઉત્પત્તિ કરે છે. સાયટ્રેટ, મેલેટ, અને ઓક્ઝલોએસિટેટ પણ ક્રેબ્સ ચક્રના પદાર્થો છે પરંતુ તેઓ આલ્ફા-કીટોગ્લૂટારેટ જેટલી ATP ઉત્પત્તિ કરતા નથી.", "ref": "Std 12 - Chapter 14: શ્વસન", "ch": ""}, {"q": "ધનાત્મક અને ઋણાત્મક વિચલન વચ્ચેનો મુખ્ય તફાવત કયો છે જ્યારે કોષમાં ગ્લૂકોઝનું ઓક્સિડેશન થાય છે?", "opts": ["ધનાત્મક વિચલનમાં ઓક્સિજનની હાજરી હોય છે જ્યારે ઋણાત્મક વિચલનમાં નહીં", "ધનાત્મક વિચલનમાં ATP ની ઉત્પત્તિ ઓછી હોય છે જ્યારે ઋણાત્મક વિચલનમાં વધુ હોય છે", "ધનાત્મક વિચલનમાં પાયરૂવેટનું સંકેતન થાય છે જ્યારે ઋણાત્મક વિચલનમાં ગ્લૂકોઝનું", "ધનાત્મક વિચલનમાં ક્રેબ્સ ચક્ર ચાલુ રહે છે જ્યારે ઋણાત્મક વિચલનમાં નહીં"], "ans": 0, "exp": "ધનાત્મક વિચલન (એરોબિક શ્વસન)માં ઓક્સિજનની હાજરી હોય છે જ્યારે ઋણાત્મક વિચલન (એનરોબિક શ્વસન)માં ઓક્સિજનની ઉણપ હોય છે. બાકીના વિકલ્પો અસત્ય છે: ધનાત્મક વિચલનમાં ATP ની ઉત્પત્તિ વધુ હોય છે, પાયરૂવેટનું સંકેતન બંનેમાં થાય છે, અને ક્રેબ્સ ચક્ર ફક્ત ધનાત્મક વિચલનમાં જ ચાલે છે.", "ref": "Std 12 - Chapter 14: શ્વસન", "ch": ""}, {"q": "એક વિદ્યાર્થીએ બે જુદા-જુદા દ્રાવણોનું મિશ્રણ કર્યું અને નોંધ્યું કે મિશ્રણનું કુલ બાષ્પદબાણ રાઉલ્ટના નિયમથી અપેક્ષિત મૂલ્ય કરતાં વધુ છે. આ પરિસ્થિતિ માટે નીચેનામાંથી કયું વિધાન યોગ્ય નથી?", "opts": ["આ મિશ્રણ ધનાત્મક વિચલન દર્શાવે છે, જે દર્શાવે છે કે બંને ઘટકો વચ્ચે આંતરઆણ્વિક આકર્ષણ બળો નબળા છે", "આ મિશ્રણમાં બંને ઘટકોના અણુઓ વચ્ચે હાઇડ્રોજન બંધનની સંભાવના ઓછી હોય છે", "આ મિશ્રણમાં એક ઘટકનું બાષ્પદબાણ વધવાથી બીજા ઘટકનું બાષ્પદબાણ પણ વધે છે, જેને સહકારી અસર કહે છે", "આ મિશ્રણમાં બંને ઘટકોના અણુઓ વચ્ચે આંતરઆણ્વિક અપાકર્ષણ બળો પ્રબળ હોય તો પણ ધનાત્મક વિચલન જોવા મળી શકે છે"], "ans": 3, "exp": "ધનાત્મક વિચલન ત્યારે જોવા મળે છે જ્યારે બે ઘટકોના અણુઓ વચ્ચે આંતરઆણ્વિક આકર્ષણ બળો શુદ્ધ ઘટકોના અણુઓ વચ્ચેના આકર્ષણ બળો કરતાં નબળા હોય. આથી વિકલ્પ A યોગ્ય છે. વિકલ્પ B પણ યોગ્ય છે કારણ કે હાઇડ્રોજન બંધનની ગેરહાજરી આંતરઆણ્વિક આકર્ષણ ઘટાડે છે, જે ધનાત્મક વિચલનમાં પરિણમે છે. વિકલ્પ C ખોટું છે કારણ કે ધનાત્મક વિચલનમાં એક ઘટકનું બાષ્પદબાણ વધવાથી બીજા ઘટકનું બાષ્પદબાણ ઘટે છે, જેને સહકારી અસર ન કહી શકાય. વિકલ્પ D ખોટો છે કારણ કે આંતરઆણ્વિક અપાકર્ષણ બળો પ્રબળ હોય તો ઋણાત્મક વિચલન જોવા મળે, ધનાત્મક નહીં.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "ધનાત્મક વિચલન દરમિયાન, જ્યારે પાયરૂવેટ એસિટાઇલ-CoA માં રૂપાંતરિત થાય છે, ત્યારે કયા વિટામિન-વ્યુટકોફેક્ટરની જરૂર પડે છે, જેની ઉણપથી આ પ્રક્રિયા અટકી જાય છે?", "opts": ["વિટામિન B1 (થાયમિન)", "વિટામિન B2 (રિબોફ્લેવિન)", "વિટામિન B3 (નિકોટિનામાઇડ)", "વિટામિન B5 (પેન્ટોથેનિક એસિડ)"], "ans": 0, "exp": "પાયરૂવેટને એસિટાઇલ-CoA માં રૂપાંતરિત કરવા માટે પાયરૂવેટ ડિહાઇડ્રોજીનેઝ એન્ઝાઇમ કામ કરે છે, જેને વિટામિન B1 (થાયમિન) નો વ્યુટકોફેક્ટર TPP (થાયમિન પાયરોફોસ્ફેટ) જરૂરી હોય છે. વિટામિન B2 (રિબોફ્લેવિન) FAD/FADH2 નું ઘટક છે, જે ક્રેબ્સ ચક્રમાં કામ કરે છે. વિટામિન B3 (નિકોટિનામાઇડ) NAD+/NADH નું ઘટક છે, જે ઓક્સિડેશન-રિડક્શન પ્રક્રિયામાં કામ કરે છે. વિટામિન B5 (પેન્ટોથેનિક એસિડ) CoA નું ઘટક છે, પરંતુ પાયરૂવેટ ડિહાઇડ્રોજીનેઝ માટે સીધો વ્યુટકોફેક્ટર નથી.", "ref": "Std 12 - Chapter 14: શ્વસન અને ઉર્જા વહન", "ch": ""}, {"q": "ઋણાત્મક વિચલન દરમિયાન, કયો પદાર્થ સંકેતન પામે છે જે કોષને એનરોબિક પરિસ્થિતિમાં જીવિત રાખવા માટે ATP ની ઉત્પત્તિ ચાલુ રાખવામાં મદદ કરે છે, પરંતુ ધનાત્મક વિચલન દરમિયાન તેનું સંકેતન થતું નથી?", "opts": ["લેક્ટિક એસિડ", "એસિટાઇલ-CoA", "સક્સિનિક એસિડ", "સાયટ્રેટ"], "ans": 0, "exp": "ઋણાત્મક વિચલન (એનરોબિક શ્વસન) દરમિયાન, પાયરૂવેટ લેક્ટિક એસિડ અથવા ઇથેનોલમાં રૂપાંતરિત થાય છે, જે કોષને ATP ની ઉત્પત્તિ ચાલુ રાખવામાં મદદ કરે છે. એસિટાઇલ-CoA, સક્સિનિક એસિડ, અને સાયટ્રેટ ધનાત્મક વિચલન (એરોબિક શ્વસન) દરમિયાન ક્રેબ્સ ચક્રમાં સંકેતન પામે છે, પરંતુ એનરોબિક પરિસ્થિતિમાં નહીં.", "ref": "Std 12 - Chapter 14: શ્વસન અને ઉર્જા વહન", "ch": ""}, {"q": "જ્યારે કોષમાં ઓક્સિજનની ઉણપ હોય છે, ત્યારે કયા પદાર્થનું સંકેતન થાય છે જે કોષને એનરોબિક શ્વસન તરફ દોરી જાય છે, પરંતુ ધનાત્મક શ્વસન દરમિયાન તેનું સંકેતન થતું નથી?", "opts": ["પાયરૂવેટ", "એસિટાઇલ-CoA", "લેક્ટિક એસિડ", "સાયટ્રેટ"], "ans": 2, "exp": "ઓક્સિજનની ઉણપ દરમિયાન, પાયરૂવેટ લેક્ટિક એસિડ અથવા ઇથેનોલમાં રૂપાંતરિત થાય છે, જે કોષને એનરોબિક શ્વસન તરફ દોરી જાય છે. પાયરૂવેટ અને એસિટાઇલ-CoA ધનાત્મક શ્વસન દરમિયાન પણ સંકેતન પામે છે, પરંતુ લેક્ટિક એસિડ ફક્ત એનરોબિક પરિસ્થિતિમાં જ સંકેતન પામે છે. સાયટ્રેટ ધનાત્મક શ્વસન દરમિયાન ક્રેબ્સ ચક્રમાં સંકેતન પામે છે.", "ref": "Std 12 - Chapter 14: શ્વસન અને ઉર્જા વહન", "ch": ""}, {"q": "ધનાત્મક અને ઋણાત્મક વિચલન વચ્ચેનો મુખ્ય તફાવત એ છે કે ધનાત્મક વિચલન દરમિયાન કયા પદાર્થનું સંપૂર્ણ ઓક્સિડેશન થાય છે, જ્યારે ઋણાત્મક વિચલન દરમિયાન તેનું અપૂર્ણ ઓક્સિડેશન થાય છે?", "opts": ["ગ્લૂકોઝ", "પાયરૂવેટ", "લેક્ટિક એસિડ", "એસિટાઇલ-CoA"], "ans": 0, "exp": "ધનાત્મક વિચલન દરમિયાન, ગ્લૂકોઝનું સંપૂર્ણ ઓક્સિડેશન થાય છે અને CO2 અને H2O માં રૂપાંતરિત થાય છે, જ્યારે ઋણાત્મક વિચલન દરમિયાન ગ્લૂકોઝનું અપૂર્ણ ઓક્સિડેશન થાય છે અને લેક્ટિક એસિડ અથવા ઇથેનોલમાં રૂપાંતરિત થાય છે. પાયરૂવેટ, લેક્ટિક એસિડ, અને એસિટાઇલ-CoA આ પ્રક્રિયાના મધ્યવર્તી પદાર્થો છે, પરંતુ મુખ્ય તફાવત ગ્લૂકોઝના ઓક્સિડેશનમાં છે.", "ref": "Std 12 - Chapter 14: શ્વસન અને ઉર્જા વહન", "ch": ""}, {"q": "એક કોષમાં શ્વસનની ક્રિયા દરમિયાન, જો NADH નું સ્તર અસામાન્ય રીતે ઊંચું હોય અને ATP નું ઉત્પાદન ઘટી જાય, તો આ પરિસ્થિતિ કયા પ્રકારના વિચલન તરફ નિર્દેશ કરે છે? આ વિચલનમાં કયો મુખ્ય ઉત્સેચક અવરોધાય છે જેના કારણે ક્રેબ્સ ચક્ર ધીમું પડે છે?", "opts": ["ઋણાત્મક વિચલન, પાયરૂવેટ ડિહાઇડ્રોજનેઝ", "ધનાત્મક વિચલન, આઇસોસિટ્રેટ ડિહાઇડ્રોજનેઝ", "ઋણાત્મક વિચલન, સક્સિનેટ ડિહાઇડ્રોજનેઝ", "ધનાત્મક વિચલન, α-કીટોગ્લુટારેટ ડિહાઇડ્રોજનેઝ"], "ans": 1, "exp": "આ પરિસ્થિતિ ધનાત્મક વિચલન તરફ નિર્દેશ કરે છે, કારણ કે NADH નું ઊંચું સ્તર અને ATP નું ઘટતું ઉત્પાદન એ દર્શાવે છે કે ઇલેક્ટ્રોન પરિવહન શૃંખલા (ETC) અવરોધાયેલી છે, જેના કારણે ક્રેબ્સ ચક્ર ધીમું પડે છે. આ વિચલનમાં મુખ્ય ઉત્સેચક આઇસોસિટ્રેટ ડિહાઇડ્રોજનેઝ અવરોધાય છે, જે ક્રેબ્સ ચક્રના એક મહત્વપૂર્ણ તબક્કાને નિયંત્રિત કરે છે. વિકલ્પ A ખોટો છે કારણ કે પાયરૂવેટ ડિહાઇડ્રોજનેઝ ઋણાત્મક વિચલન સાથે સંકળાયેલ નથી. વિકલ્પ C ખોટો છે કારણ કે સક્સિનેટ ડિહાઇડ્રોજનેઝ ઋણાત્મક વિચલનમાં અવરોધાતો નથી. વિકલ્પ D ખોટો છે કારણ કે α-કીટોગ્લુટારેટ ડિહાઇડ્રોજનેઝ ધનાત્મક વિચલનમાં અવરોધાતો નથી, પરંતુ તે ક્રેબ્સ ચક્રનો એક ભાગ છે.", "ref": "Std 11 - પ્રકરણ 14: શ્વસન અને ઊર્જા વિનિમય", "ch": ""}, {"q": "ધનાત્મક વિચલન દરમિયાન, જ્યારે એસિટાઇલ-CoA ક્રેબ્સ ચક્રમાં પ્રવેશે છે, ત્યારે કયા ઉત્સેચકની ક્રિયાશીલતામાં વૃદ્ધિ થાય છે જેના કારણે ચક્રની ગતિ વધે છે?", "opts": ["સાયટ્રેટ સિંથેઝ", "આયસોસાયટ્રેટ ડિહાઇડ્રોજીનેઝ", "સક્સિનેટ ડિહાઇડ્રોજીનેઝ", "મેલેટ ડિહાઇડ્રોજીનેઝ"], "ans": 0, "exp": "ધનાત્મક વિચલન દરમિયાન એસિટાઇલ-CoA નું પ્રમાણ વધે છે, જે સાયટ્રેટ સિંથેઝ ઉત્સેચકની ક્રિયાશીલતાને ઉત્તેજિત કરે છે. આ ઉત્સેચક એસિટાઇલ-CoA ને ઓક્સાલોએસિટેટ સાથે જોડીને સાયટ્રેટ બનાવે છે, જે ક્રેબ્સ ચક્રની શરૂઆત છે. બાકીના ઉત્સેચકો (B, C, D) ચક્રના પછીના તબક્કામાં ક્રિયાશીલ થાય છે, પરંતુ તે એસિટાઇલ-CoA ની હાજરીથી સીધા ઉત્તેજિત થતા નથી.", "ref": "Std 12 - Chapter 14: શ્વસન અને ઉર્જા ઉત્પાદન", "ch": ""}, {"q": "ધનાત્મક અને ઋણાત્મક વિચલન વચ્ચેનો તફાવત એ છે કે ધનાત્મક વિચલનમાં કયા પદાર્થનું સંકેતન થાય છે જે ક્રેબ્સ ચક્રને ઉત્તેજિત કરે છે, જ્યારે ઋણાત્મક વિચલનમાં તે પદાર્થનું સંકેતન થતું નથી?", "opts": ["પાયરૂવેટ", "એસિટાઇલ-CoA", "સાયટ્રેટ", "ઓક્સાલોએસિટેટ"], "ans": 1, "exp": "ધનાત્મક વિચલનમાં એસિટાઇલ-CoA નું સંકેતન થાય છે, જે ક્રેબ્સ ચક્રને ઉત્તેજિત કરે છે. ઋણાત્મક વિચલનમાં, ઓક્સિજનની ઉણપ હોવાથી એસિટાઇલ-CoA નું સંકેતન થતું નથી, અને કોષ એનરોબિક શ્વસન તરફ વળે છે. પાયરૂવેટ (A) બંને પ્રકારના વિચલનમાં હાજર હોય છે, જ્યારે સાયટ્રેટ (C) અને ઓક્સાલોએસિટેટ (D) ક્રેબ્સ ચક્રના મધ્યવર્તી પદાર્થો છે, પરંતુ તે સંકેતન પામતા નથી.", "ref": "Std 12 - Chapter 14: શ્વસન અને ઉર્જા ઉત્પાદન", "ch": ""}, {"q": "એક કોષમાં શ્વસનની ક્રિયા દરમિયાન, જો NADH અને FADH₂ નું પ્રમાણ અસામાન્ય રીતે વધી જાય અને ઓક્સિડેટિવ ફોસ્ફોરાયલેશનની ક્રિયા અવરોધાય, તો નીચેનામાંથી કયું વિધાન સાચું છે?", "opts": ["કોષમાં ATP નું ઉત્પાદન વધશે કારણ કે NADH અને FADH₂ નું પ્રમાણ વધવાથી ઇલેક્ટ્રોન પરિવહન શૃંખલા સક્રિય બનશે.", "કોષમાં લેક્ટિક એસિડનું નિર્માણ થશે કારણ કે પાયરૂવેટનું લેક્ટેટમાં રૂપાંતરણ થશે, જે ઋણાત્મક વિચલન દર્શાવે છે.", "કોષમાં સાયટ્રિક એસિડ ચક્ર (ક્રેબ્સ ચક્ર) સંપૂર્ણપણે બંધ થઈ જશે કારણ કે NADH અને FADH₂ નું પ્રમાણ વધવાથી પ્રતિક્રિયા અવરોધાય છે.", "કોષમાં ઇથેનોલનું ઉત્પાદન થશે કારણ કે પાયરૂવેટનું ડિકાર્બોક્સિલેશન થઈ ઇથેનોલમાં રૂપાંતર થશે, જે ધનાત્મક વિચલન દર્શાવે છે."], "ans": 1, "exp": "NADH અને FADH₂ નું પ્રમાણ વધવાથી ઓક્સિડેટિવ ફોસ્ફોરાયલેશન અવરોધાય છે, જેના કારણે કોષમાં ઓક્સિજનની ઉણપ જેવી સ્થિતિ ઉભી થાય છે. આ પરિસ્થિતિમાં, પાયરૂવેટનું લેક્ટેટમાં રૂપાંતરણ થાય છે, જે ઋણાત્મક વિચલન દર્શાવે છે. વિકલ્પ A ખોટો છે કારણ કે ATP નું ઉત્પાદન ઘટે છે. વિકલ્પ C ખોટો છે કારણ કે ક્રેબ્સ ચક્ર સંપૂર્ણપણે બંધ થતું નથી, પરંતુ ધીમું પડે છે. વિકલ્પ D ખોટો છે કારણ કે ઇથેનોલનું ઉત્પાદન યીસ્ટ અને કેટલાક બેક્ટેરિયામાં થાય છે, પ્રાણી કોષોમાં નહીં.", "ref": "Std 11 - પ્રકરણ 14: શ્વસન અને ઊર્જા વિનિમય", "ch": ""}, {"q": "નીચેનામાંથી કયું ઉદાહરણ ધનાત્મક વિચલનનું નથી, પરંતુ ઋણાત્મક વિચલનનું છે?", "opts": ["જ્યારે કોષમાં ઓક્સિજનની ઉપલબ્ધતા વધારે હોય અને પાયરૂવેટનું સંપૂર્ણ ઓક્સિડેશન થાય.", "જ્યારે કોષમાં NADH નું પ્રમાણ વધી જાય અને પાયરૂવેટનું લેક્ટેટમાં રૂપાંતરણ થાય.", "જ્યારે કોષમાં સાયટોક્રોમ C ની પ્રવૃત્તિ વધે અને ઇલેક્ટ્રોન પરિવહન શૃંખલા સક્રિય બને.", "જ્યારે કોષમાં એસિટાઇલ-CoA નું પ્રમાણ વધે અને ક્રેબ્સ ચક્રમાં પ્રવેશ કરે."], "ans": 1, "exp": "ધનાત્મક વિચલનમાં ઓક્સિજનની હાજરીમાં પાયરૂવેટનું સંપૂર્ણ ઓક્સિડેશન થાય છે, જ્યારે ઋણાત્મક વિચલનમાં ઓક્સિજનની ઉણપને કારણે પાયરૂવેટનું લેક્ટેટમાં રૂપાંતરણ થાય છે. વિકલ્પ B ઋણાત્મક વિચલનનું ઉદાહરણ છે. વિકલ્પ A, C અને D ધનાત્મક વિચલનના ઉદાહરણો છે.", "ref": "Std 11 - પ્રકરણ 14: શ્વસન અને ઊર્જા વિનિમય", "ch": ""}, {"q": "એક પ્રયોગમાં, વૈજ્ઞાનિકોએ કોષમાં NADH ડિહાઇડ્રોજનેઝ ઉત્સેચકને અવરોધિત કર્યો. આ પરિસ્થિતિમાં નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["કોષમાં NADH નું પ્રમાણ વધશે કારણ કે તેનું ઓક્સિડેશન થઈ શકશે નહીં.", "ઇલેક્ટ્રોન પરિવહન શૃંખલા અવરોધાશે કારણ કે NADH નું ઓક્સિડેશન થઈ શકશે નહીં.", "કોષમાં લેક્ટિક એસિડનું ઉત્પાદન વધશે કારણ કે પાયરૂવેટનું લેક્ટેટમાં રૂપાંતરણ થશે, જે ઋણાત્મક વિચલન દર્શાવે છે.", "કોષમાં ATP નું ઉત્પાદન વધશે કારણ કે NADH ડિહાઇડ્રોજનેઝ અવરોધિત થવાથી વધારાનું NADH સીધું ATP માં રૂપાંતરિત થશે."], "ans": 3, "exp": "NADH ડિહાઇડ્રોજનેઝ અવરોધિત થવાથી NADH નું ઓક્સિડેશન થઈ શકતું નથી, જેના કારણે ઇલેક્ટ્રોન પરિવહન શૃંખલા અવરોધાય છે અને ATP નું ઉત્પાદન ઘટે છે. આ પરિસ્થિતિમાં, પાયરૂવેટનું લેક્ટેટમાં રૂપાંતરણ થાય છે, જે ઋણાત્મક વિચલન દર્શાવે છે. વિકલ્પ D ખોટો છે કારણ કે NADH સીધું ATP માં રૂપાંતરિત થતું નથી.", "ref": "Std 11 - પ્રકરણ 14: શ્વસન અને ઊર્જા વિનિમય", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
