<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>કાર્બોક્સિલિક એસિડની એસિડિકતા</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>કાર્બોક્સિલિક એસિડની એસિડિકતા</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">કાર્બોક્સિલિક એસિડની એસિડિકતા</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "નીચેનામાંથી કયા કાર્બોક્સિલિક એસિડની એસિડિકતા સૌથી ઓછી હોય છે અને તેનું કારણ શું છે?", "opts": ["એસિટિક એસિડ, કારણ કે તેની કોન્જ્યુગેટ બેઇઝ સ્થિર નથી", "ક્લોરોએસિટિક એસિડ, કારણ કે ક્લોરિન અણુ ઇલેક્ટ્રોન-આકર્ષક છે", "ટ્રાઇક્લોરોએસિટિક એસિડ, કારણ કે ત્રણ ક્લોરિન અણુઓ ઇલેક્ટ્રોન-આકર્ષક છે", "ફોર્મિક એસિડ, કારણ કે તે એકમાત્ર કાર્બોક્સિલિક એસિડ છે જેમાં અલ્ફા-હાઇડ્રોજન નથી"], "ans": 0, "exp": "એસિટિક એસિડની એસિડિકતા સૌથી ઓછી હોય છે કારણ કે તેની કોન્જ્યુગેટ બેઇઝ (એસિટેટ આયન) સ્થિર નથી. ક્લોરોએસિટિક એસિડ અને ટ્રાઇક્લોરોએસિટિક એસિડમાં ક્લોરિન અણુઓ ઇલેક્ટ્રોન-આકર્ષક હોવાથી એસિડિકતા વધે છે. ફોર્મિક એસિડમાં અલ્ફા-હાઇડ્રોજન ન હોવાથી તે એસિટિક એસિડ કરતાં વધુ એસિડિક છે. અહીં, એસિટિક એસિડની એસિડિકતા સૌથી ઓછી છે.", "ref": "Std 12 - અભ્યાસક્રમ 11: કાર્બોક્સિલિક એસિડ અને તેના વ્યુત્પન્ન", "ch": ""}, {"q": "નીચેનામાંથી કયા યુગ્મમાં પ્રથમ એસિડ કરતાં બીજા એસિડની એસિડિકતા વધુ છે?", "opts": ["એસિટિક એસિડ અને પ્રોપિયોનિક એસિડ", "ફોર્મિક એસિડ અને એસિટિક એસિડ", "ક્લોરોએસિટિક એસિડ અને એસિટિક એસિડ", "બેન્ઝોઇક એસિડ અને એસિટિક એસિડ"], "ans": 2, "exp": "ક્લોરોએસિટિક એસિડમાં ક્લોરિન અણુ ઇલેક્ટ્રોન-આકર્ષક હોવાથી તે એસિટિક એસિડ કરતાં વધુ એસિડિક છે. એસિટિક એસિડ અને પ્રોપિયોનિક એસિડમાં એસિડિકતામાં ફરક ઓછો છે. ફોર્મિક એસિડ એસિટિક એસિડ કરતાં વધુ એસિડિક છે, પરંતુ પ્રશ્નમાં પ્રથમ એસિડ કરતાં બીજા એસિડની એસિડિકતા વધુ હોવી જોઈએ. બેન્ઝોઇક એસિડ એસિટિક એસિડ કરતાં ઓછો એસિડિક છે.", "ref": "Std 12 - અભ્યાસક્રમ 11: કાર્બોક્સિલિક એસિડ અને તેના વ્યુત્પન્ન", "ch": ""}, {"q": "કાર્બોક્સિલિક એસિડની એસિડિકતા પર નીચેનામાંથી કયા પરિબળનો સૌથી ઓછો પ્રભાવ પડે છે?", "opts": ["કાર્બોક્સિલ સમૂહ સાથે જોડાયેલા સબસ્ટિટ્યુટ્સનો ઇલેક્ટ્રોન-આકર્ષક અથવા ઇલેક્ટ્રોન-દાતા ગુણ", "કાર્બોક્સિલ સમૂહની સાંદ્રતા", "કાર્બોક્સિલ સમૂહથી સબસ્ટિટ્યુટ્સની દૂરી", "કાર્બોક્સિલ સમૂહના આલ્ફા-કાર્બન પર હાઇડ્રોજનની હાજરી"], "ans": 1, "exp": "કાર્બોક્સિલ સમૂહની સાંદ્રતાનો એસિડિકતા પર સૌથી ઓછો પ્રભાવ પડે છે. ઇલેક્ટ્રોન-આકર્ષક અથવા ઇલેક્ટ્રોન-દાતા સબસ્ટિટ્યુટ્સ, સબસ્ટિટ્યુટ્સની દૂરી, અને આલ્ફા-હાઇડ્રોજનની હાજરી એસિડિકતાને પ્રભાવિત કરે છે.", "ref": "Std 12 - અભ્યાસક્રમ 11: કાર્બોક્સિલિક એસિડ અને તેના વ્યુત્પન્ન", "ch": ""}, {"q": "નીચેનામાંથી કયા કાર્બોક્સિલિક એસિડની એસિડિકતા સૌથી વધુ હોય છે?", "opts": ["એસિટિક એસિડ", "ક્લોરોએસિટિક એસિડ", "ડાઇક્લોરોએસિટિક એસિડ", "ટ્રાઇક્લોરોએસિટિક એસિડ"], "ans": 3, "exp": "ટ્રાઇક્લોરોએસિટિક એસિડમાં ત્રણ ક્લોરિન અણુઓ ઇલેક્ટ્રોન-આકર્ષક હોવાથી તેની એસિડિકતા સૌથી વધુ હોય છે. ક્લોરોએસિટિક એસિડ અને ડાઇક્લોરોએસિટિક એસિડ કરતાં ટ્રાઇક્લોરોએસિટિક એસિડ વધુ એસિડિક છે. એસિટિક એસિડની એસિડિકતા સૌથી ઓછી છે.", "ref": "Std 12 - અભ્યાસક્રમ 11: કાર્બોક્સિલિક એસિડ અને તેના વ્યુત્પન્ન", "ch": ""}, {"q": "નીચેનામાંથી કયા કારણસર બેન્ઝોઇક એસિડ એસિટિક એસિડ કરતાં ઓછો એસિડિક છે?", "opts": ["બેન્ઝોઇક એસિડમાં ફિનાઇલ સમૂહ ઇલેક્ટ્રોન-દાતા છે", "બેન્ઝોઇક એસિડમાં કાર્બોક્સિલ સમૂહ સાથે જોડાયેલા કાર્બનની સંખ્યા વધુ છે", "બેન્ઝોઇક એસિડની કોન્જ્યુગેટ બેઇઝ ઓછી સ્થિર છે", "બેન્ઝોઇક એસિડમાં કાર્બોક્સિલ સમૂહ પર ઇલેક્ટ્રોન ઘનતા ઓછી છે"], "ans": 1, "exp": "બેન્ઝોઇક એસિડ એસિટિક એસિડ કરતાં ઓછો એસિડિક છે કારણ કે બેન્ઝોઇક એસિડમાં કાર્બોક્સિલ સમૂહ સાથે જોડાયેલા કાર્બનની સંખ્યા વધુ છે, જે ઇલેક્ટ્રોન-આકર્ષક પ્રભાવને ઓછો કરે છે. ફિનાઇલ સમૂહ ઇલેક્ટ્રોન-દાતા નથી, પરંતુ તેનો પ્રભાવ ઓછો છે. કોન્જ્યુગેટ બેઇઝની સ્થિરતા અને ઇલેક્ટ્રોન ઘનતા પણ પ્રભાવિત કરે છે, પરંતુ મુખ્ય કારણ કાર્બનની સંખ્યા છે.", "ref": "Std 12 - અભ્યાસક્રમ 11: કાર્બોક્સિલિક એસિડ અને તેના વ્યુત્પન્ન", "ch": ""}, {"q": "નીચેનામાંથી કયા કાર્બોક્સિલિક એસિડમાં ઇલેક્ટ્રોન-આકર્ષક સમૂહ હાજર હોવાથી તેની એસિડિકતા વધે છે, પરંતુ તે સમૂહ કાર્બોક્સિલ સમૂહથી દૂર હોવાથી પ્રભાવ ઓછો પડે છે?", "opts": ["ક્લોરોએસિટિક એસિડ", "ડાયક્લોરોએસિટિક એસિડ", "૩-ક્લોરોપ્રોપેનોઇક એસિડ", "ટ્રાયક્લોરોએસિટિક એસિડ"], "ans": 2, "exp": "૩-ક્લોરોપ્રોપેનોઇક એસિડમાં ક્લોરિન અણુ કાર્બોક્સિલ સમૂહથી દૂર (બીટા સ્થાને) હોવાથી ઇલેક્ટ્રોન-આકર્ષક પ્રભાવ ઓછો પડે છે, પરંતુ અસર કરે છે. ક્લોરોએસિટિક એસિડ (A) અને ડાયક્લોરોએસિટિક એસિડ (B)માં ક્લોરિન અણુ કાર્બોક્સિલ સમૂહની નજીક હોવાથી એસિડિકતા વધુ પ્રભાવિત થાય છે. ટ્રાયક્લોરોએસિટિક એસિડ (D)માં ત્રણ ક્લોરિન અણુ હોવાથી એસિડિકતા સૌથી વધુ હોય છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "નીચેનામાંથી કયા યુગ્મમાં પ્રથમ એસિડની એસિડિકતા બીજા એસિડ કરતાં ઓછી છે, કારણ કે પ્રથમ એસિડમાં ઇલેક્ટ્રોન-દાતા સમૂહ હાજર છે?", "opts": ["એસિટિક એસિડ અને ક્લોરોએસિટિક એસિડ", "પ્રોપેનોઇક એસિડ અને એસિટિક એસિડ", "ફિનોલ અને બેન્ઝોઇક એસિડ", "બ્યુટેનોઇક એસિડ અને ૨-હાઇડ્રોક્સીપ્રોપેનોઇક એસિડ"], "ans": 3, "exp": "બ્યુટેનોઇક એસિડ કરતાં ૨-હાઇડ્રોક્સીપ્રોપેનોઇક એસિડમાં હાઇડ્રોક્સિલ સમૂહ (OH) હાજર છે, જે ઇલેક્ટ્રોન-દાતા પ્રભાવ દર્શાવે છે, પરિણામે એસિડિકતા ઓછી થાય છે. Aમાં ક્લોરોએસિટિક એસિડ એસિટિક એસિડ કરતાં વધુ એસિડિક છે. Bમાં પ્રોપેનોઇક એસિડ એસિટિક એસિડ કરતાં ઓછો એસિડિક છે, પરંતુ ઇલેક્ટ્રોન-દાતા સમૂહનું કારણ નથી. Cમાં ફિનોલ બેન્ઝોઇક એસિડ કરતાં ઓછો એસિડિક છે, પરંતુ તે કાર્બોક્સિલિક એસિડ નથી.", "ref": "Std 12 - અભ્યાસક્રમ 16: કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "નીચેનામાંથી કયા કાર્બોક્સિલિક એસિડની એસિડિકતા સૌથી ઓછી હશે જ્યારે તેના આલ્ફા-કાર્બન પર ઇલેક્ટ્રોન-દાતા સમૂહ હાજર હોય?", "opts": ["એસિટિક એસિડ", "પ્રોપિયોનિક એસિડ", "૨-મિથાઇલપ્રોપેનોઇક એસિડ", "ક્લોરોએસિટિક એસિડ"], "ans": 2, "exp": "૨-મિથાઇલપ્રોપેનોઇક એસિડમાં આલ્ફા-કાર્બન પર મિથાઇલ સમૂહ (CH₃) હાજર છે, જે ઇલેક્ટ્રોન-દાતા પ્રભાવ દર્શાવે છે, પરિણામે એસિડિકતા ઓછી થાય છે. એસિટિક એસિડ (A) અને પ્રોપિયોનિક એસિડ (B)માં આલ્ફા-કાર્બન પર ઇલેક્ટ્રોન-દાતા સમૂહ નથી. ક્લોરોએસિટિક એસિડ (D)માં ક્લોરિન ઇલેક્ટ્રોન-આકર્ષક છે, જે એસિડિકતા વધારે છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "નીચેનામાંથી કયા કારણસર ૨,૨-ડાયમિથાઇલપ્રોપેનોઇક એસિડ એસિટિક એસિડ કરતાં ઓછો એસિડિક છે?", "opts": ["સ્ટેરિક અવરોધના કારણે કાર્બોક્સિલેટ આયનનું સ્થિરીકરણ ઓછું થાય છે", "ઇલેક્ટ્રોન-આકર્ષક સમૂહના અભાવે", "કાર્બોક્સિલ સમૂહની સાંદ્રતા ઓછી હોવાથી", "હાઇડ્રોજન બંધનના અભાવે"], "ans": 0, "exp": "૨,૨-ડાયમિથાઇલપ્રોપેનોઇક એસિડમાં આલ્ફા-કાર્બન પર બે મિથાઇલ સમૂહ હોવાથી સ્ટેરિક અવરોધ ઉત્પન્ન થાય છે, જે કાર્બોક્સિલેટ આયનના સ્થિરીકરણમાં અડચણ ઉભી કરે છે, પરિણામે એસિડિકતા ઓછી થાય છે. B, C, અને D વિકલ્પો આ કિસ્સામાં લાગુ પડતા નથી.", "ref": "Std 12 - અભ્યાસક્રમ 16: કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "નીચેનામાંથી કયા કાર્બોક્સિલિક એસિડની એસિડિકતા સૌથી વધુ હશે જ્યારે તેના બીટા-કાર્બન પર ઇલેક્ટ્રોન-આકર્ષક સમૂહ હાજર હોય?", "opts": ["૩-ક્લોરોપ્રોપેનોઇક એસિડ", "૨-ક્લોરોપ્રોપેનોઇક એસિડ", "ક્લોરોએસિટિક એસિડ", "૪-ક્લોરોબ્યુટેનોઇક એસિડ"], "ans": 1, "exp": "૨-ક્લોરોપ્રોપેનોઇક એસિડમાં ક્લોરિન અણુ આલ્ફા-કાર્બન પર હોવાથી ઇલેક્ટ્રોન-આકર્ષક પ્રભાવ સૌથી મજબૂત હોય છે, પરિણામે એસિડિકતા સૌથી વધુ થાય છે. ૩-ક્લોરોપ્રોપેનોઇક એસિડ (A) અને ૪-ક્લોરોબ્યુટેનોઇક એસિડ (D)માં ક્લોરિન અણુ દૂર હોવાથી પ્રભાવ ઓછો પડે છે. ક્લોરોએસિટિક એસિડ (C)માં ક્લોરિન આલ્ફા-કાર્બન પર હોવા છતાં, તે ૨-ક્લોરોપ્રોપેનોઇક એસિડ કરતાં ઓછો પ્રભાવશાળી છે કારણ કે તે એકલ ક્લોરિન ધરાવે છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "નીચેનામાંથી કયા કાર્બોક્સિલિક એસિડની એસિડિકતા તેના ક્લોરો-વ્યુત્પન્ન કરતાં ઓછી હોય છે, પરંતુ નાઇટ્રો-વ્યુત્પન્ન કરતાં વધુ હોય છે?", "opts": ["એસિટિક એસિડ", "પ્રોપિયોનિક એસિડ", "બ્યુટેનોઇક એસિડ", "ફોર્મિક એસિડ"], "ans": 0, "exp": "એસિટિક એસિડમાં ક્લોરો સમૂહ (CH2ClCOOH) ઇલેક્ટ્રોન-આકર્ષક હોવાથી એસિડિકતા વધે છે, પરંતુ નાઇટ્રો સમૂહ (NO2) કરતાં ઓછો પ્રભાવ પાડે છે. ફોર્મિક એસિડમાં ક્લોરો અથવા નાઇટ્રો સમૂહની ગેરહાજરીમાં એસિડિકતા ઓછી હોય છે. પ્રોપિયોનિક અને બ્યુટેનોઇક એસિડમાં આ સમૂહોની અસર એસિટિક એસિડ જેવી નહીં હોય.", "ref": "Std 12 - અભ્યાસક્રમ 16: હેલોએલ્કેન અને હેલોએરિન (કાર્બોક્સિલિક એસિડની એસિડિકતા પર ઇલેક્ટ્રોન-આકર્ષક સમૂહનો પ્રભાવ)", "ch": ""}, {"q": "જ્યારે કાર્બોક્સિલિક એસિડમાં આલ્ફા-હાઇડ્રોજનને ઇલેક્ટ્રોન-દાતા સમૂહ દ્વારા બદલવામાં આવે છે, ત્યારે એસિડિકતા પર શું અસર થાય છે?", "opts": ["એસિડિકતા વધે છે", "એસિડિકતા ઘટે છે", "એસિડિકતામાં કોઈ ફેરફાર થતો નથી", "એસિડિકતા અચાનક વધે છે અને પછી ઘટે છે"], "ans": 1, "exp": "ઇલેક્ટ્રોન-દાતા સમૂહ (જેમ કે -CH3, -OH) કાર્બોક્સિલ સમૂહ પર ઇલેક્ટ્રોન ઘનતા વધારે છે, જે O-H બંધને તોડવા માટે પ્રોટોન દાન કરવાનું મુશ્કેલ બનાવે છે, પરિણામે એસિડિકતા ઘટે છે. ઇલેક્ટ્રોન-આકર્ષક સમૂહ વિરુદ્ધ અસર કરે છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: કાર્બોક્સિલિક એસિડ અને તેના વ્યુત્પન્ન (એસિડિકતા પર સમૂહોની અસર)", "ch": ""}, {"q": "જ્યારે કાર્બોક્સિલિક એસિડમાં આલ્ફા-કાર્બન પર ઇલેક્ટ્રોન-દાતા સમૂહ (જેવા કે -OH) હાજર હોય, ત્યારે એસિડિકતા પર શું અસર થાય છે?", "opts": ["એસિડિકતા વધે છે, કારણ કે ઇલેક્ટ્રોન-દાતા સમૂહ કાર્બોક્સિલેટ આયનને સ્થિર કરે છે.", "એસિડિકતા ઘટે છે, કારણ કે ઇલેક્ટ્રોન-દાતા સમૂહ કાર્બોક્સિલિક એસિડના O-H બંધને મજબૂત બનાવે છે.", "એસિડિકતા પર કોઈ અસર થતી નથી, કારણ કે ઇલેક્ટ્રોન-દાતા સમૂહ કાર્બોક્સિલિક એસિડની રચનામાં ફેરફાર કરતો નથી.", "એસિડિકતા વધે છે, કારણ કે ઇલેક્ટ્રોન-દાતા સમૂહ કાર્બોક્સિલિક એસિડના કેટાયનને સ્થિર કરે છે."], "ans": 1, "exp": "ઇલેક્ટ્રોન-દાતા સમૂહ (જેવા કે -OH) આલ્ફા-કાર્બન પર હાજર હોવાથી કાર્બોક્સિલિક એસિડના O-H બંધને મજબૂત બનાવે છે, જેથી H+ આયન મુક્ત થવાનું મુશ્કેલ બને છે અને એસિડિકતા ઘટે છે. વિકલ્પ A અને D ખોટા છે, કારણ કે ઇલેક્ટ્રોન-દાતા સમૂહ કાર્બોક્સિલેટ આયન અથવા કેટાયનને સ્થિર કરતો નથી. વિકલ્પ C ખોટો છે, કારણ કે ઇલેક્ટ્રોન-દાતા સમૂહ એસિડિકતા પર અસર કરે છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: હેલોએલ્કેન અને હેલોએરિન (કાર્બોક્સિલિક એસિડની એસિડિકતા પર ઇલેક્ટ્રોન-દાતા સમૂહની અસર)", "ch": ""}, {"q": "નીચેનામાંથી કયા કાર્બોક્સિલિક એસિડની એસિડિકતા તેના બીટા-કાર્બન પર ઇલેક્ટ્રોન-આકર્ષક સમૂહ હાજર હોવા છતાં ઓછી હોય છે?", "opts": ["૩-ક્લોરોપ્રોપેનોઇક એસિડ", "૨-ક્લોરોપ્રોપેનોઇક એસિડ", "૪-ક્લોરોબ્યુટેનોઇક એસિડ", "ક્લોરોએસિટિક એસિડ"], "ans": 0, "exp": "૩-ક્લોરોપ્રોપેનોઇક એસિડમાં ક્લોરિન સમૂહ બીટા-કાર્બન પર હાજર છે. બીટા-કાર્બન પર હાજર ઇલેક્ટ્રોન-આકર્ષક સમૂહની અસર આલ્ફા-કાર્બન પર હાજર ઇલેક્ટ્રોન-આકર્ષક સમૂહ જેટલી પ્રબળ ન હોવાથી એસિડિકતા ઓછી હોય છે. ૨-ક્લોરોપ્રોપેનોઇક એસિડ (B) અને ક્લોરોએસિટિક એસિડ (D)માં ક્લોરિન આલ્ફા-કાર્બન પર હાજર હોવાથી એસિડિકતા વધુ હોય છે. ૪-ક્લોરોબ્યુટેનોઇક એસિડ (C)માં ક્લોરિન ગામા-કાર્બન પર હાજર હોવાથી એસિડિકતા પર નગણ્ય અસર પડે છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: હેલોએલ્કેન અને હેલોએરિન (કાર્બોક્સિલિક એસિડની એસિડિકતા પર ઇલેક્ટ્રોન-આકર્ષક સમૂહની સ્થિતિની અસર)", "ch": ""}, {"q": "નીચેનામાંથી કયા કાર્બોક્સિલિક એસિડની એસિડિકતા તેના આલ્ફા-કાર્બન પર ઇલેક્ટ્રોન-આકર્ષક સમૂહ (-NO₂) હાજર હોવા છતાં પણ એસિટિક એસિડ કરતાં ઓછી હોય છે?", "opts": ["નાઇટ્રોએસિટિક એસિડ (NO₂CH₂COOH)", "૨-નાઇટ્રોપ્રોપેનોઇક એસિડ (NO₂CH(CH₃)COOH)", "૩-નાઇટ્રોપ્રોપેનોઇક એસિડ (CH₂(NO₂)CH₂COOH)", "૨,૨-ડાયનાઇટ્રોપ્રોપેનોઇક એસિડ ((NO₂)₂C(CH₃)COOH)"], "ans": 1, "exp": "જવાબ B) ૨-નાઇટ્રોપ્રોપેનોઇક એસિડ છે. આલ્ફા-કાર્બન પર ઇલેક્ટ્રોન-આકર્ષક સમૂહ (-NO₂) હાજર હોવા છતાં, આ એસિડમાં આલ્ફા-કાર્બન પર મિથાઇલ સમૂહ (CH₃) પણ હાજર છે, જે ઇલેક્ટ્રોન-દાતા પ્રભાવ ધરાવે છે. આ ઇલેક્ટ્રોન-દાતા પ્રભાવ ઇલેક્ટ્રોન-આકર્ષક પ્રભાવને અંશતઃ નબળો પાડે છે, પરિણામે એસિડિકતા એસિટિક એસિડ કરતાં ઓછી હોય છે. A) નાઇટ્રોએસિટિક એસિડમાં આલ્ફા-કાર્બન પર ફક્ત -NO₂ સમૂહ હાજર છે, જે એસિડિકતા વધારે છે. C) ૩-નાઇટ્રોપ્રોપેનોઇક એસિડમાં -NO₂ સમૂહ બીટા-કાર્બન પર હાજર છે, જે એસિડિકતાને નોંધપાત્ર રીતે પ્રભાવિત કરતું નથી. D) ૨,૨-ડાયનાઇટ્રોપ્રોપેનોઇક એસિડમાં બે -NO₂ સમૂહ હાજર છે, જે એસિડિકતા વધારે છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: કાર્બોક્સિલિક એસિડ અને તેના વ્યુત્પન્ન", "ch": ""}, {"q": "કાર્બોક્સિલિક એસિડના જલીય દ્રાવણમાં નીચેનામાંથી કયું પરિબળ એસિડિકતાને સૌથી વધુ પ્રભાવિત કરતું નથી, પરંતુ તેની સ્થિરતા પર અસર કરે છે?", "opts": ["કાર્બોક્સિલેટ આયનની સસ્પંદન સ્થિરતા", "કાર્બોક્સિલિક એસિડના આણ્વીય દળમાં વધારો", "કાર્બોક્સિલ સમૂહ સાથે જોડાયેલા સમૂહોની ઇલેક્ટ્રોન-આકર્ષકતા", "દ્રાવણનું તાપમાન અને દબાણ"], "ans": 1, "exp": "સાચો જવાબ B છે. કાર્બોક્સિલિક એસિડની એસિડિકતા મુખ્યત્વે કાર્બોક્સિલેટ આયનની સસ્પંદન સ્થિરતા (A) અને જોડાયેલા સમૂહોની ઇલેક્ટ્રોન-આકર્ષકતા (C) પર આધારિત હોય છે. દ્રાવણનું તાપમાન અને દબાણ (D) એસિડિકતા પર અસર કરે છે, પરંતુ તે પ્રાથમિક પરિબળ નથી. જ્યારે કાર્બોક્સિલિક એસિડના આણ્વીય દળમાં વધારો એસિડિકતા પર સીધી અસર કરતો નથી, પરંતુ તે દ્રાવ્યતા અને સ્થિરતા પર અસર કરી શકે છે.", "ref": "Std 12 - પ્રકરણ 12: કાર્બનિક સંયોજનો - આલ્ડિહાઇડ, કિટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "નીચેનામાંથી કયા કાર્બોક્સિલિક એસિડની એસિડિકતા તેના અનુરૂપ આલ્કોહોલ કરતાં વધુ હોય છે, પરંતુ તેનું કારણ ઇલેક્ટ્રોન-આકર્ષક સમૂહની હાજરી નથી?", "opts": ["ટ્રાઇક્લોરોએસિટિક એસિડ", "ફોર્મિક એસિડ", "બેન્ઝોઇક એસિડ", "ઓક્ઝેલિક એસિડ"], "ans": 1, "exp": "સાચો જવાબ B છે. ફોર્મિક એસિડ (HCOOH) એ તેના અનુરૂપ આલ્કોહોલ (મિથેનોલ) કરતાં વધુ એસિડિક છે, કારણ pts": ["કાર્બોક્સિલિક એસિડનું વિયોજન વધે છે", "કાર્બોક્સિલેટ આયનની સાંદ્રતા વધે છે", "દ્રાવણની વાહકતા વધે છે", "કાર્બોક્સિલિક એસિડનું પ્રમાણ વધે છે"], "ans": 3, "exp": "સાચો જવાબ D છે. pH વધારતાં (આલ્કલાઇન માધ્યમ) કાર્બોક્સિલિક એસિડનું વિયોજન વધે છે (A), કાર્બોક્સિલેટ આયનની સાંદ્રતા વધે છે (B), અને દ્રાવણની વાહકતા વધે છે (C). જોકે, કાર્બોક્સિલિક એસિડનું પ્રમાણ ઘટે છે, નહીં કે વધે, કારણ કે તે વિયોજન પામીને કાર્બોક્સિલેટ આયનમાં ફેરવાય છે.", "ref": "Std 12 - પ્રકરણ 7: સંતુલન", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
