<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>દ્રાવક</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>દ્રાવક</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">દ્રાવક</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક દ્રાવણમાં દ્રાવક તરીકે પાણીનો ઉપયોગ થયો છે. જો આ દ્રાવણને 100°C તાપમાને ગરમ કરવામાં આવે તો નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["દ્રાવણનું ઉત્કલનબિંદુ શુદ્ધ પાણી કરતાં વધુ હશે", "દ્રાવણનું બાષ્પદબાણ શુદ્ધ પાણી કરતાં ઓછું હશે", "દ્રાવણમાં દ્રાવ્ય કણોની સંખ્યા વધતા ઉત્કલનબિંદુમાં વધારો થશે", "દ્રાવણનું ઉત્કલનબિંદુ શુદ્ધ પાણી જેટલું જ રહેશે કારણ કે દ્રાવક પાણી છે"], "ans": 3, "exp": "સાચો જવાબ D છે. દ્રાવણમાં દ્રાવ્ય કણો ઉમેરાતા દ્રાવણનું ઉત્કલનબિંદુ શુદ્ધ દ્રાવક (પાણી) કરતાં વધે છે, જેને ઉત્કલનબિંદુ ઉન્નયન કહે છે. આથી વિકલ્પ A, B અને C સાચાં છે, જ્યારે D ખોટું છે કારણ કે દ્રાવણનું ઉત્કલનબિંદુ શુદ્ધ પાણી જેટલું ન રહે.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક બંધ પાત્રમાં બે અદ્રાવ્ય પ્રવાહીઓ A અને B ભેગાં કરવામાં આવે છે. જો A નું બાષ્પદબાણ B કરતાં વધુ હોય, તો નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["પ્રવાહી A નું બાષ્પીભવન ઝડપી થશે", "મિશ્રણનું કુલ બાષ્પદબાણ A અને B ના વ્યક્તિગત બાષ્પદબાણના સરવાળા જેટલું હશે", "પ્રવાહી B નું બાષ્પદબાણ વધશે કારણ કે A નું બાષ્પદબાણ વધુ છે", "પ્રવાહી A નું બાષ્પદબાણ ઘટશે કારણ કે બંને પ્રવાહીઓ એકબીજા સાથે સંપર્કમાં છે"], "ans": 2, "exp": "સાચો જવાબ C છે. રાઉલ્ટના નિયમ મુજબ, અદ્રાવ્ય પ્રવાહીઓના મિશ્રણનું કુલ બાષ્પદબાણ તેમના વ્યક્તિગત બાષ્પદબાણના સરવાળા જેટલું હોય છે. પ્રવાહી B નું બાષ્પદબાણ A ના કારણે વધતું નથી, તેથી વિકલ્પ C ખોટું છે. વિકલ્પ A, B અને D સાચાં છે.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક દ્રાવણમાં દ્રાવક તરીકે બેન્ઝિન અને દ્રાવ્ય તરીકે નેપ્થેલિન લેવામાં આવ્યું છે. આ દ્રાવણને ઠંડું કરતાં નીચેનામાંથી કયું પરિણામ મળશે નહીં?", "opts": ["દ્રાવણનું ઠારબિંદુ શુદ્ધ બેન્ઝિન કરતાં નીચું હશે", "દ્રાવણમાં નેપ્થેલિનના કણોની સંખ્યા વધતા ઠારબિંદુમાં વધુ ઘટાડો થશે", "દ્રાવણનું ઠારબિંદુ શુદ્ધ બેન્ઝિન જેટલું જ રહેશે કારણ કે બેન્ઝિન દ્રાવક છે", "દ્રાવણનું ઠારબિંદુ નીચું જશે કારણ કે દ્રાવ્ય કણો દ્રાવકના સ્ફટિકીકરણમાં અવરોધ ઉભો કરે છે"], "ans": 2, "exp": "સાચો જવાબ C છે. દ્રાવણમાં દ્રાવ્ય કણો ઉમેરાતા ઠારબિંદુમાં ઘટાડો થાય છે, જેને ઠારબિંદુ અવનયન કહે છે. આથી વિકલ્પ A, B અને D સાચાં છે, જ્યારે C ખોટું છે કારણ કે દ્રાવણનું ઠારબિંદુ શુદ્ધ દ્રાવક જેટલું ન રહે.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક પ્રયોગમાં 500 ગ્રામ પાણીમાં 18 ગ્રામ ગ્લુકોઝ (C₆H₁₂O₆) ઓગાળવામાં આવ્યું છે. જો પાણીનું Kf = 1.86 K kg mol⁻¹ હોય, તો દ્રાવણનું ઠારબિંદુ કેટલું હશે? (પાણીનું ઠારબિંદુ = 0°C)", "opts": ["-0.186°C", "-0.372°C", "-0.093°C", "-0.744°C"], "ans": 1, "exp": "સાચો જવાબ B છે. ગ્લુકોઝનું મોલર દળ = 180 g/mol. દ્રાવ્યના મોલ = 18/180 = 0.1 mol. દ્રાવકનું વજન = 0.5 kg. ΔTf = Kf × m = 1.86 × (0.1/0.5) = 0.372°C. આથી દ્રાવણનું ઠારબિંદુ = 0 - 0.372 = -0.372°C.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "નીચેનામાંથી કયું દ્રાવણ આદર્શ દ્રાવણ નથી?", "opts": ["બેન્ઝિન અને ટોલ્યુઇનનું મિશ્રણ", "ઇથેનોલ અને પાણીનું મિશ્રણ", "હેક્ઝેન અને હેપ્ટેનનું મિશ્રણ", "ક્લોરોફોર્મ અને એસિટોનનું મિશ્રણ જેમાં હાઇડ્રોજન બોન્ડિંગ ન હોય"], "ans": 1, "exp": "સાચો જવાબ B છે. આદર્શ દ્રાવણમાં દ્રાવક-દ્રાવ્ય અને દ્રાવ્ય-દ્રાવ્ય વચ્ચેના આંતરઆણ્વીય બળો સમાન હોય છે. ઇથેનોલ અને પાણી વચ્ચે હાઇડ્રોજન બોન્ડિંગ થાય છે, જે આદર્શ વર્તણૂકથી વિચલન કરાવે છે. બાકીના વિકલ્પો આદર્શ દ્રાવણના ઉદાહરણો છે.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક પ્રયોગમાં 25°C તાપમાને 1 લિટર કાર્બન ડાયસલ્ફાઇડ (CS₂) માં 0.1 મોલ આયોડિન (I₂) ઓગાળવામાં આવ્યું છે. આ દ્રાવણ માટે નીચેનામાંથી કયું વિધાન ખોટું છે? (Kf for CS₂ = 3.83 K·kg·mol⁻¹, ઉત્કલનબિંદુ ઉન્નયન અચળાંક Kb = 2.34 K·kg·mol⁻¹)", "opts": ["દ્રાવણનું ઠારબિંદુ શુદ્ધ CS₂ કરતાં નીચું હશે", "દ્રાવણનું ઉત્કલનબિંદુ શુદ્ધ CS₂ કરતાં ઊંચું હશે", "દ્રાવણનું આસ્મોટિક દબાણ 2.46 atm હશે", "દ્રાવણમાં આયોડિનના અણુઓ CS₂ ના અણુઓ સાથે આંતરઆણ્વિક બળો દ્વારા જોડાયેલા હશે"], "ans": 2, "exp": "સાચો જવાબ C છે. આસ્મોટિક દબાણ માટે સૂત્ર π = iCRT વાપરતાં π = 1 × 0.1 mol/L × 0.0821 L·atm·K⁻¹·mol⁻¹ × 298 K = 2.45 atm મળે છે, જે વિકલ્પ C માં આપેલ 2.46 atm થી અલગ છે. વિકલ્પ A અને B કોલિગેટિવ ગુણધર્મો મુજબ સાચાં છે. વિકલ્પ D પણ સાચું છે કારણ કે દ્રાવ્ય અને દ્રાવક વચ્ચે આંતરઆણ્વિક આકર્ષણ હોય છે.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક બિન-આદર્શ દ્રાવણમાં બે પ્રવાહીઓ X અને Y નું મિશ્રણ છે. જો આ દ્રાવણ માટે ΔH_mix ≠ 0 હોય, તો નીચેનામાંથી કયું વિધાન ખોટું હશે?", "opts": ["દ્રાવણનું કુલ બાષ્પદબાણ રાઉલ્ટના નિયમથી વિચલન દર્શાવશે", "દ્રાવણનું ઉત્કલનબિંદુ શુદ્ધ ઘટકોના ઉત્કલનબિંદુ વચ્ચે હશે", "દ્રાવણમાં X અને Y ના અણુઓ વચ્ચે આંતરઆણ્વિક બળો શુદ્ધ અવસ્થા કરતાં અલગ હશે", "દ્રાવણનું કદ મિશ્રણ પહેલાંના કુલ કદ કરતાં અલગ હશે"], "ans": 1, "exp": "સાચો જવાબ B છે. બિન-આદર્શ દ્રાવણમાં ઉત્કલનબિંદુ શુદ્ધ ઘટકોના ઉત્કલનબિંદુથી ઉપર કે નીચે હોઈ શકે છે, માત્ર વચ્ચે જ હોવું જરૂરી નથી. વિકલ્પ A, C અને D બિન-આદર્શ દ્રાવણની લાક્ષણિકતાઓ છે.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક પ્રયોગમાં 0.1 M BaCl₂ ના જલીય દ્રાવણમાં Ba²⁺ આયનોની સાંદ્રતા 0.1 M માપવામાં આવી છે. આ દ્રાવણ માટે વાન્ટ હૉફ અવયવ (i) નું મૂલ્ય કેટલું હશે? (BaCl₂ સંપૂર્ણપણે વિયોજિત થાય છે તેવું ધારો)", "opts": ["1.0", "2.0", "2.5", "3.0"], "ans": 3, "exp": "સાચો જવાબ D છે. BaCl₂ → Ba²⁺ + 2Cl⁻ વિયોજનથી કુલ 3 આયનો ઉત્પન્ન થાય છે. વાન્ટ હૉફ અવયવ i = કુલ આયનોની સંખ્યા = 3. વિકલ્પ A, B અને C ખોટાં છે કારણ કે તેઓ અપૂર્ણ વિયોજન અથવા ખોટી આયન સંખ્યા દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક દ્રાવણમાં દ્રાવક તરીકે પ્રવાહી એમોનિયા (NH₃) અને દ્રાવ્ય તરીકે સોડિયમ ધાતુ લેવામાં આવી છે. આ દ્રાવણ માટે નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["દ્રાવણ વાદળી રંગનું હશે", "દ્રાવણ વિદ્યુતનું સુવાહક હશે", "દ્રાવણમાં સોડિયમ આયનો (Na⁺) અને એમોનિયેટેડ ઇલેક્ટ્રોન હાજર હશે", "દ્રાવણનું ઉત્કલનબિંદુ શુદ્ધ NH₃ કરતાં નીચું હશે"], "ans": 3, "exp": "સાચો જવાબ D છે. સોડિયમ એમોનિયામાં ઓગળીને Na⁺ અને એમોનિયેટેડ ઇલેક્ટ્રોન બનાવે છે, જે દ્રાવણને વાદળી રંગ અને વિદ્યુતવાહકતા આપે છે. પરંતુ આ દ્રાવણમાં દ્રાવ્ય કણોની સંખ્યા વધવાથી ઉત્કલનબિંદુ ઉન્નયન થાય છે, નહીં કે અવનયન. વિકલ્પ A, B અને C સાચાં છે.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક પ્રયોગમાં 25°C તાપમાને 0.5 M યુરિયા (NH₂CONH₂) ના જલીય દ્રાવણનું આસ્મોટિક દબાણ માપવામાં આવ્યું છે. જો આ જ તાપમાને 0.2 M Na₂SO₄ ના દ્રાવણનું આસ્મોટિક દબાણ યુરિયાના દ્રાવણ જેટલું જ હોય, તો Na₂SO₄ નું વિયોજન પ્રતિશત કેટલું હશે? (Na₂SO₄ સંપૂર્ણ વિયોજન માટે i = 3 ધારો)", "opts": ["25%", "50%", "75%", "100%"], "ans": 2, "exp": "સાચો જવાબ C છે. યુરિયા માટે π = CRT (i=1). Na₂SO₄ માટે π = iCRT. બંને દબાણ સમાન હોવાથી: 1 × 0.5 = i × 0.2 ⇒ i = 2.5. સંપૂર્ણ વિયોજન માટે i = 3 હોવાથી વિયોજન પ્રતિશત = (2.5/3) × 100 = 83.33% ≈ 75%. વિકલ્પ A, B અને D ખોટાં ગણતરી આધારિત છે.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક પ્રયોગમાં 25°C તાપમાને 500 ગ્રામ કાર્બન ટેટ્રાક્લોરાઇડ (CCl₄) માં 15 ગ્રામ આયોડિન (I₂) ઓગાળવામાં આવ્યું છે. આ દ્રાવણ માટે નીચેનામાંથી કયું વિધાન ખોટું છે? (આણ્વીય દળ: CCl₄ = 154 g/mol, I₂ = 254 g/mol)", "opts": ["દ્રાવકનું મોલ અંશ 0.98 કરતાં વધુ છે", "દ્રાવ્યનું મોલ અંશ 0.02 કરતાં ઓછું છે", "આ દ્રાવણ આદર્શ દ્રાવણ તરીકે વર્તે છે કારણ કે CCl₄ અને I₂ વચ્ચે આંતરઆણ્વીય આકર્ષણ બળ નિર્બળ છે", "આ દ્રાવણનું ઉત્કલનબિંદુ શુદ્ધ CCl₄ કરતાં નીચું હશે"], "ans": 3, "exp": "સાચો જવાબ D છે કારણ કે આદર્શ દ્રાવણમાં દ્રાવ્ય ઉમેરવાથી ઉત્કલનબિંદુમાં વધારો થાય છે, ઘટાડો નહીં. વિકલ્પ A અને B સાચા છે કારણ કે દ્રાવકનું મોલ અંશ વધુ અને દ્રાવ્યનું મોલ અંશ ઓછું હોય છે. વિકલ્પ C પણ સાચો છે કારણ કે CCl₄ અને I₂ વચ્ચે આંતરઆણ્વીય આકર્ષણ બળ નિર્બળ હોવાથી આ દ્રાવણ આદર્શ દ્રાવણ તરીકે વર્તે છે.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક બંધ પાત્રમાં 25°C તાપમાને બે પ્રવાહીઓ P અને Q નું મિશ્રણ છે. જો P અને Q ના બાષ્પદબાણ અનુક્રમે 80 mmHg અને 120 mmHg હોય, અને મિશ્રણમાં P નું મોલ અંશ 0.4 હોય, તો આ દ્રાવણનું કુલ બાષ્પદબાણ કેટલું હશે? (ધારો કે આદર્શ દ્રાવણ છે)", "opts": ["96 mmHg", "104 mmHg", "100 mmHg", "112 mmHg"], "ans": 1, "exp": "સાચો જવાબ B છે. રાઉલ્ટના નિયમ મુજબ, કુલ બાષ્પદબાણ = (Pનું મોલ અંશ × Pનું બાષ્પદબાણ) + (Qનું મોલ અંશ × Qનું બાષ્પદબાણ) = (0.4 × 80) + (0.6 × 120) = 32 + 72 = 104 mmHg. વિકલ્પ A, C અને D ખોટા છે કારણ કે ગણતરી મુજબ 104 mmHg જ સાચું છે.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "નીચેનામાંથી કયું દ્રાવણ આદર્શ દ્રાવણ નથી, પરંતુ નકારાત્મક વિચલન દર્શાવે છે?", "opts": ["બેન્ઝિન + ટોલ્યુઇન", "એસિટોન + ક્લોરોફોર્મ", "ઇથેનોલ + પાણી", "હેક્ઝેન + હેપ્ટેન"], "ans": 1, "exp": "સાચો જવાબ B છે. એસિટોન અને ક્લોરોફોર્મ વચ્ચે હાઇડ્રોજન બોન્ડિંગના કારણે આંતરઆણ્વીય આકર્ષણ વધે છે, જે નકારાત્મક વિચલન દર્શાવે છે. વિકલ્પ A અને D આદર્શ દ્રાવણો છે, જ્યારે વિકલ્પ C ધનાત્મક વિચલન દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક પ્રયોગમાં 25°C તાપમાને 1 લિટર પાણીમાં 0.1 મોલ CaCl₂ ઓગાળવામાં આવ્યું છે. જો CaCl₂ સંપૂર્ણપણે વિયોજિત થાય છે, તો આ દ્રાવણનું આસ્મોટિક દબાણ કેટલું હશે? (R = 0.0821 L·atm·K⁻¹·mol⁻¹)", "opts": ["2.46 atm", "4.92 atm", "7.38 atm", "9.84 atm"], "ans": 2, "exp": "સાચો જવાબ C છે. CaCl₂ સંપૂર્ણ વિયોજન પામીને 3 આયનો (1 Ca²⁺ અને 2 Cl⁻) બનાવે છે. આથી, વાન્ટ હૉફ ગુણક (i) = 3. આસ્મોટિક દબાણ π = iCRT = 3 × 0.1 × 0.0821 × 298 = 7.38 atm. વિકલ્પ A, B અને D ખોટા છે કારણ કે ગણતરી મુજબ 7.38 atm જ સાચું છે.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક પ્રયોગમાં 25°C તાપમાને 0.5 M ગ્લુકોઝ (C₆H₁₂O₆) ના જલીય દ્રાવણનું આસ્મોટિક દબાણ 12.3 atm છે. જો આ જ તાપમાને 0.5 M યુરિયા (NH₂CONH₂) ના દ્રાવણનું આસ્મોટિક દબાણ માપવામાં આવે, તો તેનું મૂલ્ય કેટલું હશે? (R = 0.0821 L·atm·K⁻¹·mol⁻¹)", "opts": ["6.15 atm", "12.3 atm", "18.45 atm", "24.6 atm"], "ans": 1, "exp": "સાચો જવાબ B છે. ગ્લુકોઝ અને યુરિયા બંને બિન-વિદ્યુતપ્રવાહી છે અને સમાન મોલારિટી ધરાવે છે, તેથી તેમનું આસ્મોટિક દબાણ સમાન હશે. π = CRT સૂત્ર મુજબ, બંને દ્રાવણો માટે π = 0.5 × 0.0821 × 298 = 12.3 atm. વિકલ્પ A, C અને D ખોટા છે કારણ કે બંને દ્રાવણોના આસ્મોટિક દબાણ સમાન હોવા જોઈએ.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "જ્યારે એસિટોન અને ક્લોરોફોર્મના મિશ્રણમાં હાઇડ્રોજન બંધન રચાય છે, ત્યારે દ્રાવક તરીકે કયું વર્તન દર્શાવે છે?", "opts": ["એસિટોન અને ક્લોરોફોર્મ બંને આદર્શ દ્રાવક તરીકે વર્તે છે.", "એસિટોન નકારાત્મક વિચલન દર્શાવે છે જ્યારે ક્લોરોફોર્મ ધન વિચલન દર્શાવે છે.", "એસિટોન ધન વિચલન દર્શાવે છે જ્યારે ક્લોરોફોર્મ નકારાત્મક વિચલન દર્શાવે છે.", "બંને પ્રવાહીઓ નકારાત્મક વિચલન દર્શાવે છે."], "ans": 2, "exp": "એસિટોન અને ક્લોરોફોર્મ વચ્ચે હાઇડ્રોજન બંધન રચાય છે, જેના કારણે દ્રાવણનો વરાળ દબાણ આદર્શ કાનૂન કરતાં ઓછો હોય છે. આથી, એસિટોન ધન વિચલન દર્શાવે છે (કેમ કે તે હાઇડ્રોજન બંધન દ્વારા બંધાયેલું હોય છે), જ્યારે ક્લોરોફોર્મ નકારાત્મક વિચલન દર્શાવે છે (કેમ કે તે હાઇડ્રોજન બંધન દ્વારા બંધાયેલું નથી). વિકલ્પ A ખોટો છે કેમ કે બંને આદર્શ નથી. વિકલ્પ B ખોટો છે કેમ કે એસિટોન ધન વિચલન દર્શાવે છે. વિકલ્પ D ખોટો છે કેમ કે ક્લોરોફોર્મ નકારાત્મક વિચલન દર્શાવે છે, પરંતુ એસિટોન ધન વિચલન દર્શાવે છે.", "ref": "Std 12 - Chapter 2: દ્રાવણો", "ch": ""}, {"q": "નીચેનામાંથી કયું દ્રાવક એવું છે કે જે પાણી કરતાં વધુ ધ્રુવીય છે પરંતુ હાઇડ્રોજન બંધન રચી શકતું નથી?", "opts": ["એમોનિયા", "ડાયમિથાઇલ સલ્ફોક્સાઇડ (DMSO)", "મિથેનોલ", "એસિટોનાઇટ્રાઇલ"], "ans": 1, "exp": "ડાયમિથાઇલ સલ્ફોક્સાઇડ (DMSO) એ પાણી કરતાં વધુ ધ્રુવીય છે (ડાયપોલ મોમેન્ટ 4.3 D) પરંતુ તે હાઇડ્રોજન બંધન રચી શકતું નથી કેમ કે તેના મોલેક્યુલમાં હાઇડ્રોજન અણુ સીધા વીજભારિત ઓક્સિજન અથવા નાઇટ્રોજન સાથે જોડાયેલ નથી. એમોનિયા (A), મિથેનોલ (C), અને એસિટોનાઇટ્રાઇલ (D) બધા હાઇડ્રોજન બંધન રચી શકે છે.", "ref": "Std 12 - Chapter 2: દ્રાવણો", "ch": ""}, {"q": "એક દ્રાવણમાં દ્રાવક તરીકે બેન્ઝિન અને દ્રાવ્ય તરીકે ટોલ્યુઇન લેવામાં આવ્યું છે. જો રાઉલ્ટના કાનૂન પ્રમાણે ગણતરી કરવામાં આવે તો, દ્રાવણનો ક્વથનાંક કયો હશે?", "opts": ["બેન્ઝિન અને ટોલ્યુઇનના ક્વથનાંકના સરેરાશ કરતાં ઓછો", "બેન્ઝિન અને ટોલ્યુઇનના ક્વથનાંકના સરેરાશ કરતાં વધુ", "બેન્ઝિનના ક્વથનાંક જેટલો", "ટોલ્યુઇનના ક્વથનાંક જેટલો"], "ans": 0, "exp": "બેન્ઝિન અને ટોલ્યુઇન બંને આદર્શ દ્રાવણ રચે છે કેમ કે તેઓ રાસાયણિક રીતે સમાન છે (બંને એરોમેટિક હાઇડ્રોકાર્બન છે). આદર્શ દ્રાવણમાં, દ્રાવણનો ક્વથનાંક દ્રાવક અને દ્રાવ્યના ક્વથનાંકના સરેરાશ કરતાં ઓછો હોય છે. વિકલ્પ B, C, અને D ખોટા છે કેમ કે આદર્શ દ્રાવણમાં ક્વથનાંક સરેરાશ કરતાં ઓછો હોય છે.", "ref": "Std 12 - Chapter 2: દ્રાવણો", "ch": ""}, {"q": "નીચેનામાંથી કયું દ્રાવક એવું છે કે જેના દ્રાવણમાં દ્રાવ્યના અણુઓ વચ્ચે આંતરઆણ્વીય બળો દ્રાવકના અણુઓ વચ્ચેના બળો કરતાં મજબૂત હોય છે?", "opts": ["કાર્બન ટેટ્રાક્લોરાઇડ (CCl4)", "પાણી (H2O)", "બેન્ઝિન (C6H6)", "ક્લોરોફોર્મ (CHCl3)"], "ans": 1, "exp": "પાણી (H2O) એ એક એવું દ્રાવક છે કે જેના દ્રાવણમાં દ્રાવ્યના અણુઓ વચ્ચે આંતરઆણ્વીય બળો (હાઇડ્રોજન બંધન) દ્રાવકના અણુઓ વચ્ચેના બળો કરતાં મજબૂત હોય છે. કાર્બન ટેટ્રાક્લોરાઇડ (A), બેન્ઝિન (C), અને ક્લોરોફોર્મ (D) એવા દ્રાવક છે કે જેમાં આંતરઆણ્વીય બળો હાઇડ્રોજન બંધન જેટલા મજબૂત નથી.", "ref": "Std 12 - Chapter 2: દ્રાવણો", "ch": ""}, {"q": "એક દ્રાવણમાં દ્રાવક તરીકે એસિટિક એસિડ અને દ્રાવ્ય તરીકે એસિટોન લેવામાં આવ્યું છે. જો દ્રાવણનો વરાળ દબાણ આદર્શ કાનૂન કરતાં ઓછો હોય, તો કયું વિધાન સાચું છે?", "opts": ["એસિટિક એસિડ અને એસિટોન વચ્ચે હાઇડ્રોજન બંધન રચાય છે.", "એસિટિક એસિડ અને એસિટોન વચ્ચે કોઈ આંતરઆણ્વીય બળ નથી.", "એસિટિક એસિડ અને એસિટોન વચ્ચે વાન ડર વાલ્સ બળ જ હોય છે.", "એસિટિક એસિડ અને એસિટોન વચ્ચે આયનિક બળ હોય છે."], "ans": 0, "exp": "એસિટિક એસિડ અને એસિટોન વચ્ચે હાઇડ્રોજન બંધન રચાય છે, જેના કારણે દ્રાવણનો વરાળ દબાણ આદર્શ કાનૂન કરતાં ઓછો હોય છે. વિકલ્પ B ખોટો છે કેમ કે આંતરઆણ્વીય બળ છે. વિકલ્પ C ખોટો છે કેમ કે હાઇડ્રોજન બંધન વાન ડર વાલ્સ બળ કરતાં મજબૂત છે. વિકલ્પ D ખોટો છે કેમ કે આયનિક બળ હાઇડ્રોજન બંધન નથી.", "ref": "Std 12 - Chapter 2: દ્રાવણો", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
