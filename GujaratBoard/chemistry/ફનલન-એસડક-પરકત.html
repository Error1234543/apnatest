<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ફિનોલની એસિડિક પ્રકૃતિ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ફિનોલની એસિડિક પ્રકૃતિ</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ફિનોલની એસિડિક પ્રકૃતિ</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 19 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 19 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ફિનોલની એસિડિક પ્રકૃતિનો કયો ગુણધર્મ તેની પાણીમાં ઓગળવાની મર્યાદા સાથે સંકળાયેલ છે?", "opts": ["ફિનોલ O-H બંધની પોલરિતા વધારે હોવાથી હાઇડ્રોજન બંધ બનાવી શકે છે", "ફિનોલનો pKa મૂલ્ય 10 છે, જે કર્બોક્સિલિક એસિડ કરતાં ઓછો છે", "ફિનોલની એસિડિકતા બેન્ઝીન રિંગની +M અસરને કારણે ઘટે છે", "ફિનોલની એસિડિકતા ફિનોક્સાઇડ આયનની સ્થિરતા પર આધારિત છે"], "ans": 3, "exp": "ફિનોલની એસિડિક પ્રકૃતિ ફિનોક્સાઇડ આયન (C6H5O-) ની સ્થિરતા પર આધારિત છે, જે રેઝોનન્સ સ્થિરતા ધરાવે છે. A વિકલ્પ ખોટો છે કારણ કે ફિનોલ પાણીમાં ઓગળવાની મર્યાદા હાઇડ્રોજન બંધને કારણે નહીં પણ બેન્ઝીન રિંગની હાઇડ્રોફોબિક પ્રકૃતિને કારણે છે. B વિકલ્પ ખોટો છે કારણ કે ફિનોલનો pKa મૂલ્ય 10 છે, જે કર્બોક્સિલિક એસિડ (pKa ~4-5) કરતાં વધારે છે, જેથી તે ઓછો એસિડિક છે. C વિકલ્પ ખોટો છે કારણ કે બેન્ઝીન રિંગની +M અસર ફિનોલની એસિડિકતાને ઘટાડે નહીં પણ વધારે છે, કારણ કે ઓક્સિજનની -M અસર પ્રબળ હોય છે.", "ref": "Std 12 - અભ્યાસક્રમ 11: એલ્કોહોલ, ફિનોલ અને ઇથર", "ch": ""}, {"q": "ફિનોલ અને ઇથેનોલની એસિડિકતાની તુલના કરતાં કયું વિધાન સાચું છે?", "opts": ["ફિનોલ ઇથેનોલ કરતાં વધારે એસિડિક છે કારણ કે ફિનોલમાં O-H બંધની પોલરિતા ઓછી છે", "ફિનોલ ઇથેનોલ કરતાં ઓછો એસિડિક છે કારણ કે ફિનોલમાં રેઝોનન્સ સ્થિરતા નથી", "ફિનોલ ઇથેનોલ કરતાં વધારે એસિડિક છે કારણ કે ફિનોક્સાઇડ આયન રેઝોનન્સ દ્વારા સ્થિર થાય છે", "ફિનોલ અને ઇથેનોલની એસિડિકતા સરખી હોય છે કારણ કે બંનેમાં O-H બંધ હોય છે"], "ans": 2, "exp": "ફિનોલ ઇથેનોલ કરતાં વધારે એસિડિક છે કારણ કે ફિનોક્સાઇડ આયન (C6H5O-) રેઝોનન્સ દ્વારા સ્થિર થાય છે, જે ઇથોક્સાઇડ આયન (CH3CH2O-) કરતાં વધારે સ્થિર છે. A વિકલ્પ ખોટો છે કારણ કે ફિનોલમાં O-H બંધની પોલરિતા ઇથેનોલ કરતાં વધારે છે. B વિકલ્પ ખોટો છે કારણ કે ફિનોલમાં રેઝોનન્સ સ્થિરતા હોય છે. D વિકલ્પ ખોટો છે કારણ કે બંનેમાં O-H બંધ હોવા છતાં એસિડિકતા સરખી નથી.", "ref": "Std 12 - અભ્યાસક્રમ 11: એલ્કોહોલ, ફિનોલ અને ઇથર", "ch": ""}, {"q": "ફિનોલની એસિડિક પ્રકૃતિને અસર કરતી કયી ઇલેક્ટ્રોનિક અસરો સાચી રીતે વર્ણવી શકાય છે?", "opts": ["-OH સમૂહની +I અસર અને -M અસર", "-OH સમૂહની -I અસર અને +M અસર", "-OH સમૂહની -I અસર અને -M અસર", "બેન્ઝીન રિંગની +M અસર અને -I અસર"], "ans": 2, "exp": "ફિનોલમાં -OH સમૂહની -I અસર (ઇલેક્ટ્રોન આકર્ષક) અને -M અસર (રેઝોનન્સ દ્વારા ઇલેક્ટ્રોન આકર્ષક) હોય છે, જે ફિનોલની એસિડિકતાને વધારે છે. A વિકલ્પ ખોટો છે કારણ કે -OH સમૂહની +I અસર નથી. B વિકલ્પ ખોટો છે કારણ કે -OH સમૂહની +M અસર નથી. D વિકલ્પ ખોટો છે કારણ કે બેન્ઝીન રિંગની +M અસર ફિનોલની એસિડિકતાને ઘટાડે નહીં.", "ref": "Std 12 - અભ્યાસક્રમ 11: એલ્કોહોલ, ફિનોલ અને ઇથર", "ch": ""}, {"q": "ફિનોલની એસિડિકતા નીચેના પૈકી કયા કિસ્સામાં ઘટે છે?", "opts": ["ફિનોલમાં ઇલેક્ટ્રોન દાતા સમૂહ (જેવા કે -CH3) ની હાજરી", "ફિનોલમાં ઇલેક્ટ્રોન આકર્ષક સમૂહ (જેવા કે -NO2) ની હાજરી", "ફિનોલમાં હેલોજન સમૂહ (જેવા કે -Cl) ની હાજરી", "ફિનોલમાં હાઇડ્રોક્સિલ સમૂહ (જેવા કે -OH) ની હાજરી"], "ans": 0, "exp": "ફિનોલમાં ઇલેક્ટ્રોન દાતા સમૂહ (જેવા કે -CH3) ની હાજરીથી ફિનોલની એસિડિકતા ઘટે છે કારણ કે તે ફિનોક્સાઇડ આયનની સ્થિરતાને ઘટાડે છે. B વિકલ્પ ખોટો છે કારણ કે ઇલેક્ટ્રોન આકર્ષક સમૂહ (જેવા કે -NO2) એસિડિકતાને વધારે છે. C વિકલ્પ ખોટો છે કારણ કે હેલોજન સમૂહ (જેવા કે -Cl) એસિડિકતાને વધારે છે. D વિકલ્પ ખોટો છે કારણ કે હાઇડ્રોક્સિલ સમૂહ (જેવા કે -OH) એસિડિકતાને વધારે છે.", "ref": "Std 12 - અભ્યાસક્રમ 11: એલ્કોહોલ, ફિનોલ અને ઇથર", "ch": ""}, {"q": "ફિનોલની એસિડિક પ્રકૃતિને લગતા નીચેના પૈકી કયું વિધાન ખોટું છે?", "opts": ["ફિનોલ NaOH સાથે પ્રક્રિયા કરીને ફિનોક્સાઇડ આયન બનાવે છે", "ફિનોલ NaHCO3 સાથે પ્રક્રિયા કરી શકે છે", "ફિનોલની એસિડિકતા કર્બોક્સિલિક એસિડ કરતાં ઓછી છે", "ફિનોલની એસિડિકતા ઇથેનોલ કરતાં વધારે છે"], "ans": 1, "exp": "ફિનોલ NaHCO3 સાથે પ્રક્રિયા કરી શકતો નથી કારણ કે તેની એસિડિકતા ઓછી છે (pKa ~10) અને NaHCO3 સાથે પ્રક્રિયા કરવા માટે pKa < 8 હોવું જરૂરી છે. A વિકલ્પ સાચો છે કારણ કે ફિનોલ NaOH સાથે પ્રક્રિયા કરીને ફિનોક્સાઇડ આયન બનાવે છે. C વિકલ્પ સાચો છે કારણ કે ફિનોલની એસિડિકતા કર્બોક્સિલિક એસિડ (pKa ~4-5) કરતાં ઓછી છે. D વિકલ્પ સાચો છે કારણ કે ફિનોલની એસિડિકતા ઇથેનોલ (pKa ~16) કરતાં વધારે છે.", "ref": "Std 12 - અભ્યાસક્રમ 11: એલ્કોહોલ, ફિનોલ અને ઇથર", "ch": ""}, {"q": "ફિનોલની એસિડિક પ્રકૃતિ તેના કયા રાસાયણિક બંધારણના કારણે વધુ પ્રબળ બને છે, જ્યારે તેની તુલના બેન્ઝાઇલ આલ્કોહોલ સાથે કરવામાં આવે?", "opts": ["ફિનોલમાં હાઇડ્રોક્સિલ સમૂહ સીધો બેન્ઝીન વલય સાથે જોડાયેલ છે, જ્યારે બેન્ઝાઇલ આલ્કોહોલમાં તે સ્પેઇસર કાર્બન દ્વારા જોડાયેલ છે.", "ફિનોલમાં હાઇડ્રોક્સિલ સમૂહની ઓક્સિજન પર ઇલેક્ટ્રોન ઘનતા બેન્ઝીન વલયના રેઝોનન્સના કારણે વધે છે.", "બેન્ઝાઇલ આલ્કોહોલમાં હાઇડ્રોક્સિલ સમૂહની એસિડિકતા ફિનોલ કરતાં વધુ હોય છે કારણ કે તે અલ્કાઇલ સમૂહ દ્વારા સ્થિર થાય છે.", "ફિનોલમાં હાઇડ્રોક્સિલ સમૂહની એસિડિકતા બેન્ઝીન વલયના ઇલેક્ટ્રોન-દાતા પ્રભાવના કારણે ઘટે છે."], "ans": 0, "exp": "ફિનોલમાં હાઇડ્રોક્સિલ સમૂહ સીધો બેન્ઝીન વલય સાથે જોડાયેલ હોવાથી, તેના રેઝોનન્સ સ્વરૂપો દ્વારા H+ આયનને સરળતાથી મુક્ત કરવા સક્ષમ બને છે, જેથી એસિડિક પ્રકૃતિ પ્રબળ બને છે. બેન્ઝાઇલ આલ્કોહોલમાં હાઇડ્રોક્સિલ સમૂહ સ્પેઇસર કાર્બન દ્વારા જોડાયેલ હોવાથી, બેન્ઝીન વલયનો રેઝોનન્સ પ્રભાવ ઓછો અસરકારક બને છે. વિકલ્પ B ખોટો છે કારણ કે રેઝોનન્સના કારણે ઓક્સિજન પર ઇલેક્ટ્રોન ઘનતા ઘટે છે, નહીં કે વધે. વિકલ્પ C ખોટો છે કારણ કે બેન્ઝાઇલ આલ્કોહોલ ફિનોલ કરતાં ઓછી એસિડિક હોય છે. વિકલ્પ D ખોટો છે કારણ કે બેન્ઝીન વલય ઇલેક્ટ્રોન-આકર્ષક પ્રભાવ ધરાવે છે, નહીં કે ઇલેક્ટ્રોન-દાતા.", "ref": "Std 12 - અભ્યાસક્રમ 11: આલ્કોહોલ, ફિનોલ અને ઇથર", "ch": ""}, {"q": "ફિનોલની એસિડિક પ્રકૃતિને લગતા નીચેના પૈકી કયું વિધાન સાચું છે, જ્યારે તેને NaOHના જલીય દ્રાવણ સાથે પ્રક્રિયા કરવામાં આવે?", "opts": ["ફિનોલ NaOH સાથે પ્રક્રિયા કરીને ફિનોક્સાઇડ આયન અને H2O બનાવે છે, પરંતુ CO2 વાયુ મુક્ત કરતું નથી.", "ફિનોલ NaOH સાથે પ્રક્રિયા કરીને ફિનોક્સાઇડ આયન અને H2 ગેસ મુક્ત કરે છે.", "ફિનોલ NaOH સાથે પ્રક્રિયા કરતું નથી કારણ કે તેની એસિડિકતા ખૂબ જ ઓછી હોય છે.", "ફિનોલ NaOH સાથે પ્રક્રિયા કરીને ફિનોક્સાઇડ આયન અને CO2 વાયુ મુક્ત કરે છે."], "ans": 0, "exp": "ફિનોલ NaOH સાથે પ્રક્રિયા કરીને ફિનોક્સાઇડ આયન (C6H5O-) અને પાણી (H2O) બનાવે છે, પરંતુ CO2 વાયુ મુક્ત કરતું નથી. વિકલ્પ B ખોટો છે કારણ કે H2 ગેસ મુક્ત થતું નથી. વિકલ્પ C ખોટો છે કારણ કે ફિનોલની એસિડિકતા પૂરતી પ્રબળ હોય છે કે તે NaOH સાથે પ્રક્રિયા કરે. વિકલ્પ D ખોટો છે કારણ કે CO2 વાયુ મુક્ત થતું નથી.", "ref": "Std 12 - અભ્યાસક્રમ 11: આલ્કોહોલ, ફિનોલ અને ઇથર", "ch": ""}, {"q": "ફિનોલની એસિડિક પ્રકૃતિને અસર કરતી નીચેની પૈકી કયી ઇલેક્ટ્રોનિક અસરો સાચી રીતે વર્ણવી શકાય છે?", "opts": ["ફિનોલમાં હાઇડ્રોક્સિલ સમૂહના હાઇડ્રોજન પર +I પ્રભાવ પડે છે, જેથી એસિડિકતા ઘટે છે.", "ફિનોલમાં બેન્ઝીન વલયના કારણે -I પ્રભાવ પડે છે, જેથી હાઇડ્રોક્સિલ સમૂહની એસિડિકતા વધે છે.", "ફિનોલમાં હાઇડ્રોક્સિલ સમૂહના ઓક્સિજન પર +M પ્રભાવ પડે છે, જેથી એસિડિકતા ઘટે છે.", "ફિનોલમાં બેન્ઝીન વલયના કારણે +R પ્રભાવ પડે છે, જેથી હાઇડ્રોક્સિલ સમૂહની એસિડિકતા ઘટે છે."], "ans": 1, "exp": "ફિનોલમાં બેન્જીન વલય હાઇડ્રોક્સિલ સમૂહ પર -I (ઇલેક્ટ્રોન-આકર્ષક) પ્રભાવ પાડે છે, જેથી હાઇડ્રોક્સિલ સમૂહની એસિડિકતા વધે છે. વિકલ્પ A ખોટો છે કારણ કે +I પ્રભાવ એસિડિકતા ઘટાડે છે. વિકલ્પ C ખોટો છે કારણ કે +M પ્રભાવ એસિડિકતા ઘટાડે છે. વિકલ્પ D ખોટો છે કારણ કે +R પ્રભાવ એસિડિકતા ઘટાડે છે, પરંતુ બેન્ઝીન વલય -R પ્રભાવ પાડે છે.", "ref": "Std 12 - અભ્યાસક્રમ 11: આલ્કોહોલ, ફિનોલ અને ઇથર", "ch": ""}, {"q": "ફિનોલની એસિડિકતાની તુલના નીચેના પૈકી કયા યૌગિક સાથે કરતાં તે વધુ એસિડિક હોય છે?", "opts": ["ઇથેનોલ", "એસિટિક એસિડ", "ક્લોરોએસિટિક એસિડ", "બેન્ઝોઇક એસિડ"], "ans": 0, "exp": "ફિનોલ ઇથેનોલ કરતાં વધુ એસિડિક હોય છે કારણ કે ફિનોલમાં હાઇડ્રોક્સિલ સમૂહ સીધો બેન્ઝીન વલય સાથે જોડાયેલ હોવાથી, તેની એસિડિકતા વધે છે. એસિટિક એસિડ, ક્લોરોએસિટિક એસિડ અને બેન્ઝોઇક એસિડ ફિનોલ કરતાં વધુ એસિડિક હોય છે કારણ કે તેઓ કાર્બોક્સિલિક એસિડ છે, જેઓની એસિડિકતા ફિનોલ કરતાં વધુ પ્રબળ હોય છે.", "ref": "Std 12 - અભ્યાસક્રમ 11: આલ્કોહોલ, ફિનોલ અને ઇથર", "ch": ""}, {"q": "ફિનોલની એસિડિક પ્રકૃતિને લગતા નીચેના પૈકી કયું વિધાન અપવાદરૂપ ગણી શકાય? જ્યારે ફિનોલને નાઇટ્રોજનયુક્ત બેઇઝ સાથે પ્રક્રિયા કરાવવામાં આવે ત્યારે...", "opts": ["ફિનોલનું ફિનૉક્સાઇડ આયન બને છે અને તે પાણીમાં દ્રાવ્ય બને છે", "ફિનોલનું પ્રોટોનીકરણ થઇને તે વધુ એસિડિક બને છે અને પ્રક્રિયા સરળતાથી આગળ વધે છે", "ફિનોલનું ફિનૉક્સાઇડ આયન બને છે પરંતુ તે પાણીમાં અદ્રાવ્ય રહે છે કારણ કે નાઇટ્રોજનયુક્ત બેઇઝની હાજરીમાં હાઇડ્રોજન બંધની રચના થાય છે", "ફિનોલનું ફિનૉક્સાઇડ આયન બને છે પરંતુ તેની એસિડિકતા ઘટે છે કારણ કે નાઇટ્રોજનયુક્ત બેઇઝ ઇલેક્ટ્રોન-દાતા સમૂહ તરીકે વર્તે છે"], "ans": 2, "exp": "સાચો જવાબ વિકલ્પ C છે. સામાન્ય રીતે ફિનોલ નાઇટ્રોજનયુક્ત બેઇઝ (જેમ કે NaOH) સાથે પ્રક્રિયા કરી ફિનૉક્સાઇડ આયન બનાવે છે, જે પાણીમાં દ્રાવ્ય હોય છે. પરંતુ અમુક નાઇટ્રોજનયુક્ત બેઇઝ (જેમ કે એનિલિન) સાથે ફિનૉક્સાઇડ આયન બનવા છતાં હાઇડ્રોજન બંધની રચના થવાથી તે પાણીમાં અદ્રાવ્ય રહે છે, જે અપવાદરૂપ પરિસ્થિતિ છે. વિકલ્પ A સામાન્ય પરિસ્થિતિ દર્શાવે છે, જે અપવાદ નથી. વિકલ્પ B ખોટો છે કારણ કે ફિનોલનું પ્રોટોનીકરણ થતું નથી, તે પ્રોટોન દાતા તરીકે વર્તે છે. વિકલ્પ D ખોટો છે કારણ કે નાઇટ્રોજનયુક્ત બેઇઝની હાજરીમાં ફિનૉક્સાઇડ આયનની એસિડિકતા ઘટતી નથી, પરંતુ તેની દ્રાવ્યતા પર અસર થાય છે.", "ref": "Std 12 - પ્રકરણ 11: આલ્કોહોલ, ફિનોલ અને ઇથર", "ch": ""}, {"q": "ફિનોલની એસિડિક પ્રકૃતિ તેના કયા ટૉટોમરિક રૂપ સાથે સંકળાયેલ છે, જે તેની એસિડિકતામાં ફાળો આપે છે?", "opts": ["કીટો ફોર્મ", "ઇનોલ ફોર્મ", "કાર્બોનિલ ફોર્મ", "એલ્કોહોલિક ફોર્મ"], "ans": 1, "exp": "ફિનોલની એસિડિક પ્રકૃતિ તેના ઇનોલ ફોર્મ સાથે સંકળાયેલ છે, કારણ કે ઇનોલ ફોર્મમાં હાઇડ્રોક્સિલ સમૂહ (OH) સીધા બેન્ઝીન વલય સાથે જોડાયેલ હોય છે, જે O-H બંધને ધ્રુવીય બનાવે છે અને H+ આયન મુક્ત કરવા સક્ષમ બનાવે છે. કીટો ફોર્મ (A) ફિનોલમાં અસ્તિત્વ ધરાવતું નથી. કાર્બોનિલ ફોર્મ (C) અને એલ્કોહોલિક ફોર્મ (D) ફિનોલની એસિડિકતામાં ફાળો આપતા નથી.", "ref": "Std 12 - અભ્યાસક્રમ 16: એલ્કોહોલ, ફિનોલ અને ઇથર", "ch": ""}, {"q": "ફિનોલની એસિડિકતા નીચેના પૈકી કયા યૌગિક કરતાં ઓછી હોય છે, પરંતુ કાર્બોક્સિલિક એસિડ કરતાં વધુ હોય છે?", "opts": ["ઇથેનોલ", "મિથેનોલ", "પિક્રિક એસિડ", "બેન્ઝોઇક એસિડ"], "ans": 0, "exp": "ફિનોલની એસિડિકતા ઇથેનોલ (A) કરતાં વધુ હોય છે, કારણ કે ફિનોલમાં ફિનાઇલ વલય હાઇડ્રોક્સિલ સમૂહને સ્થિર કરે છે, જ્યારે ઇથેનોલમાં એવું નથી. મિથેનોલ (B) કરતાં પણ ફિનોલ વધુ એસિડિક હોય છે. પિક્રિક એસિડ (C) અને બેન્ઝોઇક એસિડ (D) બંને ફિનોલ કરતાં વધુ એસિડિક હોય છે, કારણ કે તેમાં કાર્બોક્સિલિક એસિડ સમૂહ અથવા નાઇટ્રો સમૂહો હોય છે, જે એસિડિકતામાં વધારો કરે છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: એલ્કોહોલ, ફિનોલ અને ઇથર", "ch": ""}, {"q": "ફિનોલની એસિડિકતામાં નીચેના પૈકી કયા સમૂહના પ્રતિક્રમણ (સબસ્ટિટ્યુશન) થવાને કારણે ઘટાડો થાય છે?", "opts": ["-NO2", "-CH3", "-Cl", "-OH"], "ans": 1, "exp": "ફિનોલની એસિડિકતામાં -CH3 (મિથાઇલ સમૂહ)ના પ્રતિક્રમણ થવાને કારણે ઘટાડો થાય છે, કારણ કે -CH3 સમૂહ ઇલેક્ટ્રોન-દાતા હોય છે, જે ફિનોલ વલયની ઇલેક્ટ્રોન ઘનતામાં વધારો કરે છે અને O-H બંધને તોડવા માટે H+ આયન મુક્ત કરવા અઘરું બનાવે છે. -NO2 (A) ઇલેક્ટ્રોન-આકર્ષક હોય છે અને એસિડિકતામાં વધારો કરે છે. -Cl (C) અને -OH (D) પણ એસિડિકતામાં વધારો કરે છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: એલ્કોહોલ, ફિનોલ અને ઇથર", "ch": ""}, {"q": "ફિનોલની એસિડિક પ્રકૃતિને લગતા નીચેના વિધાનો પૈકી કયું સૌથી યોગ્ય રીતે સમજાવે છે કે, જ્યારે ફિનોલને NaOH સાથે ગરમ કરવામાં આવે ત્યારે કયો પ્રતિક્રિયા-પગલો પ્રાથમિક રીતે ઘટે છે?", "opts": ["ફિનોલમાં હાઇડ્રોક્સિલ સમૂહ (-OH) પરના હાઇડ્રોજનનું સીધું વિસ્થાપન થાય છે, કારણ કે O-H બંધની પોલરતા વધુ હોય છે.", "ફિનોલનું કેટો-ઇનોલ ટૉટોમરાઇઝેશન થાય છે, જેમાં બેન્ઝીન રિંગ પર કાર્બોનિલ સમૂહ બને છે અને તે એસિડિક પ્રકૃતિ વધારે છે.", "ફિનોલના બેન્ઝીન રિંગ પર ઇલેક્ટ્રોન-આકર્ષક પ્રભાવને કારણે O-H બંધનું ધ્રુવીકરણ વધે છે, જેથી H+ મુક્ત થાય છે.", "ફિનોલનું આયનાઇઝેશન થાય છે અને ફિનોક્સાઇડ આયન (C6H5O-) બને છે, જેમાં રેઝોનન્સ સ્થિરતા એસિડિક પ્રકૃતિને પ્રબળ બનાવે છે."], "ans": 3, "exp": "ફિનોલની એસિડિક પ્રકૃતિ તેના O-H બંધના વિસ્થાપન પર આધારિત છે, જેમાં H+ મુક્ત થાય છે અને ફિનોક્સાઇડ આયન (C6H5O-) બને છે. આ આયનમાં રેઝોનન્સ સ્થિરતા હોય છે, જે એસિડિક પ્રકૃતિને પ્રબળ બનાવે છે. વિકલ્પ A ખોટો છે કારણ કે O-H બંધનું વિસ્થાપન સીધું નથી થતું, પરંતુ H+ મુક્ત થાય છે. વિકલ્પ B ખોટો છે કારણ કે ફિનોલમાં કેટો-ઇનોલ ટૉટોમરાઇઝેશન થતું નથી. વિકલ્પ C અંશતઃ સાચો છે, પરંતુ તે એસિડિક પ્રકૃતિની સંપૂર્ણ સમજૂતી આપતો નથી, કારણ કે રેઝોનન્સ સ્થિરતા એ પ્રાથમિક કારણ છે.", "ref": "Std 12 - અભ્યાસક્રમ 16: એલ્કોહોલ, ફિનોલ અને ઇથર", "ch": ""}, {"q": "ફિનોલના જલીય દ્રાવણમાં સોડિયમ હાઇડ્રોક્સાઇડ ઉમેરતાં બનતું સંયોજન નીચેના પૈકી કયા પ્રકારનું હોય છે, જે ફિનોલની એસિડિક પ્રકૃતિને સૂચવે છે?", "opts": ["સહસંયોજક સંયોજન (Covalent compound)", "આયનિક સંયોજન (Ionic compound)", "સંકીર્ણ સંયોજન (Complex compound)", "સહસંયોજક અને આયનિક બંને ગુણધર્મો ધરાવતું સંયોજન"], "ans": 1, "exp": "ફિનોલ એસિડિક પ્રકૃતિ ધરાવતું let userAns={},curIdx=0;

function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}

  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';

  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
