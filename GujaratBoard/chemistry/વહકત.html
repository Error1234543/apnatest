<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>વાહકતા</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>વાહકતા</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">વાહકતા</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "જ્યારે કોષરસમાં K+ આયનની સાંદ્રતા વધે છે ત્યારે કોષની વાહકતા પર શું અસર થાય છે ?", "opts": ["કોષની વાહકતા વધે છે કારણ કે K+ આયન સક્રિય પરિવહન દ્વારા બહાર નીકળે છે.", "કોષની વાહકતા ઘટે છે કારણ કે K+ આયનની ઉચ્ચ સાંદ્રતાથી કોષરસની શ્યાનતા વધે છે.", "કોષની વાહકતા પર કોઈ અસર થતી નથી કારણ કે K+ આયન પાસિવ પરિવહન દ્વારા સંતુલન રાખે છે.", "કોષની વાહકતા વધે છે કારણ કે K+ આયનની હાજરીથી કોષરસમાં ઇલેક્ટ્રોલાઇટની સાંદ્રતા વધે છે."], "ans": 3, "exp": "K+ આયનની સાંદ્રતા વધવાથી કોષરસમાં ઇલેક્ટ્રોલાઇટની સાંદ્રતા વધે છે, જેના કારણે કોષની વાહકતા વધે છે. વિકલ્પ A ખોટો છે કારણ કે K+ આયન સક્રિય પરિવહન દ્વારા બહાર નીકળતું નથી. વિકલ્પ B ખોટો છે કારણ કે K+ આયનની ઉચ્ચ સાંદ્રતાથી કોષરસની શ્યાનતા ઘટે છે, નહીં કે વધે. વિકલ્પ C ખોટો છે કારણ કે K+ આયનની સાંદ્રતા કોષની વાહકતા પર અસર કરે છે.", "ref": "Std 12 - Chapter 11: કોષ અને કોષરસ", "ch": ""}, {"q": "નીચેનામાંથી કયો પદાર્થ કોષની વાહકતામાં સૌથી વધુ યોગદાન આપે છે ?", "opts": ["ગ્લુકોઝ", "પ્રોટીન", "ઇલેક્ટ્રોલાઇટ્સ", "કાર્બોદિત"], "ans": 2, "exp": "કોષની વાહકતા મુખ્યત્વે ઇલેક્ટ્રોલાઇટ્સ (જેમ કે Na+, K+, Cl-) દ્વારા નક્કી થાય છે, કારણ કે તેઓ વિદ્યુત પ્રવાહને વહન કરવા માટે આયનિક સ્વરૂપે હાજર હોય છે. ગ્લુકોઝ, પ્રોટીન અને કાર્બોદિત અવાહક હોય છે અથવા ઓછી વાહકતા ધરાવે છે.", "ref": "Std 12 - Chapter 11: કોષ અને કોષરસ", "ch": ""}, {"q": "જ્યારે કોષને હાઇપોટોનિક દ્રાવણમાં મૂકવામાં આવે છે, ત્યારે તેની વાહકતા પર શું અસર થાય છે ?", "opts": ["વાહકતા ઘટે છે કારણ કે કોષ ફૂલે છે અને કોષરસ પાતળું થાય છે.", "વાહકતા વધે છે કારણ કે કોષરસમાં પાણીનું પ્રમાણ વધે છે અને આયનની સાંદ્રતા ઘટે છે.", "વાહકતા પર કોઈ અસર થતી નથી કારણ કે કોષની રચના સ્થિર રહે છે.", "વાહકતા વધે છે કારણ કે કોષરસમાં આયનની સાંદ્રતા વધે છે."], "ans": 0, "exp": "હાઇપોટોનિક દ્રાવણમાં કોષ ફૂલે છે અને કોષરસ પાતળું થાય છે, જેના કારણે આયનની સાંદ્રતા ઘટે છે અને વાહકતા ઘટે છે. વિકલ્પ B ખોટો છે કારણ કે પાણીનું પ્રમાણ વધવાથી આયનની સાંદ્રતા ઘટે છે, જે વાહકતાને ઘટાડે છે. વિકલ્પ C ખોટો છે કારણ કે કોષની રચના બદલાય છે. વિકલ્પ D ખોટો છે કારણ કે આયનની સાંદ્રતા ઘટે છે, નહીં કે વધે.", "ref": "Std 12 - Chapter 11: કોષ અને કોષરસ", "ch": ""}, {"q": "નીચેનામાંથી કયો કોષ અંગ કોષની વાહકતામાં સૌથી વધુ મહત્વનો ભાગ ભજવે છે ?", "opts": ["કોષકેન્દ્ર", "માઇટોકોન્ડ્રિયા", "કોષરસજાળ", "કોષપટલ"], "ans": 3, "exp": "કોષપટલ કોષની વાહકતામાં મહત્વનો ભાગ ભજવે છે કારણ કે તે આયન અને અણુઓના પરિવહનને નિયંત્રિત કરે છે. કોષકેન્દ્ર, માઇટોકોન્ડ્રિયા અને કોષરસજાળ વાહકતામાં સીધો ભાગ ભજવતા નથી.", "ref": "Std 12 - Chapter 11: કોષ અને કોષરસ", "ch": ""}, {"q": "જ્યારે કોષમાં Ca2+ આયનની સાંદ્રતા વધે છે, ત્યારે કોષની વાહકતા પર શું અસર થાય છે ?", "opts": ["વાહકતા ઘટે છે કારણ કે Ca2+ આયન કોષરસને વધુ શ્યાન બનાવે છે.", "વાહકતા વધે છે કારણ કે Ca2+ આયન વિદ્યુત પ્રવાહને વહન કરવા માટે આયનિક સ્વરૂપે હાજર હોય છે.", "વાહકતા પર કોઈ અસર થતી નથી કારણ કે Ca2+ આયન કોષની વાહકતામાં ભાગ લેતું નથી.", "વાહકતા ઘટે છે કારણ કે Ca2+ આયન કોષરસમાં પ્રોટીન સાથે જોડાઈ જાય છે."], "ans": 1, "exp": "Ca2+ આયન વિદ્યુત પ્રવાહને વહન કરવા માટે આયનિક સ્વરૂપે હાજર હોય છે, જેના કારણે કોષની વાહકતા વધે છે. વિકલ્પ A ખોટો છે કારણ કે Ca2+ આયન કોષરસને શ્યાન બનાવતું નથી. વિકલ્પ C ખોટો છે કારણ કે Ca2+ આયન કોષની વાહકતામાં ભાગ લે છે. વિકલ્પ D ખોટો છે કારણ કે Ca2+ આયન પ્રોટીન સાથે જોડાઈ જવાને કારણે વાહકતા ઘટતી નથી.", "ref": "Std 12 - Chapter 11: કોષ અને કોષરસ", "ch": ""}, {"q": "જ્યારે કોષમાં Na+/K+ પંપની ક્રિયા અવરોધાય છે, ત્યારે કોષની વાહકતામાં કયો ફેરફાર થાય છે?", "opts": ["કોષની વાહકતા વધે છે કારણ કે K+ આયનો કોષ બહાર નીકળી જાય છે.", "કોષની વાહકતા ઘટે છે કારણ કે Na+ આયનો કોષ અંદર પ્રવેશે છે અને કોષરસની સાંદ્રતા વધે છે.", "કોષની વાહકતા પર કોઈ ફેરફાર થતો નથી કારણ કે Na+/K+ પંપ વાહકતામાં સીધો ભાગ ભજવતો નથી.", "કોષની વાહકતા વધે છે કારણ કે કોષરસમાં Na+ આયનોની સાંદ્રતા ઘટે છે."], "ans": 1, "exp": "Na+/K+ પંપ કોષની સક્રિય પરિવહન પ્રક્રિયા દ્વારા Na+ આયનોને કોષ બહાર કાઢે છે અને K+ આયનોને કોષ અંદર લાવે છે. જ્યારે આ પંપની ક્રિયા અવરોધાય છે, ત્યારે Na+ આયનો કોષ અંદર પ્રવેશે છે, જેના કારણે કોષરસની આયનિક સાંદ્રતા વધે છે અને કોષની વાહકતા ઘટે છે. A) ખોટું છે કારણ કે K+ આયનો કોષ બહાર નીકળી જવાને બદલે, Na+ આયનો કોષ અંદર પ્રવેશે છે. C) ખોટું છે કારણ કે Na+/K+ પંપ કોષની વાહકતામાં મહત્વનો ભાગ ભજવે છે. D) ખોટું છે કારણ કે Na+ આયનોની સાંદ્રતા વધવાને કારણે વાહકતા ઘટે છે, નહીં કે વધે.", "ref": "Std 12 - Chapter 9: કોષ અને આણ્વિક જીવવિજ્ઞાન (Cell and Molecular Biology)", "ch": ""}, {"q": "નીચેનામાંથી કયો પદાર્થ કોષની વાહકતામાં સૌથી ઓછું યોગદાન આપે છે?", "opts": ["ક્લોરાઇડ આયનો (Cl⁻)", "પ્રોટીન આયનો", "ગ્લુકોઝ", "કેલ્શિયમ આયનો (Ca²⁺)"], "ans": 2, "exp": "ગ્લુકોઝ એક અઆયનિક કાર્બોદિત છે, જે કોષની વાહકતામાં સીધું યોગદાન આપતો નથી. ક્લોરાઇડ આયનો, પ્રોટીન આયનો અને કેલ્શિયમ આયનો આયનિક સ્વરૂપે હોવાથી કોષની વાહકતામાં યોગદાન આપે છે. ગ્લુકોઝ વાહકતામાં સૌથી ઓછું યોગદાન આપે છે.", "ref": "Std 12 - Chapter 9: કોષ અને આણ્વિક જીવવિજ્ઞાન (Cell and Molecular Biology)", "ch": ""}, {"q": "જ્યારે કોષને હાઇપરટોનિક દ્રાવણમાં મૂકવામાં આવે છે, ત્યારે કોષની વાહકતા પર શું અસર થાય છે?", "opts": ["કોષની વાહકતા વધે છે કારણ કે કોષરસમાં પાણીની માત્રા ઘટે છે.", "કોષની વાહકતા ઘટે છે કારણ કે કોષરસમાં આયનોની સાંદ્રતા વધે છે.", "કોષની વાહકતા પર કોઈ ફેરફાર થતો નથી.", "કોષની વાહકતા ઘટે છે કારણ કે કોષરસમાં પાણીની માત્રા વધે છે."], "ans": 1, "exp": "હાઇપરટોનિક દ્રાવણમાં કોષને મૂકવામાં આવે ત્યારે કોષરસમાંથી પાણી બહાર નીકળે છે, જેના કારણે કોષરસમાં આયનોની સાંદ્રતા વધે છે. આયનોની સાંદ્રતા વધવાને કારણે કોષની વાહકતા ઘટે છે. A) ખોટું છે કારણ કે પાણીની માત્રા ઘટવાને કારણે આયનોની સાંદ્રતા વધે છે, જે વાહકતા ઘટાડે છે. C) ખોટું છે કારણ કે વાહકતામાં ફેરફાર થાય છે. D) ખોટું છે કારણ કે પાણીની માત્રા ઘટે છે, નહીં કે વધે.", "ref": "Std 12 - Chapter 9: કોષ અને આણ્વિક જીવવિજ્ઞાન (Cell and Molecular Biology)", "ch": ""}, {"q": "નીચેનામાંથી કયો કોષ અંગ કોષની વાહકતામાં સૌથી ઓછું મહત્વનો ભાગ ભજવે છે?", "opts": ["કોષરસજાલ (Endoplasmic Reticulum)", "માઇટોકોન્ડ્રિયા", "ગોલ્ગી ઉપકરણ", "કોષકેન્દ્ર (Nucleus)"], "ans": 3, "exp": "કોષકેન્દ્ર (Nucleus) કોષની વાહકતામાં સીધો ભાગ ભજવતો નથી. કોષરસજાલ, માઇટોકોન્ડ્રિયા અને ગોલ્ગી ઉપકરણ કોષની વાહકતામાં આયનો અને અણુઓના પરિવહન દ્વારા મહત્વનો ભાગ ભજવે છે. કોષકેન્દ્ર મુખ્યત્વે અનુવંશિક માહિતીના સંગ્રહ અને વહન માટે જવાબદાર છે.", "ref": "Std 11 - Chapter 8: કોષ: જીવનની મૂળભૂત એકમ (Cell: The Unit of Life)", "ch": ""}, {"q": "જ્યારે કોષમાં Mg²⁺ આયનોની સાંદ્રતા વધે છે, ત્યારે કોષની વાહકતા પર શું અસર થાય છે?", "opts": ["કોષની વાહકતા વધે છે કારણ કે Mg²⁺ આયનો ધન આયનો છે.", "કોષની વાહકતા ઘટે છે કારણ કે Mg²⁺ આયનો કોષરસમાં અન્ય આયનો સાથે જોડાઈને અસક્રિય સંયોજનો બનાવે છે.", "કોષની વાહકતા પર કોઈ ફેરફાર થતો નથી.", "કોષની વાહકતા વધે છે કારણ કે Mg²⁺ આયનો કોષરસમાં પાણીની માત્રા વધારે છે."], "ans": 1, "exp": "Mg²⁺ આયનો કોષરસમાં અન્ય આયનો (જેમ કે ફોસ્ફેટ) સાથે જોડાઈને અસક્રિય સંયોજનો બનાવે છે, જેના કારણે કોષરસમાં મુક્ત આયનોની સાંદ્રતા ઘટે છે અને કોષની વાહકતા ઘટે છે. A) ખોટું છે કારણ કે Mg²⁺ આયનો ધન આયનો હોવા છતાં, તેઓ અન્ય આયનો સાથે જોડાઈને અસક્રિય બને છે. C) ખોટું છે કારણ કે વાહકતામાં ફેરફાર થાય છે. D) ખોટું છે કારણ કે Mg²⁺ આયનો પાણીની માત્રા વધારતા નથી.", "ref": "Std 12 - Chapter 9: કોષ અને આણ્વિક જીવવિજ્ઞાન (Cell and Molecular Biology)", "ch": ""}, {"q": "કોષની વાહકતા પર નીચેનામાંથી કયા પરિબળનો સૌથી ઓછો પ્રભાવ પડે છે ?", "opts": ["કોષરસની pH", "કોષરસમાં ક્લોરાઇડ આયનની સાંદ્રતા", "કોષરસમાં ગ્લૂકોઝની સાંદ્રતા", "કોષરસમાં પ્રોટીનની સાંદ્રતા"], "ans": 2, "exp": "કોષની વાહકતા મુખ્યત્વે આયનિક સાંદ્રતા (જેવી કે K+, Na+, Cl-) અને પ્રોટીન જેવા વાહક પદાર્થો પર આધાર રાખે છે. ગ્લૂકોઝ એક અઆયનિક કાર્બોદિત છે, જે કોષની વાહકતામાં નગણ્ય યોગદાન આપે છે. pH, Cl- સાંદ્રતા અને પ્રોટીનની સાંદ્રતા કોષની વાહકતાને પ્રભાવિત કરે છે, પરંતુ ગ્લૂકોઝનો પ્રભાવ સૌથી ઓછો હોય છે.", "ref": "Std 12 - Chapter 9: કોષ અને આણ્વિક જીવવિજ્ઞાન (Cell and Molecular Biology)", "ch": ""}, {"q": "જ્યારે કોષમાં એસિટાઇલકોલિન (એક ન્યુરોટ્રાન્સમિટર) મુક્ત થાય છે, ત્યારે કોષની વાહકતામાં કયો ફેરફાર જોવા મળે છે ?", "opts": ["કોષની વાહકતા ઘટે છે કારણ કે એસિટાઇલકોલિન કોષરસને અલ્કલાઇન બનાવે છે", "કોષની વાહકતા વધે છે કારણ કે એસિટાઇલકોલિન Na+ ચેનલોને ઉત્તેજિત કરે છે", "કોષની વાહકતા પર કોઈ ફેરફાર થતો નથી", "કોષની વાહકતા ઘટે છે કારણ કે એસિટાઇલકોલિન K+ ચેનલોને અવરોધે છે"], "ans": 1, "exp": "એસિટાઇલકોલિન એક ન્યુરોટ્રાન્સમિટર છે જે Na+ ચેનલોને ઉત્તેજિત કરે છે, જેથી Na+ આયનો કોષમાં પ્રવેશે છે અને કોષની વાહકતા વધે છે. અલ્કલાઇન વાતાવરણ અથવા K+ ચેનલો પર અસર કરવી એ એસિટાઇલકોલિનની પ્રાથમિક ક્રિયા નથી. કોષની વાહકતા પર કોઈ ફેરફાર ન થવો એ પણ અયોગ્ય છે.", "ref": "Std 12 - Chapter 10: ચેતાતંત્ર અને ઉત્તેજના (Nervous System and Impulse)", "ch": ""}, {"q": "નીચેનામાંથી કયો કોષ અંગ કોષની વાહકતાને નિયંત્રિત કરવામાં સૌથી ઓછો ભાગ ભજવે છે ?", "opts": ["અંતર્ગત જાળ (Endoplasmic Reticulum)", "ગોલ્ગી ઉપકરણ (Golgi Apparatus)", "માઇટોકોન્ડ્રિયા (Mitochondria)", "કોષરસકલા (Plasma Membrane)"], "ans": 1, "exp": "કોષની વાહકતા મુખ્યત્વે કોષરસકલા (પ્લાઝમા મેમ્બ્રેન) દ્વારા નિયંત્રિત થાય છે, જ્યાં આયન ચેનલો અને વાહકો સ્થિત હોય છે. અંતર્ગત જાળ (ER) અને માઇટોકોન્ડ્રિયા આયન સંતુલનમાં અગત્યનો ભાગ ભજવે છે, પરંતુ ગોલ્ગી ઉપકરણનો વાહકતામાં સીધો સંબંધ ઓછો હોય છે.", "ref": "Std 11 - Chapter 8: કોષ: જીવનની મૂળ એકમ (Cell: The Unit of Life)", "ch": ""}, {"q": "જ્યારે કોષને 0°C તાપમાને રાખવામાં આવે છે, ત્યારે કોષની વાહકતામાં કયો ફેરફાર જોવા મળે છે ?", "opts": ["વાહકતા વધે છે કારણ કે આયનોની ગતિ વધે છે", "વાહકતા ઘટે છે કારણ કે આયનોની ગતિ ઘટે છે", "વાહકતા પર કોઈ ફેરફાર થતો નથી", "વાહકતા ઘટે છે કારણ કે કોષરસ જામી જાય છે"], "ans": 1, "exp": "0°C તાપમાને આયનોની ગતિ ઘટે છે, જેથી કોષની વાહકતા ઘટે છે. આયનોની ગતિ વધવી અથવા કોષરસ જામી જવું એ તાપમાનના આ ધોરણે યોગ્ય નથી. વાહકતા પર કોઈ ફેરફાર ન થવો એ પણ અયોગ્ય છે.", "ref": "Std 12 - Chapter 9: કોષ અને આણ્વિક જીવવિજ્ઞાન (Cell and Molecular Biology)", "ch": ""}, {"q": "નીચેનામાંથી કયા આયનની ઉણપ કોષની વાહકતાને સૌથી વધુ પ્રભાવિત કરે છે ?", "opts": ["Ca2+", "Mg2+", "Cl-", "HCO3-"], "ans": 0, "exp": "Ca2+ આયનો કોષની વાહકતામાં અગત્યનો ભાગ ભજવે છે, ખાસ કરીને કોષરસકલા પરની આયન ચેનલો અને વાહકોની ક્રિયામાં. Ca2+ની ઉણપથી કોષની વાહકતા નોંધપાત્ર રીતે ઘટે છે. Mg2+, Cl-, અને HCO3- પણ મહત્વના છે, પરંતુ Ca2+ની ઉણપનો પ્રભાવ સૌથી વધુ હોય છે.", "ref": "Std 12 - Chapter 9: કોષ અને આણ્વિક જીવવિજ્ઞાન (Cell and Molecular Biology)", "ch": ""}, {"q": "જ્યારે કોષમાં ક્લોરાઇડ આયનો (Cl⁻)ની સાંદ્રતા અચાનક વધે છે, ત્યારે કોષપટલની વાહકતા પર શું અસર થાય છે?", "opts": ["કોષપટલની વાહકતા વધે છે કારણ કે Cl⁻ આયનો કોષપટલમાં રહેલા પ્રોટીન ચેનલ્સને સક્રિય કરે છે.", "કોષપટલની વાહકતા ઘટે છે કારણ કે Cl⁻ આયનો કોષપટલના વિધુત ભારને સંતુલિત કરે છે.", "કોષપટલની વાહકતા પર કોઈ ફેરફાર થતો નથી કારણ કે Cl⁻ આયનો કોષપટલ માટે અપારગમ્ય હોય છે.", "કોષપટલની વાહકતા વધે છે કારણ કે Cl⁻ આયનો કોષપટલના લિપિડ બાયલેયરને વધુ પારગમ્ય બનાવે છે."], "ans": 1, "exp": "ક્લોરાઇડ આયનો (Cl⁻) કોષપટલની વાહકતા ઘટાડે છે કારણ કે તેઓ કોષપટલના વિધુત ભારને સંતુલિત કરે છે, જેથી આયન ચેનલ્સની ક્રિયાશીલતા ઘટે છે. વિકલ્પ A ખોટો છે કારણ કે Cl⁻ આયનો પ્રોટીન ચેનલ્સને સક્રિય કરતા નથી. વિકલ્પ C ખોટો છે કારણ કે Cl⁻ આયનો કોષપટલ માટે અપારગમ્ય નથી, પરંતુ તેઓ પાસિવ ટ્રાન્સપોર્ટ દ્વારા પસાર થઈ શકે છે. વિકલ્પ D ખોટો છે કારણ કે Cl⁻ આયનો લિપિડ બાયલેયરને પારગમ્ય બનાવતા નથી.", "ref": "Std 12 - Chapter 9: કોષ અને કોષપટલ", "ch": ""}, {"q": "નીચેનામાંથી કયો પદાર્થ કોષપટલની વાહકતાને સૌથી વધુ પ્રભાવિત કરે છે જ્યારે કોષ શ્વસનની ક્રિયા દરમિયાન હોય છે?", "opts": ["ગ્લુકોઝ", "એટીપી (ATP)", "ઓક્સિજન", "કાર્બન ડાયોક્સાઇડ"], "ans": 1, "exp": "શ્વસન દરમિયાન એટીપી (ATP)નું ઉત્પાદન થાય છે, જે કોષપટલ પર રહેલા Na+/K+ પંપ અને અન્ય આયન ચેનલ્સને ઉર્જા પૂરી પાડે છે, જેથી કોષપટલની વાહકતા નિયંત્રિત રહે છે. ગ્લુકોઝ (A) શ્વસનનું કચરું પદાર્થ નથી, પરંતુ તે શ્વસન માટેના ઇંધણ તરીકે કામ કરે છે. ઓક્સિજન (C) શ્વસન માટે જરૂરી છે, પરંતુ તે કોષપટલની વાહકતાને સીધો પ્રભાવિત કરતું નથી. કાર્બન ડાયોક્સાઇડ (D) શ્વસનનું ઉપોત્પાદન છે, પરંતુ તે કોષપટલની વાહકતાને સીધો પ્રભાવિત કરતું નથી.", "ref": "Std 12 - Chapter 10: શ્વસન", "ch": ""}, {"q": "જ્યારે કોષમાં કેલ્શિયમ આયનો (Ca²⁺) અને મેગ્નેશિયમ આયનો (Mg²⁺)ની સાંદ્રતા સરખી હોય છે, ત્યારે કોષપટલની વાહકતા પર શું અસર થાય છે?", "opts": ["કોષપટલની વાહકતા વધે છે કારણ કે Ca²⁺ આયનો કોષપટલને વધુ પારગમ્ય બનાવે છે.", "કોષપટલની વાહકતા ઘટે છે કારણ કે Mg²⁺ આયનો Ca²⁺ આયનોની અસરને નિષ્ક્રિય કરે છે.", "કોષપટલની વાહકતા સ્થિર રહે છે કારણ કે Ca²⁺ અને Mg²⁺ આયનો એકબીજાની અસરને સંતુલિત કરે છે.", "કોષપટલની વાહકતા અચાનક વધે છે કારણ કે બંને આયનો કોષપટલની ચેનલ્સને સક્રિય કરે છે."], "ans": 2, "exp": "જ્યારે Ca²⁺ અને Mg²⁺ આયનોની સાંદ્રતા સરખી હોય છે, ત્યારે તેઓ   }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
