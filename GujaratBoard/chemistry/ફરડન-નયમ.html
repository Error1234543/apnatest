<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ફૅરાડેના નિયમો</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>ફૅરાડેના નિયમો</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">ફૅરાડેના નિયમો</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "ફૅરાડેના પ્રથમ નિયમ પ્રમાણે, વિદ્યુતવિભાજન દરમિયાન કોઈ પણ ઇલેક્ટ્રોડ પર મુક્ત થતાં દ્રવ્યની માત્રા નીચેનામાંથી કયા પર આધાર રાખતી નથી?", "opts": ["વહેતા વિદ્યુતપ્રવાહની તીવ્રતા", "વિદ્યુતપ્રવાહ પસાર કરવાનો સમય", "ઇલેક્ટ્રોડના પદાર્થની પ્રકૃતિ", "દ્રાવણની સાંદ્રતા"], "ans": 2, "exp": "ફૅરાડેના પ્રથમ નિયમ મુજબ, મુક્ત થતાં દ્રવ્યની માત્રા (m) વહેતા વિદ્યુતપ્રવાહ (I) અને સમય (t) પર આધાર રાખે છે (m ∝ I × t). ઇલેક્ટ્રોડના પદાર્થની પ્રકૃતિ પર આ નિયમ આધાર રાખતો નથી, પરંતુ દ્રાવણની સાંદ્રતા અને તાપમાન જેવા પરિબળો અસર કરી શકે છે. તો પણ પ્રશ્નમાં પૂછવામાં આવેલ છે કે કયા પર આધાર *રાખતી નથી*, અને ઇલેક્ટ્રોડના પદાર્થની પ્રકૃતિ એ સીધો જ નિયમ સાથે સંબંધિત નથી.", "ref": "Std 12 - વિજ્ઞાન પ્રવાહ: રસાયણવિજ્ઞાન - અધ્યાય ૩: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "ફૅરાડેના બીજા નિયમ અનુસાર, જ્યારે એક જ પ્રમાણમાં વિદ્યુતપ્રવાહ પસાર કરવામાં આવે ત્યારે, વિવિધ પદાર્થોના ઇલેક્ટ્રોડ પર મુક્ત થતાં દ્રવ્યના દળનો ગુણોત્તર નીચેનામાંથી કયા પર આધાર રાખે છે?", "opts": ["પદાર્થોના અણુભાર પર", "પદાર્થોના સંયોજકતા સમૂહ પર", "પદાર્થોના પરમાણુ ક્રમાંક પર", "પદાર્થોના ગલનબિંદુ પર"], "ans": 1, "exp": "ફૅરાડેના બીજા નિયમ મુજબ, વિવિધ પદાર્થોના ઇલેક્ટ્રોડ પર મુક્ત થતાં દળનો ગુણોત્તર તેમના *સંયોજકતા સમૂહ* (equivalent weight) પર આધાર રાખે છે. અણુભાર, પરમાણુ ક્રમાંક, અને ગલનબિંદુ એ નિયમ સાથે સીધો સંબંધ ધરાવતા નથી.", "ref": "Std 12 - વિજ્ઞાન પ્રવાહ: રસાયણવિજ્ઞાન - અધ્યાય ૩: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "ફૅરાડેના નિયમોની મર્યાદા કયા કિસ્સામાં જોવા મળે છે જ્યારે વિદ્યુતવિભાજન દરમિયાન ઇલેક્ટ્રોડ પર દ્રવ્યનું મુક્ત થવું અપેક્ષિત મુજબ થતું નથી?", "opts": ["જ્યારે દ્રાવણમાં એક જ પ્રકારના આયન હાજર હોય", "જ્યારે ઇલેક્ટ્રોડ પર દ્વિતીય પ્રક્રિયા (secondary reaction) થાય", "જ્યારે વિદ્યુતપ્રવાહની તીવ્રતા ખૂબ ઓછી હોય", "જ્યારે દ્રાવણનું તાપમાન ૨૫°C હોય"], "ans": 1, "exp": "ફૅરાડેના નિયમો ત્યારે લાગુ પડતા નથી જ્યારે ઇલેક્ટ્રોડ પર દ્વિતીય પ્રક્રિયા (જેવી કે મુક્ત થયેલ દ્રવ્યનું પાણી અથવા ઓક્સિજન સાથે પ્રક્રિયા કરવી) થાય છે. આ કિસ્સામાં, મુક્ત થતું દ્રવ્યની માત્રા અપેક્ષિત મુજબ નથી. બાકીના વિકલ્પો (A, C, D) એ નિયમોની મર્યાદા સાથે સંકળાયેલા નથી.", "ref": "Std 12 - વિજ્ઞાન પ્રવાહ: રસાયણવિજ્ઞાન - અધ્યાય ૩: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "ફૅરાડેના નિયમોનો ઉપયોગ કરીને, ૧૯૩ g મેગ્નેશિયમ (Mg) મુક્ત કરવા માટે કેટલા કુલ ચાર્જની જરૂર પડશે? (Mgનો પરમાણુ ભાર = ૨૪ g/mol, સંયોજકતા = ૨)", "opts": ["૧૯૩ × ૯૬૫૦૦ C", "૨ × ૯૬૫૦૦ C", "૧૯૩ × ૯૬ૅ૦૦ / ૧૨ C", "૧૯૩ × ૯૬ૅ૦૦ / ૨૪ C"], "ans": 2, "exp": "ફૅરાડેના નિયમ મુજબ, ૧ મોલ ઇલેક્ટ્રૉનનો ચાર્જ = ૯૬ૅ૦૦ C (ફૅરાડે સ્થિરાંક). Mgનો સંયોજકતા સમૂહ = પરમાણુ ભાર / સંયોજકતા = ૨૪ / ૨ = ૧૨ g/eq. ૧૯૩ g Mg = ૧૯૩ / ૧૨ eq. આથી, જરૂરી ચાર્જ = (૧૯૩ / ૧૨) × ૯૬ૅ૦૦ C. વિકલ્પ C આ જ સૂત્રને વ્યક્ત કરે છે.", "ref": "Std 12 - વિજ્ઞાન પ્રવાહ: રસાયણવિજ્ઞાન - અધ્યાય ૩: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ફૅરાડેના નિયમો વિશે *ખોટું* છે?", "opts": ["ફૅરાડેનો પ્રથમ નિયમ વિદ્યુતપ્રવાહ અને સમયના ગુણાકાર સાથે સંકળાયેલ છે.", "ફૅરાડેનો બીજો નિયમ સંયોજકતા સમૂહ પર આધાર રાખે છે.", "ફૅરાડેના નિયમો અર્ધકોષ (half-cell) પ્રક્રિયાઓ પર લાગુ થાય છે.", "ફૅરાડેના નિયમો રસાયણિક પ્રક્રિયાઓમાં ઉર્જાનો સંરક્ષણ સિદ્ધાંત ઉલ્લંઘે છે."], "ans": 3, "exp": "ફૅરાડેના નિયમો રસાયણિક પ્રક્રિયાઓમાં ઉર્જાનો સંરક્ષણ સિદ્ધાંત ઉલ્લંઘતા નથી, પરંતુ તેનો આધાર ઉર્જાના સંરક્ષણ પર જ છે. વિકલ્પ A, B, અને C સહી છે: પ્રથમ નિયમ I × t પર, બીજો નિયમ સંયોજકતા સમૂહ પર, અને નિયમો અર્ધકોષ પ્રક્રિયાઓ પર લાગુ થાય છે.", "ref": "Std 12 - વિજ્ઞાન પ્રવાહ: રસાયણવિજ્ઞાન - અધ્યાય ૩: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "જ્યારે કોપર સલ્ફેટના જલીય દ્રાવણનું વિદ્યુતવિભાજન કરવામાં આવે ત્યારે, કૅથોડ પર કોપરનું પ્રમાણ ૬૩.૫ g મુક્ત થાય છે. જો એક જ પ્રમાણમાં વિદ્યુતપ્રવાહ પસાર કરવામાં આવે તો એનોડ પર કેટલું ઓક્સિજન વાયુ મુક્ત થશે? (O = 16, Cu = 63.5)", "opts": ["8 g", "16 g", "4 g", "32 g"], "ans": 0, "exp": "ફૅરાડેના બીજા નિયમ અનુસાર, વિદ્યુતપ્રવાહ દ્વારા મુક્ત થતાં પદાર્થોના પ્રમાણ તેમના રાસાયણિક સમતોલન વજનના પ્રમાણમાં હોય છે. કોપર (Cu)નું સમતોલન વજન 63.5 g છે, જ્યારે ઓક્સિજન (O)નું સમતોલન વજન 8 g છે (O₂ માટે 32 g, પરંતુ ફૅરાડેના નિયમમાં ઓક્સિજનનું વજન 8 g લેવામાં આવે છે કારણ કે તે O²⁻ આયન રૂપે મુક્ત થાય છે). આથી, 63.5 g કોપર મુક્ત થાય ત્યારે 8 g ઓક્સિજન મુક્ત થશે. અહીં, કૅથોડ પર 63.5 g કોપર મુક્ત થાય છે, આથી એનોડ પર 8 g ઓક્સિજન મુક્ત થશે. બાકીના વિકલ્પો (16 g, 4 g, 32 g) ફૅરાડેના નિયમના ગણિતને અનુરૂપ નથી.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "ફૅરાડેના નિયમો અનુસાર, જ્યારે વિદ્યુતવિભાજન દરમિયાન વિદ્યુતપ્રવાહનું પ્રમાણ બદલાય છે ત્યારે નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["મુક્ત થતાં પદાર્થનું પ્રમાણ વિદ્યુતપ્રવાહના પ્રમાણના સમપ્રમાણમાં હોય છે", "મુક્ત થતાં પદાર્થનું પ્રમાણ વિદ્યુતપ્રવાહના પ્રમાણના વ્યસ્ત પ્રમાણમાં હોય છે", "મુક્ત થતાં પદાર્થનું પ્રમાણ વિદ્યુતપ્રવાહના પ્રમાણ પર આધાર રાખતું નથી", "મુક્ત થતાં પદાર્થનું પ્રમાણ વિદ્યુતપ્રવાહના વર્ગના સમપ્રમાણમાં હોય છે"], "ans": 0, "exp": "ફૅરાડેના પ્રથમ નિયમ અનુસાર, વિદ્યુતવિભાજન દરમિયાન કોઈ પણ ઇલેક્ટ્રોડ પર મુક્ત થતાં પદાર્થનું પ્રમાણ (m) વિદ્યુતપ્રવાહ (I) અને સમય (t)ના ગુણાકારના સમપ્રમાણમાં હોય છે, એટલે કે m ∝ I × t. આથી, વિદ્યુતપ્રવાહના પ્રમાણમાં ફેરફાર થાય ત્યારે મુક્ત થતાં પદાર્થનું પ્રમાણ પણ સમપ્રમાણમાં બદલાય છે. બાકીના વિકલ્પો (B, C, D) ફૅરાડેના પ્રથમ નિયમને વિપરિત છે.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "નીચેનામાંથી કયા કિસ્સામાં ફૅરાડેના નિયમો લાગુ પડતા નથી?", "opts": ["સોડિયમ ક્લોરાઇડના જલીય દ્રાવણનું વિદ્યુતવિભાજન", "કોપર સલ્ફેટના જલીય દ્રાવણનું વિદ્યુતવિભાજન", "સિલ્વર નાઇટ્રેટના જલીય દ્રાવણનું વિદ્યુતવિભાજન", "લેડ સ્ટોરેજ બૅટરીમાં થતું વિદ્યુતવિભાજન"], "ans": 3, "exp": "ફૅરાડેના નિયમો ફક્ત વિદ્યુતવિભાજન પ્રક્રિયાઓ પર લાગુ પડે છે જ્યાં ઇલેક્ટ્રોડ પર રાસાયણિક ફેરફાર થાય છે. લેડ સ્ટોરેજ બૅટરીમાં, વિદ્યુતવિભાજન દરમિયાન બૅટરી ચાર્જ થાય છે, પરંતુ આ પ્રક્રિયા ફૅરાડેના નિયમોના સિદ્ધાંતોને પૂરેપૂરા અનુરૂપ નથી કારણ કે તે એક જટિલ રાસાયણિક પ્રક્રિયા છે જ્યાં વિદ્યુતપ્રવાહ અને રાસાયણિક પ્રક્રિયાઓ વચ્ચેનો સંબંધ સરળ નથી. બાકીના વિકલ્પો (A, B, C)માં ફૅરાડેના નિયમો લાગુ પડે છે કારણ કે તેમાં સરળ વિદ્યુતવિભાજન પ્રક્રિયાઓ થાય છે.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "ફૅરાડેના નિયમો અનુસાર, જ્યારે ૯૬,૫૦૦ કુલોમ વિદ્યુતપ્રવાહ પસાર કરવામાં આવે ત્યારે કોપર (Cu) અને સિલ્વર (Ag)ના ઇલેક્ટ્રોડ પર મુક્ત થતાં પદાર્થોના પ્રમાણનો ગુણોત્તર કેટલો હશે? (Cu = 63.5, Ag = 108)", "opts": ["1:1", "1:2", "2:1", "108:63.5"], "ans": 3, "exp": "ફૅરાડેના બીજા નિયમ અનુસાર, વિદ્યુતપ્રવાહ દ્વારા મુક્ત થતાં પદાર્થોના પ્રમાણ તેમના રાસાયણિક સમતોલન વજનના પ્રમાણમાં હોય છે. કોપર (Cu)નું સમતોલન વજન 63.5 g છે, જ્યારે સિલ્વર (Ag)નું સમતોલન વજન 108 g છે. આથી, 96,500 કુલોમ વિદ્યુતપ્રવાહ પસાર કરવામાં આવે ત્યારે મુક્ત થતાં કોપર અને સિલ્વરના પ્રમાણનો ગુણોત્તર 63.5:108 એટલે કે 108:63.5 હશે. બાકીના વિકલ્પો (A, B, C) ફૅરાડેના નિયમના ગણિતને અનુરૂપ નથી.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ફૅરાડેના નિયમો વિશે *સાચું* નથી?", "opts": ["ફૅરાડેના પ્રથમ નિયમ અનુસાર, મુક્ત થતાં પદાર્થનું પ્રમાણ વિદ્યુતપ્રવાહ અને સમયના ગુણાકારના સમપ્રમાણમાં હોય છે", "ફૅરાડેના બીજા નિયમ અનુસાર, મુક્ત થતાં પદાર્થોના પ્રમાણ તેમના રાસાયણિક સમતોલન વજનના પ્રમાણમાં હોય છે", "ફૅરાડેના નિયમો ફક્ત ગૅસીય પદાર્થોના વિદ્યુતવિભાજન પર લાગુ પડે છે", "ફૅરાડેના નિયમો વિદ્યુતરસાયણિક કોષો અને વિદ્યુતવિભાજન કોષો બંનેમાં લાગુ પડે છે"], "ans": 2, "exp": "ફૅરાડેના નિયમો ફક્ત ગૅસીય પદાર્થોના વિદ્યુતવિભાજન પર લાગુ પડે છે એ વિધાન ખોટું છે. ફૅરાડેના નિયમો ઘન, દ્રવ અથવા ગૅસીય પદાર્થોના વિદ્યુતવિભાજન પર લાગુ પડે છે. બાકીના વિકલ્પો (A, B, D) ફૅરાડેના નિયમો વિશે સાચા છે.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "ફૅરાડેના નિયમો અનુસાર, જ્યારે સિલ્વર નાઇટ્રેટ (AgNO₃) અને કોપર સલ્ફેટ (CuSO₄)ના મિશ્ર દ્રાવણનું વિદ્યુતવિભાજન કરવામાં આવે, ત્યારે કૅથોડ પર મુક્ત થતાં ધાતુઓનું પ્રમાણ કયા આધારે નક્કી થશે?", "opts": ["ધાતુઓના પરમાણુ વજન અનુસાર", "ધાતુઓના સાંદ્રતા અને તેમના વિદ્યુતરાસાયણિક સમતોલન અનુસાર", "ધાતુઓના પરમાણુ ક્રમાંક અનુસાર", "ધાતુઓના ગલનબિંદુ અનુસાર"], "ans": 1, "exp": "ફૅરાડેના નિયમો મુજબ, મિશ્ર દ્રાવણમાં કૅથોડ પર મુક્ત થતી ધાતુનું પ્રમાણ તેની સાંદ્રતા અને વિદ્યુતરાસાયણિક સમતોલન (electrode potential) પર આધાર રાખે છે. સિલ્વર (Ag)નું વિદ્યુતરાસાયણિક સમતોલન કોપર (Cu) કરતાં વધુ હોવાથી, Ag પ્રથમ મુક્ત થશે. A, C, અને D વિકલ્પો અહીં લાગુ પડતા નથી કારણ કે તે ધાતુઓના ભૌતિક ગુણધર્મો (પરમાણુ વજન, ક્રમાંક, ગલનબિંદુ) પર આધારિત નથી.", "ref": "Std 12 - Chapter 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "ફૅરાડેના બીજા નિયમ અનુસાર, જ્યારે એક જ વિદ્યુતપ્રવાહને બે ભિન્ન ઇલેક્ટ્રોલાઇટ્સમાં પસાર કરવામાં આવે, ત્યારે મુક્ત થતાં પદાર્થોના વજનનું ગુણોત્તર કયા પર આધાર રાખે છે?", "opts": ["ઇલેક્ટ્રોલાઇટ્સના સાંદ્રતા પર", "ઇલેક્ટ્રોલાઇટ્સના તાપમાન પર", "ઇલેક્ટ્રોલાઇટ્સના રાસાયણિક સમતોલન (equivalent weight) પર", "ઇલેક્ટ્રોલાઇટ્સના દ્રાવણના pH પર"], "ans": 2, "exp": "ફૅરાડેના બીજા નિયમ મુજબ, મુક્ત થતાં પદાર્થોના વજનનું ગુણોત્તર તેમના રાસાયણિક સમતોલન (equivalent weight) પર આધાર રાખે છે. રાસાયણિક સમતોલન = પરમાણુ વજન / વેલેન્સી. A, B, અને D વિકલ્પો અહીં લાગુ પડતા નથી કારણ કે તે ભૌતિક પરિબળો (સાંદ્રતા, તાપમાન, pH) પર આધારિત છે, જ્યારે નિયમ રાસાયણિક ગુણધર્મ પર આધારિત છે.", "ref": "Std 12 - Chapter 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "ફૅરાડેના નિયમોના અપવાદ તરીકે કયો કિસ્સો ગણી શકાય જ્યારે ઇલેક્ટ્રોડ પર મુક્ત થતાં પદાર્થનું વજન વિદ્યુતપ્રવાહના પ્રમાણ સાથે સીધું અનુપાતમાં ન હોય?", "opts": ["જ્યારે ઇલેક્ટ્રોલાઇટમાં હાઇડ્રોજન આયન (H⁺) અને ઓક્સિજન આયન (O²⁻) બંને હાજર હોય", "જ્યારે ઇલેક્ટ્રોડ પર ગૅસ મુક્ત થાય અને તે પાણીમાં અદ્રાવ્ય હોય", "જ્યારે ઇલેક્ટ્રોલાઇટમાં ધાતુના આયનની સાંદ્રતા ખૂબ ઓછી હોય", "જ્યારે વિદ્યુતવિભાજન દરમિયાન ઇલેક્ટ્રોડ પર દ્વિતીય પ્રક્રિયા (secondary reaction) થાય"], "ans": 3, "exp": "ફૅરાડેના નિયમોના અપવાદ તરીકે જ્યારે ઇલેક્ટ્રોડ પર દ્વિતીય પ્રક્રિયા (જેવી કે મુક્ત થયેલ પદાર્થની ઇલેક્ટ્રોડ સાથે પ્રક્રિયા) થાય ત્યારે મુક્ત થતાં પદાર્થનું વજન વિદ્યુતપ્રવાહના પ્રમાણ સાથે સીધું અનુપાતમાં નથી. ઉદાહરણ તરીકે, કોપર સલ્ફેટના વિદ્યુતવિભાજન દરમિયાન કૅથોડ પર કોપર મુક્ત થાય, પરંતુ જ્યારે એનોડ પર ઓક્સિજન મુક્ત થાય ત્યારે પાણી સાથે પ્રક્રિયા થઈ શકે છે. A, B, અને C વિકલ્પો અહીં લાગુ પડતા નથી કારણ કે તે પ્રાથમિક પ્રક્રિયા પર આધારિત છે.", "ref": "Std 12 - Chapter 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "ફૅરાડેના પ્રથમ નિયમ અનુસાર, વિદ્યુતવિભાજન દરમિયાન મુક્ત થતાં પદાર્થનું વજન (w) = Z * I * t, જ્યાં Z એ રાસાયણિક સમતોલન છે. જો કોઈ ઇલેક્ટ્રોલાઇટનું રાસાયણિક સમતોલન 30 g/equiv હોય અને 5 A વિદ્યુતપ્રવાહ 10 મિનિટ સુધી પસાર કરવામાં આવે, તો મુક્ત થતાં પદાર્થનું વજન કેટલું થશે?", "opts": ["9 g", "10 g", "90 g", "30 g"], "ans": 0, "exp": "ફૅરાડેના પ્રથમ નિયમ મુજબ, w = Z * I * t. અહીં, Z = 30 g/equiv, I = 5 A, t = 10 * 60 = 600 s. પરંતુ Z ને ગ્રામ-સમતોલન (g/equiv) તરીકે લેવામાં આવે છે, અને ફૅરાડેનો અચળાંક (F) = 96500 C/equiv હોવાથી, w = (Z * I * t) / F. આથી, w = (30 * 5 * 600) / 96500 ≈ 9 g. B, C, અને D વિકલ્પો ખોટા છે કારણ કે તે ફૅરાડેના અચળાંકને ધ્યાનમાં લેતા નથી.", "ref": "Std 12 - Chapter 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "ફૅરાડેના નિયમો અનુસાર, જ્યારે સોડિયમ ક્લોરાઇડ (NaCl)ના ગલિત દ્રાવણનું વિદ્યુતવિભાજન કરવામાં આવે, ત્યારે એનોડ પર કયો પદાર્થ મુક્ત થશે?", "opts": ["સોડિયમ (Na)", "ક્લોરિન (Cl₂)", "હાઇડ્રોજન (H₂)", "ઓક્સિજન (O₂)"], "ans": 1, "exp": "સોડિયમ ક્લોરાઇડ (NaCl)ના ગલિત દ્રાવણમાં, Na⁺ અને Cl⁻ આયન હાજર હોય છે. એનોડ પર ઓક્સિડેશન થાય છે, જ્યાં Cl⁻ આયન ઇલેક્ટ્રોન ગુમાવીને Cl₂ ગૅસ મુક્ત થાય છે. A વિકલ્પ ખોટો છે કારણ કે Na⁺ કૅથોડ પર મુક્ત થાય છે. C અને D વિકલ્પો ખોટા છે કારણ કે H₂ અને O₂ NaClના ગલિત દ્રાવણમાં હાજર નથી.", "ref": "Std 12 - Chapter 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "જ્યારે સિલ્વર નાઇટ્રેટ (AgNO₃) અને કોપર સલ્ફેટ (CuSO₄)ના મિશ્ર દ્રાવણનું વિદ્યુતવિભાજન કરવામાં આવે ત્યારે, કૅથોડ પર પ્રથમ કયો ધાતુ મુક્ત થશે?", "opts": ["કોપર (Cu)", "સિલ્વર (Ag)", "હાઇડ્રોજન (H₂)", "નાઇટ્રોજન (N₂)"], "ans": 1, "exp": "વિદ્યુતવિભાજન દરમિયાન, કૅથોડ પર ધાતુઓનું મુક્ત થવું તેમના સ્ટાન્ડર્ડ ઇલેક્ટ્રોડ પોટેન્શિયલ (E°) પર આધાર રાખે છે. સિલ્વર (Ag)નું E° = +0.80 V અને કોપર (Cu)નું E° = +0.34 V છે. જ્યારે બંને ધાતુઓના આયન દ્રાવણમાં હાજર હોય ત્યારે, વધુ ધન પોટેન્શિયલ ધરાવતી ધાતુ પ્રથમ મુક્ત થશે. આથી, સિલ્વર (Ag) પ્રથમ મુક્ત થશે. હાઇડ્રોજન (C) અને નાઇટ્રોજન (D) એ ધાતુઓ નથી, અને તેમનું મુક્ત થવું અહીં લાગુ પડતું નથી.", "ref": "Std 12 - Chapter 3: વિદ્યુતરસાયણ (Electrochemistry)", "ch": ""}, {"q": "એક વિદ્યાર્થીએ બે ભિન્ન ઇલેક્ટ્રોલાઇટ્સ ધરાવતા કોષોને શ્રેણીમાં જોડીને સમાન વિદ્યુતપ્રવાહ પસાર કર્યો. પ્રથમ કોષમાં સિલ્વર નાઇટ્રેટ (AgNO₃) અને બીજા કોષમાં કોપર સલ્ફેટ (CuSO₄)નું જલીય દ્રાવણ હતું. જો પ્રથમ કોષમાં ૨.૧૬ g સિલ્વર મુક્ત થયું હોય, તો બીજા કોષમાં કેટલું કોપર મુક્ત થશે? (Agનો પરમાણ્વીય દળ = ૧૦૮, Cuનો પરમાણ્વીય દળ = ૬૩.૫)", "opts": ["૦.૩૧૭૫ g", "૦.૬૩૫ g", "૧.૨૭ g", "૨.૫૪ g"], "ans": 1, "exp": "ફૅરાડેના બીજા નિયમ અનુસાર, સમાન વિદ્યુતપ્રવાહ પસાર કરતાં મુક્ત થતાં પદાર્થોના વજન તેમના તુલ્યભારના પ્રમાણમાં હોય છે. સિલ્વરનો તુલ્યભાર = ૧૦૮/૧ = ૧૦૮, કોપરનો તુલ્યભાર = ૬૩.૫/૨ = ૩૧.૭૫. તેથી, મુક્ત થતાં કોપરનું વજન = (૨.૧૬ × ૩૧.૭૫) / ૧૦૮ = ૦.૬૩૫ g. વિકલ્પ A ખોટો છે કારણ કે તેમાં તુલ્યભારનો ગુણોત્તર ખોટો લેવાયો છે. વિકલ્પ C અને D ખોટા છે કારણ કે તેમાં ગણતરીના પરિણામો અયોગ્ય છે.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન ફૅરાડેના નિયમોના સંદર્ભમાં *અપવાદરૂપ* ગણી શકાય નહીં?", "opts": ["જ્યારે ઇલેક્ટ્રોલાઇટમાં બિન-આયનીય અશુદ્ધિઓ હોય ત્યારે", "જ્યારે વિદ્યુતવિભાજન દરમિયાન ઇલેક્ટ્રોડ પર વાયુ મુક્ત થાય ત્યારે", "જ્યારે વિદ્યુતવિભાજન દરમિયાન ઇલેક્ટ્રોડ પર ગૌણ પ્રક્રિયાઓ થાય ત્યારે", "જ્યારે ઇલેક્ટ્રોલાઇટનું દ્રાવણ ખૂબ જ મંદ હોય ત્યારે"], "ans": 1, "exp": "ફૅરાડેના નિયમોના અપવાદોમાં ગૌણ પ્રક્રિયાઓ, વાયુ મુક્તિ અને મંદ દ્રાવણનો સમાવેશ થાય છે, પરંતુ બિન-આયનીય અશુદ્ધિઓ ફૅરાડેના નિયમોને અસર કરતી નથી કારણ કે તે વિદ્યુતપ્રવાહના માર્ગમાં અવરોધ ઉભો કરતી નથી. વિકલ્પ A ખોટો છે કારણ કે તે અપવાદ નથી. વિકલ્પ C અને D ખોટા છે કારણ કે તે અપવાદરૂપ પરિસ્થિતિઓ છે.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણ", "ch": ""}, {"q": "એક વિદ્યુતરાસાયણિક કોષમાં, જો ૨ ફૅરાડે વિદ્યુતપ્રવાહ પસાર કરતાં ૬૩.૫ g કોપર મુક્ત થાય, તો નીચેનામાંથી કયું વિધાન *સાચું* છે? (Cuનો પરમાણ્વીય દળ = ૬૩.૫)", "opts": ["કોપરનો ઑક્સિડેશન આંક +૧ છે", "કોપરનો તુલ્યભાર ૩૧.૭૫ છે", "કોષમાં કોપર સલ્ફેટનું દ્રાવણ નથી", "કોપરનો ઑક્સિડેશન આંક +૩ છે"], "ans": 1, "exp": "ફૅરાડેના નિયમો અનુસાર, ૧ ફૅરાડે વિદ્યુતપ્રવાહથી ૧ તુલ્યભાર પદાર્થ મુક્ત થાય છે. અહીં ૨ ફૅરાડેથી ૬૩.૫ g કોપર મુક્ત થાય છે, તેથી કોપરનો તુલ્યભાર = ૬૩.૫/૨ = ૩૧.૭૫. કોપરનો ઑક્સિડેશન આંક +૨ છે, તેથી વિકલ્પ A અને D ખોટા છે. વિકલ્પ C ખોટો છે કારણ કે કોષમાં કોપર સલ્ફેટનું દ્રાવણ હોવું જોઈએ.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણ", "ch": ""}, {"q": "એક વિદ્યાર્થીએ બે ભિન્ન ઇલેક્ટ્રોલાઇટ્સ ધરાવતા કોષોને સમાંતરમાં જોડીને વિદ્યુતપ્રવાહ પસાર કર્યો. પ્રથમ કોષમાં સિલ્વર નાઇટ્રેટ (AgNO₃) અને બીજા કોષમાં ઝિંક સલ્ફેટ (ZnSO₄)નું દ્રાવણ હતું. જો કુલ વિદ્યુતપ્રવાહ ૨ A હોય અને પ્રથમ કોષમાં ૧.૦૮ g સિલ્વર મુક્ત થયું હોય, તો બીજા કોષમાં કેટલું ઝિંક મુક્ત થશે? (Agનો પરમાણ્વીય દળ = ૧૦૮, Znનો પરમાણ્વીય દળ = ૬૫.૪, સમય = ૧૦૦૦ સેકન્ડ)", "opts": ["૦.૩૨૭ g", "૦.૬૫૪ g", "૧.૩૦૮ g", "૨.૬૧૬ g"], "ans": 0, "exp": "સમાંતર જોડાણમાં કુલ વિદ્યુતપ્રવાહ બંને કોષોમાં વહેંચાય છે. પ્રથમ કોષમાં મુક્ત થયેલ સિલ્વરનું વજન = ૧.૦૮ g, જે માટે જરૂરી વિદ્યુતપ્રવાહ = (૧.૦૮ × ૯૬૫૦૦) / (૧૦૮ × ૧૦૦૦) = ૦.૯૬૫ A. તેથી બીજા કોષમાં વિદ્યુતપ્રવાહ = ૨ - ૦.૯૬૫ = ૧.૦૩૫ A. ઝિંકનું વજન = (૧.૦૩૫ × ૧૦૦૦ × ૬૫.૪) / (૨ × ૯૬૫૦૦) = ૦.૩૨૭ g. વિકલ્પ B, C અને D ખોટા છે કારણ કે તેમાં ગણતરીના પરિણામો અયોગ્ય છે.", "ref": "Std 12 - પ્રકરણ 3: વિદ્યુતરસાયણ", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
