<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>કોલ્બે વિક્રિયા</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>કોલ્બે વિક્રિયા</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">કોલ્બે વિક્રિયા</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 17 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 17 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "કોલ્બે વિક્રિયામાં ઇથેનોલનું કાર્બોક્સિલીકરણ કરવા માટે નીચેનામાંથી કયું સંયોજન જરૂરી છે?", "opts": ["સોડિયમ હાઇડ્રોક્સાઇડ (NaOH)", "કાર્બન ડાયોક્સાઇડ (CO₂) અને પોટેશિયમ (K)", "સોડિયમ એસિટેટ (CH₃COONa) અને પાણી (H₂O)", "કેલ્શિયમ કાર્બોનેટ (CaCO₃) અને ઉષ્મા"], "ans": 1, "exp": "કોલ્બે વિક્રિયામાં ઇથેનોલનું કાર્બોક્સિલીકરણ કરવા માટે કાર્બન ડાયોક્સાઇડ (CO₂) અને પોટેશિયમ (K) જરૂરી છે. આ પ્રક્રિયામાં ઇથેનોલને પોટેશિયમ ધાતુ સાથે પ્રક્રિયા કરાવી CO₂ ઉમેરવામાં આવે છે, જેના પરિણામે પોટેશિયમ પ્રોપિયોનેટ બને છે. વિકલ્પ A ખોટો છે કારણ કે NaOH આ પ્રક્રિયામાં સીધો ભાગ લેતો નથી. વિકલ્પ C ખોટો છે કારણ કે સોડિયમ એસિટેટ અને પાણી આ પ્રક્રિયામાં મુખ્ય ઘટકો નથી. વિકલ્પ D ખોટો છે કારણ કે કેલ્શિયમ કાર્બોનેટ અને ઉષ્મા આ પ્રક્રિયામાં ઉપયોગી નથી.", "ref": "Std 12 - પ્રકરણ 12: કાર્બનિક રસાયણવિજ્ઞાનમાં મહત્વની પ્રક્રિયાઓ", "ch": ""}, {"q": "કોલ્બે વિક્રિયામાં ઇથેનોલનું કાર્બોક્સિલીકરણ થઈને કયું ઉત્પાદન મળે છે?", "opts": ["ઇથેનોઇક એસિડ (CH₃COOH)", "પ્રોપેનોઇક એસિડ (C₂H₅COOH)", "મિથેનોઇક એસિડ (HCOOH)", "બ્યુટેનોઇક એસિડ (C₃H₇COOH)"], "ans": 1, "exp": "કોલ્બે વિક્રિયામાં ઇથેનોલનું કાર્બોક્સિલીકરણ થઈને પ્રોપેનોઇક એસિડ (C₂H₅COOH) મળે છે. આ પ્રક્રિયામાં ઇથેનોલના કાર્બન શૃંખલામાં એક કાર્બન ઉમેરાઈને પ્રોપેનોઇક એસિડ બને છે. વિકલ્પ A ખોટો છે કારણ કે ઇથેનોઇક એસિડ ઇથેનોલના ઓક્સિડેશનથી બને છે. વિકલ્પ C અને D ખોટા છે કારણ કે આ એસિડ અન્ય પ્રક્રિયાઓથી મળે છે.", "ref": "Std 12 - પ્રકરણ 12: કાર્બનિક રસાયણવિજ્ઞાનમાં મહત્વની પ્રક્રિયાઓ", "ch": ""}, {"q": "કોલ્બે વિક્રિયામાં પોટેશિયમ ધાતુનો ઉપયોગ શા માટે થાય છે?", "opts": ["પોટેશિયમ ઇથેનોલ સાથે પ્રક્રિયા કરીને આલ્કોહોલેટ આયન બનાવે છે, જે કાર્બોક્સિલીકરણ માટે જરૂરી છે", "પોટેશિયમ ઉષ્મા ઉત્પન્ન કરી પ્રક્રિયાને વેગ આપે છે", "પોટેશિયમ કાર્બન ડાયોક્સાઇડ સાથે પ્રક્રિયા કરીને કાર્બોનેટ બનાવે છે", "પોટેશિયમ પ્રક્રિયામાં ઉદ્દીપક તરીકે કામ કરે છે"], "ans": 0, "exp": "કોલ્બે વિક્રિયામાં પોટેશિયમ ધાતુનો ઉપયોગ ઇથેનોલ સાથે પ્રક્રિયા કરીને પોટેશિયમ આલ્કોહોલેટ (C₂H₅OK) બનાવવા માટે થાય છે. આ આલ્કોહોલેટ આયન કાર્બન ડાયોક્સાઇડ સાથે પ્રક્રિયા કરીને કાર્બોક્સિલીકરણ માટે જરૂરી મધ્યવર્તી સંયોજન બનાવે છે. વિકલ્પ B ખોટો છે કારણ કે પોટેશિયમ ઉષ્મા ઉત્પન્ન કરતું નથી. વિકલ્પ C ખોટો છે કારણ કે પોટેશિયમ કાર્બન ડાયોક્સાઇડ સાથે સીધી પ્રક્રિયા કરતું નથી. વિકલ્પ D ખોટો છે કારણ કે પોટેશિયમ ઉદ્દીપક તરીકે કામ કરતું નથી.", "ref": "Std 12 - પ્રકરણ 12: કાર્બનિક રસાયણવિજ્ઞાનમાં મહત્વની પ્રક્રિયાઓ", "ch": ""}, {"q": "કોલ્બે વિક્રિયામાં કાર્બન ડાયોક્સાઇડનું કાર્ય શું છે?", "opts": ["ઇથેનોલનું ઓક્સિડેશન કરવું", "ઇથેનોલના કાર્બન શૃંખલામાં કાર્બોક્સિલ સમૂહ ઉમેરવું", "પ્રક્રિયામાં ઉદ્દીપક તરીકે કામ કરવું", "પ્રક્રિયામાં ઉષ્મા ઉત્પન્ન કરવી"], "ans": 1, "exp": "કોલ્બે વિક્રિયામાં કાર્બન ડાયોક્સાઇડનું કાર્ય ઇથેનોલના કાર્બન શૃંખલામાં કાર્બોક્સિલ સમૂહ (-COOH) ઉમેરવાનું છે. આ પ્રક્રિયામાં CO₂ પોટેશિયમ આલ્કોહોલેટ સાથે પ્રક્રિયા કરીને કાર્બોક્સિલેટ આયન બનાવે છે, જે પછી પ્રોપેનોઇક એસિડમાં રૂપાંતરિત થાય છે. વિકલ્પ A ખોટો છે કારણ કે CO₂ ઓક્સિડેશન કરતું નથી. વિકલ્પ C અને D ખોટા છે કારણ કે CO₂ ઉદ્દીપક તરીકે કે ઉષ્મા ઉત્પન્ન કરતું નથી.", "ref": "Std 12 - પ્રકરણ 12: કાર્બનિક રસાયણવિજ્ઞાનમાં મહત્વની પ્રક્રિયાઓ", "ch": ""}, {"q": "કોલ્બે વિક્રિયામાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["આ પ્રક્રિયામાં ઇથેનોલનું કાર્બોક્સિલીકરણ થાય છે", "પ્રક્રિયામાં પોટેશિયમ ધાતુનો ઉપયોગ થાય છે", "આ પ્રક્રિયામાં મિથેનોલનું કાર્બોક્સિલીકરણ થઈને ઇથેનોઇક એસિડ બને છે", "પ્રક્રિયામાં કાર્બન ડાયોક્સાઇડ જરૂરી છે"], "ans": 2, "exp": "વિકલ્પ C ખોટું છે કારણ કે કોલ્બે વિક્રિયામાં મિથેનોલનું કાર્બોક્સિલીકરણ થતું નથી, પરંતુ ઇથેનોલનું કાર્બોક્સિલીકરણ થઈને પ્રોપેનોઇક એસિડ બને છે. વિકલ્પ A, B અને D સાચાં છે કારણ કે આ પ્રક્રિયામાં ઇથેનોલનું કાર્બોક્સિલીકરણ થાય છે, પોટેશિયમ ધાતુનો ઉપયોગ થાય છે અને કાર્બન ડાયોક્સાઇડ જરૂરી છે.", "ref": "Std 12 - પ્રકરણ 12: કાર્બનિક રસાયણવિજ્ઞાનમાં મહત્વની પ્રક્રિયાઓ", "ch": ""}, {"q": "કોલ્બે વિક્રિયામાં ફિનોલના સોડિયમ લવણ સાથે CO₂ની પ્રક્રિયા કરતાં મળતું મુખ્ય ઉત્પાદન કયું છે?", "opts": ["સેલિસિલિક એસિડ", "બેન્ઝોઇક એસિડ", "ફિનોલિક એસિડ", "એસિટિક એસિડ"], "ans": 0, "exp": "કોલ્બે વિક્રિયામાં ફિનોલના સોડિયમ લવણ (C₆H₅ONa) સાથે CO₂ની પ્રક્રિયા કરતાં સેલિસિલિક એસિડ (o-HOC₆H₄COOH) મળે છે. બેન્ઝોઇક એસિડ ફિનોલના પોટેશિયમ લવણ સાથે CO₂ની પ્રક્રિયાથી મળતું નથી, ફિનોલિક એસિડ એ અસ્તિત્વમાં નથી, અને એસિટિક એસિડ એ અલગ પ્રક્રિયાનું ઉત્પાદન છે.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રકરણ ૧૧ - આલ્કોહોલ, ફિનોલ અને ઇથર", "ch": ""}, {"q": "કોલ્બે વિક્રિયામાં નીચેનામાંથી કયું સંયોજન પ્રક્રિયામાં ભાગ લેતું નથી?", "opts": ["ઇથેનોલ", "પોટેશિયમ હાઇડ્રોક્સાઇડ", "કાર્બન મોનોક્સાઇડ", "કાર્બન ડાયોક્સાઇડ"], "ans": 2, "exp": "કોલ્બે વિક્રિયામાં ઇથેનોલ, પોટેશિયમ હાઇડ્રોક્સાઇડ (KOH) અને કાર્બન ડાયોક્સાઇડ (CO₂) વપરાય છે. કાર્બન મોનોક્સાઇડ (CO) આ પ્રક્રિયામાં વપરાતું નથી, તે અન્ય પ્રક્રિયાઓ જેવી કે ફિશર-ટ્રોપ્શ પ્રક્રિયામાં વપરાય છે.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રકરણ ૧૧ - આલ્કોહોલ, ફિનોલ અને ઇથર", "ch": ""}, {"q": "કોલ્બે વિક્રિયામાં ઇથેનોલના પોટેશિયમ લવણ સાથે CO₂ની પ્રક્રિયા કરતાં મળતું ઉત્પાદન કયું છે, જ્યારે પ્રક્રિયા ઉચ્ચ તાપમાને કરવામાં આવે છે?", "opts": ["એસિટિક એસિડ", "પ્રોપેનોઇક એસિડ", "ઓક્ઝેલિક એસિડ", "ફોર્મિક એસિડ"], "ans": 1, "exp": "કોલ્બે વિક્રિયામાં ઇથેનોલના પોટેશિયમ લવણ સાથે CO₂ની પ્રક્રિયા ઉચ્ચ તાપમાને કરતાં પ્રોપેનોઇક એસિડ (CH₃CH₂COOH) મળે છે. એસિટિક એસિડ નીચા તાપમાને મળે છે, ઓક્ઝેલિક એસિડ અને ફોર્મિક એસિડ આ પ્રક્રિયાના ઉત્પાદન નથી.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રકરણ ૧૧ - આલ્કોહોલ, ફિનોલ અને ઇથર", "ch": ""}, {"q": "કોલ્બે વિક્રિયામાં નીચેનામાંથી કયું વિધાન સત્ય નથી?", "opts": ["આ પ્રક્રિયામાં કાર્બોક્સિલીકરણ થાય છે.", "આ પ્રક્રિયામાં પોટેશિયમ ધાતુનો ઉપયોગ થાય છે.", "આ પ્રક્રિયામાં ફક્ત અલ્કોહોલ જ વપરાય છે.", "આ પ્રક્રિયામાં CO₂નો ઉપયોગ થાય છે."], "ans": 2, "exp": "કોલ્બે વિક્રિયામાં કાર્બોક્સિલીકરણ થાય છે, પોટેશિયમ ધાતુનો ઉપયોગ થાય છે, અને CO₂નો ઉપયોગ થાય છે. પરંતુ આ પ્રક્રિયામાં ફિનોલ અને અલ્કોહોલ બંને વપરાય છે, ફક્ત અલ્કોહોલ જ નહીં.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રકરણ ૧૧ - આલ્કોહોલ, ફિનોલ અને ઇથર", "ch": ""}, {"q": "કોલ્બે વિક્રિયામાં ઇથેનોલના પોટેશિયમ લવણ સાથે કાર્બન ડાયોક્સાઇડની પ્રક્રિયા કરતાં મળતા મુખ્ય ઉત્પાદન પ્રોપેનોઇક એસિડના સંશ્લેષણ માટે નીચેનામાંથી કયું વિધાન અયોગ્ય છે?", "opts": ["આ પ્રક્રિયામાં કાર્બોક્સિલ સમૂહ ઉમેરાવાથી કાર્બન શૃંખલા લંબાઇમાં વધારો થાય છે", "પ્રક્રિયામાં પોટેશિયમ ઇથોક્સાઇડ મધ્યવર્તી સંયોજન તરીકે બને છે જે પછી કાર્બોક્સિલેશન પામે છે", "આ પ્રક્રિયા ઉચ્ચ તાપમાન અને દબાણ હેઠળ થાય છે, જે કાર્બન ડાયોક્સાઇડના સીધા જોડાણને સરળ બનાવે છે", "પ્રોપેનોઇક એસિડનું નિર્માણ થાય છે કારણ કે કાર્બોક્સિલ સમૂહ ઇથેનોલના બીટા કાર્બન સાથે જોડાય છે"], "ans": 3, "exp": "સાચો જવાબ વિકલ્પ D છે. કોલ્બે વિક્રિયામાં કાર્બોક્સિલ સમૂહ ઇથેનોલના આલ્ફા કાર્બન સાથે જોડાય છે, નહીં કે બીટા કાર્બન સાથે, જેના કારણે પ્રોપેનોઇક એસિડ બને છે. વિકલ્પ A ખોટો નથી કારણ કે કાર્બોક્સિલેશનથી કાર્બન શૃંખલા લંબાઇમાં વધારો થાય છે. વિકલ્પ B પણ સાચો છે કારણ કે પોટેશિયમ ઇથોક્સાઇડ મધ્યવર્તી સંયોજન તરીકે બને છે. વિકલ્પ C ખોટો છે કારણ કે કોલ્બે વિક્રિયા સામાન્ય રીતે સામાન્ય તાપમાન અને દબાણ હેઠળ થાય છે, ઉચ્ચ તાપમાન કે દબાણની જરૂર હોતી નથી.", "ref": "Std 12 - પ્રકરણ 12: કાર્બનિક રસાયણવિજ્ઞાનના મૂળભૂત સિદ્ધાંતો અને તકનિકો", "ch": ""}, {"q": "કોલ્બે વિક્રિયામાં ફિનોલના સોડિયમ લવણ સાથે CO2ની પ્રક્રિયા કરતાં મળતું ઉત્પાદન કયું છે, જ્યારે પ્રક્રિયા ઉચ્ચ તાપમાને (125°C) અને ઉચ્ચ દબાણે કરવામાં આવે છે?", "opts": ["સેલિસિલિક એસિડ", "બેન્ઝોઇક એસિડ", "પેરા-હાઇડ્રોક્સીબેન્ઝોઇક એસિડ", "ઓર્થો-હાઇડ્રોક્સીબેન્ઝોઇક એસિડ"], "ans": 0, "exp": "કોલ્બે વિક્રિયામાં ફિનોલના સોડિયમ લવણ સાથે CO2ની પ્રક્રિયા કરતાં મુખ્ય ઉત્પાદન સેલિસિલિક એસિડ મળે છે. ઉચ્ચ તાપમાન અને દબાણ હેઠળ, CO2 ફિનોલના ઓર્થો સ્થાને કાર્બોક્સિલેશન કરે છે, જેથી સેલિસિલિક એસિડ બને છે. બેન્ઝોઇક એસિડ (B) ફિનોલના પેરા સ્થાને કાર્બોક્સિલેશનથી બનતું નથી. પેરા-હાઇડ્રોક્સીબેન્ઝોઇક એસિડ (C) અને ઓર્થો-હાઇડ્રોક્સીબેન્ઝોઇક એસિડ (D) એ સેલિસિલિક એસિડના અન્ય નામ નથી, પરંતુ સેલિસિલિક એસિડ જ ઓર્થો-હાઇડ્રોક્સીબેન્ઝોઇક એસિડ છે, પરંતુ પ્રશ્નમાં મુખ્ય ઉત્પાદન તરીકે સેલિસિલિક એસિડ જ શ્રેષ્ઠ વિકલ્પ છે.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રકરણ 11 - આલ્કોહોલ, ફિનોલ અને ઇથર", "ch": ""}, {"q": "કોલ્બે વિક્રિયામાં નીચેનામાંથી કયું વિધાન સત્ય છે?", "opts": ["કોલ્બે વિક્રિયામાં ફક્ત પ્રાથમિક આલ્કોહોલ જ પ્રક્રિયા આપે છે.", "કોલ્બે વિક્રિયામાં ફિનોલ અને પ્રાથમિક આલ્કોહોલ બંને પ્રક્રિયા આપે છે.", "કોલ્બે વિક્રિયામાં દ્વિતીયક આલ્કોહોલ પ્રક્રિયા આપે છે.", "કોલ્બે વિક્રિયામાં તૃતીયક આલ્કોહોલ પ્રક્રિયા આપે છે."], "ans": 1, "exp": "કોલ્બે વિક્રિયામાં ફિનોલ અને પ્રાથમિક આલ્કોહોલ બંને પ્રક્રિયા આપે છે. ફિનોલના સોડિયમ લવણ સાથે CO2ની પ્રક્રિયાથી સેલિસિલિક એસિડ મળે છે, જ્યારે પ્રાથમિક આલ્કોહોલના પોટેશિયમ લવણ સાથે CO2ની પ્રક્રિયાથી કાર્બોક્સિલિક એસિડ મળે છે. દ્વિતીયક (C) અને તૃતીયક (D) આલ્કોહોલ કોલ્બે વિક્રિયામાં પ્રક્રિયા આપતા નથી. વિકલ્પ A ખોટો છે કારણ કે ફિનોલ પણ પ્રક્રિયા આપે છે.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રકરણ 11 - આલ્કોહોલ, ફિનોલ અને ઇથર", "ch": ""}, {"q": "કોલ્બે વિક્રિયામાં ઇથેનોલના પોટેશિયમ લવણ સાથે CO2ની પ્રક્રિયા કરતાં મળતું ઉત્પાદન કયું છે, જ્યારે પ્રક્રિયા નીચા તાપમાને કરવામાં આવે છે?", "opts": ["એસિટિક એસિડ", "પ્રોપિયોનિક એસિડ", "ફોર્મિક એસિડ", "ઓક્ઝેલિક એસિડ"], "ans": 0, "exp": "કોલ્બે વિક્રિયામાં ઇથેનોલના પોટેશિયમ લવણ સાથે CO2ની પ્રક્રિયા કરતાં એસિટિક એસિડ મળે છે. પ્રોપિયોનિક એસિડ (B) ઇથેનોલથી બનતું નથી, ફોર્મિક એસિડ (C) મિથેનોલથી બનતું હોય છે, અને ઓક્ઝેલિક એસિડ (D) બે કાર્બોક્સિલિક એસિડના સંયોજનથી બનતું હોય છે. નીચા તાપમાને પણ એસિટિક એસિડ જ મળે છે.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રકરણ 11 - આલ્કોહોલ, ફિનોલ અને ઇથર", "ch": ""}, {"q": "કોલ્બે વિક્રિયામાં ફિનોલના સોડિયમ લવણ સાથે કાર્બન ડાયોક્સાઇડની પ્રક્રિયા કરતાં મળતું મુખ્ય ઉત્પાદન સાલિસિલિક એસિડ છે. આ પ્રક્રિયામાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["આ પ્રક્રિયા 120-140 °C તાપમાને થાય છે.", "પ્રક્રિયા દરમિયાન ફિનોલનું કાર્બોક્સિલીકરણ ઓર્થો સ્થાને થાય છે.", "આ પ્રક્રિયામાં મધ્યવર્તી તરીકે સોડિયમ ફિનાઇલ કાર્બોનેટ રચાય છે.", "આ પ્રક્રિયામાં ઉત્પન્ન થતું સાલિસિલિક એસિડ પેરા સ્થાને કાર્બોક્સિલ સમૂહ ધરાવે છે."], "ans": 3, "exp": "કોલ્બે વિક્રિયામાં ફિનોલના સોડિયમ લવણ સાથે કાર્બન ડાયોક્સાઇડની પ્રક્રિયા કરતાં સાલિસિલિક એસિડ મળે છે, જેમાં કાર્બોક્સિલ સમૂહ ઓર્થો સ્થાને (2-સ્થાને) જોડાય છે, નહીં કે પેરા સ્થાને. તેથી વિકલ્પ D ખોટું છે. વિકલ્પ A સાચું છે કારણ કે આ પ્રક્રિયા સામાન્ય રીતે 120-140 °C તાપમાને થાય છે. વિકલ્પ B સાચું છે કારણ કે કાર્બોક્સિલીકરણ ઓર્થો સ્થાને થાય છે. વિકલ્પ C સાચું છે કારણ કે મધ્યવર્તી તરીકે  કે ફિનોલના સોડિયમ લવણ સાથે પ્રક્રિયા કરતાં ઓર્થો-હાઇડ્રોક્સિબેન્ઝોઇક એસિડ મળે છે. વિકલ્પ D સાચું છે, કારણ કે આ વિક્રિયા સામાન્ય તાપમાન અને દબાણે થાય છે.", "ref": "Std 12 - પ્રકરણ 11: આલ્કોહોલ, ફિનોલ અને ઇથર", "ch": ""}];
let userAns={},curIdx=0;
document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
