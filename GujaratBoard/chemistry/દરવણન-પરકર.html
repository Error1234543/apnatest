<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>દ્રાવણના પ્રકાર</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>દ્રાવણના પ્રકાર</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">દ્રાવણના પ્રકાર</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "એક વિદ્યાર્થીએ બે પ્રવાહીને મિશ્ર કરતાં સમાન કદ ધરાવતું સ્વચ્છ દ્રાવણ મળ્યું. આ દ્રાવણને કયા પ્રકારમાં વર્ગીકૃત કરી શકાય? (નોંધ: બંને પ્રવાહીના ઉત્કલનબિંદુ અલગ-અલગ છે)", "opts": ["સંતૃપ્ત દ્રાવણ", "આદર્શ દ્રાવણ", "અસંતૃપ્ત દ્રાવણ", "અપૂર્ણ મિશ્રણીય દ્રાવણ"], "ans": 1, "exp": "આદર્શ દ્રાવણમાં બે પ્રવાહી સંપૂર્ણપણે મિશ્ર થાય છે અને તેમના ઉત્કલનબિંદુ અલગ હોવા છતાં સ્વચ્છ દ્રાવણ બને છે. સંતૃપ્ત અને અસંતૃપ્ત દ્રાવણ ઘન પદાર્થના દ્રાવ્યતા સંદર્ભમાં વપરાય છે, જ્યારે અપૂર્ણ મિશ્રણીય દ્રાવણમાં બે પ્રવાહી સંપૂર્ણપણે મિશ્ર થતાં નથી.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક દ્રાવણમાં દ્રાવ્ય પદાર્થના કણોનું કદ 1 nm કરતાં નાનું છે, પરંતુ તે કણો પ્રકાશનું પ્રકીર્ણન કરતા નથી. આ દ્રાવણને કયા પ્રકારમાં વર્ગીકૃત કરશો?", "opts": ["નિલંબન (Suspension)", "કલિલ (Colloid)", "સાચું દ્રાવણ (True Solution)", "ઇમલ્શન (Emulsion)"], "ans": 2, "exp": "સાચું દ્રાવણમાં દ્રાવ્ય કણોનું કદ 1 nm કરતાં નાનું હોય છે અને તેઓ પ્રકાશનું પ્રકીર્ણન કરતા નથી. નિલંબનમાં કણોનું કદ મોટું હોય છે અને પ્રકાશનું પ્રકીર્ણન થાય છે, જ્યારે કલિલમાં કણોનું કદ 1 nm થી 1000 nm વચ્ચે હોય છે અને પ્રકાશનું પ્રકીર્ણન થાય છે. ઇમલ્શન એ કલિલનો એક પ્રકાર છે.", "ref": "Std 11 - પ્રકરણ 5: દ્રાવણોના પ્રકાર", "ch": ""}, {"q": "એક દ્રાવણમાં દ્રાવ્ય પદાર્થની સાંદ્રતા તેના દ્રાવ્યતા ગુણાંક કરતાં વધુ છે, પરંતુ દ્રાવણ સ્થિર છે અને અવક્ષેપન થતું નથી. આ દ્રાવણને શું કહેવાય?", "opts": ["સંતૃપ્ત દ્રાવણ", "અતિસંતૃપ્ત દ્રાવણ", "અસંતૃપ્ત દ્રાવણ", "આદર્શ દ્રાવણ"], "ans": 1, "exp": "અતિસંતૃપ્ત દ્રાવણમાં દ્રાવ્ય પદાર્થની સાંદ્રતા તેના દ્રાવ્યતા ગુણાંક કરતાં વધુ હોય છે, પરંતુ તે અસ્થિર હોય છે અને થોડા પ્રમાણમાં અવક્ષેપન થઈ શકે છે. જો દ્રાવણ સ્થિર હોય અને અવક્ષેપન ન થતું હોય, તો તે અતિસંતૃપ્ત દ્રાવણ છે. સંતૃપ્ત દ્રાવણમાં દ્રાવ્યતા ગુણાંક જેટલી જ સાંદ્રતા હોય છે, જ્યારે અસંતૃપ્ત દ્રાવણમાં ઓછી સાંદ્રતા હોય છે.", "ref": "Std 12 - પ્રકરણ 2: દ્રાવણો", "ch": ""}, {"q": "એક દ્રાવણમાં બે પ્રવાહી એવા છે જે એકબીજામાં સંપૂર્ણપણે મિશ્ર થતા નથી, પરંતુ બહારથી ઉમેરેલા ત્રીજા પદાર્થની હાજરીમાં સ્થિર મિશ્રણ બનાવે છે. આ ત્રીજા પદાર્થને શું કહેવાય?", "opts": ["દ્રાવક (Solvent)", "ઇમલ્સિફાયર (Emulsifier)", "સ્ટેબિલાઇઝર (Stabilizer)", "ઉત્પ્રેરક (Catalyst)"], "ans": 1, "exp": "ઇમલ્સિફાયર એવો પદાર્થ છે જે બે અમિશ્રણીય પ્રવાહીઓને સ્થિર મિશ્રણ (ઇમલ્શન) બનાવવામાં મદદ કરે છે. દ્રાવક એ દ્રાવણમાં મુખ્ય ઘટક છે, સ્ટેબિલાઇઝર સામાન્ય રીતે કલિલને સ્થિર કરવા વપરાય છે, જ્યારે ઉત્પ્રેરક રાસાયણિક પ્રક્રિયાની ગતિ વધારે છે.", "ref": "Std 11 - પ્રકરણ 5: દ્રાવણોના પ્રકાર", "ch": ""}, {"q": "એક દ્રાવણમાં દ્રાવ્ય પદાર્થના કણોનું કદ 100 nm છે અને તે કણો પ્રકાશનું પ્રકીર્ણન કરે છે. આ દ્રાવણને કયા પ્રકારમાં વર્ગીકૃત કરશો? (નોંધ: દ્રાવણ લાંબા સમય સુધી સ્થિર રહે છે)", "opts": ["સાચું દ્રાવણ (True Solution)", "નિલંબન (Suspension)", "કલિલ (Colloid)", "અતિસંતૃપ્ત દ્રાવણ (Supersaturated Solution)"], "ans": 2, "exp": "કલિલમાં દ્રાવ્ય કણોનું કદ 1 nm થી 1000 nm વચ્ચે હોય છે અને તેઓ પ્રકાશનું પ્રકીર્ણન કરે છે. આ દ્રાવણ લાંબા સમય સુધી સ્થિર રહે છે. સાચું દ્રાવણમાં કણોનું કદ 1 nm કરતાં નાનું હોય છે અને પ્રકાશનું પ્રકીર્ણન થતું નથી, જ્યારે નિલંબનમાં કણોનું કદ મોટું હોય છે અને તે ઝડપથી અવક્ષેપિત થાય છે. અતિસંતૃપ્ત દ્રાવણ એ સાંદ્રતાના સંદર્ભમાં વર્ગીકરણ છે.", "ref": "Std 11 - પ્રકરણ 5: દ્રાવણોના પ્રકાર", "ch": ""}, {"q": "નીચેના પૈકી કયું દ્રાવણ સસ્પેન્શન નથી, પરંતુ તેને કલિલ દ્રાવણ પણ કહી શકાય નહીં?", "opts": ["પાણીમાં રેતીનું મિશ્રણ", "દૂધ", "ખાંડનું પાણીમાં દ્રાવણ", "ધુમાડો"], "ans": 2, "exp": "ખાંડનું પાણીમાં દ્રાવણ એ સાચું દ્રાવણ છે, કારણ કે તેમાં દ્રાવ્ય પદાર્થના કણોનું કદ 1 nm કરતાં નાનું હોય છે. સસ્પેન્શનમાં કણોનું કદ 100 nm કરતાં મોટું હોય છે અને તે અસ્થાયી હોય છે, જ્યારે કલિલ દ્રાવણમાં કણોનું કદ 1 nm થી 100 nm વચ્ચે હોય છે. દૂધ અને ધુમાડો કલિલ દ્રાવણ છે, જ્યારે પાણીમાં રેતીનું મિશ્રણ સસ્પેન્શન છે.", "ref": "Std 11 - પ્રકરણ 1: દ્રાવણોના પ્રકાર અને તેમના ગુણધર્મો", "ch": ""}, {"q": "એક વિદ્યાર્થીએ બે પ્રવાહી A અને B ને મિશ્ર કરતાં એક સ્વચ્છ દ્રાવણ મળ્યું, પરંતુ થોડા સમય પછી તે દ્રાવણમાંથી પ્રવાહી A ના ટીપાં અલગ થવા લાગ્યા. આ ઘટના માટે નીચેનામાંથી કયું કારણ યોગ્ય છે?", "opts": ["પ્રવાહી A અને B સંપૂર્ણપણે મિશ્ર થઈ શકતા નથી", "પ્રવાહી A ની દ્રાવ્યતા પ્રવાહી B માં સમય સાથે ઘટી ગઈ", "પ્રવાહી A નું બાષ્પીભવન થયું અને તેનું પ્રમાણ ઘટ્યું", "પ્રવાહી A અને B નું મિશ્રણ અસ્થાયી કલિલ દ્રાવણ હતું"], "ans": 1, "exp": "આ ઘટનામાં પ્રવાહી A ની દ્રાવ્યતા પ્રવાહી B માં સમય સાથે ઘટી ગઈ હોવાને કારણે તેના ટીપાં અલગ થવા લાગ્યા. સંપૂર્ણપણે અમિશ્ર પ્રવાહીઓ તરત જ અલગ થઈ જાય છે, જ્યારે બાષ્પીભવનથી પ્રવાહીનું પ્રમાણ ઘટે છે પરંતુ ટીપાં અલગ થતા નથી. કલિલ દ્રાવણમાં આ પ્રકારની ઘટના જોવા મળતી નથી.", "ref": "Std 11 - પ્રકરણ 1: દ્રાવણોના પ્રકાર અને તેમના ગુણધર્મો", "ch": ""}, {"q": "નીચેના પૈકી કયું દ્રાવણ સંતૃપ્ત દ્રાવણ ન હોવા છતાં તેમાં વધુ દ્રાવ્ય પદાર્થ ઉમેરતાં તે અવક્ષેપિત થતો નથી?", "opts": ["ખાંડનું પાણીમાં દ્રાવણ જેની સાંદ્રતા તેના દ્રાવ્યતા ગુણાંક જેટલી છે", "ખાંડનું પાણીમાં દ્રાવણ જેની સાંદ્રતા તેના દ્રાવ્યતા ગુણાંક કરતાં ઓછી છે", "ખાંડનું પાણીમાં અતિસંતૃપ્ત દ્રાવણ", "ખાંડનું પાણીમાં દ્રાવણ જેને ગરમ કરવામાં આવ્યું છે"], "ans": 2, "exp": "અતિસંતૃપ્ત દ્રાવણમાં દ્રાવ્ય પદાર્થની સાંદ્રતા તેના દ્રાવ્યતા ગુણાંક કરતાં વધુ હોય છે, પરંતુ તે અસ્થાયી હોય છે અને તેમાં વધુ દ્રાવ્ય પદાર્થ ઉમેરતાં તે અવક્ષેપિત થતો નથી. સંતૃપ્ત દ્રાવણમાં વધુ દ્રાવ્ય પદાર્થ ઉમેરતાં તે અવક્ષેપિત થાય છે, જ્યારે અસંતૃપ્ત દ્રાવણમાં વધુ દ્રાવ્ય પદાર્થ ઉમેરી શકાય છે. ગરમ કરેલું દ્રાવણ વધુ દ્રાવ્ય પદાર્થ ઓગાળી શકે છે, પરંતુ તે સંતૃપ્ત નથી.", "ref": "Std 11 - પ્રકરણ 1: દ્રાવણોના પ્રકાર અને તેમના ગુણધર્મો", "ch": ""}, {"q": "એક દ્રાવણમાં દ્રાવ્ય પદાર્થના કણોનું કદ 50 nm છે. આ દ્રાવણને નીચેનામાંથી કયા પ્રકારમાં વર્ગીકૃત કરી શકાય?", "opts": ["સાચું દ્રાવણ", "સસ્પેન્શન", "કલિલ દ્રાવણ", "અસંતૃપ્ત દ્રાવણ"], "ans": 2, "exp": "કલિલ દ્રાવણમાં દ્રાવ્ય પદાર્થના કણોનું કદ 1 nm થી 100 nm વચ્ચે હોય છે. સાચા દ્રાવણમાં કણોનું કદ 1 nm કરતાં નાનું હોય છે, જ્યારે સસ્પેન્શનમાં કણોનું કદ 100 nm કરતાં મોટું હોય છે. અસંતૃપ્ત દ્રાવણ એ દ્રાવણની સ્થિતિ દર્શાવે છે, નહીં કે કણોના કદને.", "ref": "Std 11 - પ્રકરણ 1: દ્રાવણોના પ્રકાર અને તેમના ગુણધર્મો", "ch": ""}, {"q": "નીચેના પૈકી કયું દ્રાવણ ટિંડલ અસર દર્શાવતું નથી, પરંતુ તેને ગાળણ પત્ર વડે ગાળી શકાય છે?", "opts": ["ખાંડનું પાણીમાં દ્રાવણ", "પાણીમાં રેતીનું મિશ્રણ", "દૂધ", "ધુમાડો"], "ans": 1, "exp": "પાણીમાં રેતીનું મિશ્રણ સસ્પેન્શન છે, જે ટિંડલ અસર દર્શાવતું નથી અને તેને ગાળણ પત્ર વડે ગાળી શકાય છે. ખાંડનું પાણીમાં દ્રાવણ સાચું દ્રાવણ છે, જે ટિંડલ અસર દર્શાવતું નથી અને ગાળી શકાતું નથી. દૂધ અને ધુમાડો કલિલ દ્રાવણ છે, જે ટિંડલ અસર દર્શાવે છે અને ગાળી શકાતા નથી.", "ref": "Std 11 - પ્રકરણ 1: દ્રાવણોના પ્રકાર અને તેમના ગુણધર્મો", "ch": ""}, {"q": "નીચેના પૈકી કયું દ્રાવણ કલિલીય દ્રાવણ (colloidal solution) નથી, પરંતુ તેના કણોનું કદ 1 nm થી 1000 nm વચ્ચે હોવા છતાં તેને સસ્પેન્શન ગણવામાં આવે છે?", "opts": ["રક્તમાં લોહીના કણો", "દૂધમાં ચરબીના કણો", "પાણીમાં ચોકના કણો", "પાણીમાં સ્ટાર્ચના કણો"], "ans": 2, "exp": "પાણીમાં ચોકના કણોનું કદ 1 nm થી 1000 nm વચ્ચે હોય છે, પરંતુ તે સસ્પેન્શન છે કારણ કે ચોકના કણો પાણીમાં સ્થિર રહેતા નથી અને સમય જતાં તળિયે બેસી જાય છે. રક્તમાં લોહીના કણો, દૂધમાં ચરબીના કણો અને પાણીમાં સ્ટાર્ચના કણો એ બધા કલિલીય દ્રાવણ છે કારણ કે તેમના કણો સ્થિર રહે છે અને ટિંડલ અસર દર્શાવે છે.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણ", "ch": ""}, {"q": "એક દ્રાવણમાં દ્રાવ્ય પદાર્થના કણોનું કદ 0.2 nm છે અને તે દ્રાવણ સ્વચ્છ દેખાય છે. આ દ્રાવણને નીચેનામાંથી કયા પ્રકારમાં વર્ગીકૃત કરવામાં આવશે?", "opts": ["સસ્પેન્શન", "કલિલીય દ્રાવણ", "સચ્ચ દ્રાવણ", "એમલ્શન"], "ans": 2, "exp": "0.2 nm કદ ધરાવતા કણો સચ્ચ દ્રાવણમાં હોય છે, કારણ કે સચ્ચ દ્રાવણમાં કણોનું કદ 1 nm કરતાં નાનું હોય છે અને તે સ્વચ્છ દેખાય છે. સસ્પેન્શનમાં કણોનું કદ 100 nm કરતાં મોટું હોય છે, કલિલીય દ્રાવણમાં 1 nm થી 100 nm વચ્ચે હોય છે, અને એમલ્શન એ કલિલીય દ્રાવણનો એક પ્રકાર છે જેમાં બે પ્રવાહી એકબીજામાં મિશ્ર થાય છે.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણ", "ch": ""}, {"q": "નીચેના પૈકી કયું વિધાન સસ્પેન્શન વિશે ખોટું છે?", "opts": ["સસ્પેન્શનમાં દ્રાવ્ય પદાર્થના કણો નગ્ન આંખે દેખાય છે.", "સસ્પેન્શનમાં કણો સ્થિર રહેતા નથી અને સમય જતાં તળિયે બેસી જાય છે.", "સસ્પેન્શન ગાળણ પત્ર દ્વારા ગાળી શકાય છે.", "સસ્પેન્શન ટિંડલ અસર દર્શાવે છે."], "ans": 3, "exp": "સસ્પેન્શન ટિંડલ અસર દર્શાવતું નથી. ટિંડલ અસર કલિલીય દ્રાવણમાં જોવા મળે છે. સસ્પેન્શનમાં કણો મોટા હોય છે, નગ્ન આંખે દેખાય છે, સ્થિર રહેતા નથી, અને ગાળણ પત્ર દ્વારા ગાળી શકાય છે.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણ", "ch": ""}, {"q": "એક દ્રાવણમાં દ્રાવ્ય પદાર્થના કણોનું કદ 50 nm છે અને તે દ્રાવણ ટિંડલ અસર દર્શાવે છે. આ દ્રાવણને નીચેનામાંથી કયા પ્રકારમાં વર્ગીકૃત કરવામાં આવશે?", "opts": ["સચ્ચ દ્રાવણ", "સસ્પેન્શન", "કલિલીય દ્રાવણ", "સંતૃપ્ત દ્રાવણ"], "ans": 2, "exp": "50 nm કદ ધરાવતા કણો કલિલીય દ્રાવણમાં હોય છે અને તે ટિંડલ અસર દર્શાવે છે. સચ્ચ દ્રાવણમાં કણોનું કદ 1 nm કરતાં નાનું હોય છે, સસ્પેન્શનમાં કણોનું કદ 100 nm કરતાં મોટું હોય છે, અને સંતૃપ્ત દ્રાવણ એ દ્રાવ્યતાના આધારે વર્ગીકૃત થાય છે, કણોના કદના આધારે નહીં.", "ref": "Std 12 - અધ્યાય 2: દ્રાવણ", "ch": ""}, {"q": "નીચેના પૈકી કયું દ્રાવણ એમલ્શન નથી?", "opts": ["દૂધ", "મખણ", "પાણીમાં ચોકનું મિશ્રણ", "મેયોનેઝ"], "ans": 2, "exp": "પાણીમાં ચોકનું મિશ્રણ એ સસ્પેન્શન છે, એમલ્શન નહીં. એમલ્શન એ કલિલીય દ્રાવણનો એક પ્રકાર છે જેમાં બે પ્રવાહી એકબીજામાં મિશ્ર થાય છે, જેમ કે દૂધ (પાણી અને ચરબી), મખણ (પાણી અને ચરબી), અને મેયોનેઝ (તેલ અને પાણી).", "ref": "Std 12 - અધ્યાય 2: દ્રાવણ", "ch": ""}, {"q": "નીચેનામાંથી કયું દ્રાવણ અતિસંતૃપ્ત દ્રાવણ (supersaturated solution) નું ઉદાહરણ છે, જ્યાં દ્રાવ્ય પદાર્થની સાંદ્રતા તેની સામાન્ય દ્રાવ્યતાથી વધુ હોય છે અને તે અસ્થિર સ્થિતિમાં રહે છે?", "opts": ["શર્કરાનું પાણીમાં બનાવેલું દ્રાવણ જ્યારે ગરમ પાણીમાં વધુ શર્કરા ઉમેરવામાં આવે અને તાપમાન ઘટાડીને સ્થિર રાખવામાં આવે", "મીઠાનું પાણીમાં બનાવેલું દ્રાવણ જ્યારે તેને ઉકાળીને તાપમાન ઘટાડવામાં આવે", "રેતી અને પાણીનું મિશ્રણ જ્યારે તેને હલાવવામાં આવે", "દૂધમાં ચરબીના કણોનું વિતરણ"], "ans": 0, "exp": "અતિસંતૃપ્ત દ્રાવણ એવું દ્રાવણ છે જ્યાં દ્રાવ્ય પદાર્થની સાંદ્રતા તેની સામાન્ય દ્રાવ્યતાથી વધુ હોય છે અને તે અસ્થિર સ્થિતિમાં રહે છે. શર્કરાનું પાણીમાં બનાવેલું દ્રાવણ જ્યારે ગરમ પાણીમાં વધુ શર્કરા ઉમેરવામાં આવે અને તાપમાન ઘટાડીને સ્થિર રાખવામાં આવે ત્યારે અતિસંતૃપ્ત દ્રાવણ બને છે. મીઠાનું દ્રાવણ સંતૃપ્ત થઈ શકે પરંતુ અતિસંતૃપ્ત નથી. રેતી અને પાણીનું મિશ્રણ સસ્પેન્શન છે, જ્યારે દૂધ ચરબીના કણોનું કલિલીય દ્રાવણ છે.", "ref": "Std 12 - અભ્યાસક્રમ 1: દ્રાવણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન કલિલીય દ્રાવણ (colloidal solution) વિશે ખોટું છે?", "opts": ["કલિલીય દ્રાવણના કણોનું કદ 1 nm થી 1000 nm વચ્ચે હોય છે", "કલિલીય દ્રાવણ ટિંડલ અસર દર્શાવે છે", "કલિલીય દ્રાવણના કણો ગુરુત્વાકર્ષણ દ્વારા ગાળી શકાય છે", "કલિલીય દ્રાવણ સજીવ અને નિર્જીવ પ્રણાલીઓમાં જોવા મળે છે"], "ans": 2, "exp": "કલિલીય દ્રાવણના કણોનું કદ 1 nm થી 1000 nm વચ્ચે હોય છે (A સાચું). તે ટિંડલ અસર દર્શાવે છે (B સાચું). કલિલીય કણો ગુરુત્વાકર્ષણ દ્વારા ગાળી શકાતા નથી, પરંતુ અતિશય કેંદ્રાપસારક (ultracentrifugation) દ્વારા ગાળી શકાય છે (C ખોટું). કલિલીય દ્રાવણ સજીવ અને નિર્જીવ પ્રણાલીઓમાં જોવા મળે છે (D સાચું).", "ref": "Std 12 - અભ્યાસક્રમ 1: દ્રાવણ", "ch": ""}, {"q": "નીચેનામાંથી કયું દ્રાવણ એમલ્શન (emulsion) નું ઉદાહરણ છે, જ્યાં બે અમિશ્રણીય પ્રવાહી એકબીજામાં વિતરિત થાય છે?", "opts": ["પાણી અને મીઠાનું દ્રાવણ", "દૂધ", "હવા અને પાણીનું મિશ્રણ", "રેતી અને પાણીનું મિશ્રણ"], "ans": 1, "exp": "દૂધ એ એમલ્શનનું ઉદાહરણ છે, જ્યાં ચરબીના કણો પાણીમાં વિતરિત થાય છે. પાણી અને મીઠાનું દ્રાવણ સામાન્ય દ્રાવણ છે. હવા અને પાણીનું મિશ્રણ ફીણ (foam) છે. રેતી અને પાણીનું મિશ્રણ સસ્પેન્શન છે.", "ref": "Std 12 - અભ્યાસક્રમ 1: દ્રાવણ", "ch": ""}, {"q": "નીચેનામાંથી કયું વિધાન સસ્પેન્શન (suspension) વિશે સાચું નથી?", "opts": ["સસ્પેન્શનના કણોનું કદ 100 nm કરતાં મોટું હોય છે", "સસ્પેન્શનના કણો ગુરુત્વાકર્ષણ દ્વારા ગાળી શકાય છે", "સસ્પેન્શન સ્થિર હોય છે અને કણો તળિયે બેસતા નથી", "સસ્પેન્શન ટર્બિડ (ઘેરું) દેખાય છે"], "ans": 2, "exp": "સસ્પેન્શનના કણોનું કદ 100 nm કરતાં મોટું હોય છે (A સાચું). તેના કણો ગુરુત્વાકર્ષણ દ્વારા ગાળી શકાય છે (B સાચું). સસ્પેન્શન અસ્થિર હોય છે અને કણો તળિયે બેસી જાય છે (C ખોટું). સસ્પેન્શન ટર્બિડ દેખાય છે (D સાચું).", "ref": "Std 12 - અભ્યાસક્રમ 1: દ્રાવણ", "ch": ""}, {"q": "નીચેનામાંથી કયું દ્રાવણ હમજન (homogeneous) ન હોવા છતાં તેના કણોનું કદ 1 nm કરતાં મોટું નથી અને તે સ્થિર દેખાય છે?", "opts": ["પાણી અને આલ્કોહોલનું મિશ્રણ", "દૂધ", "રેતી અને પાણીનું મિશ્રણ", "શર્કરાનું પાણીમાં બનાવેલું દ્રાવણ"], "ans": 1, "exp": "દૂધ એક કલિલીય દ્રાવણ છે, જે હમજન નથી, પરંતુ તેના કણોનું કદ 1 nm કરતાં મોટું નથી અને તે સ્થિર દેખાય છે. પાણી અને આલ્કોહોલનું મિશ્રણ હમજન દ્રાવણ છે. રેતી અને પાણીનું મિશ્રણ સસ્પેન્શન છે. શર્કરાનું પાણીમાં બનાવેલું દ્રાવણ હમજન દ્રાવણ છે.", "ref": "Std 12 - અભ્યાસક્રમ 1: દ્રાવણ", "ch": ""}];

document.getElementById('tot-num').textContent=questions.length;
renderQ();
function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';
  document.getElementById('q-area').innerHTML='<div class="question-card">'+(q.ch?'<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px;font-family:\'JetBrains Mono\',monospace;">📖 '+q.ch+'</div>':'')+'<div class="q-header"><span class="q-num">Q'+(curIdx+1)+'</span><div class="q-text">'+q.q+'</div></div><div class="options-grid">'+optHtml+'</div>'+ex+'</div>';
}
function pick(i){userAns[curIdx]=i;renderQ();}
function nav(d){const n=curIdx+d;if(n>=0&&n<questions.length){curIdx=n;renderQ();}}
function skipQ(){if(userAns[curIdx]===undefined)userAns[curIdx]=-1;curIdx<questions.length-1?++curIdx&&renderQ():finishQuiz();}
function restartQuiz(){userAns={};curIdx=0;document.getElementById('score-card').style.display='none';document.getElementById('quiz-panel').style.display='block';renderQ();}
function finishQuiz(){
  for(let i=0;i<questions.length;i++)if(userAns[i]===undefined)userAns[i]=-1;
  let cor=0,wrg=0,skp=0;
  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
