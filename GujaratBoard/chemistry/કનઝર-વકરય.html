<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>કેનિઝારો વિક્રિયા</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7c76a;--accent3:#6af7c7;--text:#e8e8f0;--muted:#7070a0;--danger:#f76a6a;--success:#6af7a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:12px;}
.header h1{font-size:clamp(22px,5vw,38px);font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:6px;}
.header p{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));}
.quiz-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px;}
.meta-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s ease;}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;flex-shrink:0;}
.q-text{font-size:15px;font-weight:600;line-height:1.55;}
.options-grid{display:grid;gap:9px;}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center;width:100%;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(124,106,247,0.08);transform:translateX(4px);}
.opt-btn.correct{border-color:var(--success);background:rgba(106,247,160,0.08);color:var(--success);}
.opt-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.08);color:var(--danger);}
.opt-btn:disabled{cursor:default;}
.opt-letter{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;width:22px;height:22px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.explain-box{background:rgba(106,247,199,.06);border:1px solid rgba(106,247,199,.2);border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--accent3);}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px;align-items:center;flex-wrap:wrap;}
.btn{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,247,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;}
.btn-success{background:linear-gradient(135deg,var(--success),#2a9a60);color:#000;}
#score-card{display:none;text-align:center;padding:30px 18px;animation:fadeUp .4s ease;}
.score-ring{width:130px;height:130px;margin:0 auto 18px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:0 314;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-score{font-size:28px;font-weight:800;line-height:1;}
.score-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.grade-badge{font-size:24px;font-weight:800;margin-bottom:5px;}
.score-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.stat-key{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">NEET Quiz</div>
    <h1>કેનિઝારો વિક્રિયા</h1>
    <p>// attempt karo — har question ka jawab do</p>
  </div>
  <div class="panel" id="quiz-panel">
    <div class="quiz-meta">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-family:'JetBrains Mono',monospace;">કેનિઝારો વિક્રિયા</div>
        <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">Q<span id="cur-num">1</span> of <span id="tot-num">?</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="meta-badge">📚 20 Qs</div>
        <button class="btn btn-outline" onclick="restartQuiz()" style="padding:5px 12px;font-size:12px;">↺ Restart</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prev-btn" onclick="nav(-1)">← Prev</button>
      <button class="btn btn-outline" id="skip-btn" onclick="skipQ()">Skip →</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nav(1)">Next →</button>
      <button class="btn btn-success" id="fin-btn" style="display:none" onclick="finishQuiz()">Finish ✓</button>
    </div>
  </div>
  <div class="panel" id="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 110 110" width="130" height="130">
        <circle class="ring-bg" cx="55" cy="55" r="50"></circle>
        <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"></circle>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c6af7"/><stop offset="100%" style="stop-color:#6af7c7"/>
        </linearGradient></defs>
      </svg>
      <div class="score-center">
        <div class="big-score" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="grade-badge" id="grade-txt"></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;" id="grade-msg"></div>
    <div class="score-stats">
      <div class="stat-item"><div class="stat-val" style="color:var(--success)" id="s-cor">0</div><div class="stat-key">Correct</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--danger)" id="s-wrg">0</div><div class="stat-key">Wrong</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="s-skp">0</div><div class="stat-key">Skipped</div></div>
    </div>
    <button class="btn btn-outline" onclick="restartQuiz()" style="margin-top:14px;">↺ Try Again</button>
  </div>
  <div class="footer">Made with ❤️ by @xdsonic | 20 Questions</div>
</div>
<script>
const LETTERS=['A','B','C','D','E','F'];
const questions=[{"q": "કેનિઝારો વિક્રિયામાં આલ્ડિહાઇડ સંયોજનનું વિષમીકરણ થાય છે, પરંતુ નીચેનામાંથી કયું સંયોજન આ વિક્રિયા દર્શાવતું નથી?", "opts": ["ફોર્માલ્ડિહાઇડ (HCHO)", "બેન્ઝાલ્ડિહાઇડ (C₆H₅CHO)", "એસિટાલ્ડિહાઇડ (CH₃CHO)", "ટ્રાઇમેથાઇલ એસિટાલ્ડિહાઇડ ((CH₃)₃CCHO)"], "ans": 2, "exp": "કેનિઝારો વિક્રિયા એવા આલ્ડિહાઇડ સંયોજનો દર્શાવે છે જેમાં α-હાઇડ્રોજન પરમાણુ ન હોય. ફોર્માલ્ડિહાઇડ અને બેન્ઝાલ્ડિહાઇડમાં α-હાઇડ્રોજન ન હોવાથી તેઓ આ વિક્રિયા દર્શાવે છે. ટ્રાઇમેથાઇલ એસિટાલ્ડિહાઇડમાં પણ α-હાઇડ્રોજન ન હોવાથી તે પણ વિક્રિયા દર્શાવે છે. પરંતુ એસિટાલ્ડિહાઇડમાં α-હાઇડ્રોજન હોવાથી તે કેનિઝારો વિક્રિયા દર્શાવતું નથી, તેના બદલે આલ્ડોલ સંઘનન વિક્રિયા દર્શાવે છે.", "ref": "Std 12 - પ્રકરણ 12: આલ્ડિહાઇડ, કિટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "કેનિઝારો વિક્રિયામાં આલ્કલાઇન માધ્યમમાં આલ્ડિહાઇડનું વિષમીકરણ થઈને આલ્કોહોલ અને કાર્બોક્સિલિક એસિડ બને છે. આ વિક્રિયામાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["આ વિક્રિયા માટે પ્રબળ આલ્કલી (NaOH અથવા KOH) જરૂરી છે.", "આ વિક્રિયામાં એક આલ્ડિહાઇડ અણુનું ઓક્સિડેશન થઈને કાર્બોક્સિલિક એસિડ બને છે.", "આ વિક્રિયામાં બીજા આલ્ડિહાઇડ અણુનું રિડક્શન થઈને આલ્કોહોલ બને છે.", "આ વિક્રિયા ઉત્સેચકની હાજરીમાં ઝડપી બને છે."], "ans": 3, "exp": "કેનિઝારો વિક્રિયા એ રાસાયણિક વિક્રિયા છે જે પ્રબળ આલ્કલી (NaOH અથવા KOH)ની હાજરીમાં થાય છે. આ વિક્રિયામાં એક આલ્ડિહાઇડ અણુનું ઓક્સિડેશન થઈને કાર્બોક્સિલિક એસિડ બને છે અને બીજા અણુનું રિડક્શન થઈને આલ્કોહોલ બને છે. આ વિક્રિયા ઉત્સેચકની હાજરીમાં થતી નથી, તે સંપૂર્ણ રાસાયણિક પ્રક્રિયા છે.", "ref": "Std 12 - પ્રકરણ 12: આલ્ડિહાઇડ, કિટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "કેનિઝારો વિક્રિયામાં ફોર્માલ્ડિહાઇડનું વિષમીકરણ થઈને કયા ઉત્પાદનો મળે છે?", "opts": ["મિથેનોલ અને ફોર્મિક એસિડ", "ઇથેનોલ અને એસિટિક એસિડ", "મિથેનોલ અને એસિટિક એસિડ", "ઇથેનોલ અને ફોર્મિક એસિડ"], "ans": 0, "exp": "ફોર્માલ્ડિહાઇડ (HCHO)નું કેનિઝારો વિક્રિયામાં વિષમીકરણ થઈને મિથેનોલ (CH₃OH) અને ફોર્મિક એસિડ (HCOOH) બને છે. આ વિક્રિયામાં એક અણુનું ઓક્સિડેશન થઈને ફોર્મિક એસિડ બને છે અને બીજા અણુનું રિડક્શન થઈને મિથેનોલ બને છે.", "ref": "Std 12 - પ્રકરણ 12: આલ્ડિહાઇડ, કિટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "નીચેનામાંથી કયું સંયોજન કેનિઝારો વિક્રિયા દર્શાવી શકે નહીં, કારણ કે તેમાં α-હાઇડ્રોજન હાજર છે?", "opts": ["બેન્ઝાલ્ડિહાઇડ (C₆H₅CHO)", "ફોર્માલ્ડિહાઇડ (HCHO)", "પ્રોપિયોનાલ્ડિહાઇડ (CH₃CH₂CHO)", "ટ્રાઇમેથાઇલ એસિટાલ્ડિહાઇડ ((CH₃)₃CCHO)"], "ans": 2, "exp": "કેનિઝારો વિક્રિયા ફક્ત એવા આલ્ડિહાઇડ સંયોજનો દર્શાવે છે જેમાં α-હાઇડ્રોજન પરમાણુ ન હોય. બેન્ઝાલ્ડિહાઇડ, ફોર્માલ્ડિહાઇડ અને ટ્રાઇમેથાઇલ એસિટાલ્ડિહાઇડમાં α-હાઇડ્રોજન ન હોવાથી તેઓ આ વિક્રિયા દર્શાવે છે. પરંતુ પ્રોપિયોનાલ્ડિહાઇડમાં α-હાઇડ્રોજન હોવાથી તે કેનિઝારો વિક્રિયા દર્શાવતું નથી.", "ref": "Std 12 - પ્રકરણ 12: આલ્ડિહાઇડ, કિટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "કેનિઝારો વિક્રિયામાં આલ્ડિહાઇડનું વિષમીકરણ થાય છે. આ વિક્રિયા માટે નીચેનામાંથી કયું વિધાન સાચું નથી?", "opts": ["આ વિક્રિયા પ્રબળ આલ્કલી (NaOH અથવા KOH)ની હાજરીમાં થાય છે.", "આ વિક્રિયામાં એક આલ્ડિહાઇડ અણુનું ઓક્સિડેશન થઈને આલ્કોહોલ બને છે.", "આ વિક્રિયામાં બીજા આલ્ડિહાઇડ અણુનું રિડક્શન થઈને કાર્બોક્સિલિક એસિડ બને છે.", "આ વિક્રિયા ફક્ત એવા આલ્ડિહાઇડ સંયોજનો દર્શાવે છે જેમાં α-હાઇડ્રોજન ન હોય."], "ans": 1, "exp": "કેનિઝારો વિક્રિયામાં એક આલ્ડિહાઇડ અણુનું ઓક્સિડેશન થઈને કાર્બોક્સિલિક એસિડ બને છે અને બીજા અણુનું રિડક્શન થઈને આલ્કોહોલ બને છે. વિકલ્પ B ખોટો છે કારણ કે તેમાં ઓક્સિડેશનથી આલ્કોહોલ બનવાનું કહ્યું છે, જે ખોટું છે. બાકીના વિકલ્પો સાચા છે.", "ref": "Std 12 - પ્રકરણ 12: આલ્ડિહાઇડ, કિટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "કેનિઝારો વિક્રિયામાં α-હાઇડ્રોજન ધરાવતા આલ્ડિહાઇડ સંયોજનો વિષમીકરણ પ્રક્રિયા દર્શાવતા નથી. આ વિધાનને આધારે નીચેનામાંથી કયું સંયોજન કેનિઝારો વિક્રિયા માટે અપવાદરૂપ ગણી શકાય, જે સામાન્ય નિયમને અનુસરતું નથી?", "opts": ["એસિટાલ્ડિહાઇડ (CH₃CHO)", "બેન્ઝાલ્ડિહાઇડ (C₆H₅CHO)", "ફોર્માલ્ડિહાઇડ (HCHO)", "પ્રોપિઓનાલ્ડિહાઇડ (CH₃CH₂CHO)"], "ans": 2, "exp": "કેનિઝારો વિક્રિયામાં સામાન્ય રીતે α-હાઇડ્રોજન ધરાવતા આલ્ડિહાઇડ સંયોજનો વિષમીકરણ પ્રક્રિયા દર્શાવતા નથી. પરંતુ ફોર્માલ્ડિહાઇડ (HCHO)માં α-હાઇડ્રોજન હોતો નથી, તેમ છતાં તે કેનિઝારો વિક્રિયા દર્શાવે છે. આથી તે અપવાદરૂપ છે. બાકીના વિકલ્પોમાં એસિટાલ્ડિહાઇડ, બેન્ઝાલ્ડિહાઇડ અને પ્રોપિઓનાલ્ડિહાઇડમાં α-હાઇડ્રોજન હોય છે અથવા તો તેઓ સામાન્ય નિયમને અનુસરે છે.", "ref": "Std 12 - પ્રકરણ 12: આલ્ડિહાઇડ, કિટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "કેનિઝારો વિક્રિયામાં બેન્ઝાલ્ડિહાઇડનું વિષમીકરણ થઈને બેન્ઝાઇલ આલ્કોહોલ અને બેન્ઝોઇક એસિડ બને છે. આ પ્રક્રિયામાં નીચેનામાંથી કયું સંયોજન મધ્યવર્તી તરીકે કાર્ય કરતું નથી?", "opts": ["બેન્ઝાલ્ડિહાઇડ હાઇડ્રેટ", "બેન્ઝાઇલ ઓક્સાઇડ આયન", "બેન્ઝોઇક એનહાઇડ્રાઇડ", "બેન્ઝાઇલ કાર્બોક્સિલેટ આયન"], "ans": 2, "exp": "કેનિઝારો વિક્રિયામાં બેન્ઝાલ્ડિહાઇડનું વિષમીકરણ થાય છે, જેમાં બેન્ઝાલ્ડિહાઇડ હાઇડ્રેટ અને બેન્ઝાઇલ ઓક્સાઇડ આયન મધ્યવર્તી તરીકે કાર્ય કરે છે. બેન્ઝોઇક એનહાઇડ્રાઇડ આ પ્રક્રિયામાં મધ્યવર્તી તરીકે કાર્ય કરતું નથી. તેથી વિકલ્પ C સાચો છે.", "ref": "Std 12 - પ્રકરણ 12: આલ્ડિહાઇડ, કિટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "કેનિઝારો વિક્રિયામાં ફોર્માલ્ડિહાઇડનું વિષમીકરણ થઈને મિથેનોલ અને ફોર્મિક એસિડ બને છે. આ પ્રક્રિયામાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "opts": ["આ વિક્રિયા માત્ર સાંદ્ર આલ્કલીના માધ્યમમાં થાય છે.", "આ વિક્રિયામાં ફોર્માલ્ડિહાઇડનું ઓક્સિડેશન અને રિડક્શન એકસાથે થાય છે.", "આ વિક્રિયામાં ઉત્પન્ન થતો ફોર્મિક એસિડ વધુ પ્રમાણમાં મળે છે.", "આ વિક્રિયામાં ઉત્પન્ન થતો મિથેનોલ પ્રાથમિક આલ્કોહોલ છે."], "ans": 2, "exp": "કેનિઝારો વિક્રિયામાં ફોર્માલ્ડિહાઇડનું વિષમીકરણ થઈને મિથેનોલ અને ફોર્મિક એસિડ સમાન પ્રમાણમાં મળે છે, નહીં કે ફોર્મિક એસિડ વધુ પ્રમાણમાં. તેથી વિકલ્પ C ખોટું છે. બાકીના વિકલ્પો સાચા છે.", "ref": "Std 12 - પ્રકરણ 12: આલ્ડિહાઇડ, કિટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "કેનિઝારો વિક્રિયામાં નીચેનામાંથી કયું સંયોજન આલ્ડિહાઇડ તરીકે વર્તી શકે નહીં, કારણ કે તેમાં α-હાઇડ્રોજન નથી અને તે વિષમીકરણ પ્રક્રિયા માટે અનુકૂળ નથી?", "opts": ["એસિટાલ્ડિહાઇડ", "ફોર્માલ્ડિહાઇડ", "બેન્ઝાલ્ડિહાઇડ", "આઇસોબ્યુટાઇલ એલ્ડિહાઇડ"], "ans": 1, "exp": "ફોર્માલ્ડિહાઇડ (HCHO)માં α-હાઇડ્રોજન નથી, જેથી તે કેનિઝારો વિક્રિયા દર્શાવી શકે નહીં. એસિટાલ્ડિહાઇડ (CH₃CHO), બેન્ઝાલ્ડિહાઇડ (C₆H₅CHO), અને આઇસોબ્યુટાઇલ એલ્ડિહાઇડમાં α-હાઇડ્રોજન હાજર છે, જેથી તેઓ કેનિઝારો વિક્રિયા દર્શાવે છે. ફોર્માલ્ડિહાઇડમાં α-હાઇડ્રોજનના અભાવે તે આ વિક્રિયા માટે અનુકૂળ નથી.", "ref": "Std 12 - Chapter 12: એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "કેનિઝારો વિક્રિયામાં નીચેનાં વિધાનો પૈકી કયું સત્ય નથી? 1. આ વિક્રિયામાં આલ્ડિહાઇડનું વિષમીકરણ થાય છે. 2. આ વિક્રિયા માટે આલ્કલાઇન માધ્યમ જરૂરી છે. 3. આ વિક્રિયામાં આલ્ડિહાઇડના બે અણુઓ વચ્ચે પ્રક્રિયા થાય છે. 4. આ વિક્રિયામાં કેટલાક કીટોન પણ ભાગ લે છે.", "opts": ["1 અને 2", "2 અને 3", "3 અને 4", "4 માત્ર"], "ans": 3, "exp": "કેનિઝારો વિક્રિયામાં આલ્ડિહાઇડનું વિષમીકરણ થાય છે (1 સત્ય), આલ્કલાઇન માધ્યમ જરૂરી છે (2 સત્ય), અને આલ્ડિહાઇડના બે અણુઓ વચ્ચે પ્રક્રિયા થાય છે (3 સત્ય). પરંતુ કીટોન આ વિક્રિયામાં ભાગ લેતા નથી, કારણ કે તેઓમાં α-હાઇડ્રોજન હાજર નથી (4 અસત્ય).", "ref": "Std 12 - Chapter 12: એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "કેનિઝારો વિક્રિયામાં આલ્ડિહાઇડનું વિષમીકરણ થાય છે. જો બેન્ઝાલ્ડિહાઇડ અને એસિટોનના મિશ્રણને આલ્કલાઇન પોટેશિયમ પર્મેંગેનેટ સાથે ગરમ કરવામાં આવે, તો નીચેનામાંથી કયું ઉત્પાદન બનશે?", "opts": ["બેન્ઝોઇક એસિડ અને એસિટિક એસિડ", "બેન્ઝાઇલ આલ્કોહોલ અને એસિટોન", "બેન્ઝાઇલ આલ્કોહોલ અને એસિટિક એસિડ", "બેન્ઝોઇક એસિડ અને મિથેનોલ"], "ans": 0, "exp": "કેનિઝારો વિક્રિયામાં આલ્ડિહાઇડનું વિષમીકરણ થઈને આલ્કોહોલ અને કાર્બોક્સિલિક એસિડ બને છે. બેન્ઝાલ્ડિહાઇડનું વિષમીકરણ થઈને બેન્ઝોઇક એસિડ બને છે, જ્યારે એસિટોન (કીટોન) આ વિક્રિયામાં ભાગ લેતું નથી, પરંતુ એસિટોનની હાજરીમાં બેન્ઝાલ્ડિહાઇડનું વિષમીકરણ થાય છે. એસિટોન પોતે વિક્રિયામાં ભાગ લેતું નથી, પરંતુ બેન્ઝાલ્ડિહાઇડનું વિષમીકરણ થઈને બેન્ઝોઇક એસિડ બને છે. એસિટિક એસિડ એસિટોનના ઓક્સિડેશનથી બનતું નથી, પરંતુ બેન્ઝાલ્ડિહાઇડના વિષમીકરણથી બેન્ઝોઇક એસિડ બને છે. આથી સરળ ઉત્પાદન બેન્ઝોઇક એસિડ અને એસિટિક એસિડ છે.", "ref": "Std 12 - Chapter 12: એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "કેનિઝારો વિક્રિયામાં આલ્ડિહાઇડનું વિષમીકરણ થાય છે. નીચેનામાંથી કયું સંયોજન કેનિઝારો વિક્રિયા દર્શાવશે નહીં?", "opts": ["ફોર્માલ્ડિહાઇડ", "એસિટાલ્ડિહાઇડ", "ક્લોરલ", "બેન્ઝોફીનોન"], "ans": 3, "exp": "કેનિઝારો વિક્રિયામાં આલ્ડિહાઇડનું વિષમીકરણ થાય છે, પરંતુ કીટોન (જેમ કે બેન્ઝોફીનોન) આ વિક્રિયા દર્શાવતું નથી. ફોર્માલ્ડિહાઇડ, એસિટાલ્ડિહાઇડ, અને ક્લોરલ આલ્ડિહાઇડ છે અને તેઓ કેનિઝારો વિક્રિયા દર્શાવે છે. બેન્ઝોફીનોન એક કીટોન છે, જેથી તે આ વિક્રિયા દર્શાવશે નહીં.", "ref": "Std 12 - Chapter 12: એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "કેનિઝારો વિક્રિયામાં આલ્ડિહાઇડનું વિષમીકરણ થાય છે. જો એક આલ્ડિહાઇડમાં α-હાઇડ્રોજન ન હોય, તો તે વિક્રિયામાં કયું ઉત્પાદન આપશે?", "opts": ["આલ્કોહોલ અને કાર્બોક્સિલિક એસિડ", "કાર્બોક્સિલિક એસિડ અને પાણી", "આલ્કોહોલ અને કીટોન", "ફક્ત કાર્બોક્સિલિક એસિડ"], "ans": 1, "exp": "જો આલ્ડિહાઇડમાં α-હાઇડ્રોજન ન હોય (જેમ કે ફોર્માલ્ડિહાઇડ), તો તે કેનિઝારો વિક્રિયામાં ફક્ત કાર્બોક્સિલિક એસિડ અને પાણી આપશે. ફોર્માલ્ડિહાઇડનું વિષમીકરણ થઈને ફોર્મિક એસિડ અને પાણી બને છે. આલ્કોહોલ અને કીટોન બનવાની શક્યતા નથી, કારણ કે α-હાઇડ્રોજનની અછતને લીધે વિક્રિયા અધૂરી રહે છે.", "ref": "Std 12 - Chapter 12: એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "કેનિઝારો વિક્રિયામાં બે જુદા-જુદા આલ્ડિહાઇડ સંયોજનોનું મિશ્રણ આલ્કલાઇન માધ્યમમાં પ્રક્રિયા કરે ત્યારે કયું પરિણામ મળવાની શક્યતા સૌથી વધુ હોય છે? ધારો કે બંને આલ્ડિહાઇડમાં α-હાઇડ્રોજન નથી.", "opts": ["બંને આલ્ડિહાઇડનું સ્વતંત્ર રીતે વિષમીકરણ થઈને અનુક્રમે આલ્કોહોલ અને કાર્બોક્સિલિક એસિડ બનશે", "માત્ર વધુ પ્રતિક્રિયાત્મક આલ્ડિહાઇડનું વિષમીકરણ થશે, જ્યારે બીજું સંયોજન અપ્રક્રિયાશીલ રહેશે", "બંને આલ્ડિહાઇડ વચ્ચે ક્રૉસ-કેનિઝારો વિક્રિયા થઈને ચાર જુદા-જુદા ઉત્પાદનો મળશે", "માત્ર એક જ પ્રકારનું આલ્કોહોલ અને એક જ પ્રકારનું કાર્બોક્સિલિક એસિડ બનશે, કારણ કે બંને આલ્ડિહાઇડ એકસમાન પ્રક્રિયા દર્શાવે છે"], "ans": 2, "exp": "કેનિઝારો વિક્રિયામાં જ્યારે બે જુદા-જુદા આલ્ડિહાઇડ સંયોજનો (જેમાં α-હાઇડ્રોજન ન હોય) આલ્કલાઇન માધ્યમમાં પ્રક્રિયા કરે છે, ત્યારે બંને વચ્ચે ક્રૉસ-કેનિઝારો વિક્રિયા થાય છે. આથી, એક આલ્ડિહાઇડનું રિડક્શન થઈને આલ્કોહોલ બને છે, જ્યારે બીજા આલ્ડિહાઇડનું ઓક્સિડેશન થઈને કાર્બોક્સિલિક એસિડ બને છે. આ પ્રક્રિયામાં ચાર સંભવિત ઉત્પાદનો મળે છે: બંને આલ્ડિહાઇડના આલ્કોહોલ અને બંનેના કાર્બોક્સિલિક એસિડ. વિકલ્પ A ખોટો છે કારણ કે બંને આલ્ડિહાઇડ એકસાથે પ્રક્રિયા કરે છે, સ્વતંત્ર રીતે નહીં. વિકલ્પ B ખોટો છે કારણ કે બંને આલ્ડિહાઇડ પ્રક્રિયામાં ભાગ લે છે. વિકલ્પ D ખોટો છે કારણ કે બંને આલ્ડિહાઇડ એકસમાન પ્રક્રિયા દર્શાવતા નથી, પરંતુ ક્રૉસ-વિષમીકરણ થાય છે.", "ref": "Std 12 - પ્રકરણ 12: આલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "નીચેનામાંથી કયું સંયોજન કેનિઝારો વિક્રિયા દર્શાવી શકે છે, પરંતુ તેની પ્રક્રિયા દરમિયાન અસામાન્ય ઉત્પાદન મળે છે, જે સામાન્ય કેનિઝારો વિક્રિયાથી અલગ પડે છે?", "opts": ["બેન્ઝાલ્ડિહાઇડ", "ફોર્માલ્ડિહાઇડ", "એસિટાલ્ડિહાઇડ", "ક્લોરલ (CCl₃CHO)"], "ans": 3, "exp": "કેનિઝારો વિક્રિયા માટે આલ્ડિહાઇડમાં α-હાઇડ્રોજન ન હોવું જરૂરી છે. વિકલ્પ A (બેન્ઝાલ્ડિહાઇડ) અને B (ફોર્માલ્ડિહાઇડ) સામાન્ય કેનિઝારો વિક્રિયા દર્શાવે છે અને તેમાંથી અનુક્રમે આલ્કોહોલ અને કાર્બોક્સિલિક એસિડ મળે છે. વિકલ્પ C (એસિટાલ્ડિહાઇડ)માં α-હાઇડ્રોજન હોવાથી તે કેનિઝારો વિક્રિયા દર્શાવતું નથી. વિકલ્પ D (ક્લોરલ)માં α-હાઇડ્રોજન ન હોવા છતાં, તે કેનિઝારો વિક્રિયા દર્શાવે છે, પરંતુ તેમાંથી મળતું ઉત્પાદન અસામાન્ય હોય છે. ક્લોરલનું વિષમીકરણ થઈને ટ્રાઇક્લોરોએસિટિક એસિડ અને ટ્રાઇક્લોરોઇથેનોલ બને છે, જે સામાન્ય કેનિઝારો વિક્રિયાના ઉત્પાદનોથી અલગ પડે છે.", "ref": "Std 12 - પ્રકરણ 12: આલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "કેનિઝારો વિક્રિયામાં બેન્ઝાલ્ડિહાઇડ અને એસિટોનના મિશ્રણને આલ્કલાઇન માધ્યમમાં પ્રક્રિયા કરવામાં આવે તો કયા ઉત્પાદનો મળશે?", "opts": ["બેન્ઝાઇલ આલ્કોહોલ અને એસિટિક એસિડ", "બેન્ઝોઇક એસિડ અને એસિટોન", "બેન્ઝાઇલ આલ્કોહોલ અને બેન્ઝોઇક એસિડ", "એસિટિક એસિડ અને બેન્ઝોઇક એસિડ"], "ans": 2, "exp": "બેન્ઝાલ્ડિહાઇડ કેનિઝારો વિક્રિયામાં વિષમીકરણ પામીને બેન્ઝાઇલ આલ્કોહોલ અને બેન્ઝોઇક એસિડ બનાવે છે. એસિટોન (કીટોન) આ વિક્રિયામાં ભાગ લેતું નથી, જેથી તે અસર કરતું નથી. વિકલ્પ A, B, અને D ખોટા છે કારણ કે તેઓ એસિટોન અથવા એસિટિક એસિડને ઉત્પાદન તરીકે દર્શાવે છે, જે શક્ય નથી.", "ref": "Std 12 - રસાયણવિજ્ઞાન: પ્રકરણ 12: એલ્ડિહાઇડ, કીટોન અને કાર્બોક્સિલિક એસિડ", "ch": ""}, {"q": "કેનિઝારો વિક્રિયામાં બેન્ઝાલ્ડિહાઇડ અને ફોર્માલ્ડિહાઇડના મિશ્રણને આલ્કલાઇન માધ્યમમાં પ્રક્રિયા કરવામાં આવે ત્યારે કયું function renderQ(){
  const q=questions[curIdx],done=userAns[curIdx]!==undefined,isLast=curIdx===questions.length-1;
  document.getElementById('cur-num').textContent=curIdx+1;
  document.getElementById('prog-fill').style.width=((curIdx+1)/questions.length*100)+'%';
  document.getElementById('prev-btn').disabled=curIdx===0;
  document.getElementById('skip-btn').style.display=!done?'block':'none';
  document.getElementById('next-btn').style.display=done&&!isLast?'block':'none';
  document.getElementById('fin-btn').style.display=done&&isLast?'block':'none';
  const optHtml=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(done){if(i===q.ans)cls+=' correct';else if(i===userAns[curIdx])cls+=' wrong';}
    return '<button class="'+cls+'" onclick="pick('+i+')" '+(done?'disabled':'')+'>'+
      '<span class="opt-letter">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  }).join('');
  const ex=done?'<div class="explain-box">✓ Sahi Jawab: <strong style="color:#fff">'+LETTERS[q.ans]+'. '+q.opts[q.ans]+'</strong>'+(q.exp?'<br><br>💡 '+q.exp:'')+(q.ref?'<br><span style="opacity:.75">📘 '+q.ref+'</span>':'')+'</div>':'';

  questions.forEach((q,i)=>{const a=userAns[i];a===-1?skp++:a===q.ans?cor++:wrg++;});
  const pct=Math.round(cor/questions.length*100);
  const [,gt,gm]=[[90,'🏆 Excellent!','Outstanding!'],[75,'🎯 Great!','Well done!'],[60,'👍 Good','Keep practicing!'],[40,'📖 Fair','Review topics.'],[0,'💪 Keep Going!','Practice more!']].find(([m])=>pct>=m);
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('score-card').style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('grade-txt').textContent=gt;
  document.getElementById('grade-msg').textContent=gm;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wrg').textContent=wrg;
  document.getElementById('s-skp').textContent=skp;
  const c=2*Math.PI*50,fill=pct/100*c,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'url(#grad)':pct>=50?'var(--accent2)':'var(--danger)';
  setTimeout(()=>ring.style.strokeDasharray=fill+' '+c,100);
  document.getElementById('score-card').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
