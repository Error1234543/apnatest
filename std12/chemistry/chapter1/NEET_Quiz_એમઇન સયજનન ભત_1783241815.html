<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - એમાઇન સંયોજનોનું ભૌતિક ગુણધર્મો</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 એમાઇન સંયોજનોનું ભૌતિક ગુણધર્મો</span>
                <span>🎯 Hard</span>
                <span>📝 30 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "એમાઇન સંયોજનોના ગલનબિંદુ અને ઉત્કલનબિંદુ વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) એમાઇન સંયોજનોનો ગલનબિંદુ અને ઉત્કલનબિંદુ ઉચ્ચ હોય છે કારણ કે તેઓમાં હાઇડ્રોજન બંધોની હાજરી હોય છે.", "B) એમાઇન સંયોજનોનો ગલનબિંદુ નીચો હોય છે કારણ કે તેઓમાં આંતરઅણુ બળો નબળા હોય છે.", "C) એમાઇન સંયોજનોનો ઉત્કલનબિંદુ ઉચ્ચ હોય છે પરંતુ ગલનબિંદુ નીચો હોય છે કારણ કે તેઓમાં આયનિક બળો હોય છે.", "D) એમાઇન સંયોજનોનો ગલનબિંદુ અને ઉત્કલનબિંદુ નીચો હોય છે કારણ કે તેઓમાં વાન ડર વાલ્સ બળો જ હોય છે."], "correct": 0, "explanation": "એમાઇન સંયોજનોમાં હાઇડ્રોજન બંધોની હાજરીને કારણે આંતરઅણુ બળો મજબૂત હોય છે, જેના કારણે તેમનો ગલનબિંદુ અને ઉત્કલનબિંદુ ઉચ્ચ હોય છે. વિકલ્પ B, C, અને D ખોટા છે કારણ કે એમાઇન સંયોજનોમાં આંતરઅણુ બળો મજબૂત હોય છે, આયનિક બળો હાજર નથી, અને વાન ડર વાલ્સ બળો મુખ્ય બળ નથી.", "ncert_ref": "Class XII - પ્રકરણ 13: એમાઇન", "difficulty": "Hard", "num": 1}, {"question": "એમાઇન સંયોજનોના દ્રાવ્યતા વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) નીચા અણુવજન ધરાવતા એમાઇન સંયોજનો પાણીમાં દ્રાવ્ય હોય છે.", "B) ઉચ્ચ અણુવજન ધરાવતા એમાઇન સંયોજનો પાણીમાં અદ્રાવ્ય હોય છે.", "C) એમાઇન સંયોજનો ઓર્ગેનિક દ્રાવકોમાં દ્રાવ્ય હોય છે.", "D) એમાઇન સંયોજનોના હાઇડ્રોક્લોરાઇડ લવણો પાણીમાં અદ્રાવ્ય હોય છે."], "correct": 3, "explanation": "એમાઇન સંયોજનોના હાઇડ્રોક્લોરાઇડ લવણો પાણીમાં દ્રાવ્ય હોય છે, કારણ કે તેઓ આયનિક સંયોજનો હોય છે. વિકલ્પ A, B, અને C સત્ય છે કારણ કે નીચા અણુવજન ધરાવતા એમાઇન પાણીમાં દ્રાવ્ય હોય છે, ઉચ્ચ અણુવજન ધરાવતા એમાઇન પાણીમાં અદ્રાવ્ય હોય છે, અને એમાઇન ઓર્ગેનિક દ્રાવકોમાં દ્રાવ્ય હોય છે.", "ncert_ref": "Class XII - પ્રકરણ 13: એમાઇન", "difficulty": "Hard", "num": 2}, {"question": "એમાઇન સંયોજનોના વિદ્યુત ચાલકતા વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) એમાઇન સંયોજનો પોતે વિદ્યુતના સારા ચાલક હોય છે.", "B) એમાઇન સંયોજનોના લવણો પાણીમાં દ્રાવ્ય હોવા છતાં વિદ્યુતના કોઈ ચાલક નથી.", "C) એમાઇન સંયોજનોના લવણો પાણીમાં દ્રાવ્ય હોય છે અને વિદ્યુતના સારા ચાલક હોય છે.", "D) એમાઇન સંયોજનો અને તેમના લવણો બંને વિદ્યુતના કોઈ ચાલક ન , "correct": 0, "explanation": "પ્રાથમિક એમાઇનમાં આંતર-અણુ હાઇડ્રોજન બંધન જોવા મળતું નથી, પરંતુ આંતર-અણુ હાઇડ્રોજન બંધન દ્વિતીયક એમાઇનમાં જોવા મળે છે. તૃતીયક એમાઇનમાં હાઇડ્રોજન બંધન બનવાની શક્યતા નથી કારણ કે તેની પાસે હાઇડ્રોજન ડોનર ગ્રુપ નથી. એમાઇન અને પાણી વચ્ચે હાઇડ્રોજન બંધન બનવું શક્ય છે.", "ncert_ref": "Class XII - Chapter 13: એમાઇન", "difficulty": "Hard", "num": 6}, {"question": "એમાઇન સંયોજનોના દ્રાવ્યતા ક્રમ વિશે નીચેનામાંથી કયો વિકલ્પ યોગ્ય છે?", "options": ["A) પ્રાથમિક > દ્વિતીયક > તૃતીયક", "B) તૃતીયક > દ્વિતીયક > પ્રાથમિક", "C) દ્વિતીયક > તૃતીયક > પ્રાથમિક", "D) પ્રાથમિક > તૃતીયક > દ્વિતીયક"], "correct": 0, "explanation": "એમાઇનની દ્રાવ્યતા હાઇડ્રોજન બંધન બનાવવાની ક્ષમતા પર આધાર રાખે છે. પ્રાથમિક એમાઇનમાં સૌથી વધુ હાઇડ્રોજન બંધન બનવાની ક્ષમતા હોવાથી તે સૌથી વધુ દ્રાવ્ય હોય છે, ત્યારબાદ દ્વિતીયક અને પછી તૃતીયક એમાઇન આવે છે.", "ncert_ref": "Class XII - Chapter 13: એમાઇન", "difficulty": "Hard", "num": 7}, {"question": "એમાઇન સંયોજનોના વરાળ દબાણ વિશે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "options": ["A) એમાઇનનું વરાળ દબાણ પાણી કરતાં ઓછું હોય છે.", "B) એમાઇનમાં હાઇડ્રોજન બંધન હોવાથી વરાળ દબાણ ઘટે છે.", "C) તૃતીયક એમાઇનનું વરાળ દબાણ પ્રાથમિક એમાઇન કરતાં ઓછું હોય છે.", "D) એમાઇનનું વરાળ દબાણ તાપમાન વધારવાથી ઘટે છે."], "correct": 3, "explanation": "એમાઇનનું વરાળ દબાણ તાપમાન વધારવાથી વધે છે, નહીં કે ઘટે. એમાઇનનું વરાળ દબાણ પાણી કરતાં ઓછું હોય છે કારણ કે એમાઇનમાં હાઇડ્રોજન બંધન હોવાથી અણુઓ વચ્ચેનું આકર્ષણ વધુ હોય છે. તૃતીયક એમાઇનમાં હાઇડ્રોજન બંધન ન હોવાથી તેનું વરાળ દબાણ પ્રાથમિક એમાઇન કરતાં વધુ હોય છે.", "ncert_ref": "Class XII - Chapter 13: એમાઇન", "difficulty": "Hard", "num": 8}, {"question": "એમાઇન સંયોજનોના ગલનબિંદુ વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) એરોમેટિક એમાઇનનું ગલનબિંદુ એલિફેટિક એમાઇન કરતાં વધુ હોય છે.", "B) પ્રાથમિક એમાઇનનું ગલનબિંદુ દ્વિતીયક એમાઇન કરતાં ઓછું હોય છે.", "C) એમાઇનનું ગલનબિંદુ હાઇડ્રોજન બંધનની હાજરીથી વધે છે.", "D) તૃતીયક એમાઇનનું ગલનબિંદુ પ્રાથમિક એમાઇન કરતાં ઓછું હોય છે."], "correct": 1, "explanation": "પ્રાથમિક એમાઇનનું ગલનબિંદુ દ્વિતીયક એમાઇન કરતાં વધુ હોય છે કારણ કે પ્રાથમિક એમાઇનમાં હાઇડ્રોજન બંધન બનવાની ક્ષમતા વધુ હોય છે. એરોમેટિક એમાઇનનું ગલનબિંદુ એલિફેટિક એમાઇન કરતાં વધુ હોય છે કારણ કે એરોમેટિક રિંગની હાજરીથી અણુઓ વચ્ચેનું આકર્ષણ વધે છે. તૃતીયક એમાઇનમાં હાઇડ્રોજન બંધન ન હોવાથી તેનું ગલનબિંદુ પ્રાથમિક એમાઇન કરતાં ઓછું હોય છે.", "ncert_ref": "Class XII - Chapter 13: એમાઇન", "difficulty": "Hard", "num": 9}, {"question": "એમાઇન સંયોજનોના ભૌતિક ગુણધર્મો વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) એમાઇન સંયોજનો સૌથી ઓછા ધ્રુવીય હોય છે.", "B) એમાઇન સંયોજનોના દ્રાવણો દબાણ-અવશોષક ગુણધર્મ દર્શાવે છે.", "C) એમાઇન સંયોજનોનું વરાળ દબાણ પાણી કરતાં વધુ હોય છે.", "D) એમાઇન સંયોજનોનું ગલનબિંદુ એલ્કોહોલ કરતાં ઓછું હોય છે."], "correct": 1, "explanation": "એમાઇન સંયોજનોના દ્રાવણો દબાણ-અવશોષક ગુણધર્મ દર્શાવે છે કારણ કે એમાઇન અણુઓ હાઇડ્રોજન બંધન દ્વારા જોડાયેલા હોય છે, જે દ્રાવણની વરાળ દબાણ ઘટાડે છે. એમાઇન સંયોજનો ધ્રુવીય હોય છે, તેનું વરાળ દબાણ પાણી કરતાં ઓછું હોય છે, અને તેનું ગલનબિંદુ એલ્કોહોલ કરતાં વધુ હોય છે.", "ncert_ref": "Class XII - Chapter 13: એમાઇન", "difficulty": "Hard", "num": 10}, {"question": "એમાઇન સંયોજનોના હાઇડ્રોજન બંધનની સંખ્યા અને તેમના ગલનબિંદુ વચ્ચેનો સંબંધ જણાવતું નીચેનામાંથી કયું વિધાન યોગ્ય છે?", "options": ["A) હાઇડ્રોજન બંધનની સંખ્યા વધતાં ગલનબિંદુ ઘટે છે, કારણ કે અણુઓ વચ્ચેના આંતરઅણુ બળો ઓછા થાય છે.", "B) હાઇડ્રોજન બંધનની સંખ્યા વધતાં ગલનબિંદુ વધે છે, કારણ કે અણુઓ વચ્ચેના આંતરઅણુ બળો મજબૂત બને છે.", "C) હાઇડ્રોજન બંધનની સંખ્યા અને ગલનબિંદુ વચ્ચે કોઈ સંબંધ નથી, કારણ કે ગલનબિંદુ ફક્ત અણુના આકાર પર આધાર રાખે છે.", "D) હાઇડ્રોજન બંધનની સંખ્યા વધતાં ગલનબિંદુ સ્થિર રહે છે, કારણ કે હાઇડ્રોજન બંધન ગલનબિંદુને અસર કરતાં નથી."], "correct": 1, "explanation": "હાઇડ્રોજન બંધનની સંખ્યા વધવાથી અણુઓ વચ્ચેના આંતરઅણુ બળો મજબૂત બને છે, જેના કારણે ગલનબિંદુ વધે છે. વિકલ્પ A ખોટો છે કારણ કે હાઇડ્રોજન બંધન વધવાથી બળો મજબૂત થાય છે, નહીં કે ઓછા. વિકલ્પ C ખોટો છે કારણ કે હાઇડ્રોજન બંધન અને ગલનબિંદુ વચ્ચે સીધો સંબંધ છે. વિકલ્પ D ખોટો છે કારણ કે હાઇડ્રોજન બંધન ગલનબિંદુને અસર કરે છે.", "ncert_ref": "Class XII - Chapter 12: એલડિહાઇડ, કિટોન અને કાર્બોક્સિલિક એસિડ", "difficulty": "Hard", "num": 11}, {"question": "એમાઇન સંયોજનોના દ્રાવ્યતાના ક્રમ વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) મિથેઇલએમાઇન > ડાઇમિથેઇલએમાઇન > ટ્રાઇમિથેઇલએમાઇન > એનિલિન", "B) એનિલિન > મિથેઇલએમાઇન > ડાઇમિથેઇલએમાઇન > ટ્રાઇમિથેઇલએમાઇન", "C) ટ્રાઇમિથેઇલએમાઇન > ડાઇમિથેઇલએમાઇન > મિથેઇલએમાઇન > એનિલિન", "D) ડાઇમિથેઇલએમાઇન > મિથેઇલએમાઇન > ટ્રાઇમિથેઇલએમાઇન > એનિલિન"], "correct": 2, "explanation": "ટ્રાઇમિથેઇલએમાઇનમાં હાઇડ્રોજન બંધન બનાવવાની ક્ષમતા ઓછી હોવાથી તે પાણીમાં ઓછું દ્રાવ્ય હોય છે, જ્યારે એનિલિનમાં હાઇડ્રોજન બંધન બનાવવાની ક્ષમતા વધુ હોવાથી તે પાણીમાં વધુ દ્રાવ્ય હોય છે. વિકલ્પ A, B, અને D ખોટા છે કારણ કે તેઓ દ્રાવ્યતાના યોગ્ય ક્રમને દર્શાવતાં નથી.", "ncert_ref": "Class XII - Chapter 13: એમાઇન", "difficulty": "Hard", "num": 12}, {"question": "એમાઇન સંયોજનોના ભૌતિક ગુણધર્મો વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) પ્રાથમિક એમાઇન ઓરડાના તાપમાને વાયુ સ્વરૂપે હોય છે.", "B) દ્વિતીયક એમાઇન ઓરડાના તાપમાને પ્રવાહી સ્વરૂપે હોય છે.", "C) તૃતીયક એમાઇન ઓરડાના તાપમાને ઘન સ્વરૂપે હોય છે.", "D) એરોમેટિક એમાઇન ઓરડાના તાપમાને પ્રવાહી અથવા ઘન સ્વરૂપે હોય છે."], "correct": 2, "explanation": "તૃતીયક એમાઇન ઓરડાના તાપમાને પ્રવાહી સ્વરૂપે હોય છે, ઘન સ્વરૂપે નહીં. વિકલ્પ A, B, અને D સત્ય છે કારણ કે પ્રાથમિક એમાઇન (જેમ કે મિથેઇલએમાઇન) વાયુ સ્વરૂપે, દ્વિતીયક એમાઇન (જેમ કે ડાઇમિથેઇલએમાઇન) પ્રવાહી સ્વરૂપે, અને એરોમેટિક એમાઇન (જેમ કે એનિલિન) પ્રવાહી અથવા ઘન સ્વરૂપે હોય છે.", "ncert_ref": "Class XII - Chapter 13: એમાઇન", "difficulty": "Hard", "num": 13}, {"question": "નીચેના એમાઇન સંયોજનો પૈકી કયું સંયોજન પાણીમાં સૌથી ઓછી દ્રાવ્યતા ધરાવે છે અને તેનું કારણ શું છે?\n(1) મિથાઇલએમાઇન\n(2) ડાઇમિથાઇલએમાઇન\n(3) ટ્રાઇમિથાઇલએમાઇન\n(4) એનિલિન", "options": ["A) (3), કારણ કે તેમાં હાઇડ્રોજન બંધન બનાવવા માટે N-H બંધનો અભાવ છે", "B) (4), કારણ કે તેમાં બેન્ઝિન વલયની હાજરીને લીધે ધ્રુવીયતા ઘટે છે", "C) (2), કારણ કે તેમાં બે મિથાઇલ સમૂહોની હાજરીને લીધે અવકાશીય અવરોધ વધે છે", "D) (1), કારણ કે તે         let userAnswers = {};

        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;

                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });

            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
