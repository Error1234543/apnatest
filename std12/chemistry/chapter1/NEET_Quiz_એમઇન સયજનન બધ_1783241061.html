<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - એમાઇન સંયોજનોનું બંધારણ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 એમાઇન સંયોજનોનું બંધારણ</span>
                <span>🎯 Hard</span>
                <span>📝 30 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "એમાઇન સંયોજનોના બંધારણ વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) એમાઇનમાં કાર્બન, હાઇડ્રોજન, ઓક્સિજન અને નાઇટ્રોજન હાજર હોય છે, પરંતુ સલ્ફર ક્યારેય હાજર નથી.", "B) એમાઇનમાં પેપ્ટાઇડ બંધ (–CO–NH–) હાજર હોય છે, જે પ્રોટીનના પ્રાથમિક બંધારણને નક્કી કરે છે.", "C) એમાઇનમાં કર્બોક્સિલ સમૂહ (–COOH) અને એમાઇન સમૂહ (–NH₂) હંમેશા એક જ કાર્બન પર જોડાયેલા હોય છે.", "D) એમાઇનમાં કેટો સમૂહ (–C=O) અને હાઇડ્રોક્સિલ સમૂહ (–OH) હાજર હોય છે, જે તેને એમિનો એસિડ બનાવે છે."], "correct": 1, "explanation": "વિકલ્પ B સત્ય છે કારણ કે એમાઇન (એમિનો એસિડ)માં પેપ્ટાઇડ બંધ (–CO–NH–) હાજર હોય છે, જે પ્રોટીનના પ્રાથમિક બંધારણને નક્કી કરે છે. વિકલ્પ A ખોટો છે કારણ કે કેટલાક એમાઇનમાં સલ્ફર (જેમ કે સિસ્ટીન) હાજર હોય છે. વિકલ્પ C ખોટો છે કારણ કે એમાઇન સમૂહ અને કર્બોક્સિલ સમૂહ અલગ કાર્બન પર જોડાયેલા હોય છે (α-કાર્બન). વિકલ્પ D ખોટો છે કારણ કે એમાઇન એમિનો એસિડ છે, પરંતુ કેટો અને હાઇડ્રોક્સિલ સમૂહ તેના મૂળભૂત બંધારણનો ભાગ નથી.", "ncert_ref": "Class XII - પ્રકરણ 14: જૈવ-અણુઓ અને બાયોપોલિમર્સ", "difficulty": "Hard", "num": 1}, {"question": "નીચેનામાંથી કયું એમાઇન સંયોજન તેના બંધારણમાં બે એમાઇન સમૂહ ધરાવે છે?", "options": ["A) ગ્લાઇસિન", "B) લાઇસિન", "C) એસ્પાર્ટિક એસિડ", "D) વેલિન"], "correct": 1, "explanation": "લાઇસિન (B) તેના બંધારણમાં બે એમાઇન સમૂહ (–NH₂) ધરાવે છે: એક α-કાર્બન પર અને બીજું R-સમૂહમાં. ગ્લાઇસિન (A)માં એક જ એમાઇન સમૂહ છે, એસ્પાર્ટિક એસિડ (C)માં એક એમાઇન અને બે કર્બોક્સિલ સમૂહ છે, અને વેલિન (D)માં એક એમાઇન અને એક કર્બોક્સિલ સમૂહ છે.", "ncert_ref": "Class XII - પ્રકરણ 14: જૈવ-અણુઓ અને બાયોપોલિમર્સ", "difficulty": "Hard", "num": 2}, {"question": "એમાઇન એસિડના બંધારણ વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) એમાઇન એસિડમાં કર્બોક્સિલ સમૂહ અને એમાઇન સમૂહ હાજર હોય છે.", "B) એમાઇન એસિડમાં α-કાર્બન એ કિરાલ કાર્બન હોઈ શકે છે.", "C) એમાઇન એસિડમાં R-સમૂહ હંમેશા હાઇડ્રોફોબિક હોય છે.", "D) એમાઇન એસિડમાં પી.કે.એ. મૂલ્ય તેના આયનિકરણ પર આધાર રાખે છે."], "correct": 2, "explanation": "વિકલ્પ C ખોટો છે કારણ કે R-સમૂહ હાઇડ્રોફોબિક, હાઇડ્રોફિલિક, એસિડિક, બેસિક અથવા તટસ્થ હોઈ શકે છે. વિકલ્પ A, B, અને D સત્ય છે: એમાઇન એસિડમાં કર્બોક્સિલ અને એમાઇન સમૂહ હાજર હોય છે, α-કાર્બન કિરાલ હોઈ શકે છે, અને પી.કે.એ. મૂલ્ય આયનિકરણ પર આધાર રાખે છે.", "ncert_ref": "Class XII - પ્રકરણ 14: જૈવ-અણુઓ અને બાયોપોલિમર્સ", "difficulty": "Hard", "num": 3}, {"question": "નીચેનામાંથી કયું એમાઇન એસિડ તેના બંધારણમાં થાયોલ સમૂહ (–SH) ધરાવે છે?", "options": ["A) મિથાયોનિન", "B) સિસ્ટીન", "C) સેરિન", "D) ટાયરોસિન"], "correct": 1, "explanation": "સિસ્ટીન (B) તેના બંધારણમાં થાયોલ સમૂહ (–SH) ધરાવે છે. મિથાયોનિન (A)માં થાયોઇથર સમૂહ છે, સેરિન (C)માં હાઇડ્રોક્સિલ સમૂહ છે, અને ટાયરોસિન (D)માં ફિનોલિક સમૂહ છે.", "ncert_ref": "Class XII - પ્રકરણ 14: જૈવ-અણુઓ અને બાયોપોલિમર્સ", "difficulty": "Hard", "num": 4}, {"question": "એમાઇન એસિડના આયનિકરણ વિશે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "options": ["A) એમાઇન એસિડ pH 1 પર પૂર્ણપણે પ્રોટોનેટેડ હોય છે.", "B) એમાઇન એસિડ pH 7 પર જ્વલંત આયન (zwitterion) રૂપમાં હોય છે.", "C) એમાઇન એસિડ pH 14 પર પૂર્ણપણે ડીપ્રોટોનેટેડ હોય છે.", "D) એમાઇન એસિડનું આયનિકરણ pH પર આધાર રાખતું નથી."], "correct": 3, "explanation": "વિકલ્પ D ખોટો છે કારણ કે એમાઇન એસિડનું આયનિકરણ pH પર નિર્ભર રાખે છે. વિકલ્પ A, B, અને C સત્ય છે: pH 1 પર એમાઇન એસિડ પૂર્ણપણે પ્રોટોનેટેડ હોય છે, pH 7 પર જ્વલંત આયન રૂપમાં હોય છે, અને pH 14 પર પૂર્ણપણે ડીપ્રોટોનેટેડ હોય છે.", "ncert_ref": "Class XII - પ્રકરણ 14: જૈવ-અણુઓ અને બાયોપોલિમર્સ", "difficulty": "Hard", "num": 5}, {"question": "નીચેના પૈકી કયું સંયોજન પ્રાથમિક એમાઇન નથી, પરંતુ તેનું બંધારણ એમાઇન જેવું જ દેખાય છે અને તેને 'છદ્મ એમાઇન' તરીકે ઓળખવામાં આવે છે?", "options": ["A) એનિલિન (C₆H₅NH₂)", "B) યુરિયા (NH₂CONH₂)", "C) મિથાઇલ એમાઇન (CH₃NH₂)", "D) ડાઇમિથાઇલ એમાઇન ((CH₃)₂NH)"], "correct": 1, "explanation": "યુરિયા (NH₂CONH₂) એ કાર્બનિક સંયોજન છે જેમાં બે એમાઇન સમૂહ (-NH₂) કાર્બોનિલ સમૂહ (C=O) સાથે જોડાયેલા હોય છે. તે પ્રાથમિક એમાઇન નથી કારણ કે તેમાં કાર્બન એમાઇન સમૂહ સાથે સીધો જોડાયેલો નથી, પરંતુ તેનું બંધારણ એમાઇન જેવું દેખાય છે તેથી તેને 'છદ્મ એમાઇન' કહેવાય છે. એનિલિન અને મિથાઇલ એમાઇન પ્રાથમિક હ, અને એક હાઇડ્રોજન પરમાણુ સાથે જોડાયેલ હોવો જોઈએ. વિકલ્પ D ખોટો છે કારણ કે આ સંયોજન એરોમેટિક છે, એલિફેટિક નહીં.", "ncert_ref": "Class XII - Chapter 12: કાર્બનિક રસાયણશાસ્ત્રમાં નાઇટ્રોજન યુક્ત સંયોજનો", "difficulty": "Hard", "num": 19}, {"question": "નીચેના એમાઇન સંયોજનોના બંધારણો પર ધ્યાન આપો: I. CH₃-CH₂-NH-CH₃, II. (CH₃)₂N-CH₂-CH₃, III. CH₃-NH-CH₂-CH₂-NH₂. આમાંથી કયા સંયોજનો એમાઇનની પ્રતિક્રિયાશીલતા દર્શાવે છે જેમ કે એસિલીકરણ (acylation)?", "options": ["A) ફક્ત I અને II", "B) ફક્ત I અને III", "C) ફક્ત II અને III", "D) I, II, અને III"], "correct": 3, "explanation": "એમાઇન સંયોજનો એસિલીકરણ પ્રતિક્રિયામાં ભાગ લે છે, જેમાં એમાઇન સમૂહ (–NH₂) અથવા નાઇટ્રોજન પરમાણુ એસિલ સમૂહ સાથે પ્રતિક્રિયા કરે છે. વિકલ્પ I (CH₃-CH₂-NH-CH₃) અને વિકલ્પ II ((CH₃)₂N-CH₂-CH₃) દ્વિતીય એમાઇન છે, જે એસિલીકરણ પ્રતિક્રિયા દર્શાવે છે. વિકલ્પ III (CH₃-NH-CH₂-CH₂-NH₂) પ્રાથમિક એમાઇન છે, જે પણ એસિલીકરણ પ્રતિક્રિયા દર્શાવે છે. આથી, બધા જ વિકલ્પો એસિલીકરણ પ્રતિક્રિયા દર્શાવે છે.", "ncert_ref": "Class XII - Chapter 12: કાર્બનિક રસાયણશાસ્ત્રમાં નાઇટ્રોજન યુક્ત સંયોજનો", "difficulty": "Hard", "num": 20}, {"question": "એક સંયોજનનું બંધારણ નીચે મુજબ છે: CH₃-N(CH₃)-CH₂-CH₂-NH₂. આ સંયોજન માટે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) આ સંયોજનમાં બે ભિન્ન પ્રકારના એમાઇન સમૂહ છે.", "B) આ સંયોજન તૃતીયક એમાઇન અને પ્રાથમિક એમાઇન બંને ધરાવે છે.", "C) આ સંયોજનનું આણ્વીય સૂત્ર C₄H₁₂N₂ છે.", "D) આ સંયોજનમાં માત્ર એક જ પ્રકારનો એમાઇન સમૂહ છે."], "correct": 3, "explanation": "સાચો જવાબ વિકલ્પ D છે કારણ કે આ સંયોજનમાં બે ભિન્ન પ્રકારના એમાઇન સમૂહ છે: એક તૃતીયક એમાઇન (CH₃-N(CH₃)-) અને એક પ્રાથમિક એમાઇન (-NH₂). વિકલ્પ A, B અને C સાચા છે કારણ કે સંયોજનમાં બે ભિન્ન એમાઇન સમૂહ છે અને તેનું આણ્વીય સૂત્ર C₄H₁₂N₂ છે.", "ncert_ref": "ક્લાસ 12 - પ્રકરણ 13: કાર્બનિક સંયોજનોમાં નાઇટ્રોજન", "difficulty": "Hard", "num": 21}, {"question": "એક સંયોજનનું બંધારણ નીચે મુજબ છે: CH₃-CH(NH₂)-CH₂-COOH. આ સંયોજન માટે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "options": ["A) આ સંયોજન એક એમિનો એસિડ છે.", "B) આ સંયોજનમાં પ્રાથમિક એમાઇન સમૂહ છે.", "C) આ સંયોજનમાં માત્ર એક જ કાર્બન પરમાણુ કાઇરલ છે.", "D) આ સંયોજનમાં બે કાર્બન પરમાણુ કાઇરલ છે."], "correct": 3, "explanation": "સાચો જવાબ વિકલ્પ D છે કારણ કે આ સંયોજનમાં માત્ર એક જ કાર્બન પરમાણુ (CH(NH₂)) કાઇરલ છે. વિકલ્પ A, B અને C સાચા છે કારણ કે આ સંયોજન એક એમિનો એસિડ છે અને તેમાં પ્રાથમિક એમાઇન સમૂહ છે.", "ncert_ref": "ક્લાસ 12 - પ્રકરણ 14: બાયોમોલેક્યુલ્સ", "difficulty": "Hard", "num": 22}, {"question": "એક સંયોજનનું બંધારણ નીચે મુજબ છે: CH₃-CH₂-N(CH₃)-CH₂-CH₂-NH-CH₃. આ સંયોજન માટે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) આ સંયોજનમાં બે જુદા-જુદા એમાઇન સમૂહો છે: એક તૃતીયક અને એક દ્વિતીયક.", "B) આ સંયોજનનું આણ્વીય સૂત્ર C₆H₁₆N₂ છે.", "C) આ સંયોજનમાં એક પણ પ્રાથમિક એમાઇન સમૂહ નથી.", "D) આ સંયોજનનું IUPAC નામ N-મિથાઇલ-N-ઇથાઇલ-1,4-બ્યુટેનડાઇએમાઇન છે."], "correct": 3, "explanation": "આ સંયોજનનું સાચું IUPAC નામ **N¹-મિથાઇલ-N⁴-ઇથાઇલ-1,4-બ્યુટેનડાઇએમાઇન** છે, કારણ કે બંને એમાઇન સમૂહોને સમાન મહત્ત્વ આપવામાં આવે છે અને તેમને નંબર આપવામાં આવે છે. વિકલ્પ D ખોટો છે કારણ કે તેમાં એમાઇન સમૂહોને યોગ્ય રીતે નંબર આપવામાં આવ્યા નથી. વિકલ્પ A, B અને C સાચા છે: સંયોજનમાં એક તૃતીયક એમાઇન (N(CH₃)) અને એક દ્વિતીયક એમાઇન (NH-CH₃) છે, આણ્વીય સૂત્ર C₆H₁₆N₂ છે, અને તેમાં પ્રાથમિક એમાઇન સમૂહ નથી. **NCERT Class 12 - Chapter 13: એમાઇન સંયોજનો** માં એમાઇન સંયોજનોના નામકરણના નિયમો સમજાવવામાં આવ્યા છે.", "ncert_ref": "Class XII - અધ્યાય 13: એમાઇન સંયોજનો", "difficulty": "Hard", "num": 23}, {"question": "નીચેના એમાઇન સંયોજનના બંધારણ પર ધ્યાન આપો: CH3-CH2-NH-C6H4-OH (પેરા-સ્થાન). આ સંયોજન વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) આ સંયોજન પ્રાથમિક એમાઇન છે અને તેના બંધારણમાં ફિનોલિક હાઇડ્રોક્સિલ સમૂહ છે.", "B) આ સંયોજન દ્વિતીય એમાઇન છે અને તેના બંધારણમાં એરોમેટિક વલય નથી.", "C) આ સંયોજન તૃતીય એમાઇન છે અને તેના બંધારણમાં કર્બોક્સિલિક એસિડ સમૂહ છે.", "D) આ સંયોજન ક્વોટરનરી એમોનિયમ આયન છે અને તેના બંધારણમાં નાઇટ્રો સમૂહ છે."], "correct": 0, "explanation": "આ સંયોજન CH3-CH2-NH-C6H4-OH (પેરા-સ્થાન) પ્રાથમિક એમાઇન છે કારણ કે નાઇટ્રોજન પરમાણુ બે હાઇડ્રોજન પરમાણુઓ સાથે જોડાયેલ નથી (એક એલ્કાઇલ સમૂહ અને એક એરિલ સમૂહ સાથે જોડાયેલ છે). તેના બંધારણમાં ફિનોલિક હાઇડ્રોક્સિલ સમૂહ (-OH) એરોમેટિક વલય સાથે જોડાયેલ છે. અ) વિધાન સત્ય છે. બ) ખોટું છે કારણ કે એરોમેટિક વલય હાજર છે. ક) ખોટું છે કારણ કે તે પ્રાથમિક એમાઇન છે અને કર્બોક્સિલિક એસિડ સમૂહ નથી. ડ) ખોટું છે કારણ કે તે ક્વોટરનરી એમોનિયમ આયન નથી અને નાઇટ્રો સમૂહ નથી.", "ncert_ref": "Class XII - Chapter 13: કાર્બનિક રસાયણશાસ્ત્રના મૂળ તત્વો - એમાઇન", "difficulty": "Hard", "num": 24}, {"question": "નીચેના એમાઇન સંયોજનના બંધારણ પર ધ્યાન આપો: CH3-CH2-NH-C6H4-NO2 (મેટા-સ્થાન). આ સંયોજન વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) આ સંયોજન પ્રાથમિક એમાઇન છે અને તેનું આણ્વીય સૂત્ર C8H10N2O2 છે.", "B) આ સંયોજન દ્વિતીયક એમાઇન છે અને તે નાઇટ્રો સમૂહની હાજરીથી એસિડિક ગુણધર્મ દર્શાવે છે.", "C) આ સંયોજન તૃતીયક એમાઇન છે અને તે પાણીમાં અદ્રાવ્ય છે.", "D) આ સંયોજનમાં એમાઇન સમૂહ અને નાઇટ્રો સમૂહ વચ્ચે હાઇડ્રોજન બંધ બનતો નથી."], "correct": 1, "explanation": "આ સંયોજનમાં, NH સમૂહ એલ્કાઇલ સમૂહ (CH3-CH2-) અને એરિલ સમૂહ (C6H4-NO2) વચ્ચે જોડાયેલ છે, જે તેને દ્વિતીયક એમાઇન બનાવે છે. નાઇટ્રો સમૂહ (–NO2) એલેક્ટ્રોન-આકર્ષક હોવાથી, તે એમાઇન હાઇડ્રોજનને વધુ ધ્રુવીય બનાવે છે, જેથી તે એસિડિક ગુણધર્મ દર્શાવે છે. વિકલ્પ A ખોટો છે કારણ કે આ સંયોજન દ્વિતીયક એમાઇન છે, પ્રાથમિક નહીં. વિકલ્પ C ખોટો છે કારણ કે આ સંયોજન તૃતીયક એમાઇન નથી. વિકલ્પ D ખોટો છે કારણ કે એમાઇન સમૂહ અને નાઇટ્રો સમૂહ વચ્ચે હાઇડ્રોજન બંધ બની શકે છે.", "ncert_ref": "Class XII - Chapter 13: એમાઇન", "difficulty": "Hard", "num": 25}, {"question": "નીચેના એમાઇન સંયોજનના બંધારણ પર ધ્યાન આપો: CH3-CH2-NH-C6H4-COOH (ઓર્થો-સ્થાન). આ સંયોજન વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) આ સંયોજન પ્રાથમિક એમાઇન છે અને તેનું ઉત્કલનબિંદુ નીચું હોય છે.", "B) આ સંયોજન દ્વિતીય એમાઇન છે અને તે પાણીમાં અવલોકનીય પ્રમાણમાં દ્રાવ્ય હોય છે.", "C) આ સંયોજન તૃતીય એમાઇન છે અને તે એસિડિક ગુણધર્મ દર્શાવે છે.", "D) આ સંયોજન ક્વોટરનરી એમાઇન છે અને તે ન્યૂટ્રલ ગુણધર્મ દર્શાવે છે."], "correct": 1, "explanation": "આ સંયોજન દ્વિતીય એમાઇન છે કારણ કે નાઇટ્રોજન પરમાણુ બે કાર્બન સમૂહો (CH3-CH2- અને C6H4-COOH-) સાથે જોડાયેલ છે. ઓર્થો-સ્થાને COOH સમૂહ હાજર હોવાથી, આ સંયોજન હાઇડ્રોજન બંધ રચના કરવા સક્ષમ છે, જેના કારણે તે પાણીમાં અવલોકનીય પ્રમાણમાં દ્રાવ્ય હોય છે. વિકલ્પ A ખોટો છે કારણ કે આ સંયોજન પ્રાથમિક એમાઇન નથી. વિકલ્પ C ખોટો છે કારણ કે આ સંયોજન તૃતીય એમાઇન નથી અને એસિડિક ગુણધર્મ COOH સમૂહના કારણે હોય છે, પરંતુ એમાઇન સમૂહના કારણે તે એસિડિક નથી. વિકલ્પ D ખોટો છે કારણ કે આ સંયોજન ક્વોટરનરી એમાઇન નથી.", "ncert_ref": "Class XII - Chapter 13: કાર્બનિક સંયોજનોમાં નાઇટ્રોજન ધરાવતા સંયોજનો", "difficulty": "Hard", "num": 26}, {"question": "નીચેના એમાઇન સંયોજનના બંધારણ પર ધ્યાન આપો: (CH3)2N-CH2-CH2-NH2. આ સંયોજન વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) આ સંયોજનમાં પ્રાથમિક અને દ્વિતીય એમાઇન સમૂહ બંને હાજર છે.", "B) આ સંયોજન પાણીમાં દ્રાવ્ય હોય છે અને તેનું ઉત્કલનબિંદુ ઉચ્ચ હોય છે.", "C) આ સંયોજન એસિડ સાથે પ્રક્રિયા કરીને એમાઇન લવણ બનાવે છે.", "D) આ સંયોજન કેટોન સાથે પ્રક્રિયા કરીને ઇમાઇન બનાવે છે."], "correct": 3, "explanation": "આ સંયોજનમાં પ્રાથમિક (NH2) અને દ્વિતીય (N(CH3)2) એમાઇન સમૂહ બંને હાજર છે, જેથી વિકલ્પ A સત્ય છે. એમાઇન સમૂહો હાઇડ્રોજન બંધ રચના કરવા સક્ષમ હોવાથી, આ સંયોજન પાણીમાં દ્રાવ્ય હોય છે અને તેનું ઉત્કલનબિંદુ ઉચ્ચ હોય છે, જેથી વિકલ્પ B સત્ય છે. એમાઇન એસિડ સાથે પ્રક્રિયા કરીને એમાઇન લવણ બનાવે છે, જેથી વિકલ્પ C સત્ય છે. પરંતુ, પ્રાથમિક એમાઇન કેટોન સાથે પ્રક્રિયા કરીને ઇમાઇન બનાવે છે, પરંતુ દ્વિતીય એમાઇન ઇમાઇન બનાવતું નથી, જેથી વિકલ્પ D ખોટો છે.", "ncert_ref": "Class XII - Chapter 13: કાર્બનિક સંયોજનોમાં નાઇટ્રોજન ધરાવતા સંયોજનો", "difficulty": "Hard", "num": 27}, {"question": "નીચેના એમાઇન સંયોજનના બંધારણ પર ધ્યાન આપો: C6H5-NH-CH(CH3)-COOH. આ સંયોજન વિશે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "options": ["A) આ સંયોજન એરોમેટિક એમાઇન છે અને તેનું બંધારણમાં કિરાલ કાર્બન પરમાણુ હાજર છે.", "B) આ સંયોજન એસિડિક અને બેઝિક બંને ગુણધર્મ દર્શાવે છે.", "C) આ સંયોજન પાણીમાં અદ્રાવ્ય હોય છે અને તેનું ઉત્કલનબિંદુ નીચું હોય છે.", "D) આ સંયોજન એસિડ સાથે પ્રક્રિયા કરીને લવણ બનાવે છે અને બેઇઝ સાથે પ્રક્રિયા કરીને લવણ બનાવે છે."], "correct": 2, "explanation": "આ સંયોજન એરોમેટિક એમાઇન છે અને તેના બંધારણમાં કિરાલ કાર્બન પરમાણુ (CH(CH3)) હાજર છે, જેથી વિકલ્પ A સત્ય છે. આ સંયોજન એસિડિક (COOH સમૂહના કારણે) અને બેઝિક (NH સમૂહના કારણે) બંને ગુણધર્મ દર્શાવે છે, જેથી વિકલ્પ B સત્ય છે. આ સંયોજન એસિડ અને બેઇઝ બંને સાથે પ્રક્રિયા કરીને લવણ બનાવે છે, જેથી વિકલ્પ D સત્ય છે. પરંતુ, એરોમેટિક એમાઇન અને કર્બોક્સિલિક એસિડ સમૂહ હાજર હોવાથી, આ સંયોજન પાણીમાં દ્રાવ્ય હોય છે અને તેનું ઉત્કલનબિંદુ ઉચ્ચ હોય છે, જેથી વિકલ્પ C ખોટો છે.", "ncert_ref": "Class XII - Chapter 13: કાર્બનિક સંયોજનોમાં નાઇટ્રોજન ધરાવતા સંયોજનો", "difficulty": "Hard", "num": 28}, {"question": "નીચેના એમાઇન સંયોજનના બંધારણ પર ધ્યાન આપો: CH3-CH2-NH-C6H4-SO3H (પેરા-સ્થાન). આ સંયોજન વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) આ સંયોજન પ્રાથમિક એમાઇન છે અને તેનું ઉત્કલનબિંદુ નીચું હોય છે.", "B) આ સંયોજન દ્વિતીય એમાઇન છે અને તે પાણીમાં અદ્રાવ્ય હોય છે.", "C) આ સંયોજન તૃતીય એમાઇન છે અને તે એસિડિક ગુણધર્મ દર્શાવે છે.", "D) આ સંયોજન ક્વોટરનરી એમાઇન છે અને તે ન્યૂટ્રલ ગુણધર્મ દર્શાવે છે."], "correct": 0, "explanation": "આ સંયોજન પ્રાથમિક એમાઇન છે કારણ કે નાઇટ્રોજન પરમાણુ એક કાર્બન સમૂહ (CH3-CH2-) અને એક હાઇડ્રોજન પરમાણુ સાથે જોડાયેલ છે. SO3H સમૂહ હાજર હોવાથી, આ સંયોજન પાણીમાં દ્રાવ્ય હોય છે અને તેનું ઉત્કલનબિંદુ ઉચ્ચ હોય છે, પરંતુ વિકલ્પ Aમાં ઉત્કલનબિંદુ નીચું હોવાનું જણાવવામાં આવ્યું છે, જે ખોટું છે. પરંતુ, વિકલ્પ Aમાં પ્રાથમિક એમાઇન હોવાનું સત્ય છે, જ્યારે અન્ય વિકલ્પો ખોટા છે. વિકલ્પ B ખોટો છે કારણ કે આ સંયોજન દ્વિતીય એમાઇન નથી અને પાણીમાં દ્રાવ્ય હોય છે. વિકલ્પ C ખોટો છે કારણ કે આ સંયોજન તૃતીય એમાઇન નથી અને એસિડિક ગુણધર્મ SO3H સમૂહના કારણે હોય છે, પરંતુ એમાઇન સમૂહના કારણે તે એસિડિક નથી. વિકલ્પ D ખોટો છે કારણ કે આ સંયોજન ક્વોટરનરી એમાઇન નથી.", "ncert_ref": "Class XII - Chapter 13: કાર્બનિક સંયોજનોમાં નાઇટ્રોજન ધરાવતા સંયોજનો", "difficulty": "Hard", "num": 29}, {"question": "નીચેના એમાઇન સંયોજનના બંધારણ પર ધ્યાન આપો: (CH3)3C-NH-CH2-C6H5. આ સંયોજન વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) આ સંયોજન પ્રાથમિક એમાઇન છે અને તેનું ઉત્કલનબિંદુ ઉચ્ચ હોય છે.", "B) આ સંયોજન દ્વિતીય એમાઇન છે અને તે પાણીમાં અવલોકનીય પ્રમાણમાં દ્રાવ્ય હોય છે.", "C) આ સંયોજન તૃતીય એમાઇન છે અને તે એસિડિક ગુણધર્મ દર્શાવે છે.", "D) આ સંયોજન ક્વોટરનરી એમાઇન છે અને તે ન્યૂટ્રલ ગુણધર્મ દર્શાવે છે."], "correct": 1, "explanation": "આ સંયોજન દ્વિતીય એમાઇન છે કારણ કે નાઇટ્રોજન પરમાણુ બે કાર્બન સમૂહો ((CH3)3C- અને CH2-C6H5) સાથે જોડાયેલ છે. એરોમેટિક રિંગ હાજર હોવાથી, આ સંયોજન પાણીમાં અવલોકનીય પ્રમાણમાં દ્રાવ્ય હોય છે. વિકલ્પ A ખોટો છે કારણ કે આ સંયોજન પ્રાથમિક એમાઇન નથી. વિકલ્પ C ખોટો છે કારણ કે આ સંયોજન તૃતીય એમાઇન નથી અને એસિડિક ગુણધર્મ દર્શાવતું નથી. વિકલ્પ D ખોટો છે કારણ કે આ સંયોજન ક્વોટરનરી એમાઇન નથી.", "ncert_ref": "Class XII - Chapter 13: કાર્બનિક સંયોજનોમાં નાઇટ્રોજન ધરાવતા સંયોજનો", "difficulty": "Hard", "num": 30}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
