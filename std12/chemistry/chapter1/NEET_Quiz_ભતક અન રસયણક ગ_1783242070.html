<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - ભૌતિક અને રાસાયણિક ગુણધર્મો</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 ભૌતિક અને રાસાયણિક ગુણધર્મો</span>
                <span>🎯 Hard</span>
                <span>📝 30 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "જ્યારે કોષને હાઇપોટોનિક દ્રાવણમાં મૂકવામાં આવે છે, ત્યારે તેના કોષરસપટલ પર શું થાય છે?", "options": ["A) કોષરસપટલ કોષના અંદરની તરફ દબાણ કરે છે અને કોષ સંકોચાય છે.", "B) પાણી કોષમાં પ્રવેશે છે અને કોષ ફૂલે છે, પરંતુ કોષરસપટલ ટકી રહે છે.", "C) કોષરસપટલ ફાટી જાય છે અને કોષ નાશ પામે છે.", "D) કોષરસપટલ પર કોઈ ફેરફાર થતો નથી, કારણ કે કોષ દ્રાવણ સાથે સંતુલનમાં હોય છે."], "correct": 1, "explanation": "હાઇપોટોનિક દ્રાવણમાં પાણીની સાંદ્રતા કોષની અંદર કરતાં ઓછી હોય છે, જેથી પાણી કોષમાં પ્રવેશે છે અને કોષ ફૂલે છે (પ્લાસ્મોલિસિસ નહીં, પરંતુ ટર્ગર પ્રેશર વધે છે). કોષરસપટલ લવચીક હોય છે, જેથી તે ટકી રહે છે. વિકલ્પ A સંકોચન (હાઇપરટોનિક દ્રાવણમાં થાય) વર્ણવે છે. વિકલ્પ C પ્લાસ્મોપ્ટોસિસ વર્ણવે છે, જે માત્ર પશુકોષોમાં થાય છે (વનસ્પતિ કોષોમાં કોષભિત્તિ હોવાથી ફાટતું નથી). વિકલ્પ D આઇસોટોનિક દ્રાવણની સ્થિતિ વર્ણવે છે.", "ncert_ref": "Class XI - પ્રકરણ 5: કોષ: જીવનની મૂળ એકમ", "difficulty": "Hard", "num": 1}, {"question": "નીચેનામાંથી કયો ગુણધર્મ પ્રોટીન અને કાર્બોદિત બંનેમાં સામાન્ય છે?", "options": ["A) તેઓ બંનેમાં એમાઇનો એસિડની શૃંખલા ધરાવે છે.", "B) તેઓ બંનેમાં હાઇડ્રોક્સિલ સમૂહ ધરાવે છે.", "C) તેઓ બંનેમાં ગ્લાઇકોસિડિક બંધ ધરાવે છે.", "D) તેઓ બંનેમાં પોલિમર હોય છે અને હાઇડ્રોલિસિસથી મોનોમરમાં તૂટી શકે છે."], "correct": 3, "explanation": "પ્રોટીન એમાઇનો એસિડના પોલિમર હોય છે અને કાર્બોદિત ગ્લુકોઝ જેવા મોનોસેકેરાઇડના પોલિમર હોય છે. બંનેમાં હાઇડ્રોલિસિસથી મોનોમરમાં તૂટી શકે છે. વિકલ્પ A ખોટો છે કારણ કે કાર્બોદિતમાં એમાઇનો એસિડ નથી. વિકલ્પ B ખોટો છે કારણ કે પ્રોટીનમાં હાઇડ્રોક્સિલ સમૂહ હોવો જરૂરી નથી (ઉદા. ગ્લાઇસીન). વિકલ્પ C ખોટો છે કારણ કે પ્રોટીનમાં ગ્લાઇકોસિડિક બંધ નથી, પરંતુ પેપ્ટાઇડ બંધ હોય છે.", "ncert_ref": "Class XI - પ્રકરણ 9: બાયોમોલેક્યુલ્સ", "difficulty": "Hard", "num": 2}, {"question": "એક વનસ્પતિ કોષમાં ક્લોરોપ્લાસ્ટ અને માઇટોકોન્ડ્રિયા બંનેમાં કયા રાસાયણિક પ્રક્રિયાનું સ્થાન છે?", "options": ["A) પ્રકાશસંશ્લેષણ અને શ્વસન", "B) ક્રેબ્સ ચક્ર અને કેલ્વિન ચક્ર", "C) ગ્લાયકોલિસિસ અને ઓક્સિડેટિવ ફોસ્ફોરાઇલેશન", "D) ATP સિંથેસ અને NADP+ રિડક્શન"], "correct": 1, "explanation": "ક્લોરોપ્લાસ્ટમાં કેલ્વિન ચક્ર (પ્રકાશસંશ્લેષણનો અંધકારી તબક્કો) થાય છે, જ્યારે માઇટોકોન્ડ્રિયામાં ક્રેબ્સ ચક્ર (શ્વસનનો તબક્કો) થાય છે. વિકલ્પ A અર્ધસત્ય છે કારણ કે પ્રકાશસંશ્લેષણ ફક્ત ક્લોરોપ્લાસ્ટમાં અને શ્વસન મુખ્યત્વે માઇટોકોન્ડ્રિયામાં થાય છે, પરંતુ કેલ્વિન ચક્ર અને ક્રેબ્સ ચક્ર બંનેમાં અલગ અલગ સ્થાને થાય છે. વિકલ્પ C ખોટો છે કારણ કે ગ્લાયકોલિસિસ સાયટોપ્લાઝમમાં થાય છે. વિકલ્પ D ખોટો છે કારણ કે NADP+ રિડક્શન ફક્ત ક્લોરોપ્લાસ્ટમાં થાય છે.", "ncert_ref": "Class XI - પ્રકરણ 10: કોષીય શ્વસન, પ્રકરણ 13: વનસ્પતિમાં પ્રકાશસંશ્લેષણ", "difficulty": "Hard", "num": 3}, {"question": "નીચેનામાંથી કયો ગુણધર્મ DNA અને RNA બંનેમાં સામાન્ય નથી?", "options": ["A) તેઓ ન્યુક્લિયોટાઇડના પોલિમર છે.", "B) તેઓ હાઇડ્રોજન બંધ દ્વારા જોડાયેલા બેઇઝ જોડીઓ ધરાવે છે.", "C) તેઓ જનીન માહિતીનું વહન કરે છે.", "D) તેઓ ફોસ્ફોડાયેસ્ટર બંધ ધરાવે છે."], "correct": 1, "explanation": "RNA સામાન્ય રીતે એકલ-સૂત્રી હોય છે અને હાઇડ્રોજન બંધ દ્વારા જોડાયેલા બેઇઝ જોડીઓ ધરાવતું નથી (મોટાભાગના RNA અપવાદરૂપે જટિલ રચના ધરાવે છે, પરંતુ DNA જેવી સ્થિર ડબલ હેલિક્સ નથી). વિકલ્પ A, C, અને D બંનેમાં સામાન્ય છે: DNA અને RNA બંને ન્યુક્લિયોટાઇડના પોલિમર છે, જનીન માહિતી વહન કરે છે, અને ફોસ્ફોડાયેસ્ટર બંધ ધરાવે છે.", "ncert_ref": "Class XII - પ્રકરણ 6: આનુવંશિકતા અને વિકાસ", "difficulty": "Hard", "num": 4}, {"question": "એક ઉત્સેચકની ક્રિયાશીલતા પર તાપમાનનો પ્રભાવ કયા ક્રમમાં હોય છે?", "options": ["A) 0°C થી 40°C સુધી ક્રિયાશીલતા સતત વધે છે.", "B) 0°C થી ઓપ્ટિમમ તાપમાન સુધી ક્રિયાશીલતા વધે છે, ત્યારબાદ ઘટે છે.", "C) 0°C થી 60°C સુધી ક્રિયાશીલતા સ્થિર રહે છે.", "D) ઓપ્ટિમમ તાપમાનથી ઉપર ક્રિયાશીલતા અચાનક શૂન્ય થઈ જાય છે."], "correct": 1, "explanation": "ઉત્સેચકની ક્રિયાશીલતા 0°C થી ઓપ્ટિમમ તાપમાન (સામાન્ય રીતે 30-40°C) સુધી વધે છે, કારણ કે તાપમાન વધવાથી અણુઓની ગતિ વધે છે અને ઉત્સેચક-સબસ્ટ્રેટ ટકરાવા વધે છે. ઓપ્ટિમમ તાપમાન પછી, ઉત્સેચક ડીનેચર થવાનું શરૂ થાય છે અને ક્રિયાશીલતા ઘટે છે. વિકલ્પ A ખોટો છે કારણ કે ક્રિયાશીલતા ઓપ્ટિમમ પછી ઘટે છે. વિકલ્પ C ખોટો છે કારણ કે ક્રિયાશીલતા સ્થિર નથી. વિકલ્પ D ખોટો છે કારણ કે ક્રિયાશીલતા અચાનક શૂન્ય નથી થતી, પરંતુ ધીમે ધીમે ઘટે છે.", "ncert_ref": "Class XI - પ્રકરણ 10: કોષીય શ્વસન (ઉત્સેચકો પર તાપમાનનો પ્રભાવ)", "difficulty": "Hard", "num": 5}, {"question": "નીચેનામાંથી કયો ગુણધર્મ કોષરસપટલના વર્તન સાથે સંકળાયેલ છે જ્યારે તેને હાઇપરટોનિક દ્રાવણમાં મૂકવામાં આવે છે?", "options": ["A) કોષરસપટલ પર ઓસ્મોસિસ દ્વારા પાણીનો પ્રવેશ થાય છે.", "B) કોષરસપટલ સંકોચાય છે અને કોષરસ કોષરસપટલથી અલગ થાય છે (પ્લાઝમોલિસિસ).", "C) કોષરસપટલ ફૂલે છે અને ફાટી જાય છે (સાયટોલિસિસ).", "D) કોષરસપટલની પારગમ્યતા વધે છે અને આયનોનો વહન દર વધે છે."], "correct": 1, "explanation": "હાઇપરટોનિક દ્રાવણમાં કોષરસપટલ સંકોચાય છે અને કોષરસ કોષરસપટલથી અલગ થાય છે, જેને પ્લાઝમોલિસિસ કહેવાય છે. ઓસ્મોસિસ દ્વારા પાણીનો પ્રવેશ હાઇપોટોનિક દ્રાવણમાં થાય છે (A ગલત). સાયટોલિસિસ હાઇપોટોનિક દ્રાવણમાં થાય છે (C ગલત). હાઇપરટોનિક દ્રાવણમાં પારગમ્યતા ઘટે છે, આયનોનો વહન દર ઘટે છે (D ગલત).", "ncert_ref": "Class XI - Chapter 8: કોષ: જીવનની મૂળ એકમ", "difficulty": "Hard", "num": 6}, {"question": "નીચેનામાંથી કયો ગુણધર્મ પ્રોટીન અને DNA બંનેમાં સામાન્ય છે?", "options": ["A) તેઓ બંનેમાં નાઇટ્રોજન ધરાવે છે.", "B) તેઓ બંનેમાં સલ્ફર ધરાવે છે.", "C) તેઓ બંનેમાં ફોસ્ફેટ જૂથ ધરાવે છે.", "D) તેઓ બંનેમાં રિબોઝ શર્કરા ધરાવે છે."], "correct": 0, "explanation": "પ્રોટીન અને DNA બંનેમાં નાઇટ્રોજન હાજર હોય છે. પ્રોટીનમાં સલ્ફર હાજર હોઈ શકે છે, પરંતુ DNAમાં નહીં (B ગલત). DNAમાં ફોસ્ફેટ જૂથ હોય છે, પરંતુ પ્રોટીનમાં નહીં (C ગલત). RNAમાં રિબોઝ શર્કરા હોય છે, પરંતુ DNAમાં ડિઓક્સીરિબોઝ હોય છે અને પ્રોટીનમાં શર્કરા નહીં (D ગલત).", "ncert_ref": "Class XI - Chapter 9: જૈવ અણુઓ અને તેના બંધારણ", "difficulty": "Hard", "num": 7}, {"question": "એક વનસ્પતિ કોષમાં ક્લોરોપ્લાસ્ટ અને માઇટોકોન્ડ્રિયા વચ્ચે કયો રાસાયણિક પદાર્થ વહન પામે છે?", "options": ["A) ગ્લુકોઝ", "B) ઓક્સિજન", "C) કાર્બન ડાયોક્સાઇડ", "D) ATP"], "correct": 2, "explanation": "ક્લોરોપ્લાસ્ટમાં પ્રકાશસંશ્લેષણ દરમિયાન ઉત્પન્ન થતો ઓક્સિજન માઇટોકોન્ડ્રિયામાં શ્વસન માટે વપરાય છે, પરંતુ પ્રશ્ન રાસાયણિક પદાર્થના વહન વિશે છે. કાર્બન ડાયોક્સાઇડ ક્ _ref": "Class XI - Chapter 10: કોષ અને કોષીકીય વિભાજન", "difficulty": "Hard", "num": 17}, {"question": "વનસ્પતિ કોષની કોષભિત્તિના બંધારણમાં સેલ્યુલોઝ ઉપરાંત કયો પદાર્થ હાજર હોય છે, જે તેને પ્રાણી કોષની કોષભિત્તિથી અલગ પાડે છે, પરંતુ તેનો ગુણધર્મ પાણી સાથેના સંપર્કમાં બદલાય છે?", "options": ["A) હેમિસેલ્યુલોઝ, જે પાણીમાં દ્રાવ્ય હોય છે અને કોષભિત્તિને લવચીક બનાવે છે", "B) પેક્ટિન, જે પાણીમાં અદ્રાવ્ય હોય છે અને કોષભિત્તિને કઠણ બનાવે છે", "C) લિગ્નિન, જે પાણીમાં અદ્રાવ્ય હોય છે અને કોષભિત્તિને મજબૂત બનાવે છે", "D) કટિન, જે પાણીને અવરોધે છે અને કોષભિત્તિને જળરોધક બનાવે છે"], "correct": 0, "explanation": "હેમિસેલ્યુલોઝ કોષભિત્તિનો એક ઘટક છે જે પાણીમાં દ્રાવ્ય હોય છે અને કોષભિત્તિને લવચીક બનાવે છે. પેક્ટિન પાણીમાં દ્રાવ્ય હોય છે અને કોષોને એકબીજા સાથે ચોંટાડવામાં મદદ કરે છે, પરંતુ તે કોષભિત્તિને કઠણ બનાવતું નથી. લિગ્નિન અને કટિન કોષભિત્તિમાં હાજર હોય છે, પરંતુ લિગ્નિન મુખ્યત્વે લાકડામાં જોવા મળે છે અને કટિન પાણીને અવરોધે છે, પરંતુ તે કોષભિત્તિના મૂળભૂત ગુણધર્મમાં ફેરફાર કરતું નથી.", "ncert_ref": "Class XI - પ્રકરણ 6: વનસ્પતિ શરીરક્રિયા (Plant Anatomy)", "difficulty": "Hard", "num": 18}, {"question": "એક પદાર્થનો ગલનબિંદુ 80°C અને ઉત્કલનબિંદુ 180°C છે. જ્યારે આ પદાર્થને પાણીમાં મિશ્રિત કરવામાં આવે છે, ત્યારે તે પાણીની સપાટી પર તરે છે. આ પદાર્થ વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) પદાર્થનો ઘનત્વ પાણી કરતાં ઓછો છે અને તે હાઇડ્રોફોબિક છે", "B) પદાર્થનો ઘનત્વ પાણી કરતાં વધારે છે અને તે હાઇડ્રોફિલિક છે", "C) પદાર્થનો ઘનત્વ પાણી કરતાં ઓછો છે અને તે હાઇડ્રોફિલિક છે", "D) પદાર્થનો ઘનત્વ પાણી કરતાં વધારે છે અને તે હાઇડ્રોફોબિક છે"], "correct": 0, "explanation": "પદાર્થ પાણીની સપાટી પર તરે છે એટલે તેનો ઘનત્વ પાણી કરતાં ઓછો છે. ગલનબિંદુ અને ઉત્કલનબિંદુની ઉંચી કિંમત સૂચવે છે કે પદાર્થ હાઇડ્રોફોબિક (પાણીને અવરોધતો) હોઈ શકે છે, કારણ કે હાઇડ્રોફિલિક પદાર્થો સામાન્ય રીતે પાણીમાં દ્રાવ્ય હોય છે અને તેમનો ઘનત્વ પાણી કરતાં ઓછો હોતો નથી. આમ, પદાર્થનો ઘનત્વ ઓછો અને હાઇડ્રોફોબિક હોવાનું વિધાન સત્ય છે.", "ncert_ref": "Class XI - પ્રકરણ 5: દ્રવ્યની અવસ્થા (States of Matter)", "difficulty": "Hard", "num": 19}, {"question": "નીચેનામાંથી કયો ગુણધર્મ સેલ્યુલોઝ અને સ્ટાર્ચ બંનેમાં સામાન્ય છે, પરંતુ ગ્લાયકોજનમાં નથી?", "options": ["A) તે પોલીસેકેરાઇડ છે અને ગ્લુકોઝના એકમોથી બનેલ છે", "B) તે વનસ્પતિ કોષોમાં સંગ્રહ પદાર્થ તરીકે કામ કરે છે", "C) તે α-1,4 ગ્લાયકોસિડિક બંધ ધરાવે છે", "D) તે બીટા-ગ્લુકોઝના એકમોથી બનેલ છે"], "correct": 3, "explanation": "સેલ્યુલોઝ અને સ્ટાર્ચ બંને પોલીસેકેરાઇડ છે અને ગ્લુકોઝના એકમોથી બનેલ છે (A સત્ય છે, પરંતુ ગ્લાયકોજન પણ આ ગુણધર્મ ધરાવે છે). સ્ટાર્ચ અને ગ્લાયકોજન વનસ્પતિ અને પ્રાણી કોષોમાં સંગ્રહ પદાર્થ તરીકે કામ કરે છે, પરંતુ સેલ્યુલોઝ કોષભિત્તિનો ઘટક છે (B ખોટું). સ્ટાર્ચ અને ગ્લાયકોજન α-1,4 ગ્લાયકોસિડિક બંધ ધરાવે છે, પરંતુ સેલ્યુલોઝ β-1,4 ગ્લાયકોસિડિક બંધ ધરાવે છે (C ખોટું). સેલ્યુલોઝ અને સ્ટાર્ચ બંને ગ્લુકોઝના એકમોથી બનેલ છે, પરંતુ સેલ્યુલોઝ બીટા-ગ્લુકોઝના એકમોથી બનેલ છે, જ્યારે સ્ટાર્ચ આલ્ફા-ગ્લુકોઝના એકમોથી બનેલ છે. ગ્લાયકોજન પણ આલ્ફા-ગ્લુકોઝના એકમોથી બનેલ છે, તેથી D વિકલ્પ સાચો છે કારણ કે સેલ્યુલોઝ બીટા-ગ્લુકોઝ ધરાવે છે જ્યારે સ્ટાર્ચ અને ગ્લાયકોજન નહીં.", "ncert_ref": "Class XI - પ્રકરણ 9: જૈવ અણુઓ અને કોષીય રસાયણ", "difficulty": "Hard", "num": 20}, {"question": "વનસ્પતિ કોષની કોષભિત્તિના બંધારણમાં સેલ્યુલોઝ ઉપરાંત હેમીસેલ્યુલોઝ અને પેક્ટિન ઉપરાંત કયો પદાર્થ હાજર હોય છે, જે તેને પ્રાણી કોષથી અલગ પાડે છે અને તેનો ભૌતિક ગુણધર્મ કઠણાઈ પ્રદાન કરે છે?", "options": ["A) કાઇટિન", "B) લિગ્નિન", "C) સબેરિન", "D) ક્યુટિન"], "correct": 1, "explanation": "કોષભિત્તિનો મુખ્ય ઘટક સેલ્યુલોઝ છે, પરંતુ હેમીસેલ્યુલોઝ અને પેક્ટિન ઉપરાંત લિગ્નિન પણ હાજર હોય છે, જે કોષભિત્તિને વધારાની કઠણાઈ પ્રદાન કરે છે. કાઇટિન ફંગી અને કીટકોની કોષભિત્તિમાં જોવા મળે છે, સબેરિન કોષભિત્તિના બહારના સ્તરમાં જોવા મળે છે, જ્યારે ક્યુટિન પર્ણની સપાટી પર જોવા મળે છે.", "ncert_ref": "Class XI - પ્રકરણ 6: કોષ : જીવનની મૂળ એકમ", "difficulty": "Hard", "num": 21}, {"question": "વનસ્પતિ કોષમાં ક્લોરોપ્લાસ્ટ અને માઇટોકોન્ડ્રિયા વચ્ચે કયો રાસાયણિક પદાર્થ વહન પામે છે, જે પ્રકાશસંશ્લેષણ અને શ્વસન પ્રક્રિયાઓ વચ્ચેનો સંકલન સૂચવે છે?", "options": ["A) ગ્લુકોઝ", "B) ઓક્સિજન", "C) કાર્બન ડાયોક્સાઇડ", "D) ATP"], "correct": 2, "explanation": "ક્લોરોપ્લાસ્ટમાં પ્રકાશસંશ્લેષણ દરમિયાન ઉત્પન્ન થતો ઓક્સિજન માઇટોકોન્ડ્રિયામાં શ્વસન માટે વપરાય છે, પરંતુ કાર્બન ડાયોક્સાઇડ પ્રકાશસંશ્લેષણ માટે ક્લોરોપ્લાસ્ટમાં વપરાય છે અને શ્વસન દરમિયાન માઇટોકોન્ડ્રિયામાં ઉત્પન્ન થાય છે. ગ્લુકોઝ અને ATP પણ વહન પામે છે, પરંતુ કાર્બન ડાયોક્સાઇડ એ મુખ્ય પદાર્થ છે જે બંને પ્રક્રિયાઓ વચ્ચેનો સંકલન સૂચવે છે.", "ncert_ref": "Class XI - પ્રકરણ 13: વનસ્પતિમાં પ્રકાશસંશ્લેષણ", "difficulty": "Hard", "num": 22}, {"question": "નીચેનામાંથી કયો ભૌતિક ગુણધર્મ એક પદાર્થના અણુઓ વચ્ચેના આંતરઆણ્વીય બળો સાથે સીધો સંબંધ ધરાવે છે, પરંતુ તેનો રાસાયણિક બંધારણ સાથે કોઈ સંબંધ નથી?", "options": ["A) ગલનબિંદુ અને ઉત્કલનબિંદુ", "B) દ્રાવ્યતા અને વાહકતા", "C) સ્નિગ્ધતા અને પૃષ્ઠતાણ", "D) વક્રીભવનાંક અને ઘનતા"], "correct": 2, "explanation": "સ્નિગ્ધતા અને પૃષ્ઠતાણ એ ભૌતિક ગુણધર્મો છે જે સીધા અણુઓ વચ્ચેના આંતરઆણ્વીય બળો પર આધારિત હોય છે, પરંતુ તે પદાર્થના રાસાયણિક બંધારણ સાથે સીધો સંબંધ ધરાવતા નથી. ગલનબિંદુ અને ઉત્કલનબિંદુ પણ આંતરઆણ્વીય બળો પર આધારિત છે, પરંતુ તે રાસાયણિક બંધારણ સાથે અપ્રત્યક્ષ રીતે સંબંધિત હોઈ શકે છે. દ્રાવ્યતા અને વાહકતા રાસાયણિક બંધારણ સાથે સંબંધિત છે, જ્યારે વક્રીભવનાંક અને ઘનતા ભૌતિક ગુણધર્મો છે પરંતુ તે આંતરઆણ્વીય બળો સાથે સીધો સંબંધ ધરાવતા નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 5: દ્રવ્યની અવસ્થાઓ", "difficulty": "Hard", "num": 23}, {"question": "એક પ્રયોગમાં, એક ઉત્સેચકની ક્રિયાશીલતા પર તાપમાનનો પ્રભાવ માપવામાં આવ્યો. 37°C પર મહત્તમ ક્રિયાશીલતા જોવા મળી, પરંતુ 60°C પર ક્રિયાશીલતા લગભગ શૂન્ય થઈ ગઈ. આ ઘટના માટે નીચેનામાંથી કયું કારણ સૌથી વધુ યોગ્ય છે?", "options": ["A) ઉત્સેચકના સક્રિય સ્થાનનું વિકૃતિકરણ (Denaturation)", "B) ઉત્સેચકના સક્રિય સ્થાન પર અવરોધકોનું બંધન", "C) ઉત્સેચકના પેટાપ્રોટીનનું વિઘટન", "D) ઉત્સેચકના સહકારકોનું નિષ્ક્રિયકરણ"], "correct": 0, "explanation": "ઉત્સેચકની ક્રિયાશીલતા પર તાપમાનનો પ્રભાવ એ ઉત્સેચકના પ્રોટીન બંધારણના વિકૃતિકરણ સાથે સંબંધિત છે. ઉચ્ચ તાપમાને (60°C) ઉત્સેચકના સક્રિય સ્થાનનું વિકૃતિકરણ થાય છે, જેના કારણે તેનું કાર્ય બંધ થઈ જાય છે ં).", "ncert_ref": "કક્ષા 11 - પ્રકરણ 5: દ્રવ્યની અવસ્થાઓ", "difficulty": "Hard", "num": 29}, {"question": "નીચેનામાંથી કયો ગુણધર્મ કોષરસપટલના ફોસ્ફોલિપિડ્સ અને કોષકેન્દ્રમાં રહેલા DNA બંનેમાં જોવા મળે છે, પરંતુ કોષમાં રહેલા મુક્ત એમિનો એસિડમાં જોવા મળતો નથી?", "options": ["A) એમ્ફિપેથિક સ્વભાવ (Amphipathic nature)", "B) ફોસ્ફોડાયએસ્ટર બંધની હાજરી", "C) હાઇડ્રોફોબિક અને હાઇડ્રોફિલિક ભાગોનું અસ્તિત્વ", "D) ન્યુક્લિઓટાઇડ એકમોનું બંધારણ"], "correct": 1, "explanation": "ફોસ્ફોલિપિડ્સ અને DNA બંનેમાં ફોસ્ફોડાયએસ્ટર બંધની હાજરી હોય છે. ફોસ્ફોલિપિડ્સમાં ફૉસ્ફેટ જૂથ ગ્લિસરોલ સાથે ફોસ્ફોડાયએસ્ટર બંધથી જોડાયેલું હોય છે, જ્યારે DNAમાં ફોસ્ફેટ જૂથ શર્કરા સાથે ફોસ્ફોડાયએસ્ટર બંધથી જોડાયેલું હોય છે. વિકલ્પ A અને C ફોસ્ફોલિપિડ્સ માટે સાચા છે, પરંતુ DNA માટે નહીં. વિકલ્પ D માત્ર DNA માટે સાચો છે. મુક્ત એમિનો એસિડમાં આમાંથી કોઈ પણ ગુણધર્મ જોવા મળતો નથી.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 9: બાયોમોલેક્યુલ્સ, કક્ષા 12 - પ્રકરણ 8: કોષ - જીવનનો એકમ", "difficulty": "Hard", "num": 30}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
