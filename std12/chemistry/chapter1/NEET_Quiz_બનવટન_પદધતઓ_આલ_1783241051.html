<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - બનાવટની પદ્ધતિઓ (આલ્કોહોલ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 બનાવટની પદ્ધતિઓ (આલ્કોહોલ</span>
                <span>🎯 Hard</span>
                <span>📝 30 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "નીચેનામાંથી કયો પદાર્થ ફિનોલની તુલનામાં આલ્કોહોલ સાથે વધુ પ્રબળ હાઇડ્રોજન બંધ બનાવે છે?", "options": ["A) મિથેનોલ", "B) ઈથેનોલ", "C) ટર્શિયરી બ્યુટાઇલ આલ્કોહોલ", "D) સેકન્ડરી બ્યુટાઇલ આલ્કોહોલ"], "correct": 1, "explanation": "ઈથેનોલ (B) ફિનોલ કરતાં વધુ પ્રબળ હાઇડ્રોજન બંધ બનાવે છે કારણ કે ફિનોલમાં હાઇડ્રોક્સિલ સમૂહ બેન્ઝીન વલય સાથે જોડાયેલ હોવાથી ઇલેક્ટ્રોન ઘનતા ઓછી હોય છે, જ્યારે ઈથેનોલમાં હાઇડ્રોક્સિલ સમૂહ સીધા કાર્બન સાથે જોડાયેલ હોવાથી હાઇડ્રોજન બંધ બનાવવાની ક્ષમતા વધુ હોય છે. મિથેનોલ (A) ઈથેનોલ કરતાં નાનો હોવાથી તેના હાઇડ્રોજન બંધ ઓછા પ્રબળ હોય છે. ટર્શિયરી બ્યુટાઇલ આલ્કોહોલ (C) અને સેકન્ડરી બ્યુટાઇલ આલ્કોહોલ (D)માં સ્ટેરિક અવરોધના કારણે હાઇડ્રોજન બંધ બનાવવાની ક્ષમતા ઓછી હોય છે.", "ncert_ref": "Class XII - Chapter 11: આલ્કોહોલ, ફિનોલ અને ઈથર", "difficulty": "Hard", "num": 1}, {"question": "નીચેનામાંથી કયો પદાર્થ લ્યુકાસ પરીક્ષણમાં સૌથી ધીમી પ્રક્રિયા આપે છે?", "options": ["A) મિથેનોલ", "B) પ્રાથમિક આલ્કોહોલ", "C) દ્વિતીય આલ્કોહોલ", "D) તૃતીય આલ્કોહોલ"], "correct": 0, "explanation": "લ્યુકાસ પરીક્ષણમાં, આલ્કોહોલની પ્રક્રિયા ગતિ તેની ક્રિયાશીલતા પર આધારિત હોય છે. તૃતીય આલ્કોહોલ (D) સૌથી ઝડપી પ્રક્રિયા આપે છે કારણ કે તે સૌથી વધુ સ્થિર કાર્બોકેટાયન બનાવે છે. દ્વિતીય આલ્કોહોલ (C) મધ્યમ ગતિએ પ્રક્રિયા આપે છે, જ્યારે પ્રાથમિક આલ્કોહોલ (B) ધીમી ગતિએ પ્રક્રિયા આપે છે. મિથેનોલ (A) સૌથી ધીમી પ્રક્રિયા આપે છે કારણ કે તે પ્રાથમિક આલ્કોહોલ કરતાં પણ ઓછી ક્રિયાશીલ હોય છે.", "ncert_ref": "Class XII - Chapter 11: આલ્કોહોલ, ફિનોલ અને ઈથર", "difficulty": "Hard", "num": 2}, {"question": "ફિનોલની નીચેનામાંથી કયી પ્રક્રિયા ઈથર બનાવવા માટે વપરાતી નથી?", "options": ["A) વિલિયમસન સિંથેસિસ", "B) કોલ્બેની પ્રક્રિયા", "C) રીમર-ટીમન પ્રક્રિયા", "D) ક્લેમાનસન પ્રક્રિયા"], "correct": 2, "explanation": "રીમર-ટીમન પ્રક્રિયા (C) ફિનોલમાં ઓર્થો-હાઇડ્રોક્સી બેન્ઝાલ્ડિહાઇડ બનાવવા માટે વપરાય છે, ઈથર બનાવવા માટે નહીં. વિલિયમસન સિંથેસિસ (A) ઈથર બનાવવા માટે વપરાય છે, જ્યારે કોલ્બેની પ્રક્રિયા (B) અને ક્લેમાનસન પ્રક્રિયા (D) પણ ઈથર બનાવવા માટે વપરાતી પ્રક્રિયાઓ છે.", "ncert_ref": "Class XII - Chapter 11: આલ્કોહોલ, ફિનોલ અને ઈથર", "difficulty": "Hard", "num": 3}, {"question": "નીચેનામાંથી કયો પદાર્થ ફિનોલ સાથે FeCl₃ સાથે જોડાય ત્યારે રંગીન સંયોજન બનાવતો નથી?", "options": ["A) ફિનોલ", "B) બેન્ઝાઇલ આલ્કોહોલ", "C) સેલિસિલિક એસિડ", "D) કેટેકોલ"], "correct": 1, "explanation": "બેન્ઝાઇલ આલ્કોહોલ (B) ફિનોલ નથી, તેથી તે FeCl₃ સાથે રંગીન સંયોજન બનાવતો નથી. ફિનોલ (A), સેલિસિલિક એસિડ (C), અને કેટેકોલ (D) બધા ફિનોલિક સંયોજનો છે અને FeCl₃ સાથે રંગીન સંયોજન બનાવે છે.", "ncert_ref": "Class XII - Chapter 11: આલ્કોહોલ, ફિનોલ અને ઈથર", "difficulty": "Hard", "num": 4}, {"question": "નીચેનામાંથી કયો પદાર્થ ઈથરની બનાવટ માટે વપરાતી પ્રક્રિયા નથી?", "options": ["A) આલ્કોહોલિક ક્ષાર સાથે હેલોજન આલ્કાઇલની પ્રક્રિયા", "B) આલ્કોહોલનું ડિહાઇડ્રેશન", "C) ફિનોલ સાથે બેન્ઝાઇલ ક્લોરાઇડની પ્રક્રિયા", "D) આલ્કાઇલ હેલાઇડ સાથે આલ્કોક્સાઇડની પ્રક્રિયા"], "correct": 2, "explanation": "ફિનોલ સાથે બેન્ઝાઇલ ક્લોરાઇડની પ્રક્રિયા (C) ઈથર બનાવવા માટે વપરાતી નથી, પરંતુ તે ફિનોલિક ઈથર બનાવવા માટે વપરાય છે. આલ્કોહોલિક ક્ષાર સાથે હેલોજન આલ્કાઇલની પ્રક્રિયા (A), આલ્કોહોલનું ડિહાઇડ્રેશન (B), અને આલ્કાઇલ હેલાઇડ સાથે આલ્કોક્સાઇડની પ્રક્રિયા (D) બધી ઈથર બનાવવા માટે વપરાતી પ્રક્રિયાઓ છે.", "ncert_ref": "Class XII - Chapter 11: આલ્કોહોલ, ફિનોલ અને ઈથર", "difficulty": "Hard", "num": 5}, {"question": "વિલિયમસન ઈથર સંશ્લેષણ પ્રક્રિયામાં નીચેનામાંથી કયું સંયોજન પ્રતિક્રિયાક (reactant) તરીકે વપરાય છે, પરંતુ તેની જગ્યાએ હેલોજનેટેડ આલ્કેઇન વાપરવામાં આવે તો પ્રક્રિયા નિષ્ફળ જાય છે?", "options": ["A) સોડિયમ એથોક્સાઇડ (C2H5ONa)", "B) પોટેશિયમ હાઇડ્રોક્સાઇડ (KOH)", "C) સોડિયમ મિથોક્સાઇડ (CH3ONa)", "D) પોટેશિયમ ટર્શિયરી બ્યુટોક્સાઇડ (KC(CH3)3O)"], "correct": 3, "explanation": "વિલિયમસન ઈથર સંશ્લેષણમાં એલ્કોક્સાઇડ આયન (R-O⁻)ની જરૂર હોય છે, જે હેલોઅલ્કેઇન સાથે SN2 પ્રક્રિયા દ્વારા ઈથર બનાવે છે. સોડિયમ એથોક્સાઇડ (A), સોડિયમ મિથોક્સાઇડ (C) અને KOH (B) એલ્કોક્સાઇડ આયન આપી શકે છે, પરંતુ પોટેશિયમ ટર્શિયરી બ્યુટોક્સાઇડ (D) એક બલિષ્ઠ બેઇઝ છે અને એલિમિનેશન પ્રક્રિયા તરફ વળે છે, જેથી હેલોજનેટેડ આલ્કેઇન સાથે પ્રક્રિયા નિષ્ફળ જાય છે. આ ઉપરાંત, ટર્શિયરી બ્યુટોક્સાઇડ આયન સ્ટેરિકલી હિન્દરડ છે, જે SN2 પ્રક્રિયાને અટકાવે છે.", "ncert_ref": "Class XII - Chapter 11: આલ્કોહોલ, ફિનોલ અને ઈથર", "difficulty": "Hard", "num": 6}, {"question": "ફિનોલની ક્લોરોફોર્મ સાથે પ્રક્રિયા કરતા રેઝોરસિનોલ બનાવવા માટે નીચેનામાંથી કયું પરિબળ મહત્વનું છે?", "options": ["A) ઉચ્ચ તાપમાન (100°C)", "B) ક્ષારીય મધ્યમ (NaOH)", "C) એસિડિક મધ્યમ (HCl)", "D) ઉત્પ્રેરક તરીકે AlCl3"], "correct": 1, "explanation": "ફિનોલની ક્લોરોફોર્મ સાથે પ્રક્રિયા રેઝોરસિનોલ બનાવવા માટે ક્ષારીય મધ્યમ (NaOH)ની હાજરીમાં થાય છે. આ પ્રક્રિયા રેઇમર-ટીમન પ્રક્રિયા તરીકે ઓળખાય છે, જેમાં ક્લોરોફોર્મ (CHCl3) અને NaOHની હાજરીમાં ફિનોલ રેઝોરસિનોલમાં રૂપાંતરિત થાય છે. ઉચ્ચ તાપમાન (A), એસિડિક મધ્યમ (C) અને AlCl3 (D) આ પ્રક્રિયા માટે અનુકૂળ નથી.", "ncert_ref": "Class XII - Chapter 11: આલ્કોહોલ, ફિનોલ અને ઈથર", "difficulty": "Hard", "num": 7}, {"question": "નીચેનામાંથી કયું સંયોજન ઈથરની બનાવટ માટે વપરાતી પ્રક્રિયામાં ઉત્પન્ન થતું ઉપ-ઉત્પાદ (by-product) નથી?", "options": ["A) સોડિયમ બ્રોમાઇડ (NaBr)", "B) પોટેશિયમ આયોડાઇડ (KI)", "C) સોડિયમ ક્લોરાઇડ (NaCl)", "D) પોટેશિયમ હાઇડ્રોક્સાઇડ (KOH)"], "correct": 3, "explanation": "વિલિયમસન ઈથર સંશ્લેષણ પ્રક્રિયામાં, હેલોઅલ્કેઇન અને એલ્કોક્સાઇડ પ્રક્રિયા કરે છે, જેમાં હેલાઇડ આયન (Br⁻, I⁻, Cl⁻) ઉત્પન્ન થાય છે, જે સોડિયમ અથવા પોટેશિયમ હેલાઇડ તરીકે અલગ પડે છે. પરંતુ KOH (D) એક પ્રતિક્રિયાક છે, ઉપ-ઉત્પાદ નથી. આથી, KOH આ પ્રક્રિયાનું ઉપ-ઉત્પાદ નથી.", "ncert_ref": "Class XII - Chapter 11: આલ્કોહોલ, ફિનોલ અને ઈથર", "difficulty": "Hard", "num": 8}, {"question": "નીચેનામાંથી કયો પદાર્થ ફિનોલની નાઇટ્રોજન ડાયોક્સાઇડ (NO2) સાથે પ્રક્રિયા કરતા p-નાઇટ્રોફિનોલ બનાવે છે, પરંતુ ઓર્થો-નાઇટ્રોફિનોલ બનાવતો નથી?", "options": ["A) ફિનોલ + HNO3 (અસ્તવ્યસ્ત)", "B) ફિનોલ + NO2 (ગેસ, 300°C)", "C) ફિનોલ + HNO3 (H2SO4ની હાજરીમાં)", "D) ફિનોલ + NaNO2 + HCl (0-5°C)"], "correct": 1, "explanation": "ફિનોલની NO2 ગેસ સાથે 300°C તાપમાને પ્રક્રિયા કરતા p-નાઇટ્રોફિનોલ બનાવે છે, પરંતુ ઓર્થો-નાઇટ્રોફિનોલ બનતો નથી. આ પ્રક્રિયા ઉચ             });

            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
