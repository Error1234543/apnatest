<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - ક્ષારણ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 ક્ષારણ</span>
                <span>🎯 Hard</span>
                <span>📝 30 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "કોષરસમાં રહેલા ક્લોરોપ્લાસ્ટમાં થતું પ્રકાશસંશ્લેષણ પ્રક્રિયામાં ક્ષારણની ભૂમિકા શું છે?", "options": ["A) ક્લોરોફિલના સંશ્લેષણમાં મદદ કરે છે અને પ્રકાશશક્તિ શોષણ વધારે છે", "B) કોષરસના pHને નિયંત્રિત કરે છે જેથી ઉત્સેચક ક્રિયાશીલ રહે", "C) સ્ટ્રોમામાં CO2ની સાંદ્રતા વધારે છે જેથી કેલ્વિન ચક્રની ગતિ વધે", "D) થાયલેકોઇડ ઝરૂખામાં ઇલેક્ટ્રોન વહન શૃંખલાને સ્થિર કરે છે"], "correct": 2, "explanation": "ક્ષારણ (Salination) એટલે કોષરસમાં અમુક આયનો (જેમ કે Mg²⁺, Cl⁻)ની હાજરી. પ્રકાશસંશ્લેષણ દરમિયાન, ક્લોરોપ્લાસ્ટના સ્ટ્રોમામાં CO2ની સાંદ્રતા વધારવા માટે ક્ષારણ મહત્વપૂર્ણ છે, જેથી કેલ્વિન ચક્ર (Calvin cycle)ની ગતિ વધે. વિકલ્પ A ખોટો છે કારણ કે ક્લોરોફિલનું સંશ્લેષણ મુખ્યત્વે Mg²⁺ પર આધાર રાખે છે, પરંતુ ક્ષારણ પ્રકાશશક્તિ શોષણ પર સીધો પ્રભાવ પાડતું નથી. વિકલ્પ B ખોટો છે કારણ કે pH નિયંત્રણ મુખ્યત્વે બફર પ્રણાલી દ્વારા થાય છે, ક્ષારણ નહીં. વિકલ્પ D ખોટો છે કારણ કે ઇલેક્ટ્રોન વહન શૃંખલા પ્રોટીન પરિબળો દ્વારા નિયંત્રિત થાય છે, ક્ષારણ નહીં.", "ncert_ref": "Class XI - પ્રકરણ 13: પ્રકાશસંશ્લેષણ", "difficulty": "Hard", "num": 1}, {"question": "મૃત સમુદ્રના જળમાં રહેતા સજીવોમાં ક્ષારણ સામે અનુકૂલન તરીકે કયું પરિવર્તન જોવા મળે છે?", "options": ["A) કોષરસમાં ગ્લાઇસરોલનું સંશ્લેષણ વધે છે", "B) કોષની સપાટી પર કોઈપણ આયન ચેનલ્સ નહીં હોય", "C) મિટોકોન્ડ્રિયામાં ATP સંશ્લેષણ બંધ થાય છે", "D) કોષરસમાં સોડિયમ-પોટેશિયમ પંપની ક્રિયાશીલતા ઘટે છે"], "correct": 0, "explanation": "મૃત સમુદ્રના જળમાં ઉચ્ચ ક્ષારણ સામે અનુકૂલન તરીકે, સજીવો કોષરસમાં ગ્લાઇસરોલ જેવા સંરક્ષક પદાર્થોનું સંશ્લેષણ વધારે છે, જેથી કોષમાં પાણીનું સંતુલન જળવાઈ રહે. વિકલ્પ B ખોટો છે કારણ કે આયન ચેનલ્સ કોષીય ક્રિયાઓ માટે આવશ્યક છે. વિકલ્પ C ખોટો છે કારણ કે ATP સંશ્લેષણ જીવન માટે મહત્વપૂર્ણ છે અને બંધ થતું નથી. વિકલ્પ D ખોટો છે કારણ કે સોડિયમ-પોટેશિયમ પંપ કોષીય સંતુલન જાળવવા માટે ક્રિયાશીલ રહે છે.", "ncert_ref": "Class XII - પ્રકરણ 13: સજીવો અને વાતાવરણ", "difficulty": "Hard", "num": 2}, {"question": "ક્ષારણ યુક્ત મૃત્તિકામાં ઉગાડેલા છોડમાં કયું લક્ષણ જોવા મળશે જેથી તે પાણીનું શોષણ વધારે શકે?", "options": ["A) મૂળની લંબાઈ ઘટે છે અને મૂળરોમો વધે છે", "B) પર્ણની સપાટી પર મોમ જેવું આવરણ વિકસે છે", "C) કોષભિત્તિ પર ક્યુટિનનું પ્રમાણ ઘટે છે", "D) જલવાહક પેશીઓની સંખ્યા ઘટે છે"], "correct": 1, "explanation": "ક્ષારણ યુક્ત મૃત્તિકામાં ઉગાડેલા છોડમાં પાણીનું બાષ્પીકરણ ઘટાડવા માટે પર્ણની સપાટી પર મોમ જેવું આવરણ (waxy coating) વિકસે છે, જેથી પાણીનું નુકસાન થતું અટકાવી શકાય. વિકલ્પ A ખોટો છે કારણ કે મૂળરોમો વધવા છતાં મૂળની લંબાઈ ઘટતી નથી. વિકલ્પ C ખોટો છે કારણ કે ક્યુટિનનું પ્રમાણ વધે છે, ઘટતું નથી. વિકલ્પ D ખોટો છે કારણ કે જલવાહક પેશીઓની સંખ્યા ઘટતી નથી, પરંતુ તેમની ક્રિયાશીલતા બદલાઈ શકે છે.", "ncert_ref": "Class XI - પ્રકરણ 11: છોડમાં પરિવહન", "difficulty": "Hard", "num": 3}, {"question": "મનુષ્યમાં ક્ષારણના ઉચ્ચ સ્તરને લીધે કયું હોર્મોન સ્રાવિત થાય છે જેથી રક્તચાપ નિયંત્રિત રહે?", "options": ["A) એલ્ડોસ્ટેરોન", "B) ઇન્સ્યુલિન", "C) એડ્રિનેલિન", "D) થાયરોક્સિન"], "correct": 0, "explanation": "મનુષ્યમાં ક્ષારણના ઉચ્ચ સ્તરને લીધે એલ્ડોસ્ટેરોન હોર્મોન સ્રાવિત થાય છે, જે કિડની દ્વારા સોડિયમ અને પોટેશિયમના શોષણને નિયંત્રિત કરે છે, જેથી રક્તચાપ સંતુલિત રહે. વિકલ્પ B ખોટો છે કારણ કે ઇન્સ્યુલિન ગ્લુકોઝના ચયાપચયને નિયંત્રિત કરે છે. વિકલ્પ C ખોટો છે કારણ કે એડ્રિનેલિન તણાવ અને પીડા પ્રતિભાવમાં ભૂમિકા ભજવે છે. વિકલ્પ D ખોટો છે કારણ કે થાયરોક્સિન ચયાપચય દરને નિયંત્રિત કરે છે.", "ncert_ref": "Class XI - પ્રકરણ 22: રસાયણિક નિયમન અને નિયંત્રણ", "difficulty": "Hard", "num": 4}, {"question": "ક્ષારણ યુક્ત જળમાં રહેતા મત્સ્યમાં કયું અનુકૂલન જોવા મળે છે જેથી તે કોષીય જળ સંતુલન જાળવી શકે?", "options": ["A) મૂત્રમાં ઉચ્ચ પ્રમાણમાં પાણી હોય છે", "B) ગલફડામાં ક્લોરાઇડ કોષોની સંખ્યા વધે છે", "C) રક્તમાં યુરિયાનું પ્રમાણ ઘટે છે", "D) કોષરસમાં પોટેશિયમ આયનોનું પ્રમાણ વધે છે"], "correct": 1, "explanation": "ક્ષારણ યુક્ત જળમાં રહેતા મત્સ્યમાં ગલફડામાં ક્લોરાઇડ કોષોની સંખ્યા વધે છે, જેથી અતિરિક્ત ક્લોરાઇડ આયનોને બહાર કાઢી શકાય અને કોષીય જળ સંતુલન જાળવી શકાય. વિકલ્પ A ખોટો છે કારણ કે મૂત્રમાં પાણીનું પ્રમાણ ઘટે છે, વધતું નથી. વિકલ્પ C ખોટો છે કારણ કે રક્તમાં યુરિયાનું પ્રમાણ વધે છે, ઘટતું ે છે, પરંતુ ક્લોરાઇડ આયનનું સંગ્રહણ સ્પંજી પેશીમાં જ વધુ થાય છે.", "ncert_ref": "Class XII - Chapter 11: છોડમાં પરિવહન", "difficulty": "Hard", "num": 11}, {"question": "મનુષ્યમાં, ક્ષારણના ઉચ્ચ સ્તરને લીધે કયા હોર્મોનના સ્રાવમાં ઘટાડો થવાથી રક્તચાપમાં વધારો થાય છે?", "options": ["A) એલ્ડોસ્ટેરોન (Aldosterone)", "B) વેસોપ્રેસિન (Vasopressin)", "C) એટ્રિયલ નેટ્રિયુરેટિક પેપ્ટાઇડ (ANP)", "D) એડ્રિનેલિન (Adrenaline)"], "correct": 2, "explanation": "ક્ષારણના ઉચ્ચ સ્તરને લીધે એટ્રિયલ નેટ્રિયુરેટિક પેપ્ટાઇડ (ANP)ના સ્રાવમાં ઘટાડો થાય છે, જે રક્તચાપને નિયંત્રિત કરવા માટે જવાબદાર છે. ANP હૃદય દ્વારા સ્રાવિત થાય છે અને તે રક્તવાહિનીઓને ફેલાવીને રક્તચાપ ઘટાડે છે. એલ્ડોસ્ટેરોન અને વેસોપ્રેસિન રક્તચાપ વધારવા માટે જવાબદાર છે, જ્યારે એડ્રિનેલિન હૃદયના ધબકારા અને રક્તચાપને વધારે છે, પરંતુ ક્ષારણના ઉચ્ચ સ્તરને લીધે ANPના સ્રાવમાં ઘટાડો થાય છે.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક સંકેતન અને નિયંત્રણ", "difficulty": "Hard", "num": 12}, {"question": "હાલોફાઇટ છોડમાં ક્ષારણ સામે અનુકૂલન તરીકે કયા પેશીના કોષોની કોષભિત્તિમાં સેલ્યુલોઝ અને લિગ્નિનનું પ્રમાણ વધુ હોય છે, જેથી પાણીના નુકશાનને રોકી શકાય?", "options": ["A) જલવાહક પેશી (Xylem)", "B) અન્નવાહક પેશી (Phloem)", "C) બાહ્યત્વચા (Epidermis)", "D) મધ્યપટલ (Mesophyll)"], "correct": 0, "explanation": "હાલોફાઇટ છોડમાં ક્ષારણ સામે અનુકૂલન તરીકે જલવાહક પેશી (Xylem)ના કોષોની કોષભિત્તિમાં સેલ્યુલોઝ અને લિગ્નિનનું પ્રમાણ વધુ હોય છે, જેથી પાણીના વહન દરમ્યાન નુકશાન થતું અટકાવી શકાય. અન્નવાહક પેશી (Phloem) પોષક તત્ત્વોનું વહન કરે છે, બાહ્યત્વચા (Epidermis) કોષોની સુરક્ષા કરે છે, અને મધ્યપટલ (Mesophyll) પ્રકાશસંશ્લેષણમાં ભાગ લે છે, પરંતુ ક્ષારણ સામેના અનુકૂલનમાં મુખ્ય ભૂમિકા જલવાહક પેશીની હોય છે.", "ncert_ref": "Class XII - Chapter 13: સજીવો અને વાતાવરણ", "difficulty": "Hard", "num": 13}, {"question": "મનુષ્યમાં ક્ષારણના ઉચ્ચ સ્તરને લીધે કયા હોર્મોનના સ્રાવમાં વધારો થવાથી રક્તચાપમાં વધારો થાય છે, પરંતુ આ હોર્મોનનું સ્રાવ અંતઃસ્રાવી ગ્રંથિ દ્વારા થતું નથી?", "options": ["A) એડ્રિનેલિન (Adrenaline)", "B) એલ્ડોસ્ટેરોન (Aldosterone)", "C) એન્જિયોટેન્સિન-II (Angiotensin-II)", "D) વેઝોપ્રેસિન (Vasopressin)"], "correct": 2, "explanation": "એન્જિયોટેન્સિન-II (Angiotensin-II) એક હોર્મોન છે જે રક્તચાપને વધારવા માટે જવાબદાર છે, પરંતુ તે અંતઃસ્રાવી ગ્રંથિ દ્વારા સ્રાવિત થતું નથી. તે રક્તમાં રાસાયણિક પ્રક્રિયા દ્વારા ઉત્પન્ન થાય છે. એડ્રિનેલિન અધિવૃક્ક ગ્રંથિ દ્વારા, એલ્ડોસ્ટેરોન અધિવૃક્ક કોર્ટેક્સ દ્વારા, અને વેઝોપ્રેસિન પિટ્યુટરી ગ્રંથિ દ્વારા સ્રાવિત થાય છે.", "ncert_ref": "Class XI - Chapter 22: રાસાયણિક સંકેતન અને નિયમન", "difficulty": "Hard", "num": 14}, {"question": "ક્ષારણ યુક્ત મૃત્તિકામાં ઉગાડેલા છોડમાં, કયા જનીનના અભિવ્યક્તિ દ્વારા કોષરસમાં પ્રોલિનનું સાંદ્રતા વધે છે, જેથી કોષીય દબાણ જાળવી રાખવામાં મદદ મળે?", "options": ["A) P5CS (Δ¹-pyrroline-5-carboxylate synthetase)", "B) Rubisco (Ribulose-1,5-bisphosphate carboxylase/oxygenase)", "C) PEPC (Phosphoenolpyruvate carboxylase)", "D) ACS (1-aminocyclopropane-1-carboxylate synthase)"], "correct": 0, "explanation": "P5CS (Δ¹-pyrroline-5-carboxylate synthetase) જનીનનું અભિવ્યક્તિ કોષરસમાં પ્રોલિનના સાંદ્રતામાં વધારો કરે છે, જે ક્ષારણ યુક્ત વાતાવરણમાં કોષીય દબાણ જાળવી રાખવામાં મદદ કરે છે. Rubisco પ્રકાશસંશ્લેષણમાં ભાગ લે છે, PEPC C4 છોડમાં કાર્બન ફિક્સેશનમાં ભાગ લે છે, અને ACS ઇથિલીન સંશ્લેષણમાં ભાગ લે છે.", "ncert_ref": "Class XII - Chapter 6: અનુવંશિકતા અને પરિવર્તન", "difficulty": "Hard", "num": 15}, {"question": "હાલોફાઇટ છોડમાં ક્ષારણ સામે અનુકૂલન તરીકે કયા પદાર્થનો સંગ્રહ મૂળના કોષરસમાં થાય છે, જેથી કોષીય દબાણ જાળવી રાખવામાં મદદ મળે?", "options": ["A) સુક્રોઝ", "B) પ્રોલિન", "C) ગ્લાઇસીન બેટાઇન", "D) મેલિક એસિડ"], "correct": 2, "explanation": "હાલોફાઇટ છોડમાં ક્ષારણ સામે અનુકૂલન તરીકે ગ્લાઇસીન બેટાઇનનો સંગ્રહ કોષરસમાં થાય છે, જે કોષીય દબાણ જાળવી રાખવામાં મદદ કરે છે. સુક્રોઝ અને પ્રોલિન પણ કોષીય દબાણમાં ફાળો આપે છે, પરંતુ ગ્લાઇસીન બેટાઇન હાલોફાઇટમાં સૌથી અસરકારક છે. મેલિક એસિડ મુખ્યત્વે CAM છોડમાં કાર્બન ફિક્સેશન સાથે સંકળાયેલ છે, ક્ષારણ સામે નહીં.", "ncert_ref": "Class XII - Chapter 13: સજીવો અને વાતાવરણ", "difficulty": "Hard", "num": 16}, {"question": "મનુષ્યમાં ક્ષારણના ઉચ્ચ સ્તરને લીધે કયા અંગમાં રક્તચાપ નિયંત્રણ માટે એન્જિયોટેન્સિનોજન નામનું પ્રોટીન સ્રાવિત થાય છે?", "options": ["A) યકૃત", "B) મૂત્રપિંડ", "C) હૃદય", "D) અગ્ન્યાશય"], "correct": 1, "explanation": "મનુષ્યમાં ક્ષારણના ઉચ્ચ સ્તરને લીધે મૂત્રપિંડમાં એન્જિયોટેન્સિનોજન નામનું પ્રોટીન સ્રાવિત થાય છે, જે રક્તચાપ નિયંત્રણમાં મહત્વની ભૂમિકા ભજવે છે. યકૃત, હૃદય અને અગ્ન્યાશય એન્જિયોટેન્સિનોજન સ્રાવિત કરતા નથી.", "ncert_ref": "Class XI - Chapter 19: ઉત્સર્જન અને ઉત્સર્જન તંત્ર", "difficulty": "Hard", "num": 17}, {"question": "મનુષ્યમાં ક્ષારણના ઉચ્ચ સ્તરને લીધે કયા હોર્મોનના સ્રાવમાં ઘટાડો થવાથી રક્તચાપમાં વધારો થાય છે, પરંતુ આ હોર્મોનનું સ્રાવ અવશ્યકપણે અધવચ્ચે (મધ્યવર્તી) ગાંઠમાંથી થતું નથી?", "options": ["A) એલ્ડોસ્ટેરોન", "B) એડ્રિનેલિન", "C) વેસોપ્રેસિન", "D) એન્જિયોટેન્સિન II"], "correct": 1, "explanation": "મનુષ્યમાં ક્ષારણના ઉચ્ચ સ્તરને લીધે એડ્રિનેલિન હોર્મોનના સ્રાવમાં ઘટાડો થવાથી રક્તચાપમાં વધારો થાય છે. એલ્ડોસ્ટેરોન અને વેસોપ્રેસિન રક્તચાપ નિયંત્રણમાં ભૂમિકા ભજવે છે, પરંતુ એડ્રિનેલિનનું સ્રાવ અધવચ્ચે ગાંઠ (એડ્રિનલ મેડ્યુલા)માંથી થાય છે, જે અહીં અપવાદરૂપ છે. એન્જિયોટેન્સિન II રક્તચાપ વધારવા માટે જવાબદાર છે, પરંતુ તે હોર્મોન નથી.", "ncert_ref": "Class XI - Chapter 22: રસાયણિક નિયમન અને નિયંત્રણ", "difficulty": "Hard", "num": 18}, {"question": "નીચેના પૈકી કયું વિધાન હાલોફાઇટ છોડમાં ક્ષારણ પ્રત્યેના અનુકૂલન માટે ખોટું છે?", "options": ["A) મૂળના કોષોમાં પ્રોલિન અને ગ્લાયસીન બીટેઇન જેવા સુસંગત દ્રાવ્ય પદાર્થોનું સાંદ્રતા વધે છે.", "B) પર્ણોમાં મીઠાના સ્ફટિકોનો સંગ્રહ કરતા મીઠાના ગ્રંથીઓ વિકસિત થાય છે.", "C) કોષરસમાં Na⁺ અને Cl⁻ આયનોનું પ્રમાણ વધતા કોષીય દબાણમાં વધારો થાય છે, જે પાણીના શોષણમાં મદદ કરે છે.", "D) મૂળની કોષભિત્તિમાં લિગ્નિન અને સુબેરિનનું પ્રમાણ વધે છે, જે ક્ષારના પ્રવેશને અવરોધે છે."], "correct": 3, "explanation": "વિકલ્પ D ખોટો છે કારણ કે હાલોફાઇટ છોડમાં મૂળની કોષભિત્તિમાં લિગ્નિન અને સુબેરિનનું પ્રમાણ વધતું નથી. તેના બદલે, કોષરસમાં સુસંગત દ્રાવ્ય પદાર્થો (જેમ કે પ્રોલિન, ગ્લાયસીન બીટેઇન)નું પ્રમાણ વધે છે અને કેટલાક છોડમાં મીઠાના ગ             let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
