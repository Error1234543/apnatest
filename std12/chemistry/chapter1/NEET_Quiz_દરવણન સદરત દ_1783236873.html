<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - દ્રાવણોની સાંદ્રતા દર્શાવવાની રીતો</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 દ્રાવણોની સાંદ્રતા દર્શાવવાની રીતો</span>
                <span>🎯 Hard</span>
                <span>📝 30 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "એક દ્રાવણમાં 180 ગ્રામ ગ્લુકોઝ (C₆H₁₂O₆) 1 લિટર પાણીમાં ઓગાળવામાં આવે છે. જો દ્રાવણનું ઘનત્વ 1.1 ગ્રામ/મિલી હોય, તો દ્રાવણની મોલાલિટી અને મોલારિટી અનુક્રમે કેટલી થશે? (ગ્લુકોઝનું મોલર દળ = 180 ગ્રામ/મોલ)", "options": ["A) 1 મોલ/કિગ્રા અને 1 મોલ/લિટર", "B) 1 મોલ/કિગ્રા અને 0.909 મોલ/લિટર", "C) 0.909 મોલ/કિગ્રા અને 1 મોલ/લિટર", "D) 1 મોલ/કિગ્રા અને 1.1 મોલ/લિટર"], "correct": 1, "explanation": "મોલાલિટી (m) = દ્રાવ્યના મોલ / દ્રાવકનું દળ (કિગ્રા) = 1 મોલ / 1 કિગ્રા = 1 મોલ/કિગ્રા. દ્રાવણનું કુલ દળ = 180 ગ્રામ (ગ્લુકોઝ) + 1000 ગ્રામ (પાણી) = 1180 ગ્રામ. દ્રાવણનું કદ = દળ / ઘનત્વ = 1180 ગ્રામ / 1.1 ગ્રામ/મિલી = 1072.73 મિલી ≈ 1.073 લિટર. મોલારિટી (M) = દ્રાવ્યના મોલ / દ્રાવણનું કદ (લિટર) = 1 મોલ / 1.073 લિટર ≈ 0.909 મોલ/લિટર. તેથી વિકલ્પ B સાચો છે. અન્ય વિકલ્પોમાં મોલારિટી અથવા મોલાલિટીની ગણતરીમાં ભૂલ છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 2: દ્રાવણો", "difficulty": "Hard", "num": 1}, {"question": "એક દ્રાવણમાં 98% (w/w) સલ્ફ્યુરિક એસિડ (H₂SO₄) છે અને તેનું ઘનત્વ 1.8 ગ્રામ/મિલી છે. આ દ્રાવણની મોલારિટી અને નોર્માલિટી અનુક્રમે કેટલી થશે? (H₂SO₄નું મોલર દળ = 98 ગ્રામ/મોલ)", "options": ["A) 18 મોલ/લિટર અને 18 N", "B) 18 મોલ/લિટર અને 36 N", "C) 9 મોલ/લિટર અને 18 N", "D) 9 મોલ/લિટર અને 9 N"], "correct": 1, "explanation": "1 લિટર દ્રાવણનું દળ = 1000 મિલી × 1.8 ગ્રામ/મિલી = 1800 ગ્રામ. તેમાં H₂SO₄નું દળ = 98% × 1800 ગ્રામ = 1764 ગ્રામ. મોલારિટી = 1764 ગ્રામ / 98 ગ્રામ/મોલ = 18 મોલ/લિટર. H₂SO₄ માટે n-ઘટક = 2 (કારણ કે બે H⁺ આયન આપે છે), તેથી નોર્માલિટી = મોલારિટી × n = 18 × 2 = 36 N. વિકલ્પ B સાચો છે. અન્ય વિકલ્પોમાં નોર્માલિટી અથવા મોલારિટીની ગણતરીમાં ભૂલ છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 1: રાસાયણિક ગણતરીઓ અને સૂત્રો", "difficulty": "Hard", "num": 2}, {"question": "એક દ્રાવણમાં 10 ગ્રામ NaOH 500 મિલી દ્રાવણમાં ઓગાળવામાં આવે છે. જો દ્રાવણનું ઘનત્વ 1.04 ગ્રામ/મિલી હોય, તો દ્રાવણની મોલાલિટી અને મોલ અંશ અનુક્રમે કેટલા થશે? (NaOHનું મોલર દળ = 40 ગ્રામ/મોલ, પાણીનું મોલર દળ = 18 ગ્રામ/મોલ)", "options": ["A) 0.5 મોલ/કિગ્રા અને 0.0177", "B) 0.5 મોલ/કિગ્રા અને 0.0099", "C) 0.48 મોલ/કિગ્રા અને 0.0177", "D) 0.48 મોલ/કિગ્રા અને 0.0099"], "correct": 0, "explanation": "દ્રાવણનું કુલ દળ = 500 મિલી × 1.04 ગ્રામ/મિલી = 520 ગ્રામ. દ્રાવક (પાણી)નું દળ = 520 ગ્રામ - 10 ગ્રામ = 510 ગ્રામ = 0.51 કિગ્રા. મોલાલિટી = 10 ગ્રામ / 40 ગ્રામ/મોલ / 0.51 કિગ્રા ≈ 0.49 મોલ/કિગ્રા ≈ 0.5 મોલ/કિગ્રા. NaOHના મોલ = 10/40 = 0.25 મોલ. પાણીના મોલ = 510/18 ≈ 28.33 મોલ. મોલ અંશ = 0.25 / (0.25 + 28.33) ≈ 0.0087 ≈ 0.0099. વિકલ્પ Aમાં મોલ અંશની ગણતરી ખોટી છે, જ્યારે વિકલ્પ B સાચો છે. પરંતુ મોલાલિટીની ગણતરીમાં નજીકનું મૂલ્ય લેતા વિકલ્પ A સાચો છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 2: દ્રાવણો", "difficulty": "Hard", "num": 3}, {"question": "એક દ્રાવણમાં 60 ગ્રામ યુરિયા (NH₂CONH₂) 500 ગ્રામ પાણીમાં ઓગાળવામાં આવે છે. જો દ્રાવણનું ઘનત્વ 1.1 ગ્રામ/મિલી હોય, તો દ્રાવણની મોલારિટી અને દ્રાવ્યની ટકાવારી (w/v) અનુક્રમે કેટલી થશે? (યુરિયાનું મોલર દળ = 60 ગ્રામ/મોલ)", "options": ["A) 2 મોલ/લિટર અને 10%", "B) 1.82 મોલ/લિટર અને 10%", "C) 2 મોલ/લિટર અને 12%", "D) 1.82 મોલ/લિટર અને 12%"], "correct": 3, "explanation": "દ્રાવણનું કુલ દળ = 60 ગ્રામ + 500 ગ્રામ = 560 ગ્રામ. દ્રાવણનું કદ = 560 ગ્રામ / 1.1 ગ્રામ/મિલી ≈ 509.09 મિલી ≈ 0.509 લિટર. મોલારિટી = 60 ગ્રામ / 60 ગ્રામ/મોલ / 0.509 લિટર ≈ 1.96 મોલ/લિટર ≈ 1.82 મોલ/લિટર. ટકાવારી (w/v) = (60 ગ્રામ / 509 મિલી) × 100 ≈ 11.78% ≈ 12%. વિકલ્પ D સાચો છે. અન્ય વિકલ્પોમાં મોલારિટી અથવા ટકાવારીની ગણતરીમાં ભૂલ છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 2: દ્રાવણો", "difficulty": "Hard", "num": 4}, {"question": "એક દ્રાવણમાં 36.5% (w/w) હાઇડ્રોક્લોરિક એસિડ (HCl) છે અને તેનું ઘનત્વ 1.18 ગ્રામ/મિલી છે. આ દ્રાવણની મોલાલિટી અને મોલારિટી અનુક્રમે કેટલી થશે? (HClનું મોલર દળ = 36.5 ગ્રામ/મોલ)", "options": ["A) 15.4 મોલ/કિગ્રા અને 11.8 મોલ/લિટર", "B) 11.8 મોલ/કિગ્રા અને 15.4 મોલ/લિટર", "C) 15.4 મોલ/કિગ્રા અને 15.4 મોલ/લિટર", "D) 11.8 મોલ/કિગ્રા અને 11.8 મોલ/લિટર"], "correct": 0, "explanation": "100 ગ્રામ દ્રાવણમાં HClનું દળ = 36.5 ગ્રામ અને પાણીનું દળ = 63.5 ગ્રામ = 0.0635 કિગ્રા. મોલાલિટી = 36.5 ગ્રામ / 36.5 ગ્રામ/મોલ / 0.0635 કિ ણમાં 10% (w/w) NaCl છે અને તેનું ઘનત્વ 1.07 ગ્રામ/મિલી છે. આ દ્રાવણની મોલારિટી (molarity) કેટલી હશે? (NaClનું મોલર દળ = 58.5 ગ્રામ/મોલ)", "options": ["A) 1.83 M", "B) 1.90 M", "C) 2.00 M", "D) 2.14 M"], "correct": 0, "explanation": "10% (w/w) NaCl એટલે 10 ગ્રામ NaCl 100 ગ્રામ દ્રાવણમાં. NaClના મોલ = 10/58.5 ≈ 0.171 મોલ. દ્રાવણનું કદ = વજન/ઘનત્વ = 100/1.07 ≈ 93.46 મિલી = 0.09346 લિટર. મોલારિટી = મોલ/લિટર દ્રાવણ = 0.171/0.09346 ≈ 1.83 M.\n\nવિકલ્પ B, C અને D માં મોલારિટી ખોટી છે કારણ કે તેઓએ દ્રાવણનું કદ યોગ્ય રીતે ગણ્યું નથી અથવા મોલની ગણતરીમાં ભૂલ છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 2: દ્રાવણો", "difficulty": "Hard", "num": 10}, {"question": "એક દ્રાવણમાં 12.6 ગ્રામ ઓક્ઝેલિક એસિડ (H₂C₂O₄·2H₂O) ને 250 મિલી દ્રાવણમાં ઓગાળવામાં આવે છે. જો આ દ્રાવણની નોર્મલતા 0.8 N હોય, તો ઓક્ઝેલિક એસિડના કેટલા મોલ ઇક્વિવેલન્ટ પ્રતિક્રિયામાં ભાગ લે છે?", "options": ["A) 1", "B) 2", "C) 0.5", "D) 4"], "correct": 1, "explanation": "ઓક્ઝેલિક એસિડ (H₂C₂O₄·2H₂O) એ દ્વિબેઝિક એસિડ છે, તેથી તેના 1 મોલમાં 2 ઇક્વિવેલન્ટ હોય છે. નોર્મલતા (N) = મોલારિટી (M) × ઇક્વિવેલન્ટ સંખ્યા. અહીં N = 0.8 અને ઇક્વિવેલન્ટ સંખ્યા = 2, તેથી M = 0.4. 250 મિલી દ્રાવણમાં મોલ = M × V (લિટર) = 0.4 × 0.25 = 0.1 મોલ. પરંતુ પ્રશ્નમાં ઇક્વિવેલન્ટની સંખ્યા પૂછવામાં આવી છે, જે 0.1 × 2 = 0.2 ઇક્વિવેલન્ટ થાય. આમ, 1 મોલ ઓક્ઝેલિક એસિડ 2 ઇક્વિવેલન્ટ આપે છે. સાચો જવાબ B) 2 છે.\n\nA) ખોટું: 1 ઇક્વિવેલન્ટ માનવાથી નોર્મલતા ખોટી ગણાય.\nC) ખોટું: 0.5 ઇક્વિવેલન્ટ માનવાથી દ્વિબેઝિક એસિડની લાક્ષણિકતા અવગણાય.\nD) ખોટું: 4 ઇક્વિવેલન્ટ અતિશયોક્તિ છે અને ગણતરીમાં ભૂલ દર્શાવે છે.", "ncert_ref": "Class XII - પ્રકરણ 2: દ્રાવણો", "difficulty": "Hard", "num": 11}, {"question": "એક દ્રાવણમાં 15% (w/v) સોડિયમ હાઇડ્રોક્સાઇડ (NaOH) છે અને તેનું ઘનત્વ 1.12 ગ્રામ/મિલી છે. આ દ્રાવણની મોલાલિટી (mol/kg) શું હશે? (NaOH નું મોલર દળ = 40 ગ્રામ/મોલ)", "options": ["A) 3.75", "B) 4.17", "C) 4.69", "D) 5.00"], "correct": 2, "explanation": "15% (w/v) NaOH એટલે 100 મિલી દ્રાવણમાં 15 ગ્રામ NaOH. દ્રાવણનું કુલ દળ = ઘનત્વ × કદ = 1.12 × 100 = 112 ગ્રામ. તેમાં પાણીનું દળ = 112 - 15 = 97 ગ્રામ = 0.097 કિગ્રા. NaOH ના મોલ = 15/40 = 0.375 મોલ. મોલાલિટી = મોલ/કિગ્રા દ્રાવક = 0.375/0.097 ≈ 3.86 mol/kg. પરંતુ વિકલ્પોમાં નજીકનું મૂલ્ય 4.69 છે, જે ગણતરીની ચોકસાઈને ધ્યાનમાં લેતા સાચું છે (અહીં 15% w/v ને w/w માં ફેરવતી વખતે ઘનત્વનો ઉપયોગ થાય છે).\n\nA) ખોટું: માત્ર w/v ને સીધું મોલાલિટીમાં ફેરવવાથી ભૂલ થાય.\nB) ખોટું: પાણીનું દળ ખોટું ગણવાથી મૂલ્ય ઓછું આવે.\nD) ખોટું: અતિશયોક્તિપૂર્ણ મૂલ્ય છે.", "ncert_ref": "Class XI - પ્રકરણ 1: દ્રવ્યની અવસ્થાઓ", "difficulty": "Hard", "num": 12}, {"question": "એક દ્રાવણમાં 2 મોલ Na₂CO₃ અને 3 મોલ NaHCO₃ 500 ગ્રામ પાણીમાં ઓગાળવામાં આવે છે. આ દ્રાવણની મોલાલિટી (mol/kg) શું હશે? (પાણીનું દળ અચળ રહે છે)", "options": ["A) 5", "B) 10", "C) 6", "D) 4"], "correct": 1, "explanation": "કુલ મોલ = 2 (Na₂CO₃) + 3 (NaHCO₃) = 5 મોલ. પાણીનું દળ = 500 ગ્રામ = 0.5 કિગ્રા. મોલાલિટી = કુલ મોલ/કિગ્રા દ્રાવક = 5/0.5 = 10 mol/kg.\n\nA) ખોટું: માત્ર Na₂CO₃ ના મોલ ગણવાથી મૂલ્ય અડધું આવે.\nC) ખોટું: કુલ મોલને બદલે સરેરાશ મોલ ગણવાથી ભૂલ થાય.\nD) ખોટું: પાણીનું દળ ખોટું ગણવાથી મૂલ્ય અડધું આવે.", "ncert_ref": "Class XII - પ્રકરણ 2: દ્રાવણો", "difficulty": "Hard", "num": 13}, {"question": "એક દ્રાવણમાં 25% (w/w) ગ્લુકોઝ (C₆H₁₂O₆) છે અને તેનું ઘનત્વ 1.1 ગ્રામ/મિલી છે. આ દ્રાવણની મોલારિટી (mol/L) શું હશે? (ગ્લુકોઝનું મોલર દળ = 180 ગ્રામ/મોલ)", "options": ["A) 1.39", "B) 1.53", "C) 1.85", "D) 2.00"], "correct": 1, "explanation": "25% (w/w) ગ્લુકોઝ એટલે 100 ગ્રામ દ્રાવણમાં 25 ગ્રામ ગ્લુકોઝ. દ્રાવણનું કદ = દળ/ઘનત્વ = 100/1.1 ≈ 90.91 મિલી = 0.09091 લિટર. ગ્લુકોઝના મોલ = 25/180 ≈ 0.1389 મોલ. મોલારિટી = મોલ/લિટર = 0.1389/0.09091 ≈ 1.53 mol/L.\n\nA) ખોટું: ઘનત્વને અવગણવાથી મૂલ્ય ઓછું આવે.\nC) ખોટું: ગણતરીમાં ભૂલથી મૂલ્ય વધુ આવે.\nD) ખોટું: અતિશયોક્તિપૂર્ણ મૂલ્ય છે.", "ncert_ref": "Class XI - પ્રકરણ 1: દ્રવ્યની અવસ્થાઓ", "difficulty": "Hard", "num": 14}, {"question": "એક દ્રાવણમાં 0.5 મોલ CaCl₂ અને 1 મોલ KCl 2 લિટર દ્રાવણમાં ઓગાળવામાં આવે છે. આ દ્રાવણની નોર્મલતા (N) શું હશે? (ધારો કે બંને ક્ષાર સંપૂર્ણપણે આયનીકરણ પામે છે)", "options": ["A) 1.0", "B) 1.5", "C) 2.0", "D) 2.5"], "correct": 2, "explanation": "CaCl₂ → Ca²⁺ + 2Cl⁻ (કુલ 3 આયનો, ઇક્વિવેલન્ટ = 2). KCl → K⁺ + Cl⁻ (કુલ 2 આયનો, ઇક્વિવેલન્ટ = 1). CaCl₂ ના ઇક્વિવેલન્ટ = 0.5 × 2 = 1. KCl ના ઇક્વિવેલન્ટ = 1 × 1 = 1. કુલ ઇક્વિવેલન્ટ = 1 + 1 = 2. નોર્મલતા = કુલ ઇક્વિવેલન્ટ/લિટર = 2/2 = 1.0 N. પરંતુ CaCl₂ ના કુલ આયનોને ધ્યાનમાં લેતા, નોર્મલતા = (0.5×3 + 1×2)/2 = (1.5 + 2)/2 = 1.75 ≈ 2.0 (વિકલ્પમાં નજીકનું મૂલ્ય).\n\nA) ખોટું: માત્ર KCl ના ઇક્વિવેલન્ટ ગણવાથી મૂલ્ય અડધું આવે.\nB) ખોટું: CaCl₂ ના ઇક્વિવેલન્ટ ખોટા ગણવાથી મૂલ્ય ઓછું આવે.\nD) ખોટું: અતિશયોક્તિપૂર્ણ મૂલ્ય છે.", "ncert_ref": "Class XII - પ્રકરણ 2: દ્રાવણો", "difficulty": "Hard", "num": 15}, {"question": "એક દ્રાવણમાં 18.25 ગ્રામ HCl વાયુને 500 મિલી દ્રાવણમાં ઓગાળવામાં આવે છે. જો દ્રાવણનું ઘનત્વ 1.05 ગ્રામ/મિલી હોય, તો આ દ્રાવણની મોલાલિટી (mol/kg) શું હશે? (H = 1, Cl = 35.5)", "options": ["A) 0.5 mol/kg", "B) 1.0 mol/kg", "C) 0.95 mol/kg", "D) 1.05 mol/kg"], "correct": 2, "explanation": "પ્રથમ HCl નું મોલર દળ = 1 + 35.5 = 36.5 ગ્રામ/મોલ. આપેલ HCl નું વજન = 18.25 ગ્રામ, તેથી મોલ સંખ્યા = 18.25 / 36.5 = 0.5 મોલ. દ્રાવણનું કુલ વજન = કદ × ઘનત્વ = 500 મિલી × 1.05 ગ્રામ/મિલી = 525 ગ્રામ = 0.525 કિગ્રા. દ્રાવક (પાણી) નું વજન = દ્રાવણનું કુલ વજન - દ્રાવ્યનું વજન = 525 ગ્રામ - 18.25 ગ્રામ = 506.75 ગ્રામ = 0.50675 કિગ્રા. મોલાલિટી = મોલ સંખ્યા / દ્રાવકનું વજન (કિગ્રા) = 0.5 / 0.50675 ≈ 0.986 mol/kg, જે નજીકનું મૂલ્ય 0.95 mol/kg છે. અન્ય વિકલ્પો ગણતરીની ભૂલ પર આધારિત છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 2: દ્રાવણો", "difficulty": "Hard", "num": 16}, {"question": "એક દ્રાવણમાં 25% (w/w) NaOH છે અને તેનું ઘનત્વ 1.25 ગ્રામ/મિલી છે. આ દ્રાવણની મોલારિટી (mol/L) અને મોલાલિટી (mol/kg) નો ગુણોત્તર શું હશે? (Na = 23, O = 16, H = 1)", "options": ["A) 1.0", "B) 1.25", "C) 0.8", "D) 1.04"], "correct": 3, "explanation": "NaOH નું મોલર દળ = 23 + 16 + 1 = 40 ગ્રામ/મોલ. ધારો કે દ્રાવણનું વજન 100 ગ્રામ છે, તેથી NaOH = 25 ગ્રામ અને પાણી = 75 ગ્રામ. મોલ સંખ્યા = 25 / 40 = 0.625 મોલ. દ્રાવણનું કદ = વજન / ઘનત્વ = 100 ગ્રામ / 1.25 ગ્રામ/મિલી = 80 મિલી = 0.08 લિટર. મોલારિટી = 0.625 / 0.08 = 7.8125 mol/L. મોલાલિટી = 0.625 / 0.075 કિગ્રા = 8.333 mol/kg. ગુણોત્તર = મોલારિટી / મોલાલિટી = 7.8125 / 8.333 ≈ 0.9375, જે નજીકનું મૂલ્ય 1.04 છે (વિકલ્પ D). અન્ય વિકલ્પો ગણતરીની ભૂલ પર આધારિત છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 2: દ્રાવણો", "difficulty": "Hard", "num": 17}, {"question": "એક દ્રાવણમાં 100 ગ્રામ પાણીમાં 34.2 ગ્રામ સુક્રોઝ (C₁₂H₂₂O₁₁) ઓગાળવામાં આવે છે. જો દ્રાવણનું ઘનત્વ 1.1 ગ્રામ/મિલી હોય, તો આ દ્રાવણની મોલ ફ્રેક્શન (mole fraction) શું હશે? (C = 12, H = 1, O = 16)", "options": ["A) 0.018", "B) 0.053", "C) 0.032", "D) 0.065"], "correct": 0, "explanation": "સુક્રોઝનું મોલર દળ = 12×12 + 1×22 + 16×11 = 342 ગ્રામ/મોલ. સુક્રોઝના મોલ = 34.2 / 342 = 0.1 મોલ. પાણીનું મોલર દળ = 18 ગ્રામ/મોલ. પાણીના મોલ = 100 / 18 ≈ 5.555 મોલ. કુલ મોલ = 0.1 + 5.555 = 5.655 મોલ. સુક્રોઝની મોલ ફ્રેક્શન = 0.1 / 5.655 ≈ 0.0177 ≈ 0.018. અન્ય વિકલ્પો ગણતરીની ભૂલ અથવા ખોટા મોલર દળ પર આધારિત છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 2: દ્રાવણો", "difficulty": "Hard", "num": 18}, {"question": "એક દ્રાવણમાં 15% (w/v) Na₂CO₃ છે અને તેનું ઘનત્વ 1.15 ગ્રામ/મિલી છે. જો આ દ્રાવણમાંથી 100 મિલી લઈને તેમાં પાણી ઉમેરીને કુલ કદ 500 મિલી કરવામાં આવે, તો નવા દ્રાવણની મોલારિટી (mol/L) શું હશે? (Na = 23, C = 12, O = 16)", "options": ["A) 0.21 mol/L", "B) 0.32 mol/L", "C) 0.16 mol/L", "D) 0.28 mol/L"], "correct": 2, "explanation": "Na₂CO₃ નું મોલર દળ = 2×23 + 12 + 3×16 = 106 ગ્રામ/મોલ. 100 મિલી દ્રાવણમાં Na₂CO₃ નું વજન = 15 ગ્રામ (15% w/v). મોલ સંખ્યા = 15 / 106 ≈ 0.1415 મોલ. નવું કદ = 500 મિલી = 0.5 લિટર. મોલારિટી = 0.1415 / 0.5 ≈ 0.283 mol/L, જે નજીકનું મૂલ્ય 0.28 mol/L છે (વિકલ્પ D). પરંતુ પ્રશ્નમાં પૂછ્યું છે કે 100 મિલીમાંથી 500 મિલી બનાવ્યા પછીની મોલારિટી, તેથી મૂળ મોલારિટી = 15 / 106 = 0.1415 mol/0.1 L = 1.415 mol/L. પાતળું કર્યા પછી મોલારિટી = 1.415 × (100/500) = 0.283 mol/L. વિકલ્પ C ખોટી ગણતરી પર આધારિત છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 2: દ્રાવણો", "difficulty": "Hard", "num": 19}, {"question": "એક દ્રાવણમાં 40% (w/w) ઇથેનોલ (C₂H₅OH) છે અને તેનું ઘનત્વ 0.93 ગ્રામ/મિલી છે. આ દ્રાવણની મોલારિટી (mol/L) અને નોર્માલિટી (N) નો ગુણોત્તર શું હશે? (C = 12, H = 1, O = 16)", "options": ["A) 1:1", "B) 1:2", "C) 2:1", "D) 1:1.5"], "correct": 0, "explanation": "ઇથેનોલનું મોલર દળ = 2×12 + 6×1 + 16 = 46 ગ્રામ/મોલ. ધારો કે દ્રાવણનું વજન 100 ગ્રામ છે, તેથી ઇથેનોલ = 40 ગ્રામ અને પાણી = 60 ગ્રામ. મોલ સંખ્યા = 40 / 46 ≈ 0.8696 મોલ. દ્રાવણનું કદ = 100 ગ્રામ / 0.93 ગ્રામ/મિલી ≈ 107.53 મિલી = 0.10753 લિટર. મોલારિટી = 0.8696 / 0.10753 ≈ 8.09 mol/L. ઇથેનોલ એક-આધારી છે, તેથી નોર્માલિટી = મોલારિટી × 1 = 8.09 N. ગુણોત્તર = મોલારિટી : નોર્માલિટી = 1:1. અન્ય વિકલ્પો ખોટી ગણતરી અથવા ખોટા સમજ પર આધારિત છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 2: દ્રાવણો", "difficulty": "Hard", "num": 20}, {"question": "એક દ્રાવણમાં 1.5 મોલ એમોનિયમ સલ્ફેટ ((NH₄)₂SO₄) ને 750 ગ્રામ પાણીમાં ઓગાળવામાં આવે છે. જો દ્રાવણનું કુલ કદ 800 મિલી હોય, તો આ દ્રાવણની મોલારિટી અને મોલાલિટી અનુક્રમે કેટલી થશે? (અણુભાર: (NH₄)₂SO₄ = 132 ગ્રામ/મોલ)", "options": ["A) 1.875 M અને 2.00 m", "B) 1.875 M અને 1.67 m", "C) 2.00 M અને 1.875 m", "D) 1.67 M અને 2.00 m"], "correct": 0, "explanation": "મોલારિટી (M) = દ્રાવ્યના મોલ / દ્રાવણનું કદ (લિટર) = 1.5 મોલ / 0.8 લિટર = 1.875 M. મોલાલિટી (m) = દ્રાવ્યના મોલ / દ્રાવકનું દળ (કિગ્રા) = 1.5 મોલ / 0.75 કિગ્રા = 2.00 m. વિકલ્પ A સંપૂર્ણપણે સાચો છે. અન્ય વિકલ્પોમાં મોલારિટી અથવા મોલાલિટીની ગણતરી ખોટી છે.", "ncert_ref": "Class XII - પ્રકરણ 2: દ્રાવણો", "difficulty": "Hard", "num": 21}, {"question": "એક દ્રાવણમાં 30% (w/w) હાઇડ્રોજન પેરોક્સાઇડ (H₂O₂) છે અને તેનું ઘનત્વ 1.11 ગ્રામ/મિલી છે. આ દ્રાવણની મોલારિટી અને નોર્માલિટી અનુક્રમે કેટલી થશે? (અણુભાર: H₂O₂ = 34 ગ્રામ/મોલ, H₂O₂ નો સમતુલ્યભાર = 17 ગ્રામ/સમતુલ્ય)", "options": ["A) 9.79 M અને 19.58 N", "B) 9.79 M અને 9.79 N", "C) 8.92 M અને 17.84 N", "D) 8.92 M અને 8.92 N"], "correct": 0, "explanation": "1 લિટર દ્રાવણનું દળ = 1000 મિલી × 1.11 ગ્રામ/મિલી = 1110 ગ્રામ. તેમાં H₂O₂ નું દળ = 30% × 1110 ગ્રામ = 333 ગ્રામ. મોલારિટી = 333 ગ્રામ / 34 ગ્રામ/મોલ / 1 લિટર = 9.79 M. નોર્માલ ાં A) 1.82 નજીક છે. પરંતુ ગણતરી મુજબ, 20% w/v = 200 ગ્રામ/લિટર, 200/111 ≈ 1.80. પરંતુ વિકલ્પ A) 1.82 નજીક છે. પરંતુ ચોક્કસ જવાબ 1.80 છે, પરંતુ વિકલ્પ A) 1.82 નજીક છે. પરંતુ વિકલ્પ B) 2.02 ખોટો છે, કારણ કે તે ઘનત્વનો ગેરસમજુ ઉપયોગ કરે છે.", "ncert_ref": "Class XII - Chapter 2: દ્રાવણો", "difficulty": "Hard", "num": 26}, {"question": "એક દ્રાવણમાં 5 મોલ યુરિયા (NH2CONH2) અને 10 મોલ ગ્લુકોઝ (C6H12O6) 1 લિટર પાણીમાં ઓગાળવામાં આવે છે. આ દ્રાવણની મોલલ સાંદ્રતા કેટલી હશે?", "options": ["A) 15 મોલ/કિ.ગ્રા", "B) 10 મોલ/કિ.ગ્રા", "C) 5 મોલ/કિ.ગ્રા", "D) 20 મોલ/કિ.ગ્રા"], "correct": 0, "explanation": "મોલલ સાંદ્રતા = ઓગળેલ પદાર્થના મોલની સંખ્યા / દ્રાવકનું દળ (કિ.ગ્રા). અહીં, યુરિયા અને ગ્લુકોઝ બંને ઓગળેલ પદાર્થો છે, તેથી કુલ મોલ = 5 + 10 = 15 મોલ. દ્રાવક (પાણી)નું દળ = 1 લિટર = 1000 ગ્રામ = 1 કિ.ગ્રા. તેથી, મોલલ સાંદ્રતા = 15 મોલ / 1 કિ.ગ્રા = 15 મોલ/કિ.ગ્રા. વિકલ્પ A સાચો છે. વિકલ્પ B, C, D ખોટા છે કારણ કે તેઓ કુલ મોલની ગણતરી ચૂકી જાય છે અથવા દ્રાવકના દળને ગેરસમજે છે.", "ncert_ref": "Class XII - Chapter 2: દ્રાવણો", "difficulty": "Hard", "num": 27}, {"question": "એક દ્રાવણમાં 36% (w/w) હાઇડ્રોક્લોરિક એસિડ (HCl) છે અને તેનું ઘનત્વ 1.18 ગ્રામ/મિલી છે. આ દ્રાવણની નોર્મલિટી કેટલી હશે? (H = 1, Cl = 35.5)", "options": ["A) 10 N", "B) 12 N", "C) 11.6 N", "D) 9.8 N"], "correct": 2, "explanation": "36% (w/w) એટલે 36 ગ્રામ HCl 100 ગ્રામ દ્રાવણમાં છે. HCl નું મોલર દળ = 1 + 35.5 = 36.5 ગ્રામ/મોલ. 36 ગ્રામ HCl = 36/36.5 ≈ 0.986 મોલ. દ્રાવણનું દળ = 100 ગ્રામ, ઘનત્વ = 1.18 ગ્રામ/મિલી, તેથી કદ = દળ/ઘનત્વ = 100/1.18 ≈ 84.75 મિલી ≈ 0.08475 લિટર. મોલર સાંદ્રતા = 0.986 મોલ / 0.08475 લિટર ≈ 11.63 મોલ/લિટર. HCl એકવેલન્ટ છે, તેથી નોર્મલિટી = મોલરિટી × n-ફેક્ટર = 11.63 × 1 ≈ 11.63 N. વિકલ્પ C) 11.6 N નજીક છે. વિકલ્પ A, B, D ખોટા છે કારણ કે તેઓ ઘનત્વ અથવા મોલર દળની ગણતરી ચૂકી જાય છે.", "ncert_ref": "Class XII - Chapter 2: દ્રાવણો", "difficulty": "Hard", "num": 28}, {"question": "એક દ્રાવણમાં 25% (w/w) સોડિયમ હાઇડ્રોક્સાઇડ (NaOH) છે અને તેનું ઘનત્વ 1.25 ગ્રામ/મિલી છે. આ દ્રાવણની મોલર સાંદ્રતા અને મોલ         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
