<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - પ્રક્રિયાના વેગનો તાપમાન પર આધાર (આર્હેનિયસ સમીકરણ)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 પ્રક્રિયાના વેગનો તાપમાન પર આધાર (આર્હેનિયસ સમીકરણ)</span>
                <span>🎯 Hard</span>
                <span>📝 30 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "આર્હેનિયસ સમીકરણ k = A e^(-Ea/RT) મુજબ, જો પ્રક્રિયાનો સક્રિયકરણ ઉર્જા (Ea) શૂન્ય હોય, તો પ્રક્રિયાના વેગ અચળ (A) અને તાપમાન (T) વચ્ચેનો સંબંધ કયો હશે?", "options": ["A) વેગ અચળ A ના સમપ્રમાણમાં હશે અને તાપમાન પર આધાર રાખશે નહીં", "B) વેગ તાપમાનના વર્ગમૂળના સમપ્રમાણમાં હશે", "C) વેગ તાપમાનના વ્યસ્ત પ્રમાણમાં હશે", "D) વેગ તાપમાનના ઘાતાંકીય પ્રમાણમાં હશે"], "correct": 0, "explanation": "આર્હેનિયસ સમીકરણમાં જો Ea = 0 હોય, તો e^(-Ea/RT) = e^0 = 1 થાય છે, જેથી k = A થાય છે. આથી વેગ અચળ A ના સમપ્રમાણમાં રહે છે અને તાપમાન પર આધાર રાખતો નથી. બાકીના વિકલ્પો અયોગ્ય છે કારણ કે તેઓ તાપમાન સાથેના સંબંધને ખોટી રીતે દર્શાવે છે.", "ncert_ref": "Class XII - પ્રકરણ 4: રસાયણિક ગતિકી", "difficulty": "Hard", "num": 1}, {"question": "એક ઉત્સેચક-ઉત્પ્રેરિત પ્રક્રિયામાં, તાપમાન 10°C થી 20°C સુધી વધારવામાં આવે છે. જો પ્રક્રિયાનો વેગ દોઢ ગણો થાય છે, તો Q10 નું મૂલ્ય કેટલું હશે?", "options": ["A) 1.5", "B) 2.0", "C) 2.25", "D) 1.0"], "correct": 0, "explanation": "Q10 ની વ્યાખ્યા મુજબ, તે તાપમાન 10°C વધારવાથી પ્રક્રિયાના વેગમાં થતો ફેરફાર દર્શાવે છે. અહીં વેગ દોઢ ગણો થાય છે, જેથી Q10 = (વેગ at 20°C / વેગ at 10°C) = 1.5. બાકીના વિકલ્પો અયોગ્ય છે કારણ કે તેઓ Q10 ની ગણતરી સાથે મેળ ખાતા નથી.", "ncert_ref": "Class XII - પ્રકરણ 4: રસાયણિક ગતિકી", "difficulty": "Hard", "num": 2}, {"question": "નીચેના પૈકી કયો વિકલ્પ આર્હેનિયસ સમીકરણના સ્વરૂપ k = A e^(-Ea/RT) માં A નું સૌથી યોગ્ય વર્ણન કરે છે?", "options": ["A) પ્રક્રિયાના વેગ અચળ જેમાં તાપમાન અને સક્રિયકરણ ઉર્જાનો સમાવેશ થાય છે", "B) પ્રક્રિયાના સક્રિયકરણ ઉર્જાનું મૂલ્ય", "C) પ્રક્રિયાના વેગ પર તાપમાનનો અસર દર્શાવતો ઘાતાંકીય પદ", "D) પ્રક્રિયાના વેગ અચળ જેમાં અણુઓની આંતરિક ઉર્જા અને અથડામણની આવૃત્તિનો સમાવેશ થાય છે"], "correct": 3, "explanation": "આર્હેનિયસ સમીકરણમાં A એ પ્રી-એક્સપોનેન્શિયલ ફેક્ટર છે, જે અણુઓની આંતરિક ઉર્જા, અથડામણની આવૃત્તિ અને સ્થાનિક ગોઠવણીને ધ્યાનમાં લે છે. વિકલ્પ D આને સૌથી યોગ્ય રીતે વર્ણવે છે. બાકીના વિકલ્પો A, B, અને C અયોગ્ય છે કારણ કે તેઓ A ની સંકલ્પનાને ખોટી રીતે દર્શાવે છે.", િયસ સમીકરણ અનુસાર, તાપમાન વધતાં સક્રિયકરણ ઉર્જા (Ea) ઘટી જાય છે, જેથી વેગ ઘટે છે.", "B) ઉત્સેચકનું ડીનેચરલાઇઝેશન થાય છે, જેથી તેની કેટાલિટિક ક્ષમતા નષ્ટ થાય છે.", "C) પ્રક્રિયાનો સંતુલન બિંદુ તાપમાન વધતાં બદલાય છે, જેથી વેગ ઘટે છે.", "D) તાપમાન વધતાં પ્રક્રિયાના ઉત્પાદનોની સાંદ્રતા વધી જાય છે, જેથી વેગ ઘટે છે."], "correct": 1, "explanation": "ઉત્સેચક-ઉત્પ્રેરિત પ્રક્રિયામાં તાપમાન વધારતાં વેગ પહેલાં વધે છે કારણ કે આર્હેનિયસ સમીકરણ અનુસાર, તાપમાન વધતાં અણુઓની ગતિઉર્જા વધે છે અને સક્રિય સંકીર્ણ બનવાની સંભાવના વધે છે. પરંતુ અતિશય તાપમાન (આમ તો 50°C પછી) એ ઉત્સેચકના ત્રિપરિમાણીય સ્ટ્રક્ચરને નુકસાન પહોંચાડે છે, જેથી તે ડીનેચરલાઇઝ થાય છે અને તેની કેટાલિટિક ક્ષમતા નષ્ટ થાય છે. આથી વેગ અચાનક ઘટી જાય છે. વિકલ્પ A ખોટો છે કારણ કે સક્રિયકરણ ઉર્જા (Ea) તાપમાન સાથે બદલાતી નથી. વિકલ્પ C ખોટો છે કારણ કે સંતુલન બિંદુ તાપમાન સાથે બદલાય તે પ્રક્રિયાની પ્રકૃતિ પર આધાર રાખે છે, પરંતુ ઉત્સેચક-ઉત્પ્રેરિત પ્રક્રિયાઓમાં આ પ્રભાવ ડીનેચરલાઇઝેશન જેટલો મહત્વનો નથી. વિકલ્પ D ખોટો છે કારણ કે ઉત્પાદનોની સાંદ્રતા વધવી તે વેગ ઘટાડવાનું કારણ નથી, પરંતુ સંતુલન તરફ ધકેલવાનું કારણ બની શકે.", "ncert_ref": "Class XII - Chapter 4: રાસાયણિક ગતિકી", "difficulty": "Hard", "num": 23}, {"question": "નીચેના પૈકી કયું વિધાન આર્હેનિયસ સમીકરણ k = A e^(-Ea/RT) અને ઉત્સેચક-ઉત્પ્રેરિત પ્રક્રિયાઓ વિશે સાચું નથી?", "options": ["A) ઉત્સેચક-ઉત્પ્રેરિત પ્રક્રિયાઓમાં, સક્રિયકરણ ઉર્જા (Ea) નો મૂલ્ય અત્યંત ઓછો હોય છે.", "B) આર્હેનિયસ સમીકરણ અનુસાર, તાપમાન વધતાં વેગ અચળાંક (k) એક્સપોનેન્શિયલ રીતે વધે છે.", "C) ઉત્સેચક-ઉત્પ્રેરિત પ્રક્રિયાઓમાં, પ્રી-એક્સપોનેન્શિયલ ફેક્ટર (A) નો મૂલ્ય તાપમાન સાથે બદલાય છે.", "D) જો બે પ્રક્રિયાઓની સક્રિયકરણ ઉર્જા સમાન હોય, પરંતુ પ્રી-એક્સપોનેન્શિયલ ફેક્ટર અલગ હોય, તો તાપમાન વધતાં તેમના વેગમાં તફાવત રહેશે."], "correct": 2, "explanation": "વિકલ્પ C ખોટો છે કારણ કે પ્રી-એક્સપોનેન્શિયલ ફેક્ટર (A) એ પ્રક્રિયાની આણ્વિકતાનું માપન છે અને તે તાપમાન સાથે બદલાતો નથી. આર્હેનિયસ સમીકરણમાં, A એ અચળ મૂલ્ય છે. વિકલ્પ A સાચો છે કારણ કે ઉત્સેચક-ઉત્પ્રેરિત પ્રક્રિયાઓમાં, ઉત્સેચક પ્રક્રિયાને નીચા સક્રિયકરણ ઉર્જા માર્ગે લઈ જાય છે. વિકલ્પ B સાચો છે કારણ કે આર્હેનિયસ સમીકરણ અનુસાર, તાપમાન વધતાં e^(-Ea/RT) નો મૂલ્ય વધે છે, જેથી k વધે છે. વિકલ્પ D સાચો છે કારણ કે પ્રી-એક્સપોનેન્શિયલ ફેક્ટર (A) નો મૂલ્ય વેગ અચળાંક (k) ને અસર કરે છે, અને જો A અલગ હોય તો તાપમાન વધતાં kમાં તફાવત રહેશે.", "ncert_ref": "Class XII - Chapter 4: રાસાયણિક ગતિકી", "difficulty": "Hard", "num": 24}, {"question": "એક પ્રક્રિયાનો વેગ અચળાંક 300 K તાપમાને k1 અને 320 K તાપમાને k2 છે. જો આ પ્રક્રિયા માટે આર્હેનિયસ સમીકરણ k = A e^(-Ea/RT) લાગુ પડે, તો નીચેના પૈકી કયું વિધાન સાચું છે?", "options": ["A) જો Ea = 0 હોય, તો k1 = k2 હશે.", "B) જો A નો મૂલ્ય 1 હોય, તો k1 અને k2 નો મૂલ્ય તાપમાન સાથે બદલાશે નહીં.", "C) જો Ea નો મૂલ્ય અત્યંત ઉચ્ચ હોય, તો k1 અને k2 નો મૂલ્ય તાપમાન સાથે બદલાશે નહીં.", "D) જો T નો મૂલ્ય 0 K હોય, તો k1 અને k2 નો મૂલ્ય અનંત હશે."], "correct": 0, "explanation": "વિકલ્પ A સાચો છે કારણ કે જો સક્રિયકરણ ઉર્જા (Ea) = 0 હોય, તો આર્હેનિયસ સમીકરણ k = A e^(0) = A થાય છે, જેથી k1 = k2 = A. આથી તાપમાન બદલાતાં પણ k નો મૂલ્ય અચળ રહેશે. વિકલ્પ B ખોટો છે કારણ કે A નો મૂલ્ય 1 હોય તો પણ k = e^(-Ea/RT) થાય છે, જેથી તાપમાન બદલાતાં k બદલાશે. વિકલ્પ C ખોટો છે કારણ કે Ea નો મૂલ્ય ઉચ્ચ હોય તો તાપમાન બદલાતાં k નો મૂલ્ય વધુ પ્રમાણમાં બદલાશે. વિકલ્પ D ખોટો છે કારણ કે T = 0 K હોય તો e^(-Ea/RT) નો મૂલ્ય 0 થાય છે, જેથી k = 0 થાય છે.", "ncert_ref": "Class XII - Chapter 4: રાસાયણિક ગતિકી", "difficulty": "Hard", "num": 25}, {"question": "એક ઉત્સેચક-ઉત્પ્રેરિત પ્રક્રિયામાં, તાપમાન 25°C થી 35°C સુધી વધારવામાં આવે છે. જો આ પ્રક્રિયાનો સક્રિયકરણ ઉર્જા (Ea) 50 kJ/mol હોય, તો પ્રક્રિયાના વેગ અચળાંકમાં લગભગ કેટલો ગુણોત્તર વધારો થશે? (R = 8.314 J/mol·K લો)", "options": ["A) 2 ગણો", "B) 3 ગણો", "C) 4 ગણો", "D) 5 ગણો"], "correct": 1, "explanation": "આર્હેનિયસ સમીકરણ મુજબ, k = A e^(-Ea/RT). બે તાપમાને વેગ અચળાંકનો ગુણોત્તર ln(k2/k1) = (Ea/R)(1/T1 - 1/T2) થી મળે છે. T1 = 298 K, T2 = 308 K, Ea = 50000 J/mol મૂકતાં ln(k2/k1) ≈ 1.11 મળે છે, જેનો અર્થ k2/k1 ≈ e^1.11 ≈ 3.03 થાય છે. તેથી વેગ અચળાંક લગભગ 3 ગણો વધે છે. અન્ય વિકલ્પો ગણતરીના પરિણામ સાથે મેળ ખાતા નથી.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "difficulty": "Hard", "num": 26}, {"question": "એક ઉત્સેચક-ઉત્પ્રેરિત પ્રક્રિયામાં, તાપમાન 40°C થી 50°C સુધી વધારતાં પ્રક્રિયાનો વેગ અચળાંક 2 ગણો થાય છે. જો આ જ પ્રક્રિયાનો સક્રિયકરણ ઉર્જા (Ea) બમણો કરવામાં આવે, તો 40°C થી 50°C તાપમાન વધારતાં વેગ અચળાંકમાં કેટલો ગુણોત્તર વધારો થશે?", "options": ["A) 2 ગણો", "B) 4 ગણો", "C) 8 ગણો", "D) 16 ગણો"], "correct": 1, "explanation": "આર્હેનિયસ સમીકરણ મુજબ, ln(k2/k1) = (Ea/R)(1/T1 - 1/T2). પ્રારંભિક Ea માટે k2/k1 = 2 છે. જો Ea બમણો થાય, તો નવો ગુણોત્તર (k2'/k1') = e^(2*(Ea/R)(1/T1 - 1/T2)) = (k2/k1)^2 = 2^2 = 4 થશે. તેથી વેગ અચળાંક 4 ગણો વધશે. અન્ય વિકલ્પો ગણતરી સાથે સુસંગત નથી.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર", "difficulty": "Hard", "num": 27}, {"question": "નીચેના પૈકી કયું વિધાન ઉત્સેચક-ઉત્પ્રેરિત પ્રક્રિયાઓ અને આર્હેનિયસ સમીકરણ વિશે ખોટું છે?", "options": ["A) ઉત્સેચકો પ્રક્રિયાના સક્રિયકરણ ઉર્જા (Ea) ઘટાડીને પ્રક્રિયાનો વેગ વધારે છે", "B) ઉત્સેચક-ઉત્પ્રેરિત પ્રક્રિયાઓમાં, તાપમાનમાં વધારો હંમેશા પ્રક્રિયાના વેગમાં વધારો કરે છે", "C) આર્હેનિયસ સમીકરણ મુજબ, તાપમાનમાં વધારો પ્રક્રિયાના વેગ અચળાંકમાં વધારો કરે છે", "D) ઉત્સેચકો પ્રક્રિયાના પ્રી-એક્સપોનેન્શિયલ ફેક્ટર (A) ને અસર કરી શકે છે"], "correct": 1, "explanation": "ઉત્સેચક-ઉત્પ્રેરિત પ્રક્રિયાઓમાં, તાપમાનમાં વધારો પ્રક્રિયાના વેગમાં પહેલાં વધારો કરે છે, પરંતુ ખૂબ ઊંચા તાપમાને ઉત્સેચકો નિષ્ક્રિય થઈ જાય છે, તેથી વેગ ઘટે છે. આથી વિકલ્પ B ખોટું છે. અન્ય વિકલ્પો આર્હેનિયસ સમીકરણ અને ઉત્સેચકોની ક્રિયાવિધિ સાથે સુસંગત છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 4: રાસાયણિક ગતિશાસ્ત્ર, પ્રકરણ 9: જૈવઅણુઓ", "difficulty": "Hard", "num": 28}, {"question": "એક ઉત્સેચક-ઉત્પ્રેરિત પ્રક્રિયામાં, તાપમાન 20°C થી 60°C સુધી વધારવામાં આવે છે. પ્રક્રિયાના વેગ અચળાંકમાં નીચેના પૈકી કયો ફેરફાર થવાની સંભાવના સૌથી વધુ છે?", "options": ["A) સતત વધતો રહેશે", "B) પહેલાં વધશે, પછી ઘટશે", "C) સતત ઘટતો રહેશે", "D) પહેલાં ઘટશે, પછી વધશે"], "correct": 1, "explanation": "ઉત્સેચક-ઉત્પ્રેરિત પ્રક્રિયાઓમાં, તાપમ         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};

                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;

        function updateProgress(){

            document.getElementById('progressBar').style.width=(answered/total*100)+'%';

        function submitQuiz(){
            if(quizSubmitted) return;

                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';

                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');

                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);

            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
