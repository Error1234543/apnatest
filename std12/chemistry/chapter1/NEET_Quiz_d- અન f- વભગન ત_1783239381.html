    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}

        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}

        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}

        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}

        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>

    <script>
        const questionsData = [{"question": "d-વિભાગના તત્ત્વોના સંદર્ભમાં નીચેનામાંથી કયું વિધાન સત્ય નથી?", "options": ["A) તેઓ સંક્રાંતિ ધાતુઓ તરીકે ઓળખાય છે અને અપૂર્ણપૂરિત d-કક્ષક ધરાવે છે.", "B) Zn, Cd અને Hg ના d-કક્ષક પૂર્ણપૂરિત હોય છે, પરંતુ તેઓ d-વિભાગમાં ગણવામાં આવે છે.", "C) d-વિભાગના તત્ત્વોના ઓક્સીડેશન અવસ્થાઓમાં +1 અને +2 સૌથી સામાન્ય હોય છે.", "D) d-વિભાગના તત્ત્વોના ક્લોરાઇડ્સ સામાન્ય રીતે રંગહીન હોય છે."], "correct": 3, "explanation": "d-વિભાગના તત્ત્વોના ક્લોરાઇડ્સ સામાન્ય રીતે રંગીન હોય છે કારણ કે d-d સંક્રાંતિને લીધે. Zn, Cd અને Hg ના d-કક્ષક પૂર્ણપૂરિત હોય છે, પરંતુ તેઓ d-વિભાગમાં ગણવામાં આવે છે કારણ કે તેઓ સંક્રાંતિ ધાતુઓની જેમ રાસાયણિક ગુણધર્મો ધરાવે છે. d-વિભાગના તત્ત્વો સંક્રાંતિ ધાતુઓ તરીકે ઓળખાય છે અને અપૂર્ણપૂરિત d-કક્ષક ધરાવે છે. ઓક્સીડેશન અવસ્થાઓમાં +1 અને +2 સામાન્ય હોય છે, પરંતુ +3, +4 વગેરે પણ શક્ય હોય છે.", "ncert_ref": "Class XII - પ્રકરણ 7: d- અને f-વિભાગનાં તત્ત્વો", "difficulty": "Hard", "num": 1}, {"question": "f-વિભાગના તત્ત્વોના સંદર્ભમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) લેન્થેનાઇડ્સમાં 4f કક્ષક ભરાય છે, જ્યારે એક્ટિનાઇડ્સમાં 5f કક્ષક ભરાય છે.", "B) f-વિભાગના તત્ત્વોને આંતર સંક્રાંતિ તત્ત્વો કહેવામાં આવે છે કારણ કે તેઓ સંક્રાંતિ ધાતુઓની વચ્ચે આવેલા છે.", "C) f-વિભાગના તત્ત્વોના આયનો રંગીન હોય છે કારણ કે f-f સંક્રાંતિ શક્ય હોય છે.", "D) લેન્થેનાઇડ્સ અને એક્ટિનાઇડ્સ બંનેમાં +3 ઓક્સીડેશન અવસ્થા સૌથી સ્થિર હોય છે."], "correct": 2, "explanation": "f-વિભાગના તત્ત્વોના આયનો રંગીન હોય છે કારણ કે f-d સંક્રાંતિ શક્ય હોય છે, f-f સંક્રાંતિ નહીં. લેન્થેનાઇડ્સમાં 4f કક્ષક ભરાય છે, જ્યારે એક્ટિનાઇડ્સમાં 5f કક્ષક ભરાય છે. f-વિભાગના તત્ત્વોને આંતર સંક્રાંતિ તત્ત્વો કહેવામાં આવે છે કારણ કે તેઓ સંક્રાંતિ ધાતુઓની વચ્ચે આવેલા છે. લેન્થેનાઇડ્સ અને એક્ટિનાઇડ્સ બંનેમાં +3 ઓક્સીડેશન અવસ્થા સૌથી સ્થિર હોય છે.", "ncert_ref": "Class XII - પ્રકરણ 7: d- અને f-વિભાગનાં તત્ત્વો", "difficulty": "Hard", "num": 2}, {"question": "નીચેનામાંથી કયું તત્ત્વ d-વિભાગમાં ગણવામાં આવતું નથી?", "options": ["A) કોપર", "B) સિલ્વર", "C) ગોલ્ડ", "D) એલ્યુમ tion": "d-વિભાગના તત્ત્વોની પ્રથમ આયનીઝેશન એનથાલ્પી s-વિભાગના તત્ત્વો કરતાં વધારે હોય છે, કારણ કે d-વિભાગના તત્ત્વોના બાહ્ય ઇલેક્ટ્રોન (n-1)d કક્ષામાં હોય છે, જે n s કક્ષા કરતાં કોષકેન્દ્રથી વધુ દૂર હોય છે, પરંતુ કોષકેન્દ્રીય આકર્ષણ વધુ હોય છે. બાકીના વિધાનો સત્ય છે.", "ncert_ref": "Class XII - Chapter 7: d- અને f-બ્લોક તત્ત્વો", "difficulty": "Hard", "num": 13}, {"question": "f-વિભાગના તત્ત્વોના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) f-વિભાગના તત્ત્વોની પ્રથમ આયનીઝેશન એનથાલ્પી d-વિભાગના તત્ત્વો કરતાં ઓછી હોય છે.", "B) f-વિભાગના તત્ત્વો રંગહીન યૌગિકો બનાવે છે.", "C) f-વિભાગના તત્ત્વોની ઓક્સીડેશન અવસ્થાઓ સામાન્ય રીતે +3 હોય છે.", "D) f-વિભાગના તત્ત્વો સરળતાથી ઓક્સીડાઇઝ થાય છે."], "correct": 2, "explanation": "f-વિભાગના તત્ત્વોની ઓક્સીડેશન અવસ્થાઓ સામાન્ય રીતે +3 હોય છે, કારણ કે તેઓ તેમના 4f ઇલેક્ટ્રોન ગુમાવી શકે છે. બાકીના વિધાનો ખોટા છે: f-વિભાગના તત્ત્વોની પ્રથમ આયનીઝેશન એનથાલ્પી d-વિભાગના તત્ત્વો કરતાં વધારે હોય છે, તેઓ રંગીન યૌગિકો બનાવે છે, અને તેઓ સરળતાથી ઓક્સીડાઇઝ થતાં નથી.", "ncert_ref": "Class XII - Chapter 7: d- અને f-બ્લોક તત્ત્વો", "difficulty": "Hard", "num": 14}, {"question": "આવર્ત કોષ્ટકમાં d-વિભાગના તત્ત્વો પૈકી નીચેનામાંથી કયું તત્ત્વ તેની +1 ઓક્સીડેશન અવસ્થામાં સ્થિર છે?", "options": ["A) Cu", "B) Ag", "C) Au", "D) ઉપરોક્ત તમામ"], "correct": 3, "explanation": "Cu (કોપર), Ag (સિલ્વર), અને Au (ગોલ્ડ) એ તમામ d-વિભાગના તત્ત્વો છે, જે તેમની +1 ઓક્સીડેશન અવસ્થામાં સ્થિર છે. Cu+1, Ag+1, અને Au+1 અવસ્થાઓ જાણીતી અને સ્થિર છે. આમ, ઉપરોક્ત તમામ વિકલ્પ સત્ય છે.", "ncert_ref": "Class XII - Chapter 7: d- અને f-બ્લોક તત્ત્વો", "difficulty": "Hard", "num": 15}, {"question": "આવર્ત કોષ્ટકના d-વિભાગમાં સ્થાન ધરાવતા તત્ત્વો પૈકી નીચેનામાંથી કયું તત્ત્વ તેની સ્થાયી ઓક્સિડેશન અવસ્થામાં d⁵ ઇલેક્ટ્રોનીય રચના ધરાવતું નથી?", "options": ["A) મેંગેનીઝ (Mn)", "B) આયર્ન (Fe)", "C) ક્રોમિયમ (Cr)", "D) ટેક્નેશિયમ (Tc)"], "correct": 1, "explanation": "મેંગેનીઝ (Mn) તેની +2 ઓક્સિડેશન અવસ્થામાં d⁵ રચના ધરાવે છે. ટેક્નેશિયમ (Tc) પણ +7 અવસ્થામાં d⁵ રચના ધરાવે છે. ક્રોમિયમ (Cr) તેની +3 અવસ્થામાં d³ રચના ધરાવે છે, પરંતુ આયર્ન (Fe) તેની સૌથી સ્થાયી +3 અવસ્થામાં d⁵ રચના ધરાવતું નથી, તે d⁵ રચના માત્ર +2 અવસ્થામાં ધરાવે છે જે ઓછી સ્થાયી છે. તેથી સાચો જવાબ આયર્ન (Fe) છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 8: d- અને f-વિભાગનાં તત્ત્વો", "difficulty": "Hard", "num": 16}, {"question": "નીચેનામાંથી કયું વિધાન લેન્થેનાઇડ શ્રેણીના તત્ત્વો માટે ખોટું છે?", "options": ["A) લેન્થેનાઇડ શ્રેણીના તત્ત્વોની આયનીકરણ એન્થાલ્પી સામાન્ય રીતે વધતી જાય છે.", "B) લેન્થેનાઇડ શ્રેણીમાં Eu અને Yb અપવાદરૂપે નીચી આયનીકરણ એન્થાલ્પી ધરાવે છે.", "C) લેન્થેનાઇડ શ્રેણીમાં તત્ત્વોની પરમાણ્વીય ત્રિજ્યા ક્રમશઃ ઘટતી જાય છે, જેને લેન્થેનાઇડ સંકોચન કહે છે.", "D) લેન્થેનાઇડ શ્રેણીના તત્ત્વોની +4 ઓક્સિડેશન અવસ્થા સામાન્ય રીતે સ્થાયી હોય છે."], "correct": 3, "explanation": "લેન્થેનાઇડ શ્રેણીમાં +4 ઓક્સિડેશન અવસ્થા માત્ર Ce અને Tb માટે સ્થાયી હોય છે, બાકીના તત્ત્વો માટે તે અસ્થાયી હોય છે. બાકીના તમામ વિધાનો સત્ય છે: આયનીકરણ એન્થાલ્પી સામાન્ય રીતે વધે છે (Eu અને Yb અપવાદ છે), અને લેન્થેનાઇડ સંકોચનને કારણે પરમાણ્વીય ત્રિજ્યા ઘટે છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 8: d- અને f-વિભાગનાં તત્ત્વો", "difficulty": "Hard", "num": 17}, {"question": "d-વિભાગના તત્ત્વો પૈકી નીચેનામાંથી કયું તત્ત્વ તેની સૌથી ઉચ્ચ ઓક્સિડેશન અવસ્થામાં ઑક્સોએનાયન રચના કરતું નથી?", "options": ["A) વેનેડિયમ (V)", "B) ક્રોમિયમ (Cr)", "C) મેંગેનીઝ (Mn)", "D) કોપર (Cu)"], "correct": 3, "explanation": "વેનેડિયમ (V) VO₄³⁻, ક્રોમિયમ (Cr) CrO₄²⁻ અને Cr₂O₇²⁻, મેંગેનીઝ (Mn) MnO₄⁻ ઑક્સોએનાયન રચે છે. કોપર (Cu) તેની ઉચ્ચતમ +2 ઓક્સિડેશન અવસ્થામાં ઑક્સોએનાયન રચના કરતું નથી, તે માત્ર કેટાયન રૂપે જોવા મળે છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 8: d- અને f-વિભાગનાં તત્ત્વો", "difficulty": "Hard", "num": 18}, {"question": "એક વિદ્યાર્થીએ આવર્ત કોષ્ટકના f-વિભાગના તત્ત્વોનો અભ્યાસ કરતાં નોંધ્યું કે એક તત્ત્વ તેની +2 ઓક્સિડેશન અવસ્થામાં સ્થાયી છે અને તેની ઇલેક્ટ્રોનીય રચના [Xe]4f⁷ છે. આ તત્ત્વ કયું હશે?", "options": ["A) સમેરિયમ (Sm)", "B) યુરોપિયમ (Eu)", "C) ગેડોલિનિયમ (Gd)", "D) ટર્બિયમ (Tb)"], "correct": 0, "explanati                     opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
