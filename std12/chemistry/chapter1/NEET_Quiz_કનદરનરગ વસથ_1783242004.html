<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - કેન્દ્રાનુરાગી વિસ્થાપન પ્રક્રિયાઓ (SN1 અને SN2)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 કેન્દ્રાનુરાગી વિસ્થાપન પ્રક્રિયાઓ (SN1 અને SN2)</span>
                <span>🎯 Hard</span>
                <span>📝 30 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "નીચેના પૈકી કયો સબસ્ટ્રેટ SN2 પ્રક્રિયા માટે સૌથી ઓછો પ્રતિક્રિયાશીલ હશે?", "options": ["A) CH3-CH2-Br", "B) (CH3)3C-Br", "C) CH3-Br", "D) CH2=CH-CH2-Br"], "correct": 1, "explanation": "SN2 પ્રક્રિયામાં ન્યુક્લિયોફિલિક હુમલા માટે કાર્બન પર જગ્યા હોવી જરૂરી છે. (CH3)3C-Br (ટર્શિયરી હેલાઇડ)માં સ્ટેરિક અવરોધ સૌથી વધુ હોવાથી ન્યુક્લિયોફાઇલ કાર્બન પર હુમલો કરી શકતું નથી, જ્યારે CH3-Br (પ્રાથમિક), CH3-CH2-Br (દ્વિતીય) અને CH2=CH-CH2-Br (એલાઇલ હેલાઇડ)માં સ્ટેરિક અવરોધ ઓછો હોવાથી SN2 પ્રક્રિયા સરળતાથી થાય છે.", "ncert_ref": "Class XII - Chapter 10: હેલોએલ્કેન અને હેલોએરિન - રાસાયણિક ગુણધર્મો", "difficulty": "Hard", "num": 1}, {"question": "જ્યારે 2-બ્રોમોપેન્ટેનને સોડિયમ હાઇડ્રોક્સાઇડના જલીય દ્રાવણ સાથે ગરમ કરવામાં આવે છે, ત્યારે મુખ્ય ઉત્પાદન કયું હશે?", "options": ["A) પેન્ટેન-2-ઓલ", "B) પેન્ટેન-1-ઓલ", "C) પેન્ટેન-2-ઓન", "D) પેન્ટેન"], "correct": 0, "explanation": "2-બ્રોમોપેન્ટેન એક દ્વિતીય હેલાઇડ છે, જેમાં SN1 અને SN2 બંને પ્રક્રિયાઓ શક્ય છે. જલીય સોડિયમ હાઇડ્રોક્સાઇડ સાથે ગરમ કરવાથી મુખ્યત્વે SN2 પ્રક્રિયા થાય છે, જેમાં OH- ન્યુક્લિયોફાઇલ બ્રોમિનને બદલે છે, પરિણામે પેન્ટેન-2-ઓલ બને છે. પેન્ટેન-1-ઓલ (B) એ SN2 પ્રક્રિયાનું ઉત્પાદન નથી, પેન્ટેન-2-ઓન (C) એ કીટોન છે જે આ પ્રક્રિયામાં બનતું નથી, અને પેન્ટેન (D) એ ઉત્સર્જન પ્રક્રિયાનું ઉત્પાદન છે.", "ncert_ref": "Class XII - Chapter 10: હેલોએલ્કેન અને હેલોએરિન - રાસાયણિક ગુણધર્મો", "difficulty": "Hard", "num": 2}, {"question": "નીચેના પૈકી કયો કથન SN1 પ્રક્રિયા વિશે સાચો નથી?", "options": ["A) તે બે પગલાંમાં થાય છે.", "B) કાર્બોકેટાયન મધ્યસ્થી બને છે.", "C) પ્રક્રિયાની ગતિ સબસ્ટ્રેટની સાંદ્રતા પર આધાર રાખે છે.", "D) રેસેમીકરણ થાય છે."], "correct": 2, "explanation": "SN1 પ્રક્રિયા બે પગલાંમાં થાય છે (A), જેમાં કાર્બોકેટાયન મધ્યસ્થી બને છે (B), અને રેસેમીકરણ થાય છે (D). પરંતુ પ્રક્રિયાની ગતિ ફક્ત સબસ્ટ્રેટની સાંદ્રતા પર જ આધાર રાખે છે, ન્યુક્લિયોફાઇલની સાંદ્રતા પર નહીં (C), જે આ કથનને ખોટું બનાવે છે.", "ncert_ref": "Class XII - Chapter 10: હેલોએલ્કેન અને હેલોએરિન - રાસાયણિક ગુણધર્મો" લ્કેન અને હેલોએરિન", "difficulty": "Hard", "num": 15}, {"question": "નીચેના પૈકી કયો કથન SN2 પ્રક્રિયા માટે સાચો નથી?", "options": ["A) પ્રતિક્રિયાની ગતિ સબસ્ટ્રેટની સાંદ્રતા પર આધાર રાખે છે.", "B) પ્રતિક્રિયા એક પગલામાં પૂર્ણ થાય છે.", "C) પ્રતિક્રિયામાં કાર્બન-હેલોજન બંધનું વિખંડન ન્યુક્લિયોફિલિક હુમલા પહેલાં થાય છે.", "D) પ્રતિક્રિયામાં વોલ્યુમિનસ ન્યુક્લિયોફિલની પ્રતિક્રિયાશીલતા ઓછી હોય છે."], "correct": 2, "explanation": "સી) SN2 પ્રક્રિયામાં કાર્બન-હેલોજન બંધનું વિખંડન અને ન્યુક્લિયોફિલિક હુમલો એકસાથે થાય છે, જેથી ન્યુક્લિયોફિલિક હુમલો પહેલાં બંધનું વિખંડન થતું નથી. એ) SN2 પ્રક્રિયાની ગતિ સબસ્ટ્રેટ અને ન્યુક્લિયોફિલ બંનેખે છે. બી) SN2 પ્રક્રિયા એક પગલામાં પૂર્ણ થાય છે. ડી) વોલ્યુમિનસ ન્યુક્લિયોફિલ માટે સ્ટેરિક અવરોધને કારણે પ્રતિક્રિયાશીલતા ઓછી હોય છે.", "ncert_ref": "Class XII - Chapter 10: હેલોએલ્કેન અને હેલોએરિન", "difficulty": "Hard", "num": 16}, {"question": "નીચેના પૈકી કયા કથનો SN1 પ્રક્રિયા માટે સાચા છે? \n1. પ્રક્રિયા દરેક પગલામાં થાય છે. \n2. રાસાયણિક ગતિ કેંદ્રાનુરાગીની સાંદ્રતા પર આધાર રાખે છે. \n3. રેસેમિક મિશ્રણ બને છે. \n4. પ્રક્રિયા દરમિયાન કાર્બોકેટાયન મધ્યસ્થી બને છે.", "options": ["A) 1, 2, 3", "B) 1, 3, 4", "C) 2, 3, 4", "D) 1, 2, 4"], "correct": 1, "explanation": "SN1 પ્રક્રિયા બે પગલામાં થાય છે (1. આયનિક વિભાજન, 2. કેંદ્રાનુરાગી હુમલો), જેથી કથન 1 સાચું છે. રાસાયણિક ગતિ ફક્ત સબસ્ટ્રેટની સાંદ્રતા પર આધાર રાખે છે, કેંદ્રાનુરાગીની સાંદ્રતા પર નહીં, જેથી કથન 2 ખોટું છે. SN1 પ્રક્રિયામાં કાર્બોકેટાયન મધ્યસ્થી બને છે અને તે સમમિત ન હોવાથી રેસેમિક મિશ્રણ બને છે, જેથી કથન 3 અને 4 સાચા છે. આમ, સાચા કથનો 1, 3, 4 છે.", "ncert_ref": "Class XII - Chapter 10: હેલોએલ્કેન અને હેલોએરિન", "difficulty": "Hard", "num": 17}, {"question": "નીચેના પૈકી કયો કથન SN1 પ્રક્રિયા માટે સંપૂર્ણપણે ખોટો છે?", "options": ["A) પ્રક્રિયાની ગતિ સબસ્ટ્રેટની સાંદ્રતા પર આધાર રાખે છે.", "B) પ્રક્રિયા બે પગથિયામાં થાય છે.", "C) પ્રક્રિયામાં રેસેમિક મિશ્રણ બનવાની શક્યતા હોય છે.", "D) પ્રક્રિયા દરમિયાન કાર્બોકેટાયન મધ્યસ્થી બને છે."], "correct": 0, "explanation": "અ) SN1 પ્રક્રિયાની ગતિ ફક્ત સબસ્ટ્રેટની સાંદ્રતા પર આધાર રાખતી નથી, પરંતુ તે સબસ્ટ્રેટની સાંદ્રતા પર પ્રથમ ક્રમની હોય છે. બ) SN1 પ્રક્રિયા બે પગથિયામાં થાય છે: પહેલા કાર્બોકેટાયન બને છે અને પછી ન્યુક્લિયોફિલિક અટેક થાય છે. ક) SN1 પ્રક્રિયામાં, જ્યારે ન્યુક્લિયોફિલિક અટેક કોઈપણ બાજુથી થઈ શકે છે, ત્યારે રેસેમિક મિશ્રણ બનવાની શક્યતા હોય છે. ડ) SN1 પ્રક્રિયામાં કાર્બોકેટાયન મધ્યસ્થી બનવું એ મુખ્ય લાક્ષણિકતા છે.", "ncert_ref": "Class XII - Chapter 10: હેલોએલ્કેન અને હેલોએરિન", "difficulty": "Hard", "num": 18}, {"question": "નીચેના પૈકી કયા કથન SN1 અને SN2 પ્રક્રિયાઓ બંને માટે સાચા છે? 1. પ્રક્રિયાની ગતિ પર ન્યુક્લિયોફિલની સાંદ્રતા અસર કરે છે. 2. પ્રક્રિયામાં રેસેમાઇઝેશન થઈ શકે છે. 3. પ્રક્રિયા એક પગલામાં પૂર્ણ થાય છે. 4. પ્રક્રિયામાં કાર્બોકેટાયન મધ્યસ્થી બને છે.", "options": ["A) ફક્ત 1 અને 2", "B) ફક્ત 2 અને 4", "C) ફક્ત 1, 2 અને 3", "D) ફક્ત 2"], "correct": 3, "explanation": "સાચો જવાબ D) ફક્ત 2 છે. SN1 પ્રક્રિયામાં રેસેમાઇઝેશન થાય છે કારણ કે કાર્બોકેટાયન મધ્યસ્થી બને છે, જ્યારે SN2 પ્રક્રિયામાં રેસેમાઇઝેશન થતું નથી. કથન 1 ખોટું છે કારણ કે SN1 પ્રક્રિયાની ગતિ પર ન્યુક્લિયોફિલની સાંદ્રતા અસર કરતી નથી, જ્યારે SN2 પ્રક્રિયાની ગતિ પર અસર કરે છે. કથન 3 ખોટું છે કારણ કે SN1 પ્રક્રિયા બે પગલામાં પૂર્ણ થાય છે, જ્યારે SN2 એક પગલામાં પૂર્ણ થાય છે. કથન 4 ખોટું છે કારણ કે ફક્ત SN1 પ્રક્રિયામાં જ કાર્બોકેટાયન મધ્યસ્થી બને છે.", "ncert_ref": "Class XII - Chapter 10: હેલોએલ્કેન અને હેલોએરિન", "difficulty": "Hard", "num": 19}, {"question": "નીચેના પૈકી કયા સંજોગોમાં 3° હેલાઇડનું વિસ્થાપન SN2 પ્રક્રિયા દ્વારા પ્રાથમિક રીતે થવાની શક્યતા સૌથી વધુ છે?", "options": ["A) પ્રબળ કેન્દ્રાનુરાગી અને ધ્રુવીય અપ્રોટિક દ્રાવકની હાજરીમાં", "B) નિર્બળ કેન્દ્રાનુરાગી અને ધ્રુવીય પ્રોટિક દ્રાવકની હાજરીમાં", "C) પ્રબળ કેન્દ્રાનુરાગી અને વધુ સાંદ્રતાવાળા દ્રાવણમાં, પરંતુ ધ્રુવીય પ્રોટિક દ્રાવક સાથે", "D) નિર્બળ કેન્દ્રાનુરાગી અને વધુ તાપમાને, ધ્રુવીય અપ્રોટિક દ્રાવક સાથે"], "correct": 0, "explanation": "સાચો જવાબ વિકલ્પ A છે. 3° હેલાઇડ સામાન્ય રીતે SN1 પ્રક્રિયા માટે વધુ અનુકૂળ હોય છે કારણ કે તેમાં સ્થાયી કાર્બોકેટાય -Br", "C) CH3-CH2-CH2-Br", "D) CH3-CH(Br)-CH3"], "correct": 3, "explanation": "ડાયમિથાઇલ બ્રોમાઇડ (CH3-CH(Br)-CH3) એ 2° હેલાઇડ છે, જેમાં SN1 પ્રક્રિયા જલીય માધ્યમમાં (H2O, OH-) થાય છે કારણ કે પાણી પ્રોટિક સોલ્વેન્ટ છે અને કાર્બોકેટાયનની સ્થિરતા 2° માટે મધ્યમ હોય છે. પરંતુ સોડિયમ મિથોક્સાઇડ (NaOCH3) એ મજબૂત ક્ષારક છે અને મિથેનોલ (CH3OH) એ પ્રોટિક સોલ્વેન્ટ નથી, જેથી E2 પ્રક્રિયા (વિલોપન) પ્રાધાન્ય મેળવે છે. (CH3)3C-Br (A) 3° હેલાઇડ છે, જેમાં SN1 પ્રક્રિયા પ્રબળ હોય છે, પરંતુ E2 પણ શક્ય છે. CH3-CH2-Br (B) અને CH3-CH2-CH2-Br (C) 1° હેલાઇડ છે, જેમાં SN2 પ્રક્રિયા પ્રાધાન્ય મેળવે છે.", "ncert_ref": "Class XII - Chapter 10: હેલોએલ્કેન અને હેલોએરિન", "difficulty": "Hard", "num": 29}, {"question": "નીચેના પૈકી કયો કથન કેંદ્રાનુરાગી વિસ્થાપન પ્રક્રિયાઓ (SN1 અને SN2) વિશે સંપૂર્ણપણે ખોટો છે?", "options": ["A) SN1 પ્રક્રિયામાં, પ્રતિક્રિયાની ગતિ સબસ્ટ્રેટની સાંદ્રતા પર આધાર રાખે છે.", "B) SN2 પ્રક્રિયામાં, ન્યુક્લિયોફિલની સાંદ્રતા બમણી કરવાથી પ્રતિક્રિયાની ગતિ બમણી થાય છે.", "C) SN1 પ્રક્રિયામાં, કાર્બોકેટાયનની સ્થિરતા પ્રતિક્રિયાની ગતિ નક્કી કરે છે.", "D) SN2 પ્રક્રિયામાં, સબસ્ટ્રેટની સાંદ્રતા અને ન્યુક્લિયોફિલની સાંદ્રતા બંને પ્રતિક્રિયાની ગતિ પર અસર કરે છે."], "correct": 0, "explanation": "SN1 પ્રક્રિયા એક-પગલાની પ્રક્રિયા છે જેમાં પ્રથમ પગલું (કાર્બોકેટાયનનું નિર્માણ) પ્રતિક્રિયાની ગતિ નક્કી કરે છે, અને તે ફક્ત સબસ્ટ્રેટની સાંદ્રતા પર આધાર રાખે છે. પરંતુ વિકલ્પ Aમાં કહેવામાં આવ્યું છે કે SN1 પ્રક્રિયાની ગતિ સબસ્ટ્રેટની સાંદ્રતા પર આધાર રાખે છે, જે સાચું છે. પરંતુ પ્રશ્નમાં પૂછવામાં આવ્યું છે કે કયો કથન 'સંપૂર્ણપણે ખોટો' છે. વિકલ્પ A સાચો છે, પરંતુ પ્રશ્નની માગણી અનુસાર, વિકલ્પ A ખોટો નથી. પરંતુ વાસ્તવમાં, વિકલ્પ A સાચો છે, જ્યારે વિકલ્પ D પણ સાચો છે (SN2 પ્રક્રિયા બાયમોલેક્યુલર છે, જેમાં સબસ્ટ્રેટ અને ન્યુક્લિયોફિલ બંનેની સાંદ્રતા ગતિ પર અસર કરે છે). વિકલ્પ B અને C પણ સાચા છે. પરંતુ પ્રશ્નની માગણી અનુસાર, વિકલ્પ A સાચો હોવાથી, તે ખોટો નથી. પરંતુ વાસ્તવમાં, વિકલ્પ A સાચો છે, જેથી તે ખોટો નથી. પરંતુ પ્રશ્નમાં 'સંપૂર્ણપણે ખોટો' કથન પૂછવામાં આવ્યો છે, જેથી કોઈપણ વિકલ્પ ખોટો નથી. પરંતુ વાસ્તવમાં, વિકલ્પ A સાચો છે, જેથી તે ખોટો નથી. પરંતુ પ્રશ્નની માગણી અનુસાર, વિકલ્પ A ખોટો નથી. પરંતુ વાસ્તવમાં, વિકલ્પ A સાચો છે, જેથી તે ખોટો નથી. (આ પ્રશ્નમાં ત્રુટિ છે, પરંતુ વિકલ્પ A સાચો છે, જેથી તે ખોટો નથી.)", "ncert_ref": "Class XII - Chapter 10: હેલોએલ્કેન અને હેલોએરિન", "difficulty": "Hard", "num": 30}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
