<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - જૈવિક અણુઓ
પ્રોટીન (એમિનો ઍસિડ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 જૈવિક અણુઓ
પ્રોટીન (એમિનો ઍસિડ</span>
                <span>🎯 Hard</span>
                <span>📝 30 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "એક એમિનો ઍસિડમાં કેટલા કાર્બન પરમાણુઓ હાજર હોય છે જ્યારે તેની સાઇડ ચેઇન (R ગ્રુપ)માં કોઈ કાર્બન ન હોય?", "options": ["A) 2", "B) 3", "C) 4", "D) 5"], "correct": 1, "explanation": "એમિનો ઍસિડની સામાન્ય રચના H₂N-CH(R)-COOH હોય છે. જ્યારે R ગ્રુપમાં કોઈ કાર્બન ન હોય (ઉદા. ગ્લાઇસીન), ત્યારે મુખ્ય શૃંખલામાં 2 કાર્બન (α-કાર્બન અને કાર્બોક્સિલ ગ્રુપનું કાર્બન) હોય છે, પરંતુ α-કાર્બન અને કાર્બોક્સિલ ગ્રુપ સાથે જોડાયેલા કાર્બનને ગણતરીમાં લેતા કુલ 3 કાર્બન પરમાણુઓ થાય છે. ગ્લાઇસીન (NH₂-CH₂-COOH)માં R = H હોય છે, જેમાં કોઈ વધારાનું કાર્બન નથી, પરંતુ મુખ્ય શૃંખલામાં 2 કાર્બન હોય છે, પરંતુ કાર્બોક્સિલ ગ્રુપનું કાર્બન પણ ગણવામાં આવે છે, જેથી કુલ 3 કાર્બન થાય છે. બાકીના વિકલ્પો (2, 4, 5) અયોગ્ય છે કારણ કે તે સાઇડ ચેઇન વગરના એમિનો ઍસિડની રચના સાથે મેળ ખાતા નથી.", "ncert_ref": "Class XII - પ્રકરણ 9: જૈવિક અણુઓ", "difficulty": "Hard", "num": 1}, {"question": "પેપ્ટાઇડ બંધની રચના દરમિયાન પાણીનો અણુ કયા અણુઓ વચ્ચે બહાર પડે છે?", "options": ["A) એમિનો ગ્રુપ અને એમિનો ગ્રુપ", "B) કાર્બોક્સિલ ગ્રુપ અને કાર્બોક્સિલ ગ્રુપ", "C) એમિનો ગ્રુપ અને કાર્બોક્સિલ ગ્રુપ", "D) હાઇડ્રોક્સિલ ગ્રુપ અને હાઇડ્રોક્સિલ ગ્રુપ"], "correct": 2, "explanation": "પેપ્ટાઇડ બંધની રચના દરમિયાન, એક એમિનો ઍસિડના એમિનો ગ્રુપ (–NH₂) અને બીજા એમિનો ઍસિડના કાર્બોક્સિલ ગ્રુપ (–COOH) વચ્ચે પ્રક્રિયા થાય છે, જેમાં પાણીનો અણુ (H₂O) બહાર પડે છે. આ પ્રક્રિયા કન્ડેન્સેશન પ્રક્રિયા છે. વિકલ્પ A અને B અયોગ્ય છે કારણ કે બે એમિનો ગ્રુપ અથવા બે કાર્બોક્સિલ ગ્રુપ વચ્ચે પેપ્ટાઇડ બંધ બનતો નથી. વિકલ્પ D પણ અયોગ્ય છે કારણ કે હાઇડ્રોક્સિલ ગ્રુપ પેપ્ટાઇડ બંધ રચનામાં ભાગ લેતો નથી.", "ncert_ref": "Class XII - પ્રકરણ 9: જૈવિક અણુઓ", "difficulty": "Hard", "num": 2}, {"question": "નીચેના પૈકી કયું વિધાન પ્રોટીનની દ્વિતીય સંરચના વિશે સાચું છે?", "options": ["A) તે એમિનો ઍસિડની શૃંખલામાં હાઇડ્રોજન બંધો દ્વારા રચાયેલી સ્પાયરલ અથવા બીટા-પ્લીટેડ શીટ હોય છે.", "B) તે પ્રોટીનની શૃંખલામાં ડિસલ્ફાઇડ બંધો દ્વારા રચાયેલી હોય છે.", "C) તે પ્રોટીનની શૃંખલામાં આયનિક બંધો દ્વારા રચાયેલી હોય છે.", "D) તે પ્રોટીનની શૃંખલામાં પેપ્ટાઇડ બંધો દ્વારા રચાયેલી હોય છે."], "correct": 0, "explanation": "પ્રોટીનની દ્વિતીય સંરચના એમિનો ઍસિડની શૃંખલામાં હાઇડ્રોજન બંધો દ્વારા રચાયેલી હોય છે, જેમાં આલ્ફા-હેલિક્સ (સ્પાયરલ) અથવા બીટા-પ્લીટેડ શીટ રચના થાય છે. વિકલ્પ B અયોગ્ય છે કારણ કે ડિસલ્ફાઇડ બંધો તૃતીય સંરચનામાં ભાગ ભજવે છે. વિકલ્પ C અયોગ્ય છે કારણ કે આયનિક બંધો પ્રોટીનની સંરચનામાં મુખ્ય ભૂમિકા ભજવતા નથી. વિકલ્પ D અયોગ્ય છે કારણ કે પેપ્ટાઇડ બંધો પ્રાથમિક સંરચનાનો ભાગ છે.", "ncert_ref": "Class XII - પ્રકરણ 9: જૈવિક અણુઓ", "difficulty": "Hard", "num": 3}, {"question": "ઉત્સેચકની ક્રિયાશીલ સ્થાન (Active Site) વિશે નીચેના પૈકી કયું વિધાન સાચું નથી?", "options": ["A) તે ઉત્સેચકના અણુ પર એક વિશિષ્ટ ક્ષેત્ર હોય છે જ્યાં સબસ્ટ્રેટ બંધાય છે.", "B) તેની આકાર સબસ્ટ્રેટની જેમ જ હોય છે.", "C) તે ઉત્સેચકની ક્રિયામાં ભાગ લેતા એમિનો ઍસિડના અવશેષો ધરાવે છે.", "D) તે સબસ્ટ્રેટ સાથે અયોનિક બંધ દ્વારા જ બંધાય છે."], "correct": 3, "explanation": "ઉત્સેચકની ક્રિયાશીલ સ્થાન (Active Site) સબસ્ટ્રેટ સાથે વિવિધ પ્રકારના બંધો (હાઇડ્રોજન બંધ, આયનિક બંધ, હાઇડ્રોફોબિક ઇન્ટરેક્શન વગેરે) દ્વારા બંધાય છે, ફક્ત અયોનિક બંધ દ્વારા જ નહીં. વિકલ્પ A સાચો છે કારણ કે ક્રિયાશીલ સ્થાન સબસ્ટ્રેટ બંધાય તે માટે વિશિષ્ટ હોય છે. વિકલ્પ B સાચો છે કારણ કે તે સબસ્ટ્રેટની જેમ આકાર ધરાવે છે (Lock and Key મોડેલ). વિકલ્પ C સાચો છે કારણ કે ક્રિયાશીલ સ્થાનમાં એમિનો ઍસિડના અવશેષો હોય છે જે ક્રિયામાં ભાગ લે છે.", "ncert_ref": "Class XII - પ્રકરણ 9: જૈવિક અણુઓ", "difficulty": "Hard", "num": 4}, {"question": "નીચેના પૈકી કયું એમિનો ઍસિડ એવું છે જે પ્રોટીનની રચનામાં સહભાગી નથી?", "options": ["A) ગ્લાઇસીન", "B) એલેનિન", "C) ઓર્નિથિન", "D) વેલિન"], "correct": 2, "explanation": "ઓર્નિથિન એક એવું એમિનો ઍસિડ છે જે પ્રોટીનની રચનામાં સહભાગી નથી, પરંતુ તે યુરિયા ચક્રમાં ભાગ લે છે. ગ્લાઇસીન, એલેનિન અને વેલિન પ્રોટીનની રચનામાં સહભાગી એમિનો ઍસિડ છે. ઓર્નિથિન એક નોન-પ્રોટીનોજેનિક એમિનો ઍસિડ છે, જ્યારે બાકીના તમામ પ્રોટીનોજેનિક એમિનો ઍસિડ છે.", "ncert_ref": "Class XII - પ્રકરણ 9: જૈવિક અણુઓ", "difficulty": "Hard", "num": 5}, {"question": "નીચેના પૈકી કયું એમિનો ઍસિ : જૈવિક અણુઓ", "difficulty": "Hard", "num": 15}, {"question": "નીચેના પૈકી કયા પ્રોટીનમાં એમિનો ઍસિડની શૃંખલામાં ડિસલ્ફાઇડ બંધ (S-S) જોવા મળે છે, પરંતુ તેની તૃતીય સંરચનામાં આ બંધનો સમાવેશ થતો નથી?", "options": ["A) ઇન્સ્યુલિન", "B) હીમોગ્લોબિન", "C) કેરેટિન", "D) માયોગ્લોબિન"], "correct": 0, "explanation": "ઇન્સ્યુલિનમાં ડિસલ્ફાઇડ બંધ (S-S) હાજર હોય છે, પરંતુ તે બે પોલિપેપ્ટાઇડ શૃંખલાઓ વચ્ચેના બંધ તરીકે હાજર હોય છે, જે પ્રોટીનની ચતુર્થ સંરચનાનો ભાગ છે, તૃતીય સંરચનાનો નહીં. હીમોગ્લોબિન અને માયોગ્લોબિનમાં ડિસલ્ફાઇડ બંધ હાજર નથી, જ્યારે કેરેટિનમાં ડિસલ્ફાઇડ બંધ તૃતીય સંરચનાનો ભાગ છે.", "ncert_ref": "Class XII - Chapter 9: જૈવિક અણુઓ", "difficulty": "Hard", "num": 16}, {"question": "એક ઉત્સેચક તેની ક્રિયા માટે કોફેક્ટર તરીકે ફ્લેવિન એડિનિન ડાયન્યુક્લિયોટાઇડ (FAD)ની જરૂરિયાત ધરાવે છે. નીચેના પૈકી કયા ઉત્સેચક સાથે આ કોફેક્ટર સંકળાયેલ છે?", "options": ["A) સુક્રેઝ", "B) લેક્ટેઝ", "C) સુક્સિનેટ ડિહાઇડ્રોજિનેઝ", "D) માલ્ટેઝ"], "correct": 2, "explanation": "સુક્સિનેટ ડિહાઇડ્રોજિનેઝ ઉત્સેચક FADને કોફેક્ટર તરીકે વાપરે છે, જે ક્રેબ્સ ચક્ર દરમિયાન સુક્સિનેટને સુક્સિનિલ-CoAમાં રૂપાંતરિત કરે છે. સુક્રેઝ, લેક્ટેઝ અને માલ્ટેઝ કાર્બોદિતના પાચનમાં સહભાગી ઉત્સેચકો છે અને FADની જરૂરિયાત ધરાવતા નથી.", "ncert_ref": "Class XII - Chapter 9: જૈવિક અણુઓ", "difficulty": "Hard", "num": 17}, {"question": "નીચેના પૈકી કયું વિધાન પ્રોટીનની દ્વિતીય સંરચના વિશે સાચું નથી?", "options": ["A) આલ્ફા-હેલિક્સ અને બીટા-પ્લીટેડ શીટ એ દ્વિતીય સંરચનાના સ્વરૂપો છે.", "B) દ્વિતીય સંરચનાનું નિર્ધારણ એમિનો ઍસિડની શૃંખલામાં હાઇડ્રોજન બંધ દ્વારા થાય છે.", "C) દ્વિતીય સંરચનાનું નિર્ધારણ એમિનો ઍસિડની શૃંખલામાં પેપ્ટાઇડ બંધ દ્વારા થાય છે.", "D) પ્રોલિન અને ગ્લાઇસિન એમિનો ઍસિડ આલ્ફા-હેલિક્સ રચનામાં વિક્ષેપ પહોંચાડે છે."], "correct": 2, "explanation": "દ્વિતીય સંરચનાનું નિર્ધારણ હાઇડ્રોજન બંધ દ્વારા થાય છે, પેપ્ટાઇડ બંધ દ્વારા નહીં. પેપ્ટાઇડ બંધ પ્રાથમિક સંરચનાનો ભાગ છે. આલ્ફા-હેલિક્સ અને બીટા-પ્લીટેડ શીટ એ દ્વિતીય સંરચનાના સ્વરૂપો છે, અને પ્રોલિન અને ગ્લાઇસિન આલ્ફા-હેલિક્સ રચનામાં વિક્ષેપ પહોંચાડે છે.", "ncert_ref": "Class XII - Chapter 9: જૈવિક અણુઓ", "difficulty": "Hard", "num": 18}, {"question": "એક પ્રોટીનમાં 100 એમિનો ઍસિડ છે. જો તેના 20 એમિનો ઍસિડ બદલાય, તો નીચેના પૈકી કયું પરિણામ સૌથી વધુ સંભવિત છે?", "options": ["A) પ્રોટીનની પ્રથમ સંરચના બદલાશે, પરંતુ તેની ક્રિયાશીલતા જળવાય રહેશે.", "B) પ્રોટીનની તૃતીય અને ચતુર્થ સંરચના બદલાશે, અને તેની ક્રિયાશીલતા ગુમાવી શકે છે.", "C) પ્રોટીનની દ્વિતીય સંરચના બદલાશે, પરંતુ તેની ક્રિયાશીલતા જળવાય રહેશે.", "D) પ્રોટીનની સંરચના અને ક્રિયાશીલતા બંને અચળ રહેશે."], "correct": 1, "explanation": "20 એમિનો ઍસિડના બદલાવથી પ્રોટીનની તૃતીય અને ચતુર્થ સંરચનામાં મહત્વપૂર્ણ ફેરફાર થઈ શકે છે, જે તેની ક્રિયાશીલતાને અસર કરે છે. પ્રથમ સંરચના (એમિનો ઍસિડની શૃંખલા) બદલાશે, પરંતુ ક્રિયાશીલતા જળવાય રહેતી નથી. દ્વિતીય સંરચનામાં ફેરફાર થઈ શકે, પરંતુ તે ક્રિયાશીલતાને જળવી રાખવી મુશ્કેલ છે.", "ncert_ref": "Class XII - Chapter 9: જૈવિક અણુઓ", "difficulty": "Hard", "num": 19}, {"question": "નીચેના પૈકી કયું એમિનો ઍસિડ એવું છે જેની સાઇડ ચેઇનમાં ઇમિડેઝોલ વલય હાજર હોય છે અને તે ઉત્સેચકની ક્રિયાશીલ સ્થાનમાં સક્રિય ભૂમિકા ભજવે છે?", "options": ["A) હિસ્ટિડિન", "B) ટ્રિપ્ટોફેન", "C) ટાયરોસિન", "D) ફિનાઇલએલેનિન"], "correct": 0, "explanation": "હિસ્ટિડિનની સાઇડ ચેઇનમાં ઇમિડેઝોલ વલય હાજર હોય છે, જે ઉત્સેચકની ક્રિયાશીલ સ્થાનમાં પ્રોટોનના સ્થાનાંતરણમાં ભૂમિકા ભજવે છે. ટ્રિપ્ટોફેનમાં ઇન્ડોલ વલય, ટાયરોસિનમાં ફિનોલ વલય અને ફિનાઇલએલેનિનમાં બેન્ઝિન વલય હાજર હોય છે.", "ncert_ref": "Class XII - Chapter 9: જૈવિક અણુઓ", "difficulty": "Hard", "num": 20}, {"question": "એક ઉત્સેચક તેની ક્રિયા માટે કોફેક્ટર તરીકે કોબાલ્ટ (Co²⁺) આયનની જરૂરિયાત ધરાવે છે. નીચેના પૈકી કયું ઉત્સેચક આ લાક્ષણિકતા ધરાવે છે?", "options": ["A) કેટલેઝ", "B) કાર્બોક્સિપેપ્ટિડેઝ", "C) મેથાયોનિન સિનથેટેઝ", "D) લેક્ટેઝ"], "correct": 2, "explanation": "મેથાયોનિન સિનથેટેઝ ઉત્સેચક તેની ક્રિયા માટે કોફેક્ટર તરીકે કોબાલ્ટ (Co²⁺) આયનની જરૂરિયાત ધરાવે છે. કેટલેઝમાં આયર્ન (Fe) હાજર હોય છે, કાર્બોક્સિપેપ્ટિડેઝમાં જિંક (Zn) હાજર હોય છે, અને લેક્ટેઝમાં કોઈ મેટલ આયન કોફેક્ટરની જરૂરિયાત હોતી નથી.", "ncert_ref": "Class XII - પ્રકરણ 9: જૈવિક અણુઓ", "difficulty": "Hard", "num": 21}, {"question": "નીચેના પૈકી કયું વિધાન પ્રોટીનની ચતુર્થ સંરચના વિશે સાચું નથી?", "options": ["A) તે એકથી વધુ પોલિપેપ્ટાઇડ શૃંખલાઓના સંયોજનથી બને છે.", "B) હીમોગ્લોબિનમાં ચતુર્થ સંરચના જોવા મળે છે.", "C) ચતુર્થ સંરચનામાં ડિસલ્ફાઇડ બંધોની રચના થાય છે.", "D) ચતુર્થ સંરચના પ્રોટીનની ક્રિયાશીલતા માટે આવશ્યક હોય છે."], "correct": 2, "explanation": "ચતુર્થ સંરચનામાં ડિસલ્ફાઇડ બંધોની રચના થતી નથી. ડિસલ્ફાઇડ બંધો તૃતીય સંરચનામાં જોવા મળે છે. ચતુર્થ સંરચના એકથી વધુ પોલિપેપ્ટાઇડ શૃંખલાઓના સંયોજનથી બને છે, હીમોગ્લોબિનમાં ચતુર્થ સંરચના જોવા મળે છે, અને તે પ્રોટીનની ક્રિયાશીલતા માટે આવશ્યક હોય છે.", "ncert_ref": "Class XII - પ્રકરણ 9: જૈવિક અણુઓ", "difficulty": "Hard", "num": 22}, {"question": "એક પ્રોટીનમાં 20 એમિનો ઍસિડ છે. જો તેના 5 એમિનો ઍસિડ બદલાય, તો નીચેના પૈકી કયું પરિણામ સૌથી વધુ સંભવિત છે?", "options": ["A) પ્રોટીનની પ્રાથમિક સંરચના બદલાશે, પરંતુ દ્વિતીય સંરચના અક્ષરખિત રહેશે.", "B) પ્રોટીનની પ્રાથમિક અને દ્વિતીય સંરચના બંને બદલાશે.", "C) પ્રોટીનની તૃતીય સંરચના બદલાશે, પરંતુ પ્રાથમિક સંરચના અક્ષરખિત રહેશે.", "D) પ્રોટીનની ચતુર્થ સંરચના બદલાશે, પરંતુ તૃતીય સંરચના અક્ષરખિત રહેશે."], "correct": 1, "explanation": "જો પ્રોટીનમાં 5 એમિનો ઍસિડ બદલાય, તો પ્રાથમિક સંરચના (એમિનો ઍસિડની ક્રમ) બદલાશે, જેના કારણે દ્વિતીય સંરચના (આલ્ફા-હેલિક્સ અને બીટા-પ્લીટેડ શીટ) પણ બદલાશે. તૃતીય અને ચતુર્થ સંરચના પણ અસરગ્રસ્ત થઈ શકે છે, પરંતુ પ્રશ્નમાં સૌથી વધુ સંભવિત પરિણામ પૂછવામાં આવ્યું છે.", "ncert_ref": "Class XII - પ્રકરણ 9: જૈવિક અણુઓ", "difficulty": "Hard", "num": 23}, {"question": "નીચેના વિધાનો પર ધ્યાન આપો: \nI. પ્રોટીનની તૃતીય સંરચનામાં હાઇડ્રોજન બંધ, આયનિક બંધ, હાઇડ્રોફોબિક આંતરક્રિયાઓ અને વાન ડર વાલ્સ બળો સહભાગી થાય છે. \nII. ડિસલ્ફાઇડ બંધ પ્રોટીનની ચતુર્થ સંરચનામાં જ મહત્વની ભૂમિકા ભજવે છે. \nIII. કોલેજનમાં ત્રણ પોલિપેપ્ટાઇડ શૃંખલાઓ એકબીજા સાથે ત્રિપલ હેલિક્સ રચે છે, જે પ્રોટીનની તૃતીય સંરચનાનું ઉદાહરણ છે. \nIV. માયોગ્લોબિનમાં હીમ સમૂહ પ્રોટીનની દ્વિતીય સંરચનાને સ્થિર કરે છે. \nઉપર્યુક્ત વિધાનો પૈકી કયા વિધાન/વિધાનો સાચા છે?", "options": ["A) ફક્ત I અને III", "B) ફક્ત I, II અને III", "C) ફક્ત I અને IV", "D) ફક્ત II અને IV"], "correct": 0, "explanation": "વિધાન I સાચું છે કારણ કે તૃતીય સંરચનામાં હાઇડ્રોજન બંધ, આયનિક બંધ, હાઇડ્રોફોબિક આંતરક્રિયાઓ અને વાન ડર વાલ્સ બળો સહભાગી થાય છે. વિધાન II ખોટું છે કારણ કે ડિસલ્ફાઇડ બંધ તૃતીય સંરચનામાં પણ મહત્વની ભૂમિકા ભજવે છે (ઉદા. ઇન્સ્યુલિન). વિધાન III સાચું છે કારણ કે કોલેજનમાં ત્રણ પોલિપેપ્ટાઇડ શૃંખલાઓ ત્રિપલ હેલિક્સ રચે છે, જે તૃતીય સંરચનાનું ઉદાહરણ છે. વિધાન IV ખોટું છે કારણ કે હીમ સમૂહ માયોગ્લોબિનની તૃતીય સંરચનાને સ્થિર કરે છે, દ્વિતીય સંરચનાને નહીં.", "ncert_ref": "Class XII - Chapter 9: જૈવિક અણુઓ", "difficulty": "Hard", "num": 24}, {"question": "એક ઉત્સેચક X તેની ક્રિયા માટે કોફેક્ટર તરીકે જસ્ત (Zn²⁺) આયનની જરૂરિયાત ધરાવે છે. નીચેના પૈકી કયું ઉત્સેચક X હોઈ શકે? \nઅથવા \nએક પ્રોટીન Yમાં એમિનો ઍસિડની શૃંખલામાં ડિસલ્ફાઇડ બંધ (S-S) જોવા મળે છે. નીચેના પૈકી કયું વિધાન Y વિશે સાચું છે?", "options": ["A) કાર્બોનિક એનહાઇડ્રેઝ અને પ્રોટીન Yમાં સિસ્ટીન એમિનો ઍસિડ હાજર છે", "B) કેટલેઝ અને પ્રોટીન Yમાં મિથાયોનિન એમિનો ઍસિડ હાજર છે", "C) લેક્ટેઝ અને પ્રોટીન Yમાં સેરિન એમિનો ઍસિડ હાજર છે", "D) એમાઇલેઝ અને પ્રોટીન Yમાં પ્રોલિન એમિનો ઍસિડ હાજર છે"], "correct": 0, "explanation": "કાર્બોનિક એનહાઇડ્રેઝ ઉત્સેચક તેની ક્રિયા માટે જસ્ત (Zn²⁺) આયનની જરૂરિયાત ધરાવે છે, જ્યારે ડિસલ્ફાઇડ બંધ (S-S) સિસ્ટીન એમિનો ઍસિડની સાઇડ ચેઇનમાં રચાય છે. કેટલેઝ, લેક્ટેઝ અને એમાઇલેઝ ઉત્સેચકો જસ્ત આયનની જરૂરિયાત ધરાવતા નથી. મિથાયોનિન, સેરિન અને પ્રોલિન એમિનો ઍસિડની સાઇડ ચેઇનમાં ડિસલ્ફાઇડ બંધ રચાતો નથી.", "ncert_ref": "Class XII - Chapter 9: જૈવિક અણુઓ", "difficulty": "Hard", "num": 25}, {"question": "નીચેના પૈકી કયા એમિનો ઍસિડની સાઇડ ચેઇનમાં થાયોલ સમૂહ (-SH) હાજર હોય છે, જે ડિસલ્ફાઇડ બંધ રચનામાં ભાગ લે છે?", "options": ["A) ગ્લાઇસિન", "B) સિસ્ટીન", "C) મેથિયોનિન", "D) પ્રોલિન"], "correct": 1, "explanation": "સિસ્ટીનની સાઇડ ચેઇનમાં થાયોલ સમૂહ (-SH) હાજર હોય છે, જે ડિસલ્ફાઇડ બંધ (S-S) રચનામાં ભાગ લે છે. ગ્લાઇસિનની સાઇડ ચેઇનમાં ફક્ત હાઇડ્રોજન પરમાણુ હોય છે, મેથિયોનિનમાં થાયોઇથર સમૂહ હોય છે, અને પ્રો                     optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
