    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>

        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>

    <script>
        const questionsData = [{"question": "DNA અણુમાં પુરીન ક્યાં બેઇઝ છે અને તેની સાથે જોડાયેલા શર્કરાના પ્રકાર વિશે નીચેના પૈકી કયું વિધાન સાચું છે?", "options": ["A) એડેનિન અને ગ્વાનિન પુરીન બેઇઝ છે, અને તે ડીઑક્સીરિબોઝ શર્કરા સાથે જોડાયેલા હોય છે.", "B) સાયટોસિન અને થાયમિન પુરીન બેઇઝ છે, અને તે રિબોઝ શર્કરા સાથે જોડાયેલા હોય છે.", "C) એડેનિન અને થાયમિન પુરીન બેઇઝ છે, અને તે ડીઑક્સીરિબોઝ શર્કરા સાથે જોડાયેલા હોય છે.", "D) ગ્વાનિન અને યુરેસિલ પુરીન બેઇઝ છે, અને તે રિબોઝ શર્કરા સાથે જોડાયેલા હોય છે."], "correct": 0, "explanation": "DNAમાં પુરીન બેઇઝ એડેનિન (A) અને ગ્વાનિન (G) છે, જ્યારે પિરિમિડિન બેઇઝ થાયમિન (T) અને સાયટોસિન (C) છે. DNAમાં શર્કરા તરીકે ડીઑક્સીરિબોઝ હોય છે. ઓપ્શન A સાચું છે કારણ કે તે પુરીન બેઇઝ અને ડીઑક્સીરિબોઝ શર્કરાનું સાચું સંયોજન દર્શાવે છે. ઓપ્શન B અને Dમાં યુરેસિલ અને સાયટોસિન/થાયમિનને પુરીન તરીકે ગણાવવામાં આવ્યા છે, જે ખોટું છે (તેઓ પિરિમિડિન છે). ઓપ્શન Cમાં થાયમિનને પુરીન તરીકે ગણાવવામાં આવ્યો છે, જે ખોટું છે.", "ncert_ref": "Class XII - પ્રકરણ 6: અણુવંશાનુગત્ય (Molecular Basis of Inheritance)", "difficulty": "Hard", "num": 1}, {"question": "RNA અણુમાં, નીચેના પૈકી કયું કથન યુરેસિલ વિશે સાચું નથી?", "options": ["A) યુરેસિલ એક પિરિમિડિન બેઇઝ છે.", "B) યુરેસિલ RNAમાં થાયમિનની જગ્યાએ હોય છે.", "C) યુરેસિલ હંમેશા રિબોઝ શર્કરા સાથે જોડાયેલો હોય છે.", "D) યુરેસિલ DNAમાં પણ જોવા મળે છે."], "correct": 3, "explanation": "યુરેસિલ એક પિરિમિડિન બેઇઝ છે (A સાચું), RNAમાં થાયમિનની જગ્યાએ હોય છે (B સાચું), અને હંમેશા રિબોઝ શર્કરા સાથે જોડાયેલો હોય છે (C સાચું). પરંતુ યુરેસિલ DNAમાં જોવા મળતો નથી (D ખોટું), કારણ કે DNAમાં થાયમિન હોય છે.", "ncert_ref": "Class XII - પ્રકરણ 6: અણુવંશાનુગત્ય (Molecular Basis of Inheritance)", "difficulty": "Hard", "num": 2}, {"question": "DNAના ડબલ હેલિક્સ મોડેલમાં, નીચેના પૈકી કયું વિધાન સાચું નથી?", "options": ["A) બે પોલિન્યુક્લિયોટાઇડ શૃંખલાઓ એન્ટિપેરલલ હોય છે.", "B) એડેનિન હંમેશા થાયમિન સાથે હાઇડ્રોજન બંધ દ્વારા જોડાય છે.", "C) ગ્વાનિન હંમેશા સાયટોસિન સાથે ત્રણ હાઇડ્રોજન બંધ દ્વારા જોડાય છે.", "D) ડબલ હેલિક્સમાં શર્કરા-ફોસ્ફેટ કંકાળ બહારની બાજુએ હોય છે."], "correct": 2, "explanation": "DNAના ડબલ હેલિક્સમાં, એડેનિન થાયમિન સાથે બે હાઇડ્રોજન બંધ દ્વારા જોડાય છે (B સાચું), ગ્વાનિન સાયટોસિન સાથે ત્રણ હાઇડ્રોજન બંધ દ્વારા જોડાય છે (C સાચું), શૃંખલાઓ એન્ટિપેરલલ હોય છે (A સાચું), અને શર્કરા-ફોસ્ફેટ કંકાળ બહારની બાજુએ હોય છે (D સાચું). પરંતુ ઓપ્શન Cમાં 'હંમેશા' શબ્દ ખોટો છે, કારણ કે ગ્વાનિન અને સાયટોસિન વચ્ચે ત્રણ હાઇડ્રોજન બંધ હોય છે, પરંતુ તે 'હંમેશા' શબ્દની વ્યાખ્યા સાથે સંકળાયેલું નથી.", "ncert_ref": "Class XII - પ્રકરણ 6: અણુવંશાનુગત્ય (Molecular Basis of Inheritance)", "difficulty": "Hard", "num": 3}, {"question": "નીચેના પૈકી કયું કથન RNA અને DNA વચ્ચેના તફાવત વિશે સાચું નથી?", "options": ["A) RNA એક-શૃંખલા વાળું હોય છે, જ્યારે DNA ડબલ-શૃંખલા વાળું હોય છે.", "B) RNAમાં યુરેસિલ હોય છે, જ્યારે DNAમાં થાયમિન હોય છે.", "C) RNAમાં રિબોઝ શર્કરા હોય છે, જ્યારે DNAમાં ડીઑક્સીરિબોઝ શર્કરા હોય છે.", "D) RNAમાં ફોસ્ફોડાઇએસ્ટર બંધ હોય છે, જ્યારે DNAમાં પેપ્ટાઇડ બંધ હોય છે."], "correct": 3, "explanation": "RNA એક-શૃંખલા વાળું હોય છે (A સાચું), RNAમાં યુરેસિલ અને DNAમાં થાયમિન હોય છે (B સાચું), RNAમાં રિબોઝ અને DNAમાં ડીઑક્સીરિબોઝ શર્કરા હોય છે (C સાચું). પરંતુ RNA અને DNA બંનેમાં ફોસ્ફોડાઇએસ્ટર બંધ હોય છે, પેપ્ટાઇડ બંધ પ્રોટીનમાં જોવા મળે છે (D ખોટું).", "ncert_ref": "Class XII - પ્રકરણ 6: અણુવંશાનુગત્ય (Molecular Basis of Inheritance)", "difficulty": "Hard", "num": 4}, {"question": "DNAના રચનાત્મક ઘટકો વિશે નીચેના પૈકી કયું વિધાન સાચું છે?", "options": ["A) DNAમાં ફોસ્ફેટ સમૂહ, ડીઑક્સીરિબોઝ શર્કરા, અને નાઇટ્રોજન બેઇઝ હોય છે.", "B) DNAમાં ફોસ્ફેટ સમૂહ, રિબોઝ શર્કરા, અને નાઇટ્રોજન બેઇઝ હોય છે.", "C) DNAમાં સલ્ફેટ સમૂહ, ડીઑક્સીરિબોઝ શર્કરા, અને નાઇટ્રોજન બેઇઝ હોય છે.", "D) DNAમાં ફોસ્ફેટ સમૂહ, ડીઑક્સીરિબોઝ શર્કરા, અને એમિનો એસિડ હોય છે."], "correct": 0, "explanation": "DNAના રચનાત્મક ઘટકો ફોસ્ફેટ સમૂહ, ડીઑક્સીરિબોઝ શર્કરા, અને નાઇટ્રોજન બેઇઝ (A, T, G, C) હોય છે (A સાચું). ઓપ્શન Bમાં રિબોઝ શર્કરા ખોટી છે (RNAમાં હોય છે), ઓપ્શન Cમાં સલ્ફેટ સમૂહ ખોટો છે (ફોસ્ફેટ હોય છે), અને ઓપ્શન Dમાં એમિનો એસિડ ખોટું છે (પ્રોટીનમાં હોય છે).", "ncert_ref": "Class XII - પ્રકરણ 6: અણુવંશાનુગત્ય (Molecular Basis of Inheritance)", "difficulty": "Hard", "num": 5}, {"question": "એક સંશોધકને એક ન્યુક્લિક ઍસિડ અણુ મળ્યો જેની શૃંખલામાં 20% એડેનીન, 20% ગ્વાનીન, 30% સાયટોસીન અને 30% થાઇમિન છે. આ અણુના સંદર્ભમાં નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) આ અણુ એક-શૃંખલાવાળો DNA છે કારણ કે થાઇમિન હાજર છે", "B) આ અણુ દ્વિ-શૃંખલાવાળો DNA છે કારણ કે ચાર્ગાફના નિયમનું પાલન થાય છે", "C) આ અણુ RNA હોઈ શકે નહીં કારણ કે યુરેસિલ ગેરહાજર છે", "D) આ અણુ એક-શૃંખલાવાળો RNA છે કારણ કે બેઇઝ પ્રમાણ અસંતુલિત છે"], "correct": 0, "explanation": "સાચો જવાબ A છે. આ અણુ એક-શૃંખલાવાળો DNA છે કારણ કે થાઇમિન હાજર છે અને બેઇઝ પ્રમાણ ચાર્ગાફના નિયમનું પાલન કરતું નથી (A ≠ T અને G ≠ C). દ્વિ-શૃંખલાવાળા DNAમાં A=T અને G=C હોવું જોઈએ. RNAમાં થાઇમિન હોતું નથી, તેથી વિકલ્પ C અને D ખોટા છે. વિકલ્પ B ખોટો છે કારણ કે ચાર્ગાફનો નિયમ લાગુ પડતો નથી.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 6: આનુવંશિક દ્રવ્ય", "difficulty": "Hard", "num": 6}, {"question": "એક પ્રયોગમાં, DNA અણુને ઉષ્મા આપતા તેની શૃંખલાઓ અલગ થઈ જાય છે (ડિનેચરેશન). આ પ્રક્રિયા દરમિયાન નીચેનામાંથી કયું પરિવર્તન થવાની શક્યતા સૌથી ઓછી છે?", "options": ["A) હાઇડ્રોજન બોન્ડ તૂટી જાય છે", "B) ફોસ્ફોડાયએસ્ટર બોન્ડ તૂટી જાય છે", "C) અવશોષણ (Absorbance) 260 nm પર વધે છે", "D) અણુનું ગલનબિંદુ (Melting temperature) બદલાય છે"], "correct": 1, "explanation": "સાચો જવાબ B છે. DNA ડિનેચરેશન દરમિયાન હાઇડ્રોજન બોન્ડ તૂટે છે, પરંતુ ફોસ્ફોડાયએસ્ટર બોન્ડ (જે શૃંખલાની કરોડરજ્જુ બનાવે છે) તૂટતા નથી. અવશોષણ વધે છે (હાઇપોક્રોમિક અસર) અને ગલનબિંદુ બદલાય છે. વિકલ્પ A, C અને D સાચા પરિવર્તનો છે, જ્યારે B ખોટું છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 6: આનુવંશિક દ્રવ્ય", "difficulty": "Hard", "num": 7}, {"question": "નીચેના પૈકી કયું વિધાન tRNAની રચના અને કાર્ય વિશે ખોટું છે?", "options": ["A) tRNAમાં એન્ટિકોડોન લૂપ હોય છે જે mRNAના કોડોન સાથે જોડાય છે", "B) tRNAના 3' છેડે CCA અનુક્રમ હોય છે જે એમિનો એસિડ સાથે જોડાય છે", "C) tRNAમાં ડાઇહાઇડ્રોરાઇબોઝ શર્કરા હોય છે જે તેને RNAથી અલગ પાડે છે", "D) tRNAની રચનામાં હાઇડ્રોજન બોન્ડ દ્વારા બનતી ક્લોવર-લીફ આકારની રચના હોય છે"], "correct": 2, "explanation": "સાચો જવાબ C છે. tRNAમાં રાઇબોઝ શર્કરા હોય છે, ડાઇહાઇડ્રોરાઇબોઝ નહીં. ડાઇહાઇડ્રોરાઇબોઝ DNAમાં હોય છે. વિકલ્પ A, B અને D tRNAની સાચી લાક્ષણિકતાઓ છે. વિકલ્પ C ખોટો છે કારણ કે tRNAમાં રાઇબોઝ હોય છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 6: આનુવંશિક દ્રવ્ય", "difficulty": "Hard", "num": 8}, {"question": "એક વિશિષ્ટ પ્રકારના વાઇરસમાં DNA અણુ એક-શૃંખલાવાળો અને વર્તુળાકાર છે. આ વાઇરસના DNAના સંદર્ભમાં નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) આ DNAમાં ચાર્ગાફનો નિયમ લાગુ પડતો નથી", "B) આ DNAમાં થાઇમિન અને સાયટોસીનનું પ્રમાણ સમાન હોવું જરૂરી નથી", "C) આ DNAની પ્રતિકૃતિ પ્રક્રિયા દ્વિ-શૃંખલાવાળા DNA જેવી જ હોય છે", "D) આ DNAમાં ફોસ્ફોડાયએસ્ટર બોન્ડ વર્તુળાકાર શૃંખલા બનાવે છે"], "correct": 2, "explanation": "સાચો જવાબ C છે. એક-શૃંખલાવાળા વર્તુળાકાર DNAની પ્રતિકૃતિ પ્રક્રિયા દ્વિ-શૃંખલાવાળા DNAથી અલગ હોય છે. વિકલ્પ A અને B સાચા છે કારણ કે ચાર્ગાફનો નિયમ લાગુ પડતો નથી અને બેઇઝ પ્રમાણ અસંતુલિત હોઈ શકે છે. વિકલ્પ D સાચું છે કારણ કે ફોસ્ફોડાયએસ્ટર બોન્ડ વર્તુળાકાર શૃંખલા બનાવે છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 6: આનુવંશિક દ્રવ્ય", "difficulty": "Hard", "num": 9}, {"question": "એક પ્રયોગમાં, RNA અણુને આલ્કલી (NaOH) સાથે પ્રક્રિયા કરાવતા તેનું વિઘટન થાય છે. આ પ્રક્રિયા દરમિયાન નીચેનામાંથી કયું પરિણામ મળવાની શક્યતા નથી?", "options": ["A) RNA અણુના ફોસ્ફોડાયએસ્ટર બોન્ડ તૂટી જાય છે", "B) RNA અણુના 2',3'-સાયક્લિક ફોસ્ફેટ મધ્યવર્તી બને છે", "C) RNA અણુનું વિઘટન DNA કરતાં વધુ ઝડપથી થાય છે", "D) RNA અણુના બેઇઝમાંથી એમોનિયા મુક્ત થાય છે"], "correct": 3, "explanation": "સાચો જવાબ D છે. RNA આલ્કલી સાથે પ્રક્રિયા કરતા ફોસ્ફોડાયએસ્ટર બોન્ડ તૂટે છે અને 2',3'-સાયક્લિક ફોસ્ફેટ મધ્યવર્તી બને છે. RNA DNA કરતાં વધુ ઝડપથી વિઘટન પામે છે કારણ કે તેમાં 2'-OH સમૂહ હોય છે. પરંતુ બેઇઝમાંથી એમોનિયા મુક્ત થતો નથી. વિકલ્પ A, B અને C સાચા છે, જ્યારે D ખોટું છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 6: આનુવંશિક દ્રવ્ય", "difficulty": "Hard", "num": 10}, {"question": "નીચેના પૈકી કયું વિધાન DNA અને RNA બંનેમાં જોવા મળતી રચનાત્મક સમાનતા વિશે સાચું નથી?", "options": ["A) બંનેમાં ફોસ્ફોડાયેસ્ટર બંધ દ્વારા ન્યુક્લિયોટાઇડ્સ જોડાયેલા હોય છે", "B) બંનેમાં પેન્ટોઝ શર્કરા 5' અને 3' સ્થાને ફોસ્ફેટ જૂથ સાથે જોડાયેલા હોય છે", "C) બંનેમાં નાઇટ્રોજનયુક્ત બેઇઝ હાઇડ્રોજન બંધ દ્વારા જોડાયેલા હોય છે", "D) બંનેમાં ન્યુક્લિયોટાઇડની શૃંખલા 5' થી 3' દિશામાં વિકસે છે"], "correct": 2, "explanation": "વિકલ્પ C ખોટો છે કારણ કે RNAમાં મોટાભાગના કિસ્સાઓમાં એક જ શૃંખલા હોય છે, જ્યારે DNAમાં ડબલ હેલિક્સ હોય છે જેમાં હાઇડ્રોજન બંધ દ્વારા બેઇઝ જોડાયેલા હોય છે. RNAમાં હાઇડ્રોજન બંધ ફક્ત ગૌણ રચનાઓ (જેવી કે tRNAના ક્લોવરલીફ મોડેલ)માં જોવા મળે છે. વિકલ્પ A, B, અને D સાચા છે કારણ કે ફોસ્ફોડાયેસ્ટર બંધ, પેન્ટોઝ શર્કરાની રચના, અને શૃંખલાની દિશા બંનેમાં સમાન હોય છે.", "ncert_ref": "Class XII - પ્રકરણ 6: અણુ આનુવંશિકતા", "difficulty": "Hard", "num": 11}, {"question": "એક DNA અણુની 3'-TACGGATTC-5' શૃંખલાની પૂરક RNA શૃંખલા કઈ હશે?", "options": ["A) 5'-AUGCCUAGG-3'", "B) 5'-AUGCCUAAG-3'", "C) 5'-ATGCCATTC-3'", "D) 5'-AUGCCUAAA-3'"], "correct": 1, "explanation": "DNAની 3'-TACGGATTC-5' શૃંખલાની પૂરક RNA શૃંખલા બનાવવા માટે, DNAની શૃંખલાને 5' થી 3' દિશામાં લખી, થાયમિન (T) ને યુરેસિલ (U) વડે બદલી, અને પૂરક બેઇઝ જોડીને મેળવી. DNA: 5'-ATGCCATTC-3' → RNA: 5'-AUGCCUAAG-3'. વિકલ્પ Aમાં છેલ્લો બેઇઝ 'G' ને બદલે 'A' છે, વિકલ્પ Cમાં RNA નહીં પણ DNA શૃંખલા છે, અને વિકલ્પ Dમાં છેલ્લા બેઇઝ ત્રણેય ખોટા છે.", "ncert_ref": "Class XII - પ્રકરણ 6: અણુ આનુવંશિકતા", "difficulty": "Hard", "num": 12}, {"question": "નીચેના પૈકી કયું વિધાન DNAના સેમી-કન્ઝર્વેટિવ રીપ્લિકેશન વિશે સાચું નથી?", "options": ["A) રીપ્લિકેશન પછી દરેક નવી DNA શૃંખલામાં એક મૂળ અને એક નવી શૃંખલા હોય છે", "B) મેસેલ્સન અને સ્ટહલના પ્રયોગે સેમી-કન્ઝર્વેટિવ રીપ્લિકેશન સિદ્ધ કર્યું હતું", "C) લીડિંગ અને લેગિંગ શૃંખલાઓ બંનેમાં પ્રાઇમરની જરૂર પડે છે", "D) DNA પોલિમરેઝ ઉત્સેચક ફક્ત 5' થી 3' દિશામાં જ કામ કરે છે"], "correct": 0, "explanation": "વિકલ્પ A ખોટો છે કારણ કે સેમી-કન્ઝર્વેટિવ રીપ્લિકેશનમાં દરેક નવી DNA અણુમાં એક મૂળ શૃંખલા અને એક નવી શૃંખલા હોય છે, પરંતુ ation": "RNA પૂરક શૃંખલા બનાવવા માટે RNA પોલિમરેઝ ઉત્સેચક જરૂરી છે, કારણ કે તે DNA ટેમ્પલેટ પરથી RNA સિંથેસ કરે છે. DNA પોલિમરેઝ I DNA રીપ્લિકેશનમાં ભાગ લે છે, લાઇગેઝ DNA ટુકડાઓ જોડે છે, અને હેલિકેઝ DNA શૃંખલાઓને અલગ કરે છે. આથી, સાચો જવાબ RNA પોલિમરેઝ છે.", "ncert_ref": "Class XII - Chapter 6: અણુવંશાનુગત્યના આણ્વિક આધાર", "difficulty": "Hard", "num": 16}, {"question": "નીચેના પૈકી કયું વિધાન DNA અને RNA વચ્ચેના રાસાયણિક તફાવત વિશે સાચું નથી?", "options": ["A) DNAમાં 2’-હાઇડ્રોક્સિલ સમૂહ અનુપસ્થિત હોય છે, જ્યારે RNAમાં તે હાજર હોય છે.", "B) DNAમાં થાઇમિન હોય છે, જ્યારે RNAમાં યુરેસિલ હોય છે.", "C) DNA અને RNA બંનેમાં ફોસ્ફોડાયેસ્ટર બંધ હોય છે.", "D) DNAમાં રિબોઝ શર્કરા હોય છે, જ્યારે RNAમાં ડિઓક્સીરિબોઝ શર્કરા હોય છે."], "correct": 3, "explanation": "DNAમાં ડિઓક્સીરિબોઝ શર્કરા હોય છે, જ્યારે RNAમાં રિબોઝ શર્કરા હોય છે. આથી, વિધાન D ખોટું છે. વિધાન A, B, અને C સાચાં છે: DNAમાં 2’-હાઇડ્રોક્સિલ સમૂહ અનુપસ્થિત હોય છે, DNAમાં થાઇમિન અને RNAમાં યુરેસિલ હોય છે, અને બંનેમાં ફોસ્ફોડાયેસ્ટર બંધ હોય છે.", "ncert_ref": "Class XI - Chapter 9: જૈવિક અણુઓ", "difficulty": "Hard", "num": 17}, {"question": "એક DNA અણુની 3’-TACGGATTC-5’ શૃંખલાની પૂરક DNA શૃંખલા કઈ હશે?", "options": ["A) 5’-ATGCCGAAT-3’", "B) 5’-ATGCCCTAA-3’", "C) 5’-ATGCCGTAA-3’", "D) 5’-ATGCCGATT-3’"], "correct": 0, "explanation": "DNA શૃંખલાઓ પૂરકતાનું પાલન કરે છે, જેમાં A-T અને C-G સાથે જોડાય છે. આથી, 3’-TACGGATTC-5’ની પૂરક શૃંખલા 5’-ATGCCGAAT-3’ હશે. બાકીના વિકલ્પોમાં બેઇઝ જોડાણમાં ભૂલો છે.", "ncert_ref": "Class XII - Chapter 6: અણુવંશાનુગત્યના આણ્વિક આધાર", "difficulty": "Hard", "num": 18}, {"question": "નીચેના પૈકી કયું વિધાન tRNA વિશે સાચું નથી?", "options": ["A) tRNAમાં એન્ટિકોડન હોય છે, જે mRNA પરના કોડોન સાથે જોડાય છે.", "B) tRNA એમિનો એસિડને રિબોઝોમ પર લાવે છે.", "C) tRNA એક-શૃંખલાવાળો અને વર્તુળાકાર હોય છે.", "D) tRNAમાં 5’ કેપ અને 3’ પોલી-A પૂંછડી હોય છે."], "correct": 3, "explanation": "tRNAમાં 5’ કેપ અને 3’ પોલી-A પૂંછડી હોતી નથી. આ લક્ષણો mRNAમાં જોવા મળે છે. tRNAમાં એન્ટિકોડન હોય છે, એમિનો એસિડને રિબોઝોમ પર લાવે છે, અને એક-શૃંખલાવાળો અને વર્તુળાકાર હોય છે.", "ncert_ref": "Class XII - Chapter 6: અણુવંશાનુગત્યના આણ્વિક આધાર", "difficulty": "Hard", "num": 19}, {"question": "એક DNA અણુમાં 30% સાયટોસિન હોય તો ગુઆનિનનું પ્રમાણ કેટલું હશે?", "options": ["A) 20%", "B) 30%", "C) 40%", "D) 50%"], "correct": 1, "explanation": "DNAમાં, ચાર્ગેફના નિયમ મુજબ, સાયટોસિન (C) અને ગુઆનિન (G)ની માત્રા સરખી હોય છે. આથી, જો સાયટોસિન 30% હોય, તો ગુઆનિન પણ 30% હશે. એડેનીન (A) અને થાઇમિન (T)ની માત્રા પણ સરખી હશે, જે 20% હશે.", "ncert_ref": "Class XII - Chapter 6: અણુવંશાનુગત્યના આણ્વિક આધાર", "difficulty": "Hard", "num": 20}, {"question": "એક DNA અણુની 5’-ATGCGTAC-3’ શૃંખલામાં, જો બીજી શૃંખલા 3’-TACGCATG-5’ હોય, તો નીચેના પૈકી કયું વિધાન સાચું છે?", "options": ["A) આ DNA અણુ પાલિન્ડ્રોમિક છે કારણ કે બંને શૃંખલાઓ એકબીજાની પૂરક અને વિરુદ્ધ દિશામાં છે.", "B) આ DNA અણુ પાલિન્ડ્રોમિક નથી કારણ કે બંને શૃંખલાઓ એકસરખી નથી.", "C) આ DNA અણુ પાલિન્ડ્રોમિક છે કારણ કે તેની શૃંખલાઓ સરખી લંબાઈ ધરાવે છે.", "D) આ DNA અણુ પાલિન્ડ્રોમિક નથી કારણ કે તેની શૃંખલાઓમાં એડેનીન અને થાયમીનનું પ્રમાણ સરખું નથી."], "correct": 1, "explanation": "પાલિન્ડ્રોમિક DNA શૃંખલાઓ એવી હોય છે જેની એક શૃંખલા બીજી શૃંખલાની વિરુદ્ધ દિશામાં અને પૂરક હોય છે, પરંતુ તેની રચના એવી હોય છે કે જ્યારે તેને વાંચવામાં આવે ત્યારે તે એકસરખી લાગે છે (ઉદા. 5’-GAATTC-3’ અને 3’-CTTAAG-5’). અહીં, 5’-ATGCGTAC-3’ અને 3’-TACGCATG-5’ એકબીજાની પૂરક છે, પરંતુ તે પાલિન્ડ્રોમિક નથી કારણ કે તેની રચના વાંચતાં એકસરખી લાગતી નથી. વિકલ્પ A ખોટો છે કારણ કે પાલિન્ડ્રોમિક શૃંખલાઓએ વાંચતાં એકસરખી લાગવી જોઈએ. વિકલ્પ C ખોટો છે કારણ કે લંબાઈ સરખી હોવી પાલિન્ડ્રોમિક હોવાનું લક્ષણ નથી. વિકલ્પ D ખોટો છે કારણ કે એડેનીન અને થાયમીનનું પ્રમાણ સરખું હોવું પાલિન્ડ્રોમિક હોવાનું લક્ષણ નથી.", "ncert_ref": "Class XII - Chapter 6: અણુવંશાનુવંશિકતા અને જૈવિક ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 21}, {"question": "RNA અણુમાં, નીચેના પૈકી કયું કથન રાઇબોઝ શર્કરા વિશે સાચું છે?", "options": ["A) રાઇબોઝમાં 2’ કર્બન પર હાઇડ્રોક્સિલ સમૂહ હોય છે, જે તેને DNAના ડિઓક્સીરાઇબોઝ કરતાં વધુ સ્થિર બનાવે છે.", "B) રાઇબોઝમાં 2’ કર્બન પર હાઇડ્રોક્સિલ સમૂહ હોય છે, જે તેને આલ્કલી પ્રત્યે વધુ સંવેદનશીલ બનાવે છે.", "C) રાઇબોઝમાં 3’ કર્બન પર હાઇડ્રોક્સિલ સમૂહ હોય છે, જે RNAને DNA કરતાં વધુ સ્થિર બનાવે છે.", "D) રાઇબોઝમાં 1’ કર્બન પર હાઇડ્રોક્સિલ સમૂહ હોય છે, જે તેને ન્યુક્લિયોસાઇડ બનાવવા માટે જરૂરી છે."], "correct": 1, "explanation": "રાઇબોઝ શર્કરામાં 2’ કર્બન પર હાઇડ્રોક્સિલ સમૂહ હોય છે, જે RNAને આલ્કલી પ્રત્યે વધુ સંવેદનશીલ બનાવે છે. આ હાઇડ્રોક્સિલ સમૂહના કારણે RNA આલ્કલી સાથે પ્રક્રિયા કરતાં તૂટી જાય છે. વિકલ્પ A ખોટો છે કારણ કે હાઇડ્રોક્સિલ સમૂહના કારણે RNA ઓછો સ્થિર બને છે. વિકલ્પ C ખોટો છે કારણ કે 3’ કર્બન પર હાઇડ્રોક્સિલ સમૂહ RNA અને DNA બંનેમાં હોય છે, પરંતુ તે સ્થિરતામાં ફરક પાડતો નથી. વિકલ્પ D ખોટો છે કારણ કે 1’ કર્બન પર હાઇડ્રોક્સિલ સમૂહ ન્યુક્લિયોસાઇડ બનાવવા માટે જરૂરી નથી, પરંતુ તે ન્યુક્લિયોસાઇડ અને ન્યુક્લિયોટાઇડ બંનેમાં હોય છે.", "ncert_ref": "Class XII - Chapter 6: અણુવંશાનુવંશિકતા અને જૈવિક ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 22}, {"question": "એક DNA અણુની 5’-GATCA-3’ શૃંખલાની પૂરક RNA શૃંખલા બનાવવા માટે, નીચેના પૈકી કયું ઉત્સેચક જરૂરી છે?", "options": ["A) DNA પોલિમરેઝ", "B) RNA પોલિમરેઝ", "C) રિવર્સ ટ્રાન્સક્રિપ્ટેઝ", "D) લાઇગેઝ"], "correct": 2, "explanation": "RNA શૃંખલા બનાવવા માટે DNA શૃંખલાની પૂરક શૃંખલા તૈયાર કરવી જરૂરી છે. આ કામ રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચક દ્વારા થાય છે, જે RNA શૃંખલાને DNA શૃંખલામાં રૂપાંતરિત કરે છે. વિકલ્પ A ખોટો છે કારણ કે DNA પોલિમરેઝ DNA શૃંખલાને જ લંબાવે છે. વિકલ્પ B ખોટો છે કારણ કે RNA પોલિમરેઝ DNA શૃંખલાને RNA શૃંખલામાં રૂપાંતરિત કરે છે, પરંતુ પ્રશ્નમાં DNA શૃંખલાની પૂરક RNA શૃંખલા બનાવવાની વાત છે. વિકલ્પ D ખોટો છે કારણ કે લાઇગેઝ ઉત્સેચક DNA શૃંખલાઓને જોડે છે.", "ncert_ref": "Class XII - Chapter 6: અણુવંશાનુવંશિકતા અને જૈવિક ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 23}, {"question": "એક DNA અણુમાં, જો એડેનીનનું પ્રમાણ 25% હોય, તો નીચેના પૈકી કયું વિધાન સાચું છે?", "options": ["A) થાયમીનનું પ્રમાણ 25% હશે અને ગુઆનિન અને સાયટોસિનનું પ્રમાણ 25% હશે.", "B) થાયમીનનું પ્રમાણ 25% હશે અને ગુઆનિન અને સાયટોસિનનું પ્રમાણ 50% હશે, પરંતુ તેની વચ્ચે કોઈ સંબંધ નહીં હોય.", "C) થાયમીનનું પ્રમાણ 25% હશે અને ગુઆનિન અને સાયટોસિનનું પ્રમાણ 25% હશે, પરંતુ તેની વચ્ચે પૂરકતા હશે.", "D) થાયમીનનું પ્રમાણ 25% હશે અને ગુઆનિન અને સાયટોસિનનું પ્રમાણ 50% હશે, જેમાં ગુઆનિન અને સાયટોસિનનું પ્રમાણ સરખું હશે."], "correct": 3, "explanation": "DNAમાં, એડેનીન (A) અને થાયમીન (T) વચ્ચે પૂરકતા હોય છે, જ્યારે ગુઆનિન (G) અને સાયટોસિન (C) વચ્ચે પૂરકતા હોય છે. ચાર્ગેફના નિયમ મુજબ, A + T = G + C = 50%. જો Aનું પ્રમાણ 25% હોય, તો Tનું પ્રમાણ પણ 25% હશે. આથી, G + C = 50% હશે, અને G અને C વચ્ચે પૂરકતા હોવાથી, તેનું પ્રમાણ સરખું હશે, એટલે કે G = 25% અને C = 25%. વિકલ્પ A ખોટો છે કારણ કે G અને Cનું પ્રમાણ 25% નહીં પરંતુ 50% હશે. વિકલ્પ B ખોટો છે કારણ કે G અને C વચ્ચે પૂરકતા હશે. વિકલ્પ C ખોટો છે કારણ કે G અને Cનું પ્રમાણ 25% નહીં પરંતુ 50% હશે.", "ncert_ref": "Class XII - Chapter 6: અણુવંશાનુવંશિકતા અને જૈવિક ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 24}, {"question": "એક સંશોધકે એક ન્યુક્લિક ઍસિડ અણુનું વિશ્લેષણ કર્યું જેમાં રાઇબોઝ શર્કરા, યુરેસિલ બેઇઝ અને ફોસ્ફોડાઇએસ્ટર બંધ જોવા મળ્યા, પરંતુ આ અણુ એક-શૃંખલાવાળો ન હતો અને તેની શૃંખલાઓ વચ્ચે હાઇડ્રોજન બંધ પણ જોવા મળ્યા. આ અણુના સંદર્ભમાં નીચેના પૈકી કયું વિધાન સાચું નથી?", "options": ["A) આ અણુ RNAનો એક વિશિષ્ટ પ્રકાર હોઈ શકે છે જે ડબલ-સ્ટ્રેન્ડેડ હોય છે", "B) આ અણુમાં યુરેસિલ બેઇઝ હોવાથી તે ચોક્કસપણે RNA છે અને DNA ન હોઈ શકે", "C) આ અણુમાં હાઇડ્રોજન બંધની હાજરી સૂચવે છે કે તે વાઇરસના જીનોમનો ભાગ હોઈ શકે છે", "D) આ અણુમાં રાઇબોઝ શર્કરા હોવાથી તે પ્રોકેરિયોટિક કોષના કોષકેન્દ્રમાં જોવા મળતો નથી"], "correct": 3, "explanation": "સાચો જવાબ D છે. કારણ કે: \n\nA) સાચું છે - કેટલાક વાઇરસમાં ડબલ-સ્ટ્રેન્ડેડ RNA (dsRNA) જોવા મળે છે, જે આ અણુની લાક્ષણિકતા સાથે મેળ ખાય છે.\n\nB) સાચું છે - યુરેસિલ માત્ર RNAમાં જોવા મળે છે, તેથી આ અણુ ચોક્કસપણે RNA છે.\n\nC) સાચું છે - ઘણા વાઇરસમાં ડબલ-સ્ટ્રેન્ડેડ RNA જોવા મળે છે, જે હાઇડ્રોજન બંધ ધરાવે છે.\n\nD) ખોટું છે - પ્રોકેરિયોટિક કોષોમાં કોષકેન્દ્ર હોતું નથી, પરંતુ RNA તેમના કોષરસમાં જોવા મળે છે. આ ઉપરાંત, RNA પ્રોકેરિયોટ્સ અને યુકેરિયોટ્સ બંનેમાં હાજર હોય છે. આ વિધાન અણુની લાક્ષણિકતા સાથે સંબંધિત નથી અને ખોટું છે કારણ કે RNA પ્રોકેરિયોટ્સમાં પણ હોય છે.\n\nNCERT સંદર્ભ: ક્લાસ XII - પ્રકરણ 6: આનુવંશિક દ્રવ્ય, પૃષ્ઠ 107-110 (RNA અને DNAની રચના અને પ્રકારો).", "ncert_ref": "ક્લાસ XII - પ્રકરણ 6: આનુવંશિક દ્રવ્ય", "difficulty": "Hard", "num": 25}, {"question": "એક DNA અણુની 5’-ATGCATGC-3’ શૃંખલામાં, જો બીજી શૃંખલા 3’-TACGTACG-5’ હોય, તો નીચેના પૈકી કયું વિધાન સાચું છે?", "options": ["A) DNA અણુમાં એડેનીન અને થાયમીનની સંખ્યા સરખી છે, પરંતુ ગુઆનિન અને સાયટોસિનની સંખ્યા અસરખી છે.", "B) DNA અણુમાં પુરીન અને પિરિમિડિનની સંખ્યા સરખી છે.", "C) DNA અણુમાં એડેનીન અને ગુઆનિનની સંખ્યા સરખી છે.", "D) DNA અણુમાં થાયમીન અને સાયટોસિનની સંખ્યા સરખી છે."], "correct": 1, "explanation": "DNA અણુમાં, ચાર્ગાફના નિયમ મુજબ, પુરીન (એડેનીન અને ગુઆનિન) અને પિરિમિડિન (થાયમીન અને સાયટોસિન)ની સંખ્યા સરખી હોય છે. અહીં, 5’-ATGCATGC-3’ શૃંખલામાં 4 પુરીન (A, G, A, G) અને 4 પિરિમિડિન (T, C, T, C) છે, જ્યારે પૂરક શૃંખલા 3’-TACGTACG-5’માં પણ 4 પુરીન (T, C, T, C) અને 4 પિરિમિડિન (A, G, A, G) છે. આમ, પુરીન અને પિરિમિડિનની સંખ્યા સરખી છે. બાકીના વિકલ્પો ખોટા છે કારણ કે એડેનીન અને થાયમીનની સંખ્યા સરખી છે (4-4), ગુઆનિન અને સાયટોસિનની સંખ્યા સરખી છે (4-4), પરંતુ એડેનીન અને ગુઆનિનની સંખ્યા અસરખી છે (4-4 નહીં, પરંતુ 4-4 સરખી છે, પરંતુ વિકલ્પ C ખોટો છે કારણ કે તે એડેનીન અને ગુઆનિનની સરખી સંખ્યા દર્શાવે છે, જે અહીં સાચું નથી).", "ncert_ref": "Class XII - Chapter 6: આણ્વિક આનુવંશિકતા અને મનુષ્યમાં લિંગ નિર્ધારણ", "difficulty": "Hard", "num": 26}, {"question": "નીચેના પૈકી કયું વિધાન RNA અણુની રચના વિશે ખોટું છે?", "options": ["A) RNA અણુ એક-શૃંખલાવાળો હોય છે અને તે રાઇબોઝ શર્કરા ધરાવે છે.", "B) RNA અણુમાં યુરેસિલ બેઇઝ હોય છે, જે DNAમાં અનુપસ્થિત હોય છે.", "C) RNA અણુમાં ફોસ્ફોડાયએસ્ટર બંધો દ્વારા ન્યુક્લિયોટાઇડ જોડાયેલા હોય છે, જેમાં શર્કરા અને ફોસ્ફેટ સમૂહ વૈકલ્પિક રીતે ગોઠવાયેલા હોય છે.", "D) RNA અણુમાં, એડેનીન હંમેશા થાયમીન સાથે જોડાય છે."], "correct": 3, "explanation": "RNA અણુમાં, એડેનીન યુરેસિલ સાથે જોડાય છે, થાયમીન સાથે નહીં. થાયમીન ફક્ત DNAમાં જોવા મળે છે. બાકીના વિકલ્પો સાચા છે: RNA એક-શૃંખલાવાળો હોય છે અને રાઇબોઝ શર્કરા ધરાવે છે (A), RNAમાં યુરેસિલ બેઇઝ હોય છે (B), અને RNAમાં ફોસ્ફોડાયએસ્ટર બંધો દ્વારા ન્યુક્લિયોટાઇડ જોડાયેલા હોય છે (C).", "ncert_ref": "Class XII - Chapter 6: આણ્વિક આનુવંશિકતા અને મનુષ્યમાં લિંગ નિર્ધારણ", "difficulty": "Hard", "num": 27}, {"question": "એક DNA અણુની 3’-TACGGATTC-5’ શૃંખલાની પૂરક RNA શૃંખલા બનાવવા માટે, નીચેના પૈકી કયું વિધાન સાચું છે?", "options": ["A) પૂરક RNA શૃંખલા 5’-AUGCCUAAG-3’ હશે અને તેને mRNA કહેવાય છે.", "B) પૂરક RNA શૃંખલા 3’-AUGCCUAAG-5’ હશે અને તેને tRNA કહેવાય છે.", "C) પૂરક RNA શૃંખલા 5’-AUGCCUAAG-3’ હશે અને તેને rRNA કહેવાય છે.", "D) પૂરક RNA શૃંખલા 3’-UACGGAUUC-5’ હશે અને તેને mRNA કહેવાય છે."], "correct": 0, "explanation": "DNA શૃંખલા 3’-TACGGATTC-5’ની પૂરક RNA શૃંખલા 5’-AUGCCUAAG-3’ હશે, કારણ કે RNAમાં થાયમીન (T)ની જગ્યાએ યુરેસિલ (U) વાપરવામાં આવે છે. આ શૃંખલા mRNA (મેસેન્જર RNA) હોય છે, જે પ્રોટીન સંશ્લેષણમાં વાપરાય છે. બાકીના વિકલ્પો ખોટા છે: વિકલ્પ Bમાં શૃંખલાની દિશા ખોટી છે (3’-5’ નહીં, 5’-3’ હોવી જોઈએ), વિકલ્પ Cમાં RNAનો પ્રકાર ખોટો છે (rRNA નહીં, mRNA હોવું જોઈએ), અને વિકલ્પ Dમાં શૃંખલા અને દિશા બંને ખોટા છે.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક આનુવંશિકતા અને મનુષ્યમાં લિંગ નિર્ધારણ", "difficulty": "Hard", "num": 28}, {"question": "એક સંશોધકે એક ન્યુક્લિક ઍસિડ અણુનું વિશ્લેષણ કર્યું જેમાં 35% ગુઆનિન, 25% સાયટોસિન, 20% એડેનીન, અને 20% થાયમીન છે. નીચેના પૈકી કયું વિધાન સાચું છે?", "options": ["A) આ અણુ DNA છે કારણ કે એડેનીન અને થાયમીનની સંખ્યા સરખી છે.", "B) આ અણુ RNA છે કારણ કે ગુઆનિન અને સાયટોસિનની સંખ્યા અસરખી છે.", "C) આ અણુ DNA છે કારણ કે ગુઆનિન અને સાયટોસિનની સંખ્યા અસરખી છે.", "D) આ અણુ RNA છે કારણ કે એડેનીન અને થાયમીનની સંખ્યા સરખી છે."], "correct": 0, "explanation": "ચાર્ગાફના નિયમ મુજબ, DNAમાં એડેનીન (A) અને થાયમીન (T)ની સંખ્યા સરખી હોય છે, અને ગુઆનિન (G) અને સાયટોસિન (C)ની સંખ્યા સરખી હોય છે. અહીં, A = T = 20% અને G = 35%, C = 25% છે, જે DNA માટે અસાધારણ છે, પરંતુ A અને Tની સરખી સંખ્યા દર્શાવે છે કે આ અણુ DNA છે. RNAમાં, A અને U (યુરેસિલ)ની સંખ્યા સરખી હોય છે, પરંતુ થાયમીન (T) હાજર નથી. આમ, વિકલ્પ A સાચો છે. બાકીના વિકલ્પો ખોટા છે: વિકલ્પ B અને D RNA વિશે ખોટા છે કારણ કે RNAમાં થાયમીન હાજર નથી, અને વિકલ્પ C ખોટો છે કારણ કે DNAમાં G અને Cની સંખ્યા સરખી હોવી જોઈએ.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક આનુવંશિકતા અને મનુષ્યમાં લિંગ નિર્ધારણ", "difficulty": "Hard", "num": 29}, {"question": "એક અજાણ્યા ન્યુક્લિક ઍસિડ અણુનું વિશ્લેષણ કરતા જણાયું કે તેમાં રાઇબોઝ શર્કરા, યુરેસિલ, એડેનીન, ગુઆનિન અને સાયટોસિન હાજર છે. આ અણુ વિશે નીચેના પૈકી કયું વિધાન ખોટું છે?", "options": ["A) આ અણુ RNA હોવું જ જોઈએ કારણ કે તેમાં રાઇબોઝ શર્કરા અને યુરેસિલ છે.", "B) આ અણુ એક-શૃંખલાવાળું અથવા દ્વિ-શૃંખલાવાળું હોઈ શકે, પરંતુ તે હંમેશા વર્તુળાકાર જ હશે.", "C) આ અણુમાં એડેનીન અને યુરેસિલ વચ્ચે હાઇડ્રોજન બંધો બનશે.", "D) આ અણુમાં ગુઆનિન અને સાયટોસિન વચ્ચે ત્રણ હાઇડ્રોજન બંધો બનશે."], "correct": 1, "explanation": "વિકલ્પ A સાચો છે કારણ કે RNAમાં રાઇબોઝ શર્કરા અને યુરેસિલ હાજર હોય છે. વિકલ્પ B ખોટો છે કારણ કે RNA એક-શૃંખલાવાળું અથવા દ્વિ-શૃંખલાવાળું હોઈ શકે, પરંતુ તે હંમેશા વર્તુળાકાર નથી હોતું (ઉદા. mRNA, tRNA રેખીય હોય છે). વિકલ્પ C સાચો છે કારણ કે RNAમાં એડેનીન અને યુરેસિલ વચ્ચે હાઇડ્રોજન બંધો બને છે. વિકલ્પ D સાચો છે કારણ કે ગુઆનિન અને સાયટોસિન વચ્ચે ત્રણ હાઇડ્રોજન બંધો બને છે.", "ncert_ref": "Class XII - Chapter 6: જૈવિક અણુઓ", "difficulty": "Hard", "num": 30}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
