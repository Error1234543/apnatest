<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - પોલીહેલોજન સંયોજનો (ફક્ત ઉપયોગો અને અસરો)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 પોલીહેલોજન સંયોજનો (ફક્ત ઉપયોગો અને અસરો)</span>
                <span>🎯 Hard</span>
                <span>📝 30 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "પોલિઇથિલીન ટેટ્રાફ્લોરોઇથિલીન (PTFE) નો ઉપયોગ ક્યાં થતો નથી?", "options": ["A) અસરકારક લુબ્રિકન્ટ તરીકે", "B) નોન-સ્ટિક કુકવેરના લેપન તરીકે", "C) હૃદયના વાલ્વના પ્રત્યારોપણમાં", "D) પાણીના પાઇપલાઇનમાં કાટ રોકવા માટે"], "correct": 3, "explanation": "PTFE (ટેફલોન) નો ઉપયોગ અસરકારક લુબ્રિકન્ટ (A), નોન-સ્ટિક કુકવેર (B), અને હૃદયના વાલ્વના પ્રત્યારોપણ (C) માટે થાય છે. પાણીના પાઇપલાઇનમાં કાટ રોકવા માટે પોલિઇથિલીન અથવા અન્ય પોલિમરનો ઉપયોગ થાય છે, PTFE નહીં.", "ncert_ref": "Class XII - Chapter 15: પોલિમર", "difficulty": "Hard", "num": 1}, {"question": "પોલિવિનાઇલ ક્લોરાઇડ (PVC) ની અસરો વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) તે જ્વલનશીલ છે અને બળતાં હાનિકારક હાઇડ્રોજન ક્લોરાઇડ વાયુ ઉત્પન્ન કરે છે", "B) તે પાણી અને રસાયણો પ્રત્યે પ્રતિરોધક છે", "C) તેનો ઉપયોગ પાઇપ અને ફિટિંગ્સમાં થાય છે", "D) તે બાયોડિગ્રેડેબલ છે અને પર્યાવરણને અનુકૂળ છે"], "correct": 3, "explanation": "PVC જ્વલનશીલ છે અને બળતાં HCL વાયુ ઉત્પન્ન કરે છે (A), પાણી અને રસાયણો પ્રત્યે પ્રતિરોધક છે (B), અને પાઇપમાં વપરાય છે (C). પરંતુ તે બાયોડિગ્રેડેબલ નથી (D), જે ખોટું વિધાન છે.", "ncert_ref": "Class XII - Chapter 15: પોલિમર", "difficulty": "Hard", "num": 2}, {"question": "પોલિટેટ્રાફ્લોરોઇથિલીન (PTFE) ની અસર વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) તે ઉચ્ચ તાપમાને પીગળે છે", "B) તે રાસાયણિક દ્રાવકોમાં દ્રાવ્ય છે", "C) તેનો ઉપયોગ ડેન્ટલ ફ્લોસમાં થાય છે", "D) તે વિદ્યુતનો સારો વાહક છે"], "correct": 2, "explanation": "PTFE ઉચ્ચ તાપમાને પીગળતું નથી (A), રાસાયણિક દ્રાવકોમાં અદ્રાવ્ય છે (B), અને વિદ્યુતનો કુવાહક છે (D). પરંતુ તેનો ઉપયોગ ડેન્ટલ ફ્લોસમાં થાય છે (C), જે સાચું છે.", "ncert_ref": "Class XII - Chapter 15: પોલિમર", "difficulty": "Hard", "num": 3}, {"question": "પોલિઇથિલીન ની અસરો વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) તે હલકો, લવચીક અને ટિકાઉ છે", "B) તેનો ઉપયોગ પ્લાસ્ટિકની બેગ્સ અને બોટલ્સમાં થાય છે", "C) તે ઉચ્ચ તાપમાન સહન કરે છે", "D) તે રાસાયણિક પ્રતિક્રિયાઓ પ્રત્યે નિષ્ક્રિય છે"], "correct": 2, "explanation": "પોલિઇથિલીન હલકો, લવચીક અને ટિકાઉ છે (A), પ્લાસ્ટિકની બેગ્સ અને બોટલ્સમાં વપરાય છે (B), અને રાસાયણિક પ્રતિક્રિયાઓ પ્રત્યે નિષ્ક્રિય છે (D). પરંતુ તે ઉચ્ચ તાપમાન સહન કરતું નથી (C), જે ખોટું છે.", "ncert_ref": "Class XII - Chapter 15: પોલિમર", "difficulty": "Hard", "num": 4}, {"question": "પોલિપ્રોપિલીન નો ઉપયોગ ક્યાં થતો નથી?", "options": ["A) ઓટોમોબાઇલના ભાગો બનાવવા માટે", "B) રસોઈના વાસણો બનાવવા માટે", "C) રોપ અને જાળી બનાવવા માટે", "D) ચિકિત્સા ક્ષેત્રે સીવણના ધાગા તરીકે"], "correct": 1, "explanation": "પોલિપ્રોપિલીનનો ઉપયોગ ઓટોમોબાઇલના ભાગો (A), રોપ અને જાળી (C), અને ચિકિત્સા ક્ષેત્રે સીવણના ધાગા (D) તરીકે થાય છે. રસોઈના વાસણો માટે સામાન્ય રીતે પોલિઇથિલીન અથવા PTFE વપરાય છે, પોલિપ્રોપિલીન નહીં.", "ncert_ref": "Class XII - Chapter 15: પોલિમર", "difficulty": "Hard", "num": 5}, {"question": "પોલીવિનાઇલીડીન ક્લોરાઇડ (PVDC) નો ઉપયોગ નીચેનામાંથી ક્યાં થતો નથી?", "options": ["A) ખાદ્ય પદાર્થોની પેકેજીંગમાં વરાળ અને ઓક્સિજન અવરોધક ફિલ્મ તરીકે", "B) કૃત્રિમ ચામડા અને ફર્નિચર ઉદ્યોગમાં કોટિંગ તરીકે", "C) વિદ્યુત તારની ઇન્સ્યુલેશન માટે", "D) શસ્ત્રક્રિયા માટેના સિવણીના દોરા તરીકે"], "correct": 3, "explanation": "PVDC નો ઉપયોગ ખાદ્ય પદાર્થોની પેકેજીંગ (A), કૃત્રિમ ચામડા અને ફર્નિચરમાં કોટિંગ (B) તથા વિદ્યુત તારની ઇન્સ્યુલેશન (C) માટે થાય છે. શસ્ત્રક્રિયા માટેના સિવણીના દોરા તરીકે પોલિપ્રોપિલીન અથવા પોલિઇથિલીન ટેરેફ્થેલેટ (PET) વપરાય છે, PVDC નહીં. આથી D ખોટું છે.", "ncert_ref": "Class XII - Chapter 15: પોલિમર", "difficulty": "Hard", "num": 6}, {"question": "પોલિઇથિલીન ટેરેફ્થેલેટ (PET) ની અસર વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) તેનો ઉપયોગ પ્લાસ્ટિકની બોટલો અને કન્ટેનર બનાવવા માટે થાય છે", "B) તે બાયોડિગ્રેડેબલ છે અને પર્યાવરણ માટે હાનિકારક નથી", "C) તે ઉચ્ચ તાકાત અને ટકાઉપણું ધરાવે છે", "D) તે રાસાયણિક દ્રવ્યો પ્રત્યે પ્રતિકારક છે"], "correct": 1, "explanation": "PET બાયોડિગ્રેડેબલ નથી અને પર્યાવરણ માટે હાનિકારક છે (B ખોટું). A, C, અને D સાચાં છે કારણ કે PET નો ઉપયોગ પ્લાસ્ટિકની બોટલો માટે થાય છે, તે ઉચ્ચ તાકાત અને ટકાઉપણું ધરાવે છે, તથા રાસાયણિક દ્રવ્યો  અન્ય પોલિમરનો ઉપયોગ થાય છે.", "ncert_ref": "Class XII - Chapter 15: પોલિમર", "difficulty": "Hard", "num": 21}, {"question": "પોલિવિનાઇલ ક્લોરાઇડ (PVC) ની અસર વિશે નીચેનામાંથી કયું વિધાન સાચું છે, જ્યારે તેના પર્યાવરણીય પ્રભાવને ધ્યાનમાં લેવામાં આવે?", "options": ["A) PVC નો નિકાલ કરતી વખતે ડાયોક્સિન જેવા વિષારી પદાર્થો ઉત્પન્ન થતા નથી.", "B) PVC ની ઉત્પાદન પ્રક્રિયા દરમિયાન ક્લોરિન ગેસનું ઉત્સર્જન થાય છે, જે પર્યાવરણ માટે હાનિકારક છે.", "C) PVC પૂર્ણપણે બાયોડિગ્રેડેબલ છે અને પર્યાવરણને કોઈ હાનિ પહોંચાડતું નથી.", "D) PVC નો ઉપયોગ ખોરાક પેકેજિંગમાં સલામત છે કારણ કે તે રાસાયણિક રીતે નિષ્ક્રિય છે."], "correct": 1, "explanation": "PVC ની ઉત્પાદન પ્રક્રિયા દરમિયાન ક્લોરિન ગેસનું ઉત્સર્જન થાય છે, જે પર્યાવરણ માટે હાનિકારક છે (B). PVC નો નિકાલ કરતી વખતે ડાયોક્સિન જેવા વિષારી પદાર્થો ઉત્પન્ન થાય છે (A ખોટું). PVC બાયોડિગ્રેડેબલ નથી અને પર્યાવરણને હાનિ પહોંચાડે છે (C ખોટું). PVC નો ઉપયોગ ખોરાક પેકેજિંગમાં સલામત નથી કારણ કે તે રાસાયણિક રીતે નિષ્ક્રિય નથી (D ખોટું).", "ncert_ref": "Class XII - Chapter 15: પોલિમર", "difficulty": "Hard", "num": 22}, {"question": "એક સંશોધનમાં જાણવા મળ્યું કે કેટલાક પોલીહેલોજન સંયોજનોના લાંબા ગાળાના સંપર્કથી **થાઇરોઇડ હોર્મોનના કાર્યમાં ખલેલ** પડે છે. નીચેનામાંથી કયું સંયોજન આ અસર માટે જવાબદાર છે, જે તેની રાસાયણિક રચનામાં બ્રોમિન ધરાવે છે અને ઇલેક્ટ્રોનિક ઉપકરણોમાં જ્યોત રોધક તરીકે વપરાય છે?", "options": ["A) પોલિફ્લોરિનેટેડ આલ્કાઇલ પદાર્થો (PFAS)", "B) પોલિબ્રોમિનેટેડ ડાયફિનાઇલ ઇથર્સ (PBDEs)", "C) પોલિવિનાઇલ ક્લોરાઇડ (PVC)", "D) પોલિટેટ્રાફ્લોરોઇથિલીન (PTFE)"], "correct": 1, "explanation": "પોલિબ્રોમિનેટેડ ડાયફિનાઇલ ઇથર્સ (PBDEs) બ્રોમિન ધરાવતા પોલીહેલોજન સંયોજનો છે, જે ઇલેક્ટ્રોનિક ઉપકરણોમાં જ્યોત રોધક તરીકે વપરાય છે. સંશોધનોમાં જાણવા મળ્યું છે કે PBDEs નો લાંબા ગાળાનો સંપર્ક થાઇરોઇડ હોર્મોનના કાર્યમાં ખલેલ પેદા કરે છે, કારણ કે તે હોર્મોન રીસેપ્ટર્સ સાથે હસ્તક્ષેપ કરે છે. PFAS ફ્લોરિન ધરાવે છે અને તેનો ઉપયોગ અગ્નિશામક ફીણમાં થાય છે, પરંતુ તે થાઇરોઇડ હોર્મોનને અસર કરતા નથી. PVC અને PTFE આ અસર માટે જવાબદાર નથી.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 16: રોજિંદા જીવનમાં રસાયણશાસ્ત્ર", "difficulty": "Hard", "num": 23}, {"question": "નીચેનામાંથી કયું પોલીહેલોજન સંયોજન તેની **ઉચ્ચ વિદ્યુત અવાહકતા** અને **ઉચ્ચ તાપમાન સહનશીલતા**ને કારણે વિદ્યુત ઉપકરણોમાં વપરાય છે, પરંતુ તેના ઉત્પાદન દરમિયાન **કાર્સિનોજેનિક પદાર્થો** ઉત્પન્ન થાય છે જે કારખાના કામદારો માટે જોખમી છે?", "options": ["A) પોલિઇથિલીન ટેરેફ્થેલેટ (PET)", "B) પોલિબ્રોમિનેટેડ ડાયફિનાઇલ ઇથર્સ (PBDEs)", "C) પોલિવિનાઇલ ક્લોરાઇડ (PVC)", "D) પોલિટેટ્રાફ્લોરોઇથિલીન (PTFE)"], "correct": 3, "explanation": "પોલિટેટ્રાફ્લોરોઇથિલીન (PTFE) ઉચ્ચ વિદ્યુત અવાહકતા અને ઉચ્ચ તાપમાન સહનશીલતા ધરાવે છે, જેના કારણે તેનો ઉપયોગ વિદ્યુત ઉપકરણોમાં થાય છે. જોકે, તેના ઉત્પાદન દરમિયાન **પર્ફ્લોરોઓક્ટેનોઇક એસિડ (PFOA)** જેવા કાર્સિનોજેનિક પદાર્થો ઉત્પન્ન થાય છે, જે કારખાના કામદારો માટે જોખમી છે. PET નો ઉપયોગ પેકેજિંગમાં થાય છે, PBDEs જ્યોત રોધક તરીકે વપરાય છે, અને PVC નો ઉપયોગ પાઇપ અને કેબલમાં થાય છે, પરંતુ આ સંયોજનો આ વિશિષ્ટ ગુણધર્મો ધરાવતા નથી.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 15: પોલિમર", "difficulty": "Hard", "num": 24}, {"question": "એક રાસાયણિક ઉદ્યોગમાં કાર્યરત કર્મચારીઓમાં લાંબા ગાળાના સંપર્ક બાદ નીચેના લક્ષણો જોવા મળ્યા: યકૃતના કાર્યમાં વિક્ષેપ, થાઇરોઇડ હોર્મોનના સ્તરમાં અસંતુલન, અને પ્રજનન તંત્ર પર પ્રતિકૂળ અસર. આ લક્ષણો કયા પોલીહેલોજન સંયોજનના સંપર્કને કારણે હોઈ શકે છે, જે તેની ઉચ્ચ રાસાયણિક સ્થિરતા અને લિપોફિલિક ગુણધર્મોને કારણે શરીરમાં સંચિત થાય છે?", "options": ["A) પોલિટેટ્રાફ્લોરોઇથિલીન (PTFE), કારણ કે તે ઉચ્ચ તાપમાન પ્રતિકાર ધરાવે છે અને રસોઈના વાસણોમાં વપરાય છે", "B) પોલિવિનાઇલ ક્લોરાઇડ (PVC), કારણ કે તેના વિઘટનથી ડાયોક્સિન ઉત્પન્ન થાય છે જે પ્રજનન તંત્ર પર અસર કરે છે", "C) પોલિબ્રોમિનેટેડ ડાયફિનાઇલ ઇથર્સ (PBDEs), કારણ કે તે જ્યોતરોધક તરીકે વપરાય છે અને થાઇરોઇડ હોર્મોનના કાર્યમાં વિક્ષેપ કરે છે", "D) પોલિઇથિલીન ટેરેફ્થેલેટ (PET), કારણ કે તે ખોરાક પેકેજિંગમાં વપરાય છે અને યકૃત પર ઝેરી અસર કરે છે"], "correct": 2, "explanation": "સાચો જવાબ વિકલ્પ C છે. પોલિબ્રોમિનેટેડ ડાયફિનાઇલ ઇથર્સ (PBDEs) એ પોલીહેલોજન સંયોજનો છે જે જ્યોતરોધક તરીકે વ્યાપકપણે ઉપયોગમાં લેવાય છે. તેની લિપોફિલિક ગુણધર્મોને કારણે શરીરમાં સંચિત થાય છે અને લાંબા ગાળાના સંપર્કથી થાઇરોઇડ હોર્મોનના કાર્યમાં વિક્ષેપ, યકૃતના કાર્યમાં ખલેલ અને પ્રજનન તંત્ર પર પ્રતિકૂળ અસરો જોવા મળે છે (NCERT Class XII, Chapter 14: પર્યાવરણીય રસાયણવિજ્ઞાન). \n\nવિકલ્પ A ખોટો છે કારણ કે PTFE રાસાયણિક રીતે નિષ્ક્રિય છે અને તેના વિઘટનથી ઝેરી પદાર્થો ઉત્પન્ન થતા નથી. \n\nવિકલ્પ B ખોટો છે કારણ કે PVC ના વિઘટનથી ડાયોક્સિન ઉત્પન્ન થાય છે, જે પ્રજનન તંત્ર પર અસર કરે છે, પરંતુ થાઇરોઇડ હોર્મોન પર અસર અને યકૃતના કાર્યમાં વિક્ષેપ માટે PBDEs વધુ જવાબદાર છે. \n\nવિકલ્પ D ખોટો છે કારણ કે PET ખોરાક પેકેજિંગમાં વપરાય છે, પરંતુ તેની ઝેરી અસરો મુખ્યત્વે માઇક્રોપ્લાસ્ટિક્સના સ્વરૂપમાં જોવા મળે છે, અને તે થાઇરોઇડ હોર્મોન પર અસર કરતું નથી.", "ncert_ref": "Class XII - અધ્યાય 14: પર્યાવરણીય રસાયણવિજ્ઞાન", "difficulty": "Hard", "num": 25}, {"question": "પોલીવિનાઇલ ક્લોરાઇડ (PVC) ના લાંબા ગાળાના સંપર્કથી મનુષ્યમાં થતી અસર વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) તે ફેફસાંના કોષોના DNAમાં પરિવર્તન કરે છે, જેના કારણે કેંસરનો ખતરો વધે છે.", "B) તે હૃદયના સ્નાયુઓની કામગીરીને સુધારે છે, જેના કારણે હૃદયરોગનો ખતરો ઘટે છે.", "C) તે યકૃતમાં ગ્લાયકોજનના સંગ્રહણને પ્રોત્સાહન આપે છે, જેના કારણે શરીરમાં ઉર્જા વધે છે.", "D) તે મગજના કોષોની વૃદ્ધિને પ્રેરે છે, જેના કારણે સ્મરણશક્તિ સુધરે છે."], "correct": 0, "explanation": "PVC ના લાંબા ગાળાના સંપર્કથી ફેફસાંના કોષોના DNAમાં પરિવર્તન થઈ શકે છે, જે કેંસરનો ખતરો વધારી શકે છે. હૃદય, યકૃત અથવા મગજની કામગીરીમાં સુધારો કરવાનો કોઈ પુરાવો નથી. બાકીના વિકલ્પો (B, C, D) પોલીવિનાઇલ ક્લોરાઇડની જાણીતી અસરો નથી.", "ncert_ref": "Class XII - Chapter 15: પોલિમર", "difficulty": "Hard", "num": 26}, {"question": "નીચેનામાંથી કયું પોલીહેલોજન સંયોજન તેની ઉચ્ચ વિદ્યુત અવાહકતા અને ઉચ્ચ તાપમાન સહનશીલતાને કારણે વિદ્યુત અને ઇલેક્ટ્રોનિક્સ ઉદ્યોગમાં વ્યાપકપણે વાપરવામાં આવે છે?", "options": ["A) પોલિઇથિલીન ટેરેફ્થેલેટ (PET)", "B) પોલિવિનાઇલીડીન ક્લોરાઇડ (PVDC)", "C) પોલિટેટ્રાફ્લોરોઇથિલીન (PTFE)", "D) પોલિએસ્ટર રેઝિન"], "correct": 2, "explanation": "પોલિટેટ્રાફ્લોરોઇથિલીન (PTFE) તેની ઉચ્ચ વિદ્યુત અવાહકતા અને ઉચ્ચ તાપમાન સહનશીલતાને કારણે વિદ્યુત અને ઇલેક્ટ્રોનિક્સ ઉદ્યોગમાં વ્યાપકપણે વાપરવામાં આવે છે. PET, PVDC, અને પોલિએસ્ટર રેઝિન આ ગુણધર્મો ધરાવતા નથી.", "ncert_ref": "Class XII - Chapter 15: પોલિમર", "difficulty": "Hard", "num": 27}, {"question": "પોલીવિનાઇલ ક્લોરાઇડ (PVC) ના દહનથી ઉત્પન્ન થતી ડાયોક્સિન અને ફ્યુરન જેવી સંયોજનોની લાંબા ગાળાની અસર વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) તે કોષકેન્દ્રમાં DNA ને નુકસાન પહોંચાડી ઉત્ક્રાંતિ તરફ દોરી શકે છે, પરંતુ પ્રજનન તંત્ર પર કોઈ અસર થતી નથી.", "B) તે હોર્મોનલ અસંતુલન ઉભું કરી શકે છે, ખાસ કરીને થાઇરોઇડ હોર્મોનના સ્રાવમાં ઘટાડો કરીને.", "C) તે પ્રતિરક્ષાતંત્રને મજબૂત બનાવે છે, જેથી શરીર રોગજીવાણુઓ સામે વધુ પ્રતિકાર કરી શકે.", "D) તે પેશીઓમાં કાર્બોદિતના સંશ્લેષણને વેગ આપે છે, જેથી શરીરને વધુ ઉર્જા મળે છે."], "correct": 1, "explanation": "ડાયોક્સિન અને ફ્યુરન જેવી સંયોજનો એન્ડોક્રાઇન ડિસરપ્ટર તરીકે કામ કરે છે, જે થાઇરોઇડ હોર્મોનના સ્રાવને અસર કરે છે, જેથી હોર્મોનલ અસંતુલન ઉભું થાય છે. વિકલ્પ A ખોટો છે કારણ કે ડાયોક્સિન DNA ને નુકસાન પહોંચાડી શકે છે, પરંતુ પ્રજનન તંત્ર પર પણ અસર કરે છે. વિકલ્પ C અને D ખોટા છે કારણ કે ડાયોક્સિન પ્રતિરક્ષાતંત્રને નબળું પાડે છે અને કાર્બોદિતના સંશ્લેષણ પર કોઈ સક્રિય અસર કરતું નથી.", "ncert_ref": "Class XII - Chapter 15: પોલિમર", "difficulty": "Hard", "num": 28}, {"question": "પોલીટેટ્રાફ્લોરોઇથિલીન (PTFE) નો ઉપયોગ ખોરાક પેકેજિંગમાં થતો નથી, પરંતુ તેનો ઉપયોગ નીચેનામાંથી ક્યાં થાય છે જ્યાં તેની રાસાયણિક જડતા અને ઉચ્ચ તાપમાન સહનશીલતા મહત્વની છે?", "options": ["A) ખોરાક સંગ્રહ માટેના પ્લાસ્ટિક કન્ટેનર", "B) વીજળીના તારોની ઇન્સ્યુલેશન માટે", "C) કૃત્રિમ અંગોના નિર્માણમાં, જેમ કે કૃત્રિમ હૃદય વાલ્વ", "D) પાણીની બોટલો બનાવવા માટે"], "correct": 2, "explanation": "PTFE તેની રાસાયણિક જડતા અને ઉચ્ચ તાપમાન સહનશીલતાને કારણે કૃત્રિમ અંગોના નિર્માણમાં, જેમ કે કૃત્રિમ હૃદય વાલ્વ, ઉપયોગમાં લેવાય છે. વિકલ્પ A અને D ખોટા છે કારણ કે PTFE ખોરાક પેકેજિંગમાં ઉપયોગમાં લેવાતું નથી. વિકલ્પ B ખોટો છે કારણ કે વીજળીના તારોની ઇન્સ્યુલેશન માટે સામાન્ય રીતે PVC અથવા અન્ય પોલિમરનો ઉપયોગ થાય છે.", "ncert_ref": "Class XII - Chapter 15: પોલિમર", "difficulty": "Hard", "num": 29}, {"question": "પોલિઇથિલીન ટેરેફ્થેલેટ (PET) ના લાંબા ગાળાના સંપર્કથી મનુષ્યમાં થતી અસર વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) તે કોષકેન્દ્રમાં DNA ને નુકસાન પહોંચાડી કૅન્સરનું જોખમ વધારી શકે છે.", "B) તે શ્વસન તંત્રને મજબૂત બનાવે છે, જેથી શરીર ઓક્સિજનનો વધુ સારી રીતે ઉપયોગ કરી શકે.", "C) તે ઉત્સેચકની ક્રિયાશીલતામાં વધારો કરે છે, જેથી પાચન ક્રિયા સુધરે છે.", "D) તે ચેતાતંત્રને સક્રિય કરે છે, જેથી સ્મરણશક્તિ વધે છે."], "correct": 0, "explanation": "PET ના લાંબા ગાળાના સંપર્કથી કોષકેન્દ્રમાં DNA ને નુકસાન થઈ શકે છે, જે કૅન્સરનું જોખમ વધારી શકે છે. વિકલ્પ B, C, અને D ખોટા છે કારણ કે PET શ્વસન તંત્ર, ઉત્સેચકની ક્રિયાશીલતા, અથવા ચેતાતંત્ર પર સક્રિય અસર કરતું નથી.", "ncert_ref": "Class XII - Chapter 15: પોલિમર", "difficulty": "Hard", "num": 30}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
