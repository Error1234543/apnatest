        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}

        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}

        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}

        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>

    <script>

xplanation": "દ્વિતીય એમાઇનમાં બે હાઇડ્રોજન પરમાણુઓ હાજર નથી, જેથી તે બેન્ઝોઇલ ક્લોરાઇડ સાથે પ્રક્રિયા કરી N-બેન્ઝોઇલ એમાઇન બનાવે છે. A (બેન્ઝોઇલ એમાઇડ) પ્રાથમિક એમાઇન માટે લાગુ પડે છે, C (બેન્ઝોઇક એસિડ) એસિડ હાઇડ્રોલિસિસનો પરિણામ છે, અને D (એમાઇન હાઇડ્રોક્લોરાઇડ) HCl સાથે પ્રક્રિયાનો પરિણામ છે.", "ncert_ref": "Class XII - Chapter 13: એમાઇનના રાસાયણિક ગુણધર્મો", "difficulty": "Hard", "num": 17}, {"question": "એક એમાઇન સંયોજન X ને નાઇટ્રસ એસિડ સાથે પ્રક્રિયા કરતાં નાઇટ્રોજન વાયુ મુક્ત થાય છે. આ સંયોજન X ની સાથે ક્લોરોફોર્મ અને આલ્કોહોલિક KOH ની પ્રક્રિયાથી કયો પરિણામ મળશે?", "options": ["A) કાર્બાઇલ એમાઇન પરીક્ષણ ધન આઉટ પડશે", "B) આઇસોનાઇટ્રાઇલની વાસ મળશે", "C) કોઈ પ્રક્રિયા થશે નહીં", "D) સફેદ અવક્ષેપ મળશે"], "correct": 2, "explanation": "નાઇટ્રસ એસિડ સાથે પ્રક્રિયા કરતાં નાઇટ્રોજન વાયુ મુક્ત થાય તે એલિફેટિક પ્રાથમિક એમાઇનની લાક્ષણિકતા છે. એલિફેટિક પ્રાથમિક એમાઇન ક્લોરોફોર્મ અને આલ્કોહોલિક KOH સાથે પ્રક્રિયા કરતું નથી, જેથી કોઈ પરિણામ મળતો નથી. A અને B એરોમેટિક પ્રાથમિક એમાઇન માટે લાગુ પડે છે, જ્યારે D એલિફેટિક એમાઇન માટે લાગુ પડતું નથી.", "ncert_ref": "Class XII - Chapter 13: એમાઇનના વર્ગીકરણ અને પ્રક્રિયાઓ", "difficulty": "Hard", "num": 18}, {"question": "એક એમાઇન સંયોજન Y ને હિન્સબર્ગ કસોટીમાં બેન્ઝિન સલ્ફોનાઇલ ક્લોરાઇડ સાથે પ્રક્રિયા કરતાં અદ્રાવ્ય ઉત્પાદ મળતું નથી. આ સંયોજન Y ની સાથે એસિટિક એનહાઇડ્રાઇડ સાથે પ્રક્રિયા કરતાં કયો ઉત્પાદ મળે છે?", "options": ["A) એસિટામાઇડ", "B) N-એસિટિલ એમાઇન", "C) એસિટિક એસિડ", "D) એમાઇન હાઇડ્રોક્લોરાઇડ"], "correct": 1, "explanation": "હિન્સબર્ગ કસોટીમાં અદ્રાવ્ય ઉત્પાદ ન મળવું એ દ્વિતીય એમાઇનની લાક્ષણિકતા છે. દ્વિતીય એમાઇન એસિટિક એનહાઇડ્રાઇડ સાથે પ્રક્રિયા કરી N-એસિટિલ એમાઇન બનાવે છે. A (એસિટામાઇડ) પ્રાથમિક એમાઇન માટે લાગુ પડે છે, C (એસિટિક એસિડ) એસિડ હાઇડ્રોલિસિસનો પરિણામ છે, અને D (એમાઇન હાઇડ્રોક્લોરાઇડ) HCl સાથે પ્રક્રિયાનો પરિણામ છે.", "ncert_ref": "Class XII - Chapter 13: એમાઇનના રાસાયણિક ગુણધર્મો અને પરીક્ષણો", "difficulty": "Hard", "num": 19}, {"question": "એક એરોમેટિક એમાઇન સંયોજન Z ને નાઇટ્રસ એસિડ સાથે 0-5°C તાપમાને પ્રક્રિયા કરતાં ડાયેઝોનિયમ લવણ બને છે. આ સંયોજન Z ની સાથે બ્રોમિન જળ સાથે પ્રક્રિયા કરતાં કયો ઉત્પાદ મળે છે?", "options": ["A) 2,4,6-ટ્રાઇબ્રોમોએનિલિન", "B) 3-બ્રોમોએનિલિન", "C) 4-બ્રોમોએનિલિન", "D) બેન્ઝિન"], "correct": 0, "explanation": "એરોમેટિક પ્રાથમિક એમાઇન (જેમકે એનિલિન) બ્રોમિન જળ સાથે પ્રક્રિયા કરી 2,4,6-ટ્રાઇબ્રોમોએનિલિન બનાવે છે, કારણ કે એમાઇન સમૂહ એલેક્ટ્રોન-દાતા છે અને બેન્ઝિન વલયને સક્રિય કરે છે. B અને C અંશતઃ બ્રોમીનેશનના પરિણામ છે, પરંતુ એનિલિનની લાક્ષણિક પ્રક્રિયા પૂર્ણ બ્રોમીનેશન છે. D (બેન્ઝિન) એ પ્રક્રિયાનો પરિણામ નથી.", "ncert_ref": "Class XII - Chapter 13: એરોમેટિક એમાઇનના રાસાયણિક ગુણધર્મો", "difficulty": "Hard", "num": 20}, {"question": "એક એમાઇન સંયોજનને નાઇટ્રસ એસિડ સાથે પ્રક્રિયા કરતાં નાઇટ્રોજન વાયુ મુક્ત થાય છે અને ફિનોલના દ્રાવણ સાથે રંગીન યોગિક બનાવે છે. આ એમાઇન કયા પ્રકારનું હશે?", "options": ["A) પ્રાથમિક એરોમેટિક એમાઇન", "B) દ્વિતીય એલિફેટિક એમાઇન", "C) તૃતીય એલિફેટિક એમાઇન", "D) પ્રાથમિક એલિફેટિક એમાઇન"], "correct": 3, "explanation": "પ્રાથમિક એલિફેટિક એમાઇન નાઇટ્રસ એસિડ સાથે પ્રક્રિયા કરતાં નાઇટ્રોજન વાયુ મુક્ત કરે છે અને ફિનોલ સાથે રંગીન યોગિક (લીબરમેન નાઇટ્રોસો કસોટી) બનાવે છે. પ્રાથમિક એરોમેટિક એમાઇન ડાયેઝોનિયમ લવણ બનાવે છે (A ખોટું). દ્વિતીય એમાઇન નાઇટ્રોસોએમાઇન બનાવે છે (B ખોટું). તૃતીય એમાઇન નાઇટ્રસ એસિડ સાથે પ્રક્રિયા કરતું નથી (C ખોટું).", "ncert_ref": "Class XII - Chapter 13: એમાઇન સંયોજનો", "difficulty": "Hard", "num": 21}, {"question": "એક એમાઇન સંયોજન X ને બેન્ઝોઇલ ક્લોરાઇડ સાથે પ્રક્રિયા કરતાં સફેદ અવક્ષેપ મળે છે, પરંતુ હિન્સબર્ગ કસોટીમાં અદ્રાવ્ય ઉત્પાદ મળતું નથી. X કયું હશે?", "options": ["A) એનિલિન", "B) ડાયમેથાઇલએમાઇન", "C) મેથાઇલએમાઇન", "D) ડાયએથાઇલએમાઇન"], "correct": 1, "explanation": "ડાયમેથાઇલએમાઇન (દ્વિતીય એમાઇન) બેન્ઝોઇલ ક્લોરાઇડ સાથે N,N-ડાયમેથાઇલબેન્ઝામાઇડ બનાવે છે (સફેદ અવક્ષેપ), પરંતુ હિન્સબર્ગ કસોટીમાં પ્રક્રિયા કરતું નથી (કેમ કે તે દ્વિતીય એમાઇન છે). એનિલિન (A) હિન્સબર્ગ કસોટીમાં અદ્રાવ્ય ઉત્પાદ આપે છે. મેથાઇલએમાઇન (C) અને ડાયએથાઇલએમાઇન (D) પણ હિન્સબર્ગ કસોટીમાં પ્રક્રિયા કરે છે (C પ્રાથમિક, D તૃતીય).", "ncert_ref": "Class XII - Chapter 13: એમાઇન સંયોજનો", "difficulty": "Hard", "num": 22}, {"question": "એક એમાઇન સંયોજન Y ને ક્લોરોફોર્મ અને આલ્કોહોલિક KOH સાથે ગરમ કરતાં અપ્રિય ગંધવાળું સંયોજન મળે છે. Y કયા પ્રકારનું એમાઇન હશે?", "options": ["A) પ્રાથમિક એમાઇન (એલિફેટિક અથવા એરોમેટિક)", "B) દ્વિતીય એમાઇન", "C) તૃતીય એમાઇન", "D) ક્વોટરનરી એમોનિયમ લવણ"], "correct": 0, "explanation": "કાર્બિલએમાઇન પ્રક્રિયા (ક્લોરોફોર્મ + આલ્કોહોલિક KOH) ફક્ત પ્રાથમિક એમાઇન (એલિફેટિક અથવા એરોમેટિક) સાથે થાય છે અને ઇસોસાયનાઇડ (અપ્રિય ગંધ) મુક્ત કરે છે. દ્વિતીય (B), તૃતીય (C), અને ક્વોટરનરી એમોનિયમ લવણ (D) આ પ્રક્રિયા આપતાં નથી.", "ncert_ref": "Class XII - Chapter 13: એમાઇન સંયોજનો", "difficulty": "Hard", "num": 23}, {"question": "એક એમાઇન સંયોજન Z નું આણ્વીય સૂત્ર C7H9N છે. તેને નાઇટ્રસ એસિડ સાથે 0-5°C તાપમાને પ્રક્રિયા કરતાં ડાયેઝોનિયમ લવણ બનાવે છે. Z નું સંરચનાત્મક સૂત્ર કયું હશે?", "options": ["A) CH3-CH2-C6H4-NH2", "B) C6H5-NH-CH3", "C) C6H5-NH2", "D) C6H5-N(CH3)2"], "correct": 2, "explanation": "C7H9N આણ્વીય સૂત્ર ધરાવતું એરોમેટિક પ્રાથમિક એમાઇન એનિલિન (C6H5-NH2) છે, જે નાઇટ્રસ એસિડ સાથે ડાયેઝોનિયમ લવણ બનાવે છે. CH3-CH2-C6H4-NH2 (A) નું સૂત્ર C8H11N છે (ખોટું). C6H5-NH-CH3 (B) દ્વિતીય એમાઇન છે અને ડાયેઝોનિયમ લવણ બનાવતું નથી (ખોટું). C6H5-N(CH3)2 (D) તૃતીય એમાઇન છે અને પ્રક્રિયા કરતું નથી (ખોટું).", "ncert_ref": "Class XII - Chapter 13: એમાઇન સંયોજનો", "difficulty": "Hard", "num": 24}, {"question": "એક એમાઇન સંયોજનને એસિટિક એનહાઇડ્રાઇડ સાથે પ્રક્રિયા કરતાં એસિટામાઇડ મળે છે. આ એમાઇન કયા પ્રકારનું હશે અને કયા ઉત્પાદન સાથે પ્રક્રિયા થશે?", "options": ["A) પ્રાથમિક એમાઇન, એસિટામાઇડ અને એસિટિક એસિડ", "B) દ્વિતીય એમાઇન, N-એસિટાઇલ ડેરિવેટિવ", "C) તૃતીય એમાઇન, કોઈ પ્રક્રિયા થતી નથી", "D) પ્રાથમિક એમાઇન, N-એસિટાઇલ ડેરિવેટિવ અને એસિટિક એસિડ"], "correct": 3, "explanation": "પ્રાથમિક એમાઇન એસિટિક એનહાઇડ્રાઇડ સાથે પ્રક્રિયા કરતાં N-એસિટાઇલ ડેરિવેટિવ (એસિટામાઇડ) અને એસિટિક એસિડ મુક્ત કરે છે. દ્વિતીય એમાઇન (B) પણ N-એસિટાઇલ ડેરિવેટિવ બનાવે છે, પરંતુ એસિટિક એસિડ મુક્ત થતું નથી. તૃતીય એમાઇન (C) પ્રક્રિ         }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
