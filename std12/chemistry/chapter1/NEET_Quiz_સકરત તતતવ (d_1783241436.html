<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - સંક્રાંતિ તત્ત્વો (d-વિભાગ) ના સામાન્ય ગુણધર્મો</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 સંક્રાંતિ તત્ત્વો (d-વિભાગ) ના સામાન્ય ગુણધર્મો</span>
                <span>🎯 Hard</span>
                <span>📝 30 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "d-વિભાગના સંક્રાંતિ તત્ત્વો માટે નીચેના પૈકી કયું વિધાન સત્ય નથી?", "options": ["A) તેઓ અપૂર્ણ ભરાયેલ d-કક્ષક ધરાવે છે.", "B) તેઓ સંક્રાંતિ ધાતુઓ તરીકે ઓળખાય છે કારણ કે તેઓ એકથી વધુ ઓક્સીડેશન અવસ્થા ધરાવે છે.", "C) તેઓ સંપૂર્ણપણે રંગહીન અને ચુંબકીય ગુણધર્મ વગરના હોય છે.", "D) તેઓ જટિલ આયનો બનાવવા માટે પ્રવૃત્ત હોય છે."], "correct": 2, "explanation": "d-વિભાગના સંક્રાંતિ તત્ત્વો અપૂર્ણ ભરાયેલ d-કક્ષક ધરાવે છે (A સત્ય), એકથી વધુ ઓક્સીડેશન અવસ્થા ધરાવે છે (B સત્ય), જટિલ આયનો બનાવવા માટે પ્રવૃત્ત હોય છે (D સત્ય). પરંતુ તેઓ રંગીન હોય છે અને ચુંબકીય ગુણધર્મ ધરાવે છે, તેથી C વિધાન ખોટું છે.", "ncert_ref": "Class XII - Chapter 7: d- અને f-વિભાગના તત્ત્વો", "difficulty": "Hard", "num": 1}, {"question": "નીચેના પૈકી કયું સંક્રાંતિ તત્ત્વ તેની સૌથી સ્થિર ઓક્સીડેશન અવસ્થામાં +1 ધરાવે છે?", "options": ["A) કોપર (Cu)", "B) આયર્ન (Fe)", "C) મેંગેનીઝ (Mn)", "D) જિંક (Zn)"], "correct": 0, "explanation": "કોપર (Cu) તેની સૌથી સ્થિર ઓક્સીડેશન અવસ્થા +1 ધરાવે છે (Cu⁺). આયર્ન (Fe)ની સ્થિર અવસ્થા +2 અથવા +3 છે, મેંગેનીઝ (Mn)ની +2, +4, +7 છે, અને જિંક (Zn)ની ફક્ત +2 છે. તેથી, Cu જ સૌથી સ્થિર +1 અવસ્થા ધરાવે છે.", "ncert_ref": "Class XII - Chapter 7: d- અને f-વિભાગના તત્ત્વો", "difficulty": "Hard", "num": 2}, {"question": "સંક્રાંતિ તત્ત્વો માટે નીચેના પૈકી કયું યુગ્મ સાચું નથી?", "options": ["A) Cr²⁺ - 3d⁴ (અસ્થિર)", "B) Mn³⁺ - 3d⁴ (સ્થિર)", "C) Fe³⁺ - 3d⁵ (સ્થિર)", "D) Cu⁺ - 3d¹⁰ (સ્થિર)"], "correct": 1, "explanation": "Mn³⁺ની ઇલેક્ટ્રોનિક રચના 3d⁴ છે, પરંતુ તે અસ્થિર છે કારણ કે તે અર્ધ-ભરાયેલ d-કક્ષક (d⁵) તરફ પ્રવૃત્તિ ધરાવે છે. Cr²⁺ (3d⁴) અસ્થિર છે (A સાચું), Fe³⁺ (3d⁵) સ્થિર છે (C સાચું), અને Cu⁺ (3d¹⁰) સ્થિર છે (D સાચું). તેથી, B ખોટું છે.", "ncert_ref": "Class XII - Chapter 7: d- અને f-વિભાગના તત્ત્વો", "difficulty": "Hard", "num": 3}, {"question": "નીચેના પૈકી કયું સંક્રાંતિ તત્ત્વ તેની સૌથી ઉચ્ચ ઓક્સીડેશન અવસ્થામાં Mnની જેમ જ ઓક્સીજન સાથે સંયોજન બનાવે છે?", "options": ["A) ટેક્નિશિયમ (Tc)", "B) રેનિયમ (Re)", "C) રુથેનિયમ (Ru)", "D) ઓસ્મિયમ (Os)"], "correct": 1, "explanation": "મેંગેનીઝ (Mn) તેની સૌથી ઉચ્ચ ઓક્સીડેશન અવસ્થા +7માં Mn₂O₇ બનાવે છે. રેનિયમ (Re) પણ +7 ઓક્સીડેશન અવસ્થામાં Re₂O₇ બનાવે છે. ટેક્નિશિયમ (Tc) +7માં Tc₂O₇ બનાવે છે, પરંતુ તે Mn જેવું સંપૂર્ણ રીતે સમાન નથી. રુથેનિયમ (Ru) અને ઓસ્મિયમ (Os)ની ઉચ્ચ ઓક્સીડેશન અવસ્થા +8 છે (RuO₄, OsO₄). તેથી, Re સૌથી યોગ્ય જવાબ છે.", "ncert_ref": "Class XII - Chapter 7: d- અને f-વિભાગના તત્ત્વો", "difficulty": "Hard", "num": 4}, {"question": "સંક્રાંતિ તત્ત્વોના જલીય દ્રાવણમાં રંગ માટે નીચેના પૈકી કયું કારણ નથી?", "options": ["A) d-d સંક્રાંતિ", "B) ચાર્જ ટ્રાન્સફર સંક્રાંતિ", "C) s-p સંક્રાંતિ", "D) જટિલ આયનની રચના"], "correct": 2, "explanation": "સંક્રાંતિ તત્ત્વોના જલીય દ્રાવણમાં રંગ d-d સંક્રાંતિ (A), ચાર્જ ટ્રાન્સફર સંક્રાંતિ (B), અને જટિલ આયનની રચના (D)ને કારણે થાય છે. s-p સંક્રાંતિ સંક્રાંતિ તત્ત્વોના રંગ માટે જવાબદાર નથી, કારણ કે s અને p કક્ષકો વચ્ચેની ઉર્જા તફાવત ખૂબ જ મોટી હોય છે.", "ncert_ref": "Class XII - Chapter 7: d- અને f-વિભાગના તત્ત્વો", "difficulty": "Hard", "num": 5}, {"question": "સંક્રાંતિ તત્ત્વોના જટિલ યોગિકોમાં, નીચેના પૈકી કયું યુગ્મ સંકીર્ણના કેંદ્રીય ધાતુ અને તેની ઓક્સીડેશન અવસ્થાની યોગ્ય જોડી દર્શાવે છે?", "options": ["A) [Fe(CN)₆]⁴⁻માં Fe, +2", "B) [Co(NH₃)₆]³⁺માં Co, +3", "C) [Cr(H₂O)₆]²⁺માં Cr, +6", "D) [MnO₄]⁻માં Mn, +7"], "correct": 1, "explanation": "યોગ્ય જોડી [Co(NH₃)₆]³⁺માં Coની ઓક્સીડેશન અવસ્થા +3 છે, કારણ કે NH₃ ન્યૂટ્રલ લિગેન્ડ છે અને સંકીર્ણનો ચાર્જ +3 છે. Aમાં Feની ઓક્સીડેશન અવસ્થા +2 સાચી છે, પરંતુ પ્રશ્નમાં યોગ્ય જોડી શોધવાની છે અને B સિવાયના વિકલ્પો અયોગ્ય છે. Cમાં Crની ઓક્સીડેશન અવસ્થા +2 હોવી જોઈએ, નહીં કે +6. Dમાં Mnની ઓક્સીડેશન અવસ્થા +7 સાચી છે, પરંતુ પ્રશ્નમાં સંકીર્ણના કેંદ્રીય ધાતુ અને ઓક્સીડેશન અવસ્થાની યોગ્ય જોડી શોધવાની છે, અને B સિવાયના વિકલ્પો અયોગ્ય છે.", "ncert_ref": "Class XII - Chapter 9: d- અને f-વિભાગના તત્ત્વો", "difficulty": "Hard", "num": 6}, {"question": "સંક્રાંતિ તત્ત્વોના લિગેન્ડ ફિલ્ડ સિદ્ધાંત અનુસાર, નીચેના પૈકી કયું વિધાન ખોટું છે?", "options": ["A) મજબૂત ક્ષેત્ર લિગેન્ડો Δ₀નું મૂ  Niમાં સંપૂર્ણ જોડી ઇલેક્ટ્રોન હોય છે.", "ncert_ref": "Class XII - Chapter 9: d- અને f-વિભાગના તત્ત્વો", "difficulty": "Hard", "num": 10}, {"question": "સંક્રાંતિ તત્ત્વો (d-વિભાગ) ની ઓક્સીડેશન અવસ્થાઓ વિશે નીચેના પૈકી કયું વિધાન ખોટું છે?", "options": ["A) Fe ની સૌથી ઉચ્ચ ઓક્સીડેશન અવસ્થા +6 છે, જે FeO4^2- આયનમાં જોવા મળે છે.", "B) Cr ની સૌથી ઉચ્ચ ઓક્સીડેશન અવસ્થા +6 છે, જે CrO4^2- અને Cr2O7^2-માં જોવા મળે છે.", "C) Mn ની સૌથી ઉચ્ચ ઓક્સીડેશન અવસ્થા +7 છે, જે MnO4^-માં જોવા મળે છે.", "D) Cu ની સૌથી ઉચ્ચ ઓક્સીડેશન અવસ્થા +3 છે, જે CuOમાં જોવા મળે છે."], "correct": 3, "explanation": "વિકલ્પ D ખોટો છે કારણ કે Cu ની સૌથી ઉચ્ચ ઓક્સીડેશન અવસ્થા +2 છે, નહીં કે +3. CuOમાં Cuની ઓક્સીડેશન અવસ્થા +2 હોય છે. વિકલ્પ A, B, અને C સાચા છે કારણ કે Fe, Cr, અને Mn ની ઉચ્ચતમ ઓક્સીડેશન અવસ્થાઓ અનુક્રમે +6, +6, અને +7 હોય છે, જે નિર્ધારિત યોગિકોમાં જોવા મળે છે.", "ncert_ref": "Class XII - Chapter 7: d- અને f-વિભાગના તત્ત્વો", "difficulty": "Hard", "num": 11}, {"question": "નીચેના પૈકી કયું તત્ત્વ d-વિભાગનું સંક્રાંતિ તત્ત્વ ન હોવા છતાં તેના ગુણધર્મો સંક્રાંતિ તત્ત્વોને મળતા આવે છે?", "options": ["A) ઝિંક (Zn)", "B) સ્કેન્ડિયમ (Sc)", "C) કોપર (Cu)", "D) ક્રોમિયમ (Cr)"], "correct": 0, "explanation": "ઝિંક (Zn) d-વિભાગનું તત્ત્વ છે પરંતુ તે સંક્રાંતિ તત્ત્વ નથી કારણ કે તેની d-કક્ષક સંપૂર્ણ ભરાયેલી હોય છે (3d¹⁰4s²). તેમ છતાં, તેના કેટલાક ગુણધર્મો જેમ કે સંકીર્ણ બનાવવાની ક્ષમતા અને રંગીન સંયોજનો બનાવવાની વૃત્તિ સંક્રાંતિ તત્ત્વોને મળતા આવે છે. સ્કેન્ડિયમ, કોપર અને ક્રોમિયમ સંક્રાંતિ તત્ત્વો છે કારણ કે તેમની d-કક્ષક અપૂર્ણ હોય છે.", "ncert_ref": "Class XII - પ્રકરણ 8: d- અને f-વિભાગના તત્ત્વો", "difficulty": "Hard", "num": 12}, {"question": "સંક્રાંતિ તત્ત્વોના સંદર્ભમાં નીચેના વિધાનો ધ્યાનમાં લો:\n1. તેઓ સારી વિદ્યુતવાહકતા ધરાવે છે.\n2. તેઓ ઉચ્ચ ગલનબિંદુ અને ઉત્કલનબિંદુ ધરાવે છે.\n3. તેઓ સામાન્ય રીતે રંગીન સંયોજનો બનાવે છે.\n4. તેઓ માત્ર એક જ ઓક્સીડેશન અવસ્થા દર્શાવે છે.\nઉપરોક્ત વિધાનોમાંથી કયું/કયા ખોટું/ખોટાં છે?", "options": ["A) માત્ર 1 અને 2", "B) માત્ર 4", "C) માત્ર 2 અને 3", "D) માત્ર 1, 3 અને 4"], "correct": 1, "explanation": "સંક્રાંતિ તત્ત્વો વિવિધ ઓક્સીડેશન અવસ્થાઓ દર્શાવે છે, માત્ર એક જ નહીં. તેઓ સારી વિદ્યુતવાહકતા ધરાવે છે, ઉચ્ચ ગલનબિંદુ અને ઉત્કલનબિંદુ ધરાવે છે, તેમજ રંગીન સંયોજનો બનાવે છે. આથી વિધાન 4 ખોટું છે, જ્યારે બાકીનાં વિધાનો સાચાં છે.", "ncert_ref": "Class XII - પ્રકરણ 8: d- અને f-વિભાગના તત્ત્વો", "difficulty": "Hard", "num": 13}, {"question": "એક વિદ્યાર્થીએ સંક્રાંતિ તત્ત્વોના ચુંબકીય ગુણધર્મોનો અભ્યાસ કરતાં નોંધ્યું કે:\n1. Mn²⁺ અનુચુંબકીય છે.\n2. Sc³⁺ પ્રતિચુંબકીય છે.\n3. Zn²⁺ અનુચુંબકીય છે.\n4. Cu⁺ પ્રતિચુંબકીય છે.\nઉપરોક્ત નિરીક્ષણોમાંથી કયું/કયાં ખોટું/ખોટાં છે?", "options": ["A) માત્ર 1 અને 2", "B) માત્ર 3", "C) માત્ર 2 અને 4", "D) માત્ર 1, 3 અને 4"], "correct": 1, "explanation": "Mn²⁺ (3d⁵) અયુગ્મિત ઇલેક્ટ્રોન ધરાવે છે તેથી તે અનુચુંબકીય છે. Sc³⁺ (3d⁰) અને Cu⁺ (3d¹⁰) યુગ્મિત ઇલેક્ટ્રોન ધરાવે છે તેથી પ્રતિચુંબકીય છે. Zn²⁺ (3d¹⁰) પણ યુગ્મિત ઇલેક્ટ્રોન ધરાવે છે તેથી પ્રતિચુંબકીય હોવું જોઈએ, અનુચુંબકીય નહીં. આથી વિધાન 3 ખોટું છે.", "ncert_ref": "Class XII - પ્રકરણ 8: d- અને f-વિભાગના તત્ત્વો", "difficulty": "Hard", "num": 14}, {"question": "નીચેના પૈકી કયું તત્ત્વ d-વિભાગનું સંક્રાંતિ તત્ત્વ છે પરંતુ તેની સૌથી સ્થિર ઓક્સીડેશન અવસ્થામાં અયુગ્મ સંખ્યામાં ઇલેક્ટ્રોન ધરાવતું નથી?", "options": ["A) ક્રોમિયમ (Cr)", "B) મેંગેનીઝ (Mn)", "C) લોખંડ (Fe)", "D) કોબાલ્ટ (Co)"], "correct": 2, "explanation": "સાચો જવાબ વિકલ્પ C) લોખંડ (Fe) છે. લોખંડની સૌથી સ્થિર ઓક્સીડેશન અવસ્થા +3 છે, જેમાં Fe³⁺ આયનની ઇલેક્ટ્રોન રચના [Ar]3d⁵ છે, જે અયુગ્મ સંખ્યામાં ઇલેક્ટ્રોન ધરાવે છે. પરંતુ પ્રશ્નમાં 'અયુગ્મ સંખ્યામાં ઇલેક્ટ્રોન ધરાવતું નથી' એવું પૂછવામાં આવ્યું છે. Fe³⁺માં 5 અયુગ્મ ઇલેક્ટ્રોન હોવાથી તે અયુગ્મ છે, પરંતુ Feની સૌથી સ્થિર ઓક્સીડેશન અવસ્થા +2 પણ છે, જેમાં Fe²⁺ની ઇલેક્ટ્રોન રચના [Ar]3d⁶ છે, જેમાં 4 અયુગ્મ ઇલેક્ટ્રોન હોય છે (યુગ્મ). આમ, Feની સૌથી સ્થિર ઓક્સીડેશન અવસ્થાઓમાંથી એક (+2) યુગ્મ સંખ્યામાં ઇલેક્ટ્રોન ધરાવે છે. બાકીના વિકલ્પોની વાત કરીએ તો: A) Crની સૌથી સ્થિર ઓક્સીડેશન અવસ્થા +3 છે, જેમાં Cr³⁺ની ઇલેક્ટ્રોન રચના [Ar]3d³ છે (3 અયુગ્મ ઇલ             document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
