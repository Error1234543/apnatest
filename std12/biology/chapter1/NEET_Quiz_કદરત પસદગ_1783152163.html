<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - કુદરતી પસંદગી</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 કુદરતી પસંદગી</span>
                <span>🎯 Hard</span>
                <span>📝 81 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "ડાર્વિનના કુદરતી પસંદગીના સિદ્ધાંત અનુસાર, જો એક જાતિમાં લાંબા ગરદનવાળા જીરાફની સંખ્યા વધુ હોય, તો તેનું મુખ્ય કારણ કયું હશે?", "options": ["A) લાંબા ગરદનવાળા જીરાફને ખોરાક મેળવવામાં સરળતા રહે છે, જેથી તેઓ વધુ જીવિત રહે છે અને પ્રજનન કરે છે.", "B) જીરાફની ગરદન લાંબી થવાનું કારણ એ છે કે તેઓ પાન ખાવા માટે ઝાડ પર ચડતા રહે છે.", "B) લાંબા ગરદનવાળા જીરાફને શિકારીઓથી બચવા સરળ પડે છે.", "D) લાંબા ગરદનવાળા જીરાફની જન્યુક્રમમાં થયેલી પરિવર્તનશીલતા (mutation) એ કુદરતી પસંદગીનો ભાગ નથી."], "correct": 0, "explanation": "કુદરતી પસંદગી અનુસાર, લાંબા ગરદનવાળા જીરાફને ખોરાક મેળવવામાં ફાયદો થાય છે, જેથી તેઓ વધુ જીવિત રહે છે અને પ્રજનન કરે છે, જ્યારે ટૂંકી ગરદનવાળા જીરાફને ખોરાક મેળવવામાં મુશ્કેલી પડે છે. લેમાર્કના સિદ્ધાંત અનુસાર જીરાફની ગરદન લાંબી થાય છે (B), પરંતુ ડાર્વિનના સિદ્ધાંતમાં આ વાત સ્વીકાર્ય નથી. શિકારીઓથી બચવા (C) એ ગરદનની લંબાઈ સાથે સીધો સંબંધ ધરાવતું નથી. પરિવર્તનશીલતા (D) કુદરતી પસંદગીનો આધાર છે, પરંતુ તે સીધું કારણ નથી.", "ncert_ref": "Class XII - પ્રકરણ 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 1}, {"question": "કુદરતી પસંદગી દરમિયાન, જો એક જાતિમાં ચોક્કસ લક્ષણ ધરાવતા જીવોની સંખ્યા ઘટી રહી હોય, તો તે લક્ષણ વિશે કયું વિધાન સાચું છે?", "options": ["A) તે લક્ષણ જાતિ માટે ફાયદાકારક છે.", "B) તે લક્ષણ જાતિ માટે હાનિકારક છે.", "C) તે લક્ષણ જાતિ માટે તટસ્થ છે.", "D) તે લક્ષણ જાતિની ઉત્ક્રાંતિમાં કોઈ ભૂમિકા ભજવતું નથી."], "correct": 1, "explanation": "કુદરતી પસંદગી અનુસાર, જો કોઈ લક્ષણ ધરાવતા જીવોની સંખ્યા ઘટી રહી હોય, તો તે લક્ષણ જાતિ માટે હાનિકારક હોવાનું સૂચવે છે, કારણ કે એવા જીવો જીવિત રહેવા અને પ્રજનન કરવામાં અસમર્થ હોવાનું દર્શાવે છે. ફાયદાકારક લક્ષણ (A) ધરાવતા જીવોની સંખ્યા વધતી જાય છે. તટસ્થ લક્ષણ (C) પર કુદરતી પસંદગીનો કોઈ પ્રભાવ પડતો નથી. ઉત્ક્રાંતિમાં લક્ષણની ભૂમિકા (D) હંમેશા રહે છે, પરંતુ તે હાનિકારક હોવાનું સૂચવે છે.", "ncert_ref": "Class XII - પ્રકરણ 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 2}, {"question": "ડાર્વિનના કુદરતી પસંદગીના સિદ્ધાંતમાં 'સર્વાઈવલ ઓફ ધ ફિટેસ્ટ'નો અર્થ શું છે?", "options": ["A) શારીરિક રીતે મજબૂત જીવો જ જીવિત રહે છે.", "B) પર્યાવરણ સાથે સૌથી વધુ અનુકૂળન કરવા સક્ષમ જીવો જીવિત રહે છે.", "C) સૌથી ચતુર જીવો જીવિત રહે છે.", "D) સૌથી વધુ પ્રજનન કરવા સક્ષમ જીવો જીવિત રહે છે."], "correct": 1, "explanation": "'સર્વાઈવલ ઓફ ધ ફિટેસ્ટ'નો અર્થ એ છે કે પર્યાવરણ સાથે સૌથી વધુ અનુકૂળન કરવા સક્ષમ જીવો જીવિત રહે છે અને પ્રજનન કરે છે. શારીરિક મજબૂતાઈ (A) અથવા ચતુરાઈ (C) એ અનુકૂળનનો એક ભાગ હોવા છતાં, તે સંપૂર્ણ અર્થ નથી. પ્રજનન (D) એ પરિણામ છે, પરંતુ મુખ્ય મુદ્દો અનુકૂળન છે.", "ncert_ref": "Class XII - પ્રકરણ 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 3}, {"question": "કુદરતી પસંદગી દરમિયાન, જો એક જાતિમાં વંશાણુગત વિવિધતા (genetic variation) ન હોય, તો શું થશે?", "options": ["A) જાતિ ઝડપથી ઉત્ક્રાંતિ પામશે.", "B) જાતિ પર્યાવરણીય બદલાવ સાથે અનુકૂળન કરવામાં અસમર્થ હશે.", "C) જાતિની સંખ્યા ઝડપથી વધશે.", "D) જાતિમાં નવા લક્ષણો ઉદ્ભવશે."], "correct": 1, "explanation": "વંશાણુગત વિવિધતા કુદરતી પસંદગીનો આધાર છે. જો વિવિધતા ન હોય, તો જાતિ પર્યાવરણીય બદલાવ સાથે અનુકૂળન કરવામાં અસમર્થ હશે, કારણ કે કુદરતી પસંદગી માટે કોઈ વિકલ્પો ઉપલબ્ધ નહીં હોય. ઉત્ક્રાંતિ (A) અને નવા લક્ષણો (D) વિવિધતાથી જ શક્ય બને છે. સંખ્યા વધવી (C) એ વિવિધતાથી સીધો સંબંધ ધરાવતું નથી.", "ncert_ref": "Class XII - પ્રકરણ 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 4}, {"question": "ડાર્વિનના કુદરતી પસંદગીના સિદ્ધાંત અનુસાર, નીચેના પૈકી કયું વિધાન સૌથી યોગ્ય રીતે 'પસંદગી દબાણ' (selective pressure) ની વ્યાખ્યા આપે છે?", "options": ["A) જીવો પર લાગુ પડતી શારીરિક તાકાત.", "B) પર્યાવરણીય પરિબળો જે જીવોની જીવિત રહેવાની અને પ્રજનન કરવાની ક્ષમતા પર પ્રભાવ પાડે છે.", "C) જીવો વચ્ચે થતી સ્પર્ધા.", "D) જીવોની સંખ્યા નિયંત્રણ માટેના પગલાં."], "correct": 1, "explanation": "પસંદગી દબાણ એ પર્યાવરણીય પરિબળો છે જે જીવોની જીવિત રહેવાની અને પ્રજનન કરવાની ક્ષમતા પર પ્રભાવ પાડે છે, જેથી કુદરતી પસંદગી દ્વારા ચોક્કસ લક્ષણોનો વિકાસ થાય. શારીરિક તાકાત (A) એ પસંદગી દબાણનો એક ભાગ હોવા છતાં, તે સંપૂર્ણ વ્યાખ્યા નથી. સ્પર્ધા (C) એ પસંદગી દબાણનો એક ઉદાહરણ છે, પરંતુ તે સંપૂર્ણ વ્યાખ્યા નથી. સંખ્યા નિયંત્રણ (D) એ પસંદગી દબાણ સાથે સીધો સંબંધ ધરાવતું નથી.", "ncert_ref": "Class XII - પ્રકરણ 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 5}, {"question": "ડાર્વિનના કુદરતી પસંદગીના સિદ્ધાંત અનુસાર, નીચેના પૈકી કયા પરિબળ દ્વારા જાતિઓમાં વંશાણુગત વિવિધતા ઉત્પન્ન થાય છે?", "options": ["A) પ્રજનન દરમિયાન થતી મ્યુટેશન અને જનીનના નવા સંયોજનો", "B) એક જ જાતિમાં થતી આંતરપ્રજનન (inbreeding)", "C) પર્યાવરણીય પરિવર્તનો દ્વારા પ્રાણીઓમાં થતી શારીરિક ફેરફારો", "D) એક જ જાતિમાં થતી કૃત્રિમ પસંદગી"], "correct": 0, "explanation": "કુદરતી પસંદગી માટે વંશાણુગત વિવિધતા આધારભૂત છે, જે મુખ્યત્વે મ્યુટેશન અને જનીનના નવા સંયોજનો (recombination) દ્વારા ઉત્પન્ન થાય છે. આમ, વિકલ્પ A સાચો છે. વિકલ્પ B (આંતરપ્રજનન) વિવિધતા ઘટાડે છે, વિકલ્પ C પર્યાવરણીય ફેરફારો શારીરિક હોઈ શકે પરંતુ વંશાણુગત નહીં, અને વિકલ્પ D કૃત્રિમ પસંદગી માનવી દ્વારા કરવામાં આવે છે, કુદરતી નહીં.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 6}, {"question": "કુદરતી પસંદગી દરમિયાન, જો એક જાતિમાં લિંગી પસંદગી (Sexual Selection) દ્વારા ચોક્કસ લક્ષણો પ્રબળ બને છે, તો નીચેના પૈકી કયું વિધાન સાચું છે?", "options": ["A) આ લક્ષણો માદા દ્વારા પુરુષની પસંદગી માટે ઉપયોગી હોય છે", "B) આ લક્ષણો પુરુષ દ્વારા માદાની પસંદગી માટે ઉપયોગી હોય છે", "C) આ લક્ષણો જાતિમાં પ્રજનન દર ઘટાડે છે", "D) આ લક્ષણો પર્યાવરણીય અનુકૂળતામાં કોઈ ભૂમિકા ભજવતી નથી"], "correct": 0, "explanation": "લિંગી પસંદગીમાં, ચોક્કસ લક્ષણો (જેમ કે રંગીન પીછા અથવા જટિલ પ્રદર્શનો) માદા દ્વારા પુરુષની પસંદગી માટે ઉપયોગી હોય છે, જેથી પ્રજનનની સફળતા વધે. આમ, વિકલ્પ A સાચો છે. વિકલ્પ B અંશતઃ સાચો હોઈ શકે પરંતુ માદા પસંદગી વધુ સામાન્ય છે. વિકલ્પ C અને D લિંગી પસંદગીના મૂળ ઉદ્દેશ્યને સમજાવી શકતા નથી.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 7}, {"question": "ડાર્વિનના કુદરતી પસંદગીના સિદ્ધાંત અનુસાર, એક જાતિમાં જો બે વસતિઓ (populations) ભૌગોલિક રીતે અલગ પડે અને વિવિધ પર્યાવરણીય પરિસ્થિતિઓમાં રહે, તો લાંબા ગાળે શું થવાની શક્યતા રહે છે?", "options": ["A) બંને વસતિઓમાં એકસરખા જનીનોનો વિતરણ થશે અને તેઓ એકબીજા સાથે સરળતાથી પ્રજનન કરશે.", "B) બંને વસતિઓ કલીની જાતિમાં, લાંબા ચોચલાવાળા પક્ષીઓ વધુ પડતી ઉંચાઈએ બનેલા ઘાસના બીયાં ખાઈ શકે છે, જ્યારે ટૂંકા ચોચલાવાળા પક્ષીઓ નીચે રહેલા બીયાં પર નિર્ભર રહે છે. એક દુષ્કાળના સમયગાળા દરમિયાન, નીચે રહેલા બીયાંનો પુરવઠો ખૂબ જ ઓછો થઈ જાય છે, પરંતુ ઉંચાઈએ રહેલા બીયાંનો પુરવઠો સારો રહે છે. આ પરિસ્થિતિમાં, લાંબા ચોચલાવાળા પક્ષીઓની સંખ્યામાં કેવી અસર થશે અને કુદરતી પસંદગી કઈ દિશામાં કામ કરશે?", "options": ["A) લાંબા ચોચલાવાળા પક્ષીઓની સંખ્યા ઘટશે, કુદરતી પસંદગી ટૂંકા ચોચલાવાળા પક્ષીઓ તરફ કામ કરશે", "B) લાંબા ચોચલાવાળા પક્ષીઓની સંખ્યા વધશે, કુદરતી પસંદગી લાંબા ચોચલાવાળા પક્ષીઓ તરફ કામ કરશે", "C) લાંબા અને ટૂંકા ચોચલાવાળા પક્ષીઓની સંખ્યામાં કોઈ ફેરફાર થશે નહીં, કુદરતી પસંદગી સંતુલિત રહેશે", "D) ટૂંકા ચોચલાવાળા પક્ષીઓની સંખ્યા વધશે, કુદરતી પસંદગી ટૂંકા ચોચલાવાળા પક્ષીઓ તરફ કામ કરશે"], "correct": 1, "explanation": "કુદરતી પસંદગી એટલે પર્યાવરણીય દબાણ હેઠળ, જ્યાં સંસાધનો મર્યાદિત હોય છે, ત્યાં જીવોના જીવન માટે અનુકૂળ લક્ષણો ધરાવતા જીવો ટકી રહે છે અને પ્રજનન કરે છે. આ કિસ્સામાં, દુષ્કાળ દરમિયાન નીચે રહેલા બીયાંનો પુરવઠો ઓછો થવાથી ટૂંકા ચોચલાવાળા પક્ષીઓ માટે ખોરાક મેળવવો મુશ્કેલ બને છે, જ્યારે લાંબા ચોચલાવાળા પક્ષીઓ ઉંચાઈએ રહેલા બીયાં ખાઈ શકે છે. આથી, લાંબા ચોચલાવાળા પક્ષીઓ વધુ ટકી રહેશે અને પ્રજનન કરશે, જેથી તેમની સંખ્યા વધશે. કુદરતી પસંદગી લાંબા ચોચલાવાળા પક્ષીઓ તરફ કામ કરશે. વિકલ્પ A, C, અને D ખોટા છે કારણ કે તેઓ કુદરતી પસંદગીની દિશા અથવા તેના પરિણામને યોગ્ય રીતે દર્શાવતા નથી.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 10}, {"question": "કુદરતી પસંદગી દરમિયાન, જો એક જાતિમાં અલ્પસંખ્યાક લક્ષણ ધરાવતા જીવોની સંખ્યા વસતિમાં અચાનક વધી જાય, તો નીચેના પૈકી કયું કારણ સૌથી યોગ્ય રીતે સમજાવી શકે છે?", "options": ["A) આ લક્ષણ ધરાવતા જીવોને પર્યાવરણીય લાભ મળ્યો હોવો જોઈએ, જેથી તેમની જીવન ક્ષમતા વધી ગઈ", "B) આ લક્ષણ વંશાણુગત ન હોવાને કારણે તે જાતિમાં ફેલાયું છે", "C) આ લક્ષણ ધરાવતા જીવોએ અન્ય જીવો સાથે સંકરણ કર્યું હોવું જોઈએ, જેથી તેમની સંખ્યા વધી", "D) આ લક્ષણ ધરાવતા જીવોને કોઈ રોગનો પ્રતિકાર મળ્યો હોવો જોઈએ, જેથી તેમની સંખ્યા વધી"], "correct": 0, "explanation": " ન્ન પર્યાવરણમાં સમાન લક્ષણો વિકસિત થવાની શક્યતા ઓછી છે. વિકલ્પ C અને D ખોટા છે કારણ કે કુદરતી પસંદગી હેઠળ વસતિઓ લુપ્ત થતી નથી અથવા લક્ષણો વિકસિત થતાં નથી.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 13}, {"question": "કુદરતી પસંદગીના સંદર્ભમાં, જો એક જાતિમાં 'હેટરોઝાઇગસ એડવાન્ટેજ' (હેટરોઝાઇગસ લાભ) જોવા મળે, તો નીચેના પૈકી કયું વિધાન સૌથી યોગ્ય રીતે લાગુ પડે છે?", "options": ["A) હોમોઝાઇગસ જીવો કરતાં હેટરોઝાઇગસ જીવોની ફિટનેસ વધુ હોય છે, પરંતુ આ લાભ ફક્ત સ્થિર પર્યાવરણમાં જ જોવા મળે છે.", "B) હેટરોઝાઇગસ જીવોની ફિટનેસ હોમોઝાઇગસ જીવો કરતાં ઓછી હોય છે, પરંતુ તેઓ વંશાણુગત વિવિધતાને જાળવી રાખવામાં મદદ કરે છે.", "C) હેટરોઝાઇગસ જીવોની ફિટનેસ હોમોઝાઇગસ જીવો કરતાં વધુ હોય છે, અને આ લાભ બદલાતા પર્યાવરણમાં સરળતાથી અદૃશ્ય થઈ જાય છે.", "D) હેટરોઝાઇગસ જીવોની ફિટનેસ હોમોઝાઇગસ જીવો કરતાં વધુ હોય છે, અને આ લાભ વસતિમાં જનીનીય વિવિધતાને પ્રોત્સાહન આપે છે."], "correct": 3, "explanation": "હેટરોઝાઇગસ એડવાન્ટેજ એટલે હેટરોઝાઇગસ જીવોની ફિટનેસ હોમોઝાઇગસ જીવો કરતાં વધુ હોય છે. આ લાભ વસતિમાં જનીનીય વિવિધતાને પ્રોત્સાહન આપે છે, કારણ કે હેટરોઝાઇગસ જીવો બદલાતા પર્યાવરણમાં વધુ અનુકૂળનક્ષમ હોય છે. વિકલ્પ A ખોટો છે કારણ કે આ લાભ ફક્ત સ્થિર પર્યાવરણમાં જ નહીં, પરંતુ બદલાતા પર્યાવરણમાં પણ જોવા મળે છે. વિકલ્પ B ખોટો છે કારણ કે હેટરોઝાઇગસ જીવોની ફિટનેસ ઓછી નહીં, પરંતુ વધુ હોય છે. વિકલ્પ C ખોટો છે કારણ કે આ લાભ બદલાતા પર્યાવરણમાં અદૃશ્ય થતો નથી, પરંતુ તે જાળવી રાખવામાં મદદ કરે છે.", "ncert_ref": "Class XII - પ્રકરણ 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 14}, {"question": "ડાર્વિનના કુદરતી પસંદગીના સિદ્ધાંત અનુસાર, જો એક જાતિમાં 'જનીનીય ડ્રિફ્ટ' (genetic drift) અને કુદરતી પસંદગી એકસાથે કામ કરતાં હોય, તો નીચેના પૈકી કયું પરિણામ સૌથી વધુ સંભવિત છે?", "options": ["A) વસતિમાં જનીનીય વિવિધતા ઘટશે, પરંતુ ફિટનેસમાં કોઈ ફેરફાર થશે નહીં.", "B) વસતિમાં જનીનીય વિવિધતા અને ફિટનેસ બંનેમાં ઘટાડો થશે.", "C) વસતિમાં જનીનીય વિવિધતા ઘટશે, પરંતુ ફિટનેસમાં વધારો થશે.", "D) વસતિમાં જનીનીય વિવિધતા અને ફિટનેસ બંનેમાં વધારો થશે."], "correct": 1, "explanation": "જનીનીય ડ્રિફ્ટ એ અપૂર્ણપણે ુવિધ લક્ષણોને નિયંત્રિત કરે છે. આ લક્ષણો વચ્ચે અંતરસંબંધ હોવો જરૂરી છે, જેમ કે એક જ જનીન દ્વારા નિયંત્રિત થતાં લક્ષણો એકબીજા સાથે જોડાયેલા હોય છે. વિકલ્પ A અને B અંશતઃ સાચા લાગે છે, પરંતુ પ્લીયોટ્રોપીમાં લક્ષણો વચ્ચેનો સંબંધ મહત્વનો છે. વિકલ્પ D પ્લીયોટ્રોપીનો સિદ્ધાંત નથી, પરંતુ તે સરળ મેન્ડેલિયન અનુવંશિકતાનું ઉદાહરણ છે.", "ncert_ref": "Class XII - Chapter 5: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 57}, {"question": "કુદરતી પસંદગી દરમિયાન, એક જાતિમાં 'ઓસિલેટિંગ સિલેક્શન' થાય છે. નીચેના પૈકી કયું ઉદાહરણ સાચું છે?", "options": ["A) મોરના પીછાના રંગમાં વાર્ષિક ફેરફાર.", "B) બ્રિટનમાં પેપેડ મોથના રંગમાં ઔદ્યોગિક ક્રાંતિ પછી થયેલો ફેરફાર.", "C) ચકલીના ચોચલાની લંબાઈમાં સતત વધારો.", "D) માનવમાં હીમોગ્લોબિનના જનીનમાં સિકલ સેલ એનિમિયાનો ફેલાવો."], "correct": 0, "explanation": "ઓસિલેટિંગ સિલેક્શન એટલે પર્યાવરણીય પરિબળોના ફેરફારને કારણે પસંદગીની દિશા બદલાતી રહે છે. મોરના પીછાના રંગમાં વાર્ષિક ફેરફાર એ ઓસિલેટિંગ સિલેક્શનનું ઉદાહરણ છે. વિકલ્પ B ઇન્ડસ્ટ્રિયલ મેલેનિઝમનું ઉદાહરણ છે, વિકલ્પ C ડાયરેક્શનલ સિલેક્શનનું ઉદાહરણ છે, અને વિકલ્પ D બેલેન્સિંગ સિલેક્શનનું ઉદાહરણ છે.", "ncert_ref": "Class XII - Chapter 5: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 58}, {"question": "ડાર્વિનના કુદરતી પસંદગીના સિદ્ધાંત અનુસાર, એક જાતિમાં 'કરેક્ટિવ સિલેક્શન' થાય છે. નીચેના પૈકી કયું વિધાન સાચું છે?", "options": ["A) આ પસંદગી દરમિયાન, વસતિમાં સરેરાશ લક્ષણથી વિચલિત થતાં જીવોની સંખ્યા ઘટે છે.", "B) આ પસંદગી દરમિયાન, વસતિમાં સરેરાશ લક્ષણથી વિચલિત થતાં જીવોની સંખ્યા વધે છે.", "C) આ પસંદગી દરમિયાન, વસતિમાં એકદમ નવાં લક્ષણો ઉદ્ભવે છે.", "D) આ પસંદગી દરમિયાન, વસતિમાં લક્ષણોનો વિતરણ બહુ-મોડલ બને છે."], "correct": 0, "explanation": "કરેક્ટિવ સિલેક્શન (સુધારક પસંદગી) દરમિયાન, વસતિમાં સરેરાશ લક્ષણથી વિચલિત થતાં જીવોની સંખ્યા ઘટે છે, જેથી વસતિ સરેરાશ લક્ષણ તરફ વળે છે. વિકલ્પ B ડિસરપ્ટિવ સિલેક્શનનું લક્ષણ છે, વિકલ્પ C મ્યુટેશન અથવા નવી જનીનીય વૈવિધ્યનું ઉદાહરણ છે, અને વિકલ્પ D ડિસરપ્ટિવ સિલેક્શનનું લક્ષણ છે.", "ncert_ref": "Class XII - Chapter 5: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 59}, {"question": "એક દ્વીપસમૂહમાં રહેતી ચકલીની જાતિમાં, લાંબા ચોચલા અને ટૂંકા ચોચલા ધરાવતા પક્ષીઓ વચ્ચે કુદરતી પસંદગી દરમિયાન 'ડિસરપ્ટિવ સિલેક્શન' જોવા મળે છે. જો આ દ્વીપસમૂહમાં અચાનક એક નવો શિકારી (પ્રિડેટર) આવી પહોંચે જે મધ્યમ લંબાઈના ચોચલા ધરાવતા પક્ષીઓને શિકાર કરવા પસંદ કરે, તો લાંબા સમયગાળા પછી નીચેના પૈકી કયું પરિણામ સૌથી યોગ્ય રીતે અપેક્ષિત હશે?", "options": ["A) લાંબા અને ટૂંકા ચોચલા ધરાવતા પક્ષીઓની સંખ્યા ઘટશે, જ્યારે મધ્યમ લંબાઈના ચોચલા ધરાવતા પક્ષીઓની સંખ્યા વધશે.", "B) લાંબા અને ટૂંકા ચોચલા ધરાવતા પક્ષીઓની સંખ્યા વધશે, જ્યારે મધ્યમ લંબાઈના ચોચલા ધરાવતા પક્ષીઓની સંખ્યા ઘટશે અથવા લુપ્ત થશે.", "C) તમામ પક્ષીઓના ચોચલાની લંબાઈ મધ્યમ તરફ વળશે, કારણ કે શિકારી મધ્યમ લંબાઈના ચોચલા ધરાવતા પક્ષીઓને શિકાર કરશે.", "D) ચકલીની જાતિમાં ચોચલાની લંબાઈમાં કોઈ પરિવર્તન થશે નહીં, કારણ કે કુદરતી પસંદગી દ્વારા પસંદગી થતી નથી."], "correct": 1, "explanation": "ડિસરપ્ટિવ સિલેક્શનમાં, કુદરતી પસંદગી એવા જીવોને પસંદ કરે છે જે ક્રમિક લક્ષણના બે ચરમ સીમાઓ (ઉદા. લાંબા અથવા ટૂંકા ચોચલા) તરફ વળે છે, જ્યારે મધ્યમ લક્ષણ ધરાવતા જીવોને નુકસાન થાય છે. નવા શિકારીના આગમન પછી, મધ્યમ લંબાઈના ચોચલા ધરાવતા પક્ષીઓ શિકાર બનશે, જેથી લાંબા અને ટૂંકા ચોચલા ધરાવતા પક્ષીઓની સંખ્યા વધશે, જ્યારે મધ્યમ લંબાઈના ચોચલા ધરાવતા પક્ષીઓની સંખ્યા ઘટશે અથવા લુપ્ત થશે. વિકલ્પ A ખોટો છે કારણ કે ડિસરપ્ટિવ સિલેક્શનમાં મધ્યમ લક્ષણ ધરાવતા જીવોની સંખ્યા ઘટે છે. વિકલ્પ C ખોટો છે કારણ કે ડિસરપ્ટિવ સિલેક્શન મધ્યમ લક્ષણ તરફ વળવાને બદલે ચરમ સીમાઓ તરફ વળે છે. વિકલ્પ D ખોટો છે કારણ કે કુદરતી પસંદગી દ્વારા પસંદગી થાય છે અને પરિવર્તન થાય છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 60}, {"question": "ડાર્વિનના કુદરતી પસંદગીના સિદ્ધાંત અનુસાર, એક જાતિમાં 'ઓસિલેટિંગ સિલેક્શન' થાય છે. નીચેના પૈકી કયું ઉદાહરણ સૌથી યોગ્ય છે?", "options": ["A) ચકલીના ચોચલાની લંબાઈમાં વાર્ષિક રીતે પરિવર્તન થાય છે કારણ કે પર્યાવરણીય પરિબળો બદલાય છે.", "B) ચકલીના ચોચલાની લંબાઈમાં સતત વૃદ્ધિ થાય છે કારણ કે લાંબા ચોચલા ધરાવતા પક્ષીઓને લાભ મળે છે.", "C) ચકલીના ચોચલાની લંબાઈમાં કોઈ પરિવર્તન થતું નથી કારણ કે સ્થિર પર્યાવરણ છે.", "D) ચકલીના ચોચલાની લંબાઈમાં અચાનક પરિવર્તન થાય છે કારણ કે જનીનીય ડ્રિફ્ટ થાય છે."], "correct": 0, "explanation": "ઓસિલેટિંગ સિલેક્શનમાં, કુદરતી પસંદગીની દિશા સમય સાથે બદલાય છે. વિકલ્પ A યોગ્ય છે કારણ કે ચકલીના ચોચલાની લંબાઈમાં વાર્ષિક રીતે પરિવર્તન થાય છે. વિકલ્પ B ખોટો છે કારણ કે તે ડાયરેક્શનલ સિલેક્શનનું વર્ણન કરે છે. વિકલ્પ C ખોટો છે કારણ કે તે સ્ટેબલાઇઝિંગ સિલેક્શનનું વર્ણન કરે છે. વિકલ્પ D ખોટો છે કારણ કે તે જનીનીય ડ્રિફ્ટનું વર્ણન કરે છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 61}, {"question": "કુદરતી પસંદગી દરમિયાન, એક જાતિમાં 'કરેક્ટિવ સિલેક્શન' થાય છે. નીચેના પૈકી કયું વિધાન સૌથી યોગ્ય છે?", "options": ["A) કુદરતી પસંદગી વસતિમાં અસાધારણ રીતે ઉચ્ચ અથવા અસાધારણ રીતે નીચા મૂલ્ય ધરાવતા લક્ષણોને પસંદ કરે છે.", "B) કુદરતી પસંદગી વસતિમાં સરેરાશ મૂલ્ય ધરાવતા લક્ષણોને પસંદ કરે છે.", "C) કુદરતી પસંદગી વસતિમાં એક દિશામાં લક્ષણોના મૂલ્યને બદલે છે.", "D) કુદરતી પસંદગી વસતિમાં લક્ષણોના મૂલ્યને સુધારે છે, પરંતુ તે સરેરાશ તરફ વળે છે."], "correct": 3, "explanation": "કરેક્ટિવ સિલેક્શન (સુધારક પસંદગી)માં, કુદરતી પસંદગી લક્ષણોના મૂલ્યને સુધારે છે, પરંતુ તે સરેરાશ તરફ વળે છે. વિકલ્પ D યોગ્ય છે. વિકલ્પ A ડિસરપ્ટિવ સિલેક્શનનું વર્ણન કરે છે. વિકલ્પ B સ્ટેબલાઇઝિંગ સિલેક્શનનું વર્ણન કરે છે. વિકલ્પ C ડાયરેક્શનલ સિલેક્શનનું વર્ણન કરે છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 62}, {"question": "એક જાતિમાં, કુદરતી પસંદગી દરમિયાન જો 'પ્લીયોટ્રોપી' જોવા મળે છે, તો નીચેના પૈકી કયું વિધાન સત્ય છે?", "options": ["A) એક જ જનીન બહુવિધ લક્ષણોને નિયંત્રિત કરે છે, પરંતુ તે લક્ષણો વચ્ચે કોઈ સંબંધ નથી.", "B) એક જ લક્ષણ બહુવિધ જનીનો દ્વારા નિયંત્રિત થાય છે, અને તે જનીનોની પસંદગી અલગ-અલગ દિશામાં થાય છે.", "C) બહુવિધ જનીનો એક જ લક્ષણને નિયંત્રિત કરે છે, અને કુદરતી પસંદગી તે લક્ષણની એક જ દિશામાં ક્રિયા કરે છે.", "D) એક જ જનીન એક જ લક્ષણને નિયંત્રિત કરે છે, પરંતુ પર્યાવરણીય પરિબળોને કારણે તે લક્ષણમાં પરિવર્તન થાય છે."], "correct": 1, "explanation": "પ્લીયોટ્રોપી (Pleiotropy) એવી પરિઘટના છે જ્યાં એક જ જનીન બહુવિધ લક્ષણોને પ્રભાવિત કરે છે. પરંતુ પ્રશ્નમાં 'પ્લીયોટ્રોપી' શબ્દનો ઉપયોગ 'પ્લીયોટ્રોપી' (બહુ-દિશાત્મક પસંદગી) તરીકે થયો છે, જેનો અર્થ એ છે કે એક જ લક્ષણ બહુવિધ જનીનો દ્વારા નિયંત્રિત થાય છે અને તે જનીનોની પસંદગી અલગ-અલગ દિશામાં થાય છે. આથી વિકલ્પ B સત્ય છે. વિકલ્પ A પ્લીયોટ્રોપીની પરિભાષા વર્ણવે છે, પરંતુ પ્રશ્નમાં 'પ્લીયોટ્રોપી' (બહુ-દિશાત્મક પસંદગી) વિશે પૂછવામાં આવ્યું છે. વિકલ્પ C અને D પ્લીયોટ્રોપી અથવા બહુ-દિશાત્મક પસંદગીની સચોટ વ્યાખ્યા નથી.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 63}, {"question": "ડાર્વિનના કુદરતી પસંદગીના સિદ્ધાંત અનુસાર, જો એક જાતિમાં 'ઓસિલેટિંગ સિલેક્શન' (પરિવર્તનશીલ પસંદગી) થાય છે, તો નીચેના પૈકી કયું પરિણામ સૌથી યોગ્ય છે?", "options": ["A) જાતિમાં એક જ પ્રકારના લક્ષણ ધરાવતા જીવો બચી જાય છે, અને બાકીના નાશ પામે છે.", "B) જાતિમાં લક્ષણની પસંદગી સમયાંતરે બદલાતી રહે છે, અને જીવો તે અનુસાર અનુકૂળન કરે છે.", "C) જાતિમાં લક્ષણની પસંદગી સ્થિર રહે છે, અને જીવો તે લક્ષણને સ્થિર રાખે છે.", "D) જાતિમાં લક્ષણની પસંદગી દિશાહીન થાય છે, અને જીવોમાં કોઈ અનુકૂળન થતું નથી."], "correct": 1, "explanation": "ઓસિલેટિંગ સિલેક્શન (પરિવર્તનશીલ પસંદગી)માં, પસંદગીની દિશા સમયાંતરે બદલાતી રહે છે. આથી જીવો તે અનુસાર અનુકૂળન કરે છે (વિકલ્પ B સત્ય). વિકલ્પ Aમાં એક જ પ્રકારના લક્ષણ ધરાવતા જીવો બચી જવાનું વર્ણન 'ડાયરેક્શનલ સિલેક્શન' અથવા 'સ્ટેબલાઇઝિંગ સિલેક્શન' માટે યોગ્ય છે. વિકલ્પ C સ્થિર પસંદગીનું વર્ણન કરે છે, જે ઓસિલેટિંગ સિલેક્શન નથી. વિકલ્પ D દિશાહીન પસંદગીનું વર્ણન કરે છે, જે ઓસિલેટિંગ સિલેક્શન નથી.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 64}, {"question": "એક જાતિમાં કુદરતી પસંદગી દરમિયાન, જો 'જનીનીય લિંકેજ ડિસીક્વિલિબ્રિયમ' (genetic linkage disequilibrium) જોવા મળે, તો નીચેના પૈકી કયું વિધાન સત્ય છે?", "options": ["A) આ જાતિમાં અલેલ્સની વિતરણ પેટર્ન યાદચ્છિક હશે અને કુદરતી પસંદગીનો પ્રભાવ ઓછો હશે.", "B) આ જાતિમાં સંલગ્ન જનીનો વચ્ચેનો પુનરાવર્તન દર (recombination rate) ઓછો હશે, પરંતુ કુદરતી પસંદગી હેટરોઝાઇગસ જીવોને ફાયદો કરશે.", "C) આ જાતિમાં સંલગ્ન જનીનો વચ્ચેનો પુનરાવર્તન દર ઓછો હશે, પરંતુ કુદરતી પસંદગી હોમોઝાઇગસ જીવોને ફાયદો કરશે.", "D) આ જાતિમાં સંલગ્ન જનીનો વચ્ચેનો પુનરાવર્તન દર ઉચ્ચ હશે અને કુદરતી પસંદગી હેટરોઝાઇગસ જીવોને ફાયદો કરશે."], "correct": 2, "explanation": "જનીનીય લિંકેજ ડિસીક્વિલિબ્રિયમ એટલે સંલગ્ન જનીનો વચ્ચે અલેલ્સનું નોન-રેન્ડમ એસોસિએશન. આ સ્થિતિમાં, પુનરાવર્તન દર (recombination rate) ઓછો હોય છે, પરંતુ કુદરતી પસંદગી હોમોઝાઇગસ જીવોને ફાયદો કરે છે કારણ કે સંલગ્ન જનીનોના સંયોજનથી ઉચ્ચ ફીટનેસ વાલા જનીનોટાઇપ્સ બનવા માંડે છે. વિકલ્પ A ખોટો છે કારણ કે અલેલ્સની વિતરણ પેટર્ન યાદચ્છિક નથી હોતી. વિકલ્પ B ખોટો છે કારણ કે કુદરતી પસંદગી હેટરોઝાઇગસ જીવોને ફાયદો કરતી નથી. વિકલ્પ D ખોટો છે કારણ કે પુનરાવર્તન દર ઉચ્ચ નથી હોતો.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 65}, {"question": "એક જાતિમાં કુદરતી પસંદગી દરમિયાન, જો 'પ્લીયોટ્રોપી' જોવા મળે છે, તો નીચેના પૈકી કયું વિધાન સાચું છે?", "options": ["A) એક જ જનીન બહુવિધ લક્ષણોને નિયંત્રિત કરે છે, પરંતુ કુદરતી પસંદગી ફક્ત એક જ લક્ષણ પર અસર કરે છે.", "B) એક જ લક્ષણ બહુવિધ જનીન દ્વારા નિયંત્રિત થાય છે, પરંતુ કુદરતી પસંદગી ફક્ત એક જ જનીન પર અસર કરે છે.", "C) એક જ જનીન બહુવિધ લક્ષણોને નિયંત્રિત કરે છે અને કુદરતી પસંદગી આ બધા જ લક્ષણો પર અસર કરે છે.", "D) બહુવિધ જનીન એક જ લક્ષણને નિયંત્રિત કરે છે અને કુદરતી પસંદગી ફક્ત એક જ જનીન પર અસર કરે છે."], "correct": 2, "explanation": "પ્લીયોટ્રોપી એટલે એક જ જનીન બહુવિધ લક્ષણોને નિયંત્રિત કરે છે અને કુદરતી પસંદગી આ બધા જ લક્ષણો પર અસર કરે છે. વિકલ્પ A અને B અધૂરા છે કારણ કે તેઓ ફક્ત એક જ પાસાને ધ્યાનમાં લે છે. વિકલ્પ D સંપૂર્ણપણે ખોટો છે કારણ કે તે બહુવિધ જનીન અને એક લક્ષણની વાત કરે છે, જે પ્લીયોટ્રોપીની વ્યાખ્યાને અનુરૂપ નથી.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 66}, {"question": "એક જાતિમાં, કુદરતી પસંદગી દરમિયાન જો 'જનીનીય ડ્રિફ્ટ' અને 'કુદરતી પસંદગી' એકસાથે કામ કરતાં હોય, તો નીચેના પૈકી કયું પરિણામ સૌથી વધુ સંભવિત છે?", "options": ["A) જાતિમાં જનીનીય વૈવિધ્ય ઝડપથી ઘટશે અને એક જ એલિલ પ્રબળ બનશે", "B) જાતિમાં હેટરોઝાઇગસ જીવોની સંખ્યા વધશે અને બેલેન્સિંગ સિલેક્શન જોવા મળશે", "C) જાતિમાં જનીનીય વ         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
