<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - ઉત્પરિવર્તન (Mutation)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 ઉત્પરિવર્તન (Mutation)</span>
                <span>🎯 Hard</span>
                <span>📝 50 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "જ્યારે ડી.એન.એ.માં એક જ બેઇઝ જોડીનો બદલાવ થાય છે, ત્યારે તેને કયા પ્રકારનું ઉત્પરિવર્તન કહેવાય છે?", "options": ["A) બિંદુ ઉત્પરિવર્તન", "B) વર્ણસૂત્રીય ઉત્પરિવર્તન", "C) ફ્રેમશિફ્ટ ઉત્પરિવર્તન", "D) અવશેષી ઉત્પરિવર્તન"], "correct": 0, "explanation": "બિંદુ ઉત્પરિવર્તન એ ડી.એન.એ.માં એક જ ન્યુક્લિયોટાઇડ બેઇઝનો બદલાવ હોય છે. વર્ણસૂત્રીય ઉત્પરિવર્તન વર્ણસૂત્રની સંખ્યા અથવા રચનામાં ફેરફાર સાથે સંબંધિત છે. ફ્રેમશિફ્ટ ઉત્પરિવર્તન ન્યુક્લિયોટાઇડના ઉમેરા અથવા કાઢવા સાથે સંબંધિત છે, જે વાંચન ફ્રેમને બદલે છે. અવશેષી ઉત્પરિવર્તન એવું ઉત્પરિવર્તન છે જે જનીનની કાર્યક્ષમતાને અસર કરતું નથી.", "ncert_ref": "Class XII - Chapter 5: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "difficulty": "Hard", "num": 1}, {"question": "નીચેનામાંથી કયું ઉત્પરિવર્તન પ્રોટીન સંશ્લેષણ દરમિયાન વાંચન ફ્રેમને બદલી શકે છે?", "options": ["A) બેઇઝ પ્રતિષ્ઠાપન", "B) બેઇઝ ઉમેરો", "C) બેઇઝ કાઢવું", "D) બેઇઝ વિનિમય"], "correct": 1, "explanation": "બેઇઝ ઉમેરો અથવા કાઢવું ફ્રેમશિફ્ટ ઉત્પરિવર્તન તરફ દોરી શકે છે, જે વાંચન ફ્રેમને બદલે છે અને પ્રોટીન સંશ્લેષણને અસર કરે છે. બેઇઝ પ્રતિષ્ઠાપન અને બેઇઝ વિનિમય બિંદુ ઉત્પરિવર્તન છે, જે ફ્રેમશિફ્ટ તરફ દોરી શકતું નથી.", "ncert_ref": "Class XII - Chapter 5: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "difficulty": "Hard", "num": 2}, {"question": "જો એક જનીનમાં ઉત્પરિવર્તન થાય છે અને તે જનીનનો પ્રભાવી એલિલ બને છે, તો તે ઉત્પરિવર્તનને કયા પ્રકારનું કહેવાય?", "options": ["A) નિષ્ક્રિય ઉત્પરિવર્તન", "B) પ્રભાવી ઉત્પરિવર્તન", "C) અપૂર્ણ પ્રભાવી ઉત્પરિવર્તન", "D) સહ-પ્રભાવી ઉત્પરિવર્તન"], "correct": 1, "explanation": "પ્રભાવી ઉત્પરિવર્તન એવું ઉત્પરિવર્તન છે જે નવા એલિલને પ્રભાવી બનાવે છે. નિષ્ક્રિય ઉત્પરિવર્તન એલિલને નિષ્ક્રિય બનાવે છે. અપૂર્ણ પ્રભાવી અને સહ-પ્રભાવી ઉત્પરિવર્તન એવી પરિસ્થિતિઓ છે જ્યાં એલિલનો પ્રભાવ અલગ પ્રકારે દેખાય છે.", "ncert_ref": "Class XII - Chapter 5: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "difficulty": "Hard", "num": 3}, {"question": "નીચેનામાંથી કયું ઉત્પરિવર્તન કોષના જીવનચક્ર દરમિયાન સૌથી વધુ હાનિકારક છે?", "options": ["A) બિંદુ ઉત્પરિવર્તન", "B) ફ્રેમશિફ્ટ ઉત્પરિવર્તન", "C) વર્ણસૂત્રીય ઉત્પરિવર્તન", "D) સંકેતિત ઉત્પરિવર્તન"], "correct": 2, "explanation": "વર્ણસૂત્રીય ઉત્પરિવર્તન એ વર્ણસૂત્રની સંખ્યા અથવા રચનામાં ફેરફાર સાથે સંબંધિત છે, જે કોષના જીવનચક્રને ગંભીર રીતે અસર કરે છે. બિંદુ અને ફ્રેમશિફ્ટ ઉત્પરિવર્તન જનીન સ્તરે અસર કરે છે, પરંતુ વર્ણસૂત્રીય ઉત્પરિવર્તન વધુ વ્યાપક અસર કરે છે. સંકેતિત ઉત્પરિવર્તન એવું ઉત્પરિવર્તન છે જે કોઈ અસર કરતું નથી.", "ncert_ref": "Class XII - Chapter 5: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "difficulty": "Hard", "num": 4}, {"question": "જ્યારે ડી.એન.એ.માં થયેલું ઉત્પરિવર્તન પ્રોટીનના એક જ એમિનો એસિડમાં ફેરફાર કરે છે, ત્યારે તેને કયા પ્રકારનું ઉત્પરિવર્તન કહેવાય છે?", "options": ["A) મૂક ઉત્પરિવર્તન", "B) મિસસેન્સ ઉત્પરિવર્તન", "C) નોન્સેન્સ ઉત્પરિવર્તન", "D) સંકેતિત ઉત્પરિવર્તન"], "correct": 1, "explanation": "મિસસેન્સ ઉત્પરિવર્તન એવું ઉત્પરિવર્તન છે જે પ્રોટીનમાં એક જ એમિનો એસિડને બદલે છે. મૂક ઉત્પરિવર્તન એવું ઉત્પરિવર્તન છે જે કોઈ અસર કરતું નથી. નોન્સેન્સ ઉત્પરિવર્તન એવું ઉત્પરિવર્તન છે જે પ્રોટીન સંશ્લેષણને અટકાવે છે. સંકેતિત ઉત્પરિવર્તન એવું ઉત્પરિવર્તન છે જે કોઈ અસર કરતું નથી.", "ncert_ref": "Class XII - Chapter 5: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "difficulty": "Hard", "num": 5}, {"question": "નીચેનામાંથી કયું ઉત્પરિવર્તન વર્ણસૂત્રીય સ્થાનાંતરણ (chromosomal translocation) નું ઉદાહરણ છે, જેમાં બે અલગ વર્ણસૂત્રોના ટુકડાઓની અદલાબદલી થાય છે?", "options": ["A) રોબર્ટસોનિયન સ્થાનાંતરણ, જેમાં બે એક્રોસેન્ટ્રિક વર્ણસૂત્રોના લાંબા ભાગો જોડાઈને એક મોટું મેટાસેન્ટ્રિક વર્ણસૂત્ર બનાવે છે.", "B) પરસ્પર સ્થાનાંતરણ, જેમાં બે અલગ વર્ણસૂત્રો વચ્ચે તેમના ટુકડાઓની અદલાબદલી થાય છે.", "C) ડિલીશન, જેમાં વર્ણસૂત્રનો એક ટુકડો ગુમાવી જાય છે.", "D) ડ્યુપ્લિકેશન, જેમાં વર્ણસૂત્રનો એક ટુકડો દુબળી જાય છે."], "correct": 1, "explanation": "પરસ્પર સ્થાનાંતરણ (reciprocal translocation) એ વર્ણસૂત્રીય ઉત્પરિવર્તનનો એક પ્રકાર છે, જેમાં બે અલગ વર્ણસૂત્રો વચ્ચે તેમના ટુકડાઓની અદલાબદલી થાય છે. રોબર્ટસોનિયન સ્થાનાંતરણમાં બે એક્રોસેન્ટ્રિક વર્ણસૂત્રોના લાંબા ભાગો જોડાઈને એક મોટું મેટાસેન્ somal inversion)"], "correct": 2, "explanation": "વર્ણસૂત્રીય સ્થાનાંતરણમાં, વર્ણસૂત્રનો એક ભાગ બીજા વર્ણસૂત્ર સાથે જોડાઈ જાય છે. વિલોપનમાં વર્ણસૂત્રનો ભાગ ગુમાવાય છે, નકલમાં વર્ણસૂત્રનો ભાગ દુબળાય છે, અને ઉલટવામાં વર્ણસૂત્રનો ભાગ ઉલટાઈ જાય છે.", "ncert_ref": "Class XII - Chapter 5: અનુવંશિકતા અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 14}, {"question": "એક જીવમાં ડી.એન.એ.ના એક જીનમાં થયેલું ઉત્પરિવર્તન તેના ફિનોટાઇપમાં કોઈ ફેરફાર લાવતું નથી. આ ઘટનાને કયા નામે ઓળખવામાં આવે છે?", "options": ["A) મૂક ઉત્પરિવર્તન (Silent mutation)", "B) મિસસેન્સ ઉત્પરિવર્તન (Missense mutation)", "C) નોન્સેન્સ ઉત્પરિવર્તન (Nonsense mutation)", "D) ફ્રેમશિફ્ટ ઉત્પરિવર્તન (Frameshift mutation)"], "correct": 0, "explanation": "મૂક ઉત્પરિવર્તન (Silent mutation) એવું ઉત્પરિવર્તન છે જેમાં ડી.એન.એ.ના કોડનમાં ફેરફાર થાય છે, પરંતુ તે એમિનો એસિડના કોડમાં કોઈ ફેરફાર લાવતો નથી, કારણ કે જનીન કોડની રીડંડન્સી (redundancy) હોવાથી એક જ એમિનો એસિડ માટે બહુવિધ કોડન હોય છે. આથી ફિનોટાઇપમાં કોઈ ફેરફાર જોવા મળતો નથી. મિસસેન્સ ઉત્પરિવર્તનમાં એક એમિનો એસિડ બદલાય છે, નોન્સેન્સ ઉત્પરિવર્તનમાં પ્રોટીનનું સંશ્લેષણ અટકી જાય છે, અને ફ્રેમશિફ્ટ ઉત્પરિવર્તનમાં વાંચન ફ્રેમ બદલાઈ જાય છે, જે ફિનોટાઇપમાં ફેરફાર લાવે છે.", "ncert_ref": "Class XII - Chapter 5: અનુવંશિકતા અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 15}, {"question": "નીચેનામાંથી કયું ઉત્પરિવર્તન 'સાઇલન્ટ મ્યુટેશન' (મૂક ઉત્પરિવર્તન) નું ઉદાહરણ છે, જેમાં DNAમાં ફેરફાર થયો હોવા છતાં પ્રોટીનના એમિનો એસિડ ક્રમમાં કોઈ ફેરફાર થતો નથી?", "options": ["A) DNAમાં એક બેઇઝ જોડીનો બદલાવ થવાથી કોડોન UAC થી UAG થાય છે", "B) DNAમાં એક બેઇઝ જોડીનો બદલાવ થવાથી કોડોન GCC થી GCA થાય છે", "C) DNAમાં એક બેઇઝ જોડીનો બદલાવ થવાથી કોડોન AUG થી UAG થાય છે", "D) DNAમાં એક બેઇઝ જોડીનો બદલાવ થવાથી કોડોન CGC થી CGA થાય છે"], "correct": 1, "explanation": "સાઇલન્ટ મ્યુટેશનમાં DNAના કોડિંગ ક્ષેત્રમાં ફેરફાર થાય છે, પરંતુ તે એમિનો એસિડ ક્રમને બદલતો નથી. આ માટે જરૂરી છે કે બદલાયેલો કોડોન એક જ એમિનો એસિડને કોડ કરે. ઉદાહરણ તરીકે, GCC અને GCA બંને એલાનિન (Alanine) એમિનો એસિડને કોડ કરે છે, જેથી આ મ્યુટેશન મૂક રહે છે. A) UAC (ટાયરોસીન) થી UAG (સ્ટોપ કોડોન) બદલાવથી પ્રોટીન સંશ્લેષણ અટકી જાય છે. C) AUG (મેથિયોનિન) થી UAG (સ્ટોપ કોડોન) પણ પ્રોટીન સંશ્લેષણ અટકાવે છે. D) CGC અને CGA બંને આર્જિનિન (Arginine) કોડ કરે છે, પરંતુ આ મ્યુટેશન સાઇલન્ટ હોઈ શકે, પરંતુ GCC થી GCA વધુ સામાન્ય ઉદાહરણ છે.", "ncert_ref": "Class XII - Chapter 5: અનુવંશિકતા અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 16}, {"question": "એક જીવમાં DNAના એક જીનમાં 'ફ્રેમશિફ્ટ મ્યુટેશન' થાય છે. નીચેનામાંથી કયું કારણ આ મ્યુટેશન માટે જવાબદાર નથી?", "options": ["A) એક બેઇઝ જોડીનું નુકશાન", "B) એક બેઇઝ જોડીનું ઉમેરાવું", "C) એક બેઇઝ જોડીનો બદલાવ", "D) બે બેઇઝ જોડીનું નુકશાન"], "correct": 2, "explanation": "ફ્રેમશિફ્ટ મ્યુટેશન ત્યારે થાય છે જ્યારે DNAમાં બેઇઝ જોડીઓની સંખ્યામાં ફેરફાર થાય છે (ઉમેરાવું અથવા નુકશાન), જેથી વાંચન ફ્રેમ બદલાઈ જાય છે. એક બેઇઝ જોડીનો બદલાવ (સબસ્ટિટ્યુશન) વાંચન ફ્રેમને બદલતો નથી, પરંતુ તે સાઇલન્ટ, મિસસેન્સ અથવા નોન્સેન્સ મ્યુટેશન તરીકે ઓળખાય છે. A, B, અને D બધા ફ્રેમશિફ્ટ મ્યુટેશનનું કારણ બની શકે છે.", "ncert_ref": "Class XII - Chapter 5: અનુવંશિકતા અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 17}, {"question": "નીચેનામાંથી કયું ઉત્પરિવર્તન 'ટ્રાન્સવર્ઝન' (Transversion) નું ઉદાહરણ છે?", "options": ["A) એડિનિન (A) ની જગ્યાએ થાયમિન (T)", "B) એડિનિન (A) ની જગ્યાએ સાયટોસીન (C)", "C) ગ્વાનિન (G) ની જગ્યાએ થાયમિન (T)", "D) સાયટોસીન (C) ની જગ્યાએ યુરેસિલ (U)"], "correct": 1, "explanation": "ટ્રાન્સવર્ઝન મ્યુટેશનમાં પ્યુરિન (A અથવા G) ની જગ્યાએ પિરિમિડિન (C અથવા T) અથવા ઉલટું થાય છે. A) એડિનિન (પ્યુરિન) થી થાયમિન (પિરિમિડિન) એ ટ્રાન્સવર્ઝન છે. B) એડિનિન (પ્યુરિન) થી સાયટોસીન (પિરિમિડિન) પણ ટ્રાન્સવર્ઝન છે, પરંતુ પ્રશ્નમાં એક જ સાચો જવાબ મંગવામાં આવ્યો છે. C) ગ્વાનિન (પ્યુરિન) થી થાયમિન (પિરિમિડિન) પણ ટ્રાન્સવર્ઝન છે, પરંતુ A અને B વધુ સામાન્ય ઉદાહરણો છે. D) સાયટોસીન (પિરિમિડિન) થી યુરેસિલ (પિરિમિડિન) એ ટ્રાન્ઝિશન છે, કેમ કે બંને પિરિમિડિન છે.", "ncert_ref": "Class XII - Chapter 5: અનુવંશિકતા અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 18}, {"question": "એક કોષમાં DNAના એક વર્ણસૂત્  છે", "C) પ્રોટીનની પ્રાથમિક રચના બદલાય છે", "D) પ્રોટીનની ગતિવિધા પર કોઈ અસર થતી નથી"], "correct": 2, "explanation": "સાયલન્ટ મ્યુટેશનમાં DNAમાં બેઇઝ સિક્વન્સ બદલાય છે (A), mRNAમાં કોડોન બદલાય છે પરંતુ એમિનો એસિડ સમાન રહે છે (B), અને પ્રોટીનની ગતિવિધા પર કોઈ અસર થતી નથી (D). પરંતુ પ્રોટીનની પ્રાથમિક રચના બદલાતી નથી (C), આથી વિકલ્પ C સત્ય નથી.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક આનુવંશિકતા", "difficulty": "Hard", "num": 35}, {"question": "એક જીવમાં DNAના એક જનીનમાં 'ટ્રાઇન્યુક્લિયોટાઇડ રિપીટ એક્સપાન્શન' (trinucleotide repeat expansion) ઉત્પરિવર્તન થાય છે. નીચેનામાંથી કયું રોગ આ પ્રકારના ઉત્પરિવર્તન સાથે સંકળાયેલ નથી?", "options": ["A) હન્ટિંગ્ટન રોગ (Huntington's disease)", "B) માયોટોનિક ડિસ્ટ્રોફી (Myotonic dystrophy)", "C) ફ્રેજાઇલ X સિન્ડ્રોમ (Fragile X syndrome)", "D) સિસ્ટિક ફાઇબ્રોસિસ (Cystic fibrosis)"], "correct": 3, "explanation": "હન્ટિંગ્ટન રોગ, માયોટોનિક ડિસ્ટ્રોફી અને ફ્રેજાઇલ X સિન્ડ્રોમ એ ત્રણેય રોગો 'ટ્રાઇન્યુક્લિયોટાઇડ રિપીટ એક્સપાન્શન' ઉત્પરિવર્તન સાથે સંકળાયેલા છે. સિસ્ટિક ફાઇબ્રોસિસ CFTR જનીનમાં થતા 'ફ્રેમશિફ્ટ' અથવા 'મિસસેન્સ' ઉત્પરિવર્તનને કારણે થાય છે, જે ટ્રાઇન્યુક્લિયોટાઇડ રિપીટ એક્સપાન્શન સાથે સંકળાયેલ નથી. તેથી વિકલ્પ D સાચો છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 36}, {"question": "નીચેનામાંથી કયું ઉત્પરિવર્તન 'એપિજિનેટિક' (epigenetic) ફેરફારનું ઉદાહરણ છે, જે DNA ક્રમમાં ફેરફાર કર્યા વગર જનીન અભિવ્યક્તિને અસર કરે છે?", "options": ["A) DNA મિથાઇલેશન (Methylation)", "B) બેઇઝ જોડીનું ટ્રાન્સવર્ઝન (Transversion)", "C) વર્ણસૂત્રીય ડિલીશન (Chromosomal deletion)", "D) ટ્રાન્સપોઝન દ્વારા ઇન્સર્શન (Transposon insertion)"], "correct": 0, "explanation": "DNA મિથાઇલેશન એ એપિજિનેટિક ફેરફાર છે જે DNA ક્રમમાં ફેરફાર કર્યા વગર જનીન અભિવ્યક્તિને નિયંત્રિત કરે છે. બાકીના વિકલ્પો DNA ક્રમમાં સીધો ફેરફાર કરે છે, તેથી તેઓ ઉત્પરિવર્તન છે પરંતુ એપિજિનેટિક નથી. તેથી વિકલ્પ A સાચો છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 37}, {"question": "એક જીવમાં DNAના એક જનીનમાં 'સ્પ્લાઇસ સાઇટ મ્યુટેશન' થાય છે. નીચેનામાંથી કયું પરિણામ આ ઉત્પરિવર્તનને કારણે થઈ શકે છે?", "options": ["A) mRNAમાં ઇન્ટ્રોનનો સમાવેશ થઈ શકે છે", "B) પ્રોટીન સંશ્લેષણ સંપૂર્ણપણે બંધ થઈ જશે", "C) DNA રિપ્લિકેશન પ્રક્રિયા અટકી જશે", "D) ટ્રાન્સક્રિપ્શન પ્રક્રિયા શરૂ થઈ શકશે નહીં"], "correct": 0, "explanation": "'સ્પ્લાઇસ સાઇટ મ્યુટેશન'ને કારણે mRNA પ્રોસેસિંગ દરમિયાન ઇન્ટ્રોન યોગ્ય રીતે દૂર થઈ શકતા નથી, જેના પરિણામે mRNAમાં ઇન્ટ્રોનનો સમાવેશ થઈ શકે છે. આનાથી ખામીયુક્ત પ્રોટીનનું નિર્માણ થઈ શકે છે, પરંતુ પ્રોટીન સંશ્લેષણ સંપૂર્ણપણે બંધ થતું નથી. DNA રિપ્લિકેશન અને ટ્રાન્સક્રિપ્શન પ્રક્રિયા પર આ ઉત્પરિવર્તનની સીધી અસર થતી નથી. તેથી વિકલ્પ A સાચો છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 6: આનુવંશિક અભિવ્યક્તિનું નિયમન", "difficulty": "Hard", "num": 38}, {"question": "નીચેનામાંથી કયું ઉત્પરિવર્તન 'રોબર્ટસોનિયન ટ્રાન્સલોકેશન' (Robertsonian translocation) નું લક્ષણ નથી?", "options": ["A) બે અક્રોસેન્ટ્રિક વર્ણસૂત્રોના લાંબા ભાગનું જોડાણ", "B) વર્ણસૂત્રોની કુલ સંખ્યામાં ઘટાડો થાય છે", "C) જનીનની સંખ્યામાં કોઈ ફેરફાર થતો નથી", "D) વર્ણસૂત્રના ટૂંકા ભાગનું ડિલીશન થાય છે, જે જનીન ગુમાવે છે"], "correct": 3, "explanation": "રોબર્ટસોનિયન ટ્રાન્સલોકેશનમાં બે અક્રોસેન્ટ્રિક વર્ણસૂત્રોના લાંબા ભાગ જોડાય છે અને ટૂંકા ભાગ (જેમાં મુખ્યત્વે રિપીટિવ DNA હોય છે) ગુમાવાય છે, પરંતુ તેમાં જનીન ગુમાવાતા નથી. વર્ણસૂત્રોની કુલ સંખ્યા ઘટે છે, પરંતુ જનીનની સંખ્યામાં ફેરફાર થતો નથી. વિકલ્પ D ખોટો છે કારણ કે ટૂંકા ભાગમાં મહત્વપૂર્ણ જનીન હોતા નથી. તેથી વિકલ્પ D સાચો છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 39}, {"question": "એક જીવમાં DNAના એક જનીનમાં 'ડાયનેમિક મ્યુટેશન' (dynamic mutation) થાય છે, જેમાં ટ્રાઇન્યુક્લિયોટાઇડ રિપીટની સંખ્યા વધે છે. નીચેનામાંથી કયું વિધાન આ પ્રકારના ઉત્પરિવર્તન માટે ખોટું છે?", "options": ["A) આ ઉત્પરિવર્તન પેઢીઓ દરમિયાન વધુ ગંભીર બની શકે છે", "B) આ ઉત્પરિવર્તન માત્ર જર્મલાઇન કોષોમાં જ થાય છે", "C) આ ઉત્પરિવર્તન પ્રોટીનની કાર્યક્ષમતામાં વધારો કરી શકે છે", "D) આ ઉત્પરિવર્તન વારસાગત રોગો સાથે સંકળાયેલું છે"], "correct": 2, "explanation": "'ડાયનેમિક મ્યુટેશન'માં ટ્રાઇન્યુક્લિયોટાઇડ રિપીટની સંખ્યા વધવાથી સામાન્ય રીતે પ્રોટીનની કાર્યક્ષમતા ઘટે છે અથવા ખોવાઈ જાય છે, તે વધતી નથી. આ ઉત્પરિવર્તન પેઢીઓ દરમિયાન વધુ ગંભીર બની શકે છે (એન્ટિસિપેશન), માત્ર જર્મલાઇન કોષોમાં જ થાય છે અને વારસાગત રોગો સાથે સંકળાયેલું છે. તેથી વિકલ્પ C ખોટું છે અને સાચો છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 40}, {"question": "નીચેનામાંથી કયું ઉત્પરિવર્તન 'ડાયનેમિક મ્યુટેશન' નું સૌથી યોગ્ય ઉદાહરણ છે, જેમાં ટ્રાઇન્યુક્લિયોટાઇડ રિપીટની સંખ્યા પેઢી દર પેઢી વધતી જાય છે?", "options": ["A) હન્ટિંગ્ટન રોગ, જેમાં CAG રિપીટની સંખ્યા વધે છે.", "B) સિકલ સેલ એનિમિયા, જેમાં β-ગ્લોબિન જીનમાં એક બેઇઝનો ફેરફાર થાય છે.", "C) ડાઉન સિન્ડ્રોમ, જેમાં વર્ણસૂત્ર 21 ની નકલ થાય છે.", "D) ક્રોનિક માયલોઇડ લ્યુકેમિયા, જેમાં ફિલાડેલ્ફિયા વર્ણસૂત્ર બને છે."], "correct": 0, "explanation": "ડાયનેમિક મ્યુટેશન એ ટ્રાઇન્યુક્લિયોટાઇડ રિપીટની સંખ્યામાં વધારો થવાનું ઉદાહરણ છે, જેમાં હન્ટિંગ્ટન રોગ (CAG રિપીટ) સૌથી પ્રસિદ્ધ ઉદાહરણ છે. સિકલ સેલ એનિમિયા એક બિંદુ મ્યુટેશન છે, ડાઉન સિન્ડ્રોમ વર્ણસૂત્રીય ઉત્પરિવર્તન છે, અને ક્રોનિક માયલોઇડ લ્યુકેમિયા વર્ણસૂત્રીય સ્થાનાંતરણ છે.", "ncert_ref": "Class XII - Chapter 5: આનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "difficulty": "Hard", "num": 41}, {"question": "એક જીવમાં ડી.એન.એ.ના એક જીનમાં 'નાન્સેન્સ મ્યુટેશન' થાય છે. નીચેનામાંથી કયું પરિણામ સૌથી સંભવિત છે?", "options": ["A) પ્રોટીનના સંશ્લેષણ દરમિયાન એમિનો એસિડની ગોઠવણી બદલાય છે, પરંતુ પ્રોટીન કાર્યક્ષમ રહે છે.", "B) પ્રોટીનનું સંશ્લેષણ અધૂરું રહે છે, જેથી અપૂર્ણ પ્રોટીન બને છે.", "C) પ્રોટીનના સંશ્લેષણ દરમિયાન વાંચન ફ્રેમ બદલાય છે, જેથી સંપૂર્ણ ભિન્ન પ્રોટીન બને છે.", "D) પ્રોટીનનું સંશ્લેષણ સંપૂર્ણ રીતે બંધ થઈ જાય છે, જેથી કોઈ પ્રોટીન બનતું નથી."], "correct": 1, "explanation": "નાન્સેન્સ મ્યુટેશનમાં, કોડોન એવો બદલાય છે કે જે પ્રીમેચ્યુર સ્ટોપ કોડોન બને છે. આથી પ્રોટીનનું સંશ્લેષણ અધૂરું રહે છે અને અપૂર્ણ પ્રોટીન બને છે. વિકલ્પ A મિસેન્સ મ્યુટેશન વિશે છે, વિકલ્પ C ફ્રેમશિફ્ટ મ્યુટેશન વિશે છે, અને વિકલ્પ D સંપૂર્ણ બંધ થવાનું પરિણામ નાન્સેન્સ મ્યુટેશનમાં નથી.", "ncert_ref": "Class XII - Chapter 6: જૈવ-તકનીકી અને તેના ઉપયોગો (મ્યુટેશન અને તેના પ્રકારો)", "difficulty": "Hard", "num": 42}, {"question": "નીચેનામાંથી કયું ઉત્પરિવર્તન 'એપિજિનેટિક' ફેરફારનું ઉદાહરણ છે, જે DNA ક્રમમાં ફેરફાર કર્યા વિના જીનના પ્રગટીકરણને અસર કરે છે?", "options": ["A) ડી.એન.એ.માં મિથાઇલેશન દ્વારા જીનનું પ્રગટીકરણ બંધ થવું.", "B) ડી.એન.એ.માં એક બેઇઝનો ફેરફાર થવો.", "C) વર્ણસૂત્રમાં ડેલિશન થવું.", "D) ડી.એન.એ.માં ટ્રાન્સપોઝન થવું."], "correct": 0, "explanation": "એપિજિનેટિક ફેરફારો DNA ક્રમમાં ફેરફાર કર્યા વિના જીનના પ્રગટીકરણને અસર કરે છે. ડી.એન.એ.માં મિથાઇલેશન એ એપિજિનેટિક ફેરફારનું ઉદાહરણ છે, જેમાં જીનનું પ્રગટીકરણ બંધ થઈ શકે છે. વિકલ્પ B, C, અને D DNA ક્રમમાં ફેરફાર કરે છે, જેથી તે એપિજિનેટિક નથી.", "ncert_ref": "Class XII - Chapter 6: જૈવ-તકનીકી અને તેના ઉપયોગો (એપિજિનેટિક્સ)", "difficulty": "Hard", "num": 43}, {"question": "એક માનવ કોષમાં વર્ણસૂત્ર 4ના ટૂંકા ભુજ (p arm) પર આવેલા જનીનમાં 'ટ્રાઇન્યુક્લિયોટાઇડ રિપીટ એક્સપાન્શન' ઉત્પરિવર્તન થાય છે, જેના કારણે હન્ટિંગ્ટન રોગ (Huntington's disease) થાય છે. આ ઉત્પરિવર્તનના સંદર્ભમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) આ ઉત્પરિવર્તનમાં CAG રિપીટની સંખ્યા 36 કે તેથી વધુ થવાથી રોગના લક્ષણો દેખાય છે.", "B) આ ઉત્પરિવર્તન 'ડાયનેમિક મ્યુટેશન'નું ઉદાહરણ છે, જેમાં રિપીટની સંખ્યા પેઢીઓ દરમિયાન વધતી જાય છે.", "C) આ ઉત્પરિવર્તનથી ઉત્પન્ન થતું અસામાન્ય પ્રોટીન કોષકેન્દ્રમાં એકઠું થઈને ન્યુરોનના કાર્યમાં અવરોધ ઉભો કરે છે.", "D) આ ઉત્પરિવર્તન માત્ર પુરુષોમાં જ વારસાગત રીતે પ્રસરે છે, કારણ કે તે Y-વર્ણસૂત્ર સાથે સંકળાયેલું છે."], "correct": 3, "explanation": "વિકલ્પ D ખોટો છે કારણ કે હન્ટિંગ્ટન રોગ ઓટોસોમલ પ્રભાવી રીતે વારસાગત થાય છે અને તે X કે Y વર્ણસૂત્ર સાથે સંકળાયેલ નથી. તે પુરુષો અને સ્ત્રીઓ બંનેમાં થઈ શકે છે. વિકલ્પ A, B અને C સાચાં છે કારણ કે: A) CAG રિપીટની સંખ્યા 36 કે તેથી વધુ હોય તો રોગના લક્ષણો દેખાય છે (NCERT Class XII, Chapter 5: આનુવંશિકતા અને ઉત્ક્રાંતિ), B) આ ઉત્પરિવર્તન ડાયનેમિક મ્યુટેશનનું ઉદાહરણ છે જેમાં રિપીટની સંખ્યા પેઢીઓ દરમિયાન વધે છે, C) અસામાન્ય પ્રોટીન (હન્ટિંગ્ટિન) કોષકેન્દ્રમાં એકઠું થઈને ન્યુરોનના કાર્યમાં અવરોધ ઉભો કરે છે.", "ncert_ref": "Class XII - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ (પૃષ્ઠ 94-95)", "difficulty": "Hard", "num": 44}, {"question": "એક પ્રયોગમાં, બેક્ટેરિયાના કોષમાં 'ટ્રાન્સપોઝન' (Transposon) દ્વારા ઉત્પરિવર્તન થાય છે, જેના કારણે એન્ટિબાયોટિક પ્રતિરોધકતા જનીન (antibiotic resistance gene) નિષ્ક્રિય થઈ જાય છે. આ ઉત્પરિવર્તનના સંદર્ભમાં નીચેનામાંથી કયું વિધાન યોગ્ય નથી?", "options": ["A) ટ્રાન્સપોઝન DNAના એક ભાગનું એક સ્થાનેથી બીજા સ્થાને સ્થાનાંતરણ છે, જે 'કટ-એન્ડ-પેસ્ટ' અથવા 'કોપી-એન્ડ-પેસ્ટ' પદ્ધતિથી થઈ શકે છે.", "B) જો ટ્રાન્સપોઝન એન્ટિબાયોટિક પ્રતિરોધકતા જનીનની અંદર દાખલ થાય, તો તે જનીનના વાંચન ફ્રેમમાં ફેરફાર કરીને તેને નિષ્ક્રિય કરી શકે છે.", "C) ટ્રાન્સપોઝન દ્વારા થતું ઉત્પરિવર્તન હંમેશા હાનિકારક હોય છે અને તે કોષના જીવનચક્રને સંપૂર્ણપણે અટકાવી દે છે.", "D) ટ્રાન્સપોઝનને 'જમ્પિંગ જીન્સ' પણ કહેવામાં આવે છે, જે જનીનોમાં નવી વિવિધતા લાવવામાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે."], "correct": 2, "explanation": "વિકલ્પ C ખોટો છે કારણ કે ટ્રાન્સપોઝન દ્વારા થતું ઉત્પરિવર્તન હંમેશા હાનિકારક હોવું જરૂરી નથી. ઘણી વખત તે કોષના જીવનચક્રને અસર કર્યા વગર નવી જનીનિક વિવિધતા લાવી શકે છે. વિકલ્પ A, B અને D સાચાં છે કારણ કે: A) ટ્રાન્સપોઝન DNAના એક ભાગનું સ્થાનાંતરણ છે જે 'કટ-એન્ડ-પેસ્ટ' અથવા 'કોપી-એન્ડ-પેસ્ટ' પદ્ધતિથી થઈ શકે છે (NCERT Class XII, Chapter 5), B) ટ્રાન્સપોઝન જનીનની અંદર દાખલ થઈને વાંચન ફ્રેમ બદલી શકે છે, D) ટ્રાન્સપોઝનને 'જમ્પિંગ જીન્સ' કહે છે જે જનીનિક વિવિધતા લાવવામાં મદદ કરે છે.", "ncert_ref": "Class XII - પ્રકરણ 5: આનુવંશિકતા અને ઉત્ક્રાંતિ (પૃષ્ઠ 92-93)", "difficulty": "Hard", "num": 45}, {"question": "એક માનવ કોષમાં વર્ણસૂત્ર 4ના ટૂંકા ભુજ (p arm) પર આવેલા જીનમાં 'રોબર્ટસોનિયન ટ્રાન્સલોકેશન' થાય છે. નીચેનામાંથી કયું વિધાન સૌથી યોગ્ય છે?", "options": ["A) વર્ણસૂત્ર 4નો ટૂંકો ભુજ વર્ણસૂત્ર 14ના ટૂંકા ભુજ સાથે જોડાય છે, જેથી એક મોટું મેટાસેન્ટ્રિક વર્ણસૂત્ર બને છે.", "B) વર્ણસૂત્ર 4નો ટૂંકો ભુજ વર્ણસૂત્ર 21ના લાંબા ભુજ સાથે જોડાય છે, જેથી એક નાનું એક્રોસેન્ટ્રિક વર્ણસૂત્ર બને છે.", "C) વર્ણસૂત્ર 4નો ટૂંકો ભુજ વર્ણસૂત્ર 4ના લાંબા ભુજ સાથે જોડાય છે, જેથી એક રિંગ વર્ણસૂત્ર બને છે.", "D) વર્ણસૂત્ર 4નો ટૂંકો ભુજ વર્ણસૂત્ર Xના ટૂંકા ભુજ સાથે જોડાય છે, જેથી લિંગ-સંકળિત રોગ થાય છે."], "correct": 0, "explanation": "રોબર્ટસોનિયન ટ્રાન્સલોકેશન એ એવી ઘટના છે જેમાં બે એક્રોસેન્ટ્રિક વર્ણસૂત્રોના ટૂંકા ભુજ એકબીજા સાથે જોડાય છે, જેથી એક મોટું મેટાસેન્ટ્રિક વર્ણસૂત્ર બને છે. વર્ણસૂત્ર 4 અને 14ના ટૂંકા ભુજના જોડાણથી આ ઘટના થાય છે. વિકલ્પ B, C, અને D આ ઘટનાને યોગ્ય રીતે વર્ણવતો નથી.", "ncert_ref": "Class XII - Chapter 5: અનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "difficulty": "Hard", "num": 46}, {"question": "એક જીવમાં ડી.એન.એ.ના એક જીનમાં 'સ્પ્લાઇસિંગ મ્યુટેશન' થાય છે. નીચેનામાંથી કયું પરિણામ સૌથી યોગ્ય રીતે આ ઉત્પરિવર્તનનું વર્ણન કરે છે?", "options": ["A) mRNAમાં ઇન્ટ્રોનના ભાગો રહી જાય છે, જેના કારણે અપૂર્ણ પ્રોટીન બને છે.", "B) mRNAમાં એક્સોનના ભાગો કાપી નાખવામાં આવે છે, જેના કારણે પ્રોટીનનું સંશ્લેષણ થતું નથી.", "C) mRNAમાં ટ્રાન્સલેશન દરમિયાન વાંચન ફ્રેમ બદલાય છે, જેના કારણે લાંબી પ્રોટીન શૃંખલા બને છે.", "D) mRNAમાં કોડોનની ગોઠવણી બદલાય છે, પરંતુ પ્રોટીનના એમિનો એસિડ ક્રમમાં કોઈ ફેરફાર થતો નથી."], "correct": 0, "explanation": "સ્પ્લાઇસિંગ મ્યુટેશનમાં, ઇન્ટ્રોનને કાપી નાખવાની પ્રક્રિયા ખોરવાય છે, જેના કારણે mRNAમાં ઇન્ટ્રોનના ભાગો રહી જાય છે. આના કારણે અપૂર્ણ અથવા ક્રિયાશીલ પ્રોટીન બને છે. ઓપ્શન A સૌથી યોગ્ય છે. ઓપ્શન B ખોટું છે કારણ કે એક્સોન કાપી નાખવાનું નહીં, પરંતુ ઇન્ટ્રોન રહી જાય છે. ઓપ્શન C ખોટું છે કારણ કે વાંચન ફ્રેમ બદલાવાનું કારણ ફ્રેમશિફ્ટ મ્યુટેશન છે, નહીં સ્પ્લાઇસિંગ મ્યુટેશન. ઓપ્શન D ખોટું છે કારણ કે સ્પ્લાઇસિંગ મ્યુટેશન પ્રોટીનના એમિનો એસિડ ક્રમને અસર કરે છે.", "ncert_ref": "Class XII - Chapter 5: અનુવંશિકતા અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 47}, {"question": "એક માનવ કોષમાં વર્ણસૂત્ર 21 ની ટ્રાઇસોમી (ડાઉન સિન્ડ્રોમ) નું કારણ નીચેનામાંથી કયું ઉત્પરિવર્તન હોઈ શકે?", "options": ["A) વર્ણસૂત્ર 21 ની નોન્ડિસજંકશન", "B) વર્ણસૂત્ર 21 ની ડેલિશન", "C) વર્ણસૂત્ર 21 ની ડુપ્લિકેશન", "D) વર્ણસૂત્ર 21 ની ઇનવર્ઝન"], "correct": 0, "explanation": "ડાઉન સિન્ડ્રોમ (ટ્રાઇસોમી 21) નું સૌથી સામાન્ય કારણ વર્ણસૂત્ર 21 ની નોન્ડિસજંકશન છે, જેના કારણે ગેમેટમાં વર્ણસૂત્ર 21 ની બે કોપી રહે છે. ઓપ્શન A સહી છે. ડેલિશન (B), ડુપ્લિકેશન (C), અને ઇનવર્ઝન (D) એ ટ્રાઇસોમીનું કારણ બનતા નથી.", "ncert_ref": "Class XII - Chapter 5: અનુવંશિકતા અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 48}, {"question": "નીચેનામાંથી કયું વિધાન 'રોબર્ટસોનિયન ટ્રાન્સલોકેશન' વિશે ખોટું છે?", "options": ["A) આ ટ્રાન્સલોકેશનમાં, બે અક્રોસેન્ટ્રિક વર્ણસૂત્રોના લાંબા ભુજા જોડાઈને એક નવું વર્ણસૂત્ર બનાવે છે.", "B) આ ટ્રાન્સલોકેશનના કારણે કોષમાં વર્ણસૂત્રની સંખ્યા ઘટે છે.", "C) આ ટ્રાન્સલોકેશનના કારણે કોષમાં જનીનની સંખ્યા બદલાય છે.", "D) આ ટ્રાન્સલોકેશનના કારણે કોષમાં ફિનોટાઇપમાં કોઈ ફેરફાર થતો નથી."], "correct": 3, "explanation": "રોબર્ટસોનિયન ટ્રાન્સલોકેશનમાં, બે અક્રોસેન્ટ્રિક વર્ણસૂત્રોના લાંબા ભુજા જોડાઈને એક નવું વર્ણસૂત્ર બનાવે છે (A સહી). આના કારણે કોષમાં વર્ણસૂત્રની સંખ્યા 46 થી 45 થાય છે (B સહી). જનીનની સંખ્યામાં કોઈ ફેરફાર થતો નથી (C ખોટું નથી, કારણ કે જનીનની સંખ્યા સમાન રહે છે). ફિનોટાઇપમાં ફેરફાર થઈ શકે છે, ખાસ કરીને જો ટ્રાન્સલોકેશનના કારણે અન્ય જનીનની અભિવ્યક્તિ અસર પામે (D ખોટું છે).", "ncert_ref": "Class XII - Chapter 5: અનુવંશિકતા અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 49}, {"question": "એક માનવ કોષમાં 'ટ્રાઇન્યુક્લિયોટાઇડ રિપીટ એક્સપાન્શન' (trinucleotide repeat expansion) ઉત્પરિવર્તન થવાથી હન્ટિંગ્ટન રોગ (Huntington's disease) થાય છે. આ ઉત્પરિવર્તનના સંદર્ભમાં નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) આ ઉત્પરિવર્તનમાં CAG રિપીટની સંખ્યા સામાન્ય કરતાં વધી જાય છે, જે હન્ટિંગ્ટિન પ્રોટીનમાં પોલિગ્લુટામિન ટ્રેક બનાવે છે", "B) આ ઉત્પરિવર્તન 'એન્ટિસિપેશન' (anticipation) નું ઉદાહરણ છે, જેમાં દરેક પેઢીમાં રોગની તીવ્રતા અને શરૂઆતની ઉંમરમાં વધારો થાય છે", "C) આ ઉત્પરિવર્તન વર્ણસૂત્ર 4ના ટૂંકા ભુજ (p arm) પર આવેલા HTT જનીનમાં થાય છે, જે પ્રોટીનનું કાર્ય સંપૂર્ણપણે નષ્ટ કરી દે છે", "D) આ ઉત્પરિવર્તનમાં રિપીટની સંખ્યા 36 કે તેથી વધુ થવાથી રોગના લક્ષણો દેખાવા લાગે છે, જ્યારે સામાન્ય વ્યક્તિ         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
