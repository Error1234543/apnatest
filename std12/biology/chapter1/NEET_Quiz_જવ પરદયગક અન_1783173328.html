<!DOCTYPE html>
<html lang="Gujarati">
<head>

    <title>નીટ ક્વિઝ - જૈવ પ્રૌદ્યોગિકી અને તેના ઉપયોગો
આનુવંશિક અભિયાંત્રીકરણ (Genetic Engineering)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 જૈવ પ્રૌદ્યોગિકી અને તેના ઉપયોગો
આનુવંશિક અભિયાંત્રીકરણ (Genetic Engineering)</span>
                <span>🎯 Hard</span>
                <span>📝 40 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>

            </div>

        <div class="result-box" id="resultBox">

                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "જૈવ પ્રૌદ્યોગિકીમાં વપરાતા પ્લાઝમિડમાં કયા જનીનનો સમાવેશ કરવામાં આવે છે જેથી બેક્ટેરિયા પોતાની આસપાસના મધ્યમાં રહેલા એન્ટિબાયોટિક પ્રત્યે પ્રતિરોધક બને?", "options": ["A) લેક-ઝેડ જનીન", "B) એમ્પીસિલિન પ્રતિરોધક જનીન", "C) ઇન્સ્યુલિન જનીન", "D) ગ્લોકોઝ ઓક્સિડેઝ જનીન"], "correct": 1, "explanation": "બેક્ટેરિયામાં પ્લાઝમિડ દ્વારા અનુવંશિક અભિયાંત્રીકરણ કરતી વખતે, એમ્પીસિલિન પ્રતિરોધક જનીન (β-લેક્ટમેઝ)નો સમાવેશ કરવામાં આવે છે, જેથી ટ્રાન્સફોર્મ્ડ બેક્ટેરિયા એન્ટિબાયોટિક યુક્ત મધ્યમાં વૃદ્ધિ પામી શકે. લેક-ઝેડ જનીન બ્લૂ-વ્હાઇટ કોલોની સ્ક્રીનિંગ માટે વપરાય છે, ઇન્સ્યુલિન જનીન ઇન્સ્યુલિન ઉત્પાદન માટે વપરાય છે, અને ગ્લોકોઝ ઓક્સિડેઝ જનીન ગ્લુકોઝના ઓક્સિડેશન માટે વપરાય છે.", "ncert_ref": "Class XII - પ્રકરણ 11: જૈવ પ્રૌદ્યોગિકી: સિદ્ધાંત અને પ્રક્રિયાઓ", "difficulty": "Hard", "num": 1}, {"question": "અનુવંશિક અભિયાંત્રીકરણ દ્વારા ઉત્પાદિત થયેલા પ્રથમ હ્યુમન પ્રોટીન કયું હતું અને તે કયા જીવાણુનો ઉપયોગ કરીને ઉત્પાદિત કરવામાં આવ્યું હતું?", "options": ["A) ઇન્સ્યુલિન, ઇ. કોલાઈ", "B) વૃદ્ધિ હોર્મોન, બેસિલસ સબ્ટિલિસ", "C) ઇન્ટરફેરોન, સ્યુડોમોનાસ", "D) હિપેટાઇટિસ B વેક્સીન, સેકરોમાઇસીસ સેરિવિસિએ"], "correct": 0, "explanation": "અનુવંશિક અભિયાંત્રીકરણ દ્વારા ઉત્પાદિત થયેલા પ્રથમ હ્યુમન પ્રોટીન ઇન્સ્યુલિન હતું, જે ઇ. કોલાઈ (Escherichia coli) નામના બેક્ટેરિયાનો ઉપયોગ કરીને ઉત્પાદિત કરવામાં આવ્યું હતું. વૃદ્ધિ હોર્મોન, ઇન્ટરફેરોન અને હિપેટાઇટિસ B વેક્સીન પછીથી વિકસાવવામાં આવ્યા હતા.", "ncert_ref": "Class XII - પ્રકરણ 11: જૈવ પ્રૌદ્યોગિકી: સિદ્ધાંત અને પ્રક્રિયાઓ", "difficulty": "Hard", "num": 2}, {"question": "પીસીઆર (PCR) પ્રક્રિયામાં વપરાતા ઉત્સેચકનું નામ જણાવો અને તે કયા જીવમાંથી મેળવવામાં આવે છે?", "options": ["A) DNA પોલિમરેઝ, થર્મસ એક્વેટિકસ", "B) RNA પોલિમરેઝ, ઇ. કોલાઈ", "C) લાયગેઝ, બેક્ટેરિયોફેજ", "D) રેસ્ટ્રિક્શન એન્ડોન્યુક્લિએઝ, બેસિલસ એમાઇલોલિક્વિફેસિયન્સ"], "correct": 0, "explanation": "પીસીઆર પ્રક્રિયામાં વપરાતા ઉત્સેચકનું નામ DNA પોલિમરેઝ છે, જે થર્મસ એક્વેટિકસ (Thermus aquaticus) નામના જીવમાંથી મેળવવામાં આવે છે. આ ઉત્સેચક ઉચ્ચ  ["A) CRISPR-Cas9 જનીન જેથી મચ્છરની પ્રજનન ક્ષમતા ઘટે", "B) ડેંગ્યુ વાયરસના એન્વેલપ પ્રોટીનને કોડ કરતું જનીન જેથી રોગપ્રતિકારક તંત્ર સક્રિય થાય", "C) Wolbachia બેક્ટેરિયાના જનીન જેથી મચ્છરમાં સાયટોપ્લાઝમિક અસંગતતા (cytoplasmic incompatibility) ઉત્પન્ન થાય", "D) હ્યુમન ઇન્ટરલ્યુકિન-2 જનીન જેથી મચ્છરની રોગપ્રતિકારક ક્ષમતા વધે"], "correct": 2, "explanation": "ટ્રાન્સજેનિક ડેંગ્યુ-પ્રતિરોધક મચ્છરોમાં Wolbachia બેક્ટેરિયાના જનીનનો સમાવેશ કરવામાં આવે છે. Wolbachia બેક્ટેરિયા મચ્છરની પ્રજનન ક્ષમતાને અસર કરે છે અને ડેંગ્યુ વાયરસના પ્રસારને રોકવામાં મદદ કરે છે. આ તંત્ર દ્વારા સાયટોપ્લાઝમિક અસંગતતા (cytoplasmic incompatibility) ઉત્પન્ન થાય છે, જેથી ડેંગ્યુ વાયરસના પ્રસારને રોકી શકાય. અહીં, વિકલ્પ C સાચો છે. વિકલ્પ A CRISPR-Cas9 જનીન પ્રજનન ક્ષમતાને ઘટાડે છે પરંતુ ડેંગ્યુ પ્રતિરોધકતાને સીધી રીતે અસર કરતું નથી. વિકલ્પ B ડેંગ્યુ વાયરસના પ્રોટીનને કોડ કરે છે પરંતુ મચ્છરમાં રોગપ્રતિકારક તંત્ર સક્રિય કરવા માટે તે યોગ્ય નથી. વિકલ્પ D હ્યુમન ઇન્ટરલ્યુકિન-2 જનીન મચ્છરની રોગપ્રતિકારક ક્ષમતાને વધારી શકે પરંતુ ડેંગ્યુ પ્રસાર રોકવા માટે તે સીધો ઉપાય નથી.", "ncert_ref": "Class XII - પ્રકરણ 12: જૈવ પ્રૌદ્યોગિકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 21}, {"question": "અનુવંશિક અભિયાંત્રીકરણ પ્રક્રિયામાં, 'અવરોધક ન્યુક્લિયેઝ' (Restriction endonuclease) ઉત્સેચકોનો ઉપયોગ કયા હેતુ માટે થાય છે?", "options": ["A) DNA ની નકલ કરવા માટે", "B) DNA ના વિશિષ્ટ સ્થાને કાપવા માટે જેથી વિદેશી DNA નો સમાવેશ કરી શકાય", "C) RNA નું DNA માં રૂપાંતર કરવા માટે", "D) પ્રોટીન સંશ્લેષણને વેગ આપવા માટે"], "correct": 1, "explanation": "અવરોધક ન્યુક્લિયેઝ ઉત્સેચકોનો ઉપયોગ DNA ના વિશિષ્ટ સ્થાને કાપવા માટે થાય છે, જેથી વિદેશી DNA નો સમાવેશ કરી શકાય. આ પ્રક્રિયા અનુવંશિક અભિયાંત્રીકરણમાં મહત્વપૂર્ણ પગલું છે. વિકલ્પ A DNA ની નકલ કરવા માટે પોલિમરેઝ ઉત્સેચકનો ઉપયોગ થાય છે. વિકલ્પ C RNA નું DNA માં રૂપાંતર કરવા માટે રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચકનો ઉપયોગ થાય છે. વિકલ્પ D પ્રોટીન સંશ્લેષણને વેગ આપવા માટે રાઇબોઝોમની ભૂમિકા હોય છે, ઉત્સેચકોની નહીં.", "ncert_ref": "Class XII - પ્રકરણ 11: અનુવંશિક અભિયાંત્રીકરણ", "difficulty": "Hard", "num": 22}, {"question": "જૈવ પ્રૌદ્યોગિકીમાં, 'બાયોરિએક્ટર' નો ઉપયોગ કયા હેતુ માટે થાય છે?", "options": ["A) જૈવિક પદાર્થોના નિષ્ક્રિયીકરણ માટે", "B) ઉચ્ચ પ્રમાણમાં જૈવિક ઉત્પાદનો (જેવા કે પ્રોટીન, એન્ટિબાયોટિક્સ) ઉત્પન્ન કરવા માટે", "C) DNA નું અનુક્રમણ (sequencing) કરવા માટે", "D) કોષોના વિભાજનને રોકવા માટે"], "correct": 1, "explanation": "બાયોરિએક્ટરનો ઉપયોગ ઉચ્ચ પ્રમાણમાં જૈવિક ઉત્પાદનો જેવા કે પ્રોટીન, એન્ટિબાયોટિક્સ, હોર્મોન વગેરે ઉત્પન્ન કરવા માટે થાય છે. આ ઉપકરણમાં જૈવિક પ્રક્રિયાઓને નિયંત્રિત પરિસ્થિતિઓમાં હાથ ધરવામાં આવે છે. વિકલ્પ A જૈવિક પદાર્થોના નિષ્ક્રિયીકરણ માટે ઓટોક્લેવ અથવા રાસાયણિક પદ્ધતિઓનો ઉપયોગ થાય છે. વિકલ્પ C DNA નું અનુક્રમણ કરવા માટે સેંગર પદ્ધતિ અથવા આધુનિક ટેકનોલોજીનો ઉપયોગ થાય છે. વિકલ્પ D કોષોના વિભાજનને રોકવા માટે કોલ્ચિસિન જેવા રસાયણોનો ઉપયોગ થાય છે.", "ncert_ref": "Class XII - પ્રકરણ 12: જૈવ પ્રૌદ્યોગિકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 23}, {"question": "અનુવંશિક અભિયાંત્રીકરણ દ્વારા ઉત્પાદિત 'ટ્રાન્સજેનિક પશુઓ'માં કયા હેતુ માટે 'લેક્ટોફેરિન' જનીનનો સમાવેશ કરવામાં આવે છે?", "options": ["A) દૂધના ઉત્પાદનમાં વધારો કરવા માટે", "B) દૂધમાં એન્ટિબાયોટિક પ્રોટીનનો સમાવેશ કરવા માટે જેથી બચ્ચાઓને રોગપ્રતિકારકતા મળે", "C) માંસના ઉત્પાદનમાં વધારો કરવા માટે", "D) પશુઓની વૃદ્ધિ દરમાં વધારો કરવા માટે"], "correct": 1, "explanation": "લેક્ટોફેરિન એ એક એન્ટિબાયોટિક પ્રોટીન છે જે દૂધમાં સમાવેશ કરવામાં આવે છે જેથી બચ્ચાઓને રોગપ્રતિકારકતા મળે. આ જનીનનો સમાવેશ ટ્રાન્સજેનિક પશુઓમાં કરવામાં આવે છે જેથી તેમના દૂધમાં લેક્ટોફેરિનનું પ્રમાણ વધે. વિકલ્પ A દૂધના ઉત્પાદનમાં વધારો કરવા માટે ગ્રોથ હોર્મોન જનીનનો સમાવેશ કરવામાં આવે છે. વિકલ્પ C માંસના ઉત્પાદનમાં વધારો કરવા માટે માયોસ્ટેટિન જનીનને નિષ્ક્રિય કરવામાં આવે છે. વિકલ્પ D પશુઓની વૃદ્ધિ દરમાં વધારો કરવા માટે ગ્રોથ હોર્મોન જનીનનો સમાવેશ કરવામાં આવે છે.", "ncert_ref": "Class XII - પ્રકરણ 12: જૈવ પ્રૌદ્યોગિકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 24}, {"question": "અનુવંશિક અભિયાંત્રીકરણ પ્રક્રિયામાં, જ્યારે 'Ti પ્લાઝમિડ' નો ઉપયોગ કરવામાં આવે છે, ત્યારે નીચેના પૈકી કયું "explanation": "લાઇસોઝાઇમ જનીનને ટ્રાન્સજેનિક સલામોમાં સંકલિત કરવાથી રોગપ્રતિકારક શક્તિ મળે છે, પરંતુ તેના કારણે સલામોના વૃદ્ધિ દરમાં ઘટાડો થાય છે. લેક્ટોફેરિન જનીન પણ રોગપ્રતિકારક શક્તિ આપે છે, પરંતુ તે વૃદ્ધિ દર પર નોંધપાત્ર અસર કરતું નથી. ઇન્ટરફેરોન અને હ્યુમન ગ્રોથ હોર્મોન જનીનનો ઉપયોગ અન્ય હેતુઓ માટે થાય છે.", "ncert_ref": "Class XII - પ્રકરણ 12: જૈવ પ્રૌદ્યોગિકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 27}, {"question": "નીચેનામાંથી કયા ઉત્સેચકનો ઉપયોગ અનુવંશિક અભિયાંત્રીકરણ પ્રક્રિયામાં 'સંકરણ (Ligation)' પગલામાં થતો નથી?", "options": ["A) DNA લાઇગેઝ", "B) અવરોધક ન્યુક્લિયેઝ", "C) T4 DNA લાઇગેઝ", "D) E. coli DNA લાઇગેઝ"], "correct": 1, "explanation": "સંકરણ (Ligation) પગલામાં DNA લાઇગેઝ ઉત્સેચકનો ઉપયોગ થાય છે, જેમાં T4 DNA લાઇગેઝ અને E. coli DNA લાઇગેઝનો સમાવેશ થાય છે. અવરોધક ન્યુક્લિયેઝ ઉત્સેચકનો ઉપયોગ DNA ને કાપવા માટે થાય છે, સંકરણ માટે નહીં.", "ncert_ref": "Class XII - પ્રકરણ 11: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "difficulty": "Hard", "num": 28}, {"question": "જૈવ પ્રૌદ્યોગિકીમાં, 'બાયોરિએક્ટર' નો ઉપયોગ નીચેનામાંથી કયા હેતુ માટે થતો નથી?", "options": ["A) જૈવ રાસાયણિક પદાર્થોના ઉત્પાદન માટે", "B) ઉત્સેચકોના ઉત્પાદન માટે", "C) પેશી સંવર્ધન માટે", "D) DNA ની નકલ કરવા માટે"], "correct": 3, "explanation": "બાયોરિએક્ટરનો ઉપયોગ જૈવ રાસાયણિક પદાર્થો (A), ઉત્સેચકો (B), અને પેશી સંવર્ધન (C) માટે થાય છે. DNA ની નકલ કરવા માટે PCR પ્રક્રિયાનો ઉપયોગ થાય છે, બાયોરિએક્ટરનો નહીં.", "ncert_ref": "Class XII - પ્રકરણ 12: જૈવ પ્રૌદ્યોગિકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 29}, {"question": "અનુવંશિક અભિયાંત્રીકરણ પ્રક્રિયામાં, જ્યારે 'pBR322' પ્લાઝમિડનો ઉપયોગ વાહક તરીકે કરવામાં આવે છે, ત્યારે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) આ પ્લાઝમિડમાં ampicillin અને tetracycline પ્રતિરોધક જનીનો સમાવેશ થાય છે, પરંતુ તેના કોષમાં પ્રવેશ કરતા પહેલા તેને અવરોધક ન્યુક્લિયેઝ દ્વારા કાપવું પડે છે.", "B) આ પ્લાઝમિડમાં ori (origin of replication) વિસ્તાર હોવાથી તે સ્વતંત્ર રીતે બેક્ટેરિયલ કોષમાં પ્રતિકૃતિ પામી શકે છે, પરંતુ તેમાં કોઈ સેલેક્ટેબલ માર્કર જનીન હોતું નથી.", "C) આ પ્લાઝમિડમાં લેખન પ્રારંભ સ્થળ (promoter) હોવાથી તે યજમાન કોષમાં જનીનના વ્યક્તીકરણને સક્રિય કરે છે, પરંતુ તે બેક્ટેરિયા સિવાયના કોષમાં કાર્ય કરતું નથી.", "D) આ પ્લાઝમિડમાં MCS (Multiple Cloning Site) હોવાથી તે એક સાથે ઘણા જનીનોને સંકલિત કરવા સક્ષમ છે, પરંતુ તેના કોષમાં પ્રવેશ કરતા પહેલા તેને ડી-ફોસ્ફોરાઇલેશન કરવું પડે છે."], "correct": 0, "explanation": "વિકલ્પ A સત્ય છે કારણ કે pBR322 પ્લાઝમિડમાં ampicillin અને tetracycline પ્રતિરોધક જનીનો હોવાથી તે સેલેક્ટેબલ માર્કર તરીકે કાર્ય કરે છે, અને અવરોધક ન્યુક્લિયેઝ દ્વારા કાપીને તેને લક્ષ્ય જનીન સંકલિત કરવા માટે તૈયાર કરવામાં આવે છે. વિકલ્પ B ખોટો છે કારણ કે pBR322માં ori વિસ્તાર ઉપરાંત ampicillin અને tetracycline પ્રતિરોધક જનીનો સેલેક્ટેબલ માર્કર તરીકે હાજર હોય છે. વિકલ્પ C ખોટો છે કારણ કે pBR322માં લેખન પ્રારંભ સ્થળ (promoter) હોવા છતાં, તે યજમાન કોષમાં જનીનના વ્યક્તીકરણને સક્રિય કરે છે, પરંતુ તે બેક્ટેરિયા સિવાયના કોષમાં પણ કાર્ય કરી શકે છે જો યોગ્ય પરિસ્થિતિઓ પૂરી પાડવામાં આવે. વિકલ્પ D ખોટો છે કારણ કે pBR322માં MCS હોવા છતાં, તે એક સમયે એક જ જનીનને સંકલિત કરવા માટે વપરાય છે, અને તેના કોષમાં પ્રવેશ કરતા પહેલા ડી-ફોસ્ફોરાઇલેશનની જરૂર રહેતી નથી.", "ncert_ref": "Class XII - Chapter 12: જૈવ પ્રૌદ્યોગિકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 30}, {"question": "અનુવંશિક અભિયાંત્રીકરણ પ્રક્રિયામાં, જ્યારે 'Bt ટોક્સિન' જનીનને કપાસના પૌધામાં સંકલિત કરવામાં આવે છે, ત્યારે નીચેનામાંથી કયો પરિબળ પૌધાની કીટકપ્રતિરોધક ક્ષમતાને સીધો અસર કરતો નથી?", "options": ["A) Bt ટોક્સિન જનીનની અભિવ્યક્તિનો દર", "B) પૌધાના વર્ણસૂત્રમાં જનીન સંકલનની જગ્યા", "C) પૌધાના કોષમાં ક્લોરોફિલની હાજરી", "D) પ્રમોટર પ્રકાર જે Bt જનીન સાથે જોડાયેલ છે"], "correct": 2, "explanation": "Bt ટોક્સિન જનીનની અભિવ્યક્તિનો દર (A), જનીન સંકલનની જગ્યા (B), અને પ્રમોટર પ્રકાર (D) એ બધા પૌધાની કીટકપ્રતિરોધક ક્ષમતાને સીધી અસર કરે છે. ક્લોરોફિલ (C) પ્રકાશસંશ્લેષણ સાથે સંબંધિત છે અને કીટકપ્રતિરોધકતામાં સીધો ભાગ ભજવતો નથી.", "ncert_ref": "Class XII - Chapter 12: જૈવ પ્રૌદ્યોગિકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 31}, {"question": "નીચેનામાંથી કયું વિધાન 'ટ્રાન્સજેનિક પશુઓ' વિશે સાચું નથી?", "options": ["A) ટ્રાન્સજેનિક ગાયમાં લેક્ટોફેરિન જનીનનો સમાવેશ કરવાથી દૂધમાં લેક્ટોફેરિનનું પ્રમાણ વધે છે", "B) ટ્રાન્સજેનિક ડુક્કરમાં હ્યુમન ગ્રોથ હોર્મોન જનીનનો સમાવેશ કરવાથી માંસનું ઉત્પાદન વધે છે", "C) ટ્રાન્સજેનિક મરઘીમાં ઇન્ટરફેરોન જનીનનો સમાવેશ કરવાથી અંડામાં પ્રોટીનનું પ્રમાણ વધે છે", "D) ટ્રાન્સજેનિક બકરીમાં હ્યુમન ઇન્સ્યુલિન જનીનનો સમાવેશ કરવાથી દૂધમાં ઇન્સ્યુલિન મળી શકે છે"], "correct": 2, "explanation": "ટ્રાન્સજેનિક મરઘીમાં ઇન્ટરફેરોન જનીનનો સમાવેશ કરવાથી રોગપ્રતિકારક ક્ષમતા વધે છે, પરંતુ અંડામાં પ્રોટીનનું પ્રમાણ વધવાનું વિધાન સાચું નથી. બાકીના તમામ વિધાનો સાચા છે: લેક્ટોફેરિન (A), હ્યુમન ગ્રોથ હોર્મોન (B), અને હ્યુમન ઇન્સ્યુલિન (D) ના સમાવેશથી અનુક્રમે દૂધમાં લેક્ટોફેરિન, માંસનું ઉત્પાદન, અને દૂધમાં ઇન્સ્યુલિન મળી શકે છે.", "ncert_ref": "Class XII - Chapter 12: જૈવ પ્રૌદ્યોગિકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 32}, {"question": "ટ્રાન્સજેનિક પૌધોમાં 'Bt ટોક્સિન' જનીનનો સંકલન કરતી વખતે, નીચેનામાંથી કયો પરિબળ સૌથી વધુ અસરકારક રીતે કીટકપ્રતિરોધકતા પ્રદાન કરે છે?", "options": ["A) Bt ટોક્સિન જનીનની ઉચ્ચ પ્રમાણમાં અભિવ્યક્તિ", "B) Bt ટોક્સિન જનીનનું કોષકેન્દ્રીય DNAમાં સંકલન", "C) Bt ટોક્સિન જનીનનું ક્લોરોપ્લાસ્ટ DNAમાં સંકલન", "D) Bt ટોક્સિન જનીનનું મિટોકોન્ડ્રિયલ DNAમાં સંકલન"], "correct": 2, "explanation": "Bt ટોક્સિન જનીનનું ક્લોરોપ્લાસ્ટ DNAમાં સંકલન કરવાથી તેની અભિવ્યક્તિ વધુ સ્થિર અને ઉચ્ચ પ્રમાણમાં થાય છે, કારણ કે ક્લોરોપ્લાસ્ટમાં જનીનની નકલની સંખ્યા વધુ હોય છે. કોષકેન્દ્રીય DNA (B)માં સંકલન થતું હોય છે, પરંતુ તે ક્લોરોપ્લાસ્ટ જેવી અભિવ્યક્તિ આપતું નથી. મિટોકોન્ડ્રિયલ DNA (D)માં સંકલન અસાધારણ છે અને તે પૌધાના વિકાસ પર અસર કરી શકે છે. ઉચ્ચ પ્રમાણમાં અભિવ્યક્તિ (A) મહત્વની છે, પરંતુ તે ક્લોરોપ્લાસ્ટ સંકલન જેવી અસરકારક નથી.", "ncert_ref": "Class XII - Chapter 12: જૈવ પ્રૌદ્યોગિકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 33}, {"question": "ટ્રાન્સજેનિક પશુઓમાં 'લેક્ટોફેરિન' જનીનનો સંકલન કરવાનો મુખ્ય હેતુ કયો છે?", "options": ["A) દૂધના ઉત્પાદનમાં વધારો કરવો", "B) રોગપ્રતિકારક શક         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;

                const userAns=userAnswers[index], correctAns=q.correct;

                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);

            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}

            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
