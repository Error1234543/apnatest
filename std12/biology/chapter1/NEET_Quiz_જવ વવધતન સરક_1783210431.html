<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - જૈવ વિવિધતાનું સંરક્ષણ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 જૈવ વિવિધતાનું સંરક્ષણ</span>
                <span>🎯 Hard</span>
                <span>📝 43 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "ભારતમાં બાયોસ્ફિયર રિઝર્વના કયા ઝોનમાં મનુષ્યની હસ્તક્ષેપની સૌથી ઓછી પરવાનગી આપવામાં આવે છે અને તેનું મુખ્ય ઉદ્દેશ્ય શું છે?", "options": ["A) કોર ઝોન – સંપૂર્ણ સંરક્ષણ અને પ્રાકૃતિક પારિસ્થિતિક તંત્રની જાળવણી", "B) બફર ઝોન – સીમાવર્તી ગતિવિધિઓ સાથે સંરક્ષણ અને સંશોધન", "C) ટ્રાન્ઝિશન ઝોન – સ્થાનિક સમુદાયો સાથે સહ-વ્યવસ્થાપન અને સતત વિકાસ", "D) કોર અને બફર ઝોન – પ્રાણી અને વનસ્પતિ પ્રજાતિઓના સંરક્ષણ માટે સંકર વિસ્તાર"], "correct": 0, "explanation": "કોર ઝોન બાયોસ્ફિયર રિઝર્વનો સૌથી સંવેદનશીલ ભાગ છે, જ્યાં મનુષ્યની હસ્તક્ષેપની સંપૂર્ણ મનાઈ હોય છે. તેનું મુખ્ય ઉદ્દેશ્ય પ્રાકૃતિક પારિસ્થિતિક તંત્રની જાળવણી અને જૈવ વિવિધતાનું સંપૂર્ણ સંરક્ષણ છે. બફર ઝોનમાં મર્યાદિત ગતિવિધિઓની પરવાનગી આપવામાં આવે છે, જ્યારે ટ્રાન્ઝિશન ઝોનમાં સ્થાનિક સમુદાયો સાથે સહ-વ્યવસ્થાપન થાય છે. કોર અને બફર ઝોનનો સંકર વિસ્તાર કોઈ અસ્તિત્વમાં નથી.", "ncert_ref": "Class XII - પ્રકરણ ૧૫: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 1}, {"question": "ઇન-સિટ્યુ સંરક્ષણ પદ્ધતિમાં નીચેનામાંથી કયું વલણ સૌથી યોગ્ય છે?", "options": ["A) વન્યજીવ અભયારણ્યોમાં પ્રાણીઓને કેદ કરવા અને તેમની સંભાળ રાખવા", "B) પ્રાકૃતિક આવાસસ્થાનમાં જ પ્રજાતિઓનું સંરક્ષણ કરવું અને તેમના પ્રાકૃતિક વાતાવરણને જાળવવું", "C) જૈવિક સંસાધનોનો ઉપયોગ કરતા પહેલા તેમને લેબોરેટરીમાં સંગ્રહિત કરવા", "D) દુર્લભ પ્રજાતિઓને ઉછેરવા માટે બોટેનિકલ ગાર્ડન અથવા ચિડિયાઘરમાં રાખવા"], "correct": 1, "explanation": "ઇન-સિટ્યુ સંરક્ષણ એટલે પ્રાકૃતિક આવાસસ્થાનમાં જ પ્રજાતિઓનું સંરક્ષણ કરવું. વન્યજીવ અભયારણ્યોમાં પ્રાણીઓને કેદ કરવા (A) એ એક્સ-સિટ્યુ સંરક્ષણ છે. જૈવિક સંસાધનોનો લેબોરેટરીમાં સંગ્રહ (C) અને બોટેનિકલ ગાર્ડન અથવા ચિડિયાઘરમાં રાખવા (D) પણ એક્સ-સિટ્યુ સંરક્ષણના ઉદાહરણો છે.", "ncert_ref": "Class XII - પ્રકરણ ૧૫: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 2}, {"question": "નીચેનામાંથી કયું કથન સત્ય નથી? (a) રેડ ડેટા બુકમાં દુર્લભ અને લુપ્ત થવાની કગાર પરની પ્રજાતિઓની માહિતી આપવામાં આવે છે. (b) સંરક્ષણ માટેના હોટસ્પોટ્સ એવા વિસ્તારો છે જ્યાં જૈવ વિવિધતા સૌથી ઓછી હોય છે. (c) જૈવ વિવિધતાનું ્થિતિક સેવાઓ, કૃષિ, દવા અને અન્ય મહત્વપૂર્ણ સંસાધનો પૂરા પાડે છે, જે સતત વિકાસ માટે આધારભૂત છે. જૈવ વિવિધતાનું સંરક્ષણ સતત વિકાસના માર્ગમાં અવરોધ નથી (A અસત્ય). જૈવ વિવિધતાનું સંરક્ષણ અને સતત વિકાસ પરસ્પર પૂરક છે, વિપરિત નહીં (C અસત્ય). જૈવ વિવિધતાનું સંરક્ષણ સતત વિકાસ માટે મહત્વપૂર્ણ છે (D અસત્ય).", "ncert_ref": "Class XII - પ્રકરણ ૧૫: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 5}, {"question": "જૈવ વિવિધતાનું સંરક્ષણ કરવા માટે 'જીન બેંક'ની સ્થાપના કરવામાં આવે છે. નીચેનામાંથી કયું કથન જીન બેંકના મુખ્ય ઉદ્દેશ્યને સૌથી ચોક્કસ રીતે વ્યાખ્યાયિત કરે છે?", "options": ["A) લુપ્ત થવાના આરે આવેલા પ્રાણીઓના જીવંત નમૂનાઓને સંગ્રહીને તેમની પ્રજનન ક્ષમતા જાળવી રાખવા", "B) વનસ્પતિ અને પ્રાણીઓના અનુવંશિક પદાર્થો (DNA) ના નમૂનાઓને લાંબા ગાળા સુધી સંગ્રહિત કરવા અને ભવિષ્યમાં ઉપયોગમાં લેવા", "C) દુર્લભ પ્રજાતિઓના બીજોને કૃત્રિમ રીતે ઉગાડીને તેમની સંખ્યામાં વૃદ્ધિ કરવા", "D) જંગલી પ્રદેશોમાં પ્રાણીઓના નિવાસસ્થાનોને પુનઃસ્થાપિત કરવા અને તેમની સંખ્યામાં સુધારો કરવા"], "correct": 1, "explanation": "જીન બેંકનો મુખ્ય ઉદ્દેશ્ય વનસ્પતિ અને પ્રાણીઓના અનુવંશિક પદાર્થો (DNA) ના નમૂનાઓને લાંબા ગાળા સુધી સંગ્રહિત કરવાનો અને ભવિષ્યમાં સંશોધન અથવા સંરક્ષણ કાર્યક્રમોમાં ઉપયોગમાં લેવાનો હોય છે. વિકલ્પ B સૌથી ચોક્કસ છે. વિકલ્પ A જીવંત નમૂનાઓ પર ધ્યાન કેન્દ્રિત કરે છે, જે જીન બેંકનો મુખ્ય હેતુ નથી. વિકલ્પ C બીજોના ઉગાડણ પર ભાર મૂકે છે, જે જીન બેંકની કામગીરી નથી. વિકલ્પ D નિવાસસ્થાન પુનઃસ્થાપન સાથે સંબંધિત છે, જે ઇન-સિટ્યુ સંરક્ષણનો ભાગ છે, જીન બેંક નહીં.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 6}, {"question": "નીચેનામાંથી કયું કથન 'એક્સ-સિટ્યુ સંરક્ષણ' અને 'ઇન-સિટ્યુ સંરક્ષણ' વચ્ચેના તફાવતને સૌથી સચોટ રીતે દર્શાવે છે?", "options": ["A) ઇન-સિટ્યુ સંરક્ષણમાં પ્રજાતિઓને તેમના નૈસર્ગિક નિવાસસ્થાનથી દૂર સંગ્રહિત કરવામાં આવે છે, જ્યારે એક્સ-સિટ્યુ સંરક્ષણમાં તેમને તેમના નૈસર્ગિક નિવાસસ્થાનમાં જ સંરક્ષિત કરવામાં આવે છે", "B) ઇન-સિટ્યુ સંરક્ષણમાં પ્રજાતિઓને તેમના નૈસર્ગિક નિવાસસ્થાનમાં જ સંરક્ષિત કરવામાં આવે છે, જ્યારે એક્સ-સિટ્યુ સંરક્ષણમાં ને તેમની સંખ્યામાં વૃદ્ધિ કરવા"], "correct": 0, "explanation": "રેડ ડેટા બુકનો મુખ્ય ઉદ્દેશ્ય દુર્લભ અને લુપ્ત પ્રજાતિઓની યાદી તૈયાર કરવાનો અને તેમના સંરક્ષણ માટેના પ્રયાસોને આયોજિત કરવાનો હોય છે. વિકલ્પ A સચોટ છે. વિકલ્પ B, C, અને D રેડ ડેટા બુકના મુખ્ય ઉદ્દેશ્યને દર્શાવતું નથી.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 9}, {"question": "નીચેનામાંથી કયું કથન 'જૈવ વિવિધતાનું સંરક્ષણ' અને 'સ્થાનિક પ્રજાતિઓ' વચ્ચેના સંબંધને સૌથી સચોટ રીતે વર્ણવે છે?", "options": ["A) સ્થાનિક પ્રજાતિઓ જૈવ વિવિધતાને ઘટાડે છે કારણ કે તેઓ એક જ પ્રદેશમાં મર્યાદિત હોય છે", "B) સ્થાનિક પ્રજાતિઓ જૈવ વિવિધતામાં ફાળો આપે છે કારણ કે તેઓ એક વિશિષ્ટ પ્રદેશમાં અનન્ય અનુકૂલનો વિકાસ કરે છે", "C) સ્થાનિક પ્રજાતિઓ જૈવ વિવિધતાને અસર કરતી નથી કારણ કે તેઓ ખૂબ જ ઓછી સંખ્યામાં હોય છે", "D) સ્થાનિક પ્રજાતિઓ જૈવ વિવિધતાને ઘટાડે છે કારણ કે તેઓ અન્ય પ્રજાતિઓ સાથે સ્પર્ધા કરે છે"], "correct": 1, "explanation": "સ્થાનિક પ્રજાતિઓ જૈવ વિવિધતામાં મહત્વપૂર્ણ ફાળો આપે છે કારણ કે તેઓ એક વિશિષ્ટ પ્રદેશમાં અનન્ય અનુકૂલનો વિકાસ કરે છે, જે જૈવ વિવિધતાને સમૃદ્ધ બનાવે છે. વિકલ્પ B સચોટ છે. વિકલ્પ A, C, અને D સ્થાનિક પ્રજાતિઓ અને જૈવ વિવિધતા વચ્ચેના સંબંધને ચોક્કસ રીતે વર્ણવતું નથી.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 10}, {"question": "નીચેનામાંથી કયો વિકલ્પ 'જૈવ વિવિધતાના સંરક્ષણ'માં 'કીસ્ટોન પ્રજાતિ' (Keystone Species)ની ભૂમિકાને સૌથી સચોટ રીતે વર્ણવે છે?", "options": ["A) જે પ્રજાતિ તેના પર્યાવરણમાં સૌથી વધુ સંખ્યામાં ઉપલબ્ધ હોય છે અને ખોરાક શૃંખલામાં મુખ્ય સ્તરે રહે છે.", "B) જે પ્રજાતિ તેના ઇકોસિસ્ટમની રચના અને કાર્યને નિર્ણાયક રીતે પ્રભાવિત કરે છે, અને તેના અભાવે ઇકોસિસ્ટમ ધ્વસ્ત થઈ શકે છે.", "C) જે પ્રજાતિ માત્ર એક જ પ્રકારના આહાર પર આધારિત હોય છે અને તેના લુપ્ત થવાથી અન્ય પ્રજાતિઓ પર કોઈ અસર થતી નથી.", "D) જે પ્રજાતિ માનવી દ્વારા સંરક્ષિત કરવામાં આવે છે અને તેનો ઉપયોગ ઓષધિય ક્ષેત્રમાં થાય છે."], "correct": 1, "explanation": "કીસ્ટોન પ્રજાતિ (B) ઇકોસિસ્ટમની રચના અને કાર્યને નિર્ણાયક રીતે પ્રભાવિત કરે છે. ઉદા explanation": "એક્સ-સિટ્યુ સંરક્ષણની સૌથી મહત્વની મર્યાદા એ છે કે તે પ્રજાતિઓને તેના કુદરતી નિવાસસ્થાનથી દૂર રાખે છે (B), જેથી પ્રજાતિઓ તેના કુદરતી પર્યાવરણ સાથે અનુકૂલન ગુમાવી શકે છે. A ગળતર છે કારણ કે એક્સ-સિટ્યુ સંરક્ષણ પ્રાણીઓ અને વનસ્પતિઓ બંનેમાં ઉપયોગી છે. C ગળતર છે કારણ કે એક્સ-સિટ્યુ સંરક્ષણ માટે વિશાળ જમીનની જરૂર પડતી નથી. D ગળતર છે કારણ કે એક્સ-સિટ્યુ સંરક્ષણ લુપ્ત પ્રજાતિઓ સિવાય અન્ય પ્રજાતિઓ માટે પણ ઉપયોગી છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 13}, {"question": "નીચેનામાંથી કયું કથન 'જૈવ વિવિધતાના સંરક્ષણ' અને 'પર્યાવરણીય સેવાઓ' વચ્ચેના સંબંધને સૌથી સચોટ રીતે વર્ણવે છે?", "options": ["A) જૈવ વિવિધતાનું સંરક્ષણ કરવાથી પર્યાવરણીય સેવાઓમાં ઘટાડો થાય છે, કારણ કે તે માનવીની ગતિવિધિઓને મર્યાદિત કરે છે.", "B) જૈવ વિવિધતાનું સંરક્ષણ પર્યાવરણીય સેવાઓને મજબૂત બનાવે છે, જેમ કે જળ ચક્ર, મૃદા સુધારણા અને હવામાન નિયંત્રણ.", "C) જૈવ વિવિધતાનું સંરક્ષણ માત્ર વન્યજીવન માટે જ ફાયદાકારક છે, માનવી માટે નહીં.", "D) જૈવ વિવિધતાનું સંરક્ષણ પર્યાવરણીય સેવાઓ પર કોઈ અસર કરતું નથી."], "correct": 1, "explanation": "જૈવ વિવિધતાનું સંરક્ષણ પર્યાવરણીય સેવાઓને મજબૂત બનાવે છે (B), કારણ કે તે જળ ચક્ર, મૃદા સુધારણા અને હવામાન નિયંત્રણ જેવી સેવાઓને ટેકો આપે છે. A ગળતર છે કારણ કે જૈવ વિવિધતાનું સંરક્ષણ પર્યાવરણીય સેવાઓમાં વધારો કરે છે. C ગળતર છે કારણ કે જૈવ વિવિધતાનું સંરક્ષણ માનવી માટે પણ ફાયદાકારક છે. D ગળતર છે કારણ કે જૈવ વિવિધતાનું સંરક્ષણ પર્યાવરણીય સેવાઓ પર સક્રિય અસર કરે છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 14}, {"question": "નીચેનામાંથી કયો વિકલ્પ 'જૈવ વિવિધતાના સંરક્ષણ'માં 'ઇનવેસિવ પ્રજાતિઓ' (Invasive Species)ની અસરને સૌથી સચોટ રીતે વર્ણવે છે?", "options": ["A) ઇનવેસિવ પ્રજાતિઓ કુદરતી ઇકોસિસ્ટમમાં જૈવ વિવિધતા વધારે છે અને સ્થાનિક પ્રજાતિઓ સાથે સહજીવન ધરાવે છે.", "B) ઇનવેસિવ પ્રજાતિઓ સ્થાનિક પ્રજાતિઓને હરાવી શકે છે, ઇકોસિસ્ટમને અસંતુલિત કરે છે અને જૈવ વિવિધતામાં ઘટાડો કરે છે.", "C) ઇનવેસિવ પ્રજાતિઓ માત્ર માનવી દ્વારા પરિચય કરવામાં આવે છે અને તે કુદરતી રીતે ફેલાતી નથી.", "D) ઇનવેસિવ પ્રજાતિઓ માત્ર જળીય ઇકોસિસ્ટમમાં જ જોવા મળે છે, સ્થળીય ઇકોસિસ્ટમમાં નહીં."], "correct": 1, "explanation": "ઇનવેસિવ પ્રજાતિઓ સ્થાનિક પ્રજાતિઓને હરાવી શકે છે અને ઇકોસિસ્ટમને અસંતુલિત કરે છે (B), જેથી જૈવ વિવિધતામાં ઘટાડો થાય છે. A ગળતર છે કારણ કે ઇનવેસિવ પ્રજાતિઓ સ્થાનિક પ્રજાતિઓ સાથે સહજીવન ધરાવતી નથી. C ગળતર છે કારણ કે ઇનવેસિવ પ્રજાતિઓ કુદરતી રીતે પણ ફેલાઈ શકે છે. D ગળતર છે કારણ કે ઇનવેસિવ પ્રજાતિઓ સ્થળીય અને જળીય બંને ઇકોસિસ્ટમમાં જોવા મળે છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 15}, {"question": "નીચેનામાંથી કયો વિકલ્પ 'જૈવ વિવિધતાના સંરક્ષણ'માં 'એક્સ-સિટ્યુ સંરક્ષણ'ની સફળતામાં સૌથી મહત્વની અડચણ તરીકે ઓળખાય છે?", "options": ["A) જનીન વિવિધતાનો નુકશાન થવો", "B) પ્રજાતિઓના પ્રાકૃતિક આવાસમાં પુનર્સ્થાપનની અશક્યતા", "C) સંગ્રહિત નમૂનાઓમાં રોગજનક સૂક્ષ્મજીવોનો પ્રવેશ", "D) લાંબા ગાળાના સંગ્રહ માટે ઉચ્ચ ખર્ચ"], "correct": 1, "explanation": "એક્સ-સિટ્યુ સંરક્ષણમાં પ્રજાતિઓને તેમના પ્રાકૃતિક આવાસમાં પુનર્સ્થાપિત કરવી એ સૌથી મહત્વની અડચણ છે, કારણ કે પ્રાકૃતિક આવાસમાં પર્યાવરણીય પરિબળો અને પારસ્પરિક ક્રિયાઓનો અભાવ હોય છે. A) જનીન વિવિધતાનો નુકશાન થવો એ એક સમસ્યા છે, પરંતુ એ સૌથી મહત્વની અડચણ નથી. C) રોગજનક સૂક્ષ્મજીવોનો પ્રવેશ એ એક સમસ્યા છે, પરંતુ એ સફળતાની મુખ્ય અડચણ નથી. D) ઉચ્ચ ખર્ચ એ એક પડકાર છે, પરંતુ એ સૌથી મહત્વની અડચણ નથી.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 16}, {"question": "નીચેનામાંથી કયો વિકલ્પ 'જૈવ વિવિધતાના સંરક્ષણ'માં 'જીવનશૈલીક સંરક્ષણ' (Habitat Conservation)ની સૌથી મહત્વની વિશેષતા તરીકે ઓળખાય છે?", "options": ["A) પ્રજાતિઓના જીવનચક્રને સંપૂર્ણ રીતે સંરક્ષિત કરવી", "B) ફક્ત દુર્લભ પ્રજાતિઓના આવાસને સંરક્ષિત કરવી", "C) પ્રજાતિઓના આવાસને કૃત્રિમ રીતે બનાવવી", "D) પ્રજાતિઓને તેમના આવાસમાંથી દૂર કરવી"], "correct": 0, "explanation": "જીવનશૈલીક સંરક્ષણમાં પ્રજાતિઓના જીવનચક્રને સંપૂર્ણ રીતે સંરક્ષિત કરવું એ સૌથી મહત્વની વિશેષતા છે, કારણ કે એ પ્રજાતિઓના અસ્તિત્વ માટે જરૂરી તમામ પરિબળોને સુરક્ષિત રાખે છે. B) ફક્ત દુર્લભ પ્રજાતિઓના આવાસને સંરક્ષિત કરવી એ અપૂર્ણ છે. C) પ્રજાતિઓના આવાસને કૃત્રિમ રીતે બનાવવી એ જીવનશૈલીક સંરક્ષણ નથી. D) પ્રજાતિઓને તેમના આવાસમાંથી દૂર કરવી એ જીવનશૈલીક સંરક્ષણના વિપરીત છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 17}, {"question": "નીચેનામાંથી કયો વિકલ્પ 'જૈવ વિવિધતાના સંરક્ષણ'માં 'પર્યાવરણીય શિક્ષણ'ની ભૂમિકાને સૌથી સચોટ રીતે વર્ણવે છે?", "options": ["A) પર્યાવરણીય શિક્ષણ જૈવ વિવિધતાના સંરક્ષણમાં કોઈ ભૂમિકા ભજવતું નથી", "B) પર્યાવરણીય શિક્ષણ જૈવ વિવિધતાના સંરક્ષણ માટે જાગૃતિ લાવે છે", "C) પર્યાવરણીય શિક્ષણ જૈવ વિવિધતાના સંરક્ષણને અટકાવે છે", "D) પર્યાવરણીય શિક્ષણ જૈવ વિવિધતાના સંરક્ષણ માટે ફક્ત શાળાઓમાં જ મહત્વનું છે"], "correct": 1, "explanation": "પર્યાવરણીય શિક્ષણ જૈવ વિવિધતાના સંરક્ષણ માટે જાગૃતિ લાવે છે, કારણ કે એ લોકોને જૈવ વિવિધતાના મહત્વ અને સંરક્ષણની જરૂરિયાત સમજાવે છે. A) પર્યાવરણીય શિક્ષણ જૈવ વિવિધતાના સંરક્ષણમાં કોઈ ભૂમિકા ભજવતું નથી એ ખોટું છે. C) પર્યાવરણીય શિક્ષણ જૈવ વિવિધતાના સંરક્ષણને અટકાવે છે એ પણ ખોટું છે. D) પર્યાવરણીય શિક્ષણ જૈવ વિવિધતાના સંરક્ષણ માટે ફક્ત શાળાઓમાં જ મહત્વનું છે એ અપૂર્ણ છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 18}, {"question": "નીચેનામાંથી કયું કથન 'જૈવ વિવિધતાના સંરક્ષણ'માં 'એક્સ-સિટ્યુ સંરક્ષણ' અને 'કૃત્રિમ પ્રજનન' (Captive Breeding) વચ્ચેના સંબંધને સૌથી સચોટ રીતે વર્ણવે છે?", "options": ["A) એક્સ-સિટ્યુ સંરક્ષણમાં કૃત્રિમ પ્રજનન એ સ્થાનિક પર્યાવરણમાં પ્રજાતિઓની પુનઃસ્થાપના માટેનો એકમાત્ર માર્ગ છે.", "B) કૃત્રિમ પ્રજનન એ એક્સ-સિટ્યુ સંરક્ષણની એક પદ્ધતિ છે, પરંતુ તે પ્રજાતિઓની જનીન વિવિધતાને જાળવી રાખવામાં મર્યાદિત છે.", "C) એક્સ-સિટ્યુ સંરક્ષણમાં કૃત્રિમ પ્રજનનનો હેતુ પ્રજાતિઓને લુપ્ત થતી અટકાવવાનો છે, પરંતુ તે પ્રાકૃતિક આવાસમાં પુનઃસ્થાપિત કરવા માટે યોગ્ય નથી.", "D) કૃત્રિમ પ્રજનન એ એક્સ-સિટ્યુ સંરક્ષણની એક પદ્ધતિ છે જે પ્રજાતિઓની સંખ્યામાં વૃદ્ધિ કરે છે, પરંતુ તે જનીન વિવિધતાને જાળવી રાખવામાં અસરકારક નથી."], "correct": 1, "explanation": "કૃત્રિમ પ્રજનન એ એક્સ-સિટ્યુ સંરક્ષણની એક મહત્વપૂર્ણ પદ્ધતિ છે, પરંતુ તે ધો સંબંધ ધરાવે છે?", "options": ["A) વન્ય જીવોના નૈસર્ગિક નિવાસસ્થાનને સંરક્ષિત કરવા.", "B) લુપ્ત થવાના ધોખામાં હોવાની પ્રજાતિઓના બીજ અને જનીન સામગ્રીને સંગ્રહિત કરવા.", "C) સ્થાનિક પ્રજાતિઓના પ્રજનન માટે કૃત્રિમ પરિસ્થિતિઓ ઉભી કરવા.", "D) ઇનવેસિવ પ્રજાતિઓને નિયંત્રિત કરવા માટે પગલાં લેવા."], "correct": 1, "explanation": "જીન બેંક એ એક્સ-સિટ્યુ સંરક્ષણ પદ્ધતિ છે જ્યાં લુપ્ત થવાના ધોખામાં હોવાની પ્રજાતિઓના બીજ, પોલન, અંડકોષ, શુક્રકોષ, અને અન્ય જનીન સામગ્રીને સંગ્રહિત કરવામાં આવે છે. આથી વિકલ્પ B સીધો સંબંધ ધરાવે છે. વિકલ્પ A ઇન-સિટ્યુ સંરક્ષણ સાથે સંબંધિત છે. વિકલ્પ C કૃત્રિમ પ્રજનન સાથે સંબંધિત છે, જ્યારે વિકલ્પ D ઇનવેસિવ પ્રજાતિઓના નિયંત્રણ સાથે સંબંધિત છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 36}, {"question": "નીચેનામાંથી કયું કથન 'એસિસ્ટેડ માઇગ્રેશન' (સહાયિત સ્થળાંતર) અને જૈવ વિવિધતાના સંરક્ષણ વચ્ચેના સંબંધને સૌથી સચોટ રીતે વર્ણવે છે?", "options": ["A) એસિસ્ટેડ માઇગ્રેશનમાં પ્રજાતિઓને તેમના નૈસર્ગિક નિવાસસ્થાનથી દૂર સ્થળાંતરિત કરવામાં આવે છે જેથી તેઓ નવી પર્યાવરણીય પરિસ્થિતિઓમાં અનુકૂળન કરી શકે.", "B) એસિસ્ટેડ માઇગ્રેશન એ એક પદ્ધતિ છે જ્યાં પ્રજાતિઓને તેમના નૈસર્ગિક નિવાસસ્થાનમાં જ સંરક્ષિત કરવામાં આવે છે.", "C) એસિસ્ટેડ માઇગ્રેશન એ એક પદ્ધતિ છે જ્યાં પ્રજાતિઓને લેબોરેટરીમાં સંગ્રહિત કરવામાં આવે છે.", "D) એસિસ્ટેડ માઇગ્રેશન એ એક પદ્ધતિ છે જ્યાં પ્રજાતિઓને તેમના નૈસર્ગિક નિવાસસ્થાનમાંથી હટાવીને અન્ય પ્રદેશમાં સ્થાપિત કરવામાં આવે છે જેથી તેઓ લુપ્ત થવાનું ટાળી શકે."], "correct": 3, "explanation": "એસિસ્ટેડ માઇગ્રેશન (સહાયિત સ્થળાંતર) એ એક પદ્ધતિ છે જ્યાં પ્રજાતિઓને તેમના નૈસર્ગિક નિવાસસ્થાનમાંથી હટાવીને અન્ય, સુરક્ષિત પ્રદેશમાં સ્થાપિત કરવામાં આવે છે, જેથી તેઓ લુપ્ત થવાનું ટાળી શકે. આથી વિકલ્પ D સૌથી સચોટ છે. વિકલ્પ A ખોટો છે કારણ કે એસિસ્ટેડ માઇગ્રેશનમાં પ્રજાતિઓને નવી પર્યાવરણીય પરિસ્થિતિઓમાં અનુકૂળન કરવા માટે સ્થળાંતરિત કરવામાં આવે છે, પરંતુ તે તેમના નૈસર્ગિક નિવાસસ્થાનથી દૂર હોવું જરૂરી નથી. વિકલ્પ B ઇન-સિટ્યુ સંરક્ષણને વર્ણવે છે. વિકલ્પ C એક્સ-સિટ્યુ સંરક્ષણને વર્ણવે છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 37}, {"question": "નીચેનામાંથી કયો વિકલ્પ 'હોટસ્પોટ' અને 'એન્ડેમિક પ્રજાતિઓ' વચ્ચેના સંબંધને સૌથી સચોટ રીતે વર્ણવે છે?", "options": ["A) હોટસ્પોટ એવા પ્રદેશો છે જ્યાં એન્ડેમિક પ્રજાતિઓની સંખ્યા ઓછી હોય છે.", "B) હોટસ્પોટ એવા પ્રદેશો છે જ્યાં એન્ડેમિક પ્રજાતિઓની સંખ્યા અને લુપ્ત થવાના ધોખામાં હોવાની પ્રજાતિઓની સંખ્યા બંને વધુ હોય છે.", "C) હોટસ્પોટ એવા પ્રદેશો છે જ્યાં ફક્ત લુપ્ત થવાના ધોખામાં હોવાની પ્રજાતિઓ જ જોવા મળે છે.", "D) હોટસ્પોટ એવા પ્રદેશો છે જ્યાં ફક્ત એન્ડેમિક પ્રજાતિઓ જ જોવા મળે છે."], "correct": 1, "explanation": "હોટસ્પોટ એવા પ્રદેશો છે જ્યાં જૈવ વિવિધતા ખૂબ જ વધુ હોય છે, અને જ્યાં એન્ડેમિક પ્રજાતિઓ (ફક્ત તે પ્રદેશમાં જોવા મળતી પ્રજાતિઓ) અને લુપ્ત થવાના ધોખામાં હોવાની પ્રજાતિઓની સંખ્યા બંને વધુ હોય છે. આથી વિકલ્પ B સૌથી સચોટ છે. વિકલ્પ A ખોટો છે કારણ કે હોટસ્પોટમાં એન્ડેમિક પ્રજાતિઓની સંખ્યા વધુ હોય છે. વિકલ્પ C ખોટો છે કારણ કે હોટસ્પોટમાં ફક્ત લુપ્ત થવાના ધોખામાં હોવાની પ્રજાતિઓ જ નહીં, પરંતુ એન્ડેમિક પ્રજાતિઓ પણ હોય છે. વિકલ્પ D ખોટો છે કારણ કે હોટસ્પોટમાં ફક્ત એન્ડેમિક પ્રજાતિઓ જ નહીં, પરંતુ અન્ય પ્રજાતિઓ પણ હોય છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 38}, {"question": "એક ઇકોસિસ્ટમમાં, જ્યારે એક એન્ડેમિક પ્રજાતિ લુપ્ત થાય છે, ત્યારે નીચેનામાંથી કયું પરિણામ સૌથી યોગ્ય રીતે થશે?", "options": ["A) ઇકોસિસ્ટમમાં અન્ય પ્રજાતિઓની સંખ્યા વધશે.", "B) ઇકોસિસ્ટમની જૈવ વિવિધતા ઘટશે અને ઇકોસિસ્ટમની સ્થિરતા ઓછી થશે.", "C) ઇકોસિસ્ટમમાં નવી પ્રજાતિઓની ઉત્પત્તિ થશે.", "D) ઇકોસિસ્ટમમાં કોઈ ફેરફાર થશે નહીં."], "correct": 1, "explanation": "એન્ડેમિક પ્રજાતિ એ ફક્ત એક જ ભૌગોલિક વિસ્તારમાં જોવા મળતી પ્રજાતિ છે. જ્યારે એન્ડેમિક પ્રજાતિ લુપ્ત થાય છે, ત્યારે ઇકોસિસ્ટમની જૈવ વિવિધતા ઘટે છે અને ઇકોસિસ્ટમની સ્થિરતા ઓછી થાય છે. વિકલ્પ A ખોટો છે કારણ કે એન્ડેમિક પ્રજાતિની લુપ્તતાથી અન્ય પ્રજાતિઓની સંખ્યા વધતી નથી. વિકલ્પ C ખોટો છે કારણ કે નવી પ્રજાતિઓની ઉત્પત્તિ એ લાંબી પ્રક્રિયા છે અને એન્ડેમિક પ્રજાતિની લુપ્તતાથી સીધી અસર થતી નથી. વિકલ્પ D ખોટો છે કારણ કે ptions": ["A) કીસ્ટોન પ્રજાતિ એવી પ્રજાતિ છે જે ઇકોસિસ્ટમમાં સૌથી વધુ સંખ્યામાં હાજર હોય છે અને તેના લુપ્ત થવાથી ઇકોસિસ્ટમ પર કોઈ અસર થતી નથી.", "B) કીસ્ટોન પ્રજાતિ એવી પ્રજાતિ છે જે ઇકોસિસ્ટમની રચના અને કાર્યમાં મહત્વની ભૂમિકા ભજવે છે, અને તેના લુપ્ત થવાથી ઇકોસિસ્ટમના સંતુલન પર ગંભીર અસર પડે છે.", "C) કીસ્ટોન પ્રજાતિ એવી પ્રજાતિ છે જે ફક્ત એન્ડેમિક હોય છે અને તેના સંરક્ષણ માટે ખાસ પગલાં લેવા પડે છે.", "D) કીસ્ટોન પ્રજાતિ એવી પ્રજાતિ છે જે ઇકોસિસ્ટમમાં સૌથી ઓછી સંખ્યામાં હાજર હોય છે અને તેના લુપ્ત થવાથી ઇકોસિસ્ટમ પર સક્રિય અસર થાય છે."], "correct": 1, "explanation": "કીસ્ટોન પ્રજાતિ (મુખ્ય પ્રજાતિ) એવી પ્રજાતિ છે જે ઇકોસિસ્ટમની રચના અને કાર્યમાં મહત્વની ભૂમિકા ભજવે છે. તેના લુપ્ત થવાથી ઇકોસિસ્ટમના સંતુલન પર ગંભીર અસર પડે છે, કારણ કે તે અન્ય પ્રજાતિઓના અસ્તિત્વ અને વર્તનને પ્રભાવિત કરે છે. વિકલ્પ A ખોટો છે કારણ કે કીસ્ટોન પ્રજાતિની સંખ્યા ઇકોસિસ્ટમમાં સૌથી વધુ હોવી જરૂરી નથી, અને તેના લુપ્ત થવાથી ઇકોસિસ્ટમ પર અસર થાય છે. વિકલ્પ C ખોટો છે કારણ કે કીસ્ટોન પ્રજાતિ ફક્ત એન્ડેમિક હોવી જરૂરી નથી. વિકલ્પ D ખોટો છે કારણ કે કીસ્ટોન પ્રજાતિની સંખ્યા ઇકોસિસ્ટમમાં સૌથી ઓછી હોવી જરૂરી નથી, પરંતુ તેની ભૂમિકા મહત્વની હોય છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 42}, {"question": "ગુજરાતના કચ્છના રણમાં આવેલા 'કચ્છનો અરણ્ય' (Kutch Desert Wildlife Sanctuary)માં નીચેનામાંથી કયી પ્રજાતિની સંરક્ષણ યોજનામાં 'એક્સ-સિટ્યુ સંરક્ષણ' અને 'હેબિટેટ મેનેજમેન્ટ' બંને પદ્ધતિઓનો એકસાથે ઉપયોગ કરવામાં આવે છે, જ્યારે તે પ્રજાતિ 'ઇનવેસિવ પ્રજાતિ'ના કારણે લુપ્ત થવાના ધોરણે છે?", "options": ["A) ભારતીય ગેંડો (Indian Wild Ass)", "B) કચ્છી ઘોડો (Kutch Horse)", "C) ચીંકારા (Indian Gazelle)", "D) મોર (Peacock)"], "correct": 0, "explanation": "ભારતીય ગેંડો (Indian Wild Ass) કચ્છના રણમાં એન્ડેમિક પ્રજાતિ છે અને તે 'ઇનવેસિવ પ્રજાતિઓ' જેવી કે પશુઓના ચરાવટથી થતી હાનિના કારણે લુપ્ત થવાના ધોરણે છે. તેના સંરક્ષણ માટે 'એક્સ-સિટ્યુ સંરક્ષણ' (જેમ કે કેદમાં પ્રજનન) અને 'હેબિટેટ મેનેજમેન્ટ' (જેમ કે રણના વાતાવરણને અનુકૂળ બનાવવું) બંને પદ્ધતિઓનો ઉપયોગ થાય છે. વિકલ્પ         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
