<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>

    <script>
        const questionsData = [{"question": "જનીન ઉપચારમાં વપરાતા વાહક તરીકે એડિનોવાયરસને પસંદ કરવામાં આવે છે, પરંતુ રેટ્રોવાયરસ કરતાં તેની કેટલીક મર્યાદાઓ છે. નીચેનામાંથી કયું વિધાન એડિનોવાયરસની મર્યાદા તરીકે સૌથી યોગ્ય રીતે વર્ણવે છે?", "options": ["A) એડિનોવાયરસ દ્વારા જનીનનો સંકલન કોષકેન્દ્રમાં થતો નથી, જેથી તે દીર્ઘકાલીન અભિવ્યક્તિ માટે અનુકૂળ નથી.", "B) એડિનોવાયરસમાં જનીનની ક્ષમતા ખૂબ જ ઓછી હોય છે, જેથી મોટા જનીનને વહન કરવા માટે તે અયોગ્ય છે.", "C) એડિનોવાયરસ દ્વારા સંક્રમિત કોષોમાં પ્રતિરક્ષાતંત્ર દ્વારા પ્રતિક્રિયા થવાની શક્યતા ઓછી હોય છે.", "D) એડિનોવાયરસ દ્વારા જનીનનો સંકલન વર્ણસૂત્રમાં થાય છે, જેથી તે કાયમી બદલાવ લાવી શકે છે."], "correct": 0, "explanation": "એડિનોવાયરસ દ્વારા જનીનનો સંકલન કોષકેન્દ્રમાં થતો નથી, જેથી તે દીર્ઘકાલીન અભિવ્યક્તિ માટે અનુકૂળ નથી. રેટ્રોવાયરસ કોષકેન્દ્રમાં સંકલન કરે છે, જ્યારે એડિનોવાયરસ કોષકેન્દ્ર બહાર રહે છે, જેથી તેની અભિવ્યક્તિ કાલબાહ્ય હોય છે. બાકીના વિકલ્પો ખોટા છે: B) એડિનોવાયરસ મોટા જનીનને વહન કરવા સક્ષમ છે. C) એડિનોવાયરસ પ્રતિરક્ષાતંત્ર દ્વારા મજબૂત પ્રતિક્રિયા ઉત્પન્ન કરે છે. D) એડિનોવાયરસ કોષકેન્દ્ર બહાર રહે છે, વર્ણસૂત્રમાં સંકલન થતો નથી.", "ncert_ref": "Class XII - પ્રકરણ 12: જૈવ-તકનીકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 1}, {"question": "જનીન ઉપચારમાં, SCID (Severe Combined Immunodeficiency) ના ઉપચાર માટે કયા પ્રકારના કોષોનો ઉપયોગ થાય છે, અને તે કયા જનીનના દોષને દૂર કરવા માટે થાય છે?", "options": ["A) T-લિમ્ફોસાઇટ્સ, IL-2R γ જનીન", "B) B-લિમ્ફોસાઇટ્સ, ADA જનીન", "C) હેમેટોપોઇટિક સ્ટેમ કોષો, ADA જનીન", "D) ન્યૂટ્રોફિલ્સ, CFTR જનીન"], "correct": 2, "explanation": "SCID ના ઉપચાર માટે હેમેટોપોઇટિક સ્ટેમ કોષોનો ઉપયોગ થાય છે, અને તે ADA (Adenosine Deaminase) જનીનના દોષને દૂર કરવા માટે થાય છે. ADA જનીનનો અભાવ SCID નું કારણ બને છે. બાકીના વિકલ્પો ખોટા છે: A) T-લિમ્ફોસાઇટ્સ અને IL-2R γ જનીન SCID સાથે સંકળાયેલા નથી. B) B-લિમ્ફોસાઇટ્સ SCID ઉપચારમાં વપરાતા નથી. D) ન્યૂટ્રોફિલ્સ અને CFTR જનીન સિસ્ટિક ફાઇબ્રોસિસ સાથે સંકળાયેલા છે.", "ncert_ref": "Class XII - પ્રકરણ 12: જૈવ-તકનીકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 2}, {"question": "જનીન ઉપચારમાં વપરાતા વાહક તરીકે લેન્ટીવાયરસને પસંદ કરવામાં આવે છે. નીચેનામાંથી કયું વિધાન લેન્ટીવાયરસની વિશેષતા તરીકે સૌથી યોગ્ય રીતે વર્ણવે છે?", "options": ["A) લેન્ટીવાયરસ દ્વારા જનીનનો સંકલન કોષકેન્દ્રમાં થાય છે, પરંતુ તે કાયમી બદલાવ લાવી શકતો નથી.", "B) લેન્ટીવાયરસ દ્વારા સંક્રમિત કોષોમાં પ્રતિરક્ષાતંત્ર દ્વારા પ્રતિક્રિયા થવાની શક્યતા ખૂબ જ ઓછી હોય છે.", "C) લેન્ટીવાયરસ દ્વારા જનીનનો સંકલન વર્ણસૂત્રમાં થાય છે, અને તે કાયમી બદલાવ લાવી શકે છે.", "D) લેન્ટીવાયરસ દ્વારા મોટા જનીનને વહન કરવા માટે તે અયોગ્ય છે."], "correct": 2, "explanation": "લેન્ટીવાયરસ દ્વારા જનીનનો સંકલન વર્ણસૂત્રમાં થાય છે, અને તે કાયમી બદલાવ લાવી શકે છે. લેન્ટીવાયરસ રેટ્રોવાયરસ કુટુંબનો ભાગ છે, અને તે કોષકેન્દ્રમાં સંકલન કરે છે, જેથી તે દીર્ઘકાલીન અભિવ્યક્તિ માટે અનુકૂળ છે. બાકીના વિકલ્પો ખોટા છે: A) લેન્ટીવાયરસ કાયમી બદલાવ લાવી શકે છે. B) લેન્ટીવાયરસ પ્રતિરક્ષાતંત્ર દ્વારા પ્રતિક્રિયા ઉત્પન્ન કરે છે. D) લેન્ટીવાયરસ મોટા જનીનને વહન કરવા સક્ષમ છે.", "ncert_ref": "Class XII - પ્રકરણ 12: જૈવ-તકનીકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 3}, {"question": "જનીન ઉપચારમાં, કયા રોગના ઉપચાર માટે પ્રથમ વખત મનુષ્યમાં જનીન ઉપચારનો પ્રયોગ કરવામાં આવ્યો હતો?", "options": ["A) સિકલ સેલ એનિમિયા", "B) સિસ્ટિક ફાઇબ્રોસિસ", "C) ADA-સંબંધિત SCID", "D) હીમોફિલિયા"], "correct": 2, "explanation": "ADA-સંબંધિત SCID (Severe Combined Immunodeficiency) ના ઉપચાર માટે પ્રથમ વખત મનુષ્યમાં જનીન ઉપચારનો પ્રયોગ કરવામાં આવ્યો હતો. આ ઉપચાર 1990 માં અશી વીસ નામની બાળકી પર કરવામાં આવ્યો હતો. બાકીના વિકલ્પો ખોટા છે: A) સિકલ સેલ એનિમિયા, B) સિસ્ટિક ફાઇબ્રોસિસ, અને D) હીમોફિલિયા માટે જનીન ઉપચાર પછીથી વિકસાવવામાં આવ્યો હતો.", "ncert_ref": "Class XII - પ્રકરણ 12: જૈવ-તકનીકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 4}, {"question": "જનીન ઉપચારમાં, કયા પદ્ધતિ દ્વારા જનીનને લક્ષ્ય કોષોમાં પ્રવેશ કરાવવામાં આવે છે, જ્યાં વાહક તરીકે લિપિડ નેનોપાર્ટિકલ્સનો ઉપયોગ થાય છે?", "options": ["A) વાયરલ ટ્રાન્સડક્શન", "B) નોન-વાયરલ ટ્રાન્સફેક્શન", "C) એલેક્ટ્રોપોરેશન", "D) માઇક્રોઇન્જેક્શન"], "correct": 1, "explanation": "લિપિડ નેનોપાર્ટિકલ્સનો ઉપયોગ નોન-વાયરલ ટ્રાન્સફેક્શન પદ્ધતિમાં થાય છે, જ્યાં જનીનને લિપિડ દ્વારા ઘેરાયેલા કણો દ્વારા કોષમાં પ્રવેશ કરાવવામાં આવે છે. બાકીના વિકલ્પો ખોટા છે: A) વાયરલ ટ્રાન્સડક્શનમાં વાયરસનો ઉપયોગ થાય છે. C) એલેક્ટ્રોપોરેશનમાં વિદ્યુત ક્ષેત્ર દ્વારા કોષના છિદ્રો બનાવીને જનીન પ્રવેશ કરાવવામાં આવે છે. D) માઇક્રોઇન્જેક્શનમાં સૂક્ષ્મ સૂઈ દ્વારા જનીન કોષમાં ઇન્જેક્ટ કરવામાં આવે છે.", "ncert_ref": "Class XII - પ્રકરણ 12: જૈવ-તકનીકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 5}, {"question": "જનીન ઉપચાર દરમિયાન, લક્ષ્ય કોષોમાં જનીનના સફળ સંકલન બાદ, નીચેનામાંથી કયા પગલાને અનિવાર્યપણે હાથ ધરવામાં આવે છે જેથી ઉત્પાદિત પ્રોટીનની કાર્યક્ષમતા સુનિશ્ચિત થાય?", "options": ["A) લક્ષ્ય કોષોને ઇન વિટ્રોમાં વૃદ્ધિ કરવા અને પછી શરીરમાં પ્રત્યારોપણ કરવું", "B) જનીનને કોષકેન્દ્રમાં પ્રવેશ કરાવવા માટે વાહક તરીકે લિપોસોમનો ઉપયોગ કરવો", "C) ઉત્પાદિત પ્રોટીનની પ્રમાણિકતા તપાસવા માટે વેસ્ટર્ન બ્લોટિંગ કરવું", "D) જનીનને વર્ણસૂત્રમાં સ્થાયી રીતે સંકલિત કરવા માટે હોમોલોગસ રિકોમ્બિનેશન પદ્ધતિનો ઉપયોગ કરવો"], "correct": 0, "explanation": "જનીન ઉપચારમાં, લક્ષ્ય કોષોમાં જનીનના સંકલન બાદ, તે કોષોને ઇન વિટ્રો (પ્રયોગશાળામાં) વૃદ્ધિ કરવામાં આવે છે અને પછી તેને શરીરમાં પ્રત્યારોપણ કરવામાં આવે છે જેથી ઉત્પાદિત પ્રોટીનની કાર્યક્ષમતા સુનિશ્ચિત થાય. વિકલ્પ B, C, અને D અંશતઃ સાચા હોઈ શકે, પરંતુ તે અનિવાર્ય પગલા નથી. લિપોસોમનો ઉપયોગ વાહક તરીકે થઈ શકે, પરંતુ તે અનિવાર્ય નથી. વેસ્ટર્ન બ્લોટિંગ પ્રયોગશાળામાં તપાસ માટે વપરાય છે, પરંતુ તે ક્લિનિકલ પ્રક્રિયાનો ભાગ નથી. હોમોલોગસ રિકોમ્બિનેશન પદ્ધતિનો ઉપયોગ થઈ શકે, પરંતુ તે સ્થાયી સંકલન માટે જરૂરી નથી.", "ncert_ref": "Class XII - Chapter 12: જૈવ-તકનીકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 6}, {"question": "જનીન ઉપચારમાં, નીચેનામાંથી કયા રોગના ઉપચાર માટે 'એક્સ વાઇવો' (Ex Vivo) પદ્ધતિનો ઉપયોગ થાય છે, જ્યાં કોષોને શરીરની બહાર જનીન સાથે સંકલિત કરવામાં આવે છે અને પછી પુનઃપ્રત્યારોપણ કરવામાં આવે છે?", "options": ["A) સિકલ સેલ એનીમિયા", "B) હિમોફિલિયા B", "C) એડનોસિન ડીએમિનેઝ (ADA)ની ઉણપ", "D) ડ્યુચેન મસ્ક્યુલર ડિસ્ટ્રોફી"], "correct": 2, "explanation": "એક્સ વાઇવો પદ્ધતિમાં, કોષોને શરીરની બહાર જનીન સાથે સંકલિત કરવામાં આવે છે અને પછી પુનઃપ્રત્યારોપણ કરવામાં આવે છે. ADA (એડનોસિન ડીએમિનેઝ)ની ઉણપ માટે આ પદ્ધતિનો ઉપયોગ થયો હતો, જ્યાં T-લિમ્ફોસાઇટ્સને શરીરની બહાર સંકલિત કરવામાં આવ્યા હતા. સિકલ સેલ એનીમિયા, હિમોફિલિયા B, અને ડ્યુચેન મસ્ક્યુલર ડિસ્ટ્રોફી માટે આ પદ્ધતિનો ઉપયોગ થતો નથી.", "ncert_ref": "Class XII - Chapter 12: જૈવ-તકનીકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 7}, {"question": "જનીન ઉપચાર દરમિયાન, નીચેનામાંથી કયા પરિબળને લીધે 'ઇન્સર્શનલ મ્યુટેશન' (Insertional Mutagenesis) થઈ શકે છે, જેના કારણે લક્ષ્ય જનીનની કાર્યક્ષમતા ખોરવાઈ જાય છે?", "options": ["A) વાહકના DNAમાં મ્યુટેશન હોવું", "B) જનીનનું વર્ણસૂત્રમાં અયોગ્ય સ્થાને સંકલન થવું", "C) લક્ષ્ય કોષની પ્રતિરક્ષા પ્રતિક્રિયા", "D) જનીનના પ્રમોટર વિસ્તારમાં ખામી હોવી"], "correct": 1, "explanation": "ઇન્સર્શનલ મ્યુટેશન ત્યારે થાય છે જ્યારે જનીનનું વર્ણસૂત્રમાં અયોગ્ય સ્થાને સંકલન થાય છે, જેના કારણે લક્ષ્ય જનીનની કાર્યક્ષમતા ખોરવાઈ જાય છે. વાહકના DNAમાં મ્યુટેશન (A), લક્ષ્ય કોષની પ્રતિરક્ષા પ્રતિક્રિયા (C), અને જનીનના પ્રમોટર વિસ્તારમાં ખામી (D) પણ સમસ્યાઓ ઉભી કરી શકે, પરંતુ તે ઇન્સર્શનલ મ્યુટેશનના મુખ્ય કારણ નથી.", "ncert_ref": "Class XII - Chapter 12: જૈવ-તકનીકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 8}, {"question": "જનીન ઉપચારમાં, નીચેનામાંથી કયા પ્રકારના જનીન ઉપચારમાં સંકલિત જનીન કોષરસમાં રહે છે અને કોષવિભાજન દરમિયાન પુત્રી કોષોમાં પસાર થતું નથી?", "options": ["A) જરમલાઇન જનીન ઉપચાર", "B) સોમેટિક જનીન ઉપચાર", "C) એક્સ વાઇવો જનીન ઉપચાર", "D) ઇન વાઇવો જનીન ઉપચાર"], "correct": 1, "explanation": "સોમેટિક જનીન ઉપચારમાં, સંકલિત જનીન કોષરસમાં રહે છે અને કોષવિભાજન દરમિયાન પુત્રી કોષોમાં પસાર થતું નથી. જરમલાઇન જનીન ઉપચાર (A)માં જનીન જરમ કોષોમાં સંકલિત થાય છે અને પેઢી દર પેઢી પસાર થાય છે. એક્સ વાઇવો (C) અને ઇન વાઇવો (D) પદ્ધતિઓ જનીન ઉપચારના પ્રકાર નથી, પરંતુ પદ્ધતિઓ છે.", "ncert_ref": "Class XII - Chapter 12: જૈવ-તકનીકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 9}, {"question": "જનીન ઉપચારમાં, નીચેનામાંથી કયા રોગના ઉપચાર માટે ' ની સમસ્યા નીચેનામાંથી કયા કારણસર ઉદ્ભવે છે?", "options": ["A) વાહકના DNAનું લક્ષ્ય કોષના કોષકેન્દ્રમાં અયોગ્ય સ્થાને સંકલન થવું.", "B) ક્રિસ્પર-કેસ9 તકનીક દ્વારા લક્ષ્ય જનીન સિવાયના અન્ય જનીનોમાં ફેરફાર થવો.", "C) જનીન ઉપચાર દરમિયાન ઇમ્યુન પ્રતિક્રિયા ઉદ્ભવવી.", "D) વાહકના DNAનું કોષરસમાં રહેવું અને અભિવ્યક્ત ન થવું."], "correct": 1, "explanation": "'ઓફ-ટાર્ગેટ ઇફેક્ટ' એટલે લક્ષ્ય જનીન સિવાયના અન્ય જનીનોમાં અણિચ્છનીય ફેરફાર થવો. ક્રિસ્પર-કેસ9 તકનીક દરમિયાન, જો ગાઇડ RNA લક્ષ્ય જનીન સાથે પૂરતી હોમોલોજી ન ધરાવતો હોય, તો તે અન્ય જનીનોમાં કાપ કરે છે, જેનાથી 'ઓફ-ટાર્ગેટ ઇફેક્ટ' ઉદ્ભવે છે (B સત્ય). વાહકના DNAનું અયોગ્ય સ્થાને સંકલન થવું 'ઇન્સર્શનલ મ્યુટેશન' તરફ દોરી જાય છે (A અસત્ય). ઇમ્યુન પ્રતિક્રિયા 'ઇમ્યુનોજેનિસિટી' સાથે સંબંધિત છે (C અસત્ય). વાહકના DNAનું કોષરસમાં રહેવું 'અસ્થાયી જનીન અભિવ્યક્તિ' તરફ દોરી જાય છે (D અસત્ય).", "ncert_ref": "Class XII - Chapter 12: જૈવ-તકનીકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 32}, {"question": "જનીન ઉપચાર દરમિયાન, 'સેલ્ફ-કોમ્પ્લિમેન્ટરી ડિગોક્સીન્યુક્લિયોટાઇડ્સ' (Self-Complementary DNA) નો ઉપયોગ કયા હેતુ માટે થાય છે?", "options": ["A) લક્ષ્ય કોષમાં વાહક DNA ની સ્થિરતા વધારવા માટે.", "B) જનીન ઉપચાર દરમિયાન પ્રતિરક્ષાતંત્રની પ્રતિક્રિયા ઘટાડવા માટે.", "C) હોમોલોગસ રિકોમ્બિનેશન દરમિયાન લક્ષ્ય કોષના વર્ણસૂત્રમાં જનીનના સંકલનની કુશળતા વધારવા માટે.", "D) કોષરસમાં જનીનની અસ્થાયી અભિવ્યક્તિ માટે."], "correct": 2, "explanation": "'સેલ્ફ-કોમ્પ્લિમેન્ટરી ડિગોક્સીન્યુક્લિયોટાઇડ્સ'નો ઉપયોગ હોમોલોગસ રિકોમ્બિનેશન દરમિયાન લક્ષ્ય કોષના વર્ણસૂત્રમાં જનીનના સંકલનની કુશળતા વધારવા માટે થાય છે. વિકલ્પ A, B, અને D આ હેતુ સાથે સંબંધિત નથી.", "ncert_ref": "Class XII - Chapter 12: જૈવ તકનીકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 33}, {"question": "જનીન ઉપચાર દરમિયાન, 'ઇન્ટીગ્રેટિંગ વાહક' તરીકે વપરાતા રેટ્રોવાયરસમાં નીચેનામાંથી કયું લક્ષણ અસ્તિત્વમાં નથી, જેના કારણે તેને કેટલાક કિસ્સાઓમાં અયોગ્ય બનાવે છે?", "options": ["A) તે લક્ષ્ય કોષના વર્ણસૂત્રમાં સ્થાયી રીતે સંકલિત થાય છે", "B) તે ફક્ત વિભાજિત થતાં કોષોમાં જ કામ કરે છે", "C) તેના જનીનો         }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
