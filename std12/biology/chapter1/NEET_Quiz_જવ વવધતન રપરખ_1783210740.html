<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - જૈવ વિવિધતાની રૂપરેખાઓ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 જૈવ વિવિધતાની રૂપરેખાઓ</span>
                <span>🎯 Hard</span>
                <span>📝 38 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "આપેલા વિકલ્પોમાંથી કયું જૈવ વિવિધતાની રૂપરેખાઓના અભ્યાસમાં સૌથી ઓછું મહત્વનું છે?", "options": ["A) જનીન વિવિધતા", "B) જાતિ વિવિધતા", "C) પારિસ્થિતિક તંત્રની વિવિધતા", "D) કોષીય શ્વસનની ક્રિયાવિધિ"], "correct": 3, "explanation": "જૈવ વિવિધતાની રૂપરેખાઓમાં જનીન વિવિધતા, જાતિ વિવિધતા અને પારિસ્થિતિક તંત્રની વિવિધતા મહત્વના ઘટકો છે. કોષીય શ્વસનની ક્રિયાવિધિ એક જૈવ રાસાયણિક પ્રક્રિયા છે, જે જૈવ વિવિધતાના અભ્યાસમાં સીધું મહત્વ ધરાવતી નથી. અ) જનીન વિવિધતા જૈવ વિવિધતાનું મૂળભૂત એકમ છે. બ) જાતિ વિવિધતા વિવિધ પ્રજાતિઓની હાજરી દર્શાવે છે. ક) પારિસ્થિતિક તંત્રની વિવિધતા પારિસ્થિતિક તંત્રોમાં વિવિધતા દર્શાવે છે.", "ncert_ref": "Class XI - પ્રકરણ ૭: જૈવ વિવિધતાની રૂપરેખાઓ", "difficulty": "Hard", "num": 1}, {"question": "આપેલા વિકલ્પોમાંથી કયું વિધાન સત્ય નથી? જૈવ વિવિધતાની રૂપરેખાઓના સંદર્ભમાં,", "options": ["A) ભારતને મહા-વિવિધતા ધરાવતા દેશ તરીકે ઓળખવામાં આવે છે.", "B) આલ્પ્સ પર્વતમાળા હોટસ્પોટ તરીકે જાણીતી છે.", "C) વન્ય જીવન અભયારણ્યો જૈવ વિવિધતાના સંરક્ષણમાં મહત્વની ભૂમિકા ભજવે છે.", "D) જૈવ વિવિધતાની રૂપરેખાઓમાં સ્થાનિક જાતિઓનો સમાવેશ થાય છે."], "correct": 1, "explanation": "આલ્પ્સ પર્વતમાળા હોટસ્પોટ નથી, પરંતુ તે જૈવ વિવિધતાથી સમૃદ્ધ છે. અ) ભારતને મહા-વિવિધતા ધરાવતા દેશ તરીકે ઓળખવામાં આવે છે કારણ કે તે વિશ્વની લગભગ ૮% જાતિઓ ધરાવે છે. ક) વન્ય જીવન અભયારણ્યો જૈવ વિવિધતાના સંરક્ષણમાં મહત્વની ભૂમિકા ભજવે છે કારણ કે તેઓ પ્રાકૃતિક આવાસોને સુરક્ષિત રાખે છે. ડ) જૈવ વિવિધતાની રૂપરેખાઓમાં સ્થાનિક જાતિઓનો સમાવેશ થાય છે કારણ કે તેઓ વિશિષ્ટ પારિસ્થિતિક વિસ્તારોની વિશેષતાઓ દર્શાવે છે.", "ncert_ref": "Class XI - પ્રકરણ ૭: જૈવ વિવિધતાની રૂપરેખાઓ", "difficulty": "Hard", "num": 2}, {"question": "જૈવ વિવિધતાની રૂપરેખાઓના સંદર્ભમાં, નીચેનામાંથી કયું યુગ્મ સાચું નથી?", "options": ["A) અલ્ફ્રેડ રસલ વોલેસ - વોલેસ લાઈન", "B) એડવર્ડ વિલ્સન - જૈવ વિવિધતાના પિતા", "C) રોબર્ટ મેય - આઇલૅન્ડ બાયોજિયોગ્રફી", "D) એરન્સ્ટ મેયર - ઉત્ક્રાંતિનો સિદ્ધાંત"], "correct": 1, "explanation": "એડવર્ડ વિલ્સનને જૈવ વિવિધતાના પિતા તરીકે ઓળખવામાં આવે છે, પરંતુ અલ્ફ્રેડ રસલ વો "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 18}, {"question": "જૈવ વિવિધતાની રૂપરેખાઓના સંદર્ભમાં, નીચેનામાંથી કયું વિધાન 'એકોસિસ્ટમ ડાયવર્સિટી' (Ecosystem Diversity) વિશે ખોટું છે?", "options": ["A) તે એક જ ભૌગોલિક પ્રદેશમાં વિવિધ ઇકોસિસ્ટમની હાજરીને સૂચવે છે.", "B) તે જાતિઓની વિવિધતાને માપવાનું એક માપદંડ છે.", "C) તે વન, ઘાસના મેદાન અને તળાવ જેવી વિવિધ ઇકોસિસ્ટમની હાજરીને સૂચવે છે.", "D) તે ઇકોસિસ્ટમની ક્રિયાશીલતામાં ફેરફાર લાવી શકે છે."], "correct": 1, "explanation": "એકોસિસ્ટમ ડાયવર્સિટી એ જાતિઓની વિવિધતાને માપવાનું માપદંડ નથી, પરંતુ તે એક જ ભૌગોલિક પ્રદેશમાં વિવિધ ઇકોસિસ્ટમની હાજરીને સૂચવે છે. વિકલ્પ A, C અને D સાચા છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 19}, {"question": "ભારતના કયા રાષ્ટ્રીય ઉદ્યાનમાં 'ગ્રેટ ઇન્ડિયન બસ્ટર્ડ' (Ardeotis nigriceps) ને સંરક્ષણ આપવા માટે વિશેષ પ્રયત્નો કરવામાં આવે છે, જે IUCN લાલ સૂચીમાં ગંભીર જોખમમાં છે?", "options": ["A) જિમ કોર્બેટ રાષ્ટ્રીય ઉદ્યાન", "B) દેશી રાષ્ટ્રીય ઉદ્યાન (Desert National Park)", "C) કાઝીરંગા રાષ્ટ્રીય ઉદ્યાન", "D) સુંદરબન રાષ્ટ્રીય ઉદ્યાન"], "correct": 1, "explanation": "ગ્રેટ ઇન્ડિયન બસ્ટર્ડને દેશી રાષ્ટ્રીય ઉદ્યાન (રાજસ્થાન)માં સંરક્ષણ આપવામાં આવે છે. જિમ કોર્બેટ, કાઝીરંગા અને સુંદરબનમાં આ પ્રજાતિ જોવા મળતી નથી.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 20}, {"question": "ભારતના પશ્ચિમ ઘાટના જૈવ વિવિધતા હોટસ્પોટમાં, નીચેનામાંથી કયું યુગ્મ એન્ડેમિક પ્રજાતિઓ અને તેમના નિવાસસ્થાનના સંયોજન તરીકે યોગ્ય નથી?", "options": ["A) મલબાર પીટ વાઇપર – આર્દ્ર પર્ણપાતી જંગલો", "B) નીલગિરી તહર – શોલા જંગલો અને ઘાસના મેદાનો", "C) લાયન-ટેલ્ડ મકાક – ઉષ્ણકટિબંધીય સૂકા પર્ણપાતી જંગલો", "D) કાણી કુતરો – ઉચ્ચ પર્વતીય ઘાસના મેદાનો"], "correct": 2, "explanation": "લાયન-ટેલ્ડ મકાક (Macaca silenus) પશ્ચિમ ઘાટના આર્દ્ર પર્ણપાતી જંગલોમાં જોવા મળે છે, ઉષ્ણકટિબંધીય સૂકા પર્ણપાતી જંગલો નહીં. મલબાર પીટ વાઇપર (Trimeresurus malabaricus) આર્દ્ર પર્ણપાતી જંગલોમાં એન્ડેમિક છે. નીલગિરી તહર (Nilgiritragus hylocrius) શોલા જંગલો અને ઘાસના મેદાનોમાં જોવા મળે છે. કાણી કુતરો (Cuon alpinus) ઉચ્ચ પર્વતીય ઘાસના મેદાનોમાં જોવા મળે છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 21}, {"question": "જૈવ વિવિધતાની રૂપરેખાઓના અભ્યાસમાં, 'એલફા વિવિધતા' અને 'બીટા વિવિધતા' વચ્ચેનો તફાવત સમજાવતું નીચેનામાંથી કયું વિધાન સૌથી યોગ્ય છે?", "options": ["A) એલફા વિવિધતા એક જ બાયોમમાં જાતિઓની સંખ્યા દર્શાવે છે, જ્યારે બીટા વિવિધતા બે અલગ બાયોમ વચ્ચેની જાતિઓની તુલના કરે છે.", "B) એલફા વિવિધતા એક જ સ્થાને જાતિઓની વિવિધતા દર્શાવે છે, જ્યારે બીટા વિવિધતા અલગ સ્થાનો વચ્ચે જાતિઓના ફેરફારનો દર દર્શાવે છે.", "C) એલફા વિવિધતા જનીનિક વિવિધતા દર્શાવે છે, જ્યારે બીટા વિવિધતા જાતિઓની સંખ્યા દર્શાવે છે.", "D) એલફા વિવિધતા ઇકોસિસ્ટમની સ્થિરતા દર્શાવે છે, જ્યારે બીટા વિવિધતા ઇકોસિસ્ટમની ગતિશીલતા દર્શાવે છે."], "correct": 1, "explanation": "એલફા વિવિધતા એક જ સ્થાને (અથવા ઇકોસિસ્ટમમાં) જાતિઓની વિવિધતા દર્શાવે છે, જ્યારે બીટા વિવિધતા અલગ સ્થાનો અથવા ઇકોસિસ્ટમ વચ્ચે જાતિઓના ફેરફારનો દર (ટર્નઓવર) દર્શાવે છે. વિકલ્પ A ખોટો છે કારણ કે એલફા વિવિધતા બાયોમ સાથે સીધો સંબંધ ધરાવતી નથી. વિકલ્પ C અને D એલફા અને બીટા વિવિધતાની પરિભાષા સાથે મેળ ખાતા નથી.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 22}, {"question": "ભારતના જૈવ વિવિધતા હોટસ્પોટમાં, નીચેનામાંથી કયો પ્રદેશ 'હિમાલયન હોટસ્પોટ' તરીકે ઓળખાતો નથી, પરંતુ તેની જૈવ વિવિધતાના કારણે મહત્વનો છે?", "options": ["A) અરુણાચલ પ્રદેશ", "B) સિક્કિમ", "C) કચ્છનો દરિયાઈ રાષ્ટ્રીય ઉદ્યાન", "D) ઉત્તરાખંડ"], "correct": 2, "explanation": "કચ્છનો દરિયાઈ રાષ્ટ્રીય ઉદ્યાન 'હિમાલયન હોટસ્પોટ'નો ભાગ નથી, પરંતુ તે સ્થાનિક અને સ્થળાંતરિત પ્રજાતિઓના કારણે જૈવ વિવિધતાના દૃષ્ટિકોણથી મહત્વનો છે. અરુણાચલ પ્રદેશ, સિક્કિમ અને ઉત્તરાખંડ હિમાલયન હોટસ્પોટના ભાગ છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 23}, {"question": "ભારતના જૈવ વિવિધતા હોટસ્પોટમાં, નીચેનામાંથી કયા પ્રાણીને 'ઇન્ડિકેટર પ્રજાતિ' (Indicator Species) તરીકે ઓળખવામાં આવે છે, જે ઇકોસિસ્ટમની સ્વાસ્થ્ય સ્થિતિ દર્શાવે છે?", "options": ["A) બેંગાલ ટાઇગર", "B) એશિયાટિક હાથી", "C) મોર", "D) હનુમાન લંગૂર"], "correct": 0, "explanation": "બેંગાલ ટાઇગર (Panthera tigris tigris) ને ઇન્ડિકેટર પ્રજાતિ તરીકે ઓળખવામાં આવે છે કારણ કે તે ઇકોસિસ્ટમની સ્વાસ્થ્ય સ્થિતિ અને જૈવ વિવિધતાના સ્તરને દર્શાવે છે. એશિયાટિક હાથી, મોર અને હનુમાન લંગૂર ઇન્ડિકેટર પ્રજાતિ તરીકે ઓળખાતા નથી.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 24}, {"question": "પશ્ચિમ ઘાટના જૈવ વિવિધતા હોટસ્પોટમાં, નીચેનામાંથી કયું યુગ્મ એન્ડેમિક પ્રજાતિઓ અને તેમના નિવાસસ્થાનના સંકેતરૂપે યોગ્ય રીતે જોડાયેલું છે?", "options": ["A) નીલગિરી તહર – ઉચ્ચ પર્વતીય ઘાસમાય પ્રદેશો", "B) મલબાર પીટ વાઇપર – મેંગ્રોવ વન", "C) લાયન-ટેલ્ડ મકાક – રણપ્રદેશ", "D) ગ્રેટ ઇન્ડિયન હોર્નબિલ – પર્ણપાતી વન"], "correct": 0, "explanation": "નીલગિરી તહર (Nilgiri Tahr) પશ્ચિમ ઘાટના ઉચ્ચ પર્વતીય ઘાસમાય પ્રદેશોમાં એન્ડેમિક છે અને તે આ પ્રદેશના નિવાસસ્થાનનો સંકેત આપે છે. મલબાર પીટ વાઇપર પર્ણપાતી વનોમાં જોવા મળે છે, લાયન-ટેલ્ડ મકાક પર્ણપાતી વન અને ઉષ્ણકટિબંધીય સૂકા વનોમાં જોવા મળે છે, જ્યારે ગ્રેટ ઇન્ડિયન હોર્નબિલ પર્ણપાતી વનોમાં જોવા મળે છે પરંતુ તે એન્ડેમિક નથી.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 25}, {"question": "ભારતના હિમાલયન હોટસ્પોટ વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) આ હોટસ્પોટમાં 10,000 થી વધુ વાનસ્પતિક પ્રજાતિઓ જોવા મળે છે.", "B) આ હોટસ્પોટમાં 'રેડ પાંડા' અને 'સ્નો લેપર્ડ' જેવી પ્રજાતિઓ જોવા મળે છે.", "C) આ હોટસ્પોટમાં મુખ્યત્વે ઉષ્ણકટિબંધીય વનસ્પતિ જોવા મળે છે.", "D) આ હોટસ્પોટમાં 'રોડોડેન્ડ્રોન' જેવી પ્રજાતિઓ જોવા મળે છે."], "correct": 2, "explanation": "હિમાલયન હોટસ્પોટમાં મુખ્યત્વે શીતોષ્ણ કટિબંધીય વનસ્પતિ જોવા મળે છે, ઉષ્ણકટિબંધીય વનસ્પતિ નહીં. બાકીના વિધાનો સાચા છે: આ હોટસ્પોટમાં 10,000 થી વધુ વાનસ્પતિક પ્રજાતિઓ, 'રેડ પાંડા' અને 'સ્નો લેપર્ડ' જેવી પ્રજાતિઓ, તેમજ 'રોડોડેન્ડ્રોન' જેવી પ્રજાતિઓ જોવા મળે છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 26}, {"question": "એક સંશોધકે પશ્ચિમ ઘાટના જંગલોમાં ત્રણ અલગ-અલગ સ્થળોએ વનસ્પતિની જાતિઓની સંખ્યા નોંધી: સ્થળ A પર 120, સ્થળ B પર 95 અને સ્થળ C પર 110 જાતિઓ મળી. જો આ ત્રણ સ્થળો વચ્ચેની સરેરાશ સમાન જાતિઓની સંખ્યા 40 હોય, તો આ વિસ્તારની 'બીટા વિવિધતા'નું મૂલ્ય કેટલું હશે?", "options": ["A) 2.25", "B) 1.875", "C) 2.75", "D) 3.125"], "correct": 1, "explanation": "બીટા વિવિધતા = (સ્થળોની કુલ જાતિઓની સંખ્યા / સરેરાશ સ્થાનિક જાતિઓની સંખ્યા) - 1. અહીં, કુલ જાતિઓ = 120 + 95 + 110 - 2*40 = 245 (કારણ કે સમાન જાતિઓ બે વખત ગણાઈ છે). સરેરાશ સ્થાનિક જાતિઓ = (120 + 95 + 110)/3 = 108.33. તેથી બીટા વિવિધતા = (245/108.33) - 1 ≈ 1.875. વિકલ્પ A ખોટો છે કારણ કે તેમાં સમાન જાતિઓને યોગ્ય રીતે બાદ કરવામાં આવી નથી. વિકલ્પ C અને D ખોટા છે કારણ કે ગણતરીની પદ્ધતિ અયોગ્ય છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 15: જૈવવિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 27}, {"question": "નીચેનામાંથી કયું વિધાન 'જૈવ વિવિધતાના સંરક્ષણ માટેના એક્ઝ-સીટુ (Ex-situ) પદ્ધતિ'ના સંદર્ભમાં ખોટું છે, પરંતુ 'ઇન-સીટુ (In-situ) પદ્ધતિ' માટે સાચું હોઈ શકે છે?", "options": ["A) આ પદ્ધતિમાં જનીનિક વિવિધતા જાળવવામાં મુશ્કેલી થાય છે કારણ કે પ્રજાતિઓ કુદરતી વાતાવરણથી દૂર રાખવામાં આવે છે.", "B) આ પદ્ધતિમાં પ્રજાતિઓના કુદરતી આવાસમાં જ સંરક્ષણ આપવામાં આવે છે, જેનાથી તેમની ઉત્ક્રાંતિ પ્રક્રિયા અવિરત રહે છે.", "C) આ પદ્ધતિમાં પ્રજાતિઓને કૃત્રિમ રીતે ઉછેરવામાં આવે છે, જેનાથી તેમની વસ્તી વધારવામાં મદદ મળે છે.", "D) આ પદ્ધતિમાં પ્રજાતિઓના સંરક્ષણ માટે રાષ્ટ્રીય ઉદ્યાનો અને અભયારણ્યોની સ્થાપના કરવામાં આવે છે."], "correct": 1, "explanation": "વિકલ્પ B એ ઇન-સીટુ સંરક્ષણની વ્યાખ્યા છે, જ્યારે પ્રશ્ન એક્ઝ-સીટુ પદ્ધતિ માટે ખોટું વિધાન પૂછે છે. વિકલ્પ A એક્ઝ-સીટુ પદ્ધતિ માટે સાચું છે કારણ કે તેમાં જનીનિક વિવિધતા જાળવવી મુશ્કેલ હોય છે. વિકલ્પ C એક્ઝ-સીટુ પદ્ધતિનું સાચું વર્ણન છે. વિકલ્પ D ઇન-સીટુ પદ્ધતિનું વર્ણન છે, તેથી પ્રશ્નના સંદર્ભમાં ખોટું છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 15: જૈવવિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 28}, {"question": "પશ્ચિમ ઘાટના જૈવ વિવિધતા હોટસ્પોટમાં જોવા મળતી 'લાયન-ટેલ્ડ મકાક' (Macaca silenus) પ્રજાતિ વિશે નીચેનામાંથી કયું વિધાન ખોટું છે, જે તેને અન્ય પ્રાઇમેટ પ્રજાતિઓથી અલગ પાડે છે?", "options": ["A) આ પ્રજાતિના નર અને માદા બંનેમાં ચહેરા પર વાળનો ગુચ્છ હોતો નથી, જે તેમને અન્ય મકાક પ્રજાતિઓથી અલગ પાડે છે.", "B) આ પ્રજાતિ મુખ્યત્વે ફળો પર આધારિત છે, પરંતુ કીટકો અને નાના કરોડરજ્જુ પ્રાણીઓનો પણ આહારમાં સમાવેશ કરે છે.", "C) આ પ્રજાતિના સમૂહમાં સામાજિક માળખું 'મલ્ટી-મેલ-મલ્ટી-ફીમેલ' પ્રકારનું હોય છે, જેમાં એક કરતાં વધુ પ્રભાવી નર હોય છે.", "D) આ પ્રજાતિના વસવાટમાં વનનાબૂદી અને ખેતી વિસ્તરણને કારણે ખંડિતતા આવી છે, જે તેમના અસ્તિત્વ માટે મોટો ખતરો છે."], "correct": 0, "explanation": "લાયન-ટેલ્ડ મકાકના નર અને માદા બંનેમાં ચહેરા પર સફેદ વાળનો ગુચ્છ હોય છે, જે તેમની વિશિષ્ટ ઓળખ છે. તેથી વિકલ્પ A ખોટું છે. વિકલ્પ B, C અને D આ પ્રજાતિ વિશે સાચી માહિતી આપે છે. વિકલ્પ C ખાસ કરીને સાચું છે કારણ કે આ પ્રજાતિનું સામાજિક માળખું અન્ય મકાક પ્રજાતિઓથી અલગ હોય છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 15: જૈવવિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 29}, {"question": "પશ્ચિમ ઘાટના જૈવ વિવિધતા હોટસ્પોટમાં, 'મ્યુસી કૉરિડોર' (Myristica Swamp) ની જૈવ વિવિધતાને લગતા નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) આ કૉરિડોરમાં એન્ડેમિક વનસ્પતિ પ્રજાતિઓ જેવી કે 'મ્યુસી કૉરિડોરની મિર્ટલ' (Myristica fatua) જોવા મળે છે.", "B) આ કૉરિડોરમાં મુખ્યત્વે પાણીની અછત વરસાદી જંગલો જોવા મળે છે.", "C) આ કૉરિડોરમાં 'કાનન પક્ષી' (Great Indian Hornbill) જેવા પક્ષીઓના નિવાસસ્થાન તરીકે ઓળખાય છે.", "D) આ કૉરિડોરમાં 'મલબાર પીટ વાઇપર' (Trimeresurus malabaricus) જેવા સર્પોની એન્ડેમિક પ્રજાતિઓ જોવા મળે છે."], "correct": 1, "explanation": "મ્યુસી કૉરિડોર પશ્ચિમ ઘાટના દલદલીય જંગલોનો ભાગ છે, જ્યાં પાણીની પ્રચુરતા હોય છે, ન કે પાણીની અછત. આ કૉરિડોરમાં 'મ્યુસી કૉરિડોરની મિર્ટલ' (Myristica fatua) જેવી એન્ડેમિક વનસ્પતિ પ્રજાતિઓ, 'કાનન પક્ષી' (Great Indian Hornbill) જેવા પક્ષીઓ, અને 'મલબાર પીટ વાઇપર' (Trimeresurus malabaricus) જેવા સર્પો જોવા મળે છે. પરંતુ પાણીની અછત વરસાદી જંગલો આ કૉરિડોરની લાક્ષણિકતા નથી, એટલે વિધાન B ખોટું છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 30}, {"question": "ભારતના જૈવ વિવિધતા હોટસ્પોટમાં, નીચેનામાંથી કયો પ્રાણીને 'ઇન્ડિકેટર પ્રજાતિ' (Indicator Species) તરીકે ઓળખવામાં આવે છે, જે ઇકોસિસ્ટમની સ્વાસ્થ્ય સ્થિતિ દર્શાવે છે?", "options": ["A) એશિયાટિક હાથી (Elephas maximus)", "B) બંગાળ વાઘ (Panthera tigris tigris)", "C) મોર (Pavo cristatus)", "D) નીલગિરી લંગૂર (Trachypithecus johnii)"], "correct": 1, "explanation": "બંગાળ વાઘ (Panthera tigris tigris) ને ઇન્ડિકેટર પ્રજાતિ તરીકે ઓળખવામાં આવે છે, કારણ કે તે ઇકોસિસ્ટમની સ્વાસ્થ્ય સ્થિતિ અને જૈવ વિવિધતાનું સૂચક છે. એશિયાટિક હાથી, મોર, અને નીલગિરી લંગૂર પણ મહત્વપૂર્ણ પ્રજાતિઓ છે, પરંતુ તે ઇન્ડિકેટર પ્રજાતિ તરીકે ઓળખાતા નથી. વિકલ્પ B સાચો છે કારણ કે વાઘની હાજરી ઇકોસિસ્ટમની સ્વાસ્થ્ય સ્થિતિ દર્શાવે છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 31}, {"question": "ભારતના હિમાલયન જૈવ વિવિધતા હોટસ્પોટ વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) આ હોટસ્પોટમાં એન્ડેમિક પ્રજાતિઓ જેવી કે રેડ પાંડા (Ailurus fulgens) અને હિમાલયન મોનાલ (Lophophorus impejanus) જોવા મળે છે.", "B) આ હોટસ્પોટમાં ઉચ્ચ પર્વતીય પ્રદેશોમાં અલ્પાઇન વનસ્પતિ અને તૃણોની વિપુલતા જોવા મળે છે.", "C) આ હોટસ્પોટમાં કોઈપણ પ્રકારની જળચર પ્રજાતિઓ જોવા મળતી નથી, કારણ કે તે મુખ્યત્વે પર્વતીય પ્રદેશ છે.", "D) આ હોટસ્પોટમાં વનસ્પતિ અને પ્રાણી જાતિઓની ઉચ્ચ સ્તરની એન્ડેમિસિટી જોવા મળે છે."], "correct": 2, "explanation": "વિકલ્પ C ખોટો છે, કારણ કે હિમાલયન હોટસ્પોટમાં જળચર પ્રજાતિઓ જેવી કે હિમાલયન ટ્રાઉટ (Schizothorax spp.) અને અન્ય જળચર જીવો જોવા મળે છે. વિકલ્પ A સાચો છે કારણ કે રેડ પાંડા અને હિમાલયન મોનાલ આ હોટસ્પોટની એન્ડેમિક પ્રજાતિઓ છે. વિકલ્પ B સાચો છે કારણ કે ઉચ્ચ પર્વતીય પ્રદેશોમાં અલ્પાઇન વનસ્પતિ અને તૃણોની વિપુલતા જોવા મળે છે. વિકલ્પ D સાચો છે કારણ કે આ હોટસ્પોટમાં ઉચ્ચ સ્તરની એન્ડેમિસિટી જોવા મળે છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 32}, {"question": "નીચેનામાંથી કયું યુગ્મ 'કીસ્ટોન પ્રજાતિ' (Keystone Species) અને તેની ભૂમિકાનું સૌથી યોગ્ય મેળ num": 36}, {"question": "ભારતના પશ્ચિમ ઘાટના જૈવ વિવિધતા હોટસ્પોટમાં, નીચેનામાંથી કયી પ્રજાતિ 'કીસ્ટોન પ્રજાતિ' (Keystone Species) તરીકે ઓળખાય છે, જેના અદૃશ્ય થવાથી સમગ્ર ઇકોસિસ્ટમ પર નોંધપાત્ર અસર પડે છે?", "options": ["A) એશિયાટિક હાથી (Elephas maximus)", "B) બેંગાલ ટાઇગર (Panthera tigris tigris)", "C) નીલગિરી તહર (Nilgiritragus hylocrius)", "D) લાયન-ટેલ્ડ મકાક (Macaca silenus)"], "correct": 0, "explanation": "એશિયાટિક હાથી (Elephas maximus) એ પશ્ચિમ ઘાટમાં 'કીસ્ટોન પ્રજાતિ' તરીકે ઓળખાય છે, કારણ કે તે વનસ્પતિના ફેલાવા અને ઇકોસિસ્ટમની રચનામાં મહત્વની ભૂમિકા ભજવે છે. બેંગાલ ટાઇગર (B) મુખ્યત્વે શિકારી છે અને કીસ્ટોન પ્રજાતિ નથી. નીલગિરી તહર (C) અને લાયન-ટેલ્ડ મકાક (D) એ એન્ડેમિક પ્રજાતિઓ છે, પરંતુ કીસ્ટોન પ્રજાતિ નથી.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 37}, {"question": "ભારતના હિમાલયન જૈવ વિવિધતા હોટસ્પોટ વિશે નીચેનામાંથી કયું યુગ્મ એન્ડેમિક પ્રજાતિ અને તેના વાસ સ્થાનનું સૌથી યોગ્ય જોડાણ દર્શાવે છે?", "options": ["A) રેડ પાંડા - ઉચ્ચ હિમાલયન ક્ષેત્ર (3000-4500 મીટર)", "B) સ્નો લેપર્ડ - પર્વતીય પર્ણપાતી જંગલો (1000-2000 મીટર)", "C) હિમાલયન મોનાલ - આલ્પાઇન ઘાસમાય રમણીયા (2400-4500 મીટર)", "D) એશિયાટિક કાળો ભાલૂ - શંકુધારી જંગલો (2000-3000 મીટર)"], "correct": 2, "explanation": "વિકલ્પ C સાચો છે કારણ કે હિમાલયન મોનાલ (Lophophorus impejanus) એ હિમાલયન હોટસ્પોટની એન્ડેમિક પ્રજાતિ છે અને તે આલ્પાઇન ઘાસમાય રમણીયા (Alpine meadows)માં 2400-4500 મીટરની ઉંચાઇએ જોવા મળે છે. વિકલ્પ A ખોટો છે કારણ કે રેડ પાંડા હિમાલયન ક્ષેત્રમાં જોવા મળે છે, પરંતુ તે એન્ડેમિક નથી (તે ચીન અને નેપાળમાં પણ જોવા મળે છે). વિકલ્પ B ખોટો છે કારણ કે સ્નો લેપર્ડ ઉચ્ચ હિમાલયન ક્ષેત્રમાં જોવા મળે છે, નહીં કે પર્વતીય પર્ણપાતી જંગલોમાં. વિકલ્પ D ખોટો છે કારણ કે એશિયાટિક કાળો ભાલૂ હિમાલયન ક્ષેત્રમાં જોવા મળે છે, પરંતુ તે એન્ડેમિક નથી અને શંકુધારી જંગલો તેના મુખ્ય વાસ સ્થાનમાંથી એક નથી.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 38}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');

                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);

            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
