<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - ફળ (Fruit)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 ફળ (Fruit)</span>
                <span>🎯 Hard</span>
                <span>📝 50 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>

estion": "નીચેનામાંથી કયું ફળ 'પાર્થેનોકાર્પી' (parthenocarpy) દ્વારા રચાય છે, જેમાં બીજની રચના થતી નથી પરંતુ ફળ વિકસે છે?", "options": ["A) કેળું (Banana)", "B) સફરજન (Apple)", "C) ડાંગર (Pomegranate)", "D) જામફળ (Guava)"], "correct": 0, "explanation": "કેળું (Banana) એક ઉદાહરણ છે જેમાં પાર્થેનોકાર્પી જોવા મળે છે, જ્યાં બીજની રચના વિના ફળ વિકસે છે. સફરજન (Apple) એક પોમ પ્રકારનું ફળ છે જેમાં બીજ રચાય છે. ડાંગર (Pomegranate) અને જામફળ (Guava) પણ બીજ ધરાવતા ફળો છે, જેમાં પાર્થેનોકાર્પી જોવા મળતું નથી.", "ncert_ref": "Class XII - Chapter 2: સવર્ગીકરણ અને વનસ્પતિ જગતમાં વૈવિધ્ય", "difficulty": "Hard", "num": 16}, {"question": "નીચેનામાંથી કયું ફળ 'સીનોકાર્પ' (syncarpous) પ્રકારનું છે, જેમાં બહુવિધ કાર્પેલ્સ (carpels) એકબીજા સાથે જોડાયેલા હોય છે અને એક જ ફળ રચે છે?", "options": ["A) ટામેટું (Tomato)", "B) કાકડી (Cucumber)", "C) લીમડો (Lemon)", "D) કોથમીર (Coriander)"], "correct": 2, "explanation": "લીમડો (Lemon) એક સીનોકાર્પ ફળ છે, જેમાં બહુવિધ કાર્પેલ્સ એકબીજા સાથે જોડાયેલા હોય છે અને એક જ ફળ રચે છે. ટામેટું (Tomato) અને કાકડી (Cucumber) બેરી પ્રકારના ફળો છે, જ્યારે કોથમીર (Coriander) એક સ્કીઝોકાર્પ ફળ છે.", "ncert_ref": "Class XI - Chapter 5: પુષ્પી વનસ્પતિઓની શારીરિક રચના", "difficulty": "Hard", "num": 17}, {"question": "નીચેનામાંથી કયું ફળ 'એગ્રિગેટ' (aggregate) પ્રકારનું છે, જેમાં એક જ પુષ્પમાંથી ઘણા બીજાંડકોષ વિકસે છે અને એક જ ફળ રચે છે?", "options": ["A) સ્ટ્રોબેરી (Strawberry)", "B) પપૈયા (Papaya)", "C) કેળું (Banana)", "D) ડાંગર (Pomegranate)"], "correct": 0, "explanation": "સ્ટ્રોબેરી (Strawberry) એક એગ્રિગેટ ફળ છે, જેમાં એક જ પુષ્પમાંથી ઘણા બીજાંડકોષ વિકસે છે અને એક જ ફળ રચે છે. પપૈયા (Papaya) એક બેરી પ્રકારનું ફળ છે, કેળું (Banana) પાર્થેનોકાર્પી ફળ છે, અને ડાંગર (Pomegranate) એક બેરી પ્રકારનું ફળ છે.", "ncert_ref": "Class XII - Chapter 2: સવર્ગીકરણ અને વનસ્પતિ જગતમાં વૈવિધ્ય", "difficulty": "Hard", "num": 18}, {"question": "નીચેના પૈકી કયું ફળ 'ફોલિકલ' (follicle) પ્રકારનું છે, પરંતુ તેની રચના દરમિયાન એક કરતાં વધુ કાર્પેલ્સ (carpels) નું સંમિલન થાય છે અને પાકી જતાં તે એક જ બાજુથી ફાટે છે?", "options": ["A) મેડલર (Medlar)", "B) કલિંગડ (Calotropis)", "C) સ્ટ્રોબેરી (Strawberry)", "D) મગફળી (Peanut)"], "correct": 1, "explanation": "કલિંગડ (Calotropis) નું ફળ 'ફોલિકલ' પ્રકારનું છે, જેમાં બે કાર્પેલ્સનું સંમિલન થાય છે અને પાકી જતાં તે એક જ બાજુથી ફાટે છે. મેડલર 'પોમ' પ્રકારનું ફળ છે, સ્ટ્રોબેરી 'એગ્રિગેટ' પ્રકારનું છે અને મગફળી 'લેગ્યુમ' પ્રકારનું ફળ છે જે બંને બાજુથી ફાટે છે. NCERT મુજબ, ફોલિકલ ફળ એક જ કાર્પેલથી બને છે, પરંતુ કલિંગડમાં અપવાદરૂપે બે કાર્પેલ્સનું સંમિલન જોવા મળે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 5: પુષ્પીય વનસ્પતિઓની બાહ્યકારવિદ્યા", "difficulty": "Hard", "num": 19}, {"question": "એક વિદ્યાર્થીએ ફળનો અભ્યાસ કરતાં જણાવ્યું કે, 'આ ફળની રચના દરમિયાન પુષ્પાસન (thalamus) નો મોટો ભાગ ફળમાં રૂપાંતરિત થાય છે અને ફળભિત્તિ (pericarp) પાતળી અને ખાદ્ય નથી.' આ લક્ષણો ધરાવતું ફળ નીચેનામાંથી કયું છે?", "options": ["A) સફરજન (Apple) - 'પોમ' પ્રકાર", "B) અંજીર (Fig) - 'સાયકોનસ' પ્રકાર", "C) કાજુ (Cashew) - 'ડ્રૂપ' પ્રકાર", "D) સ્ટ્રોબેરી (Strawberry) - 'એગ્રિગેટ' પ્રકાર"], "correct": 1, "explanation": "અંજીર (Fig) 'સાયકોનસ' પ્રકારનું ફળ છે, જેમાં પુષ્પાસનનો મોટો ભાગ ફળમાં રૂપાંતરિત થાય છે અને ફળભિત્તિ પાતળી અને ખાદ્ય નથી હોતી. સફરજનમાં ફળભિત્તિનું બહારનું સ્તર ખાદ્ય હોય છે, કાજુમાં ફળભિત્તિ ત્રણ સ્તરોમાં વહેંચાયેલી હોય છે અને સ્ટ્રોબેરીમાં પુષ્પાસન ફળનો મુખ્ય ખાદ્ય ભાગ નથી. NCERT મુજબ, સાયકોનસ ફળમાં પુષ્પાસનનું વિશિષ્ટ રૂપાંતરણ જોવા મળે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 5: પુષ્પીય વનસ્પતિઓની બાહ્યકારવિદ્યા", "difficulty": "Hard", "num": 20}, {"question": "નીચેનામાંથી કયું ફળ 'સાયનોજીન' (cypsela) પ્રકારનું છે, જેમાં ફળભિત્તિ (pericarp) અને બીજાંડાસન (funiculus) એકબીજા સાથે જોડાયેલા નથી, પરંતુ ફળની રચના દરમિયાન પુષ્પાસન (thalamus) નો ભાગ ફળમાં સમાવિષ્ટ થાય છે?", "options": ["A) સૂર્યમુખી (Sunflower)", "B) ડેઝી (Daisy)", "C) કપાસ (Cotton)", "D) મરચું (Chilli)"], "correct": 0, "explanation": "સૂર્યમુખી (Sunflower) નું ફળ 'સાયનોજીન' પ્રકારનું છે, જેમાં ફળભિત્તિ અને બીજાંડાસન એકબીજા સાથે જોડાયેલા નથી, પરંતુ પુષ્પાસનનો ભાગ ફળમાં સમાવિષ્ટ થાય છે. ડેઝી (Daisy) નું ફળ પણ સાયનોજીન પ્રકારનું છે, પરંતુ પ્રશ્નમાં સૂર્યમુખી વધુ સામાન્ય અને સ્પષ્ટ ઉદાહરણ છે. કપાસ (Cotton) નું ફળ 'કેપ્સ્યુલ' પ્રકારનું છે, જ્યારે મરચું (Chilli) નું ફળ 'બેરી' પ્રકારનું છે.", "ncert_ref": "Class XI - Chapter 5: પુષ્પી વનસ્પતિની શારીરિક રચના (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 21}, {"question": "જ્યારે ફળની રચના દરમિયાન બીજાંડકોષ (ovule) ની સંખ્યા એકથી વધુ હોય અને પ્રત્યેક બીજાંડકોષ એક અલગ ફળમાં વિકસે, ત્યારે તેને કયા પ્રકારનું ફળ કહેવાય છે?", "options": ["A) સદાબહાર ફળ (Simple fruit)", "B) સંયુક્ત ફળ (Aggregate fruit)", "C) સંમિશ્ર ફળ (Composite fruit)", "D) પાર્થેનોકાર્પી ફળ (Parthenocarpic fruit)"], "correct": 1, "explanation": "જ્યારે એક જ પુષ્પમાંથી ઘણા બીજાંડકોષ (ovules) વિકસીને અલગ-અલગ ફળો રચે છે, ત્યારે તેને 'સંયુક્ત ફળ' (Aggregate fruit) કહેવાય છે. ઉદાહરણ તરીકે, સ્ટ્રોબેરી (Strawberry) એ સંયુક્ત ફળ છે. સદાબહાર ફળ (Simple fruit) એક જ બીજાંડકોષથી રચાય છે, સંમિશ્ર ફળ (Composite fruit) ઘણા પુષ્પોના સંકલનથી રચાય છે, અને પાર્થેનોકાર્પી ફળ (Parthenocarpic fruit) બીજ વિના રચાય છે.", "ncert_ref": "Class XI - Chapter 5: પુષ્પી વનસ્પતિની શારીરિક રચના (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 22}, {"question": "નીચેનામાંથી કયું ફળ 'ટ્રાયબોબ' (tribe) પ્રકારનું છે, જેમાં ફળ ત્રણ કોષ્ટકો (carpels) ના મળીને બને છે અને પાકી જતાં તે ત્રણ ભાગમાં વિભાજિત થાય છે?", "options": ["A) મરચું (Capsicum)", "B) ધાણા (Coriander)", "C) મેથી (Fenugreek)", "D) સરસવ (Mustard)"], "correct": 1, "explanation": "ધાણા (Coriander) એ 'ટ્રાયબોબ' પ્રકારનું ફળ છે, જેમાં ત્રણ કોષ્ટકો એકબીજા સાથે જોડાયેલા હોય છે અને પાકી જતાં તે ત્રણ ભાગમાં વિભાજિત થાય છે. મરચું (A) એ બેરી પ્રકારનું ફળ છે, મેથી (C) એ લેગ્યુમ પ્રકારનું ફળ છે, અને સરસવ (D) એ સિલિક્વા પ્રકારનું ફળ છે.", "ncert_ref": "Class XII - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં પ્રજનન", "difficulty": "Hard", "num": 23}, {"question": "નીચેનામાંથી કયું ફળ 'પોમ' (pome) પ્રકારનું નથી, પરંતુ તેની રચના દરમિયાન પુષ્પાસન (thalamus) ફળભિત્તિ (pericarp) ની રચનામાં ભાગ લે છે?", "options": ["A) સફરજન (Apple)", "B) નાશપાતી (Pear)", "C) કેળા (Banana)", "D) સ્ટ્રોબેરી (Strawberry)"], "correct": 2, "explanation": "કેળા (Banana) એ 'પોમ' પ્રકારનું ફળ નથી, પરંતુ તેની રચના દરમિયાન પુષ્પાસન (thalamus) ફળભિત્તિ (pericarp) ની રચનામાં ભાગ લે છે. સફરજન (A) અને નાશપાતી (B) એ પોમ પ્રકારના ફળ છે, જ્યારે સ્ટ્રોબેરી (D) એ એગ્રિગેટ પ્રકારનું ફળ છે.", "ncert_ref": "Class XII - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં પ્રજનન", "difficulty": "Hard", "num": 24}, {"question": "નીચેનામાંથી કયું ફળ 'ક્રેમોકાર્પ' (cremocarp) પ્રકારનું છે, જેમાં ફળ પાકી જતાં તે બે એક-બીજાંડીય (mericarp) ભાગોમાં વિભાજિત થાય છે અને પ્રત્યેક ભાગમાં એક જ બીજ હોય છે?", "options": ["A) જીરું (Cuminum cyminum)", "B) ધાણા (Coriandrum sativum)", "C) મેથી (Trigonella foenum-graecum)", "D) રાય (Brassica juncea)"], "correct": 0, "explanation": "જીરું (Cuminum cyminum) એ 'ક્રેમોકાર્પ' પ્રકારનું ફળ છે, જેમાં ફળ પાકી જતાં તે બે એક-બીજાંડીય (mericarp) ભાગોમાં વિભાજિત થાય છે અને પ્રત્યેક ભાગમાં એક જ બીજ હોય છે. ધાણા (B) અને મેથી (C) એ 'સ્કીઝોકાર્પ' પ્રકારના ફળ છે, પરંતુ તે ક્રેમોકાર્પ નથી. રાય (D) એ 'સિલિક્વા' (siliqua) પ્રકારનું ફળ છે, જેમાં ફળ લાંબું અને બીજો સરખા અંતરે ગોઠવાયેલા હોય છે.", "ncert_ref": "Class XII - પ્રકરણ 2: વનસ્પતિશાસ્ત્રમાં પુનરુત્પાદન (Reproduction in Plants)", "difficulty": "Hard", "num": 25}, {"question": "નીચેનામાંથી કયું ફળ 'ડ્રૂપ' પ્રકારનું છે, પરંતુ તેની ફળભિત્તિ (pericarp) નું મધ્ય સ્તર (mesocarp) રસાળ નથી?", "options": ["A) આમળી (Phyllanthus emblica)", "B) જામફળ (Syzygium cumini)", "C) કાજુ (Anacardium occidentale)", "D) નારિયેળ (Cocos nucifera)"], "correct": 3, "explanation": "નારિયેળ (Cocos nucifera) એક ડ્રૂપ પ્રકારનું ફળ છે, પરંતુ તેની ફળભિત્તિનું મધ્ય સ્તર (mesocarp) રસાળ નથી, પરંતુ રેશમી અને સખત હોય છે. આમળી, જામફળ અને કાજુમાં મધ્ય સ્તર રસાળ હોય છે, જેથી તે ડ્રૂપ પ્રકારના ફળ તરીકે ગણાય છે, પરંતુ નારિયેળમાં મધ્ય સ્તર રસાળ ન હોવાથી તે અહીં યોગ્ય જવાબ છે.", "ncert_ref": "Class XI - Chapter 5: પુષ્પી વનસ્પતિઓમાં પ્રજનન", "difficulty": "Hard", "num": 26}, {"question": "જ્યારે ફળની રચના દરમિયાન બીજાંડકોષ (ovule) ની સંખ્યા એક હોય અને ફળભિત્તિ (pericarp) સૂકું હોય, તો તે કયા પ્રકારનું ફળ ગણાય છે?", "options": ["A) એખીન (Achene)", "B) કેપ્સ્યુલ (Capsule)", "C) સાયલિક્વા (Siliqua)", "D) લેગ્યુમ (Legume)"], "correct": 0, "explanation": "એખીન (Achene) પ્રકારના ફળમાં બીજાંડકોષની સંખ્યા એક હોય છે અને ફળભિત્તિ સૂકું હોય છે. કેપ્સ્યુલ, સાયલિક્વા અને લેગ્યુમ પ્રકારના ફળોમાં બહુવિધ બીજાંડકોષ હોય છે, જેથી તે અહીં યોગ્ય જવાબ નથી.", "ncert_ref": "Class XI - Chapter 5: પુષ્પી વનસ્પતિઓમાં પ્રજનન", "difficulty": "Hard", "num": 27}, {"question": "નીચેનામાંથી કયું ફળ 'સ્કીઝોકાર્પ' (schizocarp) પ્રકારનું નથી, પરંતુ તે પાકી જતાં તેના ભાગો અલગ થાય છે?", "options": ["A) ધાણા (Coriandrum sativum)", "B) જીરું (Cuminum cyminum)", "C) મરચું (Capsicum annuum)", "D) સોયાબીન (Glycine max)"], "correct": 2, "explanation": "મરચું (Capsicum annuum) એક બેરી (berry) પ્રકારનું ફળ છે, જેમાં પાકી જતાં તેના ભાગો અલગ થતા નથી. ધાણા, જીરું અને સોયાબીન સ્કીઝોકાર્પ પ્રકારના ફળ છે, જેમાં પાકી જતાં તેના ભાગો અલગ થાય છે.", "ncert_ref": "Class XI - Chapter 5: પુષ્પી વનસ્પતિઓમાં પ્રજનન", "difficulty": "Hard", "num": 28}, {"question": "નીચેનામાંથી કયું વિધાન 'પાર્થેનોકાર્પી' (parthenocarpy) વિશે ખોટું છે?", "options": ["A) પાર્થેનોકાર્પી ફળોમાં બીજની રચના થતી નથી.", "B) પાર્થેનોકાર્પી ફળોનો વિકાસ પરાગીકરણ વિના થાય છે.", "C) પાર્થેનોકાર્પી ફળોનો વિકાસ હોર્મોનલ ઉત્તેજના દ્વારા થઈ શકે છે.", "D) પાર્થેનોકાર્પી ફળોનો વિકાસ માત્ર કૃત્રિમ રીતે જ થાય છે."], "correct": 3, "explanation": "પાર્થેનોકાર્પી ફળોનો વિકાસ પરાગીકરણ વિના થાય છે અને તેના ફળોમાં બીજની રચના થતી નથી (A અને B સત્ય). હોર્મોનલ ઉત્તેજના (જેમ કે ઓક્સિન) દ્વારા પણ પાર્થેનોકાર્પી ફળોનો વિકાસ થઈ શકે છે (C સત્ય). પરંતુ પાર્થેનોકાર્પી ફળોનો વિકાસ કુદરતી રીતે પણ થઈ શકે છે, ઉદાહરણ તરીકે, કેળાં અને અંજીરમાં (D ખોટું).", "ncert_ref": "Class XII - Chapter 2: પુષ્પી વનસ્પતિઓમાં લૈંગિક પ્રજનન", "difficulty": "Hard", "num": 29}, {"question": "એક વનસ્પતિશાસ્ત્રીને એક એવું ફળ મળ્યું જેની રચના એક જ પુષ્પના એક કરતાં વધુ અલગ-અલગ કાર્પેલ્સ (carpels) માંથી થઈ છે, પરંતુ તે ફળ પાકી જતાં એક જ એકમ તરીકે રહે છે અને તેમાં બીજની સંખ્યા એક કરતાં વધુ છે. આ ફળને નીચેનામાંથી કયા પ્રકારમાં વર્ગીકૃત કરી શકાય? તેની સાથે સંકળાયેલી વિશેષતા પણ ધ્યાનમાં લો.", "options": ["A) સ્કીઝોકાર્પ (schizocarp) - કારણ કે ફળ પાકી જતાં તેના ભાગો છૂટા પડે છે, પરંતુ અહીં ફળ એક જ એકમ તરીકે રહે છે.", "B) સીનોકાર્પ (syncarpous) - કારણ કે બહુવિધ કાર્પેલ્સ એકબીજા સાથે જોડાઈને એક જ ફળ બનાવે છે અને તેમાં બીજની સંખ્યા એક કરતાં વધુ હોય છે.", "C) એગ્રિગેટ (aggregate) - કારણ કે એક જ પુષ્પના ઘણા અલગ-અલગ કાર્પેલ્સમાંથી ઘણા નાના ફળો બને છે, જે એક સમૂહ તરીકે દેખાય છે.", "D) સાયકોનસ (syconus) - કારણ કે પુષ્પાસન (thalamus) ફળની રચનામાં ભાગ લે છે અને ફળની અંદર નાના ફળો હોય છે."], "correct": 1, "explanation": "સીનોકાર્પ (syncarpous) ફળની રચના બહુવિધ કાર્પેલ્સ એકબીજા સાથે જોડાઈને થાય છે, જે એક જ ફળ બનાવે છે અને તેમાં બીજની સંખ્યા એક કરતાં વધુ હોય છે. ઉદાહરણ તરીકે, ટામેટાં અને સીતાફળ. વિકલ્પ A ખોટો છે કારણ કે સ્કીઝોકાર્પ ફળ પાકી જતાં તેના ભાગો છૂટા પડે છે. વિકલ્પ C ખોટો છે કારણ કે એગ્રિગેટ ફળમાં એક જ પુષ્પના ઘણા અલગ-અલગ કાર્પેલ્સમાંથી ઘણા નાના ફળો બને છે, જે એક સમૂહ તરીકે દેખાય છે. વિકલ્પ D ખોટો છે કારણ કે સાયકોનસ ફળમાં પુષ્પાસન ફળની રચનામાં ભાગ લે છે, જે અંજીરમાં જોવા મળે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 5: પુષ્પીય વનસ્પતિઓની બાહ્યકારવિદ્યા (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 30}, {"question": "નીચેનામાંથી કયું ફળ 'સ્ટ્રોબિલસ' (strobilus) પ્રકારનું છે, જેમાં ફળોનો સમૂહ કોન આકારનો હોય છે અને તે સાયકેડ અથવા જિમ્નોસ્પર્મ વનસ્પતિઓમાં જોવા મળે છે?", "options": ["A) અનાનાસ (Pineapple)", "B) ચણો (Peanut)", "C) સાયકસ (Cycas) નું ફળ", "D) કેળું (Banana)"], "correct": 2, "explanation": "સાયકસ (Cycas) નું ફળ 'સ્ટ્રોબિલસ' પ્રકારનું છે, જેમાં ફળોનો સમૂહ કોન આકારનો હોય છે. અનાનાસ 'સોરોસિસ' પ્રકારનું ફળ છે, ચણો 'લેગ્યુમ' પ્રકારનું છે, અને કેળું 'બેરી' પ્રકારનું ફળ છે. સાયકેડ અને જિમ્નોસ્પર્મ વનસ્પતિઓમાં સ્ટ્રોબિલસ પ્રકારના ફળો જોવા મળે છે.", "ncert_ref": "Class XI - Chapter 3: વનસ્પતિ જગતમાં વૈવિધ્ય", "difficulty": "Hard", "num": 31}, {"question": "નીચેનામાંથી કયું વિધાન 'પાર્થેનોકાર્પી ફળ' વિશે સત્ય છે, જેમાં બીજની રચના થતી નથી?", "options": ["A) પાર્થેનોકાર્પી ફળોની રચના પરાગીકરણ પછી થાય છે.", "B) પાર્થેનોકાર્પી ફળોની રચના હોર્મોનલ ઉત્તેજનાથી થાય છે અને તે બીજરહિત હોય છે.", "C) પાર્થેનોકાર્પી ફળોની રચના ફક્ત કૃત્રિમ રીતે થાય છે.", "D) પાર્થેનોકાર્પી ફળોની રચના ફળભિત્તિ (pericarp) વિના થાય છે."], "correct": 1, "explanation": "પાર્થેનોકાર્પી ફળોની રચના હોર્મોનલ ઉત્તેજનાથી થાય છે અને તે બીજરહિત હોય છે. પરાગીકરણ પછી ફળની રચના થતી નથી (A ખોટું), તે કુદરતી રીતે પણ થઈ શકે (C ખોટું), અને ફળભિત્તિ (pericarp) તેની રચનામાં સામેલ હોય છે (D ખોટું).", "ncert_ref": "Class XI - Chapter 7: વનસ્પતિ શરીરક્રિયા", "difficulty": "Hard", "num": 32}, {"question": "નીચેનામાંથી કયું ફળ 'લોમેન્ટમ' (lomentum) પ્રકારનું છે, જેમાં ફળ પાકી જતાં તેના કોષ્ટકો (carpels) વચ્ચેના સાંધા પરથી તૂટી જાય છે અને એક-એક બીજ ધરાવતા ખંડોમાં વિભાજિત થાય છે?", "options": ["A) મગફળી (Groundnut)", "B) સરસવ (Mustard)", "C) મેથી (Fenugreek)", "D) કઠોળ (Cowpea)"], "correct": 3, "explanation": "કઠોળ (Cowpea) નું ફળ 'લોમેન્ટમ' પ્રકારનું છે, જેમાં ફળ પાકી જતાં તેના કોષ્ટકો વચ્ચેના સાંધા પરથી તૂટી જાય છે અને એક-એક બીજ ધરાવતા ખંડોમાં વિભાજિત થાય છે. મગફળી 'લેગ્યુમ' પ્રકારનું છે, સરસવ 'સિલિક્વા' પ્રકારનું છે, અને મેથી 'લેગ્યુમ' પ્રકારનું છે.", "ncert_ref": "Class XI - Chapter 5: પુષ્પ અને ફળ", "difficulty": "Hard", "num": 33}, {"question": "નીચેનામાંથી કયું ફળ 'ટ્રાયસેમિનસ' (tryseminous) પ્રકારનું છે, જેમાં એક જ ફળમાં ત્રણ બીજો હોય છે અને તે મુખ્યત્વે સિટ્રસ પ્રજાતિઓમાં જોવા મળે છે?", "options": ["A) લીંબુ (Lemon)", "B) કેળું (Banana)", "C) સફરજન (Apple)", "D) ડાંગર (Pomegranate)"], "correct": 0, "explanation": "લીંબુ (Lemon) 'ટ્રાયસેમિનસ' પ્રકારનું ફળ છે, જેમાં એક જ ફળમાં ત્રણ બીજો હોય છે. કેળું 'બેરી' પ્રકારનું છે, સફરજન 'પોમ' પ્રકારનું છે, અને ડાંગર 'બેરી' પ્રકારનું છે.", "ncert_ref": "Class XI - Chapter 5: પુષ્પ અને ફળ", "difficulty": "Hard", "num": 34}, {"question": "નીચેનામાંથી કયું વિધાન 'ફળના વિકાસ' વિશે ખોટું છે?", "options": ["A) ફળનો વિકાસ પુષ્પાસન (thalamus) માંથી થાય છે.", "B) ફળનો વિકાસ બીજાંડકોષ (ovule) માંથી થાય છે.", "C) ફળનો વિકાસ કાર્પેલ (carpel) માંથી થાય છે.", "D) ફળનો વિકાસ પરાગકોષ (pollen) માંથી થાય છે."], "correct": 3, "explanation": "ફળનો વિકાસ પરાગકોષ (pollen) માંથી થતો નથી. ફળનો વિકાસ પુષ્પાસન (thalamus), બીજાંડકોષ (ovule), અને કાર્પેલ (carpel) માંથી થાય છે. પરાગકોષ ફક્ત પરાગીકરણમાં ભાગ લે છે.", "ncert_ref": "Class XI - Chapter 5: પુષ્પ અને ફળ", "difficulty": "Hard", "num": 35}, {"question": "નીચેનામાંથી કયું ફળ 'પોમ' (pome) પ્રકારનું છે, પરંતુ તેની ફળભિત્તિ (pericarp) ની અંદરની રચના અન્ય પોમ ફળોથી ભિન્ન છે?", "options": ["A) સફરજન (Apple)", "B) નાશપત્તી (Pear)", "C) કવચ (Quince)", "D) સ્ટ્રોબેરી (Strawberry)"], "correct": 3, "explanation": "સ્ટ્રોબેરી (Strawberry) એ 'પોમ' પ્રકારનું ફળ નથી, પરંતુ તે 'એગ્રિગેટ એસેસરી ફળ' છે. સફરજન, નાશપત્તી અને કવચ એ સાચા પોમ ફળો છે, જ્યાં ફળભિત્તિ (pericarp) નું બહારનું સ્તર (exocarp) પાતળું, મધ્ય સ્તર (mesocarp) મસાલેદાર અને અંતિમ સ્તર (endocarp) કાગળ જેવું હોય છે. સ્ટ્રોબેરીમાં, સાચું ફળ તો તેના ઉપરના નાના 'એકીન' (achenes) છે, જ્યારે મસાલેદાર ભાગ પુષ્પાસન (receptacle) છે.", "ncert_ref": "Class XII - Chapter 2: વનસ્પતિમાં પ્રજનન (Reproduction in Plants)", "difficulty": "Hard", "num": 36}, {"question": "એક ફળની રચના દરમિયાન જો બીજાંડકોષ (ovule) ની સંખ્યા એક હોય અને ફળભિત્તિ (pericarp) નું મધ્ય સ્તર (mesocarp) રસદાર હોય, તો નીચેનામાંથી કયું ફળ આ લક્ષણો ધરાવે છે?", "options": ["A) કેળું (Banana)", "B) મંગો (Mango)", "C) કોકમ (Kokum)", "D) જામફળ (Guava)"], "correct": 1, "explanation": "મંગો (Mango) એ 'ડ્રૂપ' પ્રકારનું ફળ છે, જેમાં બીજાંડકોષ (ovule) ની સંખ્યા એક હોય છે અને ફળભિત્તિ (pericarp) નું મધ્ય સ્તર (mesocarp) રસદાર હોય છે. કેળું એ 'બેરી' પ્રકારનું ફળ છે, કોકમ એ 'ડ્રૂપ' પ્રકારનું ફળ છે પરંતુ તેનું મધ્ય સ્તર રસદાર નથી, અને જામફળ એ 'બેરી' પ્રકારનું ફળ છે.", "ncert_ref": "Class XII - Chapter 2: વનસ્પતિમાં પ્રજનન (Reproduction in Plants)", "difficulty": "Hard", "num": 37}, {"question": "નીચેનામાંથી કયું ફળ 'અપોકાર્પસ' (apocarpous) પ્રકારનું છે, જેમાં બહુવિધ કાર્પેલ્સ (carpels) અલગ અલગ રહે છે અને પ્રત્યેક કાર્પેલમાંથી એક અલગ ફળ વિકસે છે?", "options": ["A) સ્ટ્રોબેરી (Strawberry)", "B) રસભરી (Custard apple)", "C) લીમડો (Neem)", "D) કેળું (Banana)"], "correct": 2, "explanation": "લીમડો (Neem) એ 'અપોકાર્પસ' પ્રકારનું ફળ છે, જેમાં બહુવિધ કાર્પેલ્સ અલગ અલગ રહે છે અને પ્રત્યેક કાર્પેલમાંથી એક અલગ ફળ વિકસે છે. સ્ટ્રોબેરી એ 'એગ્રિગેટ' પ્રકારનું ફળ છે, રસભરી એ 'સીનોકાર્પ' પ્રકારનું ફળ છે, અને કેળું એ 'બેરી' પ્રકારનું ફળ છે.", "ncert_ref": "Class XI - Chapter 3: વનસ્પતિશાસ્ત્ર (Botany) - ફળ અને બીજ", "difficulty": "Hard", "num": 38}, {"question": "નીચેના પૈકી કયું ફળ 'સ્યુડોકાર્પ' (pseudocarp) પ્રકારનું છે, જેમાં ફળની રચનામાં પુષ્પાસન (thalamus) નો મુખ્ય ફાળો હોય છે અને ફળભિત્તિ (pericarp) કરતાં પુષ્પાસન વધુ સુવિકસિત હોય છે?", "options": ["A) સફરજન (Apple)", "B) કેરી (Mango)", "C) નારિયેળ (Coconut)", "D) સ્ટ્રોબેરી (Strawberry)"], "correct": 0, "explanation": "સફરજન (Apple) એ 'પોમ' (pome) પ્રકારનું ફળ છે, જે 'સ્યુડોકાર્પ' (pseudocarp) નું ઉદાહરણ છે. આ ફળની રચનામાં પુષ્પાસન (thalamus) નો મુખ્ય ફાળો હોય છે અને તે ફળભિત્તિ (pericarp) કરતાં વધુ સુવિકસિત હોય છે. કેરી (Mango) 'ડ્રૂપ' (drupe) પ્રકારનું ફળ છે, જેમાં ફળભિત્તિ ત્રણ સ્તરોમાં વહેંચાયેલી હોય છે. નારિયેળ (Coconut) પણ 'ડ્રૂપ' પ્રકારનું ફળ છે, જેમાં અંત:ફળભિત્તિ (endocarp) કઠણ હોય છે. સ્ટ્રોબેરી (Strawberry) 'એગ્રિગેટ' (aggregate) પ્રકારનું ફળ છે, જેમાં એક જ પુષ્પમાંથી ઘણા નાના ફળો રચાય છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 5: પુષ્પીય વનસ્પતિઓની બાહ્યકારવિદ્યા", "difficulty": "Hard", "num": 39}, {"question": "નીચેનામાંથી કયું ફળ 'સ્યુડોકાર્પ' (pseudocarp) પ્રકારનું છે, જેમાં ફળની રચનામાં પુષ્પાસન (thalamus) પણ ભાગ લે છે અને તેને 'સ્પુરિય ફળ' પણ કહેવાય છે?", "options": ["A) કેળું", "B) સફરજન", "C) જામફળ (ગૂજરાતી: જામબુ)", "D) કાકડી"], "correct": 0, "explanation": "કેળું (A) એક સ્યુડોકાર્પ ફળ છે, જેમાં ફળની રચનામાં પુષ્પાસન (thalamus) પણ ભાગ લે છે. આને 'સ્પુરિય ફળ' પણ કહેવાય છે કારણ કે ફળભિત્તિ (pericarp) ઉપરાંત પુષ્પાસન પણ ફળની રચનામાં સામેલ હોય છે. સફરજન (B) એક પોમ પ્રકારનું ફળ છે, જેમાં         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
