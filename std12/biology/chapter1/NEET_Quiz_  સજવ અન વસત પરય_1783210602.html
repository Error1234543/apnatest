<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - 📖 સજીવ અને વસતિ
પર્યાવરણ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 📖 સજીવ અને વસતિ
પર્યાવરણ</span>
                <span>🎯 Hard</span>
                <span>📝 34 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "જ્યારે એક જાતિના સજીવોના વસતિમાં જનીનીય ભિન્નતા અત્યંત ઓછી હોય ત્યારે નીચેનામાંથી કયો પરિણામ સૌથી વધુ સંભવિત છે?", "options": ["A) વસતિની અનુકૂલન ક્ષમતા વધે છે અને ઉત્ક્રાંતિની ગતિ તીવ્ર બને છે.", "B) વસતિ પર્યાવરણીય પરિવર્તનો સામે વધુ સંવેદનશીલ બને છે અને લુપ્ત થવાનું જોખમ વધે છે.", "C) વસતિમાં પ્રજનન દર ઘટે છે પરંતુ શારીરિક વિકાસમાં સુધારો થાય છે.", "D) વસતિની પ્રતિરક્ષા તંત્રની કાર્યક્ષમતા વધે છે અને રોગપ્રતિકારક શક્તિ મજબૂત બને છે."], "correct": 1, "explanation": "જનીનીય ભિન્નતાનો અભાવ એટલે વસતિમાં અનુકૂલન માટે લાભદાયી પરિવર્તનોનો અભાવ. આથી પર્યાવરણીય દબાણ સામે વસતિ સંવેદનશીલ બને છે અને લુપ્ત થવાનું જોખમ વધે છે. વિકલ્પ A ખોટો છે કારણ કે ઓછી ભિન્નતાથી ઉત્ક્રાંતિની ગતિ મંદ પડે છે. વિકલ્પ C ખોટો છે કારણ કે પ્રજનન દર અને શારીરિક વિકાસ જનીનીય ભિન્નતાથી સીધો સંબંધ ધરાવતો નથી. વિકલ્પ D ખોટો છે કારણ કે પ્રતિરક્ષા તંત્રની કાર્યક્ષમતા જનીનીય ભિન્નતાથી વધે છે, નહીં કે ઘટે.", "ncert_ref": "Class XII - Chapter 13: સજીવ અને વસતિ", "difficulty": "Hard", "num": 1}, {"question": "એક જળાશયમાં રહેતી માછલીની વસતિમાં અચાનક ઓક્સિજનનું પ્રમાણ ઘટી જાય છે. નીચેનામાંથી કયો અભ્યાસ ક્રમ સૌથી યોગ્ય રીતે દર્શાવે છે કે કેવી રીતે આ વસતિ આ પરિવર્તન સામે પ્રતિક્રિયા આપશે?", "options": ["A) પ્રથમ શ્વસન દર ઘટશે, પછી વસતિનું કદ ઘટશે, અને અંતે જનીનીય રચના બદલાશે.", "B) પ્રથમ વસતિનું કદ ઘટશે, પછી શ્વસન દર ઘટશે, અને અંતે જનીનીય રચના બદલાશે.", "C) પ્રથમ જનીનીય રચના બદલાશે, પછી વસતિનું કદ ઘટશે, અને અંતે શ્વસન દર ઘટશે.", "D) પ્રથમ શ્વસન દર વધશે, પછી વસતિનું કદ વધશે, અને અંતે જનીનીય રચના સ્થિર રહેશે."], "correct": 0, "explanation": "ઓક્સિજનના અભાવમાં માછલીઓનો શ્વસન દર પ્રથમ ઘટે છે કારણ કે ઓક્સિજન શ્વસન માટે આવશ્યક છે. આ પછી વસતિનું કદ ઘટે છે કારણ કે સજીવો મરવા લાગે છે અથવા સ્થળાંતર કરે છે. લાંબા ગાળે, જનીનીય રચના બદલાઈ શકે છે જેથી ઓછા ઓક્સિજનવાળા પર્યાવરણમાં જીવિત રહી શકાય. વિકલ્પ B અને C ખોટા છે કારણ કે જનીનીય રચના તરત બદલાતી નથી. વિકલ્પ D ખોટો છે કારણ કે ઓક્સિજનના અભાવમાં શ્વસન દર વધતો નથી.", "ncert_ref": "Class XII - Chapter 13: સજીવ અને વસતિ", "difficulty": "Hard", "num": 2}, {"question": "નીચેનામાંથી કયું વિધાન સજીવોની વસતિમાં જનીનીય વૈવિધ્યના સંદર્ભમાં સત્ય નથી?", "options": ["A) જનીનીય વૈવિધ્ય વસતિની અનુકૂલન ક્ષમતાને વધારે છે.", "B) જનીનીય વૈવિધ્ય વસતિને પર્યાવરણીય દબાણ સામે વધુ સ્થિર બનાવે છે.", "C) જનીનીય વૈવિધ્ય વસતિમાં પ્રતિસ્પર્ધાને ઘટાડે છે.", "D) જનીનીય વૈવિધ્ય વસતિની ઉત્ક્રાંતિની ગતિને વધારે છે."], "correct": 2, "explanation": "જનીનીય વૈવિધ્ય વસતિમાં પ્રતિસ્પર્ધાને ઘટાડતું નથી, ઉલટાનું, તે પ્રતિસ્પર્ધાને વધારે છે કારણ કે ભિન્ન જનીનીય રચનાવાળા સજીવો અલગ અલગ સ્રોતો માટે પ્રતિસ્પર્ધા કરે છે. વિકલ્પ A, B, અને D સત્ય છે કારણ કે જનીનીય વૈવિધ્ય અનુકૂલન, સ્થિરતા, અને ઉત્ક્રાંતિની ગતિને વધારે છે.", "ncert_ref": "Class XII - Chapter 13: સજીવ અને વસતિ", "difficulty": "Hard", "num": 3}, {"question": "એક વસતિમાં, જો સ્ત્રી અને પુરુષ સજીવોની સંખ્યામાં અસંતુલન હોય (ઉદાહરણ તરીકે, 70% સ્ત્રી અને 30% પુરુષ), તો નીચેનામાંથી કયો પરિણામ સૌથી સંભવિત છે?", "options": ["A) વસતિનો વૃદ્ધિ દર તરત જ ઘટી જશે કારણ કે પ્રજનન દર ઘટશે.", "B) વસતિનો જનીનીય વૈવિધ્ય વધશે કારણ કે સ્ત્રીઓ વધુ પ્રજનન કરશે.", "C) વસતિમાં લિંગી પસંદગીના દબાણમાં વધારો થશે, જેથી લિંગ ગુણોત્તર સંતુલિત થાય.", "D) વસતિનું કદ તરત જ બમણું થશે કારણ કે સ્ત્રીઓ વધુ સંતાનો ઉત્પન્ન કરશે."], "correct": 2, "explanation": "લિંગ ગુણોત્તરમાં અસંતુલન હોવા છતાં, પ્રાકૃતિક પસંદગી લિંગી પસંદગીના દબાણ દ્વારા સંતુલન સાધવા પ્રયત્ન કરશે. વિકલ્પ A ખોટો છે કારણ કે પ્રજનન દર તરત ઘટતો નથી, પરંતુ લિંગી પસંદગી દ્વારા સંતુલન સાધવામાં આવે છે. વિકલ્પ B ખોટો છે કારણ કે જનીનીય વૈવિધ્ય લિંગ ગુણોત્તરથી સીધો સંબંધ ધરાવતો નથી. વિકલ્પ D ખોટો છે કારણ કે વસતિનું કદ તરત બમણું થતું નથી.", "ncert_ref": "Class XII - Chapter 13: સજીવ અને વસતિ", "difficulty": "Hard", "num": 4}, {"question": "નીચેનામાંથી કયું વિધાન વસતિ વૃદ્ધિના 'S-આકારના વક્ર' (Sigmoid curve) વિશે સત્ય નથી?", "options": ["A) પ્રારંભિક તબક્કામાં વસતિનો વૃદ્ધિ દર ધીરે ધીરે વધે છે.", "B) મધ્ય તબક્કામાં વસતિનો વૃદ્ધિ દર સૌથી ઝડપી હોય છે.", "C) અંતિમ તબક્કામાં વસતિનું કદ સ્થિર થાય છે કારણ કે જન્મદર અને મૃત્યુદર સમાન થાય છે.", "D) વસતિનું કદ હંમેશા પર્યાવરણીય ક્ષમતાથી વધુ રહે છે."], "correct": 3, "explanation": "S-આકારના વક્રમાં, વસતિનું કદ ક્યારેય પર્યાવરણીય ક્ષમતાથી વધુ રહેતું નથી. પર્યાવરણીય ક્ષમતા એ મહત્તમ કદ છે જે વસતિ પહોંચી શકે છે. વિકલ્પ A, B, અને C સત્ય છે કારણ કે તે S-આકારના વક્રના ત્રણ તબક્કાઓને યોગ્ય રીતે વર્ણવે છે.", "ncert_ref": "Class XII - Chapter 13: સજીવ અને વસતિ", "difficulty": "Hard", "num": 5}, {"question": "એક જંગલમાં રહેતી વસતિમાં, જો પ્રજનન ક્ષમતા ધરાવતા સજીવોની સંખ્યા અચાનક ઘટી જાય, તો નીચેનામાંથી કયો પરિબળ સૌથી વધુ પ્રભાવિત થશે?", "options": ["A) વસતિ ઘનતા", "B) જનીનીય વૈવિધ્ય", "C) વસતિ વૃદ્ધિ દર", "D) જીવન કાળ"], "correct": 2, "explanation": "વસતિ વૃદ્ધિ દર પ્રજનન ક્ષમતા ધરાવતા સજીવોની સંખ્યા પર આધાર રાખે છે. જો પ્રજનન ક્ષમતા ધરાવતા સજીવોની સંખ્યા ઘટે, તો વસતિ વૃદ્ધિ દર પણ ઘટશે. વસતિ ઘનતા (A) અને જીવન કાળ (D) પર અસર થશે, પરંતુ તે તાત્કાલિક નહીં હોય. જનીનીય વૈવિધ્ય (B) પર પણ અસર થશે, પરંતુ તે લાંબા ગાળાનો પ્રભાવ છે.", "ncert_ref": "Class XII - Chapter 13: સજીવ અને વસતિ", "difficulty": "Hard", "num": 6}, {"question": "એક વસતિમાં, જો સજીવોની મૃત્યુ દર પ્રજનન દર કરતાં વધારે હોય, તો નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) વસતિનો આકાર સ્થિર રહેશે", "B) વસતિનો આકાર ઘટશે", "C) વસતિનો આકાર વધશે", "D) વસતિનો આકાર અચાનક બદલાશે"], "correct": 1, "explanation": "જો મૃત્યુ દર પ્રજનન દર કરતાં વધારે હોય, તો વસતિનો આકાર ઘટશે. વસતિનો આકાર સ્થિર રહેવા માટે પ્રજનન દર અને મૃત્યુ દર સમાન હોવા જોઈએ (A). વસતિનો આકાર વધવા માટે પ્રજનન દર મૃત્યુ દર કરતાં વધારે હોવા જોઈએ (C). વસતિનો આકાર અચાનક બદલાવા માટે કોઈ અચાનક પરિબળ જરૂરી છે (D).", "ncert_ref": "Class XII - Chapter 13: સજીવ અને વસતિ", "difficulty": "Hard", "num": 7}, {"question": "એક વસતિમાં, જો સજીવોની વસતિ ઘનતા અત્યંત ઉચ્ચ હોય, તો નીચેનામાંથી કયો પરિબળ સૌથી વધુ પ્રભાવિત થશે?", "options": ["A) ખોરાકની ઉપલબ્ધતા", "B) તાપમાન", "C) પ્રકાશની તીવ્રતા", "D) હવાનું દબાણ"], "correct": 0, "explanation": "વસતિ ઘનતા અત્યંત ઉચ્ચ હોવા પર ખોરાકની ઉપલબ્ધતા સૌથી વધુ પ્રભાવિત થશે, કારણ કે સજીવો વચ્ચે સ્પર્ધા વધશે. તાપમાન (B), પ્રકાશની તીવ્રતા (C), અને હવાનું દબાણ ી. વિકલ્પ C ખોટો છે કારણ કે વસતિની વૃદ્ધિ દર શૂન્ય થતી નથી, પરંતુ ઘટે છે. વિકલ્પ D ખોટો છે કારણ કે પર્યાવરણીય પરિબળોનો વસતિની વૃદ્ધિ દર પર અસર પડે છે.", "ncert_ref": "Class XII - Chapter 13: સજીવ અને વસતિ", "difficulty": "Hard", "num": 15}, {"question": "નીચેનામાંથી કયું વિધાન વસતિ વૃદ્ધિના 'લૉજિસ્ટિક વૃદ્ધિ મોડેલ' (Logistic Growth Model) વિશે સત્ય નથી?", "options": ["A) વસતિની વૃદ્ધિ પ્રારંભમાં ધીમી હોય છે અને પછી ઝડપી બને છે.", "B) વસતિની વૃદ્ધિ એક સ્થિર અવસ્થા (K - વહન ક્ષમતા) સુધી પહોંચે છે.", "C) વસતિની વૃદ્ધિ દર સતત રહે છે.", "D) વસતિની વૃદ્ધિ પર્યાવરણીય પ્રતિરોધના કારણે મર્યાદિત થાય છે."], "correct": 2, "explanation": "લૉજિસ્ટિક વૃદ્ધિ મોડેલમાં વસતિની વૃદ્ધિ દર સતત રહેતી નથી. તે પ્રારંભમાં ધીમી હોય છે, પછી ઝડપી બને છે અને અંતે સ્થિર અવસ્થા (K) સુધી પહોંચે છે, જ્યાં વૃદ્ધિ દર શૂન્ય થાય છે. વિકલ્પ A, B, અને D લૉજિસ્ટિક વૃદ્ધિ મોડેલના લક્ષણો છે, જ્યારે વિકલ્પ C સત્ય નથી.", "ncert_ref": "Class XII - Chapter 13: સજીવ અને વસતિ", "difficulty": "Hard", "num": 16}, {"question": "નીચેનામાંથી કયું વિધાન વસતિની વહન ક્ષમતા (Carrying Capacity - K) વિશે સત્ય છે?", "options": ["A) વહન ક્ષમતા એ વસતિની મહત્તમ સંખ્યા છે જે પર્યાવરણ દ્વારા ટકાવી શકાય છે.", "B) વહન ક્ષમતા સતત રહે છે અને ક્યારેય બદલાતી નથી.", "C) વહન ક્ષમતા વસતિની જનીનીય વૈવિધ્ય પર આધાર રાખે છે.", "D) વહન ક્ષમતા વસતિની પ્રજનન ક્ષમતા પર આધાર રાખે છે."], "correct": 0, "explanation": "વહન ક્ષમતા (K) એ વસતિની મહત્તમ સંખ્યા છે જે પર્યાવરણ દ્વારા ટકાવી શકાય છે. તે પર્યાવરણીય પરિબળો (જેવા કે સંસાધનો, જગ્યા) પર આધાર રાખે છે અને સમય સાથે બદલાઈ શકે છે. વિકલ્પ B સત્ય નથી કારણ કે વહન ક્ષમતા પર્યાવરણીય પરિબળો બદલાવાથી બદલાઈ શકે છે. વિકલ્પ C અને D સીધી રીતે વહન ક્ષમતાને પ્રભાવિત કરતા નથી.", "ncert_ref": "Class XII - Chapter 13: સજીવ અને વસતિ", "difficulty": "Hard", "num": 17}, {"question": "એક વસતિમાં, જો વસતિ ઘનતા-આધારિત અવરોધો (density-dependent factors) કામ કરતાં ન હોય, તો નીચેનામાંથી કયો ગ્રાફ વસતિ વૃદ્ધિને સૌથી યોગ્ય રીતે દર્શાવશે?", "options": ["A) S-આકારનો વક્ર (Sigmoid curve) જેમાં વહન ક્ષમતા (K) સુધી વૃદ્ધિ થાય છે", "B ં છે કારણ કે K અચાનક ઘટતું નથી. D) ખોટું છે કારણ કે જનીનીય વૈવિધ્ય ઘટતું નથી.", "ncert_ref": "Class XII - Chapter 13: સજીવ અને વસતિ", "difficulty": "Hard", "num": 22}, {"question": "નીચેનામાંથી કયું વિધાન વસતિની વહન ક્ષમતા (K) અને પર્યાવરણીય પ્રતિકાર (Environmental Resistance) વિશે સત્ય છે?", "options": ["A) વહન ક્ષમતા (K) એ પર્યાવરણીય પ્રતિકાર કરતાં ઓછી હોય છે.", "B) પર્યાવરણીય પ્રતિકાર એ વહન ક્ષમતા (K) કરતાં વધારે હોય છે.", "C) વહન ક્ષમતા (K) અને પર્યાવરણીય પ્રતિકાર એ બંને સમાન હોય છે.", "D) વહન ક્ષમતા (K) એ પર્યાવરણીય પ્રતિકાર કરતાં સ્વતંત્ર હોય છે."], "correct": 1, "explanation": "પર્યાવરણીય પ્રતિકાર (જેવા કે સંસાધનોની મર્યાદા, શિકારી, રોગો) વસતિની વહન ક્ષમતા (K) નક્કી કરે છે, જેથી પર્યાવરણીય પ્રતિકાર K કરતાં વધારે હોય છે. A) ખોટું છે કારણ કે K એ પર્યાવરણીય પ્રતિકાર દ્વારા નક્કી થાય છે. C) ખોટું છે કારણ કે બંને સમાન નથી. D) ખોટું છે કારણ કે K પર્યાવરણીય પ્રતિકાર પર આધાર રાખે છે.", "ncert_ref": "Class XII - Chapter 13: સજીવ અને વસતિ", "difficulty": "Hard", "num": 23}, {"question": "એક વસતિમાં, જો સજીવોની વસતિ વહન ક્ષમતા (K) ની નજીક પહોંચે છે, તો નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) વસતિ વૃદ્ધિ દર શૂન્ય થઈ જાય છે અને વસતિ સ્થિર થઈ જાય છે.", "B) વસતિ વૃદ્ધિ દર મહત્તમ થાય છે અને વસતિ આગળ વધતી રહે છે.", "C) વસતિ વૃદ્ધિ દર ઝડપથી ઘટી જાય છે અને વસતિ લુપ્ત થવાની શરૂઆત થાય છે.", "D) વસતિ વૃદ્ધિ દર સતત રહે છે અને વસતિ અસીમિત રીતે વધતી રહે છે."], "correct": 0, "explanation": "વહન ક્ષમતા (K) એ વસતિ માટે પર્યાવરણ દ્વારા સપોર્ટ કરી શકાય તેવી મહત્તમ સંખ્યા છે. જ્યારે વસતિ K ની નજીક પહોંચે છે, ત્યારે વસતિ વૃદ્ધિ દર ઘટીને શૂન્ય થાય છે અને વસતિ સ્થિર થઈ જાય છે. આ લૉજિસ્ટિક વૃદ્ધિ મોડેલનો ભાગ છે. બાકીના વિકલ્પો અસત્ય છે: B) વસતિ વૃદ્ધિ દર K ની નજીક પહોંચતાં મહત્તમ નથી હોતો, C) વસતિ લુપ્ત થવાની શરૂઆત નથી થતી, D) વસતિ અસીમિત રીતે વધતી નથી.", "ncert_ref": "Class XII - Chapter 13: સજીવ અને વસતિ", "difficulty": "Hard", "num": 24}, {"question": "એક જંગલમાં રહેતી વાઘની વસતિ (Panthera tigris) ની વસતિ ઘનતા અત્યંત ઓછી છે અને તેમની વચ્ચેનું અંતર ખૂબ જ વધારે છે. આ પરિસ્થિતિમાં, નીચેનામાંથી કયું પરિણામ સૌથી વધુ સંભવિત છે, જે વસતિના લાંબા ગાળાના અસ્તિત્વ માટે જોખમી બની શકે છે?", "options": ["A) વસતિમાં જનીનીય વહેંચણી (Genetic Drift) ની અસરો વધારે પ્રબળ બનશે, જે જનીનીય વિવિધતામાં ઘટાડો કરશે.", "B) વસતિમાં પ્રાકૃતિક પસંદગી (Natural Selection) ની પ્રક્રિયા વધારે પ્રબળ બનશે, જે અનુકૂલનશીલ લક્ષણોને પ્રોત્સાહન આપશે.", "C) વસતિમાં પ્રજનન દરમાં અચાનક વધારો થશે, કારણ કે સજીવોને પ્રજનન માટે વધારે જગ્યા મળશે.", "D) વસતિમાં પર્યાવરણીય પ્રતિકાર (Environmental Resistance) ની અસરો ઘટશે, કારણ કે સંસાધનોની ઉપલબ્ધતા વધારે હશે."], "correct": 0, "explanation": "સાચો જવાબ વિકલ્પ A છે. જ્યારે વસતિ ઘનતા અત્યંત ઓછી હોય અને સજીવો વચ્ચેનું અંતર વધારે હોય, ત્યારે જનીનીય વહેંચણી (Genetic Drift) ની અસરો વધારે પ્રબળ બને છે. આ પ્રક્રિયામાં, યાદચ્છિક ઘટનાઓને કારણે જનીન આવૃત્તિમાં ફેરફાર થાય છે, જે નાની વસતિઓમાં વધારે સ્પષ્ટ હોય છે. આના પરિણામે જનીનીય વિવિધતા ઘટે છે, જે વસતિની અનુકૂલન ક્ષમતા અને લાંબા ગાળાના અસ્તિત્વ માટે જોખમી બની શકે છે.\n\nવિકલ્પ B ખોટો છે કારણ કે પ્રાકૃતિક પસંદગીની પ્રક્રિયા વસતિ ઘનતા પર આધારિત નથી, પરંતુ પર્યાવરણીય પરિબળો અને જનીનીય વિવિધતા પર આધારિત છે. વસતિ ઘનતા ઓછી હોવાને કારણે પ્રાકૃતિક પસંદગી વધારે પ્રબળ બનતી નથી.\n\nવિકલ્પ C ખોટો છે કારણ કે પ્રજનન દર વસતિ ઘનતા પર આધારિત નથી, પરંતુ સંસાધનોની ઉપલબ્ધતા, હોર્મોનલ નિયંત્રણ અને અન્ય જૈવિક પરિબળો પર આધારિત છે. વધારે જગ્યા મળવાથી પ્રજનન દરમાં અચાનક વધારો થતો નથી.\n\nવિકલ્પ D ખોટો છે કારણ કે પર્યાવરણીય પ્રતિકાર વસતિ ઘનતા પર આધારિત નથી, પરંતુ પર્યાવરણીય પરિબળો જેવા કે ખોરાક, રોગો, શિકારીઓ વગેરે પર આધારિત છે. વસતિ ઘનતા ઓછી હોવાને કારણે પર્યાવરણીય પ્રતિકાર ઘટતો નથી.", "ncert_ref": "ક્લાસ XII - અધ્યાય 13: સજીવો અને વસ્તિઓ", "difficulty": "Hard", "num": 25}, {"question": "એક જંગલમાં રહેતી વસતિમાં, જો સજીવોની વસતિ વહન ક્ષમતા (K) કરતાં ૨૦% ઓછી હોય, તો નીચેનામાંથી કયો પરિબળ સૌથી વધુ પ્રભાવશાળી હશે?", "options": ["A) અચાનક તાપમાનમાં વધારો", "B) ખોરાકની ઉપલબ્ધતામાં ઘટાડો", "C) શિકારીઓની સંખ્યામાં વધારો", "D) રોગચાળોનો ફાટો"], "correct": 1, "explanation": "વહન ક્ષમતા (K) કરતાં વસતિ ઓછી હોવાથી, ઘનતા-આધારિત અવરોધો (જેવા કે ખોરાકની ઉપલબ્ધતા) કરતાં ઘનતા-સ્વતંત્ર અવરોધો (જેવા કે અચાનક તાપમાન, રોગચાળો) ઓછા પ્રભાવશાળી હશે. ખોરાકની ઉપલબ્ધતામાં ઘટાડો એ ઘનતા-આધારિત અવરોધ છે, જે વસતિ K ની નજીક હોવાથી વધુ પ્રભાવશાળી બને છે. શિકારીઓની સંખ્યામાં વધારો અને રોગચાળો એ ઘનતા-સ્વતંત્ર અવરોધો છે, જ્યારે અચાનક તાપમાનમાં વધારો પણ ઘનતા-સ્વતંત્ર છે, પરંતુ ખોરાકની ઉપલબ્ધતા વધુ સીધો પ્રભાવ ધરાવે છે.", "ncert_ref": "Class XII - Chapter 13: સજીવ અને વસતિ", "difficulty": "Hard", "num": 26}, {"question": "એક વસતિમાં, જો સજીવોની વસતિ ઘનતા-અવલંબી અવરોધો (density-dependent factors) કામ કરતાં હોય, તો નીચેનામાંથી કયું વિધાન સત્ય નથી?", "options": ["A) રોગચાળો ફેલાવાની ગતિ વસતિ ઘનતાને આધારિત હોય છે.", "B) શિકારી-શિકાર સંબંધો વસતિ ઘનતાને અસર કરે છે.", "C) હવામાનમાં અચાનક થતાં ફેરફારો (જેવા કે તાપમાનમાં અચાનક ઘટાડો) વસતિ પર અસર કરશે.", "D) ખોરાકની ઉપલબ્ધતા વસતિ ઘનતાને આધારિત હોય છે."], "correct": 2, "explanation": "હવામાનમાં અચાનક થતાં ફેરફારો (જેવા કે તાપમાનમાં અચાનક ઘટાડો) એ ઘનતા-અસ્વલંબી અવરોધો (density-independent factors) છે, જે વસતિ ઘનતાને આધારિત નથી. વિકલ્પ A, B, અને D સૌ ઘનતા-અવલંબી અવરોધોના ઉદાહરણો છે, જે વસતિ ઘનતાને આધારિત હોય છે.", "ncert_ref": "Class XII - Chapter 13: સજીવ અને વસતિ", "difficulty": "Hard", "num": 27}, {"question": "એક જળાશયમાં રહેતી માછલીની વસતિમાં, જો પ્રાથમિક ઉત્પાદકો (પ્રકાશસંશ્લેષણ કરતા સજીવો)ની સંખ્યા અચાનક ઘટી જાય, તો નીચેનામાંથી કયું પરિણામ સૌથી યોગ્ય રીતે અપેક્ષિત છે?", "options": ["A) માછલીની વસતિની વૃદ્ધિ દર વધશે કારણ કે ખોરાક માટેનો સ્પર્ધા ઘટશે.", "B) માછલીની વસતિની મૃત્યુ દર વધશે કારણ કે ખોરાકની કમી થશે.", "C) માછલીની વસતિ સ્થિર રહેશે કારણ કે માછલીઓ અન્ય સ્રોતોમાંથી ખોરાક મેળવશે.", "D) માછલીની વસતિની પ્રજનન ક્ષમતા વધશે કારણ કે પર્યાવરણીય દબાણ ઘટશે."], "correct": 1, "explanation": "પ્રાથમિક ઉત્પાદકોની સંખ્યા ઘટવાને કારણે ખોરાકની ઉપલબ્ધતા ઘટશે, જેથી માછલીની વસતિ માટે ખોરાકની કમી થશે. આના કારણે માછલીની વસતિની મૃત્યુ દર વધશે. વિકલ્પ A ખોટો છે કારણ કે ખોરાક માટેનો સ્પર્ધા વધશે, ઘટશે નહીં. વિકલ્પ C ખોટો છે કારણ કે માછલીઓ અન્ય સ્રોતોમાંથી ખોરાક મેળવી શકશે નહીં. વિકલ્પ D ખોટો છે કારણ કે પર્યાવરણીય દબાણ વધશે, ઘટશે નહીં.", "ncert_ref": "Class XII - Chapter 13: સજીવ અને વસતિ", "difficulty": "Hard", "num": 28}, {"question": "એક વસતિમાં, જો સજીવોની વસતિ વહન ક્ષમતા (K) કરતાં ૫૦% ઓછી હોય અને અચાનક પર્યાવરણીય પરિબળો દ્વારા મૃત્યુ દરમાં વૃદ્ધિ થાય, તો નીચેનામાંથી કયો પરિણામ સૌથી યોગ્ય રીતે લાગુ પડે?", "options": ["A) વસતિનો વૃદ્ધિ દર ઘટશે અને વસતિ સ્થિર અવસ્થા તરફ આગળ વધશે", "B) વસતિનો વૃદ્ધિ દર વધશે કારણ કે સ્પર્ધા ઓછી થશે", "C) વસતિનો વૃદ્ધિ દર અચાનક ઘટીને શૂન્ય થશે અને વસતિ લુપ્ત થશે", "D) વસતિનો વૃદ્ધિ દર સ્થિર રહેશે કારણ કે વહન ક્ષમતા હજુ સુધી પહોંચી નથી"], "correct": 0, "explanation": "વહન ક્ષમતા (K) કરતાં ૫૦% ઓછી વસતિમાં, મૃત્યુ દરમાં વૃદ્ધિ થવા છતાં વસતિનો વૃદ્ધિ દર ઘટશે પરંતુ વસતિ સ્થિર અવસ્થા તરફ આગળ વધશે કારણ કે વસતિ હજુ સુધી K ની નજીક નથી. વિકલ્પ B ખોટો છે કારણ કે સ્પર્ધા ઓછી હોવા છતાં મૃત્યુ દરમાં વૃદ્ધિ વૃદ્ધિ દરને ઘટાડશે. વિકલ્પ C ખોટો છે કારણ કે વસતિ લુપ્ત થવાની શક્યતા ઓછી છે. વિકલ્પ D ખોટો છે કારણ કે વૃદ્ધિ દર મૃત્યુ દરના વધારાને લીધે ઘટશે.", "ncert_ref": "Class XII - Chapter 13: સજીવ અને વસતિ", "difficulty": "Hard", "num": 29}, {"question": "નીચેનામાંથી કયું વિધાન વસતિની વહન ક્ષમતા (K) અને જનીનીય વૈવિધ્ય વચ્ચેના સંબંધ વિશે સત્ય છે?", "options": ["A) વહન ક્ષમતા વધતાં જનીનીય વૈવિધ્ય ઘટે છે", "B) વહન ક્ષમતા અને જનીનીય વૈવિધ્ય વચ્ચે કોઈ સંબંધ નથી", "C) વહન ક્ષમતા ઓછી હોવાને કારણે જનીનીય વૈવિધ્ય વધે છે", "D) વહન ક્ષમતા સ્થિર હોવાને કારણે જનીનીય વૈવિધ્ય સ્થિર રહે છે"], "correct": 0, "explanation": "વહન ક્ષમતા (K) વધતાં વસતિ સ્થિર થાય છે, જેથી પ્રાકૃતિક પસંદગીનો દબાણ ઘટે છે અને જનીનીય વૈવિધ્ય ઘટે છે. વહન ક્ષમતા અને જનીનીય વૈવિધ્ય વચ્ચે નક્કર સંબંધ છે (A સત્ય). વહન ક્ષમતા ઓછી હોવાને કારણે જનીનીય વૈવિધ્ય ઘટે છે, નહીં કે વધે (C ખોટું). વહન ક્ષમતા સ્થિર હોવાને કારણે જનીનીય વૈવિધ્ય સ્થિર રહેતું નથી (D ખોટું). કોઈ સંબંધ નથી એ ખોટું છે (B ખોટું).", "ncert_ref": "Class XII - Chapter 13: સજીવ અને વસતિ", "difficulty": "Hard", "num": 30}, {"question": "એક જંગલમાં રહેતી વસતિમાં, જો સજીવોની વસતિ ઘનતા અત્યંત ઉચ્ચ હોય અને અચાનક પર્યાવરણીય પરિબળો જેવા કે ભૂક             const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
