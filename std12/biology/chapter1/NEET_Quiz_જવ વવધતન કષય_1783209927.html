<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - જૈવ વિવિધતાનો ક્ષય</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 જૈવ વિવિધતાનો ક્ષય</span>
                <span>🎯 Hard</span>
                <span>📝 38 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "ગુજરાતના કચ્છના રણમાં જોવા મળતા 'ખારેખર' (Salicornia brachiata) વનસ્પતિ પ્રજાતિનો ક્ષય થવાનું મુખ્ય કારણ કયું છે?", "options": ["A) અતિશય પાણીના સિંચાઈથી મીઠાપણું ઘટવાને લીધે", "B) જૈવિક આક્રમણ (Invasive species) દ્વારા સ્થાનિક પ્રજાતિઓનું સ્થાન લેવાને લીધે", "C) કૃષિ વિકાસ અને મીઠાના ઉત્પાદન માટેના ભૂમિ ઉપયોગ બદલાવાને લીધે", "D) હવામાન પરિવર્તનને લીધે તાપમાનમાં અચાનક વધારો થવાને લીધે"], "correct": 2, "explanation": "ખારેખર (Salicornia brachiata) એ મીઠા પાણીની આદિ વનસ્પતિ છે જે કચ્છના રણના ખારા જમીનમાં ઉગે છે. તેનો ક્ષય મુખ્યત્વે કૃષિ વિકાસ અને મીઠાના ઉત્પાદન માટે ભૂમિ ઉપયોગમાં પરિવર્તનને લીધે થયો છે. અતિશય સિંચાઈ (A) મીઠાપણું ઘટાડે છે, પરંતુ આ પ્રજાતિ મીઠા જમીનમાં જ ઉગે છે, તેથી A ખોટું છે. જૈવિક આક્રમણ (B) અહીં મુખ્ય કારણ નથી. હવામાન પરિવર્તન (D) એક સામાન્ય કારણ છે, પરંતુ આ પ્રકરણમાં મુખ્ય કારણ ભૂમિ ઉપયોગ બદલાવ છે.", "ncert_ref": "Class XII - પ્રકરણ 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 1}, {"question": "જૈવ વિવિધતાના ક્ષયમાં 'જનીનિક ક્ષય' (Genetic erosion) એટલે શું?", "options": ["A) એક જ પ્રજાતિની વિવિધ જાતિઓ અથવા ઉપપ્રજાતિઓનો નાશ", "B) એક જ જનીનના વિવિધ એલિલ્સનો નાશ", "C) એક જ પેશી અથવા અંગના કોષોનો નાશ", "D) એક જ પ્રોટીનના વિવિધ આઇસોફોર્મ્સનો નાશ"], "correct": 1, "explanation": "જનીનિક ક્ષય એટલે એક જ જનીનના વિવિધ એલિલ્સનો નાશ થવો. આથી જનીનિક વિવિધતા ઘટે છે. Aમાં પ્રજાતિની જાતિઓનો નાશ એ પ્રજાતિ ક્ષય છે, જનીનિક ક્ષય નહીં. C અને D કોષીય અથવા આણ્વિક સ્તરે નહીં પરંતુ જનીન સ્તરે થતો ક્ષય છે.", "ncert_ref": "Class XII - પ્રકરણ 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 2}, {"question": "ઇન્ડિયન વાઇલ્ડ એસ (Equus hemionus khur) નો ક્ષય થવાનું મુખ્ય કારણ કયું છે?", "options": ["A) અતિશય શિકાર અને અવૈધ વ્યાપાર", "B) તેના નૈસર્ગિક આવાસસ્થાનમાં પાણીની ઉણપ", "C) ગરમી અને શુષ્ક હવામાનમાં અનુકૂળન ન કરવા સક્ષમ હોવું", "D) અન્ય પ્રાણીઓ સાથેના ખોરાક માટેના સ્પર્ધાને લીધે"], "correct": 0, "explanation": "ઇન્ડિયન વાઇલ્ડ એસનો ક્ષય મુખ્યત્વે અતિશય શિકાર અને અવૈધ વ્યાપારને લીધે થયો છે. પાણીની ઉણપ (B) અને હવામાન અનુકૂળન (C) ગૌણ કારણો છે. ખોરાક સ્પર્ધા (D) પણ એક કારણ છે, પરંતુ મુખ્ય કારણ શિકાર છે.", "ncert_ref": "Class XII - પ્રકરણ 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 3}, {"question": "જૈવ વિવિધતાના ક્ષયને રોકવા માટે 'એક્સ-સિટુ સંરક્ષણ' (Ex-situ conservation) પદ્ધતિઓમાં કયું ઉદાહરણ સાચું નથી?", "options": ["A) વનસ્પતિ ઉદ્યાન (Botanical gardens)", "B) બીજ બેંક (Seed bank)", "C) રાષ્ટ્રીય ઉદ્યાન (National park)", "D) જીવજંતુ ઉદ્યાન (Zoological park)"], "correct": 2, "explanation": "એક્સ-સિટુ સંરક્ષણ એટલે પ્રાણીઓ અથવા વનસ્પતિઓને તેમના નૈસર્ગિક આવાસસ્થાન બહાર સંરક્ષિત કરવા. રાષ્ટ્રીય ઉદ્યાન (C) એ ઇન-સિટુ સંરક્ષણ છે, જ્યારે A, B, અને D એ એક્સ-સિટુ સંરક્ષણના ઉદાહરણો છે.", "ncert_ref": "Class XII - પ્રકરણ 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 4}, {"question": "આરબોરેટમ (Arboretum) અને હર્બેરિયમ (Herbarium) વચ્ચેનો મુખ્ય તફાવત કયો છે?", "options": ["A) આરબોરેટમમાં જીવંત વૃક્ષો અને ઝાડીના નમૂનાઓ હોય છે, જ્યારે હર્બેરિયમમાં સૂકા અને સંગ્રહિત વનસ્પતિ નમૂનાઓ હોય છે", "B) આરબોરેટમમાં ફક્ત બીજ ધરાવતા વનસ્પતિઓ હોય છે, જ્યારે હર્બેરિયમમાં બીજરહિત વનસ્પતિઓ હોય છે", "C) આરબોરેટમ એ એક પ્રકારનું જીવજંતુ ઉદ્યાન છે, જ્યારે હર્બેરિયમ એ વનસ્પતિ ઉદ્યાન છે", "D) આરબોરેટમમાં ફક્ત દવાના વનસ્પતિઓ હોય છે, જ્યારે હર્બેરિયમમાં ફક્ત ખાદ્ય વનસ્પતિઓ હોય છે"], "correct": 0, "explanation": "આરબોરેટમમાં જીવંત વૃક્ષો અને ઝાડીના નમૂનાઓ સંગ્રહિત કરવામાં આવે છે, જ્યારે હર્બેરિયમમાં સૂકા અને પ્રેસ કરેલા વનસ્પતિ નમૂનાઓ સંગ્રહિત કરવામાં આવે છે. B, C, અને D વિકલ્પો ખોટા છે કારણ કે તેઓ આરબોરેટમ અને હર્બેરિયમની સચોટ વ્યાખ્યા આપતા નથી.", "ncert_ref": "Class XII - પ્રકરણ 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 5}, {"question": "ગુજરાતના ગીર અભયારણ્યમાં સિંહની વસતી ઘટવાનું મુખ્ય કારણ કયું છે, જ્યારે તેના નિવાસસ્થાનની સુરક્ષા અને ખોરાકની ઉપલબ્ધતા સારી છે?", "options": ["A) જનીનિક ક્ષય દ્વારા અનુવંશિક વિવિધતામાં ઘટાડો થવો", "B) સિંહ અને માનવ વસતી વચ્ચેના સંઘર્ષમાં વૃદ્ધિ થવી", "C) ગીરના જંગલમાં આક્રમક પરભક્ષી પ્રજાતિઓનો આગમન થવો", "D) સિંહમાં રોગપ્રતિકારક શ "ઇન-સિટુ સંરક્ષણ એ પ્રજાતિઓને તેમના નૈસર્ગિક નિવાસસ્થાનમાં જ સંરક્ષિત કરવાની પદ્ધતિ છે. રાષ્ટ્રીય ઉદ્યાનો અને અભયારણ્યો (B) તેના ઉદાહરણો છે, અને તે જનીનિક વિવિધતાને સંરક્ષિત કરે છે (C). પરંતુ પ્રજાતિઓને તેમના નૈસર્ગિક નિવાસસ્થાનથી દૂર સંરક્ષિત કરવી (D) એ એક્સ-સિટુ સંરક્ષણની પદ્ધતિ છે, ઇન-સિટુ નહીં.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 8}, {"question": "ગુજરાતમાં 'વેલવડી' (Prosopis juliflora) નામની આક્રમક વનસ્પતિ પ્રજાતિના પ્રસારને કારણે કયો જૈવ વિવિધતાનો ક્ષય થાય છે?", "options": ["A) સ્થાનિક વનસ્પતિ પ્રજાતિઓનો ક્ષય", "B) જમીનની ઉત્પાદકતામાં વૃદ્ધિ", "C) પશુઓ માટે ચારાની ઉપલબ્ધતામાં વૃદ્ધિ", "D) મધમાખીઓની વસતીમાં વૃદ્ધિ"], "correct": 0, "explanation": "વેલવડી (Prosopis juliflora) એ આક્રમક વનસ્પતિ પ્રજાતિ છે જે સ્થાનિક વનસ્પતિ પ્રજાતિઓને નાશ કરે છે અને તેમના નિવાસસ્થાનને કબજે કરે છે, જે સ્થાનિક જૈવ વિવિધતાના ક્ષય તરફ દોરી જાય છે. જમીનની ઉત્પાદકતા (B), પશુઓ માટે ચારાની ઉપલબ્ધતા (C), અને મધમાખીઓની વસતી (D)માં વૃદ્ધિ થવી એ વેલવડીના પ્રસારના પરિણામો નથી.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 9}, {"question": "જૈવ વિવિધતાના ક્ષયમાં 'પ્રજાતિ ક્ષય' (Species extinction) નું મુખ્ય કારણ કયું નથી?", "options": ["A) નિવાસસ્થાનનો નાશ", "B) અતિશય શિકાર", "C) જનીનિક વિવિધતામાં વૃદ્ધિ", "D) પર્યાવરણીય પ્રદૂષણ"], "correct": 2, "explanation": "પ્રજાતિ ક્ષયના મુખ્ય કારણો નિવાસસ્થાનનો નાશ (A), અતિશય શિકાર (B), અને પર્યાવરણીય પ્રદૂષણ (D) છે. જનીનિક વિવિધતામાં વૃદ્ધિ (C) પ્રજાતિ ક્ષયનું કારણ નથી, ઉલટાનું તે પ્રજાતિના અસ્તિત્વ માટે ફાયદાકારક છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 10}, {"question": "ગુજરાતના કોઈ એક જંગલ વિસ્તારમાં, 'અ' નામની એન્ડેમિક વનસ્પતિ પ્રજાતિનો ક્ષય થઈ રહ્યો છે. આ પ્રજાતિના ક્ષયનું મુખ્ય કારણ તેના પર આધારિત 'બી' નામના કીટકના અદૃશ્ય થવાનું છે. આ પરિસ્થિતિ કયા પ્રકારના જૈવ વિવિધતાના ક્ષયને દર્શાવે છે?", "options": ["A) જનીનિક ક્ષય (Genetic erosion)", "B) પ્રજાતિ ક્ષય (Species extinction)", "C) પાર ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 23}, {"question": "નીચેનામાંથી કયું વિધાન 'જૈવ વિવિધતાના ક્ષય' અને 'પર્યાવરણીય સેવાઓ' વચ્ચેના સંબંધને સૌથી યોગ્ય રીતે વર્ણવે છે?", "options": ["A) જૈવ વિવિધતાનો ક્ષય થવાને કારણે પર્યાવરણીય સેવાઓમાં વૃદ્ધિ થાય છે", "B) જૈવ વિવિધતાનો ક્ષય થવાને કારણે પર્યાવરણીય સેવાઓમાં ઘટાડો થાય છે", "C) જૈવ વિવિધતાનો ક્ષય અને પર્યાવરણીય સેવાઓ વચ્ચે કોઈ સંબંધ નથી", "D) જૈવ વિવિધતાનો ક્ષય થવાને કારણે પર્યાવરણીય સેવાઓમાં કોઈ ફેરફાર થતો નથી"], "correct": 1, "explanation": "જૈવ વિવિધતાનો ક્ષય થવાને કારણે પર્યાવરણીય સેવાઓમાં ઘટાડો થાય છે. જૈવ વિવિધતા પર્યાવરણીય સેવાઓ જેવી કે પ્રદૂષણ નિયંત્રણ, જમીનની ઉત્પાદકતા, પાણીની ગુણવત્તા અને હવામાન નિયંત્રણ માટે મહત્વપૂર્ણ છે. જૈવ વિવિધતાનો ક્ષય થવાને કારણે આ સેવાઓમાં ઘટાડો થાય છે. બાકીના વિકલ્પો (A, C, D) અયોગ્ય છે કારણ કે તેઓ જૈવ વિવિધતાના ક્ષય અને પર્યાવરણીય સેવાઓ વચ્ચેના સંબંધને યોગ્ય રીતે વર્ણવતા નથી.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 24}, {"question": "ગુજરાતના કોઈ એક દરિયાઈ કિનારાના વિસ્તારમાં, 'મેંગ્રોવ જંગલો'નો ક્ષય થવાનું મુખ્ય કારણ તરીકે નીચેનામાંથી કયું વિધાન સૌથી યોગ્ય નથી?", "options": ["A) દરિયાઈ કિનારાના વિસ્તારમાં મનુષ્ય દ્વારા થતી અતિક્રમણ (Encroachment)", "B) દરિયાઈ પ્રદૂષણને કારણે મેંગ્રોવ વનસ્પતિઓના વૃદ્ધિ દરમાં ઘટાડો", "C) દરિયાઈ કિનારાના તાપમાનમાં ઘટાડો થવો", "D) દરિયાઈ કિનારાના વિસ્તારમાં વન્યજીવોની વસતીમાં ઘટાડો"], "correct": 2, "explanation": "મેંગ્રોવ જંગલોનો ક્ષય થવાનું મુખ્ય કારણ મનુષ્ય દ્વારા થતી અતિક્રમણ, દરિયાઈ પ્રદૂષણ અને વન્યજીવોની વસતીમાં ઘટાડો છે. દરિયાઈ કિનારાના તાપમાનમાં ઘટાડો મેંગ્રોવ જંગલોના ક્ષયનું મુખ્ય કારણ નથી. બાકીના વિકલ્પો (A, B, D) યોગ્ય છે કારણ કે તેઓ મેંગ્રોવ જંગલોના ક્ષયના મુખ્ય કારણો છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 25}, {"question": "જૈવ વિવિધતાના ક્ષયમાં 'પર્યાવરણીય સેવાઓ'ના નુકશાનને લગતા નીચેનામાંથી કયું વિધાન સત્ય નથી?", "options": ["A) મેંગ્રોવ જંગલોના ક્ષયથી દરિયાઈ કિનારાના રક્ષણમાં ઘટાડો થાય છે.", "B) મધમાખીઓની વસતીના ક્ષયથી પરાગીકરણ પ્રક્રિયામાં ઘટાડો થાય છે.", "C) કીટકભક્ષી વનસ્પતિઓના ક્ષયથી કીટકોની વસતીમાં ઘટાડો થાય છે.", "D) જંગલોના ક્ષયથી કાર્બન સંગ્રહણ ક્ષમતામાં ઘટાડો થાય છે."], "correct": 2, "explanation": "કીટકભક્ષી વનસ્પતિઓના ક્ષયથી કીટકોની વસતીમાં વધારો થાય છે, કારણ કે કીટકોના શિકારી ઓછા થાય છે. વિકલ્પ A, B, અને D સત્ય છે કારણ કે મેંગ્રોવ જંગલો દરિયાઈ કિનારાને રક્ષણ આપે છે, મધમાખીઓ પરાગીકરણમાં મહત્વની ભૂમિકા ભજવે છે, અને જંગલો કાર્બન સંગ્રહણમાં મદદ કરે છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 26}, {"question": "ગુજરાતના કોઈ એક જંગલ વિસ્તારમાં, 'એકલિંગી ખેતી' (Monoculture) ના કારણે જૈવ વિવિધતાના ક્ષયને લગતા નીચેનામાંથી કયું પરિણામ સૌથી યોગ્ય છે?", "options": ["A) જંગલમાં વનસ્પતિ પ્રજાતિઓની વિવિધતામાં વધારો થાય છે.", "B) જંગલમાં કીટકો અને રોગોના પ્રસારમાં ઘટાડો થાય છે.", "C) જંગલમાં મૃદાની ઉત્પાદકતામાં ઘટાડો થાય છે અને જૈવિક સંકટો માટે સંવેદનશીલતા વધે છે.", "D) જંગલમાં પશુપાલન માટેના ચારાનો પુરવઠો વધે છે."], "correct": 2, "explanation": "એકલિંગી ખેતીથી જંગલમાં વનસ્પતિ પ્રજાતિઓની વિવિધતા ઘટે છે, મૃદાની ઉત્પાદકતા ઘટે છે, અને જૈવિક સંકટો માટે સંવેદનશીલતા વધે છે. વિકલ્પ A, B, અને D અયોગ્ય છે કારણ કે એકલિંગી ખેતીથી વિવિધતામાં ઘટાડો થાય છે, કીટકો અને રોગોના પ્રસારમાં વધારો થાય છે, અને ચારાનો પુરવઠો ઘટે છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 27}, {"question": "જૈવ વિવિધતાના ક્ષયને રોકવા માટે 'જનીનિક સંરક્ષણ'ની પદ્ધતિઓમાં નીચેનામાંથી કયું ઉદાહરણ સૌથી યોગ્ય નથી?", "options": ["A) બીયા બેંકોની સ્થાપના", "B) પારંપરિક પાકોના સંરક્ષણ માટે ખેડૂતો સાથે સહયોગ", "C) વન્યજીવ અભયારણ્યોમાં પ્રાણીઓના પ્રજનન માટેના કાર્યક્રમો", "D) જનીનિક રીતે સુધારેલી પ્રજાતિઓનો વિકાસ"], "correct": 3, "explanation": "જનીનિક સંરક્ષણમાં પારંપરિક પાકો અને સ્થાનિક પ્રજાતિઓના જનીનિક સંરક્ષણ પર ભાર મૂકવામાં આવે છે. વિકલ્પ D અયોગ્ય છે કારણ કે જનીનિક રીતે સુધારેલી પ્રજાતિઓનો વિકાસ જનીનિક સંરક્ષણની પદ્ધતિ નથી, પરંતુ તે જનીનિક વિવિધતામાં ફેરફાર લાવે છે. વિકલ્પ A, B, અને C યોગ્ય છે કારણ કે બીયા બેંકો, પારંપરિક પાકોનું સંરક્ષણ, અને પ્રજનન કાર્યક્રમો જનીનિક સંરક્ષણની પદ્ધતિઓ છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 28}, {"question": "જૈવ વિવિધતાના ક્ષયને રોકવા માટે, નીચેનામાંથી કયું પગલું 'જનીનિક ક્ષય'ને રોકવામાં સૌથી અસરકારક નથી?", "options": ["A) સ્થાનિક પાકોના બીજોનો સંગ્રહ અને સંરક્ષણ", "B) વન્યજીવ અભયારણ્યોમાં પ્રાણીઓની વસતીનો નિયમન", "C) જનીનિક રીતે સુધારેલા પાકોનો વ્યાપક ઉપયોગ", "D) પારંપરિક કૃષિ પદ્ધતિઓનો પ્રચાર અને પ્રસાર"], "correct": 2, "explanation": "જનીનિક ક્ષયને રોકવા માટે જનીનિક રીતે સુધારેલા પાકોનો વ્યાપક ઉપયોગ સૌથી અસરકારક પગલું નથી. જનીનિક રીતે સુધારેલા પાકો સ્થાનિક પાકોની જગ્યાએ લેવામાં આવે છે, જેના કારણે સ્થાનિક પાકોના જનીનિક વિવિધતામાં ઘટાડો થાય છે. વિકલ્પ A, B, અને D જનીનિક ક્ષયને રોકવામાં અસરકારક છે કારણ કે તે સ્થાનિક જનીનિક વિવિધતાને સંરક્ષણ પ્રદાન કરે છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 29}, {"question": "ગુજરાતના કચ્છના રણમાં 'ખારેખર' (Salicornia brachiata) ની જૈવ વિવિધતાના ક્ષયને રોકવા માટે, નીચેનામાંથી કયું પગલું 'જનીનિક ક્ષય'ને રોકવામાં સૌથી અસરકારક નથી?", "options": ["A) સ્થાનિક ખેડૂતોને પારંપરિક પાકોની ખેતી માટે પ્રોત્સાહન આપવું", "B) હાઇબ્રિડ બીજોના ઉપયોગને પ્રોત્સાહન આપવું", "C) જનીન બેંકમાં સ્થાનિક પ્રજાતિઓના બીજોનું સંગ્રહણ કરવું", "D) સ્થાનિક વનસ્પતિ પ્રજાતિઓના સંરક્ષણ માટે અભયારણ્ય સ્થાપવું"], "correct": 1, "explanation": "જનીનિક ક્ષયને રોકવા માટે, સ્થાનિક જનીનિક વિવિધતાનું સંરક્ષણ મહત્વપૂર્ણ છે. હાઇબ્રિડ બીજોના ઉપયોગને પ્રોત્સાહન આપવું (B) જનીનિક ક્ષયને વધારે છે, કારણ કે તે સ્થાનિક પ્રજાતિઓની જગ્યાએ હાઇબ્રિડ પ્રજાતિઓને પ્રોત્સાહન આપે છે, જ્યારે A, C, અને D પગલાં જનીનિક વિવિધતાનું સંરક્ષણ કરે છે. A) સ્થાનિક પાકોની ખેતી જનીનિક વિવિધતાનું સંરક્ષણ કરે છે. C) જનીન બેંકમાં બીજોનું સંગ્રહણ જનીનિક સંરક્ષણની એક પદ્ધતિ છે. D) અભયારણ્ય સ્થાપવું ઇન-સિટુ સંરક્ષણ છે, જે જનીનિક વિવિધતાનું રક્ષણ કરે છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 30}, {"question": "જૈવ વિવિધતાના ક્ષયમાં 'પર્યાવરણીય સ્થિતિસ્થાપકતા' (Ecological resilience) ના નુકશાનને લગતા નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) પર્યાવરણીય સ્થિતિસ્થાપકતા ઘટવાથી પરિસ્થિતિક તંત્રમાં પ્રજાતિઓની સંખ્યા વધે છે", "B) પર્યાવરણીય સ્થિતિસ્થાપકતા ઘટવાથી પરિસ્થિતિક તંત્ર પર્યાવરણીય આંચકાઓ સામે વધુ સંવેદનશીલ બને છે", "C) પર્યાવરણીય સ્થિતિસ્થાપકતા ઘટવાથી પ્રજાતિઓ વચ્ચેની સ્પર્ધા ઘટે છે", "D) પર્યાવરણીય સ્થિતિસ્થાપકતા ઘટવાથી પરિસ્થિતિક તંત્રમાં ઉર્જા પ્રવાહ વધે છે"], "correct": 1, "explanation": "પર્યાવરણીય સ્થિતિસ્થાપકતા ઘટવાથી પરિસ્થિતિક તંત્ર પર્યાવરણીય આંચકાઓ (જેમ કે દુષ્કાળ, બાફ) સામે વધુ સંવેદનશીલ બને છે (B). સ્થિતિસ્થાપકતા ઘટવાથી પ્રજાતિઓની સંખ્યા ઘટે (A ખોટું), સ્પર્ધા વધે (C ખોટું), અને ઉર્જા પ્રવાહમાં ખલેલ પડે (D ખોટું).", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી અને પર્યાવરણ", "difficulty": "Hard", "num": 31}, {"question": "ગુજરાતના કોઈ એક જંગલ વિસ્તારમાં, 'એકલિંગી ખેતી'ને કારણે જૈવ વિવિધતાના ક્ષયને રોકવા માટે નીચેનામાંથી કયું પગલું સૌથી યોગ્ય છે?", "options": ["A) એકલિંગી ખેતીમાં રાસાયણિક ખાતરોનો વધુ ઉપયોગ કરવો", "B) એકલિંગી ખેતીની જગ્યાએ બહુપાકી ખેતી (Polyculture) અપનાવવી", "C) એકલિંગી ખેતીમાં જંતુનાશકોનો ઉપયોગ વધારવો", "D) એકલિંગી ખેતીના વિસ્તારને વધારવો"], "correct": 1, "explanation": "એકલિંગી ખેતીને કારણે જૈવ વિવિધતાના ક્ષયને રોકવા માટે બહુપાકી ખેતી (B) અપનાવવી સૌથી યોગ્ય છે, કારણ કે તે પ્રજાતિઓની વિવિધતા વધારે છે. રાસાયણિક ખાતરો (A) અને જંતુનાશકો (C)નો વધુ ઉપયોગ પર્યાવરણીય નુકસાન કરે છે, જ્યારે વિસ્તાર વધારવો (D) ક્ષયને વધારે છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 32}, {"question": "જૈવ વિવિધતાના ક્ષયમાં 'જનીનિક ક્ષય'ને રોકવા માટે નીચેનામાંથી કયું પગલું સૌથી અસરકારક છે?", "options": ["A) વન્યજીવ અભયારણ્યોમાં પ્રવેશ નિષેધ કરવો", "B) સ્થાનિક પાકોના બીજોનું સંરક્ષણ અને સંગ્રહ કરવો", "C) આક્રમક પ્રજાતિઓનો નાશ કરવો", "D) શહેરીકરણને પ્રોત્સાહન આપવો"], "correct": 1, "explanation": "જનીનિક ક્ષયને રોકવા માટે સ્થાનિક પાકોના બીજોનું સંરક્ષણ અને સંગ્રહ (B) સૌથી ) નામની મત્સ્ય પ્રજાતિના ક્ષયનું મુખ્ય કારણ તરીકે સ્થાનિક માછીમારો દ્વારા પારંપરિક માછીમારી પદ્ધતિઓનો ઉપયોગ સૌથી ઓછી શક્યતા ધરાવે છે, કારણ કે પારંપરિક પદ્ધતિઓ સામાન્ય રીતે પર્યાવરણને અનુકૂળ હોય છે. વિકલ્પ A, B, અને C અતિશય શોષણ, પ્રદૂષણ, અને જલવાયુ પરિવર્તન જેવા કારણો છે જે પ્રજાતિના ક્ષયને વધારી શકે છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 37}, {"question": "ગુજરાતના કોઈ એક જંગલ વિસ્તારમાં, 'એન્ડેમિક વનસ્પતિ પ્રજાતિ'ના ક્ષયને રોકવા માટે નીચેનામાંથી કયું પગલું સૌથી અસરકારક છે, જ્યારે તે પ્રજાતિના કુદરતી હેબિટેટમાં ભારે માનવીય દખલ થયું હોય?", "options": ["A) એન્ડેમિક પ્રજાતિના બીજને જીન બેંકમાં સંગ્રહ કરવા.", "B) એન્ડેમિક પ્રજાતિને બોટેનિકલ ગાર્ડનમાં ઉગાડવા.", "C) એન્ડેમિક પ્રજાતિના કુદરતી હેબિટેટને પુનઃસ્થાપિત કરવા અને તેને સંરક્ષિત વિસ્તાર ઘોષિત કરવા.", "D) એન્ડેમિક પ્રજાતિના પૌઢા (Saplings) ને અન્ય વિસ્તારોમાં લગાડવા."], "correct": 2, "explanation": "એન્ડેમિક પ્રજાતિના કુદરતી હેબિટેટને પુનઃસ્થાપિત કરવા અને તેને સંરક્ષિત વિસ્તાર ઘોષિત કરવા એ સૌથી અસરકારક પગલું છે, કારણ કે એન્ડેમિક પ્રજાતિઓ તેમના કુદરતી હેબિટેટ પર જ આધાર રાખે છે. જીન બેંકમાં બીજ સંગ્રહ (A) અને બોટેનિકલ ગાર્ડનમાં ઉગાડવું (B) એ એક્સ-સિટુ સંરક્ષણ છે, જે લાંબા ગાળા માટે ટિકાઉ નથી. અન્ય વિસ્તારોમાં પૌઢા લગાડવા (D) એ પણ અસરકારક નથી, કારણ કે એન્ડેમિક પ્રજાતિઓ તેમના કુદરતી હેબિટેટ બહાર ટકી શકતી નથી.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 38}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};

            const container = document.getElementById('questionsContainer');

                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');

                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
