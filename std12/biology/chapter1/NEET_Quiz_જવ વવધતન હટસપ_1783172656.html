<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - જૈવ વિવિધતાના હોટસ્પોટ્સ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 જૈવ વિવિધતાના હોટસ્પોટ્સ</span>
                <span>🎯 Hard</span>
                <span>📝 48 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "ભારતમાં આવેલા જૈવ વિવિધતાના હોટસ્પોટમાંથી કયો હોટસ્પોટ પશ્ચિમ ઘાટ અને શ્રીલંકાને આચ્છાદિત કરે છે અને અહીં અંદાજે ૧૫૦૦ જેટલી સ્થાનિક વનસ્પતિ પ્રજાતિઓ જોવા મળે છે?", "options": ["A) હિમાલયન હોટસ્પોટ", "B) ઇન્ડો-બર્મા હોટસ્પોટ", "C) પશ્ચિમ ઘાટ અને શ્રીલંકા હોટસ્પોટ", "D) સુંડાલેન્ડ હોટસ્પોટ"], "correct": 2, "explanation": "પશ્ચિમ ઘાટ અને શ્રીલંકા હોટસ્પોટ ભારતનો એક મહત્વનો હોટસ્પોટ છે, જેમાં અંદાજે ૧૫૦૦ જેટલી સ્થાનિક વનસ્પતિ પ્રજાતિઓ જોવા મળે છે. હિમાલયન હોટસ્પોટ હિમાલય પર્વતમાળાને આચ્છાદિત કરે છે, ઇન્ડો-બર્મા હોટસ્પોટ પૂર્વ હિમાલય અને મ્યાનમારને આચ્છાદિત કરે છે, જ્યારે સુંડાલેન્ડ હોટસ્પોટ ઇન્ડોનેશિયા અને મલેશિયાને આચ્છાદિત કરે છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 1}, {"question": "જૈવ વિવિધતાના હોટસ્પોટની વ્યાખ્યા મુજબ, કયું વિધાન સત્ય નથી?", "options": ["A) હોટસ્પોટમાં ૦.૫% કે તેથી વધુ વસ્તી ધરાવતી વનસ્પતિ પ્રજાતિઓ હોવી જોઈએ.", "B) હોટસ્પોટમાં કમથી કમ ૧૫૦૦ સ્થાનિક વનસ્પતિ પ્રજાતિઓ હોવી જોઈએ.", "C) હોટસ્પોટમાં માત્ર જંગલી પ્રાણીઓની વિપુલતા હોવી જોઈએ.", "D) હોટસ્પોટમાં માનવી દબાણના કારણે નાશ પામતી પ્રજાતિઓ હોવી જોઈએ."], "correct": 2, "explanation": "હોટસ્પોટની વ્યાખ્યામાં સ્થાનિક વનસ્પતિ પ્રજાતિઓની વિપુલતા અને માનવી દબાણના કારણે નાશ પામતી પ્રજાતિઓનો સમાવેશ થાય છે. પરંતુ હોટસ્પોટની વ્યાખ્યામાં માત્ર જંગલી પ્રાણીઓની વિપુલતાનો સમાવેશ થતો નથી. હોટસ્પોટમાં ૦.૫% કે તેથી વધુ વસ્તી ધરાવતી વનસ્પતિ પ્રજાતિઓ અને કમથી કમ ૧૫૦૦ સ્થાનિક વનસ્પતિ પ્રજાતિઓ હોવી જોઈએ.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 2}, {"question": "નીચેનામાંથી કયો હોટસ્પોટ ભારતમાં આવેલો નથી?", "options": ["A) હિમાલયન હોટસ્પોટ", "B) ઇન્ડો-બર્મા હોટસ્પોટ", "C) કેપ ફ્લોરલ હોટસ્પોટ", "D) પશ્ચિમ ઘાટ અને શ્રીલંકા હોટસ્પોટ"], "correct": 2, "explanation": "કેપ ફ્લોરલ હોટસ્પોટ દક્ષિણ આફ્રિકામાં આવેલો છે, જ્યારે હિમાલયન હોટસ્પોટ, ઇન્ડો-બર્મા હોટસ્પોટ, અને પશ્ચિમ ઘાટ અને શ્રીલંકા હોટસ્પોટ ભારતમાં આવેલા છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 3}, {"question": "ભારતના કયા હોટસ્પોટમાં સૌથી વધુ સ્થાનિક પ્રાણી પ્રજાતિઓ જોવા મળે છે?", "options": ["A) હિમાલયન હોટસ્પોટ", "B) ઇન્ડો-બર્મા હોટસ્પોટ", "C) પશ્ચિમ ઘાટ અને શ્રીલંકા હોટસ્પોટ", "D) સુંડાલેન્ડ હોટસ્પોટ"], "correct": 0, "explanation": "હિમાલયન હોટસ્પોટમાં સૌથી વધુ સ્થાનિક પ્રાણી પ્રજાતિઓ જોવા મળે છે. આ હોટસ્પોટમાં વિવિધ પ્રકારના સ્થાનિક પ્રાણીઓ જોવા મળે છે, જેમાં હિમાલયન ટેટ્રા, સ્નો લેપર્ડ, અને રેડ પાંડા જેવા પ્રાણીઓનો સમાવેશ થાય છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 4}, {"question": "નીચેનામાંથી કયું વિધાન હોટસ્પોટના સંરક્ષણ સાથે સંકળાયેલું નથી?", "options": ["A) સ્થાનિક પ્રજાતિઓનું સંરક્ષણ", "B) વન્યજીવ અભયારણ્યોની સ્થાપના", "C) જૈવિક સંસાધનોનો અતિ શોષણ", "D) જનજાતિય સમુદાયો સાથે સહયોગ"], "correct": 2, "explanation": "જૈવિક સંસાધનોનો અતિ શોષણ હોટસ્પોટના સંરક્ષણ સાથે સંકળાયેલું નથી. સ્થાનિક પ્રજાતિઓનું સંરક્ષણ, વન્યજીવ અભયારણ્યોની સ્થાપના, અને જનજાતિય સમુદાયો સાથે સહયોગ હોટસ્પોટના સંરક્ષણ સાથે સંકળાયેલા છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 5}, {"question": "પશ્ચિમ ઘાટ અને શ્રીલંકા હોટસ્પોટમાં જોવા મળતી નીચેનામાંથી કઈ પ્રજાતિ એન્ડેમિક છે અને તેની જૈવિક મહત્ત્વની દૃષ્ટિએ 'લિવિંગ ફોસિલ' તરીકે ઓળખાય છે?", "options": ["A) નીલગિરી તહેર (Nilgiri Tahr)", "B) શેરપંજા (Lion-tailed Macaque)", "C) પુરપલી ફિશ (Purplish Frog - Nasikabatrachus sahyadrensis)", "D) મલાબાર ટ્રોપિકલ ટોડ (Malabar Gliding Frog)"], "correct": 2, "explanation": "પુરપલી ફિશ (Nasikabatrachus sahyadrensis) એ પશ્ચિમ ઘાટના હોટસ્પોટમાં જોવા મળતી એન્ડેમિક પ્રજાતિ છે અને તેને 'લિવિંગ ફોસિલ' તરીકે ઓળખવામાં આવે છે કારણ કે તેની શારીરિક રચના ૧૦૦ મિલિયન વર્ષ જૂની છે. નીલગિરી તહેર અને શેરપંજા એન્ડેમિક છે પરંતુ 'લિવિંગ ફોસિલ' નથી. મલાબાર ટ્રોપિકલ ટોડ એન્ડેમિક છે પરંતુ તેની જૈવિક મહત્ત્વની દૃષ્ટિએ 'લિવિંગ ફોસિલ' તરીકે ઓળખાતી નથી.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 6}, {"question": "હિમાલય હો "A) તે ઇન્ડોનેશિયા, મલેશિયા, બ્રુનેઈ અને સિંગાપુરને આચ્છાદિત કરે છે.", "B) તેમાં ઓરેંગુટન (Orangutan) અને સુમાત્રન ટાઇગર જેવી પ્રજાતિઓ જોવા મળે છે.", "C) તે ભારતના દક્ષિણ ભાગમાં આવેલો છે.", "D) તેમાં મેંગ્રોવ વનસ્પતિની વિપુલ પ્રજાતિઓ જોવા મળે છે."], "correct": 2, "explanation": "સુંડાલેન્ડ હોટસ્પોટ ઇન્ડોનેશિયા, મલેશિયા, બ્રુનેઈ અને સિંગાપુરને આચ્છાદિત કરે છે અને તેમાં ઓરેંગુટન, સુમાત્રન ટાઇગર અને મેંગ્રોવ વનસ્પતિની વિપુલ પ્રજાતિઓ જોવા મળે છે. પરંતુ તે ભારતના દક્ષિણ ભાગમાં આવેલો નથી.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 10}, {"question": "પશ્ચિમ ઘાટના જૈવ વિવિધતા હોટસ્પોટમાં જોવા મળતી 'નીલગિરી તહેર' (Nilgiri Tahr) પ્રજાતિ વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) તે એક એન્ડેમિક સસ્તન પ્રાણી છે અને તેની સંખ્યા ઘટી રહી છે કારણ કે તેના નિવાસસ્થાનમાં વનવિનાશ થઈ રહ્યો છે.", "B) તે એક પરભક્ષી પક્ષી છે જે પશ્ચિમ ઘાટના ઉચ્ચ પર્વતીય પ્રદેશોમાં જોવા મળે છે.", "C) તે એક ઉભયજીવી છે જે પશ્ચિમ ઘાટના જળાશયોમાં જોવા મળે છે અને તેનો વૈજ્ઞાનિક નામ 'રાણા ટેમ્પોરેરિયા' છે.", "D) તે એક સરીસૃપ છે જે પશ્ચિમ ઘાટના જંગલોમાં જોવા મળે છે અને તેનો વૈજ્ઞાનિક નામ 'કોબ્રા કા કેપેલા' છે."], "correct": 0, "explanation": "નીલગિરી તહેર (Nilgiri Tahr) એક એન્ડેમિક સસ્તન પ્રાણી છે જે પશ્ચિમ ઘાટના ઉચ્ચ પર્વતીય પ્રદેશોમાં જોવા મળે છે. તેની સંખ્યા ઘટી રહી છે કારણ કે તેના નિવાસસ્થાનમાં વનવિનાશ અને શિકાર જેવા પડકારોનો સામનો કરવો પડી રહ્યો છે. વિકલ્પ B, C, અને D અસત્ય છે કારણ કે નીલગિરી તહેર પરભક્ષી પક્ષી, ઉભયજીવી અથવા સરીસૃપ નથી.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 11}, {"question": "હિમાલય હોટસ્પોટમાં જોવા મળતી 'રોડોડેન્ડ્રોન' (Rhododendron) વનસ્પતિ પ્રજાતિ વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) તે હિમાલયના ઉચ્ચ પર્વતીય પ્રદેશોમાં જોવા મળે છે અને તેની ફુલોની રંગબેરંગી છટા માટે જાણીતી છે.", "B) તે એક એન્ડેમિક વનસ્પતિ છે જે હિમાલય હોટસ્પોટમાં જોવા મળે છે.", "C) તે એક પરજીવી વનસ્પતિ છે જે અન્ય વૃક્ષો પર આશ્રય લે છે.", "D) તેની ફુલોનો ઉપયોગ સ્થાનિક લોકો દ્વારા ઔષધ તરીકે થાય છે."], "correct": 2, "explanation": "રોડોડેન્ડ્રોન (Rhododendron) હિમાલયના ઉચ્ચ પર્વતીય પ્રદેશોમાં જોવા મળતી એક એન્ડેમિક વનસ્પતિ છે જે તેની ફુલોની રંગબેરંગી છટા માટે જાણીતી છે. તે પરજીવી વનસ્પતિ નથી, પરંતુ તે એક સ્વતંત્ર વનસ્પતિ છે. વિકલ્પ A, B, અને D સત્ય છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 12}, {"question": "સુંડાલેન્ડ હોટસ્પોટ વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) સુંડાલેન્ડ હોટસ્પોટમાં મલય દ્વીપસમૂહ, ઇન્ડોનેશિયા, અને ફિલિપાઇન્સનો સમાવેશ થાય છે.", "B) સુંડાલેન્ડ હોટસ્પોટમાં ઓરંગુટાન, સુમાત્રન વાઘ, અને જાવાન રાઇનો જેવી એન્ડેમિક પ્રજાતિઓ જોવા મળે છે.", "C) સુંડાલેન્ડ હોટસ્પોટમાં કોઈ એન્ડેમિક પ્રજાતિઓ જોવા મળતી નથી.", "D) સુંડાલેન્ડ હોટસ્પોટ ભારતમાં આવેલો છે."], "correct": 1, "explanation": "સુંડાલેન્ડ હોટસ્પોટમાં ઓરંગુટાન, સુમાત્રન વાઘ, અને જાવાન રાઇનો જેવી એન્ડેમિક પ્રજાતિઓ જોવા મળે છે. વિકલ્પ A ખોટો છે કારણ કે સુંડાલેન્ડ હોટસ્પોટમાં મલય દ્વીપસમૂહ, ઇન્ડોનેશિયા, અને ફિલિપાઇન્સનો સમાવેશ થતો નથી. વિકલ્પ C ખોટો છે કારણ કે સુંડાલેન્ડ હોટસ્પોટમાં એન્ડેમિક પ્રજાતિઓ જોવા મળે છે. વિકલ્પ D ખોટો છે કારણ કે સુંડાલેન્ડ હોટસ્પોટ ભારતમાં આવેલો નથી.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 13}, {"question": "ઇન્ડો-બર્મા હોટસ્પોટ વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) ઇન્ડો-બર્મા હોટસ્પોટમાં મ્યાનમાર, થાઇલેન્ડ, વિયેતનામ, અને કંબોડિયાનો સમાવેશ થાય છે.", "B) ઇન્ડો-બર્મા હોટસ્પોટમાં એન્ડેમિક પ્રજાતિઓની સંખ્યા ખૂબ જ ઓછી છે.", "C) ઇન્ડો-બર્મા હોટસ્પોટમાં મેકાક, ગિબ્બન, અને એશિયન હાથી જેવી પ્રજાતિઓ જોવા મળે છે.", "D) ઇન્ડો-બર્મા હોટસ્પોટમાં વનવિનાશ અને શિકાર જેવા પડકારોનો સામનો કરવો પડી રહ્યો છે."], "correct": 1, "explanation": "ઇન્ડો-બર્મા હોટસ્પોટમાં એન્ડેમિક પ્રજાતિઓની સંખ્યા ખૂબ જ વધારે છે, નહીં કે ઓછી. વિકલ્પ A, C, અને D સત્ય છે કારણ કે ઇન્ડો-બર્મા હોટસ્પોટમાં મ્યાનમાર, થાઇલેન્ડ, વિયેતનામ, અને કંબોડિયાનો સમાવેશ થાય છે, અને તેમાં મેકાક, ગિબ્બન, એશિયન હાથી જેવી પ્રજાતિઓ જોવા મળે છે, તેમજ વનવિનાશ અને શિકાર જેવા પડકારોનો સામનો કરવો પડી રહ્યો છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 14}, {"question": "નીચેનામાંથી કયો હોટસ્પોટ 'મેગા-બાયોડાયવર્સિટી હોટસ્પોટ' તરીકે ઓળખાય છે અને તેમાં સૌથી વધુ એન્ડેમિક પ્રજાતિઓ જોવા મળે છે?", "options": ["A) પશ્ચિમ ઘાટ અને શ્રીલંકા", "B) હિમાલય", "C) ઇન્ડો-બર્મા", "D) સુંડાલેન્ડ"], "correct": 3, "explanation": "સુંડાલેન્ડ હોટસ્પોટને 'મેગા-બાયોડાયવર્સિટી હોટસ્પોટ' તરીકે ઓળખવામાં આવે છે કારણ કે તેમાં સૌથી વધુ એન્ડેમિક પ્રજાતિઓ જોવા મળે છે. પશ્ચિમ ઘાટ અને શ્રીલંકા, હિમાલય, અને ઇન્ડો-બર્મા હોટસ્પોટમાં પણ એન્ડેમિક પ્રજાતિઓ જોવા મળે છે, પરંતુ સુંડાલેન્ડ હોટસ્પોટમાં તેની સંખ્યા સૌથી વધારે છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 15}, {"question": "પશ્ચિમ ઘાટના જૈવ વિવિધતા હોટસ્પોટમાં 'મલાબાર પીટ વાયપર' (Malabar Pit Viper) ની એન્ડેમિક પ્રજાતિ વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) તે એક વિષાળ સર્પ છે જે પશ્ચિમ ઘાટના આર્દ્ર જંગલોમાં જોવા મળે છે.", "B) તેની શરીરની રચના અને રંગરૂપ તેને પર્ણસમૂહમાં છુપાવવામાં મદદ કરે છે.", "C) તે મુખ્યત્વે શાકાહારી હોય છે અને ફળો પર આહાર લે છે.", "D) તેની પ્રજનન ઋતુ મોસમી હોય છે અને તે જીવંત બચ્ચા જન્મ આપે છે."], "correct": 2, "explanation": "મલાબાર પીટ વાયપર એક વિષાળ સર્પ છે જે પશ્ચિમ ઘાટના આર્દ્ર જંગલોમાં એન્ડેમિક છે. તેની શરીરની રચના અને રંગરૂપ તેને પર્ણસમૂહમાં છુપાવવામાં મદદ કરે છે (A અને B સત્ય છે). તે માંસાહારી હોય છે અને કીટકો, ઉભયજીવીઓ અને નાના સસ્તન પ્રાણીઓ પર આહાર લે છે, શાકાહારી નહીં (C ખોટું છે). તે જીવંત બચ્ચા જન્મ આપે છે (D સત્ય છે).", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 16}, {"question": "હિમાલય હોટસ્પોટમાં જોવા મળતી 'બ્રહ્મકમળ' (Brahma Kamal) ની વનસ્પતિ પ્રજાતિ વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) તે એક પાણીની વનસ્પતિ છે જે હિમાલયની તળાવોમાં ઉગે છે.", "B) તે એક બહુવાર્ષિક જડીબુટ્ટી છે જે ઉચ્ચ પર્વતીય પ્રદેશોમાં જોવા મળે છે.", "C) તેની પુષ્પવિન્યાસ સૂર્યમુખી જેવી હોય છે અને તે સૂર્યપ્રકાશ તરફ વળે છે.", "D) તે એક પરોપજીવી વનસ્પતિ છે જે અન્ય વનસ્પતિઓ પર આશ્રય લે છે."], "correct": 1, "explanation": "બ્રહ્મકમળ (Saussurea obvallata) એક બહુવાર્ષિક જડીબુટ્ટી છે જે હિમાલયના ઉચ્ચ પર્વતીય પ્રદેશોમાં (3000-4800 મીટર) જોવા મળે છે (B સત્ય છે). તે પાણીની વનસ્પતિ નથી (A ખોટું), તેની પુષ્પવિન્યાસ સૂર્યમુખી જેવી નથી (C ખોટું), અને તે પરોપજીવી નથી (D ખોટું).", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 17}, {"question": "સુંડાલેન્ડ હોટસ્પોટમાં જોવા મળતી 'રાફ્લેસિયા' (Rafflesia) ની વનસ્પતિ પ્રજાતિ વિશે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "options": ["A) તે વિશ્વની સૌથી મોટી ફૂલ છે અને તેનો વ્યાસ 1 મીટર સુધીનો હોઈ શકે છે.", "B) તે એક પરોપજીવી વનસ્પતિ છે જે તેના પોષક વનસ્પતિના મૂળ પર આશ્રય લે છે.", "C) તેના ફૂલમાં મધુર ગંધ હોય છે જે પરાગણમાં મદદ કરે છે.", "D) તે ઇન્ડોનેશિયા, મલેશિયા અને થાઇલેન્ડના વરસાદી જંગલોમાં જોવા મળે છે."], "correct": 2, "explanation": "રાફ્લેસિયા વિશ્વની સૌથી મોટી ફૂલ છે (A સત્ય), તે પરોપજીવી છે અને પોષક વનસ્પતિના મૂળ પર આશ્રય લે છે (B સત્ય), તે ઇન્ડોનેશિયા, મલેશિયા અને થાઇલેન્ડમાં જોવા મળે છે (D સત્ય). પરંતુ તેના ફૂલમાં મધુર ગંધ નહીં પણ સડેલા માંસ જેવી દુર્ગંધ હોય છે જે મકખીઓને આકર્ષે છે (C ખોટું).", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 18}, {"question": "ઇન્ડો-બર્મા હોટસ્પોટમાં જોવા મળતી 'ગેંગેટિક ડોલ્ફિન' (Ganges River Dolphin) પ્રજાતિ વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) તે એક મીઠા પાણીની ડોલ્ફિન છે જે ગંગા, બ્રહ્મપુત્રા અને મેઘના નદીઓમાં જોવા મળે છે.", "B) તેની આંખો સંપૂર્ણપણે વિકસિત હોય છે અને તે પાણીની અંદર સ્પષ્ટ જોઈ શકે છે.", "C) તે એકોલોકેશન (Echolocation) પદ્ધતિનો ઉપયોગ કરે છે જેથી તે પાણીની અંદર નેવિગેટ કરી શકે.", "D) તે ભારત, બાંગ્લાદેશ અને નેપાળના નદી તંત્રોમાં જોવા મળે છે."], "correct": 1, "explanation": "ગેંગેટિક ડોલ્ફિન એક મીઠા પાણીની ડોલ્ફિન છે જે ગંગા, બ્રહ્મપુત્રા અને મેઘના નદીઓમાં જોવા મળે છે (A સત્ય). તે એકોલોકેશન પદ્ધતિનો ઉપયોગ કરે છે (C સત્ય) અને ભારત, બાંગ્લાદેશ અને નેપાળમાં જોવા મળે છે (D સત્ય). પરંતુ તેની આંખો અંધારી હોય છે અને તે પાણીની અંદર સ્પષ્ટ જોઈ શકતી નથી (B ખોટું).", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 19}, {"question": "નીચેનામાંથી કયો હોટસ્પોટ 'ટેન-ડિગ્રી ચેનલ' દ્વારા શ્રીલંકાથી અલગ પડે છે અને તેમાં સૌથી વધુ એન્ડેમિક પ્રજાતિઓ ધરાવે છે?", "options": ["A) પશ્ચિમ ઘાટ", "B) હિમાલય", "C) ઇન્ડો-બર્મા", "D) સુંડાલેન્ડ"], "correct": 0, "explanation": "પશ્ચિમ ઘાટ હોટસ્પોટ 'ટેન-ડિગ્રી ચેનલ' દ્વારા શ્રીલંકાથી અલગ પડે છે અને તેમાં સૌથી વધુ એન્ડેમિક પ્રજાતિઓ (લગભગ 77%) જોવા મળે છે. હિમાલય (B), ઇન્ડો-બર્મા (C), અને સુંડાલેન્ડ (D) હોટસ્પોટ્સ આ લક્ષણો ધરાવતા નથી.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 20}, {"question": "પશ્ચિમ ઘાટ અને શ્રીલંકા હોટસ્પોટમાં જોવા મળતી 'મલયન ગેંગેસ' (Malayan Giant Squirrel) પ્રજાતિ વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) તે પશ્ચિમ ઘાટના વરસાદી જંગલોમાં જોવા મળે છે અને તે એન્ડેમિક પ્રજાતિ છે.", "B) તે શ્રીલંકાના શુષ્ક વિસ્તારોમાં જોવા મળે છે અને તે અત્યંત સંવેદનશીલ પ્રજાતિ છે.", "C) તે પશ્ચિમ ઘાટ અને શ્રીલંકાના વરસાદી જંગલોમાં જોવા મળે છે પરંતુ તે એન્ડેમિક નથી.", "D) તે હિમાલયના ઉચ્ચ પર્વતીય વિસ્તારોમાં જોવા મળે છે અને તે એન્ડેમિક પ્રજાતિ છે."], "correct": 2, "explanation": "મલયન ગેંગેસ (Ratufa indica) પશ્ચિમ ઘાટ અને શ્રીલંકાના વરસાદી જંગલોમાં જોવા મળે છે, પરંતુ તે એન્ડેમિક પ્રજાતિ નથી. તે ભારત, શ્રીલંકા, અને આગ્નેય એશિયાના અન્ય ભાગોમાં પણ જોવા મળે છે. વિકલ્પ A ખોટો છે કારણ કે તે એન્ડેમિક નથી. વિકલ્પ B ખોટો છે કારણ કે તે શ્રીલંકાના શુષ્ક વિસ્તારોમાં નહીં પરંતુ વરસાદી જંગલોમાં જોવા મળે છે. વિકલ્પ D ખોટો છે કારણ કે તે હિમાલયમાં નહીં પરંતુ પશ્ચિમ ઘાટ અને શ્રીલંકામાં જોવા મળે છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 21}, {"question": "હિમાલય હોટસ્પોટમાં જોવા મળતી 'સ્નો લેપર્ડ' (Snow Leopard) પ્રજાતિ વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) તે હિમાલયના ઉચ્ચ પર્વતીય વિસ્તારોમાં જોવા મળે છે અને તે એન્ડેમિક પ્રજાતિ છે.", "B) તે IUCN રેડ લિસ્ટમાં 'સંવેદનશીલ' (Vulnerable) શ્રેણીમાં મૂકવામાં આવી છે.", "C) તેના અસ્તિત્વને ખતરો તેના અવસાન અને વસવાટના નાશને કારણે છે.", "D) તે હિમાલયના ઉચ્ચ પર્વતીય વિસ્તારોમાં જોવા મળે છે પરંતુ તે એન્ડેમિક નથી."], "correct": 0, "explanation": "સ્નો લેપર્ડ હિમાલયના ઉચ્ચ પર્વતીય વિસ્તારોમાં જોવા મળે છે, પરંતુ તે એન્ડેમિક પ્રજાતિ નથી. તે મધ્ય એશિયા અને રશિયાના અન્ય ભાગોમાં પણ જોવા મળે છે. વિકલ્પ A ખોટો છે કારણ કે તે એન્ડેમિક નથી. વિકલ્પ B અને C સત્ય છે કારણ કે તે IUCN રેડ લિસ્ટમાં 'સંવેદનશીલ' શ્રેણીમાં છે અને તેના અસ્તિત્વને અવસાન અને વસવાટના નાશને કારણે ખતરો છે. વિકલ્પ D સત્ય છે કારણ કે તે હિમાલયમાં જોવા મળે છે પરંતુ એન્ડેમિક નથી.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 22}, {"question": "ઇન્ડો-બર્મા હોટસ્પોટમાં જોવા મળતી 'ઇરાવદી ડોલ્ફિન' (Irrawaddy Dolphin) પ્રજાતિ વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) તે મીઠા પાણીની પ્રજાતિ છે અને તે એન્ડેમિક છે.", "B) તે ખારા પાણીની પ્રજાતિ છે અને તે એન્ડેમિક નથી.", "C) તે મીઠા અને ખારા પાણી બંનેમાં જોવા મળે છે અને તે એન્ડેમિક નથી.", "D) તે મીઠા પાણીની પ્રજાતિ છે અને તે એન્ડેમિક નથી."], "correct": 2, "explanation": "ઇરાવદી ડોલ્ફિન મીઠા અને ખારા પાણી બંનેમાં જોવા મળે છે અને તે એન્ડેમિક પ્રજાતિ નથી. તે ઇન્ડો-બર્મા હોટસ્પોટ સિવાય અન્ય વિસ્તારોમાં પણ જોવા મળે છે. વિકલ્પ A ખોટો છે કારણ કે તે એન્ડેમિક નથી. વિકલ્પ B ખોટો છે કારણ કે તે મીઠા પાણીની પણ પ્રજાતિ છે. વિકલ્પ D ખોટો છે કારણ કે તે ખારા પાણીની પણ પ્રજાતિ છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 23}, {"question": "પશ્ચિમ ઘાટ અને શ્રીલંકા હોટસ્પોટમાં જોવા મળતી 'મલાબાર ગ્રેપ વાઇન' (Malabar Grape Vine) ની વનસ્પતિ પ્રજાતિ વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) તે એક એન્ડેમિક પ્રજાતિ છે જે ફક્ત પશ્ચિમ ઘાટમાં જ જોવા મળે છે.", "B) તેની શાખાઓ લાંબી અને વલણશીલ હોય છે, જે વૃક્ષો પર ચડી શકે છે.", "C) તેના પર્ણોનો ઉપયોગ પરંપરાગત ઔષધિઓમાં થાય છે.", "D) તે એક વાર્ષિક વનસ્પતિ છે જે મોનસૂનના મહિનાઓ દરમિયાન વિકસે છે."], "correct": 3, "explanation": "મલાબાર ગ્રેપ વાઇન (Vitis heyneana) એક બહુવાર્ષિક વેલ છે, નહીં કે વાર્ષિક વનસ્પતિ. તે પશ્ચિમ ઘાટમાં એન્ડેમિક છે (A સત્ય), તેની શાખાઓ લાંબી અને વલણશીલ હોય છે (B સત્ય), અને તેના પર્ણોનો ઉપયોગ પરંપરાગત ઔષધિઓમાં થાય છે (C સત્ય). પરંતુ તે વાર્ષિક નહીં પરંતુ બહુવાર્ષિક છે, તેથી D ખોટું છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 24}, {"question": "હિમાલય હોટસ્પોટમાં જોવા મળતી 'સ્પિતી હોર્સ' (Spiti Horse) પ્રજાતિ વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) તે એક જંગલી ઘોડાની પ્રજાતિ છે જે હિમાલયના ઉચ્ચ પ્રદેશોમાં જોવા મળે છે.", "B) તે એક સ્થાનિક ઘરેલું ઘોડાની પ્રજાતિ છે જે નીચા તાપમાન અને ઓક્સિજનની ઓછી ઉપલબ્ધતામાં જીવી શકે છે.", "C) તેની ઉત્પત્તિ ભારતીય ઉપખંડની બહાર થઈ છે અને તે હિમાલયમાં આયાત કરવામાં આવી છે.", "D) તે એક વિલુપ્ત થતી પ્રજાતિ છે જે હિમાલયના દક્ષિણ ભાગમાં જોવા મળે છે."], "correct": 1, "explanation": "સ્પિતી હોર્સ એક સ્થાનિક ઘરેલું ઘોડાની પ્રજાતિ છે જે હિમાલયના ઉચ્ચ પ્રદેશોમાં (જેમ કે હિમાચલ પ્રદેશ અને લદ્દાખ) જોવા મળે છે. તે નીચા તાપમાન અને ઓક્સિજનની ઓછી ઉપલબ્ધતામાં જીવી શકે છે (B સત્ય). તે જંગલી પ્રજાતિ નથી (A ખોટું), તેની ઉત્પત્તિ ભારતીય ઉપખંડમાં જ થઈ છે (C ખોટું), અને તે હિમાલયના ઉત્તર ભાગમાં જોવા મળે છે, નહીં કે દક્ષિણ ભાગમાં (D ખોટું).", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 25}, {"question": "પશ્ચિમ ઘાટ અને શ્રીલંકા હોટસ્પોટમાં જોવા મળતી 'મલાબાર ટ્રોપિકલ તડબૂચ' (Malabar Tropical Toad) પ્રજાતિ વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) આ પ્રજાતિ ફક્ત શ્રીલંકામાં જોવા મળે છે અને તે સંકટગ્રસ્ત પ્રજાતિ છે.", "B) આ પ્રજાતિ પશ્ચિમ ઘાટના આર્દ્ર પર્ણપાતી જંગલોમાં જોવા મળે છે અને તે એન્ડેમિક છે.", "C) આ પ્રજાતિ હિમાલયના ઉચ્ચ પ્રદેશોમાં જોવા મળે છે અને તેનો ઉપયોગ આયુર્વેદિક દવાઓમાં થાય છે.", "D) આ પ્રજાતિ ઇન્ડો-બર્મા હોટસ્પોટમાં જોવા મળે છે અને તેનો સંરક્ષણ દરજ્જો 'લોપોનની કગાર પર' છે."], "correct": 1, "explanation": "મલાબાર ટ્રોપિકલ તડબૂચ (Duttaphrynus melanostictus) પશ્ચિમ ઘાટના આર્દ્ર પર્ણપાતી જંગલોમાં જોવા મળે છે અને તે આ હોટસ્પોટ માટે એન્ડેમિક છે. વિકલ્પ A ખોટો છે કારણ કે તે શ્રીલંકામ ptions": ["A) તે એક સરીસૃપ પ્રજાતિ છે જે મુખ્યત્વે પાણીના સ્રોતો નજીક જોવા મળે છે અને તેનો વાસ સીધા જ પશ્ચિમ ઘાટના ઉચ્ચ પ્રદેશોમાં જોવા મળે છે.", "B) તે એક વિષાળ સાપ છે જે મુખ્યત્વે રાત્રિના સમયે શિકાર કરે છે અને તેની વિષની રચના હિમોટોક્સિક અને ન્યુરોટોક્સિક મિશ્રણ ધરાવે છે.", "C) તે એક એન્ડેમિક પ્રજાતિ છે જે ફક્ત પશ્ચિમ ઘાટના નીચા પ્રદેશોમાં જોવા મળે છે અને તેનો મુખ્ય આહાર કીટકો છે.", "D) તે એક અસરકર્તા પ્રજાતિ છે જે પશ્ચિમ ઘાટ અને શ્રીલંકા બંનેમાં જોવા મળે છે અને તેનો વાસ મુખ્યત્વે જંગલના પડમાં જોવા મળે છે."], "correct": 1, "explanation": "મલાબાર પીટ વાયપર એક વિષાળ સાપ છે જે પશ્ચિમ ઘાટના હોટસ્પોટમાં એન્ડેમિક છે. તે મુખ્યત્વે રાત્રિના સમયે શિકાર કરે છે અને તેની વિષની રચના હિમોટોક્સિક અને ન્યુરોટોક્સિક મિશ્રણ ધરાવે છે. વિકલ્પ A ખોટો છે કારણ કે તે પાણીના સ્રોતો નજીક નહીં પરંતુ જંગલના પડમાં જોવા મળે છે. વિકલ્પ C ખોટો છે કારણ કે તે ફક્ત નીચા પ્રદેશોમાં જોવા મળતી નથી અને તેનો આહાર કીટકો નહીં પરંતુ સસ્તન અને પક્ષીઓ છે. વિકલ્પ D ખોટો છે કારણ કે તે ફક્ત પશ્ચિમ ઘાટમાં જોવા મળે છે, શ્રીલંકામાં નહીં.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 34}, {"question": "હિમાલય હોટસ્પોટમાં જોવા મળતી 'હિમાલયન મોનાલ' (Lophophorus impejanus) પ્રજાતિ વિશે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "options": ["A) તે ભારતનું રાષ્ટ્રીય પક્ષી છે.", "B) તે હિમાલયના ઉચ્ચ પર્વતીય પ્રદેશોમાં જોવા મળે છે.", "C) તેનો સંરક્ષણ દરજ્જો IUCN દ્વારા 'લઘુ ચિંતાજનક' છે.", "D) તેનો આહાર મુખ્યત્વે બી, કીટકો અને કોમળ છોડના ભાગો છે."], "correct": 0, "explanation": "વિકલ્પ A ખોટો છે કારણ કે ભારતનું રાષ્ટ્રીય પક્ષી 'મોર' (Pavo cristatus) છે, ન કે 'હિમાલયન મોનાલ'. વિકલ્પ B સત્ય છે કારણ કે તે હિમાલયના ઉચ્ચ પર્વતીય પ્રદેશોમાં જોવા મળે છે. વિકલ્પ C સત્ય છે કારણ કે IUCN દ્વારા તેનો દરજ્જો 'લઘુ ચિંતાજનક' છે. વિકલ્પ D સત્ય છે કારણ કે તેનો આહાર મુખ્યત્વે બી, કીટકો અને કોમળ છોડના ભાગો છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 35}, {"question": "સુંડાલેન્ડ હોટસ્પોટમાં જોવા મળતી 'રાફ્લેસિયા' (Rafflesia arnoldii) વનસ્પતિ પ્રજાતિ વિશે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "options": ["A) તે વિશ્વની સૌથી મોટી ફૂલ છે.", "B) તે પરોપજીવી વનસ્પતિ છે અને તેના પોષક તત્ત્વો મેળવવા માટે અન્ય વનસ્પતિઓ પર આધાર રાખે છે.", "C) તેના ફૂલમાં સુગંધિત ગંધ હોય છે જે પરાગણમાં મદદ કરે છે.", "D) તે ઇન્ડોનેશિયા, મલેશિયા અને થાઇલેન્ડમાં જોવા મળે છે."], "correct": 2, "explanation": "વિકલ્પ C ખોટો છે કારણ કે 'રાફ્લેસિયા'ના ફૂલમાં સડેલા માંસ જેવી દુર્ગંધ હોય છે, જે મકખીઓને આકર્ષે છે અને પરાગણમાં મદદ કરે છે. વિકલ્પ A સત્ય છે કારણ કે તે વિશ્વની સૌથી મોટી ફૂલ છે. વિકલ્પ B સત્ય છે કારણ કે તે પરોપજીવી વનસ્પતિ છે. વિકલ્પ D સત્ય છે કારણ કે તે ઇન્ડોનેશિયા, મલેશિયા અને થાઇલેન્ડમાં જોવા મળે છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 36}, {"question": "ઇન્ડો-બર્મા હોટસ્પોટમાં જોવા મળતી 'કિંગ કોબરા' (Ophiophagus hannah) પ્રજાતિ વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) તે વિશ્વની સૌથી લાંબી વિષાળ સર્પ પ્રજાતિ છે.", "B) તેનો વિષ ન્યુરોટોક્સિક છે અને મનુષ્ય માટે જીવલેણ છે.", "C) તે મુખ્યત્વે અન્ય સર્પો પર આહાર લે છે.", "D) તેનો સંરક્ષણ દરજ્જો IUCN દ્વારા 'સંવેદનશીલ' (Vulnerable) છે."], "correct": 1, "explanation": "વિકલ્પ B ખોટો છે કારણ કે 'કિંગ કોબરા'નો વિષ ન્યુરોટોક્સિક અને કાર્ડિયોટોક્સિક છે, પરંતુ તે મનુષ્ય માટે ઓછો જીવલેણ છે કારણ કે તે શાંત સ્વભાવની પ્રજાતિ છે અને કદાચ કટોકટીમાં જ કાટ ખાય છે. વિકલ્પ A સત્ય છે કારણ કે તે વિશ્વની સૌથી લાંબી વિષાળ સર્પ પ્રજાતિ છે. વિકલ્પ C સત્ય છે કારણ કે તે મુખ્યત્વે અન્ય સર્પો પર આહાર લે છે. વિકલ્પ D સત્ય છે કારણ કે IUCN દ્વારા તેનો દરજ્જો 'સંવેદનશીલ' છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 37}, {"question": "પશ્ચિમ ઘાટ અને શ્રીલંકા હોટસ્પોટ વિશે નીચેનામાંથી કયું વિધાન સત્ય છે, પરંતુ તેની સાથે સંકળાયેલી અપવાદરૂપ સ્થિતિ પણ અસ્તિત્વમાં છે?", "options": ["A) આ હોટસ્પોટમાં ૫૦% કરતાં વધુ વનસ્પતિ પ્રજાતિઓ એન્ડેમિક છે, પરંતુ 'નીલગિરી તહેર' જેવી પ્રજાતિઓના નિવાસસ્થાનમાં ખંડિતતા જોવા મળે છે.", "B) આ હોટસ્પોટમાં મોનસૂનના જંગલો પ્રભાવી છે, પરંતુ 'મલાબાર પીટ વાયપર' જેવી સર્પ પ્રજાતિઓ શુષ્ક પ્રદેશોમાં પણ જોવા મળે છે.", "C) આ હોટસ્પોટમાં સ્થાનિક પ્રાણી પ્રજાતિઓની સંખ્યા ઓછી છે, પરંતુ 'લાયન-ટેલ્ડ મેકાક' જેવી પ્રજાતિઓની વસતિ સ્થિર છે.", "D) આ હોટસ્પોટમાં કોઈપણ એન્ડેમિક સસ્તન પ્રજાતિઓ નથી, પરંતુ પક્ષીઓની વિવિધતા અસાધારણ છે."], "correct": 0, "explanation": "વિકલ્પ A સત્ય છે કારણ કે પશ્ચિમ ઘાટ અને શ્રીલંકા હોટસ્પોટમાં ૫૦% કરતાં વધુ વનસ્પતિ પ્રજાતિઓ એન્ડેમિક છે, પરંતુ 'નીલગિરી તહેર' જેવી પ્રજાતિઓના નિવાસસ્થાનમાં ખંડિતતા (હેબિટેટ ફ્રેગમેન્ટેશન) જોવા મળે છે, જે અપવાદરૂપ સ્થિતિ છે. વિકલ્પ B ખોટો છે કારણ કે 'મલાબાર પીટ વાયપર' મુખ્યત્વે આર્દ્ર જંગલોમાં જ જોવા મળે છે, શુષ્ક પ્રદેશોમાં નહીં. વિકલ્પ C ખોટો છે કારણ કે પશ્ચિમ ઘાટમાં સ્થાનિક પ્રાણી પ્રજાતિઓની સંખ્યા ઓછી નથી, અને 'લાયન-ટેલ્ડ મેકાક'ની વસતિ સ્થિર નથી, તે સંરક્ષણ હેઠળ છે. વિકલ્પ D ખોટો છે કારણ કે પશ્ચિમ ઘાટમાં એન્ડેમિક સસ્તન પ્રજાતિઓ જેવી કે 'નીલગિરી તહેર' અને 'લાયન-ટેલ્ડ મેકાક' જોવા મળે છે.", "ncert_ref": "ધોરણ XII - પ્રકરણ ૧૫: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 38}, {"question": "હિમાલય હોટસ્પોટમાં જોવા મળતી 'બ્રહ્મકમળ' (Saussurea obvallata) વનસ્પતિ પ્રજાતિ વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) તે હિમાલયના ઉચ્ચ પર્વતીય પ્રદેશોમાં જોવા મળે છે અને તેની પુષ્પવિન્યાસ (ઇન્ફ્લોરેસન્સ) ધાર્મિક મહત્વ ધરાવે છે.", "B) તે એક બહુવર્ષાયુ વનસ્પતિ છે અને તેની ઉત્પત્તિ હિમાલયના પૂર્વીય ભાગમાં થઈ છે.", "C) તે એક એન્ડેમિક પ્રજાતિ છે અને તેનો ઉપયોગ પરંપરાગત ઔષધિઓમાં થાય છે.", "D) તે એક પર્ણપાતી (ડેસિડ્યુઅસ) વનસ્પતિ છે અને તેના પર્ણકલિકા (બડ) ખોરાક તરીકે વપરાય છે."], "correct": 3, "explanation": "વિકલ્પ D ખોટો છે કારણ કે 'બ્રહ્મકમળ' એક બહુવર્ષાયુ વનસ્પતિ છે, પરંતુ તે પર્ણપાતી (ડેસિડ્યુઅસ) નથી, અને તેના પર્ણકલિકા (બડ) ખોરાક તરીકે વપરાતા નથી. વિકલ્પ A સત્ય છે કારણ કે તે હિમાલયના ઉચ્ચ પર્વતીય પ્રદેશોમાં જોવા મળે છે અને તેની પુષ્પવિન્યાસ ધાર્મિક મહત્વ ધરાવે છે. વિકલ્પ B સત્ય છે કારણ કે તે એક બહુવર્ષાયુ વનસ્પતિ છે અને તેની ઉત્પત્તિ હિમાલયના પૂર્વીય ભાગમાં થઈ છે. વિકલ્પ C સત્ય છે કારણ કે તે એક એન્ડેમિક પ્રજાતિ છે અને તેનો ઉપયોગ પરંપરાગત ઔષધિઓમાં થાય છે.", "ncert_ref": "ધોરણ XII -                 document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
