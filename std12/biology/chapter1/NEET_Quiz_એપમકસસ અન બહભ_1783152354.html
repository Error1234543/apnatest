<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">

    <title>નીટ ક્વિઝ - એપોમિક્સિસ અને બહુભ્રૂણતા (Apomixis and Polyembryony)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 એપોમિક્સિસ અને બહુભ્રૂણતા (Apomixis and Polyembryony)</span>
                <span>🎯 Hard</span>
                <span>📝 42 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">

            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">

            </div>

        <div class="result-box" id="resultBox">

            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "નીચેના પૈકી કયું વિધાન એપોમિક્સિસ અને બહુભ્રૂણતા બંનેની સરખામણીમાં સાચું છે?", "options": ["A) એપોમિક્સિસમાં બીજની રચના અલૈંગિક રીતે થાય છે, જ્યારે બહુભ્રૂણતામાં એકથી વધુ ભ્રૂણ એક જ બીજમાં વિકસે છે.", "B) એપોમિક્સિસ અને બહુભ્રૂણતા બંનેમાં બીજના વિકાસ માટે પરાગીકરણ જરૂરી છે.", "C) એપોમિક્સિસમાં ભ્રૂણપોષક પેશીની રચના થતી નથી, જ્યારે બહુભ્રૂણતામાં તે હંમેશા અલગ પેશી તરીકે વિકસે છે.", "D) બહુભ્રૂણતા એપોમિક્સિસનો એક પ્રકાર છે જેમાં માતૃકોષોમાંથી ભ્રૂણ વિકસે છે."], "correct": 0, "explanation": "એપોમિક્સિસમાં બીજની રચના અલૈંગિક રીતે (બીજ વગર પરાગીકરણ) થાય છે, જ્યારે બહુભ્રૂણતામાં એક બીજમાં એકથી વધુ ભ્રૂણ વિકસે છે. વિકલ્પ A સાચો છે. વિકલ્પ B ખોટો છે કારણ કે એપોમિક્સિસમાં પરાગીકરણ જરૂરી નથી. વિકલ્પ C ખોટો છે કારણ કે એપોમિક્સિસમાં ભ્રૂણપોષક પેશી રચાય છે, અને બહુભ્રૂણતામાં તે હંમેશા અલગ પેશી તરીકે વિકસતી નથી. વિકલ્પ D ખોટો છે કારણ કે બહુભ્રૂણતા એપોમિક્સિસનો પ્રકાર નથી, પરંતુ તે એપોમિક્સિસ સાથે સંબંધિત હોઈ શકે છે.", "ncert_ref": "Class XII - પ્રકરણ 2: જનન તંત્ર", "difficulty": "Hard", "num": 1}, {"question": "નીચેના પૈકી કયું ઉદાહરણ એપોમિક્સિસનું નથી?", "options": ["A) કેળાંમાં બીજ વગર ફળની રચના", "B) મરુથી (Citrus)માં બહુભ્રૂણતા", "C) ટરેક્સેકમ (Taraxacum)માં બીજની રચના વગર પરાગીકરણ", "D) કોમેલિના (Commelina)માં અલૈંગિક બીજ રચના"], "correct": 1, "explanation": "મરુથી (Citrus)માં બહુભ્રૂણતા એ એપોમિક્સિસનું ઉદાહરણ નથી, પરંતુ તે બહુભ્રૂણતાનું ઉદાહરણ છે. વિકલ્પ A, C, અને D એપોમિક્સિસના ઉદાહરણો છે જેમાં બીજ વગર અલૈંગિક રીતે બીજ અથવા ફળની રચના થાય છે.", "ncert_ref": "Class XII - પ્રકરણ 2: જનન તંત્ર", "difficulty": "Hard", "num": 2}, {"question": "બહુભ્રૂણતામાં, નીચેના પૈકી કયા કારણસર એક બીજમાં એકથી વધુ ભ્રૂણ વિકસી શકે છે?", "options": ["A) એકથી વધુ અંડકોષનું ફલિત થવું", "B) ભ્રૂણપોષક કોષોમાંથી ભ્રૂણનું વિકાસ", "C) અંડાશયની દીવાલમાંથી ભ્રૂણનું વિકાસ", "D) ઉપરોક્ત તમામ"], "correct": 3, "explanation": "બહુભ્રૂણતામાં, એક બીજમાં એકથી વધુ ભ્રૂણ વિકસી શકે છે તેના મુખ્ય કારણો છે: (1) એકથી વધુ અંડકોષનું ફલિત થવું, (2) ભ્રૂણપોષક કોષોમાંથી ભ્રૂણનું nation": "સરળ બહુભ્રૂણતામાં, બધા ભ્રૂણ સમાન રીતે વિકસે છે. ક્લીવેજ પોલીએમ્બ્રયોનીમાં (B) એક ભ્રૂણ સંપૂર્ણપણે વિકસિત થાય છે જ્યારે બીજા અવિકસિત રહે છે. સંકર બહુભ્રૂણતા (C)માં ભ્રૂણો અલગ-અલગ જનેતિક રચના ધરાવે છે, જ્યારે અસમાન બહુભ્રૂણતા (D) એવો શબ્દ નથી જે NCERTમાં વર્ણવેલ છે.", "ncert_ref": "Class XII - Chapter 2: જનન ક્રિયા સિવાયના પ્રજનનના સ્વરૂપો", "difficulty": "Hard", "num": 19}, {"question": "એક વનસ્પતિશાસ્ત્રીને એક એવી વનસ્પતિ મળી જેમાં બીજની રચના ફલન વિના થાય છે, પરંતુ ભ્રૂણનો વિકાસ માત્ર સિનર્જિડ કોષમાંથી થાય છે. આ ઘટનાને નીચેના પૈકી કયા પ્રકારના એપોમિક્સિસ તરીકે વર્ગીકૃત કરી શકાય? વધુમાં, જો આ જ વનસ્પતિમાં એક બીજમાં બે ભ્રૂણ જોવા મળે અને બંને ભ્રૂણ સ્વતંત્ર રીતે અલગ-અલગ સિનર્જિડ કોષોમાંથી વિકસ્યા હોય, તો આ બહુભ્રૂણતાનો કયો પ્રકાર ગણી શકાય?", "options": ["A) ગેમેટોફાઇટિક એપોમિક્સિસ અને સરળ બહુભ્રૂણતા", "B) સ્પોરોફાઇટિક એપોમિક્સિસ અને ક્લીવેજ બહુભ્રૂણતા", "C) ગેમેટોફાઇટિક એપોમિક્સિસ અને ક્લીવેજ બહુભ્રૂણતા", "D) સ્પોરોફાઇટિક એપોમિક્સિસ અને સરળ બહુભ્રૂણતા"], "correct": 0, "explanation": "સાચો જવાબ વિકલ્પ A છે. કારણ કે ભ્રૂણનો વિકાસ સિનર્જિડ કોષમાંથી થાય છે, જે માદા ગેમેટોફાઇટનો ભાગ છે, તેથી આ ગેમેટોફાઇટિક એપોમિક્સિસ છે (NCERT Class XII - Chapter 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન). સિનર્જિડ કોષો એપોમિક્સિસમાં ભ્રૂણ વિકાસ માટે જાણીતા છે. વધુમાં, જો બંને ભ્રૂણ અલગ-અલગ સિનર્જિડ કોષોમાંથી સ્વતંત્ર રીતે વિકસે, તો તેને સરળ બહુભ્રૂણતા કહેવાય, કારણ કે તેમાં એક જ બીજાંડમાંથી બહુવિધ ભ્રૂણ ઉત્પન્ન થાય છે, પરંતુ કોઈ વિભાજન કે ક્લીવેજ થતો નથી.\n\nવિકલ્પ B ખોટો છે કારણ કે સ્પોરોફાઇટિક એપોમિક્સિસમાં ભ્રૂણનો વિકાસ માતૃ વનસ્પતિના દૈહિક કોષોમાંથી થાય છે, સિનર્જિડ કોષોમાંથી નહીં. ક્લીવેજ બહુભ્રૂણતા પણ ખોટી છે કારણ કે તેમાં એક જ ભ્રૂણનું વિભાજન થઈ બહુવિધ ભ્રૂણ બને છે.\n\nવિકલ્પ C ખોટો છે કારણ કે ક્લીવેજ બહુભ્રૂણતા અહીં લાગુ પડતી નથી, કારણ કે બંને ભ્રૂણ સ્વતંત્ર રીતે અલગ-અલગ સિનર્જિડ કોષોમાંથી વિકસ્યા છે.\n\nવિકલ્પ D ખોટો છે કારણ કે સ્પોરોફાઇટિક એપોમિક્સિસ અહીં લાગુ પડતું નથી, કારણ કે ભ્રૂણ સિનર્જિડ કોષમાંથી વિકસે છે, જે ગેમેટોફાઇટિક એપોમિક્સિસનો ભાગ છે.", "ncert_ref": "Class XII - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "difficulty": "Hard", "num": 20}, {"question": "એપોમિક્સિસના સંદર્ભમાં, નીચેના પૈકી કયું વિધાન 'એડવેન્ટિટિયસ એમ્બ્રયોની' (Adventitious Embryony) વિશે સાચું છે?", "options": ["A) તેમાં ભ્રૂણ સ્પોરોફાઇટિક કોષોમાંથી વિકસે છે અને ફલનની જરૂર રહેતી નથી.", "B) તેમાં ભ્રૂણ ગેમેટોફાઇટિક કોષોમાંથી વિકસે છે અને ફલનની જરૂર રહેતી નથી.", "C) તેમાં ભ્રૂણ ફલન પછી વિકસે છે અને સ્પોરોફાઇટિક કોષોમાંથી ઉદ્ભવે છે.", "D) તેમાં ભ્રૂણ માત્ર બીજાંડકોષમાંથી જ વિકસે છે અને ફલનની જરૂર રહેતી નથી."], "correct": 0, "explanation": "એડવેન્ટિટિયસ એમ્બ્રયોનીમાં ભ્રૂણ સ્પોરોફાઇટિક કોષોમાંથી (જેમ કે ન્યૂસેલસના કોષો) વિકસે છે અને ફલનની જરૂર રહેતી નથી. આ એપોમિક્સિસનો એક પ્રકાર છે જ્યાં ભ્રૂણ ગેમેટોફાઇટ વિના સીધો સ્પોરોફાઇટમાંથી ઉદ્ભવે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) ગેમેટોફાઇટિક કોષોમાંથી ભ્રૂણ વિકસે તે એપોસ્પોરી અથવા એપોગેમી હોવું જોઈએ, C) ફલન પછી ભ્રૂણ વિકસે તે સામાન્ય લૈંગિક પ્રજનન છે, D) માત્ર બીજાંડકોષમાંથી ભ્રૂણ વિકસે તે એપોસ્પોરી નથી.", "ncert_ref": "Class XII - Chapter 2: લૈંગિક પ્રજનન વનસ્પતિઓમાં", "difficulty": "Hard", "num": 21}, {"question": "બહુભ્રૂણતાના સંદર્ભમાં, નીચેના પૈકી કયું કથન 'સંકર બહુભ્રૂણતા' (Hybrid Polyembryony) વિશે સાચું નથી?", "options": ["A) તેમાં એક બીજમાં એકથી વધુ ભ્રૂણ હોય છે જેમાંથી એક લૈંગિક અને બીજા અલૈંગિક રીતે વિકસે છે.", "B) તેમાં બધા ભ્રૂણ લૈંગિક રીતે વિકસે છે અને જન્યુકીય રીતે સરખા હોય છે.", "C) તે સિટ્રસ જાતિઓમાં જોવા મળે છે અને વાણિજ્યિક દ્રષ્ટિએ મહત્વપૂર્ણ છે.", "D) તેમાં ભ્રૂણોના વિકાસ માટે ફલન અને અલૈંગિક પ્રક્રિયા બંને જરૂરી હોય છે."], "correct": 1, "explanation": "સંકર બહુભ્રૂણતામાં, એક ભ્રૂણ લૈંગિક રીતે (ફલન દ્વારા) અને બીજા ભ્રૂણ અલૈંગિક રીતે (એપોમિક્સિસ દ્વારા) વિકસે છે, જેથી તેઓ જન્યુકીય રીતે સરખા હોતા નથી. વિકલ્પ B ખોટો છે કારણ કે બધા ભ્રૂણ લૈંગિક રીતે વિકસતા નથી અને જન્યુકીય રીતે સરખા પણ હોતા નથી. વિકલ્પ A, C, અને D સાચા છે કારણ કે સંકર બહુભ્રૂણતામાં લૈંગિક અને અલૈંગિક ભ્રૂણો હોય છે, સિટ્રસમાં જોવા મળે છે, અને ફલન અને અલૈંગિક પ્રક્રિયા બંને જરૂરી હોય છે.", "ncert_ref": "Class XII - Chapter 2: લૈંગિક પ્રજનન વનસ્પતિઓમાં", "difficulty": "Hard", "num": 22}, {"question": "એપોમિક્સિસ અને બહુભ્રૂણતા વચ્ચેનો તફાવત દર્શાવતું કયું વિધાન સાચું છે?", "options": ["A) એપોમિક્સિસમાં ભ્રૂણ ફલન વિના વિકસે છે, જ્યારે બહુભ્રૂણતામાં ભ્રૂણ ફલન પછી વિકસે છે.", "B) એપોમિક્સિસમાં એક બીજમાં એક ભ્રૂણ વિકસે છે, જ્યારે બહુભ્રૂણતામાં એક બીજમાં એકથી વધુ ભ્રૂણ વિકસે છે.", "C) એપોમિક્સિસમાં ભ્રૂણ માત્ર ગેમેટોફાઇટમાંથી વિકસે છે, જ્યારે બહુભ્રૂણતામાં ભ્રૂણ સ્પોરોફાઇટમાંથી વિકસે છે.", "D) એપોમિક્સિસ અને બહુભ્રૂણતા બંનેમાં ભ્રૂણ ફલન વિના વિકસે છે, પરંતુ એપોમિક્સિસમાં એક ભ્રૂણ અને બહુભ્રૂણતામાં એકથી વધુ ભ્રૂણ વિકસે છે."], "correct": 3, "explanation": "એપોમિક્સિસ અને બહુભ્રૂણતા બંનેમાં ભ્રૂણ ફલન વિના વિકસી શકે છે, પરંતુ એપોમિક્સિસમાં સામાન્ય રીતે એક ભ્રૂણ વિકસે છે જ્યારે બહુભ્રૂણતામાં એક બીજમાં એકથી વધુ ભ્રૂણ વિકસે છે. વિકલ્પ A ખોટો છે કારણ કે બહુભ્રૂણતામાં ભ્રૂણ ફલન વિના પણ વિકસી શકે છે. વિકલ્પ B ખોટો છે કારણ કે એપોમિક્સિસમાં પણ એકથી વધુ ભ્રૂણ વિકસી શકે છે (જો બહુભ્રૂણતા સાથે જોડાયેલ હોય). વિકલ્પ C ખોટો છે કારણ કે એપોમિક્સિસમાં ભ્રૂણ સ્પોરોફાઇટ અથવા ગેમેટોફાઇટમાંથી વિકસી શકે છે.", "ncert_ref": "Class XII - Chapter 2: લૈંગિક પ્રજનન વનસ્પતિઓમાં", "difficulty": "Hard", "num": 23}, {"question": "એપોમિક્સિસ ધરાવતી વનસ્પતિમાં, જો ભ્રૂણસૂત્ર (embryo sac) ની રચના સ્પોરોજેનિયસ કોષ (sporous cell) માંથી થાય અને ભ્રૂણ નો વિકાસ ગેમેટોફાઇટિક કોષમાંથી થાય, તો આ પ્રકારનું એપોમિક્સિસ કયા નામે ઓળખાય છે?", "options": ["A) એપોસ્પોરી", "B) ડિપ્લોસ્પોરી", "C) એડવેન્ટિટિયસ એમ્બ્રયોની", "D) પાર્થેનોજેનેસિસ"], "correct": 1, "explanation": "ડિપ્લોસ્પોરી એ એપોમિક્સિસનો એક પ્રકાર છે જેમાં ભ્રૂણસૂત્ર (embryo sac) ની રચના સ્પોરોજેનિયસ કોષ (sporous cell) માંથી થાય છે, પરંતુ ભ્રૂણનો વિકાસ ગેમેટોફાઇટિક કોષમાંથી થાય છે. એપોસ્પોરી (A) માં ભ્રૂણસૂત્ર નું નિર્માણ સોમેટિક કોષમાંથી થાય છે. એડવેન્ટિટિયસ એમ્બ્રયોની (C) માં ભ્રૂણ સીધો જ સોમેટિક કોષમાંથી વિકસે છે, જ્યારે પાર્થેનોજેનેસિસ (D) માં ભ્રૂણનો વિકાસ અફલિત અંડકોષમાંથી થાય છે.", "ncert_ref": "Class XII - પ્રકરણ 2: પ્રજનનમાં લૈંગિક અને અલૈંગિક પદ્ધતિઓ", "difficulty": "Hard", "num": 24}, {"question": "બહુભ્રૂણતામાં, જો એક બીજમાં ત્રણ ભ્રૂણ હોય, જેમાં બે ભ્રૂણ સંપૂર્ણપણે વિકસિત હોય અને ત્રીજો અપૂર્ણ વિકસિત હોય, તો આ કયા પ્રકારની બહુભ્રૂણતા હેઠળ આવે છે?", "options": ["A) સરળ બહુભ્રૂણતા (Simple Polyembryony)", "B) ક્લીવેજ પોલીએમ્બ્રયોની (Cleavage Polyembryony)", "C) સંકર બહુભ્રૂણતા (Hybrid Polyembryony)", "D) એડવેન્ટિટિયસ બહુભ્રૂણતા (Adventitious Polyembryony)"], "correct": 1, "explanation": "ક્લીવેજ પોલીએમ્બ્રયોનીમાં, એક જ અંડકોષમાંથી વહેંચણી (cleavage) દ્વારા બહુવિધ ભ્રૂણ વિકસે છે, જેમાં કેટલાક ભ્રૂણ સંપૂર્ણ વિકસિત થાય છે અને કેટલાક અપૂર્ણ રહી શકે છે. સરળ બહુભ્રૂણતા (A) માં એકથી વધુ અંડકોષ ફલિત થવાને કારણે ભ્રૂણ વિકસે છે. સંકર બહુભ્રૂણતા (C) માં બે જુદા જુદા પિતૃઓના જનીન મિશ્રણને કારણે ભ્રૂણ વિકસે છે. એડવેન્ટિટિયસ બહુભ્રૂણતા (D) માં ભ્રૂણ સોમેટિક કોષમાંથી વિકસે છે.", "ncert_ref": "Class XII - પ્રકરણ 2: પ્રજનનમાં લૈંગિક અને અલૈંગિક પદ્ધતિઓ", "difficulty": "Hard", "num": 25}, {"question": "એપોમિક્સિસ અને બહુભ્રૂણતા વચ્ચેનો મુખ્ય તફાવત એ છે કે એપોમિક્સિસમાં ભ્રૂણ વિકાસ ક્યાંથી થાય છે, જ્યારે બહુભ્રૂણતામાં ભ્રૂણ વિકાસ ક્યાંથી થાય છે?", "options": ["A) એપોમિક્સિસમાં ભ્રૂણ માદા ગેમેટોફાઇટમાંથી થાય છે, જ્યારે બહુભ્રૂણતામાં ભ્રૂણ અંડાશયમાંથી થાય છે", "B) એપોમિક્સિસમાં ભ્રૂણ અપરિપક્વ અંડકોષમાંથી થાય છે, જ્યારે બહુભ્રૂણતામાં ભ્રૂણ ફલિત અંડકોષમાંથી થાય છે", "C) એપોમિક્સિસમાં ભ્રૂણ ફલન વિના થાય છે, જ્યારે બહુભ્રૂણતામાં ભ્રૂણ ફલન પછી થાય છે", "D) એપોમિક્સિસમાં ભ્રૂણ સોમાટિક કોષમાંથી થાય છે, જ્યારે બહુભ્રૂણતામાં ભ્રૂણ જનન કોષમાંથી થાય છે"], "correct": 2, "explanation": "એપોમિક્સિસમાં ભ્રૂણ વિકાસ ફલન વિના થાય છે, જ્યારે બહુભ્રૂણતામાં ભ્રૂણ વિકાસ ફલન પછી થાય છે. વિકલ્પ A, B, અને D અસત્ય છે કારણ કે એપોમિક્સિસમાં ભ્રૂણ માદા ગેમેટોફાઇટ, અપરિપક્વ અંડકોષ, અથવા સોમાટિક કોષમાંથી થઈ શકે છે, પરંતુ ફલન વિના જ થાય છે. બહુભ્રૂણતામાં, ભ્રૂણ ફલિત અંડકોષમાંથી અથવા અન્ય કોષોમાંથી થાય છે, પરંતુ ફલન પછી જ થાય છે.", "ncert_ref": "Class XII - Chapter 2: જનન ક્ષમતા અને વનસ્પતિમાં પ્રજનન", "difficulty": "Hard", "num": 26}, {"question": "નીચેના પૈકી કયું વિધાન 'એપોસ્પોરી' વિશે સાચું નથી?", "options": ["A) એપોસ્પોરીમાં ભ્રૂણસૂત્ર નુકસાન પામેલા ન્યૂસેલસ કોષમાંથી વિકસે છે", "B) એપોસ્પોરી એ એપોમિક્સિસનો એક પ્રકાર છે", "C) એપોસ્પોરીમાં ભ્રૂણ વિકાસ માદા ગેમેટોફાઇટમાંથી થાય છે", "D) એપોસ્પોરીમાં ભ્રૂણસૂત્રની રચના સ્પોરોજેનિયસ કોષમાંથી થાય છે"], "correct": 3, "explanation": "એપોસ્પોરીમાં ભ્રૂણસૂત્ર નુકસાન પામેલા ન્યૂસેલસ કોષમાંથી વિકસે છે, એપોમિક્સિસનો એક પ્રકાર છે, અને ભ્રૂણ વિકાસ માદા ગેમેટોફાઇટમાંથી થાય છે. પરંતુ ભ્રૂણસૂત્રની રચના સ્પોરોજેનિયસ કોષમાંથી થતી નથી, તે ડિપ્લોસ્પોરીનો લક્ષણ છે. તેથી, વિકલ્પ D અસત્ય છે.", "ncert_ref": "Class XII - Chapter 2: જનન ક્ષમતા અને વનસ્પતિમાં પ્રજનન", "difficulty": "Hard", "num": 27}, {"question": "બહુભ્રૂણતાના સંદર્ભમાં, જો એક બીજમાં ત્રણ ભ્રૂણ હોય, જેમાં બે ભ્રૂણ સંપૂર્ણપણે વિકસિત હોય અને એક અપૂર્ણ વિકસિત હોય, તો આ કયા પ્રકારની બહુભ્રૂણતા હેઠળ આવે છે?", "options": ["A) સરળ બહુભ્રૂણતા (Simple Polyembryony)", "B) ક્લીવેજ પોલીએમ્બ્રયોની (Cleavage Polyembryony)", "C) સંકર બહુભ્રૂણતા (Hybrid Polyembryony)", "D) એડવેન્ટિટિયસ બહુભ્રૂણતા (Adventitious Polyembryony)"], "correct": 1, "explanation": "ક્લીવેજ પોલીએમ્બ્રયોનીમાં, એક અંડકોષ ફલિત થયા પછી, ભ્રૂણ કોષોના વિભાજન દ્વારા એકથી વધુ ભ્રૂણ વિકસે છે, જેમાં કેટલાક ભ્રૂણ સંપૂર્ણપણે વિકસિત થાય છે અને કેટલાક અપૂર્ણ રહે છે. સરળ બહુભ્રૂણતામાં એકથી વધુ અંડકોષ ફલિત થાય છે, સંકર બહુભ્રૂણતામાં વિવિધ જનીનિક સંયોજનો ધરાવતા ભ્રૂણ વિકસે છે, જ્યારે એડવેન્ટિટિયસ બહુભ્રૂણતામાં ભ્રૂણ સોમેટિક કોષમાંથી વિકસે છે.", "ncert_ref": "Class XII - Chapter 2: જનન (Reproduction in Flowering Plants)", "difficulty": "Hard", "num": 28}, {"question": "એક વનસ્પતિમાં, એપોમિક્સિસ દરમિયાન ભ્રૂણસૂત્ર (embryo sac) ની રચના ન થતી હોય અને સીધો જ ભ્રૂણ વિકસે છે. આ પ્રકારનું એપોમિક્સિસ કયા નામે ઓળખાય છે?", "options": ["A) એપોસ્પોરી (Apospory)", "B) એડવેન્ટિટિયસ એમ્બ્રયોની (Adventitious Embryony)", "C) ડિપ્લોસ્પોરી (Diplospory)", "D) પાર્થેનોજેનેસિસ (Parthenogenesis)"], "correct": 1, "explanation": "એડવેન્ટિટિયસ એમ્બ્રયોની (Adventitious Embryony) માં ભ્રૂણસૂત્રની રચના થતી નથી અને સીધો જ ભ્રૂણ વિકસે છે, જ્યારે એપોસ્પો             document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
