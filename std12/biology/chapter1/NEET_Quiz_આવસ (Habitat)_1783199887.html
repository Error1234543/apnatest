<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - આવાસ (Habitat)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 આવાસ (Habitat)</span>
                <span>🎯 Hard</span>
                <span>📝 38 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "જ્યારે એક જાતિના સભ્યો વિવિધ આવાસોમાં રહે છે ત્યારે તેમની શારીરિક રચના અથવા વર્તણૂકમાં થતાં ફેરફારોને શું કહેવાય છે?", "options": ["A) અનુકૂલન (Adaptation)", "B) ઉત્ક્રાંતિ (Evolution)", "C) વિકિરણ (Radiation)", "D) પ્રજનન અલગત્વ (Reproductive Isolation)"], "correct": 0, "explanation": "અનુકૂલન (Adaptation) એ જાતિના સભ્યો દ્વારા તેમના આવાસ અનુસાર શારીરિક અથવા વર્તણૂકગત ફેરફારો કરવા માટેની પ્રક્રિયા છે. ઉત્ક્રાંતિ (Evolution) એ લાંબા ગાળાના ફેરફારો છે જે પેઢી દર પેઢી થાય છે, વિકિરણ (Radiation) એ નવી જાતિઓનું સર્જન છે, અને પ્રજનન અલગત્વ (Reproductive Isolation) એ પ્રજનનમાં અવરોધ છે.", "ncert_ref": "Class XII - Chapter 13: જૈવ વૈવિધ્ય અને સંરક્ષણ", "difficulty": "Hard", "num": 1}, {"question": "નીચેનામાંથી કયું વનસ્પતિ આવાસ નથી?", "options": ["A) મરુસ્થળ", "B) સવાના", "C) પર્વતીય પ્રદેશ", "D) લોહી"], "correct": 3, "explanation": "લોહી એ પ્રાણી આવાસ છે, જ્યારે મરુસ્થળ, સવાના અને પર્વતીય પ્રદેશ એ વનસ્પતિ આવાસ છે. આવાસ એ સજીવોના રહેઠાણ અને વૃદ્ધિ માટેનું સ્થળ છે, અને લોહી એ પ્રાણીઓના શરીરમાં રહેલું દ્રવ્ય છે.", "ncert_ref": "Class XI - Chapter 1: સજીવ જગતની વિવિધતા", "difficulty": "Hard", "num": 2}, {"question": "એક જાતિના સભ્યો વિવિધ આવાસોમાં રહેતા હોય ત્યારે તેમની વર્તણૂકમાં થતાં ફેરફારોને શું કહેવાય છે?", "options": ["A) શારીરિક અનુકૂલન", "B) વર્તણૂકગત અનુકૂલન", "C) અનુવંશિક ફેરફાર", "D) પ્રજનન ફેરફાર"], "correct": 1, "explanation": "વર્તણૂકગત અનુકૂલન એ જાતિના સભ્યો દ્વારા તેમના આવાસ અનુસાર વર્તણૂકમાં થતાં ફેરફારો છે. શારીરિક અનુકૂલન શરીરની રચનામાં ફેરફાર છે, અનુવંશિક ફેરફાર એ DNAમાં થતાં ફેરફારો છે, અને પ્રજનન ફેરફાર એ પ્રજનન પ્રક્રિયામાં થતાં ફેરફારો છે.", "ncert_ref": "Class XII - Chapter 13: જૈવ વૈવિધ્ય અને સંરક્ષણ", "difficulty": "Hard", "num": 3}, {"question": "નીચેનામાંથી કયું આવાસ સૌથી વધુ જૈવ વૈવિધ્ય ધરાવે છે?", "options": ["A) મરુસ્થળ", "B) ઉષ્ણકટિબંધીય વરસાદી જંગલ", "C) ટુંડ્રા", "D) ગ્રાસલેન્ડ"], "correct": 1, "explanation": "ઉષ્ણકટિબંધીય વરસાદી જંગલ એ સૌથી વધુ જૈવ વૈવિધ્ય ધરાવતું આવાસ છે, કારણ કે ત્યાં ઉચ્ચ તાપમાન અને ભેજના કારણે વિવિધ પ્રકારના સજીવો વિકસી શકે છે. મરુસ્થળ, ટુંડ્રા અને ગ્રાસલેન્ડ એ કમ જૈવ વૈવિધ્ય ધરાવતા આવાસ છે.", "ncert_ref": "Class XII - Chapter 14: પર્યાવરણના મુદ્દાઓ", "difficulty": "Hard", "num": 4}, {"question": "જ્યારે એક જલચર પ્રાણી (એમ્ફીબિયન) જેમ કે ટોડ, સૂકા વાતાવરણમાં લાંબા સમય સુધી રહે છે, ત્યારે તેના શરીરમાં થતી અનુકૂલન પ્રક્રિયામાં નીચેનામાંથી કયું પરિવર્તન સૌથી યોગ્ય રીતે જોવા મળે છે?", "options": ["A) ચામડીની સપાટી પર કેરાટિનનું સ્તર વિકસિત થવું, જેથી પાણીનું બાષ્પીભવન ઘટે", "B) ફેફસાંની ક્ષમતા વધવી, જેથી ઓક્સિજનના શોષણમાં વધારો થાય", "C) શરીરમાં યુરિયા સંગ્રહ કરવાની ક્ષમતા વધવી, જેથી પાણીનું સંરક્ષણ થાય", "D) ચામડી દ્વારા પાણીનું શોષણ વધારવા માટે કેપિલરી નળીઓની સંખ્યા વધવી"], "correct": 0, "explanation": "ટોડ જેવા એમ્ફીબિયનમાં, સૂકા વાતાવરણમાં રહેવા માટે ચામડી પર કેરાટિનનું સ્તર વિકસિત થવું એ સૌથી યોગ્ય અનુકૂલન છે. કેરાટિન ચામડીને પાણી-અવરોધક બનાવે છે, જેથી પાણીનું બાષ્પીભવન ઘટે અને શરીરમાં પાણીનું સંરક્ષણ થાય. બાકીના વિકલ્પો અયોગ્ય છે: B) ફેફસાંની ક્ષમતા વધવી એ પાણીના નુકસાનને રોકવામાં મદદરૂપ નથી. C) યુરિયા સંગ્રહ કરવો એ મૂત્રપિંડના કાર્ય સાથે સંબંધિત છે, પરંતુ એમ્ફીબિયનમાં પાણીનું સંરક્ષણ મુખ્યત્વે ચામડી દ્વારા થાય છે. D) કેપિલરી નળીઓની સંખ્યા વધવી એ પાણીના શોષણને વધારે છે, પરંતુ સૂકા વાતાવરણમાં પાણીનું નુકસાન રોકવા માટે આ ઉપાય કારગર નથી.", "ncert_ref": "Class XII - પ્રકરણ 13: જૈવ-વૈવિધ્ય અને સંરક્ષણ (Biodiversity and Conservation)", "difficulty": "Hard", "num": 5}, {"question": "જ્યારે એક જલચર પ્રાણી જેમ કે ઝીણી માછલી (Gambusia) ખારા પાણીના તળાવમાં રહે છે, ત્યારે તેના મૂત્રપિંડમાં કયો ફેરફાર જોવા મળે છે?", "options": ["A) મૂત્રપિંડના ગ્લોમેર્યુલીની સંખ્યા ઘટે છે", "B) મૂત્રપિંડના હેનલીના લૂપની લંબાઈ વધે છે", "C) મૂત્રપિંડમાં નેફ્રોનની સંખ્યા ઘટે છે", "D) મૂત્રપિંડના કલેક્ટિંગ ડક્ટમાં પાણીનું પુનઃશોષણ ઘટે છે"], "correct": 1, "explanation": "ખારા પાણીના વાતાવરણમાં રહેતી માછલીઓમાં મૂત્રપિંડના હેનલીના લૂપની લંબાઈ વધે છે, જેથી વધુ પાણીનું પુનઃશોષણ થઈ શકે અને શરીરમાં પાણીનું સંતુલન જાળવી શકાય. ગ્લોમેર્યુલીની સંખ્યા ઘટવી અથવા નેફ્રોનની સંખ્યા ઘ ાણ નથી.", "ncert_ref": "Class XI - Chapter 13: વનસ્પતિ શારીર અને અનુકૂલન", "difficulty": "Hard", "num": 24}, {"question": "જલીય આવાસમાં રહેતા પ્રાણીઓમાં શ્વસન માટે નીચેનામાંથી કયો અનુકૂલન અયોગ્ય છે?", "options": ["A) કલમો (Gills)નો વિકાસ, જેથી ઓગળેલ ઓક્સિજનને પાણીમાંથી શોષી શકાય", "B) ત્વચા શ્વસન, જેથી પાણી દ્વારા ઓક્સિજનનો સીધો અદાન-પ્રદાન થઈ શકે", "C) ફુફ્ફુસનો વિકાસ, જેથી હવામાંથી ઓક્સિજન લઈ શકાય", "D) રક્તમાં હિમોગ્લોબિનની માત્રા વધારીને ઓક્સિજન વહન ક્ષમતા વધારવામાં આવે છે"], "correct": 2, "explanation": "જલીય આવાસમાં રહેતા પ્રાણીઓમાં કલમો (A) અને ત્વચા શ્વસન (B) સામાન્ય અનુકૂલન છે. રક્તમાં હિમોગ્લોબિનની માત્રા વધારવી (D) પણ ઓક્સિજન વહન ક્ષમતા વધારવા માટે ઉપયોગી છે. પરંતુ ફુફ્ફુસનો વિકાસ (C) જલીય પ્રાણીઓમાં અયોગ્ય છે, કારણ કે ફુફ્ફુસ હવામાંથી ઓક્સિજન શોષવા માટે અનુકૂળ છે, જલીય વાતાવરણમાં નહીં. તેથી C અયોગ્ય અનુકૂલન છે.", "ncert_ref": "Class XI - Chapter 17: પ્રાણી શારીર અને અનુકૂલન", "difficulty": "Hard", "num": 25}, {"question": "મરુભૂમિ આવાસમાં રહેતી 'કેક્ટસ' વનસ્પતિમાં પાણીના અભાવ દરમિયાન કયો ફિઝિયોલોજિકલ અનુકૂલન જોવા મળે છે, જે પ્રકાશસંશ્લેષણની પ્રક્રિયાને અસર કરે છે?", "options": ["A) કેમરલ હેબિટ (CAM) પધ્ધતિ દ્વારા રાત્રે CO₂નું અવશોષણ અને દિવસે તેનો ઉપયોગ", "B) C₄ પધ્ધતિ દ્વારા દિવસ દરમિયાન CO₂નું અવશોષણ અને તરત જ ઉપયોગ", "C) C₃ પધ્ધતિ દ્વારા દિવસ દરમિયાન CO₂નું અવશોષણ અને તરત જ ઉપયોગ", "D) પ્રકાશસંશ્લેષણની પ્રક્રિયા પૂર્ણપણે બંધ કરવી"], "correct": 0, "explanation": "કેક્ટસ મરુભૂમિ આવાસમાં રહે છે, જ્યાં પાણીનો અભાવ હોય છે. અહીં, કેક્ટસ કેમરલ હેબિટ (CAM) પધ્ધતિનો ઉપયોગ કરે છે, જેમાં રાત્રે CO₂નું અવશોષણ થાય છે અને દિવસ દરમિયાન તેનો ઉપયોગ પ્રકાશસંશ્લેષણ માટે થાય છે. આ પધ્ધતિ પાણીના નુકસાનને ઘટાડે છે. C₄ અને C₃ પધ્ધતિઓ મરુભૂમિ આવાસ માટે અનુકૂળ નથી, કારણ કે તેઓ પાણીના વધુ વપરાશ સાથે સંકળાયેલી છે. પ્રકાશસંશ્લેષણની પ્રક્રિયા પૂર્ણપણે બંધ કરવી એ વનસ્પતિના અસ્તિત્વ માટે હાનિકારક હશે.", "ncert_ref": "Class XII - Chapter 13: જૈવ-અનુકૂલનો અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 26}, {"question": "જલીય આવાસમાં રહેતા 'મેંગ્રોવ' વનસ્પતિઓમાં કયો અનુકૂલન જોવા મળે છે, જે તેમને ખારા પાણીમાં ટકી રહેવામાં મદદ કરે છે?", "options": ["A) મૂળમાં ઉલ્ટા શ્વસન (Reverse Osmosis) માટેની વિશેષ કોષીય રચના", "B) પર્ણમાં મીઠાના સ્રાવ માટેની વિશેષ ગ્રંથિઓ (Salt Glands)", "C) પર્ણની સપાટી પર મોમ જેવા પદાર્થનો સ્તર (Cuticle)", "D) મૂળમાં હવા ભરેલા કોથળા (Pneumatophores) માટેની રચના"], "correct": 1, "explanation": "મેંગ્રોવ વનસ્પતિઓ ખારા પાણીમાં ટકી રહેવા માટે પર્ણમાં મીઠાના સ્રાવ માટેની વિશેષ ગ્રંથિઓ ધરાવે છે, જે મીઠાને બહાર કાઢવામાં મદદ કરે છે. ઉલ્ટા શ્વસન માટેની કોષીય રચના મેંગ્રોવમાં જોવા મળતી નથી. મોમ જેવા પદાર્થનો સ્તર પાણીના વપરાશને ઘટાડવા માટે હોય છે, પરંતુ મીઠાના નિયંત્રણમાં નહીં. હવા ભરેલા કોથળા (Pneumatophores) શ્વસન માટે હોય છે, ખારા પાણીના નિયંત્રણ માટે નહીં.", "ncert_ref": "Class XII - Chapter 13: જૈવ-અનુકૂલનો અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 27}, {"question": "જલીય આવાસમાં રહેતા 'મેંગ્રોવ' વનસ્પતિઓમાં નીચેનામાંથી કયો અનુકૂલન જોવા મળે છે, જે તેમને ખારા પાણીના વાતાવરણમાં ટકી રહેવામાં મદદ કરે છે?", "options": ["A) પર્ણો પર મીણ તત્વની જાડી પરત હોય છે જેથી પાણીનું બાષ્પોત્સર્જન ઘટે", "B) મૂળોમાં વાયુ કોષો (એરીનકાઇમાટસ) હોય છે જેથી શ્વસન માટે ઓક્સિજન મેળવી શકાય", "C) મૂળોમાં અતિરિક્ત મીઠું શોષીને તેને પર્ણોમાં સંગ્રહ કરે છે", "D) પર્ણોનો આકાર સૂંચવાળો હોય છે જેથી પાણી પર તરી શકે"], "correct": 2, "explanation": "મેંગ્રોવ વનસ્પતિઓમાં મૂળો ખારા પાણીમાંથી મીઠું શોષીને તેને પર્ણોમાં સંગ્રહ કરે છે, જે તેમને ખારા વાતાવરણમાં ટકી રહેવામાં મદદ કરે છે (C સત્ય). A વિકલ્પ મરુભૂમિ વનસ્પતિઓ માટે યોગ્ય છે. B વિકલ્પ જલીય વનસ્પતિઓમાં શ્વસન માટે યોગ્ય છે, પરંતુ મીઠા પાણી માટે. D વિકલ્પ જલીય વનસ્પતિઓ માટે યોગ્ય છે પરંતુ મેંગ્રોવ માટે નહીં.", "ncert_ref": "Class XI - Chapter 13: વનસ્પતિ સ્વરૂપશાસ્ત્ર (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 28}, {"question": "ઉચ્ચ પર્વતીય આવાસમાં રહેતા પ્રાણીઓમાં નીચેનામાંથી કયો અનુકૂલન જોવા મળે છે, જે તેમને ઓછા ઓક્સિજન વાળા વાતાવરણમાં શ્વસન કરવામાં મદદ કરે છે?", "options": ["A) રક્તમાં હિમોગ્લોબિનની માત્રા ઘટે છે જેથી ઓક્સિજનની ઓછી જરૂરિયાત રહે", "B) ફેફસાંની સપાટીનું ક્ષેત્રફળ ઘટે છે જેથ             document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
