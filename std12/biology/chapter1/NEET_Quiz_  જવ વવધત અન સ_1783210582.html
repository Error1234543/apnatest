<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - 📖 જૈવ વિવિધતા અને સંરક્ષણ
જૈવ વિવિધતા</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 📖 જૈવ વિવિધતા અને સંરક્ષણ
જૈવ વિવિધતા</span>
                <span>🎯 Hard</span>
                <span>📝 30 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "ગુજરાતના કચ્છના રણમાં જોવા મળતા 'કાળા રણના વૃક્ષ' તરીકે ઓળખાતા 'પ્રોસોપિસ જ્યુલિફ્લોરા' (Prosopis juliflora) ની જૈવિક વિવિધતામાં કયો પાસો તેને સ્થાનિક પ્રજાતિઓ માટે હાનિકારક બનાવે છે?", "options": ["A) તે સ્થાનિક વનસ્પતિઓ સાથે સહજીવન ધરાવે છે અને મૃદા નાઇટ્રોજન સ્તર વધારે છે", "B) તે અતિ આક્રમક પ્રજાતિ છે જે સ્થાનિક વનસ્પતિઓને પોષક તત્ત્વો અને પાણી માટે સ્પર્ધા કરે છે", "C) તેના પર્ણોમાં ઉચ્ચ પ્રમાણમાં કાર્બોદિત હાજર હોય છે જે સ્થાનિક શાકાહારી પ્રાણીઓ માટે આહાર સ્રોત બનાવે છે", "D) તેના મૂળ સ્થાનિક કીટકો માટે આશ્રયસ્થાન પૂરું પાડે છે"], "correct": 1, "explanation": "પ્રોસોપિસ જ્યુલિફ્લોરા અતિ આક્રમક પ્રજાતિ છે જે સ્થાનિક વનસ્પતિઓ સાથે પોષક તત્ત્વો અને પાણી માટે સ્પર્ધા કરે છે, જેથી સ્થાનિક જૈવ વિવિધતાને નુકસાન પહોંચાડે છે. A) ગળતર છે કારણ કે તે સ્થાનિક પ્રજાતિઓ સાથે સહજીવન નથી ધરાવતી, પરંતુ સ્પર્ધા કરે છે. C) અને D) ખોટા છે કારણ કે તેના પર્ણો સ્થાનિક પ્રાણીઓ માટે આહાર સ્રોત નથી અને તેના મૂળ કીટકો માટે આશ્રયસ્થાન પૂરું પાડતા નથી.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 1}, {"question": "જૈવ વિવિધતાના સંરક્ષણમાં 'ઇન-સિટ્યુ સંરક્ષણ' અને 'એક્સ-સિટ્યુ સંરક્ષણ' વચ્ચેનો મુખ્ય તફાવત કયો છે?", "options": ["A) ઇન-સિટ્યુ સંરક્ષણમાં પ્રજાતિઓને તેમના નૈસર્ગિક આવાસમાં જ સંરક્ષિત કરવામાં આવે છે, જ્યારે એક્સ-સિટ્યુ સંરક્ષણમાં પ્રજાતિઓને નૈસર્ગિક આવાસથી દૂર સંરક્ષિત કરવામાં આવે છે", "B) ઇન-સિટ્યુ સંરક્ષણમાં પ્રજાતિઓને લેબોરેટરીમાં સંરક્ષિત કરવામાં આવે છે, જ્યારે એક્સ-સિટ્યુ સંરક્ષણમાં પ્રજાતિઓને તેમના નૈસર્ગિક આવાસમાં સંરક્ષિત કરવામાં આવે છે", "C) ઇન-સિટ્યુ સંરક્ષણમાં પ્રજાતિઓને તેમના નૈસર્ગિક આવાસથી દૂર સંરક્ષિત કરવામાં આવે છે, જ્યારે એક્સ-સિટ્યુ સંરક્ષણમાં પ્રજાતિઓને નૈસર્ગિક આવાસમાં જ સંરક્ષિત કરવામાં આવે છે", "D) ઇન-સિટ્યુ અને એક્સ-સિટ્યુ સંરક્ષણ વચ્ચે કોઈ તફાવત નથી"], "correct": 0, "explanation": "ઇન-સિટ્યુ સંરક્ષણમાં પ્રજાતિઓને તેમના નૈસર્ગિક આવાસમાં જ સંરક્ષિત કરવામાં આવે છે (ઉદા. રાષ્ટ્રીય ઉદ્યાનો), જ્યારે એક્સ-સિટ્યુ સંરક્ષણમાં પ્રજાતિઓને નૈસર્ગિક આવાસથી દૂર (ઉદા. વનસ્પતિ ઉદ્યાન, ચિડિયાઘર) સંરક્ષિત કરવામાં આવે છે. B) અને C) વિકલ્પો વિરુદ્ધ છે, જ્યારે D) ખોટો છે કારણ કે બંને વચ્ચે સ્પષ્ટ તફાવત છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 2}, {"question": "ગુજરાતમાં જોવા મળતા 'વેલી ઓફ ફ્લાવર્સ' ના સમાન 'કેદારનાથ વન્યજીવ અભયારણ્ય'માં જૈવ વિવિધતાનું સંરક્ષણ કરવા માટે કયો પગલો સૌથી અસરકારક છે?", "options": ["A) સ્થાનિક લોકોને વન્યજીવ અભયારણ્યમાં પ્રવેશવાની મનાઈ કરવી", "B) સ્થાનિક લોકોને જૈવ વિવિધતાના સંરક્ષણમાં સામેલ કરવા અને જાગૃતિ લાવવા", "C) અભયારણ્યમાં વનસ્પતિ અને પ્રાણીઓની સંખ્યા વધારવા માટે બહારથી પ્રજાતિઓ લાવવી", "D) અભયારણ્યને વ્યાવસાયિક પ્રવૃત્તિઓ માટે ખુલ્લું મૂકવું"], "correct": 1, "explanation": "સ્થાનિક લોકોને જૈવ વિવિધતાના સંરક્ષણમાં સામેલ કરવા અને જાગૃતિ લાવવી એ સૌથી અસરકારક પગલો છે, કારણ કે તે સ્થાનિક સમુદાયને સંરક્ષણ પ્રવૃત્તિઓ સાથે જોડે છે અને લાંબા ગાળાના સંરક્ષણને સુનિશ્ચિત કરે છે. A) અસરકારક નથી કારણ કે સ્થાનિક લોકોના અવરોધથી વિરોધ ઉભો થઈ શકે છે. C) ખોટો છે કારણ કે બહારથી પ્રજાતિઓ લાવવી સ્થાનિક જૈવ વિવિધતાને નુકસાન પહોંચાડી શકે છે. D) ખોટો છે કારણ કે વ્યાવસાયિક પ્રવૃત્તિઓ જૈવ વિવિધતાને નુકસાન પહોંચાડે છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 3}, {"question": "જૈવ વિવિધતાના સંરક્ષણમાં 'હોટસ્પોટ' શબ્દનો ઉપયોગ કયા સંદર્ભમાં થાય છે?", "options": ["A) જ્યાં જૈવ વિવિધતા ઓછી હોય અને સંરક્ષણની જરૂર ન હોય તેવા વિસ્તારો", "B) જ્યાં જૈવ વિવિધતા ઉચ્ચ હોય અને સંરક્ષણની તાત્કાલિક જરૂર હોય તેવા વિસ્તારો", "C) જ્યાં માત્ર વનસ્પતિ જૈવ વિવિધતા ઉચ્ચ હોય પરંતુ પ્રાણી જૈવ વિવિધતા ઓછી હોય તેવા વિસ્તારો", "D) જ્યાં માત્ર પ્રાણી જૈવ વિવિધતા ઉચ્ચ હોય પરંતુ વનસ્પતિ જૈવ વિવિધતા ઓછી હોય તેવા વિસ્તારો"], "correct": 1, "explanation": "હોટસ્પોટ એવા વિસ્તારો છે જ્યાં જૈવ વિવિધતા ઉચ્ચ હોય છે અને સંરક્ષણની તાત્કાલિક જરૂર હોય છે. A) ખોટો છે કારણ કે હોટસ્પોટમાં જૈવ વિવિધતા ઉચ્ચ હોય છે. C) અને D) અપૂર્ણ છે કારણ કે હોટસ્પોટમાં વનસ્પતિ અને પ્રાણી બંને જૈવ વિવિધતા ઉચ્ચ હોય છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 4}, {"question": "ગુજરાતમાં 'ગીર અભયારણ્ય'માં સિંહની વસતીના સંરક્ષણ માટે કયો પગલો સૌથી મહત્વપૂર્ણ છે?", "options": ["A) સિંહોને કેદમાં રાખવા અને તેમના માટે ખોરાક પૂરો પાડવો", "B) સિંહોના નૈસર્ગિક આવાસને સંરક્ષિત કરવા અને તેમના શિકારી પ્રાણીઓની સંખ્યા નિયંત્રિત કરવા", "C) સિંહોને અન્ય રાષ્ટ્રીય ઉદ્યાનોમાં સ્થળાંતરિત કરવા", "D) સિંહોના શિકાર માટે નવા પ્રાણીઓ અભયારણ્યમાં લાવવા"], "correct": 1, "explanation": "સિંહોના નૈસર્ગિક આવાસને સંરક્ષિત કરવા અને તેમના શિકારી પ્રાણીઓની સંખ્યા નિયંત્રિત કરવા એ સૌથી મહત્વપૂર્ણ પગલો છે, કારણ કે તે સિંહોના નૈસર્ગિક વાતાવરણને જાળવી રાખે છે. A) ખોટો છે કારણ કે કેદમાં રાખવું સિંહોના નૈસર્ગિક વર્તનને પ્રભાવિત કરે છે. C) ખોટો છે કારણ કે સ્થળાંતરિત કરવું સિંહોના સ્થાનિક અનુકૂલનને પ્રભાવિત કરે છે. D) ખોટો છે કારણ કે નવા પ્રાણીઓ લાવવાથી સ્થાનિક જૈવ વિવિધતાને નુકસાન થઈ શકે છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 5}, {"question": "ગુજરાતના કોઈ એક જૈવ વિવિધતા સમૃદ્ધ ક્ષેત્રમાં, 'એન્ડેમિક પ્રજાતિ' અને 'સ્થાનિક પ્રજાતિ' વચ્ચેનો મુખ્ય તફાવત શો છે, જ્યારે બંને પ્રજાતિઓ તે જ ભૌગોલિક વિસ્તારમાં જોવા મળે છે?", "options": ["A) એન્ડેમિક પ્રજાતિ ફક્ત તે જ ક્ષેત્રમાં જોવા મળે છે, જ્યારે સ્થાનિક પ્રજાતિ અન્ય ક્ષેત્રોમાં પણ જોવા મળી શકે છે", "B) એન્ડેમિક પ્રજાતિની જૈવિક વૈવિધ્યતા ઓછી હોય છે, જ્યારે સ્થાનિક પ્રજાતિની જૈવિક વૈવિધ્યતા વધુ હોય છે", "C) એન્ડેમિક પ્રજાતિના જનીન વૈવિધ્યમાં વધુ પરિવર્તનશીલતા હોય છે, જ્યારે સ્થાનિક પ્રજાતિમાં ઓછી હોય છે", "D) એન્ડેમિક પ્રજાતિ ફક્ત કૃત્રિમ પરિસ્થિતિઓમાં જીવી શકે છે, જ્યારે સ્થાનિક પ્રજાતિ પ્રાકૃતિક પરિસ્થિતિઓમાં જીવી શકે છે"], "correct": 0, "explanation": "એન્ડેમિક પ્રજાતિ એવી પ્રજાતિ છે જે ફક્ત એક ચોક્કસ ભૌગોલિક વિસ્તારમાં જોવા મળે છે, જ્યારે સ્થાનિક પ્રજાતિ એવી પ્રજાતિ છે જે તે વિસ્તારમાં સ્થાનિક છે પરંતુ અન્ય ક્ષેત્રોમાં પણ જોવા મળી શકે છે. વિકલ્પ A સાચો છે કારણ કે એન્ડેમિક પ્રજાતિની વ્યાખ્યા જ તેના સીમિત વિતરણ પર આધારિત છે. વિકલ્પ B, C, અને D ગેરમાર્ગે દોરનારા છે કારણ કે એન્ડેમિક પ્રજાતિઓની જૈવિક વૈવિધ્યતા, જનીન પરિવર્તનશીલતા, અથવા કૃત્રિમ પરિસ્થિતિઓ સાથે કોઈ સીધો સંબંધ નથી.", "ncert_ref": "Class XII - પ્રકરણ ૧૫: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 6}, {"question": "ગુજરાતમાં જોવા મળતા 'મરુભૂમીના પર્ણપાતી જંગલો'માં, કયા પર્યાવરણીય પરિબળને કારણે ત્યાંની વનસ્પતિઓમાં 'ઝેરીલા પદાર્થો' (ટોક્સિન)નું ઉત્પાદન વધુ જોવા મળે છે?", "options": ["A) ઉચ્ચ તાપમાન અને ઓછી આર્દ્રતા", "B) મૃદાના ઉચ્ચ ખારાપણું", "C) પવન દ્વારા થતો મૃદા કટાવ", "D) જળની અછત અને પ્રકાશની તીવ્રતા"], "correct": 3, "explanation": "મરુભૂમીના પર્ણપાતી જંગલોમાં, જળની અછત અને પ્રકાશની તીવ્રતાને કારણે વનસ્પતિઓમાં ઝેરીલા પદાર્થોનું ઉત્પાદન વધે છે. આ પરિસ્થિતિઓમાં, વનસ્પતિઓ પોતાને શુષ્કતા અને યુવી કિરણોત્સર્ગથી બચાવવા માટે ટોક્સિનનું ઉત્પાદન કરે છે. વિકલ્પ A, B, અને C પણ પર્યાવરણીય પરિબળો છે, પરંતુ તે ટોક્સિન ઉત્પાદનના મુખ્ય કારણો નથી.", "ncert_ref": "Class XII - પ્રકરણ ૧૫: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 7}, {"question": "ગુજરાતના કોઈ એક વન્યજીવ અભયારણ્યમાં, 'કીસ્ટોન પ્રજાતિ' (Keystone Species)ના નાશ થવાને કારણે કયો પર્યાવરણીય પરિણામ સૌથી વધુ સંભવિત છે?", "options": ["A) તે ક્ષેત્રની જૈવ વિવિધતામાં તાત્કાલિક વધારો થશે", "B) તે ક્ષેત્રના ઇકોસિસ્ટમમાં ખોરાક શૃંખલાનો પતન થશે", "C) તે ક્ષેત્રમાં નવી પ્રજાતિઓનું આગમન થશે", "D) તે ક્ષેત્રની મૃદા ફળદ્રુપતામાં વધારો થશે"], "correct": 1, "explanation": "કીસ્ટોન પ્રજાતિ એવી પ્રજાતિ છે જે ઇકોસિસ્ટમની રચના અને કાર્યને ટકાવી રાખવામાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે. તેના નાશ થવાને કારણે, ઇકોસિસ્ટમમાં ખોરાક શૃંખલાનો પતન થઈ શકે છે, જ્યારે અન્ય પ્રજાતિઓની વસતી પર અસર પડે છે. વિકલ્પ A, C, અને D ગેરમાર્ગે દોરનારા છે કારણ કે કીસ્ટોન પ્રજાતિના નાશ થવાને કારણે જૈવ વિવિધતામાં વધારો, નવી પ્રજાતિઓનું આગમન, અથવા મૃદા ફળદ્રુપતામાં વધારો થવાની સંભાવના ઓછી હોય છે.", "ncert_ref": "Class XII - પ્રકરણ ૧૫: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 8}, {"question": "ગુજરાતમાં જોવા મળતા 'મેંગ્રોવ વન' (Mangrove Forest)માં, કયા અનુકૂલનને કારણે આ વનસ્પતિઓ ખારા પાણીમાં જીવી શકે છે?", "options": ["A) તેના મૂળમાં 'હવાઈ મૂળ' (Pneumatophores) હોય છે, જે ઓક્સિજનનું શોષણ કરે છે", "B) તેના પ hophily)"], "correct": 2, "explanation": "ક્લિટોરિયા ટર્નેટિયા (શંકપુષ્પ) કીટક દ્વારા પરાગનયન (Entomophily) માટે જાણીતી છે. વિકલ્પ A પવન દ્વારા પરાગનયન એવા વનસ્પતિઓમાં જોવા મળે છે જેમ કે ઘાસ. વિકલ્પ B જલ દ્વારા પરાગનયન એવા વનસ્પતિઓમાં જોવા મળે છે જેમ કે કમળ. વિકલ્પ D પક્ષી દ્વારા પરાગનયન એવા વનસ્પતિઓમાં જોવા મળે છે જેમ કે હિબિસ્કસ.", "ncert_ref": "Class XI - Chapter 2: પ્રજનન", "difficulty": "Hard", "num": 20}, {"question": "ગુજરાતના મરુભૂમી પ્રદેશમાં જોવા મળતી 'કેપરિસ ડેસિડ્યુઅસ' (Capparis decidua) વનસ્પતિમાં, પાણીના અભાવને અનુકૂળ થવા માટે કયું અનુકૂલન જોવા મળે છે?", "options": ["A) પર્ણની સપાટી પર મોમ જેવો પદાર્થનો પડ છાયો", "B) પર્ણની જાડાઈમાં ઘટાડો અને પર્ણની સપાટીનું વિસ્તરણ", "C) મૂળની લંબાઈમાં ઘટાડો અને પર્ણની સપાટી પર રોમોની હાજરી", "D) પર્ણની સપાટી પર કાંટા ઉગાડવા અને પર્ણને પતળા બનાવવા"], "correct": 0, "explanation": "'કેપરિસ ડેસિડ્યુઅસ'માં પાણીના અભાવને અનુકૂળ થવા માટે પર્ણની સપાટી પર મોમ જેવો પડ છાયો જોવા મળે છે, જે પાણીના બાષ્પોત્સર્જનને ઘટાડે છે. આથી, વિકલ્પ A સાચો છે. વિકલ્પ B, C, અને D આ વનસ્પતિમાં જોવા મળતા અનુકૂલન નથી.", "ncert_ref": "Class XI - Chapter 13: વનસ્પતિ શારીર (Morphology of Flowering Plants)", "difficulty": "Hard", "num": 21}, {"question": "ગુજરાતમાં જોવા મળતી 'રેડ ડેટા બુક'માં સામેલ પ્રજાતિઓ પૈકી કયી પ્રજાતિ 'એક્સ્ટિંક્ટ ઇન ધ વાઇલ્ડ' (EW) કેટેગરીમાં સામેલ છે?", "options": ["A) એશિયાટિક સિંહ (Panthera leo persica)", "B) ઇન્ડિયન વાઇલ્ડ એસ (Equus hemionus khur)", "C) ગુલાબી પેલિકન (Pelecanus onocrotalus)", "D) કચ્છનો રણનો ગધેડો (Equus hemionus khur)"], "correct": 1, "explanation": "ઇન્ડિયન વાઇલ્ડ એસ (Equus hemionus khur) પ્રજાતિ 'એક્સ્ટિંક્ટ ઇન ધ વાઇલ્ડ' (EW) કેટેગરીમાં સામેલ છે, કારણ કે તે વન્યમાં લુપ્ત થઈ ગઈ છે અને ફક્ત કેદમાં જ જોવા મળે છે. એશિયાટિક સિંહ 'એન્ડેન્જર્ડ' કેટેગરીમાં છે, ગુલાબી પેલિકન 'લીસ્ટ કન્સર્ન' કેટેગરીમાં છે, અને કચ્છનો રણનો ગધેડો 'ક્રિટિકલી એન્ડેન્જર્ડ' કેટેગરીમાં છે.", "ncert_ref": "Class XII - Chapter 15: જૈવ વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 22}, {"question": "ગુજરાતના કચ્છના રણમાં જોવા મળતી 'કેપર             document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
