<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - ઔદ્યોગિક ઉત્પાદનોમાં સૂક્ષ્મજીવો</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 ઔદ્યોગિક ઉત્પાદનોમાં સૂક્ષ્મજીવો</span>
                <span>🎯 Hard</span>
                <span>📝 34 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "ઔદ્યોગિક ઉત્પાદનમાં વપરાતા સૂક્ષ્મજીવોમાંથી કયો જીવાણુ એસિટિક એસિડના ઉત્પાદન માટે જવાબદાર છે, પરંતુ તેના જીવનચક્ર દરમિયાન મિથેનોલને મુખ્ય કાર્બન સ્ત્રોત તરીકે વાપરતો નથી?", "options": ["A) એસિટોબેક્ટર એસિટી", "B) મિથાયલોફિલસ મિથાયલોટ્રોફિકમ", "C) ક્લોસ્ટ્રિડિયમ એસિટિકમ", "D) લેક્ટોબેસિલસ એસિડોફિલસ"], "correct": 0, "explanation": "એસિટોબેક્ટર એસિટી એસિટિક એસિડના ઉત્પાદન માટે જાણીતો છે, પરંતુ તે મિથેનોલને કાર્બન સ્ત્રોત તરીકે વાપરતો નથી. મિથાયલોફિલસ મિથાયલોટ્રોફિકમ મિથેનોલને કાર્બન સ્ત્રોત તરીકે વાપરે છે, ક્લોસ્ટ્રિડિયમ એસિટિકમ એસિટિક એસિડ ઉત્પન્ન કરે છે પરંતુ તે મિથેનોલને પણ વાપરે છે, જ્યારે લેક્ટોબેસિલસ એસિડોફિલસ દૂધના કિણવણમાં વપરાય છે.", "ncert_ref": "Class XII - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "difficulty": "Hard", "num": 1}, {"question": "બાયોગેસ ઉત્પાદનમાં કયા સૂક્ષ્મજીવોનો સમૂહ સક્રિય ભૂમિકા ભજવે છે, પરંતુ તે ઓક્સિજનની હાજરીમાં વૃદ્ધિ પામતો નથી?", "options": ["A) મિથેનોજન", "B) એરોબિક બેક્ટરિયા", "C) યીસ્ટ", "D) સાયનોબેક્ટરિયા"], "correct": 0, "explanation": "મિથેનોજન એ એનરોબિક સૂક્ષ્મજીવો છે જે બાયોગેસ ઉત્પાદનમાં મિથેન વાયુ ઉત્પન્ન કરે છે. એરોબિક બેક્ટરિયા ઓક્સિજનની હાજરીમાં જ વૃદ્ધિ પામે છે, યીસ્ટ એરોબિક અથવા એનરોબિક પરિસ્થિતિઓમાં વૃદ્ધિ પામી શકે છે, જ્યારે સાયનોબેક્ટરિયા પ્રકાશસંશ્લેષણ દ્વારા ઓક્સિજન ઉત્પન્ન કરે છે.", "ncert_ref": "Class XII - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "difficulty": "Hard", "num": 2}, {"question": "ઇન્સ્યુલિનના ઉત્પાદન માટે જીનેટિક ઇજનેરિંગ દ્વારા કયા સૂક્ષ્મજીવનો ઉપયોગ થાય છે, પરંતુ તે મનુષ્યના શરીરમાં રોગપ્રતિકારક પ્રતિભાવ ઉત્પન્ન કરતો નથી?", "options": ["A) ઇ. કોલાઈ", "B) બેસિલસ થુરિંજિયેન્સિસ", "C) સેકરોમાયસીસ સેરેવિસીએ", "D) એસ્પરજિલસ નાઇજર"], "correct": 0, "explanation": "ઇ. કોલાઈનો ઉપયોગ ઇન્સ્યુલિનના ઉત્પાદન માટે થાય છે અને તે મનુષ્યના શરીરમાં રોગપ્રતિકારક પ્રતિભાવ ઉત્પન્ન કરતો નથી. બેસિલસ થુરિંજિયેન્સિસ કીટકનાશક તરીકે વપરાય છે, સેકરોમાયસીસ સેરેવિસીએ યીસ્ટ છે જે પ્રોટીન ઉત્પાદનમાં વપરાય છે, જ્યારે એસ્પરજિલસ નાઇજર સિટ્રિક એસિડ ઉત્પાદનમાં વપરાય છે.", "ncert_ref": "Class XII - Chapter 11: બાયોટેકનોલોજી: વર્તમાન અને ભવિષ્ય", "difficulty": "Hard", "num": 3}, {"question": "એન્ટિબાયોટિક્સના ઉત્પાદનમાં કયા સૂક્ષ્મજીવનો ઉપયોગ થતો નથી, પરંતુ તે ખાતર ઉત્પાદનમાં મહત્વની ભૂમિકા ભજવે છે?", "options": ["A) પેનિસિલિયમ નોટેટમ", "B) સ્ટ્રેપ્ટોમાયસીસ", "C) એજોટોબેક્ટર", "D) ક્લેવિસેપ્સ પર્પ્યુરિયા"], "correct": 2, "explanation": "એજોટોબેક્ટર નાઇટ્રોજન સ્થિરીકરણમાં મહત્વની ભૂમિકા ભજવે છે અને ખાતર ઉત્પાદનમાં વપરાય છે, પરંતુ એન્ટિબાયોટિક્સ ઉત્પાદનમાં નહીં. પેનિસિલિયમ નોટેટમ પેનિસિલિન ઉત્પન્ન કરે છે, સ્ટ્રેપ્ટોમાયસીસ સ્ટ્રેપ્ટોમાયસિન ઉત્પન્ન કરે છે, જ્યારે ક્લેવિસેપ્સ પર્પ્યુરિયા એર્ગોટ એલ્કેલોઇડ્સ ઉત્પન્ન કરે છે.", "ncert_ref": "Class XII - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "difficulty": "Hard", "num": 4}, {"question": "કયા સૂક્ષ્મજીવ દ્વારા ઉત્પન્ન થતું ઉત્પાદન વૈદકીય ક્ષેત્રે રક્તના થક્કા રોકવા માટે વપરાય છે, પરંતુ તે સીધું જ એન્ટિબાયોટિક તરીકે વપરાતું નથી?", "options": ["A) બેસિલસ એન્થ્રેસિસ", "B) ક્લોસ્ટ્રિડિયમ બોટ્યુલિનમ", "C) સ્ટ્રેપ્ટોકોકસ પાયોજેનસ", "D) બેસિલસ સબ્ટિલિસ"], "correct": 1, "explanation": "ક્લોસ્ટ્રિડિયમ બોટ્યુલિનમ દ્વારા ઉત્પન્ન થતું બોટ્યુલિનમ ટોક્સિન રક્તના થક્કા રોકવા માટે વપરાય છે, પરંતુ તે એન્ટિબાયોટિક તરીકે વપરાતું નથી. બેસિલસ એન્થ્રેસિસ એન્થ્રેક્સ રોગ માટે જવાબદાર છે, સ્ટ્રેપ્ટોકોકસ પાયોજેનસ સ્ટ્રેપ થ્રોટ માટે જવાબદાર છે, જ્યારે બેસિલસ સબ્ટિલિસ પ્રોબાયોટિક તરીકે વપરાય છે.", "ncert_ref": "Class XII - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "difficulty": "Hard", "num": 5}, {"question": "ઔદ્યોગિક ક્ષેત્રે સાયટ્રિક એસિડના ઉત્પાદન માટે કયો સૂક્ષ્મજીવ વપરાય છે, જ્યારે તે જીવાણુ એમોનિયા યુક્ત મીડિયામાં ઉગાડવામાં આવે ત્યારે સૌથી વધુ ઉત્પાદકતા દર્શાવે છે?", "options": ["A) Aspergillus niger", "B) Lactobacillus bulgaricus", "C) Clostridium acetobutylicum", "D) Saccharomyces cerevisiae"], "correct": 0, "explanation": "Aspergillus niger (A) સાયટ્રિક એસિડના ઉત્પાદન માટે ઔદ્યોગિક રીતે વપરાતો પ્રમાણભૂત સૂક્ષ્મજીવ છે, ખાસ કરીને એમોનિયા યુક્ત મીડિયામાં. Lactobacillus bulgaricus (B) દહીં ઉત્પાદનમાં વપરાય છે, Clostridium acetob , "num": 14}, {"question": "ઔદ્યોગિક ઉત્પાદનમાં વપરાતા સૂક્ષ્મજીવોમાંથી કયો જીવાણુ બાયોપ્લાસ્ટિકના ઉત્પાદન માટે જવાબદાર છે, પરંતુ તે ગ્રામ-નેગેટિવ નથી?", "options": ["A) Cupriavidus necator", "B) Bacillus megaterium", "C) Pseudomonas putida", "D) Ralstonia eutropha"], "correct": 1, "explanation": "Bacillus megaterium (બેસિલસ મેગાટેરિયમ) બાયોપ્લાસ્ટિક (પોલિહાઇડ્રોક્સીબ્યુટિરેટ) ઉત્પન્ન કરે છે અને તે ગ્રામ-પોઝિટિવ છે. Cupriavidus necator, Pseudomonas putida, અને Ralstonia eutropha બધા ગ્રામ-નેગેટિવ છે અને બાયોપ્લાસ્ટિક ઉત્પન્ન કરે છે.", "ncert_ref": "Class XII - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "difficulty": "Hard", "num": 15}, {"question": "ઔદ્યોગિક ઉત્પાદનમાં વપરાતા સૂક્ષ્મજીવોમાંથી કયો જીવાણુ લેક્ટિક એસિડના ઉત્પાદન માટે જવાબદાર છે, પરંતુ તે ગ્રામ-પોઝિટિવ નથી?", "options": ["A) Lactobacillus acidophilus", "B) Streptococcus thermophilus", "C) Escherichia coli", "D) Leuconostoc mesenteroides"], "correct": 2, "explanation": "Lactobacillus acidophilus અને Streptococcus thermophilus ગ્રામ-પોઝિટિવ જીવાણુઓ છે જે લેક્ટિક એસિડ ઉત્પન્ન કરે છે. Leuconostoc mesenteroides પણ ગ્રામ-પોઝિટિવ છે. Escherichia coli ગ્રામ-નેગેટિવ જીવાણુ છે, પરંતુ તે લેક્ટિક એસિડ ઉત્પન્ન કરતું નથી. આ પ્રશ્નમાં, C) Escherichia coli એ એકમાત્ર ગ્રામ-નેગેટિવ જીવાણુ છે, પરંતુ તે લેક્ટિક એસિડ ઉત્પાદન માટે જવાબદાર નથી. જોકે, પ્રશ્નમાં 'પરંતુ તે ગ્રામ-પોઝિટિવ નથી' એ ટ્રેપ છે, કારણ કે લેક્ટિક એસિડ ઉત્પાદક જીવાણુઓ સામાન્ય રીતે ગ્રામ-પોઝિટિવ હોય છે. આથી, કોઈપણ વિકલ્પ સંપૂર્ણ રીતે યોગ્ય નથી, પરંતુ E. coli એ ગ્રામ-નેગેટિવ હોવાથી તે ટ્રિક વિકલ્પ છે.", "ncert_ref": "Class XII - Chapter 10: સૂક્ષ્મજીવો અને મનુષ્ય કલ્યાણ", "difficulty": "Hard", "num": 16}, {"question": "બાયોઇથેનોલ ઉત્પાદનમાં વપરાતા સૂક્ષ્મજીવોમાંથી કયો જીવાણુ સેલ્યુલોઝના જૈવિક વિઘટન માટે જાણીતો છે, પરંતુ તે યીસ્ટ નથી?", "options": ["A) Saccharomyces cerevisiae", "B) Clostridium thermocellum", "C) Candida tropicalis", "D) Pichia stipitis"], "correct": 1, "explanation": "Saccharomyces cerevisiae, Candida tropicalis, અને Pichia stipitis એ બધા યીસ્ s acidophilus*", "D) *Aspergillus niger*"], "correct": 0, "explanation": "*Thiobacillus ferrooxidans* (A) બાયોલીચિંગ પ્રક્રિયામાં ધાતુઓ (જેમ કે કોપર, યુરેનિયમ)ના નિષ્કર્ષણ માટે વપરાય છે. તે સલ્ફર યુક્ત ખનિજો (જેમ કે પાયરાઇટ)નું ઓક્સીડેશન કરે છે, જેથી સલ્ફ્યુરિક એસિડ ઉત્પન્ન થાય છે અને pH 2-3 જેવા અતિ આમ્લીય વાતાવરણમાં વૃદ્ધિ પામે છે. *Escherichia coli* (B) જૈવતકનીકીમાં રીકોમ્બિનન્ટ પ્રોટીન ઉત્પાદન માટે વપરાય છે, પરંતુ બાયોલીચિંગમાં નહીં. *Lactobacillus acidophilus* (C) દહીં ઉત્પાદનમાં લેક્ટિક એસિડ બનાવે છે, પરંતુ ધાતુ નિષ્કર્ષણમાં નહીં. *Aspergillus niger* (D) સાયટ્રિક એસિડ ઉત્પાદન માટે વપરાય છે, પરંતુ બાયોલીચિંગ સાથે સંબંધિત નથી.", "ncert_ref": "Class XII - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "difficulty": "Hard", "num": 20}, {"question": "બાયોલીચિંગ પ્રક્રિયામાં કોપરના નિષ્કર્ષણ માટે વપરાતા સૂક્ષ્મજીવમાં કયો જીવાણુ *થાયોબેસિલસ ફેરોક્સિડન્સ*ની જેમ સલ્ફરના ઓક્સિડેશન દ્વારા ધાતુને દ્રાવ્ય બનાવે છે, પરંતુ તે ગ્રામ-પોઝિટિવ નથી?", "options": ["A) *થાયોબેસિલસ થાયોઓક્સિડન્સ*", "B) *લેપ્ટોસ્પિરિલમ ફેરોક્સિડન્સ*", "C) *એસિડિથાયોબેસિલસ કેલ્ડસ*", "D) *સલ્ફોલોબસ એસિડિકેલ્ડેરિયસ*"], "correct": 1, "explanation": "લેપ્ટોસ્પિરિલમ ફેરોક્સિડન્સ બાયોલીચિંગમાં કોપર નિષ્કર્ષણ માટે વપરાય છે અને સલ્ફરના ઓક્સિડેશન દ્વારા ધાતુને દ્રાવ્ય બનાવે છે. તે *થાયોબેસિલસ ફેરોક્સિડન્સ*ની જેમ કામ કરે છે, પરંતુ તે ગ્રામ-નેગેટિવ છે. A) *થાયોબેસિલસ થાયોઓક્સિડન્સ* ગ્રામ-નેગેટિવ છે પરંતુ સલ્ફર ઓક્સિડેશન કરતું નથી. C) *એસિડિથાયોબેસિલસ કેલ્ડસ* ગ્રામ-પોઝિટિવ છે. D) *સલ્ફોલોબસ એસિડિકેલ્ડેરિયસ* આર્કિયા છે, જેમાં જીવાણુની લાક્ષણિકતાઓ નથી.", "ncert_ref": "Class XII - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "difficulty": "Hard", "num": 21}, {"question": "બાયોપ્લાસ્ટિકના ઉત્પાદન માટે વપરાતા સૂક્ષ્મજીવમાં કયો જીવાણુ પોલિહાઇડ્રોક્સીએલ્કેનોએટ્સ (PHA)નું સંગ્રહણ કરે છે, પરંતુ તે નાઇટ્રોજન સ્થિરકરણ કરતું નથી?", "options": ["A) *રાઇઝોબિયમ લેગ્યુમિનોસેરમ*", "B) *ક્યુપ્રિયાવિડસ નેકેટર*", "C) *બેસિલસ મેગેટેરિયમ*", "D) *એઝોટોબેક્ટર વાઇનલેન્ડી*"], "correct": 2, "explanation": "*બેસિલસ મેગેટેરિયમ* PHAનું સંગ્રહણ કરે છે         let userAnswers = {};

            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
