    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>

    <script>
        const questionsData = [{"question": "ગ્રિફિથના પ્રયોગમાં, S સ્ટ્રેઇનના બેક્ટેરિયા મૃત હોવા છતાં T સ્ટ્રેઇનને કેવી રીતે પરિવર્તિત કરે છે?", "options": ["A) S સ્ટ્રેઇનના DNA ના ટુકડા T સ્ટ્રેઇનના જનીનમાં સમાવિષ્ટ થાય છે અને નવા ગુણધર્મો પ્રગટ કરે છે.", "B) S સ્ટ્રેઇનના પ્રોટીન T સ્ટ્રેઇનના કોષરસમાં પ્રવેશે છે અને ઉત્સેચક તરીકે કામ કરે છે.", "C) S સ્ટ્રેઇનના કાર્બોદિત T સ્ટ્રેઇનના કોષકેન્દ્રમાં જમાવે છે અને ઉર્જા પૂરી પાડે છે.", "D) S સ્ટ્રેઇનના લિપિડ T સ્ટ્રેઇનના કોષછિદ્રમાં ભળી જાય છે અને રક્ષણ આપે છે."], "correct": 0, "explanation": "ગ્રિફિથના પ્રયોગમાં, S સ્ટ્રેઇનના મૃત બેક્ટેરિયાનું DNA T સ્ટ્રેઇનના જીવંત બેક્ટેરિયામાં પ્રવેશે છે અને તેના જનીનમાં સમાવિષ્ટ થાય છે, જેથી T સ્ટ્રેઇન S સ્ટ્રેઇનના ગુણધર્મો (જેવા કે કેપ્સ્યુલ બનાવવાનો ગુણ) પ્રગટ કરે છે. આથી, DNA જ અનુવંશિકતાનું વાહક છે. બાકીના વિકલ્પો (B, C, D) પ્રોટીન, કાર્બોદિત અને લિપિડને અનુવંશિકતાના વાહક તરીકે ગણાવે છે, જે ખોટું છે.", "ncert_ref": "Class XII - પ્રકરણ 6: આનુવંશિકતાનો આણ્વિક આધાર", "difficulty": "Hard", "num": 1}, {"question": "હર્શે અને ચેઝના પ્રયોગમાં, રેડિયોએક્ટિવ લેબલિંગનો ઉપયોગ કરીને શું સિદ્ધ થયું?", "options": ["A) પ્રોટીન અનુવંશિકતાનું વાહક છે.", "B) DNA અનુવંશિકતાનું વાહક છે.", "C) RNA અનુવંશિકતાનું વાહક છે.", "D) લિપિડ અનુવંશિકતાનું વાહક છે."], "correct": 1, "explanation": "હર્શે અને ચેઝના પ્રયોગમાં, રેડિયોએક્ટિવ ફોસ્ફરસ (32P) વડે DNAને અને રેડિયોએક્ટિવ સલ્ફર (35S) વડે પ્રોટીનને લેબલ કરવામાં આવ્યા હતા. જ્યારે T2 બેક્ટેરિયોફેજને E. coli બેક્ટેરિયામાં સંક્રમિત કરવામાં આવ્યા, ત્યારે ફક્ત 32P લેબલ થયેલ DNA જ બેક્ટેરિયામાં પ્રવેશ્યું અને નવા ફેજના ઉત્પાદનમાં ભાગ લીધો. આથી, DNA જ અનુવંશિકતાનું વાહક છે. બાકીના વિકલ્પો (A, C, D) ખોટા છે કારણ કે પ્રોટીન, RNA અને લિપિડ અનુવંશિકતાના વાહક નથી.", "ncert_ref": "Class XII - પ્રકરણ 6: આનુવંશિકતાનો આણ્વિક આધાર", "difficulty": "Hard", "num": 2}, {"question": "વોટસન અને ક્રિકના DNA મોડેલ અનુસાર, નાઇટ્રોજન બેઇઝ વચ્ચેના બંધારણમાં કયો બંધ સૌથી મજબૂત છે?", "options": ["A) એડિનિન અને થાયમિન વચ્ચેનો બંધ", "B) ગ્વાનિન અને સાયટોસિન વચ્ચેનો બંધ", "C) એડિનિન અને ગ્વાનિન વચ્ચેનો બંધ", "D) થાયમિન અને સાયટોસિન વચ્ચેનો બંધ"], "correct": 1, "explanation": "વોટસન અને ક્રિકના DNA મોડેલ અનુસાર, ગ્વાનિન અને સાયટોસિન વચ્ચે ત્રણ હાઇડ્રોજન બંધો હોય છે, જ્યારે એડિનિન અને થાયમિન વચ્ચે ફક્ત બે હાઇડ્રોજન બંધો હોય છે. આથી, ગ્વાનિન અને સાયટોસિન વચ્ચેનો બંધ સૌથી મજબૂત છે. બાકીના વિકલ્પો (A, C, D) ખોટા છે કારણ કે તેઓ ખોટા બંધો અથવા ઓછા બંધો ધરાવે છે.", "ncert_ref": "Class XII - પ્રકરણ 6: આનુવંશિકતાનો આણ્વિક આધાર", "difficulty": "Hard", "num": 3}, {"question": "DNA ની દ્વિગુણન પ્રક્રિયામાં, કયું ઉત્સેચક DNA ના સિંગલ સ્ટ્રેન્ડને ટેમ્પલેટ તરીકે વાપરીને નવા સ્ટ્રેન્ડનું સંશ્લેષણ કરે છે?", "options": ["A) હેલિકેઝ", "B) DNA પોલિમરેઝ", "C) લાઇગેઝ", "D) ટોપોઆઇસોમરેઝ"], "correct": 1, "explanation": "DNA ની દ્વિગુણન પ્રક્રિયામાં, DNA પોલિમરેઝ ઉત્સેચક DNA ના સિંગલ સ્ટ્રેન્ડને ટેમ્પલેટ તરીકે વાપરીને નવા સ્ટ્રેન્ડનું સંશ્લેષણ કરે છે. હેલિકેઝ DNA ના ડબલ સ્ટ્રેન્ડને અલગ કરે છે, લાઇગેઝ DNA ના ટુકડાઓને જોડે છે, અને ટોપોઆઇસોમરેઝ DNA ના સુપરકોઇલિંગને દૂર કરે છે. આથી, બાકીના વિકલ્પો (A, C, D) ખોટા છે.", "ncert_ref": "Class XII - પ્રકરણ 6: આનુવંશિકતાનો આણ્વિક આધાર", "difficulty": "Hard", "num": 4}, {"question": "મેસેલસન અને સ્ટહલના પ્રયોગમાં, N-15 અને N-14 આઇસોટોપનો ઉપયોગ કરીને શું સિદ્ધ થયું?", "options": ["A) DNA નું દ્વિગુણન રૂપાંતરિત થાય છે.", "B) DNA નું દ્વિગુણન અર્ધ-રૂપાંતરિત થાય છે.", "C) DNA નું દ્વિગુણન સંપૂર્ણ રૂપાંતરિત થાય છે.", "D) DNA નું દ્વિગુણન અસ્તવ્યસ્ત થાય છે."], "correct": 1, "explanation": "મેસેલસન અને સ્ટહલના પ્રયોગમાં, N-15 આઇસોટોપ વડે લેબલ થયેલ DNA ને N-14 વાળા મીડિયામાં ઉગાડવામાં આવ્યો. પ્રથમ પેઢીમાં, DNA ના બંને સ્ટ્રેન્ડમાં એક N-15 અને એક N-14 હોય છે, જે અર્ધ-રૂપાંતરિત દ્વિગુણનને સૂચવે છે. બાકીના વિકલ્પો (A, C, D) ખોટા છે કારણ કે તેઓ DNA દ્વિગુણનની સંપૂર્ણ અથવા અસ્તવ્યસ્ત પ્રક્રિયાને સૂચવે છે, જે ખરું નથી.", "ncert_ref": "Class XII - પ્રકરણ 6: આનુવંશિકતાનો આણ્વિક આધાર", "difficulty": "Hard", "num": 5}, {"question": "ગ્રિફિથના પ્રયોગ પછી, એવરી, મેકલિયોડ અને મેકકાર્ટીના પ્રયોગમાં, S સ્ટ્રેઇનના બેક્ટેરિયામાંથી કયા ઘટકને અલગ પાડીને T સ્ટ્ર options": ["A) રૂઢિગત પદ્ધતિ", "B) અર્ધ-રૂઢિગત પદ્ધતિ", "C) અ-રૂઢિગત પદ્ધતિ", "D) રેખીય પદ્ધતિ"], "correct": 1, "explanation": "મેસેલસન અને સ્ટહલના પ્રયોગમાં, DNA ની દ્વિગુણન પ્રક્રિયા અર્ધ-રૂઢિગત પદ્ધતિ દ્વારા થાય છે, જેમાં નવા DNA અણુમાં એક પુરાણો સ્ટ્રેન્ડ અને એક નવો સ્ટ્રેન્ડ હોય છે. રૂઢિગત પદ્ધતિમાં બંને સ્ટ્રેન્ડ પુરાણા હોય છે, અ-રૂઢિગત પદ્ધતિમાં બંને સ્ટ્રેન્ડ નવા હોય છે, અને રેખીય પદ્ધતિ DNA દ્વિગુણન સાથે સંબંધિત નથી.", "ncert_ref": "Class XII - Chapter 6: આનુવંશિકતાનો આણ્વિક આધાર", "difficulty": "Hard", "num": 9}, {"question": "ગ્રિફિથ, એવરી-મેકલિયોડ-મેકકાર્ટી, હર્શે-ચેઝ, અને વોટસન-ક્રિકના પ્રયોગોના ક્રમિક ફાળાને ધ્યાનમાં લેતા, DNA ની આણ્વિક ઓળખ બાબતે નીચેના પૈકી કયું વિધાન સૌથી યોગ્ય રીતે સ્પષ્ટ કરે છે?", "options": ["A) ગ્રિફિથે સૌપ્રથમ સિદ્ધ કર્યું કે DNA જ અનુવંશિકતાનું વાહક છે, જ્યારે એવરી-મેકલિયોડ-મેકકાર્ટીએ તેની પુષ્ટિ કરી.", "B) હર્શે-ચેઝના પ્રયોગે સિદ્ધ કર્યું કે પ્રોટીન નહીં પરંતુ DNA જ જનીનિક માહિતીનું વાહક છે, પરંતુ વોટસન-ક્રિકે DNA ની રચનાનું મોડેલ આપીને તેની આણ્વિક સ્પષ્ટતા કરી.", "C) એવરી-મેકલિયોડ-મેકકાર્ટીના પ્રયોગ પહેલા જ ગ્રિફિથના પ્રયોગમાં સ્પષ્ટ થયું હતું કે DNA ની જગ્યાએ પ્રોટીન જ અનુવંશિકતાનું વાહક છે.", "D) વોટસન-ક્રિકના મોડેલ પહેલા DNA ની અનુવંશિક ભૂમિકા સ્પષ્ટ નહોતી, પરંતુ હર્શે-ચેઝના પ્રયોગ પછી જ તેની પુષ્ટિ થઈ શકી."], "correct": 1, "explanation": "હર્શે-ચેઝના પ્રયોગ (1952) એ સિદ્ધ કર્યું કે T2 બેક્ટેરિયોફેજમાં પ્રોટીન નહીં પરંતુ DNA જ જનીનિક માહિતીનું વાહક છે. ગ્રિફિથના પ્રયોગ (1928) એ 'ટ્રાન્સફોર્મિંગ પ્રિન્સિપલ' ની હાજરી દર્શાવી હતી, પરંતુ એવરી-મેકલિયોડ-મેકકાર્ટી (1944) એ સિદ્ધ કર્યું કે તે DNA છે. વોટસન-ક્રિક (1953) એ DNA ની દ્વિગુણન ક્ષમતા અને રચનાનું મોડેલ આપીને આણ્વિક સ્પષ્ટતા કરી. વિકલ્પ A ખોટો છે કારણ કે ગ્રિફિથે DNA ની ઓળખ કરી નહોતી. વિકલ્પ C ખોટો છે કારણ કે ગ્રિફિથના પ્રયોગમાં પ્રોટીનની ભૂમિકા સિદ્ધ થઈ નહોતી. વિકલ્પ D ખોટો છે કારણ કે હર્શે-ચેઝ પહેલા એવરી-મેકલિયોડ-મેકકાર્ટીએ DNA ની ભૂમિકા સિદ્ધ કરી હતી.", "ncert_ref": "Class XII - પ્રકરણ 6: આનુવંશિકતાનો આણ્વિક આધાર", "difficulty": "Hard", "num": 10}, {"question": "ગ્રિફિથ ે પ્રોટીએઝ બંને સાથે ઉપચારિત કરવામાં આવે"], "correct": 1, "explanation": "એવરી, મેકલિયોડ અને મેકકાર્ટીના પ્રયોગમાં, DNAase ઉત્સેચક DNA ને તોડી નાખે છે, જેથી રૂપાંતરણ થઈ શકતું નથી. RNAase RNA ને તોડે છે, પરંતુ DNA ને અસર કરતું નથી, તેથી રૂપાંતરણ થાય છે. પ્રોટીએઝ પ્રોટીનને તોડે છે, પરંતુ DNA ને અસર કરતું નથી, તેથી રૂપાંતરણ થાય છે. RNAase અને પ્રોટીએઝ બંને સાથે ઉપચારિત કરવાથી પણ DNA અખંડ રહે છે, તેથી રૂપાંતરણ થાય છે.", "ncert_ref": "Class XII - Chapter 6: આનુવંશિકતાનો આણ્વિક આધાર", "difficulty": "Hard", "num": 13}, {"question": "હર્શે અને ચેઝના પ્રયોગમાં, T2 બેક્ટેરિયોફેજના DNA ને રેડિયોએક્ટિવ ફોસ્ફરસ (32P) દ્વારા લેબલ કરવામાં આવ્યો હતો અને પ્રોટીન કોટને રેડિયોએક્ટિવ સલ્ફર (35S) દ્વારા લેબલ કરવામાં આવ્યો હતો. જ્યારે આ લેબલ થયેલ બેક્ટેરિયોફેજને E. coli બેક્ટેરિયામાં ઉમેરવામાં આવ્યો, ત્યારબાદ સંતતિ બેક્ટેરિયોફેજમાં કયા રેડિયોએક્ટિવ આઇસોટોપની હાજરી જોવા મળી?", "options": ["A) ફક્ત 32P", "B) ફક્ત 35S", "C) 32P અને 35S બંને", "D) 32P અથવા 35S પૈકી કોઈપણ એક"], "correct": 0, "explanation": "હર્શે અને ચેઝના પ્રયોગમાં, T2 બેક્ટેરિયોફેજના DNA (લેબલ થયેલ 32P) બેક્ટેરિયામાં પ્રવેશ કરે છે અને પ્રજનન કરે છે, જ્યારે પ્રોટીન કોટ (લેબલ થયેલ 35S) બેક્ટેરિયાના કોષની બહાર રહે છે. તેથી, સંતતિ બેક્ટેરિયોફેજમાં ફક્ત 32P જોવા મળે છે. 35S હાજર રહેતું નથી કારણ કે પ્રોટીન કોટ નવા બેક્ટેરિયોફેજમાં વારસાગત રીતે પસાર થતું નથી.", "ncert_ref": "Class XII - Chapter 6: આનુવંશિકતાનો આણ્વિક આધાર", "difficulty": "Hard", "num": 14}, {"question": "વોટસન અને ક્રિકના DNA મોડેલ અનુસાર, નીચેનામાંથી કયું વિધાન સત્ય નથી?", "options": ["A) DNA નું દ્વિગુણન અર્ધ-સંરક્ષણાત્મક પદ્ધતિથી થાય છે", "B) એડેનિન હંમેશા થાયમિન સાથે જોડાય છે", "C) ગ્વાનિન હંમેશા સાયટોસિન સાથે જોડાય છે", "D) DNA ની દ્વિગુણન પ્રક્રિયામાં, DNA પોલિમરેઝ ઉત્સેચક દ્વારા નવો સ્ટ્રેન્ડ સિંથેસ થાય છે"], "correct": 0, "explanation": "વોટસન અને ક્રિકના મોડેલમાં, DNA નું દ્વિગુણન અર્ધ-સંરક્ષણાત્મક પદ્ધતિથી થાય છે, પરંતુ આ વિધાન મેસેલસન અને સ્ટહલના પ્રયોગ દ્વારા સિદ્ધ થયું હતું, વોટસન અને ક્રિકના મોડેલમાં આ વિગત સ્પષ્ટપણે વર્ણવવામાં આવી ન હતી. એડેનિન હંમે ": "Class XII - Chapter 6: આનુવંશિકતાનો આણ્વિક આધાર", "difficulty": "Hard", "num": 17}, {"question": "એવરી, મેકલિયોડ અને મેકકાર્ટીના પ્રયોગમાં, S સ્ટ્રેઇનના બેક્ટેરિયામાંથી અલગ પડેલા DNA ને કયા ઉત્સેચક દ્વારા તોડવામાં આવ્યું હતું, જેના કારણે T સ્ટ્રેઇનમાં પરિવર્તન થવાનું બંધ થઈ ગયું?", "options": ["A) પ્રોટિયેઝ", "B) RNAએઝ", "C) DNAએઝ", "D) લાયપેઝ"], "correct": 2, "explanation": "એવરી, મેકલિયોડ અને મેકકાર્ટીના પ્રયોગમાં, S સ્ટ્રેઇનના બેક્ટેરિયામાંથી અલગ પડેલા DNA ને DNAએઝ ઉત્સેચક દ્વારા તોડવામાં આવ્યું હતું, જેના કારણે T સ્ટ્રેઇનમાં પરિવર્તન થવાનું બંધ થઈ ગયું. આ પ્રયોગે સિદ્ધ કર્યું કે DNA જ પરિવર્તન માટે જવાબદાર ઘટક છે. વિકલ્પ A (પ્રોટિયેઝ) પ્રોટીનને તોડે છે, વિકલ્પ B (RNAએઝ) RNA ને તોડે છે, અને વિકલ્પ D (લાયપેઝ) લિપિડને તોડે છે, જે અહીં લાગુ પડતું નથી.", "ncert_ref": "Class XII - Chapter 6: આનુવંશિકતાનો આણ્વિક આધાર", "difficulty": "Hard", "num": 18}, {"question": "ગ્રિફિથ, એવરી-મેકલિયોડ-મેકકાર્ટી, હર્શે-ચેઝ અને વોટસન-ક્રિકના પ્રયોગોના ક્રમિક અભ્યાસ પછી, નીચેનામાંથી કયું વિધાન DNA ની શોધના ઇતિહાસને લગતું સૌથી અયોગ્ય છે?", "options": ["A) ગ્રિફિથના પ્રયોગે 'ટ્રાન્સફોર્મિંગ પ્રિન્સિપલ' ની હાજરી સૂચવી, પરંતુ તેની રાસાયણિક પ્રકૃતિ સ્પષ્ટ ન હતી.", "B) એવરી-મેકલિયોડ-મેકકાર્ટીએ સિદ્ધ કર્યું કે પ્રોટીન, નહીં કે DNA, અનુવંશિક માહિતીનું વાહક છે.", "C) હર્શે અને ચેઝના પ્રયોગે સિદ્ધ કર્યું કે T2 બેક્ટેરિયોફેજના DNA, નહીં કે પ્રોટીન કોટ, જીવંત કોષમાં પ્રવેશે છે.", "D) વોટસન અને ક્રિકે DNA ના દ્વિગુણન મોડેલ પ્રસ્તાવિત કર્યું, જે મેસેલસન અને સ્ટહલના પ્રયોગ દ્વારા પુષ્ટિ થયું."], "correct": 1, "explanation": "વિકલ્પ B અયોગ્ય છે કારણ કે એવરી-મેકલિયોડ-મેકકાર્ટીએ સિદ્ધ કર્યું હતું કે DNA, નહીં કે પ્રોટીન, અનુવંશિક માહિતીનું વાહક છે. તેમણે S સ્ટ્રેઇનના બેક્ટેરિયામાંથી અલગ પડેલા DNA ને ઉત્સેચકો દ્વારા તોડીને અને તેની અસર જોઈને સિદ્ધ કર્યું કે DNA જ 'ટ્રાન્સફોર્મિંગ પ્રિન્સિપલ' છે. વિકલ્પ A, C, અને D સહી છે કારણ કે તે પ્રયોગોના નિષ્કર્ષો સાથે સુસંગત છે.", "ncert_ref": "Class XII - પ્રકરણ 6: આનુવંશિકતાનો આણ્વિક આધાર", "difficulty": "Hard", "num": 19}, {"question": "નીચેના વિધાનોને ધ્યાનમાં લો અને સાચો વિકલ્પ પસંદ કરો:\n\n(1) ફ્રેડરિક મીશરે 1869માં કોષકેન્દ્રમાંથી એક એસિડિક પદાર્થ અલગ કર્યો, જેને તેમણે 'ન્યુક્લિન' નામ આપ્યું.\n(2) આલ્ફ્રેડ હર્શે અને માર્થા ચેઝના પ્રયોગ પહેલાં, ઓસ્વાલ્ડ એવરીએ સાબિત કર્યું કે DNA જ આનુવંશિક દ્રવ્ય છે.\n(3) ફ્રેડરિક ગ્રિફિથના પ્રયોગમાં, ગરમીથી માર્યા ગયેલા S સ્ટ્રેઇનના બેક્ટેરિયા સાથે જીવંત R સ્ટ્રેઇનને મિશ્રિત કરતાં, R સ્ટ્રેઇનમાં રોગકારકતા પ્રેરિત થઈ.\n(4) જેમ્સ વોટસન અને ફ્રાન્સિસ ક્રિકે DNA નું બંધારણ શોધ્યું તે પહેલાં, રોઝાલિન્ડ ફ્રેન્કલિને X-ray ક્રિસ્ટલોગ્રાફી દ્વારા DNA ની હેલિકલ રચના દર્શાવી હતી.\n\nઉપરોક્ત વિધાનોમાંથી કયું/કયાં વિધાન/વિધાનો ખોટું/ખોટાં છે?", "options": ["A) માત્ર (2)", "B) માત્ર (1) અને (3)", "C) માત્ર (2) અને (4)", "D) માત્ર (4)"], "correct": 0, "explanation": "\n- વિધાન (1) સાચું છે: ફ્રેડરિક મીશરે 1869માં કોષકેન્દ્રમાંથી ન્યુક્લિન (DNA) અલગ કર્યું હતું.\n- વિધાન (2) ખોટું છે: ઓસ્વાલ્ડ એવરી, મેકલિયોડ અને મેકકાર્ટીએ 1944માં DNA ને આનુવંશિક દ્રવ્ય તરીકે ઓળખાવ્યું, પરંતુ હર્શે અને ચેઝના પ્રયોગ (1952) પહેલાં આ સિદ્ધાંતને વ્યાપક સ્વીકૃતિ મળી ન હતી.\n- વિધાન (3) સાચું છે: ગ્રિફિથના પ્રયોગમાં, ગરમીથી માર્યા ગયેલા S સ્ટ્રેઇનના બેક્ટેરિયા સાથે જીવંત R સ્ટ્રેઇનને મિશ્રિત કરતાં, R સ્ટ્રેઇન રોગકારક બન્યું હતું.\n- વિધાન (4) સાચું છે: રોઝાલિન્ડ ફ્રેન્કલિને X-ray ક્રિસ્ટલોગ્રાફી દ્વારા DNA ની હેલિકલ રચના દર્શાવી હતી, જે વોટસન અને ક્રિકના મોડેલ માટે મહત્વપૂર્ણ હતી.\n\nઆથી, માત્ર વિધાન (2) ખોટું છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 6: આનુવંશિકતાનો આણ્વિક આધાર (DNA શોધનો ઇતિહાસ)", "difficulty": "Hard", "num": 20}, {"question": "ફ્રેડરિક મીશરે તેમના પ્રયોગોમાં કોષકેન્દ્રમાંથી અલગ પડેલા પદાર્થને 'ન્યુક્લીન' નામ આપ્યું હતું. આ પદાર્થ વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) તે પ્રોટીન અને કાર્બોદિતનો બનેલો હતો અને અમ્લીય ગુણધર્મ ધરાવતો હતો", "B) તે ફોસ્ફરસ યુક્ત હતો અને ક્ષારીય ગુણધર્મ ધરાવતો હતો", "C) તે સલ્ફર યુક્ત હતો અને ઉત્સેચક તરીકે કામ કરતો હતો", "D) તે નાઇટ્રોજન બેઇઝ ધરાવતો ન હતો અને તટસ્થ ગુણધર્મ ધરાવતો હતો"], "correct": 1, "explanation": "ફ્રેડરિક મીશરે કોષકેન્દ્રમાંથી અલગ પડેલા પદાર્થને 'ન્યુક્લીન' નામ આપ્યું હતું, જે ફોસ્ફરસ યુક્ત હતો અને ક્ષારીય ગુણધર્મ ધરાવતો હતો. આ પદાર્થ આજે DNA તરીકે ઓળખાય છે. વિકલ્પ A ખોટો છે કારણ કે ન્યુક્લીન પ્રોટીન અને કાર્બોદિતનો બનેલો નથી. વિકલ્પ C ખોટો છે કારણ કે તે સલ્ફર યુક્ત નથી અને ઉત્સેચક તરીકે કામ કરતો નથી. વિકલ્પ D ખોટો છે કારણ કે તે નાઇટ્રોજન બેઇઝ ધરાવે છે અને તટસ્થ ગુણધર્મ ધરાવતો નથી.", "ncert_ref": "Class XII - Chapter 6: આનુવંશિકતાનો આણ્વિક આધાર", "difficulty": "Hard", "num": 21}, {"question": "ફ્રેડરિક મીશરે તેમના પ્રયોગ દરમિયાન કોષકેન્દ્રમાંથી અલગ પડેલા પદાર્થ વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) તે પદાર્થ પ્રોટીન યુક્ત હતો અને તેને 'ન્યુક્લીન' નામ આપવામાં આવ્યું હતું.", "B) તે પદાર્થ ફોસ્ફરસ યુક્ત હતો અને તેને 'ન્યુક્લિક એસિડ' નામ આપવામાં આવ્યું હતું.", "C) તે પદાર્થ કાર્બોદિત યુક્ત હતો અને તેને 'ડીઓક્સીરાઇબોઝ' નામ આપવામાં આવ્યું હતું.", "D) તે પદાર્થ લિપિડ યુક્ત હતો અને તેને 'ન્યુક્લિયોપ્રોટીન' નામ આપવામાં આવ્યું હતું."], "correct": 0, "explanation": "ફ્રેડરિક મીશરે કોષકેન્દ્રમાંથી અલગ પડેલા પદાર્થને 'ન્યુક્લીન' નામ આપ્યું હતું, જે પ્રોટીન અને ફોસ્ફરસ યુક્ત હતો. વિકલ્પ A સાચો છે કારણ કે મીશરે આ પદાર્થને 'ન્યુક્લીન' નામ આપ્યું હતું અને તે પ્રોટીન યુક્ત હતો. વિકલ્પ B ખોટો છે કારણ કે 'ન્યુક્લિક એસિડ' નામ પાછળથી આપવામાં આવ્યું હતું. વિકલ્પ C અને D ખોટા છે કારણ કે તે પદાર્થ કાર્બોદિત અથવા લિપિડ યુક્ત નહોતો.", "ncert_ref": "Class XII - Chapter 6: આનુવંશિકતાનો આણ્વિક આધાર", "difficulty": "Hard", "num": 22}, {"question": "ફ્રેડરિક મીશરના પ્રયોગો અંગે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) તેમણે કોષકેન્દ્રમાંથી અલગ પડેલા પદાર્થને 'ન્યુક્લીન' નામ આપ્યું અને તે પ્રોટીન યુક્ત હોવાનું જણાવ્યું.", "B) તેમણે કોષકેન્દ્રમાંથી અલગ પડેલા પદાર્થમાં ફોસ્ફરસની હાજરી શોધી અને તેને કાર્બોદિત મનાયો.", "C) તેમણે કોષકેન્દ્રમાંથી અલગ પડેલા પદાર્થને 'ન્યુક્લીક એસિડ' નામ આપ્યું અને તે DNA હોવાનું સિદ્ધ કર્યું.", "D) તેમણે કોષકેન્દ્રમાંથી અલગ પડેલા પદાર્થમાં નાઇટ્રોજન અને ફોસ્ફરસની હાજરી શોધી અને તેને પ્રોટીન તરીકે વર્ગીકૃત કર્યો."], "correct": 2, "explanation": "ફ્રેડરિક મીશરે કોષકેન્દ્રમાંથી અલગ પડે             const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
