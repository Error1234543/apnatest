<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - પરાગણ (Pollination)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 પરાગણ (Pollination)</span>
                <span>🎯 Hard</span>
                <span>📝 29 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "પરાગણ પ્રક્રિયા દરમિયાન, જ્યારે પરાગરજ (pollen) સ્ત્રીકેસર (pistil)ની કલંક (stigma) પર પડે છે, ત્યારે કયો પદાર્થ પરાગનલિકા (pollen tube)ના વિકાસમાં મુખ્ય ભૂમિકા ભજવે છે?", "options": ["A) કલંક પરના શર્કરા (sugars) અને એમિનો એસિડ (amino acids)", "B) પરાગરજમાં રહેલા ઓક્સિન (auxin) હોર્મોન", "C) કલંકના પેશીઓમાં રહેલા ઉત્સેચક (enzymes) જેવા કે પેક્ટિનેઝ (pectinase)", "D) અંડાશય (ovary) દ્વારા સ્રાવવામાં આવતા જિબરેલિન (gibberellin) હોર્મોન"], "correct": 0, "explanation": "કલંક (stigma) પરના શર્કરા અને એમિનો એસિડ પરાગરજના અંકુરણ (germination) અને પરાગનલિકાના વિકાસ માટે ઉર્જા અને પોષક તત્ત્વો પૂરા પાડે છે. ઓક્સિન (B) અને જિબરેલિન (D) પરાગણમાં મહત્ત્વના હોવા છતાં, પરાગનલિકાના વિકાસ માટે સીધા ઉત્તેજન માટે જવાબદાર નથી. ઉત્સેચક (C) કલંકના પેશીઓમાં હાજર હોય છે, પરંતુ તેઓ પરાગનલિકાના વિકાસમાં સીધી ભૂમિકા ભજવતા નથી.", "ncert_ref": "Class XII - પ્રકરણ 2: જનન (Reproduction) - વનસ્પતિઓમાં લૈંગિક પ્રજનન", "difficulty": "Hard", "num": 1}, {"question": "નીચેના પૈકી કયું વિધાન સાચું નથી? પરાગણના સંદર્ભમાં:", "options": ["A) સ્વ-પરાગણ (self-pollination) દરમિયાન, પરાગરજ એ જ ફૂલના કલંક પર પડે છે.", "B) પર-પરાગણ (cross-pollination) દરમિયાન, પરાગરજ એક ફૂલના પુંકેસર (stamen)થી બીજા ફૂલના કલંક પર પહોંચે છે.", "C) વાયુ-પરાગણ (anemophily) ધરાવતા છોડમાં, પરાગરજ હલકો અને શુષ્ક હોય છે.", "D) જલ-પરાગણ (hydrophily) ધરાવતા છોડમાં, પરાગરજ ચીકણો અને ભારે હોય છે."], "correct": 3, "explanation": "જલ-પરાગણ ધરાવતા છોડમાં, પરાગરજ હલકો અને પાણીમાં તરતા રહે તે રીતે રચાયેલો હોય છે, નહીં કે ચીકણો અને ભારે. સ્વ-પરાગણ (A), પર-પરાગણ (B), અને વાયુ-પરાગણ (C)ના વિધાનો સાચાં છે.", "ncert_ref": "Class XII - પ્રકરણ 2: જનન (Reproduction) - વનસ્પતિઓમાં લૈંગિક પ્રજનન", "difficulty": "Hard", "num": 2}, {"question": "પરાગણ પ્રક્રિયા દરમિયાન, પરાગનલિકા (pollen tube) કયા પેશી મારફતે વિકાસ પામે છે?", "options": ["A) કલંક (stigma) → અંડવાહિની (style) → અંડાશય (ovary)", "B) કલંક (stigma) → પુંકેસર (stamen) → અંડાશય (ovary)", "C) પુંકેસર (stamen) → અંડવાહિની (style) → કલંક (stigma)", "D) અંડાશય (ovary) → અંડવાહિની (style) → કલંક (stigma)"], "correct": 0, "explanation": "પરાગનલિકા કલંક (stigma) પરથી શરૂ થાય છે અને અંડવાહિની (style) મારફતે અંડાશય (ovary) સુધી પહોંચે છે. પુંકેસર (stamen) પરાગરજનું ઉત્પાદન કરે છે, પરંતુ પરાગનલિકા તેના મારફતે વિકાસ પામતી નથી.", "ncert_ref": "Class XII - પ્રકરણ 2: જનન (Reproduction) - વનસ્પતિઓમાં લૈંગિક પ્રજનન", "difficulty": "Hard", "num": 3}, {"question": "નીચેના પૈકી કયો છોડ વાયુ-પરાગણ (anemophily) માટે ઉત્તમ ઉદાહરણ છે?", "options": ["A) ગુલાબ (Rose)", "B) મકાઈ (Maize)", "C) સૂર્યમુખી (Sunflower)", "D) કમળ (Lotus)"], "correct": 1, "explanation": "મકાઈ (Maize) વાયુ-પરાગણ ધરાવે છે, જ્યારે ગુલાબ (A), સૂર્યમુખી (C), અને કમળ (D) કીટક-પરાગણ (entomophily) ધરાવે છે.", "ncert_ref": "Class XII - પ્રકરણ 2: જનન (Reproduction) - વનસ્પતિઓમાં લૈંગિક પ્રજનન", "difficulty": "Hard", "num": 4}, {"question": "પરાગણ પ્રક્રિયા દરમિયાન, પરાગરજના અંકુરણ (germination) માટે કયો પરિબળ મહત્ત્વનો છે?", "options": ["A) ઉચ્ચ તાપમાન અને નીચી આર્દ્રતા", "B) નીચું તાપમાન અને ઉચ્ચ આર્દ્રતા", "C) પાણીની હાજરી અને યોગ્ય તાપમાન", "D) પ્રકાશની હાજરી અને ઓક્સિજનની ઉણપ"], "correct": 2, "explanation": "પરાગરજના અંકુરણ માટે પાણીની હાજરી અને યોગ્ય તાપમાન જરૂરી છે. ઉચ્ચ તાપમાન અને નીચી આર્દ્રતા (A) અંકુરણને અટકાવી શકે છે. નીચું તાપમાન અને ઉચ્ચ આર્દ્રતા (B) પણ અંકુરણને અસર કરે છે. પ્રકાશ અને ઓક્સિજન (D) અંકુરણ માટે સીધી જરૂરિયાત નથી.", "ncert_ref": "Class XII - પ્રકરણ 2: જનન (Reproduction) - વનસ્પતિઓમાં લૈંગિક પ્રજનન", "difficulty": "Hard", "num": 5}, {"question": "જ્યારે કોઈ છોડમાં સ્વ-પરાગણ (self-pollination) થાય છે, ત્યારે નીચેના પૈકી કયું પરિણામ સામાન્ય રીતે જોવા મળતું નથી?", "options": ["A) જન્યુકીય વૈવિધ્યમાં ઘટાડો થાય છે", "B) અનુવંશિક રોગોનો ફેલાવો વધે છે", "C) ફળની ગુણવત્તામાં સુધારો થાય છે", "D) પ્રજનન દરમાં ઘટાડો થાય છે"], "correct": 2, "explanation": "સ્વ-પરાગણમાં જન્યુકીય વૈવિધ્ય ઘટે છે (A સાચું), અનુવંશિક રોગોનો ફેલાવો વધે છે (B સાચું), અને પ્રજનન દર ઘટી શકે છે (D સાચું). પરંતુ ફળની ગુણવત્તામાં સુધારો થતો નથી, કારણ કે સ્વ-પરાગણથી નવી જન્યુકીય સંયોજન ula)", "D) સૂર્યમુખી (Helianthus)"], "correct": 2, "explanation": "પ્રાઇમરોઝ (Primula)માં 'હેટરોસ્ટાઇલી' જોવા મળે છે, જ્યાં એક જ પ્રજાતિમાં બે પ્રકારના ફૂલો હોય છે: એક લાંબા સ્ત્રીકેસર અને ટૂંકા પુંકેસર વાળા, અને બીજા ટૂંકા સ્ત્રીકેસર અને લાંબા પુંકેસર વાળા. આ ભિન્નતાથી પર-પરાગણ સુનિશ્ચિત થાય છે. ગુલાબ, જાસૂદ અને સૂર્યમુખીમાં આ લાક્ષણિકતા જોવા મળતી નથી.", "ncert_ref": "Class XII - પ્રકરણ 2: જીવન ચક્ર અને વંશવેલા", "difficulty": "Hard", "num": 21}, {"question": "ક્લીસ્ટોગેમી (Cleistogamy) અને ક્સીનોગેમી (Xenogamy) વિશે નીચેના પૈકી કયું વિધાન સાચું છે?", "options": ["A) ક્લીસ્ટોગેમીમાં ફૂલ ખુલ્લા હોય છે, જ્યારે ક્સીનોગેમીમાં ફૂલ બંધ હોય છે.", "B) ક્લીસ્ટોગેમીમાં સ્વ-પરાગણ થાય છે, જ્યારે ક્સીનોગેમીમાં પર-પરાગણ થાય છે.", "C) ક્લીસ્ટોગેમી અને ક્સીનોગેમી બંનેમાં પરાગણ પવન દ્વારા થાય છે.", "D) ક્લીસ્ટોગેમીમાં પરાગણ કીટકો દ્વારા થાય છે, જ્યારે ક્સીનોગેમીમાં પવન દ્વારા થાય છે."], "correct": 1, "explanation": "ક્લીસ્ટોગેમીમાં ફૂલ બંધ હોય છે અને સ્વ-પરાગણ થાય છે, જ્યારે ક્સીનોગેમીમાં ફૂલ ખુલ્લા હોય છે અને પર-પરાગણ થાય છે. વિકલ્પ A, C, અને D ખોટા છે કારણ કે તેઓ લાક્ષણિકતાઓને ઉલટાવે છે અથવા ખોટી માહિતી આપે છે.", "ncert_ref": "Class XII - પ્રકરણ 2: જીવન ચક્ર અને વંશવેલા", "difficulty": "Hard", "num": 22}, {"question": "નીચેના પૈકી કયું વિધાન 'હેટરોમોર્ફી' (heteromorphy) વિશે સાચું છે, જ્યાં સ્ત્રીકેસરની લંબાઈમાં ભિન્નતા હોવાથી પર-પરાગણ સુનિશ્ચિત થાય છે?", "options": ["A) હેટરોમોર્ફીમાં સ્ત્રીકેસરની લંબાઈ સમાન હોય છે.", "B) હેટરોમોર્ફીમાં સ્ત્રીકેસરની લંબાઈમાં ભિન્નતા હોવાથી સ્વ-પરાગણ થાય છે.", "C) હેટરોમોર્ફીમાં સ્ત્રીકેસરની લંબાઈમાં ભિન્નતા હોવાથી પર-પરાગણ સુનિશ્ચિત થાય છે.", "D) હેટરોમોર્ફી ફક્ત પવન-પરાગણ વાળા છોડમાં જોવા મળે છે."], "correct": 2, "explanation": "હેટરોમોર્ફીમાં સ્ત્રીકેસરની લંબાઈમાં ભિન્નતા હોવાથી પર-પરાગણ સુનિશ્ચિત થાય છે. વિકલ્પ A ખોટો છે કારણ કે લંબાઈ સમાન નથી હોતી. વિકલ્પ B ખોટો છે કારણ કે સ્વ-પરાગણ નથી થતું. વિકલ્પ D ખોટો છે કારણ કે હેટરોમોર્ફી ફક્ત પવન-પરાગણ વાળા છોડમાં જોવા મળતી નથી.", "ncert_ref": "Class XII - પ્રકરણ 2: જીવન ચક્ર અને વંશવેલા", "difficulty": "Hard", "num": 23}, {"question": "નીચેના પૈકી કયું વિધાન 'ક્લીસ્ટોગેમી' (Cleistogamy) અને 'ક્સીનોગેમી' (Xenogamy) વિશે સાચું છે?", "options": ["A) ક્લીસ્ટોગેમીમાં ફૂલ ખુલ્લા હોય છે, જ્યારે ક્સીનોગેમીમાં ફૂલ બંધ હોય છે.", "B) ક્લીસ્ટોગેમીમાં સ્વ-પરાગણ (self-pollination) થાય છે, જ્યારે ક્સીનોગેમીમાં આંતર-પરાગણ (cross-pollination) થાય છે.", "C) ક્લીસ્ટોગેમી અને ક્સીનોગેમી બંનેમાં ફૂલ ખુલ્લા હોય છે.", "D) ક્લીસ્ટોગેમીમાં આંતર-પરાગણ થાય છે, જ્યારે ક્સીનોગેમીમાં સ્વ-પરાગણ થાય છે."], "correct": 1, "explanation": "સાચો જવાબ B) ક્લીસ્ટોગેમીમાં સ્વ-પરાગણ (self-pollination) થાય છે, જ્યારે ક્સીનોગેમીમાં આંતર-પરાગણ (cross-pollination) થાય છે. ક્લીસ્ટોગેમીમાં ફૂલ બંધ હોય છે અને પરાગણ ફૂલ ખુલ્યા વગર થાય છે, જ્યારે ક્સીનોગેમીમાં ફૂલ ખુલ્લા હોય છે અને પરાગણ બીજા છોડના પરાગરજ દ્વારા થાય છે. A) ખોટું છે કારણ કે ક્લીસ્ટોગેમીમાં ફૂલ બંધ હોય છે. C) ખોટું છે કારણ કે ક્લીસ્ટોગેમીમાં ફૂલ બંધ હોય છે. D) ખોટું છે કારણ કે ક્લીસ્ટોગેમીમાં સ્વ-પરાગણ અને ક્સીનોગેમીમાં આંતર-પરાગણ થાય છે.", "ncert_ref": "Class XII - પ્રકરણ 2: જનન (Reproduction)", "difficulty": "Hard", "num": 24}, {"question": "એક વનસ્પતિશાસ્ત્રીને એક એવો દ્વિદળી છોડ મળ્યો જેમાં નીચેની લાક્ષણિકતાઓ જોવા મળી: (1) ફૂલો કદમાં નાના, રંગહીન અને ગંધરહિત છે, (2) પુંકેસર લાંબા અને લચકદાર તંતુઓ ધરાવે છે જે ફૂલની બહાર લટકતા હોય છે, (3) પરાગરજ ખૂબ જ હલકી અને મોટી સંખ્યામાં ઉત્પન્ન થાય છે, (4) કલંક પીંછાયુક્ત અને ચીકણું હોય છે. આ છોડમાં પરાગણની કઈ વિશિષ્ટ પદ્ધતિ સાથે 'સ્વ-અસંગતતા' (self-incompatibility) પણ જોવા મળે છે, જે આ છોડના પ્રજનનમાં મહત્ત્વનો ભાગ ભજવે છે?", "options": ["A) વાયુ-પરાગણ (Anemophily) સાથે 'ગેઇટનોગેમી' (Geitonogamy)", "B) વાયુ-પરાગણ (Anemophily) સાથે 'ક્ષીનોગેમી' (Xenogamy)", "C) જલ-પરાગણ (Hydrophily) સાથે 'હાઇડ્રોફિલસ ક્સીનોગેમી'", "D) કીટક-પરાગણ (Entomophily) સાથે 'હેટરોસ્ટાઇલી' (Heterostyly)"], "correct": 1, "explanation": "આ છોડમાં વર્ણવેલ લાક્ષણિકતાઓ (નાના, રંગહીન, ગંધરહિત ફૂલો, લાંબા પુંકેસર, હલકી પરાગરજ, પીંછાયુક્ત કલંક) વાયુ-પરાગણ (Anemophily) માટે અનુકૂલિત છે, જે NCERT Class XII, Chapter 2 (પ્રજનન) માં વર્ણવેલ છે. શિક વૈવિધ્ય ઘટાડે છે. તેથી, વિધાન B ખોટું છે.", "ncert_ref": "Class XII - Chapter 2: લૈંગિક પ્રજનન ફૂલોમાં", "difficulty": "Hard", "num": 27}, {"question": "એક છોડમાં, પરાગણ દરમિયાન પરાગરજ કલંક પર પડે છે, પરંતુ પરાગનલિકા (pollen tube) વિકાસ પામતી નથી. આ સ્થિતિ માટે નીચેના પૈકી કયો કારણ હોઈ શકે?", "options": ["A) કલંક પર પૂરતું પરાગરજ પડ્યું નથી.", "B) પરાગરજ અને કલંક વચ્ચે અનુકૂળતા (compatibility) નથી.", "C) તાપમાન ખૂબ ઓછું છે.", "D) કલંક પર પાણીની અછત છે."], "correct": 1, "explanation": "પરાગરજ અને કલંક વચ્ચે અનુકૂળતા (compatibility) ન હોવાને કારણે પરાગનલિકા વિકાસ પામતી નથી. આ સ્થિતિને 'સ્વ-અસંગતતા' (self-incompatibility) કહેવાય છે, જેમાં પરાગરજ અને કલંક વચ્ચે રાસાયણિક અવરોધ હોય છે. બાકીના વિકલ્પો (A, C, D) પરાગનલિકા વિકાસમાં અવરોધ ઉત્પન્ન કરી શકે છે, પરંતુ મુખ્ય કારણ અનુકૂળતાનો અભાવ છે.", "ncert_ref": "Class XII - Chapter 2: લૈંગિક પ્રજનન ફૂલોમાં", "difficulty": "Hard", "num": 28}, {"question": "નીચેના પૈકી કયું વિધાન 'ગેઇટનોગેમી' (Geitonogamy) વિશે સાચું છે?", "options": ["A) ગેઇટનોગેમીમાં પરાગણ એક જ છોડના વિવિધ ફૂલો વચ્ચે થાય છે.", "B) ગેઇટનોગેમીમાં પરાગણ વિવિધ છોડો વચ્ચે થાય છે.", "C) ગેઇટનોગેમી એ એક પ્રકારની ક્સીનોગેમી છે.", "D) ગેઇટનોગેમીમાં પરાગણ પવન દ્વારા થાય છે."], "correct": 0, "explanation": "ગેઇટનોગેમીમાં પરાગણ એક જ છોડના વિવિધ ફૂલો વચ્ચે થાય છે, જે સ્વ-પરાગણનો એક પ્રકાર છે. વિકલ્પ B ખોટો છે કારણ કે ગેઇટનોગેમી વિવિધ છોડો વચ્ચે થતી નથી. વિકલ્પ C ખોટો છે કારણ કે ગેઇટનોગેમી ક્સીનોગેમી નથી. વિકલ્પ D ખોટો છે કારણ કે ગેઇટનોગેમી પવન દ્વારા થતી નથી.", "ncert_ref": "Class XII - Chapter 2: સવર્ગીક પ્રજનન અને મનુષ્યમાં જનન", "difficulty": "Hard", "num": 29}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;

            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
