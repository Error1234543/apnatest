<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - આણ્વિક નિદાન (Molecular Diagnosis)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 આણ્વિક નિદાન (Molecular Diagnosis)</span>
                <span>🎯 Hard</span>
                <span>📝 35 પ્રશ્નો</span>

            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>

            </div>

        <div class="result-box" id="resultBox">

                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>

            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "આણ્વિક નિદાનમાં PCR (પોલિમરેઝ ચેઇન રિએક્શન) તંત્રનો ઉપયોગ કરવામાં આવે છે. નીચેનામાંથી કયું વિધાન PCRની કાર્યપદ્ધતિ વિશે સાચું નથી?", "options": ["A) PCRમાં થર્મલ સાયકલરનો ઉપયોગ થર્મલ ડીનેચરેશન, એનીલિંગ અને એક્સટેન્શનના તબક્કાઓ માટે થાય છે.", "B) PCRમાં ઉપયોગમાં લેવાતા પ્રાઇમર્સ સિંગલ-સ્ટ્રેન્ડેડ ઓલિગોન્યુક્લિઓટાઇડ્સ હોય છે જે DNAના વિશિષ્ટ ક્ષેત્ર સાથે જોડાય છે.", "C) Taq પોલિમરેઝ ઉચ્ચ તાપમાને સક્રિય રહે છે અને તે DNAની પ્રતિકૃતિ બનાવવા માટે વાપરવામાં આવે છે.", "D) PCR દરમિયાન ડીનેચરેશન તબક્કામાં DNA ડબલ હેલિક્સની રચના થાય છે."], "correct": 3, "explanation": "PCR દરમિયાન ડીનેચરેશન તબક્કામાં DNA ડબલ હેલિક્સ તૂટીને સિંગલ સ્ટ્રેન્ડમાં ફેરવાય છે, નહીં કે રચાય. અ) સાચું છે કારણ કે થર્મલ સાયકલર આ ત્રણ તબક્કાઓ માટે જરૂરી તાપમાન નિયંત્રિત કરે છે. બ) સાચું છે કારણ કે પ્રાઇમર્સ વિશિષ્ટ ક્ષેત્ર સાથે જોડાઈને DNA પ્રતિકૃતિની શરૂઆત કરે છે. સ) સાચું છે કારણ કે Taq પોલિમરેઝ ઉચ્ચ તાપમાન (95°C જેટલું) સહન કરે છે અને DNA સિંથેસ કરે છે. ડીનેચરેશન તબક્કામાં DNA ડબલ હેલિક્સ તૂટે છે, નહીં કે રચાય, એટલે D પરિબળ ખોટું છે.", "ncert_ref": "Class XII - Chapter 11: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 1}, {"question": "આણ્વિક નિદાનમાં રેસ્ટ્રિક્શન એન્ઝાઇમ્સનો ઉપયોગ કરવામાં આવે છે. નીચેનામાંથી કયું રેસ્ટ્રિક્શન એન્ઝાઇમ તેના કટના સ્થાને સ્ટિકી એન્ડ્સ ઉત્પન્ન કરતું નથી?", "options": ["A) EcoRI", "B) HindIII", "C) SmaI", "D) BamHI"], "correct": 2, "explanation": "SmaI એવું રેસ્ટ્રિક્શન એન્ઝાઇમ છે જે તેના કટના સ્થાને બ્લન્ટ એન્ડ્સ (સમતલ અંત) ઉત્પન્ન કરે છે, જ્યારે EcoRI, HindIII, અને BamHI સ્ટિકી એન્ડ્સ (ચોંટતા અંત) ઉત્પન્ન કરે છે. એટલે C પરિબળ સાચું છે.", "ncert_ref": "Class XII - Chapter 11: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 2}, {"question": "આણ્વિક નિદાનમાં જીન સિક્વેન્સિંગ માટે સેંગર પદ્ધતિનો ઉપયોગ થાય છે. નીચેનામાંથી કયું વિધાન સેંગર પદ્ધતિ વિશે સાચું નથી?", "options": ["A) સેંગર પદ્ધતિમાં ડીડોક્સીન્યુક્લિઓટાઇડ્સ (ddNTPs)નો ઉપયોગ થાય છે જે DNA સિંથેસને રોકી દે છે.", "B) સેંગર પદ્ધતિમાં ફ્લોરેસન્ટ લેબલ વાળા ddNTPsનો ઉપયોગ કરવામાં આવે છે.", "C) સેંગર પદ્ધતિમાં પોલિએક્રાઇલેમાઇડ જેલ ઇલેક્ટ્રોફોરેસિસનો ઉપયોગ DNA ફ્રેગમેન્ટ્સને અલગ કરવા માટે થાય છે.", "D) સેંગર પદ્ધતિમાં PCRની જેમ થર્મલ સાયકલરનો ઉપયોગ થાય છે."], "correct": 3, "explanation": "સેંગર પદ્ધતિમાં થર્મલ સાયકલરનો ઉપયોગ થતો નથી. અ) સાચું છે કારણ કે ddNTPs DNA સિંથેસને રોકી દે છે. બ) સાચું છે કારણ કે ફ્લોરેસન્ટ લેબલ વાળા ddNTPsનો ઉપયોગ કરવામાં આવે છે. સ) સાચું છે કારણ કે પોલિએક્રાઇલેમાઇડ જેલ ઇલેક્ટ્રોફોરેસિસનો ઉપયોગ DNA ફ્રેગમેન્ટ્સને અલગ કરવા માટે થાય છે. ડ) ખોટું છે કારણ કે સેંગર પદ્ધતિમાં થર્મલ સાયકલરનો ઉપયોગ થતો નથી.", "ncert_ref": "Class XII - Chapter 11: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 3}, {"question": "આણ્વિક નિદાનમાં ELISA (એન્ઝાઇમ-લિંક્ડ ઇમ્યુનોસોર્બન્ટ અસે) તંત્રનો ઉપયોગ કરવામાં આવે છે. નીચેનામાંથી કયું વિધાન ELISA વિશે સાચું નથી?", "options": ["A) ELISAમાં એન્ટિજન-એન્ટિબોડી પ્રતિક્રિયાનો ઉપયોગ કરવામાં આવે છે.", "B) ELISAમાં સબસ્ટ્રેટનો રંગ બદલાવા માટે ઉત્સેચક (એન્ઝાઇમ)નો ઉપયોગ થાય છે.", "C) ELISAમાં રેડિયોએક્ટિવ આઇસોટોપ્સનો ઉપયોગ કરવામાં આવે છે.", "D) ELISAનો ઉપયોગ HIV, હેપેટાઇટિસ જેવા રોગોના નિદાન માટે થાય છે."], "correct": 2, "explanation": "ELISAમાં રેડિયોએક્ટિવ આઇસોટોપ્સનો ઉપયોગ થતો નથી. અ) સાચું છે કારણ કે ELISA એન્ટિજન-એન્ટિબોડી પ્રતિક્રિયા પર આધારિત છે. બ) સાચું છે કારણ કે ઉત્સેચક સબસ્ટ્રેટનો રંગ બદલે છે. ડ) સાચું છે કારણ કે ELISAનો ઉપયોગ HIV, હેપેટાઇટિસ જેવા રોગોના નિદાન માટે થાય છે. સ) ખોટું છે કારણ કે ELISAમાં રેડિયોએક્ટિવ આઇસોટોપ્સનો ઉપયોગ થતો નથી.", "ncert_ref": "Class XII - Chapter 10: માનવ સ્વાસ્થ્ય અને રોગો (Human Health and Diseases)", "difficulty": "Hard", "num": 4}, {"question": "આણ્વિક નિદાનમાં રીઅલ-ટાઇમ PCRનો ઉપયોગ કરવામાં આવે છે. નીચેનામાંથી કયું વિધાન રીઅલ-ટાઇમ PCR વિશે સાચું નથી?", "options": ["A) રીઅલ-ટાઇમ PCRમાં ફ્લોરેસન્ટ ડાયનો ઉપયોગ કરવામાં આવે છે જે DNAની પ્રતિકૃતિ દરમિયાન પ્રકાશિત થાય છે.", "B) રીઅલ-ટાઇમ PCRમાં DNAની પ્રતિકૃતિની નક્કી કરવા માટે થ્રેશોલ્ડ સાયકલ (Ct) વેળાનો ઉપયોગ થાય છે.", "C) રીઅલ-ટાઇમ PCRમાં PCR ઉત્પાદનોને અલગ કરવા માટે જેલ ઇલેક્ટ્રોફોરેસિસનો ઉપયોગ થાય છે.", "D) રીઅલ-ટાઇમ PCRનો ઉપયોગ જીન એક્સપ્રેશનના અભ્યાસ માટે થાય છે."], "correct": 2, "explanation": "રીઅલ-ટાઇમ PCRમાં PCR ઉત્પાદનોને અલગ કરવા માટે જેલ ઇલેક્ટ્રોફોરેસિસનો ઉપયોગ થતો નથી. અ) સાચું છે કારણ કે ફ્લોરેસન્ટ ડાય DNAની પ્રતિકૃતિ દરમિયાન પ્રકાશિત થાય છે. બ) સાચું છે કારણ કે થ્રેશોલ્ડ સાયકલ (Ct) વેળા DNAની પ્રતિકૃતિની નક્કી કરે છે. ડ) સાચું છે કારણ કે રીઅલ-ટાઇમ PCRનો ઉપયોગ જીન એક્સપ્રેશનના અભ્યાસ માટે થાય છે. સ) ખોટું છે કારણ કે રીઅલ-ટાઇમ PCRમાં જેલ ઇલેક્ટ્રોફોરેસિસનો ઉપયોગ થતો નથી.", "ncert_ref": "Class XII - Chapter 11: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 5}, {"question": "આણ્વિક નિદાનમાં, ન્યૂક્લિક એસિડ હાઇબ્રિડાઇઝેશન તંત્રનો ઉપયોગ કરવામાં આવે છે. નીચેનામાંથી કયું વિધાન આ તંત્ર વિશે સાચું નથી?", "options": ["A) તે DNA અથવા RNAના પૂરક ક્રમો વચ્ચેની પ્રતિક્રિયા પર આધારિત છે.", "B) તે ફ્લોરોસન્ટ લેબલ વડે સંકેતોનું પૃથક્કરણ કરે છે.", "C) તે માત્ર બેક્ટેરિયલ જનીનોમાં જ ઉપયોગી છે, યુકેરિયોટિક જનીનોમાં નહીં.", "D) તે સિંગલ-ન્યૂક્લિયોટાઇડ પોલિમોર્ફિઝમ (SNP)નું નિદાન કરવા માટે ઉપયોગી છે."], "correct": 2, "explanation": "હાઇબ્રિડાઇઝેશન તંત્ર DNA અથવા RNAના પૂરક ક્રમો વચ્ચેની પ્રતિક્રિયા પર આધારિત છે (A સાચું). ફ્લોરોસન્ટ લેબલ વડે સંકેતોનું પૃથક્કરણ કરવામાં આવે છે (B સાચું). તે SNPનું નિદાન કરવા માટે પણ ઉપયોગી છે (D સાચું). પરંતુ તે માત્ર બેક્ટેરિયલ જનીનોમાં જ ઉપયોગી નથી, પરંતુ યુકેરિયોટિક જનીનોમાં પણ ઉપયોગી છે (C ખોટું).", "ncert_ref": "Class XII - Chapter 11: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 6}, {"question": "આણ્વિક નિદાનમાં, નીચેનામાંથી કયો તંત્ર વાયરસના આણ્વિક નિદાન માટે સૌથી વધુ સંવેદનશીલ છે?", "options": ["A) વેસ્ટર્ન બ્લોટિંગ", "B) રીવર્સ ટ્રાન્સક્રિપ્શન-પોલિમરેઝ ચેઇન રિએક્શન (RT-PCR)", "C) ઇમ્યુનોહિસ્ટોકેમિસ્ટ્રી", "D) સદર્ભ પ્રતિદ્રવ્ય પરીક્ષણ (Agglutination test)"], "correct": 1, "explanation": "RT-PCR વાયરલ RNAને cDNAમાં રૂપાંતરિત કરે છે અને પછી તેનું પ્રવર્ધન કરે છે, જે વાયરસના નિદાન માટે અત્યંત સંવેદનશીલ છે (B સાચું). વેસ્ટર્ન બ્લોટિંગ પ્રોટીનનું પૃથક્કરણ કરે છે, વાયરલ ન્યૂક્લિક એસિડનું નહીં (A ખોટું). ઇમ્યુનોહિસ્ટોકેમિસ્ટ્રી પ્રોટીન અથવા એન્ટિજનનું સ્થાન નક્કી કરે છે (C ખોટું). સદર્ભ પ્રતિદ્રવ્ય પરીક્ષણ એન્ટિબોડી-એન્ટિજન પ્રતિક્રિયા પર આધારિત છે, જે ઓછું સંવેદનશીલ છે (D ખોટું).", "ncert_ref": "Class XII - Chapter 11: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 7}, {"question": "આણ્વિક નિદાનમાં, નીચેનામાંથી કયો તંત્ર જનીનની અભિવ્યક્તિના સ્તરનું મૂલ્યાંકન કરવા માટે ઉપયોગી છે?", "options": ["A) સાઉદર્ન બ્લોટિંગ", "B) નોર્દર્ન બ્લોટિંગ", "C) પશ્ચિમ બ્લોટિંગ", "D) ઇસ્ટર્ન બ્લોટિંગ"], "correct": 1, "explanation": "નોર્દર્ન બ્લોટિંગ RNAની અભિવ્યક્તિના સ્તરનું મૂલ્યાંકન કરવા માટે ઉપયોગી છે (B સાચું). સાઉદર્ન બ્લોટિંગ DNAના પૃથક્કરણ માટે છે (A ખોટું). પશ્ચિમ બ્લોટિંગ પ્રોટીનના પૃથક્કરણ માટે છે (C ખોટું). ઇસ્ટર્ન બ્લોટિંગ પ્રોટીન-પ્રોટીન પરસ્પર ક્રિયાઓના અભ્યાસ માટે છે (D ખોટું).", "ncert_ref": "Class XII - Chapter 11: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 8}, {"question": "આણ્વિક નિદાનમાં, નીચેનામાંથી કયો તંત્ર જનીનની મ્યુટેશનનું સ્થાન નક્કી કરવા માટે સૌથી યોગ્ય છે?", "options": ["A) PCR-RFLP", "B) ELISA", "C) વેસ્ટર્ન બ્લોટિંગ", "D) ઇમ્યુનોપ્રેસિપિટેશન"], "correct": 0, "explanation": "PCR-RFLP (પોલિમરેઝ ચેઇન રિએક્શન-રેસ્ટ્રિક્શન ફ્રેગમેન્ટ લેંગ્થ પોલિમોર્ફિઝમ) જનીનની મ્યુટેશનનું સ્થાન નક્કી કરવા માટે સૌથી યોગ્ય છે, કારણ કે તે DNAના કાપવામાં આવેલા ટુકડાઓના આકારમાં ફેરફારોને ઓળખે છે (A સાચું). ELISA એન્ટિબોડી-એન્ટિજન પ્રતિક્રિયા પર આધારિત છે (B ખોટું). વેસ્ટર્ન બ્લોટિંગ પ્રોટીનના પૃથક્કરણ માટે છે (C ખોટું). ઇમ્યુનોપ્રેસિપિટેશન પ્રોટીન અથવા પ્રોટીન કોમ્પ્લેક્સને અલગ પાડવા માટે છે (D ખોટું).", "ncert_ref": "Class XII - Chapter 11: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 9}, {"question": "આણ્વિક નિદાનમાં, નીચેનામાંથી કયું વિધાન FISH (ફ્લોરોસન્ટ ઇન સિટુ હાઇબ્રિડાઇઝેશન) વિશે સાચું છે?", "options": ["A) તે માત્ર મેટાફેઝમાં વર્ણસૂત્રોના નિદાન માટે ઉપયોગી છે.", "B) તે DNA પ્રોબનો ઉપયોગ કરે છે જે ફ્લોરોસન્ટ લેબલ સાથે જોડાયેલ હોય છે.", "C) તે માત્ર RNAના નિદાન માટે ઉપયોગી છે.", "D) તે વર્ણસૂત્રીય બંધારણમાં ફેરફારોને ઓળખી શકતું નથી."], "correct": 1, "explanation": "FISH તંત્ર DNA પ્રોબનો ઉપયોગ કરે છે જે ફ્લોરોસન્ટ લેબલ સાથે જોડાયેલ હોય છે, જે વર્ણસૂત્રો પર લક્ષ્ય DNA ક્રમો સાથે હાઇબ્રિડાઇઝ થાય છે (B સાચું). તે મેટાફેઝ અને ઇન્ટરફેઝ બંને દરમિયાન વર્ણસૂત્રોના નિદાન માટે ઉપયોગી છે (A ખોટું). તે DNA અને RNA બંનેના નિદાન માટે ઉપયોગી છે (C ખોટું). તે વર્ણસૂત્રીય બંધારણમાં ફેરફારોને ઓળખી શકે છે (D ખોટું).", "ncert_ref": "Class XII - Chapter 11: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 10}, {"question": "આણ્વિક નિદાનમાં, કયું તંત્ર સિંગલ ન્યૂક્લિયોટાઇડ પોલિમોર્ફિઝમ (SNP) નું પૃથ્થકરણ કરવા માટે સૌથી યોગ્ય છે, જ્યારે નમૂનામાં DNAની માત્રા ખૂબ ઓછી હોય?", "options": ["A) સેંગર સિક્વેન્સિંગ", "B) પાયરોસિક્વેન્સિંગ", "C) ડિજિટલ ડ્રોપલેટ PCR (ddPCR)", "D) સદર્ન બ્લોટિંગ"], "correct": 2, "explanation": "ડિજિટલ ડ્રોપલેટ PCR (ddPCR) ખૂબ ઓછી માત્રામાં DNAના SNPનું પૃથ્થકરણ કરવા માટે સૌથી યોગ્ય છે કારણ કે તે એકલ ન્યૂક્લિયોટાઇડના ફેરફારને શોધી શકે છે અને નમૂનાની માત્રા ઓછી હોવા છતાં પણ સંવેદનશીલ રહે છે. સેંગર સિક્વેન્સિંગ (A) માટે વધુ માત્રામાં શુદ્ધ DNAની જરૂર પડે છે. પાયરોસિક્વેન્સિંગ (B) હાઇ-થ્રૂપુટ સિક્વેન્સિંગ માટે ઉપયોગી છે પરંતુ SNP પૃથ્થકરણ માટે ddPCR જેટલું સંવેદનશીલ નથી. સદર્ન બ્લોટિંગ (D) DNAના આકાર અને માત્રાનું વિશ્લેષણ કરે છે પરંતુ SNP પૃથ્થકરણ માટે યોગ્ય નથી.", "ncert_ref": "Class XII - Chapter 11: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 11}, {"question": "આણ્વિક નિદાન દરમિયાન, જ્યારે કોઈ રોગના કારણભૂત જીનમાં ડિલીશન મ્યુટેશન હોય, ત્યારે નીચેનામાંથી કયું તંત્ર તેને શોધવા માટે સૌથી યોગ્ય છે?", "options": ["A) ક્વોન્ટિટેટિવ PCR", "B) મલ્ટીપ્લેક્સ PCR", "C) MLPA (મલ્ટિપ્લેક્સ લિગેશન-ડિપેન્ડન્ટ પ્રોબ એમ્પ્લિફિકેશન)", "D) વેસ્ટર્ન બ્લોટિંગ"], "correct": 2, "explanation": "MLPA (મલ્ટિપ્લેક્સ લિગેશન-ડિપેન્ડન્ટ પ્રોબ એમ્પ્લિફિકેશન) ડિલીશન મ્યુટેશન શોધવા માટે સૌથી યોગ્ય છે કારણ કે તે એકસાથે ઘણા જીનના કોપી નંબરના ફેરફારને શોધી શકે છે. ક્વોન્ટિટેટિવ PCR (A) DNAની માત્રાનું મૂલ્યાંકન કરે છે પરંતુ ડિલીશન માટે સ્પષ્ટ નથી. મલ્ટીપ્લેક્સ PCR (B) એકસાથે ઘણા જીન એમ્પ્લિફાય કરે છે પરંતુ ડિલીશન શોધવા માટે યોગ્ય નથી. વેસ્ટર્ન બ્લોટિંગ (D) પ્રોટીનનું પૃથ્થકરણ કરે છે, જીનના ડિલીશન માટે નહીં.", "ncert_ref": "Class XII - Chapter 11: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 12}, {"question": "આણ્વિક નિદાનમાં, કયું તંત્ર રોગના નિદાન માટે જીનની મિથાઇલેશન સ્થિતિનું વિશ્લેષણ કરવા માટે ઉપયોગી છે?", "options": ["A) બાયસલ્ફાઇટ સિક્વેન્સિંગ", "B) રીઅલ-ટાઇમ PCR", "C) નોર્ધર્ન બ્લોટિંગ", "D) ઇમ્યુનોહિસ્ટોકેમિસ્ટ્રી"], "correct": 0, "explanation": "બાયસલ્ફાઇટ સિક્વેન્સિંગ જીનની મિથાઇલેશન સ્થિતિનું વિશ્લેષણ કરવા માટે ઉપયોગી છે કારણ કે બાયસલ્ફાઇટ ટ્રીટમેન્ટ દરમિયાન અનમિથાઇલેટેડ સાયટોસિન યુરેસિલમાં રૂપાંતરિત થાય છે, જ્યારે મિથાઇલેટેડ સાયટોસિન અસરગ્રસ્ત થતું નથી. રીઅલ-ટાઇમ PCR (B) DNAની માત્રાનું મૂલ્યાંકન કરે છે પરંતુ મિથાઇલેશન શોધી શકતું નથી. નોર્ધર્ન બ્લોટિંગ (C) RNAનું પૃથ્થકરણ કરે છે. ઇમ્યુનોહિસ્ટોકેમિસ્ટ્રી (D) પ્રોટીનનું સ્થાનિકરણ કરે છે.", "ncert_ref": "Class XII - Chapter 11: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 13}, {"question": "આણ્વિક નિદાનમાં, કયું વિધાન CRISPER-Cas9 તંત્ર વિશે સાચું નથી?", "options": ["A) તે જીન એડિટિંગ માટે ઉપયોગી છે.", "B) તે DNAની સ્પષ્ટ જગ્યાએ કાપી શકે છે.", "C) તે RNAને એડિટ કરવા માટે પણ ઉપયોગી છે.", "D) તે નિદાન માટે સીધું ઉપયોગી છે."], "correct": 3, "explanation": "CRISPER-Cas9 જીન એડિટિંગ માટે ઉપયોગી છે (A), DNAની સ્પષ્ટ જગ્યાએ કાપી શકે છે (B), અને RNAને એડિટ કરવા માટે પણ ઉપયોગી છે (C). પરંતુ તે નિદાન માટે સીધું ઉપયોગી નથી (D), કારણ કે તેનો મુખ્ય ઉપયોગ જીન એડિટિંગમાં છે, નિદાનમાં નહીં.", "ncert_ref": "Class XII - Chapter 11: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 14}, {"question": "આણ્વિક નિદાનમાં, કયું તંત્ર એકસાથે ઘણા રોગજનક સૂક્ષ્મજીવોના નિદાન માટે સૌથી યોગ્ય છે, જ્યારે નમૂનામાં ઘણા સૂક્ષ્મજીવોની હાજરી હોય?", "options": ["A) સિંગલ પોલિમરેઝ ચેઇન રિએક્શન (PCR)", "B) મલ્ટીપ્લેક્સ PCR", "C) સદર્ન બ્લોટિંગ", "D) ઇલેક્ટ્રોન માઇક્રોસ્કોપી"], "correct": 1, "explanation": "મલ્ટીપ્લેક્સ PCR એકસાથે ઘણા રોગજનક સૂક્ષ્મજીવોના નિદાન માટે સૌથી યોગ્ય છે કારણ કે તે એકસાથે ઘણા ્લેષણ કરે છે, જ્યારે નોર્દર્ન બ્લોટિંગ RNAની અભિવ્યક્તિનું વિશ્લેષણ કરે છે, બંને મિથાઇલેશન સ્થિતિ સાથે સંબંધિત નથી.", "ncert_ref": "Class XII - Chapter 11: આણ્વિક આનુવંશિકતા અને જીન ટેકનોલોજી", "difficulty": "Hard", "num": 24}, {"question": "આણ્વિક નિદાન દરમિયાન, જ્યારે કોઈ રોગજનક જીનમાં હેટેરોઝાઇગસ મ્યુટેશન હોય અને તેનું પૃથ્થકરણ કરવાનું હોય, ત્યારે નીચેનામાંથી કયો તંત્ર સૌથી યોગ્ય ગણાય છે, જેમાં મ્યુટેશનની આણ્વિક અસરોનું સ્પષ્ટ પૃથ્થકરણ થઈ શકે?", "options": ["A) સેંગર સિક્વેન્સિંગ, કારણ કે તે સિંગલ-બેઝ રિઝોલ્યુશન પ્રદાન કરે છે અને હેટેરોઝાઇગસ મ્યુટેશનને સરળતાથી ઓળખી શકે છે.", "B) રીઅલ-ટાઇમ PCR, કારણ કે તે મ્યુટેશનની હાજરીની પુષ્ટિ કરવા માટે ફ્લોરોસન્ટ સિગ્નલનો ઉપયોગ કરે છે.", "C) FISH (ફ્લોરોસન્ટ ઇન સિટુ હાઇબ્રિડાઇઝેશન), કારણ કે તે વર્ણસૂત્ર પર મ્યુટેશનનું સ્થાન દર્શાવે છે.", "D) વેસ્ટર્ન બ્લોટિંગ, કારણ કે તે પ્રોટીન સ્તરે મ્યુટેશનની અસરોનું પૃથ્થકરણ કરે છે."], "correct": 0, "explanation": "સેંગર સિક્વેન્સિંગ (A) હેટેરોઝાઇગસ મ્યુટેશનનું સૌથી સ્પષ્ટ પૃથ્થકરણ કરે છે, કારણ કે તે સિંગલ-બેઝ રિઝોલ્યુશન પ્રદાન કરે છે અને હેટેરોઝાઇગસ સ્થિતિમાં બે અલગ ન્યૂક્લિયોટાઇડ્સને ઓળખી શકે છે. રીઅલ-ટાઇમ PCR (B) મ્યુટેશનની હાજરીની પુષ્ટિ કરે છે, પરંતુ તે હેટેરોઝાઇગસ સ્થિતિનું સ્પષ્ટ પૃથ્થકરણ કરતું નથી. FISH (C) વર્ણસૂત્રીય સ્થાન દર્શાવે છે, પરંતુ તે સિંગલ-બેઝ મ્યુટેશન ઓળખી શકતું નથી. વેસ્ટર્ન બ્લોટિંગ (D) પ્રોટીન સ્તરે પૃથ્થકરણ કરે છે, પરંતુ તે DNA સ્તરે મ્યુટેશન ઓળખી શકતું નથી.", "ncert_ref": "Class XII - Chapter 11: આણ્વિક જીવવિજ્ઞાન અને તેના અનુપ્રયોગો", "difficulty": "Hard", "num": 25}, {"question": "આણ્વિક નિદાન દરમિયાન, જ્યારે કોઈ રોગજનક જીનમાં કોપી નંબર વેરિયેશન (CNV) હોય, ત્યારે નીચેનામાંથી કયો તંત્ર સૌથી યોગ્ય રહેશે?", "options": ["A) ક્વોન્ટિટેટિવ PCR (qPCR)", "B) સેંગર સિક્વેન્સિંગ", "C) ફ્લોરોસન્ટ ઇન સિટુ હાઇબ્રિડાઇઝેશન (FISH)", "D) રેસ્ટ્રિક્શન ફ્રેગ્મેન્ટ લેન્થ પોલિમોર્ફિઝમ (RFLP)"], "correct": 2, "explanation": "FISH (ફ્લોરોસન્ટ ઇન સિટુ હાઇબ્રિડાઇઝેશન) કોપી નંબર વેરિયેશન (CNV) નું પૃથ્થકરણ કરવા માટે સૌથી યોગ્ય તંત્ર છે, કારણ કે તે વર્ણસૂત્ર પર સીધું જ હાઇબ્રિડાઇઝેશન કરે         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};

                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){

                    opt.classList.add('disabled');

            });

            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
