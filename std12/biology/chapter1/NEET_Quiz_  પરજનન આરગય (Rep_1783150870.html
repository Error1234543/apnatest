    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>

    <script>
        const questionsData = [{"question": "અમલીકરણ (Amniocentesis) ની પ્રક્રિયા દરમિયાન કયા કોષોનો અભ્યાસ કરવામાં આવે છે અને તેનો મુખ્ય હેતુ શું છે?", "options": ["A) ગર્ભાશયના એપિથેલિયલ કોષોનો અભ્યાસ કરવામાં આવે છે અને તેનો હેતુ ગર્ભના લિંગ નક્કી કરવાનો છે.", "B) અમ્નિયોટિક દ્રવમાં મળી આવતા ગર્ભના કોષોનો અભ્યાસ કરવામાં આવે છે અને તેનો હેતુ જનેતિક વિકૃતિઓ શોધવાનો છે.", "C) પ્લેસેન્ટાના કોષોનો અભ્યાસ કરવામાં આવે છે અને તેનો હેતુ ગર્ભના વિકાસની નિશ્ચિતતા કરવાનો છે.", "D) ગર્ભનાળના કોષોનો અભ્યાસ કરવામાં આવે છે અને તેનો હેતુ માતાના રક્ત ગ્રુપ નક્કી કરવાનો છે."], "correct": 1, "explanation": "અમલીકરણ પ્રક્રિયામાં અમ્નિયોટિક દ્રવમાંથી ગર્ભના કોષો એકત્રિત કરવામાં આવે છે અને તેમનો અભ્યાસ જનેતિક વિકૃતિઓ (જેમ કે ડાઉન સિન્ડ્રોમ) શોધવા માટે કરવામાં આવે છે. વિકલ્પ A ખોટો છે કારણ કે ગર્ભાશયના એપિથેલિયલ કોષોનો અભ્યાસ કરવામાં આવતો નથી અને લિંગ નક્કી કરવાનો હેતુ નથી. વિકલ્પ C ખોટો છે કારણ કે પ્લેસેન્ટાના કોષોનો અભ્યાસ કરવામાં આવતો નથી. વિકલ્પ D ખોટો છે કારણ કે ગર્ભનાળના કોષોનો અભ્યાસ કરવામાં આવતો નથી અને માતાના રક્ત ગ્રુપ સાથે કોઈ સંબંધ નથી.", "ncert_ref": "Class XII - પ્રકરણ 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 1}, {"question": "કોઈપણ દંપતીને બાળક ન હોવાનું કારણ કયા સંકેતો દર્શાવી શકે છે? નીચેના પૈકી કયો વિકલ્પ સૌથી યોગ્ય છે?", "options": ["A) પુરુષમાં શુક્રાણુઓની સંખ્યા ઓછી હોવી અને સ્ત્રીમાં ગર્ભાશયના કૅન્સરની હાજરી.", "B) પુરુષમાં ટેસ્ટોસ્ટેરોન હોર્મોનની ઉણપ અને સ્ત્રીમાં ફેલોપિયન ટ્યુબની અવરોધિતતા.", "B) પુરુષમાં શુક્રાણુઓની ગતિશીલતામાં ઘટાડો અને સ્ત્રીમાં પ્રોજેસ્ટેરોન હોર્મોનની અસંતુલન.", "D) પુરુષમાં સ્મોકિંગની આદત અને સ્ત્રીમાં અંડાશયમાં સિસ્ટની હાજરી."], "correct": 2, "explanation": "બાળક ન હોવાનું મુખ્ય કારણ પુરુષમાં શુક્રાણુઓની ગતિશીલતામાં ઘટાડો અને સ્ત્રીમાં પ્રોજેસ્ટેરોન હોર્મોનની અસંતુલન હોઈ શકે છે. વિકલ્પ A ખોટો છે કારણ કે ગર્ભાશયના કૅન્સરની હાજરી બાંઝપણનું કારણ નથી. વિકલ્પ B ખોટો છે કારણ કે ટેસ્ટોસ્ટેરોનની ઉણપ શુક્રાણુઓની ઉત્પત્તિને અસર કરે છે પરંતુ ફેલોપિયન ટ્યુબની અવરોધિતતા બાંઝપણનું કારણ છે પરંતુ તે સૌથી યોગ્ય વિકલ્પ નથી. વિકલ્પ D ખોટો છે કારણ કે સ્મોકિંગ અને અંડાશયમાં સિસ્ટ બાંઝપણના કારણો હોઈ શકે છે પરંતુ તે સૌથી યોગ્ય વિકલ્પ નથી.", "ncert_ref": "Class XII - પ્રકરણ 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 2}, {"question": "ગર્ભનિરોધક ગોળીઓ (Oral Contraceptive Pills) નો ઉપયોગ કરતી વખતે કયા હોર્મોનના સ્તરમાં વધારો થાય છે અને તેનો પ્રભાવ શું છે?", "options": ["A) એસ્ટ્રોજન અને પ્રોજેસ્ટેરોનના સ્તરમાં વધારો થાય છે અને તે અંડપતનને રોકે છે.", "B) ટેસ્ટોસ્ટેરોનના સ્તરમાં વધારો થાય છે અને તે શુક્રાણુઓની ઉત્પત્તિને રોકે છે.", "C) FSH અને LHના સ્તરમાં ઘટાડો થાય છે અને તે ગર્ભાશયની દીવાલને પાતળી કરે છે.", "D) પ્રોલેક્ટિનના સ્તરમાં વધારો થાય છે અને તે દૂધ ઉત્પાદનને પ્રેરે છે."], "correct": 0, "explanation": "ગર્ભનિરોધક ગોળીઓમાં એસ્ટ્રોજન અને પ્રોજેસ્ટેરોન હોર્મોન હોય છે જે અંડપતનને રોકે છે. વિકલ્પ B ખોટો છે કારણ કે ટેસ્ટોસ્ટેરોન પુરુષ હોર્મોન છે અને તે શુક્રાણુઓની ઉત્પત્તિને અસર કરે છે. વિકલ્પ C ખોટો છે કારણ કે FSH અને LHના સ્તરમાં ઘટાડો થાય છે પરંતુ ગર્ભાશયની દીવાલને પાતળી કરવાનો પ્રભાવ નથી. વિકલ્પ D ખોટો છે કારણ કે પ્રોલેક્ટિન દૂધ ઉત્પાદન સાથે સંબંધિત છે પરંતુ ગર્ભનિરોધક ગોળીઓ તેને પ્રભાવિત કરતી નથી.", "ncert_ref": "Class XII - પ્રકરણ 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 3}, {"question": "ZIFT (Zygote Intra Fallopian Transfer) અને GIFT (Gamete Intra Fallopian Transfer) વચ્ચેનો મુખ્ય તફાવત કયો છે?", "options": ["A) ZIFTમાં ફલિત અંડકોષને ફેલોપિયન ટ્યુબમાં મૂકવામાં આવે છે જ્યારે GIFTમાં અફલિત અંડકોષ અને શુક્રાણુઓને મૂકવામાં આવે છે.", "B) ZIFTમાં અંડકોષને લેબોરેટરીમાં ફલિત કરવામાં આવે છે જ્યારે GIFTમાં અંડકોષને શરીર બહાર ફલિત કરવામાં આવતું નથી.", "C) ZIFTમાં શુક્રાણુઓને ફેલોપિયન ટ્યુબમાં મૂકવામાં આવે છે જ્યારે GIFTમાં અંડકોષને મૂકવામાં આવે છે.", "D) ZIFT અને GIFT વચ્ચે કોઈ તફાવત નથી, બંને પ્રક્રિયાઓ એકસરખી છે."], "correct": 0, "explanation": "ZIFTમાં ફલિત અંડકોષ (ઝાયગોટ) ને ફેલોપિયન ટ્યુબમાં મૂકવામાં આવે છે જ્યારે GIFTમાં અફલિત અંડકોષ અને શુક્રાણુઓને ફેલોપિયન ટ્યુબમાં મૂકવામાં આવે છે. વિકલ્પ B ખોટો છે કારણ કે GIFTમાં અંડકોષને શરીર બહાર ફલિત કરવામાં આવતું નથી. વિકલ્પ C ખોટો છે કારણ કે ZIFT અને GIFT બંનેમાં અંડકોષ અને શુક્રાણુઓનો સમાવેશ થાય છે. વિકલ્પ D ખોટો છે કારણ કે બંને પ્રક્રિયાઓ અલગ છે.", "ncert_ref": "Class XII - પ્રકરણ 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 4}, {"question": "કયા રોગનો સંક્રમણ જનનાંગી માર્ગ દ્વારા થતો નથી?", "options": ["A) એડ્સ (AIDS)", "B) હેપેટાઇટિસ B", "C) ટાયફોઈડ (Typhoid)", "D) હર્પિસ (Herpes)"], "correct": 2, "explanation": "ટાયફોઈડ (Typhoid) એ સલ્મોનેલા ટાયફી બેક્ટેરિયા દ્વારા થતો રોગ છે જે દૂષિત ખોરાક અથવા પાણી દ્વારા ફેલાય છે, જનનાંગી માર્ગ દ્વારા નહીં. એડ્સ, હેપેટાઇટિસ B, અને હર્પિસ એ જનનાંગી માર્ગ દ્વારા ફેલાતા રોગો છે. વિકલ્પ A, B, અને D ખોટા છે કારણ કે તે જનનાંગી માર્ગ દ્વારા ફેલાય છે.", "ncert_ref": "Class XII - પ્રકરણ 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 5}, {"question": "ગર્ભાશયમાં સ્થાપિત થયેલ કોપર-T IUD ની કાર્યપદ્ધતિ વિશે નીચેના પૈકી કયું વિધાન સૌથી યોગ્ય છે?", "options": ["A) તે સ્ત્રીના અંડાશયમાં અંડપેઢીના ઉત્પાદનને રોકે છે.", "B) તે શુક્રાણુઓની ગતિશીલતાને ઘટાડીને તેમની ફલન ક્ષમતાને અસર કરે છે.", "C) તે ગર્ભાશયની અંદરના વાતાવરણને શુક્રાણુઓ અને અંડપેઢી માટે પ્રતિકૂળ બનાવે છે.", "D) તે હોર્મોન ઉત્સર્જન દ્વારા ગર્ભધારણને અટકાવે છે."], "correct": 2, "explanation": "કોપર-T IUD ની પ્રાથમિક કાર્યપદ્ધતિ એ છે કે તે ગર્ભાશયના અંદરના વાતાવરણને શુક્રાણુઓ અને અંડપેઢી માટે પ્રતિકૂળ બનાવે છે, જેથી ફલન થઈ શકતું નથી. તે અંડપેઢીના ઉત્પાદનને રોકતું નથી (A ખોટું), શુક્રાણુઓની ગતિશીલતાને ઘટાડતું નથી (B ખોટું), અને હોર્મોન ઉત્સર્જન દ્વારા કામ કરતું નથી (D ખોટું).", "ncert_ref": "Class XII - Chapter 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 6}, {"question": "નીચેના પૈકી કયું વિધાન 'સર્ટિફિકેટ ઓફ સ્ટરિલાઇઝેશન' (નપુંસકતા પ્રમાણપત્ર) વિશે સાચું નથી?", "options": ["A) તે વ્યક્તિની નપુંસકતાની પુષ્ટિ કરે છે.", "B) તે ગર્ભધારણ અટકાવવા માટેના શસ્ત્રક્રિયા પદ્ધતિ પછી આપવામાં આવે છે.", "C) તે કાયદેસર રીતે ગર્ભધારણ અટકાવવા માટેની શસ્ત્રક્રિયા કરાવનાર વ્યક્તિને મળે છે.", "D) તે ગર્ભધારણ અટકાવવા માટેની દવા લેનાર વ્યક્તિને આપવામાં આવે છે."], "correct": 3, "explanation": "'સર્ટિફિકેટ ઓફ સ્ટરિલાઇઝેશન' નપુંસકતા શસ્ત્રક્રિયા (જેમ કે ટ્યુબેકટોમી અથવા વેસેકટોમી) પછી આપવામાં આવે છે, જે વ્યક્તિની નપુંસકતાની પુષ્ટિ કરે છે (A સાચું), ગર્ભધારણ અટકાવવા માટેની શસ્ત્રક્રિયા પછી આપવામાં આવે છે (B સાચું), અને કાયદેસર રીતે શસ્ત્રક્રિયા કરાવનાર વ્યક્તિને મળે છે (C સાચું). પરંતુ તે દવા લેનાર વ્યક્તિને આપવામાં આવતું નથી (D ખોટું).", "ncert_ref": "Class XII - Chapter 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 7}, {"question": "નીચેના પૈકી કયો રોગ જનનાંગી માર્ગ દ્વારા સંક્રમિત થાય છે પરંતુ તેના લક્ષણો ગર્ભવતી સ્ત્રીમાં ગર્ભપાત તરફ દોરી શકે છે?", "options": ["A) ગોનોરિયા", "B) સિફિલિસ", "C) હર્પીઝ સિમ્પ્લેક્સ વાયરસ-2", "D) એડ્સ"], "correct": 1, "explanation": "સિફિલિસ જનનાંગી માર્ગ દ્વારા સંક્રમિત થાય છે અને ગર્ભવતી સ્ત્રીમાં ગર્ભપાત તરફ દોરી શકે છે. ગોનોરિયા (A) અને હર્પીઝ સિમ્પ્લેક્સ વાયરસ-2 (C) પણ જનનાંગી માર્ગ દ્વારા સંક્રમિત થાય છે, પરંતુ એડ્સ (D) ગર્ભપાતનું પ્રાથમિક કારણ નથી.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 8}, {"question": "નીચેના પૈકી કયું વિધાન 'ઇન વિટ્રો ફર્ટિલાઇઝેશન (IVF)' વિશે સાચું નથી?", "options": ["A) તે અંડપેઢી અને શુક્રાણુઓને ગર્ભાશયની બહાર ફલન કરાવવા માટે વાપરવામાં આવે છે.", "B) તે અંડપેઢીને અંડાશયમાંથી કાઢીને પેટ્રી ડિશમાં ફલન કરાવવામાં આવે છે.", "C) તે ગર્ભાશયમાં સીધું જ ફલિત અંડપેઢી મૂકવામાં આવે છે.", "D) તે નિષેચન સમસ્યાવાળા દંપતી માટે ઉપયોગી છે."], "correct": 2, "explanation": "IVF માં અંડપેઢી અને શુક્રાણુઓને ગર્ભાશયની બહાર ફલન કરાવવામાં આવે છે (A સાચું), અંડપેઢીને અંડાશયમાંથી કાઢીને પેટ્રી ડિશમાં ફલન કરાવવામાં આવે છે (B સાચું), અને તે નિષેચન સમસ્યાવાળા દંપતી માટે ઉપયોગી છે (D સાચું). પરંતુ ફલિત અંડપેઢીને ગર્ભાશયમાં સીધું જ મૂકવામાં આવતું નથી, પરંતુ તેને ગર્ભાશયમાં મૂકવા પહેલા તેને કેટલાક દિવસ સુધી વિકસાવવામાં આવે છે (C ખોટું).", "ncert_ref": "Class XII - Chapter 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 9}, {"question": "નીચેના પૈકી કયું વિધાન 'પ્રજનન આરોગ્ય' ની વ્યાખ્યા વિશે સાચું છે?", "options": ["A) તે ફક્ત શારીરિક આરોગ્ય સાથે સંબંધિત છે.", "B) તે ફક્ત માનસિક અને સામાજિક આરોગ્ય સાથે સંબંધિત છે.", "C) તે શારીરિક, માનસિક અને સામાજિક આરોગ્ય સાથે સંબંધિત છે.", "D) તે ફક્ત ગર્ભધારણ અટકાવવા સાથે સંબંધિત છે."], "correct": 2, "explanation": "પ્રજનન આરોગ્યની વ્યાખ્યા શારીરિક, માનસિક અને સામાજિક આરોગ્યને આચ્છાદિત કરે છે. તે ફક્ત શારીરિક આરોગ્ય (A ખોટું), માનસિક અને સામાજિક આરોગ્ય (B ખોટું), અથવા ફક્ત ગર્ભધારણ અટકાવવા (D ખોટું) સાથે સંબંધિત નથી.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 10}, {"question": "નીચેના પૈકી કયું વિધાન 'સર્વાઇકલ કેપ' (Cervical Cap) વિશે સાચું છે?", "options": ["A) તે ગર્ભાશયના મુખને ઢાંકીને શુક્રાણુઓને અંડકોષ સુધી પહોંચતા અટકાવે છે અને તેને ગર્ભનિરોધક ગોળીઓ સાથે વાપરવું જરૂરી છે.", "B) તે યોનિમાં મૂકવામાં આવે છે અને શુક્રાણુઓને અંડકોષ સાથે મિશ્રિત થતા અટકાવે છે, પરંતુ તે એચઆઈવી જેવા સંક્રમણથી બચાવતું નથી.", "C) તે હોર્મોનલ ગર્ભનિરોધક છે જે અંડપિંડમાં અંડકોષના ઉત્પાદનને અટકાવે છે.", "D) તે સ્થાયી ગર્ભનિરોધક પદ્ધતિ છે જે શસ્ત્રક્રિયા દ્વારા લગાવવામાં આવે છે."], "correct": 1, "explanation": "સર્વાઇકલ કેપ યોનિમાં મૂકવામાં આવે છે અને તે ગર્ભાશયના મુખને ઢાંકીને શુક્રાણુઓને અંડકોષ સુધી પહોંચતા અટકાવે છે. પરંતુ તે એચઆઈવી જેવા સંક્રમણથી બચાવતું નથી. વિકલ્પ A ખોટો છે કારણ કે સર્વાઇકલ કેપને ગર્ભનિરોધક ગોળીઓ સાથે વાપરવું જરૂરી નથી. વિકલ્પ C ખોટો છે કારણ કે તે હોર્મોનલ ગર્ભનિરોધક નથી. વિકલ્પ D ખોટો છે કારણ કે તે સ્થાયી ગર્ભનિરોધક પદ્ધતિ નથી.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 11}, {"question": "નીચેના પૈકી કયો રોગ 'હ્યુમન પેપિલોમા વાયરસ' (HPV) દ્વારા થાય છે અને તેનો સંક્રમણ જનનાંગી માર્ગ દ્વારા થાય છે?", "options": ["A) સિફિલિસ", "B) ગોનોરિયા", "C) જનનાંગી કોંડિલોમા (Genital Warts)", "D) હર્પીસ"], "correct": 2, "explanation": "હ્યુમન પેપિલોમા વાયરસ (HPV) દ્વારા જનનાંગી કોંડિલોમા (Genital Warts) થાય છે અને તેનો સંક્રમણ જનનાંગી માર્ગ દ્વારા થાય છે. સિફિલિસ, ગોનોરિયા, અને હર્પીસ અન્ય જનનાંગી રોગો છે જે HPV દ્વારા થતા નથી.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 12}, {"question": "નીચેના પૈકી કયું વિધાન 'ઇમરજન્સી ગર્ભનિરોધક ગોળીઓ' (Emergency Contraceptive Pills) વિશે સાચું નથી?", "options": ["A) તે અસુરક્ષિત સંભોગ પછી 72 કલાકની અંદર લેવી જોઈએ.", "B) તે હોર્મોનલ ગોળીઓ છે જે અંડકોષના નિષેચનને અટકાવે છે.", "C) તે ગર્ભાવસ્થા ટાળવા માટે 100% અસરકારક છે.", "D) તે અંડકોષના ફલનને અટકાવે છે અથવા ગર્ભાશયની દીવાલમાં ઇમ્પ્લાન્ટેશનને રોકે છે."], "correct": 2, "explanation": "ઇમરજન્સી ગર્ભનિરોધક ગોળીઓ અસુરક્ષિત સંભોગ પછી 72 કલાકની અંદર લેવી જોઈએ અને તે હોર્મોનલ ગોળીઓ છે જે અંડકોષના નિષેચનને અટકાવે છે અથવા ગર્ભાશયની દીવાલમાં ઇમ્પ્લાન્ટેશનને રોકે છે. પરંતુ તે ગર્ભાવસ્થા ટાળવા માટે 100% અસરકારક નથી.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 13}, {"question": "નીચેના પૈકી કયું વિધાન 'વંધ્યત્વ' (Infertility) વિશે સાચું છે?", "options": ["A) વંધ્યત્વ એટલે સ્ત્રી અથવા પુરુષમાં બાળક પેદા કરવાની અક્ષમતા જે કાયમી હોય છે.", "B) વંધ્યત્વનું કારણ ફક્ત સ્ત્રીના શરીરમાં જ હોય છે.", "C) વંધ્યત્વનું નિદાન અને ઉપચાર આધુનિક તકનીકો દ્વારા શક્ય છે.", "D) વંધ્યત્વ એટલે સ્ત્રી અથવા પુરુષમાં બાળક પેદા કરવાની અક્ષમતા જે કાયમી હોય છે અને તેનું કારણ ફક્ત જનીન દોષોમાં જ હોય છે."], "correct": 2, "explanation": "વંધ્યત્વનું નિદાન અને ઉપચાર આધુનિક તકનીકો દ્વારા શક્ય છે. વિકલ્પ A ખોટો છે કારણ કે વંધ્યત્વ કાયમી નથી હોતું. વિકલ્પ B ખોટો છે કારણ કે વંધ્યત્વનું કારણ પુરુષ અથવા સ્ત્રી બંનેમાં હોઈ શકે છે. વિકલ્પ D ખોટો છે કારણ કે વંધ્યત્વનું કારણ ફક્ત જનીન દોષોમાં જ નથી હોતું.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 14}, {"question": "નીચેના પૈકી કયું વિધાન 'અસરકારક ગર્ભનિરોધક પદ્ધતિ' અને 'પ્રજનન આરોગ્ય' ના સંદર્ભમાં સાચું નથી?", "options": ["A) કોપર-T IUD ની અસરકારકતા ગર્ભાશયની આકાર અને કદ પર આધાર રાખે છે, કારણ કે તે સ્પર્મની ગતિશીલતાને અવરોધે છે.", "B) સ્ટેરિલાઇઝેશન (નપુંસકતા) પદ્ધતિ જેવી કે ટ્યુબેકટોમી અને વેસેકટોમી એ કાયમી ગર્ભનિરોધક પદ્ધતિઓ છે, પરંતુ તેના પરિણામે હોર્મોનલ અસંતુલન થતું નથી.", "C) કોન્ડોમનો ઉપયોગ ના ફક્ત ગર્ભધારણ અટકાવે છે, પરંતુ જનનાંગી રોગોના સંક્રમણથી પણ બચાવે છે.", "D) ગર્ભનિરોધક ઇજેક્શન (Depo-Provera) એ હોર્મોનલ પદ્ધતિ છે જે મહિલાઓમાં ઓવ્યુલેશન અટકાવે છે અને ગર્ભાશયના શ્લેષ્મને ઘટાડે છે."], "correct": 0, "explanation": "વિધાન A ખોટું છે કારણ કે કોપર-T IUD ની અસરકારકતા ગર્ભાશયની આકાર અને કદ પર આધાર રાખતી નથી. કોપર-T IUD સ્પર્મની ગતિશીલતા અને અંડકોષની ફલનક્ષમતા બંનેને અવરોધે છે, પરંતુ તેની અસરકારકતા મુખ્યત્વે કોપર આયનના સ્રાવ પર આધાર રાખે છે, ન કે ગર્ભાશયના આકાર પર. વિધાન B સાચું છે કારણ કે સ્ટેરિલાઇઝેશન પદ્ધતિઓ કાયમી છે અને તે હોર્મોનલ અસંતુલન પેદા કરતી નથી. વિધાન C સાચું છે કારણ કે કોન્ડોમ ગર્ભધારણ અને જનનાંગી રોગો બંનેથી બચાવે છે. વિધાન D સાચું છે કારણ કે ગર્ભનિરોધક ઇજેક્શન હોર્મોનલ પદ્ધતિ છે જે ઓવ્યુલેશન અટકાવે છે અને ગર્ભાશયના શ્લેષ્મને ઘટાડે છે.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 15}, {"question": "નીચેના પૈકી કયું વિધાન 'પ્રજનન આરોગ્ય' ની વ્યાખ્યામાં સમાવિષ્ટ નથી?", "options": ["A) ગર્ભાવસ્થા દરમિયાન સ્ત્રી અને ભ્રૂણના આરોગ્યની જાળવણી", "B) લૈંગિક રીતે સંક્રમિત રોગોની રોકથામ અને ઉપચાર", "C) કુટુંબ નિયોજન પદ્ધતિઓનો ઉપયોગ અને જાગૃતિ", "D) બાળકના જન્મ પછી તેના શિક્ષણ અને કૌશલ્ય વિકાસની યોજના"], "correct": 3, "explanation": "પ્રજનન આરોગ્યની વ્યાખ્યામાં ગર્ભાવસ્થા, પ્રસૂતિ, લૈંગિક આરોગ્ય, કુટુંબ નિયોજન અને સ્ત્રી-પુરુષના પ્રજનન અંગોના આરોગ્યનો સમાવેશ થાય છે. બાળકના જન્મ પછીના શિક્ષણ અને કૌશલ્ય વિકાસ એ પ્રજનન આરોગ્યનો ભાગ નથી, પરંતુ તે સામાજિક અને શૈક્ષણિક ક્ષેત્ર સાથે સંબંધિત છે. A, B, અને C વિધાનો પ્રજનન આરોગ્યની વ્યાખ્યામાં સમાવિષ્ટ છે.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 16}, {"question": "નીચેના પૈકી કયો રોગ 'હ્યુમન ઇમ્યુનોડેફિશિયન્સી વાયરસ' (HIV) દ્વારા થતો નથી, પરંતુ લૈંગિક સંપર્ક દ્વારા ફેલાય છે?", "options": ["A) એડ્ઝ (AIDS)", "B) હેપેટાઇટિસ B", "C) ગોનોરિયા", "D) સિફિલિસ"], "correct": 1, "explanation": "HIV દ્વારા થતો રોગ એડ્ઝ (AIDS) છે, જે લૈંગિક સંપર્ક દ્વારા ફેલાય છે. હેપેટાઇટિસ B પણ લૈંગિક સંપર્ક દ્વારા ફેલાય છે, પરંતુ તે HIV દ્વારા થતો નથી. ગોનોરિયા અને સિફિલિસ બંને લૈંગિક સંપર્ક દ્વારા ફેલાતા રોગો છે, પરંતુ તેઓ બેક્ટેરિયા દ્વારા થાય છે.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 17}, {"question": "નીચેના પૈકી કયું વિધાન 'ઇન્ટ્રા યુટેરિન ડિવાઇસ' (IUD) વિશે સાચું નથી?", "options": ["A) કોપર-T IUD ગર્ભાશયમાં સ્થાપિત થાય છે અને તે સ્ત્રીના હોર્મોનલ સંતુલનને બદલે છે.", "B) IUD ગર્ભાશયમાં ફલિત અંડકોષના ઇમ્પ્લાન્ટેશનને અટકાવે છે.", "C) IUD નો ઉપયોગ લાંબા ગાળાના ગર્ભનિરોધક પદ્ધતિ તરીકે થાય છે.", "D) IUD નો ઉપયોગ ગર્ભાવસ્થા દરમિયાન કરવામાં આવતો નથી."], "correct": 0, "explanation": "કોપર-T IUD ગર્ભાશયમાં સ્થાપિત થાય છે અને તે સ્ત્રીના હોર્મોનલ સંતુલનને બદલતું નથી. તે ગર્ભાશયમાં સ્થાપિત થઈને ફલિત અંડકોષના ઇમ્પ્લાન્ટેશનને અટકાવે છે. IUD લાંબા ગાળાના ગર્ભનિરોધક પદ્ધતિ તરીકે ઉપયોગી છે અને ગર્ભાવસ્થા દરમિયાન તેનો ઉપયોગ કરવામાં આવતો નથી.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 18}, {"question": "નીચેના પૈકી કયું વિધાન 'વંધ્યત્વ' (Infertility) વિશે સાચું નથી?", "options": ["A) વંધ્યત્વ એટલે એક વર્ષ સુધી નિયમિત લૈંગિક સંબંધો બાદ પણ ગર્ભ ધારણ ન કરવા સક્ષમ ન હોવું.", "B) વંધ્યત્વનું કારણ સ્ત્રી અથવા પુરુષ બંનેમાં હોઈ શકે છે.", "C) વંધ્યત્વનું નિદાન કરવા માટે 'હિસ્ટેરોસ્કોપી' પદ્ધતિનો ઉપયોગ કરવામાં આવે છે.", "D) વંધ્યત્વનું કારણ ફક્ત સ્ત્રીના પ્રજનન અંગોમાં જ હોય છે."], "correct": 3, "explanation": "વંધ્યત્વ એટલે એક વર્ષ સુધી નિયમિત લૈંગિક સંબંધો બાદ પણ ગર્ભ ધારણ ન કરવા સક્ષમ ન હોવું. વંધ્યત્વનું કારણ સ્ત્રી અથવા પુરુષ બંનેમાં હોઈ શકે છે. વંધ્યત્વનું નિદાન કરવા માટે 'હિસ્ટેરોસ્કોપી' પદ્ધતિનો ઉપયોગ કરવામાં આવે છે. વંધ્યત્વનું કારણ ફક્ત સ્ત્રીના પ્રજનન અંગોમાં જ નહીં, પરંતુ પુરુષના પ્રજનન અંગોમાં પણ હોઈ શકે છે.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 19}, {"question": "નીચેના પૈકી કયું વિધાન 'સુરક્ષિત ગર્ભપાત' (Safe Abortion) અને 'પ્રજનન આરોગ્ય' ના સંદર્ભમાં સાચું છે?", "options": ["A) ભારતમાં, 'મેડિકલ ટર્મિનેશન ઓફ પ્રેગ્નેન્સી (MTP) એક્ટ, 1971' અનુસાર, ગર્ભપાત કરાવવા માટે મહિલાને પતિની સંમતિની જરૂર પડે છે.", "B) સુરક્ષિત ગર્ભપાત માટે, ગર્ભાવસ્થાનો સમયગાળો 20 અઠવાડિયાથી ઓછો હોવો જોઈએ, પરંતુ ચિકિત્સકની સલાહ અનુસાર 24 અઠવાડિયા સુધી પરવાનગી આપવામાં આવે છે.", "C) ગર્ભપાત માટે 'વેક્યુમ એસ્પિરેશન' પદ્ધતિ ફક્ત પ્રથમ ત્રિમાસિક (First Trimester) દરમિયાન જ ઉપયોગમાં લેવાય છે.", "D) સુરક્ષિત ગર્ભપાત માટે, મહિલાને કાયદેસરની સંસ્થામાં જવું અનિવાર્ય છે, પરંતુ તેના માટે કોઈપણ ચિકિત્સક દ્વારા કરાવી શકાય છે."], "correct": 1, "explanation": "વિકલ્પ B સાચો છે કારણ કે ભારતના MTP એક્ટ મુજબ, સુરક્ષિત ગર્ભપાત માટે ગર્ભાવસ્થાનો સમયગાળો 20 અઠવાડિયાથી ઓછો હોવો જોઈએ, પરંતુ ચિકિત્સકની સલાહ અનુસાર 24 અઠવાડિયા સુધી પરવાનગી આપવામાં આવે છે. વિકલ્પ A ખોટો છે કારણ કે MTP એક્ટ અનુસાર, ગર્ભપાત કરાવવા માટે મહિલાને પતિની સંમતિની જરૂર પડતી નથી. વિકલ્પ C ખોટો છે કારણ કે 'વેક્યુમ એસ્પિરેશન' પદ્ધતિ પ્રથમ ત્રિમાસિક દરમિયાન ઉપયોગમાં લેવાય છે, પરંતુ બીજા ત્રિમાસિકમાં પણ કેટલીક પરિસ્થિતિઓમાં ઉપયોગમાં લેવાય શકે છે. વિકલ્પ D ખોટો છે કારણ કે સુરક્ષિત ગર્ભપાત માટે, મહિલાને કાયદેસરની સંસ્થામાં જવું અનિવાર્ય છે, પરંતુ તેના માટે મંજૂર ચિકિત્સક દ્વારા જ કરાવી શકાય છે.", "ncert_ref": "Class XII - પ્રકરણ 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 20}, {"question": "નીચેના પૈકી કયું વિધાન 'સહાયિત પ્રજનન તકનીક' (ART) ના સંદર્ભમાં સાચું નથી?", "options": ["A) ICSI (Intracytoplasmic Sperm Injection) માં એક જ શુક્રાણુને અંડકોષના કોષકેન્દ્રમાં ઇન્જેક્ટ કરવામાં આવે છે.", "B) IVF (In Vitro Fertilization) માં ફલન લેબોરેટરીમાં થાય છે અને નિષેચિત અંડકોષને ગર્ભાશયમાં સ્થાપિત કરવામાં આવે છે.", "C) GIFT (Gamete Intra Fallopian Transfer) માં અંડકોષ અને શુક્રાણુઓને ફેલોપિયન ટ્યુબમાં સીધા જ સ્થાપિત કરવામાં આવે છે, જ્યાં ફલન થાય છે.", "D) ZIFT (Zygote Intra Fallopian Transfer) માં નિષેચિત અંડકોષને ગર્ભાશયમાં સ્થાપિત કરવામાં આવે છે, નહીં કે ફેલોપિયન ટ્યુબમાં."], "correct": 3, "explanation": "ZIFT માં નિષેચિત અંડકોષ (ઝાયગોટ) ને ફેલોપિયન ટ્યુબમાં સ્થાપિત કરવામાં આવે છે, ગર્ભાશયમાં નહીં. આથી વિધાન D ખોટું છે. ICSI, IVF, અને GIFT ના વિધાનો સાચાં છે.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 21}, {"question": "નીચેના પૈકી કયો રોગ 'ક્લેમાઇડિયા ટ્રેકોમેટિસ' દ્વારા થતો નથી, પરંતુ તે જનનાંગી માર્ગ દ્વારા સંક્રમિત થાય છે?", "options": ["A) ગોનોરિયા", "B) ટ્રાઇકોમોનિયાસિસ", "C) સિફિલિસ", "D) જનનાંગીય દાદ"], "correct": 1, "explanation": "ટ્રાઇકોમોનિયાસિસ 'ટ્રાઇકોમોનાસ વેજિનેલિસ' દ્વારા થાય છે, નહીં કે 'ક્લેમાઇડિયા ટ્રેકોમેટિસ' દ્વારા. ગોનોરિયા, સિફિલિસ, અને જનનાંગીય દાદ (હર્પીસ) જનનાંગી માર્ગ દ્વારા સંક્રમિત થાય છે, પરંતુ તે 'ક્લેમાઇડિયા' દ્વારા થતા નથી.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 22}, {"question": "નીચેના પૈકી કયું વિધાન 'પ્રજનન આરોગ્ય' ના સંદર્ભમાં 'સુરક્ષિત મા' (Safe Motherhood) ની વ્યાખ્યામાં સમાવિષ્ટ નથી?", "options": ["A) ગર્ભાવસ્થા દરમિયાન સંપૂર્ણ પોષણ અને આરોગ્ય સેવાઓની ઉપલબ્ધતા.", "B) પ્રસૂતિ દરમિયાન સુરક્ષિત અને સ્વચ્છ વાતાવરણ.", "C) બાળકના જન્મ પછી મા અને બાળક બંનેના સ્વાસ્થ્યની ખાતરી.", "D) ગર્ભાવસ્થા દરમિયાન મહિલાને કામ પરથી રજા ન આપવી."], "correct": 3, "explanation": "સુરક્ષિત મા ની વ્યાખ્યામાં ગર્ભાવસ્થા દરમિયાન મહિલાને કામ પરથી રજા ન આપવી એ સમાવિષ્ટ નથી. A, B, અને C વિધાનો સુરક્ષિત મા ની વ્યાખ્યાનો ભાગ છે.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 23}, {"question": "નીચેના પૈકી કયું વિધાન 'ગર્ભનિરોધક ઇમ્પ્લાન્ટ' વિશે સાચું નથી?", "options": ["A) તે ત્વચા હેઠળ મૂકવામાં આવે છે અને લાંબા સમય સુધી અસરકારક રહે છે.", "B) તે પ્રોજેસ્ટેરોન હોર્મોન છોડે છે, જે અંડોત્સર્ગને અટકાવે છે.", "C) તે સ્તનપાન કરાવતી મહિલાઓ માટે યોગ્ય નથી.", "D) તે રક્તસ્રાવના ચક્રને અસર કરે છે અને તેને હલકો બનાવે છે."], "correct": 2, "explanation": "ગર્ભનિરોધક ઇમ્પ્લાન્ટ સ્તનપાન કરાવતી મહિલાઓ માટે યોગ્ય છે, કારણ કે તે સ્તનપાનને અસર કરતું નથી. A, B, અને D વિધાનો સાચાં છે.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન આરોગ્ય", "difficulty": "Hard", "num": 24}, {"question": "નીચેના પૈકી કયું વિધાન 'પ્રજનન આરોગ્ય' ના સંદર્ભમાં 'લિંગ અનુપાત' (Sex Ratio) વિશે સાચું નથી?", "options": ["A) લિંગ અનુપાત એ પ્રતિ 1000 પુરુષો પર સ્ત્રીઓની સંખ્યા દર્શાવે છે.", "B) ભારતમાં લિંગ અનુપાતમાં ઘટાડો થવાનું મુખ્ય કારણ કન્યા ભ્રૂણહત્યા છે.", "C) લિંગ અનુપાતમાં સુધારો લાવવા માટે સરકાર દ્વારા 'બેટી બચાઓ, બેટી પઢાઓ' જેવી યોજનાઓ ચલાવવામાં આવે છે.", "D) લિંગ અનુપાત એ ફક્ત ગ્રામીણ લાઇઝેશન (IVF) સાથે ઇન્ટ્રાસાયટોપ્લાઝમિક શુક્રકોષ ઇન્જેક્શન (ICSI)", "B) ઇન્ટ્રાયુટેરિન ઇન્સેમિનેશન (IUI) સાથે વીર્યને ધોવાની પ્રક્રિયા", "C) ગેમેટ ઇન્ટ્રા ફેલોપિયન ટ્રાન્સફર (GIFT)", "D) ઝાયગોટ ઇન્ટ્રા ફેલોપિયન ટ્રાન્સફર (ZIFT)"], "correct": 0, "explanation": "આ સ્થિતિમાં શુક્રકોષોની ગતિશીલતા ઓછી હોવાથી કુદરતી ફલન મુશ્કેલ બને છે. ICSI પદ્ધતિમાં એક શુક્રકોષને સીધો અંડકોષમાં ઇન્જેક્ટ કરવામાં આવે છે, જેનાથી ફલનની શક્યતા વધે છે. IUI પદ્ધતિ ઓછી ગતિશીલતા ધરાવતા શુક્રકોષો માટે અસરકારક નથી કારણ કે તેમાં શુક્રકોષોને અંડકોષ સુધી પહોંચવા માટે પોતાની ગતિશીલતા પર આધાર રાખવો પડે છે. GIFT અને ZIFT પદ્ધતિઓમાં પણ શુક્રકોષોની ગતિશીલતા મહત્વપૂર્ણ છે, તેથી આ સ્થિતિમાં ઓછી અસરકારક છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 4: પ્રજનન આરોગ્ય (સહાયિત પ્રજનન તકનીકો)", "difficulty": "Hard", "num": 39}, {"question": "નીચેના પૈકી કયું વિધાન 'સહાયિત પ્રજનન તકનીકો (ART)' ના સંદર્ભમાં સાચું નથી, પરંતુ તે 'પ્રજનન આરોગ્ય' ના અન્ય પાસાં સાથે સંબંધિત છે?", "options": ["A) ICSI પદ્ધતિમાં એક શુક્રકોષને સીધો અંડકોષમાં ઇન્જેક્ટ કરવામાં આવે છે, જે ગંભીર પુરુષ વંધ્યત્વના કિસ્સામાં ઉપયોગી છે.", "B) GIFT પદ્ધતિમાં અંડકોષ અને શુક્રકોષને સીધા ફેલોપિયન નલિકામાં ટ્રાન્સફર કરવામાં આવે છે, જ્યાં કુદરતી ફલન થાય છે.", "C) IVF પદ્ધતિમાં ફલન પ્રયોગશાળામાં થાય છે અને પછી ગર્ભને ગર્ભાશયમાં સ્થાપિત કરવામાં આવે છે, જેને કારણે તેને 'ટેસ્ટ ટ્યુબ બેબી' તરીકે ઓળખવામાં આવે છે.", "D) IUI પદ્ધતિમાં શુક્રકોષોને સીધા ગર્ભાશયમાં ઇન્જેક્ટ કરવામાં આવે છે, જે ગર્ભાશયના મુખ અને ગ્રીવાના શ્લેષ્મને બાયપાસ કરે છે અને તેને કારણે સ્ત્રીઓમાં ગ્રીવાના શ્લેષ્મની સમસ્યાઓ દૂર થાય છે."], "correct": 3, "explanation": "IUI પદ્ધતિમાં શુક્રકોષોને ગર્ભાશયમાં ઇન્જેક્ટ કરવામાં આવે છે, પરંતુ તે ગ્રીવાના શ્લેષ્મને બાયપાસ કરતું નથી કે તેની સમસ્યાઓ દૂર કરતું નથી. ગ્રીવાના શ્લેષ્મની સમસ્યાઓ માટે અન્ય સારવારો જરૂરી છે. બાકીના વિકલ્પો ART ની પદ્ધતિઓ વિશે સાચી માહિતી આપે છે: ICSI ગંભીર પુરુષ વંધ્યત્વ માટે, GIFT ફલન ફેલોપિયન નલિકામાં થાય છે, અને IVF પ્રયોગશાળામાં ફલન સાથે સંબંધિત છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 4: પ્રજનન આરોગ્ય (સહાયિત પ્રજનન તકનીકો અને ગર્ભન                 let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
