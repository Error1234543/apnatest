<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - વસતિ વૃદ્ધિ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 વસતિ વૃદ્ધિ</span>
                <span>🎯 Hard</span>
                <span>📝 48 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "જ્યારે કોષની વસતિમાં લૉગ ફેઝ (log phase) દરમિયાન કોષવિભાજનનો દર સ્થિર રહે છે, ત્યારે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) કોષવિભાજનનો દર સતત વધતો જાય છે કારણ કે પોષક દ્રવ્યોની ઉપલબ્ધતા વધે છે.", "B) કોષવિભાજનનો દર સ્થિર રહે છે કારણ કે નવી ઉત્પન્ન થતી કોષો તરત જ વિભાજન પામે છે.", "C) કોષવિભાજનનો દર ઘટે છે કારણ કે ઉત્સર્જન પદાર્થોનો સાંદ્રતા વધે છે.", "D) કોષવિભાજનનો દર શૂન્ય થાય છે કારણ કે કોષો મૃત્યુ પામે છે."], "correct": 1, "explanation": "લૉગ ફેઝ દરમિયાન, કોષવિભાજનનો દર સ્થિર રહે છે કારણ કે નવી ઉત્પન્ન થતી કોષો તરત જ વિભાજન પામે છે, જેથી વસતિનો વૃદ્ધિ દર સ્થિર રહે છે. A) ખોટું છે કારણ કે પોષક દ્રવ્યોની ઉપલબ્ધતા સ્થિર રહે છે, નહીં કે વધે. C) ખોટું છે કારણ કે ઉત્સર્જન પદાર્થોનો પ્રભાવ સ્ટેશનરી ફેઝમાં જોવા મળે છે. D) ખોટું છે કારણ કે કોષો મૃત્યુ પામતા નથી, પરંતુ વિભાજન પામે છે.", "ncert_ref": "Class XII - પ્રકરણ ૯: વસતિ વૃદ્ધિ અને વસતિ વંશવેલા", "difficulty": "Hard", "num": 1}, {"question": "એક જીવજંતુની વસતિમાં, જ્યારે પોષક દ્રવ્યોની ઉપલબ્ધતા મર્યાદિત હોય છે, ત્યારે વસતિ વૃદ્ધિનું વક્ર કેવું દેખાય છે?", "options": ["A) S-આકારનું વક્ર", "B) J-આકારનું વક્ર", "C) રેખીય વક્ર", "D) ઘટતું વક્ર"], "correct": 0, "explanation": "પોષક દ્રવ્યોની મર્યાદિત ઉપલબ્ધતામાં, વસતિ વૃદ્ધિ S-આકારનું વક્ર દર્શાવે છે, જેમાં પ્રારંભિક લૉગ ફેઝ પછી વસતિ વૃદ્ધિ ધીમી પડે છે અને સ્ટેશનરી ફેઝમાં પ્રવેશે છે. B) ખોટું છે કારણ કે J-આકારનું વક્ર અમર્યાદિત પોષક દ્રવ્યોની ઉપલબ્ધતામાં જોવા મળે છે. C) ખોટું છે કારણ કે રેખીય વક્ર વસતિ વૃદ્ધિના પ્રારંભિક તબક્કામાં જોવા મળે છે. D) ખોટું છે કારણ કે વસતિ વૃદ્ધિ ઘટતી નથી, પરંતુ સ્થિર થાય છે.", "ncert_ref": "Class XII - પ્રકરણ ૯: વસતિ વૃદ્ધિ અને વસતિ વંશવેલા", "difficulty": "Hard", "num": 2}, {"question": "નીચેનામાંથી કયું વિધાન વસતિ વૃદ્ધિના સ્ટેશનરી ફેઝ વિશે સાચું નથી?", "options": ["A) કોષવિભાજનનો દર અને કોષ મૃત્યુનો દર સમાન થાય છે.", "B) પોષક દ્રવ્યોની ઉપલબ્ધતા મર્યાદિત હોય છે.", "C) વસતિનો આકાર સ્થિર રહે છે.", "D) કોષવિભાજનનો દર વધુ રહે છે કરતાં કોષ મૃત્યુનો દર."], "correct": 3, "explanation": "સ્ટેશનરી ફેઝમાં, કોષવિભાજનનો દર અને કોષ મૃત્યુનો દર સમાન થાય છે, જેથી વસતિનો આકાર સ્થિર રહે છે. A), B), અને C) સાચા છે. D) ખોટું છે કારણ કે કોષવિભાજનનો દર અને કોષ મૃત્યુનો દર સમાન થાય છે, નહીં કે કોષવિભાજનનો દર વધુ રહે.", "ncert_ref": "Class XII - પ્રકરણ ૯: વસતિ વૃદ્ધિ અને વસતિ વંશવેલા", "difficulty": "Hard", "num": 3}, {"question": "વસતિ વૃદ્ધિના લેગ ફેઝ (lag phase) દરમિયાન, કોષો ક્યાં તબક્કામાં હોય છે?", "options": ["A) કોષો સક્રિય રીતે વિભાજન પામે છે.", "B) કોષો પોષક દ્રવ્યોનો સંગ્રહ કરે છે અને તૈયારી કરે છે.", "C) કોષો મૃત્યુ પામે છે.", "D) કોષો સ્થિર અવસ્થામાં હોય છે."], "correct": 1, "explanation": "લેગ ફેઝ દરમિયાન, કોષો પોષક દ્રવ્યોનો સંગ્રહ કરે છે અને વિભાજન માટે તૈયારી કરે છે. A) ખોટું છે કારણ કે કોષો સક્રિય રીતે વિભાજન પામતા નથી. C) ખોટું છે કારણ કે કોષો મૃત્યુ પામતા નથી. D) ખોટું છે કારણ કે કોષો સ્થિર અવસ્થામાં નથી હોતા, પરંતુ તૈયારી કરે છે.", "ncert_ref": "Class XII - પ્રકરણ ૯: વસતિ વૃદ્ધિ અને વસતિ વંશવેલા", "difficulty": "Hard", "num": 4}, {"question": "નીચેનામાંથી કયું પરિબળ વસતિ વૃદ્ધિને પ્રભાવિત કરતું નથી?", "options": ["A) તાપમાન", "B) પોષક દ્રવ્યોની ઉપલબ્ધતા", "C) પ્રકાશની તીવ્રતા", "D) કોષના આકાર"], "correct": 3, "explanation": "વસતિ વૃદ્ધિને તાપમાન, પોષક દ્રવ્યોની ઉપલબ્ધતા, અને પ્રકાશની તીવ્રતા જેવા પરિબળો પ્રભાવિત કરે છે. કોષના આકાર એ વસતિ વૃદ્ધિને પ્રભાવિત કરતું નથી. A), B), અને C) સાચા પરિબળો છે.", "ncert_ref": "Class XII - પ્રકરણ ૯: વસતિ વૃદ્ધિ અને વસતિ વંશવેલા", "difficulty": "Hard", "num": 5}, {"question": "વસતિ વૃદ્ધિના સિગ્મોઇડ (S-shaped) વક્રમાં, કયા તબક્કા દરમિયાન વસતિનો વૃદ્ધિ દર ધીરે ધીરે ઘટતો જાય છે અને અંતે શૂન્ય થાય છે?", "options": ["A) લેગ ફેઝ (Lag phase)", "B) લૉગ ફેઝ (Log phase)", "C) સ્ટેશનરી ફેઝ (Stationary phase)", "D) ડિક્લાઇન ફેઝ (Decline phase)"], "correct": 3, "explanation": "ડિક્લાઇન ફેઝ દરમિયાન વસતિનો વૃદ્ધિ દર ઘટતો જાય છે અને અંતે શૂન્ય થાય છે, કારણ કે પર્યાવરણીય પરિબળો (જેવા કે પોષક દ્રવ્યોની ઉણપ, ઉત્સર્જન પદાર્થોનો સંગ્રહ) વસતિના અસ્તિત્વ માટે પ્રતિકૂળ બનવા લાગે છે. લેગ ફેઝમાં વૃદ્ધિ ધીમી હોય છે, લૉગ ફેઝમાં વૃદ્ધિ દર સ s": ["A) લેગ ફેઝ (Lag phase)", "B) લૉગ ફેઝ (Log phase)", "C) સ્ટેશનરી ફેઝ (Stationary phase)", "D) ડિક્લાઇન ફેઝ (Decline phase)"], "correct": 2, "explanation": "સ્ટેશનરી ફેઝ દરમિયાન, વસતિ વૃદ્ધિનો દર શૂન્ય થાય છે કારણ કે નવા કોષોનું નિર્માણ અને જૂના કોષોનું મૃત્યુ સંતુલિત થાય છે. જ્યારે પોષક દ્રવ્યોની ઉપલબ્ધતા અચાનક ઘટી જાય છે, ત્યારે કોષોની સંખ્યામાં તાત્કાલિક ઘટાડો થતો નથી, પરંતુ ચયાપચય ક્રિયાઓ ચાલુ રહે છે. લેગ ફેઝમાં કોષો અનુકૂલન કરે છે, લૉગ ફેઝમાં વૃદ્ધિ સ્થિર દરે ચાલે છે, અને ડિક્લાઇન ફેઝમાં કોષોનું મૃત્યુ વૃદ્ધિ કરતાં વધુ થાય છે.", "ncert_ref": "Class XII - પ્રકરણ 13: જૈવ-તંત્ર અને જૈવ-વિવિધતા", "difficulty": "Hard", "num": 24}, {"question": "નીચેનામાંથી કયું વિધાન વસતિ વૃદ્ધિના લૉજિસ્ટિક મોડેલ વિશે સાચું નથી?", "options": ["A) જ્યારે વસતિનું કદ K/2 હોય છે, ત્યારે વૃદ્ધિ દર મહત્તમ હોય છે.", "B) K (કેરીંગ કેપેસિટી) એ વસતિનું મહત્તમ કદ છે જે પર્યાવરણ સહન કરી શકે છે.", "C) લૉજિસ્ટિક વૃદ્ધિ મોડેલમાં, વસતિ વૃદ્ધિનો દર હંમેશા સ્થિર રહે છે.", "D) જ્યારે વસતિનું કદ K ની નજીક પહોંચે છે, ત્યારે વૃદ્ધિ દર ઘટે છે."], "correct": 2, "explanation": "લૉજિસ્ટિક વૃદ્ધિ મોડેલમાં, વસતિ વૃદ્ધિનો દર સ્થિર રહેતો નથી, પરંતુ તે વસતિના કદ અને પર્યાવરણીય પરિબળો પર આધાર રાખે છે. જ્યારે વસતિનું કદ K/2 હોય છે, ત્યારે વૃદ્ધિ દર મહત્તમ હોય છે, અને જ્યારે વસતિનું કદ K ની નજીક પહોંચે છે, ત્યારે વૃદ્ધિ દર ઘટે છે. K એ વસતિનું મહત્તમ કદ છે જે પર્યાવરણ સહન કરી શકે છે.", "ncert_ref": "Class XII - પ્રકરણ 13: જૈવ-તંત્ર અને જૈવ-વિવિધતા", "difficulty": "Hard", "num": 25}, {"question": "એક બેક્ટેરિયલ વસતિમાં, જ્યારે વસતિ વૃદ્ધિનો દર અચાનક ઘટી જાય છે અને વસતિનું કદ K (કેરીંગ કેપેસિટી) થી ઓછું હોય છે, તો નીચેનામાંથી કયું પરિબળ સૌથી વધુ સંભવિત રીતે જવાબદાર હોઈ શકે છે?", "options": ["A) પોષક દ્રવ્યોની અચાનક ઉપલબ્ધતા", "B) તાપમાનમાં અચાનક વધારો", "C) પ્રતિસ્પર્ધી જીવજંતુઓની હાજરી", "D) પ્રકાશની તીવ્રતામાં ઘટાડો"], "correct": 2, "explanation": "વસતિ વૃદ્ધિનો દર અચાનક ઘટવાનું મુખ્ય કારણ પ્રતિસ્પર્ધી જીવજંતુઓની હાજરી હોઈ શકે છે, જે પોષક દ્રવ્યો અને જગ્યા માટે સ્પર્ધા કરે છે. પોષક દ્રવ્યોની ઉપલબ્ધતા (A) વસતિ વૃદ્ધિને વેગ આપે છે, તાપમાનમાં વધારો (B) અને પ્રકાશની તીવ્રતામાં ઘટાડો (D) પણ વસતિ વૃદ્ધિને પ્રભાવિત કરે છે, પરંતુ પ્રતિસ્પર્ધી જીવજંતુઓ (C) સૌથી સીધું અને તીવ્ર પ્રભાવ પાડે છે.", "ncert_ref": "Class XII - Chapter 13: જૈવ-વિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 26}, {"question": "વસતિ વૃદ્ધિના લૉજિસ્ટિક મોડેલમાં, જો વસતિનું કદ N = K/4 હોય, તો વસતિ વૃદ્ધિનો દર (dN/dt) કયા સૂત્ર દ્વારા વ્યક્ત થાય છે?", "options": ["A) rK/4", "B) rK/8", "C) 3rK/16", "D) rK/2"], "correct": 2, "explanation": "લૉજિસ્ટિક મોડેલ અનુસાર, dN/dt = rN(1 - N/K). જ્યારે N = K/4 હોય, તો dN/dt = r*(K/4)*(1 - (K/4)/K) = r*(K/4)*(3/4) = 3rK/16. આમ, સી (C) વિકલ્પ સાચો છે. અન્ય વિકલ્પો ગણિતી રીતે ખોટા છે.", "ncert_ref": "Class XII - Chapter 13: વસતિ અને વસતિ વૃદ્ધિ", "difficulty": "Hard", "num": 27}, {"question": "નીચેનામાંથી કયું વિધાન વસતિ વૃદ્ધિના 'ઓવરશૂટ' (Overshoot) ફેઝ વિશે સાચું છે?", "options": ["A) વસતિનું કદ K થી વધી જાય છે અને પછી સ્થિર થાય છે", "B) વસતિનું કદ K થી વધી જાય છે અને પછી ઘટીને K ની નજીક આવે છે", "C) વસતિનું કદ K ની નજીક પહોંચે છે અને પછી સ્થિર થાય છે", "D) વસતિનું કદ K થી ઓછું રહે છે અને પછી ઘટતું જાય છે"], "correct": 1, "explanation": "ઓવરશૂટ ફેઝમાં, વસતિનું કદ K (કેરીંગ કેપેસિટી) થી વધી જાય છે, પરંતુ પછી પર્યાવરણીય પ્રતિબંધોને કારણે ઘટીને K ની નજીક આવે છે. આમ, B વિકલ્પ સાચો છે. A, C, અને D વિકલ્પો ઓવરશૂટ ફેઝની વ્યાખ્યા સાથે મેળ ખાતા નથી.", "ncert_ref": "Class XII - Chapter 13: વસતિ અને વસતિ વૃદ્ધિ", "difficulty": "Hard", "num": 28}, {"question": "એક વસતિના વૃદ્ધિ વક્રમાં, જ્યારે વસતિ લેગ ફેઝમાંથી લૉગ ફેઝમાં પ્રવેશે છે, ત્યારે નીચેનામાંથી કયું પરિબળ સૌથી ઓછું પ્રભાવિત કરે છે?", "options": ["A) પોષક દ્રવ્યોની ઉપલબ્ધતા", "B) કોષવિભાજનનો દર", "C) તાપમાન", "D) પ્રકાશની તીવ્રતા"], "correct": 3, "explanation": "લેગ ફેઝમાંથી લૉગ ફેઝમાં પ્રવેશ દરમિયાન, કોષો પોતાની ચયાપચય ક્રિયાઓને અનુકૂળ કરે છે અને કોષવિભાજનનો દર વેગ પકડે છે. પોષક દ્રવ્યો (A), કોષવિભાજનનો દર (B), અને તાપમાન (C) સૌથી વધુ પ્રભાવિત કરે છે, જ્યારે પ્રકાશની તીવ્રતા (D) ઓછું પ્રભાવિત કરે છે, ખાસ કરીને બેક્ટેરિયા જેવા s": ["A) rK/4", "B) rK/2", "C) 3rK/16", "D) rK/16"], "correct": 2, "explanation": "લૉજિસ્ટિક મોડેલ અનુસાર, dN/dt = rN(1 - N/K). જ્યારે N = K/4 હોય, ત્યારે dN/dt = r(K/4)(1 - (K/4)/K) = r(K/4)(3/4) = 3rK/16. આમ, સરનામું C સાચું છે. બાકીના વિકલ્પો (A, B, D) ગણિતીય રીતે ખોટા છે.", "ncert_ref": "Class XII - Chapter 13: જૈવ-વિવિધતા અને સંરક્ષણ (લૉજિસ્ટિક વૃદ્ધિ મોડેલ)", "difficulty": "Hard", "num": 35}, {"question": "નીચેનામાંથી કયું વિધાન વસતિ વૃદ્ધિના 'ઓવરશૂટ' ફેઝ વિશે સાચું છે?", "options": ["A) વસતિ કદ K થી ઓછું હોય છે", "B) વસતિ વૃદ્ધિનો દર શૂન્ય હોય છે", "C) વસતિ કદ K થી વધી જાય છે અને પછી ઘટવા લાગે છે", "D) વસતિ વૃદ્ધિનો દર સ્થિર રહે છે"], "correct": 2, "explanation": "ઓવરશૂટ ફેઝ દરમિયાન, વસતિ કદ K (કેરીંગ કેપેસિટી) થી વધી જાય છે અને પછી ઘટવા લાગે છે, કારણ કે પર્યાવરણીય સ્રોતોની ઉણપને લીધે. વિકલ્પ A ખોટો છે કારણ કે વસતિ K થી વધી જાય છે, વિકલ્પ B ખોટો છે કારણ કે વૃદ્ધિ દર શૂન્ય નથી હોતો, અને વિકલ્પ D ખોટો છે કારણ કે વૃદ્ધિ દર સ્થિર નથી રહેતો.", "ncert_ref": "Class XII - Chapter 13: જૈવ-વિવિધતા અને સંરક્ષણ (વસતિ વૃદ્ધિના તબક્કાઓ)", "difficulty": "Hard", "num": 36}, {"question": "એક બેક્ટેરિયલ વસતિનો વૃદ્ધિ દર અચાનક ઘટી જાય છે અને વસતિનું કદ K (કેરીંગ કેપેસિટી) કરતાં વધી જાય છે, તો નીચેનામાંથી કયું પરિણામ સૌથી યોગ્ય રીતે વર્ણવે છે?", "options": ["A) વસતિ તરત જ ડિક્લાઇન ફેઝમાં પ્રવેશે છે અને K કરતાં ઓછી થઈ જાય છે", "B) વસતિ 'ઓવરશૂટ' ફેઝમાં પ્રવેશે છે અને પછી ધીરે ધીરે K તરફ પરત ફરે છે", "C) વસતિ સ્ટેશનરી ફેઝમાં રહે છે અને K કરતાં વધુ જ રહે છે", "D) વસતિ લૉગ ફેઝમાં પરત ફરે છે અને પુનઃવૃદ્ધિ શરૂ કરે છે"], "correct": 1, "explanation": "જ્યારે વસતિનું કદ K કરતાં વધી જાય છે, ત્યારે તે 'ઓવરશૂટ' ફેઝમાં પ્રવેશે છે. આ સ્થિતિમાં, વસતિ પોષક દ્રવ્યો અને પર્યાવરણીય સંસાધનોની મર્યાદાને કારણે ધીરે ધીરે K તરફ પરત ફરે છે. વિકલ્પ A ખોટો છે કારણ કે વસતિ તરત જ ડિક્લાઇન ફેઝમાં જતી નથી, પરંતુ પહેલા ઓવરશૂટ થાય છે. વિકલ્પ C ખોટો છે કારણ કે વસતિ K કરતાં વધુ રહી શકતી નથી, તે ધીરે ધીરે ઘટે છે. વિકલ્પ D ખોટો છે કારણ કે લૉગ ફેઝમાં પુનઃવૃદ્ધિ શક્ય નથી, કેમ કે પોષક દ્રવ્યો મર્યાદિત હોય છે.", "ncert_ref": "Class XII - Chapter 13: જૈવ-વિવિધતા અને સંરક્ષણ (વસતિ વૃદ્ધિ અને પર્યાવરણીય પરિબળો)", "difficulty": "Hard", "num": 37}, {"question": "નીચેનામાંથી કયું વિધાન વસતિ વૃદ્ધિના લૉજિસ્ટિક મોડેલમાં 'r' (વૃદ્ધિ દર સ્થિરાંક) વિશે સાચું છે?", "options": ["A) r નું મૂલ્ય જેમ વધે છે, તેમ વસતિ વૃદ્ધિનો દર ધીરે ધીરે ઘટે છે", "B) r નું મૂલ્ય જેમ ઘટે છે, તેમ વસતિ K (કેરીંગ કેપેસિટી) તરફ વધુ ઝડપથી પહોંચે છે", "C) r નું મૂલ્ય વસતિના પ્રારંભિક કદ પર આધાર રાખે છે", "D) r નું મૂલ્ય પર્યાવરણીય પરિબળો દ્વારા નક્કી થતું નથી"], "correct": 0, "explanation": "લૉજિસ્ટિક મોડેલમાં, 'r' (વૃદ્ધિ દર સ્થિરાંક) જેમ વધે છે, તેમ વસતિ વૃદ્ધિનો દર પહેલા વધે છે અને પછી K ની નજીક આવતાં ઘટે છે. વિકલ્પ B ખોટો છે કારણ કે r ઘટવાથી વસતિ K તરફ ધીરે પહોંચે છે. વિકલ્પ C ખોટો છે કારણ કે r પ્રારંભિક કદ પર આધાર રાખતું નથી, પરંતુ જાતિય લક્ષણો અને પર્યાવરણ પર આધાર રાખે છે. વિકલ્પ D ખોટો છે કારણ કે r પર્યાવરણીય પરિબળો દ્વારા પ્રભાવિત થાય છે.", "ncert_ref": "Class XII - Chapter 13: જૈવ-વિવિધતા અને સંરક્ષણ (લૉજિસ્ટિક વૃદ્ધિ મોડેલ)", "difficulty": "Hard", "num": 38}, {"question": "એક બેક્ટેરિયલ વસતિને નવી પોષક મીડિયામાં મૂક્યા બાદ, લેગ ફેઝ દરમિયાન કોષોની આંતરિક ગતિવિધિઓ વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) કોષોમાં DNA ની પ્રતિકૃતિ થતી નથી, પરંતુ RNA અને પ્રોટીન સંશ્લેષણ ચાલુ રહે છે", "B) કોષોમાં મેટાબોલિક ગતિવિધિઓ સંપૂર્ણ રીતે બંધ થઈ જાય છે", "C) કોષોમાં ઉત્સેચકોનું સંશ્લેષણ અને પેશીના વિકાસ માટેની તૈયારી ચાલુ રહે છે", "D) કોષોમાં શ્વસન અને પ્રકાશસંશ્લેષણ જેવી પ્રક્રિયાઓ સક્રિય રીતે ચાલુ રહે છે"], "correct": 2, "explanation": "લેગ ફેઝ દરમિયાન, કોષો પોષક મીડિયામાં અનુકૂલન કરે છે અને વૃદ્ધિ માટેની તૈયારી કરે છે. આ દરમિયાન, ઉત્સેચકો અને અન્ય જરૂરી પ્રોટીનનું સંશ્લેષણ થાય છે, જેથી કોષો લૉગ ફેઝમાં પ્રવેશી શકે. વિકલ્પ A ખોટો છે કારણ કે DNA પ્રતિકૃતિ લેગ ફેઝના અંત સુધી શરૂ થઈ શકે છે. વિકલ્પ B ખોટો છે કારણ કે મેટાબોલિક ગતિવિધિઓ સંપૂર્ણ બંધ થતી નથી. વિકલ્પ D ખોટો છે કારણ કે બેક્ટેરિયામાં પ્રકાશસંશ્લેષણ થતું નથી.", "ncert_ref": "Class XII - Chapter 10: જીવનની સતતતા (Microbes in Human Welfare)", "difficulty": "Hard", "num": 39}, {"question": "એક બેક્ટેરિયલ વસતિના વૃદ્ધિ વક્રમાં, જ્યારે વસતિ લૉગ ફેઝમાંથી સ્ટેશનરી ફેઝમાં પ્રવેશે છે, ત્યારે નીચેનામાંથી કયું પરિબળ સૌથી વધુ પ્રભાવિત થાય છે?", "options": ["A) કોષવિભાજનનો દર", "B) પોષક દ્રવ્યોની ઉપલબ્ધતા", "C) તાપમાન", "D) ઓક્સિજનની માત્રા"], "correct": 1, "explanation": "લૉગ ફેઝમાંથી સ્ટેશનરી ફેઝમાં પ્રવેશ દરમિયાન, પોષક દ્રવ્યોની ઉપલબ્ધતા ઘટે છે, જેથી વસતિ વૃદ્ધિનો દર ઘટે છે અને કોષવિભાજનનો દર પણ ઘટે છે. પરંતુ સૌથી વધુ પ્રભાવિત થતું પરિબળ પોષક દ્રવ્યોની ઉપલબ્ધતા છે. વિકલ્પ A, C, અને D પણ પ્રભાવિત થઈ શકે છે, પરંતુ પોષક દ્રવ્યોની ઉપલબ્ધતા સૌથી મહત્વપૂર્ણ છે.", "ncert_ref": "Class XII - Chapter 10: જીવનની સતતતા (Microbes in Human Welfare)", "difficulty": "Hard", "num": 40}, {"question": "એક વસતિના લૉજિસ્ટિક વૃદ્ધિ મોડેલમાં, જો વસતિનું કદ N = K/4 હોય, તો વસતિનો વૃદ્ધિ દર (dN/dt) કયા સૂત્ર દ્વારા વ્યક્ત થાય છે?", "options": ["A) rK/4", "B) rK/2", "C) rK(3/16)", "D) rK(1/4)"], "correct": 2, "explanation": "લૉજિસ્ટિક વૃદ્ધિ મોડેલનો સૂત્ર છે: dN/dt = rN(1 - N/K). જ્યારે N = K/4 હોય, ત્યારે dN/dt = r*(K/4)*(1 - (K/4)/K) = r*(K/4)*(3/4) = rK(3/16). વિકલ્પ A, B, અને D આ સૂત્રને સંતોષતો નથી.", "ncert_ref": "Class XII - Chapter 13: જૈવ-વિવિધતા અને સંરક્ષણ (Organisms and Populations)", "difficulty": "Hard", "num": 41}, {"question": "એક બેક્ટેરિયલ વસતિના સિગ્મોઇડ વક્રમાં, જ્યારે વસતિ લૉગ ફેઝમાંથી સ્ટેશનરી ફેઝ તરફ આગળ વધે છે, ત્યારે નીચેનામાંથી કયું પરિબળ વસતિ વૃદ્ધિના દરને સૌથી વધુ પ્રભાવિત કરશે?", "options": ["A) પ્રકાશની તીવ્રતા", "B) પોષક દ્રવ્યોની ઉપલબ્ધતા", "C) ઓક્સિજનની માત્રા", "D) કાર્બન ડાયોક્સાઇડની માત્રા"], "correct": 1, "explanation": "લૉગ ફેઝમાંથી સ્ટેશનરી ફેઝ તરફ જતી વખતે, પોષક દ્રવ્યોની ઉપલબ્ધતા વસતિ વૃદ્ધિના દરને સૌથી વધુ પ્રભાવિત કરે છે કારણ કે પોષક દ્રવ્યોની કમી કોષવિભાજનને મર્યાદિત કરે છે. A) પ્રકાશની તીવ્રતા બેક્ટેરિયા માટે પ્રાથમિક પરિબળ નથી (તેઓ પ્રકાશસંશ્લેષણ કરતા નથી). C) ઓક્સિજનની માત્રા અગત્યની હોઈ શકે, પરંતુ પોષક દ્રવ્યોની કમી એ સૌથી મહત્વનું પરિબળ છે. D) કાર્બન ડાયોક્સાઇડની માત્રા બેક્ટેરિયલ વૃદ્ધિને અસર કરે, પરંતુ પોષક દ્રવ્યોની કમી એ વધુ પ્રભાવશાળી છે.", "ncert_ref": "Class XII - Chapter 13: જૈવ-વિવિધતા અને તેનું સંરક્ષણ (વસતિ વૃદ્ધિ અને પર્યાવરણીય પરિબળો)", "difficulty": "Hard", "num": 42}, {"question": "એક બેક્ટેરિયલ વસતિનો વૃદ્ધિ વક્ર સિગ્મોઇડ પ્રકારનો હોય છે. જો આ વસતિને અચાનક એવી પરિસ્થિતિમાં મૂકવામાં આવે જ્યાં પોષક દ્રવ્યોની ઉપલબ્ધતા અસીમિત હોય અને તાપમાન તેમજ pH આદર્શ હોય, તો નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) વસતિ લેગ ફેઝને બાદ કરતાં તરત જ લૉગ ફેઝમાં પ્રવેશશે અને વૃદ્ધિ દર સ્થિર રહેશે.", "B) વસતિનો વૃદ્ધિ દર અસીમિત પોષક દ્રવ્યો હોવા છતાં પણ સ્ટેશનરી ફેઝમાં પ્રવેશશે કારણ કે અંતર્ગત પરિબળો (જેવા કે જનીનીય મર્યાદાઓ) વૃદ્ધિને મર્યાદિત કરશે.", "C) વસતિનો વૃદ્ધિ વક્ર J-આકારનો (એક્સપોનેન્શિયલ) બનશે કારણ કે પર્યાવરણીય પ્રતિરોધનો અભાવ હશે.", "D) વસતિનું કદ અસીમિત રીતે વધતું રહેશે કારણ કે કોઈપણ પર્યાવરણીય મર્યાદા નહીં હોય."], "correct": 3, "explanation": "સાચો જવાબ D છે. સિગ્મોઇડ વક્ર (S-આકારનો) લૉજિસ્ટિક વૃદ્ધિ મોડેલ દર્શાવે છે જ્યાં વસતિનું કદ ક્યારેક કેરીંગ કેપેસિટી (K) સુધી પહોંચે છે અને સ્થિર થાય છે. પરંતુ પ્રશ્નમાં આપેલી પરિસ્થિતિમાં પોષક દ્રવ્યો અસીમિત છે અને પર્યાવરણીય પરિબળો આદર્શ છે, તો પણ વસતિનું કદ અસીમિત રીતે વધતું રહેતું નથી કારણ કે અંતર્ગત પરિબળો (જેવા કે જનીનીય મર્યાદાઓ, કોષીય ચયાપચયની મર્યાદાઓ) વૃદ્ધિને મર્યાદિત કરશે. A સાચું છે કારણ કે લેગ ફેઝ બાદ લૉગ ફેઝમાં પ્રવેશ થાય છે. B સાચું છે કારણ કે અંતર્ગત પરિબળો વૃદ્ધિને મર્યાદિત કરશે. C સાચું છે કારણ કે અસીમિત પોષક દ્રવ્યો અને આદર્શ પરિસ્થિતિમાં વૃદ્ધિ એક્સપોનેન્શિયલ (J-આકારનો) થશે. D ખોટું છે કારણ કે વસતિનું કદ ક્યારેક ના ક્યારેક મર્યાદિત થશે.", "ncert_ref": "Class XII - Chapter 13: જૈવ-વિવિધતા અને તેનું સંરક્ષણ (વસતિ વૃદ્ધિ અને પર્યાવરણીય પરિબળો)", "difficulty": "Hard", "num": 43}, {"question": "બેક્ટેરિયલ વસતિના સિગ્મોઇડ વક્રમાં, જ્યારે વસતિ લૉગ ફેઝમાંથી સ્ટેશનરી ફેઝ તરફ આગળ વધે છે, ત્યારે નીચેનામાંથી કયું પરિવર્તન સાચું નથી?", "options": ["A) કોષવિભાજનનો દર ઘટે છે", "B) મૃત્યુ દર વૃદ્ધિ દર કરતાં વધી જાય છે", "C) પોષક દ્રવ્યોની ઉપલબ્ધતા ઘટે છે", "D) કોષોની સરેરાશ કદમાં વધારો થાય છે"], "corr                 const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
