<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - STI / STD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 STI / STD</span>
                <span>🎯 Hard</span>
                <span>📝 47 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "નીચેનામાંથી કયો રોગ બેક્ટેરિયા દ્વારા થતો નથી પરંતુ વાયરસ દ્વારા થાય છે અને તેના લક્ષણોમાં જનનાંગ પર ફોડલા પડવા સાથે સંકળાયેલ છે?", "options": ["A) ગોનોરિયા", "B) સિફિલિસ", "C) હર્પીસ સિમ્પ્લેક્સ-2", "D) ટ્રાઇકોમોનાયસિસ"], "correct": 2, "explanation": "હર્પીસ સિમ્પ્લેક્સ-2 (HSV-2) એ વાયરલ રોગ છે જે જનનાંગ પર ફોડલા પડવા સાથે સંકળાયેલ છે. ગોનોરિયા (A) અને સિફિલિસ (B) બેક્ટેરિયલ રોગો છે, જ્યારે ટ્રાઇકોમોનાયસિસ (D) પ્રોટોઝોઆ દ્વારા થાય છે. આમ, કેવળ HSV-2 વાયરસ દ્વારા થાય છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 1}, {"question": "એક વ્યક્તિને એચઆઈવી સંક્રમણ થયું છે પરંતુ એડ્સ નથી. આ સ્થિતિમાં નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) વ્યક્તિના રક્તમાં એચઆઈવી એન્ટિબોડી હાજર નથી", "B) વ્યક્તિના CD4+ T-કોષોની સંખ્યા 200 થી ઓછી છે", "C) વ્યક્તિ સંક્રમણ ફેલાવી શકે છે", "D) વ્યક્તિને કોઈ લક્ષણો જણાય નહીં અને તે સંપૂર્ણપણે સ્વસ્થ છે"], "correct": 2, "explanation": "એચઆઈવી સંક્રમિત વ્યક્તિ એડ્સના તબક્કામાં પહોંચે તે પહેલાં પણ સંક્રમણ ફેલાવી શકે છે. એચઆઈવી એન્ટિબોડી (A) સંક્રમણ પછી કેટલાક અઠવાડિયામાં બનવા લાગે છે. CD4+ T-કોષોની સંખ્યા (B) એડ્સના તબક્કામાં 200 થી ઓછી હોય છે, પરંતુ એચઆઈવી સંક્રમણના પ્રારંભિક તબક્કામાં તે સ્વાભાવિક રીતે ઓછી હોતી નથી. વ્યક્તિને લક્ષણો (D) હોવા અથવા ન હોવા તે સંક્રમણની અવસ્થા પર આધાર રાખે છે, પરંતુ તે સંક્રમણ ફેલાવી શકે છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 2}, {"question": "નીચેનામાંથી કયો રોગ મુખ્યત્વે લિંગીય સંપર્ક દ્વારા ફેલાતો નથી પરંતુ તેના લક્ષણો લિંગીય સંક્રમણ વાહક રોગો જેવા જ હોય છે?", "options": ["A) હેપેટાઇટિસ B", "B) ક્લેમાઇડિયા", "C) ગોનોરિયા", "D) ટ્રાઇકોમોનાયસિસ"], "correct": 0, "explanation": "હેપેટાઇટિસ B મુખ્યત્વે રક્ત, શરીરના પ્રવાહી અથવા સંક્રમિત વ્યક્તિના શારીરિક સંપર્ક દ્વારા ફેલાય છે, પરંતુ તે લિંગીય સંપર્ક દ્વારા પણ ફેલાઈ શકે છે. જોકે, તેને લિંગીય સંક્રમણ વાહક રોગ (STI) તરીકે વર્ગીકૃત કરવામાં આવતો નથી. ક્લેમાઇડિયા (B), ગોનોરિયા (C), અને ટ્રાઇકોમોનાયસિસ (D) મુખ્યત્વે લિંગીય સંપર્ક દ્વારા ફેલાતા રોગો છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 3}, {"question": "એક સ્ત્રીને બેક્ટેરિયલ વેજિનોસિસ છે. નીચેનામાંથી કયું વિધાન આ રોગ વિશે સાચું નથી?", "options": ["A) આ રોગમાં યોનિમાં લેક્ટોબેસિલીની સંખ્યા ઘટે છે", "B) આ રોગમાં pH સ્તર 4.5 થી વધુ હોય છે", "C) આ રોગ મુખ્યત્વે ટ્રાઇકોમોનાસ વેજિનાલિસ દ્વારા થાય છે", "D) આ રોગમાં યોનિમાં મછલી જેવી દુર્ગંધ આવે છે"], "correct": 2, "explanation": "બેક્ટેરિયલ વેજિનોસિસ (BV) એ યોનિમાં લેક્ટોબેસિલીની સંખ્યા ઘટવા અને અન્ય બેક્ટેરિયા (જેમ કે ગાર્ડનેરેલા)ના વધવા દ્વારા થાય છે. આથી pH સ્તર 4.5 થી વધુ (B) અને મછલી જેવી દુર્ગંધ (D) થાય છે. પરંતુ ટ્રાઇકોમોનાસ વેજિનાલિસ (C) દ્વારા થતો રોગ ટ્રાઇકોમોનાયસિસ છે, જે BV નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 4}, {"question": "નીચેનામાંથી કયો રોગ એવો છે જેના માટે કોઈ ચોક્કસ ઇલાજ નથી અને તેના સંક્રમણને રોકવા માટે રસી ઉપલબ્ધ છે?", "options": ["A) એચઆઈવી/એડ્સ", "B) હેપેટાઇટિસ C", "C) હર્પીસ સિમ્પ્લેક્સ-2", "D) હ્યુમન પેપિલોમા વાયરસ (HPV)"], "correct": 3, "explanation": "હ્યુમન પેપિલોમા વાયરસ (HPV) માટે રસી ઉપલબ્ધ છે (જેમ કે ગાર્ડાસિલ), પરંતુ તેના માટે કોઈ ચોક્કસ ઇલાજ નથી. એચઆઈવી/એડ્સ (A) અને હેપેટાઇટિસ C (B) માટે કોઈ રસી નથી, જ્યારે હર્પીસ સિમ્પ્લેક્સ-2 (C) માટે પણ કોઈ રસી નથી. HPV માટે રસી સંક્રમણને રોકવા માટે ઉપલબ્ધ છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 5}, {"question": "એક વ્યક્તિને ગોનોરિયા અને સિફિલિસ બંને રોગો છે. નીચેનામાંથી કયું વિધાન આ સ્થિતિ વિશે સાચું છે?", "options": ["A) ગોનોરિયા અને સિફિલિસ બંનેના સંક્રમણ માટે Neisseria gonorrhoeae જવાબદાર છે.", "B) સિફિલિસના પ્રથમ તબક્કામાં ચાંકલા (chancre) બનવાનું મુખ્ય લક્ષણ છે, જ્યારે ગોનોરિયામાં પેશાબમાં બળતરા અને સ્રાવ થાય છે.", "C) ગોનોરિયા અને સિફિલિસ બંને વાયરસ દ્વારા થતા રોગો છે.", "D) ગોનોરિયા અને સિફિલિસ બંને માટે એન્ટીબાયોટિક્સ અસરકારક નથી."], "correct": 1, "explanation": "સિફિલિસ (Treponema pallidum દ્વારા)ના પ્રથમ તબક્કામાં ચાંકલા (chancre) બનવાનું મુખ્ય લક્ષણ છે, જ્યારે ગોનોરિયા (Neisseria gonorrhoeae દ્વારા)માં પેશાબમાં બળતરા અને સ્રાવ થાય છે. A ગળત છે કારણ કે સિફિલિસ Treponema pallidum દ્વારા થાય છે. C ગળત છે કારણ કે બંને બેક્ટેરિયા દ્વારા થાય છે. D ગળત છે કારણ કે એન્ટીબાયોટિક્સ (જેમ કે પેનિસિલિન) સિફિલિસ અને ગોનોરિયા બંને માટે અસરકારક છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 6}, {"question": "હર્પિસ સિમ્પ્લેક્સ વાયરસ-2 (HSV-2) વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) તે મુખ્યત્વે લિંગીય સંપર્ક દ્વારા ફેલાય છે.", "B) તે જનનાંગ પર ફોસલા (blisters) ઉત્પન્ન કરે છે.", "C) તેના માટે કોઈ ચોક્કસ ઇલાજ નથી, પરંતુ લક્ષણોને નિયંત્રિત કરવા માટે દવાઓ ઉપલબ્ધ છે.", "D) તે બેક્ટેરિયા દ્વારા થતો રોગ છે અને એન્ટીબાયોટિક્સ દ્વારા સારવાર થઈ શકે છે."], "correct": 3, "explanation": "HSV-2 એક વાયરસ છે, બેક્ટેરિયા નહીં, તેથી એન્ટીબાયોટિક્સ તેના માટે અસરકારક નથી. A, B, અને C સાચા છે કારણ કે HSV-2 લિંગીય સંપર્ક દ્વારા ફેલાય છે, જનનાંગ પર ફોસલા ઉત્પન્ન કરે છે, અને તેના માટે કોઈ ચોક્કસ ઇલાજ નથી, પરંતુ લક્ષણોને નિયંત્રિત કરવા માટે એન્ટિવાયરલ દવાઓ ઉપલબ્ધ છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 7}, {"question": "એક સ્ત્રીને હ્યુમન પેપિલોમા વાયરસ (HPV) સંક્રમણ છે. નીચેનામાંથી કયું વિધાન આ રોગ વિશે સાચું નથી?", "options": ["A) HPV સંક્રમણ ગર્ભાશયના કર્ક (cervical cancer)નો મુખ્ય કારણ છે.", "B) HPV વાયરસના કેટલાક સ્ટ્રેઇન્સ ગર્ભાશયના કર્ક સાથે સંકળાયેલા છે, જ્યારે કેટલાક જનનાંગ મસા (genital warts) ઉત્પન્ન કરે છે.", "C) HPV સંક્રમણ માટે કોઈ રસી ઉપલબ્ધ નથી.", "D) HPV સંક્રમણ લિંગીય સંપર્ક દ્વારા ફેલાય છે."], "correct": 2, "explanation": "HPV સંક્રમણ માટે રસી (જેમ કે ગાર્ડાસિલ) ઉપલબ્ધ છે. A, B, અને D સાચા છે કારણ કે HPV ગર્ભાશયના કર્કનો મુખ્ય કારણ છે, કેટલાક સ્ટ્રેઇન્સ ગર્ભાશયના કર્ક સાથે સંકળાયેલા છે, અને તે લિંગીય સંપર્ક દ્વારા ફેલાય છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 8}, {"question": "ટ્રાઇકોમોનિયાસિસ વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) તે એક વાયરલ રોગ છે જે મુખ્યત્વે લિંગીય સંપર્ક દ્વારા ફેલાય છે.", "B) તે સ્ત્રીઓમાં વેજાઇનલ ડિસ્ચાર્જ અને ખંજવાળ ઉત્પન્ન કરે છે, જ્યારે પુરુષોમાં તે લક્ષણવિહીન હોવાનું સામાન્ય છે.", "C) તે બેક્ટેરિયા દ્વારા થતો રોગ છે અને એન્ટીબાયોટિક્સ દ્વારા સારવાર થઈ શકે છે.", "D) તે એક ફંગલ રોગ છે અને એન્ટિફંગલ દવાઓ દ્વારા સારવાર થઈ શકે છે."], "correct": 1, "explanation": "ટ્રાઇકોમોનિયાસિસ એક પરજીવી (Trichomonas vaginalis) દ્વારા થતો રોગ છે, જે સ્ત્રીઓમાં વેજાઇનલ ડિસ્ચાર્જ અને ખંજવાળ ઉત્પન્ન કરે છે, જ્યારે પુરુષોમાં તે લક્ષણવિહીન હોવાનું સામાન્ય છે. A ગળત છે કારણ કે તે વાયરલ નથી. C ગળત છે કારણ કે તે બેક્ટેરિયા દ્વારા થતો નથી. D ગળત છે કારણ કે તે ફંગલ નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 9}, {"question": "એક વ્યક્તિને ક્લેમાઇડિયા સંક્રમણ છે. નીચેનામાંથી કયું વિધાન આ રોગ વિશે સાચું નથી?", "options": ["A) ક્લેમાઇડિયા Chlamydia trachomatis બેક્ટેરિયા દ્વારા થાય છે.", "B) તે લિંગીય સંપર્ક દ્વારા ફેલાય છે અને પેશાબમાં બળતરા, સ્રાવ, અને અંડાશયમાં સોજો ઉત્પન્ન કરે છે.", "C) ક્લેમાઇડિયા સંક્રમણ માટે કોઈ રસી ઉપલબ્ધ નથી.", "D) ક્લેમાઇડિયા સંક્રમણ વાયરસ દ્વારા થાય છે અને એન્ટિવાયરલ દવાઓ દ્વારા સારવાર થઈ શકે છે."], "correct": 3, "explanation": "ક્લેમાઇડિયા Chlamydia trachomatis બેક્ટેરિયા દ્વારા થાય છે અને એન્ટીબાયોટિક્સ દ્વારા સારવાર થઈ શકે છે. A, B, અને C સાચા છે કારણ કે ક્લેમાઇડિયા બેક્ટેરિયા દ્વારા થાય છે, લિંગીય સંપર્ક દ્વારા ફેલાય છે, અને તેના માટે કોઈ રસી ઉપલબ્ધ નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 10}, {"question": "એક પુરુષમાં ગોનોરિયા સંક્રમણના કિસ્સામાં, નીચેનામાંથી કયું લક્ષણ સામાન્ય રીતે જોવા મળતું નથી, પરંતુ સ્ત્રીમાં જોવા મળી શકે છે?", "options": ["A) મૂત્રમાર્ગમાંથી પસ (Discharge) નીકળવું", "B) મૂત્ર કરતી વખતે જલન થવું", "C) અંડકોષની સોજો (Epididymitis)", "D) ગર્ભાશયની ગરદનની સોજો (Cervicitis)"], "correct": 3, "explanation": "ગોનોરિયા સ્ત્રી અને પુરુષ બંનેમાં મૂત્રમાર્ગમાંથી પસ નીકળવું (A) અને મૂત્ર કરતી વખતે જલન (B) જેવા લક્ષણો દર્શાવે છે. અંડકોષની સોજો (C) પુરુષમાં જોવા મળે છે, પરંતુ ગર્ભાશયની ગરદનની સોજો (D) ફક્ત સ્ત્રીમાં જોવા મળે છે, જે સામાન્ય રીતે પુરુષમાં જોવા મળતું નથી.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન स्वास्थ्य", "difficulty": "Hard", "num": 11}, {"question": "સિફિલિસના ત્રીજા તબક્કામાં (Tertiary Syphilis) નીચેનામાંથી કયું લક્ષણ જોવા મળી શકે છે?", "options": ["A) જનનાંગ પર ચાંદા (Chancre)", "B) ત્વચા પર લાલ ચકામા (Rash)", "C) હૃદય અને રક્તવાહિનીઓને નુકસાન", "D) લસિકા ગાંઠોમાં સોજો"], "correct": 2, "explanation": "સિફિલિસના પ્રથમ તબક્કામાં જનનાંગ પર ચાંદા (A) જોવા મળે છે, બીજા તબક્કામાં ત્વચા પર લાલ ચકામા (B) અને લસિકા ગાંઠોમાં સોજો (D) જોવા મળે છે. ત્રીજા તબક્કામાં હૃદય અને રક્તવાહિનીઓને નુકસાન (C) થાય છે, જે આ તબક્કાનું વિશિષ્ટ લક્ષણ છે.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન स्वास्थ્ય", "difficulty": "Hard", "num": 12}, {"question": "હ્યુમન પેપિલોમા વાયરસ (HPV) સંક્રમણના સંદર્ભમાં નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) HPV સંક્રમણ ફક્ત સ્ત્રીમાં જ ગર્ભાશયના કર્કરોગનું કારણ બને છે", "B) HPV વાયરસના બધા જ સ્ટ્રેન કર્કરોગનું કારણ બને છે", "C) HPV સંક્રમણથી ગર્ભાશયના કર્કરોગ અને જનનાંગ કોન્ડિલોમા (Genital Warts) થઈ શકે છે", "D) HPV સંક્રમણ ફક્ત લિંગીય સંપર્ક દ્વારા જ ફેલાય છે"], "correct": 2, "explanation": "HPV સંક્રમણથી ગર્ભાશયના કર્કરોગ અને જનનાંગ કોન્ડિલોમા (C) થઈ શકે છે. HPV ફક્ત સ્ત્રીમાં જ નહીં પરંતુ પુરુષમાં પણ કર્કરોગનું કારણ બની શકે છે (A ખોટું). HPVના બધા જ સ્ટ્રેન કર્કરોગનું કારણ નથી બનતા (B ખોટું). HPV સંક્રમણ લિંગીય સંપર્ક સિવાય પણ ફેલાઈ શકે છે (D ખોટું).", "ncert_ref": "Class XII - Chapter 4: પ્રજનન स्वાસ્થ્ય", "difficulty": "Hard", "num": 13}, {"question": "એક વ્યક્તિને સિફિલિસનો પ્રાથમિક તબક્કો (Primary Syphilis) છે. નીચેનામાંથી કયું વિધાન આ તબક્કા વિશે સાચું નથી?", "options": ["A) આ તબક્કામાં 'ચાન્કર' (Chancre) નામનું વ્રણ જોવા મળે છે, જે વેદનારહિત હોવાનું લક્ષણ છે.", "B) ચાન્કર મુખ્યત્વે લિંગ, યોનિ અથવા ગુદા પ્રદેશમાં જોવા મળે છે અને તે સંક્રમિત સ્થળે ઉદ્ભવે છે.", "C) આ તબક્કામાં રક્ત પરીક્ષણ દ્વારા સિફિલિસનો પુરાવો મળી શકે છે, પરંતુ વ્યક્તિ સંક્રમણ ફેલાવી શકતો નથી.", "D) ચાન્કર સ્વયં 3 થી 6 અઠવાડિયામાં ભરાઈ જાય છે, પરંતુ રોગ ચાલુ રહે છે અને બીજા તબક્કામાં પ્રવેશે છે."], "correct": 2, "explanation": "વિકલ્પ C સાચો નથી કારણ કે પ્રાથમિક તબક્કામાં વ્યક્તિ સંક્રમણ ફેલાવી શકે છે, ભલે ચાન્કર ભરાઈ ગયું હોય. ચાન્કર વેદનારહિત હોવા છતાં, તે સંક્રમિત હોય છે અને સંપર્ક દ્વારા રોગ ફેલાવી શકે છે. વિકલ્પ A, B, અને D સાચા છે કારણ કે ચાન્કર પ્રાથમિક લક્ષણ છે, તે સંક્રમિત સ્થળે જોવા મળે છે, અને સ્વયં ભરાઈ જાય છે, પરંતુ રોગ ચાલુ રહે છે.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન સ્વાસ્થ્ય", "difficulty": "Hard", "num": 14}, {"question": "હ્યુમન ઇમ્યુનોડેફિશિયન્સી વાયરસ (HIV) અને હેપેટાઇટિસ B વાયરસ (HBV) વચ્ચેનો સામાન્ય ગુણ નીચેનામાંથી કયો છે?", "options": ["A) બંને વાયરસ મુખ્યત્વે લિંગીય સંપર્ક દ્વારા ફેલાય છે, પરંતુ માથી બાળકમાં પણ સંક્રમણ થઈ શકે છે.", "B) બંને વાયરસના સંક્રમણ માટે કોઈ ચોક્કસ ઇલાજ ઉપલબ્ધ નથી, પરંતુ રસી ઉપલબ્ધ છે.", "C) બંને વાયરસ DNA વાયરસ છે અને તેના જીનોમમાં રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચક હોય છે.", "D) બંને વાયરસના સંક્રમણથી યકૃતની ખરાબી થાય છે અને તે કર્કરોગ તરફ દોરી શકે છે."], "correct": 0, "explanation": "વિકલ્પ A સાચો છે કારણ કે HIV અને HBV બંને મુખ્યત્વે લિંગીય સંપર્ક દ્વારા ફેલાય છે અને માથી બાળકમાં પણ સંક્રમણ થઈ શકે છે. વિકલ્પ B ખોટો છે કારણ કે HBV માટે રસી ઉપલબ્ધ છે, પરંતુ HIV માટે નહીં. વિકલ્પ C ખોટો છે કારણ કે HIV RNA વાયરસ છે, જ્યારે HBV DNA વાયરસ છે. વિકલ્પ D ખોટો છે કારણ કે HBV યકૃતની ખરાબી કરે છે, પરંતુ HIV યકૃતને સીધું અસર કરતું નથી.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન સ્વાસ્થ્ય", "difficulty": "Hard", "num": 15}, {"question": "એક વ્યક્તિને ક્લેમાઇડિયા ટ્રેકોમેટિસ દ્વારા થતો યુરેથ્રાઇટિસ છે. નીચેનામાંથી કયું વિધાન આ રોગના સંક્રમણ વિશે સાચું નથી?", "options": ["A) આ રોગ મુખ્યત્વે લિંગીય સંપર્ક દ્વારા ફેલાય છે, પરંતુ માથી બાળકમાં પ્રસૂતિ દરમિયાન પણ ફેલાઈ શકે છે.", "B) આ રોગમાં પુરુષોમાં સામાન્ય રીતે સફેદ અને પાતળું સ્રાવ જોવા મળે છે, જ્યારે સ્ત્રીઓમાં લક્ષણો અસ્પષ્ટ હોઈ શકે છે.", "C) ક્લેમાઇડિયા સંક્રમણમાં, બેક્ટેરિયા પેશાબની નળીની અંદર રહીને ઉત્પન્ન થતી પ્રતિક્રિયા દ્વારા કોષોના વિનાશને કારણે લક્ષણો દેખાય છે.", "D) આ રોગ માટે એન્ટિબાયોટિક્સ જેવા કે પેનિસિલિન પ્રથમ પસંદગીનો ઇલાજ છે."], "correct": 3, "explanation": "ક્લેમાઇડિયા ટ્રેકોમેટિસ દ્વારા થતો યુરેથ્રાઇટિસ મુખ્યત્વે લિંગીય સંપર્ક દ્વારા ફેલાય છે અને માથી બાળકમાં પ્રસૂતિ દરમિયાન પણ ફેલાઈ શકે છે (A સાચું). પુરુષોમાં સફેદ અને પાતળું સ્રાવ જોવા મળે છે, જ્યારે સ્ત્રીઓમાં લક્ષણો અસ્પષ્ટ હોઈ શકે છે (B સાચું). ક્લેમાઇડિયા બેક્ટેરિયા કોષોના વિનાશને કારણે લક્ષણો ઉત્પન્ન કરે છે (C સાચું). પરંતુ ક્લેમાઇડિયા માટે પેનિસિલિન પ્રથમ પસંદગીનો ઇલાજ નથી; આઝિથ્રોમાઇસિન અથવા ડોક્સીસાયક્લિન વાપરવામાં આવે છે (D ખોટું).", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 16}, {"question": "સિફિલિસના દ્વિતીય તબક્કામાં (Secondary Syphilis) નીચેનામાંથી કયું લક્ષણ સામાન્ય રીતે જોવા મળતું નથી?", "options": ["A) ત્વચા પર લાલ ચકામા (Rash) જે હથેળી અને પગના તળિયા સહિત શરીરના વિવિધ ભાગોમાં દેખાય છે.", "B) તાવ, થાક, અને ગળામાં લસિકા ગાંઠોની સોજો.", "C) મુખમાં અથવા જનનાંગોમાં ગાઢ, દુખાવાવાળા પૂતળિયા (Ulcers).", "D) વાળનું પડી જવું અને નખમાં વિકૃતિઓ."], "correct": 2, "explanation": "સિફિલિસના દ્વિતીય તબક્કામાં ત્વચા પર લાલ ચકામા (A સાચું), તાવ, થાક, અને ગળામાં લસિકા ગાંઠોની સોજો (B સાચું), તથા વાળનું પડી જવું અને નખમાં વિકૃતિઓ (D સાચું) જોવા મળે છે. પરંતુ મુખમાં અથવા જનનાંગોમાં ગાઢ, દુખાવાવાળા પૂતળિયા (C) પ્રાથમિક તબક્કાના લક્ષણ છે, દ્વિતીય તબક્કામાં નહીં.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 17}, {"question": "ગોનોરિયા અને ક્લેમાઇડિયા સંક્રમણ વચ્ચેનો સામાન્ય ગુણ નીચેનામાંથી કયો છે?", "options": ["A) બંને રોગો વાયરસ દ્વારા થાય છે.", "B) બંને રોગો માટે એન્ટિબાયોટિક્સ દ્વારા સારવાર શક્ય છે.", "C) બંને રોગો મુખ્યત્વે હવાથી ફેલાય છે.", "D) બંને રોગો માટે કોઈ રસી ઉપલબ્ધ નથી."], "correct": 1, "explanation": "ગોનોરિયા અને ક્લેમાઇડિયા બંને બેક્ટેરિયા દ્વારા થાય છે (A ખોટું). બંને રોગો મુખ્યત્વે લિંગીય સંપર્ક દ્વારા ફેલાય છે, હવાથી નહીં (C ખોટું). બંને રોગો માટે એન્ટિબાયોટિક્સ દ્વારા સારવાર શક્ય છે (B સાચું). ગોનોરિયા માટે રસી ઉપલબ્ધ નથી, પરંતુ ક્લેમાઇડિયા માટે પણ કોઈ રસી ઉપલબ્ધ નથી (D અર્ધસત્ય, પરંતુ B વધુ સાચું છે).", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 18}, {"question": "હર્પિસ સિમ્પ્લેક્સ વાયરસ-2 (HSV-2) અને હ્યુમન ઇમ્યુનોડેફિશિયન્સી વાયરસ (HIV) વચ્ચેનો સામાન્ય ગુણ નીચેનામાંથી કયો છે?", "options": ["A) બંને વાયરસ મુખ્યત્વે મચ્છરના ડંખ દ્વારા ફેલાય છે.", "B) બંને વાયરસ માટે કોઈ ચોક્કસ ઇલાજ ઉપલબ્ધ નથી, પરંતુ લક્ષણોને નિયંત્રિત કરી શકાય છે.", "C) બંને વાયરસ ડીએનએ (DNA) વાયરસ છે.", "D) બંને વાયરસ સંક્રમણ પછી તરત જ લક્ષણો દેખાય છે."], "correct": 1, "explanation": "HSV-2 અને HIV બંને મુખ્યત્વે લિંગીય સંપર્ક દ્વારા ફેલાય છે, મચ્છરના ડંખ દ્વારા નહીં (A ખોટું). બંને વાયરસ માટે કોઈ ચોક્કસ ઇલાજ ઉપલબ્ધ નથી, પરંતુ લક્ષણોને નિયંત્રિત કરી શકાય છે (B સાચું). HSV-2 એક DNA વાયરસ છે, પરંતુ HIV એક RNA વાયરસ છે (C ખોટું). બંને વાયરસ સંક્રમણ પછી તરત જ લક્ષણો દેખાતા નથી (D ખોટું).", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 19}, {"question": "એક વ્યક્તિએ લિંગીય સંપર્ક દ્વારા સંક્રમિત થતી બીમારી માટે ચિકિત્સા લીધી છે. ડોક્ટરે તેને પેનિસિલિન ઇન્જેક્શન આપ્યું છે, પરંતુ રોગના લક્ષણો બરકરાર રહ્યા છે. નીચેનામાંથી કયો રોગ આ સ્થિતિમાં સૌથી વધુ સંભવિત છે?", "options": ["A) સિફિલિસ (Syphilis)", "B) ગોનોરિયા (Gonorrhea)", "C) ક્લેમાઇડિયા (Chlamydia)", "D) ટ્રાઇકોમોનિયાસિસ (Trichomoniasis)"], "correct": 1, "explanation": "ગોનોરિયા (Gonorrhea) નો કારણભૂત સૂક્ષ્મજીવ *Neisseria gonorrhoeae* છે, જે પેનિસિલિન પ્રત્યે પ્રતિકારક બન્યો છે. સિફિલિસ (*Treponema pallidum*) પેનિસિલિનથી સારવાર યોગ્ય રીતે થાય છે, જ્યારે ક્લેમાઇડિયા અને ટ્રાઇકોમોનિયાસિસ માટે પેનિસિલિન પ્રથમ પસંદગી નથી. આથી, જો પેનિસિલિન કામ ન કરે, તો ગોનોરિયા સૌથી સંભવિત રોગ છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 20}, {"question": "એક વ્યક્તિમાં સિફિલિસના ત્રીજા તબક્કામાં ગમ્મા (Gumma) નામનું ગાંઠ જોવા મળે છે. આ ગાંઠ નીચેનામાંથી કયા અંગમાં સૌથી વધુ સામાન્ય રીતે જોવા મળે છે?", "options": ["A) મગજ", "B) હૃદય", "C) યકૃત", "D) ફેફસાં"], "correct": 2, "explanation": "સિફિલિસના ત્રીજા તબક્કામાં ગમ્મા (Gumma) નામનું ગ્રાન્યુલોમેટસ ગાંઠ સામાન્ય રીતે યકૃતમાં જોવા મળે છે. મગજ, હૃદય અને ફેફસાંમાં પણ ગમ્મા જોવા મળી શકે છે, પરંતુ યકૃત સૌથી સામાન્ય સ્થળ છે. આ તબક્કામાં સંક્રમણ કોષ્ટકીય (Systemic) બને છે અને વિવિધ અંગોને અસર કરે છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 21}, {"question": "નીચેનામાંથી કયો રોગ એવો છે જેના લક્ષણોમાં 'કોન્ડિલોમા લેટા' (Condyloma Lata) નામની મૃદુ, ભીની ગાંઠો જોવા મળે છે અને જે સિફિલિસના દ્વિતીય તબક્કામાં દેખાય છે?", "options": ["A) ગોનોરિયા", "B) ક્લેમાઇડિયા", "C) સિફિલિસ", "D) હર્પિસ સિમ્પ્લેક્સ વાયરસ-2"], "correct": 2, "explanation": "'કોન્ડિલોમા લેટા' સિફિલિસના દ્વિતીય તબક્કામાં જોવા મળતી લક્ષણ છે. ગોનોરિયા (A), ક્લેમાઇડિયા (B), અને HSV-2 (D)માં આ લક્ષણ જોવા મળતું નથી. સિફિલિસના દ્વિતીય તબક્કામાં ત્વચા પર ચકામા, તાવ, અને લસિકા ગાંઠો પણ જોવા મળે છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 22}, {"question": "એક સ્ત્રીમાં ટ્રાઇકોમોનિયાસિસ સંક્રમણના કિસ્સામાં, નીચેનામાંથી કયું લક્ષણ સામાન્ય રીતે જોવા મળતું નથી?", "options": ["A) યોનિમાં પીળાશ પડતું, ફેણાવાળું સ્રાવ", "B) યોનિમાં ખંજવાળ અને જળતી લાગણી", "C) મૂત્રમાર્ગમાં દુખાવો અને મૂત્ર કરતી વખતે જળતી લાગણી", "D) યોનિમાં લાલ ચકામા અને ફોડલા"], "correct": 3, "explanation": "ટ્રાઇકોમોનિયાસિસમાં સામાન્ય લક્ષણો છે: યોનિમાં પીળાશ પડતું, ફેણાવાળું સ્રાવ (A), ખંજવાળ અને જળતી લાગણી (B), અને મૂત્રમાર્ગમાં દુખાવો (C). યોનિમાં લાલ ચકામા અને ફોડલા (D) સામાન્ય રીતે જોવા મળતું નથી અને હર્પિસ સંક્રમણ સાથે સંકળાયેલું છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 23}, {"question": "નીચેનામાંથી કયો રોગ એવો છે જેના માટે 'જરાયતી પ્રતિકાર' (Sterile Immunity) વિકસિત થતો નથી, જેથી પુનરાવર્તન થવાની શક્યતા રહે છે?", "options": ["A) હર્પિસ સિમ્પ્લેક્સ વાયરસ-2 (HSV-2)", "B) હેપેટાઇટિસ B", "C) સિફિલિસ", "D) ગોનોરિયા"], "correct": 0, "explanation": "HSV-2 માટે જરાયતી પ્રતિકાર વિકસિત થતો નથી, જેથી વાયરસ શરીરમાં નિષ્ક્રિય રહી શકે છે અને પુનરાવર્તન થઈ શકે છે. હેપેટાઇટિસ B (B), સિફિલિસ (C), અને ગોનોરિયા (D) માટે પ્રતિકાર વિકસિત થાય છે અને પુનરાવર્તન થતું નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 24}, {"question": "એક વ્યક્તિમાં સંક્રમણના લક્ષણ તરીકે 'કોન્ડિલોમા એક્યુમિનેટા' (Condyloma Acuminata) જોવા મળે છે. આ સંક્રમણ વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) આ સંક્રમણ હ્યુમન પેપિલોમા વાયરસ (HPV) દ્વારા થાય છે અને તેના કેટલાક પ્રકારો ગર્ભાશયના કર્કરોગ સાથે સંકળાયેલા છે.", "B) આ સંક્રમણ ટ્રેપોનીમા પેલિડમ દ્વારા થાય છે અને તે સિફિલિસના દ્વિતીય તબક્કાનું લક્ષણ છે.", "C) આ સંક્રમણ નીસેરિયા ગોનોરિઆ દ્વારા થાય છે અને તે ગોનોરિયાનું વિશિષ્ટ લક્ષણ છે.", "D) આ સંક્રમણ ક્લેમાઇડિયા ટ્રેકોમેટિસ દ્વારા થાય છે અને તે પેલ્વિક ઇન્ફ્લેમેટરી ડિઝીઝ (PID) તરફ દોરી શકે છે."], "correct": 0, "explanation": "સાચું વિધાન A છે. 'કોન્ડિલોમા એક્યુમિનેટા' HPV (હ્યુમન પેપિલોમા વાયરસ) દ્વારા થતું સંક્રમણ છે, અને HPVના કેટલાક હાઇ-રિસ્ક પ્રકારો (જેમ કે HPV-16 અને HPV-18) ગર્ભાશયના કર્કરોગ સાથે સંકળાયેલા છે. B ખોટું છે કારણ કે 'કોન્ડિલોમા લેટા' સિફિલિસના દ્વિતીય તબક્કાનું લક્ષણ છે, જ્યારે 'કોન્ડિલોમા એક્યુમિનેટા' HPV સાથે સંકળાયેલ છે. C ખોટું છે કારણ કે ગોનોરિયા નીસેરિયા ગોનોરિઆ દ્વારા થાય છે, પરંતુ તેના લક્ષણોમાં કોન્ડિલોમા એક્યુમિનેટા સામેલ નથી. D ખોટું છે કારણ કે ક્લેમાઇડિયા ટ્રેકોમેટિસ દ્વારા થતું સંક્રમણ PID તરફ દોરી શકે છે, પરંતુ તે કોન્ડિલોમા એક્યુમિનેટા સાથે સંકળાયેલું નથી.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન સ્વાસ્થ્ય", "difficulty": "Hard", "num": 25}, {"question": "એક વ્યક્તિમાં 'કોન્ડિલોમા એક્યુમિનેટા' જોવા મળે છે. નીચેનામાંથી કયો વાયરસ આ લક્ષણ માટે જવાબદાર છે, અને આ રોગના સંદર્ભમાં કયું વિધાન સાચું નથી?", "options": ["A) હ્યુમન પેપિલોમા વાયરસ (HPV), અને આ રોગ માટે વેક્સીન ઉપલબ્ધ છે", "B) હર્પિસ સિમ્પ્લેક્સ વાયરસ-2 (HSV-2), અને આ રોગ માટે કોઈ ચોક્કસ ઇલાજ નથી", "C) હ્યુમન ઇમ્યુનોડેફિશિયન્સી વાયરસ (HIV), અને આ રોગ લિંગીય સંપર્ક દ્વારા ફેલાય છે", "D) હેપેટાઇટિસ B વાયરસ વાબદાર છે. HPVના ઉચ્ચ-જોખમી પ્રકારો જેમ કે HPV-16 અને HPV-18 સર્વાઇકલ કૅન્સર સાથે સંકળાયેલા છે. B ચૂક છે કારણ કે HSV-2 'કોન્ડિલોમા એક્યુમિનેટા' માટે જવાબદાર નથી અને સર્વાઇકલ કૅન્સરનું જોખમ વધારતો નથી. C ચૂક છે કારણ કે HIV સર્વાઇકલ કૅન્સરનું જોખમ વધારી શકે છે, પરંતુ તે 'કોન્ડિલોમા એક્યુમિનેટા' માટે જવાબદાર નથી. D ચૂક છે કારણ કે HPVના તમામ પ્રકારો સર્વાઇકલ કૅન્સરનું જોખમ વધારતા નથી, ફક્ત કેટલાક ઉચ્ચ-જોખમી પ્રકારો જ વધારે છે.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન સ્વાસ્થ્ય", "difficulty": "Hard", "num": 30}, {"question": "એક વ્યક્તિમાં 'કોન્ડિલોમા એક્યુમિનેટા' અને સર્વાઇકલ કૅન્સરના લક્ષણો જોવા મળે છે. નીચેનામાંથી કયો વાયરસ આ બંને સ્થિતિઓ સાથે સંકળાયેલ છે અને તેના માટે કયો ઇલાજ ઉપલબ્ધ છે?", "options": ["A) હ્યુમન પેપિલોમા વાયરસ (HPV) - ગાર્ડાસિલ ટીકા અને ક્રાયોથેરપી", "B) હર્પિસ સિમ્પ્લેક્સ વાયરસ-2 (HSV-2) - એસાયક્લોવિર અને સર્જિકલ રીમૂવલ", "C) હ્યુમન ઇમ્યુનોડેફિશિયન્સી વાયરસ (HIV) - એન્ટીરેટ્રોવાયરલ થેરપી અને રેડિયેશન", "D) હેપેટાઇટિસ B વાયરસ (HBV) - ઇન્ટરફેરોન અને કીમોથેરપી"], "correct": 0, "explanation": "કોન્ડિલોમા એક્યુમિનેટા અને સર્વાઇકલ કૅન્સર હ્યુમન પેપિલોમા વાયરસ (HPV) સાથે સંકળાયેલ છે. HPV માટે ગાર્ડાસિલ ટીકા અને ક્રાયોથેરપી જેવા ઇલાજ ઉપલબ્ધ છે. HSV-2 સેક્સ્યુઅલી ટ્રાન્સમિટેડ ઇન્ફેક્શન છે પરંતુ કૅન્સર સાથે સંકળાયેલ નથી. HIV અને HBV કૅન્સર સાથે સંકળાયેલ હોવા છતાં, તે કોન્ડિલોમા એક્યુમિનેટા સાથે સંકળાયેલ નથી.", "ncert_ref": "Class XII - Chapter 8: મનુષ્યમાં પ્રજનન તંત્ર", "difficulty": "Hard", "num": 31}, {"question": "એક વ્યક્તિને લિંગીય સંપર્ક દ્વારા સંક્રમિત થતી બીમારી છે, જેમાં નીચેનાં લક્ષણો જોવા મળે છે: ત્વચા પર લાલ ચકામા, તાવ, લસિકાગ્રંથિઓમાં સોજો અને મ્યુકોસ મેમ્બ્રેન પર સફેદ ચાંદા. આ લક્ષણો કયા રોગના દ્વિતીય તબક્કા (Secondary Stage) સાથે સુસંગત છે?", "options": ["A) ગોનોરિયા (Gonorrhoea)", "B) સિફિલિસ (Syphilis)", "C) હર્પિસ સિમ્પ્લેક્સ વાયરસ-2 (HSV-2)", "D) ટ્રાઇકોમોનિયાસિસ (Trichomoniasis)"], "correct": 1, "explanation": "સિફિલિસનો દ્વિતીય તબક્કો (Secondary Syphilis) ત્વચા પર લાલ ચકામા (રેશ), તાવ, લસિકાગ્રંથિઓમાં સોજો અને મ્યુકોસ મેમ્બ્રેન પર સફેદ ચાંદા (મ્યુકોસ પેચ) જેવાં લક્ષણો દર્શાવે છે. ગોનોરિયામાં મુખ્યત્વે મૂત્રમાર્ગમાં સ્રાવ અને દુખાવો જોવા મળે છે. HSV-2માં ફોલ્લીઓ અને દુખાવો થાય છે, જ્યારે ટ્રાઇકોમોનિયાસિસમાં યોનિમાર્ગમાં ફીણયુક્ત સ્રાવ અને ખંજવાળ જોવા મળે છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 32}, {"question": "નીચેનામાંથી કયું વિધાન હ્યુમન પેપિલોમા વાયરસ (HPV) અને હ્યુમન ઇમ્યુનોડેફિશિયન્સી વાયરસ (HIV) વચ્ચેના તફાવતને યોગ્ય રીતે વર્ણવે છે?", "options": ["A) HPV મુખ્યત્વે લિંગીય સંપર્ક દ્વારા ફેલાય છે, જ્યારે HIV લોહી અને શારીરિક પ્રવાહી દ્વારા ફેલાય છે.", "B) HPV સંક્રમણથી કોષોનું અનિયંત્રિત વિભાજન થઈ કૅન્સર થઈ શકે છે, જ્યારે HIV સીધું કૅન્સરનું કારણ નથી.", "C) HPV માટે રસી ઉપલબ્ધ છે, જ્યારે HIV માટે હજુ સુધી કોઈ રસી વિકસિત થઈ નથી.", "D) ઉપરોક્ત તમામ વિધાનો સાચાં છે."], "correct": 3, "explanation": "HPV મુખ્યત્વે લિંગીય સંપર્ક દ્વારા ફેલાય છે અને તેનાથી સર્વાઇકલ કૅન્સર જેવા કૅન્સર થઈ શકે છે. HIV લોહી અને શારીરિક પ્રવાહી દ્વારા ફેલાય છે અને તે સીધું કૅન્સરનું કારણ નથી, પરંતુ તે રોગપ્રતિકારક શક્તિને નબળી પાડે છે. HPV માટે રસી (જેમ કે ગાર્ડાસિલ) ઉપલબ્ધ છે, જ્યારે HIV માટે હજુ સુધી કોઈ રસી વિકસિત થઈ નથી. આથી તમામ વિધાનો સાચાં છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 33}, {"question": "એક સ્ત્રીમાં નીચેનાં લક્ષણો જોવા મળે છે: યોનિમાર્ગમાં ફીણયુક્ત પીળાશ પડતો સ્રાવ, ખંજવાળ અને દુર્ગંધ. આ લક્ષણો કયા પ્રજીવ (Protozoan) દ્વારા થતા રોગ સાથે સુસંગત છે, અને આ રોગ માટે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) આ રોગ ટ્રાઇકોમોનાસ વેજિનાલિસ (Trichomonas vaginalis) દ્વારા થાય છે.", "B) આ રોગનું નિદાન યોનિમાર્ગના સ્રાવના સૂક્ષ્મદર્શકીય પરીક્ષણથી થઈ શકે છે.", "C) આ રોગનો ઇલાજ મેટ્રોનિડાઝોલ (Metronidazole) દવાથી થઈ શકે છે.", "D) આ રોગ માત્ર સ્ત્રીઓમાં જ થાય છે અને પુરુષોમાં કોઈ લક્ષણો જોવા મળતા નથી."], "correct": 3, "explanation": "ટ્રાઇકોમોનિયાસિસ ટ્રાઇકોમોનાસ વેજિનાલિસ નામના પ્રજીવ દ્વારા થાય છે. તેનું નિદાન યોનિમાર્ગના સ્રાવના સૂક્ષ્મદર્શકીય પરીક્ષણથી થઈ શકે છે અને તેનો ઇલાજ મેટ્રોનિડાઝોલ દવાથી થઈ શકે છે. આ રોગ પુરુષોમાં પણ થઈ શકે છે, જેમાં મૂત્રમાર્ગમાં સોજો અને સ્રાવ જેવાં લક્ષણો જોવા મળી શકે છે. આથી વિધાન D ખોટું છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 34}, {"question": "એક વ્યક્તિમાં નીચેનાં લક્ષણો જોવા મળે છે: લિંગીય અંગો પર પીડારહિત, સખત અને ઉભરેલા ચાંદા (ulcer), ત્યારબાદ શરીર પર લાલ ચકામા (rash), તાવ અને લસિકાગ્રંથિઓમાં સોજો. આ લક્ષણોને આધારે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) આ રોગ *ટ્રેપોનેમા પેલિડમ* (Treponema pallidum) નામના બેક્ટેરિયા દ્વારા થાય છે", "B) આ રોગના પ્રાથમિક તબક્કામાં જોવા મળતા ચાંદાને *શેન્કર* (Chancre) કહે છે, જે સામાન્ય રીતે 3-6 અઠવાડિયામાં આપોઆપ રુઝાઈ જાય છે", "C) આ રોગના દ્વિતીય તબક્કામાં જોવા મળતા લાલ ચકામા (rash) *કોન્ડિલોમા લેટા* (Condyloma Lata) તરીકે ઓળખાય છે, જે અત્યંત ચેપી હોય છે", "D) આ રોગના ત્રીજા તબક્કામાં *ગમ્મા* (Gumma) નામની ગાંઠો જોવા મળે છે, જે મુખ્યત્વે ત્વચા, હાડકાં અને યકૃતને અસર કરે છે"], "correct": 2, "explanation": "વિકલ્પ C ખોટો છે કારણ કે *કોન્ડિલોમા લેટા* એ દ્વિતીય તબક્કાના સિફિલિસમાં જોવા મળતી ભીની, ચપટી અને ચેપી ગાંઠો છે, પરંતુ તેને 'લાલ ચકામા' (rash) તરીકે ઓળખવામાં આવતા નથી. લાલ ચકામા (rash) સામાન્ય રીતે ત્વચા પર ફેલાય છે અને તેને *મેક્યુલોપેપ્યુલર રેશ* કહે છે. બાકીના વિકલ્પો સાચા છે: વિકલ્પ A *ટ્રેપોનેમા પેલિડમ* સિફિલિસનો કારક છે (NCERT Class XII, Chapter 8: માનવ સ્વાસ્થ્ય અને રોગ), વિકલ્પ B પ્રાથમિક તબક્કાના શેન્કરનું સાચું વર્ણન છે, અને વિકલ્પ D ત્રીજા તબક્કાના ગમ્મા વિશે સાચી માહિતી આપે છે.", "ncert_ref": "Class XII - અધ્યાય 8: માનવ સ્વાસ્થ્ય અને રોગ", "difficulty": "Hard", "num": 35}, {"question": "36. એક વ્યક્તિમાં લિંગીય સંપર્ક દ્વારા સંક્રમિત થતી બીમારીના લક્ષણ તરીકે 'કોન્ડિલોમા એક્યુમિનેટા' જોવા મળે છે. નીચેનામાંથી કયો વાયરસ આ લક્ષણ સાથે સંકળાયેલ છે અને તેના માટે કયો ઇલાજ ઉપલબ્ધ છે?", "options": ["A) હ્યુમન પેપિલોમા વાયરસ (HPV), અને તેના માટે ગાર્ડાસિલ નામનું લસીકરણ ઉપલબ્ધ છે", "B) હર્પિસ સિમ્પ્લેક્સ વાયરસ-2 (HSV-2), અને તેના માટે એસાયક્લોવિર નામની દવા ઉપલબ્ધ છે", "C) હ્યુમન ઇમ્યુનોડેફિશિયન્સી વાયરસ (HIV), અને ત         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
