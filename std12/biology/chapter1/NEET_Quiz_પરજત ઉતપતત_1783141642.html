<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - પ્રજાતિ ઉત્પત્તિ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 પ્રજાતિ ઉત્પત્તિ</span>
                <span>🎯 Hard</span>
                <span>📝 71 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "ડાર્વિનના પ્રાકૃતિક પસંદગીના સિદ્ધાંત અનુસાર, નીચેનામાંથી કયું વિધાન સૌથી યોગ્ય રીતે સમજાવે છે કે કેવી રીતે પ્રજાતિઓમાં વિવિધતા ઉત્પન્ન થાય છે?", "options": ["A) પર્યાવરણીય દબાણોને કારણે જનીનમાં થતી યાદચ્છિક મ્યુટેશન અને તેની પસંદગીથી વિવિધતા ઉત્પન્ન થાય છે.", "B) પ્રજનન દરમિયાન વર્ણસૂત્રોના યાદચ્છિક વિતરણને કારણે નવી પ્રજાતિઓ ઉત્પન્ન થાય છે.", "C) એક જ પ્રજાતિના સભ્યો વચ્ચે લાંબા સમય સુધી અલગતા રહેવાથી નવી પ્રજાતિઓ ઉત્પન્ન થાય છે.", "D) પ્રાણીઓમાં પ્રતિરક્ષાતંત્રની ક્રિયાશીલતાને કારણે નવી પ્રજાતિઓ ઉત્પન્ન થાય છે."], "correct": 0, "explanation": "ડાર્વિનના પ્રાકૃતિક પસંદગીના સિદ્ધાંત અનુસાર, પર્યાવરણીય દબાણો હેઠળ જીવિત રહેવા માટે અનુકૂળ લક્ષણો ધરાવતા જીવોની પસંદગી થાય છે. આ લક્ષણો જનીનમાં થતી યાદચ્છિક મ્યુટેશન દ્વારા ઉત્પન્ન થાય છે. આથી, વિકલ્પ A સૌથી યોગ્ય છે. વિકલ્પ B મેન્ડેલના અનુવંશિકતાના સિદ્ધાંતને દર્શાવે છે, વિકલ્પ C જૈવ-ભૌગોલિક અલગતાને દર્શાવે છે પરંતુ પ્રજાતિ ઉત્પત્તિના પૂરતા કારણને સમજાવતો નથી, અને વિકલ્પ D પ્રતિરક્ષાતંત્ર સાથે સંબંધિત નથી.", "ncert_ref": "Class XII - પ્રકરણ 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 1}, {"question": "જો એક જાતિમાં આનુવંશિક વિવિધતા અચાનક ઘટી જાય, તો નીચેનામાંથી કયું પરિણામ સૌથી વધુ સંભવિત છે?", "options": ["A) જાતિની પ્રજનન ક્ષમતા વધશે.", "B) જાતિ પર્યાવરણીય પરિવર્તનોને અનુકૂળ થવાની ક્ષમતા ગુમાવી શકે છે.", "C) જાતિમાં નવી પ્રજાતિઓની ઉત્પત્તિની ગતિ વધશે.", "D) જાતિના સભ્યોની આયુષ્ય વધશે."], "correct": 1, "explanation": "આનુવંશિક વિવિધતા ઘટવાથી જાતિ પર્યાવરણીય પરિવર્તનોને અનુકૂળ થવાની ક્ષમતા ગુમાવે છે, કારણ કે અનુકૂળન માટે જરૂરી જનીનિક વૈવિધ્ય નહીં રહે. આથી, વિકલ્પ B સૌથી યોગ્ય છે. વિકલ્પ A, C, અને D આનુવંશિક વિવિધતાના ઘટાડાને સીધા સંબંધિત નથી.", "ncert_ref": "Class XII - પ્રકરણ 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 2}, {"question": "નીચેનામાંથી કયું વિધાન 'જીન ફ્લો' (જનીન પ્રવાહ) વિશે સાચું નથી?", "options": ["A) જીન ફ્લો એ એક જાતિમાંથી બીજી જાતિમાં જનીનનું સ્થાનાંતરણ છે.", "B) જીન ફ્લો જાતિઓ વચ્ચેની આનુવંશિક વિવિધતામાં વધારો કરે છે.", "C) જીન ફ્લો હંમેશા નવી પ્રજાતિઓની ાં મદદ કરે છે.", "D) પર્યાવરણીય સ્થળાંતર ફક્ત પ્રાણીઓમાં જ અસર કરે છે, વનસ્પતિઓમાં નહીં."], "correct": 2, "explanation": "પર્યાવરણીય સ્થળાંતર જાતિઓ વચ્ચેના સહ-અસ્તિત્વને પ્રોત્સાહન આપે છે અને નવી જાતિઓની ઉત્પત્તિમાં મદદ કરે છે. વિધાન A ખોટું છે કારણ કે પર્યાવરણીય સ્થળાંતર જાતિની ઉત્પત્તિમાં મહત્વની ભૂમિકા ભજવે છે. વિધાન B ખોટું છે કારણ કે બે જાતિઓ એક જ પર્યાવરણીય સ્થળાંતરમાં રહી શકે છે અને સ્પર્ધા ન થાય. વિધાન D ખોટું છે કારણ કે પર્યાવરણીય સ્થળાંતર પ્રાણીઓ અને વનસ્પતિઓ બંનેમાં અસર કરે છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 8}, {"question": "નીચેનામાંથી કયું વિધાન 'જાતિ ઉત્પત્તિ (Speciation)' અને 'જનીન વહન (Gene flow)' વચ્ચેના સંબંધ વિશે સાચું છે?", "options": ["A) જનીન વહન જાતિ ઉત્પત્તિને પ્રોત્સાહન આપે છે કારણ કે તે આનુવંશિક વિવિધતામાં વધારો કરે છે.", "B) જનીન વહન જાતિ ઉત્પત્તિને રોકે છે કારણ કે તે આનુવંશિક વિવિધતામાં ઘટાડો કરે છે.", "C) જનીન વહન અને જાતિ ઉત્પત્તિ વચ્ચે કોઈ સંબંધ નથી.", "D) જનીન વહન ફક્ત જાતિ ઉત્પત્તિ પછી જ થાય છે."], "correct": 1, "explanation": "જનીન વહન જાતિ ઉત્પત્તિને રોકે છે કારણ કે તે આનુવંશિક વિવિધતામાં ઘટાડો કરે છે અને જાતિઓ વચ્ચેના તફાવતને ઘટાડે છે. વિધાન A ખોટું છે કારણ કે જનીન વહન જાતિ ઉત્પત્તિને રોકે છે, પ્રોત્સાહન આપતું નથી. વિધાન C ખોટું છે કારણ કે જનીન વહન અને જાતિ ઉત્પત્તિ વચ્ચે સંબંધ છે. વિધાન D ખોટું છે કારણ કે જનીન વહન જાતિ ઉત્પત્તિ પહેલા પણ થઈ શકે છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 9}, {"question": "નીચેનામાંથી કયું ઉદાહરણ 'સહ-ઉત્ક્રાંતિ (Co-evolution)' નું સૌથી યોગ્ય ઉદાહરણ છે?", "options": ["A) મધમાખી અને ફૂલો વચ્ચેનો સંબંધ, જ્યાં મધમાખી ફૂલોનું પરાગીકરણ કરે છે અને ફૂલો મધમાખીને મધ પૂરું પાડે છે.", "B) શેર અને હરણ વચ્ચેનો સંબંધ, જ્યાં શેર હરણનું શિકાર કરે છે.", "C) માનવ અને કૂતરો વચ્ચેનો સંબંધ, જ્યાં માનવ કૂતરાને પાળે છે.", "D) બેક્ટેરિયા અને વાયરસ વચ્ચેનો સંબંધ, જ્યાં વાયરસ બેક્ટેરિયાને સંક્રમિત કરે છે."], "correct": 0, "explanation": "મધમાખી અને ફૂલો વચ્ચેનો સંબંધ સહ-ઉત્ક્રાંતિનું સૌથી યોગ્ય ઉદાહરણ છે કારણ કે બંને જાતિઓ એકબીજાના લાભ માટે ઉત્ક્રાંત થઈ છે. વિધાન B, C, અને D સહ-ઉત્ક્રાંતિના ઉદાહરણ નથી કારણ કે તેમાં એક જાતિ બીજી જાતિનો લાભ લે છે અથવા નુકસાન કરે છે, પરંતુ બંને જાતિઓ એકબીજાના લાભ માટે ઉત્ક્રાંત થઈ નથી.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 10}, {"question": "એક જાતિમાં અલ્પસંખ્યાક જૂથ (founder population) દ્વારા નવી ભૌગોલિક જગ્યાએ સ્થાપિત થવાને કારણે થતી પ્રજાતિ ઉત્પત્તિને કયા પ્રકારની પ્રજાતિ ઉત્પત્તિ કહેવાય છે?", "options": ["A) સંકર ઉત્પત્તિ (Hybrid speciation)", "B) ભૌગોલિક અલગીકરણ (Allopatric speciation)", "C) સ્થાપક પરિણામ (Founder effect)", "D) સહ-ઉત્ક્રાંતિ (Co-evolution)"], "correct": 2, "explanation": "સ્થાપક પરિણામ (Founder effect) એ અલ્પસંખ્યાક જૂથ દ્વારા નવી જગ્યાએ સ્થાપિત થવાને કારણે થતી જનીન વિવિધતામાં ઘટાડો અને નવી જાતિની ઉત્પત્તિનો એક પ્રકાર છે. સંકર ઉત્પત્તિ (A) હાઇબ્રિડાઈઝેશન દ્વારા થાય છે, ભૌગોલિક અલગીકરણ (B) ભૌગોલિક અવરોધો દ્વારા થાય છે, અને સહ-ઉત્ક્રાંતિ (D) બે જાતિઓ વચ્ચેના પરસ્પર અનુકૂલનને લગતું છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 11}, {"question": "નીચેનામાંથી કયું વિધાન 'પરિણામી બોટલનેક (Genetic bottleneck)' અને પ્રજાતિ ઉત્પત્તિ વચ્ચેના સંબંધ વિશે સાચું છે?", "options": ["A) પરિણામી બોટલનેક જાતિની જનીન વિવિધતામાં વૃદ્ધિ કરે છે, જે પ્રજાતિ ઉત્પત્તિને પ્રોત્સાહન આપે છે.", "B) પરિણામી બોટલનેક જાતિની જનીન વિવિધતામાં ઘટાડો કરે છે, જે પ્રજાતિ ઉત્પત્તિને અવરોધે છે.", "C) પરિણામી બોટલનેક જાતિની જનીન વિવિધતામાં ઘટાડો કરે છે, પરંતુ તે પ્રજાતિ ઉત્પત્તિને પ્રોત્સાહન આપી શકે છે.", "D) પરિણામી બોટલનેક અને પ્રજાતિ ઉત્પત્તિ વચ્ચે કોઈ સંબંધ નથી."], "correct": 2, "explanation": "પરિણામી બોટલનેક જાતિની જનીન વિવિધતામાં ઘટાડો કરે છે, પરંતુ આ ઘટાડો નવી જાતિની ઉત્પત્તિને પ્રોત્સાહન આપી શકે છે, ખાસ કરીને જ્યારે અલગીકૃત જૂથો નવી પર્યાવરણીય પરિસ્થિતિઓમાં અનુકૂલન પામે છે. વિકલ્પ A અને B અંશતઃ સાચા છે પરંતુ અપૂર્ણ છે, જ્યારે વિકલ્પ D ખોટો છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 12}, {"question": "નીચેનામાંથી કયું ઉદાહરણ 'સંપર્ક ક્ષેત્ર (Hybrid zone)' નું સૌથી યોગ્ય ઉદાહરણ છે?", "options": ["A) બે જાતિઓના વિતરણ ક્ષેત્રો વચ્ચેનો પ્રદેશ જ્યાં તેઓ પરસ્પર પ્રજનન કરે છે અને સંકર સંતતિ ઉત્પન્ન કરે છે.", "B) એક જાતિનો પ્રદેશ જ્યાં જનીન વહન સક્રિય રીતે થાય છે.", "C) એક જાતિનો પ્રદેશ જ્યાં પ્રાકૃતિક પસંદગી સક્રિય રીતે કામ કરે છે.", "D) એક જાતિનો પ્રદેશ જ્યાં મ્યુટેશન દર ઉચ્ચ હોય છે."], "correct": 0, "explanation": "સંપર્ક ક્ષેત્ર (Hybrid zone) એ બે જાતિઓના વિતરણ ક્ષેત્રો વચ્ચેનો પ્રદેશ છે જ્યાં તેઓ પરસ્પર પ્રજનન કરે છે અને સંકર સંતતિ ઉત્પન્ન કરે છે. વિકલ્પ B, C, અને D એ સંપર્ક ક્ષેત્રની વ્યાખ્યા સાથે મેળ ખાતા નથી.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 13}, {"question": "નીચેનામાંથી કયું વિધાન 'પોલિપ્લોઇડી (Polyploidy)' અને પ્રજાતિ ઉત્પત્તિ વિશે સાચું છે?", "options": ["A) પોલિપ્લોઇડી ફક્ત પ્રાણીઓમાં પ્રજાતિ ઉત્પત્તિનું કારણ બને છે.", "B) પોલિપ્લોઇડી વનસ્પતિઓમાં પ્રજાતિ ઉત્પત્તિનું એક મહત્વપૂર્ણ કારણ છે, પરંતુ પ્રાણીઓમાં નહીં.", "C) પોલિપ્લોઇડી પ્રાણીઓ અને વનસ્પતિઓ બંનેમાં પ્રજાતિ ઉત્પત્તિનું એક મહત્વપૂર્ણ કારણ છે.", "D) પોલિપ્લોઇડી પ્રજાતિ ઉત્પત્તિ સાથે સંબંધિત નથી."], "correct": 1, "explanation": "પોલિપ્લોઇડી વનસ્પતિઓમાં પ્રજાતિ ઉત્પત્તિનું એક મહત્વપૂર્ણ કારણ છે, પરંતુ પ્રાણીઓમાં તે અત્યંત દુર્લભ છે. વિકલ્પ A, C, અને D ખોટા છે કારણ કે તેઓ પોલિપ્લોઇડીની ભૂમિકાને ચોક્કસપણે વર્ણવતા નથી.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 14}, {"question": "નીચેનામાંથી કયું વિધાન 'પર્યાવરણીય પ્રજાતિ ઉત્પત્તિ (Ecological speciation)' વિશે સાચું છે?", "options": ["A) પર્યાવરણીય પ્રજાતિ ઉત્પત્તિ ફક્ત ભૌગોલિક અલગીકરણ દ્વારા થાય છે.", "B) પર્યાવરણીય પ્રજાતિ ઉત્પત્તિ એ પ્રક્રિયા છે જ્યાં જાતિઓ પર્યાવરણીય પરિબળોને લીધે અલગ પડે છે અને નવી જાતિઓની ઉત્પત્તિ થાય છે.", "C) પર્યાવરણીય પ્રજાતિ ઉત્પત્તિ એ પ્રક્રિયા છે જ્યાં જાતિઓ જનીન વહન દ્વારા અલગ પડે છે.", "D) પર્યાવરણીય પ્રજાતિ ઉત્પત્તિ એ પ્રક્રિયા છે જ્યાં જાતિઓ પ્રાકૃતિક પસંદગી દ્વારા અલગ પડે છે."], "correct": 1, "explanation": "પર્યાવરણીય પ્રજાતિ ઉત્પત્તિ એ પ્રક્રિયા છે જ્યાં જાતિઓ પર્યાવરણીય પરિબળોને લીધે અલ બંધ થઈ જાય છે", "C) સંપર્ક ક્ષેત્રમાં સંકર સંતતિ (Hybrid offspring) ઉત્પન્ન થાય છે", "D) સંપર્ક ક્ષેત્રમાં બે જાતિઓ વચ્ચેના આનુવંશિક તફાવતો ઘટી શકે છે"], "correct": 1, "explanation": "સંપર્ક ક્ષેત્રમાં જનીન વહન (Gene flow) થવાનું બંધ થતું નથી, પરંતુ તે ચાલુ રહે છે. A) સાચું છે કારણ કે સંપર્ક ક્ષેત્રમાં બે જાતિઓ વચ્ચે સંકરણ થવાનું ચાલુ રહે છે. C) સાચું છે કારણ કે સંપર્ક ક્ષેત્રમાં સંકર સંતતિ ઉત્પન્ન થાય છે. D) સાચું છે કારણ કે સંપર્ક ક્ષેત્રમાં બે જાતિઓ વચ્ચેના આનુવંશિક તફાવતો ઘટી શકે છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 20}, {"question": "નીચેનામાંથી કયું વિધાન 'પરિણામી અલગીકરણ (Genetic isolation)' અને પ્રજાતિ ઉત્પત્તિ વચ્ચેના સંબંધ વિશે સાચું નથી?", "options": ["A) પરિણામી અલગીકરણ જાતિઓ વચ્ચે જનીન વહનને રોકીને પ્રજાતિ ઉત્પત્તિને પ્રોત્સાહન આપે છે.", "B) ભૌગોલિક અવરોધો દ્વારા થતું પરિણામી અલગીકરણ સહજ રીતે પ્રજાતિ ઉત્પત્તિ તરફ દોરી જાય છે.", "C) પરિણામી અલગીકરણ વગર પણ પ્રજાતિ ઉત્પત્તિ થઈ શકે છે, જેમ કે પોલિપ્લોઇડી દ્વારા.", "D) પરિણામી અલગીકરણ હંમેશા પ્રજાતિ ઉત્પત્તિ તરફ દોરી જાય છે, ભલે અન્ય પરિબળો અનુકૂળ ન હોય."], "correct": 3, "explanation": "પરિણામી અલગીકરણ પ્રજાતિ ઉત્પત્તિ માટે એક મહત્વપૂર્ણ પરિબળ છે, પરંતુ તે હંમેશા પ્રજાતિ ઉત્પત્તિ તરફ દોરી જતું નથી. પ્રજાતિ ઉત્પત્તિ માટે અન્ય પરિબળો જેમ કે પ્રાકૃતિક પસંદગી, જનીન વહન, અને પર્યાવરણીય પરિબળો પણ મહત્વપૂર્ણ છે. વિકલ્પ D ખોટો છે કારણ કે તે કહે છે કે પરિણામી અલગીકરણ હંમેશા પ્રજાતિ ઉત્પત્તિ તરફ દોરી જાય છે, જે સાચું નથી. વિકલ્પ A, B, અને C સાચા છે કારણ કે તેઓ પરિણામી અલગીકરણ અને પ્રજાતિ ઉત્પત્તિ વચ્ચેના સંબંધને યોગ્ય રીતે સમજાવે છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 21}, {"question": "નીચેનામાંથી કયું ઉદાહરણ 'સંપર્ક ક્ષેત્ર (Hybrid zone)' નું ઉદાહરણ નથી?", "options": ["A) લાયન અને ટાઇગર વચ્ચે થતું સંકરીકરણ", "B) બ્લૂ જેય અને વ્હાઇટ-થ્રોટેડ સ્પેરો વચ્ચેનો ઓવરલેપિંગ વિસ્તાર", "C) મેડોસ્વીટ અને ફાયરવીડ વચ્ચેનો સંકર વિસ્તાર", "D) ડોનકી અને હોર્સ વચ્ચે થતું સંકરીકરણ"], "correct": 0, "explanation": "લાયન અને ટાઇગર વચ્ચે થતું સંકરીકરણ (Liger) એક સંપર્ક ક્ષેત્રનું ઉદાહરણ નથી કારણ કે આ જાતિઓ પ્રાકૃતિક રીતે એકબીજા સાથે સંપર્કમાં આવતી નથી. સંપર્ક ક્ષેત્ર એટલે પ્રાકૃતિક રીતે ઓવરલેપ થતાં વિસ્તારોમાં જાતિઓ વચ્ચે થતું સંકરીકરણ. વિકલ્પ B, C, અને D સાચા સંપર્ક ક્ષેત્રના ઉદાહરણો છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 22}, {"question": "નીચેનામાંથી કયું વિધાન 'પરિણામી વહન (Genetic drift)' અને પ્રજાતિ ઉત્પત્તિ વિશે સાચું છે?", "options": ["A) પરિણામી વહન મોટી વસતિમાં પ્રજાતિ ઉત્પત્તિ માટે મહત્વપૂર્ણ પરિબળ છે.", "B) પરિણામી વહન નાની વસતિમાં જનીન વિવિધતાને ઘટાડીને પ્રજાતિ ઉત્પત્તિને પ્રોત્સાહન આપે છે.", "C) પરિણામી વહન હંમેશા પ્રજાતિ ઉત્પત્તિ તરફ દોરી જાય છે.", "D) પરિણામી વહન અને પ્રાકૃતિક પસંદગી એકબીજા સાથે સંબંધિત નથી."], "correct": 1, "explanation": "પરિણામી વહન નાની વસતિમાં જનીન વિવિધતાને ઘટાડીને પ્રજાતિ ઉત્પત્તિને પ્રોત્સાહન આપે છે. વિકલ્પ A ખોટો છે કારણ કે પરિણામી વહન મોટી વસતિમાં અસરકારક નથી. વિકલ્પ C ખોટો છે કારણ કે પરિણામી વહન હંમેશા પ્રજાતિ ઉત્પત્તિ તરફ દોરી જતું નથી. વિકલ્પ D ખોટો છે કારણ કે પરિણામી વહન અને પ્રાકૃતિક પસંદગી બંને જનીન વિવિધતાને અસર કરે છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 23}, {"question": "નીચેનામાંથી કયું વિધાન 'અલોપત્તિ (Extinction)' અને પ્રજાતિ ઉત્પત્તિ વચ્ચેના સંબંધ વિશે સાચું નથી?", "options": ["A) અલોપત્તિ પ્રજાતિ ઉત્પત્તિ માટે નવી પર્યાવરણીય જગ્યા ઉભી કરે છે.", "B) અલોપત્તિ પ્રજાતિ ઉત્પત્તિની ગતિને ઘટાડે છે કારણ કે તે જનીન વિવિધતાને ઘટાડે છે.", "C) અલોપત્તિ પ્રજાતિ ઉત્પત્તિ માટે પ્રેરક પરિબળ હોઈ શકે છે.", "D) અલોપત્તિ અને પ્રજાતિ ઉત્પત્તિ વચ્ચે કોઈ સંબંધ નથી."], "correct": 3, "explanation": "અલોપત્તિ અને પ્રજાતિ ઉત્પત્તિ વચ્ચે સંબંધ છે. અલોપત્તિ નવી પર્યાવરણીય જગ્યા ઉભી કરી શકે છે, જે પ્રજાતિ ઉત્પત્તિ માટે પ્રેરક પરિબળ બની શકે છે. વિકલ્પ D ખોટો છે કારણ કે તે કહે છે કે અલોપત્તિ અને પ્રજાતિ ઉત્પત્તિ વચ્ચે કોઈ સંબંધ નથી. વિકલ્પ A, B, અને C સાચા છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 24}, {"question": "નીચેનામાંથી કયું વિધાન 'પોલિપ્લોઇડી (Polyploidy)' દ્વારા પ્રજાતિ ઉત્પત્તિ વિશે સાચું નથી?", "options": ["A) પોલિપ્લોઇડી વનસ્પતિઓમાં પ્રજાતિ ઉત્પત્તિનું એક મહત્વપૂર્ણ સાધન છે.", "B) પોલિપ્લોઇડી દ્વારા થતી પ્રજાતિ ઉત્પત્તિ સહજ રીતે અને કૃત્રિમ રીતે થઈ શકે છે.", "C) પોલિપ્લોઇડી દ્વારા થતી પ્રજાતિ ઉત્પત્તિ હંમેશા ફળદાયી હોય છે.", "D) પોલિપ્લોઇડી દ્વારા થતી પ્રજાતિ ઉત્પત્તિ વર્ણસૂત્રની સંખ્યામાં વધારો દ્વારા થાય છે."], "correct": 2, "explanation": "પોલિપ્લોઇડી દ્વારા થતી પ્રજાતિ ઉત્પત્તિ હંમેશા ફળદાયી નથી. કેટલીક વખત પોલિપ્લોઇડ જાતિઓ અફળદાયી હોઈ શકે છે. વિકલ્પ A, B, અને D સાચા છે કારણ કે તેઓ પોલિપ્લોઇડી દ્વારા પ્રજાતિ ઉત્પત્તિ વિશે સાચી માહિતી આપે છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 25}, {"question": "એક જાતિમાં 'પરિણામી અલગીકરણ' (Genetic isolation) ની સ્થિતિમાં, નીચેનામાંથી કયું પરિબળ પ્રજાતિ ઉત્પત્તિને સૌથી વધુ પ્રોત્સાહન આપે છે, જ્યારે બે જૂથો વચ્ચે ભૌગોલિક અવરોધ હાજર ન હોય?", "options": ["A) સહ-ઉત્ક્રાંતિ (Co-evolution) દ્વારા પરસ્પર આશ્રિત જાતિઓની ઉત્પત્તિ", "B) પ્રજનન કાળમાં તફાવત (Temporal isolation) જેવા કે વસંત ઋતુમાં એક જૂથ અને પાનખર ઋતુમાં બીજું જૂથ પ્રજનન કરે", "C) એક જૂથમાં પોલિપ્લોઇડી (Polyploidy) ની ઉત્પત્તિ, જ્યારે બીજું જૂથ ડિપ્લોઇડ રહે", "D) એક જૂથમાં ઉત્સેચક (Enzyme) ની ક્રિયાશીલતામાં ફેરફાર થવો, જ્યારે બીજું જૂથ મૂળ સ્વરૂપ જાળવી રાખે"], "correct": 1, "explanation": "પરિણામી અલગીકરણ પ્રજાતિ ઉત્પત્તિનું મુખ્ય કારણ છે. પ્રજનન કાળમાં તફાવત (Temporal isolation) એ ભૌગોલિક અવરોધ વગર પણ બે જૂથો વચ્ચે પ્રજનન અવરોધ ઉભો કરે છે, જેથી પ્રજાતિ ઉત્પત્તિ થાય. સહ-ઉત્ક્રાંતિ (A) એ પરસ્પર જાતિઓ વચ્ચેનો સંબંધ છે, પોલિપ્લોઇડી (C) એ ક્રોમોઝોમલ ફેરફાર છે, અને ઉત્સેચક ફેરફાર (D) એ જનીન ફેરફાર છે, પરંતુ આમાંથી પ્રજનન કાળનો તફાવત સૌથી સીધો અને પ્રભાવી પરિબળ છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 26}, {"question": "નીચેનામાંથી કયું વિધાન 'સંપર્ક ક્ષેત્ર' (Hybrid zone) અને પ્રજાતિ ઉત્પત્તિ વચ્ચેના સંબંધ વિશે સાચું નથી?", "options": ["A) સંપર્ક ક્ષેત્રમાં, બે જાતિઓ વચ્ચેના સંકરીકરણથી નવી જાતિની ઉત્પત્તિ થઈ શકે", "B) સંપર્ક ક્ષેત્રમાં, જો સંકર સંતાનો કમજોર હોય, તો પ્રજાતિ ઉત્પત્તિ થવાની શક્યતા ઘટે", "C) સંપર્ક ક્ષેત્રમાં, બે જાતિઓ વચ્ચેના જનીન વહન (Gene flow) ને લીધે પ્રજાતિ ઉત્પત્તિ થતી અટકાવી શકાય", "D) સંપર્ક ક્ષેત્રમાં, બે જાતિઓ વચ્ચેના સંકરીકરણથી હંમેશા નવી જાતિની ઉત્પત્તિ થાય"], "correct": 3, "explanation": "સંપર્ક ક્ષેત્રમાં સંકરીકરણથી નવી જાતિની ઉત્પત્તિ થઈ શકે (A), પરંતુ તે હંમેશા થતું નથી. જો સંકર સંતાનો કમજોર હોય, તો પ્રજાતિ ઉત્પત્તિ થવાની શક્યતા ઘટે (B), અને જનીન વહન પ્રજાતિ ઉત્પત્તિ અટકાવી શકે (C). પરંતુ (D) વિધાન ખોટું છે કારણ કે સંકરીકરણથી હંમેશા નવી જાતિની ઉત્પત્તિ થતી નથી.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 27}, {"question": "એક વનસ્પતિ જાતિમાં, જ્યારે કોષમાં વર્ણસૂત્ર (Chromosome) ની સંખ્યા દ્વિગુણ થાય છે, ત્યારે નીચેનામાંથી કયું પરિણામ પ્રજાતિ ઉત્પત્તિ તરફ દોરી શકે?", "options": ["A) વનસ્પતિની વૃદ્ધિ દરમાં ઘટાડો થાય અને તે અલોપ પામે", "B) વનસ્પતિની પ્રજનન ક્ષમતા ઘટે અને તે નિષેચિત (Sterile) બને, પરંતુ નવી જાતિ ઉત્પન્ન થાય", "C) વનસ્પતિની પ્રજનન ક્ષમતા વધે અને તે સ્વ-પરાગીકરણ (Self-pollination) દ્વારા પ્રજનન કરે", "D) વનસ્પતિની જનીન સંરચના સ્થિર રહે અને કોઈ ફેરફાર થતો નથી"], "correct": 1, "explanation": "પોલિપ્લોઇડી (વર્ણસૂત્ર સંખ્યામાં વધારો) દ્વારા પ્રજાતિ ઉત્પત્તિ થઈ શકે. જ્યારે વનસ્પતિ કોષમાં વર્ણસૂત્ર સંખ્યા દ્વિગુણ થાય, ત્યારે તે નિષેચિત (Sterile) બની શકે, પરંતુ આ નવી જાતિની ઉત્પત્તિ તરફ દોરી શકે (B). વૃદ્ધિ દરમાં ઘટાડો (A) અથવા પ્રજનન ક્ષમતામાં વધારો (C) પોલિપ્લોઇડીનું સીધું પરિણામ નથી. જનીન સંરચના સ્થિર રહે (D) એ પણ ખોટું છે કારણ કે પોલિપ્લોઇડી જનીન સંરચનામાં ફેરફાર લાવે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 28}, {"question": "નીચેનામાંથી કયું વિધાન 'પર્યાવરણીય પ્રજાતિ ઉત્પત્તિ' (Ecological speciation) વિશે સાચું છે, જ્યારે બે જૂથો એક જ ભૌગોલિક વિસ્તારમાં રહે છે?", "options": ["A) બે જૂથો વચ્ચે પ્રજનન અવરોધ ઉભો થાય છે કારણ કે તેઓ ભિન્ન પર્યાવરણીય સ્થળાંતર (Ecological niche) માં રહે છે", "B) બે જૂથો વચ્ચે જનીન વહન (Gene flow) વધે છે, જેથી પ્રજાતિ ઉત્પત્તિ થતી અટકાવી શકાય", "C) બે જૂથો વચ્ચે સંકરીકરણ થાય છે, જેથી નવી જાતિની ઉત્પત્તિ થાય", "D) બે જૂથો વચ્ચે કોઈ ફેરફાર થતો નથી અને તેઓ એક જ જાતિ તરીકે રહે છે"], "correct": 0, "explanation": "પર્યાવરણીય પ્રજાતિ ઉત્પત્તિમાં, બે જૂથો એક જ ભૌગોલિક વિસ્તારમાં રહે છે પરંતુ ભિન્ન પર્યાવરણીય સ્થળાંતર (Ecological niche) માં રહેતા હોવાથી પ્રજનન અવરોધ ઉભો થાય છે (A). જનીન વહન વધવો (B) અથવા સંકરીકરણ (C) એ પર્યાવરણીય પ્રજાતિ ઉત્પત્તિના લક્ષણો નથી. કોઈ ફેરફાર ન થવો (D) એ પણ ખોટું છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 29}, {"question": "એક પ્રાણી જાતિમાં, જો 'પરિણામી વહન' (Genetic drift) ની અસરને લીધે એક નાનો જૂથ અલગ પડે, તો નીચેનામાંથી કયું પરિણામ પ્રજાતિ ઉત્પત્તિ તરફ દોરી શકે?", "options": ["A) નાનો જૂથ મૂળ જૂથ સાથે જનીન વહન જાળવી રાખે અને કોઈ પ્રજાતિ ઉત્પત્તિ થતી નથી", "B) નાનો જૂથમાં જનીન વિવિધતા ઘટે અને તે મૂળ જૂથથી અલગ જાતિ તરીકે ઉત્પન્ન થાય", "C) નાનો જૂથ મૂળ જૂથ સાથે સંકરીકરણ કરે અને નવી જાતિ ઉત્પન્ન થાય", "D) નાનો જૂથ અલોપ પામે અને પ્રજાતિ ઉત્પત્તિ થતી નથી"], "correct": 1, "explanation": "પરિણામી વહન (Genetic drift) ની અસરને લીધે નાનો જૂથ અલગ પડે, તો તે જનીન વિવિધતા ઘટાડે અને મૂળ જૂથથી અલગ જાતિ તરીકે ઉત્પન્ન થઈ શકે (B). જનીન વહન જાળવી રાખવો (A) અથવા સંકરીકરણ (C) એ પરિણામી વહનના પરિણામો નથી. અલોપ પામવું (D) એ પણ શક્ય છે, પરંતુ પ્રશ્ન પ્રજાતિ ઉત્પત્તિ તરફ દોરી શકે તે વિશે છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 30}, {"question": "એક વનસ્પતિ જાતિમાં, જ્યારે બે ભિન્ન જાતિઓના પ્રજનન કોષોનો સંયોગ થાય છે અને તેનાથી ઉત્પન્ન થતી સંતતિ સંપૂર્ણપણે બંધ્યાત્વ ધરાવે છે, તો આ કયા પ્રકારની પ્રજાતિ ઉત્પત્તિનું ઉદાહરણ ગણાય?", "options": ["A) સહ-ઉત્ક્રાંતિ દ્વારા પ્રજાતિ ઉત્પત્તિ", "B) પોલિપ્લોઇડી દ્વારા પ્રજાતિ ઉત્પત્તિ", "C) પર્યાવરણીય સ્થળાંતર દ્વારા પ્રજાતિ ઉત્પત્તિ", "D) સંકર બંધ્યાત્વ દ્વારા પ્રજાતિ ઉત્પત્તિ"], "correct": 3, "explanation": "સંકર બંધ્યાત્વ (Hybrid sterility) એ પ્રજાતિ ઉત્પત્તિનો એક મહત્વનો પગલો છે, જ્યાં બે ભિન્ન જાતિઓના સંકર સંતતિ બંધ્યાત્વ ધરાવે છે, જેનાથી જનીન વહન અટકાવાય છે અને નવી જાતિની ઉત્પત્તિ થાય છે. સહ-ઉત્ક્રાંતિ (A) એ બે જાતિઓ વચ્ચેના પરસ્પર ઉત્ક્રાંતિને સૂચવે છે, પોલિપ્લોઇડી (B) એ વર્ણસૂત્ર સંખ્યામાં વધારાને લીધે થતી પ્રજાતિ ઉત્પત્તિ છે, જ્યારે પર્યાવરણીય સ્થળાંતર (C) એ પર્યાવરણીય પરિબળોને લીધે થતી પ્રજાતિ ઉત્પત્તિ છે. આથી, સંકર બંધ્યાત્વ (D) એ સૌથી યોગ્ય ઉત્તર છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 31}, {"question": "નીચેનામાંથી કયું વિધાન 'પરિણામી અલગીકરણ' (Genetic isolation) અને પ્રજાતિ ઉત્પત્તિ વચ્ચેના સંબંધ વિશે સાચું નથી?", "options": ["A) પરિણામી અલગીકરણ પ્રજાતિ ઉત્પત્તિ માટે આવશ્યક પરિબળ છે", "B) પરિણામી અલગીકરણ જનીન વહનને અટકાવે છે", "C) પરિણામી અલગીકરણ હંમેશા ભૌગોલિક અલગીકરણ દ્વારા થાય છે", "D) પરિણામી અલગીકરણ પ્રજનનિક અલગીકરણ દ્વારા પણ થઈ શકે છે"], "correct": 2, "explanation": "પરિણામી અલગીકરણ પ્રજાતિ ઉત્પત્તિ માટે આવશ્યક છે (A) અને તે જનીન વહનને અટકાવે છે (B). તે પ્રજનનિક અલગીકરણ દ્વારા પણ થઈ શકે છે (D). પરંતુ તે હંમેશા ભૌગોલિક અલગીકરણ દ્વારા થતું નથી (C), કારણ કે પ્રજનનિક અલગીકરણ, વર્તણૂકીય અલગીકરણ અથવા કાળક્રમિક અલગીકરણ દ્વારા પણ પરિણામી અલગીકરણ થઈ શકે છે. આથી, C વિધાન ખોટું છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 32}, {"question": "નીચેનામાંથી કયું વિધાન 'પોલિપ્લોઇડી' અને પ્રજાતિ ઉત્પત્તિ વિશે સાચું નથી?", "options": ["A) પોલિપ્લોઇડી વનસ્પતિઓમાં પ્રજાતિ ઉત્પત્તિનું એક મહત્વનું સાધન છે", "B) પોલિપ્લોઇડી દ્વારા ઉત્પન્ન થતી નવી જાતિ સંપૂર્ણપણે ફળદ્રુપ હોય છે", "C) પોલિપ્લોઇડી પ્રાણીઓમાં પણ પ્રજાતિ ઉત્પત્તિ માટે જવાબદાર હોઈ શકે છે", "D) પોલિપ્લોઇડી દ્વારા ઉત્પન્ન થતી નવી જાતિ તેની મૂળ જાતિ સાથે સંકરણ કરી શકે છે"], "correct": 3, "explanation": "પોલિપ્લોઇડી વનસ્પતિઓમાં પ્રજાતિ ઉત્પત્તિનું એક મહત્વનું સાધન છે (A) અને તે દ્વારા ઉત્પન્ન થતી નવી જાતિ સંપૂર્ણપણે ફળદ્રુપ હોય છે (B). પોલિપ્લોઇડી પ્રાણીઓમાં પણ પ્રજાતિ ઉત્પત્તિ માટે જવાબદાર હોઈ શકે છે (C), પરંતુ પોલિપ્લોઇડી દ્વારા ઉત્પન્ન થતી નવી જાતિ તેની મૂળ જાતિ સાથે સંકરણ કરી શકતી નથી, કારણ કે વર્ણસૂત્ર સંખ્યામાં તફાવતને લીધે પ્રજનનિક અલગીકરણ થાય છે (D). આથી, D વિધાન ખોટું છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 33}, {"question": "એક જાતિમાં, જ્યારે બે જૂથો વચ્ચે પર્યાવરણીય પરિબળોને લીધે પ્રજનનિક અલગીકરણ થાય છે અને તેનાથી નવી જાતિની ઉત્પત્તિ થાય છે, તો આ કયા પ્રકારની પ્રજાતિ ઉત્પત્તિ ગણાય?", "options": ["A) ભૌગોલિક પ્રજાતિ ઉત્પત્તિ", "B) પર્યાવરણીય પ્રજાતિ ઉત્પત્તિ", "C) વર્તણૂકીય પ્રજાતિ ઉત્પત્તિ", "D) કાળક્રમિક પ્રજાતિ ઉત્પત્તિ"], "correct": 1, "explanation": "પર્યાવરણીય પ્રજાતિ ઉત્પત્તિ (Ecological speciation) એ પ્રજાતિ ઉત્પત્તિનો એક પ્રકાર છે, જ્યાં પર્યાવરણીય પરિબળોને લીધે બે જૂથો વચ્ચે પ્રજનનિક અલગીકરણ થાય છે અને નવી જાતિની ઉત્પત્તિ થાય છે. ભૌગોલિક પ્રજાતિ ઉત્પત્તિ (A) એ ભૌગોલિક અલગીકરણને લીધે થાય છે, વર્તણૂકીય પ્રજાતિ ઉત્પત્તિ (C) એ વર્તણૂકીય તફાવતોને લીધે થાય છે, જ્યારે કાળક્રમિક પ્રજાતિ ઉત્પત્તિ (D) એ કાળક્રમિક અલગીકરણને લીધે થાય છે. આથી, B એ સૌથી યોગ્ય ઉત્તર છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 34}, {"question": "એક વનસ્પતિ જાતિમાં, જ્યારે બે ભિન્ન ઉપ-જાતિઓ (subspecies) વચ્ચે સંકરણ (hybridization) થાય છે અને ત્યારબાદ પોલિપ્લોઇડી (polyploidy) ની ઘટના બને છે, તો નીચેનામાંથી કયું પરિણામ પ્રજાતિ ઉત્પત્તિ (speciation) તરફ દોરી જાય છે?", "options": ["A) સંકર સંતતિઓ (hybrid offspring) ની ફળદ્રુપતા (fertility) ઘટે છે અને તેઓ અલગ જાતિ તરીકે ઉત્પન્ન થાય છે", "B) સંકર સંતતિઓમાં વર્ણસૂત્ર (chromosome) ની સંખ્યા સમાન રહે છે અને તેઓ મૂળ જાતિઓ સાથે પ્રજનન કરવા સક્ષમ બને છે", "C) સંકર સંતતિઓમાં જનીન (gene) નો વહન (gene flow) વધે છે અને મૂળ જાતિઓ સાથે એકીકરણ (integration) થાય છે", "D) સંકર સંતતિઓમાં પ્રતિરક્ષાતંત્ર (immune system) ની ક્ષમતા વધે છે પરંતુ પ્રજાતિ ઉત્પત્તિ થતી નથી"], "correct": 0, "explanation": "પોલિપ્લોઇડી દ્વારા પ્રજાતિ ઉત્પત્તિમાં, સંકર સંતતિઓમાં વર્ણસૂત્રની સંખ્યા દ્વિગુણ થવાને લીધે ફળદ્રુપતા ઘટે છે, જેથી તેઓ મૂળ જાતિઓ સાથે પ્રજનન કરવા અસમર્થ બને છે અને અલગ જાતિ તરીકે ઉત્પન્ન થાય છે. વિકલ્પ A સાચો છે કારણ કે પોલિપ્લોઇડીને લીધે સંકર સંતતિઓ પ્રજનનિક રીતે અલગ થાય છે. વિકલ્પ B ખોટો છે કારણ કે વર્ણસૂત્રની સંખ્યા બદલાય છે. વિકલ્પ C ખોટો છે કારણ કે જનીન વહન ઘટે છે, એકીકરણ થતું નથી. વિકલ્પ D ખોટો છે કારણ કે પ્રતિરક્ષાતંત્રની ક્ષમતા સાથે પ્રજાતિ ઉત્પત્તિનો સીધો સંબંધ નથી.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "difficulty": "Hard", "num": 35}, {"question": "એક વનસ્પતિ જાતિમાં, જ્યારે બે ભિન્ન ઉપ-જાતિઓ વચ્ચે સંકરણ થાય છે અને સંકર સંતતિ પ્રજનનક્ષમ હોય છે, પરંતુ મૂળ જાતિઓ સાથે પ્રજનન કરતી નથી, તો આ કયા પ્રકારની પ્રજાતિ ઉત્પત્તિનું ઉદાહરણ ગણાય?", "options": ["A) સહ-ઉત્ક્રાંતિ (Co-evolution)", "B) પોલિપ્લોઇડી (Polyploidy) દ્વારા પ્રજાતિ ઉત્પત્તિ", "C) પર્યાવરણીય પ્રજાતિ ઉત્પત્તિ (Ecological speciation)", "D) સંપર્ક ક્ષેત્ર (Hybrid zone) દ્વારા પ્રજાતિ ઉત્પત્તિ"], "correct": 2, "explanation": "સંકર સંતતિ પ્રજનનક્ષમ હોવા છતાં મૂળ જાતિઓ સાથે પ્રજનન ન કરતી હોવાને કારણે, આ પર્યાવરણીય અલગીકરણને લીધે થતી પ્રજાતિ ઉત્પત્તિનું ઉદાહરણ છે. સહ-ઉત્ક્રાંતિ (A) બે જાતિઓ વચ્ચેના પરસ્પર અનુકૂલનને લગતું છે. પોલિપ્લોઇડી (B) વર્ણસૂત્રની સંખ્યામાં વધારાને લગતું છે. સંપર્ક ક્ષેત્ર (D) એ સંકરણ થવાનું ક્ષેત્ર છે, પરંતુ પ્રજાતિ ઉત્પત્તિનો પ્રકાર નથી.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 36}, {"question": "જ્યારે બે ભૌગોલિક રીતે અલગ પડેલી જાતિઓના સભ્યો પરસ્પર પ્રજનન કરે છે અને તેમના સંતતિઓ જીવંત રહે છે પરંતુ પ્રજનનક્ષમ ન હોય, તો આ સ્થિતિને કયા પરિબળ દ્વારા સમજાવી શકાય?", "options": ["A) પરિણામી વહન (Genetic drift) દ્વારા પ્રજાતિ ઉત્પત્તિ", "B) સંપર્ક ક્ષેત્ર (Hybrid zone) માં અપૂર્ણ પ્રજનનિક અલગીકરણ", "C) પોલિપ્લોઇડી (Polyploidy) દ્વારા તાત્કાલિક પ્રજાતિ ઉત્પત્તિ", "D) પર્યાવરણીય સ્થળાંતર (Ecological niche) ની ભૂમિકા"], "correct": 1, "explanation": "સંપર્ક ક્ષેત્ર (Hybrid zone) માં બે જાતિઓ વચ્ચે સંકરણ થાય છે, પરંતુ જો સંતતિઓ પ્રજનનક્ષમ ન હોય, તો તે અપૂર્ણ પ્રજનનિક અલગીકરણ દર્શાવે છે, જે પ્રજાતિ ઉત્પત્તિની પ્રક્રિયામાં એક પગલું છે. પરિણામી વહન (A) એ કદાચ જનીન વિવિધતામાં ફેરફાર લાવે, પરંતુ તે પ્રજનનિક અલગીકરણ સમજાવતું નથી. પોલિપ્લોઇડી (C) એ વનસ્પતિઓમાં તાત્કાલિક પ્રજાતિ ઉત્પત્તિનું કારણ બની શકે, પરંતુ તે પ્રાણીજગતમાં સામાન્ય નથી અને અહીં પ્રજનનિક અલગીકરણની સ્થિતિ સમજાવતું નથી. પર્યાવરણીય સ્થળાંતર (D) એ પ્રજાતિ ઉત્પત્તિનું એક કારણ હોઈ શકે, પરંતુ તે અહીં વર્ણવેલી સ્થિતિ સમજાવતું નથી.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 37}, {"question": "એક પ્રાણી જાતિમાં, જો 'પરિણામી બોટલનેક' (Genetic bottleneck) ની ઘટના બાદ જૂથની આનુવંશિક વિવિધતા અચાનક ઘટી જાય, તો નીચેનામાંથી કયું પરિણામ પ્રજાતિ ઉત્પત્તિ તરફ દોરી શકે છે?", "options": ["A) જૂથમાં પરિણામી વહન (genetic drift) ની અસર વધે છે, જેથી નવી જાતિની ઉત્પત્તિ થાય છે.", "B) જૂથમાં જનીન વહન (gene flow) વધે છે, જેથી આનુવંશિક વિવિધતા પુન:સ્થાપિત થાય છે.", "C) જૂથમાં પ્રજનનિક અલગીકરણ (reproductive isolation) થતું નથી, જેથી પ્રજાતિ ઉત્પત્તિ થતી નથી.", "D) જૂથમાં સંકરણ (hybridization) થાય છે અને નવી જાતિની ઉત્પત્તિ થાય છે."], "correct": 0, "explanation": "પરિણામી બોટલનેક બાદ જૂથની આનુવંશિક વિવિધતા ઘટી જવાથી પરિણામી વહનની અસર વધે છે, જેથી જૂથમાં નવી જાતિની ઉત્પત્તિ થઈ શકે છે. બાકીના વિકલ્પો અયોગ્ય છે: B) જનીન વહન વધવાનું આનુવંશિક વિવિધતા પુન:સ્થાપિત કરતું નથી, C) પ્રજનનિક અલગીકરણ ન થવાનું પ્રજાતિ ઉત્પત્તિ તરફ દોરી શકતું નથી, અને D) સંકરણ થવાથી પ્રજાતિ ઉત્પત્તિ થતી નથી.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 38}, {"question": "નીચેનામાંથી કયું વિધાન 'પોલિપ્લોઇડી' (Polyploidy) અને પ્રજાતિ ઉત્પત્તિ વિશે સાચું નથી?", "options": ["A) પોલિપ્લોઇડી વનસ્પતિઓમાં પ્રજાતિ ઉત્પત્તિનું એક મહત્વનું સાધન છે", "B) પોલિપ્લોઇડીને લીધે વનસ્પતિઓમાં વર્ણસૂત્રની સંખ્યા વધે છે અને નવી જાતિની ઉત્પત્તિ થાય છે", "C) પોલિપ્લોઇડી પ્રાણીઓમાં પણ પ્રજાતિ ઉત્પત્તિ માટે જવાબદાર છે", "D) પોલિપ્લોઇડીને લીધે વનસ્પતિઓમાં પ્રજનનિક અલગીકરણ થાય છે"], "correct": 2, "explanation": "પોલિપ્લોઇડી (Polyploidy) એ વનસ્પતિઓમાં પ્રજાતિ ઉત્પત્તિનું એક મહત્વનું સાધન છે, પરંતુ પ્રાણીઓમાં પોલિપ્લોઇડીને લીધે પ્રજાતિ ઉત્પત્તિ થતી નથી. વિકલ્પ C ગળત છે કારણ કે પોલિપ્લોઇડી પ્રાણીઓમાં પ્રજાતિ ઉત્પત્તિ માટે જવાબદાર નથી. વિકલ્પ A, B, અને D સાચા છે કારણ કે પોલિપ્લોઇડી વનસ્પતિઓમાં વર્ણસૂત્રની સંખ્યા વધારે છે અને પ્રજનનિક અલગીકરણ થાય છે, જેથી નવી જાતિની ઉત્પત્તિ થાય છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 39}, {"question": "નીચેનામાંથી કયું ઉદાહરણ 'પોલિપ્લોઇડી' (Polyploidy) દ્વારા પ્રજાતિ ઉત્પત્તિનું સૌથી યોગ્ય ઉદાહરણ નથી?", "options": ["A) ગહું (Wheat - Triticum aestivum)", "B) કપાસ (Cotton - Gossypium hirsutum)", "C) મકાઈ (Maize - Zea mays)", "D) ટોબેકો (Tobacco - Nicotiana tabacum)"], "correct": 2, "explanation": "ગહું, કપાસ, અને ટોબેકો એ પોલિપ્લોઇડી દ્વારા ઉત્પન્ન થયેલી જાતિઓ છે. મકાઈ (Zea mays) એ પોલિપ્લોઇડી દ્વારા ઉત્પન્ન થયેલી જાતિ નથી, પરંતુ તે ડિપ્લોઇડ છે. આથી, વિકલ્પ C સાચું જવાબ નથી.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "difficulty": "Hard", "num": 40}, {"question": "નીચેનામાંથી કયું વિધાન 'પર્યાવરણીય સ્થળાંતર' અને 'પ્રજાતિ ઉત્પત્તિ' વચ્ચેના સંબંધ વિશે સાચું નથી?", "options": ["A) પર્યાવરણીય સ્થળાંતરમાં ફેરફાર થવાથી બે જૂથો વચ્ચે પ્રજનનિક અલગીકરણ થઈ શકે છે.", "B) જો બે જૂથો ભિન્ન પર્યાવરણીય સ્થળાંતરમાં રહે છે, તો તેઓ અલગ જાતિઓ તરીકે ઉત્ક્રાંત થઈ શકે છે.", "C) પર્યાવરણીય સ્થળાંતરમાં ફેરફાર પ્રજાતિ ઉત્પત્તિ માટે આવશ્યક નથી, કારણ કે તે ફક્ત ભૌગોલિક અલગીકરણ પર આધારિત છે.", "D) પર્યાવરણીય સ્થળાંતરમાં ફેરફારને લીધે પ્રાકૃતિક પસંદગી દ્વારા નવી જાતિઓ ઉત્પન્ન થઈ શકે છે."], "correct": 2, "explanation": "પર્યાવરણીય સ્થળાંતરમાં ફેરફાર પ્રજાતિ ઉત્પત્તિ માટે મહત્વપૂર્ણ પરિબળ છે, કારણ કે તે પ્રજનનિક અલગીકરણ તરફ દોરી શકે છે. વિકલ્પ C ખોટો છે કારણ કે પર્યાવરણીય સ્થળાંતર ભૌગોલિક અલગીકરણ સિવાય પણ પ્રજાતિ ઉત્પત્તિ માટે મહત્વપૂર્ણ છે. વિકલ્પ A, B, અને D સાચા છે કારણ કે તેઓ પર્યાવરણીય સ્થળાંતર અને પ્રજાતિ ઉત્પત્તિ વચ્ચેના સંબંધને યોગ્ય રીતે સમજાવે છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 41}, {"question": "એક પ્રાણી જાતિમાં, જ્યારે 'પરિણામી વહન' અને 'પરિણામી બોટલનેક' એ પ્રજાતિ ઉત્પત્તિ તરફ દોરી જાય છે, તો નીચેનામાંથી કયું પરિબળ સૌથી ઓછું મહત્વપૂર્ણ છે?", "options": ["A) જાતિમાં આનુવંશિક વિવિધતાનો ઘટાડો", "B) જાતિમાં પ્રજનનિક અલગીકરણ", "C) જાતિમાં પર્યાવરણીય પરિબળોનો અચાનક ફેરફાર", "D) જાતિમાં જનીન પ્રવાહનો વધારો"], "correct": 3, "explanation": "પરિણામી વહન અને પરિણામી બોટલનેક એ આનુવંશિક વિવિધતાનો ઘટાડો કરે છે, જે પ્રજાતિ ઉત્પત્તિ તરફ દોરી શકે છે. પ્રજનનિક અલગીકરણ અને પર્યાવરણીય પરિબળોનો ફેરફાર પણ મહત્વપૂર્ણ છે. જનીન પ્રવાહનો વધારો પ્રજાતિ ઉત્પત્તિને રોકી શકે છે, કારણ કે તે આનુવંશિક વિવિધતાનો વહન કરે છે, જે પ્રજનનિક અલગીકરણને રોકે છે. તેથી, વિકલ્પ D સૌથી ઓછું મહત્વપૂર્ણ છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 42}, {"question": "એક પ્રાણી જાતિમાં, જ્યારે 'પરિણામી વહન' (Genetic drift) અને 'પરિણામી બોટલનેક' (Genetic bottleneck) એ પ્રજાતિ ઉત્પત્તિને પ્રભાવિત કરે છે, તો નીચેનામાંથી કયું પરિણામ સૌથી યોગ્ય રીતે અપેક્ષિત છે?", "options": ["A) જાતિમાં આનુવંશિક વિવિધતા વધશે.", "B) જાતિમાં આનુવંશિક વિવિધતા ઘટશે અને નવી જાતિની ઉત્પત્તિ થશે.", "C) જાતિમાં આનુવંશિક વિવિધતા સ્થિર રહેશે.", "D) જાતિમાં આનુવંશિક વિવિધતા ઘટશે પરંતુ નવી જાતિની ઉત્પત્તિ થશે નહીં."], "correct": 1, "explanation": "પરિણામી વહન અને પરિણામી બોટલનેક એ જાતિમાં આનુવંશિક વિવિધતા ઘટાડે છે. જ્યારે આનુવંશિક વિવિધતા ઘટે છે, ત્યારે નવી જાતિની ઉત્પત્તિ થઈ શકે છે કારણ કે અલગીકરણ અને પ્રાકૃતિક પસંદગીની અસર વધુ પ્રભાવી બને છે. A) ખોટું છે કારણ કે આનુવંશિક વિવિધતા ઘટશે, ન કે વધશે. C) ખોટું છે કારણ કે આનુવંશિક વિવિધતા સ્થિર રહેશે નહીં. D) ખોટું છે કારણ કે નવી જાતિની ઉત્પત્તિ થઈ શકે છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 43}, {"question": "નીચેનામાંથી કયું વિધાન 'પર્યાવરણીય સ્થળાંતર' (ecological niche) અને પ્રજાતિ ઉત્પત્તિ વચ્ચેના સંબંધ વિશે સાચું નથી?", "options": ["A) જ્યારે બે જાતિઓ એક જ પર્યાવરણીય સ્થળાંતર વહેંચે છે, ત્યારે તે વચ્ચે સ્પર્ધા થાય છે અને પ્રજાતિ ઉત્પત્તિ થાય છે.", "B) પર્યાવરણીય સ્થળાંતરમાં ફેરફાર થવાથી જાતિઓ વચ્ચે પ્રજનનિક અલગીકરણ થાય છે.", "C) પર્યાવરણીય સ્થળાંતરની ભિન્નતા પ્રજાતિ ઉત્પત્તિને પ્રોત્સાહન આપે છે.", "D) પર્યાવરણીય સ્થળાંતરમાં ફેરફાર થવાથી જાતિઓ વચ્ચે સહ-અસ્તિત્વ (coexistence) શક્ય બને છે."], "correct": 0, "explanation": "વિકલ્પ A ખોટો છે કારણ કે બે જાતિઓ એક જ પર્યાવરણીય સ્થળાંતર વહેંચે ત્યારે સ્પર્ધા થાય છે, પરંતુ તે પ્રજાતિ ઉત્પત્તિ તરફ દોરી શકતી નથી. પ્રજાતિ ઉત્પત્તિ માટે પ્રજનનિક અલગીકરણ જરૂરી છે, સ્પર્ધા નહીં. વિકલ્પ B સાચો છે કારણ કે પર્યાવરણીય સ્થળાંતરમાં ફેરફાર થવાથી જાતિઓ વચ્ચે પ્રજનનિક અલગીકરણ થાય છે, જે પ્રજાતિ ઉત્પત્તિ તરફ દોરી શકે છે. વિકલ્પ C સાચો છે કારણ કે પર્યાવરણીય સ્થળાંતરની ભિન્નતા પ્રજાતિ ઉત્પત્તિને પ્રોત્સાહન આપે છે. વિકલ્પ D સાચો છે કારણ કે પર્યાવરણીય સ્થળાંતરમાં ફેરફાર થવાથી જાતિઓ વચ્ચે સહ-અસ્તિત્વ શક્ય બને છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 44}, {"question": "નીચેનામાંથી કયું ઉદાહરણ 'સંપર્ક ક્ષેત્ર' (hybrid zone) નું ઉદાહરણ નથી?", "options": ["A) બે ભિન્ન જાતિઓના સભ્યો વચ્ચે સંકરણ થાય છે અને સંતતિ પ્રજનનક્ષમ હોય છે.", "B) બે ભિન્ન જાતિઓના સભ્યો વચ્ચે સંકરણ થાય છે અને સંતતિ નિષ્ફળ પ્રજનનક્ષમ હોય છે.", "C) બે ભિન્ન જાતિઓના સભ્યો વચ્ચે કોઈ સંકરણ થતું નથી અને તે અલગ રહે છે.", "D) બે ભિન્ન જાતિઓના સભ્યો વચ્ચે સંકરણ થાય છે અને સંતતિ પાછળથી નવી જાતિ તરીકે સ્થાપિત થાય છે."], "correct": 2, "explanation": "સંપર્ક ક્ષેત્ર એ એક ભૌગોલિક ક્ષેત્ર છે જ્યાં બે ભિન્ન જાતિઓ અથવા ઉપ-જાતિઓ વચ્ચે સંકરણ થાય છે. વિકલ્પ C ખોટો છે કારણ કે જ્યાં કોઈ સંકરણ થતું નથી, ત્યાં સંપર્ક ક્ષેત્ર બનતું નથી. વિકલ્પ A, B, અને D સાચા છે કારણ કે તેમાં સંકરણ થાય છે, જે સંપર્ક ક્ષેત્રની વ્યાખ્યામાં સમાવિષ્ટ છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 45}, {"question": "એક પ્રાણી જાતિમાં, જો 'પરિણામી વહન' (Genetic drift) અને 'પરિણામી બોટલનેક' (Genetic bottleneck) એ પ્રજાતિ ઉત્પત્તિ તરફ દોરી જાય છે, તો નીચેનામાંથી કયું પરિબળ સૌથી ઓછું મહત્વનું છે?", "options": ["A) જૂથનું કદ (Population size) ખૂબ જ નાનું હોય છે.", "B) જૂથમાં આનુવંશિક વિવિધતા (Genetic diversity) ખૂબ જ ઓછી હોય છે.", "C) જૂથમાં પ્રાકૃતિક પસંદગી (Natural selection) ની તીવ્રતા વધારે હોય છે.", "D) જૂથમાં પર્યાવરણીય પરિબળો (Environmental factors) ઝડપથી બદલાય છે."], "correct": 2, "explanation": "પરિણામી વહન અને પરિણામી બોટલનેક એ નાના જૂથના કદ (A) અને ઓછી આનુવંશિક વિવિધતા (B) સાથે સીધા જોડાયેલા છે. પર્યાવરણીય પરિબળો (D) પણ અસર કરે છે. પરંતુ પ્રાકૃતિક પસંદગી (C) એ પરિણામી વહન અને બોટલનેક કરતાં અલગ પરિબળ છે અને પ્રજાતિ ઉત્પત્તિ માટે ઓછું સીધું જોડાયેલું છે, ખાસ કરીને જ્યારે જૂથનું કદ નાનું હોય ત્યારે પરિણામી વહન વધારે મહત્વનું બને છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 46}, {"question": "નીચેનામાંથી કયું ઉદાહરણ 'સંપર્ક ક્ષેત્ર' (Hybrid zone) નું સૌથી યોગ્ય ઉદાહરણ નથી?", "options": ["A) બે ભિન્ન વનસ્પતિ જાતિઓ વચ્ચેનો સંકરણ ક્ષેત્ર જ્યાં સંકર બીજ ઉત્પન્ન થાય છે", "B) બે ભિન્ન પ્રાણી જાતિઓ વચ્ચેનો ક્ષેત્ર જ્યાં તે સંકર પ્રજનન કરે છે", "C) એક જ જાતિના બે ભિન્ન ઉપ-જાતિઓ વચ્ચેનો ક્ષેત્ર જ્યાં તે સંકરણ કરે છે", "D) એક જ જાતિના બે ભિન્ન જૂથો વચ્ચેનો ક્ષેત્ર જ્યાં તે પરસ્પર પ્રજનન કરતા નથી"], "correct": 3, "explanation": "સંપર્ક ક્ષેત્ર (Hybrid zone) એ બે ભિન્ન જાતિઓ અથવા ઉપ-જાતિઓ વચ્ચેનો ક્ષેત્ર છે જ્યાં સંકરણ થાય છે. વિકલ્પ (D) સંપર્ક ક્ષેત્ર નથી, કારણ કે તે જૂથો વચ્ચે પ્રજનન થતું નથી. વિકલ્પ (A), (B), અને (C) સંપર્ક ક્ષેત્રના ઉદાહરણો છે, કારણ કે તે સંકરણ થાય છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 47}, {"question": "નીચેનામાંથી કયું વિધાન 'પર્યાવરણીય પ્રજાતિ ઉત્પત્તિ' વિશે સાચું છે, જ્યારે બે જૂથો એક જ ભૌગોલિક વિસ્તારમાં રહે છે પરંતુ ભિન્ન પર્યાવરણીય સ્થળાંતર ધરાવે છે?", "options": ["A) આ પ્રકારની પ્રજાતિ ઉત્પત્તિ માટે ભૌગોલિક અલગીકરણ જરૂરી છે", "B) આ પ્રકારની પ્રજાતિ ઉત્પત્તિ પ્રત્યક્ષ પ્રજનનિક અવરોધો દ્વારા થાય છે", "C) આ પ્રકારની પ્રજાતિ ઉત્પત્તિ પર્યાવરણીય પરિબળોને લીધે પ્રજનનિક અલગીકરણ દ્વારા થાય છે", "D) આ પ્રકારની પ્રજાતિ ઉત્પત્તિ ફક્ત પ્રાણીઓમાં જ જોવા મળે છે"], "correct": 2, "explanation": "પર્યાવરણીય પ્રજાતિ ઉત્પત્તિ (Ecological speciation) એ પ્રજાતિ ઉત્પત્તિનો એક પ્રકાર છે જ્યારે બે જૂથો એક જ ભૌગોલિક વિસ્તારમાં રહે છે પરંતુ ભિન્ન પર્યાવરણીય સ્થળાંતર (ecological niches) ધરાવે છે, જે પ્રજનનિક અલગીકરણ તરફ દોરે છે. ભૌગોલિક અલગીકરણ (A) જરૂરી નથી, પ્રત્યક્ષ પ્રજનનિક અવરોધો (B) આના મુખ્ય કારણ નથી, અને તે ફક્ત પ્રાણીઓમાં જોવા મળતું નથી (D). પર્યાવરણીય પરિબળોને લીધે પ્રજનનિક અલગીકરણ (C) એ યોગ્ય ઉત્તર છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 48}, {"question": "એક પ્રાણી જાતિમાં, જો 'પરિણામી વહન' અને 'પરિણામી બોટલનેક' એ પ્રજાતિ ઉત્પત્તિ તરફ દોરે છે, તો નીચેનામાંથી કયું પરિબળ આ પ્રક્રિયાને સૌથી વધુ પ્રભાવિત કરશે?", "options": ["A) જૂથનું કદ મોટું હોવું", "B) જૂથનું કદ નાનું હોવું", "C) જૂથમાં જનીન વિવિધતા વધુ હોવી", "D) જૂથમાં પ્રજનન દર ઓછો હોવો"], "correct": 1, "explanation": "પરિણામી વહન (Genetic drift) અને પરિણામી બોટલનેક (Genetic bottleneck) ની અસર નાના જૂથોમાં સૌથી વધુ જોવા મળે છે, કારણ કે નાના જૂથોમાં જનીન વિવિધતા ઝડપથી બદલાઈ શકે છે. મોટું જૂથ (A) પરિણામી વહનની અસર ઘટાડે છે, વધુ જનીન વિવિધતા (C) પણ પરિણામી વહનની અસર ઘટાડે છે, જ્યારે ઓછો પ્રજનન દર (D) પરિણામી વહનને પ્રભાવિત કરતો નથી. નાનું જૂથ (B) એ સૌથી યોગ્ય ઉત્તર છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 49}, {"question": "નીચેનામાંથી કયું ઉદાહરણ 'પોલિપ્લોઇડી' દ્વારા પ્રજાતિ ઉત્પત્તિનું સૌથી યોગ્ય ઉદાહરણ નથી?", "options": ["A) ગહું (Wheat - Triticum aestivum)", "B) કપાસ (Cotton - Gossypium hirsutum)", "C) મકાઈ (Maize - Zea mays)", "D) કોફી (Coffea arabica)"], "correct": 2, "explanation": "પોલિપ્લોઇડી દ્વારા પ્રજાતિ ઉત્પત્તિના ઉદાહરણો મુખ્યત્વે ગહું (A), કપાસ (B), અને કોફી (D) છે, જ્યાં વર્ણસૂત્ર સંખ્યામાં વધારાને લીધે નવી જાતિની ઉત્પત્તિ થાય છે. મકાઈ (C) એ પોલિપ્લોઇડી દ્વારા ઉત્પન્ન થતી જાતિ નથી, પરંતુ તે ડિપ્લોઇડ છે. આથી, મકાઈ (C) એ યોગ્ય ઉત્તર છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 50}, {"question": "એક વનસ્પતિ જાતિમાં, જ્યારે કોષમાં વર્ણસૂત્ર (Chromosome)ની સંખ્યા ત્રણ ગણી થાય છે, તો તેને કયા પ્રકારની પોલિપ્લોઇડી કહેવામાં આવે છે?", "options": ["A) ટેટ્રાપ્લોઇડી (Tetraploidy)", "B) ટ્રાઇપ્લોઇડી (Triploidy)", "C) હેક્સાપ્લોઇડી (Hexaploidy)", "D) ડિપ્લોઇડી (Diploidy)"], "correct": 1, "explanation": "જ્યારે કોષમાં વર્ણસૂત્રની સંખ્યા ત્રણ ગણી થાય છે, ત્યારે તેને ટ્રાઇપ્લોઇડી (Triploidy) કહેવામાં આવે છે. ટેટ્રાપ્લોઇડી (A) એ ચાર ગણી વર્ણસૂત્ર સંખ્યા ધરાવતી સ્થિતિ છે, હેક્સાપ્લોઇડી (C) એ છ ગણી વર્ણસૂત્ર સંખ્યા ધરાવતી સ્થિતિ છે, અને ડિપ્લોઇડી (D) એ દ્વિગુણ વર્ણસૂત્ર સંખ્યા ધરાવતી સ્થિતિ છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 51}, {"question": "જ્યારે બે ભૌગોલિક રીતે અલગ પડેલી વનસ્પતિ જાતિઓ વચ્ચે સંકરણ થાય છે અને પરિણામે બનતી સંતતિ નિર્જીવ અથવા બંજર હોય છે, તો આ ઘટનાને કયા પ્રકારની પ્રજાતિ ઉત્પત્તિ તરીકે ઓળખવામાં આવે છે?", "options": ["A) સહ-ઉત્ક્રાંતિ (Co-evolution)", "B) પોલિપ્લોઇડી (Polyploidy) દ્વારા પ્રજાતિ ઉત્પત્તિ", "C) સંપર્ક ક્ષેત્ર (Hybrid zone) દ્વારા પ્રજાતિ ઉત્પત્તિ", "D) પરિણામી અલગીકરણ (Genetic isolation) દ્વારા પ્રજાતિ ઉત્પત્તિ"], "correct": 2, "explanation": "સંપર્ક ક્ષેત્ર (Hybrid zone) એ એક એવું ક્ષેત્ર છે જ્યાં બે ભિન્ન જાતિઓ અથવા ઉપ-જાતિઓ વચ્ચે સંકરણ થાય છે. જ્યારે સંતતિ નિર્જીવ અથવા બંજર હોય છે, ત્યારે આ ઘટના સંપર્ક ક્ષેત્ર દ્વારા પ્રજાતિ ઉત્પત્તિ તરીકે ઓળખાય છે. સહ-ઉત્ક્રાંતિ (A) એ બે જાતિઓ વચ્ચેના પરસ્પર ઉત્ક્રાંતિને દર્શાવે છે, જ્યારે પોલિપ્લોઇડી (B) એ વર્ણસૂત્રની સંખ્યામાં વધારો દ્વારા પ્રજાતિ ઉત્પત્તિને દર્શાવે છે. પરિણામી અલગીકરણ (D) એ જનીન વહનને અટકાવવાને દર્શાવે છે, પરંતુ સંપર્ક ક્ષેત્રમાં સંકરણ થાય છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "difficulty": "Hard", "num": 52}, {"question": "એક વનસ્પતિ જાતિમાં, જ્યારે કોષમાં વર્ણસૂત્રની સંખ્યા ત્રણ ગણી થાય છે, તો આ ઘટનાને કયા પ્રકારની પ્રજાતિ ઉત્પત્તિ તરીકે ઓળખવામાં આવે છે?", "options": ["A) ઓટોપોલિપ્લોઇડી (Autopolyploidy)", "B) એલોપોલિપ્લોઇડી (Allopolyploidy)", "C) ટ્રાઇપ્લોઇડી (Triploidy)", "D) ટેટ્રાપ્લોઇડી (Tetraploidy)"], "correct": 2, "explanation": "જ્યારે કોષમાં વર્ણસૂત્રની સંખ્યા ત્રણ ગણી થાય છે, ત્યારે તેને ટ્રાઇપ્લોઇડી (Triploidy) કહેવામાં આવે છે. ઓટોપોલિપ્લોઇડી (A) એ એક જ જાતિના વર્ણસૂત્રના સેટના બહુગુણનને દર્શાવે છે, જ્યારે એલોપોલિપ્લોઇડી (B) એ ભિન્ન જાતિઓના વર્ણસૂત્રના સેટના સંયોજનને દર્શાવે છે. ટેટ્રાપ્લોઇડી (D) એ વર્ણસૂત્રની સંખ્યા ચાર ગણી થવાને દર્શાવે છે. ટ્રાઇપ્લોઇડી (C) એ ત્રણ ગણી વર્ણસૂત્ર સંખ્યાને દર્શાવે છે, જે પ્રજાતિ ઉત્પત્તિનો એક પ્રકાર છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "difficulty": "Hard", "num": 53}, {"question": "જ્યારે બે ભિન્ન વનસ્પતિ જાતિઓ વચ્ચે સંકરણ થાય છે અને પરિણામે ઉત્પન્ન થતી સંતતિ બાંઝ (sterile) હોય છે, પરંતુ તેની કોષમાં વર્ણસૂત્રની સંખ્યા દ્વિગુણ થાય છે, તો નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) આ સંતતિ પોલિપ્લોઇડ હશે અને તે નવી પ્રજાતિ તરીકે ઉત્પન્ન થઈ શકે છે, કારણ કે તેના કોષમાં સંતુલિત વર્ણસૂત્ર સેટ હશે.", "B) આ સંતતિ હંમેશા અલ્પજીવી હશે અને તેની ઉત્ક્રાંતિક સફળતા શૂન્ય હશે.", "C) આ સંતતિમાં વર્ણસૂત્રની સંખ્યા દ્વિગુણ થવાને લીધે તેના જનીનોમાં મ્યુટેશનની શક્યતા ઓછી થશે.", "D) આ સંતતિ પોલિપ્લોઇડ હોવા છતાં, તે નવી પ્રજાતિ તરીકે ઉત્પન્ન થઈ શકશે નહીં, કારણ કે તે બાંઝ હશે."], "correct": 0, "explanation": "પોલિપ્લોઇડી દ્વારા પ્રજાતિ ઉત્પત્તિમાં, જ્યારે બે ભિન્ન જાતિઓના સંકરણથી બાંઝ સંતતિ ઉત્પન્ન થાય છે, પરંતુ તેની કોષમાં વર્ણસૂત્રની સંખ્યા દ્વિગુણ થાય છે (ઉદા. એલોપોલિપ્લોઇડી), તો તે સંતુલિત વર્ણસૂત્ર સેટ ધરાવે છે અને પ્રજનનક્ષમ બને છે. આથી તે નવી પ્રજાતિ તરીકે ઉત્પન્ન થઈ શકે છે. વિકલ્પ B ખોટો છે કારણ કે પોલિપ્લોઇડ સંતતિ પ્રજનનક્ષમ બની શકે છે. વિકલ્પ C ખોટો છે કારણ કે વર્ણસૂત્રની સંખ્યા વધવાને લીધે મ્યુટેશનની શક્યતા વધી શકે છે. વિકલ્પ D ખોટો છે કારણ કે પોલિપ્લોઇડ સંતતિ પ્રજનનક્ષમ બની શકે છે અને નવી પ્રજાતિ તરીકે ઉત્પન્ન થઈ શકે છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "difficulty": "Hard", "num": 54}, {"question": "નીચેનામાંથી કયું વિધાન 'પર્યાવરણીય સ્થળાંતર (Ecological niche)' અને 'પ્રજાતિ ઉત્પત્તિ' વચ્ચેના સંબંધ વિશે સાચું નથી?", "options": ["A) જ્યારે બે જૂથો ભિન્ન પર્યાવરણીય સ્થળાંતરોમાં રહે છે, ત્યારે તેઓ વચ્ચે પ્રજનનિક અલગીકરણ થઈ શકે છે.", "B) પર્યાવરણીય સ્થળાંતરમાં થતાં ફેરફારોને લીધે જનીન વહન (Gene flow) ઓછું થાય છે, જે પ્રજાતિ ઉત્પત્તિને પ્રોત્સાહન આપે છે.", "C) પર્યાવરણીય સ્થળાંતરની ભૂમિકા માત્ર વનસ્પતિઓમાં જ પ્રજાતિ ઉત્પત્તિમાં જોવા મળે છે, પ્રાણીઓમાં નહીં.", "D) પર્યાવરણીય સ્થળાંતરમાં થતાં ફેરફારોને લીધે પ્રાકૃતિક પસંદગી (Natural selection) દ્વારા નવી જાતિઓ ઉત્પન્ન થઈ શકે છે."], "correct": 2, "explanation": "પર્યાવરણીય સ્થળાંતર અને પ્રજાતિ ઉત્પત્તિ વચ્ચેનો સંબંધ વનસ્પતિઓ અને પ્રાણીઓ બંનેમાં જોવા મળે છે. વિકલ્પ C ખોટો છે કારણ કે પર્યાવરણીય સ્થળાંતર પ્રાણીઓમાં પણ પ્રજાતિ ઉત્પત્તિમાં મહત્વની ભૂમિકા ભજવે છે. વિકલ્પ A, B, અને D સાચા છે કારણ કે પર્યાવરણીય સ્થળાંતરમાં થતાં ફેરફારો પ્રજનનિક અલગીકરણ, જનીન વહનમાં ઘટાડો, અને પ્રાકૃતિક પસંદગી દ્વારા પ્રજાતિ ઉત્પત્તિને પ્રોત્સાહન આપે છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "difficulty": "Hard", "num": 55}, {"question": "એક પ્રાણી જાતિમાં, જ્યારે 'પરિણામી વહન (Genetic drift)' અને 'પરિણામી બોટલનેક (Genetic bottleneck)' એ પ્રજાતિ ઉત્પત્તિને પ્રભાવિત કરે છે, તો નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) પરિણામી વહન અને પરિણામી બોટલનેક બંનેમાં જનીન વૈવિધ્યમાં ઘટાડો થાય છે, પરંતુ તે પ્રજાતિ ઉત્પત્તિને પ્રોત્સાહન આપે છે.", "B) પરિણામી વહન અને પરિણામી બોટલનેક બંનેમાં જનીન વૈવિધ્યમાં વધારો થાય છે, જે પ્રજાતિ ઉત્પત્તિને પ્રોત્સાહન આપે છે.", "C) પરિણામી વહન અને પરિણામી બોટલનેક માત્ર નાના જૂથોમાં જ પ્રજાતિ ઉત્પત્તિને પ્રભાવિત કરે છે, મોટા જૂથોમાં નહીં.", "D) પરિણામી વહન અને પરિણામી બોટલનેક દ્વારા પ્રજાતિ ઉત્પત્તિ માત્ર ત્યારે જ થાય છે જ્યારે જૂથમાં જનીન વહન (Gene flow) શૂન્ય હોય છે."], "correct": 0, "explanation": "પરિણામી વહન અને પરિણામી બોટલનેક બંનેમાં જનીન વૈવિધ્યમાં ઘટાડો થાય છે, પરંતુ આ ઘટાડાને લીધે નવી જાતિઓ ઉત્પન્ન થઈ શકે છે, ખાસ કરીને નાના જૂથોમાં. વિકલ્પ A સાચો છે કારણ કે જનીન વૈવિધ્યમાં ઘટાડો થવાને લીધે પ્રજાતિ ઉત્પત્તિ થઈ શકે છે. વિકલ્પ B ખોટો છે કારણ કે જનીન વૈવિધ્યમાં ઘટાડો થાય છે, વધારો નહીં. વિકલ્પ C ખોટો છે કારણ કે પરિણામી વહન અને બોટલનેક મોટા જૂથોમાં પણ પ્રભાવ પાડી શકે છે, પરંતુ તેની અસર નાના જૂથોમાં વધુ પ્રબળ હોય છે. વિકલ્પ D ખોટો છે કારણ કે જનીન વહન શૂન્ય હોવું જરૂરી નથી, પરંતુ તે ઓછું હોવું પ્રજાતિ ઉત્પત્તિને પ્રોત્સાહન આપે છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ (Evolution)", "difficulty": "Hard", "num": 56}, {"question": "એક પ્રાણી જાતિમાં, જ્યારે 'પરિણામી બોટલનેક' (Genetic bottleneck) ની ઘટના બાદ જૂથની જનેટિક વૈવિધ્યતા ઘટે છે, તો નીચેનામાંથી કયું પરિણામ પ્રજાતિ ઉત્પત્તિ તરફ દોરી શકે છે?", "options": ["A) જનેટિક વહનમાં વધારો", "B) નવી જાતિની ઉત્પત્તિ માટે પૂરતી જનેટિક વૈવિધ્યતા રહે  speciation)", "D) પર્યાવરણીય પ્રજાતિ ઉત્પત્તિ (Ecological speciation)"], "correct": 2, "explanation": "સંકર પ્રજાતિ ઉત્પત્તિ ત્યારે થાય છે જ્યારે બે ભિન્ન જાતિઓના સંકરણથી ઉત્પન્ન થયેલ સંકર પ્રજનનક્ષમ હોય અને તેના સંતતિમાં પ્રજનનિક અલગીકરણ ઉદ્ભવે. આ પ્રક્રિયા દ્વારા નવી પ્રજાતિનું નિર્માણ થઈ શકે છે. NCERTમાં ઉલ્લેખ છે કે સંકર પ્રજાતિ ઉત્પત્તિ એ પ્રજાતિ ઉત્પત્તિનો એક મહત્વપૂર્ણ માર્ગ છે, ખાસ કરીને વનસ્પતિઓમાં. અન્ય વિકલ્પો આ ઘટનાનું યોગ્ય વર્ણન કરતા નથી: સહ-ઉત્ક્રાંતિ એ પરસ્પર આશ્રિત જાતિઓની ઉત્ક્રાંતિ છે, પરિણામી સ્થિરતા એ જનીનિક સંતુલનની સ્થિતિ છે, અને પર્યાવરણીય પ્રજાતિ ઉત્પત્તિ પર્યાવરણીય પરિબળોને કારણે થાય છે.", "ncert_ref": "કક્ષા 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 66}, {"question": "નીચેનામાંથી કયું વિધાન 'પરિણામી પુનઃસંયોજન (Genetic recombination)' અને પ્રજાતિ ઉત્પત્તિ વચ્ચેના સંબંધ વિશે સાચું નથી?", "options": ["A) પરિણામી પુનઃસંયોજન જનીનિક વિવિધતા વધારે છે, જે પ્રજાતિ ઉત્પત્તિ માટે જરૂરી છે.", "B) પરિણામી પુનઃસંયોજન સંપૂર્ણ રીતે નવી પ્રજાતિનું નિર્માણ કરી શકે છે, ભલે પ્રજનનિક અલગીકરણ ન હોય.", "C) પરિણામી પુનઃસંયોજન જનીનિક ફેરફારોને કારણે પ્રજનનિક અલગીકરણમાં ફાળો આપી શકે છે.", "D) પરિણામી પુનઃસંયોજન જનીનિક વિવિધતાનો મુખ્ય સ્રોત છે, જે પ્રાકૃતિક પસંદગી માટે કાચો માલ પૂરો પાડે છે."], "correct": 1, "explanation": "પરિણામી પુનઃસંયોજન જનીનિક વિવિધતા વધારે છે અને પ્રજનનિક અલગીકરણમાં ફાળો આપી શકે છે, પરંતુ તે એકલું સંપૂર્ણ નવી પ્રજાતિનું નિર્માણ કરી શકતું નથી જ્યાં સુધી પ્રજનનિક અલગીકરણ ન થાય. NCERTમાં સ્પષ્ટ છે કે પ્રજાતિ ઉત્પત્તિ માટે પ્રજનનિક અલગીકરણ આવશ્યક છે. અન્ય વિકલ્પો સાચા છે કારણ કે પરિણામી પુનઃસંયોજન જનીનિક વિવિધતા વધારે છે અને પ્રાકૃતિક પસંદગી માટે જરૂરી કાચો માલ પૂરો પાડે છે.", "ncert_ref": "કક્ષા 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 67}, {"question": "એક પ્રાણી જાતિમાં, જો બે ભૌગોલિક રીતે અલગ પડેલા જૂથો વચ્ચે પ્રજનનિક અલગીકરણ ઉદ્ભવે, પરંતુ તેમના વચ્ચેના સંપર્ક ક્ષેત્રમાં સંકરણ થાય અને સંકર પ્રજનનક્ષમ હોય, તો આ પરિસ્થિતિમાં નીચેનામાંથી કયું પરિણામ સંભવિત નથી?", "options": ["A) સંકર પ્રજાતિ ઉત્પત્તિ (Hybrid speciation) થઈ શકે છે.", "B) બંને જૂથો વચ્ચે જનીન પ્રવાહ ચાલુ રહી શકે છે.", "C) સંપર્ક ક્ષેત્રમાં સંકરોની પ્રજનનક્ષમતા ઘટી શકે છે.", "D) બંને જૂથો સંપૂર્ણ રીતે એક જ પ્રજાતિ તરીકે જોડાઈ જશે."], "correct": 3, "explanation": "જ્યારે સંકર પ્રજનનક્ષમ હોય, ત્યારે સંપૂર્ણ રીતે એક જ પ્રજાતિ તરીકે જોડાઈ જવું સંભવિત નથી કારણ કે પ્રજનનિક અલગીકરણ પહેલેથી જ અસ્તિત્વમાં છે. NCERTમાં ઉલ્લેખ છે કે સંપર્ક ક્ષેત્રમાં સંકરણ થઈ શકે છે, પરંતુ જો પ્રજનનિક અલગીકરણ મજબૂત હોય તો બંને જૂથો અલગ રહે છે. અન્ય વિકલ્પો સંભવિત છે: સંકર પ્રજાતિ ઉત્પત્તિ થઈ શકે, જનીન પ્રવાહ ચાલુ રહી શકે, અને સંકરોની પ્રજનનક્ષમતા ઘટી શકે છે.", "ncert_ref": "કક્ષા 12 - પ્રકરણ 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 68}, {"question": "ડાર્વિનના ફિન્ચ પક્ષીઓમાં ચાંચની આકારગત વિવિધતાને કારણે પ્રજાતિ ઉત્પત્તિ થવાનું મુખ્ય કારણ કયું છે?", "options": ["A) પર્યાવરણીય સ્થળાંતરમાં ફેરફાર અને ખોરાકના સ્રોતમાં વિશિષ્ટતા", "B) જનીનિક વહન દ્વારા જાતિઓમાં થતી અચાનક પરિવર્તનશીલતા", "C) પોલિપ્લોઇડી દ્વારા વર્ણસૂત્રની સંખ્યામાં વૃદ્ધિ", "D) પ્રતિરક્ષાતંત્રમાં થતી જનીનિક ભિન્નતા"], "correct": 0, "explanation": "ડાર્વિનના ફિન્ચ પક્ષીઓમાં ચાંચની વિવિધતા પર્યાવરણીય સ્થળાંતર (ecological niche) અને ખોરાકના સ્રોતમાં વિશિષ્ટતાને કારણે થાય છે, જેથી અલગ-અલગ ટાપુઓ પર રહેતી જાતિઓ અલગ પ્રકારના ખોરાકનો ઉપયોગ કરવા લાગે છે, જે પ્રજાતિ ઉત્પત્તિ તરફ દોરી જાય છે. બાકીના વિકલ્પો: B) જનીનિક વહન પ્રજાતિ ઉત્પત્તિનું કારણ બની શકે પરંતુ ફિન્ચ પક્ષીઓમાં મુખ્ય કારણ નથી. C) પોલિપ્લોઇડી વનસ્પતિઓમાં પ્રજાતિ ઉત્પત્તિનું મુખ્ય કારણ છે, પ્રાણીઓમાં નહીં. D) પ્રતિરક્ષાતંત્રની ભિન્નતા પ્રજાતિ ઉત્પત્તિ સાથે સીધો સંબંધ ધરાવતી નથી.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 69}, {"question": "ડાર્વિનના ફિન્ચ પક્ષીઓમાં ચાંચની વિવિધતાને કારણે પ્રજાતિ ઉત્પત્તિ થવાનું મુખ્ય કારણ કયું છે, જ્યારે આ પક્ષીઓ ગેલાપાગોસ ટાપુઓના ભિન્ન પર્યાવરણીય સ્થળાંતરોમાં રહેતા હોય છે?", "options": ["A) પરિણામી વહન (Genetic drift) ની અસરને લીધે જનીનિક વિવિધતા ઘટી જવી", "B) ભિન્ન ખોરાક સ્રોતો માટે અનુકૂલન (Adaptive radiation) દ્વારા પ્રાકૃતિક પસંદગી", "C) પોલિપ                     optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
