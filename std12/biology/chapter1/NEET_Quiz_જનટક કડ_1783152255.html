<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - જિનેટિક કોડ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 જિનેટિક કોડ</span>
                <span>🎯 Hard</span>
                <span>📝 49 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "જિનેટિક કોડની સર્વવ્યાપકતા (Universality) વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) તમામ જીવોમાં એક જ કોડન એમિનો એસિડ માટે કોડ કરે છે, પરંતુ માઇટોકોન્ડ્રિયામાં અપવાદ જોવા મળે છે.", "B) જિનેટિક કોડ સર્વવ્યાપક છે કારણ કે તમામ જીવોની DNA ની રચના એકસરખી હોય છે.", "C) જિનેટિક કોડ સર્વવ્યાપક છે કારણ કે તમામ જીવો એક જ પ્રકારના RNA પોલિમરેઝ ઉત્સેચકનો ઉપયોગ કરે છે.", "D) જિનેટિક કોડ સર્વવ્યાપક નથી કારણ કે પ્રોકેરિયોટ્સ અને યુકેરિયોટ્સમાં ભિન્ન કોડનનો ઉપયોગ થાય છે."], "correct": 0, "explanation": "જિનેટિક કોડ સર્વવ્યાપક છે, પરંતુ માઇટોકોન્ડ્રિયામાં કેટલાક અપવાદ જોવા મળે છે જેમ કે UGA કોડન ટ્રિપ્ટોફેન માટે કોડ કરે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) DNA રચના એકસરખી હોવી જરૂરી નથી, C) RNA પોલિમરેઝના પ્રકાર સાથે સર્વવ્યાપકતાનો સંબંધ નથી, D) જિનેટિક કોડ સર્વવ્યાપક છે અને પ્રોકેરિયોટ્સ અને યુકેરિયોટ્સમાં મોટાભાગે એકસરખો જ હોય છે.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક આનુવંશિકતા", "difficulty": "Hard", "num": 1}, {"question": "નીચેનામાંથી કયો કોડન એમિનો એસિડ માટે કોડ કરતો નથી?", "options": ["A) AUG", "B) UAA", "C) UGC", "D) GGU"], "correct": 1, "explanation": "UAA એ સ્ટોપ કોડન છે, જે પ્રોટીન સંશ્લેષણને અટકાવે છે અને એમિનો એસિડ માટે કોડ કરતો નથી. AUG મિથાયોનિન માટે કોડ કરે છે, UGC સિસ્ટીન માટે કોડ કરે છે, અને GGU ગ્લાઇસીન માટે કોડ કરે છે.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક આનુવંશિકતા", "difficulty": "Hard", "num": 2}, {"question": "જિનેટિક કોડની નીચેનામાંથી કઈ લાક્ષણિકતા તેને 'કોમા-લેસ' (Commaless) બનાવે છે?", "options": ["A) કોડન વચ્ચે કોઈ વિશિષ્ટ ચિહ્ન ન હોવું અને તે સતત વાંચી શકાય છે.", "B) એક જ કોડન વારંવાર એમિનો એસિડ માટે કોડ કરે છે.", "C) કોડનની લંબાઈ હંમેશા ત્રણ ન્યુક્લિયોટાઇડની હોય છે.", "D) કોડનની વ્યાખ્યા mRNA ની 5' થી 3' દિશામાં થાય છે."], "correct": 0, "explanation": "જિનેટિક કોડ 'કોમા-લેસ' છે કારણ કે કોડન વચ્ચે કોઈ વિશિષ્ટ ચિહ્ન ન હોવું અને તે સતત વાંચી શકાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) એક જ કોડન વારંવાર કોડ કરે તે કોડની પુનરાવર્તિતા છે, C) કોડનની લંબાઈ હંમેશા ત્રણ ન્યુક્લિયોટાઇડની હોવી તે કોડની ત્રિપ્લેટ પ્રકૃતિ છે, D) કોડનની વ્યાખ્યા દિશા સાથે સંબંધિત નથી.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક આનુવંશિકતા", "difficulty": "Hard", "num": 3}, {"question": "નીચેનામાંથી કયું વિધાન જિનેટિક કોડની 'ડિજનરેસી' (Degeneracy) વિશે સાચું છે?", "options": ["A) એક એમિનો એસિડ માટે એક જ કોડન હોય છે.", "B) એક કોડન એકથી વધારે એમિનો એસિડ માટે કોડ કરે છે.", "C) એક એમિનો એસિડ માટે એકથી વધારે કોડન હોય છે.", "D) કોડનની સંખ્યા એમિનો એસિડની સંખ્યાથી ઓછી હોય છે."], "correct": 2, "explanation": "જિનેટિક કોડની ડિજનરેસી એટલે એક એમિનો એસિડ માટે એકથી વધારે કોડન હોય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: A) એક એમિનો એસિડ માટે એક જ કોડન હોવો તે કોડની વિશિષ્ટતા છે, B) એક કોડન એક જ એમિનો એસિડ માટે કોડ કરે છે, D) કોડનની સંખ્યા એમિનો એસિડની સંખ્યાથી વધારે હોય છે.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક આનુવંશિકતા", "difficulty": "Hard", "num": 4}, {"question": "જિનેટિક કોડના સ્વ-અવકાશી (Non-overlapping) ગુણધર્મ વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) એક ન્યુક્લિયોટાઇડ એકથી વધારે કોડનમાં સમાવિષ્ટ થઈ શકે છે.", "B) કોડન એકબીજા સાથે ઓવરલેપ થતા નથી અને પ્રત્યેક ન્યુક્લિયોટાઇડ ફક્ત એક જ કોડનમાં સમાવિષ્ટ થાય છે.", "C) કોડનની વ્યાખ્યા mRNA ની 3' થી 5' દિશામાં થાય છે.", "D) કોડનની લંબાઈ હંમેશા બે ન્યુક્લિયોટાઇડની હોય છે."], "correct": 1, "explanation": "જિનેટિક કોડ સ્વ-અવકાશી છે, એટલે કે કોડન એકબીજા સાથે ઓવરલેપ થતા નથી અને પ્રત્યેક ન્યુક્લિયોટાઇડ ફક્ત એક જ કોડનમાં સમાવિષ્ટ થાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: A) એક ન્યુક્લિયોટાઇડ એકથી વધારે કોડનમાં સમાવિષ્ટ થતો નથી, C) કોડનની વ્યાખ્યા mRNA ની 5' થી 3' દિશામાં થાય છે, D) કોડનની લંબાઈ હંમેશા ત્રણ ન્યુક્લિયોટાઇડની હોય છે.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક આનુવંશિકતા", "difficulty": "Hard", "num": 5}, {"question": "જિનેટિક કોડમાં 'વોબલ હાઇપોથીસિસ' (Wobble Hypothesis) ની સૌથી મહત્વની ભૂમિકા ક્યાં જોવા મળે છે?", "options": ["A) mRNA અને tRNA વચ્ચેના બેઇઝ પેઅરિંગમાં અસાધારણ સહિષ્ણુતા દર્શાવવામાં", "B) DNA રેપ્લિકેશન દરમિયાન ન્યુક્લિયોટાઇડની ભૂલોને સુધારવામાં", "C) ટ્રાન્સક્રિપ્શન દરમિયાન RNA પોલિમરેઝની ક , "num": 8}, {"question": "જિનેટિક કોડમાં 'સેંસ કોડોન' (Sense Codon) અને 'એન્ટીસેંસ કોડોન' (Antisense Codon) ની વ્યાખ્યા વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) સેંસ કોડોન DNA ની ટેમ્પલેટ સ્ટ્રેન્ડ પર હોય છે, જ્યારે એન્ટીસેંસ કોડોન mRNA પર હોય છે", "B) સેંસ કોડોન mRNA પર હોય છે અને એમિનો એસિડ માટે કોડ કરે છે, જ્યારે એન્ટીસેંસ કોડોન DNA ની કોમ્પ્લિમેન્ટરી સ્ટ્રેન્ડ પર હોય છે", "C) સેંસ કોડોન tRNA પર હોય છે અને એન્ટીસેંસ કોડોન mRNA પર હોય છે", "D) સેંસ કોડોન અને એન્ટીસેંસ કોડોન બંને DNA ની ડબલ હેલિક્સ સ્ટ્રક્ચરમાં હોય છે"], "correct": 1, "explanation": "સેંસ કોડોન mRNA પર હોય છે અને એમિનો એસિડ માટે કોડ કરે છે, જ્યારે એન્ટીસેંસ કોડોન DNA ની કોમ્પ્લિમેન્ટરી સ્ટ્રેન્ડ પર હોય છે. વિકલ્પ A, C, અને D ગલત છે કારણ કે તેઓ સેંસ અને એન્ટીસેંસ કોડોનની યોગ્ય જગ્યાઓ વર્ણવતા નથી.", "ncert_ref": "Class XII - પ્રકરણ 6: આણ્વિક આનુવંશિકતા", "difficulty": "Hard", "num": 9}, {"question": "જિનેટિક કોડમાં 'ફ્રેમશિફ્ટ મ્યુટેશન' (Frameshift Mutation) ની અસર વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) તે એક અથવા વધુ ન્યુક્લિયોટાઇડના ઉમેરા અથવા કાઢવા દ્વારા થાય છે", "B) તે પ્રોટીનની લંબાઈને બદલી શકે છે", "C) તે હંમેશા પ્રોટીનની કામગીરીને પૂર્ણપણે બંધ કરે છે", "D) તે રીડિંગ ફ્રેમને બદલી નાખે છે, જેથી તમામ પછીના કોડોન બદલાઈ જાય છે"], "correct": 2, "explanation": "ફ્રેમશિફ્ટ મ્યુટેશન હંમેશા પ્રોટીનની કામગીરીને પૂર્ણપણે બંધ કરતું નથી. કેટલીક વખત, નવો રીડિંગ ફ્રેમ એવો પ્રોટીન બનાવી શકે છે જેની કામગીરી મૂળ પ્રોટીન જેવી જ હોય છે અથવા અલગ હોય છે. વિકલ્પ A, B, અને D સાચા છે.", "ncert_ref": "Class XII - પ્રકરણ 6: આણ્વિક આનુવંશિકતા", "difficulty": "Hard", "num": 10}, {"question": "જિનેટિક કોડમાં 'UAA', 'UAG', અને 'UGA' કોડોનને 'નોન-સેંસ કોડોન' (Nonsense Codon) કહેવામાં આવે છે. આ કોડોનની ભૂમિકા વિશે નીચેનામાંથી કયું વિધાન સૌથી યોગ્ય છે?", "options": ["A) આ કોડોન mRNA પર પ્રોટીન સંશ્લેષણની શરૂઆત કરે છે.", "B) આ કોડોન mRNA પર પ્રોટીન સંશ્લેષણને અટકાવે છે અને પોલિપેપ્ટાઇડ શૃંખલાને મુક્ત કરે છે.", "B) આ કોડોન tRNA સાથે જોડાઈને એમિનો એસિડની ભરતી કરે છે.", "D) આ કોડોન DNA રેપ્લિકેશન ે આ બંને પ્રોટીન સંશ્લેષણના અંતને સૂચવતાં નથી.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક આનુવંશિકતા", "difficulty": "Hard", "num": 20}, {"question": "જિનેટિક કોડમાં 'UAA' કોડોનને લગતું નીચેનામાંથી કયું વિધાન સત્ય નથી?", "options": ["A) તે સ્ટોપ કોડોન છે અને પ્રોટીન સંશ્લેષણને અટકાવે છે.", "B) તે mRNA પર આવેલો હોય છે અને રાઇબોઝોમ દ્વારા ઓળખાય છે.", "C) તે એમિનો એસિડ માટે કોડ કરે છે અને tRNA દ્વારા વહન પામે છે.", "D) તે પ્રોટીન સંશ્લેષણના અંતમાં ભૂમિકા ભજવે છે."], "correct": 2, "explanation": "UAA એક સ્ટોપ કોડોન છે, જે પ્રોટીન સંશ્લેષણને અટકાવે છે (A સાચું). તે mRNA પર આવેલો હોય છે અને રાઇબોઝોમ દ્વારા ઓળખાય છે (B સાચું). પ્રોટીન સંશ્લેષણના અંતમાં તેની ભૂમિકા હોય છે (D સાચું). પરંતુ તે એમિનો એસિડ માટે કોડ કરતો નથી, તેથી C ખોટું છે.", "ncert_ref": "Class XII - Chapter 6: આનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "difficulty": "Hard", "num": 21}, {"question": "જિનેટિક કોડની 'વોબલ હાઇપોથીસિસ' ની સૌથી મહત્વની ભૂમિકા ક્યાં જોવા મળે છે?", "options": ["A) DNA રેપ્લિકેશન દરમિયાન", "B) ટ્રાન્સક્રિપ્શન દરમિયાન", "C) ટ્રાન્સલેશન દરમિયાન tRNA અને mRNA ની જોડણી વખતે", "D) RNA પ્રોસેસિંગ દરમિયાન"], "correct": 2, "explanation": "વોબલ હાઇપોથીસિસ ટ્રાન્સલેશન દરમિયાન tRNA અને mRNA ની કોડોન-એન્ટિકોડોન જોડણી વખતે જોવા મળે છે, જ્યાં tRNA નું એન્ટિકોડોન mRNA ના કોડોન સાથે લવચીક રીતે જોડાય છે (C સાચું). DNA રેપ્લિકેશન (A), ટ્રાન્સક્રિપ્શન (B), અને RNA પ્રોસેસિંગ (D) સાથે તે સંકળાયેલ નથી.", "ncert_ref": "Class XII - Chapter 6: આનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "difficulty": "Hard", "num": 22}, {"question": "જિનેટિક કોડમાં 'વોબલ બેઝ પેઅરિંગ' (Wobble Base Pairing) ની ઘટના નીચેનામાંથી ક્યાં સૌથી વધુ મહત્વની છે અને કયા અણુમાં તે જોવા મળે છે?", "options": ["A) mRNA અને tRNA વચ્ચેના કોડોન-એન્ટિકોડોન જોડાણ દરમિયાન, જ્યાં tRNA ના એન્ટિકોડોન લૂપમાં 5'-એન્ડ પર ઇનોસિન (I) હાજર હોય છે.", "B) DNA રેપ્લિકેશન દરમિયાન, જ્યાં DNA પોલિમરેઝ એડિનિન (A) ને થાયમિન (T) સિવાય ગુઆનિન (G) સાથે જોડે છે.", "C) ટ્રાન્સક્રિપ્શન દરમિયાન, જ્યાં RNA પોલિમરેઝ યુરેસિલ (U) ને એડિનિન (A) સિવાય સાયટોસિન (C) સાથે જોડે છે.", "D) ડોન છે જે ટ્રિપ્ટોફેન માટે કોડ કરે છે.", "C) સેરિન (UCU, UCC, UCA, UCG, AGU, AGC) કોડોન, જે વોબલ હાઇપોથીસિસનો પૂરો લાભ લે છે.", "D) લ્યુસિન (UUA, UUG, CUU, CUC, CUA, CUG) કોડોન, જે વોબલ બેઝ પેઅરિંગ દ્વારા અનુવાદિત થાય છે."], "correct": 1, "explanation": "ટ્રિપ્ટોફેન (UGG) કોડોન એકમાત્ર કોડોન છે જે ટ્રિપ્ટોફેન માટે કોડ કરે છે, અને તે વોબલ હાઇપોથીસિસનો અપવાદ છે કારણ કે તેના ત્રીજા બેઝમાં કોઈ લવચીકતા નથી. વિકલ્પ A ખોટો છે કારણ કે AUG કોડોન મિથાયોનાઇન માટે કોડ કરે છે, પરંતુ તે વોબલ હાઇપોથીસિસનો અપવાદ નથી. વિકલ્પ C અને D ખોટા છે કારણ કે સેરિન અને લ્યુસિન કોડોન વોબલ હાઇપોથીસિસનો લાભ લે છે.", "ncert_ref": "Class XII - પ્રકરણ 6: જીવનની વંશપરંપરાગતતા અને વિવિધતા", "difficulty": "Hard", "num": 25}, {"question": "જિનેટિક કોડમાં 'વોબલ હાઇપોથીસિસ' ના સંદર્ભમાં, નીચેનામાંથી કયો કોડોન-એન્ટિકોડોન જોડી માટે 'G-U' વોબલ જોડાણની છૂટ નથી મળતી?", "options": ["A) કોડોન: CUU, એન્ટિકોડોન: GAA", "B) કોડોન: UUC, એન્ટિકોડોન: AAG", "C) કોડોન: UUA, એન્ટિકોડોન: AAU", "D) કોડોન: UUG, એન્ટિકોડોન: CAA"], "correct": 1, "explanation": "વોબલ હાઇપોથીસિસ મુજબ, ત્રીજા બેઝમાં G-U જોડાણ થઈ શકે છે, પરંતુ UUC કોડોન સાથે AAG એન્ટિકોડોનમાં ત્રીજો બેઝ 'C' અને 'G' છે, જે G-U જોડાણની છૂટ આપતો નથી. બાકીના વિકલ્પોમાં ત્રીજા બેઝમાં G-U જોડાણ શક્ય છે. ઉદાહરણ તરીકે, CUU સાથે GAAમાં ત્રીજો બેઝ U-A છે, જે વોબલ હાઇપોથીસિસ અનુસાર મંજૂર છે.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક આનુવંશિકતા", "difficulty": "Hard", "num": 26}, {"question": "જિનેટિક કોડની 'ડિજનરેસી' અને 'વોબલ હાઇપોથીસિસ' ની સંકળાયેલ ઘટનામાં, નીચેનામાંથી કયો એમિનો એસિડ સૌથી વધુ કોડોન દ્વારા કોડ થાય છે અને તેના એન્ટિકોડોનમાં 'I' (Inosine) ની હાજરી શક્ય છે?", "options": ["A) સેરિન (Ser)", "B) લ્યુસિન (Leu)", "C) આર્જિનિન (Arg)", "D) પ્રોલિન (Pro)"], "correct": 1, "explanation": "લ્યુસિન (Leu) એમિનો એસિડ 6 કોડોન (UUA, UUG, CUU, CUC, CUA, CUG) દ્વારા કોડ થાય છે, જે સૌથી વધુ છે. વોબલ હાઇપોથીસિસ મુજબ, એન્ટિકોડોનમાં 'I' (Inosine) ની હાજરી ત્રીજા બેઝમાં A, C, U સાથે જોડાઈ શકે છે, જે લ્યુસિનના કોડોન માટે લાગુ પડે છે. સેરિન 6 કોડોન દ્વારા કોડ થાય છે, પરંતુ તેના એન ion": "નીચેનામાંથી કયો કિસ્સો જિનેટિક કોડની 'વોબલ હાઇપોથીસિસ'નો અપવાદ ગણી શકાય?", "options": ["A) tRNAના એન્ટિકોડોનના ત્રીજા બેઝ અને mRNAના કોડોનના પહેલા બેઝ વચ્ચે G-U બેઝ પેઅરિંગ.", "B) tRNAના એન્ટિકોડોનના પહેલા બેઝ અને mRNAના કોડોનના ત્રીજા બેઝ વચ્ચે I-U બેઝ પેઅરિંગ.", "C) tRNAના એન્ટિકોડોનના ત્રીજા બેઝ અને mRNAના કોડોનના પહેલા બેઝ વચ્ચે A-C બેઝ પેઅરિંગ.", "D) tRNAના એન્ટિકોડોનના પહેલા બેઝ અને mRNAના કોડોનના ત્રીજા બેઝ વચ્ચે I-A બેઝ પેઅરિંગ."], "correct": 2, "explanation": "વોબલ હાઇપોથીસિસ મુજબ, tRNAના એન્ટિકોડોનના પહેલા બેઝ અને mRNAના કોડોનના ત્રીજા બેઝ વચ્ચે અસામાન્ય બેઝ પેઅરિંગ થઈ શકે છે, જેમ કે I-U, I-A, I-C, G-U વગેરે. પરંતુ A-C બેઝ પેઅરિંગ વોબલ હાઇપોથીસિસમાં સ્વીકાર્ય નથી, જે આ કિસ્સાને અપવાદ બનાવે છે. વિકલ્પ A, B અને D વોબલ હાઇપોથીસિસ મુજબ સાચા છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 33}, {"question": "એક પ્રયોગમાં, mRNAના ક્રમમાં એક બેઝ ઉમેરવામાં આવે છે, જેના કારણે ફ્રેમશિફ્ટ મ્યુટેશન થાય છે. આ પરિવર્તન બાદ નીચેનામાંથી કયું પરિણામ સંભવિત નથી?", "options": ["A) પ્રોટીન સંશ્લેષણ વહેલું સમાપ્ત થઈ શકે છે.", "B) પ્રોટીનમાં સંપૂર્ણ નવો એમિનો એસિડ ક્રમ ઉત્પન્ન થઈ શકે છે.", "C) મૂળ પ્રોટીનની કાર્યક્ષમતા જળવાઈ રહી શકે છે.", "D) પ્રોટીન સંશ્લેષણમાં કોઈ ફેરફાર થશે નહીં."], "correct": 3, "explanation": "ફ્રેમશિફ્ટ મ્યુટેશનમાં એક અથવા બે બેઝના ઉમેરા કે કમીને કારણે વાંચન ફ્રેમ બદલાઈ જાય છે, જેના કારણે પ્રોટીનનો સંપૂર્ણ નવો એમિનો એસિડ ક્રમ ઉત્પન્ન થાય છે. આથી પ્રોટીનની કાર્યક્ષમતા જળવાઈ રહેવાની સંભાવના ખૂબ જ ઓછી છે. વિકલ્પ A અને B સંભવિત પરિણામો છે. વિકલ્પ D ખોટો છે કારણ કે ફ્રેમશિફ્ટ મ્યુટેશનથી પ્રોટીન સંશ્લેષણમાં ફેરફાર થશે જ.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 34}, {"question": "નીચેનામાંથી કયું વિધાન જિનેટિક કોડની 'ડિજનરેસી' અને 'વોબલ હાઇપોથીસિસ' વચ્ચેના સંબંધ વિશે સત્ય નથી?", "options": ["A) વોબલ હાઇપોથીસિસ ડિજનરેસીની ઘટનાને સમજાવવામાં મદદ કરે છે.", "B) ડિજનરેસીને કારણે એક કરતાં વધુ કોડોન એક જ એમિનો એસિડ માટે કોડ કરી શકે છે.", "C) વોબલ હાઇપોથીસિસ મુજબ, tRNAના એન્ટિકોડોનના પહેલા બેઝની લવચિકતા ડિજનરેસી માટે જવાબદાર છે.", "D) ડિજનરેસી અને વોબલ હાઇપોથીસિસ બંને જિનેટિક કોડની સર્વવ્યાપકતાને સમર્થન આપે છે."], "correct": 3, "explanation": "ડિજનરેસી અને વોબલ હાઇપોથીસિસ જિનેટિક કોડની સર્વવ્યાપકતા સાથે સીધો સંબંધ ધરાવતા નથી. સર્વવ્યાપકતા એટલે કે લગભગ બધા જ સજીવોમાં જિનેટિક કોડ સમાન હોય છે. વિકલ્પ A, B અને C ડિજનરેસી અને વોબલ હાઇપોથીસિસ વચ્ચેના સંબંધને સાચી રીતે સમજાવે છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 35}, {"question": "જિનેટિક કોડમાં, નીચેનામાંથી કયું વિધાન 'સ્ટાર્ટ કોડોન' (AUG) અને 'સ્ટોપ કોડોન' (UAA, UAG, UGA) વિશે સાચું નથી?", "options": ["A) AUG કોડોન મિથિયોનાઇન એમિનો એસિડ માટે કોડ કરે છે અને પ્રોટીન સંશ્લેષણની શરૂઆત કરે છે", "B) UAA, UAG, અને UGA કોડોન પ્રોટીન સંશ્લેષણને રોકી દે છે", "C) AUG કોડોન પ્રોટીન સંશ્લેષણમાં ફક્ત શરૂઆત માટે જ વપરાય છે, એમિનો એસિડ માટે નહીં", "D) UAA કોડોન ક્યારેક સેલ્યુલર પ્રોટીનમાં એમિનો એસિડ માટે કોડ કરે છે"], "correct": 2, "explanation": "AUG કોડોન મિથિયોનાઇન એમિનો એસિડ માટે કોડ કરે છે અને પ્રોટીન સંશ્લેષણની શરૂઆત પણ કરે છે, આમ વિકલ્પ A સાચો છે. UAA, UAG, અને UGA કોડોન પ્રોટીન સંશ્લેષણને રોકી દે છે, આમ વિકલ્પ B સાચો છે. વિકલ્પ C ખોટો છે, કારણ કે AUG કોડોન મિથિયોનાઇન માટે કોડ કરે છે અને પ્રોટીન સંશ્લેષણની શરૂઆત પણ કરે છે. વિકલ્પ D સાચો છે, કારણ કે કેટલાક કિસ્સાઓમાં UAA કોડોન સેલ્યુલર પ્રોટીનમાં એમિનો એસિડ માટે કોડ કરે છે (જેમ કે મિટોકોન્ડ્રિયલ જિનોમમાં).", "ncert_ref": "Class XII - Chapter 6: જીન અને જિનેટિક કોડ", "difficulty": "Hard", "num": 36}, {"question": "જિનેટિક કોડના સંદર્ભમાં, નીચેનામાંથી કયો કોડોન 'સ્ટાર્ટ કોડોન' તરીકે અને 'એમિનો એસિડ કોડિંગ' બંને માટે વપરાય છે?", "options": ["A) UAA", "B) AUG", "C) UAG", "D) UGA"], "correct": 1, "explanation": "AUG કોડોન 'સ્ટાર્ટ કોડોન' તરીકે અને મિથિયોનાઇન એમિનો એસિડ માટે કોડ કરે છે. UAA, UAG, અને UGA સ્ટોપ કોડોન છે, જે પ્રોટીન સંશ્લેષણને રોકે છે અને એમિનો એસિડ માટે કોડ કરતા નથી. આથી B વિકલ્પ સાચો છે.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક આનુવંશિકતા (Molecular Basis of Inheritance)", "difficulty": "Hard", "num": 37}, {"question": "જિનેટિક કોડમાં, નીચેનામાંથી કયું વિધાન 'ડિજનરેસી' અને 'વોબલ હાઇપોથીસિસ' વચ્ચેના સંબંધ વિશે સાચું છે?", "options": ["A) 'ડિજનરેસી' એ 'વોબલ હાઇપોથીસિસ'નું પરિણામ છે.", "B) 'વોબલ હાઇપોથીસિસ' એ 'ડિજનરેસી'નું કારણ છે.", "C) 'ડિજનરેસી' અને 'વોબલ હાઇપોથીસિસ' પરસ્પર સ્વતંત્ર ઘટનાઓ છે.", "D) 'વોબલ હાઇપોથીસિસ' એ 'ડિજનરેસી'ની સ્પષ્ટીકરણ કરે છે."], "correct": 3, "explanation": "'ડિજનરેસી' એ જિનેટિક કોડની એવી લાક્ષણિકતા છે જ્યાં એકથી વધુ કોડોન એક જ એમિનો એસિડ માટે કોડ કરે છે. 'વોબલ હાઇપોથીસિસ' એ ત્રીજા બેઝ પેઅરિંગમાં લવચીકતા દર્શાવે છે, જેના કારણે એક જ tRNA વિવિધ કોડોન સાથે જોડાઈ શકે છે. 'વોબલ હાઇપોથીસિસ' એ 'ડિજનરેસી'ની સ્પષ્ટીકરણ કરે છે, કારણ કે તે સમજાવે છે કે કેવી રીતે એક જ tRNA વિવિધ કોડોનને ઓળખી શકે છે, જેના કારણે 'ડિજનરેસી' શક્ય બને છે. આથી D વિકલ્પ સાચો છે. A, B, અને C વિકલ્પો ખોટા છે કારણ કે તેઓ બંને ઘટનાઓ વચ્ચેના સંબંધને યોગ્ય રીતે વર્ણવતા નથી.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક આનુવંશિકતા (Molecular Basis of Inheritance)", "difficulty": "Hard", "num": 38}, {"question": "એક પ્રયોગમાં, સૂત્રકણિકા (mitochondria) ના DNAમાંથી મેળવેલ mRNAના ક્રમમાં 'AUA' કોડોન જોવા મળે છે. સામાન્ય કોષીય જિનેટિક કોડના સંદર્ભમાં, આ કોડોનની વિશિષ્ટતા શું છે અને તેની અસર શું થાય?", "options": ["A) આ કોડોન સામાન્ય રીતે આઇસોલ્યુસિન માટે કોડ કરે છે, પરંતુ સૂત્રકણિકામાં મિથિયોનાઇન માટે કોડ કરે છે અને પ્રોટીન સંશ્લેષણની શરૂઆત સૂચવે છે.", "B) આ કોડોન માત્ર સૂત્રકણિકામાં જોવા મળે છે અને તે ટ્રિપ્ટોફેન માટે કોડ કરે છે, જે સામાન્ય કોષીય કોડમાં જોવા મળતું નથી.", "C) આ કોડોન સામાન્ય રીતે સ્ટોપ કોડોન તરીકે કાર્ય કરે છે, પરંતુ સૂત્રકણિકામાં આર્જિનિન માટે કોડ કરે છે.", "D) આ કોડોન સૂત્રકણિકામાં અને સામાન્ય કોષમાં સમાન એમિનો એસિડ માટે કોડ કરે છે, પરંતુ તેની અભિવ્યક્તિનું નિયમન અલગ હોય છે."], "correct": 0, "explanation": "સાચો જવાબ વિકલ્પ A છે કારણ કે સૂત્રકણિકામાં 'AUA' કોડોન મિથિયોનાઇન માટે કોડ કરે છે અને પ્રોટીન સંશ્લેષણની શરૂઆત સૂચવે છે, જ્યારે સામાન્ય કોષીય જિનેટિક કોડમાં તે આઇસોલ્યુસિન માટે કોડ કરે છે. વિકલ્પ B ખોટો છે કારણ કે 'AUA'             quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
