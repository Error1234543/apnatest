<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - ઉત્પાદકો</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 ઉત્પાદકો</span>
                <span>🎯 Hard</span>
                <span>📝 34 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "જ્યારે એક જૈવિક પદાર્થમાં ઉત્પાદકો, ઉપભોક્તાઓ અને વિઘટકોની સંખ્યા સંતુલિત હોય ત્યારે કયું પગલું સૌથી મહત્વપૂર્ણ છે જેથી ઇકોસિસ્ટમ ટકી રહે?", "options": ["A) ઉત્પાદકો દ્વારા ઓક્સિજનનું ઉત્પાદન વધારવું", "B) વિઘટકો દ્વારા કાર્બનિક પદાર્થોનું વિઘટન થવું", "C) ઉપભોક્તાઓ દ્વારા શાકાહારી જીવોનું સેવન કરવું", "D) ઉત્પાદકો અને ઉપભોક્તાઓ વચ્ચેની સંખ્યામાં સમાનતા રાખવી"], "correct": 1, "explanation": "વિઘટકો (જેવા કે બેક્ટેરિયા અને ફંગી) કાર્બનિક પદાર્થોનું વિઘટન કરીને પોષક તત્ત્વોને પુનઃચક્રિત કરે છે, જેથી ઉત્પાદકો (જેવા કે છોડ) તેનો ઉપયોગ કરી શકે. આ પ્રક્રિયા ઇકોસિસ્ટમની સ્થિરતા માટે આવશ્યક છે. A) ઓક્સિજનનું ઉત્પાદન મહત્વપૂર્ણ છે પરંતુ સંતુલન માટે પોષક તત્ત્વોનું પુનઃચક્રન વધુ મહત્વપૂર્ણ છે. C) ઉપભોક્તાઓનું સેવન ઇકોસિસ્ટમના ઉર્જા પ્રવાહ માટે મહત્વપૂર્ણ છે પરંતુ સંતુલન માટે વિઘટન એ મૂળભૂત છે. D) સંખ્યામાં સમાનતા રાખવી પ્રાકૃતિક રીતે શક્ય નથી અને સંતુલન માટે આવશ્યક પણ નથી.", "ncert_ref": "Class XII - Chapter 14: પારિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 1}, {"question": "એક જલીય ઇકોસિસ્ટમમાં, જ્યારે ઉત્પાદકો (ફાયટોપ્લાંકટન)ની સંખ્યા અચાનક ઘટે છે, ત્યારે કયા જૂથ પર સૌથી વધુ પ્રભાવ પડશે?", "options": ["A) મત્સ્યભક્ષી પક્ષીઓ", "B) જલીય કીટકો", "C) ઝૂકોફાયટ (Zooplankton)", "D) જલીય સસ્તન પ્રાણીઓ"], "correct": 2, "explanation": "ફાયટોપ્લાંકટન (ઉત્પાદકો) ઘટવાથી સૌપ્રથમ પ્રભાવ ઝૂકોફાયટ (Zooplankton) પર પડશે, કારણ કે તેઓ ફાયટોપ્લાંકટન પર આહાર તરીકે આધારિત હોય છે. A) મત્સ્યભક્ષી પક્ષીઓ અને D) જલીય સસ્તન પ્રાણીઓ ખોરાક સાંકળીના ઉચ્ચ સ્તરે હોય છે, તેથી તેમના પર તાત્કાલિક પ્રભાવ પડશે નહીં. B) જલીય કીટકો પણ ફાયટોપ્લાંકટન પર આધારિત હોઈ શકે છે, પરંતુ ઝૂકોફાયટ પર સૌથી વધુ આધાર રહેલો છે.", "ncert_ref": "Class XII - Chapter 14: પારિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 2}, {"question": "વિઘટકોની ગેરહાજરીમાં, ઇકોસિસ્ટમમાં કયું પરિવર્તન સૌથી વધુ નોંધપાત્ર હશે?", "options": ["A) ઓક્સિજનનું સ્તર ઘટશે", "B) કાર્બન ડાયોક્સાઇડનું સ્તર વધશે", "C) પોષક તત્ત્વોનું સંગ્રહણ થશે અને છોડની વૃદ્ધિ અટકશે", "D) જૈવિક વિવિધતા વધશે"], "correct": 2, "explanation": "વિઘટકો પોષક તત્ત્વોને પુનઃચક્રિત કરે છે. તેમની ગેરહાજરીમાં, કાર્બનિક પદાર્થોનું વિઘટન થશે નહીં, જેથી પોષક તત્ત્વો સંગ્રહિત થશે અને છોડની વૃદ્ધિ અટકશે. A) ઓક્સિજનનું સ્તર ઘટશે નહીં, કારણ કે ઉત્પાદકો હજુ પણ પ્રકાશસંશ્લેષણ કરી શકે છે. B) કાર્બન ડાયોક્સાઇડનું સ્તર વધશે નહીં, કારણ કે ઉત્પાદકો તેનો ઉપયોગ કરશે. D) જૈવિક વિવિધતા ઘટશે, કારણ કે પોષક તત્ત્વોની ઉણપથી જીવોનું અસ્તિત્વ ધોવાઈ જશે.", "ncert_ref": "Class XII - Chapter 14: પારિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 3}, {"question": "એક વન ઇકોસિસ્ટમમાં, જ્યારે ઉપભોક્તાઓ (શાકાહારી પ્રાણીઓ)ની સંખ્યા અચાનક વધે છે, ત્યારે કયું પરિણામ સૌથી સંભવિત છે?", "options": ["A) ઉત્પાદકો (છોડ)ની સંખ્યા વધશે", "B) વિઘટકોની સંખ્યા ઘટશે", "C) ઉત્પાદકોની સંખ્યા ઘટશે અને વિઘટકોની સંખ્યા વધશે", "D) ઉત્પાદકો અને વિઘટકોની સંખ્યા સ્થિર રહેશે"], "correct": 2, "explanation": "જ્યારે શાકાહારી પ્રાણીઓ (ઉપભોક્તાઓ)ની સંખ્યા વધે છે, ત્યારે તેઓ વધુ છોડ (ઉત્પાદકો) ખાશે, જેથી ઉત્પાદકોની સંખ્યા ઘટશે. મૃત છોડ અને પ્રાણીઓના અવશેષો વધવાથી વિઘટકોની સંખ્યા વધશે. A) ઉત્પાદકોની સંખ્યા ઘટશે, વધશે નહીં. B) વિઘટકોની સંખ્યા વધશે, ઘટશે નહીં. D) સંખ્યા સ્થિર રહેશે નહીં, કારણ કે ઇકોસિસ્ટમ ડાયનેમિક હોય છે.", "ncert_ref": "Class XII - Chapter 14: પારિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 4}, {"question": "નીચેનામાંથી કયું વિધાન ઉત્પાદકો, ઉપભોક્તાઓ અને વિઘટકો વચ્ચેના સંબંધને સૌથી યથાર્થ રીતે વર્ણવે છે?", "options": ["A) ઉત્પાદકો ઉર્જાનું સ્રોત છે, ઉપભોક્તાઓ ઉર્જાનું સંગ્રહણ કરે છે, અને વિઘટકો ઉર્જાનું નાશ કરે છે", "B) ઉત્પાદકો કાર્બન ડાયોક્સાઇડ અને પાણીનો ઉપયોગ કરીને કાર્બોદિત બનાવે છે, ઉપભોક્તાઓ તે કાર્બોદિતનો ઉપયોગ કરે છે, અને વિઘટકો મૃત જૈવિક પદાર્થોને સરળ પદાર્થોમાં તોડે છે", "C) ઉત્પાદકો, ઉપભોક્તાઓ અને વિઘટકો એકબીજા પર આધારિત નથી", "D) વિઘટકો ઉત્પાદકો અને ઉપભોક્તાઓ માટે ખોરાક તરીકે કામ કરે છે"], "correct": 1, "explanation": "B) વિધાન સૌથી યથાર્થ છે: ઉત્પાદકો (જેવા કે છોડ) પ્રકાશસંશ્લેષણ દ્વારા કાર્બન ડાયોક્સાઇડ અને પાણીનો ઉપયોગ કરીને કાર્બોદિત (ગ્લુકોઝ) બનાવે છે. ઉપભોક્તાઓ (જેવા કે પ્રાણીઓ) આ કાર્બોદિતનો ઉપયોગ ઉર્જા માટે ક ેલા લિગ્નિનને વિઘટિત કરવામાં મહત્ત્વની ભૂમિકા ભજવે છે. જો આ ફંગીની સંખ્યા ઘટે, તો લિગ્નિન-યુક્ત પદાર્થો (જેમ કે મૃત વૃક્ષોના થડ)નું વિઘટન અટકી જશે અને જમીનમાં એકઠા થશે. આથી જમીનમાં કાર્બનિક પદાર્થોનું પ્રમાણ વધશે, પરંતુ માત્ર લિગ્નિન-યુક્ત પદાર્થો જ એકઠા થશે. નાઇટ્રોજનનું પ્રમાણ ઘટશે કારણ કે વિઘટનની પ્રક્રિયા ધીમી પડવાથી પોષક તત્ત્વોનું પુનઃચક્રીકરણ અટકશે. ઉત્પાદકોની વૃદ્ધિ પર અસર થશે કારણ કે તેમને જરૂરી પોષક તત્ત્વો ઓછા પ્રમાણમાં મળશે. ઉપભોક્તાઓની સંખ્યામાં ઘટાડો થશે કારણ કે ઉત્પાદકોની વૃદ્ધિ મર્યાદિત થશે.", "ncert_ref": "કક્ષા 12 - પ્રકરણ 14: ઇકોસિસ્ટમ", "difficulty": "Hard", "num": 21}, {"question": "નીચેનામાંથી કયું જીવંત સ્વરૂપ ઉત્પાદક, ઉપભોક્તા અને વિઘટક તરીકેની ભૂમિકા એકસાથે ભજવી શકે છે?", "options": ["A) લીલ (Algae)", "B) લાઇકેન (Lichen)", "C) યુગ્લીના (Euglena)", "D) સાયનોબેક્ટેરિયા (Cyanobacteria)"], "correct": 2, "explanation": "યુગ્લીના એક પ્રોટિસ્ટ છે જે પ્રકાશસંશ્લેષણ કરી શકે છે (ઉત્પાદક તરીકે), બાહ્ય પોષણ મેળવી શકે છે (ઉપભોક્તા તરીકે), અને મૃત કાર્બનિક પદાર્થોનું વિઘટન પણ કરી શકે છે (વિઘટક તરીકે). લીલ અને સાયનોબેક્ટેરિયા માત્ર ઉત્પાદક તરીકે કામ કરે છે. લાઇકેન એ ફંગસ અને લીલ/સાયનોબેક્ટેરિયાનું સહજીવન છે, જે ઉત્પાદક અને વિઘટક તરીકે કામ કરી શકે છે, પરંતુ ઉપભોક્તા તરીકે નહીં.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 2: જૈવિક વર્ગીકરણ, કક્ષા 12 - પ્રકરણ 14: ઇકોસિસ્ટમ", "difficulty": "Hard", "num": 22}, {"question": "એક જલીય ઇકોસિસ્ટમમાં, જો વિઘટકોની ક્રિયાશીલતા અચાનક વધી જાય, પરંતુ ઉત્પાદકો (ફાયટોપ્લાંકટન)ની સંખ્યા સ્થિર રહે, તો નીચેનામાંથી કયું પરિણામ સૌથી ઓછું સંભવિત છે?", "options": ["A) પાણીમાં ઓગળેલા ઓક્સિજનનું પ્રમાણ ઘટશે કારણ કે વિઘટન પ્રક્રિયામાં ઓક્સિજનનો ઉપયોગ થશે.", "B) પાણીમાં કાર્બન ડાયોક્સાઇડનું પ્રમાણ વધશે કારણ કે વિઘટન દરમિયાન કાર્બન ડાયોક્સાઇડ મુક્ત થશે.", "C) પાણીમાં નાઇટ્રેટ્સ અને ફોસ્ફેટ્સનું પ્રમાણ વધશે કારણ કે વિઘટન દરમિયાન પોષક તત્ત્વો મુક્ત થશે.", "D) ફાયટોપ્લાંકટનની વૃદ્ધિ વધશે કારણ કે તેમને વધુ પોષક તત્ત્વો ઉપલબ્ધ થશે."], "correct": 3, "explanation": "વિઘટકોની ક્રિયાશીલતા વધવાથી પાણીમાં ઓગળેલા ઓક્સિજનનું પ્રમાણ ઘટશે કારણ કે વિઘટન પ્રક્રિયામાં ઓક્સિજનનો ઉપયોગ થાય છે. વિઘટન દરમિયાન કાર્બન ડાયોક્સાઇડ અને પોષક તત્ત્વો (નાઇટ્રેટ્સ, ફોસ્ફેટ્સ) મુક્ત થશે, જે પાણીમાં તેમનું પ્રમાણ વધારશે. જો કે, ફાયટોપ્લાંકટનની સંખ્યા સ્થિર રહે છે, જે સૂચવે છે કે અન્ય પરિબળો (જેમ કે પ્રકાશ, તાપમાન) તેમની વૃદ્ધિને મર્યાદિત કરી રહ્યા છે. તેથી, ફાયટોપ્લાંકટનની વૃદ્ધિમાં વધારો થવો સૌથી ઓછો સંભવિત છે.", "ncert_ref": "કક્ષા 12 - પ્રકરણ 14: ઇકોસિસ્ટમ", "difficulty": "Hard", "num": 23}, {"question": "એક વન ઇકોસિસ્ટમમાં, જ્યારે વિઘટકો (બેક્ટરિયા અને ફંગી) દ્વારા લિગ્નિન અને સેલ્યુલોઝના વિઘટન દરમાં તફાવત જોવા મળે છે, ત્યારે નીચેનામાંથી કયું વિધાન સૌથી યથાર્થ છે?", "options": ["A) લિગ્નિનનો વિઘટન દર સેલ્યુલોઝ કરતાં ઝડપી હોય છે, કારણ કે લિગ્નિનમાં ફિનોલિક સંયોજનો હોય છે જે વિઘટકો માટે આકર્ષક હોય છે.", "B) સેલ્યુલોઝનો વિઘટન દર લિગ્નિન કરતાં ઝડપી હોય છે, કારણ કે સેલ્યુલોઝ વિઘટન માટે જવાબદાર ઉત્સેચકો (સેલ્યુલેઝ) વધુ પ્રચલિત હોય છે.", "C) લિગ્નિન અને સેલ્યુલોઝ બંનેમાં વિઘટન દર સમાન હોય છે, કારણ કે બંને કાર્બોદિત યુક્ત હોય છે.", "D) લિગ્નિનનો વિઘટન દર સેલ્યુલોઝ કરતાં ધીમો હોય છે, કારણ કે લિગ્નિનની રચના જટિલ અને કઠણ હોય છે."], "correct": 3, "explanation": "લિગ્નિનનો વિઘટન દર સેલ્યુલોઝ કરતાં ધીમો હોય છે, કારણ કે લિગ્નિનની રચના જટિલ અને કઠણ હોય છે, જે વિઘટકો માટે વિઘટન કરવા મુશ્કેલ હોય છે. સેલ્યુલોઝનો વિઘટન દર ઝડપી હોય છે, કારણ કે સેલ્યુલેઝ ઉત્સેચકો વધુ પ્રચલિત હોય છે. વિકલ્પ A ખોટો છે કારણ કે લિગ્નિનમાં ફિનોલિક સંયોજનો વિઘટકો માટે આકર્ષક નથી, પરંતુ વિઘટનને અવરોધે છે. વિકલ્પ B અંશતઃ સાચો છે, પરંતુ પ્રશ્ન લિગ્નિન અને સેલ્યુલોઝના તફાવત પર ભાર મૂકે છે. વિકલ્પ C ખોટો છે, કારણ કે બંનેમાં વિઘટન દર સમાન નથી.", "ncert_ref": "Class XII - Chapter 14: પારિસ્થિતિક તંત્ર", "difficulty": "Hard", "num": 24}, {"question": "એક સ્થિર વન ઇકોસિસ્ટમમાં, જો કેટલાક વિશિષ્ટ પ્રકારના વિઘટકો (જેમ કે લિગ્નિન-વિઘટક બેક્ટરિયા)ની સંખ્યામાં અચાનક ઘટાડો થાય, ત્યારે નીચેનામાંથી કયું પરિણામ સૌથી વધુ સંભવિત છે?", "options": ["A) વનમાં લાકડાનું પ્રમાણ ઝડપથી ઘટશે, કારણ કે વિઘટકો લાકડાને વિઘટિત કરશે નહીં.", "B) વનમાં લાકડાનું પ્રમાણ વધશે, કારણ કે વિઘટકો લાકડાને વિઘટિત કરશે નહીં."             if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
