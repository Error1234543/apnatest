    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>

    <script>
        const questionsData = [{"question": "એડ્સ (AIDS) ના રોગકારક એજન્ટ HIV એ કયા પ્રકારનો વાયરસ છે અને તે શરીરમાં કયા કોષો પર આક્રમણ કરે છે?", "options": ["A) RNA વાયરસ જે મુખ્યત્વે CD4+ T-લિમ્ફોસાઇટ્સ પર આક્રમણ કરે છે", "B) DNA વાયરસ જે B-લિમ્ફોસાઇટ્સ પર આક્રમણ કરે છે", "C) RNA વાયરસ જે મેક્રોફેજ પર આક્રમણ કરે છે", "D) DNA વાયરસ જે ન્યૂટ્રોફિલ્સ પર આક્રમણ કરે છે"], "correct": 0, "explanation": "HIV એ રેટ્રોવાયરસ કુટુંબનો RNA વાયરસ છે જે મુખ્યત્વે CD4+ T-લિમ્ફોસાઇટ્સ (હેલ્પર T-કોષો) પર આક્રમણ કરે છે. આ કોષો પ્રતિરક્ષાતંત્રના મહત્વના ઘટક છે. બાકીના વિકલ્પો ખોટા છે કારણ કે HIV DNA વાયરસ નથી, અને તે B-લિમ્ફોસાઇટ્સ, મેક્રોફેજ અથવા ન્યૂટ્રોફિલ્સ પર પ્રાથમિક આક્રમણ કરતો નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 1}, {"question": "એડ્સના રોગીની પ્રતિરક્ષા વ્યવસ્થામાં કયા હોર્મોનના સ્તરમાં ઘટાડો થવાને કારણે લિમ્ફોસાઇટ્સની સંખ્યામાં ઘટાડો થાય છે?", "options": ["A) ઇન્સ્યુલિન", "B) થાયરોક્સિન", "C) કોર્ટિસોલ", "D) ઇન્ટરલ્યુકિન-2"], "correct": 3, "explanation": "HIV સંક્રમણ દરમિયાન, ઇન્ટરલ્યુકિન-2 (IL-2) ના ઉત્પાદનમાં ઘટાડો થાય છે, જે T-કોષોના વૃદ્ધિ અને પ્રસરણ માટે જરૂરી સાયટોકાઇન છે. આના કારણે CD4+ T-કોષોની સંખ્યામાં ઘટાડો થાય છે. ઇન્સ્યુલિન, થાયરોક્સિન અને કોર્ટિસોલ પ્રતિરક્ષા વ્યવસ્થા સાથે સીધા સંબંધ ધરાવતા નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 2}, {"question": "HIV સંક્રમણ દરમિયાન, વાયરસ તેના જીનોમને હોસ્ટ કોષના DNAમાં એકીકૃત કરવા માટે કયા ઉત્સેચકનો ઉપયોગ કરે છે?", "options": ["A) DNA પોલિમરેઝ", "B) રિવર્સ ટ્રાન્સક્રિપ્ટેઝ", "C) RNA પોલિમરેઝ", "D) લાયગેઝ"], "correct": 1, "explanation": "HIV એ રેટ્રોવાયરસ છે જે રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચકનો ઉપયોગ કરે છે જે RNA ને DNA માં રૂપાંતરિત કરે છે, જે પછી હોસ્ટ કોષના DNAમાં એકીકૃત થાય છે. DNA પોલિમરેઝ, RNA પોલિમરેઝ અને લાયગેઝ આ પ્રક્રિયામાં સીધો ભાગ ભજવતા નથી.", "ncert_ref": "Class XII - Chapter 6: આનુવંશિકતા અને વિકાસ", "difficulty": "Hard", "num": 3}, {"question": "એડ્સના રોગીમાં કયા પ્રકારના કૅન્સરની શક્યતા વધુ હોય છે, જે HIV સંક્રમણ સાથે સંકળાયેલ છે?", "options": ["A) ફેફસાનું કૅન્સર", "B) કેપોસી સાર્કોમા", "C) સ્તન કૅન્સર", "D) પ્રોસ્ટેટ કૅન્સર"], "correct": 1, "explanation": "કેપોસી સાર્કોમા એ HIV સંક્રમણ સાથે સંકળાયેલ એક પ્રકારનું કૅન્સર છે, જે મુખ્યત્વે પ્રતિરક્ષા વ્યવસ્થા નબળી પડવાને કારણે થાય છે. ફેફસાનું કૅન્સર, સ્તન કૅન્સર અને પ્રોસ્ટેટ કૅન્સર HIV સાથે સીધા સંબંધ ધરાવતા નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 4}, {"question": "HIV સંક્રમણના કયા તબક્કે રોગીની પ્રતિરક્ષા વ્યવસ્થા ખૂબ જ નબળી પડે છે અને એડ્સના લક્ષણો દેખાય છે?", "options": ["A) પ્રાથમિક સંક્રમણ તબક્કો", "B) ક્લિનિકલ લેટન્સી તબક્કો", "C) એડ્સ તબક્કો", "D) સર્વાઇવલ તબક્કો"], "correct": 2, "explanation": "એડ્સ તબક્કો એ HIV સંક્રમણનો અંતિમ તબક્કો છે, જ્યારે CD4+ T-કોષોની સંખ્યા ખૂબ જ ઓછી થાય છે અને પ્રતિરક્ષા વ્યવસ્થા નબળી પડે છે, જેના કારણે એડ્સના લક્ષણો દેખાય છે. પ્રાથમિક સંક્રમણ અને ક્લિનિકલ લેટન્સી તબક્કામાં રોગી સ્વસ્થ દેખાય છે, જ્યારે સર્વાઇવલ તબક્કો એડ્સ પછીનો તબક્કો નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 5}, {"question": "HIV વાયરસ દ્વારા ઉત્પન્ન થતી 'gp120' નામની પ્રોટીન કયા કોષીય અણુ સાથે જોડાઈને CD4+ T-કોષમાં પ્રવેશ મેળવે છે?", "options": ["A) CD4 રિસેપ્ટર અને CCR5 કો-રિસેપ્ટર", "B) MHC-I અણુ અને TCR (T-Cell Receptor)", "C) CD8 રિસેપ્ટર અને CXCR4 કો-રિસેપ્ટર", "D) IgG એન્ટીબોડી અને Fc રિસેપ્ટર"], "correct": 0, "explanation": "gp120 પ્રોટીન HIV વાયરસની બાહ્ય સપાટી પર સ્થિત હોય છે અને તે CD4+ T-કોષના CD4 રિસેપ્ટર સાથે જોડાઈને પ્રવેશ મેળવે છે. આ પ્રક્રિયામાં CCR5 અથવા CXCR4 નામના કો-રિસેપ્ટરની પણ જરૂર પડે છે. આમ, વિકલ્પ A સચોટ છે. વિકલ્પ Bમાં TCR અને MHC-I અણુ T-કોષની પ્રતિરક્ષા પ્રક્રિયામાં ભાગ લે છે, પરંતુ HIV પ્રવેશ માટે નહીં. વિકલ્પ Cમાં CD8 રિસેપ્ટર સાયટોટોક્સિક T-કોષ સાથે સંબંધિત છે, જ્યારે CXCR4 કો-રિસેપ્ટર કેટલાક HIV સ્ટ્રેઇન માટે વાપરવામાં આવે છે, પરંતુ CD4 રિસેપ્ટર વગર તે પૂરતું નથી. વિકલ્પ Dમાં IgG એન્ટીબોડી અને Fc રિસેપ્ટર HIV પ્રવેશ સાથે સંબંધિત નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 6}, {"question": "એડ્સ રોગના રોગીમાં 'ઓપર્ચ્યુનિસ્ટિક ઇન્ફેક્શન' થવાનું મુખ્ય કારણ કયું છે?", "options": ["A) CD4+ T-કોષની સંખ્યામાં ઘટાડો અને પ્રતિરક્ષા વ્યવસ્થાની નબળાઈ", "B) HIV વાયરસ દ્વારા ઉત્પન્ન થતી ટોક્સિનની અસર", "C) રોગીના શરીરમાં એન્ટીબોડીની અતિશય ઉત્પત્તિ", "D) રોગીના રક્તમાં લોહીના કણોની સંખ્યામાં વધારો"], "correct": 0, "explanation": "એડ્સ રોગમાં HIV વાયરસ CD4+ T-કોષને નષ્ટ કરે છે, જેથી પ્રતિરક્ષા વ્યવસ્થા નબળી પડે છે. આના કારણે શરીરમાં ઓપર્ચ્યુનિસ્ટિક ઇન્ફેક્શન (જેમ કે ટ્યુબરક્યુલોસિસ, કૅન્ડિડિએસિસ) થવાની શક્યતા વધી જાય છે. આમ, વિકલ્પ A સચોટ છે. વિકલ્પ Bમાં HIV ટોક્સિન ઉત્પન્ન કરતું નથી. વિકલ્પ Cમાં એન્ટીબોડીની અતિશય ઉત્પત્તિ પ્રતિરક્ષા વ્યવસ્થાને નબળી પાડતી નથી. વિકલ્પ Dમાં લોહીના કણોની સંખ્યામાં વધારો ઓપર્ચ્યુનિસ્ટિક ઇન્ફેક્શન સાથે સંબંધિત નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 7}, {"question": "HIV વાયરસના જીનોમમાં કયા ઉત્સેચકની હાજરી તેને રિવર્સ ટ્રાન્સક્રિપ્ટેઝ વાયરસ તરીકે ઓળખાવે છે?", "options": ["A) DNA પોલિમરેઝ", "B) RNA પોલિમરેઝ", "C) રિવર્સ ટ્રાન્સક્રિપ્ટેઝ", "D) લાયગેઝ"], "correct": 2, "explanation": "HIV વાયરસ રેટ્રોવાયરસ કુટુંબનો છે અને તેના જીનોમમાં રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચક હોય છે, જે RNAને DNAમાં રૂપાંતરિત કરે છે. આમ, વિકલ્પ C સચોટ છે. વિકલ્પ A અને B ક્રમશઃ DNA અને RNA સિંથેસિસ માટે જવાબદાર છે, પરંતુ HIVમાં રિવર્સ ટ્રાન્સક્રિપ્ટેઝની ભૂમિકા ભિન્ન છે. વિકલ્પ D લાયગેઝ ઉત્સેચક DNAની મરામત અને જોડાણમાં ભાગ લે છે, પરંતુ HIV જીનોમ સાથે સંબંધિત નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 8}, {"question": "એડ્સ રોગના રોગીમાં 'કેપોસી સાર્કોમા' નામનો કૅન્સર કયા કોષોને અસર કરે છે?", "options": ["A) રક્તવાહિનીના એન્ડોથેલિયલ કોષો", "B) લસિકા ગાંઠના B-કોષો", "C) યકૃતના હેપેટોસાઇટ્સ", "D) મજ્જાના સ્ટેમ કોષો"], "correct": 0, "explanation": "કેપોસી સાર્કોમા એ HIV સંક્રમણ સાથે સંબંધિત કૅન્સર છે અને તે રક્તવાહિનીના એન્ડોથેલિયલ કોષોને અસર કરે છે. આમ, વિકલ્પ ્યામાં ઘટાડો થાય છે. ઇન્સ્યુલિન, એડ્રિનેલિન અને ગ્લુકાગોન પ્રતિરક્ષા વ્યવસ્થા સાથે સીધો સંબંધ ધરાવતા નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 17}, {"question": "HIV વાયરસ દ્વારા ઉત્પન્ન થતી 'Nef' પ્રોટીનનું મુખ્ય કાર્ય કયું છે?", "options": ["A) વાયરલ RNA ને DNAમાં રૂપાંતરિત કરવું", "B) હોસ્ટ કોષના પ્રતિરક્ષા તંત્રને નબળું પાડવું", "C) વાયરલ કણોને એકત્રિત કરવું", "D) વાયરલ DNA ને હોસ્ટ DNAમાં એકીકૃત કરવું"], "correct": 1, "explanation": "'Nef' પ્રોટીન HIV દ્વારા ઉત્પન્ન થતી એક એસેસરી પ્રોટીન છે, જે હોસ્ટ કોષના પ્રતિરક્ષા તંત્રને નબળું પાડે છે. તે CD4 અને MHC-I અણુઓની સપાટી પરની હાજરી ઘટાડીને કોષીય પ્રતિરક્ષા પ્રતિક્રિયાને અટકાવે છે. રિવર્સ ટ્રાન્સક્રિપ્શન રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચક દ્વારા, એકીકરણ ઇન્ટિગ્રેઝ દ્વારા, અને વાયરલ કણોનું એકત્રીકરણ પ્રોટીએઝ અને અન્ય પ્રોટીન દ્વારા થાય છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 18}, {"question": "એડ્સ રોગના સંક્રમણ દરમિયાન, HIV વાયરસ દ્વારા ઉત્પન્ન થતી 'Vpr' પ્રોટીનનું મુખ્ય કાર્ય કયું છે?", "options": ["A) વાયરસના જીનોમને હોસ્ટ કોષના કોષકેન્દ્રમાં પ્રવેશ કરાવવો", "B) હોસ્ટ કોષની કોષવિભાજન ચક્રને અટકાવી, વાયરસના પ્રસરણને વેગ આપવો", "C) વાયરસના RNA ને DNA માં રૂપાંતરિત કરવા માટે રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચકને સક્રિય કરવો", "D) હોસ્ટ કોષની પ્રતિરક્ષા વ્યવસ્થાને નિષ્ક્રિય કરવા માટે CD4+ T કોષોને નાશ કરવા"], "correct": 1, "explanation": "'Vpr' પ્રોટીનનું મુખ્ય કાર્ય હોસ્ટ કોષની કોષવિભાજન ચક્રને G2 તબક્કે અટકાવવું છે, જેથી વાયરસ તેના જીનોમને હોસ્ટ કોષના DNA માં એકીકૃત કરી શકે અને પ્રસરણને વેગ મળે. A) વાયરસના જીનોમને કોષકેન્દ્રમાં પ્રવેશ કરાવવો એ 'Vpr' નું કાર્ય નથી, પરંતુ 'MA' (Matrix Protein) અને અન્ય કારકો દ્વારા થાય છે. C) રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચકને સક્રિય કરવું એ 'Tat' પ્રોટીનનું કાર્ય છે. D) CD4+ T કોષોને નાશ કરવો એ HIV નું સામાન્ય કાર્ય છે, પરંતુ 'Vpr' નું સીધું કાર્ય નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 19}, {"question": "HIV સંક્રમણ દ , "ncert_ref": "Class XII - Chapter 8: मानव स्वास्थ्य तथा रोग (મનુષ્ય સ્વાસ્થ્ય અને રોગો)", "difficulty": "Hard", "num": 30}, {"question": "HIV વાયરસ દ્વારા સંક્રમિત વ્યક્તિમાં, 'લેટન્ટ રિઝર્વોયર' તરીકે ઓળખાતા કોષો કયા હોય છે, જેમાં વાયરસ અસક્રિય રહે છે અને પ્રતિરક્ષા વ્યવસ્થાની દવાઓથી પણ નાશ પામતો નથી?", "options": ["A) CD4+ T-લિમ્ફોસાઇટ્સ", "B) મેમરી B-કોષો", "C) મોનોસાઇટ્સ/મેક્રોફેજ", "D) ન્યૂટ્રોફિલ્સ"], "correct": 2, "explanation": "HIV સંક્રમણ દરમિયાન, મોનોસાઇટ્સ અને મેક્રોફેજ જેવા કોષો 'લેટન્ટ રિઝર્વોયર' તરીકે કામ કરે છે, જેમાં વાયરસ અસક્રિય રહે છે અને એન્ટીરેટ્રોવાયરલ દવાઓ (ART) દ્વારા પણ નાશ પામતો નથી. CD4+ T-લિમ્ફોસાઇટ્સ (A) HIV ના મુખ્ય લક્ષ્ય કોષો છે, પરંતુ તેઓ લેટન્ટ રિઝર્વોયર નથી. મેમરી B-કોષો (B) અને ન્યૂટ્રોફિલ્સ (D) HIV સંક્રમણમાં મહત્વની ભૂમિકા ભજવતા નથી.", "ncert_ref": "Class XII - Chapter 8: मानव स्वास्थ्य तथा रोग (માનવ સ્વાસ્થ્ય અને રોગો)", "difficulty": "Hard", "num": 31}, {"question": "HIV વાયરસના જીનોમમાં હાજર 'gag' જીન દ્વારા કોડ થતી પ્રોટીન કયા કામ માટે જવાબદાર છે?", "options": ["A) વાયરલ એન્વેલપની રચના", "B) કેપ્સિડ અને મેટ્રિક્સ પ્રોટીનની રચના", "C) રિવર્સ ટ્રાન્સક્રિપ્ટેઝ ઉત્સેચકની રચના", "D) વાયરસના પ્રવેશ માટેના રિસેપ્ટર બાઇન્ડિંગ"], "correct": 1, "explanation": "'gag' જીન HIV વાયરસના જીનોમમાં હાજર છે અને તે કેપ્સિડ (p24) અને મેટ્રિક્સ (p17) પ્રોટીનની રચના માટે જવાબદાર છે, જે વાયરસના કોર સ્ટ્રક્ચર માટે આવશ્યક છે. વાયરલ એન્વેલપ (A) 'env' જીન દ્વારા કોડ થાય છે. રિવર્સ ટ્રાન્સક્રિપ્ટેઝ (C) 'pol' જીન દ્વારા કોડ થાય છે. રિસેપ્ટર બાઇન્ડિંગ (D) 'gp120' પ્રોટીન દ્વારા થાય છે, જે 'env' જીન દ્વારા કોડ થાય છે.", "ncert_ref": "Class XII - Chapter 8: मानव स्वास्थ्य तथा रोग (માનવ સ્વાસ્થ્ય અને રોગો)", "difficulty": "Hard", "num": 32}, {"question": "એડ્સ રોગના રોગીમાં, કયા પ્રકારના સંક્રમણો 'AIDS-defining illnesses' તરીકે ઓળખાય છે, જે HIV સંક્રમણના અંતિમ તબક્કે (AIDS) દરમિયાન થાય છે?", "options": ["A) ટ્યુબરક્યુલોસિસ, પ્ન્યૂમોનિયા, અને કેપોસી સાર્કોમા", "B) મેલેરિયા, ડેંગ્યુ, અને ટાયફોઈડ", "C) હેપેટાઇટિસ B, હેપેટાઇટિસ C, અને સિફિલિસ", "D) કોલેરા, ડાયરિયા, અને ટેટનસ"], "correct": 0, "explanation": "AIDS-defining illnesses એવા રોગો છે જે HIV સંક્રમણના અંતિમ તબક્કે (AIDS) દરમિયાન થાય છે અને જેની હાજરીથી એડ્સનું નિદાન થાય છે. ટ્યુબરક્યુલોસિસ, પ્ન્યૂમોનિયા (ખાસ કરીને Pneumocystis jirovecii), અને કેપોસી સાર્કોમા (A) એવા રોગો છે. મેલેરિયા, ડેંગ્યુ, અને ટાયફોઈડ (B) HIV સંક્રમણ સાથે સંકળાયેલા નથી. હેપેટાઇટિસ B, હેપેટાઇટિસ C, અને સિફિલિસ (C) પણ AIDS-defining illnesses નથી. કોલેરા, ડાયરિયા, અને ટેટનસ (D) પણ એડ્સ સાથે સંકળાયેલા નથી.", "ncert_ref": "Class XII - Chapter 8: मानव स्वास्थ्य तथा रोग (માનવ સ્વાસ્થ્ય અને રોગો)", "difficulty": "Hard", "num": 33}, {"question": "HIV વાયરસ દ્વારા સંક્રમિત વ્યક્તિમાં, કયા પ્રકારના પ્રતિરક્ષા કોષો પર HIV વાયરસ સીધો હુમલો કરતો નથી, પરંતુ પરોક્ષ રીતે અસર કરે છે?", "options": ["A) CD4+ T-લિમ્ફોસાઇટ્સ", "B) CD8+ T-લિમ્ફોસાઇટ્સ", "C) B-લિમ્ફોસાઇટ્સ", "D) નેચરલ કિલર (NK) કોષો"], "correct": 1, "explanation": "HIV વાયરસ સીધો હુમલો CD4+ T-લિમ્ફોસાઇટ્સ (A) પર કરે છે, જેમાં તે બાઇન્ડ થાય છે અને રિપ્લિકેટ થાય છે. CD8+ T-લિમ્ફોસાઇટ્સ (B) પર HIV સીધો હુમલો કરતો નથી, પરંતુ CD4+ T-કોષોના નાશને કારણે તેમની ક્રિયાશીલતામાં ઘટાડો થાય છે. B-લિમ્ફોસાઇટ્સ (C) અને નેચરલ કિલર (NK) કોષો (D) પર પણ HIV સીધો હુમલો કરતો નથી, પરંતુ તેમની ક્રિયાશીલતા પરોક્ષ રીતે અસર પામે છે.", "ncert_ref": "Class XII - Chapter 8: मानव स्वास्थ्य तथा रोग (માનવ સ્વાસ્થ્ય અને રોગો)", "difficulty": "Hard", "num": 34}, {"question": "એડ્સ (AIDS) ના રોગીમાં, HIV વાયરસ દ્વારા સંક્રમિત CD4+ T-લિમ્ફોસાઇટ્સની સંખ્યામાં ઘટાડો થવાને કારણે નીચેનામાંથી કયું પરિણામ સૌથી ઓછું સંભવિત છે?", "options": ["A) ઓપર્ચ્યુનિસ્ટિક ઇન્ફેક્શન (જેવા કે ટ્યુબરક્યુલોસિસ, પ્ન્યુમોનિયા) ઝડપથી વધે છે", "B) B-કોષો દ્વારા એન્ટીબોડી ઉત્પાદનમાં ઘટાડો થાય છે", "C) મેગાકેરિયોસાઇટ્સની સંખ્યામાં ઘટાડો થાય છે, જે રક્તસ્રાવને અસર કરે છે", "D) સાયટોકાઇન સ્તરમાં અસંતુલન થાય છે, જે ક્રોનિક ઇન્ફ્લેમેશન તરફ દોરી જાય છે"], "correct": 2, "explanation": "HIV વાયરસ મુખ્યત્વે CD4+ T-લિમ્ફોસાઇટ્સને સંક્રમિત કરે છે, જે પ્રતિરક્ષા વ્યવસ્થાના કેળવણી પ્રતિભાવમાં મહત્વની ભૂમિકા ભજવે છે. CD4+ T-કો             let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
