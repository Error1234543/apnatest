<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>

    <script>
        const questionsData = [{"question": "ભ્રૂણકોષમાં અંડકોષના વિકાસ દરમિયાન કયા કોષકેન્દ્રોનું વિલીનીકરણ થાય છે?", "options": ["A) દ્વિતીય કોષકેન્દ્ર અને નર ગેમીટ કોષકેન્દ્ર", "B) પ્રાથમિક કોષકેન્દ્ર અને એન્ટીપોડલ કોષકેન્દ્ર", "C) કેળવણી કોષકેન્દ્ર અને સહાયક કોષકેન્દ્ર", "D) સિનરજીડ કોષકેન્દ્ર અને એગ કોષકેન્દ્ર"], "correct": 0, "explanation": "ભ્રૂણકોષમાં અંડકોષના વિકાસ દરમિયાન દ્વિતીય કોષકેન્દ્ર (secondary nucleus) અને નર ગેમીટ કોષકેન્દ્ર (male gamete nucleus)નું વિલીનીકરણ થાય છે, જે ત્રિપ્લોઇડ એન્ડોસ્પર્મ કોષકેન્દ્રનું નિર્માણ કરે છે. બાકીના વિકલ્પો અયોગ્ય છે કારણ કે પ્રાથમિક કોષકેન્દ્ર તો પહેલેથી જ વિભાજિત થઈ ચૂક્યો હોય છે, એન્ટીપોડલ કોષકેન્દ્ર તૂટી જાય છે, અને સિનરજીડ કોષકેન્દ્ર તો ભ્રૂણકોષમાં જ નહીં હોય.", "ncert_ref": "Class XII - પ્રકરણ 2: જનનમાં મનુષ્ય", "difficulty": "Hard", "num": 1}, {"question": "ભ્રૂણકોષમાં કયા કોષો એન્ટીપોડલ કોષોની સ્થિતિમાં જોવા મળે છે?", "options": ["A) સિનરજીડ કોષો", "B) એગ કોષ અને સહાયક કોષો", "C) કેળવણી કોષો", "D) એન્ટીપોડલ કોષો પોતે જ ભ્રૂણકોષમાં હાજર નથી"], "correct": 3, "explanation": "ભ્રૂણકોષમાં એન્ટીપોડલ કોષો હાજર નથી. તે અંડાશયમાં અંડકોષના વિકાસ દરમિયાન તૂટી જાય છે. સિનરજીડ કોષો ભ્રૂણકોષના છેડે હાજર હોય છે, એગ કોષ અને સહાયક કોષો મધ્યમાં હોય છે, અને કેળવણી કોષો ભ્રૂણકોષના અંતર્ગત ભાગમાં હોય છે.", "ncert_ref": "Class XII - પ્રકરણ 2: જનનમાં મનુષ્ય", "difficulty": "Hard", "num": 2}, {"question": "ભ્રૂણકોષમાં કયા કોષોનો વિકાસ અંડકોષના ફલન પહેલા થાય છે?", "options": ["A) એગ કોષ અને સહાયક કોષો", "B) સિનરજીડ કોષો", "C) કેળવણી કોષો", "D) એન્ટીપોડલ કોષો"], "correct": 1, "explanation": "ભ્રૂણકોષમાં સિનરજીડ કોષોનો વિકાસ અંડકોષના ફલન પહેલા થાય છે. એગ કોષ અને સહાયક કોષો તો ફલન પછી જ સક્રિય થાય છે. કેળવણી કોષો અને એન્ટીપોડલ કોષો તો અંડકોષના વિકાસ દરમિયાન જ તૂટી જાય છે.", "ncert_ref": "Class XII - પ્રકરણ 2: જનનમાં મનુષ્ય", "difficulty": "Hard", "num": 3}, {"question": "ભ્રૂણકોષમાં કયા કોષકેન્દ્રનું વિભાજન થતું નથી?", "options": ["A) એગ કોષકેન્દ્ર", "B) દ્વિતીય કોષકેન્દ્ર", "C) સહાયક કોષકેન્દ્ર", "D) કેળવણી કોષકેન્દ્ર"], "correct": 0, "explanation": "ભ્રૂણકોષમાં એગ કોષકેન્દ્રનું વિભાજન થતું નથી. તે સીધું જ ભ્રૂણના વિકાસમાં ભાગ લે છે. દ્વિતીય કોષકેન્દ્ર તો ફલન પછી વિભાજિત થાય છે, સહાયક કોષકેન્દ્ર અને કેળવણી કોષકેન્દ્ર તો અંડકોષના વિકાસ દરમિયાન જ વિભાજિત થાય છે.", "ncert_ref": "Class XII - પ્રકરણ 2: જનનમાં મનુષ્ય", "difficulty": "Hard", "num": 4}, {"question": "ભ્રૂણકોષમાં કયા કોષોનો ઉદ્દેશ્ય અજ્ઞાત છે?", "options": ["A) સિનરજીડ કોષો", "B) એન્ટીપોડલ કોષો", "C) કેળવણી કોષો", "D) સહાયક કોષો"], "correct": 1, "explanation": "ભ્રૂણકોષમાં એન્ટીપોડલ કોષોનો ઉદ્દેશ્ય અજ્ઞાત છે. તે અંડાશયમાં અંડકોષના વિકાસ દરમિયાન તૂટી જાય છે. સિનરજીડ કોષો ભ્રૂણકોષના છેડે હાજર હોય છે અને ફલન દરમિયાન મહત્વની ભૂમિકા ભજવે છે. કેળવણી કોષો અને સહાયક કોષોનો ઉદ્દેશ્ય જાણીતો છે.", "ncert_ref": "Class XII - પ્રકરણ 2: જનનમાં મનુષ્ય", "difficulty": "Hard", "num": 5}, {"question": "ભ્રૂણકોષના વિકાસ દરમિયાન, નીચેનામાંથી કયો કોષ કેન્દ્રીય કોષ (Central Cell) નું લક્ષણ નથી?", "options": ["A) તે બે ધ્રુવીય કોષકેન્દ્રો (Polar Nuclei) ના સંગલનથી બને છે.", "B) તે સૌથી મોટો કોષ હોય છે અને ભ્રૂણપોષક પેશી (Endosperm) નું નિર્માણ કરે છે.", "C) તે એકલ કોષકેન્દ્ર ધરાવે છે જે ફલન પછી ત્રિપ્લોઈડ બને છે.", "D) તે ભ્રૂણકોષના મધ્ય ભાગમાં સ્થિત હોય છે અને સેકન્ડરી કોષકેન્દ્ર (Secondary Nucleus) તરીકે પણ ઓળખાય છે."], "correct": 2, "explanation": "કેન્દ્રીય કોષ બે ધ્રુવીય કોષકેન્દ્રોના સંગલનથી બને છે (A સत्य), તે સૌથી મોટો કોષ હોય છે અને ભ્રૂણપોષક પેશીનું નિર્માણ કરે છે (B સત્ય), તે ભ્રૂણકોષના મધ્ય ભાગમાં સ્થિત હોય છે અને સેકન્ડરી કોષકેન્દ્ર તરીકે ઓળખાય છે (D સત્ય). પરંતુ તે એકલ કોષકેન્દ્ર ધરાવતો નથી, પરંતુ બે કોષકેન્દ્રો ધરાવે છે જે ફલન પછી ત્રિપ્લોઈડ બને છે, તેથી C ખોટું છે.", "ncert_ref": "Class XII - પ્રકરણ 2: જનન (Reproduction)", "difficulty": "Hard", "num": 6}, {"question": "ભ્રૂણકોષમાં, નીચેનામાંથી કયો કોષ ફલન પછી સીધો જ વિકાસ પામતો નથી, પરંતુ પહેલા વિભાજન પામે છે?", "options": ["A) અંડકોષ (Egg Cell)", "B) સહાયક કોષ (Synergid)", "C) પ્રતિપાદ કોષ (Antipodal Cell)", "D) કેન્દ્રીય કોષ (Central Cell)"], "correct": 3, "explanation": "કેન્દ્રીય કોષ ફલન પછી સ ખ્યા ઘટી છે.", "D) કેન્દ્રીય કોષના બંને કોષકેન્દ્રોનું અપરિપક્વ અવસ્થામાં જ વિલીનીકરણ થવાથી એક કોષ ઓછો જોવા મળે છે."], "correct": 3, "explanation": "સાચો જવાબ વિકલ્પ D છે કારણ કે પરિપક્વ ભ્રૂણકોષમાં સામાન્ય રીતે સાત કોષો હોય છે: એક અંડકોષ, બે સિનરજીડ કોષો, ત્રણ એન્ટીપોડલ કોષો અને એક દ્વિકોષકેન્દ્રીય કેન્દ્રીય કોષ. જો કેન્દ્રીય કોષના બંને કોષકેન્દ્રોનું અપરિપક્વ અવસ્થામાં જ વિલીનીકરણ થઈ જાય, તો કુલ કોષોની સંખ્યા છ થઈ જાય છે, પરંતુ જો એક સિનરજીડ કોષ પણ ગેરહાજર હોય, તો કુલ પાંચ કોષો જોવા મળે છે. વિકલ્પ A ખોટો છે કારણ કે સિનરજીડ કોષોનો અભાવ ભ્રૂણકોષને અપરિપક્વ બનાવે છે, પરંતુ સામાન્ય રીતે તેના કારણે પાંચ કોષો જોવા મળતા નથી. વિકલ્પ B ખોટો છે કારણ કે એન્ટીપોડલ કોષોનું વિલીનીકરણ સામાન્ય રીતે ફલન પછી થાય છે. વિકલ્પ C ખોટો છે કારણ કે અંડકોષ અને સહાયક કોષનું વિલીનીકરણ ભ્રૂણકોષના વિકાસને અટકાવે છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 2: સપુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "difficulty": "Hard", "num": 19}, {"question": "ભ્રૂણકોષમાં, નીચેનામાંથી કયું વિધાન અંડકોષ (Egg Cell) અને સિનરજીડ કોષો વચ્ચેનો તફાવત દર્શાવે છે?", "options": ["A) અંડકોષ હેપ્લોઇડ હોય છે જ્યારે સિનરજીડ કોષો ડિપ્લોઇડ હોય છે.", "B) અંડકોષ ભ્રૂણકોષના અંડકોષના છેડે સ્થિત હોય છે જ્યારે સિનરજીડ કોષો મધ્ય ભાગમાં સ્થિત હોય છે.", "C) અંડકોષ ફલન પછી ભ્રૂણના વિકાસમાં ભાગ લે છે જ્યારે સિનરજીડ કોષો ફલન પહેલા જ નાશ પામે છે.", "D) અંડકોષ અને સિનરજીડ કોષો બંને ફલન પછી એન્ડોસ્પર્મના નિર્માણમાં ભાગ લે છે."], "correct": 2, "explanation": "અંડકોષ (Egg Cell) અને સિનરજીડ કોષો બંને હેપ્લોઇડ (n) હોય છે. અંડકોષ ભ્રૂણકોષના અંડકોષના છેડે સ્થિત હોય છે જ્યારે સિનરજીડ કોષો મધ્ય ભાગમાં સ્થિત હોય છે. અંડકોષ ફલન પછી ભ્રૂણના વિકાસમાં ભાગ લે છે જ્યારે સિનરજીડ કોષો ફલન પહેલા જ નાશ પામે છે. વિકલ્પ A ખોટો છે કારણ કે બંને હેપ્લોઇડ હોય છે. વિકલ્પ D ખોટો છે કારણ કે સિનરજીડ કોષો એન્ડોસ્પર્મના નિર્માણમાં ભાગ લેતા નથી.", "ncert_ref": "Class XII - પ્રકરણ 2: લૈંગિક પ્રજનનમાં વનસ્પતિઓ", "difficulty": "Hard", "num": 20}, {"question": "પરિપક્વ ભ્રૂણકોષમાં, નીચેનામાંથી કયું વિધાન એન્ટીપોડલ કોષો અને સિનરજીડ કોષો બંનેમાં સાચું છે?", "options": ["A) બંને કોષોનો વિ roduction in Flowering Plants)", "difficulty": "Hard", "num": 23}, {"question": "એક પરિપક્વ ભ્રૂણકોષમાં, નીચેનામાંથી કયું વિધાન એન્યુપ્લોઇડી (aneuploidy) ના સંદર્ભમાં સાચું નથી?", "options": ["A) એન્ટીપોડલ કોષો ત્રિકોષકેન્દ્રીય (tri-nucleate) હોવાથી તેઓ ત્રિસૂત્રી (triploid) હોઈ શકે છે.", "B) સિનરજીડ કોષો એકકોષકેન્દ્રીય (mono-nucleate) હોવાથી તેઓ દ્વિસૂત્રી (diploid) હોઈ શકે નહીં.", "C) કેન્દ્રીય કોષ (central cell) બે ધ્રુવીય કોષકેન્દ્રોના વિલીનીકરણથી બને છે, તેથી તે દ્વિસૂત્રી (diploid) હોય છે.", "D) અંડકોષ એકકોષકેન્દ્રીય હોવાથી તે હંમેશા એકસૂત્રી (haploid) જ હોય છે."], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે. સિનરજીડ કોષો એકકોષકેન્દ્રીય હોવા છતાં તેઓ એકસૂત્રી (haploid) હોય છે, કારણ કે તેઓ મેગાસ્પોરના વિભાજનથી બને છે, જે એકસૂત્રી હોય છે. તેથી તેઓ દ્વિસૂત્રી હોઈ શકે નહીં એ વિધાન ખોટું છે.\n\nવિકલ્પ A: એન્ટીપોડલ કોષો ત્રિકોષકેન્દ્રીય હોવાથી તેઓ ત્રિસૂત્રી હોઈ શકે છે, જે સાચું છે.\n\nવિકલ્પ C: કેન્દ્રીય કોષ બે ધ્રુવીય કોષકેન્દ્રોના વિલીનીકરણથી બને છે, તેથી તે દ્વિસૂત્રી હોય છે, જે સાચું છે.\n\nવિકલ્પ D: અંડકોષ એકકોષકેન્દ્રીય અને એકસૂત્રી હોય છે, જે સાચું છે.", "ncert_ref": "કક્ષા 12 - પ્રકરણ 2: પુષ્પી વનસ્પતિઓમાં લિંગી પ્રજનન", "difficulty": "Hard", "num": 24}, {"question": "ભ્રૂણકોષમાં, નીચેનામાંથી કયું વિધાન અંડકોષ (Egg Cell) અને સહાયક કોષો (Synergids) વચ્ચેનો તફાવત સાચો છે?", "options": ["A) અંડકોષ હેપ્લોઇડ હોય છે જ્યારે સહાયક કોષો ડિપ્લોઇડ હોય છે.", "B) અંડકોષ ફલન પછી વિકાસ પામે છે જ્યારે સહાયક કોષો ફલન પહેલા નાશ પામે છે.", "C) અંડકોષમાં એક કોષકેન્દ્ર હોય છે જ્યારે સહાયક કોષોમાં બે કોષકેન્દ્રો હોય છે.", "D) અંડકોષ ફલન દરમિયાન ભાગ લે છે જ્યારે સહાયક કોષો ફલન દરમિયાન નાશ પામે છે."], "correct": 3, "explanation": "અંડકોષ (Egg Cell) અને સહાયક કોષો (Synergids) બંને હેપ્લોઇડ હોય છે (વિકલ્પ A ખોટો). અંડકોષ ફલન દરમિયાન ભાગ લે છે અને ફલન પછી વિકાસ પામે છે, જ્યારે સહાયક કોષો ફલન દરમિયાન નાશ પામે છે (વિકલ્પ D સાચો). વિકલ્પ B ખોટો છે કારણ કે સહાયક કોષો ફલન પહેલા નાશ પામતા નથી. વિકલ્પ C ખોટો છે કારણ કે અંડકોષ અને સહાયક કોષો બંનેમાં એક કોષકેન્દ્ર હોય છે.", "ncert_ref": "Class XII - પ્રકરણ 2: જનનમાં મનુષ્ય", "difficulty": "Hard", "num": 25}, {"question": "પરિપક્વ ભ્રૂણકોષમાં, નીચેનામાંથી કયું વિધાન એન્યુપ્લોઇડી (aneuploidy) ના સંદર્ભમાં સાચું નથી?", "options": ["A) કેન્દ્રીય કોષ ફલન પછી ટ્રિપ્લોઇડ બને છે.", "B) એન્ટીપોડલ કોષો હેપ્લોઇડ હોય છે.", "C) સિનરજીડ કોષો ફલન પછી ડિપ્લોઇડ બને છે.", "D) અંડકોષ હેપ્લોઇડ હોય છે અને ફલન પછી ડિપ્લોઇડ બને છે."], "correct": 2, "explanation": "કેન્દ્રીય કોષ ફલન પછી ટ્રિપ્લોઇડ (3n) બને છે (વિકલ્પ A સાચો). એન્ટીપોડલ કોષો હેપ્લોઇડ (n) હોય છે (વિકલ્પ B સાચો). અંડકોષ હેપ્લોઇડ (n) હોય છે અને ફલન પછી ડિપ્લોઇડ (2n) બને છે (વિકલ્પ D સાચો). સિનરજીડ કોષો ફલન પછી ડિપ્લોઇડ બનતા નથી, તેઓ ફલન પહેલા જ નાશ પામે છે (વિકલ્પ C ખોટો).", "ncert_ref": "Class XII - પ્રકરણ 2: જનનમાં મનુષ્ય", "difficulty": "Hard", "num": 26}, {"question": "પરિપક્વ ભ્રૂણકોષમાં, સિનરજીડ કોષો અને એન્ટીપોડલ કોષો વચ્ચેનો નીચેનામાંથી કયો તફાવત સૌથી યોગ્ય રીતે વર્ણવે છે?", "options": ["A) સિનરજીડ કોષો હંમેશા હાપ્લોઇડ હોય છે જ્યારે એન્ટીપોડલ કોષો ડિપ્લોઇડ હોય છે", "B) સિનરજીડ કોષો અંડકોષની નજીક સ્થિત હોય છે જ્યારે એન્ટીપોડલ કોષો માઇક્રોપાઇલના વિરુદ્ધ છેડે સ્થિત હોય છે", "C) સિનરજીડ કોષો ફલન પછી નાશ પામે છે જ્યારે એન્ટીપોડલ કોષો ફલન પહેલા નાશ પામે છે", "D) સિનરજીડ કોષોનો ઉદ્દેશ્ય સ્પષ્ટ છે જ્યારે એન્ટીપોડલ કોષોનો ઉદ્દેશ્ય અજ્ઞાત છે"], "correct": 1, "explanation": "સિનરજીડ કોષો અંડકોષની નજીક માઇક્રોપાઇલ પાસે સ્થિત હોય છે જ્યારે એન્ટીપોડલ કોષો માઇક્રોપાઇલના વિરુદ્ધ છેડે સ્થિત હોય છે. A ખોટું છે કારણ કે બંને કોષો હાપ્લોઇડ હોય છે. C ખોટું છે કારણ કે એન્ટીપોડલ કોષો ફલન પહેલા નાશ પામે છે, પરંતુ સિનરજીડ કોષો ફલન પછી પણ જીવિત રહે છે. D ખોટું છે કારણ કે એન્ટીપોડલ કોષોનો ઉદ્દેશ્ય પણ અજ્ઞાત છે.", "ncert_ref": "ધોરણ XII - પ્રકરણ 2: જનન (Sexual Reproduction in Flowering Plants)", "difficulty": "Hard", "num": 27}, {"question": "પરિપક્વ ભ્રૂણકોષમાં, એન્ટીપોડલ કોષો અને સિનરજીડ કોષો વચ્ચેનો નીચેનામાંથી કયો તફાવત સૌથી યોગ્ય છે?", "options": ["A) એન્ટીપોડલ કોષો મધ્યમાં સ્થિત હોય છે જ્યારે સિનરજીડ કોષો માઇક્રોપાઇલ પાસે હોય છે", "B) એન્ટીપોડલ કોષોનો કદ સિનરજીડ કોષો કરત                 const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
