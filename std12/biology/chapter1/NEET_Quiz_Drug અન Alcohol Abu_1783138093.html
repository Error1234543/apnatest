    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}

        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}

        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}

        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}

        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}

    <script>
        const questionsData = [{"question": "નીચેનામાંથી કયો પદાર્થ મગજના ડોપામાઇન સ્તરને સીધો જ વધારી શકે છે, જેથી વ્યસનની શક્યતા સૌથી વધુ હોય છે?", "options": ["A) અલ્કોહોલ", "B) કોકેઇન", "C) કેફીન", "D) નિકોટિન"], "correct": 1, "explanation": "કોકેઇન (B) મગજના ડોપામાઇન સ્તરને સીધો જ અને તાત્કાલિક વધારે છે, જે વ્યસન તરફ દોરી જાય છે. અલ્કોહોલ (A) GABA રિસેપ્ટર્સને ઉત્તેજિત કરે છે અને ડોપામાઇનને અપ્રત્યક્ષ રીતે અસર કરે છે. કેફીન (C) એડિનોસિન રિસેપ્ટર્સને અવરોધે છે, પરંતુ ડોપામાઇન પર સીધી અસર કરતું નથી. નિકોટિન (D) એસિટાઇલકોલિન રિસેપ્ટર્સને ઉત્તેજિત કરે છે, જે ડોપામાઇનના સ્તરને અપ્રત્યક્ષ રીતે વધારે છે, પરંતુ કોકેઇન જેટલી તીવ્ર અસર કરતું નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 1}, {"question": "જ્યારે વ્યક્તિ લાંબા સમય સુધી અલ્કોહોલનું સેવન કરે છે, ત્યારે કયું અંગ સૌથી પહેલા ખરાબ થાય છે અને તેનું કારણ શું છે?", "options": ["A) મગજ, કારણ કે અલ્કોહોલ ન્યુરોનને નષ્ટ કરે છે", "B) યકૃત, કારણ કે અલ્કોહોલને ચયાપચય કરવા માટે યકૃતને વધુ મહેનત કરવી પડે છે", "C) હૃદય, કારણ કે અલ્કોહોલ રક્તચાપને ઘટાડે છે", "D) કિડની, કારણ કે અલ્કોહોલ મૂત્રમાં શર્કરાનું સ્તર વધારે છે"], "correct": 1, "explanation": "યકૃત (B) સૌથી પહેલા ખરાબ થાય છે કારણ કે અલ્કોહોલને ચયાપચય કરવા માટે યકૃતમાં ઉત્સેચકો (જેવા કે અલ્કોહોલ ડિહાઇડ્રોજનેઝ) વાપરવામાં આવે છે, જેના કારણે યકૃતમાં ચરબીનું સંગ્રહણ (ફેટી લિવર) થાય છે. મગજ (A) પર અસર થાય છે, પરંતુ તે યકૃત પછી થાય છે. હૃદય (C) પર અલ્કોહોલની અસર લાંબા ગાળાના સેવન પછી જોવા મળે છે. કિડની (D) પર અલ્કોહોલની અસર યકૃત અને મગજ કરતાં ઓછી તીવ્ર હોય છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 2}, {"question": "નીચેનામાંથી કયો પદાર્થ 'ડિપ્રેસન્ટ' ગણાય છે અને તેનું કારણ શું છે?", "options": ["A) કોકેઇન, કારણ કે તે ચેતાતંત્રને ઉત્તેજિત કરે છે", "B) અલ્કોહોલ, કારણ કે તે મગજની ક્રિયાઓને ધીમી પાડે છે", "C) કેફીન, કારણ કે તે થાકને દૂર કરે છે", "D) નિકોટિન, કારણ કે તે હૃદયના ધબકારાને વધારે છે"], "correct": 1, "explanation": "અલ્કોહોલ (B) એક ડિપ્રેસન્ટ છે કારણ કે તે મગજની ક્રિયાઓને ધીમી પાડે છે અને GABA રિસેપ્ટર્સને ઉત્તેજિત કરે છે, જે શાંતિ અને નિષ્ક્રિયતા તરફ દોરી જાય છે. કોકેઇન (A) એક ઉત્તેજક છે. કેફીન (C) પણ ઉત્તેજક છે. નિકોટિન (D) ઉત્તેજક છે અને હૃદયના ધબકારાને વધારે છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 3}, {"question": "નીચેનામાંથી કયો પદાર્થ 'સાયકોટ્રોપિક ડ્રગ' ગણાય છે અને તેનું કારણ શું છે?", "options": ["A) મોર્ફિન, કારણ કે તે દુખાવાને દૂર કરે છે", "B) LSD, કારણ કે તે મગજની સંવેદનાઓને બદલે છે", "C) અલ્કોહોલ, કારણ કે તે નશો કરે છે", "D) નિકોટિન, કારણ કે તે વ્યસન કરે છે"], "correct": 1, "explanation": "LSD (B) એક સાયકોટ્રોપિક ડ્રગ છે કારણ કે તે મગજની સંવેદનાઓ, વિચારો અને મૂડને બદલે છે, જે હેલ્યુસિનેશન તરફ દોરી જાય છે. મોર્ફિન (A) એક ઓપિયોઇડ છે અને દુખાવાને દૂર કરે છે. અલ્કોહોલ (C) એક ડિપ્રેસન્ટ છે. નિકોટિન (D) એક ઉત્તેજક છે અને વ્યસન કરે છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 4}, {"question": "જ્યારે વ્યક્તિ અચાનક અલ્કોહોલનું સેવન બંધ કરે છે, ત્યારે કયા લક્ષણો જોવા મળે છે?", "options": ["A) ઉલટી, મતિ ભ્રમ અને હૃદયના ધબકારામાં વધારો", "B) નિદ્રા વધવી અને શરીરમાં થાક લાગવો", "C) ભૂખ વધવી અને વજનમાં વધારો", "D) ત્વચા પર ચકામા અને ખંજવાળ આવવી"], "correct": 0, "explanation": "અલ્કોહોલનું સેવન અચાનક બંધ કરવાથી 'વિથડ્રોઅલ' લક્ષણો જોવા મળે છે, જેમ કે ઉલટી, મતિ ભ્રમ (ડિલિરિયમ ટ્રેમેન્સ), હૃદયના ધબકારામાં વધારો અને ચિંતા (A). નિદ્રા વધવી (B) અલ્કોહોલના સેવન દરમિયાન જોવા મળે છે. ભૂખ વધવી (C) અને ત્વચા પર ચકામા (D) અલ્કોહોલના સેવન સાથે સીધો સંબંધ ધરાવતું નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 5}, {"question": "જ્યારે વ્યક્તિ કોકેઇનનું સેવન કરે છે, ત્યારે ચેતાતંત્ર પર કયો પ્રભાવ જોવા મળે છે, જેમાં ડોપામાઇનના પુનઃશોષણને અવરોધે છે?", "options": ["A) ડોપામાઇનના સ્તરમાં તાત્કાલિક ઘટાડો થાય છે, જેથી વ્યક્તિ શાંત થાય છે.", "B) ડોપામાઇનના સ્તરમાં વધારો થાય છે, જેથી વ્યક્તિ ઉત્તેજિત અને ઉર્જાવાન અનુભવે છે.", "C) ડોપામાઇનના સ્તરમાં કોઈ ફેરફાર થતો નથી, પરંતુ સેરોટોનિનના સ્તરમાં વધારો થાય છે.", "D) ડોપામાઇનના સ્તરમાં ઘટાડો થાય છે, પરંતુ એડ્રિનાલિનના સ્તરમાં વધારો થાય છે."], "correct": 1, "explanation": "કોકેઇન ડોપામાઇનના પુનઃશોષણને અવરોધે છે, જેથી સિનેપ્ટિક ક્લેફ્ટમાં ડોપામાઇનના સ્તરમાં વધારો થાય છે. આથી વ્યક્તિ ઉત્તેજિત, ઉર્જાવાન અને આનંદિત અનુભવે છે. A ગળતર છે કારણ કે ડોપામાઇનના સ્તરમાં ઘટાડો નથી થતો. C ગળતર છે કારણ કે કોકેઇન સેરોટોનિન પર સીધો પ્રભાવ ધરાવતો નથી. D ગળતર છે કારણ કે એડ્રિનાલિનના સ્તરમાં વધારો કોકેઇનના પ્રભાવનો મુખ્ય લક્ષણ નથી.", "ncert_ref": "Class XII - Chapter 7: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 6}, {"question": "અલ્કોહોલના લાંબા ગાળાના સેવનથી કયું અંગ સૌથી વધુ પ્રભાવિત થાય છે અને તેનું કારણ શું છે?", "options": ["A) યકૃત, કારણ કે અલ્કોહોલ યકૃતમાં ચયાપચય પામે છે અને તેની કોષોને નુકસાન પહોંચાડે છે.", "B) મગજ, કારણ કે અલ્કોહોલ મગજની કોષોને સીધો જ નુકસાન પહોંચાડે છે.", "C) હૃદય, કારણ કે અલ્કોહોલ હૃદયના સ્નાયુઓને નબળા પાડે છે.", "D) કિડની, કારણ કે અલ્કોહોલ કિડનીના કોષોને નુકસાન પહોંચાડે છે અને તેની કાર્યક્ષમતામાં ઘટાડો કરે છે."], "correct": 0, "explanation": "અલ્કોહોલનું લાંબા ગાળાનું સેવન યકૃતને સૌથી વધુ પ્રભાવિત કરે છે, કારણ કે યકૃતમાં અલ્કોહોલનો ચયાપચય થાય છે અને તેની કોષોને નુકસાન પહોંચાડે છે, જેથી યકૃતની કાર્યક્ષમતામાં ઘટાડો થાય છે. B, C, અને D ગળતર છે કારણ કે અલ્કોહોલ મગજ, હૃદય અને કિડનીને પણ નુકસાન પહોંચાડે છે, પરંતુ યકૃત સૌથી વધુ પ્રભાવિત થાય છે.", "ncert_ref": "Class XII - Chapter 7: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 7}, {"question": "નીચેનામાંથી કયો પદાર્થ 'હોલ્યુસિનોજેન' ગણાય છે અને તેનું કારણ શું છે?", "options": ["A) કેફીન, કારણ કે તે મગજને ઉત્તેજિત કરે છે અને જાગૃતિ વધારે છે.", "B) એલએસડી, કારણ કે તે વાસ્તવિકતાને વિકૃત કરે છે અને ભ્રમણા ઉત્પન્ન કરે છે.", "C) નિકોટિન, કારણ કે તે શરીરમાં એડ્રિનાલિનના સ્તરને વધારે છે.", "D) મોર્ફિન, કારણ કે તે દર્દને ઘટાડે છે અને શાંતિ આપે છે."], "correct": 1, "explanation": "એલએસડી (Lysergic Acid Diethylamide) એક હોલ્યુસિનોજેન છે, જે વાસ્તવિકતાને વિકૃત કરે છે અને ભ્રમણા ઉત્પન્ન કરે છે. A ગળતર છે કારણ કે કેફીન એક ઉત્તેજક છે. C ગળતર છ         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
