<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - સ્થાનાંતરિત પ્રાણીઓ (Transgenic Animals)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 સ્થાનાંતરિત પ્રાણીઓ (Transgenic Animals)</span>
                <span>🎯 Hard</span>
                <span>📝 35 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "ટ્રાન્સજેનિક પ્રાણીઓના સર્જનમાં વપરાતી 'માઇક્રોઇન્જેક્શન' પદ્ધતિમાં નીચેનામાંથી કયો પગલો પ્રથમ થાય છે?", "options": ["A) ફર્ટિલાઇઝ્ડ ઇગ (zygote) નું કોષકેન્દ્રમાં જનીનનું ઇન્જેક્શન", "B) સંવર્ધન મીડિયામાં કોષોનું વિકાસ", "C) વર્ણસૂત્રમાં જનીનનું એકીકરણ (integration) ચકાસવું", "D) ટ્રાન્સજેનિક પ્રાણીની પ્રજનન ક્ષમતા ચકાસવી"], "correct": 0, "explanation": "માઇક્રોઇન્જેક્શન પદ્ધતિમાં પ્રથમ પગલો ફર્ટિલાઇઝ્ડ ઇગ (zygote) ના કોષકેન્દ્રમાં જનીનનું ઇન્જેક્શન કરવાનો હોય છે. બાદમાં જ કોષોનું સંવર્ધન, વર્ણસૂત્રમાં એકીકરણ અને પ્રજનન ક્ષમતાની ચકાસણી થાય છે. વિકલ્પ B, C, અને D એ પગલાઓ પછીના તબક્કાઓ છે, પ્રથમ પગલો નહીં.", "ncert_ref": "Class XII - પ્રકરણ 12: જૈવ-તકનીકી અને તેના અનુપ્રયોગો", "difficulty": "Hard", "num": 1}, {"question": "ટ્રાન્સજેનિક ડુંગળી (oncomouse) ની રચના કયા હેતુસર કરવામાં આવી હતી?", "options": ["A) કર્કરોગના અભ્યાસ માટે", "B) ઇન્સ્યુલિન ઉત્પાદન માટે", "C) વૃદ્ધત્વના અભ્યાસ માટે", "D) પ્રતિરક્ષાતંત્રના સુધારા માટે"], "correct": 0, "explanation": "ટ્રાન્સજેનિક ડુંગળી (oncomouse) ની રચના કર્કરોગ (cancer) ના અભ્યાસ માટે કરવામાં આવી હતી, કારણ કે તેના જનીનમાં કર્કરોગ સંબંધિત જનીન (oncogene) નું સંકલન કરવામાં આવ્યું હતું. ઇન્સ્યુલિન ઉત્પાદન (B), વૃદ્ધત્વના અભ્યાસ (C), અને પ્રતિરક્ષાતંત્રના સુધારા (D) એ ટ્રાન્સજેનિક પ્રાણીઓના અન્ય હેતુઓ હોઈ શકે, પરંતુ oncomouse નો હેતુ કર્કરોગનો અભ્યાસ હતો.", "ncert_ref": "Class XII - પ્રકરણ 12: જૈવ-તકનીકી અને તેના અનુપ્રયોગો", "difficulty": "Hard", "num": 2}, {"question": "ટ્રાન્સજેનિક પ્રાણીઓમાં જનીનનું સ્થાનાંતરણ કરતી વખતે નીચેનામાંથી કયો ઉત્સેચક વપરાતો નથી?", "options": ["A) રેસ્ટ્રિક્શન એન્ડોન્યુક્લિએઝ", "B) DNA લાઇગેઝ", "C) DNA પોલિમરેઝ", "D) રિવર્સ ટ્રાન્સક્રિપ્ટેઝ"], "correct": 2, "explanation": "ટ્રાન્સજેનિક પ્રાણીઓમાં જનીનનું સ્થાનાંતરણ કરતી વખતે રેસ્ટ્રિક્શન એન્ડોન્યુક્લિએઝ (A), DNA લાઇગેઝ (B), અને રિવર્સ ટ્રાન્સક્રિપ્ટેઝ (D) વપરાતા ઉત્સેચકો છે. DNA પોલિમરેઝ (C) એ DNA ની નકલ કરવા માટે વપરાતો ઉત્સેચક છે, પરંતુ જનીન સ્થાનાંતરણ પ્રક્રિયામાં તે વપરાતો નથી.", "ncert_ref": "Class XII - પ્રકરણ 11: જૈવ-તકનીકી: સિદ્ધાંતો અને પ્રક્રિયાઓ", "difficulty": "Hard", "num": 3}, {"question": "ટ્રાન્સજેનિક પ્રાણીઓના ઉત્પાદનમાં 'જીન ગન' (gene gun) પદ્ધતિનો ઉપયોગ કયા પ્રકારના કોષો માટે થાય છે?", "options": ["A) પ્રાણી કોષો", "B) વનસ્પતિ કોષો", "C) બેક્ટેરિયા કોષો", "D) યીસ્ટ કોષો"], "correct": 0, "explanation": "'જીન ગન' (gene gun) પદ્ધતિનો ઉપયોગ મુખ્યત્વે પ્રાણી કોષો (A) અને વનસ્પતિ કોષો (B) માટે થાય છે, પરંતુ ટ્રાન્સજેનિક પ્રાણીઓના સંદર્ભમાં તે પ્રાણી કોષો માટે વપરાય છે. બેક્ટેરિયા (C) અને યીસ્ટ (D) કોષો માટે આ પદ્ધતિ વપરાતી નથી.", "ncert_ref": "Class XII - પ્રકરણ 12: જૈવ-તકનીકી અને તેના અનુપ્રયોગો", "difficulty": "Hard", "num": 4}, {"question": "ટ્રાન્સજેનિક પ્રાણીઓમાં જનીનનું સ્થાનાંતરણ કર્યા બાદ નીચેનામાંથી કયો પરીક્ષણ પગલો સૌથી અગત્યનો છે?", "options": ["A) પ્રોટીનની હાજરી ચકાસવી", "B) જનીનની હાજરી ચકાસવી", "C) પ્રાણીની પ્રજનન ક્ષમતા ચકાસવી", "D) પ્રાણીના વર્તનમાં ફેરફાર ચકાસવો"], "correct": 1, "explanation": "ટ્રાન્સજેનિક પ્રાણીઓમાં જનીનનું સ્થાનાંતરણ કર્યા બાદ સૌથી અગત્યનો પરીક્ષણ પગલો જનીનની હાજરી ચકાસવી (B) છે. પ્રોટીનની હાજરી (A), પ્રજનન ક્ષમતા (C), અને વર્તનમાં ફેરફાર (D) એ પછીના તબક્કાઓ છે, પરંતુ પ્રથમ જનીનની હાજરી ચકાસવી જરૂરી છે.", "ncert_ref": "Class XII - પ્રકરણ 12: જૈવ-તકનીકી અને તેના અનુપ્રયોગો", "difficulty": "Hard", "num": 5}, {"question": "ટ્રાન્સજેનિક પ્રાણીઓના ઉત્પાદનમાં 'ક્રિઓપ્રિઝરવેશન' પદ્ધતિનો ઉપયોગ કયા હેતુસર થાય છે?", "options": ["A) ટ્રાન્સજેનિક કોષોને લાંબા સમય સુધી જીવંત રાખવા માટે", "B) જનીન સ્થાનાંતરણ દરમિયાન DNA ને કોષકેન્દ્રમાં પ્રવેશ કરાવવા માટે", "C) ટ્રાન્સજેનિક પ્રાણીના વંશજોની અનુવંશિક સ્થિરતા તપાસવા માટે", "D) ઉત્સેચકની ક્રિયાશીલતા વધારવા માટે"], "correct": 0, "explanation": "ક્રિઓપ્રિઝરવેશનનો ઉપયોગ ટ્રાન્સજેનિક કોષો અથવા ભ્રૂણોને અતિ નીચા તાપમાને સંગ્રહીને લાંબા સમય સુધી જીવંત રાખવા માટે થાય છે. બાકીના વિકલ્પો અસંગત છે: B) જનીન સ્થાનાંતરણ માટે માઇક્રોઇન્જેક્શન અથવા વાયરલ વેક્ટર જેવી પદ્ધતિઓ વપરાય છે, C) વંશજોની અનુવંશિક સ્થિરતા તપાસવા PCR અથવા સિક્વન્સિંગ જેવી પદ્ધતિઓ વપરાય છે, D) ઉત્સેચકની ક્રિયાશીલતા વધારવા માટે ઓપ મિયાન", "C) DNA ની પ્રતિકૃતિ દરમિયાન ઉર્જા ઉત્પન્ન કરવા માટે", "D) કોષના ઉત્સર્જન તંત્રને નિયંત્રિત કરવા માટે"], "correct": 0, "explanation": "યુકેરિયોટિક જનીનોમાં ઇન્ટ્રોન હાજર હોય છે, જે mRNA પ્રોસેસિંગ દરમિયાન કાપીને શુદ્ધ mRNA બનાવવામાં આવે છે. ટ્રાન્સજેનિક પ્રાણીઓમાં યુકેરિયોટિક જનીનના સફળ અભિવ્યક્તિ માટે ઇન્ટ્રોનની હાજરી અગત્યની છે. B) પ્રોકેરિયોટિક જનીનોમાં ઇન્ટ્રોન હાજર નથી, C) DNA પ્રતિકૃતિ દરમિયાન ઉર્જા ATP દ્વારા પૂરી પાડવામાં આવે છે, D) ઉત્સર્જન તંત્ર જનીન દ્વારા નહીં પરંતુ શારીરિક ક્રિયાવિધિઓ દ્વારા નિયંત્રિત થાય છે.", "ncert_ref": "Class XII - પ્રકરણ 6: અનુવંશિકતા અને વિકાસ (Heredity and Evolution)", "difficulty": "Hard", "num": 9}, {"question": "ટ્રાન્સજેનિક પ્રાણીઓમાં 'ઝાયગોટ માઇક્રોઇન્જેક્શન' પદ્ધતિનો ઉપયોગ કરતી વખતે નીચેનામાંથી કયો પરિબળ સફળતાનો દર ઘટાડી શકે છે?", "options": ["A) ફર્ટિલાઇઝ્ડ અંડકોષની સ્થિતિસ્થાપકતા", "B) સ્થાનાંતરિત જનીનની લંબાઈ", "C) કોષરસના pH નું સ્તર", "D) પ્રાણીના લિંગની પસંદગી"], "correct": 1, "explanation": "ઝાયગોટ માઇક્રોઇન્જેક્શન દરમિયાન સ્થાનાંતરિત જનીનની લંબાઈ મહત્વનો પરિબળ છે. લાંબા જનીનના સ્થાનાંતરણનો દર ઓછો હોય છે, કારણ કે તે કોષકેન્દ્રમાં પ્રવેશ કરવામાં અડચણ ઉભી કરે છે. A) ફર્ટિલાઇઝ્ડ અંડકોષની સ્થિતિસ્થાપકતા સફળતાનો દર વધારે છે, C) કોષરસના pH નું સ્તર ઓપ્ટિમાઇઝ્ડ હોવું જરૂરી છે, પરંતુ તે સીધો અસર કરતું નથી, D) પ્રાણીના લિંગની પસંદગી સ્થાનાંતરણના દર પર અસર કરતી નથી.", "ncert_ref": "Class XII - પ્રકરણ 12: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 10}, {"question": "ટ્રાન્સજેનિક પ્રાણીઓના સર્જન દરમિયાન, 'હોમોલોજસ રિકોમ્બિનેશન' પદ્ધતિમાં નીચેનામાંથી કયો જનીન સૌથી વધુ કાર્યક્ષમ રીતે સ્થાનાંતરિત થાય છે?", "options": ["A) જનીન જેની આસપાસ લાંબી હોમોલોજસ ક્રમવારતા ધરાવે છે", "B) જનીન જેની આસપાસ ટૂંકી હોમોલોજસ ક્રમવારતા ધરાવે છે", "C) જનીન જેની આસપાસ કોઈ હોમોલોજસ ક્રમવારતા નથી", "D) જનીન જે સંપૂર્ણપણે હેટરોલોજસ ક્રમવારતા ધરાવે છે"], "correct": 0, "explanation": "હોમોલોજસ રિકોમ્બિનેશન પદ્ધતિમાં, જનીનનું સ્થાનાંતરણ ત્યારે સૌથી કાર્યક્ષમ થાય છે જ્યારે તેની આસપાસ લાંબી હોમોલોજસ ક્રમવારતા (homologous sequence) હોય છે, કારણ કે તે રિકોમ્બિનેશનની પ્રક્રિયાને સરળ બનાવે છે. ટૂંકી હોમોલોજસ ક્રમવારતા (B) ઓછી કાર્યક્ષમ હોય છે, જ્યારે કોઈ હોમોલોજસ ક્રમવારતા (C) અથવા હેટરોલોજસ ક્રમવારતા (D) રિકોમ્બિનેશનની શક્યતા ઘટાડે છે.", "ncert_ref": "Class XII - પ્રકરણ 12: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 11}, {"question": "ટ્રાન્સજેનિક પ્રાણીઓમાં 'કન્ડિશનલ જનીન નોકઆઉટ' (conditional gene knockout) પદ્ધતિમાં નીચેનામાંથી કયો તત્વ સૌથી અગત્યનો છે?", "options": ["A) ક્રિપર (Cre) ઉત્સેચક અને લોક્સપી (loxP) ક્રમ", "B) રેસ્ટ્રિક્શન એન્ડોન્યુક્લિએઝ અને લિગેઝ", "A) પોલિમરેઝ ચેઇન રિએક્શન (PCR) અને જેલ ઇલેક્ટ્રોફોરેસિસ", "D) ટ્રાન્સપોઝેઝ અને પ્લાસ્મિડ"], "correct": 0, "explanation": "કન્ડિશનલ જનીન નોકઆઉટ પદ્ધતિમાં, ક્રિપર (Cre) ઉત્સેચક અને લોક્સપી (loxP) ક્રમનો ઉપયોગ કરવામાં આવે છે, કારણ કે ક્રિપર ઉત્સેચક લોક્સપી ક્રમને ઓળખીને જનીનને કાપી શકે છે, જેનાથી જનીનને નિષ્ક્રિય કરવા માટે વપરાય છે. રેસ્ટ્રિક્શન એન્ડોન્યુક્લિએઝ અને લિગેઝ (B) જનીન ક્લોનિંગમાં વપરાય છે, જ્યારે PCR અને જેલ ઇલેક્ટ્રોફોરેસિસ (A) જનીનના વિશ્લેષણમાં વપરાય છે. ટ્રાન્સપોઝેઝ અને પ્લાસ્મિડ (D) જનીન સ્થાનાંતરણમાં વપરાય છે.", "ncert_ref": "Class XII - પ્રકરણ 12: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 12}, {"question": "ટ્રાન્સજેનિક પ્રાણીઓમાં 'જનીન ડોઝ ઇફેક્ટ' (gene dosage effect) નો અભ્યાસ કરવા માટે નીચેનામાંથી કયો પ્રયોગ સૌથી યોગ્ય છે?", "options": ["A) એક જ જનીનની બહુવિધ કૉપીનું સ્થાનાંતરણ કરવું", "B) એક જ જનીનની એક કૉપીનું સ્થાનાંતરણ કરવું", "C) વિવિધ જનીનની એક કૉપીનું સ્થાનાંતરણ કરવું", "D) જનીનને સંપૂર્ણપણે નોકઆઉટ કરવું"], "correct": 0, "explanation": "જનીન ડોઝ ઇફેક્ટનો અભ્યાસ કરવા માટે, એક જ જનીનની બહુવિધ કૉપીનું સ્થાનાંતરણ કરવું (A) સૌથી યોગ્ય છે, કારણ કે તે જનીનની સાંદ્રતાને બદલી શકે છે અને તેના પરિણામોનો અભ્યાસ કરવા માટે મદદરૂપ થાય છે. એક જ જનીનની એક કૉપી (B) અથવા વિવિધ જનીનની એક કૉપી (C) જનીન ડોઝ ઇફેક્ટને દર્શાવતી નથી. જનીનને સંપૂર્ણપણે નોકઆઉટ કરવું (D) જનીનની ગેરહાજરીના પરિણામોનો અભ્યાસ કરવા માટે વપરાય છે.", "ncert_ref": "Class XII - પ્રકરણ 12: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 13}, {"question": "ટ્રાન્સજેનિક પ્રાણીઓમાં 'ટિસ્યુ-સ્પેસિફિક એક્સપ્રેશન' (tissue-specific expression) ની ખાતરી કરવા માટે નીચેનામાંથી કયો પ્રમોટર સૌથી યોગ્ય છે?", "options": ["A) સાયટોમેગાલોવાયરસ (CMV) પ્રમોટર", "B) બીટા-એક્ટિન પ્રમોટર", "C) માયોજેનિન પ્રમોટર", "D) T7 પ્રમોટર"], "correct": 2, "explanation": "ટિસ્યુ-સ્પેસિફિક એક્સપ્રેશન માટે, માયોજેનિન પ્રમોટર (C) સૌથી યોગ્ય છે, કારણ કે તે સ્નાયુ પેશીઓમાં જનીનના અભિવ્યક્તિને નિયંત્રિત કરે છે. સાયટોમેગાલોવાયરસ (CMV) પ્રમોટર (A) અને બીટા-એક્ટિન પ્રમોટર (B) સાર્વત્રિક પ્રમોટર છે જે બધી પેશીઓમાં જનીનના અભિવ્યક્તિને પ્રેરિત કરે છે. T7 પ્રમોટર (D) બેક્ટેરિયામાં વપરાય છે અને સસ્તન પ્રાણીઓમાં કાર્યક્ષમ નથી.", "ncert_ref": "Class XII - પ્રકરણ 12: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 14}, {"question": "ટ્રાન્સજેનિક પ્રાણીઓમાં 'જનીન સાયલન્સિંગ' (gene silencing) ની પ્રક્રિયામાં નીચેનામાંથી કયો તત્વ સૌથી અગત્યનો ભૂમિકા ભજવે છે?", "options": ["A) માઇક્રોRNA (miRNA)", "B) રાઇબોઝોમલ RNA (rRNA)", "C) મેસેન્જર RNA (mRNA)", "D) ટ્રાન્સફર RNA (tRNA)"], "correct": 0, "explanation": "જનીન સાયલન્સિંગમાં, માઇક્રોRNA (miRNA) (A) સૌથી અગત્યનો ભૂમિકા ભજવે છે, કારણ કે તે mRNA ને બંધન કરે છે અને તેના અનુવાદને અટકાવે છે, જેનાથી જનીનનું અભિવ્યક્તિ ઘટે છે. રાઇબોઝોમલ RNA (rRNA) (B) પ્રોટીન સંશ્લેષણમાં, મેસેન્જર RNA (mRNA) (C) જનીનના અનુવાદમાં, અને ટ્રાન્સફર RNA (tRNA) (D) અમીનો એસિડના વહનમાં ભૂમિકા ભજવે છે.", "ncert_ref": "Class XII - પ્રકરણ 12: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 15}, {"question": "ટ્રાન્સજેનિક પ્રાણીઓના સર્જન દરમિયાન, 'ટેટ્રાસાયક્લિન-કંટ્રોલ્ડ ટ્રાન્સજેનિક સિસ્ટમ'નો ઉપયોગ કયા હેતુસર થાય છે?", "options": ["A) જનીનના અભિવ્યક્તિને સ્થાયી રીતે રોકવા", "B) જનીનના અભિવ્યક્તિને ઔષધીય રીતે નિયંત્રિત કરવા", "C) જનીનના સ્થાનાંતરણને સરળ બનાવવા", "D) પ્રાણીના ચેતાતંત્રને સુધારવા"], "correct": 1, "explanation": "ટેટ્રાસાયક્લિન-કંટ્રોલ્ડ ટ્રાન્સજેનિક સિસ્ટમનો ઉપયોગ જનીનના અભિવ્યક્તિને ઔષધીય રીતે નિયંત્રિત કરવા માટે થાય છે. આ સિસ્ટમમાં ટેટ્રાસાયક્લિન અથવા તેના ડેરિવેટિવ્સ જેવા કે ડોક્સીસાયક્લિનનો ીનના સંશ્લેષણને વધારવા માટે", "C) કોષના વિભાજનને નિયંત્રિત કરવા માટે", "D) હોર્મોનની ઉત્પત્તિને નિયંત્રિત કરવા માટે"], "correct": 0, "explanation": "BAC (Bacterial Artificial Chromosome) નો ઉપયોગ લાંબા DNA ખંડોને ક્લોન કરવા માટે થાય છે, જેથી મોટા જનીન અથવા જનીન ક્લસ્ટરને ટ્રાન્સજેનિક પ્રાણીઓમાં સ્થાનાંતરિત કરવા સરળ બને. બ) ગલત છે કારણ કે BAC પ્રોટીનના સંશ્લેષણને વધારતું નથી. સ) ગલત છે કારણ કે BAC કોષના વિભાજનને નિયંત્રિત કરતું નથી. ડ) ગલત છે કારણ કે BAC હોર્મોનની ઉત્પત્તિને નિયંત્રિત કરતું નથી.", "ncert_ref": "Class XII - Chapter 12: જૈવ-તકનીકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 19}, {"question": "ટ્રાન્સજેનિક પ્રાણીઓમાં 'ZFN (Zinc Finger Nuclease)' તકનીકનો ઉપયોગ કયા હેતુસર થાય છે?", "options": ["A) જનીનને સંપાદિત કરવા માટે", "B) જનીનને સ્થાનાંતરિત કરવા માટે", "C) પ્રોટીનને શુદ્ધ કરવા માટે", "D) DNA ની પ્રતિકૃતિ કરવા માટે"], "correct": 0, "explanation": "ZFN (Zinc Finger Nuclease) તકનીકનો ઉપયોગ જનીનને સંપાદિત કરવા માટે થાય છે, જેથી વિશિષ્ટ DNA ક્રમને કાપીને અથવા બદલીને જનીનમાં ફેરફાર કરવા સરળ બને. બ) ગલત છે કારણ કે ZFN જનીનને સ્થાનાંતરિત કરતું નથી, પરંતુ સંપાદિત કરે છે. સ) ગલત છે કારણ કે ZFN પ્રોટીનને શુદ્ધ કરતું નથી. ડ) ગલત છે કારણ કે ZFN DNA ની પ્રતિકૃતિ કરતું નથી.", "ncert_ref": "Class XII - Chapter 12: જૈવ-તકનીકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 20}, {"question": "ટ્રાન્સજેનિક પ્રાણીઓના સર્જન દરમિયાન, 'ક્રિપર-લોક્સપી' (Cre-loxP) સિસ્ટમનો ઉપયોગ કરતી વખતે, નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) લોક્સપી (loxP) સાઇટ્સ વચ્ચેના DNA ખંડને ક્રિપર ઉત્સેચક કાપી નાખે છે, પરંતુ તેને જોડતું નથી.", "B) ક્રિપર ઉત્સેચક લોક્સપી (loxP) સાઇટ્સની હાજરીમાં જનીનને ઉમેરી શકે છે, પરંતુ કાઢી શકતું નથી.", "C) ક્રિપર-લોક્સપી સિસ્ટમનો ઉપયોગ ફક્ત પ્રોકેરિયોટિક કોષોમાં જ થઈ શકે છે.", "D) ક્રિપર ઉત્સેચક લોક્સપી (loxP) સાઇટ્સની મદદથી સ્થાન-વિશિષ્ટ જનીન નોકઆઉટ (knockout) કરવા માટે વપરાય છે."], "correct": 3, "explanation": "ક્રિપર-લોક્સપી સિસ્ટમનો ઉપયોગ સ્થાન-વિશિષ્ટ જનીન નોકઆઉટ કરવા માટે થાય છે. ક્રિપર ઉત્સેચક લોક્સપી (loxP) સાઇટ્સને ઓળખીને તે વચ્ચેના DNA ખં સમાં DNA સરળતાથી એકીકૃત થઈ શકે છે. 'ઝાયગોટ માઇક્રોઇન્જેક્શન' પદ્ધતિ અહીં અયોગ્ય છે, કારણ કે મેંડકના ઝાયગોટમાં કોષકેન્દ્રનું કદ અને સંરચના ઇન્જેક્શન માટે અનુકૂળ નથી. વિકલ્પ A અને B અંશતઃ સત્ય છે, પરંતુ પ્રોન્યુક્લિયર ઇન્જેક્શન એ સૌથી યોગ્ય પદ્ધતિ છે. વિકલ્પ D બ્લાસ્ટ્યુલા અવસ્થામાં જનીન સ્થાનાંતરણનો ઉલ્લેખ કરે છે, જે મેંડક માટે પ્રાથમિક પસંદગી નથી.", "ncert_ref": "Class XII - Chapter 12: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 25}, {"question": "ટ્રાન્સજેનિક પ્રાણીઓમાં 'ટિસ્યુ-સ્પેસિફિક પ્રમોટર' નો ઉપયોગ કરતી વખતે, નીચેનામાંથી કયો પ્રમોટર મગજના કોષોમાં જનીન અભિવ્યક્તિ માટે વપરાય છે?", "options": ["A) GFAP પ્રમોટર", "B) માયોજેનિન પ્રમોટર", "C) અલ્બ્યુમિન પ્રમોટર", "D) ઇન્સ્યુલિન પ્રમોટર"], "correct": 0, "explanation": "GFAP (Glial Fibrillary Acidic Protein) પ્રમોટર મગજના ગ્લાયલ કોષોમાં જનીન અભિવ્યક્તિ માટે વપરાય છે. માયોજેનિન પ્રમોટર સ્નાયુ કોષોમાં, અલ્બ્યુમિન પ્રમોટર યકૃતમાં, અને ઇન્સ્યુલિન પ્રમોટર અગ્નાશયમાં વપરાય છે. આમ, સૌથી યોગ્ય ઉત્તર GFAP પ્રમોટર છે.", "ncert_ref": "Class XII - Chapter 12: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 26}, {"question": "ટ્રાન્સજેનિક પ્રાણીઓમાં 'કન્ડિશનલ જનીન નોકઆઉટ' પદ્ધતિમાં, નીચેનામાંથી કયો તત્વ જનીન નોકઆઉટને નિયંત્રિત કરવા માટે વપરાય છે?", "options": ["A) ટેટ્રાસાયક્લિન", "B) ડોક્સીસાયક્લિન", "C) ક્રિપર ઉત્સેચક", "D) લોક્સપી (loxP) સાઇટ્સ"], "correct": 2, "explanation": "કન્ડિશનલ જનીન નોકઆઉટ પદ્ધતિમાં, ક્રિપર ઉત્સેચક જનીન નોકઆઉટને નિયંત્રિત કરવા માટે વપરાય છે. ટેટ્રાસાયક્લિન અને ડોક્સીસાયક્લિન ટેટ્રાસાયક્લિન-નિયંત્રિત સિસ્ટમમાં વપરાય છે, જ્યારે લોક્સપી (loxP) સાઇટ્સ ક્રિપર-લોક્સપી સિસ્ટમનો ભાગ છે. આમ, સૌથી યોગ્ય ઉત્તર ક્રિપર ઉત્સેચક છે.", "ncert_ref": "Class XII - Chapter 12: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 27}, {"question": "ટ્રાન્સજેનિક પ્રાણીઓમાં 'જનીન ડોઝ ઇફેક્ટ' નો અભ્યાસ કરવા માટે, નીચેનામાંથી કયો પ્રયોગશાળા પ્રાણી સૌથી વધુ વપરાય છે?", "options": ["A) મેંડક (Xenopus)", "B) મચ્છર (Drosophila)", "C) ઉંદર (Mouse)", "D) ઝીંગા (Zebrafish)"], "correct": 2, "explanation": "જનીન ડોઝ ઇફેક્ટનો અભ્યાસ કરવા માટે ઉંદર (Mouse) સૌથી વધુ વપરાય છે, કારણ કે તે સસ્તન પ્રાણી હોવાથી મનુષ્ય સાથે જનીનિક સમાનતા ધરાવે છે. મેંડક, મચ્છર, અને ઝીંગા પણ ટ્રાન્સજેનિક અભ્યાસમાં વપરાય છે, પરંતુ જનીન ડોઝ ઇફેક્ટ માટે ઉંદર સૌથી યોગ્ય છે.", "ncert_ref": "Class XII - Chapter 12: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 28}, {"question": "ટ્રાન્સજેનિક પ્રાણીઓમાં, જો એક જનીનને મેળવવા માટે બેક્ટરિયલ આર્ટિફિશિયલ ક્રોમોઝોમ (BAC) નો ઉપયોગ કરવામાં આવે, તો નીચેનામાંથી કયો પરિબળ BAC ની પસંદગી માટે નિર્ણાયક છે?", "options": ["A) BAC માં ક્લોનિંગ સાઇટની સંખ્યા", "B) BAC માં ઇન્સર્ટ કરેલા DNA નો આકાર", "C) BAC ની પ્રતિકૃતિ (replication) ની ક્ષમતા", "D) BAC માં એન્ટિબાયોટિક પ્રતિરોધક જનીનની હાજરી"], "correct": 2, "explanation": "BAC (Bacterial Artificial Chromosome) ની પસંદગી માટે સૌથી મહત્વનો પરિબળ તેની પ્રતિકૃતિ (replication) ની ક્ષમતા છે, કારણ કે તે મોટા DNA ફ્રેગમેન્ટ્સને સ્થિર રીતે ક્લોન કરવા સક્ષમ હોવો જોઈએ. વિકલ્પ A (ક્લોનિંગ સાઇટની સંખ્યા) અગત્યનો છે પરંતુ નિર્ણાયક નથી. વિકલ્પ B (DNA નો આકાર) મહત્વનો નથી કારણ કે BAC મોટા DNA ફ્રેગમેન્ટ્સને સહન કરે છે. વિકલ્પ D (એન્ટિબાયોટિક પ્રતિરોધક જનીન) સેલેક્શન માટે ઉપયોગી છે પરંતુ BAC ની મૂળભૂત ક્ષમતા માટે નહીં.", "ncert_ref": "Class XII - Chapter 12: જૈવ-તકનીકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 29}, {"question": "સ્થાનાંતરિત પ્રાણીઓના સર્જન દરમિયાન, 'ક્રિપર-લોક્સપી' (Cre-loxP) સિસ્ટમનો ઉપયોગ કરતી વખતે, જો લોક્સપી (loxP) સાઇટ્સ વચ્ચેનો જનીન ભાગ કાઢી નાખવામાં આવે તો તેને કયા પ્રકારનું જનીન નોકઆઉટ કહેવાય છે?", "options": ["A) કન્ડિશનલ જનીન નોકઆઉટ", "B) ટિશ્યુ-સ્પેસિફિક જનીન નોકઆઉટ", "C) ઇન્ડ્યુસિબલ જનીન નોકઆઉટ", "D) કોન્સ્ટિટ્યુટિવ જનીન નોકઆઉટ"], "correct": 0, "explanation": "ક્રિપર-લોક્સપી સિસ્ટમમાં, લોક્સપી (loxP) સાઇટ્સ વચ્ચેનો જનીન ભાગ કાઢી નાખવા માટે ક્રિપર ઉત્સેચકનો ઉપયોગ થાય છે. આ પ્રક્રિયા દ્વારા જનીનને નિશ્ચિત પરિસ્થિતિઓ હેઠળ (જેવી કે કોષ પ્રકાર અથવા વિકાસના ચોક્કસ તબક્કે) નિષ્ક્રિય કરવામાં આવે છે, જેને **કન્ડિશનલ જનીન નોકઆઉટ** કહેવાય છે. ટિશ્યુ-સ્પેસિફિક નોકઆઉટ (B) એ ટિશ્યુ-વિશિષ્ટ પ્રમોટરના         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
