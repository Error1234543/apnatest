<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - પર્યાવરણીય ઉત્તરાધિકાર</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 પર્યાવરણીય ઉત્તરાધિકાર</span>
                <span>🎯 Hard</span>
                <span>📝 32 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "પર્યાવરણીય ઉત્તરાધિકારમાં, જ્યારે એક જાતિની વસતિ લાંબા સમય સુધી સ્થિર પર્યાવરણમાં રહે છે, ત્યારે નીચેનામાંથી કયું પરિવર્તન સૌથી ઓછું શક્ય છે?", "options": ["A) જનીન વૈવિધ્યમાં ઘટાડો થવો", "B) પ્રતિકૂળ જનીનોનો ઉત્ક્રમણ દર વધવો", "C) સ્થાનિક અનુકૂલન માટે લાભદાયી જનીનોનો પ્રસર વધવો", "D) વસતિમાં હેટેરોઝાયગસિટીનો દર ઘટવો"], "correct": 2, "explanation": "સ્થિર પર્યાવરણમાં, પ્રતિકૂળ જનીનોનો ઉત્ક્રમણ દર ઘટે છે (અથવા સ્થિર રહે છે), જનીન વૈવિધ્ય ઘટે છે, અને હેટેરોઝાયગસિટી ઘટે છે. પરંતુ સ્થાનિક અનુકૂલન માટે લાભદાયી જનીનોનો પ્રસર વધવો એ પર્યાવરણીય ઉત્તરાધિકારનો મુખ્ય લક્ષણ છે, જેથી તે સૌથી વધુ શક્ય છે. બાકીના ત્રણેય પરિવર્તનો સ્થિર પર્યાવરણમાં થઈ શકે છે, પરંતુ લાભદાયી જનીનોનો પ્રસર વધવો એ સૌથી ઓછું શક્ય નથી, ઉલટાનું તે સૌથી વધુ અપેક્ષિત છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 1}, {"question": "નીચેનામાંથી કયું કથન પર્યાવરણીય ઉત્તરાધિકારના સિદ્ધાંત સાથે સંપૂર્ણ સુસંગત નથી?", "options": ["A) વસતિના જનીન પૂલમાં થતાં ફેરફારો પર્યાવરણીય દબાણના કારણે થાય છે", "B) ઉત્તરાધિકાર દરમિયાન, વસતિના સભ્યો વચ્ચે જનીન વૈવિધ્ય ઘટે છે", "C) પર્યાવરણીય ઉત્તરાધિકારમાં, પ્રતિકૂળ જનીનોનો ઉત્ક્રમણ દર વધે છે", "D) લાંબા ગાળાના ઉત્તરાધિકારથી નવી જાતિઓની ઉત્પત્તિ થઈ શકે છે"], "correct": 2, "explanation": "પર્યાવરણીય ઉત્તરાધિકારમાં, પ્રતિકૂળ જનીનોનો ઉત્ક્રમણ દર ઘટે છે, કારણ કે પ્રતિકૂળ જનીન ધરાવતા વ્યક્તિઓનું અસ્તિત્વ ટકી શકતું નથી. બાકીના ત્રણેય કથનો સિદ્ધાંત સાથે સુસંગત છે: જનીન પૂલમાં ફેરફાર પર્યાવરણીય દબાણના કારણે થાય છે, જનીન વૈવિધ્ય ઘટે છે, અને લાંબા ગાળાના ઉત્તરાધિકારથી નવી જાતિઓ ઉત્પન્ન થઈ શકે છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 2}, {"question": "એક વસતિ પર્યાવરણીય ઉત્તરાધિકાર અનુભવી રહી છે. નીચેનામાંથી કયું પરિણામ આ પ્રક્રિયાના સીધા પરિણામ રૂપે ગણી શકાય નહીં?", "options": ["A) વસતિમાં હોમોઝાયગસ રીસેસિવ જનીનોનો પ્રમાણ વધવો", "B) વસતિમાં હેટેરોઝાયગસ વ્યક્તિઓનો પ્રમાણ ઘટવો", "C) વસતિમાં મ્યુટેશનનો દર વધવો", "D) વસતિમાં ફિનોટાઇપિક વૈવિધ્ય ઘટવો"], "correct": 2, "explanation": "પર્યાવરણીય ઉત્તરાધિકાર દરમિયાન, મ્યુટેશનનો દર સીધો જ પરિણામ નથી. મ્યુટેશન તો કુદરતી રીતે થતું રહે છે, પરંતુ ઉત્તરાધિકારમાં તેનો પ્રસર પર્યાવરણીય દબાણ દ્વારા નક્કી થાય છે. બાકીના ત્રણેય પરિણામો સીધા જ ઉત્તરાધિકારના પરિણામ છે: હોમોઝાયગસ રીસેસિવ જનીનોનો પ્રમાણ વધે છે, હેટેરોઝાયગસ વ્યક્તિઓનો પ્રમાણ ઘટે છે, અને ફિનોટાઇપિક વૈવિધ્ય ઘટે છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 3}, {"question": "નીચેનામાંથી કયું ઉદાહરણ પર્યાવરણીય ઉત્તરાધિકારનું સૌથી યોગ્ય ઉદાહરણ નથી?", "options": ["A) ડાર્વિનના ફિન્ચ પક્ષીઓના ચાંચના આકારમાં ફેરફાર", "B) બ્રિટનમાં પેપરેડ મોથના રંગમાં ફેરફાર", "C) લેમાર્કના ગિરાફના ગરદન લાંબી થવાની થિયરી", "D) એન્ટીબાયોટિક પ્રતિરોધક બેક્ટેરિયાના ઉદભવ"], "correct": 2, "explanation": "લેમાર્કની થિયરી પર્યાવરણીય ઉત્તરાધિકાર નથી, પરંતુ તે 'અર્જિત લક્ષણોના વારસા' પર આધારિત છે, જે આધુનિક ઉત્ક્રાંતિ વિજ્ઞાન દ્વારા સ્વીકારાતી નથી. બાકીના ત્રણેય ઉદાહરણો પર્યાવરણીય ઉત્તરાધિકારના ક્લાસિક ઉદાહરણો છે: ડાર્વિનના ફિન્ચ પક્ષીઓ, પેપરેડ મોથ, અને એન્ટીબાયોટિક પ્રતિરોધક બેક્ટેરિયા.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 4}, {"question": "પર્યાવરણીય ઉત્તરાધિકાર દરમિયાન, જ્યારે વસતિ પર્યાવરણીય દબાણનો સામનો કરે છે, ત્યારે નીચેનામાંથી કયું કથન ખોટું છે?", "options": ["A) જીન ફ્લો વસતિના જનીન પૂલને પ્રભાવિત કરે છે", "B) કુદરતી પસંદગી દ્વારા, લાભદાયી જનીનોનો પ્રસર વધે છે", "C) જનીન ડ્રિફ્ટ વસતિમાં જનીન વૈવિધ્ય ઘટાડે છે", "D) મ્યુટેશન દર વસતિના કદ પર આધાર રાખે છે"], "correct": 3, "explanation": "મ્યુટેશન દર વસતિના કદ પર આધાર રાખતો નથી, પરંતુ તે કુદરતી રીતે થતો રહે છે અને પર્યાવરણીય દબાણથી સ્વતંત્ર હોય છે. બાકીના ત્રણેય કથનો ખરા છે: જીન ફ્લો જનીન પૂલને પ્રભાવિત કરે છે, કુદરતી પસંદગી લાભદાયી જનીનોનો પ્રસર વધારે છે, અને જનીન ડ્રિફ્ટ જનીન વૈવિધ્ય ઘટાડે છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 5}, {"question": "પર્યાવરણીય ઉત્તરાધિકાર દરમિયાન, જો એક જાતિની વસતિમાં અચાનક તાપમાનમાં ઘટાડો થાય, તો નીચેનામાંથી કયું અનુકૂલન સૌથી ઓછું સંભવિત છે?", "options": ["A) કોષરસપટલમાં અસંતૃપ્ત ચરબીના પ્રમાણમાં વધારો", "B) શરીરમાં એન્ટીફ્રીઝ પ્રોટીનના ઉત્પાદનમાં વધારો", "C) શ્વસન દરમાં વધારો થી શરીરને ગરમ રાખવું", "D) રક્તવાહિનીઓનું સંકોચન થી ઉષ્મા હાનિ ઘટાડવી"], "correct": 2, "explanation": "પર્યાવરણીય ઉત્તરાધિકાર દરમિયાન, તાપમાન ઘટાડાને અનુકૂલન માટે શરીરમાં એન્ટીફ્રીઝ પ્રોટીન (B) અને અસંતૃપ્ત ચરબી (A)નું પ્રમાણ વધે છે, જ્યારે રક્તવાહિનીઓનું સંકોચન (D) ઉષ્મા હાનિ ઘટાડે છે. શ્વસન દરમાં વધારો (C) શરીરને ગરમ રાખવા માટે ઉર્જા ખર્ચ કરે છે, પરંતુ તે લાંબા ગાળાનું અનુકૂલન નથી, કારણ કે તે શરીરની ઉર્જા સંગ્રહને ઓછો કરે છે. આથી, C ઓછું સંભવિત છે.", "ncert_ref": "Class XII - Chapter 13: જીવ અને પર્યાવરણ", "difficulty": "Hard", "num": 6}, {"question": "નીચેનામાંથી કયું કથન પર્યાવરણીય ઉત્તરાધિકાર અને પ્રાકૃતિક પસંદગી વચ્ચેના સંબંધને સૌથી યોગ્ય રીતે વર્ણવે છે?", "options": ["A) પર્યાવરણીય ઉત્તરાધિકાર પ્રાકૃતિક પસંદગીના પરિણામે થાય છે", "B) પ્રાકૃતિક પસંદગી પર્યાવરણીય ઉત્તરાધિકારના પરિણામે થાય છે", "C) પર્યાવરણીય ઉત્તરાધિકાર અને પ્રાકૃતિક પસંદગી પરસ્પર સ્વતંત્ર પ્રક્રિયાઓ છે", "D) પર્યાવરણીય ઉત્તરાધિકાર પ્રાકૃતિક પસંદગી માટેના આધાર તરીકે કામ કરે છે"], "correct": 3, "explanation": "પર્યાવરણીય ઉત્તરાધિકાર એ વસતિ દ્વારા પર્યાવરણીય દબાણને અનુકૂલન કરવાની ક્ષમતા છે, જ્યારે પ્રાકૃતિક પસંદગી એ વસતિમાં અસ્તિત્વમાં રહેલા વૈવિધ્યને આધારે સૌથી યોગ્ય જીવોની પસંદગી કરે છે. પર્યાવરણીય ઉત્તરાધિકાર પ્રાકૃતિક પસંદગી માટેના આધાર તરીકે કામ કરે છે, કારણ કે તે વસતિમાં વૈવિધ્ય ઉત્પન્ન કરે છે, જે પ્રાકૃતિક પસંદગી દ્વારા પસંદ થાય છે. A, B, અને C કથનો સંપૂર્ણ સચોટ નથી.", "ncert_ref": "Class XII - Chapter 13: જીવ અને પર્યાવરણ", "difficulty": "Hard", "num": 7}, {"question": "પર્યાવરણીય ઉત્તરાધિકાર દરમિયાન, જો એક જાતિની વસતિ લાંબા સમય સુધી ઉચ્ચ તાપમાનના પર્યાવરણમાં રહે, તો નીચેનામાંથી કયું અનુકૂલન સૌથી યોગ્ય રીતે અપેક્ષિત છે?", "options": ["A) શરીરમાં પાણીના પ્રમાણમાં ઘટાડો", "B) શ્વસન દરમાં ઘટાડો", "C) ઉચ્ચ તાપમાન સહન કરવા માટે હીટ શોક પ્રોટીનના ઉત્પાદનમાં વધારો", "D) શરીરના કદમાં ઘટાડો"], "correct": 2, "explanation": "ઉચ્ચ તાપમાનના પર્યાવરણમાં, વસતિ હીટ શોક પ્રોટીનના ઉત  "correct": 2, "explanation": "પર્યાવરણીય ઉત્તરાધિકાર દરમિયાન, વસતિ પારા તત્ત્વોના દબાણને અનુકૂળ થાય છે, જેમાં સહનશીલતા વિકસાવવા માટે જીવરસાયણિક માર્ગો (A), પ્રોટીન ઉત્પત્તિ (B), અને જનીનની આવૃત્તિ (D) વધે છે. ઉત્સેચકોની ક્રિયાશીલતા ઘટવી એ અપેક્ષિત નથી, કારણ કે વસતિ પારા તત્ત્વોને નિષ્ક્રિય કરવા અથવા બહાર કાઢવા માટે ઉત્સેચકોની ક્રિયાશીલતા વધારે છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 21}, {"question": "પર્યાવરણીય ઉત્તરાધિકાર દરમિયાન, એક પ્રાણી વસતિમાં નીચેનામાંથી કયું પરિવર્તન જનીનીય સ્તરે થતું નથી, પરંતુ ફક્ત શારીરિક સ્તરે થાય છે?", "options": ["A) હિમોગ્લોબિનના આણ્વીય સ્વરૂપમાં ફેરફાર", "B) ચામડીના રંગમાં ફેરફાર", "C) ઉત્સેચકની ક્રિયાશીલતામાં ફેરફાર", "D) અસ્થિ મજ્જામાં લોહી કણિકાઓની સંખ્યામાં વૃદ્ધિ"], "correct": 1, "explanation": "ચામડીના રંગમાં ફેરફાર (જેમ કે ટેનિંગ) એ શારીરિક અનુકૂલન છે, જે જનીનીય સ્તરે થતું નથી. A) હિમોગ્લોબિનના આણ્વીય સ્વરૂપમાં ફેરફાર જનીનીય સ્તરે થાય છે. C) ઉત્સેચકની ક્રિયાશીલતામાં ફેરફાર જનીનીય નિયંત્રણ હેઠળ થાય છે. D) અસ્થિ મજ્જામાં લોહી કણિકાઓની સંખ્યામાં વૃદ્ધિ જનીનીય અથવા હોર્મોનલ નિયંત્રણ હેઠળ થાય છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 22}, {"question": "એક જલચર વસતિ લાંબા સમયથી ઉચ્ચ તાપમાન અને ઓછા ઓક્સિજન વાળા પાણીમાં રહે છે. નીચેનામાંથી કયું અનુકૂલન પર્યાવરણીય ઉત્તરાધિકારના પરિણામરૂપે જોવા મળશે નહીં?", "options": ["A) હિમોગ્લોબિનની ઓક્સિજન બંધન ક્ષમતામાં વૃદ્ધિ", "B) શ્વસન દરમાં ઘટાડો", "C) ગલફડામાં ક્ષારની સાંદ્રતામાં ઘટાડો", "D) ચયાપચય દરમાં ઘટાડો"], "correct": 2, "explanation": "ઉચ્ચ તાપમાન અને ઓછા ઓક્સિજન વાળા પાણીમાં, જલચરોમાં હિમોગ્લોબિનની ઓક્સિજન બંધન ક્ષમતા (A) વૃદ્ધિ પામે છે, શ્વસન દર (B) ઘટે છે, અને ચયાપચય દર (D) ઘટે છે જેથી ઓક્સિજનની માગણી ઘટે. પરંતુ ગલફડામાં ક્ષારની સાંદ્રતામાં ઘટાડો (C) એ અનુકૂળ નથી, કારણ કે ઓછા ઓક્સિજન વાળા પાણીમાં ક્ષારની સાંદ્રતા વૃદ્ધિ પામે છે જેથી ઓસ્મોસિસ દ્વારા પાણીનું શોષણ સરળ બને.", "ncert_ref": "Class XI - Chapter 16: પ્રાણીઓમાં પ્રતિકૂળ પરિસ્થિતિઓ સામે અનુકૂલન", "difficulty": "Hard", "num": 23}, {"question": "એક પ્રાણી વસતિ લાંબા સમય સુધી ઉચ્ચ પારા તત્ત્વો (હેવી મેટલ્સ) ધરાવતા મૃદામાં રહે છે. નીચેનામાંથી કયું કથન પર્યાવરણીય ઉત્તરાધિકારના સંદર્ભમાં ખોટું છે?", "options": ["A) વસતિમાં હેવી મેટલ્સને બાંધી રાખવા માટેના પ્રોટીનની ઉત્પત્તિમાં વધારો થશે", "B) વસતિમાં હેવી મેટલ્સના વિષાક્તા વિરુદ્ધ પ્રતિકારકતા વિકસિત થશે", "C) વસતિમાં હેવી મેટલ્સના સંપર્કમાં આવવાને કારણે જનીનીય મ્યુટેશનનો દર ઘટશે", "D) વસતિમાં હેવી મેટલ્સને બહાર કાઢવા માટેના ઉત્સર્જન તંત્રમાં સુધારો થશે"], "correct": 2, "explanation": "ઉચ્ચ પારા તત્ત્વો ધરાવતા મૃદામાં રહેતી વસતિમાં, હેવી મેટલ્સને બાંધી રાખવા માટેના પ્રોટીન (A) અને ઉત્સર્જન તંત્રમાં સુધારો (D) થશે, જેથી વિષાક્તા વિરુદ્ધ પ્રતિકારકતા (B) વિકસિત થાય. પરંતુ હેવી મેટલ્સના સંપર્કમાં આવવાને કારણે જનીનીય મ્યુટેશનનો દર ઘટશે (C) એ ખોટું છે, કારણ કે હેવી મેટલ્સ મ્યુટેજનિક હોય છે અને મ્યુટેશનનો દર વધારી શકે છે, ઘટાડી શકતું નથી.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 24}, {"question": "પર્યાવરણીય ઉત્તરાધિકાર દરમિયાન, એક વનસ્પતિ વસતિમાં ક્લોરોફિલની માત્રામાં ઘટાડો જોવા મળે છે. આ ઘટાડાનું સૌથી યોગ્ય કારણ કયું હશે, જ્યારે આ વસતિ લાંબા સમયથી ઉચ્ચ પ્રકાશ તીવ્રતા અને ઓછા કાર્બન ડાયોક્સાઇડ સ્તરવાળા પર્યાવરણમાં રહે છે?", "options": ["A) પ્રકાશસંશ્લેષણની ક્રિયામાં ઘટાડો થવાને લીધે ક્લોરોફિલનું ઉત્પાદન ઓછું થાય છે", "B) ઉચ્ચ પ્રકાશ તીવ્રતાને અનુરૂપ ક્લોરોફિલ a ની જગ્યાએ ક્લોરોફિલ b નું પ્રમાણ વધે છે", "C) ઓછા કાર્બન ડાયોક્સાઇડ સ્તરને લીધે ક્લોરોપ્લાસ્ટમાં થાયલેકોઇડની સંખ્યામાં ઘટાડો થાય છે", "D) પર્યાવરણીય ઉત્તરાધિકાર દરમિયાન, વનસ્પતિઓમાં ક્લોરોફિલનું સ્થાન લાલ વર્ણદ્રવ્ય (એન્થોસાયનિન) લે છે"], "correct": 2, "explanation": "સાચો જવાબ C છે. ઓછા કાર્બન ડાયોક્સાઇડ સ્તરને લીધે પ્રકાશસંશ્લેષણની ક્રિયા મર્યાદિત બને છે, જેથી ક્લોરોપ્લાસ્ટમાં થાયલેકોઇડની સંખ્યામાં ઘટાડો થાય છે, જે ક્લોરોફિલની માત્રામાં ઘટાડો તરફ દોરી જાય છે. A ખોટું છે કારણ કે પ્રકાશસંશ્લેષણની ક્રિયામાં ઘટાડો ક્લોરોફિલના ઉત્પાદનને અસર કરતો નથી, પરંતુ ક્લોરોફિલની જરૂરિયાતને અસર કરે છે. B ખોટું છે કારણ કે ઉચ્ચ પ્રકાશ તીવ્રતામાં ક્લોરોફિલ a અને b ના પ્રમાણમાં ફેરફાર થતો નથી, પરંતુ ક્લોરોફિલની કુલ માત્રામાં ઘટાડો થાય છે. D ખોટું છે કારણ કે એન્થોસાયનિન ક્લોરોફિલનું સ્થાન લેતું નથી, પરંતુ તે ક્લોરોફિલ સાથે સહ-અસ્તિત્વમાં રહે છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 25}, {"question": "એક વનસ્પતિ વસતિ લાંબા સમયથી ઉચ્ચ ખારાપણા અને નીચા પાણીની પ્રાપ્યતાવાળા પર્યાવરણમાં રહે છે. નીચેનામાંથી કયું પરિવર્તન પર્યાવરણીય ઉત્તરાધિકારના પરિણામરૂપે જોવા મળશે નહીં?", "options": ["A) કોષરસના દબાણમાં ઘટાડો થવો", "B) મૂળમાં જલવાહક પેશીઓની સંખ્યામાં વધારો થવો", "C) પર્ણની સપાટી પર મોમ જેવા પદાર્થના સ્તરનું નિર્માણ થવો", "D) પ્રકાશસંશ્લેષણ દરમાં વધારો થવો"], "correct": 3, "explanation": "પર્યાવરણીય ઉત્તરાધિકાર દરમિયાન, ઉચ્ચ ખારાપણા અને પાણીની અછત વચ્ચે વનસ્પતિ કોષરસના દબાણને ઓછું કરવા (A) માટે પાણીનું શોષણ ઘટાડે છે, મૂળમાં જલવાહક પેશીઓની સંખ્યામાં વધારો (B) થાય છે જેથી પાણીનું શોષણ સુધરે, અને પર્ણ પર મોમ જેવા પદાર્થનો સ્તર (C) બાષ્પોત્સર્જન ઘટાડવા નિર્માણ થાય છે. પરંતુ પ્રકાશસંશ્લેષણ દરમાં વધારો (D) થતો નથી, કારણ કે પાણી અને ખનીજોની અછત પ્રકાશસંશ્લેષણને અવરોધે છે.", "ncert_ref": "Class XII - Chapter 13: જૈવ-તકનીકી અને તેના અનુપ્રયોગો", "difficulty": "Hard", "num": 26}, {"question": "એક વનસ્પતિ વસતિ લાંબા સમયથી ઉચ્ચ ખારાપણા અને ઓછા પાણીની પ્રાપ્યતાવાળા પર્યાવરણમાં રહે છે. નીચેનામાંથી કયું પરિવર્તન પર્યાવરણીય ઉત્તરાધિકારના પરિણામરૂપે જોવા મળશે નહીં?", "options": ["A) કોષરસના દબાણમાં ઘટાડો થવો", "B) મૂળમાં જલવાહક પેશીના વિકાસમાં વૃદ્ધિ થવી", "C) પર્ણની સપાટી પર મોમ જેવા પદાર્થના સ્તરની જાડાઈમાં વધારો થવો", "D) પ્રકાશસંશ્લેષણ દરમાં ઘટાડો થવો"], "correct": 0, "explanation": "પર્યાવરણીય ઉત્તરાધિકાર દરમિયાન, ઉચ્ચ ખારાપણા અને ઓછા પાણીના પર્યાવરણમાં વનસ્પતિઓ કોષરસના દબાણને વધારીને (ઓસ્મોટિક એડજસ્ટમેન્ટ દ્વારા) પાણીનું સંતુલન જાળવી રાખે છે, જેથી કોષરસના દબાણમાં ઘટાડો થવો એ અશક્ય છે. મૂળમાં જલવાહક પેશીનો વિકાસ વધે છે (B) જેથી પાણીનું શોષણ વધે. પર્ણની સપાટી પર મોમ જેવા પદાર્થ (ક્યુટીન)નો સ્તર જાડો થાય છે (C) જેથી પાણીનું બાષ્પીભવન ઘટે. પ્રકાશસંશ્લેષણ દર ઘટે છે (D) કારણ કે પાણીની અછત અને ખારાપણાથી ક્લોરોફિલની ક્રિયાશીલ         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
