<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - ભ્રૂણ વિકાસ (Post-fertilisation Events)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 ભ્રૂણ વિકાસ (Post-fertilisation Events)</span>
                <span>🎯 Hard</span>
                <span>📝 47 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "ભ્રૂણના વિકાસ દરમિયાન બ્લાસ્ટોસીલમાં કયા પેશીના વિકાસ માટે પ્રાથમિક ઉત્તેજન તરીકે કોરિયોનિક ગોનાડોટ્રોપિન (hCG) હોર્મોનનું સ્રાવ થાય છે?", "options": ["A) એમ્નિયોન", "B) કોરિયોન", "C) એલન્ટોઈસ", "D) હાયપોબ્લાસ્ટ"], "correct": 1, "explanation": "hCG હોર્મોનનું સ્રાવ કોરિયોનિક પેશી દ્વારા થાય છે, જે બ્લાસ્ટોસીલના બાહ્ય સ્તર (ટ્રોફોબ્લાસ્ટ)માંથી વિકસે છે. એમ્નિયોન (A) ભ્રૂણને સુરક્ષા આપે છે, એલન્ટોઈસ (C) પોષણ અને કચરાનું વહન કરે છે, જ્યારે હાયપોબ્લાસ્ટ (D) ભ્રૂણીય ડિસ્કનો ભાગ છે. hCGનું મુખ્ય કાર્ય પીટ્યુટરી ગ્રંથિને પ્રોજેસ્ટેરોનનું સ્રાવ ચાલુ રાખવા ઉત્તેજિત કરવું છે, જે ગર્ભાશયની અસ્તરને જાળવી રાખે છે.", "ncert_ref": "Class XII - પ્રકરણ ૩: માનવ પ્રજનન", "difficulty": "Hard", "num": 1}, {"question": "ગર્ભાશયમાં ભ્રૂણના ઇમ્પ્લાન્ટેશન દરમિયાન નીચેના પૈકી કયું પગલું સૌપ્રથમ થાય છે?", "options": ["A) ટ્રોફોબ્લાસ્ટ દ્વારા એન્ડોમેટ્રિયમમાં એન્ઝાઇમનું સ્રાવ", "B) બ્લાસ્ટોસીલ દ્વારા એમ્નિયોન ગુહાનું નિર્માણ", "C) ઇનર સેલ માસ દ્વારા હાયપોબ્લાસ્ટ અને એપીબ્લાસ્ટનું નિર્માણ", "D) કોરિયોનિક વિલીનું નિર્માણ"], "correct": 0, "explanation": "ઇમ્પ્લાન્ટેશન દરમિયાન સૌપ્રથમ ટ્રોફોબ્લાસ્ટ એન્ડોમેટ્રિયમની સપાટી સાથે જોડાય છે અને એન્ઝાઇમનું સ્રાવ કરે છે, જે એન્ડોમેટ્રિયમને તોડીને ભ્રૂણને એન્ડોમેટ્રિયમમાં દાખલ થવા દે છે. બ્લાસ્ટોસીલ ગુહાનું નિર્માણ (B) અને હાયપોબ્લાસ્ટ/એપીબ્લાસ્ટનું નિર્માણ (C) ઇમ્પ્લાન્ટેશન પહેલા જ થાય છે, જ્યારે કોરિયોનિક વિલી (D) ઇમ્પ્લાન્ટેશન પછી વિકસે છે.", "ncert_ref": "Class XII - પ્રકરણ ૩: માનવ પ્રજનન", "difficulty": "Hard", "num": 2}, {"question": "ભ્રૂણીય વિકાસ દરમિયાન નીચેના પૈકી કયું વિધાન સત્ય નથી?", "options": ["A) મોરુલા અવસ્થામાં કોષોની સંખ્યા વધે છે પરંતુ કદમાં વૃદ્ધિ થતી નથી.", "B) બ્લાસ્ટોસીલ અવસ્થામાં કોષોની વિશિષ્ટીકરણ શરૂ થાય છે.", "C) ગેસ્ટ્રુલેશન દરમિયાન એક્ટોડર્મ, મેસોડર્મ અને એન્ડોડર્મનું નિર્માણ થાય છે.", "D) ન્યુરુલેશન દરમિયાન હૃદયનું નિર્માણ થાય છે."], "correct": 3, "explanation": "ન્યુરુલેશન દરમિયાન મગજ અને મજ્જારજ્જુનું નિર્માણ થાય છે, હૃદયનું નિર્માણ મેસોડર્મમાંથી થાય છે, જે ગેસ્ટ્રુલેશન પછી થાય છે. મોરુલા (A)માં કોષવિભાજન થાય છે પરંતુ કદમાં વૃદ્ધિ થતી નથી. બ્લાસ્ટોસીલ (B)માં કોષોની વિશિષ્ટીકરણ શરૂ થાય છે, અને ગેસ્ટ્રુલેશન (C) દરમિયાન ત્રણ જર્મ લેયરનું નિર્માણ થાય છે.", "ncert_ref": "Class XII - પ્રકરણ ૩: માનવ પ્રજનન", "difficulty": "Hard", "num": 3}, {"question": "ભ્રૂણીય વિકાસ દરમિયાન નીચેના પૈકી કયા હોર્મોનનું સ્રાવ પ્લેસેન્ટા દ્વારા થતું નથી?", "options": ["A) પ્રોજેસ્ટેરોન", "B) ઇસ્ટ્રોજન", "C) hCG", "D) FSH"], "correct": 3, "explanation": "FSH (ફોલિકલ સ્ટિમ્યુલેટિંગ હોર્મોન)નું સ્રાવ પીટ્યુટરી ગ્રંથિ દ્વારા થાય છે, જ્યારે પ્રોજેસ્ટેરોન (A), ઇસ્ટ્રોજન (B), અને hCG (C)નું સ્રાવ પ્લેસેન્ટા દ્વારા થાય છે. પ્લેસેન્ટા ભ્રૂણના વિકાસ માટે જરૂરી હોર્મોનનું સ્રાવ કરે છે, પરંતુ FSH તેના કાર્યમાં સમાવિષ્ટ નથી.", "ncert_ref": "Class XII - પ્રકરણ ૩: માનવ પ્રજનન", "difficulty": "Hard", "num": 4}, {"question": "ભ્રૂણીય વિકાસ દરમિયાન નીચેના પૈકી કયું જોડકું યોગ્ય નથી?", "options": ["A) એક્ટોડર્મ - ચામડી અને ચેતાતંત્ર", "B) મેસોડર્મ - હાડકા અને સ્નાયુઓ", "C) એન્ડોડર્મ - હૃદય અને રક્તવાહિનીઓ", "D) કોરિયોન - પ્લેસેન્ટા અને અપરા નાળ"], "correct": 2, "explanation": "એન્ડોડર્મમાંથી પાચનતંત્ર, શ્વસનતંત્ર અને યકૃત જેવા અંગો વિકસે છે, જ્યારે હૃદય અને રક્તવાહિનીઓ મેસોડર્મમાંથી વિકસે છે. એક્ટોડર્મ (A)માંથી ચામડી અને ચેતાતંત્ર, મેસોડર્મ (B)માંથી હાડકા અને સ્નાયુઓ, અને કોરિયોન (D)માંથી પ્લેસેન્ટા અને અપરા નાળ વિકસે છે.", "ncert_ref": "Class XII - પ્રકરણ ૩: માનવ પ્રજનન", "difficulty": "Hard", "num": 5}, {"question": "ભ્રૂણીય વિકાસ દરમિયાન, નીચેના પૈકી કયા પગલામાં બ્લાસ્ટોમિઅરનો વિકાસ થાય છે અને તે કયા અવસ્થાએ પહોંચે છે જ્યારે તે ગર્ભાશયની દીવાલ સાથે સંપર્કમાં આવે છે?", "options": ["A) મોરુલા અવસ્થાએ, જ્યારે કોષોની સંખ્યા 8-16 હોય છે", "B) બ્લાસ્ટ્યુલા અવસ્થાએ, જ્યારે બ્લાસ્ટોસીલનું નિર્માણ થાય છે", "C) ગેસ્ટ્રુલા અવસ્થાએ, જ્યારે પ્રાથમિક જર્મ લેયરનું નિર્માણ થાય છે", "D) ટ્રોફોબ્લાસ્ટ અવસ્થાએ, જ્યારે ઇમ્પ્લાન્ટેશન શરૂ થાય છે"], "correct": 1, "explanation": "બ્લાસ્ટોમિઅરનું નિર્માણ બ્લાસ્ટ્યુલા અવસ્થાએ થાય છે, જ્યારે કોષોનું વિભાજન થઈને બ્લાસ્ટોસીલ બનાવે છે. મોરુલા અવસ્થાએ કોષોનું વિભ િશે ખોટું છે?", "options": ["A) ક્લીવેજ દરમિયાન ભ્રૂણના કદમાં વૃદ્ધિ થતી નથી, પરંતુ કોષોની સંખ્યામાં વૃદ્ધિ થાય છે.", "B) ક્લીવેજ દરમિયાન કોષવિભાજન મિટોટિક હોય છે અને તે સંપૂર્ણપણે સાયટોકાઇનેસિસ દ્વારા થાય છે.", "C) મનુષ્યમાં ક્લીવેજ હોલોબ્લાસ્ટિક અને અસમાન (asynchronous) પ્રકારનું હોય છે.", "D) ક્લીવેજ દરમિયાન જીવરસ (cytoplasm)માં રહેલા પોષક તત્ત્વોનો ઉપયોગ થાય છે."], "correct": 1, "explanation": "ક્લીવેજ દરમિયાન કોષવિભાજન મિટોટિક હોય છે, પરંતુ તે મુખ્યત્વે કોષકેન્દ્રના વિભાજન (karyokinesis) દ્વારા થાય છે, સાયટોકાઇનેસિસ (cytoplasmic division) તો પછી થાય છે. આથી વિધાન B ખોટું છે. A સત્ય છે કારણ કે ક્લીવેજ દરમિયાન ભ્રૂણનું કદ સ્થિર રહે છે, પરંતુ કોષોની સંખ્યામાં વૃદ્ધિ થાય છે. C સત્ય છે કારણ કે મનુષ્યમાં ક્લીવેજ હોલોબ્લાસ્ટિક અને અસમાન પ્રકારનું હોય છે. D સત્ય છે કારણ કે ક્લીવેજ દરમિયાન જીવરસમાં રહેલા પોષક તત્ત્વોનો ઉપયોગ થાય છે.", "ncert_ref": "Class XII - પ્રકરણ 3: મનુષ્યમાં પ્રજનન", "difficulty": "Hard", "num": 16}, {"question": "ભ્રૂણ વિકાસ દરમિયાન, નીચેના પૈકી કયું વિધાન એમ્બ્રિયોનિક ડિસ્ક વિશે સત્ય છે?", "options": ["A) એમ્બ્રિયોનિક ડિસ્ક બ્લાસ્ટોડિસ્કના ઉપરના ભાગમાં રચાય છે અને તે ત્રણ જર્મ લેયર ધરાવે છે.", "B) એમ્બ્રિયોનિક ડિસ્ક બ્લાસ્ટોસીલની નીચે રચાય છે અને તે એક-સ્તરીય કોષો ધરાવે છે.", "C) એમ્બ્રિયોનિક ડિસ્ક ગેસ્ટ્રુલેશન પૂર્વે રચાય છે અને તે મુખ્યત્વે એક્ટોડર્મ ધરાવે છે.", "D) એમ્બ્રિયોનિક ડિસ્ક બ્લાસ્ટોપોરની નજીક રચાય છે અને તે મેઝોડર્મ ધરાવતી નથી."], "correct": 0, "explanation": "એમ્બ્રિયોનિક ડિસ્ક બ્લાસ્ટોડિસ્કના ઉપરના ભાગમાં રચાય છે અને તે ત્રણ જર્મ લેયર (એક્ટોડર્મ, મેઝોડર્મ, એન્ડોડર્મ) ધરાવે છે. B ખોટું છે કારણ કે એમ્બ્રિયોનિક ડિસ્ક બ્લાસ્ટોસીલની ઉપર રચાય છે. C ખોટું છે કારણ કે એમ્બ્રિયોનિક ડિસ્ક ગેસ્ટ્રુલેશન પછી રચાય છે. D ખોટું છે કારણ કે એમ્બ્રિયોનિક ડિસ્ક મેઝોડર્મ ધરાવે છે.", "ncert_ref": "Class XII - પ્રકરણ 3: મનુષ્યમાં પ્રજનન", "difficulty": "Hard", "num": 17}, {"question": "ભ્રૂણ વિકાસ દરમિયાન, નીચેના પૈકી કયું વિધાન ફીટલ હીમોગ્લોબિન વિશે સત્ય છે?", "options": ["A) ફીટલ હીમોગ્લોબિન (HbF) ઓક્સિજન સાથે માતાના હીમોગ્લોબિન (HbA) કરતાં ઓછી બંધન ક્ષમતા ધરાવે છે.", "B) ફીટલ હીમોગ્લોબિનમાં બે આલ્ફા અને બે ગામા સબયુનિટ્સ હોય છે.", "C) ફીટલ હીમોગ્લોબિન માતાના હીમોગ્લોબિન કરતાં ઓક્સિજન સાથે વધુ મજબૂત બંધન ધરાવે છે.", "D) ફીટલ હીમોગ્લોબિન જન્મ પછી તરત જ માતાના હીમોગ્લોબિન દ્વારા બદલાય છે."], "correct": 2, "explanation": "ફીટલ હીમોગ્લોબિન (HbF) માતાના હીમોગ્લોબિન (HbA) કરતાં ઓક્સિજન સાથે વધુ મજબૂત બંધન ધરાવે છે, જે ભ્રૂણને ઓક્સિજનની વધુ માત્રા મેળવવામાં મદદ કરે છે. A ખોટું છે કારણ કે HbFની ઓક્સિજન બંધન ક્ષમતા HbA કરતાં વધુ હોય છે. B ખોટું છે કારણ કે HbFમાં બે આલ્ફા અને બે ગામા સબયુનિટ્સ હોય છે, પરંતુ આ વિધાન અપૂર્ણ છે કારણ કે તે HbFની ઓક્સિજન બંધન ક્ષમતા વિશે માહિતી આપતું નથી. D ખોટું છે કારણ કે HbF જન્મ પછી ધીમે ધીમે HbA દ્વારા બદલાય છે.", "ncert_ref": "Class XII - પ્રકરણ 3: મનુષ્યમાં પ્રજનન", "difficulty": "Hard", "num": 18}, {"question": "ભ્રૂણ વિકાસ દરમિયાન, નીચેના પૈકી કયું વિધાન 'ઇનવેગિનેશન' (invagination) પ્રક્રિયા વિશે ખોટું છે?", "options": ["A) આ પ્રક્રિયા ગેસ્ટ્રુલેશન દરમિયાન થાય છે અને એન્ટોડર્મના નિર્માણમાં મદદ કરે છે.", "B) આ પ્રક્રિયા બ્લાસ્ટુલા અવસ્થામાં શરૂ થાય છે અને બ્લાસ્ટોપોરનું નિર્માણ કરે છે.", "C) આ પ્રક્રિયા દરમિયાન કોષોનો આંતરિક ગોળાકાર ભાગ તરફ વળાંક થાય છે.", "D) આ પ્રક્રિયા મનુષ્યમાં બ્લાસ્ટોસીલના આંતરિક કોષસમૂહમાં થતી નથી."], "correct": 3, "explanation": "વિકલ્પ D ખોટો છે કારણ કે મનુષ્યમાં ઇનવેગિનેશન પ્રક્રિયા બ્લાસ્ટોસીલના આંતરિક કોષસમૂહ (inner cell mass)માં થતી નથી, પરંતુ ઉચ્ચ પ્રાણીઓમાં ગેસ્ટ્રુલેશન દરમિયાન થાય છે. વિકલ્પ A સત્ય છે કારણ કે ઇનવેગિનેશન ગેસ્ટ્રુલેશન દરમિયાન થાય છે અને એન્ટોડર્મના નિર્માણમાં મદદ કરે છે. વિકલ્પ B સત્ય છે કારણ કે આ પ્રક્રિયા બ્લાસ્ટુલા અવસ્થામાં શરૂ થાય છે અને બ્લાસ્ટોપોરનું નિર્માણ કરે છે. વિકલ્પ C સત્ય છે કારણ કે ઇનવેગિનેશન દરમિયાન કોષોનો આંતરિક ગોળાકાર ભાગ તરફ વળાંક થાય છે.", "ncert_ref": "Class XII - Chapter 3: મનુષ્યમાં પ્રજનન", "difficulty": "Hard", "num": 19}, {"question": "ભ્રૂણ વિકાસ દરમિયાન, નીચેના પૈકી કયું જોડકું 'એલન્ટોઈસ' અને તેના કાર્ય વિશે યોગ્ય નથી?", "options": ["A) એલન્ટોઈસ - ભ્રૂણીય ઉત્સર્જન અંગ તરીકે કાર્ય કરે છે.", "B) એલન્ટોઈસ - ભ્રૂણીય રક્તવાહિનીઓના વિકાસમાં મદદ કરે છે.", "C) એલન્ટોઈસ - ભ્રૂણીય પોષણ પુરવઠો કરે છે.", "D) એલન્ટોઈસ - ભ્રૂણીય શ્વસનમાં મદદ કરે છે."], "correct": 2, "explanation": "વિકલ્પ C ખોટો છે કારણ કે એલન્ટોઈસ ભ્રૂણીય પોષણ પુરવઠો કરતું નથી, પરંતુ ભ્રૂણીય ઉત્સર્જન અંગ તરીકે અને રક્તવાહિનીઓના વિકાસમાં મદદ કરે છે. વિકલ્પ A સત્ય છે કારણ કે એલન્ટોઈસ ભ્રૂણીય ઉત્સર્જન અંગ તરીકે કાર્ય કરે છે. વિકલ્પ B સત્ય છે કારણ કે એલન્ટોઈસ ભ્રૂણીય રક્તવાહિનીઓના વિકાસમાં મદદ કરે છે. વિકલ્પ D સત્ય છે કારણ કે એલન્ટોઈસ ભ્રૂણીય શ્વસનમાં મદદ કરે છે (ઓક્સિજન અને કાર્બન ડાયોક્સાઇડના વિનિમયમાં).", "ncert_ref": "Class XII - Chapter 3: મનુષ્યમાં પ્રજનન", "difficulty": "Hard", "num": 20}, {"question": "ભ્રૂણ વિકાસ દરમિયાન, નીચેના પૈકી કયા પગલામાં 'ગેસ્ટ્રુલેશન' પ્રક્રિયા દરમિયાન એન્ટોડર્મ, મેસોડર્મ અને એક્ટોડર્મની રચના થાય છે, પરંતુ આ પગલા પહેલાં કોઈ પણ અંગવિકાસ (organogenesis) શરૂ થતું નથી?", "options": ["A) મોરુલા અવસ્થા", "B) બ્લાસ્ટુલા અવસ્થા", "C) ગેસ્ટ્રુલા અવસ્થા", "D) ન્યુરુલા અવસ્થા"], "correct": 2, "explanation": "ગેસ્ટ્રુલેશન પ્રક્રિયા દરમિયાન જ ભ્રૂણીય પર્ણો (germ layers) એન્ટોડર્મ, મેસોડર્મ અને એક્ટોડર્મની રચના થાય છે. મોરુલા અને બ્લાસ્ટુલા અવસ્થામાં તો કોષવિભાજન અને બ્લાસ્ટોસીલની રચના થાય છે, પરંતુ અંગવિકાસ શરૂ થતું નથી. ન્યુરુલા અવસ્થામાં તો અંગવિકાસ શરૂ થયેલું હોય છે, જેમ કે નર્વ સિસ્ટમનો વિકાસ. અહીં, ગેસ્ટ્રુલા અવસ્થા એ પહેલું પગલું છે જ્યાં ભ્રૂણીય પર્ણો બને છે, પરંતુ અંગવિકાસ અત્યારે શરૂ થતું નથી.", "ncert_ref": "Class XII - Chapter 3: માનવ પ્રજનન", "difficulty": "Hard", "num": 21}, {"question": "ભ્રૂણ વિકાસ દરમિયાન, નીચેના પૈકી કયું વિધાન 'ક્લીવેજ' અને 'બ્લાસ્ટુલેશન' વિશે ખોટું છે?", "options": ["A) ક્લીવેજ દરમિયાન કોષોનું કદ ઘટે છે, પરંતુ કોષરસનું પ્રમાણ સતત રહે છે.", "B) બ્લાસ્ટુલેશન દરમિયાન બ્લાસ્ટોમિઅરની રચના થાય છે, જે પાણીથી ભરેલું હોય છે.", "C) ક્લીવેજ દરમિયાન કોષવિભાજન મિટોટિક હોય છે, પરંતુ DNA સંશ્લેષણ થતું નથી.", "D) બ્લાસ્ટુલેશન પછી ગેસ્ટ્રુલેશન શરૂ થાય છે."], "correct": 2, "explanation": "ક્લીવેજ દરમિયાન કોષવિભાજન મિટોટિક હોય છે અને DNA સંશ્લેષણ થાય છે, કારણ કે કોષોનું કદ ઘટે છે પરંતુ કોષરસનું પ્રમાણ સતત રહે છે. વિકલ્પ A સત્ય છે. બ્લાસ્ટુલેશન દરમિયાન બ્લાસ્ટોમિઅરની રચના થાય છે, જે પાણીથી ભરેલું હોય છે, જેથી વિકલ્પ B સત્ય છે. બ્લાસ્ટુલેશન પછી ગેસ્ટ્રુલેશન શરૂ થાય છે, જેથી વિકલ્પ D સત્ય છે. વિકલ્પ C ખોટો છે કારણ કે ક્લીવેજ દરમિયાન DNA સંશ્લેષણ થાય છે.", "ncert_ref": "Class XII - Chapter 3: માનવ પ્રજનન", "difficulty": "Hard", "num": 22}, {"question": "ભ્રૂણ વિકાસ દરમિયાન, નીચેના પૈકી કયું જોડકું 'પ્લેસેન્ટા' અને તેના કાર્ય વિશે યોગ્ય નથી?", "options": ["A) પ્લેસેન્ટા - ભ્રૂણને પોષક તત્ત્વો પૂરા પાડે છે.", "B) પ્લેસેન્ટા - ભ્રૂણના કચરા પદાર્થોનું નિકાલ કરે છે.", "C) પ્લેસેન્ટા - ભ્રૂણને ઓક્સિજન પૂરો પાડે છે અને કાર્બન ડાયોક્સાઇડ લે છે.", "D) પ્લેસેન્ટા - ભ્રૂણમાં હોર્મોનનું સ્રાવ કરે છે જેમ કે FSH અને LH."], "correct": 3, "explanation": "પ્લેસેન્ટા ભ્રૂણને પોષક તત્ત્વો, ઓક્સિજન પૂરા પાડે છે અને કચરા પદાર્થોનું નિકાલ કરે છે, જેથી વિકલ્પ A, B, અને C સત્ય છે. પરંતુ પ્લેસેન્ટા દ્વારા FSH અને LH હોર્મોનનું સ્રાવ થતું નથી. પ્લેસેન્ટા દ્વારા hCG, hPL, પ્રોજેસ્ટેરોન અને ઇસ્ટ્રોજન જેવા હોર્મોનનું સ્રાવ થાય છે. આથી વિકલ્પ D ખોટો છે.", "ncert_ref": "Class XII - Chapter 3: માનવ પ્રજનન", "difficulty": "Hard", "num": 23}, {"question": "ભ્રૂણ વિકાસ દરમિયાન, નીચેના પૈકી કયું વિધાન 'એમ્નિયોન' અને 'કોરિયોન' વિશે સત્ય છે?", "options": ["A) એમ્નિયોન ભ્રૂણને યાંત્રિક આઘાતથી બચાવે છે, જ્યારે કોરિયોન ભ્રૂણને પોષક તત્ત્વો પૂરા પાડે છે.", "B) એમ્નિયોન અને કોરિયોન બંને ભ્રૂણીય અવસ્થામાં બ્લાસ્ટોસીલમાંથી વિકસે છે.", "C) કોરિયોન એમ્નિયોનની બહાર આવેલું હોય છે અને એમ્નિયોન કરતાં મોટું હોય છે.", "D) એમ્નિયોન અને કોરિયોન બંને ભ્રૂણીય પર્ણોમાંથી વિકસે છે."], "correct": 2, "explanation": "કોરિયોન એમ્નિયોનની બહાર આવેલું હોય છે અને એમ્નિયોન કરતાં મોટું હોય છે, જેથી વિકલ્પ C સત્ય છે. એમ્નિયોન ભ્રૂણને યાંત્રિક આઘાતથી બચાવે છે, પરંતુ કોરિયોન ભ્રૂણને પોષક તત્ત્વો પૂરા પાડતું નથી, તે પ્લેસેન્ટાની રચનામાં ભાગ લે છે, જેથી વિકલ્પ A ખોટો છે. એમ્નિયોન અને કોરિયોન બ્લાસ્ટોસીલમાંથી વિકસે છે, પરંતુ એમ્નિયોન એક્ટોડર્મ અને મેસોડર્મમાંથી વિકસે છે, જ્યારે કોરિયોન ફક્ત મેસોડર્મ અને ટ્રોફોબ્લાસ્ટમાંથી "explanation": "ડાયક્રોટિક ક્લીવેજ (જે પક્ષીઓ, રેપ્ટાઇલ્સ અને કેટલાક મત્સ્યોમાં જોવા મળે છે)માં કોષકેન્દ્રનું વિભાજન કોષવિભાજન પહેલાં થાય છે, જ્યારે સાયટોપ્લાઝમનું વિભાજન પછી થાય છે. હોલોબ્લાસ્ટિક ક્લીવેજ (જે મનુષ્ય અને સસ્તન પ્રાણીઓમાં જોવા મળે છે)માં કોષકેન્દ્ર અને સાયટોપ્લાઝમ એકસાથે વિભાજિત થાય છે. વિકલ્પ B ખોટો છે કારણ કે ડાયક્રોટિક ક્લીવેજ પક્ષીઓમાં જોવા મળે છે, પરંતુ હોલોબ્લાસ્ટિક ક્લીવેજ મનુષ્ય અને સસ્તન પ્રાણીઓમાં જોવા મળે છે, પરંતુ આ તુલના સંપૂર્ણ નથી. વિકલ્પ C ખોટો છે કારણ કે ડાયક્રોટિક ક્લીવેજમાં કોષોનો કદ ઘટે છે, પરંતુ હોલોબ્લાસ્ટિક ક્લીવેજમાં કોષોનો કદ ઘટે છે નહીં વધે. વિકલ્પ D ખોટો છે કારણ કે ડાયક્રોટિક ક્લીવેજમાં બ્લાસ્ટોડિસ્ક બનાવે છે, પરંતુ હોલોબ્લાસ્ટિક ક્લીવેજમાં બ્લાસ્ટુલા બનાવે છે, પરંતુ આ તુલના અપૂર્ણ છે.", "ncert_ref": "Class XII - Chapter 3: મનુષ્યમાં પ્રજનન", "difficulty": "Hard", "num": 35}, {"question": "માનવ ભ્રૂણ વિકાસ દરમિયાન, 'ન્યુરલ ક્રેસ્ટ કોષો' (Neural Crest Cells) નીચેના પૈકી કઈ રચનાઓના નિર્માણમાં સીધો સહભાગી નથી?", "options": ["A) એડ્રિનલ મેડ્યુલા (Adrenal Medulla)", "B) મેલેનોસાઇટ્સ (Melanocytes)", "C) કરોડરજ્જુના મોટર ન્યુરોન્સ (Motor Neurons of Spinal Cord)", "D) કપાલના હાડકાં (Cranial Bones)"], "correct": 2, "explanation": "ન્યુરલ ક્રેસ્ટ કોષો એડ્રિનલ મેડ્યુલા, મેલેનોસાઇટ્સ, અને કપાલના હાડકાંના નિર્માણમાં સીધો સહભાગી હોય છે, પરંતુ કરોડરજ્જુના મોટર ન્યુરોન્સનું નિર્માણ ન્યુરલ ટ્યુબમાંથી થાય છે, ન્યુરલ ક્રેસ્ટ કોષોમાંથી નહીં. તેથી વિકલ્પ C ખોટો છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 3: માનવ પ્રજનન", "difficulty": "Hard", "num": 36}, {"question": "માનવ ભ્રૂણ વિકાસ દરમિયાન, 'સોમેટોપ્લુરા' (Somatopeura) અને 'સ્પ્લેન્ક્નોપ્લુરા' (Splanchnopleura) ની રચના કયા સ્તરના વિભાજનથી થાય છે?", "options": ["A) એક્ટોડર્મ (Ectoderm)", "B) એન્ડોડર્મ (Endoderm)", "C) મેસોડર્મ (Mesoderm)", "D) ટ્રોફોબ્લાસ્ટ (Trophoblast)"], "correct": 2, "explanation": "સોમેટોપ્લુરા અને સ્પ્લેન્ક્નોપ્લુરા મેસોડર્મના વિભાજનથી બને છે. એક્ટોડર્મ અને એન્ડોડર્મ આ રચનાઓનું નિર્માણ કરતા નથી, જ્યારે ટ્રોફોબ્લાસ્ટ ભ્રૂણીય પટલનો ભાગ છે, મેસોડર્મિક રચના નથી.", "ncert_ref": "ક દરમિયાન, 'ઇન્ટરમિડિયેટ મેસોડર્મ' ની રચના કયા અંગના વિકાસ સાથે સંકળાયેલ છે અને તેના વિકાસ દરમિયાન કયું પગલું સૌપ્રથમ થાય છે?", "options": ["A) મૂત્રપિંડ; નેફ્રોજેનિક કોર્ડનું નિર્માણ", "B) હૃદય; હૃદય નળીનું નિર્માણ", "C) ફેફસાં; ટ્રેકિયલ ડાયવર્ટિક્યુલમનું નિર્માણ", "D) યકૃત; હેપેટિક ડાયવર્ટિક્યુલમનું નિર્માણ"], "correct": 0, "explanation": "ઇન્ટરમિડિયટ મેસોડર્મ મૂત્રપિંડના વિકાસ સાથે સંકળાયેલ છે. તેના વિકાસ દરમિયાન સૌપ્રથમ પગલું નેફ્રોજેનિક કોર્ડનું નિર્માણ છે, જે પછીથી મૂત્રપિંડમાં વિકસે છે. હૃદય, ફેફસાં અને યકૃત અન્ય જર્મ લેયરો અને પ્રક્રિયાઓ સાથે સંકળાયેલ છે. આમ, વિકલ્પ A સાચો છે.", "ncert_ref": "Class XII - Chapter 3: માનવ પ્રજનન", "difficulty": "Hard", "num": 46}, {"question": "નીચેના પૈકી કયું વિધાન માનવ ભ્રૂણ વિકાસ દરમિયાન 'ઇન્ટરમિડિયેટ મેસોડર્મ' (Intermediate Mesoderm) વિશે ખોટું છે?", "options": ["A) તે યુરોજેનિટલ સિસ્ટમના વિકાસ માટે જવાબદાર છે.", "B) તે નોટોકોર્ડ અને સોમિટ્સ વચ્ચે સ્થિત હોય છે.", "C) તે હૃદય અને રુધિરવાહિનીઓના વિકાસમાં મુખ્ય ભૂમિકા ભજવે છે.", "D) તે નેફ્રિક ડક્ટ્સ અને ગોનાડ્સના નિર્માણમાં ફાળો આપે છે."], "correct": 2, "explanation": "ઇન્ટરમિડિયેટ મેસોડર્મ યુરોજેનિટલ સિસ્ટમ (નેફ્રિક ડક્ટ્સ, ગોનાડ્સ)ના વિકાસ માટે જવાબદાર છે અને નોટોકોર્ડ અને સોમિટ્સ વચ્ચે સ્થિત હોય છે. જોકે, હૃદય અને રુધિરવાહિનીઓનું નિર્માણ લેટરલ પ્લેટ મેસોડર્મમાંથી થાય છે, ઇન્ટરમિડિયેટ મેસોડર્મમાંથી નહીં. આથી વિકલ્પ C ખોટો છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 7: પ્રાણીઓમાં રચનાત્મક સંગઠન", "difficulty": "Hard", "num": 47}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
