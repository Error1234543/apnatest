<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - DNA ની રચના</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 DNA ની રચના</span>
                <span>🎯 Hard</span>
                <span>📝 33 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "DNA ના ડબલ હેલિક્સ મોડેલમાં, નાઇટ્રોજનયુક્ત ક્ષારકોની જોડી વચ્ચે કયા પ્રકારના બંધન જોવા મળે છે અને તેની સ્થિરતા માટે કયો પરિબળ જવાબદાર છે?", "options": ["A) હાઇડ્રોજન બંધન, વાન ડર વાલ્સ બળ", "B) આયનિક બંધન, હાઇડ્રોફોબિક અસર", "C) હાઇડ્રોજન બંધન, હાઇડ્રોફોબિક અસર", "D) પેપ્ટાઇડ બંધન, વાન ડર વાલ્સ બળ"], "correct": 2, "explanation": "DNA ના ડબલ હેલિક્સ મોડેલમાં, એડિનિન-થાયમિન અને ગ્વાનિન-સાયટોસિન વચ્ચે હાઇડ્રોજન બંધન જોવા મળે છે. હાઇડ્રોફોબિક અસર નાઇટ્રોજનયુક્ત ક્ષારકોની જોડીને સ્થિર રાખવામાં મદદ કરે છે. આયનિક બંધન અને પેપ્ટાઇડ બંધન DNA માં જોવા મળતા નથી. વાન ડર વાલ્સ બળ હાઇડ્રોફોબિક અસર કરતાં ઓછું મહત્વનું છે.", "ncert_ref": "Class XII - પ્રકરણ 6: આણ્વિક જનીનશાસ્ત્ર", "difficulty": "Hard", "num": 1}, {"question": "DNA ની રચનામાં, ફોસ્ફોડાયેસ્ટર બંધન ક્યાં જોવા મળે છે?", "options": ["A) નાઇટ્રોજનયુક્ત ક્ષારક અને ડિઓક્સીરિબોઝ વચ્ચે", "B) ડિઓક્સીરિબોઝ અને ફોસ્ફેટ જૂથ વચ્ચે", "C) ફોસ્ફેટ જૂથ અને નાઇટ્રોજનયુક્ત ક્ષારક વચ્ચે", "D) ડિઓક્સીરિબોઝના 5' કાર્બન અને 3' કાર્બન વચ્ચે"], "correct": 1, "explanation": "ફોસ્ફોડાયેસ્ટર બંધન ડિઓક્સીરિબોઝના 5' કાર્બન અને ફોસ્ફેટ જૂથ વચ્ચે બને છે, જે DNA ની શૃંખલાને જોડી રાખે છે. નાઇટ્રોજનયુક્ત ક્ષારક અને ડિઓક્સીરિબોઝ વચ્ચે ગ્લાયકોસિડિક બંધન જોવા મળે છે. ફોસ્ફેટ જૂથ અને નાઇટ્રોજનયુક્ત ક્ષારક વચ્ચે કોઈ બંધન જોવા મળતું નથી. ડિઓક્સીરિબોઝના 5' અને 3' કાર્બન વચ્ચે કોઈ બંધન જોવા મળતું નથી.", "ncert_ref": "Class XII - પ્રકરણ 6: આણ્વિક જનીનશાસ્ત્ર", "difficulty": "Hard", "num": 2}, {"question": "DNA ની બે શૃંખલાઓ વચ્ચે કયા પ્રકારની સંરચના જોવા મળે છે અને તે કેવી રીતે એકબીજા સાથે જોડાયેલી છે?", "options": ["A) સમાંતર, હાઇડ્રોજન બંધન દ્વારા", "B) વિપરીત સમાંતર, હાઇડ્રોજન બંધન દ્વારા", "C) સમાંતર, પેપ્ટાઇડ બંધન દ્વારા", "D) વિપરીત સમાંતર, આયનિક બંધન દ્વારા"], "correct": 1, "explanation": "DNA ની બે શૃંખલાઓ વિપરીત સમાંતર (antiparallel) હોય છે, જેમાં એક શૃંખલા 5' થી 3' દિશામાં અને બીજી 3' થી 5' દિશામાં હોય છે. આ શૃંખલાઓ હાઇડ્રોજન બંધન દ્વારા એકબીજા સાથે જોડાયેલી હોય છે. પેપ્ટાઇડ બંધન અને આયનિક બંધન DNA માં જોવા મળતા નથી.", "ncert_ref": "Class XII - પ્રકરણ 6: આણ્વિક જનીનશાસ્ત્ર", "difficulty": "Hard", "num": 3}, {"question": "DNA ની રચનામાં, કયા નાઇટ્રોજનયુક્ત ક્ષારકની જોડી વચ્ચે ત્રણ હાઇડ્રોજન બંધન જોવા મળે છે?", "options": ["A) એડિનિન અને થાયમિન", "B) ગ્વાનિન અને સાયટોસિન", "C) એડિનિન અને સાયટોસિન", "D) ગ્વાનિન અને થાયમિન"], "correct": 1, "explanation": "ગ્વાનિન અને સાયટોસિન વચ્ચે ત્રણ હાઇડ્રોજન બંધન જોવા મળે છે, જ્યારે એડિનિન અને થાયમિન વચ્ચે ફક્ત બે હાઇડ્રોજન બંધન જોવા મળે છે. એડિનિન અને સાયટોસિન, ગ્વાનિન અને થાયમિન વચ્ચે હાઇડ્રોજન બંધન જોવા મળતું નથી.", "ncert_ref": "Class XII - પ્રકરણ 6: આણ્વિક જનીનશાસ્ત્ર", "difficulty": "Hard", "num": 4}, {"question": "DNA ની રચનામાં, કયા પરિબળને લીધે DNA ની ડબલ હેલિક્સ સ્થિર રહે છે?", "options": ["A) હાઇડ્રોજન બંધન અને હાઇડ્રોફોબિક અસર", "B) આયનિક બંધન અને વાન ડર વાલ્સ બળ", "C) પેપ્ટાઇડ બંધન અને હાઇડ્રોજન બંધન", "D) હાઇડ્રોફિલિક અસર અને આયનિક બંધન"], "correct": 0, "explanation": "DNA ની ડબલ હેલિક્સ સ્થિરતા હાઇડ્રોજન બંધન અને હાઇડ્રોફોબિક અસરને લીધે રહે છે. હાઇડ્રોજન બંધન નાઇટ્રોજનયુક્ત ક્ષારકોની જોડીને જોડી રાખે છે, જ્યારે હાઇડ્રોફોબિક અસર નાઇટ્રોજનયુક્ત ક્ષારકોને પાણીના વાતાવરણથી દૂર રાખે છે. આયનિક બંધન, પેપ્ટાઇડ બંધન, અને હાઇડ્રોફિલિક અસર DNA ની સ્થિરતામાં મહત્વની ભૂમિકા ભજવતા નથી.", "ncert_ref": "Class XII - પ્રકરણ 6: આણ્વિક જનીનશાસ્ત્ર", "difficulty": "Hard", "num": 5}, {"question": "DNA ની બે શૃંખલાઓ વચ્ચેના અંતર અને તેની સ્થિરતામાં યોગદાન આપતી બાબતો વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) એડિનિન અને થાયમિન વચ્ચેના બંધન કરતાં ગ્વાનિન અને સાયટોસિન વચ્ચેના બંધન વધુ મજબૂત હોય છે.", "B) DNA ની ડબલ હેલિક્સ સ્ટ્રક્ચરમાં, બે શૃંખલાઓ વચ્ચેનું અંતર સમાન રહે છે કારણ કે પ્યુરિન અને પિરિમિડિન ક્ષારકોની જોડી હંમેશા એકસરખી જગ્યા લે છે.", "C) ફોસ્ફોડાયેસ્ટર બંધન DNA ની શૃંખલાની અંદર, શર્કરા-ફોસ્ફેટ બેકબોનમાં જોવા મળે છે.", "D) DNA ની સ્થિરતામાં હાઇડ્રોજન બંધન અને હાઇડ્રોફોબિક ઇન્ટરેક્શન બંને યોગદાન આપે છે."], "correct": 1, "explanation": "વિકલ્પ B ખોટો છે કારણ કે DNA ની ડબલ હેલિક્સમાં, પ્યુરિન (A, G) અને પિરિમિડિન (T, C) ક્ષારકોની જોડી વચ્ચેનું અંતર સમાન નથી. એડિનિન-થાયમિન જોડી કરતાં ગ્વાનિન-સાયટોસિન જોડી વધુ પહોળી હોય છે, પરંતુ હેલિક્સની રચના એવી છે કે અંતર સરેરાશ સમાન રહે છે. વિકલ્પ A સાચો છે કારણ કે G-C વચ્ચે ત્રણ હાઇડ્રોજન બંધન હોય છે જ્યારે A-T વચ્ચે બે હોય છે. વિકલ્પ C સાચો છે કારણ કે ફોસ્ફોડાયેસ્ટર બંધન શર્કરા-ફોસ્ફેટ બેકબોનમાં જોવા મળે છે. વિકલ્પ D સાચો છે કારણ કે હાઇડ્રોજન બંધન અને હાઇડ્રોફોબિક ઇન્ટરેક્શન બંને DNA ની સ્થિરતામાં યોગદાન આપે છે.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક જીવવિજ્ઞાન", "difficulty": "Hard", "num": 6}, {"question": "DNA ની રચનામાં, નાઇટ્રોજનયુક્ત ક્ષારકોની વ્યવસ્થા વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) DNA ની એક શૃંખલામાં એડિનિન અને થાયમિનની સંખ્યા સમાન હોતી નથી.", "B) DNA ની એક શૃંખલામાં એડિનિન અને ગ્વાનિનની સંખ્યા સમાન હોતી નથી.", "C) DNA ની એક શૃંખલામાં પ્યુરિન અને પિરિમિડિનની સંખ્યા સમાન હોતી નથી.", "D) DNA ની એક શૃંખલામાં સાયટોસિન અને થાયમિનની સંખ્યા સમાન હોતી નથી."], "correct": 2, "explanation": "વિકલ્પ C ખોટો છે કારણ કે ચાર્ગાફના નિયમ મુજબ, DNA ની એક શૃંખલામાં પ્યુરિન (A + G) અને પિરિમિડિન (T + C)ની સંખ્યા સમાન હોય છે. વિકલ્પ A સાચો છે કારણ કે એક શૃંખલામાં A અને Tની સંખ્યા સમાન હોતી નથી, પરંતુ બે શૃંખલાઓમાં A = T અને G = C હોય છે. વિકલ્પ B સાચો છે કારણ કે એક શૃંખલામાં A અને Gની સંખ્યા સમાન હોતી નથી. વિકલ્પ D સાચો છે કારણ કે એક શૃંખલામાં C અને Tની સંખ્યા સમાન હોતી નથી.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક જીવવિજ્ઞાન", "difficulty": "Hard", "num": 7}, {"question": "DNA ની ડબલ હેલિક્સ સ્ટ્રક્ચરમાં, નીચેનામાંથી કયું પરિબળ DNA ની શૃંખલાઓને અલગ પાડવાની ક્ષમતા ધરાવે છે?", "options": ["A) ઉચ્ચ તાપમાન", "B) નીચું pH", "C) ઉચ્ચ દબાણ", "D) ઉચ્ચ ક્ષાર સાંદ્રતા"], "correct": 0, "explanation": "વિકલ્પ A સાચો છે કારણ કે ઉચ્ચ તાપમાને હાઇડ્રોજન બંધન તૂટી જાય છે, જેના કારણે DNA ની શૃંખલાઓ અલગ પડે છે (ડીનેચરેશન). વિકલ્પ B ખોટો છે કારણ કે નીચું pH DNA ની સ્થિરતાને અસર કરતું નથી. વિકલ્પ C ખોટો છે કારણ કે ઉચ્ચ દબાણની અસર DNA ની રચના પર નગણ્ય હોય છે. વિકલ્પ D ખોટો છે કારણ કે ઉચ્ચ ક્ષાર સાંદ્રતા DNA ની સ્થિરતાને વધારે છે.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક જીવવિજ્ઞાન", "difficulty": "Hard", "num": 8}, {"question": "DNA ની રચનામાં, નીચેનામાંથી કયું વિધાન DNA ની અર્ધ-સંરક્ષણશીલ પ્રતિકૃતિ વિશે સાચું નથી?", "options": ["A) પ્રતિકૃતિ દરમિયાન, દરેક નવી DNA શૃંખલા એક જૂની શૃંખલા સાથે જોડાયેલી હોય છે.", "B) પ્રતિકૃતિ દરમિયાન, DNA પોલિમરેઝ ઉત્સેચક દ્વારા નવી શૃંખલાનું સંશ્લેષણ થાય છે.", "C) પ્રતિકૃતિ દરમિયાન, નવી શૃંખલા સંપૂર્ણપણે નવી હોય છે અને જૂની શૃંખલા સંપૂર્ણપણે અલગ રહે છે.", "D) પ્રતિકૃતિ દરમિયાન, હેલિકેઝ ઉત્સેચક DNA ની ડબલ હેલિક્સને અલગ પાડે છે."], "correct": 2, "explanation": "વિકલ્પ C ખોટો છે કારણ કે DNA ની પ્રતિકૃતિ અર્ધ-સંરક્ષણશીલ હોય છે, જેમાં દરેક નવી DNA શૃંખલા એક જૂની શૃંખલા સાથે જોડાયેલી હોય છે. વિકલ્પ A સાચો છે કારણ કે અર્ધ-સંરક્ષણશીલ પ્રતિકૃતિમાં, દરેક નવી શૃંખલા એક જૂની શૃંખલા સાથે જોડાયેલી હોય છે. વિકલ્પ B સાચો છે કારણ કે DNA પોલિમરેઝ ઉત્સેચક દ્વારા નવી શૃંખલાનું સંશ્લેષણ થાય છે. વિકલ્પ D સાચો છે કારણ કે હેલિકેઝ ઉત્સેચક DNA ની ડબલ હેલિક્સને અલગ પાડે છે.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક જીવવિજ્ઞાન", "difficulty": "Hard", "num": 9}, {"question": "DNA ની રચનામાં, નીચેનામાંથી કયું વિધાન નાઇટ્રોજનયુક્ત ક્ષારકોની રાસાયણિક રચના વિશે સાચું છે?", "options": ["A) એડિનિન અને ગ્વાનિન પિરિમિડિન ક્ષારકો છે.", "B) થાયમિન અને સાયટોસિન પ્યુરિન ક્ષારકો છે.", "C) એડિનિન અને ગ્વાનિન પ્યુરિન ક્ષારકો છે, જ્યારે થાયમિન અને સાયટોસિન પિરિમિડિન ક્ષારકો છે.", "D) એડિનિન અને થાયમિન પ્યુરિન ક્ષારકો છે, જ્યારે ગ્વાનિન અને સાયટોસિન પિરિમિડિન ક્ષારકો છે."], "correct": 2, "explanation": "વિકલ્પ C સાચો છે કારણ કે એડિનિન અને ગ્વાનિન પ્યુરિન ક્ષારકો છે, જ્યારે થાયમિન અને સાયટોસિન પિરિમિડિન ક્ષારકો છે. વિકલ્પ A ખોટો છે કારણ કે એડિનિન અને ગ્વાનિન પ્યુરિન ક્ષારકો છે. વિકલ્પ B ખોટો છે કારણ કે થાયમિન અને સાયટોસિન પિરિમિડિન ક્ષારકો છે. વિકલ્પ D ખોટો છે કારણ કે ગ્વાનિન પ્યુરિન ક્ષારક છે અને થાયમિન પિરિમિડિન ક્ષારક છે.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક જીવવિજ્ઞાન", "difficulty": "Hard", "num": 10}, {"question": "DNA ની ડબલ હેલિક્સ રચનામાં, એડિનિન (A) અને થાયમિન (T) વચ્ચે કેટલા હાઇડ્રોજન બંધન જોવા મળે છે, જ્યારે સાયટોસિન (C) અને ગ્વાનિન (G) વચ્ચે કેટલા હાઇડ્રોજન બંધન જોવા મળે છે?", "options": ["A) A-T વચ્ચે 2, C-G વચ્ચે 3", "B) A-T વચ્ચે 3, C-G વચ્ચે 2", "C) A-T વચ્ચે 1, C-G વચ્ચે 4", "D) A-T વચ્ચે 2, C-G વચ્ચે 2"], "correct": 0, "explanation": "DNA ની ડબલ હેલિક્સ રચનામાં, એડિનિન (A) અને થાયમિન (T) વચ્ચે 2 હાઇડ્રોજન બંધન જોવા મળે છે, જ્યારે સાયટોસિન (C) અને ગ્વાનિન (G) વચ્ચે 3 હાઇડ્રોજન બંધન જોવા મળે છે. આ બંધનો DNA ની સ્થિરતામાં મહત્વનો ફાળો આપે છે. વિકલ્પ B, C, અને D ખોટા છે કારણ કે તેઓ હાઇડ્રોજન બંધનની સંખ્યાને ખોટી રીતે દર્શાવે છે.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક આનુવંશિકતા", "difficulty": "Hard", "num": 11}, {"question": "DNA ની રચનામાં, નીચેનામાંથી કયું વિધાન ફોસ્ફોડાયેસ્ટર બંધન વિશે સાચું નથી?", "options": ["A) ફોસ્ફોડાયેસ્ટર બંધન DNA ની શૃંખલામાં શર્કરા અને ફોસ્ફેટ વચ્ચે બને છે.", "B) ફોસ્ફોડાયેસ્ટર બંધન DNA ની બે શૃંખલાઓ વચ્ચે બને છે.", "C) ફોસ્ફોડાયેસ્ટર બંધન 5' કાર્બન અને 3' કાર્બન વચ્ચે બને છે.", "D) ફોસ્ફોડાયેસ્ટર બંધન DNA ની શૃંખલાને સ્થિર રાખવામાં મદદ કરે છે."], "correct": 1, "explanation": "ફોસ્ફોડાયેસ્ટર બંધન DNA ની શૃંખલામાં શર્કરા (ડિઓક્સીરાઇબોઝ) અને ફોસ્ફેટ વચ્ચે બને છે, જ્યારે DNA ની બે શૃંખલાઓ વચ્ચે હાઇડ્રોજન બંધન જોવા મળે છે. વિકલ્પ B ખોટો છે કારણ કે ફોસ્ફોડાયેસ્ટર બંધન DNA ની બે શૃંખલાઓ વચ્ચે બનતું નથી. વિકલ્પ A, C, અને D સાચા છે.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક આનુવંશિકતા", "difficulty": "Hard", "num": 12}, {"question": "DNA ની ડબલ હેલિક્સ રચનામાં, નીચેનામાંથી કયું પરિબળ DNA ની શૃંખલાઓને અલગ પાડવામાં મદદ કરે છે?", "options": ["A) હાઇડ્રોજન બંધન", "B) ઉચ્ચ તાપમાન", "C) ફોસ્ફોડાયેસ્ટર બંધન", "D) વાન ડર વાલ્સ બળ"], "correct": 1, "explanation": "DNA ની ડબલ હેલિક્સ શૃંખલાઓને અલગ પાડવામાં ઉચ્ચ તાપમાન મદદ કરે છે, કારણ કે ઉચ્ચ તાપમાને હાઇડ્રોજન બંધન તૂટી જાય છે. હાઇડ્રોજન બંધન (A) DNA ની શૃંખલાઓને જોડી રાખે છે, ફોસ્ફોડાયેસ્ટર બંધન (C) DNA ની શૃંખલાને સ્થિર રાખે છે, અને વાન ડર વાલ્સ બળ (D) DNA ની સ્થિરતામાં યોગદાન આપે છે પરંતુ શૃંખલાઓને અલગ પાડવામાં મદદ કરતું નથી.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');

                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;

                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';

                const userAns=userAnswers[index], correctAns=q.correct;

                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';

                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{

                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
