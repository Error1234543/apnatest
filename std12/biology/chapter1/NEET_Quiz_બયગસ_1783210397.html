<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - બાયોગેસ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 બાયોગેસ</span>
                <span>🎯 Hard</span>
                <span>📝 36 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "બાયોગેસના ઉત્પાદન દરમિયાન મીથેન બેક્ટરિયા દ્વારા કયા પદાર્થનો ઉપયોગ થાય છે?", "options": ["A) ગ્લુકોઝ અને ફ્રક્ટોઝ", "B) એસિટિક એસિડ અને હાઇડ્રોજન", "C) લેક્ટિક એસિડ અને ઇથેનોલ", "D) સ્ટાર્ચ અને સેલ્યુલોઝ"], "correct": 1, "explanation": "બાયોગેસ ઉત્પાદનના અંતિમ તબક્કામાં મીથેનોજેનિક બેક્ટરિયા એસિટિક એસિડ (CH₃COOH) અને હાઇડ્રોજન (H₂)નો ઉપયોગ કરીને મીથેન (CH₄) અને કાર્બન ડાયોક્સાઇડ (CO₂) ઉત્પન્ન કરે છે. ગ્લુકોઝ અને ફ્રક્ટોઝ (A) હાઇડ્રોલિસિસ દરમિયાન તૂટે છે, પરંતુ મીથેન ઉત્પાદન માટે સીધા ઉપયોગમાં લેવાતા નથી. લેક્ટિક એસિડ અને ઇથેનોલ (C) બાયોગેસ પ્રક્રિયામાં મુખ્ય પદાર્થ નથી, જ્યારે સ્ટાર્ચ અને સેલ્યુલોઝ (D) કચરાનાં સ્વરૂપે હોય છે, પરંતુ મીથેનોજેનિક બેક્ટરિયા દ્વારા સીધા ઉપયોગમાં લેવાતા નથી.", "ncert_ref": "Class XII - Chapter 10: સજીવ અને અસજીવ વચ્ચેની પરસ્પર ક્રિયા", "difficulty": "Hard", "num": 1}, {"question": "બાયોગેસ પ્લાન્ટમાં સબસ્ટ્રેટ તરીકે કયા પદાર્થનો ઉપયોગ થતો નથી?", "options": ["A) ગાયનું છાણ", "B) મનુષ્યના મળમૂત્ર", "C) પ્લાસ્ટિકના કચરા", "D) ખેતીના અવશેષો"], "correct": 2, "explanation": "બાયોગેસ પ્લાન્ટમાં સબસ્ટ્રેટ તરીકે કાર્બનિક પદાર્થો જેવા કે ગાયનું છાણ (A), મનુષ્યના મળમૂત્ર (B), અને ખેતીના અવશેષો (D)નો ઉપયોગ થાય છે, કારણ કે તેમાં બેક્ટરિયા દ્વારા વિઘટન કરવા યોગ્ય કાર્બનિક સંયોજનો હોય છે. પ્લાસ્ટિકના કચરા (C) અકાર્બનિક અને અવિઘટનીય હોય છે, તેથી તે બાયોગેસ ઉત્પાદન માટે યોગ્ય નથી.", "ncert_ref": "Class XII - Chapter 10: સજીવ અને અસજીવ વચ્ચેની પરસ્પર ક્રિયા", "difficulty": "Hard", "num": 2}, {"question": "બાયોગેસમાં મીથેનની ટકાવારી સામાન્ય રીતે કેટલી હોય છે?", "options": ["A) 20-30%", "B) 40-50%", "C) 50-70%", "D) 80-90%"], "correct": 2, "explanation": "બાયોગેસમાં મીથેન (CH₄)ની ટકાવારી સામાન્ય રીતે 50-70% હોય છે. કાર્બન ડાયોક્સાઇડ (CO₂) અને અન્ય વાયુઓ જેવા કે હાઇડ્રોજન સલ્ફાઇડ (H₂S) પણ હાજર હોય છે. 20-30% (A) અને 40-50% (B) એ ટૂંકી ટકાવારી છે, જ્યારે 80-90% (D) અતિશય ઉચ્ચ છે અને પ્રાયોગિક રીતે શક્ય નથી.", "ncert_ref": "Class XII - Chapter 10: સજીવ અને અસજીવ વચ્ચેની પરસ્પર ક્રિયા", "difficulty": "Hard", "num": 3}, {"question": "બાયોગેસ પ્લાન્ટમાં કયા બેક્ટરિયાનું કામ હાઇડ્રોલિસિસ છે?", "options": ["A) મીથેનોજેનિક બેક્ટરિયા", "B) એસિડોજેનિક બેક્ટરિયા", "C) હાઇડ્રોલિટિક બેક્ટરિયા", "D) નાઇટ્રોજેન ફિક્સિંગ બેક્ટરિયા"], "correct": 2, "explanation": "બાયોગેસ પ્લાન્ટમાં હાઇડ્રોલિસિસનું કામ હાઇડ્રોલિટિક બેક્ટરિયા (C) કરે છે, જે જટિલ કાર્બનિક પદાર્થોને સરળ સંયોજનો જેવા કે મોનોસેકેરાઇડ્સ અને એમિનો એસિડ્સમાં તોડે છે. મીથેનોજેનિક બેક્ટરિયા (A) મીથેન ઉત્પન્ન કરે છે, એસિડોજેનિક બેક્ટરિયા (B) એસિડ ઉત્પન્ન કરે છે, અને નાઇટ્રોજેન ફિક્સિંગ બેક્ટરિયા (D) નાઇટ્રોજન સ્થિરીકરણમાં ભાગ લે છે.", "ncert_ref": "Class XII - Chapter 10: સજીવ અને અસજીવ વચ્ચેની પરસ્પર ક્રિયા", "difficulty": "Hard", "num": 4}, {"question": "બાયોગેસ ઉત્પાદન દરમિયાન કયા તબક્કામાં એસિટિક એસિડ ઉત્પન્ન થાય છે?", "options": ["A) હાઇડ્રોલિસિસ", "B) એસિડોજેનેસિસ", "C) મીથેનોજેનેસિસ", "D) ફરમેન્ટેશન"], "correct": 1, "explanation": "બાયોગેસ ઉત્પાદન દરમિયાન એસિડોજેનેસિસ (B) તબક્કામાં એસિડોજેનિક બેક્ટરિયા દ્વારા સરળ સંયોજનો જેવા કે વોલેટાઇલ ફેટી એસિડ્સ (VFA) અને એસિટિક એસિડ ઉત્પન્ન થાય છે. હાઇડ્રોલિસિસ (A) જટિલ સંયોજનોને તોડે છે, મીથેનોજેનેસિસ (C) મીથેન ઉત્પન્ન કરે છે, અને ફરમેન્ટેશન (D) એ એક સામાન્ય પ્રક્રિયા છે પરંતુ બાયોગેસ ઉત્પાદનના સ્પષ્ટ તબક્કા તરીકે ઓળખાતી નથી.", "ncert_ref": "Class XII - Chapter 10: સજીવ અને અસજીવ વચ્ચેની પરસ્પર ક્રિયા", "difficulty": "Hard", "num": 5}, {"question": "બાયોગેસ પ્લાન્ટમાં મીથેનોજેનિક બેક્ટરિયા દ્વારા મીથેન ઉત્પન્ન થવા માટે કયા મધ્યવર્તી પદાર્થની જરૂર રહે છે?", "options": ["A) ગ્લુકોઝ", "B) એસિટિક એસિડ", "C) લેક્ટિક એસિડ", "D) ઇથેનોલ"], "correct": 1, "explanation": "મીથેનોજેનિક બેક્ટરિયા એસિટિક એસિડ (CH₃COOH), હાઇડ્રોજન (H₂), અને કાર્બન ડાયોક્સાઇડ (CO₂) નો ઉપયોગ કરીને મીથેન (CH₄) ઉત્પન્ન કરે છે. એસિટિક એસિડ એ મીથેન ઉત્પાદનનો મુખ્ય મધ્યવર્તી પદાર્થ છે. ગ્લુકોઝ, લેક્ટિક એસિડ, અને ઇથેનોલ એ મીથેનોજેનિક બેક્ટરિયાના સીધા સબસ્ટ્રેટ નથી, પરંતુ તે પહેલાના તબક્કામાં હાઇડ્રોલિસિસ અને એસિડોજેનિક તબક્કામાં વિઘટન પામે છે.", "ncert_ref": "Class XII - Chapter 10: સજીવ અને પર્યાવરણ (Microbes in Human Welfare)", "difficulty": "Hard", "num": 6}, {"question": "બાયોગેસ પ્લાન્ટમાં કયા પરિબળને લીધે મીથેન ઉત્પાદન દરમાં સૌથી વધુ ઘટાડો થાય છે?", "options": ["A) ઓક્સિજનની હાજરી", "B) તાપમાનમાં ઘટાડો", "C) pHમાં વધારો", "D) સબસ્ટ્રેટની ઉણપ"], "correct": 0, "explanation": "મીથેનોજેનિક બેક્ટરિયા એનેરોબિક (ઓક્સિજનરહિત) પરિસ્થિતિમાં જ કામ કરે છે. ઓક્સિજનની હાજરીમાં આ બેક્ટરિયા મરી જાય છે અથવા નિષ્ક્રિય બને છે, જેથી મીથેન ઉત્પાદન બંધ થઈ જાય છે. તાપમાનમાં ઘટાડો, pHમાં ફેરફાર, અથવા સબસ્ટ્રેટની ઉણપ પણ ઉત્પાદનને અસર કરે છે, પરંતુ ઓક્સિજનની હાજરી સૌથી ઘાતક છે.", "ncert_ref": "Class XII - Chapter 10: સજીવ અને પર્યાવરણ (Microbes in Human Welfare)", "difficulty": "Hard", "num": 7}, {"question": "બાયોગેસ પ્લાન્ટમાં કયા તબક્કામાં હાઇડ્રોજન ગેસ ઉત્પન્ન થાય છે?", "options": ["A) હાઇડ્રોલિસિસ", "B) એસિડોજેનિક", "C) મીથેનોજેનિક", "D) ફેરમેન્ટેશન"], "correct": 1, "explanation": "એસિડોજેનિક તબક્કામાં, એસિડોજેનિક બેક્ટરિયા દ્વારા કાર્બનિક એસિડ અને હાઇડ્રોજન ગેસ ઉત્પન્ન થાય છે. હાઇડ્રોલિસિસ તબક્કામાં જટિલ કાર્બોદિતોનું વિઘટન થાય છે, જ્યારે મીથેનોજેનિક તબક્કામાં મીથેન ઉત્પન્ન થાય છે. ફેરમેન્ટેશન એ એક સામાન્ય પ્રક્રિયા છે, પરંતુ બાયોગેસ ઉત્પાદનમાં એસિડોજેનિક તબક્કો હાઇડ્રોજન ઉત્પાદન માટે જવાબદાર છે.", "ncert_ref": "Class XII - Chapter 10: સજીવ અને પર્યાવરણ (Microbes in Human Welfare)", "difficulty": "Hard", "num": 8}, {"question": "બાયોગેસ પ્લાન્ટમાં કયા પદાર્થનું વિઘટન સૌથી ધીમે થાય છે?", "options": ["A) સેલ્યુલોઝ", "B) પ્રોટીન", "C) લિપિડ", "D) સ્ટાર્ચ"], "correct": 0, "explanation": "સેલ્યુલોઝ એ એક જટિલ પોલિસેકરાઇડ છે, જેનું વિઘટન કરવા માટે વિશિષ્ટ ઉત્સેચકો (સેલ્યુલેઝ) ની જરૂર પડે છે. આ કારણે, સેલ્યુલોઝનું વિઘટન પ્રોટીન, લિપિડ, અથવા સ્ટાર્ચ કરતાં ધીમે થાય છે. પ્રોટીન અને લિપિડનું વિઘટન સરળતાથી થાય છે, જ્યારે સ્ટાર્ચ એ એક સરળ કાર્બોદિત છે જે ઝડપથી હાઇડ્રોલાઇઝ થાય છે.", "ncert_ref": "Class XII - Chapter 10: સજીવ અને પર્યાવરણ (Microbes in Human Welfare)", "difficulty": "Hard", "num": 9}, {"question": "બાયોગેસ પ્લાન્ટમાં કયા હોર્મોન અથવા ઉત્સેચકની હાજરી મીથેન ઉત્પાદનને પ્રભાવિત કરતી નથી?", "options": ["A) સેલ્યુલેઝ", "B) પ્રોટિએઝ", "C) ઇન્સ્યુલિન", "D) લાઇપેઝ"], "correct": 2, "explanation": "ઇન્સ્યુલિન એ એક હોર્મોન છે જે ગ્લુકોઝના ચયાપચયને નિયંત્રિત કરે છે, પરંતુ તે બાયોગેસ ઉત્પાદન પ્રક્રિયામાં કોઈ ભૂમિકા ભજવતું નથી. સેલ્યુલેઝ, પ્રોટિએઝ, અને લાઇપેઝ એ ઉત્સેચકો છે જે અનુક્રમે સેલ્યુલોઝ, પ્રોટીન, અને લિપિડના વિઘટનમાં મદદ કરે છે, જે બાયોગેસ ઉત્પાદન માટે મહત્વપૂર્ણ છે.", "ncert_ref": "Class XII - Chapter 10: સજીવ અને પર્યાવરણ (Microbes in Human Welfare)", "difficulty": "Hard", "num": 10}, {"question": "બાયોગેસ પ્લાન્ટમાં કયા તબક્કામાં pH નું મૂલ્ય સૌથી ઓછું હોય છે અને તે કયા કારણસર થાય છે?", "options": ["A) હાઇડ્રોલિસિસ તબક્કા દરમિયાન, કારણ કે કાર્બોદિતોનું વિઘટન થાય છે", "B) એસિડોજેનિક તબક્કા દરમિયાન, કારણ કે વોલેટાઇલ ફેટી એસિડ અને લેક્ટિક એસિડ ઉત્પન્ન થાય છે", "C) મીથેનોજેનિક તબક્કા દરમિયાન, કારણ કે મીથેન ઉત્પન્ન થાય છે", "D) એસિટોજેનિક તબક્કા દરમિયાન, કારણ કે એસિટેટ ઉત્પન્ન થાય છે"], "correct": 1, "explanation": "એસિડોજેનિક તબક્કા દરમિયાન, એસિડ ઉત્પન્ન થાય છે (જેમ કે વોલેટાઇલ ફેટી એસિડ અને લેક્ટિક એસિડ), જેના કારણે pH નું મૂલ્ય સૌથી ઓછું (અમ્લીય) થાય છે. હાઇડ્રોલિસિસ તબક્કામાં pH સાપેક્ષ રીતે સ્થિર રહે છે, જ્યારે મીથેનોજેનિક તબક્કામાં pH સુધરે છે કારણ કે એસિડનું વિઘટન થાય છે. એસિટોજેનિક તબક્કામાં એસિટેટ ઉત્પન્ન થાય છે, પરંતુ તે એસિડોજેનિક તબક્કા જેટલું અમ્લીય નથી.", "ncert_ref": "Class XII - Chapter 10: સજીવો અને પર્યાવરણ (Organisms and Environment)", "difficulty": "Hard", "num": 11}, {"question": "બાયોગેસ પ્લાન્ટમાં કયા બેક્ટરિયલ જૂથ દ્વારા એસિટેટનું મીથેનમાં રૂપાંતર થાય છે?", "options": ["A) ક્લોસ્ટ્રિડિયમ", "B) મીથેનોબેક્ટરિયમ", "C) બેસિલસ", "D) એશેરિકિયા"], "correct": 1, "explanation": "મીથેનોબેક્ટરિયમ એ મીથેનોજેનિક બેક્ટરિયાનું જૂથ છે, જે એસિટેટ (CH₃COO⁻) નું મીથેન (CH₄) અને કાર્બન ડાયોક્સાઇડ (CO₂) માં રૂપાંતર કરે છે. ક્લોસ્ટ્રિડિયમ એસિડોજેનિક બેક્ટરિયા છે, જ્યારે બેસિલસ અને એશેરિકિયા બાયોગેસ ઉત્પાદનમાં સીધી ભૂમિકા ભજવતાં નથી.", "ncert_ref": "Class XII - Chapter 10: સજીવો અને પર્યાવરણ (Organisms and Environment)", "difficulty": "Hard", "num": 12}, {"question": "બાયો ઝ અને હેમિસેલ્યુલોઝનું વિઘટન થઈ શરકરામાં રૂપાંતર થાય છે, જ્યારે લિગ્નિનનું વિઘટન ખૂબ જ ધીમું હોય છે. એસિડોજેનેસિસ, એસિટોજેનેસિસ, અને મીથેનોજેનેસિસ પગલાં હાઇડ્રોલિસિસ પછી થાય છે અને તેની ગતિ હાઇડ્રોલિસિસ પર આધાર રાખે છે.", "ncert_ref": "Class XII - Chapter 10: સજીવ અને અસજીવ વચ્ચેની પરસ્પર ક્રિયા (બાયોગેસ ઉત્પાદનની પ્રક્રિયા)", "difficulty": "Hard", "num": 23}, {"question": "બાયોગેસ પ્લાન્ટમાં નીચેનામાંથી કયા પરિબળને લીધે મીથેન ઉત્પાદન દરમાં અચાનક ઘટાડો થાય છે, પરંતુ તે પુનઃસ્થાપિત થઈ શકે છે?", "options": ["A) pH નું મૂલ્ય 6.5 થી 5.0 સુધી ઘટવું", "B) તાપમાન 35°C થી 50°C સુધી વધવું", "C) સબસ્ટ્રેટમાં અમોનિયાની સાંદ્રતા 2000 mg/L સુધી વધવી", "D) ઓક્સિજનની હાજરી 1% સુધી વધવી"], "correct": 2, "explanation": "અમોનિયાની સાંદ્રતા 2000 mg/L સુધી વધવાથી મીથેનોજેનિક બેક્ટરિયા પર વિષાક્ત અસર થાય છે, પરંતુ જો અમોનિયાની સાંદ્રતા ઘટાડવામાં આવે તો મીથેન ઉત્પાદન પુનઃસ્થાપિત થઈ શકે છે. pH નું મૂલ્ય 5.0 સુધી ઘટવાથી મીથેનોજેનિક બેક્ટરિયા મરી જાય છે અને મીથેન ઉત્પાદન પુનઃસ્થાપિત થતું નથી. તાપમાન 50°C સુધી વધવાથી થર્મોફિલિક બેક્ટરિયા સક્રિય થાય છે, પરંતુ મીથેન ઉત્પાદન દર ઘટતો નથી. ઓક્સિજનની હાજરી મીથેનોજેનિક બેક્ટરિયા માટે ઘાતક હોય છે અને મીથેન ઉત્પાદન પુનઃસ્થાપિત થતું નથી.", "ncert_ref": "Class XII - Chapter 10: સજીવ અને અસજીવ વચ્ચેની પરસ્પર ક્રિયા (બાયોગેસ પ્લાન્ટના પરિબળો)", "difficulty": "Hard", "num": 24}, {"question": "બાયોગેસ પ્લાન્ટમાં નીચેનામાંથી કયા બેક્ટરિયલ જૂથ દ્વારા પ્રોપિયોનેટનું એસિટેટ, CO₂, અને H₂ માં રૂપાંતર થાય છે?", "options": ["A) હાઇડ્રોલાઇટિક બેક્ટરિયા", "B) એસિડોજેનિક બેક્ટરિયા", "C) એસિટોજેનિક બેક્ટરિયા", "D) મીથેનોજેનિક બેક્ટરિયા"], "correct": 2, "explanation": "એસિટોજેનિક બેક્ટરિયા (જેવા કે *Syntrophobacter*) પ્રોપિયોનેટનું એસિટેટ, CO₂, અને H₂ માં રૂપાંતર કરે છે. આ પ્રક્રિયા મીથેનોજેનેસિસ માટે મહત્વપૂર્ણ છે, કારણ કે મીથેનોજેનિક બેક્ટરિયા એસિટેટ, CO₂, અને H₂ નો ઉપયોગ મીથેન ઉત્પન્ન કરવા માટે કરે છે. હાઇડ્રોલાઇટિક બેક્ટરિયા જટિલ કાર્બોદિતોનું વિઘટન કરે છે, એસિડોજેનિક બેક્ટરિયા શરકરાનું વોલેટાઇલ ફેટી એસિડમાં રૂપાંતર કરે છે, અને મીથેનોજેનિક બેક્ટરિયા મીથેન ઉત્પન્ન કરે છે.", "ncert_ref": "Class XII - Chapter 10: સજીવ અને અસજીવ વચ્ચેની પરસ્પર ક્રિયા (બાયોગેસ ઉત્પાદનના તબક્કા)", "difficulty": "Hard", "num": 25}, {"question": "બાયોગેસ પ્લાન્ટમાં જો સબસ્ટ્રેટ તરીકે ગાયના ગોબર અને ખેતીના અવશેષો (લિગ્નોસેલ્યુલોઝિક કચરો)નો સમાવેશ કરવામાં આવે, તો નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) લિગ્નોસેલ્યુલોઝિક કચરાનું વિઘટન ધીમે થવાને કારણે મીથેન ઉત્પાદન દર ઘટશે, પરંતુ ગાયના ગોબરમાં રહેલા સરળ કાર્બોદિતો મીથેન ઉત્પાદનને વેગ આપશે.", "B) લિગ્નોસેલ્યુલોઝિક કચરાનું વિઘટન ઝડપી થશે કારણ કે ગાયના ગોબરમાં રહેલા ઉત્સેચકો લિગ્નિન અને સેલ્યુલોઝના વિઘટનને પ્રોત્સાહન આપશે.", "C) ગાયના ગોબર અને લિગ્નોસેલ્યુલોઝિક કચરાનું મિશ્રણ મીથેન ઉત્પાદન દરને સંપૂર્ણપણે અવરોધશે કારણ કે લિગ્નિન મીથેનોજેનિક બેક્ટરિયા માટે વિષાક્ત હશે.", "D) લિગ્નોસેલ્યુલોઝિક કચરાનું વિઘટન મીથેન ઉત્પાદન દર પર કોઈ અસર કરશે નહીં, કારણ કે મીથેનોજેનિક બેક્ટરિયા ફક્ત સરળ કાર્બોદિતો પર જ કામ કરે છે."], "correct": 0, "explanation": "લિગ્નોસેલ્યુલોઝિક કચરાનું વિઘટન ધીમું હોય છે કારણ કે લિગ્નિન અને સેલ્યુલોઝના જટિલ રચનાને તોડવા માટે વિશેષ ઉત્સેચકો અને બેક્ટરિયા જરૂરી હોય છે, જે મીથેન ઉત્પાદન દરને ઘટાડે છે. પરંતુ ગાયના ગોબરમાં રહેલા સરળ કાર્બોદિતો (જેવા કે સેલ્યુલોઝ, હેમીસેલ્યુલોઝ) ઝડપથી વિઘટિત થઈ મીથેન ઉત્પાદનને વેગ આપે છે. વિકલ્પ B ખોટો છે કારણ કે લિગ્નિન અને સેલ્યુલોઝનું વિઘટન ગાયના ગોબરમાં રહેલા ઉત્સેચકો દ્વારા પ્રોત્સાહિત થતું નથી. વિકલ્પ C ખોટો છે કારણ કે લિગ્નિન મીથેનોજેનિક બેક્ટરિયા માટે વિષાક્ત નથી, પરંતુ તેનું વિઘટન ધીમું હોય છે. વિકલ્પ D ખોટો છે કારણ કે મીથેનોજેનિક બેક્ટરિયા સરળ કાર્બોદિતો ઉપરાંત જટિલ કાર્બોદિતોનું પણ વિઘટન કરી શકે છે, પરંતુ તે ધીમે થાય છે.", "ncert_ref": "Class XII - Chapter 10: સજીવ અને પર્યાવરણ (Organisms and Environment)", "difficulty": "Hard", "num": 26}, {"question": "બાયોગેસ પ્લાન્ટમાં મીથેન ઉત્પાદન દરમિયાન નીચેનામાંથી કયા તબક્કામાં જો pH અચાનક ઘટી જાય, તો મીથેનોજેનિક બેક્ટરિયાની ક્રિયાશીલતા સંપૂર્ણપણે અવરોધાય છે અને વોલેટાઇલ ફેટી એસિડ (VFA)નું સાંદ્રણ વધી જાય છે?", "options": ["A) હાઇડ્રોલિસિસ તબક્કામાં", "B) એસિડોજેનિક તબક્કામાં", "C) એસિટોજેનિક તબક્કામાં", "D) મીથેનોજેનિક તબક્કામાં"], "correct": 3, "explanation": "મીથેનોજેનિક બેક્ટરિયા pH 6.8 થી 7.4 ના વાતાવરણમાં સૌથી વધુ ક્રિયાશીલ હોય છે. જો pH અચાનક ઘટી જાય (ઉદા. 5.5 અથવા તેનાથી ઓછું), તો મીથેનોજેનિક બેક્ટરિયાની ક્રિયાશીલતા અવરોધાય છે, જેના કારણે VFA (જેવા કે એસિટિક એસિડ, પ્રોપિયોનિક એસિડ)નું સાંદ્રણ વધી જાય છે. હાઇડ્રોલિસિસ (A), એસિડોજેનિક (B), અને એસિટોજેનિક (C) તબક્કામાં pH ઘટવાને કારણે મીથેન ઉત્પાદન પર સીધી અસર થતી નથી, પરંતુ મીથેનોજેનિક તબક્કામાં (D) આ અસર સૌથી ગંભીર હોય છે.", "ncert_ref": "Class XII - Chapter 10: સજીવ અને પર્યાવરણ (Organisms and Environment)", "difficulty": "Hard", "num": 27}, {"question": "બાયોગેસ પ્લાન્ટમાં જો સબસ્ટ્રેટ તરીકે લિગ્નિન યુક્ત પદાર્થો (જેવા કે વૃક્ષના છાલ) વાપરવામાં આવે, તો નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) મીથેન ઉત્પાદન દર વધે છે કારણ કે લિગ્નિન સરળતાથી વિઘટન પામે છે.", "B) મીથેન ઉત્પાદન દર ઘટે છે કારણ કે લિગ્નિનનું વિઘટન ધીમું અને અવઘડ હોય છે.", "C) હાઇડ્રોજન ગેસનું ઉત્પાદન સંપૂર્ણપણે બંધ થઈ જાય છે.", "D) એસિટિક એસિડનું સાંદ્રણ અચાનક વધે છે."], "correct": 1, "explanation": "લિગ્નિન એક જટિલ અને કઠણ વિઘટન પામતો પોલિમર છે, જેના કારણે બાયોગેસ પ્લાન્ટમાં મીથેન ઉત્પાદન દર ઘટે છે. લિગ્નિન સરળતાથી વિઘટન પામતું નથી, તેથી વિકલ્પ A ખોટો છે. હાઇડ્રોજન ગેસનું ઉત્પાદન સંપૂર્ણપણે બંધ થતું નથી, તેથી વિકલ્પ C ખોટો છે. એસિટિક એસિડનું સાંદ્રણ અચાનક વધતું નથી, તેથી વિકલ્પ D ખોટો છે.", "ncert_ref": "Class XII - Chapter 10: સજીવ અને અસજીવ વચ્ચેના સંબંધો (Microbes in Human Welfare)", "difficulty": "Hard", "num": 28}, {"question": "બાયોગેસ પ્લાન્ટમાં નીચેનામાંથી કયા તબક્કામાં મીથેનોજેનિક બેક્ટરિયા સક્રિય થાય છે અને તેના માટે કયું પર્યાવરણીય પરિબળ સૌથી મહત્વપૂર્ણ છે?", "options": ["A) હાઇડ્રોલિસિસ તબક્કા, તાપમાન 30-40°C", "B) એસિડોજેનિક તબક્કા, pH 4-5", "C) મીથેનોજેનિક તબક્કા, pH 6.8-7.4", "D) એસિટોજેનિક તબક્કા, ઓક્સિજનની હાજરી"], "correct": 2, "explanation": "મીથેનોજેનિક બેક્ટરિયા મીથેનોજેનિક તબક્કામાં સક્રિય થાય છે, અને તેના માટે સૌથી મહત્વપૂર્ણ પર્યાવરણીય પરિબળ એ pH 6.8-7.4 (તટસ્થ pH) છે. હાઇડ્રોલિસિસ તબક્કામાં તાપમાન મહત્વપૂર્ણ છે, પરંતુ મીથેનોજેનિક બેક્ટરિયા અહીં સક્રિય થતાં નથી. એસિડોજેનિક તબક્કામાં pH ઓછો હોય છે, અને મીથેનોજેનિક બેક્ટરિયા અહીં સક્રિય થતાં નથી. એસિટોજેનિક તબક્કામાં ઓક્સિજનની હાજરી મીથેનોજેનિક બેક્ટરિયા માટે હાનિકારક છે.", "ncert_ref": "Class XII - Chapter 10: સજીવ અને અસજીવ વચ્ચેના સંબંધો (Microbes in Human Welfare)", "difficulty": "Hard", "num": 29}, {"question": "બાયોગેસ પ્લાન્ટમાં લિગ્નોસેલ્યુલોઝિક કચરો (જેવા કે ખેતીના અવશેષ)નો ઉપયોગ કરતી વખતે, નીચેનામાંથી કયું ક્રમિક પગલું મીથેન ઉત્પાદનને સૌથી વધુ અવરોધે છે?", "options": ["A) હાઇડ્રોલિસિસ દરમિયાન સેલ્યુલોઝનું ગ્લુકોઝમાં વિઘટન", "B) એસિડોજેનેસિસ દરમિયાન ગ્લુકોઝનું વોલેટાઇલ ફેટી એસિડમાં રૂપાંતર", "C) એસિટોજેનેસિસ દરમિયાન પ્રોપિયોનેટનું એસિટેટમાં રૂપાંતર", "D) મીથેનોજેનેસિસ દરમિયાન એસિટેટનું મીથેનમાં રૂપાંતર"], "correct": 0, "explanation": "લિગ્નોસેલ્યુલોઝિક કચરોમાં લિગ્નિન અને સેલ્યુલોઝની મજબૂત રચના હોય છે, જે હાઇડ્રોલિસિસ દરમિયાન વિઘટન પામવા માટે સૌથી વધુ સમય અને ઉત્સેચકની જરૂરિયાત રાખે છે. હાઇડ્રોલિસિસ તબક્કે સેલ્યુલોઝનું ગ્લુકોઝમાં વિઘટન સૌથી ધીમું થાય છે, જે પછીના તબક્કાઓને અવરોધે છે. એસિડોજેનેસિસ, એસિટોજેનેસિસ અને મીથેનોજેનેસિસ તબક્કાઓ લિગ્નિન-મુક્ત સબસ્ટ્રેટમાં વધુ કાર્યક્ષમ હોય છે, પરંતુ લિગ્નિનની હાજરીથી હાઇડ્રોલિસિસ જ સૌથી વધુ અવરોધાય છે.", "ncert_ref": "Class XII - Chapter 10: સજીવ અને અસજીવ વસ્તુઓમાં પોષણ (Microbes in Human Welfare)", "difficulty": "Hard", "num": 30}, {"question": "બાયોગેસ પ્લાન્ટમાં જો સબસ્ટ્રેટ તરીકે ગાયના ગોબર અને લિગ્નોસેલ્યુલોઝિક કચરો (ખેતીના અવશેષ)નો મિશ્રણ વાપરવામાં આવે, તો નીચેનામાંથી કયું પરિબળ મીથેન ઉત્પાદન દરને સૌથી વધુ પ્રભાવિત કરશે?", "options": ["A) સબસ્ટ્રેટનું C:N ગુણોત્તર 20:1 કરતાં ઓછું હોવું", "B) તાપમાન 35°C થી 45°C સુધી રાખવું", "C) પાણી અને સબસ્ટ્રેટનું ગુણોત્તર 1:1 રાખવું", "D) pH 7.0 થી 7.5 સુધી રાખવું"], "correct": 0, "explanation": "લિગ્નોસેલ્યુલોઝિક કચરો અને ગાયના ગોબરના મિશ્રણમાં, C:N ગુણોત્તર મીથેન ઉત્પાદનને સૌથી વધુ પ્રભાવિત કરે છે. આદર્શ C:N ગુણોત્તર 20:1 થી 30:1 હોય છે. જો આ ગુણોત્તર 20:1 કરતાં ઓછું હોય, તો એમોનિયા ઉત્પન્ન થાય છે, જે મીથેનોજેનિક બેક્ટરિયા માટ                 container.appendChild(card);

            updateProgress();
        }

            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
