<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - લિંગ નિર્ધારણ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 લિંગ નિર્ધારણ</span>
                <span>🎯 Hard</span>
                <span>📝 39 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "મનુષ્યમાં લિંગ નિર્ધારણ માટે જવાબદાર વર્ણસૂત્રોની જોડ કયી છે અને તે કેવી રીતે કાર્ય કરે છે?", "options": ["A) 22 જોડ વર્ણસૂત્રો, જેમાં પિતાના Y-વર્ણસૂત્રની હાજરી સ્ત્રી ભ્રૂણ તરફ દોરી જાય છે", "B) 23મી જોડ વર્ણસૂત્રો, જેમાં પિતાના Y-વર્ણસૂત્રની હાજરી પુરુષ ભ્રૂણ તરફ દોરી જાય છે", "C) X-વર્ણસૂત્રની હાજરી પુરુષ ભ્રૂણ તરફ દોરી જાય છે, જ્યારે Y-વર્ણસૂત્ર સ્ત્રી ભ્રૂણ તરફ દોરી જાય છે", "D) માતાના X-વર્ણસૂત્રની હાજરી પુરુષ ભ્રૂણ તરફ દોરી જાય છે, જ્યારે પિતાના X-વર્ણસૂત્ર સ્ત્રી ભ્રૂણ તરફ દોરી જાય છે"], "correct": 1, "explanation": "મનુષ્યમાં લિંગ નિર્ધારણ 23મી જોડ વર્ણસૂત્રો (લિંગ વર્ણસૂત્રો) દ્વારા થાય છે. પિતા પાસે X અને Y વર્ણસૂત્ર હોય છે, જ્યારે માતા પાસે ફક્ત X વર્ણસૂત્ર હોય છે. જો પિતાનું Y-વર્ણસૂત્ર ભ્રૂણમાં જાય તો પુરુષ ભ્રૂણ (XY) બને છે, જ્યારે X-વર્ણસૂત્ર જાય તો સ્ત્રી ભ્રૂણ (XX) બને છે. A ગળતર છે કારણ કે 22 જોડ ઓટોસોમલ વર્ણસૂત્રો છે અને Y-વર્ણસૂત્ર સ્ત્રી ભ્રૂણ તરફ દોરતું નથી. C ગળતર છે કારણ કે X-વર્ણસૂત્ર સ્ત્રી ભ્રૂણ તરફ દોરી જાય છે, Y-વર્ણસૂત્ર પુરુષ તરફ. D ગળતર છે કારણ કે માતાનું X-વર્ણસૂત્ર હંમેશા ભ્રૂણમાં જાય છે, પરંતુ લિંગ નિર્ધારણ પિતાના વર્ણસૂત્ર પર આધારિત છે.", "ncert_ref": "Class XII - પ્રકરણ 5: વંશાવળી અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 1}, {"question": "મધમાખીમાં લિંગ નિર્ધારણ કેવી રીતે થાય છે?", "options": ["A) હેપ્લોઇડ અને ડિપ્લોઇડ કોષો દ્વારા, જેમાં નર મધમાખી હેપ્લોઇડ હોય છે અને માદા ડિપ્લોઇડ હોય છે", "B) X અને Y વર્ણસૂત્રો દ્વારા, જેમ મનુષ્યમાં થાય છે", "C) માતાના હોર્મોન દ્વારા, જેમાં હોર્મોનની માત્રા અનુસાર લિંગ નક્કી થાય છે", "D) પરાગરજ (પોલન) દ્વારા, જેમાં પરાગરજની હાજરી અથવા અનુપસ્થિતિ અનુસાર લિંગ નક્કી થાય છે"], "correct": 0, "explanation": "મધમાખીમાં લિંગ નિર્ધારણ હેપ્લોઇડ-ડિપ્લોઇડ સિસ્ટમ દ્વારા થાય છે. નર મધમાખી (ડ્રોન) હેપ્લોઇડ (n) હોય છે, જ્યારે માદા (રાણી અને કામદાર) ડિપ્લોઇડ (2n) હોય છે. અસરકારક પરાગીકરણ વિના અંડકોષ વિકસીને નર મધમાખી બને છે. B ગળતર છે કારણ કે મધમાખીમાં X અને Y વર્ણસૂત્રો નથી. C ગળતર છે કારણ કે હોર્મોન લિંગ નિર્ધારણમાં ભૂમિકા ભજવતું નથી. D ગળતર છે કારણ કે પરાગરજ લિંગ નિર્ધારણમાં સીધી ભૂમિકા ભજવતું નથી.", "ncert_ref": "Class XII - પ્રકરણ 5: વંશાવળી અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 2}, {"question": "નીચેના પૈકી કયું વિધાન સરખું નથી? લિંગ-સંકળિત જનીનો વિશે", "options": ["A) X-વર્ણસૂત્ર પર આવેલા જનીનોનો વારસો પુરુષથી પુરુષ સુધી સીધો જતો નથી", "B) Y-વર્ણસૂત્ર પર આવેલા જનીનો માત્ર પુરુષોમાં જ જોવા મળે છે", "C) X-વર્ણસૂત્ર પર આવેલા જનીનો સ્ત્રી અને પુરુષ બંનેમાં સરખી રીતે પ્રગટ થાય છે", "D) હિમોફિલિયા અને રંગ અંધત્વ X-સંકળિત રોગો છે"], "correct": 2, "explanation": "X-વર્ણસૂત્ર પર આવેલા જનીનો સ્ત્રી અને પુરુષમાં અલગ રીતે પ્રગટ થાય છે કારણ કે સ્ત્રીમાં બે X-વર્ણસૂત્રો હોય છે, જ્યારે પુરુષમાં ફક્ત એક X-વર્ણસૂત્ર હોય છે. A સરખું છે કારણ કે પુરુષ પાસે Y-વર્ણસૂત્ર હોય છે, જે પિતાથી પુત્ર સુધી જાય છે, પરંતુ X-વર્ણસૂત્ર માતાથી જાય છે. B સરખું છે કારણ કે Y-વર્ણસૂત્ર ફક્ત પુરુષોમાં જ હોય છે. D સરખું છે કારણ કે હિમોફિલિયા અને રંગ અંધત્વ X-સંકળિત રોગો છે.", "ncert_ref": "Class XII - પ્રકરણ 5: વંશાવળી અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 3}, {"question": "કોઈ એક જીવમાં, પુરુષ અને સ્ત્રી બંને લિંગના લક્ષણો દર્શાવતા જીવને શું કહેવાય છે?", "options": ["A) હર્માફ્રોડાઇટ", "B) ઇન્ટરસેક્સ", "C) ગાયનોસ્પોરોફાઇટ", "D) એન્ડ્રોજિનસ"], "correct": 0, "explanation": "હર્માફ્રોડાઇટ એવા જીવને કહેવાય છે જેમાં પુરુષ અને સ્ત્રી બંને લિંગના જનન અંગો હોય છે. ઇન્ટરસેક્સ (B) એવા જીવને કહેવાય છે જેમાં લિંગ નિર્ધારણ અસ્પષ્ટ હોય છે, પરંતુ તે હર્માફ્રોડાઇટ નથી. ગાયનોસ્પોરોફાઇટ (C) વનસ્પતિશાસ્ત્ર સાથે સંબંધિત છે અને એન્ડ્રોજિનસ (D) એવા વ્યક્તિને કહેવાય છે જેમાં પુરુષ અને સ્ત્રી બંને લિંગના લક્ષણો હોય, પરંતુ તે હર્માફ્રોડાઇટ નથી.", "ncert_ref": "Class XII - પ્રકરણ 1: પ્રજનન મનુષ્યમાં", "difficulty": "Hard", "num": 4}, {"question": "નીચેના પૈકી કયું વિધાન લિંગ નિર્ધારણ વિશે સરખું નથી?", "options": ["A) ટર્ટલમાં, તાપમાન લિંગ નિર્ધારણમાં મહત્વની ભૂમિકા ભજવે છે", "B) કેળાંમાં, લિંગ નિર્ધારણ X અને Y વર્ણસૂત્રો દ્વારા થાય છે", "C) કેંગારૂમાં, લિંગ નિર્ધારણ હોર્મોન દ્વારા થાય છે", "D) ડ્રોસોફિલામાં, લિંગ નિર્ધારણ X અને Y વર્ણસૂત્રોના ગુણોત્તર દ્વારા થાય છ ass XII - પ્રકરણ 5: વંશપરંપરા અને વિવિધતાના સિદ્ધાંતો", "difficulty": "Hard", "num": 15}, {"question": "ક્રિકેટમાં (Gryllus domesticus) લિંગ નિર્ધારણ માટે જવાબદાર વર્ણસૂત્રીય વ્યવસ્થા કઈ છે, જ્યાં પુરુષોમાં એક X વર્ણસૂત્ર હોય છે અને સ્ત્રીઓમાં બે X વર્ણસૂત્રો હોય છે, પરંતુ પુરુષોમાં Y વર્ણસૂત્ર અનુપસ્થિત હોય છે?", "options": ["A) XX-XO પ્રકાર", "B) XY-XX પ્રકાર", "C) ZW-ZZ પ્રકાર", "D) XO-XXY પ્રકાર"], "correct": 0, "explanation": "ક્રિકેટમાં લિંગ નિર્ધારણ XX-XO પ્રકારનું હોય છે, જ્યાં સ્ત્રીઓ XX (હોમોગેમેટિક) અને પુરુષો XO (હેટરોગેમેટિક) હોય છે. Y વર્ણસૂત્ર અનુપસ્થિત હોય છે. વિકલ્પ B (XY-XX) મનુષ્ય જેવી વ્યવસ્થા દર્શાવે છે, વિકલ્પ C (ZW-ZZ) પક્ષીઓમાં જોવા મળે છે, અને વિકલ્પ D (XO-XXY) અસંગત છે કારણ કે XXY ક્રિકેટમાં લિંગ નિર્ધારણ માટે માન્ય નથી.", "ncert_ref": "Class XII - પ્રકરણ 5: વંશવિજ્ઞાન અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 16}, {"question": "મનુષ્યમાં, SRY જીનની અનુપસ્થિતિમાં પણ Y વર્ણસૂત્રની હાજરીમાં, કયા જનીન પરિવર્તન અથવા પરિબળ દ્વારા પુરુષ લિંગ વિકાસ થઈ શકે છે?", "options": ["A) SOX9 જીનનું દુપ્લિકેશન", "B) DAX1 જીનનું ઓવરએક્સપ્રેશન", "C) Wnt4 જીનનું મ્યુટેશન", "D) AR જીનનું ડિલીશન"], "correct": 0, "explanation": "SOX9 જીનનું દુપ્લિકેશન SRY જીનની અનુપસ્થિતિમાં પણ પુરુષ લિંગ વિકાસ તરફ દોરી શકે છે, કારણ કે SOX9 પુરુષ લિંગ વિકાસમાં મહત્વની ભૂમિકા ભજવે છે. DAX1 ઓવરએક્સપ્રેશન (B) સ્ત્રી લિંગ વિકાસ તરફ દોરી શકે છે, Wnt4 મ્યુટેશન (C) સ્ત્રી લિંગ વિકાસને પ્રભાવિત કરે છે, અને AR જીનનું ડિલીશન (D) એન્ડ્રોજન રેસેપ્ટરની કમીને કારણે પુરુષ લક્ષણોનો અભાવ થાય છે.", "ncert_ref": "Class XII - પ્રકરણ 5: વંશવિજ્ઞાન અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 17}, {"question": "નીચેના પૈકી કયા જીવમાં લિંગ નિર્ધારણ હેટરોગેમેટિક સ્ત્રી (ZW) અને હોમોગેમેટિક પુરુષ (ZZ) દ્વારા થાય છે, અને તે સસ્તન પ્રાણીઓથી ભિન્ન છે?", "options": ["A) મનુષ્ય", "B) કુકડો", "C) મધમાખી", "D) ડ્રોસોફિલા"], "correct": 1, "explanation": "કુકડો (પક્ષીઓ)માં લિંગ નિર્ધારણ ZW-ZZ પ્રકારનું હોય છે, જ્યાં સ્ત્રીઓ ZW (હેટરોગેમેટિક) અને પુરુષો ZZ (હોમોગેમેટિક) હોય છે. મનુષ્ય (A) અને ડ્રોસોફિલા (D)માં XY-XX વ્યવસ્થા હોય છે, જ્યારે મધમાખી (C)માં હેપ્લોઇડ-ડિપ્લોઇડ વ્યવસ્થા હોય છે.", "ncert_ref": "Class XII - પ્રકરણ 5: વંશવિજ્ઞાન અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 18}, {"question": "લિંગ-સંકળિત પ્રત્યારોપણ (X-inactivation) દરમિયાન, કયા જનીનની અભિવ્યક્તિને કારણે બરાબર એક X વર્ણસૂત્ર નિષ્ક્રિય થાય છે, અને તે કયા તબક્કે થાય છે?", "options": ["A) XIST જીન, બ્લાસ્ટ્યુલા તબક્કે", "B) TSIX જીન, ગેસ્ટ્ર્યુલેશન દરમિયાન", "C) XIST જીન, 16-કોષીય તબક્કે", "D) SRY જીન, ન્યુરુલેશન દરમિયાન"], "correct": 2, "explanation": "XIST જીનની અભિવ્યક્તિને કારણે X વર્ણસૂત્રનું પ્રત્યારોપણ થાય છે, અને આ પ્રક્રિયા 16-કોષીય તબક્કે (બ્લાસ્ટોસિસ્ટ તબક્કે) શરૂ થાય છે. TSIX (B) XIST ને નિયંત્રિત કરે છે પરંતુ પ્રત્યારોપણ માટે જવાબદાર નથી. SRY (D) પુરુષ લિંગ નિર્ધારણમાં ભૂમિકા ભજવે છે, પરંતુ X-inactivation સાથે સંબંધિત નથી.", "ncert_ref": "Class XII - પ્રકરણ 5: વંશવિજ્ઞાન અને ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 19}, {"question": "એક પ્રયોગમાં, વૈજ્ઞાનિકોએ કાચબાની એક પ્રજાતિના ઈંડાંને ત્રણ જૂથમાં વહેંચીને અલગ-અલગ તાપમાને સેવ્યા: 26°C, 30°C અને 34°C. પરિણામે, 26°C તાપમાને સેવેલા ઈંડાંમાંથી માત્ર નર કાચબા, 34°C તાપમાને સેવેલા ઈંડાંમાંથી માત્ર માદા કાચબા અને 30°C તાપમાને સેવેલા ઈંડાંમાંથી નર અને માદા બંને પ્રકારના કાચબા ઉત્પન્ન થયા. આ પરિણામોને આધારે નીચેનામાંથી કયું વિધાન સૌથી વધુ યોગ્ય છે?", "options": ["A) આ કાચબાની પ્રજાતિમાં લિંગ નિર્ધારણ માત્ર જનીનિક પરિબળો દ્વારા નિયંત્રિત થાય છે, પર્યાવરણીય પરિબળોની કોઈ અસર નથી.", "B) આ કાચબાની પ્રજાતિમાં લિંગ નિર્ધારણ તાપમાન-આધારિત છે, જેમાં મધ્યમ તાપમાને બંને લિંગ ઉત્પન્ન થાય છે કારણ કે તાપમાનની અસર જનીનિક અભિવ્યક્તિ પર આંશિક હોય છે.", "C) આ કાચબાની પ્રજાતિમાં લિંગ નિર્ધારણ માટે જવાબદાર જનીનનું સ્થાન Y વર્ણસૂત્ર પર છે, જે તાપમાનના ફેરફારથી સક્રિય થાય છે.", "D) આ કાચબાની પ્રજાતિમાં લિંગ નિર્ધારણ માટે જવાબદાર ઉત્સેચકનું ઉત્પાદન તાપમાન પર આધારિત છે, જે માત્ર 30°C તાપમાને સક્રિય થાય છે અને બંને લિંગ ઉત્પન્ન કરે છે."], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે. NCERT Class XII - Chapter 5: આનુવંશિકતા અને ભિન્નતા મુજબ, કેટલાક સરીસૃપોમાં લિંગ નિર્ધારણ તાપમાન-આધારિત હોય છે. આ કાચબાની પ્રજાતિમાં, નીચું તાપમાન (26°C) નર ઉત્પન્ન કરે છે, ઉંચું તાપમાન (34°C) માદા ઉત્પન્ન કરે છે, જ્યારે મધ્યમ તાપમાન (30°C) બંને લિંગ ઉત્પન્ન કરે છે. આ દર્શાવે છે કે તાપમાન જનીનિક અભિવ્યક્તિને અસર કરે છે, પરંતુ તે સંપૂર્ણપણે નિયંત્રિત નથી. વિકલ્પ A ખોટો છે કારણ કે પર્યાવરણીય પરિબળોની સ્પષ્ટ અસર છે. વિકલ્પ C ખોટો છે કારણ કે સરીસૃપોમાં Y વર્ણસૂત્ર આધારિત લિંગ નિર્ધારણ હોતું નથી. વિકલ્પ D ખોટો છે કારણ કે ઉત્સેચકનું ઉત્પાદન તાપમાન પર આધારિત હોવાનો કોઈ પુરાવો નથી અને તે માત્ર 30°C પર સક્રિય થતું નથી.", "ncert_ref": "Class XII - પ્રકરણ 5: આનુવંશિકતા અને ભિન્નતા", "difficulty": "Hard", "num": 20}, {"question": "કાચબા (Testudo graeca)માં લિંગ નિર્ધારણ માટે તાપમાનની ભૂમિકા વિશે નીચેના પૈકી કયું વિધાન સૌથી યોગ્ય છે?", "options": ["A) 25°C તાપમાને ફક્ત નર કાચબા વિકસે છે, જ્યારે 30°C તાપમાને ફક્ત માદા કાચબા વિકસે છે.", "B) 28°C થી નીચેના તાપમાને નર અને માદા બંને વિકસી શકે છે, પરંતુ 32°C થી ઉપરના તાપમાને ફક્ત માદા વિકસે છે.", "C) તાપમાનનો લિંગ નિર્ધારણ પર કોઈ પ્રભાવ પડતો નથી, કારણ કે કાચબામાં લિંગ નિર્ધારણ પૂર્ણપણે જનીન-આધારિત હોય છે.", "D) 22°C થી 28°C વચ્ચેના તાપમાને નર વિકસે છે, જ્યારે 28°C થી 34°C વચ્ચેના તાપમાને માદા વિકસે છે."], "correct": 3, "explanation": "કાચબામાં લિંગ નિર્ધારણ તાપમાન-આધારિત (Temperature-Dependent Sex Determination, TSD) હોય છે. 22°C થી 28°C વચ્ચેના તાપમાને નર કાચબા વિકસે છે, જ્યારે 28°C થી 34°C વચ્ચેના તાપમાને માદા કાચબા વિકસે છે. આમ, વિકલ્પ D સૌથી યોગ્ય છે. વિકલ્પ A ખોટો છે કારણ કે 25°C અને 30°C એ સ્પષ્ટ હદ નથી. વિકલ્પ B અંશતઃ સાચો છે પરંતુ સ્પષ્ટ તાપમાન શ્રેણી આપતો નથી. વિકલ્પ C ખોટો છે કારણ કે કાચબામાં તાપમાનનો પ્રભાવ હોવાનું સિદ્ધ થયું છે.", "ncert_ref": "Class XII - Chapter 5: વંશવેલા અને ઉત્ક્રાંતિ (Heredity and Evolution)", "difficulty": "Hard", "num": 21}, {"question": "મનુષ્યમાં, X અને Y વર્ણસૂત્રો વચ્ચેના પસંદગીય ક્રોસિંગ ઓવર વિશે નીચેના પૈકી કયું વિધાન સાચું છે?", "options": ["A) X અને Y વર્ણસૂત્રો વચ્ચે ક્રોસિંગ ઓવર થતું નથી, કારણ કે તેઓ સંપૂર્ણપણે અસમાન હોય છે.", "B) X અને Y વર્ણસૂત્રો વચ્ચે ક્રોસિંગ                     optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
