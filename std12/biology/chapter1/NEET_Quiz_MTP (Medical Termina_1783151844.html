        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}

    <script>
        const questionsData = [{"question": "મેડિકલ ટર્મિનેશન ઓફ પ્રેગ્નન્સી (MTP) અધિનિયમ, 1971 અનુસાર, ગર્ભધારણના કયા સમયગાળા દરમિયાન ગર્ભપાત કરાવવો કાયદેસર છે, પરંતુ તે માટે ડોક્ટરની મંજૂરી જરૂરી છે?", "options": ["A) 0 થી 12 અઠવાડિયા સુધી", "B) 12 થી 20 અઠવાડિયા સુધી", "C) 20 થી 24 અઠવાડિયા સુધી", "D) 24 અઠવાડિયાથી વધુ"], "correct": 1, "explanation": "MTP અધિનિયમ, 1971 અનુસાર, 12 થી 20 અઠવાડિયા સુધીના ગર્ભધારણ માટે ગર્ભપાત કરાવવા ડોક્ટરની મંજૂરી જરૂરી છે. 0 થી 12 અઠવાડિયા સુધી એક ડોક્ટરની મંજૂરી પૂરતી છે, જ્યારે 20 થી 24 અઠવાડિયા સુધી અને તેનાથી વધુ માટે બે ડોક્ટરોની મંજૂરી જરૂરી છે. 24 અઠવાડિયાથી વધુ ગર્ભધારણમાં ગર્ભપાત કાયદેસર નથી, સિવાય કે જીવન જોખમમાં હોય.", "ncert_ref": "Class XII - Chapter 4: જનન સ્વાસ્થ્ય", "difficulty": "Hard", "num": 1}, {"question": "MTP દરમિયાન વપરાતા 'મિફેપ્રિસ્ટોન' દવાનું કયું કાર્ય છે?", "options": ["A) ગર્ભાશયના સ્નાયુઓને સંકોચન કરાવી ગર્ભને બહાર કાઢે છે", "B) પ્રોજેસ્ટેરોન હોર્મોનના પ્રભાવને અવરોધે છે, જેનાથી ગર્ભાશયની અસ્તર (એન્ડોમેટ્રિયમ) ની ખોરાક પૂરો પાડવાની ક્ષમતા નષ્ટ થાય છે", "C) ગર્ભમાં રહેલા ભ્રૂણના હૃદયના ધબકારા અટકાવે છે", "D) ગર્ભાશયના મુખ (સર્વિક્સ) ને તરત જ ખુલ્લું કરે છે"], "correct": 1, "explanation": "મિફેપ્રિસ્ટોન એ એન્ટી-પ્રોજેસ્ટેરોન દવા છે, જે પ્રોજેસ્ટેરોન હોર્મોનના પ્રભાવને અવરોધે છે. પ્રોજેસ્ટેરોન ગર્ભાશયની અસ્તર (એન્ડોમેટ્રિયમ) ની ખોરાક પૂરો પાડવાની ક્ષમતા જાળવી રાખે છે, જેનાથી ભ્રૂણનું પોષણ થાય છે. મિફેપ્રિસ્ટોન આ ક્ષમતા નષ્ટ કરે છે, જેનાથી ગર્ભપાત થાય છે. બાકીના વિકલ્પો મિફેપ્રિસ્ટોનના કાર્યને ચોક્કસ રીતે વર્ણવતા નથી.", "ncert_ref": "Class XII - Chapter 4: જનન સ્વાસ્થ્ય", "difficulty": "Hard", "num": 2}, {"question": "MTP ની પદ્ધતિઓ પૈકી કયી પદ્ધતિ ગર્ભધારણના પ્રારંભિક તબક્કે (6-7 અઠવાડિયા સુધી) વપરાતી નથી?", "options": ["A) વેક્યૂમ એસ્પિરેશન", "B) મેડિકલ એબોર્શન (દવાઓ દ્વારા)", "C) ડાયલેશન એન્ડ ક્યુરેટેજ (D&C)", "D) હિસ્ટેરેક્ટોમી"], "correct": 3, "explanation": "હિસ્ટેરેક્ટોમી એ ગર્ભાશયને શસ્ત્રક્રિયા દ્વારા કાઢી નાખવાની પદ્ધતિ છે, જે MTP માટે વપરાતી નથી. વેક્યૂમ એસ્પિરેશન, મેડિકલ એબોર્શન, અને D&C એ MTP માટે વપરાતી પદ્ધતિઓ છે, ખાસ કરીને પ્રારંભિક ગર્ભધારણમાં. હિસ્ટેરેક્ટોમી એ ગર્ભાશયના કૅન્સર અથવા અન્ય ગંભીર સ્થિતિઓમાં વપરાતી પદ્ધતિ છે.", "ncert_ref": "Class XII - Chapter 4: જનન સ્વાસ્થ્ય", "difficulty": "Hard", "num": 3}, {"question": "MTP ના સંદર્ભમાં નીચેના પૈકી કયું વિધાન ખોટું છે?", "options": ["A) MTP દરમિયાન રક્તસ્રાવ થવો સામાન્ય છે, પરંતુ તે લાંબો સમય ચાલુ રહેતો નથી", "B) MTP પછી સ્ત્રીને તરત જ ગર્ભવતી થવાની શક્યતા રહે છે", "C) MTP પછી સ્ત્રીને હોર્મોનલ અસંતુલન થવાની શક્યતા નથી", "D) MTP પછી સ્ત્રીને માનસિક તણાવ અથવા અપરાધભાવ થવાની શક્યતા રહે છે"], "correct": 2, "explanation": "MTP પછી સ્ત્રીને હોર્મોનલ અસંતુલન થવાની શક્યતા રહે છે, ખાસ કરીને જો ગર્ભધારણ લાંબો સમય ચાલુ રહ્યું હોય અથવા MTP દરમિયાન કોઈ જટિલતાઓ ઉભી થઈ હોય. બાકીના વિધાનો સાચા છે: MTP દરમિયાન રક્તસ્રાવ થવો સામાન્ય છે, MTP પછી સ્ત્રીને તરત જ ગર્ભવતી થવાની શક્યતા રહે છે, અને MTP પછી માનસિક તણાવ અથવા અપરાધભાવ થવાની શક્યતા રહે છે.", "ncert_ref": "Class XII - Chapter 4: જનન સ્વાસ્થ્ય", "difficulty": "Hard", "num": 4}, {"question": "MTP ની કાયદેસરતાના સંદર્ભમાં નીચેના પૈકી કયું વિધાન સાચું નથી?", "options": ["A) ભારતમાં MTP અધિનિયમ, 1971 અનુસાર, ગર્ભપાત કરાવવા માટે સ્ત્રીની સંમતિ જરૂરી છે", "B) MTP અધિનિયમ, 1971 અનુસાર, 20 અઠવાડિયાથી વધુ ગર્ભધારણમાં ગર્ભપાત કરાવવા માટે બે ડોક્ટરોની મંજૂરી જરૂરી છે", "C) MTP અધિનિયમ, 1971 અનુસાર, ગર્ભપાત કરાવવા માટે પતિની સંમતિ જરૂરી છે", "D) MTP અધિનિયમ, 1971 અનુસાર, ગર્ભપાત કરાવવા માટે સ્ત્રીની ઉંમર 18 વર્ષથી ઓછી ન હોવી જોઈએ"], "correct": 2, "explanation": "MTP અધિનિયમ, 1971 અનુસાર, ગર્ભપાત કરાવવા માટે પતિની સંમતિ જરૂરી નથી. સ્ત્રીની સંમતિ જરૂરી છે, અને 20 અઠવાડિયાથી વધુ ગર્ભધારણમાં બે ડોક્ટરોની મંજૂરી જરૂરી છે. સ્ત્રીની ઉંમર 18 વર્ષથી ઓછી હોવી જોઈએ એવું કોઈ નિયમ નથી, પરંતુ કાયદેસર રીતે, 18 વર્ષથી ઓછી ઉંમરની સ્ત્રી માટે પાલક અથવા કાયદેસર વાલીની સંમતિ જરૂરી હોઈ શકે છે.", "ncert_ref": "Class XII - Chapter 4: જનન સ્વાસ્થ્ય", "difficulty": "Hard", "num": 5}, {"question": "ગર્ભાવસ્થાના કયા તબક્કે MTP કરવું કાયદેસર રીતે પ્રતિબંધિત છે, પરંતુ જીવન માટે જોખમી સ્થિતિમાં ડોકટ ef": "Class XII - Chapter 4: જનન સ્વાસ્થ્ય", "difficulty": "Hard", "num": 36}, {"question": "MTP દરમિયાન વપરાતા 'મિફેપ્રિસ્ટોન' અને 'મિસોપ્રોસ્ટોલ'ના સંયોજનનો ઉપયોગ કરતી વખતે, નીચેના પૈકી કયું જોખમ સૌથી વધુ સામાન્ય છે?", "options": ["A) ગર્ભાશયનું પેરિફોરેશન (પેરિફોરેશન ઓફ યુટેરસ)", "B) ભારે રક્તસ્રાવ (હેવી બ્લીડિંગ)", "C) ગર્ભાશયનું રપ્ચર (રપ્ચર ઓફ યુટેરસ)", "D) ડીપ વેઇન થ્રોમ્બોસિસ (DVT)"], "correct": 1, "explanation": "'મિફેપ્રિસ્ટોન' અને 'મિસોપ્રોસ્ટોલ'ના સંયોજનનો ઉપયોગ MTP માટે થાય છે, પરંતુ આ દવાઓના ઉપયોગથી ભારે રક્તસ્રાવ (B) સૌથી સામાન્ય જોખમ છે. ગર્ભાશયનું પેરિફોરેશન (A) અને રપ્ચર (C) એ અત્યંત દુર્લભ જોખમો છે, જ્યારે ડીપ વેઇન થ્રોમ્બોસિસ (D) એ આ દવાઓના ઉપયોગ સાથે સીધું સંબંધિત નથી.", "ncert_ref": "Class XII - Chapter 4: જનન સ્વાસ્થ્ય", "difficulty": "Hard", "num": 37}, {"question": "મેડિકલ ટર્મિનેશન ઓફ પ્રેગ્નન્સી (MTP) દરમિયાન, 'ડાયલેશન એન્ડ ઇવેક્યુએશન (D&E)' પદ્ધતિનો ઉપયોગ કરતી વખતે, નીચેના પૈકી કયું જોખમ સૌથી વધુ ગંભીર છે અને તેના કારણે ગર્ભાશયના પેરિટોનિયમમાં ઇન્ફેક્શન થવાની શક્યતા રહે છે?", "options": ["A) ગર્ભાશયના કોષોના અપૂર્ણ કાઢવાને કારણે અતિ રક્તસ્રાવ", "B) ગર્ભાશયના દીવાલમાં છિદ્ર પડવું (Uterine perforation)", "C) ગર્ભનળમાં ઇન્ફેક્શન (Endometritis)", "D) ગર્ભાશયના મ્યુકોસામાં કાયમી નુકસાન"], "correct": 1, "explanation": "ડાયલેશન એન્ડ ઇવેક્યુએશન (D&E) પદ્ધતિ દરમિયાન, ગર્ભાશયના દીવાલમાં છિદ્ર પડવું (Uterine perforation) સૌથી ગંભીર જોખમ છે, કારણ કે તેના કારણે ગર્ભાશયના પેરિટોનિયમમાં ઇન્ફેક્શન (પેરિટોનાઇટિસ) થવાની શક્યતા રહે છે. અતિ રક્તસ્રાવ (A) અને ગર્ભનળમાં ઇન્ફેક્શન (C) પણ જોખમો છે, પરંતુ તે પેરિટોનિયમ સુધી પહોંચતું નથી. ગર્ભાશયના મ્યુકોસામાં કાયમી નુકસાન (D) દૂરગામી અસર કરે છે, પરંતુ તે તાત્કાલિક જીવન-ઘાતક નથી.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન સ્વાસ્થ્ય", "difficulty": "Hard", "num": 38}, {"question": "MTP ના સંદર્ભમાં, નીચેના પૈકી કયું જોખમ 'ડિસેમિનેટેડ ઇન્ટ્રાવાસ્ક્યુલર કોએગ્યુલેશન (DIC)' તરફ દોરી શકે છે?", "options": ["A) ગર્ભાશયના સંકોચનમાં અસમર્થતા", "B) અતિ રક્તસ્રાવ અને ગર્ભાશયમાં રહેલા ગર્ભના અવશેષો", "C) ગર્ભનળમાં ક્રોનિક ઇન્ફેક્શન", "D) ગર્ભાશયના મ્યુકોસામાં હોર્મોનલ અસંતુલન"], "correct": 1, "explanation": "'ડિસેમિનેટેડ ઇન્ટ્રાવાસ્ક્યુલર કોએગ્યુલેશન (DIC)' એ રક્તના થક્કર જવાના વિકાર છે, જે અતિ રક્તસ્રાવ અને ગર્ભાશયમાં રહેલા ગર્ભના અવશેષો (Retained products of conception)ને કારણે થાય છે. આ સ્થિતિમાં રક્તમાં થક્કર જવાની પ્રક્રિયા અસંતુલિત થાય છે, જે DIC તરફ દોરી શકે છે. બાકીના વિકલ્પો (A, C, D) DIC સાથે સીધો સંબંધ ધરાવતા નથી.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન સ્વાસ્થ્ય", "difficulty": "Hard", "num": 39}, {"question": "MTP દરમિયાન, ગર્ભાવસ્થાના 12 થી 20 અઠવાડિયા વચ્ચે 'ડાયલેશન એન્ડ ઇવેક્યુએશન (D&E)' પદ્ધતિનો ઉપયોગ કરતી વખતે, નીચેના પૈકી કયું જોખમ સૌથી વધુ ગંભીર છે અને તેના કારણે ગર્ભાશયના પેરિટોનિયમમાં ઇન્ફેક્શન થવાની શક્યતા રહે છે?", "options": ["A) ગર્ભાશયના પેરિફોરેશન (Uterine perforation)", "B) અતિશય રક્તસ્રાવ (Excessive hemorrhage)", "C) ગર્ભનળીના ફાટવા (Fallopian tube rupture)", "D) ગર્ભાશયના મ્યુકોસામાં કાયમી નુકસાન (Permanent endometrial damage)"], "correct": 0, "explanation": "ડાયલેશન એન્ડ ઇવેક્યુએશન (D&E) પદ્ધતિ દરમિયાન, ગર્ભાશયના પેરિફોરેશન (Uterine perforation) એ સૌથી ગંભીર જોખમ છે, કારણ કે તેના કારણે ગર્ભાશયના પેરિટોનિયમમાં ઇન્ફેક્શન થવાની શક્યતા રહે છે. અતિશય રક્તસ્રાવ (B) પણ ગંભીર છે, પરંતુ તે પેરિટોનિયલ ઇન્ફેક્શન તરફ દોરી શકતું નથી. ગર્ભનળીના ફાટવા (C) એ D&E દરમિયાન અસાધારણ છે, કારણ કે આ પદ્ધતિ ગર્ભાશય પર કામ કરે છે, ગર્ભનળી પર નહીં. ગર્ભાશયના મ્યુકોસામાં કાયમી નુકસાન (D) એ દીર્ઘકાલીન પરિણામ હોઈ શકે છે, પરંતુ તે પેરિટોનિયલ ઇન્ફેક્શન તરફ સીધો માર્ગ નથી.", "ncert_ref": "Class XII - Chapter 4: પ્રજનન સ્વાસ્થ્ય", "difficulty": "Hard", "num": 40}, {"question": "ગર્ભાવસ્થાના 14 થી 20 અઠવાડિયા વચ્ચે MTP કરવા માટે, નીચેના પૈકી કયા કાયદેસર હેતુ હેઠળ પરવાનગી આપવામાં આવે છે?", "options": ["A) ગર્ભવતી મહિલાનું જીવન જોખમમાં હોય ત્યારે", "B) ગર્ભમાં ભ્રૂણને અનુવંશિક રોગ હોય ત્યારે", "C) ગર્ભધારણ ગેંગરેપના પરિણામે થયું હોય ત્યારે", "D) ગર્ભવતી મહિલાની ઉંમર 18 વર્ષથી ઓછી હોય ત્યારે"], "correct": 2, "explanation": "ગર્ભાવસ્થાના 14 થી 20 અઠવાડિયા વચ્ચે MTP કરવા માટે, ગર્ભધારણ                     optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
