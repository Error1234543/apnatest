<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - ટ્રાન્સલેશન</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 ટ્રાન્સલેશન</span>
                <span>🎯 Hard</span>
                <span>📝 42 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "ટ્રાન્સલેશન દરમિયાન, રાઇબોઝોમની A સાઇટ પર કયું તત્વ બંધાય છે?", "options": ["A) mRNA", "B) tRNA જેમાં એમિનોએસિડ બંધાયેલ હોય", "C) રિલીઝ ફેક્ટર", "D) rRNA"], "correct": 1, "explanation": "A સાઇટ (એમિનોએસિલ સાઇટ) પર tRNA જેમાં એમિનોએસિડ બંધાયેલ હોય તે બંધાય છે. mRNA P સાઇટ અને E સાઇટ પર બંધાયેલા tRNA વચ્ચે પસાર થાય છે, પરંતુ A સાઇટ પર તાજેતર બનેલા પેપ્ટાઇડ શૃંખલા સાથે નવો એમિનોએસિડ લાવવા માટે નવું tRNA બંધાય છે. રિલીઝ ફેક્ટર ટ્રાન્સલેશનના અંતે બંધાય છે, જ્યારે rRNA રાઇબોઝોમનો સ્ટ્રક્ચરલ ઘટક છે.", "ncert_ref": "Class XII - પ્રકરણ ૬: જૈવ-અણુઓ અને તેના કાર્યો", "difficulty": "Hard", "num": 1}, {"question": "ટ્રાન્સલેશન દરમિયાન, કયા ઉત્સેચક દ્વારા પેપ્ટાઇડ બંધ રચાય છે?", "options": ["A) RNA પોલિમરેઝ", "B) પેપ્ટિડાઇલ ટ્રાન્સફરેઝ", "C) હેલિકેઝ", "D) લાઇગેઝ"], "correct": 1, "explanation": "પેપ્ટિડાઇલ ટ્રાન્સફરેઝ ઉત્સેચક રાઇબોઝોમની મોટી સબયુનિટમાં હાજર હોય છે અને તે પેપ્ટાઇડ બંધની રચના માટે જવાબદાર છે. RNA પોલિમરેઝ ટ્રાન્સક્રિપ્શનમાં ભાગ લે છે, હેલિકેઝ DNAને અનવાઇન્ડ કરે છે, અને લાઇગેઝ DNA ટુકડાઓને જોડે છે.", "ncert_ref": "Class XII - પ્રકરણ ૬: જૈવ-અણુઓ અને તેના કાર્યો", "difficulty": "Hard", "num": 2}, {"question": "ટ્રાન્સલેશનની શરૂઆત કયા કોડોનથી થાય છે?", "options": ["A) UAA", "B) UAG", "C) AUG", "D) UGA"], "correct": 2, "explanation": "AUG કોડોન ટ્રાન્સલેશનની શરૂઆત કરે છે અને તે મિથાયોનિન એમિનોએસિડ માટે કોડ કરે છે. UAA, UAG, અને UGA સ્ટોપ કોડોન છે જે ટ્રાન્સલેશનના અંતને સૂચવે છે.", "ncert_ref": "Class XII - પ્રકરણ ૬: જૈવ-અણુઓ અને તેના કાર્યો", "difficulty": "Hard", "num": 3}, {"question": "ટ્રાન્સલેશન દરમિયાન, કયા રાઇબોઝોમલ સબયુનિટ mRNA સાથે જોડાય છે?", "options": ["A) ૬૦S", "B) ૪૦S", "C) ૩૦S", "D) ૫૦S"], "correct": 1, "explanation": "યુકેરિયોટિક કોષોમાં, ૪૦S રાઇબોઝોમલ સબયુનિટ mRNA સાથે જોડાય છે અને ટ્રાન્સલેશનની શરૂઆત કરે છે. ૬૦S સબયુનિટ પછી જોડાય છે અને ૮૦S રાઇબોઝોમ બનાવે છે. પ્રોકેરિયોટિક કોષોમાં, ૩૦S સબયુનિટ mRNA સાથે જોડાય છે.", "ncert_ref": "Class XII - પ્રકરણ ૬: જૈવ-અણુઓ અને તેના કાર્યો", "difficulty": "Hard", "num": 4}, {"question": "ટ્રાન્સલેશન દરમિયાન, કયા પ્રકારના RNA મોલેક્યુલ્સ એમિનોએસિડને રાઇબોઝોમ પર લાવે છે?", "options": ["A) mRNA", "B) rRNA", "C) tRNA", "D) snRNA"], "correct": 2, "explanation": "tRNA (ટ્રાન્સફર RNA) મોલેક્યુલ્સ એમિનોએસિડને રાઇબોઝોમ પર લાવે છે અને mRNA પરના કોડોન સાથે જોડાય છે. mRNA મેસેંજર RNA છે જે જનીન સંદેશો લાવે છે, rRNA રાઇબોઝોમનો સ્ટ્રક્ચરલ ઘટક છે, અને snRNA સ્પ્લાઇસિંગમાં ભાગ લે છે.", "ncert_ref": "Class XII - પ્રકરણ ૬: જૈવ-અણુઓ અને તેના કાર્યો", "difficulty": "Hard", "num": 5}, {"question": "ટ્રાન્સલેશન દરમિયાન, જ્યારે રાઇબોઝોમ mRNA પરના UAA કોડોનને વાંચે છે, ત્યારે નીચેનામાંથી કયું કથન સત્ય છે?", "options": ["A) પેપ્ટાઇડ શૃંખલા વિકસિત થવાનું ચાલુ રહે છે અને tRNA A સાઇટ પર બંધાય છે", "B) રિલીઝ ફેક્ટર (RF) A સાઇટ પર બંધાય છે અને પેપ્ટાઇડ શૃંખલાને મુક્ત કરે છે", "C) રાઇબોઝોમ mRNA પરથી અલગ થઈ જાય છે અને ટ્રાન્સલેશન પૂર્ણ થાય છે", "D) એમિનોએસિલ-tRNA સિંથેટેઝ ઉત્સેચક સક્રિય થાય છે અને નવો tRNA બનાવે છે"], "correct": 1, "explanation": "UAA એ સ્ટોપ કોડોન છે, જે ટ્રાન્સલેશનના અંતને સૂચવે છે. રિલીઝ ફેક્ટર (RF) A સાઇટ પર બંધાય છે અને પેપ્ટાઇડ શૃંખલાને મુક્ત કરે છે, જે ટ્રાન્સલેશનને પૂર્ણ કરે છે. A વિકલ્પ ખોટો છે કારણ કે UAA કોડોન પર tRNA બંધાય નહીં. C વિકલ્પ અધૂરો છે કારણ કે રાઇબોઝોમ mRNA પરથી અલગ થતું નથી, પરંતુ પેપ્ટાઇડ શૃંખલા મુક્ત થાય છે. D વિકલ્પ ખોટો છે કારણ કે એમિનોએસિલ-tRNA સિંથેટેઝ ટ્રાન્સલેશન દરમિયાન સક્રિય થતું નથી.", "ncert_ref": "Class XII - Chapter 6: જૈવ-અણુઓ અને જીવનની પ્રક્રિયાઓ", "difficulty": "Hard", "num": 6}, {"question": "ટ્રાન્સલેશન દરમિયાન, જો એક tRNA નું એન્ટીકોડોન 5'-UAC-3' હોય, તો તે કયા mRNA કોડોન સાથે જોડાશે?", "options": ["A) 5'-AUG-3'", "B) 5'-UAC-3'", "C) 5'-CAU-3'", "D) 5'-GUA-3'"], "correct": 0, "explanation": "tRNA નું એન્ટીકોડોન mRNA ના કોડોન સાથે પૂરક યુગ્મન (complementary base pairing) દ્વારા જોડાય છે. 5'-UAC-3' એન્ટીકોડોન 5'-AUG-3' કોડોન સાથે જોડાશે કારણ કે A-U અને U-A પૂરક જોડી બનાવે છે. B વિકલ્પ ખોટો છે કારણ કે એન્ટીકોડોન અને કોડોન એકસરખા નથી હોતા. C અને D વિકલ્પો ખોટા છે કારણ કે તેઓ પૂરક યુગ્મનને અનુરૂપ નથી.", "ncert_ref": "Class XII - Chapter 6: જૈવ-અણુઓ અને જીવનની પ્રક્રિયાઓ", "difficulty": "Hard", "num": 7}, {"question": "ટ્રાન્સલેશન દરમિયાન, નીચેનામાંથી કયું કથન પોલીરાઇબોઝોમ વિશે સત્ય નથી?", "options": ["A) પોલીરાઇબોઝોમ એક જ mRNA પર બહુવિધ રાઇબોઝોમની હાજરી છે", "B) પોલીરાઇબોઝોમ પ્રોટીન સિંથેસિસની દરને વધારે છે", "C) પોલીરાઇબોઝોમ મુખ્યત્વે યુકેરિયોટિક કોષોમાં જોવા મળે છે", "D) પોલીરાઇબોઝોમ દરમિયાન, દરેક રાઇબોઝોમ એક જ પ્રોટીનની નકલ બનાવે છે"], "correct": 2, "explanation": "પોલીરાઇબોઝોમ (પોલીસોમ) પ્રોકેરિયોટિક કોષોમાં જોવા મળે છે, જ્યાં એક જ mRNA પર બહુવિધ રાઇબોઝોમ કામ કરે છે. A, B, અને D વિકલ્પો સત્ય છે કારણ કે પોલીરાઇબોઝોમ mRNA પર બહુવિધ રાઇબોઝોમની હાજરી છે, પ્રોટીન સિંથેસિસની દર વધારે છે, અને દરેક રાઇબોઝોમ એક જ પ્રોટીનની નકલ બનાવે છે. C વિકલ્પ ખોટો છે કારણ કે પોલીરાઇબોઝોમ મુખ્યત્વે પ્રોકેરિયોટિક કોષોમાં જોવા મળે છે, ન કે યુકેરિયોટિક કોષોમાં.", "ncert_ref": "Class XII - Chapter 6: જૈવ-અણુઓ અને જીવનની પ્રક્રિયાઓ", "difficulty": "Hard", "num": 8}, {"question": "ટ્રાન્સલેશન દરમિયાન, જો એક એમિનોએસિડને કોડ કરતા કોડોનને મ્યુટેશન દ્વારા બદલવામાં આવે છે અને તેના બદલે સ્ટોપ કોડોન આવે છે, તો નીચેનામાંથી કયું પરિણામ થશે?", "options": ["A) પ્રોટીનની લંબાઈ વધશે", "B) પ્રોટીનની લંબાઈ ઘટશે", "C) પ્રોટીનની લંબાઈ પર કોઈ અસર થશે નહીં", "D) પ્રોટીનની લંબાઈ અને ક્રિયાશીલતા બંને પર અસર થશે"], "correct": 1, "explanation": "જો કોડોનને મ્યુટેશન દ્વારા સ્ટોપ કોડોનમાં બદલવામાં આવે છે, તો ટ્રાન્સલેશન અચાનક અટકી જાય છે, જેના કારણે પ્રોટીનની લંબાઈ ઘટે છે. A વિકલ્પ ખોટો છે કારણ કે પ્રોટીનની લંબાઈ વધતી નથી. C વિકલ્પ ખોટો છે કારણ કે પ્રોટીનની લંબાઈ પર અસર થાય છે. D વિકલ્પ અધૂરો છે કારણ કે પ્રોટીનની ક્રિયાશીલતા પર અસર થઈ શકે છે, પરંતુ પ્રશ્ન મુખ્યત્વે લંબાઈ વિશે છે.", "ncert_ref": "Class XII - Chapter 5: અનુવંશિકતા અને વિવિધતાના સિદ્ધાંતો", "difficulty": "Hard", "num": 9}, {"question": "ટ્રાન્સલેશન દરમિયાન, નીચેનામાંથી કયું કથન રાઇબોઝોમલ RNA (rRNA) વિશે સત્ય છે?", "options": ["A) rRNA એ ટ્રાન્સલેશન દરમિયાન એમિનોએસિડને વહન કરે છે", "B) rRNA એ રાઇબોઝોમની રચનામાં ભાગ લે છે અને પેપ્ટાઇડ બંધ રચનામાં મદદ કરે છે", "C) rRNA એ mRNA ની નકલ બનાવે છે", "D) rRNA એ ટ્રાન્સલેશનને નિયંત્રિત કરે છે અને ઉત્સેચક તરીકે કામ કરે છે"], "correct": 1, "explanation": "rRNA એ રાઇબોઝોમની રચનામાં ભાગ લે છે અને પેપ્ટાઇડ બંધ રચનામાં મદદ કરે છે. A વિકલ્પ ખોટો છે કારણ કે એમિનોએસિડને વહન કરવાનું કામ tRNA કરે છે. C વિકલ્પ ખોટો છે કારણ કે mRNA ની નકલ બનાવવાનું કામ ટ્રાન્સક્રિપ્શન દરમિયાન થાય છે. D વિકલ્પ ખોટો છે કારણ કે rRNA ઉત્સેચક તરીકે કામ કરતું નથી.", "ncert_ref": "Class XII - Chapter 6: જૈવ-અણુઓ અને જીવનની પ્રક્રિયાઓ", "difficulty": "Hard", "num": 10}, {"question": "ટ્રાન્સલેશન દરમિયાન, નીચેનામાંથી કયું કથન 'વાંચન ફ્રેમ' (reading frame) વિશે ખોટું છે?", "options": ["A) વાંચન ફ્રેમ mRNA પરના ન્યુક્લિયોટાઇડની ત્રણ-ત્રણની જૂથમાં વાંચણી કરવાની દિશા નક્કી કરે છે.", "B) mRNA પર એક જ વાંચન ફ્રેમ હોવા છતાં, અલગ-અલગ પ્રોટીનની રચના થઈ શકે છે.", "C) વાંચન ફ્રેમમાં ફેરફાર થવાથી પ્રોટીનની પ્રાથમિક રચનામાં મોટો ફેરફાર થઈ શકે છે.", "D) વાંચન ફ્રેમની શરૂઆત સ્ટાર્ટ કોડોન (AUG) થી થાય છે."], "correct": 1, "explanation": "વાંચન ફ્રેમ (reading frame) mRNA પરના ન્યુક્લિયોટાઇડને ત્રણ-ત્રણની જૂથમાં વાંચવાની દિશા નક્કી કરે છે, અને તે સ્ટાર્ટ કોડોન (AUG) થી શરૂ થાય છે. વાંચન ફ્રેમમાં ફેરફાર થવાથી પ્રોટીનની પ્રાથમિક રચનામાં મોટો ફેરફાર થઈ શકે છે. પરંતુ એક જ વાંચન ફ્રેમ હોવા છતાં, અલગ-અલગ પ્રોટીનની રચના થઈ શકતી નથી, કારણ કે વાંચન ફ્રેમ નક્કી કરે છે કે કયા એમિનોએસિડ ક્રમમાં જોડાશે. આમ, વિકલ્પ B ખોટો છે.", "ncert_ref": "Class XII - Chapter 6: જૈવ-અણુઓ અને પ્રોટીન સંશ્લેષણ", "difficulty": "Hard", "num": 11}, {"question": "ટ્રાન્સલેશન દરમિયાન, નીચેનામાંથી કયું કથન 'પોલીરાઇબોઝોમ' વિશે સત્ય છે?", "options": ["A) પોલીરાઇબોઝોમ માત્ર યુકેરિયોટિક કોષોમાં જોવા મળે છે.", "B) પોલીરાઇબોઝોમમાં એક જ mRNA પર બહુવિધ રાઇબોઝોમ જોડાયેલા હોય છે, જે એકસાથે ટ્રાન્સલેશન કરે છે.", "C) પોલીરાઇબોઝોમની રચના માત્ર પ્રોકેરિયોટિક કોષોમાં જ થાય છે.", "D) પોલીરાઇબોઝોમમાં રાઇબોઝોમ એકબીજાથી સંપૂર્ણપણે અલગ હોય છે."], "correct": 1, "explanation": "પોલીરાઇબોઝોમમાં એક જ mRNA પર બહુવિધ રાઇબોઝોમ જોડાયેલા હોય છે, જે એકસાથે ટ્રાન્સલેશન કરે છે. આ રચના પ્રોકેરિયોટિક અને દ્રમાં થાય છે અને પછી કોષરસમાં મોકલવામાં આવે છે."], "correct": 0, "explanation": "ખોટું કથન A છે. રાઇબોઝોમ 60S અને 40S સબયુનિટ યુકેરિયોટિક કોષમાં હાજર છે, પરંતુ પ્રોકેરિયોટિક કોષમાં 50S અને 30S સબયુનિટ હાજર છે. B સત્ય છે કારણ કે રાઇબોઝોમમાં rRNA અને પ્રોટીન બંને હાજર છે. C ખોટું છે કારણ કે રાઇબોઝોમની રચના કોષકેન્દ્રમાં થાય છે. D સત્ય છે કારણ કે રાઇબોઝોમની રચના કોષકેન્દ્રમાં થાય છે અને પછી કોષરસમાં મોકલવામાં આવે છે.", "ncert_ref": "Class XI - Chapter 8: કોષ: જીવનની મૂળભૂત એકમ", "difficulty": "Hard", "num": 24}, {"question": "ટ્રાન્સલેશન દરમિયાન, નીચેનામાંથી કયું કથન 'રાઇબોઝોમની E સાઇટ' વિશે ખોટું છે?", "options": ["A) E સાઇટ એ ડીએસીપી (deacylated) tRNA ને રાઇબોઝોમમાંથી બહાર કાઢવા માટે જવાબદાર છે.", "B) E સાઇટ પર tRNA એ પેપ્ટાઇડ બંધ રચનામાં ભાગ લેતું નથી.", "C) E સાઇટ એ રાઇબોઝોમના 60S સબયુનિટમાં સ્થિત છે.", "D) E સાઇટ પર tRNA એ એમિનોએસિલ-ટીઆરએનએ (aminoacyl-tRNA) સ્વરૂપે હોય છે."], "correct": 3, "explanation": "E સાઇટ (Exit site) એ ડીએસીપી tRNA ને રાઇબોઝોમમાંથી બહાર કાઢવા માટે જવાબદાર છે, જેથી તે પુનઃવપરાશ માટે તૈયાર થઈ શકે. E સાઇટ પરનું tRNA પેપ્ટાઇડ બંધ રચનામાં ભાગ લેતું નથી, અને તે રાઇબોઝોમના 60S સબયુનિટમાં સ્થિત છે. પરંતુ E સાઇટ પરનું tRNA એ ડીએસીપી સ્વરૂપે (બિન-એમિનોએસિલેટેડ) હોય છે, એમિનોએસિલ-ટીઆરએનએ નહીં. આથી વિકલ્પ D ખોટો છે.", "ncert_ref": "કક્ષ 12 - પ્રકરણ 6: જૈવ અણુઓ અને જીવનની ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 25}, {"question": "ટ્રાન્સલેશન દરમિયાન, જો એક mRNA અણુ પર 5'-AUG-GCC-UUU-AGG-UAA-3' ક્રમ હોય, તો નીચેનામાંથી કયું કથન સત્ય છે?", "options": ["A) આ mRNA નો અનુવાદ દરમિયાન, રાઇબોઝોમ AGG કોડોન પર અટકી જશે કારણ કે AGG એ સ્ટોપ કોડોન છે.", "B) આ mRNA નો અનુવાદ દરમિયાન, રાઇબોઝોમ દ્વારા AGG કોડોનને આર્જિનિન એમિનોએસિડ માટે કોડ કરવામાં આવશે.", "C) આ mRNA નો અનુવાદ દરમિયાન, રાઇબોઝોમ UAA કોડોન પર અટકી જશે અને AGG કોડોનને વાંચશે નહીં.", "D) આ mRNA નો અનુવાદ દરમિયાન, રાઇબોઝોમ દ્વારા AGG કોડોનને સેરિન એમિનોએસિડ માટે કોડ કરવામાં આવશે."], "correct": 2, "explanation": "UAA એ સ્ટોપ કોડોન છે, જે ટ્રાન્સલેશનને અટકાવે છે. AGG એ આર્જિનિન માટે કોડ કરે છે, પરંતુ UAA પ A નું ટ્રાન્સલેશન એક જ રાઇબોઝોમ દ્વારા થાય અને કોઈ પણ પ્રકારનું રાઇબોઝોમલ ફ્રેમશિફ્ટિંગ કે સપ્રેસર tRNA હાજર ન હોય, તો નીચેના પૈકી કયું વિધાન સાચું છે?", "options": ["A) આ mRNA પરથી બે અલગ-અલગ પોલિપેપ્ટાઇડ શૃંખલાઓનું સંશ્લેષણ થશે", "B) ટ્રાન્સલેશન દરમિયાન માત્ર એક જ પોલિપેપ્ટાઇડ શૃંખલા બનશે જે 3 એમિનોએસિડ લાંબી હશે", "C) રાઇબોઝોમ UAA સ્ટોપ કોડોન પછી પણ ટ્રાન્સલેશન ચાલુ રાખશે અને વધારાના એમિનોએસિડ ઉમેરશે", "D) ટ્રાન્સલેશન દરમિયાન બે અલગ-અલગ વાંચન ફ્રેમમાંથી બે પોલિપેપ્ટાઇડ શૃંખલાઓ બનશે"], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે કારણ કે mRNA ક્રમમાં પ્રથમ AUG શરૂઆત કોડોન છે અને ત્યારબાદ UAA સ્ટોપ કોડોન આવે છે. આથી, ટ્રાન્સલેશન દરમિયાન માત્ર એક પોલિપેપ્ટાઇડ શૃંખલા બનશે જે 3 એમિનોએસિડ લાંબી હશે (AUG-CCG-UAU). વિકલ્પ A ખોટો છે કારણ કે એક જ રાઇબોઝોમ એક જ વાંચન ફ્રેમમાં ટ્રાન્સલેશન કરે છે. વિકલ્પ C ખોટો છે કારણ કે UAA સ્ટોપ કોડોન ટ્રાન્સલેશનને સમાપ્ત કરે છે. વિકલ્પ D ખોટો છે કારણ કે રાઇબોઝોમ એક જ વાંચન ફ્રેમમાં ટ્રાન્સલેશન કરે છે અને ફ્રેમશિફ્ટિંગ થતું નથી. NCERT Class XII - Chapter 6: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો (જનીન અભિવ્યક્તિ વિભાગ)માં આ વિગતો આપવામાં આવી છે.", "ncert_ref": "Class XII - પ્રકરણ 6: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "difficulty": "Hard", "num": 29}, {"question": "નીચેના પૈકી કયું વિધાન સેલેનોસિસ્ટીન (Sec) અને પાયરોલાઇસિન (Pyl) એમિનોએસિડના ટ્રાન્સલેશન દરમિયાન થતા સમાવેશ વિશે ખોટું છે?", "options": ["A) સેલેનોસિસ્ટીનનો સમાવેશ UGA કોડોન દ્વારા થાય છે, જે સામાન્ય રીતે સ્ટોપ કોડોન તરીકે ઓળખાય છે", "B) પાયરોલાઇસિનનો સમાવેશ UAG કોડોન દ્વારા થાય છે, જેને સેલેનોસિસ્ટીન ઇન્સર્શન સિક્વન્સ (SECIS)ની જરૂર પડે છે", "C) સેલેનોસિસ્ટીન tRNA (tRNA^Sec) નું એન્ટીકોડોન UCA હોય છે, જે UGA કોડોન સાથે બેઝ પેરિંગ કરે છે", "D) પાયરોલાઇસિનનો સમાવેશ કેટલાક આર્કિયા અને બેક્ટેરિયામાં જોવા મળે છે, જ્યારે સેલેનોસિસ્ટીનનો સમાવેશ યુકેરિયોટ્સ અને પ્રોકેરિયોટ્સ બંનેમાં થાય છે"], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે કારણ કે પાયરોલાઇસિનનો સમાવેશ UAG કોડોન દ્વારા થાય છે, પરંતુ તેને સેલેનોસિસ્ટીન ઇન્સર્શન સિક્વન્સ (SECIS)ની જરૂર પડતી નથી. તેના બદલે, પાયરોલાઇસિન માટે પાયરોલાઇસિન ઇન્સર્શન સિક્વન્સ (PYLIS) જરૂરી છે. વિકલ્પ A સાચું છે કારણ કે સેલેનોસિસ્ટીનનો સમાવેશ UGA કોડોન દ્વારા થાય છે. વિકલ્પ C સાચું છે કારણ કે tRNA^Sec નું એન્ટીકોડોન UCA હોય છે. વિકલ્પ D સાચું છે કારણ કે પાયરોલાઇસિનનો સમાવેશ કેટલાક આર્કિયા અને બેક્ટેરિયામાં જોવા મળે છે, જ્યારે સેલેનોસિસ્ટીનનો સમાવેશ બંને પ્રકારના કોષોમાં થાય છે. NCERT Class XII - Chapter 6: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો (જનીન અભિવ્યક્તિ વિભાગ)માં આ વિશેષ કિસ્સાઓનો ઉલ્લેખ છે.", "ncert_ref": "Class XII - પ્રકરણ 6: આનુવંશિકતા અને ભિન્નતાના સિદ્ધાંતો", "difficulty": "Hard", "num": 30}, {"question": "યુકેરિયોટિક કોષોમાં ટ્રાન્સલેશન દરમિયાન, નીચેનામાંથી કયું કથન 'કેપ-બાઇન્ડિંગ પ્રોટીન કોમ્પ્લેક્સ' (CBC) વિશે ખોટું છે?", "options": ["A) તે mRNA ના 5’ કેપ સાથે જોડાય છે અને ટ્રાન્સલેશનની શરૂઆતમાં મદદ કરે છે.", "B) તે eIF4F કોમ્પ્લેક્સનો એક ભાગ છે અને mRNA ની સ્થિરતા વધારે છે.", "C) તે મુખ્યત્વે પ્રોકેરિયોટ્સમાં જોવા મળે છે અને ટ્રાન્સલેશનની કાર્યક્ષમતા વધારે છે.", "D) તે પોલી(A) ટેલ સાથે પણ અંતરક્રિયા કરે છે અને ટ્રાન્સલેશનની દિશા નક્કી કરે છે."], "correct": 2, "explanation": "વિકલ્પ C ખોટો છે કારણ કે કેપ-બાઇન્ડિંગ પ્રોટીન કોમ્પ્લેક્સ (CBC) મુખ્યત્વે યુકેરિયોટ્સમાં જોવા મળે છે, પ્રોકેરિયોટ્સમાં નહીં. વિકલ્પ A સત્ય છે કારણ કે CBC mRNA ના 5’ કેપ સાથે જોડાય છે અને ટ્રાન્સલેશનની શરૂઆતમાં મદદ કરે છે. વિકલ્પ B સત્ય છે કારણ કે eIF4F કોમ્પ્લેક્સનો એક ભાગ હોવાને કારણે તે mRNA ની સ્થિરતા વધારે છે. વિકલ્પ D સત્ય છે કારણ કે તે પોલી(A) ટેલ સાથે અંતરક્રિયા કરે છે અને ટ્રાન્સલેશનની દિશા નક્કી કરે છે.", "ncert_ref": "Class XII - Chapter 6: જૈવ-અણુઓ અને જીવનની પ્રક્રિયાઓ", "difficulty": "Hard", "num": 31}, {"question": "ટ્રાન્સલેશન દરમિયાન, જો એક mRNA અણુ પર 5'-AUG-UUU-GAU-UAA-3' ક્રમ હોય, તો નીચેનામાંથી કયું કથન સત્ય છે?", "options": ["A) આ mRNA દ્વારા બનાવવામાં આવતું પ્રોટીન મેથિયોનિન, ફેનાઇલએલેનિન અને એસ્પાર્ટિક એસિડ ધરાવશે.", "B) આ mRNA દ્વારા બનાવવામાં આવતું પ્રોટીન મેથિયોનિન, ટાયરોસિન અને એસ્પાર્ટિક એસિડ ધરાવશે.", "C) આ mRNA દ્વારા બનાવવામાં આવતું પ્રોટીન મેથિયોનિન, ફેનાઇલએલેનિન અને ગ્લાયસિન ધરાવશે             container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
