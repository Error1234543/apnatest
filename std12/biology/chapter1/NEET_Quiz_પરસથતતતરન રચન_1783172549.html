<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - પરિસ્થિતિતંત્રની રચના</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 પરિસ્થિતિતંત્રની રચના</span>
                <span>🎯 Hard</span>
                <span>📝 44 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "પરિસ્થિતિતંત્રની રચનામાં 'ક્લાઇમેક્સ સમુદાય' એટલે શું? નીચેનામાંથી કયો વિકલ્પ તેની સૌથી યોગ્ય વ્યાખ્યા આપે છે?", "options": ["A) એક એવો સમુદાય જેમાં સ્થિર અવસ્થા પ્રાપ્ત થાય છે અને જૈવવિવિધતામાં વધારો થતો નથી", "B) એક એવો સમુદાય જેમાં પ્રાથમિક ઉત્પાદકોની સંખ્યા સૌથી વધુ હોય છે", "C) એક એવો સમુદાય જેમાં મૃતજીવી (ડેટ્રિટિવોર) જીવોની ગેરહાજરી હોય છે", "D) એક એવો સમુદાય જેમાં ઉર્જાનો પ્રવાહ એકદિશાત્મક હોય છે અને પોષણ સ્તરોની સંખ્યા સૌથી ઓછી હોય છે"], "correct": 0, "explanation": "ક્લાઇમેક્સ સમુદાય એ પરિસ્થિતિતંત્રની અંતિમ અવસ્થા છે જ્યાં જૈવ સમુદાય અને પર્યાવરણ વચ્ચે સંતુલન સ્થાપિત થાય છે. આ અવસ્થામાં જૈવવિવિધતા સ્થિર રહે છે અને વધુ ફેરફાર થતો નથી. વિકલ્પ A સૌથી યોગ્ય છે. વિકલ્પ B ખોટો છે કારણ કે પ્રાથમિક ઉત્પાદકોની સંખ્યા ક્લાઇમેક્સમાં સ્થિર હોય છે, પરંતુ તે સૌથી વધુ હોવી જરૂરી નથી. વિકલ્પ C ખોટો છે કારણ કે મૃતજીવી જીવો ક્લાઇમેક્સ સમુદાયનો અભિન્ન ભાગ હોય છે. વિકલ્પ D ખોટો છે કારણ કે ઉર્જાનો પ્રવાહ હંમેશા એકદિશાત્મક હોય છે, પરંતુ પોષણ સ્તરોની સંખ્યા ક્લાઇમેક્સમાં વધુ હોઈ શકે છે.", "ncert_ref": "Class XII - પ્રકરણ 14: પરિસ્થિતિતંત્ર", "difficulty": "Hard", "num": 1}, {"question": "નીચેનામાંથી કયો જીવ 'પાયોનિયર પ્રજાતિ' તરીકે ઓળખાય છે અને તે કયા પરિસ્થિતિતંત્રમાં જોવા મળે છે?", "options": ["A) લાઇકન - ખડકીય (લિથિક) પરિસ્થિતિતંત્ર", "B) મોસ - જળીય પરિસ્થિતિતંત્ર", "C) ફર્ન - વનસ્પતિ પરિસ્થિતિતંત્ર", "D) શેવાળ - મરુભૂમી પરિસ્થિતિતંત્ર"], "correct": 0, "explanation": "પાયોનિયર પ્રજાતિઓ એ પહેલી પ્રજાતિઓ હોય છે જે નવી અથવા ખાલી જગ્યાઓ પર વસવાટ કરે છે. લાઇકન ખડકીય સપાટી પર વસવાટ કરવા માટે પ્રથમ હોય છે અને તે ખડકોના ક્ષયમાં મદદ કરે છે, જેથી અન્ય વનસ્પતિઓ વિકસી શકે. વિકલ્પ A સાચો છે. વિકલ્પ B ખોટો છે કારણ કે મોસ જળીય પરિસ્થિતિતંત્રમાં પાયોનિયર પ્રજાતિ નથી. વિકલ્પ C ખોટો છે કારણ કે ફર્ન વનસ્પતિ પરિસ્થિતિતંત્રમાં પાયોનિયર પ્રજાતિ નથી. વિકલ્પ D ખોટો છે કારણ કે શેવાળ મરુભૂમી પરિસ્થિતિતંત્રમાં પાયોનિયર પ્રજાતિ નથી.", "ncert_ref": "Class XII - પ્રકરણ 14: પરિસ્થિતિતંત્ર", "difficulty": "Hard", "num": 2}, {"question": "પરિસ્થિતિતંત્રમાં 'ઉત્પાદકતા'ની દ્રષ્ટિએ નીચેનામાંથી કયો વિકલ્પ ખોટો છે?", "options": ["A) પ્રાથમિક ઉત્પાદકતા એ પ્રકાશસંશ્લેષણ દ્વારા કાર્બનિક પદાર્થોના સંશ્લેષણની પ્રક્રિયા છે", "B) દ્વિતીય ઉત્પાદકતા એ શાકાહારી જીવો દ્વારા ઉર્જાનો ઉપયોગ કરવાની પ્રક્રિયા છે", "C) કુલ પ્રાથમિક ઉત્પાદકતા (GPP) એ શ્વસન દ્વારા ગુમાવેલી ઉર્જાને બાદ કર્યા વગરની ઉત્પાદકતા છે", "D) નેટ પ્રાથમિક ઉત્પાદકતા (NPP) એ GPP માંથી શ્વસન દ્વારા ગુમાવેલી ઉર્જાને બાદ કર્યા પછીની ઉત્પાદકતા છે"], "correct": 1, "explanation": "દ્વિતીય ઉત્પાદકતા એ શાકાહારી જીવો દ્વારા ઉર્જાનો ઉપયોગ કરવાની પ્રક્રિયા નથી, પરંતુ તે માંસાહારી જીવો દ્વારા ઉર્જાનો ઉપયોગ કરવાની પ્રક્રિયા છે. વિકલ્પ B ખોટો છે. વિકલ્પ A સાચો છે કારણ કે પ્રાથમિક ઉત્પાદકતા પ્રકાશસંશ્લેષણ દ્વારા કાર્બનિક પદાર્થોના સંશ્લેષણની પ્રક્રિયા છે. વિકલ્પ C સાચો છે કારણ કે GPP એ શ્વસન દ્વારા ગુમાવેલી ઉર્જાને બાદ કર્યા વગરની ઉત્પાદકતા છે. વિકલ્પ D સાચો છે કારણ કે NPP એ GPP માંથી શ્વસન દ્વારા ગુમાવેલી ઉર્જાને બાદ કર્યા પછીની ઉત્પાદકતા છે.", "ncert_ref": "Class XII - પ્રકરણ 14: પરિસ્થિતિતંત્ર", "difficulty": "Hard", "num": 3}, {"question": "નીચેનામાંથી કયો પરિસ્થિતિતંત્રનો ઘટક 'એપિફાઇટ' તરીકે ઓળખાય છે અને તે કયા પરિસ્થિતિતંત્રમાં જોવા મળે છે?", "options": ["A) ઓર્કિડ - વરસાદી જંગલ", "B) કેળ - સવાના", "C) પાઈન - ટૈગા", "D) કેક્ટસ - મરુભૂમી"], "correct": 0, "explanation": "એપિફાઇટ એ એવા પાદપ છે જે અન્ય પાદપ પર વૃદ્ધિ પામે છે પરંતુ તે તેમના પોષણ માટે આશ્રયદાતા પાદપ પર આધારિત નથી. ઓર્કિડ વરસાદી જંગલમાં એપિફાઇટ તરીકે જોવા મળે છે. વિકલ્પ A સાચો છે. વિકલ્પ B ખોટો છે કારણ કે કેળ સવાનામાં એપિફાઇટ નથી. વિકલ્પ C ખોટો છે કારણ કે પાઈન ટૈગામાં એપિફાઇટ નથી. વિકલ્પ D ખોટો છે કારણ કે કેક્ટસ મરુભૂમીમાં એપિફાઇટ નથી.", "ncert_ref": "Class XII - પ્રકરણ 14: પરિસ્થિતિતંત્ર", "difficulty": "Hard", "num": 4}, {"question": "પરિસ્થિતિતંત્રમાં 'પોષણ સ્તર'ની દ્રષ્ટિએ નીચેનામાંથી કયો વિકલ્પ ખોટો છે?", "options": ["A) પ્રાથમિક ઉત્પાદકો પ્રથમ પોષણ સ્તર પર હોય છે", "B) શાકાહારી જીવો દ્વિતીય પોષણ સ્તર પર હોય છે", "C) માંસાહારી જીવો તૃતીય પોષણ સ્તર પર હોય છે", "D) મૃતજીવી જીવો ચતુર્થ પોષણ સ્તર પર હોય છે"], "correct": 3, "explanation": "મૃતજીવી જીવો (ડેટ્રિટિવોર) પોષણ સ્તર પર નહીં, પરંતુ તેઓ મૃત કાર્બનિક પદાર્થોનો ઉપયોગ કરે છે અને ઉર્જાનો પ્રવાહ પોષણ સ્તરોમાં સમાવિષ્ટ નથી. વિકલ્પ D ખોટો છે. વિકલ્પ A સાચો છે કારણ કે પ્રાથમિક ઉત્પાદકો પ્રથમ પોષણ સ્તર પર હોય છે. વિકલ્પ B સાચો છે કારણ કે શાકાહારી જીવો દ્વિતીય પોષણ સ્તર પર હોય છે. વિકલ્પ C સાચો છે કારણ કે માંસાહારી જીવો તૃતીય પોષણ સ્તર પર હોય છે.", "ncert_ref": "Class XII - પ્રકરણ 14: પરિસ્થિતિતંત્ર", "difficulty": "Hard", "num": 5}, {"question": "પરિસ્થિતિતંત્રની રચનામાં 'એકોટોન' એટલે શું? નીચેનામાંથી કયો વિકલ્પ તેની સૌથી યોગ્ય વ્યાખ્યા આપે છે?", "options": ["A) બે વિવિધ પરિસ્થિતિતંત્રો વચ્ચેનો સંક્રમણ ક્ષેત્ર જ્યાં બંનેની લાક્ષણિકતાઓ જોવા મળે છે", "B) એક જ પરિસ્થિતિતંત્રમાં જીવોની વસતિનું સ્થિર સ્તર જ્યાં ઉત્ક્રાંતિ થતી નથી", "C) પરિસ્થિતિતંત્રમાં એવો ભાગ જ્યાં માત્ર ઉત્પાદકો જ જોવા મળે છે અને શાકાહારી પ્રાણીઓ અનુપસ્થિત હોય છે", "D) પરિસ્થિતિતંત્રનો એવો ભાગ જ્યાં માત્ર વિઘટકો જ ક્રિયાશીલ હોય છે અને ઉત્પાદકો અનુપસ્થિત હોય છે"], "correct": 0, "explanation": "એકોટોન એ બે વિવિધ પરિસ્થિતિતંત્રો વચ્ચેનો સંક્રમણ ક્ષેત્ર હોય છે જ્યાં બંને પરિસ્થિતિતંત્રોની લાક્ષણિકતાઓ જોવા મળે છે. ઉદાહરણ તરીકે, જંગલ અને ઘાસના મેદાન વચ્ચેનો ક્ષેત્ર. વિકલ્પ B ક્લાઇમેક્સ સમુદાયની વ્યાખ્યાને અનુરૂપ છે, વિકલ્પ C અને D અપૂર્ણ છે કારણ કે તેઓ પરિસ્થિતિતંત્રના માત્ર એક જ ઘટક પર ધ્યાન કેન્દ્રિત કરે છે.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 6}, {"question": "નીચેનામાંથી કયો જીવ 'કીસ્ટોન પ્રજાતિ' તરીકે ઓળખાય છે અને તે કયા પરિસ્થિતિતંત્રમાં મહત્વની ભૂમિકા ભજવે છે?", "options": ["A) સિંહ - સવાના પરિસ્થિતિતંત્ર", "B) ઓટર - કેલ્પ જંગલ પરિસ્થિતિતંત્ર", "C) હાથી - વરસાદી જંગલ પરિસ્થિતિતંત્ર", "D) મધમાખી - ઘાસના મેદાન પરિસ્થિતિતંત્ર"], "correct": 1, "explanation": "ઓટર (Sea Otter) એ કેલ્પ જંગલ પરિસ્થિતિતંત્રમાં 'કીસ્ટોન પ્રજાતિ' તરીકે ઓળખાય છે કારણ કે તે કેલ્પને ખાતા સી અર્ચિનની વસતિને નિયંત્રિત કરે છે, જે કેલ્પ જંગલના અસ્તિત્વ માટે મહત્વપૂર્ણ છે. સિંહ, હાથી અને મધમાખી કીસ્ટોન પ્રજાતિઓ નથી, પરંતુ તેઓ તેમના પરિસ્થિતિતંત્રમાં મહત્વની ભૂમિકા ભજવે છે.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 7}, {"question": "પરિસ્થિતિતંત્રમાં 'પોષણ જાળ'ની રચનામાં નીચેનામાંથી કયો ઘટક સૌથી ઓછો મહત્વનો છે?", "options": ["A) ઉત્પાદકો", "B) પ્રાથમિક ઉપભોક્તાઓ", "C) દ્વિતીય ઉપભોક્તાઓ", "D) વિઘટકો"], "correct": 3, "explanation": "પોષણ જાળમાં વિઘટકો (Decomposers) સૌથી ઓછો મહત્વનો ઘટક નથી, પરંતુ પ્રશ્નમાં 'સૌથી ઓછો મહત્વનો' પૂછવામાં આવ્યું છે. વાસ્તવમાં, વિઘટકો પોષણ ચક્રમાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે, પરંતુ ઉત્પાદકો, પ્રાથમિક ઉપભોક્તાઓ અને દ્વિતીય ઉપભોક્તાઓની તુલનામાં, તેઓ પોષણ જાળની રચનામાં સીધી રીતે સામેલ નથી. ઉત્પાદકો પોષણ જાળની પાયાની કડી છે, જ્યારે પ્રાથમિક અને દ્વિતીય ઉપભોક્તાઓ પોષણ સ્તરોની રચના કરે છે.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 8}, {"question": "નીચેનામાંથી કયો વિકલ્પ 'પરિસ્થિતિતંત્રની સ્થિરતા'ને સૌથી યોગ્ય રીતે વર્ણવે છે?", "options": ["A) પરિસ્થિતિતંત્રમાં જીવોની વસતિનું સ્થિર સ્તર જ્યાં ઉત્ક્રાંતિ થતી નથી", "B) પરિસ્થિતિતંત્રની ક્ષમતા જ્યાં તે બાહ્ય પરિબળોના ફેરફારોને સહન કરી શકે છે અને મૂળ અવસ્થામાં પાછો ફરી શકે છે", "C) પરિસ્થિતિતંત્રમાં જીવોની વસતિનું સતત વધતું સ્તર જ્યાં નવી પ્રજાતિઓનો ઉમેરો થતો રહે છે", "D) પરિસ્થિતિતંત્રમાં જીવોની વસતિનું સતત ઘટતું સ્તર જ્યાં પ્રજાતિઓનું લોપ થતું રહે છે"], "correct": 1, "explanation": "પરિસ્થિતિતંત્રની સ્થિરતા એ તેની ક્ષમતા છે જ્યાં તે બાહ્ય પરિબળોના ફેરફારોને સહન કરી શકે છે અને મૂળ અવસ્થામાં પાછો ફરી શકે છે. વિકલ્પ A ક્લાઇમેક્સ સમુદાયની વ્યાખ્યાને અનુરૂપ છે, જ્યારે વિકલ્પ C અને D પરિસ્થિતિતંત્રની અસ્થિર અવસ્થાને વર્ણવે છે.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 9}, {"question": "પરિસ્થિતિતંત્રમાં 'એલોપેટ્રિક પ્રજનન' એટલે શું? નીચેનામાંથી કયો વિકલ્પ તેની સૌથી યોગ્ય વ્યાખ્યા આપે છે?", "options": ["A) એક જ પ્રજાતિના બે જૂથો વચ્ચેના ભૌગોલિક અલગીકરણને કારણે નવી પ્રજાતિઓનું નિર્માણ", "B) એક જ પ્રજાતિના બે જૂથો વચ્ચેના પોષણ સંબંધોને કારણે નવી પ્રજાતિઓનું નિર્માણ", "C) એક જ પ્રજાતિના બે જૂથો વચ્ચેના વર્તણૂકીય ફેરફારોને કારણે નવી પ્રજાતિઓનું નિર્માણ", "D) એક જ પ્રજાતિના બે જૂથો વચ્ચેના અનુવંશિક ફેરફારોને કારણે નવી પ્રજાતિઓનું નિર્માણ"], "correct": 0, "explanation": "એલોપેટ્રિક પ્રજનન એ એક જ પ્રજાતિના બે જૂથો વચ્ચેના ભૌગોલિક અલગીકરણને કારણે નવી પ્રજાતિઓનું નિર્માણ છે. વિકલ્પ B, C અને D અન્ય પ્રકારના પ્રજનન (સિમપેટ્રિક પ્રજનન)ને વર્ણવે છે, જ્યાં ભૌગોલિક અલગીકરણ નથી.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 10}, {"question": "પરિસ્થિતિતંત્રની રચનામાં 'એજ કોમ્યુનિટી' (Edge Community) ની ભૂમિકા વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) એજ કોમ્યુનિટી એ એક એવો સમુદાય છે જે બે વિવિધ પરિસ્થિતિતંત્રોના સંક્રમણ ક્ષેત્રમાં વિકસે છે અને તેની જૈવવિવિધતા ઓછી હોય છે.", "B) એજ કોમ્યુનિટી એ પરિસ્થિતિતંત્રના કિનારાના ભાગમાં વસતો સમુદાય છે જેની પ્રજાતિઓની સંખ્યા અને જૈવવિવિધતા મધ્યભાગ કરતાં વધુ હોય છે.", "C) એજ કોમ્યુનિટી એ પરિસ્થિતિતંત્રના મધ્યભાગમાં વસતો સમુદાય છે જેની પ્રજાતિઓની સંખ્યા કિનારા કરતાં ઓછી હોય છે.", "D) એજ કોમ્યુનિટી એ પરિસ્થિતિતંત્રના કિનારાના ભાગમાં વસતો સમુદાય છે જેની પ્રજાતિઓની સંખ્યા અને જૈવવિવિધતા મધ્યભાગ કરતાં ઓછી હોય છે."], "correct": 1, "explanation": "એજ કોમ્યુનિટી (Edge Community) એ પરિસ્થિતિતંત્રના કિનારાના ભાગમાં વસતો સમુદાય છે. આ ક્ષેત્રમાં પ્રજાતિઓની સંખ્યા અને જૈવવિવિધતા મધ્યભાગ કરતાં વધુ હોય છે કારણ કે અહીં બે વિવિધ પરિસ્થિતિતંત્રોના સંક્રમણથી નવી પરિસ્થિતિઓ ઉદ્ભવે છે. વિકલ્પ A ખોટો છે કારણ કે એજ કોમ્યુનિટીની જૈવવિવિધતા ઓછી નથી હોતી. વિકલ્પ C અને D ખોટા છે કારણ કે એજ કોમ્યુનિટી કિનારાના ભાગમાં જ વસે છે અને તેની જૈવવિવિધતા મધ્યભાગ કરતાં વધુ હોય છે.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકતંત્ર", "difficulty": "Hard", "num": 11}, {"question": "પરિસ્થિતિતંત્રમાં 'સુપરસેચરેશન' (Super saturation) ની ઘટના ક્યારે થાય છે?", "options": ["A) જ્યારે પરિસ્થિતિતંત્રમાં ઉત્પાદકોની સંખ્યા ખૂબ જ ઓછી હોય છે.", "B) જ્યારે પરિસ્થિતિતંત્રમાં પ્રાથમિક ઉત્પાદકતાનો દર ખૂબ જ ઊંચો હોય છે અને તેની તુલનામાં શ્વસન દર ઓછો હોય છે.", "C) જ્યારે પરિસ્થિતિતંત્રમાં દ્વિતીયક ઉત્પાદકોની સંખ્યા ખૂબ જ વધુ હોય છે.", "D) જ્યારે પરિસ્થિતિતંત્રમાં ઉત્સર્જન દર ખૂબ જ ઊંચો હોય છે."], "correct": 1, "explanation": "સુપરસેચરેશન એ પરિસ્થિતિતંત્રમાં એવી ઘટના છે જ્યારે પ્રાથમિક ઉત્પાદકતાનો દર (પ્રકાશસંશ્લેષણ દ્વારા) ખૂબ જ ઊંચો હોય છે અને તેની તુલનામાં શ્વસન દર ઓછો હોય છે, જેથી ઓક્સિજનની માત્રા પાણી અથવા હવામાં સંપૃક્ત થઈ જાય છે. વિકલ્પ A, C, અને D ખોટા છે કારણ કે તેઓ સુપરસેચરેશનની ઘટનાને યોગ્ય રીતે વર્ણવતા નથી.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકતંત્ર", "difficulty": "Hard", "num": 12}, {"question": "પરિસ્થિતિતંત્રમાં 'પેરામીટર' અને 'ફેક્ટર' વચ્ચેનો તફાવત કયો છે?", "options": ["A) પેરામીટર એ પરિસ્થિતિતંત્રના ભૌતિક ઘટકો છે જ્યારે ફેક્ટર એ જૈવિક ઘટકો છે.", "B) પેરામીટર એ પરિસ્થિતિતંત્રના માપનયોગ્ય ઘટકો છે જ્યારે ફેક્ટર એ પરિસ્થિતિતંત્રના અમૂર્ત ઘટકો છે.", "C) પેરામીટર એ પરિસ્થિતિતંત્રના એવા ઘટકો છે જેની કિંમતો પરિસ્થિતિતંત્રની સ્થિતિ પર આધાર રાખે છે, જ્યારે ફેક્ટર એ પરિસ્થિતિતંત્રના એવા ઘટકો છે જે પરિસ્થિતિતંત્રની સ્થિતિને અસર કરે છે.", "D) પેરામીટર અને ફેક્ટર એ પરિસ્થિતિતંત્રના એકસરખા ઘટકો છે, જેઓની કોઈ જુદી જુદી ભૂમિકા નથી."], "correct": 2, "explanation": "પેરામીટર એ પરિસ્થિતિતંત્રના એવા ઘટકો છે જેની કિંમતો પરિસ્થિતિતંત્રની સ્થિતિ પર આધાર રાખે છે (ઉદા. તાપમાન, ભેજ), જ્યારે ફેક્ટર એ પરિસ્થિતિતંત્રના એવા ઘટકો છે જે પરિસ્થિતિતંત્રની સ્થિતિને અસર કરે છે (ઉદા. પ્રકાશ, પાણી). વિકલ્પ A, B, અને D ખોટા છે કારણ કે તેઓ પેરામીટર અને ફેક્ટર વચ્ચેના તફાવતને યોગ્ય રીતે વર્ણવતા નથી.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકતંત્ર", "difficulty": "Hard", "num": 13}, {"question": "પરિસ્થિતિતંત્રમાં 'ઇકોલોજિકલ નિચ' (Ecological Niche) ની વ્યાખ્યા વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) ઇકોલોજિકલ નિચ એ જીવની પરિસ્થિતિતંત્રમાં તેની ભૂમિકા અને સ્થાનને વર્ણવે છે.", "B) ઇકોલોજિકલ નિચ એ જીવના અસ્તિત્વ માટે જરૂરી પરિસ્થિતિક પરિબળોની શ્રેણી છે.", "C) ઇકોલોજિકલ નિચ એ જીવના વિતરણને નક્કી કરે છે અને તેની જૈવિક જરૂરિયાતોને પૂરી પાડે છે.", "D) ઇકોલોજિકલ નિચ એ જીવના શારીરિક લક્ષણોને વર્ણવે છે અને તેની પ્રજનન ક્ષમતાને નક્કી કરે છે."], "correct": 3, "explanation": "ઇકોલોજિકલ નિચ એ જીવની પરિસ્થિતિતંત્રમાં તેની ભૂમિકા, સ્થાન, અને અસ્તિત્વ માટે જરૂરી પરિસ્થિતિક પરિબળોની શ્રેણીને વર્ણવે છે. વિકલ્પ D ખોટો છે કારણ કે ઇકોલોજિકલ નિચ જીવના શારીરિક લક્ષણો અથવા પ્રજનન ક્ષમતાને વર્ણવતું નથી, પરંતુ તેની પરિસ્થિતિક ભૂમિકા અને જરૂરિયાતોને વર્ણવે છે.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકતંત્ર", "difficulty": "Hard", "num": 14}, {"question": "પરિસ્થિતિતંત્રમાં 'હેટરોટ્રોફિક સક્સેશન' (Heterotrophic Succession) ની ઘટના ક્યારે થાય છે?", "options": ["A) જ્યારે પરિસ્થિતિતંત્રમાં ઉત્પાદકોની સંખ્યા ખૂબ જ વધુ હોય છે.", "B) જ્યારે પરિસ્થિતિતંત્રમાં પ્રાથમિક ઉત્પાદકોની ગેરહાજરીમાં સક્સેશન થાય છે.", "C) જ્યારે પરિસ્થિતિતંત્રમાં દ્વિતીયક ઉત્પાદકોની સંખ્યા ખૂબ જ ઓછી હોય છે.", "D) જ્યારે પરિસ્થિતિતંત્રમાં પ્રકાશસંશ્લેષણની પ્રક્રિયા ખૂબ જ ધીમી હોય છે."], "correct": 1, "explanation": "હેટરોટ્રોફિક સક્સેશન એ પરિસ્થિતિતંત્રમાં એવી ઘટના છે જ્યારે પ્રાથમિક ઉત્પાદકો (ઉદા. વનસ્પતિઓ)ની ગેરહાજરીમાં સક્સેશન થાય છે. આ સ્થિતિમાં, સજીવો (હેટરોટ્રોફ્સ) મૃત કાર્બનિક પદાર્થો પર આધાર રાખીને વિકસે છે. વિકલ્પ A, C, અને D ખોટા છે કારણ કે તેઓ હેટરોટ્રોફિક સક્સેશનની ઘટનાને યોગ્ય રીતે વર્ણવતા નથી.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકતંત્ર", "difficulty": "Hard", "num": 15}, {"question": "પરિસ્થિતિતંત્રની રચનામાં 'ફેસિલિટેશન' (Facilitation) પ્રક્રિયામાં નીચેનામાંથી કયો જીવ પ્રથમ આવે છે અને તે કેવી રીતે પરિસ્થિતિને બદલે છે?", "options": ["A) લાઇકન, જે ખડકની સપાટી પર વસે છે અને તેની સક્રિયતાથી મૃત્તિકાનું નિર્માણ કરે છે", "B) મોસ, જે વૃક્ષની છાલ પર વસે છે અને તેના વિકાસથી વૃક્ષને નુકસાન પહોંચાડે છે", "C) ફર્ન, જે જમીનમાં વસે છે અને તેના મૂળ દ્વારા જમીનને સ્થિર કરે છે", "D) શેવાળ, જે પાણીમાં વસે છે અને તેના પ્રકાશસંશ્લેષણ દ્વારા ઓક્સિજન ઉત્પન્ન કરે છે"], "correct": 0, "explanation": "લાઇકન (A) પાયોનિયર પ્રજાતિ તરીકે ઓળખાય છે, જે ખડકની સપાટી પર વસે છે અને તેની સક્રિયતાથી ખડકનું વિઘટન કરે છે, જેનાથી મૃત્તિકાનું નિર્માણ થાય છે. આ પ્રક્રિયા 'ફેસિલિટેશન' તરીકે ઓળખાય છે, જ્યાં પ્રથમ વસતી જીવો પરિસ્થિતિને અન્ય જીવો માટે અનુકૂળ બનાવે છે. મોસ (B) વૃક્ષની છાલ પર વસે છે પરંતુ તે ફેસિલિટેશન પ્રક્રિયાનો ભાગ નથી. ફર્ન (C) અને શેવાળ (D) પણ ફેસિલિટેશન પ્રક્રિયાનો ભાગ નથી, કારણ કે તેઓ પ્રથમ વસતી જીવો નથી.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 16}, {"question": "પરિસ્થિતિતંત્રમાં 'સેકન્ડરી સક્સેશન' (Secondary Succession) ની શરૂઆત નીચેનામાંથી કયા પરિબળ દ્વારા થાય છે?", "options": ["A) જ્વાળામુખીના ફાટી નીકળવાથી નવી જમીનનું નિર્માણ", "B) જંગલમાં લાગેલી આગ બાદ જમીન પર રહેલા અવશેષો", "C) નદીના કિનારે નવી મૃત્તિકાનું જમા થવું", "D) હિમનદીના પીગળવાથી નવી જમીનનું ઉદ્ભવ"], "correct": 1, "explanation": "સેકન્ડરી સક્સેશન જ્યારે પહેલાથી અસ્તિત્વમાં હોવાનું પરિસ્થિતિતંત્ર નાશ પામે છે અને તેની જગ્યાએ નવું પરિસ્થિતિતંત્ર વિકસે છે. જંગલમાં લાગેલી આગ બાદ જમીન પર રહેલા અવશેષો (B) એ સેકન્ડરી સક્સેશનની શરૂઆત કરે છે. જ્વાળામુખીના ફાટી નીકળવું (A) અને હિમનદીના પીગળવું (D) પ્રાઇમરી સક્સેશનની શરૂઆત કરે છે. નદીના કિનારે નવી મૃત્તિકાનું જમા થવું (C) પણ પ્રાઇમરી સક્સેશનનો ભાગ છે.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 17}, {"question": "પરિસ્થિતિતંત્રમાં 'ઇન્ટરસ્પેસિફિક કોમ્પિટીશન' (Interspecific Competition) નું ઉદાહરણ નીચેનામાંથી કયું છે?", "options": ["A) બે વર્ગના પક્ષીઓ એક જ પ્રકારના ખોરાક માટે સ્પર્ધા કરે છે", "B) એક જ પ્રજાતિના પક્ષીઓ એક જ વૃક્ષ પર ઘર બનાવે છે", "C) એક જ પ્રજાતિના સસ્તન પ્રાણીઓ એક જ વિસ્તારમાં રહે છે", "D) બે પ્રજાતિના સસ્તન પ્રાણીઓ એક જ ગુફામાં આશરો લે છે"], "correct": 0, "explanation": "ઇન્ટરસ્પેસિફિક કોમ્પિટીશન એટલે વિવિધ પ્રજાતિઓ વચ્ચે થતી સ્પર્ધા. બે વર્ગના પક્ષીઓ એક જ પ્રકારના ખોરાક માટે સ્પર્ધા કરે છે (A) એ ઇન્ટરસ્પેસિફિક કોમ્પિટીશનનું ઉદાહરણ છે. એક જ પ્રજાતિના પક્ષીઓ એક જ વૃક્ષ પર ઘર બનાવે છે (B) અને એક જ પ્રજાતિના સસ્તન પ્રાણીઓ એક જ વિસ્તારમાં રહે છે (C) એ ઇન્ટ્રાસ્પેસિફિક કોમ્પિટીશન (વિદ્યમાન પ્રજાતિ વચ્ચેની સ્પર્ધા) છે. બે પ્રજાતિના સસ્તન પ્રાણીઓ એક જ ગુફામાં આશરો લે છે (D) એ સહજીવન (Commensalism) અથવા પરોપજીવી (Parasitism) હોઈ શકે, પરંતુ ઇન્ટરસ્પેસિફિક કોમ્પિટીશન નહીં.", "ncert_ref": "Class XII - Chapter 13: જૈવ વૈવિધ્ય અને સંરક્ષણ (Biodiversity and Conservation)", "difficulty": "Hard", "num": 18}, {"question": "પરિસ્થિતિતંત્રમાં 'કીસ્ટોન પ્રજાતિ' (Keystone Species) ની ભૂમિકા વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) તે પરિસ્થિતિતંત્રની રચનામાં મહત્વની ભૂમિકા ભજવે છે", "B) તેની હાજરી અથવા ગેરહાજરી પરિસ્થિતિતંત્રની સ્થિરતાને અસર કરે છે", "C) તે પરિસ્થિતિતંત્રમાં સૌથી વધુ સંખ્યામાં હાજર હોય છે", "D) તેની ગેરહાજરીથી પરિસ્થિતિતંત્રનું સંતુલન બગડી શકે છે"], "correct": 2, "explanation": "કીસ્ટોન પ્રજાતિ (Keystone Species) પરિસ્થિતિતંત્રની રચનામાં મહત્વની ભૂમિકા ભજવે છે (A), તેની હાજરી અથવા ગેરહાજરી પરિસ્થિતિતંત્રની સ્થિરતાને અસર કરે છે (B), અને તેની ગેરહાજરીથી પરિસ્થિતિતંત્રનું સંતુલન બગડી શકે છે (D). પરંતુ તે પરિસ્થિતિતંત્રમાં સૌથી વધુ સંખ્યામાં હાજર હોવાની જરૂર નથી (C), કારણ કે કીસ્ટોન પ્રજાતિની મહત્વની ભૂમિકા તેની સંખ્યાથી નહીં, પરંતુ તેની કાર્યક્ષમતાથી નક્કી થાય છે.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 19}, {"question": "પરિસ્થિતિતંત્રમાં 'એકોલોજિકલ પિરામિડ' (Ecological Pyramid) ની રચનામાં નીચેનામાંથી કયો પિરામિડ 'ઉલ્ટો પિરામિડ' (Inverted Pyramid) તરીકે ઓળખાય છે?", "options": ["A) ઉત્પાદકતાનો પિરામિડ (Pyramid of Productivity)", "B) જૈવવસ્તુનો પિરામિડ (Pyramid of Biomass)", "C) સંખ્યાનો પિરામિડ (Pyramid of Numbers)", "D) ઉર્જાનો પિરામિડ (Pyramid of Energy)"], "correct": 1, "explanation": "જૈવવસ્તુનો પિરામિડ (Pyramid of Biomass) ક્યારેક 'ઉલ્ટો પિરામિડ' તરીકે ઓળખાય છે, જ્યારે ઉત્પાદકો (પ્રથમ પોષણ સ્તર) કરતાં ઉપભોક્તાઓ (દ્વિતીય પોષણ સ્તર)માં જૈવવસ્તુ વધુ હોય છે. ઉદાહરણ તરીકે, વૃક્ષ પર રહેતા કીટકો અને પક્ષીઓમાં, વૃક્ષ (ઉત્પાદક) કરતાં કીટકો અને પક્ષીઓ (ઉપભોક્તા)માં જૈવવસ્તુ વધુ હોઈ શકે છે. ઉત્પાદકતાનો પિરામિડ (A), સંખ્યાનો પિરામિડ (C), અને ઉર્જાનો પિરામિડ (D) સામાન્ય રીતે સીધા જ હોય છે.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 20}, {"question": "પરિસ્થિતિતંત્રની રચનામાં 'સક્સેશન'ની પ્રક્રિયા દરમિયાન નીચેનામાંથી કયો પરિબળ 'ફેસિલિટેશન'ને પ્રોત્સાહન આપતું નથી?", "options": ["A) મૃત કોષ્ટકોનો સંગ્રહ થવો", "B) મૃત્તિકામાં નાઇટ્રોજનનું સ્તર વધવું", "C) પ્રકાશની તીવ્રતા વધવી", "D) જમીનની આર્દ્રતા ઘટવી"], "correct": 3, "explanation": "ફેસિલિટેશનમાં પ્રથમ આવતા જીવો (પાયોનિયર પ્રજાતિઓ) પર્યાવરણને અનુકૂળ બનાવે છે, જેથી અન્ય પ્રજાતિઓ વસી શકે. મૃત કોષ્ટકોનો સંગ્રહ (A), નાઇટ્રોજનનું સ્તર વધવું (B) અને પ્રકાશની તીવ્રતા વધવી (C) એ ફેસિલિટેશનને પ્રોત્સાહન આપે છે. જમીનની આર્દ્રતા ઘટવી (D) એ ફેસિલિટેશનને અવરોધે છે, કારણ કે ઓછી આર્દ્રતાથી નવી પ્રજાતિઓનું વસવું મુશ્કેલ બને છે.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 21}, {"question": "પરિસ્થિતિતંત્રમાં 'ઇકોલોજિકલ નિચ'ની દ્રષ્ટિએ નીચેનામાંથી કયો જીવ 'સ્પેશિયલિસ્ટ પ્રજાતિ' તરીકે ઓળખાય છે?", "options": ["A) કાગડો", "B) પાંદડખોર કીડી", "C) સિંહ", "D) મધમાખી"], "correct": 1, "explanation": "સ્પેશિયલિસ્ટ પ્રજાતિઓ એવી પ્રજાતિઓ છે જે કેવળ એક જ પ્રકારના સ્રોત (જેવા કે ખોરાક) પર આધાર રાખે છે. પાંદડખોર કીડી (B) ફક્ત પાંદડા ખાય છે, જ્યારે કાગડો (A), સિંહ (C) અને મધમાખી (D) જનરલિસ્ટ પ્રજાતિઓ છે, જે વિવિધ પ્રકારના ખોરાક લે છે.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 22}, {"question": "પરિસ્થિતિતંત્રમાં 'એકોટોન'માં જોવા મળતા નીચેનામાંથી કયા લક્ષણને 'એજ ઇફેક્ટ' કહેવાય છે?", "options": ["A) પ્રજાતિઓની વિવિધતા વધવી", "B) પ્રજાતિઓની સંખ્યા ઘટવી", "C) પ્રજાતિઓની વિતરણમાં અસમાનતા", "D) પ્રજાતિઓની આંતરક્રિયામાં ઘટાડો"], "correct": 0, "explanation": "'એજ ઇફેક્ટ' એ એકોટોનમાં પ્રજાતિઓની વિવિધતા વધવી (A) છે, કારણ કે બે પરિસ્થિતિતંત્રોના મિશ્રણથી નવી પર્યાવરણીય પરિસ્થિતિઓ ઉત્પન્ન થાય છે, જે વધુ પ્રજાતિઓને આકર્ષે છે. પ્રજાતિઓની સંખ્યા ઘટવી (B), વિતરણમાં અસમાનતા (C) અને આંતરક્રિયામાં ઘટાડો (D) એ એજ ઇફેક્ટના લક્ષણો નથી.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 23}, {"question": "પરિસ્થિતિતંત્રમાં 'હેટરોટ્રોફિક સક્સેશન'ની શરૂઆત નીચેનામાંથી કયા પરિબળ દ્વારા થાય છે?", "options": ["A) ખડકી ભૂમિ પર વરસાદ પડવો", "B) જળાશયમાં મૃત જીવરાસાયણિક પદાર્થનો સંગ્રહ થવો", "C) જંગલમાં આગ લાગવી", "D) નદીના કિનારે રેતીનો સંગ્રહ થવો"], "correct": 1, "explanation": "હેટરોટ્રોફિક સક્સેશન એટલે મૃત જીવરાસાયણિક પદાર્થ (ડેટ્રિટસ) પર આધારિત સક્સેશન. જળાશયમાં મૃત જીવરાસાયણિક પદાર્થનો સંગ્રહ થવો (B) એ હેટરોટ્રોફિક સક્સેશનની શરૂઆત કરે છે. ખડકી ભૂમિ પર વરસાદ (A), જંગલમાં આગ (C) અને રેતીનો સંગ્રહ (D) એ ઓટોટ્રોફિક સક્સેશનની શરૂઆત કરે છે.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 24}, {"question": "પરિસ્થિતિતંત્રમાં 'પેરામીટર' અને 'ફેક્ટર' વચ્ચેનો તફાવત નીચેનામાંથી કયો છે?", "options": ["A) પેરામીટર પર્યાવરણીય પરિબળ છે, જ્યારે ફેક્ટર જીવંત ઘટક છે", "B) પેરામીટર જીવંત ઘટક છે, જ્યારે ફેક્ટર પર્યાવરણીય પરિબળ છે", "C) પેરામીટર એ વ્યાખ્યાયિત કરેલ પર્યાવરણીય પરિબળ છે, જ્યારે ફેક્ટર એ અવ્યાખ્યાયિત પરિબળ છે", "D) પેરામીટર એ અજૈવિક ઘટક છે, જ્યારે ફેક્ટર એ જૈવિક ઘટક છે"], "correct": 2, "explanation": "પેરામીટર એ વ્યાખ્યાયિત કરેલ પર્યાવરણીય પરિબળ છે (જેવા કે તાપમાન, પ્રકાશ), જ્યારે ફેક્ટર એ અવ્યાખ્યાયિત પરિબળ છે જે પરિસ્થિતિતંત્રને અસર કરે છે. વિકલ્પ (A), (B) અને (D) ખોટા છે કારણ કે તેઓ પેરામીટર અને ફેક્ટરની વ્યાખ્યા સ્પષ્ટપણે સમજાવતા નથી.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 25}, {"question": "પરિસ્થિતિતંત્રની રચનામાં 'સક્સેશન' દરમિયાન જોવા મળતી 'ઇનહિબિશન' (Inhibition) પ્રક્રિયામાં નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) પ્રારંભિક પ્રજાતિઓ દ્વારા ભૂમિ પર પોતાના ઉત્પાદનો દ્વારા અન્ય પ્રજાતિઓના વિકાસને અટકાવવામાં આવે છે.", "B) આ પ્રક્રિયામાં પાયોનિયર પ્રજાતિઓ દ્વારા મૃત કોષિક સામગ્રીનું સચ્છીકરણ થાય છે, જે પછીની પ્રજાતિઓ માટે અનુકૂળ પરિસ્થિતિ ઉભી કરે છે.", "C) 'ઇનહિબિશન'માં પ્રથમ આવતી પ્રજાતિઓ દ્વારા ભૂમિ પર એવા પદાર્થોનું સ્રાવ થાય છે, જે અન્ય પ્રજાતિઓના અંકુરણને અટકાવે છે.", "D) આ પ્રક્રિયા સૌથી વધુ જોવા મળે છે જ્યારે પાયોનિયર પ્રજાતિઓ દ્વારા ભૂમિ પર પોષક તત્વોનું શોષણ થાય છે અને અન્ય પ્રજાતિઓ માટે તેની ઉણપ ઉભી થાય છે."], "correct": 1, "explanation": "વિકલ્પ B ખોટો છે કારણ કે 'ઇનહિબિશન' પ્રક્રિયામાં પાયોનિયર પ્રજાતિઓ દ્વારા અન્ય પ્રજાતિઓના વિકાસને અટકાવવામાં આવે છે, પરંતુ મૃત કોષિક સામગ્રીનું સચ્છીકરણ 'ફેસિલિટેશન' પ્રક્રિયાનું લક્ષણ છે. વિકલ્પ A, C, અને D સાચા છે કારણ કે તેઓ 'ઇનહિબિશન'ની વ્યાખ્યાને યોગ્ય રીતે વર્ણવે છે, જેમાં પ્રારંભિક પ્રજાતિઓ દ્વારા અન્ય પ્રજાતિઓના વિકાસને અટકાવવામાં આવે છે, એવા પદાર્થોનું સ્રાવ થાય છે જે અંકુરણને અટકાવે છે, અને પોષક તત્વોના શોષણ દ્વારા ઉણપ ઉભી થાય છે.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 26}, {"question": "પરિસ્થિતિતંત્રમાં 'એકોલોજિકલ નિચ'ની દ્રષ્ટિએ નીચેનામાંથી કયો જીવ 'જનરલિસ્ટ પ્રજાતિ' તરીકે ઓળખાય છે?", "options": ["A) પાંદડખોર ઇંધણ (Defoliator) જેવા કે લાકડા ખાવા વાળા કીટકો", "B) મધમાખી, જે ફક્ત એક જ પ્રકારના ફૂલ પર આહાર લે છે", "C) કાવ, જે વિવિધ પ્રકારના આહારનો ઉપયોગ કરે છે", "D) ઓર્કિડ, જે ફક્ત એક જ પ્રકારના ઝાડ પર ઉગે છે"], "correct": 2, "explanation": "વિકલ્પ C સાચો છે કારણ કે કાવ (crow) એક 'જનરલિસ્ટ પ્રજાતિ' છે, જે વિવિધ પ્રકારના આહારનો ઉપયોગ કરે છે અને વિવિધ પરિસ્થિતિઓમાં જીવી શકે છે. વિકલ્પ A ખોટો છે કારણ કે પાંદડખોર ઇંધણ (Defoliator) એક સ્પેશિયલિસ્ટ પ્રજાતિ છે, જે ફક્ત પાંદડા ખાય છે. વિકલ્પ B ખોટો છે કારણ કે મધમાખી ફક્ત એક જ પ્રકારના ફૂલ પર આહાર લે છે, જે તેને સ્પેશિયલિસ્ટ બનાવે છે. વિકલ્પ D ખોટો છે કારણ કે ઓર્કિડ એક એપિફાઇટ છે અને ફક્ત એક જ પ્રકારના ઝાડ પર ઉગે છે, જે તેને સ્પેશિયલિસ્ટ બનાવે છે.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 27}, {"question": "પરિસ્થિતિતંત્રની રચનામાં 'સેકન્ડરી સક્સેશન' દરમિયાન નીચેનામાંથી કયો પરિબળ સૌથી પહેલા જોવા મળે છે?", "options": ["A) લાઇકન અને શેવાળનો વિકાસ", "B) ઘાસ અને એકવર્ષીય વનસ્પતિઓનો વિકાસ", "C) ઝાડ અને ઝાડીનો વિકાસ", "D) કવક અને બેક્ટેરિયાનો વિકાસ"], "correct": 1, "explanation": "વિકલ્પ B સાચો છે કારણ કે 'સેકન્ડરી સક્સેશન' દરમિયાન, જ્યારે મૂળ પરિસ્થિતિતંત્રમાં વિનાશ થયો હોય, ત્યારે પહેલા ઘાસ અને એકવર્ષીય વનસ્પતિઓનો વિકાસ થાય છે. વિકલ્પ A ખોટો છે કારણ કે લાઇકન અને શેવાળ 'પ્રાઇમરી સક્સેશન' દરમિયાન જોવા મળે છે. વિકલ્પ C ખોટો છે કારણ કે ઝાડ અને ઝાડીનો વિકાસ પછીના તબક્કામાં થાય છે. વિકલ્પ D ખોટો છે કારણ કે કવક અને બેક્ટેરિયા સદા હાજર હોય છે, પરંતુ તેઓ સેકન્ડરી સક્સેશનના પ્રારંભિક તબક્કાનું લક્ષણ નથી.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 28}, {"question": "પરિસ્થિતિતંત્રમાં 'ઇન્ટરસ્પેશિફિક કોમ્પિટીશન'નું ઉદાહરણ નીચેનામાંથી કયું છે?", "options": ["A) સિંહ અને ચિત્તા વચ્ચેનો શિકાર માટેનો સ્પર્ધા", "B) એક જ પ્રજાતિના બે વરુના વચ્ચેનો આહાર માટેનો સ્પર્ધા", "C) મધમાખી અને ફૂલ વચ્ચેનો પરાગનયન માટેનો સહકાર", "D) વરુ અને ગાય વચ્ચેનો ઘાસ માટેનો સ્પર્ધા"], "correct": 3, "explanation": "વિકલ્પ D સાચો છે કારણ કે વરુ (goat) અને ગાય (cow) વચ્ચેનો ઘાસ માટેનો સ્પર્ધા 'ઇન્ટરસ્પેશિફિક કોમ્પિટીશન'નું ઉદાહરણ છે, જેમાં બે વિવિધ પ્રજાતિઓ એક જ સ્રોત માટે સ્પર્ધા કરે છે. વિકલ્પ A ખોટો છે કારણ કે સિંહ અને ચિત્તા વચ્ચેનો સ્પર્ધા 'ઇન્ટરસ્પેશિફિક કોમ્પિટીશન' છે, પરંતુ તે શિકાર માટેનો છે, જે આ પ્રશ્નના સંદર્ભમાં ઓછો યોગ્ય છે. વિકલ્પ B ખોટો છે કારણ કે તે 'ઇન્ટ્રાસ્પેશિફિક કોમ્પિટીશન'નું ઉદાહરણ છે, જેમાં એક જ પ્રજાતિના બે જીવો વચ્ચે સ્પર્ધા થાય છે. વિકલ્પ C ખોટો છે કારણ કે મધમાખી અને ફૂલ વચ્ચેનો પરાગનયન માટેનો સહકાર 'મ્યુચ્યુઅલિઝમ'નું ઉદાહરણ છે.", "ncert_ref": "Class XII - Chapter 13: જૈવ વૈવિધ્ય અને સંરક્ષણ (Biodiversity and Conservation)", "difficulty": "Hard", "num": 29}, {"question": "પરિસ્થિતિતંત્રની રચનામાં 'એકોલોજિકલ પિરામિડ'ની દ્રષ્ટિએ નીચેનામાંથી કયું વિધાન 'પિરામિડ ઓફ નંબર્સ' વિશે ખોટું છે?", "options": ["A) તે પોષણ સ્તર પર આધારિત જીવોની સંખ્યાનું પ્રતિનિધિત્વ કરે છે.", "B) તે હંમેશા સીધો જ હોય છે, જેમાં ઉત્પાદકોની સંખ્યા સૌથી વધુ હોય છે.", "C) પરોપજીવી વનસ્પતિ પર આધારિત પિરામિડમાં, ઉત્પાદકોની સંખ્યા કરતાં પ્રાથમિક ઉપભોક્તાઓની સંખ્યા વધુ હોઈ શકે છે.", "D) તે પોષણ સ્તરની ઊર્જા વહેંચણીને દર્શાવતું નથી."], "correct": 1, "explanation": "વિકલ્પ B ખોટો છે કારણ કે 'પિરામિડ ઓફ નંબર્સ' હંમેશા સીધો નથી હોતો. ઉદાહરણ તરીકે, પરોપજીવી વનસ્પતિ પર આધારિત પિરામિડમાં, ઉત્પાદકોની સંખ્યા કરતાં પ્રાથમિક ઉપભોક્તાઓની સંખ્યા વધુ હોઈ શકે છે, જે પિરામિડને ઉલટો બનાવે છે. વિકલ્પ A સાચો છે કારણ કે તે પોષણ સ્તર પર આધારિત જીવોની સંખ્યાનું પ્રતિનિધિત્વ કરે છે. વિકલ્પ C સાચો છે કારણ કે પરોપજીવી વનસ્પતિ પર આધારિત પિરામિડમાં, ઉત્પાદકોની સંખ્યા કરતાં પ્રાથમિક ઉપભોક્તાઓની સંખ્યા વધુ હોઈ શકે છે. વિકલ્પ D સાચો છે કારણ કે 'પિરામિડ ઓફ નંબર્સ' પોષણ સ્તરની ઊર્જા વહેંચણીને દર્શાવતું નથી, તે 'પિરામિડ ઓફ એનર્જી'નું કામ છે.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 30}, {"question": "પરિસ્થિતિતંત્રની રચનામાં 'સક્સેશન' દરમિયાન જોવા મળતી 'સાયક્લિક સક્સેશન' (Cyclic Succession) ની ઘટના ક્યારે થાય છે?", "options": ["A) જ્યારે પરિસ્થિતિતંત્રમાં અચાનક આગ લાગે છે અને પુનઃસ્થાપન થાય છે", "B) જ્યારે પરિસ્થિતિતંત્રમાં વારંવાર પૂર આવે છે અને જમીનની સપાટી પર પાણી જમા થાય છે", "C) જ્યારે પરિસ્થિતિતંત્રમાં વારંવાર સૂકા અને ભીના મોસમી ચક્રો થાય છે અને પેશીઓનો વિકાસ થાય છે", "D) જ્યારે પરિસ્થિતિતંત્રમાં વારંવાર ભૂકંપ થાય છે અને જમીનની રચના બદલાય છે"], "correct": 2, "explanation": "સાયક્લિક સક્સેશન એ સક્સેશનનો એક પ્રકાર છે જ્યારે પરિસ્થિતિતંત્રમાં વારંવાર સૂકા અને ભીના મોસમી ચક્રો થાય છે, જેના કારણે પેશીઓનો વિકાસ થાય છે. વિકલ્પ A, B, અને D એ અસાધારણ ઘટનાઓ છે જે સાયક્લિક સક્સેશનની વ્યાખ્યામાં બંધબેસતી નથી. સાયક્લિક સક્સેશન એ નિયમિત પર્યાવરણીય ચક્રો દ્વારા થતી સક્સેશન છે.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 31}, {"question": "પરિસ્થિતિતંત્રની રચનામાં 'એકોટોન'માં જોવા મળતા નીચેનામાંથી કયા લક્ષણને 'બોર્ડર ઇફેક્ટ' કહેવાય છે?", "options": ["A) એકોટોનમાં જીવવૈવિધ્યમાં વધારો થવો", "B) એકોટોનમાં જીવવૈવિધ્યમાં ઘટાડો થવો", "C) એકોટોનમાં પ્રજાતિઓની સંખ્યામાં સ્થિરતા રહેવી", "D) એકોટોનમાં પ્રજાતિઓની વિતરણમાં એકસમાનતા રહેવી"], "correct": 0, "explanation": "'બોર્ડર ઇફેક્ટ' એ એકોટોનમાં જીવવૈવિધ્યમાં વધારો થવાનું લક્ષણ છે. એકોટોન એ બે પરિસ્થિતિતંત્રો વચ્ચેનો સંક્રમણ ક્ષેત્ર છે જ્યાં વિવિધ પ્રજાતિઓ એકબીજા સાથે મિશ્રિત થાય છે, જેના કારણે જીવવૈવિધ્યમાં વધારો થાય છે. વિકલ્પ B, C, અને D એ એકોટોનની લાક્ષણિકતાઓ નથી.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 32}, {"question": "પરિસ્થિતિતંત્રમાં 'હેટરોટ્રોફિક સક્સેશન' દરમિયાન નીચેનામાંથી કયો ઘટક પ્રથમ વિકસે છે?", "options": ["A) લાઇકન", "B) કવક", "C) બેક્ટેરિયા", "D) શેવાળ"], "correct": 2, "explanation": "હેટરોટ્રોફિક સક્સેશન દરમિયાન, બેક્ટેરિયા અને કવક એ પ્રથમ જીવો છે જે મૃત કાર્બનિક પદાર્થો પર વિકસે છે. પરંતુ બેક્ટેરિયા એ સૌથી પ્રથમ વિકસતો ઘટક છે કારણ કે તે મૃત કાર્બનિક પદાર્થોનું વિઘટન કરવા માટે સક્ષમ હોય છે. લાઇકન અને શેવાળ એ ઓટોટ્રોફિક સક્સેશન દરમિયાન વિકસે છે.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 33}, {"question": "પરિસ્થિતિતંત્રની રચનામાં 'સક્સેશન' દરમિયાન જોવા મળતી 'ટોલેરન્સ' (Tolerance) પ્રક્રિયામાં નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) પ્રથમ આવતી પ્રજાતિઓ પર્યાવરણીય પરિબળોને સહન કરવા સક્ષમ હોય છે અને તે પછીની પ્રજાતિઓ માટે અનુકૂળ પરિસ્થિતિ ઉભી કરે છે", "B) પ્રથમ આવતી પ્રજાતિઓ પર્યાવરણીય પરિબળોને બદલી નાખે છે અને તે પછીની પ્રજાતિઓ માટે અનુકૂળ પરિસ્થિતિ ઉભી કરે છે", "C) પ્રથમ આવતી પ્રજાતિઓ પર્યાવરણીય પરિબળોને સહન કરવા અસમર્થ હોય છે અને તે પછીની પ્રજાતિઓ માટે અનુકૂળ પરિસ્થિતિ ઉભી કરતી નથી", "D) પ્રથમ આવતી પ્રજાતિઓ પર્યાવરણીય પરિબળોને સહન કરવા સક્ષમ હોય છે પરંતુ તે પછીની પ્રજાતિઓ માટે અનુકૂળ પરિસ્થિતિ ઉભી કરતી નથી"], "correct": 0, "explanation": "'ટોલેરન્સ' પ્રક્રિયામાં, પ્રથમ આવતી પ્રજાતિઓ પર્યાવરણીય પરિબળોને સહન કરવા સક્ષમ હોય છે અને તે પછીની પ્રજાતિઓ માટે અનુકૂળ પરિસ્થિતિ ઉભી કરે છે. વિકલ્પ B 'ફેસિલિટેશન' પ્રક્રિયાને વર્ણવે છે, જ્યારે વિકલ્પ C અને D 'ટોલેરન્સ' પ્રક્રિયાની સঠી વ્યાખ્યા નથી.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 34}, {"question": "પરિસ્થિતિતંત્રની રચનામાં 'સાયક્લિક સક્સેશન' (Cyclic Succession) ની ઘટના ક્યારે જોવા મળે છે?", "options": ["A) જ્યારે એક જ પ્રજાતિના જીવો વારંવાર મૃત્યુ પામે છે અને નવી પેઢી ઉત્પન્ન થાય છે", "B) જ્યારે પર્યાવરણીય પરિબળોના ચક્રીય બદલાવને કારણે સમુદાયની રચના પુનરાવર્તિત થાય છે", "C) જ્યારે પ્રાથમિક સક્સેશન પૂર્ણ થયા પછી દ્વિતીયક સક્સેશન શરૂ થાય છે", "D) જ્યારે કીસ્ટોન પ્રજાતિના અદૃશ્ય થવાને કારણે સમુદાયમાં અચાનક ફેરફાર થાય છે"], "correct": 1, "explanation": "સાયક્લિક સક્સેશન એ પર્યાવરણીય પરિબળોના ચક્રીય બદલાવ (જેવા કે ઋતુઓ, જ્વાર-ભાટા, અગ્નિકાંડ વગેરે)ને કારણે થતી પુનરાવર્તિત સમુદાય રચના છે. વિકલ્પ B સાચો છે કારણ કે તે આ ઘટનાનું સ્પષ્ટ વર્ણન કરે છે. વિકલ્પ A ખોટો છે કારણ કે તે એક જ પ્રજાતિના જીવોના મૃત્યુ અને પુનરુત્પાદન વિશે વાત કરે છે, જે સાયક્લિક સક્સેશન નથી. વિકલ્પ C ખોટો છે કારણ કે પ્રાથમિક અને દ્વિતીયક સક્સેશન વચ્ચેનો તફાવત સાયક્લિક સક્સેશન નથી. વિકલ્પ D ખોટો છે કારણ કે કીસ્ટોન પ્રજાતિના અદૃશ્ય થવાને કારણે થતો ફેરફાર સાયક્લિક સક્સેશન નથી, પરંતુ તે અચાનક અને અસ્થાયી ફેરફાર હોઈ શકે છે.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિતંત્ર", "difficulty": "Hard", "num": 35}, {"question": "પરિસ્થિતિતંત્રની રચનામાં 'સાયક્લિક સક્સેશન'ની ઘટના ક્યારે જોવા મળે છે?", "options": ["A) જ્યારે એક જ પ્રજાતિના જીવો વારંવાર મૃત્યુ પામે છે અને નવી પેઢી ઉત્પન્ન થાય છે", "B) જ્યારે પરિસ્થિતિતંત્રમાં આગ અથવા પૂર જેવી આકસ્મિક ઘટનાઓ થાય છે અને પુનઃસ્થાપન થાય છે", "C) જ્યારે પરિસ્થિતિતંત્રમાં રહેલા જીવોના જૂથો વચ્ચે ચક્રીય રીતે પ્રભાવ અને પ્રતિભાવ થાય છે", "D) જ્યારે પરિસ્થિતિતંત્રમાં હવામાન પરિવર્તનને લીધે નવી પ્રજાતિઓની પ્રવેશ થાય છે"], "correct": 2, "explanation": "સાયક્લિક સક્સેશન એ પરિસ્થિતિતંત્રમાં જોવા મળતી એક એવી ઘટના છે જ્યારે જીવોના જૂથો વચ્ચે ચક્રીય રીતે પ્રભાવ અને પ્રતિભાવ થાય છે, જેથી એક પ્રજાતિના વર્ચસ્વ બાદ બીજી પ્રજાતિનું વર્ચસ્વ સ્થાપિત થાય છે. ઉદાહરણ તરીકે, કેટલાક સરોવરોમાં પ્લવક (પ્લાંકટન) અને મત્સ્ય વચ્ચે જોવા મળતું ચક્રીય સંતુલન. વિકલ્પ A, B, અને D આ ઘટનાને યોગ્ય રીતે વર્ણવતા નથી, કારણ કે તેઓ સાયક્લિક સક્સેશનની મૂળભૂત વ્યાખ્યાને અનુરૂપ નથી.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 36}, {"question": "પરિસ્થિતિતંત્રમાં 'સાયક્લિક સક્સેશન'ની ઘટના ક્યારે જોવા મળે છે?", "options": ["A) જ્યારે પર્યાવરણીય પરિબળો નિયમિત અંતરાલે બદલાતા રહે છે", "B) જ્યારે કોઈ પ્રદેશમાં આગ લાગવાને કારણે વનનાશ થાય છે", "C) જ્યારે કીસ્ટોન પ્રજાતિના અદૃશ્ય થવાને કારણે પરિસ્થિતિતંત્રમાં અસંતુલન સર્જાય છે", "D) જ્યારે પ્રાથમિક સક્સેશન પૂર્ણ થઈ જાય અને ક્લાઇમેક્સ સમુદાય સ્થાપિત થાય"], "correct": 0, "explanation": "સાયક્લિક સક્સેશન એટલે નિયમિત અંતરાલે પર્યાવરણીય પરિબળોના બદલાવને કારણે થતી સક્સેશન પ્રક્રિયા (A સાચો). આગ લાગવાને કારણે થતી સક્સેશન 'સેકન્ડરી સક્સેશન' છે (B ખોટો). કીસ્ટોન પ્રજાતિના અદૃશ્ય થવાને કારણે થતું અસંતુલન સાયક્લિક સક્સેશન નથી (C ખોટો). ક્લાઇમેક્સ સમુદાય સ્થાપિત થયા પછી સક્સેશન બંધ થાય છે (D ખોટો).", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 37}, {"question": "પરિસ્થિતિતંત્રની રચનામાં 'ટોલેરન્સ' પ્રક્રિયા દરમિયાન નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) પ્રથમ આવતા જીવો પર્યાવરણને અનુકૂળ બનાવે છે, જેથી પછીના જીવો માટે અનુકૂળ પરિસ્થિતિ ઉભી થાય", "B) પ્રજાતિઓ વચ્ચે સ્પર્ધા થાય છે અને જેઓ વધુ ટકી શકે છે તેઓ જીવિત રહે છે", "C) પ્રજાતિઓ પર્યાવરણીય તણાવ સામે ટકી રહેવાની ક્ષમતા વિકસાવે છે અને ધીમે ધીમે સ્થિર સમુદાય તરફ આગળ વધે છે", "D) પ્રજાતિઓ એકબીજા સાથે સહકારથી જીવે છે અને પર્યાવરણને તરત જ બદલી નાખે છે"], "correct": 2, "explanation": "ટોલેરન્સ પ્રક્રિયામાં પ્રજાતિઓ પર્યાવરણીય તણાવ સામે ટકી રહેવાની ક્ષમતા વિકસાવે છે અને ધીમે ધીમે સ્થિર સમુદાય તરફ આગળ વધે છે. વિકલ્પ A 'ફેસિલિટેશન' પ્રક્રિયાને વર્ણવે છે. વિકલ્પ B 'ઇન્ટરસ્પેશિફિક કોમ્પિટીશન'ને વર્ણવે છે. વિકલ્પ D 'મ્યુચ્યુઅલિઝમ' જેવી પરસ્પર સહકારની પ્રક્રિયાને વર્ણવે છે, પરંતુ ટોલેરન્સમાં સહકાર નથી હોતો.", "ncert_ref": "Class XII - Chapter 14: પરિસ્થિતિકી (Ecology)", "difficulty": "Hard", "num": 38}, {"question": "નીચેનામાંથી કયું વિધાન પરિસ્થિતિતંત્રની રચનામાં 'ઇકોલોજિકલ સક્સેશન'ની પ્રક્રિયા દરમિયાન જોવા મળતા 'સેરલ સમુદાયો' (Seral Communities) માટે ખોટું છે?", "options": ["A) સેરલ સમુદાયો કાયમી હોતા નથી અને સમય સાથે બદલાતા રહે છે", "B) દરેક સેરલ સમુદાય પોતાના પછીના સમુદાય માટે અનુકૂળ પરિસ્થિતિનું નિર્માણ કરે છે", "C) સેરલ સમુદાયોની પ્રજાતિઓની સંખ્યા અને વિવિધતા સમય સાથે ઘટતી જાય છે", "D) સેરલ સમુદાયોની રચના પર્યાવરણીય પરિબળો અને જૈવિક આંતરક્રિયાઓ દ્વારા નિયંત્રિત થાય છે"], "correct": 2, "explanation": "સેરલ સમુદાયો એ પરિસ્થિતિતંત્રની સક્સેશન પ્રક્રિયા દરમિયાન ક્રમશઃ આવતા અસ્થાયી સમુદાયો છે. આ સમુદાયો સમય સાથે બદલાતા રહે છે અને દરેક સમુદાય પોતાના પછીના સમુદાય માટે અનુકૂળ પરિસ્થિતિનું નિર્માણ કરે છે         let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);

            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];

                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');

                if(userAns===undefined) skipped++;

                else wrong++;
            });

            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;

            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;

            document.getElementById('submitBtn').disabled=false;
