    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}

        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}

        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}

        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}

        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}

        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>

    <script>
        const questionsData = [{"question": "આરએનએ હસ્તક્ષેપ (RNAi) પ્રક્રિયામાં, કયા ઉત્સેચક દ્વારા દ્વિપૂંછવાળા આરએનએ (dsRNA) નું વિભાજન થાય છે?", "options": ["A) RNA પોલિમરેઝ", "B) ડાઇસર (Dicer)", "C) આરએનએસ H (RNase H)", "D) હેલિકેઝ"], "correct": 1, "explanation": "ડાઇસર (Dicer) ઉત્સેચક દ્વિપૂંછવાળા આરએનએ (dsRNA) ને 21-25 ન્યુક્લિયોટાઇડ લાંબા સિંગલ-સ્ટ્રેન્ડેડ RNA (ssRNA) ટુકડાઓમાં કાપે છે, જેને siRNA કહેવાય છે. RNA પોલિમરેઝ RNA સંશ્લેષણમાં સામેલ છે, આરએનએસ H DNA-RNA હાઇબ્રિડનું વિઘટન કરે છે, અને હેલિકેઝ DNA અથવા RNA ની દ્વિગુણ સળીને અલગ કરે છે. આથી, ડાઇસર જ સરળ જવાબ છે.", "ncert_ref": "Class XII - પ્રકરણ 11: આણ્વિક જનીનશાસ્ત્ર", "difficulty": "Hard", "num": 1}, {"question": "આરએનએ હસ્તક્ષેપમાં, RISC સંકુલમાં કયા ઘટકનો સમાવેશ થતો નથી?", "options": ["A) siRNA", "B) Argonaute પ્રોટીન", "C) ડાઇસર ઉત્સેચક", "D) mRNA"], "correct": 2, "explanation": "RISC (RNA-induced silencing complex) સંકુલમાં siRNA, Argonaute પ્રોટીન અને લક્ષ્ય mRNAનો સમાવેશ થાય છે. ડાઇસર ઉત્સેચક dsRNA ને siRNAમાં કાપવા માટે જવાબદાર છે, પરંતુ તે RISC સંકુલનો ભાગ નથી. ડાઇસર તેના કામ પૂરું કર્યા પછી siRNA ને RISC ને સોંપે છે.", "ncert_ref": "Class XII - પ્રકરણ 11: આણ્વિક જનીનશાસ્ત્ર", "difficulty": "Hard", "num": 2}, {"question": "આરએનએ હસ્તક્ષેપ દ્વારા જીન સાયલન્સિંગમાં, કયા પગલામાં mRNA નું વિઘટન થાય છે?", "options": ["A) dsRNA નું ડાઇસર દ્વારા વિભાજન", "B) siRNA નું RISC સાથે જોડાણ", "C) RISC દ્વારા લક્ષ્ય mRNA ની પચી ગયેલી જોડી સાથે કાપવું", "D) siRNA નું mRNA સાથે હાઇબ્રિડાઇઝેશન"], "correct": 2, "explanation": "mRNA નું વિઘટન RISC સંકુલ દ્વારા થાય છે, જ્યારે siRNA લક્ષ્ય mRNA સાથે પચી ગયેલી જોડી બનાવે છે. ડાઇસર dsRNA ને siRNAમાં કાપે છે, siRNA RISC સાથે જોડાય છે, અને siRNA mRNA સાથે હાઇબ્રિડાઇઝ થાય છે, પરંતુ વાસ્તવિક કાપવું અને વિઘટન RISC દ્વારા થાય છે.", "ncert_ref": "Class XII - પ્રકરણ 11: આણ્વિક જનીનશાસ્ત્ર", "difficulty": "Hard", "num": 3}, {"question": "આરએનએ હસ્તક્ષેપ પ્રક્રિયામાં, કયા પ્રકારના RNA અણુઓ સીધા જ જીન સાયલન્સિંગમાં સામેલ નથી?", "options": ["A) siRNA", "B) miRNA", "C) tRNA", "D) piRNA"], "correct": 2, "explanation": "tRNA (ટ્રાન્સફર RNA) પ્રોટીન સંશ્લેષણમાં સામેલ છે અને આરએનએ હસ્તક્ષેપ પ્રક્રિયામાં સીધા જ સામેલ નથી. siRNA, miRNA, અને piRNA એ બધા આરએનએ હસ્તક્ષેપ પ્રક્રિયામાં જીન સાયલન્સિંગમાં સામેલ છે.", "ncert_ref": "Class XII - પ્રકરણ 11: આણ્વિક જનીનશાસ્ત્ર", "difficulty": "Hard", "num": 4}, {"question": "આરએનએ હસ્તક્ષેપ દ્વારા જીન સાયલન્સિંગની ક્રિયાવિધિમાં, કયું પગલું સૌપ્રથમ થાય છે?", "options": ["A) RISC સંકુલનું નિર્માણ", "B) dsRNA નું ડાઇસર દ્વારા વિભાજન", "C) siRNA નું mRNA સાથે હાઇબ્રિડાઇઝેશન", "D) લક્ષ્ય mRNA નું વિઘટન"], "correct": 1, "explanation": "આરએનએ હસ્તક્ષેપ પ્રક્રિયાનું સૌપ્રથમ પગલું dsRNA નું ડાઇસર ઉત્સેચક દ્વારા વિભાજન છે, જે siRNA ઉત્પન્ન કરે છે. પછી siRNA RISC સંકુલ સાથે જોડાય છે, અને ત્યારબાદ લક્ષ્ય mRNA સાથે હાઇબ્રિડાઇઝ થાય છે, જેના પરિણામે mRNA નું વિઘટન થાય છે.", "ncert_ref": "Class XII - પ્રકરણ 11: આણ્વિક જનીનશાસ્ત્ર", "difficulty": "Hard", "num": 5}, {"question": "આરએનએ હસ્તક્ષેપ (RNAi) પ્રક્રિયામાં, સિંગલ-સ્ટ્રેન્ડેડ RNA (ssRNA) ની ભૂમિકા વિશે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) ssRNA નું રૂપાંતર દ્વિપૂંછવાળા RNA (dsRNA) માં થાય છે, જે પછી Dicer ઉત્સેચક દ્વારા કાપવામાં આવે છે.", "B) ssRNA સીધા જ RISC સંકુલ સાથે જોડાઈને ટાર્ગેટ mRNA નું વિઘટન કરે છે.", "C) ssRNA નું વિઘટન Dicer ઉત્સેચક દ્વારા થાય છે, જે પછી siRNA ની રચના કરે છે.", "D) ssRNA એ RISC સંકુલમાં ગાઇડ RNA તરીકે કામ કરે છે, પરંતુ તેને પહેલાં dsRNA માં રૂપાંતરિત કરવું પડે છે."], "correct": 3, "explanation": "સાચો જવાબ D છે. આરએનએ હસ્તક્ષેપમાં, ssRNA સીધા જ RISC સંકુલ સાથે જોડાઈ શકતું નથી. તેને પહેલાં દ્વિપૂંછવાળા RNA (dsRNA) માં રૂપાંતરિત કરવું પડે છે, જે પછી Dicer ઉત્સેચક દ્વારા siRNA માં કાપવામાં આવે છે. siRNA પછી RISC સંકુલમાં ગાઇડ RNA તરીકે કામ કરે છે. A ગળત છે કારણ કે ssRNA સીધા dsRNA માં રૂપાંતરિત થતું નથી. B ગળત છે કારણ કે ssRNA સીધા RISC સાથે જોડાઈ શકતું નથી. C ગળત છે કારણ કે Dicer dsRNA ને કાપે છે, ssRNA ને નહીં.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક જીવવિજ્ઞાન અને આણ્વિક જનુકીયા", "difficulty": "Hard", "num": 6}, {"question": "આરએનએ હસ્તક્ષેપ પ્રક્રિયામાં, નીચેનામાંથી કયું પગલું ટાર્ગેટ mRNA નું વિઘટન કરવા માટે જરૂરી નથી?", "options": ["A) Dicer ઉત્સેચક દ્વારા dsRNA નું siRNA માં વિભાજન", "B) RISC સંકુલમાં siRNA નો સમાવેશ", "C) Ago2 પ્રોટીન દ્વારા ટાર્ગેટ mRNA નું કાપવું", "D) DNA પોલિમરેઝ દ્વારા siRNA નું DNA માં રૂપાંતર"], "correct": 3, "explanation": "સાચો જવાબ D છે. આરએનએ હસ્તક્ષેપ પ્રક્રિયામાં, siRNA નું DNA માં રૂપાંતર થતું નથી. આ પ્રક્રિયા પૂર્ણપણે RNA-આધારિત છે. A, B, અને C બધા જરૂરી પગલાં છે: Dicer દ્વારા dsRNA નું siRNA માં વિભાજન, RISC સંકુલમાં siRNA નો સમાવેશ, અને Ago2 દ્વારા ટાર્ગેટ mRNA નું કાપવું.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક જીવવિજ્ઞાન અને આણ્વિક જનુકીયા", "difficulty": "Hard", "num": 7}, {"question": "આરએનએ હસ્તક્ષેપ (RNAi) અને માઇક્રોRNA (miRNA) વચ્ચેનો મુખ્ય તફાવત કયો છે?", "options": ["A) RNAi મા dsRNA ની જરૂર પડે છે, જ્યારે miRNA મા ssRNA ની જરૂર પડે છે.", "B) RNAi મા siRNA ની રચના થાય છે, જ્યારે miRNA મા miRNA ની રચના થાય છે, જે અંશતઃ પૂરકતા ધરાવે છે.", "C) RNAi મા RISC સંકુલનો ઉપયોગ થતો નથી, જ્યારે miRNA મા થાય છે.", "D) RNAi મા ટાર્ગેટ mRNA નું વિઘટન થાય છે, જ્યારે miRNA મા ટાર્ગેટ mRNA નું અનુવાદ રોકાય છે."], "correct": 1, "explanation": "સાચો જવાબ B છે. RNAi અને miRNA વચ્ચેનો મુખ્ય તફાવત એ છે કે RNAi મા dsRNA નું વિભાજન થઈ siRNA ની રચના થાય છે, જ્યારે miRNA મા miRNA જનિન દ્વારા ssRNA ની રચના થાય છે, જે અંશતઃ પૂરકતા ધરાવે છે. A ગળત છે કારણ કે RNAi મા dsRNA ની જરૂર પડે છે, પરંતુ miRNA મા ssRNA ની રચના થાય છે. C ગળત છે કારણ કે બંનેમાં RISC સંકુલનો ઉપયોગ થાય છે. D ગળત છે કારણ કે RNAi અને miRNA બંનેમાં ટાર્ગેટ mRNA નું વિઘટન અથવા અનુવાદ રોકાઈ શકે છે.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક જીવવિજ્ઞાન અને આણ્વિક જનુકીયા", "difficulty": "Hard", "num": 8}, {"question": "આરએનએ હસ્તક્ષેપ પ્રક્રિયામાં, નીચેનામાંથી કયું વિધાન સૌથી યોગ્ય રીતે RISC સંકુલની ભૂમિકાનું વર્ણન કરે છે?", "options": ["A) RISC સંકુલ dsRNA નું siRNA માં વિભાજન કરે છે.", "B) RISC સંકુલ siRNA ને ટાર્ગેટ mRNA સાથે જોડવામાં મદદ કરે છે અને તેનું વિઘટન કરે છે.", "C) RISC સંકુલ DNA નું RNA માં પારઉત્પાદન કરે છે.", "D) RISC સંકુલ miRNA ની રચના કરે છે."], "correct": 1, "explanation": "સાચો જવાબ B છે. RISC સંકુલ (RNA-induced silencing complex) siRNA ને ટાર્ગેટ mRNA સાથે જોડવામાં મદદ કરે છે અને Ago2 પ્રોટીન દ્વારા તેનું વિઘટન કરે છે. A ગળત છે કારણ કે dsRNA નું વિભાજન Dicer ઉત્સેચક દ્વારા થાય છે. C ગળત છે કારણ કે RISC સંકુલ DNA નું પારઉત્પાદન કરતું નથી. D ગળત છે કારણ કે miRNA ની રચના જનિન દ્વારા થાય છે, RISC દ્વારા નહીં.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક જીવવિજ્ઞાન અને આણ્વિક જનુકીયા", "difficulty": "Hard", "num": 9}, {"question": "આરએનએ હસ્તક્ષેપ (RNAi) પ્રક્રિયામાં, જો દ્વિપૂંછવાળા આરએનએ (dsRNA) નું વિભાજન થતું નથી, તો નીચેનામાંથી કયું પરિણામ સૌથી યોગ્ય રીતે થશે?", "options": ["A) siRNA ની રચના થશે અને RISC સંકુલ સક્રિય થશે", "B) DICER ઉત્સેચકની ક્રિયા વગર પણ RISC સંકુલ સીધું dsRNA સાથે જોડાશે", "C) dsRNA સ્થિર રહેશે અને જીન સાયલન્સિંગ થશે નહીં", "D) miRNA પથમાં ફેરફાર થશે અને ટાર્ગેટ mRNA નું વિઘટન થશે"], "correct": 2, "explanation": "સીધું જવાબ C) છે. DICER ઉત્સેચક દ્વારા dsRNA નું વિભાજન થવું જરૂરી છે, જેથી siRNA ની રચના થાય અને RISC સંકુલ સાથે જોડાઈ શકે. જો dsRNA નું વિભાજન ન થાય, તો siRNA બનશે નહીં, અને RISC સંકુલ સક્રિય થશે નહીં, પરિણામે જીન સાયલન્સિંગ થશે નહીં. A) ખોટું છે કારણ કે siRNA ની રચના માટે dsRNA નું વિભાજન જરૂરી છે. B) ખોટું છે કારણ કે RISC સંકુલ dsRNA સાથે સીધું જોડાતું નથી; તે siRNA સાથે જોડાય છે. D) ખોટું છે કારણ કે miRNA પથ અને dsRNA પથ અલગ છે, અને dsRNA નું વિભાજન ન થવાને લીધે miRNA પથ પર કોઈ અસર થતી નથી.", "ncert_ref": "Class XII - પ્રકરણ 6: આણ્વિક આનુવંશિકતા", "difficulty": "Hard", "num": 10}, {"question": "આરએનએ હસ્તક્ષેપ (RNAi) પ્રક્રિયામાં, જો siRNA ની લંબાઈ 21 ન્યુક્લિયોટાઇડ કરતાં ઓછી હોય, તો શું થશે?", "options": ["A) RISC સંકુલમાં તેનો સમાવેશ થશે અને mRNA નું વિઘટન થશે", "B) તે ડાયસર ઉત્સેચક દ્વારા તરત જ વિઘટિત થશે", "C) તે સ્થિર રહેશે અને જીન સાયલન્સિંગમાં ભાગ લેશે", "D) તે ડબલ-સ્ટ્રેન્ડેડ RNA (dsRNA) માં રૂપાંતરિત થશે"], "correct": 1, "explanation": "siRNA ની લંબાઈ 21-25 ન્યુક્લિયોટાઇડ હોય છે. જો તે 21 કરતાં ઓછી હોય, તો તે ડાયસર ઉત્સેચક દ્વારા વિઘટિત થાય છે, કારણ કે તે RNAi પ્રક્રિયામાં સક્રિય ભૂમિકા ભજવી શકતું નથી. વિકલ્પ A ખોટો છે કારણ કે RISC સંકુલમાં સમાવેશ માટે siRNA ની યોગ્ય લંબાઈ જરૂરી છે. વિકલ્પ C ખોટો છે કારણ કે અપૂરતી લંબાઈ ધરાવતું siRNA સ્થિર રહેતું નથી. વિકલ્પ D ખોટો છે કારણ કે siRNA પહેલેથી જ ડબલ-સ્ટ્રેન્ડેડ હોય છે અને તેનું રૂપાંતરણ થતું નથી.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક જીવવિજ્ઞાન", "difficulty": "Hard", "num": 11}, {"question": "આરએનએ હસ્તક્ષેપ પ્રક્રિયામાં, નીચેનામાંથી કયું વિધાન RISC સંકુલની ક્રિયાશીલતાને અસર કરતું નથી?", "options": ["A) siRNA ની લંબાઈ", "B) ટાર્ગેટ mRNA ની ન્યુક્લિયોટાઇડ ક્રમ", "C) કોષના સાયટોપ્લાઝમમાં કેલ્શિયમ આયનની સાંદ્રતા", "D) siRNA અને mRNA વચ્ચેનું પૂરકતા (complementarity)"], "correct": 2, "explanation": "RISC સંકુલની ક્રિયાશીલતા siRNA ની લંબાઈ, ટાર્ગેટ mRNA ની ન્યુક્લિયોટાઇડ ક્રમ, અને siRNA અને mRNA વચ્ચેની પૂરકતા પર આધારિત છે. કેલ્શિયમ આયનની સાંદ્રતા RISC સંકુલની ક્રિયાશીલતાને અસર કરતી નથી, કારણ કે RISC સંકુલની ક્રિયા મુખ્યત્વે ન્યુક્લિયોટાઇડ ક્રમ અને પૂરકતા પર આધારિત છે. વિકલ્પ A, B, અને D RISC સંકુલની ક્રિયાશીલતાને અસર કરે છે.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક જીવવિજ્ઞાન", "difficulty": "Hard", "num": 12}, {"question": "આરએનએ હસ્તક્ષેપ પ્રક્રિયામાં, જો ટાર્ગેટ mRNA ની ન્યુક્લિયોટાઇડ ક્રમમાં એક જ ન્યુક્લિયોટાઇડમાં ફેરફાર થાય, તો શું થશે?", "options": ["A) mRNA પૂરતું વિઘટિત થશે", "B) mRNA નું વિઘટન થશે નહીં, કારણ કે siRNA અને mRNA વચ્ચે પૂરકતા ખૂટશે", "C) RISC સંકુલ સક્રિય થશે અને mRNA નું વિઘટન કરશે", "D) mRNA નું અનુવાદન (translation) વધુ વેગથી થશે"], "correct": 1, "explanation": "RNAi પ્રક્રિયામાં, siRNA અને ટાર્ગેટ mRNA વચ્ચે પૂરકતા હોવી જરૂરી છે. જો ટાર્ગેટ mRNA ની ન્યુક્લિયોટાઇડ ક્રમમાં એક જ ન્યુક્લિયોટાઇડમાં ફેરફાર થાય, તો siRNA અને mRNA વચ્ચે પૂરકતા ખૂટશે, જેથી RISC સંકુલ દ્વારા mRNA નું વિઘટન થશે નહીં. વિકલ્પ A ખોટો છે કારણ કે પૂરકતા ખૂટવાને કારણે mRNA વિઘટિત થશે નહીં. વિકલ્પ C ખોટો છે કારણ કે RISC સંકુલ સક્રિય થશે નહીં. વિકલ્પ D ખોટો છે કારણ કે RNAi પ્રક્રિયા અનુવાદનને અટકાવે             if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
