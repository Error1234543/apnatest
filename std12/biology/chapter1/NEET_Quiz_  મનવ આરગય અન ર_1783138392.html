    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>

    <script>
        const questionsData = [{"question": "માનવ શરીરમાં રોગપ્રતિકારક કોષો દ્વારા ઉત્પન્ન થતી એન્ટીબોડીના સ્રાવ માટે જવાબદાર કોષ કયો છે?", "options": ["A) ટી-લિમ્ફોસાઇટ્સ (T-lymphocytes)", "B) બી-લિમ્ફોસાઇટ્સ (B-lymphocytes)", "C) મેક્રોફેજ (Macrophages)", "D) ન્યૂટ્રોફિલ્સ (Neutrophils)"], "correct": 1, "explanation": "બી-લિમ્ફોસાઇટ્સ (B-lymphocytes) એન્ટીજનની હાજરીમાં પ્લાઝ્મા કોષોમાં પરિવર્તિત થાય છે અને એન્ટીબોડીનું સ્રાવ કરે છે. ટી-લિમ્ફોસાઇટ્સ સેલ-મધ્યસ્થ પ્રતિક્રિયામાં ભાગ લે છે, મેક્રોફેજ એન્ટીજન પ્રસ્તુત કરે છે, અને ન્યૂટ્રોફિલ્સ ફેગોસાઇટોસિસ દ્વારા રોગજીવાઓને નષ્ટ કરે છે.", "ncert_ref": "Class XII - પ્રકરણ 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 1}, {"question": "એડ્સ (AIDS) રોગ માટે જવાબદાર વાઇરસ કયો છે અને તે શરીરના કયા કોષોને પ્રભાવિત કરે છે?", "options": ["A) HIV, ટી-હેલ્પર કોષો", "B) HBV, યકૃત કોષો", "C) HCV, લોહીના કોષો", "D) HPV, ચામડીના કોષો"], "correct": 0, "explanation": "HIV (હ્યુમન ઇમ્યુનોડેફિશિયન્સી વાઇરસ) એડ્સનું કારણ છે અને તે મુખ્યત્વે ટી-હેલ્પર કોષો (CD4+ કોષો)ને પ્રભાવિત કરે છે, જે પ્રતિરક્ષાતંત્રને નબળું પાડે છે. HBV યકૃતને, HCV યકૃત અને લોહીને, અને HPV ચામડીના કોષોને પ્રભાવિત કરે છે.", "ncert_ref": "Class XII - પ્રકરણ 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 2}, {"question": "કયો રોગ બેક્ટેરિયા દ્વારા થતો નથી?", "options": ["A) ક્ષય (Tuberculosis)", "B) મેલેરિયા (Malaria)", "C) ટાઇફોઇડ (Typhoid)", "D) કોલેરા (Cholera)"], "correct": 1, "explanation": "મેલેરિયા પ્લાસ્મોડિયમ નામના પરોપજીવી દ્વારા થાય છે, જ્યારે ક્ષય (માયકોબેક્ટેરિયમ ટ્યુબર્ક્યુલોસિસ), ટાઇફોઇડ (સાલ્મોનેલા ટાઇફી), અને કોલેરા (વિબ્રિયો કોલેરે) બેક્ટેરિયા દ્વારા થાય છે.", "ncert_ref": "Class XII - પ્રકરણ 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 3}, {"question": "પ્રતિરક્ષાતંત્રમાં સ્મૃતિ કોષો (Memory cells) ની ભૂમિકા શું છે?", "options": ["A) તેઓ પ્રથમ વખત એન્ટીજનની હાજરીમાં જ તાત્કાલિક પ્રતિક્રિયા આપે છે.", "B) તેઓ દ્વિતીય વખત એન્ટીજનની હાજરીમાં વધુ તીવ્ર અને ઝડપી પ્રતિક્રિયા આપે છે.", "C) તેઓ એન્ટીજનને નિષ્ક્રિય કરવા માટે એન્ટીબોડી ઉત્પન્ન કરે છે.", "D) તેઓ ફેગોસાઇટોસિસ દ્વારા રોગજીવાઓને નષ્ટ કરે છે."], "correct": 1, "explanation": "સ્મૃતિ કોષો (Memory cells) દ્વિતીય વખત એન્ટીજનની હાજરીમાં વધુ તીવ્ર અને ઝડપી પ્રતિક્રિયા આપે છે. પ્રથમ વખતની પ્રતિક્રિયા મંદ હોય છે. એન્ટીબોડી ઉત્પન્ન કરવાનું કામ પ્લાઝ્મા કોષો કરે છે, અને ફેગોસાઇટોસિસ મેક્રોફેજ અથવા ન્યૂટ્રોફિલ્સ દ્વારા થાય છે.", "ncert_ref": "Class XII - પ્રકરણ 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 4}, {"question": "કયો રોગ ઓટોઇમ્યુન રોગ છે, જેમાં શરીરના પ્રતિરક્ષાતંત્ર દ્વારા સ્વના કોષો પર હુમલો થાય છે?", "options": ["A) ડાયાબિટીસ મેલિટસ (Diabetes mellitus)", "B) રૂમેટોઇડ આર્થરાઇટિસ (Rheumatoid arthritis)", "C) હેમોફિલિયા (Haemophilia)", "D) સિકલ સેલ એનિમિયા (Sickle cell anemia)"], "correct": 1, "explanation": "રૂમેટોઇડ આર્થરાઇટિસ એક ઓટોઇમ્યુન રોગ છે, જેમાં પ્રતિરક્ષાતંત્ર સ્વના જોડણીના કોષો પર હુમલો કરે છે. ડાયાબિટીસ મેલિટસ મેટાબોલિક ડિસઓર્ડર છે, હેમોફિલિયા રક્તસ્રાવનો વારસાગત રોગ છે, અને સિકલ સેલ એનિમિયા લોહીના કોષોના આકારમાં વિકૃતિ છે.", "ncert_ref": "Class XII - પ્રકરણ 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 5}, {"question": "જ્યારે માનવ શરીરમાં એલર્જી પ્રતિક્રિયા થાય છે, ત્યારે મસ્ત કોષો (Mast cells) દ્વારા સ્રાવ પામતા પદાર્થમાંથી કયો પદાર્થ હિસ્ટામિન નથી, પરંતુ અન્ય મહત્વનો મધ્યસ્થી છે?", "options": ["A) હિસ્ટામિન", "B) સેરોટોનિન", "C) પ્રોસ્ટાગ્લેન્ડિન", "D) ઇન્ટરફેરોન"], "correct": 2, "explanation": "મસ્ત કોષો એલર્જી પ્રતિક્રિયા દરમિયાન હિસ્ટામિન, સેરોટોનિન અને પ્રોસ્ટાગ્લેન્ડિન જેવા મધ્યસ્થીઓ સ્રાવે છે. હિસ્ટામિન એલર્જીની તાત્કાલિક પ્રતિક્રિયામાં મુખ્ય ભૂમિકા ભજવે છે, જ્યારે પ્રોસ્ટાગ્લેન્ડિન પણ જાળવણી અને સોજો લાવવામાં મદદ કરે છે. સેરોટોનિન પણ મસ્ત કોષો દ્વારા સ્રાવાય છે, પરંતુ ઇન્ટરફેરોન વાઇરલ ઇન્ફેક્શન વિરુદ્ધ પ્રતિરક્ષા પ્રતિક્રિયામાં ભાગ લે છે અને મસ્ત કોષો દ્વારા સ્રાવાતો નથી. આથી, ઇન્ટરફેરોન યોગ્ય જવાબ છે.", "ncert_ref": "Class XII - પ્રકરણ 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 6}, {"question": "કયો રોગ એવો છે જેમાં રોગપ્રતિકારક તંત્ર દ્વારા સ્વના કોષો પર હુમલો થતો નથી, પરંતુ બાહ્ય વિષા on": "માનવ શરીરમાં, કયો રોગ એવો છે જેમાં પ્રતિરક્ષાતંત્ર દ્વારા ઉત્પન્ન થતી પ્રતિક્રિયા એટલી તીવ્ર હોય છે કે તે શરીરના સ્વસ્થ પેશીઓને નુકસાન પહોંચાડે છે, પરંતુ તે ઓટોઇમ્યુન રોગ નથી?", "options": ["A) રૂમેટોઇડ આર્થરાઇટિસ (Rheumatoid arthritis)", "B) એલર્જીક રાઇનાઇટિસ (Allergic rhinitis)", "C) ટાઇપ 1 ડાયાબિટીસ (Type 1 diabetes)", "D) મલ્ટિપલ સ્ક્લેરોસિસ (Multiple sclerosis)"], "correct": 1, "explanation": "એલર્જીક રાઇનાઇટિસ એ એલર્જીની પ્રતિક્રિયા છે જેમાં પ્રતિરક્ષાતંત્ર બાહ્ય એલર્જેન પ્રત્યે અતિશય પ્રતિક્રિયા આપે છે, જેના કારણે શરીરના સ્વસ્થ પેશીઓને નુકસાન થાય છે. રૂમેટોઇડ આર્થરાઇટિસ, ટાઇપ 1 ડાયાબિટીસ અને મલ્ટિપલ સ્ક્લેરોસિસ એ ઓટોઇમ્યુન રોગો છે જેમાં પ્રતિરક્ષાતંત્ર શરીરના સ્વના કોષો પર હુમલો કરે છે.", "ncert_ref": "Class XII - Chapter 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 12}, {"question": "માનવ શરીરમાં, કયો હોર્મોન એવો છે જે પ્રતિરક્ષાતંત્રની ક્રિયાશીલતામાં વધારો કરે છે અને તેનો સ્રાવ થાયરોઇડ ગ્રંથિમાંથી થતો નથી?", "options": ["A) થાયરોક્સિન (Thyroxine)", "B) કોર્ટિસોલ (Cortisol)", "C) ઇન્સ્યુલિન (Insulin)", "D) થાયમોસિન (Thymosin)"], "correct": 3, "explanation": "થાયમોસિન એ હોર્મોન છે જે થાયમસ ગ્રંથિમાંથી સ્રાવાય છે અને તે પ્રતિરક્ષાતંત્રની ક્રિયાશીલતામાં વધારો કરે છે. થાયરોક્સિન થાયરોઇડ ગ્રંથિમાંથી સ્રાવાય છે, કોર્ટિસોલ એડ્રિનલ ગ્રંથિમાંથી સ્રાવાય છે અને ઇન્સ્યુલિન અગ્ન્યાશયમાંથી સ્રાવાય છે.", "ncert_ref": "Class XII - Chapter 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 13}, {"question": "માનવ શરીરમાં, કયો રોગ એવો છે જેમાં રોગપ્રતિકારક તંત્ર દ્વારા ઉત્પન્ન થતી એન્ટીબોડી એવી હોય છે જે શરીરના સ્વના DNA વિરુદ્ધ પ્રતિક્રિયા આપે છે?", "options": ["A) સિસ્ટેમિક લ્યુપસ એરિથેમેટોસસ (Systemic Lupus Erythematosus)", "B) રૂમેટોઇડ આર્થરાઇટિસ (Rheumatoid arthritis)", "C) ટાઇપ 1 ડાયાબિટીસ (Type 1 diabetes)", "D) માયસ્થેનિયા ગ્રેવિસ (Myasthenia Gravis)"], "correct": 0, "explanation": "સિસ્ટેમિક લ્યુપસ એરિથેમેટોસસ (SLE) એ ઓટોઇમ્યુન રોગ છે જેમાં રોગપ્રતિકારક તંત્ર દ્વારા ઉત્પન્ન થતી એન્ટીબોડી શરીરના સ્વના DNA વિરુદ્ધ પ્રતિક્રિયા આપે છે. રૂમેટોઇડ આર્થરાઇટિસમાં જોડો પર હુમલો થાય છે, ટાઇપ 1 ડાયાબિટીસમાં અગ્ન્યાશયના બીટા કોષો પર હુમલો થાય છે, અને માયસ્થેનિયા ગ્રેવિસમાં સ્નાયુઓ અને ન્યુરોન વચ્ચેના જંકશન પર હુમલો થાય છે.", "ncert_ref": "Class XII - Chapter 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 14}, {"question": "માનવ શરીરમાં, કયા રોગમાં પ્રતિરક્ષાતંત્ર દ્વારા ઉત્પન્ન થતી IgE એન્ટિબોડીની અતિશય માત્રા એલર્જી પ્રતિક્રિયાને પ્રેરિત કરે છે, જ્યારે સંવેદનશીલ વ્યક્તિ કોઈ વિશિષ્ટ એલર્જેન સાથે સંપર્કમાં આવે છે?", "options": ["A) ટાયપોઇડ", "B) એસ્થમા", "C) ટ્યુબરક્યુલોસિસ", "D) મેળાનોમા"], "correct": 1, "explanation": "બ) એસ્થમા: એલર્જી પ્રતિક્રિયામાં IgE એન્ટિબોડીની ભૂમિકા મહત્વપૂર્ણ છે. જ્યારે સંવેદનશીલ વ્યક્તિ એલર્જેન સાથે સંપર્કમાં આવે છે, ત્યારે મસ્ત કોષો (Mast cells) દ્વારા હિસ્ટામિન જેવા પદાર્થો મુક્ત થાય છે, જે એસ્થમા જેવી એલર્જી પ્રતિક્રિયાઓને પ્રેરિત કરે છે. આ) ટાયપોઇડ: બેક્ટેરિયલ રોગ છે, જે સેલ્મોનેલા ટાયફી દ્વારા થાય છે, એલર્જી સાથે સંબંધિત નથી. ક) ટ્યુબરક્યુલોસિસ: માઇકોબેક્ટીરિયમ ટ્યુબરક્યુલોસિસ દ્વારા થતો રોગ છે, જે પ્રતિરક્ષાતંત્રની ક્રિયાશીલતાને નબળી પાડે છે, પરંતુ IgE એન્ટિબોડી સાથે સંબંધિત નથી. ડ) મેળાનોમા: ચામડીનો કૅન્સર છે, જે એલર્જી પ્રતિક્રિયા સાથે સંબંધિત નથી.", "ncert_ref": "Class XII - પ્રકરણ 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 15}, {"question": "જ્યારે માનવ શરીરમાં કોઈ એન્ટિજેન પ્રવેશે છે, ત્યારે કયો કોષ પ્રથમ તેની ઓળખ કરે છે અને તેને પ્રસ્તુત કરવા માટે MHC-II અણુનો ઉપયોગ કરે છે?", "options": ["A) B-કોષ", "B) T-હેલ્પર કોષ", "C) ડેન્ડ્રિટિક કોષ", "D) ન્યુટ્રોફિલ"], "correct": 2, "explanation": "ડેન્ડ્રિટિક કોષ એ એન્ટિજેન-પ્રસ્તુત કરનાર કોષ (APC) છે જે એન્ટિજેનની ઓળખ કરે છે અને તેને MHC-II અણુ દ્વારા T-હેલ્પર કોષોને પ્રસ્તુત કરે છે. B-કોષ અને T-હેલ્પર કોષ એન્ટિજેનની ઓળખ કરે છે પરંતુ પ્રથમ ઓળખ કરનાર ડેન્ડ્રિટિક કોષ હોય છે. ન્યુટ્રોફિલ ફેગોસાઇટોસિસમાં ભાગ લે છે પરંતુ એન્ટિજેન પ્રસ્તુતિકરણમાં નહીં.", "ncert_ref": "Class XII - Chapter 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 16}, {"question": "માનવ શરીરમાં, કયો સાયટોકાઇન એવો છે જે કોષીય પ્રતિરક્ષામાં મહત્વની ભૂમિકા ભજવે છે અને મેક્રોફેજને સક્રિય કરવા માટે જવાબદાર છે?", "options": ["A) ઇન્ટરલ્યુકિન-2 (IL-2)", "B) ઇન્ટરફેરોન-ગામા (IFN-γ)", "C) ટ્યુમર નેક્રોસિસ ફેક્ટર-આલ્ફા (TNF-α)", "D) ઇન્ટરલ્યુકિન-4 (IL-4)"], "correct": 1, "explanation": "ઇન્ટરફેરોન-ગામા (IFN-γ) એ સાયટોકાઇન છે જે T-કોષો અને NK કોષો દ્વારા સ્રાવાય છે અને મેક્રોફેજને સક્રિય કરવા માટે જવાબદાર છે. IL-2 T-કોષોની વૃદ્ધિ અને પ્રસરણ માટે જવાબદાર છે, TNF-α સોજા અને કોષીય મૃત્યુ માટે જવાબદાર છે, અને IL-4 B-કોષોની વૃદ્ધિ અને એન્ટિબોડી ઉત્પત્તિ માટે જવાબદાર છે.", "ncert_ref": "Class XII - Chapter 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 17}, {"question": "જ્યારે માનવ શરીરમાં કોઈ વાઇરસ દ્વારા સંક્રમણ થાય છે, ત્યારે કયો કોષ પ્રથમ ઇન્ટરફેરોન (Interferon) નું સ્રાવ કરે છે, જે આસપાસના કોષોને વાઇરસ વિરુદ્ધ રક્ષણ આપે છે?", "options": ["A) B-કોષ", "B) T-કોષ", "C) સંક્રમિત કોષ", "D) મેક્રોફેજ"], "correct": 2, "explanation": "ઇન્ટરફેરોનનું સ્રાવ સંક્રમિત કોષ દ્વારા થાય છે, જે વાઇરસ દ્વારા સંક્રમિત થયા પછી આસપાસના કોષોને વાઇરસ વિરુદ્ધ રક્ષણ આપવા માટે ઉત્સર્જિત કરે છે. B-કોષ (A) એન્ટિબોડી ઉત્પન્ન કરે છે, T-કોષ (B) કોષીય પ્રતિરક્ષામાં ભાગ લે છે, અને મેક્રોફેજ (D) એન્ટિજેન પ્રસ્તુત કરે છે અને ફેગોસાઇટોસિસ કરે છે.", "ncert_ref": "Class XII - પ્રકરણ 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 18}, {"question": "જ્યારે માનવ શરીરમાં કોઈ વ્યક્તિને બીજી વ્યક્તિના રક્તનું સ્ફૂર્તિ (ટ્રાન્સફ્યુઝન) કરવામાં આવે છે, ત્યારે કયો પ્રકારનો પ્રતિક્રિયા થવાની શક્યતા સૌથી વધુ હોય છે?", "options": ["A) ટાઇપ I હાઇપરસેન્સિટિવિટી પ્રતિક્રિયા", "B) ટાઇપ II હાઇપરસેન્સિટિવિટી પ્રતિક્રિયા", "C) ટાઇપ III હાઇપરસેન્સિટિવિટી પ્રતિક્રિયા", "D) ટાઇપ IV હાઇપરસેન્સિટિવિટી પ્રતિક્રિયા"], "correct": 1, "explanation": "રક્ત સ્ફૂર્તિ દરમિયાન, જો રક્ત ગ્રુપ અસંગત હોય તો ટાઇપ II હાઇપરસેન્સિટિવિટી પ્રતિક્રિયા થાય છે, જેમાં એન્ટિબોડી રક્ત કોષોની સપાટી પરના એન્ટિજેન સાથે બંધાય છે અને કોમ્પ્લિમેન્ટ સિસ્ટમ એક્ટિવેટ થઈને કોષોનું વિઘટન કરે છે. ટાઇપ I એલર્જી સાથે, ટાઇપ III ઇમ્યુન કોમ્પ્લેક્સ સાથે, અને ટાઇપ IV T-કોષ મધ્યસ્થીવાળી પ્રતિક્રિયા સાથે સંબંધિત છે.", સના ટોક્સિન વિરુદ્ધ એન્ટિટોક્સિન એન્ટિબોડીનું ઉત્પાદન B-કોષો (પ્લાઝ્મા કોષો) દ્વારા થાય છે (B). T-હેલ્પર કોષો (A) એન્ટિજેન પ્રસ્તુતિકરણમાં મદદ કરે છે, પરંતુ એન્ટિબોડીનું ઉત્પાદન B-કોષો કરે છે. ન્યુટ્રોફિલ્સ (C) અને નેચરલ કિલર કોષો (D) કોષીય પ્રતિરક્ષામાં ભાગ લે છે, પરંતુ એન્ટિબોડી ઉત્પાદન સાથે સીધો સંબંધ ધરાવતા નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 22}, {"question": "માનવ શરીરમાં, કયો રોગ એવો છે જેમાં માયેલિન આવરણના વિનાશને કારણે ચેતાતંત્રના સંકેતોનો વહન દર ઘટે છે, પરંતુ તે ઓટોઇમ્યુન રોગ નથી?", "options": ["A) મલ્ટિપલ સ્ક્લેરોસિસ", "B) ગિલિયન-બારે સિન્ડ્રોમ", "C) પાર્કિનસન રોગ", "D) અલ્ઝાઇમર રોગ"], "correct": 1, "explanation": "ગિલિયન-બારે સિન્ડ્રોમમાં, પ્રતિરક્ષાતંત્ર દ્વારા માયેલિન આવરણ પર હુમલો થાય છે, જેથી ચેતાતંત્રના સંકેતોનો વહન દર ઘટે છે. આ રોગ ઓટોઇમ્યુન નથી, પરંતુ તે એક એક્યુટ ઇન્ફ્લેમેટરી ડિમાયલિનેટિંગ પોલીરેડિક્યુલોપેથી છે. મલ્ટિપલ સ્ક્લેરોસિસ ઓટોઇમ્યુન રોગ છે, જેમાં માયેલિન આવરણનો વિનાશ થાય છે. પાર્કિનસન અને અલ્ઝાઇમર રોગમાં માયેલિન આવરણના વિનાશ સાથે કોઈ સીધો સંબંધ નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 23}, {"question": "જ્યારે માનવ શરીરમાં કોઈ વ્યક્તિને ટાઇફોઈડ જેવા અંતઃકોષીય બેક્ટેરિયા દ્વારા સંક્રમણ થાય છે, ત્યારે કયો પ્રતિરક્ષા કોષ સીધો જ બેક્ટેરિયાને નષ્ટ કરવા માટે ફેગોસાઇટોસિસ દ્વારા ક્રિયાશીલ થાય છે?", "options": ["A) ન્યૂટ્રોફિલ", "B) મેક્રોફેજ", "C) ઇઓસિનોફિલ", "D) બેસોફિલ"], "correct": 1, "explanation": "મેક્રોફેજ અંતઃકોષીય બેક્ટેરિયા જેવા કે સલ્મોનેલા ટાઇફી (ટાઇફોઈડ) ને ફેગોસાઇટોસિસ દ્વારા નષ્ટ કરે છે. ન્યૂટ્રોફિલ પણ ફેગોસાઇટોસિસ કરે છે, પરંતુ તે મુખ્યત્વે બાહ્યકોષીય બેક્ટેરિયા સામે ક્રિયાશીલ થાય છે. ઇઓસિનોફિલ અને બેસોફિલ પરોપજીવી અને એલર્જી પ્રતિક્રિયાઓમાં મહત્વની ભૂમિકા ભજવે છે.", "ncert_ref": "Class XII - Chapter 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 24}, {"question": "જ્યારે માનવ શરીરમાં કોઈ વ્યક્તિને મલેરિયા પરોપજીવી (Plasmodium) દ્વારા સંક્રમણ થાય છે, ત્યારે કયો કોષ પ્રથમ તેની પહોંચને રોકવા માટે જવાબદાર હોય છે?", "options": ["A) B-કોષો", "B) T-કોષો", "C) યકૃતના ક્યુપ્ફર કોષો", "D) ન્યુટ્રોફિલ્સ"], "correct": 2, "explanation": "મલેરિયા પરોપજીવી (Plasmodium) જ્યારે માનવ શરીરમાં પ્રવેશે છે, ત્યારે તે પ્રથમ યકૃતમાં જાય છે. યકૃતના ક્યુપ્ફર કોષો (C) એ મેક્રોફેજ છે જે પરોપજીવીને નષ્ટ કરવા માટે જવાબદાર હોય છે. B-કોષો (A) અને T-કોષો (B) પ્રતિરક્ષાતંત્રના ભાગ છે પરંતુ પ્રથમ પ્રતિક્રિયા ક્યુપ્ફર કોષો દ્વારા થાય છે. ન્યુટ્રોફિલ્સ (D) બેક્ટેરિયા સામે વધુ સક્રિય હોય છે.", "ncert_ref": "Class XII - Chapter 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 25}, {"question": "કયો રોગ એવો છે જેમાં પ્રતિરક્ષાતંત્ર દ્વારા ઉત્પન્ન થતી પ્રતિક્રિયા કોષીય (Cell-mediated) નહીં પરંતુ પ્રવાહી (Humoral) પ્રતિરક્ષા દ્વારા થાય છે?", "options": ["A) ટ્યુબરક્યુલોસિસ (TB)", "B) એડ્સ (AIDS)", "C) ટેટનસ", "D) લ્યુપસ"], "correct": 2, "explanation": "ટેટનસ (C) એ એક રોગ છે જેમાં બેક્ટેરિયલ ટોક્સિન સામે પ્રવાહી પ્રતિરક્ષા (Humoral immunity) દ્વારા એન્ટિબોડી (જેવી કે IgG) ઉત્પન્ન થાય છે. ટ્યુબરક્યુલોસિસ (A) અને એડ્સ (B)માં કોષીય પ્રતિરક્ષા (Cell-mediated immunity) મહત્વની ભૂમિકા ભજવે છે. લ્યુપસ (D) ઓટોઇમ્યુન રોગ છે જેમાં બંને પ્રકારની પ્રતિક્રિયાઓ જોવા મળે છે.", "ncert_ref": "Class XII - Chapter 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 26}, {"question": "જ્યારે માનવ શરીરમાં કોઈ વ્યક્તિને કોઈ એન્ટિજેન પ્રવેશે છે, ત્યારે કયો સાયટોકાઇન એવો છે જે T-કોષોની પ્રસરણ (Proliferation) અને વિભેદન (Differentiation) માટે જવાબદાર છે?", "options": ["A) ઇન્ટરલ્યુકિન-1 (IL-1)", "B) ઇન્ટરલ્યુકિન-2 (IL-2)", "C) ટ્યુમર નેક્રોસિસ ફેક્ટર-આલ્ફા (TNF-α)", "D) ઇન્ટરફેરોન-ગામા (IFN-γ)"], "correct": 1, "explanation": "ઇન્ટરલ્યુકિન-2 (IL-2) (B) એ સાયટોકાઇન છે જે T-કોષોની પ્રસરણ અને વિભેદન માટે જવાબદાર છે. ઇન્ટરલ્યુકિન-1 (A) મુખ્યત્વે મેક્રોફેજ દ્વારા સ્રાવાય છે અને જ્વર ઉત્પન્ન કરે છે. ટ્યુમર નેક્રોસિસ ફેક્ટર-આલ્ફા (C) જ્વલન પ્રતિક્રિયામાં ભાગ લે છે, જ્યારે ઇન્ટરફેરોન-ગામા (D) મેક્રોફેજની ક્રિયાશીલતામાં વધારો કરે છે.", "ncert_ref": "Class XII - Chapter 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 27}, {"question": "માનવ શરીરમાં, જ્યારે કોઈ વ્યક્તિને રહેણાંક કોષીય પ્રતિરક્ષા (Cell-mediated immunity) ની કમજોરીને કારણે સંક્રમણ થાય છે, ત્યારે નીચેનામાંથી કયો રોગ સૌથી વધુ સંભાવના ધરાવે છે?", "options": ["A) ટેટનસ", "B) ટ્યુબરક્યુલોસિસ (TB)", "C) મલેરિયા", "D) એડ્સ (AIDS)"], "correct": 1, "explanation": "ટ્યુબરક્યુલોસિસ (TB) એ અંતઃકોષીય બેક્ટેરિયા (Mycobacterium tuberculosis) દ્વારા થતો રોગ છે, જેને રહેણાંક કોષીય પ્રતિરક્ષા (Cell-mediated immunity) દ્વારા નિયંત્રિત કરવામાં આવે છે. T-કોષો (ખાસ કરીને CD4+ T-કોષો) અને મેક્રોફેજની ક્રિયાશીલતા આ રોગ સામે લડવા માટે આવશ્યક છે. જ્યારે કોષીય પ્રતિરક્ષા કમજોર હોય છે, ત્યારે TB બેક્ટેરિયા ફેલાઈ શકે છે. ટેટનસ (A) ટોક્સિન-મધ્યસ્થી રોગ છે, મલેરિયા (C) પરોપજીવી દ્વારા થાય છે, અને એડ્સ (D) તો પ્રતિરક્ષાતંત્રને નબળું પાડે છે પરંતુ તે સીધો રોગ નથી.", "ncert_ref": "Class XII - પ્રકરણ 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 28}, {"question": "નીચેનામાંથી કયો રોગ એવો છે જેમાં પ્રતિરક્ષાતંત્ર દ્વારા ઉત્પન્ન થતી પ્રતિક્રિયા કોષીય (Cell-mediated) અને પ્રવાહી (Humoral) બંને પ્રકારની હોય છે, પરંતુ રોગની ગંભીરતા મુખ્યત્વે કોષીય પ્રતિરક્ષાની કમજોરીને કારણે થાય છે?", "options": ["A) લ્યુપસ (Lupus)", "B) લેપ્રોસી (Leprosy)", "C) ડાયાબિટીસ મેલિટસ", "D) હેપેટાઇટિસ B"], "correct": 1, "explanation": "લેપ્રોસી (Leprosy) એ Mycobacterium leprae દ્વારા થતો રોગ છે, જેમાં પ્રતિરક્ષાતંત્રની પ્રતિક્રિયા કોષીય અને પ્રવાહી બંને પ્રકારની હોય છે. પરંતુ રોગની ગંભીરતા (જેમ કે ટ્યુબરક્લોઇડ લેપ્રોસી) મુખ્યત્વે કોષીય પ્રતિરક્ષાની કમજોરીને કારણે થાય છે. લ્યુપસ (A) ઓટોઇમ્યુન રોગ છે, ડાયાબિટીસ મેલિટસ (C) ચયાપચય વિકાર છે, અને હેપેટાઇટિસ B (D) વાઇરલ રોગ છે જેમાં પ્રવાહી પ્રતિરક્ષા મુખ્ય ભૂમિકા ભજવે છે.", "ncert_ref": "Class XII - પ્રકરણ 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 29}, {"question": "માનવ શરીરમાં, જ્યારે મેળાવીને (graft) અંગ પ્રત્યારોપણ કરવામાં આવે છે, ત્યારે કયો પ્રકારનો પ્રતિક્રિયા થાય છે જેમાં T-કોષો દ્વારા સ્વના પેશીને નુકસાન પહોંચાડવામાં આવે છે?", "options": ["A) ગ્રાફ્ટ વર્સસ હોસ્ટ ડિઝીઝ (GVHD)", "B) હાઇપરસેન્સિટિવિટી ટાઇપ II", "C) ઓટોગ્રાફ્ટ રિજેક્શન", "D) ટાઇપ IV હાઇપરસેન્સિટિવિટી પ્રતિક્રિયા"], "correct": 3, "explanation": "ટાઇપ IV હાઇપરસેન્સિટિવિટી પ્રતિક્રિયા (D) સેલ-મીડિયેટેડ ઇમ્યુન રિસ્પોન્સ છે જેમાં T-કોષો સક્રિય થઈને સ્વના પેશીને નુકસાન પહોંચાડે છે. ગ્રાફ્ટ વર્સસ હોસ્ટ ડિઝીઝ (A) ત્યારે થાય છે જ્યારે પ્રત્યારોપિત કોષો હોસ્ટ પર હુમલો કરે છે, હાઇપરસેન્સિટિવિટી ટાઇપ II (B) એન્ટિબોડી-મીડિયેટેડ છે, અને ઓટોગ્રાફ્ટ રિજેક્શન (C) સ્વ-પેશીના પ્રત્યારોપણમાં થતો નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 30}, {"question": "માનવ શરીરમાં, કયો સાયટોકાઇન એવો છે જે મેક્રોફેજ અને T-કોષોની સક્રિયતામાં મહત્વની ભૂમિકા ભજવે છે અને જ્યારે તેની અછત હોય છે ત્યારે ક્રોનિક ગ્રાન્યુલોમેટસ રોગ થાય છે?", "options": ["A) ઇન્ટરલ્યુકિન-2 (IL-2)", "B) ઇન્ટરફેરોન-ગામા (IFN-γ)", "C) ટ્યુમર નેક્રોસિસ ફેક્ટર-આલ્ફા (TNF-α)", "D) ઇન્ટરલ્યુકિન-4 (IL-4)"], "correct": 1, "explanation": "ઇન્ટરફેરોન-ગામા (IFN-γ) (B) મેક્રોફેજ અને T-કોષોની સક્રિયતામાં મહત્વની ભૂમિકા ભજવે છે. તેની અછતને કારણે ક્રોનિક ગ્રાન્યુલોમેટસ રોગ થાય છે. IL-2 (A) T-કોષોના પ્રસરણમાં મહત્વની ભૂમિકા ભજવે છે, TNF-α (C) જ્વલન પ્રતિક્રિયામાં મહત્વની ભૂમિકા ભજવે છે, અને IL-4 (D) B-કોષોના પ્રસરણ અને IgE ઉત્પાદનમાં મહત્વની ભૂમિકા ભજવે છે.", "ncert_ref": "Class XII - Chapter 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 31}, {"question": "માનવ શરીરમાં, જ્યારે કોઈ વ્યક્તિને કોઈ એન્ટિજેન પ્રવેશે છે, ત્યારે કયો કોષ પ્રથમ તેની ઓળખ કરે છે અને પ્રતિક્રિયા શરૂ કરે છે, પરંતુ તે કોષ એન્ટિજેનને પ્રસ્તુત કરતો નથી?", "options": ["A) ડેન્ડ્રિટિક કોષ", "B) મેક્રોફેજ", "C) નેચરલ કિલર કોષ", "D) B-કોષ"], "correct": 2, "explanation": "નેચરલ કિલર કોષ (C) પ્રથમ એન્ટિજેનની ઓળખ કરે છે અને પ્રતિક્રિયા શરૂ કરે છે, પરંતુ તે એન્ટિજેનને પ્રસ્તુત કરતો નથી. ડેન્ડ્રિટિક કોષ (A) અને મેક્રોફેજ (B) એન્ટિજેન પ્રસ્તુત કરે છે, જ્યારે B-કોષ (D) એન્ટિબોડી ઉત્પન્ન કરે છે.", "ncert_ref": "Class XII - Chapter 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 32}, {"question": "જ્યારે માનવ શરીરમાં કોઈ વ્યક્તિને હેપેટાઇટિસ B વાઇરસ દ્વારા સંક્રમણ થાય છે, ત્યારે નીચેનામાંથી કયો કોષ પ્રથમ વાઇરસને ઓળખીને પ્રતિક્રિયા આપે છે અને કયો સાયટોકાઇન ઉત્પન્ન કરે છે જે T-કોષો અને B-કોષોની સક્રિયતામાં મદદ કરે છે?", "options": ["A) મેક્રોફેજ - ઇન્ટરલ્યુકિન-1 (IL-1)", "B) ડેન્ડ્રિટિક કોષ - ઇન્ટરફેરોન-ગામા (IFN-γ)", "C) ન્યુટ્રોફિલ - ટ્યુમર નેક્રોસિસ ફેક્ટર-અલ્ફા (TNF-α)", "D) નેચરલ કિલર કોષ - ઇન્ટરલ્યુકિન-2 (IL-2)"], "correct": 0, "explanation": "હેપેટાઇટિસ B વાઇરસ સંક્રમણ દરમિયાન, મેક્રોફેજ પ્રથમ વાઇરસને ઓળખીને પ્રતિક્રિયા આપે છે. મેક્રોફેજ દ્વારા ઇન્ટરલ્યુકિન-1 (IL-1) સાયટોકાઇન ઉત્પન્ન કરવામાં આવે છે, જે T-કોષો અને B-કોષોની સક્રિયતામાં મદદ કરે છે. ડેન્ડ્રિટિક કોષ એન્ટિજેન પ્રસ્તુત કરવામાં મહત્વની ભૂમિકા ભજવે છે, પરંતુ ઇન્ટરફેરોન-ગામા (IFN-γ) મુખ્યત્વે T-કોષો અને NK કોષો દ્વારા ઉત્પન્ન થાય છે. ન્યુટ્રોફિલ મુખ્યત્વે બેક્ટેરિયલ સંક્રમણમાં ભાગ લે છે અને TNF-α ઉત્પન્ન કરે છે, પરંતુ હેપેટાઇટિસ B વાઇરસ સંક્રમણમાં તે પ્રથમ કોષ નથી. નેચરલ કિલર કોષ (NK કોષ) વાઇરસ-સંક્રમિત કોષોને નાશ કરવામાં મદદ કરે છે, પરંતુ IL-2 મુખ્યત્વે T-કોષો દ્વારા ઉત્પન્ન થાય છે.", "ncert_ref": "Class XII - Chapter 8: માનવ આરોગ્ય અને રોગ", "difficulty": "Hard", "num": 33}, {"question": "માનવ શરીરમાં, જ્યારે કોઈ વ્યક્તિને ટ્યુબરક્યુલોસિસ (TB) ના બેક્ટેરિયા દ્વારા સંક્રમણ થાય છે, ત્યારે નીચેનામાંથી કયો પરિબળ સૌથી મહત્વનો છે જે રોગના વિકાસને રોકવામાં મદદ કરે છે?", "options": ["A) મેક્રોફેજ દ્વારા ફેગોસાઇટોસિસ અને ગ્રેન્યુલોમા નિર્માણ", "B) B-કોષો દ્વારા IgG એન્ટિબોડીનું ઉત્પાદન", "C) ન્યુટ્રોફિલ દ્વારા બેક્ટેરિયાનું તાત્કાલિક વિનાશ", "D) નેચરલ કિલર (NK) કોષો દ્વારા સંક્રમિત કોષોનું વિનાશ"], "correct": 0, "explanation": "ટ્યુબરક્યુલોસિસ (TB) એ અંતઃકોષીય બેક્ટેરિયા *Mycobacterium tuberculosis* દ્વારા થતો રોગ છે. મેક્રોફેજ આ બેક્ટેરિયાને ફેગોસાઇટોસિસ દ્વારા ગ્રહણ કરે છે અને ગ્રેન્યુલોમા નિર્માણ દ્વારા તેને અલગ રાખે છે, જે રોગના વિકાસને રોકવામાં મહત્વની ભૂમિકા ભજવે છે. B-કોષો દ્વારા ઉત્પન્ન થતી IgG એન્ટિબોડી અંતઃકોષીય બેક્ટેરિયા વિરુદ્ધ અસરકારક નથી, કારણ કે એન્ટિબોડી અંતઃકોષીય પેથોજેનને ઓળખી શકતી નથી. ન્યુટ્રોફિલ અને NK કોષો પણ અંતઃકોષીય બેક્ટેરિયા વિરુદ્ધ સીધી અસર કરતાં નથી. આથ             questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
