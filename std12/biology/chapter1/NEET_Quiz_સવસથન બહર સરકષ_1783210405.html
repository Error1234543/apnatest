<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - સ્વસ્થાન બહાર સંરક્ષણ (Ex-situ Conservation)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 સ્વસ્થાન બહાર સંરક્ષણ (Ex-situ Conservation)</span>
                <span>🎯 Hard</span>
                <span>📝 41 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "જૈવવિવિધતાના સંરક્ષણ માટેના ex-situ સંરક્ષણ પદ્ધતિઓમાં નીચેનામાંથી કયું વિધાન સત્ય નથી?", "options": ["A) જીન બેંકમાં બીજ અને પોલનનું સંગ્રહણ કરવામાં આવે છે.", "B) બોટેનિકલ ગાર્ડનમાં વનસ્પતિની જાતોનું સંરક્ષણ અને અભ્યાસ કરવામાં આવે છે.", "C) ક્રાયોપ્રિઝર્વેશનમાં કોષો અથવા પેશીઓને અતિ નીચા તાપમાને સંગ્રહવામાં આવે છે.", "D) સંરક્ષિત ક્ષેત્રો જેવા કે રાષ્ટ્રીય ઉદ્યાનો ex-situ સંરક્ષણનું ઉદાહરણ છે."], "correct": 3, "explanation": "સંરક્ષિત ક્ષેત્રો જેવા કે રાષ્ટ્રીય ઉદ્યાનો in-situ સંરક્ષણનું ઉદાહરણ છે, ન કે ex-situ. ex-situ સંરક્ષણમાં જૈવવિવિધતાને તેના નૈસર્ગિક નિવાસસ્થાન બહાર સંરક્ષવામાં આવે છે. જીન બેંક, બોટેનિકલ ગાર્ડન અને ક્રાયોપ્રિઝર્વેશન એ ex-situ સંરક્ષણના ઉદાહરણો છે.", "ncert_ref": "Class XII - પ્રકરણ ૧૫: જૈવવિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 1}, {"question": "ક્રાયોપ્રિઝર્વેશન પદ્ધતિમાં નીચેનામાંથી કયા પદાર્થનો ઉપયોગ કોષોને હિમથી થતા નુકસાનથી બચાવવા માટે થાય છે?", "options": ["A) ઇથિલીન ગ્લાયકોલ", "B) ક્લોરોફોર્મ", "C) ફોર્મલિન", "D) એસિટોન"], "correct": 0, "explanation": "ક્રાયોપ્રિઝર્વેશનમાં કોષોને હિમથી થતા નુકસાનથી બચાવવા માટે ક્રાયોપ્રોટેક્ટન્ટ્સ જેવા કે ઇથિલીન ગ્લાયકોલ અથવા ડાયમિથાઇલ સલ્ફોક્સાઇડ (DMSO)નો ઉપયોગ કરવામાં આવે છે. ક્લોરોફોર્મ, ફોર્મલિન અને એસિટોન એ ક્રાયોપ્રિઝર્વેશનમાં વપરાતા પદાર્થો નથી.", "ncert_ref": "Class XII - પ્રકરણ ૧૫: જૈવવિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 2}, {"question": "નીચેનામાંથી કયું ex-situ સંરક્ષણની પદ્ધતિ નથી?", "options": ["A) ટીશ્યુ કલ્ચર", "B) બીજ બેંક", "C) જૈવમંડળ અભયારણ્ય", "D) ક્લોનિંગ"], "correct": 2, "explanation": "જૈવમંડળ અભયારણ્ય એ in-situ સંરક્ષણની પદ્ધતિ છે, જ્યારે ટીશ્યુ કલ્ચર, બીજ બેંક અને ક્લોનિંગ એ ex-situ સંરક્ષણની પદ્ધતિઓ છે.", "ncert_ref": "Class XII - પ્રકરણ ૧૫: જૈવવિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 3}, {"question": "ex-situ સંરક્ષણ માટે નીચેનામાંથી કયું વિધાન યોગ્ય નથી?", "options": ["A) તે નૈસર્ગિક નિવાસસ્થાન બહાર કરવામાં આવે છે.", "B) તે જૈવવિવિધતાના નમૂનાઓને સંગ્રહિત અને સંરક્ષિત કરે છે.", "C) તે પ્રજાતિઓના નૈસર્ગિક પર્યાવરણમાં હસ્તક્ષેપ કરે છે.", "D) તે લુપ્ત થવાના ધોરણેની પ્રજાતિઓ માટે ઉપયોગી છે."], "correct": 2, "explanation": "ex-situ સંરક્ષણ નૈસર્ગિક નિવાસસ્થાન બહાર કરવામાં આવે છે અને તે જૈવવિવિધતાના નમૂનાઓને સંગ્રહિત અને સંરક્ષિત કરે છે, પરંતુ તે પ્રજાતિઓના નૈસર્ગિક પર્યાવરણમાં હસ્તક્ષેપ કરતું નથી. તે લુપ્ત થવાના ધોરણેની પ્રજાતિઓ માટે ખૂબ જ ઉપયોગી છે.", "ncert_ref": "Class XII - પ્રકરણ ૧૫: જૈવવિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 4}, {"question": "નીચેનામાંથી કયું ex-situ સંરક્ષણનું સૌથી વધુ સ્વીકૃત ઉદાહરણ છે?", "options": ["A) રાષ્ટ્રીય ઉદ્યાન", "B) વન્યજીવ અભયારણ્ય", "C) જીન બેંક", "D) જૈવમંડળ અભયારણ્ય"], "correct": 2, "explanation": "જીન બેંક એ ex-situ સંરક્ષણનું સૌથી વધુ સ્વીકૃત ઉદાહરણ છે, જ્યારે રાષ્ટ્રીય ઉદ્યાન, વન્યજીવ અભયારણ્ય અને જૈવમંડળ અભયારણ્ય એ in-situ સંરક્ષણના ઉદાહરણો છે.", "ncert_ref": "Class XII - પ્રકરણ ૧૫: જૈવવિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 5}, {"question": "જૈવવિવિધતાના ex-situ સંરક્ષણ અંતર્ગત, 'જીન બેંક' અને 'ક્લોનલ રિપોઝિટરી' વચ્ચેનો મુખ્ય તફાવત કયો છે?", "options": ["A) જીન બેંકમાં ફક્ત બીજોનો સંગ્રહ થાય છે, જ્યારે ક્લોનલ રિપોઝિટરીમાં જીવિત છોડના નમૂનાઓ રાખવામાં આવે છે.", "B) જીન બેંકમાં DNAના નમૂનાઓ સંગ્રહિત થાય છે, જ્યારે ક્લોનલ રિપોઝિટરીમાં અનુવંશિક રીતે એકસરખા છોડ ઉગાડવામાં આવે છે.", "C) જીન બેંકમાં ફક્ત પ્રાણીઓના જનીન સંગ્રહિત થાય છે, જ્યારે ક્લોનલ રિપોઝિટરીમાં ફક્ત વનસ્પતિઓના જનીન સંગ્રહિત થાય છે.", "D) જીન બેંક અને ક્લોનલ રિપોઝિટરી એ બંને એક જ પ્રકારની સંરક્ષણ પદ્ધતિ છે, ફક્ત નામ જુદું છે."], "correct": 1, "explanation": "જીન બેંકમાં DNAના નમૂનાઓ સંગ્રહિત થાય છે, જ્યારે ક્લોનલ રિપોઝિટરીમાં અનુવંશિક રીતે એકસરખા છોડ (ક્લોન) ઉગાડીને સંગ્રહિત કરવામાં આવે છે. વિકલ્પ A ખોટો છે કારણ કે જીન બેંકમાં ફક્ત બીજો જ નહીં, પરંતુ DNA, પેશી, અને અન્ય અનુવંશિક સામગ્રી પણ સંગ્રહિત થાય છે. વિકલ્પ C ખોટો છે કારણ કે જીન બેંકમાં વનસ્પતિઓ અને પ્રાણીઓ બંનેમાંના જનીન સંગ્રહિત થઈ શકે છે. વિકલ્પ D ખોટો છે કારણ કે બંને પદ્ધતિઓ અલગ છે.", "ncert_ref": "Class XII - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 6}, ) સીડ બેંકમાં જીવંત બીજ સંગ્રહિત થાય છે, જ્યારે પોલન બેંકમાં મૃત પરાગરજ સંગ્રહિત થાય છે.", "D) સીડ બેંક અને પોલન બેંક એ બંને એક જ પ્રકારની સંરક્ષણ પદ્ધતિ છે, ફક્ત નામ જુદું છે."], "correct": 0, "explanation": "સીડ બેંકમાં બીજોનો સંગ્રહ થાય છે, જ્યારે પોલન બેંકમાં પરાગરજ (પરાગકણો)નો સંગ્રહ થાય છે. વિકલ્પ B ખોટો છે કારણ કે પોલન બેંકમાં ફક્ત વનસ્પતિઓના પરાગરજ સંગ્રહિત થાય છે, પ્રાણીઓના ગેમેટ્સ નહીં. વિકલ્પ C ખોટો છે કારણ કે પોલન બેંકમાં જીવંત પરાગરજ સંગ્રહિત થાય છે. વિકલ્પ D ખોટો છે કારણ કે બંને અલગ પદ્ધતિઓ છે.", "ncert_ref": "Class XII - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 9}, {"question": "ex-situ સંરક્ષણમાં, 'ઝૂ' અને 'વન્યજીવ અભયારણ્ય' વચ્ચેનો મુખ્ય તફાવત કયો છે?", "options": ["A) ઝૂમાં પ્રાણીઓને કેદમાં રાખવામાં આવે છે, જ્યારે વન્યજીવ અભયારણ્યમાં પ્રાણીઓ સ્વતંત્ર રીતે વસે છે.", "B) ઝૂમાં ફક્ત સ્થાનિક પ્રાણીઓ રાખવામાં આવે છે, જ્યારે વન્યજીવ અભયારણ્યમાં ફક્ત વિદેશી પ્રાણીઓ રાખવામાં આવે છે.", "C) ઝૂમાં પ્રાણીઓનો સંગ્રહ શૈક્ષણિક હેતુ માટે થાય છે, જ્યારે વન્યજીવ અભયારણ્યમાં પ્રાણીઓનો સંગ્રહ સંશોધન હેતુ માટે થાય છે.", "D) ઝૂ અને વન્યજીવ અભયારણ્ય એ બંને ex-situ સંરક્ષણના ઉદાહરણો છે."], "correct": 0, "explanation": "ઝૂમાં પ્રાણીઓને કેદમાં રાખવામાં આવે છે, જ્યારે વન્યજીવ અભયારણ્યમાં પ્રાણીઓ સ્વતંત્ર રીતે વસે છે અને તે in-situ સંરક્ષણનું ઉદાહરણ છે. વિકલ્પ B ખોટો છે કારણ કે ઝૂ અને વન્યજીવ અભયારણ્ય બંનેમાં સ્થાનિક અને વિદેશી પ્રાણીઓ રાખી શકાય છે. વિકલ્પ C ખોટો છે કારણ કે બંનેમાં શૈક્ષણિક અને સંશોધન હેતુ માટે પ્રાણીઓનો સંગ્રહ થાય છે. વિકલ્પ D ખોટો છે કારણ કે વન્યજીવ અભયારણ્ય in-situ સંરક્ષણનું ઉદાહરણ છે.", "ncert_ref": "Class XII - Chapter 15: જૈવવિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 10}, {"question": "સ્વસ્થાન બહાર સંરક્ષણ (ex-situ conservation) અંતર્ગત, 'જીવિત જીન બેંક' (Living Gene Bank) અને 'ઇન વિટ્રો સંરક્ષણ' વચ્ચેનો મુખ્ય તફાવત કયો છે?", "options": ["A) જીવિત જીન બેંકમાં વનસ્પતિના બીજો સંગ્રહિત કરવામાં આવે છે, જ્યારે ઇન વિટ્રો સંરક્ષણમાં પેશી અથવા કોષોનો સંવર્ધન કરવામાં આવે છે.", "B) જીવિત જીન બેંકમાં જીવંત વનસ્પતિઓનો સંગ્રહ કરવામાં આવે છે, જ્યારે ઇન વિટ્રો સંરક્ષણમાં કોષો અથવા પેશીઓને કૃત્રિમ વાતાવરણમાં સંગ્રહિત કરવામાં આવે છે.", "C) જીવિત જીન બેંકમાં ફક્ત અનુવંશિક રીતે સુધારેલી જાતો સંગ્રહિત કરવામાં આવે છે, જ્યારે ઇન વિટ્રો સંરક્ષણમાં ફક્ત લુપ્ત થવાની કગાર પરની પ્રજાતિઓ સંગ્રહિત કરવામાં આવે છે.", "D) જીવિત જીન બેંકમાં વનસ્પતિઓને પ્રાકૃતિક વાતાવરણમાં ઉગાડવામાં આવે છે, જ્યારે ઇન વિટ્રો સંરક્ષણમાં વનસ્પતિઓને હવામાન-નિયંત્રિત કક્ષામાં ઉગાડવામાં આવે છે."], "correct": 1, "explanation": "જીવિત જીન બેંકમાં જીવંત વનસ્પતિઓનો સંગ્રહ કરવામાં આવે છે, જ્યારે ઇન વિટ્રો સંરક્ષણમાં કોષો અથવા પેશીઓને કૃત્રિમ વાતાવરણ (જેમ કે ટેસ્ટ ટ્યુબ અથવા પેટ્રીડિશ)માં સંગ્રહિત કરવામાં આવે છે. વિકલ્પ A ખોટો છે કારણ કે જીવિત જીન બેંકમાં બીજો નહીં પરંતુ જીવંત વનસ્પતિઓ સંગ્રહિત કરવામાં આવે છે. વિકલ્પ C ખોટો છે કારણ કે જીવિત જીન બેંકમાં તમામ પ્રકારની પ્રજાતિઓ સંગ્રહિત કરવામાં આવે છે, ફક્ત સુધારેલી જાતો જ નહીં. વિકલ્પ D ખોટો છે કારણ કે ઇન વિટ્રો સંરક્ષણમાં કોષો અથવા પેશીઓ સંગ્રહિત કરવામાં આવે છે, વનસ્પતિઓને ઉગાડવામાં નહીં.", "ncert_ref": "Class XII - પ્રકરણ 15: જૈવવિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 11}, {"question": "સ્વસ્થાન બહાર સંરક્ષણમાં, 'પોલન બેંક'નો ઉપયોગ મુખ્યત્વે કયા હેતુ માટે થાય છે?", "options": ["A) વનસ્પતિઓના બીજોને લાંબા સમય સુધી સંગ્રહિત કરવા માટે.", "B) વનસ્પતિઓના અનુવંશિક પદાર્થોને સંગ્રહિત કરવા માટે, જેથી ભવિષ્યમાં પ્રજનન માટે ઉપયોગ કરી શકાય.", "C) વનસ્પતિઓના પર્ણોને સંગ્રહિત કરવા માટે, જેથી તેનો ઉપયોગ ક્લોનિંગ માટે થઈ શકે.", "D) વનસ્પતિઓના મૂળને સંગ્રહિત કરવા માટે, જેથી તેનો ઉપયોગ પેશી સંવર્ધન માટે થઈ શકે."], "correct": 1, "explanation": "પોલન બેંકનો ઉપયોગ વનસ્પતિઓના અનુવંશિક પદાર્થો (પરાગરજ)ને સંગ્રહિત કરવા માટે થાય છે, જેથી ભવિષ્યમાં પ્રજનન માટે ઉપયોગ કરી શકાય. વિકલ્પ A ખોટો છે કારણ કે બીજોને સંગ્રહિત કરવા માટે 'સીડ બેંક'નો ઉપયોગ થાય છે. વિકલ્પ C અને D ખોટા છે કારણ કે પોલન બેંકમાં પર્ણો અથવા મૂળ સંગ્રહિત કરવામાં આવતા નથી.", "ncert_ref": "Class XII - પ્રકરણ 15: જૈવવિવિધતા અને સંરક્ષણ", "difficulty": "Hard", "num": 12}, {"question": "સ્વસ્થાન બહાર સંરક્ષણ અંતર્ગત, 'ક્રાયોપ્રિઝર્વેશન' પદ્ધતિમા             if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
