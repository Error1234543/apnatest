<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>

        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>

    <script>
        const questionsData = [{"question": "અલર્જી પ્રતિક્રિયામાં મુખ્યત્વે કયા પ્રકારના એન્ટીબોડીનો સક્રિય ભાગ ભજવે છે અને તે કયા કોષ દ્વારા ઉત્પન્ન થાય છે?", "options": ["A) IgE, માસ્ટ કોષ", "B) IgG, B-લસિકાકોષ", "C) IgM, પ્લાઝ્મા કોષ", "D) IgA, ટી-લસિકાકોષ"], "correct": 0, "explanation": "અલર્જી પ્રતિક્રિયામાં IgE એન્ટીબોડી મુખ્ય ભૂમિકા ભજવે છે, જે માસ્ટ કોષ અને બેસોફિલ્સ દ્વારા બંધાયેલા હોય છે. IgE ની ઉત્પત્તિ B-લસિકાકોષ દ્વારા થાય છે, પરંતુ તે માસ્ટ કોષ સાથે જોડાઈને હિસ્ટામિન મુક્ત કરવામાં મદદ કરે છે. IgG, IgM, અને IgA અન્ય પ્રકારની પ્રતિરક્ષા પ્રતિક્રિયાઓમાં સક્રિય હોય છે, પરંતુ અલર્જી માટે વિશિષ્ટ નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 1}, {"question": "એનાફિલેક્સિસમાં કયા પદાર્થની અતિશય મુક્તિ થવાથી રક્તવાહિનીઓનો વ્યાપક વિકાસ થાય છે અને રક્તચાપ ઘટે છે?", "options": ["A) હિસ્ટામિન", "B) ઇન્ટરફેરોન", "C) ટ્યુમર નેક્રોસિસ ફેક્ટર", "D) પ્રોસ્ટાગ્લેન્ડિન"], "correct": 0, "explanation": "એનાફિલેક્સિસમાં હિસ્ટામિનની અતિશય મુક્તિ થવાથી રક્તવાહિનીઓનો વ્યાપક વિકાસ થાય છે, જે રક્તચાપ ઘટાડે છે અને શ્વસનમાં તકલીફ ઉભી કરે છે. ઇન્ટરફેરોન અને ટ્યુમર નેક્રોસિસ ફેક્ટર પ્રતિરક્ષા પ્રતિક્રિયાઓમાં સક્રિય હોય છે, પરંતુ એનાફિલેક્સિસ સાથે સીધો સંબંધ ધરાવતા નથી. પ્રોસ્ટાગ્લેન્ડિન પણ પ્રતિક્રિયામાં ભાગ લે છે, પરંતુ હિસ્ટામિન જેવી મુખ્ય ભૂમિકા નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 2}, {"question": "અલર્જી પ્રતિક્રિયામાં માસ્ટ કોષ દ્વારા મુક્ત થતાં સક્રિય પદાર્થોની યાદી પૈકી કયો પદાર્થ રક્તવાહિનીઓની પારગમ્યતા વધારે છે?", "options": ["A) હેપારિન", "B) હિસ્ટામિન", "C) ટ્રિપ્ટેઝ", "D) લ્યુકોટ્રિઇન"], "correct": 1, "explanation": "હિસ્ટામિન માસ્ટ કોષ દ્વારા મુક્ત થતો મુખ્ય પદાર્થ છે, જે રક્તવાહિનીઓની પારગમ્યતા વધારે છે અને અલર્જી લક્ષણો જેવા કે સોજો અને લાલાશ ઉભી કરે છે. હેપારિન રક્ત ગંઠાવા અટકાવે છે, ટ્રિપ્ટેઝ પ્રોટીન તોડનાર ઉત્સેચક છે, અને લ્યુકોટ્રિઇન શ્વસનમાર્ગના સ્નાયુઓને સંકોચન કરે છે, પરંતુ રક્તવાહિનીઓની પારગમ્યતા વધારવાની મુખ્ય ભૂમિકા હિસ્ટામિનની છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 3}, {"question": "કયા પ્રકારની અલર્જી પ્રતિક્રિયામાં એન્ટીજન-એન્ટીબોડી કોમ્પ્લેક્સ રક્તવાહિનીઓમાં જમા થઈને સોજો અને નેક્રોસિસ ઉભો કરે છે?", "options": ["A) ટાઇપ I (તાત્કાલિક હાઇપરસેન્સિટિવિટી)", "B) ટાઇપ II (સાયટોટોક્સિક)", "C) ટાઇપ III (ઇમ્યુન કોમ્પ્લેક્સ મીડિયેટેડ)", "D) ટાઇપ IV (ડિલેડ હાઇપરસેન્સિટિવિટી)"], "correct": 2, "explanation": "ટાઇપ III અલર્જી પ્રતિક્રિયામાં એન્ટીજન-એન્ટીબોડી કોમ્પ્લેક્સ રક્તવાહિનીઓમાં જમા થઈને સોજો અને નેક્રોસિસ ઉભો કરે છે. ટાઇપ I તાત્કાલિક પ્રતિક્રિયા છે (જેમ કે એનાફિલેક્સિસ), ટાઇપ II કોષને નુકસાન પહોંચાડે છે, અને ટાઇપ IV T-કોષ દ્વારા મધ્યસ્થી કરાયેલ ડિલેડ પ્રતિક્રિયા છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 4}, {"question": "અલર્જી પ્રતિક્રિયામાં કયા સાયટોકાઇનની ભૂમિકા મુખ્યત્વે માસ્ટ કોષ અને બેસોફિલ્સની સક્રિયતામાં હોય છે?", "options": ["A) IL-1", "B) IL-4", "C) TNF-α", "D) IFN-γ"], "correct": 1, "explanation": "IL-4 (ઇન્ટરલ્યુકિન-4) મુખ્યત્વે Th2 કોષો દ્વારા ઉત્પન્ન થાય છે અને તે IgE ઉત્પાદનને ઉત્તેજે છે, જે માસ્ટ કોષ અને બેસોફિલ્સની સક્રિયતામાં મહત્વની ભૂમિકા ભજવે છે. IL-1 તાવ અને સોજો સાથે સંબંધિત છે, TNF-α સોજો અને એપોપ્ટોસિસમાં ભાગ લે છે, અને IFN-γ વાયરસ અને કેંસર કોષો વિરુદ્ધ પ્રતિરક્ષા પ્રતિક્રિયામાં સક્રિય હોય છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 5}, {"question": "અલર્જી પ્રતિક્રિયા દરમિયાન IgE એન્ટીબોડી દ્વારા સક્રિય થતાં માસ્ટ કોષમાં કયા સાયટોકાઇનની મુક્તિ થવાથી શ્વસનમાર્ગમાં સોજો અને શ્લેષ્મા ઉત્પન્ન થાય છે, જે અસ્થમાના લક્ષણો તરફ દોરી જાય છે?", "options": ["A) ઇન્ટરલ્યુકિન-2 (IL-2)", "B) ઇન્ટરફેરોન-ગામા (IFN-γ)", "C) ટ્યુમર નેક્રોસિસ ફેક્ટર-આલ્ફા (TNF-α)", "D) હિસ્ટામિન અને લ્યુકોટ્રિયન"], "correct": 3, "explanation": "IgE એન્ટીબોડી માસ્ટ કોષની સપાટી પરના FcεRI રિસેપ્ટર સાથે બંધાય છે, જેના કારણે માસ્ટ કોષમાં ડીગ્રેન્યુલેશન થાય છે અને હિસ્ટામિન, લ્યુકોટ્રિયન જેવા મેડિયેટર મુક્ત થાય છે. આ મેડિયેટર શ્વસનમાર્ગમાં સોજો, શ્લેષ્મા ઉત્પન્ન કરે છે અને અસ્થમાના લક્ષણો તરફ દોરી જાય છે. IL-2, IFN-γ, અને TNF-α એ અલર્જી પ્રતિક્રિયામાં મુખ્ય ભૂમિકા ભજવતા નથી, પરંતુ તેઓ પ્રતિરક્ષા પ્રતિક્રિયામાં અન્ય કાર્યો કરે છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 6}, {"question": "ટાઈપ I હાઇપરસેન્સિટિવિટી પ્રતિક્રિયામાં, એલર્જેનની પ્રથમ એક્સપોઝર પછી શરીરમાં કયા પ્રકારના કોષોની સંખ્યામાં વૃદ્ધિ થાય છે, જે પુનરાવર્તિત એક્સપોઝર દરમિયાન તાત્કાલિક પ્રતિક્રિયા તરફ દોરી જાય છે?", "options": ["A) સીડી4+ ટી-હેલ્પર કોષ (Th1)", "B) સીડી8+ સાયટોટોક્સિક ટી-કોષ", "C) Th2 કોષ અને IgE ઉત્પાદક B-કોષ", "D) નેચરલ કિલર (NK) કોષ"], "correct": 2, "explanation": "ટાઈપ I હાઇપરસેન્સિટિવિટી (તાત્કાલિક અલર્જી) પ્રતિક્રિયામાં, એલર્જેનની પ્રથમ એક્સપોઝર દરમિયાન Th2 કોષ સક્રિય થાય છે, જે B-કોષોને IgE એન્ટીબોડી ઉત્પન્ન કરવા પ્રેરે છે. આ IgE એન્ટીબોડી માસ્ટ કોષ અને બેસોફિલ્સની સપાટી પર બંધાય છે. પુનરાવર્તિત એક્સપોઝર દરમિયાન, એલર્જેન આ IgE સાથે બંધાય છે, જે માસ્ટ કોષને ડીગ્રેન્યુલેટ કરવા પ્રેરે છે. Th1, સાયટોટોક્સિક ટી-કોષ, અને NK કોષ ટાઈપ I હાઇપરસેન્સિટિવિટીમાં મુખ્ય ભૂમિકા ભજવતા નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 7}, {"question": "અલર્જી પ્રતિક્રિયામાં, કયા પદાર્થની અસર હેઠળ માસ્ટ કોષમાં કેલ્શિયમ આયનની સાંદ્રતા વધે છે, જે ડીગ્રેન્યુલેશન અને હિસ્ટામિન મુક્તિ તરફ દોરી જાય છે?", "options": ["A) સાયક્લિક એડિનોસિન મોનોફોસ્ફેટ (cAMP)", "B) ઇનોસિટોલ ટ્રાયફોસ્ફેટ (IP3)", "C) ગ્વાનિલેટ સાયક્લેઝ", "D) પ્રોસ્ટાગ્લેન્ડિન E2"], "correct": 1, "explanation": "માસ્ટ કોષની સપાટી પર IgE એન્ટીબોડી સાથે એલર્જેન બંધાય પછી, FcεRI રિસેપ્ટર સક્રિય થાય છે, જે ઇનોસિટોલ ટ્રાયફોસ્ફેટ (IP3) અને ડાયએસિલગ્લિસરોલ (DAG) ઉત્પન્ન કરે છે. IP3 કોષના અંતર્ગત કેલ્શિયમ સ્ટોરેજમાંથી કેલ્શિયમ આયન મુક્ત કરે છે, જે કોષમાં કેલ્શિયમ સાંદ્રતા વધારે છે અને ડીગ્રેન્યુલેશન તરફ દોરી જાય છે. cAMP, ગ્વાનિલેટ સાયક્લેઝ, અને પ્રોસ્ટાગ્લેન્ડિન E2 આ પ્રક્રિયામાં મુખ્ય ભૂમિકા ભજવતા નથી.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 8}, {"question": "કયા પ્રકારની અલર્જી પ્રતિક્રિયામાં, એન્ટીજન સીધા જ ટી-કોષ સાથે પ્રતિક્રિયા કરે છે અને 48-72 કલાક પછી લક્ષણો દેખાય છે, જેને ડિલેય્ડ-ટાઈપ હાઇપરસેન્સિટિવિટી કહેવાય છે?", "options": ["A) ટાઈપ I હાઇપરસેન્સિટિવિટી", "B) ટાઈપ II હાઇપરસેન્સિટિવિટી", "C) ટાઈપ III હાઇપરસેન્સિટિવિટી", "D) ટાઈપ IV હાઇપરસેન્સિટિવિટી"], "correct": 3, "explanation": "ટાઈપ IV હાઇપરસેન્સિટિવિટી (ડિલેય્ડ-ટાઈપ) પ્રતિક્રિયામાં, એન્ટીજન સીધા જ ટી-કોષ સાથે પ્રતિક્રિયા કરે છે, જેના કારણે સક્રિય ટી-કોષો સાયટોકાઇન મુક્ત કરે છે અને મેક્રોફેજને આકર્ષે છે. આ પ્રક્રિયા 48-72 કલાક લે છે અને લક્ષણો દેખાય છે. ટાઈપ I, II, અને III હાઇપરસેન્સિટિવિટી પ્રતિક્રિયાઓ એન્ટીબોડી-મેડિયેટેડ હોય છે અને તાત્કાલિક અથવા કેટલાક કલાકોમાં લક્ષણો દેખાય છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 9}, {"question": "અલર્જી પ્રતિક્રિયા દરમિયાન, જ્યારે IgE એન્ટીબોડી એલર્જેન સાથે જોડાય છે, ત્યારે માસ્ટ કોષમાં કયા અણુની ભૂમિકા માસ્ટ કોષની ડિગ્રેન્યુલેશન પ્રક્રિયાને રોકવામાં આવે છે, પરંતુ કોષીય સંકેતન (સિગ્નલિંગ) વ્યવસ્થામાં સક્રિય ભાગ ભજવે છે?", "options": ["A) હિસ્ટામિન", "B) સાયક્લિક એમપી (cAMP)", "C) ઇન્ટરલ્યુકિન-4 (IL-4)", "D) ટ્રિપ્ટેસ"], "correct": 1, "explanation": "સાયક્લિક એમપી (cAMP) માસ્ટ કોષની ડિગ્રેન્યુલેશન પ્રક્રિયાને રોકવામાં મહત્વની ભૂમિકા ભજવે છે. IgE એન્ટીબોડી એલર્જેન સાથે જોડાયા પછી, માસ્ટ કોષમાં cAMPનું સ્તર ઘટે છે, જે ડિગ્રેન્યુલેશનને પ્રોત્સાહન આપે છે. જ્યારે cAMPનું સ્તર ઊંચું હોય છે, ત્યારે તે ડિગ્રેન્યુલેશનને રોકે છે. હિસ્ટામિન (A) માસ્ટ કોષમાંથી મુક્ત થતો પદાર્થ છે, જે અલર્જી પ્રતિક્રિયાને વધારે છે. ઇન્ટરલ્યુકિન-4 (C) એક સાયટોકાઇન છે, જે Th2 કોષો દ્વારા મુક્ત થાય છે અને IgE ઉત્પાદનને પ્રોત્સાહન આપે છે. ટ્રિપ્ટેસ (D) એક પ્રોટીએઝ ઉત્સેચક છે, જે માસ્ટ કોષમાંથી મુક્ત થાય છે અને પેશીના નુકસાનમાં ભાગ લે છે.", "ncert_ref": "Class XII - Chapter 10: માનવ તંત્ર - પ્રતિરક્ષાતંત્ર", "difficulty": "Hard", "num": 10}, {"question": "ટાઈપ IV હાઇપરસેન્સિટિવિટી પ્રતિક્રિયામાં, એલર્જેન સાથે સંપર્ક પછી કયા કોષો દ્વારા સાયટોકાઇનનું સ્રાવ થાય છે, જે માયકોબેક્ટીરિયમ ટ્યુબ lanation": "ટાઈપ III હાઇપરસેન્સિટિવિટી પ્રતિક્રિયામાં, એન્ટીજન-એન્ટીબોડી કોમ્પ્લેક્સ રક્તવાહિનીઓમાં જમા થવાથી સોજો, રક્તસ્રાવ અને નેક્રોસિસ જેવા લક્ષણો દેખાય છે. A) તાત્કાલિક એનાફિલેક્સિસ ટાઈપ I પ્રતિક્રિયાનું લક્ષણ છે. C) કોષીય ઇમ્યુનિટી ટાઈપ IV પ્રતિક્રિયા સાથે સંબંધિત છે. D) ત્વચા પર એરિથેમા અને ખંજવાળ ટાઈપ I અથવા ટાઈપ IV પ્રતિક્રિયા સાથે સંબંધિત હોઈ શકે છે, પરંતુ તે ટાઈપ IIIનું મુખ્ય લક્ષણ નથી.", "ncert_ref": "Class XII - Chapter 8: મનુષ્યમાં રોગપ્રતિકારકતા", "difficulty": "Hard", "num": 15}, {"question": "ટાઈપ I હાઇપરસેન્સિટિવિટી પ્રતિક્રિયામાં, એલર્જેનની દ્વિતીય એક્સપોઝર દરમિયાન નીચેનામાંથી કયા કોષો દ્વારા હિસ્ટામિનનું સ્રાવ સૌથી વધુ પ્રેરિત થાય છે?", "options": ["A) બી-લિમ્ફોસાઇટ્સ", "B) માસ્ટ કોષ અને બેસોફિલ્સ", "C) સાયટોટોક્સિક ટી-કોષ", "D) ન્યૂટ્રોફિલ્સ"], "correct": 1, "explanation": "ટાઈપ I હાઇપરસેન્સિટિવિટી (અલર્જી) પ્રતિક્રિયામાં, એલર્જેનની દ્વિતીય એક્સપોઝર દરમિયાન IgE એન્ટીબોડી એલર્જેન સાથે જોડાઈને માસ્ટ કોષ અને બેસોફિલ્સની સક્રિયતા પ્રેરે છે, જે હિસ્ટામિન જેવા વાસોએક્ટિવ પદાર્થોનું સ્રાવ કરે છે. બી-લિમ્ફોસાઇટ્સ એન્ટીબોડી ઉત્પન્ન કરે છે પરંતુ હિસ્ટામિન સ્રાવતાં નથી. સાયટોટોક્સિક ટી-કોષ ટાઈપ IV પ્રતિક્રિયામાં ભાગ લે છે, જ્યારે ન્યૂટ્રોફિલ્સ ફેગોસાઇટોસિસમાં ભાગ લે છે. આમ, બી અને ડી વિકલ્પો અયોગ્ય છે, જ્યારે સી ટાઈપ IV સાથે સંબંધિત છે.", "ncert_ref": "Class XII - Chapter 10: માનવ તંત્ર - પ્રતિરક્ષાતંત્ર", "difficulty": "Hard", "num": 16}, {"question": "નીચેનામાંથી કયું એલર્જી પ્રતિક્રિયાનું ઉદાહરણ નથી, જ્યાં એન્ટીબોડી-મેડિયેટેડ કોષીય નુકસાન થાય છે?", "options": ["A) માયાસ્થેનિયા ગ્રેવિસ", "B) રહીમેટોઇડ આર્થરાઇટિસ", "C) એનાફિલેક્સિસ", "D) ગુડપાસ્ચર સિન્ડ્રોમ"], "correct": 2, "explanation": "માયાસ્થેનિયા ગ્રેવિસ (એન્ટી-એસીટાઇલકોલિન રિસેપ્ટર એન્ટીબોડી), રહીમેટોઇડ આર્થરાઇટિસ (એન્ટી-IgG એન્ટીબોડી), અને ગુડપાસ્ચર સિન્ડ્રોમ (એન્ટી-ગ્લોમેરુલર બેઝમેન્ટ મેમ્બ્રેન એન્ટીબોડી) એ બધા ટાઈપ II હાઇપરસેન્સિટિવિટીના ઉદાહરણો છે, જ્યાં એન્ટીબોડી-મેડિયેટેડ કોષીય નુકસાન થાય છે. એનાફિલેક્સિસ ટાઈપ I હાઇપરસેન્સિટિવિટીનું ઉદાહરણ છે, જ્યાં IgE-મેડિયેટેડ માસ્ટ કોષ સક્રિયતા થાય છે, આ         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
