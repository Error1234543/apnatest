<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - જૈવિક ખાતરો</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 જૈવિક ખાતરો</span>
                <span>🎯 Hard</span>
                <span>📝 34 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "નીચેનામાંથી કયું જૈવિક ખાતર નાઇટ્રોજન સ્થિરીકરણ માટે જવાબદાર નથી, પરંતુ ફોસ્ફરસના ઉત્ક્રમણમાં મદદ કરે છે?", "options": ["A) રાઇઝોબિયમ", "B) એઝોટોબેક્ટર", "C) ફોસ્ફોરસ સોલ્યુબિલાઇઝિંગ બેક્ટેરિયા (PSB)", "D) એઝોસ્પિરિલમ"], "correct": 2, "explanation": "ફોસ્ફોરસ સોલ્યુબિલાઇઝિંગ બેક્ટેરિયા (PSB) ફોસ્ફરસના અદ્રાવ્ય સ્વરૂપને દ્રાવ્ય બનાવવામાં મદદ કરે છે, જ્યારે રાઇઝોબિયમ, એઝોટોબેક્ટર અને એઝોસ્પિરિલમ નાઇટ્રોજન સ્થિરીકરણ માટે જવાબદાર છે. રાઇઝોબિયમ અને એઝોસ્પિરિલમ સહજીવી છે, એઝોટોબેક્ટર મુક્ત-જીવી છે, પરંતુ તમામ નાઇટ્રોજન સ્થિરીકરણ સાથે સંકળાયેલા છે.", "ncert_ref": "Class XII - Chapter 10: માનવ કલ્યાણ માટે સૂક્ષ્મજીવો", "difficulty": "Hard", "num": 1}, {"question": "જૈવિક ખાતર તરીકે વપરાતા સાયનોબેક્ટરિયાની કઈ જાત મોટા અનાજના પાક માટે અત્યંત ઉપયોગી છે?", "options": ["A) નોસ્ટોક", "B) એનાબીના", "C) ટોલિપોથ્રિક્સ", "D) એસ્પિરિલા"], "correct": 1, "explanation": "એનાબીના સાયનોબેક્ટરિયાની જાત મોટા અનાજ (જેવા કે જુવાર, બાજરી) માટે અત્યંત ઉપયોગી છે કારણ કે તે નાઇટ્રોજન સ્થિરીકરણ કરે છે અને શુષ્ક પ્રદેશોમાં વૃદ્ધિને પ્રોત્સાહન આપે છે. નોસ્ટોક અને ટોલિપોથ્રિક્સ ચાવલના પાક માટે ઉપયોગી છે, જ્યારે એસ્પિરિલા મકાઈ અને ગહું માટે ઉપયોગી છે.", "ncert_ref": "Class XII - Chapter 10: માનવ કલ્યાણ માટે સૂક્ષ્મજીવો", "difficulty": "Hard", "num": 2}, {"question": "નીચેનામાંથી કયું વિધાન જૈવિક ખાતરો વિશે ખોટું છે?", "options": ["A) જૈવિક ખાતરો મૃદાના સ્વાસ્થ્યમાં સુધારો કરે છે અને જૈવિક પદાર્થોનું પ્રમાણ વધારે છે.", "B) જૈવિક ખાતરો રાસાયણિક ખાતરો કરતાં ઝડપથી અસર કરે છે.", "C) જૈવિક ખાતરો પર્યાવરણને મિત્રતાપૂર્ણ છે અને પ્રદૂષણ ઘટાડે છે.", "D) જૈવિક ખાતરો મૃદામાં સૂક્ષ્મજીવોની સક્રિયતા વધારે છે."], "correct": 1, "explanation": "જૈવિક ખાતરો રાસાયણિક ખાતરો કરતાં ધીમે ધીમે અસર કરે છે કારણ કે તેઓ સૂક્ષ્મજીવોની ક્રિયાશીલતા પર આધાર રાખે છે. બાકીના તમામ વિધાનો સાચા છે: જૈવિક ખાતરો મૃદાના સ્વાસ્થ્યમાં સુધારો કરે છે, પર્યાવરણને મિત્રતાપૂર્ણ છે અને સૂક્ષ્મજીવોની સક્રિયતા વધારે છે.", "ncert_ref": "Class XII - Chapter 10: માનવ કલ્યાણ માટે સૂક્ષ્મજીવો", "difficulty": "Hard", "num": 3}, {"question": "કયું જૈવિક ખાતર મૃદામાં પોટેશિયમની ઉપલબ્ધતા વધારવામાં મદદ કરે છે?", "options": ["A) બેસિલસ મેગેટેરિયમ", "B) ફ્રાન્કિયા", "C) બેસિલસ સર્ક્યુલન્સ", "D) ટ્રાઇકોડર્મા"], "correct": 0, "explanation": "બેસિલસ મેગેટેરિયમ પોટેશિયમ સોલ્યુબિલાઇઝિંગ બેક્ટેરિયા છે, જે મૃદામાં પોટેશિયમની ઉપલબ્ધતા વધારવામાં મદદ કરે છે. ફ્રાન્કિયા નાઇટ્રોજન સ્થિરીકરણ માટે જવાબદાર છે, બેસિલસ સર્ક્યુલન્સ ફોસ્ફરસ સોલ્યુબિલાઇઝિંગ છે, અને ટ્રાઇકોડર્મા કવકનાશક તરીકે કામ કરે છે.", "ncert_ref": "Class XII - Chapter 10: માનવ કલ્યાણ માટે સૂક્ષ્મજીવો", "difficulty": "Hard", "num": 4}, {"question": "નીચેનામાંથી કયું જૈવિક ખાતર કવક છે અને તે મૃદામાં ફોસ્ફરસ અને અન્ય પોષક તત્ત્વોની ઉપલબ્ધતા વધારવામાં મદદ કરે છે?", "options": ["A) એઝોટોબેક્ટર", "B) રાઇઝોબિયમ", "C) માયકોરાઇઝા", "D) એઝોસ્પિરિલમ"], "correct": 2, "explanation": "માયકોરાઇઝા એક કવક છે જે વનસ્પતિના મૂળ સાથે સહજીવી સંબંધ બનાવે છે અને મૃદામાં ફોસ્ફરસ અને અન્ય પોષક તત્ત્વોની ઉપલબ્ધતા વધારવામાં મદદ કરે છે. એઝોટોબેક્ટર, રાઇઝોબિયમ અને એઝોસ્પિરિલમ બધા બેક્ટેરિયા છે અને નાઇટ્રોજન સ્થિરીકરણ સાથે સંકળાયેલા છે.", "ncert_ref": "Class XII - Chapter 10: માનવ કલ્યાણ માટે સૂક્ષ્મજીવો", "difficulty": "Hard", "num": 5}, {"question": "નીચેનામાંથી કયું જૈવિક ખાતર મૃદામાં સલ્ફરના ચક્રને સક્રિય કરવામાં મહત્વની ભૂમિકા ભજવે છે, પરંતુ તેનો ઉપયોગ નાઇટ્રોજન સ્થિરીકરણ માટે થતો નથી?", "options": ["A) રાઇઝોબિયમ", "B) એઝોટોબેક્ટર", "C) થાયોબેસિલસ", "D) એઝોસ્પિરિલમ"], "correct": 2, "explanation": "થાયોબેસિલસ (Thiobacillus) એક બેક્ટેરિયા છે જે સલ્ફરના ઓક્સીડેશનમાં મદદ કરે છે, જેથી મૃદામાં સલ્ફરનું ચક્ર સક્રિય રહે. રાઇઝોબિયમ, એઝોટોબેક્ટર અને એઝોસ્પિરિલમ નાઇટ્રોજન સ્થિરીકરણ સાથે સંકળાયેલા છે, પરંતુ થાયોબેસિલસ નાઇટ્રોજન સ્થિરીકરણ સાથે સંકળાયેલું નથી.", "ncert_ref": "Class XII - Chapter 10: માનવ કલ્યાણ માટે સૂક્ષ્મજીવો", "difficulty": "Hard", "num": 6}, {"question": "જૈવિક ખાતર તરીકે વપરાતા કયા સૂક્ષ્મજીવ દ્વારા મૃદામાં ફોસ્ફરસના અવશોષણને રોકવા માટે ફોસ્ફેટ સોલ્યુબિલાઇઝિંગ બેક્ટેરિયા (PSB) તરીકે ઓળખાય છે?", "options": ["A) બેસિલસ મેગેટેરિયમ", "B) પ્સ્યુડોમોના ેનામાંથી કયું જૈવિક ખાતર મૃદામાં ક્લોરોફિલના સંશ્લેષણને પ્રોત્સાહન આપે છે અને પાકની વૃદ્ધિને સુધારે છે, પરંતુ તે નાઇટ્રોજન સ્થિરીકરણ સાથે સંકળાયેલું નથી?", "options": ["A) એનાબીના", "B) નોસ્ટોક", "C) એઝોટોબેક્ટર", "D) રાઇઝોબિયમ"], "correct": 0, "explanation": "એનાબીના (Anabaena) એક સાયનોબેક્ટેરિયા છે જે નાઇટ્રોજન સ્થિરીકરણ કરે છે, પરંતુ તે ક્લોરોફિલના સંશ્લેષણને પ્રોત્સાહન આપે છે અને પાકની વૃદ્ધિને સુધારે છે. નોસ્ટોક પણ નાઇટ્રોજન સ્થિરીકરણ કરે છે, પરંતુ એનાબીના વધુ સામાન્ય રીતે ક્લોરોફિલ સંશ્લેષણ સાથે સંકળાયેલું છે. એઝોટોબેક્ટર અને રાઇઝોબિયમ નાઇટ્રોજન સ્થિરીકરણ સાથે સંકળાયેલા છે, પરંતુ ક્લોરોફિલ સંશ્લેષણ સાથે નહીં.", "ncert_ref": "Class XII - Chapter 10: માનવ કલ્યાણ માટે સૂક્ષ્મજીવો", "difficulty": "Hard", "num": 10}, {"question": "નીચેનામાંથી કયું જૈવિક ખાતર મૃદામાં નાઇટ્રોજન સ્થિરીકરણ કરતું નથી, પરંતુ તેના ઉત્પાદન દરમિયાન બાયોગેસ તરીકે મિથેન વાયુ ઉત્પન્ન કરે છે?", "options": ["A) રાઇઝોબિયમ", "B) એઝોટોબેક્ટર", "C) એઝોસ્પાઇરિલમ", "D) મિથાઇલોટ્રોફિક બેક્ટરિયા"], "correct": 3, "explanation": "મિથાઇલોટ્રોફિક બેક્ટરિયા (D) મિથેન વાયુનો ઉપયોગ કરે છે અને બાયોગેસ ઉત્પાદન દરમિયાન મિથેન ઉત્પન્ન કરે છે, પરંતુ તે નાઇટ્રોજન સ્થિરીકરણ કરતું નથી. રાઇઝોબિયમ (A), એઝોટોબેક્ટર (B), અને એઝોસ્પાઇરિલમ (C) બધા નાઇટ્રોજન સ્થિરીકરણ કરતા સૂક્ષ્મજીવો છે.", "ncert_ref": "Class XII - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "difficulty": "Hard", "num": 11}, {"question": "નીચેનામાંથી કયું જૈવિક ખાતર મૃદામાં પોટેશિયમ અને ફોસ્ફરસની ઉપલબ્ધતા વધારવા માટે કવક અને બેક્ટરિયાના સહજીવન દ્વારા કાર્ય કરે છે?", "options": ["A) એઝોટોબેક્ટર", "B) બેસિલસ", "C) માયકોરાઇઝા", "D) રાઇઝોબિયમ"], "correct": 2, "explanation": "માયકોરાઇઝા (C) કવક અને પ્લાન્ટ રૂટ્સ વચ્ચેનું સહજીવન છે જે મૃદામાં પોટેશિયમ અને ફોસ્ફરસની ઉપલબ્ધતા વધારવામાં મદદ કરે છે. એઝોટોબેક્ટર (A) અને બેસિલસ (B) બેક્ટરિયા છે જે નાઇટ્રોજન સ્થિરીકરણ કરે છે, જ્યારે રાઇઝોબિયમ (D) નાઇટ્રોજન સ્થિરીકરણ કરે છે પરંતુ પોટેશિયમ અને ફોસ્ફરસની ઉપલબ્ધતા વધારવામાં મદદ કરતું નથી.", "ncert_ref": "Class XII - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "difficulty": "Hard", "num": 12}, {"question": "જો એક ખેડૂત તેના ખેતરમાં મકાઈના પાક માટે જૈવિક ખાતર તરીકે વાપરવા માંગે છે, તો તેને કયું જૈવિક ખાતર પસંદ કરવું જોઈએ જે નાઇટ્રોજન સ્થિરીકરણ સાથે સાથે મૃદામાં ફોસ્ફરસ અને પોટેશિયમની ઉપલબ્ધતા પણ વધારે છે?", "options": ["A) એઝોટોબેક્ટર", "B) એઝોસ્પિરિલમ", "C) બેસિલસ મેગેટેરિયમ", "D) ટ્રાઇકોડર્મા"], "correct": 1, "explanation": "એઝોસ્પિરિલમ મકાઈ જેવા અનાજના પાક માટે નાઇટ્રોજન સ્થિરીકરણ કરે છે અને મૃદામાં ફોસ્ફરસ અને પોટેશિયમની ઉપલબ્ધતા પણ વધારે છે. એઝોટોબેક્ટર ફક્ત હ્યુમિક એસિડનું ઉત્પાદન કરે છે, બેસિલસ મેગેટેરિયમ ફોસ્ફરસના ઉત્ક્રમણમાં મદદ કરે છે, અને ટ્રાઇકોડર્મા ફક્ત ફોસ્ફરસ અને પોટેશિયમની ઉપલબ્ધતા વધારે છે.", "ncert_ref": "Class XII - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "difficulty": "Hard", "num": 13}, {"question": "મકાઈના પાક માટે જૈવિક ખાતર તરીકે વાપરવામાં આવતી 'એઝોટોબેક્ટર' જાતિઓમાં કયું લક્ષણ અસાધારણ છે, જે તેને અન્ય નાઇટ્રોજન-સ્થિરીકરણ કરનારા સૂક્ષ્મજીવોથી અલગ પાડે છે?", "options": ["A) તે મૃદામાં મુક્ત નાઇટ્રોજન વાયુને સીધું નાઇટ્રેટમાં રૂપાંતરિત કરે છે", "B) તે પાકના મૂળ પર ગાંઠો (નોડ્યુલ્સ) બનાવીને નાઇટ્રોજન સ્થિરીકરણ કરે છે", "C) તે મૃદામાં અકાર્બનિક નાઇટ્રોજનના સ્વરૂપોને અવશોષણયોગ્ય બનાવે છે, પરંતુ વાતાવરણીય નાઇટ્રોજનનું સ્થિરીકરણ કરતું નથી", "D) તે ફક્ત એસિડિક મૃદામાં જ નાઇટ્રોજન સ્થિરીકરણ કરે છે"], "correct": 2, "explanation": "એઝોટોબેક્ટર એ મુક્ત-જીવંત નાઇટ્રોજન-સ્થિરીકરણ કરનાર બેક્ટેરિયા છે, પરંતુ તે વાતાવરણીય નાઇટ્રોજન (N₂) નું સ્થિરીકરણ કરતું નથી. તે મૃદામાં ઉપલબ્ધ અકાર્બનિક નાઇટ્રોજનના સ્વરૂપો (જેમ કે નાઇટ્રેટ, નાઇટ્રાઇટ) ને પાક માટે અવશોષણયોગ્ય બનાવે છે. વિકલ્પ A ખોટો છે કારણ કે એઝોટોબેક્ટર વાતાવરણીય N₂ નું સ્થિરીકરણ કરતું નથી. વિકલ્પ B ખોટો છે કારણ કે ગાંઠો બનાવવી એ રાઇઝોબિયમ જેવા સહજીવી બેક્ટેરિયાનું લક્ષણ છે. વિકલ્પ D ખોટો છે કારણ કે એઝોટોબેક્ટર વિવિધ પ્રકારની મૃદામાં (એસિડિક, ક્ષારીય, તટસ્થ) કામ કરે છે.", "ncert_ref": "Class XII - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "difficulty": "Hard", "num": 14}, {"question": "જૈવિક ખાતર તરીકે વાપરાતા 'માયકોરાઇઝા' વિશે નીચેનામાંથી કયું વિધાન સાચું છે, પરંતુ તેની કાર્યપદ ૃદાનું pH 5.0 થી ઓછું હોવું", "D) મૃદામાં મોલિબ્ડેનમની અભાવ"], "correct": 3, "explanation": "સાચો જવાબ D છે. 'રાઇઝોબિયમ' દ્વારા નાઇટ્રોજન સ્થિરીકરણ માટે મોલિબ્ડેનમ એ નિશ્ચિત ઉત્સેચક (નાઇટ્રોજનેઝ) માટે આવશ્યક સહ-પરિબળ છે. મોલિબ્ડેનમની અભાવે નાઇટ્રોજનેઝ ઉત્સેચકની ક્રિયા અવરોધાય છે, જેથી નાઇટ્રોજન સ્થિરીકરણની પ્રક્રિયા ખોરવાય છે. A) ફોસ્ફરસની ઉચ્ચ સાંદ્રતા નાઇટ્રોજન સ્થિરીકરણને પ્રોત્સાહન આપે છે, પરંતુ તે સૌથી મહત્વનું પરિબળ નથી. B) કાર્બનિક પદાર્થની ઓછી ઉપલબ્ધતા પણ અસર કરે છે, પરંતુ તે મોલિબ્ડેનમ જેટલું નિર્ણાયક નથી. C) pH 5.0 થી ઓછું (અતિ આમ્લીય) હોવું રાઇઝોબિયમના વૃદ્ધિને અવરોધે છે, પરંતુ મોલિબ્ડેનમની અભાવ કરતાં ઓછું પ્રભાવશાળી છે.", "ncert_ref": "Class XII - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "difficulty": "Hard", "num": 20}, {"question": "મગફળીના પાક સાથે સંકળાયેલા 'રાઇઝોબિયમ' જૈવિક ખાતર વિશે નીચેનામાંથી કયું વિધાન સાચું છે, પરંતુ તેની અસરકારકતા પર મૃદાના pH ની અસર વિશે ખોટું છે?", "options": ["A) રાઇઝોબિયમ મગફળીની મૂળગુંઠમાં રહે છે અને વાતાવરણીય નાઇટ્રોજનને સ્થિરીકરણ કરે છે, પરંતુ અમ્લીય મૃદામાં (pH < 5.5) તેની કાર્યક્ષમતા ઘટે છે.", "B) રાઇઝોબિયમ દ્વારા નાઇટ્રોજન સ્થિરીકરણ માટે મૃદામાં મોલિબ્ડેનમની ઉપસ્થિતિ જરૂરી છે, પરંતુ ક્ષારીય મૃદામાં તેની કાર્યક્ષમતા વધે છે.", "C) રાઇઝોબિયમ મગફળી સાથે સહજીવી સંબંધ ધરાવે છે અને નાઇટ્રોજન સ્થિરીકરણ કરે છે, પરંતુ મૃદાના pH ની અસર તેના પર થતી નથી.", "D) રાઇઝોબિયમ દ્વારા નાઇટ્રોજન સ્થિરીકરણ માટે મૃદામાં કાર્બનિક પદાર્થોની ઉપસ્થિતિ જરૂરી છે, પરંતુ અતિ અમ્લીય મૃદામાં તે નિષ્ક્રિય બને છે."], "correct": 2, "explanation": "વિકલ્પ C સાચું છે કે રાઇઝોબિયમ મગફળી સાથે સહજીવી સંબંધ ધરાવે છે અને નાઇટ્રોજન સ્થિરીકરણ કરે છે, પરંતુ તે ખોટું છે કે મૃદાના pH ની અસર તેના પર થતી નથી. વાસ્તવમાં, રાઇઝોબિયમની કાર્યક્ષમતા મૃદાના pH પર નિર્ભર રહે છે – અમ્લીય મૃદામાં (pH < 5.5) તેની કાર્યક્ષમતા ઘટે છે, જ્યારે તટસ્થ અથવા હલકા ક્ષારીય મૃદામાં તે સારી રીતે કામ કરે છે. વિકલ્પ A, B, અને D સાચા છે કારણ કે તે મૃદાના pH ની અસરને યોગ્ય રીતે વર્ણવે છે.", "ncert_ref": "Class XII - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "difficulty": "Hard", "num": 21}, {"question": "નીચેનામાંથી કયું જૈવિક ખાતર મૃદામાં ફોસ્ફરસના સ્થિરીકરણને રોકવા અને તેની ઉપલબ્ધતા વધારવા માટે જવાબદાર છે, પરંતુ તે કવક નથી?", "options": ["A) માયકોરાઇઝા", "B) એઝોટોબેક્ટર", "C) બેસિલસ મેગેટેરિયમ", "D) પેનિસિલિયમ"], "correct": 2, "explanation": "બેસિલસ મેગેટેરિયમ (Bacillus megaterium) એક જીવાણુ છે જે મૃદામાં ફોસ્ફરસના સ્થિરીકરણને રોકે છે અને તેની ઉપલબ્ધતા વધારે છે. માયકોરાઇઝા (A) અને પેનિસિલિયમ (D) કવક છે, જ્યારે એઝોટોબેક્ટર (B) નાઇટ્રોજન સ્થિરીકરણ માટે જવાબદાર છે, પરંતુ ફોસ્ફરસના સ્થિરીકરણમાં મહત્વની ભૂમિકા ભજવતું નથી.", "ncert_ref": "Class XII - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "difficulty": "Hard", "num": 22}, {"question": "એક ખેડૂતે તેના ખેતરમાં ગહુંના પાક માટે 'રાઇઝોબિયમ' અને 'એઝોટોબેક્ટર' જૈવિક ખાતરોનો ઉપયોગ કર્યો. નીચેનામાંથી કયું વિધાન આ સંયોજન વિશે સાચું નથી?", "options": ["A) રાઇઝોબિયમ ગહુંની મૂળગુંઠમાં રહીને નાઇટ્રોજન સ્થિરીકરણ કરશે, જ્યારે એઝોટોબેક્ટર મૃદામાં મુક્ત રીતે રહીને નાઇટ્રોજન સ્થિરીકરણ કરશે.", "B) એઝોટોબેક્ટર ગહુંના પાક માટે ફોસ્ફરસની ઉપલબ્ધતા વધારશે, જ્યારે રાઇઝોબિયમ નાઇટ્રોજન પૂરું પાડશે.", "C) રાઇઝોબિયમ અને એઝોટોબેક્ટર બંને ગહુંના પાક માટે નાઇટ્રોજન સ્થિરીકરણ કરશે, પરંતુ એઝોટોબેક્ટરની કાર્યક્ષમતા રાઇઝોબિયમ કરતાં ઓછી હશે.", "D) રાઇઝોબિયમ ગહુંની મૂળગુંઠમાં રહીને નાઇટ્રોજન સ્થિરીકરણ કરશે, પરંતુ એઝોટોબેક્ટર ગહુંના પાક સાથે સહજીવી સંબંધ ધરાવતું નથી."], "correct": 1, "explanation": "વિકલ્પ B ખોટો છે કારણ કે એઝોટોબેક્ટર મુખ્યત્વે નાઇટ્રોજન સ્થિરીકરણ માટે જવાબદાર છે, ફોસ્ફરસની ઉપલબ્ધતા વધારવા માટે નહીં. રાઇઝોબિયમ ગહુંની મૂળગુંઠમાં રહીને નાઇટ્રોજન સ્થિરીકરણ કરે છે, જ્યારે એઝોટોબેક્ટર મૃદામાં મુક્ત રીતે રહીને નાઇટ્રોજન સ્થિરીકરણ કરે છે. વિકલ્પ A, C, અને D સાચા છે.", "ncert_ref": "Class XII - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "difficulty": "Hard", "num": 23}, {"question": "નીચેનામાંથી કયું જૈવિક ખાતર મૃદામાં પોટેશિયમની ઉપલબ્ધતા વધારવામાં મદદ કરે છે, પરંતુ તે કવક નથી અને નાઇટ્રોજન સ્થિરીકરણ પણ કરતું નથી?", "options": ["A) માયકોરાઇઝા", "B) બેસિલસ સબ્ટિલિસ", "C) એઝોટોબેક્ટર", "D) રાઇઝોબિયમ"], "correct": 1, "explanation": "બેસિલસ સબ્ટિલિસ (Bacillus subtilis) એક જીવાણુ છે જે મૃદામાં પોટેશિયમની ઉપલબ્ધતા વધારવામાં મદદ કરે છે. માયકોરાઇઝા (A) એક કવક છે, એઝોટોબેક્ટર (C) અને રાઇઝોબિયમ (D) નાઇટ્રોજન સ્થિરીકરણ કરે છે. આમ, બેસિલસ સબ્ટિલિસ જ એવું જૈવિક ખાતર છે જે કવક નથી અને નાઇટ્રોજન સ્થિરીકરણ પણ કરતું નથી.", "ncert_ref": "Class XII - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "difficulty": "Hard", "num": 24}, {"question": "મગફળીના પાકમાં 'રાઇઝોબિયમ' જૈવિક ખાતરનો ઉપયોગ કરતી વખતે, નીચેનામાંથી કયું પરિણામ અપેક્ષિત નથી, જ્યારે મૃદામાં પોષક તત્વોની ઉપલબ્ધતા અને સહજીવનની દ્રષ્ટિએ વિચાર કરવામાં આવે?", "options": ["A) મૃદામાં નાઇટ્રોજનનું સ્થિરીકરણ વધશે, કારણ કે રાઇઝોબિયમ મગફળીના મૂળમાં ગાંઠો બનાવે છે", "B) મૃદામાં ફોસ્ફરસની ઉપલબ્ધતા ઘટશે, કારણ કે રાઇઝોબિયમ ફોસ્ફરસના અવશોષણને રોકે છે", "C) મગફળીના પાકની વૃદ્ધિ અને ઉત્પાદનમાં વધારો થશે, કારણ કે નાઇટ્રોજનનું સ્થિરીકરણ વધશે", "D) મૃદામાં સૂક્ષ્મજીવી ક્રિયાશીલતા વધશે, કારણ કે રાઇઝોબિયમ મૃદાના સૂક્ષ્મજીવી પરિસરને સુધારે છે"], "correct": 1, "explanation": "રાઇઝોબિયમ મગફળીના મૂળમાં ગાંઠો બનાવીને નાઇટ્રોજનનું સ્થિરીકરણ કરે છે, જે મૃદામાં નાઇટ્રોજનની ઉપલબ્ધતા વધારે છે (A સાચું). મગફળીની વૃદ્ધિ અને ઉત્પાદનમાં વધારો થવો એ સ્વાભાવિક છે (C સાચું). રાઇઝોબિયમ મૃદામાં સૂક્ષ્મજીવી ક્રિયાશીલતા વધારે છે, કારણ કે તે મૃદાના સૂક્ષ્મજીવી પરિસરને સુધારે છે (D સાચું). પરંતુ રાઇઝોબિયમ ફોસ્ફરસના અવશોષણને રોકતું નથી, ઉલટાનું તે ફોસ્ફરસની ઉપલબ્ધતા વધારવામાં મદદ કરે છે, તેથી B ખોટું છે.", "ncert_ref": "Class XII - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "difficulty": "Hard", "num": 25}, {"question": "મગફળીના પાકમાં 'રાઇઝોબિયમ' જૈવિક ખાતરનો ઉપયોગ કરતી વખતે, મૃદામાં નાઇટ્રોજન સ્થિરીકરણની ક્રિયા માટે નીચેનામાંથી કયું પરિબળ અત્યંત મહત્વપૂર્ણ છે, પરંતુ તેનો સીધો સંબંધ પાકની જડોની લંબાઈ સાથે નથી?", "options": ["A) મૃદામાં ઓક્સિજનની ઉપલબ્ધતા", "B) મૃદામાં કાર્બનિક પદાર્થોની માત્રા", "C) મૃદાનું pH સ્તર (6.0-7.0)", "D) મૃદામાં ફોસ્ફરસની ઉપલબ્ધતા"], "correct": 1, "explanation": "'રાઇઝોબિયમ' દ્વારા નાઇટ્રોજન સ્થિરીકરણ માટે મૃદામાં કાર્બનિક પદાર્થોની ઉપલબ્ધતા અત્યંત મહત્વપૂર્ણ છે, કારણ કે તે સૂક્ષ્મજીવોને ઉર્જા અને કાર્બનનો સ્રોત પૂરો પાડે છે. મૃદાનું pH સ્તર (6.0-7.0) અને ફોસ્ફરસની ઉપલબ્ધતા પણ મહત્વપૂર્ણ છે, પરંતુ તેનો સીધો સંબંધ જડોની લંબાઈ સાથે નથી. ઓક્સિજનની ઉપલબ્ધતા નાઇટ્રોજન સ્થિરીકરણ માટે હાનિકારક હોઈ શકે છે, કારણ કે 'રાઇઝોબિયમ' એનારોબિક પરિસ્થિતિમાં વધુ સક્રિય હોય છે.", "ncert_ref": "Class XII - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "difficulty": "Hard", "num": 26}, {"question": "નીચેનામાંથી કયું જૈવિક ખાતર મૃદામાં ફોસ્ફરસના અવશોષણને પ્રોત્સાહન આપે છે, પરંતુ તેના માટે જરૂરી ઉત્સેચક 'ફોસ્ફેટેઝ'નું ઉત્પાદન કરતું નથી?", "options": ["A) એઝોટોબેક્ટર", "B) બેસિલસ મેગાટેરિયમ", "C) પ્સ્યુડોમોનાસ સ્ટ્રાયટા", "D) માયકોરાઇઝા"], "correct": 3, "explanation": "'માયકોરાઇઝા' મૃદામાં ફોસ્ફરસના અવશોષણને પ્રોત્સાહન આપે છે, પરંતુ તે 'ફોસ્ફેટેઝ' ઉત્સેચકનું ઉત્પાદન કરતું નથી. તે પાકની જડો સાથે સહજીવન ધરાવે છે અને મૃદામાંથી ફોસ્ફરસના અવશોષણને સરળ બનાવે છે. 'એઝોટોબેક્ટર', 'બેસિલસ મેગાટેરિયમ' અને 'પ્સ્યુડોમોનાસ સ્ટ્રાયટા' એ ફોસ્ફરસના સ્થિરીકરણ અને 'ફોસ્ફેટેઝ' ઉત્સેચકના ઉત્પાદન માટે જાણીતા છે.", "ncert_ref": "Class XII - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "difficulty": "Hard", "num": 27}, {"question": "એક ખેડૂતે તેના ખેતરમાં ગહુંના પાક માટે 'રાઇઝોબિયમ' અને 'ફ્રાન્કિયા' જૈવિક ખાતરોનો ઉપયોગ કર્યો. નીચેનામાંથી કયું વિધાન આ બંને જૈવિક ખાતરો વિશે સાચું નથી?", "options": ["A) બંને નાઇટ્રોજન સ્થિરીકરણ કરે છે", "B) 'રાઇઝોબિયમ' લેગ્યુમિનેસ પાકો સાથે સહજીવન ધરાવે છે, જ્યારે 'ફ્રાન્કિયા' નોન-લેગ્યુમિનેસ પાકો સાથે સહજીવન ધરાવે છે", "C) બંને મૃદામાં ફોસ્ફરસની ઉપલબ્ધતા વધારવામાં મદદ કરે છે", "D) 'ફ્રાન્કિયા' એ કવક છે, જ્યારે 'રાઇઝોબિયમ' એ જીવાણુ છે"], "correct": 3, "explanation": "'રાઇઝોબિયમ' અને 'ફ્રાન્કિયા' બંને જીવાણુઓ છે અને નાઇટ્રોજન સ્થિરીકરણ કરે છે. 'રાઇઝોબિયમ' લેગ્યુમિનેસ પાકો સાથે સહજીવન ધરાવે છે, જ્યારે 'ફ્રાન્કિયા' નોન-લેગ્યુમિનેસ પાકો (જેમ કે એલ્ડર, કેસ્યુઅરિના) સાથે સહજીવન ધરાવે છે. બંને મૃદામાં ફોસ્ફરસની ઉપલબ્ધતા વધારવામાં મદદ કરે છે. પરંતુ 'ફ્રાન્કિયા' એ કવક નથી, તે જીવાણુ છે.", "ncert_ref": "Class XII - Chapter 10: સૂક્ષ્મજીવો અને માનવ કલ્યાણ", "difficulty": "             document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
