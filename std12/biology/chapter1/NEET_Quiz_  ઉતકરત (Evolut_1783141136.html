<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - 📖 ઉત્ક્રાંતિ (Evolution)
ઉત્ક્રાંતિના પુરાવા</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 📖 ઉત્ક્રાંતિ (Evolution)
ઉત્ક્રાંતિના પુરાવા</span>
                <span>🎯 Hard</span>
                <span>📝 70 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "નીચેના પૈકી કયો પુરાવો ઉત્ક્રાંતિના સૌથી પ્રાચીન અને પ્રત્યક્ષ પુરાવા તરીકે ગણવામાં આવે છે, જેમાં જીવાશ્મોની ઉંમર નક્કી કરવા માટે રેડિયોમેટ્રિક ડેટિંગ પદ્ધતિનો ઉપયોગ થાય છે?", "options": ["A) શરીરરચનાત્મક પુરાવા (Anatomical evidence)", "B) ભૂસ્તરશાસ્ત્રીય પુરાવા (Paleontological evidence)", "C) ભ્રૂણીય પુરાવા (Embryological evidence)", "D) જૈવરાસાયણિક પુરાવા (Biochemical evidence)"], "correct": 1, "explanation": "ભૂસ્તરશાસ્ત્રીય પુરાવા (B) ઉત્ક્રાંતિના સૌથી પ્રાચીન અને પ્રત્યક્ષ પુરાવા છે, કારણ કે જીવાશ્મો (fossils)ની ઉંમર રેડિયોમેટ્રિક ડેટિંગ દ્વારા નક્કી કરવામાં આવે છે. શરીરરચનાત્મક પુરાવા (A) હાડકાં અને અંગોની રચનાનું અભ્યાસ કરે છે, પરંતુ તે પ્રાચીનતાનું મૂલ્યાંકન કરતું નથી. ભ્રૂણીય પુરાવા (C) વિકાસની પ્રક્રિયાને દર્શાવે છે, પરંતુ તે પ્રાચીન જીવોના અવશેષો નથી. જૈવરાસાયણિક પુરાવા (D) DNA અને પ્રોટીનના અભ્યાસ પર આધારિત છે, પરંતુ તે જીવાશ્મો જેવા પ્રત્યક્ષ પુરાવા નથી.", "ncert_ref": "Class XII - પ્રકરણ 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 1}, {"question": "હોમોલોજી અને એનાલોજી વચ્ચેનો મુખ્ય તફાવત શું છે? નીચેના પૈકી કયું વિધાન સૌથી યોગ્ય રીતે વર્ણવે છે?", "options": ["A) હોમોલોજી સમાન કામગીરી ધરાવતા અંગોનો અભ્યાસ છે, જ્યારે એનાલોજી સમાન ઉત્પત્તિ ધરાવતા અંગોનો અભ્યાસ છે.", "B) હોમોલોજી સમાન ઉત્પત્તિ ધરાવતા અંગોનો અભ્યાસ છે, જ્યારે એનાલોજી સમાન કામગીરી ધરાવતા અંગોનો અભ્યાસ છે.", "C) હોમોલોજી અને એનાલોજી બંને સમાન ઉત્પત્તિ અને સમાન કામગીરી ધરાવતા અંગોનો અભ્યાસ કરે છે.", "D) હોમોલોજી અને એનાલોજી વચ્ચે કોઈ તફાવત નથી, બંને એજ અર્થ ધરાવે છે."], "correct": 1, "explanation": "હોમોલોજી (B) સમાન ઉત્પત્તિ ધરાવતા અંગોનો અભ્યાસ છે (ઉદા. માનવ હાથ અને વાઘના અગ્રપાદ), જ્યારે એનાલોજી સમાન કામગીરી ધરાવતા પરંતુ ભિન્ન ઉત્પત્તિ ધરાવતા અંગોનો અભ્યાસ છે (ઉદા. પક્ષીના પાંખ અને ચામચીડિયાના પાંખ). વિકલ્પ A ઉલટો છે, વિકલ્પ C અને D ખોટા છે કારણ કે બંને શબ્દોના અર્થ ભિન્ન છે.", "ncert_ref": "Class XII - પ્રકરણ 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 2}, {"question": "ડાર્વિનના ઉત્ક્રાંતિ સિદ્ધાંતમાં 'સર્વોત્તમની ઉત્ક્રાંતિ' (Survival of the fittest)નો સિદ્ધાંત કયા પુરાવા દ્વારા સૌથી વધુ સમર્થન મેળવે છે?", "options": ["A) જૈવ ભૌગોલિક પુરાવા (Biogeographical evidence)", "B) ભ્રૂણીય પુરાવા (Embryological evidence)", "C) શરીરરચનાત્મક પુરાવા (Anatomical evidence)", "D) જીવાશ્મ પુરાવા (Fossil evidence)"], "correct": 0, "explanation": "જૈવ ભૌગોલિક પુરાવા (A) ડાર્વિનના 'સર્વોત્તમની ઉત્ક્રાંતિ' સિદ્ધાંતને સમર્થન આપે છે, કારણ કે તે દર્શાવે છે કે ભિન્ન ભૌગોલિક વિસ્તારોમાં રહેતા જીવોમાં અલગ અલગ અનુકૂલનો વિકાસ થાય છે, જે તેમની પર્યાવરણીય પરિસ્થિતિઓ સાથે જોડાયેલા હોય છે. ભ્રૂણીય પુરાવા (B) વિકાસની પ્રક્રિયાને દર્શાવે છે, શરીરરચનાત્મક પુરાવા (C) અંગોની રચનાનું અભ્યાસ કરે છે, અને જીવાશ્મ પુરાવા (D) પ્રાચીન જીવોના અવશેષો દર્શાવે છે, પરંતુ તે સીધા જ 'સર્વોત્તમની ઉત્ક્રાંતિ' સિદ્ધાંતને સમર્થન આપતા નથી.", "ncert_ref": "Class XII - પ્રકરણ 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 3}, {"question": "નીચેના પૈકી કયો પુરાવો ઉત્ક્રાંતિના અભ્યાસમાં 'વિકાસની પુનરાવર્તન' (Recapitulation theory) સાથે સંકળાયેલ છે?", "options": ["A) જીવાશ્મ પુરાવા (Fossil evidence)", "B) ભ્રૂણીય પુરાવા (Embryological evidence)", "C) જૈવ રાસાયણિક પુરાવા (Biochemical evidence)", "D) શરીરરચનાત્મક પુરાવા (Anatomical evidence)"], "correct": 1, "explanation": "ભ્રૂણીય પુરાવા (B) 'વિકાસની પુનરાવર્તન' સિદ્ધાંત સાથે સંકળાયેલ છે, જે હેકલના નિયમ (Haeckel’s law) દ્વારા વર્ણવવામાં આવે છે: 'ઓન્ટોજેની ફાઇલોજેનીની પુનરાવર્તન કરે છે' (Ontogeny recapitulates phylogeny). આ સિદ્ધાંત અનુસાર, ભ્રૂણના વિકાસ દરમિયાન, તે પોતાના પૂર્વજોના વિકાસના તબક્કાઓને પુનરાવર્તિત કરે છે. જીવાશ્મ પુરાવા (A), જૈવ રાસાયણિક પુરાવા (C), અને શરીરરચનાત્મક પુરાવા (D) આ સિદ્ધાંત સાથે સીધા જ સંકળાયેલા નથી.", "ncert_ref": "Class XII - પ્રકરણ 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 4}, {"question": "અરબી ઘોડા (Arabian horse) અને જીરાફની લાંબી ગરદન કયા પ્રકારના ઉત્ક્રાંતિ પુરાવા તરીકે ગણી શકાય છે?", "options": ["A) કૃત્રિમ પસંદગી (Artificial selection)", "B) પ્રાકૃતિક પસંદગી (Natural selection)", "C) મ્યુટેશન (Mutation)", "D) જનીન વહન (Gene flow)"], "correct": 1, "explanation": "અરબી ઘોડા કાઓ દેખાય છે.", "B) 'જીવના જનીનમાં થતાં પરિવર્તનો પ્રાકૃતિક પસંદગી દ્વારા નક્કી થાય છે, જે ઉત્ક્રાંતિ તરફ દોરી જાય છે.'", "C) 'સમાન વંશના જીવોમાં હોમોલોજી અંગો જોવા મળે છે, જે સમાન પૂર્વજો તરફ નિર્દેશ કરે છે.'", "D) 'પર્યાવરણીય દબાણો જીવમાં નવીન લક્ષણો ઉત્પન્ન કરે છે, જે અનુવંશિકતા દ્વારા પસાર થાય છે.'"], "correct": 0, "explanation": "બાયોજેનેટિક કાયદો (Biogenetic Law) એરન્સ્ટ હેકેલ દ્વારા પ્રસ્તાવિત કરવામાં આવ્યો હતો, જેના અનુસાર 'ઓન્ટોજની ફાઇલોજનીની પુનરાવર્તન કરે છે' — અર્થાત્ ભ્રૂણીય વિકાસ (ontogeny) દરમિયાન જીવના પૂર્વજોના વિકાસના તબક્કાઓ (phylogeny) દેખાય છે. વિકલ્પ A સૌથી યોગ્ય છે. વિકલ્પ B ડાર્વિનના પ્રાકૃતિક પસંદગીના સિદ્ધાંતને વર્ણવે છે. વિકલ્પ C હોમોલોજીના પુરાવાને વર્ણવે છે. વિકલ્પ D લેમાર્કના 'વાપર અને અવગણના' સિદ્ધાંતને નજીક છે, પરંતુ બાયોજેનેટિક કાયદો સાથે સંકળાયેલ નથી.", "ncert_ref": "Class XII - પ્રકરણ 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 7}, {"question": "નીચેના પૈકી કયો પુરાવો ઉત્ક્રાંતિના 'ભૌગોલિક વિતરણ' (Geographical Distribution) સાથે સીધો સબંધ ધરાવે છે?", "options": ["A) ઓસ્ટ્રેલિયામાં માત્ર મર્સુપિયલ્સ (પાઉચવાળા પ્રાણીઓ) જોવા મળે છે, જ્યારે અન્ય ખંડોમાં તેની જગ્યાએ પ્લેસેન્ટલ સસ્તન પ્રાણીઓ જોવા મળે છે.", "B) માનવ અને ચિમ્પાન્ઝી વચ્ચેના DNAની સરખામણીમાં 98% સમાનતા જોવા મળે છે.", "C) અવશેષી અંગો જેવા કે અપેન્ડિક્સ અથવા કોક્સિક્સ (tail bone) માનવમાં જોવા મળે છે.", "D) ભ્રૂણીય વિકાસ દરમિયાન માનવ ભ્રૂણમાં ગિલ સ્લિટ્સ (gill slits) જોવા મળે છે."], "correct": 0, "explanation": "ભૌગોલિક વિતરણ (Geographical Distribution) એ ઉત્ક્રાંતિના પુરાવા પૈકી એક છે, જે દર્શાવે છે કે જુદા જુદા ભૌગોલિક વિસ્તારોમાં જીવોની વિતરણ પેટર્ન કેવી રીતે પૂર્વજોના વિતરણ અને ઉત્ક્રાંતિ સાથે સબંધ ધરાવે છે. વિકલ્પ A ઓસ્ટ્રેલિયામાં મર્સુપિયલ્સના અસ્તિત્વને દર્શાવે છે, જે ભૌગોલિક અલગતાનું ઉદાહરણ છે. વિકલ્પ B જનીનિક પુરાવાને વર્ણવે છે. વિકલ્પ C અંગિક પુરાવાને વર્ણવે છે. વિકલ્પ D ભ્રૂણીય પુરાવાને વર્ણવે છે.", "ncert_ref": "Class XII - પ્રકરણ 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 8}, {"question": "નીચેના પૈકી કયું વિધાન 'સમાનાંતર ઉત્ક્રાંતિ' (Convergent Evolution) ને સૌ "question": "જો એક જીવમાં 'એપેન્ડિક્સ' અને સર્પમાં જોવા મળતી અવશેષી પગની હાડકાં વચ્ચેનો સબંધ કયા પ્રકારના ઉત્ક્રાંતિ પુરાવા તરીકે ગણી શકાય?", "options": ["A) હોમોલોજી (Homology)", "B) એનાલોજી (Analogy)", "C) અવશેષી અંગો (Vestigial Organs)", "D) એટાવિઝમ (Atavism)"], "correct": 2, "explanation": "એપેન્ડિક્સ અને સર્પની અવશેષી પગની હાડકાં અવશેષી અંગો તરીકે ગણી શકાય છે, કારણ કે તે અંગો છે જે પૂર્વજોમાં કાર્યક્ષમ હતા પરંતુ વર્તમાનમાં તેનો ઉપયોગ રહ્યો નથી. હોમોલોજી સમાન પૂર્વજોથી ઉત્પન્ન થયેલા અંગો છે, એનાલોજી ભિન્ન પૂર્વજોથી ઉત્પન્ન થયેલા અંગો છે જે સમાન કાર્ય કરે છે, અને એટાવિઝમ એ પૂર્વજોના લક્ષણોનું પુનરાવર્તન છે.", "ncert_ref": "Class XII - પ્રકરણ 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 31}, {"question": "માનવ અને વ્હેલના અગ્રબાહુઓ (ફ્લિપર્સ)ની હાડકાંની રચનામાં જોવા મળતી સમાનતા કયા પ્રકારના ઉત્ક્રાંતિ પુરાવા તરીકે ગણી શકાય, જ્યારે તેમના કાર્ય અને વાતાવરણ સંપૂર્ણ ભિન્ન છે?", "options": ["A) હોમોલોજી (સમાન ઉત્પત્તિ વાળા અંગો)", "B) એનાલોજી (સમાન કાર્ય વાળા અંગો)", "C) એટાવિઝમ (પૂર્વજના લક્ષણોનું પુનરાવર્તન)", "D) વિકિરણ ઉત્ક્રાંતિ (Divergent Evolution)"], "correct": 0, "explanation": "માનવ અને વ્હેલના અગ્રબાહુઓની હાડકાંની રચના સમાન હોવા છતાં તેમના કાર્ય અને વાતાવરણ ભિન્ન છે, જે હોમોલોજીનો પુરાવો છે. હોમોલોજી એટલે સમાન ઉત્પત્તિ વાળા અંગો જે ભિન્ન કાર્ય કરે છે. એનાલોજી (B) સમાન કાર્ય વાળા અંગોને કહે છે, જેમકે પક્ષીના પંખ અને ચામચીડિયાના પંખ. એટાવિઝમ (C) પૂર્વજના લક્ષણોનું પુનરાવર્તન છે, જેમકે મનુષ્યમાં પૂંછડીનું અસ્તિત્વ. વિકિરણ ઉત્ક્રાંતિ (D) એક જ પૂર્વજથી ભિન્ન જીવોનો વિકાસ દર્શાવે છે, પરંતુ અહીં પ્રશ્ન હાડકાંની રચનાની સમાનતાનો છે.", "ncert_ref": "Class XII - પ્રકરણ 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 32}, {"question": "માનવ અને ટ્યુનિકેટ (Urochordata) ના ભ્રૂણીય વિકાસ દરમિયાન કોઈક સમયે ગિલ સ્લિટ્સ (ગળાના છિદ્રો) જોવા મળે છે. આ પુરાવો ઉત્ક્રાંતિના કયા સિદ્ધાંત સાથે સીધો સબંધ ધરાવે છે?", "options": ["A) બાયોજેનેટિક કાયદો (Biogenetic Law)", "B) વિકાસની પુનરાવર્તન (Recapitulation Theory)", "C) સમાનાંતર ઉત્ક્રાંતિ (Parallel Evolution)", "D) ભૌગોલિક વિતરણ (Geographical Distribution)"], "correct": 0, "explanation": "માનવ અને ટ્યુનિકેટમાં ભ્રૂણીય અવસ્થામાં ગિલ સ્લિટ્સ જોવા મળવું એ 'બાયોજેનેટિક કાયદો' (Ontogeny recapitulates Phylogeny) નું ઉદાહરણ છે, જેમાં ભ્રૂણીય વિકાસ દરમિયાન પૂર્વજોની લાક્ષણિકતાઓ પુનરાવર્તિત થાય છે. વિકાસની પુનરાવર્તન (B) એ બાયોજેનેટિક કાયદાનું જ અભિન્ન અંગ છે, પરંતુ પ્રશ્નમાં પૂછવામાં આવેલું છે કે કયા સિદ્ધાંત સાથે સીધો સબંધ છે, અને બાયોજેનેટિક કાયદો એ સૌથી સ્પષ્ટ જવાબ છે. સમાનાંતર ઉત્ક્રાંતિ (C) અને ભૌગોલિક વિતરણ (D) આ પુરાવા સાથે સીધો સબંધ ધરાવતા નથી.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 33}, {"question": "મનુષ્યના ભ્રૂણીય વિકાસ દરમિયાન, કોઈક સમયે ગળાની બાજુએ 'ગિલ સ્લિટ્સ' (pharyngeal slits) જોવા મળે છે. આ પુરાવો ઉત્ક્રાંતિના કયા સિદ્ધાંત સાથે સીધો સબંધ ધરાવે છે?", "options": ["A) બાયોજેનેટિક કાયદો (Biogenetic Law)", "B) લેમાર્કનો ઉપયોગ અને અનુપયોગનો સિદ્ધાંત", "C) ડાર્વિનનો પ્રાકૃતિક પસંદગીનો સિદ્ધાંત", "D) હાર્ડી-વાઇનબર્ગ સમતોલન"], "correct": 0, "explanation": "મનુષ્યના ભ્રૂણમાં ગિલ સ્લિટ્સનું અસ્તિત્વ બાયોજેનેટિક કાયદો (Recapitulation Theory) ને સપોર્ટ કરે છે, જે કહે છે કે 'ભ્રૂણીય વિકાસ જીવનના ઇતિહાસની પુનરાવર્તન કરે છે'. લેમાર્કનો સિદ્ધાંત ઉપયોગ/અનુપયોગ પર આધારિત છે, ડાર્વિનનો સિદ્ધાંત પ્રાકૃતિક પસંદગી પર છે, અને હાર્ડી-વાઇનબર્ગ સમતોલન જનીનિક સ્થિરતાને લગતું છે, જે અહીં લાગુ પડતું નથી.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 34}, {"question": "જો એક જીવમાં 'એટાવિઝમ' (Atavism) જોવા મળે છે, તો તે ઉત્ક્રાંતિના કયા પુરાવા તરીકે ગણી શકાય?", "options": ["A) અવશેષી અંગો (Vestigial Organs)", "B) પુનરાવર્તન (Recapitulation)", "C) પ્રાચીન લક્ષણોનું પુનરુદ્ધારણ (Reversion to Ancestral Traits)", "D) સમાન રચનાવાળા અંગો (Homologous Organs)"], "correct": 2, "explanation": "એટાવિઝમ એ પ્રાચીન લક્ષણોનું પુનરુદ્ધારણ છે, જેમાં કોઈ જીવમાં તેના પૂર્વજોમાં જોવા મળતા લક્ષણો પુનઃ પ્રગટ થાય છે. અવશેષી અંગો એવા અંગો છે જેનો હવે ઉપયોગ રહ્યો નથી, પુનરાવર્તન ભ્રૂણીય વિકાસ સાથે સબંધિત છે, અને હોમોલોજી રચનાત્મક સમાનતા સાથે સબંધિત છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 35}, {"question": "માનવ અને કાચબાના હૃદયની રચનામાં જોવા મળતી સમાનતાને લગતું નીચેનું કયું વિધાન સૌથી યોગ્ય છે?", "options": ["A) આ સમાનતા હોમોલોજીનો પુરાવો છે, કારણ કે તે સમાન વંશીય ઉત્પત્તિ ધરાવે છે.", "B) આ સમાનતા એનાલોજીનો પુરાવો છે, કારણ કે તે સમાન કાર્ય કરે છે પરંતુ વંશીય ઉત્પત્તિ અલગ છે.", "C) આ સમાનતા કનવર્જન્ટ ઉત્ક્રાંતિનો પુરાવો છે, કારણ કે બંને જીવો સમાન પર્યાવરણમાં રહે છે.", "D) આ સમાનતા ડાઇવર્જન્ટ ઉત્ક્રાંતિનો પુરાવો છે, કારણ કે બંને જીવો સમાન પૂર્વજથી ઉત્પન્ન થયા છે."], "correct": 0, "explanation": "માનવ અને કાચબાના હૃદયની રચનામાં જોવા મળતી સમાનતા હોમોલોજીનો પુરાવો છે, કારણ કે તે સમાન વંશીય ઉત્પત્તિ ધરાવે છે. હોમોલોજી એટલે સમાન રચનાવાળા અંગો જે સમાન પૂર્વજથી ઉત્પન્ન થયા હોય. એનાલોજી સમાન કાર્ય કરતા અંગોને કહે છે પરંતુ વંશીય ઉત્પત્તિ અલગ હોય છે. કનવર્જન્ટ ઉત્ક્રાંતિ સમાન પર્યાવરણમાં રહેતા જીવોના સમાન લક્ષણો વિકસાવવાનો પુરાવો છે, જ્યારે ડાઇવર્જન્ટ ઉત્ક્રાંતિ સમાન પૂર્વજથી અલગ અલગ જીવોના વિકાસનો પુરાવો છે. અહીં, હૃદયની રચનામાં સમાનતા હોમોલોજીનો પુરાવો છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 36}, {"question": "34. નીચેના પૈકી કયું વિધાન 'સીલેકેથ' (Coelacanth) ના અસ્તિત્વને ઉત્ક્રાંતિના પુરાવા તરીકે સૌથી યોગ્ય રીતે વર્ણવે છે?", "options": ["A) તે એક જીવંત જીવાશ્મ (living fossil) છે, જે પૂર્વજો અને વર્તમાન જીવો વચ્ચેની કડી તરીકે કામ કરે છે.", "B) તે એક અવશેષી અંગ ધરાવતો જીવ છે, જે તેના પૂર્વજોની તુલનામાં વધુ વિકસિત છે.", "C) તે એક એવો જીવ છે જેના ભ્રૂણીય વિકાસ દરમિયાન ગિલ સ્લિટ્સ જોવા મળે છે, જે મત્સ્ય વર્ગ સાથે સંકળાયેલ છે.", "D) તે એક એવો જીવ છે જેના DNAમાં મનુષ્ય સાથે સમાન જનીન ક્રમ જોવા મળે છે."], "correct": 0, "explanation": "સીલેકેથ (Coelacanth) ને 'જીવંત જીવાશ્મ' (living fossil) કહેવામાં આવે છે કારણ કે તે લગભગ 400 મિલિયન વર્ષ પહેલાં અસ્તિત્વમાં હતો અને આજે પણ જીવિત છે. તે પૂર્વજો અને વર્તમાન જીવો વચ્ચેની કડી તરીકે કામ કરે છે, જે ઉત્ક્રાંતિના પુરાવા તરીકે મહત્વપૂર્ણ છે. વિકલ્પ B ખોટો છે કારણ કે સીલેકેથ અવશેષી અંગ ધરાવતો નથી, પરંતુ તે પૂર્વજોની જેમ જ રહ્યો છે. વિકલ્પ C ખોટો છે કારણ કે ગિલ સ્લિટ્સ ભ્રૂણીય વિકાસ દરમિયાન મનુષ્ય અને અન્ય કશેરુકી પ્રાણીઓમાં પણ જોવા મળે છે, પરંતુ સીલેકેથ માટે આ વિશેષ લક્ષણ નથી. વિકલ્પ D ખોટો છે કારણ કે સીલેકેથ અને મનુષ્ય વચ્ચે DNA સમાનતા ઉત્ક્રાંતિના પુરાવા તરીકે સીધો સંબંધ ધરાવતો નથી.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 37}, {"question": "35. માનવ અને વ્હેલના અગ્રબાહુઓ (ફ્લિપર્સ)ની હાડકાંની રચનામાં જોવા મળતી સમાનતા કયા પ્રકારના ઉત્ક્રાંતિ પુરાવા તરીકે ગણી શકાય?", "options": ["A) હોમોલોજી (Homology)", "B) એનાલોજી (Analogy)", "C) વિકિરણ ઉત્ક્રાંતિ (Divergent Evolution)", "D) સમાનાંતર ઉત્ક્રાંતિ (Convergent Evolution)"], "correct": 0, "explanation": "માનવ અને વ્હેલના અગ્રબાહુઓ (ફ્લિપર્સ)ની હાડકાંની રચનામાં જોવા મળતી સમાનતા 'હોમોલોજી' (Homology) ના પુરાવા તરીકે ગણી શકાય છે. હોમોલોજી એટલે સમાન ઉત્પત્તિ ધરાવતા અંગો, જે વિકાસ દરમિયાન વિવિધ કાર્યો માટે રૂપાંતરિત થયા હોય. વિકલ્પ B (એનાલોજી) ખોટો છે કારણ કે એનાલોજી સમાન કાર્ય ધરાવતા પરંતુ વિવિધ ઉત્પત્તિ ધરાવતા અંગોને કહે છે. વિકલ્પ C (વિકિરણ ઉત્ક્રાંતિ) ખોટો છે કારણ કે વિકિરણ ઉત્ક્રાંતિ એ સમાન પૂર્વજથી વિવિધ જીવોની ઉત્પત્તિને કહે છે, પરંતુ અહીં સમાન રચનાવાળા અંગોનો પ્રશ્ન છે. વિકલ્પ D (સમાનાંતર ઉત્ક્રાંતિ) ખોટો છે કારણ કે સમાનાંતર ઉત્ક્રાંતિ એ વિવિધ પૂર્વજોથી સમાન લક્ષણોની ઉત્પત્તિને કહે છે, જે અહીં લાગુ પડતું નથી.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 38}, {"question": "માનવ અને કાંગારૂના ભ્રૂણીય વિકાસ દરમિયાન, ગળાના પ્રદેશમાં 'ગિલ પાઉચ' (pharyngeal pouches) જોવા મળે છે. આ પુરાવો ઉત્ક્રાંતિના કયા સિદ્ધાંતને સપોર્ટ કરે છે?", "options": ["A) સમાનાંતર ઉત્ક્રાંતિ (Parallel Evolution)", "B) વિકાસની પુનરાવર્તન (Recapitulation Theory)", "C) સમાનતાવાદી ઉત્ક્રાંતિ (Convergent Evolution)", "D) ભૌગોલિક વિતરણ (Geographical Distribution)"], "correct": 1, "explanation": "ગિલ પાઉચની હાજરી ભ્રૂણીય સમાનતાને દર્શાવે છે, જે 'વિકાસની પુનરાવર્તન' (Recapitulation Theory) અથવા 'બાયોજેનેટિક કાયદો' ને સપોર્ટ કરે છે. આ સિદ્ધાંત મુજબ, ભ્રૂણીય વિકાસ દરમિયાન જીવો તેમના પૂર્વજો on) એ ઉત્ક્રાંતિનો પુરાવો છે જ્યાં ભ્રૂણીય અવસ્થામાં જૂના પૂર્વજોની લાક્ષણિકતાઓ દેખાય છે. ફેરિંજિયલ આર્ક મનુષ્યના ભ્રૂણમાં દેખાય છે પરંતુ પ્રૌઢ અવસ્થામાં અદૃશ્ય થઈ જાય છે, જે ભ્રૂણીય પુનરાવર્તનને સપોર્ટ કરે છે. A) સમાનતાવાદી ઉત્ક્રાંતિ ભિન્ન પ્રજાતિઓમાં સમાન લાક્ષણિકતાઓના વિકાસ સાથે સંબંધિત છે. C) અવશેષી અંગો પ્રૌઢ અવસ્થામાં અસ્તિત્વમાં રહેલા અંગો છે જેનો ઉપયોગ નથી. D) જીવાશ્મ પુરાવા જીવાશ્મો દ્વારા ઉત્ક્રાંતિના ઇતિહાસને સપોર્ટ કરે છે.", "ncert_ref": "Class XII - Chapter 7: ઉત્ક્રાંતિ", "difficulty": "Hard", "num": 62}, {"question": "માનવ અને કાંગારૂના ભ્રૂણીય વિકાસ દરમિયાન, ગળાના પ્રદેશમાં જોવા મળતા 'ફેરિંજિયલ પાઉચ' (pharyngeal pouches) ની હાજરી ઉત્ક્રાંતિના કયા પ્રકારના પુરાવા તરીકે ગણી શકાય?", "options": ["A) હોમોલોજી (Homology) ના પુરાવા તરીકે", "B) એનાલોજી (Analogy) ના પુરાવા તરીકે", "C) ભ્રૂણીય સમાનતા (Embryological Evidence) ના પુરાવા તરીકે", "D) જીવાશ્મ પુરાવા (Fossil Evidence) તરીકે"], "correct": 2, "explanation": "માનવ અને કાંગારૂના ભ્રૂણીય વિકાસ દરમિયાન ગળાના પ્રદેશમાં જોવા મળતા 'ફેરિંજિયલ પાઉચ' એ સામાન્ય પૂર્વજમાંથી ઉતરી આવેલા લક્ષણો છે, જે ભ્રૂણીય સમાનતા (Embryological Evidence) ના પુરાવા તરીકે ગણાય છે. હોમોલોજી એ પુખ્ત અવસ્થામાં સમાન રચનાઓનો ઉલ્લેખ કરે છે, જ્યારે અહીં ભ્રૂણીય અવસ્થાની વાત છે. એનાલોજી એ કાર્યની સમાનતા દર્શાવે છે, જે અહીં લાગુ પડતી નથી. જીવાશ્મ પુરાવા એ ભૌતિક અવશેષો સાથે સંબંધિત છે, જે અહીં પ્રસ્તુત નથી.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 7: ઉત્ક્રાંતિ, વિભાગ 7.2: ઉત્ક્રાંતિના પુરાવા", "difficulty": "Hard", "num": 63}, {"question": "નીચેના પૈકી કયું વિધાન 'રૂડિમેન્ટરી અંગો' (Vestigial Organs) અને 'એટાવિઝમ' (Atavism) વચ્ચેનો મૂળભૂત તફાવત યોગ્ય રીતે સમજાવે છે?", "options": ["A) રૂડિમેન્ટરી અંગો એ પૂર્વજોમાં કાર્યશીલ હતા પરંતુ હવે નિષ્ક્રિય છે, જ્યારે એટાવિઝમ એ પૂર્વજોમાં હાજર ન હતા તેવા લક્ષણોનું પુનરાવર્તન છે.", "B) રૂડિમેન્ટરી અંગો એ પૂર્વજોમાં હાજર ન હતા તેવા લક્ષણો છે, જ્યારે એટાવિઝમ એ પૂર્વજોમાં કાર્યશીલ હતા પરંતુ હવે નિષ્ક્રિય થયેલા અંગો છે.", "C) રૂડિમેન્ટરી અંગો એ વર્તમાન પેઢીમાં નિષ્ક્રિય થયેલા અંગો છે જે પૂર્વજોમાં કાર્યશીલ હતા,                 document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
