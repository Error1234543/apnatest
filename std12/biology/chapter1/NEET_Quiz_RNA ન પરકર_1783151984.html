<html lang="Gujarati">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 RNA ના પ્રકારો</span>
                <span>🎯 Hard</span>
                <span>📝 47 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">

            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "નીચેનામાંથી કયો RNA પ્રકાર સીધો જ પ્રોટીન સંશ્લેષણમાં ભાગ લેતો નથી, પરંતુ અન્ય RNA ની ઉત્પત્તિ માટે જવાબદાર છે?", "options": ["A) mRNA", "B) tRNA", "C) rRNA", "D) snRNA"], "correct": 3, "explanation": "snRNA (small nuclear RNA) સીધો પ્રોટીન સંશ્લેષણમાં ભાગ લેતો નથી, પરંતુ તે mRNA ની પ્રક્રિયામાં (splicing) મદદ કરે છે. mRNA, tRNA અને rRNA સીધા પ્રોટીન સંશ્લેષણમાં ભાગ લે છે. mRNA જનીનિક માહિતી લઈ જાય છે, tRNA અમીનો એસિડ લાવે છે, અને rRNA રાઇબોઝોમનું બંધારણ બનાવે છે.", "ncert_ref": "Class XII - પ્રકરણ 6: આણ્વિક જનીનિક્સ", "difficulty": "Hard", "num": 1}, {"question": "જો કોઈ કોષમાં rRNA ની ઉત્પત્તિ અટકી જાય, તો નીચેનામાંથી કયું પરિણામ થશે?", "options": ["A) પ્રોટીન સંશ્લેષણની ગતિ વધશે", "B) રાઇબોઝોમનું બંધારણ બનવું બંધ થશે", "C) mRNA ની ઉત્પત્તિ વધશે", "D) tRNA ની ક્રિયા વધશે"], "correct": 1, "explanation": "rRNA રાઇબોઝોમનું મુખ્ય ઘટક છે. જો rRNA ની ઉત્પત્તિ અટકી જાય, તો રાઇબોઝોમ બનવું બંધ થશે, જેના કારણે પ્રોટીન સંશ્લેષણ અટકી જશે. પ્રોટીન સંશ્લેષણની ગતિ વધવી, mRNA ની ઉત્પત્તિ વધવી અથવા tRNA ની ક્રિયા વધવી એ બધું rRNA ની ઉત્પત્તિ અટકી જવાનું પરિણામ નથી.", "ncert_ref": "Class XII - પ્રકરણ 6: આણ્વિક જનીનિક્સ", "difficulty": "Hard", "num": 2}, {"question": "નીચેનામાંથી કયો RNA પ્રકાર પ્રકાશસંશ્લેષણ દરમિયાન ક્લોરોપ્લાસ્ટમાં મળી આવે છે?", "options": ["A) mRNA", "B) tRNA", "C) rRNA", "D) બધા જ"], "correct": 3, "explanation": "ક્લોરોપ્લાસ્ટમાં પ્રકાશસંશ્લેષણ દરમિયાન mRNA, tRNA અને rRNA બધા જ પ્રકારના RNA મળી આવે છે, કારણ કે ક્લોરોપ્લાસ્ટમાં સ્વતંત્ર જનીનિક વ્યવસ્થા હોય છે જે પ્રોટીન સંશ્લેષણ માટે જરૂરી RNA ની ઉત્પત્તિ કરે છે.", "ncert_ref": "Class XI - પ્રકરણ 13: પ્રકાશસંશ્લેષણ", "difficulty": "Hard", "num": 3}, {"question": "નીચેનામાંથી કયો RNA પ્રકાર એન્ટીકોડન ધરાવે છે?", "options": ["A) mRNA", "B) tRNA", "C) rRNA", "D) siRNA"], "correct": 1, "explanation": "tRNA (transfer RNA) એ એન્ટીકોડન ધરાવે છે, જે mRNA પરના કોડન સાથે જોડાઈને અમીનો એસિડ લાવે છે. mRNA કોડન ધરાવે છે, rRNA રાઇબોઝોમનું બંધારણ બનાવે છે, અને siRNA જનીન નિયંત્રણમાં uestion": "નીચેનામાંથી કયો RNA પ્રકાર એવો છે કે જે કોષમાં એમિનો એસિડને વહન કરતો નથી, પરંતુ તે રાઇબોઝોમની રચનામાં સીધો ભાગ લે છે અને પ્રોટીન સંશ્લેષણને સહાય કરે છે?", "options": ["A) mRNA (મેસેન્જર RNA)", "B) tRNA (ટ્રાન્સફર RNA)", "C) rRNA (રાઇબોઝોમલ RNA)", "D) snRNA (સ્મોલ ન્યુક્લિયર RNA)"], "correct": 2, "explanation": "rRNA (રાઇબોઝોમલ RNA) રાઇબોઝોમની રચનામાં સીધો ભાગ લે છે અને પ્રોટીન સંશ્લેષણને સહાય કરે છે. mRNA જનીન સૂચના વહન કરે છે, tRNA એમિનો એસિડ વહન કરે છે, અને snRNA RNA પ્રોસેસિંગમાં ભાગ લે છે.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક આનુવંશિકતા", "difficulty": "Hard", "num": 28}, {"question": "કોષમાં RNA ના પ્રકારો અને તેમની વિશિષ્ટ લાક્ષણિકતાઓને ધ્યાનમાં લેતા, નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) hnRNA (હેટરોજીનિયસ ન્યુક્લિયર RNA) એ mRNA નો પૂર્વગામી છે અને તે કોષકેન્દ્રમાં જ પ્રક્રિયા પામે છે.", "B) snRNA (સ્મોલ ન્યુક્લિયર RNA) સ્પ્લાઇસિંગ પ્રક્રિયામાં ભાગ લે છે અને તે કોષકેન્દ્રમાં જ મળી આવે છે.", "C) miRNA (માઇક્રો RNA) અને siRNA (સ્મોલ ઇન્ટરફેરિંગ RNA) બંને જનીન અભિવ્યક્તિને નિયંત્રિત કરે છે, પરંતુ miRNA માત્ર વનસ્પતિમાં જ જોવા મળે છે.", "D) rRNA (રાઇબોઝોમલ RNA) રાઇબોઝોમની રચનામાં ભાગ લે છે અને તે પ્રોકેરિયોટિક તેમજ યુકેરિયોટિક કોષોમાં મળી આવે છે."], "correct": 2, "explanation": "miRNA (માઇક્રો RNA) અને siRNA (સ્મોલ ઇન્ટરફેરિંગ RNA) બંને જનીન અભિવ્યક્તિને નિયંત્રિત કરે છે, પરંતુ miRNA માત્ર વનસ્પતિમાં જ મળી આવે છે એ વિધાન ખોટું છે. miRNA પ્રાણીઓ અને વનસ્પતિ બંનેમાં જોવા મળે છે અને તે જનીન અભિવ્યક્તિને નકારાત્મક રીતે નિયંત્રિત કરે છે. hnRNA એ mRNA નો પૂર્વગામી છે અને તે કોષકેન્દ્રમાં જ પ્રક્રિયા પામે છે (વિકલ્પ A સાચું). snRNA સ્પ્લાઇસિંગ પ્રક્રિયામાં ભાગ લે છે અને કોષકેન્દ્રમાં જ મળી આવે છે (વિકલ્પ B સાચું). rRNA રાઇબોઝોમની રચનામાં ભાગ લે છે અને પ્રોકેરિયોટિક તેમજ યુકેરિયોટિક કોષોમાં મળી આવે છે (વિકલ્પ D સાચું).", "ncert_ref": "ક્લાસ XII - પ્રકરણ 6: આનુવંશિક દ્રવ્ય", "difficulty": "Hard", "num": 29}, {"question": "એક સંશોધકને એક નવો RNA પ્રકાર મળ્યો છે જે કોષકેન્દ્રમાંથી ઉત્પન્ન થાય છે, પરંતુ તે કોષરસમાં પ્રોટીન સંશ્લેષણ સાથે સંકળાયેલ નથી. આ RNA નીચેનામાંથી કયા પ્રકારનો હોઈ શકે છે અને તેનું કાર્ય શું હોઈ શકે?", "options": ["A) tRNA (ટ્રાન્સફર RNA) - એમિનો એસિડને રાઇબોઝોમ સુધી વહન કરે છે.", "B) lncRNA (લોંગ નોન-કોડિંગ RNA) - જનીન અભિવ્યક્તિના નિયંત્રણમાં ભાગ લે છે.", "C) rRNA (રાઇબોઝોમલ RNA) - રાઇબોઝોમની રચનામાં ભાગ લે છે.", "D) mRNA (મેસેન્જર RNA) - પ્રોટીન સંશ્લેષણ માટે જનીનિક માહિતી વહન કરે છે."], "correct": 1, "explanation": "આપેલ RNA કોષકેન્દ્રમાંથી ઉત્પન્ન થાય છે પરંતુ પ્રોટીન સંશ્લેષણ સાથે સંકળાયેલ નથી, તેથી તે lncRNA (લોંગ નોન-કોડિંગ RNA) હોઈ શકે છે. lncRNA જનીન અભિવ્યક્તિના નિયંત્રણમાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે અને તે પ્રોટીન સંશ્લેષણમાં સીધો ભાગ લેતો નથી. tRNA એમિનો એસિડને રાઇબોઝોમ સુધી વહન કરે છે (વિકલ્પ A ખોટો). rRNA રાઇબોઝોમની રચનામાં ભાગ લે છે (વિકલ્પ C ખોટો). mRNA પ્રોટીન સંશ્લેષણ માટે જનીનિક માહિતી વહન કરે છે (વિકલ્પ D ખોટો).", "ncert_ref": "ક્લાસ XII - પ્રકરણ 6: આનુવંશિક દ્રવ્ય", "difficulty": "Hard", "num": 30}, {"question": "કોષમાં, નીચેનામાંથી કયો RNA પ્રકાર એવો છે કે જે સીધો જ DNA પરથી પ્રતિલિખિત થતો નથી, પરંતુ અન્ય RNA પરથી ઉત્પન્ન થાય છે?", "options": ["A) mRNA (મેસેન્જર RNA)", "B) tRNA (ટ્રાન્સફર RNA)", "C) snRNA (સ્મોલ ન્યુક્લિયર RNA)", "D) miRNA (માઇક્રો RNA)"], "correct": 3, "explanation": "miRNA (માઇક્રો RNA) સીધો જ DNA પરથી પ્રતિલિખિત થતો નથી, પરંતુ તે પ્રાઇમરી miRNA (pri-miRNA) ના પ્રક્રિયણ દ્વારા ઉત્પન્ન થાય છે, જે DNA પરથી પ્રતિલિખિત થયેલો હોય છે. mRNA, tRNA, અને snRNA સીધો જ DNA પરથી પ્રતિલિખિત થાય છે. miRNA કોષમાં જનીન નિયંત્રણમાં ભાગ લે છે અને તેનું પ્રક્રિયણ Drosha અને Dicer એન્ઝાઇમ દ્વારા થાય છે.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક આનુવંશિકતા", "difficulty": "Hard", "num": 31}, {"question": "કોષમાં, નીચેનામાંથી કયો RNA પ્રકાર એવો છે કે જે કોષમાં જનીન નિયંત્રણમાં ભાગ લે છે અને તેનું કાર્ય RNA ઇન્ટરફેરન્સ સાથે સંકળાયેલું છે?", "options": ["A) siRNA", "B) snRNA", "C) snoRNA", "D) scRNA"], "correct": 0, "explanation": "siRNA (સ્મોલ ઇન્ટરફેરિંગ RNA) કોષમાં જનીન નિયંત્રણમાં ભાગ લે છે અને તેનું કાર્ય RNA ઇન્ટરફેરન્સ સાથે સંકળાયેલું છે. snRNA સ્પ્લાઇસિંગમાં, snoRNA rRNA પ્રક્રિયણમાં, અને scRNA (સ્મોલ સાયટોપ્લાઝમિક RNA) અન્ય કાર્યોમાં ભાગ લે છે.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક આનુવંશિકતા", "difficulty": "Hard", "num": 32}, {"question": "કોષમાં મળી આવતા RNA ના પ્રકારો પૈકી કયો RNA પ્રકાર એવો છે કે જે સીધો જ પ્રોટીન સંશ્લેષણમાં ભાગ લેતો નથી, પરંતુ જનીન નિયંત્રણમાં મહત્વની ભૂમિકા ભજવે છે અને તેની ઉત્પત્તિ RNA પોલિમરેઝ II દ્વારા થતી નથી?", "options": ["A) miRNA (માઇક્રો RNA)", "B) snRNA (સ્મોલ ન્યુક્લિયર RNA)", "C) snoRNA (સ્મોલ ન્યુક્લિયોલર RNA)", "D) siRNA (સ્મોલ ઇન્ટરફેરિંગ RNA)"], "correct": 2, "explanation": "snoRNA (સ્મોલ ન્યુક્લિયોલર RNA) સીધો જ પ્રોટીન સંશ્લેષણમાં ભાગ લેતો નથી, પરંતુ તે rRNA ની પ્રક્રિયામાં (મોડિફિકેશન) મહત્વની ભૂમિકા ભજવે છે, જે જનીન નિયંત્રણ સાથે સંકળાયેલ છે. RNA પોલિમરેઝ II દ્વારા miRNA, snRNA, અને siRNA ની ઉત્પત્તિ થાય છે, પરંતુ snoRNA ની ઉત્પત્તિ RNA પોલિમરેઝ I અથવા III દ્વારા થાય છે. miRNA અને siRNA જનીન નિયંત્રણમાં ભાગ લે છે, પરંતુ તેના ઉત્પત્તિ પોલિમરેઝ II દ્વારા થાય છે. snRNA પણ જનીન નિયંત્રણમાં ભાગ લે છે અને તેની ઉત્પત્તિ પોલિમરેઝ II દ્વારા થાય છે.", "ncert_ref": "Class XII - Chapter 6: અનુવંશિકતા અને વિકાસ", "difficulty": "Hard", "num": 33}, {"question": "કોષમાં જનીન નિયંત્રણ અને પ્રોટીન સંશ્લેષણ બંનેમાં ભૂમિકા ભજવતા RNA પ્રકારો પૈકી કયો RNA પ્રકાર એવો છે કે જે કોષકેન્દ્રમાં જન્મે છે, પરંતુ કોષરસમાં કાર્ય કરે છે અને તેની સંરચનામાં 5' કેપ અને 3' પોલી-એ પૂંછડી ધરાવે છે?", "options": ["A) hnRNA (હેટરોજીનિયસ ન્યુક્લિયર RNA)", "B) snRNA (સ્મોલ ન્યુક્લિયર RNA)", "C) mRNA (મેસેન્જર RNA)", "D) miRNA (માઇક્રો RNA)"], "correct": 0, "explanation": "hnRNA (હેટરોજીનિયસ ન્યુક્લિયર RNA) કોષકેન્દ્રમાં જન્મે છે અને તેને પ્રક્રિયા પછી mRNA માં રૂપાંતરિત કરવામાં આવે છે, જે કોષરસમાં પ્રોટીન સંશ્લેષણમાં ભાગ લે છે. તે 5' કેપ અને 3' પોલી-એ પૂંછડી ધરાવે છે. snRNA કોષકેન્દ્રમાં જ રહે છે અને RNA સ્પ્લાઇસિંગમાં ભાગ લે છે. mRNA કોષકેન્દ્રમાં જન્મે છે પરંતુ તે hnRNA ની પ્રક્રિયા પછી જ બને છે. miRNA જનીન નિયંત્રણમાં ભાગ લે છે પરંતુ તે 5' કેપ અને 3' પોલી-એ પૂંછડી ધરાવતો નથી.", "ncert_ref": "Class XII - પ્રકરણ 6: આણ્વિક આનુવંશિકતા", "difficulty": "Hard", "num": 34}, {"question": "કોષમાં મળી આવતા RNA ના પ્રકારો પૈકી, નીચેનામાંથી કયો RNA પ્રકાર એવો છે કે જે સીધો જ DNA પરથી પ્રતિલિપિ (ટ્રાન્સક્રિપ્શન) થતો નથી, પરંતુ અન્ય RNA પરથી ઉત્પન્ન થાય છે?", "options": ["A) miRNA (માઇક્રો RNA)", "B) siRNA (સ્મોલ ઇન્ટરફેરિંગ RNA)", "C) hnRNA (હેટરોજીનિયસ ન્યુક્લિયર RNA)", "D) snRNA (સ્મોલ ન્યુક્લિયર RNA)"], "correct": 1, "explanation": "siRNA (સ્મોલ ઇન્ટરફેરિંગ RNA) સીધો જ DNA પરથી પ્રતિલિપિ થતો નથી, પરંતુ તે ડબલ-સ્ટ્રેન્ડેડ RNA (dsRNA) ના કાપડ દ્વારા ઉત્પન્ન થાય છે, જેને ડાઇસર નામના ઉત્સેચક દ્વારા કાપવામાં આવે છે. miRNA DNA પરથી પ્રતિલિપિ થાય છે, hnRNA DNA પરથી પ્રતિલિપિ થયેલો પ્રાથમિક RNA છે, અને snRNA પણ DNA પરથી પ્રતિલિપિ થાય છે. આથી, siRNA એ એકમાત્ર એવો RNA પ્રકાર છે જે અન્ય RNA પરથી ઉત્પન્ન થાય છે.", "ncert_ref": "Class XII - Chapter 6: આણ્વિક આનુવંશિકતા", "difficulty": "Hard", "num": 35}, {"question": "નીચેનામાંથી કયો RNA પ્રકાર કોષમાં જનીન નિયંત્રણમાં ભાગ લે છે, પરંતુ તેનું કાર્ય એ છે કે તે અન્ય RNA અણુઓને તોડીને તેમની ક્રિયા અટકાવે છે?", "options": ["A) miRNA (માઇક્રો RNA)", "B) siRNA (સ્મોલ ઇન્ટરફેરિંગ RNA)", "C) hnRNA (હેટરોજીનિયસ ન્યુક્લિયર RNA)", "D) snoRNA (સ્મોલ ન્યુક્લિયોલર RNA)"], "correct": 1, "explanation": "siRNA (સ્મોલ ઇન્ટરફેરિંગ RNA) કોષમાં જનીન નિયંત્રણમાં ભાગ લે છે અને તે અન્ય RNA અણુઓને તોડીને (ડિગ્રેડેશન) તેમની ક્રિયા અટકાવે છે. miRNA પણ જનીન નિયંત્રણમાં ભાગ લે છે, પરંતુ તે મુખ્યત્વે mRNA ના અનુવાદને અટકાવે છે, તોડતો નથી. hnRNA mRNA ની પ્રાથમિક રૂપ છે અને siRNA જેવું કાર્ય કરતો નથી. snoRNA રાઇબોઝોમલ RNA ની પ્રક્રિયામાં ભાગ લે છે.", "ncert_ref": "Class XII - Chapter 6: જૈવ અણુઓ અને જીવનની ઉત્પત્તિ", "difficulty": "Hard", "num": 36}, {"question": "એક સંશોધકે કોષકેન્દ્રમાંથી એક નવો RNA પ્રકાર અલગ કર્યો છે જે લાંબી શૃંખલા ધરાવે છે, પરંતુ તેના પર પોલિએડિનાઇલેશન (poly-A tail) નથી. આ RNA પ્રકાર કયો હોઈ શકે અને તેનું મુખ્ય કાર્ય શું છે?", "options": ["A) hnRNA (હેટરોજીનિયસ ન્યુક્લિયર RNA) - પ્રાથમિક ટ્રાન્સક્રિપ્ટ તરીકે કાર્ય કરે છે જે પછીથી પ્રોસેસ થઈ mRNA બને છે", "B) snRNA (સ્મોલ ન્યુક્લિયર RNA) - સ્પ્લાઇસિંગ પ્રક્રિયામાં ભાગ લે છે અને સ્નર્પ્સ (snRNPs) નો ભાગ છે", "C) snoRNA (સ્મોલ ન્યુક્લિયોલર RNA) - rRNA ના રાસાયણિક ફેરફારમાં મદદ કરે છે", "D) lncRNA (લોંગ નોન-કોડિંગ RNA) - જનીન અભિવ્યક્તિના નિયંત્રણમાં ભાગ લે છે, પરંતુ પ્રોટીન કોડ કરતો નથી"], "correct": 3, "explanation": "સાચો જવાબ D છે કારણ કે lncRNA લાંબી શૃંખલા ધરાવે છે, કોષકેન્દ્રમાંથી ઉત્પન્ન થાય છે, અને તેનું પોલિએડિનાઇલેશન થતું નથી. તે જનીન અભિવ્યક્તિના નિયંત્રણમાં ભાગ લે છે પરંતુ પ્રોટીન કોડ કરતો નથી. A વિકલ્પ ખોટો છે કારણ કે hnRNA પર પોલિએડિનાઇલેશન થાય છે. B અને C વિકલ્પો ખોટા છે કારણ કે snRNA અને snoRNA ટૂંકી શૃંખલા ધરાવે છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ (જનીન અભિવ્યક્તિ અને નિયંત્રણ)", "difficulty": "Hard", "num": 37}, {"question": "કોષમાં RNA પોલિમરેઝ III દ્વારા ટ્રાન્સક્રિપ્શન થતા RNA પ્રકારો પૈકી નીચેનામાંથી કયો એક અપવાદ છે જે સામાન્ય રીતે RNA પોલિમરેઝ II દ્વારા ટ્રાન્સક્રિપ્શન પામે છે?", "options": ["A) tRNA (ટ્રાન્સફર RNA) - એમિનો એસિડનું વહન કરે છે", "B) 5S rRNA (રાઇબોઝોમલ RNA) - રાઇબોઝોમનો ભાગ છે", "C) snRNA (સ્મોલ ન્યુક્લિયર RNA) - સ્પ્લાઇસિંગમાં ભાગ લે છે", "D) U6 snRNA - સ્પ્લાઇસોસોમનો ભાગ છે"], "correct": 2, "explanation": "સાચો જવાબ C છે કારણ કે snRNA (સિવાય U6 snRNA) સામાન્ય રીતે RNA પોલિમરેઝ II દ્વારા ટ્રાન્સક્રિપ્શન પામે છે, જ્યારે RNA પોલિમરેઝ III મુખ્યત્વે tRNA, 5S rRNA અને U6 snRNA નું ટ્રાન્સક્રિપ્શન કરે છે. આમ, snRNA એ અપવાદ છે. A, B અને D વિકલ્પો ખોટા છે કારણ કે તે RNA પોલિમરેઝ III દ્વારા ટ્રાન્સક્રિપ્શન પામે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 6: આણ્વિક આધાર આનુવંશિકતા (ટ્રાન્સક્રિપ્શન)", "difficulty": "Hard", "num": 38}, {"question": "એક પ્રયોગમાં જાણવા મળ્યું કે કોષમાં miRNA (માઇક્રો RNA) ની અભિવ્યક્તિ વધતા, લક્ષ્ય mRNA નું સ્તર ઘટે છે, પરંતુ તેનું પ્રોટીન સ્તર વધુ પ્રમાણમાં ઘટતું નથી. આ ઘટનાનું સૌથી સંભવિત કારણ શું હોઈ શકે?", "options": ["A) miRNA એ mRNA નું સંપૂર્ણ ડિગ્રેડેશન કરે છે, પરંતુ પ્રોટીનનું અર્ધઆયુષ્ય લાંબુ હોય છે", "B) miRNA એ mRNA નું ટ્રાન્સલેશન અટકાવે છે, પરંતુ તેનું ડિગ્રેડેશન થતું નથી", "C) miRNA એ mRNA ને સ્થિર કરે છે, પરંતુ રાઇબોઝોમ સાથેનું જોડાણ અટકાવે છે", "D) miRNA એ mRNA નું ડિગ્રેડેશન અને ટ્રાન્સલેશન બંને અટકાવે છે, પરંતુ અસ્તિત્વમાં રહેલું પ્રોટીન ધીમે ધીમે ડિગ્રેડ થાય છે"], "correct": 1, "explanation": "સાચો જવાબ B છે કારણ કે miRNA મુખ્યત્વે mRNA નું ટ્રાન્સલેશન અટકાવે છે, પરંતુ તેનું ડિગ્રેડેશન થતું નથી. આથી mRNA નું સ્તર ઘટે છે, પરંતુ પ્રોટીનનું સ્તર વધુ પ્રમાણમાં ઘટતું નથી કારણ કે અસ્તિત્વમાં રહેલું પ્રોટીન હજુ કાર્યરત રહે છે. A વિકલ્પ ખોટો છે કારણ કે miRNA સામાન્ય રીતે mRNA નું સંપૂર્ણ ડિગ્રેડેશન કરતું નથી. C વિકલ્પ ખોટો છે કારણ કે miRNA mRNA ને સ્થિર કરતું નથી. D વિકલ્પ ખોટો છે કારણ કે miRNA બંને પ્રક્રિયા અટકાવતું નથી.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ (જનીન નિયંત્રણ)", "difficulty": "Hard", "num": 39}, {"question": "કોષમાં RNA એડિટિંગની પ્રક્રિયા દરમિયાન, નીચેનામાંથી કયો RNA પ્રકાર એવો છે જે સીધો જ આ પ્રક્રિયામાં ભાગ લે છે અને તેનું કાર્ય શું છે?", "options": ["A) tRNA - એમિનો એસિડના કોડોનમાં ફેરફાર કરે છે", "B) gRNA (ગાઇડ RNA) - mRNA ના ન્યુક્લિયોટાઇડમાં ફેરફાર કરવામાં મદદ કરે છે", "C) rRNA - રાઇબોઝોમની સંરચનામાં ફેરફાર કરે છે", "D) miRNA - mRNA ના ટ્રાન્સલેશનને નિયંત્રિત કરે છે"], "correct": 1, "explanation": "સાચો જવાબ B છે કારણ કે gRNA (ગાઇડ RNA) RNA એડિટિંગમાં સીધો ભાગ લે છે અને mRNA ના ન્યુક્લિયોટાઇડમાં ફેરફાર કરવામાં મદદ કરે છે. A વિકલ્પ ખોટો છે કારણ કે tRNA એમિનો એસિડનું વહન કરે છે, પરંતુ કોડોનમાં ફેરફાર કરતું નથી. C વિકલ્પ ખોટો છે કારણ કે rRNA રાઇબોઝોમની સંરચનામાં ભાગ લે છે, પરંતુ RNA એડિટિંગમાં સીધો ભાગ લેતું નથી. D વિકલ્પ ખોટો છે કારણ કે miRNA જનીન અભિવ્યક્તિનું નિયંત્રણ કરે છે, પરંતુ RNA એડિટિંગમાં ભાગ લેતું નથી.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 6: આનુવંશિકતા અને ઉત્ક્રાંતિ (જનીન અભિવ્યક્તિ)", "difficulty": "Hard", "num": 40}, {"question": "કોષમાં miRNA (માઇક્રો RNA) અને siRNA (સ્મોલ ઇન્ટરફેરિંગ RNA) વચ્ચેનો મુખ્ય તફાવત કયો છે?", "options": ["A) miRNA કોષકેન્દ્રમાં ઉત્પન્ન થાય છે જ્યારે siRNA કોષરસમાં ઉત્પન્ન થાય છે", "B) miRNA જનીન નિયંત્રણમાં ભાગ લે છે જ્યારે siRNA વાઇરસ સામે             document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
