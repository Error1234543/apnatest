<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - Cancer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 Cancer</span>
                <span>🎯 Hard</span>
                <span>📝 49 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">

                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>

        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>

                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>

            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "કયો કર્કરોગ (કૅન્સર) નો પ્રકાર વાયરસ દ્વારા થતો નથી, પરંતુ અન્ય કારણોને લીધે થાય છે?", "options": ["A) સર્વાઇકલ કૅન્સર (ગર્ભાશયના મુખનો કર્કરોગ)", "B) લિવર કૅન્સર (યકૃતનો કર્કરોગ)", "C) બ્રેઇન કૅન્સર (મગજનો કર્કરોગ)", "D) બર્કિટ લિમ્ફોમા"], "correct": 2, "explanation": "બ્રેઇન કૅન્સર (મગજનો કર્કરોગ) વાયરસ દ્વારા થતો નથી. સર્વાઇકલ કૅન્સર HPV વાયરસને લીધે, લિવર કૅન્સર HB વાયરસને લીધે, અને બર્કિટ લિમ્ફોમા EB વાયરસને લીધે થાય છે. બ્રેઇન કૅન્સર મુખ્યત્વે જનીનિક મ્યુટેશન, રેડિયેશન અથવા અન્ય પર્યાવરણીય કારણોને લીધે થાય છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 1}, {"question": "કોષચક્રના કયા તબક્કે કૅન્સરના કોષો અસાધારણ રીતે વૃદ્ધિ પામે છે અને નિયંત્રણ વગર વિભાજન પામે છે?", "options": ["A) G1 તબક્કો", "B) S તબક્કો", "C) G2 તબક્કો", "D) M તબક્કો"], "correct": 1, "explanation": "S તબક્કો (સંશ્લેષણ તબક્કો) દરમિયાન DNA ની નકલ થાય છે. કૅન્સરના કોષો આ તબક્કામાં અસાધારણ રીતે DNA ની નકલ કરે છે અને નિયંત્રણ વગર વિભાજન પામે છે. G1, G2, અને M તબક્કા કોષચક્રના અન્ય તબક્કાઓ છે જ્યાં કોષ વૃદ્ધિ અને વિભાજનના અન્ય પાસાઓ પર નિયંત્રણ રાખે છે.", "ncert_ref": "Class XI - Chapter 10: કોષ ચક્ર અને કોષ વિભાજન", "difficulty": "Hard", "num": 2}, {"question": "કયો હોર્મોન કૅન્સરના કોષોની વૃદ્ધિને રોકવા અથવા ધીમી પાડવા માટે ઉપયોગી નથી?", "options": ["A) ઇન્ટરફેરોન", "B) ઇન્ટરલ્યુકિન", "C) ઇન્સ્યુલિન", "D) ટ્યુમર નેક્રોસિસ ફેક્ટર (TNF)"], "correct": 2, "explanation": "ઇન્સ્યુલિન એક હોર્મોન છે જે રક્તમાં ગ્લુકોઝના સ્તરને નિયંત્રિત કરે છે અને કૅન્સરની વૃદ્ધિને રોકવા અથવા ધીમી પાડવા માટે ઉપયોગી નથી. ઇન્ટરફેરોન, ઇન્ટરલ્યુકિન, અને TNF એ સાયટોકાઇન્સ છે જે પ્રતિરક્ષાતંત્ર દ્વારા ઉત્પન્ન થાય છે અને કૅન્સરના કોષોની વૃદ્ધિને રોકવા અથવા ધીમી પાડવા માટે ઉપયોગી છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 3}, {"question": "કયો જનીન કૅન્સરના કોષોની વૃદ્ધિને નિયંત્રિત કરવા માટે જવાબદાર છે અને તેના મ્યુટેશનથી કૅન્સર થવાની શક્યતા વધે છે?", "options": ["A) p53", "B) BRCA1", "C) RB1", "D) ઉપરોક્ત તમામ"], "correct": 3, "explanation": "p53, BRCA1, અને RB1 એ તમામ ટ્યુમર સપ્રેસર જનીન છે જે કૅન્સરના કોષોની વૃદ્ધિને નિયંત્રિત કરવા માટે જવાબદાર છે. આ જનીનમાં મ્યુટેશન થવાથી કૅન્સર થવાની શક્યતા વધે છે.", "ncert_ref": "Class XII - Chapter 6: આનુવંશિકતા અને વિકાસ", "difficulty": "Hard", "num": 4}, {"question": "કયો કૅન્સરનો પ્રકાર રક્ત કોષોને અસર કરે છે અને રક્તમાં અપરિપક્વ કોષોની સંખ્યા વધારે છે?", "options": ["A) લ્યુકેમિયા", "B) લિમ્ફોમા", "C) માયલોમા", "D) સાર્કોમા"], "correct": 0, "explanation": "લ્યુકેમિયા એક પ્રકારનો કૅન્સર છે જે રક્ત કોષોને અસર કરે છે અને રક્તમાં અપરિપક્વ કોષો (બ્લાસ્ટ કોષો)ની સંખ્યા વધારે છે. લિમ્ફોમા લસીકા તંત્રને, માયલોમા હાડકાના મજ્જાને, અને સાર્કોમા સ્નાયુ અથવા હાડકાને અસર કરે છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 5}, {"question": "કયો કર્કરોગ (કૅન્સર) નો પ્રકાર એવો છે કે જે મુખ્યત્વે પેશીના સ્થૂળકોષીય પડ (epithelial tissue) માં ઉદ્ભવે છે અને તેને 'કાર્સિનોમા' કહેવાય છે?", "options": ["A) લ્યુકેમિયા (રક્ત કૅન્સર)", "B) સાર્કોમા (હાડકાં અથવા સ્નાયુ પેશીનો કૅન્સર)", "C) લિમ્ફોમા (લસીકા પેશીનો કૅન્સર)", "D) એડિનોકાર્સિનોમા (ગ્રંથિયુક્ત પેશીનો કૅન્સર)"], "correct": 3, "explanation": "એડિનોકાર્સિનોમા એ કાર્સિનોમા નો એક પ્રકાર છે જે ગ્રંથિયુક્ત પેશી (glandular epithelium) માં ઉદ્ભવે છે. લ્યુકેમિયા રક્ત કોષોને અસર કરે છે, સાર્કોમા હાડકાં અથવા સ્નાયુ પેશીને અસર કરે છે, અને લિમ્ફોમા લસીકા પેશીને અસર કરે છે. કાર્સિનોમા એ પેશીના સ્થૂળકોષીય પડ (epithelial tissue) માં ઉદ્ભવતો કૅન્સર છે, અને એડિનોકાર્સિનોમા તેનું એક ઉદાહરણ છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 6}, {"question": "કર્કરોગના કોષોમાં કયો જનીન સામાન્ય રીતે મ્યુટેશન દ્વારા સક્રિય થાય છે અને કોષવિભાજનને નિયંત્રિત કરતી પ્રક્રિયાને બગાડે છે?", "options": ["A) p53 (ટ્યુમર સપ્રેસર જનીન)", "B) BRCA1 (સ્તન કૅન્સર સાથે સંકળાયેલ જનીન)", "C) Ras (ઑન્કોજીન)", "D) Rb (રેટિનોબ્લાસ્ટોમા જનીન)"], "correct": 2, "explanation": "Ras એ એક ઑન્કોજીન છે જે સામાન્ય રીત  ત્વચાના અન્ય પ્રકારના કૅન્સર છે, જ્યારે કાપોસી સાર્કોમા રક્તવાહિનીઓની પેશીને અસર કરે છે.", "ncert_ref": "Class XII - Chapter 8: માનવ સ્વાસ્થ્ય અને રોગો", "difficulty": "Hard", "num": 10}, {"question": "કૅન્સરના કોષોમાં ટ્યુમર સપ્રેસર જનીન p53 ની ભૂમિકા શું છે? જ્યારે તે મ્યુટેટ થાય છે ત્યારે કયો પરિણામ સૌથી યોગ્ય રીતે વર્ણવે છે?", "options": ["A) તે DNA નુકસાનની માહિતી મેળવી, કોષચક્રને અટકાવે છે અને જરૂર પડ્યે એપોપ્ટોસિસને પ્રેરે છે, પરંતુ મ્યુટેશનથી કોષો અનિયંત્રિત રીતે વૃદ્ધિ પામે છે.", "B) તે ટેલોમિયરની લંબાઈ વધારવા માટે ટેલોમેરેઝ ઉત્સેચકને સક્રિય કરે છે, પરંતુ મ્યુટેશનથી ટેલોમિયર ટૂંકા થાય છે.", "C) તે એન્જિયોજેનેસિસને પ્રેરે છે, પરંતુ મ્યુટેશનથી રક્ત વાહિનીઓનું નિર્માણ અટકી જાય છે.", "D) તે કોષના વિકાસને ધીમો પાડવા માટે સાયટોકાઇનની ઉત્પત્તિ કરે છે, પરંતુ મ્યુટેશનથી સાયટોકાઇનનું સ્તર વધે છે."], "correct": 0, "explanation": "p53 એક ટ્યુમર સપ્રેસર જનીન છે જે DNA નુકસાનને ઓળખી, કોષચક્રને અટકાવે છે અને એપોપ્ટોસિસ (કોષ મૃત્યુ)ને પ્રેરે છે. જ્યારે તે મ્યુટેટ થાય છે, ત્યારે કોષો અનિયંત્રિત રીતે વૃદ્ધિ પામે છે, જે કૅન્સર તરફ દોરી જાય છે. બાકીના વિકલ્પો અયોગ્ય છે કારણ કે: B) ટેલોમેરેઝ p53 દ્વારા નિયંત્રિત થતું નથી, C) એન્જિયોજેનેસિસ p53 ની પ્રાથમિક ભૂમિકા નથી, D) p53 સાયટોકાઇન ઉત્પત્તિ સાથે સીધો સંબંધ ધરાવતું નથી.", "ncert_ref": "Class XII - Chapter 8: मानव स्वास्थ्य तथा रोग (માનવ સ્વાસ્થ્ય અને રોગો)", "difficulty": "Hard", "num": 11}, {"question": "હ્યુમન પેપિલોમા વાયરસ (HPV) ના સંક્રમણ સાથે કયો કૅન્સર સૌથી મજબૂત રીતે સંકળાયેલ છે અને તેના કયા જનીનની ઓવરએક્સપ્રેશન આ કૅન્સરના વિકાસમાં મહત્વની ભૂમિકા ભજવે છે?", "options": ["A) સર્વાઇકલ કૅન્સર; E6 અને E7 જનીન", "B) લિવર કૅન્સર; HBx જનીન", "C) સ્ટમક કૅન્સર; CagA જનીન", "D) લ્યુકેમિયા; BCR-ABL જનીન"], "correct": 0, "explanation": "HPV સર્વાઇકલ કૅન્સર સાથે મજબૂત રીતે સંકળાયેલ છે. HPV ના E6 અને E7 જનીન p53 અને RB (રેટિનોબ્લાસ્ટોમા) પ્રોટીનને અક્રિય કરે છે, જે કોષચક્રના નિયંત્રણને ખલેલ પહોંચાડે છે. બાકીના વિકલ્પો અયોગ્ય છે કારણ કે: B) HBx જનીન HBV (હેપેટાઇટિસ B વાયરસ) સાથે સંકળાયેલ છે, C) CagA જનીન હેલિકોબેક્ટર પાયલોરી સાથે સંક ome) ની હાજરી સાથે સંકળાયેલ છે, જે બે વર્ણસૂત્રોના ટ્રાન્સલોકેશન દ્વારા બને છે?", "options": ["A) ક્રોનિક માયલોઇડ લ્યુકેમિયા (CML)", "B) એક્યુટ લિમ્ફોબ્લાસ્ટિક લ્યુકેમિયા (ALL)", "C) બ્રેસ્ટ કૅન્સર", "D) પ્રોસ્ટેટ કૅન્સર"], "correct": 0, "explanation": "ફિલાડેલ્ફિયા વર્ણસૂત્ર (t(9;22)(q34;q11)) ક્રોનિક માયલોઇડ લ્યુકેમિયા (CML) સાથે સંકળાયેલ છે, જ્યાં વર્ણસૂત્ર 9 અને 22 વચ્ચે ટ્રાન્સલોકેશન થાય છે, જે BCR-ABL ફ્યુઝન જનીનનું નિર્માણ કરે છે. બાકીના વિકલ્પો અયોગ્ય છે કારણ કે: B) ALL સાથે ફિલાડેલ્ફિયા વર્ણસૂત્ર સંકળાયેલ હોવા છતાં, તે CML સાથે વધુ મજબૂત રીતે સંકળાયેલ છે, C) બ્રેસ્ટ કૅન્સર અને D) પ્રોસ્ટેટ કૅન્સર સાથે આ વર્ણસૂત્ર સંકળાયેલ નથી.", "ncert_ref": "Class XII - Chapter 8: मानव स्वास्थ्य तथा रोग (માનવ સ્વાસ્થ્ય અને રોગો)", "difficulty": "Hard", "num": 15}, {"question": "નીચેનામાંથી કયો કર્કરોગ (કૅન્સર) નો પ્રકાર 'માયલોઇડ લ્યુકેમિયા' ની જેમ હીમોપોઇટિક કોષોને અસર કરે છે, પરંતુ તે B-કોષોના અતિપ્રસરણ સાથે સંકળાયેલ છે અને સામાન્ય રીતે વૃદ્ધ લોકોમાં જોવા મળે છે?", "options": ["A) ક્રોનિક લિમ્ફોસાઇટિક લ્યુકેમિયા (CLL)", "B) એક્યુટ માયલોઇડ લ્યુકેમિયા (AML)", "C) ક્રોનિક માયલોજેનસ લ્યુકેમિયા (CML)", "D) બર્કિટ લિમ્ફોમા"], "correct": 0, "explanation": "ક્રોનિક લિમ્ફોસાઇટિક લ્યુકેમિયા (CLL) B-કોષોના અતિપ્રસરણ સાથે સંકળાયેલ છે અને સામાન્ય રીતે વૃદ્ધ લોકોમાં જોવા મળે છે. AML અને CML માયલોઇડ કોષોને અસર કરે છે, જ્યારે બર્કિટ લિમ્ફોમા B-કોષોના કૅન્સર છે પરંતુ તે લિમ્ફોમા પ્રકાર છે અને વૃદ્ધ લોકોમાં સામાન્ય નથી.", "ncert_ref": "Class XII - Chapter 8: હ્યુમન હેલ્થ એન્ડ ડિસીઝ", "difficulty": "Hard", "num": 16}, {"question": "કર્કરોગના કોષોમાં 'વોન હિપેલ-લિન્ડૌ સિન્ડ્રોમ' સાથે સંકળાયેલ કયો જનીન મ્યુટેશન થવાથી ટ્યુમર સપ્રેસર ફંક્શન ગુમાવે છે?", "options": ["A) VHL જનીન", "B) BRCA1 જનીન", "C) RB જનીન", "D) APC જનીન"], "correct": 0, "explanation": "વોન હિપેલ-લિન્ડૌ સિન્ડ્રોમ VHL જનીનના મ્યુટેશન સાથે સંકળાયેલ છે, જે ટ્યુમર સપ્રેસર જનીન છે. BRCA1, RB, અને APC પણ ટ્યુમર સપ્રેસર જનીન છે, પરંતુ તેઓ અન્ય સિન્ડ્રોમ અથવા કૅન્સર પ્રકારો સાથે સંકળાયેલ છે.", "ncert_ref": "Class XII - Chapter 8: હ્ય             if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
