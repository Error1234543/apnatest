<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - બીટી કપાસ (Bt Cotton)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>

                <span>📚 બીટી કપાસ (Bt Cotton)</span>

            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>

    <script>
        const questionsData = [{"question": "બીટી કપાસમાં બેક્ટરિયા થી મેળવેલ જીન કયા પ્રોટીનનું ઉત્પાદન કરે છે જે કીટકોને મારી નાખે છે?", "options": ["A) ક્રાયોપ્રોટીન", "B) એન્ડોટોક્સિન", "C) એક્ઝોટોક્સિન", "D) ડેલ્ટા-એન્ડોટોક્સિન"], "correct": 3, "explanation": "બીટી કપાસમાં Bacillus thuringiensis બેક્ટરિયા થી મેળવેલ જીન ડેલ્ટા-એન્ડોટોક્સિન નામનું પ્રોટીન ઉત્પન્ન કરે છે, જે કીટકોના પાચનતંત્રને નુકસાન પહોંચાડીને તેમને મારી નાખે છે. ક્રાયોપ્રોટીન, એન્ડોટોક્સિન અને એક્ઝોટોક્સિન એ બીટી કપાસ સાથે સંબંધિત નથી અથવા કીટકનાશક પ્રોટીન નથી.", "ncert_ref": "Class XII - Chapter 12: જૈવ-તકનીકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 1}, {"question": "બીટી કપાસના પાકમાં કયા કીટકો વિરુદ્ધ પ્રતિરક્ષા મળે છે?", "options": ["A) એફિડ્સ", "B) બોલવર્મ", "C) લીફ હોપર", "D) વ્હાઇટફ્લાય"], "correct": 1, "explanation": "બીટી કપાસ બોલવર્મ (Bollworm) નામના કીટક વિરુદ્ધ પ્રતિરક્ષા આપે છે, જે કપાસના પાકને નુકસાન પહોંચાડે છે. એફિડ્સ, લીફ હોપર અને વ્હાઇટફ્લાય એ બીટી કપાસ દ્વારા નિયંત્રિત થતાં નથી.", "ncert_ref": "Class XII - Chapter 12: જૈવ-તકનીકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 2}, {"question": "બીટી કપાસમાં જીન ક્લોનિંગ માટે કયા પ્લાઝમિડનો ઉપયોગ થાય છે?", "options": ["A) pBR322", "B) Ti પ્લાઝમિડ", "C) pUC19", "D) Ri પ્લાઝમિડ"], "correct": 0, "explanation": "બીટી કપાસમાં જીન ક્લોનિંગ માટે pBR322 પ્લાઝમિડનો ઉપયોગ થાય છે, જે એક સામાન્ય ક્લોનિંગ વાહક છે. Ti પ્લાઝમિડ અને Ri પ્લાઝમિડ એ Agrobacterium દ્વારા વનસ્પતિ જનીન અભિયાંત્રિકી માટે વપરાય છે, જ્યારે pUC19 એ બેક્ટરિયલ ક્લોનિંગ માટે વપરાય છે.", "ncert_ref": "Class XII - Chapter 11: જનીન અભિયાંત્રિકી", "difficulty": "Hard", "num": 3}, {"question": "બીટી કપાસના વિકાસમાં કયા બેક્ટરિયાનું જીન વપરાયું છે?", "options": ["A) Escherichia coli", "B) Bacillus thuringiensis", "C) Agrobacterium tumefaciens", "D) Pseudomonas fluorescens"], "correct": 1, "explanation": "બીટી કપાસના વિકાસમાં Bacillus thuringiensis બેક્ટરિયાનું જીન વપરાયું છે, જે કીટકનાશક પ્રોટીન ઉત્પન્ન કરે છે. Escherichia coli, Agrobacterium tumefaciens અને Pseudomonas fluorescens એ બીટી કપાસ સાથે સંબંધિત નથી.", "ncert_ref": "Class XII - Chapter 12: જૈવ-તકનીકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 4}, {"question": "બીટી કપાસના પાકમાં કયા જીનની હાજરીને કારણે કીટકો પ્રત્યે પ્રતિરોધકતા મળે છે?", "options": ["A) cryIAb", "B) nptII", "C) gus", "D) lacZ"], "correct": 0, "explanation": "બીટી કપાસમાં cryIAb જીનની હાજરીને કારણે કીટકો પ્રત્યે પ્રતિરોધકતા મળે છે, જે Bacillus thuringiensis થી મેળવેલ છે. nptII, gus અને lacZ એ અન્ય જીન છે જે ક્રમશઃ એન્ટિબાયોટિક પ્રતિરોધ, રિપોર્ટર જીન અને બીટા-ગેલેક્ટોઝિડેઝ ઉત્પન્ન કરે છે.", "ncert_ref": "Class XII - Chapter 12: જૈવ-તકનીકી અને તેના ઉપયોગો", "difficulty": "Hard", "num": 5}, {"question": "બીટી કપાસમાં ઉત્પન્ન થતું ક્રાય (Cry) પ્રોટીન કયા અંગમાં સૌથી વધુ સક્રિય થાય છે અને કયા કોષીય ક્રિયાવિધિથી કીટકોને મારે છે?", "options": ["A) પર્ણમાં, કોષના પ્લાઝ્મા પડદાને ભેદી બનાવીને કોષનું વિસ્ફોટન થાય છે", "B) મૂળમાં, મિટોકોન્ડ્રિયામાં શ્વસનને અવરોધીને કોષનું મૃત્યુ થાય છે", "C) ફૂલમાં, કોષકેન્દ્રના DNAને તોડીને અનુવંશિકતાને અસર કરે છે", "D) તણાવમાં, કોષરસમાં રાસાયણિક પ્રતિક્રિયા દ્વારા કીટકના પાચનતંત્રને નિષ્ક્રિય કરે છે"], "correct": 0, "explanation": "બીટી કપાસમાં ઉત્પન્ન થતું Cry પ્રોટીન (ડેલ્ટા-એન્ડોટોક્સિન) મુખ્યત્વે પર્ણમાં સક્રિય થાય છે. તે કીટકના મધ્યાંત્ર (midgut) ના એપિથેલિયલ કોષોના પ્લાઝ્મા પડદાને ભેદી બનાવે છે, જેથી કોષમાં ઓસ્મોટિક અસંતુલન ઉત્પન્ન થાય છે અને કોષનું વિસ્ફોટન થાય છે, જેનાથી કીટક મરે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) Cry પ્રોટીન મૂળમાં સક્રિય થતું નથી અને શ્વસનને અવરોધતું નથી. C) તે ફૂલમાં સક્રિય થતું નથી અને DNAને તોડતું નથી. D) તે તણાવમાં સક્રિય થતું નથી અને પાચનતંત્રને નિષ્ક્રિય કરતું નથી, પરંતુ કોષના પડદાને ભેદી બનાવે છે.", "ncert_ref": "Class XII - Chapter 12: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 6}, {"question": "બીટી કપાસના વિકાસમાં વપરાતા બેક્ટરિયા બેસિલસ થુરિંજિયેન્સિસ (Bacillus thuringiensis) ના કયા સ્ટ્રેનમાંથી Cry1Ac જીન મેળવવામાં આવ્યું છે, અને આ જીન કયા વર્ણસૂત્ર પર સ્થિત છે?", "options": ["A) Bt var. kurstaki, વર્ણસૂત્ર ૧૧", "B) Bt va દ્વારા"], "correct": 0, "explanation": "બીટી કપાસમાં Cry1Ac જીનની હાજરીને કારણે કપાસના છોડમાં કીટકપ્રતિરોધકતાનું સ્તર વધારે છે. આ જીન RNA પોલિમરેઝ ઉત્સેચક દ્વારા નિયંત્રિત થાય છે, જે ટ્રાન્સક્રિપ્શન પ્રક્રિયામાં ભાગ લે છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) Cry2Ab જીન પણ કીટકપ્રતિરોધકતા માટે વપરાય છે, પરંતુ તે DNA પોલિમરેઝ દ્વારા નિયંત્રિત થતું નથી. C) Cry1Ab જીન લાયગેઝ દ્વારા નિયંત્રિત થતું નથી. D) Cry1B જીન રેસ્ટ્રિક્શન એન્ડોન્યુક્લિયેઝ દ્વારા નિયંત્રિત થતું નથી.", "ncert_ref": "Class XII - Chapter 12: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 9}, {"question": "બીટી કપાસના વિકાસમાં વપરાતા પ્લાઝમિડમાં કયા પ્રમોટરનો ઉપયોગ કરવામાં આવે છે, જે કપાસના છોડમાં Cry જીનના ઉચ્ચ સ્તરે અભિવ્યક્તિ માટે જવાબદાર છે?", "options": ["A) CaMV 35S પ્રમોટર", "B) lacZ પ્રમોટર", "C) T7 પ્રમોટર", "D) trp પ્રમોટર"], "correct": 0, "explanation": "બીટી કપાસના વિકાસમાં વપરાતા પ્લાઝમિડમાં CaMV 35S પ્રમોટરનો ઉપયોગ કરવામાં આવે છે, જે કપાસના છોડમાં Cry જીનની ઉચ્ચ સ્તરે અભિવ્યક્તિ માટે જવાબદાર છે. આ પ્રમોટર પ્લાન્ટ વાયરસ (Cauliflower Mosaic Virus) માંથી મેળવવામાં આવ્યો છે અને તે પ્લાન્ટ કોષોમાં સક્રિય થાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) lacZ પ્રમોટર બેક્ટરિયામાં વપરાતો પ્રમોટર છે. C) T7 પ્રમોટર બેક્ટરિયોફેજમાં વપરાતો પ્રમોટર છે. D) trp પ્રમોટર પણ બેક્ટરિયામાં વપરાતો પ્રમોટર છે.", "ncert_ref": "Class XII - Chapter 12: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 10}, {"question": "બીટી કપાસમાં ઉત્પન્ન થતું Cry1Ac પ્રોટીન કીટકના કયા અંગ પર સીધું અસર કરે છે, જેને કારણે કીટકનું મૃત્યુ થાય છે?", "options": ["A) મસ્તિષ્ક (Brain)", "B) આંતરડા (Midgut)", "C) શ્વાસનળી (Trachea)", "D) રક્તપરિભ્રમણ તંત્ર (Circulatory system)"], "correct": 1, "explanation": "બીટી કપાસમાં ઉત્પન્ન થતું Cry1Ac પ્રોટીન કીટકના આંતરડા (Midgut) ની કોષરચનાને નુકસાન પહોંચાડે છે. આ પ્રોટીન આંતરડાના એપિથેલિયલ કોષો સાથે બંધાય છે, જેને કારણે કોષો ફૂલી જાય છે અને ફાટી જાય છે, પરિણામે કીટકનું મૃત્યુ થાય છે. મસ્તિષ્ક, શ્વાસનળી અથવા રક્તપરિભ્રમણ તંત્ર પર આ પ્રોટીનની સીધી અસર થતી નથી.", "ncert_ref": "Class XII - Chapter 12: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 11}, {"question": "બીટી કપાસના વિકાસ દરમિયાન, કયા જીનને કપાસના જીનોમમાં દાખલ કરવા માટે 'ટર્મિનેટર' અનુક્રમ (Terminator sequence) નો ઉપયોગ કરવામાં આવે છે?", "options": ["A) Cry1Ab", "B) Cry2Aa", "C) nptII", "D) 35S પ્રમોટર"], "correct": 2, "explanation": "બીટી કપાસના વિકાસ દરમિયાન, 'nptII' જીનને કપાસના જીનોમમાં દાખલ કરવા માટે 'ટર્મિનેટર' અનુક્રમનો ઉપયોગ કરવામાં આવે છે. આ જીન એન્ટિબાયોટિક પ્રતિરોધકતા (કાનામાઇસિન) માટે જવાબદાર છે, જે પસંદગીના માધ્યમમાં વિકસિત થયેલ કોષોને ઓળખવા માટે ઉપયોગી છે. Cry1Ab અને Cry2Aa કીટકપ્રતિરોધક પ્રોટીન માટેના જીન છે, જ્યારે 35S પ્રમોટર એક પ્રમોટર અનુક્રમ છે.", "ncert_ref": "Class XII - Chapter 12: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 12}, {"question": "બીટી કપાસના પાકમાં, કયા કીટકના લાર્વા પર Cry1Ac પ્રોટીનની અસર સૌથી ઓછી હોવાનું નિરીક્ષણ કરવામાં આવ્યું છે?", "options": ["A) અમેરિકન બોલવર્મ (Helicoverpa armigera)", "B) પિંક બોલવર્મ (Pectinophora gossypiella)", "C) સ્પોડોપ્ટેરા લિટ્ટોરાલિસ (Spodoptera litura)", "D) એફિડ્સ (Aphids)"], "correct": 3, "explanation": "બીટી કપાસમાં ઉત્પન્ન થતું Cry1Ac પ્રોટીન મુખ્યત્વે લેપિડોપ્ટેરન કીટકો (જેવા કે અમેરિકન બોલવર્મ, પિંક બોલવર્મ, અને સ્પોડોપ્ટેરા) પર અસર કરે છે. એફિડ્સ (Aphids) હેમિપ્ટેરા કુળના છે, અને તેમના પર Cry1Ac પ્રોટીનની અસર સૌથી ઓછી હોવાનું નિરીક્ષણ કરવામાં આવ્યું છે.", "ncert_ref": "Class XII - Chapter 12: જૈવ-તકનીકી (Biotechnology)", "difficulty": "Hard", "num": 13}, {"question": "બીટી કપાસના પાકમાં, કયા પર્યાવરણીય પરિબળને કારણે Cry પ્રોટીનની અસરકારકતા ઘટી શકે છે?", "options": ["A) ઉચ્ચ તાપમાન (High temperature)", "B) ઓછી આર્દ્રતા (Low humidity)", "C) મૃદાના pHમાં વધારો (Increase in soil pH)", "D) વરસાદની અછત (Lack of rainfall)"], "correct": 0, "explanation": "બીટી કપાસમાં ઉત્પન્ન થતું Cry પ્રોટીન ઉચ્ચ તાપમાન પર અસ્થિર બની શકે છે, જેને કારણે તેની કીટકપ્રતિરોધક અસરકારકતા ઘટી શકે છે. ઓછી આર્દ્રતા, મૃદાના pHમાં વધારો અથવા વરસાદની અછતનો Cry પ્રોટીનની અસરકારકતા પર સીધો પ્રભાવ પડતો નથી.", "ncert_ref":         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
