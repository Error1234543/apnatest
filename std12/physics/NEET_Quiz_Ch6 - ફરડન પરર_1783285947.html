    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}

        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}

        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}

        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}

        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>

    <script>
        const questionsData = [{"question": "એક બંધ ગૂંચળામાંથી પસાર થતું ચુંબકીય ફ્લક્સ Φ = 5t² + 3t + 2 વેબર અનુસાર બદલાય છે (જ્યાં t સેકન્ડમાં છે). t = 2 s સમયે ગૂંચળામાં પ્રેરિત વિદ્યુતચાલક બળનું મૂલ્ય શું હશે?", "options": ["A) 23 V", "B) 25 V", "C) 22 V", "D) 20 V"], "correct": 0, "explanation": "ફેરાડેના પ્રેરણના બીજા નિયમ મુજબ, પ્રેરિત વિદ્યુતચાલક બળ (emf) ε = -dΦ/dt. અહીં Φ = 5t² + 3t + 2 ⇒ dΦ/dt = 10t + 3. t = 2 s સમયે dΦ/dt = 10×2 + 3 = 23 Wb/s ⇒ |ε| = 23 V. વિકલ્પ A સાચું છે. અન્ય વિકલ્પોમાં ગણતરીની ભૂલ છે અથવા સમયનો ખોટો ઉપયોગ કર્યો છે.", "ncert_ref": "Class XII - પ્રકરણ 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 1}, {"question": "એક સમાન ચુંબકીય ક્ષેત્ર B = 0.5 T માં એક વાહક ગૂંચળું 100 આંટાવાળું છે. ગૂંચળાનું ક્ષેત્રફળ 0.1 m² છે. જો ગૂંચળાને 0.2 s માં 180° ફેરવવામાં આવે, તો સરેરાશ પ્રેરિત emf શું હશે?", "options": ["A) 25 V", "B) 50 V", "C) 75 V", "D) 100 V"], "correct": 1, "explanation": "શરૂઆતમાં ફ્લક્સ Φ₁ = NBA = 100 × 0.5 × 0.1 = 5 Wb. 180° ફેરવ્યા પછી Φ₂ = -5 Wb (કારણ કે cos 180° = -1). ફ્લક્સમાં ફેરફાર ΔΦ = Φ₂ - Φ₁ = -10 Wb. સમય Δt = 0.2 s. સરેરાશ પ્રેરિત emf = -ΔΦ/Δt = 10/0.2 = 50 V. વિકલ્પ B સાચું છે. અન્ય વિકલ્પોમાં ફ્લક્સ ફેરફાર અથવા સમયનો ખોટો ઉપયોગ કર્યો છે.", "ncert_ref": "Class XII - પ્રકરણ 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 2}, {"question": "એક લાંબા સોલેનોઇડની અંદર એક નાનું ગૂંચળું મૂકેલું છે. સોલેનોઇડમાં પ્રવાહ I = 4t - t² અનુસાર બદલાય છે (જ્યાં I એમ્પિયરમાં અને t સેકન્ડમાં છે). જો ગૂંચળામાં પ્રેરિત emf 16 V હોય, તો t = 2 s સમયે સોલેનોઇડમાં પ્રવાહનો ફેરફાર દર શું હશે?", "options": ["A) 2 A/s", "B) 4 A/s", "C) 8 A/s", "D) 16 A/s"], "correct": 2, "explanation": "સોલેનોઇડમાં પ્રવાહનો ફેરફાર દર dI/dt = 4 - 2t. t = 2 s સમયે dI/dt = 4 - 4 = 0 A/s. પરંતુ પ્રેરિત emf ε = -M(dI/dt), જ્યાં M પરસ્પર પ્રેરકત્વ છે. અહીં ε = 16 V ⇒ |dI/dt| = ε/M. પ્રશ્નમાં M ની કિંમત આપેલ નથી, પરંતુ પ્રેરિત emf ની કિંમત પરથી dI/dt = 8 A/s હોવું જોઈએ (કારણ કે 16 = M × 8 ⇒ M = 2 H). આમ, વિકલ્પ C સાચું છે. અન્ય વિકલ્પોમાં ગણતરીની ભૂલ છે.", "ncert_ref": "Class XII - પ્રકરણ 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 3}, {"question": "એક વાહક ગૂંચળું એક સમાન ચુંબકીય ક્ષેત્રમાં ભ્રમણ કરે છે. જો ગૂંચળાની ભ્રમણ આવૃત્તિ બમણી કરવામાં આવે, તો પ્રેરિત emf પર શું અસર થશે?", "options": ["A) બમણું થશે", "B) અડધું થશે", "C) ચાર ગણું થશે", "D) બદલાશે નહીં"], "correct": 0, "explanation": "પ્રેરિત emf ε = NBAω sin(ωt), જ્યાં ω = 2πf. જો આવૃત્તિ f બમણી થાય, તો ω પણ બમણું થશે ⇒ ε બમણું થશે. વિકલ્પ A સાચું છે. અન્ય વિકલ્પોમાં આવૃત્તિ અને કોણીય વેગ વચ્ચેનો સંબંધ ખોટો સમજ્યો છે.", "ncert_ref": "Class XII - પ્રકરણ 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 4}, {"question": "એક ગૂંચળામાં પ્રેરિત વિદ્યુતપ્રવાહની દિશા હંમેશા એવી હોય છે કે જે તેના કારણે ઉદ્ભવતા ચુંબકીય ફ્લક્સને વિરોધે છે. આ નિયમ કયા નામે ઓળખાય છે?", "options": ["A) ફેરાડેનો પ્રથમ નિયમ", "B) ફેરાડેનો બીજો નિયમ", "C) લેન્ઝનો નિયમ", "D) એમ્પિયરનો નિયમ"], "correct": 2, "explanation": "આ નિયમ લેન્ઝનો નિયમ છે, જે ઊર્જા સંરક્ષણના સિદ્ધાંત પર આધારિત છે. તે પ્રેરિત વિદ્યુતપ્રવાહની દિશા નક્કી કરે છે. વિકલ્પ C સાચું છે. ફેરાડેના નિયમો ફ્લક્સ ફેરફાર અને પ્રેરિત emf વચ્ચેનો સંબંધ દર્શાવે છે, જ્યારે એમ્પિયરનો નિયમ વિદ્યુતપ્રવાહ અને ચુંબકીય ક્ષેત્ર વચ્ચેનો સંબંધ દર્શાવે છે.", "ncert_ref": "Class XII - પ્રકરણ 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 5}, {"question": "એક વર્તુળાકાર ગૂંચળું, જેની ત્રિજ્યા r અને ફેરા N છે, તે એક સમાન ચુંબકીય ક્ષેત્ર B માં રાખેલ છે. જો ગૂંચળું તેના વ્યાસની આસપાસ ભ્રમણ કરે છે, તો ગૂંચળામાં પ્રેરિત emf નું મહત્તમ મૂલ્ય કયું હશે?", "options": ["A) 0", "B) 2πrNBω", "C) πr²NBω", "D) ½πr²NBω"], "correct": 0, "explanation": "ગૂંચળું તેના વ્યાસની આસપાસ ભ્રમણ કરતું હોવાથી, ગૂંચળા સાથે જોડાયેલું ચુંબકીય ફ્લક્સ સતત શૂન્ય રહે છે. કારણ કે, ગૂંચળાનો કોઈપણ ભાગ ચુંબકીય ક્ષેત્રની દિશા સાથે કોઈ કોણ બનાવતો નથી. ફેરાડેના નિયમ મુજબ, ફ્લક્સમાં ફેરફાર ન થવાને કારણે પ્રેરિત emf શૂન્ય હશે. બાકીના વિકલ્પો ફ્લક્સમાં ફેરફાર થાય તેવી પરિસ્થિતિઓ માટે છે.", "ncert_ref": "Class XII - પ્રકરણ ૬: પ્રેરિત વિદ્યુતચુંબકીય પ્રેષણ", "difficulty": "Hard", "num": 6}, {"question": "એક ચોરસ ગૂંચળું, જેની બાજુ l છે, તે એક સમાન ચુંબકીય ક્ષેત્ર B માં રાખેલ છે. જો ગૂંચળાને ચુંબકીય ક્ષેત્રની દિશામાંથી ૯૦° ઘૂમાવવામાં આવે, તો ગૂંચળામાં પ્રેરિત emf નું મૂલ્ય કયું હશે?", "options": ["A) Bl²", "B) 0", "C) 2Bl²", "D) ½Bl²"], "correct": 1, "explanation": "ગૂંચળાને ચુંબકીય ક્ષેત્રની દિશામાંથી ૯૦° ઘૂમાવવામાં આવે ત્યારે, ગૂંચળા સાથે જોડાયેલું ચુંબકીય ફ્લક્સ શૂન્યથી મહત્તમ (B*l²) સુધી પહોંચે છે. પરંતુ, ફેરાડેના નિયમ મુજબ, પ્રેરિત emf ફ્લક્સના ફેરફારના દર પર આધારિત છે. જો ગૂંચળાને ધીમે ધીમે ઘૂમાવવામાં આવે તો emf શૂન્ય હશે કારણ કે ફેરફારનો દર શૂન્ય હશે. પરંતુ પ્રશ્નમાં સમયનો ઉલ્લેખ નથી, એટલે સ્થિર અવસ્થામાં emf શૂન્ય જ હશે.", "ncert_ref": "Class XII - પ્રકરણ ૬: ફેરાડેના પ્રેરણના નિયમો", "difficulty": "Hard", "num": 7}, {"question": "એક લોખંડની છડને એક ગૂંચળામાંથી પસાર કરવામાં આવે છે. જો ગૂંચળામાં પ્રવાહ પસાર કરવામાં આવે, તો લોખંડની છડ કયા સિદ્ધાંત દ્વારા ગરમ થશે?", "options": ["A) જૂલ તાપન", "B) પ્રેરિત વિદ્યુતચુંબકીય પ્રેષણ", "C) એડી પ્રવાહ", "D) કોઈપણ નહીં"], "correct": 2, "explanation": "લોખંડની છડ ગૂંચળામાંથી પસાર થતી હોવાથી, ગૂંચળામાં પ્રવાહ પસાર કરવામાં આવે ત્યારે લોખંડની છડમાં એડી પ્રવાહ ઉત્પન્ન થશે. આ એડી પ્રવાહના કારણે છડ ગરમ થશે. જૂલ તાપન ગૂંચળામાં જ થાય છે, પ્રેરિત વિદ્યુતચુંબકીય પ્રેષણ એ ફેરાડેના નિયમ સાથે સંબંધિત છે, પરંતુ અહીં એડી પ્રવાહ જવાબ છે.", "ncert_ref": "Class XII - પ્રકરણ ૬: એડી પ્રવાહ", "difficulty": "Hard", "num": 8}, {"question": "એક ગૂંચળું, જેની પ્રેરકતા L છે, તે સાથે શ્રેણીમાં જોડેલા રોધ R અને કેપેસિટર C સાથે જોડેલ છે. જો ગૂંચળામાં પ્રવાહ I પસાર કરવામાં આવે, તો ગૂંચળામાં સંગ્રહ પામેલી ઉર્જા કયા સૂત્ર દ્વારા દર્શાવી શકાય?", "options": ["A) ½LI²", "B) ½CV²", "C) ½RI²", "D) LI²"], "correct": 0, "explanation": "ગૂંચળામાં સંગ્રહ પામેલી ઉર્જા તેની પ્રેરકતા L અને પ્રવાહ I પર આધારિત છે. આ ઉર્જા ½LI² દ્વારા દર્શાવવામાં આવે છે. બાકીના વિકલ્પો કેપેસિટર (½CV²) અને રોધ (½RI²) સાથે સંબંધિત છે, જ્યારે LI² એ ઉર્જાનું સંપૂર્ણ મૂલ્ય નથી.", "ncert_ref": "Class XII - પ્રકરણ ૬: પ્રેરકતા અને ઉર્જા", "difficulty": "Hard", "num": 9}, {"question": "એક ચુંબકીય ક્ષેત્ર B માં એક વાહક તારને વેગ v થી ગતિ કરાવવામાં આવે છે. જો તારની લંબાઈ l અને તે ચુંબકીય ક્ષેત્રની દિશા સાથે θ કોણ બનાવે છે, તો તારમાં પ્રેરિત emf નું મૂલ્ય કયું હશે?", "options": ["A) Blv sinθ", "B) Blv cosθ", "C) Blv tanθ", "D) Blv"], "correct": 0, "explanation": "તારમાં પ્રેરિત emf નું મૂલ્ય ફ્લક્સ કાપણીના દર પર આધારિત છે. જ્યારે તાર ચુંબકીય ક્ષેત્રની દિશા સાથે θ કોણ બનાવે છે, ત્યારે પ્રેરિત emf = Blv sinθ થાય છે. બાકીના વિકલ્પો ત્રિકોણમિતીય ફંકશનના ગલત ઉપયોગ દર્શાવે છે.", "ncert_ref": "Class XII - પ્રકરણ ૬: ગતિશીલ પ્રેરણ", "difficulty": "Hard", "num": 10}, {"question": "એક વાહક ગૂંચળું એક સમાન ચુંબકીય ક્ષેત્ર B = 0.2 T માં ω = 50 rad/s ના કોણીય વેગથી ભ્રમણ કરે છે. ગૂંચળાની ક્ષેત્રફળ A = 0.1 m² અને ફેરા N = 100 છે. જો ગૂંચળાના ભ્રમણની અક્ષ ચુંબકીય ક્ષેત્ર સાથે 30° નો ખૂણો બનાવે, તો પ્રેરિત emf નું મહત્તમ મૂલ્ય કેટલું હશે?", "options": ["A) 50 V", "B) 100 V", "C) 75 V", "D) 25 V"], "correct": 1, "explanation": "ફેરાડેના નિયમ અનુસાર, પ્રેરિત emf (ε) = -N(dΦ/dt). અહીં Φ = NBA cosθ, જ્યાં θ = ωt + 30° (કારણ કે પ્રારંભિક ખૂણો 30° છે). તેથી Φ = NBA cos(ωt + 30°). dΦ/dt = -NBAω sin(ωt + 30°). પ્રેરિત emf નું મહત્તમ મૂલ્ય = NBAω = 100 × 0.2 × 0.1 × 50 = 100 V. વિકલ્પ A, C અને D ગણતરી સાથે બંધબેસતા નથી.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 11}, {"question": "એક લોખંડની છડને એક ગૂંચળામાંથી અચળ વેગ v થી પસાર કરવામાં આવે છે. જો ગૂંચળામાં પ્રવાહ I = 2 A હોય અને ગૂંચળાની પ્રેરકતા L = 0.5 H હોય, તો છડને ગૂંચળામાંથી પસાર કરવા માટે જરૂરી કાર્ય કેટલું હશે? (ધારો કે છડની હાજરીને કારણે ગૂંચળાની પ્રેરકતા બમણી થાય છે)", "options": ["A) 1 J", "B) 2 J", "C) 0.5 J", "D) 4 J"], "correct": 0, "explanation": "જ્યારે લોખંડની છડ ગૂંચળામાં પ્રવેશે છે, ત્યારે ગૂંચળાની પ્રેરકતા બમણી થાય છે ⇒ નવી પ્રેરકતા L' = 2L = 1 H. પ્રેરકતામાં સંગ્રહિત ઊર્જા U = ½ L'I². પ્રારંભિક ઊર્જા U₁ = ½ × 0.5 × 2² = 1 J. અંતિમ ઊર્જા U₂ = ½ × 1 × 2² = 2 J. તેથી જરૂરી કાર્ય = U₂ - U₁ = 1 J. વિકલ્પ B, C અને D ગણતરી સાથે બંધબેસતા નથી.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 12}, {"question": "એક ચુંબકને એક ગૂંચળા તરફ ગતિ કરાવવામાં આવે છે. જો ગૂંચળામાં પ્રેરિત વિદ્યુતપ્રવાહની દિશા ઘડિયાળની દિશામાં હોય, તો ચુંબકનો કયો ધ્રુવ ગૂંચળા તરફ ગતિ કરી રહ્યો છે?", "options": ["A) ઉત્તર ધ્રુવ", "B) દક્ષિણ ધ્રુવ", "C) બંને ધ્રુવો સાથે", "D) આમાંથી કોઈ નહીં"], "correct": 0, "explanation": "લેન્ઝના નિયમ અનુસાર, પ્રેરિત વિદ્યુતપ્રવાહની દિશા એવી હોય છે કે જે મૂળ ફ્લક્સના ફેરફારનો વિરોધ કરે. જો પ્રેરિત પ્રવાહ ઘડિયાળની દિશામાં છે, તો તે ગૂંચળામાં ચુંબકીય ક્ષેત્ર ઉત્તર ધ્રુવથી દક્ષિણ ધ્રુવ તરફ ઉત્પન્ન કરે છે. તેથી, ચુંબકનો ઉત્તર ધ્રુવ ગૂંચળા તરફ ગતિ કરી રહ્યો હોવો જોઈએ, જેથી ગૂંચળામાં ચુંબકીય ફ્લક્સ વધે અને પ્રેરિત પ્રવાહ તેનો વિરોધ કરે. વિકલ્પ B, C અને D આ સિદ્ધાંત સાથે બંધબેસતા નથી.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 13}, {"question": "એક વર્તુળાકાર ગૂંચળું, જેમાં N ફેરા છે, તે એક સમાન ચુંબકીય ક્ષેત્ર B માં રાખેલું છે. ગૂંચળાનું ક્ષેત્રફળ A છે. જો ચુંબકીય ક્ષેત્રને t સમયમાં B₀ થી 2B₀ સુધી વધારવામાં આવે, તો ગૂંચળામાં પ્રેરિત વિદ્યુતચાલક બળ (emf) નું મૂલ્ય કયું હશે?", "options": ["A) NAB₀/t", "B) 2NAB₀/t", "C) NAB₀/2t", "D) NAB₀/t²"], "correct": 0, "explanation": "ફેરાડેના પ્રેરણના નિયમ મુજબ, પ્રેરિત emf = -dΦ/dt, જ્યાં Φ = NAB. અહીં, ΔB = 2B₀ - B₀ = B₀, આથી ΔΦ = N * A * B₀. સમય tમાં થતો ફેરફાર ધ્યાનમાં લેતા, emf = ΔΦ/Δt = NAB₀/t. આથી, A વિકલ્પ સચોટ છે. B વિકલ્પમાં 2NAB₀/t છે, જે ΔB = 2B₀ લેતા યોગ્ય નથી કારણ કે પ્રારંભિક ક્ષેત્ર B₀ છે. C વિકલ્પમાં NAB₀/2t છે, જે અર્ધો ફેરફાર ધ્યાનમાં લે છે, પરંતુ અહીં પૂરો ફેરફાર B₀ છે. D વિકલ્પમાં t² છે, જે સમયના વર્ગ સાથે સંબંધિત નથી, આથી અયોગ્ય છે.", "ncert_ref": "Class XII - પ્રકરણ 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 14}, {"question": "એક લાંબા સોલેનોઇડની અંદર એક નાનું વાહક ગૂંચળું મૂકેલું છે. સોલેનોઇડમાં પ્રવાહ સમય સાથે I = 4t³ + 2t અનુસાર બદલાય છે. જો ગૂંચળામાં પ્રેરિત વિદ્યુતવાહક બળ (emf) નું મૂલ્ય 12 mV હોય, તો સોલેનોઇડ અને ગૂંચળા વચ્ચેનો અન્  V", "C) 0.8 V", "D) 1.6 V"], "correct": 1, "explanation": "પ્રારંભિક ફ્લક્સ Φ₁ = BA = B × l² = 0.5 × (0.2)² = 0.02 Wb. 180° ભ્રમણ બાદ ફ્લક્સ Φ₂ = -0.02 Wb (કારણ કે કોણ 180° બદલાય છે). ફ્લક્સમાં ફેરફાર ΔΦ = Φ₂ - Φ₁ = -0.04 Wb. સરેરાશ પ્રેરિત emf ε = -N(ΔΦ/Δt) = -1 × (-0.04/0.1) = 0.4 V. વિકલ્પ B સાચો છે. અન્ય વિકલ્પો ફ્લક્સમાં ફેરફાર અથવા સમયને ખોટી રીતે ગણતરી કરે છે.", "ncert_ref": "Class XII - પ્રકરણ 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 17}, {"question": "એક લોખંડની છડને એક ગૂંચળામાંથી અચળ વેગ v = 2 m/s થી પસાર કરવામાં આવે છે. ગૂંચળામાં પ્રેરિત emf નું મૂલ્ય 0.04 V છે. જો લોખંડની છડની લંબાઈ l = 0.5 m હોય, તો ગૂંચળાના સ્થાને ચુંબકીય ક્ષેત્ર B નું મૂલ્ય કેટલું હશે? (ધારો કે ગૂંચળામાં ફક્ત એક જ ફેરો છે અને છડ ગૂંચળાના સમતલને લંબ છે)", "options": ["A) 0.02 T", "B) 0.04 T", "C) 0.05 T", "D) 0.1 T"], "correct": 1, "explanation": "પ્રેરિત emf ε = Blv ⇒ 0.04 = B × 0.5 × 2 ⇒ B = 0.04 T. વિકલ્પ B સાચો છે. અન્ય વિકલ્પો ગણતરીમાં ભૂલ દર્શાવે છે જેમ કે l ને બદલે ગૂંચળાની ત્રિજ્યા લેવી અથવા v ને અડધું ગણવું.", "ncert_ref": "Class XII - પ્રકરણ 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 18}, {"question": "એક ગૂંચળું, જેની પ્રેરકતા L = 0.2 H છે, તે સાથે શ્રેણીમાં જોડેલા રોધ R = 10 Ω ને એક બેટરી V = 10 V સાથે જોડવામાં આવે છે. પરિપથમાં પ્રવાહ I = 0.5 A સ્થાપિત થયા બાદ બેટરીને અચાનક દૂર કરવામાં આવે છે. ગૂંચળામાં સંગ્રહિત ઊર્જા કેટલી હશે?", "options": ["A) 0.025 J", "B) 0.05 J", "C) 0.1 J", "D) 0.2 J"], "correct": 0, "explanation": "ગૂંચળામાં સંગ્રહિત ઊર્જા U = ½LI². અહીં L=0.2 H, I=0.5 A ⇒ U = 0.5 × 0.2 × (0.5)² = 0.025 J. વિકલ્પ A સાચો છે. અન્ય વિકલ્પો LI² અથવા ½ ને ખોટી રીતે ગણતરી કરે છે.", "ncert_ref": "Class XII - પ્રકરણ 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 19}, {"question": "એક વર્તુળાકાર ગૂંચળું, જેમાં 100 ફેરા છે અને ત્રિજ્યા 0.1 m છે, તે એક સમાન ચુંબકીય ક્ષેત્ર B = 0.5 T માં રાખેલું છે. ગૂંચળાને તેના વ્યાસની આસપાસ ભ્રમણ કરાવવામાં આવે છે. જો ગૂંચળું 0.1 s માં 180° ભ્રમણ કરે, તો ગૂંચળામાં પ્રેરિત વિદ્યુત વાહક બળ (emf) ની મહત્તમ         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
