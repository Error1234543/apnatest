    <style>

        .question-card:nth-child(4){animation-delay:.3s}

        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}

        .option.selected{border-color:#667eea;background:#eef0ff}

        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}

        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}

        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}

        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>

    <script>
        const questionsData = [{"question": "કોષકેન્દ્રની રચનામાં પ્રોટોન અને ન્યુટ્રોનની ભૂમિકા વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) પ્રોટોન અને ન્યુટ્રોન બંને કોષકેન્દ્રના કોષરસમાં મુક્ત અવસ્થામાં રહે છે.", "B) પ્રોટોન અને ન્યુટ્રોન કોષકેન્દ્રના ન્યુક્લિયોપ્લાઝમમાં DNA સાથે જોડાયેલા હોય છે.", "C) પ્રોટોન અને ન્યુટ્રોન કોષકેન્દ્રની રચનામાં સીધી ભૂમિકા ભજવતા નથી, પરંતુ તેઓ અણુના કેન્દ્રમાં જોવા મળે છે.", "D) પ્રોટોન અને ન્યુટ્રોન કોષકેન્દ્રની રચનામાં હાજર નથી, પરંતુ તેઓ કોષરસમાં જોવા મળે છે."], "correct": 2, "explanation": "પ્રોટોન અને ન્યુટ્રોન એ અણુના કેન્દ્ર (ન્યુક્લિયસ)ની રચનાનો ભાગ છે, પરંતુ કોષકેન્દ્ર (ન્યુક્લિયસ) એ કોષનો અંગ છે. કોષકેન્દ્રમાં પ્રોટોન અને ન્યુટ્રોન હાજર નથી, પરંતુ તેઓ અણુના ન્યુક્લિયસમાં જોવા મળે છે. આથી, વિધાન C સત્ય છે. A, B, અને D વિધાનો ખોટા છે કારણ કે પ્રોટોન અને ન્યુટ્રોન કોષકેન્દ્રમાં હાજર નથી.", "ncert_ref": "Class XI - Chapter 13: કોષકેન્દ્રની રચના", "difficulty": "Hard", "num": 1}, {"question": "કોષકેન્દ્રમાં ન્યુક્લિયોપ્લાઝમ વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) ન્યુક્લિયોપ્લાઝમ કોષકેન્દ્રના અંદરના દ્રવ્ય છે જે DNA, RNA, અને પ્રોટીન ધરાવે છે.", "B) ન્યુક્લિયોપ્લાઝમમાં કોષકેન્દ્રીય રેટિક્યુલમ હાજર હોય છે.", "C) ન્યુક્લિયોપ્લાઝમમાં વર્ણસૂત્રો હાજર હોય છે.", "D) ન્યુક્લિયોપ્લાઝમ કોષકેન્દ્રની આજુબાજુના કોષરસથી અલગ પડે છે."], "correct": 1, "explanation": "ન્યુક્લિયોપ્લાઝમ કોષકેન્દ્રના અંદરના દ્રવ્ય છે જે DNA, RNA, અને પ્રોટીન ધરાવે છે, પરંતુ કોષકેન્દ્રીય રેટિક્યુલમ કોષરસમાં જોવા મળે છે, નહીં કે ન્યુક્લિયોપ્લાઝમમાં. આથી, વિધાન B ખોટું છે. A, C, અને D વિધાનો સત્ય છે.", "ncert_ref": "Class XI - Chapter 13: કોષકેન્દ્રની રચના", "difficulty": "Hard", "num": 2}, {"question": "કોષકેન્દ્રની રચનામાં નીચેનામાંથી કયું અંગ હાજર નથી?", "options": ["A) ન્યુક્લિયર લેમિના", "B) ન્યુક્લિયર પોર", "C) ન્યુક્લિયોસોમ", "D) માઇટોકોન્ડ્રિયા"], "correct": 3, "explanation": "માઇટોકોન્ડ્રિયા કોષકેન્દ્રની રચનાનો ભાગ નથી, પરંતુ તે કોષરસમાં જોવા મળે છે. ન્યુક્લિયર લેમિના, ન્યુક્લિયર પોર, અને ન્યુક્લિયોસોમ કોષકેન્દ્રની રચનાનો ભાગ છે. આથી, D વિધાન સત્ય છે.", "ncert_ref": "Class XI - Chapter 13: કોષકેન્દ્રની રચના", "difficulty": "Hard", "num": 3}, {"question": "કોષકેન્દ્રની રચનામાં ન્યુક્લિયર પોરની ભૂમિકા વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) ન્યુક્લિયર પોર કોષકેન્દ્ર અને કોષરસ વચ્ચેના પદાર્થના વહનને રોકે છે.", "B) ન્યુક્લિયર પોર કોષકેન્દ્ર અને કોષરસ વચ્ચેના પદાર્થના વહનને સરળ બનાવે છે.", "C) ન્યુક્લિયર પોર કોષકેન્દ્રના કદને નિયંત્રિત કરે છે.", "D) ન્યુક્લિયર પોર કોષકેન્દ્રની રચનામાં કોઈ ભૂમિકા ભજવતા નથી."], "correct": 1, "explanation": "ન્યુક્લિયર પોર કોષકેન્દ્ર અને કોષરસ વચ્ચેના પદાર્થના વહનને સરળ બનાવે છે. આથી, વિધાન B સત્ય છે. A, C, અને D વિધાનો ખોટા છે કારણ કે ન્યુક્લિયર પોર વહનને રોકતા નથી, કોષકેન્દ્રના કદને નિયંત્રિત કરતા નથી, અને તેઓ કોષકેન્દ્રની રચનામાં મહત્વપૂર્ણ ભૂમિકા ભજવે છે.", "ncert_ref": "Class XI - Chapter 13: કોષકેન્દ્રની રચના", "difficulty": "Hard", "num": 4}, {"question": "કોષકેન્દ્રમાં DNAની રચના વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) DNA કોષકેન્દ્રમાં વર્ણસૂત્રોના રૂપમાં હાજર હોય છે.", "B) DNA કોષકેન્દ્રમાં ન્યુક્લિયોપ્લાઝમમાં મુક્ત અવસ્થામાં હાજર હોય છે.", "C) DNA કોષકેન્દ્રમાં હિસ્ટોન પ્રોટીન સાથે જોડાયેલા હોય છે.", "D) DNA કોષકેન્દ્રમાં RNA સાથે જોડાયેલા હોય છે."], "correct": 1, "explanation": "DNA કોષકેન્દ્રમાં વર્ણસૂત્રોના રૂપમાં હાજર હોય છે અને હિસ્ટોન પ્રોટીન સાથે જોડાયેલા હોય છે, પરંતુ તે ન્યુક્લિયોપ્લાઝમમાં મુક્ત અવસ્થામાં હાજર નથી. આથી, વિધાન B ખોટું છે. A, C, અને D વિધાનો સત્ય છે.", "ncert_ref": "Class XI - Chapter 13: કોષકેન્દ્રની રચના", "difficulty": "Hard", "num": 5}, {"question": "એક પ્રયોગમાં, વૈજ્ઞાનિકોએ એક કોષકેન્દ્રમાંથી તમામ ન્યુટ્રોન દૂર કર્યા. આ ફેરફારને કારણે કોષકેન્દ્રની કઈ લાક્ષણિકતા પર સૌથી વધુ અસર પડશે?", "options": ["A) કોષકેન્દ્રનો પરમાણુ ક્રમાંક", "B) કોષકેન્દ્રનો પરમાણુ દળાંક", "C) કોષકેન્દ્રનો વિદ્યુતભાર", "D) કોષકેન્દ્રમાં રહેલા પ્રોટીનની સંખ્યા"], "correct": 1, "explanation": "સાચો જવાબ B છે કારણ કે ન્યુટ્રોનનું દળ પરમાણુ દળાંકમાં મુખ્ય યોગદાન આપે છે. ન્યુટ્રોન દૂર કરવાથી પરમાણુ દળાંકમાં નોંધપાત્ર ઘટાડો થશે. A ખોટું છે કારણ કે પરમાણુ ક્રમાંક પ્રોટોનની સંખ્યા પર આધારિત છે, ન્યુટ્રોન પર નહીં. C ખોટું છે કારણ કે ન્યુટ્રોન વિદ્યુતભારરહિત હોય છે, તેથી વિદ્યુતભાર પર કોઈ અસર નહીં થાય. D ખોટું છે કારણ કે પ્રોટીનની સંખ્યા ન્યુટ્રોન સાથે સીધી રીતે સંબંધિત નથી.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 13: કોષકેન્દ્રની રચના અને કાર્ય", "difficulty": "Hard", "num": 6}, {"question": "એક વિશિષ્ટ તત્વના કોષકેન્દ્રમાં 17 પ્રોટોન અને 18 ન્યુટ્રોન છે. આ તત્વના સમસ્થાનિકમાં ન્યુટ્રોનની સંખ્યા 20 છે. આ બંને સમસ્થાનિકો માટે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) બંને સમસ્થાનિકોનો પરમાણુ ક્રમાંક સમાન છે", "B) બંને સમસ્થાનિકોના રાસાયણિક ગુણધર્મો સમાન છે", "C) બંને સમસ્થાનિકોનું પરમાણુ દળ સમાન છે", "D) બંને સમસ્થાનિકોના કોષકેન્દ્રમાં પ્રોટોનની સંખ્યા સમાન છે"], "correct": 2, "explanation": "સાચો જવાબ C છે કારણ કે સમસ્થાનિકોમાં ન્યુટ્રોનની સંખ્યા અલગ હોવાથી તેમનું પરમાણુ દળ અલગ હોય છે. A સાચું છે કારણ કે પરમાણુ ક્રમાંક પ્રોટોનની સંખ્યા પર આધારિત છે, જે બંનેમાં સમાન છે. B સાચું છે કારણ કે રાસાયણિક ગુણધર્મો ઇલેક્ટ્રોન પર આધારિત છે, જે પ્રોટોનની સંખ્યા પર આધારિત છે. D સાચું છે કારણ કે પ્રોટોનની સંખ્યા બંનેમાં સમાન છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 13: કોષકેન્દ્રની રચના અને સમસ્થાનિકો", "difficulty": "Hard", "num": 7}, {"question": "એક કોષકેન્દ્રમાં પ્રોટોન અને ન્યુટ્રોનનું પ્રમાણ 1:1.2 છે. જો આ કોષકેન્દ્રમાં કુલ 110 ન્યુક્લિયોન હોય, તો આ તત્વનો પરમાણુ ક્રમાંક કેટલો હશે?", "options": ["A) 45", "B) 50", "C) 55", "D) 60"], "correct": 1, "explanation": "સાચો જવાબ B છે. પ્રોટોન અને ન્યુટ્રોનનું પ્રમાણ 1:1.2 છે, એટલે કે કુલ ન્યુક્લિયોનમાં પ્રોટોનનું પ્રમાણ 1/(1+1.2) = 1/2.2 છે. કુલ ન્યુક્લિયોન 110 છે, તેથી પ્રોટોનની સંખ્યા = 110 × (1/2.2) = 50. પરમાણુ ક્રમાંક પ્રોટોનની સંખ્યા બરાબર હોય છે, તેથી તે 50 છે. A, C, અને D ખોટા છે કારણ કે ગણતરી મુજબ પ્રોટોનની સંખ્યા 50 છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 13: કોષકેન્દ્રની રચના અને પરમાણુ ક્રમાંક", "difficulty": "Hard", "num": 8}, {"question": "નીચેનામાંથી કયું વિધાન કોષકેન્દ્રમાં પ્રોટોન અને ન્યુટ્રોનની ભૂમિકા વિશે ખોટું છે?", "options": ["A) પ્રોટોન કોષકેન્દ્રને ધન વિદ્યુતભાર આપે છે", "B) ન્યુટ્રોન કોષકેન્દ્રમાં સ્થિરતા જાળવવામાં મદદ કરે છે", "C) પ્રોટોનની સંખ્યા તત્વના રાસાયણિક ગુણધર્મો નક્કી કરે છે", "D) ન્યુટ્રોનની સંખ્યા કોષકેન્દ્રના કદને અસર કરતી નથી"], "correct": 3, "explanation": "સાચો જવાબ D છે કારણ કે ન્યુટ્રોનની સંખ્યા કોષકેન્દ્રના કદ અને દળ પર અસર કરે છે. A સાચું છે કારણ કે પ્રોટોન ધન વિદ્યુતભારિત હોય છે. B સાચું છે કારણ કે ન્યુટ્રોન પ્રોટોન વચ્ચેના અપાકર્ષણને ઘટાડી સ્થિરતા આપે છે. C સાચું છે કારણ કે પ્રોટોનની સંખ્યા તત્વના પરમાણુ ક્રમાંકને નક્કી કરે છે, જે રાસાયણિક ગુણધર્મો નક્કી કરે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 13: કોષકેન્દ્રની રચના અને ન્યુક્લિયોનની ભૂમિકા", "difficulty": "Hard", "num": 9}, {"question": "એક પ્રયોગમાં, વૈજ્ઞાનિકોએ એક કોષકેન્દ્રમાંથી તમામ પ્રોટોન દૂર કર્યા. આ ફેરફારને કારણે નીચેનામાંથી કયું પરિણામ થવાની શક્યતા સૌથી ઓછી છે?", "options": ["A) કોષકેન્દ્રનો વિદ્યુતભાર તટસ્થ થઈ જશે", "B) કોષકેન્દ્રનું દળ નોંધપાત્ર રીતે ઘટી જશે", "C) આ તત્વનું રાસાયણિક ગુણધર્મ બદલાઈ જશે", "D) કોષકેન્દ્રમાં ન્યુટ્રોનની સંખ્યા અસરગ્રસ્ત થશે"], "correct": 3, "explanation": "સાચો જવાબ D છે કારણ કે પ્રોટોન દૂર કરવાથી ન્યુટ્રોનની સંખ્યા પર સીધી અસર થતી નથી. A સાચું છે કારણ કે પ્રોટોન દૂર કરવાથી કોષકેન્દ્રનો ધન વિદ્યુતભાર દૂર થશે. B સાચું છે કારણ કે પ્રોટોનનું દળ નોંધપાત્ર છે, તેથી દળ ઘટશે. C સાચું છે કારણ કે પ્રોટોનની સંખ્યા રાસાયણિક ગુણધર્મો નક્કી કરે છે, તેથી તે બદલાશે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 13: કોષકેન્દ્રની રચના અને પ્રોટોનની ભૂમિકા", "difficulty": "Hard", "num": 10}, {"question": "કોષકેન્દ્રમાં પ્રોટોન અને ન્યુટ્રોનની સંખ્યામાં ફેરફાર થવાથી કોષની અનુવંશિકતામાં કયો ફેરફાર થશે, જો પ્રોટોનની સંખ્યા બદલાય નહીં પરંતુ ન્યુટ્રોનની સંખ્યા બમણી થઈ જાય?", "options": ["A) જનીનમાં કોઈ ફેરફાર થશે નહીં, કારણ કે ન્યુટ્રોન અનુવંશિકતામાં ભાગ લેતા નથી", "B) કોષની અનુવંશિકતા પર અસર થશે, કારણ કે ન્યુટ્રોન DNAની સ્થિરતામાં મહત્વની ભૂમિકા ભજવે છે", "C) પ્રોટીન સંશ્લેષણમાં તાત્કાલિક વિક્ષેપ પેદા થશે", "D) કોષકેન્દ્રનું વજન ઘટશે, પરંતુ અનુવંશિકતામાં કોઈ ફેરફાર થશે નહીં"], "correct": 0, "explanation": "ન્યુટ્ રમાણુ ક્રમાંક", "C) તત્વના સમસ્થાનિકોની સંખ્યા", "D) કોષકેન્દ્રની રેડિયોએક્ટિવ સ્થિરતા"], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે. પરમાણુ ક્રમાંક પ્રોટોનની સંખ્યા દ્વારા નક્કી થાય છે, જે અહીં અચળ રાખવામાં આવી છે. તેથી, પરમાણુ ક્રમાંક અસરગ્રસ્ત થશે નહીં. વિકલ્પ A ખોટો છે કારણ કે ન્યુટ્રોનની સંખ્યામાં વધારો થવાથી કોષકેન્દ્રનું દળ વધશે. વિકલ્પ C ખોટો છે કારણ કે ન્યુટ્રોનની સંખ્યામાં ફેરફારથી નવા સમસ્થાનિકો બને છે. વિકલ્પ D ખોટો છે કારણ કે ન્યુટ્રોનની સંખ્યામાં ફેરફાર કોષકેન્દ્રની રેડિયોએક્ટિવ સ્થિરતાને અસર કરી શકે છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 2: પરમાણુની રચના", "difficulty": "Hard", "num": 29}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
