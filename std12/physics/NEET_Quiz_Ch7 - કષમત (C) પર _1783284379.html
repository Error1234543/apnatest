    <script>
        const questionsData = [{"question": "એક શુદ્ધ કેપેસિટરને AC સપ્લાય સાથે જોડવામાં આવે છે. જો સપ્લાયની આવૃત્તિ બમણી કરવામાં આવે, તો પરિપથમાં વહેતો પ્રવાહ કેટલો બદલાશે? (કેપેસિટરનું મૂલ્ય અચળ રાખવામાં આવે છે)", "options": ["A) પ્રવાહ અડધો થશે", "B) પ્રવાહ બમણો થશે", "C) પ્રવાહ ચાર ગણો થશે", "D) પ્રવાહમાં કોઈ ફેર પડશે નહીં"], "correct": 1, "explanation": "શુદ્ધ કેપેસિટર માટે કેપેસિટિવ રિએક્ટન્સ X_C = 1/(2πfC). આવૃત્તિ f બમણી કરતાં X_C અડધું થાય છે. ઓહ્મના નિયમ અનુસાર I = V/X_C, તેથી પ્રવાહ બમણો થશે. વિકલ્પ A ખોટો છે કારણ કે પ્રવાહ ઘટતો નથી. વિકલ્પ C ખોટો છે કારણ કે પ્રવાહ ચાર ગણો થતો નથી. વિકલ્પ D ખોટો છે કારણ કે આવૃત્તિ બદલાતાં પ્રવાહ બદલાય છે.", "ncert_ref": "Class XII - અધ્યાય 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 1}, {"question": "એક કેપેસિટર અને એક રેઝિસ્ટર શ્રેણીમાં AC સપ્લાય સાથે જોડાયેલા છે. જો કેપેસિટરનું મૂલ્ય વધારવામાં આવે, તો નીચેનામાંથી કયું સાચું છે? (સપ્લાય વોલ્ટેજ અને આવૃત્તિ અચળ રાખવામાં આવે છે)", "options": ["A) પરિપથનો કુલ અવરોધ વધશે", "B) પરિપથમાં વોલ્ટેજ અને પ્રવાહ વચ્ચેનો કળા તફાવત ઘટશે", "C) પરિપથમાં વહેતો પ્રવાહ ઘટશે", "D) રેઝિસ્ટર પરનો વોલ્ટેજ વધશે"], "correct": 1, "explanation": "કેપેસિટિવ રિએક્ટન્સ X_C = 1/(2πfC) ઘટે છે જ્યારે C વધે છે. કળા તફાવત φ = tan⁻¹(X_C/R) પણ ઘટે છે. વિકલ્પ A ખોટો છે કારણ કે કુલ અવરોધ (ઇમ્પિડન્સ) ઘટે છે. વિકલ્પ C ખોટો છે કારણ કે પ્રવાહ વધે છે. વિકલ્પ D ખોટો છે કારણ કે રેઝિસ્ટર પરનો વોલ્ટેજ પ્રવાહના વધવાથી વધે નહીં, પરંતુ ઇમ્પિડન્સના ઘટવાથી પ્રવાહ વધે છે અને રેઝિસ્ટર પરનો વોલ્ટેજ પ્રમાણમાં બદલાય છે.", "ncert_ref": "Class XII - અધ્યાય 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 2}, {"question": "એક શુદ્ધ કેપેસિટરને AC વોલ્ટેજ V = V₀ sin(ωt) સાથે જોડવામાં આવે છે. કેપેસિટરમાં સંગ્રહિત મહત્તમ ઊર્જા કેટલી હશે?", "options": ["A) ½ CV₀²", "B) CV₀²", "C) ¼ CV₀²", "D) 2 CV₀²"], "correct": 0, "explanation": "કેપેસિટરમાં સંગ્રહિત ઊર્જા U = ½ CV². મહત્તમ વોલ્ટેજ V₀ હોવાથી મહત્તમ ઊર્જા U_max = ½ CV₀². વિકલ્પ B ખોટો છે કારણ કે સૂત્રમાં ½ ગુણક આવશ્યક છે. વિકલ્પ C ખોટો છે કારણ કે ¼ ગુણક યોગ્ય નથી. વિકલ્પ D ખોટો છે કારણ કે ઊર્જા બમણી થતી નથી.", "ncert_ref": "Class XII - અધ્યાય 2: સ્થિત વિદ્યુતક્ષેત્ર અને ક્ષમતા", "difficulty": "Hard", "num": 3}, {"question": "એક કેપેસિટર અને એક ઇન્ડક્ટર શ્રેણીમાં AC સપ્લાય સાથે જોડાયેલા છે. જો પરિપથ અનુનાદમાં હોય, તો નીચેનામાંથી કયું સાચું નથી?", "options": ["A) પરિપથનો કુલ અવરોધ શૂન્ય હશે", "B) વોલ્ટેજ અને પ્રવાહ એક જ કળામાં હશે", "C) કેપેસિટર અને ઇન્ડક્ટર પરના વોલ્ટેજ એકબીજાથી 180° કળા તફાવત ધરાવશે", "D) પરિપથમાં વહેતો પ્રવાહ મહત્તમ હશે"], "correct": 0, "explanation": "અનુનાદમાં કેપેસિટિવ રિએક્ટન્સ અને ઇન્ડક્ટિવ રિએક્ટન્સ સમાન હોય છે, પરંતુ પરિપથનો કુલ અવરોધ શૂન્ય હોતો નથી (જો રેઝિસ્ટર ન હોય તો પણ વ્યવહારમાં અવરોધ હોય છે). વિકલ્પ B સાચું છે કારણ કે અનુનાદમાં કળા તફાવત શૂન્ય હોય છે. વિકલ્પ C સાચું છે કારણ કે કેપેસિટર અને ઇન્ડક્ટર પરના વોલ્ટેજ વિરુદ્ધ કળામાં હોય છે. વિકલ્પ D સાચું છે કારણ કે અનુનાદમાં પ્રવાહ મહત્તમ હોય છે.", "ncert_ref": "Class XII - અધ્યાય 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 4}, {"question": "એક કેપેસિટરને AC સપ્લાય સાથે જોડતાં, પ્રવાહ વોલ્ટેજ કરતાં 90° આગળ હોય છે. જો હવે સપ્લાયની આવૃત્તિ ઘટાડવામાં આવે, તો નીચેનામાંથી કયું બદલાશે નહીં?", "options": ["A) કેપેસિટિવ રિએક્ટન્સ", "B) પ્રવાહ અને વોલ્ટેજ વચ્ચેનો કળા તફાવત", "C) કેપેસિટરમાં સંગ્રહિત મહત્તમ ઊર્જા", "D) પરિપથમાં વહેતો પ્રવાહ"], "correct": 1, "explanation": "શુદ્ધ કેપેસિટરમાં પ્રવાહ હંમેશા વોલ્ટેજ કરતાં 90° આગળ હોય છે, આવૃત્તિ બદલાતાં પણ આ કળા તફાવત બદલાતો નથી. વિકલ્પ A ખોટો છે કારણ કે કેપેસિટિવ રિએક્ટન્સ આવૃત્તિ સાથે બદલાય છે. વિકલ્પ C ખોટો છે કારણ કે મહત્તમ ઊર્જા વોલ્ટેજ પર આધારિત છે, જે આવૃત્તિ બદલાતાં બદલાઈ શકે છે. વિકલ્પ D ખોટો છે કારણ કે પ્રવાહ આવૃત્તિ સાથે બદલાય છે.", "ncert_ref": "Class XII - અધ્યાય 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 5}, {"question": "એક AC પરિપથમાં કેપેસિટર અને રેઝિસ્ટર સમાંતરમાં જોડાયેલા છે. સપ્લાય વોલ્ટેજ V = V₀ sin(ωt) છે. જો કેપેસિટરનો ક્ષમતા પ્રતિકાર X_C = R હોય, તો પરિપથનો કુલ પ્રવાહ કયા કોણથી વોલ્ટેજ કરતાં આગળ હશે?", "options": ["A) 0°", "B) 30°", "C) 45°", "D) 90°"], "correct": 2, "explanation": "સમાંતર RC પરિપથમાં કેપેસિટિવ પ્રવાહ I_C વોલ્ટેજ કરતાં 90° આગળ હોય છે અને રેઝિસ્ટિવ પ્રવાહ I_R વોલ્ટેજ સાથે સમાન કળામાં હોય છે. જ્યારે X_C = R હોય, ત્યારે I_C = I_R થાય. પરિણામી પ્રવાહ I = √(I_R² + I_C²) = I_R√2 અને તે વોલ્ટેજ સાથે tan⁻¹(I_C/I_R) = tan⁻¹(1) = 45° નો કોણ બનાવે છે. તેથી કુલ પ્રવાહ વોલ્ટેજ કરતાં 45° આગળ હશે.\n\nA) ખોટું: 0° એ માત્ર શુદ્ધ રેઝિસ્ટિવ પરિપથ માટે સાચું છે.\nB) ખોટું: 30° એ અસંતુલિત I_C અને I_R માટે સાચું હોઈ શકે, પરંતુ અહીં બંને સમાન છે.\nD) ખોટું: 90° એ માત્ર શુદ્ધ કેપેસિટિવ પરિપથ માટે સાચું છે.", "ncert_ref": "Class XII - અધ્યાય 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 6}, {"question": "એક AC પરિપથમાં કેપેસિટર અને ઇન્ડક્ટર શ્રેણીમાં જોડાયેલા છે. જો કેપેસિટરનો ક્ષમતા પ્રતિકાર X_C = 200 Ω અને ઇન્ડક્ટરનો પ્રેરક પ્રતિકાર X_L = 50 Ω હોય, તો પરિપથનો કુલ પ્રતિકાર કેટલો હશે?", "options": ["A) 150 Ω", "B) 250 Ω", "C) 100 Ω", "D) 206 Ω"], "correct": 0, "explanation": "શ્રેણી LC પરિપથમાં કુલ પ્રતિકાર Z = |X_L - X_C| = |50 Ω - 200 Ω| = 150 Ω. કેપેસિટિવ અને ઇન્ડક્ટિવ પ્રતિકાર એકબીજાને નાબૂદ કરે છે, તેથી માત્ર તેમનો તફાવત જ બાકી રહે છે.\n\nB) ખોટું: 250 Ω એ X_L + X_C છે, જે શ્રેણી LC પરિપથ માટે સાચું નથી.\nC) ખોટું: 100 Ω એ કોઈપણ સંબંધિત ગણતરી સાથે મેળ ખાતું નથી.\nD) ખોટું: 206 Ω એ √(X_L² + X_C²) છે, જે શ્રેણી RL અથવા RC પરિપથ માટે સાચું છે, LC માટે નહીં.", "ncert_ref": "Class XII - અધ્યાય 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 7}, {"question": "એક AC પરિપથમાં કેપેસિટરનો ક્ષમતા પ્રતિકાર X_C = 100 Ω છે. જો સપ્લાયની આવૃત્તિ બમણી કરવામાં આવે, તો નવો ક્ષમતા પ્રતિકાર કેટલો હશે? (અચળ ક્ષમતા ધારી લો)", "options": ["A) 25 Ω", "B) 50 Ω", "C) 200 Ω", "D) 400 Ω"], "correct": 0, "explanation": "ક્ષમતા પ્રતિકાર X_C = 1/(ωC) = 1/(2πfC). જ્યારે આવૃત્તિ બમણી થાય (f' = 2f), ત્યારે X_C' = 1/(2π(2f)C) = X_C/2 = 100 Ω / 2 = 50 Ω. તેથી ક્ષમતા પ્રતિકાર અડધો થાય છે.\n\nA) ખોટું: 25 Ω એ આવૃત્તિ ચાર ગણી થવા પર મળે.\nC) ખોટું: 200 Ω એ આવૃત્તિ અડધી થવા પર મળે.\nD) ખોટું: 400 Ω એ આવૃત્તિ એક-ચતુર્થાંશ થવા પર મળે.", "ncert_ref": "Class XII - અધ્યાય 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 8}, {"question": "એક AC પરિપથમાં કેપેસિટર અને રેઝિસ્ટર શ્રેણીમાં જોડાયેલા છે. જો પરિપથનો કળા કોણ φ = 30° હોય, તો કેપેસિટરનો ક્ષમતા પ્રતિકાર X_C અને રેઝિસ્ટરનો પ્રતિકાર R વચ્ચેનો ગુણોત્તર કેટલો હશે?", "options": ["A) 1 : √3", "B) √3 : 1", "C) 1 : 1", "D) 1 : 2"], "correct": 0, "explanation": "શ્રેણી RC પરિપથમાં કળા કોણ φ એ વોલ્ટેજ અને પ્રવાહ વચ્ચેનો કોણ છે, જે tan φ = X_C/R દ્વારા આપવામાં આવે છે. અહીં φ = 30°, તેથી tan 30° = X_C/R ⇒ 1/√3 = X_C/R ⇒ X_C : R = 1 : √3.\n\nB) ખોટું: √3 : 1 એ φ = 60° માટે સાચું છે.\nC) ખોટું: 1 : 1 એ φ = 45° માટે સાચું છે.\nD) ખોટું: 1 : 2 એ કોઈપણ પ્રમાણભૂત કળા કોણ સાથે મેળ ખાતું નથી.", "ncert_ref": "Class XII - અધ્યાય 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 9}, {"question": "એક AC પરિપથમાં કેપેસિટરનો ક્ષમતા પ્રતિકાર X_C = 30 Ω છે. જો પરિપથમાં પ્રવાહ I = 4 sin(ωt + 60°) A હોય, તો કેપેસિટર પરનો વોલ્ટેજ કયા સમીકરણથી દર્શાવી શકાય? (કળા સંદર્ભ V = V₀ sin(ωt) લો)", "options": ["A) V = 120 sin(ωt - 30°) V", "B) V = 120 sin(ωt + 150°) V", "C) V = 120 sin(ωt - 120°) V", "D) V = 120 sin(ωt + 30°) V"], "correct": 0, "explanation": "કેપેસિટરમાં પ્રવાહ વોલ્ટેજ કરતાં 90° આગળ હોય છે. અહીં પ્રવાહ I = 4 sin(ωt + 60°) છે, તેથી વોલ્ટેજ V = I × X_C = 4 × 30 sin(ωt + 60° - 90°) = 120 sin(ωt - 30°) V. તેથી વોલ્ટેજ પ્રવાહ કરતાં 90° પાછળ હોય છે.\n\nB) ખોટું: +150° એ ખોટી કળા ગણતરી દર્શાવે છે.\nC) ખોટું: -120° એ પ્રવાહ અને વોલ્ટેજ વચ્ચેનો ખોટો સંબંધ દર્શાવે છે.\nD) ખોટું: +30° એ વોલ્ટેજ પ્રવાહ કરતાં આગળ હોવાનું દર્શાવે છે, જે કેપેસિટર માટે અશક્ય છે.", "ncert_ref": "Class XII - અધ્યાય 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 10}, {"question": "એક AC પરિપથમાં, 1 μF ક્ષમતાવાળો કેપેસિટર અને 100 Ω નો રેઝિસ્ટર શ્રેણીમાં જોડાયેલા છે. જો સપ્લાય વોલ્ટેજ V = 200 sin(1000t) V હોય, તો પરિપથનો કળા કોણ (φ) કેટલો હશે?", "options": ["A) tan⁻¹(1)", "B) tan⁻¹(0.1)", "C) tan⁻¹(10)", "D) tan⁻¹(0.01)"], "correct": 0, "explanation": "કેપેસિટરનો ક્ષમતા પ્રતિકાર X_C = 1/(ωC) = 1/(1000 × 1 × 10⁻⁶) = 1000  = X_C હોય તો અનુનાદ થાય છે અને કળા તફાવત 0° હોય છે. અહીં X_L ≠ X_C હોવા છતાં, કુલ પ્રવાહ અને વોલ્ટેજ વચ્ચેનો કળા તફાવત 0° હોઈ શકે નહીં. પરંતુ પ્રશ્નમાં આપેલ વિકલ્પો અનુસાર, જ્યારે X_L અને X_C નો ગુણાકાર 1 થાય (X_L × X_C = L/C), ત્યારે અનુનાદ થાય છે અને કળા તફાવત 0° હોય છે. અહીં L/C = 0.5/(2×10⁻⁶) = 250000, અને X_L × X_C = 157 × 1592 ≈ 250000, તેથી અનુનાદ થાય છે. વિકલ્પ B અને C ખોટા છે કારણ કે તેઓ અનુનાદની સ્થિતિ ધ્યાનમાં લેતા નથી. વિકલ્પ D ખોટો છે કારણ કે 180° કળા તફાવત શક્ય નથી.", "ncert_ref": "Class XII - અધ્યાય 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 29}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
