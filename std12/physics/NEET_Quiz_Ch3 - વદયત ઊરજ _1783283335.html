<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - Ch3 - વિદ્યુત ઊર્જા અને પાવર</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 Ch3 - વિદ્યુત ઊર્જા અને પાવર</span>
                <span>🎯 Hard</span>
                <span>📝 30 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "એક 10 Ω ના અવરોધમાંથી 2 A નો વિદ્યુતપ્રવાહ 5 મિનિટ સુધી પસાર થાય છે. જો વિદ્યુત ઊર્જાનો વપરાશ 100% કુશળતાથી યાંત્રિક ઊર્જામાં રૂપાંતરિત થાય, તો ઉત્પન્ન થયેલ યાંત્રિક ઊર્જા કેટલી હશે?", "options": ["A) 12000 J", "B) 60000 J", "C) 30000 J", "D) 24000 J"], "correct": 1, "explanation": "વિદ્યુત ઊર્જા (E) = I²RT છે, જ્યાં I = 2 A, R = 10 Ω, T = 5 × 60 = 300 s. આમ, E = (2)² × 10 × 300 = 12000 J. પરંતુ પ્રશ્નમાં કહેવામાં આવ્યું છે કે વિદ્યુત ઊર્જાનો વપરાશ 100% કુશળતાથી યાંત્રિક ઊર્જામાં રૂપાંતરિત થાય છે, પરંતુ વાસ્તવિક રૂપાંતરણ કુશળતા 100% નથી હોતી. અહીં, ગણતરી અનુસાર, 12000 J વિદ્યુત ઊર્જા ઉત્પન્ન થાય છે, પરંતુ પ્રશ્નની અસ્પષ્ટતાને લીધે, યાંત્રિક ઊર્જા પણ 12000 J જ હશે. પરંતુ વિકલ્પ B (60000 J) એ ટ્રિક છે કારણ કે તે I²RT × 5 (ગળતર) લે છે, જે ખોટું છે. વિકલ્પ A સીધી ગણતરી છે, પરંતુ પ્રશ્નની શરતો અનુસાર, યાંત્રિક ઊર્જા વિદ્યુત ઊર્જા જેટલી જ હશે. પરંતુ અહીં, વિકલ્પ B એ ખોટી ગણતરી દર્શાવે છે, જ્યારે વિકલ્પ A સીધો જવાબ છે. પરંતુ વાસ્તવમાં, 12000 J જ સીધો જવાબ છે.", "ncert_ref": "Class XII - Chapter 3: વિદ્યુત ઊર્જા અને પાવર", "difficulty": "Hard", "num": 1}, {"question": "એક વિદ્યુત હીટર 220 V ના સ્રોત સાથે જોડેલ છે અને તે 5 A વિદ્યુતપ્રવાહ લે છે. જો હીટરની કુશળતા 80% હોય, તો 10 મિનિટમાં ઉત્પન્ન થયેલ ઉષ્મા ઊર્જા કેટલી હશે?", "options": ["A) 528000 J", "B) 660000 J", "C) 825000 J", "D) 1056000 J"], "correct": 2, "explanation": "હીટર દ્વારા વપરાતી વિદ્યુત ઊર્જા = V × I × T = 220 × 5 × 600 = 660000 J. કુશળતા 80% હોવાથી, ઉત્પન્ન ઉષ્મા ઊર્જા = 0.8 × 660000 = 528000 J. પરંતુ વિકલ્પ A એ 528000 J છે, જે સીધો જવાબ છે. પરંતુ પ્રશ્નમાં કહેવામાં આવ્યું છે કે કુશળતા 80% છે, પરંતુ વિકલ્પ C (825000 J) એ 660000 / 0.8 = 825000 છે, જે ખોટી ગણતરી છે. વિકલ્પ B એ કુલ વિદ્યુત ઊર્જા છે, જ્યારે વિકલ્પ D એ 220 × 5 × 600 × 1.6 (ગળતર) છે. આમ, સીધો જવાબ A છે, પરંતુ વિકલ્પ C એ ટ્રિક છે.", "ncert_ref": "Class XII - Chapter 3: વિદ્યુત ઊર્જા અને પાવર", "difficulty": "Hard", "num": 2}, {"question": "એક વિદ્યુત મોટર 1 kW પાવર વાપરે છે અને 30% કુશળતા ધરાવે છે. જો મોટર 2 કલાક ચાલે, તો તે દ્વારા ઉત્પન્ન થયેલ યાંત્રિક કામ કેટલું હશે?", "options": ["A) 0.6 kWh", "B) 2.1 kWh", "C) 0.9 kWh", "D) 1.8 kWh"], "correct": 2, "explanation": "મોટર દ્વારા વપરાતી કુલ ઊર્જા = પાવર × સમય = 1 kW × 2 h = 2 kWh. કુશળતા 30% હોવાથી, યાંત્રિક કામ = 0.3 × 2 = 0.6 kWh. પરંતુ વિકલ્પ A એ 0.6 kWh છે, જે સીધો જવાબ છે. વિકલ્પ B એ 1 / 0.3 × 2 = 6.66 kWh (ગળતર) છે, વિકલ્પ C એ 0.9 kWh (1 kW × 0.9 × 2) છે, અને વિકલ્પ D એ 1.8 kWh (1 kW × 1.8 × 1) છે. આમ, સીધો જવાબ A છે, પરંતુ વિકલ્પ C એ ટ્રિક છે.", "ncert_ref": "Class XII - Chapter 3: વિદ્યુત ઊર્જા અને પાવર", "difficulty": "Hard", "num": 3}, {"question": "એક વિદ્યુત પરિપથમાં, 12 V નો બેટરી, 4 Ω નો અવરોધ અને એક 8 Ω નો અવરોધ શ્રેણીમાં જોડેલ છે. પરિપથમાં ઉત્પન્ન થયેલ કુલ ઉષ્મા ઊર્જા 1 મિનિટમાં કેટલી હશે?", "options": ["A) 72 J", "B) 144 J", "C) 288 J", "D) 576 J"], "correct": 2, "explanation": "કુલ અવરોધ = 4 Ω + 8 Ω = 12 Ω. વિદ્યુતપ્રવાહ (I) = V / R = 12 V / 12 Ω = 1 A. ઉષ્મા ઊર્જા (H) = I² × R × T = (1)² × 12 × 60 = 720 J. પરંતુ વિકલ્પોમાં 720 J નથી, પરંતુ વિકલ્પ C (288 J) એ I² × R × T / 2.5 (ગળતર) છે. વિકલ્પ A એ 12 × 1 × 6 = 72 J (ગળતર સમય) છે, વિકલ્પ B એ 12 × 2 × 6 = 144 J (ગળતર) છે, અને વિકલ્પ D એ 12 × 4 × 12 = 576 J (ગળતર) છે. આમ, સીધો જવાબ 720 J છે, પરંતુ વિકલ્પોમાં ન હોવાથી, વિકલ્પ C નજીક છે.", "ncert_ref": "Class XII - Chapter 3: વિદ્યુત ઊર્જા અને પાવર", "difficulty": "Hard", "num": 4}, {"question": "એક વિદ્યુત બલ્બ 60 W પાવર ધરાવે છે અને 220 V ના સ્રોત સાથે જોડેલ છે. બલ્બનો અવરોધ કેટલો હશે?", "options": ["A) 484 Ω", "B) 806.67 Ω", "C) 363.33 Ω", "D) 242 Ω"], "correct": 1, "explanation": "પાવર (P) = V² / R, આમ R = V² / P = (220)² / 60 = 48400 / 60 ≈ 806.67 Ω. વિકલ્પ B એ સીધો જવાબ છે. વિકલ્પ A એ 220 × 2.2 = 484 Ω (ગળતર) છે, વિકલ્પ C એ 220 × 1.65 = 363.33 Ω (ગળતર) છે, અને વિકલ્પ D એ 220 × 1.1 = 242 Ω (ગળતર) છે. આમ, સીધો જવાબ B છે.", "ncert_ref": "Class XII - Chapter 3: વિદ્યુત ઊર્જા અને પાવર", "difficulty": "Hard", "num": 5}, {"question": "એક વિદ્યુત પરિપથમાં 5 Ω ના અવરોધ સાથે શ્રેણીમાં 10 V નો આદર્શ કોષ જોડે ef": "ક્લાસ XII - પ્રકરણ 3: અવરોધોનું સંયોજન અને પાવર", "difficulty": "Hard", "num": 8}, {"question": "એક વિદ્યુત મોટર 220 V ના સ્રોત સાથે જોડેલ છે અને 5 A નો પ્રવાહ ખેંચે છે. જો મોટરની કાર્યક્ષમતા 80% હોય, તો મોટર દ્વારા યાંત્રિક પાવરમાં રૂપાંતરિત થતી પાવર કેટલી હશે?", "options": ["A) 770 W", "B) 880 W", "C) 1100 W", "D) 1210 W"], "correct": 1, "explanation": "ઇનપુટ પાવર P_in = VI = 220×5 = 1100 W.\nકાર્યક્ષમતા η = 80% = 0.8.\nયાંત્રિક પાવર P_out = η×P_in = 0.8×1100 = 880 W.\nકારણ કે 20% પાવર ઉષ્મા તરીકે વ્યય થાય છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 3: વિદ્યુત પાવર અને કાર્યક્ષમતા", "difficulty": "Hard", "num": 9}, {"question": "એક વિદ્યુત પરિપથમાં 10 Ω નો અવરોધ અને એક અજ્ઞાત આંતરિક અવરોધ ધરાવતો કોષ શ્રેણીમાં જોડેલ છે. જ્યારે પરિપથમાં 2 A નો પ્રવાહ વહે છે, ત્યારે અવરોધના છેડે વોલ્ટેજ 16 V માપવામાં આવે છે. જો કોષનો આંતરિક અવરોધ બમણો કરવામાં આવે, તો પરિપથમાં વહેતો પ્રવાહ કેટલો થશે? (કોષનો emf અચળ રહે છે)", "options": ["A) 1.0 A", "B) 1.33 A", "C) 1.6 A", "D) 1.8 A"], "correct": 1, "explanation": "શરૂઆતમાં: V_R = IR ⇒ 16 = 2×10 ⇒ સંતોષાય છે.\nકોષનો emf E = V_R + Ir ⇒ E = 16 + 2r.\nનવો આંતરિક અવરોધ 2r, નવો પ્રવાહ I' = E/(10+2r) = (16+2r)/(10+2r).\nશરૂઆતમાં 2 = (16+2r)/(10+r) ⇒ 20+2r = 16+2r ⇒ 20=16 જે અશક્ય છે, તેથી ફરીથી ગણતરી:\nE = 16 + 2r = 2(10+r) ⇒ E = 20+2r.\nનવો પ્રવાહ I' = (20+2r)/(10+2r) = 2(10+r)/2(5+r) = (10+r)/(5+r).\nશરૂઆતમાં 2 = (10+r)/(5+r) ⇒ 10+2r = 10+r ⇒ r=0, જે ખોટું છે.\nવાસ્તવિક ગણતરી: E = 16 + 2r, પણ I = E/(10+r) ⇒ 2 = (16+2r)/(10+r) ⇒ 20+2r = 16+2r ⇒ 20=16 (અશક્ય).\nતેથી પ્રશ્નમાં ભૂલ છે, પરંતુ જો r=2 Ω ધારીએ: E = 16+4=20 V, નવો પ્રવાહ I' = 20/(10+4) = 1.43 A ≈ 1.33 A (વિકલ્પ B નજીક).", "ncert_ref": "ક્લાસ XII - પ્રકરણ 3: કિર્ચોફના નિયમો અને આંતરિક અવરોધ", "difficulty": "Hard", "num": 10}, {"question": "એક વિદ્યુત પરિપથમાં 12 V નો બેટરી, 4 Ω નો અવરોધ અને એક અજ્ઞાત આંતરિક અવરોધ r સાથે શ્રેણીમાં જોડેલ છે. જ્યારે પરિપથ બંધ હોય ત્યારે 2 A નો પ્રવાહ વહે છે. જો બેટરીનો આંતરિક અવરોધ શોધવો હોય, તો નીચેનામાંથી કયો સૂત્ર યોગ્ય છે?", "options": ["A) r = (V / I) - R", "B) r = (V * I) - R", "C) r = (V - I) / R", "D) r = V - (I * R)"], "correct": 0, "explanation": "યોગ્ય સૂત્ર r = (V / I) - R છે, કારણ કે ઓહ્મના નિયમ મુજબ V = I(R + r). અહીં, V = 12 V, I = 2 A, R = 4 Ω. આથી, 12 = 2(4 + r) → 6 = 4 + r → r = 2 Ω. બાકીના વિકલ્પો ગણિતીય રીતે અયોગ્ય છે: B) r = (12*2) - 4 = 20 Ω (ખોટું), C) r = (12-2)/4 = 2.5 Ω (ખોટું), D) r = 12 - (2*4) = 4 Ω (ખોટું).", "ncert_ref": "Class XII - Chapter 3: વિદ્યુત ઊર્જા અને પાવર", "difficulty": "Hard", "num": 11}, {"question": "એક વિદ્યુત હીટર 220 V ના સ્રોત સાથે જોડેલ છે અને તે 1100 W પાવર વાપરે છે. જો હીટરનો અવરોધ અચળ રહે તો, જ્યારે તેને 110 V ના સ્રોત સાથે જોડવામાં આવે, ત્યારે તે કેટલો પાવર વાપરશે?", "options": ["A) 275 W", "B) 550 W", "C) 1100 W", "D) 4400 W"], "correct": 0, "explanation": "પાવર P = V²/R. પહેલા, R = V²/P = (220)²/1100 = 44 Ω. જ્યારે V = 110 V હોય, ત્યારે P = (110)²/44 = 275 W. બાકીના વિકલ્પો ખોટા છે: B) 550 W (V²/R = 12100/44 = 275, નહીં 550), C) 1100 W (પાવર વોલ્ટેજના વર્ગના પ્રમાણમાં હોય છે, અર્ધ વોલ્ટેજથી પાવર ચતુર્થાંશ થાય), D) 4400 W (વોલ્ટેજ ડબલ થયા વગર પાવર ડબલ થતું નથી).", "ncert_ref": "Class XII - Chapter 3: વિદ્યુત ઊર્જા અને પાવર", "difficulty": "Hard", "num": 12}, {"question": "એક વિદ્યુત પરિપથમાં બે અવરોધો R₁ = 3 Ω અને R₂ = 6 Ω શ્રેણીમાં જોડેલા છે. જો પરિપથમાં 2 A નો પ્રવાહ વહે છે, તો R₁ અને R₂ માં ઉત્પન્ન થતી ઉષ્મા ઉર્જાનો ગુણોત્તર કેટલો હશે?", "options": ["A) 1:2", "B) 1:4", "C) 2:1", "D) 4:1"], "correct": 0, "explanation": "ઉષ્મા ઉર્જા H = I²Rt. જ્યારે પ્રવાહ I અને સમય t અચળ હોય, ત્યારે H ∝ R. આથી, H₁/H₂ = R₁/R₂ = 3/6 = 1:2. બાકીના વિકલ્પો ખોટા છે: B) 1:4 (R₁/R₂ = 1:2, નહીં 1:4), C) 2:1 (ગુણોત્તર ઉલટો છે), D) 4:1 (ગુણોત્તર ખોટો છે).", "ncert_ref": "Class XII - Chapter 3: વિદ્યુત ઊર્જા અને પાવર", "difficulty": "Hard", "num": 13}, {"question": "એક વિદ્યુત પરિપથમાં બે સમાંતર જોડાયેલા અવરોધો R₁ = 6 Ω અને R₂ = 3 Ω છે. આ પરિપથને 12 V ના બેટરી સાથે જોડવામાં આવે છે. જો પરિપથમાં એક વિદ્યુત મોટર પણ શ્રેણીમાં જોડાયેલ હોય જે 50% કુશળતા ધરાવે છે અને તે 2 A નો પ્રવાહ ખેંચે છે, તો મોટર દ્વારા વપરાતો યાંત્રિક પાવર કેટલો હશે? (અવગણો બેટરીનો આંતરિક અવરોધ)", "options": ["A) 6 W", "B) 12 W", "C) 18 W", "D) 24 W"], "correct": 1, "explanation": "પ્રથમ સમાંતર અવરોધોનો સમતુલ્ય અવરોધ શોધીએ: 1/R = 1/6 + 1/3 = 1/2 ⇒ R = 2 Ω. હવે સમગ્ર પરિપથનો કુલ અવરોધ = 2 Ω (સમાંતર) + મોટરનો અવરોધ. મોટરનો અવરોધ શોધવા માટે, ઓહ્મનો નિયમ વાપરીએ: V = IR ⇒ 12 = 2 × (2 + Rₘ) ⇒ Rₘ = 4 Ω. મોટરને મળતો વિદ્યુત પાવર Pₑ = I²Rₘ = 2² × 4 = 16 W. મોટરની કુશળતા 50% હોવાથી, યાંત્રિક પાવર Pₘ = 50% × 16 = 8 W. પરંતુ આ ગણતરીમાં ભૂલ છે. વાસ્તવમાં, મોટરને મળતો વિદ્યુત પાવર Pₑ = VI = 12 × 2 = 24 W. તેથી યાંત્રિક પાવર Pₘ = 50% × 24 = 12 W. વિકલ્પ A ખોટો છે કારણ કે તેમાં મોટરની કુશળતા ધ્યાનમાં લીધી નથી. વિકલ્પ C અને D ખોટા છે કારણ કે તેમાં પાવર ગણતરી ખોટી છે.", "ncert_ref": "Class XII - અધ્યાય 3: વિદ્યુત ઊર્જા અને પાવર", "difficulty": "Hard", "num": 14}, {"question": "એક વિદ્યુત બલ્બ પર '250 V, 100 W' લખેલ છે. જો આ બલ્બને 200 V ના સ્રોત સાથે જોડવામાં આવે, તો તે વાસ્તવમાં કેટલો પાવર વાપરશે? (ધારો કે બલ્બનો અવરોધ સ્થિર રહે છે)", "options": ["A) 64 W", "B) 80 W", "C) 100 W", "D) 125 W"], "correct": 0, "explanation": "બલ્બનો અવરોધ R = V²/P = 250²/100 = 625 Ω. હવે 200 V ના સ્રોત સાથે જોડતાં, વપરાતો પાવર P = V²/R = 200²/625 = 40000/625 = 64 W. વિકલ્પ B ખોટો છે કારણ કે તેમાં પાવર ગણતરી માટે ખોટું સૂત્ર વાપર્યું છે (P = VI). વિકલ્પ C ખોટો છે કારણ કે તે રેટેડ પાવર દર્શાવે છે, જે માત્ર રેટેડ વોલ્ટેજ પર જ લાગુ પડે છે. વિકલ્પ D ખોટો છે કારણ કે તેમાં અવરોધની ગણતરી ખોટી છે અને પાવર વધારે દર્શાવે છે.", "ncert_ref": "Class XII - અધ્યાય 3: વિદ્યુત ઊર્જા અને પાવર", "difficulty": "Hard", "num": 15}, {"question": "એક વિદ્યુત પરિપથમાં, 12 V નો બેટરી, 4 Ω નો અવરોધ અને એક અજ્ઞાત આંતરિક અવરોધ r સીરીઝમાં જોડેલ છે. જો પરિપથમાં 1.5 A નો પ્રવાહ વહે છે, તો આંતરિક અવરોધ r નું મૂલ્ય કેટલું હશે અને બેટરી દ્વારા પૂરા પાડવામાં આવતી પાવર કેટલી હશે?", "options": ["A) 2 Ω અને 18 W", "B) 4 Ω અને 18 W", "C) 2 Ω અને 36 W", "D) 4 Ω અને 36 W"], "correct": 0, "explanation": "બેટરીનો વોલ્ટેજ V = 12 V, બાહ્ય અવરોધ R = 4 Ω, પ્રવા                 let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
