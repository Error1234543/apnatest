    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}

        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}

        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}

        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}

        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>

    <script>
        const questionsData = [{"question": "એક શુદ્ધ ધાતુના તારનો 20°C તાપમાને રોધ 2 Ω છે. જો તેને 120°C સુધી ગરમ કરવામાં આવે તો તેનો રોધ 2.8 Ω થાય છે. આ ધાતુનો રોધ તાપમાન ગુણાંક (α) કેટલો હશે?", "options": ["A) 0.004 °C⁻¹", "B) 0.0033 °C⁻¹", "C) 0.005 °C⁻¹", "D) 0.0025 °C⁻¹"], "correct": 0, "explanation": "રોધ તાપમાન ગુણાંક (α) માટેનું સૂત્ર: R = R₀[1 + α(T - T₀)] છે. અહીં R₀ = 2 Ω, R = 2.8 Ω, T₀ = 20°C, T = 120°C. સૂત્રમાં મૂકતાં: 2.8 = 2[1 + α(100)] ⇒ 1.4 = 1 + 100α ⇒ 0.4 = 100α ⇒ α = 0.004 °C⁻¹. બાકીના વિકલ્પો ગણતરીની ભૂલ દર્શાવે છે.", "ncert_ref": "Class XII - પ્રકરણ 3: વિદ્યુતપ્રવાહ", "difficulty": "Hard", "num": 1}, {"question": "કાર્બન અને સિલિકોન જેવા અર્ધવાહકોના રોધ પર તાપમાનનો પ્રભાવ વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) તાપમાન વધતાં અર્ધવાહકોનો રોધ ઘટે છે કારણ કે વધુ ઇલેક્ટ્રોન વેલેન્સ બેન્ડમાંથી કન્ડક્શન બેન્ડમાં જાય છે.", "B) અર્ધવાહકોનો રોધ તાપમાન ગુણાંક ઋણ હોય છે.", "C) અર્ધવાહકોના રોધ પર તાપમાનનો પ્રભાવ ધાતુઓ કરતાં વધુ હોય છે.", "D) 0 K તાપમાને અર્ધવાહકોનો રોધ અનંત હોય છે કારણ કે કોઈ મુક્ત ઇલેક્ટ્રોન ઉપલબ્ધ નથી."], "correct": 3, "explanation": "0 K તાપમાને અર્ધવાહકોનો રોધ ખૂબ જ વધારે હોય છે, પરંતુ અનંત નહીં. કારણ કે અર્ધવાહકોમાં થોડી અશુદ્ધિઓ અથવા ક્રિસ્ટલ ખામીઓ હોઈ શકે છે જે થોડા મુક્ત વાહકો પૂરા પાડે છે. બાકીના વિકલ્પો NCERT મુજબ સાચા છે.", "ncert_ref": "Class XII - પ્રકરણ 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: પદાર્થો, ઉપકરણો અને સાદા પરિપથો", "difficulty": "Hard", "num": 2}, {"question": "એક નિક્રોમ તારનો રોધ 27°C તાપમાને 100 Ω છે. જો તેનો રોધ તાપમાન ગુણાંક 0.0001 °C⁻¹ હોય, તો 127°C તાપમાને તેનો રોધ કેટલો થશે? (નિક્રોમનો રેખીય પ્રસરણ ગુણાંક અવગણો)", "options": ["A) 101 Ω", "B) 102 Ω", "C) 110 Ω", "D) 99 Ω"], "correct": 0, "explanation": "રોધ તાપમાન ગુણાંક માટેનું સૂત્ર: R = R₀[1 + α(T - T₀)]. અહીં R₀ = 100 Ω, α = 0.0001 °C⁻¹, T₀ = 27°C, T = 127°C. સૂત્રમાં મૂકતાં: R = 100[1 + 0.0001(100)] = 100[1 + 0.01] = 100 × 1.01 = 101 Ω. બાકીના વિકલ્પો ગણતરીની ભૂલ દર્શાવે છે.", "ncert_ref": "Class XII - પ્રકરણ 3: વિદ્યુતપ્રવાહ", "difficulty": "Hard", "num": 3}, {"question": "નીચેનામાંથી કયા પદાર્થનો રોધ તાપમાન વધતાં ઘટે છે અને તેનો રોધ તાપમાન ગુણાંક ઋણ હોય છે?", "options": ["A) તાંબુ", "B) લોખંડ", "C) જર્મેનિયમ", "D) નિક્રોમ"], "correct": 2, "explanation": "જર્મેનિયમ એક અર્ધવાહક છે, જેનો રોધ તાપમાન વધતાં ઘટે છે અને તેનો રોધ તાપમાન ગુણાંક ઋણ હોય છે. તાંબુ, લોખંડ અને નિક્રોમ ધાતુઓ છે, જેમનો રોધ તાપમાન વધતાં વધે છે અને તેમનો રોધ તાપમાન ગુણાંક ધન હોય છે.", "ncert_ref": "Class XII - પ્રકરણ 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: પદાર્થો, ઉપકરણો અને સાદા પરિપથો", "difficulty": "Hard", "num": 4}, {"question": "એક સુવાહક તારનો રોધ 0°C તાપમાને 5 Ω છે. જો તેનો રોધ તાપમાન ગુણાંક 0.004 °C⁻¹ હોય, તો કયા તાપમાને તેનો રોધ 7 Ω થશે?", "options": ["A) 50°C", "B) 100°C", "C) 75°C", "D) 125°C"], "correct": 1, "explanation": "રોધ તાપમાન ગુણાંક માટેનું સૂત્ર: R = R₀[1 + α(T - T₀)]. અહીં R₀ = 5 Ω, R = 7 Ω, α = 0.004 °C⁻¹, T₀ = 0°C. સૂત્રમાં મૂકતાં: 7 = 5[1 + 0.004(T)] ⇒ 1.4 = 1 + 0.004T ⇒ 0.4 = 0.004T ⇒ T = 100°C. બાકીના વિકલ્પો ગણતરીની ભૂલ દર્શાવે છે.", "ncert_ref": "Class XII - પ્રકરણ 3: વિદ્યુતપ્રવાહ", "difficulty": "Hard", "num": 5}, {"question": "એક નિર્દોષ સુવાહક પદાર્થનો રોધ તાપમાન સાથે R = R₀(1 + αΔT) સંબંધ અનુસરે છે. જો 20°C તાપમાને રોધ 4 Ω અને 100°C તાપમાને રોધ 5.2 Ω હોય, તો આ પદાર્થનો તાપમાન ગુણાંક (α) કેટલો હશે?", "options": ["A) 0.00375 °C⁻¹", "B) 0.00333 °C⁻¹", "C) 0.00250 °C⁻¹", "D) 0.00400 °C⁻¹"], "correct": 0, "explanation": "સૂત્ર R = R₀(1 + αΔT) માં R₀ = 4 Ω, R = 5.2 Ω, ΔT = 100°C - 20°C = 80°C મૂકતાં 5.2 = 4(1 + α×80) ⇒ 1.3 = 1 + 80α ⇒ α = 0.3/80 = 0.00375 °C⁻¹. વિકલ્પ A સાચું છે. અન્ય વિકલ્પો ખોટા ગણતરી પર આધારિત છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 3: વિદ્યુતપ્રવાહ", "difficulty": "Hard", "num": 6}, {"question": "એક વિશિષ્ટ મિશ્રધાતુનો તાર 0°C તાપમાને 12 Ω રોધ ધરાવે છે. જો તેનો તાપમાન ગુણાંક 0.00001 °C⁻¹ હોય અને તેને 500°C સુધી ગરમ કરવામાં આવે, તો નવો રોધ કેટલો થશે? (નોંધ: આ મિશ્રધાતુનું ગલનબિંદુ 1200°C છે.)", "options": ["A) 12.06 Ω", "B) 12.60 Ω", "C) 11.40 Ω", "D) 13.20 Ω"], "correct": 0, "explanation": "R = R₀(1 + ું મૂલ્ય કેટલું હશે?", "options": ["A) 400 K", "B) 500 K", "C) 600 K", "D) 700 K"], "correct": 2, "explanation": "R = R₀ e^(β/T) ⇒ 5 = R₀ e^(β/300) અને 3 = R₀ e^(β/400). બંને સમીકરણોનો ગુણોત્તર લેતાં 5/3 = e^(β/300 - β/400) ⇒ ln(5/3) = β(1/300 - 1/400) ⇒ β = ln(5/3)/(1/1200) ≈ 600 K. વિકલ્પ C સાચું છે. અન્ય વિકલ્પો ખોટી ગણતરી પર આધારિત છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 3: વિદ્યુતપ્રવાહ (અર્ધવાહકો માટે અપ્રત્યક્ષ સંદર્ભ)", "difficulty": "Hard", "num": 10}, {"question": "એક વિશિષ્ટ મિશ્રધાતુનો તાર 20°C તાપમાને 50 Ω રોધ ધરાવે છે. જો આ મિશ્રધાતુનો તાપમાન ગુણાંક (α) 0.0001 °C⁻¹ હોય અને તેને 120°C સુધી ગરમ કરવામાં આવે, તો નવો રોધ કેટલો થશે? (ધારો કે રેખીય સંબંધ લાગુ પડે છે)", "options": ["A) 50.5 Ω", "B) 55.0 Ω", "C) 49.5 Ω", "D) 51.0 Ω"], "correct": 0, "explanation": "સૂત્ર R = R₀(1 + αΔT) અનુસાર, ΔT = 120°C - 20°C = 100°C. તેથી R = 50(1 + 0.0001 × 100) = 50(1 + 0.01) = 50 × 1.01 = 50.5 Ω. વિકલ્પ A સાચો છે. અન્ય વિકલ્પો ખોટા છે કારણ કે તેઓ ખોટા ગણતરી અથવા ખોટા તાપમાન ગુણાંકનો ઉપયોગ કરે છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 3: વિદ્યુતપ્રવાહ", "difficulty": "Hard", "num": 11}, {"question": "એક અર્ધવાહક પદાર્થનો રોધ 27°C તાપમાને 1000 Ω છે. જો તેનો રોધ તાપમાન સાથે R = R₀ e^(β/T) સંબંધ અનુસરે છે (જ્યાં β = 4000 K), તો 127°C તાપમાને તેનો રોધ કેટલો થશે? (T ને કેલ્વિનમાં લો)", "options": ["A) 100 Ω", "B) 250 Ω", "C) 500 Ω", "D) 10 Ω"], "correct": 0, "explanation": "27°C = 300 K અને 127°C = 400 K. સૂત્ર R = R₀ e^(β/T) અનુસાર, R₁/R₂ = e^(β(1/T₂ - 1/T₁)). તેથી R₂ = R₁ e^(β(1/T₁ - 1/T₂)) = 1000 e^(4000(1/300 - 1/400)) = 1000 e^(4000 × 1/1200) = 1000 e^(10/3) ≈ 1000 × 0.0907 ≈ 90.7 Ω ≈ 100 Ω. વિકલ્પ A સાચો છે. અન્ય વિકલ્પો ખોટા ગણતરી પર આધારિત છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 3: વિદ્યુતપ્રવાહ", "difficulty": "Hard", "num": 12}, {"question": "નીચેનામાંથી કયું વિધાન અપવાદરૂપ છે? (તાપમાન વધતાં રોધમાં થતો ફેરફાર સંદર્ભે)", "options": ["A) મોટાભાગની શુદ્ધ ધાતુઓનો રોધ તાપમાન વધતાં વધે છે", "B) કાર્બન અને સિલિકોન જેવા અર્ધવાહકોનો રોધ તાપમાન વધતાં ઘટે છે", "C) સુપરકન્ડક્ટર્સનો રો         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
