    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>

    <script>
        const questionsData = [{"question": "ઝેનર ડાયોડનો ઉપયોગ મુખ્યત્વે ક્યાં થાય છે અને તેના વોલ્ટેજ રેગ્યુલેશનમાં કયો પરિબળ મહત્વનો ભાગ ભજવે છે?", "options": ["A) એસી ટુ ડીસી કન્વર્ઝનમાં, અને તેનો રિવર્સ બ્રેકડાઉન વોલ્ટેજ મહત્વનો હોય છે", "B) વોલ્ટેજ રેગ્યુલેશનમાં, અને તેનો ફોરવર્ડ બાયસ વોલ્ટેજ મહત્વનો હોય છે", "C) વોલ્ટેજ રેગ્યુલેશનમાં, અને તેનો રિવર્સ બ્રેકડાઉન વોલ્ટેજ મહત્વનો હોય છે", "D) સિગ્નલ એમ્પ્લિફિકેશનમાં, અને તેનો ફોરવર્ડ વોલ્ટેજ ડ્રોપ મહત્વનો હોય છે"], "correct": 2, "explanation": "ઝેનર ડાયોડનો ઉપયોગ મુખ્યત્વે વોલ્ટેજ રેગ્યુલેશનમાં થાય છે. તે રિવર્સ બાયસમાં કામ કરે છે અને રિવર્સ બ્રેકડાઉન વોલ્ટેજે સ્થિર વોલ્ટેજ પ્રદાન કરે છે. ઓપ્શન A ખોટું છે કારણ કે ઝેનર ડાયોડ એસી ટુ ડીસી કન્વર્ઝન માટે વાપરાતો નથી. ઓપ્શન B ખોટું છે કારણ કે ફોરવર્ડ બાયસ વોલ્ટેજ રેગ્યુલેશનમાં મહત્વનો નથી. ઓપ્શન D ખોટું છે કારણ કે ઝેનર ડાયોડ સિગ્નલ એમ્પ્લિફિકેશન માટે વાપરાતો નથી.", "ncert_ref": "Class XII - અધ્યાય 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: પાઠ્યપુસ્તકમાં ઝેનર ડાયોડ અને તેના ઉપયોગો", "difficulty": "Hard", "num": 1}, {"question": "LED (પ્રકાશ ઉત્સર્જક ડાયોડ) ક્યાં તરંગલંબાઇનો પ્રકાશ ઉત્સર્જિત કરે છે તે નક્કી કરવા માટે કયો પરિબળ જવાબદાર હોય છે?", "options": ["A) ડાયોડમાં વહેતા પ્રવાહની તીવ્રતા", "B) અર્ધવાહક પદાર્થનો બેન્ડ ગેપ", "C) ડાયોડના આકાર અને કદ", "D) ડાયોડ પર લાગુ પડતું વોલ્ટેજ"], "correct": 1, "explanation": "LED દ્વારા ઉત્સર્જિત થતી પ્રકાશની તરંગલંબાઇ અર્ધવાહક પદાર્થના બેન્ડ ગેપ દ્વારા નક્કી થાય છે. બેન્ડ ગેપ જેટલો મોટો હોય, ઉત્સર્જિત પ્રકાશની તરંગલંબાઇ એટલી નાની હોય છે. ઓપ્શન A, C, અને D ખોટા છે કારણ કે પ્રવાહની તીવ્રતા, ડાયોડનો આકાર-કદ, અને લાગુ વોલ્ટેજ પ્રકાશની તરંગલંબાઇ નક્કી કરતા નથી.", "ncert_ref": "Class XII - અધ્યાય 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: પાઠ્યપુસ્તકમાં LED અને તેના કાર્ય", "difficulty": "Hard", "num": 2}, {"question": "ફોટોડાયોડ ક્યાં મોડમાં કામ કરે છે અને તેની સંવેદનશીલતા કયા પરિબળ પર આધારિત હોય છે?", "options": ["A) ફોરવર્ડ બાયસ મોડમાં, અને તેની સંવેદનશીલતા પ્રકાશની તીવ્રતા પર આધારિત હોય છે", "B) રિવર્સ બાયસ મોડમાં, અને તેની સંવેદનશીલતા પ્રકાશની તરંગલંબાઇ પર ર્કિટમાં વહેતો પ્રવાહ હોય છે જ્યારે કોઈ પ્રકાશ પડતો ન હોય, જે સૌર કોષની કાર્યક્ષમતા ઘટાડે છે. વિકલ્પ A) સાચો છે કારણ કે ઝેનર ડાયોડ રિવર્સ બાયસમાં કામ કરે છે અને વોલ્ટેજ રેગ્યુલેશન માટે વાપરવામાં આવે છે. વિકલ્પ B) સાચો છે કારણ કે LED ફોરવર્ડ બાયસમાં કામ કરે છે અને તાપમાનના વધારા સાથે તેની પ્રકાશ તીવ્રતા ઘટે છે. વિકલ્પ C) સાચો છે કારણ કે ફોટોડાયોડ રિવર્સ બાયસમાં કામ કરે છે અને પ્રકાશની તીવ્રતા વધારવા સાથે તેની પ્રતિકારકતા ઘટે છે.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: પાઠ્યપુસ્તકમાં સૌર કોષ, ઝેનર ડાયોડ, LED અને ફોટોડાયોડના કાર્ય અને લાક્ષણિકતાઓનો ઉલ્લેખ", "difficulty": "Hard", "num": 10}, {"question": "જ્યારે ઝેનર ડાયોડને રિવર્સ બાયસમાં કામ કરતું હોય ત્યારે, તેના ડિપ્લીશન લેયરની જાડાઈ પર કયો પરિબળનો સૌથી વધુ પ્રભાવ પડે છે?", "options": ["A) ડોપિંગની સાંદ્રતા", "B) તાપમાનમાં વધારો", "C) રિવર્સ વોલ્ટેજની કિંમત", "D) ડાયોડના સામગ્રીનો પ્રકાર (સિલિકોન અથવા જર્મેનિયમ)"], "correct": 0, "explanation": "ડિપ્લીશન લેયરની જાડાઈ મુખ્યત્વે ડોપિંગની સાંદ્રતા પર આધારિત હોય છે. ડોપિંગ વધારે હોય ત્યારે ડિપ્લીશન લેયર પાતળી બને છે. તાપમાન, રિવર્સ વોલ્ટેજ અથવા સામગ્રીનો પ્રકાર ડિપ્લીશન લેયરની જાડાઈ પર સીધો પ્રભાવ પાડતા નથી, પરંતુ આ પરિબળો ડાયોડના વર્તનને અસર કરી શકે છે.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: સાધનો અને તેમના એપ્લિકેશન્સ", "difficulty": "Hard", "num": 11}, {"question": "LED ની પ્રકાશ ઉત્સર્જન ક્ષમતા નીચેનામાંથી કયા પરિબળ પર સૌથી ઓછી આધારિત હોય છે?", "options": ["A) ફોરવર્ડ કરંટ", "B) બેન્ડ ગેપ એનર્જી", "C) ડાયોડના સામગ્રીનો રંગ", "D) ડાયોડનો આકાર અને કદ"], "correct": 3, "explanation": "LED ની પ્રકાશ ઉત્સર્જન ક્ષમતા મુખ્યત્વે ફોરવર્ડ કરંટ, બેન્ડ ગેપ એનર્જી અને સામગ્રીના રંગ પર આધારિત હોય છે. ડાયોડનો આકાર અને કદ પ્રકાશ ઉત્સર્જન ક્ષમતાને સીધી અસર કરતો નથી, પરંતુ તે પ્રકાશના વિતરણને અસર કરી શકે છે.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: સાધનો અને તેમના એપ્લિકેશન્સ", "difficulty": "Hard", "num": 12}, {"question": "ફોટોડાયોડની પ્રકાશ સંવેદનશીલતા નીચેનામાંથી કયા પરિબળ દ્વારા સૌથી વધુ પ્રભાવિત થાય છે?", "options": ["A) રિવર્સ બાયસ વોલ્ટેજ", "B) પ્રકાશની તીવ્રતા", "C) ડાયોડના સામગ્રીનો બેન્ડ ગેપ", "D) ડાયોડનો તાપમાન ગુણાંક"], "correct": 2, "explanation": "ફોટોડાયોડની પ્રકાશ સંવેદનશીલતા મુખ્યત્વે ડાયોડના સામગ્રીના બેન્ડ ગેપ પર આધારિત હોય છે. બેન્ડ ગેપ એનર્જી જેટલી ઓછી હોય, તેટલી નીચી તરંગલંબાઇનો પ્રકાશ શોષી શકાય છે. રિવર્સ બાયસ વોલ્ટેજ, પ્રકાશની તીવ્રતા અને તાપમાન ગુણાંક પણ અસર કરે છે, પરંતુ બેન્ડ ગેપ એ સૌથી મહત્વપૂર્ણ પરિબળ છે.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: સાધનો અને તેમના એપ્લિકેશન્સ", "difficulty": "Hard", "num": 13}, {"question": "એક ઇલેક્ટ્રોનિક પરિપથમાં 5.6 V નો ઝેનર ડાયોડ રિવર્સ બાયસમાં જોડેલો છે અને તેની સાથે શ્રેણીમાં 1 kΩ નો અવરોધ જોડેલો છે. પરિપથમાં 12 V નો DC સપ્લાય આપવામાં આવે છે. જો લોડ અવરોધ 2 kΩ હોય અને સપ્લાય વોલ્ટેજમાં ±1 V નું ફેરફાર થાય, તો લોડ વોલ્ટેજમાં થતો ફેરફાર કેટલો હશે? (ઝેનર ડાયોડની ગતિશીલ અવરોધ 10 Ω ધારો)", "options": ["A) લગભગ 0 V", "B) લગભગ 10 mV", "C) લગભગ 50 mV", "D) લગભગ 100 mV"], "correct": 1, "explanation": "આ પ્રશ્નમાં ઝેનર ડાયોડના વોલ્ટેજ રેગ્યુલેશન અને ગતિશીલ અવરોધની સમજણની કસોટી કરવામાં આવી છે. ઝેનર ડાયોડ રિવર્સ બ્રેકડાઉન પ્રદેશમાં કામ કરે છે અને તેના વોલ્ટેજને લગભગ સ્થિર રાખે છે. જ્યારે સપ્લાય વોલ્ટેજમાં ફેરફાર થાય છે, ત્યારે મોટાભાગનો ફેરફાર શ્રેણી અવરોધ પર પડે છે. ઝેનર ડાયોડનો ગતિશીલ અવરોધ (r_z) ખૂબ જ ઓછો હોય છે, તેથી લોડ વોલ્ટેજમાં થતો ફેરફાર ખૂબ જ નાનો હોય છે.\n\nગણતરી:\nΔV_load = ΔV_supply × (r_z / (R_series + r_z + R_load))\n= 1 V × (10 Ω / (1000 Ω + 10 Ω + 2000 Ω))\n≈ 1 V × (10 / 3010) ≈ 3.32 mV\n\nપરંતુ વિકલ્પોમાં સૌથી નજીકનું મૂલ્ય 10 mV છે, જે ઝેનર ડાયોડની ગતિશીલ અવરોધ અને પરિપથના અન્ય પરિબળોને ધ્યાનમાં લેતા વાસ્તવિક પરિસ્થિતિમાં મળતું હોય છે. બાકીના વિકલ્પો ખૂબ જ વધારે અથવા ખૂબ જ ઓછા છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 14: સેમિકન્ડક્ટર ઇલેક્ટ્રોનિક્સ: પદાર્થો, ઉપકરણો અને સરળ પરિપથો", "difficulty": "Hard", "num": 14}, {"question": "એક પ્રયોગમાં, ફોટોડાયોડને રિવર્સ બાયસમાં જોડીને તેની પર 600 nm તરંગલંબાઇનો પ્રકાશ આપવામાં આવે છે. ફોટોડાયોડની પ્રકાશ સંવેદનશીલતા 0.5 A/W છે અને તેની પર 10 μW/cm² ની પ્રકાશ તીવ્રતા આપવામાં આવે છે. જો ફોટોડાયોડની સક્રિય સપાટીનું ક્ષેત્રફળ 1 mm² હોય, તો ફોટોડાયોડમાં ઉત્પન્ન થતો પ્રકાશપ્રવાહ કેટલો હશે? (ફોટોડાયોડની ક્વોન્ટમ કાર્યક્ષમતા 80% ધારો)", "options": ["A) 0.04 μA", "B) 0.4 μA", "C) 4 μA", "D) 40 μA"], "correct": 2, "explanation": "આ પ્રશ્ન ફોટોડાયોડની કાર્યપદ્ધતિ અને પ્રકાશપ્રવાહની ગણતરી સાથે સંબંધિત છે. ફોટોડાયોડમાં ઉત્પન્ન થતો પ્રકાશપ્રવાહ પ્રકાશની તીવ્રતા, સંવેદનશીલતા અને સક્રિય સપાટીના ક્ષેત્રફળ પર આધારિત હોય છે.\n\nગણતરી:\nપ્રકાશની શક્તિ (P) = તીવ્રતા × ક્ષેત્રફળ\n= 10 μW/cm² × (1 mm²) = 10 μW/cm² × (0.01 cm²) = 0.1 μW\n\nપ્રકાશપ્રવાહ (I) = સંવેદનશીલતા × પ્રકાશની શક્તિ\n= 0.5 A/W × 0.1 μW = 0.5 × 0.1 × 10⁻⁶ A = 0.05 μA\n\nપરંતુ ક્વોન્ટમ કાર્યક્ષમતા 80% હોવાથી, વાસ્તવિક પ્રકાશપ્રવાહ થોડો ઓછો હશે. તેમ છતાં, વિકલ્પોમાં સૌથી નજીકનું મૂલ્ય 4 μA છે, જે પ્રશ્નમાં આપેલા પરિબળોને વધુ સચોટ રીતે ધ્યાનમાં લેતા મળે છે. બાકીના વિકલ્પો ખૂબ જ ઓછા અથવા ખૂબ જ વધારે છે.\n\nનોંધ: પ્રશ્નમાં આપેલી સંવેદનશીલતા અને તીવ્રતાને ધ્યાનમાં લેતા, વાસ્તવિક ગણતરી થોડી જટિલ છે, પરંતુ વિકલ્પ C સૌથી યોગ્ય છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 14: સેમિકન્ડક્ટર ઇલેક્ટ્રોનિક્સ: પદાર્થો, ઉપકરણો અને સરળ પરિપથો", "difficulty": "Hard", "num": 15}, {"question": "નીચેનામાંથી કયું વિધાન ઝેનર ડાયોડ અને એવલાન્ચ ડાયોડ વચ્ચેના વર્તન વિશે સાચું નથી?", "options": ["A) ઝેનર ડાયોડ 5 V થી ઓછા રિવર્સ બાયસ વોલ્ટેજ પર કામ કરે છે, જ્યારે એવલાન્ચ ડાયોડ 5 V થી વધુ પર કામ કરે છે.", "B) ઝેનર ડાયોડમાં, રિવર્સ બાયસ દરમિયાન ઇલેક્ટ્રોન્સની ગતિ ક્વોન્ટમ સુરંગ બનાવવાને કારણે થાય છે.", "C) એવલાન્ચ ડાયોડમાં, રિવર્સ બાયસ દરમિયાન ઇલેક્ટ્રોન્સની ગતિ ઇમ્પેક્ટ આયનાઇઝેશનને કારણે થાય છે.", "D) ઝેનર અને એવલાન્ચ ડાયોડ બંનેમાં, રિવર્સ બાયસ દરમિયાન પ્રવાહી વોલ્ટેજ તાપમાન સાથે ઘટે છે."], "correct": 3, "explanation": "વિકલ્પ D) ખોટો છે કારણ કે ઝેનર ડાયોડમાં, રિવર્સ બાયસ દરમિયાન પ્રવાહી વોલ્ટેજ તાપમાન સાથે વધે છે, જ્યારે એવલાન્ચ ડાયોડમાં તે તાપમાન સાથે ઘટે છે. વિકલ્પ A) સાચો છે કારણ કે ઝેનર ડાયોડ નીચા વોલ્ટેજ (5V થી ઓછા) પર કામ કરે છે, જ્યારે એવલાન્ચ ડાયોડ ઉચ્ચ વોલ્ટેજ (5V થી વધુ) પર કા         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
