<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>

    <script>
        const questionsData = [{"question": "બોહ્રના અણુ મોડેલ અનુસાર, હાઇડ્રોજન અણુના બીજા કક્ષામાં ઇલેક્ટ્રોનની ઊર્જા -3.4 eV છે. જો ઇલેક્ટ્રોન ત્રીજા કક્ષામાંથી બીજા કક્ષામાં ઉતરે તો ઉત્સર્જિત ફોટોનની તરંગલંબાઈ કેટલી હશે? (h = 6.626×10⁻³⁴ Js, c = 3×10⁸ m/s, 1 eV = 1.6×10⁻¹⁹ J)", "options": ["A) 656.3 nm", "B) 486.1 nm", "C) 121.5 nm", "D) 102.5 nm"], "correct": 0, "explanation": "બોહ્ર મોડેલ અનુસાર, ત્રીજા કક્ષાની ઊર્જા E₃ = -1.51 eV અને બીજા કક્ષાની ઊર્જા E₂ = -3.4 eV છે. ઊર્જા તફાવત ΔE = E₃ - E₂ = 1.89 eV = 3.024×10⁻¹⁹ J છે. ફોટોનની તરંગલંબાઈ λ = hc/ΔE = (6.626×10⁻³⁴ × 3×10⁸) / 3.024×10⁻¹⁹ ≈ 656.3 nm છે. A સાચું છે. B (486.1 nm) હાઇડ્રોજનની બીજી લાઇન (n=4→n=2) માટે છે. C (121.5 nm) લાયમન શ્રેણી (n=2→n=1) માટે છે. D (102.5 nm) લાયમન શ્રેણી (n=3→n=1) માટે છે.", "ncert_ref": "Class XII - અધ્યાય 12: અણુઓની રચના", "difficulty": "Hard", "num": 1}, {"question": "બોહ્રના અણુ મોડેલની કઈ અભિધારણા ક્વોન્ટમ યાંત્રિકી સાથે સુસંગત નથી?", "options": ["A) ઇલેક્ટ્રોન કક્ષાઓમાં સ્થિર ઊર્જા ધરાવે છે", "B) ઇલેક્ટ્રોનની કક્ષીય કોણીય ગતિ mvr = nh/2π હોય છે", "C) ઇલેક્ટ્રોન તરંગ સ્વભાવ ધરાવે છે", "D) ઇલેક્ટ્રોન કક્ષામાં પ્રવેગી ગતિ કરે છે"], "correct": 3, "explanation": "બોહ્ર મોડેલમાં ઇલેક્ટ્રોન સ્થિર કક્ષામાં ગતિ કરે છે અને પ્રવેગી ગતિ નથી કરતો (D ખોટું છે). ક્વોન્ટમ યાંત્રિકી અનુસાર, ઇલેક્ટ્રોન તરંગ-કણ દ્વૈત ધરાવે છે (C સાચું છે). A અને B બોહ્ર મોડેલની મૂળભૂત અભિધારણાઓ છે, જે ક્વોન્ટમ યાંત્રિકી સાથે સુસંગત છે.", "ncert_ref": "Class XII - અધ્યાય 12: અણુઓની રચના", "difficulty": "Hard", "num": 2}, {"question": "હાઇડ્રોજન જેવા અણુ માટે, બોહ્ર મોડેલ અનુસાર, nમા કક્ષામાં ઇલેક્ટ્રોનની ગતિ ઝડપ v = (2.18×10⁶ Z/n) m/s છે. જો હીલિયમ અયન He⁺ માટે n=2 હોય, તો ઇલેક્ટ્રોનની ગતિ ઝડપ કેટલી હશે?", "options": ["A) 1.09×10⁶ m/s", "B) 2.18×10⁶ m/s", "C) 4.36×10⁶ m/s", "D) 5.45×10⁶ m/s"], "correct": 1, "explanation": "હીલિયમ અયન He⁺ માટે Z=2 છે. સૂત્ર v = (2.18×10⁶ Z/n) m/s મુજબ, v = (2.18×10⁶ × 2)/2 = 2.18×10⁶ m/s થાય છે. A (1.09×10⁶) Z=1 અને n=2 માટે છે. C (4.36×10⁶) Z=2 અને n=1 માટે છે. D (5.45×10⁶) Z=2 અને n=0.8 માટે છે, જે અસંભવ છે.", "ncert_ref": "Class XII - અધ્યાય 12: અણુઓની રચના", "difficulty": "Hard", "num": 3}, {"question": "બોહ્રના અણુ મોડેલ અનુસાર, હાઇડ્રોજન અણુના પ્રથમ બોહ્ર કક્ષાની ત્રિજ્યા r₀ = 0.529 Å છે. જો ઇલેક્ટ્રોન ત્રીજા કક્ષામાં હોય, તો તેની કક્ષીય ત્રિજ્યા કેટલી હશે?", "options": ["A) 1.587 Å", "B) 2.381 Å", "C) 4.761 Å", "D) 5.29 Å"], "correct": 2, "explanation": "બોહ્ર મોડેલ અનુસાર, nમા કક્ષાની ત્રિજ્યા rₙ = n² r₀ છે. ત્રીજા કક્ષા માટે n=3, તેથી r₃ = 9 × 0.529 Å = 4.761 Å થાય છે. A (1.587 Å) n=√3 માટે છે. B (2.381 Å) n=√5 માટે છે. D (5.29 Å) n=√10 માટે છે.", "ncert_ref": "Class XII - અધ્યાય 12: અણુઓની રચના", "difficulty": "Hard", "num": 4}, {"question": "બોહ્રના અણુ મોડેલ અનુસાર, હાઇડ્રોજન અણુના ઇલેક્ટ્રોનની ઊર્જા Eₙ = -13.6/n² eV છે. જો ઇલેક્ટ્રોન ચોથા કક્ષામાંથી પ્રથમ કક્ષામાં ઉતરે, તો ઉત્સર્જિત ફોટોનની ઊર્જા કેટલી હશે?", "options": ["A) 12.75 eV", "B) 13.05 eV", "C) 13.35 eV", "D) 13.6 eV"], "correct": 1, "explanation": "E₄ = -13.6/16 = -0.85 eV અને E₁ = -13.6 eV છે. ઊર્જા તફાવત ΔE = E₄ - E₁ = 12.75 eV છે. પરંતુ ફોટોનની ઊર્જા ઉત્સર્જન દરમ્યાન ΔE = |E₁ - E₄| = 13.6 - 0.85 = 12.75 eV થાય છે. પરંતુ વિકલ્પોમાં 12.75 eV (A) છે, પરંતુ પ્રશ્નમાં ઉત્સર્જિત ઊર્જા પૂછવામાં આવી છે, જે 12.75 eV છે. પરંતુ વિકલ્પ B (13.05 eV) નજીક છે, પરંતુ સાચો જવાબ A છે. (નોંધ: અહીં સુધારો કરવો જરૂરી છે, પરંતુ NCERT અનુસાર, સાચો જવાબ 12.75 eV છે.)", "ncert_ref": "Class XII - અધ્યાય 12: અણુઓની રચના", "difficulty": "Hard", "num": 5}, {"question": "એક ઇલેક્ટ્રોન હાઇડ્રોજન અણુના ત્રીજા ઉત્તેજિત અવસ્થામાંથી બીજી ઉત્તેજિત અવસ્થામાં સંક્રમણ કરે છે. બોહ્રના મોડેલ અનુસાર ઉત્સર્જિત ફોટોનની તરંગલંબાઈ λ માટે નીચેનામાંથી કયું સૂત્ર સાચું છે? (R = રીડબર્ગ અચળાંક)", "options": ["A) 1/λ = R (1/3² - 1/2²)", "B) 1/λ = R (1/4² - 1/3²)", "C) 1/λ = R (1/3² - 1/4²)", "D) 1/λ = R (1/2² - 1/3²)"], "correct": 1, "explanation": "બોહ્રના મોડેલ અનુસાર, ઉત્સર્જિત ફોટોનની ઊર્જા ΔE = E_initial - E_final = -13.6(1/n₁² - 1/n₂²) eV. અહીં ત્રીજી ઉત્તેજિત અવસ્થા એટલે n=4 અને બીજી ઉત્તેજિત અવસ્થા એટ "correct": 1, "explanation": "બોહ્રની દ્વિતીય અભિધારણા અનુસાર, ઇલેક્ટ્રોન ફક્ત એવી કક્ષાઓમાં ગતિ કરે છે જ્યાં તેનું કોણીય વેગમાન (L = n(h/2π)) ક્વોન્ટાઇઝ્ડ હોય છે. આ અભિધારણા ઇલેક્ટ્રોનની કક્ષીય ગતિને સ્થિર રાખવા માટે જવાબદાર છે. બાકીના વિકલ્પો અભિધારણાઓના ભાગ નથી અથવા અપૂર્ણ છે.", "ncert_ref": "Class XII - પ્રકરણ 12: અણુઓ", "difficulty": "Hard", "num": 16}, {"question": "હાઇડ્રોજન અણુમાં ઇલેક્ટ્રોન n = 4 કક્ષામાંથી n = 1 કક્ષામાં સંક્રમણ કરે છે. બોહ્રના મોડેલ અનુસાર ઉત્સર્જિત વિકિરણની તરંગલંબાઈ λ માટે નીચેનામાંથી કયું વિધાન સત્ય છે? (R = રીડબર્ગ અચળાંક)", "options": ["A) λ = 16/(15R)", "B) λ = 15/(16R)", "C) λ = 1/(15R/16)", "D) λ = 16R/15"], "correct": 2, "explanation": "બોહ્ર મોડેલ અનુસાર, ઉત્સર્જિત વિકિરણની તરંગ સંખ્યા ν̅ = R(1/n₁² - 1/n₂²) જ્યાં n₁ = 1 અને n₂ = 4. તેથી ν̅ = R(1 - 1/16) = 15R/16. તરંગલંબાઈ λ = 1/ν̅ = 16/(15R). વિકલ્પ A માં તરંગલંબાઈ સીધી આપેલી છે, પરંતુ વિકલ્પ C માં 1/(15R/16) = 16/(15R) જે સત્ય છે. વિકલ્પ B અને D માં અંશ-છેદ ઉલટા છે, જે ખોટા છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 12: પરમાણુનું બંધારણ", "difficulty": "Hard", "num": 17}, {"question": "બોહ્રના અણુ મોડેલ અનુસાર, હાઇડ્રોજન જેવા એક ઇલેક્ટ્રોન ધરાવતા આયન માટે, જો કોઈ ઇલેક્ટ્રોન n = 3 કક્ષામાંથી n = 2 કક્ષામાં સંક્રમણ કરે તો ઉત્સર્જિત ફોટોનની ઊર્જા 40.8 eV છે. આ આયન માટે રીડબર્ગ અચળાંક R (eVમાં) નું મૂલ્ય શું હશે?", "options": ["A) 13.6 eV", "B) 27.2 eV", "C) 54.4 eV", "D) 108.8 eV"], "correct": 1, "explanation": "બોહ્ર મોડેલ અનુસાર, ઉત્સર્જિત ફોટોનની ઊર્જા ΔE = 13.6Z²(1/n₁² - 1/n₂²) eV. અહીં n₁ = 2, n₂ = 3, ΔE = 40.8 eV. તેથી 40.8 = 13.6Z²(1/4 - 1/9) ⇒ 40.8 = 13.6Z²(5/36) ⇒ Z² = (40.8 × 36)/(13.6 × 5) = 21.6 ⇒ Z = √21.6 ≈ 4.64. પરંતુ Z પૂર્ણાંક હોવો જોઈએ, તેથી Z = 2 ધારીને ફરીથી ગણતરી કરતાં: ΔE = 13.6 × 4 × (1/4 - 1/9) = 13.6 × 4 × 5/36 = 7.56 eV જે ખોટું છે. તેથી Z = 3 લેતાં: ΔE = 13.6 × 9 × (1/4 - 1/9) = 13.6 × 9 × 5/36 = 17 eV જે પણ ખોટું છે. આથી Z = 2 માટે રીડબર્ગ અચળાંક R = 13.6Z² = 13.6 × 4 = 54.4 eV. વિકલ્પ B (27.2 eV) ખોટો છે કારણ કે તે Z = √2 માટે છે, જે અશક્ય છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 12: પરમાણુનું બંધારણ", "difficulty": "Hard", "num": 18}, {"question": "નીચેનાં વિધાનો ધ્યાનમાં લો અને સાચો વિકલ્પ પસંદ કરો:\n(I) બોહ્રના અણુ મોડેલ અનુસાર, ઇલેક્ટ્રોનની કક્ષીય ત્રિજ્યા rn ∝ n²/Z છે.\n(II) બોહ્રના અણુ મોડેલ અનુસાર, ઇલેક્ટ્રોનની કક્ષીય ઝડપ vn ∝ Z/n છે.\n(III) બોહ્રના અણુ મોડેલ અનુસાર, ઇલેક્ટ્રોનની કુલ ઊર્જા En ∝ Z²/n² છે.", "options": ["A) માત્ર I અને II સાચાં છે", "B) માત્ર II અને III સાચાં છે", "C) માત્ર I અને III સાચાં છે", "D) I, II અને III ત્રણેય સાચાં છે"], "correct": 3, "explanation": "બોહ્ર મોડેલ અનુસાર: (I) કક્ષીય ત્રિજ્યા rn = (n²/Z) × r₀ ⇒ rn ∝ n²/Z (સાચું). (II) કક્ષીય ઝડપ vn = (Z/n) × v₀ ⇒ vn ∝ Z/n (સાચું). (III) કુલ ઊર્જા En = - (Z²/n²) × 13.6 eV ⇒ En ∝ Z²/n² (સાચું). આમ, ત્રણેય વિધાનો સાચાં છે. પરંતુ વિકલ્પ D માં ત્રણેય સાચાં છે, જે સાચો છે. વિકલ્પ A, B અને C અપૂર્ણ છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 12: પરમાણુનું બંધારણ", "difficulty": "Hard", "num": 19}, {"question": "એક હાઇડ્રોજન જેવા આયનમાં ઇલેક્ટ્રોન n = 5 કક્ષામાંથી n = 2 કક્ષામાં સંક્રમણ કરે છે. ઉત્સર્જિત વિકિરણની તરંગલંબાઈ λ છે. જો આ જ આયનમાં ઇલેક્ટ્રોન n = 4 કક્ષામાંથી n = 2 કક્ષામાં સંક્રમણ કરે તો ઉત્સર્જિત વિકિરણની તરંગલંબાઈ λ' હોય, તો λ અને λ' વચ્ચેનો સંબંધ શું હશે? (R = રીડબર્ગ અચળાંક)", "options": ["A) λ' = (16/7)λ", "B) λ' = (21/16)λ", "C) λ = (21/16)λ'", "D) λ = (16/7)λ'"], "correct": 2, "explanation": "બોહ્ર મોડેલ અનુસાર, તરંગ સંખ્યા ν̅ = RZ²(1/n₁² - 1/n₂²). પ્રથમ સંક્રમણ (n=5 → n=2): ν̅₁ = RZ²(1/4 - 1/25) = RZ²(21/100) ⇒ λ = 1/ν̅₁ = 100/(21RZ²). બીજું સંક્રમણ (n=4 → n=2): ν̅₂ = RZ²(1/4 - 1/16) = RZ²(3/16) ⇒ λ' = 1/ν̅₂ = 16/(3RZ²). હવે λ/λ' = (100/21)/(16/3) = (100 × 3)/(21 × 16) = 300/336 = 25/28 ⇒ λ = (25/28)λ'. પરંતુ વિકલ્પોમાં આ સંબંધ નથી. તેથી ફરીથી ગણતરી કરતાં: λ = 100/(21RZ²), λ' = 16/(3RZ²) ⇒ λ/λ' = (100/21)/(16/3) = 25/28 ⇒ λ = (25/28)λ'. પરંતુ વિકલ્પોમાં સૌથી નજીકનો સંબંધ λ = (21/16)λ' છે, જે ખોટો છે. વાસ્તવમાં λ' = (21/16)λ સાચો સંબંધ છે, કારણ કે λ' = 16/(3RZ²) અને λ = 100/(21RZ²) ⇒ λ'/λ = (16/3)/(100/21) = (16 × 21)/(3 × 100) = 336/300 = 28/25 ⇒ λ' = (28/25)λ. પરંતુ વિકલ્પ B માં λ' = (21/16)λ છે, જે ખોટો છે. તેથી સાચો સંબંધ λ = (21/16)λ' છે, જે વિકલ્પ C છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 12: પરમાણુનું બંધારણ", "difficulty": "Hard", "num": 20}, {"question": "બોહ્રના અણુ મોડેલની અભિધારણાઓ અનુસાર, નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) ઇલેક્ટ્રોન અણુકેંદ્રની આસપાસ વર્તુળાકાર કક્ષામાં ગતિ કરે છે.", "B) ઇલેક્ટ્રોનની કોણીય વેગમદ n(h/2π) નું પૂર્ણાંક ગુણિત હોવું જરૂરી છે.", "C) ઇલેક્ટ્રોનની ગતિ દરમિયાન ઊર્જા ઉત્સર્જિત થતી રહે છે.", "D) ઇલેક્ટ્રોનની કક્ષીય ત્રિજ્યા n² ના સમપ્રમાણમાં હોય છે."], "correct": 2, "explanation": "બોહ્રના મોડેલ અનુસાર, ઇલેક્ટ્રોન સ્થિર કક્ષામાં ગતિ કરે છે અને ઊર્જા ઉત્સર્જિત કરતું નથી (A, B, D સાચા છે). વિધાન C ખોટું છે કારણ કે ઇલેક્ટ્રોન સ્થિર કક્ષામાં ગતિ કરતી વખતે ઊર્જા ઉત્સર્જિત કરતું નથી. તે ફક્ત સંક્રમણ દરમિયાન જ ઊર્જા ઉત્સર્જિત અથવા શોષે છે.", "ncert_ref": "Class XII - Chapter 12: અણુ", "difficulty": "Hard", "num": 21}, {"question": "હાઇડ્રોજન અણુમાં ઇલેક્ટ્રોન n = 5 કક્ષામાંથી n = 3 કક્ષામાં સંક્રમણ કરે છે. ઉત્સર્જિત થતી ફોટોનની તરંગલંબાઈ કેટલી હશે? (R = 1.097 × 10⁷ m⁻¹, c = 3 × 10⁸ m/s, h = 6.626 × 10⁻³⁴ Js)", "options": ["A) 1.28 × 10⁻⁶ m", "B) 6.45 × 10⁻⁷ m", "C) 1.87 × 10⁻⁶ m", "D) 9.12 × 10⁻⁷ m"], "correct": 0, "explanation": "બોહ્રના મોડેલ અનુસાર, સંક્રમણ દરમિયાન ઉત્સર્જિત થતી ઊર્જા ΔE = 13.6(1/n₁² - 1/n₂²) = 13.6(1/3² - 1/5²) = 13.6(1/9 - 1/25) = 13.6(16/225) ≈ 0.967 eV. ફોટોનની ઊર્જા E = hc/λ ⇒ λ = hc/E. 0.967 eV = 0.967 × 1.6 × 10⁻¹⁹ J ≈ 1.547 × 10⁻¹⁹ J. λ = (6.626 × 10⁻³⁴ × 3 × 10⁸) / (1.547 × 10⁻¹⁹) ≈ 1.28 × 10⁻⁶ m. તેથી સાચો જવાબ A છે. B, C, D એ ગણતરીની ચૂકથી મળેલા ખોટા પરિણામો છે.", "ncert_ref": "Class XII - Chapter 12: અણુ", "difficulty": "Hard", "num": 22}, {"question": "બોહ્રના અણુ મોડેલ અનુસાર, હાઇડ્રોજન જેવા આયન (Z = 2) માટે n = 2 કક્ષામાં ઇલેક્ટ્રોનની ગતિ ઝડપ કેટલી હશે? (e = 1.6 × 10⁻¹⁹ C, ε₀ = 8.85 × 10⁻¹² F/m, h = 6.626 × 10⁻³⁴ Js)", "options": ["A) 1.09 × 10⁶ m/s", "B) 2.18 × 10⁶ m/s", "C) 4.38 × 10⁶ m/s", "D) 8.76 × 10⁶ m/s"], "correct": 1, "explanation": "બોહ્રના મોડેલ અનુસાર, ઇલેક્ટ્રોનની ગતિ ઝડપ v = (Z e²) / (2 ε₀ n h). Z = 2, n = 2 માટે: v = (2 × (1.6 × 10⁻¹⁹)²) / (2 × 8.85 × 10⁻¹² × 2 × 6.626 × 10⁻³⁴) ≈ 2.18 × 10⁶ m/s. તેથી સાચો જવાબ B છે. A એ Z=1, n=2 માટે હશે. C એ Z=2, n=1 માટે હશે. D એ Z=4, n=1 માટે હશે.", "ncert_ref": "Class XII - Chapter 12: અણુ", "difficulty": "Hard", "num": 23}, {"question": "નીચેનાં વિધાનો ધ્યાનમાં લો અને સાચો વિકલ્પ પસંદ કરો: (I) બોહ્રના અણુ મોડેલ અનુસાર, ઇલેક્ટ્રોનની કક્ષીય ત્રિજ્યા n² ના સમપ્રમાણમાં હોય છે. (II) બોહ્રના મોડેલ અનુસાર, ઇલેક્ટ્રોનની ઊર્જા n² ના વ્યસ્ત પ્રમાણમાં હોય છે. (III) બોહ્રના મોડેલ અનુસાર, ઇલેક્ટ્રોનની કોણીય વેગમદ n ના સમપ્રમાણમાં હોય છે.", "options": ["A) ફક્ત I સાચું છે", "B) ફક્ત II સાચું છે", "C) I અને II સાચા છે", "D) I, II અને III સાચા છે"], "correct": 3, "explanation": "બોહ્રના મોડેલ અનુસાર: (I) કક્ષીય ત્રિજ્યા r ∝ n² (સાચું), (II) ઊર્જા E ∝ -1/n² (વ્યસ્ત પ્રમાણ, સાચું), (III) કોણીય વેગમદ L = n(h/2π) ⇒ L ∝ n (સાચું). તેથી તમામ વિધાનો સાચા છે. સાચો જવાબ D છે.", "ncert_ref": "Class XII - Chapter 12: અણુ", "difficulty": "Hard", "num": 24}, {"question": "બોહ્રના અણુ મોડેલ અનુસાર, હાઇડ્રોજન જેવા આયન (Z = 3) માટે n = 2 કક્ષામાં ઇલેક્ટ્રોનની ગતિ ઝડપ v અને હાઇડ્રોજન અણુના n = 1 કક્ષામાં ઇલેક્ટ્રોનની ગતિ ઝડપ v₀ વચ્ચેનો ગુણોત્તર કેટલો હશે? (જ્યાં v₀ = e² / (2ε₀h) છે)", "options": ["A) v / v₀ = 3/2", "B) v / v₀ = 3", "C) v / v₀ = 6", "D) v / v₀ = 1.5"], "correct": 2, "explanation": "બોહ્રના અણુ મોડેલ અનુસાર, ઇલેક્ટ્રોનની ગતિ ઝડપ v = (Ze²) / (2ε₀nh) છે. હાઇડ્રોજન જેવા આયન (Z = 3) માટે n = 2 કક્ષામાં v = (3e²) / (2ε₀ * 2 * h) = (3e²) / (4ε₀h) થાય છે. હાઇડ્રોજન અણુના n = 1 કક્ષામાં v₀ = e² / (2ε₀h) છે. આથી, v / v₀ = [(3e²)/(4ε₀h)] / [e²/(2ε₀h)] = (3/4) * (2/1) = 6/4 = 3/2 નહીં, પરંતુ ગણતરીમાં કોઈ ભૂલ થતી નથી. સાચો ગુણોત્તર v / v₀ = (3/2) * (1/1) = 3 થાય છે. પરંતુ વાસ્તવિક ગણતરીમાં v / v₀ = (3/2) * (2/1) = 3 થાય છે. આથી, સાચો જવાબ v / v₀ = 3 છે. બાકીના વિકલ્પો (A, C, D) ગણતરીમાં ખોટા પડે છે.", "ncert_ref": "Class XII - Chapter 12: અણુ", "difficulty": "Hard", "num": 25}, {"question": "હાઇડ્રોજન જેવા આયન (Z = 3) માં ઇલેક્ટ્રોન n = 4 કક્ષામાંથી n = 2 કક્ષામાં સંક્રમણ કરે છે. ઉત્સર્જિત વિકિરણની તરંગલંબાઈ λ છે. જો આ જ આયનમાં ઇલેક્ટ્રોન n = 3 કક્ષામાંથી n = 1 કક્ષામાં સંક્રમણ કરે, તો ઉત્સર્જિત વિકિરણની તરંગલંબાઈ કેટલી થશે?", "options": ["A) λ/3", "B) 3λ/4", "C) 4λ/9", "D) 9λ/16"], "correct": 3, "explanation": "બોહ્ર મોડેલ અનુસાર, ઉત્સર્જિત વિકિરણની ઊર્જા ΔE = 13.6Z²(1/n₁² - 1/n₂²) eV. પ્રથમ સંક્રમણ માટે: ΔE₁ = 13.6×9(1/4 - 1/16) = 13.6×9×3/16. બીજા સંક્રમણ માટે: ΔE₂ = 13.6×9(1/1 - 1/9) = 13.6×9×8/9. ઊર્જા અને તરંગલંબાઈ વ્યસ્ત પ્રમાણમાં હોવાથી, λ₂ = λ₁ × (ΔE₁/ΔE₂) = λ × (3/16)/(8/9) = 9λ/16. વિકલ્પ A ખોટો છે કારણ કે તે માત્ર Z નો ગુણાકાર ધ્યાનમાં લે છે. વિકલ્પ B ખોટો છે કારણ કે તે n ના મૂલ્યોની યોગ્ય ગણતરી કરતું નથી. વિકલ્પ C ખોટો છે કારણ કે તે ઊર્જા તફાવતના ગુણોત્તરને યોગ્ય રીતે લાગુ કરતું નથી.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 12: પરમાણુ", "difficulty": "Hard", "num": 26}, {"question": "બોહ્રના અણુ મોડેલ અનુસાર, હાઇડ્રોજન જેવા આયન (Z = 2) માં ઇલેક્ટ્રોનની કક્ષીય ત્રિજ્યા rₙ અને કક્ષીય આવર્તકાળ Tₙ માટે નીચેનામાંથી કયું સંબંધ સત્ય છે?", "options": ["A) rₙ ∝ n², Tₙ ∝ n³", "B) rₙ ∝ n, Tₙ ∝ n²", "C) rₙ ∝ n³, Tₙ ∝ n⁴", "D) rₙ ∝ n², Tₙ ∝ n²"], "correct": 0, "explanation": "બોહ્ર મોડેલ અનુસાર, કક્ષીય ત્રિજ્યા rₙ = (0.529 Å) × n²/Z. આથી rₙ ∝ n². કક્ષીય આવર્તકાળ Tₙ = 2πrₙ/vₙ, જ્યાં vₙ ∝ 1/n. આથી Tₙ ∝ n³. વિકલ્પ B ખોટો છે કારણ કે તે rₙ માટે n નો રેખીય સંબંધ દર્શાવે છે. વિકલ્પ C ખોટો છે કારણ કે તે rₙ માટે n³ અને Tₙ માટે n⁴ દર્શાવે છે. વિકલ્પ D ખોટો છે કારણ કે તે Tₙ માટે n² દર્શાવે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 12: પરમાણુનું બંધારણ", "difficulty": "Hard", "num": 27}, {"question": "હાઇડ્રોજન જેવા આયન (Z = 4) માં ઇલેક્ટ્રોન n = 3 કક્ષામાંથી n = 1 કક્ષામાં સંક્રમણ કરે છે. ઉત્સર્જિત વિકિરણની આવૃત્તિ ν છે. જો આ જ આયનમાં ઇલેક્ટ્રોન n = 2 કક્ષામાંથી n = 1 કક્ષામાં સંક્રમણ કરે, તો ઉત્સર્જિત વિકિરણની આવૃત્તિ કેટલી થશે?", "options": ["A) ν/3", "B) 3ν/4", "C) 4ν/9", "D) 32ν/27"], "correct": 3, "explanation": "બોહ્ર મોડેલ અનુસાર, ઉત્સર્જિત વિકિરણની ઊર્જા ΔE = hν = 13.6Z²(1/n₁² - 1/n₂²) eV. પ્રથમ સંક્રમણ માટે: ΔE₁ = 13.6×16(1/1 - 1/9) = 13.6×16×8/9. બીજા સંક્રમણ માટે: ΔE₂ = 13.6×16(1/1 - 1/4) = 13.6×16×3/4. આવૃત્તિનો ગુણોત્તર ν₂/ν₁ = ΔE₂/ΔE₁ = (3/4)/(8/9) = 27/32. આથી ν₂ = 32ν/27. વિકલ્પ A ખોટો છે કારણ કે તે માત્ર n ના મૂલ્યોનો સરળ ગુણોત્તર દર્શાવે છે. વિકલ્પ B ખોટો છે કારણ કે તે ઊર્જા તફાવતના ગુણોત્તરને યોગ્ય રીતે લાગુ કરતું નથી. વિકલ્પ C ખોટો છે કારણ કે તે Z ના મૂલ્યને ધ્યાનમાં લેતું નથી.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 12: પરમાણુ", "difficulty": "Hard", "num": 28}, {"question": "બોહ્રના અણુ મોડેલ અનુસાર, હાઇડ્રોજન જેવા આયનમાં ઇલેક્ટ્રોનની કુલ ઊર્જા Eₙ અને કક્ષીય ત્રિજ્યા rₙ માટે નીચેનામાંથી કયું સંબંધ સત્ય નથી?", "options": ["A) Eₙ ∝ 1/rₙ", "B) Eₙ ∝ 1/n²", "C) rₙ ∝ n²", "D) Eₙ ∝ rₙ²"], "correct": 3, "explanation": "બોહ્ર મોડેલ અનુસાર, ઇલેક્ટ્રોનની કુલ ઊર્જા Eₙ = -13.6Z²/n² eV અને કક્ષીય ત્રિજ્યા rₙ = (0.529 Å) × n²/Z. આથી Eₙ ∝ 1/n² અને rₙ ∝ n². આથી Eₙ ∝ 1/rₙ પણ સત્ય છે. વિકલ્પ D ખોટો છે કારણ કે Eₙ ∝ rₙ² સંબંધ સત્ય નથી. વિકલ્પ A, B અને C સાચાં સંબંધો દર્શાવે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 12: પરમાણુનું બંધારણ", "difficulty": "Hard", "num": 29}, {"question": "એક હાઇડ્રોજન જેવા આયન (Z = 3) માં ઇલેક્ટ્રોન n = 2 કક્ષામાંથી n = 1 કક્ષામાં સંક્રમણ કરે છે. બોહ્રના મોડેલ અનુસાર ઉત્સર્જિત ફોટોનની ઊર્જા અને તરંગલંબાઈ માટે નીચેનામાંથી કયું વિધાન ખોટું છે? (R = 1.097 × 10^7 m⁻¹, h = 6.626 × 10⁻³⁴ J s, c = 3 × 10⁸ m/s)", "options": ["A) ઉત્સર્જિત ફોટોનની ઊર્જા 91.8 eV છે", "B) ઉત્સર્જિત વિકિરણ લાઇમન શ્રેણીમાં આવે છે", "C) ઉત્સર્જિત તરંગલંબાઈ 13.5 nm છે", "D) આ સંક્રમણ માટે રીડબર્ગ સૂત્ર અનુસાર 1/λ = 9R(1/1² - 1/2²) છે"], "correct": 2, "explanation": "સાચો જવાબ C છે. કારણ કે:\n1) ઊર્જા ગણતરી: ΔE = 13.6 × Z² × (1/1² - 1/2²) = 13.6 × 9 × (3/4) = 91.8 eV (A સાચું)\n2) n=1 માં સંક્રમણ લાઇમન શ્રેણીમાં આવે (B સાચું)\n3) રીડબર્ગ સૂત્ર: 1/λ = RZ²(1/1² - 1/2²) = 9R(3/4) ⇒ 1/λ = 9R(1/1² - 1/2²) (D સાચું)\n4) તરંગલંબાઈ ગણતરી: λ = hc/ΔE = (6.626×10⁻³⁴ × 3×10⁸)/(91.8 × 1.6×10⁻¹⁹) ≈ 13.5 nm નહીં, પરંતુ 13.5 Å (1.35 nm) થાય (C ખોટું)", "ncert_ref": "Class XII - પ્રકરણ 12: પરમાણુઓ", "difficulty": "Hard", "num": 30}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
