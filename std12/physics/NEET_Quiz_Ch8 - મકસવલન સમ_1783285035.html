        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}

        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>

    <script>

ation": "મેક્સવેલના ચોથા સમીકરણ ∇ × B = μ₀J + μ₀ε₀(∂E/∂t) અનુસાર, જો J = 0 અને ∂E/∂t = 0 હોય, તો ∇ × B = 0 થાય છે. આનો અર્થ એ છે કે ચુંબકીયક્ષેત્ર B નું કર્લ શૂન્ય છે, જે સૂચવે છે કે B સ્થિર અને સરળ રેખીય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) ∇ × B શૂન્ય હોવા છતાં B સમય સાથે બદલાતું નથી, C) B અસ્તિત્વમાં રહેશે (ઉદા. સ્થિર ચુંબકમાં), D) ∇ × B શૂન્ય હોવાથી કર્લ અચળ નહીં પરંતુ શૂન્ય હશે.", "ncert_ref": "Class XII - Chapter 8: વિદ્યુતચુંબકીય તરંગો (મેક્સવેલના સમીકરણો)", "difficulty": "Hard", "num": 19}, {"question": "મેક્સવેલના સમીકરણો અનુસાર, શૂન્યાવકાશમાં એક વિદ્યુતચુંબકીય તરંગ પ્રસરે છે. જો તરંગમાં વિદ્યુતક્ષેત્ર E અને ચુંબકીયક્ષેત્ર B વચ્ચેનો કોણ θ હોય, તો θ નું મૂલ્ય કેટલું હશે? (ધારો કે તરંગ એકસમાન મધ્યમમાં પ્રસરે છે)", "options": ["A) 0°", "B) 45°", "C) 90°", "D) 180°"], "correct": 2, "explanation": "મેક્સવેલના સમીકરણો અનુસાર, વિદ્યુતચુંબકીય તરંગોમાં વિદ્યુતક્ષેત્ર E અને ચુંબકીયક્ષેત્ર B હંમેશા પરસ્પર લંબરૂપે (90°) અને પ્રસરણની દિશાથી લંબરૂપે હોય છે. આ તરંગની પ્રકૃતિ છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: A) 0° એ સમાંતર દિશા સૂચવે છે, જે વિદ્યુતચુંબકીય તરંગો માટે અસંભવ છે, B) 45° એ કોઈપણ ભૌતિક આધાર વગરનો કોણ છે, D) 180° એ વિરુદ્ધ દિશા સૂચવે છે, જે તરંગોની પ્રકૃતિ સાથે મેળ ખાતું નથી.", "ncert_ref": "Class XII - Chapter 8: વિદ્યુતચુંબકીય તરંગો (મેક્સવેલના સમીકરણો)", "difficulty": "Hard", "num": 20}, {"question": "મેક્સવેલના સમીકરણ ∮ E · dl = -dΦ_B/dt અનુસાર, જો એક બંધ લૂપમાં ચુંબકીય ફ્લક્સ Φ_B સમય સાથે ઘટે છે, તો લૂપમાં પ્રેરિત થતું વિદ્યુતક્ષેત્ર E ની દિશા કઈ હશે?", "options": ["A) ફ્લક્સના ઘટાડાને રોકવા માટેની દિશામાં", "B) ફ્લક્સના ઘટાડાને વેગ આપવા માટેની દિશામાં", "C) લૂપની સપાટી સાથે સમાંતર", "D) લૂપની સપાટી સાથે લંબરૂપે"], "correct": 0, "explanation": "ફેરાડેના વિદ્યુતચુંબકીય પ્રેરણાના નિયમ (જે મેક્સવેલના ત્રીજા સમીકરણમાં સમાવિષ્ટ છે) અનુસાર, પ્રેરિત વિદ્યુતક્ષેત્ર એવી દિશામાં ઉત્પન્ન થાય છે કે જે ચુંબકીય ફ્લક્સના પરિવર્તનનો વિરોધ કરે. આથી, જો Φ_B ઘટે છે, તો E ની દિશા ફ્લક્સના ઘટાડાને રોકવા માટેની હશે. વિકલ્પ B વિરોધી છે, વિકલ્પ C અને D ભૌમિતિક દિશા વિશે અચોક્કસ છે.", "ncert_ref": "Class XII - Chapter 8: વિદ્યુતચુંબકીય તરંગો", "difficulty": "Hard", "num": 21}, {"question": "મેક્સવેલના સમીકરણ ∇ × B = μ₀J + μ₀ε₀(∂E/∂t) ની જમણી બાજુએ રહેલો પદ μ₀ε₀(∂E/∂t) કયા ભૌતિક અર્થને સૂચવે છે?", "options": ["A) સ્થિર વિદ્યુત પ્રવાહ દ્વારા ઉત્પન્ન થતું ચુંબકીય ક્ષેત્ર", "B) બદલાતા વિદ્યુત ક્ષેત્ર દ્વારા ઉત્પન્ન થતું ચુંબકીય ક્ષેત્ર", "C) સ્થિર ચુંબકીય પ્રવાહ દ્વારા ઉત્પન્ન થતું વિદ્યુત ક્ષેત્ર", "D) બદલાતા ચુંબકીય ક્ષેત્ર દ્વારા ઉત્પન્ન થતું વિદ્યુત ક્ષેત્ર"], "correct": 1, "explanation": "μ₀ε₀(∂E/∂t) પદ બદલાતા વિદ્યુત ક્ષેત્ર (∂E/∂t) દ્વારા ઉત્પન્ન થતું ચુંબકીય ક્ષેત્ર સૂચવે છે. આ મેક્સવેલનું સુધારેલું એમ્પિયરનું નિયમ છે, જેમાં બદલાતા વિદ્યુત ક્ષેત્ર પણ ચુંબકીય ક્ષેત્ર ઉત્પન્ન કરે છે. A) ખોટું છે કારણ કે સ્થિર પ્રવાહ (J) પહેલાથી જ μ₀J પદ દ્વારા આવરી લેવામાં આવે છે. C) અને D) ખોટાં છે કારણ કે તે વિદ્યુત ક્ષેત્રની ઉત્પત્તિ સાથે સંબંધિત નથી.", "ncert_ref": "Class XII - Chapter 8: વિદ્યુતચુંબકીય તરંગો", "difficulty": "Hard", "num": 22}, {"question": "મેક્સવેલના સમીકરણ ∮ E · dl = -dΦ_B/dt ની વ્યાખ્યા અનુસાર, જો એક બંધ લૂપમાં ઉત્પન્ન થતું વિદ્યુત ક્ષેત્ર E, લૂપના ક્ષેત્રફળમાં ફેરફાર ન કરે તો કયું વિધાન સાચું છે?", "options": ["A) ચુંબકીય ફ્લક્સ સતત બદલાતો રહે છે", "B) ચુંબકીય ફ્લક્સ શૂન્ય છે", "C) ચુંબકીય ફ્લક્સ સતત છે", "D) વિદ્યુત ક્ષેત્ર E શૂન્ય છે"], "correct": 3, "explanation": "∮ E · dl = -dΦ_B/dt અનુસાર, જો લૂપમાં ઉત્પન્ન થતું E ક્ષેત્રફળમાં ફેરફાર ન કરે, તો dΦ_B/dt = 0, એટલે કે E = 0. A) ખોટું છે કારણ કે ફ્લક્સ બદલાતો નથી. B) ખોટું છે કારણ કે ફ્લક્સ શૂન્ય ન પણ હોઈ શકે. C) ખોટું છે કારણ કે ફ્લક્સ સતત હોઈ શકે પરંતુ E શૂન્ય હોવું જરૂરી છે.", "ncert_ref": "Class XII - Chapter 8: વિદ્યુતચુંબકીય તરંગો", "difficulty": "Hard", "num": 23}, {"question": "મેક્સવેલના સમીકરણ ∇ × E = -∂B/∂t અનુસાર, જો એક પ્રદેશમાં ચુંબકીયક્ષેત્ર B સમય સાથે બદલાતું ન હોય, તો વિદ્યુતક્ષેત્ર E ની પ્રકૃતિ કઈ હશે?", "options": ["A) વિદ્યુતક્ષેત્ર E સંપૂર્ણપણે શૂન્ય હશે", "B) વિદ્યુતક્ષેત્ર E સ્થિર (સમય સાથે બદલાતું નહીં) હશે", "C) વિદ્યુતક્ષેત્ર E સરળરેખીય હશે પરંતુ સમય         function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
