        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}

        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}

    <script>
        const questionsData = [{"question": "એક ઇલેક્ટ્રોન 10^6 m/s ની ઝડપે X-અક્ષની દિશામાં ગતિ કરે છે. જ્યારે તે 0.5 T ના ચુંબકીય ક્ષેત્રમાં પ્રવેશે છે, જે Y-અક્ષની દિશામાં છે, તો ઇલેક્ટ્રોન પર લાગતું ચુંબકીય બળ કયા અક્ષ પર હશે? (e = 1.6 × 10^-19 C)", "options": ["A) X-અક્ષ પર", "B) Y-અક્ષ પર", "C) Z-અક્ષ પર", "D) X અને Y અક્ષના સંમેળમાં"], "correct": 2, "explanation": "ફ્લેમિંગના ડાવા હાથના નિયમ મુજબ, ઇલેક્ટ્રોન પર લાગતું ચુંબકીય બળ F = q(v × B) છે. અહીં, v X-દિશામાં અને B Y-દિશામાં છે, તેથી v × B ની દિશા Z-અક્ષ પર હશે. ઇલેક્ટ્રોનનો વહન ઋણ હોવાથી, બળની દિશા Z-અક્ષની વિરુદ્ધ (અર્થાત -Z) હશે, પરંતુ પ્રશ્નમાં માત્ર અક્ષની દિશા પૂછવામાં આવી છે. A, B, અને D વિકલ્પો ચુંબકીય બળની દિશા સાથે સુસંગત નથી.", "ncert_ref": "Class XII - પ્રકરણ 4: ગતિશીલ વિદ્યુતભાર પર ચુંબકીય બળ", "difficulty": "Hard", "num": 1}, {"question": "જો એક આલ્ફા કણ (α-કણ) અને એક પ્રોટોન એકસરખી ઝડપે ચુંબકીય ક્ષેત્રમાં પ્રવેશે છે, તો કયા કણ પર વધુ ચુંબકીય બળ લાગશે? (α-કણનો વહન = 2e, પ્રોટોનનો વહન = e)", "options": ["A) આલ્ફા કણ પર", "B) પ્રોટોન પર", "C) બંનેપર સરખું બળ લાગશે", "D) ચુંબકીય ક્ષેત્રની દિશા પર આધાર રાખે છે"], "correct": 0, "explanation": "ચુંબકીય બળ F = qvB sinθ છે. અહીં, α-કણનો વહન (q) પ્રોટોન કરતાં દ્વિગુણો છે (2e vs e). જ્યારે v, B, અને θ (કોણ) સરખા હોય, ત્યારે F ∝ q. તેથી, α-કણ પર પ્રોટોન કરતાં દ્વિગુણું બળ લાગશે. B, C, અને D વિકલ્પો આ ગણતરી સાથે સુસંગત નથી.", "ncert_ref": "Class XII - પ્રકરણ 4: ગતિશીલ વિદ્યુતભાર પર ચુંબકીય બળ", "difficulty": "Hard", "num": 2}, {"question": "એક વિદ્યુતભારિત કણ ચુંબકીય ક્ષેત્રમાં વર્તુળાકાર પથ પર ગતિ કરે છે. જો ચુંબકીય ક્ષેત્રની તીવ્રતા અચાનક દ્વિગુણી થાય, તો કણની ત્રિજ્યા કેવી રીતે બદલાશે?", "options": ["A) ત્રિજ્યા અડધી થશે", "B) ત્રિજ્યા દ્વિગુણી થશે", "C) ત્રિજ્યા ચાર ગણી થશે", "D) ત્રિજ્યા બદલાશે નહીં"], "correct": 0, "explanation": "વર્તુળાકાર પથની ત્રિજ્યા r = mv/(qB) છે. જો B દ્વિગુણું થાય, તો r અડધી થશે. A વિકલ્પ સીધી ગણતરી સાથે સુસંગત છે. B, C, અને D વિકલ્પો ગણિતી સૂત્ર સાથે સુસંગત નથી.", "ncert_ref": "Class XII - પ્રકરણ 4: ગતિશીલ વિદ્યુતભાર પર  rₐ) કેટલો હશે? (પ્રોટોનનું દ્રવ્યમાન m લો)", "options": ["A) 1 : 1", "B) 1 : √2", "C) √2 : 1", "D) 2 : 1"], "correct": 1, "explanation": "પ્રવેગ a = qE/m. સમાન પ્રવેગ માટે e/m = e/2m ⇒ સમાન સંબંધ. ચુંબકીય ક્ષેત્રમાં ત્રિજ્યા r = mv/qB. પ્રારંભિક ઝડપ v = √(2aΔx) ⇒ v ∝ √(q/m). તેથી r ∝ (m/q) × √(q/m) = √(m/q). rₚ : rₐ = √(m/e) : √(2m/e) = 1 : √2. વિકલ્પ B સાચો છે. A ખોટો છે કારણ કે દ્રવ્યમાનનો તફાવત ધ્યાનમાં લેવામાં આવ્યો નથી. C અને D માં ગુણોત્તર ઉલટાવી દેવામાં આવ્યો છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 4: ગતિશીલ વિદ્યુતભાર અને ચુંબકત્વ", "difficulty": "Hard", "num": 14}, {"question": "એક ઇલેક્ટ્રોન એકસમાન ચુંબકીય ક્ષેત્ર B માં વર્તુળાકાર પથ પર ગતિ કરે છે. જો ચુંબકીય ક્ષેત્રનું મૂલ્ય અચાનક બમણું કરી દેવામાં આવે, તો નીચેનામાંથી કયું પરિમાણ બદલાશે નહીં?", "options": ["A) ત્રિજ્યા", "B) આવૃત્તિ", "C) કોણીય વેગ", "D) ગતિઊર્જા"], "correct": 3, "explanation": "ચુંબકીય ક્ષેત્રમાં વર્તુળાકાર ગતિ માટે: ત્રિજ્યા r = mv/qB ⇒ B બમણું થતાં r અડધી થશે. આવૃત્તિ f = qB/(2πm) ⇒ B બમણું થતાં f બમણી થશે. કોણીય વેગ ω = 2πf ⇒ B બમણું થતાં ω બમણો થશે. ગતિઊર્જા K = ½mv² ⇒ ચુંબકીય ક્ષેત્રથી સ્વતંત્ર છે, તેથી બદલાશે નહીં. વિકલ્પ D સાચો છે. A, B, અને C ખોટા છે કારણ કે તેઓ ચુંબકીય ક્ષેત્ર પર આધારિત છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 4: ગતિશીલ વિદ્યુતભાર અને ચુંબકત્વ", "difficulty": "Hard", "num": 15}, {"question": "એક વીજભારિત કણ (ભાર +q, દ્રવ્યમાન m) ચુંબકીય ક્ષેત્ર B માં વર્તુળાકાર પથ પર ગતિ કરે છે. જો ચુંબકીય ક્ષેત્રની તીવ્રતા અચાનક દોઢગણી થાય, તો કણની ગતિની ત્રિજ્યા અને કોણીય વેગ પર શું અસર થશે?", "options": ["A) ત્રિજ્યા અડધી થાય, કોણીય વેગ દોઢગણો થાય", "B) ત્રિજ્યા દોઢગણી થાય, કોણીય વેગ અડધો થાય", "C) ત્રિજ્યા અડધી થાય, કોણીય વેગ અચળ રહે", "D) ત્રિજ્યા અચળ રહે, કોણીય વેગ દોઢગણો થાય"], "correct": 0, "explanation": "ત્રિજ્યા r = mv/(qB) છે, જેથી B દોઢગણું થાય તો r અડધી થાય. કોણીય વેગ ω = v/r = qB/m, જેથી B દોઢગણું થાય તો ω પણ દોઢગણો થાય. વિકલ્પ A સાચો છે. B, C, D ગણિતી રીતે ખોટા છે.", "ncert_ref": "Class XII - Chapter 4: ગતિશીલ વિદ્યુતભાર પર ચુંબકીય બળ", "difficulty": "Hard", "num": 16}, {"question": "એક આલ્ફા કણ (ભાર +2e, દ્રવ્યમાન 4m) અને એક પ્રોટોન (ભાર +e, દ્રવ્યમાન m) એકસરખી ઝડપે ચુંબકીય ક્ષેત્રમાં લંબરૂપે પ્રવેશે છે. જો બંને કણોની ગતિની ત્રિજ્યા અનુક્રમે rₐ અને rₚ હોય, તો rₐ/rₚ નું મૂલ્ય કેટલું હશે?", "options": ["A) 2", "B) 1/2", "C) 4", "D) 1/4"], "correct": 1, "explanation": "ત્રિજ્યા r = mv/(qB) છે. આલ્ફા કણ માટે q = 2e, m = 4m, અને પ્રોટોન માટે q = e, m = m. આથી rₐ = (4m·v)/(2eB) = 2mv/(eB), અને rₚ = mv/(eB). આથી rₐ/rₚ = 2. પરંતુ પ્રશ્નમાં rₐ/rₚ પૂછવામાં આવ્યું છે, પરંતુ વિકલ્પ A 2 છે, જે સાચો જવાબ છે. પરંતુ વિકલ્પ A અને C વચ્ચે ગોઠવણી ખોટી છે. સુધારેલું: rₐ = (4m·v)/(2eB) = 2mv/(eB), rₚ = mv/(eB), આથી rₐ/rₚ = 2. પરંતુ વિકલ્પ A 2 છે, જે સાચો છે.", "ncert_ref": "Class XII - Chapter 4: ગતિશીલ વિદ્યુતભાર પર ચુંબકીય બળ", "difficulty": "Hard", "num": 17}, {"question": "એક ઇલેક્ટ્રોન ચુંબકીય ક્ષેત્ર B માં વર્તુળાકાર પથ પર ગતિ કરે છે. જો ચુંબકીય ક્ષેત્રની દિશા અચાનક ઉલટી દિશામાં થાય, તો ઇલેક્ટ્રોનની ગતિની દિશા પર શું અસર થશે?", "options": ["A) ગતિની દિશા ઉલટી થાય", "B) ગતિની દિશા અચળ રહે, પરંતુ વેગમાનની દિશા ઉલટી થાય", "C) ગતિની દિશા અને વેગમાનની દિશા બંને અચળ રહે", "D) ગતિની ત્રિજ્યા બદલાય, પરંતુ દિશા અચળ રહે"], "correct": 1, "explanation": "ચુંબકીય બળ F = q(v × B) છે. જો Bની દિશા ઉલટી થાય, તો Fની દિશા પણ ઉલટી થાય, પરંતુ ઇલેક્ટ્રોનની ગતિની દિશા (v) અચળ રહે. વેગમાનની દિશા બદલાય છે કારણ કે બળની દિશા ઉલટી થાય છે. વિકલ્પ B સાચો છે. A, C, D ભૌતિક રીતે ખોટા છે.", "ncert_ref": "Class XII - Chapter 4: ગતિશીલ વિદ્યુતભાર પર ચુંબકીય બળ", "difficulty": "Hard", "num": 18}, {"question": "એક વીજભારિત કણ (ભાર q, દ્રવ્યમાન m) ચુંબકીય ક્ષેત્ર B માં વર્તુળાકાર પથ પર ગતિ કરે છે. જો કણનો ભાર દોઢગણો અને દ્રવ્યમાન અડધું થાય, તો કણની ગતિની ત્રિજ્યા પર શું અસર થશે? (આરંભિક ત્રિજ્યા r₀ છે)", "options": ["A) r₀/3", "B) r₀/2", "C) 2r₀/3", "D) 3r₀/2"], "correct": 0, "explanation": "ત્રિજ્યા r = mv/(qB) છે. નવા ભાર q' = 3q/2 અને નવા દ્રવ્યમાન m' = m/2 થાય. આથી નવી ત્રિજ્યા r' = (m/2)v / (3q/2 B) = (mv)/(3qB) = r₀/3. વિકલ્પ A સાચો છે. B, C, D ગણિતી રીતે ખોટા છે.", "ncert_ref": "Class XII - Chapter 4: ગતિશીલ વિદ્યુતભાર પર ચુંબકીય બળ", "difficulty": "Hard", "num": 19}, {"question": "એક વિદ્યુતભારિત કણ (ભાર q, દ્રવ્યમાન m) એકસમાન ચુંબકીય ક્ષેત્ર B માં ગતિ કરે છે. જો કણની ગતિની દિશા ચુંબકીય ક્ષેત્ર સાથે θ (0 < θ < 90°) નો ખૂણો બનાવતી હોય, તો નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) કણનો પથ હેલિકલ (સર્પિલ) હોય છે", "B) કણની ગતિની કુલ ઝડપ અચળ રહે છે", "C) કણ પર લાગતું ચુંબકીય બળ તેની ગતિની દિશામાં કાર્ય કરે છે", "D) કણની ગતિને બે ઘટકોમાં વિભાજિત કરી શકાય: એક ચુંબકીય ક્ષેત્રને સમાંતર અને બીજો લંબરૂપ"], "correct": 2, "explanation": "સાચો જવાબ C છે કારણ કે ચુંબકીય બળ હંમેશા કણની ગતિની દિશા અને ચુંબકીય ક્ષેત્ર બંનેને લંબરૂપ હોય છે (F = q(v × B)), તેથી તે ગતિની દિશામાં કાર્ય કરી શકતું નથી. આથી વિકલ્પ C ખોટું છે.\n\nવિકલ્પ A સાચું છે કારણ કે જ્યારે કણની ગતિ ચુંબકીય ક્ષેત્ર સાથે ખૂણો બનાવે છે, ત્યારે તેનો પથ હેલિકલ બને છે.\n\nવિકલ્પ B સાચું છે કારણ કે ચુંબકીય બળ કણની ગતિ પર કાર્ય કરતું નથી, તેથી તેની ઝડપ અચળ રહે છે.\n\nવિકલ્પ D સાચું છે કારણ કે કણની ગતિને ચુંબકીય ક્ષેત્રને સમાંતર અને લંબરૂપ ઘટકોમાં વિભાજિત કરી શકાય છે.", "ncert_ref": "Class XII - પ્રકરણ 4: ગતિશીલ વિદ્યુતભાર અને ચુંબકત્વ", "difficulty": "Hard", "num": 20}, {"question": "એક વીજભારિત કણ (ભાર +q, દ્રવ્યમાન m) એકસમાન ચુંબકીય ક્ષેત્ર B માં ઝડપ v થી ગતિ કરે છે. જો કણના વેગ વેક્ટર અને ચુંબકીય ક્ષેત્ર વેક્ટર વચ્ચેનો ખૂણો θ હોય, તો કણ પર લાગતું ચુંબકીય બળ કયા સૂત્ર દ્વારા વ્યક્ત થાય છે?", "options": ["A) F = qvB sinθ", "B) F = qvB cosθ", "C) F = qvB tanθ", "D) F = qvB / sinθ"], "correct": 0, "explanation": "ચુંબકીય બળનું સૂત્ર F = q(v × B) છે, જેનો મગ્નિટ્યુડ F = qvB sinθ થાય છે, જ્યાં θ એ વેગ વેક્ટર અને ચુંબકીય ક્ષેત્ર વેક્ટર વચ્ચેનો ખૂણો છે. વિકલ્પ A સરખો છે. વિકલ્પ B, C, અને D ગણિતીય રીતે અયોગ્ય છે કારણ કે તે ક્રોસ પ્રોડક્ટના ગુણધર્મોને અનુરૂપ નથી.", "ncert_ref": "Class XII - Chapter 4: ગતિશીલ વિદ્યુતભાર પર ચુંબકીય બળ", "difficulty": "Hard", "num": 21}, {"question": "એક પ્રોટોન અને એક ડ્યુટેરોન (ભાર +e, દ્રવ્યમાન 2m) એકસરખી કિનેટિક ઉર્જા સાથે એકસમાન ચુંબકીય ક્ષેત્રમાં લંબરૂપે પ્રવેશે છે. જો પ્રોટોનની ત્રિજ્યા r હોય, તો ડ્યુટેરોનની ત્રિજ્યા કેટલી હશે?", "options": ["A) r", "B) r√2", "C) 2r", "D) r/√2"], "correct": 1, "explanation": "વર્તુળાકાર પથની ત્રિજ્યા r = mv/(qB) છે. કિનેટિક ઉર્જા એકસરખી હોવાથી, (1/2)mv² = K ⇒ v = √(2K/m). ડ્યુટેરોનનું દ્રવ્યમાન 2m હોવાથી, તેની ઝડપ v_d = √(2K/2m) = v_p/√2 હશે, જ્યાં v_p પ્રોટોનની ઝડપ છે. આથી, r_d = (2m)(v_p/√2)/(eB) = (mv_p)/(eB) * √2 = r√2. વિકલ્પ B સરખો છે. વિકલ્પ A, C, અને D ગણિતીય રીતે અયોગ્ય છે.", "ncert_ref": "Class XII - Chapter 4: ગતિશીલ વિદ્યુતભાર પર ચુંબકીય બળ", "difficulty": "Hard", "num": 22}, {"question": "એક વીજભારિત કણ ચુંબકીય ક્ષેત્રમાં વર્તુળાકાર પથ પર ગતિ કરે છે. જો ચુંબકીય ક્ષેત્રની તીવ્રતા અચાનક દોઢગણી થાય, તો કણની કોણીય વેગમાં કયો ફેરફાર થશે?", "options": ["A) અડધો થશે", "B) દોઢગણો થશે", "C) બમણો થશે", "D) અચળ રહેશે"], "correct": 2, "explanation": "કોણીય વેગ ω = qB/m છે. જો B દોઢગણું થાય, તો ω પણ દોઢગણું થાય. પરંતુ પ્રશ્નમાં દોઢગણી (1.5 ગણી) તીવ્રતા આપી છે, પરંતુ વિકલ્પમાં દોઢગણો (1.5 ગણો) કોણીય વેગ નથી. જો B બમણું થાય તો ω બમણું થાય. અહીં પ્રશ્નમાં 'દોઢગણી' શબ્દનો ઉપયોગ થયો છે, પરંતુ વિકલ્પ C (બમણો) સરખો છે કારણ કે ચુંબકીય ક્ષેત્રની તીવ્રતા બમણી થાય ત્યારે કોણીય વેગ બમણો થાય. વિકલ્પ A, B, અને D અયોગ્ય છે.", "ncert_ref": "Class XII - Chapter 4: ગતિશીલ વિદ્યુતભાર પર ચુંબકીય બળ", "difficulty": "Hard", "num": 23}, {"question": "એક ઇલેક્ટ્રોન અને એક પ્રોટોન એકસરખી ઝડપે ચુંબકીય ક્ષેત્રમાં લંબરૂપે પ્રવેશે છે. જો ઇલેક્ટ્રોનની ત્રિજ્યા r_e હોય, તો પ્રોટોનની ત્રિજ્યા r_p કેટલી હશે?", "options": ["A) r_e", "B) r_e/1836", "C) 1836 r_e", "D) r_e/2"], "correct": 1, "explanation": "વર્તુળાકાર પથની ત્રિજ્યા r = mv/(qB) છે. ઇલેક્ટ્રોન અને પ્રોટોનનો ભાર એકસરખો (e) હોવા છતાં, પ્રોટોનનું દ્રવ્યમાન ઇલેક્ટ્રોન કરતાં લગભગ 1836 ગણું છે. આથી, r_p = (m_p v)/(eB) = 1836 (m_e v)/(eB) = 1836 r_e. પરંતુ ઇલેક્ટ્રોનનો ભાર નેગેટિવ હોવાથી, તેની દિશા વિરુદ્ધ હશે, પરંતુ ત્રિજ્યાનો મગ્નિટ્યુડ એકસરખો રહેશે. વિકલ્પ B સરખો છે કારણ કે r_p = r_e * (m_p/m_e) = r_e * 1836, પરંતુ પ્રશ્નમાં r_p = r_e / 1836 આપેલ છે, જે         function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
