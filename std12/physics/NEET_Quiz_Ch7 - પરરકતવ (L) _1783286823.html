    <script>
        const questionsData = [{"question": "એક આદર્શ પ્રેરકત્વ (L) ને AC વોલ્ટેજ સ્રોત V = V₀ sin(ωt) સાથે જોડવામાં આવે છે. જો પ્રેરકત્વનો મૂલ્ય અચાનક અડધું કરવામાં આવે, તો પરિપથમાં વહેતો પ્રવાહ I નું મહત્તમ મૂલ્ય કેવી રીતે બદલાશે?", "options": ["A) I₀ નું મૂલ્ય બમણું થશે", "B) I₀ નું મૂલ્ય અડધું થશે", "C) I₀ નું મૂલ્ય ચાર ગણું થશે", "D) I₀ નું મૂલ્ય √2 ગણું થશે"], "correct": 0, "explanation": "પ્રેરકત્વમાં પ્રવાહનું મહત્તમ મૂલ્ય I₀ = V₀ / (ωL) થી આપવામાં આવે છે. જો L નું મૂલ્ય અડધું કરવામાં આવે (L' = L/2), તો નવું મહત્તમ પ્રવાહ I₀' = V₀ / (ω(L/2)) = 2V₀ / (ωL) = 2I₀ થશે. તેથી I₀ બમણું થશે. અન્ય વિકલ્પો ખોટા છે કારણ કે તેઓ પ્રેરકત્વ અને પ્રવાહ વચ્ચેના વ્યસ્ત સંબંધને યોગ્ય રીતે ધ્યાનમાં લેતા નથી.", "ncert_ref": "Class XII - પ્રકરણ 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 1}, {"question": "એક શુદ્ધ પ્રેરકત્વ (L) અને શુદ્ધ કેપેસિટર (C) ને શ્રેણીમાં AC વોલ્ટેજ સ્રોત સાથે જોડવામાં આવે છે. જો પરિપથની અનુનાદ આવૃત્તિ ω₀ હોય, તો નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) પ્રેરકત્વ અને કેપેસિટર બંને પર વોલ્ટેજ સમાન કળામાં હશે", "B) પ્રેરકત્વ પર વોલ્ટેજ કેપેસિટર પર વોલ્ટેજ કરતાં 90° આગળ હશે", "C) પ્રેરકત્વ પર વોલ્ટેજ કેપેસિટર પર વોલ્ટેજ કરતાં 180° આગળ હશે", "D) પ્રેરકત્વ અને કેપેસિટર પર વોલ્ટેજ એકબીજાથી 90° અલગ કળામાં હશે, પરંતુ અનુનાદ સમયે તેમનું મૂલ્ય સમાન હશે"], "correct": 3, "explanation": "શુદ્ધ પ્રેરકત્વમાં વોલ્ટેજ પ્રવાહ કરતાં 90° આગળ હોય છે, જ્યારે શુદ્ધ કેપેસિટરમાં વોલ્ટેજ પ્રવાહ કરતાં 90° પાછળ હોય છે. તેથી, પ્રેરકત્વ અને કેપેસિટર પર વોલ્ટેજ એકબીજાથી 180° અલગ કળામાં હોય છે. અનુનાદ સમયે (ω = ω₀), તેમના વોલ્ટેજ મૂલ્યો સમાન હોય છે પરંતુ વિરુદ્ધ કળામાં, જે એકબીજાને રદ કરે છે. વિકલ્પ A ખોટો છે કારણ કે વોલ્ટેજ સમાન કળામાં નથી. વિકલ્પ B અને C ખોટા છે કારણ કે તેઓ કળા તફાવતને યોગ્ય રીતે વર્ણવતા નથી.", "ncert_ref": "Class XII - પ્રકરણ 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 2}, {"question": "એક AC પરિપથમાં શુદ્ધ પ્રેરકત્વ (L) ને V = V₀ sin(ωt) વોલ્ટેજ સાથે જોડવામાં આવે છે. જો પ્રવાહ I = I₀ sin(ωt - φ) દ્વારા આપવામાં આવે, તો φ નું મૂલ્ય શું હશે અને તે શું દર્શાવે છે?", "options": ["A) φ = 0°, પ્રવાહ અને વોલ્ટેજ સમાન કળામાં છે", "B) φ = 90°, પ્રવાહ વોલ્ટેજ કરતાં 90° પાછળ છે", "C) φ = 90°, પ્રવાહ વોલ્ટેજ કરતાં 90° આગળ છે", "D) φ = 180°, પ્રવાહ અને વોલ્ટેજ વિરુદ્ધ કળામાં છે"], "correct": 1, "explanation": "શુદ્ધ પ્રેરકત્વમાં, પ્રવાહ વોલ્ટેજ કરતાં 90° પાછળ હોય છે. તેથી, φ = 90° અને પ્રવાહ સમીકરણ I = I₀ sin(ωt - 90°) દ્વારા દર્શાવવામાં આવે છે. વિકલ્પ A ખોટો છે કારણ કે પ્રવાહ અને વોલ્ટેજ સમાન કળામાં નથી. વિકલ્પ C ખોટો છે કારણ કે પ્રવાહ વોલ્ટેજ કરતાં આગળ નથી. વિકલ્પ D ખોટો છે કારણ કે φ = 180° પ્રેરકત્વ માટે લાગુ પડતું નથી.", "ncert_ref": "Class XII - પ્રકરણ 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 3}, {"question": "એક શુદ્ધ પ્રેરકત્વ (L) અને અવરોધ (R) ને શ્રેણીમાં AC વોલ્ટેજ સ્રોત સાથે જોડવામાં આવે છે. જો પરિપથની પ્રતિબाधા Z હોય, તો નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) પ્રતિબાધા Z = √(R² + (ωL)²) થી આપવામાં આવે છે", "B) પ્રવાહ અને વોલ્ટેજ વચ્ચેનો કળા તફાવત φ = tan⁻¹(ωL/R) થી આપવામાં આવે છે", "C) પ્રેરકત્વ પર વોલ્ટેજ અવરોધ પર વોલ્ટેજ કરતાં 90° પાછળ હોય છે", "D) જો ω = 0 હોય, તો પ્રતિબાધા Z = R થશે"], "correct": 2, "explanation": "શુદ્ધ પ્રેરકત્વમાં, વોલ્ટેજ પ્રવાહ કરતાં 90° આગળ હોય છે, તેથી પ્રેરકત્વ પર વોલ્ટેજ અવરોધ પર વોલ્ટેજ કરતાં 90° આગળ હોય છે, પાછળ નહીં. તેથી વિકલ્પ C ખોટું છે. વિકલ્પ A, B અને D સાચા છે કારણ કે તેઓ પ્રતિબાધા અને કળા તફાવતના સૂત્રોને યોગ્ય રીતે વર્ણવે છે.", "ncert_ref": "Class XII - પ્રકરણ 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 4}, {"question": "એક શુદ્ધ પ્રેરકત્વ (L) અને એક શુદ્ધ અવરોધ (R) ને શ્રેણીમાં જોડીને AC વોલ્ટેજ સ્રોત V = V₀ sin(ωt) લગાડવામાં આવે છે. જો પરિપથમાં પ્રવાહ I = I₀ sin(ωt - φ) વહેતો હોય, તો નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) પ્રવાહનો કળા કોણ φ = tan⁻¹(ωL/R) હોય છે", "B) પ્રવાહનો કંપવિસ્તાર I₀ = V₀ / √(R² + ω²L²) હોય છે", "C) પ્રેરકત્વના બે છેડા વચ્ચેનો વોલ્ટેજ V_L = I₀ωL sin(ωt + π/2) હોય છે", "D) અવરોધના બે છેડા વચ્ચેનો વોલ્ટેજ V_R = I₀R sin(ωt - φ) હોય છે"], "correct": 3, "explanation": "સાચો જવાબ D છે કારણ કે અ on": "પ્રેરકત્વની પ્રતિક્રિયા X_L = ωL હોય છે, જેથી ω બદલવાથી X_L બદલાશે. અવરોધ R, વોલ્ટેજ V0, અને કેપેસિટન્સ C (જે પરિપથમાં જ નથી) બદલાતા નથી.", "ncert_ref": "Class XII - Chapter 7: પ્રેરકત્વ", "difficulty": "Hard", "num": 12}, {"question": "એક AC પરિપથમાં શુદ્ધ પ્રેરકત્વ L અને શુદ્ધ કેપેસિટર C ને સમકક્ષ જોડેલા હોય. જો L અને C ની કિંમતો એવી હોય કે X_L = X_C, તો પરિપથનો સરળીકૃત ઇમ્પિડન્સ શું હશે?", "options": ["A) શૂન્ય", "B) અનંત", "C) R (જો R અવરોધ હોય)", "D) X_L + X_C"], "correct": 1, "explanation": "સમકક્ષ જોડાણમાં X_L = X_C હોવાથી, પ્રતિક્રિયા એકબીજાને નાબૂદ કરે છે, જેથી ઇમ્પિડન્સ અનંત થાય છે (પરિપથ ખુલ્લો થાય છે). શૂન્ય (લઘુતમ ઇમ્પિડન્સ), R (જો R હોય તો), અને X_L + X_C (શ્રેણી જોડાણ માટે) અયોગ્ય છે.", "ncert_ref": "Class XII - Chapter 7: પ્રેરકત્વ", "difficulty": "Hard", "num": 13}, {"question": "એક AC પરિપથમાં પ્રેરકત્વ L અને કેપેસિટર C ને શ્રેણીમાં જોડેલા હોય. જો આ પરિપથમાંથી કોઈ વોલ્ટેજ વહન થતું ન હોય, તો કયો વિકલ્પ સાચો છે?", "options": ["A) X_L = X_C", "B) X_L > X_C", "C) X_L < X_C", "D) R = 0"], "correct": 0, "explanation": "જો પરિપથમાંથી વોલ્ટેજ વહન ન થતું હોય, તો પરિપથ પ્રતિક્રિયાશીલ સંતુલનમાં હોય છે, જેમાં X_L = X_C. બાકીના વિકલ્પો અશક્ય છે: X_L > X_C અથવા X_L < X_C (વહન થશે), R = 0 (અવરોધ શૂન્ય હોવા છતાં વહન થઈ શકે).", "ncert_ref": "Class XII - Chapter 7: પ્રેરકત્વ", "difficulty": "Hard", "num": 14}, {"question": "એક AC પરિપથમાં શુદ્ધ પ્રેરકત્વ L અને શુદ્ધ અવરોધ R ને શ્રેણીમાં જોડેલા હોય. જો વોલ્ટેજ V = V0 sin(ωt) લાગુ પાડવામાં આવે, તો ક્રમશ: વોલ્ટેજ અને કરંટ વચ્ચેનો કોણીય તફાવત કેટલો હશે?", "options": ["A) 0°", "B) 45°", "C) 90°", "D) 180°"], "correct": 1, "explanation": "શુદ્ધ પ્રેરકત્વ અને અવરોધના શ્રેણી જોડાણમાં, ઇમ્પિડન્સ Z = √(R² + X_L²) હોય છે, જેથી કોણીય તફાવત tan⁻¹(X_L/R) થાય છે. જો R = X_L હોય, તો કોણીય તફાવત 45° થાય છે. 0° (શુદ્ધ અવરોધ), 90° (શુદ્ધ પ્રેરકત્વ), અને 180° (અશક્ય) અયોગ્ય છે.", "ncert_ref": "Class XII - Chapter 7: પ્રેરકત્વ", "difficulty": "Hard", "num": 15}, {"question": "એક AC પરિપથમાં શુદ્ધ પ્રેરકત્વ L અને શુદ્ધ કેપેસિટર C ન         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
