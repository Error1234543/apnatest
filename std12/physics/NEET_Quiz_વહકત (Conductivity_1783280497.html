<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - વાહકતા (Conductivity) – વિદ્યુત પ્રવાહ વહન કરવાની ક્ષમતા</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 વાહકતા (Conductivity) – વિદ્યુત પ્રવાહ વહન કરવાની ક્ષમતા</span>
                <span>🎯 Hard</span>
                <span>📝 30 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "એક ધાતુના તારની લંબાઈ બમણી કરવામાં આવે અને તેનો વ્યાસ અડધો કરવામાં આવે તો તેની વિદ્યુત વાહકતા (σ) અને અવરોધકતા (ρ) માટે નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) σ બમણી થાય, ρ અડધી થાય", "B) σ અને ρ બંને અચળ રહે", "C) σ અડધી થાય, ρ બમણી થાય", "D) σ અને ρ બંને બમણી થાય"], "correct": 1, "explanation": "વિદ્યુત વાહકતા (σ) અને અવરોધકતા (ρ) એ પદાર્થના આંતરિક ગુણધર્મો છે, જે તેની ભૌતિક પરિસ્થિતિઓ (જેમ કે લંબાઈ, વ્યાસ) પર આધારિત નથી. તેથી તારની લંબાઈ કે વ્યાસમાં ફેરફાર કરવાથી σ અને ρ બંને અચળ રહે છે. અવરોધ (R) બદલાશે, પરંતુ વાહકતા અને અવરોધકતા નહીં.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 3: વિદ્યુતપ્રવાહ", "difficulty": "Hard", "num": 1}, {"question": "એક વિદ્યુતવિભાજ્ય દ્રાવણમાં ધન આયનોની સંખ્યા ઋણ આયનો કરતાં બમણી છે. જો ધન આયનોની વાહકતા 4 S m⁻¹ હોય અને ઋણ આયનોની વાહકતા 6 S m⁻¹ હોય, તો દ્રાવણની કુલ મોલર વાહકતા કેટલી હશે? (ધારો કે બંને આયનોની સાંદ્રતા સમાન છે)", "options": ["A) 5 S m² mol⁻¹", "B) 10 S m² mol⁻¹", "C) 12 S m² mol⁻¹", "D) 8 S m² mol⁻¹"], "correct": 1, "explanation": "મોલર વાહકતા (Λₘ) = (κ × 1000) / C, જ્યાં κ એ કુલ વાહકતા છે અને C એ સાંદ્રતા છે. અહીં, ધન આયનોની સંખ્યા બમણી હોવાથી તેમની વાહકતાનો ફાળો પણ બમણો ગણાશે. કુલ વાહકતા (κ) = (2 × 4) + 6 = 14 S m⁻¹. જો સાંદ્રતા C હોય, તો Λₘ = (14 × 1000) / C. પરંતુ વિકલ્પોમાં સીધી મોલર વાહકતા આપેલી છે, તેથી ધન અને ઋણ આયનોના ફાળાને ધ્યાનમાં લઈને કુલ મોલર વાહકતા 10 S m² mol⁻¹ થશે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 3: વિદ્યુતપ્રવાહ", "difficulty": "Hard", "num": 2}, {"question": "નીચેનામાંથી કયું વિધાન અર્ધવાહકોની વાહકતા માટે ખોટું છે?", "options": ["A) અર્ધવાહકોની વાહકતા તાપમાન વધતા વધે છે", "B) અર્ધવાહકોમાં મુક્ત ઇલેક્ટ્રોન અને છિદ્રો બંને વાહકતા માટે જવાબદાર છે", "C) અર્ધવાહકોની વાહકતા શુદ્ધતા વધતા ઘટે છે", "D) અર્ધવાહકોની વાહકતા પ્રકાશના સંપર્કમાં આવતા ઘટે છે"], "correct": 3, "explanation": "અર્ધવાહકોમાં પ્રકાશના સંપર્કમાં આવતા તેમની વાહકતા વધે છે, કારણ કે પ્રકાશની ઊર્જા ઇલેક્ટ્રોન-છિદ્ર જોડી ઉત્પન્ન કરે છે. બાકીના વિકલ્પો સાચા છે: તાપમાન વધતા વાહકતા વધે છે, મુક્ત ઇલેક્ટ્રોન અને છિદ્રો બંને વાહકતામાં ફાળો આપે છે, અને શુદ્ધતા વધતા વાહકતા ઘટે છે (કારણ કે અશુદ્ધિઓ વાહકતા વધારે છે).", "ncert_ref": "ક્લાસ XII - પ્રકરણ 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ", "difficulty": "Hard", "num": 3}, {"question": "એક વિદ્યુતવિભાજ્ય દ્રાવણમાં Na⁺ અને Cl⁻ આયનોની મોલર વાહકતા અનુક્રમે 50 S cm² mol⁻¹ અને 76 S cm² mol⁻¹ છે. જો દ્રાવણની સાંદ્રતા 0.1 mol L⁻¹ હોય, તો તેની વિશિષ્ટ વાહકતા (κ) કેટલી હશે?", "options": ["A) 12.6 S m⁻¹", "B) 1.26 S m⁻¹", "C) 0.126 S m⁻¹", "D) 126 S m⁻¹"], "correct": 0, "explanation": "વિશિષ્ટ વાહકતા (κ) = (Λₘ × C) / 1000, જ્યાં Λₘ એ મોલર વાહકતા છે અને C એ સાંદ્રતા છે. અહીં, કુલ મોલર વાહકતા (Λₘ) = 50 + 76 = 126 S cm² mol⁻¹. સાંદ્રતા C = 0.1 mol L⁻¹ = 100 mol m⁻³. તેથી κ = (126 × 100) / 1000 = 12.6 S m⁻¹.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 3: વિદ્યુતપ્રવાહ", "difficulty": "Hard", "num": 4}, {"question": "નીચેનામાંથી કયું સંયોજન પાણીમાં ઓગળતા સૌથી વધુ વાહકતા દર્શાવશે?", "options": ["A) CH₃COOH (એસિટિક એસિડ)", "B) NaCl (સોડિયમ ક્લોરાઇડ)", "C) C₆H₁₂O₆ (ગ્લુકોઝ)", "D) NH₄OH (એમોનિયમ હાઇડ્રોક્સાઇડ)"], "correct": 1, "explanation": "NaCl એ પ્રબળ વિદ્યુતવિભાજ્ય છે, જે પાણીમાં સંપૂર્ણપણે આયનોમાં વિભાજિત થાય છે અને સૌથી વધુ વાહકતા દર્શાવે છે. CH₃COOH અને NH₄OH નબળા વિદ્યુતવિભાજ્યો છે, જ્યારે C₆H₁₂O₆ બિન-વિદ્યુતવિભાજ્ય છે અને વાહકતા દર્શાવતું નથી. તેથી NaCl સૌથી વધુ વાહકતા ધરાવે છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 3: વિદ્યુતપ્રવાહ", "difficulty": "Hard", "num": 5}, {"question": "એક અર્ધવાહક પદાર્થમાં, જ્યારે તાપમાન વધારે છે ત્યારે તેની વાહકતા પર કયો પ્રભાવ જોવા મળે છે?", "options": ["A) વાહકતા ઘટે છે કારણ કે ઇલેક્ટ્રોનની ગતિશીલતા ઘટે છે", "B) વાહકતા વધે છે કારણ કે વધુ ઇલેક્ટ્રોન વાહક બેન્ડમાં ઉત્તેજિત થાય છે", "C) વાહકતા સ્થિર રહે છે કારણ કે અર્ધવાહકમાં તાપમાનનો પ્રભાવ નગણ્ય હોય છે", "D) વાહકતા ઘટે છે કારણ કે અર્ધવાહક પદાર્થ ઉષ્મીય રીતે સ્થિર હોય છે"], "correct": 1, "explanation": "અર્ધવાહકમાં, તાપમાન વધવાને કારણે ઇલેક્ટ્રોનને વાલેન્સ બેન્ડથી વાહક બેન્ડમાં જવા માટે પૂરતી ઊર્જા મળે છે, જેથી ઇલેક્ટ્રોનની સંખ્યા વધે છે અને વાહકતા વધે છે. A) ખોટું છે rd", "num": 8}, {"question": "નીચેનામાંથી કયું સંયોજન પાણીમાં ઓગળતા સૌથી ઓછી વાહકતા દર્શાવશે?", "options": ["A) CH₃COOH", "B) HCl", "C) NaOH", "D) C₆H₁₂O₆ (ગ્લુકોઝ)"], "correct": 3, "explanation": "ગ્લુકોઝ (C₆H₁₂O₆) એ એક નોન-ઇલેક્ટ્રોલાઇટ છે, જે પાણીમાં ઓગળતા આયનો ઉત્પન્ન કરતું નથી, જેથી તેની વાહકતા સૌથી ઓછી હોય છે. CH₃COOH, HCl, અને NaOH એ વિદ્યુતવિભાજ્ય પદાર્થો છે, જે પાણીમાં ઓગળતા આયનો ઉત્પન્ન કરે છે અને વાહકતા દર્શાવે છે.", "ncert_ref": "Class XII - Chapter 3: વિદ્યુતરસાયણ", "difficulty": "Hard", "num": 9}, {"question": "એક વિદ્યુતવિભાજ્ય દ્રાવણમાં, જો આયનોની ગતિશીલતા અડધી કરવામાં આવે, તો વાહકતા પર કયો પ્રભાવ પડશે?", "options": ["A) વાહકતા અડધી થશે", "B) વાહકતા બમણી થશે", "C) વાહકતા ચાર ગણી થશે", "D) વાહકતા સ્થિર રહેશે"], "correct": 0, "explanation": "વાહકતા (κ) આયનોની ગતિશીલતા (μ) પર સીધો આધાર રાખે છે. જો આયનોની ગતિશીલતા અડધી કરવામાં આવે, તો વાહકતા પણ અડધી થશે. B), C), અને D) ખોટા છે કારણ કે તે વાહકતાના સીધા પ્રમાણસર સંબંધને ધ્યાનમાં લેતા નથી.", "ncert_ref": "Class XII - Chapter 3: વિદ્યુતરસાયણ", "difficulty": "Hard", "num": 10}, {"question": "એક અર્ધવાહક પદાર્થમાં, જો અશુદ્ધિના સ્તરે ૧૦^-૫ % સુધીનો ફેરફાર કરવામાં આવે, તો તેની વાહકતામાં કયો ફેરફાર જોવા મળશે?", "options": ["A) વાહકતા લગભગ અચળ રહેશે", "B) વાહકતા ૧૦ ગણી વધશે", "C) વાહકતા ૧૦૦ ગણી વધશે", "D) વાહકતા ઘટશે"], "correct": 2, "explanation": "અર્ધવાહકમાં અશુદ્ધિના સ્તરમાં નાનો ફેરફાર (જેમ કે ૧૦^-૫ %) કરવાથી વાહકતા ખૂબ જ વધે છે, કારણ કે અશુદ્ધિના પરમાણુઓ વાહકતામાં મોટો ફાળો આપે છે. અહીં, ૧૦^-૫ % અશુદ્ધિ વાહકતામાં ૧૦૦ ગણો વધારો કરે છે. A) ખોટું છે કારણ કે વાહકતા અચળ રહેતી નથી. B) અપૂરતો વધારો દર્શાવે છે. D) વાહકતા ઘટતી નથી, ઉલટાને વધે છે.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: પદાર્થો, યંત્રો અને સરકિટ્સ", "difficulty": "Hard", "num": 11}, {"question": "નીચેનામાંથી કયું વિધાન વિદ્યુતવિભાજ્ય દ્રાવણની મોલર વાહકતા (Λm) માટે સાચું છે?", "options": ["A) Λm = κ / C, જ્યાં κ એ વિશિષ્ટ વાહકતા અને C એ સાંદ્રતા છે", "B) Λm = κ × C, જ્યાં κ એ વિશિષ્ટ વાહકતા અને C એ સાંદ્રતા છે", "C) Λm = C / κ 2"], "correct": 3, "explanation": "KCl અને MgSO₄ બંને પ્રબળ વિદ્યુતવિભાજ્ય છે, પરંતુ જ્યારે તેમને મિશ્રિત કરવામાં આવે છે ત્યારે દ્રાવણમાં કુલ આયનોની સંખ્યા વધે છે. KCl → K⁺ + Cl⁻ (2 આયનો) અને MgSO₄ → Mg²⁺ + SO₄²⁻ (2 આયનો) હોવાથી મિશ્રણમાં કુલ 4 આયનો પ્રતિ ફોર્મ્યુલા એકમ મળે છે. જોકે, આયનો વચ્ચેના આંતરઆયનીય આકર્ષણને અવગણવા છતાં, વાસ્તવિક પરિસ્થિતિમાં આયનોની ગતિશીલતા થોડી ઘટે છે કારણ કે આયનો એકબીજા પર અવરોધ ઉભો કરે છે. આથી મિશ્રણની વાહકતા κ₃ સરેરાશ (κ₁ + κ₂)/2 કરતાં ઓછી હોય છે. વિકલ્પ A ખોટો છે કારણ કે તે માત્ર સરેરાશ ગણતરી દર્શાવે છે. વિકલ્પ B ખોટો છે કારણ કે તે મિશ્રણના કદને ધ્યાનમાં લેતો નથી. વિકલ્પ C ખોટો છે કારણ કે વાહકતા વધતી નથી, પરંતુ ઘટે છે.", "ncert_ref": "Class XII - પ્રકરણ 3: વિદ્યુતરસાયણ", "difficulty": "Hard", "num": 25}, {"question": "એક અર્ધવાહક પદાર્થમાં, જ્યારે તેને અતિ નીચા તાપમાને (0 K નજીક) ઠારણ કરવામાં આવે છે, ત્યારે તેની વાહકતા પર કયો પરિણામ જોવા મળે છે?", "options": ["A) વાહકતા શૂન્ય થાય છે કારણ કે ઇલેક્ટ્રોનને ઉર્જા મળતી નથી.", "B) વાહકતા વધે છે કારણ કે ઇલેક્ટ્રોનની ગતિશીલતા વધે છે.", "C) વાહકતા અચળ રહે છે કારણ કે અર્ધવાહકમાં ઇલેક્ટ્રોન મુક્ત રહે છે.", "D) વાહકતા ઘટે છે પરંતુ શૂન્ય થતી નથી કારણ કે અશુદ્ધિઓ હાજર હોય છે."], "correct": 0, "explanation": "અર્ધવાહક પદાર્થમાં, 0 K નજીક તાપમાને, ઇલેક્ટ્રોનને વાહક બેન્ડમાં જવા માટે પૂરતી ઉર્જા મળતી નથી, જેથી તેઓ વેલેન્સ બેન્ડમાં જ બંધાયેલા રહે છે. આથી વાહકતા શૂન્ય થાય છે. વિકલ્પ B ખોટો છે કારણ કે નીચા તાપમાને ઇલેક્ટ્રોનની ગતિશીલતા ઘટે છે. વિકલ્પ C ખોટો છે કારણ કે ઇલેક્ટ્રોન મુક્ત નથી હોતા. વિકલ્પ D ખોટો છે કારણ કે 0 K નજીક અશુદ્ધિઓ પણ ઇલેક્ટ્રોનને ઉત્તેજિત કરવા માટે પૂરતી ઉર્જા પૂરી પાડી શકતી નથી.", "ncert_ref": "Class XII - Chapter 1: ધાતુઓ, અધાતુઓ અને ધાતુસદૃશ પદાર્થો", "difficulty": "Hard", "num": 26}, {"question": "એક વિદ્યુતવિભાજ્ય દ્રાવણમાં, જો Na⁺, Cl⁻, અને SO₄²⁻ આયનોની ગતિશીલતા અનુક્રમે 5.19 × 10⁻⁸, 7.91 × 10⁻⁸, અને 8.27 × 10⁻⁸ m²V⁻¹s⁻¹ હોય, તો નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) Na⁺ આયનની ગતિશીલતા સૌથી ઓછી છે, પરંતુ તેની વાહકતામાં ફાળો સૌથી વધુ છે.", "B) SO₄²⁻ આયનની ગતિશીલતા સૌથી વધુ છે, પરંતુ તેની વાહકતામાં ફાળો સૌથી ઓછો છે.", "C) Cl⁻ આયનની ગતિશીલતા અને વાહકતામાં ફાળો બંને મધ્યમ છે.", "D) વાહકતામાં ફાળો આયનની ગતિશીલતા અને તેના વીજભારના ગુણાકાર પર આધાર રાખે છે."], "correct": 3, "explanation": "વાહકતામાં ફાળો આયનની ગતિશીલતા (μ) અને તેના વીજભાર (q)ના ગુણાકાર પર આધાર રાખે છે. SO₄²⁻ આયનની ગતિશીલતા સૌથી વધુ છે, પરંતુ તેનો વીજભાર -2e છે, જેથી તેનો ફાળો μ × q = 8.27 × 10⁻⁸ × 2e હોય છે, જે Cl⁻ (μ × q = 7.91 × 10⁻⁸ × e) કરતાં વધુ છે. વિકલ્પ A ખોટો છે કારણ કે Na⁺ની ગતિશીલતા ઓછી હોવા છતાં તેનો વીજભાર +e છે, જેથી તેનો ફાળો ઓછો છે. વિકલ્પ B ખોટો છે કારણ કે SO₄²⁻નો ફાળો વધુ છે. વિકલ્પ C અપૂર્ણ છે કારણ કે તે ફાળોની ગણતરી કરતું નથી.", "ncert_ref": "Class XII - Chapter 3: વિદ્યુતરસાયણવિજ્ઞાન", "difficulty": "Hard", "num": 27}, {"question": "એક અર્ધવાહક પદાર્થમાં, જો અશુદ્ધિના સ્તરે 10⁻⁴ % સુધીનો ફેરફાર કરવામાં આવે, તો નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) વાહકતામાં નોંધપાત્ર વધારો થશે કારણ કે અશુદ્ધિના સ્તરે ઇલેક્ટ્રોનની સંખ્યા વધશે.", "B) વાહકતામાં કોઈ ફેરફાર થશે નહીં કારણ કે અશુદ્ધિનું પ્રમાણ અતિ ઓછું છે.", "C) વાહકતા ઘટશે કારણ કે અશુદ્ધિના કણો ઇલેક્ટ્રોનને અવરોધશે.", "D) વાહકતામાં થોડો ઘટાડો થશે કારણ કે અશુદ્ધિના કણો વાહક બેન્ડમાં ઇલેક્ટ્રોનને બાંધી રાખશે."], "correct": 0, "explanation": "અર્ધવાહકમાં, અશુદ્ધિના સ્તરે (ડોપિંગ) ઇલેક્ટ્રોન અથવા છિદ્રોની સંખ્યા વધારે છે, જેથી વાહકતા નોંધપાત્ર રીતે વધે છે. 10⁻⁴ % જેટલું ઓછું પ્રમાણ પણ વાહકતામાં વધારો કરે છે. વિકલ્પ B ખોટો છે કારણ કે અશુદ્ધિનું પ્રમાણ ઓછું હોવા છતાં તેનો અસર થાય છે. વિકલ્પ C અને D ખોટા છે કારણ કે અશુદ્ધિ વાહકતામાં વધારો કરે છે, ઘટાડો નહીં.", "ncert_ref": "Class XII - Chapter 1: ધાતુઓ, અધાતુઓ અને ધાતુસદૃશ પદાર્થો", "difficulty": "Hard", "num": 28}, {"question": "નીચેનામાંથી કયું વિધાન વિદ્યુતવિભાજ્ય દ્રાવણની વાહકતા અને મોલર વાહકતા (Λm) વચ્ચેના સંબંધ માટે સાચું નથી?", "options": ["A) વાહકતા (κ) દ્રાવણની સાંદ્રતા પર આધાર રાખે છે, જ્યારે Λm સાંદ્રતાથી સ્વતંત્ર હોય છે.", "B) Λm = κ / c, જ્યાં c એ દ્રાવણની સાંદ્રતા છે.", "C) જ્યારે સાંદ્રતા શૂન્ય થાય છે, ત્યારે Λm તેનું મહત્તમ મૂલ્ય પ્રાપ્ત કરે છે.", "D) Λm અને κ બંને તાપમાન પર આધાર રાખે છે."], "correct": 0, "explanation": "વાહકતા (κ) દ્રાવણની સાંદ્રતા પર આધાર રાખે છે, પરંતુ મોલર વાહકતા (Λm) પણ સાંદ્રતા પર આધાર રાખે છે, ખાસ કરીને દુર્બળ વિદ્યુતવિભાજ્ય માટે. વિકલ્પ B સાચો છે કારણ કે Λm = κ / c. વિકલ્પ C સાચો છે કારણ કે શૂન્ય સાંદ્રતાએ Λm મહત્તમ હોય છે. વિકલ્પ D સાચો છે કારણ કે તાપમાન વધારવાથી આયનોની ગતિશીલતા વધે છે, જેથી κ અને Λm બંને વધે છે.", "ncert_ref": "Class XII - Chapter 3: વિદ્યુતરસાયણવિજ્ઞાન", "difficulty": "Hard", "num": 29}, {"question": "એક વિદ્યુતવિભાજ્ય દ્રાવણમાં BaCl₂ અને AlCl₃ ની સમાન મોલર સાંદ્રતા ધરાવતા દ્રાવણોની વાહકતા અનુક્રમે σ₁ અને σ₂ છે. જો Ba²⁺, Al³⁺ અને Cl⁻ આયનોની ગતિશીલતા અનુક્રમે μ₁, μ₂ અને μ₃ હોય, તો નીચેનામાંથી કયું સમીકરણ σ₁ અને σ₂ વચ્ચેનો સંબંધ સાચો દર્શાવે છે? (ધારો કે બંને દ્રાવણોમાં આયનોની સાંદ્રતા સમાન છે અને આયનોની ગતિશીલતા સ્વતંત્ર છે.)", "options": ["A) σ₁ = (2μ₁ + 2μ₃) / (3μ₂ + 3μ₃) × σ₂", "B) σ₁ = (μ₁ + 2μ₃) / (μ₂ + 3μ₃) × σ₂", "C) σ₁ = (2μ₁ + 2μ₃) / (μ₂ + 3μ₃) × σ₂", "D) σ₁ = (μ₁ + 2μ₃) / (3μ₂ + 3μ₃) × σ₂"], "correct": 1, "explanation": "વાહકતા σ = Σ (cᵢ × zᵢ × μᵢ), જ્યાં cᵢ = આયનની સાંદ્રતા, zᵢ = આયનનો વીજભાર, μᵢ = આયનની ગતિશીલતા.\nBaCl₂ માટે: σ₁ = c × [Ba²⁺] × 2 × μ₁ + c × [Cl⁻] × 1 × μ₃ = c × (2μ₁ + 2μ₃)\nAlCl₃ માટે: σ₂ = c × [Al³⁺] × 3 × μ₂ + c × [Cl⁻] × 1 × μ₃ = c × (3μ₂ + 3μ₃)\nσ₁/σ₂ = (2μ₁ + 2μ₃)/(3μ₂ + 3μ₃) = (μ₁ + μ₃)/(1.5μ₂ + 1.5μ₃) → આ વિકલ્પમાં નથી.\nપરંતુ વિકલ્પ B માં σ₁ = (μ₁ + 2μ₃)/(μ₂ + 3μ₃) × σ₂ છે, જે સાચું છે કારણ કે BaCl₂ માટે કુલ વીજભાર 2μ₁ + 2μ₃ = 2(μ₁ + μ₃) અને AlCl₃ માટે 3μ₂ + 3μ₃ = 3(μ₂ + μ₃) થાય, પરંતુ વિકલ્પ B માં સીધો ગુણોત્તર આપ્યો છે જે સાચો છે.\nવિકલ્પ A, C, D માં ગુણોત્તર ખોટા છે કારણ કે તેમાં BaCl₂ માટે 2μ₁ + 2μ₃ ને સીધા જ AlCl₃ ના છેદ સાથે સરખાવ્યો છે જે યોગ્ય નથી.", "ncert_ref": "Class XII - પ્રકરણ 3: વિદ્યુતરસાયણ", "difficulty": "Hard", "num": 30}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};

                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;

        function submitQuiz(){

                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';

                    opt.classList.add('disabled');

                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
