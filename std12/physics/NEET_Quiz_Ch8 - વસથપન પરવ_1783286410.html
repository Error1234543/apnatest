<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 Ch8 - વિસ્થાપન પ્રવાહ</span>
                <span>🎯 Hard</span>
                <span>📝 30 પ્રશ્નો</span>

            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>

        <div class="button-group" id="buttonGroup">

        <div class="result-box" id="resultBox">

            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "વિસ્થાપન પ્રવાહ દરમિયાન, જ્યારે કોષના બાહ્ય મધ્યમમાં ક્લોરાઇડ આયનની સાંદ્રતા વધે છે, ત્યારે કોષ દ્વારા કયો પ્રતિક્રિયા પથ અપનાવવામાં આવે છે?", "options": ["A) ક્લોરાઇડ આયનોનો સક્રિય પરિવહન દ્વારા કોષમાં પ્રવેશ", "B) ક્લોરાઇડ આયનોનો નિષ્ક્રિય પરિવહન દ્વારા કોષ બહાર નિકાલ", "C) ક્લોરાઇડ આયનોનો સહ-પરિવહન દ્વારા કોષમાં પ્રવેશ", "D) ક્લોરાઇડ આયનોનો સક્રિય પરિવહન દ્વારા કોષ બહાર નિકાલ"], "correct": 3, "explanation": "વિસ્થાપન પ્રવાહ દરમિયાન, કોષ બાહ્ય મધ્યમની અતિરિક્ત ક્લોરાઇડ આયન સાંદ્રતાને સંભાળવા માટે સક્રિય પરિવહન પદ્ધતિનો ઉપયોગ કરે છે. ક્લોરાઇડ આયનોને કોષ બહાર કાઢવા માટે સક્રિય પરિવહન (ઉદા. Na+/K+ ATPase જેવા પંપ દ્વારા) જરૂરી બને છે, કારણ કે નિષ્ક્રિય પરિવહન (વિકલ્પ B) સાંદ્રતા પ્રમાણમાં થતો નથી. સહ-પરિવહન (વિકલ્પ C) અને સક્રિય પ્રવેશ (વિકલ્પ A) અહીં લાગુ પડતા નથી, કારણ કે કોષ આયનોને બહાર કાઢવા માગે છે, નહીં કે અંદર લાવવા.", "ncert_ref": "Class XII - Chapter 8: વિસ્થાપન પ્રવાહ", "difficulty": "Hard", "num": 1}, {"question": "જ્યારે એક કોષને હાઇપોટોનિક દ્રાવણમાં મૂકવામાં આવે છે, ત્યારે તેના કોષરસપટલ પર કયો દબાણ વિકસે છે જે કોષને ફૂલવા અટકાવે છે?", "options": ["A) ટર્ગર દબાણ", "B) કોષરસ દબાણ", "C) ઓસ્મોટિક દબાણ", "D) હાઇડ્રોસ્ટેટિક દબાણ"], "correct": 0, "explanation": "હાઇપોટોનિક દ્રાવણમાં કોષ ફૂલી જાય છે, પરંતુ કોષભિત્તિ (કોષરસપટલ) દ્વારા વિકસિત થતું ટર્ગર દબાણ (Turgor Pressure) કોષને વધુ ફૂલવા અટકાવે છે. કોષરસ દબાણ (વિકલ્પ B) કોષરસમાં રહેલા દ્રાવ્ય પદાર્થો દ્વારા ઉત્પન્ન થતું ઓસ્મોટિક દબાણ છે, પરંતુ તે કોષને ફૂલવા પ્રેરે છે. ઓસ્મોટિક દબાણ (વિકલ્પ C) કોષમાં પાણીનો પ્રવેશ કરાવે છે, જ્યારે હાઇડ્રોસ્ટેટિક દબાણ (વિકલ્પ D) એ પાણીના સ્તંભ દ્વારા ઉત્પન્ન થતું દબાણ છે, જે અહીં લાગુ પડતું નથી.", "ncert_ref": "Class XII - Chapter 8: વિસ્થાપન પ્રવાહ", "difficulty": "Hard", "num": 2}, {"question": "નીચેનામાંથી કયો પરિવહન પથ એવો છે જે સીધો ATP વપરાશ વિના થાય છે, પરંતુ સાંદ્રતા પ્રમાણમાં થતો નથી?", "options": ["A) સરળ વિસરણ", "B) સહ-પરિવહન", "C) સક્રિય પરિવહન", "D) ઓસ્મોસિસ"], "correct": 1, "explanation": "સહ-પરિવહન (Co-transport) એ એક "A) તે કોષમાં ક્લોરાઇડ આયનોનો પ્રવેશ કરાવે છે અને બાઇકાર્બોનેટ આયનોનો નિકાલ કરે છે.", "B) તે કોષમાં બાઇકાર્બોનેટ આયનોનો પ્રવેશ કરાવે છે અને ક્લોરાઇડ આયનોનો નિકાલ કરે છે.", "C) તે કોષમાં ક્લોરાઇડ અને બાઇકાર્બોનેટ આયનો બંનેમાં પ્રવેશ કરાવે છે.", "D) તે કોષમાં ક્લોરાઇડ અને બાઇકાર્બોનેટ આયનો બંનેમાં નિકાલ કરે છે."], "correct": 1, "explanation": "ક્લોરાઇડ-બાઇકાર્બોનેટ એન્ટીપોર્ટર કોષમાં બાઇકાર્બોનેટ આયનોનો પ્રવેશ કરાવે છે અને ક્લોરાઇડ આયનોનો નિકાલ કરે છે. વિકલ્પ A, C, અને D ખોટા છે કારણ કે તેઓ એન્ટીપોર્ટરની કાર્યપદ્ધતિને યોગ્ય રીતે વર્ણવતા નથી.", "ncert_ref": "Class XI - પ્રકરણ ૮: કોષ: જીવનની મૂળ એકમ - કોષરસપટલ પરના પરિવહન પ્રોટીન", "difficulty": "Hard", "num": 14}, {"question": "વિસ્થાપન પ્રવાહ દરમિયાન, કોષરસપટલ પર રહેલા ગ્લુકોઝ ટ્રાન્સપોર્ટર (GLUT) પ્રોટીન વિશે નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) તે ફક્ત સહાયક વિસરણ દ્વારા ગ્લુકોઝનો પરિવહન કરે છે.", "B) તે સોડિયમ આયનો સાથે ગ્લુકોઝનો સહ-પરિવહન કરે છે.", "C) તે કોષમાં ગ્લુકોઝની સાંદ્રતા વધારવા માટે ATP વાપરે છે.", "D) તે કોષરસપટલ પર રહેલા ઇન્સ્યુલિન રિસેપ્ટર દ્વારા નિયંત્રિત થાય છે."], "correct": 2, "explanation": "GLUT પ્રોટીન ફક્ત સહાયક વિસરણ (ફેસિલિટેટેડ ડિફ્યુઝન) દ્વારા ગ્લુકોઝનો પરિવહન કરે છે (વિકલ્પ A સાચો છે). કેટલાક GLUT પ્રકારો સોડિયમ આયનો સાથે ગ્લુકોઝનો સહ-પરિવહન કરે છે (વિકલ્પ B સાચો છે). ઇન્સ્યુલિન રિસેપ્ટર દ્વારા નિયંત્રિત થાય છે (વિકલ્પ D સાચો છે). પરંતુ તે ATP વાપરતા નથી (વિકલ્પ C ખોટો છે).", "ncert_ref": "Class XI - પ્રકરણ ૮: કોષ: જીવનની મૂળ એકમ - કોષરસપટલ પરના પરિવહન પ્રોટીન", "difficulty": "Hard", "num": 15}, {"question": "વિસ્થાપન પ્રવાહ દરમિયાન, કોષરસપટલ પર રહેલા સોડિયમ-ગ્લુકોઝ સહ-પરિવહન (SGLT1) પ્રોટીન વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) તે સોડિયમ આયનોને કોષ બહાર કાઢવા અને ગ્લુકોઝને કોષ અંદર લાવવા માટે ATP વાપરે છે.", "B) તે સોડિયમ આયનોના સાંદ્રતા ગ્રેડિયન્ટના વિરુદ્ધ ગ્લુકોઝનો પરિવહન કરે છે, પરંતુ સોડિયમ આયનોનો પરિવહન સાંદ્રતા ગ્રેડિયન્ટની દિશામાં થાય છે.", "C) તે ગ્લુકોઝને કોષ બહાર કાઢવા અને સોડિયમ આયનોને કોષ અંદર લાવવા માટે એન્ટીપોર્ટર તરીકે કાર્ય કરે છે.", "D) તે ફક્ત ગ્લુકોઝનો પરિવહન કરે છે અને સોડિયમ આયનો સાથે કોઈ સંબંધ ધરાવતું નથી."], "correct": 1, "explanation": "SGLT1 એક સિમ્પોર્ટર પ્રોટીન છે જે સોડિયમ આયનો અને ગ્લુકોઝ બંનેને કોષ અંદર લાવે છે. સોડિયમ આયનોનો પરિવહન સાંદ્રતા ગ્રેડિયન્ટની દિશામાં (કોષ અંદર) થાય છે, જ્યારે ગ્લુકોઝનો પરિવહન સોડિયમ આયનોના ગ્રેડિયન્ટના બળથી સાંદ્રતા ગ્રેડિયન્ટના વિરુદ્ધ થાય છે. આ પ્રક્રિયા સેકન્ડરી સક્રિય પરિવહનનો એક ઉદાહરણ છે. વિકલ્પ A ખોટો છે કારણ કે SGLT1 ATP વાપરતું નથી. વિકલ્પ C ખોટો છે કારણ કે તે એન્ટીપોર્ટર નથી અને ગ્લુકોઝને કોષ બહાર કાઢતું નથી. વિકલ્પ D ખોટો છે કારણ કે તે સોડિયમ આયનો સાથે સંબંધ ધરાવે છે.", "ncert_ref": "Class XI - Chapter 11: કોષ: જીવનની મૂળ એકમ અને કોષરસપટલ", "difficulty": "Hard", "num": 16}, {"question": "વિસ્થાપન પ્રવાહ દરમિયાન, કોષરસપટલ પર રહેલા પોટેશિયમ ચેનલ્સ વિશે નીચેનામાંથી કયું વિધાન ખોટું છે?", "options": ["A) પોટેશિયમ ચેનલ્સ પોટેશિયમ આયનોને કોષ બહાર કાઢવા માટે ખુલ્લી રહે છે, જ્યારે કોષ વિશ્રામ અવસ્થામાં હોય છે.", "B) પોટેશિયમ ચેનલ્સના ખુલવા-બંધ થવાનું નિયંત્રણ કોષના મેમ્બ્રેન પોટેશિયલ પર આધાર રાખે છે.", "C) પોટેશિયમ ચેનલ્સ પોટેશિયમ આયનોને કોષ અંદર લાવવા માટે સક્રિય રીતે ATP વાપરે છે.", "D) પોટેશિયમ ચેનલ્સના કારણે કોષરસપટલ પર વિદ્યુત રાસાયણિક ગ્રેડિયન્ટ જાળવી રાખવામાં આવે છે."], "correct": 2, "explanation": "પોટેશિયમ ચેનલ્સ પોટેશિયમ આયનોને કોષ બહાર કાઢવા માટે ખુલ્લી રહે છે, પરંતુ આ પ્રક્રિયા નિષ્ક્રિય (પેસિવ) પરિવહન દ્વારા થાય છે, જેમાં ATP વાપરાતું નથી. વિકલ્પ A, B, અને D સત્ય છે કારણ કે પોટેશિયમ ચેનલ્સ કોષના મેમ્બ્રેન પોટેશિયલ પર આધાર રાખે છે અને વિદ્યુત રાસાયણિક ગ્રેડિયન્ટ જાળવી રાખવામાં મદદ કરે છે.", "ncert_ref": "Class XI - Chapter 11: કોષ: જીવનની મૂળ એકમ અને કોષરસપટલ", "difficulty": "Hard", "num": 17}, {"question": "વિસ્થાપન પ્રવાહ દરમિયાન, કોષરસપટલ પર રહેલા કેલ્શિયમ પંપ (Ca2+ ATPases) વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) તે કેલ્શિયમ આયનોને કોષ અંદર લાવવા માટે ATP વાપરે છે.", "B) તે કેલ્શિયમ આયનોને કોષ બહાર કાઢવા માટે ATP વાપરે છે અને કોષમાં કેલ્શિયમ આયનોની નીચી સાંદ્રતા જાળવી રાખે છે.", "C) તે કેલ્શિયમ આયનોને કોષ બહાર કાઢવા માટે સોડિયમ આયનોના ગ્રેડિયન્ટનો ઉપયોગ કરે છે.", "D) તે કેલ્શિયમ આયનોને કોષ અંદર લાવવા અને કોષ બહાર કાઢવા માટે બંને કામગીરી કરે છે."], "correct": 1, "explanation": "કેલ્શિયમ પંપ (Ca2+ ATPases) કેલ્શિયમ આયનોને કોષ બહાર કાઢવા માટે ATP વાપરે છે અને કોષમાં કેલ્શિયમ આયનોની નીચી સાંદ્રતા જાળવી રાખે છે. વિકલ્પ A ખોટો છે કારણ કે તે કેલ્શિયમ આયનોને કોષ અંદર લાવતું નથી. વિકલ્પ C ખોટો છે કારણ કે તે સોડિયમ આયનોના ગ્રેડિયન્ટનો ઉપયોગ કરતું નથી. વિકલ્પ D ખોટો છે કારણ કે તે ફક્ત કેલ્શિયમ આયનોને કોષ બહાર કાઢવા માટે કાર્ય કરે છે.", "ncert_ref": "Class XI - Chapter 11: કોષ: જીવનની મૂળ એકમ અને કોષરસપટલ", "difficulty": "Hard", "num": 18}, {"question": "વિસ્થાપન પ્રવાહ દરમિયાન, કોષરસપટલ પર રહેલા એબીસી (ABC) ટ્રાન્સપોર્ટર પ્રોટીન વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) તે ફક્ત નાના અણુઓના પરિવહન માટે જવાબદાર છે.", "B) તે ATP વાપરીને પદાર્થોને કોષ બહાર કાઢવા માટે કાર્ય કરે છે અને ડ્રગ પ્રતિરોધકતામાં ભૂમિકા ભજવે છે.", "C) તે નિષ્ક્રિય પરિવહન દ્વારા પદાર્થોનો પરિવહન કરે છે.", "D) તે ફક્ત આયનોના પરિવહન માટે જવાબદાર છે."], "correct": 1, "explanation": "ABC ટ્રાન્સપોર્ટર પ્રોટીન ATP વાપરીને પદાર્થોને કોષ બહાર કાઢવા માટે કાર્ય કરે છે અને ડ્રગ પ્રતિરોધકતામાં મહત્વની ભૂમિકા ભજવે છે. વિકલ્પ A ખોટો છે કારણ કે તે મોટા અણુઓના પરિવહન માટે પણ જવાબદાર છે. વિકલ્પ C ખોટો છે કારણ કે તે સક્રિય પરિવહન દ્વારા કાર્ય કરે છે. વિકલ્પ D ખોટો છે કારણ કે તે આયનો સિવાયના પદાર્થોના પરિવહન માટે પણ જવાબદાર છે.", "ncert_ref": "Class XI - Chapter 11: કોષ: જીવનની મૂળ એકમ અને કોષરસપટલ", "difficulty": "Hard", "num": 19}, {"question": "એક પ્રાયોગિક પરિસ્થિતિમાં, પ્રાણી કોષને એવા દ્રાવણમાં મૂકવામાં આવે છે જેમાં Na⁺ આયનોની સાંદ્રતા કોષના કોષરસ કરતાં બમણી હોય છે, પરંતુ K⁺ આયનોની સાંદ્રતા કોષરસ કરતાં અડધી હોય છે. આ પરિસ્થિતિમાં, નીચેનામાંથી કયું વિધાન વિસ્થાપન પ્રવાહની પ્રક્રિયા માટે સાચું નથી?", "options": ["A) Na⁺ આયનો કોષમાં પ્રવેશવા માટે સાંદ્રતા ઢાળ અનુસાર વિસ્થાપન પ્રવાહ દ્વારા પ્રયત્ન કરશે, પરંતુ કોષરસપટલ પર રહેલા Na⁺/K⁺ પંપ દ્વારા સક્રિય પરિવહનથી બહાર ધકેલવામાં આવશે.", "B) K⁺ આયનો કોષમાંથી બહાર નીકળવા માટે સાંદ્રતા ઢાળ અનુસાર વિસ્થાપન પ્રવાહ દ્વારા પ્રયત્ન કરશે, પરંતુ Na⁺/K⁺ પંપ દ્વારા સક્રિય પરિવહનથી અંદર ખેંચવામાં આવશે.", "C) કોષરસપટલ પર રહેલા લીક ચેનલ્સ દ્વારા Na⁺ અને K⁺ આયનોનો વિસ્થાપન પ્રવાહ સતત ચાલુ રહેશે, જેના કારણે કોષની વિદ્યુત રાસાયણિક સ્થિતિ જાળવી રાખવા માટે વધારાનો ATP વપરાશ થશે.", "D) આ પરિસ્થિતિમાં, કોષમાંથી પાણીનો બહાર નીકળવાનો પ્રવાહ શરૂ થશે કારણ કે બાહ્ય દ્રાવણ હાઇપરટોનિક બની જશે, જેના કારણે કોષ સંકોચાઈ જશે અને વિસ્થાપન પ્રવાહની પ્રક્રિયા સંપૂર્ણપણે બંધ થઈ જશે."], "correct": 3, "explanation": "વિકલ્પ D ખોટો છે કારણ કે વિસ્થાપન પ્રવાહ એ સાંદ્રતા ઢાળ અનુસાર આયનો અથવા અણુઓનું પરિવહન છે, જે કોષની આસ્મોટિક સ્થિતિ પર આધારિત નથી. જ્યારે કોષને હાઇપરટોનિક દ્રાવણમાં મૂકવામાં આવે છે, ત્યારે પાણીનો બહાર નીકળવાનો પ્રવાહ શરૂ થાય છે અને કોષ સંકોચાઈ શકે છે, પરંતુ આયનોનો વિસ્થાપન પ્રવાહ ચાલુ રહે છે કારણ કે તે સાંદ્રતા ઢાળ પર આધારિત છે. વિસ્થાપન પ્રવાહ ક્યારેય સંપૂર્ણપણે બંધ થતો નથી, સિવાય કે સાંદ્રતા સંતુલન પ્રાપ્ત ન થાય. વિકલ્પ A, B અને C સાચાં છે કારણ કે તેઓ વિસ્થાપન પ્રવાહ અને સક્રિય પરિવહનની યોગ્ય પ્રક્રિયાઓનું વર્ણન કરે છે, જ્યારે લીક ચેનલ્સ દ્વારા સતત આયનોનું પરિવહન થાય છે જેના કારણે ATP વપરાશ થાય છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 8: કોષ - મૂળભૂત એકમ, વિભાગ 8.5.4: કોષરસપટલમાં પરિવહન", "difficulty": "Hard", "num": 20}, {"question": "વિસ્થાપન પ્રવાહ દરમિયાન, કોષરસપટલ પર રહેલા એક્વાપોરિન-3 (AQP3) પ્રોટીન વિશે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) તે ફક્ત પાણીના અણુઓનો પરિવહન કરે છે અને ગ્લિસરોલ માટે અપારગમ્ય છે.", "B) તે પાણી અને ગ્લિસરોલ બંનેમાંનો પરિવહન કરે છે, પરંતુ યુરિયા માટે અપારગમ્ય છે.", "C) તે પાણી, ગ્લિસરોલ અને યુરિયા ત્રણેયનો પરિવહન કરે છે, પરંતુ આયનો માટે અપારગમ્ય છે.", "D) તે ફક્ત આયનોનો પરિવહન કરે છે અને પાણી માટે અપારગમ્ય છે."], "correct": 2, "explanation": "એક્વાપોરિન-3 (AQP3) એક એવું એક્વાપોરિન છે જે પાણીના અણુઓ ઉપરાંત ગ્લિસરોલ અને યુરિયા જેવા નાના, અપોલર અણુઓનો પણ પરિવહન કરે છે. તે આયનો માટે અપારગમ્ય હોય છે. વિકલ્પ A અને B ખોટા છે કારણ કે AQP3 ગ્લિસરોલ અને યુરિયા માટે પારગમ્ય છે. વિકલ્પ D ખોટો છે કારણ કે AQP3 આયનોનો પરિવહન કરતું નથી.", "ncert_ref": "Class XI - Chapter 11: કોષ: જીવનની મૂળ એકમ અને કોષરસપટલ", "difficulty": "Hard", "num": 21}, {"question": "વિસ્થાપન પ્રવાહ દરમિયાન, કોષરસપટલ પર રહેલા Na+/H+ એન્ટીપોર્ટરની કાર્યપદ્ધતિમાં, નીચેનામાંથી કયું વિધાન યોગ્ય રીતે વર્ણવે છે?", "options": ["A) તે કોષ બહારથી Na+ આયનોનો પ્રવેશ કરાવે છે અને કોષ અંદરથી H+ આયનોનો નિકાલ કરે છે, ATP વપરાશ સાથે.", "B) તે કોષ અંદરથી Na+ આયનોનો નિકાલ કરે છે અને કોષ બહારથી H+ આયનોનો પ્રવેશ કરાવે છે, ATP વપરાશ વિના.", "C) તે કોષ બહારથી Na+ આયનોનો પ્રવેશ કરાવે છે અને કોષ અંદરથી H+ આયનોનો નિકાલ કરે છે, પ્રોટોન મોટિવ ફોર્સ દ્વારા.", "D) તે કોષ અંદરથી Na+ આયનોનો નિકાલ કરે છે અને કોષ બહારથી H+ આયનોનો પ્રવેશ કરાવે છે, પ્રોટોન મોટિવ ફોર્સ દ્વારા."], "correct": 3, "explanation": "Na+/H+ એન્ટીપોર્ટર કોષ અંદરથી Na+ આયનોનો નિકાલ કરે છે અને કોષ બહારથી H+ આયનોનો પ્રવેશ કરાવે છે. આ પ્રક્રિયા પ્રોટોન મોટિવ ફોર્સ દ્વારા ચાલે છે, જે ATP વપરાશ વિના થાય છે. વિકલ્પ A અને C ખોટા છે કારણ કે તેઓ Na+ અને H+ ના પરિવહનની દિશા ખોટી રીતે વર્ણવે છે. વિકલ્પ B ખોટો છે કારણ કે આ પ્રક્રિયા પ્રોટોન મોટિવ ફોર્સ દ્વારા ચાલે છે, ATP વપરાશ વિના નહીં.", "ncert_ref": "Class XI - Chapter 11: કોષ: જીવનની મૂળ એકમ અને કોષરસપટલ", "difficulty": "Hard", "num": 22}, {"question": "વિસ્થાપન પ્રવાહ દરમિયાન, કોષરસપટલ પર રહેલા ABC ટ્રાન્સપોર્ટર પ્રોટીન વિશે નીચેનામાંથી કયું વિધાન સત્ય નથી?", "options": ["A) તે ATP વપરાશ દ્વારા ચાલે છે.", "B) તે ડ્રગ રેઝિસ્ટન્સમાં મહત્વની ભૂમિકા ભજવે છે.", "C) તે ફક્ત કોષ બહારથી કોષ અંદર તરફ પદાર્થોનો પરિવહન કરે છે.", "D) તે કોષ અંદરથી કોષ બહાર તરફ પદાર્થોનો પરિવહન કરે છે."], "correct": 2, "explanation": "ABC ટ્રાન્સપોર્ટર પ્રોટીન ATP વપરાશ દ્વારા ચાલે છે અને કોષ અંદરથી કોષ બહાર તરફ પદાર્થોનો પરિવહન કરે છે. તે ડ્રગ રેઝિસ્ટન્સમાં મહત્વની ભૂમિકા ભજવે છે. વિકલ્પ C ખોટો છે કારણ કે ABC ટ્રાન્સપોર્ટર કોષ બહારથી કોષ અંદર તરફ પદાર્થોનો પરિવહન કરતું નથી.", "ncert_ref": "Class XI - Chapter 11: કોષ: જીવનની મૂળ એકમ અને કોષરસપટલ", "difficulty": "Hard", "num": 23}, {"question": "વનસ્પતિ કોષમાં વિસ્થાપન પ્રવાહ દરમિયાન, જ્યારે કોષરસપટલ પર રહેલા એક્વાપોરિન પ્રોટીનની                 let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
