    <style>

        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}

        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}

        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}

        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}

    <script>
        const questionsData = [{"question": "કોષોના શ્રેણી-સમાંતર જોડાણમાં, કયા પેશીના કોષો વચ્ચે પ્લાઝમોડેસ્મેટા (plasmodesmata) જોવા મળે છે, જે સાયટોપ્લાઝમિક જોડાણ પૂરું પાડે છે?", "options": ["A) સ્નાયુ પેશી", "B) ચેતા પેશી", "C) વાહક પેશી (ફ્લોએમ)", "D) એપિથેલિયલ પેશી"], "correct": 2, "explanation": "શ્રેણી-સમાંતર જોડાણમાં પ્લાઝમોડેસ્મેટા ફ્લોએમ પેશીના કોષો (સીટુવ અને કોમ્પેનિયન કોષો) વચ્ચે જોવા મળે છે, જે સાયટોપ્લાઝમિક જોડાણ પૂરું પાડે છે. સ્નાયુ, ચેતા અને એપિથેલિયલ પેશીના કોષો વચ્ચે પ્લાઝમોડેસ્મેટા હાજર નથી. ફ્લોએમ કોષો વચ્ચેનું આ જોડાણ પોષક તત્વો અને સિગ્નલ અણુઓના વહનમાં મહત્વની ભૂમિકા ભજવે છે.", "ncert_ref": "Class XI - પ્રકરણ ૭: પેશી અને પેશી તંત્ર", "difficulty": "Hard", "num": 1}, {"question": "શ્રેણી-સમાંતર જોડાણ ધરાવતા કોષોના જૂથમાં, કયા કોષોના જોડાણથી દબાણ-વહન (pressure flow) સિદ્ધાંત સૌથી વધુ સારી રીતે સમજાવી શકાય છે?", "options": ["A) જાઈલમ અને ફ્લોએમ", "B) ફ્લોએમના સીટુવ કોષ અને કોમ્પેનિયન કોષ", "C) એપિથેલિયલ કોષો", "D) સ્નાયુ તંતુઓ"], "correct": 1, "explanation": "દબાણ-વહન સિદ્ધાંત ફ્લોએમમાં થતું વહન સમજાવે છે, જેમાં સીટુવ કોષ અને કોમ્પેનિયન કોષ વચ્ચે શ્રેણી-સમાંતર જોડાણ હોવાથી પોષક તત્વોનું વહન સરળતાથી થાય છે. જાઈલમ વહન માટે દબાણ-વહન સિદ્ધાંત લાગુ પડતું નથી. એપિથેલિયલ અને સ્નાયુ કોષો આ સિદ્ધાંત સાથે સંકળાયેલા નથી.", "ncert_ref": "Class XI - પ્રકરણ ૧૧: વનસ્પતિમાં પરિવહન", "difficulty": "Hard", "num": 2}, {"question": "કોષોના શ્રેણી-સમાંતર જોડાણમાં, કયા અણુના વહન માટે પ્લાઝમોડેસ્મેટા સૌથી વધુ અગત્યના છે?", "options": ["A) ઓક્સિજન", "B) RNA અને પ્રોટીન", "C) કાર્બન ડાયોક્સાઇડ", "D) પાણી"], "correct": 1, "explanation": "પ્લાઝમોડેસ્મેટા સાયટોપ્લાઝમિક જોડાણ પૂરું પાડે છે, જે RNA, પ્રોટીન અને અન્ય મહત્વના અણુઓના વહનમાં મદદ કરે છે. ઓક્સિજન અને કાર્બન ડાયોક્સાઇડ વાયુ છે અને તે પ્લાઝમોડેસ્મેટા દ્વારા વહન પામતા નથી. પાણીનું વહન પણ મુખ્યત્વે પ્લાઝમોડેસ્મેટા પર આધારિત નથી, પરંતુ તે સેલ વોલ દ્વારા પણ થઈ શકે છે.", "ncert_ref": "Class XI - પ્રકરણ ૧૧: વનસ્પતિમાં પરિવહન", "difficulty": "Hard", "num": 3}, {"question": "કોષોના શ્રેણી-સમાંતર જોડાણમાં, કયા પદાર્થનું વહન પ્લાઝમોડેસ્મેટા દ્વારા થતું નથી?", "options": ["A) શર્કરા", "B) અમીનો એસિડ", "C) ક્લોરોફિલ", "D) આયન"], "correct": 2, "explanation": "ક્લોરોફિલ એક મહત્વપૂર્ણ રંગદ્રવ્ય છે જે ક્લોરોપ્લાસ્ટમાં સ્થિત છે અને તે પ્લાઝમોડેસ્મેટા દ્વારા વહન પામતું નથી. શર્કરા, અમીનો એસિડ અને આયન પ્લાઝમોડેસ્મેટા દ્વારા વહન પામી શકે છે, કારણ કે તે સાયટોપ્લાઝમમાં દ્રાવ્ય છે.", "ncert_ref": "Class XI - પ્રકરણ ૧૧: વનસ્પતિમાં પરિવહન", "difficulty": "Hard", "num": 4}, {"question": "એક વનસ્પતિમાં જોવા મળતા કોષોના શ્રેણી-સમાંતર જોડાણ સંદર્ભે નીચેનામાંથી કયું વિધાન ખોટું છે? (નોંધ: આ જોડાણમાં પ્લાઝમોડેસ્મેટા દ્વારા કોષો એકબીજા સાથે જોડાયેલા હોય છે.)", "options": ["A) આ જોડાણમાં કોષદીવાલ (cell wall) સંપૂર્ણપણે અખંડિત રહે છે અને કોષો વચ્ચે સીધો ભૌતિક સંપર્ક થતો નથી.", "B) પ્લાઝમોડેસ્મેટા દ્વારા નાના અણુઓ જેમ કે શર્કરા, એમિનો એસિડ અને આયનોનું વહન થઈ શકે છે, પરંતુ મોટા પ્રોટીન અણુઓનું વહન મર્યાદિત હોય છે.", "C) આ જોડાણમાં કોષરસપટલ (plasma membrane) સતત રહે છે અને કોષો વચ્ચેના જોડાણમાં કોઈ અવરોધ ઉભો થતો નથી.", "D) પ્લાઝમોડેસ્મેટા દ્વારા વાઇરસ અને અન્ય રોગકારકોનું પણ વહન થઈ શકે છે, જે વનસ્પતિમાં રોગ પ્રસરાવવામાં મદદરૂપ બને છે."], "correct": 0, "explanation": "વિકલ્પ A ખોટું છે કારણ કે પ્લાઝમોડેસ્મેટા એ કોષદીવાલમાં રહેલા નાના છિદ્રો છે જે કોષો વચ્ચે સીધો ભૌતિક અને રાસાયણિક સંપર્ક સ્થાપિત કરે છે. આથી કોષદીવાલ અખંડિત હોવા છતાં, પ્લાઝમોડેસ્મેટા દ્વારા કોષો વચ્ચે સીધો સંપર્ક થાય છે. વિકલ્પ B સાચું છે કારણ કે પ્લાઝમોડેસ્મેટા દ્વારા નાના અણુઓનું વહન થાય છે, પરંતુ મોટા પ્રોટીન અણુઓનું વહન મર્યાદિત હોય છે. વિકલ્પ C સાચું છે કારણ કે પ્લાઝમોડેસ્મેટા દ્વારા કોષરસપટલ સતત રહે છે અને કોષો વચ્ચે અવરોધ ઉભો થતો નથી. વિકલ્પ D સાચું છે કારણ કે પ્લાઝમોડેસ્મેટા દ્વારા વાઇરસ અને અન્ય રોગકારકોનું વહન થઈ શકે છે, જે વનસ્પતિમાં રોગ પ્રસરાવવામાં મદદરૂપ બને છે.\n\nNCERT સંદર્ભ: Class XI - પ્રકરણ 8: કોષ: જીવનનો એકમ, વિભાગ 8.5.3: પ્લાઝમોડેસ્મેટા.", "ncert_ref": "Class XI - પ્રકરણ 8: કોષ: જીવનનો એકમ", "difficulty": "Hard", "num": 5}, {"question": "વનસ્પતિમાં પ્લાઝમોડેસ્મેટા દ્વારા થતાં વહન સંદર્ભે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) પ્લાઝમોડેસ્મેટા દ્વારા ફક્ત જળીય દ્રાવણોનું વહન થાય છે, પરંતુ મોટા અણુઓ જેવા કે પ્રોટીનનું વહન થતું નથી.", "B) પ્લાઝમોડેસ્મેટા દ્વારા કોષરસ કણિકાઓ (plastids)નું વહન થાય છે, પરંતુ તે મિટોકોન્ડ્રિયાનું વહન થતું નથી.", "C) પ્લાઝમોડેસ્મેટા દ્વારા RNA અણુઓનું વહન થાય છે, જે વનસ્પતિના વિકાસ અને પ્રતિક્રિયાઓમાં મહત્વની ભૂમિકા ભજવે છે.", "D) પ્લાઝમોડેસ્મેટા દ્વારા ફક્ત અકાર્બનિક આયનોનું વહન થાય છે, કાર્બનિક અણુઓનું વહન થતું નથી."], "correct": 2, "explanation": "પ્લાઝમોડેસ્મેટા દ્વારા RNA અણુઓનું વહન થાય છે, જે કોષો વચ્ચે સંકેતો અને અનુવંશિક માહિતીના આદાન-પ્રદાનમાં મહત્વની ભૂમિકા ભજવે છે. વિકલ્પ A ખોટો છે કારણ કે પ્લાઝમોડેસ્મેટા દ્વારા મોટા અણુઓ જેવા કે પ્રોટીન અને RNAનું વહન થાય છે. વિકલ્પ B ખોટો છે કારણ કે પ્લાઝમોડેસ્મેટા દ્વારા મિટોકોન્ડ્રિયા અથવા કોષરસ કણિકાઓનું વહન થતું નથી. વિકલ્પ D ખોટો છે કારણ કે પ્લાઝમોડેસ્મેટા દ્વારા કાર્બનિક અણુઓ જેવા કે શર્કરા અને અમીનો એસિડનું વહન પણ થાય છે.", "ncert_ref": "Class XI - Chapter 11: વનસ્પતિમાં પરિવહન", "difficulty": "Hard", "num": 6}, {"question": "નીચેનામાંથી કયા કોષોના જોડાણમાં પ્લાઝમોડેસ્મેટા જોવા મળતા નથી?", "options": ["A) પર્ણમેશ (leaf mesophyll) કોષો", "B) મૂળરોમ (root hair) કોષો", "C) પરાગકણ (pollen grain) કોષો", "D) કોષરસી કોષો (parenchyma cells)"], "correct": 2, "explanation": "પરાગકણ (pollen grain) કોષો પરિપક્વ થયા પછી પ્લાઝમોડેસ્મેટા ગુમાવી દે છે, કારણ કે તે સ્વતંત્ર રીતે વિકાસ પામે છે. પર્ણમેશ, મૂળરોમ, અને કોષરસી કોષો વચ્ચે પ્લાઝમોડેસ્મેટા જોવા મળે છે.", "ncert_ref": "Class XI - Chapter 11: વનસ્પતિમાં પરિવહન", "difficulty": "Hard", "num": 7}, {"question": "શ્રેણી-સમાંતર જોડાણ ધરાવતા કોષોના જૂથમાં, કયા પદાર્થનું વહન પ્લાઝમોડેસ્મેટા દ્વારા સૌથી ઓછું થાય છે?", "options": ["A) ગ્લુકોઝ", "B) પોટેશિયમ આયન", "C) સેલ્યુલોઝ", "D) એમિનો એસિડ"], "correct": 2, "explanation": "સેલ્યુલોઝ એક મોટો અને અદ્રાવ્ય કાર્બોદિત છે, જે પ્લાઝમોડેસ્મેટા દ્વારા વહન પામતો નથી. ગ્લુકોઝ, પોટેશિયમ આયન, અને એમિનો એસિડ પ્લાઝમોડેસ્મેટા દ્વારા સરળતાથી વહન પામે છે.", "ncert_ref": "Class XI - Chapter 11: વનસ્પતિમાં પરિવહન", "difficulty": "Hard", "num": 8}, {"question": "એક વનસ્પતિના પર્ણમાં આવેલા મૃદુતક કોષો (parenchyma cells) વચ્ચે પ્લાઝમોડેસ્મેટા દ્વારા થતું વહન સંદર્ભે નીચેનાં વિધાનોમાંથી કયું વિધાન અપવાદરૂપ છે?", "options": ["A) પ્લાઝમોડેસ્મેટા દ્વારા નાના આયનો અને શર્કરાના અણુઓનું વહન થઈ શકે છે", "B) પ્લાઝમોડેસ્મેટા દ્વારા પ્રોટીન અને ન્યુક્લિક એસિડ જેવા મોટા અણુઓનું વહન થતું નથી", "C) પ્લાઝમોડેસ્મેટા દ્વારા પાણીનું વહન સંપૂર્ણપણે અટકાવી શકાય છે જો કોષદીવાલમાં કેલોઝ જમા થાય", "D) પ્લાઝમોડેસ્મેટા દ્વારા વાઇરસ અને વાઇરોઇડ્સનું વહન પણ થઈ શકે છે"], "correct": 2, "explanation": "સાચો જવાબ વિકલ્પ C છે કારણ કે પ્લાઝમોડેસ્મેટા દ્વારા પાણીનું વહન સંપૂર્ણપણે અટકાવી શકાતું નથી, ભલે કેલોઝ જમા થાય તો પણ થોડું ઘણું વહન ચાલુ રહે છે. વિકલ્પ A સાચું છે કારણ કે નાના આયનો અને શર્કરાના અણુઓ પ્લાઝમોડેસ્મેટા દ્વારા વહન પામે છે (NCERT Class XI, Chapter 11: પરિવહન). વિકલ્પ B સાચું છે કારણ કે મોટા અણુઓ જેમ કે પ્રોટીન અને ન્યુક્લિક એસિડનું વહન પ્લાઝમોડેસ્મેટા દ્વારા થતું નથી. વિકલ્પ D પણ સાચું છે કારણ કે વાઇરસ અને વાઇરોઇડ્સ પ્લાઝમોડેસ્મેટા દ્વારા એક કોષથી બીજા કોષમાં ફેલાઈ શકે છે.", "ncert_ref": "Class XI - પ્રકરણ 11: પરિવહન", "difficulty": "Hard", "num": 9}, {"question": "એક સંશોધક વનસ્પતિના મૂળમાં આવેલા કોષોના શ્રેણી-સમાંતર જોડાણનો અભ્યાસ કરી રહ્યો છે. તેને જાણવા મળ્યું કે કેટલાક કોષો વચ્ચે પ્લાઝમોડેસ્મેટા હોવા છતાં, કેટલાક પદાર્થોનું વહન અવરોધાય છે. નીચેનામાંથી કયું સંયોજન આ અવરોધનું કારણ બની શકે છે?", "options": ["A) સુક્રોઝ (શર્કરા)નું વધુ પ્રમાણ", "B) કેલોઝનું સંચય", "C) કોષરસમાં Ca²⁺ આયનોનું વધુ પ્રમાણ", "D) પાણીમાં ઓગળેલા નાઇટ્રોજનયુક્ત પદાર્થો"], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે કારણ કે કેલોઝનું સંચય પ્લાઝમોડેસ્મેટાના છિદ્રોને અવરોધે છે, જેના કારણે પદાર્થોનું વહન અટકી જાય છે (NCERT Class XI, Chapter 11: પરિવહન). વિકલ્પ A ખોટો છે કારણ કે સુક્રોઝનું વધુ પ્રમાણ પ્લાઝમોડેસ્મેટા દ્વારા વહનને અવરોધતું નથી. વિકલ્પ C ખોટો છે કારણ કે Ca²⁺ આયનોનું વધુ પ્રમાણ પ્લાઝમોડેસ્મેટાના કાર્યને અસર કરી શકે છે, પરંતુ તે સીધો અવરોધ પેદા કરતું નથી. વિકલ્પ D ખોટો છે કારણ કે નાઇટ્રોજનયુક્ત પદાર્થો પ્લાઝમોડેસ્મેટા દ્વારા વહન પામી શકે છે.", "ncert_ref": "Class XI - પ્રકરણ 11: પરિવહન", "difficulty": "Hard", "num": 10}, {"question": "નીચેનામાંથી કયા કોષોના જોડાણમાં પ્લાઝમોડેસ્મેટા સૌથી વધુ સક્રિય રીતે કામ કરે છે?", "options": ["A) જલવહન પેશી (Xylem)", "B) અન્નવહન પેશી (Phloem)", "C) કોર્ટેક્સ પેશી", "D) એપિડર્મલ કોષો"], "correct": 1, "explanation": "અન્નવહન પેશી (Phloem)માં પ્લાઝમોડેસ્મેટા સૌથી વધુ સક્રિય રીતે કામ કરે છે, કારણ કે તે દબાણ-વહન સિદ્ધાંત (Pressure Flow Hypothesis) દ્વારા સુક્રોઝ અને અન્ય કાર્બોદિતોનું વહન કરે છે. જલવહન પેશી (Xylem)માં પ્લાઝમોડેસ્મેટા જોવા મળતા નથી, જ્યારે કોર્ટેક્સ અને એપિડર્મલ કોષોમાં પ્લાઝમોડેસ્મેટા હાજર હોઈ શકે છે, પરંતુ તેઓ અન્નવહન પેશી જેટલા સક્રિય નથી.", "ncert_ref": "Class XI - Chapter 11: વનસ્પતિમાં પરિવહન", "difficulty": "Hard", "num": 11}, {"question": "નીચેનામાંથી કયા પદાર્થનું વહન પ્લાઝમોડેસ્મેટા દ્વારા સૌથી ઓછું થાય છે?", "options": ["A) સુક્રોઝ", "B) ગ્લુકોઝ", "C) પોટેશિયમ આયન", "D) સેલ્યુલોઝ"], "correct": 3, "explanation": "સેલ્યુલોઝ એ એક મોટો અને જટિલ કાર્બોદિત છે જે પ્લાઝમોડેસ્મેટા દ્વારા વહન થતું નથી, કારણ કે તે કોષરસમાં દ્રાવ્ય નથી. સુક્રોઝ, ગ્લુકોઝ અને પોટેશિયમ આયન પ્લાઝમોડેસ્મેટા દ્વારા સરળતાથી વહન થઈ શકે છે.", "ncert_ref": "Class XI - Chapter 11: વનસ્પતિમાં પરિવહન", "difficulty": "Hard", "num": 12}, {"question": "વનસ્પતિમાં કોષોના શ્રેણી-સમાંતર જોડાણ દરમિયાન, પ્લાઝમોડેસ્મેટા દ્વારા થતાં વહન સંદર્ભે નીચેનામાંથી કયું વિધાન સત્ય છે, જ્યારે કોષોના સાયટોપ્લાઝમમાં કેલ્શિયમ આયનની સાંદ્રતા અચાનક વધી જાય છે?", "options": ["A) પ્લાઝમોડેસ્મેટા સંકોચાઈ જાય છે અને વહન દર ઘટી જાય છે, કારણ કે કેલ્શિયમ આયન પ્લાઝમોડેસ્મેટાના પ્રોટીનને અસર કરે છે.", "B) પ્લાઝમોડેસ્મેટા વિકસિત થાય છે અને વહન દર વધી જાય છે, કારણ કે કેલ્શિયમ આયન વહન માટે ઉત્તેજક તરીકે કામ કરે છે.", "C) પ્લાઝમોડેસ્મેટા પર કોઈ અસર થતી નથી, કારણ કે કેલ્શિયમ આયન પ્લાઝમોડેસ્મેટા દ્વારા પસાર થતું નથી.", "D) પ્લાઝમોડેસ્મેટા સંપૂર્ણપણે બંધ થઈ જાય છે અને વહન થતું અટકી જાય છે, કારણ કે કેલ્શિયમ આયન પ્લાઝમોડેસ્મેટાને બ્લોક કરે છે."], "correct": 0, "explanation": "કેલ્શિયમ આયનની સાંદ્રતા વધવાથી પ્લાઝમોડેસ્મેટા સંકોચાઈ જાય છે અને વહન દર ઘટી જાય છે, કારણ કે કેલ્શિયમ આયન પ્લાઝમોડેસ્મેટા સાથે જોડાયેલા પ્રોટીનને અસર કરે છે, જેના કારણે તેનું કદ ઘટે છે. બાકીના વિકલ્પો ખોટા છે: B) કેલ્શિયમ આયન વહન માટે ઉત્તેજક તરીકે કામ કરતું નથી, C) કેલ્શિયમ આયન પ્લાઝમોડેસ્મેટા દ્વારા પસાર થતું હોય છે, અને D) પ્લાઝમોડેસ્મેટા સંપૂર્ણપણે બંધ થતું નથી.", "ncert_ref": "Class XI - પ્રકરણ 11: વનસ્પતિ શારીરિકી (Plant Physiology)", "difficulty": "Hard", "num": 13}, {"question": "વનસ્પતિમાં કોષોના શ્રેણી-સમાંતર જોડાણ દરમિયાન, નીચેનામાંથી કયા પદાર્થનું વહન પ્લાઝમોડેસ્મેટા દ્વારા સૌથી ઓછું થાય છે?", "options": ["A) ગ્લુકોઝ", "B) પોટેશિયમ આયન (K⁺)", "C) સુચાલક પ્રોટીન (Transcription factors)", "D) સ્ટાર્ચ"], "correct": 3, "explanation": "પ્લાઝમોડેસ્મેટા દ્વારા સ્ટાર્ચ જેવા મોટા અને અદ્રાવ્ય કાર્બોદિત અણુઓનું વહન સૌથી ઓછું થાય છે, કારણ કે તે પ્લાઝમોડેસ્મેટા દ્વારા પસાર થવા માટે ખૂબ મોટા હોય છે. ગ્લુકોઝ અને પોટેશિયમ આયન (K⁺) જેવા લઘુ અણુઓનું વહન સરળતાથી થાય છે. સુચાલક પ્રોટીનનું વહન પણ પ્લાઝમોડેસ્મેટા દ્વારા થાય છે, પરંતુ તે માટે વિશિષ્ટ સંકેતોની જરૂર પડે છે.", "ncert_ref": "Class XI - Chapter 11: વનસ્પતિમાં પરિવહન", "difficulty": "Hard", "num": 14}, {"question": "વનસ્પતિના પર્ણમાં આવેલા મૃદુતક કોષો (parenchyma cells) અને જલવાહિની (xylem) વચ્ચેના કોષોના શ્રેણી-સમાંતર જોડાણ સંદર્ભે નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) મૃદુતક કોષો અને જલવાહિની વચ્ચે પ્લાઝમોડેસ્મેટા જોવા મળતા નથી, કારણ કે જલવાહિની મૃત કોષો ધરાવે છે.", "B) મૃદુતક કોષો અને જલવાહિની વચ્ચે પ્લાઝમોડેસ્મેટા જોવા મળે છે, પરંતુ તે માત્ર પાણીના વહન માટે જ ઉપયોગી છે.", "C) મૃદુતક કોષો અને જલવાહિની વચ્ચે પ્લાઝમોડેસ્મેટા જોવા મળે છે, કારણ કે જલવાહિની જીવંત કોષો ધરાવે છે.", "D) મૃદુતક કોષો અને જલવાહિની વચ્ચે પ્લાઝમોડેસ્મેટા જોવા મળે છે, પરંતુ તે માત્ર ખનીજ દ્રવ્યોના વહન માટે જ ઉપયોગી છે."], "correct": 0, "explanation": "જલવાહિની (xylem) મૃત કોષો ધરાવે છે, જેના કારણે મૃદુતક કોષો અને જલવાહિની વચ્ચે પ્લાઝમોડેસ્મેટા જોવા મળતા નથી. પ્લાઝમોડેસ્મેટા જીવંત કોષો વચ્ચે જ જોવા મળે છે. વિકલ્પ B, C, અને D ખોટા છે કારણ કે જલવાહિની મૃત કોષો ધરાવે છે અને પ્લાઝમોડેસ્મેટા માત્ર જીવંત કોષો વચ્ચે જ જોવા મળે છે.", "ncert_ref": "Class XI - Chapter 11: વનસ્પતિમાં પરિવહન", "difficulty": "Hard", "num": 15}, {"question": "વનસ્પતિમાં પ્લાઝમોડેસ્મેટા દ્વારા થતાં વહન સંદર્ભે, નીચેનામાંથી કયું વિધાન સત્ય નથી?", "options": ["A) પ્લાઝમોડેસ્મેટા દ્વારા RNA અણુઓનું વહન થઈ શકે છે.", "B) પ્લાઝમોડેસ્મેટા દ્વારા કલર પદાર્થો (દા.ત., સ્ટાર્ચ)નું વહન થતું નથી.", "C) પ્લાઝમોડેસ્મેટા દ્વારા કેલ્શિયમ આયનનું વહન થાય છે.", "D) પ્લાઝમોડેસ્મેટા દ્વારા પ્રોટીન અણુઓનું વહન સંપૂર્ણપણે અશક્ય છે."], "correct": 3, "explanation": "પ્લાઝમોડેસ્મેટા દ્વારા RNA અણુઓ, કેલ્શિયમ આયન અને કેટલાક પ્રોટીન અણુઓનું વહન થઈ શકે છે. કલર પદાર્થો જેવા કે સ્ટાર્ચનું વહન પ્લાઝમોડેસ્મેટા દ્વારા થતું નથી. પ્રોટીન અણુઓનું વહન મર્યાદિત હોવા છતાં સંપૂર્ણપણે અશક્ય નથી, એટલે D વિકલ્પ ખોટો છે.", "ncert_ref": "Class XI - Chapter 11: વનસ્પતિમાં પરિવહન", "difficulty": "Hard", "num": 16}, {"question": "નીચેનામાંથી કયા કોષોના જોડાણમાં પ્લાઝમોડેસ્મેટા સૌથી ઓછા પ્રમાણમાં જોવા મળે છે?", "options": ["A) મૃદુતક કોષો (પેરેંકાઇમા)", "B) કોલેંકાઇમા કોષો", "C) સ્ક્લેરેંકાઇમા કોષો", "D) ફ્લોએમ કોષો"], "correct": 2, "explanation": "સ્ક્લેરેંકાઇમા કોષો મૃત કોષો હોય છે અને તેમની કોષભિત્તિ લિગ્નિન જેવા પદાર્થોથી જાડી થયેલી હોય છે, એટલે તેમનામાં પ્લાઝમોડેસ્મેટા સૌથી ઓછા પ્રમાણમાં જોવા મળે છે. મૃદુતક, કોલેંકાઇમા અને ફ્લોએમ કોષો જીવંત હોય છે અને તેમનામાં પ્લાઝમોડેસ્મેટા વધુ પ્રમાણમાં જોવા મળે છે.", "ncert_ref": "Class XI - Chapter 7: વનસ્પતિના રચનાત્મક સંગઠન", "difficulty": "Hard", "num": 17}, {"question": "એક સંશોધકે વનસ્પતિના મૂળની અગ્રસ્થ ભાગમાં આવેલા કોષોના શ્રેણી-સમાંતર જોડાણનો અભ્યાસ કર્યો. તેણે જોયું કે કેટલાક કોષો વચ્ચે પ્લાઝમોડેસ્મેટા ખૂબ જ સક્રિય રીતે કાર્યરત છે, જ્યારે અન્ય કોષોમાં તેની સંખ્યા ખૂબ જ ઓછી છે. નીચેનામાંથી કયા કોષોના જોડાણમાં પ્લાઝમોડેસ્મેટાની સંખ્યા અને સક્રિયતા સૌથી વધુ હોવાની સંભાવના છે, પરંતુ તે કોષો વચ્ચેનું અંતર ખૂબ જ ઓછું હોવાને કારણે તેમનું કાર્ય મર્યાદિત બને છે?", "options": ["A) મૂળટોપ (root cap) ના કોષો વચ્ચે", "B) વર્ધનશીલ કોષો (meristematic cells) વચ્ચે", "C) જલવાહિનીના મૃત કોષો (xylem vessels) વચ્ચે", "D) મૂળરોમ કોષો (root hair cells) અને અધિસ્તર કોષો (epidermal cells) વચ્ચે"], "correct": 1, "explanation": "વર્ધનશીલ કોષો (meristematic cells) વચ્ચે પ્લાઝમોડેસ્મેટા ખૂબ જ સક્રિય હોય છે કારણ કે આ કોષો સતત વિભાજન પામતા હોય છે અને તેમની વચ્ચે પોષક તત્ત્વો અને સંકેત અણુઓના વહનની જરૂરિયાત વધુ હોય છે. જોકે, આ કોષો વચ્ચેનું અંતર ખૂબ જ ઓછું હોવાને કારણે પ્લાઝમોડેસ્મેટાનું કાર્ય મર્યાદિત બને છે. મૂળટોપના કોષો વચ્ચે પ્લાઝમોડેસ્મેટા ઓછા હોય છે કારણ કે તેમનું મુખ્ય કાર્ય રક્ષણાત્મક છે. જલવાહિનીના મૃત કોષોમાં પ્લાઝમોડેસ્મેટા હોતા જ નથી કારણ કે તેઓ મૃત હોય છે. મૂળરોમ કોષો અને અધિસ્તર કોષો વચ્ચે પ્લાઝમોડેસ્મેટા ઓછા હોય છે કારણ કે તેમનું મુખ્ય કાર્ય પાણી અને ખનીજ ક્ષારોનું શોષણ છે.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 6: વનસ્પતિઓમાં સંરચના અને કાર્ય", "difficulty": "Hard", "num": 18}, {"question": "એક પ્રયોગમાં, વનસ્પતિના પર્ણમાં આવેલા મૃદુતક કોષો (parenchyma cells) વચ્ચે પ્લાઝમોડેસ્મેટા દ્વારા થતું વહન અવરોધવા માટે એક રાસાયણિક પદાર્થનો ઉપયોગ કરવામાં આવ્યો. આ અવરોધને કારણે નીચેનામાંથી કયું પરિણામ સૌથી વધુ સંભવિત છે, જે વનસ્પતિના સામાન્ય કાર્યને ખલેલ પહોંચાડશે?", "options": ["A) પ્રકાશસંશ્લેષણની ક્રિયામાં વધારો થશે કારણ કે વધુ પ્રકાશ ઊર્જા ઉપલબ્ધ થશે", "B) પર્ણમાં સ્ટાર્ચનું સંચય વધશે કારણ કે ગ્લુકોઝનું વહન અવરોધાશે", "C) શ્વસનની ક્રિયા ધીમી પડશે કારણ કે ઓક્સિજનનું વહન અવરોધાશે", "D) પાણીનું વહન વધશે કારણ કે પ્લાઝમોડેસ્મેટા દ્વારા થતું અવરોધન જલવાહિનીને પ્રભાવિત કરશે નહીં"], "correct": 1, "explanation": "પ્લાઝમોડેસ્મેટા દ્વારા મુખ્યત્વે કાર્બનિક પોષક તત્ત્વો જેમ કે શર્કરા (ગ્લુકોઝ) અને અમીનો એસિડનું વહન થાય છે. જો આ વહન અવરોધાય, તો પર્ણમાં ઉત્પન્ન થયેલ ગ્લુકોઝનું વહન અન્ય ભાગોમાં થઈ શકશે નહીં, જેના કારણે પર્ણમાં સ્ટાર્ચનું સંચય વધશે. પ્રકાશસંશ્લેષણની ક્રિયા પર સીધી અસર થશે નહીં, શ્વસનની ક્રિયા માટે ઓક્સિજનનું વહન પ્લાઝમોડેસ્મેટા દ્વારા મુખ્યત્વે થતું નથી, અને પાણીનું વહન મુખ્યત્વે જલવાહિની દ્વારા થાય છે, જે પ્લાઝમોડેસ્મેટાથી અસરગ્રસ્ત થતું નથી.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 11: વનસ્પતિઓમાં પરિવહન", "difficulty": "Hard", "num": 19}, {"question": "એક વનસ્પતિના મૂળની અગ્રસ્થ વૃદ્ધિ પ્રદેશમાં આવેલા કોષોના શ્રેણી-સમાંતર જોડાણ દરમિયાન, પ્લાઝમોડેસ્મેટા દ્વારા નીચેનામાંથી કયા પદાર્થનું વહન સૌથી વધુ પ્રમાણમાં થાય છે, પરંતુ તેનું વહન ફક્ત સિમ્પ્લાસ્ટ માર્ગ (symplast pathway) દ્વારા જ શક્ય છે અને એપોપ્લાસ્ટ માર્ગ (apoplast pathway) દ્વારા શક્ય નથી?", "options": ["A) પાણી અને ખનીજ ક્ષારો", "B) સુક્રોઝ અને અન્ય કાર્બોદિતો", "C) RNA અને પ્રોટીન જેવા મોટા અણુઓ", "D) ઓક્સિન જેવા વૃદ્ધિ નિયંત્રક હોર્મોન્સ"], "correct": 2, "explanation": "સાચો જવાબ વિકલ્પ C) RNA અને પ્રોટીન જેવા મોટા અણુઓ છે. પ્લાઝમોડેસ્મેટા દ્વારા મોટા અણુઓ જેમ કે RNA, પ્રોટીન અને અન્ય મેક્રોમોલેક્યુલ્સનું વહન થાય છે, જે ફક્ત સિમ્પ્લાસ્ટ માર્ગ દ્વારા જ શક્ય છે કારણ કે આ માર્ગ કોષરસપટલ (plasma membrane) અને પ્લાઝમોડેસ્મેટા દ્વારા પસાર થાય છે. પાણી અને ખનીજ ક્ષારો (વિકલ્પ A) એપોપ્લાસ્ટ માર્ગ દ્વારા પણ વહન થઈ શકે છે. સુક્રોઝ અને કાર્બોદિતો (વિકલ્પ B) મુખ્યત્વે ફ્લોએમ દ્વારા વહન થાય છે, પરંતુ તે પ્લાઝમોડેસ્મેટા દ્વારા પણ થઈ શકે છે, પરંતુ તે એપોપ્લાસ્ટ માર્ગ દ્વારા પણ થઈ શકે છે. ઓક્સિન (વિકલ્પ D) મુખ્યત્વે કોષરસપટલ દ્વારા વહન થાય છે, પરંતુ તેનું વહન પ્લાઝમોડેસ્મેટા દ્વારા મર્યાદિત હોય છે અને એપોપ્લાસ્ટ માર્ગ દ્વારા પણ થઈ શકે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 6: વનસ્પતિઓમાં પરિવહન", "difficulty": "Hard", "num": 20}, {"question": "નીચેનામાંથી કયા કોષોના જોડાણમાં પ્લાઝમોડેસ્મેટા સૌથી ઓછા સક્રિય હોય છે, પરંતુ હજુ પણ અસ્તિત્વમાં હોય છે?", "options": ["A) મૃદુતક કોષો (પેરેંકાઇમા)", "B) જલવાહિની (ઝાઇલેમ) અને અન્નવાહિની (ફ્લોએમ) વચ્ચેના કોષો", "C) વૃદ્ધ થયેલા કોર્ક કોષો", "D) કોષકેન્દ્રીય કોષો (કોમ્પેનિયન સેલ્સ)"], "correct": 2, "explanation": "વૃદ્ધ થયેલા કોર્ક કોષો (C)માં પ્લાઝમોડેસ્મેટા સૌથી ઓછા સક્રિય હોય છે, કારણ કે આ કોષો મૃત અથવા અર્ધ-મૃત અવસ્થામાં હોય છે. મૃદુતક કોષો (A)માં પ્લાઝમોડેસ્મેટા સક્રિય હોય છે, જલવાહિની અને અન્નવાહિની (B) વચ્ચેના કોષોમાં પણ તે સક્રિય હોય છે, તો કોષકેન્દ્રીય કોષો (D)માં તે ખૂબ જ સક્રિય હોય છે.", "ncert_ref": "Class XI - Chapter 11: વનસ્પતિમાં પરિવહન", "difficulty": "Hard", "num": 21}, {"question": "એક વનસ્પતિમાં, જ્યારે પ્લાઝમોડેસ્મેટા દ્વારા થતું વહન અવરોધાય છે, ત્યારે નીચેનામાંથી કયા પદાર્થનું વહન સૌથી પ્રભાવિત થાય છે?", "options": ["A) પાણી", "B) આયનો (આયર્ન, મેગ્નેશિયમ)", "C) RNA અને પ્રોટીન", "D) ગ્લુકોઝ"], "correct": 2, "explanation": "પ્લાઝમોડેસ્મેટા દ્વારા મોટા અણુઓ જેવા કે RNA અને પ્રોટીન (C)નું વહન સૌથી પ્રભાવિત થાય છે, કારણ કે આ અણુઓ માટે પ્લાઝમોડેસ્મેટા એક મુખ્ય માર્ગ છે. પાણી (A) અને આયનો (B) નાના અણુઓ હોવાથી તે અન્ય માર્ગો દ્વારા પણ વહન પામી શકે છે. ગ્લુકોઝ (D) પણ નાના અણુ હોવાથી તે ઓછું પ્રભાવિત થાય છે.", "ncert_ref": "Class XI - Chapter 11: વનસ્પતિમાં પરિવહન", "difficulty": "Hard", "num": 22}, {"question": "એક વનસ્પતિના મૂળની અગ્રસ્થ ભાગમાં આવેલા વર્ધનશીલ કોષો (meristematic cells) વચ્ચે પ્લાઝમોડેસ્મેટા દ્વારા થતું વહન મુખ્યત્વે કયા હેતુ માટે અગત્યનું છે?", "options": ["A) પાણી અને ખનીજ ક્ષારોનું લાંબા અંતરનું પરિવહન", "B) પ્રોટીન અને ન્યુક્લિક એસિડ જેવા મોટા અણુઓનું કોષો વચ્ચેનું સ્થાનાંતરણ", "C) કોષવિભાજન દરમિયાન સંકેત અણુઓ (signaling molecules) અને વૃદ્ધિ નિયંત્રકોનું વિતરણ", "D) પ્રકાશસંશ્લેષણ દરમિયાન ઉત્પન્ન થતાં કાર્બોદિતનું સંગ્રહ પેશીઓ તરફનું વહન"], "correct": 2, "explanation": "વર્ધનશીલ કોષોમાં કોષવિભાજન સક્રિય રીતે થતું હોય છે, જેમાં સંકેત અણુઓ અને વૃદ્ધિ નિયંત્રકો (જેમ કે ઓક્ઝિન)નું સંતુલિત વિતરણ જરૂરી છે. પ્લાઝમોડેસ્મેટા આ અણુઓના કોષો વચ્ચેના વહન માટે મુખ્ય માર્ગ પૂરો પાડે છે. વિકલ્પ A ખોટો છે કારણ કે પાણી અને ખનીજ ક્ષારોનું લાંબા અંતરનું પરિવહન જલવાહિની અને અન્નવાહિની દ્વારા થાય છે. વિકલ્પ B ખોટો છે કારણ કે પ્રોટીન અને ન્યુક્લિક એસિડ જેવા મોટા અણુઓ પ્લાઝમોડેસ્મેટા દ્વારા સીધા વહન પામતા નથી. વિકલ્પ D ખોટો છે કારણ કે પ્રકાશસંશ્લેષણ મુખ્યત્વે પર્ણોમાં થાય છે, મૂળના વર્ધનશીલ કોષોમાં નહીં.", "ncert_ref": "કક્ષા 11 - પ્રકરણ 6: વનસ્પતિઓમાં પોષણ, કક્ષા 11 - પ્રકરણ 15: વનસ્પતિ વૃદ્ધિ અને વિકાસ", "difficulty": "Hard", "num": 23}, {"question": "નીચેનામાંથી કયું વિધાન વનસ્પતિના કોષોના શ્રેણી-સમાંતર જોડાણમાં પ્લાઝમોડેસ્મેટાની ભૂમિકા સંદર્ભે અપવાદરૂપ છે?", "options": ["A) પ્લાઝમોડેસ્મેટા દ્વારા કોષો વચ્ચે નાના આયનો અને દ્રાવ્ય પદાર્થોનું વહન થઈ શકે છે", "B) પ્લાઝમોડેસ્મેટા દ્વ                 let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
