<head>

    <title>નીટ ક્વિઝ - Ch11 - પ્રકાશવિદ્યુત અસર (આઇન્સ્ટાઇન સમીકરણ)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>

        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 Ch11 - પ્રકાશવિદ્યુત અસર (આઇન્સ્ટાઇન સમીકરણ)</span>
                <span>🎯 Hard</span>

        </div>

    <script>
        const questionsData = [{"question": "એક ધાતુની સપાટી પર λ તરંગલંબાઈ ધરાવતો પ્રકાશ આપાત કરતાં ઉત્સર્જાતા પ્રકાશઇલેક્ટ્રોનની મહત્તમ ગતિઊર્જા K છે. જો આપાત પ્રકાશની તીવ્રતા બમણી કરવામાં આવે અને તરંગલંબાઈ λ/2 કરવામાં આવે, તો નવી મહત્તમ ગતિઊર્જા કેટલી થશે? (ધાતુનો કાર્યવિધેય અચળ રહે છે)", "options": ["A) K જેટલી જ રહેશે", "B) 2K થશે", "C) 4K થશે", "D) hc/λ - φ થી વધારે થશે"], "correct": 3, "explanation": "આઇન્સ્ટાઇનના પ્રકાશવિદ્યુત સમીકરણ મુજબ, Kₘₐₓ = hc/λ - φ. જ્યારે તરંગલંબાઈ λ/2 કરવામાં આવે, ત્યારે નવી ગતિઊર્જા K' = hc/(λ/2) - φ = 2hc/λ - φ = (hc/λ - φ) + hc/λ = K + hc/λ થશે. આથી K' > hc/λ - φ થશે. પ્રકાશની તીવ્રતા બમણી કરવાથી ફક્ત પ્રકાશઇલેક્ટ્રોનની સંખ્યા વધે, ગતિઊર્જા નહીં. વિકલ્પ D સાચો છે કારણ કે K' નું મૂલ્ય hc/λ - φ કરતાં વધારે થશે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 11: વિકિરણ અને દ્રવ્યની દ્વૈત પ્રકૃતિ", "difficulty": "Hard", "num": 1}, {"question": "એક પ્રયોગમાં, સોડિયમ ધાતુ પર 400 nm તરંગલંબાઈનો પ્રકાશ આપાત કરતાં ઉત્સર્જાતા પ્રકાશઇલેક્ટ્રોનની મહત્તમ ગતિઊર્જા 1.2 eV મળે છે. જો 300 nm તરંગલંબાઈનો પ્રકાશ ઉપયોગમાં લેવામાં આવે, તો મહત્તમ ગતિઊર્જા કેટલી થશે? (hc = 1240 eV·nm લો)", "options": ["A) 0.8 eV", "B) 1.6 eV", "C) 2.2 eV", "D) 3.0 eV"], "correct": 2, "explanation": "આઇન્સ્ટાઇન સમીકરણ Kₘₐₓ = hc/λ - φ નો ઉપયોગ કરતાં, 400 nm માટે: 1.2 = 1240/400 - φ ⇒ φ = 3.1 - 1.2 = 1.9 eV. હવે 300 nm માટે: Kₘₐₓ = 1240/300 - 1.9 = 4.13 - 1.9 = 2.23 eV ≈ 2.2 eV. વિકલ્પ C સાચો છે. અન્ય વિકલ્પો ગણતરીની ભૂલ પર આધારિત છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 11: વિકિરણ અને દ્રવ્યની દ્વૈત પ્રકૃતિ", "difficulty": "Hard", "num": 2}, {"question": "નીચેના પૈકી કયું વિધાન પ્રકાશવિદ્યુત અસર માટે ખોટું છે?", "options": ["A) ઉત્સર્જાતા પ્રકાશઇલેક્ટ્રોનની સંખ્યા પ્રકાશની તીવ્રતા પર આધારિત છે", "B) પ્રકાશઇલેક્ટ્રોનની મહત્તમ ગતિઊર્જા પ્રકાશની તરંગલંબાઈ પર આધારિત છે", "C) પ્રકાશની આવૃત્તિ થ્રેશોલ્ડ આવૃત્તિ કરતાં ઓછી હોય તો પ્રકાશઇલેક્ટ્રોન ઉત્સર્જિત થતા નથી", "D) પ્રકાશઇલેક્ટ્રોનની મહત્તમ ગતિઊર્જા પ્રકાશની તીવ્રતા પર આધારિત છે"], "correct": 3, "explanation": "પ્રકાશવિદ્યુત અસરમાં પ્રકાશઇલેક્ટ્રોનની મહત્તમ ગતિઊર્જા પ્રકાશની તીવ્રતા પર આધારિત નથી, પરંતુ તેની આવૃત્તિ પર આધારિત છે. આથી વિકલ્પ D ખોટું છે. અન્ય તમામ વિકલ્પો NCERT મુજબ સાચાં છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 11: વિકિરણ અને દ્રવ્યની દ્વૈત પ્રકૃતિ", "difficulty": "Hard", "num": 3}, {"question": "એક ધાતુનો કાર્યવિધેય 2.3 eV છે. જો આ ધાતુ પર 300 nm તરંગલંબાઈનો પ્રકાશ આપાત કરવામાં આવે, તો ઉત્સર્જાતા પ્રકાશઇલેક્ટ્રોનની મહત્તમ ગતિઊર્જા કેટલી થશે? (hc = 1240 eV·nm લો)", "options": ["A) 1.2 eV", "B) 1.8 eV", "C) 2.3 eV", "D) પ્રકાશઇલેક્ટ્રોન ઉત્સર્જિત થશે નહીં"], "correct": 1, "explanation": "આઇન્સ્ટાઇન સમીકરણ Kₘₐₓ = hc/λ - φ નો ઉપયોગ કરતાં, Kₘₐₓ = 1240/300 - 2.3 = 4.13 - 2.3 = 1.83 eV ≈ 1.8 eV. વિકલ્પ B સાચો છે. જો ગણતરી કરતાં ઋણ મૂલ્ય મળે તો પ્રકાશઇલેક્ટ્રોન ઉત્સર્જિત થતાં નથી, પરંતુ અહીં ધન મૂલ્ય મળે છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 11: વિકિરણ અને દ્રવ્યની દ્વૈત પ્રકૃતિ", "difficulty": "Hard", "num": 4}, {"question": "એક પ્રયોગમાં, બે જુદી જુદી ધાતુઓ A અને B પર સમાન તરંગલંબાઈનો પ્રકાશ આપાત કરતાં, ધાતુ A માટે ઉત્સર્જાતા પ્રકાશઇલેક્ટ્રોનની મહત્તમ ગતિઊર્જા ધાતુ B કરતાં વધારે મળે છે. આ પરથી શું અનુમાન કરી શકાય?", "options": ["A) ધાતુ A નો કાર્યવિધેય ધાતુ B કરતાં વધારે છે", "B) ધાતુ A નો કાર્યવિધેય ધાતુ B કરતાં ઓછો છે", "C) બંને ધાતુઓનો કાર્યવિધેય સમાન છે", "D) પ્રકાશની તીવ્રતા ધાતુ A માટે વધારે હતી"], "correct": 1, "explanation": "આઇન્સ્ટાઇન સમીકરણ Kₘₐₓ = hc/λ - φ મુજબ, જો Kₘₐₓ વધારે હોય તો φ ઓછો હોવો જોઈએ. આથી ધાતુ A નો કાર્યવિધેય ધાતુ B કરતાં ઓછો છે. વિકલ્પ B સાચો છે. અન્ય વિકલ્પો તાર્કિક રીતે ખોટાં છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 11: વિકિરણ અને દ્રવ્યની દ્વૈત પ્રકૃતિ", "difficulty": "Hard", "num": 5}, {"question": "એક ધાતુની સપાટી પર 500 nm તરંગલંબાઈ ધરાવતો પ્રકાશ આપાત કરતાં કોઈ પ્રકાશઇલેક્ટ્રોન ઉત્સર્જિત થતો નથી, પરંતુ 400 nm તરંગલંબાઈનો પ્રકાશ આપાત કરતાં ઉત્સર્જિત થાય છે. જો આ ધાતુનો કાર્યવિધેય φ₀ હોય, તો નીચેના પૈકી કયું વિધાન સાચું છે?", "options": ["A) φ₀ = hc/500 nm", "B) φ₀ < hc/500 nm પરંતુ φ₀ > hc/400 nm", "C) φ₀ = hc/400 nm", "D) φ₀ > hc/400 nm"], "correct": 1, "explanation": "પ્રકાશવિદ્યુત અસર માટે આઇન્સ્ટાઇનનું સમીકરણ છે: K.E. = hν - φ₀. 500 nm તરંગલંબાઈ માટે કોઈ ઇલેક્ટ્રોન ઉત્સર્જિત ન થવાનું કારણ એ છે કે hν < φ₀, જ્યારે 400 nm માટે hν > φ₀. આથી, φ₀ એ 500 nm અને 400 nm વચ્ચેનો કોઈ મૂલ્ય હોવો જોઈએ. આથી, φ₀ < hc/500 nm અને φ₀ > hc/400 nm. વિકલ્પ B સાચો છે. A, C, અને D ખોટા છે કારણ કે તેઓ φ₀ ને સીધા જ એક મૂલ્ય પર સીમિત કરે છે.", "ncert_ref": "Class XII - પ્રકરણ 11: પ્રકાશવિદ્યુત અસર અને ધાતુઓના ક્વોન્ટમ સિદ્ધાંત", "difficulty": "Hard", "num": 6}, {"question": "એક ધાતુ પર 6.2 eV ઉર્જા ધરાવતો ફોટોન આપાત કરતાં ઉત્સર્જિત થતા પ્રકાશઇલેક્ટ્રોનની મહત્તમ ગતિઊર્જા 2.2 eV છે. જો આ જ ધાતુ પર 8 eV ઉર્જા ધરાવતો ફોટોન આપાત કરવામાં આવે, તો ઉત્સર્જિત થતા પ્રકાશઇલેક્ટ્રોનની મહત્તમ ગતિઊર્જા કેટલી હશે?", "options": ["A) 2.2 eV", "B) 4.0 eV", "C) 5.8 eV", "D) 8.0 eV"], "correct": 2, "explanation": "આઇન્સ્ટાઇનના સમીકરણ મુજબ, K.E. = hν - φ₀. પ્રથમ કિસ્સામાં, 2.2 eV = 6.2 eV - φ₀ ⇒ φ₀ = 4.0 eV. બીજા કિસ્સામાં, K.E. = 8 eV - 4.0 eV = 4.0 eV. પરંતુ વિકલ્પ B એ 4.0 eV છે, જે ગણતરી મુજબ સાચો જવાબ છે. પરંતુ પ્રશ્નમાં 2.2 eV અને 6.2 eV આપેલ છે, જેથી φ₀ = 4.0 eV. આથી, 8 eV - 4.0 eV = 4.0 eV. પરંતુ વિકલ્પ B એ 4.0 eV છે, જે સાચો છે. (નોંધ: અહીં પ્રશ્નમાં કોઈ ત્રુટિ નથી, પરંતુ ગણતરી મુજબ સાચો જવાબ 4.0 eV છે.)", "ncert_ref": "Class XII - પ્રકરણ 11: પ્રકાશવિદ્યુત અસર અને ધાતુઓના ક્વોન્ટમ સિદ્ધાંત", "difficulty": "Hard", "num": 7}, {"question": "નીચેના પૈકી કયું વિધાન આઇન્સ્ટાઇનના પ્રકાશવિદ્યુત સમીકરણ માટે ખોટું છે?", "options": ["A) ઉત્સર્જિત ઇલેક્ટ્રોનની મહત્તમ ગતિઊર્જા આપાત પ્રકાશની તીવ્રતાથી સ્વતંત્ર હોય છે.", "B) ઉત્સર્જિત ઇલેક્ટ્રોનની સંખ્યા આપાત પ્રકાશની તીવ્રતાથી સ્વતંત્ર હોય છે.", "C) કાર્યવિધેય ધાતુની પ્રકૃતિ પર આધાર રાખે છે.", "D) પ્રકાશવિદ્યુત અસર માટે થ્રેશોલ્ડ તરંગલંબાઈ અસ્તિત્વમાં હોય છે."], "correct": 1, "explanation": "આઇન્સ્ટાઇનના સમીકરણ મુજબ, ઉત્સર્જિત ઇલેક્ટ્રોનની સંખ્યા આપાત પ્રકાશની તીવ્રતા પર આધાર રાખે છે, કારણ કે તીવ્રતા વધારવાથી વધુ ફોટોન ઉત્પન્ન થાય છે, જે વધુ ઇલેક્ટ્રોન ઉત્સર્જિત કરે છે. આથી, વિધાન B ખોટું છે. A, C, અને D સાચા છે.", "ncert_ref": "Class XII - પ્રકરણ 11: પ્રકાશવિદ્યુત અસર અને ધાતુઓના ક્વોન્ટમ સિદ્ધાંત", "difficulty": "Hard", "num": 8}, {"question": "એક ધાતુનો કાર્યવિધેય 2 eV છે. જો આ ધાતુ પર 300 nm તરંગલંબાઈનો પ્રકાશ આપાત કરવામાં આવે, તો ઉત્સર્જિત થતા પ્રકાશઇલેક્ટ્રોનની મહત્તમ ગતિઊર્જા કેટલી હશે? (h = 6.626 × 10⁻³⁴ Js, c = 3 × 10⁸ m/s, 1 eV = 1.6 × 10⁻¹⁹ J)", "options": ["A) 1.3 eV", "B) 2.3 eV", "C) 3.3 eV", "D) 4.3 eV"], "correct": 1, "explanation": "પ્રથમ, 300 nm તરંગલંબાઈની ઉર્જા ગણી: E = hc/λ = (6.626 × 10⁻³⁴ × 3 × 10⁸) / (300 × 10⁻⁹) = 6.626 × 10⁻¹⁹ J ≈ 4.14 eV. આઇન્સ્ટાઇનના સમીકરણ મુજબ, K.E. = hν - φ₀ = 4.14 eV - 2 eV = 2.14 eV ≈ 2.3 eV (નજીકનો વિકલ્પ). આથી, સાચો જવાબ B છે. A, C, અને D ખોટા છે.", "ncert_ref": "Class XII - પ્રકરણ 11: પ્રકાશવિદ્યુત અસર અને ધાતુઓના ક્વોન્ટમ સિદ્ધાંત", "difficulty": "Hard", "num": 9}, {"question": "નીચેના પૈકી કયા કિસ્સામાં પ્રકાશવિદ્યુત અસર થશે નહીં?", "options": ["A) સોડિયમ પર 400 nm તરંગલંબાઈનો પ્રકાશ આપાત કરતાં", "B) પોટેશિયમ પર 500 nm તરંગલંબાઈનો પ્રકાશ આપાત કરતાં", "C) લિથિયમ પર 600 nm તરંગલંબાઈનો પ્રકાશ આપાત કરતાં", "D) સીઝિયમ પર 700 nm તરંગલંબાઈનો પ્રકાશ આપાત કરતાં"], "correct": 2, "explanation": "લિથિયમનો કાર્યવિધેય સૌથી ઉચ્ચ હોય છે (લગભગ 2.9 eV). 600 nm તરંગલંબાઈની ઉર્જા E = hc/λ ≈ 2.07 eV, જે લિથિયમના કાર્યવિધેય કરતાં ઓછી છે. આથી, પ્રકાશવિદ્યુત અસર થશે નહીં. A, B, અને D કિસ્સામાં, આપાત પ્રકાશની ઉર્જા કાર્યવિધેય કરતાં વધુ છે, આથી પ્રકાશવિદ્યુત અસર થશે.", "ncert_ref": "Class XII - પ્રકરણ 11: પ્રકાશવિદ્યુત અસર અને ધાતુઓના ક્વોન્ટમ સિદ્ધાંત", "difficulty": "Hard", "num": 10}, {"question": "એક ધાતુની સપાટી પર 200 nm તરંગલંબાઈનો પ્રકાશ આપાત કરતાં ઉત્સર્જાતા ઇલેક્ટ્રોનની મહત્તમ ગતિઊર્જા 4.2 eV જોવા મળે છે. જો આ જ ધાતુ પર 400 nm તરંગલંબાઈનો પ્રકાશ આપાત કરવામાં આવે, તો ઉત્સર્જાતા ઇલેક્ટ્રોનની મહત્તમ ગતિઊર્જા (eVમાં) કેટલી હશે? (h = 6.626 × 10⁻³⁴ Js, c = 3 × 10⁸ m/s, 1 eV = 1.6 × 10⁻¹⁹ J)", "options": ["A) 0 eV", "B) 1.1 eV", "C) 2.1 eV", "D) 3.1 eV"], "correct": 0, "explanation": "પ્રથમ કિસ્સામાં, આઇન્સ્ટાઇનના સમીકરણ મુજબ: hν = φ + KE_max. 200 n         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
