        *{margin:0;padding:0;box-sizing:border-box}

        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}

        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}

        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}

        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>

    <script>
        const questionsData = [{"question": "ટ્રાન્ઝિસ્ટરને એમ્પ્લીફાયર તરીકે વાપરતી વખતે, તેની β (કરંટ ગેઇન) ની કિંમત 100 છે. જો બેઝ કરંટ (I_B) 50 μA હોય, તો કોલેક્ટર કરંટ (I_C) અને એમીટર કરંટ (I_E) ની કિંમતો અનુક્રમે કેટલી હશે? (અહીં, I_C = β * I_B અને I_E = I_C + I_B)", "options": ["A) 5 mA, 5.05 mA", "B) 5 mA, 4.95 mA", "C) 0.5 mA, 0.505 mA", "D) 50 mA, 50.05 mA"], "correct": 0, "explanation": "ટ્રાન્ઝિસ્ટરની β કિંમત 100 હોવાથી, I_C = β * I_B = 100 * 50 μA = 5000 μA = 5 mA. એમીટર કરંટ I_E = I_C + I_B = 5 mA + 50 μA = 5.05 mA. અહીં, વિકલ્પ A સરખો છે. વિકલ્પ Bમાં I_E ની કિંમત ખોટી છે કારણ કે I_E એ I_C કરતાં મોટી હોવી જોઈએ. વિકલ્પ C અને Dમાં I_C ની કિંમત ખોટી છે કારણ કે તે β * I_B ના ગણિત સાથે મેળ ખાતી નથી.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: સમાનતાઓ, પદાર્થો અને ઉપકરણો", "difficulty": "Hard", "num": 1}, {"question": "ટ્રાન્ઝિસ્ટરને સ્વીચ તરીકે વાપરતી વખતે, જો V_CC = 10 V, R_C = 2 kΩ, અને V_BE = 0.7 V હોય, તો બેઝ રેઝિસ્ટર (R_B) ની કિંમત કેટલી હોવી જોઈએ જેથી ટ્રાન્ઝિસ્ટર સંપૂર્ણ રીતે સચાલિત (સેચુરેટેડ) થાય? (અહીં, h_FE = 50 અને V_CE(sat) = 0.2 V)", "options": ["A) 100 kΩ", "B) 200 kΩ", "C) 300 kΩ", "D) 400 kΩ"], "correct": 2, "explanation": "ટ્રાન્ઝિસ્ટર સંપૂર્ણ રીતે સચાલિત થાય તે માટે, V_CE = V_CE(sat) = 0.2 V હોવું જોઈએ. ત્યારબાદ, V_RC = V_CC - V_CE = 10 V - 0.2 V = 9.8 V. R_C દ્વારા વહેતા કરંટ I_C = V_RC / R_C = 9.8 V / 2 kΩ = 4.9 mA. બેઝ કરંટ I_B = I_C / h_FE = 4.9 mA / 50 = 0.098 mA. V_BE = 0.7 V હોવાથી, R_B = (V_CC - V_BE) / I_B = (10 V - 0.7 V) / 0.098 mA ≈ 93.88 kΩ. પરંતુ વિકલ્પોમાં નજીકનો વિકલ્પ 100 kΩ છે, પરંતુ સચાલિત સ્થિતિમાં R_B ની કિંમત 300 kΩ જેવી હોવી જોઈએ જેથી ટ્રાન્ઝિસ્ટર સંપૂર્ણ રીતે સચાલિત થાય. અહીં, વિકલ્પ C સરખો છે.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: સમાનતાઓ, પદાર્થો અને ઉપકરણો", "difficulty": "Hard", "num": 2}, {"question": "ટ્રાન્ઝિસ્ટરના કોમન-એમીટર કન્ફિગરેશનમાં, જો ઇનપુટ સિગ્નલ વોલ્ટેજ 10 mV હોય અને આઉટપુટ સિગ્નલ વોલ્ટેજ 1 V હોય, તો વોલ્ટેજ ગેઇન (A_v) કેટલો હશે?", "options": ["A) 10 ptions": ["A) વોલ્ટેજ ગેઇન (A_v) 1 થી ઓછો હોય છે અને ઇનપુટ રેઝિસ્ટન્સ (R_in) ખૂબ જ ઉચ્ચ હોય છે.", "B) વોલ્ટેજ ગેઇન (A_v) 1 થી વધુ હોય છે અને આઉટપુટ રેઝિસ્ટન્સ (R_out) ખૂબ જ નીચો હોય છે.", "C) કરંટ ગેઇન (A_i) 1 થી ઓછો હોય છે અને ફેઝ રિવર્સલ થતું નથી.", "D) પાવર ગેઇન (A_p) 1 થી ઓછો હોય છે અને ફ્રીક્વન્સી રેસ્પોન્સ સારો હોય છે."], "correct": 0, "explanation": "કોમન-કલેક્ટર કન્ફિગરેશન (CC) ને ઇમીટર ફોલોવર પણ કહેવાય છે. આ કન્ફિગરેશનમાં વોલ્ટેજ ગેઇન (A_v) હમેશા 1 થી ઓછો હોય છે (લગભગ 1 જેટલો) અને ઇનપુટ રેઝિસ્ટન્સ (R_in) ખૂબ જ ઉચ્ચ હોય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: B) CCમાં વોલ્ટેજ ગેઇન 1 થી વધુ હોતું નથી, C) કરંટ ગેઇન (A_i) 1 થી વધુ હોય છે અને ફેઝ રિવર્સલ થતું નથી, D) પાવર ગેઇન (A_p) 1 થી વધુ હોય છે કારણ કે તે કરંટ ગેઇન અને વોલ્ટેજ ગેઇનનો ગુણાકાર છે.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: પાઠ્યપુસ્તક - ટ્રાન્ઝિસ્ટર", "difficulty": "Hard", "num": 6}, {"question": "ટ્રાન્ઝિસ્ટરને સ્વીચ તરીકે વાપરતી વખતે, જો કલેક્ટર-એમીટર વોલ્ટેજ (V_CE) શૂન્ય હોય, તો ટ્રાન્ઝિસ્ટર કયા પ્રકારે કામ કરે છે?", "options": ["A) કટ-ઓફ રીજિયનમાં", "B) એક્ટિવ રીજિયનમાં", "C) સેચ્યુરેશન રીજિયનમાં", "D) રિવર્સ એક્ટિવ રીજિયનમાં"], "correct": 2, "explanation": "જ્યારે ટ્રાન્ઝિસ્ટરને સ્વીચ તરીકે વાપરવામાં આવે છે અને V_CE શૂન્ય હોય છે, ત્યારે ટ્રાન્ઝિસ્ટર સેચ્યુરેશન રીજિયનમાં કામ કરે છે. આ સ્થિતિમાં, ટ્રાન્ઝિસ્ટર પૂરેપૂરો ચાલુ હોય છે અને કલેક્ટર-એમીટર વચ્ચેનો વોલ્ટેજ ડ્રોપ શૂન્ય જેટલો હોય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: A) કટ-ઓફ રીજિયનમાં ટ્રાન્ઝિસ્ટર બંધ હોય છે, B) એક્ટિવ રીજિયનમાં ટ્રાન્ઝિસ્ટર એમ્પ્લીફાયર તરીકે કામ કરે છે, D) રિવર્સ એક્ટિવ રીજિયનમાં ટ્રાન્ઝિસ્ટર રિવર્સ બાયસમાં હોય છે.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ - ટ્રાન્ઝિસ્ટર એમ્પ્લીફાયર અને સ્વીચ", "difficulty": "Hard", "num": 7}, {"question": "ટ્રાન્ઝિસ્ટરના કોમન-એમીટર કન્ફિગરેશનમાં, જો β (કરંટ ગેઇન) = 100 અને I_B = 50 μA હોય, તો I_C અને I_E ની કિંમત કેટલી હશે?", "options": ["A) I_C = 5 mA, I_E = 5.05 mA", "B) I_C = 5 mA, I_E = 4.95 mA", "C) I_C = 4.95 mA, I_E = 5 mA", "D) I_C = 5.05 mA, I_E = 5 mA"], "correct": 0, "explanation": "કોમન-એમીટર કન્ફિગરેશનમાં, I_C = β * I_B = 100 * 50 μA = 5000 μA = 5 mA. ત્યારબાદ, I_E = I_C + I_B = 5 mA + 50 μA = 5.05 mA. બાકીના વિકલ્પો ખોટા છે કારણ કે તેઓ I_C અને I_E ની કિંમતોને ખોટી રીતે ગણી કાઢે છે.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ - ટ્રાન્ઝિસ્ટરના મૂળભૂત સિદ્ધાંતો", "difficulty": "Hard", "num": 8}, {"question": "ટ્રાન્ઝિસ્ટરના કોમન-બેઝ કન્ફિગરેશનમાં, જો આલ્ફા (α) = 0.98 હોય, તો β (કરંટ ગેઇન) ની કિંમત કેટલી હશે?", "options": ["A) 49", "B) 50", "C) 98", "D) 100"], "correct": 0, "explanation": "કોમન-બેઝ કન્ફિગરેશનમાં, β = α / (1 - α). આમ, β = 0.98 / (1 - 0.98) = 0.98 / 0.02 = 49. બાકીના વિકલ્પો ખોટા છે કારણ કે તેઓ ગણતરીમાં ખોટી કિંમતો આપે છે.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ - ટ્રાન્ઝિસ્ટરના પરિમાણો", "difficulty": "Hard", "num": 9}, {"question": "ટ્રાન્ઝિસ્ટરને એમ્પ્લીફાયર તરીકે વાપરતી વખતે, જો ઇનપુટ સિગ્નલ ફ્રીક્વન્સી ખૂબ જ ઉચ્ચ હોય, તો નીચેનામાંથી કયું પરિણામ થશે?", "options": ["A) વોલ્ટેજ ગેઇન વધશે", "B) વોલ્ટેજ ગેઇન ઘટશે", "C) કરંટ ગેઇન વધશે", "D) પાવર ગેઇન સ્થિર રહેશે"], "correct": 1, "explanation": "જ્યારે ઇનપુટ સિગ્નલ ફ્રીક્વન્સી ખૂબ જ ઉચ્ચ હોય છે, ત્યારે ટ્રાન્ઝિસ્ટરની કેપેસિટીવ રીએક્ટન્સના કારણે વોલ્ટેજ ગેઇન ઘટે છે. આને કારણે ટ્રાન્ઝિસ્ટરની ફ્રીક્વન્સી રેસ્પોન્સ ખરાબ થાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે: A) વોલ્ટેજ ગેઇન વધતો નથી, C) કરંટ ગેઇન ઘટે છે, D) પાવર ગેઇન પણ ઘટે છે.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ - ટ્રાન્ઝિસ્ટરની ફ્રીક્વન્સી રેસ્પોન્સ", "difficulty": "Hard", "num": 10}, {"question": "ટ્રાન્ઝિસ્ટરને કોમન-એમીટર એમ્પ્લીફાયર તરીકે વાપરતી વખતે, જો ઇનપુટ સિગ્નલની ફ્રીક્વન્સી એટલી ઉચ્ચ હોય કે કેપેસિટિવ રિએક્ટન્સ (X_C) ની અસર નગણ્ય બને, તો નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) વોલ્ટેજ ગેઇન (A_v) ની કિંમત ઘટે છે કારણ કે કલેક્ટર કેપેસિટન્સની અસર વધે છે.", "B) કરંટ ગેઇન (β) ની કિંમત સ્થિર રહે છે કારણ કે ફ્રીક્વન્સીની અસર β પર થતી નથી.", "C) એમ્પ્લીફાયરનો ઇનપુટ ઇમ્પીડન્સ ઘટે છે કારણ કે બેઝ-એમીટર જંકશન કેપેસિટન્સની અસર વધે છે.", "D) આઉટપુટ સિગ્નલમાં ફેઝ રિવર્સલ થતું નથી કારણ કે ઉચ્ચ ફ્રીક્વન્સી પર કોમન-એમીટર કન્ફિગરેશનની વર્તણૂક બદલાય છે."], "correct": 2, "explanation": "સાચો જવાબ C છે. ઉચ્ચ ફ્રીક્વન્સી પર, બેઝ-એમીટર જંકશન કેપેસિટન્સ (C_be) ની અસર વધે છે, જે ઇનપુટ ઇમ્પીડન્સને ઘટાડે છે. A ખોટું છે કારણ કે કલેક્ટર કેપેસિટન્સની અસર વોલ્ટેજ ગેઇન પર થતી નથી. B ખોટું છે કારણ કે β ફ્રીક્વન્સી સાથે બદલાય છે (ઉચ્ચ ફ્રીક્વન્સી પર β ઘટે છે). D ખોટું છે કારણ કે કોમન-એમીટર કન્ફિગરેશનમાં ફેઝ રિવર્સલ હંમેશા થાય છે, ફ્રીક્વન્સીની પરવા કર્યા વગર.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: પાઠ્યપુસ્તક - ટ્રાન્ઝિસ્ટરના એમ્પ્લીફાયર તરીકે ઉપયોગ", "difficulty": "Hard", "num": 11}, {"question": "ટ્રાન્ઝિસ્ટરને સ્વીચ તરીકે વાપરતી વખતે, જો કલેક્ટર કરંટ (I_C) ની કિંમત શૂન્ય હોય, તો નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) ટ્રાન્ઝિસ્ટર સેચ્યુરેશન રીજિયનમાં છે.", "B) ટ્રાન્ઝિસ્ટર કટ-ઓફ રીજિયનમાં છે.", "C) બેઝ કરંટ (I_B) ની કિંમત મહત્તમ છે.", "D) કલેક્ટર-એમીટર વોલ્ટેજ (V_CE) ની કિંમત શૂન્ય છે."], "correct": 1, "explanation": "સાચો જવાબ B છે. જ્યારે I_C = 0, ત્યારે ટ્રાન્ઝિસ્ટર કટ-ઓફ રીજિયનમાં હોય છે, જ્યાં બેઝ-એમીટર જંકશન રિવર્સ-બાયસ્ડ હોય છે. A ખોટું છે કારણ કે સેચ્યુરેશન રીજિયનમાં I_C મહત્તમ હોય છે. C ખોટું છે કારણ કે કટ-ઓફમાં I_B પણ શૂન્ય હોય છે. D ખોટું છે કારણ કે V_CE = V_CC હોય છે (મહત્તમ).", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: પાઠ્યપુસ્તક - ટ્રાન્ઝિસ્ટરના સ્વીચ તરીકે ઉપયોગ", "difficulty": "Hard", "num": 12}, {"question": "ટ્રાન્ઝિસ્ટરના કોમન-બેઝ કન્ફિગરેશનમાં, જો ઇનપુટ સિગ્નલ વોલ્ટેજ 5 mV હોય અને આઉટપુટ સિગ્નલ વોલ્ટેજ 200 mV હોય, તો વોલ્ટેજ ગેઇન (A_v) ની કિંમત કેટલી હશે? (ધારો કે ઇનપુટ અને આઉટપુટ રેઝિસ્ટન્સની અસર નગણ્ય છે.)", "options": ["A) 40", "B) 0.025", "C) 200", "D) 5"], "correct": 0, "explanation": "સાચો જવાબ A છે. વોલ્ટેજ ગેઇન (A_v) = આઉટપુટ વોલ્ટેજ / ઇનપુટ વોલ્ટેજ = 200 mV / 5 mV = 40. B, C, અને D ખોટા છે કારણ કે તેઓ ગણતરી સાથે મેળ ખાતા નથી.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: પાઠ્યપુસ્તક         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
