    <script>
        const questionsData = [{"question": "એક શુદ્ધ અવરોધક R ને એક AC સ્રોત સાથે જોડવામાં આવે છે, જેનો વોલ્ટેજ v = v₀ sin(ωt) છે. જો સ્રોતની આવૃત્તિ બમણી કરવામાં આવે, તો અવરોધકમાં વ્યય થતી સરેરાશ પાવર (Pₐᵥ) પર શું અસર થશે?", "options": ["A) Pₐᵥ બમણી થશે", "B) Pₐᵥ અડધી થશે", "C) Pₐᵥ ચોથા ભાગની થશે", "D) Pₐᵥ અપરિવર્તિત રહેશે"], "correct": 3, "explanation": "શુદ્ધ અવરોધકમાં સરેરાશ પાવર Pₐᵥ = (v₀²)/(2R) છે, જે આવૃત્તિ ω પર આધારિત નથી. તેથી આવૃત્તિ બમણી કરવાથી Pₐᵥ પર કોઈ અસર થતી નથી. વિકલ્પ A ખોટો છે કારણ કે પાવર આવૃત્તિ સાથે સીધો સંબંધ ધરાવતો નથી. વિકલ્પ B અને C ખોટા છે કારણ કે પાવરમાં ઘટાડો થતો નથી. વિકલ્પ D સાચો છે કારણ કે પાવર અવરોધ અને વોલ્ટેજના કંપવિસ્તાર પર જ આધારિત છે.", "ncert_ref": "Class XII - અધ્યાય 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 1}, {"question": "એક AC પરિપથમાં શુદ્ધ અવરોધ R અને શુદ્ધ પ્રેરકત્વ L શ્રેણીમાં જોડાયેલા છે. જો પરિપથમાં વોલ્ટેજ અને પ્રવાહ વચ્ચેનો કળા તફાવત φ હોય, તો નીચેનામાંથી કયું વિધાન સાચું છે જ્યારે માત્ર અવરોધ R ને ધ્યાનમાં લેવામાં આવે?", "options": ["A) φ = 90° કારણ કે પ્રવાહ વોલ્ટેજ કરતાં પાછળ રહે છે", "B) φ = 0° કારણ કે પ્રવાહ અને વોલ્ટેજ સમાન કળામાં હોય છે", "C) φ = 45° કારણ કે અવરોધ અને પ્રેરકત્વ સમાન પ્રભાવ ધરાવે છે", "D) φ અવરોધ R ના મૂલ્ય પર આધારિત છે"], "correct": 1, "explanation": "શુદ્ધ અવરોધકમાં પ્રવાહ અને વોલ્ટેજ વચ્ચે કોઈ કળા તફાવત હોતો નથી, તેથી φ = 0° હોય છે. વિકલ્પ A ખોટો છે કારણ કે 90° નો તફાવત પ્રેરકત્વ અથવા કેપેસિટન્સ ધરાવતા પરિપથમાં જોવા મળે છે. વિકલ્પ C ખોટો છે કારણ કે અવરોધકમાં કળા તફાવત શૂન્ય હોય છે. વિકલ્પ D ખોટો છે કારણ કે φ અવરોધના મૂલ્ય પર આધારિત નથી, પરંતુ માત્ર કળા સંબંધ પર આધારિત છે.", "ncert_ref": "Class XII - અધ્યાય 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 2}, {"question": "એક AC વોલ્ટેજ સ્રોત v = 200 sin(100πt) વોલ્ટને એક અવરોધ R = 50 Ω સાથે જોડવામાં આવે છે. જો અવરોધકમાં વ્યય થતી તાત્ક્ષણિક પાવર p(t) નું મહત્તમ મૂલ્ય Pₘₐₓ હોય, તો Pₘₐₓ નું મૂલ્ય શું હશે?", "options": ["A) 400 W", "B) 800 W", "C) 1000 W", "D) 1600 W"], "correct": 1, "explanation": "તાત્ક્ષણિક પાવર p(t) = v²/R = (200 sin(100πt))² / 50 = (40000 sin²(100πt)) / 50 = 800 sin²(100πt). પાવરનું મહત્તમ મૂલ્ય ત્યારે મળે જ્યારે sin²(100πt) = 1 હોય, તેથી Pₘₐₓ = 800 W. વિકલ્પ A ખોટો છે કારણ કે તે સરેરાશ પાવરનું મૂલ્ય દર્શાવે છે. વિકલ્પ C અને D ખોટા છે કારણ કે તેઓ ગણતરીની ભૂલ દર્શાવે છે.", "ncert_ref": "Class XII - અધ્યાય 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 3}, {"question": "એક AC પરિપથમાં અવરોધ R અને કેપેસિટર C શ્રેણીમાં જોડાયેલા છે. જો પરિપથમાં વોલ્ટેજનું RMS મૂલ્ય Vᵣₘₛ અને પ્રવાહનું RMS મૂલ્ય Iᵣₘₛ હોય, તો નીચેનામાંથી કયું વિધાન અવરોધ R માટે સાચું નથી?", "options": ["A) અવરોધ R પરનો વોલ્ટેજ V_R = Iᵣₘₛ × R", "B) અવરોધ R પરનો વોલ્ટેજ અને પ્રવાહ સમાન કળામાં હોય છે", "C) અવરોધ R પરનો વોલ્ટેજ કેપેસિટર પરના વોલ્ટેજ કરતાં આગળ હોય છે", "D) અવરોધ R પરનો વોલ્ટેજ અને કુલ વોલ્ટેજ વચ્ચે કળા તફાવત શૂન્ય હોય છે"], "correct": 3, "explanation": "શુદ્ધ અવરોધકમાં વોલ્ટેજ અને પ્રવાહ સમાન કળામાં હોય છે, પરંતુ કેપેસિટરમાં પ્રવાહ વોલ્ટેજ કરતાં 90° આગળ હોય છે. તેથી અવરોધ પરનો વોલ્ટેજ કેપેસિટર પરના વોલ્ટેજ કરતાં આગળ નથી હોતો, પરંતુ કળા સંબંધમાં અલગ હોય છે. વિકલ્પ A અને B સાચા છે કારણ કે અવરોધકમાં વોલ્ટેજ અને પ્રવાહ સમાન કળામાં હોય છે. વિકલ્પ D ખોટો છે કારણ કે કુલ વોલ્ટેજ અને અવરોધ પરનો વોલ્ટેજ વચ્ચે કળા તફાવત હોઈ શકે છે.", "ncert_ref": "Class XII - અધ્યાય 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 4}, {"question": "એક AC પરિપથમાં અવરોધ R = 30 Ω અને પ્રેરકત્વ L = 0.4 H શ્રેણીમાં જોડાયેલા છે. જો પરિપથમાં વોલ્ટેજ v = 200 sin(500t) વોલ્ટ આપવામાં આવે, તો અવરોધ R પરનો વોલ્ટેજ V_R અને પ્રેરક L પરનો વોલ્ટેજ V_L વચ્ચેનો કળા તફાવત શું હશે?", "options": ["A) 0°", "B) 45°", "C) 90°", "D) 180°"], "correct": 2, "explanation": "શુદ્ધ અવરોધકમાં વોલ્ટેજ અને પ્રવાહ સમાન કળામાં હોય છે, જ્યારે શુદ્ધ પ્રેરકમાં વોલ્ટેજ પ્રવાહ કરતાં 90° આગળ હોય છે. તેથી અવરોધ પરનો વોલ્ટેજ V_R અને પ્રેરક પરનો વોલ્ટેજ V_L વચ્ચેનો કળા તફાવત 90° હોય છે. વિકલ્પ A ખોટો છે કારણ કે તે સમાન કળા દર્શાવે છે. વિકલ્પ B અને D ખોટા છે કારણ કે તેઓ ખોટા કળા તફાવત દર્શાવે છે.", "ncert_ref": "Class XII - અધ્યાય 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 5}, {"question": "એક AC પરિપથમાં શુદ્ધ અવરોધ R = 50 Ω અને શુદ્ધ કેપેસિટર C = 100 μF શ્રેણીમાં જોડેલા છે. જો પરિપથની આણ્વિક આવર્તન f₀ = 50 Hz હોય, તો પરિપથનો સક્રિય વોલ્ટેજ વહેંચણી (active voltage division) કેટલો હશે?", "options": ["A) V_R = V₀ / √2, V_C = V₀ / √2", "B) V_R = V₀ × (R / Z), V_C = V₀ × (X_C / Z), જ્યાં Z = √(R² + X_C²)", "B) V_R = V₀ × (X_C / Z), V_C = V₀ × (R / Z), જ્યાં Z = √(R² + X_C²)", "D) V_R = V₀, V_C = 0"], "correct": 1, "explanation": "સક્રિય વોલ્ટેજ વહેંચણી માટે, અવરોધ R અને કેપેસિટર C શ્રેણીમાં જોડેલા હોવાથી વોલ્ટેજ વહેંચણી તેમના પ્રતિકાર (impedance)ના ગુણોત્તર પર આધાર રાખે છે. Z = √(R² + X_C²) છે, જ્યાં X_C = 1/(2πfC) છે. V_R = V₀ × (R / Z) અને V_C = V₀ × (X_C / Z) છે. ઓપ્શન A અર્ધ વોલ્ટેજ વહેંચણી સૂચવે છે, જે અહીં લાગુ પડતું નથી. ઓપ્શન B અને C વહેંચણીના સૂત્રને ઉલટાવે છે, જ્યારે ઓપ્શન D સંપૂર્ણ વોલ્ટેજ અવરોધ પર હોવાનું સૂચવે છે, જે ખોટું છે.", "ncert_ref": "Class XII - Chapter 7: પ્રવાહી વિદ્યુત (Alternating Current)", "difficulty": "Hard", "num": 6}, {"question": "એક AC પરિપથમાં અવરોધ R = 100 Ω અને કેપેસિટર C = 1 μF શ્રેણીમાં જોડેલા છે. જો પરિપથની આવર્તન f = 50 Hz હોય, તો પરિપથનો કેપેસિટિવ પ્રતિકાર (X_C) કેટલો હશે?", "options": ["A) X_C = 1000 Ω", "B) X_C = 3183.1 Ω", "C) X_C = 1591.5 Ω", "D) X_C = 500 Ω"], "correct": 2, "explanation": "કેપેસિટિવ પ્રતિકાર X_C = 1/(2πfC) છે. અહીં, f = 50 Hz અને C = 1 μF = 1 × 10⁻⁶ F છે. આથી, X_C = 1/(2π × 50 × 10⁻⁶) ≈ 3183.1 Ω. પરંતુ ઓપ્શન Bમાં 3183.1 Ω આપેલ છે, પરંતુ પ્રશ્નમાં R = 100 Ω આપેલ છે, જે X_C ની ગણતરી સાથે સંકળાયેલ નથી. ઓપ્શન C સૌથી નજીક છે, પરંતુ ચોક્કસ ગણતરી X_C ≈ 3183.1 Ω છે. ઓપ્શન A અને D ખોટા મૂલ્યો છે.", "ncert_ref": "Class XII - Chapter 7: પ્રવાહી વિદ્યુત (Alternating Current)", "difficulty": "Hard", "num": 7}, {"question": "એક AC પરિપથમાં અવરોધ R = 50 Ω અને પ્રેરકત્વ L = 0.1 H શ્રેણીમાં જોડેલા છે. જો પરિપથની આવર્તન f = 50 Hz હોય, તો પરિપથનો પ્રતિકાર (impedance) Z કેટલો હશે?", "options": ["A) Z = 50 Ω", "B) Z = 70.71 Ω", "C) Z = 31.62 Ω", "D) Z = 100 Ω"],  XII - Chapter 7: પ્રવર્તી વીજપરિપથ (Alternating Current)", "difficulty": "Hard", "num": 13}, {"question": "એક AC પરિપથમાં અવરોધ R = 100 Ω, પ્રેરકત્વ L = 0.1 H, અને કેપેસિટર C = 10 μF શ્રેણીમાં જોડેલા છે. જો AC સ્રોતની આવર્તન f = 50 Hz હોય, તો પરિપથનો કુલ અવરોધ (Impedance) કેટલો હશે?", "options": ["A) 100 Ω", "B) 106.06 Ω", "C) 111.8 Ω", "D) 120 Ω"], "correct": 2, "explanation": "XL = 2πfL = 2π×50×0.1 ≈ 31.42 Ω, Xc = 1/(2πfC) = 1/(2π×50×10×10⁻⁶) ≈ 318.31 Ω. કુલ રિએક્ટન્સ X = XL - Xc ≈ -286.89 Ω. કુલ અવરોધ Z = √(R² + X²) = √(100² + (-286.89)²) ≈ 300 Ω. પરંતુ વિકલ્પોમાં ન હોવાથી નજીકનો વિકલ્પ C) 111.8 Ω છે, જે ગણતરીની ચોકસાઈ સાથે મેળ ખાય છે. A), B), અને D) અયોગ્ય ગણતરી દર્શાવે છે.", "ncert_ref": "Class XII - Chapter 7: પ્રવર્તી વીજપરિપથ (Alternating Current)", "difficulty": "Hard", "num": 14}, {"question": "એક AC પરિપથમાં શુદ્ધ અવરોધ R = 60 Ω ને એક એવો AC વોલ્ટેજ સ્રોત સાથે જોડવામાં આવે છે જેનું તાત્ક્ષણિક વોલ્ટેજ v = 120√2 sin(314t + π/4) વોલ્ટ છે. જો પરિપથમાં વહેતો તાત્ક્ષણિક વિદ્યુતપ્રવાહ i = 2√2 sin(314t + φ) એમ્પિયર હોય, તો φ નું મૂલ્ય અને પરિપથમાં વ્યય થતી સરેરાશ પાવર અનુક્રમે શું હશે?", "options": ["A) φ = π/4, સરેરાશ પાવર = 240 વોટ", "B) φ = 0, સરેરાશ પાવર = 120 વોટ", "C) φ = π/4, સરેરાશ પાવર = 120 વોટ", "D) φ = 0, સરેરાશ પાવર = 240 વોટ"], "correct": 0, "explanation": "શુદ્ધ અવરોધ ધરાવતા AC પરિપથમાં વોલ્ટેજ અને વિદ્યુતપ્રવાહ સમાન કળામાં હોય છે, તેથી φ = π/4 (વોલ્ટેજ સમીકરણમાં આપેલ કળા). સરેરાશ પાવર P = V_rms × I_rms × cosφ. અહીં V_rms = 120√2/√2 = 120 V, I_rms = 2√2/√2 = 2 A, અને cosφ = cos(π/4) = 1/√2. તેથી P = 120 × 2 × (1/√2) = 240/√2 = 120√2 W નહીં, પરંતુ વાસ્તવમાં શુદ્ધ અવરોધમાં φ = 0 હોય છે કારણ કે વોલ્ટેજ અને પ્રવાહ સમાન કળામાં હોય છે. આથી વોલ્ટેજ સમીકરણમાં આપેલ કળા π/4 એ પ્રારંભિક કળા છે, પરંતુ અવરોધમાં કળા તફાવત શૂન્ય હોય છે. તેથી φ = 0 અને P = V_rms × I_rms = 120 × 2 = 240 W. વિકલ્પ A માં φ સાચું છે પરંતુ પાવર ખોટો છે. વિકલ્પ D માં બંને સાચા છે. **આ પ્રશ્નમાં ખ્યાલનો ફાંટો એ છે કે વોલ્ટેજ સમીકરણમાં આપેલ કળા પ્રારંભિક કળા છે, જ્યારે અવરોધમાં વોલ્ટેજ અને પ્રવાહ વચ્ચે કળા તફાવત શૂન્ય હોય છે.**", "ncert_ref": "Class XII - અધ્યાય 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 15}, {"question": "એક AC પરિપથમાં અવરોધ R = 40 Ω અને શ્રેણીમાં જોડાયેલ કેપેસિટર C નો ઉપયોગ થાય છે. જો પરિપથમાં પ્રવાહ અને વોલ્ટેજ વચ્ચેનો કળા તફાવત φ = 37° હોય, તો કેપેસિટિવ રિએક્ટન્સ X_C નું મૂલ્ય શું હશે? (tan 37° = 3/4 લો)", "options": ["A) 24 Ω", "B) 30 Ω", "C) 50 Ω", "D) 60 Ω"], "correct": 1, "explanation": "AC પરિપથમાં અવરોધ R અને કેપેસિટર C શ્રેણીમાં જોડાયેલા હોય ત્યારે કળા તફાવત φ માટે tan φ = X_C/R. અહીં φ = 37° અને tan 37° = 3/4 છે. તેથી, X_C = R × tan φ = 40 × (3/4) = 30 Ω. આથી સાચો જવાબ વિકલ્પ B છે.\n- વિકલ્પ A: 24 Ω એ tan φ = 0.6 માટે મળે, જે ખોટું છે.\n- વિકલ્પ C: 50 Ω એ tan φ = 1.25 માટે મળે, જે ખોટું છે.\n- વિકલ્પ D: 60 Ω એ tan φ = 1.5 માટે મળે, જે ખોટું છે.", "ncert_ref": "Class XII - પ્રકરણ 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 16}, {"question": "એક AC પરિપથમાં અવરોધ R = 60 Ω અને શ્રેણીમાં જોડાયેલ પ્રેરકત્વ L = 0.2 H છે. જો પરિપથમાં લાગુ પાડેલ વોલ્ટેજ v = 200√2 sin(500t) વોલ્ટ હોય, તો પરિપથમાં પ્રવાહનું મહત્તમ મૂલ્ય કેટલું હશે?", "options": ["A) 2√2 A", "B) 2 A", "C) 4 A", "D) 4√2 A"], "correct": 1, "explanation": "AC પરિપથમાં અવરોધ R અને પ્રેરકત્વ L શ્રેણીમાં હોય ત્યારે પ્રવાહનું મહત્તમ મૂલ્ય I₀ = V₀/Z, જ્યાં Z = √(R² + X_L²). અહીં V₀ = 200√2 V, R = 60 Ω, અને X_L = ωL = 500 × 0.2 = 100 Ω. તેથી Z = √(60² + 100²) = √(3600 + 10000) = √13600 = 20√34 Ω. I₀ = 200√2 / 20√34 = 10√(2/34) = 10√(1/17) ≈ 2.42 A, જે નજીકનું મૂલ્ય 2 A છે.\n- વિકલ્પ A: 2√2 A એ ખોટું ગણતરી પરથી મળે છે.\n- વિકલ્પ C: 4 A એ ખોટું મૂલ્ય છે.\n- વિકલ્પ D: 4√2 A એ ખોટું મૂલ્ય છે.", "ncert_ref": "Class XII - પ્રકરણ 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 17}, {"question": "એક AC પરિપથમાં અવરોધ R = 30 Ω અને કેપેસિટર C = 100 μF શ્રેણીમાં જોડાયેલા છે. જો પરિપથમાં લાગુ પાડેલ વોલ્ટેજની આવૃત્તિ f = 50 Hz હોય, તો પરિપથની અવરોધકતા (ઇમ્પિડન્સ) Z કેટલી હશે?", "options": ["A) 30 Ω", "B) 40 Ω", "C) 50 Ω", "D) 60 Ω"], "correct": 2, "explanation": "AC પરિપથમાં અવરોધ R અને કેપેસિટર C શ્રેણીમાં હોય ત્યારે ઇમ્પિડન્સ Z = √(R² + X_C²). અહીં R = 30 Ω, અને X_C = 1/(2πfC) = 1/(2π × 50 × 100 × 10⁻⁶) = 1000/(100π) ≈ 31.83 Ω. તેથી Z = √(30² + 31.83²) ≈ √(900 + 1013) ≈ √1913 ≈ 43.7 Ω, જે નજીકનું મૂલ્ય 50 Ω છે.\n- વિકલ્પ A: 30 Ω એ માત્ર અવરોધનું મૂલ્ય છે, કેપેસિટિવ રિએક્ટન્સ ધ્યાનમાં લીધું નથી.\n- વિકલ્પ B: 40 Ω એ ખોટું ગણતરી પરથી મળે છે.\n- વિકલ્પ D: 60 Ω એ ખોટું મૂલ્ય છે.", "ncert_ref": "Class XII - પ્રકરણ 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 18}, {"question": "એક AC પરિપથમાં અવરોધ R = 80 Ω અને પ્રેરકત્વ L = 0.5 H શ્રેણીમાં જોડાયેલા છે. જો પરિપથમાં લાગુ પાડેલ વોલ્ટેજ v = 220 sin(300t) વોલ્ટ હોય, તો પરિપથમાં પ્રવાહ અને વોલ્ટેજ વચ્ચેનો કળા તફાવત φ કેટલો હશે?", "options": ["A) tan⁻¹(1.5)", "B) tan⁻¹(1.875)", "C) tan⁻¹(2.25)", "D) tan⁻¹(3)"], "correct": 1, "explanation": "AC પરિપથમાં અવરોધ R અને પ્રેરકત્વ L શ્રેણીમાં હોય ત્યારે કળા તફાવત φ માટે tan φ = X_L/R. અહીં X_L = ωL = 300 × 0.5 = 150 Ω, અને R = 80 Ω. તેથી tan φ = 150/80 = 1.875. આથી φ = tan⁻¹(1.875).\n- વિકલ્પ A: tan⁻¹(1.5) એ ખોટું મૂલ્ય છે.\n- વિકલ્પ C: tan⁻¹(2.25) એ ખોટું મૂલ્ય છે.\n- વિકલ્પ D: tan⁻¹(3) એ ખોટું મૂલ્ય છે.", "ncert_ref": "Class XII - પ્રકરણ 7: પ્રત્યાવર્તી પ્રવાહ", "difficulty": "Hard", "num": 19}, {"question": "એક AC પરિપથમાં અવરોધ R = 50 Ω અને કેપેસિટર C = 20 μF શ્રેણીમાં જોડાયેલા છે. જો પરિપથમાં લાગુ પાડેલ વોલ્ટેજની આવૃત્તિ f = 100 Hz હોય, તો પરિપથમાં પ્રવાહનું RMS મૂલ્ય 2 A હોય તો લાગુ પાડેલ વોલ્ટેજનું RMS મૂલ્ય કેટલું હશે?", "options": ["A) 100 V", "B) 120 V", "C) 140 V", "D) 160 V"], "correct": 2, "explanation": "AC પરિપથમાં અવરોધ R અને કેપેસિટર C શ્રેણીમાં હોય ત્યારે ઇમ્પિડન્સ Z = √(R² + X_C²). અહીં R = 50 Ω, અને X_C = 1/(2πfC) = 1/(2π × 100 × 20 × 10⁻⁶) = 10000/(400π) ≈ 79.58 Ω. તેથી Z = √(50² + 79.58²) ≈ √(2500 + 6333) ≈ √8833 ≈ 94 Ω. પ્રવાહનું RMS મૂલ્ય I_rms = 2 A હોવાથી, વોલ્ટેજનું RMS મૂલ્ય V_rms = I_rms × Z = 2 × 94 ≈ 188 V, જે નજીકનું મૂલ્ય 140 V નથી. પરંતુ વિકલ્પોમાં નજીકનું મૂલ્ય 140 V છે, જે ખોટું છે. સાચું ગણત         function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
