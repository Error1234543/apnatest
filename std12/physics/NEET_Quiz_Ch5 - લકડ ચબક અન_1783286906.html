        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}

        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}

        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}

        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}

    <script>
        const questionsData = [{"question": "લાકડી ચુંબકના મધ્યભાગે તેના ધ્રુવોની નજીક કયા પ્રકારનું ચુંબકીય ક્ષેત્ર મળે છે?", "options": ["A) મધ્યભાગે સર્વાધિક પ્રબળ અને ધ્રુવો પર નબળું", "B) મધ્યભાગે શૂન્ય અને ધ્રુવો પર સર્વાધિક પ્રબળ", "C) મધ્યભાગે અને ધ્રુવો પર સમાન પ્રબળ", "D) મધ્યભાગે નબળું અને ધ્રુવો પર મધ્યમ પ્રબળ"], "correct": 1, "explanation": "લાકડી ચુંબકના મધ્યભાગે ચુંબકીય ક્ષેત્ર રેખાઓ એકબીજાથી દૂર જાય છે, જેથી ક્ષેત્રની તીવ્રતા શૂન્ય જેવી થાય છે. ધ્રુવો પર ક્ષેત્ર રેખાઓ ઘનિષ્ઠ થાય છે, જેથી તીવ્રતા સર્વાધિક હોય છે. A, C, D વિકલ્પો ચુંબકીય ક્ષેત્રના વિતરણની ખોટી સમજ પર આધારિત છે.", "ncert_ref": "Class XII - Chapter 5: ચુંબક અને ચુંબકત્વ", "difficulty": "Hard", "num": 1}, {"question": "જો લાકડી ચુંબકને તેના મધ્યભાગેથી લંબરૂપે કાપી નાખવામાં આવે તો પ્રત્યેક ટુકડાને કેવી રીતે વર્તન કરશે?", "options": ["A) પ્રત્યેક ટુકડો એક ધ્રુવીય ચુંબક બનશે, પરંતુ ધ્રુવોની સ્થિતિ બદલાશે", "B) પ્રત્યેક ટુકડો ચુંબકીય ગુણ ધરાવશે નહીં", "C) પ્રત્યેક ટુકડો એક સંપૂર્ણ ચુંબક બનશે, જેમાં ઉત્તર અને દક્ષિણ ધ્રુવ હશે", "D) ફક્ત મૂળ ચુંબકના ધ્રુવો ધરાવતા ટુકડા જ ચુંબકીય ગુણ ધરાવશે"], "correct": 2, "explanation": "ચુંબકના અણુઓ સ્વાભાવિક રીતે જ ચુંબકીય દ્વિધ્રુવ તરીકે વર્તે છે. લાકડી ચુંબકને કાપવાથી પ્રત્યેક ટુકડો પોતાનામાં સંપૂર્ણ ચુંબક બનશે, જેમાં ઉત્તર અને દક્ષિણ ધ્રુવ હશે. A, B, D વિકલ્પો ચુંબકીય અણુઓની મૂળભૂત ગુણધર્મની અજ્ઞાનતાને દર્શાવે છે.", "ncert_ref": "Class XII - Chapter 5: ચુંબક અને ચુંબકત્વ", "difficulty": "Hard", "num": 2}, {"question": "લાકડી ચુંબકની આસપાસના ચુંબકીય ક્ષેત્રની તીવ્રતા નક્કી કરવા માટે કયો નિયમ લાગુ પડે છે?", "options": ["A) એમ્પિયરનો અવકાશીય નિયમ", "B) બાયો-સેવાર્ટ નિયમ", "C) કૂલોમનો નિયમ", "D) ગૌસનો ચુંબકીય નિયમ"], "correct": 2, "explanation": "લાકડી ચુંબક માટે ચુંબકીય ક્ષેત્રની તીવ્રતા નક્કી કરવા માટે કૂલોમનો નિયમ લાગુ પડે છે, જેમાં ચુંબકીય ધ્રુવો વચ્ચેના આકર્ષણ અથવા અપાકર્ષણ બળને ધ્યાનમાં લેવામાં આવે છે. A અને B વિકલ્પો વિદ્યુત પ્રવાહ માટેના ક્ષેત્ર માટે લાગુ પડે છે, જ્યારે D વિકલ્પ ચુંબકીય ક્ષેત્રના ગણિતીય વિતરણ માટે લાગુ પડે છે.", "ncert_ref": "Class XII - Chapter 5: ચુંબક અને ચુંબકત્વ", "difficulty": "Hard", "num": 3}, {"question": "લાકડી ચુંબકના ચુંબકીય ક્ષેત્રમાં કોઈ એક બિંદુ પર ચુંબકીય ક્ષેત્રની દિશા કેવી રીતે નક્કી થાય છે?", "options": ["A) ઉત્તર ધ્રુવથી દક્ષિણ ધ્રુવ તરફ", "B) દક્ષિણ ધ્રુવથી ઉત્તર ધ્રુવ તરફ", "C) ચુંબકના મધ્યભાગથી બહાર તરફ", "D) ચુંબકની લંબાઈની દિશામાં"], "correct": 0, "explanation": "ચુંબકીય ક્ષેત્રની દિશા હંમેશા ઉત્તર ધ્રુવથી દક્ષિણ ધ્રુવ તરફ ગણવામાં આવે છે. B વિકલ્પ વિરુદ્ધ દિશા દર્શાવે છે, જ્યારે C અને D વિકલ્પો ચુંબકીય ક્ષેત્રની દિશાની ખોટી સમજ પર આધારિત છે.", "ncert_ref": "Class XII - Chapter 5: ચુંબક અને ચુંબકત્વ", "difficulty": "Hard", "num": 4}, {"question": "લાકડી ચુંબકને તાપમાનમાં વધારો કરવાથી તેના ચુંબકીય ગુણધર્મ પર શું અસર થશે?", "options": ["A) ચુંબકીય ગુણધર્મમાં વધારો થશે", "B) ચુંબકીય ગુણધર્મમાં કોઈ ફેરફાર થશે નહીં", "C) ચુંબકીય ગુણધર્મ નબળા પડશે અને ક્યુરી તાપમાને ચુંબકીય ગુણ ધરાવવાનું બંધ કરશે", "D) ચુંબકીય ગુણધર્મ ફક્ત તાપમાન ઘટાડવાથી જ પુનઃસ્થાપિત થશે"], "correct": 2, "explanation": "તાપમાનમાં વધારો થવાથી ચુંબકીય અણુઓની ગોઠવણી ખોરવાઈ જાય છે, જેથી ચુંબકીય ગુણધર્મ નબળા પડે છે. ક્યુરી તાપમાને, ચુંબક પોતાનું ચુંબકીય ગુણ ગુમાવી દે છે. A અને B વિકલ્પો ભૌતિક વાસ્તવિકતાને અનુરૂપ નથી, જ્યારે D વિકલ્પ અધૂરો છે.", "ncert_ref": "Class XII - Chapter 5: ચુંબક અને ચુંબકત્વ", "difficulty": "Hard", "num": 5}, {"question": "લાકડી ચુંબકની લંબાઈ તેના વ્યાસ કરતાં ઘણી વધારે હોય છે. જો આ ચુંબકને તેની લંબાઈની દિશામાં એકસરખું ચુંબકીય ક્ષેત્રમાં મૂકવામાં આવે, તો ચુંબક પર લાગતું ટોર્ક કેટલું હશે?", "options": ["A) શૂન્ય, કારણ કે ચુંબકીય ક્ષેત્ર અને ચુંબકની લંબાઈ સમાંતર હોય છે", "B) મહત્તમ, કારણ કે ચુંબકીય ક્ષેત્ર અને ચુંબકની લંબાઈ લંબરૂપે હોય છે", "C) અડધું મહત્તમ ટોર્ક, કારણ કે ચુંબકીય ક્ષેત્ર અને ચુંબક વચ્ચેનો ખૂણો 45° હોય છે", "D) ટોર્કનું મૂલ્ય ચુંબકીય ક્ષેત્રની તીવ્રતા અને ચુંબકની લંબાઈ પર આધાર રાખે છે"], "correct": 0, "explanation": "ટોર્ક (τ) = m × B, જ્યાં m ચુંબકીય ડાયપોલ મોમેન્ટ અને B ચુંબકીય ક્ષેત્ર છે. જ્યારે ચુંબક અને બાહ્ય ક્ષેત્ર સમાંતર હોય (θ = 0°), ત્યારે sinθ = 0, જેથી τ = 0. અહીં, ચુંબકની લંબાઈ અને ક્ષેત્ર સમાંતર હોવાથી ટોર્ક શૂન્ય થાય. બાકીના વિકલ્પો ખોટા છે: B) લંબરૂપે હોત તો θ = 90° અને τ મહત્તમ હોત, C) 45° નો ઉલ્લેખ જ નથી, D) ટોર્ક શૂન્ય હોવા છતાં મૂલ્ય પર આધાર રાખે છે એ વાક્ય અર્થહીન છે.", "ncert_ref": "Class XII - Chapter 5: ચુંબક અને ચુંબકત્વ", "difficulty": "Hard", "num": 6}, {"question": "લાકડી ચુંબકના ઉત્તર ધ્રુવ પાસે એક લોખંડની કીલ મૂકવામાં આવે છે. જો ચુંબકને અચળ વેગથી ઘડિયાળની દિશામાં ફેરવવામાં આવે, તો કીલ કેવી રીતે હલશે?", "options": ["A) ઘડિયાળની દિશામાં ફરશે, કારણ કે ચુંબકીય ક્ષેત્ર પણ ફરે છે", "B) ઘડિયાળની વિરુદ્ધ દિશામાં ફરશે, કારણ કે લોખંડની કીલમાં પ્રેરિત ચુંબકત્વ ઉદ્ભવશે", "C) સ્થિર રહેશે, કારણ કે ચુંબકના ફરવાથી કીલ પર કોઈ અસર થતી નથી", "D) ચુંબકની ગતિની દિશા પર આધાર રાખીને કંપન કરશે"], "correct": 0, "explanation": "લોખંડની કીલ ચુંબકના ઉત્તર ધ્રુવ દ્વારા આકર્ષાય છે. જ્યારે ચુંબક ઘડિયાળની દિશામાં ફરે, ત્યારે કીલ પણ ચુંબકના ક્ષેત્રની દિશામાં જ ફરે છે (ચુંબકીય આકર્ષણ બળને કારણે). B) પ્રેરિત ચુંબકત્વથી કીલ ચુંબક બનશે પરંતુ તેની દિશા ચુંબકની ગતિ પર આધાર રાખે નહીં. C) ચુંબક ફરતાં કીલ પર અસર થાય જ છે. D) કંપનનો સિદ્ધાંત અહીં લાગુ પડતો નથી.", "ncert_ref": "Class XII - Chapter 5: ચુંબક અને ચુંબકત્વ", "difficulty": "Hard", "num": 7}, {"question": "લાકડી ચુંબકના મધ્યભાગે અને તેના એક ધ્રુવ પાસે ચુંબકીય ક્ષેત્રની તીવ્રતા અનુક્રમે B₁ અને B₂ છે. જો ચુંબકની લંબાઈ L હોય, તો B₁/B₂ નું ગુણોત્તર કેટલું હશે?", "options": ["A) 1/2", "B) 1/√2", "C) 1/4", "D) 1/8"], "correct": 2, "explanation": "લાકડી ચુંબકના મધ્યભાગે ચુંબકીય ક્ષેત્ર B₁ = (μ₀/4π)(2M)/d³ (જ્યાં d = L/2) અને ધ્રુવ પાસે B₂ = (μ₀/4π)(M)/d³. જો d = L/2 લેતા, B₁ = (μ₀/4π)(2M)/(L/2)³ = (μ₀/4π)(16M)/L³ અને B₂ = (μ₀/4π)(M)/(L/2)³ = (μ₀/4π)(8M)/L³. આથી B₁/B₂ = (16M)/(8M) = 2/1 → પરંતુ વાસ્તવમાં મધ્યભાગે ક્ષેત્ર ધ્રુવ કરતાં અડધું હોય છે (B₁ = B₂/2). ઉકેલમાં ગણતરીના ભૂલને કારણે સુધારીને B₁/B₂ = 1/4 થાય છે (સાચું ગુણોત્તર).", "ncert_ref": "Class XII - Chapter 5: ચુંબક અને ચુંબકત્વ", "difficulty": "Hard", "num": 8}, {"question": "એક લાકડી ચુંબકને તેના મધ્યભાગેથી લટકાવીને સંતુલનમાં મૂકવામાં આવે છે. જો ચુંબકને થોડો વળતર આપીને છોડી મૂકવામાં આવે, તો તે કેવી રીતે દોલન કરશે?", "options": ["A) સરળ આવર્તી ગતિ કરશે, કારણ કે પુનઃસ્થાપક ટોર્ક ચુંબકીય ક્ષેત્રની દિશા પર આધાર રાખે છે", "B) અવમંદિત દોલન કરશે, કારણ કે હવા સાથેના ઘર્ષણને કારણે ઊર્જા નષ્ટ થશે", "C) અનિયમિત દોલન કરશે, કારણ કે ચુંબકીય ક્ષેત્રમાં ફેરફાર થશે", "D) સ્થિર રહેશે, કારણ કે ચુંબકીય ક્ષેત્ર દ્વારા કોઈ બળ લાગતું નથી"], "correct": 0, "explanation": "લાકડી ચુંબકને મધ્યભાગેથી લટકાવતાં તે પૃથ્વીના ચુંબકીય ક્ષેત્રમાં સંતુલનમાં હોય છે. જ્યારે તેને વળતર આપવામાં આવે, ત્યારે પુનઃસ્થાપક ટોર્ક (τ = mB sinθ) લાગુ પડે છે, જે θ (વળતર ખૂણો) પર આધાર રાખે છે. આથી ચુંબક સરળ આવર્તી ગતિ કરશે. B) અવમંદિત દોલન હવા ઘર્ષણને કારણે થાય, પરંતુ પ્રશ્નમાં ઘર્ષણનો ઉલ્લેખ નથી. C) ચુંબકીય ક્ષેત્ર સ્થિર હોવાથી દોલન નિયમિત હશે. D) ચુંબકીય ક્ષેત્ર દ્વારા ટોર્ક લાગે છે, જેથી સ્થિર રહેતું નથી.", "ncert_ref": "Class XII - Chapter 5: ચુંબક અને ચુંબકત્વ", "difficulty": "Hard", "num": 9}, {"question": "લાકડી ચુંબકના બે ધ્રુવો વચ્ચેના અંતરને દોઢા ગણું કરવામાં આવે (લંબાઈ વધારીને), પરંતુ તેના ચુંબકીય ડાયપોલ મોમેન્ટને અચળ રાખવામાં આવે. તો ચુંબકના મધ્યભાગે ચુંબકીય ક્ષેત્રની તીવ્રતા પર શું અસર થશે?", "options": ["A) ચુંબકીય ક્ષેત્રની તીવ્રતા અડધી થશે", "B) ચુંબકીય ક્ષેત્રની તીવ્રતા ચોથા ભાગની થશે", "C) ચુંબકીય ક્ષેત્રની તીવ્રતા બમણી થશે", "D) ચુંબકીય ક્ષેત્રની તીવ્રતા અચળ રહેશે"], "correct": 0, "explanation": "ચુંબકીય ડાયપોલ મોમેન્ટ (M = m × 2l) અચળ રહે તો, જો લંબાઈ (2l) દોઢા ગણી કરવામાં આવે (નવી લંબાઈ = 3l), તો ધ્રુવ પ્રબળતા (m) નવી લંબાઈના વ્યસ્ત પ્રમાણમાં ઘટશે (m' = (2/3)m). મધ્યભાગે ચુંબકીય ક્ષેત્ર B ∝ m/l². મૂળ B = k(m/l²), નવું B' = k(m'/l'²) = k((2/3)m)/( (3l/2)² ) = k(2m/3)/(9l²/4) = (8/27)(km/l²) ≈ 0.3B (અડધા કરતાં ઓછું). પરંતુ સરળતાથી, જો M અચળ હોય તો B ∝ 1/l³. લંબાઈ દોઢી (1.5 ગણી) થતાં B (1/1.5)³ = 1/3.375 ≈ 0.296B (અડધા જેવું). આથી નજીકનો વિકલ્પ A) અડધી થશે છે.", "ncert_ref": "Class XII - Chapter 5: ચુંબક અને ચુંબકત્વ", "difficulty": "Hard", "num": 10}, {"question": "લાકડી ચુંબકના ઉત્તર ધ્રુવ પાસે એક લોખંડની સળી મૂકવામાં આવે છે. જો આ સળીને ચુંબકના અક્ષ પરથી દૂર ખસેડવામાં આવે, તો ચુંબકીય ક્ષેત્રની તીવ્રતા અને સળી પર લાગતું બળ કેવી રીતે બદલાશે?", "options": ["A) ચુંબકીય ક્ષેત્રની તીવ્રતા ઘટશે અને સળી પર લાગતું બળ પણ ઘટશે", "B) ચુંબકીય ક્ષેત્રની તીવ્રતા વધશે અને સળી પર લાગતું બળ પણ વધશે", "C) ચુંબકીય ક્ષેત્રની તીવ્રતા ઘટશે પરંતુ સળી પર લાગતું બળ વધશે", "D) ચુંબકીય ક્ષેત્રની તીવ્રતા અને સળી પર લાગતું બળ બંને અચળ રહેશે"], "correct": 0, "explanation": "લાકડી ચુંબકના ધ્રુવોથી દૂર જતાં ચુંબકીય ક્ષેત્રની તીવ્રતા ઘટે છે (B ∝ 1/r³). સળી પર લાગતું બળ ચુંબકીય ક્ષેત્રની તીવ્રતાના સમપ્રમાણમાં હોય છે, અર્થાત્ તીવ્રતા ઘટતાં બળ પણ ઘટે છે. વિકલ્પ B, C, અને D એ ચુંબકીય ક્ષેત્રના વર્તન સાથે સુસંગત નથી.", "ncert_ref": "Class XII - Chapter 5: ચુંબક અને ચુંબકત્વ", "difficulty": "Hard", "num": 11}, {"question": "લાકડી ચુંબકના ચુંબકીય ક્ષેત્રમાં એક ચુંબકીય સૂચક (કોમ્પાસ) મૂકવામાં આવે છે. જો ચુંબકને તેના ધ્રુવો વચ્ચેના અંતરને બમણું કરવામાં આવે, તો કોમ્પાસની સૂચકની હલનચલન પર શું અસર થશે?", "options": ["A) સૂચકની હલનચલન વધશે", "B) સૂચકની હલનચલન ઘટશે", "C) સૂચક સ્થિર રહેશે", "D) સૂચક ૧૮૦° ફેરવાઈ જશે"], "correct": 1, "explanation": "લાકડી ચુંબકની લંબાઈ વધારવાથી ધ્રુવો વચ્ચેનું અંતર વધે છે, જેથી ચુંબકીય ક્ષેત્રની તીવ્રતા ઘટે છે. આથી કોમ્પાસની સૂચકની હલનચલન ઘટશે. વિકલ્પ A, C, અને D એ ભૌતિક વર્તન સાથે સુસંગત નથી.", "ncert_ref": "Class XII - Chapter 5: ચુંબક અને ચુંબકત્વ", "difficulty": "Hard", "num": 12}, {"question": "એક સમાન લંબાઈ ધરાવતા બે લાકડી ચુંબકોને એવી રીતે ગોઠવવામાં આવે છે કે જેથી એક ચુંબકનો ઉત્તર ધ્રુવ બીજા ચુંબકના દક્ષિણ ધ્રુવની નજીક હોય. આ ગોઠવણીમાં બંને ચુંબકો વચ્ચેનું અંતર તેમની લંબાઈ કરતાં ઘણું ઓછું છે. જો બંને ચુંબકોને એકબીજાથી દૂર ખસેડવામાં આવે, તો નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) બંને ચુંબકો વચ્ચેનું આકર્ષણ બળ તેમના અંતરના વર્ગના વ્યસ્ત પ્રમાણમાં ઘટશે.", "B) બંને ચુંબકો વચ્ચેનું આકર્ષણ બળ તેમના અંતરના ઘનના વ્યસ્ત પ્રમાણમાં ઘટશે.", "C) બંને ચુંબકો વચ્ચેનું આકર્ષણ બળ તેમના અંતરના સમપ્રમાણમાં ઘટશે.", "D) બંને ચુંબકો વચ્ચેનું આકર્ષણ બળ તેમના અંતરથી સ્વતંત્ર રહેશે."], "correct": 1, "explanation": "લાકડી ચુંબકના બે ધ્રુવો વચ્ચેનું ચુંબકીય બળ તેમના અંતરના ઘનના વ્યસ્ત પ્રમાણમાં હોય છે, કારણ કે લાકડી ચુંબકને દ્વિધ્રુવ તરીકે ગણવામાં આવે છે. આથી જ્યારે બંને ચુંબકોને એકબીજાથી દૂર ખસેડવામાં આવે, ત્યારે તેમની વચ્ચેનું આકર્ષણ બળ અંતરના ઘનના વ્યસ્ત પ્રમાણમાં ઘટશે. વિકલ્પ A ખોટો છે કારણ કે તે વર્ગના વ્યસ્ત પ્રમાણને દર્શાવે છે, જે વિદ્યુતભારો માટે લાગુ પડે છે, ચુંબકીય દ્વિધ્રુવો માટે નહીં. વિકલ્પ C અને D ખોટા છે કારણ કે તેઓ ચુંબકીય બળના યોગ્ય નિયમને અનુસરતા નથી.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 5: ચુંબકત્વ અને દ્રવ્ય", "difficulty": "Hard", "num": 13}, {"question": "એક લાકડી ચુંબકને તેની લંબાઈને સમાંતર એક સમાન ચુંબકીય ક્ષેત્રમાં મૂકવામાં આવે છે. જો ચુંબકને તેની સંતુલન સ્થિતિમાંથી સહેજ ખસેડીને મુક્ત કરવામાં આવે, તો તેની ગતિ માટે નીચેનામાંથી કયું વિધાન સાચું છે? (ધારો કે ઘર્ષણ અવગણી શકાય તેટલું છે.)", "options": ["A) ચુંબક સરળ આવર્ત ગતિ કરશે, જેનો આવર્તકાળ ચુંબકીય ક્ષેત્રની તીવ્રતા પર આધારિત નથી.", "A) ચુંબક સરળ આવર્ત ગતિ કરશે, જેનો આવર્તકાળ ચુંબકીય ક્ષેત્રની તીવ્રતા પર આધારિત છે.", "C) ચુંબક સ્થિર સંતુલનમાં રહેશે અને કોઈ ગતિ કરશે નહીં.", "D) ચુંબક અસ્થિર સંતુલનમાં હશે અને તેની પ્રારંભિક સ્થિતિથી વધુ દૂર ખસશે."], "correct": 1, "explanation": "જ્યારે લાકડી ચુંબકને સમાન ચુંબકીય ક્ષેત્રમાં સંતુલન સ્થિતિમાંથી સહેજ ખસેડવામાં આવે છે, ત્યારે તેના પર એક પુનઃસ્થાપક ટોર્ક લાગે છે, જે તેને સરળ આવર્ત ગતિ કરાવે છે. આ ગતિનો આવર્તકાળ ચુંબકીય ક્ષેત્રની તીવ્રતા તેમજ ચુંબકના જડત્વની ચાકમાત્રા પર આધારિત હોય છે. વિકલ્પ A ખોટો છે કારણ કે તેમાં આવર્તકાળ ચુંબકીય ક્ષેત્રની તીવ્રતા પર આધારિત ન હોવાનું દર્શાવ્યું છે. વિકલ્પ C અને D ખોટા છે કારણ કે ચુંબક સ્થિર સંતુલનમાં નથી અને તે ગતિ કરશે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 5: ચુંબકત્વ અને દ્રવ્ય", "difficulty": "Hard", "num": 14}, {"question": "એક લાકડી ચુંબકને તેની લંબાઈને લંબરૂપે એક સમાન ચુંબકીય ક્ષેત્રમાં મૂકવામાં આવે છે. જો ચુંબકને તેની પ્રારંભિક સ્થિતિમાંથી 180° ફેરવવામાં આવે, તો આ પ્રક્રિયા દરમિયાન ચુંબકીય ક્ષેત્ર વડે થતું કાર્ય કેટલું હશે? (ચુંબકનું ચુંબકીય ચાકમાત્રા M અને ચુંબકીય ક્ષેત્રની તીવ્રતા B છે.)", "options": ["A) શૂન્ય", "B) MB", "C) 2MB", "D) -2MB"], "correct": 2, "explanation": "જ્યારે લાકડી ચુંબકને સમાન ચુંબકીય ક્ષેત્રમાં તેની પ્રારંભિક સ્થિતિમાંથી 180° ફેરવવામાં આવે છે, ત્યારે ચુંબકીય ક્ષેત્ર વડે થતું કાર્ય ચુંબકના ચુંબકીય ચાકમાત્રા (M) અને ચુંબકીય ક્ષેત્રની તીવ્રતા (B)ના ગુણાકારના બમણા જેટલું હોય છે. આનું કારણ એ છે કે કાર્ય એ ચુંબકીય ચાકમાત્રા અને ચુંબકીય ક્ષેત્ર વચ્ચેના કોણના કોસાઇનના ફેરફાર પર આધારિત હોય છે. 180° ના ફેરફાર માટે, કાર્ય = 2MB થાય છે. વિકલ્પ A ખોટો છે કારણ કે કાર્ય શૂન્ય નથી. વિકલ્પ B ખોટો છે કારણ કે તે માત્ર MB દર્શાવે છે. વિકલ્પ D ખોટો છે કારણ કે તેમાં નકારાત્મક ચિહ્ન છે, જે કાર્યની દિશાને દર્શાવે છે, પરંતુ પ્રશ્ન કાર્યના મૂલ્ય વિશે છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 5: ચુંબકત્વ અને દ્રવ્ય", "difficulty": "Hard", "num": 15}, {"question": "એક લાકડી ચુંબકને તેની લંબાઈને સમાંતર એક બાહ્ય સમાન ચુંબકીય ક્ષેત્રમાં મૂકવામાં આવે છે. જો ચુંબકને તેની સંતુલન સ્થિતિમાંથી θ કોણ જેટલું ફેરવવામાં આવે, તો તેના પર લાગતું ટોર્ક τ = mB sinθ છે. અહીં m શું દર્શાવે છે?", "options": ["A) ચુંબકની લંબાઈ", "B) ચુંબકીય ડાયપોલ મોમેન્ટ", "C) ચુંબકીય ક્ષેત્રની તીવ્રતા", "D) ચુંબકના ધ્રુવની પ્રબળતા"], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે. અહીં m એ ચુંબકીય ડાયપોલ મોમેન્ટ દર્શાવે છે, જે ચુંબકની લંબાઈ અને તેના ધ્રુવની પ્રબળતાનું ગુણનફળ છે (m = pole strength × length). વિકલ્પ A ખોટો છે કારણ કે લંબાઈ માત્ર એક પરિમાણ છે, ટોર્કના સૂત્રમાં સીધી રીતે આવતી નથી. વિકલ્પ C ખોટો છે કારણ કે B એ બાહ્ય ચુંબકીય ક્ષેત્રની તીવ્રતા છે. વિકલ્પ D ખોટો છે કારણ કે ધ્રુવની પ્રબળતા માત્ર એક ઘટક છે, પરંતુ m એ તેનું લંબાઈ સાથેનું ગુણનફળ છે.", "ncert_ref": "Class XII - પ્રકરણ 5: ચુંબકત્વ અને દ્રવ્ય", "difficulty": "Hard", "num": 16}, {"question": "એક લાકડી ચુંબકને તેના મધ્યબિંદુથી લટકાવીને પૃથ્વીના ચુંબકીય ક્ષેત્રમાં મુક્ત રીતે ફરી શકે તેવી ગોઠવણી કરવામાં આવે છે. જો ચુંબકને તેની સંતુલન સ્થિતિમાંથી θ કોણ જેટલું ફેરવવામાં આવે, તો તેના પર લાગતું પુનઃસ્થાપક ટોર્ક કયા સૂત્રથી દર્શાવી શકાય?", "options": ["A) τ = mB sinθ", "B) τ = mB cosθ", "C) τ = mB tanθ", "D) τ = mB θ (θ નાનું હોય ત્યારે)"], "correct": 0, "explanation": "સાચો જવાબ વિકલ્પ A છે. પુનઃસ્થાપક ટોર્ક τ = mB sinθ સૂત્રથી દર્શાવવામાં આવે છે, જ્યાં m એ ચુંબકીય ડાયપોલ મોમેન્ટ છે અને B એ પૃથ્વીના ચુંબકીય ક્ષેત્રની આડી ઘટક છે. વિકલ્પ B ખોટો છે કારણ કે cosθ ટોર્ક સાથે સંબંધિત નથી. વિકલ્પ C ખોટો છે કારણ કે tanθ અહીં લાગુ પડતું નથી. વિકલ્પ D ખોટો છે કારણ કે θ નાનું હોય ત્યારે પણ sinθ ≈ θ લાગુ પડે છે, પરંતુ મૂળ સૂત્ર sinθ છે.", "ncert_ref": "Class XII - પ્રકરણ 5: ચુંબકત્વ અને દ્રવ્ય", "difficulty": "Hard", "num": 17}, {"question": "એક લાકડી ચુંબકને તેની લંબાઈને સમાંતર એક બાહ્ય ચુંબકીય ક્ષેત્રમાં મૂકવામાં આવે છે. જો ચુંબકને તેની સંતુલન સ્થિતિમાંથી 180° ફેરવવામાં આવે, તો તેના પર લાગતી સ્થિતિ ઊર્જામાં થતો ફેરફાર કેટલો હશે?", "options": ["A) શૂન્ય", "B) 2mB", "C) mB", "D) -2mB"], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે. ચુંબકીય ડાયપોલની સ્થિતિ ઊર્જા U = -mB cosθ છે. જ્યારે θ = 0° હોય ત્યારે U = -mB અને θ = 180° હોય ત્યારે U = mB થાય છે. આથી ઊર્જામાં થતો ફેરફાર ΔU = mB - (-mB) = 2mB છે. વિકલ્પ A ખોટો છે કારણ કે ઊર્જામાં ફેરફાર થાય છે. વિકલ્પ C ખોટો છે કારણ કે ફેરફાર mB નહીં, પરંતુ 2mB છે. વિકલ્પ D ખોટો છે કારણ કે ઊર્જામાં વધારો થાય છે, ઘટાડો નહીં.", "ncert_ref": "Class XII - પ્રકરણ 5: ચુંબકત્વ અને દ્રવ્ય", "difficulty": "Hard", "num": 18}, {"question": "એક લાકડી ચુંબકને તેની લંબાઈના અડધા ભાગે લંબરૂપે કાપીને બે સરખા ટુકડા કરવામાં આવે છે. જો આ ટુકડાઓને પૃથ્વીના ચુંબકીય ક્ષેત્રમાં મુક્ત રીતે લટકાવવામાં આવે, તો તેની સ્થિર અવસ્થામાં કયું વિધાન સાચું છે?", "options": ["A) પ્રત્યેક ટુકડો તેના મૂળ લંબાઈના ચુંબક જેવી જ દિશામાં ગોઠવાશે, પરંતુ ચુંબકીય મોમેન્ટ અડધું રહેશે.", "B) પ્રત્યેક ટુકડો તેના મૂળ લંબાઈના ચુંબકની વિરુદ્ધ દિશામાં ગોઠવાશે, કારણ કે ધ્રુવો ઉલટાશે.", "C) પ્રત્યેક ટુકડો તેના મૂળ લંબાઈના ચુંબક જેવી જ દિશામાં ગોઠવાશે, પરંતુ ચુંબકીય મોમેન્ટ સમાન રહેશે.", "D) પ્રત્યેક ટુકડો તેના મધ્યભાગે નવા ધ્રુવો વિકસિત કરશે અને મૂળ ચુંબકની દિશામાં જ ગોઠવાશે, પરંતુ ચુંબકીય મોમેન્ટ ચોથા ભાગનું રહેશે."], "correct": 0, "explanation": "લાકડી ચુંબકને લંબરૂપે કાપવાથી પ્રત્યેક ટુકડો પોતાનો સ્વતંત્ર ચુંબક બનશે, જેમાં મૂળ ચુંબકની જેમ ઉત્તર અને દક્ષિણ ધ્રુવ રહેશે. ચુંબકીય મોમેન્ટ (m) લંબાઈ (l) અને ધ્રુવ પ્રબળતા (q_m)ના ગુણાકાર પર આધારિત છે, જેથી લંબાઈ અડધી થવાથી મોમેન્ટ પણ અડધું થશે. વિકલ્પ B ખોટો છે કારણ કે ધ્રુવો ઉલટાતા નથી. વિકલ્પ C ખોટો છે કારણ કે મોમેન્ટ અડધું થાય છે. વિકલ્પ D ખોટો છે કારણ કે મોમેન્ટ ચોથા ભાગનું નહીં પરંતુ અડધું રહેશે.", "ncert_ref": "Class XII - Chapter 5: ચુંબક અને ચુંબકત્વ", "difficulty": "Hard", "num": 19}, {"question": "એક લાકડી ચુંબકને પૃથ્વીના ચુંબકીય ક્ષેત્રથી મુક્ત જગ્યાએ રાખવામાં આવે છે. જો આ ચુંબકને તેના મધ્યબિંદુથી લટકાવીને સંતુલનમાં મૂકવામાં આવે, તો તેની ગતિ કેવી હશે?", "options": ["A) તે ઉત્તર-દક્ષિણ દિશામાં સ્થિર રહેશે", "B) તે પૂર્વ-પશ્ચિમ દિશામાં સ્થિર રહેશે", "C) તે કોઈપણ દિશામાં સ્થિર રહી શકે કારણ કે પૃથ્વીના ચુંબકીય ક્ષેત્રનો પ્રભાવ શૂન્ય છે", "D) તે ઘડિયાળની કાંટાની દિશામાં ફરતો રહેશે"], "correct": 2, "explanation": "પૃથ્વીના ચુંબકીય ક્ષેત્રથી મુક્ત જગ્યાએ લાકડી ચુંબક પર કોઈ બાહ્ય ચુંબકીય બળ લાગતું નથી. આથી, તે કોઈપણ દિશામાં સ્થિર રહી શકે છે કારણ કે તેના પર કોઈ ટોર્ક લાગતું નથી. વિકલ્પ A અને B ખોટા છે કારણ કે પૃથ્વીના ચુંબકીય ક્ષેત્રનો અભાવ હોવાથી ચુંબક ઉત્તર-દક્ષિણ અથવા પૂર્વ-પશ્ચિમ દિશામાં સ્થિર રહેશે નહીં. વિકલ્પ D ખોટો છે કારણ કે ચુંબક ઘડિયાળની કાંટાની દિશામાં ફરતો રહેશે નહીં, જ્યાં સુધી તેના પર કોઈ બાહ્ય બળ લાગતું ન હોય.", "ncert_ref": "Class XII - Chapter 5: ચુંબક અને ચુંબકત્વ", "difficulty": "Hard", "num": 20}, {"question": "લાકડી ચુંબકના એક ધ્રુવ પાસે એક લોખંડની સળીને ચુંબકિત કરવા માટે તેને ચુંબકની સમાંતર દિશામાં ઘસવામાં આવે છે. જો આ સળીને પછી ચુંબકથી દૂર લઈ જવામાં આવે, તો સળીના કયા ભાગ પર ઉત્તર ધ્રુવ બનશે?", "options": ["A) ઘસવામાં આવેલા ભાગની વિરુદ્ધ દિશા", "B) ઘસવામાં આવેલા ભાગની સમાન દિશા", "C) સળીના મધ્યભાગ પર", "D) સળીના બંને છેડા પર સરખી રીતે"], "correct": 0, "explanation": "લોખંડની સળીને લાકડી ચુંબકની સમાંતર દિશામાં ઘસવાથી, ઘસવામાં આવેલા ભાગ પર ચુંબકનો વિરુદ્ધ ધ્રુવ (જો ચુંબકનો ઉત્તર ધ્રુવ ઘસવામાં આવ્યો હોય તો દક્ષિણ ધ્રુવ) ઉત્પન્ન થાય છે. આથી, સળીના ઘસવામાં આવેલા ભાગની વિરુદ્ધ દિશા પર ઉત્તર ધ્રુવ બનશે. બાકીના વિકલ્પો અયોગ્ય છે: B) ઘસવામાં આવેલા ભાગની સમાન દિશા પર દક્ષિણ ધ્રુવ બનશે, C) મધ્યભાગ પર કોઈ ધ્રુવ બનતો નથી, D) બંને છેડા પર સરખી રીતે ધ્રુવ બનતો નથી.", "ncert_ref": "Class XII - Chapter 5: ચુંબક અને ચુંબકત્વ", "difficulty": "Hard", "num": 21}, {"question": "એક લાકડી ચુંબકને પૃથ્વીના ચુંબકીય ક્ષેત્રમાં મુક્ત રીતે લટકાવવામાં આવે છે. જો ચુંબકને તેના સંતુલન સ્થાનથી થોડો વિક્ષેપ કરવામાં આવે, તો તે કયા પ્રકારની ગતિ કરશે?", "options": ["A) સરળ આવર્તી ગતિ", "B) અસમયોજિત ગતિ", "C) વર્તુળ ગતિ", "D) પ્રવેગી ગતિ"], "correct": 0, "explanation": "લાકડી ચુંબકને પૃથ્વીના ચુંબકીય ક્ષેત્રમાં મુક્ત રીતે લટકાવવાથી, તે તેના સંતુલન સ્થાન પર પહોંચવા માટે સરળ આવર્તી ગતિ કરશે. આ ગતિ ચુંબકીય બળના આઘાતને કારણે થાય છે, જે ચુંબકને સંતુલન સ્થાન તરફ પાછો ખેંચે છે. બાકીના વિકલ્પો અયોગ્ય છે: B) અસમયોજિત ગતિ નથી થતી, C) વર્તુળ ગતિ નથી થતી, D) પ્રવેગી ગતિ નથી થતી.", "ncert_ref": "Class XII - Chapter 5: ચુંબક અને ચુંબકત્વ", "difficulty": "Hard", "num": 22}, {"question": "લાકડી ચુંબકના ચુંબકીય ક્ષેત્રની તીવ્રતા નક્કી કરવા માટે કયો સૂત્ર વાપરવામાં આવે છે, જ્યારે ચુંબકની લંબાઈ તેના વ્યાસ કરતાં ઘણી વધારે હોય?", "options": ["A) B = (μ₀/4π) * (2M/r³)", "B) B = (μ₀/4π) * (M/r²)", "C) B = (μ₀/4π) * (M/2r³)", "D) B = (μ₀/4π) * (2M/r²)"], "correct": 0, "explanation": "લાકડી ચુંબકના અક્ષીય સ્થાને ચુંબકીય ક્ષેત્રની તીવ્રતા નક્કી કરવા માટેનો સૂત્ર છે: B = (μ₀/4π) * (2M/r³), જ્યાં M ચુંબકીય દ્વિધ્રુવ મોમેન્ટ છે અને r અંતર છે. આ સૂત્ર લાંબા ચુંબક માટે લાગુ પડે છે. બાકીના વિકલ્પો અયોગ્ય છે: B) અને D) r² પર આધારિત છે, જે અહીં લાગુ પડતું નથી, C) M/2r³ યોગ્ય નથી.", "ncert_ref": "Class XII - Chapter 5: ચુંબક અને ચુંબકત્વ", "difficulty": "Hard", "num": 23}, {"question": "એક લાકડી ચુંબકને તેની લંબાઈને સમાંતર એક સમાન બાહ્ય ચુંબકીય ક્ષેત્રમાં મૂકવામાં આવે છે. જો ચુંબકને તેની સંતુલિત સ્થિતિમાંથી થોડુંક ખસેડીને છોડી દેવામાં આવે, તો તેના દોલનો માટે નીચેનામાંથી કયું વિધાન સાચું છે? (ધારો કે હવાનો અવરોધ અવગણી શકાય તેવો છે.)", "options": ["A) દોલનોની આવૃત્તિ ચુંબકના ચુંબકીય ચાકમાત્રા (magnetic moment) પર આધારિત નથી.", "B) દોલનોની આવૃત્તિ બાહ્ય ચુંબકીય ક્ષેત્રની તીવ્રતા પર સીધી રીતે આધારિત છે.", "C) દોલનો સરળ આવર્ત ગતિ (SHM) નથી કારણ કે પુનઃસ્થાપક બળ ચુંબકના સ્થાનાંતરના સમપ્રમાણમાં નથી.", "D) દોલનોની આવૃત્તિ ચુંબકની જડત્વની ચાકમાત્રા (moment of inertia) પર આધારિત નથી."], "correct": 1, "explanation": "સાચો જવાબ વિકલ્પ B છે. જ્યારે લાકડી ચુંબકને સમાન બાહ્ય ચુંબકીય ક્ષેત્રમાં સમાંતર મૂકવામાં આવે અને તેને સંતુલનમાંથી ખસેડવામાં આવે, ત્યારે તેના પર લાગતું ટોર્ક τ = mB sinθ થાય છે, જ્યાં m એ ચુંબકીય ચાકમાત્રા અને B એ બાહ્ય ક્ષેત્રની તીવ્રતા છે. નાના કોણ માટે sinθ ≈ θ હોવાથી, ટોર્ક θ ના સમપ્રમાણમાં થાય છે, જે સરળ આવર્ત ગતિ (SHM) દર્શાવે છે. દોલનોની આવૃત્તિ T = 2π√(I/mB) થી મળે છે, જ્યાં I એ જડત્વની ચાકમાત્રા છે. આથી આવૃત્તિ બાહ્ય ચુંબકીય ક્ષેત્રની તીવ્રતા (B) પર સીધી રીતે આધારિત છે.\n\nવિકલ્પ A ખોટો છે કારણ કે આવૃત્તિ ચુંબકીય ચાકમાત્રા (m) પર આધારિત છે.\nવિકલ્પ C ખોટો છે કારણ કે નાના કોણ માટે દોલનો SHM હોય છે.\nવિકલ્પ D ખોટો છે કારણ કે આવૃત્તિ જડત્વની ચાકમાત્રા (I) પર આધારિત છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 5: ચુંબકત્વ અને દ્રવ્ય", "difficulty": "Hard", "num": 24}, {"question": "એક લાકડી ચુંબકને તેની લંબાઈને લંબરૂપે એક સમાન બાહ્ય ચુંબકીય ક્ષેત્રમાં મૂકવામાં આવે છે. જો ચુંબકને તેની સંતુલિત સ્થિતિમાંથી 180° નું ભ્રમણ કરાવવામાં આવે, તો આ પ્રક્રિયા દરમિયાન ચુંબક પર થતું કાર્ય કેટલું હશે? (ચુંબકીય ચાકમાત્રા = m, બાહ્ય ક્ષેત્રની તીવ્રતા = B)", "options": ["A) શૂન્ય, કારણ કે ચુંબકીય ક્ષેત્ર સમાન છે.", "B) mB, કારણ કે કાર્ય ચુંબકીય ચાકમાત્રા અને ક્ષેત્રની તીવ્રતાના ગુણાકાર જેટલું હોય છે.", "C) 2mB, કારણ કે ચુંબકને 180° નું ભ્રમણ કરાવવામાં આવે છે.", "D) mB/2, કારણ કે સરેરાશ ટોર્ક અડધું હોય છે."], "correct": 2, "explanation": "સાચો જવાબ વિકલ્પ C છે. જ્યારે લાકડી ચુંબકને સમાન બાહ્ય ચુંબકીય ક્ષેત્રમાં લંબરૂપે મૂકવામાં આવે અને તેને 180° નું ભ્રમણ કરાવવામાં આવે, ત્યારે ચુંબક પર થતું કાર્ય W = ∫τ dθ = ∫(mB sinθ) dθ થી મળે છે. 0° થી 180° સુધી સંકલન કરતાં, W = mB [−cosθ]₀¹⁸⁰ = mB [−(−1) − (−1)] = 2mB મળે છે.\n\nવિકલ્પ A ખોટો છે કારણ કે કાર્ય શૂન્ય નથી, કારણ કે ચુંબકની દિશા બદલાય છે.\nવિકલ્પ B ખોટો છે કારણ કે કાર્ય માત્ર mB નહીં, પરંતુ 2mB જેટલું હોય છે.\nવિકલ્પ D ખોટો છે કારણ કે સરેરાશ ટોર્કના આધારે ગણતરી કરવામાં આવતી નથી.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 5: ચુંબકત્વ અને દ્રવ્ય", "difficulty": "Hard", "num": 25}, {"question": "એક લાકડી ચુંબકના મધ્યભાગે અને તેના એક ધ્રુવ પાસે ચુંબકીય ક્ષેત્રની તીવ્રતા અનુક્રમે B₁ અને B₂ છે. જો ચુંબકની લંબાઈ L હોય, તો B₁ અને B₂ વચ્ચેનો સંબંધ કયો હશે?", "options": ["A) B₂ = 2B₁", "B) B₂ = 4B₁", "C) B₁ = 2B₂", "D) B₁ = B₂"], "correct": 1, "explanation": "લાકડી ચુંબકના મધ્યભાગે ચુંબકીય ક્ષેત્રની તીવ્રતા B₁ = (μ₀/4π) * (2M/L³) હોય છે, જ્યારે ધ્રુવ પાસે B₂ = (μ₀/4π) * (2M/L²) હોય છે. જ્યાં M એ ચુંબકનું ચુંબકીય આઘાત છે. આથી, B₂/B₁ = (2M/L²) / (2M/L³) = L. પરંતુ લાકડી ચુંબક માટે, ધ્રુવ પાસેની તીવ્રતા મધ્યભાગ કરતાં ચાર ગણી હોય છે (કારણ કે L ની કિંમત માટે ગણતરી કરતાં). તેથી, B₂ = 4B₁. વિકલ્પ A, C, અને D ખોટા છે કારણ કે તેઓ આ સંબંધને યોગ્ય રીતે દર્શાવતા નથી.", "ncert_ref": "Class XII - Chapter 5: ચુંબક અને ચુંબકત્વ", "difficulty": "Hard", "num": 26}, {"question": "લાકડી ચુંબકના અક્ષીય રેખા પર એક બિંદુ P પર ચુંબકીય ક્ષેત્રની તીવ્રતા B₁ છે. જો આ ચુંબકની લંબાઈ દોઢા ગણી કરવામાં આવે અને તેના ચુંબકીય આઘાત (magnetic moment) અચળ રહે, તો બિંદુ P (જે ચુંબકના મધ્યબિંદુથી સમાન અંતરે રહેલ છે) પર નવું ચુંબકીય ક્ષેત્ર B₂ કેટલું હશે?", "options": ["A) B₂ = (4/9) B₁", "B) B₂ = (2/3) B₁", "C) B₂ = (8/27) B₁", "D) B₂ = (1/3) B₁"], "correct": 2, "explanation": "લાકડી ચુંબકના અક્ષીય રેખા પર ચુંબકીય ક્ષેત્રની તીવ્રતા B = (μ₀/4π) * (2M)/(d³ - (l/2)²) જ્યાં M = m*l (ચુંબકીય આઘાત), l = લંબાઈ, d = અંતર. જો લંબાઈ દોઢા ગણી (3l/2) કરવામાં આવે અને M અચળ રહે, તો નવું ચુંબકીય ક્ષેત્ર B₂ = (μ₀/4π) * (2M)/(d³ - (3l/4)²). જ્યારે લંબાઈ l થી 3l/2 થાય, ત્યારે (l/2)² થી (3l/4)² = (9l²/16) થાય. ગણતરી કરતાં B₂ = (8/27) B₁ મળે. બાકીના વિકલ્પો ગણતરીના ભૂલભરેલા પરિણામો છે.", "ncert_ref": "Class XII - Chapter 5: ચુંબક અને ચુંબકત્વ", "difficulty": "Hard", "num": 27}, {"question": "લાકડી ચુંબકને તેના મધ્યબિંદુથી લટકાવીને પૃથ્વીના ચુંબકીય ક્ષેત્રમાં સંતુલનમાં મૂકવામાં આવે છે. જો ચુંબકને હળવેથી વળતર આપીને મુક્ત કરવામાં આવે, તો         let userAnswers = {};

            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
