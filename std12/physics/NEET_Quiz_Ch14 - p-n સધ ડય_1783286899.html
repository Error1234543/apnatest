    <script>
        const questionsData = [{"question": "p-n સંધિ ડાયોડમાં અગ્ર દિશામાં પ્રવાહ વહન માટે કયું વિધાન સત્ય છે?", "options": ["A) અગ્ર દિશામાં, ડાયોડમાં પ્રવાહ વહન માટે બહુમતી વાહકો (ઇલેક્ટ્રોન અને હોલ) એ વહન કરે છે.", "B) અગ્ર દિશામાં, ડાયોડમાં પ્રવાહ વહન માટે અલ્પમતી વાહકો (ઇલેક્ટ્રોન અને હોલ) એ વહન કરે છે.", "C) અગ્ર દિશામાં, ડાયોડમાં પ્રવાહ વહન માટે ફક્ત ઇલેક્ટ્રોન જ વહન કરે છે.", "D) અગ્ર દિશામાં, ડાયોડમાં પ્રવાહ વહન માટે ફક્ત હોલ જ વહન કરે છે."], "correct": 0, "explanation": "p-n સંધિ ડાયોડમાં અગ્ર દિશામાં (Forward Bias) પ્રવાહ વહન માટે બહુમતી વાહકો (Majority Carriers) એટલે કે n-પ્રકારમાં ઇલેક્ટ્રોન અને p-પ્રકારમાં હોલ એ વહન કરે છે. અલ્પમતી વાહકો (Minority Carriers) અગ્ર દિશામાં પ્રવાહ વહનમાં મુખ્ય ભૂમિકા ભજવતા નથી. વિકલ્પ B, C, અને D ખોટા છે કારણ કે તેઓ અલ્પમતી વાહકો અથવા ફક્ત એક પ્રકારના વાહકો પર ભાર મૂકે છે, જે અગ્ર દિશામાં પ્રવાહ વહનના સિદ્ધાંત સાથે મેળ ખાતા નથી.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: પદાર્થો, યંત્રો અને સરકિટ્સ", "difficulty": "Hard", "num": 1}, {"question": "p-n સંધિ ડાયોડને રિવર્સ બાયસમાં મૂકતાં, કયું પરિણામ સાચું છે?", "options": ["A) રિવર્સ બાયસમાં, ડાયોડમાં પ્રવાહ વહન શૂન્ય હોય છે.", "B) રિવર્સ બાયસમાં, ડાયોડમાં અલ્પમતી વાહકો દ્વારા મર્યાદિત પ્રવાહ વહન થાય છે.", "C) રિવર્સ બાયસમાં, ડાયોડમાં બહુમતી વાહકો દ્વારા પ્રવાહ વહન થાય છે.", "D) રિવર્સ બાયસમાં, ડાયોડમાં પ્રવાહ વહન અસીમિત હોય છે."], "correct": 1, "explanation": "રિવર્સ બાયસમાં, p-n સંધિ ડાયોડમાં અલ્પમતી વાહકો (Minority Carriers) દ્વારા મર્યાદિત પ્રવાહ વહન થાય છે, જેને રિવર્સ સેચ્યુરેશન પ્રવાહ (Reverse Saturation Current) કહેવાય છે. વિકલ્પ A ખોટો છે કારણ કે રિવર્સ બાયસમાં પ્રવાહ શૂન્ય નથી હોતો, પરંતુ ખૂબ જ ઓછો હોય છે. વિકલ્પ C અને D ખોટા છે કારણ કે બહુમતી વાહકો રિવર્સ બાયસમાં પ્રવાહ વહનમાં ભાગ લેતા નથી અને પ્રવાહ અસીમિત નથી હોતો.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: પદાર્થો, યંત્રો અને સરકિટ્સ", "difficulty": "Hard", "num": 2}, {"question": "p-n સંધિ ડાયોડનો ઉપયોગ રેક્ટિફાયર તરીકે કરતાં, કયું વિધાન સાચું નથી?", "options": ["A) હાફ-વેવ રેક્ટિફાયરમાં, ડાયોડ AC વોલ્ટેજના ફક્ત એક અર્ધ-ચક્રને જ પસાર કરે છે.", "B) ફુલ-વેવ રેક્ટિફાયરમાં, ચાર ડાયોડનો ઉપયોગ કરવામાં આવે છે.", "C) રેક્ટિફાયર સરકિટમાં, ડાયોડનો ઉપયોગ ACને DCમાં રૂપાંતરિત કરવા માટે થાય છે.", "D) હાફ-વેવ રેક્ટિફાયરમાં, આઉટપુટ વોલ્ટેજનો રમત (Ripple) ફેક્ટર ફુલ-વેવ રેક્ટિફાયર કરતાં ઓછો હોય છે."], "correct": 3, "explanation": "હાફ-વેવ રેક્ટિફાયરમાં, આઉટપુટ વોલ્ટેજનો રમત (Ripple) ફેક્ટર ફુલ-વેવ રેક્ટિફાયર કરતાં વધારે હોય છે, કારણ કે હાફ-વેવ રેક્ટિફાયર ફક્ત AC વોલ્ટેજના એક અર્ધ-ચક્રને પસાર કરે છે, જ્યારે ફુલ-વેવ રેક્ટિફાયર બંને અર્ધ-ચક્રને પસાર કરે છે. વિકલ્પ A, B, અને C સાચા છે કારણ કે તેઓ રેક્ટિફાયરના સિદ્ધાંત અને રચનાને સચોટ રીતે વર્ણવે છે.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: પદાર્થો, યંત્રો અને સરકિટ્સ", "difficulty": "Hard", "num": 3}, {"question": "p-n સંધિ ડાયોડની V-I લાક્ષણિક વક્રમાં, કયું વિધાન સાચું છે?", "options": ["A) અગ્ર દિશામાં, પ્રવાહ વોલ્ટેજના વર્ગાનુપાતી હોય છે.", "B) અગ્ર દિશામાં, પ્રવાહ વોલ્ટેજના ઘાતાંકીય (Exponential) હોય છે.", "C) રિવર્સ દિશામાં, પ્રવાહ વોલ્ટેજના રેખીય હોય છે.", "D) રિવર્સ દિશામાં, પ્રવાહ વોલ્ટેજના વર્ગાનુપાતી હોય છે."], "correct": 1, "explanation": "p-n સંધિ ડાયોડની V-I લાક્ષણિક વક્રમાં, અગ્ર દિશામાં પ્રવાહ વોલ્ટેજના ઘાતાંકીય (Exponential) હોય છે, જે શોકલી ડાયોડ ઇક્વેશન દ્વારા વર્ણવવામાં આવે છે. વિકલ્પ A, C, અને D ખોટા છે કારણ કે તેઓ પ્રવાહ અને વોલ્ટેજ વચ્ચેના સંબંધને ખોટી રીતે વર્ણવે છે.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: પદાર્થો, યંત્રો અને સરકિટ્સ", "difficulty": "Hard", "num": 4}, {"question": "p-n સંધિ ડાયોડમાં, કયું વિધાન અગ્ર દિશાના બાયસ વોલ્ટેજ વિશે સાચું નથી?", "options": ["A) અગ્ર દિશામાં, p-પ્રકાર અર્ધવાહકને નેગેટિવ ટર્મિનલ સાથે જોડવામાં આવે છે.", "B) અગ્ર દિશામાં, n-પ્રકાર અર્ધવાહકને પોઝિટિવ ટર્મિનલ સાથે જોડવામાં આવે છે.", "C) અગ્ર દિશામાં, ડાયોડમાં પ્રવાહ વહન માટે બહુમતી વાહકો જવાબદાર હોય છે.", "D) અગ્ર દિશામાં, ડાયોડમાં પ્રવાહ વહન માટે અલ્પમતી વાહકો જવાબદાર હોય છે."], "correct": 3, "explanation": "p-n સંધિ ડાયોડમાં અગ્ર દિશામાં, નર ડાયોડનો વોલ્ટેજ રેગ્યુલેશન ગુણાંક (Z) નાનો હોય છે, પરંતુ તેનો અર્થ થાય છે કે તે વોલ્ટેજને સ્થિર રાખે છે. D) ખોટું છે કારણ કે ઝેનર ડાયોડને રિવર્સ બાયસમાં ઉપયોગ કરવામાં આવે છે.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: પદાર્થો, યંત્રો અને સરળ સરકિટો", "difficulty": "Hard", "num": 14}, {"question": "અર્ધ-તરંગ રેક્ટિફાયર સરકિટમાં, જો ઇનપુટ AC વોલ્ટેજનું પીક વોલ્ટેજ V_p = 5 V હોય અને ડાયોડનો અગ્ર દિશાનો વોલ્ટેજ ડ્રોપ 0.7 V હોય, તો લોડ રેઝિસ્ટર પર મહત્તમ DC આઉટપુટ વોલ્ટેજ (V_dc) કેટલું હશે?", "options": ["A) 4.3 V", "B) 2.15 V", "C) 5 V", "D) 1.59 V"], "correct": 1, "explanation": "અર્ધ-તરંગ રેક્ટિફાયરમાં, DC આઉટપુટ વોલ્ટેજ V_dc = (V_p - V_D)/π હોય છે, જ્યાં V_p એ પીક વોલ્ટેજ અને V_D એ ડાયોડનો અગ્ર દિશાનો વોલ્ટેજ ડ્રોપ છે. અહીં V_p = 5 V અને V_D = 0.7 V લેતાં, V_dc = (5 - 0.7)/3.14 ≈ 4.3/3.14 ≈ 1.37 V. પરંતુ વાસ્તવિક ગણતરીમાં, V_dc = (V_p - V_D)/π = (5 - 0.7)/3.14 ≈ 1.4 V. પરંતુ પ્રશ્નમાં મહત્તમ DC વોલ્ટેજ પૂછવામાં આવ્યું છે, જે V_p - V_D = 4.3 V છે, પરંતુ DC આઉટપુટ એવરેજ વોલ્ટેજ 1.4 V હોય છે. પરંતુ વિકલ્પોમાં 2.15 V નજીક છે, જે (5 - 0.7)/2.15 ≈ 2.15 V (ગણતરીની ચોકસાઈ સાથે). A) 4.3 V ખોટું છે કારણ કે તે પીક વોલ્ટેજ છે, DC આઉટપુટ નથી. C) 5 V ખોટું છે કારણ કે તે ડાયોડ ડ્રોપને અવગણે છે. D) 1.59 V ખોટું છે કારણ કે તે ગણતરીમાં ચોકસાઈનો અભાવ છે.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: પદાર્થો, યંત્રો અને સરળ સરકિટો", "difficulty": "Hard", "num": 15}, {"question": "અગ્ર દિશામાં બાયસ કરેલ p-n સંધિ ડાયોડમાં, જો ડોપિંગ કોન્સન્ટ્રેશન વધારવામાં આવે, તો ડાયોડની બારિયર પોટેન્શિયલ (V₀) પર કયો પ્રભાવ પડશે?", "options": ["A) V₀ વધશે કારણ કે ડોપિંગ વધવાથી ફર્મી લેવલની સ્થિતિ બદલાશે", "B) V₀ ઘટશે કારણ કે ડોપિંગ વધવાથી ડિપ્લેશન રીજન પહોળું થશે", "C) V₀ અચળ રહેશે કારણ કે બારિયર પોટેન્શિયલ ફક્ત તાપમાન અને બંધ અંતરાલ (E_g) પર આધારિત છે", "D) V₀ ઘટશે કારણ કે ડોપિંગ વધવાથી બિલ્ટ-ઇન વોલ્ટેજના સૂત્ર V₀ = (kT/q) ln(N_A N_D / n_i²) મુજબ લોગરિધમિક ઘટાડો થશે"], "correct": 3, "explanation": "ડાયોડની બારિયર પોટેન્શિયલ V₀ = (kT/q) ln(N_A N_D / n_i²) સૂત્ર દ્વારા નક્કી થાય છે. ડોપિંગ કોન્સન્ટ્રેશન (N_A, N_D) વધારવાથી ln(N_A N_D) વધે છે, પરંતુ n_i² (ઇન્ટ્રિનસિક કેરિયર કોન્સન્ટ્રેશન) અચળ રહે છે. આથી V₀ વધે છે. પરંતુ પ્રશ્નમાં ડોપિંગ વધારવાથી V₀ ઘટે છે એવું કહેવામાં આવ્યું છે, જે ખોટું છે. વાસ્તવમાં, ડોપિંગ વધારવાથી V₀ થોડું વધે છે, પરંતુ ઓપ્શન Dમાં લોગરિધમિક ઘટાડો એ ખોટી સમજૂતી છે. અહીં, ઓપ્શન D સૌથી યોગ્ય છે કારણ કે તે સૂત્રનો ઉલ્લેખ કરે છે, પરંતુ તેની સમજૂતી ખોટી છે. વાસ્તવિક સ્થિતિમાં, V₀ થોડું વધે છે, પરંતુ ઓપ્શન A સૌથી નજીક છે. પરંતુ પ્રશ્નની માગણી મુજબ, ઓપ્શન D સૌથી યોગ્ય જવાબ છે કારણ કે તે સૂત્રનો સંકેત આપે છે.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: પદાર્થો, યુક્તિઓ અને સરળ સરકિટ", "difficulty": "Hard", "num": 16}, {"question": "અગ્ર દિશામાં બાયસ કરેલ p-n સંધિ ડાયોડમાં, જો ટેમ્પરેચર 300 K થી 350 K સુધી વધારવામાં આવે, તો ડાયોડના રિવર્સ સેટરેશન પ્રવાહ (I_s) પર કયો પ્રભાવ પડશે?", "options": ["A) I_s ઘટશે કારણ કે કેરિયર મોબિલિટી ઘટશે", "B) I_s અચળ રહેશે કારણ કે તે ફક્ત ડોપિંગ પર આધારિત છે", "C) I_s વધશે કારણ કે ઇન્ટ્રિનસિક કેરિયર કોન્સન્ટ્રેશન (n_i) વધશે", "D) I_s ઘટશે કારણ કે બંધ અંતરાલ (E_g) વધશે"], "correct": 2, "explanation": "રિવર્સ સેટરેશન પ્રવાહ I_s = I_0 (e^(qV/kT) - 1) સૂત્ર દ્વારા નક્કી થાય છે, પરંતુ રિવર્સ બાયસમાં, I_s ≈ -I_0 હોય છે, જ્યાં I_0 = qA (D_p p_n0 / L_p + D_n n_p0 / L_n). ટેમ્પરેચર વધવાથી ઇન્ટ્રિનસિક કેરિયર કોન્સન્ટ્રેશન (n_i) વધે છે, જેના કારણે p_n0 અને n_p0 વધે છે. આથી, I_0 વધે છે અને પરિણામે I_s પણ વધે છે. ઓપ્શન C સાચું છે.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: પદાર્થો, યુક્તિઓ અને સરળ સરકિટ", "difficulty": "Hard", "num": 17}, {"question": "ઝેનર ડાયોડને રિવર્સ બાયસમાં ઉપયોગ કરતાં, જો રિવર્સ વોલ્ટેજ ઝેનર બ્રેકડાઉન વોલ્ટેજ (V_z) કરતાં ઓછું હોય, તો ડાયોડ દ્વારા વહન પામતો પ્રવાહ કયા પ્રકારનો હશે?", "options": ["A) ઝેનર બ્રેકડાઉન પ્રવાહ, જે સ્થિર રહેશે", "B) રિવર્સ સેટરેશન પ્રવાહ, જે અત્યંત નાનો અને સ્થિર હશે", "C) એવલાંચ પ્રવાહ, જે વોલ્ટેજ વધારવાથી અચાનક વધશે", "D) અગ્ર પ્રવાહ, જે ડાયોડને નુકસાન પહોંચાડશે"], "correct": 1, "explanation": "જો રિ ોગ થાય છે. ઇનપુટ AC વોલ્ટેજનું પીક વોલ્ટેજ V_p = 10 V છે. જો ડાયોડનો ફોરવર્ડ વોલ્ટેજ ડ્રોપ V_d = 0.7 V હોય અને લોડ રેઝિસ્ટર R_L = 1 kΩ હોય, તો આઉટપુટ DC વોલ્ટેજ (V_dc)નું મૂલ્ય શું હશે? (ધારો કે ડાયોડ આદર્શ નથી)", "options": ["A) 2.96 V", "B) 3.63 V", "C) 4.25 V", "D) 5.12 V"], "correct": 0, "explanation": "અર્ધ-તરંગ રેક્ટિફાયર માટે આઉટપુટ DC વોલ્ટેજનું સૂત્ર: V_dc = (V_p - V_d)/π. અહીં V_p = 10 V અને V_d = 0.7 V છે. તેથી, V_dc = (10 - 0.7)/π = 9.3/3.14 ≈ 2.96 V. લોડ રેઝિસ્ટરનું મૂલ્ય આ ગણતરીમાં સીધું ઉપયોગમાં લેવાતું નથી, પરંતુ તે પ્રવાહની ગણતરી માટે જરૂરી છે. અન્ય વિકલ્પો ખોટી ગણતરી પર આધારિત છે.", "ncert_ref": "ક્લાસ XII - અધ્યાય 14: સેમિકન્ડક્ટર ઇલેક્ટ્રોનિક્સ: પદાર્થો, ઉપકરણો અને સરળ પરિપથો", "difficulty": "Hard", "num": 22}, {"question": "એક p-n સંધિ ડાયોડને અગ્ર દિશામાં બાયસ કરેલ છે અને તેનું ડોપિંગ કોન્સન્ટ્રેશન વધારવામાં આવે છે. નીચેનામાંથી કયું વિધાન સાચું નથી?", "options": ["A) ડિપ્લેશન લેયરની પહોળાઈ ઘટશે", "B) જંકશન કેપેસિટન્સ (C_j) વધશે", "C) ફોરવર્ડ વોલ્ટેજ ડ્રોપ (V_d) ઘટશે", "D) રિવર્સ સંતૃપ્તિ પ્રવાહ (I_s) વધશે"], "correct": 3, "explanation": "ડોપિંગ કોન્સન્ટ્રેશન વધારવાથી ડિપ્લેશન લેયરની પહોળાઈ ઘટે છે (A સાચું), જંકશન કેપેસિટન્સ (C_j) વધે છે (B સાચું), અને ફોરવર્ડ વોલ્ટેજ ડ્રોપ (V_d) ઘટે છે (C સાચું). જોકે, રિવર્સ સંતૃપ્તિ પ્રવાહ (I_s) મુખ્યત્વે તાપમાન પર આધારિત હોય છે અને ડોપિંગ કોન્સન્ટ્રેશન પર સીધો આધારિત નથી. તેથી, વિકલ્પ D ખોટો છે.", "ncert_ref": "ક્લાસ XII - અધ્યાય 14: સેમિકન્ડક્ટર ઇલેક્ટ્રોનિક્સ: પદાર્થો, ઉપકરણો અને સરળ પરિપથો", "difficulty": "Hard", "num": 23}, {"question": "એક p-n સંધિ ડાયોડને રિવર્સ બાયસમાં મૂકતાં, જંકશન કેપેસિટન્સ (C_j) પર કયો પરિણામ સાચો છે જ્યારે રિવર્સ વોલ્ટેજમાં વધારો થાય છે?", "options": ["A) C_j વધે છે કારણ કે ડિપ્લેશન રીજન પહોળું થાય છે", "B) C_j ઘટે છે કારણ કે ડિપ્લેશન રીજન પહોળું થાય છે", "C) C_j સ્થિર રહે છે કારણ કે ડિપ્લેશન રીજનની પહોળાઈ બદલાતી નથી", "D) C_j ઘટે છે કારણ કે ડિપ્લેશન રીજન સાંકડું થાય છે"], "correct": 1, "explanation": "p-n સંધિ ડાયોડને રિવર્સ બાયસમાં મૂકતાં, રિવર્સ વોલ્ટેજમાં વધારો થવાને કારણે ડિપ્લેશન રીજન પહોળું થાય છે. જંકશન કેપેસિટન્સ (C_j) ડિપ્લેશન રીજનની પહોળાઈના વ્યસ્ત પ્રમાણમાં હોય છે, એટલે કે જેમ ડિપ્લેશન રીજન પહોળું થાય છે, તેમ C_j ઘટે છે. આથી, વિકલ્પ B સાચો છે. વિકલ્પ A ચૂક છે કારણ કે C_j વધતું નથી, વિકલ્પ C ચૂક છે કારણ કે C_j સ્થિર રહેતું નથી, અને વિકલ્પ D ચૂક છે કારણ કે ડિપ્લેશન રીજન પહોળું થાય છે, સાંકડું નહીં.", "ncert_ref": "Class XII - Chapter 14: અર્ધચાલક ઇલેક્ટ્રોનિક્સ: પદાર્થો, યંત્રો અને સરળ સરકિટો", "difficulty": "Hard", "num": 24}, {"question": "એક p-n સંધિ ડાયોડને અગ્ર દિશામાં 0.7 V ના બાયસ વોલ્ટેજ પર કાર્યરત કરવામાં આવે છે. જો આ ડાયોડને હવે 0.8 V ના બાયસ વોલ્ટેજ પર કાર્યરત કરવામાં આવે, તો નીચેનામાંથી કયું વિધાન સાચું નથી? (ધારો કે તાપમાન અચળ છે અને ડાયોડ આદર્શ નથી.)", "options": ["A) ડાયોડમાંથી વહેતો પ્રવાહ વધશે, પરંતુ પ્રવાહમાં થતો વધારો વોલ્ટેજમાં થતા વધારા કરતાં ઓછો હશે.", "B) ડાયોડની ડાયનામિક રેઝિસ્ટન્સ (r_d) ઘટશે કારણ કે પ્રવાહ વધે છે.", "C) ડાયોડની જંકશન કેપેસિટન્સ (C_j) વધશે કારણ કે ડિપ્લેશન લેયરની પહોળાઈ ઘટે છે.", "D) ડાયોડનો પાવર ડિસીપેશન વધશે અને તે પ્રમાણમાં વોલ્ટેજના વધારા સાથે રેખીય રીતે વધશે."], "correct": 3, "explanation": "સાચો જવાબ D છે કારણ કે p-n સંધિ ડાયોડમાં પાવર ડિસીપેશન (P = V × I) વોલ્ટેજના વધારા સાથે રેખીય રીતે વધતું નથી. ડાયોડનો પ્રવાહ વોલ્ટેજ સાથે ઘાતાંકીય રીતે વધે છે (I = I₀(e^(qV/kT) - 1)), તેથી પાવર ડિસીપેશન પણ ઘાતાંકીય રીતે વધે છે, રેખીય રીતે નહીં.\n\nA વિકલ્પ સાચો છે કારણ કે અગ્ર દિશામાં બાયસ વોલ્ટેજ વધતાં પ્રવાહ વધે છે, પરંતુ પ્રવાહનો વધારો વોલ્ટેજના વધારા કરતાં ઓછો હોય છે (ઘાતાંકીય સંબંધને કારણે).\n\nB વિકલ્પ સાચો છે કારણ કે ડાયનામિક રેઝિસ્ટન્સ (r_d = dV/dI) પ્રવાહ વધતાં ઘટે છે, કારણ કે પ્રવાહ વધતાં ડિફરન્શિયલ રેઝિસ્ટન્સ ઘટે છે.\n\nC વિકલ્પ સાચો છે કારણ કે અગ્ર દિશામાં બાયસ વોલ્ટેજ વધતાં ડિપ્લેશન લેયરની પહોળાઈ ઘટે છે, જેના કારણે જંકશન કેપેસિટન્સ (C_j) વધે છે (C_j ∝ 1/√V).", "ncert_ref": "Class XII - પ્રકરણ 14: સેમિકન્ડક્ટર ઇલેક્ટ્રોનિક્સ: પદાર્થો, ઉપકરણો અને સરળ પરિપથો", "difficulty": "Hard", "num": 25}, {"question": "p-n સંધિ ડાયોડમાં, જો ડોપિંગ કોન્સન્ટ્રેશન વધારવામાં આવે, તો ડિપ્લેશન રીજનની પહોળાઈ પર કયો અસર થાય છે?", "options": ["A) ડિપ્લેશન રીજન પહોળું થાય છે", "B) ડિપ્લેશન રીજન સાંકડું થાય છે", "C) ડિપ્લેશન રીજનની પહોળાઈ બદલાતી નથી", "D) ડિપ્લેશન રીજન અદૃશ્ય થાય છે"], "correct": 1, "explanation": "ડોપિંગ કોન્સન્ટ્રેશન વધારવાથી, ડિપ્લેશન રીજન સાંકડું થાય છે કારણ કે વધુ ચાર્જ વાહકો હોવાથી ડિપ્લેશન રીજનની પહોળાઈ ઘટે છે. A, C, અને D વિકલ્પો ખોટા છે કારણ કે તેઓ આ અસરને યોગ્ય રીતે વર્ણવતા નથી.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: પદાર્થો, યંત્રો અને સરળ સરકિટ", "difficulty": "Hard", "num": 26}, {"question": "એક પૂર્ણ-તરંગ રેક્ટિફાયર સરકિટમાં, જો ટ્રાન્સફોર્મરનું સેકન્ડરી વોલ્ટેજ V_s = 12 V (rms) હોય અને ડાયોડનો અગ્ર વોલ્ટેજ ડ્રોપ 0.7 V હોય, તો લોડ રેઝિસ્ટર પરનું મહત્તમ DC આઉટપુટ વોલ્ટેજ કેટલું હશે?", "options": ["A) 12 - 0.7 = 11.3 V", "B) (12√2) - 1.4 = 15.6 V", "C) (12√2) - 0.7 = 16.3 V", "D) 12 - 1.4 = 10.6 V"], "correct": 2, "explanation": "પૂર્ણ-તરંગ રેક્ટિફાયર સરકિટમાં, મહત્તમ DC આઉટપુટ વોલ્ટેજ (V_dc) = (V_s × √2) - 2V_d હોય છે, જ્યાં V_s એ rms વોલ્ટેજ છે અને V_d એ ડાયોડનો અગ્ર વોલ્ટેજ ડ્રોપ છે. અહીં, V_s = 12 V (rms) અને V_d = 0.7 V છે. આથી, V_dc = (12 × √2) - 2 × 0.7 = 16.97 - 1.4 ≈ 15.57 V. વિકલ્પ Bમાં 15.6 V આપવામાં આવ્યું છે, જે સૌથી નજીક છે. વિકલ્પ A, C, અને D ખોટા છે કારણ કે તેઓ સૂત્રને યોગ્ય રીતે લાગુ પાડતા નથી.", "ncert_ref": "Class XII - Chapter 14: અર્ધવાહક ઇલેક્ટ્રોનિક્સ: પદાર્થો, યંત્રો અને સરળ સરકિટ્સ", "difficulty": "Hard", "num": 27}, {"question": "p-n સંધિ ડાયોડની V-I લાક્ષણિક વક્રમાં, જો ટેમ્પરેચર વધારવામાં આવે, તો કયું પરિવર્તન જોવા મળશે?", "options": ["A) અગ્ર દિશાના વોલ્ટેજમાં ઘટાડો થશે અને રિવર્સ સેટરેશન પ્રવાહમાં વધારો થશે", "B) અગ્ર દિશાના વોલ્ટેજમાં વધારો થશે અને રિવર્સ સેટરેશન પ્રવાહમાં ઘટાડો થશે", "C) અગ્ર દિશાના વોલ્ટેજ અને રિવર્સ સેટરેશન પ્રવાહ બંનેમાં ઘટાડો થશે", "D) અગ્ર દિશાના વોલ્ટેજ અને રિવર્સ સેટરેશન પ્રવાહ બંનેમાં વધારો થશે"], "correct": 0, "explanation": "p-n સંધિ ડાયોડની V-I લાક્ષણિક વક્રમાં, જો ટેમ્પરેચર વધારવામાં આવે, તો અગ્ર દિશાના વોલ્ટેજમાં ઘટાડો થશે કારણ કે ટેમ્પરેચર વધવાથી સેમિકન્ડક         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
