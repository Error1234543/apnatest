    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}

        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}

        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}

        .question-card:nth-child(4){animation-delay:.3s}

        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}

        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}

        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}

        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}

    <script>
        const questionsData = [{"question": "એક સમાન ચુંબકીય ક્ષેત્રમાં મૂકેલા ગોળાકાર લૂપમાંથી વિદ્યુતપ્રવાહ પસાર થાય છે. જો લૂપને તેના વ્યાસને અનુલક્ષીને 180° ફેરવવામાં આવે, તો લૂપ પર લાગતું ટોર્ક કેવું પરિવર્તન પામશે?", "options": ["A) શૂન્ય થઈ જશે", "B) મૂળ મૂલ્ય જેટલું જ રહેશે પરંતુ દિશા બદલાશે", "C) મૂળ મૂલ્ય કરતાં અડધું થઈ જશે", "D) મૂળ મૂલ્ય જેટલું જ રહેશે અને દિશા પણ યથાવત રહેશે"], "correct": 0, "explanation": "ટોર્ક τ = NIAB sinθ. લૂપને 180° ફેરવતાં θ = 180° થાય, જેથી sin180° = 0. આથી ટોર્ક શૂન્ય થઈ જશે. અન્ય વિકલ્પો ખોટા છે કારણ કે θ = 180° માટે sinθ ≠ ±1 કે ½ નથી.", "ncert_ref": "કक्षा XII - પ્રકરણ 5: ચુંબકત્વ અને દ્રવ્ય", "difficulty": "Hard", "num": 1}, {"question": "એક લાંબા સુરેખ તારમાંથી I જેટલો વિદ્યુતપ્રવાહ પસાર થાય છે. તારથી r અંતરે આવેલા બિંદુ પાસે ચુંબકીય ક્ષેત્રનું મૂલ્ય B છે. જો તારની લંબાઈ અડધી કરવામાં આવે અને પ્રવાહ બમણો કરવામાં આવે, તો તે જ બિંદુ પાસે ચુંબકીય ક્ષેત્રનું મૂલ્ય કેટલું થશે? (ધારો કે તાર ખૂબ લાંબો છે)", "options": ["A) B/2", "B) B", "C) 2B", "D) 4B"], "correct": 2, "explanation": "લાંબા સુરેખ તાર માટે B = (μ₀I)/(2πr). તારની લંબાઈ અડધી કરવાથી ચુંબકીય ક્ષેત્ર પર કોઈ અસર થતી નથી કારણ કે સૂત્ર લાંબા તાર માટે છે. પ્રવાહ બમણો (2I) કરતાં B = (μ₀×2I)/(2πr) = 2B થશે. અન્ય વિકલ્પો ખોટા છે કારણ કે લંબાઈ પરિવર્તન અસરકારક નથી.", "ncert_ref": "કक्षा XII - પ્રકરણ 5: ચુંબકત્વ અને દ્રવ્ય", "difficulty": "Hard", "num": 2}, {"question": "એક ગોળાકાર ગોસિયન સપાટીની અંદર એક વિદ્યુત ડાયપોલ મૂકેલો છે. ગોસિયન સપાટી પરથી પસાર થતું કુલ ચુંબકીય ફ્લક્સ કેટલું હશે?", "options": ["A) શૂન્ય, કારણ કે ચુંબકીય ક્ષેત્ર રેખાઓ બંધ ગાળા રચે છે", "B) શૂન્ય નહીં, કારણ કે ડાયપોલમાં ચોખ્ખું ચુંબકીય ધ્રુવીય ચાકમાત્રા છે", "C) ડાયપોલની ચુંબકીય ચાકમાત્રા પર આધારિત", "D) ગોસિયન સપાટીના કદ પર આધારિત"], "correct": 0, "explanation": "ગૉસનો નિયમ ચુંબકત્વ માટે જણાવે છે કે કોઈપણ બંધ સપાટી પરથી પસાર થતું ચોખ્ખું ચુંબકીય ફ્લક્સ શૂન્ય હોય છે, કારણ કે ચુંબકીય ક્ષેત્ર રેખાઓ હંમેશા બંધ ગાળા રચે છે. ડાયપોલ હોવા છતાં પણ આ નિયમ લાગુ પડે છે. અન્ય વિકલ્પો ખોટા છે કારણ કે ગૉસનો નિયમ ચુંબકીય ફ્લક્સ માટે સાર્વત્રિક છે.", "ncert_ref": "કक्षा XII - પ્રકરણ 5: ચુંબકત્વ અને દ્રવ્ય", "difficulty": "Hard", "num": 3}, {"question": "એક ઇલેક્ટ્રોન એક સમાન ચુંબકીય ક્ષેત્રમાં વર્તુળાકાર માર્ગે ગતિ કરે છે. જો ઇલેક્ટ્રોનની ગતિ ઊર્જા બમણી કરવામાં આવે, તો તેના પરિભ્રમણની ત્રિજ્યા કેવી રીતે બદલાશે? (ચુંબકીય ક્ષેત્ર અચળ રાખવામાં આવે છે)", "options": ["A) √2 ગણી વધશે", "B) 2 ગણી વધશે", "C) અડધી થઈ જશે", "D) √2 ગણી ઘટશે"], "correct": 0, "explanation": "ચુંબકીય ક્ષેત્રમાં વર્તુળાકાર ગતિ માટે r = mv/(qB). ગતિ ઊર્જા K = ½mv² ⇒ v = √(2K/m). જો K બમણી થાય તો v = √(2×2K/m) = √2 × √(2K/m). આથી r ∝ v ∝ √K ⇒ r નવું = √2 r મૂળ. અન્ય વિકલ્પો ખોટા છે કારણ કે ત્રિજ્યા ગતિ ઊર્જાના વર્ગમૂળના સમપ્રમાણમાં હોય છે.", "ncert_ref": "કक्षा XII - પ્રકરણ 5: ચુંબકત્વ અને દ્રવ્ય", "difficulty": "Hard", "num": 4}, {"question": "એક સોલેનોઇડની અંદર ચુંબકીય ક્ષેત્ર B છે. જો સોલેનોઇડની લંબાઈ બમણી કરવામાં આવે અને પ્રતિ એકમ લંબાઈમાં ફેરોની સંખ્યા અડધી કરવામાં આવે, તો નવું ચુંબકીય ક્ષેત્ર કેટલું થશે? (વિદ્યુતપ્રવાહ અચળ રાખવામાં આવે છે)", "options": ["A) B/4", "B) B/2", "C) B", "D) 2B"], "correct": 1, "explanation": "સોલેનોઇડ માટે B = μ₀nI, જ્યાં n = N/L (ફેરોની સંખ્યા પ્રતિ એકમ લંબાઈ). જો L બમણી થાય અને N અડધી થાય તો n નવું = (N/2)/(2L) = n/4. આથી B નવું = μ₀(n/4)I = B/4. પરંતુ પ્રશ્નમાં પ્રતિ એકમ લંબાઈમાં ફેરોની સંખ્યા અડધી કરવામાં આવે છે, એટલે કે n નવું = n/2. આથી B નવું = μ₀(n/2)I = B/2. અન્ય વિકલ્પો ખોટા છે કારણ કે n નું મૂલ્ય યોગ્ય રીતે ગણવામાં આવ્યું નથી.", "ncert_ref": "કक्षा XII - પ્રકરણ 5: ચુંબકત્વ અને દ્રવ્ય", "difficulty": "Hard", "num": 5}, {"question": "એક ચુંબકીય ડાયપોલને એકસમાન ચુંબકીય ક્ષેત્ર Bમાં મૂકવામાં આવે છે. જો ડાયપોલનો મોમેન્ટ m હોય અને તે ક્ષેત્રની દિશા સાથે θ કોણ બનાવે, તો ડાયપોલ પર લાગતું ટોર્ક કયું હશે?", "options": ["A) τ = mB cosθ", "B) τ = mB sinθ", "C) τ = mB tanθ", "D) τ = mB / sinθ"], "correct": 1, "explanation": "ચુંબકીય ડાયપોલ પર લાગતું ટોર્ક τ = m × B છે, જ્યાં m અને B વેક્ટર છે. ટોર્કનું પરિમાણ τ = mB sinθ થાય છે, જ્યાં θ એ m અને B વચ્ચેનો કોણ છે. વિકલ્પ A (cosθ) અને C ", "D) B' = B/4"], "correct": 0, "explanation": "સોલેનોઇડની અંદર ચુંબકીય ક્ષેત્ર B = μ₀nI છે, જ્યાં n = N/L (ફેરાની સંખ્યા/લંબાઈ). જો લંબાઈ બમણી કરવામાં આવે અને N સમાન રહે, તો n = N/(2L) = n/2 થાય છે. આથી, B' = μ₀(n/2)I = B/2. વિકલ્પ B, C, અને D ખોટા છે કારણ કે તેઓ લંબાઈ બમણી કરવાના પરિણામને યોગ્ય રીતે ધ્યાનમાં લેતા નથી.", "ncert_ref": "Class XII - Chapter 5: ચુંબકત્વ અને ગૉસનો નિયમ", "difficulty": "Hard", "num": 12}, {"question": "એક ચુંબકીય પદાર્થનો ચુંબકીય પ્રવેગ્યતા (χ) તાપમાન સાથે બદલાય છે. નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) પરાચુંબકીય પદાર્થો માટે χ તાપમાન સાથે ઘટે છે.", "B) પ્રતિચુંબકીય પદાર્થો માટે χ તાપમાન સાથે વધે છે.", "C) લોહચુંબકીય પદાર્થો માટે χ તાપમાન સાથે ઘટે છે અને ક્યૂરી તાપમાને શૂન્ય થાય છે.", "D) પરાચુંબકીય પદાર્થો માટે χ તાપમાન સાથે વધે છે."], "correct": 2, "explanation": "લોહચુંબકીય પદાર્થો માટે χ તાપમાન સાથે ઘટે છે અને ક્યૂરી તાપમાને (Curie temperature) શૂન્ય થાય છે. પરાચુંબકીય પદાર્થો માટે χ તાપમાન સાથે ઘટે છે (χ ∝ 1/T). પ્રતિચુંબકીય પદાર્થો માટે χ તાપમાન સાથે બદલાતું નથી. વિકલ્પ A ખોટો છે કારણ કે પરાચુંબકીય પદાર્થો માટે χ તાપમાન સાથે ઘટે છે, પરંતુ તે લોહચુંબકીય પદાર્થોના ગુણધર્મને વર્ણવતું નથી. વિકલ્પ B અને D ખોટા છે કારણ કે તેઓ પ્રતિચુંબકીય અને પરાચુંબકીય પદાર્થોના ગુણધર્મોને યોગ્ય રીતે વર્ણવતા નથી.", "ncert_ref": "Class XII - Chapter 5: ચુંબકત્વ અને ગૉસનો નિયમ", "difficulty": "Hard", "num": 13}, {"question": "એક સોલેનોઇડમાં વિદ્યુતપ્રવાહ I પસાર થાય છે અને તેની અંદર ચુંબકીય ક્ષેત્ર B = μ₀nI છે. જો સોલેનોઇડની અંદર એક લોખંડની છડ મૂકવામાં આવે, તો નીચેનામાંથી કયું વિધાન સત્ય છે?", "options": ["A) લોખંડની છડ ફેરોમેગ્નેટિક છે અને તે સોલેનોઇડના ચુંબકીય ક્ષેત્રને વધારે મજબૂત બનાવે છે.", "B) લોખંડની છડ પેરામેગ્નેટિક છે અને તે સોલેનોઇડના ચુંબકીય ક્ષેત્રને નબળું પાડે છે.", "C) લોખંડની છડ ડાયામેગ્નેટિક છે અને તે સોલેનોઇડના ચુંબકીય ક્ષેત્રને વિરુદ્ધ દિશામાં પ્રેરિત કરે છે.", "D) લોખંડની છડ એન્ટીફેરોમેગ્નેટિક છે અને તે સોલેનોઇડના ચુંબકીય ક્ષેત્રને કોઈ અસર કરતી નથી."], "correct": 0, "explanation": "લોખંડ એક ફેરોમેગ્નેટિક પદાર્થ છે, જે સોલેનોઇડના ચુંબકીય ક્ષેત્રને મજબૂત બનાવે છે. ફેરોમેગ્નેટિક પદાર્થોની ચુંબકીય પ્રવેગ્યતા (χ) ખૂબ જ ઊંચી અને ધન હોય છે, જે ચુંબકીય ક્ષેત્રને વધારે મજબૂત બનાવે છે. વિકલ્પ B, C, અને D ખોટા છે કારણ કે લોખંડ પેરામેગ્નેટિક, ડાયામેગ્નેટિક, અથવા એન્ટીફેરોમેગ્નેટિક નથી.", "ncert_ref": "Class XII - Chapter 5: ચુંબકત્વ અને ગૉસનો નિયમ", "difficulty": "Hard", "num": 14}, {"question": "એક લંબચોરસ લૂપ ABCDને એકસમાન ચુંબકીય ક્ષેત્ર Bમાં એવી રીતે મૂકેલ છે કે લૂપનો સમતલ ચુંબકીય ક્ષેત્રની દિશા સાથે 30°નો ખૂણો બનાવે છે. લૂપમાં I પ્રવાહ પસાર થાય છે. જો લૂપની બાજુઓ AB = CD = l અને AD = BC = b હોય, તો લૂપ પર લાગતું ટોર્ક કેટલું હશે?", "options": ["A) IBlb sin30°", "B) IBlb cos30°", "C) IB(l² + b²) sin30°", "D) 2IB lb sin30°"], "correct": 0, "explanation": "લંબચોરસ લૂપ પર લાગતું ટોર્ક τ = m × B, જ્યાં m = I × A (ચુંબકીય ડાયપોલ મોમેન્ટ) અને A = l × b (લૂપનું ક્ષેત્રફળ). ટોર્કનું પરિમાણ τ = mB sinθ, જ્યાં θ = 30° છે. આથી τ = IBlb sin30° થાય છે. ઓપ્શન B ખોટું છે કારણ કે તે cos30° વાપરે છે, જે ટોર્કના સૂત્રમાં યોગ્ય નથી. ઓપ્શન C ખોટું છે કારણ કે તે l² + b² વાપરે છે, જે ક્ષેત્રફળ નથી. ઓપ્શન D ખોટું છે કારણ કે તે 2IB lb વાપરે છે, જે ડબલ ક્ષેત્રફળ ધરાવે છે, પરંતુ લૂપ એક જ વખત છે.", "ncert_ref": "Class XII - Chapter 5: ચુંબકત્વ અને ગૉસનો નિયમ", "difficulty": "Hard", "num": 15}, {"question": "એક ચુંબકીય પદાર્થનો ચુંબકીય પ્રવેગ્યતા (χ) +0.001 છે. જો આ પદાર્થને એકસમાન ચુંબકીય ક્ષેત્ર B0માં મૂકવામાં આવે, તો પદાર્થની અંદર નિજ ચુંબકીય ક્ષેત્ર B નું મૂલ્ય કેટલું હશે?", "options": ["A) B = B0 (1 + 0.001)", "B) B = B0 / (1 + 0.001)", "C) B = B0 (1 - 0.001)", "D) B = B0 × 0.001"], "correct": 0, "explanation": "ચુંબકીય પ્રવેગ્યતા (χ) ધરાવતા પદાર્થ માટે, અંદરનું ચુંબકીય ક્ષેત્ર B = B0 (1 + χ) થાય છે. અહીં χ = +0.001 હોવાથી, B = B0 (1 + 0.001) થાય. વિકલ્પ A સરખો છે. વિકલ્પ B અને C ખોટા સૂત્રો છે, જ્યારે વિકલ્પ D χ ને ગુણાકાર કરે છે, જે યોગ્ય નથી.", "ncert_ref": "Class XII - Chapter 5: ચુંબકત્વ અને ગૉસનો નિયમ", "difficulty": "Hard", "num": 16}, {"question": "એક ચુંબકીય ડાયપોલ મોમેન્ટ m ધરાવતા ચુંબકીય ડાયપોલને એકસમાન  - 0.01)"], "correct": 0, "explanation": "ચુંબકીય પ્રવેગ્યતા (χ) ધરાવતા પદાર્થ માટે, અંદરનું ચુંબકીય ક્ષેત્ર B' = B(1 + χ) થાય છે. અહીં χ = +0.01 હોવાથી, B' = B(1 + 0.01) થાય. બાકીના વિકલ્પો ખોટા છે કારણ કે તેઓ μ0 અથવા ઋણ ચિહ્નનો ગેરવપરાશ કરે છે.", "ncert_ref": "Class XII - Chapter 5: ચુંબકત્વ અને ગૉસનો નિયમ", "difficulty": "Hard", "num": 21}, {"question": "એક સોલેનોઇડની અંદર ચુંબકીય ક્ષેત્ર B = μ0nI છે. જો સોલેનોઇડની લંબાઈ બમણી કરવામાં આવે અને ફેરાની સંખ્યા અચળ રાખવામાં આવે, તો નવું ચુંબકીય ક્ષેત્ર B' કયું હશે?", "options": ["A) B' = B/2", "B) B' = B", "C) B' = 2B", "D) B' = B/4"], "correct": 0, "explanation": "સોલેનોઇડની લંબાઈ બમણી કરવાથી ફેરાની ઘનતા (n = N/L) અડધી થાય છે. ચુંબકીય ક્ષેત્ર B = μ0nI હોવાથી, નવું ક્ષેત્ર B' = μ0(n/2)I = B/2 થાય છે. બાકીના વિકલ્પો ખોટા છે કારણ કે તેઓ લંબાઈના પ્રભાવને યોગ્ય રીતે ધ્યાનમાં લેતા નથી.", "ncert_ref": "Class XII - Chapter 5: ચુંબકત્વ અને ગૉસનો નિયમ", "difficulty": "Hard", "num": 22}, {"question": "એક ગોળાકાર ગોસિયન સપાટીની ત્રિજ્યા R છે અને તેની અંદર એક વિદ્યુત ડાયપોલ મૂકેલો છે, જેનો ડાયપોલ મોમેન્ટ p છે. જો ડાયપોલનું કેન્દ્ર ગોસિયન સપાટીના કેન્દ્ર પર હોય, તો ગોસિયન સપાટીમાંથી પસાર થતું કુલ વિદ્યુત ફ્લક્સ કેટલું હશે? વધુમાં, જો ડાયપોલને ગોસિયન સપાટીના કેન્દ્રથી સહેજ ખસેડવામાં આવે, તો ફ્લક્સ પર શું અસર થશે?", "options": ["A) ફ્લક્સ શૂન્ય હશે અને ડાયપોલની સ્થિતિ બદલવા પર પણ ફ્લક્સ શૂન્ય જ રહેશે", "B) ફ્લક્સ શૂન્ય હશે, પરંતુ ડાયપોલની સ્થિતિ બદલવા પર ફ્લક્સ બદલાશે", "C) ફ્લક્સ p/ε₀ હશે અને ડાયપોલની સ્થિતિ બદલવા પર ફ્લક્સ બદલાશે નહીં", "D) ફ્લક્સ p/(4πε₀R²) હશે અને ડાયપોલની સ્થિતિ બદલવા પર ફ્લક્સ બદલાશે"], "correct": 0, "explanation": "ગૉસના નિયમ મુજબ, કોઈપણ બંધ સપાટીમાંથી પસાર થતું કુલ વિદ્યુત ફ્લક્સ તે સપાટીની અંદર રહેલા કુલ વિદ્યુતભારના સમપ્રમાણમાં હોય છે. વિદ્યુત ડાયપોલમાં બે સમાન અને વિરુદ્ધ વિદ્યુતભાર હોય છે, તેથી કુલ વિદ્યુતભાર શૂન્ય થાય છે. આથી ગોસિયન સપાટીમાંથી પસાર થતું કુલ ફ્લક્સ શૂન્ય હશે. ડાયપોલની સ્થિતિ બદલવા પર પણ કુલ વિદ્યુતભાર શૂન્ય જ રહે છે, તેથી ફ્લક્સ શૂન્ય જ રહેશે. વિકલ્પ A સિવાયના અન્ય વિકલ્પોમાં ફ્લક્સનું મૂલ્ય અથવા તેની સ્થિતિ પર આધારિતતા ખોટી દર્શાવવામાં આવી છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 1: વિદ્યુતભારો અને ક્ષેત્રો", "difficulty": "Hard", "num": 23}, {"question": "એક લાંબા સુરેખ તારમાંથી વિદ્યુતપ્રવાહ I પસાર થાય છે. તારથી r અંતરે ચુંબકીય ક્ષેત્ર B = (μ₀I)/(2πr) છે. હવે જો તારને એક ગૂંચળામાં વાળીને N ફેરાનું ગૂંચળું બનાવવામાં આવે અને તેમાંથી સમાન વિદ્યુતપ્રવાહ I પસાર કરવામાં આવે, તો ગૂંચળાના કેન્દ્ર પર ચુંબકીય ક્ષેત્ર કેટલું હશે? વધુમાં, જો ગૂંચળાની ત્રિજ્યા બમણી કરવામાં આવે તો ચુંબકીય ક્ષેત્ર પર શું અસર થશે?", "options": ["A) ગૂંચળાના કેન્દ્ર પર ચુંબકીય ક્ષેત્ર B = (μ₀NI)/(2r) હશે અને ત્રિજ્યા બમણી કરતાં ચુંબકીય ક્ષેત્ર અડધું થશે", "B) ગૂંચળાના કેન્દ્ર પર ચુંબકીય ક્ષેત્ર B = (μ₀NI)/(2πr) હશે અને ત્રિજ્યા બમણી કરતાં ચુંબકીય ક્ષેત્ર અડધું થશે", "C) ગૂંચળાના કેન્દ્ર પર ચુંબકીય ક્ષેત્ર B = (μ₀NI)/(r) હશે અને ત્રિજ્યા બમણી કરતાં ચુંબકીય ક્ષેત્ર એક-ચતુર્થાંશ થશે", "D) ગૂંચળાના કેન્દ્ર પર ચુંબકીય ક્ષેત્ર B = (μ₀NI)/(4πr) હશે અને ત્રિજ્યા બમણી કરતાં ચુંબકીય ક્ષેત્ર અડધું થશે"], "correct": 0, "explanation": "એક ગૂંચળાના કેન્દ્ર પર ચુંબકીય ક્ષેત્ર માટેનું સૂત્ર B = (μ₀NI)/(2r) છે, જ્યાં N એ ફેરાની સંખ્યા છે. આ સૂત્ર દર્શાવે છે કે ચુંબકીય ક્ષેત્ર ત્રિજ્યાના વ્યસ્ત પ્રમાણમાં હોય છે. તેથી જો ત્રિજ્યા બમણી કરવામાં આવે, તો ચુંબકીય ક્ષેત્ર અડધું થશે. વિકલ્પ A સિવાયના અન્ય વિકલ્પોમાં ચુંબકીય ક્ષેત્ર માટેનું સૂત્ર અથવા ત્રિજ્યાની અસર ખોટી દર્શાવવામાં આવી છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 4: ગતિમાન વિદ્યુતભારો અને ચુંબકત્વ", "difficulty": "Hard", "num": 24}, {"question": "એક ચુંબકીય પદાર્થનો ચુંબકીય પ્રવેગ્યતા (χ) ઋણ છે અને તેનું મૂલ્ય -0.001 છે. આ પદાર્થને એકસમાન ચુંબકીય ક્ષેત્ર Bમાં મૂકવામાં આવે છે. નીચેનામાંથી કયું વિધાન સાચું છે? વધુમાં, જો આ પદાર્થને ગરમ કરવામાં આવે તો તેની ચુંબકીય પ્રવેગ્યતા પર શું અસર થશે?", "options": ["A) પદાર્થ ડાયામેગ્નેટિક છે અને ગરમ કરતાં તેની ચુંબકીય પ્રવેગ્યતા વધશે (ઋણ મૂલ્ય ઓછું ઋણ થશે)", "B) પદાર્થ પેરામેગ્નેટિક છે અને ગરમ કરતાં તેની ચુંબકીય પ્રવેગ્યતા ઘટશે (ઋણ મૂલ્ય વધુ ઋણ થશે)", "C) પદાર્થ ફેરોમેગ્નેટિક છે અને ગરમ કરતાં તેની ચુંબકીય પ્ર         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
