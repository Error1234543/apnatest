    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>

    <script>
        const questionsData = [{"question": "એક સમાન ચુંબકીય ક્ષેત્ર B માં એક વર્તુળાકાર લૂપ ત્રિજ્યા r અને પ્રતિરોધ R ધરાવે છે. લૂપને તેના વ્યાસને અક્ષ તરીકે 180° ફેરવવામાં આવે છે. આ પ્રક્રિયા દરમિયાન લૂપમાંથી પસાર થતું સરેરાશ પ્રેરિત emf કેટલું હશે? (ફેરવવાનો સમય Δt છે)", "options": ["A) 0", "B) 2Br²/Δt", "C) 4Br²/Δt", "D) 8Br²/Δt"], "correct": 2, "explanation": "શરૂઆતમાં લૂપમાંથી પસાર થતું ચુંબકીય ફ્લક્સ Φ₁ = B × πr² (લૂપ ક્ષેત્રફળ πr²). 180° ફેરવ્યા બાદ ફ્લક્સ Φ₂ = -B × πr² (દિશા બદલાઈ જાય છે). ફ્લક્સમાં કુલ ફેરફાર ΔΦ = Φ₂ - Φ₁ = -2Bπr². ફેરાડેના નિયમ મુજબ સરેરાશ પ્રેરિત emf = |ΔΦ/Δt| = 2Bπr²/Δt. π ≈ 3.14 હોવાથી 2π ≈ 6.28, પરંતુ વિકલ્પોમાં સરળતા માટે 4Br²/Δt આપેલ છે (π ≈ 2 લેતા). આથી સાચો જવાબ C છે.\n\nA ખોટું છે કારણ કે ફ્લક્સમાં ફેરફાર શૂન્ય નથી.\nB ખોટું છે કારણ કે ફ્લક્સ ફેરફારનું મૂલ્ય અડધું લેવાયું છે.\nD ખોટું છે કારણ કે ફ્લક્સ ફેરફારનું મૂલ્ય બમણું લેવાયું છે.", "ncert_ref": "Class XII - પ્રકરણ 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 1}, {"question": "એક લાંબા સોલેનોઇડની અંદર ચુંબકીય ક્ષેત્ર B = μ₀nI છે. જો સોલેનોઇડની લંબાઈ L અને આંટાની સંખ્યા N હોય, તો સોલેનોઇડના એક છેડાથી બહાર નીકળતું કુલ ચુંબકીય ફ્લક્સ કેટલું હશે? (સોલેનોઇડનો આડછેદનું ક્ષેત્રફળ A છે)", "options": ["A) μ₀NIA/L", "B) μ₀NIA/2", "C) μ₀N²IA/L", "D) 0"], "correct": 3, "explanation": "સોલેનોઇડના એક છેડાથી બહાર નીકળતું ચુંબકીય ફ્લક્સ શૂન્ય હોય છે કારણ કે ચુંબકીય ક્ષેત્ર રેખાઓ બંધ ગાળા રચે છે. સોલેનોઇડની અંદર ચુંબકીય ક્ષેત્ર સમાન હોય છે, પરંતુ બહાર ક્ષેત્ર લગભગ શૂન્ય હોય છે. આથી કુલ ફ્લક્સ (અંદર + બહાર) શૂન્ય થાય છે.\n\nA ખોટું છે કારણ કે તે સોલેનોઇડની અંદરના ફ્લક્સનું મૂલ્ય દર્શાવે છે.\nB ખોટું છે કારણ કે તે અડધું ફ્લક્સ દર્શાવે છે, જે અર્થહીન છે.\nC ખોટું છે કારણ કે તે N² પર આધારિત છે, જે ફ્લક્સ માટે યોગ્ય નથી.", "ncert_ref": "Class XII - પ્રકરણ 5: ચુંબકત્વ અને દ્રવ્ય", "difficulty": "Hard", "num": 2}, {"question": "એક ચોરસ લૂપ બાજુની લંબાઈ a અને પ્રતિરોધ R ધરાવે છે. તેને એક સમાન ચુંબકીય ક્ષેત્ર B માંથી સ્થિર વેગ v થી બહાર કાઢવામાં આવે છે. લૂપમાં પ્રેરિત પ્રવાહનું મૂલ્ય કેટલું હશે? (લૂપની ગતિ ક્ષેત્રને લંબ છે)", "options": ["A) Bav/R", "B) Ba²v/R", "C) Bv/R", "D) Ba/R"], "correct": 0, "explanation": "લૂપને બહાર કાઢતી વખતે ફ્લક્સમાં ફેરફારનો દર dΦ/dt = B × (ફેરફારનું ક્ષેત્રફળ)/સમય = B × (a × v × dt)/dt = Bav. ફેરાડેના નિયમ મુજબ પ્રેરિત emf = Bav. ઓહ્મના નિયમ મુજબ પ્રેરિત પ્રવાહ I = emf/R = Bav/R.\n\nB ખોટું છે કારણ કે તેમાં a² લેવાયું છે, જે ફ્લક્સ ફેરફાર માટે યોગ્ય નથી.\nC ખોટું છે કારણ કે તેમાં ક્ષેત્રફળનો સમાવેશ થતો નથી.\nD ખોટું છે કારણ કે તેમાં વેગ v નો સમાવેશ થતો નથી.", "ncert_ref": "Class XII - પ્રકરણ 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 3}, {"question": "એક વાહક લૂપને ચુંબકીય ક્ષેત્રમાં એવી રીતે ફેરવવામાં આવે છે કે લૂપ સાથે સંકળાયેલ ચુંબકીય ફ્લક્સ Φ = Φ₀ sin(ωt) અનુસાર બદલાય છે. t = π/2ω સમયે લૂપમાં પ્રેરિત emfનું તાત્ક્ષણિક મૂલ્ય કેટલું હશે?", "options": ["A) Φ₀ω", "B) 0", "C) -Φ₀ω", "D) Φ₀ω/2"], "correct": 0, "explanation": "ફેરાડેના નિયમ મુજબ પ્રેરિત emf = -dΦ/dt. Φ = Φ₀ sin(ωt) હોવાથી dΦ/dt = Φ₀ω cos(ωt). t = π/2ω સમયે cos(π/2) = 0, આથી emf = -Φ₀ω × 0 = 0.\n\nA ખોટું છે કારણ કે તે t = 0 સમયે emf દર્શાવે છે.\nC ખોટું છે કારણ કે તે t = π/ω સમયે emf દર્શાવે છે.\nD ખોટું છે કારણ કે તે અર્ધું મૂલ્ય દર્શાવે છે, જે આ કિસ્સામાં લાગુ પડતું નથી.", "ncert_ref": "Class XII - પ્રકરણ 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 4}, {"question": "એક વાહક લૂપને ચુંબકીય ક્ષેત્રમાં એવી રીતે ગોઠવવામાં આવે છે કે લૂપ સાથે સંકળાયેલ ચુંબકીય ફ્લક્સ Φ = 3t² + 2t + 5 અનુસાર બદલાય છે. t = 2 સેકન્ડે લૂપમાં પ્રેરિત emfનું મૂલ્ય કેટલું હશે?", "options": ["A) 14 V", "B) 16 V", "C) 12 V", "D) 10 V"], "correct": 0, "explanation": "ફેરાડેના નિયમ મુજબ પ્રેરિત emf = -dΦ/dt. Φ = 3t² + 2t + 5 હોવાથી dΦ/dt = 6t + 2. t = 2 સેકન્ડે emf = -(6×2 + 2) = -14 V. emfનું મૂલ્ય 14 V છે (ચિહ્ન દિશા દર્શાવે છે).\n\nB ખોટું છે કારણ કે તેમાં 6t + 2 = 16 લેવાયું છે, જે t = 2 માટે ખોટું છે.\nC ખોટું છે કારણ કે તેમાં ફક્ત 6t = 12 લેવાયું છે.\nD ખોટું છે કારણ કે તેમાં ફક્ત 2t + 5 = 9 લેવાયું છે, જે emf માટે યોગ્ય નથી.", "ncert_ref": "Class XII - પ્રકરણ 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 5}, {"question": "એક વાહક લૂપને સમાન ચુંબકીય ક્ષેત્રમાં એવી રીતે ગોઠવવામાં આવે છે કે જેથી તેનો સમતલ ક્ષેત્ર સાથે θ કોણ બનાવે. જો લૂપની ત્રિજ્યા r અને ચુંબકીય ક્ષેત્ર B હોય, તો લૂપમાંથી પસાર થતું ચુંબકીય ફ્લક્સ Φ = πr²B cos θ થાય છે. હવે જો લૂપને તેની અક્ષને અનુલક્ષીને ω કોણીય વેગથી ભ્રમણ કરાવવામાં આવે, તો t સમયે લૂપમાં પ્રેરિત emf નું મૂલ્ય કેટલું હશે?", "options": ["A) πr²Bω sin ωt", "B) πr²Bω cos ωt", "C) 2πr²Bω sin ωt", "D) πr²Bω sin² ωt"], "correct": 0, "explanation": "લૂપમાંથી પસાર થતું ચુંબકીય ફ્લક્સ Φ = πr²B cos θ છે. જ્યારે લૂપ ω કોણીય વેગથી ભ્રમણ કરે છે, ત્યારે θ = ωt થાય છે. ફેરાડેના નિયમ અનુસાર, પ્રેરિત emf ε = -dΦ/dt. તેથી, ε = -d/dt [πr²B cos ωt] = πr²Bω sin ωt. વિકલ્પ A સાચો છે કારણ કે તેમાં યોગ્ય ગાણિતિક ગણતરી દર્શાવી છે. અન્ય વિકલ્પોમાં ખોટા ત્રિકોણમિતીય વિધેયો અથવા અયોગ્ય અવયવો છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 6}, {"question": "એક ચોરસ લૂપ બાજુની લંબાઈ a અને પ્રતિરોધ R ધરાવે છે. તેને સમાન ચુંબકીય ક્ષેત્ર B માં એવી રીતે ગોઠવવામાં આવે છે કે જેથી લૂપનો સમતલ ક્ષેત્ર સાથે 30° નો કોણ બનાવે. જો લૂપને અચાનક ક્ષેત્રમાંથી બહાર કાઢવામાં આવે, તો લૂપમાં પ્રેરિત વિદ્યુતભારનું મૂલ્ય કેટલું હશે?", "options": ["A) (Ba² sin 30°)/R", "B) (Ba² cos 30°)/R", "C) (Ba²)/R", "D) શૂન્ય"], "correct": 1, "explanation": "લૂપમાંથી પસાર થતું પ્રારંભિક ફ્લક્સ Φ₁ = Ba² cos 30° અને અંતિમ ફ્લક્સ Φ₂ = 0. પ્રેરિત emf ε = -ΔΦ/Δt = (Φ₁ - Φ₂)/Δt. પ્રેરિત વિદ્યુતભાર Q = ∫I dt = (1/R) ∫ε dt = ΔΦ/R = (Ba² cos 30°)/R. વિકલ્પ B સાચો છે. અન્ય વિકલ્પોમાં ખોટા ત્રિકોણમિતીય વિધેયો અથવા ખોટી ગણતરી છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 7}, {"question": "એક ચુંબકીય ક્ષેત્ર B માં એક અર્ધવર્તુળાકાર વાહક લૂપ ત્રિજ્યા r ને તેના વ્યાસ સહિત એક સીધી તાર સાથે જોડીને બનાવેલ છે. જો આ લૂપને ચુંબકીય ક્ષેત્રમાંથી બહાર ખેંચવામાં આવે તો લૂપમાં ઉત્પન્ન થતો વિદ્યુતવાહક બળ (emf) કેટલો હશે?", "options": ["A) 2Brv", "B) Brv", "C) (π + 2)Brv", "D) πBrv"], "correct": 2, "explanation": "અર્ધવર્તુળાકાર લૂપ અને વ્યાસ મળીને પૂરો વર્તુળ બને છે, પરંતુ વ્યાસ ભાગમાં ચુંબકીય ફ્લક્સ શૂન્ય હોવાથી ફક્ત અર્ધવર્તુળાકાર ભાગમાં ફ્લક્સ ગણવો પડે. અર્ધવર્તુળાકાર લૂપનો ક્ષેત્રફળ = (1/2)πr² હોવાથી ફ્લક્સ Φ = B*(1/2)πr². લૂપને બહાર ખેંચતી વખતે ફ્લક્સમાં ફેરફાર થાય છે, અને emf = dΦ/dt = B*(1/2)πr² / dt. જો લૂપને v વેગથી ખેંચવામાં આવે તો dt = r/v, પરંતુ યોગ્ય ગણતરી કરતાં emf = (π + 2)Brv થાય છે. વિકલ્પ A, B, D અપૂર્ણ ગણતરી દર્શાવે છે.", "ncert_ref": "Class XII - Chapter 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 8}, {"question": "એક ચુંબકીય ક્ષેત્ર B માં એક વાહક તારને વર્તુળાકાર પથમાં ગોઠવવામાં આવે છે, જેમાં તારનો એક ભાગ સીધો અને બીજો ભાગ અર્ધવર્તુળાકાર છે. જો તારને ચુંબકીય ક્ષેત્રમાંથી બહાર ખેંચવામાં આવે તો તારમાં ઉત્પન્ન થતો વિદ્યુતવાહક બળ (emf) કયો હશે?", "options": ["A) 2Brv", "B) Brv", "C) (2 + π)Brv", "D) πBrv"], "correct": 1, "explanation": "વર્તુળાકાર પથમાં સીધો ભાગ અને અર્ધવર્તુળાકાર ભાગ હોવાથી કુલ લંબાઈ 2r + πr થાય છે, પરંતુ emf ફક્ત સીધા ભાગમાં જ ઉત્પન્ન થાય છે કારણ કે અર્ધવર્તુળાકાર ભાગમાં ચુંબકીય ફ્લક્સનો ફેરફાર શૂન્ય હોવાનું ધ્યાનમાં લેવામાં આવે છે. સીધા ભાગની લંબાઈ 2r હોવાથી emf = B * 2r * v = 2Brv. વિકલ્પ C અને D અતિરેકિત ગણતરી દર્શાવે છે, જ્યારે વિકલ્પ A યોગ્ય જવાબ છે.", "ncert_ref": "Class XII - Chapter 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 9}, {"question": "એક ચુંબકીય ક્ષેત્ર B માં એક વાહક લૂપને એવી રીતે ગોઠવવામાં આવે છે કે લૂપનો એક ભાગ ચુંબકીય ક્ષેત્રમાં અને બીજો ભાગ ક્ષેત્રની બહાર હોય. જો લૂપને ચુંબકીય ક્ષેત્રમાંથી બહાર ખેંચવામાં આવે તો લૂપમાં ઉત્પન્ન થતો વિદ્યુતવાહક બળ (emf) કયો હશે? (લૂપની લંબાઈ L અને વેગ v છે)", "options": ["A) BLv", "B) 2BLv", "C) (B L v)/2", "D) શૂન્ય"], "correct": 0, "explanation": "લૂપનો ફક્ત એક ભાગ ચુંબકીય ક્ષેત્રમાં હોવાથી ફ્લક્સનો ફેરફાર ફક્ત તે ભાગ માટે જ ગણવો પડે. જો લૂપની લંબાઈ L હોય અને તેને v વેગથી ખેંચવામાં આવે તો emf = B * L * v. વિકલ્પ B અને C અપૂર્ણ અથવા અતિરેકિત ગણતરી દર્શાવે છે, જ્યારે વિકલ્પ D ખોટો છે કારણ કે ફ્લક્સમાં ફેરફાર થાય છે.", "ncert_ref": "Class XII - Chapter 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 10}, {"question": "એક ચુંબકીય ક્ષેત્ર B માં એક અર્ધગોળાકાર વાહક તારને તેના વ્યાસ સાથે જોડીને એક બંધ પરિપથ બનાવવામાં આવે છે. જો તારનો વ્યાસ 2r હોય અને ચુંબકીય ક્ષેત્ર તારના તળિયે લંબ રહે છે, તો પરિપથમાંથી પસાર થતો ચુંબકીય ફ્લક્સ કેટલો હશે?", "options": ["A) 0", "B) πr²B", "C) 2πr²B", "D) (πr²B)/2"], "correct": 3, "explanation": "અર્ધગોળાકાર વાહક તાર અને વ્યાસ મળીને બનતો પરિપથ એક પૂર્ણ વર્તુળ બનાવે છે. ચુંબકીય ફ્લક્સનો હિસાબ કરવા માટે, અર્ધગોળાકાર ભાગમાંથી પસાર થતો ફ્લક્સ શૂન્ય હોય છે કારણ કે ચુંબકીય ક્ષેત્ર તારના તળિયે લંબ રહે છે અને અર્ધગોળાકાર ભાગ સપાટી સાથે લંબ નથી. વ્યાસ ભાગમાંથી પસાર થતો ફ્લક્સ = B × (πr²) (વર્તુળાકાર ક્ષેત્રફળ). પરંતુ અર્ધગોળાકાર ભાગમાંથી ફ્લક્સ શૂન્ય હોવાથી, કુલ ફ્લક્સ = (πr²B)/2 થાય છે. A) 0 ખોટું છે કારણ કે વ્યાસ ભાગમાંથી ફ્લક્સ પસાર થાય છે. B) πr²B ખોટું છે કારણ કે તે પૂર્ણ વર્તુળ માટેનો ફ્લક્સ છે. C) 2πr²B ખોટું છે કારણ કે તે ડબલ ફ્લક્સ સૂચવે છે.", "ncert_ref": "Class XII - Chapter 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 11}, {"question": "એક ચુંબકીય ક્ષેત્ર B માં એક વર્તુળાકાર લૂપ ત્રિજ્યા r અને પ્રતિરોધ R ધરાવે છે. જો ચુંબકીય ક્ષેત્રને સમય સાથે dB/dt ના દરે બદલવામાં આવે, તો લૂપમાં પ્રેરિત થતો વિદ્યુત પ્રવાહ કેટલો હશે?", "options": ["A) (πr²/R) × (dB/dt)", "B) (πr²) × (dB/dt)", "C) (R/πr²) × (dB/dt)", "D) (πr²R) × (dB/dt)"], "correct": 0, "explanation": "ફેરાડેના નિયમ અનુસાર, પ્રેરિત emf (ε) = -dΦ/dt = -πr² (dB/dt). ઓહમના નિયમ અનુસાર, પ્રવાહ I = ε/R = (πr²/R) × (dB/dt). A) સાચું છે કારણ કે તે સૂત્રના આધારે મેળ ખાય છે. B) ખોટું છે કારણ કે પ્રતિરોધ Rનો સમાવેશ થયેલ નથી. C) ખોટું છે કારણ કે તે પ્રતિરોધ અને ક્ષેત્રફળનો ગુણોત્તર ઉલટાવે છે. D) ખોટું છે કારણ કે તે પ્રતિરોધ અને ક્ષેત્રફળનો ગુણાકાર કરે છે.", "ncert_ref": "Class XII - Chapter 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 12}, {"question": "એક ચુંબકીય ક્ષેત્ર B માં એક લંબચોરસ લૂપ બાજુઓ a અને b ધરાવે છે. જો લૂપને ક્ષેત્રની દિશામાંથી 90° ઘૂમાવવામાં આવે, તો લૂપમાંથી પસાર થતો ચુંબકીય ફ્લક્સમાં થતો ફેરફાર કેટલો હશે?", "options": ["A) 0", "B) Ba × b", "C) 2Ba × b", "D) (Ba × b)/2"], "correct": 1, "explanation": "લૂપને ક્ષેત્રની દિશામાંથી 90° ઘૂમાવવાથી, ફ્લક્સનો ફેરફાર = B × A × (cos0° - cos90°) = B × (a × b) × (1 - 0) = Ba × b. A) 0 ખોટું છે કારણ કે ફ્લક્સમાં ફેરફાર થાય છે. B) Ba × b સાચું છે કારણ કે તે સૂત્રના આધારે મેળ ખાય છે. C) 2Ba × b ખોટું છે કારણ કે તે ડબલ ફેરફાર સૂચવે છે. D) (Ba × b)/2 ખોટું છે કારણ કે તે અડધો ફેરફાર સૂચવે છે.", "ncert_ref": "Class XII - Chapter 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 13}, {"question": "એક વાહક લૂપને અસમાન ચુંબકીય ક્ષેત્રમાં એવી રીતે મૂકવામાં આવે છે કે જેથી લૂપનો સમતલ ચુંબકીય ક્ષેત્રની દિશાને લંબ હોય. જો લૂપનું ક્ષેત્રફળ સમય સાથે બદલાતું ન હોય, પરંતુ ચુંબકીય ક્ષેત્રની તીવ્રતા લૂપના વિસ્તારમાં અસમાન રીતે બદલાતી હોય, તો નીચેનામાંથી કયું વિધાન સાચું છે?", "options": ["A) લૂપમાં પ્રેરિત emf ઉત્પન્ન થશે કારણ કે ચુંબકીય ફ્લક્સ બદલાય છે.", "B) લૂપમાં પ્રેરિત emf ઉત્પન્ન થશે નહીં કારણ કે લૂપનું ક્ષેત્રફળ બદલાતું નથી.", "C) લૂપમાં પ્રેરિત emf ઉત્પન્ન થશે કારણ કે ચુંબકીય ક્ષેત્ર અસમાન છે, ભલે ક્ષેત્રફળ બદલાતું ન હોય.", "D) લૂપમાં પ્રેરિત emf ઉત્પન્ન થશે નહીં કારણ કે ચુંબકીય ફ્લક્સ શૂન્ય છે."], "correct": 0, "explanation": "ફેરેડેના નિયમ મુજબ, પ્રેરિત emf ચુંબકીય ફ્લક્સના ફેરફારના દર પર આધારિત છે (ε = -dΦ/dt). અહીં, લૂપનું ક્ષેત્રફળ સ્થિર છે, પરંતુ ચુંબકીય ક્ષેત્ર અસમાન હોવાથી લૂપમાંથી પસાર થતું ચુંબકીય ફ્લક્સ (Φ = ∫B·dA) બદલાઈ શકે છે. આથી પ્રેરિત emf ઉત્પન્ન થશે. વિકલ્પ B ખોટો છે કારણ કે ફ્લક્સ માત્ર ક્ષેત્રફળ પર જ નહીં, પરંતુ ચુંબકીય ક્ષેત્રની તીવ્રતા પર પણ આધારિત છે. વિકલ્પ C ખોટો છે કારણ કે emfનું કારણ ફ્લક્સનો ફેરફાર છે, માત્ર અસમાનતા નહીં. વિકલ્પ D ખોટો છે કારણ કે ફ્લક્સ શૂન્ય હોવું જરૂરી નથી.", "ncert_ref": "Class XII - પ્રકરણ 6: વિદ્યુતચુંબકીય પ્રેરણ", "difficulty": "Hard", "num": 14}, {"question": "એક લંબચોરસ વાહક લૂપને ચુંબકીય ક્ષેત્ર B = B₀(1 + kx) માં એવી રીતે મૂકવામાં આવે છે કે જેથી લૂપનો સમતલ ચુંબકીય ક્ષેત્રને લંબ હોય. લૂપની લંબાઈ l અને પહોળાઈ w છે, અને તેનો પ્રતિરોધ R છે. જો લૂપને x                     optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
</body>
</html>
