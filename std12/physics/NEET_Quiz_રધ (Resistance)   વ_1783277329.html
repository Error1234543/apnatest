<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - રોધ (Resistance) – વિદ્યુત પ્રવાહનો વિરોધ કરતો ગુણધર્મ.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 રોધ (Resistance) – વિદ્યુત પ્રવાહનો વિરોધ કરતો ગુણધર્મ.</span>
                <span>🎯 Hard</span>
                <span>📝 30 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "એક તારના તાપમાનમાં વૃદ્ધિ કરતાં તેની વિદ્યુત રોધમાં કેવો ફેરફાર થાય છે?", "options": ["A) રોધ ઘટે છે કારણ કે અણુઓની ગતિ ઘટે છે", "B) રોધ વધે છે કારણ કે અણુઓની ગતિ વધે છે અને અથડામણો વધે છે", "C) રોધ અચળ રહે છે કારણ કે તાપમાનનો રોધ પર કોઈ પ્રભાવ પડતો નથી", "D) રોધ ઘટે છે કારણ કે ઇલેક્ટ્રોનની ગતિ વધે છે"], "correct": 1, "explanation": "રોધ વધે છે કારણ કે તાપમાન વધવાથી અણુઓની ગતિ વધે છે, જેના કારણે ઇલેક્ટ્રોનને અથડામણોનો સામનો કરવો પડે છે, પરિણામે રોધ વધે છે. A) ખોટું છે કારણ કે અણુઓની ગતિ ઘટતી નથી, ઉલટ વૃદ્ધિ પામે છે. C) ખોટું છે કારણ કે તાપમાનનો રોધ પર સીધો પ્રભાવ પડે છે. D) ખોટું છે કારણ કે ઇલેક્ટ્રોનની ગતિ વધવાથી રોધ ઘટતો નથી, પરંતુ અથડામણો વધવાથી રોધ વધે છે.", "ncert_ref": "Class XII - પ્રકરણ 3: વિદ્યુત પ્રવાહ", "difficulty": "Hard", "num": 1}, {"question": "એક સુવાહક તારનો વિદ્યુત રોધ તેની લંબાઈના સીધા પ્રમાણમાં અને અનુપ્રસ્થ ક્ષેત્રફળના વ્યસ્ત પ્રમાણમાં હોય છે. જો તારની લંબાઈ દોઢ ગણી કરવામાં આવે અને તેનું અનુપ્રસ્થ ક્ષેત્રફળ અડધું કરવામાં આવે, તો નવો રોધ મૂળ રોધના કેટલા ગણો થશે?", "options": ["A) 1.5 ગણો", "B) 3 ગણો", "C) 2 ગણો", "D) 4.5 ગણો"], "correct": 1, "explanation": "રોધ R = ρL/A, જ્યાં L = લંબાઈ, A = અનુપ્રસ્થ ક્ષેત્રફળ. મૂળ રોધ R₁ = ρL/A. નવો રોધ R₂ = ρ(1.5L)/(0.5A) = 3ρL/A = 3R₁. A) ખોટું છે કારણ કે લંબાઈ અને ક્ષેત્રફળ બંનેમાં ફેરફાર થયો છે. C) ખોટું છે કારણ કે ગણિતી ગણતરી અનુસાર 3 ગણો થાય છે. D) ખોટું છે કારણ કે 1.5/0.5 = 3, 4.5 નહીં.", "ncert_ref": "Class XII - પ્રકરણ 3: વિદ્યુત પ્રવાહ", "difficulty": "Hard", "num": 2}, {"question": "નીચેનામાંથી કયો પદાર્થ ઓહ્મના નિયમનું પાલન કરતો નથી?", "options": ["A) તાંબું", "B) એલ્યુમિનિયમ", "C) સિલિકોન", "D) ચાંદી"], "correct": 2, "explanation": "સિલિકોન એક અર્ધવાહક છે, જે ઓહ્મના નિયમનું પાલન કરતો નથી કારણ કે તેનો રોધ તાપમાન, પ્રકાશ અને અશુદ્ધિઓ પર આધાર રાખે છે. A, B, D ખોટા છે કારણ કે તાંબું, એલ્યુમિનિયમ અને ચાંદી ઓહ્મિક પદાર્થો છે, જે ઓહ્મના નિયમનું પાલન કરે છે.", "ncert_ref": "Class XII - પ્રકરણ 3: વિદ્યુત પ્રવાહ", "difficulty": "Hard", "num": 3}, {"question": "એક વિદ્યુત પરિપથમાં, જો વોલ્ટેજ અચળ રાખીને રોધ બમણો કરવામાં આવે, તો વિદ્યુત પ્રવાહ પર શું અસર થશે?", "options": ["A) પ્રવાહ બમણો થશે", "B) પ્રવાહ અડધો થશે", "C) પ્રવાહ અચળ રહેશે", "D) પ્રવાહ ચાર ગણો થશે"], "correct": 1, "explanation": "ઓહ્મના નિયમ અનુસાર, V = IR. જો V અચળ રહે અને R બમણો થાય, તો I = V/R અડધો થશે. A, C, D ખોટા છે કારણ કે પ્રવાહ વોલ્ટેજ અને રોધના વ્યસ્ત પ્રમાણમાં હોય છે.", "ncert_ref": "Class XII - પ્રકરણ 3: વિદ્યુત પ્રવાહ", "difficulty": "Hard", "num": 4}, {"question": "નીચેનામાંથી કયો કથન રોધ અને રોધકતા વિશે સાચો છે?", "options": ["A) રોધકતા એ પદાર્થનો ગુણધર્મ છે, જ્યારે રોધ એ તારનો ગુણધર્મ છે", "B) રોધ અને રોધકતા બંને તારના આકાર પર આધાર રાખે છે", "C) રોધકતા એ તાપમાન પર આધાર રાખતી નથી", "D) રોધ એ પદાર્થનો ગુણધર્મ છે, જ્યારે રોધકતા એ તારનો ગુણધર્મ છે"], "correct": 0, "explanation": "રોધકતા (ρ) એ પદાર્થનો ગુણધર્મ છે, જ્યારે રોધ (R) એ તારનો ગુણધર્મ છે, જે તેના આકાર (લંબાઈ અને ક્ષેત્રફળ) પર આધાર રાખે છે. B) ખોટું છે કારણ કે રોધકતા તારના આકાર પર આધાર રાખતી નથી. C) ખોટું છે કારણ કે રોધકતા તાપમાન પર આધાર રાખે છે. D) ખોટું છે કારણ કે રોધ એ તારનો ગુણધર્મ છે, જ્યારે રોધકતા એ પદાર્થનો ગુણધર્મ છે.", "ncert_ref": "Class XII - પ્રકરણ 3: વિદ્યુત પ્રવાહ", "difficulty": "Hard", "num": 5}, {"question": "એક તારને ખેંચીને તેની લંબાઈ બમણી કરવામાં આવે છે, તો તેના વિદ્યુત રોધ પર શું અસર થશે? (ધારો કે તારનું ઘનત્વ અને પ્રકૃતિ અચળ રહે છે)", "options": ["A) રોધ ચાર ગણો થશે", "B) રોધ અડધો થશે", "C) રોધ બમણો થશે", "D) રોધ અચળ રહેશે"], "correct": 0, "explanation": "તારને ખેંચવાથી તેની લંબાઈ બમણી થાય છે અને અનુપ્રસ્થ ક્ષેત્રફળ અડધું થાય છે. રોધ (R) લંબાઈ (L)ના સીધા પ્રમાણમાં અને અનુપ્રસ્થ ક્ષેત્રફળ (A)ના વ્યસ્ત પ્રમાણમાં હોય છે, એટલે કે R ∝ L/A. લંબાઈ બમણી અને ક્ષેત્રફળ અડધું થવાથી રોધ ચાર ગણો થશે. બાકીના વિકલ્પો ગણિતી રીતે ખોટા છે.", "ncert_ref": "Class XII - Chapter 3: વિદ્યુત પ્રવાહ", "difficulty": "Hard", "num": 6}, {"question": "નીચેનામાંથી કયો પદાર્થ તાપમાન વધારવાથી તેનો રોધ ઘટે છે?", "options": ["A) તાંબું", "B) લોખંડ", "C) કાર્બન", "D) અર્ધસુવાહક"], "correct": 3, "explanation": "અર્ધસુવાહકોમાં તાપમાન વધારવાથી મુક્ત ઇલેક્ટ્રોનની સંખ્યા વધે છે, જેથી રોધ ઘટે છે. તાંબું, લોખંડ અને કાર્બન જેવા સુવાહકો અને અસુવાહકોનું તાપમાન વધારવાથી રોધ વધે છે. આથી અર્ધસુવાહક જ એવો પદાર્થ છે જેનો રોધ તાપમાન વધારવાથી ઘટે છે.", "ncert_ref": "Class XII - Chapter 3: વિદ્યુત પ્રવાહ", "difficulty": "Hard", "num": 7}, {"question": "એક રોધક તારનો રોધ 10 Ω છે. જો તેને બે સરખા ભાગમાં કાપીને તેને સમાંતર ક્રમમાં જોડવામાં આવે, તો સંયુક્ત રોધ કેટલો થશે?", "options": ["A) 2.5 Ω", "B) 5 Ω", "C) 10 Ω", "D) 20 Ω"], "correct": 0, "explanation": "તારને બે સરખા ભાગમાં કાપવાથી પ્રત્યેક ભાગનો રોધ 5 Ω થશે (કેમ કે રોધ લંબાઈના સીધા પ્રમાણમાં હોય છે). જ્યારે આ બે રોધકોને સમાંતર ક્રમમાં જોડવામાં આવે, તો સંયુક્ત રોધ 1/R = 1/5 + 1/5 = 2/5 થાય, જેથી R = 2.5 Ω થાય. બાકીના વિકલ્પો ગણિતી રીતે ખોટા છે.", "ncert_ref": "Class XII - Chapter 3: વિદ્યુત પ્રવાહ", "difficulty": "Hard", "num": 8}, {"question": "નીચેનામાંથી કયો કથન રોધકતા (ρ) વિશે સાચો નથી?", "options": ["A) રોધકતા એ પદાર્થનો ગુણધર્મ છે", "B) રોધકતા તાપમાન પર આધાર રાખે છે", "C) રોધકતા એ સદિશ રાશિ છે", "D) રોધકતાનું એકમ Ω-m છે"], "correct": 2, "explanation": "રોધકતા (ρ) એ પદાર્થનો અદિશ ગુણધર્મ છે, તાપમાન પર આધાર રાખે છે અને તેનું એકમ Ω-m છે. આથી વિકલ્પ C ખોટો છે કેમ કે રોધકતા સદિશ રાશિ નથી.", "ncert_ref": "Class XII - Chapter 3: વિદ્યુત પ્રવાહ", "difficulty": "Hard", "num": 9}, {"question": "એક વિદ્યુત પરિપથમાં, જો વોલ્ટેજ અને રોધ બંને બમણા કરવામાં આવે, તો વિદ્યુત શક્તિ (P) પર શું અસર થશે?", "options": ["A) શક્તિ અચળ રહેશે", "B) શક્તિ બમણી થશે", "C) શક્તિ ચાર ગણી થશે", "D) શક્તિ અડધી થશે"], "correct": 1, "explanation": "વિદ્યુત શક્તિ P = V²/R. જો વોલ્ટેજ (V) બમણું કરવામાં આવે અને રોધ (R) બમણો કરવામાં આવે, તો નવી શક્તિ P' = (2V)² / (2R) = 4V² / 2R = 2 (V²/R) = 2P થશે. આથી શક્તિ બમણી થશે. બાકીના વિકલ્પો ગણિતી રીતે ખોટા છે.", "ncert_ref": "Class XII - Chapter 3: વિદ્યુત પ્રવાહ", "difficulty": "Hard", "num": 10}, {"question": "એક ધાતુના તારને ગરમ કરતાં તેનો રોધ વધે છે, પરંતુ અર્ધવાહક પદાર્થમાં તાપમાન વધારવાથી રોધ ઘટે છે. આ વર્તણૂકનો મુખ્ય કારણ કયો છે?", "options": ["A) ધાતુઓમાં ઇલેક્ટ્રોનની ગતિશીલતા તાપમાન વધવાથી ઘટે છે, જ્યારે અર્ધવાહકોમાં ઇલેક્ટ્રોન-હોલ યુગ્મોની સંખ્યા વધે છે.", "B) ધાતુઓમાં અણુઓની કંપન આંકડો ઘટે છે, જ્યારે અર્ધવાહકોમાં ઇલેક્ટ્રોનની સંખ્યા ઘટે છે.", "C) ધાતુઓમાં પ્રોટોનની ગતિ વધે છે, જ્યારે અર્ધવાહકોમાં ઇલેક્ટ્રોનની ગતિ ઘટે છે.", "D) ધાતુઓમાં ઇલેક્ટ્રોનની સંખ્યા ઘટે છે, જ્યારે અર્ધવાહકોમાં અણુઓની કંપન આંકડો વધે છે."], "correct": 0, "explanation": "ધાતુઓમાં તાપમાન વધવાથી અણુઓની કંપન ગતિ વધે છે, જે ઇલેક્ટ્રોનની ગતિશીલતાને ઘટાડે છે, પરિણામે રોધ વધે છે. અર્ધવાહકોમાં તાપમાન વધવાથી ઇલેક્ટ્રોન-હોલ યુગ્મોની સંખ્યા વધે છે, જે વાહકતા વધારીને રોધ ઘટાડે છે. બાકીના વિકલ્પો ભૌતિક રીતે અયોગ્ય છે.", "ncert_ref": "Class XII - Chapter 3: વિદ્યુત પ્રવાહ", "difficulty": "Hard", "num": 11}, {"question": "એક રોધક તારનો રોધ 20 Ω છે. જો તેની લંબાઈ અડધી કરીને અને ત્રિજ્યા બમણી કરવામાં આવે, તો નવો રોધ કેટલો થશે?", "options": ["A) 5 Ω", "B) 10 Ω", "C) 2.5 Ω", "D) 1.25 Ω"], "correct": 2, "explanation": "રોધ R = ρL/A, જ્યાં A = πr². લંબાઈ અડધી (L/2) અને ત્રિજ્યા બમણી (2r) કરવાથી નવું ક્ષેત્રફળ A' = π(2r)² = 4πr² થાય. નવો રોધ R' = ρ(L/2)/(4πr²) = (ρL/πr²) * (1/8) = R/8 = 20/8 = 2.5 Ω. બાકીના વિકલ્પો ગણતરીમાં ચૂક છે.", "ncert_ref": "Class XII - Chapter 3: વિદ્યુત પ્રવાહ", "difficulty": "Hard", "num": 12}, {"question": "નીચેનામાંથી કયો કથન રોધકતા (ρ) અને તાપમાનના સંબંધ વિશે સાચો છે?", "options": ["A) ધાતુઓ માટે ρ = ρ₀(1 + αΔT), જ્યાં α નકારાત્મક છે.", "B) અર્ધવાહકો માટે ρ તાપમાન વધવાથી ઘટે છે, કારણ કે વાહકતા ઇલેક્ટ્રોન-હોલ યુગ્મો પર આધાર રાખે છે.", "C) સુપરકન્ડક્ટરો માટે ρ તાપમાન શૂન્ય થાય તે પહેલાં અચળ રહે છે.", "D) મિશ્ર ધાતુઓ માટે ρ તાપમાન સાથે લગભગ અચળ રહે છે."], "correct": 1, "explanation": "અર્ધવાહકોમાં તાપમાન વધવાથી ઇલેક્ટ્રોન-હોલ યુગ્મોની સંખ્યા વધે છે, જે વાહકતા વધારે છે અને રોધકતા ઘટાડે છે. ધાતુઓ માટે α સકરાત્મક હોય છે (A ખોટો), સુપરકન્ડક્ટરોમાં ρ અચાનક શૂન્ય થાય છે (C ખોટો), અને મિશ્ર ધાતુઓમાં ρ તાપમાન સાથે બદલાય છે (D ખોટો).", "ncert_ref": "Class XII - Chapter 3: વિદ્યુત પ્રવાહ", "difficulty": "Hard", "num": 13}, {"question": "એક વિદ્યુત પરિપથમાં, ત્રણ રોધકો 2 Ω, 3 Ω, અને 6 Ω શ્રેણીમાં જોડેલા છે. જો 6 Ω રોધકને બદલીને 1 Ω રોધક મૂકવામાં આવે, તો પરિપથનો કુલ રોધ કેટલો ઘટશે?", "options": ["A) 5 Ω", "B) 6 Ω", "C) 7 Ω", "D) 4 Ω"], "correct": 0, "explanation": "મૂળ કુલ રોધ = 2 + 3 + 6 = 11 Ω. નવો કુલ રોધ = 2 + 3 + 1 = 6 Ω. ઘટાડો = 11 - 6 = 5 Ω. બાકીના વિકલ્પો ગણતરીમાં ચૂક છે.", "ncert_ref": "Class XII - Chapter 3: વિદ્યુત પ્રવાહ", "difficulty": "Hard", "num": 14}, {"question": "નીચેનામાંથી કયો પદાર્થ ઓહ્મના નિયમનું પાલન કરતો નથી, પરંતુ તેનો રોધ તાપમાન સાથે બદલાતો નથી?", "options": ["A) કોન્સ્ટન્ટન (મિશ્ર ધાતુ)", "B) કાર્બન", "C) સિલિકોન", "D) ટંગસ્ટન"], "correct": 0, "explanation": "કોન્સ્ટન્ટન એક મિશ્ર ધાતુ છે જે ઓહ્મના નિયમનું પાલન કરે છે અને તેનો રોધ તાપમાન સાથે લગભગ અચળ રહે છે. કાર્બન (B) અને સિલિકોન (C) ઓહ્મના નિયમનું પાલન કરતા નથી, અને ટંગસ્ટન (D) ઓહ્મના નિયમનું પાલન કરે છે પરંતુ તેનો રોધ તાપમાન સાથે બદલાય છે.", "ncert_ref": "Class XII - Chapter 3: વિદ્યુત પ્રવાહ", "difficulty": "Hard", "num": 15}, {"question": "એક અર્ધવાહક પદાર્થ માટે, જો તાપમાનમાં વૃદ્ધિ કરવામાં આવે, તો તેની રોધકતામાં કેવો ફેરફાર થાય છે અને તેનું કારણ શું છે?", "options": ["A) રોધકતા ઘટે છે, કારણ કે તાપમાન વધવાથી મુક્ત ઇલેક્ટ્રોનની સંખ્યા વધે છે.", "B) રોધકતા વધે છે, કારણ કે તાપમાન વધવાથી ઇલેક્ટ્રોનની ગતિ ઘટે છે.", "C) રોધકતા ઘટે છે, કારણ કે તાપમાન વધવાથી અર્ધવાહકમાં કોવેલન્ટ બંધ તૂટી જાય છે.", "D) રોધકતા વધે છે, કારણ કે તાપમાન વધવાથી અણુઓની કંપન ગતિ વધે છે."], "correct": 0, "explanation": "અર્ધવાહક પદાર્થમાં તાપમાન વધવાથી મુક્ત ઇલેક્ટ્રોનની સંખ્યા વધે છે, જેના કારણે રોધકતા ઘટે છે. ઓપ્શન B ખોટું છે કારણ કે ઇલેક્ટ્રોનની ગતિ ઘટવાને બદલે વધે છે. ઓપ્શન C ખોટું છે કારણ કે કોવેલન્ટ બંધ તૂટવાને બદલે મુક્ત ઇલેક્ટ્રોનની સંખ્યા વધે છે. ઓપ્શન D ખોટું છે કારણ કે અણુઓની કંપન ગતિ વધવાથી રોધકતા વધતી નથી, પરંતુ ઘટે છે.", "ncert_ref": "Class XII - Chapter 3: વિદ્યુત પ્રવાહ", "difficulty": "Hard", "num": 16}, {"question": "એક વિદ્યુત પરિપથમાં, ત્રણ રોધકો 1 Ω, 2 Ω, અને 3 Ω શ્રેણીમાં જોડેલા છે. જો આ પરિપથને 6 Vના લકો માટે રોધકતા નિર્દિષ્ટ તાપમાનથી નીચે શૂન્ય થઈ જાય છે", "D) વિદ્યુત વિભાજ્યો માટે રોધકતા તાપમાન વધતાં વધે છે"], "correct": 3, "explanation": "ધાતુઓ માટે રોધકતા તાપમાન વધતાં વધે છે (A સાચું), અર્ધવાહકો માટે રોધકતા તાપમાન વધતાં ઘટે છે (B સાચું), અતિચાલકો માટે રોધકતા નિર્દિષ્ટ તાપમાનથી નીચે શૂન્ય થઈ જાય છે (C સાચું). પરંતુ વિદ્યુત વિભાજ્યો માટે રોધકતા તાપમાન વધતાં ઘટે છે, કારણ કે આયનોની ગતિશીલતા વધે છે. આમ, D ખોટું છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 3: વિદ્યુતપ્રવાહ", "difficulty": "Hard", "num": 29}, {"question": "એક વિદ્યુત પરિપથમાં બે રોધકો R₁ = 4 Ω અને R₂ = 6 Ω ને શ્રેણીમાં જોડીને 20 V ના કોષ સાથે જોડવામાં આવ્યા છે. જો R₂ ને એક અર્ધવાહક પદાર્થના રોધક સાથે બદલવામાં આવે, જેનું તાપમાન વધતાં રોધ ઘટે છે, તો નીચેનામાંથી કયું વિધાન સાચું હશે જો પરિપથનું તાપમાન વધારવામાં આવે?", "options": ["A) કુલ પ્રવાહ વધશે", "B) કુલ પ્રવાહ ઘટશે", "C) કુલ પ્રવાહ અચળ રહેશે", "D) R₁ ના બે છેડા વચ્ચેનો વોલ્ટેજ વધશે"], "correct": 0, "explanation": "શ્રેણી જોડાણમાં કુલ રોધ R = R₁ + R₂. જો R₂ ને અર્ધવાહક પદાર્થ સાથે બદલવામાં આવે, તો તાપમાન વધતાં R₂ ઘટશે, તેથી કુલ રોધ R ઘટશે. ઓહ્મના નિયમ મુજબ, I = V/R, તેથી કુલ પ્રવાહ વધશે. આમ, સાચો જવાબ A છે. વિકલ્પ D ખોટો છે કારણ કે R₁ ના બે છેડા વચ્ચેનો વોલ્ટેજ V₁ = IR₁ હશે, જે પ્રવાહ વધવાને કારણે વધશે, પરંતુ પ્રશ્નમાં કુલ પ્રવાહ વિશે પૂછવામાં આવ્યું છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 3: વિદ્યુતપ્રવાહ", "difficulty": "Hard", "num": 30}];
        const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
