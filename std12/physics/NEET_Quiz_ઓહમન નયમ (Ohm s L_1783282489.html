<!DOCTYPE html>
<html lang="Gujarati">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>નીટ ક્વિઝ - ઓહ્મનો નિયમ (Ohm's Law) – વિભવ તફાવત અને પ્રવાહ વચ્ચેનો સંબંધ.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{text-align:center;margin-bottom:35px;padding-bottom:25px;border-bottom:3px solid #667eea}
        .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .header .meta{color:#555;font-size:.95rem;display:flex;justify-content:center;gap:25px;flex-wrap:wrap;margin-top:10px}
        .header .meta span{background:#f0f0f0;padding:4px 16px;border-radius:20px;font-weight:500}
        .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
        .progress-bar .progress{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .3s ease;width:0%}
        .question-card{background:#f8f9ff;border-radius:20px;padding:28px;margin-bottom:25px;border-left:5px solid #667eea;transition:all .3s ease;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards}
        .question-card:nth-child(2){animation-delay:.1s}
        .question-card:nth-child(3){animation-delay:.2s}
        .question-card:nth-child(4){animation-delay:.3s}
        .question-card:nth-child(5){animation-delay:.4s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        .question-number{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px}
        .question-text{font-size:1.15rem;font-weight:600;color:#1a1a2e;margin-bottom:18px;line-height:1.6}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:600px){.options{grid-template-columns:1fr}}
        .option{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:12px;font-weight:500;color:#333}
        .option:hover{border-color:#667eea;background:#f0f2ff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.15)}
        .option .letter{background:#667eea;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
        .option.selected{border-color:#667eea;background:#eef0ff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.correct .letter{background:#10b981}
        .option.wrong{border-color:#ef4444;background:#fee2e2}
        .option.wrong .letter{background:#ef4444}
        .option.disabled{cursor:default;opacity:.8}
        .option input[type="radio"]{display:none}
        .btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s ease;display:inline-block;text-align:center;width:100%;max-width:300px;margin:10px auto}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:#6b7280}
        .btn-secondary:hover{box-shadow:0 10px 30px rgba(107,114,128,.4)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669)}
        .btn-success:hover{box-shadow:0 10px 30px rgba(16,185,129,.4)}
        .button-group{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:30px;padding-top:25px;border-top:2px solid #e0e0e0}
        .button-group .row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;width:100%}
        .button-group .row .btn{max-width:200px}
        .result-box{display:none;background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:20px;padding:30px;margin-top:30px;text-align:center;border:2px solid #667eea}
        .result-box.show{display:block;animation:fadeInUp .5s ease}
        .result-box .score{font-size:4rem;font-weight:800;color:#667eea}
        .result-box .details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
        .result-box .details .stat{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .result-box .details .stat .num{font-size:1.8rem;font-weight:700}
        .result-box .details .stat .label{color:#666;font-size:.85rem;margin-top:4px}
        .stat-correct .num{color:#10b981}
        .stat-wrong .num{color:#ef4444}
        .stat-skipped .num{color:#f59e0b}
        .stat-score .num{color:#667eea}
        .result-box .grade{font-size:1.3rem;font-weight:600;margin-top:15px;color:#1a1a2e}
        .result-box .grade .emoji{font-size:2rem}
        .explanation{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border-left:4px solid #667eea;font-size:.95rem;color:#444;line-height:1.6}
        .explanation .ncert{display:inline-block;background:#eef0ff;padding:2px 12px;border-radius:12px;font-size:.8rem;font-weight:500;color:#667eea;margin-top:8px}
        .footer{text-align:center;margin-top:30px;padding-top:20px;border-top:2px solid #e0e0e0;color:#888;font-size:.85rem}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 નીટ ક્વિઝ</h1>
            <div class="meta">
                <span>📚 ઓહ્મનો નિયમ (Ohm's Law) – વિભવ તફાવત અને પ્રવાહ વચ્ચેનો સંબંધ.</span>
                <span>🎯 Hard</span>
                <span>📝 30 પ્રશ્નો</span>
                <span>🌐 Gujarati</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="button-group" id="buttonGroup">
            <div class="row">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">ક્વિઝ સબમિટ કરો</button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetQuiz()">🔄 Reset</button>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="score" id="scoreDisplay">0/0</div>
            <div class="details">
                <div class="stat stat-correct"><div class="num" id="correctCount">0</div><div class="label">✅ Correct</div></div>
                <div class="stat stat-wrong"><div class="num" id="wrongCount">0</div><div class="label">❌ Wrong</div></div>
                <div class="stat stat-skipped"><div class="num" id="skippedCount">0</div><div class="label">⏭️ Skipped</div></div>
                <div class="stat stat-score"><div class="num" id="neetScore">0</div><div class="label">🎯 NEET Score</div></div>
            </div>
            <div class="grade" id="gradeDisplay"></div>
        </div>
        <div class="footer"><span>🧬 NEET MCQ Generator • NCERT Based • Gujarati</span></div>
    </div>
    <script>
        const questionsData = [{"question": "એક સમાન આડછેદ ક્ષેત્રફળ ધરાવતા તાંબાના તારમાંથી 2 એમ્પિયર પ્રવાહ પસાર થાય છે. જો તારની લંબાઈ બમણી કરવામાં આવે અને વોલ્ટેજ સમાન રાખવામાં આવે, તો નવો પ્રવાહ કેટલો હશે? (ઓહ્મનો નિયમ અને અવરોધના નિયમનો ઉપયોગ કરો)", "options": ["A) 1 એમ્પિયર", "B) 0.5 એમ્પિયર", "C) 4 એમ્પિયર", "D) 2 એમ્પિયર (કોઈ ફેર પડતો નથી)"], "correct": 1, "explanation": "ઓહ્મના નિયમ મુજબ V = IR અને અવરોધનો નિયમ R = ρL/A દર્શાવે છે કે અવરોધ લંબાઈના સમપ્રમાણમાં હોય છે. જ્યારે લંબાઈ બમણી કરવામાં આવે ત્યારે અવરોધ પણ બમણો થાય છે. વોલ્ટેજ સમાન રાખતા, પ્રવાહ અવરોધના વ્યસ્ત પ્રમાણમાં હોય છે, તેથી પ્રવાહ અડધો (1 એમ્પિયર નહીં, પણ 0.5 એમ્પિયર) થશે. વિકલ્પ A ખોટો છે કારણ કે તે માત્ર અવરોધ બમણો થયો છે તે ધ્યાનમાં લેતો નથી. વિકલ્પ C અને D ખોટા છે કારણ કે તેઓ અવરોધના ફેરફારને અવગણે છે.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 3: પ્રવાહ વિદ્યુત", "difficulty": "Hard", "num": 1}, {"question": "એક વિદ્યાર્થી ઓહ્મના નિયમનો અભ્યાસ કરતી વખતે નોંધે છે કે અમુક પદાર્થો માટે V-I આલેખ સીધી રેખા નથી. આમાંથી કયો પદાર્થ ઓહ્મના નિયમનું પાલન કરતો નથી?", "options": ["A) તાંબાનો તાર (27°C તાપમાને)", "B) સિલિકોન ડાયોડ (અર્ધવાહક)", "C) મેંગેનિનનો તાર (સ્થિર તાપમાને)", "D) નિક્રોમનો તાર (સ્થિર તાપમાને)"], "correct": 0, "explanation": "ઓહ્મનો નિયમ માત્ર ઓહ્મિક પદાર્થો (જેમ કે ધાતુઓ) માટે જ લાગુ પડે છે, જ્યાં V-I આલેખ સીધી રેખા હોય છે. સિલિકોન ડાયોડ અર્ધવાહક છે અને તેનો V-I આલેખ બિનરેખીય હોય છે, તેથી તે ઓહ્મના નિયમનું પાલન કરતો નથી. તાંબું, મેંગેનિન અને નિક્રોમ ઓહ્મિક પદાર્થો છે અને સ્થિર તાપમાને રેખીય V-I આલેખ દર્શાવે છે.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 3: પ્રવાહ વિદ્યુત", "difficulty": "Hard", "num": 2}, {"question": "એક સમાંતર જોડાણમાં બે અવરોધો R₁ = 4 Ω અને R₂ = 6 Ω જોડાયેલા છે. આ જોડાણને 12 V ના બેટરી સાથે જોડવામાં આવે છે. જો R₂ ના બદલે ઓહ્મના નિયમનું પાલન ન કરતો અર્ધવાહક ઉપકરણ જોડવામાં આવે, તો કયું વિધાન સાચું હશે?", "options": ["A) કુલ પ્રવાહ વધશે કારણ કે અવરોધ ઘટશે", "B) કુલ પ્રવાહ ઘટશે કારણ કે અવરોધ વધશે", "C) કુલ પ્રવાહ બદલાશે નહીં કારણ કે વોલ્ટેજ સમાન છે", "D) કુલ પ્રવાહ અનિશ્ચિત રીતે બ ation": "V-I આલેખ મૂળબિંદુથી પસાર ન થતી હોય ત્યારે, તે V = V₀ + IR સ્વરૂપે હોય છે, જ્યાં V₀ = 2 V છે. A) ઓહ્મના નિયમનું પાલન કરતા પદાર્થો માટે V-I આલેખ મૂળબિંદુથી પસાર થતી સરળ રેખા હોય છે. B) ડાયોડ માટે V-I આલેખ રેખીય ન હોય. C) અવરોધ સ્થિર ન હોય, કારણ કે આલેખ મૂળબિંદુથી પસાર ન થાય.", "ncert_ref": "Class XII - પ્રકરણ 3: પ્રવાહ વિદ્યુત", "difficulty": "Hard", "num": 9}, {"question": "એક વિદ્યાર્થી ઓહ્મના નિયમની ચકાસણી કરતી વખતે જોવે છે કે અમુક પદાર્થ માટે V ∝ √I. આ પદાર્થ માટે નીચેના પૈકી કયું વિધાન સત્ય છે?", "options": ["A) પદાર્થ ઓહ્મના નિયમનું પાલન કરે છે", "B) પદાર્થ એક અર્ધવાહક છે", "C) પદાર્થ એક વાહક છે", "D) પદાર્થ એક કપાસિત છે"], "correct": 1, "explanation": "V ∝ √I સૂચવે છે કે પદાર્થ ઓહ્મના નિયમનું પાલન કરતો નથી. અર્ધવાહક પદાર્થો માટે V ∝ I^n (n ≠ 1) હોય છે, અને ઘણા કિસ્સાઓમાં n ≈ 2 હોય છે, જે V ∝ √I ની નજીક હોય છે. A) ઓહ્મના નિયમનું પાલન કરતા પદાર્થો માટે V ∝ I હોય છે. C) વાહક પદાર્થો ઓહ્મના નિયમનું પાલન કરે છે. D) કપાસિત માટે V ∝ Q (પ્રભાર) હોય છે, પ્રવાહ સાથે નહીં.", "ncert_ref": "Class XII - પ્રકરણ 3: પ્રવાહ વિદ્યુત", "difficulty": "Hard", "num": 10}, {"question": "એક અર્ધચાલક પદાર્થ માટે, જ્યારે તેના તાપમાનમાં વધારો કરવામાં આવે છે, ત્યારે તેની અવરોધકતા ઘટે છે. આ ઘટાડાનું મુખ્ય કારણ કયું છે?", "options": ["A) તાપમાન વધવાથી ઇલેક્ટ્રોનની ગતિશીલતા ઘટે છે", "B) તાપમાન વધવાથી મુક્ત ઇલેક્ટ્રોનની સંખ્યા વધે છે", "C) તાપમાન વધવાથી અણુઓની કંપન ગતિ ઘટે છે", "D) તાપમાન વધવાથી અવરોધક પદાર્થમાં રહેલા અશુદ્ધિઓનું પ્રમાણ ઘટે છે"], "correct": 1, "explanation": "અર્ધચાલક પદાર્થમાં તાપમાન વધવાથી મુક્ત ઇલેક્ટ્રોનની સંખ્યા વધે છે, જેથી અવરોધકતા ઘટે છે. ઇલેક્ટ્રોનની ગતિશીલતા ઘટવાનું વિધાન ખોટું છે કારણ કે તાપમાન વધવાથી ગતિશીલતા સામાન્ય રીતે ઘટે છે, પરંતુ મુક્ત ઇલેક્ટ્રોનની સંખ્યામાં વધારો થવાને લીધે અવરોધકતા ઘટે છે. અણુઓની કંપન ગતિ અને અશુદ્ધિઓનું પ્રમાણ તાપમાન સાથે સીધું સંબંધ ધરાવતું નથી.", "ncert_ref": "Class XII - Chapter 3: વિદ્યુત પ્રવાહના વાહકત્વમાં પદાર્થો", "difficulty": "Hard", "num": 11}, {"question": "એક વિદ્યુત પરિપથમાં, જ્યારે અવરોધકને ઓહ્મના નિયમનું પાલન કરતો ન હોવાનું જણાય છે, ત્યારે નીચેના પૈકી કયું વિધાન સત્ય છે?", "options": ["A) V-I આલેખ એક સરળ રેખા હશે જે મૂળબિંદુથી પસાર થશે", "B) V-I આલેખ એક વક્ર રેખા હશે જે મૂળબિંદુથી પસાર થશે", "C) V-I આલેખ એક સરળ રેખા હશે જે મૂળબિંદુથી પસાર નહીં થાય", "D) V-I આલેખ એક વક્ર રેખા હશે જે મૂળબિંદુથી પસાર નહીં થાય"], "correct": 3, "explanation": "જ્યારે અવરોધક ઓહ્મના નિયમનું પાલન કરતો નથી, ત્યારે V-I આલેખ વક્ર રેખા હોય છે અને તે મૂળબિંદુથી પસાર થતો નથી. ઓહ્મના નિયમનું પાલન કરતા અવરોધક માટે V-I આલેખ સરળ રેખા હોય છે અને મૂળબિંદુથી પસાર થાય છે. આમ, વિકલ્પ A, B, અને C ખોટા છે.", "ncert_ref": "Class XII - Chapter 3: ઓહ્મનો નિયમ અને તેના અપવાદો", "difficulty": "Hard", "num": 12}, {"question": "એક વિદ્યાર્થી એક અવરોધક માટે V-I આલેખ દોરે છે અને જોવે છે કે આલેખ મૂળબિંદુથી પસાર થતી વક્ર રેખા છે. આ અવરોધક માટે નીચેના પૈકી કયું વિધાન સત્ય છે?", "options": ["A) અવરોધક ઓહ્મના નિયમનું પાલન કરે છે", "B) અવરોધક ઓહ્મના નિયમનું પાલન કરતો નથી, પરંતુ તે રેખીય પદાર્થ છે", "C) અવરોધક ઓહ્મના નિયમનું પાલન કરતો નથી અને તે અરેખીય પદાર્થ છે", "D) અવરોધક ઓહ્મના નિયમનું પાલન કરે છે અને તે અરેખીય પદાર્થ છે"], "correct": 2, "explanation": "જ્યારે V-I આલેખ મૂળબિંદુથી પસાર થતી વક્ર રેખા હોય છે, ત્યારે અવરોધક ઓહ્મના નિયમનું પાલન કરતો નથી અને તે અરેખીય પદાર્થ છે. ઓહ્મના નિયમનું પાલન કરતા અવરોધક માટે V-I આલેખ સરળ રેખા હોય છે. આમ, વિકલ્પ A, B, અને D ખોટા છે.", "ncert_ref": "Class XII - Chapter 3: ઓહ્મનો નિયમ અને અરેખીય પદાર્થો", "difficulty": "Hard", "num": 13}, {"question": "એક વિદ્યુત પરિપથમાં, જ્યારે અવરોધકને તાપમાન બદલવામાં આવે છે, ત્યારે તેની અવરોધકતા બદલાય છે. નીચેના પૈકી કયું વિધાન આ બાબતને સૌથી યોગ્ય રીતે વર્ણવે છે?", "options": ["A) ધાતુઓની અવરોધકતા તાપમાન સાથે ઘટે છે", "B) અર્ધચાલકોની અવરોધકતા તાપમાન સાથે વધે છે", "C) અતિચાલકોની અવરોધકતા તાપમાન સાથે ઘટે છે અને એક નિશ્ચિત તાપમાને શૂન્ય થાય છે", "D) વિદ્યુતરોધી પદાર્થોની અવરોધકતા તાપમાન સાથે ઘટે છે"], "correct": 2, "explanation": "અતિચાલકોની અવરોધકતા તાપમાન સાથે ઘટે છે અને એક નિશ્ચિત તાપમાને (ક્રાંતિક તાપમાન) શૂન્ય થાય છે. ધાતુઓની અવરોધકતા તાપમાન સાથે વધે છે, અર્ધચાલકોની અવરોધકતા તાપમાન સાથે ઘટે છે, અને વિદ્યુતરોધી પદાર્થોની અવરોધકતા તાપમાન સાથે ઘટે છે પરંતુ શૂન્ય થતી નથી. આમ, વિકલ્પ A, B, અને D ખોટા છે.", "ncert_ref": "Class XII - Chapter 3: અતિચાલકતા અને તાપમાનનો પ્રભાવ", "difficulty": "Hard", "num": 14}, {"question": "એક વિદ્યુત પરિપથમાં 12 V નો બેટરી, 4 Ω નો અવરોધ અને એક થર્મિસ્ટર (NTC પ્રકાર) શ્રેણીમાં જોડાયેલ છે. જ્યારે પરિપથનું તાપમાન 20 °C થી 100 °C સુધી વધારવામાં આવે છે, ત્યારે નીચેના પૈકી કયું વિધાન સત્ય છે? (ઓહ્મના નિયમની સીમાઓ અને અર્ધચાલકોના ગુણધર્મો ધ્યાનમાં લો)", "options": ["A) પરિપથમાં પ્રવાહ વધશે કારણ કે થર્મિસ્ટરનો અવરોધ ઘટે છે અને ઓહ્મનો નિયમ હજુ પણ લાગુ પડે છે", "B) પરિપથમાં પ્રવાહ ઘટશે કારણ કે થર્મિસ્ટરનો અવરોધ વધે છે અને ઓહ્મનો નિયમનું પાલન થતું નથી", "C) પરિપથમાં પ્રવાહ વધશે કારણ કે થર્મિસ્ટરનો અવરોધ ઘટે છે, પરંતુ ઓહ્મનો નિયમ આ કિસ્સામાં લાગુ પડતો નથી", "D) પરિપથમાં પ્રવાહ અચળ રહેશે કારણ કે બેટરીનો વિભવ તફાવત અને કુલ અવરોધ બદલાતો નથી"], "correct": 2, "explanation": "સાચો જવાબ વિકલ્પ C છે. થર્મિસ્ટર (NTC પ્રકાર) એ અર્ધચાલક પદાર્થ છે, જેનું તાપમાન વધતા તેનો અવરોધ ઘટે છે (NCERT Class XII - ભૌતિક વિજ્ઞાન, પ્રકરણ 14: અર્ધચાલક ઇલેક્ટ્રોનિક્સ). ઓહ્મનો નિયમ માત્ર ઓહ્મિક પદાર્થો (જેમ કે ધાતુઓ) માટે જ લાગુ પડે છે, જ્યાં અવરોધ તાપમાન સાથે બદલાતો નથી. અર્ધચાલકો માટે ઓહ્મનો નિયમ લાગુ પડતો નથી કારણ કે તેમનો અવરોધ તાપમાન સાથે બદલાય છે. તેથી, જ્યારે તાપમાન વધે છે, થર્મિસ્ટરનો અવરોધ ઘટે છે, જેના કારણે પરિપથમાં પ્રવાહ વધે છે, પરંતુ આ પ્રક્રિયા ઓહ્મના નિયમનું પાલન કરતી નથી.\n\nવિકલ્પ A ખોટો છે કારણ કે ઓહ્મનો નિયમ અર્ધચાલકો માટે લાગુ પડતો નથી.\nવિકલ્પ B ખોટો છે કારણ કે NTC થર્મિસ્ટરનો અવરોધ તાપમાન વધતા ઘટે છે, વધતો નથી.\nવિકલ્પ D ખોટો છે કારણ કે કુલ અવરોધ બદલાય છે, જેના કારણે પ્રવાહ પણ બદલાય છે.", "ncert_ref": "Class XII - ભૌતિક વિજ્ઞાન: પ્રકરણ 14: અર્ધચાલક ઇલેક્ટ્રોનિક્સ: પદાર્થો અને તેમના ગુણધર્મો", "difficulty": "Hard", "num": 15}, {"question": "એક અર્ધચાલક પદાર્થ માટે, જો તેના તાપમાનમાં વધારો કરવામાં આવે તો તેની અવરોધકતામાં કયો ફેરફાર થશે? અને આ ફેરફારનો કારણ શું છે?", "options": ["A) અવરોધકતા વધશે, કારણ કે ઉષ્મીય ઉર્જાથી ઇલેક્ટ્રોનની ગતિ વધે છે.", "B) અવરોધકતા ઘટશે, કારણ કે ઉચ્ચ તાપમાને વધુ ઇલેક્ટ્રોન મુક્ત થાય છે.", "C) અવરોધકતા અચળ રહેશે, કારણ કે અર્ધચાલકમાં ઇલેક્ટ્રોનની સંખ્યા નિયત હોય છે.", "D) અવરોધકતા ઘટશે, કારણ કે તાપમાન વધવાથી અર્ધચાલક ધાતુમાં પરિવર્તિત થાય છે."], "correct": 1, "explanation": "અર્ધચાલક પદાર્થમાં તાપમાન વધવાથી ઇલેક્ટ્રોન મુક્ત થવાની સંખ્યા વધે છે, જેથી વાહકતા વધે છે અને અવરોધકતા ઘટે છે. વિકલ્પ A ખોટો છે કારણ કે ઉષ્મીય ઉર્જાથી ઇલેક્ટ્રોનની ગતિ વધે છે પરંતુ અર્ધચાલકમાં ઇલેક્ટ્રોનની સંખ્યા વધવાને કારણે અવરોધકતા ઘટે છે. વિકલ્પ C ખોટો છે કારણ કે અર્ધચાલકમાં ઇલેક્ટ્રોનની સંખ્યા તાપમાન સાથે બદલાય છે. વિકલ્પ D ખોટો છે કારણ કે અર્ધચાલક ધાતુમાં પરિવર્તિત થતો નથી.", "ncert_ref": "Class XII - Chapter 12: વિદ્યુત ચાલકતા", "difficulty": "Hard", "num": 16}, {"question": "એક વિદ્યુત પરિપથમાં 12 V નો બેટરી, 4 Ω નો અવરોધ અને એક અજ્ઞાત અવરોધક Y શ્રેણીમાં જોડેલા છે. જો પરિપથમાં પ્રવાહ 2 A હોય, તો અજ્ઞાત અવરોધક Y ની કિંમત કેટલી હશે?", "options": ["A) 2 Ω", "B) 4 Ω", "C) 6 Ω", "D) 8 Ω"], "correct": 1, "explanation": "પરિપથમાં કુલ વિભવ તફાવત 12 V છે અને કુલ અવરોધ R_total = R1 + R_Y છે. પ્રવાહ I = 2 A હોવાથી, ઓહ્મના નિયમ મુજબ V = I * R_total. આથી, 12 = 2 * (4 + R_Y) → 4 + R_Y = 6 → R_Y = 2 Ω. વિકલ્પ B, C, અને D ખોટા છે કારણ કે તેઓ ગણતરી સાથે મેળ ખાતા નથી.", "ncert_ref": "Class XII - Chapter 3: વિદ્યુત પ્રવાહ", "difficulty": "Hard", "num": 17}, {"question": "એક વિદ્યુત પરિપથમાં, એક અવરોધક અને એક ડાયોડ શ્રેણીમાં જોડાયેલા છે. જ્યારે પરિપથમાં વિદ્યુતપ્રવાહ પસાર કરવામાં આવે છે, ત્યારે નીચેના પૈકી કયું વિધાન સત્ય છે? (અવરોધક ઓહ્મના નિયમનું પાલન કરે છે, પરંતુ ડાયોડ નથી કરતો)", "options": ["A) સમગ્ર પરિપથ માટે V-I આલેખ સુરેખ હશે કારણ કે અવરોધક ઓહ્મના નિયમનું પાલન કરે છે", "B) સમગ્ર પરિપથ માટે V-I આલેખ અસુરેખ હશે કારણ કે ડાયોડ ઓહ્મના નિયમનું પાલન કરતો નથી", "C) અવરોધક અને ડાયોડ બંને માટે V-I આલેખ સુરેખ હશે કારણ કે તેઓ શ્રેણીમાં છે", "D) સમગ્ર પરિપથ માટે V-I આલેખ સુરેખ હશે કારણ કે ડાયોડ પણ ઓહ્મના નિયમનું પાલન કરે છે"], "correct": 1, "explanation": "ઓહ્મનો નિયમ માત્ર એવા પદાર્થો માટે લાગુ પડે છે જ્યાં વિભવ તફાવત અને પ્રવાહ વચ્ચેનો સંબંધ સુરેખ હોય. અવરોધક ઓહ્મના નિયમનું પાલન કરે છે, પરંતુ ડાયોડ અર્ધચાલક હોવાથી તે ઓહ્મના નિયમનું પાલન કરતો નથી. જ્યારે બંને શ્રેણીમાં જોડાયેલા હોય, ત્યારે સમગ્ર પરિપથનો V-I આલેખ અસુરેખ બને છે કારણ કે ડાયોડનો પ્રવાહ-વિભવ સંબંધ બિનરેખીય હોય છે. વિકલ્પ A ખોટો છે કારણ કે સમગ્ર પરિપથનો આલેખ સુરેખ નહીં હોય. વિકલ્પ C ખોટો છે કારણ કે ડાયોડ માટે આલેખ સુરેખ નથી. વિકલ્પ D ખોટો છે કારણ કે ડાયોડ ઓહ્મના નિયમનું પાલન કરતો નથી.", "ncert_ref": "ક્લાસ XII - પ્રકરણ 3: વિદ્યુતપ્રવાહ", "difficulty": "Hard", "num": 18}, {"question": "એક વિદ્યાર્થી એક અવરોધક માટે V-I આલેખ દોરે છે અને જુએ છે કે આલેખ મૂળબિંદુમાંથી પસાર થતો નથી, પરંતુ સીધી રેખા છે જે ધન X-અક્ષને છેદે છે. આ અવલોકન માટે નીચેના પૈકી કયું કારણ યોગ્ય છે?", "options": ["A) અવરોધક ઓહ્મના નિયમનું પાલન કરતો નથી કારણ કે આલેખ મૂળબિંદુમાંથી પસાર થતો નથી", "B) અવરોધક ઓહ્મના નિયમનું પાલન કરે છે, પરંતુ પરિપથમાં કોઈ આંતરિક વિભવ તફાવત હાજર છે", "C) અવરોધક ઓહ્મના નિયમનું પાલન કરતો નથી કારણ કે આલેખ સીધી રેખા નથી", "D) અવરોધક ઓહ્મના નિયમનું પાલન કરે છે, પરંતુ પ્રવાહ માપવાના સાધનમાં ભૂલ છે"], "correct": 1, "explanation": "ઓહ્મનો નિયમ જણાવે છે કે V = IR, જે સુરેખ સંબંધ દર્શાવે છે. જો V-I આલેખ સીધી રેખા હોય પરંતુ મૂળબિંદુમાંથી પસાર ન થતો હોય, તો તે સૂચવે છે કે પરિપથમાં કોઈ આંતરિક વિભવ તફાવત (જેમ કે બેટરી અથવા અન્ય સ્રોત) હાજર છે. આનો અર્થ એ નથી કે અવરોધક ઓહ્મના નિયમનું પાલન કરતો નથી. વિકલ્પ A ખોટો છે કારણ કે આલેખ સુરેખ હોવાથી અવરોધક ઓહ્મના નિયમનું પાલન કરે છે. વિકલ્પ C ખોટો છે કારણ કે આલેખ સીધી રેખા છે. વિકલ્પ D ખોટો છે કારણ કે પ્રવાહ માપવાના સાધનમાં ભૂલ હોત તો આલેખ અસુરેખ બનત.", "ncert_ref": "ક્લાસ XI - પ્રકરણ 3: ગતિના નિયમો (વિદ્યુતપ્રવાહના સંદર્ભમાં)", "difficulty": "Hard", "num": 19}, {"question": "એક વિદ્યુત પરિપથમાં, એક અવરોધક અને એક થર્મિસ્ટર શ્રેણીમાં જોડાયેલા છે. જ્યારે પરિપથમાં વિદ્યુતપ્રવાહ પસાર કરવામાં આવે છે અને થર્મિસ્ટરનું તાપમાન વધારવામાં આવે છે, ત્યારે નીચેના પૈકી કયું વિધાન સત્ય છે? (અવરોધક ઓહ્મના નિયમનું પાલન કરે છે, પરંતુ થર્મિસ્ટર નથી કરતો)", "options": ["A) સમગ્ર પરિપથ માટે અવરોધ         const langData = {"title": "નીટ ક્વિઝ", "q_label": "પ્રશ્નો", "submit_label": "ક્વિઝ સબમિટ કરો"};
        let userAnswers = {};
        let quizSubmitted = false;
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const letters = ['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${index}`;
                let optionsHTML = '';
                q.options.forEach((opt,optIndex)=>{
                    optionsHTML += `<label class="option" id="opt_${index}_${optIndex}" onclick="selectOption(${index},${optIndex})"><input type="radio" name="q${index}" value="${optIndex}"><span class="letter">${letters[optIndex]}</span><span>${opt.replace(/^[A-D]\)\s*/,'')}</span></label>`;
                });
                card.innerHTML = `<span class="question-number">Q${index+1}</span><div class="question-text">${q.question}</div><div class="options">${optionsHTML}</div><div class="explanation hidden" id="exp_${index}">💡 <strong>Explanation:</strong> <span id="expText_${index}"></span><div class="ncert" id="ncertRef_${index}"></div></div>`;
                container.appendChild(card);
            });
            updateProgress();
        }
        function selectOption(qIndex,optIndex){
            if(quizSubmitted) return;
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(r=>r.checked=false);
            document.querySelectorAll(`#q${qIndex} .option`).forEach(el=>el.classList.remove('selected'));
            document.getElementById(`opt_${qIndex}_${optIndex}`).classList.add('selected');
            document.querySelector(`input[name="q${qIndex}"][value="${optIndex}"]`).checked=true;
            userAnswers[qIndex]=optIndex;
            updateProgress();
        }
        function updateProgress(){
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            document.getElementById('progressBar').style.width=(answered/total*100)+'%';
        }
        function submitQuiz(){
            if(quizSubmitted) return;
            const total=questionsData.length, answered=Object.keys(userAnswers).length;
            if(answered<total && !confirm(`⚠️ Aapne ${total-answered} questions skip kiye hain. Kya aap submit karna chahte hain?`)) return;
            quizSubmitted=true;
            document.getElementById('submitBtn').disabled=true;
            let correct=0,wrong=0,skipped=0;
            const letters=['A','B','C','D'];
            questionsData.forEach((q,index)=>{
                const userAns=userAnswers[index], correctAns=q.correct;
                const expDiv=document.getElementById(`exp_${index}`);
                document.getElementById(`expText_${index}`).textContent=q.explanation||'Refer NCERT for details.';
                document.getElementById(`ncertRef_${index}`).textContent=q.ncert_ref||'NCERT Reference';
                expDiv.classList.remove('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach((opt,optIndex)=>{
                    opt.classList.add('disabled');
                    if(optIndex===correctAns) opt.classList.add('correct');
                    if(userAns===optIndex && userAns!==correctAns) opt.classList.add('wrong');
                });
                if(userAns===undefined) skipped++;
                else if(userAns===correctAns) correct++;
                else wrong++;
            });
            const neetScore=(correct*4)-(wrong*1), pct=(correct/total*100);
            let grade='', emoji='';
            if(pct>=80){grade='🏆 Excellent! NEET Ready!';emoji='🌟';}
            else if(pct>=60){grade='👍 Good! Thoda aur practice karo';emoji='💪';}
            else if(pct>=40){grade='📚 Average — NCERT dobara padho';emoji='📖';}
            else{grade='💪 Keep Going — Practice makes perfect!';emoji='🔥';}
            document.getElementById('correctCount').textContent=correct;
            document.getElementById('wrongCount').textContent=wrong;
            document.getElementById('skippedCount').textContent=skipped;
            document.getElementById('neetScore').textContent=neetScore;
            document.getElementById('scoreDisplay').textContent=`${correct}/${total}`;
            document.getElementById('gradeDisplay').innerHTML=`<span class="emoji">${emoji}</span> ${grade}`;
            document.getElementById('resultBox').classList.add('show');
            document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
        }
        function resetQuiz(){
            if(!confirm('🔄 Kya aap quiz reset karna chahte hain?')) return;
            userAnswers={}; quizSubmitted=false;
            document.getElementById('submitBtn').disabled=false;
            document.getElementById('resultBox').classList.remove('show');
            questionsData.forEach((q,index)=>{
                document.getElementById(`exp_${index}`).classList.add('hidden');
                document.querySelectorAll(`#q${index} .option`).forEach(opt=>opt.classList.remove('selected','correct','wrong','disabled'));
                document.querySelectorAll(`input[name="q${index}"]`).forEach(r=>r.checked=false);
            });
            updateProgress();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        renderQuestions();
    </script>
